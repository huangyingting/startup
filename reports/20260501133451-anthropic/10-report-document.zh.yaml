  - id: F702
    title: 从源风险到承保影响的风险传导图
    type: risk-transmission-map
    layout: wide
    summary: |
      Anthropic 的主要下行风险并非通过单一生存性事件传导，而是通过一条链条，将云依赖、披露缺口和控制义务与毛利率、留存信心和估值支撑连接起来。[C014][C019][C022][C023][C029][C040][C046]
    data:
      nodes:
        - id: r1
          label: AWS 集中度
          detail: 主要训练与关键任务云依赖外加超过 $100B 的十年承诺。[C014][C046]
          tone: high
        - id: r2
          label: 公司自述规模 vs 公开披露深度
          detail: 已观测到投后 $380B 估值，但最强的运营指标来自公司自述的收入运行率和客户披露。[C019][C022][C023]
          tone: high
        - id: r3
          label: 持续性的安全与滥用控制负担
          detail: Responsible Scaling Policy 以及持续的防护更新意味着需要持续开展主动监控和升级处置。[C029][C040]
          tone: medium
        - id: p1
          label: 利润率与成本压力
          detail: 供应商议价能力增强或已实现单位经济性偏弱，可能压缩毛利率并限制经营杠杆。
          tone: high
        - id: p2
          label: 收入质量不确定性
          detail: 缺少经审计的留存、集中度和收入结构数据，削弱了对持续性的信心。
          tone: high
        - id: p3
          label: 产品或发布摩擦
          detail: 安全控制或事件响应负担可能拖慢产品发布，并增加企业支持负担。
          tone: medium
        - id: u1
          label: 可承保现金流质量下降
          detail: 对利润率和留存缺乏信心会降低可支持的估值倍数。
          tone: critical
        - id: u2
          label: 下一轮融资或估值标记压缩风险
          detail: 如果尽调无法验证公开规模主张，下行风险可能首先表现为估值重置，而非收入立即崩塌。
          tone: critical
      edges:
        - from: r1
          to: p1
          label: 成本与议价能力
        - from: r2
          to: p2
          label: 审计与披露缺口
        - from: r3
          to: p3
          label: 控制开销
        - from: p1
          to: u1
          label: 利润率质量
        - from: p2
          to: u1
          label: 收入持续性信心
