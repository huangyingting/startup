  summary: Anthropic is a late-stage private frontier-AI company built around Claude, with unusually strong strategic capital, cloud distribution, and safety-governance positioning—but public evidence is still thin on audited financials, current headcount, and unit economics. [C001][C006][C007][C019][C023][C050]
startupIntroduction:
  summary: Anthropic is a San Francisco-based AI safety and research company founded in early 2021 and led by co-founders Dario Amodei and Daniela Amodei. It operates as a Public Benefit Corporation with a Long-Term Benefit Trust governance overlay, and it commercializes Claude through consumer subscriptions, enterprise seats, direct API access, Claude Code, and major cloud-partner channels including Amazon Bedrock, Google Vertex AI, and Microsoft Foundry. As of the latest fetched official financing disclosure, Anthropic is a late-stage private company that completed a $30 billion Series G at a $380 billion post-money valuation, while separately claiming run-rate revenue had reached $14 billion in February 2026 and surpassed $30 billion by April 2026. [C002][C003][C005][C006][C007][C008][C009][C019][C022][C023]
