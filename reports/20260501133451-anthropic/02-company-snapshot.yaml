sections:
- number: '1.1'
  title: Verified identity
  body: Anthropic presents itself as an AI safety and research company, not merely a consumer chatbot vendor, and explicitly ties its mission to safe deployment of transformative AI. The strongest fetched identity anchors are the company overview, careers page, and constitutional materials. [C001][C049]
  claimRefs:
  - C001
  - C049
- number: '1.2'
  title: Startup introduction
  body: The clean opening framing is that Anthropic is a late-stage private frontier-AI company founded in early 2021 and led by co-founders Dario Amodei and Daniela Amodei. It operates from a San Francisco anchor and sells Claude through subscriptions, API usage, coding workflows, and cloud partners. [C002][C003][C005][C008][C009][C013]
  claimRefs:
  - C002
  - C003
  - C005
  - C008
  - C009
  - C013
- number: '1.3'
  title: Scale and commercial model
  body: Anthropic’s fetched public evidence now spans direct consumer plans, Team and Enterprise packaging, API tiering, and third-party cloud distribution. The company’s own 2026 materials claim very large revenue scale and a meaningful Claude Code contribution, but those figures remain unaudited in the public record. [C007][C011][C022][C023][C044]
  claimRefs:
  - C007
  - C011
  - C022
  - C023
  - C044
- number: '1.4'
  title: Investment highlights
  body: 'The strongest snapshot-level positives are: (1) broad commercialization of Claude beyond chat, (2) exceptional strategic-cloud leverage, (3) visible enterprise customer proof, and (4) differentiated governance and safety signaling. The principal caution is that valuation has outrun the depth of public financial disclosure. [C013][C017][C021][C028][C029][C050]'
  claimRefs:
  - C013
  - C017
  - C021
  - C028
  - C029
  - C050
- number: '1.5'
  title: Leadership, governance, and ecosystem
  body: Anthropic’s governance stack matters for underwriting because it is one of the company’s clearest claims to distinctiveness versus other frontier labs. At the same time, the ecosystem evidence shows the company increasingly behaves like a platform business, with AWS, Google Cloud, Microsoft, NVIDIA, BCG, Accenture, Infosys, and NEC all serving as force multipliers. [C006][C020][C035][C037][C047]
  claimRefs:
  - C006
  - C020
  - C035
  - C037
  - C047
- number: '1.6'
  title: Open identity questions
  body: The biggest unresolved Chapter 1 questions are not about whether Anthropic is real or strategically relevant—they are about the shape of the underlying business. Public sources still do not provide current headcount, audited revenue composition, customer concentration, retention, or a complete cap-table view. [C020][C022][C023][C050]
  claimRefs:
  - C020
  - C022
  - C023
  - C050
