schemaVersion: startup-diligence-report-v2
artifact: report-brief
slug: anthropic
runDate: '2026-05-01'
company:
  name: Anthropic
reportScope:
  companyUrl: https://www.anthropic.com
  depth: deep
  objective: Build the evidence backbone and Chapter 1 startup snapshot for Anthropic, with special emphasis on identity verification, funding history, product/commercial model, governance, strategic cloud dependencies, and company-claimed traction.
researchQuestions:
- 'How should Anthropic be framed at the opening of a VC diligence report: identity, mission, founding context, headquarters, business model, stage, and funding status?'
- Which parts of Anthropic’s scale narrative are officially disclosed versus company-claimed versus still unresolved?
- How concentrated is Anthropic’s commercialization around Claude subscriptions, API usage, cloud distribution, and coding products?
- What do fetched sources show about governance differentiation, safety commitments, and compliance posture?
- Which customers, partners, and cloud providers provide the strongest signal of market position and distribution leverage?
- Which gaps remain material for later chapters on market, competition, unit economics, and valuation?
desiredChapters:
- chapterNumber: 1
  title: Startup Introduction & Company Snapshot
  purpose: Verify identity, summarize the company, and frame investment-relevant facts.
- chapterNumber: 2
  title: Market Sizing & Macro Analysis
  purpose: Assess frontier-AI, coding-assistant, and enterprise-agent demand context.
- chapterNumber: 3
  title: Competitive Benchmarking
  purpose: Compare Anthropic against OpenAI, Google, xAI, Meta, and coding-assistant peers.
- chapterNumber: 4
  title: Financial & Unit Economics
  purpose: Bridge public funding and revenue disclosures to underwriting questions.
- chapterNumber: 5
  title: Product & Technology
  purpose: Analyze Claude platform architecture, model roadmap, and compute dependencies.
- chapterNumber: 6
  title: Customer & Retention
  purpose: Evaluate customer proof, deployment patterns, and expansion loops.
- chapterNumber: 7
  title: Risk & Regulatory
  purpose: Assess governance, misuse, legal, safety, and geopolitical exposure.
- chapterNumber: 8
  title: Investment & Valuation
  purpose: Translate evidence into recommendation logic and valuation stance.
expectedTables:
- id: T101
  title: Cover metrics and status anchors
  artifact: 02-company-snapshot.yaml
- id: T102
  title: Leadership and governance snapshot
  artifact: 02-company-snapshot.yaml
- id: T103
  title: Disclosed financing timeline
  artifact: 02-company-snapshot.yaml
expectedFigures:
- id: F101
  title: Anthropic milestone timeline
  type: timeline
  artifact: 02-company-snapshot.yaml
- id: F102
  title: Claude platform architecture stack
  type: architecture-stack
  artifact: 02-company-snapshot.yaml
- id: F103
  title: Selected disclosed financing sizes
  type: bars
  artifact: 02-company-snapshot.yaml
sourceStrategy:
  minimumRetainedSources: 75
  discoveryTracks:
  - official identity and governance
  - funding and investor base
  - product and pricing
  - customer proof
  - cloud-partner distribution
  - regulatory and safety posture
  - disconfirming diligence gaps
  evidenceRules:
  - Use only fetched URLs in the evidence ledger.
  - Keep source IDs and claim IDs stable for downstream artifacts.
  - Separate observed facts from company-claimed traction metrics.
  - Preserve unresolved conflicts or missing disclosures as evidence gaps rather than smoothing them over.
