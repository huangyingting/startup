sections:
  - number: '8.1'
    title: Investment thesis summary
    body: |
      Anthropic is investable in the strategic sense: it has unusual platform breadth, capital access, partner distribution, enterprise proof, and a governance stack that may matter disproportionately in regulated and risk-sensitive AI adoption. The problem is not whether Anthropic is relevant; it is whether the current public evidence base is strong enough to support a high-conviction underwriting decision at the latest valuation. The answer from retained evidence is no. [C006][C009][C017][C019][C021][C028][C029][C037]
    claimRefs:
      - C006
      - C009
      - C017
      - C019
      - C021
      - C028
      - C029
      - C037
  - number: '8.2'
    title: Bull, base, and bear cases
    body: |
      The bull case is that Anthropic’s company-claimed run-rate and customer-scale signals are directionally accurate, Claude Code becomes a durable workflow wedge, and cross-cloud enterprise distribution plus governance trust produce lasting category leadership. The base case is that Anthropic remains a top strategic platform but grows into its valuation more slowly than headline claims imply because margin, retention, and concentration are less favorable than the public narrative suggests. The bear case is not strategic irrelevance; it is valuation compression if audited revenue quality, legal exposure, or compute economics fall short of what a $380 billion post-money mark demands. [C013][C019][C022][C023][C044][C046]
    claimRefs:
      - C013
      - C019
      - C022
      - C023
      - C044
      - C046
  - number: '8.3'
    title: Comparables and valuation framework
    body: |
      The retained ledger supports only a constrained valuation framework. Private-mark anchors are strong: Anthropic moved from a $61.5 billion post-money Series E in March 2025 to a $380 billion post-money Series G in February 2026. Revenue-multiple sensitivity can be illustrated using the company-claimed $14 billion February 2026 run-rate and $30 billion+ April 2026 run-rate floor, which imply roughly 27.1x and 12.7x, respectively, against the Series G mark. Public-comparable multiples were not retained in the ledger, so they should be treated as a research-more item rather than fabricated for this report. [C018][C019][C022][C023]
    claimRefs:
      - C018
      - C019
      - C022
      - C023
  - number: '8.4'
    title: Final recommendation
    body: |
      Final recommendation is track. Confidence is medium because the strategic and product evidence is strong, but the financial-underwriting evidence is materially incomplete. Risk rating is significant because downside would likely surface through valuation support, margin quality, concentration, or legal exposure rather than through a simple demand-collapse thesis. Valuation stance is stretched because the latest observed private mark already discounts a large portion of the upside while the public record remains thin on audited support. [C019][C022][C023][C046]
    claimRefs:
      - C019
      - C022
      - C023
      - C046
  - number: '8.5'
    title: Stop-loss triggers and re-entry conditions
    body: |
      Stop-loss triggers are straightforward: pause or decline if audited financials fail to support the company-claimed run-rate narrative, if gross-margin or compute-economics data show structurally weak cash-flow quality, if retention or concentration data are materially worse than enterprise-software norms, or if legal diligence reveals a material unresolved exposure. Re-entry conditions are equally clear: high-quality audited revenue by stream, a credible margin-improvement path, strong cohort retention, manageable concentration, and a valuation entry point that better compensates for remaining uncertainty. [C019][C022][C023][C028][C029][C046]
    claimRefs:
      - C019
      - C022
      - C023
      - C028
      - C029
      - C046
