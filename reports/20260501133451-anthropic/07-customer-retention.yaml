      - - Revenue concentration
        - null
        - Not publicly disclosed
        - Large-account breadth is known, but concentration risk is not. [C022]
        - Request top-10 and top-25 customer revenue shares.
    notes: Nulls reflect absent public retention disclosure, not lack of customer evidence.
