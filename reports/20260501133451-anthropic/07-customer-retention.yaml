sections:
  - number: '6.1'
    title: Customer base and segmentation
    body: |
      Anthropic’s customer footprint appears broad across developers, large enterprises, and regulated verticals. The strongest direct scale claims are 500+ customers spending over $1 million annually, eight Fortune 10 customers, and 100000+ Bedrock customers, while official customer and partner materials show coverage across software, legal, pharma, finance, security, and enterprise AI workloads. [C021][C022][C023][C024]
    claimRefs:
      - C021
      - C022
      - C023
      - C024
  - number: '6.2'
    title: Case studies and deployment patterns
    body: |
      The retained customer proof is stronger on workflow quality than on retention metrics. Replit shows developer-platform relevance through Vertex AI deployment, Thomson Reuters shows legal and professional-workflow credibility through CoCounsel on Bedrock, and eSentire shows operational-security automation with measurable workflow outcomes. SI partnerships with BCG, Accenture, Infosys, and NEC further suggest that Anthropic is being deployed as an enterprise platform, not only as a self-serve assistant. [C025][C026][C027][C037]
    claimRefs:
      - C025
      - C026
      - C027
      - C037
  - number: '6.3'
    title: Retention, churn, and satisfaction
    body: |
      This is the weakest public part of the customer chapter. The retained evidence does not disclose gross retention, NRR, logo churn, seat expansion, NPS, or CSAT. As a result, adoption breadth is visible, but durability is not. The right interpretation is not that retention is poor, but that it is unproven in public materials and therefore should remain null in the diligence model until management data is supplied. [C022][C023]
    claimRefs:
      - C022
      - C023
  - number: '6.4'
    title: Customer diligence asks
    body: |
      Priority customer diligence should request cohort retention by product, top-customer concentration, expansion from API or self-serve into enterprise plans, cloud-channel conversion economics, support burden by segment, and win-loss analysis against competing model vendors and coding tools. Until then, the customer stance is that Anthropic has strong acquisition and deployment signals but weak public retention evidence. [C008][C009][C013][C022][C023][C037]
    claimRefs:
      - C008
      - C009
      - C013
      - C022
      - C023
      - C037
