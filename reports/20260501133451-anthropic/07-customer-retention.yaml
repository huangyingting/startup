  title: Customer & Retention
  summary: |
    Anthropic shows strong customer-surface breadth and credible enterprise proof across software, legal, security, finance, and partner-led deployments. The strongest public customer anchors are company-claimed 500+ customers spending over $1 million annually, eight Fortune 10 customers, and 100000+ Bedrock customers, supplemented by case studies from Replit, Thomson Reuters, and eSentire. Retention, churn, NRR, and satisfaction metrics remain undisclosed, so customer durability is still weakly evidenced relative to adoption breadth. [C021][C022][C023][C024][C025][C026][C027][C036][C037][C044]
