sections:
  - number: '4.1'
    title: Revenue model overview
    body: |
      Anthropic’s revenue model is diversified across consumer subscriptions, seat-based work offerings, direct API consumption, partner-cloud distribution, and coding workflows rather than a single chatbot subscription. The strongest public evidence is list pricing for Pro, Max, and Team plans; published API spend tiers; cross-cloud distribution; and the company’s own claim that Claude Code already exceeds $2.5 billion in run-rate revenue. What remains missing is the actual revenue mix across those streams, net-of-partner revenue share, and average contract value by segment. [C008][C009][C011][C013][C031][C042][C044]
    claimRefs:
      - C008
      - C009
      - C011
      - C013
      - C031
      - C042
      - C044
  - number: '4.2'
    title: Reported metrics versus estimates
    body: |
      Reported observations and company claims need to be kept separate. Observed disclosures include Series E at $3.5 billion and Series G at $30 billion, as well as public plan pricing and AWS infrastructure commitments. Company-claimed operating metrics include $14 billion run-rate revenue in February 2026, $30 billion+ in April 2026, 500+ customers spending over $1 million annually, eight Fortune 10 customers, and Claude Code above $2.5 billion in run-rate revenue. No derived revenue estimates are necessary to conclude that Anthropic is operating at unusual scale; however, no audited public bridge reconciles these claims to recognized revenue, deferred revenue, or margin. [C011][C018][C019][C022][C023][C044][C046]
    claimRefs:
      - C011
      - C018
      - C019
      - C022
      - C023
      - C044
      - C046
  - number: '4.3'
    title: Unit economics assessment
    body: |
      Publicly retained evidence is insufficient to compute CAC, LTV, LTV/CAC, gross margin, contribution margin, or CAC payback. The public record reaches pricing, run-rate, enterprise-customer-count, and channel-breadth anchors, but it does not disclose sales efficiency, realized compute cost, support cost, retention curves, or cohort expansion. For diligence purposes, these metrics should be treated as null pending company data-room materials rather than estimated from top-line claims alone. [C011][C022][C023][C042][C046]
    claimRefs:
      - C011
      - C022
      - C023
      - C042
      - C046
  - number: '4.4'
    title: Margin trajectory and infrastructure economics
    body: |
      The evidence cuts both ways on margins. On one hand, Anthropic’s claimed revenue scale and multi-surface monetization suggest potential operating leverage. On the other hand, the company’s primary-cloud dependence on AWS and its disclosed $100 billion+ ten-year compute commitment indicate that infrastructure cost remains strategically central. Without gross margin disclosure, compute-utilization data, or channel take-rate details, the actual margin trajectory is unverified and should be treated as an open diligence question. [C009][C014][C022][C023][C046]
    claimRefs:
      - C009
      - C014
      - C022
      - C023
      - C046
  - number: '4.5'
    title: Scenario modeling and diligence asks
    body: |
      Forward financial scenarios are not defensible from retained public evidence alone. The minimum diligence package should include audited or board-approved historicals, revenue by stream and channel, gross margin by product line, sales-efficiency metrics, net retention by cohort, customer concentration, and a committed-versus-consumed compute schedule. Until then, the prudent financial stance is that Anthropic may be scaling exceptionally fast, but its unit economics and margin durability remain weakly evidenced relative to valuation. [C019][C022][C023][C046]
    claimRefs:
      - C019
      - C022
      - C023
      - C046
