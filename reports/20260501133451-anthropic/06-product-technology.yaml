  - id: T503
    title: Product roadmap, dependencies, and open technology diligence questions
    columns:
      - Topic
      - Reported state
      - Forward signal
      - Key diligence ask
    rows:
      - - Model roadmap
        - Current public lineup is Opus 4.7, Sonnet 4.6, and Haiku 4.5. [C012]
        - Release cadence implies continued tiered model refresh, but no public dated roadmap is retained.
        - Request next-12-month model roadmap, eval framework, and deployment criteria.
      - - Claude Code
        - Claude 4 marked general availability and multi-surface distribution. [C013]
        - Product appears to be an active monetization wedge. [C044]
        - Request usage, retention, enterprise attach, and cannibalization analysis.
      - - Vertical solutions
        - Financial-services packaging is public. [C036]
        - Could expand into more workflow-specific modules, but no broader roadmap is public.
        - Request vertical P&L, partner economics, and repeatability data.
      - - Cloud and infrastructure
        - AWS is primary; Google Cloud is also a provider; AWS commitment exceeds $100B over ten years. [C014][C015][C046]
        - Capacity access appears strong, but dependency risk rises with scale.
        - Request multi-cloud contingency plan, effective unit-cost curve, and vendor concentration limits.
      - - Governance and safety systems
        - Responsible Scaling Policy and compliance assets are public. [C028][C029]
        - Likely to remain central to enterprise productization and regulator engagement.
        - Request operational triggers, escalation logs, and impact on release velocity.
    notes: Where forward-looking roadmap detail is absent, the table preserves explicit diligence asks rather than inferred product plans.
    claimRefs:
      - C012
      - C013
      - C014
      - C015
      - C028
      - C029
      - C036
      - C044
      - C046
