company:
  name: Anthropic
chapter:
  number: 5
  title: Product & Technology
  summary: |
    Anthropic has evolved Claude from a single assistant into a multi-surface product platform spanning apps, coding workflows, direct APIs, cross-cloud deployment, vertical solutions, and governance rails. The retained evidence supports a strong product-platform thesis and meaningful technical distribution leverage, but the stack remains strategically dependent on partner clouds, especially AWS, and the public record does not expose full model-roadmap or infrastructure-operating detail. [C007][C009][C012][C013][C014][C015][C028][C029][C036][C041][C043][C046]
callouts:
  - type: key-insight
    title: Claude is now a platform, not just a chat application
    body: |
      Anthropic’s product surface includes Claude.ai across web and mobile, Claude Code, a broad direct API, and partner-cloud deployment through Bedrock, Vertex AI, and Foundry. [C007][C009][C013][C031][C041]
    claimRefs:
      - C007
      - C009
      - C013
      - C031
      - C041
  - type: key-insight
    title: Cross-cloud portability is an important architectural advantage
    body: |
      Anthropic distributes through AWS, Google Cloud, and Microsoft channels, and partner-platform docs support a near-identical Messages API pattern across direct and partner environments. [C009][C015][C016][C043]
    claimRefs:
      - C009
      - C015
      - C016
      - C043
  - type: opportunity
    title: Workflow-specific products are expanding the platform
    body: |
      Claude Code and packaged solutions such as Claude for Financial Services show product expansion from general chat into higher-value workflow automation. [C013][C036][C044]
    claimRefs:
      - C013
      - C036
      - C044
  - type: risk-alert
    title: Product strength is partly partner-mediated
    body: |
      AWS is Anthropic’s primary cloud and training partner, while Google Cloud and Microsoft channels expand reach; this strengthens distribution but creates infrastructure and channel dependence. [C014][C015][C045][C046]
    claimRefs:
      - C014
      - C015
      - C045
      - C046
