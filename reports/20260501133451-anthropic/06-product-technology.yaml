sections:
  - number: '5.1'
    title: Product platform overview
    body: |
      The central product conclusion is that Anthropic is now operating a platform, not a single assistant. Claude spans direct applications, commercial plan tiers, Claude Code, a broad developer API, and partner-cloud deployment. That breadth matters because it creates multiple entry points for users, developers, and enterprises while keeping the model family and governance posture relatively unified across surfaces. [C007][C008][C009][C013][C031][C041]
    claimRefs:
      - C007
      - C008
      - C009
      - C013
      - C031
      - C041
  - number: '5.2'
    title: AI automation, model stack, and architecture
    body: |
      The public technical stack supports more than chat completion. Anthropic documents a tiered model family, broad API primitives, and partner-environment portability that appears designed for agentic and stateful workflows. Claude Code further extends the platform into high-frequency developer automation, while the trust-and-governance layer is unusually visible for a frontier-AI vendor. [C012][C013][C028][C029][C041][C043]
    claimRefs:
      - C012
      - C013
      - C028
      - C029
      - C041
      - C043
  - number: '5.3'
    title: Roadmap and product expansion vectors
    body: |
      The retained roadmap signal points to continued expansion along three vectors: model-family refresh, workflow-specific surfaces such as Claude Code, and vertical packaging such as financial services. Cross-cloud deployment and SI partnerships suggest Anthropic is also optimizing for enterprise adoption paths rather than only for first-party app usage. The main limitation is that no detailed forward product roadmap, release criteria, or monetization-by-module plan is public. [C013][C015][C033][C036][C037][C045]
    claimRefs:
      - C013
      - C015
      - C033
      - C036
      - C037
      - C045
  - number: '5.4'
    title: Technology dependencies and diligence asks
    body: |
      Anthropic’s product strength is accompanied by clear dependency risk. AWS is the primary cloud and training partner, and the company has committed to more than $100 billion over ten years for AWS technologies. That may secure scarce capacity, but it also raises questions about vendor leverage, cost flexibility, and multi-cloud resilience. A serious technology diligence package should request architecture reviews, reliability metrics, model-eval systems, release-governance logs, and a contingency plan for cloud concentration. [C014][C028][C029][C046]
    claimRefs:
      - C014
      - C028
      - C029
      - C046
