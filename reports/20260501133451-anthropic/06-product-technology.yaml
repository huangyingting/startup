      - - Claude.ai applications
        - Claude is distributed across web, desktop, iOS, and Android. [C031]
        - Gives Anthropic a direct end-user surface for self-serve acquisition and usage data.
        - Observed.
      - - Commercial plan layer
        - Free, Pro, Max, Team, and Enterprise plans are publicly documented. [C008][C011]
