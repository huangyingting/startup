company:
  name: Exotec
chapter:
  order: 4
  number: 4
  title: Financials
  letter: I
  summary: >
    Exotec is a private, non-disclosing French robotics company that has raised $446M across five rounds, achieving a
    $2B valuation at its December 2021 Series D led by Goldman Sachs. Estimated 2024 revenue of $213–256M (third-party)
    reflects a hardware-heavy model with three streams: system hardware (primary), Deepsky WES software (subscription),
    and services/maintenance (recurring). North America order intake exceeded $100M in 2023, doubling year-over-year.
    The business is capital-intensive — hardware manufacturing in Croix, France creates CAPEX exposure — and margins are
    estimated at 30–50% gross, well below AutoStore's public benchmark of ~68%. Cash adequacy post-December 2021 ($335M
    raised) is likely 4–5 years, suggesting a potential fundraise in 2025–2026 if growth continues. No IPO timeline has
    been disclosed. The primary financial risk is the absence of audited financials and the wide uncertainty range
    around revenue, margin, and burn rate.
sections:
  - id: S01
    title: Revenue model and streams
    body: >
      Exotec's revenue model is structured around three streams that mirror the company's hardware-software-services
      full-stack positioning. The primary stream is system hardware — Skypod robots, rack infrastructure, workstations,
      Skypath conveyors, and Skypicker robotic arms — delivered as project-based capital sales. Hardware constitutes the
      largest share of each deal, with a typical project ranging from $5M to $50M+. Hardware revenue is recognized at
      delivery/installation completion, creating a lumpy recognition pattern tied to project milestones.


      The second stream is Deepsky WES software, licensed on a subscription or annual license basis. Deepsky
      orchestrates all warehouse hardware (including third-party devices) and integrates with customer ERP and WMS
      systems. As installed base grows, this stream compounds; 135+ sites create a minimum recurring base. The third
      stream is services and maintenance — installation services (one-time, per project), multi-year maintenance SLAs,
      and operator training. The 99%+ uptime guarantee is backed by contractual SLAs, which provide recurring service
      revenue tied to installed site count.


      Third-party revenue estimates place Exotec at $213–256M annually as of 2024. The company itself reported that
      revenue has tripled since 2020 and that $1B+ in systems have been sold in total. North America order intake
      exceeded $100M in 2023 and was doubling year-over-year from 2022. These data points, combined with 135+ sites and
      1M+ daily cycles, suggest annual revenue run-rate in the $200M–$300M range is plausible, though not independently
      verifiable.
    tableRefs:
      - TI001
      - TI004
    figureRefs:
      - FI001
      - FI004
  - id: S02
    title: Cost structure, margins, and capital intensity
    body: >
      Exotec's cost structure is hardware-dominated. Hardware manufacturing is concentrated in Croix, France
      (Hauts-de-France region), supported by French government industrial policy including Bpifrance backing. Hardware
      costs include robot fabrication, rack components, workstation assembly, and third-party procurement.
      Hardware-intensive warehouse robotics companies typically achieve gross margins of 30–50%, well below
      pure-software businesses. AutoStore's 68% gross margin (the primary public comparable) reflects a cube storage
      architecture with lower per-system hardware cost and a larger recurring software and maintenance base.


      Operating expenses are driven by headcount (1,300+ employees across engineering, sales, customer success, and
      manufacturing) and the aggressive North America expansion — 120 NA employees at end-2024, targeting 200+ by
      end-2025, with a 37K sq ft Atlanta headquarters expansion. Sales cycles for enterprise warehouse automation
      projects are typically 9–18 months, creating significant pre-close sales costs. Installation and commissioning on
      each new site carries project delivery risk.


      CAPEX intensity is elevated by hardware manufacturing. Unlike pure-software companies, Exotec must finance robot
      production before project payment — creating working capital exposure, particularly as project size scales. The
      $400M in pre-launch Next-Gen Skypod contracts (announced Feb 2025) implies significant forward hardware production
      commitments that must be financed before delivery.
    tableRefs:
      - TI002
      - TI005
    figureRefs:
      - FI002
  - id: S03
    title: Capital adequacy and financial verdict
    body: >
      Exotec's financing history: €2M seed (2016), Series A €15M/$17M (2019, Breega, 360 Capital, IRIS Capital), Series
      B €25M/$26M (2020, 83North), Series C €57M/$68M (early 2021, Goldman Sachs early), Series D $335M (Dec 2021,
      Goldman Sachs led, $2B valuation). Total: approximately $446M raised across five rounds. The Goldman Sachs
      relationship is central — both as investor and board member (Jim Resch) and potentially as future capital
      provider.


      Post-Series D timing: December 2021 to May 2026 represents approximately 4.4 years since the last funding event.
      At a hardware company with 1,300+ employees, Atlanta expansion, and $400M in forward Skypod contracts, monthly
      cash burn could range from $5M–$15M depending on the extent to which project revenues offset operating costs. If
      burn is $10M/month, $335M Series D provides 33 months — implying a potential funding gap by early 2025 unless
      project revenues are substantially cash-positive. The company has not publicly announced a new round; if growth is
      driving toward profitability, this is acceptable. If growth requires continued deficit spending, a new round or
      debt financing is likely needed by mid-2026.


      Financial verdict: Exotec has built a credible $200M+ revenue business with strong North American momentum, but
      the hardware-heavy model limits margin expansion without software/services growth. The absence of audited
      financials, the wide revenue estimate range ($213–256M with unknown confidence), and the uncertain cash position
      are the primary diligence blockers. AutoStore's superior margins (~68% vs. estimated 30–50%) represent the
      structural financial risk.
    tableRefs:
      - TI003
    figureRefs:
      - FI003
