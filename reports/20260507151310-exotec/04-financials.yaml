callouts:
  - id: KI001
    type: risk
    title: No audited financials and wide revenue estimate range ($213–256M) are the primary financial diligence blockers
    body: >-
      Exotec does not disclose revenue, gross margin, or cash position. Third-party estimates of $213–256M are plausible
      given 135+ sites and $1B+ in cumulative systems sold, but carry significant uncertainty. Without audited
      financials, it is impossible to confirm gross margin, burn rate, or funding runway — the three most critical
      inputs to a financial model.
    claimRefs:
      - CI013
      - CI014
      - CI015
    sourceRefs:
      - SI001
      - SI005
  - id: KI002
    type: strength
    title: North America order intake ($100M+, doubling YoY) validates revenue trajectory and geographic diversification
    body: >-
      The confirmed $100M+ NA order intake in 2023 (doubling year-over-year from 2022) provides the strongest public
      financial signal of Exotec's growth trajectory. Combined with the $400M in pre-launch Next-Gen Skypod contracts
      across 20+ projects, forward revenue visibility appears strong — if the company can execute on manufacturing and
      delivery at scale.
    claimRefs:
      - CI009
      - CI016
    sourceRefs:
      - SI004
      - SI003
