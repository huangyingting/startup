localEvidence:
  evidenceGaps:
    - type: data
      topic: Unicorn valuation evidence from on or after 2024-05-07
      missingEvidence: >-
        The $2B valuation was set in December 2021 (Series D). No subsequent financing round has been announced that
        would provide a post-2024-05-07 unicorn-confirming data point. The CNBC Disruptor 50 listing (2024) and
        operational milestone disclosures (1M+ daily cycles, Jan 2025) provide indirect evidence of continued unicorn
        status, but no new valuation round has been announced.
      whyItMatters: >-
        A 4+ year gap since the last valuation round means the $2B figure may not reflect current market conditions —
        warehouse automation market contracted 7–11% in 2024 and private market multiples have compressed.
      relatedQuestionRefs:
        - QO011
      severity: medium
    - type: financial
      topic: Revenue, gross margin, and unit economics
      missingEvidence: >-
        No official revenue, gross margin, burn rate, or per-installation profitability disclosure from Exotec.
        Third-party estimates conflict ($213M vs. $256M); NDA financials are required.
      whyItMatters: >-
        Hardware/software integration business models can have very different margin profiles — positive gross margins
        but negative EBITDA is common. Without actuals, the $2B valuation cannot be tested against fundamentals.
      relatedQuestionRefs:
        - QO004
        - QO015
      severity: high
    - type: governance
      topic: Cap table, preference stack, and board composition
      missingEvidence: >-
        Full cap table, liquidation preference stack, and complete board composition are not public. Only Goldman Sachs
        (Resch) and 83North (Goren) board seats are identified; founder equity and dilution are unknown.
      whyItMatters: >-
        Preference stack from $446M of preferred determines downside protection for new investors and return scenarios
        under partial liquidity.
      relatedQuestionRefs:
        - QO017
        - QO018
      severity: medium
    - type: people
      topic: CEO succession and leadership depth below co-founders
      missingEvidence: >-
        No succession plan or leadership depth documentation is public beyond the co-founder duo and one regional
        managing director.
      whyItMatters: >-
        Dual-founder concentration is a standard key-person risk for late-stage private companies approaching IPO or
        strategic M&A.
      relatedQuestionRefs:
        - QO019
      severity: medium
    - type: data
      topic: Leadership and founder table — complete C-suite below co-founders
      missingEvidence: >-
        Beyond Moulin (CEO), Heitz (CTO), Normand (NA MD), and the two investor board observers, no other senior
        executive names are publicly disclosed.
      whyItMatters: >-
        Board composition, CFO identity, and VP-level engineering leadership depth are required for executive risk
        assessment in pre-IPO diligence.
      relatedQuestionRefs:
        - QO006
      relatedTableRefs:
        - TO002
      severity: medium
    - type: data
      topic: Stakeholder or investor map — full cap table and Series A/B details
      missingEvidence: >-
        Pre-Series C rounds (Seed, Series A, Series B if any) are not publicly documented. Cap table ownership
        percentages, anti-dilution terms, and preference liquidation stack are not disclosed.
      whyItMatters: >-
        A $446M preferred stack creates significant liquidation overhang that shapes investor return scenarios at
        different exit valuations.
      relatedQuestionRefs:
        - QO017
        - QO018
      relatedTableRefs:
        - TO003
      severity: medium
    - type: data
      topic: Milestone table — pre-2020 milestones and specific contract dates
      missingEvidence: >-
        Pre-2020 milestones (Seed, Series A, first 10 customer contracts) and specific contract announcement dates for
        major brands are not publicly documented.
      whyItMatters: >-
        Detailed milestone history enables velocity analysis and growth-rate corroboration across the
        founding-to-unicorn arc.
      relatedQuestionRefs:
        - QO023
      relatedTableRefs:
        - TO004
      severity: low
