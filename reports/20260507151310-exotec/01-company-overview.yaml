company:
  name: Exotec
chapter:
  order: 1
  number: 1
  title: Company Overview
  letter: O
  summary: >
    Exotec is a French warehouse robotics unicorn founded in 2015 by Romain Moulin (CEO) and Renaud Heitz (CTO). The
    company's flagship Skypod system — autonomous mobile robots that climb 3D storage racks up to 14 meters — has been
    deployed at 135+ sites across 50+ global brands including Gap, Carrefour, Decathlon, and UNIQLO. Exotec raised a
    $335M Series D led by Goldman Sachs Asset Management in December 2021 at a $2B valuation, making it France's first
    robotics unicorn. With 1,300+ employees, 1M+ daily robot cycles, and North American order intake exceeding $100M in
    2023, Exotec is the highest-scale AMR-based AS/RS operator globally. Revenue is estimated at $213–256M but not
    officially disclosed. The February 2025 Next-Generation Skypod launch — with $400M in pre-launch contract wins —
    signals continued category leadership.
sections:
  - id: S01
    title: Identity and founding
    body: >
      Exotec SAS was incorporated on April 10, 2015 in Croix, France (metropolitan Lille), by engineers Romain Moulin
      and Renaud Heitz. Moulin, a robotics engineer and former Bon Angle co-founder, serves as CEO; Heitz, a deep
      software and embedded systems engineer, serves as CTO. The company is headquartered in Croix (Lille), France, with
      its North American headquarters established in Atlanta, Georgia in 2022. Additional offices are located in Munich
      (Germany) and Seoul (South Korea). The core mission is to enable elegant collaboration between human and robot
      workers to deliver lasting warehouse productivity through goods-to-person (G2P) automation.


      The company's first product, the Skypod system, was commercially launched circa 2017 and quickly differentiated by
      enabling autonomous robots to move in three dimensions — across aisles and up vertical racks — unlike earlier AMRs
      constrained to flat floor operations. This three-dimensional mobility is the central technical differentiation the
      company has built upon in all subsequent generations.
    tableRefs:
      - TO001
      - TO004
    figureRefs:
      - FO001
  - id: S02
    title: Funding history and valuation
    body: >
      Exotec has raised $446M in total funding across multiple rounds. Key rounds include a Series C of $90M in 2020
      (Breega lead, with 360 Capital, IRIS Capital, and Bpifrance) and a landmark Series D of $335M in December 2021 led
      by Goldman Sachs Asset Management, with participation from 83North and Dell Technologies Capital. The Series D set
      Exotec's post-money valuation at $2 billion — officially making it France's first robotics unicorn. No subsequent
      financing round has been publicly announced through the run date of this report (May 2026), meaning the $2B
      valuation is now over four years old.


      Goldman Sachs cited Exotec's "global presence and strong track record of success with industry-leading retailers
      and brands" as the key investment thesis. The company committed to deploying the capital across large-scale North
      American and Asian expansion and hiring 500 R&D engineers by 2025. Christian Resch (Goldman Sachs) and Gil Goren
      (83North) serve on the Exotec board. The Goldman Sachs Growth Equity arm specializes in late-stage private company
      investments, and its participation signals verified internal metrics beyond what is publicly disclosed.


      The absence of a follow-on financing round since December 2021 raises two competing interpretations: (a) Exotec
      may be operationally self-sustaining on Series D capital and not yet requiring new capital; or (b) market
      conditions (warehouse automation market contracted 7–11% in 2024 per AutoStore's annual report) may have made new
      rounds less attractive. Neither interpretation can be resolved without direct management disclosure. The French
      sovereign investment arm Bpifrance's co-investment in the Series C adds a strategic dimension — French tech policy
      has actively supported robotics unicorn formation — though it does not affect commercial fundamentals.
    tableRefs:
      - TO002
    figureRefs:
      - FO002
  - id: S03
    title: Scale, operations, and global footprint
    body: >
      As of January 2025, Exotec reports 1,300+ employees globally, 135+ customer sites, 50+ brands served, and 1M+
      daily robot cycles performed by its Skypod fleet. The 1M+ daily cycle milestone — each cycle processing up to four
      orders — was disclosed in 2024 alongside a 99%+ uptime commitment. The company has tripled global revenue since
      2020, passed $1B in total systems sold, and exceeded $100M in North American annual order intake in 2023 with US
      sales roughly doubling year-over-year since 2022.


      North American staff stood at 120 at year-end 2024, with a plan to exceed 200 by end-2025, primarily in hardware
      and software engineering. A second Atlanta location on Peachtree Street is being fitted out as a Skypod showroom
      and customer demonstration center. The company has also expanded to Munich and Seoul to support European and APAC
      customer bases. Regional industry intelligence confirms Exotec is entering new markets including Austria and South
      Korea in 2024-2025.


      The February 2025 Next-Generation Skypod launch disclosed $400M in pre-commercial-launch contract wins across 20+
      stealth-mode projects globally, validating the product-market fit before commercial announcement. Named Next-Gen
      customers include Oxford Industries (Tommy Bahama, Lilly Pulitzer, Southern Tide), W.W. Grainger (US industrial
      distribution), and E.Leclerc (French grocery). Customer CEO Maxence Maurice of E.Leclerc Seclin noted that
      Exotec's solution reduced customer journey time from 10–15 minutes to under five minutes — a concrete throughput
      metric that competitors have not publicly matched. Exotec's goods-to-person productivity advantage of 5x over
      manual picking is stated in marketing materials and corroborated by the E.Leclerc and Decathlon Canada
      testimonials. These named customer outcomes position Exotec as a credible AS/RS leader across retail, grocery,
      apparel, and industrial distribution verticals.
    tableRefs:
      - TO003
    figureRefs:
      - FO003
