  title: Market Analysis
  letter: M
  summary: >
    The global warehouse automation market was valued at $26.5B in 2024 and is projected to grow at 15.9% CAGR through
    2034 (GM Insights). Exotec competes specifically in the Automated Storage & Retrieval Systems (AS/RS) segment, which
    held 26.3% of the market in 2024, and more broadly in the goods-to-person (G2P) mobile robot category (41.36%
    share). Structural tailwinds include e-commerce growth, labor shortages in logistics, delivery speed requirements,
    and ESG-driven efficiency mandates. The North American market represents 35.51% of total spending, and Asia-Pacific
    is the fastest-growing region at 15.91% CAGR. Exotec's TAM for Skypod is mid-market and enterprise warehouses in
    retail, grocery, apparel, and 3PL — estimated at $8–12B. The 2024 market contracted 7–11% (per AutoStore annual
    report), creating a near-term headwind, but demand is rebounding in 2025 with modular AS/RS and AI-driven
    orchestration as key growth vectors.
sections:
  - id: S01
    title: Market definition and size
    body: >
      The relevant market for Exotec is warehouse automation — specifically the goods-to-person (G2P) segment of
      Automated Storage and Retrieval Systems (AS/RS), which is a subset of the broader warehouse automation industry.
      The global warehouse automation market was valued at $26.5B in 2024 (GM Insights) and $29.98B in 2025 (Mordor
      Intelligence), with a projected CAGR of 13.98–15.9% depending on source. By 2031, Mordor projects the market will
      reach $65.74B; GM Insights projects $119B by 2034 at 15.9% CAGR. Hardware holds 55.12% of the market, while
      software is the fastest-growing segment at 14.87% CAGR through 2031.


      Within this market, AS/RS systems held 26.3% share in 2024, and mobile robots (AMRs/ACRs including Exotec's
      Skypod) held 41.36% of the warehouse automation market share in 2025. The G2P sub-segment — where Exotec competes
      most directly with AutoStore, Hai Robotics, and SSI Schaefer — is estimated at $8–12B addressable market for
      mid-market to enterprise sites globally. Retail and e-commerce represent 28.41% of total warehouse automation
      spending (2025), the largest single vertical. Pharmaceuticals/healthcare is the fastest-growing vertical at 14.73%
      CAGR. Third-party logistics (3PL) providers represent 38.96% of the customer base.


      North America commands 35.51% of total market spending and is the largest single region. Asia-Pacific is the
      fastest-growing at 15.91% CAGR through 2031. Europe, where Exotec was founded and retains strong market presence,
      represents approximately 25–30% of global spending.
    tableRefs:
      - TM001
      - TM004
    figureRefs:
      - FM001
      - FM004
  - id: S02
    title: Structural growth drivers and headwinds
    body: >
      The primary structural drivers for warehouse automation are: (1) persistent labor shortages in logistics and
      e-commerce fulfillment, where Exotec's systems reduce manual pick-travel by 5x; (2) rising urban last-mile
      delivery speed expectations (same-day, next-day standard in e-commerce); (3) subscription-based robotics models
      (RaaS) that convert CAPEX into OPEX, enabling mid-tier firms to deploy automation previously requiring
      investment-grade credit; (4) energy-efficiency regulations in Europe and North America bundling automation with
      sustainability requirements; and (5) supply chain resilience investments post-COVID. Each of these drivers is
      structural rather than cyclical, supporting long-term market growth.


      The most significant headwind is the 7–11% warehouse automation market contraction in 2024, documented in
      AutoStore's public annual report. This contraction reflects post-COVID inventory normalization among e-commerce
      players and capital cost sensitivity from higher interest rates. AutoStore, the most comparable public company,
      experienced this as a cyclical correction and explicitly forecast market recovery in 2025. For Exotec, the 2024
      market contraction is an important consideration: the company's unverified revenue estimates ($213–256M) may
      reflect a slower 2024 growth rate than the 2x+ annual pace seen in 2022–2023. However, the Next-Gen Skypod's
      February 2025 launch with $400M in pre-launch contracts — booked during the 2024 contraction period — suggests
      Exotec successfully won market share even in a down market.
    tableRefs:
      - TM002
    figureRefs:
      - FM002
  - id: S03
    title: Segment analysis and buyer map
    body: >
      Exotec's primary customer segments are: (1) retail and apparel (Gap, UNIQLO, Decathlon, Oxford Industries) — the
      largest segment by installation count; (2) grocery and food service (Carrefour, E.Leclerc, Cdiscount) — growing
      rapidly due to drive-through grocery fulfillment adoption in Europe; (3) industrial distribution and 3PL
      (Grainger, Geodis) — US-led, often requiring high SKU count handling; and (4) pharmaceuticals and healthcare — a
      nascent segment with high regulatory requirements.


      The typical Exotec buyer is a VP or Director of Supply Chain, Logistics, or Operations at a mid-to-large retailer
      or distributor with 2+ distribution centers and annual revenue of $500M+. Decision cycles are 12–24 months,
      project values of $5–50M+, and 5–10 year system lifetimes. Integration with existing WMS and ERP systems is a key
      evaluator criterion. The shift to modular AS/RS means buyers increasingly prefer systems that can be installed in
      existing facilities without full greenfield builds — Exotec's non-cube racking architecture offers this
      flexibility.


      The buyer map differentiates between direct customers (enterprises deploying Skypod in their own DCs) and channel
      partners (system integrators like E80 Group who bundle Exotec with conveyor and sorter systems). The channel
      partner route, while margin-dilutive, accelerates market penetration without Exotec needing to build full
      direct-sales infrastructure in every geography.
    tableRefs:
      - TM003
    figureRefs:
      - FM003
