callouts:
  - id: KM001
    type: strength
    title: Structural tailwinds are secular not cyclical — labor shortage drives 5x ROI
    body: >-
      The labor shortage in logistics is structural: US warehouse worker availability has not recovered to pre-pandemic
      levels, and Europe faces similar constraints. Exotec's 5x pick productivity improvement creates a compelling ROI
      argument that survives interest rate cycles and market slowdowns.
    claimRefs:
      - CM008
      - CM009
    sourceRefs:
      - SM002
      - SM007
  - id: KM002
    type: risk
    title: 2024 market contraction (-7–11%) is a near-term headwind for Exotec's revenue trajectory
    body: >-
      AutoStore's public filing confirms a 7–11% warehouse automation market contraction in 2024. This is an adverse
      signal: Exotec's unverified revenue estimates ($213M–$256M) may not reflect the expected 2x+ growth trajectory
      advertised in North America. Recovery is expected in 2025, but the 2024 dip adds uncertainty to growth
      projections.
    claimRefs:
      - CM010
      - CM011
    sourceRefs:
      - SM009
      - SM010
localEvidence:
  evidenceGaps:
    - type: data
      topic: TAM/SAM/SOM granularity for G2P AS/RS sub-segment
      missingEvidence: >-
        No independent market research report specifically sizes the G2P AS/RS sub-segment with Exotec as a named
        reference point. Market research reports (Mordor, GM Insights) cover broader warehouse automation. G2P
        sub-segment sizing of $8–12B is derived from applying segmentation ratios to total market, not from proprietary
        research.
      whyItMatters: >-
        Exotec's serviceable market is more limited than total warehouse automation — overestimating SAM inflates
        investment thesis.
      relatedQuestionRefs:
        - QM015
      severity: medium
    - type: data
      topic: Exotec's actual revenue and market share within G2P AS/RS
      missingEvidence: >-
        Exotec has not disclosed revenue, installed capacity revenue, or market share. Third-party estimates ($213–256M)
        conflict and cannot be reconciled without NDA financials.
      whyItMatters: >-
        Market share within the G2P AS/RS sub-segment is the most important competitive metric — without it, competitive
        positioning is inferred from deployments not revenue.
      relatedQuestionRefs:
        - QM018
        - QM020
      severity: high
