  topStrengths:
    - >-
      3D rack-climbing AMR architecture (Skypod) is hardware-defensible: no equivalent independent competitor at 135+
      deployed sites globally.
    - >-
      Next-Gen Skypod $400M pre-launch backlog from 20+ projects (Grainger, Oxford Industries/NYSE:OXM, E.Leclerc)
      provides 1.5–2 years forward revenue visibility.
    - Deepsky WES SaaS layer adds recurring revenue potential and margin improvement trajectory as installed base grows.
    - >-
      CNBC Disruptor 50 for 3 consecutive years (2022–2024) signals sustained market recognition; E.Leclerc CEO and
      Decathlon VP Ops quotes provide direct named-customer proof.
    - >-
      North America revenue doubling YoY since 2022 entry with $100M+ 2023 order intake provides credible TAM expansion
      evidence.
  topRisks:
    - >-
      Single-factory manufacturing at Croix, France: no backup production site or contract manufacturer disclosed —
      $400M Next-Gen backlog fully exposed to any plant disruption.
    - >-
      4+ year funding gap since Series D (Dec 2021): capital adequacy unconfirmed; estimated burn rate suggests
      potential capital need by mid-2026 without audited financials.
    - >-
      Goldman Sachs Growth Equity fund lifecycle (2021 vintage) creates exit pressure by 2026–2028 — risk of forced IPO
      or secondary at valuations below 2021 price.
    - >-
      EU Machinery Regulation 2023/1230 (Jan 2027), EU NIS2 (Oct 2024), and EU AI Act (Aug 2026) create compounding
      regulatory compliance costs and timelines.
    - >-
      Hardware-heavy gross margin (~30–50% estimated vs. AutoStore 68%) creates structural R&D investment gap limiting
      Exotec's competitive response capacity.
  unresolvedGaps:
    - >-
      Audited financials (revenue, gross margin, EBITDA, cash position) not publicly available — all financial estimates
      are unaudited third-party data.
    - >-
      Next-Gen Skypod customer acceptance performance data (throughput proof at volume) not yet available — 50%
      improvement claim is unverified in production.
    - >-
      Deepsky WES SaaS ARR, NRR, and contract terms not disclosed — the SaaS valuation premium is entirely speculative
      without this data.
    - >-
      Manufacturing capacity (Croix factory output/year), contract manufacturer arrangements, and supply chain backup
      not disclosed.
    - Cap table, Goldman Sachs fund maturity timeline, and liquidation preference stack not public.
