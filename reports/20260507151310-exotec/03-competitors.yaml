      whyItMatters: >-
        If Hai Robotics is pricing Skypod-comparable systems at 30–40% lower CAPEX, this is a significant threat to
        Exotec's mid-market pipeline in North America.
      relatedQuestionRefs:
        - QP011
      severity: medium
    - type: no-public-evidence
      topic: Exotec's win/loss rate vs. AutoStore and Hai Robotics in active pipeline
      missingEvidence: >-
        No win/loss data or competitive win rate is publicly available for Exotec vs. primary competitors. Sales cycle
        duration, deal loss reasons, and pricing competitiveness in head-to-head evaluations are not disclosed.
      whyItMatters: >-
        Win/loss data is the most direct indicator of competitive strength. Without it, moat durability claims rest on
        product comparisons rather than live market outcomes.
      relatedQuestionRefs:
        - QP021
      severity: high
