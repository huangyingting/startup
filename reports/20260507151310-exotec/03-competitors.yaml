callouts:
  - id: KP001
    type: strength
    title: Retrofit-first architecture and multichannel capability are structural moats AutoStore cannot easily replicate
    body: >-
      AutoStore's cube grid requires facility-level design changes for optimal deployment; Exotec's rack-based 3D system
      can be installed in existing buildings with standard racking. Next-Gen Skypod's each+case picking (Feb 2025)
      addresses a multichannel need that AutoStore's system does not natively serve — this moat is durable for 2–3 years
      until competitors can replicate.
    claimRefs:
      - CP004
      - CP005
      - CP011
    sourceRefs:
      - SP002
      - SP005
  - id: KP002
    type: risk
    title: AutoStore's superior margins and public capital access are durable competitive advantages
    body: >-
      AutoStore's ~68% gross margin (confirmed public filing) vs. Exotec's estimated 30–50% margin (hardware-heavy)
      means AutoStore can reinvest proportionally more into R&D and withstand deeper price discounts. As a public
      company, AutoStore can raise equity capital at any time — giving it a structural funding advantage over Exotec's
      last-round-in-2021 situation. This margin and capital gap will only widen as AutoStore scales.
    claimRefs:
      - CP001
      - CP006
      - CP009
    sourceRefs:
      - SP001
      - SP003
