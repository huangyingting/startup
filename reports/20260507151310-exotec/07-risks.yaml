company:
  name: Exotec
chapter:
  order: 7
  number: 7
  title: "Risks"
  letter: R
  summary: |
    Exotec faces a multi-dimensional risk profile centered on five areas: (1) Regulatory/legal — EU Machinery Regulation 2023/1230 requires Next-Gen Skypod re-certification by 2027; EU NIS2 and IEC 62443 create new cybersecurity obligations for Deepsky WES; EU AI Act (Annex III) may classify warehouse AI systems as high-risk; GDPR obligations for operational data are unconfirmed; (2) Operational — single-factory manufacturing in France creates supply chain concentration; Next-Gen Skypod ramp delivery risk for $400M backlog; (3) Partner/dependency — Goldman Sachs board control; manufacturing component supplier concentration; Oracle/SAP API dependencies; (4) People/execution — key-person risk (Moulin CEO, Heitz CTO); aggressive NA hiring to 200+ employees creates quality risk; (5) Financial/model — hardware-heavy margin gap vs. AutoStore (68%); 4+ year funding gap since Series D; market contraction 7–11% in 2024. The most severe risks are the combination of delivery risk on the $400M Next-Gen backlog and the absence of audited financials to validate capital adequacy.

sections:
  - id: S01
    title: "Regulatory, legal, and IP risk"
    body: |
      Exotec's most concrete regulatory risk is the EU Machinery Regulation 2023/1230, which replaces the Machinery Directive 2006/42/EC and has a mandatory transition date of January 2027. The new regulation strengthens requirements for mobile autonomous robots (specifically covering collaborative and autonomous systems) and requires updated conformity assessments. Exotec's existing Gen 1 Skypod fleet was CE-marked under the old directive. The Next-Gen Skypod (Feb 2025 launch) will need conformity assessment under the new regulation before the 2027 cutover — creating a compliance clock for the $400M in pre-launch contracts. Failure to achieve conformity on schedule could delay delivery of contracted Next-Gen systems in the EU, Exotec's largest market.

      The EU NIS2 Directive (effective October 2024) expands cybersecurity obligations to "essential" and "important" entities including logistics and manufacturing operators. Exotec's Deepsky WES, operating at the OT/IT boundary of customer warehouses, may create obligations for both Exotec (as a technology provider) and its customers (as essential entities). IEC 62443 compliance for WES software is not publicly confirmed. The EU AI Act (Regulation 2024/1689, effective August 2026) creates a high-risk classification for AI systems used in critical infrastructure operations — warehouse orchestration AI (Deepsky's dispatch and optimization algorithms) may qualify under Annex III, triggering mandatory conformity assessment, technical documentation, and risk management requirements.

      On IP/legal risk: AutoStore and Ocado engaged in multi-year patent litigation over grid-bot technology — a precedent that Exotec's 3D rack-climbing architecture could face from competitors if Exotec's EU patent portfolio is challenged. Exotec has filed patents at EPO for core Skypod mechanics, but the depth and geographic coverage of the patent portfolio is not publicly disclosed. French IP protection is strong within the EU but limited outside it without PCT/national filings.

  - id: S02
    title: "Operational, partner, and people risk"
    body: |
      The single most concentrated operational risk is Exotec's single-factory manufacturing site in Croix, France. A fire, labor action (France has a history of manufacturing strikes), or supply chain disruption at the Croix facility would halt all new robot production. This is especially critical given the $400M in Next-Gen Skypod contracts requiring hardware manufacturing at scale. No public disclosure of a contract manufacturing backup or second production site has been made. Component supply chain risk also applies: robot drive motors, LiDAR sensors, and wheel assemblies sourced from European and Asian suppliers are subject to tariff risk (US-China trade tensions, EU import duties) and availability risk (chip supply).

      Partner/dependency risk centers on two counterparties: Goldman Sachs (board seat + primary capital provider; Goldman's decisions on next-round terms or exit timing materially affect Exotec's strategic options) and customer ERP/WMS vendors (SAP, Oracle, Manhattan Associates). Deepsky's value is locked to API compatibility with these enterprise systems — a breaking API change or license dispute with any of these vendors could require costly re-engineering. The Goldman Sachs board seat creates a potential conflict if Goldman's exit timing (IPO or sale) diverges from Exotec founders' strategic preference.

      People risk is elevated by two factors: (1) Key-person dependency on co-founders Romain Moulin (CEO, product/commercial) and Renaud Heitz (CTO, technology/engineering). Exotec's differentiated architecture is deeply tied to Heitz's engineering vision; a CTO departure would create R&D continuity risk. (2) The aggressive North America hiring plan (120→200+ employees in 2025) creates quality risk — fast hiring in a new geography typically creates cultural integration challenges, inconsistent customer delivery quality, and elevated early-attrition rates that can damage NA customer relationships at a critical growth stage.

  - id: S03
    title: "Financial and market risk"
    body: |
      Exotec's financial risk profile is dominated by three factors: (1) Hardware-heavy margin gap — estimated 30–50% gross margin vs. AutoStore's public 68%, creating a structural cost-of-capital and R&D investment disadvantage that compounds over time; (2) Funding gap — 4+ years since Series D (Dec 2021, $335M), with no publicly announced Series E or credit facility. Monthly burn estimated at $5M–$15M implies potential capital need by mid-2026 depending on revenue cash positivity; (3) Market contraction — warehouse automation market contracted 7–11% in 2024 (per AutoStore 2024 Annual Report), indicating that enterprise capex budgets tightened and pipeline conversion rates slowed.

      The $400M Next-Gen Skypod backlog provides strong forward revenue visibility but also creates working capital risk: hardware must be manufactured before project payment is received, and any delivery delays create both revenue recognition delays and customer relationship risk. If Exotec cannot scale the Croix manufacturing facility to meet $400M in hardware demand without capital investment, the backlog could create a negative-cash-flow period requiring bridge financing.

      Key thesis-break risks: (1) Next-Gen Skypod fails to deliver promised 50% throughput improvement at volume — would turn Oxford Industries and Grainger from positive to adverse references and destroy NA sales momentum; (2) A significant cyberattack on a Deepsky WES deployment would damage Exotec's reputation and trigger NIS2/IEC 62443 enforcement; (3) Goldman Sachs forces a sale or IPO at a valuation below the $2B Series D, creating equity dilution or strategic disruption.

