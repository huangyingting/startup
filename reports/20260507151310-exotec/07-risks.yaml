callouts:
  - id: KR001
    type: risk
    title: "Single-factory manufacturing in France is the highest-severity unmitigated risk given the $400M Next-Gen Skypod backlog"
    body: "Exotec's entire hardware production is concentrated at a single facility in Croix, France. No backup manufacturing site or contract manufacturer has been publicly announced. A plant disruption exceeding 2 weeks would halt all new robot production, delay $400M in contracted Next-Gen Skypod systems, and trigger customer penalty clauses. This is the single highest-severity risk with the lowest disclosed mitigation maturity — and it scales with the backlog size."
    claimRefs: [CR006, CR010, CR019]
    sourceRefs: [SR006, SR007]

  - id: KR002
    type: risk
    title: "EU AI Act and NIS2 create compounding regulatory risk for Deepsky WES with no confirmed compliance path"
    body: "Deepsky WES sits at the OT/IT boundary of critical logistics infrastructure. EU NIS2 (effective Oct 2024) creates cybersecurity compliance obligations; EU AI Act Annex III (effective Aug 2026) may classify Deepsky's warehouse AI as high-risk. Neither IEC 62443 nor SOC 2 Type II certifications are publicly confirmed. Both obligations converge before Exotec's likely next fundraise window — creating a regulatory risk that investors will need to assess in any Series E diligence."
    claimRefs: [CR002, CR003, CR004]
    sourceRefs: [SR002, SR003]

