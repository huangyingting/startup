chapter:
  order: 5
  number: 5
  title: "Product & Technology"
  letter: E
  summary: |
    Exotec's product system comprises four hardware modules and one software platform: Skypod (3D AMR robots that climb racks to 14m at 4 m/s), Skypath (conveyor integration), Skypicker (robotic arm, 600 items/hr), a physical rack/workstation infrastructure, and Deepsky WES (Warehouse Execution System) that orchestrates all hardware layers. The Next-Gen Skypod (Feb 2025) delivers 50% throughput improvement and 30% density increase, with each+case picking in a single system — a differentiated capability vs. all major competitors. The technology architecture is an autonomous multi-robot coordination system with 4-wheel drive robots, regenerative braking, and 5-minute autonomous self-charging per hour. Manufacturing is concentrated in Croix, France. Deepsky integrates with customer ERP/WMS systems via API, creating software lock-in. Key technical risks are supply chain concentration in French manufacturing, dependence on a limited set of robot component suppliers, and no disclosed security/cyber certifications for the Deepsky software platform.

sections:
  - id: S01
    title: "Product modules and customer workflow"
    body: |
      Exotec's full product system is designed to automate goods-to-person (G2P) order fulfillment workflows in distribution centers. The core customer workflow begins with an inbound order from an ERP or WMS system. Deepsky WES receives the order, identifies the storage location of the required SKU, and dispatches one or more Skypod robots. Each robot navigates the rack structure in three dimensions — traveling horizontally along rack aisles, then climbing vertically to the target storage level (up to 14m height). The robot retrieves a storage tote, descends, and transports it to one of the workstation ports. The operator (or Skypicker robotic arm) picks the required item(s) from the tote, which is then returned to storage by another robot. Deepsky orchestrates all movements to minimize robot travel time, optimize storage density, and prevent collisions among the fleet.

      The Skypicker robotic arm (600 items/hr) automates the picker station, enabling 24/7 operation without human intervention. For facilities with multi-location inventory or longer travel distances, Skypath conveyor integration moves totes between zones without robot redeployment. The complete system — Skypod robots + Skypicker arm + Skypath conveyors + Deepsky WES — offers full-warehouse automation from inbound order to picked item, with a single vendor relationship and single software orchestration layer.

      The Next-Gen Skypod (announced Feb 2025) upgrades the core robot with 50% throughput improvement at the workstation and 30% storage density increase. It supports both each-picking and case-picking in a single system — a differentiator vs. AutoStore (each-only typical) and Hai Robotics (primarily each). Named Next-Gen customers include Oxford Industries (Tommy Bahama, Lilly Pulitzer), Grainger, and E.Leclerc, with $400M in pre-launch contracts across 20+ projects.

  - id: S02
    title: "Technology architecture and engineering differentiation"
    body: |
      Skypod robots operate on a four-wheel drive (4WD) architecture with independent wheel control, enabling precise directional control in tight rack aisles. The robots move at up to 4 m/s (13.1 ft/s) horizontally — among the fastest AMR speeds in the G2P market. Vertical climbing is enabled by the rack structure's guide rails, which the robot's drive system engages when transitioning to vertical movement. This 3D mobility architecture (horizontal + vertical in a single robot) is Exotec's core mechanical differentiation vs. AutoStore (top-of-grid only) and mini-load cranes (vertical only). The robots incorporate regenerative braking — kinetic energy from deceleration is converted to electrical energy, reducing net energy consumption. Autonomous self-charging takes approximately 5 minutes per hour, requiring no manual intervention; robots return to charging stations during low-demand periods without operator action.

      Deepsky WES is the software orchestration layer. It runs as an enterprise software platform, integrating with the customer's ERP (SAP, Oracle) and WMS (Manhattan Associates, Blue Yonder, JDA) via API. Deepsky handles robot dispatching, storage slot assignment, traffic management, predictive maintenance alerts, and performance KPI reporting. The software is designed to orchestrate not just Exotec's own hardware but also third-party devices (conveyors, sorters, third-party robots), positioning Exotec as a software-neutral warehouse orchestration platform. Deepsky runs on-premises (customer edge infrastructure) or in a hybrid cloud configuration.

      Manufacturing is concentrated in Croix, France (Hauts-de-France), supported by regional industrial policy and Bpifrance backing. Key robot components include drive motors, wheel assemblies, sensors (LiDAR, proximity), and charging interfaces — sourced from European and Asian suppliers. The Skypiker robotic arm uses computer vision for item identification and pick planning, with a machine learning model trained on customer SKU data.

  - id: S03
    title: "Reliability, roadmap, and technical risk assessment"
    body: |
      Exotec's most credible technical proof point is operational: 1M+ daily cycles across 135+ production sites with 99%+ uptime globally. This is a demonstrated, production-scale reliability claim — not a lab benchmark. The 99%+ uptime is backed by contractual SLAs, creating financial accountability. Predictive maintenance through Deepsky's real-time monitoring (robot health telemetry, charge state, motor wear) enables proactive service before failure. Exotec's customer success and support team provides 24/7 remote monitoring and dispatches field technicians for hardware issues.

      The Next-Gen Skypod roadmap (Feb 2025 launch) represents the most significant technical upgrade in Exotec's history. Key improvements: 50% workstation throughput improvement, 30% storage density increase, each+case picking in a single robot cycle. The $400M in pre-launch contracts from 20+ projects validates customer confidence in the new generation before commercial launch. Named customers (Oxford Industries, Grainger, E.Leclerc) represent cross-vertical adoption (apparel, industrial distribution, grocery).

      Key technical risks: (1) Manufacturing concentration — single production site in France creates supply chain risk; a plant disruption affects all new system deliveries. (2) Component supply chain — motor and sensor suppliers concentrated in Europe/Asia; chip supply disruptions post-2021 affected hardware robotics companies broadly. (3) Deepsky security — no publicly disclosed SOC 2, ISO 27001, or IEC 62443 certification for the WES software platform; enterprise customers (Grainger, Oxford Industries) may require these certifications before deployment. (4) Skypicker machine learning — CV-based picking relies on SKU training data; performance degradation in mixed-SKU or high-SKU-count environments not publicly characterized.

