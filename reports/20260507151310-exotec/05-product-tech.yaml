    type: strength
    title: "1M+ daily cycles at 135+ production sites provides the strongest reliability proof in the G2P AMR market"
    body: "Exotec's 99%+ uptime at production scale (1M+ cycles/day) is not a lab benchmark — it is a live operational metric backed by contractual SLAs across 135+ enterprise sites. This is the single most powerful technical proof point: at 4 m/s robot speed with autonomous charging, this scale of reliable operation at multi-robot fleets demonstrates engineering maturity that newer competitors cannot replicate."
    claimRefs: [CE003, CE016]
    sourceRefs: [SE002, SE004]

  - id: KE002
    type: risk
    title: "Deepsky WES lacks publicly confirmed SOC 2 / ISO 27001 certifications — a gap enterprise customers will close before deployment"
    body: "Exotec's Deepsky WES software handles live warehouse operational data (inventory, order details, throughput KPIs) and integrates with customer ERP/WMS. Enterprise customers like Grainger (publicly traded, US) and Oxford Industries (NYSE) operate under strict IT security governance. The absence of publicly confirmed SOC 2 Type II or ISO 27001 certifications is a diligence gap that could delay enterprise sales or require costly certification work."
    claimRefs: [CE010, CE011, CE012]
    sourceRefs: [SE008, SE009]

