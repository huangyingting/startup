      - number: '3.3'
        title: 竞争定位与护城河评估
        blocks:
          - type: paragraph
            body: >
              Exotec 的主要竞争护城河有五点：（1）三维机器人机动性——Skypod 机器人可爬到 14m 高度，而 AutoStore
              只能在网格顶部运行，因此能在不规则建筑中利用更高垂直存储；（2）改造优先架构，可安装进既有仓库建筑，不要求专门设施设计；（3）全栈集成（Skypod 硬件 + Deepsky WES 软件 + Skypath
              输送线 + Skypicker 机械臂），形成单一供应商关系；（4）135+ 站点的 99%+ 正常运行时间和每天 1M+ 循环，提供可作为客户背书的运营验证；（5）切换成本——Exotec Skypod
              系统一旦安装，就成为仓库运营骨干，Deepsky WES 深度接入客户 ERP 和 WMS，形成多年锁定。


              护城河的核心担忧在于，AutoStore 的立方体系统在优化建筑中存储密度更高；AutoStore 约 68% 毛利率对比 Exotec 估计 30–50%（硬件占重），意味着 AutoStore 能持续投入更多
              R&D，并在竞争性评估中给出更深折扣。Hai Robotics 更低的 CAPEX 会在价格敏感的中端账户中压低 Exotec。到 2025 年，AutoStore 和 Hai Robotics
              都尚未在单一系统中匹配 Exotec 的多渠道（件拣 + 箱拣）能力——Next-Gen Skypod 护城河强化了这一优势。


              Exotec 的北美竞争策略（自 2022 年以来销售额每年翻倍、Atlanta 总部扩张 37K sq ft、目标 2025 年底北美员工 200+ 人）直接挑战 AutoStore
              的北美市场份额。锁定机制包括：Deepsky WES 软件订阅（经常性）；在既有建筑壳体内完成实体安装（拆除成本高）；操作员熟悉 Exotec 系统；以及客户成功 SLA
              带来的持续关系深度。关键不确定性在于：北美招聘提速后，Exotec 能否在规模化下维持安装质量和客户支持质量。
