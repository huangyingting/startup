      - number: '3.2'
        title: 传统集成商与市场动态
        blocks:
          - type: paragraph
            body: >
              传统 AS/RS 集成商——SSI Schaefer、Swisslog（KUKA 子公司）、Dematic（KION）、Vanderlande（Toyota
              子公司）——都是规模大、历史长的自动化系统集成商，产品组合覆盖基于堆垛机的 AS/RS、穿梭车系统、输送线和分拣机。这些公司年收入
              $1B–$3B+，在制造和分销客户中积累了数十年关系。它们的竞争优势在项目管理深度，以及能在单一合同下交付包括所有附属系统在内的完整仓储自动化项目。相对 Exotec 的劣势在创新速度：基于堆垛机和穿梭车的
              AS/RS 升级更慢，安装比模块化 AMR 系统更吃资本。


              2024–2025 年市场结构正在分化：大型新建项目（>$50M）通常流向具备全项目管理能力的传统集成商；中端项目（$5–30M）越来越流向 Exotec 和 AutoStore 这类模块化 AMR
              供应商。Exotec 把自己定位为「端到端仓库解决方案提供商」（2023–2025 年加入 Skypath 输送线和 Skypicker
              机械臂），本质上是在向传统集成商腹地上移：无需单独集成商伙伴，也能提供全仓自动化。


              关键风险：传统集成商（尤其是 Dematic 和 SSI Schaefer）推出自有 AMR 产品并与 AMR 供应商合作后，Exotec 可能与 E80 Group 伙伴关系及类似安排发生渠道冲突。SSI
              Schaefer 于 2022 年收购 Geek+ 股权，作为整合 AMR 能力的战略动作。KION（Dematic 母公司）还运营 Linde MH
              品牌，并在主动把车队管理软件与模块化机器人整合——这种融合路径会在 3–5 年内削弱 Exotec 的中端市场差异化。
