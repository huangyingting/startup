  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品模块与客户工作流
        blocks:
          - type: paragraph
            body: >
              Exotec 的完整产品系统面向配送中心，自动化货到人（G2P）订单履约流程。核心客户工作流从 ERP 或 WMS 系统发出的入站订单开始。Deepsky WES 接收订单，识别所需 SKU
              的存储位置，并调度一台或多台 Skypod 机器人。每台机器人在货架结构中三维导航——先沿货架巷道水平行进，再垂直爬升到目标存储层（最高 14m）。机器人取出存储料箱，下降，并把料箱运到某个工作站端口。操作员（或
              Skypicker 机械臂）从料箱中拣出所需物品，随后另一台机器人把料箱送回存储位。Deepsky 编排所有运动，尽量减少机器人行程、优化存储密度，并防止机队碰撞。


              Skypicker 机械臂（600 件 / 小时）自动化拣选站，使设施可在无人干预下 24/7 运行。对多地点库存或更长运输距离的设施，Skypath
              输送线集成可在不同区域之间移动料箱，无需重新部署机器人。完整系统——Skypod 机器人 + Skypicker 机械臂 + Skypath 输送线 + Deepsky
              WES——从入站订单到已拣选物品提供全仓自动化，且由单一供应商关系和单一软件编排层支撑。


              Next-Gen Skypod（2025 年 2 月宣布）升级了核心机器人，使工作站吞吐量提高 50%，存储密度提高 30%。它在单一系统内同时支持件拣和箱拣——相对 AutoStore（通常只做件拣）和 Hai
              Robotics（主要做件拣）形成差异化。已具名 Next-Gen 客户包括 Oxford Industries（Tommy Bahama、Lilly Pulitzer）、Grainger 和
              E.Leclerc，上市前合同覆盖 20+ 项目、金额达 $400M。
