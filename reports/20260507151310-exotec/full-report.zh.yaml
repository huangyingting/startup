  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与规模
        blocks:
          - type: paragraph
            body: >
              Exotec 所处市场是仓储自动化——更具体地说，是自动存储与检索系统（AS/RS）里的货到人（G2P）细分市场；AS/RS 又属于更广义的仓储自动化行业。全球仓储自动化市场 2024 年规模为
              $26.5B（GM Insights），2025 年为 $29.98B（Mordor Intelligence），不同来源预测 CAGR 为 13.98–15.9%。到 2031 年，Mordor 预测市场将达
              $65.74B；GM Insights 预测 2034 年按 15.9% CAGR 增至 $119B。硬件占市场 55.12%，软件则是增长最快的部分，到 2031 年 CAGR 为 14.87%。


              在这一市场中，AS/RS 系统 2024 年占 26.3% 份额；移动机器人（AMR/ACR，包括 Exotec 的 Skypod）2025 年占仓储自动化市场 41.36%。G2P 子市场——Exotec
              在这里与 AutoStore、Hai Robotics、SSI Schaefer 最直接竞争——全球中端至企业级站点的可寻址市场估计为 $8–12B。零售和电商占仓储自动化总支出 28.41%（2025
              年），是最大的单一垂直行业。制药 / 医疗健康是增长最快的垂直行业，CAGR 为 14.73%。第三方物流（3PL）提供商占客户基础 38.96%。


              北美占总市场支出 35.51%，是最大的单一区域。亚太增长最快，到 2031 年 CAGR 为 15.91%。欧洲是 Exotec 创立并保持强势市场存在的区域，约占全球支出 25–30%。
