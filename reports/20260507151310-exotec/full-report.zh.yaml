companyProfile:
  summary: >-
    Exotec 是一家法国仓库机器人公司，2015 年由 Romain Moulin（CEO）和 Renaud Heitz（CTO）创立——两人都来自机器人与机电一体化背景。公司的核心产品是 Skypod 系统：一套 3D
    自主移动机器人，可沿 14 米货架攀爬，以 4 m/s 取货，精度低于 100ms；Deepsky WES（仓库执行软件）则编排订单、机器人和输送线。Next-Gen Skypod（2025 年 2 月）把吞吐量提高
    50%，并在单一系统内同时处理件拣和箱拣。Exotec 已在全球 50+ 品牌、135+ 站点落地，Next-Gen 上市前合同额达 $400M。公司 2021 年 12 月以 $2B 估值融资 $335M（Series
    D，Goldman Sachs + 83North），此后未宣布新一轮融资——截至 2026 年 5 月，资本充足性成为实质性尽调问题。
