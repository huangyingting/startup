  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与收入流
        blocks:
          - type: paragraph
            body: >
              Exotec 的收入模型围绕三条收入流搭建，与其硬件-软件-服务全栈定位一致。第一条、也是最主要的一条是系统硬件——Skypod 机器人、货架基础设施、工作站、Skypath 输送线和 Skypicker
              机械臂——以项目制资本销售交付。硬件占每笔交易最大份额，典型项目金额在 $5M 到 $50M+。硬件收入在交付 / 安装完成时确认，因此确认节奏呈项目里程碑驱动的波动形态。


              第二条收入流是 Deepsky WES 软件，以订阅或年度许可方式授权。Deepsky 编排所有仓库硬件（包括第三方设备），并与客户 ERP 和 WMS 系统集成。随着装机基础扩大，这条收入会复利式增长；135+
              站点形成了最低经常性基础。第三条收入流是服务和维护——安装服务（一次性、按项目）、多年维护 SLA，以及操作员培训。99%+ 正常运行时间保证由合同 SLA 支撑，按已安装站点数量带来经常性服务收入。


              第三方收入估计显示，Exotec 截至 2024 年年收入为 $213–256M。公司自己称 2020 年以来收入已翻三倍，累计售出系统超过 $1B。北美订单流入 2023 年超过 $100M，并自 2022
              年起同比翻倍。结合 135+ 站点和每天 1M+ 循环，年收入运行率落在 $200M–$300M 区间有合理性，但无法独立验证。
