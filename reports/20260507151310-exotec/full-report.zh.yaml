      - number: '8.2'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景假设：Next-Gen Skypod 在规模化场景下实现 50%+ 吞吐量提升，并在 Grainger 和 Oxford Industries 形成强正面客户背书；北美收入到 2026 年底翻倍至
              $200M+（来自 2023 年 $100M+ 且仍在增长的订单额）；2025 年市场复苏带动行业反弹 10–15%；Deepsky WES SaaS ARR 到 2027 年达到 $30–50M；Series
              E 在 2027 H1 由新领投方按 $3–3.5B 估值完成。 隐含 2027 年收入：$400–450M（较估计 2024 年基数 CAGR 30–40%）。按 8x，估值 = $3.2–3.6B；按
              10x（SaaS 叙事顶部）， 为 $4.0–4.5B。


              基准情景假设：Next-Gen Skypod 达到规格，但 2025 年规模低于预测（产能爬坡慢于 $400M 待交付目标）；北美收入到 2026 年底增至 $150–175M；2025 年市场恢复
              3–5%；Deepsky SaaS 层贡献 $15–25M ARR；Series E 或战略老股交易在 2026–2027 年按 $1.8–2.2B 完成。隐含 2026 年收入：$300–350M（CAGR
              20–25%）。按 6x，估值 = $1.8–2.1B——相对 2021 年价格持平到小幅溢价。


              悲观情景假设：Next-Gen Skypod 吞吐量不及预期（提升 30–40%，低于宣称的 50%），在北美客户处形成反向背书；市场在 2025 年继续收缩 5–8%；Goldman Sachs
              行使退出偏好；现金流转正前需要资本，触发 $1.2–1.5B 降价轮，或被战略买家机会型收购（Dematic / KION Group、Vanderlande / TomTom 或 Murata
              Machinery）。隐含出售价格：$1.0–1.5B，相当于 2021 年投资人亏损 25–50%。


              当前证据面——$400M Next-Gen 待交付订单、连续 3 年入选 CNBC Disruptor 50、北美订单额 $100M+ 且同比翻倍——更偏向基准情景，
              并保留上行情景的可选性，前提是投资前核验四个关键尽调要求。
            claimRefs: []
          - type: table
            tableRef: TV002
