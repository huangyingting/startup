            figureRef: FV002
            claimRefs: []
      - number: '8.3'
        title: 建议、条件与否决标准
        blocks:
          - type: paragraph
            body: >
              有条件正面建议，建立在 Exotec 差异化技术架构、已验证的欧盟市场位置、可信的北美商业扩张，以及独特的 Next-Gen Skypod 产品管线上。在完全独立（非
              Amazon）的仓库机器人供应商中，Exotec 在这个规模和技术差异化组合下没有直接等价物。


              投资承诺前必须核验四个条件：（1）制造产能：Exotec 必须确认 Croix 工厂产能和 / 或合同制造足以在承诺客户时间表内交付 $400M Next-Gen 待交付订单。（2）Next-Gen
              吞吐量证明：至少一个已投产的 Next-Gen Skypod 站点（Grainger 或 Oxford Industries）必须在投资前的客户验收测试中证明 45%+ 吞吐量提升。（3）IEC 62443
              合规：考虑到企业客户的欧盟 NIS2 义务， Deepsky WES 必须有一条正在推进的 IEC 62443 Level 2 认证路径，并具备可信的 2025 年交付日期。（4）股权结构和 Goldman
              退出一致性：Goldman Sachs 基金期限和退出偏好，必须与 2027+ IPO 或老股交易一致，而不是 2025–2026 年被迫出售。


              已达到投资级条件的部分包括：技术差异化（3D AMR 架构具备硬件防御性）、欧盟市场验证（135+ 个站点、E.Leclerc CEO 提到的 5 分钟行程时间缩短、Decathlon VP
              引述）以及团队质量（创始人有履历，Goldman / 83North 董事会监督）。


              会使投资逻辑失效的否决标准包括：Next-Gen Skypod 在前三个北美站点中的任一客户验收失败；Deepsky WES 在生产客户站点遭遇网络攻击； Goldman Sachs
              在没有投资人一致同意的情况下于 2026 年前发起老股出售；或 Exotec 的 $400M 待交付订单交付时间表延误超过两个自然季度。
            claimRefs: []
