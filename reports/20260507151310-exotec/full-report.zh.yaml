      - number: '1.3'
        title: 规模、运营与全球布局
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 1 月，Exotec 披露全球员工 1,300+ 人、客户站点 135+ 个、服务品牌 50+ 个，Skypod 机队每天执行 1M+ 次机器人循环。1M+
              日循环里程碑——每次循环最多处理四个订单——在 2024 年与 99%+ 正常运行时间承诺一同披露。公司称 2020 年以来全球收入翻了三倍，累计售出系统超过 $1B，2023 年北美年度订单流入超过
              $100M，美国销售额自 2022 年以来大约每年翻倍。


              2024 年底北美员工为 120 人，计划 2025 年底超过 200 人，主要招聘硬件和软件工程岗位。公司正在 Atlanta Peachtree Street 改造第二处办公点，用作 Skypod
              展厅和客户演示中心。公司还扩张到 Munich 和 Seoul，以支持欧洲和亚太客户。区域行业情报确认，Exotec 在 2024–2025 年进入 Austria、South Korea 等新市场。


              2025 年 2 月 Next-Generation Skypod 发布时，公司披露全球 20+ 个保密项目在商业发布前已拿下 $400M 合同，商业公告前就验证了产品市场匹配。已具名 Next-Gen 客户包括
              Oxford Industries（Tommy Bahama、Lilly Pulitzer、Southern Tide）、W.W. Grainger（美国工业分销）和
              E.Leclerc（法国杂货零售）。E.Leclerc Seclin 的客户 CEO Maxence Maurice 提到，Exotec 方案把客户旅程时间从 10–15 分钟降至 5
              分钟以内——这是竞争对手尚未公开匹配的具体吞吐指标。Exotec 在营销材料中宣称货到人生产率较人工拣选提升 5x，并由 E.Leclerc 和 Decathlon Canada
              证言交叉印证。这些具名客户结果，让 Exotec 在零售、杂货、服装和工业分销垂直领域成为可信的 AS/RS 领导者。
