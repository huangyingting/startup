      - number: '7.3'
        title: 财务与市场风险
        blocks:
          - type: paragraph
            body: >
              Exotec 的财务风险主要由三件事决定：（1）硬件占比高带来的毛利差距——估计毛利率 30–50%，低于 AutoStore 公开披露的
              68%，形成结构性的资本成本和研发投入劣势，时间越长越放大；（2）融资缺口——距离 Series D（Dec 2021，$335M）已超过 4 年，尚未公开宣布 Series E 或信贷额度。按每月烧钱
              $5M–$15M 估算，取决于收入现金流 何时转正，公司到 2026 年中可能需要资本；（3）市场收缩——仓库自动化市场在 2024 年收缩 7–11%（据 AutoStore 2024 Annual
              Report），说明企业资本开支预算收紧，管线转化变慢。


              $400M Next-Gen Skypod 待交付订单给了很强的未来收入可见性，也带来营运资金风险：硬件必须先制造，项目回款之后才进账； 任何交付延误都会同时推迟收入确认并损害客户关系。如果 Exotec
              不能在没有资本投入的情况下，把 Croix 制造工厂扩到足以承接 $400M 硬件需求，待交付订单可能变成一段负现金流期，需要桥接融资。


              会打穿投资逻辑的关键风险包括：（1）Next-Gen Skypod 在规模化场景下未能兑现承诺的 50% 吞吐量提升——Oxford Industries 和 Grainger
              会从正面背书变成反向案例，北美销售动能也会被摧毁；（2）Deepsky WES 某个部署点遭遇重大网络攻击， 损害 Exotec 声誉并触发 NIS2 / IEC 62443 执法；（3）Goldman
              Sachs 迫使公司以低于 $2B Series D 的估值出售或 IPO， 造成股权稀释或战略扰动。
