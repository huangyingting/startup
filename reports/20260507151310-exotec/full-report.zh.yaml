        - Goldman 在 2026 年前启动老股交易，且没有 2 年投资者一致行动安排
        - 释放公司健康状况担忧信号；造成不利交易观感；可能触发降价轮
        - 投资前要求 Goldman 出具一致行动函；监控基金生命周期
      - - 制造中断（Croix）
        - 工厂停摆 >4 周
        - $400M 在手订单延迟；收入确认后移；客户罚款敞口
        - 可能需要应急过桥融资；监控工厂运营状态
      - - Deepsky WES 生产站点网络攻击
