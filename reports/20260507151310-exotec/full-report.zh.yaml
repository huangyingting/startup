            body: >
              Exotec 客户覆盖四个主要垂直行业：（1）杂货 / 食品零售（Carrefour、E.Leclerc、ASDA、Cdiscount）——按站点数量计的最大垂直，因为欧洲免下车杂货履约是 Exotec
