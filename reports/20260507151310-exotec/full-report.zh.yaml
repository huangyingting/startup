      - number: '5.2'
        title: 技术架构与工程差异化
        blocks:
          - type: paragraph
            body: >
              Skypod 机器人采用四轮驱动（4WD）架构，并独立控制车轮，因此能在狭窄货架巷道中精准控向。机器人水平移动最高 4 m/s（13.1 ft/s）——在 G2P 市场中属于最快 AMR
              速度之一。垂直爬升靠货架结构中的导轨完成；机器人从水平切换到垂直移动时，驱动系统与导轨啮合。这种 3D 机动架构（单台机器人同时完成水平 + 垂直运动）是 Exotec 相对 AutoStore（仅网格顶部）和
              mini-load 堆垛机（仅垂直）的核心机械差异化。机器人集成再生制动——减速时的动能转化为电能，降低净能耗。自主充电约需每小时 5 分钟，无需人工干预；低需求时段，机器人会自动回到充电站。


              Deepsky WES 是软件编排层。它作为企业软件平台运行，用 API 接入客户 ERP（SAP、Oracle）和 WMS（Manhattan Associates、Blue
              Yonder、JDA）。Deepsky 处理机器人调度、存储位分配、交通管理、预测性维护告警和性能 KPI 报告。软件不只编排 Exotec 自有硬件，也编排第三方设备（输送线、分拣机、第三方机器人），使
              Exotec 定位为软件中立的仓库编排平台。Deepsky 可在本地（客户边缘基础设施）运行，也可采用混合云配置。


              制造集中在法国 Croix（Hauts-de-France），由区域产业政策和 Bpifrance
              支持。关键机器人部件包括驱动电机、轮组、传感器（LiDAR、接近传感器）和充电接口——供应商来自欧洲和亚洲。Skypiker 机械臂用计算机视觉识别物品并规划拣选，机器学习模型基于客户 SKU 数据训练。
