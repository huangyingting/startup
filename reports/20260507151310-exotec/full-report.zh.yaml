      - number: '4.3'
        title: 资本充足性与财务结论
        blocks:
          - type: paragraph
            body: >
              Exotec 融资历史：€2M 种子轮（2016 年），Series A €15M / $17M（2019 年，Breega、360 Capital、IRIS Capital），Series B €25M /
              $26M（2020 年，83North），Series C €57M / $68M（2021 年初，Goldman Sachs 早期参与），Series D $335M（2021 年 12 月，Goldman
              Sachs 领投，估值 $2B）。合计：五轮累计融资约 $446M。Goldman Sachs 关系居于核心位置——它既是投资方和董事会成员（Jim Resch），也可能是未来资金提供者。


              Series D 之后的时间：从 2021 年 12 月到 2026 年 5 月，距上次融资约 4.4 年。对一家拥有 1,300+ 员工、Atlanta 扩张和 $400M 前置 Skypod
              合同的硬件公司而言，月度现金消耗可能在 $5M–$15M 之间，取决于项目收入多大程度抵消运营成本。如果烧钱速度为 $10M / 月，$335M Series D 可支撑 33
              个月——除非项目收入大幅现金流为正，否则到 2025 年初可能出现资金缺口。公司未公开宣布新一轮融资；若增长正在推动公司走向盈利，这可以接受。若增长仍需持续亏损投入，则到 2026
              年中大概率需要新一轮融资或债务融资。


              财务结论：Exotec 已搭出可信的 $200M+ 收入业务，并在北美有强劲势头，但硬件占重模式限制了利润率扩张，除非软件 /
              服务增长接力。经审计财务缺失、收入估计区间宽（$213–256M，置信度未知）、现金位置不确定，是主要尽调阻断项。AutoStore 更高利润率（约 68% 对比估计 30–50%）代表结构性财务风险。
