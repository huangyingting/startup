      - number: '2.2'
        title: 结构性增长驱动与逆风
        blocks:
          - type: paragraph
            body: >
              仓储自动化的主要结构性驱动来自五点：（1）物流和电商履约持续缺工，Exotec 系统把人工拣选行走量降低
              5x；（2）城市最后一公里配送速度预期抬升，电商中当日达、次日达成为标准；（3）订阅式机器人模式（RaaS）把 CAPEX 转成
              OPEX，让中型企业也能部署过去只有投资级信用才能承受的自动化；（4）欧洲和北美能效法规把自动化与可持续要求绑定；（5）COVID 后企业加大供应链韧性投入。上述驱动都偏结构性，而非周期性，支撑长期市场增长。


              最重要的逆风是 2024 年仓储自动化市场收缩 7–11%，AutoStore 公开年报已有记录。这次收缩反映了电商企业在 COVID 后库存正常化，也反映了利率上行带来的资本成本敏感。AutoStore
              是最可比的上市公司，它将这次收缩视为周期性修正，并明确预测 2025 年市场复苏。对 Exotec 而言，2024 年市场收缩是重要考量：未经核验的收入估计（$213–256M）可能意味着 2024 年增速低于
              2022–2023 年 2x+ 的年度节奏。不过，Next-Gen Skypod 于 2025 年 2 月发布，并带着 $400M 上市前合同——这些合同在 2024 年收缩期内预订——说明 Exotec
              即使在下行市场中也成功拿到份额。
            claimRefs: []
