  - id: FV001
    title: 投资建议逻辑
    type: flow
    insight: 有条件的正面投资建议来自四项输入汇合：技术护城河强、欧盟市场验证强、北美商业证据刚冒头、估值 / 财务风险高。在无条件承诺投资前，价格纪律和投前核验四项尽调问题是闸门。
    data:
      nodes:
        - id: f1
          label: 技术护城河（强）
          description: 3D AMR 架构；Next-Gen 吞吐量提升 50%；Deepsky WES SaaS；135+ 个已部署站点
        - id: f2
          label: 欧盟市场验证（强）
          description: E.Leclerc CEO 行程时间引述；Decathlon 运营副总裁；Carrefour、ASDA、UNIQLO 客户背书
        - id: f3
          label: 北美商业证据（初现）
          description: 2023 年订单额 $100M+，同比翻倍；Grainger + Oxford Industries Next-Gen 合同
        - id: f4
          label: 估值与财务风险（高）
          description: $2B 估值对应 8–9x 收入倍数；4+ 年融资空窗；单一工厂风险；Goldman 退出压力
        - id: f5
          label: 投前条件必须满足
          description: 制造产能审计；Next-Gen 吞吐量证明；IEC 62443 合规；股权结构表 + Goldman 立场一致
        - id: f6
          label: 有条件正面信号
          description: 技术独特；欧盟验证强；北美增长可信；管理层有吸引力
        - id: f7
          label: 有条件正面建议
          description: 在 $1.8–2.2B（基准情景）投资，前提是 4 项尽调条件核验通过；避开乐观情景定价
        - id: f8
          label: 放弃标准
          description: Next-Gen 吞吐量未达标；Goldman 被迫退出；生产中断；Deepsky 遭网络攻击
    sourceRefs:
      - SV001
      - SV005
      - SV007
  - id: FV002
    title: 估值敏感性
    type: bar
    insight: >-
      Exotec 隐含估值从 $1.2B（悲观情景：$240M 收入上用 5x 困境倍数）到 $4.2B（乐观情景：$420M 收入上用 10x）。基准情景为 $1.9B（$320M 收入、6x），大致持平 2021 年
      Series D；公司需要持续增长，才能避免稀释。
    data:
      items:
        - label: 悲观：5x $240M 收入
          value: 1.2
          unit: $B
        - label: 悲观-基准：5x $320M 收入
          value: 1.6
          unit: $B
        - label: 基准：6x $320M 收入
          value: 1.9
          unit: $B
        - label: Series D 参照（$2.0B）
          value: 2
          unit: $B
        - label: 基准-乐观：7x $320M 收入
          value: 2.2
          unit: $B
        - label: 乐观：8x $420M 收入
          value: 3.4
          unit: $B
        - label: 乐观上限：10x $420M + Deepsky SaaS
          value: 4.2
          unit: $B
    sourceRefs:
      - SV007
      - SV010
      - SV011
  - id: FV003
    title: 估值 / 回报区间
    type: range
    insight: >-
      2027 年 IPO 或 Series E 的退出估值区间为 $1.2B（悲观情景：困境退出或收购）至 $4.2B（乐观情景：带 SaaS 溢价 IPO）。$1.9B 的基准情景意味着 2021 年投资人打平到小幅亏损；上行需要
      Next-Gen 成功、Deepsky SaaS 跑出商业牵引。
    data:
      items:
        - label: 悲观：收购 / 估值下调融资（2026）
          low: 1
          high: 1.5
          mid: 1.2
        - label: 基准：Series E 或老股交易（2026–27）
          low: 1.8
          high: 2.2
          mid: 2
        - label: 乐观：Series E / IPO（2027）
          low: 2.8
          high: 4.2
          mid: 3.4
    sourceRefs:
      - SV005
      - SV006
      - SV010
  - id: FV004
    title: 投资 KPI
    type: kpi
    insight: Exotec 在市场规模、技术护城河和欧盟客户验证上得分高；财务透明度和估值只属中等——没有经审计财务，却给到溢价倍数，投资规模难确定。
    data:
      items:
        - label: 市场规模
          value: Strong — $23B+ TAM with 10–20% CAGR (automation megatrend)
          claimRefs:
            - CV017
        - label: 技术护城河
          value: Strong — 3D AMR architecture; Next-Gen Skypod 50% throughput; Deepsky WES SaaS
          claimRefs:
            - CV018
        - label: 客户验证
          value: Strong (EU) / Emerging (NA) — E.Leclerc, Decathlon, ASDA, Grainger, Oxford Industries
          claimRefs:
            - CV019
        - label: 收入 / 增长
          value: Medium — $213–256M estimated (not audited); NA order intake doubling YoY
          claimRefs:
            - CV020
        - label: 利润率 / 单位经济
          value: Medium-Low — estimated 30–50% gross margin; hardware-heavy vs. AutoStore 68%
          claimRefs:
            - CV021
        - label: 风险评级
          value: Medium-High — single-factory, funding gap, Goldman exit, NIS2/AI Act compliance
          claimRefs:
            - CV022
        - label: 估值
          value: Medium — $2B (8–9x) premium requires sustained growth; base case flat to 2021
          claimRefs:
            - CV023
        - label: 证据质量
          value: Medium — strong EU evidence; NA financial opacity; no audited accounts
          claimRefs:
            - CV024
    sourceRefs:
      - SV001
      - SV002
      - SV003
