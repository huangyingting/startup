  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与知识产权风险
        blocks:
          - type: paragraph
            body: >
              Exotec 面临的最明确监管风险，是欧盟《机械法规》2023/1230。该法规取代《机械指令》 2006/42/EC，并把 January 2027 设为强制过渡截止日。新规收紧了移动自主机器人的要求，
              明确覆盖协作式和自主式系统，并要求更新合格评定。Exotec 现有第一代 Skypod 车队按旧指令取得 CE 标志。Next-Gen Skypod（Feb 2025 发布）必须在 2027
              切换前按新规完成合格评定——这给 $400M 上市前合同加上了合规倒计时。如果不能按期取得合格评定，Exotec 在欧盟已签约的 Next-Gen 系统交付可能延后，而欧盟正是 Exotec 最大市场。


              欧盟 NIS2 指令（October 2024 生效）把网络安全义务扩大到「关键」和「重要」实体，覆盖物流和制造运营商。 Deepsky WES 运行在客户仓库的 OT/IT 边界，可能同时给
              Exotec（技术提供方）和客户（关键实体） 带来义务。Deepsky WES 软件是否符合 IEC 62443，尚未得到公开确认。欧盟 AI Act（Regulation 2024/1689，August
              2026 生效）把用于关键基础设施运营的 AI 系统列为高风险；仓库编排 AI （Deepsky 的调度和优化算法）可能落入 Annex III，从而触发强制合格评定、技术文档和风险管理要求。


              知识产权 / 法律风险上，AutoStore 与 Ocado 曾围绕网格机器人技术打了多年专利诉讼；这为 Exotec 的 3D 货架攀爬架构提供了先例——如果 Exotec
              的欧盟专利组合受到挑战，竞争对手也可能走类似路径。 Exotec 已在 EPO 申请 Skypod 核心机械专利，但专利组合的深度和地域覆盖范围没有公开披露。 法国知识产权保护在欧盟内较强，但如果没有 PCT /
              国家阶段申请，欧盟外保护有限。
