      - number: '7.2'
        title: 运营、伙伴与人员风险
        blocks:
          - type: paragraph
            body: >
              Exotec 最集中的运营风险，是法国 Croix 的单一制造工厂。Croix 工厂若发生火灾、劳工行动（法国制造业有罢工历史） 或供应链中断，所有新机器人生产都会停摆。考虑到 $400M Next-Gen
              Skypod 合同需要大规模硬件制造，这一点尤其关键。 Exotec 没有公开披露任何合同制造备份或第二生产基地。组件供应链也有风险：机器人驱动电机、LiDAR 传感器和轮组来自欧洲、
              亚洲供应商，面临关税风险（美中贸易紧张、欧盟进口关税）和可得性风险（芯片供应）。


              伙伴 / 依赖风险集中在两个交易对手：Goldman Sachs（董事席位 + 主要资本提供方；Goldman 对下一轮条款或退出时点的决定，会实质影响 Exotec 的战略选择）以及客户 ERP / WMS
              供应商（SAP、Oracle、 Manhattan Associates）。Deepsky 的价值绑定在与这些企业系统的 API 兼容性上——任一供应商发生破坏性 API 变更或授权纠纷，都可能迫使 Exotec
              做昂贵的重新工程。Goldman Sachs 的董事席位也带来潜在冲突： 如果 Goldman 的退出时点（IPO 或出售）偏离 Exotec 创始人的战略偏好，治理摩擦会放大。


              人员风险由两点抬高：（1）对联合创始人 Romain Moulin（CEO，产品 / 商业化）和 Renaud Heitz（CTO， 技术 / 工程）的关键人依赖。Exotec 的差异化架构深度绑定 Heitz
              的工程判断；CTO 离开会带来研发连续性风险。 （2）北美激进招聘计划（2025 年从 120 人增至 200+ 人）带来质量风险——在新地区快速扩招，通常会造成文化整合难、
              客户交付质量不一致和早期流失率上升，进而在关键增长阶段伤害北美客户关系。
