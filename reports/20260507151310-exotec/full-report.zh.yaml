  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与可比公司
        blocks:
          - type: paragraph
            body: >
              Exotec 的 $2B Series D 估值（December 2021），对应估计 2024 年收入 $213–256M 的 8–9x 收入倍数。 当时的溢价来自 2021 年仓库自动化市场繁荣（COVID
              后电商投资激增）以及 Exotec 独特的 3D AMR 架构。到 May 2026， 这个倍数必须放到三年后已经变化的市场环境里重新评估。


              最相关的上市可比公司是 AutoStore Systems。它在 Oslo Stock Exchange（AUTO.OL）交易，市值约 $2.8–3.5B， 2024 年收入 $645.7M——市场收缩后对应
              4–6x 收入倍数。AutoStore 的溢价来自 68% 毛利率、$1.1B+ 累计收入基数 和全球装机基础。Exotec 规模更小、毛利更低，还要承担私营公司折价；通常应较上市可比公司打 30–40%
              私营折价。 这意味着按当前收入水平，合理价值区间约为 $1.4–2.0B，与基准情景一致。


              另外两个可比样本是 Hai Robotics（私营、中国公司，2022 年以约 $1B+ 估值融资 $200M）和 6 River Systems （2019 年被 Flexport 以约 $130M
              收购，规模更小）。市场高端段——真正差异化、且有显著待交付订单的 AMR 供应商——在牛市环境下按 8–12x 收入交易，在熊市 / 复苏环境下按 4–7x 交易。凭借技术差异化，Exotec 位于 AMR
              市场高端，但 $2B 估值要求这一高端倍数 能穿过 2024–2025 年的艰难市场环境。


              投资逻辑建立在三个价值驱动上：（1）$400M Next-Gen Skypod 待交付订单，提供相当于当前收入 1.5–2 年的未来收入可见性； （2）Deepsky WES SaaS
              层，随着装机基础增长，可能贡献更高毛利的经常性收入（每个新 Skypod 部署都会增加一个 Deepsky SaaS 席位）；（3）北美商业化扩张，相比 Exotec
              欧盟本土市场，北美采用曲线更早，代表尚未充分开发的 TAM。
            claimRefs: []
