              AutoStore 公开文件确认，2024 年仓储自动化市场收缩 7–11%。这是反向信号：Exotec 未经核验的收入估计（$213M–$256M）可能没有体现北美宣传中的 2x+ 增长轨迹。2025
              年预计复苏，但 2024 年下滑提高了增长预测的不确定性。
