          label: 估值压缩
          detail: 收入不及预期 + 标杆客户受损，压缩估值倍数
          from:
            - rt7
        - id: rt9
          label: 资本约束
          detail: 估值下调融资或无法完成 Series E
          from:
            - rt8
            - rt4
      edges:
        - from: rt1
          to: rt5
          label: 拖延欧盟 Next-Gen 交付
        - from: rt3
          to: rt5
          label: 硬件生产停摆
        - from: rt5
          to: rt6
          label: 客户拿到延迟或未达标系统
        - from: rt6
          to: rt7
          label: 收入确认延后；罚款
        - from: rt7
          to: rt8
          label: 收入走低，估值倍数压缩
        - from: rt4
          to: rt9
          label: 资金更足的竞争对手抢走份额
        - from: rt8
          to: rt9
          label: 估值下调融资或无新融资
        - from: rt2
          to: rt7
          label: 声誉受损，销售管线收缩
