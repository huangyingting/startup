              最强的北美客户样本；（3）工业分销（Grainger、Geodis）——主要是 Exotec 北美扩张客户；（4）电商和物流（Cdiscount、Geodis、其他 3PL 运营商）。地域拆分约为欧洲
              70–80%、北美 20–30%，日本仍是早期市场。


              按客户规模看，Exotec 主要服务中大型企业（收入 $500M+），因为 AS/RS 系统最低项目投入为 $5M+。买方通常是 VP 级或首席供应链官，IT、财务和运营共同参与采购决策。付款方是企业，通常来自
              CAPEX 预算。使用者是仓库运营经理、拣选员（人类或机械臂）以及把 Deepsky 接入 WMS/ERP 的 IT 系统集成商。


              E.Leclerc 部署是 Exotec 的旗舰杂货客户背书：法国最大杂货零售商、多站点部署，并获得 CEO 级认可（客户旅程：10–15 分钟 → 5 分钟以内）。Grainger 和 Oxford
