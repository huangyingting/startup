chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与创立
        blocks:
          - type: paragraph
            body: >
              Exotec SAS 由工程师 Romain Moulin 和 Renaud Heitz 于 2015 年 4 月 10 日在法国 Croix（里尔都会区）注册成立。Moulin 是机器人工程师，也曾联合创办
              Bon Angle，现任 CEO；Heitz 深耕软件与嵌入式系统，现任 CTO。公司总部在法国 Croix（里尔），2022 年在 Georgia 州 Atlanta 设立北美总部，并在 Munich（德国）和
              Seoul（韩国）设办公室。核心使命是让人类员工与机器人优雅协作，借助货到人（G2P）自动化，持续提升仓库生产率。


              公司的首款产品 Skypod 系统约在 2017 年商业化推出，很快凭借自主机器人三维移动能力形成差异化——机器人既能穿行巷道，也能爬上垂直货架，不像早期 AMR
              只能在平面地面运行。三维机动性是公司的核心技术差异化，后续所有代际都围绕这一点展开。
