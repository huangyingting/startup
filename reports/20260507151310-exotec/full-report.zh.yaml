  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 主要 G2P AS/RS 竞争对手
        blocks:
          - type: paragraph
            body: >
              AutoStore 是 Exotec 在 G2P AS/RS 领域最重要的可比竞争对手。AutoStore 使用立方体系统，机器人在高密度存储网格顶部穿行，并垂直取出料箱。其 2023 年收入为
              $645.7M，毛利率约 68%，调整后 EBITDA 约 48%——收入约为 Exotec 估计值的 3x，利润率明显更优。AutoStore 在 Oslo Stock Exchange
              上市，可进入公开资本市场。AutoStore 的 R5 Pro 机器人（2024 年）提升单机器人吞吐，并延展平台可扩展性。AutoStore 相对 Exotec
              的主要弱点：改造既有建筑不够灵活（立方体需要专门设施设计）、处理大型 / 不规则 SKU 的能力较弱，以及单一系统内多渠道（箱拣 + 件拣）能力有限。


              Hai Robotics 是增长最快的亚洲 G2P AMR 供应商。其 Autonomous Case Handling Robots（ACR/HAIPICK）可以攀爬存储货架——与 Exotec
              思路相似——但初始 CAPEX 更低，SKU 灵活性更高。Hai Robotics 在 LogiMAT 2025 发布 HaiPick Climb，直接瞄准欧洲市场。Hai 对 Exotec
              的竞争风险主要来自价格敏感的中端市场账户；这些客户更看重总部署成本，而不是系统吞吐和多渠道能力。


              Ocado Solutions 是类似 AutoStore 的网格式系统，专门针对大规模生鲜电商履约中心优化。Ocado 的市场更窄（主要是生鲜电商），但技术高度先进，自研群体智能管理数千台机器人。Ocado 与
              AutoStore 围绕网格机器人技术持续存在专利纠纷；这起诉讼不直接影响 Exotec 的技术差异化。Geek+（中国，私营）提供更广的 AMR 组合，包括货到人穿梭车和自主移动机器人，在较小规模部署中与
              Exotec 竞争。
