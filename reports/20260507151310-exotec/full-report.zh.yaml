      - number: '4.2'
        title: 成本结构、利润率与资本强度
        blocks:
          - type: paragraph
            body: >
              Exotec 的成本结构以硬件为主。硬件制造集中在法国 Croix（Hauts-de-France 大区），并得到包括 Bpifrance
              支持在内的法国政府产业政策托底。硬件成本包括机器人制造、货架部件、工作站组装和第三方采购。硬件密集型仓库机器人公司通常毛利率为 30–50%，明显低于纯软件业务。AutoStore 作为主要上市可比公司，毛利率为
              68%，反映出立方体存储架构的单系统硬件成本更低，经常性软件和维护基础也更大。


              运营费用由员工规模（工程、销售、客户成功和制造岗位合计 1,300+ 人）以及激进北美扩张驱动——2024 年底北美员工 120 人，目标 2025 年底超过 200 人，并扩张 37K sq ft
              Atlanta 总部。企业级仓储自动化项目销售周期通常为 9–18 个月，带来可观的成交前销售成本。每个新站点的安装和调试也承担项目交付风险。


              硬件制造推高 CAPEX 强度。不同于纯软件公司，Exotec 必须在项目付款前先为机器人生产垫资——尤其在项目规模扩大时，会形成营运资本敞口。2025 年 2 月宣布的 $400M Next-Gen
              Skypod 上市前合同，意味着公司必须在交付前为大量前置硬件生产承诺融资。
