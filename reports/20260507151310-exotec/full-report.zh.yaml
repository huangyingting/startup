      - number: '1.2'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Exotec 多轮融资累计 $446M。关键轮次包括 2020 年 $90M 的 Series C（Breega 领投，360 Capital、IRIS Capital、Bpifrance 参与），以及 2021
              年 12 月由 Goldman Sachs Asset Management 领投、83North 和 Dell Technologies Capital 参与的里程碑式 $335M Series
              D。Series D 将 Exotec 投后估值定在 $2B——官方意义上成为法国首家机器人独角兽。直到本报告运行日期（2026 年 5 月），公司未公开宣布后续融资；也就是说，$2B 估值已超过四年。


              Goldman Sachs 将 Exotec 的「全球存在和与行业领先零售商及品牌合作的成功记录」列为核心投资逻辑。公司承诺把资金投向大规模北美和亚洲扩张，并在 2025 年前招聘 500 名 R&D
              工程师。Christian Resch（Goldman Sachs）和 Gil Goren（83North）进入 Exotec 董事会。Goldman Sachs Growth Equity
              专注后期私营公司投资，其参与意味着公开披露之外的内部指标已经过核验。


              2021 年 12 月之后没有跟进融资，存在两种相互竞争的解释：（a）Exotec 可能依靠 Series D 资本已能运营自给，暂不需要新资金；或（b）市场环境（AutoStore 年报显示 2024
              年仓储自动化市场收缩 7–11%）降低了新轮融资吸引力。没有管理层直接披露，无法判断哪种解释成立。法国主权投资机构 Bpifrance 参与 Series
              C，增加了战略维度——法国科技政策一直支持机器人独角兽形成——但不改变商业基本面。
