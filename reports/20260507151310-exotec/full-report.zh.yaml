            claimRefs: []
      - number: '8.4'
        title: 图表
        blocks:
          - type: callout
            title: 有条件正面——按基准情景定价（$1.8–2.2B）投资，前提是核验四个投资前尽调条件
            body: >-
              Exotec 是一家真正差异化的仓库机器人公司，技术护城河可防御，欧盟市场验证也很强。投资风险主要集中在四个能在交割前核验的领域： （1）制造产能是否充足，（2）Next-Gen Skypod
              吞吐量证明，（3）Deepsky IEC 62443 安全合规，以及（4）Goldman Sachs 退出一致性。若这四个条件核验令人满意，在基准情景定价（$1.8–2.2B）下给出有条件正面建议是合适的。若没有
              Next-Gen 规模化证明， 不建议按乐观情景定价（$2.5B+）进入。
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
              - CV003
          - type: callout
            title: 2021 年 $2B 估值在基准情景下站得住，但悲观情景可能需要降价轮
            body: >-
              AutoStore 上市倍数压缩（$645M 收入对应 4–6x）和 2024 年市场收缩（7–11%），把 Exotec 8–9x 隐含倍数推到当前市场高位。 如果 Next-Gen Skypod
              表现不及预期，或 Goldman Sachs 加速退出，$1.2–1.5B 降价轮就是现实的悲观情景。2021 年进入的投资人 应相应压力测试清算优先权堆叠。
            calloutType: insight
            claimRefs:
              - CV010
              - CV008
              - CV026
