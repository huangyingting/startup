  - id: FU001
    title: 客户旅程图
    type: journey-map
    data:
      items:
        - label: 认知
          detail: 企业供应链团队在展会（LogiMAT、ProMat）看到 Exotec，或通过 Goldman Sachs / 集成商推荐接触。CNBC Disruptor 50 带来品牌认知。
        - label: 评估
          detail: 配送中心调研、ROI 模型、竞品评估（AutoStore、Hai Robotics）。销售周期 9–18 个月。Goldman Sachs 和具名客户背书（E.Leclerc、Grainger）加速评估。
        - label: 采购
          detail: 多方审批（CSCO、CFO、IT、运营）。$5M–$50M+ 资本开支预算。Goldman Sachs 背书和 83North 为采购委员会提供机构可信度。
        - label: 部署
          detail: 在既有建筑内安装 Skypod。Deepsky WES 与 ERP/WMS 集成。Exotec 现场团队调试。典型部署周期 3–9 个月。
        - label: 上线
          detail: 初始运行；SLA 计时开始（99%+ 正常运行时间）。Deepsky 订阅启动。客户培训操作员；Skypicker 机械臂按 SKU 集校准。
        - label: 扩张
          detail: 新增站点、增加机器人数量，或升级到 Next-Gen Skypod。$400M 发布前积压订单 = 已验证现有客户扩张周期。
