            body: 物流缺工是结构性问题：美国仓库工人供给尚未恢复到疫情前水平，欧洲也面临类似约束。Exotec 将拣选生产率提升 5x，形成有说服力的 ROI 论证，可穿越利率周期和市场放缓。
