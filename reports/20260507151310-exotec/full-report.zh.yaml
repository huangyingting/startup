      - number: '2.3'
        title: 细分市场分析与买方地图
        blocks:
          - type: paragraph
            body: >
              Exotec 的主要客户细分包括：（1）零售和服装（Gap、UNIQLO、Decathlon、Oxford
              Industries）——按安装数量计的最大细分；（2）杂货和食品服务（Carrefour、E.Leclerc、Cdiscount）——欧洲免下车杂货履约普及带来快速增长；（3）工业分销和
              3PL（Grainger、Geodis）——以美国为主，通常需要处理高 SKU 数；（4）制药和医疗健康——仍处早期，但监管要求高。


              典型 Exotec 买方是中大型零售商或分销商的供应链、物流或运营 VP / Director，企业通常拥有 2+ 配送中心、年收入 $500M+。决策周期 12–24 个月，项目价值 $5–50M+，系统寿命
              5–10 年。与既有 WMS 和 ERP 集成是关键评估标准。模块化 AS/RS 兴起后，买方越来越偏好无需全新建场、可装进既有设施的系统——Exotec 的非立方体货架架构正提供这种灵活性。


              买方地图区分直接客户（在自有 DC 部署 Skypod 的企业）和渠道合作伙伴（如 E80 Group 这类系统集成商，把 Exotec
              与输送线、分拣系统打包）。渠道合作伙伴路径会稀释利润率，但也能加快市场渗透，Exotec 无需在每个地区自建完整直销基础设施。
