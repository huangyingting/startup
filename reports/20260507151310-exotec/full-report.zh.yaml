      - number: '5.3'
        title: 可靠性、路线图与技术风险评估
        blocks:
          - type: paragraph
            body: >
              Exotec 最可信的技术证明来自运营：全球 135+ 生产站点每天 1M+ 次循环，正常运行时间 99%+。这是一项已展示的生产级可靠性主张——不是实验室基准。99%+ 正常运行时间由合同 SLA
              支撑，带有财务责任。Deepsky 的实时监控（机器人健康遥测、充电状态、电机磨损）支持预测性维护，在故障前主动服务。Exotec 客户成功与支持团队提供 24/7 远程监控，并在硬件问题出现时派遣现场技术人员。


              Next-Gen Skypod 路线图（2025 年 2 月发布）代表 Exotec 历史上最重要的技术升级。关键改进包括：工作站吞吐量提高 50%，存储密度提高 30%，单次机器人循环内完成件拣 + 箱拣。来自
              20+ 项目的 $400M 上市前合同，在商业发布前验证了客户对新一代产品的信心。具名客户（Oxford Industries、Grainger、E.Leclerc）代表跨垂直采纳（服装、工业分销、杂货）。


              关键技术风险：（1）制造集中——法国单一生产站点带来供应链风险；工厂中断会影响所有新系统交付。（2）组件供应链——电机和传感器供应商集中在欧洲 / 亚洲；2021
              年后芯片供应中断曾广泛影响硬件机器人公司。（3）Deepsky 安全——WES 软件平台没有公开披露 SOC 2、ISO 27001 或 IEC 62443 认证；Grainger、Oxford
              Industries 等企业客户可能在部署前要求这些认证。（4）Skypicker 机器学习——基于计算机视觉（CV）的拣选依赖 SKU 训练数据；在混合 SKU 或高 SKU 数环境下的性能退化未公开刻画。
