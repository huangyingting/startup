      - number: '5.3'
        title: Reliability, roadmap, and technical risk assessment
        blocks:
          - type: paragraph
            body: >
              Exotec's most credible technical proof point is operational: 1M+ daily cycles across 135+ production sites
              with 99%+ uptime globally. This is a demonstrated, production-scale reliability claim — not a lab
              benchmark. The 99%+ uptime is backed by contractual SLAs, creating financial accountability. Predictive
              maintenance through Deepsky's real-time monitoring (robot health telemetry, charge state, motor wear)
              enables proactive service before failure. Exotec's customer success and support team provides 24/7 remote
              monitoring and dispatches field technicians for hardware issues.


              The Next-Gen Skypod roadmap (Feb 2025 launch) represents the most significant technical upgrade in
              Exotec's history. Key improvements: 50% workstation throughput improvement, 30% storage density increase,
              each+case picking in a single robot cycle. The $400M in pre-launch contracts from 20+ projects validates
              customer confidence in the new generation before commercial launch. Named customers (Oxford Industries,
              Grainger, E.Leclerc) represent cross-vertical adoption (apparel, industrial distribution, grocery).


              Key technical risks: (1) Manufacturing concentration — single production site in France creates supply
              chain risk; a plant disruption affects all new system deliveries. (2) Component supply chain — motor and
              sensor suppliers concentrated in Europe/Asia; chip supply disruptions post-2021 affected hardware robotics
              companies broadly. (3) Deepsky security — no publicly disclosed SOC 2, ISO 27001, or IEC 62443
              certification for the WES software platform; enterprise customers (Grainger, Oxford Industries) may
              require these certifications before deployment. (4) Skypicker machine learning — CV-based picking relies
              on SKU training data; performance degradation in mixed-SKU or high-SKU-count environments not publicly
              characterized.
