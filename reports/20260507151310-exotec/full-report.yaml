      - number: '2.2'
        title: Structural growth drivers and headwinds
        blocks:
          - type: paragraph
            body: >
              The primary structural drivers for warehouse automation are: (1) persistent labor shortages in logistics
              and e-commerce fulfillment, where Exotec's systems reduce manual pick-travel by 5x; (2) rising urban
              last-mile delivery speed expectations (same-day, next-day standard in e-commerce); (3) subscription-based
              robotics models (RaaS) that convert CAPEX into OPEX, enabling mid-tier firms to deploy automation
              previously requiring investment-grade credit; (4) energy-efficiency regulations in Europe and North
              America bundling automation with sustainability requirements; and (5) supply chain resilience investments
              post-COVID. Each of these drivers is structural rather than cyclical, supporting long-term market growth.


              The most significant headwind is the 7–11% warehouse automation market contraction in 2024, documented in
              AutoStore's public annual report. This contraction reflects post-COVID inventory normalization among
              e-commerce players and capital cost sensitivity from higher interest rates. AutoStore, the most comparable
              public company, experienced this as a cyclical correction and explicitly forecast market recovery in 2025.
              For Exotec, the 2024 market contraction is an important consideration: the company's unverified revenue
              estimates ($213–256M) may reflect a slower 2024 growth rate than the 2x+ annual pace seen in 2022–2023.
              However, the Next-Gen Skypod's February 2025 launch with $400M in pre-launch contracts — booked during the
              2024 contraction period — suggests Exotec successfully won market share even in a down market.
            claimRefs: []
          - type: table
            tableRef: TM002
            claimRefs:
              - CM001
              - CM004
              - CM005
          - type: figure
            figureRef: FM002
            claimRefs: []
      - number: '2.3'
        title: Segment analysis and buyer map
        blocks:
          - type: paragraph
            body: >
              Exotec's primary customer segments are: (1) retail and apparel (Gap, UNIQLO, Decathlon, Oxford Industries)
              — the largest segment by installation count; (2) grocery and food service (Carrefour, E.Leclerc,
              Cdiscount) — growing rapidly due to drive-through grocery fulfillment adoption in Europe; (3) industrial
              distribution and 3PL (Grainger, Geodis) — US-led, often requiring high SKU count handling; and (4)
              pharmaceuticals and healthcare — a nascent segment with high regulatory requirements.


              The typical Exotec buyer is a VP or Director of Supply Chain, Logistics, or Operations at a mid-to-large
              retailer or distributor with 2+ distribution centers and annual revenue of $500M+. Decision cycles are
              12–24 months, project values of $5–50M+, and 5–10 year system lifetimes. Integration with existing WMS and
              ERP systems is a key evaluator criterion. The shift to modular AS/RS means buyers increasingly prefer
              systems that can be installed in existing facilities without full greenfield builds — Exotec's non-cube
              racking architecture offers this flexibility.


              The buyer map differentiates between direct customers (enterprises deploying Skypod in their own DCs) and
              channel partners (system integrators like E80 Group who bundle Exotec with conveyor and sorter systems).
              The channel partner route, while margin-dilutive, accelerates market penetration without Exotec needing to
              build full direct-sales infrastructure in every geography.
            claimRefs: []
          - type: table
            tableRef: TM003
            claimRefs:
              - CM006
              - CM007
          - type: figure
            figureRef: FM003
            claimRefs: []
      - number: '2.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural tailwinds are secular not cyclical — labor shortage drives 5x ROI
            body: >-
              The labor shortage in logistics is structural: US warehouse worker availability has not recovered to
              pre-pandemic levels, and Europe faces similar constraints. Exotec's 5x pick productivity improvement
              creates a compelling ROI argument that survives interest rate cycles and market slowdowns.
            calloutType: insight
            claimRefs:
              - CM008
              - CM009
          - type: callout
            title: 2024 market contraction (-7–11%) is a near-term headwind for Exotec's revenue trajectory
            body: >-
              AutoStore's public filing confirms a 7–11% warehouse automation market contraction in 2024. This is an
              adverse signal: Exotec's unverified revenue estimates ($213M–$256M) may not reflect the expected 2x+
              growth trajectory advertised in North America. Recovery is expected in 2025, but the 2024 dip adds
              uncertainty to growth projections.
            calloutType: insight
            claimRefs:
              - CM010
              - CM011
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Primary G2P AS/RS competitors
        blocks:
          - type: paragraph
            body: >
              AutoStore is Exotec's most significant comparable competitor in the G2P AS/RS space. AutoStore operates a
              cube-based system where robots traverse the top of a dense storage grid, retrieving bins vertically. Its
              2023 revenue was $645.7M with ~68% gross margin and ~48% adjusted EBITDA — making it approximately 3x
              Exotec's estimated revenue with far superior margins. AutoStore is publicly listed on the Oslo Stock
              Exchange, giving it access to public capital markets. AutoStore's R5 Pro robot (2024) improves throughput
              per bot and extends the platform's scalability. AutoStore's primary weaknesses vs. Exotec: less flexible
              for retrofit to existing buildings (cube requires dedicated facility design), less ability to handle
              large/irregular SKUs, and limited multichannel (case+each) capability in a single system.


              Hai Robotics is the fastest-growing Asian G2P AMR vendor. Its Autonomous Case Handling Robots
              (ACR/HAIPICK) climb storage racks — similar to Exotec's approach — but at lower initial CAPEX and with
              higher SKU flexibility. Hai Robotics launched its HaiPick Climb at LogiMAT 2025, targeting the European
              market directly. Hai's competitive risk to Exotec is primarily in price-sensitive mid-market accounts
              where total deployment cost matters more than system throughput and multichannel capability.


              Ocado Solutions is a grid-based system similar to AutoStore, optimized specifically for large-scale
              e-grocery fulfillment centers. Ocado's market is narrower (primarily e-grocery) but its technology is
              highly advanced, with proprietary swarm intelligence managing thousands of robots. Ocado is in ongoing
              patent dispute with AutoStore over grid-bot technology; this litigation does not directly affect Exotec's
              technology differentiation. Geek+ (Chinese, privately held) offers a broader AMR portfolio including
              goods-to-person shuttles and autonomous mobile robots that compete with Exotec in smaller-scale
              deployments.
            claimRefs: []
          - type: table
            tableRef: TP001
            claimRefs:
              - CP001
              - CP002
              - CP003
          - type: table
            tableRef: TP004
            claimRefs:
              - CP009
              - CP010
              - CP011
          - type: figure
            figureRef: FP001
            claimRefs: []
      - number: '3.2'
        title: Traditional integrators and market dynamics
        blocks:
          - type: paragraph
            body: >
              The traditional AS/RS integrators — SSI Schaefer, Swisslog (KUKA subsidiary), Dematic (KION), and
              Vanderlande (Toyota subsidiary) — are large, established automation systems integrators with broad product
              portfolios including crane-based AS/RS, shuttle systems, conveyors, and sorters. These companies have
              annual revenues of $1B–$3B+ and decades of customer relationships in manufacturing and distribution. Their
              competitive advantage is project management depth and the ability to deliver full warehouse automation
              projects including all ancillary systems under a single contract. Their disadvantage vs. Exotec is
              innovation speed: crane-based and shuttle AS/RS systems are slower to upgrade and require more
              capital-intensive installations than modular AMR systems.


              The market structure in 2024–2025 is increasingly bifurcated: large greenfield projects (>$50M) tend to go
              to traditional integrators with full-project management capability; mid-market projects ($5–30M)
              increasingly go to modular AMR vendors like Exotec and AutoStore. Exotec's positioning as an "end-to-end
              warehouse solutions provider" (adding Skypath conveyors and Skypicker arm in 2023–2025) is a direct
              attempt to move upmarket into the traditional integrator's territory by offering full-warehouse automation
              without needing a separate integrator partner.


              Key risk: as traditional integrators (particularly Dematic and SSI Schaefer) launch their own AMR products
              and partner with AMR vendors, Exotec faces potential channel conflicts with the E80 Group partnership and
              similar arrangements. SSI Schaefer acquired a stake in Geek+ (2022) as a strategic move to integrate AMR
              capabilities. KION (Dematic's parent) also operates the Linde MH brand and is actively integrating fleet
              management software with modular robotics — a convergence trajectory that reduces Exotec's mid-market
              differentiation over a 3–5 year horizon.
            claimRefs: []
          - type: table
            tableRef: TP002
            claimRefs:
              - CP004
              - CP005
              - CP006
          - type: figure
            figureRef: FP002
            claimRefs: []
      - number: '3.3'
        title: Competitive positioning and moat assessment
        blocks:
          - type: paragraph
            body: >
              Exotec's primary competitive moats are: (1) three-dimensional robot mobility — Skypod robots climb to 14m
              height vs. AutoStore's top-only grid traversal, enabling higher vertical storage in irregularly shaped
              buildings; (2) retrofit-first architecture that installs into existing warehouse buildings without
              requiring dedicated facility design; (3) full-stack integration (Skypod hardware + Deepsky WES software +
              Skypath conveyors + Skypicker arm) enabling a single-vendor relationship; (4) 99%+ uptime and 1M+ daily
              cycles at 135+ sites providing reference-grade operational proof; and (5) switching cost — once installed,
              an Exotec Skypod system becomes the operational backbone of the warehouse, with Deepsky WES deeply
              integrated into the customer's ERP and WMS, creating multi-year lock-in.


              The key moat concern is that AutoStore's cube system achieves higher storage density than Exotec in
              optimized buildings, and AutoStore's ~68% gross margin vs. Exotec's estimated 30–50% (hardware-heavy
              model) suggests AutoStore can sustain larger R&D investment and deeper price discounts in competitive
              evaluations. Hai Robotics' lower CAPEX undercuts Exotec in price-sensitive mid-market accounts. Neither
              AutoStore nor Hai Robotics has matched Exotec's multichannel (each+case) capability in a single system as
              of 2025 — the Next-Gen Skypod moat reinforces this advantage.


              Exotec's competitive strategy in North America (doubling sales yearly since 2022, 37K sq ft Atlanta HQ
              expansion, targeting 200+ NA employees by end-2025) directly challenges AutoStore's North American market
              share. Lock-in mechanics include: Deepsky WES software subscription (recurring); physical installation
              within existing building envelope (high removal cost); trained operator familiarity with Exotec's system;
              and customer success SLAs that create ongoing relationship depth. The key uncertainty is whether Exotec
              can maintain installation quality and customer support quality at scale as it accelerates NA hiring.
            claimRefs: []
          - type: table
            tableRef: TP003
            claimRefs:
              - CP007
              - CP008
          - type: figure
            figureRef: FP003
            claimRefs: []
      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: >-
              Retrofit-first architecture and multichannel capability are structural moats AutoStore cannot easily
              replicate
            body: >-
              AutoStore's cube grid requires facility-level design changes for optimal deployment; Exotec's rack-based
              3D system can be installed in existing buildings with standard racking. Next-Gen Skypod's each+case
              picking (Feb 2025) addresses a multichannel need that AutoStore's system does not natively serve — this
              moat is durable for 2–3 years until competitors can replicate.
            calloutType: insight
            claimRefs:
              - CP004
              - CP005
              - CP011
          - type: callout
            title: AutoStore's superior margins and public capital access are durable competitive advantages
            body: >-
              AutoStore's ~68% gross margin (confirmed public filing) vs. Exotec's estimated 30–50% margin
              (hardware-heavy) means AutoStore can reinvest proportionally more into R&D and withstand deeper price
              discounts. As a public company, AutoStore can raise equity capital at any time — giving it a structural
              funding advantage over Exotec's last-round-in-2021 situation. This margin and capital gap will only widen
              as AutoStore scales.
            calloutType: insight
            claimRefs:
              - CP001
              - CP006
              - CP009
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and streams
        blocks:
          - type: paragraph
            body: >
              Exotec's revenue model is structured around three streams that mirror the company's
              hardware-software-services full-stack positioning. The primary stream is system hardware — Skypod robots,
              rack infrastructure, workstations, Skypath conveyors, and Skypicker robotic arms — delivered as
              project-based capital sales. Hardware constitutes the largest share of each deal, with a typical project
              ranging from $5M to $50M+. Hardware revenue is recognized at delivery/installation completion, creating a
              lumpy recognition pattern tied to project milestones.


              The second stream is Deepsky WES software, licensed on a subscription or annual license basis. Deepsky
              orchestrates all warehouse hardware (including third-party devices) and integrates with customer ERP and
              WMS systems. As installed base grows, this stream compounds; 135+ sites create a minimum recurring base.
              The third stream is services and maintenance — installation services (one-time, per project), multi-year
              maintenance SLAs, and operator training. The 99%+ uptime guarantee is backed by contractual SLAs, which
              provide recurring service revenue tied to installed site count.


              Third-party revenue estimates place Exotec at $213–256M annually as of 2024. The company itself reported
              that revenue has tripled since 2020 and that $1B+ in systems have been sold in total. North America order
              intake exceeded $100M in 2023 and was doubling year-over-year from 2022. These data points, combined with
              135+ sites and 1M+ daily cycles, suggest annual revenue run-rate in the $200M–$300M range is plausible,
              though not independently verifiable.
            claimRefs: []
