              companies), as AS/RS systems require minimum project investment of $5M+. Buyers are typically VP-level or
              Chief Supply Chain Officers, with IT, Finance, and Operations as stakeholders in the purchase decision.
              Payers are the enterprise — typically via capex budget. Users are warehouse operations managers, pickers
              (human or robotic arm), and IT systems integrators who connect Deepsky to WMS/ERP.


              The E.Leclerc deployment is Exotec's flagship grocery reference: France's largest grocery retailer,
              multiple site deployments, with a CEO-level endorsement (customer journey: 10–15 minutes → under 5
              minutes). The Grainger and Oxford Industries deployments (Next-Gen Skypod, 2025) are Exotec's flagship NA
