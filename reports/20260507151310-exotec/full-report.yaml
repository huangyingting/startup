      - number: '1.2'
        title: Funding history and valuation
        blocks:
          - type: paragraph
            body: >
              Exotec has raised $446M in total funding across multiple rounds. Key rounds include a Series C of $90M in
              2020 (Breega lead, with 360 Capital, IRIS Capital, and Bpifrance) and a landmark Series D of $335M in
              December 2021 led by Goldman Sachs Asset Management, with participation from 83North and Dell Technologies
              Capital. The Series D set Exotec's post-money valuation at $2 billion — officially making it France's
              first robotics unicorn. No subsequent financing round has been publicly announced through the run date of
              this report (May 2026), meaning the $2B valuation is now over four years old.


              Goldman Sachs cited Exotec's "global presence and strong track record of success with industry-leading
              retailers and brands" as the key investment thesis. The company committed to deploying the capital across
              large-scale North American and Asian expansion and hiring 500 R&D engineers by 2025. Christian Resch
              (Goldman Sachs) and Gil Goren (83North) serve on the Exotec board. The Goldman Sachs Growth Equity arm
              specializes in late-stage private company investments, and its participation signals verified internal
              metrics beyond what is publicly disclosed.


              The absence of a follow-on financing round since December 2021 raises two competing interpretations: (a)
              Exotec may be operationally self-sustaining on Series D capital and not yet requiring new capital; or (b)
              market conditions (warehouse automation market contracted 7–11% in 2024 per AutoStore's annual report) may
              have made new rounds less attractive. Neither interpretation can be resolved without direct management
              disclosure. The French sovereign investment arm Bpifrance's co-investment in the Series C adds a strategic
              dimension — French tech policy has actively supported robotics unicorn formation — though it does not
              affect commercial fundamentals.
            claimRefs: []
          - type: table
            tableRef: TO002
            claimRefs:
