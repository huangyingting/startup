  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market definition and size
        blocks:
          - type: paragraph
            body: >
              The relevant market for Exotec is warehouse automation — specifically the goods-to-person (G2P) segment of
              Automated Storage and Retrieval Systems (AS/RS), which is a subset of the broader warehouse automation
              industry. The global warehouse automation market was valued at $26.5B in 2024 (GM Insights) and $29.98B in
              2025 (Mordor Intelligence), with a projected CAGR of 13.98–15.9% depending on source. By 2031, Mordor
              projects the market will reach $65.74B; GM Insights projects $119B by 2034 at 15.9% CAGR. Hardware holds
              55.12% of the market, while software is the fastest-growing segment at 14.87% CAGR through 2031.


              Within this market, AS/RS systems held 26.3% share in 2024, and mobile robots (AMRs/ACRs including
              Exotec's Skypod) held 41.36% of the warehouse automation market share in 2025. The G2P sub-segment — where
              Exotec competes most directly with AutoStore, Hai Robotics, and SSI Schaefer — is estimated at $8–12B
              addressable market for mid-market to enterprise sites globally. Retail and e-commerce represent 28.41% of
              total warehouse automation spending (2025), the largest single vertical. Pharmaceuticals/healthcare is the
              fastest-growing vertical at 14.73% CAGR. Third-party logistics (3PL) providers represent 38.96% of the
              customer base.


              North America commands 35.51% of total market spending and is the largest single region. Asia-Pacific is
              the fastest-growing at 15.91% CAGR through 2031. Europe, where Exotec was founded and retains strong
              market presence, represents approximately 25–30% of global spending.
            claimRefs: []
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: table
            tableRef: TM004
