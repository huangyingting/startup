            body: >
              Exotec's cost structure is hardware-dominated. Hardware manufacturing is concentrated in Croix, France
              (Hauts-de-France region), supported by French government industrial policy including Bpifrance backing.
              Hardware costs include robot fabrication, rack components, workstation assembly, and third-party
              procurement. Hardware-intensive warehouse robotics companies typically achieve gross margins of 30–50%,
              well below pure-software businesses. AutoStore's 68% gross margin (the primary public comparable) reflects
              a cube storage architecture with lower per-system hardware cost and a larger recurring software and
              maintenance base.


              Operating expenses are driven by headcount (1,300+ employees across engineering, sales, customer success,
              and manufacturing) and the aggressive North America expansion — 120 NA employees at end-2024, targeting
              200+ by end-2025, with a 37K sq ft Atlanta headquarters expansion. Sales cycles for enterprise warehouse
              automation projects are typically 9–18 months, creating significant pre-close sales costs. Installation
              and commissioning on each new site carries project delivery risk.


              CAPEX intensity is elevated by hardware manufacturing. Unlike pure-software companies, Exotec must finance
              robot production before project payment — creating working capital exposure, particularly as project size
              scales. The $400M in pre-launch Next-Gen Skypod contracts (announced Feb 2025) implies significant forward
              hardware production commitments that must be financed before delivery.
