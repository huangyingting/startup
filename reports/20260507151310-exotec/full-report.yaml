  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product modules and customer workflow
        blocks:
          - type: paragraph
            body: >
              Exotec's full product system is designed to automate goods-to-person (G2P) order fulfillment workflows in
              distribution centers. The core customer workflow begins with an inbound order from an ERP or WMS system.
              Deepsky WES receives the order, identifies the storage location of the required SKU, and dispatches one or
              more Skypod robots. Each robot navigates the rack structure in three dimensions — traveling horizontally
              along rack aisles, then climbing vertically to the target storage level (up to 14m height). The robot
              retrieves a storage tote, descends, and transports it to one of the workstation ports. The operator (or
              Skypicker robotic arm) picks the required item(s) from the tote, which is then returned to storage by
              another robot. Deepsky orchestrates all movements to minimize robot travel time, optimize storage density,
              and prevent collisions among the fleet.


              The Skypicker robotic arm (600 items/hr) automates the picker station, enabling 24/7 operation without
              human intervention. For facilities with multi-location inventory or longer travel distances, Skypath
              conveyor integration moves totes between zones without robot redeployment. The complete system — Skypod
              robots + Skypicker arm + Skypath conveyors + Deepsky WES — offers full-warehouse automation from inbound
              order to picked item, with a single vendor relationship and single software orchestration layer.


              The Next-Gen Skypod (announced Feb 2025) upgrades the core robot with 50% throughput improvement at the
              workstation and 30% storage density increase. It supports both each-picking and case-picking in a single
              system — a differentiator vs. AutoStore (each-only typical) and Hai Robotics (primarily each). Named
              Next-Gen customers include Oxford Industries (Tommy Bahama, Lilly Pulitzer), Grainger, and E.Leclerc, with
              $400M in pre-launch contracts across 20+ projects.
            claimRefs: []
          - type: table
            tableRef: TE001
            claimRefs:
