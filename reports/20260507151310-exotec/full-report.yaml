              Exotec's original use case; (2) General retail and apparel (Gap Inc, Decathlon, UNIQLO, Oxford Industries)
              — Exotec's strongest NA customer examples; (3) Industrial distribution (Grainger, Geodis) — primarily
              Exotec's North American expansion customers; and (4) E-commerce and logistics (Cdiscount, Geodis, other
              3PL operators). The geographic split is approximately 70–80% Europe and 20–30% North America, with Japan
              as a nascent market.


