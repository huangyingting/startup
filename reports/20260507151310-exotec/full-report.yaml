    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and founding
        blocks:
          - type: paragraph
            body: >
              Exotec SAS was incorporated on April 10, 2015 in Croix, France (metropolitan Lille), by engineers Romain
              Moulin and Renaud Heitz. Moulin, a robotics engineer and former Bon Angle co-founder, serves as CEO;
              Heitz, a deep software and embedded systems engineer, serves as CTO. The company is headquartered in Croix
              (Lille), France, with its North American headquarters established in Atlanta, Georgia in 2022. Additional
              offices are located in Munich (Germany) and Seoul (South Korea). The core mission is to enable elegant
              collaboration between human and robot workers to deliver lasting warehouse productivity through
              goods-to-person (G2P) automation.


              The company's first product, the Skypod system, was commercially launched circa 2017 and quickly
              differentiated by enabling autonomous robots to move in three dimensions — across aisles and up vertical
              racks — unlike earlier AMRs constrained to flat floor operations. This three-dimensional mobility is the
              central technical differentiation the company has built upon in all subsequent generations.
