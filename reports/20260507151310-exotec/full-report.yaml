      - number: '7.2'
        title: Operational, partner, and people risk
        blocks:
          - type: paragraph
            body: >
              The single most concentrated operational risk is Exotec's single-factory manufacturing site in Croix,
              France. A fire, labor action (France has a history of manufacturing strikes), or supply chain disruption
              at the Croix facility would halt all new robot production. This is especially critical given the $400M in
              Next-Gen Skypod contracts requiring hardware manufacturing at scale. No public disclosure of a contract
              manufacturing backup or second production site has been made. Component supply chain risk also applies:
              robot drive motors, LiDAR sensors, and wheel assemblies sourced from European and Asian suppliers are
              subject to tariff risk (US-China trade tensions, EU import duties) and availability risk (chip supply).


              Partner/dependency risk centers on two counterparties: Goldman Sachs (board seat + primary capital
              provider; Goldman's decisions on next-round terms or exit timing materially affect Exotec's strategic
              options) and customer ERP/WMS vendors (SAP, Oracle, Manhattan Associates). Deepsky's value is locked to
              API compatibility with these enterprise systems — a breaking API change or license dispute with any of
              these vendors could require costly re-engineering. The Goldman Sachs board seat creates a potential
              conflict if Goldman's exit timing (IPO or sale) diverges from Exotec founders' strategic preference.


              People risk is elevated by two factors: (1) Key-person dependency on co-founders Romain Moulin (CEO,
              product/commercial) and Renaud Heitz (CTO, technology/engineering). Exotec's differentiated architecture
              is deeply tied to Heitz's engineering vision; a CTO departure would create R&D continuity risk. (2) The
              aggressive North America hiring plan (120→200+ employees in 2025) creates quality risk — fast hiring in a
              new geography typically creates cultural integration challenges, inconsistent customer delivery quality,
              and elevated early-attrition rates that can damage NA customer relationships at a critical growth stage.
