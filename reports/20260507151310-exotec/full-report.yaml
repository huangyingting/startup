  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, legal, and IP risk
        blocks:
          - type: paragraph
            body: >
              Exotec's most concrete regulatory risk is the EU Machinery Regulation 2023/1230, which replaces the
              Machinery Directive 2006/42/EC and has a mandatory transition date of January 2027. The new regulation
              strengthens requirements for mobile autonomous robots (specifically covering collaborative and autonomous
              systems) and requires updated conformity assessments. Exotec's existing Gen 1 Skypod fleet was CE-marked
              under the old directive. The Next-Gen Skypod (Feb 2025 launch) will need conformity assessment under the
              new regulation before the 2027 cutover — creating a compliance clock for the $400M in pre-launch
              contracts. Failure to achieve conformity on schedule could delay delivery of contracted Next-Gen systems
              in the EU, Exotec's largest market.


              The EU NIS2 Directive (effective October 2024) expands cybersecurity obligations to "essential" and
              "important" entities including logistics and manufacturing operators. Exotec's Deepsky WES, operating at
              the OT/IT boundary of customer warehouses, may create obligations for both Exotec (as a technology
              provider) and its customers (as essential entities). IEC 62443 compliance for WES software is not publicly
              confirmed. The EU AI Act (Regulation 2024/1689, effective August 2026) creates a high-risk classification
              for AI systems used in critical infrastructure operations — warehouse orchestration AI (Deepsky's dispatch
              and optimization algorithms) may qualify under Annex III, triggering mandatory conformity assessment,
              technical documentation, and risk management requirements.


              On IP/legal risk: AutoStore and Ocado engaged in multi-year patent litigation over grid-bot technology — a
              precedent that Exotec's 3D rack-climbing architecture could face from competitors if Exotec's EU patent
              portfolio is challenged. Exotec has filed patents at EPO for core Skypod mechanics, but the depth and
              geographic coverage of the patent portfolio is not publicly disclosed. French IP protection is strong
              within the EU but limited outside it without PCT/national filings.
            claimRefs: []
          - type: table
            tableRef: TR001
            claimRefs:
