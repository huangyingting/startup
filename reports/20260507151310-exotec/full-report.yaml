      - number: '1.3'
        title: Scale, operations, and global footprint
        blocks:
          - type: paragraph
            body: >
              As of January 2025, Exotec reports 1,300+ employees globally, 135+ customer sites, 50+ brands served, and
              1M+ daily robot cycles performed by its Skypod fleet. The 1M+ daily cycle milestone — each cycle
              processing up to four orders — was disclosed in 2024 alongside a 99%+ uptime commitment. The company has
              tripled global revenue since 2020, passed $1B in total systems sold, and exceeded $100M in North American
              annual order intake in 2023 with US sales roughly doubling year-over-year since 2022.


              North American staff stood at 120 at year-end 2024, with a plan to exceed 200 by end-2025, primarily in
              hardware and software engineering. A second Atlanta location on Peachtree Street is being fitted out as a
              Skypod showroom and customer demonstration center. The company has also expanded to Munich and Seoul to
              support European and APAC customer bases. Regional industry intelligence confirms Exotec is entering new
              markets including Austria and South Korea in 2024-2025.


              The February 2025 Next-Generation Skypod launch disclosed $400M in pre-commercial-launch contract wins
              across 20+ stealth-mode projects globally, validating the product-market fit before commercial
              announcement. Named Next-Gen customers include Oxford Industries (Tommy Bahama, Lilly Pulitzer, Southern
              Tide), W.W. Grainger (US industrial distribution), and E.Leclerc (French grocery). Customer CEO Maxence
              Maurice of E.Leclerc Seclin noted that Exotec's solution reduced customer journey time from 10–15 minutes
              to under five minutes — a concrete throughput metric that competitors have not publicly matched. Exotec's
              goods-to-person productivity advantage of 5x over manual picking is stated in marketing materials and
              corroborated by the E.Leclerc and Decathlon Canada testimonials. These named customer outcomes position
              Exotec as a credible AS/RS leader across retail, grocery, apparel, and industrial distribution verticals.
            claimRefs: []
