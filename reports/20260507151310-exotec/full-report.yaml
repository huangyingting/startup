      - number: '5.2'
        title: Technology architecture and engineering differentiation
        blocks:
          - type: paragraph
            body: >
              Skypod robots operate on a four-wheel drive (4WD) architecture with independent wheel control, enabling
              precise directional control in tight rack aisles. The robots move at up to 4 m/s (13.1 ft/s) horizontally
              — among the fastest AMR speeds in the G2P market. Vertical climbing is enabled by the rack structure's
              guide rails, which the robot's drive system engages when transitioning to vertical movement. This 3D
              mobility architecture (horizontal + vertical in a single robot) is Exotec's core mechanical
              differentiation vs. AutoStore (top-of-grid only) and mini-load cranes (vertical only). The robots
              incorporate regenerative braking — kinetic energy from deceleration is converted to electrical energy,
              reducing net energy consumption. Autonomous self-charging takes approximately 5 minutes per hour,
              requiring no manual intervention; robots return to charging stations during low-demand periods without
              operator action.


              Deepsky WES is the software orchestration layer. It runs as an enterprise software platform, integrating
              with the customer's ERP (SAP, Oracle) and WMS (Manhattan Associates, Blue Yonder, JDA) via API. Deepsky
              handles robot dispatching, storage slot assignment, traffic management, predictive maintenance alerts, and
              performance KPI reporting. The software is designed to orchestrate not just Exotec's own hardware but also
              third-party devices (conveyors, sorters, third-party robots), positioning Exotec as a software-neutral
              warehouse orchestration platform. Deepsky runs on-premises (customer edge infrastructure) or in a hybrid
              cloud configuration.


              Manufacturing is concentrated in Croix, France (Hauts-de-France), supported by regional industrial policy
              and Bpifrance backing. Key robot components include drive motors, wheel assemblies, sensors (LiDAR,
              proximity), and charging interfaces — sourced from European and Asian suppliers. The Skypiker robotic arm
              uses computer vision for item identification and pick planning, with a machine learning model trained on
              customer SKU data.
            claimRefs: []
