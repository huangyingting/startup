companyProfile:
  summary: >-
    Exotec is a French warehouse robotics company founded in 2015 by Romain Moulin (CEO) and Renaud Heitz (CTO) —
    engineers from robotics and mechatronics backgrounds. The company's core product is the Skypod system, a 3D
    autonomous mobile robot that climbs 14-metre racks at 4 m/s to retrieve items with sub-100ms precision, paired with
    the Deepsky WES (warehouse execution software) that orchestrates orders, robots, and conveyors. The Next-Gen Skypod
    (Feb 2025) delivers 50% throughput improvement and each+case handling in a single system. Exotec has deployed at
    135+ sites across 50+ brands globally, with $400M in pre-launch Next-Gen contracts. The company raised $335M at a
    $2B valuation in December 2021 (Series D, Goldman Sachs + 83North) and has not announced a new round since — making
    capital adequacy a material diligence question as of May 2026.
