  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation framework and comparables
        blocks:
          - type: paragraph
            body: >
              Exotec's $2B Series D valuation (December 2021) implies an 8–9x revenue multiple on estimated $213–256M
              2024 revenue. This premium was justified at issuance by the 2021 warehouse automation market boom
              (post-COVID e-commerce investment surge) and Exotec's unique 3D AMR architecture. As of May 2026, that
              multiple must be re-evaluated against three years of changed market conditions.


              The most relevant public comparable is AutoStore Systems, which trades on Oslo Stock Exchange (AUTO.OL) at
              a market cap of approximately $2.8–3.5B on 2024 revenue of $645.7M — implying a 4–6x revenue multiple
              post-market-contraction. AutoStore's premium reflects its 68% gross margin, $1.1B+ total revenue base, and
              global installed base. Exotec's smaller scale, lower margin, and private discount would typically warrant
              a 30–40% private discount to a public comp — suggesting a fair-value range of $1.4–2.0B at current revenue
              levels, consistent with the base case scenario.


              Two additional comparables: Hai Robotics (private, China-based, raised $200M at ~$1B+ valuation in 2022)
              and 6 River Systems (acquired by Flexport in 2019 for ~$130M, smaller scale) provide market data points.
              The premium segment of the market — truly differentiated AMR vendors with significant backlog — trades at
              8–12x revenue in bull-market conditions and 4–7x in bear/recovery conditions. Exotec sits at the premium
              end of the AMR market given its technology differentiation, but the $2B valuation requires the premium
              multiple to hold through a challenging 2024–2025 market environment.


              The investment thesis rests on three value drivers: (1) the $400M Next-Gen Skypod backlog, which provides
              forward revenue visibility equivalent to 1.5–2 years of current revenue; (2) the Deepsky WES SaaS layer,
              which provides potential for higher-margin recurring revenue as the installed base grows (each new Skypod
              deployment adds a Deepsky SaaS seat); (3) the North America commercial buildout, which represents untapped
              TAM at an earlier stage of adoption curve than Exotec's EU home market.
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs:
              - CV001
              - CV002
              - CV003
          - type: table
            tableRef: TV004
            claimRefs:
