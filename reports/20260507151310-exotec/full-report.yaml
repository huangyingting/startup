      - number: '8.2'
        title: Bull, base, and bear scenarios
        blocks:
          - type: paragraph
            body: >
              The bull scenario assumes: Next-Gen Skypod delivers 50%+ throughput improvement at volume, driving strong
              customer references at Grainger and Oxford Industries; NA revenue doubles to $200M+ by end-2026 (from
              $100M+ 2023 order intake, growing); market recovery in 2025 drives 10–15% sector rebound; Deepsky WES SaaS
              ARR reaches $30–50M by 2027; Series E closes at $3–3.5B valuation in H1 2027 with a new lead investor.
              Implied 2027 revenue: $400–450M (30–40% CAGR from estimated 2024 base). At 8x, valuation = $3.2–3.6B; at
              10x (top-of-range SaaS narrative), $4.0–4.5B.


              The base scenario assumes: Next-Gen Skypod delivers on specifications but at lower-than-projected volume
              in 2025 (production ramp slower than $400M backlog target); NA revenue grows to $150–175M by end-2026;
              market recovers 3–5% in 2025; Deepsky SaaS layer contributes $15–25M ARR; Series E or strategic secondary
              at $1.8–2.2B in 2026–2027. Implied 2026 revenue: $300–350M (20–25% CAGR). At 6x, valuation = $1.8–2.1B —
              flat to modest premium to 2021 price.


              The bear scenario assumes: Next-Gen Skypod throughput underperforms (30–40% improvement vs. 50% claimed),
              creating adverse references at NA customers; market contraction continues into 2025 at 5–8%; Goldman Sachs
              exercises exit preference; capital required before positive cash flow, triggering a down-round at
              $1.2–1.5B or an opportunistic acquisition by a strategic buyer (Dematic / KION Group, Vanderlande /
              TomTom, or Murata Machinery). Implied sale price: $1.0–1.5B, representing a 25–50% loss to 2021 investors.


              The current evidence landscape — $400M Next-Gen backlog, 3 consecutive CNBC Disruptor 50, $100M+ NA order
              intake doubling YoY — skews toward the base case with upside optionality to the bull case, provided the
              four key diligence asks are verified before investment.
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
              - CV004
              - CV005
              - CV006
          - type: table
            tableRef: TV005
            claimRefs:
              - CV001
              - CV002
              - CV014
          - type: figure
            figureRef: FV002
            claimRefs: []
      - number: '8.3'
        title: Recommendation, conditions, and kill criteria
        blocks:
          - type: paragraph
            body: >
              The conditional positive recommendation is grounded in Exotec's differentiated technology architecture,
              proven EU market position, credible NA commercial expansion, and unique Next-Gen Skypod product pipeline.
              Exotec has no direct equivalent among fully independent (non-Amazon) warehouse robotics vendors at this
              scale with this technology differentiation.


              Four conditions must be verified before investment commitment: (1) Manufacturing capacity: Exotec must
              confirm that Croix factory capacity and/or contract manufacturing is sufficient to deliver the $400M
              Next-Gen backlog within the committed customer timelines. (2) Next-Gen throughput proof: at least one
              commissioned Next-Gen Skypod site (Grainger or Oxford Industries) must demonstrate 45%+ throughput
              improvement in customer acceptance testing before investment. (3) IEC 62443 compliance: Deepsky WES must
              have an active IEC 62443 Level 2 certification path with a credible 2025 delivery date, given EU NIS2
              obligations for enterprise customers. (4) Cap table and Goldman exit alignment: Goldman Sachs fund
              timeline and exit preference must be aligned with a 2027+ IPO or secondary rather than a 2025–2026 forced
              sale.


              Investment-grade conditions are met on: technology differentiation (3D AMR architecture is
              hardware-defensible), EU market proof (135+ sites, E.Leclerc CEO 5-minute journey time reduction,
              Decathlon VP quote), and team quality (founders with track record, Goldman/83North board oversight).


              Kill criteria that would invalidate the thesis: Next-Gen Skypod fails customer acceptance at any of the
              first three NA sites; Deepsky WES suffers a cyberattack at a production customer site; Goldman Sachs
              initiates a secondary sale before 2026 without investor alignment; or Exotec misses its $400M backlog
              delivery timeline by more than two calendar quarters.
            claimRefs: []
          - type: table
            tableRef: TV003
