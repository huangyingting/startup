        blocks:
          - type: paragraph
            body: >
              Exotec's financial risk profile is dominated by three factors: (1) Hardware-heavy margin gap — estimated
              30–50% gross margin vs. AutoStore's public 68%, creating a structural cost-of-capital and R&D investment
              disadvantage that compounds over time; (2) Funding gap — 4+ years since Series D (Dec 2021, $335M), with
              no publicly announced Series E or credit facility. Monthly burn estimated at $5M–$15M implies potential
              capital need by mid-2026 depending on revenue cash positivity; (3) Market contraction — warehouse
              automation market contracted 7–11% in 2024 (per AutoStore 2024 Annual Report), indicating that enterprise
              capex budgets tightened and pipeline conversion rates slowed.


              The $400M Next-Gen Skypod backlog provides strong forward revenue visibility but also creates working
              capital risk: hardware must be manufactured before project payment is received, and any delivery delays
              create both revenue recognition delays and customer relationship risk. If Exotec cannot scale the Croix
              manufacturing facility to meet $400M in hardware demand without capital investment, the backlog could
              create a negative-cash-flow period requiring bridge financing.


              Key thesis-break risks: (1) Next-Gen Skypod fails to deliver promised 50% throughput improvement at volume
              — would turn Oxford Industries and Grainger from positive to adverse references and destroy NA sales
              momentum; (2) A significant cyberattack on a Deepsky WES deployment would damage Exotec's reputation and
              trigger NIS2/IEC 62443 enforcement; (3) Goldman Sachs forces a sale or IPO at a valuation below the $2B
