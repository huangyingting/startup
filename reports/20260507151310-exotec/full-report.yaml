  - id: FV001
    title: Recommendation logic
    type: flow
    insight: >-
      The conditional positive recommendation flows from four converging inputs: technology moat (strong), EU market
      proof (strong), NA commercial evidence (emerging), and valuation/financial risk (high). Entry discipline on price
      and pre-investment verification of four diligence asks are the gating factors before unconditional commitment.
    data:
      nodes:
        - id: f1
          label: Technology Moat (Strong)
          description: 3D AMR architecture; Next-Gen 50% throughput; Deepsky WES SaaS; 135+ deployed sites
        - id: f2
          label: EU Market Proof (Strong)
          description: E.Leclerc CEO journey-time quote; Decathlon VP ops; Carrefour, ASDA, UNIQLO references
        - id: f3
          label: NA Commercial Evidence (Emerging)
          description: $100M+ 2023 order intake doubling YoY; Grainger + Oxford Industries Next-Gen contracts
        - id: f4
          label: Valuation & Financial Risk (High)
          description: 8–9x revenue multiple at $2B; 4+ year funding gap; single-factory risk; Goldman exit pressure
        - id: f5
          label: Pre-Investment Conditions Required
          description: Manufacturing capacity audit; Next-Gen throughput proof; IEC 62443 compliance; cap table + Goldman alignment
        - id: f6
          label: Conditional Positive Signal
          description: Unique technology; strong EU proof; credible NA growth; compelling management
        - id: f7
          label: Conditional Positive Recommendation
          description: Invest at $1.8–2.2B (base case) with 4 diligence conditions verified; avoid bull-case pricing
        - id: f8
          label: Kill Criteria
          description: Next-Gen throughput failure; Goldman forced exit; manufacturing disruption; Deepsky cyberattack
    sourceRefs:
      - SV001
      - SV005
      - SV007
  - id: FV002
    title: Valuation sensitivity
    type: bar
    insight: >-
      Exotec's implied valuation ranges from $1.2B (bear, 5x distressed multiple on $240M revenue) to $4.2B (bull, 10x
      on $420M revenue). The base case ($1.9B at 6x on $320M) is roughly flat to the 2021 Series D, requiring sustained
      growth to prevent dilution.
    data:
      items:
        - label: 'Bear: 5x $240M revenue'
          value: 1.2
          unit: $B
        - label: 'Bear-base: 5x $320M revenue'
          value: 1.6
          unit: $B
        - label: 'Base: 6x $320M revenue'
          value: 1.9
          unit: $B
        - label: Series D Reference ($2.0B)
          value: 2
          unit: $B
        - label: 'Base-bull: 7x $320M revenue'
          value: 2.2
          unit: $B
        - label: 'Bull: 8x $420M revenue'
          value: 3.4
          unit: $B
        - label: 'Bull max: 10x $420M + Deepsky SaaS'
          value: 4.2
          unit: $B
    sourceRefs:
      - SV007
      - SV010
      - SV011
  - id: FV003
    title: Valuation / return range
    type: range
    insight: >-
      The exit valuation range for a 2027 IPO or Series E spans $1.2B (bear, distressed exit or acquisition) to $4.2B
      (bull, IPO with SaaS premium). Base case at $1.9B implies breakeven to modest loss for 2021 investors; upside
      requires Next-Gen success and Deepsky SaaS traction.
    data:
      items:
        - label: 'Bear: Acquisition / down-round (2026)'
          low: 1
          high: 1.5
          mid: 1.2
        - label: 'Base: Series E or secondary (2026–27)'
          low: 1.8
          high: 2.2
          mid: 2
        - label: 'Bull: Series E / IPO (2027)'
          low: 2.8
          high: 4.2
          mid: 3.4
    sourceRefs:
      - SV005
      - SV006
      - SV010
  - id: FV004
    title: Investment KPIs
    type: kpi
    insight: >-
      Exotec scores strong on market size, technology moat, and EU customer proof, but medium on financial transparency
      and valuation (premium multiple without audited financials creates sizing uncertainty).
    data:
      items:
        - label: Market size
          value: Strong — $23B+ TAM with 10–20% CAGR (automation megatrend)
          claimRefs:
            - CV017
        - label: Technology moat
          value: Strong — 3D AMR architecture; Next-Gen Skypod 50% throughput; Deepsky WES SaaS
          claimRefs:
            - CV018
        - label: Customer proof
          value: Strong (EU) / Emerging (NA) — E.Leclerc, Decathlon, ASDA, Grainger, Oxford Industries
          claimRefs:
            - CV019
        - label: Revenue / growth
          value: Medium — $213–256M estimated (not audited); NA order intake doubling YoY
          claimRefs:
            - CV020
        - label: Margin / economics
          value: Medium-Low — estimated 30–50% gross margin; hardware-heavy vs. AutoStore 68%
          claimRefs:
            - CV021
        - label: Risk rating
          value: Medium-High — single-factory, funding gap, Goldman exit, NIS2/AI Act compliance
          claimRefs:
            - CV022
        - label: Valuation
          value: Medium — $2B (8–9x) premium requires sustained growth; base case flat to 2021
          claimRefs:
            - CV023
        - label: Evidence quality
          value: Medium — strong EU evidence; NA financial opacity; no audited accounts
          claimRefs:
            - CV024
