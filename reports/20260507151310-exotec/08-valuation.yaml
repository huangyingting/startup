callouts:
  - id: KV001
    type: recommendation
    title: >-
      Conditional Positive — invest at base-case pricing ($1.8–2.2B) with four pre-investment diligence conditions
      verified
    body: >-
      Exotec is a genuinely differentiated warehouse robotics company with a defensible technology moat and strong EU
      market proof. The investment risk is primarily concentrated in four areas that can be verified pre-close: (1)
      manufacturing capacity adequacy, (2) Next-Gen Skypod throughput proof, (3) Deepsky IEC 62443 security compliance,
      and (4) Goldman Sachs exit alignment. Subject to satisfactory verification of these four conditions, a conditional
      positive recommendation is appropriate at base-case pricing ($1.8–2.2B). Entry at bull-case pricing ($2.5B+) is
      not recommended without Next-Gen volume proof.
    claimRefs:
      - CV001
      - CV002
      - CV003
    sourceRefs:
      - SV001
      - SV002
  - id: KV002
    type: risk
    title: The 2021 $2B valuation is defensible in the base case but may require a down-round in the bear scenario
    body: >-
      AutoStore's public multiple compression (4–6x on $645M revenue) and the 2024 market contraction (7–11%) place
      Exotec's 8–9x implied multiple at the high end of current market. If Next-Gen Skypod underperforms or Goldman
      Sachs accelerates exit, a down-round at $1.2–1.5B is a realistic bear scenario. 2021-vintage investors should
      stress-test liquidation preference stacks accordingly.
    claimRefs:
      - CV010
      - CV008
      - CV026
    sourceRefs:
      - SV007
      - SV006
