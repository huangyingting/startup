  - id: TV006
    title: Final diligence asks table
    type: standard
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner / diligence path
    rows:
      - - Manufacturing capacity audit
        - No disclosed Croix factory output capacity (units/year), contract manufacturing backup, or second-site plan
        - Single-factory risk is the most severe unmitigated operational risk for $400M backlog
        - Require plant tour + capacity certification from Exotec COO; engage independent ops consultant
      - - Next-Gen throughput proof
        - No live customer acceptance data for Next-Gen Skypod (launched Feb 2025; first installations pending)
        - 50% throughput claim drives the entire NA sales pipeline and $400M backlog rationale
        - Request Grainger or Oxford Industries preliminary acceptance test results; or defer until Q3 2025
      - - Deepsky IEC 62443 / NIS2 compliance
        - No public IEC 62443 Level 2+ certification; NIS2 compliance assessment not public
        - EU enterprise customers require security attestation; non-compliance blocks EU enterprise procurement
        - Require Deepsky security audit report + IEC 62443 certification timeline from CTO
      - - Audited financials or clean data room
        - Exotec has not disclosed audited financials. Revenue estimated at $213–256M from third-party data (Growjo)
        - Cannot verify burn rate, gross margin, or capital adequacy without financial statements
        - Request 2023 and 2024 statutory accounts from Exotec (French SASU filings via Greffe)
      - - Cap table and Goldman Sachs exit timeline
        - Cap table, liquidation preference stack, and Goldman fund lifecycle timeline are not public
        - Goldman forced exit risk is a material valuation and governance risk
        - Require current cap table, investor rights summary, and Goldman Sachs LP fund maturity date
      - - Deepsky SaaS ARR and contract terms
        - No Deepsky ARR, NRR, contract length, or renewal terms are public
        - Deepsky SaaS layer is the margin-improvement and valuation-upside driver; without data, it is speculative
        - Request Deepsky contract terms summary, ARR as of Q1 2026, NRR from 2022–2025 cohorts
