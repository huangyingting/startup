  - id: TV005
    title: Thesis-break and kill triggers table
    type: standard
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - Next-Gen Skypod throughput failure
        - Customer acceptance <40% throughput vs. 50% claimed
        - NA sales pipeline collapses; bear scenario activated; $1.0–1.5B exit valuation
        - Exit position; do not invest; reassess at $1.2B or below
      - - Goldman Sachs forced exit / secondary sale
        - Goldman initiates secondary before 2026 without 2-year investor alignment
        - Signals company health concern; creates adverse deal optics; may trigger down-round
        - Require Goldman alignment letter before investment; monitor fund lifecycle
      - - Manufacturing disruption (Croix)
        - Plant shutdown >4 weeks
        - $400M backlog delay; revenue recognition shifts; customer penalty exposure
        - Emergency bridge financing may be needed; monitor factory operational status
      - - Deepsky WES cyberattack at production site
        - Confirmed breach or ransomware at any Exotec-powered site
        - Reputational damage; NIS2 enforcement; customer contract review; pipeline freeze
        - Security audit before investment; require IEC 62443 compliance confirmation
      - - Market contraction continues ≥5% in 2025
        - AutoStore 2025 Annual Report confirms ≥5% further market decline
        - Pipeline conversion rates fall; Exotec's $400M backlog delivery risk; bear scenario
        - Increase confidence threshold for NA pipeline verification
      - - No Series E by Q4 2026
        - Absence of new round announcement by Q4 2026
        - Capital adequacy concern; Goldman exit forced; down-round risk elevated
        - 'Require cash runway disclosure: minimum 18 months; verify burn rate'
