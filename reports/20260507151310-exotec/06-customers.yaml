      topic: "NRR, GRR, Deepsky subscription renewal rate, and customer churn events"
      missingEvidence: "No publicly disclosed NRR, GRR, or Deepsky subscription renewal rate. No confirmed customer churn events (customer switching from Exotec to AutoStore or Hai Robotics) are publicly documented."
      whyItMatters: "Retention metrics are the primary indicator of customer health. Without NRR/GRR data, retention is inferred from structural switching costs and the $400M repeat-order backlog — both are reasonable proxies but not confirmed metrics."
      relatedQuestionRefs: [QU012]
      severity: high

    - type: partial-evidence
      topic: "Customer revenue concentration (top 5 customers as % of total)"
      missingEvidence: "Revenue breakdown by customer is not publicly disclosed. With 50+ brands over 135+ sites, top-customer concentration cannot be calculated. Enterprise hardware project businesses commonly have 40–60% revenue concentration in top 5 customers."
      whyItMatters: "High revenue concentration creates a material risk: if E.Leclerc or Carrefour delays site expansion, Exotec's EU revenue growth could stall significantly."
      relatedQuestionRefs: [QU017]
      severity: medium

    - type: no-public-evidence
      topic: "NA customer pipeline (2024) and new-vs-repeat breakdown"
      missingEvidence: "Exotec confirmed $100M+ NA order intake in 2023 doubling YoY, but no 2024 NA order intake figure has been publicly confirmed. New-vs-repeat breakdown and NA pipeline by customer are not disclosed."
      whyItMatters: "NA is the primary growth market. Without 2024 NA intake data, the sustainability of the doubling-YoY trajectory is unconfirmed."
      relatedQuestionRefs: [QU005]
      severity: medium

