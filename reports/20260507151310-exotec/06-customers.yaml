callouts:
  - id: KU001
    type: strength
    title: "CEO-level customer endorsement from E.Leclerc and NYSE-listed NA references (Grainger, Oxford Industries) provide cross-vertical, multi-geography proof at the highest credibility tier"
    body: "Three reference tiers: (1) E.Leclerc CEO publicly quantified the operational improvement (10–15 min → under 5 min customer journey) — highest evidence quality in Exotec's portfolio; (2) Grainger (NYSE: GWW, $15.2B revenue) and Oxford Industries (NYSE: OXM) as Next-Gen Skypod customers provide enterprise-grade NA references; (3) Decathlon, Carrefour, Gap, UNIQLO form a broad multi-vertical corroborating set."
    claimRefs: [CU007, CU008, CU010, CU015, CU016]
    sourceRefs: [SU006, SU007, SU008]

  - id: KU002
    type: risk
    title: "Hardware project model creates customer revenue concentration risk and retention uncertainty without disclosed NRR/GRR"
    body: "Exotec's 50+ customers over 135+ sites implies average 2.7 sites per customer — but without disclosed revenue concentration data, it is unknown whether top 5 customers represent 30% or 60% of revenue. Hardware project businesses with enterprise clients typically have significant concentration. NRR and GRR data for Deepsky subscriptions and SLA renewals are not publicly available — retention is inferred from structural switching costs and repeat-order proxy ($400M backlog) rather than confirmed by metrics."
    claimRefs: [CU017, CU020, CU021]
    sourceRefs: [SU010, SU012]

