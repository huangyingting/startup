      missingEvidence: "Exotec states 50+ named brands but only ~10 are individually publicly confirmed. The remaining 40+ customer brands are unknown. The named customer proof table is therefore a partial enumeration of the full customer set."
      whyItMatters: "Unknown customers may include higher-risk accounts (smaller brands, pilots rather than production, or customers in financial stress) that would change the overall customer quality assessment."
