figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    data:
      items:
        - label: "Awareness"
          detail: "Enterprise supply chain team sees Exotec at trade show (LogiMAT, ProMat) or via Goldman Sachs / integrator referral. CNBC Disruptor 50 creates brand awareness."
        - label: "Evaluation"
          detail: "DC survey, ROI model, competitor evaluation (AutoStore, Hai Robotics). 9–18 month sales cycle. Goldman Sachs and named customer references (E.Leclerc, Grainger) accelerate evaluation."
        - label: "Procurement"
          detail: "Multi-stakeholder approval (CSCO, CFO, IT, Operations). $5M–$50M+ capex budget. Goldman Sachs backing and 83North provide institutional credibility for procurement committee."
        - label: "Deployment"
          detail: "Skypod installation in existing building. Deepsky WES integration with ERP/WMS. Exotec field team commissioning. Typical deployment 3–9 months."
        - label: "Go-live"
          detail: "Initial operation; SLA clock starts (99%+ uptime). Deepsky subscription begins. Customer trains operators; Skypicker arm calibrated to SKU set."
        - label: "Expansion"
          detail: "Additional sites, robot count increases, or Next-Gen Skypod upgrade. $400M pre-launch backlog = existing customer expansion cycle confirmed."

