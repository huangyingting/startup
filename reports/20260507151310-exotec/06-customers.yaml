company:
  name: Exotec
chapter:
  order: 6
  number: 6
  title: "Customers"
  letter: U
  summary: |
    Exotec has built a reference-grade customer base of 50+ named brands across retail, grocery, industrial distribution, and e-commerce fulfillment on 3 continents. Marquee customers include Carrefour, Gap, Decathlon, UNIQLO, E.Leclerc, Grainger, Oxford Industries, ASDA, Cdiscount, and Geodis. Customer retention is structurally high: Deepsky WES integration into customer ERP/WMS systems creates multi-year switching costs, and $400M in Next-Gen Skypod pre-launch contracts from existing customers confirms repeat purchase behavior. Concentration risk is meaningful — a hardware-project model with 50+ brands over 135+ sites implies average 2.7 sites per customer, but revenue is likely concentrated in the top 10 customers. Customer proof quality is high for EU/UK names (CEO-level quotes, measurable outcomes); NA proof is earlier-stage. Primary retention risk: a poor delivery on the $400M Next-Gen backlog could damage reference relationships.

sections:
  - id: S01
    title: "Customer base segmentation"
    body: |
      Exotec's customer base spans four primary verticals: (1) Grocery/food retail (Carrefour, E.Leclerc, ASDA, Cdiscount) — the largest vertical by site count, given European grocery drive-through fulfillment as Exotec's original use case; (2) General retail and apparel (Gap Inc, Decathlon, UNIQLO, Oxford Industries) — Exotec's strongest NA customer examples; (3) Industrial distribution (Grainger, Geodis) — primarily Exotec's North American expansion customers; and (4) E-commerce and logistics (Cdiscount, Geodis, other 3PL operators). The geographic split is approximately 70–80% Europe and 20–30% North America, with Japan as a nascent market.

      By customer size, Exotec operates primarily in the mid-to-large enterprise segment ($500M+ revenue companies), as AS/RS systems require minimum project investment of $5M+. Buyers are typically VP-level or Chief Supply Chain Officers, with IT, Finance, and Operations as stakeholders in the purchase decision. Payers are the enterprise — typically via capex budget. Users are warehouse operations managers, pickers (human or robotic arm), and IT systems integrators who connect Deepsky to WMS/ERP.

      The E.Leclerc deployment is Exotec's flagship grocery reference: France's largest grocery retailer, multiple site deployments, with a CEO-level endorsement (customer journey: 10–15 minutes → under 5 minutes). The Grainger and Oxford Industries deployments (Next-Gen Skypod, 2025) are Exotec's flagship NA industrial distribution and apparel references — both NYSE-listed companies with enterprise-grade procurement standards, providing high-credibility references for NA sales.

  - id: S02
    title: "Adoption trajectory and customer growth"
    body: |
      Exotec's adoption trajectory is documented through a set of operational milestones. From 0 sites at founding (2015) to 10+ sites by 2020 (first commercial deployments), to 50+ sites by 2022, to 130–135+ sites by 2024 — a roughly 5–7x growth in site count over 2020–2024. The North America adoption curve is the most important growth signal: NA order intake exceeded $100M in 2023, doubling year-over-year from 2022. Since first NA deployment (~2022), NA growth has been consistently cited as the primary growth market.

      The repeat-order dynamic is critical: the $400M in Next-Gen Skypod pre-launch contracts (Feb 2025) across 20+ projects is the strongest adoption proof. The companies ordering Next-Gen systems — Oxford Industries, Grainger, E.Leclerc — are existing customers expanding their deployments, not net-new customers. This repeat purchase validates: (1) operational satisfaction with Gen 1; (2) customer confidence in Exotec's roadmap; and (3) the multi-year customer relationship model. Net new customer acquisition (beyond 135+ existing sites) is less documented publicly.

      The 50+ named brand customer count (company-stated) over 135+ sites implies an average of approximately 2.7 sites per customer — suggesting a meaningful proportion of customers have expanded beyond their initial deployment. However, detailed site-count-per-customer data is not publicly disclosed, making concentration analysis difficult.

  - id: S03
    title: "Named customer proof and retention assessment"
    body: |
      Customer proof quality varies by geography and relationship tenure. European customers provide the highest-quality proof: E.Leclerc CEO has publicly quantified improvement (customer journey: 10–15 min → under 5 min); Carrefour, Gap, and Decathlon are publicly identified as customers with deployment confirmed. North American customer proof is increasingly strong: Grainger (NYSE: GWW, $15.2B revenue 2023) and Oxford Industries (NYSE: OXM) are publicly disclosed Next-Gen Skypod customers, providing reference-grade credibility for NA enterprise sales.

      Retention durability is structurally high due to Deepsky WES integration. Once Deepsky is integrated with a customer's ERP and WMS, the switching cost includes: (1) software re-integration cost (estimated 3–6 months of IT engineering); (2) physical robot and rack removal and replacement cost; (3) operational disruption during transition; (4) retraining of warehouse staff on new system. These combined switching costs create a strong installed-base retention moat.

      The primary retention risk is delivery performance on the $400M Next-Gen Skypod backlog. If Next-Gen systems underperform the stated 50% throughput and 30% density claims at volume, customers like Oxford Industries and Grainger — both NYSE-listed with public supply chain disclosures — could become adverse references rather than positive case studies. Adversarial customer evidence: AutoStore's 2024 annual report cites market contraction (7–11% decline) — if automation budgets tighten, some Exotec customers may delay second-site deployments.

