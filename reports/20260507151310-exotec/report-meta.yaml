companyProfile:
  summary: Exotec is a French warehouse robotics company founded in 2015 by Romain Moulin (CEO) and Renaud Heitz (CTO) — engineers from robotics and mechatronics backgrounds. The company's core product is the Skypod system, a 3D autonomous mobile robot that climbs 14-metre racks at 4 m/s to retrieve items with sub-100ms precision, paired with the Deepsky WES (warehouse execution software) that orchestrates orders, robots, and conveyors. The Next-Gen Skypod (Feb 2025) delivers 50% throughput improvement and each+case handling in a single system. Exotec has deployed at 135+ sites across 50+ brands globally, with $400M in pre-launch Next-Gen contracts. The company raised $335M at a $2B valuation in December 2021 (Series D, Goldman Sachs + 83North) and has not announced a new round since — making capital adequacy a material diligence question as of May 2026.
  foundedDate: "2015-01-01"
  founders:
    - name: Romain Moulin
      role: CEO and co-founder
      background: Mechatronics engineer; Exotec's commercial, product, and external-facing leader. Named entrepreneur of the year (BFM Business). Drives fundraising, customer relationships, and strategic direction.
      claimRefs: [CO003]
    - name: Renaud Heitz
      role: CTO and co-founder
      background: Robotics engineer; architect of the Skypod mechanical design and Deepsky WES software architecture. Owns R&D direction, product roadmap, and engineering team of 1,300+.
      claimRefs: [CO003]
  foundingLocation: "Croix (Lille), France"
  headquarters: "Croix (Lille), France; North America HQ: Atlanta, GA (since 2022)"
  productSummary: "Skypod 3D AMR system (4 m/s, 30 kg payload, 14 m rack height, regenerative braking, 5 min/hr charging); Deepsky WES (order orchestration, robot coordination, ERP/WMS integration with SAP, Oracle, Manhattan Associates); Skypath (integrated conveyors); Skypicker (robotic arm, 600 items/hr). Next-Gen Skypod (Feb 2025): 50% higher throughput, 30% higher density, combined each+case handling. Skypod software platform for predictive maintenance and operational analytics."
  customerFocus: "Tier-1 and Tier-2 e-commerce and omnichannel retailers and 3PLs needing high-throughput order fulfilment automation. EU-dominant customer base (E.Leclerc, Carrefour, ASDA, UNIQLO, Cdiscount, Decathlon, Geodis); growing NA base (Grainger, Oxford Industries/Tommy Bahama)."
  businessModel: "Hardware sale (Skypod robots + rack + Skypath conveyors) + Deepsky WES SaaS license + maintenance and field service. Revenue model is primarily hardware project-based with a growing SaaS layer from Deepsky — creating a hybrid hardware+software margin profile."
  stage: late-stage private
  fundingStatus: "$446M total raised. Series D: $335M at $2B valuation, December 2021, led by Goldman Sachs Growth Equity and 83North, with Dell Technologies Capital. Prior investors: Breega, 360 Capital, IRIS Capital, Bpifrance. No Series E announced as of May 2026 — 4+ year funding gap."
