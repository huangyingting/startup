summary:
  headline: >
    Horizon3.ai is the autonomous pentesting category leader with a FedRAMP-validated federal moat, 5,200+ customers,
    and 102% ARR growth—but its ~$1B unicorn valuation at undisclosed absolute ARR implies a premium multiple that
    warrants further diligence on revenue scale and customer concentration before conviction investing.
