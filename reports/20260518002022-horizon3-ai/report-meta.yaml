companyProfile:
  summary: |
    Horizon3.ai is a San Francisco-based cybersecurity company that develops NodeZero, an
    autonomous AI-driven penetration testing platform. Founded in 2019 by US Special Operations
    veterans and enterprise technologists, the company enables organizations to continuously
    find and fix exploitable vulnerabilities by emulating real attacker behavior—without
    requiring human pentesters for each engagement. NodeZero has safely run 225,000+ autonomous
    pentests in production, serves 5,200+ customers including one-third of Fortune 10 companies
    and major US federal agencies, and is the only autonomous pentesting platform with FedRAMP
    High authorization. The company raised $100M in Series D financing in November 2024,
    achieving unicorn status (~$1B valuation), and reported 102% YoY ARR growth as of
    March 2026.
  foundedDate: "2019-01-01"
  founders:
    - name: "Snehal Antani"
      role: "CEO and Co-Founder"
      background: |
        Former CTO of Splunk and CTO of Cisco Infrastructure Solutions Group; US Army veteran
        and intelligence community alumnus; holds 18 US patents in network security.
      claimRefs: ["CO002"]
    - name: "Mark Cristiano"
      role: "CTO and Co-Founder"
      background: |
        Enterprise security and network technology background; leads product engineering
        and technical strategy for the NodeZero platform.
      claimRefs: ["CO001"]
  foundingLocation: "San Francisco, CA, USA"
  headquarters: "San Francisco, CA, USA"
  productSummary: |
    NodeZero is an autonomous, self-service penetration testing SaaS platform that requires no
    persistent agents or sensors on the customer environment. The platform launches ephemeral
    attack infrastructure, discovers and exploits vulnerabilities, chains attack paths to
    demonstrate true blast radius, and delivers prioritized remediation guidance with proof
    of exploitability. Key modules include: external attack surface testing, internal network
    pentesting, cloud pentesting (AWS/Azure/GCP), Active Directory assessment, phishing impact
    testing, password auditing, and NodeZero Tripwires (deception technology). NodeZero Federal
    is the FedRAMP High authorized variant supporting air-gapped and on-premises federal
    deployments. The platform integrates with Splunk, ServiceNow, Jira, Microsoft Sentinel,
    and CrowdStrike Falcon.
  customerFocus: >
    US federal agencies (DoD, DHS, NIH, NSA, VA) and Defense Industrial Base, large enterprise
    and mid-market organizations in financial services, healthcare, critical infrastructure,
    and technology; served via direct sales and MSSP channel partnerships globally.
  businessModel: >
    Annual SaaS subscription licensing for NodeZero platform; tiered by deployment scope,
    operation types, and seat count; NodeZero Federal priced at a premium for FedRAMP
    environments; ancillary professional services and MSSP reseller programs; land-and-expand
    motion upselling from external to internal, cloud, and compliance use cases.
  stage: "Series D (unicorn)"
  fundingStatus: >
    $100M Series D raised November 2024 (~$1B valuation); $40M Series C raised Q3 2022 (Craft
    Ventures, Kleiner Perkins); $15M Series B 2022 (Signal Fire, Gaingels); earlier seed
    rounds; total raised approximately $175M+. Prosperity7 Ventures (Aramco) added as
    strategic investor.
  disclosureProfile: private-undisclosed
  claimRefs: ["CO001", "CO002", "CO006", "CO011"]

summary:
  headline: >
    Horizon3.ai is the autonomous pentesting category leader with a FedRAMP-validated federal
    moat, 5,200+ customers, and 102% ARR growth—but its ~$1B unicorn valuation at undisclosed
    absolute ARR implies a premium multiple that warrants further diligence on revenue scale
    and customer concentration before conviction investing.
