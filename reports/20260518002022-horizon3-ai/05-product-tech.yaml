  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: soc2-audit-report-unavailable
      missingEvidence: >-
        Horizon3.ai claims SOC 2 Type II certification for its cloud operations but has not published
        the audit report. Without the report, the scope, auditor identity, audit period, and coverage
        of specific controls (availability, confidentiality, security) cannot be independently verified.
      whyItMatters: >-
        Enterprise buyers in regulated industries (healthcare, finance, federal) routinely require review
        of SOC 2 Type II reports during vendor due diligence. The absence of a public report means buyers
        must request it under NDA, introducing delay and the possibility that the scope is narrower than
        marketed. This affects the trust-posture assessment in the compliance-trust section.
      diligencePath: >-
        Request the full SOC 2 Type II audit report from Horizon3.ai legal/compliance team under NDA.
        Verify auditor firm identity, audit period (last 12 months), and whether cloud operations and
        tenant isolation controls are explicitly in scope. Cross-reference with FedRAMP assessment report
        (SAR) which may contain overlapping control evidence.
      relatedQuestionRefs: [QE015]

    - type: private-evidence-only
      severity: minor
      topic: llm-provider-mcp-server-undisclosed
      missingEvidence: >-
        The LLM provider or proprietary model stack underlying the NodeZero MCP Server and Mythos attack
        path intelligence layer has not been publicly disclosed by Horizon3.ai. It is unclear whether the
        AI reasoning is powered by a third-party model (OpenAI, Anthropic, Google Gemini) or a proprietary
        Horizon3.ai-trained model, and what data governance policies apply to prompt/response logging.
      whyItMatters: >-
        Enterprise customers with data residency or confidentiality requirements need to know whether
        attack findings are processed by third-party LLM APIs. If findings are sent to a commercial LLM,
        this creates a data governance concern for customers in regulated industries. Dependency on
        third-party model providers also introduces pricing and availability risk.
      diligencePath: >-
        Request disclosure of AI/ML architecture stack from Horizon3.ai product team. Ask specifically
        whether NodeZero attack findings are transmitted to third-party LLM APIs, and under what data
        retention and processing terms. Review MCP Server documentation at docs.horizon3.ai for any
        published data handling guidance.
      relatedQuestionRefs: [QE008, QE018]

    - type: missing-source
      severity: minor
      topic: cloud-pentest-depth-vs-cnapp-platforms
      missingEvidence: >-
        No independent benchmark or analyst comparison exists evaluating NodeZero's cloud pentest
        coverage depth (IAM attack path enumeration, cloud-native service exploitation, lateral movement)
        against Cloud-Native Application Protection Platform (CNAPP) vendors such as Wiz, Orca Security,
        or Prisma Cloud. Horizon3.ai positions cloud pentest as complementary to CNAPP posture
        management, but the boundary and relative depth of attack path coverage is unverified.
      whyItMatters: >-
        Cloud security teams often use both CSPM/CNAPP and pentest tools. Without a clear benchmark,
        customers cannot assess whether NodeZero's cloud attack path chaining is additive to Wiz or
        duplicates what CNAPP already finds. This limits decision-making on tool consolidation and
        budget allocation for cloud security.
      diligencePath: >-
        Commission an independent head-to-head evaluation comparing NodeZero Cloud Pentest against
        a CNAPP platform (Wiz or Orca) in a shared AWS environment. Measure attack paths found by each.
        Alternatively, review any third-party analyst evaluations of the Adversarial Exposure Validation
        market from Gartner or Forrester for cloud-specific coverage comparisons.
      relatedQuestionRefs: [QE022]

    - type: missing-source
      severity: minor
      topic: nodezero-false-positive-rates-unpublished
      missingEvidence: >-
        No public data exists on NodeZero's false-positive rate for findings across internal, external,
        or cloud pentests. Gartner Peer Insights includes one 3-star review citing results that did not
        make intuitive sense, suggesting false-priority findings occur, but no systematic measurement or
        vendor-published accuracy benchmark is available. Competing platforms also lack published
        benchmarks, making objective comparison impossible.
      whyItMatters: >-
        False positives in pentest output consume remediation budget and erode trust in the platform.
        For MSSPs delivering NodeZero-generated reports to clients, high false-positive rates increase
        human review costs and reduce the efficiency advantage over manual testing. Absence of benchmarks
        prevents enterprise buyers from making evidence-based platform selection decisions.
      diligencePath: >-
