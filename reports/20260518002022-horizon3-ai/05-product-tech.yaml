  - id: roadmap-releases
    title: "Roadmap, Release History, and Growth Trajectory"
    body: >-
      Horizon3.ai has systematically expanded NodeZero from a single internal pentest capability into a
      multi-surface continuous security validation platform. The company launched core internal and external
      pentest operations in 2021 and 2022, added cloud infrastructure and Kubernetes testing in 2023 and
      2024, and secured FedRAMP High authorization in 2023. The $100 million Series D funding round in
      November 2024 provided capital to accelerate enterprise segment growth and global partner expansion.

      The 2025 release calendar included NodeZero Tripwires (deception technology), NodeZero Insights
      (exposure management), and the NodeZero MCP Server (AI tool integration), reflecting a strategic
      shift from point-in-time testing toward continuous detection and AI-integrated security workflows.
      First-half 2025 results showed 137% year-over-year ARR growth, with enterprise segment expansion of
      485% year-over-year. As of September 2025, nearly 4,000 organizations were using NodeZero with over
      170,000 pentests executed since inception. Gartner recognized Horizon3.ai as a Customers' Choice in
      the October 2025 Adversarial Exposure Validation Voice of the Customer report.

      For 2026, Horizon3.ai is advancing "Mythos," an AI-driven attack path intelligence capability
      providing LLM-assisted interpretation of complex multi-hop attack chains. Specific feature milestones
      and general availability dates for Mythos and planned Continuous Attack Surface Management (CAASM)
      integrations remain undisclosed beyond high-level marketing descriptions.
