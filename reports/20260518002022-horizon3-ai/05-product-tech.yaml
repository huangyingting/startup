  - id: integration-ecosystem
    title: "Integration Architecture and Partner Ecosystem"
    body: >-
      NodeZero integrates with enterprise security operations infrastructure through a growing set of connectors.
      The flagship integration, announced in 2025, connects NodeZero to ServiceNow Vulnerability Response,
      synchronizing pentest findings directly into ServiceNow ITSM workflows for risk-based remediation
      prioritization and ticket lifecycle management. The platform also integrates with SIEM and SOAR
      platforms including Splunk and Microsoft Sentinel, enabling pentest findings to flow into SOC alert
      pipelines and correlation rules.

      The Vanguard Partner Program provides structured market access for MSSPs, MSPs, and technology
      resellers through Silver, Gold, and Platinum tiers, each with differentiated margin structures, deal
      registration rights, and co-selling resources. A 2025 partnership with Pax8, a cloud marketplace and
      aggregator, extended NodeZero distribution to Pax8's network of more than 30,000 MSP partners across
      North America and internationally, representing a significant channel expansion beyond direct enterprise
      sales.

      The NodeZero MCP Server, launched in 2025, bridges offensive security intelligence and the AI tool
      ecosystem by exposing verified exploit data through the Model Context Protocol. This enables AI
      security agents and LLM-based tools to consume real-time attack surface context from NodeZero's
      findings. Horizon3.ai maintains an active developer presence on GitHub with 41 or more public
      repositories including open-source CVE proof-of-concept tools, reinforcing the platform's credibility
      in the security research community.
