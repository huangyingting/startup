  - id: technical-risks
    title: "Technical Risks and Product Limitations"
    body: >-
      NodeZero's product trajectory is strong, but several diligence-relevant risks and limitations merit
      scrutiny. Gartner Peer Insights reviews from enterprise customers reveal mixed signals at the
      practitioner level: a 4-star review from an insurance sector CISO rated the tool a competent
      "cloud-based security tool" but raised compliance concerns, while a 3-star review from a services
      sector CIO cited scheduling issues and test results that did not make intuitive sense, suggesting
      usability and result interpretation challenges for teams without dedicated offensive security
      expertise. These reviews represent a limited sample but align with the inherent complexity of
      autonomous pentest output for non-specialist users.

      The platform's reliance on H3 Cloud infrastructure for all external and agentless tests creates a
      dependency on Horizon3.ai's cloud availability; no publicly disclosed SLA for pentest uptime is
      available. The AI reasoning layer (Mythos/MCP Server) depends on undisclosed LLM providers, creating
      integration risk if those providers change APIs or pricing. The SOC 2 Type II audit report for
      Horizon3.ai's cloud operations is claimed but not publicly available, preventing independent scope
      verification. Published third-party benchmarks comparing NodeZero's exploitation coverage depth and
      false-positive rates against competing platforms such as Pentera are absent from public sources,
      limiting objective comparison for enterprise buyers evaluating total cost of ownership.
    claimRefs:
      - CE018
      - CE032
      - CE033
      - CE034
    tableRefs: []
    figureRefs: [FE004]

