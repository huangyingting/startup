chapter:
  number: 6
  title: "Customers"
  summary: "Horizon3.ai's NodeZero platform served 5,200+ organizational customers globally as of March 2026 — including four Fortune 10 companies, NSA Cybersecurity Collaboration Center, CISA OCIO, FBI, Centers for Medicare and Medicaid Services, the world's largest banks, and leading U.S. healthcare systems. Customer count grew more than 30% in the six months between September 2025 (~4,000) and March 2026, alongside 102% ARR growth and 125% Net Dollar Retention, signaling both rapid new logo acquisition and strong land-and-expand economics. Key risks are channel concentration (~70% of customers via MSSPs), heavy reliance on anonymous case studies for enterprise/healthcare evidence, and a federal segment that is gated entirely behind FedRAMP High authorization continuity."

sections:
  - id: customer-base-and-segmentation
    title: "Customer Base Segmentation and Verticals"
    body: |
      Horizon3.ai's 5,200+ organizational customer base as of March 2026 spans five primary verticals: DoD/federal government, healthcare, financial services, manufacturing/critical infrastructure, and SLED (state, local, and education). Federal customers are the most publicly documented: the NSA Cybersecurity Collaboration Center uses NodeZero under the Continuous Adversarial Penetration Testing (CAPT) program to protect Defense Industrial Base organizations; CISA's Office of the CISO leverages NodeZero for vulnerability assessments that are shared with Federal Civilian Executive Branch agencies; the FBI deploys NodeZero for autonomous pentesting; and the Centers for Medicare and Medicaid Services (CMS) uses it for healthcare compliance testing. DoD Platform One and the Tradewinds Solutions Marketplace each awarded NodeZero awardable status in the first half of 2026, enabling procurement without a full acquisition cycle.

      Enterprise commercial customers are broader but almost entirely anonymous. Horizon3.ai disclosed as of March 2026 that four of the Fortune 10 and the world's largest banks are active customers. Healthcare customers include the nation's largest healthcare system (60+ production tests across 30+ network segments) and a leading U.S. hospital and healthcare system whose ZeroLogon (CVE-2020-1472) vulnerability was discovered and remediated via NodeZero. Financial services customers include an insurance and financial company where NodeZero discovered an AWS environment compromise in under ten minutes, and a large financial institution where a 14-hour pentest uncovered 586 critical impacts and three full domain admin compromises. Manufacturing customers include a leading U.S. manufacturer running weekly pentests with 94 attack paths eliminated, including Iranian tradecraft scenarios.

      Approximately 70% of NodeZero's 5,200+ customers are delivered via Managed Security Service Providers (MSSPs) and Managed Service Providers (MSPs), making the channel the dominant go-to-market. Channel partners include NCC Group, Optiv, Thrive, CDW, and Sentinel Technologies for enterprise MSSP delivery, and Pax8 for SMB/mid-market access across 40,000+ MSP partners. The direct segment covers primarily federal and large enterprise customers where procurement vehicles (GSA, Platform One, Tradewinds) facilitate direct contracting. NodeZero is also available on the ServiceNow integration marketplace for customers leveraging risk-based remediation workflows.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: named-customer-proofs
    title: "Named Customer Proofs and Production Case Studies"
    body: |
      The strongest independent customer evidence comes from four categories: named federal deployments publicly confirmed in press releases, anonymous enterprise case studies documented on Horizon3.ai's blog, Gartner Peer Insights reviews, and MSSP partner case studies. Federal customers are the most verifiable tier: NSA Cybersecurity Collaboration Center, CISA OCIO, FBI, and CMS are all named in public press releases and intelligence blog posts, providing the highest-assurance third-party validation available. The CAPT program at the NSA, which uses NodeZero to test Defense Industrial Base networks on behalf of DoD, is particularly significant because it demonstrates trust from the U.S. intelligence community's most security-conscious entity.

      Enterprise case studies published on Horizon3.ai's intelligence blog provide operational depth but at the cost of anonymity. The healthcare case studies document a nation's largest healthcare system adopting NodeZero as part of a Continuous Threat Exposure Management (CTEM) program, running 60+ tests across 30+ network segments. A second healthcare case study (via Liberman Networks MSSP) documents ZeroLogon discovery and remediation at a leading U.S. hospital system. The manufacturing case study details weekly Pentest Wednesday deployments, 94 attack paths eliminated, and identification of Iranian-linked tradecraft techniques in an M&A scenario. The financial services case studies document AWS environment compromise discovery in under 10 minutes and a 14-hour engagement yielding 586 critical impacts. These anonymous case studies are credible for operational pattern validation but cannot serve as referenceable customer names for procurement.

      Gartner Peer Insights provides the most independent customer voice. As of August 2025, NodeZero carried 73 published reviews averaging 4.7 out of 5.0 stars with 90% willingness to recommend, earning Gartner's Customers' Choice distinction in the October 2025 Voice of the Customer report for Adversarial Exposure Validation. However, a single 3.0-star "CRITICAL" review posted August 21, 2024 noted scheduling issues with a partner and test results that were difficult to interpret, representing the most concrete adverse customer signal identified during diligence. This isolated negative review versus 72 positive reviews (4.8+ average after excluding the 3.0 review) is a low-severity adverse signal but demonstrates that MSSP delivery quality can be inconsistent.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: customer-growth-trajectory
    title: "Customer Growth Trajectory and Adoption Metrics"
    body: |
      Horizon3.ai's customer growth trajectory across 2024–2026 is among the strongest in the enterprise cybersecurity segment. The company ranked #121 overall and #1 in cybersecurity on the 2025 Inc. 5000 list of America's fastest-growing private companies, based on 2,962% three-year revenue growth from 2021 to 2024. The Deloitte Technology Fast 500 ranked Horizon3.ai #3 in North America for 2025 (out of 500 companies) based on 19,939% three-year growth — the highest growth rate verified for any cybersecurity company in that ranking.

      Customer count progression is documented at several points: approximately 4,000 organizations as of the 1H 2025 results (September 2025, reflecting 137% ARR growth YoY); approximately 4,500 at the time of the Deloitte Fast 500 ranking (November 2025); and 5,200+ by March 2026 (FY2026 results, reflecting 102% ARR growth YoY). Enterprise segment growth was particularly pronounced at 485% YoY through 1H 2025, indicating successful upmarket motion beyond the initial SMB/mid-market MSSP channel penetration. By March 2026, NodeZero had executed 225,000+ production-safe penetration tests, representing an average of approximately 43 tests per organization over the company's lifetime — a volume that validates recurring usage, not just initial deployment.

      The Fast Company 2026 Most Innovative Companies recognition (in the enterprise software category) and the NatSec 100 listing for two consecutive years provide independent third-party validation of both product innovation and national security market credibility. Channel bookings reached 32% of Q4 2025 bookings, up from a lower base, indicating the MSSP/channel motion is accelerating. The combination of 102% ARR growth and 125% NDR as of March 2026 implies the customer cohort is both growing and expanding — each cohort of retained customers is spending approximately 25–31% more in subsequent years (125% NDR minus 94% GDR implies ~31% average expansion rate for retained accounts).
    claimRefs: [CU018, CU019, CU020, CU021, CU022, CU023, CU024, CU025, CU026]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: retention-satisfaction-and-expansion
    title: "Retention, Customer Satisfaction, and Expansion Dynamics"
    body: |
      The most significant quantitative evidence of customer durability is the 125% Net Dollar Retention (NDR) and 94% Gross Dollar Retention (GDR) reported in Horizon3.ai's FY2026 results (March 2026). These metrics are company-stated and unaudited, but their internal consistency is notable: 94% GDR implies 6% gross churn (organizations that fully depart the platform annually), while the 31-point spread between GDR and NDR (125% - 94% = 31%) implies that retained customers are expanding spend by approximately 33% on average each year. This land-and-expand ratio is high by SaaS standards and plausibly reflects the Pentest Wednesday recurring model converting one-time assessments into annual or monthly subscriptions, plus NodeZero Insights cross-sell and module expansions.

      Gartner Peer Insights data (73 reviews, 4.7/5.0 average, 90% willingness to recommend, as of August 2025) provides independent customer satisfaction evidence. The Customers' Choice designation from Gartner in October 2025 is meaningful because it requires a minimum number of validated reviews and a peer recommendation threshold that pure vendor-curated testimonials cannot achieve. However, the absolute review count of 73 is relatively low for a platform with 5,200+ customers — a less than 1.5% verified-review rate — which limits the statistical generalizability of the rating. The adverse 3.0-star review on Gartner Peer Insights is the only identified critical customer voice in the public record; it cites MSSP scheduling issues and unclear reporting rather than product failure, suggesting the adverse signal is partner-execution-related rather than platform-performance-related.

      The Pentest Wednesday recurring cadence is the key structural driver of expansion economics. Customers who adopt Pentest Wednesday shift from one-time or annual test purchases to weekly continuous validation subscriptions, dramatically increasing ACV per customer and creating contract stickiness. Case studies confirm this pattern: the manufacturing customer runs weekly tests, the healthcare system runs 60+ tests, and the financial services customer runs weekly AWS pentests. This cadence model is analogous to subscription-based security monitoring services and creates renewal dynamics that are structurally different from project-based pentesting.
    claimRefs: [CU027, CU028, CU029, CU030, CU031, CU032, CU033, CU034]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: channel-concentration-and-risks
    title: "Channel Model, Concentration Risk, and Procurement Dynamics"
    body: |
      Horizon3.ai's channel-led go-to-market model is both a strength and a concentration risk. The ~70% MSSP/MSP delivery rate as of March 2026 enables NodeZero to reach SMB and mid-market customers that would be uneconomical to serve directly, and the Pax8 partnership gives access to 40,000+ MSP partners. However, MSSP concentration means that if one or more top MSSP partners churned, reduced NodeZero deployments in favor of a competitor, or experienced their own revenue decline, a significant portion of Horizon3.ai's customer base would be at risk. The adverse Gartner review already surfaced one instance of MSSP execution friction (scheduling and reporting clarity issues with a partner), suggesting that MSSP-delivered customer experience is not uniformly controlled.

      Federal procurement creates a different kind of concentration risk: the entire federal segment depends on the continuity of FedRAMP High authorization. If Horizon3.ai's FedRAMP High authorization were suspended, failed reauthorization, or a competitor achieved equivalent authorization, the federal moat would erode. The transition from FedRAMP Rev4 to FedRAMP 3.0 (initiated 2025) represents a near-term compliance upgrade requirement. The awardable status on DoD Platform One and Tradewinds Marketplace (both achieved in 2025–2026) are positive access signals, but awardable status alone does not guarantee contract flow — federal agencies must still issue orders, and those orders are subject to appropriations and contracting officer discretion.

      Customer concentration at the top end (Fortune 10) represents both a revenue quality signal and a risk. Four Fortune 10 companies as customers implies that a small number of relationships may constitute a disproportionate share of direct ARR. If any one Fortune 10 customer churned or consolidated vendors, the impact could be material. Similarly, the world's largest bank category, while representing multiple customers, suggests dependence on a concentrated financial-services revenue tier. Horizon3.ai has not disclosed what percentage of ARR comes from the top 10 customers — this is a key diligence gap that should be a data room request. Diligence should also confirm that the 5,200+ customer count represents distinct organizations rather than counting multiple subsidiaries of the same enterprise.
    claimRefs: [CU035, CU036, CU037, CU038, CU039, CU040, CU041, CU042]
    tableRefs: [TU005]
    figureRefs: []

