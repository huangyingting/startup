figures:
  - id: FU001
    title: "Customer Journey Map"
    type: journey-map
    layout: standard
    summary: "Seven-stage customer journey from initial awareness through advocacy, illustrating how NodeZero buyers move from regulatory or breach-event triggers through evaluation, pilot, deployment, Pentest Wednesday expansion, and ultimately reference customer status. Federal and commercial paths diverge at procurement but converge at the Pentest Wednesday recurring cadence stage."
    data:
      nodes:
        - id: awareness
          label: "Awareness — CISO identifies compliance mandate, breach event, or board-level pressure triggering security validation need"
          type: entry
        - id: evaluation
          label: "Evaluation — RFP, demo request, or GSA/Platform One procurement vehicle research; FedRAMP High status shortlists NodeZero for federal buyers"
          type: stage
        - id: pilot
          label: "POC / Pilot — Production-safe architecture deployed; first pentest executed in live environment; attack graph reviewed with security team"
          type: stage
        - id: procurement
          label: "Procurement / Contract — Direct (GSA, Platform One, Tradewinds for federal; enterprise direct) or via MSSP partner (NCC Group, Optiv, Pax8)"
          type: stage
        - id: deployment
          label: "Initial Deployment — NodeZero external or internal pentest; ZeroLogon / AD audit; cloud pentest; first critical impact findings delivered"
          type: stage
        - id: expansion
          label: "Pentest Wednesday Expansion — Recurring weekly testing cadence; add-on modules (NodeZero Insights, cloud, phishing, AD audit); ACV expansion"
          type: stage
        - id: advocacy
          label: "Advocacy / Reference — Customer becomes named reference (if federal/SLED) or anonymous case study; contributes Gartner Peer Insights review"
          type: exit
    approximationNotes: "Journey stages are inferred from case study descriptions and product documentation. Conversion rates between stages are not publicly disclosed. Federal path diverges at procurement stage (government contract vehicles vs. direct commercial)."
    claimRefs: [CU001, CU009, CU027, CU035]

  - id: FU002
    title: "Adoption / Deployment Funnel"
    type: funnel
    layout: standard
    summary: "Five-stage customer acquisition and expansion funnel for NodeZero, from total addressable enterprise universe through active customers and Pentest Wednesday recurring subscribers. Values represent estimated population sizes at each funnel stage based on available company disclosures and market estimates."
