  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "absolute-arr"
      missingEvidence: "Absolute ARR in dollar terms; only 102% growth rate (percentage, no denominator) is publicly disclosed"
      whyItMatters: "Without an ARR denominator, revenue scale, burn rate, capital efficiency, and exit multiple cannot be calculated; the 102% figure is unanchored for financial modeling"
      diligencePath: "Request audited or reviewed financial statements from company; triangulate from employee count and ARR-per-employee benchmarks for SaaS; ask for most recent investor deck ARR disclosure"
      relatedQuestionRefs: [QO010]
      relatedTableRefs: [TO001]

    - type: private-evidence-only
      severity: material
      topic: "funding-series-d-details"
      missingEvidence: "Series D lead investor identity, full participant list, liquidation preference structure, and anti-dilution provisions"
      whyItMatters: "Lead investor identity determines governance control, exit preferences, and follow-on support; liquidation stack affects equity waterfall and founder returns in acquisition scenarios"
      diligencePath: "Request cap table and Series D financing documents; search Delaware corporate filings; contact company IR; review any public investor portfolio announcements post-Nov 2024"
      relatedQuestionRefs: [QO005]
      relatedTableRefs: [TO003]

    - type: private-evidence-only
      severity: material
      topic: "governance"
      missingEvidence: "Board composition including investor-nominated directors, independent directors, and observer-level investors post-Series D"
      whyItMatters: "Board structure determines founder control vs investor control, consent rights for M&A and IPO decisions, and protective provisions that could constrain exit optionality"
      diligencePath: "Request current board roster and charter; review Delaware public filings for director names; ask for disclosure of all observer rights granted"
      relatedQuestionRefs: [QO021]
      relatedTableRefs: [TO002, TO003]

    - type: missing-source
      severity: material
      topic: "funding-series-a-b"
      missingEvidence: "Series A and Series B financing details including dates, sizes, valuations, and investor identities (beyond SignalFire)"
      whyItMatters: "Full cap table history required to calculate total dilution, understand early investor governance rights, and assess whether early investors are seeking liquidity"
      diligencePath: "Request cap table from company; check Crunchbase/PitchBook for historical round data; search SEC EDGAR for any US-registered Horizon3.ai entity disclosures"
      relatedQuestionRefs: [QO006]
      relatedTableRefs: [TO003, TO004]

    - type: private-evidence-only
      severity: minor
      topic: "headcount-and-burn"
      missingEvidence: "Employee headcount, departmental breakdown, and cash burn rate"
      whyItMatters: "Headcount is the primary burn driver for SaaS companies; without it, runway post-Series D and capital efficiency cannot be estimated; ARR-per-employee benchmark is the minimum required for efficiency assessment"
      diligencePath: "Request headcount by department in formal diligence; cross-reference LinkedIn employee count; ask for twelve-month cash burn and runway disclosure"
      relatedQuestionRefs: [QO010]

    - type: private-evidence-only
      severity: minor
      topic: "prosperity7-investment-terms"
      missingEvidence: "Size, structure (equity vs convertible, pro-rata rights), and any commercial co-sell or exclusivity terms associated with the Prosperity7 Ventures strategic investment"
      whyItMatters: "Strategic investments from sovereign-linked entities may carry commercial obligations, exclusivity provisions, or information-sharing requirements that affect IP ownership and data governance for other customers"
      diligencePath: "Request investment agreement and any side letter from Horizon3.ai; confirm no CFIUS review was triggered; assess whether Aramco-affiliated commercial rights exist"
      relatedQuestionRefs: [QO027]
      relatedTableRefs: [TO003]

    - type: private-evidence-only
      severity: minor
      topic: "pricing-and-deal-size"
      missingEvidence: "NodeZero published or negotiated pricing tiers across SMB, mid-market, enterprise, and federal customer segments; average contract value and deal size"
      whyItMatters: "Without pricing benchmarks, unit economics and CAC/LTV modeling require assumptions; comparison to manual penetration testing cost savings cannot be verified"
      diligencePath: "Request pricing schedule in formal diligence; review federal procurement databases for any disclosed contract values; benchmark against competitor PTaaS pricing (Cobalt.io, Synack)"
      relatedQuestionRefs: [QO023]

    - type: missing-source
      severity: minor
      topic: "customer-churn"
      missingEvidence: "Public evidence of customer churn rate, net revenue retention, contract cancellations, or publicly lost enterprise accounts"
      whyItMatters: "102% ARR growth is consistent with high NRR, but without explicit NRR disclosure the growth could reflect aggressive new customer acquisition masking early churn; NRR is critical for SaaS quality assessment"
      diligencePath: "Request NRR, GRR, and cohort retention data in formal diligence; conduct customer reference calls; check G2/Gartner Peer Insights for negative churn-related reviews"
      relatedQuestionRefs: [QO020]

