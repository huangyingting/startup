  title: "Company Overview"
  summary: "Horizon3.ai is a San Francisco-based cybersecurity company founded in 2019 that developed NodeZero, an autonomous penetration testing platform that has safely run 225,000+ pentests across 5,200+ customer organizations. The company raised $140M in total capital—including a $100M Series D at a $1B+ valuation in November 2024—and reported 102% year-over-year ARR growth as of March 2026. NodeZero Federal is the only FedRAMP High Authorized autonomous pentesting platform, positioning Horizon3.ai as the dominant operator-led, 100% USA-made player in the autonomous security validation category."

sections:
  - id: company-identity
    title: "Company Identity and Business Model"
    body: |
      Horizon3.ai is a private cybersecurity software company headquartered in San Francisco, California, with additional offices in Chicago, Illinois, and Amsterdam, Netherlands. The company operates as a remote-first organization and was founded in 2019 by veterans of US Special Operations Command (SOCOM) and the US National Security community. Its mission is to help organizations of every size find and fix exploitable attack vectors before threat actors can reach them—continuously and autonomously.

      The company's flagship commercial product is NodeZero®, a fully autonomous penetration testing (pentesting) platform delivered as a SaaS subscription. NodeZero requires no persistent agents, no pre-provided credentials, and no specialized operator expertise to deploy. Organizations can launch a pentest in minutes, and the platform executes the full attack lifecycle—reconnaissance, exploitation, lateral movement, and impact demonstration—autonomously in live production environments. Upon completion, NodeZero delivers prioritized impact findings with step-by-step remediation guidance and one-click fix verification. The platform covers internal network pentesting, external attack surface assessment, cloud pentesting (AWS, Azure, GCP), Active Directory password auditing, Kubernetes security validation, and identity security validation.

      Horizon3.ai's business model centers on annual SaaS subscriptions priced per engagement volume or continuous testing commitment, with additional revenue streams from partner white-label licensing to MSSPs and managed service providers. The company explicitly positions its product offering as purpose-built by practitioners who conducted actual offensive security missions for the US government—giving NodeZero what the company calls operator-grade attack authenticity. All Horizon3.ai products are developed, engineered, and manufactured in the United States; the company prominently uses the tagline "100% made in USA" across marketing and government procurement materials. NodeZero Federal, the government-specific product variant, is the only FedRAMP High Authorized autonomous penetration testing platform as of mid-2026, enabling sale to US federal civilian agencies and defense components.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008, CO031]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: leadership-governance
    title: "Founders, Leadership, and Governance"
    body: |
      Horizon3.ai was co-founded in 2019 by Snehal Antani, who serves as Chief Executive Officer. Antani's background provides direct founder-market fit with the product's core value proposition: he previously served as Chief Technology Officer of the Joint Special Operations Command (JSOC)—the US military's premier counter-terrorism and special missions unit—as well as CTO of US Special Operations Command (SOCOM), and as Chief Technology Officer at Splunk (the enterprise data platform that Cisco acquired for approximately $28B in 2024). Before Splunk, Antani served as Chief Information Officer at GE Capital. He holds 18 US patents spanning network security, data analytics, and distributed systems. The combination of national-security offensive-operations experience and enterprise-SaaS commercialization scale is rare and is central to Horizon3.ai's positioning in both the federal and commercial enterprise markets.

      Rishi Dhasmana serves as Chief Technology Officer and is responsible for NodeZero's platform architecture, product engineering, and research direction. The company's broader executive team is experienced and IPO-capable in composition: Holly Grey serves as Chief Financial Officer with over 30 years of financial leadership experience, including a background guiding technology companies through public market preparation processes. Matt Hartley serves as Chief Revenue Officer. Andres Botero was appointed Chief Marketing Officer on January 7, 2026, bringing over two decades of B2B security and enterprise SaaS marketing experience at companies including Rubrik (cloud data security), BlackLine (financial automation), and CallidusCloud. Jill Passalacqua serves as Chief Legal Officer with expertise in government contracting compliance and enterprise software IP. Chris Corbett leads engineering as VP Engineering; he previously co-developed the Signal iOS application and conducted research at NASA, holding a PhD in Computational Physics. Erick Dean leads product as VP Product, with prior tenures at PagerDuty, Splunk, and C3.ai, and holds 6 US patents.

      Key-person concentration is a material governance risk: CEO Antani's unique government network, national-security credibility, and enterprise brand are deeply embedded in Horizon3.ai's federal business development pipeline and customer trust. No public board composition, governance structure, or equity distribution information has been disclosed. No material leadership departures, shareholder disputes, or regulatory sanctions against any named executive have been identified as of Q2 2026.
    claimRefs: [CO001, CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO020]
    tableRefs: [TO002]

  - id: funding-investors
    title: "Funding History and Investor Ecosystem"
    body: |
      Horizon3.ai has raised $140 million in total venture capital across its disclosed financing rounds. The most recent and largest round was a $100 million Series D closed in November 2024, which was accompanied by a confirmed $1 billion-plus post-money valuation—making Horizon3.ai a unicorn. The Series D was announced on November 5, 2024 via GlobeNewswire and was covered by major cybersecurity trade publications including Dark Reading. The company did not publicly identify the lead investor or all participants in the Series D.

      The Series C was a $40 million round closed in October 2022. Craft Ventures, the venture capital firm co-founded by David Sacks and Bill Lee, is identified as a lead investor in Horizon3.ai and is listed on its public portfolio page. Craft Ventures partners Michael Robinson and Kevin Gabura were specifically cited in connection with the Series C investment, reflecting a thesis around autonomous AI-powered security infrastructure. SignalFire, the technology-first venture capital firm known for its data-driven approach to early-stage investing, is also an identified investor in Horizon3.ai.

      In January 2026, Horizon3.ai announced a strategic investment from Prosperity7 Ventures, the diversified venturing arm of Aramco Ventures (the corporate investment platform of Saudi Aramco). This investment was explicitly framed around a shared priority to safeguard AI datacenters and critical infrastructure. The Prosperity7 partnership signals Horizon3.ai's ambitions in the Middle East and GCC sovereign infrastructure market, where Saudi Aramco operates one of the world's most complex and high-value industrial cyber environments. The size of the Prosperity7 strategic investment has not been publicly disclosed. Earlier financing rounds (Series A and Series B) preceding the 2022 Series C have not been detailed publicly in terms of size, valuation, or investors. No debt facilities, convertible notes, or revenue-based financing have been publicly identified.
    claimRefs: [CO021, CO022, CO023, CO024, CO025, CO026, CO027, CO028, CO029]
    tableRefs: [TO003]

  - id: scale-traction
    title: "Revenue, Scale, and Customer Traction"
    body: |
      Horizon3.ai's scale metrics indicate meaningful enterprise adoption and durable demand acceleration. As of early 2026, NodeZero has safely executed more than 225,000 autonomous pentests in live production environments—a figure that functions as a proxy for platform trust, production-safety reliability, and customer engagement volume at scale. The company reports 5,200+ customer organizations globally, spanning enterprise, federal government, mid-market, MSSP, and healthcare segments. More than one-third of Fortune 10 companies—the ten largest US public companies by revenue—are confirmed Horizon3.ai customers, providing marquee enterprise validation at the highest tier of organizational credibility.

      On March 19, 2026, Horizon3.ai announced 102% year-over-year ARR growth. The company has not disclosed an absolute ARR figure in dollar terms; the 102% growth rate is the only public financial performance metric available. This growth rate, if sustained, would place Horizon3.ai among the small cohort of enterprise SaaS companies still achieving greater than 100% ARR growth at Series D capitalization levels. Industry recognition provides corroborating signal: Horizon3.ai ranked #1 in Security on the Inc. 5000 list of fastest-growing private US companies and #3 overall on the Deloitte Technology Fast 500. Fast Company named Horizon3.ai #4 on its Most Innovative Companies 2026 list in the Security sector.

      Headcount is not publicly disclosed. LinkedIn-based estimation suggests a distributed team of fewer than 500 employees, consistent with the company's remote-first model and capital-efficient SaaS structure. The MSSP and managed service partner channel is growing, with NodeZero available as a white-label platform for security service providers serving downstream enterprise clients. The Amsterdam office provides coverage of EU regulatory demand (DORA, NIS2) among European financial services and critical infrastructure operators.
    claimRefs: [CO030, CO031, CO032, CO033, CO034, CO035, CO036, CO037]
    tableRefs: []
    figureRefs: [FO003]

  - id: product-portfolio
    title: "Product Portfolio and Platform Architecture"
    body: |
      Horizon3.ai's product portfolio centers on NodeZero, which encompasses multiple operational modes and deployment configurations. The platform's core capability is autonomous internal network pentesting, in which NodeZero chains together exploitable vulnerabilities, harvested credentials, misconfigurations, and weak security policies to demonstrate real attack paths—emulating the techniques of advanced persistent threat (APT) actors and ransomware operators. NodeZero External Attack Surface extends validation to internet-facing assets. NodeZero Cloud covers AWS, Azure, and GCP environments, with identity and privilege escalation path validation. NodeZero AD Password Audit evaluates Active Directory password health against credential-based attack patterns. NodeZero for Kubernetes validates container orchestration security configurations.

      The platform's technical architecture rests on a one-time-use ephemeral virtual private cloud environment provisioned for each pentest. This isolation mechanism ensures that test activity is contained, cannot traverse to adjacent systems or customer data outside the defined test scope, and leaves no persistent footprint in the production environment upon completion. NodeZero integrates as a Model Context Protocol (MCP) server for security automation workflows and exposes a documented API for programmatic pentest orchestration. The platform also integrates with common enterprise security ecosystems including SIEMs, SOARs, and ITSM tools.

      NodeZero Federal, the government-specific product variant, holds FedRAMP High Authorization—the highest civilian compliance tier for US federal cloud services, requiring independent third-party assessment against the NIST SP 800-53 High baseline of 800+ security controls. NodeZero Federal also serves as the offensive security engine for the NSA's Continuous Autonomous Penetration Testing (CAPT) program, which as of May 2025 had assessed hundreds of Defense Industrial Base (DIB) suppliers, providing national-security-scale validation of the platform's production safety. On May 14, 2026, NodeZero was designated Awardable on the DoD Tradewinds Solutions Marketplace, enabling accelerated federal procurement without a full competitive acquisition process.

      Horizon3.ai operates an attack research and vulnerability disclosure program, publishing rapid-response security advisories on critical CVEs and emerging nation-state TTPs. All product development and engineering occurs in the United States.
    claimRefs: [CO004, CO005, CO006, CO007, CO038, CO039, CO040, CO041, CO042, CO043]
    figureRefs: []

  - id: milestones-events
    title: "Key Milestones and Strategic Developments"
    body: |
      Horizon3.ai's corporate timeline charts rapid progression from a government-veteran startup to the leading autonomous penetration testing platform. The company was founded in 2019 by US Special Operations Command and National Security veterans, with co-founder and CEO Snehal Antani bringing unique operator credibility from his JSOC/SOCOM CTO and Splunk CTO roles. The company developed and refined the NodeZero platform through 2019-2022, establishing early commercial traction with enterprise and federal customers before its first significant external validation.

      In October 2022, Horizon3.ai closed a $40 million Series C financing round with participation from Craft Ventures and SignalFire, funding enterprise go-to-market scale and product investment. The November 2024 $100 million Series D—raising the company's total capital to $140 million and confirming a $1 billion-plus valuation—represented the most significant external financial validation in the company's history and funded continued federal expansion, product platform investment, and potential M&A optionality. The FedRAMP High Authorization for NodeZero Federal (granted in 2024) opened the highest tier of US federal civilian and defense agency procurement. The NSA CAPT program adoption validated NodeZero as production-safe at national-security scale, assessing hundreds of Defense Industrial Base suppliers by May 2025.

      In January 2026, the company appointed Andres Botero as CMO and announced the Prosperity7 Ventures strategic investment from Saudi Aramco's venturing arm—both signals of category leadership preparation and international market expansion. The March 2026 announcement of 102% year-over-year ARR growth confirmed demand acceleration. On May 14, 2026, DoD Tradewinds Awardable status further strengthened Horizon3.ai's federal procurement pathway. Industry recognition—Fast Company MIC 2026 #4 Security, Inc. 5000 #1 Security, Deloitte Fast 500 #3—reinforced revenue growth trajectory from independent third parties.
    claimRefs: [CO001, CO021, CO022, CO023, CO030, CO031, CO038, CO039, CO040, CO041, CO043, CO044, CO045]
    tableRefs: [TO004]
    figureRefs: [FO001]

