chapter:
  number: 8
  title: "Valuation & Investment Recommendation"
  summary: >
    Horizon3.ai raised $100 million in a November 2024 Series D at an implied ~$1 billion
    post-money valuation, achieving unicorn status. The company operates in the fast-growing
    autonomous penetration-testing-as-a-service (PTaaS) segment, claims 5,200+ customers and
    24× ARR growth since 2020, and holds a FedRAMP High authorization that creates a durable
    government-sector moat. At the $1B mark, the implied EV/ARR multiple spans 12–33×
    depending on the unverified ARR figure ($30–80M), placing it at a meaningful premium to
    mature cybersecurity SaaS peers but in line with high-growth comparables such as
    SentinelOne. The base-case recommendation is conditional: track at current price and
    convert to buy only upon verified ARR ≥$80M, NRR >110%, and an entry multiple at or
    below 15× ARR. Bull, base, and bear cases yield valuations of $2.5–3.5B, $1.0–1.5B,
    and $400–600M respectively. Key thesis-break triggers include a down round, loss of
    federal contract renewals, and a competitor achieving comparable FedRAMP authorization.

