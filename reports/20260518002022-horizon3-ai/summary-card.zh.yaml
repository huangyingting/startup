summary:
  headline: >
    Horizon3.ai 是自主渗透测试品类龙头，FedRAMP 验证的联邦护城河、5,200+ 客户和 102% ARR 增速都很硬；但绝对 ARR 未披露时给到约 $1B
    独角兽估值，意味着溢价倍数，重仓前还要继续核收入规模和客户集中度。
