            installed
          type: step
        - id: n4
          label: Reconnaissance and Asset Discovery
          detail: Network scanning, service enumeration, credential harvesting surface mapping; OSINT for external scope
          type: step
        - id: n5
          label: Credential and Vulnerability Testing
          detail: >-
            Production-safe exploitation attempts; no destructive payloads; credential spraying, CVE exploitation,
            config abuse
          type: step
        - id: n6
          label: Attack Chain Assembly
          detail: Multi-hop path construction; attack graph built across users, services, and systems; MITRE ATT&CK mapping
          type: step
        - id: n7
