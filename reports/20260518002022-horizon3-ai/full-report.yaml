      - number: '2.2'
        title: 'TAM/SAM/SOM: Sizing the Penetration Testing Opportunity'
        blocks:
          - type: paragraph
            body: >
              The penetration testing market is sized differently by independent analyst firms, reflecting
              methodological variation in what is counted (manual services only vs. platform subscriptions vs. hybrid
              engagements) and how geographic coverage is defined. MarketsandMarkets projects the global penetration
              testing market at $1.98B in 2025, growing to $4.39B by 2031 at a 14.2% CAGR. Mordor Intelligence, using a
              proprietary estimation framework updated in 2026, places the same market at $2.36B in 2025, rising to
              $5.54B by 2031 at a 15.29% CAGR. The midpoint of these two estimates—approximately $2.17B for 2025 and
              $4.97B for 2031—represents a reasonable base-case view. Both firms project similar directional growth,
              confirming double-digit CAGR as the consensus.


              The PTaaS subsegment—the category most directly aligned with Horizon3.ai's NodeZero platform—is sized
              separately by MarketsandMarkets at $0.72B in 2026, projected to reach $1.98B by 2031 at a 22.6% CAGR. This
              growth rate significantly exceeds the broader penetration testing market, reflecting the structural shift
              from periodic manual assessments to continuous subscription-based platforms. The autonomous AI-native
              pentesting subcategory (where Horizon3.ai most directly competes) is not sized independently by any public
              analyst report, representing a material evidence gap.


              From a TAM/SAM/SOM perspective: the TAM is the broader security testing market ($10.96B–$40.99B by 2031,
              MarketsandMarkets), the SAM is the penetration testing and PTaaS market ($2.97B combined in 2025–2026),
              and Horizon3.ai's SOM can be inferred as the enterprise and federal customer segments it actively
              addresses. Given 5,200+ customers and the $0.72B PTaaS market base, Horizon3.ai's implied market
              penetration by customer count is significant—but without disclosed ARR data, revenue-based market share is
              unquantifiable from public sources.
