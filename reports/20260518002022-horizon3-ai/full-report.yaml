      - number: '6.4'
        title: Retention, Customer Satisfaction, and Expansion Dynamics
        blocks:
          - type: paragraph
            body: >
              The most significant quantitative evidence of customer durability is the 125% Net Dollar Retention (NDR)
              and 94% Gross Dollar Retention (GDR) reported in Horizon3.ai's FY2026 results (March 2026). These metrics
              are company-stated and unaudited, but their internal consistency is notable: 94% GDR implies 6% gross
              churn (organizations that fully depart the platform annually), while the 31-point spread between GDR and
              NDR (125% - 94% = 31%) implies that retained customers are expanding spend by approximately 33% on average
              each year. This land-and-expand ratio is high by SaaS standards and plausibly reflects the Pentest
              Wednesday recurring model converting one-time assessments into annual or monthly subscriptions, plus
              NodeZero Insights cross-sell and module expansions.


              Gartner Peer Insights data (73 reviews, 4.7/5.0 average, 90% willingness to recommend, as of August 2025)
              provides independent customer satisfaction evidence. The Customers' Choice designation from Gartner in
              October 2025 is meaningful because it requires a minimum number of validated reviews and a peer
              recommendation threshold that pure vendor-curated testimonials cannot achieve. However, the absolute
              review count of 73 is relatively low for a platform with 5,200+ customers — a less than 1.5%
              verified-review rate — which limits the statistical generalizability of the rating. The adverse 3.0-star
              review on Gartner Peer Insights is the only identified critical customer voice in the public record; it
              cites MSSP scheduling issues and unclear reporting rather than product failure, suggesting the adverse
              signal is partner-execution-related rather than platform-performance-related.


              The Pentest Wednesday recurring cadence is the key structural driver of expansion economics. Customers who
              adopt Pentest Wednesday shift from one-time or annual test purchases to weekly continuous validation
              subscriptions, dramatically increasing ACV per customer and creating contract stickiness. Case studies
              confirm this pattern: the manufacturing customer runs weekly tests, the healthcare system runs 60+ tests,
              and the financial services customer runs weekly AWS pentests. This cadence model is analogous to
              subscription-based security monitoring services and creates renewal dynamics that are structurally
              different from project-based pentesting.
