      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Public-company comparables for Horizon3.ai span a wide band, reflecting the heterogeneous growth profiles
              within cybersecurity SaaS. At one end, mature platforms like Rapid7 trade at approximately 1.9–2.1×
              trailing ARR, reflecting mid-single-digit revenue growth and competitive displacement risk. At the other
              extreme, high-growth platforms like CrowdStrike and SentinelOne command 17–20× ARR multiples on the
              strength of platform breadth, net revenue retention above 120%, and durable competitive moats. Tenable and
              Qualys occupy the middle ground at 3.6–5.4× ARR.

              Horizon3.ai's $1 billion valuation implies a wide range of EV/ARR multiples depending on the unverified
              ARR figure: 33× at $30M ARR, 20× at $50M, 12.5× at $80M, and 10× at $100M. The company's claimed 24×
              revenue growth since 2020 and the FedRAMP moat would justify a growth premium, but the absence of audited
              financials makes the comparison inherently uncertain. A 12–15× ARR multiple—appropriate for a company
              growing at 30–50%+ with strong retention—would require ARR of $67–83M to support the $1B valuation. The CB
              Insights profile and Craft.co data confirm the Series D but offer no independent ARR validation.

              The enumeration of public comparables is intentionally limited to the most directly relevant cybersecurity
              platforms. Broader software SaaS multiples (ARR multiples of 8–12× for median growth SaaS in 2026) would
              suggest the current valuation is at the high end unless growth rate and retention justify it.
