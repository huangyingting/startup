  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai monetizes NodeZero primarily through annual SaaS subscriptions priced on a host-based or
              asset-scope model. Customers purchase annual licenses for a defined number of internal and external
              assets, enabling continuous autonomous pentesting at a flat recurring cost. This model converts what was
              historically a $50,000–$150,000 per-engagement professional services budget into a recurring platform
              contract, fundamentally repositioning NodeZero as operational infrastructure rather than a one-time audit.
              The subscription-first architecture drives predictable revenue, multi-year upsell, and expansion through
              host count growth.


              Federal government customers access NodeZero through government contract vehicles—including GSA Schedule
              70, SEWP V, and CIO-SP3—which streamline procurement and allow multi-year task orders. Federal contracts
              typically carry higher average contract values and multi-year option periods, providing long-term revenue
              durability but introducing appropriations risk and concentration exposure.


              The company's NodeZero Insights product extends the core platform with threat intelligence overlays,
              creating a natural upsell tier above the base pentesting subscription. An MSP/MSSP partner program enables
              indirect distribution, expanding reach into the mid-market without proportional direct sales headcount.
