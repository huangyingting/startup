      - number: '7.6'
        title: Mitigation Framework and Kill Criteria
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai has built meaningful structural mitigations across several risk categories. The FedRAMP High
              authorization—the most demanding commercial cloud authorization level—represents a significant compliance
              moat for the federal segment; achieving and maintaining FedRAMP High is an 18–24 month process that
              competitors cannot replicate quickly. The company's legal team (Chief Legal Officer Jill Passalacqua,
              formerly of FireEye and JumpCloud) provides institutional expertise for regulatory navigation. The $100M
              Series D (November 2024) provides approximately 2–3 years of runway for continued compliance investment,
              product hardening, and legal/regulatory engagement.


              For people risk, the key mitigation is building a distributed leadership bench. The current team includes
              a CFO (Holly Grey), CRO (Matt Hartley), CMO (Andres Botero), and CLO (Jill Passalacqua) with deep
              enterprise and security experience. If Antani departed, the institutional knowledge exists to maintain
              business continuity, though customer-facing relationships in the federal sector would require active
              reassurance. A more formal succession plan and Board-level ownership of this risk would reduce residual
              exposure.


              For competitive risk, the principal mitigation is continuous deepening of the attack-chain AI rather than
              surface feature expansion—staying ahead of incumbents requires investing in the offensive security
              research capability (vulnerability research, new exploit modules, post-exploitation techniques) rather
              than matching their go-to-market breadth. The company's 81 "Attack Blogs" and 30 vulnerability disclosures
              demonstrate this flywheel.


              Kill criteria—conditions that would require fundamental strategy reassessment—include: (1) loss of FedRAMP
              High authorization without a credible path to reinstatement within 12 months; (2) federal sector revenue
              drops below 30% of total (signaling market repositioning need) OR federal sector revenue drops below 40%
              of prior year (signaling budget crisis); (3) a material security breach of NodeZero's cloud infrastructure
              with confirmed customer data exposure; (4) US or EU regulation explicitly banning or imposing prohibitive
              restrictions on autonomous AI-based offensive security tools; (5) a platform incumbent with 10× the GTM
              capacity acquires a direct peer competitor at significant premium.
