              Series D.


              The Series C was a $40 million round closed in October 2022. Craft Ventures, the venture capital firm
              co-founded by David Sacks and Bill Lee, is identified as a lead investor in Horizon3.ai and is listed on
              its public portfolio page. Craft Ventures partners Michael Robinson and Kevin Gabura were specifically
              cited in connection with the Series C investment, reflecting a thesis around autonomous AI-powered
              security infrastructure. SignalFire, the technology-first venture capital firm known for its data-driven
              approach to early-stage investing, is also an identified investor in Horizon3.ai.


              In January 2026, Horizon3.ai announced a strategic investment from Prosperity7 Ventures, the diversified
              venturing arm of Aramco Ventures (the corporate investment platform of Saudi Aramco). This investment was
              explicitly framed around a shared priority to safeguard AI datacenters and critical infrastructure. The
              Prosperity7 partnership signals Horizon3.ai's ambitions in the Middle East and GCC sovereign
              infrastructure market, where Saudi Aramco operates one of the world's most complex and high-value
              industrial cyber environments. The size of the Prosperity7 strategic investment has not been publicly
              disclosed. Earlier financing rounds (Series A and Series B) preceding the 2022 Series C have not been
              detailed publicly in terms of size, valuation, or investors. No debt facilities, convertible notes, or
              revenue-based financing have been publicly identified.
