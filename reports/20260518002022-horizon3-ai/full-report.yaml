      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Investment Recommendation: CONDITIONAL TRACK'
            body: >
              Recommend tracking Horizon3.ai at the current ~$1B valuation with a conditional upgrade to BUY if
              independent financial verification confirms ARR ≥$80M, NRR >110%, and gross margin >65%. At verified
              financials meeting these thresholds, a 15× ARR entry multiple implies a $1.2B entry price—consistent with
              the current Series D mark—with a 2–3× return potential in the base-case exit scenario. Investors seeking
              higher margin of safety should target entry at or below $700M (≤9× verified ARR at $80M), which would
              yield a 2–5× return even under base-case assumptions.
            calloutType: recommendation
            claimRefs:
              - CV036
              - CV004
              - CV021
              - CV023
          - type: callout
            title: 'Key Risk: Unverified Financials Underpin All Valuation Claims'
            body: >
              All valuation conclusions in this chapter rest on unverified, company-claimed ARR and growth figures. The
              company has not published audited financial statements and is not required to do so as a private entity.
              If actual ARR is below $40M—a scenario not impossible given the wide range of indirect evidence—the $1B
              valuation implies a 25×+ EV/ARR multiple with no public comparables to support it. Investors must treat
              the financial KPIs in this chapter as informed estimates, not ground truth, and require a data room before
              committing capital.
            calloutType: risk
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV032
          - type: callout
            title: 'Key Assumption: FedRAMP Authorization Remains a Durable Moat'
            body: >
              This analysis assigns significant intrinsic value to Horizon3.ai's FedRAMP High authorization on the basis
              that achieving it requires 18–36 months and seven-figure compliance investment. If Pentera, CrowdStrike,
              or another competitor achieves comparable authorization within the next 12–18 months, the moat narrows
              materially and the government-sector ARR premium contracted into the $1B valuation is at risk. Investors
              should monitor competitor FedRAMP status quarterly.
            calloutType: assumption
            claimRefs:
              - CV015
              - CV025
              - CV029
