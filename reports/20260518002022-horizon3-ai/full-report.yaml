  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Customer Workflow
        blocks:
          - type: paragraph
            body: >-
              NodeZero is Horizon3.ai's flagship platform: a SaaS-delivered continuous penetration testing product that
              enables security teams to autonomously find, fix, and verify exploitable attack paths without requiring
              dedicated penetration testing expertise on staff. A single subscription unlocks six primary operation
              types, each addressing a distinct attack surface. Internal Pentest deploys a lightweight Docker container
              or OVA image inside the customer environment to emulate an attacker with network access. External Pentest
              operates fully agentlessly from Horizon3.ai's H3 Cloud, enumerating and exploiting internet-reachable
              services. Cloud Pentest uses customer-supplied cloud provider credentials to map and exploit IAM
              misconfigurations and lateral movement paths in AWS, Azure, and GCP. Active Directory Password Audit
              discovers crackable and reused passwords across Active Directory using native protocols without a
              persistent agent. Phishing Impact Testing simulates email credential compromise and traces the downstream
              network pivot that an attacker could execute. Kubernetes Pentest assesses container escape and RBAC
              privilege escalation within container clusters.

              Three supporting capability layers extend the core platform. NodeZero Insights is an exposure management
              intelligence layer that aggregates and prioritizes findings across continuous pentest operations. NodeZero
              Tripwires is a deception technology module that deploys production-safe digital tripwires to detect
              post-breach adversary activity. The NodeZero MCP Server, launched in 2025, exposes verified exploit data
              to AI and LLM tools through the Model Context Protocol, bridging offensive security intelligence with
              emerging AI-driven operations workflows. As of September 2025, Horizon3.ai had executed more than 170,000
              autonomous pentests for nearly 4,000 organizations, with the largest single pentest covering more than
              100,000 IP addresses.
