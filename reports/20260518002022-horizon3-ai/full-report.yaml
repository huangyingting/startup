      - number: '2.5'
        title: Sizing Diligence Gaps and Contradictory Estimates
        blocks:
          - type: paragraph
            body: >
              Multiple material evidence gaps limit confidence in the market sizing estimates presented in this chapter.
              First, no independent analyst firm publishes a dedicated size estimate for the "autonomous AI-native
              penetration testing" subcategory in which Horizon3.ai most directly competes. The closest proxy is the
              PTaaS market ($0.72B in 2026, MarketsandMarkets), but PTaaS includes human-augmented and hybrid offerings.
              Horizon3.ai's fully autonomous positioning occupies a subset of the PTaaS market that cannot be sized
              without primary research.


              Second, the MarketsandMarkets and Mordor Intelligence figures are directionally consistent (both project
              14–15% CAGR for the broader penetration testing market) but differ in absolute magnitude by approximately
              15–20%. Both firms use proprietary methodologies that are not publicly described in sufficient detail to
              reconcile the discrepancy. Neither figure should be treated as a point estimate; the range should be
              preserved.


              Third, Horizon3.ai's revenue, market share, and customer segment distribution are not publicly disclosed,
              making it impossible to calculate the company's share of the PTaaS or penetration testing markets from
              external sources. Customer count (5,200+) is the only disclosed scale metric, and without average contract
              value data, revenue-based penetration rate is unquantifiable. The implied market share from customer count
              is meaningfully positive but numerically unconstrained.


              Fourth, analyst projections to 2031 carry compounding uncertainty due to the pace of AI development in
              both attack and defense capabilities. A scenario in which open-source AI tools commoditize basic
              autonomous pentesting within 2–3 years would materially alter growth forecasts for the premium PTaaS
              platforms. This risk is acknowledged by Mordor Intelligence (which cites competitive dynamics as a market
              constraint) but is not quantified in available analyst models.
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
