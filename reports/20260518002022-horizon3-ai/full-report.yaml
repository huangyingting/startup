      - number: '8.5'
        title: Thesis-Break & Kill Triggers
        blocks:
          - type: paragraph
            body: >
              Thesis-break triggers are observable, time-bound events or data points that, if confirmed, would move the
              recommendation from TRACK to PASS or EXIT. The five most material triggers are: (1) a down round or
              secondary-market marks more than 20% below the Series D price, indicating loss of investor confidence; (2)
              loss of three or more named federal contracts in a single renewal cycle, signaling that FedRAMP
              authorization alone is insufficient to retain customers; (3) net revenue retention falling below 100%,
              implying that expansion revenue no longer covers churn and that the subscription model is under stress;
              (4) a direct competitor—specifically Pentera or a CrowdStrike acquisition—achieving FedRAMP High
              authorization, eliminating the primary regulatory moat; and (5) IPO prospectus or secondary-market
              diligence revealing ARR below $50M, placing the current $1B valuation above 20× ARR with decelerating
              growth, a profile that warrants immediate price renegotiation.

              Secondary warning signals include: departure of the founding CEO without a credible succession plan,
              failure to reach $150M ARR within 24 months of Series D at current growth claims, and evidence of material
              margin erosion as headcount scales to serve enterprise accounts.
            claimRefs:
              - CV031
              - CV025
              - CV015
              - CV027
              - CV029
