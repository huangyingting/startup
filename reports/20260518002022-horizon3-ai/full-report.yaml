  - id: FU001
    title: Customer Journey Map
    type: journey-map
    layout: standard
    summary: >-
      Seven-stage customer journey from initial awareness through advocacy, illustrating how NodeZero buyers move from
      regulatory or breach-event triggers through evaluation, pilot, deployment, Pentest Wednesday expansion, and
      ultimately reference customer status. Federal and commercial paths diverge at procurement but converge at the
      Pentest Wednesday recurring cadence stage.
    data:
      nodes:
        - id: awareness
          label: >-
            Awareness — CISO identifies compliance mandate, breach event, or board-level pressure triggering security
            validation need
          type: entry
        - id: evaluation
          label: >-
            Evaluation — RFP, demo request, or GSA/Platform One procurement vehicle research; FedRAMP High status
            shortlists NodeZero for federal buyers
          type: stage
        - id: pilot
          label: >-
            POC / Pilot — Production-safe architecture deployed; first pentest executed in live environment; attack
            graph reviewed with security team
          type: stage
        - id: procurement
          label: >-
            Procurement / Contract — Direct (GSA, Platform One, Tradewinds for federal; enterprise direct) or via MSSP
            partner (NCC Group, Optiv, Pax8)
          type: stage
        - id: deployment
          label: >-
            Initial Deployment — NodeZero external or internal pentest; ZeroLogon / AD audit; cloud pentest; first
            critical impact findings delivered
          type: stage
        - id: expansion
          label: >-
            Pentest Wednesday Expansion — Recurring weekly testing cadence; add-on modules (NodeZero Insights, cloud,
            phishing, AD audit); ACV expansion
          type: stage
        - id: advocacy
          label: >-
            Advocacy / Reference — Customer becomes named reference (if federal/SLED) or anonymous case study;
            contributes Gartner Peer Insights review
          type: exit
    approximationNotes: >-
      Journey stages are inferred from case study descriptions and product documentation. Conversion rates between
      stages are not publicly disclosed. Federal path diverges at procurement stage (government contract vehicles vs.
      direct commercial).
    claimRefs:
      - CU001
      - CU009
      - CU027
      - CU035
  - id: FU002
    title: Adoption / Deployment Funnel
    type: funnel
    layout: standard
    summary: >-
      Five-stage customer acquisition and expansion funnel for NodeZero, from total addressable enterprise universe
      through active customers and Pentest Wednesday recurring subscribers. Values represent estimated population sizes
      at each funnel stage based on available company disclosures and market estimates.
    data:
      items:
        - label: Total Addressable Enterprise + Federal Universe (organizations with pentesting budgets)
          value: 80000
          description: >-
            Estimated total addressable organizations: Fortune 500 + Global 2000 + U.S. federal agencies + mid-market
            enterprises with regulatory mandates (PCI, HIPAA, FedRAMP). Horizon3.ai estimates TAM at ~$720M PTaaS market
            in 2026.
        - label: NodeZero Evaluation / Demo (organizations that have seen a NodeZero demonstration or initiated an RFP)
          value: 15000
          description: >-
            Estimated evaluation universe based on trade show presence, federal procurement vehicle listings, and MSSP
            partner pipelines. No disclosed figure available; estimated at ~19% of TAM based on company visibility in
            analyst reports.
        - label: Pilot / POC Completed (organizations that ran a production NodeZero test)
          value: 7000
          description: >-
            Estimated POC completions. Production-safe architecture and MSSP delivery lower the POC barrier
            substantially vs. competitors requiring on-premises agents. Estimate based on ~50% POC-to-customer
            conversion from active customer base.
        - label: Active Customers (organizations with active NodeZero license as of March 2026)
          value: 5200
          description: >-
            Company-disclosed: 5,200+ active organizational customers globally. Includes direct, MSSP-delivered (~70%),
            and SMB/MSP via Pax8 ecosystem.
        - label: Pentest Wednesday Recurring Subscribers (customers on weekly recurring cadence)
          value: 1500
          description: >-
            Estimated active Pentest Wednesday subscribers based on case study frequency descriptions and 125% NDR
            expansion signal. Specific subscriber count not disclosed; ~29% of customer base is analyst estimate.
    approximationNotes: >-
      All funnel values above 'Active Customers' are analyst estimates. NodeZero's disclosed active customer count of
      5,200+ (March 2026) is the only confirmed data point. Conversion ratios are inferred from market analogues and
      company-stated metrics.
    claimRefs:
