      - number: '5.2'
        title: Technical Architecture and Deployment Model
        blocks:
          - type: paragraph
            body: >-
              NodeZero's technical design centers on an ephemeral, one-time-use architecture. Each pentest run creates a
              dedicated, isolated Virtual Private Cloud within Horizon3.ai's H3 Cloud infrastructure, which is torn down
              immediately after the engagement completes. This eliminates persistent compromise footprints and enforces
              strict tenant isolation across multi-tenant SaaS operations. For internal pentests, a Docker container or
              OVA image is deployed by the customer on-premises and communicates with H3 Cloud for orchestration; no
              persistent agent remains post-test. External and cloud assessments operate entirely agentlessly from H3
              Cloud, with no software deployed in the customer environment.

              The attack intelligence core is a graph-based engine that chains multi-hop exploitation across users,
              systems, credentials, and services to construct end-to-end proof-of-exploitation paths. These paths are
              mapped to MITRE ATT&CK tactics and techniques and translated into prioritized fix actions with one-click
              post-fix verification workflows. NodeZero is designed to be production-safe: no exploit payloads persist
              after a test run, and the platform claims that active exploitations are reversible or scoped to
              non-destructive proof of access.

              An AI reasoning layer, internally branded "Mythos," extends the attack graph with LLM-assisted
              interpretation and confidence scoring for complex, multi-stage attack chains. Technical documentation is
              available at docs.horizon3.ai. Horizon3.ai also maintains 41 or more public repositories under the
              horizon3ai GitHub organization, including open-source CVE proof-of-concept tools with strong community
              engagement, evidencing depth of vulnerability intelligence.
