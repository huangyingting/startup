  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai's NodeZero platform sits at the nexus of three overlapping regulatory regimes, each capable of
              materially affecting product legality, market access, or operational cost. The first and most
              consequential near-term risk is the EU AI Act (Regulation 2024/1689), which entered into force in August
              2024 and whose prohibition provisions became effective in February 2025. The Act defines four risk tiers;
              while NodeZero is unlikely to fall under the absolute-prohibition tier (which covers social scoring, mass
              biometric surveillance, and exploitative manipulation), autonomous AI systems that actively attack IT
              infrastructure could be classified as "high-risk" if regulators determine they pose risks to critical
              infrastructure or fundamental rights. High-risk classification would impose mandatory conformity
              assessments, extensive documentation, human oversight requirements, and registration in a public EU
              database—adding substantial compliance cost and delaying European commercial expansion.


              The second vector is US export control law. The Bureau of Industry and Security (BIS) regulates
              cybersecurity items under the Export Administration Regulations (EAR), specifically ECCN 4E001 and related
              codes for intrusion software. NodeZero's autonomous attack chain generation, credential exploitation, and
              vulnerability chaining could be classified as dual-use offensive tools. Any international
              distribution—including cloud delivery to non-US customers—must comply with license requirements or license
              exceptions. The Cybersecurity Waiver (ECS) under EAR may apply in some cases, but the compliance burden
              remains significant, and errors can result in civil penalties of up to $353,534 per violation or criminal
              penalties.


              The third vector is FedRAMP reauthorization. FedRAMP High Authorization (currently held by NodeZero
              Federal) must be maintained continuously through Annual Assessment, Plan of Action and Milestones (POA&M)
              management, and significant change requests. Loss or lapse of FedRAMP status would immediately disqualify
              NodeZero Federal from federal sales, potentially stranding 50–60% of estimated revenue. CMMC 2.0
              compliance requirements for DoD contractors add further testing and audit obligations. The Federal
              Register documents active regulatory evolution in both export controls and cybersecurity program
              requirements, creating a rapidly shifting compliance landscape.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
