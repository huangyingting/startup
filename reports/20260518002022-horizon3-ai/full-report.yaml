            body: >
              Horizon3.ai's channel-led go-to-market model is both a strength and a concentration risk. The ~70%
              MSSP/MSP delivery rate as of March 2026 enables NodeZero to reach SMB and mid-market customers that would
              be uneconomical to serve directly, and the Pax8 partnership gives access to 40,000+ MSP partners. However,
              MSSP concentration means that if one or more top MSSP partners churned, reduced NodeZero deployments in
              favor of a competitor, or experienced their own revenue decline, a significant portion of Horizon3.ai's
              customer base would be at risk. The adverse Gartner review already surfaced one instance of MSSP execution
              friction (scheduling and reporting clarity issues with a partner), suggesting that MSSP-delivered customer
              experience is not uniformly controlled.


              Federal procurement creates a different kind of concentration risk: the entire federal segment depends on
              the continuity of FedRAMP High authorization. If Horizon3.ai's FedRAMP High authorization were suspended,
              failed reauthorization, or a competitor achieved equivalent authorization, the federal moat would erode.
              The transition from FedRAMP Rev4 to FedRAMP 3.0 (initiated 2025) represents a near-term compliance upgrade
              requirement. The awardable status on DoD Platform One and Tradewinds Marketplace (both achieved in
              2025–2026) are positive access signals, but awardable status alone does not guarantee contract flow —
              federal agencies must still issue orders, and those orders are subject to appropriations and contracting
              officer discretion.


              Customer concentration at the top end (Fortune 10) represents both a revenue quality signal and a risk.
              Four Fortune 10 companies as customers implies that a small number of relationships may constitute a
