      - number: '1.5'
        title: Product Portfolio and Platform Architecture
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai's product portfolio centers on NodeZero, which encompasses multiple operational modes and
              deployment configurations. The platform's core capability is autonomous internal network pentesting, in
              which NodeZero chains together exploitable vulnerabilities, harvested credentials, misconfigurations, and
              weak security policies to demonstrate real attack paths—emulating the techniques of advanced persistent
              threat (APT) actors and ransomware operators. NodeZero External Attack Surface extends validation to
              internet-facing assets. NodeZero Cloud covers AWS, Azure, and GCP environments, with identity and
              privilege escalation path validation. NodeZero AD Password Audit evaluates Active Directory password
              health against credential-based attack patterns. NodeZero for Kubernetes validates container orchestration
              security configurations.


              The platform's technical architecture rests on a one-time-use ephemeral virtual private cloud environment
              provisioned for each pentest. This isolation mechanism ensures that test activity is contained, cannot
              traverse to adjacent systems or customer data outside the defined test scope, and leaves no persistent
              footprint in the production environment upon completion. NodeZero integrates as a Model Context Protocol
              (MCP) server for security automation workflows and exposes a documented API for programmatic pentest
              orchestration. The platform also integrates with common enterprise security ecosystems including SIEMs,
              SOARs, and ITSM tools.


              NodeZero Federal, the government-specific product variant, holds FedRAMP High Authorization—the highest
              civilian compliance tier for US federal cloud services, requiring independent third-party assessment
              against the NIST SP 800-53 High baseline of 800+ security controls. NodeZero Federal also serves as the
              offensive security engine for the NSA's Continuous Autonomous Penetration Testing (CAPT) program, which as
              of May 2025 had assessed hundreds of Defense Industrial Base (DIB) suppliers, providing
              national-security-scale validation of the platform's production safety. On May 14, 2026, NodeZero was
              designated Awardable on the DoD Tradewinds Solutions Marketplace, enabling accelerated federal procurement
              without a full competitive acquisition process.


              Horizon3.ai operates an attack research and vulnerability disclosure program, publishing rapid-response
              security advisories on critical CVEs and emerging nation-state TTPs. All product development and
              engineering occurs in the United States.
