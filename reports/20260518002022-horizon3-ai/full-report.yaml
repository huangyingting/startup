              company in that ranking.


              Customer count progression is documented at several points: approximately 4,000 organizations as of the 1H
              2025 results (September 2025, reflecting 137% ARR growth YoY); approximately 4,500 at the time of the
              Deloitte Fast 500 ranking (November 2025); and 5,200+ by March 2026 (FY2026 results, reflecting 102% ARR
              growth YoY). Enterprise segment growth was particularly pronounced at 485% YoY through 1H 2025, indicating
              successful upmarket motion beyond the initial SMB/mid-market MSSP channel penetration. By March 2026,
              NodeZero had executed 225,000+ production-safe penetration tests, representing an average of approximately
              43 tests per organization over the company's lifetime — a volume that validates recurring usage, not just
              initial deployment.


              The Fast Company 2026 Most Innovative Companies recognition (in the enterprise software category) and the
              NatSec 100 listing for two consecutive years provide independent third-party validation of both product
