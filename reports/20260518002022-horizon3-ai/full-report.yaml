            body: >-
              NodeZero is one of the few autonomous pentesting platforms to hold FedRAMP High Authorization, listed
              under marketplace ID F2209220003. This authorization enables deployment in federal environments processing
              highly sensitive unclassified data. Horizon3.ai participates in the NSA Cybersecurity Assurance Program
              Testing (CAPT), under which NodeZero delivers autonomous pentests to Defense Industrial Base suppliers
              seeking to demonstrate CMMC compliance. In 2023, the company achieved Awardable status in the Department
              of Defense Platform One software marketplace, creating a streamlined procurement pathway for DoD customers
              without requiring a separate competitive procurement process.

              For commercial regulated markets, NodeZero supports compliance evidence generation for PCI DSS 4.0, HIPAA,
              CMMC 2.0, SOC 2, and ISO 27001 through a hybrid service combining autonomous pentest outputs with sign-off
              from OSCP-certified human pentesters. Horizon3.ai claims SOC 2 Type II certification for its own cloud
              operations, though the audit report is not publicly available for independent verification. These
              compliance and regulatory credentials are primary differentiators in competitive evaluations against
              manual pentesting firms and broader PTaaS competitors that do not hold FedRAMP High authorization or NSA
