    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai is a private cybersecurity software company headquartered in San Francisco, California, with
              additional offices in Chicago, Illinois, and Amsterdam, Netherlands. The company operates as a
              remote-first organization and was founded in 2019 by veterans of US Special Operations Command (SOCOM) and
              the US National Security community. Its mission is to help organizations of every size find and fix
              exploitable attack vectors before threat actors can reach them—continuously and autonomously.


              The company's flagship commercial product is NodeZero®, a fully autonomous penetration testing
              (pentesting) platform delivered as a SaaS subscription. NodeZero requires no persistent agents, no
              pre-provided credentials, and no specialized operator expertise to deploy. Organizations can launch a
              pentest in minutes, and the platform executes the full attack lifecycle—reconnaissance, exploitation,
              lateral movement, and impact demonstration—autonomously in live production environments. Upon completion,
              NodeZero delivers prioritized impact findings with step-by-step remediation guidance and one-click fix
              verification. The platform covers internal network pentesting, external attack surface assessment, cloud
              pentesting (AWS, Azure, GCP), Active Directory password auditing, Kubernetes security validation, and
              identity security validation.


              Horizon3.ai's business model centers on annual SaaS subscriptions priced per engagement volume or
              continuous testing commitment, with additional revenue streams from partner white-label licensing to MSSPs
              and managed service providers. The company explicitly positions its product offering as purpose-built by
              practitioners who conducted actual offensive security missions for the US government—giving NodeZero what
              the company calls operator-grade attack authenticity. All Horizon3.ai products are developed, engineered,
              and manufactured in the United States; the company prominently uses the tagline "100% made in USA" across
              marketing and government procurement materials. NodeZero Federal, the government-specific product variant,
              is the only FedRAMP High Authorized autonomous penetration testing platform as of mid-2026, enabling sale
              to US federal civilian agencies and defense components.
