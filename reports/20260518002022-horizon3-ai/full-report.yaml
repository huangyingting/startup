  - id: FV001
    title: 'Recommendation Logic: Decision Tree'
    type: flow
    layout: wide
    summary: >
      A decision tree mapping the path from key diligence gates—ARR verification, NRR confirmation, FedRAMP moat, and
      entry multiple—to one of four recommendation outcomes: BUY (high conviction), CONDITIONAL (seek discount), TRACK
      (insufficient data), or PASS (overvalued or thesis broken).
    data:
      nodes:
        - id: n1
          label: ARR verified ≥$80M?
          type: decision
        - id: n2
          label: NRR verified >110%?
          type: decision
        - id: n3
          label: Entry multiple ≤15× ARR?
          type: decision
        - id: n4
          label: BUY — High Conviction
          type: outcome
        - id: n5
          label: TRACK — Await ARR Verification
          type: outcome
        - id: n6
          label: PASS — Overvalued / Moat Broken
          type: outcome
        - id: n7
          label: CONDITIONAL — Negotiate Entry Below 15×
          type: outcome
        - id: n8
          label: FedRAMP moat intact & no competitor FedRAMP High?
          type: decision
      edges:
        - from: n1
          to: n2
          label: 'Yes'
        - from: n1
          to: n5
          label: 'No'
        - from: n2
          to: n3
          label: 'Yes'
        - from: n2
          to: n8
          label: 'No'
        - from: n3
          to: n4
          label: 'Yes'
        - from: n3
          to: n7
          label: No — price too high
        - from: n8
          to: n7
          label: 'Yes'
        - from: n8
          to: n6
          label: 'No'
    approximationNotes: >-
      Decision thresholds (≥$80M ARR, >110% NRR, ≤15× ARR) are analytically derived from comparable set analysis and
      represent the author's diligence standards, not definitive investment criteria.
