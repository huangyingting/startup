      - number: '8.3'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              Three discrete scenarios capture the probability-weighted range of outcomes for Horizon3.ai investors. The
              bull case assumes accelerating enterprise adoption fueled by FedRAMP authorization expansion, an NRR above
              120%, and successful platform extension into exposure management (NodeZero Insights). Under bull
              assumptions, ARR reaches $150M by late 2027 and a 20× ARR multiple yields a $2.5–3.5 billion valuation—a
              2.5–3.5× return on the Series D price.

              The base case is grounded in the company's own 102% ARR growth press release for 2024, applying modest
              deceleration to 50% annual growth through 2026. This yields $80M ARR by end of 2025 and $120M by end of
              2026. At a 15× multiple consistent with high-growth cybersecurity SaaS, the base-case valuation is
              $1.0–1.5 billion— roughly flat to the Series D entry price, indicating that investors at the $1B mark are
              paying for successful execution without an embedded discount.

              The bear case assumes intensified competition from Pentera (which reportedly targets the same ICP),
              AI-driven commoditization of vulnerability enumeration, and federal budget headwinds. Under bear
              assumptions, ARR growth decelerates to 20–30%, ARR reaches $50M by end of 2025, and multiple compression
              to 8–10× yields a valuation of $400–600 million—a 40–60% loss on the Series D. The bear case is plausible
              if CrowdStrike's security-validation expansion or Microsoft Security Copilot materially erodes
              Horizon3.ai's differentiation before it reaches $100M+ ARR and IPO readiness.
            claimRefs:
              - CV020
              - CV021
