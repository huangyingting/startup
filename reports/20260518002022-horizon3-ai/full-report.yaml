  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Overview & Recommendation
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai closed a $100 million Series D in November 2024 at an implied post-money valuation of
              approximately $1 billion, bringing total confirmed capital raised to $140 million across the disclosed
              Series C and Series D rounds. The company sells NodeZero, an autonomous penetration-testing platform that
              continuously finds and proves exploitable attack paths inside enterprise environments without requiring a
              human red-team operator for each engagement. Customers include federal agencies, healthcare systems, and
              mid-market enterprises; the company reports 5,200+ customer relationships and 225,000+ safe pentests
              executed.

              The investment thesis rests on four pillars: (1) a large and structurally underpenetrated market—less than
              10% of enterprises run more than one pentest per year—growing at a 14–22% CAGR; (2) a FedRAMP High
              authorization that took 18–36 months to obtain and that most competitors cannot replicate quickly; (3)
              evidence of strong net revenue retention and platform stickiness through the "Pentest Wednesday"
              subscription cadence; and (4) a favorable exit environment given active M&A by CrowdStrike, Palo Alto
              Networks, and Tenable.

              The conditional recommendation is "TRACK → BUY on verification." The primary information gap is the
              absence of independently audited ARR, NRR, and gross margin data. Entry discipline requires an ARR-based
              multiple at or below 15× on verified ARR. Investors who obtain confirmed financials in pre-IPO or
              secondary markets should price the risk of multiple compression if ARR proves lower than the $80M base
              case.
