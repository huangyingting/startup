      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              The penetration testing market serves multiple distinct buyer types with materially different procurement
              dynamics. In large enterprises (greater than 5,000 employees), the buyer is typically the Chief
              Information Security Officer (CISO) or VP of Information Security, who holds budget authority and can
              approve annual subscription contracts without additional board approval. The user is the internal security
              operations team or dedicated red team. The payer is the corporate IT/security budget. Adoption triggers at
              this tier are primarily regulatory mandates (PCI DSS 4.0, HIPAA, DORA, SEC cyber rule) and post-breach
              recovery initiatives. Large enterprises represented 67.83% of the penetration testing market in 2025
              (Mordor Intelligence).


              In the mid-market (1,000–5,000 employees), the buyer is often a Security Director or CTO, and procurement
              requires CFO or executive sign-off. The primary adoption trigger at this tier is compliance audit pressure
              (especially PCI DSS for retail and payments, and HIPAA for healthcare) or a cyber insurance renewal where
              carriers demand evidence of pentesting. PTaaS platforms like NodeZero are particularly compelling here
              because they reduce the per-test cost dramatically compared to manual consultants.


              In the US federal government segment—a distinctive and high-value segment for Horizon3.ai—the buyer is the
              agency Chief Information Security Officer (CISO) or Authorizing Official (AO), procurement flows through
              GSA schedules or direct contract vehicles, and FedRAMP High Authorization is a prerequisite for serious
              consideration. The federal segment is characterized by longer sales cycles but higher contract values and
              greater renewal stability. BFSI (banking, financial services, insurance) commanded 28.68% of the 2025
              penetration testing market, while healthcare is the fastest-growing vertical at 16.89% CAGR through 2031
              (Mordor Intelligence), driven by FDA pre-market device testing requirements and HIPAA annual testing
              mandates. North America accounts for 38.27% of global penetration testing market share.
