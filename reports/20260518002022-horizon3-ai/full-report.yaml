      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai was co-founded in 2019 by Snehal Antani, who serves as Chief Executive Officer. Antani's
              background provides direct founder-market fit with the product's core value proposition: he previously
              served as Chief Technology Officer of the Joint Special Operations Command (JSOC)—the US military's
              premier counter-terrorism and special missions unit—as well as CTO of US Special Operations Command
              (SOCOM), and as Chief Technology Officer at Splunk (the enterprise data platform that Cisco acquired for
              approximately $28B in 2024). Before Splunk, Antani served as Chief Information Officer at GE Capital. He
              holds 18 US patents spanning network security, data analytics, and distributed systems. The combination of
              national-security offensive-operations experience and enterprise-SaaS commercialization scale is rare and
              is central to Horizon3.ai's positioning in both the federal and commercial enterprise markets.


              Rishi Dhasmana serves as Chief Technology Officer and is responsible for NodeZero's platform architecture,
              product engineering, and research direction. The company's broader executive team is experienced and
              IPO-capable in composition: Holly Grey serves as Chief Financial Officer with over 30 years of financial
              leadership experience, including a background guiding technology companies through public market
              preparation processes. Matt Hartley serves as Chief Revenue Officer. Andres Botero was appointed Chief
              Marketing Officer on January 7, 2026, bringing over two decades of B2B security and enterprise SaaS
              marketing experience at companies including Rubrik (cloud data security), BlackLine (financial
              automation), and CallidusCloud. Jill Passalacqua serves as Chief Legal Officer with expertise in
              government contracting compliance and enterprise software IP. Chris Corbett leads engineering as VP
              Engineering; he previously co-developed the Signal iOS application and conducted research at NASA, holding
              a PhD in Computational Physics. Erick Dean leads product as VP Product, with prior tenures at PagerDuty,
              Splunk, and C3.ai, and holds 6 US patents.


              Key-person concentration is a material governance risk: CEO Antani's unique government network,
              national-security credibility, and enterprise brand are deeply embedded in Horizon3.ai's federal business
              development pipeline and customer trust. No public board composition, governance structure, or equity
              distribution information has been disclosed. No material leadership departures, shareholder disputes, or
              regulatory sanctions against any named executive have been identified as of Q2 2026.
