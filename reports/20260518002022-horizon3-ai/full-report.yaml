      - number: '8.6'
        title: Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Before committing capital at or above the Series D valuation, investors should obtain the following
              evidence. Financial verification is the highest-priority ask: trailing twelve-month ARR, annual contract
              value (ACV) growth by customer cohort, net revenue retention segmented by federal versus commercial, and
              gross margin inclusive of infrastructure and support costs. Without this data, the implied EV/ARR multiple
              cannot be reliably computed and scenario probabilities are speculative.

              The cap table and preference stack are the second critical ask: total liquidation preference relative to
              last-round post-money valuation, investor anti-dilution provisions, and whether any 1× or higher
              participating preferred tranches exist. Heavy preference overhang can render the common equity effectively
              out-of-the-money at bear-case valuations.

              Third, federal contract visibility: a schedule of multi-year contract renewal dates, total contract value
              (TCV) for the top ten federal customers, and the current status of FedRAMP authorization renewals and
              expansions. Fourth, competitive displacement evidence: win/loss rate versus Pentera, SentinelOne
              Singularity, and CrowdStrike's exposure management product, particularly in enterprise accounts above
              10,000 endpoints. Finally, product roadmap and IP defensibility: a review of key patents, the NodeZero
              Insights expansion timeline, and evidence that the AI exploit-generation engine maintains a performance
              advantage over open-source and LLM-based alternatives.
            claimRefs:
              - CV032
              - CV023
              - CV033
