      - number: '7.5'
        title: Technology and Infrastructure Risks
        blocks:
          - type: paragraph
            body: >
              NodeZero's architecture is SaaS-delivered and relies on cloud infrastructure (AWS and/or Azure) for the
              orchestration layer, while internal pentests run from Docker containers or OVA instances on customer
              premises. The cloud dependency creates an availability risk: a sustained outage or security incident at
              the cloud provider affecting NodeZero's orchestration would interrupt the continuous assessment workflow
              for all affected customers. For federal customers operating under RTO requirements, this could trigger SLA
              violations.


              A subtler technology risk is AI hallucination in attack chain construction. NodeZero generates and chains
              exploits autonomously; if the underlying AI models produce incorrect exploit sequencing—recommending a
              vulnerability chain that does not actually function—two failure modes emerge: (1) an unexploited true
              vulnerability is missed (false negative), or (2) a false positive is escalated, causing unnecessary
              incident response. As NodeZero's "Mythos" framework and other AI-driven attack-path reasoning components
              evolve, the risk of confident-but-incorrect AI outputs increases without robust validation layers.


              Cloud dependency also creates a vendor lock-in risk: migrating NodeZero's cloud-based attack orchestration
              to a different cloud provider is non-trivial. If AWS or Azure change pricing, terminate service terms, or
              are subject to regulatory action requiring data localization for specific jurisdictions, Horizon3.ai may
              face costly infrastructure migrations. The GitHub repository at github.com/horizon3ai hosts open-source
              components, which introduces supply chain risks if any dependency is compromised.


              The CISA Known Exploited Vulnerabilities (KEV) catalog and NIST NVD (250,000+ CVEs) represent the data
              substrate that NodeZero relies on for vulnerability context. If CISA or NIST reduce funding, restrict API
              access, or significantly change data formats, NodeZero's intelligence layer would degrade. More broadly,
              the quality of NodeZero's autonomous decision-making depends on the accuracy of external threat
              intelligence feeds—a dependency that is not fully within Horizon3.ai's control.
            claimRefs:
              - CR030
              - CR031
              - CR032
              - CR033
              - CR034
