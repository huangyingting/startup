        title: Funding History and Investor Ecosystem
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai has raised $140 million in total venture capital across its disclosed financing rounds. The
              most recent and largest round was a $100 million Series D closed in November 2024, which was accompanied
              by a confirmed $1 billion-plus post-money valuation—making Horizon3.ai a unicorn. The Series D was
