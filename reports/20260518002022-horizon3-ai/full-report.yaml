      - number: '1.4'
        title: Revenue, Scale, and Customer Traction
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai's scale metrics indicate meaningful enterprise adoption and durable demand acceleration. As of
              early 2026, NodeZero has safely executed more than 225,000 autonomous pentests in live production
              environments—a figure that functions as a proxy for platform trust, production-safety reliability, and
              customer engagement volume at scale. The company reports 5,200+ customer organizations globally, spanning
              enterprise, federal government, mid-market, MSSP, and healthcare segments. More than one-third of Fortune
              10 companies—the ten largest US public companies by revenue—are confirmed Horizon3.ai customers, providing
              marquee enterprise validation at the highest tier of organizational credibility.


              On March 19, 2026, Horizon3.ai announced 102% year-over-year ARR growth. The company has not disclosed an
              absolute ARR figure in dollar terms; the 102% growth rate is the only public financial performance metric
              available. This growth rate, if sustained, would place Horizon3.ai among the small cohort of enterprise
              SaaS companies still achieving greater than 100% ARR growth at Series D capitalization levels. Industry
              recognition provides corroborating signal: Horizon3.ai ranked #1 in Security on the Inc. 5000 list of
              fastest-growing private US companies and #3 overall on the Deloitte Technology Fast 500. Fast Company
              named Horizon3.ai #4 on its Most Innovative Companies 2026 list in the Security sector.


              Headcount is not publicly disclosed. LinkedIn-based estimation suggests a distributed team of fewer than
              500 employees, consistent with the company's remote-first model and capital-efficient SaaS structure. The
              MSSP and managed service partner channel is growing, with NodeZero available as a white-label platform for
              security service providers serving downstream enterprise clients. The Amsterdam office provides coverage
              of EU regulatory demand (DORA, NIS2) among European financial services and critical infrastructure
