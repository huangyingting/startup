callouts:
  - calloutType: risk
    title: "FedRAMP High: Critical Moat and Single Point of Failure"
    body: "NodeZero Federal's FedRAMP High authorization is simultaneously the company's deepest competitive moat and its most critical single-point regulatory risk. Loss of this authorization—even temporarily—would immediately freeze an estimated 50–60% of revenue. The company's compliance team must treat FedRAMP continuous monitoring as a board-level priority, not a back-office function."
    claimRefs: [CR005, CR035]

  - calloutType: risk
    title: "CEO Key-Person Risk Is Underestimated"
    body: "Snehal Antani's prior service as CTO of JSOC and his 18 patents give the company credibility in federal and enterprise markets that cannot be quickly replicated. Analysts covering similar profiles (e.g., founder-CEO at security companies serving national security) typically observe 10–20% ARR risk from CEO departure. The board should formalize succession planning as a governance requirement."
    claimRefs: [CR023, CR024, CR037]

