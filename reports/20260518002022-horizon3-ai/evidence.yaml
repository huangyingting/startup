  - type: private-evidence-only
    severity: minor
    topic: soc2-audit-report-unavailable
    missingEvidence: >-
      Horizon3.ai claims SOC 2 Type II certification for its cloud operations but has not published the audit report.
      Without the report, the scope, auditor identity, audit period, and coverage of specific controls (availability,
      confidentiality, security) cannot be independently verified.
    whyItMatters: >-
      Enterprise buyers in regulated industries (healthcare, finance, federal) routinely require review of SOC 2 Type II
      reports during vendor due diligence. The absence of a public report means buyers must request it under NDA,
      introducing delay and the possibility that the scope is narrower than marketed. This affects the trust-posture
      assessment in the compliance-trust section.
