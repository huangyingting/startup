company:
  name: "Horizon3.ai"
chapter:
  number: 4
  title: "Financials"
  summary: "Horizon3.ai operates a recurring SaaS subscription model monetizing NodeZero across commercial enterprise and federal government verticals. The November 2024 Series D ($100M, Craft Ventures) brought total disclosed funding to approximately $141M at an estimated ~$900M valuation. Revenue quality indicators are favorable—annual recurring subscriptions, high platform utilization (225,000+ pentests), and an expanding installed base (5,200+ customers)—but the company discloses no ARR, gross margin, NRR, CAC, or burn rate, making financial underwriting impossible without diligence disclosure. Public-company comparables (Tenable FY2025: 40,000+ customers; Rapid7) confirm strong sector unit economics, but Horizon3.ai's scale is a fraction of these incumbents. Key financial diligence blockers are undisclosed ARR, unknown burn rate, and opaque federal vs. commercial revenue concentration."

sections:
  - id: revenue-model-pricing
    title: "Revenue Model and Pricing Architecture"
    body: |
      Horizon3.ai monetizes NodeZero primarily through annual SaaS subscriptions priced on a host-based or asset-scope model. Customers purchase annual licenses for a defined number of internal and external assets, enabling continuous autonomous pentesting at a flat recurring cost. This model converts what was historically a $50,000–$150,000 per-engagement professional services budget into a recurring platform contract, fundamentally repositioning NodeZero as operational infrastructure rather than a one-time audit. The subscription-first architecture drives predictable revenue, multi-year upsell, and expansion through host count growth.

      Federal government customers access NodeZero through government contract vehicles—including GSA Schedule 70, SEWP V, and CIO-SP3—which streamline procurement and allow multi-year task orders. Federal contracts typically carry higher average contract values and multi-year option periods, providing long-term revenue durability but introducing appropriations risk and concentration exposure.

      The company's NodeZero Insights product extends the core platform with threat intelligence overlays, creating a natural upsell tier above the base pentesting subscription. An MSP/MSSP partner program enables indirect distribution, expanding reach into the mid-market without proportional direct sales headcount. Pricing is not publicly disclosed and requires direct sales engagement; analyst estimates suggest a mid-market starting range of $25,000–$50,000/year with enterprise tiers reaching $100,000–$500,000+, and federal contracts potentially higher due to scope and compliance overhead.
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]
    calloutRefs: []

  - id: unit-economics-sales-efficiency
    title: "Unit Economics and Sales Efficiency"
    body: |
      Horizon3.ai does not disclose unit economics. All estimates are derived from public traction signals (5,200+ customers, 225,000+ pentests, $100M Series D valuation), industry benchmarks for security SaaS, and comparison to public peers. At 5,200+ customers and an implied ARR of $40–90M (estimated), the implied blended ACV is approximately $8,000–$17,000, which is lower than typical enterprise security SaaS and suggests a mid-market-heavy customer mix with a long tail of smaller commercial accounts supplemented by higher-value federal contracts.

      Gross margins for pure SaaS security platforms typically range from 65–80%. NodeZero has low marginal delivery cost once the platform is deployed—customers run pentests autonomously—which should yield strong gross margins. However, professional services revenue, onboarding costs, and FedRAMP compliance overhead may compress blended margins below pure-SaaS benchmarks.

      The 225,000+ pentests across 5,200+ customers implies an average of approximately 43 pentests per customer, indicating strong platform utilization and potential for high NRR. Companies achieving high platform usage at this scale typically report NRR of 110–130%. CAC and payback period estimates are highly uncertain without S&M spend data; comparable security SaaS companies at Series D stage typically target 18–30 month payback periods.
    tableRefs: [TI003]
    figureRefs: [FI002, FI003]
    calloutRefs: []

  - id: capital-adequacy-funding
    title: "Funding History and Capital Adequacy"
    body: |
      Horizon3.ai closed a $100M Series D in November 2024, led by Craft Ventures with participation from existing investors. This was the largest single round in the company's history and brought total disclosed funding to approximately $141M. Prior rounds included a seed financing, a Series B ($28M, 2022), and a smaller Series C extension; Craft Ventures has been the lead institutional investor throughout. The Series D was raised in a challenging venture financing environment for cybersecurity, suggesting strong investor conviction in NodeZero's federal exclusivity and commercial traction.

      Use of proceeds from the Series D was disclosed as platform research and development, federal channel expansion, and international market entry, with European operations anchored by the Amsterdam office established in 2023. No debt facility, credit line, or project finance arrangement has been publicly disclosed, consistent with a venture-backed SaaS company at this stage.

      Capital adequacy depends almost entirely on burn rate, which is not disclosed. At an estimated $6–12M/month burn (inferred from approximately 400 employees, cloud infrastructure, and aggressive S&M spend), the $100M Series D provides approximately 8–17 months of runway from close (November 2024), implying a likely next-round requirement by mid-to-late 2026 without a significant revenue inflection. A revenue-based assessment of adequacy is impossible without ARR disclosure.
    tableRefs: [TI004]
    figureRefs: []
    calloutRefs: []

  - id: financial-benchmarking
    title: "Financial Benchmarking: Comparable Companies"
    body: |
      Public-company comparables provide the primary financial benchmarking context for Horizon3.ai given its private status. Tenable Holdings (TENB), the market leader in vulnerability management and exposure assessment, reported 40,000+ customers, approximately 65% Fortune 500 penetration, and approximately 50% Global 2000 penetration as of December 31, 2025, per its FY2025 10-K. Tenable's estimated FY2025 revenue exceeds $900M, placing it approximately 10x larger by revenue than Horizon3.ai at the upper bound of NodeZero's ARR estimates.

      Rapid7 (RPD) operates the Insight Platform spanning SIEM, vulnerability management, and application security. Rapid7's FY2024 annual revenue was approximately $800M with gross margins around 70%, providing a platform-security benchmark. Both Tenable and Rapid7 trade at compressed multiples in 2025–2026 relative to 2021 peaks, suggesting that Horizon3.ai's $900M implied Series D valuation is at the high end of current market comparables.

      AttackIQ, a private BAS competitor, and XM Cyber, acquired by Schwarz Group, provide limited financial benchmarks due to lack of disclosure. Cobalt's $29M Series C and Pentera's $56M Series C at comparable stages suggest Horizon3.ai's $100M Series D is the largest single round in the autonomous/AI-pentesting adjacency, reflecting both NodeZero's relative scale and FedRAMP moat premium.
    tableRefs: []
    figureRefs: [FI004]
    calloutRefs: []

  - id: financial-diligence-verdict
    title: "Financial Diligence Verdict"
    body: |
      Horizon3.ai's revenue model is structurally sound: annual recurring SaaS subscriptions with federal and enterprise anchoring, expansion economics from host-count growth and add-on tiers, and a platform utilization signal (225,000+ pentests) that suggests strong retention. The $100M Series D provides near-term capital adequacy, though runway sensitivity to burn is high. These are strong qualitative financial indicators.

      However, the company discloses no quantitative financial metrics. ARR, revenue growth rate, gross margin, NRR, burn rate, CAC, and customer concentration are all undisclosed, making standard financial underwriting impossible. The combination of federal revenue concentration (unknown percentage, but material given NodeZero's FedRAMP positioning), appropriations and DOGE exposure, and absence of a secondary liquidity path creates risk layering that cannot be assessed without data room disclosure.

      The critical diligence asks are: (1) ARR history quarterly for the last 8 quarters and current ARR; (2) COGS breakdown distinguishing platform SaaS from professional services; (3) NRR and gross retention separately; (4) federal vs. commercial revenue split and top-5 customer concentration; and (5) monthly P&L and balance sheet for at least 12 months. Without these five data points, the financial chapter verdict is inconclusive: structurally favorable but unsubstantiated for underwriting purposes.
    tableRefs: [TI005]
    figureRefs: []
    calloutRefs: []

