    rows:
      - - FedRAMP High 授权
        - 唯一拥有 FedRAMP High 的自主渗透测试平台；高影响联邦云合同依法需要该授权
        - 难度很高——需要 18–36 个月和 $1M–$5M+ 项目投入；Synack 仅为 FedRAMP Moderate
        - 资金充足的新进入者从立项起需要 3–5 年
        - 强——没有竞争对手披露正在推进面向自主渗透测试的 FedRAMP High 项目
      - - 可在生产环境安全运行的大规模自主攻击链
        - 正在申请专利的攻击图谱引擎；225,000+ 次在线生产测试；临时无代理设计已在 NSA 和 Fortune 10 环境验证
        - 难度高——需要同时具备 AI 工程、红队人才和同等规模的生产部署数据
        - 追平规模需要 3–5 年；非美国来源厂商在联邦市场永远难以等同
        - 强——没有同等部署年限，就复制不出生产数据集和安全验证记录
      - - 已安装客户基础与攻击图谱训练数据
        - 5,200+ 家客户持续产生反馈；每新增一个项目，数据优势都会复利
        - 难度高——Pentera 约 1,200+ 家客户；数据差距真实存在，但按竞争对手增速正在收窄
        - 纯粹独立竞争对手需 5–7 年才能追平部署规模
        - 中——如果 NodeZero 增长放缓，Pentera 通往 $100M ARR 的轨迹可能侵蚀优势
      - - NSA 与 Fortune 10 在国家安全领域的信任背书
        - 来自 NSA、4 家 Fortune 10 和 DoD 项目的信任；几乎是可获得的最高等级外部验证
        - 难度很高——国家安全信任靠实战证明，不靠营销；非美国来源厂商在法律上被排除
        - 外国来源厂商基本无法复制；美国竞争对手也需要 5–10 年记录
        - 强——高保证细分市场的机构信任买不来；FedRAMP High 是必要条件，但还不够
      - - Pentest Wednesday 的周期性订阅节奏
        - 每周连续测试模型嵌入工作流，形成切换成本，把客户锁定在持续使用中
        - 难度中等——Pentera 和 Synack 提供连续态势模型；Cobalt 提供积分制灵活性
        - 复制节奏模型需要 1–2 年；客户侧工作流整合要更久才会松动
        - 中——周期性节奏可被竞争复制；差异转向攻击链深度
    notes: 持久性评级由分析师基于 FedRAMP 项目周期、可比 SaaS 开发周期和安全行业惯例推断。所有护城河评估都是定性判断，并受公开来源无法完整观察的竞争动态影响。「复制所需时间」估计假设一个资金充足的竞争对手今天从零起步。
