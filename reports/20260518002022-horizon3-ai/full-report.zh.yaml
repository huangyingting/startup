  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 主要通过年度 SaaS 订阅变现 NodeZero，定价按主机或资产范围计费。客户为明确数量的内部和外部资产购买年度许可，以固定的经常性成本运行连续自主渗透测试。该模式把过去每次
              $50,000–$150,000 的专业服务预算，转化为经常性平台合同，从根本上把 NodeZero 从一次性审计重新定位为运营基础设施。订阅优先架构带来可预测收入、多年增购，以及随主机数量增长而来的扩张。


              联邦政府客户通过 GSA Schedule 70、SEWP V、CIO-SP3 等政府合同工具采购
              NodeZero；这些工具简化采购，也允许多年期任务订单。联邦合同通常具备更高平均合同价值和多年期选择权，带来长期收入耐久性，但也引入拨款风险和集中度暴露。


              公司的 NodeZero Insights 产品在核心平台上叠加威胁情报，形成高于基础渗透测试订阅的自然增购层。MSP/MSSP
              伙伴计划支持间接分销，让公司不用同比例增加直销人力，也能触达中端市场。定价未公开披露，需要通过直销接洽；分析师估计中端市场起价为 $25,000–$50,000/year，企业层级可达
              $100,000–$500,000+，联邦合同因范围和合规开销可能更高。
