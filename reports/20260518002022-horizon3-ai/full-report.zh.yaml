  - id: FU004
    title: 留存 / 续购队列
    type: cohort
    layout: standard
    summary: >-
      以 Horizon3.ai 披露的 94% 总美元留存率（GDR）作为年留存率，估算客户留存队列。第 0 年代表 100%（队列基准年），第 1 年反映 94% GDR，第 2 年按 GDR
      复合计算。实际队列数据未公开；本表是基于公司披露的汇总 GDR 得出的分析估算。
    data:
      columns:
        - 第 0 年（基准）
        - 第 1 年（应用 GDR）
        - 第 2 年（GDR 复合，估计）
      rows:
        - label: FY2023 客户队列（FY2023 获取的公司）
          values:
            - 100
            - 94
            - 88
        - label: FY2024 客户队列（FY2024 获取的公司）
          values:
            - 100
            - 94
            - 88
        - label: FY2025 客户队列（FY2025 获取的公司）
          values:
            - 100
            - 94
            - 94
    approximationNotes: >-
      所有数值都是分析估算，来自公司披露的 94% 总美元留存率（FY2026）。实际分队列留存数据尚未公开。截至 2026 年 3 月报告日，FY2025 队列还未进入第 2 年，因此第 2 年按 94%
      估算。数值代表按美元加权的留存；按客户数计算的留存可能不同。净美元留存率（125%）包含留存客户的扩张支出，高于这些 GDR 数字。
