      - number: '8.4'
        title: 投资正论与反论
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的牛市论点建立在结构性市场顺风、可防守的监管护城河，以及早期平台黏性证据之上。渗透测试市场预计 2025 年达到 $2B+，CAGR 为 14–15%；自主 PTaaS 子赛道据报
              CAGR 为 22.6%。企业按季度或按月运行自主渗透测试，产生的订阅收入质量明显优于传统渗透测试公司的项目制收入。FedRAMP High authorization 在联邦板块形成独特卖点——NodeZero
              在 Department of Defense 的 Platform One marketplace 中竞争——并需要 18–36 个月合规投入，竞争对手无法走捷径。Gartner Peer Insights
              用户评价确认了满意度，公司还在 2025 年 10 月 Adversarial Exposure Validation Voice of the Customer 报告中被评为「Customers'
              Choice」，这是有意义的第三方质量信号。

              反论建立在三项结构性风险上。第一，ARR 和 NRR 数据由公司自报且未经审计；所有公开来源都缺少独立验证。第二，Pentera 作为最直接的自主安全验证竞争对手，通过强调连续验证能力，明确把 NodeZero
              定位为旧式方案；据称 Pentera 拥有约 1,200 家企业客户和约 $100M ARR，说明 Horizon3.ai 并非处在无人挑战的市场位置。第三，CrowdStrike 的 Exposure
              Management 扩张和 Microsoft Security Copilot
              代表资金雄厚的在位厂商威胁。只要其中任一家实现可比的自主渗透测试能力，独立平台可获取的溢价空间就会大幅收缩。联邦预算集中是一把双刃剑：政府板块验证产品质量并推动 ARR，但多年期合同续约若未兑现，可能导致 ARR
              阶梯式下滑。
