      - number: '5.3'
        title: 合规、授权与信任姿态
        blocks:
          - type: paragraph
            body: >-
              NodeZero 是少数获得 FedRAMP High 授权的自主渗透测试平台之一，Marketplace ID 为
              F2209220003。该授权支持其部署到处理高度敏感非密数据的联邦环境。Horizon3.ai 参与 NSA Cybersecurity Assurance Program Testing
              (CAPT)；在该项目下，NodeZero 为 Defense Industrial Base 供应商提供自主渗透测试，帮助其证明 CMMC 合规。2023 年，公司在 Department of Defense
              Platform One 软件市场获得 Awardable 状态，为 DoD 客户提供简化采购路径，无需单独竞争性采购流程。

              面向商业受监管市场，NodeZero 支持为 PCI DSS 4.0、HIPAA、CMMC 2.0、SOC 2 和 ISO 27001 生成合规证据；方式是把自主渗透测试输出与 OSCP
              认证人工渗透测试人员签字结合起来。Horizon3.ai 声称其自身云运营获得 SOC 2 Type II 认证，但审计报告未公开，无法独立验证。这些合规和监管资质，是其在与手工渗透测试公司以及更广义 PTaaS
              竞争者评估中对比时的主要差异点；后者通常没有 FedRAMP High 授权或 NSA 项目参与。
