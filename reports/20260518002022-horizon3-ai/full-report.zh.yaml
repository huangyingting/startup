      - number: '6.6'
        title: 附录
        blocks:
          - type: callout
            title: 多层级客户验证以 NSA 与 Fortune 10 信任为锚
            body: >-
              NodeZero 的客户证据覆盖企业网络安全中要求最高的信任层级：NSA Cybersecurity Collaboration Center（CAPT 项目）和 4 家 Fortune 10
              公司代表美国市场可达到的最高保障验证。NSA 信任尤其有意义——情报界的技术和运营安全标准几乎高于任何商业企业。与 Gartner Customers' Choice 认可、125% NDR，以及已执行
              225,000+ 次生产环境安全渗透测试结合起来，累计证据显示这是一款具备强产品市场契合的平台，而不只是早期采用者热情。Pentest Wednesday
              的重复节奏形成结构性留存飞轮：采用每周测试的组织，在攻击图基准连续性和嵌入 NodeZero 历史测试结果的机构知识上，会面临有意义的切换成本。
            calloutType: strength
            claimRefs:
              - CU009
              - CU010
              - CU027
              - CU028
              - CU030
          - type: callout
            title: MSSP 渠道集中与匿名证据是重大尽调风险
            body: >-
              有两类结构性风险需要尽调进一步穿透，公开证据目前无法消除。第一，MSSP 交付约占 70%，意味着 Horizon3.ai 的收入留存不仅取决于终端客户满意度，也同样取决于 MSSP 伙伴黏性；已识别的一条负面
              Gartner 评论提到某伙伴在排期和报告清晰度上存在问题，说明 MSSP 执行质量并非完全可控。如果 NCC Group、Optiv、Thrive 等一两家头部 MSSP
              将主要自主渗透测试供应商关系转向他方，即便终端用户并未不满，ARR 也可能有相当部分暴露在风险中。第二，匿名案例占主导（16 个具名 / 有文档支撑的客户中有 12
              个未披露名称），限制了对生产环境成果的独立核验。Fortune 10 和「全球最大银行」这两项声明商业意义最大，也最难独立验证；这种组合放大了尽调的不对称风险。
            calloutType: risk
            claimRefs:
              - CU035
              - CU036
              - CU037
              - CU038
              - CU039
          - type: callout
            title: 125% NDR + 94% GDR 意味着留存客群年扩张 31% —— 高置信 SaaS 信号
            body: >-
              Horizon3.ai 的 NDR（125%）与 GDR（94%）之间有一个明确含义：留存客户平均每年约把支出扩大 33%（125/94 = 1.33x）。放在企业 SaaS 基准里，这个扩张率偏高（120%
              NDR、90% GDR 对应 33% 扩张；Horizon3.ai 的数据意味着相近或更高水平）。最合理的结构性解释是，Pentest Wednesday 的每周节奏把客户从一次性评估带到连续订阅，再叠加
              NodeZero Insights、云渗透测试、钓鱼影响测试和 AD 审计模块的追加销售。如果这些指标准确，落地扩张模型说明 Horizon3.ai
              最有价值的动作不是获客，而是客户留存和追加销售；后者利润率更高，CAC 也低于净新增客户。投资人应在资料室中用客户群组级数据核验这些指标，并确认 MSSP 交付客户与直销客户的 NDR 口径一致。
