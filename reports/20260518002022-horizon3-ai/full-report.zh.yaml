      - number: '3.3'
        title: 二线企业平台威胁：Rapid7 与 Tenable
        blocks:
          - type: paragraph
            body: >
              **Rapid7** 将自身定位为“开放平台。AI 驱动。人工主导。”的企业安全公司，服务 11,000+ 全球客户，覆盖
              MDR、漏洞管理（InsightVM）、SIEM/XDR（InsightIDR/InsightSIEM）和 Metasploit 渗透测试框架。Metasploit 拥有 4,000+ 个利用模块和 20+
              年活跃专业开发史，在攻防安全实战者社区具备深厚可信度。不过，Metasploit 是需要熟练人工操作者的框架工具，与 NodeZero 的全自主攻击执行在结构上不同。Rapid7 在 2024 年 Q4
              财报中披露全年 ARR 超过 $850M，显示其财务规模足以投资或收购自主渗透测试能力。Rapid7 的托管服务（MDR）和检测平台（InsightSIEM）为可能同时评估 NodeZero
              的企业客户提供交叉销售路径，使 Rapid7 有能力把竞争能力打包进既有企业关系中。


              **Tenable** 是 NodeZero 商业扩张面临的最大长期平台替代风险。截至 2025 年 12 月 31 日，Tenable 服务 40,000+ 客户，其中包括约 65% 的 Fortune 500
              和 50% 的 Global 2000。Tenable One 是公司的 AI 驱动暴露管理平台，在统一暴露管理框架下覆盖 IT 资产、云资源、容器、Web 应用、身份系统、OT 环境和 AI
              工作负载。Tenable 所说的“预防式安全”和 AI 驱动暴露管理战略方向，与 NodeZero Insights 的产品方向直接重叠。作为 2025 年 Q4 Gartner Exposure
              Assessment Platforms 魔力象限领导者，Tenable 带有会影响 CISO 采购决策的分析师认可。风险情景是打包销售：如果 Tenable 通过内部开发或收购向 Tenable One
              加入自主攻击模拟，其相对 NodeZero 8 倍的客户规模优势，可能在续约周期通过折扣打包迅速侵蚀 NodeZero 的商业装机基础。Tenable FY2025 收入超过
              $900M，具备推动这条路径的财务能力。
