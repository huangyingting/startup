      - number: '2.3'
        title: 买方、用户与付费方分层
        blocks:
          - type: paragraph
            body: >
              渗透测试市场服务多个截然不同的买方类型，采购动态也有实质差异。在大型企业（超过 5,000 名员工）中，买方通常是 CISO 或信息安全
              VP，掌握预算权，可在无需额外董事会批准的情况下批准年度订阅合同。用户是内部安全运营团队或专门红队。付费方是企业 IT/安全预算。该层级的采用触发因素主要是监管要求（PCI DSS
              4.0、HIPAA、DORA、SEC 网络规则）和数据泄露后的恢复举措。大型企业在 2025 年渗透测试市场中占 67.83%（Mordor Intelligence）。


              在中型市场（1,000–5,000 名员工），买方通常是安全总监或 CTO，采购需要 CFO 或高管签字。该层级的主要采用触发因素是合规审计压力（尤其是零售和支付的 PCI DSS、医疗的
              HIPAA），或网络保险续保时保险方要求提供渗透测试证据。NodeZero 这类 PTaaS 平台在这里尤其有吸引力，因为相较人工顾问，它们能大幅降低单次测试成本。


              在美国联邦政府细分市场——这对 Horizon3.ai 是独特且高价值的市场——买方是机构 CISO 或授权官（AO），采购通过 GSA schedules 或直接合同载体流转，而 FedRAMP High
              Authorization 是进入认真评估的前置条件。联邦市场销售周期更长，但合同价值更高，续约稳定性也更强。BFSI（银行、金融服务、保险）在 2025 年渗透测试市场中占 28.68%；医疗则是到 2031
              年增长最快的垂直领域，CAGR 为 16.89%（Mordor Intelligence），驱动因素包括 FDA 上市前设备测试要求和 HIPAA 年度测试要求。北美占全球渗透测试市场 38.27% 份额。
