      - number: '4.3'
        title: 融资历史与资本充足性
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 于 2024 年 11 月完成 $100M Series D，由 Craft Ventures 领投，现有投资者参与。这是公司史上最大单轮融资，使已披露累计融资约达
              $141M。此前轮次包括种子轮、Series B（$28M，2022 年）和规模较小的 Series C 延展轮；Craft Ventures 一直是主要机构领投方。该 Series D
              发生在网络安全风投融资环境艰难时期，说明投资人高度认可 NodeZero 的联邦独占性和商业牵引。


              Series D 募集资金用途披露为平台研发、联邦渠道扩张和国际市场进入；欧洲业务以 2023 年设立的 Amsterdam 办公室为锚点。公司未公开披露债务融资、信贷额度或项目融资安排，符合这一阶段风投支持
              SaaS 公司的特征。


              资本充足性几乎完全取决于烧钱速度，而公司没有披露该指标。按估计 $6–12M/month 烧钱（由约 400 名员工、云基础设施和激进 S&M 支出推断），$100M Series D 从交割时点（2024 年
              11 月）起提供约 8–17 个月现金跑道，意味着若收入没有显著拐点，公司可能需要在 2026 年中至年底前融资下一轮。缺少 ARR 披露，无法从收入角度评估资本充足性。
