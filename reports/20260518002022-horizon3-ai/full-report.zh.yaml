  - id: FV001
    title: 建议逻辑：决策树
    type: flow
    layout: wide
    summary: >
      一棵决策树，将关键尽调关口——ARR 验证、NRR 确认、FedRAMP 护城河和入场倍数——映射到四种建议结果：BUY（高确信度）、CONDITIONAL（争取折价）、TRACK（数据不足）或
      PASS（估值过高或投资逻辑破裂）。
    data:
      nodes:
        - id: n1
          label: ARR 是否验证 ≥$80M？
          type: decision
        - id: n2
          label: NRR 是否验证 >110%？
          type: decision
        - id: n3
          label: 入场倍数 ≤15× ARR？
          type: decision
        - id: n4
          label: BUY — 高确信度
          type: outcome
        - id: n5
          label: TRACK — 等待 ARR 验证
          type: outcome
        - id: n6
          label: PASS — 估值过高 / 护城河破裂
          type: outcome
        - id: n7
          label: CONDITIONAL — 谈判将入场倍数压到 15× 以下
          type: outcome
        - id: n8
          label: FedRAMP 护城河完好，且无竞争对手拿到 FedRAMP High？
          type: decision
      edges:
        - from: n1
          to: n2
          label: 是
        - from: n1
          to: n5
          label: 否
        - from: n2
          to: n3
          label: 是
        - from: n2
          to: n8
          label: 否
        - from: n3
          to: n4
          label: 是
        - from: n3
          to: n7
          label: 否 — 价格过高
        - from: n8
          to: n7
          label: 是
        - from: n8
          to: n6
          label: 否
    approximationNotes: 决策阈值（≥$80M ARR、>110% NRR、≤15× ARR）由可比公司分析推导，代表作者的尽调标准，不是确定性的投资准则。
    claimRefs:
