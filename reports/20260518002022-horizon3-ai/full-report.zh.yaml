  - id: FE001
    title: 产品架构图 — NodeZero 技术栈
    type: stack
    layout: wide
    summary: 分层技术栈展示 NodeZero 平台：从情报和数据源底座，到部署选项、集成连接器、AI 推理，再到顶层面向客户的六类操作。每一层代表平台一个独立功能层级。
    claimRefs:
      - CE001
      - CE009
      - CE010
      - CE013
      - CE014
      - CE024
    data:
      layers:
        - label: 面向客户的操作
          detail: 六类主要操作：内部渗透测试、外部渗透测试、云渗透测试（AWS/Azure/GCP）、AD 密码审计、钓鱼影响测试、Kubernetes 渗透测试
        - label: 支撑能力层
          detail: >-
            NodeZero Insights（暴露面管理情报）、NodeZero Tripwires（入侵后诱捕检测）、NodeZero MCP Server（通过 Model Context Protocol 集成
            AI/LLM 工具）
        - label: AI 推理层（Mythos）
          detail: 攻击路径优先级排序和置信度评分；LLM 辅助解读多跳链路；为非专业用户生成利用证明叙事
        - label: 攻击情报核心
          detail: Attack Graph Engine 将跨用户、系统和服务的多跳利用串联起来；映射 MITRE ATT&CK 战术 / 技术；生成修复动作，并支持一键验证流程
        - label: 部署与编排
          detail: H3 Cloud（每次渗透测试临时 VPC，无代理外部 / 云测试）；Docker/OVA 代理（内部渗透测试，客户部署，约 4 GB）；Cloud Connector（基于 AWS/Azure/GCP 凭据）
        - label: 集成层
          detail: >-
            ServiceNow Vulnerability Response 连接器；Splunk 和 Microsoft Sentinel SIEM/SOAR API；用于定制集成的 REST API 和
            webhook；面向 AI 工具体系的 NodeZero MCP Server
        - label: 数据与情报源
          detail: CISA Known Exploited Vulnerabilities（KEV）目录；NVD/CVE 数据库；GitHub horizon3ai PoC 利用库（41+ 个仓库）；OSINT 外部侦察源
  - id: FE002
    title: 客户工作流 / 运营流程 — NodeZero 渗透测试生命周期
    type: flow
    layout: wide
    summary: 端到端工作流展示一次 NodeZero 渗透测试如何从客户发起，经过 H3 Cloud 编排、代理部署、主动测试阶段，最终产出已验证的修复动作报告，并在修复后再次验证。
    claimRefs:
      - CE002
      - CE003
      - CE009
      - CE010
      - CE024
      - CE035
    data:
      nodes:
        - id: n1
          label: 客户发起渗透测试
          detail: 通过 NodeZero 门户或 API；选择操作类型、范围和排期；为云 / AD 测试配置凭据
          type: start
        - id: n2
          label: H3 Cloud 启动临时 VPC
          detail: 在 H3 Cloud 创建专用一次性 VPC；所有渗透测试算力按租户隔离；测试后销毁
          type: step
        - id: n3
          label: 部署代理或无代理连接器
          detail: 内部测试：客户部署 Docker/OVA；外部 / 云测试：H3 Cloud 以无代理方式运行；不安装持久软件
          type: step
        - id: n4
          label: 侦察与资产发现
          detail: 网络扫描、服务枚举、凭据收集面映射；外部范围使用 OSINT
          type: step
        - id: n5
          label: 凭据与漏洞测试
          detail: 生产环境安全的利用尝试；不使用破坏性 payload；凭据喷洒、CVE 利用、配置滥用
          type: step
        - id: n6
          label: 攻击链组装
          detail: 构建多跳路径；跨用户、服务和系统生成攻击图；映射 MITRE ATT&CK
          type: step
        - id: n7
          label: 利用证明生成
          detail: 为每条已利用路径生成证据截图、凭据捕获产物和攻击叙事
          type: step
        - id: n8
          label: 修复动作优先级报告
          detail: 按可利用性加权评分排序的修复清单；每个发现附修复说明；交叉引用 CVSS
          type: step
        - id: n9
          label: 修复后验证测试
          detail: 客户应用修复后重新运行定向 NodeZero 测试，确认可利用路径已关闭
          type: end
      edges:
        - from: n1
          to: n2
          label: 渗透测试已发起
        - from: n2
          to: n3
          label: VPC 就绪；部署代理或连接
        - from: n3
          to: n4
          label: 代理 / 连接器已激活
        - from: n4
          to: n5
          label: 资产已映射
        - from: n5
          to: n6
          label: 利用已执行
        - from: n6
          to: n7
          label: 路径已组装
        - from: n7
          to: n8
          label: 证据已收集
        - from: n8
          to: n9
          label: 修复已应用
