  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: standard
    summary: >-
      七阶段客户旅程从初始认知到拥护推荐，展示 NodeZero 买家如何从监管或入侵事件触发，走到评估、试点、部署、Pentest Wednesday 扩张，最终成为参考客户。联邦和商业路径在采购阶段分叉，但在 Pentest
      Wednesday 的周期性节奏阶段汇合。
    data:
      nodes:
        - id: awareness
          label: 认知 — CISO 发现合规要求、入侵事件或董事会压力，触发安全验证需求
          type: entry
        - id: evaluation
          label: 评估 — RFP、演示请求，或研究 GSA/Platform One 采购工具；FedRAMP High 状态让 NodeZero 进入联邦买家短名单
          type: stage
        - id: pilot
          label: POC / 试点 — 部署生产环境安全架构；在真实环境完成首次渗透测试；与安全团队复盘攻击图
          type: stage
        - id: procurement
          label: 采购 / 合同 — 直采（联邦走 GSA、Platform One、Tradewinds；企业直销）或经 MSSP 合作伙伴（NCC Group、Optiv、Pax8）
          type: stage
        - id: deployment
          label: 初始部署 — NodeZero 外部或内部渗透测试；ZeroLogon / AD 审计；云渗透测试；交付首批关键影响发现
          type: stage
        - id: expansion
          label: Pentest Wednesday 扩张 — 每周重复测试节奏；附加模块（NodeZero Insights、云、钓鱼、AD 审计）；ACV 扩张
          type: stage
        - id: advocacy
          label: 拥护 / 背书 — 客户成为具名参考（联邦 / SLED）或匿名案例；贡献 Gartner Peer Insights 评价
          type: exit
    approximationNotes: 旅程阶段根据案例研究描述和产品文档推断。各阶段之间的转化率未公开披露。联邦路径在采购阶段分叉（政府合同工具 vs. 商业直销）。
    claimRefs:
      - CU001
      - CU009
      - CU027
      - CU035
  - id: FU002
    title: 采用 / 部署漏斗
    type: funnel
    layout: standard
    summary: NodeZero 五阶段客户获取和扩张漏斗，从可寻址企业和联邦机构总范围，到活跃客户和 Pentest Wednesday 周期订阅者。各阶段数值基于可用公司披露和市场估计，代表估计群体规模。
    data:
      items:
        - label: 可寻址企业 + 联邦机构总范围（有渗透测试预算的组织）
          value: 80000
          description: >-
            估计可寻址组织总量：Fortune 500 + Global 2000 + 美国联邦机构 + 受监管要求约束的中端市场企业（PCI、HIPAA、FedRAMP）。Horizon3.ai 估计 2026 年 PTaaS
            市场 TAM 约 $720M。
        - label: NodeZero 评估 / 演示（看过 NodeZero 演示或发起 RFP 的组织）
          value: 15000
          description: 估计评估范围基于展会露出、联邦采购工具名单和 MSSP 合作伙伴管道。没有披露数字；基于公司在分析师报告中的能见度，估计约占 TAM 的 19%。
        - label: 已完成试点 / POC（运行过生产 NodeZero 测试的组织）
          value: 7000
          description: 估计 POC 完成量。生产环境安全架构和 MSSP 交付显著降低 POC 门槛，优于需要本地代理的竞品。估计基于活跃客户群约 50% 的 POC 到客户转化率。
        - label: 活跃客户（截至 2026 年 3 月持有有效 NodeZero 许可的组织）
          value: 5200
          description: 公司披露：全球 5,200+ 个活跃组织客户。包括直销、MSSP 交付（约 70%）以及通过 Pax8 生态服务 SMB/MSP 的客户。
        - label: Pentest Wednesday 周期订阅者（按每周节奏测试的客户）
          value: 1500
          description: 基于案例研究中的频率描述和 125% NDR 扩张信号估计活跃 Pentest Wednesday 订阅者。具体订阅者数量未披露；约占客户基数 29% 是分析师估计。
    approximationNotes: 上方漏斗中高于“活跃客户”的所有数值均为分析师估计。NodeZero 披露的 5,200+ 活跃客户数（2026 年 3 月）是唯一已确认数据点。转化率根据市场类比和公司披露指标推断。
    claimRefs:
      - CU022
      - CU024
      - CU025
      - CU031
  - id: FU003
    title: 客户证据矩阵
    type: matrix
    layout: standard
    summary: 证据质量矩阵将五个客户垂直领域和四个证据维度的证明强度映射出来。单元格使用从具名 / 量化（最强）到估计 / 缺失（最弱）的定性尺度，反映各垂直领域可用客户证据的质量和具体程度。
