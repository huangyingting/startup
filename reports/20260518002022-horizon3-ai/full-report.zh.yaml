  - id: FR002
    title: 风险传导图：风险如何级联
    type: dag
    layout: wide
    summary: 该有向无环图展示一级风险触发因素如何传导到二级、三级影响。联邦收入集中和监管压力是根节点；声誉受损和资不抵债是终端影响节点。
    data:
