      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              渗透测试市场受益于几股结构性顺风，它们正在加速需求并压缩买方评估周期。最强的近期驱动因素，是多个监管框架同时启动强制测试要求。PCI DSS 4.0 于 2025 年 3
              月强制执行，要求所有商户和处理方每年开展渗透测试，把一项此前可选的活动纳入强制性合规框架。HIPAA 现在要求受覆盖医疗实体每年进行渗透测试。FedRAMP 3.0
              要求所有联邦云提供商每季度进行漏洞扫描并每年进行渗透测试；拟议的 FedRAMP 4.0 框架将使高影响系统的频率翻倍。EU Digital Operational Resilience
              Act（DORA）要求在欧盟运营的金融机构每年开展 Threat-Led Penetration Testing（TLPT）。New York 的 23 NYCRR 500（2023 修订）要求董事会在 30
              天内审查渗透测试发现。合在一起，这些规定形成了难以逆转的合规底线，并系统性地把可自由裁量的安全支出转为不可自由裁量的预算项。


              第二个结构性驱动因素，是 AI 增强威胁行为者加速出现。Dark Reading 在 2026 年记录到，AI 智能体如今可以在漏洞披露后数小时内生成定制黑客工具，绕过传统基于签名的检测。这场“威胁行为者 AI
              军备竞赛”让持续验证比周期性验证更紧迫——漏洞披露到武器化之间的窗口已从数天压缩到数小时，年度人工渗透测试已不足以支撑成熟组织。反过来，同样的 AI
              能力普及也意味着，当开源等价方案出现时，自主渗透测试平台的差异化可能被侵蚀。全球网络安全人才短缺也在结构上利好自动化平台：全球估计有 3.5 million 个网络安全岗位空缺，组织无法大规模自建内部红队。


              采用约束包括：监管接受度不确定（部分合规审计方尚不接受 AI
              生成测试输出在没有人工认证签字的情况下满足证明要求）；在涉及敏感数据或关键系统的生产环境中执行自主攻击带来的责任顾虑；从既有咨询关系迁移的切换成本；以及 SME 细分市场的价格敏感性，该市场年度测试预算中位数约为
              $187,000（Mordor Intelligence、Pentera 调研数据）。National Institute of Standards and Technology 发布的 NIST SP
              800-115 标准为安全测试方法提供基础框架，但该标准早于自主 AI 渗透测试，也没有专门讨论 AI 驱动测试验证，因此带来监管解释不确定性。
