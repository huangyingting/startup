      - number: '2.5'
        title: 规模测算尽调缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >
              多个实质性证据缺口限制了本章市场规模估计的可信度。第一，没有独立分析机构为 Horizon3.ai 最直接竞争的“自主 AI 原生渗透测试”子类别发布专门规模估算。最接近的代理是 PTaaS 市场（2026 年
              $0.72B，MarketsandMarkets），但 PTaaS 包含人工增强和混合方案。Horizon3.ai 的全自主定位只占 PTaaS 的一个子集，若没有一手研究，无法测算规模。


              第二，MarketsandMarkets 和 Mordor Intelligence 的数字方向一致（都预计更广义渗透测试市场 CAGR 为 14–15%），但绝对规模相差约
              15–20%。两家公司都采用自有方法，公开资料对方法描述不足，无法调和差异。两组数字都不应视为点估计；应保留区间。


              第三，Horizon3.ai 的收入、市场份额和客户细分分布均未公开披露，因此无法从外部来源计算公司在 PTaaS
              或渗透测试市场中的份额。客户数（5,200+）是唯一披露的规模指标；没有平均合同价值数据，按收入测算的渗透率无法量化。按客户数推断的隐含市场份额明显为正，但数值上没有边界。


              第四，到 2031 年的分析师预测承载复合不确定性，因为 AI 在攻防两端的发展速度很快。如果开源 AI 工具在 2–3 年内把基础自主渗透测试商品化，溢价 PTaaS 平台的增长预测将被实质改写。Mordor
              Intelligence 承认了这一风险（将竞争动态列为市场约束），但现有分析师模型没有量化。
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
