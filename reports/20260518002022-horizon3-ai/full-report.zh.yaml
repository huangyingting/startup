      - number: '5.6'
        title: 技术风险与产品限制
        blocks:
          - type: paragraph
            body: >-
              NodeZero 的产品轨迹强劲，但若干与尽调相关的风险和限制值得审视。来自企业客户的 Gartner Peer Insights 评论在实践者层面释放出混合信号：一位保险行业 CISO 给出 4
              星评价，认为该工具是合格的「cloud-based security tool」，但提出合规顾虑；一位服务行业 CIO 给出 3
              星评价，提到排期问题和测试结果不够直观，说明没有专职进攻安全经验的团队，可能面临可用性和结果解读挑战。这些评论样本有限，但与自主渗透测试输出对非专业用户的内在复杂性相符。

              平台所有外部和无代理测试都依赖 H3 Cloud 基础设施，这使其受 Horizon3.ai 云可用性影响；公开资料中没有披露渗透测试 uptime 的 SLA。AI 推理层（Mythos/MCP
              Server）依赖未披露的 LLM 提供商；若这些提供商更改 API 或定价，会产生集成风险。Horizon3.ai 声称其云运营通过 SOC 2 Type II
              审计，但报告未公开，无法独立验证范围。公开来源中没有第三方基准，把 NodeZero 的利用覆盖深度和误报率与 Pentera 等竞争平台对比，限制了企业买家对总拥有成本的客观比较。
