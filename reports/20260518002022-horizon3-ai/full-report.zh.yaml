      - number: '1.5'
        title: 产品组合与平台架构
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的产品组合围绕 NodeZero 展开，覆盖多个运行模式和部署配置。平台核心能力是自主内部网络渗透测试：NodeZero
              将可利用漏洞、收集到的凭证、错误配置和薄弱安全策略串联起来，展示真实攻击路径，模拟高级持续性威胁（APT）行为者和勒索软件操作者的技战术。NodeZero External Attack Surface
              将验证扩展到面向互联网的资产。NodeZero Cloud 覆盖 AWS、Azure 和 GCP 环境，验证身份与权限提升路径。NodeZero AD Password Audit 按基于凭证的攻击模式评估
              Active Directory 密码健康度。NodeZero for Kubernetes 验证容器编排安全配置。


              平台技术架构建立在每次渗透测试单次使用的一次性虚拟私有云环境之上。该隔离机制确保测试活动被限制在范围内，不会穿越到相邻系统，也不会触及定义测试范围之外的客户数据；测试完成后，生产环境不留下常驻痕迹。NodeZero
              可作为 Model Context Protocol（MCP）服务器接入安全自动化工作流，并开放文档化 API，用于以编程方式编排渗透测试。平台还可接入常见企业安全生态，包括 SIEM、SOAR 和 ITSM
              工具。


              NodeZero Federal 是面向政府的产品版本，拥有 FedRAMP High Authorization——这是美国联邦云服务最高的民事合规层级，要求由独立第三方按 NIST SP 800-53
              High 基线评估 800+ 项安全控制。NodeZero Federal 也是 NSA Continuous Autonomous Penetration Testing（CAPT）计划的攻防安全引擎；截至
              2025 年 5 月，该计划已评估数百家国防工业基础（DIB）供应商，在国家安全规模上验证了平台的生产安全性。2026 年 5 月 14 日，NodeZero 被列为 DoD Tradewinds
              Solutions Marketplace 的可授标（Awardable）方案，可在不经过完整竞争性采购流程的情况下加速联邦采购。


              Horizon3.ai 运营攻击研究和漏洞披露计划，围绕关键 CVE 和新兴国家级 TTP 发布快速响应安全公告。所有产品开发和工程工作均在美国完成。
