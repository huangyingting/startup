  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用户 / 角色
      - 当前工作流（NodeZero 前）
      - NodeZero 方案
      - 可衡量收益
      - 限制
    rows:
      - - 企业 CISO
        - 年度人工渗透测试（$50K–$150K，4–6 周）；静态发现报告
        - 持续 NodeZero 订阅；按需渗透测试，数小时完成
        - 每轮测试成本降低 80%+；实时可利用性证据
        - 需要内部专业能力解读攻击路径上下文；初始导入期有投入
      - - IT 安全团队
        - Patch Tuesday：扫描 CVE、手工验证可利用性、按 CVSS 分数排序
        - NodeZero Rapid Response：在 24–72 小时内自动测试已修补 CVE 是否仍可利用
        - 立即证明已修补 CVE 在其环境中是否仍可被利用
        - Rapid Response 仅覆盖 CISA KEV 目录；非 KEV CVE 需要安排渗透测试运行
      - - MSSP / MSP 合作伙伴
        - 人工渗透测试按小时计费；规模有限，覆盖客户基数窄
        - Vanguard Program：向客户组合自动交付 NodeZero
        - 在 MSP 客户群中规模化测试；相较按时间交付提升利润率
        - 客户环境必须支持 Docker/OVA，或可从外部访问
      - - 联邦机构安全
        - 只能使用 FedRAMP 授权工具；DoD 竞争性采购流程缓慢
        - NodeZero Federal（FedRAMP High 授权）+ DoD Platform One 可授标采购
        - 在联邦影响等级内合规开展自主渗透测试；采购节奏加快
        - 联邦实例可能滞后于商业版功能发布；公开能力文档有限
      - - 医疗 / 金融合规团队
        - 咨询公司每年做合规渗透测试；审计证据靠人工收集
        - NodeZero 合规服务：自动化持续测试 + OSCP 人工渗透测试员签字
        - 按需生成合规证据；PCI/HIPAA/CMMC 可直接入报告的输出包
        - 混合服务（并非完全自主）；容量、排期和周转时间未公布 SLA
    notes: 用例模式来自官方产品页、合作伙伴公告、合规页面和面向客户的新闻稿。可量化收益反映供应商说法；独立 ROI 基准尚未公开。
