      - number: '6.5'
        title: 渠道模式、集中度风险与采购动态
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 以渠道为主导的 go-to-market 模式既是优势，也是集中度风险。截至 2026 年 3 月，约 70% MSSP/MSP 交付率让 NodeZero 触达 SMB
              和中端市场客户，这些客户若靠直销服务并不经济；Pax8 合作还提供了 40,000+ MSP 伙伴入口。但 MSSP 集中意味着，如果一个或多个头部 MSSP 伙伴流失、减少 NodeZero
              部署转向竞争者，或自身收入下滑，Horizon3.ai 客户基础中相当一部分将面临风险。Gartner 反向评论已经暴露出一个 MSSP 执行摩擦案例（与伙伴相关的排期和报告清晰度问题），说明 MSSP
              交付的客户体验并非完全受控。


              联邦采购带来另一种集中度风险：整个联邦细分市场依赖 FedRAMP High 授权的连续有效。如果 Horizon3.ai 的 FedRAMP High
              授权被暂停、未能重新授权，或竞争者取得同等授权，联邦护城河就会削弱。从 FedRAMP Rev4 向 FedRAMP 3.0 过渡（2025 年启动）构成近期合规升级要求。DoD Platform One 和
              Tradewinds Marketplace 的 awardable 状态（均在 2025–2026 年取得）是正面准入信号，但 awardable
              状态本身不保证合同流入——联邦机构仍须下订单，而订单受拨款和合同官自由裁量影响。


              顶部客户集中度（Fortune 10）既是收入质量信号，也是风险。4 家 Fortune 10 公司作为客户，意味着少数关系可能构成直接 ARR 的不成比例份额。如果任何一家 Fortune 10
              客户流失或整合供应商，影响可能重大。同样，全球最大银行类别虽然代表多个客户，但也说明公司依赖一个集中的金融服务收入层级。Horizon3.ai 尚未披露前 10 大客户贡献 ARR
              的比例——这是关键尽调缺口，应作为数据室请求。尽调还应确认 5,200+ 客户数代表不同组织，而不是把同一企业的多个子公司重复计数。
