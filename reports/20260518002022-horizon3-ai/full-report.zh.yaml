      - number: '7.4'
        title: 人员、执行与财务风险
        blocks:
          - type: paragraph
            body: >
              CEO Snehal Antani 是公司最显眼的资产，也是一项集中风险。他曾任 JSOC（Joint Special Operations Command）CTO、Splunk CTO 和 GE Capital
              CIO，这让 Horizon3.ai
              在国家安全与企业市场拥有独特可信度；他也是最主要的公开发言人、会议主旨演讲嘉宾和品牌化身。如果他因收购、个人原因或竞争对手挖角离开，联邦板块的客户信心和交易流大概率受压；在该板块，个人关系和对使命的信任权重格外高。公开信息中没有可识别的继任计划或联席
              CEO 架构。


              Antani 之外，公司领导层还包括前特种作战资深人士（工程负责人曾在 NASA 受训，Signal iOS app
              的共同开发者），这些领域可信度很难复制。网络安全人才市场仍然高度竞争；联邦业务需要的持证人员和进攻安全专家供给有限，招聘受约束。进攻安全岗位的倦怠率高于平均水平，Glassdoor
              式员工评价也显示，高增长网络安全创业公司即便使命感强，仍会面临留人挑战。


              财务上，公司估计 50–60% 的联邦板块收入依赖形成结构性预算风险。联邦网络安全支出受国会拨款不确定性、持续决议以及机构层面的预算优先级重排影响。DHS、DoD
              或情报界网络安全项目若遭遇重大削减，或持续决议拖延过久，都可能推迟采购订单并降低续约率。较长的企业销售周期会进一步放大这一点：联邦平均销售周期为 6–18 个月，导致收入确认呈块状波动。


              5,200+ 个报告客户在一定程度上缓解了客户集中风险；但如果少数大型联邦合同贡献了不成比例的 ARR（联邦优先网络安全供应商常见模式），任何一个大客户流失都可能构成重大影响。公司没有披露
              ARR，真实集中度画像仍不透明。
