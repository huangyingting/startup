      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: 投资建议：CONDITIONAL TRACK
            body: >
              建议在当前约 $1B 估值下跟踪 Horizon3.ai；如果独立财务验证确认 ARR ≥$80M、NRR >110%、毛利率 >65%，则有条件上调至 BUY。在财务数据达到这些门槛且已验证的情况下，15×
              ARR 入场倍数意味着 $1.2B 入场价格，与当前 Series D 标记一致，并在基准退出情景下具备 2–3× 回报潜力。追求更高安全边际的投资人应把入场目标定在 $700M 或以下（按 $80M 已验证
              ARR 计算 ≤9×），这样即便在基准情景下也能获得 2–5× 回报。
            calloutType: recommendation
            claimRefs:
              - CV036
              - CV004
              - CV021
              - CV023
          - type: callout
            title: 关键风险：未经验证的财务数据支撑全部估值结论
            body: >
              本章所有估值结论都依赖未经验证、由公司声称的 ARR 和增长数据。公司没有发布经审计财务报表，作为私营企业也没有义务这样做。如果实际 ARR 低于 $40M——考虑到间接证据区间很宽，这并非不可能——$1B
              估值意味着 25×+ EV/ARR 倍数，且没有公开可比公司可以支撑。投资人必须把本章财务 KPI 视为有依据的估计，而不是事实底稿；在投入资本前，应要求进入资料室。
            calloutType: risk
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV032
          - type: callout
            title: 关键假设：FedRAMP Authorization 仍是持久护城河
            body: >
              本分析赋予 Horizon3.ai 的 FedRAMP High authorization 显著内在价值，依据是获得该授权需要 18–36 个月以及七位数合规投入。如果 Pentera、CrowdStrike
              或其他竞争对手在未来 12–18 个月内取得可比授权，护城河会明显变窄，当前 $1B 估值中计入的政府板块 ARR 溢价也会面临风险。投资人应按季度跟踪竞争对手 FedRAMP 状态。
            calloutType: assumption
            claimRefs:
              - CV015
