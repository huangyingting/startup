    approximationNotes: Gartner 评论按垂直行业拆分的数据未公开。具名客户数和案例研究归属基于 Horizon3.ai 截至 2026 年 5 月的公开披露。收入加权的证明质量（哪些垂直行业贡献更多 ARR）无法从公开来源判断。
