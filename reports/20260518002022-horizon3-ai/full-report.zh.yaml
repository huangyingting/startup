    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 是一家私营网络安全软件公司，总部在 California 州 San Francisco，另在 Illinois 州 Chicago 和 Netherlands 的 Amsterdam
              设有办公室。公司采用远程优先组织方式，由美国特种作战司令部（SOCOM）和美国国家安全体系退伍人员于 2019 年创立。使命是帮助各种规模的组织在威胁行为者触达之前，持续、自主地发现并修复可被利用的攻击向量。


              公司的旗舰商业产品是 NodeZero®，一款以 SaaS 订阅交付的全自主渗透测试平台。NodeZero
              部署时不需要常驻代理、不需要预先提供凭证，也不要求操作者具备专业经验。组织可在数分钟内启动一次渗透测试，平台会在真实生产环境中自主跑完整个攻击生命周期——侦察、利用、横向移动和影响展示。测试结束后，NodeZero
              输出按影响排序的发现，并给出分步骤修复建议和一键修复验证。平台覆盖内部网络渗透测试、外部攻击面评估、云渗透测试（AWS、Azure、GCP）、Active Directory 密码审计、Kubernetes
              安全验证和身份安全验证。


              Horizon3.ai 的商业模式以年度 SaaS 订阅为核心，价格按测试量或持续测试承诺定价；另通过面向 MSSP
              和托管服务商的合作伙伴白标授权获得收入。公司明确把产品定位为由曾为美国政府执行真实攻防安全任务的实战人员打造，因此 NodeZero 具备公司所称的操作员级攻击真实性。Horizon3.ai
              所有产品均在美国开发、工程化并制造；公司在营销和政府采购材料中突出使用 “100% made in USA” 标语。NodeZero Federal 是面向政府的产品版本，截至 2026 年中是唯一获得
              FedRAMP High 授权的自主渗透测试平台，从而可销售给美国联邦民事机构和国防部门。
