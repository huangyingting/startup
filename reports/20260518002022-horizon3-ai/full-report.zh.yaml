      - number: '7.5'
        title: 技术与基础设施风险
        blocks:
          - type: paragraph
            body: >
              NodeZero 架构采用 SaaS 交付，并依赖云基础设施（AWS 和 / 或 Azure）承载编排层；内部渗透测试则从客户本地的 Docker 容器或 OVA 实例运行。云依赖带来可用性风险：如果影响
              NodeZero 编排的云供应商发生持续宕机或安全事件，所有受影响客户的连续评估工作流都会中断。对有 RTO 要求的联邦客户来说，这可能触发 SLA 违约。


              更隐蔽的技术风险是攻击链构建中的 AI 幻觉。NodeZero 自主生成并串联 exploit；如果底层 AI
              模型产出错误的利用顺序——推荐一条实际跑不通的漏洞链——会出现两种故障模式：（1）真实漏洞没有被利用到，从而漏报；（2）误报被升级，导致不必要的 incident response。随着 NodeZero
              的「Mythos」框架和其他 AI 驱动的攻击路径推理组件演进，如果没有稳健验证层，自信但错误的 AI 输出风险会升高。


              云依赖还带来供应商锁定风险：把 NodeZero 基于云的攻击编排迁移到另一家云供应商并不简单。如果 AWS 或 Azure
              调整价格、终止服务条款，或因监管行动被要求在特定司法辖区做数据本地化，Horizon3.ai 可能面临高成本基础设施迁移。github.com/horizon3ai 上的 GitHub
              仓库托管了开源组件；如果任何依赖被攻破，也会引入供应链风险。


              CISA Known Exploited Vulnerabilities（KEV）目录和 NIST NVD（250,000+ CVE）构成 NodeZero 用来理解漏洞语境的数据底座。如果 CISA 或
              NIST 削减经费、限制 API 访问，或大幅改变数据格式，NodeZero 的情报层会退化。更广泛地看，NodeZero 自主决策质量取决于外部威胁情报数据源的准确性，而这项依赖并不完全在
              Horizon3.ai 控制之内。
