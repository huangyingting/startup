        - from: false-negative
          to: rep-damage
        - from: rep-damage
          to: revenue-decline
        - from: ceo-departure
          to: rep-damage
        - from: ceo-departure
          to: talent-attrition
        - from: talent-attrition
          to: revenue-decline
    approximationNotes: 边关系是分析师推断的因果连接。未对边权建模；所有边只代表合理的因果路径，不代表量化概率流。
