              Pentera CEO Amitai Ratzon 于 2026 年 1 月公开确认 $100M ARR，使 Pentera 成为近期最可信、可能挤压 NodeZero 商业位置的收入威胁。Pentera
              平台已演进为统一的「find to fix」暴露管理工作流，直接争夺 NodeZero 面向的同一笔企业 CISO 预算。关键不对称在 FedRAMP：如果 Pentera 启动 FedRAMP High
