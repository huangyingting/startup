      - number: '8.6'
        title: 最终尽调清单
        blocks:
          - type: paragraph
            body: >
              在以 Series D 估值或更高价格投入资本之前，投资人应取得以下证据。财务验证是最高优先级：过去十二个月
              ARR、按客户群组切分的年合同价值（ACV）增长、按联邦与商业客户分段的净收入留存，以及包含基础设施和支持成本的毛利率。没有这些数据，隐含 EV/ARR 倍数无法可靠计算，情景概率也只能是推测。

              股权结构表和优先权结构是第二个关键问题：总清算优先权相对于上一轮投后估值的比例、投资人反稀释条款，以及是否存在任何 1× 或更高的参与型优先股。沉重的优先权悬置可能让普通股在熊市估值下实质出局。

              第三，联邦合同可见度：多年期合同续约日期表、前十大联邦客户的总合同价值（TCV），以及 FedRAMP authorization 续期和扩展的当前状态。第四，竞争替换证据：相对
              Pentera、SentinelOne Singularity 和 CrowdStrike 暴露管理产品的赢单 / 输单率，尤其是在 10,000
              个终端以上的企业账户中。最后，产品路线图和知识产权防御性：关键专利审查、NodeZero Insights 扩展时间表，以及 AI exploit 生成引擎相对开源和 LLM 替代方案仍保持性能优势的证据。
