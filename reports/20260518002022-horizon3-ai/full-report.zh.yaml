  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险格局
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的 NodeZero 平台处在三套相互重叠的监管制度交汇处，任何一套都可能实质影响产品合法性、市场准入或运营成本。近期最关键的第一项风险是 EU AI Act（Regulation
              2024/1689）：该法于 2024 年 8 月生效，禁止性条款于 2025 年 2 月开始适用。该法定义了四级风险；NodeZero
              不太可能落入绝对禁止级别（该级别覆盖社会评分、大规模生物识别监控和剥削性操纵），但如果监管机构认定主动攻击 IT 基础设施的自主 AI 系统会危及关键基础设施或基本权利，NodeZero
              可能被归为「高风险」。一旦被归类为高风险，强制合规评估、详尽文档、人类监督要求以及在欧盟公开数据库注册都会随之而来，显著推高合规成本，并拖慢欧洲商业扩张。


              第二条风险来自美国出口管制法。Bureau of Industry and Security（BIS）通过 Export Administration Regulations（EAR）监管网络安全物项，具体包括
              ECCN 4E001 以及与入侵软件有关的代码。NodeZero
              的自主攻击链生成、凭证利用和漏洞串联可能被归类为军民两用的进攻性工具。任何国际分发——包括向非美国客户提供云交付——都必须符合许可要求或许可例外。EAR 下的 Cybersecurity
              Waiver（ECS）在部分情况下可能适用，但合规负担仍然很重；一旦出错，可能触发每项违规最高 $353,534 的民事罚款或刑事处罚。


              第三条风险是 FedRAMP 重新授权。NodeZero Federal 目前持有的 FedRAMP High Authorization 必须通过年度评估、Plan of Action and
              Milestones（POA&M）管理以及重大变更请求持续维护。一旦 FedRAMP 状态丢失或中断，NodeZero Federal 将立即失去联邦销售资格，估计 50–60% 的收入可能被搁置。DoD
              承包商还要满足 CMMC 2.0 合规要求，测试和审计义务进一步增加。Federal Register 记录了出口管制和网络安全项目要求都在持续演进，合规环境变化很快。
