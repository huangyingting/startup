      - number: '3.4'
        title: 横向平台竞争者：CrowdStrike 与 Palo Alto Networks
        blocks:
          - type: paragraph
            body: >
              **CrowdStrike** 将自己定位为 2026 年的「The Agentic Security Platform」。Falcon 平台覆盖终端防护、身份威胁检测、SIEM（Falcon Next-Gen
              SIEM）、云安全和 AI 智能体能力。CrowdStrike 的 Charlotte AI AgentWorks 生态让客户构建专用安全智能体；其「Falcon Next-Gen SIEM for
              Defender」产品则与 Microsoft Sentinel 争夺 SOC 转型预算。CrowdStrike 目前没有专门的自主渗透测试或攻击模拟能力，但其智能体 AI
              架构为开发红队自动化能力提供了可信路径，未来可能打包进现有 Falcon 合同。CrowdStrike FY2025 Q4 ARR 超过 $4 billion，具备充足财力向相邻品类扩张。对 NodeZero
              而言，CrowdStrike 是一种间接竞争威胁：企业安全预算若流向 Falcon 平台整合，留给独立自主渗透测试工具的增量支出可能减少。


              **Palo Alto Networks** 将 Cortex XSIAM 定位为 AI 驱动安全运营的「the most advanced SOC platform」，通过统一数据、自动化和 AI
              能力实现「true AI-driven security operations」。Cortex XSIAM 直接争夺 NodeZero 连续测试与验证能力所面向的同一笔企业安全运营预算。Palo Alto
              Networks 的「platformization」策略鼓励客户把点状产品整合到 Cortex 上，由此形成替代效应：采用 Cortex XSIAM 的客户可能降低独立攻击验证工具的优先级。Palo Alto
              Networks FY2025 收入为 $14.2B，平台化收入增速快于单一产品收入，验证了整合路径的商业可行性。CrowdStrike 和 Palo Alto Networks
              目前都没有提供生产环境安全、且获得 FedRAMP High 授权的自主渗透测试能力，这保住了 NodeZero 在联邦市场的监管差异化。
