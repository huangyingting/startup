  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层与垂直行业
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 3 月，Horizon3.ai 的 5,200+ 组织客户基础横跨五个主要垂直行业：DoD / 联邦政府、医疗健康、金融服务、制造 / 关键基础设施，以及
              SLED（state、local、education）。联邦客户的公开资料最充分：NSA Cybersecurity Collaboration Center 在 Continuous Adversarial
              Penetration Testing (CAPT) 项目下使用 NodeZero 保护 Defense Industrial Base 组织；CISA 的 Office of the CISO 利用
              NodeZero 进行漏洞评估，并把结果分享给 Federal Civilian Executive Branch 机构；FBI 部署 NodeZero 做自主渗透测试；Centers for Medicare
              and Medicaid Services (CMS) 用它做医疗合规测试。DoD Platform One 和 Tradewinds Solutions Marketplace 均在 2026 年上半年授予
              NodeZero awardable 状态，使其无需完整采购周期即可采购。


              企业商业客户范围更广，但几乎全部匿名。Horizon3.ai 在 2026 年 3 月披露，Fortune 10 中有 4 家、以及全球最大银行都是活跃客户。医疗客户包括美国最大的医疗系统（在 30+
              网络分段完成 60+ 次生产测试），以及一家美国领先医院和医疗系统，其 ZeroLogon（CVE-2020-1472）漏洞通过 NodeZero
              被发现并修复。金融服务客户包括一家保险和金融公司，NodeZero 在不到 10 分钟内发现其 AWS 环境攻陷；另有一家大型金融机构，一次 14 小时渗透测试发现 586 个关键影响和 3
              次完整域管理员攻陷。制造业客户包括一家美国领先制造商，每周运行渗透测试，并消除 94 条攻击路径，其中包括伊朗 tradecraft 情景。


              NodeZero 约 70% 的 5,200+ 客户通过 Managed Security Service Providers (MSSPs) 和 Managed Service Providers (MSPs)
              交付，渠道因此成为主导 go-to-market。渠道伙伴包括面向企业 MSSP 交付的 NCC Group、Optiv、Thrive、CDW 和 Sentinel Technologies，以及通过
              40,000+ MSP 伙伴触达 SMB / 中端市场的 Pax8。直销部分主要覆盖联邦和大型企业客户；GSA、Platform One、Tradewinds 等采购工具便利了直接签约。NodeZero 也在
              ServiceNow 集成市场上线，面向采用基于风险修复工作流的客户。
