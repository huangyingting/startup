      - number: '6.4'
        title: 留存、客户满意度与扩张动态
        blocks:
          - type: paragraph
            body: >
              证明客户耐久性的最重要定量证据，是 Horizon3.ai 在 FY2026 结果（2026 年 3 月）中披露的 125% Net Dollar Retention (NDR) 和 94% Gross
              Dollar Retention (GDR)。这些指标由公司陈述、未经审计，但内部一致性值得注意：94% GDR 意味着 6% 总流失（每年完全离开平台的组织），而 GDR 与 NDR 之间 31
              个点差（125% - 94% = 31%）意味着留存客户每年平均扩张支出约 33%。按 SaaS 标准，这一 land-and-expand 比率较高，合理反映出 Pentest Wednesday
              重复模式把一次性评估转化为年度或月度订阅，再叠加 NodeZero Insights 交叉销售和模块扩张。


              Gartner Peer Insights 数据（截至 2025 年 8 月，73 条评论、平均 4.7/5.0、90% 愿意推荐）提供了独立客户满意度证据。2025 年 10 月 Gartner 授予
              Customers' Choice 有意义，因为它要求达到最低已验证评论数量和同行推荐门槛，不是纯供应商筛选推荐语能做到的。但对于一个拥有 5,200+ 客户的平台，73 条绝对评论数偏低——已验证评论率不到
              1.5%——限制了评分的统计普适性。Gartner Peer Insights 上那条 3.0 星反向评论，是公开记录中唯一识别出的关键客户声音；它提到 MSSP
              排期和报告不清晰，而不是产品失败，说明该反向信号与伙伴执行有关，而非平台性能本身。


              Pentest Wednesday 的重复节奏是扩张经济的关键结构性驱动。采用 Pentest Wednesday 的客户，从一次性或年度测试购买转向每周连续验证订阅，显著提高每客户
              ACV，并形成合同粘性。案例研究证实了这种模式：制造客户每周测试，医疗系统运行 60+ 次测试，金融服务客户每周运行 AWS
              渗透测试。该节奏模式类似订阅式安全监控服务，形成的续约动态与项目制渗透测试在结构上不同。
