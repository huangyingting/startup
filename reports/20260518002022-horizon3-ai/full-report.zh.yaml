    rows:
      - - H3 Cloud 编排（AWS）
        - 管理渗透测试排期、临时 VPC 生命周期和多租户隔离
        - AWS 商业云基础设施；Horizon3.ai 云运营
        - 云服务中断会暂停所有外部 / 无代理测试；未披露公开 SLA
      - - NodeZero 攻击图引擎
        - 串联用户、系统和服务之间的多跳提权，生成可利用性证明路径
        - 内部 CVE / 漏洞利用数据库；MITRE ATT&CK 框架；NVD/CISA KEV 数据源
        - 漏洞利用覆盖不全或 CVE 数据陈旧，可能导致优先级误判
      - - NodeZero Agent（Docker/OVA）
        - 在客户环境内部执行内部渗透测试；与 H3 Cloud 通信完成编排
        - 本地 Docker 运行时或 VMware hypervisor；客户网络访问权限
        - 客户必须配置并维护 Agent；不兼容非容器主机
      - - 无代理外部连接器
        - 无需本地部署软件即可开展外部 ASM 和云测试
        - H3 Cloud 互联网出口；云厂商凭证访问（AWS/Azure/GCP）
        - 范围限于 H3 Cloud 公网 IP 可触达的服务；缺少由内向外可见性
      - - AI 推理层（Mythos）
        - 对攻击路径排序，并借助 LLM 解读复杂链路
        - 未披露的 LLM 提供商；用渗透测试语料训练的自研 ML 模型
        - 存在 LLM 提供商依赖风险；AI 在新型环境中的可靠性未验证
      - - 集成 API（ServiceNow、SIEM/SOAR）
        - 把 NodeZero 发现接入企业工单、SIEM、SOAR 平台
        - REST API；webhook 连接器；第三方系统正常运行时间和 API 版本
        - 集成质量随下游系统而变；破坏性 API 变更会带来运营风险
    notes: 架构层级来自公开产品页面和技术文档；依赖与风险评估由分析师基于可获得披露判断。内部实现细节（例如 AI 模型提供商身份、自研 ML 训练数据）尚未被公开证实。
