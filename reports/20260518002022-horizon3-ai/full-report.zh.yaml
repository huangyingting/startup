      - number: '5.5'
        title: 路线图、发布历史与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Horizon3.ai 已系统地把 NodeZero 从单一内部渗透测试能力，扩展为覆盖多攻击面的连续安全验证平台。公司在 2021 和 2022 年推出核心内部与外部渗透测试操作，在 2023 和 2024
              年加入云基础设施和 Kubernetes 测试，并在 2023 年取得 FedRAMP High 授权。2024 年 11 月 $100 million Series D
              融资，为加速企业细分市场增长和全球伙伴扩张提供了资本。

              2025 年发布日历包括 NodeZero Tripwires（欺骗技术）、NodeZero Insights（暴露管理）和 NodeZero MCP Server（AI
              工具集成），反映出战略从一次性测试转向连续检测和 AI 集成安全工作流。2025 年上半年结果显示 ARR 同比增长 137%，企业细分市场同比扩张 485%。截至 2025 年 9 月，近 4,000
              家组织使用 NodeZero，累计执行超过 170,000 次渗透测试。Gartner 在 2025 年 10 月 Adversarial Exposure Validation Voice of the
              Customer 报告中，将 Horizon3.ai 评为 Customers' Choice。

              2026 年，Horizon3.ai 正在推进「Mythos」，这是一项 AI 驱动的攻击路径情报能力，为复杂多跳攻击链提供 LLM 辅助解读。除高层营销描述外，Mythos 以及计划中的 Continuous
              Attack Surface Management (CAASM) 集成的具体功能里程碑和正式可用日期仍未披露。
