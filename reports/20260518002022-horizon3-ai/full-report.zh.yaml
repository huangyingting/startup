      - number: '2.2'
        title: TAM/SAM/SOM：渗透测试机会规模
        blocks:
          - type: paragraph
            body: >
              独立分析机构对渗透测试市场的测算不同，反映了口径差异：哪些收入被纳入（仅人工服务 vs. 平台订阅 vs. 混合项目）以及地理覆盖如何定义。MarketsandMarkets 预计全球渗透测试市场 2025 年为
              $1.98B，到 2031 年以 14.2% CAGR 增至 $4.39B。Mordor Intelligence 使用 2026 年更新的自有估算框架，将同一市场测算为 2025 年 $2.36B，到 2031
              年以 15.29% CAGR 增至 $5.54B。两个估算的中点——2025 年约 $2.17B、2031 年约 $4.97B——可作为合理基准情景。两家公司给出的方向性增长相近，确认双位数 CAGR
              是市场共识。


              PTaaS 子市场——最直接对应 Horizon3.ai NodeZero 平台的类别——由 MarketsandMarkets 单独测算，2026 年规模为 $0.72B，预计到 2031 年以 22.6%
              CAGR 增至 $1.98B。该增速显著高于更广义渗透测试市场，反映出从周期性人工评估转向持续订阅平台的结构性迁移。自主 AI 原生渗透测试子类别（Horizon3.ai
              最直接竞争的市场）没有任何公开分析师报告单独测算，这是一个实质性证据缺口。


              从 TAM/SAM/SOM 视角看：TAM 是更广义安全测试市场（到 2031 年 $10.96B–$40.99B，MarketsandMarkets），SAM 是渗透测试和 PTaaS 市场（2025–2026
              年合计 $2.97B），Horizon3.ai 的 SOM 可由其积极覆盖的企业和联邦客户细分推断。考虑到 5,200+ 客户以及 $0.72B PTaaS 市场基数，Horizon3.ai
              按客户数隐含的市场渗透相当可观；但没有披露 ARR 数据，按收入计算的市场份额无法从公开来源量化。
