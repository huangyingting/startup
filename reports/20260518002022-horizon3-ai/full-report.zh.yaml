      - number: '8.2'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的上市公司可比对象跨度很宽，反映出网络安全 SaaS 内部增长画像差异很大。一端是 Rapid7 这类成熟平台，交易约为过去 ARR 的
              1.9–2.1×，对应中个位数收入增长和竞争替代风险。另一端是 CrowdStrike、SentinelOne 这类高增长平台，凭借平台广度、120% 以上净收入留存和持久竞争护城河，拿到 17–20× ARR
              倍数。Tenable 和 Qualys 位于中间区间，约为 3.6–5.4× ARR。

              Horizon3.ai 的 $1 billion 估值对应的 EV/ARR 倍数取决于未经验证的 ARR：$30M ARR 时为 33×，$50M 时为 20×，$80M 时为 12.5×，$100M 时为
              10×。公司声称自 2020 年以来收入增长 24×，FedRAMP 护城河也支持增长溢价，但缺少审计财务数据让比较本身存在不确定性。若按 12–15× ARR 倍数——适用于增长 30–50%+
              且留存强的公司——要支撑 $1B 估值，ARR 需要达到 $67–83M。CB Insights 资料和 Craft.co 数据确认了 Series D，但没有给出独立 ARR 验证。

              公开可比公司的列举有意限制在最直接相关的网络安全平台。若采用更广义的软件 SaaS 倍数（2026 年中位增长 SaaS 的 ARR 倍数为 8–12×），除非增长率和留存足以支撑，否则当前估值处在高端。
