      - number: '6.3'
        title: 客户增长轨迹与采用指标
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 在 2024–2026 年的客户增长轨迹，是企业网络安全领域最强的一组。公司在 2025 Inc. 5000 美国增长最快私营公司榜单中总排名 #121、网络安全领域 #1，依据是
              2021 至 2024 年三年收入增长 2,962%。Deloitte Technology Fast 500 将 Horizon3.ai 评为 2025 年北美 #3（500 家公司中），依据是 19,939%
              三年增长——这是该排名中任何网络安全公司获得验证的最高增长率。


              客户数进展在多个节点有记录：2025 年上半年结果发布时约 4,000 家组织（2025 年 9 月，反映 ARR 同比增长 137%）；Deloitte Fast 500 排名时约 4,500 家（2025 年
              11 月）；到 2026 年 3 月达到 5,200+（FY2026 结果，反映 ARR 同比增长 102%）。企业细分市场增长尤其显著，截至 2025 年上半年同比增长
              485%，说明公司成功向上进入大型客户，超越最初 SMB / 中端市场 MSSP 渠道渗透。到 2026 年 3 月，NodeZero 已执行 225,000+
              次生产环境安全渗透测试，按公司生命周期平均，每家组织约 43 次——这一规模验证的是重复使用，而不只是初次部署。


              Fast Company 2026 Most Innovative Companies（企业软件类别）认可，以及连续两年入选 NatSec 100，为产品创新和国家安全市场可信度提供了独立第三方验证。渠道预订达到
              2025 年 Q4 预订的 32%，较低基数上升，说明 MSSP / 渠道动作正在加速。102% ARR 增长和截至 2026 年 3 月 125% NDR
              的组合，意味着客户队列既在增长也在扩张——每个留存客户队列在后续年份支出约增加 25–31%（125% NDR 减去 94% GDR，意味着留存账户平均扩张率约 31%）。
