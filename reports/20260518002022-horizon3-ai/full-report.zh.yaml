      - number: '1.6'
        title: 关键里程碑与战略进展
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的公司时间线显示，它从政府退伍人员创业公司快速成长为领先的自主渗透测试平台。公司由美国特种作战司令部和国家安全退伍人员于 2019 年创立，联合创始人兼 CEO Snehal Antani
              凭借 JSOC/SOCOM CTO 和 Splunk CTO 经历带来独特的实战可信度。公司在 2019–2022 年开发并打磨 NodeZero
              平台，在获得第一次重要外部验证之前，已与企业和联邦客户建立早期商业牵引。


              2022 年 10 月，Horizon3.ai 完成 $40M Series C 轮融资，Craft Ventures 和 SignalFire 参与，资金用于企业市场拓展规模化和产品投入。2024 年 11
              月的 $100M Series D 轮将公司累计融资推至 $140M，并确认估值超过 $1B，是公司历史上最重要的外部财务验证，也支持持续联邦扩张、产品平台投入和潜在 M&A 选择权。NodeZero
              Federal 获得 FedRAMP High Authorization（2024 年授予）后，打开了美国联邦民事和国防机构最高层级采购。NSA CAPT 计划采用
