      - number: '1.4'
        title: 收入、规模与客户牵引
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的规模指标显示，企业采用已经有实质进展，需求加速也更持久。截至 2026 年初，NodeZero 已在真实生产环境安全执行 225,000+
              次自主渗透测试——这一数字可作为平台信任、生产安全可靠性和规模化客户参与度的代理指标。公司报告全球客户组织 5,200+，覆盖企业、联邦政府、中型市场、MSSP 和医疗等细分市场。Fortune 10
              公司中超过三分之一——按收入排名的美国十大上市公司——已确认是 Horizon3.ai 客户，为其在最高组织信用层级提供标杆企业验证。


              2026 年 3 月 19 日，Horizon3.ai 宣布 ARR 同比增长 102%。公司没有以美元披露绝对 ARR；102% 增速是目前唯一公开财务表现指标。如果这一增速延续，Horizon3.ai
              将属于少数在 Series D 资本化阶段仍能实现 ARR 超过 100% 增长的企业 SaaS 公司。行业认可提供了旁证：Horizon3.ai 在美国增长最快私营公司 Inc. 5000 榜单中位列安全类别第
              1，在 Deloitte Technology Fast 500 总榜位列第 3。Fast Company 将 Horizon3.ai 列为 2026 年 Most Innovative Companies
              安全板块第 4。


              员工数未公开披露。基于 LinkedIn 的估算显示，公司是一支少于 500 人的分布式团队，这与远程优先模式和资本效率较高的 SaaS 结构一致。MSSP 和托管服务合作伙伴渠道正在增长，NodeZero
              可作为白标平台提供给服务下游企业客户的安全服务商。Amsterdam 办公室覆盖欧洲金融服务和关键基础设施运营商对 EU 监管（DORA、NIS2）的需求。
