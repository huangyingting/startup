      - number: '4.5'
        title: 财务尽调结论
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 的收入模式在结构上成立：以联邦和企业客户为锚的年度经常性 SaaS 订阅，来自主机数量增长和附加层级的扩张经济，以及 225,000+
              次渗透测试所显示的平台使用信号，都指向强留存。$100M Series D 提供了近期资本充足性，尽管现金跑道对烧钱速度高度敏感。这些都是强定性财务指标。


              但公司没有披露任何定量财务指标。ARR、收入增速、毛利率、NRR、烧钱速度、CAC 和客户集中度均未披露，导致标准财务承销无法完成。联邦收入集中（比例未知，但鉴于 NodeZero 的 FedRAMP
              定位，应属重要）、拨款和 DOGE 暴露，以及缺少二级流动性路径，叠加出一组没有数据室披露就无法评估的风险。


              关键尽调要求是：（1）过去 8 个季度的 ARR 历史和当前 ARR；（2）COGS 拆分，区分平台 SaaS 与专业服务；（3）NRR 和总留存分别披露；（4）联邦与商业收入拆分，以及前 5
              大客户集中度；（5）至少 12 个月的月度 P&L 和资产负债表。没有这五项数据，财务章节结论只能是不确定：结构有利，但不足以支撑承销。
