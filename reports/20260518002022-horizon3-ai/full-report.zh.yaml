      - number: '1.3'
        title: 融资历史与投资方生态
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 在已披露融资轮次中累计获得 $140M 风险资本。最近且规模最大的一轮是 2024 年 11 月完成的 $100M Series D 轮，并确认投后估值超过
              $1B——Horizon3.ai 因此成为独角兽。Series D 轮于 2024 年 11 月 5 日通过 GlobeNewswire 公布，Dark Reading
              等主要网络安全行业媒体也有报道。公司没有公开披露 Series D 轮领投方或全部参与方。


              Series C 轮为 $40M，于 2022 年 10 月完成。Craft Ventures 是由 David Sacks 和 Bill Lee 联合创立的风险投资机构，被列为 Horizon3.ai
              的领投方之一，也出现在其公开投资组合页面。Craft Ventures 合伙人 Michael Robinson 和 Kevin Gabura 被特别提及与 Series C 投资相关，体现了对自主 AI
              驱动安全基础设施的投资逻辑。SignalFire 是一家以技术优先和数据驱动早期投资而知名的风险投资机构，也是 Horizon3.ai 已确认投资方。


              2026 年 1 月，Horizon3.ai 宣布获得 Prosperity7 Ventures 的战略投资。Prosperity7 Ventures 是 Aramco Ventures 的多元化投资部门，后者为
              Saudi Aramco 的企业投资平台。该投资被明确放在保障 AI 数据中心和关键基础设施安全这一共同优先事项下。Prosperity7 合作关系显示 Horizon3.ai 有意进入中东和 GCC
              主权基础设施市场；Saudi Aramco 运营着全球最复杂、价值最高的工业网络环境之一，且长期处于网络攻防压力之下。Prosperity7 战略投资规模尚未公开披露。2022 年 Series C
              轮之前的更早融资（Series A 和 Series B）在规模、估值或投资方方面未公开细节。未公开发现债务融资、可转债或收入型融资。
