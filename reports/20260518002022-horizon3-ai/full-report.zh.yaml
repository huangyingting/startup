      - number: '4.2'
        title: 单位经济与销售效率
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 不披露单位经济。所有估算都来自公开牵引信号（5,200+ 客户、225,000+ 次渗透测试、$100M Series D 估值）、安全 SaaS 行业基准，以及与上市同行的比较。在
              5,200+ 客户和隐含 $40–90M ARR（估计）下，隐含混合 ACV 约为 $8,000–$17,000，低于典型企业安全
              SaaS，说明客户组合偏中端市场，且有一条小型商业账户长尾，并由更高价值的联邦合同补充。


              纯 SaaS 安全平台毛利率通常在 65–80%。NodeZero 一旦部署，边际交付成本较低——客户自主运行渗透测试——因此毛利率应较强。不过，专业服务收入、上线成本和 FedRAMP
              合规开销，可能把混合毛利率压到纯 SaaS 基准以下。


              5,200+ 客户中完成 225,000+ 次渗透测试，意味着每个客户平均约 43 次渗透测试，显示平台使用强劲，也具备高 NRR 潜力。以此规模实现高平台使用率的公司，通常报告 110–130% 的
              NRR。缺少 S&M 支出数据，CAC 和回本周期估算高度不确定；Series D 阶段的可比安全 SaaS 公司通常目标为 18–30 个月回本。
