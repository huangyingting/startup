  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与竞争替代品
        blocks:
          - type: paragraph
            body: >
              渗透测试市场包括组织为通过主动攻击模拟来识别和验证技术环境中可利用漏洞而购买的产品与服务。范围涵盖人工专家主导评估、自动化平台订阅（PTaaS）、人工与工具结合的混合方案，以及全自主 AI
              驱动测试。它不同于漏洞扫描（只被动发现、不利用）、静态应用安全测试（SAST）和漏洞赏金计划（众包发现但缺少结构化修复工作流）。


              Horizon3.ai 替代的主要现状方案包括：（1）咨询公司执行的年度人工渗透测试（Big Four 咨询业务、精品安全公司、MSSP），单次项目昂贵（$15,000–$150,000+）、周期慢（每个测试周期
              1–6 周），且是周期性而非持续性；（2）Tenable Nessus、Rapid7 InsightVM、Qualys
              等漏洞扫描器，它们识别漏洞，但不通过主动攻击串联验证可利用性；（3）内部红队项目，受人才稀缺和预算限制。Horizon3.ai 的 NodeZero
              平台以订阅价格提供持续、生产安全的自主渗透测试，单次测试成本通常低于人工替代方案，从而解决这些限制。


              构成 Horizon3.ai 扩张面的相邻市场包括入侵与攻击模拟（BAS）、攻击面管理（ASM）和暴露管理平台。更广义的安全测试市场——包括 Web 应用测试、API
              安全、云安全态势和合规驱动评估——MarketsandMarkets 估算 2025 年规模为 $10.96B，到 2031 年以 24.6% CAGR 扩至 $40.99B。Horizon3.ai
              目前竞争于核心渗透测试和 PTaaS 子市场，NodeZero Insights 则代表向更广义暴露管理空间的早期扩张。
