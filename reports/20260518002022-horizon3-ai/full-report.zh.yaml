  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资概览与建议
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 于 2024 年 11 月完成 $100 million 的 Series D 融资，隐含投后估值约 $1 billion；结合已披露的 Series C 和 Series
              D，公司已确认融资总额达到 $140 million。公司销售
              NodeZero，这是一款自主渗透测试平台，可在企业环境内部持续发现并证明可利用攻击路径，不需要每个项目都配备人工红队操作员。客户包括联邦机构、医疗系统和中端企业；公司报告拥有 5,200+ 个客户关系，并已执行
              225,000+ 次安全渗透测试。

              投资逻辑建立在四个支柱上：（1）市场规模大且结构性渗透不足——不到 10% 的企业每年做超过一次渗透测试——并以 14–22% CAGR 增长；（2）FedRAMP High authorization 获取耗时
              18–36 个月，多数竞争对手难以快速复制；（3）通过「Pentest Wednesday」订阅节奏体现出的强净收入留存和平台黏性；（4）CrowdStrike、Palo Alto Networks 和
              Tenable 都在活跃并购，退出环境有利。

              条件性建议为「TRACK → 验证后 BUY」。主要信息缺口是缺少独立审计的 ARR、NRR 和毛利率数据。入场纪律要求：基于已验证 ARR 的倍数不高于 15×。若投资人能在 pre-IPO
              或二级市场拿到经确认的财务数据，应把多重压缩风险计入价格，尤其是在 ARR 低于 $80M 基准情景时。
