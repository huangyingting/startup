        - 医疗健康
        - 金融服务
        - 制造业
        - SLED / 其他
      rows:
        - label: 具名公开客户
          values:
            - label: NSA CC、CISA OCIO、FBI、CMS（4 个具名）
            - label: 仅匿名
            - label: Fortune 10（未具名）；匿名大型机构
            - label: 仅匿名
