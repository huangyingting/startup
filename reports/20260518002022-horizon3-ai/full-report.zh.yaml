      - number: '4.4'
        title: 财务基准比较：可比公司
        blocks:
          - type: paragraph
            body: >
              鉴于 Horizon3.ai 仍为私有公司，上市公司可比对象提供了主要财务基准背景。漏洞管理和暴露评估市场领导者 Tenable Holdings (TENB) 在 FY2025 10-K 中披露，截至 2025
              年 12 月 31 日，其拥有 40,000+ 客户、约 65% 的 Fortune 500 渗透率，以及约 50% 的 Global 2000 渗透率。Tenable 估计 FY2025 收入超过
              $900M，按收入看约为 Horizon3.ai 在 NodeZero ARR 估算上限下的 10 倍。


              Rapid7 (RPD) 运营覆盖 SIEM、漏洞管理和应用安全的 Insight Platform。Rapid7 FY2024 年收入约 $800M，毛利率约 70%，提供了平台型安全基准。相较 2021
              年高点，Tenable 和 Rapid7 在 2025–2026 年均以压缩倍数交易，说明 Horizon3.ai 的 $900M 隐含 Series D 估值处于当前市场可比区间的高端。


              私有 BAS 竞争者 AttackIQ，以及被 Schwarz Group 收购的 XM Cyber，因缺乏披露，只能提供有限财务基准。Cobalt 的 $29M Series C 和 Pentera 的
              $56M Series C 处于可比阶段，说明 Horizon3.ai 的 $100M Series D 是自主 / AI 渗透测试相邻领域最大单轮融资，反映了 NodeZero 的相对规模和 FedRAMP
              护城河溢价。
