  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流
        blocks:
          - type: paragraph
            body: >-
              NodeZero 是 Horizon3.ai 的旗舰平台：一个以 SaaS
              交付的连续渗透测试产品，让安全团队无需配备专职渗透测试专家，也能自主发现、修复并验证可利用攻击路径。单一订阅解锁六类主要操作，每类对应不同攻击面。Internal Pentest 在客户环境内部署轻量
              Docker 容器或 OVA 镜像，以模拟拥有网络访问权限的攻击者。External Pentest 完全以无代理方式从 Horizon3.ai 的 H3 Cloud
              运行，枚举并利用可从互联网访问的服务。Cloud Pentest 使用客户提供的云厂商凭证，在 AWS、Azure 和 GCP 中映射并利用 IAM 错配和横向移动路径。Active Directory
              Password Audit 使用原生协议发现 Active Directory 中可破解和重复使用的密码，无需持久代理。Phishing Impact Testing
              模拟电子邮件凭证泄露，并追踪攻击者随后可执行的网络跳转。Kubernetes Pentest 评估容器集群中的容器逃逸和 RBAC 提权。

              三层支撑能力扩展了核心平台。NodeZero Insights 是暴露管理情报层，汇总并优先排序连续渗透测试操作中的发现。NodeZero Tripwires
              是欺骗技术模块，部署生产环境安全的数字绊线，以检测入侵后的对手活动。2025 年推出的 NodeZero MCP Server 通过 Model Context Protocol 向 AI 和 LLM
              工具暴露已验证利用数据，把进攻性安全情报与新兴 AI 驱动运营工作流连接起来。截至 2025 年 9 月，Horizon3.ai 已为近 4,000 家组织执行超过 170,000
              次自主渗透测试，单次最大渗透测试覆盖超过 100,000 个 IP 地址。
