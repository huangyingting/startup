            body: >-
              NodeZero 通过不断扩展的连接器，与企业安全运营基础设施集成。2025 年宣布的旗舰集成把 NodeZero 连接到 ServiceNow Vulnerability
              Response，将渗透测试发现直接同步到 ServiceNow ITSM 工作流，用于基于风险的修复优先级排序和工单生命周期管理。平台也与 Splunk、Microsoft Sentinel 等 SIEM 和
              SOAR 平台集成，让渗透测试发现流入 SOC 告警管线和关联规则。

              Vanguard Partner Program 为 MSSP、MSP 和技术转售商提供结构化市场准入，分为 Silver、Gold、Platinum
              层级，各自拥有不同的利润结构、交易报备权和联合销售资源。2025 年与云市场和聚合商 Pax8 的合作，把 NodeZero 分销扩展到 Pax8 在北美和国际市场超过 30,000 家 MSP
