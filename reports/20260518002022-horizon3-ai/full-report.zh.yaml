      - number: '6.2'
        title: 具名客户证明与生产案例研究
        blocks:
          - type: paragraph
            body: >
              最强的独立客户证据来自四类：新闻稿公开确认的具名联邦部署、Horizon3.ai 博客记录的匿名企业案例研究、Gartner Peer Insights 评论，以及 MSSP
              伙伴案例研究。联邦客户是最可验证层级：NSA Cybersecurity Collaboration Center、CISA OCIO、FBI 和 CMS
              都出现在公开新闻稿和情报博客文章中，提供了当前可获得的最高保障第三方验证。NSA 的 CAPT 项目用 NodeZero 代表 DoD 测试 Defense Industrial Base
              网络，尤其重要，因为它展示了美国情报界最重视安全实体的信任。


              Horizon3.ai 情报博客发布的企业案例研究具备运营深度，但代价是匿名。医疗案例研究记录了美国最大医疗系统把 NodeZero 作为 Continuous Threat Exposure
              Management (CTEM) 项目的一部分，跨 30+ 网络分段运行 60+ 次测试。第二个医疗案例（通过 Liberman Networks MSSP）记录了一家美国领先医院系统发现并修复
              ZeroLogon。制造案例详述了每周 Pentest Wednesday 部署、消除 94 条攻击路径，以及在 M&A 情景中识别出与伊朗相关的 tradecraft 技术。金融服务案例记录了不到 10
              分钟发现 AWS 环境攻陷，以及一次 14 小时任务产生 586 个关键影响。这些匿名案例可用于验证运营模式，但不能作为采购中的可引用客户名称。


              Gartner Peer Insights 提供最独立的客户声音。截至 2025 年 8 月，NodeZero 有 73 条已发布评论，平均 4.7/5.0 星，90% 表示愿意推荐，并在 2025 年 10 月
              Adversarial Exposure Validation Voice of the Customer 报告中获得 Gartner Customers' Choice 区分。不过，2024 年 8 月 21
              日发布的一条 3.0 星「CRITICAL」评论提到与伙伴的排期问题，以及测试结果难以解读，这是尽调中识别出的最具体反向客户信号。相较 72 条正面评论（排除 3.0 星评论后平均
              4.8+），这条孤立负面评论是低严重度反向信号，但说明 MSSP 交付质量可能不一致。
