      - number: '7.2'
        title: 竞争与市场颠覆风险
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 所在赛道正被大型在位厂商主动切入。Microsoft、CrowdStrike、Palo Alto Networks 和 Tenable
              都在自动化安全验证上拥有直接或相邻产品：Microsoft 的 Security Exposure Management、CrowdStrike 的 Falcon 暴露管理模块、Palo Alto 的 XSIAM
              平台，都能做连续攻击面管理，并与 NodeZero 的用例部分重叠。虽然目前没有一家达到 NodeZero
              深度的全自主渗透测试，但演进方向正在收敛；这些厂商还握有独立供应商难以复制的分发优势，包括既有企业合同、SIEM / EDR 集成和成熟信任关系。


              第二梯队是一批资金充足的纯玩家。Pentera（原 Pcysys）已获得大量风险资本支持，以欧洲为基地，拥有 1,000+ 企业客户，直接竞争自动化安全验证。Cobalt.io 位于 PTaaS
              细分市场，并已转向 AI 增强测试。XM Cyber、AttackIQ 等公司则竞争 Breach and Attack Simulation（BAS）和 Continuous Threat Exposure
              Management（CTEM）；分析师群体越来越把这些类别视为与独立渗透测试重叠，甚至会取而代之。


              Metasploit、Nuclei、OpenVAS 等开源替代方案仍在演进，而且免费。它们需要专家配置和解读，但会设定市场价格底线，限制中端市场定价权。更广泛的 AI 商品化趋势也构成长期风险：通用 LLM
              智能体可能越来越能执行漏洞发现，从而削弱任何专用 AI 渗透测试平台的市场防御性。


              风投支持的竞争对手 Pentera 客户规模大、欧洲足迹深，再叠加 Cobalt 在托管 PTaaS 中的定位，会同时挤压企业自助服务（NodeZero
              的核心）和托管服务两个板块。若出现平台整合场景——例如大型在位厂商收购 Pentera——市场将出现一家资金充足、系统集成度更高、市场进入覆盖远强于 Horizon3.ai 的竞争对手。
