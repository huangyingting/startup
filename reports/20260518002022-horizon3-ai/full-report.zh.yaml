      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 由 Snehal Antani 于 2019 年联合创立，他担任首席执行官。Antani
              的背景与产品核心价值主张高度匹配：他曾任美国军方顶级反恐和特殊任务单位——美国联合特种作战司令部（JSOC）的 CTO，也曾任美国特种作战司令部（SOCOM）CTO，以及 Splunk（Cisco 于 2024
              年以约 $28B 收购的企业数据平台）CTO。在 Splunk 之前，Antani 曾任 GE Capital CIO。他持有 18 项美国专利，覆盖网络安全、数据分析和分布式系统。国家安全攻防行动经验与企业
              SaaS 商业化规模经验叠加并不常见，这也是 Horizon3.ai 在联邦和商业企业市场定位的核心。


              Rishi Dhasmana 担任 CTO，负责 NodeZero 的平台架构、产品工程和研究方向。公司更广泛的高管团队经验丰富，构成上具备 IPO 准备能力：Holly Grey 担任 CFO，拥有 30
              多年财务领导经验，包括带领科技公司筹备公开市场的背景。Matt Hartley 担任 CRO。Andres Botero 于 2026 年 1 月 7 日获任 CMO，带来
              Rubrik（云数据安全）、BlackLine（财务自动化）和 CallidusCloud 等公司二十多年 B2B 安全和企业 SaaS 营销经验。Jill Passalacqua 担任
              CLO，专长于政府合同合规和企业软件 IP。Chris Corbett 以 VP Engineering 身份领导工程；他曾共同开发 Signal iOS 应用，并在 NASA 从事研究，拥有计算物理
              PhD。Erick Dean 以 VP Product 身份领导产品，曾任职 PagerDuty、Splunk 和 C3.ai，并持有 6 项美国专利。


              关键人集中是实质性治理风险：CEO Antani 独有的政府网络、国家安全可信度和企业品牌，深度嵌入 Horizon3.ai 的联邦业务开发管线和客户信任。公司尚未公开董事会组成、治理结构或股权分配信息。截至
              2026 年 Q2，未发现任何具名高管存在重大离职、股东争议或监管制裁。
