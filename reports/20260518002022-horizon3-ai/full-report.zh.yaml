      - number: '8.3'
        title: 牛市 / 基准 / 熊市情景分析
        blocks:
          - type: paragraph
            body: >
              三个离散情景刻画了 Horizon3.ai 投资人的概率加权结果区间。牛市情景假设企业采用加速，动力来自 FedRAMP 授权扩张、NRR 高于 120%，以及平台成功延伸到暴露管理（NodeZero
              Insights）。在牛市假设下，ARR 到 2027 年末达到 $150M，20× ARR 倍数对应 $2.5–3.5 billion 估值，相当于 Series D 价格上的 2.5–3.5× 回报。

              基准情景以公司自己发布的 2024 年 ARR 增长 102% 为锚，并对 2026 年以前的年度增长做温和减速，降至 50%。这样得到 2025 年底 $80M ARR、2026 年底 $120M
              ARR。按与高增长网络安全 SaaS 一致的 15× 倍数，基准估值为 $1.0–1.5 billion，基本与 Series D 入场价持平；这意味着在 $1B
              标记入场的投资人是在为成功执行付费，并没有内嵌折扣。

              熊市情景假设来自 Pentera 的竞争加剧（据称其目标客户画像相同）、AI 推动漏洞枚举商品化，以及联邦预算逆风。在熊市假设下，ARR 增长降至 20–30%，ARR 到 2025 年底达到
              $50M，倍数压缩至 8–10×，估值为 $400–600 million，较 Series D 损失 40–60%。如果 CrowdStrike 的安全验证扩张或 Microsoft Security
              Copilot 在 Horizon3.ai 达到 $100M+ ARR 和 IPO 准备度之前实质侵蚀其差异化，熊市情景就具备现实可能。
