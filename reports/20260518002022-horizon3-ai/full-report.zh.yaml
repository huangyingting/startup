  - id: FR001
    title: 风险热力图：发生可能性 vs. 影响
    type: matrix
    layout: standard
    summary: 将 22 项已识别风险映射到 4×5 的「发生可能性-影响」网格上。优先级最高的风险集中在高可能性 / 高影响象限：FedRAMP 失效、竞争平台入场、CEO 离任，以及假阴性引发的客户被攻陷责任。
    data:
      columns:
        - 低影响（1–2）
        - 中等影响（3）
        - 高影响（4）
        - 严重影响（5）
      rows:
        - label: 极高可能性（5）
          values:
            - 高
            - 高
            - 严重
            - 严重
        - label: 高可能性（4）
          values:
            - 中等
            - 高
            - 高
            - 严重
        - label: 中等可能性（3）
          values:
            - 低
            - 中等
            - 高
            - 高
        - label: 低可能性（2）
          values:
            - 可忽略
            - 低
            - 中等
            - 高
        - label: 极低可能性（1）
          values:
            - 可忽略
            - 可忽略
            - 低
            - 中等
    approximationNotes: >-
      风险优先级：可忽略、低、中等、高、严重。单元格值代表该发生可能性-影响组合下的综合风险优先级。映射到高及以上的风险包括：FedRAMP 失效（L=2,I=5→高）、NodeZero
      云端被攻陷（L=2,I=5→高）、平台型在位厂商入场（L=4,I=4→高）、CEO 离任（L=2,I=5→高）、假阴性责任（L=3,I=4→高）、EU AI Act 分类（L=3,I=4→高）。评级来自分析师评估。
