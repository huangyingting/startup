      - number: '3.6'
        title: 替代风险、竞争情景与展望
        blocks:
          - type: paragraph
            body: >
              三条重大竞争替代风险需要持续尽调。来自 Tenable 或 Rapid7 的**平台打包风险**是长期严重度最高的情景：Tenable 拥有 40,000+ 客户，续约杠杆是 NodeZero 5,200+
              客户的 8 倍；如果 Tenable 通过收购或内部开发把自主攻击执行加入 Tenable One，它可能在续约周期里以折扣价打包销售，压缩 NodeZero 实际商业定价。考虑到 Tenable
              明确的「preemptive security」战略方向和 M&A 历史，未来 3–5 年该情景概率为中等。**Pentera 直接收入威胁**是近期严重度最高的情景：Pentera 已确认迈向 $100M
              ARR，是增长最快的自主测试收入挑战者；如果 Pentera 获得 FedRAMP High 授权（目前未确认，也未披露正在推进），NodeZero 在联邦核心市场的独占性将消失。**开源 AI
              商品化风险**是中期情景：当前沿 AI 能力扩散到开源模型，基础自主漏洞扫描和攻击链编排可能商品化；若平台不能在链路深度、自研训练数据或监管合规框架上区分自己，价格溢价会被压缩。NodeZero
              的核心应对必须是继续投入 FedRAMP High 项目维护、攻击图深度，以及企业级自主攻击决策可解释性。


              第四项风险是 CrowdStrike 或 Palo Alto Networks 利用现有企业关系，把智能体式渗透测试能力作为平台附加模块，以折扣价销售，从而整合安全运营预算。近期该风险概率较低，但仍需跟踪其 AI
              与智能体安全路线图。CTEM 融合趋势把 AttackIQ 和 XM Cyber 推到采购评估中的分析师层级竞争者位置；尽管它们依赖模拟，而不是实时自主攻击执行，这仍会制造评估阶段的混淆。在采购团队采用
              Gartner Exposure Assessment Platform MQ 指引的竞争性 bakeoff 中，NodeZero 可能因此处于劣势。
