      - number: '7.6'
        title: 缓释框架与终止标准
        blocks:
          - type: paragraph
            body: >
              Horizon3.ai 已在多个风险类别上建立了有意义的结构性缓释。FedRAMP High authorization 是商业云授权中要求最高的级别，构成联邦板块的重要合规护城河；获得并维持 FedRAMP
              High 通常需要 18–24 个月，竞争对手很难快速复制。公司法务团队（Chief Legal Officer Jill Passalacqua，曾任职 FireEye 和
              JumpCloud）具备监管导航的机构经验。2024 年 11 月的 $100M Series D 提供了约 2–3 年资金续航，可继续投入合规、产品加固以及法律 / 监管沟通。


              对人员风险，关键缓释是建立分布式领导梯队。当前团队包括 CFO Holly Grey、CRO Matt Hartley、CMO Andres Botero 和 CLO Jill
              Passalacqua，都具备深厚企业和安全经验。如果 Antani 离开，机构知识足以维持业务连续性，但联邦板块面向客户的关系需要主动安抚。更正式的继任计划，以及董事会层面对该风险的所有权，可以降低剩余暴露。


              对竞争风险，主要缓释不是横向扩展表层功能，而是持续加深攻击链 AI；要领先在位厂商，公司需要投资进攻安全研究能力（漏洞研究、新 exploit 模块、后利用技术），而不是去追平它们的市场进入广度。公司的 81
              篇「Attack Blogs」和 30 项漏洞披露体现了这套飞轮。


              终止标准——即需要从根本上重估战略的条件——包括：（1）失去 FedRAMP High authorization，且 12 个月内没有可信恢复路径；（2）联邦板块收入低于总收入
              30%（说明需要重新定位市场），或联邦板块收入低于上一年 40%（说明出现预算危机）；（3）NodeZero 云基础设施发生重大安全入侵，并确认客户数据暴露；（4）美国或欧盟监管明确禁止自主 AI
              进攻安全工具，或施加高到难以承受的限制；（5）一家市场进入能力 10 倍于 Horizon3.ai 的平台型在位厂商以显著溢价收购直接同行。
