      - number: '8.5'
        title: 论点失效与终止触发器
        blocks:
          - type: paragraph
            body: >
              论点失效触发器是可观察、带时间约束的事件或数据点；一旦确认，建议应从 TRACK 调整为 PASS 或 EXIT。五个最重要的触发器是：（1）降价融资，或二级市场标记低于 Series D 价格 20%
              以上，表明投资人信心流失；（2）单个续约周期内失去三个或更多具名联邦合同，说明仅靠 FedRAMP authorization 不足以留住客户；（3）净收入留存跌破
              100%，意味着扩张收入已无法覆盖流失，订阅模型承压；（4）直接竞争对手——尤其是 Pentera 或 CrowdStrike 收购标的——获得 FedRAMP High
              authorization，消除主要监管护城河；（5）IPO 招股书或二级市场尽调披露 ARR 低于 $50M，使当前 $1B 估值超过 20× ARR 且增长减速，这种画像应立即重新谈价。

              次级预警信号包括：创始 CEO 离任且没有可信继任计划；按当前增长声明，公司在 Series D 后 24 个月内未达到 $150M ARR；以及随着扩员服务企业客户，出现实质性利润率侵蚀证据。
            claimRefs:
              - CV031
              - CV025
              - CV015
              - CV027
              - CV029
