  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争市场图谱：四个层级争夺对抗性验证预算
        blocks:
          - type: paragraph
            body: >
              渗透测试和安全验证市场分为四个清晰的竞争层级，各自争夺 CISO 对抗性验证预算的一部分。第一层是自主和 AI 驱动安全验证：Pentera 是这一层中 NodeZero 最接近的直接同业，已在 2026 年 1
              月确认 $100M ARR——这是任何竞争性自主渗透测试平台中最清晰的公开规模基准。Pentera 将其产品定位为“暴露验证平台”，具备 AI
              驱动的对抗性测试、基于风险的优先级排序和自动化修复工作流。第二层是人工增强 PTaaS：Cobalt 和 Synack 将专家安全研究员与 AI 辅助平台结合。Cobalt 开创了基于额度的订阅式 PTaaS
              模式，并围绕“攻防安全计划”概念定位自身；Synack 最近发布 “Sara AI Pentesting” 并实现一般可用，显示其从众包人工研究员市场起家，战略上转向 AI 增强持续测试。


              第三层由现有企业安全平台组成——Rapid7 和 Tenable 拥有庞大装机基础，并在把产品范围扩展到对抗性暴露管理。Tenable One 定位为“全球领先的 AI 驱动暴露管理平台”，覆盖
              IT、云、OT、身份、容器和 AI 工作负载。Rapid7 运营开放平台，服务 11,000+ 全球客户，覆盖 MDR、漏洞管理、SIEM 和 Metasploit
              专业渗透测试框架。第四层是横向安全运营厂商：CrowdStrike 自称“智能体安全平台”，聚焦 AI 驱动安全运营；Palo Alto Networks 将 Cortex XSIAM 定位为面向 AI
              驱动安全运营的“最先进 SOC 平台”。第四层厂商虽不提供专门渗透测试，但其自主检测和响应能力不断扩展，会对那些把安全验证预算纳入更广泛 SOC 现代化投资的客户形成间接替代。


              BAS、CTEM、AEV 和自主渗透测试正在汇入一个统一的“对抗性暴露验证”分析师类别——Gartner 自 2025 年开始倡导这一分类——这既验证了 NodeZero 的战略方向，也把 AttackIQ 和
              XM Cyber 抬升为类别同业。NodeZero 站在四个竞争层级的交叉点：交付自主攻击执行，在订阅经济性上与 PTaaS 竞争，并通过 NodeZero Insights 扩张到暴露管理。
