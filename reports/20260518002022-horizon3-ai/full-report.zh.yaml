      - number: '5.2'
        title: 技术架构与部署模式
        blocks:
          - type: paragraph
            body: >-
              NodeZero 的技术设计以短暂、一次性使用架构为中心。每次渗透测试都会在 Horizon3.ai 的 H3 Cloud 基础设施内创建专用、隔离的 Virtual Private
              Cloud，任务完成后立即销毁。这样既消除了持久化攻陷足迹，也在多租户 SaaS 运营中强制执行严格租户隔离。内部渗透测试由客户在本地部署 Docker 容器或 OVA 镜像，并与 H3 Cloud
              通信完成编排；测试结束后不保留持久代理。外部和云评估完全以无代理方式从 H3 Cloud 运行，客户环境中不部署软件。

              攻击情报核心是图引擎，可跨用户、系统、凭证和服务串联多跳利用，构建端到端利用证明路径。这些路径映射到 MITRE ATT&CK
              战术和技术，并转化为优先级排序的修复动作，配套一键式修复后验证工作流。NodeZero 设计目标是生产环境安全：测试运行后不保留利用载荷，平台声称主动利用可逆，或限定在非破坏性访问证明范围内。

              内部品牌为「Mythos」的 AI 推理层，把 LLM 辅助的解读和置信度评分扩展到攻击图，用于复杂多阶段攻击链。技术文档位于 docs.horizon3.ai。Horizon3.ai 还在 horizon3ai
              GitHub 组织下维护 41 个或更多公开仓库，其中包括开源 CVE 概念验证工具，并拥有较强社区互动，体现其漏洞情报深度。
