  - id: TV005
    title: Thesis-Break and Kill Triggers
    columns:
      - Risk
      - Threshold / Event
      - Monitoring Signal
      - Action Implication
    enumerationScope:
      coverage: partial
      basis: Five highest-probability thesis-break triggers identified. Additional triggers may emerge post data-room access.
    rows:
      - - Revenue miss
        - ARR growth < 30% YoY for two consecutive quarters
        - Quarterly revenue data on request during diligence
        - Revise to avoid; downside protection insufficient at $1.25B entry
      - - Defense budget cut
        - NDAA FY2027 Navy inspection budget reduced > 20%
        - Congressional budget markup (H.Rept./S.Rept. annually)
        - Re-underwrite base case; Navy revenue could fall to $20-30M from $71M ceiling
      - - Trade-secret adverse ruling
        - Court finds for Summit NDE; Gecko enjoined or ordered to pay damages
        - Federal court docket No. 2:23CV229-PPS/JEM (N.D. Indiana)
        - Material liability; pause investment until legal exposure quantified
      - - Key customer loss
        - NAES or Navy contract not renewed at expiry
        - Contract renewal notices and public announcements
        - Base-case revenue collapses; raise at materially lower valuation
      - - Management departure
        - CEO Jake Loosararian resigns or is removed without named successor
        - LinkedIn, press, board communications
        - Thesis depends on founder-led execution; governance disruption inflates bear probability
    notes: Triggers should be tracked quarterly during any hold period. Litigation docket can be monitored via PACER.
