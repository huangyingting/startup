  title: 'Recommendation: research-more at $1.25B'
  body: 'The investment thesis for Gecko Robotics is structurally compelling: a defensible AI and robotics platform at the intersection of critical infrastructure, defense modernization, and energy transition. Markets with long-duration secular tailwinds and rising regulatory demand for automated inspection support a strong market-size argument. The Series D unicorn valuation reflects genuine commercial momentum (NAES, Navy, ADNOC) and strategic investor validation (Cox Enterprises, Founders Fund). However, without audited financials and Cantilever SaaS retention data, the $1.25B entry price cannot be justified with high confidence. The probability-weighted exit value at current evidence quality is approximately $816M, below the Series D price. Upgrade to buy conditional on: (1) ARR >= $100M with NRR >= 110% confirmed in audit; (2) Navy task-order actuals >= $30M obligated; (3) Summit NDE litigation resolved or quantified with limited financial exposure.

