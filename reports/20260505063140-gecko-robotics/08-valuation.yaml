callouts:
  - calloutType: recommendation
    title: 'Recommendation: research-more at $1.25B'
    body: >
      The investment thesis for Gecko Robotics is structurally compelling: a defensible AI and robotics platform at the
      intersection of critical infrastructure, defense modernization, and energy transition. Markets with long-duration
      secular tailwinds and rising regulatory demand for automated inspection support a strong market-size argument. The
      Series D unicorn valuation reflects genuine commercial momentum (NAES, Navy, ADNOC) and strategic investor
      validation (Cox Enterprises, Founders Fund). However, without audited financials and Cantilever SaaS retention
      data, the $1.25B entry price cannot be justified with high confidence. The probability-weighted exit value at
      current evidence quality is approximately $816M, below the Series D price. Upgrade to buy conditional on: (1) ARR
      >= $100M with NRR >= 110% confirmed in audit; (2) Navy task-order actuals >= $30M obligated; (3) Summit NDE
      litigation resolved or quantified with limited financial exposure.
    claimRefs:
      - CV001
      - CV014
      - CV015
      - CV018
      - CV007
      - CV018
  - calloutType: risk
    title: Valuation-to-Evidence Gap Is the Primary Risk
    body: >
      The largest risk is informational, not competitive, technical, or regulatory. At $1.25B, investors are pricing a
      SaaS re-rating that may not yet have occurred. MISTRAS Group, the best public comp, trades at 0.5x revenue; Gecko
      requires 8-15x to justify its current valuation. That multiple gap is bridgeable only with proof of Cantilever
      SaaS penetration, high NRR, and gross margins above 50%. Without that proof, investment at $1.25B embeds a
      speculative premium that is highly correlated with the bear scenario if Cantilever has not successfully converted
      defense and commercial customers to recurring subscription.
    claimRefs:
      - CV010
      - CV007
      - CV019
      - CV010
  - calloutType: strength
    title: Defense Moat and Cox Enterprises Signal Genuine Commercial Traction
    body: >
      The Navy IDIQ ($71M ceiling, 18 Pacific Fleet ships), BPMI nuclear propulsion partnership, Air Force Sentinel ICBM
      contract, and Columbia-class submarine demo form a defense moat structurally difficult to replicate. ITAR
      constraints on technology transfers, DoD security clearances, and accumulated structural data make Gecko's
      platform sticky within the defense customer base. Cox Enterprises leading the Series D represents an independent
      strategic validation: Cox has energy and media infrastructure exposure and would have conducted proprietary
      commercial due diligence before leading a $125M round.
    claimRefs:
      - CV003
      - CV005
      - CV011
      - CV012
      - CV013
