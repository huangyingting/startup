- id: S-COMPS
  title: Comparable Set
  body: 'Constructing a reliable comparable set for Gecko Robotics requires bridging three distinct value-driver categories: legacy NDT services companies, defense-tech software unicorns, and inspection-robotics startups. No single public comparable captures all three dimensions.

    Legacy NDT services: MISTRAS Group (NYSE:MG) is the closest public comp, providing inspection and condition-monitoring services to energy, aerospace, and infrastructure clients with approximately $700 million in FY2024 annual revenue at roughly 0.5x revenue market capitalization (~$350M market cap). TEAM Inc., a comparable services provider, underwent restructuring and went private in 2023. Baker Hughes'' Waygate Technologies division is a subsidiary of a large conglomerate and cannot be isolated for multiple analysis, but the historical GE Inspection Technologies acquisition at roughly $1.5-2.0 billion implied 1-1.5x revenue. These comps suggest a pure-services Gecko would trade at 0.5-1.5x revenue, implying fair value of $40-225M on an estimated $80-150M revenue base, well below $1.25B.

    Defense-tech software unicorns: Anduril Industries raised at a $14 billion valuation on estimated $500M ARR in 2024, implying ~28x ARR. Palantir Technologies trades at 25-30x revenue in public markets. These multiples reward defense-native SaaS with high switching costs and recurring government contract value. For Gecko to justify Anduril-level multiples, it would need confirmed recurring Cantilever SaaS revenue at $125M+ ARR and demonstrated NRR above 120%.

    Inspection-robotics startups: ANYbotics, Boston Dynamics (Hyundai subsidiary), Percepto, Skydio, and Invert Robotics compete in adjacent markets. The VentureRadar comparable set for Gecko includes Voliro, Invert Robotics, Planys Technologies, and Energy Robotics, none of which have disclosed valuations sufficient to anchor a private comp analysis. Skydio raised at $2.2B in 2021 on drone defense momentum but faced valuation pressure thereafter. Private comp multiples for inspection robotics typically ranged 5-15x ARR in the 2021-2023 bull market, compressing 30-50% in 2023-2025.

    '
