  - id: S-EXIT
    title: Exit Readiness and Final Diligence
    body: >
      Gecko Robotics is approximately 2-4 years from a plausible exit, with IPO and strategic M&A both viable paths. The
      IPO path requires continued growth to achieve $300M+ revenue and demonstration of SaaS re-rating, conditions that
      typically take 3-5 years from unicorn status. The defense-tech IPO window (Palantir 2020, Joby 2024) favors
      companies with visible government backlog, and Gecko's Navy IDIQ, Air Force, and BPMI contracts provide exactly
      that narrative. However, Gecko would need to resolve the Summit NDE lawsuit and achieve GAAP profitability (or a
      clear path to it) before public markets would absorb the offering at favorable multiples.

      Strategic M&A is a more near-term scenario. Likely acquirers include: L3Harris Technologies, which already has an
      XR collaboration agreement and would benefit from Cantilever data to support aircraft sustainment; Baker Hughes,
      which owns Waygate Technologies and could integrate Gecko's robotics and SaaS layer with Waygate's sensor
      hardware; Anduril Industries, which is building a defense-tech platform and could absorb Gecko's
      critical-infrastructure inspection into its Lattice OS; and a hyperscaler seeking physical-AI differentiation.
      Strategic acquirers typically pay 15-30% premium above fair-value comps, which at a $1.5B fair value would imply a
      $1.7-2.0B acquisition price, marginally above the Series D entry.

      Pre-investment diligence priorities are ranked by value-change impact. The single highest-priority ask is audited
      financial statements for FY2023, FY2024, and FY2025, including revenue segmentation (services vs. SaaS), gross
      margin by segment, and Cantilever ARR with cohort retention data. Without this, no investment committee can
      responsibly approve the deal at the $1.25B valuation. Secondary priorities are cap-table and preference-stack
      review, outside-counsel opinion on the Summit NDE litigation exposure, verification of actual Navy task-order
      payments, and Cantilever SaaS NRR and churn cohort data. Jake Loosararian's appearance as a featured speaker at
      ADIPEC 2025 signals active Middle East pipeline development beyond the ADNOC Gas contract. The investment stance
      is research-more with a 90-day diligence clock.
