- calloutType: risk
  title: Valuation-to-Evidence Gap Is the Primary Risk
  body: 'The largest risk is informational, not competitive, technical, or regulatory. At $1.25B, investors are pricing a SaaS re-rating that may not yet have occurred. MISTRAS Group, the best public comp, trades at 0.5x revenue; Gecko requires 8-15x to justify its current valuation. That multiple gap is bridgeable only with proof of Cantilever SaaS penetration, high NRR, and gross margins above 50%. Without that proof, investment at $1.25B embeds a speculative premium that is highly correlated with the bear scenario if Cantilever has not successfully converted defense and commercial customers to recurring subscription.

