company:
  name: Gecko Robotics
chapter:
  number: 8
  title: Valuation & Investment Recommendation
  summary: >
    Gecko Robotics achieved unicorn status in June 2025 with a $1.25 billion Series D valuation, doubling from $633
    million at its Series C in December 2023. The company occupies a defensible niche at the intersection of AI,
    robotics, and critical-infrastructure inspection, with confirmed defense contracts (Navy IDIQ $71M ceiling, Air
    Force Sentinel ICBM, BPMI nuclear propulsion), a large commercial partnership with NAES ($100M+), and international
    exposure via ADNOC Gas ($30M). However, Gecko remains a private company with no disclosed revenue, ARR, or margin
    data. The $1.25B valuation implies 8-15x ARR on an estimated $80-150M revenue base, a range consistent with
    defense-tech SaaS peers but impossible to independently verify. The investment recommendation is research-more: the
    strategic thesis is compelling, but a go/no-go decision requires audited financials, Cantilever SaaS retention
    metrics, and resolution of the Summit NDE trade-secret litigation before committing capital.
sections:
  - id: S-THESIS
    title: Investment Thesis and Anti-Thesis
    body: >
      Gecko Robotics addresses a multi-billion-dollar maintenance and inspection market where aging infrastructure,
      labor shortages, and regulatory safety mandates converge. The NDT and inspection market reached $10.36 billion in
      2025 and is projected to grow at an 8% CAGR to $15.25 billion by 2030. The inspection-robots sub-market is growing
      faster, at a 13.33% CAGR from $6.72 billion in 2025 to $16.16 billion by 2032. GMI data corroborates this at a
      13.9% CAGR, reaching $9.8 billion by 2034. Gecko's Cantilever operating platform differentiates the company from
      pure hardware vendors by converting robot-collected sensor data into persistent digital records and AI-generated
      maintenance recommendations, a model that can layer recurring SaaS fees atop one-time inspection deployments.

      The bull case rests on three pillars. First, defense penetration: confirmed U.S. Navy IDIQ ($71M ceiling across 18
      Pacific Fleet ships), Air Force Sentinel ICBM support, BPMI nuclear propulsion manufacturing partnership, Trident
      Maritime collaboration, and a Columbia-class submarine prototype engagement form a defensible moat reinforced by
      ITAR constraints that slow foreign entrants. Second, commercial scale: the NAES partnership ($100M minimum
      commitment, 65 GW asset base) and ADNOC Gas contract ($30M, UAE) demonstrate cross-sector and international
      replication. Third, platform economics: Cantilever's data-flywheel model improves prediction accuracy with each
      incremental inspection, creating switching costs that could support 80%+ gross margins and net revenue retention
      above 110% if SaaS attachment reaches scale.

      The anti-thesis is equally credible. MISTRAS Group, the most comparable public company (~$700M revenue, NYSE:MG),
      trades at roughly 0.5x revenue, a multiple that would imply a fair value far below $1.25B unless Gecko has
      successfully re-rated as a SaaS business rather than a services business. Revenue mix, gross margin, and
      Cantilever SaaS attach rate are all undisclosed. The Navy IDIQ is a ceiling, not a guaranteed floor; actual task
      orders depend on congressional appropriations and Navy readiness budgets that shift with geopolitical priorities.
      The ongoing trade-secret lawsuit (Summit NDE, N.D. Indiana, No. 2:23CV229-PPS/JEM) and ITAR exposure from the
      ADNOC UAE deployment add residual legal and regulatory tail risk. Competing robotic inspection platforms
      (ANYbotics, Boston Dynamics Spot, Percepto, Skydio) are increasingly capable and backed by large strategic
      investors, which could erode Gecko's hardware differentiation over time even if Cantilever retains software
      stickiness.
