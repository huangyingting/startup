  - id: S-FINANCING
    title: Financing and Valuation Context
    body: >
      Gecko Robotics has raised $347 million in total equity funding across at least four known rounds. The Series D,
      announced June 12, 2025, raised $125 million and valued the company at $1.25 billion. The round was led by Cox
      Enterprises, a new investor representing strategic commercial validation, with participation from USIT (Thomas
      Tull, Gaetano Crupi), XN, and Founders Fund (Trae Stephens). The Series C in December 2023 raised $173 million at
      a $633 million pre-money valuation; the 18-month Series C to Series D interval produced a 97% valuation uplift,
      indicating strong investor confidence in execution during that window.

      The capital-deployment context matters for valuation analysis. Gecko operates hardware-intensive business lines
      (wall-climbing robots, drones, fixed sensors) alongside software-intensive Cantilever. Capital efficiency in
      robotic-services businesses is typically lower than pure SaaS because hardware must be deployed, maintained, and
      replaced. With $347 million raised and no disclosed profitability, investors must evaluate the extent to which
      Cantilever has shifted the unit economics away from services margins (typically 20-30%) toward SaaS margins
      (60-80%).

      Preference-stack overhang from $347 million in cumulative equity is material. If liquidation preferences are
      structured as 1x non-participating, downside scenarios concentrate losses on common holders while preferred
      investors recover first. If Series D investors hold 1x participating preferred, break-even for common equity rises
      above $347 million on any liquidation. This dilution and preference structure must be verified during diligence,
      as it directly affects option-pool incentive value and secondaries pricing. Entry price discipline is critical at
      a $1.25B post-money. At an assumed 20-25% ownership stake for a new lead investor, the implied fully diluted
      valuation and preference stack makes a 3x return achievable only if exit exceeds $3.75 billion, requiring either a
      public-market debut at scale or an M&A acquirer willing to pay strategic premium.
