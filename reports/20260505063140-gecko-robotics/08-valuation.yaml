- id: S-SCENARIOS
  title: Bull, Base, and Bear Scenarios
  body: 'Bull scenario assumes Cantilever achieves SaaS re-rating: by 2027, 50%+ of revenue is recurring software subscription, ARR reaches $200M+, and net revenue retention exceeds 115%. Under these conditions, a 10-12x ARR multiple (consistent with Palantir at similar growth stages) supports a $2.0-2.4B exit valuation, generating a 1.6-1.9x return on Series D price. Probability signal: NAES $100M deal structure (if SaaS-attached) and Navy IDIQ repeat task orders converting to recurring data-subscription fees would be leading indicators. The World Economic Forum article on AI and industrial data transformation corroborates the macro tailwind for this scenario.

    Base scenario assumes blended services and software: $80-120M revenue by 2027, with SaaS attach rate at 30-40% of total revenue. Applying a blended 4-5x multiple (services at 1.5x, SaaS at 8x), fair value is $400-600M, below the current $1.25B entry price. A 3x exit multiple on base revenue requires either significant margin improvement or a strategic premium from a defense or energy acquirer willing to pay for Cantilever''s data moat. The base case produces a negative IRR for Series D investors unless the holding period extends to 2028+ with additional revenue growth. DOE and EIA projections for surging electricity demand through 2030 provide a structural tailwind that could push the base case toward its upper bound if NAES and grid-operator contracts compound.

    Bear scenario assumes persistent services economics: revenue stalls at $30-50M due to NDAA defense budget cuts, NAES contract underperformance, and an adverse trade-secret ruling that impairs Cantilever''s data-processing methodology. At 1-2x revenue (MISTRAS/TEAM comps), fair value collapses to $30-100M, implying near-total loss on Series D capital. Probability weighting: bull 25%, base 50%, bear 25%. Probability-weighted valuation = 0.25 x $2.2B + 0.50 x $500M + 0.25 x $65M = $816M. At $1.25B entry, the probability-weighted outcome implies a 0.65x return, negative carry unless the bull scenario probability exceeds 50%, which requires near-term evidence of SaaS revenue scale. This reinforces the research-more recommendation.

    '
