- calloutType: insight
  title: Contract-Visible Revenue Pipeline Exceeds $225M
  body: Gecko has disclosed more than $225M in large contract markers across NAES, the Navy IDIQ, and other programs, which is unusual public visibility for a private robotics company. Those values improve confidence that Gecko is selling into real enterprise and government budgets, but they are framework or ceiling values rather than recognized revenue.
  claimRefs:
  - C119
  - C120
  - C126
  - C134
- calloutType: risk
  title: Capital Intensity Requires Continued Funding or Path to Self-Sufficiency
  body: Gecko has raised roughly $347M through Series D without publicly disclosing profitability, burn, or segment margins. The FDE model, hardware deployment, and ongoing AI R&D all suggest a business that can scale, but not cheaply, so capital adequacy remains materially constrained by private information gaps.
