      - number: '5.2'
        title: 机器人硬件与传感器套件
        blocks:
          - type: paragraph
            body: >
              Gecko 运营一支多模态机器人队列，涵盖爬壁机器人、无人机（UAV）以及水下 /
              游泳机器人。爬壁机器人是公司最早、也最成熟的平台；它们搭载专门设计的传感器载荷，靠磁吸或粘附式运动机构，在船体、锅炉、储罐、压力容器、核部件等垂直和曲面表面行走。机器人以阵列形式携带超声换能器，用于 Rapid
              Ultrasonic Gridding（RUG）：向材料发射超声脉冲，测量回波，以估算壁厚并识别内部缺陷。一次 RUG 扫描会生成密集的 A-scan 时间序列数据；叠成 B-scan 和 C-scan
              后，可以看出大面积表面的厚度梯度和缺陷拓扑。


              无人机平台用于空中检测和成像；飞机表面检测应用每架飞机采集超过 10,000 张高清图像，构建精确的 3D 摄影测量模型，并在扩展现实（XR）环境中使用。该方案曾与 L3Harris 开展 12
              个月现场测试，覆盖多个美国军方客户。传感器载荷包括超声换能器、激光雷达、热成像相机和高分辨率光学相机。CEO Jake Loosararian 在 WEF
              文章中将数据类型列为「超声、振动、激光雷达、热成像、视觉」。公司也部署固定传感器，连续监测关键资产。与单点 NDT 供应商相比，传感器模态覆盖广是核心差异化来源。
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
              - CE011
