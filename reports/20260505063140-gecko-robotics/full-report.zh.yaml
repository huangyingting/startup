  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: |
              Gecko Robotics 看起来通过服务、软件和政府合同的混合方式变现，而不是纯 SaaS 模式。最清晰的公开证据显示，机器人检测工作由专有机器人、无人机、传感器和现场团队交付，
              Cantilever 则作为软件层，把检测数据转化为数字记录、预测性规划和资产管理工作流。这至少指向两条相连的收入流：现场交付的检测收入，以及附着在
              Cantilever 上的软件或平台收入。政府业务增加第三条收入流，结构上依托 2026 年 3 月 Navy IDIQ 和已独立验证的 Air Force Sentinel
              合同授予等合同工具。NAES、ADNOC 这类战略合作意味着第四种包装方式：借助与里程碑、铺开和已证明运营价值绑定的多年期框架扩展部署。

              主要财务限制在于，Gecko 不公开披露 ARR、年化收入水平、定价、软件占比或收入确认政策。公开合同价值是上限值、框架金额或新闻稿总额，
              而不是确认收入。因此收入质量只能方向性可见，还无法承销。尽调应要求按收入流拆分收入、里程碑合同的收入确认规则、在手订单转化假设，
              以及打包 Cantilever 收入与独立软件收入（如有）的拆分。
