  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics 面向一个数十亿美元级维护和检测市场：基础设施老化、劳动力短缺和监管安全要求在这里交汇。NDT 与检测市场 2025 年达到 $10.36 billion，预计以 8% CAGR
              增长到 2030 年的 $15.25 billion。检测机器人子市场增长更快，2025 年为 $6.72 billion，到 2032 年以 13.33% CAGR 增至 $16.16 billion。GMI
              数据也印证这一点：13.9% CAGR，到 2034 年达到 $9.8 billion。Gecko 的 Cantilever 运营平台把公司与纯硬件供应商区分开：它将机器人采集的传感器数据转为持久数字记录和 AI
              生成的维护建议，这一模式可以在一次性检测部署之上叠加经常性 SaaS 费用。

              乐观情景建立在三根支柱上。第一，国防渗透：已确认的美国海军 IDIQ（上限 $71M，覆盖太平洋舰队 18 艘舰船）、Air Force Sentinel ICBM 支持、BPMI 核动力制造合作、Trident
              Maritime 合作和 Columbia-class 潜艇原型项目，构成可防守护城河；ITAR 约束会放慢外国进入者。第二，商业规模：NAES 合作（最低 $100M 承诺，65 GW 资产基础）和 ADNOC
              Gas 合同（$30M，UAE）证明跨行业和国际复制能力。第三，平台经济性：Cantilever 的数据飞轮随着每次新增检测提升预测准确性，形成切换成本；如果 SaaS 附加率做到规模，可能支撑 80%+
              毛利率和 110% 以上净收入留存。

              反向逻辑同样可信。最接近的上市可比公司 MISTRAS Group（约 $700M 收入，NYSE: MG）交易约 0.5x 收入；除非 Gecko 已成功从服务公司重估为 SaaS
              公司，否则该倍数暗示公允价值远低于 $1.25B。收入结构、毛利率和 Cantilever SaaS 附加率都未披露。海军 IDIQ
              是上限，不是保证下限；实际任务订单取决于国会拨款和海军战备预算，二者会随地缘政治优先级变化。持续中的商业秘密诉讼（Summit NDE, N.D. Indiana, No.
              2:23CV229-PPS/JEM）以及 ADNOC UAE 部署带来的 ITAR 敞口，留下法律和监管尾部风险。竞争性机器人检测平台（ANYbotics、Boston Dynamics
              Spot、Percepto、Skydio）能力正在提升，并有大型战略投资者支持；即使 Cantilever 保留软件黏性，Gecko 的硬件差异化也可能随时间被侵蚀。
