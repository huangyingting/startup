companyProfile:
  summary: >-
    Gecko Robotics 是一家总部位于 Pittsburgh 的工业技术公司，由 Jake Loosararian 和 Troy Demmer 于 2013 年创立。公司先靠难触达工业资产的机器人检测建立声誉，随后扩展为以
    AI 为核心的操作层 Cantilever，把现场数据转化为维护、保障和资本规划决策。公司如今覆盖国防、电力、油气、先进制造等关键基础设施领域；以一家私营检测机器人公司而言，它在美国海军和国防邻近流程中的牵引力异常强。
