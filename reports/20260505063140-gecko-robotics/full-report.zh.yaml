            title: 结构性顺风跨越几十年且分散在多个行业
            body: >-
              三股独立顺风——基础设施老化、海军战备积压、AI 驱动电力需求——跨越不同预算周期和地理区域。即便某个垂直走弱（例如国防预算削减），其他垂直仍会继续。仅 NEMA/ASE 对 2040 年前美国电力需求增长
              35–50% 的预测，就给电力行业创造了结构性、十年级检测跑道。
