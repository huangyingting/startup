      - number: '8.6'
        title: 图表
        blocks:
          - type: callout
            title: 投资建议：在 $1.25B 估值下继续研究
            body: >
              Gecko Robotics 的投资逻辑在结构上有吸引力：它把可防御的 AI
              与机器人平台放在关键基础设施、国防现代化和能源转型的交叉点。长期结构性顺风叠加监管对自动化检查的需求上升，支撑了较强的市场规模论证。Series D
              独角兽估值反映出真实商业动能（NAES、海军、ADNOC）和战略投资人背书（Cox Enterprises、Founders Fund）。不过，若没有经审计财务和 Cantilever SaaS
              留存数据，$1.25B 入场价无法高置信度证明合理。按当前证据质量，概率加权退出价值约为 $816M，低于 Series D 价格。上调为买入需要满足三个条件：(1) 审计确认 ARR >= $100M 且
              NRR >= 110%；(2) 海军任务订单实际义务金额 >= $30M；(3) Summit NDE 诉讼解决，或财务敞口已量化且有限。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV014
              - CV015
              - CV018
              - CV007
              - CV018
          - type: callout
            title: 估值与证据缺口是首要风险
            body: >
              最大风险来自信息缺口，而不是竞争、技术或监管。$1.25B 估值下，投资人已经把可能尚未发生的 SaaS 重估计入价格。最佳上市可比公司 MISTRAS Group 的交易倍数为 0.5x 收入；Gecko 需要
              8-15x 才能支撑当前估值。只有证明 Cantilever SaaS 渗透率、高 NRR 和 50% 以上毛利率，这个倍数缺口才补得上。若没有证据，在 $1.25B 投资就内嵌了投机性溢价；如果
              Cantilever 尚未把国防和商业客户成功转成经常性订阅，该溢价会与悲观情景高度相关。
            calloutType: risk
            claimRefs:
              - CV010
              - CV007
              - CV019
              - CV010
          - type: callout
            title: 国防护城河与 Cox Enterprises 显示真实商业牵引
            body: >
              海军 IDIQ（$71M 上限，18 艘太平洋舰队舰艇）、BPMI 核推进合作、空军 Sentinel ICBM 合同和 Columbia 级潜艇演示，构成了结构上难复制的国防护城河。ITAR
              对技术转移的限制、DoD 安全许可和累积的结构数据，让 Gecko 平台在国防客户群中具备粘性。Cox Enterprises 领投 Series D，是独立的战略背书：Cox 有能源和媒体基础设施敞口，在领投
              $125M 轮次前应已做过自有商业尽调。
            calloutType: strength
            claimRefs:
              - CV003
              - CV005
              - CV011
              - CV012
              - CV013
