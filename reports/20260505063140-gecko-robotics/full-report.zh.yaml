            body: |
              最相关的初创公司和相邻竞争者，各自攻击 Gecko 价值链的不同切片。ANYbotics 提供用于油气、化工、电力、采矿和铁路自主检测的 ANYmal 四足机器人；
              其 ISO 27001 认证和 Yokogawa 合作说明企业级准备度和分销能力在提升，尽管本报告采用的来源中公开融资和收入仍未披露。Flyability 聚焦封闭空间无人机检测，
              关键是它通过运营商和分销商销售硬件，而不是自己提供检测服务，这限制了直接平台锁定。Invert Robotics 在真空吸附和服务交付重要的场景更强，
              已在 24+ 个国家完成 3,000+ 次检测，并支持光滑磁性和非磁性表面。Square Robot 专注内部 API 653 油罐检测，并在 2024 年 12 月完成
              Series B，同时积累专利和渠道深度。HUVR Data 和 Akselos 是关键的相邻软件可比对象：HUVR 做可靠性自动化和检测工作流，Akselos
              做结构性能管理和数字孪生。合起来看，没有单一竞争者复制 Gecko 的精确栈，但多个竞争者能从硬件形态、软件层或企业渠道侧翼夹击。
