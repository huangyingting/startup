    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、产品与商业模式
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics, Inc. 是一家总部位于 Pennsylvania 州 Pittsburgh 的技术公司，由 Jake Loosararian（CEO）和 Troy Demmer（首席产品官）于
              2013 年创立。两位创始人都曾就读 Grove City College；Demmer 还拥有 Carnegie Mellon MBA。Gecko 注册地址为 100 S Commons, Suite 145,
              Pittsburgh, PA 15212。公司还在阿联酋经济部 NextGenFDI 计划下设立国际总部，在 2024 年 4 月 ADNOC Gas 合同之前先打入中东。


              Gecko 的使命是用 AI 和机器人建造、运营并维护全球最关键的实体基础设施。公司把自身方案称为 “AIR” 模型——AI + 机器人——把自主数据采集硬件与名为 Cantilever® 的 AI
              软件平台结合起来。 爬壁机器人、无人机、机器狗和固定传感器采集船体、锅炉管、核导弹发射井、管道段等结构的高分辨率物理数据。 Cantilever
              再把这些数据层与运营数据聚合，输出预测性维护建议、数字孪生和可执行的资产健康洞察。


              商业模式以合同为核心：与工业运营商、国防机构和能源公司签订多年期服务与软件协议。值得注意的收入信号包括： 美国海军 IDIQ 上限 $71M（2026 年）、NAES 能源协议价值 $100M+（2025
              年）、ADNOC Gas 合同约 $30M（2024 年），以及覆盖 20 个设施的 Trident Maritime 合作（2026 年）。收入数字未公开披露。 截至 2026 年 5 月本轮报告日期，公司处于
              Series D 阶段（IPO 前），仍为私营公司。
