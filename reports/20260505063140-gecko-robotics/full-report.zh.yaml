        - 留存来源没有公开证据显示其具备 Gecko 式 PAUT 工作流深度或国防合同基础
      - - Boston Dynamics Spot
        - 相邻机器人同业
        - null
        - 能源、自然资源、制造、建筑、政府检查
        - 模块化载荷架构，覆盖视觉、热成像、声学、周界和数字孪生工作流
        - 市场定位并不指向 Gecko 核心的高精度壁厚 PAUT 工作流
      - - Waygate Technologies
        - 既有 NDT 技术厂商
