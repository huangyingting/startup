      - number: '2.2'
        title: 市场规模——TAM、SAM 与测算口径
        blocks:
          - type: paragraph
            body: >
              两家分析机构给出了检测机器人市场的主要规模估算。Global Market Insights（GMI）认为全球检测机器人市场 2024 年为 $2.8B，到 2034 年增长至 $9.8B，CAGR 为
              13.9%。Research and Markets（R&M）估算同一市场 2025 年为 $6.72B，到 2032 年达到 $16.16B，CAGR 为 13.33%。这些数字之间的差距（$2.8B 对
              $6.7B）反映的不是四舍五入，而是范围定义实质不同：R&M 的边界似乎把更广泛的工业自动化机器人也纳入其中，而不只限于纯检测导向机器人。


              更广义的 NDT 和检测服务市场——包括服务、人工与机器人——R&M 估计 2025 年为 $10.36B，到 2030 年增至 $15.25B，CAGR 为 8.1%。这个数字更贴近 Gecko 与
              TEAM、Mistras 等既有服务公司的竞争足迹。


              按 GMI，北美在 2024 年占全球检测机器人市场的 30.3%，意味着美国和加拿大子市场 2024 年约为 $850M，并在 2034 年朝 $3B 增长。Gecko
              近期收入管线主要在美国（海军、NAES、空军），使其处在这一子市场内。


              Gecko 的 SAM 最适合用垂直和产品范围约束：国防维护检测、发电资产检测、油气管线和容器检测，以及北美和精选国际市场（阿联酋）的重工业 （钢铁 / 采矿 / 纸浆）。分析师推导的 $2–4B
              全球估算，代表关键资产、机器人赋能检测子市场；Gecko 的产品在其中具有差异化。但这仍是缺乏直接公开来源佐证的估算。
