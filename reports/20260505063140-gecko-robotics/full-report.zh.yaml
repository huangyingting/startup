      - number: '6.5'
        title: 客户集中度、反向信号与尽调缺口
        blocks:
          - type: paragraph
            body: >
              客户集中度风险重大。国防和政府项目占 8 个具名客户中的 5 个（海军、BPMI、Trident、Columbia-class、USAF Sentinel），也占公开披露合同价值的大部分。商业客户
              NAES（$100M+）和 ADNOC（$30M）带来有意义的多元化，但欧洲或亚太生产客户尚未宣布。单一政府预算周期变化可能显著影响 Gecko 的收入轨迹，尤其是 IDIQ 结构合同。


              主要反向信号是 2023 年商业秘密诉讼：Gecko Robotics, Inc. v. Summit NDE, LLC（N.D. Indiana, No. 2:23CV229）。Gecko
              指控两名前员工加入竞争对手 Summit NDE 后挪用检测技术商业秘密。这是竞争性 IP 纠纷，不是面向客户的纠纷；现有公开记录没有牵涉任何客户关系。已审阅公开来源中，没有客户流失、合同取消或客户投诉证据。


              渠道依赖风险存在：ADNOC 交易通过 Al Masaood Energy 作为 UAE 本地渠道合作伙伴搭建，海军 IDIQ 通过 GSA
              政府范围合同载体执行。如果这些伙伴关系变化，中间渠道可能带来利润率或控制权风险。钢铁、纸浆和采矿客户在所有公开材料中均匿名，外部无法验证关系深度和满意度。公司没有公开 NPS 数据、续约率或 NRR
              指标，外部分析无法量化留存质量。
