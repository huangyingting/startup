      - number: '5.4'
        title: 能力模块——BUILD、SUSTAIN、MODERNIZE
        blocks:
          - type: paragraph
            body: >
              Cantilever 分成三个主要能力模块，对应资产生命周期管理的不同阶段。


              BUILD（先进制造）：部署在制造设施中，自动化 QA/QC 工作流。应用包括焊缝检测、锻件检测、铸件检测和装配验证。Gecko 称，锻件组件检测周期缩短 90%（BPMI 初始试验已验证），焊缝扫描快
              50x，Trident Maritime Systems 的 20 家制造设施吞吐提升 40%。制造阶段形成的数字线程会贯穿资产服役期，把生产质量记录连接到在役维护数据。


              SUSTAIN（海事保障）：最早也最成熟的部署场景，聚焦美国海军水面舰队和潜艇维护。机器人扫描船体、甲板、内部空间和焊缝；结果进入 Cantilever 的维护规划和排期模块。Gecko 称，每次部署可减少
              208 天维护积压，实现 300% ROI，并节省 $10M 维护资金。一次飞行甲板机器人评估消除了超过 3 个月潜在维护延误。2026 年 3 月 IDIQ 合同（上限 $71M，初始任务覆盖太平洋舰队 18
              艘舰船）通过 GSA 把海军关系扩展为 5 年期、面向美国各军种的合同载体。


              MODERNIZE（遗留资产检测与数字化）：覆盖石油天然气、电力、钢铁、采矿、纸浆造纸，以及国防现代化（ICBM 发射井、机体、POL 储存）。引用的商业行业指标包括：资产寿命延长 2x、CapEx 降低
              20%、反应式维护减少 80%。在 ADNOC Gas 试点中，相比人工流程，覆盖率提高 99.6%、效率提升 93%；由于取消脚手架，预计 LTI 率下降 33%。
