        - 2024 年 12 月完成 Series B；8 项专利；国际合作伙伴网络
        - 自主 API 653 储罐内部检查
        - 聚焦监管要求的专业自主储罐检查服务
        - 用例更窄，多垂直覆盖弱于 Gecko
      - - HUVR Data
