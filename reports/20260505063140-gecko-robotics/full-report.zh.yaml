  - id: FV004
    title: 需跟踪的投资 KPI
    type: kpi
    layout: standard
    summary: |
      九个领先指标会把建议从继续研究推向买入（正向）或放弃（负向）。Cantilever ARR、NRR 和 Navy 任务订单实际金额是权重最高的三个信号。今天这些指标都未公开。
    data:
      items:
        - label: Cantilever ARR
          value: Undisclosed
          note: 买入目标 >= $100M；< $50M 会强化放弃判断
        - label: Cantilever NRR
          value: Undisclosed
          note: SaaS 重估逻辑目标 >= 110%
        - label: Navy 任务订单实际金额与 $71M 上限
          value: Undisclosed
          note: 目标 >= $30M 已承诺金额，以确认收入底盘
        - label: NAES 迄今付款
          value: Undisclosed
          note: 目标 >= $20M 已支付，以确认合同推进速度
        - label: 毛利率（综合）
          value: Undisclosed
          note: SaaS 组件目标 >= 50%；< 30% = 纯服务经济性
        - label: Series D 投资者构成
          value: Cox Enterprises led (new); USIT, XN, Founders Fund (existing)
          note: 正向：新的战略投资者独立验证商业逻辑
        - label: Summit NDE 诉讼状态
          value: Active - N.D. Indiana, No. 2:23CV229-PPS
          note: 目标：驳回或和解；不利裁决 = 悲观触发
        - label: 入场估值倍数
          value: $1.25B / undisclosed ARR
          note: 无法计算；投资前必须在数据室核验 ARR
        - label: MISTRAS 公开倍数（底部可比）
          value: ~0.5x revenue
          note: 底部可比公司；Gecko 必须证明相对 MISTRAS 有 SaaS 溢价，才能支撑 $1.25B
    approximationNotes: 所有 KPI 值均来自公开记录。未披露值需要数据室访问权限。
    claimRefs:
      - CV001
      - CV006
      - CV010
      - CV011
      - CV012
      - CV007
