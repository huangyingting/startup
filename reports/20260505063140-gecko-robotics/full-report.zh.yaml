      - number: '3.3'
        title: 既有工业服务与 NDT 领导者
        blocks:
          - type: paragraph
            body: |
              既有公司的威胁不在机器人新奇度，而在分销、信任和账户控制。Baker Hughes 的 Waygate Technologies 拥有深厚的先进 NDT 产品组合，
              覆盖超声、X 射线和计算机断层扫描；即便没有 Gecko 品牌化的全栈 AIR 叙事，它仍是工业基础设施中的可信工作流竞争者。
              TEAM Inc. 是本报告采用的来源中最清晰的规模化既有公司案例：约 5,400 名员工、超过 220 个网点、覆盖 20 多个国家，并把 OneInsight
              软件平台叠加到既有检测与维护业务上。这种组合很重要，因为大型既有公司可以把服务、软件和现场劳动力打包进客户已经信任的采购结构。
              它们也有资本基础和客户触达，可以收购机器人能力，而不是从零自研。尽管章节材料对 TEAM 和 Waygate 的来源证据强于其他传统 NDT 公司，
              更广泛的模式很清楚：Gecko 不只在为产品优越性与初创公司竞争，也在和既有公司竞争；一旦机器人检测更容易购买或外包，这些既有公司就能用既有关系、安全声誉和合同工具，削弱 Gecko 的部分技术优势。
            claimRefs:
              - CP012
              - CP013
              - CP015
              - CP019
      - number: '3.4'
        title: 差异化与护城河分析
        blocks:
          - type: paragraph
            body: |
              Gecko 的护城河在机器人、数据和工作流复合的地方最强。Cantilever 的定位是 AI 加机器人操作平台，而不是单一机器人产品；Gecko 认为，
              没有一手数据的 AI 缺少上下文，没有 AI 的数据缺少预测力。这个框架很重要，因为竞争者通常只拥有循环的一侧：有硬件但没有系统级软件，或有软件但没有专有数据采集。
              Gecko 也有证据显示其在国防部署深度上异常耐久。其国防页面确认，公司参与海军驱逐舰、两栖舰、航空母舰，以及 Virginia 和 Columbia
              级潜艇项目，并另有空军 Sentinel 发射井工作。2026 年 3 月 Navy IDIQ 增加了五年 $71M 上限，以及覆盖 18 艘舰船的首个
              $54M 任务订单，进一步强化采购入口和任务贴合度。国防之外，Gecko 称已分析数千项资产，并在钢铁、纸浆和造纸领域拥有实质 ROI 案例和大型能源合作；
              这些都强化了专有数据飞轮。2023 年针对 Summit NDE 的商业秘密诉讼是不利证据，但也说明 Gecko 方法有价值到足以让复制风险成为问题。
