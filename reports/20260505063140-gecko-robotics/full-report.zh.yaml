              没有分析师报告直接测算 Gecko 的可服务市场。本章 $2–4B 的 SAM 估算，是分析师从总量数字中剔除非 Gecko 垂直后推导而来。没有 Gecko 的收入、合同使用率和客户数量，无法估算
