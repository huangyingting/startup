      - number: '7.4'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Gecko 是私营公司，没有披露收入、ARR、毛利率、经营亏损或烧钱速度。公司累计融资 $347M，最近一轮是 2025 年 6 月的 $125M Series
              D。硬件制造、配备专门机器人团队的现场部署（前沿部署工程师，Forward Deployed Engineers），以及软件平台开发三者叠加，需要持续投入大量资本。没有收入和利润率数据，就无法判断 Gecko
              是否现金流为正、Series D 后现金跑道如何，或 NAES 与海军扩张会消耗多少资本。


              商业模式看起来把现场服务收入（机器人部署、检测、数据采集）与 Cantilever SaaS 或许可费结合在一起。混合模式会带来毛利率复杂性：服务毛利率通常为 20–40%，SaaS 毛利率可超过
              70%。公司没有披露拆分，收益质量无法评估。合同机制也不一致——NAES 交易的财务结构未披露，海军 IDIQ 使用有上限的任务订单，ADNOC 合同有 $30M
              上限。收入确认时间、里程碑计费与按使用量计费的差异，以及政府成本会计要求，都可能造成收入确认不均衡或递延。


              计划扩展到 NAES 运营的 65 GW 资产，会放大资本强度风险。要在全美数百个发电设施部署机器人硬件和工程团队，需要大量前期投资。CEO
              称要「终结今天电厂的运行方式」，显示转型范围很大，可能需要合作伙伴共同投资或外部项目融资，但公开资料没有显示已完成结构设计。一旦增长放缓，固定硬件成本和现场团队开销会挤压 Gecko 利润率。
            claimRefs:
              - CR018
              - CR019
              - CR021
              - CR007
              - CR015
              - CR033
      - number: '7.5'
        title: 人员、执行与竞争风险
        blocks:
          - type: paragraph
            body: >
              Jake Loosararian 是公司最可见的公开代言人，频繁出现在 Bloomberg、CNBC、Fortune 和 ADIPEC，并在每一项重大合同公告中被引用。这构成典型关键人风险：如果
              Loosararian 离任、健康受损或卷入声誉事件，公司政府关系、投资者信心和客户信心都可能受到实质影响。Loosararian 之外，公开具名高管团队仅限于总法律顾问 Amy Kurren 和现场操作员
              Mitchell Felix（来自招聘页面）；CFO、CRO 或 CTO 尚无公开具名确认。


              公司同时面对两类人才市场竞争：机器人硬件工程师和软件 AI 工程师是不同劳动力池，二者都受到国防主承包商、自动驾驶公司和超大规模云厂商的高需求拉动。针对 Summit NDE
              的商业秘密案件（2023）说明，Gecko 关键员工已被竞争对手主动招募。机器人操作员在工业环境中工作（高温锅炉、受限空间、腐蚀性船体），也带来 OSHA 合规和工伤赔偿敞口，规模尚未量化。


              来自既有 NDT 厂商的竞争风险重大。Waygate Technologies（Baker Hughes 子公司）、Eddyfi Technologies、MISTRAS Group（NYSE: MG）和
              Flyability 服务重叠细分市场，已有客户关系和安全认证。MISTRAS 年检测收入超过 $700M，在公用事业、石化和政府领域拥有长期合同。这些既有厂商可以利用既有认证（API、ASNT、NAS
              410）并以有竞争力的价格防守市场份额。Gecko 的竞争优势——AI 驱动的 Cantilever 平台和自研数据历史——取决于持续投资；如果既有厂商开发出可比软件栈，优势可能被侵蚀。
