      - number: '5.5'
        title: 差异化、IP 与自研护城河
        blocks:
          - type: paragraph
            body: >
              Gecko 的差异化由四层相互强化的资产支撑。第一，自研训练数据：运营 10+ 年、已分析「数千项资产」，Gecko 积累了用于训练 AI
              模型的物理世界数据集，竞争对手要复制需要多年时间和大量资本。这个飞轮——更多检测 → 更多数据 → 更好模型 →
              更多检测——在真实标注数据稀缺的行业里，是持久护城河。第二，不断扩大的专利组合：geckorobotics.com/patents
              是一个实时页面（证实公司有专利活动），但具体专利号和权利要求没有公开列出，构成尽调缺口。第三，已发表的 RUG 强化学习论文显示公司愿意公开技术方法，既建立开发者可信度、吸引 ML
              人才，又把训练数据留在内部。第四，国防 + 商业的军民两用模式形成交叉补贴：国防合同提供收入稳定性和涉密环境资质，商业部署则带来更广的资产数据多样性。前沿部署工程（Forward Deployed
              Engineering）模式让工程师嵌入单一客户，构建 Cantilever 的任务专用扩展，带来深度技术集成和高切换成本。


              公司两次入选 CNBC Disruptor 50（2024、2025），在 World Economic Forum 发表文章，CEO Jake Loosararian 曾在 ADIPEC 和 Bloomberg
              TV 露面，为国防和能源领域都提供品牌建设信号。竞争者（Waygate、Eddyfi、MISTRAS、Flyability、Percepto、Energy Robotics）要么是专门的单点 NDT
              供应商，要么是纯硬件无人机公司，要么是没有同等深度 AI 平台的运营商；目前没有一家看起来把全生命周期平台软件、自有机器人队列，以及用 10 年现场数据训练的 AI 结合起来。
            claimRefs:
              - CE025
              - CE026
              - CE027
              - CE028
              - CE029
      - number: '5.6'
        title: 部署、信任、安全与路线图
        blocks:
          - type: paragraph
            body: >
              Gecko 在 trust.geckorobotics.com 维护信任中心（Trust Center），但公开内容很少——页面由 JavaScript 渲染，没有列出认证、SOC 2 状态、FedRAMP
              授权或 ITAR 合规文件。考虑到 Gecko 处理海军、空军和核动力项目数据，ITAR 以及可能的 CMMC 合规几乎肯定是必需项，但公开来源无法独立验证，构成重大尽调缺口。


              部署采用前沿部署工程（FDE）模式：Gecko 工程师嵌入客户设施，操作机器人，并按客户具体数据系统配置 Cantilever。该模式带来深度集成，但也意味着依赖专业服务，自助式扩展能力有限。公司官网提供
              Cantilever 软件演示，客户通过「Log In」门户访问，证实其是云端 SaaS 平台（不只是本地部署）；国防使用场景暗示涉密环境可采用混合 / 网络隔离部署，但公开资料没有确认。


              已知路线图事项（来自公开公告）：(1) GSA IDIQ 合同载体扩展至美国全部军种；(2) XR 数字孪生飞机检测产品（与 L3Harris 合作，截至 2025 年 4 月处于原型到生产阶段）；(3) UAE
              / 国际扩张，包括面向 UAE 公民的 ADNOC 培训项目；(4) 数据中心检测应用（由 CEO 关于 AI 基础设施能源的评论暗示）。公司没有公开带日期和功能承诺的正式产品路线图，这与 Gecko
              私营公司的披露画像一致。
