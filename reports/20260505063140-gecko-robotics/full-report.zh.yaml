      - number: '1.5'
        title: 里程碑与战略轨迹
        blocks:
          - type: paragraph
            body: >
              Gecko 的轨迹体现出一次有意转向：从工业检测服务公司，转向以国防为主要增长引擎的军民两用 AI 数据平台公司。 创业起点故事（电厂锅炉故障、靠绳索悬挂的人工检测员）把公司锚定在不性感但 ROI
              很高的工业维护场景。YC 加速了公司向可扩展技术模式的转型。


              2022–2023 年是 Gecko 明确转向国防的阶段：Air Force Sentinel 合同（2022 年 12 月）、Columbia 级潜艇合同（2023 年 11 月）、以及引入国防导向投资者
              USIT 和 Founders Fund 的 Series C 延展轮（2023 年 12 月）快速接连发生。2025 年出现 NAES $100M 能源协议、BPMI 合作和 Series D
              独角兽融资。2026 年，$71M Navy IDIQ 和 Trident 合作进一步显示其向国防工业基础扩张。


              2023 年针对 Summit NDE, LLC 的商业秘密诉讼凸显检测技术领域的竞争暴露，也证明小型竞争对手曾追逐关键员工。 该案于 2023 年 7 月在美国联邦地区法院（Indiana
              北区）提起；截至本报告，其解决结果未获公开确认。


              Jake Loosararian 2026 年 1 月在 World Economic Forum 发表的文章《From Steel to Data: The Next AI Revolution》把 Gecko
              描绘成一家平台公司，争夺 AI 革命数据底座供应商的位置——类似 Carnegie Steel 支撑工业革命的角色。创始人沟通和投资者材料中的叙事一致，说明 CEO
              信念强、对齐度高，但也意味着战略叙事集中在单一创始人身上。
