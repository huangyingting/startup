      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              Gecko 的买方范围覆盖四个主要群体，每一类都有不同的采购结构和采用触发因素。国防和海军买方通过政府合同工具采购（IDIQ、固定总价、成本加成），资金来自 DoD 运营与维护（O&M）或采购拨款。2026 年
              3 月 Navy IDIQ（上限 $71M）和 BPMI 合作确认，机构化 DoD 采购是 Gecko 的国防市场进入路径。预算权在 NAVSEA、OPNAV 和防务主承包商（BPMI、BlueForge
              Alliance）手中。采用触发因素是战备要求、国会对维护积压的压力，以及造船生产时间表。


              电力和能源买方是独立发电商（IPP）和 NAES 这样的电厂运营商；NAES 管理 300+ 个设施、65GW。 预算负责人是电厂层面的运营与维护（O&M）经理，多年期平台合同的资本决策会上升到
              CFO/COO。NAES $100M+ 协议（2025 年 2 月）建立了一个参考合作，验证 IPP
              采购路径。采用由电网可靠性要求、老化机组经济性（延长资产寿命，而不是绿地新建）以及数据中心电力需求上升带来的电厂利用率提高触发。


              油气买方包括国家石油公司（ADNOC Gas，约 $30M 合同，2024 年 4 月）、炼油商、LNG 终端运营商和管道运营商。 采购权通常在完整性管理或资产运营团队，VP
              级运营负责人签批。国际买方还因本地合作伙伴要求而更复杂（ADNOC 项目中的 Al Masaood Energy）。 采用触发因素是环境合规、CO₂ 减排要求和预测性维护降本目标。


              工业买方（钢厂、采矿作业、纸浆和造纸厂）单个合同规模更小，但合计代表大量老化资产。这类客户往往价格敏感，采购由资本维护预算驱动，也由生产中断风险驱动，而不是监管合规。 相比国防，这一群体的采用滞后通常更高。
