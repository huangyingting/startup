      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Jake Loosararian（CEO、联合创始人）在 Grove City College 学习电气工程时萌生了 Gecko 的想法；他意识到电厂锅炉检测既危险又昂贵。2013 年他自筹资金启动公司，约
              2015 年接受 Y Combinator 邀请（当时拒绝了一项收购），并带领公司完成四轮融资、进入独角兽行列。他的背景横跨机器人硬件、大数据工程 （早期招聘 Palantir
              校友）和国防合同。Loosararian 是 World Economic Forum 演讲嘉宾，也曾就国防现代化公开作证。 关键人风险很实：在所有重大合同公告中，他都是主要公开面孔、首席签约人和被引用的发言人。


              Troy Demmer（CPO、联合创始人）从一开始加入，负责产品战略，也持有创始人股权。他的背景为公司补上 Carnegie Mellon MBA 层面的商业严谨度。Amy Kurren 担任总法律顾问，为
              Gecko 活跃的联邦承包和商业秘密诉讼历史提供内部法律监督。


              2023 年 12 月，USIT 董事总经理 Gaetano Crupi（联合创始人、Cabin Technologies 前 CEO）和 Trae Stephens（Founders Fund
              合伙人；Anduril Industries 联合创始人兼执行董事长）加入公司董事会，董事会治理明显加强。 Stephens 的 Anduril
              背景显示出深厚的防务科技连接，但也可能让外界感到它与一家相邻防务机器人公司存在认知重叠。 早期投资者 YC、Drive Capital、Next 47、XYZ Venture Capital 和 Soma
              Capital 持有经济权益；截至本报告，未见公开董事席位。


              领导层变动风险：公开资料未披露重大高管离职。2023 年针对 Summit NDE 的商业秘密诉讼（涉及两名前 Gecko 员工加入竞争对手）说明公司经历过一些工程层面的流失；但诉讼结果和离职规模未获公开确认。
