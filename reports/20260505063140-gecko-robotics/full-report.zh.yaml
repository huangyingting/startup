      - number: '4.2'
        title: 市场进入动作与销售效率
        blocks:
          - type: paragraph
            body: |
              Gecko 公开可见的市场进入模式更像高接触、咨询式、由部署牵引，而不是交易式。招聘页面和围绕前线部署工程师（FDE）的运营语言说明，
              Gecko 会把具备技术能力的员工派进客户环境，诊断问题、界定工作范围、部署机器人，并把数据转化为运营结果。这种模式很适合大型、复杂的工业和国防账户，
              因为价值靠运营改善证明，而不只是靠软件席位采用证明。这也解释了为什么公司的公开验证点以客户 ROI 表述，例如维修识别快 50x、
              钢铁行业每年创造 $40M 价值、纸浆和造纸行业每罐节省 $3M，以及停机时间下降、反应式维护下降、CapEx 下降等结果区间。

              可能的代价是销售效率不透明。政府采购周期可达 12 到 24 个月甚至更长，而公开资料未披露商业销售周期、CAC、回本期或 NRR。NAES
              这类合作可能通过给 Gecko 提供进入 65GW 托管发电资产的组合级渠道改善分销，但并不会取消嵌入式交付能力的需求。结果是，公司采取先落地再扩张的动作：
              参考案例销售力强，但在管理层披露分群经济性前，完全装载后的销售效率仍不确定。
