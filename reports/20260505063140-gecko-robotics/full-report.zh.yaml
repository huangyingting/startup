      - number: '6.3'
        title: 具名客户证据——商业与国际
        blocks:
          - type: paragraph
            body: >
              国防之外，Gecko 已确认的最大商业合同是 NAES（美国电力）和 ADNOC Gas（UAE 油气），另有匿名工业案例研究和 L3Harris 航空航天合作。


              NAES Corporation 被称为「美国最大的独立电力运营商，管理 65GW」，2025 年 2 月宣布一项 $100M+ 多年协议，并有权扩大到 $250M
              以上。协议面向火电和可再生能源资产，并获得白宫背书，背景是全国能源紧急状态声明。Pennsylvania 州长 Josh Shapiro、NAES 总裁 Mark Dobler 和 CEO Loosararian
              都提供了具名背书。The Robot Report、POWER magazine 和 NAES 自己的合作页面独立确认了这笔交易——三重来源交叉印证。


              ADNOC Gas（ADX: ADNOCGAS）是 Abu Dhabi National Oil Company 旗下国有子公司，2024 年 4 月通过本地合作伙伴 Al Masaood Energy
              签订多年合同，金额 AED 110M（$30M USD）。试点结果显示，资产覆盖率提高 99.6%，较人工流程效率提升
              93%+。合同允许资产保持运行时进行在线检测，并预计通过取消脚手架要求使工时损失伤害（Lost Time Injury）率降低 33%。offshore-technology.com 独立确认了合同细节。2025
              年 11 月 Gecko 新闻标题证实，签约 18+ 个月后 ADNOC 关系仍在活跃。


              L3Harris 合作（2025 年 4 月宣布）是在基于无人机 3D 成像的 XR 飞机检测上进行联合开发，已与多个军方客户测试超过 12 个月。匿名案例研究包括一家钢厂（$40M 年价值、5x
              ROI、停机时间减少 30%）和一家纸浆厂（每个储罐节省 $3M、寿命延长 10 年）。
