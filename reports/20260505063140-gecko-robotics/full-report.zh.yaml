  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Gecko 的国防业务让公司置身美国政府合同监管的密网。空军合同（FA9422-22-C-0015）和海军 IDIQ（2026 年 3 月）受 FAR/DFARS
              约束，后者带来成本会计标准、审计权（DCAA）和履约报告义务。Gecko 与 BPMI（Naval Nuclear Propulsion Program 主承包商）合作核潜艇部件，又叠加 Q-list
              和受控核信息的合规要求。空军 Sentinel ICBM 发射井评估合同则对人员、数据，以及任何跨境转移技术提出明确 ITAR 义务。


              公司同时在 UAE 以 $30M 上限合同服务 ADNOC Gas，抬高 ITAR 军民两用风险：用于美国军事资产的机器人平台和 AI 检测软件，可能与 Abu Dhabi 部署技术共享。UAE 的
              NextGenFDI 注册不豁免 Gecko 遵守美国出口管理条例（EAR）或 International Traffic in Arms
              Regulations（国际武器贸易条例）；只要涉及国防相关能力、源代码或受控数据，就仍受约束。没有公开记录确认出口管制合规项目或 ITAR 注册，不过公司法务（招聘页面列名总法律顾问 Amy
              Kurren）已具名。


              重大法律风险是 2023 年商业秘密诉讼：Gecko Robotics, Inc. v. Summit NDE, LLC（No. 2:23CV229-PPS/JEM, N.D. Indiana）。Gecko
              指控两名前员工加入 Summit NDE 后挪用自研检测技术。案件于 2023 年 7 月提起，但截至研究锚点日期（2026-05-05），公开记录没有最终判决或和解。该案凸显人才依赖型技术公司面临的 IP
              可携带性风险。次级法律敞口包括 UAE 合作伙伴关系可能触发的 FCPA 责任，以及向其他海湾国家扩张时的 OFAC / 制裁合规。
