      - number: '8.4'
        title: 可比公司集合
        blocks:
          - type: paragraph
            body: >
              为 Gecko Robotics 构建可靠可比公司集合，需要连接三类不同价值驱动因素：传统 NDT 服务公司、国防科技软件独角兽和检测机器人初创公司。没有一家上市可比能同时覆盖三维。

              传统 NDT 服务：MISTRAS Group（NYSE: MG）是最接近的上市可比，为能源、航空航天和基础设施客户提供检测与状态监测服务，FY2024 年收入约 $700 million，市值约 0.5x
              收入（约 $350M）。TEAM Inc. 是可比服务提供商，2023 年完成重组并私有化。Baker Hughes 旗下 Waygate Technologies 是大型集团子公司，无法单独做倍数分析；但历史上
              GE Inspection Technologies 收购约 $1.5-2.0 billion，隐含 1-1.5x 收入。这些可比表明，纯服务型 Gecko 可能按 0.5-1.5x 收入交易；以估计
              $80-150M 收入基础计算，公允价值为 $40-225M，显著低于 $1.25B。

              国防科技软件独角兽：Anduril Industries 2024 年按 $14 billion 估值融资，估计 ARR 为 $500M，隐含约 28x ARR。Palantir Technologies
              在公开市场以 25-30x 收入交易。这些倍数奖励国防原生 SaaS、较高切换成本和经常性政府合同价值。Gecko 要证明 Anduril 级倍数合理，需要确认 Cantilever 经常性 SaaS 收入达到
              $125M+ ARR，并证明 NRR 高于 120%。

              检测机器人初创公司：ANYbotics、Boston Dynamics（Hyundai 子公司）、Percepto、Skydio 和 Invert Robotics 在相邻市场竞争。VentureRadar
              给出的 Gecko 可比集合包括 Voliro、Invert Robotics、Planys Technologies 和 Energy Robotics，但没有一家披露了足以锚定私募可比分析的估值。Skydio
              2021 年凭无人机国防动能以 $2.2B 估值融资，但此后面临估值压力。检测机器人私募可比倍数在 2021-2023 牛市通常为 5-15x ARR，2023-2025 年压缩 30-50%。
            claimRefs:
