  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 对 Gecko 的影响
      - 尽调问题
    rows:
      - - 美国关键基础设施老化（电厂、舰船、管道、工业资产）
        - 驱动
        - 当前；持续数十年
        - Gecko 六个垂直领域都会立刻产生检查需求；整体替换设备成本过高，延长资产寿命成了默认策略
        - 核实 NAES 300+ 座电厂中有多少比例已运行 >30 年且符合检查条件
      - - 美国电力需求激增（到 2040 年 +35–50%，NEMA/ASE）
        - 驱动
        - 2025–2040 年，近期加速
        - 电厂利用率和检查频次上升；运营商承受不起停机；Gecko 电力行业合同管线被拉长
        - 确认数据中心需求增长会转化为每座电厂更高运维支出，而不只是新建项目
      - - 美国海军维护积压 + 战备压力
        - 驱动
        - 当前；受政府预算周期影响
        - 海军 $25.9B/4 年维护支出叠加持续积压，带来多年期 IDIQ 需求；GAO 建议说明问题是系统性的，不是偶发的
        - 判断海军预算削减或 CR 风险是否会推迟 IDIQ 使用
      - - AI 技术成熟——需要物理数据
        - 驱动
        - 2025–2030 年加速
        - Gecko 被定位为 AI 数据采集基础设施；一旦各行业跑出 AI ROI，对机器人生成数据的需求会增加
        - 核实 Cantilever 的 AI 输出是否用于自主决策，而不只是可视化
      - - 海湾 / 中东基础设施投资（ADNOC、Saudi Aramco）
        - 驱动
        - 2024–2030
        - 打开国际管线；ADNOC 合同树立海湾标杆；国家石油公司受 ESG/CO₂ 减排承诺驱动
        - 评估 ADNOC 合同能否带来 Aramco 或其他海湾 NOC 管线；确认 NextGenFDI 排他条款
      - - 监管检查强制要求（OSHA、API、ASME、PHMSA、NRC）
        - 驱动
        - 周期性——驱动年度 / 定期检查周期
        - 各行业都会形成非可选检查预算；改用机器人不会取消监管周期，只是提升数据质量和效率
        - 梳理哪些强制要求需要人工签字，从而限制全自动化空间
      - - 资本强度与部署摩擦
        - 约束
        - 近期；随产品成熟而下降
        - 销售周期长、依赖停机窗口、安全资质流程复杂，都会降低漏斗顶端速度；快速落地扩张受限
        - 评估从首次接触到首份合同的平均时间，以及完整平台部署所需时间
      - - 安全关键环境中的信任与责任
        - 约束
        - 中期；随履约记录积累而下降
        - 核电、海军和受监管电厂需要人工并行验证 AI 发现；客户回本周期被拉长，早期纯机器人收入被压低
        - 询问 AI 主导发现与 AI 辅助发现合同占比——这是软件毛利率关键
      - - 替代竞品和替代方案难以挤出
        - 约束
        - 持续
        - TEAM Inc、Mistras 和既有 NDT 公司根基很深；人工检查员持有监管认证（ASNT Level II/III），抬高切换成本；数字化竞品（HUVRdata、Energy Robotics）在增长
        - 评估 Gecko 相对既有厂商的胜率，以及各细分领域完成替换所需时间
      - - 数据格式锁定与集成成本
        - 约束
        - 近期；持续存在
        - 运营商采用 Cantilever 时，历史检查记录（PDF、自有格式）会带来集成成本；首个合同年的净 ROI 被压低
        - 询问 Cantilever 部署中涉及历史数据迁移与绿地部署的占比；评估数据集成 NPS
    notes: 时间标签为定性判断；Gecko 未披露管线指标、转化率或销售周期长度。除非有 Gecko 特定数据点，所有约束均属于机器人检查采用中的通用约束。
