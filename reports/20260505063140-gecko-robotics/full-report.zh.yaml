      - number: '4.5'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: |
              Gecko 的收入质量看起来好于多数机器人初创公司，因为公开证据指向多年期合同、具名政府项目、大型企业合作，以及可能在单次检测之外创造经常性价值的软件层。
              问题不在于没有牵引力，而在于缺少承销所需的具体私有指标。收入未公开披露。ARR 未披露。毛利率、烧钱、EBITDA、在手订单转化、按确认收入计算的客户集中度，
              以及服务与软件拆分也未披露。这让公司处在一个尴尬中间地带：合同可见度存在，但已实现经济性仍不透明。

              毛利路径是核心争议。如果 Cantilever 能实质捕获持续规划和运营工作流，毛利率未来可能扩张。如果业务仍高度依赖 FDE 劳动力、定制化交付和硬件部署，
              类服务毛利率的主导时间可能比软件式估值暗示的更长。优先尽调问题包括：过去 24 个月按分部拆分的收入；合同在手订单和转化假设；
