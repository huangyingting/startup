      - number: '8.5'
        title: 退出准备度与最终尽调
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics 距离可行退出大约还有 2-4 年，IPO 和战略并购都走得通。若走 IPO，需要收入继续增长到 $300M+，并证明 SaaS 估值重估已经成立；从独角兽阶段走到这些条件，通常还要
              3-5 年。国防科技 IPO 窗口（Palantir 2020、Joby 2024）更偏好政府订单储备清晰的公司，Gecko 的海军 IDIQ、空军和 BPMI 合同正好能讲出这条故事线。不过，Gecko
              还需要解决 Summit NDE 诉讼，并实现 GAAP 盈利（或拿出清晰路径），公开市场才可能以有利倍数吸收发行。

              战略并购是更近的情景。潜在买家包括：L3Harris Technologies，已经签有 XR 合作协议，并可借助 Cantilever 数据支持飞机持续保障；Baker Hughes，旗下拥有 Waygate
              Technologies，可把 Gecko 的机器人和 SaaS 层接入 Waygate 的传感器硬件；Anduril Industries，正在搭建国防科技平台，可把 Gecko 的关键基础设施检查纳入
              Lattice OS；以及寻求实体 AI 差异化的超大规模云厂商。战略买家通常会在公允价值可比公司之上支付 15-30% 溢价；若公允价值为 $1.5B，对应收购价为 $1.7-2.0B，略高于 Series D
              入场价。

              投前尽调优先级按价值变动影响排序。最优先索取的是 FY2023、FY2024 和 FY2025 的经审计财务报表，包括收入拆分（服务 vs. SaaS）、分部毛利率，以及带队列留存数据的 Cantilever
              ARR。没有这些材料，任何投委会都无法负责任地批准 $1.25B 估值下的交易。第二优先级包括股权结构表和优先股堆叠审查、外部律师对 Summit NDE 诉讼敞口的意见、海军任务订单实际付款核验，以及
              Cantilever SaaS NRR 和流失队列数据。Jake Loosararian 作为 ADIPEC 2025 特邀演讲嘉宾亮相，说明除 ADNOC Gas
              合同外，中东管线仍在积极推进。投资立场是继续研究，并设置 90 天尽调时钟。
            claimRefs:
