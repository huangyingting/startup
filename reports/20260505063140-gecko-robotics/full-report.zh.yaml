  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品概览——Cantilever® 与 AIR 平台
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics 的主要商业产品是 Cantilever®，公司称其为“全球首个由 AI 与机器人（AIR）技术驱动的操作平台”。

              Cantilever 于 2023 年 11 月随 Series C 延展轮公开发布，摄取 Gecko
              机器人队伍采集的数据，并把客户现有运营数据——历史数据库、维护记录、设施文档——合并成一个实体资产健康的单一事实源。

              平台交付四类输出：（1）每项资产的基线健康记录（数字孪生）；（2）动态资本预算工具，标记哪些资产需要修复以及何时修复；

              （3）用于运营优化和修复计划优先级排序的 AI 驱动场景建模；（4）预测性场景规划，包括基于数字孪生的寿命延长预测。


              AIR 是 Gecko 的总体技术判断：AI 的质量取决于训练它的物理数据，而机器人是唯一能以 AI 模型所需精度规模化生成物理真值

              数据的方法。平台口号“建造、运营、维护”直接对应三个工作流模块（BUILD、SUSTAIN、MODERNIZE），分别对应国防制造、海事保障和存量基础设施中的不同买方工作流。

              截至 2026 年 5 月本轮报告日期，Cantilever 已部署在美国海军水面舰队资产、核潜艇项目、美国空军 ICBM 发射井现代化、ADNOC Gas

              设施、NAES 电厂、Trident Maritime Systems 制造设施、BPMI 核部件制造、L3Harris 飞机项目，以及钢铁、采矿、纸浆造纸和油气行业客户中。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
