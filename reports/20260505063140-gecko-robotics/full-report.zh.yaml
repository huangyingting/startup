      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              六个结构性驱动因素为 Gecko 平台创造多年期需求。第一，美国关键基础设施老化：30–60 年前建造的电厂、管线、海军舰艇和工业设施正在接近设计寿命终点，
              需要更密集检测和基于状态的维护，而不是按日历周期维护。第二，美国电力需求增长：NEMA 和 Alliance to Save Energy 预计， 2024 至 2040 年美国电力需求将激增
              35–50%，主要由 AI 数据中心扩张（按 NEMA，单是数据中心需求到 2050 年 +300%）和电动出行推动。 这种增长给现有电厂带来系统性压力，要求最大化正常运行时间并延长资产寿命。DOE
              也佐证了这一点：2023 年数据中心电力消耗占美国总量 4.4%，预计到 2028 年升至 6.7–12%。


              第三，国防战备压力：美国海军在 FY2020–2023 为水面战斗舰维护拨款 $25.9 billion，但仍报告持续的延期维护、备件不足和未落实的 GAO 建议。 国会审查正在加强。第四，AI
              作为检测赋能层的采用：Gecko CEO Loosararian 的 WEF 文章提出一个如今被广泛接受的判断——AI 系统需要机器人提供高保真物理数据，才能兑现价值承诺，从而推动机器人作为 AI
              数据采集层的需求。第五，监管合规周期：OSHA、API、ASME、PHMSA 和核安全规范要求定期检测间隔，在 Gecko 所有垂直中形成可预测的多年期检测预算。第六，国际能源基础设施建设：海湾
              NOC（ADNOC）正在投资预测性维护，以减少 CO₂ 排放并满足 ESG 承诺，打开国际采购渠道。
