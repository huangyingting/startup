  - id: FE001
    title: Cantilever 产品架构栈
    type: stack
    layout: wide
    summary: >
      Gecko 的产品架构分三层：（1）物理数据采集层，由多模态机器人和固定传感器组成；（2）AI/ML 处理层，把原始传感器数据转成结构化资产健康记录；（3）Cantilever SaaS
      平台，把决策支持结果交给运营人员和规划人员。
    data:
      layers:
        - id: hardware
          label: 物理数据采集
          modules:
            - 爬壁机器人（RUG 超声阵列、UT 换能器）
            - 无人机 / UAV（高清光学、激光雷达、热成像）
            - 固定传感器（连续监测）
            - 游动 / 水下机器人
        - id: data-processing
          label: AI/ML 处理与数字模型
          modules:
            - 强化学习 UT 厚度测量（RUG）
            - 缺陷分类模型（超声、视觉）
            - 预测性维护 AI（劣化率、失效概率）
            - 3D 摄影测量重建（XR 数字孪生）
        - id: platform
          label: Cantilever® 运营平台（SaaS）
          modules:
            - BUILD 模块：先进制造 QA/QC 数字线程
            - SUSTAIN 模块：海事船队健康和维护规划
            - MODERNIZE 模块：工业资产健康基线和资本预算
            - 情景建模和维修计划优先级排序
            - 动态资本预算和全船队仪表盘
        - id: integrations
          label: 客户数据集成
          modules:
            - ERP / CMMS / 工业历史数据库连接器
            - 设施记录和维护历史
            - 政府数据系统（防务客户）
