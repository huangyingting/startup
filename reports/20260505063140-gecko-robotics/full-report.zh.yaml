      - number: '4.3'
        title: 成本结构与毛利率驱动因素
        blocks:
          - type: paragraph
            body: |
              Gecko 的成本结构很可能由四个部分主导：直接现场劳动力、硬件和传感器部署、软件与 AI 工程，以及一般开销。前线部署工程师（FDE）
              模式尤其重要，因为它说明服务交付需要熟练工程师在客户运营内部投入真实时间，而不是做轻量级售后支持。这种模式在战略上可能很强，但也意味着交付成本会随人员数扩张，
              除非工具化、标准化或软件杠杆抵消劳动强度。除此之外，Gecko 看起来还承担真实硬件成本，因为其价值主张依赖专有检测机器人、无人机、固定传感器和数据采集系统，而不是纯软件。

              MISTRAS Group 和 TEAM Inc. 的公开申报文件为该模式中的服务部分提供了最佳可得基准。这些申报文件显示，工业检测和专业现场服务可以支撑真实规模，
              但毛利率通常显著低于垂直 SaaS。因此，Gecko 的毛利上行取决于 Cantilever 能在多大程度上把经济性从劳动密集型检测工作拉向类似软件的经常性价值。
              没有分部毛利桥接，就无法判断 Gecko 当前更接近工业服务画像、混合型技术赋能服务模式，还是叠加在硬件和现场运营之上的高毛利软件业务。
