      - - TEAM Inc.
        - 既有服务 + 软件
        - 上市公司规模，约 5,400 名员工、220+ 个地点、20+ 个国家
        - 工业检查、评估、专项维护、资产可靠性
        - 现场覆盖极广，也能把服务与 OneInsight 软件打包
