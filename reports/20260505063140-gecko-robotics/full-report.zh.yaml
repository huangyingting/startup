  - id: TP004
    title: 护城河持久性 / 竞争风险登记表
    columns:
      - 护城河主张
      - 威胁路径
      - 严重性
      - 缓释措施
      - 尽调问题
    rows:
      - - 数据飞轮 / AI 优势
        - 硬件商品化或纯软件叠加层会削弱自有采集价值
        - 高
        - 持续在设备群和行业间累积一手数据、资产基线和模型表现
        - Cantilever 准确性有多少依赖无法迁移到其他供应商的自有数据？
      - - 国防安全许可护城河
        - 大型主承包商或相邻机器人公司凭更强采购关系进入国防维护
        - 中
        - 利用海军和空军合同历史，扩大装备准入，并加深涉密工作能力
        - 哪些具体许可、批准和续期依赖支撑国防客户粘性？
      - - 自有机器人硬件
        - 低成本机器人硬件，包括海外供应链进入者，会压窄硬件差异化
        - 中
        - 把差异化上移到传感工作流、数据质量和软件集成
        - 竞争优势中有多少比例来自硬件，多少来自软件和部署诀窍？
      - - 全栈平台锁定
        - 客户同时使用多家机器人和软件，或把 Gecko 硬件接到第三方分析层
        - 中
        - 扩大 Cantilever 在维护规划和基线历史中的角色，让替换成本随时间上升
        - 客户多常并行使用供应商，或把单一资产工作流切给专业厂商？
      - - 商业秘密和 IP 组合
        - 员工挖角、逆向工程或诉讼消耗会削弱自有方法
        - 中
        - 留住关键人才、强化 IP 控制，并把诀窍转化为专利和可复用工作流资产
        - Summit NDE 商业秘密案的结果和运营影响是什么？
      - - 中国机器人威胁
        - 低成本机器人和供应链影响力同时挤压商业定价和国防采购来源
        - 高
        - 强化可信供应商定位、国内国防相关性和采购信任优势
        - 未来 3-5 年，哪些商业市场最容易受到低成本海外机器人替代方案冲击？
