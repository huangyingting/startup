  - id: FE002
    title: 客户工作流——工业资产检查与决策流程
    type: flow
    layout: standard
    summary: |
      Gecko 的核心服务工作流从范围界定和机器人部署推进到数据采集、AI 分析，再由 Cantilever 输出决策。前沿部署工程师在现场作业，把原始传感器数据转成按优先级排序的维护行动。
    data:
      nodes:
        - id: n1
          label: 1. 客户沟通与范围界定
          description: 资产类型、状况、关键性和数据集成需求与 FDE 团队共同定义
        - id: n2
          label: 2. 机器人现场部署
          description: 部署爬壁机器人、无人机或固定传感器；FDE 工程师操作设备
        - id: n3
          label: 3. 全覆盖数据采集
          description: 在整个资产表面以高保真采集超声 A-scan、激光雷达、热成像和光学数据
        - id: n4
          label: 4. AI/ML 数据处理
          description: RL 模型估算厚度；缺陷分类器标记异常；构建数字孪生
        - id: n5
          label: 5. Cantilever 集成与分析
          description: 机器人数据与运营 / 维护记录合并；AI 生成按优先级排序的维修计划和资本建议
        - id: n6
          label: 6. 决策输出与报告
          description: 工厂经理 / 维护规划人员收到优先维修清单、CapEx 情景和供未来参考的数字孪生
        - id: n7
          label: 7. 持续监测与复检
          description: 重复部署或固定传感器提供纵向健康趋势数据，并反哺模型再训练
