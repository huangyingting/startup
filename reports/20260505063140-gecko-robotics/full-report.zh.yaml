  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与垂直行业分层
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，Gecko Robotics
              服务至少七个工业垂直领域，覆盖美国政府国防项目、美国本土商业能源运营商，以及国际国有能源公司。公开合同有记录的具名客户包括美国海军（太平洋舰队水面舰船和潜艇项目）、BPMI（Bechtel Plant
              Machinery——为 Naval Nuclear Propulsion Program 制造核部件）、Trident Maritime Systems（美国海军供应链）、美国空军（Sentinel ICBM
              发射井现代化）、ADNOC Gas（Abu Dhabi）、NAES Corporation（美国电网）和 L3Harris
              Technologies（飞机维护）。已发布案例研究中的匿名客户包括一家大型钢铁制造商和一家纸浆造纸厂。Gecko 采矿行业页面提到 Freeport-McMoRan，暗示存在采矿客户关系，但没有公开合同细节。


              客户基础对应 Cantilever 三个工作流模块。BUILD（先进制造质量保证）的客户包括 BPMI、Trident 和 Columbia-class
              潜艇项目。SUSTAIN（海事与资产健康）的客户包括美国海军水面舰队、USAF Sentinel 和 ADNOC Gas。MODERNIZE（遗留基础设施数字化）的客户包括
              NAES、匿名钢厂、纸浆厂和电厂运营商。海军关系横跨 BUILD 和 SUSTAIN 两个阶段，是跨模块部署。欧洲或亚太生产客户尚未公开确认。国际收入目前仅限 UAE 的 ADNOC Gas。


              Gecko 在 Ministry of Economy 的 NextGenFDI 计划下于 Abu Dhabi 设立国际总部；2025 年 11 月关于持续开展 ADNOC AI
              与机器人技能培训的公告证实，中东业务仍在活跃。CEO 曾在 World Economic Forum Annual Meeting（2026 年 1 月）发言，提到 Gecko 在工业资产智能上的全球雄心。但截至
              2026 年 5 月运行日，美国和 UAE 之外没有公开披露的合同。
