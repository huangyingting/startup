      - number: '8.2'
        title: 融资与估值背景
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics 已通过至少四轮已知融资累计获得 $347 million 股权资金。2025 年 6 月 12 日宣布的 Series D 融资 $125 million，公司估值 $1.25
              billion。该轮由 Cox Enterprises 领投，这是一位新投资者，代表战略商业验证；USIT（Thomas Tull、Gaetano Crupi）、XN 和 Founders Fund（Trae
              Stephens）参投。2023 年 12 月 Series C 融资 $173 million，投前估值 $633 million；从 Series C 到 Series D 的 18 个月间隔带来 97%
              估值抬升，显示投资者对该窗口期执行力有强信心。

              资本部署背景对估值分析很重要。Gecko 在硬件密集业务线（爬壁机器人、无人机、固定传感器）之外还运营软件密集的 Cantilever。机器人服务业务的资本效率通常低于纯
              SaaS，因为硬件必须部署、维护和更换。Gecko 已融资 $347 million，却没有披露盈利能力；投资者必须评估 Cantilever 在多大程度上把单位经济从服务毛利率（通常 20-30%）推向
              SaaS 毛利率（60-80%）。

              累计 $347 million 股权融资带来的优先股堆叠悬顶风险重大。如果清算优先权结构是 1x 非参与型，下行情景中普通股持有人集中承担损失，优先股投资者先收回本金。如果 Series D 投资者持有 1x
              参与型优先股，任何清算中普通股的盈亏平衡点都会升至 $347 million 以上。这一稀释和优先权结构必须在尽调中核实，因为它直接影响期权池激励价值和老股交易定价。以 $1.25B
              投后估值入场，价格纪律至关重要。假设新领投投资者持有 20-25% 股权，隐含完全稀释估值和优先股堆叠意味着，只有退出价值超过 $3.75 billion，才可能实现 3x
              回报；这需要达到规模后的公开市场首秀，或愿意支付战略溢价的 M&A 买家。
