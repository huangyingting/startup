      - number: '6.4'
        title: 采用轨迹、FDE 黏性与留存信号
        blocks:
          - type: paragraph
            body: >
              Gecko 的客户获取轨迹从 2022 年到 2026 年中明显加速。2015 至 2022 年，Gecko 依靠未具名工业客户在发电和油气领域建立声誉。2022–2023 年，国防关系正式成形：USAF
              Sentinel（2022）、Columbia-class 示范（2023 年 11 月），以及 Series C + Series C 延伸轮（合计 $173M），Founders Fund 和 USIT
              获得董事会席位，反映机构国防投资者的信心。2024 年至 2026 年中，客户组合扩展至 ADNOC（2024 年 4 月）、NAES（2025 年 2 月）、BPMI（2025 年 7
              月）、Trident（2026 年 1 月）和海军 IDIQ（2026 年 3 月）。Series D（$125M，2025 年 6 月，估值 $1.25B）将 NAES、L3Harris 和 ADNOC
              列为动能证据点。


              公开记录里的留存信号很强。海军关系从水面舰队维护延伸到潜艇项目，再扩展为政府范围 IDIQ，符合深化的多阶段合作。ADNOC Gas 进入多年合同，2025 年 11 月培训项目说明双方仍在投入关系。NAES
              协议包含 $250M 扩张选项。Cox Enterprises（Series D 领投）和 Founders Fund 都把客户耐久性与跨垂直广度列为投资逻辑支点。


              前沿部署工程模式是 Gecko 的主要留存机制。工程师嵌入客户现场，构建任务专用 Cantilever 扩展后，Gecko 形成三层切换成本：自研数字孪生和历史数据、定制软件工作流，以及 FDE
              人员的组织知识。已审阅的公开来源中，没有客户流失、合同取消或面向客户投诉的证据。Forbes 创始人画像（2022）提到，部分电厂客户关系可追溯到 2015–2017 年，说明客户关系寿命较长。
