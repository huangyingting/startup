  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              Gecko 的竞争集合不只是机器人厂商名单。直接的机器人检测群体包括 ANYbotics 的四足平台、Boston Dynamics 可灵活挂载载荷的 Spot、
              Flyability 的封闭空间 Elios 3 无人机、Invert Robotics 的真空吸附爬行器，以及 Square Robot 的自主油罐检测系统。
              这些玩家在工作流的部分环节与 Gecko 重叠，但很少能匹配其机器人加软件的组合姿态。第二类是 Baker Hughes / Waygate 和
              TEAM Inc. 这样的既有公司，它们已经在全球规模销售 NDT 服务、评估和维护，可以把软件或合作硬件加进现有账户。第三类是相邻软件和数字孪生厂商，
              包括 HUVR Data 和 Akselos；它们位于数据采集之上，争夺 Gecko 希望由 Cantilever 占据的操作系统层。替代方案依然强大：
              人工 NDT、绳索进入、脚手架、封闭空间进入，以及手工记录测量值的人类检测员。VentureRadar 的相似公司列表也显示，潜在进入者仍可能来自相邻机器人、无人机和检测软件市场。
              也就是说，Gecko 不只在和今天的机器人同行竞争，也在和明天通过合作、收购和打包组装出来的全栈组合竞争。
