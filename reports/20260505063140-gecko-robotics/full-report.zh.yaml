        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: |
              Gecko 融到的资本足以让它不像早期科学项目，但公开数据仍不足以做可靠跑道评估。2025 年 6 月，公司完成 $125M Series D 后达到
              $1.25B 估值，已披露融资总额约 $347M。这个资本基础，加上国防、能源和国际市场中可见的合同活动，说明公司已经取得有意义的商业和政府牵引力。
              NAES、Navy IDIQ 以及持续的空军、海军和 ADNOC 工作等大型披露项目，提高了一个判断的可信度：Gecko 卖进的是真实预算，而不只是依赖试点。

              即便如此，公开资料无法承销资本充足性，因为现金余额、烧钱、回款时点、营运资本拖累和项目级毛利都未披露。支撑需求可见度的同一批事实，也支撑融资依赖风险：
              硬件部署、专业现场团队、进入国防制造，以及持续 AI 研发都会消耗资本。正确的财务解读是，最近融资显著降低了短期资金压力，但没有消除后续要求：
              如果增长继续需要高部署强度，公司要么给出更清晰的自筹资金路径，要么继续依赖外部资本。
