      - number: '7.2'
        title: 运营、技术与数据安全风险
        blocks:
          - type: paragraph
            body: >
              Gecko
              的业务依赖能在极端工业环境运行的硬件：在盐水条件下攀爬船体，在带压锅炉管内爬行，在石化设施内飞行，并检测焊接核部件。现场哪怕轻微硬件故障——传感器退化、机器人附着失败、通信中断——都可能造成检测数据集不完整。若未发现的结构缺陷后来引发事故，Gecko
              面临的责任索赔可能远超合同收入，尤其是核潜艇、ICBM 发射井、高压电厂锅炉等安全关键资产。公开资料没有已提起产品责任索赔或安全事故的证据，但没有披露不等于没有事件。


              Cantilever 被定位为实体资产的「唯一事实源」，因此存在数据依赖风险：平台宕机、数据泄露或算法错误，客户可能作出错误维护决策。美国军方客户还叠加数据分级要求。Gecko 的信任中心（Trust
              Center）是公开页面，但没有披露能证明国防敏感工作负载安全姿态足够的具体认证——FedRAMP、DoD IL2/IL4、SOC 2 Type II。CMMC（Cybersecurity Maturity
              Model Certification，网络安全成熟度模型认证）是 DoD 主承包商和分包商的要求；Gecko 的认证等级尚未公开确认。


              从供应链看，Gecko 制造或采购定制硬件，包括爬壁机器人、无人机、固定传感器和专用传感器载荷。公司没有披露硬件供应商，也没有披露任何单一来源组件依赖。专用传感器（超声换能器、相控阵 UT
              探头）或定制附着机构一旦中断，可能延迟新部署并带来合同履约风险。NAES 合作面向 65 GW 发电资产；在保持质量的同时把机器人硬件扩展到这一覆盖水平，是一个没有确认交付时间线的运营挑战。
