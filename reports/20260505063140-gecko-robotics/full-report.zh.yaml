      - number: '1.4'
        title: 规模、客户与运营覆盖
        blocks:
          - type: paragraph
            body: >
              Gecko 官网写着“10+ 年经验，已分析数千项资产”——这是唯一公开披露的规模指标。 客户数量和收入数字未披露。具名客户关系包括：美国海军（水面舰艇、Columbia 级潜艇、Virginia 级潜艇）、
              美国空军（Sentinel/ICBM 发射井项目）、NAES（美国最大的独立电力运营商，管理 65GW）、ADNOC Gas （Abu Dhabi National Oil Company
              子公司）、Trident Maritime Systems（20 个设施，美国海军供应链）、 BPMI（Naval Nuclear Propulsion Program 的防务主承包商），以及 American
              Bituminous Power （提供公开客户证言的电厂客户）。


              地理上，Gecko 主要在美国运营（Pittsburgh 总部、国防设施、电厂、工业场地），同时通过 NextGenFDI 在阿联酋拥有活跃国际存在，并在 2025 年 11 月宣布扩大 ADNOC
              合作。2026 年 1 月 CNN 关于海湾地区 AI 融资的文章进一步确认，公司聚焦海湾地区扩张。


              员工数未披露。招聘页面可见岗位包括前线部署工程师（FDE）、机器人现场操作员和总法律顾问，说明团队结构由硬件、软件和法律三角支撑。 公司已招聘 Palantir
              校友（大数据工程）。行业覆盖六个垂直：国防、油气、电力、纸浆与造纸、钢铁和采矿。
