      - number: '6.2'
        title: 具名客户证据——美国国防与政府项目
        blocks:
          - type: paragraph
            body: >
              Gecko 的国防客户组合是公开资料中记录最充分的板块；官方新闻稿、美国政府支出记录和第三方新闻共同证明了五个不同的美国军方项目关系。


              美国海军关系是单个最大已确认合同。2026 年 3 月通过 GSA 获得 5 年期 IDIQ，上限 $71M，初始任务订单覆盖美国太平洋舰队 18 艘舰船（上限 $54M）。GSA
              合同载体可供美国所有军种使用。在这份 IDIQ 之前，Gecko 已服务海军水面舰队——驱逐舰、两栖战舰、航空母舰——以及 Virginia-class 和 Columbia-class
              核潜艇项目。一次海军飞行甲板机器人评估消除了超过 208 天潜在维护延误。合同公告引用了美国海军作战部长到 2027 年实现 80% 舰队战备率的目标。海军 CTO Justin Fanelli 和参议员
              Dave McCormick 提供了具名背书。2025 年 1 月 GAO 关于海军水面舰艇的报告记录了结构性维护积压，这正是 Gecko 方案具备任务关键性的原因。


              BPMI 是 Naval Nuclear Propulsion Program 主承包商，2025 年 7 月宣布生产合作，将锻件检测周期最多缩短 90%——从数周降至数天。BPMI 总裁 Barb
              Staniscia 提供了具名高管背书。Trident Maritime Systems 于 2026 年 1 月宣布覆盖 20 家制造设施的合作，目标是吞吐提升 40%；Trident COO Trip
              Mullen 背书了结果。Columbia-class 潜艇示范合同（2023 年 11 月，经 BlueForge Alliance）验证了供应链中焊缝检测的 ROI。USAF Sentinel ICBM
              项目由 USASpending.gov 奖项 FA942222C0015 记录，并在 Gecko 2023 年 12 月 Series C 延伸轮新闻稿中确认。
