      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景假设 Cantilever 获得 SaaS 重估：到 2027 年，50%+ 收入来自经常性软件订阅，ARR 达到 $200M+，净收入留存超过 115%。在这些条件下，10-12x ARR 倍数（与
              Palantir 类似成长阶段一致）支撑 $2.0-2.4B 退出估值，对 Series D 价格产生 1.6-1.9x 回报。概率信号：如果 NAES $100M 交易结构绑定 SaaS，且海军 IDIQ
              重复任务订单转为经常性数据订阅费，将成为领先指标。World Economic Forum 关于 AI 与工业数据转型的文章印证了该情景的宏观顺风。

              基准情景假设服务与软件混合：到 2027 年收入 $80-120M，SaaS 附加率占总收入 30-40%。采用 4-5x 混合倍数（服务 1.5x、SaaS 8x），公允价值为 $400-600M，低于当前
              $1.25B 入场价。基准收入要实现 3x 退出倍数，需要显著利润率改善，或国防 / 能源战略收购方愿意为 Cantilever 的数据护城河支付溢价。除非持有期延长到 2028+
              并伴随额外收入增长，否则基准情景对 Series D 投资者产生负 IRR。DOE 和 EIA 对 2030 年前电力需求激增的预测提供结构性顺风；如果 NAES
              和电网运营商合同复利增长，基准情景可能被推向上沿。

              悲观情景假设服务经济性持续：由于 NDAA 国防预算削减、NAES 合同表现不及预期，以及不利商业秘密裁决损害 Cantilever 数据处理方法论，收入停滞在 $30-50M。按 1-2x
              收入（MISTRAS/TEAM 可比）估值，公允价值跌至 $30-100M，意味着 Series D 资本几乎全损。概率权重：乐观 25%、基准 50%、悲观 25%。概率加权估值 = 0.25 x $2.2B
              + 0.50 x $500M + 0.25 x $65M = $816M。以 $1.25B 入场，概率加权结果意味着 0.65x 回报、负持有收益，除非乐观情景概率超过 50%；这需要近期出现 SaaS
              收入规模证据。该结论强化「继续研究」建议。
