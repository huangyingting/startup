              GMI 与 R&M 对全球检测机器人市场规模的判断相差 2.4x（2024–2025 年 $2.8B 对 $6.7B）。这不是四舍五入差异，而是范围定义根本不同。若投资者锚定更高数字，却不验证 Gecko
              产品是否真的竞争于更广边界，就可能在每个 Gecko 垂直上把年度可服务机会高估超过 $100M。
