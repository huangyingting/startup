      - number: '5.3'
        title: AI/ML 软件架构与数据处理
        blocks:
          - type: paragraph
            body: >
              Gecko 的机器学习流水线建立在监督学习和强化学习模型上，训练数据来自自研多传感器数据集。ML 工程师 Luke Roberto 公开发布的技术博客详细说明了公司如何用强化学习自动化超声测厚（Rapid
              Ultrasonic Gridding 问题）。RL 智能体读取 B-scan 数据（沿空间维度堆叠的
              A-scan），在每个网格点选择厚度估计；奖励函数对齐达到人工质量的标注，因此不需要大规模手工标注。公司因此可以把机器人采集的大量 RUG 数据用于训练 ML 模型，而不会被手工标注卡住。


              除 UT 测量外，AI 还用于：基于传感器数据的异常和缺陷分类；基于历史劣化速度的预测性维护排期；运营效率建议（Gecko 称 Cantilever 可识别 3–5%
              的电厂效率提升）；以及基于数字孪生的维修排序场景规划。Cantilever 将机器人采集的数据层与客户系统中的「分散数据源」整合，意味着可能接入 ERP、historian 数据库、CMMS 和维护记录；具体集成
              API 与认证没有公开文件。Cantilever 也被描述为军民两用，既支持国防涉密 / 非涉密环境，也服务商业行业。CEO Loosararian 说，平台的 AI
              本体从「第一性原理」出发，并质疑数据完整性——「在建成世界里，数据在证明清白之前都是有罪的」。这表明平台更强调数据验证和置信度评分，而不是不加审查地接受传感器数据。
