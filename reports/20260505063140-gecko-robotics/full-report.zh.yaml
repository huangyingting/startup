      - number: '7.3'
        title: 客户与合作伙伴集中度风险
        blocks:
          - type: paragraph
            body: >
              具名合同价值高度偏向美国国防部项目。海军 IDIQ（上限 $71M，5 年期，2026 年 3 月）、BPMI Nuclear Naval Propulsion 合作、Air Force Sentinel
              ICBM 合同、Columbia-class 潜艇示范合同和 Trident Maritime Systems
              合作，加起来构成公开披露合同价值的大头。单一政府买方集中带来拨款风险：美国国防合同受年度国会拨款、持续决议和项目取消决定约束。海军 IDIQ
              是上限，不是保证下限；实际下达的任务订单取决于项目办公室执行和预算分配。GAO 在 2025 年 1 月记录，海军水面舰艇维护项目长期面临资金挑战，这可能影响 Gecko 完全获取 $71M 上限的能力。


              商业侧，NAES 代表美国电力行业内集中，ADNOC Gas 代表 UAE 地缘集中。NAES 合作（$100M–$250M+ 区间）明确仍在为「最大影响」设计结构，投资机制未披露。如果 NAES
              自身财务状况走弱——它为第三方业主管理资产——该合作的承诺支出可能面临重新谈判。ADNOC Gas 属于 Abu Dhabi 政府所有；任何美国制裁、地缘政治重新站队，或 UAE
              对美国技术监管立场变化，都可能打断该合同。


              合作伙伴依赖包括 BlueForge Alliance（Columbia-class 工作的非营利集成商）、Trident Maritime Systems（海军供应链）、BPMI（Naval Nuclear
              Propulsion）、L3Harris Technologies（XR 飞机维护产品）和 Al Masaood Energy（ADNOC 的 UAE 本地合作伙伴）。任何一个主承包方出问题，都可能削弱
              Gecko 间接触达底层政府或工业客户的能力。
