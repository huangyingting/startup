      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics 至少完成过四次已披露融资。Y Combinator 约在 2015 年提供初始种子投资。到 2022 年 6 月，公司累计融资 $122.3M，其中包括 2022 年 3 月宣布、由
              XN 和 Mark Cuban 领投的 $73.3M Series C；该数字隐含 Series C 前累计融资约 $49M。Series C 对公司的估值为“接近 $1B”。 2023 年 12 月，Gecko
              完成 $100M 的 Series C 延展轮（使 Series C 总额达到 $173M），引入 USIT（Thomas Tull 旗下防务聚焦载体）和 Founders Fund 作为董事会层级投资者。


              Series D 于 2025 年 6 月完成，规模 $125M，由新投资者 Cox Enterprises 领投，USIT、XN、Founders Fund 和 YCombinator
              继续参与。该轮将投后估值定为 $1.25B，正式进入独角兽状态，并被描述为较上一轮估值翻倍。 截至 Series D，已披露融资总额约为
              $298–302M（取决于早期轮次的精确规模）。公开资料未披露任何债务工具、二级交易或信贷额度。


              资本配置背景：Gecko 的大型政府合同管线（Navy IDIQ $71M、Air Force Sentinel、NAES $100M+、ADNOC 约 $30M）可能部分抵消持续烧钱，但公司的研发强度（硬件 +
              软件双线投入）、国际扩张和人员增长轨迹，意味着盈利前仍需要继续融资。确切烧钱率和跑道未知。
