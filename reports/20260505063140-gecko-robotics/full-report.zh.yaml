  - id: FO001
    title: Gecko Robotics 公司里程碑时间线
    type: timeline
    layout: standard
    summary: |
      从创立（2013）到海军 IDIQ 授标（2026 年 3 月）的关键日期节点，覆盖融资、产品 / 平台发布、监管合同，以及一起负面事件（商业秘密诉讼）。2022 年 Series C 之后，活动节奏明显加快。
    data:
      items:
        - date: '2013'
          label: 创立
          detail: Jake Loosararian 和 Troy Demmer 在 Pittsburgh, PA 创立 Gecko Robotics，灵感来自电厂锅炉检测难题。
          tone: positive
        - date: ~2015
          label: Y Combinator（W15）
          detail: YC 入选让团队拿到第一份薪水，并全职投入；团队拒绝收购要约，选择继续做大。
          tone: positive
        - date: 2022-03
          label: Series C 轮 — $73.3M
          detail: XN 和 Mark Cuban 领投；估值接近 $1B；资金用于国防与能源扩张。
          tone: positive
        - date: 2022-12
          label: 空军 Sentinel 合同
          detail: $1.5M 合同，用于检测 ICBM 发射设施；首个公开的联邦授标。
          tone: positive
        - date: 2023-07
          label: 商业秘密诉讼
          detail: Gecko 起诉 Summit NDE 和两名前员工，指控其侵占商业秘密。
          tone: warning
        - date: 2023-11
          label: Columbia 级潜艇合同
          detail: 通过 BlueForge Alliance 与美国海军签署示范合同，用于 $132B 潜艇项目的焊缝检测。
          tone: positive
        - date: 2023-12
          label: Series C 延伸轮 — $100M
          detail: USIT 和 Founders Fund 加入董事会；Series C 总额达到 $173M。
          tone: positive
        - date: 2024-04
          label: ADNOC Gas 合同（约 $30M）
          detail: 与 ADNOC Gas 签署多年协议；试点显示覆盖率提升 99.6%。
          tone: positive
        - date: 2025-02
          label: NAES $100M 能源交易
          detail: 与美国最大独立电力运营商建立战略合作；可选择扩大至 $250M。
          tone: positive
        - date: 2025-06
          label: Series D 轮 — $125M / $1.25B 估值
          detail: Cox Enterprises 领投；独角兽地位确认；估值较上一轮翻倍。
          tone: positive
        - date: 2025-07
          label: BPMI 合作
          detail: 与海军核动力承包商 BPMI 合作；组件检测时间最多缩短 90%。
          tone: positive
        - date: 2026-03
          label: 海军 IDIQ — $71M 上限
          detail: 5 年期政府范围 IDIQ；初始授标覆盖太平洋舰队 18 艘舰艇（$54M / 5 年）。
          tone: positive
    approximationNotes: YC 入选日期（约 2015 年）为近似值；Series C 之前各早期轮次的具体交割日期未公开披露。
