      - number: '2.5'
        title: 采用约束与规模测算缺口
        blocks:
          - type: paragraph
            body: >
              自主检测机器人采用面临几项结构性约束。资本强度和部署摩擦是首要问题：把 Gecko 机器人部署到船体、锅炉或管道段，需要资产进入窗口（通常在计划停机期间）、校准协议和安全审查流程。
              在安全关键环境（核推进、导弹发射井）中，进入运营部署前的资质认证周期可能长达 12–24 个月。如此高的摩擦限制了 Gecko 在装机基础上快速规模化的能力。


              信任和责任风险是第二个重要约束。在安全关键资产中，运营方可能接受 AI 辅助检测结果作为补充，但若没有并行人工检测，不愿把它们作为监管签批的主要依据。
              这种“信任缺口”拉长销售周期，并限制平台合同早期收入确认。BPMI 合作中“检测时间减少 90%”的主张在部署前需要大量受控测试，说明即便是 Gecko 最好的客户也需要验证期。


              数据互操作和切换成本锁定构成第三个约束：多数运营方有几十年的检测记录，存放在专有或纸质格式中，无法与 Gecko 的 Cantilever 平台兼容，推高集成成本。 既有检测公司（TEAM
              Inc、Mistras）深嵌客户工作流，并提供有竞争力的机器人和无人机服务。竞争者版图也在扩大：HUVRdata、Energy Robotics、Akselos、Voliro 和 Invert Robotics
              都在重叠垂直中争夺预算份额。


              仍有两个重要规模测算缺口：（1）无法用现有公开资料精确计算 Gecko 的 SAM；分析师估算采用不同范围定义，也没有按 Gecko 精确垂直拆分； （2）没有 Gecko
              收入、客户数量和合同使用率数据，就无法推导可靠 SOM；这些数据均未公开披露。
