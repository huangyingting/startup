      - number: '3.5'
        title: 切换成本、锁定与竞争风险
        blocks:
          - type: paragraph
            body: |
              这个市场确实存在切换成本，但分布不均。最强锁定来自 Gecko 不只是提供机器人，而是在 Cantilever 内建立资产基线、把历史检测记录接入维护规划，
              并嵌入受监管或国防工作流。历史资产记录、预测模型和多年期合同机制，使替换比换掉单个硬件供应商更难。即便如此，多宿主仍然可能存在：
              很多买方可以把一支机器人队伍和另一套软件层配对，或让不同形态并行运行——四足机器人巡检、无人机进入封闭空间、爬行器检测油罐、人工班组处理边缘案例。
              市场的不利面也在上升。硬件会变得更便宜，纯软件玩家正在整合，ANYbotics 与 Yokogawa 这类分销合作说明企业机器人渠道在成熟。
              中国机器人竞争是军民两用和基础设施语境中的特定战略风险；Gecko 领导层关于供应链和国家安全暴露的公开证词凸显了这一点。最后，现状方案仍很根深蒂固：
              人工检测可能没那么优雅，但客户普遍理解它，供给也充足；当客户犹豫是否采用新平台标准时，它常常仍是默认选择。
