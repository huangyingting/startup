  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与现状替代方案
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics 竞争的市场是实体检测与资产完整性管理市场——更具体地说，是自主或半自主机器人数据采集替代或增强人工技师手动检测的部分。
              市场边界包括：机器人检测硬件（爬壁机器人、无人机、固定传感器）、处理检测数据的 AI 软件平台，以及把两者打包在一起的多年期服务协议。


              Gecko 的直接市场不包括：没有机器人辅助、由人工检测员提供的传统 NDT 服务（例如 TEAM Inc、Mistras Group）； 非专为检测设计的通用工业机器人；SCADA
              和过程传感器监控系统；以及没有机器人数据采集环节的纯数字孪生软件。


              Gecko 替代的现状方案包括：（1）持证 NDT 技师通过绳索进入或脚手架进行人工检测；（2）TEAM Inc、Mistras Group 等第三方检测服务公司派人工技师携带便携 NDT
              仪器；（3）按区间排程的维护（日历或运行小时触发），而不是按状态维护； （4）固定传感器 SCADA 监测，能捕获运营数据，但捕获不到实体资产完整性数据。Gecko
              的差异化在于捕获高分辨率、连续的物理数据；这些替代方案很难以经济方式规模化产出。


              相邻竞争者包括：无人机检测软件平台（HUVRdata）、油气自主检测机器人（Energy Robotics、ANYbotics）、结构资产数字孪生（Akselos），以及工业 NDT OEM
              设备制造商（Baker Hughes/Waygate Technologies）。这些玩家目前没有一家能用统一 AI 平台覆盖 Gecko 的全部六个垂直，说明市场仍然碎片化。
