  - id: FV002
    title: 估值敏感性——ARR 倍数与退出价值
    type: bar
    layout: standard
    summary: >
      在三种 ARR 情景（$80M、$125M、$200M）和三档倍数（MISTRAS 式 0.5x、混合 5x、防务科技 SaaS 12x）下的退出估值。只有高 ARR、高倍数组合才能支撑 $1.25B Series D
      入场价。低倍数和中倍数在当前 ARR 估计下给出的结果都明显低于入场价。
    data:
      items:
        - label: ARR $80M @ 0.5x（服务可比公司）
          value: 40
        - label: ARR $80M @ 5x（混合）
          value: 400
        - label: ARR $80M @ 12x（防务 SaaS）
          value: 960
        - label: ARR $125M @ 0.5x（服务可比公司）
          value: 63
        - label: ARR $125M @ 5x（混合）
          value: 625
        - label: ARR $125M @ 12x（防务 SaaS）
          value: 1500
        - label: ARR $200M @ 0.5x（服务可比公司）
          value: 100
        - label: ARR $200M @ 5x（混合）
          value: 1000
        - label: ARR $200M @ 12x（防务 SaaS）
          value: 2400
    approximationNotes: >
      ARR 估计是分析师根据已承诺合同底价和行业基准推导的预测；Gecko 未披露收入。倍数区间锚定 MISTRAS 10-K（0.5x）、Palantir/Anduril 公开文件（12-28x）和 NDT
      机器人中端市场混合先例（4-6x）。所有数值均为 USD 百万。
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV019
      - CV009
      - CV008
  - id: FV003
    title: 估值区间——乐观、基准和悲观退出价值
    type: range
    layout: standard
    summary: >
      各情景的退出估值区间以及概率加权价值。乐观情景（$2.0-2.4B）高于 $1.25B Series D 入场价。基准情景（$400-600M）按 Series D 定价会亏损。只有乐观情景能为 Series D
      投资者带来正回报。
    data:
      items:
        - label: 乐观：Cantilever SaaS 达到 $200M+ ARR
          low: 2000
          mid: 2200
          high: 2400
        - label: 基准：服务 + SaaS 混合，$80-120M 收入
          low: 400
          mid: 500
          high: 600
        - label: 悲观：服务停滞 + 诉讼 + NDAA 削减
          low: 30
          mid: 65
          high: 100
        - label: 概率加权价值（25/50/25）
          low: 700
          mid: 816
          high: 950
        - label: Series D 入场价（参考）
          low: 1250
          mid: 1250
          high: 1250
    approximationNotes: |
      所有情景区间均为分析师估计。收入和利润率假设根据可比公司基准和已承诺合同底价推断。概率权重（乐观 25%、基准 50%、悲观 25%）是定性判断，有待审计财务确认。数值单位为 USD 百万。
    claimRefs:
