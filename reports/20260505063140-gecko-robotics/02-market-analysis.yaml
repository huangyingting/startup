callouts:
  - calloutType: strength
    title: Structural tailwinds are multi-decade and sector-diverse
    body: >-
      Three independent tailwinds — aging infrastructure, Navy readiness backlog, and AI-driven electricity demand —
      operate across separate budget cycles and geographies. Even if one vertical softens (e.g., defense budget cuts),
      the others continue. The NEMA/ASE forecast of 35–50% U.S. electricity demand growth by 2040 alone creates a
      structural, decade-long inspection runway in the power sector.
    claimRefs:
      - CM025
      - CM026
      - CM027
      - CM028
  - calloutType: risk
    title: Conflicting TAM estimates make market boundary diligence essential
    body: >-
      GMI and R&M disagree on the global inspection robots market size by 2.4x ($2.8B vs $6.7B for 2024–2025). This is
      not a rounding difference — it reflects fundamentally different scope definitions. Investors who anchor to the
      higher figure without verifying that Gecko's product competes in the broader scope risk overstating the
      addressable market by more than $100M in annual opportunity for each Gecko vertical.
    claimRefs:
      - CM008
      - CM009
      - CM038
  - calloutType: assumption
    title: SAM and SOM require data room verification
    body: >-
      No analyst report directly measures Gecko's addressable market. The $2–4B SAM estimate in this chapter is
      analyst-derived by excluding non-Gecko verticals from headline figures. SOM cannot be estimated without Gecko's
      revenue, contract utilization rates, and customer count — none of which are publicly disclosed. Any DCF-based
      valuation requires these inputs from the data room.
    claimRefs:
      - CM015
      - CM016
