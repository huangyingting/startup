  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: "Gecko-specific SAM: no analyst report segments Gecko's exact verticals"
      missingEvidence: "No analyst market report isolates the critical-asset robotic inspection sub-market covering Gecko's six specific verticals. GMI and R&M headline figures include automotive, semiconductor, and food sectors that Gecko does not serve."
      whyItMatters: "Without a direct SAM estimate, TAM-to-Gecko valuation comparisons are unreliable. The $2–4B SAM in this chapter is derived, not primary, with high uncertainty."
      diligencePath: "Commission a custom market analysis or request Gecko's investor materials for management's SAM/SOM estimates. Cross-check with industry reports from IDC, Forrester, or Frost & Sullivan for sub-vertical sizing."
      relatedQuestionRefs: [RQ211]

    - type: missing-source
      severity: blocking
      topic: "Power-generation and oil & gas inspection sub-market size"
      missingEvidence: "No analyst report in available sources directly sizes the power-generation-specific or oil-and-gas-specific robotic inspection market. NAES and ADNOC deals are data points but not market-wide estimates."
      whyItMatters: "Power and O&G are Gecko's two largest commercial verticals by disclosed contract value. Without independent market sizing, the relative weighting of these verticals in the SAM is unverifiable."
      diligencePath: "Search for IEA, Wood Mackenzie, S&P Global Platts, or BloombergNEF reports on predictive maintenance spend in power generation and O&G. Check EPRI published reports for U.S. power plant inspection spend."
      relatedQuestionRefs: [RQ209, RQ210]

    - type: private-evidence-only
      severity: blocking
      topic: "Gecko SAM, SOM, and win-rate metrics"
      missingEvidence: "Gecko does not disclose revenue, customer count, contract utilization, win rate, or sales cycle length. SOM cannot be calculated. Pipeline metrics are entirely absent from public disclosures."
      whyItMatters: "SOM and win-rate are core inputs to bottom-up revenue modeling. Without them, the top-down market sizing cannot be validated against actual realized market penetration."
      diligencePath: "Data room review: request pipeline dashboard, win/loss analysis by vertical, ARR breakdown by vertical, and contract utilization rates on existing IDIQs."
      relatedQuestionRefs: [RQ211, RQ209, RQ210]

    - type: missing-source
      severity: material
      topic: "Market sizing confidence intervals not published by analysts"
      missingEvidence: "Neither GMI nor R&M publishes confidence intervals, methodology details, or primary survey data for their inspection robots market estimates. The 2.4x gap between firms cannot be adjudicated without methodology transparency."
      whyItMatters: "Investors anchoring to one analyst estimate may overstate or understate the market by 2x. The gap matters materially for valuation multiples on market-share assumptions."
      diligencePath: "Contact GMI and R&M for methodology notes or custom segmentation. Cross-check with IFR (International Federation of Robotics) service robot statistics for a volume-based alternative."
      relatedQuestionRefs: [RQ226]

    - type: missing-source
      severity: material
      topic: "Conversion rates and sales cycle data for autonomous inspection enterprise sales"
      missingEvidence: "No public data source quantifies average time-to-contract, pilot conversion rates, or enterprise sales cycle length for autonomous inspection robotics. The adoption funnel in this chapter is illustrative, not Gecko-specific."
      whyItMatters: "Sales cycle length and conversion rates directly affect near-term revenue forecasting and burn rate. A longer-than-expected sales cycle (e.g., 18+ months for defense qualification) reduces short-term revenue even with a large announced pipeline."
      diligencePath: "Request sales operations data in diligence: average days from pilot to contract, proposal win rate, CAC by vertical, and LTV/CAC ratio."
      relatedQuestionRefs: [RQ225]

    - type: missing-source
      severity: minor
      topic: "International markets beyond U.S. and UAE — sizing and pipeline unknown"
      missingEvidence: "No research file provides sizing for inspection robotics in Europe, Asia-Pacific, or Latin America specifically applicable to Gecko's verticals. ADNOC is the only confirmed international contract."
      whyItMatters: "International expansion is implied by the UAE/NextGenFDI HQ setup and Loosararian's WEF presence. If Gecko is planning significant non-U.S. revenue, the international market is a material sizing gap."
      diligencePath: "Request international pipeline breakdown and any LOIs or contracts in negotiation outside U.S. and UAE."
      relatedQuestionRefs: [RQ210]

    - type: missing-source
      severity: minor
      topic: "Regulatory mandates by sector that explicitly permit or require robotic inspection as a substitute for human inspection"
      missingEvidence: "While mandatory inspection cycles exist (OSHA, API, ASME, NRC), it is unclear which codes currently allow robotic inspection as the primary (not supplemental) compliance method. This determines whether Gecko can fully displace human inspectors or must always serve as an add-on."
      whyItMatters: "If regulations require licensed human sign-off on all inspection findings, Gecko's platform cannot capture the full inspection services budget — limiting gross margin and revenue ceiling per site."
      diligencePath: "Review API 510/570/653 codes, ASME inspection standards, OSHA PSM, and PHMSA pipeline integrity rule for automated inspection provisions. Engage regulatory counsel familiar with inspection licensing."
      relatedQuestionRefs: [RQ217]
