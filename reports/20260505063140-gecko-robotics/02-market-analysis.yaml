  researchQuestions:
    - id: RQ201
      question: "What spend categories does Gecko's market include and how should the boundary be drawn?"
      type: enumeration
      targets: ["contentRequirements/0", "plannedTables/market-definition-table"]
      status: answered
      answer: "Gecko's market includes robotic inspection hardware, AI software platforms processing inspection data, and multi-year service agreements. Excluded: manual NDT services without robotics, general-purpose industrial robots, SCADA monitoring, and pure digital-twin software without robot data collection."

    - id: RQ202
      question: "What does Gecko's market explicitly exclude, and what are the adjacent markets?"
      type: enumeration
      targets: ["contentRequirements/0", "plannedTables/market-definition-table"]
      status: answered
      answer: "Excluded: human-inspector NDT services firms (TEAM, Mistras), general industrial automation robots, SCADA/process monitoring, and software-only digital twins. Adjacent markets include industrial IoT platforms, asset-performance management software, and predictive-analytics SaaS for operations."

    - id: RQ203
      question: "What are the primary status-quo substitutes that Gecko must displace to win a customer?"
      type: enumeration
      targets: ["contentRequirements/0"]
      status: answered
      answer: "Manual rope-access inspections, third-party NDT services firms (TEAM/Mistras), interval-based scheduled maintenance, and fixed-sensor SCADA monitoring are the four primary substitutes. Each has entrenched procurement relationships, regulatory certifications, and established workflow integration."

    - id: RQ204
      question: "What is the global inspection robots TAM as of 2024–2025 per analyst sources?"
      type: quantification
      targets: ["contentRequirements/1", "plannedTables/tam-sam-som-or-sizing-lens-table", "plannedFigures/market-estimate-range"]
      status: answered
      answer: "GMI: $2.8B (2024) → $9.8B (2034) at 13.9% CAGR. R&M: $6.72B (2025) → $16.16B (2032) at 13.33% CAGR. The $2.4x gap reflects scope differences, not estimation disagreement. Both sources agree on ~13–14% CAGR."

    - id: RQ205
      question: "What is the global NDT and inspection services market, and how does it relate to the robotics sub-market?"
      type: quantification
      targets: ["contentRequirements/1", "plannedTables/tam-sam-som-or-sizing-lens-table"]
      status: answered
      answer: "R&M estimates NDT & inspection at $10.36B (2025) → $15.25B (2030) at 8.1% CAGR. This is the broader market Gecko disrupts (includes manual services); robotics is a share-gaining sub-segment of this total. The slower 8.1% CAGR vs. 13%+ robotics CAGR confirms robotics taking share."

    - id: RQ206
      question: "What is the North America and U.S. sub-market size for inspection robots?"
      type: quantification
      targets: ["contentRequirements/1", "plannedFigures/market-sizing-lens"]
      status: answered
      answer: "GMI reports North America held 30.3% of global inspection robots market in 2024. Implies ~$850M in 2024 growing toward ~$3B by 2034. Gecko's current revenue base is predominantly U.S.-focused."

    - id: RQ207
      question: "What CAGR do multiple independent analyst sources project for inspection robotics?"
      type: quantification
      targets: ["contentRequirements/1", "plannedTables/tam-sam-som-or-sizing-lens-table"]
      status: answered
      answer: "GMI projects 13.9% CAGR (2024–2034); R&M projects 13.33% CAGR (2025–2032). Both converge on ~13–14%, providing high confidence in the growth rate even though absolute size estimates differ."

    - id: RQ208
      question: "What is the scale of the U.S. Navy/defense infrastructure maintenance market that Gecko addresses?"
      type: quantification
      targets: ["contentRequirements/1", "plannedTables/tam-sam-som-or-sizing-lens-table"]
      status: answered
      answer: "GAO reports $25.9B appropriated for Navy combat surface ship maintenance in FY2020–2023, averaging ~$6.5B/year. This represents the maintenance budget for 149 non-nuclear combat surface ships — a sub-segment of total Navy infrastructure maintenance."

    - id: RQ209
      question: "What is the power-generation and grid inspection market size or annual spend?"
      type: quantification
      targets: ["contentRequirements/1"]
      status: partial
      answer: "No direct analyst market size for power-generation-specific robotic inspection exists in research files. Proxy: NAES $100M+ deal (one operator, 300+ plants); electricity demand growing 35–50% by 2040 (NEMA). Exact power-sector inspection market size is an evidence gap."

    - id: RQ210
      question: "What is the oil and gas pipeline and vessel inspection market size?"
      type: quantification
      targets: ["contentRequirements/1"]
      status: partial
      answer: "No direct O&G-specific robotic inspection market size in research files. ADNOC Gas ~$30M contract (one NOC, multi-year). O&G is part of the broader inspection robots market; share not isolated in available sources."

    - id: RQ211
      question: "What is a defensible SAM for Gecko based on available data?"
      type: quantification
      targets: ["contentRequirements/1", "plannedFigures/market-sizing-lens"]
      status: partial
      answer: "Analyst-derived SAM of $2–4B globally, by excluding automotive, semiconductor, food (~40% of R&M total) from the $6.7B inspection robots base. This is a rough estimate with high uncertainty; no analyst directly segments Gecko's verticals."

    - id: RQ212
      question: "Who are the buyers and procurement decision-makers in the defense/Navy vertical?"
      type: enumeration
      targets: ["contentRequirements/2", "plannedTables/segment-buyer-map"]
      status: answered
      answer: "NAVSEA (Naval Sea Systems Command), OPNAV (Office of Chief of Naval Operations), and defense prime contractors (BPMI, BlueForge Alliance) are institutional buyers. Budget authority rests with program managers using DoD O&M or procurement appropriations. Procurement vehicles: IDIQ contracts via GSA."

    - id: RQ213
      question: "Who are the buyers and procurement decision-makers in the power/energy vertical?"
      type: enumeration
      targets: ["contentRequirements/2", "plannedTables/segment-buyer-map"]
      status: answered
      answer: "IPPs (NAES, independent generators), utilities, and co-generation operators. NAES ($100M+ deal) operates 300+ plants. Budget owner is plant-level O&M manager for smaller deals; VP Operations and CFO for multi-year platform contracts."

    - id: RQ214
      question: "Who are the buyers and procurement decision-makers in the oil & gas vertical?"
      type: enumeration
      targets: ["contentRequirements/2", "plannedTables/segment-buyer-map"]
      status: answered
      answer: "National oil companies (ADNOC Gas), refiners, LNG terminal operators, and pipeline companies. Procurement through VP Asset Integrity or VP Operations. International deals (ADNOC) require local partner (Al Masaood Energy). Budget: operations and integrity management opex."

    - id: RQ215
      question: "What budget line owns robotic inspection spend in each vertical?"
      type: enumeration
      targets: ["contentRequirements/2"]
      status: answered
      answer: "Defense: DoD O&M + procurement appropriations (congressional-approved). Power: plant O&M budget + capital maintenance capex. O&G: asset integrity / operations opex. Industrial: capital maintenance budget. All are recurring, not one-time capital lines."

    - id: RQ216
      question: "What procurement triggers or events cause an operator to initiate an autonomous inspection purchase?"
      type: mechanism
      targets: ["contentRequirements/2", "plannedTables/segment-buyer-map"]
      status: answered
      answer: "Observed triggers: (1) Navy readiness mandates + deferred maintenance congressional pressure; (2) Grid demand surge forcing plant life extension; (3) CO₂/ESG compliance deadlines for O&G; (4) Production disruption event in industrial. All are external pressure events, not purely ROI-driven."

    - id: RQ217
      question: "What regulatory requirements mandate inspection frequency and create recurring demand?"
      type: mechanism
      targets: ["contentRequirements/3", "plannedTables/growth-drivers-and-constraints-table"]
      status: answered
      answer: "OSHA PSM (Process Safety Management) for industrial and O&G; API 510/570/653 inspection codes for vessels/pipelines/tanks; ASME codes for pressure equipment; PHMSA regulations for pipelines; NRC regulations for nuclear; NAVSEA technical manuals for Navy ships. These create non-discretionary inspection cycles across all Gecko verticals."

    - id: RQ218
      question: "How does aging U.S. infrastructure create structural demand for inspection robotics?"
      type: mechanism
      targets: ["contentRequirements/3", "plannedTables/growth-drivers-and-constraints-table"]
      status: answered
      answer: "U.S. power plants, naval vessels, pipelines, and industrial facilities built 30–60 years ago are at or past design life. Replacement is cost-prohibitive (greenfield power plants cost $1–5B+), so asset-life extension is the default strategy. This requires more frequent, higher-quality condition-based inspection — exactly Gecko's value proposition."

    - id: RQ219
      question: "How does the electricity demand surge create inspection opportunities for Gecko's power vertical?"
      type: mechanism
      targets: ["contentRequirements/3", "plannedTables/growth-drivers-and-constraints-table"]
      status: answered
      answer: "NEMA/ASE forecast 35–50% U.S. electricity demand growth by 2040 (data centers +300%, e-mobility +9,000%). DOE projects data-center electricity consumption growing from 4.4% of U.S. total (2023) to 6.7–12% by 2028. This forces operators to maximize plant utilization, reducing downtime windows and increasing inspection urgency."

    - id: RQ220
      question: "How is AI adoption across industries creating pull-through demand for robotic inspection data?"
      type: mechanism
      targets: ["contentRequirements/3"]
      status: answered
      answer: "Gecko CEO Loosararian's WEF essay articulates: AI requires ground-truth physical data; most infrastructure operates 'like the 19th century' in data terms. As AI is adopted for predictive maintenance and operations optimization, robot-generated data becomes the input layer — creating platform demand, not just inspection-service demand."

    - id: RQ221
      question: "What U.S. government programs or defense mandates create programmatic pipeline for Gecko?"
      type: enumeration
      targets: ["contentRequirements/3"]
      status: answered
      answer: "The Navy readiness mandate (Congressional focus on deferred maintenance), BPMI Naval Nuclear Propulsion Program, Air Force Sentinel ICBM modernization, and Columbia-class submarine program ($132B) are specific programs with multi-year inspection needs. Navy IDIQ GSA vehicle enables task orders beyond initial 18-ship award."

    - id: RQ222
      question: "What switching costs or incumbent lock-in limits adoption of Gecko's platform?"
      type: mechanism
      targets: ["contentRequirements/3", "plannedTables/growth-drivers-and-constraints-table"]
      status: answered
      answer: "Data format lock-in (legacy PDFs, proprietary inspection records), inspection firm relationships (certified inspectors with regulatory standing), integration cost with CMMS/ERP systems, and safety certification processes (ASNT Level II/III) all create switching costs. Incumbent services firms (TEAM, Mistras) are deeply embedded in workflows."

    - id: RQ223
      question: "What capital intensity or deployment barriers slow robotics adoption?"
      type: mechanism
      targets: ["contentRequirements/3", "plannedTables/growth-drivers-and-constraints-table"]
      status: answered
      answer: "Deployment requires asset access (often only during scheduled outages), calibration, safety review, and qualification — particularly for nuclear and defense environments where initial qualification can take 12–24 months. High upfront engagement cost limits SME/smaller-operator addressability."

    - id: RQ224
      question: "How does trust/liability risk affect autonomous inspection adoption in safety-critical environments?"
      type: mechanism
      targets: ["contentRequirements/3", "plannedTables/growth-drivers-and-constraints-table"]
      status: answered
      answer: "Nuclear and defense operators require parallel human inspection validation of AI findings before regulatory sign-off. This extends sales cycles and reduces near-term revenue quality (inspection service fees vs. software subscription). Trust accumulates over time through track record, limiting early monetization of the platform layer."

    - id: RQ225
      question: "Are there adverse signals — stalled deployments, failed pilots, regulatory rejections, or negative customer outcomes — in autonomous inspection?"
      type: adverse
      adverseFlag: true
      targets: ["contentRequirements/4"]
      status: partial
      answer: "No specific Gecko-adverse incidents identified in research files. General market: industrial AI and robotics deployments face 'pilot purgatory' — pilots that do not convert to enterprise contracts due to ROI uncertainty or integration challenges. No failed Gecko deployment or customer complaint publicly documented as of May 2026."

    - id: RQ226
      question: "How do conflicting analyst market estimates constrain investor confidence in any single TAM figure?"
      type: comparison
      targets: ["contentRequirements/4", "plannedTables/tam-sam-som-or-sizing-lens-table"]
      status: answered
      answer: "GMI ($2.8B, 2024) and R&M ($6.72B, 2025) differ by 2.4x for inspection robots. Neither publishes detailed methodology. The gap exceeds normal statistical variance — it reflects scope boundary disagreement (whether general factory automation robots are included). Investors must define their own market boundary before applying CAGR to arrive at TAM."

    - id: RQ227
      question: "Who are Gecko's closest direct competitors and what is their funding and product overlap?"
      type: enumeration
      targets: ["contentRequirements/0", "plannedTables/market-definition-table"]
      status: answered
      answer: "Direct competitors: HUVRdata (inspection data platform, U.S.), Energy Robotics (industrial robot inspection, Germany), Akselos (digital twin + structural simulation), Voliro (aerial NDT drones), Invert Robotics (surface-crawling robots). Broader: Baker Hughes/Waygate Technologies (industrial NDT OEM), TEAM Inc and Mistras (incumbent services). VentureRadar also lists Planys (underwater ROVs) and ANYbotics as similar companies. None span all six Gecko verticals with a unified AI platform."

