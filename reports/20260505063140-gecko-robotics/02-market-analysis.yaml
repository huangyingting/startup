  - id: adoption-constraints
    title: Adoption Constraints and Sizing Gaps
    body: >
      Adoption of autonomous inspection robotics faces several structural constraints. Capital intensity and deployment
      friction are primary: deploying Gecko robots on a ship hull, boiler, or pipeline segment requires asset access
      windows (often during scheduled outages), calibration protocols, and safety review processes. For safety-critical
      environments (nuclear propulsion, missile silos), qualification timelines can span 12–24 months before operational
      deployment begins. This high friction limits Gecko's ability to scale rapidly across the installed base.


      Trust and liability risk is a second material constraint. In safety-critical assets, operators may accept
      AI-assisted inspection findings as supplemental but are reluctant to use them as the primary basis for regulatory
      sign-off without parallel human inspection. This "trust gap" extends sales cycles and limits early revenue
      recognition on platform contracts. The BPMI partnership's 90% inspection-time-reduction claim required extensive
      controlled testing before deployment, which suggests even Gecko's best customers require validation periods.


      Data interoperability and switching-cost lock-in represent a third constraint: most operators have decades of
      inspection records in proprietary or paper formats incompatible with Gecko's Cantilever platform, raising
      integration costs. Incumbent inspection firms (TEAM Inc, Mistras) are entrenched in customer workflows and offer
      competitive robotics and drone services. The competitor field is also growing: HUVRdata, Energy Robotics, Akselos,
      Voliro, and Invert Robotics all compete for wallet share in overlapping verticals.


      Two material sizing gaps remain: (1) Gecko's SAM cannot be precisely computed from available public sources; the
      analyst estimates reflect different scope definitions and are not broken out by Gecko's exact verticals; (2) no
      reliable SOM estimate can be derived without Gecko's revenue, customer count, and contract utilization data, which
      are not publicly disclosed.
    claimRefs:
      - CM032
      - CM033
      - CM034
      - CM035
      - CM036
      - CM037
      - CM038
