  - id: growth-drivers
    title: Growth Drivers
    body: >
      Six structural drivers create multi-year demand for Gecko's platform. First, aging U.S. critical infrastructure:
      power plants, pipelines, naval vessels, and industrial facilities built 30–60 years ago are reaching
      end-of-design-life, requiring intensified inspection and condition-based maintenance rather than calendar cycles.
      Second, U.S. electricity demand growth: NEMA and the Alliance to Save Energy forecast a 35–50% surge in U.S.
      electricity demand between 2024 and 2040, driven primarily by AI data-center expansion (data center demand alone
      +300% by 2050 per NEMA) and e-mobility. This growth creates systemic pressure on existing power plants to maximize
      uptime and extend asset life. DOE corroborates this, reporting data-center electricity consumption at 4.4% of U.S.
      total in 2023 and projecting it to 6.7–12% by 2028.


      Third, defense readiness pressure: the U.S. Navy appropriated $25.9 billion for combat surface ship maintenance in
      FY2020–2023 while still reporting persistent deferred maintenance, limited spare parts, and unimplemented GAO
      recommendations. Congressional scrutiny is intensifying. Fourth, AI adoption as inspection enabler: the WEF essay
      by Gecko CEO Loosararian articulates a thesis now widely shared — that AI systems need high-fidelity physical data
      from robots to deliver on their value promise, creating demand for robotics as the AI data-collection layer.
      Fifth, regulatory compliance cycles: OSHA, API, ASME, PHMSA, and nuclear safety codes mandate recurring inspection
      intervals that create predictable, multi-year inspection budgets across all Gecko verticals. Sixth, international
      energy infrastructure build-out: Gulf NOCs (ADNOC) are investing in predictive maintenance to reduce CO₂ emissions
      and meet ESG commitments, opening international procurement channels.
    claimRefs:
