chapter:
  number: 2
  title: Market Analysis
  summary: >
    Gecko Robotics competes at the intersection of inspection robotics and AI-driven asset intelligence across six
    critical-infrastructure verticals. The global inspection robotics market is valued at $2.8–6.7B in 2024–2025
    (analyst estimates vary by scope), growing at ~13% CAGR through 2034. The broader NDT and inspection services market
    is $10.4B (2025) growing at 8% CAGR. Gecko's addressable sub-market — critical-asset heavy-industry inspection in
    defense, power, and oil & gas — is estimated at $2–4B, constrained by the company's current product scope and
    geographic footprint. Three structural tailwinds dominate: aging U.S. critical infrastructure, a sustained surge in
    electricity demand from AI data centers, and intensified U.S. defense readiness requirements. Key adoption
    constraints include capital-intensive deployment, data-format switching costs, and trust barriers in safety-critical
    environments.
sections:
  - id: market-boundary
    title: Market Boundary and Status-Quo Substitutes
    body: >
      Gecko Robotics competes within the physical inspection and asset-integrity management market — specifically the
      segment where autonomous or semi-autonomous robotic data collection replaces or augments manual inspection by
      human technicians. The market boundary includes: robotic inspection hardware (wall-climbing robots, drones, fixed
      sensors), the AI software platforms that process inspection data, and multi-year services agreements that bundle
      both.


      Excluded from Gecko's immediate market: traditional NDT services provided by human inspectors without robotic
      assistance (e.g., TEAM Inc, Mistras Group), general-purpose industrial robots not purpose-built for inspection,
      SCADA and process-sensor monitoring systems, and pure digital-twin software with no robot data collection
      component.


      The status-quo substitutes that Gecko displaces are: (1) manual rope-access or scaffolding inspections by
      certified NDT technicians; (2) third-party inspection services firms such as TEAM Inc and Mistras Group, which
      deploy human technicians with portable NDT instruments; (3) interval-based scheduled maintenance (calendar or
      run-hour triggers) rather than condition-based; and (4) fixed-sensor SCADA monitoring, which captures operational
      data but not physical asset-integrity data. Gecko's differentiation lies in capturing high-resolution, continuous
      physical data that these substitutes cannot produce economically at scale.


      Competitor adjacencies include: drone inspection software platforms (HUVRdata), autonomous inspection robots for
      oil & gas (Energy Robotics, ANYbotics), digital twins for structural assets (Akselos), and industrial NDT OEM
      equipment makers (Baker Hughes/Waygate Technologies). None of these players today span all six of Gecko's
      verticals with a unified AI platform, suggesting the market remains fragmented.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
    tableRefs:
      - TM001
  - id: market-sizing
    title: Market Sizing — TAM, SAM, and Sizing Lenses
    body: >
      Two analyst firms provide the primary market size estimates for inspection robotics. Global Market Insights (GMI)
      pegs the global inspection robots market at $2.8 billion in 2024, growing to $9.8 billion by 2034 at a 13.9% CAGR.
      Research and Markets (R&M) estimates the same market at $6.72 billion in 2025, reaching $16.16 billion by 2032 at
      a 13.33% CAGR. The gap between these figures ($2.8B vs $6.7B) reflects materially different scope definitions:
      R&M's boundary appears to include broader industrial automation robotics alongside pure inspection-focused robots.


      The broader NDT and inspection services market — including services, manual and robotic — is estimated by R&M at
      $10.36 billion in 2025, growing to $15.25 billion by 2030 at an 8.1% CAGR. This figure is more relevant to Gecko's
      competitive footprint against incumbent services firms like TEAM and Mistras.


      North America held 30.3% of the global inspection robots market in 2024 per GMI, implying a U.S. and Canadian
      sub-market of approximately $850M in 2024, growing toward $3B by 2034. Gecko's near-term revenue pipeline is
      predominantly U.S.-based (Navy, NAES, Air Force), positioning it within this sub-market.


      Gecko's SAM is best constrained by vertical and product scope: defense maintenance inspection, power-generation
      asset inspection, oil & gas pipeline and vessel inspection, and heavy industrial (steel/mining/pulp) in North
      America and select international markets (UAE). An analyst-derived estimate of $2–4B globally represents the
      critical-asset robot-enabled inspection sub-market where Gecko's product is differentiated. This remains an
      estimate lacking direct public-source corroboration.
