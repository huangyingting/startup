  - id: buyer-segmentation
    title: Buyer Segmentation and Adoption Path
    body: >
      Gecko's buyer universe spans four primary segments, each with distinct procurement structures and adoption
      triggers. Defense and Navy buyers operate through government contracting vehicles (IDIQ, firm-fixed-price,
      cost-plus), funded by DoD operations and maintenance (O&M) or procurement appropriations. The March 2026 Navy IDIQ
      ($71M ceiling) and BPMI partnership confirm institutional DoD procurement as Gecko's defense go-to-market path.
      Budget authority rests with NAVSEA, OPNAV, and defense prime contractors (BPMI, BlueForge Alliance). Adoption
      triggers are readiness mandates, congressional pressure on maintenance backlogs, and shipbuilding production
      timelines.


      Power and energy buyers are independent power producers (IPPs) and plant operators such as NAES, which manages 65
      gigawatts across 300+ facilities. The budget owner is the plant-level operations and maintenance (O&M) manager,
      with capital decisions escalated to CFO/COO for multi-year platform contracts. The NAES $100M+ deal (Feb 2025)
      establishes a reference partnership validating the IPP procurement path. Adoption is triggered by grid reliability
      mandates, aging fleet economics (extending asset life vs. greenfield), and rising data-center electricity demand
      that increases plant utilization.


      Oil and gas buyers include national oil companies (ADNOC Gas, ~$30M contract Apr 2024), refiners, LNG terminal
      operators, and pipeline operators. Procurement authority is typically held by integrity management or asset
      operations teams, with sign-off from VP-level operations. International buyers add complexity through local
      partner requirements (Al Masaood Energy for ADNOC). Adoption triggers are environmental compliance, CO₂ reduction
      mandates, and predictive-maintenance cost reduction targets.


      Industrial buyers (steel mills, mining operations, pulp and paper plants) are smaller per-contract but
      collectively represent a large fleet of aging assets. These tend to be price-sensitive, with procurement driven by
      capital maintenance budgets and driven by production disruption risk rather than regulatory compliance. Adoption
      lag is typically higher in this segment relative to defense.
