  - id: funding-capital
    title: Funding History, Valuation, and Capital Structure
    body: >
      Gecko Robotics has completed at least four disclosed funding events. Y Combinator provided the initial seed
      investment around 2015. By June 2022, the company had raised $122.3M in total, including a $73.3M Series C
      announced in March 2022 and led by XN and Mark Cuban; the pre-Series C cumulative raise implied by this figure is
      approximately $49M. The Series C round valued the company at "approaching $1 billion." In December 2023 Gecko
      closed a $100M extension to the Series C (bringing Series C total to $173M), adding USIT (Thomas Tull's
      defense-focused vehicle) and Founders Fund as board-level investors.


      The Series D closed June 2025 at $125M, led by new investor Cox Enterprises, with continuing participation from
      USIT, XN, Founders Fund, and YCombinator. The round set a post-money valuation of $1.25 billion — formally unicorn
      status — described as doubling the prior round valuation. Total disclosed funding through Series D is
      approximately $298–302M (depending on precise early-round sizing). No public debt facility, secondary transaction,
      or credit line has been disclosed.


      Capital allocation context: Gecko's large government contract pipeline (Navy IDIQ $71M, Air Force Sentinel, NAES
      $100M+, ADNOC ~$30M) may partially offset ongoing capital burn, but the company's R&D intensity (hardware +
      software dual investment), international expansion, and headcount growth trajectory suggest continued funding need
      before profitability. Exact burn rate and runway are unknown.
