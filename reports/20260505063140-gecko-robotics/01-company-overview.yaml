  - id: scale-operations
    title: Scale, Customers, and Operational Reach
    body: >
      Gecko's homepage states "10+ Years Experience. Thousands of Assets Analyzed." — the only publicly disclosed scale
      metric. Customer-count and revenue figures are not disclosed. Named customer relationships include: the U.S. Navy
      (surface ships, Columbia-class submarines, Virginia-class submarines), U.S. Air Force (Sentinel/ICBM silo
      program), NAES (America's largest independent power operator, 65GW under management), ADNOC Gas (subsidiary of Abu
      Dhabi National Oil Company), Trident Maritime Systems (20 facilities, U.S. naval supply chain), BPMI (defense
      prime contractor for Naval Nuclear Propulsion Program), and American Bituminous Power (a power plant customer
      providing a published testimonial).


      Geographically, Gecko operates primarily in the United States (Pittsburgh HQ, defense facilities, power plants,
      industrial sites) with an active international presence in the UAE via NextGenFDI and an expanded ADNOC
      partnership announced November 2025. The January 2026 CNN AI funding in the Gulf article further confirms a
      Gulf-region expansion focus.


      Headcount is undisclosed. Roles visible on the careers page include Forward Deployed Engineers (FDEs), robot field
      operators, and the General Counsel, indicating a hardware-software-legal triangulated team structure. The company
      has hired alumni from Palantir (big-data engineering). Industry coverage spans six verticals: Defense, Oil & Gas,
      Power, Pulp & Paper, Steel, and Mining.
