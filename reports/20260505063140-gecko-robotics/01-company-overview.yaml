  - id: founders-leadership
    title: Founders, Leadership, and Governance
    body: >
      Jake Loosararian (CEO, co-founder) conceived Gecko while studying electrical engineering at Grove City College
      after recognizing that power plant boiler inspections were both dangerous and costly. He bootstrapped the company
      in 2013, accepted a Y Combinator offer in ~2015 (declining an acquisition at the time), and has led the company
      through four funding rounds to unicorn status. His background spans robotics hardware, big-data engineering (early
      Palantir alumni hiring), and defense contracts. Loosararian is a World Economic Forum speaker and has testified
      publicly on defense modernization. Key-person risk is material: he is the primary public face, chief deal-signer,
      and cited spokesperson across all major contract announcements.


      Troy Demmer (CPO, co-founder) joined from the outset, contributing product strategy and sharing founder equity.
      His background adds Carnegie Mellon MBA-level business rigor. Amy Kurren serves as General Counsel, providing
      in-house legal oversight relevant to Gecko's active federal contracting and trade-secret litigation history.


      Board governance was materially strengthened in December 2023 when USIT Managing Director Gaetano Crupi
      (co-founder, former CEO of Cabin Technologies) and Trae Stephens (Founders Fund partner; co-founder and executive
      chairman of Anduril Industries) joined the corporate board. Stephens' Anduril background signals deep defense-tech
      connectivity but also creates a potential perception overlap with an adjacent defense robotics firm. Earlier
      investors YC, Drive Capital, Next 47, XYZ Venture Capital, and Soma Capital hold economic stakes but no public
      board seats as of this report.


      Leadership change risk: No material senior leadership departures have been publicly disclosed. The 2023
      trade-secret lawsuit against Summit NDE (involving two former Gecko employees who joined a competitor) suggests
      the company has experienced some engineering-level attrition, though the suit outcome and scale of departures were
      not publicly confirmed.
