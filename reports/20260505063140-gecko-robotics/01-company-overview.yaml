  - calloutType: strength
    title: Defense-grade customer validation at scale
    body: >-
      Gecko has active multi-year contracts with the U.S. Navy (surface fleet, Columbia and Virginia-class subs), U.S.
      Air Force (Sentinel), and defense prime BPMI — covering the most demanding customers for durability, security, and
      reliability. The $71M Navy IDIQ (March 2026) is a government-wide vehicle, broadening access beyond the Navy.
    claimRefs:
      - CO020
      - CO021
      - CO022
      - CO024
      - CO029
      - CO040
  - calloutType: risk
    title: Key-person concentration in CEO
    body: >-
      Jake Loosararian is the sole named spokesperson across all major contracts, investor communications, and strategic
      media. No succession plan, named COO, or public CTO is visible. Key-person dependency is material given the
      company's government contracting relationships, which often rely on personal relationships.
    claimRefs:
      - CO003
      - CO030
  - calloutType: assumption
    title: Revenue and financial metrics unavailable
    body: >-
      As a private company, Gecko does not publish revenue, ARR, gross margin, or NRR. The report uses contract ceiling
      values as traction proxies. Actual recognized revenue may differ materially. Investors should require a data room
      review to validate financial metrics.
    claimRefs: []
  - calloutType: risk
    title: Trade-secret litigation signals competitive IP risk
    body: >-
      The 2023 lawsuit against Summit NDE (two former employees) confirms that competitors have attempted to replicate
      Gecko's inspection technology. IP moat durability depends on patent coverage, trade-secret enforcement, and
      software stickiness — not yet independently verified.
    claimRefs:
      - CO030
