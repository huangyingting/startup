company:
  name: Gecko Robotics
chapter:
  number: 3
  title: Competitors
  summary: |
    Gecko Robotics competes across a fragmented but converging industrial inspection market that spans
    direct robotic-inspection startups, incumbent NDT service providers, software-only asset-integrity
    platforms, adjacent drone and mobile-robot vendors, and the entrenched status quo of manual
    inspection. Direct peers such as ANYbotics, Flyability, Invert Robotics, and Square Robot each own
    a narrow modality or workflow, while incumbents such as TEAM Inc. and Baker Hughes / Waygate bring
    installed bases, service networks, and procurement leverage. Software overlays such as HUVR Data and
    Akselos attack the workflow layer without owning data collection. Gecko's differentiation is its
    full-stack AIR model: proprietary robots and sensors feeding Cantilever, an AI operating platform now
    reinforced by defense programs, large energy contracts, and multi-year asset datasets. That moat is
    meaningful but not invulnerable. Hardware commoditization, incumbent acquisition activity, walking-
    robot distribution partnerships, and lower-cost foreign robotics entrants can narrow the advantage if
    Gecko fails to keep converting field data, workflow integration, and trust posture into durable
    switching costs.
sections:
  - id: landscape-overview
    title: Competitive Landscape Overview
    body: |
      Gecko's competitive set is broader than a simple list of robot vendors. The direct robotic-
      inspection cohort includes ANYbotics' quadruped platform, Boston Dynamics' payload-flexible Spot,
      Flyability's confined-space Elios 3 drone, Invert Robotics' vacuum-adhered crawlers, and Square
      Robot's autonomous tank-inspection system. Those players overlap with Gecko on parts of the workflow
      but rarely match its combined robot-plus-software posture. A second cohort consists of incumbents
      such as Baker Hughes / Waygate and TEAM Inc., which already sell NDT services, assessment, and
      maintenance at global scale and can add software or partner hardware into existing accounts. A third
      cohort covers adjacent software and digital-twin vendors, including HUVR Data and Akselos, that sit
      above data capture and compete for the operating-system layer Gecko wants Cantilever to own. The
      substitute set remains powerful: manual NDT, rope access, scaffolding, confined-space entry, and
      human inspectors writing down measurements by hand. VentureRadar's similar-company list also suggests
      likely entrants continue to come from adjacent robotics, drone, and inspection-software markets,
      which means Gecko is competing not only against today's robotic peers but also against tomorrow's
      full-stack combinations assembled through partnerships, acquisitions, and bundling.
    claimRefs:
      - C081
      - C082
      - C084
      - C086
      - C088
