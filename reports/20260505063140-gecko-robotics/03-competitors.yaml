callouts:
  - calloutType: strength
    title: Full-Stack Integration Creates Durable Moat
    body: |
      Gecko's combination of proprietary robots, sensors, AI software, and multi-year government and
      industrial contracts creates a defensible position that hardware-only competitors such as ANYbotics,
      Flyability, and Square Robot or software-only players such as HUVR Data and Akselos cannot easily
      replicate. The moat is strongest where Cantilever becomes the operating record for an asset over
      time, not just the analytics layer for a single inspection.
    claimRefs:
      - CP016
      - CP017
      - CP019
  - calloutType: risk
    title: Incumbent Scale Could Fund Acquisition or Internal Build
    body: |
      Large incumbents already control customer relationships, field-service footprints, and procurement
      trust. TEAM Inc.'s global service network and Baker Hughes / Waygate's advanced-NDT portfolio mean
      they could assemble a more complete robotics-plus-software stack through acquisition or partnership,
      even if they currently lack Gecko's data flywheel and defense-specific operating depth.
    claimRefs:
      - CP012
      - CP013
      - CP019
