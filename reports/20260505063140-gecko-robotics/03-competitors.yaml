  - id: T304
    title: Moat Durability / Competitive Risk Register
    columns:
      - Moat Claim
      - Threat Vector
      - Severity
      - Mitigation
      - Diligence Ask
    rows:
      - - Data flywheel / AI advantage
        - Hardware commoditization or software-only overlays reduce the value of proprietary collection
        - High
        - Keep compounding first-order data, asset baselines, and model performance across fleets and industries
        - How much of Cantilever accuracy depends on proprietary data not portable to another vendor?
      - - Defense security clearance moat
        - Large primes or adjacent robotics companies enter defense maintenance with stronger procurement relationships
        - Medium
        - Leverage Navy and Air Force contract history, broaden vehicle access, and deepen classified-work posture
        - What specific clearances, approvals, and renewal dependencies underpin defense stickiness?
      - - Proprietary robot hardware
        - Lower-cost robotic hardware, including foreign supply-chain entrants, narrows hardware differentiation
        - Medium
        - Shift differentiation upward into sensing workflow, data quality, and software integration
        - What percentage of competitive advantage comes from hardware versus software and deployment know-how?
      - - Full-stack platform lock-in
        - Customers multi-home robots and software, or pair Gecko hardware with a third-party analytics layer
        - Medium
        - Expand Cantilever's maintenance-planning and baseline-history role so replacement costs rise over time
        - How often do customers run parallel vendors or carve out single-asset workflows for specialists?
      - - Trade secret and IP portfolio
        - Employee poaching, reverse engineering, or litigation attrition weakens proprietary methods
        - Medium
        - Retain key talent, harden IP controls, and convert know-how into patents and reproducible workflow assets
        - What was the outcome and operational impact of the Summit NDE trade-secret case?
      - - Chinese robotics threat
        - Lower-cost robotics and supply-chain influence pressure both commercial pricing and defense sourcing
        - High
        - Lean into trusted-supplier positioning, domestic-defense relevance, and procurement trust advantages
        - Which commercial markets are most exposed to lower-cost foreign robotic alternatives over 3-5 years?
