        - Defense, power, oil & gas, steel, advanced manufacturing, pulp & paper
        - >-
          Full-stack AIR model combining proprietary robots, sensors, Cantilever software, and defense-grade deployment
          depth
        - Premium enterprise motion; pricing not public and moat still depends on continued data/software lead
      - - ANYbotics
        - Direct robotic peer
        - >-
          Funding and valuation undisclosed in retained sources; enterprise-scale commercialization signals include ISO
          27001 and CRO hire
        - Autonomous industrial inspection across oil & gas, chemicals, power, mining, metals, rail
        - Autonomous quadruped mobility plus growing enterprise distribution through Yokogawa
        - No public evidence in retained sources of Gecko-like PAUT workflow depth or defense contract base
      - - Boston Dynamics Spot
        - Adjacent robotic peer
        - null
        - Energy, natural resources, manufacturing, construction, government inspection
        - Modular payload architecture for visual, thermal, acoustic, perimeter, and digital-twin workflows
        - Not marketed for Gecko's core high-precision wall-thickness PAUT workflow
      - - Waygate Technologies
        - Incumbent NDT technology
        - Baker Hughes subsidiary
        - Industrial infrastructure, plant inspection, advanced NDT buyers
        - Established ultrasonic, X-ray, and CT inspection portfolio with incumbent trust
        - Less evidence of a unified robot-plus-AI operating platform comparable to Cantilever
      - - TEAM Inc.
        - Incumbent services + software
        - Public company scale with ~5,400 employees, 220+ locations, 20+ countries
        - Industrial inspection, assessment, specialty maintenance, asset reliability
        - Massive field footprint and ability to bundle services with OneInsight software
        - Robotic differentiation and proprietary data flywheel are less clearly positioned than Gecko's
      - - Flyability
        - Direct modality competitor
        - Equipment-led model; sells through operators and distributors in 27 countries
        - Confined-space inspection in oil & gas, maritime, power, chemicals, mining, sewers, nuclear
        - Collision-tolerant Elios 3 drone with strong confined-space coverage
        - Hardware-led model without inspection-services platform ownership or Gecko-like software stack
      - - Invert Robotics
        - Direct crawler competitor
        - 3,000+ inspections across 24+ countries
        - Food, chemicals, pharma, aerospace, energy
        - Patented vacuum adhesion and service/rental mix across magnetic and non-magnetic surfaces
        - Narrower platform scope and weaker AI operating-system positioning than Gecko
      - - Square Robot
        - Direct niche competitor
        - Series B closed Dec 2024; 8 patents; international partner network
        - Autonomous internal API 653 tank inspection
        - Specialized autonomous tank-inspection service with regulatory focus
        - Narrower use case and less multi-vertical breadth than Gecko
      - - HUVR Data
        - Adjacent software competitor
        - Acquired by Technical Toolboxes
        - Reliability automation and inspection data management
        - Software-only reliability automation layer competing for workflow ownership
        - No proprietary robot fleet or first-order inspection data capture
      - - Akselos
        - Adjacent digital-twin competitor
        - null
        - Offshore oil & gas, refining, LNG, wind power
        - Structural performance management with real-time digital twin simulation
        - Competes above the data layer and lacks Gecko's robotic collection hardware
      - - Status quo (manual inspection)
        - Substitute / incumbent process
        - null
        - All heavy-industry asset owners using manual NDT
        - >-
          Universally available, familiar workflows using rope access, scaffolding, confined-space entry, and manual
          measurement
        - Slow, hazardous, data-poor, and poorly suited to predictive analytics at scale
    notes: |
      Coverage is partial. The retained evidence is strongest for robotic peers, TEAM Inc., Waygate,
      software overlays, and the manual status quo; defense incumbents, other legacy NDT firms, and
