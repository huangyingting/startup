  - id: direct-competitor-profiles
    title: Direct and Adjacent Competitor Profiles
    body: |
      The most relevant startup and adjacent competitors each attack a different slice of Gecko's value
      chain. ANYbotics offers the ANYmal quadruped for autonomous inspection in oil and gas, chemicals,
      power, mining, and rail; its ISO 27001 certification and Yokogawa partnership indicate growing
      enterprise readiness and better distribution, even though public funding and revenue remain
      undisclosed in the retained source set. Flyability focuses on confined-space drone inspection and,
      crucially, sells hardware through operators and distributors rather than providing the inspection
      service itself, which limits direct platform lock-in. Invert Robotics is stronger where vacuum
      adhesion and service delivery matter, with 3,000-plus inspections in 24-plus countries and support
      for smooth magnetic and non-magnetic surfaces. Square Robot is specialized around internal API 653
      tank inspection and has raised a December 2024 Series B while building patent and channel depth.
      HUVR Data and Akselos are the key adjacent-software comparators: HUVR in reliability automation and
      inspection workflow, Akselos in structural performance management and digital twins. Together they
      show that no single rival replicates Gecko's exact stack, but several competitors can flank it on
      hardware modality, software layer, or enterprise channel.
