  - id: switching-costs-risks
    title: Switching Costs, Lock-in, and Competitive Risks
    body: |
      Switching costs in this market are real but uneven. The strongest lock-in comes when Gecko is not
      just supplying a robot, but also establishing the asset baseline inside Cantilever, integrating
      inspection history into maintenance planning, and embedding itself in regulated or defense workflows.
      Historical asset records, predictive models, and multi-year contract mechanisms make replacement
      harder than swapping a single hardware vendor. Even so, multi-homing remains plausible because many
      buyers can pair one robot fleet with another software layer or run different modalities side by side:
      quadrupeds for patrol, drones for confined spaces, crawlers for tanks, and manual crews for edge
      cases. The adverse side of the market is also rising. Hardware will get cheaper, software-only
      players are consolidating, and distribution partnerships such as ANYbotics with Yokogawa suggest
      enterprise robot channels are maturing. Chinese robotics competition is a specific strategic risk in
      dual-use and infrastructure contexts, highlighted by Gecko leadership's public testimony on supply-
      chain and national-security exposure. Finally, the status quo is still entrenched: manual inspection
      may be less elegant, but it remains widely understood, broadly available, and often the default when
      customers are hesitant to commit to a new platform standard.
