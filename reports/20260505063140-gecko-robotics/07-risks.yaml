- id: S7-FINANCIAL-MODEL
  title: Financial and Business-Model Risk
  body: 'Gecko is a private company and has not disclosed revenue, ARR, gross margin, operating loss, or cash burn. The company has raised $347M in total funding, most recently $125M in Series D (June 2025). The combination of hardware manufacturing, field deployment with specialized robotics teams (Forward Deployed Engineers), and software platform development requires significant and ongoing capital expenditure. Without revenue and margin data, it is impossible to assess whether Gecko is cash-flow positive, what its runway looks like post-Series D, or how capital-intensive the NAES and Navy scale-up will be.


    The business model appears to combine field-services revenue (robot deployment, inspection, data capture) with Cantilever SaaS or licensing fees. Mixed-model businesses carry gross-margin complexity: services margins are typically 20–40% while SaaS margins can exceed 70%. The absence of a disclosed split makes quality-of-earnings assessment impossible. Contract mechanisms also vary—the NAES deal financial structure is not disclosed, the Navy IDIQ uses task orders with a ceiling, and the ADNOC contract has a $30M ceiling. Revenue recognition timing, milestone-based vs. usage-based billing, and government cost-accounting requirements may create lumpy or deferred revenue recognition.


    Capital intensity risk is amplified by the planned expansion to 65 GW of NAES-operated assets. Deploying robotics hardware and engineering teams across hundreds of power generation facilities nationally requires significant upfront investment. The CEO''s stated intent to "kill the way plants are run today" suggests a transformational scope that may require partner co-investment or external project financing that has not been publicly structured. In the event of a growth slowdown, Gecko may face margin pressure from fixed hardware costs and field-team overhead.

    '
  claimRefs:
  - C252
  - C253
  - C255
  - C241
  - C249
  - C270
- id: S7-PEOPLE-EXEC
  title: People, Execution, and Competitive Risk
  body: 'Jake Loosararian is the company''s most visible public advocate, appearing on Bloomberg, CNBC, Fortune, and at ADIPEC, and is quoted in every major contract announcement. This creates a classic key-person risk: if Loosararian were to leave, lose health, or become embroiled in a reputational issue, the company''s government relationships, investor confidence, and customer confidence could all be materially affected. Beyond Loosararian, the publicly named executive team is limited to General Counsel Amy Kurren and field operator Mitchell Felix (per careers page); no CFO, CRO, or CTO is publicly confirmed by name.


    The company faces dual talent-market competition: robotics hardware engineers and software-AI engineers represent distinct labor pools, both of which are in high demand from defense primes, autonomous vehicle companies, and hyperscalers. The trade-secret case against Summit NDE (2023) illustrates that key Gecko employees have been actively recruited by competitors. Field safety risks for robot operators working in industrial environments (high-temperature boilers, confined spaces, corrosive ship hulls) also create an OSHA compliance and workers'' compensation exposure that has not been quantified.


    Competitive risk from established NDT players is material. Waygate Technologies (Baker Hughes subsidiary), Eddyfi Technologies, MISTRAS Group (NYSE: MG), and Flyability serve overlapping segments with existing customer relationships and safety certifications. MISTRAS generates over $700M in annual inspection revenue and has long-standing utility, petrochemical, and government contracts. These incumbents can leverage existing certifications (API, ASNT, NAS 410) and price competitively to defend market share. Gecko''s competitive advantage—AI-powered Cantilever platform and proprietary data history—depends on continued investment and could erode if incumbents develop comparable software stacks.

    '
