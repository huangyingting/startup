company:
  name: Gecko Robotics
chapter:
  number: 7
  title: Risks
  summary: 'Gecko Robotics carries a high risk profile driven by four principal vectors: (1) regulatory and legal exposure from ITAR/export-control obligations, FAR/DFARS compliance requirements on defense contracts, and an ongoing 2023 trade-secret lawsuit; (2) operational and technical risk from hardware reliability in harsh field environments, data-security obligations for classified defense data, and the dual-use challenge of serving both foreign state-owned energy companies and US military customers simultaneously; (3) customer and partner concentration—US DoD programs represent the majority of named contract value, with IDIQ ceilings that do not guarantee revenue floors; and (4) financial and people risk from undisclosed burn rate, capital-intensive hardware operations, and high key-person dependence on CEO Jake Loosararian. Mitigations exist in Gecko''s trust center, board additions from USIT and Founders Fund with deep defense networks, and a diversified contract base spanning Navy,
    Air Force, NAES, ADNOC, BPMI, and Trident. However, multiple kill criteria remain unresolvable without private disclosure, warranting investor-level diligence before commitment.

    '
sections:
- id: S7-REG-LEGAL
  title: Regulatory and Legal Risk
  body: 'Gecko''s defense business subjects it to a dense web of US government contracting regulations. The Air Force contract (FA9422-22-C-0015) and the Navy IDIQ (March 2026) operate under FAR/DFARS, which impose cost-accounting standards, audit rights (DCAA), and performance reporting obligations. Gecko''s work on nuclear submarine components with BPMI—a Naval Nuclear Propulsion Program prime—adds compliance layers for Q-list and controlled nuclear information. The Sentinel ICBM silo assessment contract at Air Force creates explicit ITAR obligations for personnel, data, and any technology transferred internationally.


    The company''s simultaneous service to ADNOC Gas in the UAE under a $30M ceiling contract raises ITAR dual-use risk: robotics platforms and AI inspection software used on US military assets may share technology with those deployed in Abu Dhabi. The UAE''s NextGenFDI registration does not exempt Gecko from US export administration regulations (EAR) or the International Traffic in Arms Regulations if defense-related capabilities, source code, or controlled data are involved. No public record confirms an export-control compliance program or ITAR registration, though company counsel (Amy Kurren, General Counsel per careers page) is named.


    A material legal risk is the 2023 trade-secret lawsuit: Gecko Robotics, Inc. v. Summit NDE, LLC (No. 2:23CV229-PPS/JEM, N.D. Indiana). Gecko alleged that two former employees who joined Summit NDE misappropriated proprietary inspection technology. While the case was filed in July 2023, no public record of a final judgment or settlement is available through the research anchor date (2026-05-05). The case underscores IP-portability risk in a talent-dependent technology firm. Secondary legal exposure includes potential FCPA liability from UAE partner relationships and OFAC/sanctions compliance for any expansion to other Gulf states.

    '
  claimRefs:
  - C231
  - C237
  - C238
  - C239
  - C254
  - C256
  - C259
  - C260
- id: S7-OPERATIONAL
  title: Operational, Technical, and Data-Security Risk
  body: 'Gecko''s business depends on hardware that operates in extreme industrial environments: scaling ship hulls in salt-water conditions, crawling inside pressurized boiler tubes, flying inside petrochemical facilities, and inspecting welded nuclear components. Even minor hardware failures in the field—sensor degradation, robot adhesion failure, communication dropout—can produce incomplete inspection datasets. An undetected structural defect that later causes an incident could expose Gecko to liability claims well in excess of contract revenue, particularly on safety-critical assets like nuclear submarines, ICBM silos, and high-pressure power plant boilers. No public evidence of filed product-liability claims or safety incidents exists, but the absence of disclosure does not confirm the absence of such events.


    Cantilever''s position as a "single source of truth" for physical assets creates a data-dependency risk: if the platform experiences an outage, data breach, or algorithmic error, customers could make incorrect maintenance decisions. For US military customers, this risk is compounded by data classification requirements. Gecko''s trust center exists as a public page but does not disclose specific certifications—FedRAMP, DoD IL2/IL4, SOC 2 Type II—that would confirm adequate security posture for defense-sensitive workloads. CMMC (Cybersecurity Maturity Model Certification) compliance is required for DoD prime and subcontractors; Gecko''s certification level is not publicly confirmed.


    From a supply-chain perspective, Gecko manufactures or procures custom hardware including wall-climbing robots, drones, fixed sensors, and specialized sensor payloads. The company has not disclosed its hardware suppliers or any single-source component dependencies. A disruption to specialized sensors (ultrasonic transducers, phased-array UT probes) or custom adhesion mechanisms could delay new deployments and create contract-performance risk. The NAES partnership targets 65 GW of power generation assets; scaling robotics hardware to that coverage level while maintaining quality is an operational challenge with no confirmed delivery timeline.

    '
