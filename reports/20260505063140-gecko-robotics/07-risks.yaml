callouts:
  - calloutType: risk
    title: 'ITAR Dual-Use: Most Immediate Unresolved Risk'
    body: >
      Gecko simultaneously deploys AI-robotics technology on US nuclear submarine components and ICBM silos while
      operating under an active multi-year contract with ADNOC Gas, a UAE state-owned oil company. The ITAR dual-use
      risk is not theoretical—it requires active license compliance and technology-transfer controls. No public
      disclosure of ITAR registration, export-control compliance program, or technology-segregation architecture has
      been found. This is the single most important diligence ask before institutional investment.
    claimRefs:
      - CR001
      - CR003
      - CR005
      - CR022
  - calloutType: risk
    title: Trade-Secret Lawsuit Unresolved
    body: >
      Gecko v. Summit NDE, LLC (N.D. Indiana, filed July 2023) involves alleged misappropriation of trade secrets by two
      former employees. As of the research anchor date (2026-05-05), no final judgment or publicly available settlement
      has been found. An adverse ruling, injunction, or damages award could impair Gecko's IP position and expose
      inspection methodology as a competitive vulnerability.
    claimRefs:
      - CR025
      - CR026
  - calloutType: risk
    title: Financial Opacity Is a Material Investment Risk
    body: >
      Gecko has raised $347M but has disclosed no revenue, ARR, gross margin, or burn rate. The $1.25B Series D
      valuation cannot be independently stress-tested without financial data. All stated contract values are ceilings,
      not recognized revenue. Investors cannot assess runway, capital sufficiency for NAES/Navy scale-up, or whether the
      business is approaching cash-flow break-even.
    claimRefs:
      - CR018
      - CR019
      - CR021
  - calloutType: insight
    title: Key-Person Risk Is Elevated but Partially Offset by Institutional Board
    body: >
      Jake Loosararian is indispensable to the company's public identity and government relationships. However, the
      Series D board includes Trae Stephens (Founders Fund / Anduril) and Gaetano Crupi (USIT), both with deep
      defense-tech networks. This board composition provides a degree of continuity risk mitigation but does not
      substitute for a documented succession plan.
    claimRefs:
      - CR009
      - CR011
      - CR015
      - CR025
