  - id: TR005
    title: Mitigation and Kill Criteria Table
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - ITAR/export-control dual-use violation
        - US government enforcement action against Gecko or finding in audit
        - DOJ/DDTC charge, consent agreement, or denial of export license
        - Exit or suspend investment; assess contamination of defense contract portfolio
      - - Defense contract appropriations lapse
        - Annual DoD budget status and continuing resolution frequency
        - Navy IDIQ task orders below 30% of ceiling after year 2, or program cancellation notice
        - Re-assess DoD concentration; evaluate commercial revenue ratio before next investment tranche
      - - Trade-secret case adverse ruling
        - 'Court docket: final judgment, injunction, or damages award in Gecko v. Summit NDE'
        - Damages award > $5M or injunction limiting product deployment
        - Assess IP exposure breadth; evaluate whether core technology is compromised
      - - CMMC non-compliance finding
        - DoD contract audit or CMMC assessment result
        - C3PAO assessment finds Level 2+ non-compliance; contract cure notice issued
        - Suspend future DoD contract pursuit until remediated; assess existing contract risk
      - - CEO departure or incapacitation
        - Named executive leadership change in media or government announcement
        - Jake Loosararian departure confirmed
        - >-
          Rapid assessment of succession plan, board continuity, and key-relationship mapping before next investment
          decision
      - - NAES partnership failure to execute
        - NAES financial disclosures or public announcements about partnership status
        - No announced first deployments within 18 months of Feb 2025 announcement OR NAES ownership change
        - Re-scope commercial thesis; assess whether energy vertical can sustain independent growth
    notes: Kill criteria are investment-thesis-level, not operational triggers only.
