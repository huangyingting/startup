    summary: >
      A 5×3 matrix scoring Gecko's principal risk categories on impact (high / medium / low), likelihood (high / medium
      / low), and mitigation maturity (strong / partial / weak). ITAR/defense compliance and key-person risk score
      highest on combined impact × likelihood. Financial-model opacity and data-security posture are high-impact with
      partial mitigations.
