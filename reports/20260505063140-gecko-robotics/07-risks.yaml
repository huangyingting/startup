- calloutType: risk
  title: Financial Opacity Is a Material Investment Risk
  body: 'Gecko has raised $347M but has disclosed no revenue, ARR, gross margin, or burn rate. The $1.25B Series D valuation cannot be independently stress-tested without financial data. All stated contract values are ceilings, not recognized revenue. Investors cannot assess runway, capital sufficiency for NAES/Navy scale-up, or whether the business is approaching cash-flow break-even.

    '
  claimRefs:
  - C252
  - C253
  - C255
- calloutType: insight
  title: Key-Person Risk Is Elevated but Partially Offset by Institutional Board
  body: 'Jake Loosararian is indispensable to the company''s public identity and government relationships. However, the Series D board includes Trae Stephens (Founders Fund / Anduril) and Gaetano Crupi (USIT), both with deep defense-tech networks. This board composition provides a degree of continuity risk mitigation but does not substitute for a documented succession plan.

    '
