- id: S7-CONCENTRATION
  title: Customer and Partner Concentration Risk
  body: 'Named contract values are heavily weighted toward US Department of Defense programs. The Navy IDIQ ($71M ceiling, 5-year, March 2026), the BPMI Nuclear Naval Propulsion partnership, the Air Force Sentinel ICBM contract, the Columbia-class submarine demonstration contract, and the Trident Maritime Systems partnership together represent the bulk of publicly disclosed contract value. Concentration in a single government buyer creates appropriations risk: US defense contracts are subject to annual congressional appropriations, continuing resolutions, and program-cancellation decisions. The Navy IDIQ is a ceiling, not a guaranteed floor—actual task orders issued depend on program-office execution and budgetary allocation. GAO documented in January 2025 that the Navy surface-ship maintenance program faces chronic funding challenges, which could affect Gecko''s ability to fully capture the $71M ceiling.


    On the commercial side, NAES represents concentration within the US power sector, and ADNOC Gas represents geopolitical concentration in the UAE. The NAES partnership ($100M–$250M+ range) is explicitly noted as still being structured for "maximum impact," with undisclosed investment mechanics. If NAES''s own financial position weakens—it manages assets for third-party owners—the partnership''s committed spend may face renegotiation. ADNOC Gas operates under Abu Dhabi government ownership; any US sanctions, geopolitical realignment, or change in the UAE''s regulatory posture toward US technology could disrupt that contract.


    Partner dependencies include BlueForge Alliance (non-profit integrator for Columbia-class work), Trident Maritime Systems (Navy supply chain), BPMI (Naval Nuclear Propulsion), L3Harris Technologies (XR aircraft maintenance product), and Al Masaood Energy (UAE local partner for ADNOC). A disruption to any one of these primes could impair Gecko''s indirect access to the underlying government or industrial customer.

    '
