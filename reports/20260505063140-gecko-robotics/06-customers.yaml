      - CU012
  - id: s603
    title: Named Customer Proof — Commercial and International
    body: |
      Outside defense, Gecko's largest confirmed commercial contracts are NAES (U.S. power)
      and ADNOC Gas (UAE oil and gas), supplemented by anonymous industrial case studies
      and the L3Harris aerospace collaboration.

      NAES Corporation, "America's largest independent power operator with 65GW under
      management," announced a $100M+ multi-year deal in February 2025 with an option to
      grow beyond $250M. The agreement targets thermal and renewable energy assets and
      includes White House backing tied to the national energy emergency declaration.
      Governor Josh Shapiro of Pennsylvania, NAES President Mark Dobler, and CEO Loosararian
      all provided named endorsements. The Robot Report, POWER magazine, and NAES's own
      partnership page independently confirm the deal — triple-source corroboration.

      ADNOC Gas (ADX: ADNOCGAS), a state-owned Abu Dhabi National Oil Company subsidiary,
      signed a multi-year contract in April 2024 valued at AED 110M ($30M USD) through Al
      Masaood Energy as local partner. Pilot results showed 99.6% increase in asset coverage
      and 93%+ efficiency improvement over manual processes. The contract enables online
      inspections while assets remain operational, and is projected to reduce Lost Time
      Injury rates by 33% by eliminating scaffold requirements. offshore-technology.com
      independently confirmed the contract details. A November 2025 Gecko news headline
      confirms the ADNOC relationship was active 18+ months after the contract signing.

      The L3Harris collaboration (announced April 2025) is a joint development partnership
      on XR aircraft inspection using drone-based 3D imaging, tested over 12 months with
      multiple military customers. Anonymous case studies include a steel mill ($40M annual
      value, 5x ROI, 30% downtime reduction) and a pulp mill ($3M per tank savings, 10-year
      life extension).
