chapter:
  number: 6
  title: Customers & Customer Evidence
  summary: |
    Gecko Robotics' customer base spans at least seven distinct verticals — defense manufacturing,
    maritime sustainment, power generation, oil and gas, aerospace, steel, and pulp and paper — with
    publicly confirmed relationships covering U.S. military programs, domestic energy operators, and
    an international state-owned energy company. Named customers with publicly disclosed contracts
    include the U.S. Navy ($71M IDIQ, March 2026), NAES Corporation ($100M+ deal, February 2025),
    ADNOC Gas ($30M multi-year, April 2024), BPMI (90% inspection reduction, July 2025), Trident
    Maritime (20 facilities, January 2026), U.S. Air Force Sentinel, Columbia-class sub program,
    and L3Harris Technologies. Anonymous case studies document $40M annual value for a steel mill
    and $3M per-tank savings for a pulp mill. Outcome metrics are customer-attributed in press
    releases with named executive endorsements from BPMI, Trident, NAES, and the Navy. Key gaps
    include no public revenue split between defense and commercial, no disclosed NRR or churn data,
    and anonymous identities for steel, pulp, and mining customers.
sections:
  - id: s601
    title: Customer Base Overview and Vertical Segmentation
    body: |
      Gecko Robotics serves customers across at least seven industrial verticals as of mid-2026,
      spanning U.S. government defense programs, domestic commercial energy operators, and
      international state-owned energy companies. Named customers with publicly documented
      contracts include the U.S. Navy (Pacific Fleet surface ships and submarine programs),
      BPMI (Bechtel Plant Machinery — nuclear component manufacturing for the Naval Nuclear
      Propulsion Program), Trident Maritime Systems (U.S. Navy supply chain), the U.S. Air
      Force (Sentinel ICBM silo modernization), ADNOC Gas (Abu Dhabi), NAES Corporation (U.S.
      power grid), and L3Harris Technologies (aircraft maintenance). Unnamed customers in
      published case studies include a large steel manufacturer and a pulp and paper mill.
      A reference to Freeport-McMoRan on Gecko's mining industry page implies a mining
      customer relationship, but no contract details have been published.

      The customer base maps onto Cantilever's three workflow modules. BUILD (advanced
      manufacturing quality assurance) customers include BPMI, Trident, and the Columbia-class
      submarine program. SUSTAIN (maritime and asset health) customers include the U.S. Navy
      surface fleet, USAF Sentinel, and ADNOC Gas. MODERNIZE (legacy infrastructure digitization)
      customers include NAES, the anonymous steel mill, the pulp mill, and power plant operators.
      The Navy relationship spans both BUILD and SUSTAIN phases, making it a cross-module
      deployment. No European or Asia-Pacific production customers have been publicly confirmed.
      International revenue is currently limited to ADNOC Gas in the UAE.

      Gecko opened an international headquarters in Abu Dhabi under the Ministry of Economy's
      NextGenFDI program, and the November 2025 announcement of ongoing ADNOC AI and robotics
      skills training confirms the Middle East footprint is active. The CEO has presented at
      the World Economic Forum Annual Meeting (January 2026), citing Gecko's global ambitions
      for industrial asset intelligence. However, no contracts outside the U.S. and UAE have
      been publicly disclosed as of the May 2026 run date.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
  - id: s602
    title: Named Customer Proof — U.S. Defense and Government Programs
    body: |
      Gecko's defense customer portfolio is the most thoroughly documented segment, with five
      distinct U.S. military program relationships evidenced through official press releases,
      U.S. government spending records, and third-party news coverage.

      The U.S. Navy relationship is the single largest confirmed contract. A five-year IDIQ
      with a $71M ceiling was awarded via GSA in March 2026, covering 18 ships in the U.S.
      Pacific Fleet as the initial task order ($54M ceiling). The GSA vehicle is accessible
      to all U.S. military services. Prior to this IDIQ, Gecko worked across the Navy's
      surface fleet — destroyers, amphibious warships, aircraft carriers — and both Virginia-
      class and Columbia-class nuclear submarine programs. A single robotic evaluation of a
      Navy flight deck eliminated over 208 days of potential maintenance delay. The Chief of
      Naval Operations' 80% fleet readiness target by 2027 was cited in the contract
      announcement. Navy CTO Justin Fanelli and Senator Dave McCormick provided named
      endorsements. A January 2025 GAO report on Navy surface ships documented the structural
      maintenance backlogs that make Gecko's offering mission-critical.

      BPMI, the prime contractor for the Naval Nuclear Propulsion Program, announced a
      production partnership in July 2025 reducing inspection spans for forged components
      by up to 90% — from weeks to days. BPMI President Barb Staniscia provided a named
      executive endorsement. Trident Maritime Systems announced a January 2026 partnership
      across 20 fabrication facilities targeting 40% throughput improvement; Trident COO
      Trip Mullen endorsed the results. The Columbia-class submarine demonstration contract
      (November 2023, via BlueForge Alliance) validates weld inspection ROI across the
      supply chain. The USAF Sentinel ICBM program is documented via USASpending.gov award
      FA942222C0015 and confirmed in Gecko's December 2023 Series C extension press release.
    claimRefs:
      - CU006
