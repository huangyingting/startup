figures:
  - id: F501
    title: Cantilever Product Architecture Stack
    type: stack
    layout: wide
    summary: |
      Gecko's product architecture is a three-layer stack: (1) a physical data collection layer
      comprising multi-modal robots and fixed sensors; (2) an AI/ML processing layer that converts
      raw sensor data into structured asset health records; and (3) the Cantilever SaaS platform
      delivering decision-support outputs to operators and planners.
    data:
      layers:
        - id: hardware
          label: Physical Data Collection
          modules:
            - Wall-climbing robots (RUG ultrasonic arrays, UT transducers)
            - Drones / UAVs (HD optical, lidar, thermal)
            - Fixed sensors (continuous monitoring)
            - Swimming/underwater robots
        - id: data-processing
          label: AI/ML Processing & Digital Models
          modules:
            - Reinforcement-learning UT thickness measurement (RUG)
            - Defect classification models (ultrasonic, visual)
            - Predictive maintenance AI (deterioration rates, failure probability)
            - 3D photogrammetric reconstruction (XR digital twins)
        - id: platform
          label: Cantilever® Operating Platform (SaaS)
          modules:
            - 'BUILD module: Advanced manufacturing QA/QC digital thread'
            - 'SUSTAIN module: Maritime fleet health and maintenance planning'
            - 'MODERNIZE module: Industrial asset health baseline and capital budgeting'
            - Scenario modeling and repair plan prioritization
            - Dynamic capital budgeting and fleet-wide dashboard
        - id: integrations
          label: Customer Data Integrations
          modules:
            - ERP / CMMS / historian connectors
            - Facility records and maintenance history
            - Government data systems (defense customers)
    approximationNotes: >-
      Layer structure inferred from product pages, blog posts, and press releases. Specific cloud infrastructure, SDK
      integrations, and hardware bill-of-materials are not publicly disclosed.
