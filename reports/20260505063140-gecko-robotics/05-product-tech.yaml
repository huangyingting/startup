  - id: s504
    title: Capability Modules — Build, Sustain, Modernize
    body: |
      Cantilever is structured into three primary capability modules that align with distinct stages
      of asset lifecycle management.

      BUILD (Advanced Manufacturing): Deployed at fabrication facilities to automate quality
      assurance and quality control workflows. Applications include weld inspection, forging
      inspection, casting inspection, and fitment verification. Gecko claims 90% reduction in
      inspection timespan for forged components (verified at BPMI across initial trials), 50x faster
      weld scans, and 40% throughput increase across Trident Maritime Systems' 20 fabrication
      facilities. The digital thread created during manufacturing is designed to persist through the
      asset's operational life, connecting production quality records to in-service maintenance data.

      SUSTAIN (Maritime Sustainment): The original and most mature deployment context, focused on
      U.S. Navy surface fleet and submarine maintenance. Robots scan hulls, decking, interior spaces,
      and welds; results feed into the Cantilever maintenance planning and scheduling module. Gecko
      claims a 208-day reduction in maintenance backlog per deployment, 300% ROI, and $10M in
      maintenance funding saved. A single flight-deck robotic evaluation eliminated over 3 months of
      potential maintenance delay. The March 2026 IDIQ contract ($71M ceiling, 18 ships in Pacific
      Fleet as initial award) structures the Navy relationship for 5 years across all U.S. military
      services via GSA.

      MODERNIZE (Legacy Asset Inspection & Digitization): Covers oil and gas, power, steel,
      mining, pulp and paper, and defense modernization (ICBM silos, airframes, POL storage).
      Commercial industry metrics cited: 2x asset life extension, 20% CapEx reduction, 80% reduction
      in reactive maintenance. For ADNOC Gas, a pilot demonstrated 99.6% coverage increase and 93%
      efficiency improvement vs. manual processes, with a 33% projected LTI rate reduction due to
      elimination of scaffolding.
