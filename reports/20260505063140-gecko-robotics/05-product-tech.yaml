chapter:
  number: 5
  title: Product & Technology
  summary: |
    Gecko Robotics delivers the Cantilever® operating platform, powered by its proprietary AIR
    (Artificial Intelligence + Robotics) technology stack. Robots that climb, crawl, fly, and swim
    collect full-coverage ultrasonic, visual, lidar, and thermal data on critical infrastructure assets;
    that data feeds AI/ML models — including a published reinforcement-learning system for ultrasonic
    thickness measurement — and a software layer that produces digital twins, predictive maintenance
    recommendations, scenario planning, and dynamic capital budgeting. The platform is deployed across
    three workflow modules: BUILD (advanced manufacturing QA/QC), SUSTAIN (maritime fleet health), and
    MODERNIZE (legacy asset digitization). Gecko's durable differentiation rests on 10+ years of
    proprietary training data, a growing patent portfolio, demonstrated dual-use deployability (defense
    + commercial), and its Forward Deployed Engineering model that deepens customer integration. Key
    diligence gaps include: public source code and third-party security audit details are unavailable;
    full patent numbers are not enumerated; hardware bill-of-materials and sensor supplier concentration
    are undisclosed; and roadmap commitments beyond announced partnerships lack public confirmation.
sections:
  - id: s501
    title: Product Overview — Cantilever® and the AIR Platform
    body: |
      Gecko Robotics' primary commercial product is Cantilever®, described as "the world's first
      operating platform powered by AI and Robotics (AIR) technology." Launched publicly in November
      2023 alongside a Series C extension, Cantilever ingests data collected by Gecko's robot fleet
      and combines it with customers' existing operational data — historians, maintenance records,
      facility documentation — into a single source of truth for physical asset health. The platform
      delivers four output types: (1) a baseline health record (digital twin) for each asset;
      (2) dynamic capital budgeting tools that flag which assets need repair and when; (3) AI-powered
      scenario modeling for operational optimizations and repair plan prioritization; and (4) predictive
      scenario planning, including digital-twin-based life-extension projections.

      AIR is Gecko's overarching technology thesis: that AI is only as good as the physical data that
      trains it, and that robots are the only scalable method for generating that ground-truth data at
      the fidelity AI models require. The platform's tagline "Build. Operate. Maintain." maps directly
      to three workflow modules (BUILD, SUSTAIN, MODERNIZE) that correspond to distinct buyer workflows
      in defense manufacturing, maritime sustainment, and legacy infrastructure respectively. As of
      the May 2026 run date, Cantilever is deployed with U.S. Navy surface fleet assets, nuclear
      submarine programs, U.S. Air Force ICBM silo modernization, ADNOC Gas facilities, NAES power
      plants, Trident Maritime Systems fabrication facilities, BPMI nuclear component manufacturing,
      L3Harris aircraft programs, and industrial customers in steel, mining, pulp and paper, and oil
      and gas.
