  - id: s503
    title: AI/ML Software Architecture & Data Processing
    body: |
      Gecko's machine learning pipeline is anchored in supervised and reinforcement learning models
      trained on its proprietary multi-sensor dataset. A publicly disclosed technical blog post by
      Luke Roberto, ML Engineer, describes in detail the company's reinforcement-learning approach
      to automating ultrasonic thickness measurement (the Rapid Ultrasonic Gridding problem). The
      RL agent observes B-scan data (stacked A-scans across a spatial dimension) and selects
      thickness estimates at each grid point, using a reward function aligned with human-quality
      annotations rather than requiring manual labeling at scale. The system enables the company to
      train ML models on the large volumes of RUG data collected by its robots without manual
      labeling bottlenecks.

      Beyond UT measurement, AI is applied to: anomaly and defect classification on sensor data;
      predictive maintenance scheduling based on historical deterioration rates; operational
      efficiency recommendations (Cantilever is claimed to identify 3–5% power plant efficiency
      gains); and digital-twin-based scenario planning for repair sequencing. The Cantilever platform
      integrates robot-collected data layers with "disparate data sources" from customer systems,
      implying ERP, historian, CMMS, and maintenance record connectivity, though the specific
      integration APIs and certifications are not publicly documented. Cantilever is also described
      as dual-use, supporting both defense classified/unclassified environments and commercial
      industries. The platform's AI ontology is described by CEO Loosararian as starting "from first
      principles and questions the integrity of data — because in the built world, data is guilty
      until proven innocent," suggesting an emphasis on data validation and confidence scoring
      rather than accepting sensor data uncritically.
