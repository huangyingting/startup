  - id: s502
    title: Robotics Hardware & Sensor Suite
    body: |
      Gecko operates a multi-modal robot fleet comprising wall-climbing robots, drones (unmanned aerial
      vehicles), and underwater/swimming robots. Wall-climbing robots are the company's original and
      most mature platform; they use specially designed sensor payloads and magnetic or adhesive
      locomotion to traverse vertical and curved surfaces such as ship hulls, boilers, storage tanks,
      pressure vessels, and nuclear components. These robots carry ultrasonic transducers in arrays
      for Rapid Ultrasonic Gridding (RUG), which emits ultrasonic pulses through materials and
      measures reflections to estimate wall thickness and detect internal defects. A single RUG run
      produces dense A-scan time-series data that, when stacked into B-scans and C-scans, reveals
      thickness gradients and defect topologies across large surface areas.

      Drone platforms are deployed for aerial inspection and imaging, with the aircraft-surface
      inspection application capturing more than 10,000 high-definition images per aircraft to
      construct a precise 3D photogrammetric model used in extended-reality (XR) environments. This
      was prototyped with L3Harris for 12 months of field testing with multiple U.S. military
      customers. Sensor payloads include ultrasonic transducers, lidar, thermal cameras, and
      high-resolution optical cameras. The WEF article authored by CEO Jake Loosararian specifies
      the data types as "ultrasonic, vibration, lidar, thermal, visual." Fixed sensors are also
      deployed for continuous monitoring of critical assets. The breadth of sensor modalities is a
      key source of differentiation versus point-solution NDT vendors.
