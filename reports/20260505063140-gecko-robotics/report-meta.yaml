companyProfile:
  summary: Gecko Robotics is a Pittsburgh-based industrial technology company founded in 2013 by Jake Loosararian and Troy Demmer. It built its reputation around robotic inspection of hard-to-access industrial assets, then expanded into an AI-centric operating layer called Cantilever that turns field data into maintenance, sustainment, and capital-planning decisions. The company now spans defense, power, oil and gas, advanced manufacturing, and other critical infrastructure segments, with unusually strong traction in U.S. naval and defense-adjacent workflows for a private inspection-robotics company.
  foundedDate: '2013-01-01'
  founders:
    - name: Jake Loosararian
      role: Co-founder, CEO
      background: Electrical-engineering founder who built Gecko around industrial inspection and critical-infrastructure maintenance use cases.
      claimRefs: []
    - name: Troy Demmer
      role: Co-founder, Chief Product Officer
      background: Co-founder focused on product development; Grove City College alumnus with Carnegie Mellon MBA training.
      claimRefs: []
  foundingLocation: Pittsburgh, Pennsylvania, USA
  headquarters: Pittsburgh, Pennsylvania, USA
  productSummary: Gecko combines wall-climbing robots, drones, sensing workflows, and software into the Cantilever platform. The product stack is sold as a mix of robotic inspection deployments, digital asset records, workflow software, and AI-guided maintenance / modernization recommendations for critical assets.
  customerFocus: Asset owners and operators in defense, utilities, power generation, oil and gas, heavy industry, and advanced manufacturing.
  businessModel: Hybrid hardware-plus-software model with project and contract revenue from inspections, sustainment, and modernization engagements, plus an embedded software layer that appears designed to expand recurring Cantilever usage over time.
  stage: Series D private / unicorn
  fundingStatus: $125M Series D in June 2025 at $1.25B post-money valuation; prior disclosed rounds include a $173M total Series C in December 2023. Public sources still do not provide a clean audited bridge for cumulative capital, secondary volume, or preference stack.
  disclosureProfile: private-undisclosed
  claimRefs: []
