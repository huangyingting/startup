  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Gecko's competitive set is broader than a simple list of robot vendors. The direct robotic-
              inspection cohort includes ANYbotics' quadruped platform, Boston Dynamics' payload-flexible Spot,
              Flyability's confined-space Elios 3 drone, Invert Robotics' vacuum-adhered crawlers, and Square
              Robot's autonomous tank-inspection system. Those players overlap with Gecko on parts of the workflow
              but rarely match its combined robot-plus-software posture. A second cohort consists of incumbents
              such as Baker Hughes / Waygate and TEAM Inc., which already sell NDT services, assessment, and
              maintenance at global scale and can add software or partner hardware into existing accounts. A third
              cohort covers adjacent software and digital-twin vendors, including HUVR Data and Akselos, that sit
              above data capture and compete for the operating-system layer Gecko wants Cantilever to own. The
              substitute set remains powerful: manual NDT, rope access, scaffolding, confined-space entry, and
              human inspectors writing down measurements by hand. VentureRadar's similar-company list also suggests
              likely entrants continue to come from adjacent robotics, drone, and inspection-software markets,
              which means Gecko is competing not only against today's robotic peers but also against tomorrow's
              full-stack combinations assembled through partnerships, acquisitions, and bundling.
            claimRefs:
              - CP001
              - CP002
              - CP004
              - CP006
              - CP008
              - CP010
              - CP011
              - CP012
              - CP013
              - CP015
              - CP032
      - number: '3.2'
        title: Direct and Adjacent Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              The most relevant startup and adjacent competitors each attack a different slice of Gecko's value
              chain. ANYbotics offers the ANYmal quadruped for autonomous inspection in oil and gas, chemicals,
              power, mining, and rail; its ISO 27001 certification and Yokogawa partnership indicate growing
              enterprise readiness and better distribution, even though public funding and revenue remain
              undisclosed in the retained source set. Flyability focuses on confined-space drone inspection and,
              crucially, sells hardware through operators and distributors rather than providing the inspection
              service itself, which limits direct platform lock-in. Invert Robotics is stronger where vacuum
              adhesion and service delivery matter, with 3,000-plus inspections in 24-plus countries and support
              for smooth magnetic and non-magnetic surfaces. Square Robot is specialized around internal API 653
              tank inspection and has raised a December 2024 Series B while building patent and channel depth.
              HUVR Data and Akselos are the key adjacent-software comparators: HUVR in reliability automation and
              inspection workflow, Akselos in structural performance management and digital twins. Together they
              show that no single rival replicates Gecko's exact stack, but several competitors can flank it on
              hardware modality, software layer, or enterprise channel.
            claimRefs:
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
              - CP014
              - CP033
              - CP035
              - CP037
      - number: '3.3'
        title: Incumbent Industrial Services and NDT Leaders
        blocks:
          - type: paragraph
            body: |
              The incumbent threat is less about robotics novelty and more about distribution, trust, and account
              control. Baker Hughes' Waygate Technologies brings a deep advanced-NDT portfolio spanning ultrasonic,
              X-ray, and computed tomography, making it a credible workflow competitor in industrial infrastructure
              even without Gecko's branded full-stack AIR narrative. TEAM Inc. is the clearest retained-source
              example of a scaled incumbent: approximately 5,400 employees, more than 220 locations across over 20
              countries, and an installed inspection-and-maintenance business augmented by its OneInsight software
              platform. That combination matters because large incumbents can bundle services, software, and field
              labor under procurement structures customers already trust. They also have the capital base and
              customer access to acquire robotics capabilities rather than building them from scratch. While the
              chapter packet provides stronger sourced evidence for TEAM and Waygate than for other legacy NDT
              firms, the broader pattern is clear: Gecko is not only fighting startups for product superiority, but
              also incumbents that can use installed relationships, safety reputation, and contract vehicles to
              neutralize some of Gecko's technical edge if robotic inspection becomes easier to buy or outsource.
            claimRefs:
              - CP012
              - CP013
              - CP015
              - CP019
      - number: '3.4'
        title: Differentiation and Moat Analysis
        blocks:
          - type: paragraph
            body: |
              Gecko's moat is strongest where robotics, data, and workflow compound. Cantilever is positioned as
              an AI-and-robotics operating platform rather than a single robot product, and Gecko argues that AI
              without first-order data lacks context while data without AI lacks predictive power. That framing is
              important because competitors typically own only one side of the loop: hardware without system-level
              software, or software without proprietary data capture. Gecko also has evidence of unusually durable
              deployment depth in defense. Its defense page confirms work across Navy destroyers, amphibious ships,
              aircraft carriers, and both Virginia- and Columbia-class submarine programs, with additional Air
              Force Sentinel silo work. The March 2026 Navy IDIQ adds a five-year $71 million ceiling and an
              initial $54 million task order on 18 ships, reinforcing procurement access and mission relevance.
              Outside defense, Gecko cites analyzed thousands of assets, material ROI case studies in steel and
              pulp and paper, and large energy partnerships, all of which strengthen the proprietary-data flywheel.
              The 2023 trade-secret suit against Summit NDE is adverse evidence, but it also signals that Gecko's
              methods are valuable enough for replication risk to matter.
            claimRefs:
              - CP016
              - CP017
              - CP018
              - CP019
              - CP020
