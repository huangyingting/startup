  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Gecko's defense business subjects it to a dense web of US government contracting regulations. The Air
              Force contract (FA9422-22-C-0015) and the Navy IDIQ (March 2026) operate under FAR/DFARS, which impose
              cost-accounting standards, audit rights (DCAA), and performance reporting obligations. Gecko's work on
              nuclear submarine components with BPMI—a Naval Nuclear Propulsion Program prime—adds compliance layers for
              Q-list and controlled nuclear information. The Sentinel ICBM silo assessment contract at Air Force creates
              explicit ITAR obligations for personnel, data, and any technology transferred internationally.


              The company's simultaneous service to ADNOC Gas in the UAE under a $30M ceiling contract raises ITAR
              dual-use risk: robotics platforms and AI inspection software used on US military assets may share
              technology with those deployed in Abu Dhabi. The UAE's NextGenFDI registration does not exempt Gecko from
              US export administration regulations (EAR) or the International Traffic in Arms Regulations if
              defense-related capabilities, source code, or controlled data are involved. No public record confirms an
              export-control compliance program or ITAR registration, though company counsel (Amy Kurren, General
              Counsel per careers page) is named.


              A material legal risk is the 2023 trade-secret lawsuit: Gecko Robotics, Inc. v. Summit NDE, LLC (No.
              2:23CV229-PPS/JEM, N.D. Indiana). Gecko alleged that two former employees who joined Summit NDE
              misappropriated proprietary inspection technology. While the case was filed in July 2023, no public record
              of a final judgment or settlement is available through the research anchor date (2026-05-05). The case
              underscores IP-portability risk in a talent-dependent technology firm. Secondary legal exposure includes
              potential FCPA liability from UAE partner relationships and OFAC/sanctions compliance for any expansion to
              other Gulf states.
            claimRefs:
              - CR001
              - CR003
              - CR004
              - CR005
              - CR020
              - CR022
              - CR025
              - CR026
      - number: '7.2'
        title: Operational, Technical, and Data-Security Risk
        blocks:
          - type: paragraph
            body: >
              Gecko's business depends on hardware that operates in extreme industrial environments: scaling ship hulls
              in salt-water conditions, crawling inside pressurized boiler tubes, flying inside petrochemical
              facilities, and inspecting welded nuclear components. Even minor hardware failures in the field—sensor
              degradation, robot adhesion failure, communication dropout—can produce incomplete inspection datasets. An
              undetected structural defect that later causes an incident could expose Gecko to liability claims well in
              excess of contract revenue, particularly on safety-critical assets like nuclear submarines, ICBM silos,
              and high-pressure power plant boilers. No public evidence of filed product-liability claims or safety
              incidents exists, but the absence of disclosure does not confirm the absence of such events.


              Cantilever's position as a "single source of truth" for physical assets creates a data-dependency risk: if
              the platform experiences an outage, data breach, or algorithmic error, customers could make incorrect
              maintenance decisions. For US military customers, this risk is compounded by data classification
              requirements. Gecko's trust center exists as a public page but does not disclose specific
              certifications—FedRAMP, DoD IL2/IL4, SOC 2 Type II—that would confirm adequate security posture for
              defense-sensitive workloads. CMMC (Cybersecurity Maturity Model Certification) compliance is required for
              DoD prime and subcontractors; Gecko's certification level is not publicly confirmed.


              From a supply-chain perspective, Gecko manufactures or procures custom hardware including wall-climbing
              robots, drones, fixed sensors, and specialized sensor payloads. The company has not disclosed its hardware
              suppliers or any single-source component dependencies. A disruption to specialized sensors (ultrasonic
              transducers, phased-array UT probes) or custom adhesion mechanisms could delay new deployments and create
              contract-performance risk. The NAES partnership targets 65 GW of power generation assets; scaling robotics
              hardware to that coverage level while maintaining quality is an operational challenge with no confirmed
              delivery timeline.
            claimRefs:
              - CR006
              - CR012
              - CR013
              - CR014
              - CR019
              - CR027
              - CR028
              - CR031
              - CR034
      - number: '7.3'
        title: Customer and Partner Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Named contract values are heavily weighted toward US Department of Defense programs. The Navy IDIQ ($71M
              ceiling, 5-year, March 2026), the BPMI Nuclear Naval Propulsion partnership, the Air Force Sentinel ICBM
              contract, the Columbia-class submarine demonstration contract, and the Trident Maritime Systems
              partnership together represent the bulk of publicly disclosed contract value. Concentration in a single
              government buyer creates appropriations risk: US defense contracts are subject to annual congressional
              appropriations, continuing resolutions, and program-cancellation decisions. The Navy IDIQ is a ceiling,
              not a guaranteed floor—actual task orders issued depend on program-office execution and budgetary
              allocation. GAO documented in January 2025 that the Navy surface-ship maintenance program faces chronic
              funding challenges, which could affect Gecko's ability to fully capture the $71M ceiling.


              On the commercial side, NAES represents concentration within the US power sector, and ADNOC Gas represents
              geopolitical concentration in the UAE. The NAES partnership ($100M–$250M+ range) is explicitly noted as
              still being structured for "maximum impact," with undisclosed investment mechanics. If NAES's own
              financial position weakens—it manages assets for third-party owners—the partnership's committed spend may
              face renegotiation. ADNOC Gas operates under Abu Dhabi government ownership; any US sanctions,
              geopolitical realignment, or change in the UAE's regulatory posture toward US technology could disrupt
              that contract.


              Partner dependencies include BlueForge Alliance (non-profit integrator for Columbia-class work), Trident
              Maritime Systems (Navy supply chain), BPMI (Naval Nuclear Propulsion), L3Harris Technologies (XR aircraft
              maintenance product), and Al Masaood Energy (UAE local partner for ADNOC). A disruption to any one of
              these primes could impair Gecko's indirect access to the underlying government or industrial customer.
            claimRefs:
              - CR002
              - CR008
              - CR010
              - CR023
              - CR024
              - CR029
              - CR030
              - CR031
              - CR032
      - number: '7.4'
        title: Financial and Business-Model Risk
        blocks:
          - type: paragraph
            body: >
              Gecko is a private company and has not disclosed revenue, ARR, gross margin, operating loss, or cash burn.
              The company has raised $347M in total funding, most recently $125M in Series D (June 2025). The
              combination of hardware manufacturing, field deployment with specialized robotics teams (Forward Deployed
              Engineers), and software platform development requires significant and ongoing capital expenditure.
              Without revenue and margin data, it is impossible to assess whether Gecko is cash-flow positive, what its
              runway looks like post-Series D, or how capital-intensive the NAES and Navy scale-up will be.


              The business model appears to combine field-services revenue (robot deployment, inspection, data capture)
              with Cantilever SaaS or licensing fees. Mixed-model businesses carry gross-margin complexity: services
              margins are typically 20–40% while SaaS margins can exceed 70%. The absence of a disclosed split makes
              quality-of-earnings assessment impossible. Contract mechanisms also vary—the NAES deal financial structure
              is not disclosed, the Navy IDIQ uses task orders with a ceiling, and the ADNOC contract has a $30M
              ceiling. Revenue recognition timing, milestone-based vs. usage-based billing, and government
              cost-accounting requirements may create lumpy or deferred revenue recognition.


              Capital intensity risk is amplified by the planned expansion to 65 GW of NAES-operated assets. Deploying
              robotics hardware and engineering teams across hundreds of power generation facilities nationally requires
              significant upfront investment. The CEO's stated intent to "kill the way plants are run today" suggests a
              transformational scope that may require partner co-investment or external project financing that has not
              been publicly structured. In the event of a growth slowdown, Gecko may face margin pressure from fixed
              hardware costs and field-team overhead.
            claimRefs:
              - CR018
              - CR019
              - CR021
              - CR007
              - CR015
              - CR033
      - number: '7.5'
        title: People, Execution, and Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Jake Loosararian is the company's most visible public advocate, appearing on Bloomberg, CNBC, Fortune, and
              at ADIPEC, and is quoted in every major contract announcement. This creates a classic key-person risk: if
              Loosararian were to leave, lose health, or become embroiled in a reputational issue, the company's
              government relationships, investor confidence, and customer confidence could all be materially affected.
              Beyond Loosararian, the publicly named executive team is limited to General Counsel Amy Kurren and field
              operator Mitchell Felix (per careers page); no CFO, CRO, or CTO is publicly confirmed by name.


              The company faces dual talent-market competition: robotics hardware engineers and software-AI engineers
              represent distinct labor pools, both of which are in high demand from defense primes, autonomous vehicle
              companies, and hyperscalers. The trade-secret case against Summit NDE (2023) illustrates that key Gecko
              employees have been actively recruited by competitors. Field safety risks for robot operators working in
              industrial environments (high-temperature boilers, confined spaces, corrosive ship hulls) also create an
              OSHA compliance and workers' compensation exposure that has not been quantified.


              Competitive risk from established NDT players is material. Waygate Technologies (Baker Hughes subsidiary),
              Eddyfi Technologies, MISTRAS Group (NYSE: MG), and Flyability serve overlapping segments with existing
              customer relationships and safety certifications. MISTRAS generates over $700M in annual inspection
              revenue and has long-standing utility, petrochemical, and government contracts. These incumbents can
              leverage existing certifications (API, ASNT, NAS 410) and price competitively to defend market share.
              Gecko's competitive advantage—AI-powered Cantilever platform and proprietary data history—depends on
              continued investment and could erode if incumbents develop comparable software stacks.
            claimRefs:
              - CR009
              - CR011
              - CR016
              - CR017
              - CR026
              - CR027
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'ITAR Dual-Use: Most Immediate Unresolved Risk'
            body: >
              Gecko simultaneously deploys AI-robotics technology on US nuclear submarine components and ICBM silos
              while operating under an active multi-year contract with ADNOC Gas, a UAE state-owned oil company. The
              ITAR dual-use risk is not theoretical—it requires active license compliance and technology-transfer
              controls. No public disclosure of ITAR registration, export-control compliance program, or
              technology-segregation architecture has been found. This is the single most important diligence ask before
              institutional investment.
            calloutType: risk
            claimRefs:
              - CR001
              - CR003
              - CR005
              - CR022
          - type: callout
            title: Trade-Secret Lawsuit Unresolved
            body: >
              Gecko v. Summit NDE, LLC (N.D. Indiana, filed July 2023) involves alleged misappropriation of trade
              secrets by two former employees. As of the research anchor date (2026-05-05), no final judgment or
              publicly available settlement has been found. An adverse ruling, injunction, or damages award could impair
              Gecko's IP position and expose inspection methodology as a competitive vulnerability.
            calloutType: risk
            claimRefs:
              - CR025
              - CR026
          - type: callout
            title: Financial Opacity Is a Material Investment Risk
            body: >
              Gecko has raised $347M but has disclosed no revenue, ARR, gross margin, or burn rate. The $1.25B Series D
              valuation cannot be independently stress-tested without financial data. All stated contract values are
              ceilings, not recognized revenue. Investors cannot assess runway, capital sufficiency for NAES/Navy
              scale-up, or whether the business is approaching cash-flow break-even.
            calloutType: risk
            claimRefs:
              - CR018
              - CR019
              - CR021
          - type: callout
            title: Key-Person Risk Is Elevated but Partially Offset by Institutional Board
            body: >
              Jake Loosararian is indispensable to the company's public identity and government relationships. However,
              the Series D board includes Trae Stephens (Founders Fund / Anduril) and Gaetano Crupi (USIT), both with
              deep defense-tech networks. This board composition provides a degree of continuity risk mitigation but
              does not substitute for a documented succession plan.
            calloutType: insight
            claimRefs:
              - CR009
              - CR011
              - CR015
              - CR025
