        title: Exhibits
        blocks:
          - type: callout
            title: Structural tailwinds are multi-decade and sector-diverse
            body: >-
              Three independent tailwinds — aging infrastructure, Navy readiness backlog, and AI-driven electricity
              demand — operate across separate budget cycles and geographies. Even if one vertical softens (e.g.,
              defense budget cuts), the others continue. The NEMA/ASE forecast of 35–50% U.S. electricity demand growth
              by 2040 alone creates a structural, decade-long inspection runway in the power sector.
            calloutType: strength
            claimRefs:
              - CM025
              - CM026
              - CM027
              - CM028
          - type: callout
            title: Conflicting TAM estimates make market boundary diligence essential
            body: >-
              GMI and R&M disagree on the global inspection robots market size by 2.4x ($2.8B vs $6.7B for 2024–2025).
              This is not a rounding difference — it reflects fundamentally different scope definitions. Investors who
              anchor to the higher figure without verifying that Gecko's product competes in the broader scope risk
              overstating the addressable market by more than $100M in annual opportunity for each Gecko vertical.
            calloutType: risk
            claimRefs:
