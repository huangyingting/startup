  - id: TM004
    title: Growth Drivers and Constraints Table
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Gecko
      - Diligence Ask
    rows:
      - - Aging U.S. critical infrastructure (power plants, ships, pipelines, industrial assets)
        - driver
        - Now; sustained multi-decade
        - >-
          Creates immediate inspection need across all six Gecko verticals; fleet replacement is cost-prohibitive, so
          asset-life extension is default strategy
        - Validate what % of NAES's 300+ plants are >30 years old and inspection-eligible
      - - U.S. electricity demand surge (+35–50% by 2040, NEMA/ASE)
        - driver
        - 2025–2040, accelerating near-term
        - >-
          Increases utilization and inspection frequency for power plants; operators cannot afford downtime; extends
          Gecko's power-sector contract pipeline
        - Confirm data-center demand growth translates to higher O&M spend per plant, not just greenfield build
      - - U.S. Navy maintenance backlog + readiness pressure
        - driver
        - Now; government budget cycle-dependent
        - >-
          Navy's $25.9B/4yr maintenance spend with persistent backlog creates multi-year IDIQ demand; GAO
          recommendations signal systemic, not episodic, problem
        - Determine if Navy budget cuts or CR risks could delay IDIQ utilization
      - - AI technology maturation — need for physical data
        - driver
        - 2025–2030 accelerating
        - >-
          Gecko positioned as data-collection infrastructure for AI; as AI ROI is demonstrated across industries, demand
          for robot-generated data increases
        - Validate that Cantilever's AI outputs are used for autonomous decisions, not just visualization
      - - Gulf/Middle East infrastructure investment (ADNOC, Saudi Aramco)
        - driver
        - 2024–2030
        - >-
          Opens international pipeline; ADNOC contract establishes Gulf reference; NOCs are motivated by ESG/CO₂
          reduction commitments
        - Assess whether ADNOC contract leads to Aramco or other Gulf NOC pipeline; confirm NextGenFDI exclusivity terms
      - - Regulatory inspection mandates (OSHA, API, ASME, PHMSA, NRC)
        - driver
        - Recurring — drives annual/periodic inspection cycles
        - >-
          Creates non-discretionary inspection budget across all sectors; switching to robotic doesn't eliminate
          regulatory cycle, just improves data quality and efficiency
        - Map which mandates require human sign-off, limiting full automation potential
      - - Capital intensity and deployment friction
        - constraint
        - Near-term; reduces over product maturity
        - >-
          Long sales cycles, outage-window dependency, and safety qualification processes reduce top-of-funnel velocity;
          limits rapid land-and-expand
        - Assess average time from first contact to first contract, and time to full platform deployment
      - - Trust and liability in safety-critical environments
        - constraint
        - Medium-term; reduces as track record builds
        - >-
          Nuclear, Navy, and regulated power plants require parallel human validation of AI findings; extends break-even
          timeline for customers and reduces initial robot-only revenue
        - Ask for % of contracts with AI-primary vs AI-supplemental findings — key for software gross margin
      - - Competitor and substitute displacement difficulty
        - constraint
        - Ongoing
        - >-
          TEAM Inc, Mistras, and incumbent NDT firms are entrenched; human inspectors have regulatory certifications
          (ASNT Level II/III) that add switching cost; digital competitors (HUVRdata, Energy Robotics) growing
        - Evaluate Gecko's win rate vs. incumbents and time to displace in each segment
      - - Data format lock-in and integration cost
        - constraint
        - Near-term; persistent
        - >-
          Operators with legacy inspection records (PDFs, proprietary formats) face integration costs when adopting
          Cantilever; reduces net ROI in first contract year
        - Ask for % of Cantilever deployments with legacy data migration vs. greenfield; assess NPS on data integration
    notes: >-
      Timing labels are qualitative; Gecko has not disclosed pipeline metrics, conversion rates, or sales cycle length.
      All constraints are generic to robotic inspection adoption unless a Gecko-specific datapoint exists.
