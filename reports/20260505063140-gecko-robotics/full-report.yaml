  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Status-Quo Substitutes
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics competes within the physical inspection and asset-integrity management market —
              specifically the segment where autonomous or semi-autonomous robotic data collection replaces or augments
              manual inspection by human technicians. The market boundary includes: robotic inspection hardware
              (wall-climbing robots, drones, fixed sensors), the AI software platforms that process inspection data, and
              multi-year services agreements that bundle both.


              Excluded from Gecko's immediate market: traditional NDT services provided by human inspectors without
              robotic assistance (e.g., TEAM Inc, Mistras Group), general-purpose industrial robots not purpose-built
              for inspection, SCADA and process-sensor monitoring systems, and pure digital-twin software with no robot
              data collection component.


              The status-quo substitutes that Gecko displaces are: (1) manual rope-access or scaffolding inspections by
              certified NDT technicians; (2) third-party inspection services firms such as TEAM Inc and Mistras Group,
              which deploy human technicians with portable NDT instruments; (3) interval-based scheduled maintenance
              (calendar or run-hour triggers) rather than condition-based; and (4) fixed-sensor SCADA monitoring, which
              captures operational data but not physical asset-integrity data. Gecko's differentiation lies in capturing
              high-resolution, continuous physical data that these substitutes cannot produce economically at scale.


              Competitor adjacencies include: drone inspection software platforms (HUVRdata), autonomous inspection
              robots for oil & gas (Energy Robotics, ANYbotics), digital twins for structural assets (Akselos), and
              industrial NDT OEM equipment makers (Baker Hughes/Waygate Technologies). None of these players today span
              all six of Gecko's verticals with a unified AI platform, suggesting the market remains fragmented.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
      - number: '2.2'
        title: Market Sizing — TAM, SAM, and Sizing Lenses
        blocks:
          - type: paragraph
            body: >
              Two analyst firms provide the primary market size estimates for inspection robotics. Global Market
              Insights (GMI) pegs the global inspection robots market at $2.8 billion in 2024, growing to $9.8 billion
              by 2034 at a 13.9% CAGR. Research and Markets (R&M) estimates the same market at $6.72 billion in 2025,
              reaching $16.16 billion by 2032 at a 13.33% CAGR. The gap between these figures ($2.8B vs $6.7B) reflects
              materially different scope definitions: R&M's boundary appears to include broader industrial automation
              robotics alongside pure inspection-focused robots.


              The broader NDT and inspection services market — including services, manual and robotic — is estimated by
              R&M at $10.36 billion in 2025, growing to $15.25 billion by 2030 at an 8.1% CAGR. This figure is more
              relevant to Gecko's competitive footprint against incumbent services firms like TEAM and Mistras.


              North America held 30.3% of the global inspection robots market in 2024 per GMI, implying a U.S. and
              Canadian sub-market of approximately $850M in 2024, growing toward $3B by 2034. Gecko's near-term revenue
              pipeline is predominantly U.S.-based (Navy, NAES, Air Force), positioning it within this sub-market.


              Gecko's SAM is best constrained by vertical and product scope: defense maintenance inspection,
              power-generation asset inspection, oil & gas pipeline and vessel inspection, and heavy industrial
              (steel/mining/pulp) in North America and select international markets (UAE). An analyst-derived estimate
              of $2–4B globally represents the critical-asset robot-enabled inspection sub-market where Gecko's product
              is differentiated. This remains an estimate lacking direct public-source corroboration.
            claimRefs:
              - CM008
              - CM009
              - CM010
              - CM011
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Gecko's buyer universe spans four primary segments, each with distinct procurement structures and adoption
              triggers. Defense and Navy buyers operate through government contracting vehicles (IDIQ, firm-fixed-price,
              cost-plus), funded by DoD operations and maintenance (O&M) or procurement appropriations. The March 2026
              Navy IDIQ ($71M ceiling) and BPMI partnership confirm institutional DoD procurement as Gecko's defense
              go-to-market path. Budget authority rests with NAVSEA, OPNAV, and defense prime contractors (BPMI,
              BlueForge Alliance). Adoption triggers are readiness mandates, congressional pressure on maintenance
              backlogs, and shipbuilding production timelines.


              Power and energy buyers are independent power producers (IPPs) and plant operators such as NAES, which
              manages 65 gigawatts across 300+ facilities. The budget owner is the plant-level operations and
              maintenance (O&M) manager, with capital decisions escalated to CFO/COO for multi-year platform contracts.
              The NAES $100M+ deal (Feb 2025) establishes a reference partnership validating the IPP procurement path.
              Adoption is triggered by grid reliability mandates, aging fleet economics (extending asset life vs.
              greenfield), and rising data-center electricity demand that increases plant utilization.


              Oil and gas buyers include national oil companies (ADNOC Gas, ~$30M contract Apr 2024), refiners, LNG
              terminal operators, and pipeline operators. Procurement authority is typically held by integrity
              management or asset operations teams, with sign-off from VP-level operations. International buyers add
              complexity through local partner requirements (Al Masaood Energy for ADNOC). Adoption triggers are
              environmental compliance, CO₂ reduction mandates, and predictive-maintenance cost reduction targets.


              Industrial buyers (steel mills, mining operations, pulp and paper plants) are smaller per-contract but
              collectively represent a large fleet of aging assets. These tend to be price-sensitive, with procurement
              driven by capital maintenance budgets and driven by production disruption risk rather than regulatory
              compliance. Adoption lag is typically higher in this segment relative to defense.
            claimRefs:
              - CM017
              - CM018
              - CM019
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
      - number: '2.4'
        title: Growth Drivers
        blocks:
          - type: paragraph
            body: >
              Six structural drivers create multi-year demand for Gecko's platform. First, aging U.S. critical
              infrastructure: power plants, pipelines, naval vessels, and industrial facilities built 30–60 years ago
              are reaching end-of-design-life, requiring intensified inspection and condition-based maintenance rather
              than calendar cycles. Second, U.S. electricity demand growth: NEMA and the Alliance to Save Energy
              forecast a 35–50% surge in U.S. electricity demand between 2024 and 2040, driven primarily by AI
              data-center expansion (data center demand alone +300% by 2050 per NEMA) and e-mobility. This growth
              creates systemic pressure on existing power plants to maximize uptime and extend asset life. DOE
              corroborates this, reporting data-center electricity consumption at 4.4% of U.S. total in 2023 and
              projecting it to 6.7–12% by 2028.


              Third, defense readiness pressure: the U.S. Navy appropriated $25.9 billion for combat surface ship
              maintenance in FY2020–2023 while still reporting persistent deferred maintenance, limited spare parts, and
              unimplemented GAO recommendations. Congressional scrutiny is intensifying. Fourth, AI adoption as
              inspection enabler: the WEF essay by Gecko CEO Loosararian articulates a thesis now widely shared — that
              AI systems need high-fidelity physical data from robots to deliver on their value promise, creating demand
              for robotics as the AI data-collection layer. Fifth, regulatory compliance cycles: OSHA, API, ASME, PHMSA,
              and nuclear safety codes mandate recurring inspection intervals that create predictable, multi-year
              inspection budgets across all Gecko verticals. Sixth, international energy infrastructure build-out: Gulf
              NOCs (ADNOC) are investing in predictive maintenance to reduce CO₂ emissions and meet ESG commitments,
              opening international procurement channels.
            claimRefs:
              - CM025
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
      - number: '2.5'
        title: Adoption Constraints and Sizing Gaps
        blocks:
          - type: paragraph
            body: >
              Adoption of autonomous inspection robotics faces several structural constraints. Capital intensity and
              deployment friction are primary: deploying Gecko robots on a ship hull, boiler, or pipeline segment
              requires asset access windows (often during scheduled outages), calibration protocols, and safety review
              processes. For safety-critical environments (nuclear propulsion, missile silos), qualification timelines
              can span 12–24 months before operational deployment begins. This high friction limits Gecko's ability to
              scale rapidly across the installed base.


              Trust and liability risk is a second material constraint. In safety-critical assets, operators may accept
              AI-assisted inspection findings as supplemental but are reluctant to use them as the primary basis for
              regulatory sign-off without parallel human inspection. This "trust gap" extends sales cycles and limits
              early revenue recognition on platform contracts. The BPMI partnership's 90% inspection-time-reduction
              claim required extensive controlled testing before deployment, which suggests even Gecko's best customers
              require validation periods.


              Data interoperability and switching-cost lock-in represent a third constraint: most operators have decades
              of inspection records in proprietary or paper formats incompatible with Gecko's Cantilever platform,
              raising integration costs. Incumbent inspection firms (TEAM Inc, Mistras) are entrenched in customer
              workflows and offer competitive robotics and drone services. The competitor field is also growing:
              HUVRdata, Energy Robotics, Akselos, Voliro, and Invert Robotics all compete for wallet share in
              overlapping verticals.


              Two material sizing gaps remain: (1) Gecko's SAM cannot be precisely computed from available public
              sources; the analyst estimates reflect different scope definitions and are not broken out by Gecko's exact
              verticals; (2) no reliable SOM estimate can be derived without Gecko's revenue, customer count, and
              contract utilization data, which are not publicly disclosed.
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
              - CM037
              - CM038
