  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Overview — Cantilever® and the AIR Platform
        blocks:
          - type: paragraph
            body: |
              Gecko Robotics' primary commercial product is Cantilever®, described as "the world's first
              operating platform powered by AI and Robotics (AIR) technology." Launched publicly in November
              2023 alongside a Series C extension, Cantilever ingests data collected by Gecko's robot fleet
              and combines it with customers' existing operational data — historians, maintenance records,
              facility documentation — into a single source of truth for physical asset health. The platform
              delivers four output types: (1) a baseline health record (digital twin) for each asset;
              (2) dynamic capital budgeting tools that flag which assets need repair and when; (3) AI-powered
              scenario modeling for operational optimizations and repair plan prioritization; and (4) predictive
              scenario planning, including digital-twin-based life-extension projections.

              AIR is Gecko's overarching technology thesis: that AI is only as good as the physical data that
              trains it, and that robots are the only scalable method for generating that ground-truth data at
              the fidelity AI models require. The platform's tagline "Build. Operate. Maintain." maps directly
              to three workflow modules (BUILD, SUSTAIN, MODERNIZE) that correspond to distinct buyer workflows
              in defense manufacturing, maritime sustainment, and legacy infrastructure respectively. As of
              the May 2026 run date, Cantilever is deployed with U.S. Navy surface fleet assets, nuclear
              submarine programs, U.S. Air Force ICBM silo modernization, ADNOC Gas facilities, NAES power
              plants, Trident Maritime Systems fabrication facilities, BPMI nuclear component manufacturing,
              L3Harris aircraft programs, and industrial customers in steel, mining, pulp and paper, and oil
              and gas.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
      - number: '5.2'
        title: Robotics Hardware & Sensor Suite
        blocks:
          - type: paragraph
            body: |
              Gecko operates a multi-modal robot fleet comprising wall-climbing robots, drones (unmanned aerial
              vehicles), and underwater/swimming robots. Wall-climbing robots are the company's original and
              most mature platform; they use specially designed sensor payloads and magnetic or adhesive
              locomotion to traverse vertical and curved surfaces such as ship hulls, boilers, storage tanks,
              pressure vessels, and nuclear components. These robots carry ultrasonic transducers in arrays
              for Rapid Ultrasonic Gridding (RUG), which emits ultrasonic pulses through materials and
              measures reflections to estimate wall thickness and detect internal defects. A single RUG run
              produces dense A-scan time-series data that, when stacked into B-scans and C-scans, reveals
              thickness gradients and defect topologies across large surface areas.

              Drone platforms are deployed for aerial inspection and imaging, with the aircraft-surface
              inspection application capturing more than 10,000 high-definition images per aircraft to
              construct a precise 3D photogrammetric model used in extended-reality (XR) environments. This
              was prototyped with L3Harris for 12 months of field testing with multiple U.S. military
              customers. Sensor payloads include ultrasonic transducers, lidar, thermal cameras, and
              high-resolution optical cameras. The WEF article authored by CEO Jake Loosararian specifies
              the data types as "ultrasonic, vibration, lidar, thermal, visual." Fixed sensors are also
              deployed for continuous monitoring of critical assets. The breadth of sensor modalities is a
              key source of differentiation versus point-solution NDT vendors.
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
              - CE011
      - number: '5.3'
        title: AI/ML Software Architecture & Data Processing
        blocks:
          - type: paragraph
            body: |
              Gecko's machine learning pipeline is anchored in supervised and reinforcement learning models
              trained on its proprietary multi-sensor dataset. A publicly disclosed technical blog post by
              Luke Roberto, ML Engineer, describes in detail the company's reinforcement-learning approach
              to automating ultrasonic thickness measurement (the Rapid Ultrasonic Gridding problem). The
              RL agent observes B-scan data (stacked A-scans across a spatial dimension) and selects
              thickness estimates at each grid point, using a reward function aligned with human-quality
              annotations rather than requiring manual labeling at scale. The system enables the company to
              train ML models on the large volumes of RUG data collected by its robots without manual
              labeling bottlenecks.

              Beyond UT measurement, AI is applied to: anomaly and defect classification on sensor data;
              predictive maintenance scheduling based on historical deterioration rates; operational
              efficiency recommendations (Cantilever is claimed to identify 3–5% power plant efficiency
              gains); and digital-twin-based scenario planning for repair sequencing. The Cantilever platform
              integrates robot-collected data layers with "disparate data sources" from customer systems,
              implying ERP, historian, CMMS, and maintenance record connectivity, though the specific
              integration APIs and certifications are not publicly documented. Cantilever is also described
              as dual-use, supporting both defense classified/unclassified environments and commercial
              industries. The platform's AI ontology is described by CEO Loosararian as starting "from first
              principles and questions the integrity of data — because in the built world, data is guilty
              until proven innocent," suggesting an emphasis on data validation and confidence scoring
              rather than accepting sensor data uncritically.
            claimRefs:
              - CE012
              - CE013
              - CE014
              - CE015
              - CE016
              - CE017
      - number: '5.4'
        title: Capability Modules — Build, Sustain, Modernize
        blocks:
          - type: paragraph
            body: |
              Cantilever is structured into three primary capability modules that align with distinct stages
              of asset lifecycle management.

              BUILD (Advanced Manufacturing): Deployed at fabrication facilities to automate quality
              assurance and quality control workflows. Applications include weld inspection, forging
              inspection, casting inspection, and fitment verification. Gecko claims 90% reduction in
              inspection timespan for forged components (verified at BPMI across initial trials), 50x faster
              weld scans, and 40% throughput increase across Trident Maritime Systems' 20 fabrication
              facilities. The digital thread created during manufacturing is designed to persist through the
              asset's operational life, connecting production quality records to in-service maintenance data.

              SUSTAIN (Maritime Sustainment): The original and most mature deployment context, focused on
              U.S. Navy surface fleet and submarine maintenance. Robots scan hulls, decking, interior spaces,
              and welds; results feed into the Cantilever maintenance planning and scheduling module. Gecko
              claims a 208-day reduction in maintenance backlog per deployment, 300% ROI, and $10M in
              maintenance funding saved. A single flight-deck robotic evaluation eliminated over 3 months of
              potential maintenance delay. The March 2026 IDIQ contract ($71M ceiling, 18 ships in Pacific
              Fleet as initial award) structures the Navy relationship for 5 years across all U.S. military
              services via GSA.

              MODERNIZE (Legacy Asset Inspection & Digitization): Covers oil and gas, power, steel,
              mining, pulp and paper, and defense modernization (ICBM silos, airframes, POL storage).
              Commercial industry metrics cited: 2x asset life extension, 20% CapEx reduction, 80% reduction
              in reactive maintenance. For ADNOC Gas, a pilot demonstrated 99.6% coverage increase and 93%
              efficiency improvement vs. manual processes, with a 33% projected LTI rate reduction due to
              elimination of scaffolding.
            claimRefs:
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
              - CE024
      - number: '5.5'
        title: Differentiation, IP & Proprietary Moats
        blocks:
          - type: paragraph
            body: |
              Gecko's differentiation rests on four reinforcing layers. First, proprietary training data:
              with 10+ years of operation and "thousands of assets analyzed," Gecko has accumulated a
              physical-world dataset for training AI models that would take years and capital to replicate.
              This flywheel — more inspections → more data → better models → more inspections — is a
              durable competitive moat in a sector where ground-truth data is scarce. Second, a growing
              patent portfolio: geckorobotics.com/patents is a live page (confirming patent activity),
              though specific patent numbers and claims are not publicly enumerated, representing a diligence
              gap. Third, the published RL paper on RUG demonstrates willingness to publish technical
              methodology, building developer credibility and attracting ML talent while keeping training
              data proprietary. Fourth, the dual-use defense + commercial model creates cross-subsidization:
              defense contracts provide revenue stability and classified-environment clearances while
              commercial deployments generate broad asset data diversity. The Forward Deployed Engineering
              model — where engineers are embedded at single customers to build mission-specific extensions
              of Cantilever — creates deep technical integration and high switching costs.

              The company is cited twice on the CNBC Disruptor 50 list (2024 and 2025), has published
              in the World Economic Forum, and CEO Jake Loosararian has presented at ADIPEC and Bloomberg TV,
              providing brand-building signals in both defense and energy sectors. Competitors (Waygate,
              Eddyfi, MISTRAS, Flyability, Percepto, Energy Robotics) are either specialized point-solution
              NDT providers, hardware-only drone companies, or operators without AI platforms of comparable
              depth — none appears to combine full-lifecycle platform software with a proprietary robot fleet
              and AI trained on a decade of field data.
            claimRefs:
              - CE025
              - CE026
              - CE027
              - CE028
              - CE029
      - number: '5.6'
        title: Deployment, Trust, Security & Roadmap
        blocks:
          - type: paragraph
            body: |
              Gecko maintains a Trust Center at trust.geckorobotics.com, though public content is minimal —
              a JavaScript-rendered page with no enumerated certifications, SOC 2 status, FedRAMP
              authorization, or ITAR compliance documentation. Given that Gecko handles Navy, Air Force,
              and nuclear propulsion program data, ITAR and potentially CMMC compliance are almost certainly
              required, but these cannot be independently verified from public sources and represent a
              material diligence gap.

              Deployment is via a Forward Deployed Engineering (FDE) model: Gecko engineers embed at
              customer facilities and operate the robots while configuring Cantilever to the customer's
              specific data systems. This model creates deep integration but also implies professional
              services dependency and limited self-service scalability. Cantilever has a software demo
              available on the company website, and customers access it via a "Log In" portal, confirming
              it is a cloud-based SaaS platform (not on-premise only), though hybrid/air-gapped deployment
              for classified environments is implied by defense use but not confirmed publicly.

              Known roadmap items (from public announcements): (1) GSA IDIQ vehicle expansion to all U.S.
              military services; (2) XR digital-twin aircraft inspection product (with L3Harris, in
              prototype-to-production phase as of April 2025); (3) UAE/international expansion including
              ADNOC training programs for UAE nationals; (4) data center inspection application (implied by
              CEO comments on AI infrastructure energy). Formal product roadmap with dates and feature
              commitments is not publicly disclosed, consistent with Gecko's private-company disclosure
              profile.
            claimRefs:
              - CE030
              - CE031
              - CE032
              - CE033
      - number: '5.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Proprietary Physical-World Dataset Is a Durable Moat
            body: |
              Ten-plus years of ultrasonic, visual, lidar, and thermal data collected across thousands of
              assets — Navy ships, nuclear components, power plants, storage tanks, steel mills — constitutes
              a training corpus that would cost years and hundreds of millions of dollars to replicate.
              The reinforcement-learning pipeline enables model improvement without proportional labeling
              cost, compounding this advantage.
            calloutType: strength
            claimRefs:
              - CE025
              - CE026
          - type: callout
            title: Dual-Use Defense + Commercial Cross-Subsidization
            body: |
              Defense contracts provide revenue certainty and classified-environment deployment experience
              that validates the platform for high-stakes commercial applications. Commercial deployments
              generate asset diversity that improves model generalization beyond what defense-only data
              would support. The IDIQ GSA vehicle gives all U.S. military services access, broadening
              the defense TAM.
            calloutType: strength
            claimRefs:
              - CE019
              - CE021
              - CE022
          - type: callout
            title: Trust, Security & Compliance Documentation Is Opaque
            body: |
              The Trust Center serves a JavaScript-rendered page with no enumerated certifications, SOC 2
              status, FedRAMP authorization, ITAR registration, or CMMC level confirmation. Given Gecko's
              work on nuclear submarines, ICBM silos, and Navy surface ships, these controls almost
              certainly exist — but the inability to verify them from public sources is a due-diligence
              blocker for institutional investors and procurement officers at enterprises with compliance
              obligations.
            calloutType: risk
            claimRefs:
              - CE030
              - CE031
              - CE032
          - type: callout
            title: Hardware Supplier Concentration and BOM Undisclosed
            body: |
              Gecko's robot performance is critically dependent on ultrasonic transducer quality, sensor
              payload design, and drone hardware. No supplier names, sole-source relationships, or
              geographic origin of sensor components are disclosed. In a supply-chain-stressed defense
              environment, this is a material gap — particularly relevant given the USAF and Navy's
              concerns about Chinese-origin components in defense systems.
            calloutType: risk
            claimRefs:
