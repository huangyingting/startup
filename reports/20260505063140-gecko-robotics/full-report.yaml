  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: |
              Gecko Robotics appears to monetize through a hybrid of services, software, and government contracts
              rather than through a pure SaaS model. The clearest public evidence shows robotic inspection work
              delivered by proprietary robots, drones, sensors, and field teams, with Cantilever functioning as the
              software layer that converts inspection data into digital records, predictive planning, and asset
              management workflows. That points to at least two linked revenue streams: field-delivered inspection
              revenue and software or platform revenue attached to Cantilever. Government business adds a third
              stream, structured through contract vehicles such as the March 2026 Navy IDIQ and the independently
              verified Air Force Sentinel award. Strategic partnerships such as NAES and ADNOC imply a fourth
              packaging mode in which deployment scales through multi-year frameworks tied to milestones, rollout,
              and demonstrated operating value.

              The main financial limitation is that Gecko does not publicly disclose ARR, revenue run rate, pricing,
              software mix, or recognition policy. Public contract values are ceiling values, framework amounts, or
              press-release totals rather than recognized revenue. That makes revenue quality directionally visible
              but not yet underwritable. Diligence should request revenue by stream, revenue recognition rules for
              milestone contracts, backlog conversion assumptions, and the split between bundled Cantilever revenue
              and standalone software revenue, if any.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI008
              - CI009
              - CI010
              - CI011
              - CI030
      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: |
              Gecko's public GTM pattern looks high-touch, consultative, and deployment-led rather than transactional.
              The careers page and operating language around Forward Deployed Engineers indicate that Gecko sends
              technically capable staff into customer environments to diagnose problems, scope work, deploy robots,
              and translate data into operating outcomes. That model is well suited to large, complex industrial and
              defense accounts because value is proven through operational improvement, not just through software seat
              adoption. It also explains why the company's public proof points are framed in customer ROI terms such
              as 50x faster repair identification, $40M of annual value creation in steel, $3M savings per tank in
              pulp and paper, and outcome ranges such as lower downtime, lower reactive maintenance, and lower CapEx.

              The likely tradeoff is sales efficiency opacity. Government procurement cycles can run 12 to 24 months
              or longer, while public sources do not disclose commercial sales-cycle duration, CAC, payback, or NRR.
              Partnerships such as NAES may improve distribution by giving Gecko a portfolio-scale channel into 65GW
              of managed generation assets, but they do not remove the need for embedded delivery capability. The
              result is a land-and-expand motion with strong reference-case selling power and uncertain fully loaded
              sales efficiency until management discloses cohort economics.
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI019
      - number: '4.3'
        title: Cost Structure and Gross Margin Drivers
        blocks:
          - type: paragraph
            body: |
              Gecko's cost structure is likely dominated by four buckets: direct field labor, hardware and sensor
              deployment, software and AI engineering, and general overhead. The Forward Deployed Engineer model is
              especially important because it suggests that service delivery requires skilled engineers who spend real
              time inside customer operations instead of serving as lightweight post-sale support. That model can be
              strategically powerful, but it also means cost of delivery scales with headcount unless tooling,
              standardization, or software leverage offsets labor intensity. On top of that, Gecko appears to carry
              real hardware cost because its value proposition depends on proprietary inspection robots, drones,
              fixed sensors, and data capture systems rather than pure software.

              Public filings from MISTRAS Group and TEAM Inc. provide the best available benchmark for the services
              component of this model. Those filings show that industrial inspection and specialty field services can
              support real scale, but usually at materially lower gross margins than vertical SaaS. Gecko's margin
              upside therefore depends on how much Cantilever can pull economics away from labor-heavy inspection
              work and toward software-like recurring value. Without a segment gross-margin bridge, it is impossible
              to know whether Gecko is currently closer to an industrial-services profile, a blended tech-enabled
              services model, or a high-margin software business layered on top of hardware and field operations.
            claimRefs:
              - CI016
              - CI017
              - CI018
              - CI019
              - CI031
      - number: '4.4'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: |
              Gecko has raised enough capital to avoid looking like an early-stage science project, but public data
              still stop short of a reliable runway assessment. The company reached a $1.25B valuation in June 2025
              after raising a $125M Series D, bringing total disclosed funding to roughly $347M. That capital base,
              together with visible contract activity across defense, energy, and international markets, suggests a
              business that has achieved meaningful commercial and government traction. Large disclosed programs such
              as NAES, the Navy IDIQ, and ongoing Air Force, Navy, and ADNOC work improve confidence that Gecko is
              selling into real budgets rather than relying only on pilots.

              Even so, capital adequacy cannot be underwritten from public sources because cash on hand, burn,
              collections timing, working capital drag, and project-level margin are all undisclosed. The same facts
              that support demand visibility also support financing dependency risk: hardware deployment, specialist
              field teams, expansion into defense manufacturing, and continued AI R&D all consume capital. The right
              financial interpretation is that recent financing materially reduced short-term funding pressure, but
              did not eliminate the need for either a clearer path to self-funding or future external capital if
              growth continues to require high deployment intensity.
            claimRefs:
              - CI005
              - CI006
              - CI007
              - CI020
              - CI021
              - CI022
              - CI023
              - CI024
              - CI025
              - CI026
      - number: '4.5'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: |
              Gecko's revenue quality looks better than most robotics startups because public evidence points to
              multi-year contracts, named government programs, large enterprise partnerships, and a software layer
              that may create recurring value beyond individual inspections. The problem is not the absence of any
              traction; it is the absence of the specific private metrics required for underwriting. Revenue is not
              publicly disclosed. ARR is not disclosed. Gross margin, burn, EBITDA, backlog conversion, customer
              concentration by realized revenue, and the split between services and software are also undisclosed.
              That leaves the company in an awkward middle ground where contract visibility exists, but realized
              economics remain opaque.

              Margin path is the key debate. If Cantilever meaningfully captures ongoing planning and operating
              workflows, margins could expand over time. If the business remains heavily dependent on FDE labor,
              bespoke delivery, and hardware deployment, services-like margins may dominate for longer than a
              software-style valuation implies. Priority diligence asks are: trailing 24-month revenue by segment;
              contract backlog and conversion assumptions; software versus services gross margin; monthly burn and
              treasury balance post-Series D; top-10 customer concentration; FDE productivity and utilization; and
              proof that Cantilever can be renewed or expanded independently of one-off inspection projects.
            claimRefs:
              - CI025
              - CI026
              - CI027
              - CI028
              - CI029
