companyProfile:
  summary: >-
    Gecko Robotics is a Pittsburgh-based industrial technology company founded in 2013 by Jake Loosararian and Troy
    Demmer. It built its reputation around robotic inspection of hard-to-access industrial assets, then expanded into an
    AI-centric operating layer called Cantilever that turns field data into maintenance, sustainment, and
    capital-planning decisions. The company now spans defense, power, oil and gas, advanced manufacturing, and other
    critical infrastructure segments, with unusually strong traction in U.S. naval and defense-adjacent workflows for a
    private inspection-robotics company.
  foundedDate: '2013-01-01'
  founders:
    - name: Jake Loosararian
      role: Co-founder, CEO
      background: >-
        Electrical-engineering founder who built Gecko around industrial inspection and critical-infrastructure
        maintenance use cases.
      claimRefs: []
    - name: Troy Demmer
      role: Co-founder, Chief Product Officer
      background: Co-founder focused on product development; Grove City College alumnus with Carnegie Mellon MBA training.
