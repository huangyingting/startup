  foundingLocation: Pittsburgh, Pennsylvania, USA
  headquarters: Pittsburgh, Pennsylvania, USA
  productSummary: >-
    Gecko combines wall-climbing robots, drones, sensing workflows, and software into the Cantilever platform. The
    product stack is sold as a mix of robotic inspection deployments, digital asset records, workflow software, and
    AI-guided maintenance / modernization recommendations for critical assets.
  customerFocus: >-
    Asset owners and operators in defense, utilities, power generation, oil and gas, heavy industry, and advanced
    manufacturing.
  businessModel: >-
