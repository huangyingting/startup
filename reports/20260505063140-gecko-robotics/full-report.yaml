  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics addresses a multi-billion-dollar maintenance and inspection market where aging
              infrastructure, labor shortages, and regulatory safety mandates converge. The NDT and inspection market
              reached $10.36 billion in 2025 and is projected to grow at an 8% CAGR to $15.25 billion by 2030. The
              inspection-robots sub-market is growing faster, at a 13.33% CAGR from $6.72 billion in 2025 to $16.16
              billion by 2032. GMI data corroborates this at a 13.9% CAGR, reaching $9.8 billion by 2034. Gecko's
              Cantilever operating platform differentiates the company from pure hardware vendors by converting
              robot-collected sensor data into persistent digital records and AI-generated maintenance recommendations,
              a model that can layer recurring SaaS fees atop one-time inspection deployments.

              The bull case rests on three pillars. First, defense penetration: confirmed U.S. Navy IDIQ ($71M ceiling
              across 18 Pacific Fleet ships), Air Force Sentinel ICBM support, BPMI nuclear propulsion manufacturing
              partnership, Trident Maritime collaboration, and a Columbia-class submarine prototype engagement form a
              defensible moat reinforced by ITAR constraints that slow foreign entrants. Second, commercial scale: the
              NAES partnership ($100M minimum commitment, 65 GW asset base) and ADNOC Gas contract ($30M, UAE)
              demonstrate cross-sector and international replication. Third, platform economics: Cantilever's
              data-flywheel model improves prediction accuracy with each incremental inspection, creating switching
              costs that could support 80%+ gross margins and net revenue retention above 110% if SaaS attachment
              reaches scale.

              The anti-thesis is equally credible. MISTRAS Group, the most comparable public company (~$700M revenue,
              NYSE:MG), trades at roughly 0.5x revenue, a multiple that would imply a fair value far below $1.25B unless
              Gecko has successfully re-rated as a SaaS business rather than a services business. Revenue mix, gross
              margin, and Cantilever SaaS attach rate are all undisclosed. The Navy IDIQ is a ceiling, not a guaranteed
              floor; actual task orders depend on congressional appropriations and Navy readiness budgets that shift
              with geopolitical priorities. The ongoing trade-secret lawsuit (Summit NDE, N.D. Indiana, No.
              2:23CV229-PPS/JEM) and ITAR exposure from the ADNOC UAE deployment add residual legal and regulatory tail
              risk. Competing robotic inspection platforms (ANYbotics, Boston Dynamics Spot, Percepto, Skydio) are
              increasingly capable and backed by large strategic investors, which could erode Gecko's hardware
              differentiation over time even if Cantilever retains software stickiness.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV001
              - CV005
              - CV006
              - CV007
              - CV008
              - CV009
      - number: '8.2'
        title: Financing and Valuation Context
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics has raised $347 million in total equity funding across at least four known rounds. The
              Series D, announced June 12, 2025, raised $125 million and valued the company at $1.25 billion. The round
              was led by Cox Enterprises, a new investor representing strategic commercial validation, with
              participation from USIT (Thomas Tull, Gaetano Crupi), XN, and Founders Fund (Trae Stephens). The Series C
              in December 2023 raised $173 million at a $633 million pre-money valuation; the 18-month Series C to
              Series D interval produced a 97% valuation uplift, indicating strong investor confidence in execution
              during that window.

              The capital-deployment context matters for valuation analysis. Gecko operates hardware-intensive business
              lines (wall-climbing robots, drones, fixed sensors) alongside software-intensive Cantilever. Capital
              efficiency in robotic-services businesses is typically lower than pure SaaS because hardware must be
              deployed, maintained, and replaced. With $347 million raised and no disclosed profitability, investors
              must evaluate the extent to which Cantilever has shifted the unit economics away from services margins
              (typically 20-30%) toward SaaS margins (60-80%).

              Preference-stack overhang from $347 million in cumulative equity is material. If liquidation preferences
              are structured as 1x non-participating, downside scenarios concentrate losses on common holders while
              preferred investors recover first. If Series D investors hold 1x participating preferred, break-even for
              common equity rises above $347 million on any liquidation. This dilution and preference structure must be
              verified during diligence, as it directly affects option-pool incentive value and secondaries pricing.
              Entry price discipline is critical at a $1.25B post-money. At an assumed 20-25% ownership stake for a new
              lead investor, the implied fully diluted valuation and preference stack makes a 3x return achievable only
              if exit exceeds $3.75 billion, requiring either a public-market debut at scale or an M&A acquirer willing
              to pay strategic premium.
            claimRefs:
              - CV006
              - CV001
              - CV010
              - CV011
              - CV012
              - CV006
              - CV006
              - CV013
      - number: '8.3'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Bull scenario assumes Cantilever achieves SaaS re-rating: by 2027, 50%+ of revenue is recurring software
              subscription, ARR reaches $200M+, and net revenue retention exceeds 115%. Under these conditions, a 10-12x
              ARR multiple (consistent with Palantir at similar growth stages) supports a $2.0-2.4B exit valuation,
              generating a 1.6-1.9x return on Series D price. Probability signal: NAES $100M deal structure (if
              SaaS-attached) and Navy IDIQ repeat task orders converting to recurring data-subscription fees would be
              leading indicators. The World Economic Forum article on AI and industrial data transformation corroborates
              the macro tailwind for this scenario.

              Base scenario assumes blended services and software: $80-120M revenue by 2027, with SaaS attach rate at
              30-40% of total revenue. Applying a blended 4-5x multiple (services at 1.5x, SaaS at 8x), fair value is
              $400-600M, below the current $1.25B entry price. A 3x exit multiple on base revenue requires either
              significant margin improvement or a strategic premium from a defense or energy acquirer willing to pay for
              Cantilever's data moat. The base case produces a negative IRR for Series D investors unless the holding
              period extends to 2028+ with additional revenue growth. DOE and EIA projections for surging electricity
              demand through 2030 provide a structural tailwind that could push the base case toward its upper bound if
              NAES and grid-operator contracts compound.

              Bear scenario assumes persistent services economics: revenue stalls at $30-50M due to NDAA defense budget
              cuts, NAES contract underperformance, and an adverse trade-secret ruling that impairs Cantilever's
              data-processing methodology. At 1-2x revenue (MISTRAS/TEAM comps), fair value collapses to $30-100M,
              implying near-total loss on Series D capital. Probability weighting: bull 25%, base 50%, bear 25%.
              Probability-weighted valuation = 0.25 x $2.2B + 0.50 x $500M + 0.25 x $65M = $816M. At $1.25B entry, the
              probability-weighted outcome implies a 0.65x return, negative carry unless the bull scenario probability
              exceeds 50%, which requires near-term evidence of SaaS revenue scale. This reinforces the research-more
              recommendation.
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV010
              - CV017
              - CV011
              - CV010
              - CV018
      - number: '8.4'
        title: Comparable Set
        blocks:
          - type: paragraph
            body: >
              Constructing a reliable comparable set for Gecko Robotics requires bridging three distinct value-driver
              categories: legacy NDT services companies, defense-tech software unicorns, and inspection-robotics
              startups. No single public comparable captures all three dimensions.

              Legacy NDT services: MISTRAS Group (NYSE:MG) is the closest public comp, providing inspection and
              condition-monitoring services to energy, aerospace, and infrastructure clients with approximately $700
              million in FY2024 annual revenue at roughly 0.5x revenue market capitalization (~$350M market cap). TEAM
              Inc., a comparable services provider, underwent restructuring and went private in 2023. Baker Hughes'
              Waygate Technologies division is a subsidiary of a large conglomerate and cannot be isolated for multiple
              analysis, but the historical GE Inspection Technologies acquisition at roughly $1.5-2.0 billion implied
              1-1.5x revenue. These comps suggest a pure-services Gecko would trade at 0.5-1.5x revenue, implying fair
              value of $40-225M on an estimated $80-150M revenue base, well below $1.25B.

              Defense-tech software unicorns: Anduril Industries raised at a $14 billion valuation on estimated $500M
              ARR in 2024, implying ~28x ARR. Palantir Technologies trades at 25-30x revenue in public markets. These
              multiples reward defense-native SaaS with high switching costs and recurring government contract value.
              For Gecko to justify Anduril-level multiples, it would need confirmed recurring Cantilever SaaS revenue at
              $125M+ ARR and demonstrated NRR above 120%.

              Inspection-robotics startups: ANYbotics, Boston Dynamics (Hyundai subsidiary), Percepto, Skydio, and
              Invert Robotics compete in adjacent markets. The VentureRadar comparable set for Gecko includes Voliro,
              Invert Robotics, Planys Technologies, and Energy Robotics, none of which have disclosed valuations
              sufficient to anchor a private comp analysis. Skydio raised at $2.2B in 2021 on drone defense momentum but
              faced valuation pressure thereafter. Private comp multiples for inspection robotics typically ranged 5-15x
              ARR in the 2021-2023 bull market, compressing 30-50% in 2023-2025.
            claimRefs:
              - CV007
              - CV019
              - CV009
              - CV008
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
              - CV010
      - number: '8.5'
        title: Exit Readiness and Final Diligence
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics is approximately 2-4 years from a plausible exit, with IPO and strategic M&A both viable
              paths. The IPO path requires continued growth to achieve $300M+ revenue and demonstration of SaaS
              re-rating, conditions that typically take 3-5 years from unicorn status. The defense-tech IPO window
              (Palantir 2020, Joby 2024) favors companies with visible government backlog, and Gecko's Navy IDIQ, Air
              Force, and BPMI contracts provide exactly that narrative. However, Gecko would need to resolve the Summit
              NDE lawsuit and achieve GAAP profitability (or a clear path to it) before public markets would absorb the
              offering at favorable multiples.

              Strategic M&A is a more near-term scenario. Likely acquirers include: L3Harris Technologies, which already
              has an XR collaboration agreement and would benefit from Cantilever data to support aircraft sustainment;
              Baker Hughes, which owns Waygate Technologies and could integrate Gecko's robotics and SaaS layer with
              Waygate's sensor hardware; Anduril Industries, which is building a defense-tech platform and could absorb
              Gecko's critical-infrastructure inspection into its Lattice OS; and a hyperscaler seeking physical-AI
              differentiation. Strategic acquirers typically pay 15-30% premium above fair-value comps, which at a $1.5B
              fair value would imply a $1.7-2.0B acquisition price, marginally above the Series D entry.

              Pre-investment diligence priorities are ranked by value-change impact. The single highest-priority ask is
              audited financial statements for FY2023, FY2024, and FY2025, including revenue segmentation (services vs.
              SaaS), gross margin by segment, and Cantilever ARR with cohort retention data. Without this, no investment
              committee can responsibly approve the deal at the $1.25B valuation. Secondary priorities are cap-table and
              preference-stack review, outside-counsel opinion on the Summit NDE litigation exposure, verification of
              actual Navy task-order payments, and Cantilever SaaS NRR and churn cohort data. Jake Loosararian's
              appearance as a featured speaker at ADIPEC 2025 signals active Middle East pipeline development beyond the
              ADNOC Gas contract. The investment stance is research-more with a 90-day diligence clock.
            claimRefs:
              - CV018
              - CV025
              - CV026
              - CV018
              - CV027
              - CV028
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Recommendation: research-more at $1.25B'
            body: >
              The investment thesis for Gecko Robotics is structurally compelling: a defensible AI and robotics platform
              at the intersection of critical infrastructure, defense modernization, and energy transition. Markets with
              long-duration secular tailwinds and rising regulatory demand for automated inspection support a strong
              market-size argument. The Series D unicorn valuation reflects genuine commercial momentum (NAES, Navy,
              ADNOC) and strategic investor validation (Cox Enterprises, Founders Fund). However, without audited
              financials and Cantilever SaaS retention data, the $1.25B entry price cannot be justified with high
              confidence. The probability-weighted exit value at current evidence quality is approximately $816M, below
              the Series D price. Upgrade to buy conditional on: (1) ARR >= $100M with NRR >= 110% confirmed in audit;
              (2) Navy task-order actuals >= $30M obligated; (3) Summit NDE litigation resolved or quantified with
              limited financial exposure.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV014
              - CV015
              - CV018
              - CV007
              - CV018
          - type: callout
            title: Valuation-to-Evidence Gap Is the Primary Risk
            body: >
              The largest risk is informational, not competitive, technical, or regulatory. At $1.25B, investors are
              pricing a SaaS re-rating that may not yet have occurred. MISTRAS Group, the best public comp, trades at
              0.5x revenue; Gecko requires 8-15x to justify its current valuation. That multiple gap is bridgeable only
              with proof of Cantilever SaaS penetration, high NRR, and gross margins above 50%. Without that proof,
              investment at $1.25B embeds a speculative premium that is highly correlated with the bear scenario if
              Cantilever has not successfully converted defense and commercial customers to recurring subscription.
            calloutType: risk
            claimRefs:
              - CV010
              - CV007
              - CV019
              - CV010
          - type: callout
            title: Defense Moat and Cox Enterprises Signal Genuine Commercial Traction
            body: >
              The Navy IDIQ ($71M ceiling, 18 Pacific Fleet ships), BPMI nuclear propulsion partnership, Air Force
              Sentinel ICBM contract, and Columbia-class submarine demo form a defense moat structurally difficult to
              replicate. ITAR constraints on technology transfers, DoD security clearances, and accumulated structural
              data make Gecko's platform sticky within the defense customer base. Cox Enterprises leading the Series D
              represents an independent strategic validation: Cox has energy and media infrastructure exposure and would
              have conducted proprietary commercial due diligence before leading a $125M round.
            calloutType: strength
            claimRefs:
              - CV003
              - CV005
              - CV011
              - CV012
              - CV013
