  - id: FU001
    title: Customer Journey Map
    type: journey-map
    layout: wide
    summary: |
      Five-stage customer journey model for Gecko Robotics across enterprise customer
      types. The journey from awareness to advocacy reflects the FDE-driven relationship
      deepening pattern observed in defense and commercial customer acquisitions.
    data:
      items:
        - channel: Press / WEF / CNBC / Gov't procurement
          description: >-
            Customer encounters Gecko via industry press, WEF coverage, or government IDIQ solicitation. Defense pathway
            often originates in DoD procurement relationships.
          label: Awareness
        - channel: FDE pilot or demonstration robots
          description: >-
            Gecko proposes an on-site robot demonstration on customer assets — a flight deck, fabrication floor, storage
            tank, or ship hull. Pilot yields 99.6% coverage result (ADNOC) or 90% inspection span reduction (BPMI).
          label: Evaluation / Pilot
        - channel: Commercial contract or government IDIQ
          description: >-
            First production contract signed — direct commercial multi-year (NAES, ADNOC) or government vehicle (IDIQ
            via GSA; BlueForge Alliance for Columbia-class). Average initial term is 3–5 years.
          label: Initial Contract
        - channel: FDE deepening + module cross-sell + option exercise
          description: >-
            Embedded FDE team builds mission-specific Cantilever extensions. Customer expands from 1 module to 2+ (Navy:
            SUSTAIN + BUILD). Contract options exercised (NAES $250M option). New facilities added (Trident: 20 sites).
          label: Expansion
        - channel: Named executive quote + co-authored press release + case study
          description: >-
            Customer provides public endorsement (BPMI President; NAES President; Navy CTO; Trident COO). Customer
            appears in Gecko case studies or co-authors press releases, validating ROI to peers.
          label: Advocacy
