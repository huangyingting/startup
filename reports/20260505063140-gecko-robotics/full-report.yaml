chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Product, and Business Model
        blocks:
          - type: paragraph
            body: >
              Gecko Robotics, Inc. is a Pittsburgh, Pennsylvania-based technology company founded in 2013 by Jake
              Loosararian (CEO) and Troy Demmer (Chief Product Officer). Both founders attended Grove City College;
              Demmer also holds a Carnegie Mellon MBA. Gecko's registered address is 100 S Commons, Suite 145,
              Pittsburgh, PA 15212. The company opened an international headquarters in the United Arab Emirates under
              the Ministry of Economy's NextGenFDI program, establishing a Middle East presence ahead of the April 2024
              ADNOC Gas contract.


              Gecko's mission is to use AI and robotics to build, operate, and maintain the world's most critical
              physical infrastructure. The company frames its offering as the "AIR" model — AI + Robotics — combining
              autonomous data collection hardware with an AI software platform called Cantilever®. Wall-climbing robots,
              drones, robot dogs, and fixed sensors collect high-resolution physical data on structures such as ship
              hulls, boiler tubes, nuclear missile silos, and pipeline segments. Cantilever then aggregates these data
              layers with operational data to produce predictive maintenance recommendations, digital twins, and
              actionable asset-health insights.


              The business model is contract-based: multi-year service and software agreements with industrial
              operators, defense agencies, and energy companies. Notable revenue signals include a U.S. Navy IDIQ
              ceiling of $71M (2026), a NAES energy deal valued at $100M+ (2025), an ADNOC Gas contract of ~$30M (2024),
              and a Trident Maritime partnership covering 20 facilities (2026). Revenue figures are not publicly
              disclosed. The company is at Series D stage (pre-IPO) and remains privately held as of the May 2026 run
              date.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
