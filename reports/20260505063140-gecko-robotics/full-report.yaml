      - number: '1.5'
        title: Milestones and Strategic Trajectory
        blocks:
          - type: paragraph
            body: >
              Gecko's trajectory reflects a deliberate shift from an industrial inspection services company toward a
              dual-use AI-data platform company with defense as the primary growth engine. The founding origin story
              (power plant boiler failures, manual rope-dangling inspectors) anchored the company in unsexy but high-ROI
              industrial maintenance. YC accelerated the pivot to a scalable technology model.


              The 2022–2023 period marked Gecko's explicit defense pivot: the Air Force Sentinel contract (Dec 2022),
              Columbia-class sub contract (Nov 2023), and Series C extension with defense-aligned investors USIT and
              Founders Fund (Dec 2023) all followed in rapid succession. The 2025 year saw the NAES $100M energy deal,
              BPMI partnership, and Series D unicorn round. In 2026, the $71M Navy IDIQ and Trident partnership signal
              further defense industrial base expansion.


              The 2023 trade-secret lawsuit against Summit NDE, LLC highlights competitive exposure in the inspection
              technology space and affirms that key employees have been pursued by smaller competitors. The case was
              filed in U.S. District Court (N.D. Indiana) in July 2023; its resolution is not publicly confirmed as of
              this report.


              Jake Loosararian's January 2026 World Economic Forum piece ("From Steel to Data: The Next AI Revolution")
              frames Gecko as a platform company competing for the role of the AI revolution's data substrate provider —
              positioning analogous to how Carnegie Steel enabled the Industrial Revolution. This narrative consistency
              across founder communications and investor materials signals strong CEO conviction and alignment but also
              concentration of strategic messaging in a single founder.
