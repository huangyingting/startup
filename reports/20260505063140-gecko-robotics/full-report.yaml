  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview and Vertical Segmentation
        blocks:
          - type: paragraph
            body: |
              Gecko Robotics serves customers across at least seven industrial verticals as of mid-2026,
              spanning U.S. government defense programs, domestic commercial energy operators, and
              international state-owned energy companies. Named customers with publicly documented
              contracts include the U.S. Navy (Pacific Fleet surface ships and submarine programs),
              BPMI (Bechtel Plant Machinery — nuclear component manufacturing for the Naval Nuclear
              Propulsion Program), Trident Maritime Systems (U.S. Navy supply chain), the U.S. Air
              Force (Sentinel ICBM silo modernization), ADNOC Gas (Abu Dhabi), NAES Corporation (U.S.
              power grid), and L3Harris Technologies (aircraft maintenance). Unnamed customers in
              published case studies include a large steel manufacturer and a pulp and paper mill.
              A reference to Freeport-McMoRan on Gecko's mining industry page implies a mining
              customer relationship, but no contract details have been published.

              The customer base maps onto Cantilever's three workflow modules. BUILD (advanced
              manufacturing quality assurance) customers include BPMI, Trident, and the Columbia-class
              submarine program. SUSTAIN (maritime and asset health) customers include the U.S. Navy
              surface fleet, USAF Sentinel, and ADNOC Gas. MODERNIZE (legacy infrastructure digitization)
              customers include NAES, the anonymous steel mill, the pulp mill, and power plant operators.
              The Navy relationship spans both BUILD and SUSTAIN phases, making it a cross-module
              deployment. No European or Asia-Pacific production customers have been publicly confirmed.
              International revenue is currently limited to ADNOC Gas in the UAE.

              Gecko opened an international headquarters in Abu Dhabi under the Ministry of Economy's
              NextGenFDI program, and the November 2025 announcement of ongoing ADNOC AI and robotics
              skills training confirms the Middle East footprint is active. The CEO has presented at
              the World Economic Forum Annual Meeting (January 2026), citing Gecko's global ambitions
              for industrial asset intelligence. However, no contracts outside the U.S. and UAE have
              been publicly disclosed as of the May 2026 run date.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
      - number: '6.2'
        title: Named Customer Proof — U.S. Defense and Government Programs
        blocks:
          - type: paragraph
            body: |
              Gecko's defense customer portfolio is the most thoroughly documented segment, with five
              distinct U.S. military program relationships evidenced through official press releases,
              U.S. government spending records, and third-party news coverage.

              The U.S. Navy relationship is the single largest confirmed contract. A five-year IDIQ
              with a $71M ceiling was awarded via GSA in March 2026, covering 18 ships in the U.S.
              Pacific Fleet as the initial task order ($54M ceiling). The GSA vehicle is accessible
              to all U.S. military services. Prior to this IDIQ, Gecko worked across the Navy's
              surface fleet — destroyers, amphibious warships, aircraft carriers — and both Virginia-
              class and Columbia-class nuclear submarine programs. A single robotic evaluation of a
              Navy flight deck eliminated over 208 days of potential maintenance delay. The Chief of
              Naval Operations' 80% fleet readiness target by 2027 was cited in the contract
              announcement. Navy CTO Justin Fanelli and Senator Dave McCormick provided named
              endorsements. A January 2025 GAO report on Navy surface ships documented the structural
              maintenance backlogs that make Gecko's offering mission-critical.

              BPMI, the prime contractor for the Naval Nuclear Propulsion Program, announced a
              production partnership in July 2025 reducing inspection spans for forged components
              by up to 90% — from weeks to days. BPMI President Barb Staniscia provided a named
              executive endorsement. Trident Maritime Systems announced a January 2026 partnership
              across 20 fabrication facilities targeting 40% throughput improvement; Trident COO
              Trip Mullen endorsed the results. The Columbia-class submarine demonstration contract
              (November 2023, via BlueForge Alliance) validates weld inspection ROI across the
              supply chain. The USAF Sentinel ICBM program is documented via USASpending.gov award
              FA942222C0015 and confirmed in Gecko's December 2023 Series C extension press release.
            claimRefs:
              - CU006
              - CU007
              - CU008
              - CU009
              - CU010
              - CU011
              - CU012
      - number: '6.3'
        title: Named Customer Proof — Commercial and International
        blocks:
          - type: paragraph
            body: |
              Outside defense, Gecko's largest confirmed commercial contracts are NAES (U.S. power)
              and ADNOC Gas (UAE oil and gas), supplemented by anonymous industrial case studies
              and the L3Harris aerospace collaboration.

              NAES Corporation, "America's largest independent power operator with 65GW under
              management," announced a $100M+ multi-year deal in February 2025 with an option to
              grow beyond $250M. The agreement targets thermal and renewable energy assets and
              includes White House backing tied to the national energy emergency declaration.
              Governor Josh Shapiro of Pennsylvania, NAES President Mark Dobler, and CEO Loosararian
              all provided named endorsements. The Robot Report, POWER magazine, and NAES's own
              partnership page independently confirm the deal — triple-source corroboration.

              ADNOC Gas (ADX: ADNOCGAS), a state-owned Abu Dhabi National Oil Company subsidiary,
              signed a multi-year contract in April 2024 valued at AED 110M ($30M USD) through Al
              Masaood Energy as local partner. Pilot results showed 99.6% increase in asset coverage
              and 93%+ efficiency improvement over manual processes. The contract enables online
              inspections while assets remain operational, and is projected to reduce Lost Time
              Injury rates by 33% by eliminating scaffold requirements. offshore-technology.com
              independently confirmed the contract details. A November 2025 Gecko news headline
              confirms the ADNOC relationship was active 18+ months after the contract signing.

              The L3Harris collaboration (announced April 2025) is a joint development partnership
              on XR aircraft inspection using drone-based 3D imaging, tested over 12 months with
              multiple military customers. Anonymous case studies include a steel mill ($40M annual
              value, 5x ROI, 30% downtime reduction) and a pulp mill ($3M per tank savings, 10-year
              life extension).
            claimRefs:
              - CU013
              - CU014
              - CU015
              - CU016
              - CU017
              - CU018
              - CU019
              - CU020
              - CU021
      - number: '6.4'
        title: Adoption Trajectory, FDE Stickiness, and Retention Signals
        blocks:
          - type: paragraph
            body: |
              Gecko's customer acquisition trajectory shows clear acceleration from 2022 to mid-2026.
              From 2015 to 2022, Gecko built its reputation in power generation and oil and gas with
              unnamed industrial customers. The 2022–2023 period formalized defense relationships:
              USAF Sentinel (2022), Columbia-class demonstration (November 2023), and Series C + Series
              C extension ($173M total) with Founders Fund and USIT board seats reflecting institutional
              defense investor confidence. From 2024 to mid-2026, the portfolio expanded with ADNOC
              (April 2024), NAES (February 2025), BPMI (July 2025), Trident (January 2026), and the
              Navy IDIQ (March 2026). The Series D ($125M, June 2025) at a $1.25B valuation cited
              NAES, L3Harris, and ADNOC as momentum proof-points.

              Retention signals are strong in the public record. The Navy relationship evolved from
              surface fleet maintenance to submarine programs to a government-wide IDIQ — consistent
              with a deepening, multi-phase engagement. ADNOC Gas continued into a multi-year contract
              and the November 2025 training initiative signals ongoing relationship investment. The
              NAES deal includes a $250M option for expansion. Cox Enterprises (Series D lead) and
              Founders Fund both cited customer durability and cross-vertical breadth as investment
              thesis anchors.

              The Forward Deployed Engineering model is Gecko's primary retention mechanism. By
              embedding engineers at customer sites to build mission-specific Cantilever extensions,
              Gecko creates three switching cost layers: proprietary digital twins and historical data,
              custom software workflows, and FDE staff institutional knowledge. No public evidence of
              customer churn, contract cancellations, or customer-facing complaints appeared in any
              reviewed source. The Forbes founder profile (2022) describes power plant customers with
              multi-year tenure dating to 2015–2017, suggesting long-lived customer relationships.
            claimRefs:
              - CU022
              - CU023
              - CU024
              - CU025
              - CU026
              - CU027
      - number: '6.5'
        title: Customer Concentration, Adverse Signals, and Diligence Gaps
        blocks:
          - type: paragraph
            body: |
              Customer concentration risk is material. Defense and government programs represent
              five of eight named customers (Navy, BPMI, Trident, Columbia-class, USAF Sentinel) and
              a majority of publicly disclosed contract value. Commercial customers NAES ($100M+) and
              ADNOC ($30M) add meaningful diversification, but no European or Asia-Pacific production
              customers have been announced. A single government budget cycle change could materially
              affect Gecko's revenue trajectory, particularly given IDIQ-structured contracts.

              The primary adverse signal is a 2023 trade secret lawsuit: Gecko Robotics, Inc. v.
              Summit NDE, LLC (N.D. Indiana, No. 2:23CV229). Gecko alleged two former employees who
              joined competitor Summit NDE misappropriated inspection technology trade secrets. This
              is a competitive IP dispute — not a customer-facing dispute — and no customer relationship
              is implicated in the available public record. No evidence of customer churn, contract
              cancellations, or customer complaints appeared in public sources reviewed.

              Channel dependency risk exists: the ADNOC deal was structured through Al Masaood Energy
              as a local UAE channel partner, and the Navy IDIQ runs through the GSA government-wide
              vehicle. Intermediary channels could introduce margin or control risk if those partner
              relationships evolve. Steel, pulp, and mining customers are anonymous in all public
              materials, making relationship depth and satisfaction unverifiable from outside. No NPS
              data, renewal rates, or NRR metrics have been publicly disclosed, making retention quality
              unquantifiable from external analysis.
            claimRefs:
              - CU028
              - CU029
              - CU030
              - CU031
