      - number: '5.4'
        title: Technical Risks and Quality / Compliance
        blocks:
          - type: paragraph
            body: >
              Wiz operates at massive scale — the Security Graph indexes cloud environments with millions of resources —
              presenting several technical risk areas. First, cloud API dependency: all of Wiz's data ingestion relies
              on cloud provider APIs (AWS, Azure, GCP). Any API deprecation, rate limiting, or change in permissions
              model by a hyperscaler could degrade Wiz's visibility or create compliance gaps. Second, data privacy in
              shared graph model: Wiz processes sensitive customer cloud metadata (resource configurations, identity
              information, data classification results) in a multi-tenant environment. A data isolation failure could
              expose one customer's cloud topology to another — a material security and contractual risk. Third,
              regulatory compliance: Wiz has achieved SOC 2 Type II, ISO 27001, and CSA STAR Level 2 certifications;
              FedRAMP authorization is in progress. GDPR compliance is maintained for EU customers through a separate EU
              data residency offering. Fourth, developer signal: Wiz's open-source community presence (Wiz research
              blog, vulnerability disclosures) generates organic developer awareness but requires sustained investment
