      - number: '3.2'
        title: Primary Competitor Analysis
        blocks:
          - type: paragraph
            body: >
              Palo Alto Networks Prisma Cloud is Wiz's primary enterprise competitor, with an estimated $800M–$1B+
              CNAPP/cloud ARR (embedded within PANW's platform revenue). Prisma Cloud's key advantage is incumbent
              enterprise relationships via the Palo Alto firewall and NGFW installed base — approximately 80,000
              enterprise customers. However, Prisma Cloud has a reputation for deployment complexity (agent-based
              architecture) and a higher total cost of ownership, which has made Wiz's agentless approach attractive for
              competitive displacement. CrowdStrike Falcon Cloud Security (formerly Falcon Horizon/CSPM) is the second
              major threat: CrowdStrike's Falcon XDR platform has achieved deep SOC integration and endpoint telemetry
              that provides runtime threat detection Wiz's agentless approach cannot match at the same depth. Microsoft
              Defender for Cloud presents the greatest structural risk as a free/bundled offering for Azure customers —
              however its multi-cloud support is perceived as weaker than Wiz's.
