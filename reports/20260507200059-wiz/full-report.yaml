      - number: '2.3'
        title: Market Segmentation and Buyer Dynamics
        blocks:
          - type: paragraph
            body: >
              Wiz's primary buyers are enterprise and mid-market cloud security teams (CISO, cloud security architect,
              DevSecOps lead) at companies with $1B+ revenue and significant cloud footprint. The typical Wiz
              decision-maker is the VP of Security Engineering or CISO at a Fortune 500 company, with influence from the
              cloud platform team (AWS/Azure/GCP architect) and the development team (shift-left security). The key
              buying segments are: (1) pure-cloud enterprises (tech, SaaS, digital-native) — fastest adoption, highest
              NRR, first CNAPP buyers; (2) hybrid enterprises (financial services, healthcare, retail) — large budget,
              complex multi-cloud, compliance-driven; (3) regulated industries (government, defense, critical
              infrastructure) — slower procurement but largest contracts; and (4) mid-market growth companies ($100–500M
              revenue) — high-velocity sales, lower ACVs, price-sensitive. Each segment values Wiz differently:
              pure-cloud enterprises value speed-to-value (no agent deployment), hybrid enterprises value compliance
              reporting, and regulated industries value FedRAMP-authorized tooling.
            claimRefs: []
