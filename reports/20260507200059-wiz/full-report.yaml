      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: AI Workload Security Is a First-Mover Category Worth $2–5B by 2030
            body: >
              Wiz for AI (launched 2025) positions Wiz as the first established CNAPP vendor to address AI
              infrastructure security posture — including LLM inference servers, training pipelines, and GenAI
              application security. This is an emerging sub-market estimated at $100–300M in 2024 but growing at 50–70%
              CAGR as enterprise AI workload adoption accelerates. First-mover advantage in AI security could add $1–3B
              to Wiz's long-term ARR potential.
            calloutType: insight
            claimRefs:
              - CM003
              - CM013
          - type: callout
            title: Hyperscaler Bundling Is the Most Disruptive Long-Term Market Risk
            body: >
              AWS, Azure, and Google collectively process 70%+ of enterprise cloud workloads and all offer native
              security tools at zero or minimal additional cost. While these tools lack multi-cloud breadth, they are
              improving rapidly. Any significant AWS Security Hub or Azure Defender capability improvement —
              particularly for single-cloud customers — could convert a portion of Wiz's installed base to bundled tools
              at renewal, particularly for cost-sensitive mid-market customers.
            calloutType: insight
            claimRefs:
              - CM014
              - CM017
          - type: callout
            title: CNAPP Market Growing 25–30% CAGR — Fastest in Security
            body: >
              The CNAPP market is the fastest-growing sub-segment of cybersecurity, expanding at 25–30% CAGR vs. 10–12%
              for overall cybersecurity. This reflects the structural shift of enterprise workloads to cloud
              environments. Wiz's 43%+ ARR growth in 2024 (surpassing market CAGR) implies it is taking share — from
              both incumbents (Palo Alto Prisma) and point tools (standalone CSPM).
            calloutType: insight
            claimRefs:
              - CM002
              - CM004
              - CM006
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Market Overview
        blocks:
          - type: paragraph
            body: >
              Wiz competes in the Cloud Native Application Protection Platform (CNAPP) market, which Gartner defined in
              2021 and has rapidly attracted large incumbents (Palo Alto Networks, CrowdStrike, Microsoft) and
              specialized challengers (Orca Security, Aqua Security, Sysdig, Lacework). The competitive landscape is
              characterized by three tiers: (1) platform consolidators (Palo Alto Networks Prisma Cloud, CrowdStrike
              Falcon Cloud Security, Microsoft Defender for Cloud) which bundle CNAPP capabilities into multi-product
              security suites; (2) cloud-native specialists (Wiz, Orca Security, Lacework/Fortinet) which build
              ground-up for cloud environments; and (3) workload-specific tools (Aqua Security, Sysdig, Snyk) which
              dominate container/Kubernetes security or developer-centric scanning. Wiz has differentiated itself
              through the Security Graph model — a unified graph database that connects cloud resources, identities,
              workloads, and configurations to surface the toxic combination attack paths — an architecture no direct
              competitor has replicated at the same depth. Wiz holds the Gartner CNAPP Magic Quadrant Leader position as
              of 2024, its first year in the Leader quadrant.
            claimRefs: []
