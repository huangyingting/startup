      - number: '5.3'
        title: Technical Differentiation and Innovation
        blocks:
          - type: paragraph
            body: >
              Wiz's technology innovation is concentrated in three areas. The Security Graph engine processes and
              normalizes data from cloud APIs, agent-optional runtime sensors, code repositories, and identity providers
              into a single graph model. The graph currently indexes more than one million cloud resources per
              enterprise deployment at the largest customers, with query performance supporting real-time risk
              prioritization. The Toxic Combination detection algorithm — Wiz's proprietary risk prioritization engine —
              analyzes multi-hop attack paths through the Security Graph, surfacing the top 1–3% of findings that
              represent truly critical risk vs. the thousands of raw policy violations most cloud environments generate.
              This algorithm is the primary driver of customer ROI and has been the focus of ongoing R&D investment
              since the founding team joined from Microsoft Azure. The AI Security module (Wiz for AI) is technically
              differentiated by its ability to discover and classify AI workloads (Jupyter notebooks, MLflow instances,
              vector databases, LLM API endpoints) without agents, map their access and egress paths through the
              Security Graph, and apply specialized AI-specific policies — including OWASP LLM Top 10 checks and custom
              GenAI governance policies. This is a technically novel capability not available from any competitor.
