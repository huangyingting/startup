  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              Wiz competes primarily in the Cloud Native Application Protection Platform (CNAPP) and Cloud Security
              Posture Management (CSPM) markets, which are subsets of the broader cloud security and information
              security markets. CNAPP is a platform category coined by Gartner in 2021 that consolidates CSPM (cloud
              configuration auditing), CWPP (cloud workload protection), CIEM (cloud identity entitlement management),
              DSPM (data security posture management), and CDR (cloud detection and response) into a single integrated
              platform. The relevant TAM for Wiz spans four layers: (1) the global cloud security market ($80–100B+ by
              2030 at 15–18% CAGR); (2) the CNAPP sub-market (~$10–15B by 2028); (3) the CSPM sub-segment (~$5–8B by
              2027); and (4) the broader enterprise cybersecurity market ($300B+). Wiz's current SAM is primarily
              enterprise and mid-market companies with meaningful cloud infrastructure (AWS, Azure, GCP, OCI) —
              estimated at $15–25B globally. The SOM, reflecting Wiz's actual addressable share in a 3–5 year window at
              current growth rates and competitive dynamics, is estimated at $3–8B ARR, depending on platform expansion
              success into DSPM, CDR, and Wiz for AI.
            claimRefs: []
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: figure
            figureRef: FM001
