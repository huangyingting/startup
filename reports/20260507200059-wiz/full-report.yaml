      - number: '1.3'
        title: Funding and Valuation History
        blocks:
          - type: paragraph
            body: >
              Wiz has raised approximately $2.7–2.8 billion in total venture capital across five confirmed rounds, all
              within five years of founding — one of the fastest capital accumulation trajectories in enterprise SaaS
              history. The Series A raised $100M at a $1B valuation in January 2021 (13 months after founding). Series B
              raised $250M at $6B valuation in October 2021. Series C raised $300M at $10B valuation in February 2022.
              Series E raised $1B at $12B valuation in May 2024 — the key round within the diligence window. In 2025,
              Wiz raised an additional ~$1 billion at a reported $32B valuation (Series F), confirming continued
              investor conviction at a nearly 3× step-up from the 2024 round. Key investors include Sequoia Capital,
              Andreessen Horowitz (a16z), Index Ventures, Greenoaks Capital, General Atlantic, Lightspeed Venture
              Partners, and Insight Partners. In July 2024, Alphabet (Google's parent) reportedly offered $23 billion to
              acquire Wiz outright; Rappaport declined in favor of pursuing an independent IPO path — one of the largest
              rejected acquisition offers in enterprise SaaS history.
