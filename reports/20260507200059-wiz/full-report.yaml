      - number: '2.4'
        title: Market Constraints and Headwinds
        blocks:
          - type: paragraph
            body: >
              Three structural headwinds moderate the cloud security market opportunity for Wiz. First, hyperscaler
              competition: AWS, Azure, and Google all offer native security tools (Security Hub, Defender for Cloud,
              Security Command Center) that are bundled at low or zero marginal cost into their platforms. These tools
              lack the multi-cloud and third-party integration depth of Wiz but are increasingly capable and create
              budget pressure on independent cloud security vendors. Second, platform consolidation: large security
              platform vendors — Palo Alto Networks (Prisma Cloud), CrowdStrike (Falcon Cloud Security), and Microsoft
              (Defender) — are bundling CNAPP capabilities into broader enterprise security suites, creating a "platform
              vs. best-of-breed" buying dynamic where Wiz must demonstrate standalone value vs. included modules. Third,
              budget pressure: enterprise security budgets are being scrutinized for consolidation following 2022–2023
              SaaS spending rationalization; customers may defer CNAPP renewals or consolidate onto platform vendors,
              compressing Wiz's pricing power.
            claimRefs: []
