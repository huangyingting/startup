      - number: '2.2'
        title: Market Drivers and Tailwinds
        blocks:
          - type: paragraph
            body: >
              Four structural forces are accelerating demand for cloud security platforms. First, cloud adoption
              continues to expand at 20%+ CAGR: AWS, Azure, and GCP collectively process more than 70% of enterprise
              workloads by 2025, creating an ever-expanding attack surface that legacy on-premise security tools cannot
              address. Second, the attack surface complexity is compounding: multi-cloud environments (average
              enterprise uses 2.6 clouds), microservices architectures, containers, serverless, and AI/LLM workloads
              each introduce new configuration and identity risks that require dedicated CNAPP tooling. Third,
              regulatory compliance pressure is intensifying: SEC's 2023 cybersecurity disclosure rules, CISA's Secure
              by Design framework, and the EU NIS2 Directive all increase the cost of cloud misconfigurations and
              accelerate enterprise security spending. Fourth, breach economics are improving for attackers and
              worsening for defenders: the average cost of a data breach reached $4.88 million in 2024 (IBM/Ponemon),
              with cloud-specific misconfigurations cited as a leading attack vector. These four forces create a
              durable, non-discretionary demand cycle for CNAPP.
            claimRefs: []
          - type: table
            tableRef: TM002
            claimRefs:
              - CM002
              - CM005
              - CM006
          - type: figure
            figureRef: FM002
            claimRefs:
