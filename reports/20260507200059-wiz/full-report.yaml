              Alphabet's reported $23B acquisition offer in July 2024 represents the highest price ever offered for a
              cloud security company. Wiz's rejection signals that the founders and investors believe the IPO path
              yields materially higher returns, likely expecting a $30–50B+ public market valuation. The rejection also
