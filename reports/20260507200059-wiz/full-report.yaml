      - number: '3.4'
        title: Competitive Displacement and Win/Loss Dynamics
        blocks:
          - type: paragraph
            body: >
              Wiz has achieved significant competitive displacement wins against Palo Alto Networks Prisma Cloud,
              particularly in Fortune 500 accounts evaluating CNAPP replacements. Industry sources indicate Wiz wins
              approximately 70%+ of head-to-head POCs against Prisma Cloud on time-to-value and agentless architecture
