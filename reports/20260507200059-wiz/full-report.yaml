      - number: '5.2'
        title: Platform Modules and Product Portfolio
        blocks:
          - type: paragraph
            body: >
              Wiz has evolved from a CSPM point tool into a seven-module CNAPP platform since 2020. Core CSPM (Cloud
              Security Posture Management): continuous configuration assessment across all cloud resources, with 1,400+
              built-in checks covering CIS benchmarks, NIST CSF, SOC 2, PCI DSS, HIPAA, ISO 27001, and custom policies.
              CWPP (Cloud Workload Protection Platform): vulnerability management for containers, VMs, and serverless —
              including OS CVE scanning, container image scanning via Wiz's agentless snapshot approach. CIEM (Cloud
              Identity Entitlement Management): analysis of IAM roles, permissions, service account usage, and excessive
              privilege across multi-cloud environments. DSPM (Data Security Posture Management, launched 2023):
              automated data classification, sensitive data exposure mapping, and data access risk analysis — covering
              structured and unstructured data in cloud storage, databases, and SaaS applications. CDR (Cloud Detection
              and Response, via Gem Security acquisition): real-time threat detection using eBPF-based runtime sensors
              and behavioral analysis, integrated with the Security Graph for context-enriched alerting. Wiz Code
              (shift-left security, 2022): infrastructure-as-code scanning, SAST, and secrets detection embedded in
              CI/CD pipelines (GitHub Actions, GitLab, Jenkins, Azure DevOps). Wiz for AI (2025): AI Security Posture
              Management covering LLM inference servers, AI model access controls, AI pipeline scanning, and shadow AI
              workload discovery.
