      - number: '1.2'
        title: Founding Story and Team
        blocks:
          - type: paragraph
            body: >
              All four Wiz co-founders spent years at Microsoft together, most recently building Azure Security Center
              (now Microsoft Defender for Cloud) after Microsoft acquired their prior startup Adallom in 2015. Assaf
              Rappaport served as VP of R&D at Microsoft Azure; Yinon Costica led product for Azure cloud security; Roy
              Reznik led engineering for Azure security products; Ami Luttwak served as a principal engineering manager.
              Their shared experience building large-scale cloud security infrastructure gave them firsthand knowledge
              of the agentless, graph-based approach's superiority over legacy agent-based tools. The team left
              Microsoft in late 2019 to found Wiz with the specific thesis that cloud security needed to be rebuilt from
              the ground up as a cloud-native SaaS product. Wiz's founding team also benefits from deep Israeli
              intelligence community alumni networks — Rappaport served in Israeli Intelligence Unit 8200, as did
              several early employees — providing access to elite security engineering talent. Wiz was incorporated in
              January 2020 and shipped its first product within 6 months.
