      - number: '3.3'
        title: Wiz's Competitive Moat Analysis
        blocks:
          - type: paragraph
            body: >
              Wiz's competitive differentiation rests on four reinforcing pillars. First, the Security Graph: a
              proprietary unified graph database connecting all cloud assets, identities, configurations, network paths,
              and data across multi-cloud environments. This graph enables "toxic combination" detection — surfacing
              attack paths that no single-dimension scan can find — and requires deep cloud API integration that takes
              12–18 months to build per cloud platform. Second, agentless deployment: Wiz deploys in under one hour with
              zero agent installation, making its time-to-value dramatically faster than agent-based platforms. This is
              a structural advantage in competitive evaluations (POC win rate). Third, the Fortune 100 brand halo:
              40–45%+ of Fortune 100 use Wiz, which functions as social proof in enterprise sales cycles. Fourth,
              breadth of coverage: Wiz's platform covers CSPM, CWPP, CIEM, DSPM, CDR, Wiz Code (shift-left), and Wiz for
              AI — matching or exceeding Prisma Cloud's module breadth within a single platform.
            claimRefs: []
