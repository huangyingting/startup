chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Wiz is a New York City–based cloud security company founded in January 2020 by four ex-Microsoft Azure
              veterans — Assaf Rappaport (CEO), Yinon Costica (President), Roy Reznik (CTO), and Ami Luttwak (Chief
              Technology Officer). The company built the leading Cloud Native Application Protection Platform (CNAPP)
              and Cloud Security Posture Management (CSPM) tool for enterprise cloud environments, using an agentless
              scanning architecture that reads directly from cloud provider APIs (AWS, Azure, GCP, OCI) without
              deploying software agents on individual workloads. Wiz's core business model is a SaaS subscription priced
              per cloud resource or workload, sold as an annual contract directly to enterprise security and cloud
              teams. The platform generates a proprietary "security graph" that unifies all cloud identities, workloads,
              data, and network configurations to expose lateral movement paths and toxic risk combinations that siloed
              tools miss. As of May 2026, Wiz has grown to one of the fastest-scaling enterprise SaaS companies ever
              built, reaching $100M ARR in 18 months and reportedly surpassing $500M ARR by late 2024, with 40%+ of
              Fortune 100 companies among its customer base.
