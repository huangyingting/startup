  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Architecture and Technology Foundation
        blocks:
          - type: paragraph
            body: >
              Wiz's technical differentiation rests on three foundational architectural choices that collectively enable
              capabilities no agent-based or point-tool competitor can match. First, the agentless scanning engine: Wiz
              reads cloud environment state entirely through cloud provider APIs (AWS, Azure, GCP, OCI) and proprietary
              snapshot-based scanning — never installing agents on customer workloads. This approach provides instant
              deployment (<1 hour), zero operational overhead, and complete coverage of ephemeral cloud resources
              (serverless functions, containers, short-lived VMs) that agents would miss. Second, the Security Graph
              database: all cloud resources (compute, identity, network, data, code, configurations) are ingested into a
              proprietary graph database that models relationships between cloud entities. The graph enables Toxic
              Combination detection — a unique capability that identifies the chain of conditions (e.g., public exposure
              + over-privileged identity + unpatched OS + sensitive data) that constitutes a critical attack path,
              rather than alerting on each condition individually. This dramatically reduces alert fatigue and false
              positives. Third, unified multi-cloud coverage: a single Wiz deployment covers AWS, Azure, GCP, Oracle
              Cloud, and Alibaba Cloud — covering over 98% of enterprise cloud environments — through a single
              normalized security model and single pane of glass.
            claimRefs: []
