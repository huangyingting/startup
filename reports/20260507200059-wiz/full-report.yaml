            title: Fastest Enterprise SaaS Scaling in History
            body: >
              Wiz reached $100M ARR in 18 months and $500M ARR in approximately 4 years — both records for enterprise
              SaaS at the time. The combination of product-market fit (cloud security is a must-have), agentless
