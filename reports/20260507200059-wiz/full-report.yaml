      - number: '7.2'
        title: Operational and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Wiz's operational risks center on four areas. First, cloud API dependency: the entire Wiz agentless
              architecture depends on cloud provider APIs controlled by AWS, Azure, GCP, and OCI. A major API change,
              permission restriction, or rate-limiting event by any hyperscaler could degrade Wiz's coverage and require
              emergency engineering investment. Second, multi-tenant data isolation: Wiz processes customer cloud
              metadata (configurations, identities, data classification) in a multi-tenant SaaS environment. A data
              isolation failure could expose cloud topology information to unauthorized parties, triggering contractual
              breach and enterprise customer churn. Third, technical complexity and integration risk from the Gem
              Security acquisition: CDR integration with the Security Graph is a multi-quarter engineering program;
              integration delays could leave a window where Wiz markets capabilities not yet fully production-ready.
              Fourth, scale risk: Wiz's Security Graph processes tens of billions of cloud resource records across
              thousands of enterprise customers; any graph database performance degradation at scale could impact the
              core product experience.
            claimRefs: []
          - type: table
            tableRef: TR002
            claimRefs:
              - CR005
              - CR006
              - CR007
          - type: figure
            figureRef: FR002
            claimRefs:
              - CR005
              - CR006
              - CR010
      - number: '7.3'
        title: Regulatory, Legal, and Compliance Risks
        blocks:
          - type: paragraph
            body: >
              Wiz faces regulatory and legal risk across four dimensions. First, US government and national security
              review: Wiz's Israeli ownership, Unit 8200 founder backgrounds, and growing US government customer
              pipeline has attracted national security scrutiny. CFIUS would review any strategic acquisition of Wiz by
              a non-US acquirer, and may scrutinize Wiz's access to US government cloud environments. Second, data
              privacy law compliance: as a cloud metadata processor for global enterprises, Wiz must comply with GDPR
              (EU), CCPA (California), PIPEDA (Canada), and other data privacy laws in every jurisdiction where it
              operates. The SEC's 2023 cybersecurity disclosure rules also require Wiz's own security posture to be
              documented. Third, export control risk: BIS ITAR/EAR regulations may restrict Wiz from sharing certain
              cybersecurity technology or algorithms with Israeli R&D operations. Fourth, legal disputes and patent
              risk: Palo Alto Networks holds significant cloud security patents that could be weaponized against Wiz.
            claimRefs: []
          - type: table
            tableRef: TR003
            claimRefs:
              - CR008
              - CR009
          - type: figure
            figureRef: FR003
            claimRefs:
              - CR012
              - CR013
      - number: '7.4'
        title: People, Execution, and Market Timing Risks
        blocks:
          - type: paragraph
            body: >
              Wiz's people and execution risks are concentrated in three areas. First, key-person dependency: CEO Assaf
              Rappaport is central to Wiz's go-to-market strategy, investor relationships, and product vision. President
              Yinon Costica drives platform partnerships and enterprise relationships. CTO Ami Luttwak leads the
              Security Graph architecture. All three are co-founders and departure of any would represent a material
              blow. Second, talent concentration in Israel: approximately 50-60% of Wiz's 3,500-4,000 employees are in
              Tel Aviv. The Israel-Hamas conflict (October 2023 to present) has disrupted technology sector employment
              and may continue to create operational risk for companies with Israel-concentrated R&D. Third, execution
              risk at IPO scale: Wiz has never operated as a public company. The CFO, investor relations function, and
              SOX compliance infrastructure required for public company operations are being built concurrently with the
              growth phase.
            claimRefs: []
          - type: table
            tableRef: TR004
            claimRefs:
              - CR010
              - CR011
      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Israeli Export Control Is an Underappreciated Compliance Risk
            body: >
              Wiz's dual US-Israeli operations create an export control complexity that most investors overlook. The US
              Bureau of Industry and Security (BIS) and the Israeli Ministry of Defense both regulate cybersecurity
              technology export. Cloud security algorithms, AI security models, and vulnerability research crossing
              between Wiz's New York HQ and Tel Aviv R&D center may require export licenses or exemptions. A BIS
              enforcement action would jeopardize government contracts and IPO readiness. This has not been publicly
              addressed by Wiz management.
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
          - type: callout
            title: $32B Valuation Is the Most Transparent Investment Thesis Risk
            body: >
              At ~64x forward ARR, Wiz's valuation requires reaching $1B+ ARR at 40%+ growth, or public cloud security
              multiples re-rating to 30-50x from the current 8-15x, or Wiz being acquired at a premium by a strategic
              buyer. Scenario two is very unlikely without a fundamental market re-rating. Scenario three failed at $23B
              with Alphabet. Scenario one is achievable but requires 18-24 months of sustained execution.
            calloutType: insight
            claimRefs:
              - CR006
              - CR013
          - type: callout
            title: Wiz's Geopolitical Risk Is Manageable But Not Eliminatable
            body: >
              Wiz's Israel R&D concentration is a known risk being proactively mitigated since October 2023 by expanding
              Austin, New York, and London engineering offices and enabling remote-first work. The company's ability to
              maintain 43%+ ARR growth through the October 2023 conflict period suggests operational resilience. The
              risk is real but appears well-managed and does not represent an existential threat at current levels of
              military activity.
            calloutType: insight
            claimRefs:
              - CR010
              - CR011
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation and Investment Thesis Summary
        blocks:
          - type: paragraph
            body: >
              Wiz is the most compelling private cybersecurity company of the 2020s generation, but at $32B it is priced
              for extraordinary perfection. The investment case rests on three pillars: (1) Wiz has built the
              fastest-growing enterprise security company ever, reaching $500M+ ARR in under 5 years, (2) the CNAPP
              market is structurally large ($35-40B+ by 2028) and Wiz is the undisputed category leader with a 43%+
              market share in cloud-native security, and (3) the Security Graph moat is genuinely defensible and
              increasingly sticky as customers deploy multiple modules. Against this, the $32B valuation implies a ~64x
              ARR multiple vs. 9-15x for public cloud security comps. Wiz must maintain 35%+ ARR growth and demonstrate
              a credible path to profitability (or reach $1B+ ARR) to justify its private valuation at IPO. The base
              case IPO outcome in 2026 is a $18-24B market cap (40-55x ARR on ~$500M forward revenue), representing a
              25-45% downward revision from the last private round. Bull case at $30-32B requires multiple re-rating
              that current market conditions do not support. The overriding recommendation is: diligence-worthy with a
              conditional long thesis dependent on $1B ARR confirmation and IPO execution.
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs:
              - CV001
              - CV002
          - type: table
            tableRef: TV005
            claimRefs:
              - CV012
              - CV013
          - type: figure
            figureRef: FV001
            claimRefs:
              - CV006
              - CV007
              - CV008
      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Wiz's $32B valuation is most meaningfully benchmarked against public cloud security leaders. CrowdStrike
              (CRWD) trades at approximately 14-16x NTM ARR as of Q1 2025, with $3.7B+ ARR and 29% growth. Palo Alto
              Networks (PANW) trades at approximately 8-10x NTM revenue with $8.7B ARR and 14% growth
              post-platformization. Zscaler (ZS) trades at approximately 11-13x NTM revenue with $2.5B ARR and 31%
              growth. SentinelOne (S) at ~8x NTM revenue with $700M+ ARR and 33% growth represents the
              closest-comparable to Wiz by stage, though SentinelOne is already public. On a blended average of ~12x NTM
              ARR, Wiz's current ARR of $500M would imply a ~$6B market cap, vs. $32B private valuation. The premium
              reflects three factors: (1) Wiz's 40-45% ARR growth outpaces all public comps, (2) private market scarcity
              premium for pre-IPO stage investment, and (3) strategic optionality (government expansion, AI security,
              post-IPO M&A). Even in the most bullish scenario where Wiz reaches $1B ARR by 2026, at 25x NTM ARR (a
              premium multiple reflecting best-in-class growth), the valuation is $25B. At a base case 15-18x NTM ARR,
              the valuation is $15-18B.
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
              - CV003
              - CV004
              - CV005
          - type: table
            tableRef: TV006
            claimRefs:
              - CV014
              - CV015
          - type: figure
            figureRef: FV002
            claimRefs:
              - CV001
              - CV009
      - number: '8.3'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              Three scenarios bracket the Wiz investment thesis. Bull case (probability: 25%): Wiz reaches $900M-$1B ARR
              by end of 2025, maintains 35%+ growth, demonstrates profitability improvement toward Rule of 40, and
              executes an IPO at $28-32B valuation in 2026. This requires PANW platformization churn to remain below 5%
              of installed base, Wiz for AI to emerge as a $200M+ ARR product by 2026, and public cloud security
              multiples to re-rate to 25-30x. Base case (probability: 50%): Wiz reaches $750-900M ARR by end of 2025,
              maintains 30-35% growth, and IPOs at $18-24B in 2026 (40-55% below last private round). This implies that
              the $32B Series F investors accept a temporary paper loss that converts to positive returns if Wiz
              sustains its growth trajectory post-IPO. Bear case (probability: 25%): PANW platformization and
              CrowdStrike competitive pressure cause ARR growth to decelerate to 20-25%, Wiz reaches $700M ARR by end of
              2025, and IPOs at $12-15B in 2027 (50-60% below last private round). In this scenario, most Series E and
              Series F investors earn negative returns.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs:
              - CV006
              - CV007
              - CV008
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV009
              - CV010
      - number: '8.4'
        title: Final Diligence Questions and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              The Wiz investment thesis hinges on five unresolved questions that must be answered in the data room.
              First, ARR confirmation: what is the current ARR and the last three quarters of ARR growth rate? ARR
              deceleration below 30% in any single quarter is a yellow flag. Second, NRR confirmation: what is the
              trailing 12-month net revenue retention? NRR below 120% would indicate PANW churn is already
              materializing. Third, FedRAMP status: when does Wiz expect FedRAMP Moderate authorization, and what is the
              government pipeline? FedRAMP authorization is a gating event for the government segment. Fourth,
              profitability trajectory: what is the current EBITDA margin trend, and when does Wiz expect to reach FCF
              breakeven? A credible path to FCF positive by 2026 would de-risk the IPO thesis. Fifth, CFO and IPO
              readiness: who is Wiz's CFO, and what is the S-1 expected filing timeline? Without a confirmed CFO and S-1
              timeline, IPO readiness is uncertain.
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV009
              - CV010
              - CV011
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV006
              - CV007
              - CV008
      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: The $32B Valuation Is Defensible Only in the Bull Case
            body: >
              Wiz's $32B valuation is not irrational in absolute terms, but it is irrational as an entry price for new
              investors. The company is genuinely exceptional — fastest-growing enterprise security business ever,
              genuine product moat, Fortune 100 penetration — but the private market valuation has run ahead of
              fundamentals by 4-5x vs. public comps. Sophisticated late-stage investors (Greenoaks, General Atlantic)
              are accepting this premium for optionality on the bull case. For most investors, the right entry is
              post-IPO at the market-clearing price.
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
              - CV003
          - type: callout
            title: PANW Platformization Is the Most Quantifiable Short-Term Risk
            body: >
              Of all Wiz's risks, PANW platformization is the most quantifiable and the most likely to materialize in
              2025. PANW has stated it will convert 7,000+ accounts to platformization by FY26. Even if only 10-15% of
              those accounts include Prisma Cloud (and Wiz overlap), that represents 700-1,000 potential churn events
              from Wiz. At an average $150K ACV, that is $105-150M in at-risk ARR — roughly 25-30% of Wiz's installed
              base. Wiz's multi-module retention playbook may prevent most of this churn, but it is the
              highest-visibility risk that investors should monitor through quarterly check-ins with Wiz's top
              enterprise accounts.
            calloutType: insight
            claimRefs:
              - CV004
              - CV012
          - type: callout
            title: The Gem + AI Security Roadmap Is the Underappreciated Bull Case Driver
            body: >
              Most valuation analyses focus on the CNAPP market and ignore two underappreciated growth vectors: (1) Gem
              Security's CDR technology extends Wiz into runtime security, a $3-4B additional market where CrowdStrike
              currently dominates, and (2) Wiz for AI (AI-SPM) is the first security product designed for AI
              infrastructure. If enterprises broadly adopt AI workloads in 2025-2026, Wiz is positioned as the only
              vendor with native AI infrastructure security. These two vectors could add $200-400M incremental ARR by
              2026 and provide the growth rate acceleration needed to justify the $32B valuation.
            calloutType: insight
            claimRefs:
              - CV005
              - CV007
