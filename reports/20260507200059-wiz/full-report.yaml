            title: Cloud Provider API Dependency Is an Existential Structural Risk
            body: >
              Wiz's agentless architecture depends entirely on read-only access to AWS, Azure, GCP, and OCI cloud APIs.
              Any cloud provider restricting API access, launching competing CNAPP products, or changing API pricing
