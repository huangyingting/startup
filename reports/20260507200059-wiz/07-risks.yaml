callouts:
  - id: KR001
    type: risk
    title: "Israeli Export Control Is an Underappreciated Compliance Risk"
    body: >
      Wiz's dual US-Israeli operations create an export control complexity that most investors
      overlook. The US Bureau of Industry and Security (BIS) and the Israeli Ministry of Defense
      both regulate cybersecurity technology export. Cloud security algorithms, AI security models,
      and vulnerability research crossing between Wiz's New York HQ and Tel Aviv R&D center may
      require export licenses or exemptions. A BIS enforcement action would jeopardize government
      contracts and IPO readiness. This has not been publicly addressed by Wiz management.
    claimRefs: [CR001, CR002]
    sourceRefs: [SR001, SR002, SR005]

  - id: KR002
    type: risk
    title: "$32B Valuation Is the Most Transparent Investment Thesis Risk"
    body: >
      At ~64x forward ARR, Wiz's valuation requires reaching $1B+ ARR at 40%+ growth, or
      public cloud security multiples re-rating to 30-50x from the current 8-15x, or Wiz
      being acquired at a premium by a strategic buyer. Scenario two is very unlikely without
      a fundamental market re-rating. Scenario three failed at $23B with Alphabet. Scenario
      one is achievable but requires 18-24 months of sustained execution.
    claimRefs: [CR006, CR013]
    sourceRefs: [SR001, SR007]

  - id: KR003
    type: insight
    title: "Wiz's Geopolitical Risk Is Manageable But Not Eliminatable"
    body: >
      Wiz's Israel R&D concentration is a known risk being proactively mitigated since October
      2023 by expanding Austin, New York, and London engineering offices and enabling remote-first
      work. The company's ability to maintain 43%+ ARR growth through the October 2023 conflict
      period suggests operational resilience. The risk is real but appears well-managed and does
      not represent an existential threat at current levels of military activity.
    claimRefs: [CR010, CR011]
    sourceRefs: [SR010, SR011]

