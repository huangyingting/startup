  claims:
    - id: CR001
      statement: "Wiz's dual US-Israeli operations create export control compliance obligations under BIS EAR Part 742.15 (cybersecurity items), which may require export licenses for sharing cloud security algorithms, vulnerability research, and AI security models between its New York HQ and Tel Aviv R&D center."
      confidence: medium
      type: inferred
      topic: regulatory-risk
      freshness: current
      sourceRefs: [SR002, SR013]
      answersQuestionRefs: [QR002, QR001]

    - id: CR002
      statement: "CFIUS would review any strategic acquisition of Wiz by a non-US entity, given its Israeli ownership, Unit 8200 founders, and access to US enterprise cloud environments. This was a factor in the Alphabet acquisition discussions."
      confidence: medium
      type: inferred
      topic: regulatory-risk
      freshness: current
      sourceRefs: [SR004, SR011]
      answersQuestionRefs: [QR003, QR029]

    - id: CR003
      statement: "Wiz maintains GDPR compliance for EU enterprise customers through EU data residency and Data Processing Agreements. The SEC 2023 cyber disclosure rules will apply post-IPO, requiring disclosure of material security incidents within 4 business days."
      confidence: medium
      type: observed
      topic: compliance
      freshness: current
      sourceRefs: [SR009, SR015]
      answersQuestionRefs: [QR004, QR021]

    - id: CR004
      statement: "Palo Alto Networks holds over 2,000 cloud and network security patents (as of 2024), and CrowdStrike holds 500+ cybersecurity patents, creating a patent landscape risk for Wiz. No active patent litigation against Wiz has been reported."
      confidence: medium
      type: third-party-reported
      topic: legal-risk
      freshness: current
      sourceRefs: [SR014, SR007]
      answersQuestionRefs: [QR026]

    - id: CR005
      statement: "AWS, Azure, and GCP native security tools (Security Hub, Defender for Cloud, Security Command Center) are expanding multi-cloud coverage and reducing the differentiation of third-party agentless CNAPP tools, representing the most structurally threatening long-term market risk for Wiz."
      confidence: medium
      type: third-party-reported
      topic: competitive-risk
      freshness: current
      sourceRefs: [SR016, SR006]
      answersQuestionRefs: [QR007, QR016]

    - id: CR006
      statement: "Wiz's $32B valuation at ~64x ARR represents the most transparent investment thesis risk. The company needs to reach $1B+ ARR before IPO, achieve profitability at a premium multiple, or find a strategic acquirer above the Alphabet offer of $23B."
      confidence: medium
      type: inferred
      topic: valuation-risk
      freshness: current
      sourceRefs: [SR006, SR020]
      answersQuestionRefs: [QR006, QR030]

    - id: CR007
      statement: "Palo Alto Networks platformization strategy offering CNAPP/Prisma Cloud at deep discounts bundled with NGFW, Cortex XDR, and Cortex XSIAM directly threatens Wiz's NRR in Fortune 500 accounts where PANW is the incumbent."
      confidence: medium
      type: third-party-reported
      topic: competitive-risk
      freshness: current
      sourceRefs: [SR016, SR006]
      answersQuestionRefs: [QR005, QR015, QR022]

    - id: CR008
      statement: "Wiz's agentless architecture creates a structural cloud API dependency: all data ingestion relies on cloud provider APIs controlled by AWS, Azure, GCP, and OCI. Any hyperscaler API change can degrade Wiz's coverage without advance notice."
      confidence: medium
      type: inferred
      topic: technical-risk
      freshness: current
      sourceRefs: [SR009, SR017]
      answersQuestionRefs: [QR008, QR027]

    - id: CR009
      statement: "The Gem Security CDR integration is a multi-quarter engineering program. If delays persist beyond Q3 2025, Wiz may be marketing CDR capabilities that are not fully production-ready, creating a gap vs. CrowdStrike's mature Falcon CDR."
      confidence: medium
      type: inferred
      topic: execution-risk
      freshness: current
      sourceRefs: [SR027, SR006]
      answersQuestionRefs: [QR010]

    - id: CR010
      statement: "Assaf Rappaport (CEO) and Ami Luttwak (CTO) are co-founders with irreplaceable institutional knowledge. Rappaport owns the enterprise relationship network and IPO narrative; Luttwak owns the Security Graph architecture. Departure of either before IPO would be a material negative."
      confidence: medium
      type: inferred
      topic: key-person-risk
      freshness: current
      sourceRefs: [SR010, SR030]
      answersQuestionRefs: [QR011]

    - id: CR011
      statement: "Wiz's Israel R&D concentration (est. 50-60% of 3,500-4,000 employees in Tel Aviv) during the ongoing Israel-Hamas conflict is a real but apparently manageable operational risk. Wiz maintained 43%+ ARR growth through the October 2023 outbreak and has been expanding Austin and NYC engineering offices."
      confidence: medium
      type: inferred
      topic: geopolitical-risk
      freshness: current
      sourceRefs: [SR010, SR030]
      answersQuestionRefs: [QR012, QR020, QR024, QR028]

    - id: CR012
      statement: "Wiz's multi-tenant data isolation is the most critical operational security risk: if a bug exposed one customer's cloud topology to another, contractual and reputational consequences could trigger enterprise churn. SOC2 Type II controls mitigate but do not eliminate this risk."
      confidence: medium
      type: inferred
      topic: security-risk
      freshness: current
      sourceRefs: [SR007, SR008]
      answersQuestionRefs: [QR009, QR013]

    - id: CR013
      statement: "Thesis-break criteria for Wiz include: NRR dropping below 110% for 2+ consecutive quarters; ARR growth decelerating below 25% without a clear recovery path; departure of Assaf Rappaport as CEO before IPO; export control enforcement action by BIS or Israel MOD; major data isolation security incident."
      confidence: medium
      type: inferred
      topic: thesis-break
      freshness: current
      sourceRefs: [SR006, SR020]
      answersQuestionRefs: [QR013, QR014, QR025, QR030]

    - id: CR014
      statement: "The Israeli Ministry of Defense export approval requirement for dual-use cybersecurity technologies is a specific risk for Wiz: security algorithms developed in Israel and used in US government cloud environments may require Israeli MOD clearance."
      confidence: medium
      type: inferred
      topic: regulatory-risk
      freshness: current
      sourceRefs: [SR022, SR005]
      answersQuestionRefs: [QR017]

    - id: CR015
      statement: "CISA's Secure by Design framework (2024) requires cloud security vendors supplying to government to demonstrate security-by-design principles and submit to vulnerability disclosure programs. Wiz's existing bug bounty program partially satisfies this but FedRAMP authorization is still required."
      confidence: medium
      type: third-party-reported
      topic: regulatory-compliance
      freshness: current
      sourceRefs: [SR003, SR012]
      answersQuestionRefs: [QR001]

    - id: CR016
      statement: "Unit 8200 alumni status of all four Wiz founders provides technical credibility and network access, but may create CFIUS scrutiny if Wiz seeks government contracts or strategic acquisition, and could create perception risk in EU markets."
      confidence: medium
      type: inferred
      topic: regulatory-risk
      freshness: current
      sourceRefs: [SR030, SR011]
