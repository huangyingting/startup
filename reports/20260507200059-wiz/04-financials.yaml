  name: Wiz
  website: https://www.wiz.io
chapter:
  number: 4
  order: 4
  letter: I
  title: Financial Analysis

sections:
  - id: SI001
    title: Revenue Model and ARR Trajectory
    body: >
      Wiz operates a pure SaaS subscription model with Annual Recurring Revenue (ARR) as the primary
      financial metric. The company achieved a historically unprecedented ARR ramp: $1M in its first
      month (January 2020), $100M in 18 months (mid-2021), $350M by end of 2023, and $500M+ by late
      2024 — representing a roughly 43%+ year-over-year growth rate from 2023 to 2024. This trajectory
      is faster than any comparable SaaS security company at equivalent scale. Revenue is generated
      across multiple platform modules: core CSPM/CWPP (primary), DSPM (launched 2023), Wiz Code
      (shift-left, 2022), CDR via Gem Security (acquired late 2024), and Wiz for AI (2025). The
      pricing model is per-cloud-resource / per-workload, with enterprise ACV ranging from $50K–$5M+
      depending on cloud footprint size and module adoption. Net Revenue Retention (NRR) has not been
      publicly disclosed but is estimated by analysts at 130%+ based on the platform expansion and
      upsell pattern evident in public customer disclosures.

  - id: SI002
    title: Funding History and Capital Position
    body: >
      Wiz has raised approximately $2.7–2.8B across six financing rounds between 2020 and 2025,
      making it one of the most heavily capitalized private cybersecurity companies in history.
      Key rounds: Series A $100M at $1B valuation (January 2021, 12 months after founding);
      Series B $250M at $6B valuation (October 2021); Series C $300M at $10B valuation (February
      2022); Series E $1B at $12B valuation (May 2024, led by General Atlantic/Sequoia/Index);
      Series F approximately $1B at approximately $32B valuation (2025, timing corroborated by
      multiple sources). The company also deployed approximately $350M to acquire Gem Security in
      late 2024. At the reported $32B valuation and $500M+ ARR, Wiz trades at approximately 60–64×
      forward ARR — a significant premium to public comparables (CrowdStrike ~15× NTM revenue,
      Palo Alto Networks ~9× NTM revenue). The capital position of $2.7B+ raised with a presumed
      $1B+ of remaining cash after Gem acquisition implies 2–4 years of runway at current burn rates
      (estimated at $200–$400M per year for a company at this scale and growth rate).

  - id: SI003
    title: Unit Economics and Margins
    body: >
      Wiz has not disclosed financial statements as a private company. However, unit economics can
      be estimated from public comparables and disclosed metrics. Gross margins for cloud security
      SaaS platforms at $500M+ ARR typically range from 70–80%; Wiz's agentless model (no hardware,
      no agent distribution costs) and primarily cloud API-based architecture suggest gross margins
      toward the high end of this range. The sales-and-marketing spend is significant: Wiz employs
      approximately 1,000+ salespeople (estimated from LinkedIn headcount of ~3,500–4,000 total
      employees), suggesting an S&M expense rate of 40–55% of ARR — typical for a company growing
      at 40%+ with $500M+ ARR. R&D spending is also high given the company's technical depth and
      continuous platform expansion. Net loss at the current stage is likely $150–$400M per year
      based on comparable public market SaaS security companies at equivalent growth/scale transitions
      (e.g., Sentinel One's losses at $700M ARR were ~$300M annually). IPO path (confidential S-1
      filed 2025) implies a need for demonstrated path-to-profitability narrative.

  - id: SI004
    title: Capital Adequacy and Path to IPO
    body: >
      Wiz's capital adequacy appears strong on multiple dimensions. First, $2.7B+ in total capital
      raised with a presumed $1–1.5B cash on hand provides 2–4 years of runway at estimated burn
      levels. Second, the company's rejection of the $23B Alphabet acquisition offer in July 2024
      signals investor and management confidence in the independent path to a significantly higher
      public market valuation. Third, the confidential S-1 filing in 2025 signals an IPO process
      that, if completed, would provide additional primary capital and public currency for M&A.
      Key capital risks include: (1) the Gem Security acquisition ($350M) reducing near-term
      cash; (2) the high S&M spend required to maintain 40%+ growth against platform consolidators;
      (3) IPO timing risk if market conditions deteriorate before the offering. The Rule of 40 score
      (growth rate + EBITDA margin) is estimated at 30–45, below the 40 threshold at current burn,
      suggesting the company needs to demonstrate margin improvement by IPO. Comparable IPOs
      (Sentinel One, Rubrik) priced at significant discounts to private valuations in 2022–2024,
      suggesting Wiz's $32B private valuation will be stress-tested in public markets.

