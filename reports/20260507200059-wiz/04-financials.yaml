callouts:
  - id: KI001
    type: insight
    title: "Wiz's ARR Ramp Is the Fastest in Cloud Security History"
    body: >
      Wiz reached $100M ARR in 18 months and $500M ARR in approximately 48 months from founding —
      a trajectory that exceeds Okta (5 years to $100M), CrowdStrike (6 years), and Palo Alto
      Networks (8+ years). At 43%+ YoY growth from $350M to $500M+, Wiz is growing faster than
      any public cloud security company at equivalent scale, providing strong evidence of sustained
      product-market fit and efficient go-to-market execution.
    claimRefs: [CI001, CI002]
    sourceRefs: [SI001, SI002]

  - id: KI002
    type: risk
    title: "$32B Private Valuation Carries Significant IPO Repricing Risk"
    body: >
      At ~64× forward ARR, Wiz's $32B valuation is approximately 4–7× the ARR multiple of comparable
      public cloud security companies (CrowdStrike ~15×, Palo Alto ~9×). For investors at the $32B
      round to break even on an IPO, Wiz would need either ARR of $1.5–$2B+ at comparable IPO
      multiples, or a market re-rating of cloud security to earlier-stage multiples. Recent
      comparable IPOs (Rubrik, Sentinel One) priced at discounts to late-stage private valuations,
      representing a structural repricing risk.
    claimRefs: [CI009, CI010]
    sourceRefs: [SI006, SI007]

  - id: KI003
    type: benchmark
    title: "NRR of 130%+ Is Wiz's Most Important Financial Signal"
    body: >
      The estimated 130%+ Net Revenue Retention rate — if confirmed — would indicate that Wiz's
      existing customer base expands at 30% per year even without new logo acquisition. This is the
      most important financial quality metric: it means Wiz can sustain 20–25% growth from its
      installed base alone while new customer acquisition funds the upside. It also confirms product
      platform stickiness and multi-module adoption. NRR should be a primary data room ask.
    claimRefs: [CI006, CI012]
    sourceRefs: [SI003, SI004]

