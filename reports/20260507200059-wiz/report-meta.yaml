  productSummary: |
    Wiz's platform is organized around the Security Graph — a property graph database that
    ingests cloud resource metadata via agentless read-only API scanning and maps relationships
    between compute, identity, data, network, and vulnerability nodes. The platform offers
    seven integrated modules: (1) CSPM (Cloud Security Posture Management) — misconfigurations
    and compliance violations; (2) CWPP (Cloud Workload Protection) — vulnerability assessment
    for VMs, containers, and serverless; (3) CIEM (Cloud Infrastructure Entitlement Management)
    — identity risk and over-provisioned permissions; (4) DSPM (Data Security Posture Management)
    — sensitive data discovery and exposure analysis; (5) CDR (Cloud Detection and Response,
    via Gem Security) — runtime threat detection using eBPF; (6) AI-SPM (AI Security Posture
    Management) — first-mover in AI workload security; (7) IaC Security — infrastructure-as-code
    misconfiguration prevention in CI/CD pipelines. The Security Graph contextualizes findings
    from all modules to produce attack path analysis: chains of interconnected risks that reveal
    exploitable paths to critical assets.
  customerFocus: "Enterprise (Fortune 100/500/1000): AWS, Azure, GCP, OCI users requiring multi-cloud CNAPP; 40-45% Fortune 100 penetration; key verticals: financial services, technology, healthcare, retail, manufacturing"
  businessModel: "Enterprise SaaS: per-resource (cloud resource count) pricing with multi-year contract structures; land-and-expand with multi-module adoption driving NRR of estimated 130%+; AWS/Azure Marketplace distribution accelerates enterprise procurement"
