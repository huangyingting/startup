riskRationale: >
  Wiz is a high-risk / high-reward investment at $32B. The primary risks are: (1) valuation
  premium of ~64x ARR vs. 8-15x for public comps, implying a 25-60% repricing at IPO in
  base and bear scenarios; (2) PANW platformization creating NRR pressure in the Fortune 500
  installed base; (3) Israeli geopolitical risk with 50-60% of R&D in Tel Aviv; (4) export
  control compliance uncertainty for dual US-Israeli cybersecurity operations; (5) key-person
  dependency on co-founder CEO Assaf Rappaport. These risks are real but the company's
  exceptional execution record, genuine product moat, and IPO momentum mitigate the severity.
  Risk rating is HIGH due to the valuation premium, not due to business quality concerns.

thesisStatement: >
  Wiz is the best pure-play cloud security business ever built, with a unique Security Graph
  architecture that produces measurably superior cloud risk visibility. The investment thesis
  is conditional: at $32B, the valuation prices in the bull case and leaves no margin of
  safety. The right thesis is (1) wait for the IPO and enter at the market-clearing price,
  or (2) accept the $32B as a late-stage bet on founder execution and the bull case ARR
  trajectory. Do not invest at $32B without data room confirmation of ARR trajectory and NRR.

