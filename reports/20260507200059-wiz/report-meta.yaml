competitivePosition: >
  Wiz is the undisputed leader in cloud-native application protection (CNAPP) and cloud
  security posture management (CSPM). It holds the highest Fortune 100 penetration of any
  pure-play cloud security vendor (40-45%), a Gartner Magic Quadrant Leader position (2024),
  and the fastest ARR growth trajectory in enterprise security history. The Security Graph
  is a structurally differentiated data architecture that takes 2-3 years to replicate.
  The primary competitive threats are Palo Alto Networks (platformization bundling at zero
  marginal cost) and CrowdStrike (Falcon Cloud Security + CDR). The secondary threat is
  hyperscaler native security tools. Wiz's multi-module land-and-expand creates increasing
  switching costs that partially protect the installed base.

founderBackground: >
  All four co-founders are Israeli nationals and Unit 8200 veterans: CEO Assaf Rappaport,
  President Yinon Costica, CTO Ami Luttwak, and VP R&D Roy Reznik. All four previously
  built and sold Adallom (cloud CASB) to Microsoft for $320M (2015), where they built the
  Azure AD and Defender for Cloud product lines. This combination of Unit 8200 intelligence
  background, Microsoft cloud security experience, and Adallom startup success gives the
  founding team a rare combination of technical depth, enterprise distribution knowledge,
  and proven exit experience.

moatAssessment: >
  Wiz's primary moat is the Security Graph: a graph database architecture that maps
  relationships between cloud resources, identities, vulnerabilities, and data across
  multi-cloud environments. This architecture produces attack path analysis that no
  agent-based competitor can replicate without full deployment. The moat is deep (5-year
  head start) but not impregnable: PANW and CrowdStrike are building graph-like capabilities.
  Secondary moats include: Fortune 100 customer reference density (switching cost), multi-cloud
  breadth (AWS + Azure + GCP + OCI support), and the Wiz for AI first-mover position in
  AI infrastructure security.

