analystNotes: >
  Wiz represents the rarest category in venture capital: a company that is simultaneously
  the best business in its category AND priced too expensively for most investors. The $32B
  private valuation reflects a real premium, not a bubble — Wiz's business fundamentals
  justify a $15-20B+ valuation in a normalized public market. The gap between $20B fair
  value and $32B private round represents the cost of scarcity (only one pre-IPO Wiz
  allocation exists) and bull-case optionality. Investors entering at $32B should have
  explicit conviction in the bull case scenario and a 3-5 year hold horizon to capture
  post-IPO re-rating. Post-IPO entry at the market-clearing price remains the preferred
  approach for return-maximizing investors.

companyProfile:
  summary: |
    Wiz is a New York-headquartered cloud-native application protection platform (CNAPP) founded
    in January 2020 by four Israeli co-founders: CEO Assaf Rappaport, President Yinon Costica,
    CTO Ami Luttwak, and VP R&D Roy Reznik — all Unit 8200 veterans and former Microsoft Azure
    security leaders (Adallom acquisition, $320M, 2015). The company's core product is the Wiz
    Security Graph: an agentless, API-based architecture that maps relationships between cloud
    resources, identities, vulnerabilities, and data across AWS, Azure, GCP, and OCI to produce
    attack path analysis and multi-cloud risk prioritization. Wiz has grown to $500M+ ARR in
    under 5 years — the fastest trajectory in enterprise security history — with 40-45% Fortune
    100 penetration across a 5,000-8,000 enterprise customer base. The company raised $1B at a
    $32B valuation in a Series F round (February 2025, Andreessen Horowitz, General Atlantic,
    Greenoaks, Lightspeed), rejected a $23B acquisition offer from Alphabet (July 2024), and
    filed a confidential S-1 with the SEC in early 2025. R&D operations are primarily in
    Tel Aviv (est. 50-60% of 3,500-4,000 employees). Wiz acquired Gem Security (CDR) for
    ~$350M in late 2024 to extend into runtime security.
