sections:
  - id: SV001
    title: Recommendation and Investment Thesis Summary
    body: >
      Wiz is the most compelling private cybersecurity company of the 2020s generation, but at $32B it is priced for
      extraordinary perfection. The investment case rests on three pillars: (1) Wiz has built the fastest-growing
      enterprise security company ever, reaching $500M+ ARR in under 5 years, (2) the CNAPP market is structurally large
      ($35-40B+ by 2028) and Wiz is the undisputed category leader with a 43%+ market share in cloud-native security,
      and (3) the Security Graph moat is genuinely defensible and increasingly sticky as customers deploy multiple
      modules. Against this, the $32B valuation implies a ~64x ARR multiple vs. 9-15x for public cloud security comps.
      Wiz must maintain 35%+ ARR growth and demonstrate a credible path to profitability (or reach $1B+ ARR) to justify
      its private valuation at IPO. The base case IPO outcome in 2026 is a $18-24B market cap (40-55x ARR on ~$500M
      forward revenue), representing a 25-45% downward revision from the last private round. Bull case at $30-32B
      requires multiple re-rating that current market conditions do not support. The overriding recommendation is:
      diligence-worthy with a conditional long thesis dependent on $1B ARR confirmation and IPO execution.
    tableRefs:
      - TV001
      - TV005
    figureRefs:
      - FV001
  - id: SV002
    title: Comparable Valuation Analysis
    body: >
      Wiz's $32B valuation is most meaningfully benchmarked against public cloud security leaders. CrowdStrike (CRWD)
      trades at approximately 14-16x NTM ARR as of Q1 2025, with $3.7B+ ARR and 29% growth. Palo Alto Networks (PANW)
      trades at approximately 8-10x NTM revenue with $8.7B ARR and 14% growth post-platformization. Zscaler (ZS) trades
      at approximately 11-13x NTM revenue with $2.5B ARR and 31% growth. SentinelOne (S) at ~8x NTM revenue with $700M+
      ARR and 33% growth represents the closest-comparable to Wiz by stage, though SentinelOne is already public. On a
      blended average of ~12x NTM ARR, Wiz's current ARR of $500M would imply a ~$6B market cap, vs. $32B private
      valuation. The premium reflects three factors: (1) Wiz's 40-45% ARR growth outpaces all public comps, (2) private
      market scarcity premium for pre-IPO stage investment, and (3) strategic optionality (government expansion, AI
      security, post-IPO M&A). Even in the most bullish scenario where Wiz reaches $1B ARR by 2026, at 25x NTM ARR (a
      premium multiple reflecting best-in-class growth), the valuation is $25B. At a base case 15-18x NTM ARR, the
      valuation is $15-18B.
    tableRefs:
      - TV002
      - TV006
    figureRefs:
      - FV002
  - id: SV003
    title: Bull / Base / Bear Scenario Analysis
    body: >
      Three scenarios bracket the Wiz investment thesis. Bull case (probability: 25%): Wiz reaches $900M-$1B ARR by end
      of 2025, maintains 35%+ growth, demonstrates profitability improvement toward Rule of 40, and executes an IPO at
      $28-32B valuation in 2026. This requires PANW platformization churn to remain below 5% of installed base, Wiz for
      AI to emerge as a $200M+ ARR product by 2026, and public cloud security multiples to re-rate to 25-30x. Base case
      (probability: 50%): Wiz reaches $750-900M ARR by end of 2025, maintains 30-35% growth, and IPOs at $18-24B in 2026
      (40-55% below last private round). This implies that the $32B Series F investors accept a temporary paper loss
      that converts to positive returns if Wiz sustains its growth trajectory post-IPO. Bear case (probability: 25%):
      PANW platformization and CrowdStrike competitive pressure cause ARR growth to decelerate to 20-25%, Wiz reaches
      $700M ARR by end of 2025, and IPOs at $12-15B in 2027 (50-60% below last private round). In this scenario, most
      Series E and Series F investors earn negative returns.
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - id: SV004
    title: Final Diligence Questions and Thesis-Break Triggers
    body: >
      The Wiz investment thesis hinges on five unresolved questions that must be answered in the data room. First, ARR
      confirmation: what is the current ARR and the last three quarters of ARR growth rate? ARR deceleration below 30%
      in any single quarter is a yellow flag. Second, NRR confirmation: what is the trailing 12-month net revenue
      retention? NRR below 120% would indicate PANW churn is already materializing. Third, FedRAMP status: when does Wiz
      expect FedRAMP Moderate authorization, and what is the government pipeline? FedRAMP authorization is a gating
      event for the government segment. Fourth, profitability trajectory: what is the current EBITDA margin trend, and
      when does Wiz expect to reach FCF breakeven? A credible path to FCF positive by 2026 would de-risk the IPO thesis.
      Fifth, CFO and IPO readiness: who is Wiz's CFO, and what is the S-1 expected filing timeline? Without a confirmed
      CFO and S-1 timeline, IPO readiness is uncertain.
    tableRefs:
      - TV004
    figureRefs:
      - FV004
