  claims:
    - id: CV001
      statement: >-
        Wiz raised a $1B Series F at a $32B valuation in early 2025, led by Andreessen Horowitz, General Atlantic,
        Greenoaks, and Lightspeed. This follows the Series E at $12B (May 2024) and represents a ~2.7x valuation
        increase in less than 12 months, driven by ARR growth from $350M to $500M+.
      confidence: high
      type: third-party-reported
      topic: valuation-history
      freshness: current
      sourceRefs:
        - SV001
        - SV017
      answersQuestionRefs:
        - QV015
        - QV016
        - QV019
    - id: CV002
      statement: >-
        Wiz filed a confidential S-1 with the SEC in early 2025, signaling preparation for an IPO. The company had
        previously rejected Alphabet's acquisition offer of $23B in July 2024, indicating founder conviction that the
        public market exit will deliver higher returns.
      confidence: high
      type: third-party-reported
      topic: ipo-preparation
      freshness: current
      sourceRefs:
        - SV005
        - SV010
      answersQuestionRefs:
        - QV013
        - QV014
        - QV027
    - id: CV003
      statement: >-
        Series F investors at $32B are making a calculated bet on the bull case scenario: at $1B+ ARR with 35%+ growth,
        Wiz would trade at $25-30B in public markets at 25-30x NTM ARR. The implicit return thesis requires ARR growth
        of ~2x over 24 months from the $500M+ baseline.
      confidence: medium
      type: inferred
      topic: investor-thesis
      freshness: current
      sourceRefs:
        - SV001
        - SV006
      answersQuestionRefs:
        - QV016
        - QV027
    - id: CV004
      statement: >-
        PANW platformization represents the most quantifiable downside risk to the investment thesis. PANW stated intent
        to convert 7,000+ accounts to platformization by FY26; even 10-15% overlap with Wiz accounts could create
        700-1,000 potential churn events at an estimated $150K average ACV.
      confidence: medium
      type: inferred
      topic: competitive-risk
      freshness: current
      sourceRefs:
        - SV004
        - SV018
      answersQuestionRefs:
        - QV017
        - QV008
    - id: CV005
      statement: >-
        Wiz for AI (AI Security Posture Management) and the Gem Security CDR acquisition represent two incremental
        growth vectors that could add $200-400M in ARR by 2026 beyond the core CNAPP market, providing the growth
        acceleration needed to justify the $32B private valuation.
      confidence: medium
