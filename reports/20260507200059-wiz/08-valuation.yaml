callouts:
  - id: KV001
    type: insight
    title: The $32B Valuation Is Defensible Only in the Bull Case
    body: >
      Wiz's $32B valuation is not irrational in absolute terms, but it is irrational as an entry price for new
      investors. The company is genuinely exceptional — fastest-growing enterprise security business ever, genuine
      product moat, Fortune 100 penetration — but the private market valuation has run ahead of fundamentals by 4-5x vs.
      public comps. Sophisticated late-stage investors (Greenoaks, General Atlantic) are accepting this premium for
      optionality on the bull case. For most investors, the right entry is post-IPO at the market-clearing price.
    claimRefs:
      - CV001
      - CV002
      - CV003
    sourceRefs:
      - SV001
      - SV005
  - id: KV002
    type: risk
    title: PANW Platformization Is the Most Quantifiable Short-Term Risk
    body: >
      Of all Wiz's risks, PANW platformization is the most quantifiable and the most likely to materialize in 2025. PANW
      has stated it will convert 7,000+ accounts to platformization by FY26. Even if only 10-15% of those accounts
      include Prisma Cloud (and Wiz overlap), that represents 700-1,000 potential churn events from Wiz. At an average
      $150K ACV, that is $105-150M in at-risk ARR — roughly 25-30% of Wiz's installed base. Wiz's multi-module retention
      playbook may prevent most of this churn, but it is the highest-visibility risk that investors should monitor
      through quarterly check-ins with Wiz's top enterprise accounts.
    claimRefs:
      - CV004
      - CV012
    sourceRefs:
      - SV004
      - SV010
  - id: KV003
    type: insight
    title: The Gem + AI Security Roadmap Is the Underappreciated Bull Case Driver
    body: >
      Most valuation analyses focus on the CNAPP market and ignore two underappreciated growth vectors: (1) Gem
      Security's CDR technology extends Wiz into runtime security, a $3-4B additional market where CrowdStrike currently
      dominates, and (2) Wiz for AI (AI-SPM) is the first security product designed for AI infrastructure. If
      enterprises broadly adopt AI workloads in 2025-2026, Wiz is positioned as the only vendor with native AI
      infrastructure security. These two vectors could add $200-400M incremental ARR by 2026 and provide the growth rate
      acceleration needed to justify the $32B valuation.
    claimRefs:
      - CV005
      - CV007
    sourceRefs:
      - SV001
      - SV011
