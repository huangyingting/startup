        - Agentless container scanning; Wiz links CVEs to actual exploitability in-graph
      - - CIEM
        - '2021'
        - IAM graph analysis; permission analysis across clouds
        - Excessive privilege detection; lateral movement paths; JIT access
        - Cross-cloud identity graph; links identities to data and compute exposure
      - - DSPM
        - '2023'
        - Automated data discovery and classification in cloud storage/databases
        - PII/PHI detection; sensitive data exposure mapping; data-to-identity access risk
        - First agentless DSPM; integrates data risk into Security Graph attack path analysis
      - - CDR (Gem Security)
        - 2024 (acq.)
        - eBPF-based runtime detection; behavioral analytics; Security Graph integration
        - Cloud threat detection; MITRE ATT&CK mapping; automated response playbooks
        - Runtime + posture in single graph; no silo between CDR and CSPM findings
      - - Wiz Code
        - '2022'
        - CI/CD pipeline IaC scanning; SAST; secrets detection; GitHub/GitLab native
        - IaC misconfiguration; hardcoded secrets; SAST for common languages; PR comments
        - Connects code-layer findings to runtime Security Graph — shift-left with runtime context
      - - Wiz for AI
        - '2025'
        - Agentless AI workload discovery; LLM API mapping; AI-specific policy engine
        - LLM inventory; AI model access controls; OWASP LLM Top 10; shadow AI discovery
        - First CNAPP AI SPM; no competitor has equivalent coverage as of early 2025
