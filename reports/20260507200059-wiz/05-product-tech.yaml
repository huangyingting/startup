  claims:
    - id: CE001
      statement: >-
        Wiz has launched 7 major platform modules since founding: CSPM (2020), CWPP (2020), CIEM (2021), Wiz Code
        (2022), DSPM (2023), CDR via Gem Security (2024), and Wiz for AI (2025) — representing the broadest organic
        module growth of any CNAPP vendor.
      confidence: high
      type: observed
      topic: product-portfolio
      freshness: current
      sourceRefs:
        - SE001
        - SE002
      answersQuestionRefs:
        - QE004
    - id: CE002
      statement: >-
        Wiz DSPM (launched 2023) is the first agentless data security posture management product — automatically
        discovering, classifying, and mapping PII/PHI/PCI data stored in cloud storage, databases, and SaaS applications
        to their access risk context in the Security Graph.
      confidence: high
      type: observed
      topic: product-differentiation
      freshness: current
      sourceRefs:
        - SE002
        - SE018
      answersQuestionRefs:
        - QE016
    - id: CE003
      statement: >-
        Wiz for AI (2025) is in general availability and provides LLM workload inventory, AI model access controls, AI
        pipeline security scanning, OWASP LLM Top 10 policy checks, and shadow AI workload discovery — no CNAPP
        competitor has an equivalent product.
      confidence: high
      type: observed
      topic: product-differentiation
      freshness: current
      sourceRefs:
        - SE003
        - SE019
      answersQuestionRefs:
        - QE005
        - QE025
    - id: CE004
      statement: >-
        Wiz for AI represents the first dedicated AI Security Posture Management (AI SPM) product in the CNAPP market,
        covering the entire AI workload lifecycle from training infrastructure to inference endpoints — launched
        approximately 12–18 months ahead of any major competitor.
      confidence: high
      type: third-party-reported
      topic: first-mover
      freshness: current
      sourceRefs:
        - SE003
        - SE023
      answersQuestionRefs:
        - QE005
    - id: CE005
      statement: >-
        Wiz's agentless scanning engine reads cloud environment state through cloud provider APIs (AWS/Azure/GCP/OCI)
        and proprietary snapshot-based scanning, enabling deployment in under one hour with zero operational overhead —
        versus agent-based platforms that require 2–4 weeks for enterprise deployment.
      confidence: high
      type: observed
      topic: technical-differentiation
      freshness: current
      sourceRefs:
        - SE001
        - SE016
      answersQuestionRefs:
        - QE001
        - QE014
        - QE021
    - id: CE006
      statement: >-
        Wiz Code integrates with GitHub Actions, GitLab CI, Jenkins, Bitbucket, and Azure DevOps to provide IaC scanning
        (Terraform, CloudFormation, ARM), SAST, and hardcoded secrets detection at PR time — with Security Graph context
        connecting code-layer findings to runtime risk.
      confidence: high
      type: observed
      topic: product-capability
      freshness: current
      sourceRefs:
        - SE002
        - SE013
      answersQuestionRefs:
        - QE006
        - QE024
    - id: CE007
      statement: >-
        The Wiz Security Graph indexes cloud resources from AWS, Azure, GCP, OCI, and Alibaba Cloud — plus runtime data,
        identity providers, and code repositories — into a unified graph database that can index 1M+ cloud resources per
        enterprise deployment with real-time query performance.
      confidence: high
      type: observed
      topic: technical-architecture
      freshness: current
      sourceRefs:
        - SE001
        - SE006
      answersQuestionRefs:
        - QE002
        - QE003
        - QE007
        - QE018
        - QE021
        - QE022
    - id: CE008
      statement: >-
        The Security Graph's Toxic Combination engine analyzes multi-hop attack paths to surface the top 1–3% of
        critical findings — reducing alert fatigue by filtering thousands of raw policy violations down to the handful
        of attack paths that represent real critical risk.
      confidence: high
      type: observed
      topic: technical-differentiation
      freshness: current
      sourceRefs:
        - SE001
        - SE015
      answersQuestionRefs:
        - QE002
        - QE008
