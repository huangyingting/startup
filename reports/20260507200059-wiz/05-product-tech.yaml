callouts:
  - id: KE001
    type: insight
    title: Security Graph Is a Technical Moat Built Over 5 Years of Cloud API Integration
    body: >
      The Wiz Security Graph indexes 1M+ cloud resources per enterprise deployment and cross- correlates configuration,
      vulnerability, identity, data, and runtime risk in a single unified model. Building the cloud API integration
      layer alone (AWS, Azure, GCP, OCI) took 12–18 months per provider. No competitor has replicated the Security
      Graph's depth — Palo Alto Prisma Cloud and CrowdStrike both have graph-like models, but neither has the cross-
      module correlation depth that enables Toxic Combination detection at Wiz's level.
    claimRefs:
      - CE007
      - CE008
    sourceRefs:
      - SE001
      - SE005
  - id: KE002
    type: risk
    title: Cloud API Dependency Is the Single Largest Technical Architecture Risk
    body: >
      Wiz's entire data ingestion layer depends on cloud provider APIs. AWS, Azure, and GCP control the API schemas,
      rate limits, and permission models that Wiz uses. Any major API change (e.g., AWS removing resource inventory API
      permissions, Azure changing IAM delegation models) could degrade Wiz's cloud coverage or require emergency
      engineering investment. This dependency is structural and cannot be fully mitigated — it is the architectural cost
      of the agentless approach.
    claimRefs:
      - CE012
      - CE013
    sourceRefs:
      - SE004
      - SE008
  - id: KE003
    type: benchmark
    title: Wiz for AI Is the Only Dedicated CNAPP AI SPM Product
    body: >
      Wiz for AI (2025) covers LLM workload discovery, AI model access control mapping, shadow AI workload detection,
      and OWASP LLM Top 10 policy enforcement — capabilities that no CNAPP competitor has matched. With GenAI adoption
      accelerating (Gartner estimates 30%+ of enterprises have production GenAI workloads by 2025), this first-mover
      advantage represents an estimated $2–5B incremental TAM by 2030.
    claimRefs:
      - CE003
      - CE004
    sourceRefs:
      - SE002
      - SE009
