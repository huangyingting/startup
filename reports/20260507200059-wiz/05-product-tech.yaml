sections:
  - id: SE001
    title: Core Architecture and Technology Foundation
    body: >
      Wiz's technical differentiation rests on three foundational architectural choices that collectively enable
      capabilities no agent-based or point-tool competitor can match. First, the agentless scanning engine: Wiz reads
      cloud environment state entirely through cloud provider APIs (AWS, Azure, GCP, OCI) and proprietary snapshot-based
      scanning — never installing agents on customer workloads. This approach provides instant deployment (<1 hour),
      zero operational overhead, and complete coverage of ephemeral cloud resources (serverless functions, containers,
      short-lived VMs) that agents would miss. Second, the Security Graph database: all cloud resources (compute,
      identity, network, data, code, configurations) are ingested into a proprietary graph database that models
      relationships between cloud entities. The graph enables Toxic Combination detection — a unique capability that
      identifies the chain of conditions (e.g., public exposure + over-privileged identity + unpatched OS + sensitive
      data) that constitutes a critical attack path, rather than alerting on each condition individually. This
      dramatically reduces alert fatigue and false positives. Third, unified multi-cloud coverage: a single Wiz
      deployment covers AWS, Azure, GCP, Oracle Cloud, and Alibaba Cloud — covering over 98% of enterprise cloud
      environments — through a single normalized security model and single pane of glass.
    tableRefs:
      - TE001
      - TE005
    figureRefs:
      - FE001
  - id: SE002
    title: Platform Modules and Product Portfolio
    body: >
      Wiz has evolved from a CSPM point tool into a seven-module CNAPP platform since 2020. Core CSPM (Cloud Security
      Posture Management): continuous configuration assessment across all cloud resources, with 1,400+ built-in checks
      covering CIS benchmarks, NIST CSF, SOC 2, PCI DSS, HIPAA, ISO 27001, and custom policies. CWPP (Cloud Workload
      Protection Platform): vulnerability management for containers, VMs, and serverless — including OS CVE scanning,
      container image scanning via Wiz's agentless snapshot approach. CIEM (Cloud Identity Entitlement Management):
      analysis of IAM roles, permissions, service account usage, and excessive privilege across multi-cloud
      environments. DSPM (Data Security Posture Management, launched 2023): automated data classification, sensitive
      data exposure mapping, and data access risk analysis — covering structured and unstructured data in cloud storage,
      databases, and SaaS applications. CDR (Cloud Detection and Response, via Gem Security acquisition): real-time
      threat detection using eBPF-based runtime sensors and behavioral analysis, integrated with the Security Graph for
      context-enriched alerting. Wiz Code (shift-left security, 2022): infrastructure-as-code scanning, SAST, and
      secrets detection embedded in CI/CD pipelines (GitHub Actions, GitLab, Jenkins, Azure DevOps). Wiz for AI (2025):
      AI Security Posture Management covering LLM inference servers, AI model access controls, AI pipeline scanning, and
      shadow AI workload discovery.
    tableRefs:
      - TE002
    figureRefs:
      - FE002
  - id: SE003
    title: Technical Differentiation and Innovation
    body: >
      Wiz's technology innovation is concentrated in three areas. The Security Graph engine processes and normalizes
      data from cloud APIs, agent-optional runtime sensors, code repositories, and identity providers into a single
      graph model. The graph currently indexes more than one million cloud resources per enterprise deployment at the
      largest customers, with query performance supporting real-time risk prioritization. The Toxic Combination
      detection algorithm — Wiz's proprietary risk prioritization engine — analyzes multi-hop attack paths through the
      Security Graph, surfacing the top 1–3% of findings that represent truly critical risk vs. the thousands of raw
      policy violations most cloud environments generate. This algorithm is the primary driver of customer ROI and has
      been the focus of ongoing R&D investment since the founding team joined from Microsoft Azure. The AI Security
      module (Wiz for AI) is technically differentiated by its ability to discover and classify AI workloads (Jupyter
      notebooks, MLflow instances, vector databases, LLM API endpoints) without agents, map their access and egress
      paths through the Security Graph, and apply specialized AI-specific policies — including OWASP LLM Top 10 checks
      and custom GenAI governance policies. This is a technically novel capability not available from any competitor.
    tableRefs:
      - TE003
    figureRefs:
      - FE003
  - id: SE004
    title: Technical Risks and Quality / Compliance
    body: >
      Wiz operates at massive scale — the Security Graph indexes cloud environments with millions of resources —
      presenting several technical risk areas. First, cloud API dependency: all of Wiz's data ingestion relies on cloud
      provider APIs (AWS, Azure, GCP). Any API deprecation, rate limiting, or change in permissions model by a
      hyperscaler could degrade Wiz's visibility or create compliance gaps. Second, data privacy in shared graph model:
      Wiz processes sensitive customer cloud metadata (resource configurations, identity information, data
      classification results) in a multi-tenant environment. A data isolation failure could expose one customer's cloud
      topology to another — a material security and contractual risk. Third, regulatory compliance: Wiz has achieved SOC
      2 Type II, ISO 27001, and CSA STAR Level 2 certifications; FedRAMP authorization is in progress. GDPR compliance
      is maintained for EU customers through a separate EU data residency offering. Fourth, developer signal: Wiz's
      open-source community presence (Wiz research blog, vulnerability disclosures) generates organic developer
      awareness but requires sustained investment to maintain thought leadership vs. CrowdStrike and Sysdig's larger
      developer communities.
    tableRefs:
      - TE004
    figureRefs:
      - FE004
