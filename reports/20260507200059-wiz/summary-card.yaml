summary:
  headline: |
    Wiz is the fastest-growing enterprise security company ever built — $500M+ ARR in under
    5 years, 40-45% Fortune 100 penetration, and a genuinely differentiated Security Graph
    architecture. At $32B (~64x ARR), the valuation reflects extraordinary expectations.
    The base-case IPO outcome is $17-25B (25-45% below the last private round). The bull
    case ($28-32B at IPO) requires sustained 38%+ ARR growth and public market multiple
    re-rating that current conditions do not support. Wiz is a conditional long: diligence-
    worthy, but entry at $32B requires explicit conviction in the bull case and a 3-5 year
    hold horizon.
