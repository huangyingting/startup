  topStrengths:
    - >-
      Fastest ARR growth in enterprise security history: $100M to $500M+ in 4 years — faster than CrowdStrike, Zscaler,
      or Palo Alto Networks at equivalent stages
    - >-
      Security Graph is a genuinely defensible architectural moat: agentless, multi-cloud attack path analysis with
      5-year head start that competitors require 2-3 years to partially replicate
    - >-
      40-45% Fortune 100 penetration provides a self-reinforcing reference network that accelerates enterprise sales
      cycles and creates switching costs through multi-module adoption
    - >-
      First-mover in AI Security Posture Management (AI-SPM): Wiz for AI is positioned at the intersection of the two
      fastest-growing enterprise technology waves (cloud and AI), extending TAM by $1.5-2.5B
    - >-
      Rejected $23B Alphabet acquisition and filed confidential S-1 — founder conviction backed by oversubscribed $32B
      Series F demonstrates exceptional board and investor alignment on the public market path
  topRisks:
    - >-
      Valuation premium risk: $32B at ~64x ARR is 4-5x the public comparable average; base case IPO repricing to $17-25B
      implies 25-45% paper loss for Series F investors before any recovery
    - >-
      PANW platformization churn: Palo Alto Networks is offering CNAPP at zero marginal cost to 7,000+ existing
      accounts; even 10% overlap creates 700+ potential churn events at an estimated $105-150M at-risk ARR
    - >-
      Israeli geopolitical and export control risk: 50-60% of R&D in Tel Aviv during ongoing conflict; BIS/EAR export
      control compliance for dual US-Israeli cybersecurity operations not publicly addressed
    - >-
      FedRAMP gap: no FedRAMP Moderate authorization means Wiz cannot serve US federal agencies or DoD contractors,
      blocking an estimated $500M-$1B ARR government sector opportunity currently held by CrowdStrike and PANW
    - >-
      Key-person dependency: founder-CEO Rappaport owns the IPO narrative and enterprise relationship network; departure
      before IPO would be a material adverse change with no clear successor identified
  unresolvedGaps:
    - >-
      Current ARR trajectory and NRR not confirmed in data room — all valuation scenarios depend on these two metrics;
      $32B entry requires ARR at $600M+ and NRR above 120%
    - >-
      BIS/EAR export control compliance status for dual US-Israeli operations not publicly disclosed; could affect
