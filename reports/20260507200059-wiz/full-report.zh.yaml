      - number: '3.3'
        title: Wiz 竞争护城河分析
        blocks:
          - type: paragraph
            body: >
              Wiz 的竞争差异建立在四个相互强化的支柱上。第一，Security Graph：自研统一图数据库，连接多云环境中的 所有云资产、身份、配置、网络路径和数据。该图谱可以做「有毒组合」检测，找出单维扫描无法发现的
              攻击路径；每接入一个云平台都需要 12–18 个月的深度云 API 集成。第二，无代理部署：Wiz 不安装代理， 不到一小时即可部署，价值兑现速度显著快于代理式平台。这在竞争评估（POC 赢率）中是结构性优势。
              第三，Fortune 100 品牌光环：40–45%+ 的 Fortune 100 使用 Wiz，在企业销售周期中形成社会证明。第四， 覆盖广度：Wiz 平台覆盖
              CSPM、CWPP、CIEM、DSPM、CDR、Wiz Code（shift-left）和 Wiz for AI，在单一 平台内匹配或超过 Prisma Cloud 的模块广度。
            claimRefs: []
