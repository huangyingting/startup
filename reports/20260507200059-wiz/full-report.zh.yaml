      - number: '5.3'
        title: 技术差异化与创新
        blocks:
          - type: paragraph
            body: >
              Wiz 的技术创新集中在三处。Security Graph 引擎把来自云 API、可选运行时传感器、代码仓库和身份提供商的 数据处理并标准化到单一图模型中。在最大客户的企业部署里，该图谱目前为超过 100
              万个云资源建立索引， 查询性能足以支持实时风险排序。Toxic Combination 检测算法是 Wiz 自研风险排序引擎，通过 Security Graph
              分析多跳攻击路径，在大多数云环境产生的数千条原始政策违规中，浮出真正关键风险所在的前 1–3%。该算法是 客户 ROI 的主要来源，也是创始团队从 Microsoft Azure 出来后持续投入研发的重点。AI
              Security 模块 （Wiz for AI）的技术差异在于，无需代理即可发现并分类 AI 工作负载（Jupyter notebooks、MLflow instances、 向量数据库、LLM API
              端点），通过 Security Graph 映射其访问和出站路径，并应用专门的 AI 政策，包括 OWASP LLM Top 10 检查和自定义 GenAI 治理政策。这是任何竞争对手都不具备的新技术能力。
