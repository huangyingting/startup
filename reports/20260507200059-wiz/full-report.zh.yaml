chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >
              Wiz 是一家总部位于纽约市的云安全公司，2020 年 1 月由四位前 Microsoft Azure 资深成员创办——Assaf Rappaport（CEO）、Yinon Costica（总裁）、Roy
              Reznik（CTO）和 Ami Luttwak（首席技术官）。公司为企业 云环境打造了领先的云原生应用保护平台（CNAPP）和云安全态势管理（CSPM）工具， 采用无代理扫描架构，直接读取云厂商
              API（AWS、Azure、GCP、OCI），无需在单个工作负载上部署软件代理。 Wiz 的核心商业模式是 SaaS 订阅，按云资源或工作负载计费，以年度合同直接卖给企业安全和云团队。平台
              生成自研的「安全图谱」，把所有云身份、工作负载、数据和网络配置统一起来，暴露孤岛工具看不到的 横向移动路径和有毒风险组合。截至 2026 年 5 月，Wiz 已成长为史上扩张最快的企业 SaaS 公司之一：18
              个月 做到 $100M ARR，据报道到 2024 年末已超过 $500M ARR，客户中包含 40%+ 的 Fortune 100 公司。
