      - number: '3.2'
        title: 主要竞争对手分析
        blocks:
          - type: paragraph
            body: >
              Palo Alto Networks Prisma Cloud 是 Wiz 面向企业客户的首要竞争对手，估计拥有 $800M–$1B+ CNAPP/云 ARR （嵌在 PANW 平台收入中）。Prisma
              Cloud 的核心优势是 Palo Alto 防火墙和 NGFW 存量客户带来的企业关系， 约 80,000 家企业客户。但 Prisma Cloud 也以部署复杂（代理式架构）和总体拥有成本较高著称，因此
              Wiz 的无代理方案在竞争替换中更有吸引力。CrowdStrike Falcon Cloud Security（原 Falcon Horizon/CSPM） 是第二大威胁：CrowdStrike 的 Falcon
              XDR 平台已深度嵌入 SOC，并拥有端点遥测，能提供 Wiz 无代理方案 难以同等深入覆盖的运行时威胁检测。Microsoft Defender for Cloud 则是最大结构性风险，因为它面向 Azure
              客户免费或捆绑提供；不过市场认为其多云支持弱于 Wiz。
            claimRefs: []
