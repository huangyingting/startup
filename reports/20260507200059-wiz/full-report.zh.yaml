            body: >
              Wiz 的收入扩张靠两股力量拉动：第一，现有账户里的云资源增长——企业把更多工作负载迁到云上，Wiz 监控的资源自动增加，订阅成本随之上升；第二，模块扩张——客户先从核心 CSPM 用起，看到更多价值后再扩到
              DSPM、Wiz Code、CDR 和 Wiz for AI。这个平台扩张路径与 Snowflake、Datadog、CrowdStrike 等高 NRR SaaS
              公司相似：先用核心产品切入，再在每个相邻模块证明 ROI 后系统增购。分析师估计 Wiz 的净留存率（NRR）在 130%+，意味着即使不新增客户，存量收入每年也能增长
              30%。按云资源计价尤其适合吃到云迁移红利——企业签下 100,000 个云资源后扩到 200,000 个，无需重新谈判，Wiz 支出就自动翻倍。Wiz 因此有了一套不依赖新销售的内生收入增长机制。
