        title: 客户群概览
        blocks:
          - type: paragraph
            body: >
              Wiz 搭出了云安全史上增长最快的企业客户群之一。截至 2024 年末，公司估计服务 5,000–8,000 家企业客户， 在 Fortune 100 中渗透尤其深（40–45%+）。具名 Fortune 100
              客户包括 BMW Group、Salesforce、Morgan Stanley、Capital One、DocuSign、Fox Corporation 等，横跨金融服务、科技、医疗健康、媒体和汽车垂直。
