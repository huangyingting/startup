  productSummary: |
    Wiz 平台围绕 Security Graph 搭建。Security Graph 是属性图数据库，靠无代理只读 API 扫描摄取云资源元数据，
    并映射计算、身份、数据、网络、漏洞节点之间的关系。平台提供七个集成模块：（1）云安全态势管理（CSPM）——
    配置错误和合规违规；（2）云工作负载保护（CWPP）——面向 VM、容器和无服务器的漏洞评估；（3）云基础设施
    权限管理（CIEM）——身份风险和过度授权；（4）数据安全态势管理（DSPM）——敏感数据发现和暴露分析；（5）
    云检测与响应（CDR，通过 Gem Security）——用 eBPF 做运行时威胁检测；（6）AI 安全态势管理（AI-SPM）——
    AI 工作负载安全的先发产品；（7）IaC 安全——在 CI/CD 流水线中预防基础设施即代码配置错误。Security Graph
    将各模块发现放进上下文，产出攻击路径分析：把相互连接的风险串起来，揭示通向关键资产的可利用路径。
  customerFocus: 企业客户（Fortune 100/500/1000）：需要多云 CNAPP 的 AWS、Azure、GCP、OCI 用户；Fortune 100 渗透率 40-45%；重点垂直：金融服务、科技、医疗健康、零售、制造
  businessModel: 企业 SaaS：按资源（云资源数量）定价，采用多年期合同；先落地再扩张，靠多模块采用推动估计 130%+ 的 NRR； AWS/Azure Marketplace 分发加速企业采购
