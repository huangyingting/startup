  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与 ARR 轨迹
        blocks:
          - type: paragraph
            body: >
              Wiz 采用纯 SaaS 订阅模式，年经常性收入（ARR）是核心财务指标。公司的 ARR 爬坡史无前例：运营第一个月 （2020 年 1 月）做到 $1M，18 个月（2021 年中）做到 $100M，2023
              年末做到 $350M，2024 年末做到 $500M+，对应 2023–2024 年约 43%+ 同比增长。放在同等规模的 SaaS 安全公司中，这条曲线更快。收入来自 多个平台模块：核心
              CSPM/CWPP（主力）、DSPM（2023 年推出）、Wiz Code（shift-left，2022 年）、 通过 Gem Security 获得的 CDR（2024 年末收购）以及 Wiz for
              AI（2025 年）。定价按云资源 / 工作负载 计算，企业 ACV 从 $50K 到 $5M+ 不等，取决于云足迹规模和模块采用。净留存率（NRR）尚未公开披露，但
              分析师根据公开客户披露中可见的平台扩张和增购模式，估计为 130%+。
