              Marketplace、Microsoft Azure Marketplace， 以及 Carahsoft、Guidepoint Security 等大型经销商）。按估计 130%+ 的 NRR
              看，客户留存很强，动力来自模块 扩张（DSPM、CDR、Code 增购）和存量账户内云资源增长。
