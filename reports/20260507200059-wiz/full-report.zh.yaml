        title: 融资历史与资本状况
        blocks:
          - type: paragraph
            body: >
              2020–2025 年，Wiz 通过六轮融资累计拿到约 $2.7–2.8B，使其成为史上资本最充足的私营网络安全公司之一。 关键轮次包括：Series A 以 $1B 估值融资 $100M（2021 年 1
              月，创立 12 个月后）；Series B 以 $6B 估值 融资 $250M（2021 年 10 月）；Series C 以 $10B 估值融资 $300M（2022 年 2 月）；Series E 以
              $12B 估值融资 $1B（2024 年 5 月，由 General Atlantic/Sequoia/Index 领投）；Series F 以约 $32B 估值融资 约 $1B（2025
              年，时间点由多方来源印证）。公司还在 2024 年末动用约 $350M 收购 Gem Security。按据报道 $32B 估值和 $500M+ ARR 计算，Wiz 交易倍数约为 60–64× 预期
              ARR，显著高于上市可比公司（CrowdStrike 约 15× NTM 收入，Palo Alto Networks 约 9× NTM 收入）。累计融资 $2.7B+，且假设收购 Gem 后仍有 $1B+
              现金，意味着按当前烧钱速度（这种规模和增速的公司估计每年 $200–$400M）有 2–4 年现金跑道。
