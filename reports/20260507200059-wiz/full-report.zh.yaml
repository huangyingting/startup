      - number: '2.4'
        title: 市场约束与逆风
        blocks:
          - type: paragraph
            body: >
              三个结构性逆风会压低 Wiz 的云安全市场机会。第一，超大规模云厂商竞争：AWS、Azure 和 Google 都提供 原生安全工具（Security Hub、Defender for
              Cloud、Security Command Center），并以低边际成本或零边际 成本打包进自家平台。这些工具的多云和第三方集成深度不及 Wiz，但能力越来越强，也给独立云安全厂商
              带来预算压力。第二，平台整合：Palo Alto Networks（Prisma Cloud）、CrowdStrike（Falcon Cloud Security） 和
              Microsoft（Defender）等大型安全平台厂商，正把 CNAPP 能力打包进更广的企业安全套件，形成「平台化 vs. 最佳单品」的采购动态，Wiz
              必须证明独立价值高于套件内置模块。第三，预算压力：2022–2023 年 SaaS 支出理性化之后，企业安全预算被要求整合；客户可能推迟 CNAPP 续约，或整合到平台厂商上，从而压缩 Wiz 的定价权。
            claimRefs: []
