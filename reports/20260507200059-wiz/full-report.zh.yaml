      - number: '1.3'
        title: 融资与估值历史
        blocks:
          - type: paragraph
            body: >
              Wiz 已在五轮已确认融资中累计拿到约 $2.7–2.8B 风险资本，全部发生在创立后五年内——这是企业 SaaS 史上最快的资本积累曲线之一。Series A 于 2021 年 1 月（创立后 13 个月）以
              $1B 估值融资 $100M。Series B 于 2021 年 10 月以 $6B 估值融资 $250M。Series C 于 2022 年 2 月以 $10B 估值融资 $300M。Series E 于
              2024 年 5 月以 $12B 估值融资 $1B，是本次尽调窗口内的关键轮次。2025 年，Wiz 据报道又以 $32B 估值（Series F）融资约 $1B，较 2024 年轮次接近 3
              倍上调，显示投资人信心仍在。主要投资方包括 Sequoia Capital、Andreessen Horowitz（a16z）、Index Ventures、Greenoaks Capital、General
              Atlantic、 Lightspeed Venture Partners 和 Insight Partners。2024 年 7 月，据报道 Alphabet（Google 母公司）提出 以 $23B 整体收购
              Wiz；Rappaport 拒绝交易，选择继续推进独立 IPO 路径——这是企业 SaaS 史上最大规模的 被拒收购报价之一。
