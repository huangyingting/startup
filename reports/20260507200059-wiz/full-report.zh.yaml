      - number: '2.3'
        title: 市场分层与买方动态
        blocks:
          - type: paragraph
            body: >
              Wiz 的主要买方，是收入 $1B+、云足迹显著的企业和中端公司的云安全团队（CISO、云安全架构师、DevSecOps 负责人）。典型决策者是 Fortune 500 公司的安全工程副总裁或
              CISO，云平台团队（AWS/Azure/GCP 架构师） 和开发团队（shift-left 安全）也会影响决策。关键购买人群包括：（1）纯云企业（科技、SaaS、数字原生）—— 采用最快、NRR
              最高，也是最早的 CNAPP 买家；（2）混合云企业（金融服务、医疗健康、零售）——预算大、 多云复杂、由合规驱动；（3）受监管行业（政府、国防、关键基础设施）——采购慢但合同最大；（4）中端 增长型公司（收入
              $100–500M）——销售速度快、ACV 较低、价格敏感。各分层看重 Wiz 的点不同：纯云企业 看重价值兑现速度（无需部署代理），混合云企业看重合规报告，受监管行业看重 FedRAMP 授权工具。
            claimRefs: []
