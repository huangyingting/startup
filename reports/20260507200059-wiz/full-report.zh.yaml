            body: >
              Wiz 作为私营公司尚未披露财务报表。不过，单位经济模型可以借上市可比公司和已披露指标估算。$500M+ ARR 的云安全 SaaS 平台通常毛利率在 70–80%；Wiz
              的无代理模式（无硬件、无代理分发成本）和以云 API 为主的 架构，意味着毛利率可能靠近区间高端。销售与营销支出显著：Wiz 约有 1,000+ 名销售人员（按 LinkedIn 显示总员工约
              3,500–4,000 人估计），意味着 S&M 费用率为 ARR 的 40–55%，这对一家 $500M+ ARR 且增长 40%+
              的公司而言并不异常。考虑到技术深度和平台持续扩张，研发支出也很高。参照同等增长 / 规模转换期的 上市 SaaS 安全公司（例如 Sentinel One 在 $700M ARR 时每年亏损约
              $300M），当前阶段净亏损可能为每年 $150–$400M。IPO 路径（2025 年秘密提交 S-1）意味着公司需要证明一条通向盈利的叙事。
