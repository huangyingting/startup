companyProfile:
  summary: |
    Wiz 总部在纽约，是一家云原生应用保护平台（CNAPP）公司，2020 年 1 月由四位以色列联合创始人创办：
    CEO Assaf Rappaport、总裁 Yinon Costica、CTO Ami Luttwak 和研发副总裁 Roy Reznik。四人均出身
    Unit 8200，也曾在 Microsoft Azure 安全团队担任负责人（Adallom 于 2015 年以 $320M 被收购）。公司的核心
    产品是 Wiz Security Graph：无代理、基于 API 的架构，映射 AWS、Azure、GCP、OCI 上云资源、身份、漏洞
    和数据之间的关系，用于攻击路径分析和多云风险排序。Wiz 不到 5 年就做到 $500M+ ARR，是企业安全史上最快
    的增长曲线；在 5,000-8,000 家企业客户中，Fortune 100 渗透率达到 40-45%。公司在 2025 年 2 月完成
    Series F，以 $32B 估值融资 $1B（Andreessen Horowitz、General Atlantic、Greenoaks、Lightspeed），
    2024 年 7 月拒绝 Alphabet $23B 收购报价，并于 2025 年初向 SEC 秘密提交 S-1 招股说明书。研发主要在
    Tel Aviv（估计占 3,500-4,000 名员工的 50-60%）。Wiz 还在 2024 年末以约 $350M 收购 Gem Security
    （CDR），向运行时安全延伸。
