      - number: '4.5'
        title: 关键论据
        blocks:
          - type: callout
            title: Wiz 的 ARR 爬坡是云安全史上最快
            body: >
              Wiz 创立后 18 个月做到 $100M ARR，约 48 个月做到 $500M ARR——这条曲线超过 Okta（5 年做到 $100M）、 CrowdStrike（6 年）和 Palo Alto
              Networks（8+ 年）。从 $350M 增至 $500M+，同比增长 43%+；在同等规模下， Wiz 增速快于任何上市云安全公司，强有力地证明了持续的产品市场匹配和高效商业化执行。
            calloutType: insight
            claimRefs:
              - CI001
              - CI002
          - type: callout
            title: $32B 私募估值带来显著 IPO 重新定价风险
            body: >
              按约 64× 预期 ARR 计算，Wiz $32B 估值约为上市云安全可比公司 ARR 倍数的 4–7 倍（CrowdStrike 约 15×， Palo Alto 约 9×）。若 $32B 轮投资人要在 IPO
              中打平，Wiz 要么需要以可比 IPO 倍数做到 $1.5–$2B+ ARR， 要么需要市场把云安全重新定价到更早期公司的倍数。近期可比 IPO（Rubrik、Sentinel One）定价都低于
              后期私募估值，构成结构性重新定价风险。
            calloutType: insight
            claimRefs:
              - CI009
              - CI010
          - type: callout
            title: 130%+ NRR 是 Wiz 最重要的财务信号
            body: >
              估计 130%+ 的净留存率若得到确认，将意味着即使没有新增客户，Wiz 现有客户群每年也会扩张 30%。这是最 重要的财务质量指标：Wiz 仅靠存量客户就能维持 20–25%
              增长，新客户获取则贡献上行空间。该指标也验证了 产品平台黏性和多模块采用。NRR 应成为数据室的首要索取项。
            calloutType: insight
            claimRefs:
              - CI006
              - CI012
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心架构与技术底座
        blocks:
          - type: paragraph
            body: >
              Wiz 的技术差异化来自三项基础架构选择，三者合在一起，形成代理式或点状工具竞争对手难以匹配的能力。 第一，无代理扫描引擎：Wiz 完全通过云厂商
              API（AWS、Azure、GCP、OCI）和自研快照式扫描读取云环境状态， 从不在客户工作负载上安装代理。该方案可以即时部署（<1 小时）、零运营负担，并完整覆盖代理容易漏掉的
              短生命周期云资源（无服务器函数、容器、短命 VM）。第二，Security Graph 数据库：所有云资源（计算、 身份、网络、数据、代码、配置）都会进入自研图数据库，模型化云实体之间的关系。该图谱支持
              Toxic Combination 检测，这是一项独特能力：它识别构成关键攻击路径的条件链（例如公开暴露 + 过度授权身份 + 未打补丁 OS +
              敏感数据），而不是逐项告警。这样能大幅降低告警疲劳和误报。第三，统一多云覆盖：一次 Wiz 部署即可覆盖 AWS、Azure、GCP、Oracle Cloud 和 Alibaba
              Cloud，通过单一标准化安全模型和单一视图， 覆盖超过 98% 的企业云环境。
