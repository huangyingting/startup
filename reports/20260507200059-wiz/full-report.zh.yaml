      - number: '2.5'
        title: 关键论据
        blocks:
          - type: callout
            title: AI 工作负载安全是先发品类，到 2030 年价值 $2–5B
            body: >
              Wiz for AI（2025 年推出）让 Wiz 成为第一家切入 AI 基础设施安全态势的成熟 CNAPP 厂商，覆盖 LLM 推理 服务器、训练流水线和 GenAI 应用安全。这个新兴子市场 2024
              年估计为 $100–300M，但随着企业 AI 工作负载 采用加速，CAGR 达 50–70%。AI 安全的先发优势可能为 Wiz 长期 ARR 潜力增加 $1–3B。
            calloutType: insight
            claimRefs:
              - CM003
              - CM013
          - type: callout
            title: 超大规模云厂商捆绑是最具破坏性的长期市场风险
            body: >
              AWS、Azure 和 Google 合计承载 70%+ 的企业云工作负载，也都以零成本或极低额外成本提供原生安全工具。 这些工具虽然缺少多云广度，但进步很快。AWS Security Hub 或 Azure
              Defender 若出现显著能力提升，尤其 面向单云客户，可能在续约时把 Wiz 部分存量客户转向捆绑工具；成本敏感的中端客户风险尤其高。
            calloutType: insight
            claimRefs:
              - CM014
              - CM017
          - type: callout
            title: CNAPP 市场以 25–30% CAGR 增长，是安全领域最快板块
            body: >
              CNAPP 是网络安全中增长最快的子板块，CAGR 为 25–30%，高于整体网络安全的 10–12%。这反映企业工作负载 向云环境迁移的结构性变化。Wiz 2024 年 ARR 增长 43%+，超过市场
              CAGR，意味着公司正在拿份额——既从 既有厂商（Palo Alto Prisma）拿，也从点状工具（独立 CSPM）拿。
            calloutType: insight
            claimRefs:
              - CM002
              - CM004
              - CM006
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争市场概览
        blocks:
          - type: paragraph
            body: >
              Wiz 竞争于云原生应用保护平台（CNAPP）市场。Gartner 于 2021 年定义该市场后，大型既有厂商（Palo Alto
              Networks、CrowdStrike、Microsoft）和专业挑战者（Orca Security、Aqua Security、Sysdig、Lacework）
              迅速进入。竞争格局分三层：（1）平台整合者（Palo Alto Networks Prisma Cloud、CrowdStrike Falcon Cloud Security、Microsoft Defender
              for Cloud），把 CNAPP 能力打包进多产品安全套件；（2）云原生 专家（Wiz、Orca Security、Lacework/Fortinet），从云环境出发重建产品；（3）工作负载专项工具（Aqua
              Security、Sysdig、Snyk），主导容器 / Kubernetes 安全或开发者中心扫描。Wiz 用 Security Graph 模型
              拉开差异：统一图数据库连接云资源、身份、工作负载和配置，暴露有毒组合攻击路径；直接竞争对手尚未 复制同等深度的架构。截至 2024 年，Wiz 位列 Gartner CNAPP
              魔力象限领导者位置，这也是其进入领导者象限 的第一年。
            claimRefs: []
