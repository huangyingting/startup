      - number: '3.4'
        title: 竞争替换与赢单 / 输单动态
        blocks:
          - type: paragraph
            body: >
              Wiz 已在 Palo Alto Networks Prisma Cloud 面前拿下大量竞争替换，尤其是在评估 CNAPP 替换的 Fortune 500 客户中。行业来源显示，Wiz 与 Prisma
              Cloud 正面 POC 时，凭价值兑现速度和无代理架构指标赢下约 70%+。 面对 CrowdStrike Falcon Cloud Security，赢率更混合——Wiz 在 CSPM/DSPM
              广度上领先，CrowdStrike 在运行时 威胁检测（EDR 集成）上领先。面对 Microsoft Defender for Cloud，Wiz 在多云环境中赢，但在 Defender 免费的
              Azure-only 单云客户中输。Wiz 的关键输单场景包括：（1）已有 Palo Alto 平台合同的客户（捆绑压力）； （2）重视 XDR 集成的 CrowdStrike Falcon Complete
              客户；（3）使用 Microsoft E5 安全捆绑包的纯 Azure 企业。Wiz 2024 年以约 $350M 收购 Gem Security（CDR），正是为了补上相对 CrowdStrike 的运行时 /
              威胁 检测缺口。所有竞争场景中，Wiz 的稳定优势都是：Security Graph 风险关联、无代理部署速度，以及相对 ACV 的平台广度（七个模块）。Fortune 100
              存量客户在新客户评估中充当社会证明，显著缩短企业潜在客户的 销售周期。
            claimRefs: []
