      - number: '1.4'
        title: 里程碑与牵引力
        blocks:
          - type: paragraph
            body: >
              Wiz 连续打出一组定义品类的里程碑。公司运营第一个月（2020 年末）做到 $1M ARR，18 个月（2022 年中） 做到 $100M ARR，2023 年末做到 $350M
              ARR——每个节点都超过同龄企业 SaaS 的既有纪录。到 2024 年末， Wiz 披露 ARR 超过 $500M，并称客户数量已达数千家。客户群包括超过 45% 的 Fortune 100 公司，含 BMW、
              Salesforce、Morgan Stanley、Capital One、DocuSign 和 Fox Corporation。Wiz 推出多个产品延伸： Wiz Code（应用安全 /
              shift-left）、Wiz DSPM（数据安全态势管理）、Wiz Runtime（运行时检测与响应） 和 Wiz for AI（AI 工作负载安全态势），从单纯 CSPM/CNAPP
              扩张为更广的云安全平台。2024 年，Wiz 还收购 Gem Security（云检测与响应）。2025 年，Wiz 向 SEC 秘密提交 IPO 文件，释放出可能在 2025–2026 年窗口 上市的信号。
