      - number: '5.2'
        title: 平台模块与产品组合
        blocks:
          - type: paragraph
            body: >
              自 2020 年起，Wiz 已从 CSPM 点状工具演进为七模块 CNAPP 平台。核心 CSPM（云安全态势管理）：持续评估 所有云资源配置，内置 1,400+ 项检查，覆盖 CIS
              benchmarks、NIST CSF、SOC 2、PCI DSS、HIPAA、ISO 27001 和自定义政策。CWPP（云工作负载保护平台）：管理容器、VM 和无服务器漏洞，包括 OS CVE 扫描，以及通过
              Wiz 无代理快照方案做容器镜像扫描。CIEM（云身份权限管理）：分析多云环境中的 IAM 角色、权限、服务账号 使用和过度授权。DSPM（数据安全态势管理，2023
              年推出）：自动数据分类、敏感数据暴露映射和数据访问风险 分析，覆盖云存储、数据库和 SaaS 应用中的结构化与非结构化数据。CDR（云检测与响应，通过收购 Gem Security 获得）：使用基于 eBPF
              的运行时传感器和行为分析做实时威胁检测，并与 Security Graph 集成，形成带上下文的 告警。Wiz Code（shift-left 安全，2022 年）：把基础设施即代码扫描、SAST 和密钥检测嵌入
              CI/CD 流水线 （GitHub Actions、GitLab、Jenkins、Azure DevOps）。Wiz for AI（2025 年）：AI 安全态势管理，覆盖 LLM 推理服务器、AI
              模型访问控制、AI 流水线扫描和影子 AI 工作负载发现。
            claimRefs: []
