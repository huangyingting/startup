        title: 关键论据
        blocks:
          - type: callout
            title: Wiz for AI 是尚未被挑战的先发产品线
            body: >
              截至 2025 年初，没有主要 CNAPP 竞争对手推出专门的 AI 安全态势管理（AI SPM）产品。Wiz for AI 覆盖 LLM 推理服务器、AI 训练流水线、GenAI
              应用密钥和模型权重访问控制，在竞争对手追上覆盖范围前，拥有 12–18 个月先发窗口。这是 Wiz 当前差异化最强的产品。
            calloutType: insight
            claimRefs:
              - CP007
              - CP015
          - type: callout
            title: Palo Alto Networks 捆绑是最紧迫的竞争威胁
            body: >
              Palo Alto Networks 的平台化策略——把 Prisma Cloud 与 NGFW、Cortex XDR、Cortex XSIAM 深度折扣捆绑—— 制造了 Wiz
              独立难以匹配的价格和采购整合压力。已经与 Palo Alto 防火墙有关系的企业（每年 PANW 支出 $1M+）即便在独立技术评估中认可 Wiz，也有强动机按捆绑价格扩展到 Prisma Cloud。PANW
              存量最深的 Fortune 2000 客户群中，这一风险尤其尖锐。
            calloutType: insight
            claimRefs:
              - CP010
              - CP016
          - type: callout
            title: Security Graph 是 Wiz 最可防守的护城河
            body: >
              Wiz Security Graph 把 1M+ 云资源、身份和配置接入统一图数据库，用于攻击路径分析，是 CNAPP 市场唯一真正 独特的架构护城河。无代理部署现在已是入场门槛（Orca、PANW 和
              CrowdStrike CSPM 都提供），但没有竞争 对手复制出 Security Graph 的跨上下文关联深度。要搭出可比图谱，每个云厂商都需要 12–18 个月云 API 集成工程，还需要 Wiz 自
              2020 年起持续迭代的数据模型。
            calloutType: insight
            claimRefs:
