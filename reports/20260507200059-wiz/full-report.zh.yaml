  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Wiz 主要竞争于云原生应用保护平台（CNAPP）和云安全态势管理（CSPM）市场，二者都属于更广的云安全和 信息安全市场。CNAPP 是 Gartner 2021 年提出的平台品类，把
              CSPM（云配置审计）、CWPP（云工作负载保护）、 CIEM（云身份权限管理）、DSPM（数据安全态势管理）和 CDR（云检测与响应）整合到单一平台。Wiz 的相关 TAM 跨四层：（1）全球云安全市场（到
              2030 年 $80–100B+，CAGR 15–18%）；（2）CNAPP 子市场（到 2028 年约 $10–15B）；（3）CSPM 子板块（到 2027 年约
              $5–8B）；（4）更广的企业网络安全市场（$300B+）。 Wiz 当前 SAM 主要是拥有显著云基础设施（AWS、Azure、GCP、OCI）的企业和中端公司，全球估计 $15–25B。 SOM 反映 Wiz
              在未来 3–5 年、当前增速和竞争动态下真正可拿到的份额，估计为 $3–8B ARR，取决于平台向 DSPM、CDR 和 Wiz for AI 扩张的成功程度。
            claimRefs: []
