      - number: '1.2'
        title: 创始故事与团队
        blocks:
          - type: paragraph
            body: >
              Wiz 四位联合创始人曾在 Microsoft 共事多年。Microsoft 2015 年收购他们此前创办的 Adallom 后，他们最近 参与搭建的是 Azure Security Center（现
              Microsoft Defender for Cloud）。Assaf Rappaport 曾任 Microsoft Azure 研发副总裁；Yinon Costica 负责 Azure 云安全产品；Roy
              Reznik 负责 Azure 安全产品工程；Ami Luttwak 担任首席工程经理。共同搭建大规模云安全基础设施的经历，让他们一线验证了无代理、图谱化方案相对传统 代理式工具的优势。团队在 2019 年末离开
              Microsoft 创办 Wiz，明确判断是：云安全需要按云原生 SaaS 产品 从零重建。Wiz 创始团队还受益于以色列情报圈校友网络——Rappaport 服役于以色列情报部队 Unit 8200，数名
              早期员工也来自该部队，因此能接触顶尖安全工程人才。Wiz 于 2020 年 1 月注册成立，并在 6 个月内发布 首款产品。
