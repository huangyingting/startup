            body: >
              Wiz 的资本充足性在多个维度上都偏强。第一，累计融资 $2.7B+，假设手头现金 $1–1.5B，按估计烧钱水平可支撑 2–4 年。第二，公司在 2024 年 7 月拒绝 Alphabet $23B
              收购报价，说明投资人和管理层相信独立路径能带来 显著更高的公开市场估值。第三，2025 年秘密提交 S-1，意味着 IPO 流程已启动；若完成，公司将获得额外 新股资本和可用于 M&A
              的公开市场货币。关键资本风险包括：（1）Gem Security 收购（$350M）削减近期现金； （2）在平台整合者压力下维持 40%+ 增长，需要高 S&M 支出；（3）若发行前市场环境恶化，IPO
              时点存在风险。 Rule of 40 分数（增长率 + EBITDA 利润率）估计为 30–45；按当前烧钱水平，可能低于 40 门槛，说明公司需要 在 IPO 前展示利润率改善。可比 IPO（Sentinel
              One、Rubrik）在 2022–2024 年都以显著低于私募估值的价格 定价，意味着 Wiz $32B 私募估值将在公开市场承压验证。
