      - number: '2.2'
        title: 市场驱动与顺风
        blocks:
          - type: paragraph
            body: >
              四股结构性力量正在加速云安全平台需求。第一，云采用仍以 20%+ CAGR 扩张：到 2025 年，AWS、Azure 和 GCP 合计承载超过 70%
              的企业工作负载，攻击面持续扩大，传统本地部署安全工具覆盖不了。第二，攻击面 复杂度继续叠加：多云环境（平均企业使用 2.6 个云）、微服务架构、容器、无服务器和 AI/LLM 工作负载，
              都带来新的配置和身份风险，需要专门的 CNAPP 工具。第三，监管合规压力加大：SEC 2023 年网络安全披露 规则、CISA 的 Secure by Design 框架和欧盟 NIS2 Directive
              都提高了云配置错误的成本，并推动企业安全 支出。第四，攻击者的入侵经济性改善，防守方成本上升：2024 年数据泄露平均成本达到 $4.88 million
              （IBM/Ponemon），云特有配置错误被列为主要攻击向量。这四股力量共同形成了持久、非可选的 CNAPP 需求 周期。
            claimRefs: []
