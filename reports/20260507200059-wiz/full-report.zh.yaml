  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 战略和竞争风险
        blocks:
          - type: paragraph
            body: >
              Wiz 面临四个主要战略风险。第一，平台整合风险：Palo Alto Networks（Prisma Cloud）、CrowdStrike（Falcon Cloud Security）和
              Microsoft（Defender for Cloud）正在执行捆绑策略，把 CNAPP 功能以零边际成本或低边际成本卖给既有企业客户关系。Fortune 500 层级风险最尖锐，因为 PANW 已有
              80,000+ 个账户。第二，超大规模云厂商竞争风险：AWS、Azure 和 GCP 正在持续强化原生安全工具。如果任何一家超大规模云厂商推出与 Wiz Security Graph 相当的多云 CSPM
              能力，无代理 CNAPP 市场将面临生存威胁。第三，IPO 执行风险：Wiz 的 $32B 私募估值要求公开市场投资者接受比上市云安全可比公司高 4-7x 的 ARR 倍数。IPO 前如果市场环境转弱、倍数压缩或
              ARR 增速放缓，估值可能被大幅下修。第四，地缘政治和关键人物风险：四位创始人都是有 Unit 8200 背景的以色列公民，研发主要在 Tel
              Aviv。以色列地缘政治不稳定可能扰乱工程运营，技术领导力集中在联合创始人身上也带来关键人物依赖。
