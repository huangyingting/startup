      - number: '1.5'
        title: 封面指标与证据缺口
        blocks:
          - type: paragraph
            body: >
              Wiz 的关键指标一部分已披露，一部分只能估计。ARR 是最重要的已披露指标：Wiz 通过公开声明和媒体简报 确认了 $100M ARR（2022 年中）、$350M ARR（2023 年末）和 $500M+
              ARR（2024 年末）——对一家后期私营 公司而言，这种透明度并不常见。估值方面，2024 年 5 月 Series E 已确认 $12B；2025 年 Series F 据报道 达 $32B。累计融资约
              $2.7–2.8B。员工数约 4,000+，估计来自 LinkedIn 和招聘网站数据；Wiz 未正式披露 员工数。毛利率和净留存率（NRR）未公开披露，但分析师根据客户扩张模式和产品宽度，估计 NRR 高于
              130%。核心证据缺口在于：Wiz 接近预期 IPO 时，仍缺少经审计财务报表来确认 ARR、利润率和盈利能力 轨迹。
            claimRefs: []
      - number: '1.6'
        title: 关键论据
        blocks:
          - type: callout
            title: 史上最快的企业 SaaS 扩张
            body: >
              Wiz 用 18 个月做到 $100M ARR，用约 4 年做到 $500M ARR——二者在当时都是企业 SaaS 纪录。产品市场匹配 （云安全是刚需）、无代理架构（部署阻力低）和创始人可信度（均来自
              Microsoft Azure）叠加，带来了风投 支持同行难以匹配的采用速度。
            calloutType: insight
            claimRefs:
              - CO007
              - CO008
          - type: callout
            title: 云厂商 API 依赖是生存级结构性风险
            body: >
              Wiz 的无代理架构完全依赖对 AWS、Azure、GCP 和 OCI 云 API 的只读访问。任何云厂商限制 API 访问、推出 竞品 CNAPP，或调整 API 定价，都可能从结构上削弱 Wiz
              的产品和竞争护城河。Microsoft（Defender for Cloud）、AWS（Security Hub）和 Google（Security Command Center）都有财务动机限制 Wiz
              的访问。
            calloutType: insight
            claimRefs:
              - CO028
              - CO029
          - type: callout
            title: Google 的 $23B 报价验证了平台，也暴露了 Wiz 的野心
            body: >
              Alphabet 据报道在 2024 年 7 月提出 $23B 收购报价，这是云安全公司史上最高报价。Wiz 拒绝交易，说明 创始人和投资人相信 IPO 路径能带来显著更高回报，可能预期公开市场估值达到
              $30–50B+。拒绝交易也确认： 若没有大幅溢价，Wiz 不会以当前价格卖给任何战略买家。
            calloutType: insight
            claimRefs:
