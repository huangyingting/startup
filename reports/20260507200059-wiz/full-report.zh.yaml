      - number: '5.4'
        title: 技术风险与质量 / 合规
        blocks:
          - type: paragraph
            body: >
              Wiz 运营规模很大，Security Graph 为拥有数百万资源的云环境建索引，因此存在几类技术风险。第一，云 API 依赖：Wiz 的全部数据摄取都依赖云厂商
              API（AWS、Azure、GCP）。超大规模云厂商若废弃 API、限制速率或 改变权限模型，可能削弱 Wiz 的可见性，或制造合规缺口。第二，共享图模型中的数据隐私：Wiz 在多租户环境
              中处理敏感客户云元数据（资源配置、身份信息、数据分类结果）。一旦数据隔离失败，一个客户的云拓扑可能 暴露给另一个客户，构成重大安全和合同风险。第三，监管合规：Wiz 已获得 SOC 2 Type II、ISO
              27001 和 CSA STAR Level 2 认证；FedRAMP 授权正在推进。针对欧盟客户，Wiz 通过单独的欧盟数据驻留方案维持 GDPR 合规。第四，开发者信号：Wiz 的开源社区存在感（Wiz
              研究博客、漏洞披露）带来自然开发者认知，但要在 CrowdStrike 和 Sysdig 更大的开发者社区面前保持技术话语权，仍需持续投入。
            claimRefs: []
