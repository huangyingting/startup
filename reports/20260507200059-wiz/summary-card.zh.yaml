summary:
  headline: |
    Wiz 是有史以来增长最快的企业安全公司：不到 5 年做到 $500M+ ARR，Fortune 100
    渗透率 40–45%，Security Graph 架构也确实做出了差异化。$32B 估值（约 64× ARR）
    已经压入极高预期。基准 IPO 结果是 $17–25B，比上一轮私募低 25–45%；乐观情景
    （IPO 时 $28–32B）需要 ARR 持续增长 38%+，还要公开市场倍数重估，而当前环境并不支持。
    Wiz 是有条件做多：值得尽调，但若按 $32B 入场，必须明确相信乐观情景，并准备持有
    3–5 年。
