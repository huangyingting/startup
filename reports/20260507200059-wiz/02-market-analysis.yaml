  title: Market Analysis

sections:
  - id: SM001
    title: Market Definition and Scope
    body: >
      Wiz competes primarily in the Cloud Native Application Protection Platform (CNAPP) and Cloud
      Security Posture Management (CSPM) markets, which are subsets of the broader cloud security and
      information security markets. CNAPP is a platform category coined by Gartner in 2021 that
      consolidates CSPM (cloud configuration auditing), CWPP (cloud workload protection), CIEM (cloud
      identity entitlement management), DSPM (data security posture management), and CDR (cloud
      detection and response) into a single integrated platform. The relevant TAM for Wiz spans four
      layers: (1) the global cloud security market ($80–100B+ by 2030 at 15–18% CAGR); (2) the CNAPP
      sub-market (~$10–15B by 2028); (3) the CSPM sub-segment (~$5–8B by 2027); and (4) the broader
      enterprise cybersecurity market ($300B+). Wiz's current SAM is primarily enterprise and
      mid-market companies with meaningful cloud infrastructure (AWS, Azure, GCP, OCI) — estimated at
      $15–25B globally. The SOM, reflecting Wiz's actual addressable share in a 3–5 year window at
      current growth rates and competitive dynamics, is estimated at $3–8B ARR, depending on platform
      expansion success into DSPM, CDR, and Wiz for AI.

  - id: SM002
    title: Market Drivers and Tailwinds
    body: >
      Four structural forces are accelerating demand for cloud security platforms. First, cloud
      adoption continues to expand at 20%+ CAGR: AWS, Azure, and GCP collectively process more than
      70% of enterprise workloads by 2025, creating an ever-expanding attack surface that legacy
      on-premise security tools cannot address. Second, the attack surface complexity is compounding:
      multi-cloud environments (average enterprise uses 2.6 clouds), microservices architectures,
      containers, serverless, and AI/LLM workloads each introduce new configuration and identity risks
      that require dedicated CNAPP tooling. Third, regulatory compliance pressure is intensifying:
      SEC's 2023 cybersecurity disclosure rules, CISA's Secure by Design framework, and the EU NIS2
      Directive all increase the cost of cloud misconfigurations and accelerate enterprise security
      spending. Fourth, breach economics are improving for attackers and worsening for defenders: the
      average cost of a data breach reached $4.88 million in 2024 (IBM/Ponemon), with cloud-specific
      misconfigurations cited as a leading attack vector. These four forces create a durable,
      non-discretionary demand cycle for CNAPP.

  - id: SM003
    title: Market Segmentation and Buyer Dynamics
    body: >
      Wiz's primary buyers are enterprise and mid-market cloud security teams (CISO, cloud security
      architect, DevSecOps lead) at companies with $1B+ revenue and significant cloud footprint. The
      typical Wiz decision-maker is the VP of Security Engineering or CISO at a Fortune 500 company,
      with influence from the cloud platform team (AWS/Azure/GCP architect) and the development team
      (shift-left security). The key buying segments are: (1) pure-cloud enterprises (tech, SaaS,
      digital-native) — fastest adoption, highest NRR, first CNAPP buyers; (2) hybrid enterprises
      (financial services, healthcare, retail) — large budget, complex multi-cloud, compliance-driven;
      (3) regulated industries (government, defense, critical infrastructure) — slower procurement but
      largest contracts; and (4) mid-market growth companies ($100–500M revenue) — high-velocity
      sales, lower ACVs, price-sensitive. Each segment values Wiz differently: pure-cloud enterprises
      value speed-to-value (no agent deployment), hybrid enterprises value compliance reporting, and
      regulated industries value FedRAMP-authorized tooling.

  - id: SM004
    title: Market Constraints and Headwinds
    body: >
      Three structural headwinds moderate the cloud security market opportunity for Wiz. First,
      hyperscaler competition: AWS, Azure, and Google all offer native security tools (Security Hub,
      Defender for Cloud, Security Command Center) that are bundled at low or zero marginal cost into
      their platforms. These tools lack the multi-cloud and third-party integration depth of Wiz but
      are increasingly capable and create budget pressure on independent cloud security vendors.
      Second, platform consolidation: large security platform vendors — Palo Alto Networks (Prisma
      Cloud), CrowdStrike (Falcon Cloud Security), and Microsoft (Defender) — are bundling CNAPP
      capabilities into broader enterprise security suites, creating a "platform vs. best-of-breed"
      buying dynamic where Wiz must demonstrate standalone value vs. included modules. Third, budget
      pressure: enterprise security budgets are being scrutinized for consolidation following
      2022–2023 SaaS spending rationalization; customers may defer CNAPP renewals or consolidate
      onto platform vendors, compressing Wiz's pricing power.

