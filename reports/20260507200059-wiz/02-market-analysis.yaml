callouts:
  - id: KM001
    type: insight
    title: "AI Workload Security Is a First-Mover Category Worth $2–5B by 2030"
    body: >
      Wiz for AI (launched 2025) positions Wiz as the first established CNAPP vendor to address
      AI infrastructure security posture — including LLM inference servers, training pipelines, and
      GenAI application security. This is an emerging sub-market estimated at $100–300M in 2024 but
      growing at 50–70% CAGR as enterprise AI workload adoption accelerates. First-mover advantage
      in AI security could add $1–3B to Wiz's long-term ARR potential.
    claimRefs: [CM003, CM013]
    sourceRefs: [SM005, SM006]

  - id: KM002
    type: risk
    title: "Hyperscaler Bundling Is the Most Disruptive Long-Term Market Risk"
    body: >
      AWS, Azure, and Google collectively process 70%+ of enterprise cloud workloads and all offer
      native security tools at zero or minimal additional cost. While these tools lack multi-cloud
      breadth, they are improving rapidly. Any significant AWS Security Hub or Azure Defender
      capability improvement — particularly for single-cloud customers — could convert a portion
      of Wiz's installed base to bundled tools at renewal, particularly for cost-sensitive
      mid-market customers.
    claimRefs: [CM014, CM017]
    sourceRefs: [SM001, SM009]

  - id: KM003
    type: benchmark
    title: "CNAPP Market Growing 25–30% CAGR — Fastest in Security"
    body: >
      The CNAPP market is the fastest-growing sub-segment of cybersecurity, expanding at 25–30%
      CAGR vs. 10–12% for overall cybersecurity. This reflects the structural shift of enterprise
      workloads to cloud environments. Wiz's 43%+ ARR growth in 2024 (surpassing market CAGR) implies
      it is taking share — from both incumbents (Palo Alto Prisma) and point tools (standalone CSPM).
    claimRefs: [CM002, CM004, CM006]
    sourceRefs: [SM003, SM006, SM010]

