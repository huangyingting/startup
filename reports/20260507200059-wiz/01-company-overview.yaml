callouts:
  - id: KO001
    type: insight
    title: "Fastest Enterprise SaaS Scaling in History"
    body: >
      Wiz reached $100M ARR in 18 months and $500M ARR in approximately 4 years — both
      records for enterprise SaaS at the time. The combination of product-market fit (cloud
      security is a must-have), agentless architecture (no deployment friction), and
      founder credibility (all ex-Microsoft Azure) drove an adoption velocity that
      venture-backed peers could not match.
    claimRefs: [CO007, CO008]
    sourceRefs: [SO007, SO008]

  - id: KO002
    type: risk
    title: "Cloud Provider API Dependency Is an Existential Structural Risk"
    body: >
      Wiz's agentless architecture depends entirely on read-only access to AWS, Azure, GCP,
      and OCI cloud APIs. Any cloud provider restricting API access, launching competing
      CNAPP products, or changing API pricing could structurally impair Wiz's product and
      competitive moat. Microsoft (Defender for Cloud), AWS (Security Hub), and Google
      (Security Command Center) all have financial incentives to limit Wiz's access.
    claimRefs: [CO028, CO029]
    sourceRefs: [SO011, SO012]

  - id: KO003
    type: benchmark
    title: "Google's $23B Offer Validates the Platform — and the Rejection Signals the Ambition"
    body: >
      Alphabet's reported $23B acquisition offer in July 2024 represents the highest price
      ever offered for a cloud security company. Wiz's rejection signals that the founders
      and investors believe the IPO path yields materially higher returns, likely expecting
      a $30–50B+ public market valuation. The rejection also confirms Wiz is not for sale
      at current pricing to any strategic buyer without a substantial premium.
    claimRefs: [CO011, CO025]
    sourceRefs: [SO005, SO006]

