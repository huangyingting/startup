sections:
  - id: SO001
    title: Identity and Business Model
    body: >
      Wiz is a New York City–based cloud security company founded in January 2020 by four
      ex-Microsoft Azure veterans — Assaf Rappaport (CEO), Yinon Costica (President), Roy
      Reznik (CTO), and Ami Luttwak (Chief Technology Officer). The company built the leading
      Cloud Native Application Protection Platform (CNAPP) and Cloud Security Posture
      Management (CSPM) tool for enterprise cloud environments, using an agentless scanning
      architecture that reads directly from cloud provider APIs (AWS, Azure, GCP, OCI) without
      deploying software agents on individual workloads. Wiz's core business model is a
      SaaS subscription priced per cloud resource or workload, sold as an annual contract
      directly to enterprise security and cloud teams. The platform generates a proprietary
      "security graph" that unifies all cloud identities, workloads, data, and network
      configurations to expose lateral movement paths and toxic risk combinations that
      siloed tools miss. As of May 2026, Wiz has grown to one of the fastest-scaling
      enterprise SaaS companies ever built, reaching $100M ARR in 18 months and reportedly
      surpassing $500M ARR by late 2024, with 40%+ of Fortune 100 companies among its
      customer base.

  - id: SO002
    title: Founding Story and Team
    body: >
      All four Wiz co-founders spent years at Microsoft together, most recently building
      Azure Security Center (now Microsoft Defender for Cloud) after Microsoft acquired their
      prior startup Adallom in 2015. Assaf Rappaport served as VP of R&D at Microsoft
      Azure; Yinon Costica led product for Azure cloud security; Roy Reznik led engineering
      for Azure security products; Ami Luttwak served as a principal engineering manager.
      Their shared experience building large-scale cloud security infrastructure gave them
      firsthand knowledge of the agentless, graph-based approach's superiority over legacy
      agent-based tools. The team left Microsoft in late 2019 to found Wiz with the specific
      thesis that cloud security needed to be rebuilt from the ground up as a cloud-native
      SaaS product. Wiz's founding team also benefits from deep Israeli intelligence community
      alumni networks — Rappaport served in Israeli Intelligence Unit 8200, as did several
      early employees — providing access to elite security engineering talent. Wiz was
      incorporated in January 2020 and shipped its first product within 6 months.

  - id: SO003
    title: Funding and Valuation History
    body: >
      Wiz has raised approximately $2.7–2.8 billion in total venture capital across five
      confirmed rounds, all within five years of founding — one of the fastest capital
      accumulation trajectories in enterprise SaaS history. The Series A raised $100M at a
      $1B valuation in January 2021 (13 months after founding). Series B raised $250M at
      $6B valuation in October 2021. Series C raised $300M at $10B valuation in February
      2022. Series E raised $1B at $12B valuation in May 2024 — the key round within the
      diligence window. In 2025, Wiz raised an additional ~$1 billion at a reported $32B
      valuation (Series F), confirming continued investor conviction at a nearly 3× step-up
      from the 2024 round. Key investors include Sequoia Capital, Andreessen Horowitz (a16z),
      Index Ventures, Greenoaks Capital, General Atlantic, Lightspeed Venture Partners, and
      Insight Partners. In July 2024, Alphabet (Google's parent) reportedly offered $23 billion
      to acquire Wiz outright; Rappaport declined in favor of pursuing an independent IPO
      path — one of the largest rejected acquisition offers in enterprise SaaS history.

  - id: SO004
    title: Milestones and Traction
    body: >
      Wiz achieved a series of category-defining milestones in rapid succession. The company
      reached $1M ARR in its first month of operations (late 2020), $100M ARR in 18 months
      (mid-2022), and $350M ARR by end of 2023 — each mark surpassing prior enterprise SaaS
      records at equivalent ages. By late 2024, Wiz reported over $500M ARR and cited customer
      count in the thousands. The customer base includes over 45% of Fortune 100 companies
      including BMW, Salesforce, Morgan Stanley, Capital One, DocuSign, and Fox Corporation.
      Wiz launched multiple product extensions: Wiz Code (application security/shift-left),
      Wiz DSPM (data security posture management), Wiz Runtime (runtime detection and
      response), and Wiz for AI (AI workload security posture) — expanding from pure
      CSPM/CNAPP into a broader cloud security platform. In 2024, Wiz also acquired Gem
      Security (cloud detection and response). In 2025, Wiz filed confidential IPO
      paperwork with the SEC, signaling a potential public offering in the 2025–2026 window.

  - id: SO005
    title: Cover Metrics and Evidence Gaps
    body: >
      Wiz's key metrics are partially disclosed and partially estimated. ARR is the most
      critical disclosed metric: Wiz confirmed $100M ARR (mid-2022), $350M ARR (end 2023),
      and $500M+ ARR (late 2024) through public statements and media briefings — unusually
      transparent for a late-stage private company. Valuation is confirmed at $12B (May 2024
      Series E) and reportedly $32B (2025 Series F). Total raised is approximately $2.7–2.8B.
      Headcount of approximately 4,000+ employees is estimated from LinkedIn and job board
      data; Wiz has not officially disclosed headcount. Gross margin and net revenue retention
      (NRR) are not publicly disclosed but analyst estimates place NRR above 130% based on the
      customer expansion pattern and product breadth. The core evidence gap is the absence of
      audited financials confirming ARR, margin, and profitability trajectory as Wiz approaches
      its anticipated IPO.

