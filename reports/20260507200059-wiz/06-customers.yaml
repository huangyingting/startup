  name: Wiz
  website: https://www.wiz.io
chapter:
  number: 6
  order: 6
  letter: U
  title: Customer Analysis

sections:
  - id: SU001
    title: Customer Base Overview
    body: >
      Wiz has built one of the fastest-growing enterprise customer bases in cloud security history.
      The company serves an estimated 5,000–8,000 enterprise customers as of late 2024, with
      particularly deep penetration in the Fortune 100 (40–45%+). Named Fortune 100 customers include
      BMW Group, Salesforce, Morgan Stanley, Capital One, DocuSign, Fox Corporation, and many others
      across financial services, technology, healthcare, media, and automotive verticals. The company
      does not publicly disclose its total customer count but multiple press and analyst sources
      corroborate the Fortune 100 penetration figure as company-stated. Customer acquisition is
      primarily through direct enterprise sales (field sales + inside sales), supplemented by channel
      partners (AWS Marketplace, Microsoft Azure Marketplace, major resellers including Carahsoft
      and Guidepoint Security). Customer retention is strong based on NRR estimated at 130%+ —
      driven by module expansion (DSPM, CDR, Code upsell) and cloud resource growth within
      existing accounts.

  - id: SU002
    title: Named Customer Deep Dive
    body: >
      Wiz's Fortune 100 customer references serve as its most powerful sales tool. Capital One
      deployed Wiz across its multi-cloud AWS/Azure/GCP environment, citing the Security Graph's
      ability to surface attack paths that individual CSPM tools could not correlate. Morgan Stanley
      uses Wiz for cloud compliance reporting and financial services regulatory coverage, leveraging
      Wiz's automated PCI DSS and SOC 2 compliance checks. BMW Group uses Wiz for cloud security
      across its connected vehicle platform and manufacturing cloud infrastructure, representing
      one of Wiz's most visible industrial/automotive customer wins. Salesforce, as one of the
      world's largest SaaS platforms, uses Wiz to secure its own cloud infrastructure — a particularly
      credible reference given Salesforce's own security-conscious customer base. DocuSign and Fox
      Corporation represent financial services/media deployments with multi-cloud complexity.
      These named references span 5+ industries and 3 continents, providing a broad social proof
      portfolio for Wiz's global enterprise sales motion. The strength of the Fortune 100 installed
      base is the primary differentiator in competitive evaluations, as prospects can call direct
      references within their own industry.

  - id: SU003
    title: Customer Expansion and NRR Dynamics
    body: >
      Wiz's revenue expansion model is driven by two dynamics: (1) cloud resource growth within
      existing accounts — as enterprises migrate more workloads to cloud, they automatically add
      Wiz-monitored resources, increasing their subscription cost; and (2) module expansion — customers
      who start on core CSPM expand to DSPM, Wiz Code, CDR, and Wiz for AI as they recognize
      additional value. The platform expansion pattern mirrors that of other high-NRR SaaS companies
      (Snowflake, Datadog, CrowdStrike): initial land on the core product, followed by systematic
      upsell of adjacent modules as each one proves ROI. Analyst estimates put Wiz's NRR at 130%+,
      implying that the installed base grows at 30% per year even without new logo additions.
      The per-cloud-resource pricing model is particularly effective at capturing cloud adoption
      tailwinds — companies that sign for 100,000 cloud resources and grow to 200,000 automatically
      double their Wiz spend without any renegotiation. This creates an embedded revenue growth
      mechanism independent of new sales.

  - id: SU004
    title: Customer Concentration and Expansion Risk
    body: >
      Wiz's customer concentration risk is moderate. No single customer appears to represent
      more than 5–10% of ARR based on the breadth of the named customer base (50+ publicly
      named enterprise customers, Fortune 100 at 40–45%+ penetration implies 40–45 customers
      at that tier alone). However, Wiz faces expansion risk in three scenarios: (1) Fortune 500
      accounts where Palo Alto Networks Prisma Cloud is offered at steep bundled discounts at
      renewal — customers may downgrade from Wiz to bundled alternatives even if technically
      satisfied; (2) mid-market accounts with $50K–$100K ACVs may churn if CrowdStrike or Orca
      offer comparable coverage at lower total cost; and (3) pure Azure-only enterprises may
      migrate from Wiz to Microsoft Defender at renewal as Defender improves its multi-cloud
      coverage. The annual subscription model (versus multi-year deals) may increase renewal
      risk relative to competitors using 3-year commitments.

