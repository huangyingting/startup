    reason: >
      Planned figures are journey-map (customer lifecycle), funnel/flow (adoption pipeline),
      matrix (customer segment analysis), and cohort (retention analysis). These are substituted
      with flow (customer journey), flow (adoption funnel), bar (segment matrix), and bar
      (cohort proxy as expansion revenue bar) respectively. Cohort-level data is not available
      for a private company; bars representing estimated NRR proxy are the best available substitute.
      Substitutions documented in evidenceGaps.
