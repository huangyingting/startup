callouts:
  - id: KU001
    type: insight
    title: "Fortune 100 Penetration Is Wiz's Most Powerful Sales Multiplier"
    body: >
      At 40–45%+ of the Fortune 100 using Wiz, every new Fortune 500 evaluation can include a
      direct reference call within the prospect's own peer group. Financial services prospects
      call Capital One and Morgan Stanley; tech companies call Salesforce. This social proof
      network is impossible to replicate quickly and directly compresses Wiz's sales cycle by
      weeks in competitive evaluations. No CNAPP challenger — Orca, Aqua, Sysdig — has achieved
      comparable Fortune 100 penetration.
    claimRefs: [CU001, CU006]
    sourceRefs: [SU001, SU002]

  - id: KU002
    type: risk
    title: "NRR Is Unverified and Platform Bundling Could Compress It"
    body: >
      The estimated 130%+ NRR is company-influenced (through analyst sources) but unaudited.
      If PANW platformization wins at renewal cause even 10% of Fortune 500 accounts to
      churn or downsize, NRR could drop to 110–120% — materially changing the quality of
      Wiz's revenue. An NRR compression event at IPO would be a significant negative signal
      for public market investors. This is the most important metric to verify in due diligence.
    claimRefs: [CU009, CU011]
    sourceRefs: [SU004, SU009]

  - id: KU003
    type: benchmark
    title: "BMW Group Win Demonstrates Wiz's Industrial Expansion Potential"
    body: >
      BMW Group's deployment of Wiz for connected vehicle platform and manufacturing cloud
      security represents one of the first major industrial/automotive CNAPP wins — a vertical
      that Wiz does not yet focus on systematically. If BMW is a replicable use case, Wiz
      has a large untapped market in industrial companies digitizing their operations.
      However, OT/ICS security (operational technology) is a specialized area requiring
      different expertise than cloud security.
    claimRefs: [CU007, CU008]
    sourceRefs: [SU005, SU006]

