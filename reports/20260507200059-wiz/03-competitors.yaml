callouts:
  - id: KP001
    type: insight
    title: Wiz for AI Is an Unchallenged First-Mover Product Line
    body: >
      No major CNAPP competitor has launched a dedicated AI Security Posture Management (AI SPM) product as of early
      2025. Wiz for AI (covering LLM inference servers, AI training pipelines, GenAI application secrets, and model
      weight access controls) represents a 12–18 month first-mover window before competitors can match coverage. This is
      Wiz's most differentiated current product.
    claimRefs:
      - CP007
      - CP015
    sourceRefs:
      - SP004
      - SP008
  - id: KP002
    type: risk
    title: Palo Alto Networks Bundling Is the Most Immediate Competitive Threat
    body: >
      Palo Alto Networks' platformization strategy — offering Prisma Cloud at deep discounts bundled with NGFW, Cortex
      XDR, and Cortex XSIAM — creates a price and procurement consolidation pressure that Wiz cannot match
      independently. Enterprises with existing Palo Alto firewall relationships ($1M+ annual PANW spend) face strong
      incentives to expand to Prisma Cloud at bundled rates, even if Wiz wins the standalone technical evaluation. This
      risk is particularly acute in the Fortune 2000 segment where PANW's installed base is deepest.
    claimRefs:
      - CP010
      - CP016
    sourceRefs:
      - SP002
      - SP006
  - id: KP003
    type: benchmark
    title: Security Graph Is Wiz's Most Defensible Moat
    body: >
      The Wiz Security Graph — which connects 1M+ cloud resources, identities, and configurations into a unified graph
      database for attack path analysis — represents the only truly unique architectural moat in the CNAPP market. While
      agentless deployment is now table stakes (Orca, PANW, and CrowdStrike CSPM all offer it), no competitor has
      replicated the Security Graph's cross-context correlation depth. Building a comparable graph requires 12–18 months
      of cloud API integration engineering per provider and a data model that Wiz has been iterating since 2020.
    claimRefs:
      - CP011
      - CP012
    sourceRefs:
      - SP003
      - SP007
