  title: Competitive Landscape
sections:
  - id: SP001
    title: Competitive Market Overview
    body: >
      Wiz competes in the Cloud Native Application Protection Platform (CNAPP) market, which Gartner defined in 2021 and
      has rapidly attracted large incumbents (Palo Alto Networks, CrowdStrike, Microsoft) and specialized challengers
      (Orca Security, Aqua Security, Sysdig, Lacework). The competitive landscape is characterized by three tiers: (1)
      platform consolidators (Palo Alto Networks Prisma Cloud, CrowdStrike Falcon Cloud Security, Microsoft Defender for
      Cloud) which bundle CNAPP capabilities into multi-product security suites; (2) cloud-native specialists (Wiz, Orca
      Security, Lacework/Fortinet) which build ground-up for cloud environments; and (3) workload-specific tools (Aqua
      Security, Sysdig, Snyk) which dominate container/Kubernetes security or developer-centric scanning. Wiz has
      differentiated itself through the Security Graph model — a unified graph database that connects cloud resources,
      identities, workloads, and configurations to surface the toxic combination attack paths — an architecture no
      direct competitor has replicated at the same depth. Wiz holds the Gartner CNAPP Magic Quadrant Leader position as
      of 2024, its first year in the Leader quadrant.
    tableRefs:
      - TP001
    figureRefs:
      - FP001
  - id: SP002
    title: Primary Competitor Analysis
    body: >
      Palo Alto Networks Prisma Cloud is Wiz's primary enterprise competitor, with an estimated $800M–$1B+ CNAPP/cloud
      ARR (embedded within PANW's platform revenue). Prisma Cloud's key advantage is incumbent enterprise relationships
      via the Palo Alto firewall and NGFW installed base — approximately 80,000 enterprise customers. However, Prisma
      Cloud has a reputation for deployment complexity (agent-based architecture) and a higher total cost of ownership,
      which has made Wiz's agentless approach attractive for competitive displacement. CrowdStrike Falcon Cloud Security
      (formerly Falcon Horizon/CSPM) is the second major threat: CrowdStrike's Falcon XDR platform has achieved deep SOC
      integration and endpoint telemetry that provides runtime threat detection Wiz's agentless approach cannot match at
      the same depth. Microsoft Defender for Cloud presents the greatest structural risk as a free/bundled offering for
      Azure customers — however its multi-cloud support is perceived as weaker than Wiz's.
    tableRefs:
      - TP002
    figureRefs:
      - FP002
  - id: SP003
    title: Wiz's Competitive Moat Analysis
    body: >
      Wiz's competitive differentiation rests on four reinforcing pillars. First, the Security Graph: a proprietary
      unified graph database connecting all cloud assets, identities, configurations, network paths, and data across
      multi-cloud environments. This graph enables "toxic combination" detection — surfacing attack paths that no
      single-dimension scan can find — and requires deep cloud API integration that takes 12–18 months to build per
      cloud platform. Second, agentless deployment: Wiz deploys in under one hour with zero agent installation, making
      its time-to-value dramatically faster than agent-based platforms. This is a structural advantage in competitive
      evaluations (POC win rate). Third, the Fortune 100 brand halo: 40–45%+ of Fortune 100 use Wiz, which functions as
      social proof in enterprise sales cycles. Fourth, breadth of coverage: Wiz's platform covers CSPM, CWPP, CIEM,
      DSPM, CDR, Wiz Code (shift-left), and Wiz for AI — matching or exceeding Prisma Cloud's module breadth within a
      single platform.
    tableRefs:
      - TP003
    figureRefs:
      - FP003
  - id: SP004
    title: Competitive Displacement and Win/Loss Dynamics
    body: >
      Wiz has achieved significant competitive displacement wins against Palo Alto Networks Prisma Cloud, particularly
      in Fortune 500 accounts evaluating CNAPP replacements. Industry sources indicate Wiz wins approximately 70%+ of
      head-to-head POCs against Prisma Cloud on time-to-value and agentless architecture metrics. Against CrowdStrike
      Falcon Cloud Security, win rates are more mixed — Wiz leads on CSPM/DSPM breadth while CrowdStrike leads on
      runtime threat detection (EDR integration). Against Microsoft Defender for Cloud, Wiz wins on multi-cloud
      environments but loses on Azure-only single-cloud accounts where Defender is free. Key loss scenarios for Wiz
      include: (1) accounts with existing Palo Alto platform contracts (bundling pressure); (2) CrowdStrike Falcon
      Complete customers where XDR integration is valued; (3) pure Azure enterprises using Microsoft E5 security
      bundles. Wiz's Gem Security acquisition (CDR, ~$350M, 2024) addresses the runtime/threat detection gap against
      CrowdStrike. Across all competitive scenarios, Wiz's consistent advantages are: Security Graph risk correlation,
      agentless deployment speed, and the breadth of the platform (seven modules) relative to the ACV. The Fortune 100
      installed base serves as social proof in new account evaluations, shortening sales cycles significantly for
      enterprise prospects.
    tableRefs:
      - TP004
