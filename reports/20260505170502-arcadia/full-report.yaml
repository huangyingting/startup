      - number: '2.2'
        title: Evidence-Constrained Sizing Lenses
        blocks:
          - type: paragraph
            body: >-
              The cache does not contain a reliable third-party TAM or SAM report for the exact category “enterprise
              energy intelligence platform.” What it does contain is a set of operational and demand-side lenses that
              are still decision-useful. First, Arcadia's current served base is already large: the company says it
              serves 1,500+ enterprise customers, manages nearly $100 billion in utility spend, and reaches millions of
              accounts and meters. Second, product coverage is deep: Plug reaches thousands of providers in 50+
              countries, covers 95% of U.S. residential and commercial utility accounts, and includes 400+ interval data
              providers; Signal covers 30,000+ tariffs and roughly national tariff coverage. Third, regulatory demand is
              broad enough to matter even without a clean software TAM: EPA GHGRP alone touches about 8,000 facilities,
              while California SB 253 affects more than 5,000 large companies and SEC climate rules add assurance-grade
              pressure for large filers. Fourth, enterprise energy-cost volatility is making the problem larger:
              Arcadia's own 2026 rate report found 97.5% of commercial facilities saw electricity-rate increases over
              2020-2025 and 71% rose faster than inflation. These lenses show a credible and expanding problem space,
              but not a clean industry-wide revenue pool, so the report avoids pretending otherwise.
