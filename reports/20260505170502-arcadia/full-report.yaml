  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: The strategic asset is real, but price support is still missing
        blocks:
          - type: paragraph
            body: >-
              Arcadia has enough public evidence to deserve serious attention. Official 2026 materials say the company
              now serves more than 1,500 enterprise customers, including about a quarter of the Fortune 500, and manages
              nearly $100 billion of utility spend after acquiring ENGIE Impact. The acquisition pages also describe a
              single platform that combines utility-data infrastructure, bill payment, energy procurement, and
              sustainability reporting. FOX and Iron Mountain provide named customer proof for reporting and procurement
              use cases, while Sweep and Cority show that Arcadia data is embedded in third-party ESG workflows. Those
              are not trivial signals. They show real enterprise relevance, not a speculative concept. The problem is
              that strategic relevance and investable price are not the same thing. The retained source set still does
              not disclose a current round valuation, revenue base, gross margin, retention profile, or cap-table terms.
              That forces a valuation chapter to separate company quality from price confidence rather than pretending
              the two are already linked.
