  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Included Spend, and Excluded Spend
        blocks:
          - type: paragraph
            body: >-
              Arcadia's current market boundary is not “solar” in the broad sense and not “ESG software” in the broad
              sense. The company describes itself as an enterprise energy-management platform that combines utility-bill
              management, energy procurement advisory, and sustainability reporting on top of a large data
              infrastructure for utility bills, intervals, tariffs, contracts, and site attributes. Included spend
              therefore covers software and managed-service budgets used to collect utility data, validate and pay
              bills, model tariffs, structure energy supply decisions, and feed auditable datasets into carbon and
              compliance workflows. Excluded spend includes commodity power generation itself, physical utility
              infrastructure, generic accounting software, and community-solar subscriptions as a current Arcadia
              product line. Arcadia's own history page is important here: it explicitly says community solar is no
              longer an Arcadia offering after the Perch spinout, which means legacy community-solar claims should be
              treated as adjacent proof of market experience, not as today's core market. The status-quo substitute is
              also clear in public materials: spreadsheets, scattered consultants, opaque procurement brokers, manual
              bill processing, and disconnected reporting tools. That puts Arcadia in a workflow-replacement market
              where data integration and service breadth matter as much as pure software features.
