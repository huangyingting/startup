      - number: '3.3'
        title: Pricing visibility is weak, so distribution power and switching cost matter more than list price
        blocks:
          - type: paragraph
            body: >-
              The cache gives a clear view of packaging, but not a clean enterprise price sheet. Arcadia, UtilityAPI,
              Watershed, and LevelTen all steer buyers toward demos, custom offers, or contact-sales workflows.
              EnergyCAP and Persefoni disclose more packaging structure: EnergyCAP says pricing scales with meters,
              while Persefoni exposes free signup plus PRO and ADVANCED plans. Even there, the cache does not provide
              durable public enterprise dollar pricing or discount schedules. Because list-price comparison is weak,
              buyers are more likely to focus on switching friction and distribution leverage. EnergyCAP benefits from
              long-tenure utility-expense workflows and meter-based data structures that are hard to unwind. LevelTen
              benefits from marketplace and RFP tooling that can concentrate procurement activity. Arcadia's answer is
              breadth plus channels: it says strategies can be delivered directly or via 300-plus partners. That widens
              reach, but it also means Arcadia does not fully own every transaction surface the way a single-function
              marketplace or incumbent workflow tool can.
