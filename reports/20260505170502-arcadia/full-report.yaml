        - Models utility costs and tariff options against actual load data
        - Tariff database freshness and accurate codification of private tariffs
        - Incorrect tariff logic could contaminate optimization and forecasting workflows
      - - Security and payments layer
        - Protects accounts, credentials, and payment flows
        - AWS, Stripe, Plaid, and internal key-management controls
        - Arcadia-specific attestations remain thinner than the underlying cloud and payment attestations
