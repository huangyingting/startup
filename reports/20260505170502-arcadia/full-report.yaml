  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Landscape: Arcadia competes against a stack, not a single peer set'
        blocks:
          - type: paragraph
            body: >-
              Arcadia's competitive landscape is fragmented because buyers can solve the same job in several ways.
              Arcadia sells one integrated workflow that spans utility data, bill management, procurement, and
              sustainability reporting. That means its closest threat is often not another vendor with the exact same
              packaging. Instead, buyers can assemble a best-of-breed stack: UtilityAPI for data connectivity, EnergyCAP
              for utility expense management, Watershed or Persefoni for carbon reporting, and LevelTen for
              procurement-marketplace intelligence. Status quo alternatives also matter. Nexamp and similar
              community-solar or PPA providers can solve parts of the clean-energy procurement problem without replacing
              broader finance or reporting workflows. Incumbent service platforms such as Ameresco and Itron sit one
              layer farther out, but they matter because they own adjacent relationships in metering, infrastructure,
              and utility-facing operations. The result is a landscape where Arcadia wins only if buyers believe the
              value of one unified platform is greater than the flexibility of stitching together narrower specialists.
            claimRefs:
              - CP001
