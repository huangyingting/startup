  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product scope and module map
        blocks:
          - type: paragraph
            body: >-
              Arcadia's current positioning is an enterprise energy intelligence platform rather than a single-purpose
              utility-data API. The 2026 solutions and enterprise overview pages describe three enterprise solutions —
              Utility Bill Management, Energy Procurement Advisory, and Sustainability Reporting — layered on top of a
              platform that includes Utility Bill & Interval Data, Tariff & Energy Rate Calculator, and Solar & Storage
              Analysis. The company history page ties those modules to acquisitions: Genability became the tariff and
              modeling layer, Urjanet became utility-data automation, and ENGIE Impact added utility bill management,
              procurement, and sustainability advising. Public use-case pages show the same stack being routed into
              multiple customer workflows, especially enterprise energy management and EV charging. In practice, Arcadia
              is pitching a unified operating system for utility bills, interval data, tariffs, optimization, and
              reporting rather than a narrow API point solution. The public module map also suggests Arcadia is trying
              to own the operational loop from raw utility data to action. Instead of selling only a data feed, it
              layers advisory, reporting, and optimization services on top of the same normalized records. That
              integration story matters because many adjacent vendors still separate bill management, tariff analysis,
              procurement, and sustainability reporting into different tools and teams.
