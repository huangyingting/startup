      - number: '7.4'
        title: The biggest remaining risk is evidence opacity around contracts, concentration, and current economics
        blocks:
          - type: paragraph
            body: >-
              Arcadia's public materials are good enough to show that the company matters, but not good enough to clear
              all underwriting questions. The company has raised substantial capital, including a $200 million 2022
              round, a March 2024 Form D showing a $49.1 million total offering amount plus warrant coverage, and a
              January 2025 report of $50 million of growth financing plus a $30 million credit facility. Yet the
              retained source set still does not expose current revenue, gross margin, customer concentration, churn,
              enterprise SLA terms, or the final outcome of the Connecticut matter. Even the legal-disclosure surface is
              thin in practice: the retained privacy, terms, and legal entry points were broken or empty. Arcadia may
              still be an attractive strategic asset because the platform has real scale and real customer proof. But a
              risk chapter should stay evidence-sensitive. Until public or private diligence closes the gaps on
              concentration, incident history, regulatory resolution, and post-acquisition contract structure, the
              honest residual rating stays high rather than moderate.
