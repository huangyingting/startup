      - - ENGIE integration disrupts contract continuity
        - Renewals or customer notices show pricing, service, or liability friction
        - The platform-breadth thesis turns into integration drag
        - Lower conviction and treat execution risk as structurally higher.
      - - Retention or concentration disappoints
