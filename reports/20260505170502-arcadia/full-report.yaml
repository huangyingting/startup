      - number: '3.4'
        title: Moat durability depends on whether Arcadia is a must-run system or merely a convenient orchestrator
        blocks:
          - type: paragraph
            body: >-
              The strongest bull case is that Arcadia now combines enough data coverage, payment workflow, procurement
              expertise, reporting integrations, and enterprise scale to become a system of record for energy
              operations. Cority's partner release strengthens that case by describing broad provider coverage and
              integration into a third-party sustainability suite. FOX and Iron Mountain add tangible proof that Arcadia
              can automate audit-grade reporting and support complex procurement structures. The bear case is that this
              still looks like orchestration layered on top of other institutions. Arcadia depends on a large partner
              network, competes against vendors with clearer single-function value propositions, and still faces trust
              risk from the 2024 Connecticut petition tied to legacy Arcadia Power practices. In practice, durability
              will turn on expansion data that the cache does not contain: whether a data-access customer expands into
              bill pay, whether a reporting customer adds procurement, and whether enterprise buyers stay with Arcadia
              instead of peeling off one function to a specialist.
