      - number: '3.2'
        title: Competitor profiles show stronger single-function messaging than Arcadia's broad workflow story
        blocks:
          - type: paragraph
            body: >-
              Each retained competitor owns a clearer wedge than Arcadia. UtilityAPI focuses on compliant,
              utility-controlled data exchange. EnergyCAP focuses on utility bill management, finance controls, and bill
              pay. Watershed and Persefoni concentrate on sustainability measurement, reporting, and decarbonization
              workflows. LevelTen concentrates on transaction infrastructure and market intelligence for PPAs and
              related clean-energy deals. Arcadia is broader: it publicly claims it can help enterprises pay utility
              bills, buy energy, and advance sustainability from the same data foundation. That breadth became more
              credible after the ENGIE Impact deal, which added customers, meters, and payment-processing scale. Still,
              broader is not automatically better. Specialist competitors often present a cleaner buying story,
              especially when the buyer is solving only one pain point. Arcadia therefore needs integration and workflow
              breadth to matter enough that buyers accept one broader vendor instead of a modular stack.
