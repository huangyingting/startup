chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Platform, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Arcadia describes itself in 2026 as an energy intelligence platform for businesses, not a consumer
              clean-energy subscription app. The current front door is built around one integrated proposition:
              enterprises can use Arcadia to pay utility bills, buy energy, and advance sustainability across their
              portfolios. The platform layer underneath that promise is a combination of Plug for utility bill and
              interval data, Signal for tariff intelligence, and Switch for solar and storage analysis, plus bulk-data
              tools such as DataHub and Connect-based developer workflows. This current positioning is materially
              different from the company's earlier Arcadia Power identity, which centered on community solar enrollment
              and residential clean-energy access. Public sources show that Arcadia still uses its community-solar
              heritage as proof of operating experience, but the company history page now explicitly says community
              solar became a separate Perch Energy venture in March 2025 and is no longer an Arcadia offering. The
              business model has therefore shifted toward enterprise software, managed services, and advisory workflows
              that monetize data access, tariff modeling, bill management, procurement, and sustainability reporting
              rather than only consumer energy-switching products.
