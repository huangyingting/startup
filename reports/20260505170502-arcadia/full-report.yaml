      - number: '8.2'
        title: Comparable framing argues for discipline, not a forced precision mark
        blocks:
          - type: paragraph
            body: >-
              The public comparable set is useful mainly as a transparency check. StockAnalysis pages for Itron,
              Enphase, Ameresco, and Stem all expose current market-cap and revenue pairs, while each company also
              maintains a public SEC-filings portal. Those references differ in business mix, but they still show how
              transparent public energy-tech and utility-software valuation anchors look in practice. Arcadia does not
              yet look like that from public evidence. The subject row in the comparable table is intentionally a
              visibility row, not a fake multiple, because retained sources only show financing amounts such as the 2022
              $200 million round, the March 2024 Form D, and the January 2025 growth financing plus credit facility.
              Without a current valuation mark or revenue denominator, any direct public-multiple bridge for Arcadia
              would be false precision. The right lesson from comps is not that Arcadia is obviously cheap or expensive;
              it is that public evidence is insufficient to say.
