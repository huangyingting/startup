      - number: '7.3'
        title: Partner concentration and business-model transition matter more after ENGIE Impact
        blocks:
          - type: paragraph
            body: >-
              Arcadia in 2026 is no longer just the company described in older community-solar materials. Current
              official pages frame one enterprise platform for paying utility bills, buying energy, and advancing
              sustainability, and the ENGIE Impact acquisition materially expanded that surface area. The combined
              company says it serves more than 1,500 enterprise customers, about a quarter of the Fortune 500, and
              manages nearly $100 billion of utility spend. That is a strength, but it also means more of Arcadia's
              value now depends on partner-heavy execution across procurement, billing operations, reporting
              integrations, and customer-account continuity. Fox uses Arcadia with Salesforce Net Zero Cloud. Sweep and
              Cority integrate DataHub into ESG workflows. Iron Mountain case material shows the advisory side
              coordinating multiple generators, intermediaries, and suppliers. Public sources prove that Arcadia has
              real enterprise traction, but they also show that the business now spans more counterparties, more
              contract types, and more failure modes than the older utility-data story alone implied.
