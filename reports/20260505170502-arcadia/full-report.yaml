    rows:
      - - Connect and credential onboarding
        - Captures customer utility credentials or launches hosted Connect flows
        - Utility credential validity and provider-specific login paths
        - Provider workflow changes can break onboarding or slow verification
      - - Plug statements and intervals
        - Discovers accounts, meters, statements, and interval reads after credential capture
        - Utility provider coverage and provider-site reliability
        - Interval activation is meter-level and can lag when provider systems are down
