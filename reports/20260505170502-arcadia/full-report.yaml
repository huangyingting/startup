      - number: '1.3'
        title: Funding History, Investors, and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Public funding evidence is good enough to establish a chronology, but not good enough to reconstruct an
              exact fully diluted cap table. Arcadia's September 2021 Series D press release said the company raised
              $100 million and, including a previously undisclosed $21 million Series C-1, had raised $180 million in
              total. The May 2022 company blog then announced a $200 million financing round led by J.P. Morgan Asset
              Management. A March 2024 exempt-offering filing shows another financing event, and Latitude Media later
              described that period as roughly $50 million of growth financing plus a $30 million credit facility from
              J.P. Morgan and TriplePoint Capital. By May 2026, Arcadia's acquisition microsite said the company was
              backed by Macquarie Asset Management and JP Morgan Asset Management, while the ENGIE Impact transaction
              itself was advised by J.P. Morgan Securities. The most important strategic stakeholder shift is not just
              another investor round: Arcadia folded in ENGIE Impact's bill-management, procurement, and sustainability
              operation, giving the platform a larger operational base than pure software peers. That said, current
              ownership percentages, valuation, secondary activity, covenant terms, and exact debt economics are not
              public in the cache.
