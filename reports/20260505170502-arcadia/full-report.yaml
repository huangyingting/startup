        title: Operational risk sits inside credential automation, data normalization, and multi-party workflows
        blocks:
          - type: paragraph
            body: >-
              Arcadia's operating model is powerful precisely because it is complicated. The company says it aggregates
              utility data from thousands of providers, offers outputs through Snowflake and SFTP, standardizes meter
              and ESG tables, and now processes about three million bills per month across roughly 5,000 utilities
              according to Latitude Media. The same retained sources show why this can be brittle. The developer
              changelog is full of new providers, extraction bug fixes, improved rendering reliability, token-storage
              workflows, automated guest access, and MFA opt-out features. Those are signs of active product maturity,
              but they are also evidence that Arcadia must constantly maintain fragile upstream utility workflows to
              keep downstream enterprise data clean. The public security page documents sensible controls such as TLS,
              hashed passwords, AWS KMS encryption, and payment separation through Stripe and Plaid. What it does not
              provide is incident frequency, customer-visible error rates, or service-credit history. That missing
              operational denominator keeps residual delivery risk elevated.
            claimRefs:
