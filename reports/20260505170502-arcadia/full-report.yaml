            body: >-
              The operating model is built around data collection, normalization, and downstream delivery. Public pages
              say the Arcadia Data Model aggregates and standardizes energy data from thousands of sources, supports 50+
              countries, updates more than 30,000 tariffs, and captures interval data covering more than 75% of US AMI
              meters. Plug is the front door for account, bill, and interval ingestion, while DataHub provides
              enterprise bulk delivery through zipped CSV files to SFTP servers or a Snowflake Direct Share. The API
              documentation describes Connect-based credential onboarding, tokenized authentication, and explicit
              activation of statement and interval products. The changelog shows active 2026 maintenance with monthly
              provider additions, extraction fixes, automated guest access, token storage for selected utilities, and
              credential-status improvements. The product therefore looks operationally mature on ingestion and
              data-processing mechanics, with a documented workflow from credential capture to statements, meters,
              intervals, and bulk exports. The strongest publicly supported differentiation is therefore not a single
              algorithm or dashboard, but the way Arcadia chains several stages together: credential collection,
              provider connectivity, record normalization, tariff logic, and delivery into downstream systems. The
              review cache repeatedly shows the same pattern across docs and marketing pages, which makes the operating
