  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: 'Revenue model: multiple monetization surfaces are visible even though prices are not'
        blocks:
          - type: paragraph
            body: >-
              Arcadia's public materials support a broader revenue model than a single SaaS subscription. The core
              enterprise suite has three named solution lines: utility bill management, energy procurement advisory, and
              sustainability reporting. Underneath those sits a separate data and platform layer. The Data Model, API
              Quick Start, and older Arc launch materials all show Arcadia selling developer and data-access
              capabilities, not just managed services. That matters because it means revenue can come from software and
              data access, workflow automation, partner integrations, and higher-touch procurement or payment
              operations. The cache is strongest on mechanism, not pricing. Arcadia describes automated bill capture,
              payment processing, tariff optimization, forecasting, reporting integrations, and structured energy
              procurement, but it does not publish enterprise price sheets. That pushes the analysis toward contract
              structure and revenue quality rather than headline ACV. Financially, the visible model is a hybrid:
              recurring platform revenue seems plausible, but procurement and payments clearly add service and operating
              components that make the business more complex than pure seat-based software.
