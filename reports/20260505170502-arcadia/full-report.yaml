              - CV044
              - CV045
      - number: '8.4'
        title: What would change the call fastest is private proof, not more narrative
        blocks:
          - type: paragraph
            body: >-
              A cleaner recommendation would require only a handful of concrete answers. First, what is the latest
              priced valuation and how much of the headline number is affected by preferences, secondary terms, or debt?
              Second, what is the current revenue and margin profile of the combined platform, especially after ENGIE
              Impact? Third, how durable are the enterprise customers that make the scale narrative compelling? Fourth,
              how much of the post-acquisition operating model is software-like versus services-heavy? Finally, has the
              Connecticut issue been fully resolved and are current enterprise terms strong enough to preserve trust if
              billing or procurement workflows fail? Those questions are all answerable in diligence, but they are not
              answerable from the retained public cache. That is why the right valuation stance stays unknown. The
              company may be worth paying up for. The public record simply does not yet prove how much.
            claimRefs:
