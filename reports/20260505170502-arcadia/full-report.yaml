      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Founder control remains central. Kiran Bhatraju is still the CEO and founder on the current leadership
              page, and the company's public storytelling continues to route through him on fundraising, strategy,
              enterprise expansion, and the ENGIE Impact acquisition. The current executive bench shown publicly is
              concise: Paul Mulé is CFO, Barbara Clay is Chief Legal Officer, and Udit Garg is SVP of R&D. Latitude
              Media identified Garg as VP of product in January 2025, suggesting he is one of the few executives whose
              role has visibly expanded as Arcadia moved deeper into enterprise AI-driven products. Governance
              visibility is thinner than leadership visibility. The 2024 Form D exposes a broad director set including
              Sameer Reddy, Ben Kortlang, Alex Laskey, Jennifer Dulski, Tanya Barnes, John Rettig, Eric Scheyer, Greg
              Callman, and Jeffrey Ubben, but cached sources do not explain committee responsibilities or board
              biographies in detail. Operationally, Arcadia still anchors itself to Washington, DC while supporting U.S.
              remote work and a Chennai office in India. Key-person dependence is material because strategy, investor
              communication, and product repositioning remain highly founder-led in the public record.
