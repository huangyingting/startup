      - number: '1.4'
        title: Scale, Milestones, and Visible Risks
        blocks:
          - type: paragraph
            body: >-
              Arcadia's scale claims became much larger after the ENGIE Impact deal. Current public pages cite 1,500+
              enterprise customers, about a quarter of the Fortune 500, nearly $100 billion in utility spend under
              management, 4.5 million meters, and a platform that reaches thousands of providers and millions of
              connected accounts. Even before the 2026 acquisition, enterprise and developer signals suggested
              meaningful distribution: Arcadia said Arc APIs served dozens of customers in 2021 and more than 100
              innovators by 2022, while enterprise pages later cited 2 million connected accounts and near-national
              tariff coverage. The company has also used customer and partner case studies to demonstrate real
              operational use, from Google and EDPR's synthetic community-solar structure to current enterprise
              workflows across billing, procurement, and ESG reporting. The main publicly visible adverse item is
              legacy-regulatory risk: Connecticut's PURA opened a 2024 investigation into Arcadia Power over possible
              licensing and customer-service violations tied to older offerings. Cached sources confirm the petition and
              docket process, but not the ultimate resolution. Separately, revenue, ARR, and headcount remain private,
              which limits underwriting confidence despite clear platform-scale claims.
