              locations, thousands of utility bills, and energy spend in the hundreds of millions. In effect, Arcadia's
              current customer mix appears to span both direct enterprise contracts and software/platform partners that
              embed Arcadia data or tariff logic inside their own products. That segmentation also implies different
              sales motions. Some references look like classic enterprise deployments with cross-functional users and
              centralized budgets, while others look like product-embedded relationships where Arcadia becomes
              infrastructure inside another vendor's workflow. For diligence, that distinction matters because
              retention, pricing, and support burdens can differ sharply between direct and channel-led customers.
