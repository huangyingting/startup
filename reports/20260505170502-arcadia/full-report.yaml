  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk is the clearest adverse item in the public record
        blocks:
          - type: paragraph
            body: >-
              The retained source set contains one unmistakably material adverse item: the March 11, 2024 Connecticut
              PURA petition to open an investigation of Arcadia Power, Inc. The petition asks PURA to consider penalties
              for possible operation as an electric supplier without a license, operation as an aggregator without a
              certificate, deceptive or misleading marketing and contracts, and charging customers for services not
              provided. EnergyChoiceMatters adds important context rather than clean exoneration: it reported that PURA
              had previously closed Arcadia's 2017 aggregator application after stating that Arcadia's broker model did
              not require an aggregator license, while also reporting Arcadia's later position that it had not assisted
              Connecticut customers since April 2019. That combination creates genuine regulatory ambiguity. It is not
              enough to end the thesis on its own, but it is enough to keep residual legal risk high until the final
              docket outcome, any penalties, and any current-state licensing posture are reviewed directly.
