      - number: '8.3'
        title: 'Recommendation: research-more until disclosure closes the denominator gap'
        blocks:
          - type: paragraph
            body: >-
              Research-more is a disciplined rather than negative recommendation. The retained record supports a real
              bull case: Arcadia has built a broad platform, raised meaningful capital, integrated multiple
              capabilities, and now addresses a market where tariff complexity, reporting obligations, and
              electricity-price volatility are making energy management more strategic. At the same time, the retained
              record also supports a real anti-thesis: current valuation is not disclosed, current revenue is not
              disclosed, gross margin is not disclosed, retention is not disclosed, and enterprise contract economics
              are not disclosed. The community-solar messaging drift between company history and the still-live
              developer page also reinforces that the company is in the middle of an identity transition rather than a
              fully stabilized steady state. That does not make the company unattractive. It means the next step is
              targeted private diligence on valuation, economics, concentration, and integration rather than an
              unsupported public call. High-quality assets can still be poor underwriting at the wrong price or with too
              much asymmetry.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV015
              - CR026
