      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              核心需求驱动罕见地同向。监管在收紧：GHGRP、SB 253、CSRD 相关工作流和 SEC 气候披露规则，都提升了可审计公用事业数据的价值。电力成本的结构性波动也在加剧：Arcadia
              自己的研究显示，商业费率通胀普遍存在，区域差异极端，需量电费暴露增加，PJM 容量价格大幅上行。企业买方还面临流程痛点：人工账单校验、资费误用和不一致的公用事业 PDF，都会制造昂贵的数据质量问题。Arcadia
              自己的案例研究也强化了这些痛点，从 Fox 依赖账单数据做报告，到一家超大规模云厂商在标准化后发现超过 $10 million 的账单错误。不过，约束也很真实。买方需要相信数据管道准确到足以支撑 CFO
              级报告和采购决策。企业切换成本很实质，因为数据分散在门户、电表、顾问和既有软件系统中。替代类别也很多：数据接入层有 UtilityAPI，账单管理有 EnergyCAP，可持续发展报告有 Watershed 和
              Persefoni，采购智能有 LevelTen。最后，关于全市场 TAM、Arcadia 定价和转化率的公开证据仍然薄弱；尽管工作流痛点明显，纯软件式市场份额分析仍受限制。
