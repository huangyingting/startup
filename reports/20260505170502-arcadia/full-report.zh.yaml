      - number: '8.4'
        title: 最快改变判断的，是私下证据，不是更多叙事
        blocks:
          - type: paragraph
            body: >-
              更清晰的建议只需要回答少数具体问题。第一，最近一轮有定价估值是多少，对外口径数字中有多少受优先权、老股条款或债务影响？第二，合并后平台尤其是 ENGIE Impact
              之后的当前收入和利润率画像是什么？第三，让规模叙事有说服力的企业客户有多耐久？第四，收购后运营模式中有多少像软件，多少偏服务？最后，Connecticut
              问题是否已经完全解决；如果账单或采购工作流出错，当前企业条款是否足够守住信任？这些问题尽调都能回答，但保留的公开缓存回答不了。因此，正确的估值立场仍是未知。公司可能值得溢价买入。公开记录只是还没有证明该付多少。
