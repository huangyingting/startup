    columns:
      - 论点
      - 投资逻辑
      - 什么会改变判断
    rows:
      - - 企业规模
        - 并入 ENGIE Impact 后，Arcadia 的规模似乎已足够有分量：1,500+ 家企业客户、覆盖 Fortune 500 的 25%，管理近 $100B 公用事业支出。
        - 拿到真实留存、集中度和续约数据后，客户质量判断才会改善。
      - - 平台广度
        - Arcadia 现在覆盖公用事业数据、账单支付、能源采购和可持续报告，并有具名客户证据和合作伙伴集成。
        - 如果整合放慢，或产品重叠显得混乱，平台广度就会从护城河变成复杂度。
      - - 市场顺风
        - 能源波动、费率复杂度和报告要求，为 Arcadia 的工作流带来可信的需求顺风。
        - 如果买方把 Arcadia 当作服务较重的一揽子方案，而不是软件化基础设施，逻辑会减弱。
      - - 反向逻辑
        - 公开来源仍未披露当前估值、收入、毛利率或股权结构经济性。
        - 近期定价轮、经审计的财务桥或更扎实的留存证据，都会显著增强价格支撑。
      - - 可比公司纪律
        - 透明的上市能源科技和公用事业软件参照，多数按温和市值 / 收入倍数交易。
        - 如果 Arcadia 证明软件收入占比和利润率远高于公开可比组，估值溢价会更站得住脚。
    notes: 反向逻辑主要是分母风险：资产可能不错，但公开证据无法给出可知价格。
