      - number: '8.2'
        title: 可比公司框架提示要守纪律，而不是硬给精确估值
        blocks:
          - type: paragraph
            body: >-
              公开可比公司主要用来做透明度校验。StockAnalysis 上 Itron、Enphase、Ameresco 和 Stem 的页面都列出当前市值和收入组合，各公司也都有公开 SEC
              文件入口。业务组合不同，但它们展示了公开能源科技和公用事业软件估值锚在实践中应该有多透明。从公开证据看，Arcadia
              还不像这样。可比表中的主体行刻意做成能见度行，而不是伪造倍数，因为保留来源只显示融资金额，例如 2022 年 $200 million 融资、2024 年 3 月 Form D，以及 2025 年 1
              月增长融资加信贷额度。没有当前估值标记，也没有收入分母，给 Arcadia 直接搭公共市场倍数桥就是虚假精确。可比公司的正确启示不是 Arcadia 明显便宜或昂贵，而是公开证据不足以判断。
