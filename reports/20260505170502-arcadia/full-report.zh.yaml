  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管和法律风险是公开记录里最清晰的反向事项
        blocks:
          - type: paragraph
            body: >-
              保留来源中有一个明确具备实质性的反向事项：2024 年 3 月 11 日 Connecticut PURA 请愿，要求对 Arcadia Power, Inc. 发起调查。请愿要求 PURA
              考虑处罚，原因包括可能在无许可情况下作为电力供应商运营、在无证书情况下作为聚合商运营、营销和合同存在欺骗或误导，以及向客户收取未提供服务的费用。EnergyChoiceMatters
              补充了重要背景，但不是清晰洗白：它报道，PURA 此前在说明 Arcadia 的经纪模式不需要聚合商许可后，关闭了 Arcadia 2017 年的聚合商申请；同时也报道了 Arcadia 后来的立场，即自
              2019 年 4 月以来未协助 Connecticut 客户。这种组合制造了真实的监管模糊性。它本身不足以终结投资逻辑，但足以在直接审阅最终案卷结果、任何处罚以及当前州级许可状态之前，让残余法律风险保持高位。
