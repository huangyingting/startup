            title: 市场很宽，但类别定义仍模糊
            body: Arcadia 同时重叠多个类别——数据基础设施、公用事业账单管理、可持续发展报告和采购智能。这给了它扩张空间，但也让第三方 TAM 对标和清晰替代品映射比单功能 SaaS 类别更难。
