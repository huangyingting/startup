        title: 运营模型、数据基础设施与发布节奏
        blocks:
          - type: paragraph
            body: >-
              运营模型围绕数据收集、标准化和下游交付搭建。公开页面称，Arcadia Data Model 从数千个来源聚合并标准化能源数据，支持 50+ 国家，更新超过 30,000 项资费，并抓取覆盖超过 75% 美国
              AMI 电表的间隔数据。Plug 是账户、账单和间隔数据接入的入口，DataHub 则通过压缩 CSV 文件交付到 SFTP 服务器，或通过 Snowflake Direct Share 向企业批量交付。API
              文档描述了基于 Connect 的凭证上线、token 化认证，以及账单和间隔数据产品的显式激活。更新日志显示，2026 年仍在活跃维护，每月有服务提供商新增、抽取修复、自动访客访问、部分公用事业的 token
              存储，以及凭证状态改进。因此，产品在接入和数据处理机制上看起来运营成熟，已记录从凭证抓取到账单、电表、间隔数据和批量导出的工作流。最强的公开可证差异化不是某个算法或仪表盘，而是 Arcadia
              把多个阶段串起来的方式：凭证收集、服务提供商连接、记录标准化、资费逻辑，再交付进下游系统。审阅缓存反复在文档和营销页面看到同一模式，这让运营模型比泛泛的 AI 软件叙事更具体。
