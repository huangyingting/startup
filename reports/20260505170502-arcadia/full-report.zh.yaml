  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 战略资产真实存在，但价格支撑仍缺失
        blocks:
          - type: paragraph
            body: >-
              Arcadia 有足够公开证据，值得认真研究。官方 2026 年材料称，公司在收购 ENGIE Impact 后已服务超过 1,500 家企业客户，其中包括约四分之一 Fortune 500，并管理近 $100
              billion 公用事业支出。收购页面还描述了一个单一平台，把公用事业数据基础设施、账单支付、能源采购和可持续发展报告合在一起。FOX 和 Iron Mountain
              提供了报告和采购场景的具名客户验证；Sweep 和 Cority 则说明 Arcadia 数据已经嵌入第三方 ESG
              工作流。这些信号并不轻。它们证明的是企业级真实相关性，而不是一个投机概念。问题在于，战略相关性不等于可投资价格。保留资料集仍没有披露当前轮次估值、收入基数、毛利率、留存画像或股权结构条款。因此，估值章节必须把公司质量和价格信心拆开看，不能假装两者已经连上。
