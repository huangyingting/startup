      - number: '2.2'
        title: 受证据约束的市场规模观察口径
        blocks:
          - type: paragraph
            body: >-
              缓存没有可靠的第三方 TAM 或 SAM 报告，能精确对应「企业能源智能平台」这一类别。缓存有的是一组运营和需求侧观察口径，仍可支持决策。第一，Arcadia 当前已服务的基数已经很大：公司称服务 1,500+
              企业客户，管理近 $100 billion 公用事业支出，触达数百万账户和电表。第二，产品覆盖很深：Plug 触达 50+ 国家数千家服务提供商，覆盖 95% 的美国居民和商业公用事业账户，并包括 400+
              间隔数据提供商；Signal 覆盖 30,000+ 项资费和接近全国的资费覆盖。第三，即便没有干净的软件 TAM，监管需求也足够重要：仅 EPA GHGRP 就触及约 8,000 家设施，California
              SB 253 影响超过 5,000 家大型公司，SEC 气候规则还给大型申报主体增加审计级压力。第四，企业能源成本波动正在放大问题：Arcadia 自己的 2026 年费率报告发现，2020-2025 年
              97.5% 的商业设施电价上涨，71% 的涨幅超过通胀。这些口径说明问题空间可信且在扩张，但没有给出清晰的全行业收入池，因此本报告不假装存在这样的精确口径。
