        title: 成本结构有真实运营重量，牵引力已公开，但单位经济性大多仍未披露
        blocks:
          - type: paragraph
            body: >-
              Arcadia 的成本底座不太可能像纯软件。公司维护一个标准化能源数据底座，横跨数千个来源、50 多个国家、数万项资费和美国 AMI 电表的大部分覆盖。更新日志证实，新增服务提供商、修复抽取、token
              存储、MFA 绕过和抓取可靠性更新都在持续发生；这不是一次性搭建，而是持续运营工作。Arcadia
              还披露了付款处理、安全控制和伙伴集成，这些都意味着持续的基础设施和合规支出。牵引力比利润率更容易观察。近期资料称，Arcadia 现在每年处理超过 $30B
              的公用事业付款和数百万张公用事业账单；伙伴和客户证明提到 300 多万个公用事业账户、9,500 家服务提供商和 95% 的美国账户覆盖。历史资料显示，早在 2021 年，公司就有 35 多个 API
              客户、700,000 个已上线公用事业账户和 $470M 居民付款吞吐。这些数字证实业务已经有实质规模，但仍没有揭示实际定价、毛利率、服务组合或留存质量。
