            body: >-
              Arcadia 的运营模型之所以强，正是因为它复杂。公司称自己从数千家服务提供商聚合公用事业数据，通过 Snowflake 和 SFTP 输出，标准化电表和 ESG 表；Latitude Media
              称，公司现在每月处理约 300 万张账单，横跨约 5,000 家公用事业。相同的保留来源也显示了这种模型为何脆弱。开发者更新日志充满新服务提供商、抽取错误修复、渲染可靠性改进、token 存储流程、自动访客访问和
              MFA 退出功能。这些是产品成熟度活跃提升的信号，也证明 Arcadia 必须持续维护脆弱的上游公用事业工作流，才能保持下游企业数据干净。公开安全页面记录了合理控制，如 TLS、哈希密码、AWS KMS
              加密，以及通过 Stripe 和 Plaid 做付款隔离。但它没有给出事故频率、客户可见错误率或服务积分历史。缺失的运营分母使残余交付风险仍然偏高。
