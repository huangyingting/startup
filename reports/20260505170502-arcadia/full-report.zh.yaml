        - 哪些迁移工具和服务能比既有方案更快体现价值？
      - - 各类工作流都有密集替代品
        - 约束
        - 持续
        - Arcadia 在不同层的竞争方式不同：中间件、账单管理、报告，或采购智能。
        - 今天 Arcadia 最常在哪一层赢单：数据、账单管理、采购，还是报告？
      - - 定价和赢单率公开数据稀缺
        - 约束
        - 持续
