            body: 缓存支持 Arcadia 的已服务客户规模、服务提供商覆盖、报告义务和成本波动证据。但它不支持严谨的第三方收入 TAM、公开价格曲线，或覆盖 Arcadia 全市场的漏斗转化模型。
