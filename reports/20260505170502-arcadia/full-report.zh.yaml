  - id: TV005
    title: 投资逻辑破裂触发表
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 寻求新资金时当前估值仍未披露
        - 出现新一轮融资或老股交易，但没有收入或利润率支撑
        - 价格纪律无法执行，信息不对称扩大
        - 分母披露前，不要承销溢价入场。
      - - ENGIE 整合打断合同连续性
        - 续约或客户通知显示价格、服务或责任摩擦
        - 平台广度逻辑变成整合拖累
        - 降低确信度，并把执行风险视为结构性抬升。
      - - 留存或集中度不达预期
        - 私有尽调显示续约质量弱或依赖大客户
        - 企业规模不再能证明耐久性
        - 按更低收入质量和更短客户期限重新定价。
      - - 监管问题超出已知 Connecticut 背景
        - 出现新的州行动、处罚或牌照问题
        - 法律悬而未决开始影响销售周期和估值
        - 暂停，直到监管地图和整改成本清晰。
      - - Arcadia 寻求溢价估值时，上市可比公司仍低迷
        - 能源科技和公用事业软件同业继续按温和收入倍数交易
        - 激进私募价格缺少公开市场退出支撑
        - 要求更好条款，或等证据更干净。
    notes: 这些触发项围绕价格和承销，不是泛泛运营风险。
