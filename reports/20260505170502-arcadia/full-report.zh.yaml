  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分层
        blocks:
          - type: paragraph
            body: >-
              Arcadia 当前的公开客户证据，重心已转向企业和软件赋能买方，而不是公司历史上关联的消费者社区太阳能受众。公司历史页面称，Arcadia 在 2025 年 3 月把社区太阳能拆分给 Perch，现在服务超过
              1,500 家企业客户。客户故事索引和案例研究显示了几个反复出现的细分：Arconic 和 Fox 等直接企业能源团队，Iron Mountain 等大型采购或数据中心买方，以及
              Verse、Fusebox、Stable、Haven 和 Subcontractor Hub 等渠道或嵌入式产品伙伴。关于我们页面用 Fortune 2000
              客户、数百个地点、数千张公用事业账单和数亿美元能源支出，进一步强化了同一再定位。换句话说，Arcadia 当前客户组合似乎同时覆盖直接企业合同，以及把 Arcadia 数据或资费逻辑嵌入自身产品的软件 /
              平台伙伴。这种分层也意味着不同销售动作。一些引用看起来像典型企业部署，拥有跨职能用户和集中预算；另一些则像产品嵌入关系，Arcadia
              成为另一家供应商工作流里的基础设施。对尽调来说，这一区分很重要，因为直接客户和渠道驱动客户的留存、定价和支持负担可能差别很大。
