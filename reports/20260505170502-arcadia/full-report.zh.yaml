      - - Enphase Energy
        - 上市市值和收入
        - 市值 $4.32B；收入 $1.51B；约 2.9x 收入。
        - 强品牌和分析能力的清洁能源软件加硬件基准。
        - 住宅太阳能定位和硬件结构与 Arcadia 有实质差异。
