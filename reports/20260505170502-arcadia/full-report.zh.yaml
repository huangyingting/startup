      - number: '8.3'
        title: 建议：在披露补上分母缺口前，继续研究
        blocks:
          - type: paragraph
            body: >-
              继续研究是有纪律的建议，不是负面判断。保留记录支撑一个真实乐观情景：Arcadia
              搭起了宽平台，拿到有意义的资本，整合了多项能力，如今所处市场里，费率复杂度、报告义务和电价波动正把能源管理推向更战略的位置。与此同时，保留记录也支撑真实反向逻辑：当前估值未披露，当前收入未披露，毛利率未披露，留存未披露，企业合同经济性也未披露。公司历史与仍在线开发者页面之间的社区太阳能表述漂移，也说明公司正在身份转换中，还不是完全稳定的稳态。这不意味着公司没有吸引力。它意味着下一步应围绕估值、经济性、集中度和整合做有针对性的私下尽调，而不是基于公开资料强行下结论。高质量资产若价格不对，或信息不对称太大，仍可能是糟糕的投资判断。
            claimRefs:
