  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出与排除支出
        blocks:
          - type: paragraph
            body: >-
              Arcadia 当前的市场边界既不是广义的「光伏」，也不是广义的「ESG
              软件」。公司把自己描述为企业能源管理平台：在一套大型数据基础设施上，结合公用事业账单管理、能源采购咨询和可持续发展报告；底层数据覆盖公用事业账单、间隔数据、资费、合同和站点属性。因此，纳入支出包括用于收集公用事业数据、校验并支付账单、建模资费、制定能源供应决策，以及把可审计数据集送入碳和合规流程的软件与托管服务预算。排除支出包括商品电力生产本身、实体公用事业基础设施、通用会计软件，以及社区太阳能订阅这一当前
              Arcadia 产品线。Arcadia 自己的历史页面在这里很关键：页面明确说，Perch 拆分后社区太阳能不再是 Arcadia
              产品，这意味着历史社区太阳能口径应被视为相邻市场经验的证明，而不是今天的核心市场。公开材料也清楚显示了现状替代方案：电子表格、分散顾问、不透明采购经纪、人工账单处理和割裂的报告工具。因此，Arcadia
              处在一个工作流替换市场里，数据集成和服务广度与纯软件功能同样重要。
