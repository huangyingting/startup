          - type: paragraph
            body: >-
              保留证据暗示，Arcadia 卖的是减少摩擦，而不是功能新奇。客户故事反复描述同一套购买逻辑：人工收集公用事业数据昂贵、不准确或太慢，Arcadia 缩短了通往可用行动的时间。Fusebox 称 Arcadia
              把账单分析周期最多缩短两周，并让公司无需增加太多人力成本也能扩张。Verse 称内部搭建公用事业数据能力既昂贵又耗时，因此 Arcadia 加快了产品发布。Subcontractor Hub 称 Arcadia
              帮助在几分钟内完成光伏与储能方案。Stable Auto 用 Arcadia 资费数据支撑 EV 充电部署的 ROI 预测，而单站点部署可能需要大约 $1M 资本。这些例子不是 CAC
              或回本披露，但可作为有用代理指标：Arcadia 销售的是速度、人力杠杆和决策质量。伙伴渠道同样重要。Cority 和 PR Newswire 都把 Arcadia
              描述为拥有集成和数百家服务提供商的生态玩家，意味着部分增长可能来自渠道关系，而不是纯直接外勤销售。
