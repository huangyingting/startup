              从历史看，Arcadia 并不明显缺资本。公开资料支持至少三个已披露融资锚点：2021 年 Series D 及相关累计融资口径、2022 年 $200M 融资、以及 2024 年 Form D 显示在
              $49.1M 发行中已售出 $45.6M。合在一起，这些文件和公司公告给出超过 $425M 的公开融资下限。对一家仍在扩展平台覆盖并整合 ENGIE Impact
              的公司来说，这个数额有意义。即便如此，历史累计融资不等于当下充足。缓存没有披露今天的现金余额、月度烧钱、债务契约或现金跑道。它也没有拆分 Arcadia
