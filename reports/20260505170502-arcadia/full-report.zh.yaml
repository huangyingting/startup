      - number: '1.4'
        title: 规模、里程碑与可见风险
        blocks:
          - type: paragraph
            body: >-
              ENGIE Impact 交易之后，Arcadia 的规模口径明显放大。当前公开页面称，公司拥有 1,500+ 企业客户，覆盖约四分之一 Fortune 500，管理近 $100 billion
              公用事业支出、4.5 million 个电表，平台触达数千家服务提供商和数百万个已连接账户。即使在 2026 年收购之前，企业和开发者信号也显示出有意义的分发：Arcadia 称 Arc API 在 2021
              年服务数十个客户，到 2022 年服务超过 100 个创新者；后来的企业页面则提到 2 million 个已连接账户和接近全国覆盖的资费数据。公司也用客户和伙伴案例证明真实运营用途，从 Google 与 EDPR
              的合成社区太阳能结构，到当前覆盖账单、采购和 ESG 报告的企业工作流。公开可见的主要反向事项是历史监管风险：Connecticut 的 PURA 在 2024 年对 Arcadia Power
              发起调查，涉及旧产品可能存在的许可和客户服务违规。缓存资料证实了请愿和案卷流程，但未证实最终结果。另一个限制是，收入、ARR 和员工数仍未公开；尽管平台规模口径清晰，承销信心仍受影响。
