      - number: '1.3'
        title: 融资历史、投资方与资本结构
        blocks:
          - type: paragraph
            body: >-
              公开融资证据足以建立时间线，但不足以还原精确的完全稀释后股权结构表。Arcadia 2021 年 9 月的 Series D 新闻稿称，公司融资 $100 million；计入此前未披露的 $21 million
              Series C-1 后，累计融资为 $180 million。2022 年 5 月，公司博客随后宣布由 J.P. Morgan Asset Management 领投一轮 $200 million
              融资。2024 年 3 月的豁免发行文件显示又发生一轮融资事件；Latitude Media 后来把该阶段描述为大约 $50 million 的增长融资，加上来自 J.P. Morgan 和
              TriplePoint Capital 的 $30 million 信贷额度。到 2026 年 5 月，Arcadia 的收购专题网站称，公司由 Macquarie Asset Management 和 JP
              Morgan Asset Management 支持，而 ENGIE Impact 交易本身由 J.P. Morgan Securities 提供咨询。最重要的战略股东变化不只是又一轮投资：Arcadia 把
              ENGIE Impact 的账单管理、采购和可持续发展运营并入自身，使平台获得比纯软件同业更大的运营底座。不过，当前持股比例、估值、老股交易、契约条款和确切债务经济性，在缓存中都没有公开。
