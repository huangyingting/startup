      - number: '6.3'
        title: 耐久性、扩张路径与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              缺失的是投资者通常最关心的客户质量部分：可重复性、续约质量和集中度。审阅的公开页面都没有披露
              NRR、GRR、流失率、续约率、合同期限分布或最大客户暴露。公开客户证明仍主要由案例研究、伙伴公告和被选择的结果叙事构成，而不是队列或可独立审计的使用面板。原本可能帮助评估反向证据的评论表面，在缓存中也很弱：Trustpilot
              截图卡在浏览器验证，BBB 页面阻止访问。这意味着 Arcadia
              能证明客户存在，也能证明若干部署有意义，但仅靠公开证据，尚不能证明客户有多粘、收入可能多集中，或投诉率在历史消费者关系和新企业平台之间是否不同。最强的扩张信号是渠道广度：可持续发展平台、公用事业数据应用、光伏软件和
              EV 充电分析，都看起来把 Arcadia 延伸到相邻预算和地理区域，包括通过 Sweep 进入欧洲。换句话说，缓存足以显示谁在买
              Arcadia、为什么买，但不足以证明这部分收入有多耐久或多分散。缺失字段正是投资者搭建客户质量桥时想要的内容：合同期限、续约行为、使用扩张，以及企业再定位和 ENGIE 整合后的伙伴集中度。
