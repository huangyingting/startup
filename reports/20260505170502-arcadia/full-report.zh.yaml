      - number: '7.4'
        title: 最大剩余风险是围绕合同、集中度和当前经济性的证据不透明
        blocks:
          - type: paragraph
            body: >-
              Arcadia 的公开材料足以说明这家公司重要，但还不足以回答所有投资判断问题。公司已经拿到可观资本，包括 2022 年 $200 million 融资、2024 年 3 月 Form D 披露的 $49.1
              million 总发行额及认股权覆盖，以及 2025 年 1 月报道的 $50 million 增长融资和 $30 million 信贷额度。可是，保留资料集仍没有披露当前收入、毛利率、客户集中度、流失率、企业级
              SLA 条款，或 Connecticut 事项的最终结果。连法律披露界面也很薄：保留的隐私、条款和法律入口要么失效，要么为空。Arcadia
              仍可能是有吸引力的战略资产，因为平台确实有规模，也有客户验证。但风险章节不能越过证据。在公开或私下尽调补上集中度、事故历史、监管结论和收购后合同结构这些缺口之前，诚实的剩余评级仍应是高，而不是中。
            claimRefs:
