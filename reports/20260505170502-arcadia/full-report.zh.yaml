chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、平台与商业模式
        blocks:
          - type: paragraph
            body: >-
              Arcadia 在 2026 年把自己定义为面向企业的能源智能平台，而不是面向消费者的清洁能源订阅应用。当前入口围绕一个整合主张展开：企业可以用 Arcadia
              支付公用事业账单、购买能源，并在资产组合层面推进可持续发展。支撑这项承诺的平台层，由用于公用事业账单和间隔数据的 Plug、用于资费智能的 Signal、用于光伏与储能分析的 Switch 组成，还包括
              DataHub 等批量数据工具和基于 Connect 的开发者流程。这个定位已经明显不同于公司早期的 Arcadia Power 身份；当时核心是社区太阳能报名和居民清洁能源接入。公开资料显示，Arcadia
              仍把社区太阳能历史当作运营经验的证明，但公司历史页面现在明确写明，社区太阳能在 2025 年 3 月成为独立的 Perch Energy 业务，已不再是 Arcadia
              的产品。因此，商业模式已转向企业软件、托管服务和咨询工作流，靠数据接入、资费建模、账单管理、采购和可持续发展报告变现，而不是只卖消费者能源切换产品。
