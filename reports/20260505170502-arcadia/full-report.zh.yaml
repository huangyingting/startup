  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品范围与模块地图
        blocks:
          - type: paragraph
            body: >-
              Arcadia 当前定位是企业能源智能平台，而不是单一用途的公用事业数据 API。2026 年解决方案和企业概览页面描述了三条企业解决方案——Utility Bill Management、Energy
              Procurement Advisory 和 Sustainability Reporting——它们叠在一个平台之上，平台包括 Utility Bill & Interval Data、Tariff &
              Energy Rate Calculator 和 Solar & Storage Analysis。公司历史页面把这些模块和收购连接起来：Genability 变成资费和建模层，Urjanet
              变成公用事业数据自动化，ENGIE Impact 加入公用事业账单管理、采购和可持续发展咨询。公开用例页面显示，同一套堆栈被导入多个客户工作流，尤其是企业能源管理和 EV 充电。实际销售中，Arcadia
              推的是面向公用事业账单、间隔数据、资费、优化和报告的统一操作系统，而不是狭窄的 API 点解决方案。公开模块地图也暗示，Arcadia
              试图掌握从原始公用事业数据到行动的运营闭环。它不是只卖数据流，而是在同一套标准化记录之上叠加咨询、报告和优化服务。这个集成故事很重要，因为许多相邻供应商仍把账单管理、资费分析、采购和可持续发展报告拆在不同工具和团队里。
