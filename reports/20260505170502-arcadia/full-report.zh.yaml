  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式：虽然没有公开价格，但可见多个变现面
        blocks:
          - type: paragraph
            body: >-
              Arcadia 的公开材料支持一个比单一 SaaS 订阅更宽的收入模式。核心企业套件有三条具名解决方案线：公用事业账单管理、能源采购咨询和可持续发展报告。其下还有独立的数据与平台层。Data Model、API
              Quick Start 和更早的 Arc 发布材料都显示，Arcadia
              销售开发者和数据接入能力，而不只是托管服务。这很重要，因为收入可以来自软件和数据接入、工作流自动化、伙伴集成，以及更高接触度的采购或付款运营。缓存最强的是机制，而不是定价。Arcadia
              描述了自动账单抓取、付款处理、资费优化、预测、报告集成和结构化能源采购，但没有发布企业价格表。这把分析重点推向合同结构和收入质量，而不是表面
              ACV。财务上，可见模式是混合型：经常性平台收入看起来合理，但采购和付款显然加入了服务和运营成分，使业务复杂度高于纯按席位收费的软件。
