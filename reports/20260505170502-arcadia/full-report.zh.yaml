      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >-
              Arcadia 的买方图谱是多线程的。直接企业买方往往是多站点、账单复杂度高的公司里，横跨能源、财务、可持续发展或运营职能的团队。Fox
              是清晰的可持续发展报告案例：用户需求是排放报告，但关键输入是公用事业账单数据。Iron Mountain 展示了另一条线：数据中心和采购团队在多区域资产组合中购买结构化能源采购和可再生能源匹配。Arcadia
              的用例页面把图景进一步打开。EV
              和充电公司需要资费与公用事业数据，以优化充电成本和客户注册。能源管理提供商需要详细的用量、价格和资费输入，为客户运行优化和方案工作流。因此，预算所有者随细分场景变化：可持续发展负责人可能掌握碳报告工具，财务或设施团队可能掌握公用事业账单管理，企业能源或采购团队则可能赞助市场情报和合同咨询。采用通常从数据痛点开始——账单割裂、资费不确定、报告截止期或预测不准确——之后才扩展到采购优化或托管服务。这条路径使切换成本和数据信任成为销售动作的核心。
