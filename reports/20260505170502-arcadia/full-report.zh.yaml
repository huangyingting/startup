          description: 公用事业登录复杂，抽取 bug 需要修复。
        - id: r3
          label: ENGIE 集成
          description: 大规模纳入账单支付和咨询运营。
        - id: r4
          label: 法务 / SLA 可见性不足
          description: 法务页面失效，公开合同细节有限。
