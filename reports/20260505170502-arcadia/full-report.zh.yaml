figures:
  - id: FO001
    title: Arcadia 公司里程碑时间线
    type: timeline
    layout: standard
    summary: Arcadia 从社区太阳能起点转向企业能源管理平台的时间线，涵盖融资、平台、剥离、收购和监管里程碑。
    data:
      items:
        - date: '2014'
          label: 成立
          detail: Arcadia 由 Kiran Bhatraju 在 Washington, DC 创立。
          tone: positive
        - date: 2021-09
          label: Series D 轮
          detail: 宣布 $100M 融资；包括此前 Series C-1 在内，累计融资被称为 $180M。
          tone: positive
        - date: 2021-11
          label: Arc 平台发布
          detail: Arc / 开发者平台公开发布，带来 35+ 家先锋客户。
          tone: positive
        - date: 2022-05
