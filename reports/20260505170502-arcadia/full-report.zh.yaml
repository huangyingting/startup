      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >-
              创始人控制仍是核心。当前领导层页面上，Kiran Bhatraju 仍是 CEO 和创始人；公司的公开叙事在融资、战略、企业扩张和 ENGIE Impact
              收购上也继续围绕他展开。公开展示的现任高管团队较精简：Paul Mulé 任 CFO，Barbara Clay 任首席法务官，Udit Garg 任研发高级副总裁。Latitude Media 在 2025 年
              1 月称 Garg 为产品副总裁，说明 Arcadia 深入企业 AI 驱动产品后，他是少数公开可见、职责扩大的高管之一。治理可见度低于领导层可见度。2024 年 Form D 披露了一组较广的董事名单，包括
              Sameer Reddy、Ben Kortlang、Alex Laskey、Jennifer Dulski、Tanya Barnes、John Rettig、Eric Scheyer、Greg Callman 和
              Jeffrey Ubben，但缓存资料没有详细解释委员会职责或董事履历。运营上，Arcadia 仍以 Washington, DC 为锚点，同时支持美国远程办公和印度 Chennai
              办公室。关键人依赖很实质，因为公开记录里，战略、投资者沟通和产品再定位仍高度由创始人牵引。
