  - id: TV006
    title: 最终尽调清单
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 当前估值和股权结构表
        - 最新定价轮、优先股堆叠、稀释和老股交易经济性
        - 估值章节不能只靠公开公司质量下结论。
        - 财务资料室、融资法律文件和董事会材料。
      - - 收入和毛利率桥
        - 当前收入、ARR（如适用）、毛利率和服务收入结构
        - 核心分母仍未在保留证据中出现。
        - CFO 尽调和经审计的管理报告。
      - - 留存和集中度
        - 头部客户敞口、续约队列、流失和扩张率
        - 没有耐久性的规模仍可能被高估。
        - 收入运营队列分析。
      - - ENGIE 整合计分卡
        - 协同目标、重叠项精简和迁移里程碑
        - 交割后复杂度可能改变上行和下行。
        - 整合 PMO 审查和客户通知日志。
      - - 监管和合同地图
        - Connecticut 最终结果、当前各州牌照状态、标准企业 MSA / SLA / DPA 条款
        - 法律噪音和合同结构都会影响估值支撑。
        - 律师审查加监管沟通摘要。
    notes: 剩余问题之所以具体，是因为主要阻碍不是再找更多叙事，而是补齐缺失的估值分母。
