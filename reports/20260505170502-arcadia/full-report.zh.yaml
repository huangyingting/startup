        - 可作为能源服务、项目和经常性管理工作流的参照。
        - 项目和基础设施强度高于 Arcadia 的数据主导模型。
      - - Stem
        - 上市市值和收入
        - 市值 $0.09B；收入 $0.165B；约 0.6x 收入。
        - 凸显执行走弱时，公开市场会如何惩罚能源软件叙事。
        - Stem 的困境和业务结构使其更像警示性下界参照，不是直接同业。
    notes: 该表刻意限于透明上市参照，并明确列出 Arcadia 可见度问题，而不是假装标的有公开倍数。
