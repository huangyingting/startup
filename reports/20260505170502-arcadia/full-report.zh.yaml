    title: 风险传导图
    type: dag
    layout: wide
    summary: Arcadia 的主要风险从监管、连接器和集成，传导到信任、利润率和融资支持。
    data:
      nodes:
        - id: r1
          label: CT 调查
          description: Connecticut 的许可与营销边界不清。
        - id: r2
