      - number: '5.3'
        title: 信任控制、开发者界面与技术缺口
        blocks:
          - type: paragraph
            body: >-
              Arcadia 围绕传输、凭证处理和付款隔离发布了具体安全控制。安全页面称，应用流量强制走 HTTPS 与 TLS 1.2，密码经过哈希和加盐，公用事业凭证用 AWS KMS 加密，付款详情由 Stripe 和
              Plaid 处理，而不是存放在 Arcadia 基础设施上。面向开发者的证据也真实存在：公开 OpenAPI 规范暴露了 access-token 和 Connect-token 流程，npm package
              记录了维护中的 Connect React 封装组件，文档包说明了嵌入式上线中的创建与更新凭证流程。不过，缓存也显示若干披露限制。公开信任中心文本极为稀疏，Nudge Security 提供 SSO
              和合规的第三方徽章，但不能替代一手认证；审阅资料也没有给出详细公开事故档案、SLA
              集合，或超出发布页面和更新日志片段的清晰前瞻路线图。因此，围绕信任验证和路线图精度的尽调仍未完成。对尽调来说，实际结论是：Arcadia
              看起来已能支撑数据密集型工作流落地，但在治理细节上不如大型企业买方可能希望的那样透明。买方能看到开发者上线存在，也能看到安全基础项有文档，但若没有管理层材料，仍无法完全验证服务历史、审计范围，或新收购模块如何在运营上收敛。
