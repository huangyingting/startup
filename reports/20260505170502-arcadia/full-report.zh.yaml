  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 格局：Arcadia 竞争的是一整套堆栈，而不是单一同类厂商
        blocks:
          - type: paragraph
            body: >-
              Arcadia 的竞争格局很碎片化，因为买方可以用多种方式完成同一项任务。Arcadia
              销售的是一个整合工作流，横跨公用事业数据、账单管理、采购和可持续发展报告。因此，最接近的威胁往往不是包装完全相同的另一家供应商。买方可以自己拼出一套单点最优堆栈：用 UtilityAPI 做数据连接，用
              EnergyCAP 做公用事业费用管理，用 Watershed 或 Persefoni 做碳报告，用 LevelTen 做采购市场智能。现状替代方案也重要。Nexamp 及类似社区太阳能或 PPA
              提供商，可以解决清洁能源采购问题的一部分，而无需替换更广泛的财务或报告工作流。Ameresco 和 Itron
              等既有服务平台位于更外一层，但也重要，因为它们掌握计量、基础设施和面向公用事业运营的相邻关系。结果是，Arcadia 只有在买方相信一体化平台的价值超过拼接狭窄专家的灵活性时，才能赢。
