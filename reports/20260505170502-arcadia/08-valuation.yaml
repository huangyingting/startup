        - Residential solar orientation and hardware mix differ materially from Arcadia.
      - - Ameresco
        - Public market cap and revenue
        - Market cap $0.63B; revenue $1.77B; roughly 0.4x revenue.
        - Useful reference for energy-services, project, and recurring management workflows.
        - Project and infrastructure intensity are heavier than Arcadia's data-led model.
      - - Stem
        - Public market cap and revenue
