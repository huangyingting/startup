sections:
  - id: S801
    title: The strategic asset is real, but price support is still missing
    body: >-
      Arcadia has enough public evidence to deserve serious attention. Official 2026 materials say
      the company now serves more than 1,500 enterprise customers, including about a quarter of the
      Fortune 500, and manages nearly $100 billion of utility spend after acquiring ENGIE Impact.
      The acquisition pages also describe a single platform that combines utility-data
      infrastructure, bill payment, energy procurement, and sustainability reporting. FOX and Iron
      Mountain provide named customer proof for reporting and procurement use cases, while Sweep and
      Cority show that Arcadia data is embedded in third-party ESG workflows. Those are not trivial
      signals. They show real enterprise relevance, not a speculative concept. The problem is that
      strategic relevance and investable price are not the same thing. The retained source set still
      does not disclose a current round valuation, revenue base, gross margin, retention profile, or
      cap-table terms. That forces a valuation chapter to separate company quality from price
      confidence rather than pretending the two are already linked.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
      - C006
      - C015
      - C016
      - C017
      - C018
      - C023
      - C024
      - C025
      - C026
      - C043
      - C044
  - id: S802
    title: Comparable framing argues for discipline, not a forced precision mark
    body: >-
      The public comparable set is useful mainly as a transparency check. StockAnalysis pages for
      Itron, Enphase, Ameresco, and Stem all expose current market-cap and revenue pairs, while each
      company also maintains a public SEC-filings portal. Those references differ in business mix,
      but they still show how transparent public energy-tech and utility-software valuation anchors
      look in practice. Arcadia does not yet look like that from public evidence. The subject row in
      the comparable table is intentionally a visibility row, not a fake multiple, because retained
      sources only show financing amounts such as the 2022 $200 million round, the March 2024 Form
      D, and the January 2025 growth financing plus credit facility. Without a current valuation
      mark or revenue denominator, any direct public-multiple bridge for Arcadia would be false
      precision. The right lesson from comps is not that Arcadia is obviously cheap or expensive; it
      is that public evidence is insufficient to say.
    claimRefs:
      - C009
      - C010
      - C011
      - C012
      - C013
      - C014
      - C015
      - C019
      - C032
      - C033
      - C034
      - C035
