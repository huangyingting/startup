company:
  name: Arcadia
chapter:
  number: 8
  title: Valuation
  summary: >-
    Arcadia has enough public evidence to support strategic relevance but not enough to support a
    publishable entry price. The positive case is real: after acquiring ENGIE Impact, Arcadia says
    it serves more than 1,500 enterprise customers, manages nearly $100 billion of utility spend,
    processes $30 billion of annual utility payments, and combines data, bill pay, procurement, and
    sustainability workflows in one platform. The negative case is equally important. Retained
    sources still do not disclose current revenue, margin, retention, concentration, cap-table
    terms, or a current round valuation, while the public comparable set trades at mostly modest
    market-cap-to-revenue ratios. That makes the right recommendation research-more, with medium
    confidence, high risk, and an unknown valuation stance until private diligence closes the
    denominator gap.
