    title: Thesis / anti-thesis table
    columns:
      - argument
      - thesis
      - what would change the view
    rows:
      - - Enterprise scale
        - >-
          Post-ENGIE Arcadia appears large enough to matter: 1,500+ enterprise customers, 25% of the
          Fortune 500, and almost $100B of utility spend under management.
        - >-
          A customer-quality view would improve with actual retention, concentration, and renewal
          data.
      - - Platform breadth
        - >-
          Arcadia now spans utility data, bill payment, energy procurement, and sustainability
          reporting with named customer proof and partner integrations.
        - >-
          If integration slows or product overlap proves messy, platform breadth becomes complexity
          rather than moat.
      - - Market tailwind
        - >-
          Energy volatility, tariff complexity, and reporting requirements create a plausible demand
          tailwind for Arcadia's workflow.
        - >-
          The case weakens if buyers treat Arcadia as a service-heavy bundle rather than
          software-like infrastructure.
      - - Anti-thesis
        - >-
          Public sources still do not disclose current valuation, revenue, gross margin, or
          cap-table economics.
        - >-
          A recent priced round, audited financial bridge, or tighter retention evidence would
          materially improve price support.
      - - Comparable discipline
        - >-
          Transparent public energy-tech and utility-software references trade on mostly modest
          market-cap / revenue ratios.
        - >-
          If Arcadia proves much higher software mix and stronger margins than the public set, the
          premium could be more defensible.
    notes: >-
      The anti-thesis is mostly denominator risk: the asset may be good without the price being
      knowable from public evidence.
