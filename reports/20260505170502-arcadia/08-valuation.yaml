      - C037
      - C038
      - C039
      - C040
      - C041
      - C042
      - C043
      - C044
  - id: S803
    title: 'Recommendation: research-more until disclosure closes the denominator gap'
    body: >-
      Research-more is a disciplined rather than negative recommendation. The retained record
      supports a real bull case: Arcadia has built a broad platform, raised meaningful capital,
      integrated multiple capabilities, and now addresses a market where tariff complexity,
      reporting obligations, and electricity-price volatility are making energy management more
      strategic. At the same time, the retained record also supports a real anti-thesis: current
      valuation is not disclosed, current revenue is not disclosed, gross margin is not disclosed,
      retention is not disclosed, and enterprise contract economics are not disclosed. The
      community-solar messaging drift between company history and the still-live developer page also
      reinforces that the company is in the middle of an identity transition rather than a fully
      stabilized steady state. That does not make the company unattractive. It means the next step
      is targeted private diligence on valuation, economics, concentration, and integration rather
      than an unsupported public call. High-quality assets can still be poor underwriting at the
      wrong price or with too much asymmetry.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C015
      - C016
      - C017
      - C018
      - C020
      - C021
      - C022
      - C043
      - C044
      - C045
  - id: S804
    title: What would change the call fastest is private proof, not more narrative
    body: >-
      A cleaner recommendation would require only a handful of concrete answers. First, what is the
      latest priced valuation and how much of the headline number is affected by preferences,
      secondary terms, or debt? Second, what is the current revenue and margin profile of the
      combined platform, especially after ENGIE Impact? Third, how durable are the enterprise
      customers that make the scale narrative compelling? Fourth, how much of the post-acquisition
      operating model is software-like versus services-heavy? Finally, has the Connecticut issue
      been fully resolved and are current enterprise terms strong enough to preserve trust if
      billing or procurement workflows fail? Those questions are all answerable in diligence, but
      they are not answerable from the retained public cache. That is why the right valuation stance
      stays unknown. The company may be worth paying up for. The public record simply does not yet
      prove how much.
    claimRefs:
      - C012
      - C013
      - C014
      - C020
      - C021
      - C022
      - C043
      - C044
      - C045
