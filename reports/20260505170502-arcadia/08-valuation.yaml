  - id: T805
    title: Thesis-break trigger table
    columns:
      - trigger
      - threshold
      - transmission to thesis
      - action implication
    rows:
      - - Current valuation remains undisclosed while new money is sought
        - A new round or secondary appears without revenue or margin support
        - Price discipline becomes impossible and information asymmetry widens
        - Do not underwrite a premium entry until the denominator is disclosed.
      - - ENGIE integration disrupts contract continuity
        - Renewals or customer notices show pricing, service, or liability friction
        - The platform-breadth thesis turns into integration drag
        - Lower conviction and treat execution risk as structurally higher.
      - - Retention or concentration disappoints
        - Private diligence shows weak renewal quality or whale dependence
        - Enterprise scale stops being proof of durability
        - Re-rate the asset on lower revenue quality and shorter customer duration.
      - - Regulatory issues expand beyond known Connecticut context
        - New state actions, penalties, or licensing questions emerge
        - Legal overhang begins to matter to sales cycles and valuation
        - Pause until regulatory map and remediation costs are clear.
      - - Public comparables stay subdued while Arcadia seeks a premium mark
        - Energy-tech and utility-software peers continue to trade on modest revenue multiples
        - Public-market exit support remains thin for an aggressive private price
        - Demand better terms or wait for cleaner proof.
    notes: These triggers are price and underwriting oriented, not generic operating risks.
