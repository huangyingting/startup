  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: Comparable valuation table coverage
      missingEvidence: >-
        The retained cache does not contain a recent priced Arcadia round, a current subject revenue
        base, or a richer private-secondary comparable set.
      whyItMatters: >-
        The comparable table can bound public transparency, but it cannot produce a clean subject
        multiple without the missing subject denominator.
      diligencePath: >-
        Request the latest financing deck, cap table, and any third-party valuation memo or
        secondary mark.
      relatedQuestionRefs:
        - RQ004
      relatedTableRefs:
        - T804
    - type: private-evidence-only
      severity: blocking
      topic: Current Arcadia valuation
      missingEvidence: >-
        No retained source discloses the current post-money valuation or effective entry terms for
        new capital.
      whyItMatters: >-
        A valuation chapter cannot honestly call a price attractive, fair, or stretched without a
        current price anchor.
      diligencePath: >-
        Obtain the most recent priced round documents, board materials, and any secondary
        transaction summary.
      relatedQuestionRefs:
        - RQ004
      relatedTableRefs: []
    - type: private-evidence-only
      severity: blocking
      topic: Current Arcadia revenue and margin bridge
      missingEvidence: No retained source discloses current revenue, ARR, gross margin, or services mix.
      whyItMatters: >-
        Public comparables are only useful when the subject denominator is visible enough to
        compare.
      diligencePath: Request audited or board-level revenue, margin, and segment-mix reporting.
      relatedQuestionRefs:
        - RQ005
      relatedTableRefs: []
    - type: private-evidence-only
      severity: material
      topic: Retention and concentration quality
      missingEvidence: >-
        Top-customer exposure, renewal cohorts, churn, and expansion rates are absent from the
        retained public record.
      whyItMatters: Scale without durability can still be overvalued, especially after a major acquisition.
      diligencePath: >-
        Run cohort retention and customer-concentration analysis across legacy Arcadia, RPD, and
        ENGIE Impact books.
      relatedQuestionRefs:
        - RQ025
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Post-ENGIE integration scorecard
      missingEvidence: >-
        The retained sources describe scale and continuity promises but not synergy realization,
        overlap rationalization, or migration progress.
      whyItMatters: The quality of the combined platform affects both upside and downside valuation outcomes.
      diligencePath: >-
        Review integration PMO materials, customer notices, overlap analysis, and first-renewal
        retention metrics.
      relatedQuestionRefs:
        - RQ026
      relatedTableRefs: []
    - type: private-evidence-only
      severity: blocking
      topic: Final recommendation upgrade path
      missingEvidence: >-
        The retained public record does not close the gaps on valuation, cap table, economics,
        retention, and integration that would justify a stronger recommendation.
      whyItMatters: >-
        Without those facts, a buy-style recommendation would be narrative-led rather than
        evidence-led.
      diligencePath: >-
        Complete targeted finance, legal, customer, and integration diligence before revisiting the
        recommendation.
      relatedQuestionRefs:
        - RQ030
      relatedTableRefs: []
