evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Current headcount disclosure
    missingEvidence: No cached source gives a current employee count for Arcadia or the combined company.
    whyItMatters: Headcount is a key scale and cost proxy for diligence and affects productivity and integration assumptions.
    diligencePath: Request HR roll-forward, current org chart, and post-acquisition employee census by function and geography.
    relatedQuestionRefs:
      - QO022
    relatedTableRefs: []
  - type: conflicting-data
    severity: material
    topic: 2024-2025 financing terms and exact capital stack
    missingEvidence: >-
      The cache shows a 2024 Form D filing and a later media description of roughly $50M growth financing plus a $30M
      credit facility, but not a single authoritative current cap-table summary.
    whyItMatters: Exact financing terms affect ownership dilution, debt burden, and acquisition-era liquidity assumptions.
    diligencePath: >-
      Request cap table, debt agreements, warrant schedules, and management commentary tying the 2024 filing to the
      later growth-financing description.
    relatedQuestionRefs:
      - QO023
    relatedTableRefs:
      - TO001
      - TO003
  - type: missing-source
    severity: material
    topic: Disposition of Connecticut regulatory investigation
    missingEvidence: >-
      Cached regulatory sources show the petition and docket process but not the final disposition, penalties, or
      settlement terms.
    whyItMatters: Unresolved regulatory legacy issues can create reputational, legal, and customer-acquisition drag.
    diligencePath: >-
      Pull the full PURA docket, final decision database entries, settlement documents, and company correspondence after
      March 2024.
    relatedQuestionRefs:
      - QO024
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: minor
    topic: Director biographies and committee structure
    missingEvidence: >-
      The Form D surfaces names, but the cache does not include full public biographies or committee assignments for all
      directors.
    whyItMatters: >-
      Board quality and committee coverage affect governance diligence, especially through a major acquisition
      integration.
    diligencePath: Request board materials, committee charters, investor updates, or an updated corporate governance page.
    relatedQuestionRefs:
      - QO025
    relatedTableRefs:
      - TO002
  - type: access-blocked
    severity: minor
    topic: Consumer-review surfaces for legacy Arcadia Power
    missingEvidence: BBB and Trustpilot pages in cache were blocked or verification-gated, preventing direct review extraction.
    whyItMatters: >-
      Legacy customer-service complaints could help quantify how much of the Connecticut issue was isolated versus
      systemic.
    diligencePath: >-
      Re-fetch consumer-review pages with live browser access or obtain customer support complaint summaries directly
      from management.
    relatedQuestionRefs:
      - QO024
    relatedTableRefs: []
  - type: missing-source
    severity: material
    topic: Third-party TAM or SAM for enterprise energy management software
    missingEvidence: >-
      No cached third-party analyst source cleanly quantifies the full Arcadia category across bill management,
      procurement, reporting, and utility-data infrastructure.
    whyItMatters: Without an external TAM, market-share claims and valuation benchmarks rely heavily on company-scale proxies.
    diligencePath: >-
      Obtain an analyst market report or public-company category mapping that isolates enterprise energy-management
      software and managed-services spend.
    relatedQuestionRefs:
      - QM022
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: Arcadia pricing and conversion data
    missingEvidence: The cache does not expose enterprise pricing, contract sizes, win rates, or pilot-to-production conversion data.
    whyItMatters: Pricing and conversion are required to move from workflow demand evidence to realistic SOM and revenue build-ups.
    diligencePath: >-
      Request pricing sheets, sample statements of work, pipeline stage definitions, and cohort conversion metrics by
      product line.
    relatedQuestionRefs:
      - QM023
      - QM024
    relatedTableRefs:
      - TM003
      - TM004
  - type: conflicting-data
    severity: minor
    topic: Scope boundaries across adjacent categories
    missingEvidence: >-
      Public sources mix current Arcadia enterprise workflows with historical community-solar positioning and adjacent
      substitute categories, but no external taxonomy resolves the boundaries cleanly.
    whyItMatters: Category drift can overstate or understate both competitive set and addressable market size.
    diligencePath: >-
      Force management to map current revenue and customer count by workflow: data infrastructure, bill management,
      procurement, reporting, and residual community-solar economics.
    relatedQuestionRefs:
      - QM025
    relatedTableRefs:
      - TM001
      - TM002
  - type: enumeration-incomplete
    severity: minor
    topic: Planned market estimate range figure substituted with tabular sizing lenses
    missingEvidence: >-
      Cached sources do not provide a consistent low/base/high range for one single market quantity such as TAM or
      penetration; available figures mix spend, account coverage, and compliance counts.
    whyItMatters: A forced range figure would imply a level of precision the sources do not support.
    diligencePath: >-
      If a clean external TAM source becomes available, replace the substitution with a range figure using one
      consistent unit.
    relatedQuestionRefs:
      - QM022
    relatedTableRefs:
      - TM002
  - type: private-evidence-only
    severity: material
    topic: Exact enterprise pricing
    missingEvidence: >-
      Cached public sources do not provide durable enterprise dollar pricing or discount schedules for Arcadia and most
      direct peers.
    whyItMatters: Pricing opacity limits direct price-to-value comparison and makes payback assumptions fragile.
    diligencePath: Request current pricing sheets, standard MSAs, recent discount waterfalls, and realized ACV by product line.
    relatedQuestionRefs:
      - QP023
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Retention and expansion evidence
    missingEvidence: >-
      Cached public sources do not disclose Arcadia win rates, retention, cohort expansion, or cross-sell attach rates
      versus specialist competitors.
    whyItMatters: Without expansion evidence, workflow breadth could still mask weak moat durability.
    diligencePath: Request logo-cohort expansion, module attach, renewal, and competitive-displacement data by segment.
    relatedQuestionRefs:
      - QP024
    relatedTableRefs: []
  - type: missing-source
    severity: minor
    topic: Full entrant enumeration
    missingEvidence: >-
      The retained set is broad but not exhaustive for every possible likely entrant across utilities, consultants,
      marketplace operators, and reporting vendors.
    whyItMatters: A non-exhaustive entrant list is acceptable for chapter analysis but limits long-tail threat mapping.
    diligencePath: >-
      Expand the entrant sweep with additional cached or newly fetched category-specific searches if a later diligence
      phase requires it.
    relatedQuestionRefs:
      - QP025
    relatedTableRefs: []
  - type: private-evidence-only
    severity: blocking
    topic: Current revenue and margins
    missingEvidence: Cached public sources do not disclose current revenue, ARR, gross margin, or stream-level mix for Arcadia.
    whyItMatters: Without current revenue and margin denominators, valuation and unit-economics analysis remain incomplete.
    diligencePath: Request monthly or quarterly revenue, ARR, gross margin, and stream mix for at least the last eight quarters.
    relatedQuestionRefs:
      - QI023
    relatedTableRefs: []
  - type: private-evidence-only
    severity: blocking
    topic: Cash, burn, runway, and debt package
    missingEvidence: Cached public sources do not disclose current cash, burn, runway, or debt-covenant package.
    whyItMatters: Historical fundraising is not enough to underwrite present capital adequacy.
    diligencePath: >-
      Request current treasury position, monthly burn, runway cases, debt documents, and any payment-processing
      liabilities.
    relatedQuestionRefs:
      - QI024
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Enterprise price sheets and realized pricing
    missingEvidence: >-
      Cached public sources show contract motion and packaging cues but not list prices, discount waterfalls, or
      realized take rates.
    whyItMatters: Pricing power and payback cannot be tested from demo pages alone.
    diligencePath: >-
      Request price sheets, recent quotes, realized ACV, minimum commitments, and standard discount patterns by product
      line.
    relatedQuestionRefs:
      - QI025
    relatedTableRefs: []
  - type: missing-source
    severity: material
    topic: Arcadia-specific attestations and trust-center depth
    missingEvidence: >-
      The cached trust center does not expose audit reports, certificate scopes, incident history, or uptime
      commitments.
    whyItMatters: >-
      Enterprise buyers will want direct proof that controls described on the security page map to audited Arcadia
      products, not only to shared infrastructure or third-party vendor badges.
    diligencePath: >-
      Request current SOC 2 / ISO reports, control-scope mapping by product, and the live customer trust portal contents
      including incident-history retention.
    relatedQuestionRefs:
      - QE015
      - QE021
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Roadmap precision beyond release notes
    missingEvidence: >-
      Public sources show launch milestones and changelog entries but not a dated roadmap, planned module sequence, or
      committed customer-delivery milestones.
    whyItMatters: >-
      Product roadmap clarity affects underwriting of implementation risk, feature-gap risk, and how much of the
      enterprise platform is mature versus recently assembled through acquisition.
    diligencePath: >-
      Ask management for a product roadmap with module owners, customer rollout timing, dependency assumptions, and
      evidence of recently shipped enterprise features.
    relatedQuestionRefs:
      - QE025
    relatedTableRefs: []
  - type: conflicting-data
    severity: minor
    topic: Public coverage metrics vary by surface
