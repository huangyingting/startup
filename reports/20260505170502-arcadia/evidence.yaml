    severity: material
    topic: Retention and concentration quality
    missingEvidence: Top-customer exposure, renewal cohorts, churn, and expansion rates are absent from the retained public record.
    whyItMatters: Scale without durability can still be overvalued, especially after a major acquisition.
    diligencePath: Run cohort retention and customer-concentration analysis across legacy Arcadia, RPD, and ENGIE Impact books.
