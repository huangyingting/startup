    diligencePath: Obtain the most recent priced round documents, board materials, and any secondary transaction summary.
    relatedQuestionRefs:
      - RQ004
    relatedTableRefs: []
  - type: private-evidence-only
    severity: blocking
    topic: Current Arcadia revenue and margin bridge
    missingEvidence: No retained source discloses current revenue, ARR, gross margin, or services mix.
    whyItMatters: Public comparables are only useful when the subject denominator is visible enough to compare.
    diligencePath: Request audited or board-level revenue, margin, and segment-mix reporting.
    relatedQuestionRefs:
