- id: leadership-governance
  title: Founders, Leadership, and Governance
  body: 'Founder control remains central. Kiran Bhatraju is still the CEO and founder on the current leadership page, and the company''s public storytelling continues to route through him on fundraising, strategy, enterprise expansion, and the ENGIE Impact acquisition. The current executive bench shown publicly is concise: Paul Mulé is CFO, Barbara Clay is Chief Legal Officer, and Udit Garg is SVP of R&D. Latitude Media identified Garg as VP of product in January 2025, suggesting he is one of the few executives whose role has visibly expanded as Arcadia moved deeper into enterprise AI-driven products. Governance visibility is thinner than leadership visibility. The 2024 Form D exposes a broad director set including Sameer Reddy, Ben Kortlang, Alex Laskey, Jennifer Dulski, Tanya Barnes, John Rettig, Eric Scheyer, Greg Callman, and Jeffrey Ubben, but cached sources do not explain committee responsibilities or board biographies in detail. Operationally, Arcadia still anchors itself to Washington,
    DC while supporting U.S. remote work and a Chennai office in India. Key-person dependence is material because strategy, investor communication, and product repositioning remain highly founder-led in the public record.'
  claimRefs:
  - C006
  - C007
  - C008
  - C009
  - C010
  - C011
  - C024
- id: capital-stakeholders
  title: Funding History, Investors, and Capital Structure
  body: 'Public funding evidence is good enough to establish a chronology, but not good enough to reconstruct an exact fully diluted cap table. Arcadia''s September 2021 Series D press release said the company raised $100 million and, including a previously undisclosed $21 million Series C-1, had raised $180 million in total. The May 2022 company blog then announced a $200 million financing round led by J.P. Morgan Asset Management. A March 2024 exempt-offering filing shows another financing event, and Latitude Media later described that period as roughly $50 million of growth financing plus a $30 million credit facility from J.P. Morgan and TriplePoint Capital. By May 2026, Arcadia''s acquisition microsite said the company was backed by Macquarie Asset Management and JP Morgan Asset Management, while the ENGIE Impact transaction itself was advised by J.P. Morgan Securities. The most important strategic stakeholder shift is not just another investor round: Arcadia folded in ENGIE Impact''s
    bill-management, procurement, and sustainability operation, giving the platform a larger operational base than pure software peers. That said, current ownership percentages, valuation, secondary activity, covenant terms, and exact debt economics are not public in the cache.'
  claimRefs:
  - C012
  - C013
  - C014
  - C015
  - C016
  - C017
  - C020
- id: scale-milestones-risks
  title: Scale, Milestones, and Visible Risks
  body: 'Arcadia''s scale claims became much larger after the ENGIE Impact deal. Current public pages cite 1,500+ enterprise customers, about a quarter of the Fortune 500, nearly $100 billion in utility spend under management, 4.5 million meters, and a platform that reaches thousands of providers and millions of connected accounts. Even before the 2026 acquisition, enterprise and developer signals suggested meaningful distribution: Arcadia said Arc APIs served dozens of customers in 2021 and more than 100 innovators by 2022, while enterprise pages later cited 2 million connected accounts and near-national tariff coverage. The company has also used customer and partner case studies to demonstrate real operational use, from Google and EDPR''s synthetic community-solar structure to current enterprise workflows across billing, procurement, and ESG reporting. The main publicly visible adverse item is legacy-regulatory risk: Connecticut''s PURA opened a 2024 investigation into Arcadia Power over
    possible licensing and customer-service violations tied to older offerings. Cached sources confirm the petition and docket process, but not the ultimate resolution. Separately, revenue, ARR, and headcount remain private, which limits underwriting confidence despite clear platform-scale claims.'
