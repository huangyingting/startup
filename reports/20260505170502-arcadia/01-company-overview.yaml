callouts:
  - calloutType: strength
    title: Arcadia has crossed from product story to operating-scale platform story
    body: >-
      The combination of 1,500+ enterprise customers, nearly $100B of managed spend, millions of connected accounts and
      meters, and a larger bill-management/procurement operation after ENGIE Impact gives Arcadia a materially different
      profile from a narrow climate-software startup.
    claimRefs:
      - CO019
      - CO020
      - CO023
  - calloutType: risk
    title: Legacy Arcadia Power regulatory overhang is still unresolved in cached public sources
    body: >-
      The Connecticut PURA petition and trade reporting confirm a 2024 investigation into licensing and customer-service
      conduct tied to Arcadia Power. The cache shows the petition and docket mechanics, but not a final resolution,
      remedy, or penalty outcome.
    claimRefs:
      - CO036
      - CO037
  - calloutType: assumption
    title: Financial underwriting remains constrained by private-company disclosure gaps
    body: >-
      Arcadia publishes meaningful operating-scale metrics but not current revenue, ARR, gross margin, or headcount. Any
      underwriting case still requires management disclosure or data-room support on commercial performance and unit
      economics.
    claimRefs:
      - CO038
      - CO039
