company:
  name: Arcadia
chapter:
  number: 1
  title: Company Overview
  summary: 'Arcadia is a Washington, DC-founded energy intelligence platform that has evolved from Arcadia Power''s community solar roots into a data, payments, procurement, and sustainability platform for enterprises. Public sources show a step-change in scale after acquisitions of Genability, Urjanet, and ENGIE Impact: Arcadia now cites 1,500+ enterprise customers, ~25% of the Fortune 500, nearly $100B in managed utility spend, and millions of connected accounts and meters. Disclosed capital includes the 2021 $100M Series D, 2022 $200M Series E, a 2024 exempt offering, and a reported 2024-2025 credit facility, but exact current revenue and headcount remain private. The main adverse issue visible in cache is a 2024 Connecticut regulatory investigation tied to legacy Arcadia Power practices.'
sections:
- id: identity-business-model
  title: Identity, Platform, and Business Model
  body: 'Arcadia describes itself in 2026 as an energy intelligence platform for businesses, not a consumer clean-energy subscription app. The current front door is built around one integrated proposition: enterprises can use Arcadia to pay utility bills, buy energy, and advance sustainability across their portfolios. The platform layer underneath that promise is a combination of Plug for utility bill and interval data, Signal for tariff intelligence, and Switch for solar and storage analysis, plus bulk-data tools such as DataHub and Connect-based developer workflows. This current positioning is materially different from the company''s earlier Arcadia Power identity, which centered on community solar enrollment and residential clean-energy access. Public sources show that Arcadia still uses its community-solar heritage as proof of operating experience, but the company history page now explicitly says community solar became a separate Perch Energy venture in March 2025 and is no longer an
    Arcadia offering. The business model has therefore shifted toward enterprise software, managed services, and advisory workflows that monetize data access, tariff modeling, bill management, procurement, and sustainability reporting rather than only consumer energy-switching products.'
  claimRefs:
  - C001
  - C002
  - C003
  - C004
