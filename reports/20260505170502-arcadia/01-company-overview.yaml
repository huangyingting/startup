company:
  name: Arcadia
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Arcadia is a Washington, DC-founded energy intelligence platform that has evolved from Arcadia Power's community
    solar roots into a data, payments, procurement, and sustainability platform for enterprises. Public sources show a
    step-change in scale after acquisitions of Genability, Urjanet, and ENGIE Impact: Arcadia now cites 1,500+
    enterprise customers, ~25% of the Fortune 500, nearly $100B in managed utility spend, and millions of connected
    accounts and meters. Disclosed capital includes the 2021 $100M Series D, 2022 $200M Series E, a 2024 exempt
    offering, and a reported 2024-2025 credit facility, but exact current revenue and headcount remain private. The main
    adverse issue visible in cache is a 2024 Connecticut regulatory investigation tied to legacy Arcadia Power
    practices.
sections:
  - id: identity-business-model
    title: Identity, Platform, and Business Model
    body: >-
      Arcadia describes itself in 2026 as an energy intelligence platform for businesses, not a consumer clean-energy
      subscription app. The current front door is built around one integrated proposition: enterprises can use Arcadia
      to pay utility bills, buy energy, and advance sustainability across their portfolios. The platform layer
      underneath that promise is a combination of Plug for utility bill and interval data, Signal for tariff
      intelligence, and Switch for solar and storage analysis, plus bulk-data tools such as DataHub and Connect-based
      developer workflows. This current positioning is materially different from the company's earlier Arcadia Power
      identity, which centered on community solar enrollment and residential clean-energy access. Public sources show
      that Arcadia still uses its community-solar heritage as proof of operating experience, but the company history
      page now explicitly says community solar became a separate Perch Energy venture in March 2025 and is no longer an
      Arcadia offering. The business model has therefore shifted toward enterprise software, managed services, and
      advisory workflows that monetize data access, tariff modeling, bill management, procurement, and sustainability
      reporting rather than only consumer energy-switching products.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO018
      - CO027
      - CO028
      - CO031
      - CO032
      - CO033
    tableRefs:
      - TO004
    figureRefs:
      - FO001
      - FO002
  - id: leadership-governance
    title: Founders, Leadership, and Governance
    body: >-
      Founder control remains central. Kiran Bhatraju is still the CEO and founder on the current leadership page, and
      the company's public storytelling continues to route through him on fundraising, strategy, enterprise expansion,
      and the ENGIE Impact acquisition. The current executive bench shown publicly is concise: Paul Mulé is CFO, Barbara
      Clay is Chief Legal Officer, and Udit Garg is SVP of R&D. Latitude Media identified Garg as VP of product in
      January 2025, suggesting he is one of the few executives whose role has visibly expanded as Arcadia moved deeper
      into enterprise AI-driven products. Governance visibility is thinner than leadership visibility. The 2024 Form D
      exposes a broad director set including Sameer Reddy, Ben Kortlang, Alex Laskey, Jennifer Dulski, Tanya Barnes,
      John Rettig, Eric Scheyer, Greg Callman, and Jeffrey Ubben, but cached sources do not explain committee
      responsibilities or board biographies in detail. Operationally, Arcadia still anchors itself to Washington, DC
      while supporting U.S. remote work and a Chennai office in India. Key-person dependence is material because
      strategy, investor communication, and product repositioning remain highly founder-led in the public record.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO024
    tableRefs:
      - TO002
  - id: capital-stakeholders
    title: Funding History, Investors, and Capital Structure
    body: >-
      Public funding evidence is good enough to establish a chronology, but not good enough to reconstruct an exact
      fully diluted cap table. Arcadia's September 2021 Series D press release said the company raised $100 million and,
      including a previously undisclosed $21 million Series C-1, had raised $180 million in total. The May 2022 company
      blog then announced a $200 million financing round led by J.P. Morgan Asset Management. A March 2024
      exempt-offering filing shows another financing event, and Latitude Media later described that period as roughly
      $50 million of growth financing plus a $30 million credit facility from J.P. Morgan and TriplePoint Capital. By
      May 2026, Arcadia's acquisition microsite said the company was backed by Macquarie Asset Management and JP Morgan
      Asset Management, while the ENGIE Impact transaction itself was advised by J.P. Morgan Securities. The most
      important strategic stakeholder shift is not just another investor round: Arcadia folded in ENGIE Impact's
      bill-management, procurement, and sustainability operation, giving the platform a larger operational base than
      pure software peers. That said, current ownership percentages, valuation, secondary activity, covenant terms, and
      exact debt economics are not public in the cache.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO020
    tableRefs:
      - TO003
  - id: scale-milestones-risks
    title: Scale, Milestones, and Visible Risks
    body: >-
      Arcadia's scale claims became much larger after the ENGIE Impact deal. Current public pages cite 1,500+ enterprise
      customers, about a quarter of the Fortune 500, nearly $100 billion in utility spend under management, 4.5 million
      meters, and a platform that reaches thousands of providers and millions of connected accounts. Even before the
      2026 acquisition, enterprise and developer signals suggested meaningful distribution: Arcadia said Arc APIs served
      dozens of customers in 2021 and more than 100 innovators by 2022, while enterprise pages later cited 2 million
      connected accounts and near-national tariff coverage. The company has also used customer and partner case studies
      to demonstrate real operational use, from Google and EDPR's synthetic community-solar structure to current
      enterprise workflows across billing, procurement, and ESG reporting. The main publicly visible adverse item is
      legacy-regulatory risk: Connecticut's PURA opened a 2024 investigation into Arcadia Power over possible licensing
      and customer-service violations tied to older offerings. Cached sources confirm the petition and docket process,
      but not the ultimate resolution. Separately, revenue, ARR, and headcount remain private, which limits underwriting
      confidence despite clear platform-scale claims.
    claimRefs:
      - CO017
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
      - CO029
      - CO030
      - CO034
      - CO036
      - CO037
      - CO038
      - CO039
      - CO040
