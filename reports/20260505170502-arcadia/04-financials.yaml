          tone: warning
      edges:
        - from: u1
          to: u2
          label: enable service
        - from: u2
          to: u3
          label: reduce labor
        - from: u3
          to: u4
          label: improve ROI
        - from: u4
          to: u5
          label: convert to revenue
    approximationNotes: >-
