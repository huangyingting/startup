            - label: low
              tone: neutral
              detail: Mostly operating expense rather than inventory
            - label: medium
              tone: neutral
              detail: Coverage and maintenance are visible, dollars are not
            - label: Margin depends on operational efficiency
              tone: warning
              detail: Gross margin cannot be assumed software-like
        - label: Bill pay / payment workflows
          values:
            - label: medium
              tone: neutral
              detail: Workflow and payment infrastructure required
            - label: medium
              tone: warning
              detail: Payment timing and error recovery can create cash complexity
            - label: low
              tone: warning
              detail: Public throughput exists, fee economics do not
            - label: Take-rate and liability diligence required
              tone: warning
              detail: Volume alone is not revenue
        - label: Procurement advisory
          values:
            - label: medium
              tone: neutral
              detail: Requires market expertise and contract execution support
            - label: low
              tone: neutral
              detail: Less inventory-like, more labor-intensive
            - label: low
              tone: warning
              detail: Public pages show mechanism, not margin
            - label: Services mix may pressure blended margins
              tone: warning
              detail: Need project-level economics
        - label: Partner ecosystem / integrations
          values:
            - label: medium
              tone: neutral
              detail: Integration and partner-management costs exist
            - label: low
              tone: neutral
              detail: Mostly shared economics rather than working capital
            - label: medium
              tone: neutral
              detail: Partners are visible, rev-share terms are not
            - label: Channel economics need verification
              tone: warning
              detail: Could lower CAC but share gross profit
        - label: ENGIE integration
          values:
            - label: high
              tone: warning
              detail: Operational integration and services inheritance likely require investment
            - label: medium
              tone: warning
              detail: Integration costs and service continuity can absorb cash
            - label: low
              tone: warning
              detail: Scale is public, integration economics are not
            - label: Post-close margin and runway need management support
              tone: warning
              detail: Current cash position is still unknown
    approximationNotes: >-
      Matrix values are ordinal judgments derived from the retained evidence set and indicate financial exposure, not
      reported management metrics.
    claimRefs:
      - CI015
      - CI019
      - CI023
      - CI037
      - CI038
      - CI039
      - CI040
