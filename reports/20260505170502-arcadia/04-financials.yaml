callouts:
  - calloutType: insight
    title: Arcadia has a real business model, not just a product narrative
    body: >-
      The retained sources support multiple revenue surfaces across data delivery, bill operations, procurement, and
      reporting. The main gap is not business-model existence; it is revenue and margin disclosure.
    claimRefs:
      - CI001
      - CI018
      - CI032
      - CI037
  - calloutType: risk
    title: The biggest financial risk is opacity, not lack of scale
    body: >-
      Arcadia looks materially scaled, but the cache still does not disclose current revenue, gross margin, or runway.
      That makes price-to-value and capital-adequacy judgments provisional.
    claimRefs:
      - CI015
      - CI022
      - CI036
      - CI039
      - CI040
  - calloutType: assumption
    title: This chapter assumes workflow breadth creates monetization depth
    body: >-
      Public sources show land-and-expand logic from data into bill management, procurement, and reporting. The missing
      proof is the conversion rate from one workflow to the next.
    claimRefs:
      - CI001
      - CI003
      - CI004
      - CI037
      - CI041
