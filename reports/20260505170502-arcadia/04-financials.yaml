          label: Provider maintenance cost
          detail: Coverage, extraction fixes, MFA handling, and data normalization require continuous operating work.
          tone: warning
        - id: u2
          label: Customer data delivery
          detail: APIs, data shares, and automated ingestion reduce customer manual effort.
          tone: neutral
        - id: u3
          label: Workflow savings
          detail: Customers cite faster analysis, lower overhead, and earlier anomaly detection.
          tone: positive
        - id: u4
          label: Higher-value decisions
          detail: Tariff analysis, proposal generation, reporting, and procurement improve with better data.
          tone: positive
        - id: u5
