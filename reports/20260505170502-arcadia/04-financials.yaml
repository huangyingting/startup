schemaVersion: report-v2
artifact: financials
slug: arcadia
runDate: '2026-05-05'
company:
  name: Arcadia
chapter:
  number: 4
  title: Financials
  summary: >-
    Arcadia clearly has multiple monetization surfaces: utility bill management, procurement advisory, sustainability
    reporting, and utility-data products such as APIs and DataHub. Public sources also support real operating scale,
    from millions of utility bills and accounts to post-ENGIE payment throughput and broad provider coverage. The
    problem is not the absence of a business model; it is the absence of underwriting denominators. The cache does not
    disclose current revenue, ARR, gross margin, burn, runway, or realized pricing, so the honest financial conclusion
    is that Arcadia looks commercially meaningful but still under-documented for precise underwriting.
sections:
  - id: revenue-model
    title: 'Revenue model: multiple monetization surfaces are visible even though prices are not'
    body: >-
      Arcadia's public materials support a broader revenue model than a single SaaS subscription. The core enterprise
      suite has three named solution lines: utility bill management, energy procurement advisory, and sustainability
      reporting. Underneath those sits a separate data and platform layer. The Data Model, API Quick Start, and older
      Arc launch materials all show Arcadia selling developer and data-access capabilities, not just managed services.
      That matters because it means revenue can come from software and data access, workflow automation, partner
      integrations, and higher-touch procurement or payment operations. The cache is strongest on mechanism, not
      pricing. Arcadia describes automated bill capture, payment processing, tariff optimization, forecasting, reporting
      integrations, and structured energy procurement, but it does not publish enterprise price sheets. That pushes the
      analysis toward contract structure and revenue quality rather than headline ACV. Financially, the visible model is
      a hybrid: recurring platform revenue seems plausible, but procurement and payments clearly add service and
      operating components that make the business more complex than pure seat-based software.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI018
      - CI032
      - CI037
  - id: go-to-market-and-efficiency
    title: Go-to-market and sales-efficiency proxies point to value-based selling around time, labor, and risk reduction
    body: >-
      The retained evidence implies Arcadia sells on avoided friction more than on feature novelty. Customer stories
      repeatedly describe the same buying logic: manual utility data collection is expensive, inaccurate, or too slow,
      and Arcadia shortens the time to useful action. Fusebox said Arcadia cut its bill-analysis cycle by up to two
      weeks and let the company scale without adding much personnel cost. Verse said building utility-data capability
      internally would have been expensive and time-consuming, so Arcadia accelerated product launch. Subcontractor Hub
      said Arcadia helps complete solar and storage proposals in minutes. Stable Auto used Arcadia tariff data to
      support ROI forecasting for EV charging deployments that can require roughly $1M of capital at a single site.
      Those examples are not CAC or payback disclosures, but they are useful proxies: Arcadia sells speed, labor
      leverage, and decision quality. The partner channel matters too. Cority and PR Newswire both describe Arcadia as
      an ecosystem player with integrations and hundreds of service providers, implying that some growth may come
      through channel relationships rather than pure direct field sales.
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
      - CI013
      - CI022
      - CI023
      - CI041
      - CI042
  - id: cost-structure-and-traction
    title: Cost structure looks operationally real, and traction is public, but unit economics are still mostly private
    body: >-
      Arcadia's cost base is unlikely to look like pure software. The company maintains a normalized energy-data
      foundation across thousands of sources, 50-plus countries, tens of thousands of tariffs, and a large share of U.S.
      AMI meters. The changelog confirms that provider additions, extraction fixes, token storage, MFA workarounds, and
      capture-reliability updates are ongoing operating work, not a one-time build. Arcadia also discloses payment
      handling, security controls, and partner integrations, all of which imply continuing infrastructure and compliance
      expense. Traction is easier to observe than margin. Recent sources say Arcadia now processes more than $30B in
      annual utility payments and millions of utility bills, while partner and customer proof references three
      million-plus utility accounts, 9,500 providers, and 95% U.S. account coverage. Historical sources show 35-plus API
      customers, 700,000 onboarded utility accounts, and $470M of residential payment throughput as early as 2021. Those
      numbers confirm that the business is materially scaled, but they still do not reveal realized pricing, gross
      margin, services mix, or retention quality.
    claimRefs:
      - CI005
      - CI014
      - CI015
      - CI016
      - CI017
      - CI019
      - CI022
      - CI035
      - CI038
  - id: capital-adequacy-and-verdict
    title: Capital adequacy is directionally positive, but current cash and margin data are missing
    body: >-
      Arcadia is not obviously capital-starved in historical terms. Public sources support at least three disclosed
      financing anchors: the 2021 Series D and related total-raised figure, the 2022 $200M financing, and the 2024 Form
      D showing $45.6M sold against a $49.1M offering. Taken together, those filings and company announcements create a
      disclosed financing floor above $425M. That is meaningful for a company still expanding platform coverage and
      integrating ENGIE Impact. Even so, historical capital raised is not the same as present adequacy. The cache does
      not disclose today's cash balance, monthly burn, debt covenants, or runway. Nor does it break out how much of
      Arcadia's business now behaves like recurring data software versus services-heavy payment and procurement
      operations. The honest financial verdict is therefore mixed. Arcadia appears to have multiple monetization paths
      and real operating scale, but current underwriting still hinges on management disclosure of revenue mix, gross
      margin, and treasury position.
    claimRefs:
      - CI020
      - CI021
      - CI033
      - CI034
      - CI036
      - CI039
      - CI040
tables:
  - id: TI001
    title: Revenue streams table
    columns:
      - Stream
      - Mechanism
      - Unit
      - Current value / status
      - Quality
      - Diligence ask
    rows:
      - - Utility bill management
        - Automate bill capture, validation, payment, audit, tariff optimization, and forecasting
        - Portfolio, site, account, bill, or payment flow
        - Active public product line
        - medium
        - Request pricing metric, gross margin, and average implementation effort by cohort
      - - Energy procurement advisory
        - Evaluate, structure, and execute supply agreements and partner-led energy sourcing
        - Contract, site portfolio, or advisory engagement
        - Active public product line
        - medium
        - Request fee model, revenue-recognition treatment, and services gross margin
      - - Sustainability reporting data workflows
        - Automate Scope 1/2 utility data collection and feed standardized data into reporting platforms
        - Reporting entity, location set, or data subscription
        - Active public product line
        - medium
        - Request ARR mix, implementation scope, and attach rate to reporting partners
      - - API / developer access
        - Tokenized API workflows for statement and interval collection and developer integration
        - Developer org, application, credential, or usage tier
        - Public technical product surface
        - medium
        - Request pricing basis, usage caps, and support burden per customer
      - - Bulk DataHub delivery
        - Provide normalized reports through SFTP CSV delivery or Snowflake Direct Share
        - Dataset, table, site portfolio, or data-share contract
        - Public technical product surface
        - medium
        - Request pricing model, data-refresh SLAs, and average expansion path per account
    notes: >-
      Public sources support multiple monetization surfaces. They do not support public enterprise dollar pricing or a
      precise revenue mix by stream.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI018
      - CI037
  - id: TI002
    title: Pricing / monetization table
    columns:
      - Offer
      - Price / unit / contract
      - List vs realized pricing
      - Discounts / unknowns
      - Source
      - Implication
    rows:
      - - Enterprise Solutions suite
        - Request-demo enterprise contracting; no public dollar rate
        - List pricing not public; realized pricing unknown
        - Discounts, minimums, and contract length not disclosed
        - Arcadia solutions pages
        - Pricing analysis must focus on mechanism and value proof, not rate cards
      - - Utility Bill Management
        - Likely portfolio, bill-flow, or managed-service contract; public dollars absent
        - No public list price
        - Unknown implementation fees and payment economics
        - Utility Bill Management page
        - Could contain both software and operating-service revenue
      - - Procurement Advisory
        - Likely project, advisory, or contract-based economics; public dollars absent
        - No public list price
        - Unknown fee share, supplier economics, and success fees
        - Procurement Advisory page
        - High-touch revenue likely carries different margin than data products
      - - Sustainability Reporting
        - Likely enterprise contract tied to data automation and integration scope; public dollars absent
        - No public list price
        - Unknown partner revenue-share and reporting-seat logic
        - Sustainability Reporting page
        - Could be stickier than procurement if embedded in compliance workflows
      - - API / DataHub
        - Public technical docs exist, but no public enterprise dollar pricing is visible
        - No public list price
        - Unknown usage tiers, overage logic, and support bundle
        - API Quick Start + DataHub / docs surface
        - Data products may be recurring, but monetization detail is still private
    notes: >-
      The cache shows how Arcadia likely charges, but not how much. That is enough for model shape, not for ACV
      calibration.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI018
      - CI029
      - CI036
  - id: TI003
    title: Unit economics table
    columns:
      - Metric
      - Value / public proxy
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Connected accounts / utility accounts
        - 2M+ connected accounts on enterprise page; 3M+ utility accounts in Cority partner proof
        - medium
        - Scale proxy for data footprint and potential recurring revenue base
        - Reconcile current billable accounts, paid accounts, and partner-routed accounts
      - - Payment throughput
        - More than $30B annual utility payments after ENGIE Impact
        - medium
        - Suggests large operational volume but not margin or fee take-rate
        - Request payment-fee economics, float handling, and bad-debt exposure
      - - Historical API traction
        - 35+ pioneering Arc API customers in 2021
        - medium
        - Shows developer product demand before current enterprise repositioning
        - Request current developer-customer count, retention, and conversion to broader products
      - - Public list pricing
        - 'null'
        - low
        - Without list price, payback and competitive pricing analysis are constrained
        - Request current price sheets, quote examples, and standard deal terms
      - - Gross margin
        - 'null'
        - low
        - Services mix versus software/data mix is the main margin question
        - Request gross margin by stream and contribution margin after delivery costs
      - - CAC / payback
        - 'null'
        - low
        - Needed to judge whether channel-heavy GTM actually lowers selling burden
        - Request CAC by channel, sales cycle length, and payback by product line
      - - NRR / retention / concentration
        - 'null'
        - low
        - Needed to test moat durability and revenue quality
        - Request logo retention, NRR, top-customer concentration, and cohort expansion data
    notes: >-
      This table uses public operating proxies where they exist and leaves classic private-company unit-economics fields
      as null with explicit diligence asks.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI022
      - CI036
      - CI040
  - id: TI004
    title: Capital adequacy table
    columns:
      - Metric
      - Public value / status
      - Supporting context
      - Why it matters
      - Diligence ask
    rows:
      - - Disclosed capital floor since 2021
        - $425.6M sold to $429.1M potential using public rounds and 2024 offering
        - Built from 2021 total raised, 2022 financing, and 2024 Form D sold / remaining amount
        - Shows Arcadia has historically raised enough capital to build real infrastructure
        - Reconcile this floor to current fully diluted cap table and cash balance
      - - Current cash on hand
        - Unknown
        - No retained public source discloses current cash balance
        - Cash balance is the starting point for runway analysis
        - Request current cash, restricted cash, and post-acquisition liquidity
      - - Monthly burn
        - Unknown
        - No retained public source discloses burn
        - Needed to evaluate financing dependency and margin of safety
        - Request monthly net burn, burn trend, and one-time integration costs
      - - Runway months
        - Unknown
        - Cannot be derived without cash and burn
        - Needed to test financing urgency
        - Request board runway view and downside-case runway
      - - Planned use of funds
        - >-
          Platform expansion, provider coverage, enterprise solutions growth, and acquisition integration are visible;
          exact allocation is private
        - Official product and acquisition pages show growth priorities
        - Useful for distinguishing offensive investment from defensive cash usage
        - Request budget allocation across product, sales, services, and integration
      - - Next-round trigger
        - Unknown
        - No retained public source states a fundraising trigger
        - Needed to understand whether new capital is discretionary or required
        - Request next-round conditions, covenant triggers, and minimum cash policy
      - - Debt / project-finance obligations
        - Unknown
        - Public cache does not disclose current debt package or project-finance burden
        - Debt terms can materially alter runway and equity value
        - Request lender list, covenants, security package, and any project-finance exposure
    notes: >-
      This table intentionally avoids replaying the full dated funding chronology from Chapter 01. It focuses on what
      those prior raises imply for present-day capital adequacy and what still remains unknown.
    claimRefs:
      - CI020
      - CI021
      - CI033
      - CI034
      - CI039
      - CI040
  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing private metric
      - Impact
      - Exact diligence path
    rows:
      - - Current revenue / ARR
        - >-
          Without a current denominator, public traction cannot be translated into software or services valuation
          support
        - Request monthly recurring revenue, annualized revenue, and stream mix for the last 8 quarters
      - - Gross margin and services mix
        - Key blocker for judging whether Arcadia is software-like, services-like, or hybrid
        - Request gross margin by product line plus blended gross margin before and after ENGIE integration
      - - Cash balance / burn / runway
        - Capital adequacy cannot be underwritten from historical fundraising alone
        - Request cash waterfall, monthly burn, runway case, and acquisition-integration spend
      - - Realized pricing / discounting
        - Pricing power and payback cannot be tested using demo pages alone
        - Request current pricing sheets, recent quotes, realized ACV, and discount waterfall by segment
      - - Retention / concentration
        - Revenue quality and moat durability remain unproven without cohort and concentration data
        - Request logo retention, NRR, gross retention, and top-10 customer share of revenue
      - - Debt / covenants / contingent liabilities
        - Unknown leverage or covenants can impair equity flexibility despite strong historical fundraising
        - Request debt agreements, covenant package, warrant overhang, and any payment-processing liabilities
    notes: The missing metrics are unusually concentrated in underwriting-critical fields rather than in narrative context.
    claimRefs:
      - CI036
      - CI039
      - CI040
figures:
  - id: FI001
    title: Revenue model bridge
    type: flow
    layout: wide
    summary: >-
      Arcadia's public model starts with data access, then layers bill operations, procurement, and reporting into a
      broader enterprise revenue stack.
    data:
      nodes:
        - id: n1
          label: Data acquisition + normalization
          detail: Aggregate utility bills, intervals, tariffs, contracts, and site data from thousands of sources.
          tone: neutral
        - id: n2
          label: API / DataHub delivery
          detail: Expose data through APIs, SFTP CSVs, and Snowflake shares for internal and partner systems.
          tone: positive
        - id: n3
          label: Bill workflow monetization
          detail: Use the data layer to automate bill capture, validation, payment, auditing, and forecasting.
          tone: positive
        - id: n4
          label: Procurement advisory
          detail: Use data, analytics, and partners to structure and execute energy supply decisions.
          tone: positive
        - id: n5
          label: Reporting integrations
          detail: Feed standardized utility data into sustainability and compliance workflows.
          tone: positive
        - id: n6
          label: Portfolio outcomes
          detail: Save time, money, and carbon while reducing manual work and risk.
          tone: positive
      edges:
        - from: n1
          to: n2
          label: deliver data
        - from: n2
          to: n3
          label: power workflows
        - from: n2
          to: n5
          label: feed reports
        - from: n3
          to: n4
          label: expand wallet share
        - from: n4
          to: n6
          label: execute decisions
        - from: n5
          to: n6
          label: prove outcomes
    approximationNotes: >-
      The bridge is qualitative because public sources describe the revenue surfaces and workflow transitions but not
      the revenue split or contribution margin by node.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI018
      - CI037
  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: wide
    summary: >-
      Public evidence supports a qualitative unit-economics chain from data infrastructure to labor savings and
      portfolio decisions, but not the private pricing or margin nodes.
    data:
      nodes:
