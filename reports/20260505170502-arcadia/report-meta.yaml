companyProfile:
  summary: >-
    Arcadia has evolved from Arcadia Power's community-solar roots into a broader enterprise energy
    intelligence platform. The current public proposition is one system for utility data,
    bill payment, procurement, and sustainability work, reinforced by acquisitions of Genability,
    Urjanet, RPD Energy, and ENGIE Impact.
