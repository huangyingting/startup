  - id: T502
    title: Workflow / use-case table
    columns:
      - User job
      - Current workflow pain
      - Arcadia solution
      - Measurable benefit
      - Limitation
    rows:
      - - Enterprise energy management
        - Fragmented utility data, billing errors, manual forecasting
        - Plug + Signal + analytics for usage, tariffs, and optimization
        - Arcadia claims 99% modeled-cost accuracy and 2M+ connected accounts
        - Outcome proof is mostly company-claimed rather than independently audited
      - - EV charging optimization
        - Opaque tariffs and weak whole-home context
        - Tariff database, rate calculator, and charging optimization analytics
        - Supports charge-cost decisions and tariff selection in EV workflows
        - No public aggregate ROI uplift for EV customers
      - - Sustainability reporting
        - Manual emissions data collection and inconsistent source formats
        - DataHub / Plug feeds standardized data into reporting platforms
        - Scope 1/2 automation and standardized meter/site data are publicly described
        - No public retention or compliance conversion metrics
      - - Portfolio forecasting for data centers
        - Regional averages and spreadsheets miss tariff-level cost risk
        - Signal models tariffs, custom rates, forecasts, and bill validation
        - Public blog claims tariff-level precision and scenario analysis
        - The strongest examples are narrative case studies, not benchmark studies
      - - Embedded developer onboarding
        - Collecting utility credentials is hard to build internally
        - Connect UI, tokens, and React wrapper accelerate credential sync
        - Docs and npm package expose create/update flows and callbacks
        - Public package warns the API remains under active development
    notes: >-
      Benefits are public claims or documented examples; they should not be treated as realized portfolio-wide outcomes
      without customer-level validation.
