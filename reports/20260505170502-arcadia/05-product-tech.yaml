  - id: T504
    title: Trust / quality / compliance table
    columns:
      - Control or signal
      - Status
      - Scope
      - Gap
    rows:
      - - HTTPS + TLS 1.2
        - Publicly stated on security page
        - Application traffic
        - No public evidence of newer protocol posture or cert rotation practices
      - - Password hashing and salting
        - Publicly stated on security page
        - Arcadia account credentials
        - No public password-policy details or admin-control matrix
      - - AWS KMS encryption with logged decryptions
        - Publicly stated on security page
        - Stored utility credentials and sensitive access paths
        - Key-management implementation details are not publicly documented
      - - Stripe / Plaid payment segregation
        - Publicly stated on security page
        - Banking and card handling
        - Applies to payment data, not the broader enterprise product stack
      - - AWS facility certifications
        - Publicly stated through AWS accreditation list
        - Underlying hosting environment
        - These are infrastructure accreditations, not a substitute for Arcadia-specific attestations
      - - SSO / MFA / compliance badges on Nudge profile
        - Third-party profile only
        - Identity and compliance posture
        - Requires first-party validation before underwriting
      - - Trust center and status visibility
        - Sparse
        - Public trust portal
        - Cached trust-center body exposes almost no operational detail or incident history
    notes: >-
      Trust evidence is enough to establish a serious control posture, but not enough to fully validate compliance scope
      without direct diligence.
