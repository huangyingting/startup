chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Arcadia now sells an enterprise energy-management stack that combines utility data acquisition, tariff analytics,
    procurement and sustainability workflows. Public evidence supports broad data coverage, active 2026 release
    activity, and a meaningful developer surface, but roadmap depth and Arcadia-specific trust disclosures remain
    limited in the cache.
sections:
  - id: product-scope
    title: Product scope and module map
    body: >-
      Arcadia's current positioning is an enterprise energy intelligence platform rather than a single-purpose
      utility-data API. The 2026 solutions and enterprise overview pages describe three enterprise solutions — Utility
      Bill Management, Energy Procurement Advisory, and Sustainability Reporting — layered on top of a platform that
      includes Utility Bill & Interval Data, Tariff & Energy Rate Calculator, and Solar & Storage Analysis. The company
      history page ties those modules to acquisitions: Genability became the tariff and modeling layer, Urjanet became
      utility-data automation, and ENGIE Impact added utility bill management, procurement, and sustainability advising.
      Public use-case pages show the same stack being routed into multiple customer workflows, especially enterprise
      energy management and EV charging. In practice, Arcadia is pitching a unified operating system for utility bills,
      interval data, tariffs, optimization, and reporting rather than a narrow API point solution. The public module map
      also suggests Arcadia is trying to own the operational loop from raw utility data to action. Instead of selling
      only a data feed, it layers advisory, reporting, and optimization services on top of the same normalized records.
      That integration story matters because many adjacent vendors still separate bill management, tariff analysis,
      procurement, and sustainability reporting into different tools and teams.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
      - CE024
    tableRefs:
      - TE001
      - TE005
  - id: operating-model
    title: Operating model, data infrastructure, and release cadence
    body: >-
      The operating model is built around data collection, normalization, and downstream delivery. Public pages say the
      Arcadia Data Model aggregates and standardizes energy data from thousands of sources, supports 50+ countries,
      updates more than 30,000 tariffs, and captures interval data covering more than 75% of US AMI meters. Plug is the
      front door for account, bill, and interval ingestion, while DataHub provides enterprise bulk delivery through
      zipped CSV files to SFTP servers or a Snowflake Direct Share. The API documentation describes Connect-based
      credential onboarding, tokenized authentication, and explicit activation of statement and interval products. The
      changelog shows active 2026 maintenance with monthly provider additions, extraction fixes, automated guest access,
      token storage for selected utilities, and credential-status improvements. The product therefore looks
      operationally mature on ingestion and data-processing mechanics, with a documented workflow from credential
      capture to statements, meters, intervals, and bulk exports. The strongest publicly supported differentiation is
      therefore not a single algorithm or dashboard, but the way Arcadia chains several stages together: credential
      collection, provider connectivity, record normalization, tariff logic, and delivery into downstream systems. The
      review cache repeatedly shows the same pattern across docs and marketing pages, which makes the operating model
      more concrete than a generic AI-software narrative.
    claimRefs:
      - CE007
      - CE008
