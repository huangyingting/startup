  - id: TE003
    title: Technology / operating architecture table
    columns:
      - Layer / component
      - Role
      - Key dependency
      - Risk
    rows:
      - - Connect and credential onboarding
        - Captures customer utility credentials or launches hosted Connect flows
        - Utility credential validity and provider-specific login paths
        - Provider workflow changes can break onboarding or slow verification
      - - Plug statements and intervals
        - Discovers accounts, meters, statements, and interval reads after credential capture
        - Utility provider coverage and provider-site reliability
        - Interval activation is meter-level and can lag when provider systems are down
      - - Arcadia Data Model
        - Normalizes bills, tariffs, contracts, and interval data into a common schema
        - Normalization logic and AI-assisted validation
        - Gap-filling and harmonization quality are hard to audit externally
      - - DataHub bulk delivery
        - Exports transformed data to SFTP CSV or Snowflake shares
        - Customer data pipelines and warehouse ingestion
        - Public docs cover outputs but not full operational guardrails or SLAs
      - - Signal tariff engine
        - Models utility costs and tariff options against actual load data
        - Tariff database freshness and accurate codification of private tariffs
        - Incorrect tariff logic could contaminate optimization and forecasting workflows
      - - Security and payments layer
        - Protects accounts, credentials, and payment flows
        - AWS, Stripe, Plaid, and internal key-management controls
        - Arcadia-specific attestations remain thinner than the underlying cloud and payment attestations
    notes: >-
      The operating stack is reconstructible from official docs and product pages, but some internals remain
      marketing-level descriptions rather than engineering detail.
