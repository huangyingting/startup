    title: Product module / asset matrix
    columns:
      - Module
      - Primary user
      - Status / maturity
      - Differentiation
      - Diligence gap
    rows:
      - - Utility Bill Management
        - Enterprise energy / finance teams
        - Launched as Enterprise Solutions in 2025
        - Automated bill payment, auditing, tariff optimization, and budget forecasting in one workflow
        - No public SLA, attach rate, or implementation-duration data
      - - Energy Procurement Advisory
        - Enterprise procurement and energy buyers
        - Enterprise solution; expanded by ENGIE Impact acquisition
        - Combines market evaluation, procurement advisory, and portfolio risk framing
        - No public win-rate or realized savings distribution
      - - Sustainability Reporting
        - Sustainability and compliance teams
        - Enterprise solution with partner integrations
        - Standardized utility data feeds carbon accounting and compliance workflows
        - No public customer retention or module-specific usage metrics
      - - Plug / Utility Bill & Interval Data
        - Software builders and enterprise ops teams
        - Operational with public API/docs and 2026 release notes
        - Thousands of providers, 15/30/60-minute intervals, bulk and API delivery
        - Public provider counts vary by source and should be confirmed in diligence
      - - Signal / Tariff & Energy Rate Calculator
        - Energy managers, EV, solar, and procurement users
        - Integrated from Genability and actively marketed in 2026
        - 30,000+ tariffs with high-frequency updates and scenario modeling
        - No public benchmark against independent tariff engines
      - - Switch / Solar & Storage Analysis
        - Solar, storage, and DER workflow owners
        - Integrated from Genability and marketed through use cases
        - NREL-verified modeling and savings simulation tied to tariff data
        - Limited public documentation on model assumptions and validation set
      - - DataHub
        - Enterprise data teams and reporting platforms
        - Newer bulk-delivery layer documented in developer hub
        - SFTP CSV and Snowflake Direct Share options on top of Plug data
        - Public schema breadth is narrower than a full implementation guide would provide
    notes: >-
      The public product map is clear at the module level, but pricing, attach rates, and module-level adoption remain
      undisclosed.
