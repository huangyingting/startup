  - id: trust-risk
    title: Trust controls, developer surface, and technical gaps
    body: >-
      Arcadia publishes concrete security controls around transport, credential handling, and payment segregation. The
      security page states that application traffic is forced over HTTPS with TLS 1.2, passwords are hashed and salted,
      utility credentials are encrypted with AWS KMS, and payment details are handled by Stripe and Plaid rather than
      stored on Arcadia infrastructure. Developer-facing evidence is also real: the public OpenAPI spec exposes
      access-token and Connect-token flows, the npm package documents a maintained React wrapper for Connect, and the
      docs package create-vs-update credential flows for embedded onboarding. Still, the cache shows several disclosure
      limits. The public trust-center text is extremely sparse, Nudge Security provides third-party badges for SSO and
      compliance but does not replace first-party attestations, and the reviewed sources do not expose a detailed public
      incident archive, SLA set, or a deeply articulated forward roadmap beyond launch pages and changelog snippets.
      That leaves diligence work around trust verification and roadmap precision still open. For diligence, the
      practical takeaway is that Arcadia appears implementation-ready for data-heavy workflows, but less transparent on
      governance detail than large enterprise buyers may want. A buyer can see that developer onboarding exists and that
      security basics are documented, yet still cannot fully validate service history, audit scope, or how newly
      acquired modules are converging operationally without management materials.
    claimRefs:
      - C205
      - C206
