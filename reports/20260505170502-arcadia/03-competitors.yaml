callouts:
  - calloutType: strength
    title: Arcadia's real edge is integration, not one isolated feature
    body: >-
      The retained evidence supports a credible integrated-platform story: one vendor can move from utility-data
      acquisition into bill payment, procurement, and reporting, while specialists usually own only one slice of that
      workflow.
    claimRefs:
      - CP001
      - CP003
      - CP031
      - CP037
  - calloutType: risk
    title: Specialists still own sharper single-function narratives
    body: >-
      UtilityAPI, EnergyCAP, Watershed, Persefoni, and LevelTen each present a narrower but clearer buying story.
      Arcadia must prove that unified workflow value outweighs best-of-breed assembly risk.
    claimRefs:
      - CP007
      - CP010
      - CP013
      - CP015
      - CP032
      - CP039
  - calloutType: assumption
    title: Moat durability depends on expansion, not just logo count
    body: >-
      The cache shows customer proof and scale, but not win rates, retention, or module-expansion data. Without that,
      the key assumption is that Arcadia can convert single-use buyers into multi-workflow accounts.
    claimRefs:
      - CP027
      - CP028
      - CP037
