        - Utilities, solution providers, program administrators
        - Utility-controlled data sharing and fast credentialed access
        - Narrower workflow scope than Arcadia; no bill-pay or procurement execution disclosed
      - - EnergyCAP
        - Utility bill-management incumbent
        - 26K+ users; $100B+ bill value tracked annually; $500M bill-pay volume
        - Finance, facilities, energy, and sustainability teams with large portfolios
        - 40+ year finance-first utility expense management stack
        - Cleaner bill-ops wedge than Arcadia, but less visible procurement breadth
      - - Watershed
        - Sustainability reporting platform
        - 90+ Fortune 500 companies; 3Gt emissions under management on homepage
        - Large enterprise sustainability and finance teams
        - Deep climate-data, reporting, and decarbonization workflow focus
        - No direct utility bill-pay workflow in cached source
      - - Persefoni
        - Carbon accounting / regulatory reporting
        - 9,000+ teams; packaging exposed but dollar pricing undisclosed
        - Enterprise and financial-services reporting teams
        - Dedicated regulatory and stakeholder reporting modules
        - Weaker visible utility-data / procurement operations in cache
      - - LevelTen Energy
        - Procurement marketplace
        - Public marketplace scale claim; custom-offer workflow; no public price card
        - Energy buyers, advisors, developers, and financiers
        - Transaction infrastructure plus project and PPA analytics
        - Not a broad utility-data or bill-management platform
      - - Ameresco
        - Incumbent integrated services
        - Public company; about $1.77B trailing revenue in retained market-data source
        - Data centers, utilities, public sector, infrastructure owners
        - Advanced metering, microgrids, supply management, and EaaS
        - Project- and services-heavy model is not a clean Arcadia substitute
      - - Itron
        - Adjacent utility infrastructure incumbent
        - Public company; about $2.37B trailing revenue in retained market-data source
        - Utilities and smart-infrastructure operators
        - Smart energy and water footprint plus metering relationships
        - Not positioned in cache as enterprise bill-pay / reporting software
    notes: >-
      The retained set mixes direct peers, incumbents, and adjacent entrants because Arcadia competes across several
      workflow categories at once rather than inside one narrow software box.
