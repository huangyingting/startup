  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - Moat claim
      - Threat
      - Severity
      - Mitigation / diligence ask
    rows:
      - - Integrated workflow breadth
        - Buyers can still assemble best-of-breed tools across data, bill ops, reporting, and procurement
        - High
        - Ask for attach rates from data to bill-pay, reporting, and procurement modules
      - - Large partner ecosystem
        - Channel partners can dilute margin and reduce control over end-customer economics
        - Medium
        - Request partner-led pipeline conversion, gross-margin split, and churn by route to market
      - - Post-ENGIE enterprise scale
        - Integration complexity can slow execution or make Arcadia look services-heavy rather than platform-first
        - High
        - Request customer-retention, cross-sell, and services-mix data post acquisition
      - - Data coverage and normalization
        - Utility-data access can commoditize if data-layer specialists or utilities improve direct exchange
        - Medium
        - Test whether Arcadia wins because of normalized workflow outcomes, not just data access
      - - Procurement breadth
        - LevelTen and incumbent advisors can own the transaction venue or buyer relationship
        - Medium
        - Request win/loss examples where Arcadia displaced a marketplace or incumbent advisor
      - - Trust narrative
        - Legacy Arcadia Power regulatory scrutiny can be used against enterprise trust claims
        - High
        - Request remediation timeline, enterprise governance controls, and deal impact from the Connecticut matter
    notes: >-
      The key durability question is whether Arcadia becomes a must-run operating system for enterprise energy
      management or remains an orchestrator layered over stronger specialist wedges.
