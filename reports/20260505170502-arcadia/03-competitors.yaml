        - Data-access platform for utilities and solution providers
        - Credentialed utility-data sharing and compliant exchange
        - Exact per-account or per-call pricing unknown
        - Competes on infrastructure access, not transparent price sheets
      - - EnergyCAP
        - Pricing scales with number of meters
        - Modular utility-management software and services
        - Bill management, bill pay, carbon hub, analytics
