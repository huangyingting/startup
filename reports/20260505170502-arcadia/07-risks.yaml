company:
  name: Arcadia
chapter:
  number: 7
  title: Risks
  summary: >-
    Arcadia's public risk profile is driven by regulatory ambiguity, dependency density, and
    integration complexity rather than one obvious operational collapse. The strongest adverse item
    in the retained source set is a 2024 Connecticut PURA petition seeking an investigation into
    whether Arcadia operated without required supplier or aggregator authority and marketed services
    deceptively. Operationally, Arcadia runs a utility-data workflow that depends on credential
    automation, ongoing connector fixes, AWS, Stripe, Plaid, and a broad reporting partner
    ecosystem. The 2026 ENGIE Impact acquisition adds scale but also raises execution, contract, and
    diligence risk because public sources still do not expose detailed SLAs, concentration, incident
    history, or current financial statements.
