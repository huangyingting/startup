sections:
  - id: S701
    title: Regulatory and legal risk is the clearest adverse item in the public record
    body: >-
      The retained source set contains one unmistakably material adverse item: the March 11, 2024
      Connecticut PURA petition to open an investigation of Arcadia Power, Inc. The petition asks
      PURA to consider penalties for possible operation as an electric supplier without a license,
      operation as an aggregator without a certificate, deceptive or misleading marketing and
      contracts, and charging customers for services not provided. EnergyChoiceMatters adds
      important context rather than clean exoneration: it reported that PURA had previously closed
      Arcadia's 2017 aggregator application after stating that Arcadia's broker model did not
      require an aggregator license, while also reporting Arcadia's later position that it had not
      assisted Connecticut customers since April 2019. That combination creates genuine regulatory
      ambiguity. It is not enough to end the thesis on its own, but it is enough to keep residual
      legal risk high until the final docket outcome, any penalties, and any current-state licensing
      posture are reviewed directly.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
      - C006
      - C007
      - C008
  - id: S702
    title: >-
      Operational risk sits inside credential automation, data normalization, and multi-party
      workflows
    body: >-
      Arcadia's operating model is powerful precisely because it is complicated. The company says it
      aggregates utility data from thousands of providers, offers outputs through Snowflake and
      SFTP, standardizes meter and ESG tables, and now processes about three million bills per month
      across roughly 5,000 utilities according to Latitude Media. The same retained sources show why
      this can be brittle. The developer changelog is full of new providers, extraction bug fixes,
      improved rendering reliability, token-storage workflows, automated guest access, and MFA
      opt-out features. Those are signs of active product maturity, but they are also evidence that
      Arcadia must constantly maintain fragile upstream utility workflows to keep downstream
      enterprise data clean. The public security page documents sensible controls such as TLS,
      hashed passwords, AWS KMS encryption, and payment separation through Stripe and Plaid. What it
      does not provide is incident frequency, customer-visible error rates, or service-credit
      history. That missing operational denominator keeps residual delivery risk elevated.
    claimRefs:
      - C013
      - C014
      - C015
      - C016
      - C017
      - C021
      - C022
      - C023
      - C024
      - C025
      - C026
      - C029
      - C030
      - C031
      - C032
  - id: S703
    title: Partner concentration and business-model transition matter more after ENGIE Impact
    body: >-
      Arcadia in 2026 is no longer just the company described in older community-solar materials.
      Current official pages frame one enterprise platform for paying utility bills, buying energy,
      and advancing sustainability, and the ENGIE Impact acquisition materially expanded that
      surface area. The combined company says it serves more than 1,500 enterprise customers, about
      a quarter of the Fortune 500, and manages nearly $100 billion of utility spend. That is a
      strength, but it also means more of Arcadia's value now depends on partner-heavy execution
      across procurement, billing operations, reporting integrations, and customer-account
      continuity. Fox uses Arcadia with Salesforce Net Zero Cloud. Sweep and Cority integrate
      DataHub into ESG workflows. Iron Mountain case material shows the advisory side coordinating
      multiple generators, intermediaries, and suppliers. Public sources prove that Arcadia has real
      enterprise traction, but they also show that the business now spans more counterparties, more
      contract types, and more failure modes than the older utility-data story alone implied.
    claimRefs:
      - C018
      - C019
      - C020
      - C026
      - C027
      - C028
      - C033
      - C038
      - C039
      - C040
      - C041
      - C042
      - C043
  - id: S704
    title: >-
      The biggest remaining risk is evidence opacity around contracts, concentration, and current
      economics
    body: >-
      Arcadia's public materials are good enough to show that the company matters, but not good
      enough to clear all underwriting questions. The company has raised substantial capital,
      including a $200 million 2022 round, a March 2024 Form D showing a $49.1 million total
      offering amount plus warrant coverage, and a January 2025 report of $50 million of growth
      financing plus a $30 million credit facility. Yet the retained source set still does not
      expose current revenue, gross margin, customer concentration, churn, enterprise SLA terms, or
      the final outcome of the Connecticut matter. Even the legal-disclosure surface is thin in
      practice: the retained privacy, terms, and legal entry points were broken or empty. Arcadia
      may still be an attractive strategic asset because the platform has real scale and real
      customer proof. But a risk chapter should stay evidence-sensitive. Until public or private
      diligence closes the gaps on concentration, incident history, regulatory resolution, and
      post-acquisition contract structure, the honest residual rating stays high rather than
      moderate.
    claimRefs:
      - C009
      - C010
      - C011
      - C012
      - C033
      - C034
      - C035
      - C036
      - C037
      - C044
