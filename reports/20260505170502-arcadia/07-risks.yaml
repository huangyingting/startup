  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: Regulatory / legal risk register coverage
      missingEvidence: >-
        The retained cache does not include the full Connecticut docket history, any final decision,
        or a broader multi-state regulatory schedule.
      whyItMatters: >-
        The regulatory register is partial until the exact resolution and any spillover into other
        jurisdictions are verified.
      diligencePath: >-
        Pull the full PURA docket, final decision database entries, and management legal summary for
        all active state matters.
      relatedQuestionRefs:
        - RQ025
      relatedTableRefs:
        - T701
    - type: private-evidence-only
      severity: material
      topic: Customer concentration and retention
      missingEvidence: >-
        No retained source quantifies Arcadia's top-customer exposure, gross retention, or net
        revenue retention.
      whyItMatters: >-
        A services-heavy enterprise platform can look durable until one or two large accounts or
        channels prove overly concentrated.
      diligencePath: >-
        Request cohort retention, top-10 customer revenue share, and renewal data by acquired
        business.
      relatedQuestionRefs:
        - RQ022
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Public incident and outage record
      missingEvidence: >-
        The retained sources do not provide a status history, incident taxonomy, breach register, or
        postmortem archive for Arcadia.
      whyItMatters: >-
        Connector-heavy platforms can carry hidden services margin and trust risk if incident
        frequency is higher than the public security page implies.
      diligencePath: >-
        Request incident logs, RCA summaries, customer notifications, and service-credit reports for
        the last 24 months.
      relatedQuestionRefs:
        - RQ023
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Enterprise contract and SLA terms
      missingEvidence: >-
        No retained source exposes standard enterprise SLA credits, indemnities, liability caps
        after ENGIE Impact close, or negotiated exceptions.
      whyItMatters: >-
        Contract structure determines whether Arcadia bears meaningful downside when billing or
        procurement workflows fail.
      diligencePath: Obtain current MSA, DPA, SLA, order-form templates, and top-customer redline themes.
      relatedQuestionRefs:
        - RQ024
      relatedTableRefs: []
    - type: stale
      severity: material
      topic: Connecticut investigation outcome
      missingEvidence: >-
        The retained cache shows the petition and trade coverage but not a final decision or
        settlement.
      whyItMatters: >-
        Residual regulatory risk depends on whether the matter was dismissed, settled, penalized, or
        remains active.
      diligencePath: >-
        Search the PURA final decision database and request management's latest regulator
        correspondence log.
      relatedQuestionRefs:
        - RQ025
      relatedTableRefs: []
    - type: private-evidence-only
      severity: blocking
      topic: Clean low-risk conclusion on Arcadia
      missingEvidence: >-
        Current revenue, margin, incident, concentration, and contract economics are still absent
        from the retained public record.
      whyItMatters: >-
        Without those denominators, the chapter can rank risks but cannot downgrade residual
        exposure with high confidence.
      diligencePath: >-
        Use finance, legal, and operating-room diligence to reconcile customer concentration,
        delivery economics, and integration milestones.
      relatedQuestionRefs:
        - RQ030
      relatedTableRefs: []
