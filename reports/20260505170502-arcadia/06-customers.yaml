  - id: durability-risk
    title: Durability, expansion paths, and diligence gaps
    body: >-
      What is missing is the part of customer quality that investors usually care about most: repeatability, renewal quality, and concentration. None of the reviewed public pages disclose NRR, GRR, churn, renewal rates, contract length distributions, or top-customer exposure. Public customer proof is still dominated by case studies, partner announcements, and selected outcome narratives rather than cohorts or independently auditable usage panels. Review surfaces that might have helped on the adverse side are also weak in the cache: the Trustpilot snapshot failed on browser verification and the BBB page blocked access. That means Arcadia can show that customers exist and that several deployments are meaningful, but it cannot yet show from public evidence alone how sticky those customers are, how concentrated revenue may be, or whether complaint rates differ across legacy consumer relationships versus the newer enterprise platform. The strongest expansion signal is channel breadth:
      sustainability platforms, utility-data apps, solar software, and EV-charging analytics all appear to extend Arcadia into adjacent budgets and geographies, including Europe through the Sweep partnership. In other words, the cache is good enough to show who buys Arcadia and why, but not good enough to prove how durable or diversified that revenue is. The missing fields are exactly the ones an investor would want in a customer-quality bridge: contract length, renewal behavior, usage expansion, and partner concentration after the enterprise repositioning and ENGIE integration.
    claimRefs:
      - C033
      - C034
      - C036
      - C039
