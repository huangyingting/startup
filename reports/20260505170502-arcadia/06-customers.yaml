chapter:
  number: 6
  title: Customers
  summary: >-
    Public evidence now points to an enterprise-heavy customer base spanning industrials, media, data centers, and
    embedded software partners. Arcadia has strong named-customer proof and several concrete deployment outcomes, but
    public retention, concentration, and complaint data remain thin or blocked in the cache.
sections:
  - id: customer-base
    title: Customer base and segmentation
    body: >-
      Arcadia's public customer evidence now centers on enterprise and software-enabled buyers rather than the consumer
      community-solar audience with which the company was historically associated. The company history page says Arcadia
      spun out community solar into Perch in March 2025 and now serves over 1,500 enterprise customers. The
      customer-story index and case studies show several recurring segments: direct enterprise energy teams such as
      Arconic and Fox, large procurement or data-center buyers such as Iron Mountain, and channel or embedded-product
      partners such as Verse, Fusebox, Stable, Haven, and Subcontractor Hub. About-us pages reinforce the same
      repositioning by describing Fortune 2000 customers with hundreds of locations, thousands of utility bills, and
      energy spend in the hundreds of millions. In effect, Arcadia's current customer mix appears to span both direct
      enterprise contracts and software/platform partners that embed Arcadia data or tariff logic inside their own
      products. That segmentation also implies different sales motions. Some references look like classic enterprise
      deployments with cross-functional users and centralized budgets, while others look like product-embedded
      relationships where Arcadia becomes infrastructure inside another vendor's workflow. For diligence, that
      distinction matters because retention, pricing, and support burdens can differ sharply between direct and
      channel-led customers.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU041
      - CU046
      - CU050
      - CU051
    tableRefs:
      - TU001
      - TU005
  - id: named-proof
    title: Named customer proof and adoption signals
    body: >-
      The reviewed cache provides stronger named-customer proof than public retention proof. Arconic describes nearly
      10,000 utilities worldwide, real-time or near-real-time data updates, and a $13,000 one-month savings event at one
      facility. Fox ties Arcadia directly to auditable emissions reporting and says 70-80% of the energy data it needs
      comes from utility bills. Iron Mountain describes a complex procurement deployment spanning 100 locations, more
      than 250 metered accounts, three ISO regions, and a weighted renewable-energy coverage ratio near 94% in PJM.
      Software and channel stories also look operational rather than purely promotional: Verse says internal build would
      have been costly and time-consuming, Fusebox says Arcadia shortened its data cycle by up to two weeks and helped
      catch a $7,000 utility mistake, Stable says users can analyze 1,000 charging sites in a few hours, and
      Subcontractor Hub says proposals can be generated in minutes. Third-party partner pages from Cority and PRNewswire
      extend that proof beyond Arcadia-hosted case studies by describing thousands of locations, millions of utility
      accounts, and global enterprise reporting workflows. The evidence is also broader than simple logo placement.
      Several stories describe specific implementation frictions, concrete account counts, or workflow outcomes that
      would be difficult to fake without a real production relationship. Even so, most of the public proof remains
      curated success material, so the right reading is that Arcadia has credible customer adoption rather than fully
      proven retention quality.
    claimRefs:
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
