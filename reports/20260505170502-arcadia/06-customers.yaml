figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Arcadia's public customer motion typically runs from fragmented utility-data pain to automated onboarding,
      normalized visibility, operational action, and expansion into adjacent modules.
    data:
      items:
        - label: Fragmented data pain
          detail: Spreadsheets, slow bills, weak tariff context, manual reporting
          tone: warning
        - label: Utility account onboarding
          detail: Customers connect accounts or partners embed Connect / APIs
          tone: neutral
        - label: Normalized visibility
          detail: Bills, intervals, tariffs, and emissions inputs are standardized
          tone: positive
        - label: Actionable analytics
          detail: Users forecast spend, detect errors, model ROI, or support reporting
          tone: positive
        - label: Operational outcomes
          detail: Savings, auditability, procurement execution, and better budgeting
          tone: positive
        - label: Expansion loop
          detail: Customers adopt adjacent workflows or partner channels add modules
          tone: neutral
    approximationNotes: null
    claimRefs:
