  - id: named-proof
    title: Named customer proof and adoption signals
    body: >-
      The reviewed cache provides stronger named-customer proof than public retention proof. Arconic describes nearly 10,000 utilities worldwide, real-time or near-real-time data updates, and a $13,000 one-month savings event at one facility. Fox ties Arcadia directly to auditable emissions reporting and says 70-80% of the energy data it needs comes from utility bills. Iron Mountain describes a complex procurement deployment spanning 100 locations, more than 250 metered accounts, three ISO regions, and a weighted renewable-energy coverage ratio near 94% in PJM. Software and channel stories also look operational rather than purely promotional: Verse says internal build would have been costly and time-consuming, Fusebox says Arcadia shortened its data cycle by up to two weeks and helped catch a $7,000 utility mistake, Stable says users can analyze 1,000 charging sites in a few hours, and Subcontractor Hub says proposals can be generated in minutes. Third-party partner pages from Cority
      and PRNewswire extend that proof beyond Arcadia-hosted case studies by describing thousands of locations, millions of utility accounts, and global enterprise reporting workflows. The evidence is also broader than simple logo placement. Several stories describe specific implementation frictions, concrete account counts, or workflow outcomes that would be difficult to fake without a real production relationship. Even so, most of the public proof remains curated success material, so the right reading is that Arcadia has credible customer adoption rather than fully proven retention quality.
    claimRefs:
