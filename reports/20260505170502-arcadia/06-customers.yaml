    title: Customer segmentation table
    columns:
      - Segment
      - Buyer / user / payer
      - Use case
      - Scale evidence
      - Revenue / strategic value
      - Gap
    rows:
      - - Enterprise energy management teams
        - Energy managers / operations / enterprise budget owner
        - Bill management, anomaly detection, portfolio visibility
        - Arconic, Cox, and enterprise overview pages
        - Direct enterprise land motion with large location footprints
        - No module-level ACV or contract-term disclosure
      - - Sustainability and compliance teams
        - Sustainability leaders / reporting users / enterprise ESG budget
        - Carbon accounting, emissions reporting, regulatory disclosure readiness
        - Fox, Cority, Sweep, and sustainability pages
        - Cross-sell into compliance and carbon budgets
        - No public conversion or renewal data by reporting cohort
      - - Procurement and data-center buyers
        - Energy procurement / finance / site operators
        - Hourly matching, tariff strategy, forecasting, and risk management
        - Iron Mountain and enterprise-intelligence materials
        - Potentially high-value, multi-site procurement engagements
        - No public margin or win-rate data
      - - Software and data-platform partners
        - Product teams / software users / vendor budget owner
        - Embedded utility data inside customer-facing apps
        - Verse, Fusebox, Cority, and Subcontractor Hub
        - Scales Arcadia through partner distribution and product embeds
        - Partner concentration is not disclosed
      - - EV, solar, and DER workflow providers
        - Growth teams / proposal users / investors
        - Tariff analysis, ROI modeling, proposal automation
        - Stable, Haven, and Subcontractor Hub stories
        - Expands into infrastructure and project-development budgets
        - No public attach-rate or end-customer conversion data
      - - Legacy community-solar audience
        - Consumers and small businesses / households / bill payer
        - Historical clean-energy subscription channel
        - Company history, pv magazine, and Solstice/Perch evidence
        - Important for understanding legacy brand recognition and channel history
        - Current Arcadia financial exposure to this spun-out base is not public
    notes: >-
      Public materials show a mixed direct-enterprise and channel-partner customer strategy, with community solar now
      largely outside the operating perimeter after the Perch spinout.
