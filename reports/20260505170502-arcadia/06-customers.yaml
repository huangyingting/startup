  - id: TU005
    title: Expansion and concentration risk table
    columns:
      - Expansion driver
      - Concentration risk
      - Impact
      - Diligence path
    rows:
      - - Cross-sell from utility data into reporting and procurement
        - Large combined-platform customers may carry outsized revenue weight
        - Could improve ARPU but also increase exposure to enterprise churn
        - Request top-10 customer revenue share and module penetration by cohort
      - - Software-partner distribution
        - Dependence on embedded-app partners may create indirect churn exposure
        - Partner wins can scale quickly but may compress pricing power
        - Request partner contribution to ARR and renewal terms
      - - Post-ENGIE enterprise motion
        - Acquisition integration could reshape customer mix and service model
        - May expand global reach while muddying comparability of historical KPIs
        - Request pre/post-acquisition customer and revenue bridge
      - - European sustainability-partner expansion
        - Early partner-led expansion may have low direct proof so far
        - Useful path into new geography but limited current evidence
        - Request EU pipeline, partner-sourced leads, and production references
      - - Legacy consumer brand history
        - Confusion between spun-out community solar and current enterprise business
        - Could distort external reviews and brand perception
        - Separate current enterprise NPS / satisfaction from legacy consumer channels
    notes: The public record supports several expansion paths but provides no concentration disclosures.
