chapter:
  number: 6
  title: Customers
  summary: Public evidence now points to an enterprise-heavy customer base spanning industrials, media, data centers, and embedded software partners. Arcadia has strong named-customer proof and several concrete deployment outcomes, but public retention, concentration, and complaint data remain thin or blocked in the cache.
sections:
  - id: customer-base
    title: Customer base and segmentation
    body: >-
      Arcadia's public customer evidence now centers on enterprise and software-enabled buyers rather than the consumer community-solar audience with which the company was historically associated. The company history page says Arcadia spun out community solar into Perch in March 2025 and now serves over 1,500 enterprise customers. The customer-story index and case studies show several recurring segments: direct enterprise energy teams such as Arconic and Fox, large procurement or data-center buyers such as Iron Mountain, and channel or embedded-product partners such as Verse, Fusebox, Stable, Haven, and Subcontractor Hub. About-us pages reinforce the same repositioning by describing Fortune 2000 customers with hundreds of locations, thousands of utility bills, and energy spend in the hundreds of millions. In effect, Arcadia's current customer mix appears to span both direct enterprise contracts and software/platform partners that embed Arcadia data or tariff logic inside their own
      products. That segmentation also implies different sales motions. Some references look like classic enterprise deployments with cross-functional users and centralized budgets, while others look like product-embedded relationships where Arcadia becomes infrastructure inside another vendor's workflow. For diligence, that distinction matters because retention, pricing, and support burdens can differ sharply between direct and channel-led customers.
    claimRefs:
      - C001
      - C002
      - C003
      - C006
      - C007
      - C008
      - C009
      - C010
