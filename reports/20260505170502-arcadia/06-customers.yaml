  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Retention and cohort metrics
      missingEvidence: The reviewed public record contains no NRR, GRR, churn, contract-tenure series, or percentage retention cohorts suitable for a true durability analysis.
      whyItMatters: Customer quality is central to underwriting recurring revenue and expansion potential, and named case studies cannot substitute for retention math.
      diligencePath: Request cohort retention by module, contract duration distributions, gross and net revenue retention, and renewal rates split by direct and partner channels.
      relatedQuestionRefs:
        - RQ018
        - RQ024
      relatedTableRefs:
        - T006
    - type: private-evidence-only
      severity: material
      topic: Customer concentration
      missingEvidence: No public source discloses top-customer share, sector concentration, or partner-channel concentration for Arcadia.
      whyItMatters: A mixed direct-enterprise and partner-channel model can create hidden concentration risk even when the logo set looks diverse.
      diligencePath: Request top-10 customer revenue share, partner contribution to ARR, churn impact by major account, and post-ENGIE customer-mix bridges.
      relatedQuestionRefs:
        - RQ019
    - type: access-blocked
      severity: minor
      topic: Public review and complaint validation
      missingEvidence: Trustpilot and BBB pages in cache were blocked or failed verification, preventing an independent public read on complaint trends or satisfaction.
      whyItMatters: The reviewed case studies are company-selected, so blocked public-review channels leave adverse-customer evidence underdeveloped.
      diligencePath: Re-pull review sources manually or via approved browser tooling, and ask management for NPS, complaint volume, support SLA attainment, and customer-reference lists.
      relatedQuestionRefs:
        - RQ020
      relatedTableRefs:
        - T006
    - type: enumeration-incomplete
      severity: minor
      topic: Named customer proof table sample coverage
      missingEvidence: The public cache contains several named customers but not a complete list that could represent Arcadia's full enterprise base.
      whyItMatters: Without fuller coverage, it is hard to assess whether public references over-index toward best-case logos, certain verticals, or a specific partner cohort.
      diligencePath: Request a customer-reference roster with segment, module used, geography, production status, and willingness to act as a diligence call.
      relatedTableRefs:
        - T003
