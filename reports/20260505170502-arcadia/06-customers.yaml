      - CU019
      - CU021
      - CU024
      - CU026
      - CU033
      - CU035
      - CU051
  - id: FU002
    title: Adoption / deployment flow
    type: flow
    layout: wide
    summary: >-
      Named references show a repeatable pattern from customer pain to data onboarding, workflow integration, measurable
      outcome, and broader enterprise adoption.
    data:
      nodes:
        - id: pain
          label: Manual pain point
          detail: Billing complexity, emissions data gaps, proposal friction, tariff opacity
          tone: warning
        - id: connect
          label: Connect utility data
          detail: Accounts, bills, intervals, and tariffs are onboarded into Arcadia
          tone: neutral
        - id: integrate
          label: Integrate into workflow
          detail: Arcadia feeds enterprise systems or partner apps
          tone: neutral
        - id: measure
          label: Measure outcomes
          detail: Savings, auditability, forecasting, or procurement visibility become observable
          tone: positive
        - id: expand
          label: Expand or deepen usage
          detail: More sites, more modules, or more decision types are supported
          tone: positive
      edges:
        - from: pain
          to: connect
          label: data access need
        - from: connect
          to: integrate
          label: standardized records
        - from: integrate
          to: measure
          label: operational workflow
        - from: measure
          to: expand
          label: repeatable value
    approximationNotes: null
    claimRefs:
      - CU016
      - CU020
      - CU024
      - CU026
      - CU031
      - CU033
      - CU036
