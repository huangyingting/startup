  - id: TM004
    title: Growth Drivers and Constraints Table
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Arcadia
      - Diligence Ask
    rows:
      - - GHGRP, SB 253, and SEC climate reporting
        - driver
        - 2026 onward
        - Raises the value of auditable utility data and trusted reporting workflows.
        - How much of current pipeline is compliance-led versus voluntary optimization?
      - - Commercial electricity-rate inflation and volatility
        - driver
        - current and structural
        - Makes tariff intelligence, bill validation, and forecasting more urgent for enterprises.
        - What percentage of customer ROI comes from bill savings versus reporting efficiency?
      - - Demand charges and capacity scarcity
        - driver
        - current and worsening through 2027
        - Supports Arcadia's procurement and tariff-optimization story for large-load users.
        - What fraction of customers have demand-charge or capacity-price exposure large enough to justify fast payback?
      - - Fragmented utility data and manual workflows
        - driver
        - current
        - Creates pain that can justify Arcadia's data infrastructure before any advisory upsell.
        - What is the average implementation burden across enterprise portfolios?
      - - Auditability and trust requirements
        - constraint
        - current
        - Buyers need proof that data quality is high enough for CFO and assurance-signature use cases.
        - How often do customers still need manual exception handling or bill review?
      - - Switching costs across existing consultants and tools
        - constraint
        - current
        - Incumbent processes, spreadsheets, brokers, and software make land-and-expand slower.
        - What migration tools and services shorten time-to-value versus incumbents?
      - - Crowded substitute set by workflow
        - constraint
        - ongoing
        - 'Arcadia competes differently by layer: middleware, bill management, reporting, or procurement intelligence.'
        - 'Where does Arcadia win most often today: data, bill management, procurement, or reporting?'
      - - Public-data scarcity on pricing and win rates
        - constraint
        - ongoing
        - Limits bottom-up SOM modeling and makes outside-in market-share analysis approximate.
        - Request pricing architecture, pipeline conversion, and customer retention metrics.
    notes: >-
      The strongest drivers are externally visible; the weakest public evidence is on pricing, conversion, and precise
      market-share capture.
