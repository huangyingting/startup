  - id: drivers-and-constraints
    title: Growth Drivers and Adoption Constraints
    body: >-
      The core demand drivers are unusually aligned. Regulation is tightening: GHGRP, SB 253, CSRD-linked workflows, and
      SEC climate disclosure rules all increase the value of auditable utility data. Electricity costs are becoming
      structurally more volatile: Arcadia's own research shows widespread commercial-rate inflation, extreme regional
      dispersion, demand-charge exposure, and severe PJM capacity-price escalation. Enterprise buyers also face process
      pain: manual bill validation, tariff misapplication, and inconsistent utility PDFs create costly data-quality
      problems. Arcadia's own case studies underscore this pain, from Fox's reliance on bill data for reporting to a
      hyperscaler finding more than $10 million in billing errors after standardization. Constraints are real, however.
      Buyers need to trust that data pipelines are accurate enough for CFO-grade reporting and procurement decisions.
      Enterprise switching costs are material because data is fragmented across portals, meters, consultants, and
      existing software systems. Substitute categories are also numerous: UtilityAPI at the data-access layer, EnergyCAP
      in bill management, Watershed and Persefoni in sustainability reporting, and LevelTen in procurement intelligence.
      Finally, the public evidence is still thin on market-wide TAM, Arcadia pricing, and conversion rates, which limits
      pure software-style market-share analysis even though the workflow pain is obvious.
