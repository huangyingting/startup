chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Arcadia operates in the enterprise energy-management workflow market: utility-bill management, tariff intelligence,
    procurement advisory, sustainability reporting, and the underlying data infrastructure that makes those functions
    auditable. The cached evidence is stronger on current served-base scale and market drivers than on classic
    third-party TAM estimates. Public Arcadia sources cite 1,500+ enterprise customers, nearly $100B in managed utility
    spend, millions of accounts and meters, 10,000-provider scale, and strong regulatory and rate-volatility tailwinds.
    Demand appears to come from finance, energy, sustainability, and operations teams that must replace fragmented
    spreadsheets and manual bill workflows, while substitutes range from data middleware and utility-management software
    to procurement marketplaces and carbon-accounting platforms. The biggest analytical gap is that no cached
    third-party source cleanly sizes the full enterprise energy-management software market, so the chapter uses
    evidence-constrained coverage, spend, and compliance lenses instead.
sections:
  - id: market-boundary
    title: Market Boundary, Included Spend, and Excluded Spend
    body: >-
      Arcadia's current market boundary is not “solar” in the broad sense and not “ESG software” in the broad sense. The
      company describes itself as an enterprise energy-management platform that combines utility-bill management, energy
      procurement advisory, and sustainability reporting on top of a large data infrastructure for utility bills,
      intervals, tariffs, contracts, and site attributes. Included spend therefore covers software and managed-service
      budgets used to collect utility data, validate and pay bills, model tariffs, structure energy supply decisions,
      and feed auditable datasets into carbon and compliance workflows. Excluded spend includes commodity power
      generation itself, physical utility infrastructure, generic accounting software, and community-solar subscriptions
      as a current Arcadia product line. Arcadia's own history page is important here: it explicitly says community
      solar is no longer an Arcadia offering after the Perch spinout, which means legacy community-solar claims should
      be treated as adjacent proof of market experience, not as today's core market. The status-quo substitute is also
      clear in public materials: spreadsheets, scattered consultants, opaque procurement brokers, manual bill
      processing, and disconnected reporting tools. That puts Arcadia in a workflow-replacement market where data
      integration and service breadth matter as much as pure software features.
    claimRefs:
      - CM041
      - CM042
      - CM043
      - CM045
      - CM046
      - CM047
      - CM045
      - CM046
    tableRefs:
      - TM001
  - id: sizing-lenses
    title: Evidence-Constrained Sizing Lenses
    body: >-
      The cache does not contain a reliable third-party TAM or SAM report for the exact category “enterprise energy
      intelligence platform.” What it does contain is a set of operational and demand-side lenses that are still
      decision-useful. First, Arcadia's current served base is already large: the company says it serves 1,500+
      enterprise customers, manages nearly $100 billion in utility spend, and reaches millions of accounts and meters.
      Second, product coverage is deep: Plug reaches thousands of providers in 50+ countries, covers 95% of U.S.
      residential and commercial utility accounts, and includes 400+ interval data providers; Signal covers 30,000+
      tariffs and roughly national tariff coverage. Third, regulatory demand is broad enough to matter even without a
      clean software TAM: EPA GHGRP alone touches about 8,000 facilities, while California SB 253 affects more than
      5,000 large companies and SEC climate rules add assurance-grade pressure for large filers. Fourth, enterprise
      energy-cost volatility is making the problem larger: Arcadia's own 2026 rate report found 97.5% of commercial
      facilities saw electricity-rate increases over 2020-2025 and 71% rose faster than inflation. These lenses show a
      credible and expanding problem space, but not a clean industry-wide revenue pool, so the report avoids pretending
      otherwise.
    claimRefs:
      - CM048
      - CM009
      - CM010
      - CM011
      - CM012
