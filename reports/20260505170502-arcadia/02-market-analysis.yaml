  - id: buyers-and-adoption
    title: Buyer, User, and Payer Segmentation
    body: >-
      Arcadia's buyer map is multi-threaded. The direct enterprise buyer is often a cross-functional energy, finance,
      sustainability, or operations team at a company with many sites and heavy utility-bill complexity. Fox is a clear
      sustainability-reporting example: the user need is emissions reporting, but the critical input is utility-bill
      data. Iron Mountain shows a different thread: data-center and procurement teams buying structured energy
      procurement and renewable matching across multi-region portfolios. Arcadia's use-case pages widen the picture
      further. EV and charging companies need tariff and utility data to optimize charging costs and customer
      enrollment. Energy-management providers need detailed usage, pricing, and tariff inputs to run optimization and
      proposal workflows for clients. The budget owner therefore changes by segment: sustainability leaders may own
      carbon-reporting tools, finance or facilities teams may own utility-bill management, and corporate energy or
      procurement teams may sponsor market intelligence and contract advisory. Adoption usually starts with data pain —
      fragmented bills, tariff uncertainty, reporting deadlines, or inaccurate forecasts — and only later expands into
      procurement optimization or managed services. That progression makes switching-cost and data-trust issues central
      to sales motion.
    claimRefs:
      - CM044
      - CM013
      - CM014
      - CM015
      - CM016
      - CM017
