  - id: FM003
    title: Adoption Funnel or Value-Chain Map
    type: flow
    layout: standard
    summary: >-
      Illustrates the typical Arcadia enterprise adoption path from utility-data pain to integrated energy-management
      outcomes.
    data:
      nodes:
        - id: pain
          label: Portfolio Pain Identified
          detail: Buyer experiences billing errors, reporting deadlines, or tariff-driven budget misses.
        - id: data
          label: Data Foundation
          detail: Arcadia ingests utility bills, intervals, tariffs, and credentials via Plug, Signal, Connect, or DataHub.
        - id: validation
          label: Data Validation and Auditability
          detail: Bills, intervals, and tariff logic are standardized, reconciled, and made reporting-ready.
        - id: workflow
          label: Workflow Expansion
          detail: Buyer adopts bill management, reporting, or procurement analysis as initial use case.
        - id: optimization
          label: Optimization Layer
          detail: Tariff optimization, budgeting, procurement scenario modeling, and market intelligence are added.
        - id: managed
          label: Managed Outcomes
          detail: Arcadia and partners execute payment, procurement, or advisory workflows across the portfolio.
      edges:
        - from: pain
          to: data
          label: need for trusted data
        - from: data
          to: validation
          label: standardize
        - from: validation
          to: workflow
          label: unlock first use case
        - from: workflow
          to: optimization
          label: expand value
        - from: optimization
          to: managed
          label: execute outcomes
