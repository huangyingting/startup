  - calloutType: risk
    title: The market is broad, but the category definition is still fuzzy
    body: >-
      Arcadia overlaps multiple categories at once — data infrastructure, utility bill management, sustainability
      reporting, and procurement intelligence. That gives it room to expand, but it also makes third-party TAM
      benchmarking and clear substitute mapping harder than in a single-function SaaS category.
