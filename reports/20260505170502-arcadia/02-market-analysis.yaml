    title: Arcadia benefits from unusually strong multi-vector demand
    body: >-
      Regulation, rate volatility, billing complexity, and procurement risk all point in the same direction: enterprise
      buyers need more accurate utility data and more sophisticated energy workflows than spreadsheets can provide.
    claimRefs:
