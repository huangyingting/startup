  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Gross margin, cash position, and net burn rate
      missingEvidence: >-
        Anysphere has not disclosed gross margin, operating costs, or cash burn; as a private company there is no SEC
        filing requirement.
      whyItMatters: >-
        Without these figures, capital adequacy assessment, unit economics, and realistic profitability path cannot be
        underwritten.
      diligencePath: Request financial statements from management; model against cloud infrastructure and LLM API costs as a proxy.
      relatedQuestionRefs:
        - RQ013
    - type: private-evidence-only
      severity: material
      topic: Board composition and governance rights
      missingEvidence: No public disclosure of board structure, investor control rights, or preference stack from any round.
      whyItMatters: Without preference stack and control terms, exit economics and founder/investor alignment cannot be assessed.
      diligencePath: Request cap table, term sheets, and board observer/director rights for each round.
      relatedQuestionRefs:
        - RQ019
    - type: missing-source
      severity: material
      topic: Geographic customer distribution and international revenue mix
      missingEvidence: No public breakdown of customers by region, language, or revenue contribution by geography.
      whyItMatters: >-
        International expansion trajectory, regulatory exposure (GDPR, etc.), and concentration risk require geographic
        data.
      diligencePath: >-
        Request customer geography breakdown from management; review enterprise contract terms for jurisdictional
        provisions.
      relatedQuestionRefs:
        - RQ024
    - type: missing-source
      severity: minor
      topic: Pending litigation, IP disputes, and regulatory inquiries
      missingEvidence: >-
        No public record of lawsuits, IP disputes, or regulatory actions against Anysphere as of May 2026; absence of
        public filings does not confirm absence.
      whyItMatters: Microsoft (VS Code fork) IP, LLM provider disputes, or copyright claims on training data could surface.
      diligencePath: Conduct PACER search; review VS Code fork licensing compliance (MIT License); examine LLM API terms.
      relatedQuestionRefs:
        - RQ017
    - type: private-evidence-only
      severity: material
      topic: Strategic obligations from Google and Nvidia Series D participation
      missingEvidence: The terms of Google's and Nvidia's strategic investments in the Series D are not publicly disclosed.
      whyItMatters: >-
        Strategic investors may hold preferential access rights, anti-compete provisions, or data-sharing terms that
        could constrain Cursor's independence or model supply.
      diligencePath: Review investment side letters and any commercial agreements negotiated alongside the Series D.
      relatedQuestionRefs:
        - RQ018
    - type: private-evidence-only
      severity: minor
      topic: Enterprise contract duration and renewal terms
      missingEvidence: >-
        Cursor's enterprise contracts are custom-negotiated; public disclosure of typical contract length, auto-renewal,
        or termination provisions is unavailable.
      whyItMatters: Contract duration and renewal terms determine net revenue retention visibility and churn risk.
      diligencePath: Request standard enterprise contract template and NRR data broken out by cohort and contract length.
      relatedQuestionRefs:
        - RQ022
    - type: private-evidence-only
      severity: minor
      topic: Cursor's data handling for customer code — enterprise privacy verification
      missingEvidence: >-
        While Cursor advertises zero data-retention enterprise modes, independent audit of data handling practices has
        not been published.
      whyItMatters: >-
        Enterprise customers in regulated industries (finance, healthcare, government) require third-party verification
        of code confidentiality.
      diligencePath: >-
        Review SOC 2 Type II audit report; request DPA (Data Processing Agreement) template; verify scope of
        zero-retention modes.
      relatedQuestionRefs:
        - RQ023
    - type: enumeration-incomplete
      severity: minor
      topic: Leadership and founder table T102 — full leadership team beyond co-founders
      missingEvidence: >-
        Anysphere does not publicly list its full executive team beyond the three active co-founders and Travis McPeak
        (security).
      whyItMatters: Key functional gaps (engineering leadership post-CTO departure, sales, finance) are not visible.
      diligencePath: >-
        Request org chart and leadership team from management; review LinkedIn profiles for VP/director hires since
        Series C.
      relatedTableRefs:
        - T102
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone table T104 — pre-2023 internal milestones and board governance events
      missingEvidence: >-
        Pre-2023 product development milestones and any governance changes (board expansions, preference amendments) are
        not publicly documented.
      whyItMatters: Complete chronology enables due diligence on founding story consistency and governance evolution.
      diligencePath: Interview founders; review board minutes; request capitalization table history from formation.
      relatedTableRefs:
        - T104
    - type: enumeration-incomplete
      severity: moderate
      topic: Stakeholder and investor map T103 — exact ownership percentages, preference stack, and full syndicate members
      missingEvidence: >-
        Anysphere is private and has not disclosed a cap table, exact stake sizes, liquidation preferences, or full
        syndicate beyond named lead investors.
      whyItMatters: Full governance picture requires knowing investor vote thresholds, anti-dilution terms, and board composition.
      diligencePath: Request cap table and Series D term sheet from management; review SEC Form D filings for partial detail.
      relatedTableRefs:
        - T103
