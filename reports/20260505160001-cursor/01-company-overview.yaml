callouts:
  - calloutType: strength
    title: Unprecedented SaaS Growth Velocity
    body: >-
      Cursor reached $100M ARR in ~14 months from first revenue and $1B ARR in ~24 months — both claimed as SaaS speed
      records. This trajectory is corroborated by multiple independent sources including TechCrunch, Forbes, and
      Bloomberg.
    claimRefs:
      - C010
      - C012
  - calloutType: risk
    title: Co-Founder CTO Departure
    body: >-
      Arvid Lunnemark, co-founder and original CTO, left the company in October 2025. Technical leadership continuity at
      a company scaling rapidly through AI infrastructure and model development presents meaningful key-person risk.
    claimRefs:
      - C007
  - calloutType: insight
    title: xAI Acquisition Option Introduces Exit Uncertainty
    body: >-
      xAI/SpaceX holds an option to acquire Anysphere for $60B by end-2026 or pay $10B for collaboration. This creates
      strategic uncertainty for independent investors: the option may compress future independent fundraising
      optionality and introduces a potential change-of-control scenario.
    claimRefs:
      - C016
