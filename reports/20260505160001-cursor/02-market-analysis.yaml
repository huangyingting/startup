  evidenceGaps:
    - type: missing-source
      severity: moderate
      topic: AI coding tools market size — no publicly accessible full paid research report (GVR, Forrester, IDC)
      missingEvidence: >-
        Major analyst firms (Gartner, IDC, Forrester) publish gated reports on AI developer tools market sizing. The
        public summaries are too brief to assess methodology or confidence fully.
      whyItMatters: >-
        Without primary analyst reports, the market size range cannot be narrowed below $4–34B across definitions,
        making TAM precision low.
      diligencePath: >-
        Obtain GVR, IDC, or Forrester AI developer tools market reports; cross-check methodology against bottom-up
        models.
    - type: missing-source
      severity: moderate
      topic: GitHub Copilot's current ARR — not directly disclosed
      missingEvidence: >-
        Microsoft does not separately break out GitHub Copilot ARR; only subscriber counts and qualitative signals are
        public.
      whyItMatters: >-
        Without Copilot ARR, the competitive market share analysis rests on subscriber count × estimated ARPU rather
        than disclosed revenue.
      diligencePath: >-
        Request Copilot ARPU and ARR decomposition via Microsoft investor relations; use enterprise licensing
        disclosures as a proxy.
      relatedQuestionRefs:
        - RQ022
    - type: enumeration-incomplete
      severity: minor
      topic: Buyer segment map T203 — no primary customer research by vertical or company size from Anysphere
      missingEvidence: >-
        Anysphere does not publish a breakdown of its customer mix by industry, company size, or geography. The 40K+
        team figure and 64% Fortune 500 claim are company-stated without further segmentation.
      whyItMatters: >-
        Without detailed customer breakdown, it is unclear whether enterprise revenue is concentrated in tech verticals
        or already diversified — a key diligence question.
      diligencePath: Request customer cohort data from Anysphere management; analyze industry breakdown of enterprise customers.
      relatedTableRefs:
        - T203
