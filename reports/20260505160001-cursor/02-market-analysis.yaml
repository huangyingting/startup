callouts:
  - calloutType: strength
    title: Massive, Accelerating, Proven-ROI Market
    body: >
      The AI developer tools market has reached multi-billion-dollar annual revenue scale (Cursor $2B ARR, Copilot
      implied $2B+ ARR from 1.8M subscribers), growing at 25–30%+ CAGR. The productivity case is validated by controlled
      experiments showing 55% faster task completion. Stack Overflow 2024 shows 62% developer adoption (up from 44% in
      one year), creating compounding market growth.
    claimRefs:
      - C042
      - C044
      - C048
      - C054
  - calloutType: risk
    title: Trust Decline and Enterprise Compliance Gaps Are Meaningful Constraints
    body: >
      Developer AI tool favorability fell from 77% to 72% YoY (Stack Overflow 2024), suggesting early adopter
      disappointment at scale. Enterprise sales require SOC 2, GDPR/CCPA compliance, and often FedRAMP for government.
      Regulated industries (FinServ, Healthcare) represent a high-value but high-friction segment where Cursor's
      compliance posture is not yet fully established.
    claimRefs:
      - C056
      - C057
      - C060
  - calloutType: insight
    title: OpenAI's Windsurf Acquisition Validates and Threatens the Market
    body: >
      OpenAI's reported ~$3B acquisition of Windsurf/Codeium (2025) is simultaneously a market validation signal —
      hyperscalers value this category enough to pay multi-billion prices — and a competitive threat that places a
      well-funded, model-integrated competitor directly against Cursor. It may narrow Cursor's independent path by
      raising the resource bar for model access and distribution.
    claimRefs:
      - C059
      - C061
