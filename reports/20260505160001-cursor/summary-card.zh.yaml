  topStrengths:
    - 史上最快的开发者 SaaS ARR 轨迹：约 3 年从 $1M 到 $2B
    - AI coding 品类定义级市场位置：100 万+ 付费用户，64-70% Fortune 500（公司声称）
    - 企业 land-and-expand 已跑通：具名客户（Rippling、Coinbase、Samsung）席位扩张 3-6x
    - 技术护城河：VS Code fork 深度、shadow workspace、Composer 2 agentic pipeline、自有模型推理（Cursor 3，2026 年 4 月）
    - 收入层级更分散：约 60% 来自企业，从个人 PLG 长到企业飞轮
    - 资本充足：累计融资 $3.47B；现金跑道短期不是约束
  topRisks:
    - $2B ARR 下毛利率接近零（约 15-20%）；投资人为预期毛利率改善，相比当前经济性价值支付 5-7x 溢价
    - SpaceX/xAI 的 $60B 收购选项把 Series D 入场后的近端上行封在约 2x；必须谈到阻止权等治理权
    - Microsoft 生存级风险：GitHub Copilot Workspace + VS Code 原生打包，对 Microsoft 企业客户零增量成本
    - 模型 API 依赖：OpenAI 和 Anthropic API 访问随时可能受限；COGS 约 80-85% 是第三方推理支出
    - 版权与 AI 监管：美国和欧盟待决的 AI 生成代码立法，可能要求模型回滚或支付授权费
    - 关键人集中：四位联合创始人几乎掌握 150 人团队的全部技术决策
  unresolvedGaps:
    - GAAP 财务报表未公开；毛利率、COGS 拆分和经营费用都只是分析师估计
    - Series D 治理条款（收购否决权、董事会席位、反稀释）未公开披露
    - Koala 收购条款（价格、earnout、稀释影响）未披露
    - 企业 ARR 队列留存和按客户分层的 NRR 数据尚未独立验证
    - 自有模型推理部署路线图覆盖率（Cursor 3 vs. API 服务的 completion 占比）未公开量化
    - FedRAMP 授权状态和时间表未确认；没有 ATO，约 15-25% 企业 TAM 无法触达
