callouts:
  - title: Proprietary Model Stack Drives Sustainable Margin
    body: >
      Cursor's investment in Composer (MoE model, RL training on NVIDIA GPUs) directly reduces its dependency on
      expensive third-party frontier API calls for agent-mode queries. Each Composer training run — using production
      coding task data from 1M+ users — compounds quality while improving COGS per token relative to routing to external
      models.
    claimRefs:
      - C147
      - C151
      - C179
    calloutType: strength
  - title: MCP CVEs Signal Emerging Attack Surface
    body: >
      The disclosure of CVE-2025-54135 and CVE-2025-54136 highlights a new and growing attack surface created by
      integrating untrusted third-party MCP servers. As the Marketplace ecosystem grows, prompt injection via malicious
      MCP tools becomes a material risk for enterprise adopters, requiring ongoing security controls and governance.
    claimRefs:
      - C173
      - C160
    calloutType: risk
  - title: Cloud-Only Deployment Limits Regulated-Industry Expansion
    body: >
      Cursor's lack of on-premises or VPC deployment constrains adoption in industries with strict data residency
      requirements (defense, central banking, healthcare in some jurisdictions). Competitors offering private cloud or
      on-premises options may gain footholds in these segments despite Cursor's technical superiority.
    claimRefs:
      - C172
    calloutType: risk
  - title: Enterprise Organizational Integrations Create Switching Costs
    body: >
      NAB's development of NAB CEL on top of Cursor Rules, skills, and hooks — and Amplitude's full autonomous
      development pipeline built on Cursor Automations and Bugbot — represent deep organizational integrations that
      create durable enterprise switching costs beyond typical SaaS incumbency effects.
    claimRefs:
      - C165
      - C175
    calloutType: strength
