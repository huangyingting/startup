      Microsoft enterprise customers
    - >-
      Model API dependency: OpenAI and Anthropic API access could be restricted at any time; ~80-85% of COGS is
      third-party inference spend
    - >-
      Copyright and AI regulation: pending US and EU legislation on AI-generated code could require model rollbacks or
      licensing fees
    - 'Key-person concentration: four co-founders represent ~100% of technical decision-making for a 150-person team'
