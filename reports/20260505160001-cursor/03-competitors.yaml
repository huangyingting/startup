  - id: SEC003
    title: Moat Durability, Switching Costs, and Competitive Risk
    body: >
      Cursor's moat rests on three reinforcing factors: (1) workflow integration depth — developers who embed Cursor
      agents, Rules files, and custom MCP servers into daily workflows face meaningful relearning costs when switching,
      even if the underlying model is portable; (2) codebase indexing — Cursor's proprietary codebase index provides
      context-aware completions that improve with project history, creating a soft data lock-in; and (3) network effects
      via team collaboration features — shared rules and audit trails create organizational stickiness as teams
      standardize on Cursor. Against these moats, the primary risks are multi-homing and model commoditization. Surveys
      indicate developers commonly use two or more AI tools simultaneously, with Cursor often used for complex tasks
      while GitHub Copilot remains active in their editor [C090]. This multi-homing behavior limits Cursor's net revenue
      retention ceiling. The most significant structural risk is model access concentration: Cursor relies on Anthropic,
      OpenAI, Google, and xAI APIs for model inference, and while this provides flexibility, it also means competitors
      like Windsurf (post-OpenAI acquisition) could receive preferential access or pricing [C092]. Cursor's April 2026
      acquisition option from xAI (valued at $60B) suggests a possible future infrastructure tie-up, but the strategic
      direction remains uncertain [C093]. Switching costs for enterprise customers are moderate-to-high: enterprise
      teams that configure Role permissions, whitelist repositories, set up Audit Log pipelines, and integrate Cursor
      into CI/CD workflows face non-trivial migration effort [C085]. However, enterprise lock-in remains weaker than
      incumbents with deep platform integration (e.g., GitHub's native code review and CI/CD pipeline integration).
    claimRefs:
      - C083
      - C084
      - C085
      - C086
      - C087
      - C088
      - C089
      - C090
