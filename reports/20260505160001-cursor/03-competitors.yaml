callouts:
  - title: 'Critical Risk: OpenAI / Windsurf Vertical Integration'
    calloutType: risk
    body: >
      OpenAI's ~$3B acquisition of Windsurf (May 2025) represents the most significant competitive escalation to date.
      If OpenAI integrates its frontier models exclusively into Windsurf — or provides Windsurf preferential pricing and
      early model access — Cursor faces a structural disadvantage on model quality without a proprietary model of its
      own. Cursor's April 2026 xAI acquisition option is a possible hedge but introduces its own model-provider
      concentration risk. Investors should track model contract terms, any OpenAI–Cursor API exclusion provisions, and
      Cursor's timeline for building proprietary model capabilities.
    claimRefs:
      - C071
      - C076
      - C092
      - C093
  - title: 'Moat Strength: Workflow Depth and Enterprise Stickiness'
    calloutType: strength
    body: >
      Cursor's combination of SOC 2 Type II certification, enterprise admin controls (RBAC, audit log, repo whitelist,
      model whitelist), codebase indexing, and multi-agent orchestration creates a functionally deep integration that is
      hard to migrate away from once embedded in team workflows. Enterprise customers with customized Rules files, MCP
      server configurations, and audit integrations have meaningful switching costs. Cursor's 40K+ team base and 60%
      enterprise revenue share suggests this stickiness is already materializing in the customer cohorts.
    claimRefs:
      - C084
      - C085
      - C091
      - C097
