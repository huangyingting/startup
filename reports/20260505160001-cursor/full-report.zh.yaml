              12 月），Series C 9 亿 美元（估值 99 亿美元，2025 年 11 月），Series D 23 亿美元（估值 293 亿美元，2026 年 3
              月）[CI018]。鉴于公司正快速迈向毛利盈利，所融资本远超运营现金需求——资本主要服务战略目的： 在模型合作和计算基础设施中构建护城河、资助 xAI Colossus 训练合作，以及支撑企业销售体系 建设
              [CI019]。月度烧钱速度未公开披露；但以约 $2B ARR、接近毛利盈亏平衡且已融约 34.7 亿 美元的状态，即便在悲观烧钱假设下，Cursor 的隐含现金跑道也在数年以上。Series D 估值 293
              亿美元——若 2026 年 ARR 达到 20 亿美元，隐含约 15 倍远期 ARR 倍数；若实现 60 亿美元以上 预测，则约 5 倍。主要融资风险包括：若 Anthropic 或 OpenAI 提高 API
              定价的模型 API 成本 通胀（Cursor 拥有多年期合作协议，但条款未披露）、Composer 模型训练的算力成本上升，以及 xAI/SpaceX 算力合作带来的对政治敏感方的依赖
