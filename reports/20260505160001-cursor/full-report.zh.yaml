  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与 VS Code 基础
        blocks:
          - type: paragraph
            body: >
              Cursor 是 Visual Studio Code（VS Code）的分支版本，基于 Electron 构建，并有意继承 VS Code 的扩展生态、Language Server
              Protocol（LSP）基础设施和 TextModel 对象系统。这一架构选择显著降低上手摩擦：开发者保留设置、主题、快捷键和扩展，同时获得 Cursor 的 AI 层。该分支由 Anysphere
              规模小但高产的工程团队维护，团队监控上游 VS Code 安全补丁，并按风险评估合并。

              Cursor AI 架构的核心是影子工作区（shadow workspace），于 September 2024 引入。影子工作区作为隐藏的 Electron
              窗口运行，镜像用户文件系统但不改变活跃编码会话，让后台 AI 智能体获得完整 LSP
              访问（lint、类型错误、跳转定义），同时保持独立性、隐私、并发、普适性、可维护性和速度。它让智能体能在后台迭代代码，在每次编辑后检测 lint 错误，并在展示结果前自我修正。

              平台的代码库索引引擎会为整个代码库构建嵌入向量——可处理横跨数十万文件的数百万行代码——从而在已索引代码库上实现语义代码搜索。Cursor Rules 让团队能够编码项目特定指令、约定和上下文工程逻辑（例如
              NAB 基于 Cursor rules、skills 和 hooks 原语构建的 CEL library）。
