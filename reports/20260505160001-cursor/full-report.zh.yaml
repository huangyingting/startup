  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Cursor 所在的相关市场是 AI 辅助开发者工具——将大语言模型能力直接嵌入软件开发工作流，加速代码 编写、调试、审查和测试的软件。该市场有别于：（a）无深度编辑器集成的通用 AI
              聊天机器人（ChatGPT、 Gemini）；（b）不含 AI 功能的传统 IDE（VS Code、JetBrains）；（c）DevOps/CI/CD 平台（GitHub
              Actions、CircleCI）；以及（d）应用监控和可观测性工具。流入同一预算但不计入核心定义的相邻支出 包括 AI 代码审查自动化（如独立 PR 审查机器人）、AI 测试生成平台和 AI 文档生成工具。

              在 AI 开发者工具细分领域，市场按交付模式分层。两大主要类别为：IDE 原生 AI 编码工具（从零开始 围绕 AI 构建的全功能环境，如 Cursor、Windsurf），以及嵌入现有 IDE
              的编辑器扩展/插件（GitHub Copilot、Tabnine、Codeium、Amazon Q Developer）。Cursor 主要在 IDE 原生类别竞争，产品以 VS Code
              分支为基础构建；同时也能吸引从扩展型工具切换而来的跨类别买家。

              主要买家单元是个人软件开发者（直接 B2C）或工程团队（B2B 企业）。收入来源包括个人直接订阅 （PLG 自助服务）、由部门负责人或工程负责人付款的团队计划，以及由 IT 或采购部门管理的企业协议。
              在金融、医疗、国防等受监管行业，审批环节更多，往往附带数据驻留或本地部署要求。
