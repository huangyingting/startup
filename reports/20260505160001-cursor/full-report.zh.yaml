  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Cursor 所在的 AI 开发者工具类别变化很快，竞争对手呈多层结构：直接的 IDE 原生同业（Windsurf/Codeium，即将归 OpenAI 所有）、占主导地位的既有插件（GitHub
              Copilot，背靠 Microsoft）、超大规模云厂商原生工具（Amazon Q Developer、Google Duet AI）、企业隐私专家（Tabnine），以及 IDE 捆绑助手（JetBrains
              AI）。两股结构性力量定义竞争：（1）工具是独立 IDE 替代品，还是挂接到现有编辑器的插件；（2）供应商是否拥有底层 AI 模型，还是依赖第三方 API。Cursor 不依赖插件（独立 VS Code
              分支版本），目前也模型无关（通过 API 依赖 Anthropic Claude、OpenAI GPT-4 等），差异化来自用户体验（UX）深度和多智能体编排，而不是模型独占。市场正在快速整合：OpenAI 在
              May 2025 宣布以约 ~$3 billion 收购 Windsurf（原 Codeium）[CP001]，说明超大规模云厂商把 AI
              编码工具视为值得纵向整合的战略护城河。因此，随着同行获得更紧密的模型-工具集成，Cursor 缺少专有模型正在演变为竞争风险。
