        title: 图表
        blocks:
          - type: callout
            title: 版权与 IP 赔偿缺口是最高风险的法律问题
            body: >
              美国版权局 2025 年关于 AI 训练数据的第三部分报告，以及仍在进行的 Andersen v. Stability AI 诉讼，标志着 AI 版权执法的转折点。Cursor 没有面向企业客户公开的 IP
              赔偿政策，而 GitHub Copilot Enterprise 自 2023 年起已提供赔偿。在竞争性企业采购中，这一缺口是法律审查中的实质反对点，尤其是拥有 IP 敏感代码库的科技公司。Cursor 应把企业
              IP 赔偿政策作为近期产品-法律事项优先推进。
            calloutType: risk
            claimRefs:
              - CR004
              - CR005
              - CR008
              - CR029
              - CR042
          - type: callout
            title: xAI 收购选择权是单项最高严重度风险
            body: >
              如果 SpaceX 行使 $60B 收购选择权，Cursor 的独立产品路线图将从属于 Musk 企业，并触发欧盟 18-24 个月的反垄断审查周期，以及美国 DOJ/FTC
              可能的审查。更直接的是，企业采购决策已受影响：与 SpaceX 业务（卫星互联网、汽车、航空航天）竞争的安全敏感账户，有理性理由在收购清晰前暂停采用
              Cursor。该风险是二元且无法对冲的投资者风险；结果取决于创始人在选择权下的治理权，以及他们抵抗交易的意愿。
            calloutType: risk
            claimRefs:
              - CR015
              - CR016
              - CR034
          - type: callout
            title: 模型 API 依赖可控，但需要自有推理里程碑
            body: >
              Cursor 的毛利率改善轨迹（从 $200M ARR 时约 15%，到 $2B ARR 时接近转正）表明，模型 API 成本压缩是可实现的——但通往 70%+ SaaS 毛利率的路径，需要推理价格继续下降，或
              Cursor 大规模部署自有推理。Cursor 3 模型（2026 年 4 月）是自有模型开发的早期信号。如果到 2026 年底，自有模型推理能覆盖哪怕 30-40% 的补全，利润率风险就会明显下降。尽调应聚焦
              Cursor 的实际 API 支出构成和自有模型推理路线图。
            calloutType: recommendation
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR035
          - type: callout
            title: 未披露漏洞赏金或负责任披露政策
            body: >
              企业 CISO 供应商评估通常会纳入对供应商安全计划成熟度的评估：漏洞赏金计划、CVE 披露历史、负责任披露政策和安全研究者互动。Cursor 的安全页面披露了年度渗透测试和 SOC 2 Type
              II，但未提及漏洞赏金计划或 CVE 协调流程。对于一款会在客户开发环境中执行智能体代码的产品，缺少公开安全研究者计划，是相对于 Cursor 声称可服务 Fortune 500
              客户的企业安全姿态而言的重要缺口。
            calloutType: risk
            claimRefs:
              - CR030
              - CR041
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与入场背景
        blocks:
          - type: paragraph
            body: >
              Cursor 呈现了企业软件史上最有吸引力的增长故事之一：成立约 3 年实现 $2B ARR，是开发者 SaaS 有记录以来最快的 ARR 轨迹。Series D 以 $29.3B 估值，对应 Cursor 约
              14.7 倍追踪 ARR，这一倍数略低于 Datadog 公共市场溢价（约 17-22 倍），但隐含押注两件事：ARR 继续同比增长 150%+，以及毛利率从当前约 15-20% 大幅改善至企业 SaaS 常态的
              70%+。

              投资论点建立在四个支柱上：（1）Cursor 在 AI 编码中拥有定义品类的市场地位——100 万+ 付费用户、64-70% Fortune 500 渗透率（公司声称）、$2B ARR；（2）AI
              编码是由模型质量、上下文管理和工作流集成驱动的赢者通吃偏多市场——这些都是 Cursor 领先的领域；（3）从个人 Pro 用户到 Teams 再到 Enterprise 的企业扩张，已在具名账户中证明 3-6
              倍落地再扩张乘数；（4）自有模型推理（Cursor 3，2026 年 4 月）显示出改善利润率的路径，而这是支撑估值的关键。

              反论点同样有力：Microsoft 控制 VS Code 上游和 GitHub Enterprise，因此具备零增量成本捆绑等效功能的结构性能力；Cursor
              当前经济性显示毛利率接近零，意味着投资者为预计未来利润率扩张，相对当前经济价值支付了 5-7 倍溢价；SpaceX/xAI 收购选择权实际上把近期回报上限封在约 2 倍。
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs:
