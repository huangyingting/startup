              - CV029
              - CV031
      - number: '8.2'
        title: 可比估值与市场基准
        blocks:
          - type: paragraph
            body: >
              开发者工具 M&A 格局提供了三个关键数据点。GitHub 2018 年以 $7.5B、约 $200M ARR 被收购（37.5 倍），反映了全球代码仓库的战略平台价值。Windsurf 2025 年以
              $2.4B、约 $150-250M ARR 被 Google 收购（10-16 倍），为 AI 编码 IDE 收购确立了底线。Cursor 以 $29.3B 对应 $2B ARR（14.7
              倍）位于这一区间，反映出财务-战略混合倍数。

              公共市场可比公司显示，高增长开发者平台公司按 11-25 倍 ARR 交易：GitLab 为 11-12 倍（$760M ARR、同比增长 29%、NRR 124%），Datadog 为 17-22
              倍（$2.3B ARR、约 25% 同比增长），Cloudflare 为 25-30 倍（$1.6B ARR、强开发者定位）。如果毛利率改善兑现，Cursor 在 150%+ 同比增长下的 14.7
              倍，相比增长更低的同类公司显得定价保守。

              私有 AI 公司基准：Databricks 估值 $62B、约 $1.5B ARR（41 倍，毛利率 75%），OpenAI 估值 $300B、约 $4-5B ARR（60-75
              倍，反映模型层溢价）。这些先例说明，随着 Cursor 毛利率成熟，倍数有机会从 14.7 倍进一步扩张到 20-30 倍，在牛市情景下带来显著上行可选性。
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
              - CV021
