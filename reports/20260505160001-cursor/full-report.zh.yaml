      - number: '4.2'
        title: 收入牵引、单位经济与成本结构
        blocks:
          - type: paragraph
            body: >
              Cursor 的收入轨迹按任何 SaaS 基准看都异常突出。公司从 2023 的 $1M ARR 起步，在 January 2025 达到 $100M ARR（距首笔实质收入约 12 个月），June 2025
              达到 $500M ARR，November 2025 达到 $1B ARR，并在 February 2026 达到 $2B ARR [CI007]。这条从 $1M 到 $2B 的路径耗时约 36 个月，2025
              年期间收入大约每 2 个月翻倍。SaaStr 将 Cursor 认定为有记录以来从 $1M 增长到 $500M ARR 最快的 B2B SaaS 公司，超过 Wiz、Deel 和 Ramp 创下的以往纪录
              [CI008]。Sacra 估算 Cursor 在 April 2026 已达到轻微的毛利率盈利，并预测到 end-2026 年化收入运行率超过 $6B [CI009]。收入成本主要是 AI
              模型推理——Cursor 将查询路由到 Anthropic Claude、OpenAI GPT、Google Gemini 以及自有 Composer 模型，并按 token 支付 API
              费用，这是最大的单项成本。对行内代码补全等对延迟敏感的操作，Cursor 使用微调的混合专家（MoE）模型，在保持质量的同时降低每次调用推理成本 [CI010]。Cursor 推出了专有模型
              Composer（October 2025）和 Composer 2（March 2026），目标是随着时间推移降低对第三方 API 成本的依赖，并改善毛利率 [CI011]。销售和营销支出相对收入历来很低，因为
              Cursor 的增长高度产品驱动：免费层带来自然的开发者采用，付费转化在产品内发生。Koala 收购后，公司用不断扩大的直销团队补充企业销售，但相比传统企业 SaaS，CAC
              仍然较低，获客由口碑和开发者社区推荐支撑 [CI012]。员工人数约 150（截至 early 2026），意味着每名员工收入极高——按 $2B ARR 计算，超过每名员工 $13M
              ARR——这一数字反映了软件分发的轻资本属性和异常高的收入增长 [CI013]。基础设施成本主要基于 AWS，计算资源还由 SpaceX/xAI Colossus 模型训练合作补充 [CI014]。
