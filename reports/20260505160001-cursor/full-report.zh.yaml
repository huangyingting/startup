              - CV041
      - number: '8.3'
        title: 牛市 / 基准 / 熊市情景与回报分析
        blocks:
          - type: paragraph
            body: >
              牛市情景：Cursor 到 2026 年底达到 $8-10B ARR，毛利率在自有模型推理贡献 30-40% 补全的情况下改善到 40-50%，且 xAI 收购选择权未被行使。按 15 倍 ARR，Cursor
              估值为 $120-150B——相对 Series D 入场价隐含 4-5 倍回报，并在 2027-2028 年以 $100B+ 市值 IPO。这要求 ARR 持续同比增长 150%+，且没有来自
              Microsoft 或 API 访问限制的重大竞争冲击。

              基准情景：Cursor 到 2026 年底达到 $5-6B ARR，毛利率改善到 30-40%，并在 2028 年被 xAI 收购或 IPO，估值为 10-12 倍 ARR（$50-72B）。这意味着
              Series D 入场后 2-3 年获得 1.7-2.5 倍回报，约等同于 xAI 收购选择权底价。对于要求 3 倍+ 回报的后期 VC 基金，如果 IPO 时没有显著倍数扩张，基准情景无法达到回报门槛。

              熊市情景：ARR 减速至 $3-4B（Microsoft 捆绑、API 限制），毛利率停留在 15-25%，风险偏好回落时倍数重置到 8 倍。Cursor 交易估值为 $24-32B，低于 $29.3B
              Series D 入场价，导致最新轮投资者亏损。在这一情景下，较早轮、较低估值投资者仍可实现正回报，而 Series D 投资者承受 10-20% 损失。
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs:
