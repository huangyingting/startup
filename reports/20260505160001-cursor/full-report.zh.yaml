    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Anysphere, Inc. 以 Cursor 作为产品品牌运营。公司注册于 Delaware，总部位于 San Francisco, California。公司由 Michael
              Truell（CEO）、Sualeh Asif（CPO）、Aman Sanger（COO）和 Arvid Lunnemark（联合创始人；October 2025 卸任 CTO）于 2022
              创立；四人在注册公司时都是 MIT 学生。核心产品 Cursor 是一款 AI 原生集成开发环境（IDE），基于 Microsoft 开源的 Visual Studio Code 分支版本构建，并叠加生成式 AI
              能力，包括多智能体执行、全代码库语义搜索，以及名为 Composer 的专有模型。商业模式主要是经常性订阅（SaaS）：个人计划为
              $0/month（Hobby）、$20/month（Pro）、$60/month（Pro+）和 $200/month（Ultra）；团队计划为
              $40/user/month（Business）；企业合同采用定制价格。Cursor 所在的 AI 开发者工具赛道竞争对手包括 GitHub
              Copilot（Microsoft）、Windsurf/Codeium（被 OpenAI 收购）、Amazon Q Developer 和 Claude
              Code（Anthropic）。其产品驱动增长模式几乎完全依赖口碑和开发者病毒式采用；据称营销支出接近于零。[CO001][CO002][CO003]
