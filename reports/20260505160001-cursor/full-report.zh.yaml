  - id: TV005
    title: 论点破裂与否决触发项表
    columns:
      - 触发项
      - 阈值 / 事件
      - 对论点的传导
      - 行动含义
    rows:
      - - OpenAI/Anthropic API 限制
        - 任何限制 IDE 转售商的公开公告
        - 论点破裂：收入成本（COGS）飙升 + 产品中断
        - 立即卖出信号；论点变得不可投资
      - - Microsoft Copilot 达到同等水平的公告
        - 开发者调查显示 VS Code + GitHub Copilot Workspace 追平 Cursor Tab+Agent
        - Microsoft 企业账户市场份额被侵蚀；年经常性收入（ARR）停滞风险
        - 降低仓位；重新评估竞争护城河评分
      - - xAI 收购交割
        - 签署最终收购协议
        - 回报被 $60B 封顶（约 2x）；企业客户流失风险上升
        - 评估治理权利；建模收购后退出时点
      - - $4B 年经常性收入（ARR）时毛利率停在 30% 以下
        - $4B+ 年经常性收入（ARR）时连续两个季度毛利率 <30%
        - 估值叙事崩塌；IPO 路径延后到 2028 年以后
        - 论点受损；信心从买入下调至持有
      - - 企业净留存率（NRR）低于 100%
        - 季度数据确认企业客户群组净留存率（NRR）低于 100%
        - 先落地再扩张飞轮失效；年经常性收入（ARR）增长大幅减速
        - 立即复核；若趋势持续 2 个季度，可能卖出
      - - 重大安全泄露
        - 企业数据泄露归因于 Cursor 智能体管线
        - 企业采购信任崩塌；监管调查
        - 高紧迫度卖出信号；公司需要 12-18 个月恢复
    claimRefs:
      - CV028
      - CV026
      - CV023
      - CV022
      - CV016
    notes: 否决触发项是投委会监测的咨询性指标，不是有约束力的卖出义务。
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - GAAP 毛利率与收入成本（COGS）拆分
        - 按供应商（OpenAI、Anthropic、Google）拆分的精确模型 API 支出
        - 最重要的估值驱动因素；没有该数据，无法验证毛利率改善论点
        - Cursor CFO；财务模型资料室
      - - Series D 轮治理条款
        - 收购否决权、董事会席位、反稀释条款
        - 没有否决权，xAI 收购回报上限就有约束力；若要支撑 3x+ 论点，治理权利不可谈判
        - Cursor 总法律顾问；条款清单审查
      - - 年经常性收入（ARR）队列数据（按分部净留存率（NRR））
        - 企业层净留存率（NRR）、Pro 层流失率、队列留存曲线
        - 验证先落地后扩张飞轮；企业净留存率（NRR）若未超过 130%，年经常性收入（ARR）增长叙事会削弱
        - Cursor 收入副总裁；数据室
      - - 自有模型推理路线图
        - Cursor 3 覆盖率 %，自有模型贡献 30-40% 补全的时间表
        - 通往 50%+ 毛利率的主路径；若没有可信计划，估值溢价站不住脚
        - Cursor CTO；产品路线图评审
      - - FedRAMP 投资计划
        - FedRAMP ATO 申请状态与时间表
        - 没有 FedRAMP，企业总可用市场（TAM）中 15-25% 无法覆盖；可观年经常性收入（ARR）上行空间被锁住
        - Cursor CISO；合规路线图评审
      - - Koala 收购条款
        - 交易价格、对赌结构、整合时间表
        - 对 Series D 的稀释影响；PLG 基础设施整合风险
        - Cursor 企业发展；M&A 条款清单
    claimRefs:
      - CV029
      - CV024
      - CV042
    notes: 优先顺序反映各项对投资决策信心的影响。所有事项都是以 $29.3B 入场必须打穿的一票否决型尽调。
