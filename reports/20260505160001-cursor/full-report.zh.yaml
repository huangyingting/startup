      - number: '5.2'
        title: 专有 AI 模型 — Cursor Tab 与 Composer 系列
        blocks:
          - type: paragraph
            body: >
              与主要把请求路由到第三方前沿模型的竞争对手不同，Cursor 已构建并维护两类专有 AI：Cursor Tab（补全模型）和 Composer 系列（智能体推理模型）。

              Cursor Tab 是经过微调的 fill-in-the-middle（FIM）模型，用强化学习训练，擅长多行、多文件补全。Tab 会在每次建议被接受后预测下一个编辑位置，在 TypeScript/Python
              中自动导入未解析符号，并建议完整 diff，而不是单个 token。

              Composer 系列是混合专家（MoE）语言模型系列，在生产编码环境中用 RL 大规模训练。Composer 被赋予编辑、terminal、grep
              和语义搜索工具访问权，并通过反映真实软件工程质量的奖励模型优化。训练基础设施使用自定义 MXFP8 内核，结合专家并行和混合分片数据并行，跨数千块 NVIDIA GPUs（PyTorch +
              Ray）运行。warp decode kernel（April 2026）进一步通过围绕输出而非专家重组计算，在 Blackwell GPUs 上实现 1.8x 更快的 MoE 解码。

              Composer 2（March 2026）在 CursorBench 上达到 61.3、Terminal-Bench 2.0 上达到 61.7、SWE-bench Multilingual 上达到
              73.7——以 $0.50/M 输入和 $2.50/M 输出 tokens（标准）或 $1.50/$7.50（快速变体，生成速度快 4×）提供前沿水平分数。配套的 Cursor Bench 内部评估基于
              Cursor 工程师的真实工程请求，为持续 RL 训练运行设定质量门槛。Cursor 还在同一智能体执行框架中暴露所有主要前沿模型（Claude Sonnet、GPT-5、Gemini Flash
              2.5、Qwen Coder），供用户选择。
