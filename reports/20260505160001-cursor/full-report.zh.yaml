  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              Cursor（Anysphere, Inc.）通过分层订阅模式变现，面向个人开发者和企业团队，并对重度智能体 工作负载辅以超量按使用付费和 API token 定价。产品采用 Freemium 模式：Hobby
              套餐免费，AI 使用量有限（每月 2000 次代码补全），旨在驱动漏斗顶部的开发者采纳和转化。Pro 套餐 $20/月， 解锁扩展智能体限额和前沿模型访问。Pro+ $60/月（OpenAI、Claude 和
              Gemini 模型 3 倍使用量）， 服务日常智能体用户。Ultra $200/月，相较 Pro 提供 20 倍使用量，针对运行多文件智能体工作流的 高级用户。Teams
              $40/用户/月，叠加企业管控功能——集中计费、管理员仪表板、RBAC 及 SAML/OIDC SSO——与企业定制合同共同构成主要企业获客载体 [CI001]。Cursor 还推出了自研 AI
              模型：Composer 2（2026 年 3 月）按 API token 定价——标准版 $0.50/M 输入、$2.50/M 输出， 快速版 $1.50/M 输入、$7.50/M
              输出——实现随智能体工作负载复杂度扩展的按量收入，不再受限于 固定订阅 [CI002]。计费架构已从纯粹按席位 SaaS 转向混合模式，重度工作负载按比例产生更多 收入，降低了 2025 年 7
              月定价争议所暴露的重度用户定价偏低风险。截至 2026 年初，企业和 公司客户约贡献 60% 总收入，反映出自 2025 年 7 月 Koala 收购以来，从开发者主导自助模式 向企业主导合同的快速转型
              [CI003]。
