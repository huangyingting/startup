      - number: '7.2'
        title: 运营、安全与技术风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的运营风险集中在三个相互叠加的因素：信任敏感界面上的 AI 幻觉、扩大的智能体攻击面，以及 VS Code 分叉带来的技术债。

              2025 年 4 月的支持机器人事件——Cursor 的 AI 编造了禁止竞品工具的政策——暴露出公司在面向客户部署中易受 AI 生成错误信息影响。虽然即时企业影响有限，但事件说明 Cursor
              的运营也暴露在它为客户开启的同类 AI 失效模式下。如果在企业支持或智能体场景中发生第二次、更大的事故（例如智能体基于幻觉指令对生产代码库执行不可逆操作），可能引发重大企业责任和采购暂停。

              OWASP LLM Top 10 框架将提示注入（LLM01）和过度自主性（LLM06）列为 AI 编码 IDE 的关键风险。Cursor Automations 和 Agent mode
              会执行带有文件系统和终端访问权限的多步智能体流水线，因此 OWASP LLM06 敞口更高。接入 MCP 第三方工具服务器进一步扩大了信任边界：恶意 MCP 服务器可能外泄凭证，或注入指令导致 Cursor
              的智能体修改生产基础设施。Cursor 尚未披露细粒度 MCP 权限控制或智能体动作审计日志。

              随着 Microsoft 持续演进上游 VS Code，VS Code 分叉会形成递增技术债。Cursor 的差异化功能（shadow workspace、Composer 多文件智能体）实现于 VS Code
              和 Electron 的分叉中。如果 Microsoft 原生向 VS Code 添加等效智能体功能——Copilot Chat 已逐步这样做——Cursor
              的差异化会收窄，而分叉维护负担会增加。风险不对称：Microsoft 控制上游，Cursor 不控制。
