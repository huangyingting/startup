      - number: '6.2'
        title: 采用轨迹与增长佐证
        blocks:
          - type: paragraph
            body: >
              Cursor 的 ARR 增长轨迹堪称 B2B 软件史上最快之列。Anysphere ARR 从约 $4M（2024 年 4 月）增至 $48M（2024 年 10 月），六个月扩张 12 倍；随后于 2025
              年 1 月达到 $100M，2025 年 4 月达到 $200M（三个月翻倍），2025 年 6 月 $500M，2025 年 11 月 $1B，2026 年 2 月 $2B。从 $100M 到 $2B ARR
              历时约 13 个月，约扩张 20 倍。

              付费个人用户在 ARR $200M 阶段（2025 年 4 月）约达 72 万，折算年均 ARPU 约 $277。2025 年底 Anysphere 宣布付费用户突破 100 万。2025
              年全年企业化扩张明显提速：Anysphere 在 2024 年底招募第一位专职销售，至 2025 年 4 月企业 GTM 团队已扩至 7 人（据 Sacra），而竞品 Windsurf/Codeium 同期拥有
              75 人销售团队。精简的 GTM 结构折射出 Cursor 依赖底层开发者自传播，而非传统企业销售驱动。

              2024 年 12 月，Cursor 已进入 OpenAI、Midjourney、Perplexity、Replicate、Shopify 和 Instacart 等知名企业。至 2025
              年，客户版图进一步扩展至 NVIDIA（全公司 40,000 名工程师）、Coinbase（2025 年 2 月全员覆盖）、NAB（6,000+
