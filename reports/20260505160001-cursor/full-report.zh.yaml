      - CV030
      - CV029
      - CV031
  - id: FV002
    title: 估值敏感性——ARR 倍数 vs. ARR 规模
    type: bar
    layout: standard
    summary: >
      柱状图展示 Cursor 在不同 ARR 里程碑（$3B、$5B、$6B、$8B、$10B）和三种 ARR 倍数情景（8x 悲观、12x 基准、15x 乐观）下的隐含估值。水平参考线为 $29.3B（Series D
      入场）。图中说明哪些 ARR 与倍数组合可产生高于 Series D 入场价格的回报，以及盈亏平衡点在哪里。
    data:
      items:
        - label: $3B ARR，按 8x
          value: 24
        - label: $3B ARR，按 12x
          value: 36
        - label: $5B ARR，按 8x
          value: 40
        - label: $5B ARR，按 12x
          value: 60
        - label: $6B ARR，按 10x
          value: 60
        - label: $6B ARR，按 15x
          value: 90
        - label: $8B ARR，按 10x
          value: 80
        - label: $8B ARR，按 15x
          value: 120
        - label: $10B ARR，按 15x
          value: 150
    claimRefs:
      - CV007
      - CV032
      - CV035
      - CV040
      - CV041
    notes: 数值单位为十亿美元。低于 29.3 的柱表示 Series D 入场后的亏损情景；高于 29.3 的柱表示正回报。
  - id: FV003
    title: 估值与回报区间——乐观 / 基准 / 悲观
    type: range
    layout: compact
    summary: |
      区间图展示三种情景（悲观、基准、乐观）各自相对于 $29.3B Series D 入场价格的估值低—高区间和隐含回报倍数。条目按从最差（悲观）到最好（乐观）排序。
    data:
      items:
        - label: 悲观情景（25% 概率）：$3-4B ARR，按 8x
          low: 24
          high: 32
        - label: 基准情景（55% 概率）：$5-6B ARR，按 10x
          low: 50
          high: 60
        - label: 乐观情景（20% 概率）：$8-10B ARR，按 15x
          low: 120
          high: 150
    claimRefs:
      - CV037
      - CV019
      - CV033
      - CV044
    notes: 数值单位为十亿美元。Series D 入场价为 $29.3B。悲观情景意味着从 Series D 入场计算为 0.8-1.1x；基准为 1.7-2.1x；乐观为 4.1-5.1x。
