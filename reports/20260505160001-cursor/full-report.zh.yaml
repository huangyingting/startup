      - number: '7.4'
        title: 财务、人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的财务风险集中在 COGS 轨迹和资本充足性。公司在融资 $3.47B 后，直到 2026 年 4 月才达到轻微毛利率盈利；要实现 GAAP
              盈利，还需要进一步优化模型成本或部署自有模型推理。如果模型 API 价格企稳或上涨（逆转 2023-2025 年推理成本下降趋势），Cursor 实现持续盈利的路径会拉长，资本需求也会增加。

              Cursor 约 150 名员工支撑 $2B+ ARR，单员工收入（约 $13M+）异常高，但在企业规模下不可持续。企业客户需要专属客户成功、安全审查、专业服务和合规团队——这些在 Cursor
              当前人员结构中并不明显。随着交易规模扩大、采购复杂度上升，企业 go-to-market 基础设施缺位会变成留存和扩张风险。

              关键人物集中度极高：四位联合创始人经营公司，其下没有公开披露的领导梯队。任何一位创始人流失——无论因收购分心、离职还是健康事件——都会在 Cursor 超高速增长阶段放大组织不确定性。xAI
              收购选择权还引入创始人一致性风险：如果任何创始人更倾向 xAI 交易而非独立建公司，这种张力可能体现在产品路线图决策或招聘上。
