              Cursor 的 go-to-market 完全直销：截至 2026 年 5 月，未公开宣布渠道经销商、系统集成商合作或 marketplace
              分销合作。这既形成护城河（与工程领导者的直接关系），也带来扩张约束（GTM 人员必须扩张以服务企业账户）。Koala 收购（2025 年 7 月）加入了 PLG
              优化团队，用来在企业销售团队扩张的同时维持自下而上的开发者动作。

              价格敏感性是已观察到的风险：2025 年 4 月的定价争议（Cursor 的 AI 支持机器人编造一台机器政策，用户认为公司暗中涨价）引发了显著社交媒体反弹和 HN 讨论。未来对个人 Pro
