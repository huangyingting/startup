  - id: FU004
    title: Cursor 关键客户指标 KPI 记分卡
    type: kpi
    layout: compact
    summary: |
      关键绩效指标汇总截至 May 2026 的客户牵引力支柱：付费用户数、年经常性收入（ARR）、企业团队数、具名 Fortune 级客户，以及企业收入占比。所有数值都是第三方估计，或公司声称并在本章来源中引用的数字。
    data:
      items:
        - label: 付费用户
          value: ~1M+
          score: 9
        - label: 年经常性收入（ARR，年化）
          value: $2B (Feb 2026)
          score: 10
        - label: 企业团队
          value: 40K–50K+
          score: 8
        - label: Fortune 500/1000 渗透
          value: 64–70% (company-claimed)
          score: 7
        - label: 企业收入占比
          value: ~60%
          score: 7
        - label: ARR 增长（13 个月）
          value: 20× ($100M→$2B)
          score: 10
    claimRefs:
      - CU001
      - CU003
      - CU004
      - CU005
      - CU006
  - id: FR001
    title: 风险热力图——发生可能性 vs. 影响
    type: matrix
    layout: standard
    summary: |
      热力图展示 May 2026 对 Cursor 主要风险类别的影响—可能性评估。行代表风险类别；列代表影响严重程度（低、中、高、很高）。单元格描述该可能性—严重程度交叉点上的具体风险，便于排定缓释重点和尽调问题优先级。
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 很高影响
      rows:
        - label: 高可能性
          values:
            - label: —
              tone: neutral
            - label: EU AI Act/GDPR 合规摩擦
              tone: risk
            - label: 模型 API 成本波动；FedRAMP 缺口
              tone: risk
            - label: Microsoft Copilot 捆绑定价竞争
              tone: risk
        - label: 中等可能性
          values:
            - label: AWS/GCP 基础设施宕机
              tone: neutral
            - label: 面向客户界面的 AI 幻觉
              tone: risk
            - label: 提示注入 / 智能体安全漏洞利用；VS Code fork 失效；版权判例
              tone: risk
            - label: xAI 收购引发企业流失；API 访问受限
              tone: risk
        - label: 低可能性
          values:
            - label: —
              tone: neutral
            - label: 规模化招聘失败
              tone: neutral
            - label: 企业客户发起 IP 赔偿诉讼
              tone: risk
            - label: 创始人离职；重大安全事件
              tone: risk
