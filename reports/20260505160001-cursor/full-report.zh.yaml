  - id: FV001
    title: 推荐逻辑——从证据到投资决策
    type: flow
    layout: standard
    summary: |
      决策流程图追踪 Cursor 核心证据支柱（增长、企业渗透、竞争位置、财务轨迹），再经过关键风险考量，抵达有条件投资建议。该流程明确列出必须满足哪些尽调条件，选择性买入立场才会变成无条件买入。
    data:
      nodes:
        - id: n1
          label: 市场：$4-34B 总可用市场（TAM），定义 AI IDE 品类
        - id: n2
          label: 证据：$2B ARR，13 个月内 20x，渗透 Fortune 500
        - id: n3
          label: 护城河：深度企业集成、PLG 飞轮、自有模型开发
        - id: n4
          label: 经济性：毛利率近零；COGS = 模型 API
        - id: n5
          label: 风险：xAI 2x 上限、Microsoft 捆绑、API 限制、无 FedRAMP
        - id: n6
          label: 估值：14.7x ARR——可辩护，但按完美执行定价
        - id: n7
          label: 尽调条件：阻止 xAI 收购的治理权
        - id: n8
          label: 尽调条件：确认毛利率提升至 40%+ 的路线图
        - id: n9
          label: 尽调条件：验证企业净留存率（NRR）>130%
        - id: n10
          label: 有条件买入（若条件满足，3x+ 投资逻辑仍成立）
        - id: n11
          label: 放弃（条件不满足 → 2x 回报上限不可接受）
      edges:
        - from: n1
          to: n6
          label: 市场支撑溢价
        - from: n2
          to: n6
          label: 增长支撑 ARR 倍数
        - from: n3
          to: n6
          label: 护城河部分支撑估值
        - from: n4
          to: n5
          label: 利润率风险放大财务风险
        - from: n5
          to: n6
          label: 风险限制倍数扩张
        - from: n6
          to: n7
          label: 需要对 xAI 的否决权
        - from: n6
          to: n8
          label: 需要确认利润率
        - from: n6
          to: n9
          label: 需要验证 NRR
        - from: n7
          to: n10
          label: 条件满足
        - from: n8
          to: n10
          label: 条件满足
        - from: n9
          to: n10
          label: 条件满足
        - from: n7
          to: n11
          label: 条件不满足
