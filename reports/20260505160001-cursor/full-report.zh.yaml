      - number: '7.3'
        title: 伙伴、依赖与竞争风险
        blocks:
          - type: paragraph
            body: >
              Cursor 最集中的风险，是对 OpenAI、Anthropic 和 Google Gemini 三家模型 API 的依赖。在 $200M ARR 阶段，模型 API COGS 约占收入 80-90%；到
              $500M ARR 阶段，Sacra 估计已降至约 60-65%。尽管有所改善，Cursor 仍缺少自托管推理兜底，无法防御模型提供商单方面涨价。OpenAI 和 Anthropic
              都在构建自己的开发者工具（OpenAI Canvas、Anthropic Projects / Claude.ai），从结构上有动机最终限制或降低竞争应用层的 API 访问优先级。

              SpaceX/xAI 收购选择权是严重程度最高的伙伴风险。2026 年 4 月披露的 $60B 选择权——SpaceX 持有到年底前收购 Cursor 的双边权利——会让 Cursor
              最大竞争对手客户的企业采购陷入停滞。与 SpaceX、Tesla 或 xAI 业务直接竞争的公司，可能拒绝在全企业范围部署 Cursor。欧盟反垄断审查可能需要 18-24
              个月，并制造长期不确定性。如果收购完成，Cursor 将成为 xAI/Grok 之外 Musk AI 帝国的一部分，可能赶走原本抗拒供应商集中的客户。

              Microsoft 的 Copilot 捆绑是结构性威胁：GitHub Copilot 已包含在 GitHub Enterprise Cloud（$21/用户/月）中，不需增量成本，并集成进 Microsoft
              365 E3/E5 许可证。这会形成价格压力，Cursor 的 $40-200/用户定价在以 Microsoft 为中心的企业账户中难以抵消。Amazon Q Developer 符合 FedRAMP 路径，并与
              AWS 开发者工具链集成，使其成为 AWS 重度、受监管行业账户的默认选择。两个竞争对手都有结构性优势，Cursor 很难只靠产品速度复制。
