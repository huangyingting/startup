              创始团队由四名 MIT 学生组成，他们在 2022 注册成立 Anysphere，并在 October 2023 获得首笔外部资本前做出了早期原型。Michael
              Truell（CEO）负责战略和产品愿景；Sualeh Asif（CPO）负责产品；Aman Sanger（COO）负责运营和市场进入。Arvid Lunnemark 是公司联合创始人，并担任 CTO 至
              October 2025，随后离开公司创办聚焦安全的 AI 研究实验室 Integrous Research。他的离任是一个被明确记录的关键人风险。Series D 之后（November
              2025），每位原始联合创始人约持有公司 4.5%，按 $29.3B 估值计算，四人都成为纸面上的亿万富翁。董事会构成未公开披露；根据投资条款，Andreessen Horowitz（Series
              A）、Thrive Capital（Series C 领投）以及 Accel/Coatue（Series D 联合领投）推测为董事会观察员或董事。战略投资者 Google 和 Nvidia 也参与了 Series
