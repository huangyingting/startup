      - number: '8.4'
        title: 估值立场、建议与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              估值立场：为增长定价，安全边际有限。Cursor 在 $2B ARR、毛利率接近零的情况下按 14.7 倍 ARR 定价，已纳入实质利润率改善和持续超高速增长，但这种增长尚未持续超过 13
              个月。估值可以辩护，但要求相信两个未经证明的假设：（1）随着自有模型推理规模化，毛利率将达到 60%+；（2）在 Cursor 的企业飞轮自我维持前，Microsoft 不会动用其捆绑优势。

              建议：有条件选择性买入。对于投资期 3-5 年、回报目标 3 倍+ 的后期成长基金，投资成立的前提是：（a）投资者获得治理权，能参与或阻止 xAI 收购决策；（b）投前尽调确认 12 个月路线图中毛利率改善到
              35%+；（c）ARR 分群数据确认企业层 NRR >130%。无法满足这些条件的投资者，应在 $29.3B 估值下 PASS。

              风险评级：高。毛利率接近零、Microsoft/Copilot 这一生存级竞争对手、xAI 收购回报上限，以及模型 API 依赖叠加，使风险画像显著高于企业 SaaS 投资中位数。增长轨迹能部分补偿，但
              $29.3B 估值下安全边际很薄。

              优先尽调问题：（1）GAAP 财务模型（P&L、按分群拆分的毛利率、按模型提供商拆分的 COGS）；（2）Series D 治理条款（收购否决权、董事会席位）；（3）按客户细分的 ARR 分群留存和 NRR
              数据；（4）FedRAMP 投资计划和时间表；（5）自有模型推理部署路线图及 ARR% 覆盖目标；（6）Koala 收购 earnout 条款和稀释影响。
            claimRefs: []
