      - number: '6.2'
        title: 采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >
              Cursor 的年经常性收入（ARR）轨迹，是 B2B 软件史上有记录以来最快的一批。Anysphere 的 ARR 从约 $4M（2024 年 4 月）增长到 $48M（2024 年 10 月）——六个月扩张
              12 倍——随后在 2025 年 1 月达到 $100M，2025 年 4 月达到 $200M（三个月翻倍），2025 年 6 月达到 $500M，2025 年 11 月达到 $1B，2026 年 2 月达到
              $2B。从 $100M 到 $2B ARR 约 13 个月，约扩张 20 倍。

              付费个人用户数在 $200M ARR 阶段（2025 年 4 月）达到约 720,000，对应当时年均每用户收入（ARPU）约 $277。到 2025 年末，Anysphere 报告付费用户超过 100
