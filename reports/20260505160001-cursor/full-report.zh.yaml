  - id: TM004
    title: 增长驱动因素与制约因素
    columns:
      - 因素
      - 类型
      - 方向
      - 时机
      - 影响幅度
      - 含义
      - 尽调问题
    rows:
      - - 开发者生产力ROI（据GitHub/微软数据，效率提升55%）
        - 驱动因素
        - 正向
        - 当前
        - 高
        - ROI已经验证，加速企业采用，提升付费意愿
        - 核实Cursor专属效率研究；与GitHub Copilot基准对比
      - - AI模型质量提升（Claude 3.7、GPT-4o、Gemini 2.0）
        - 驱动因素
        - 正向
        - 持续
        - 高
        - 更好的模型无需Cursor额外研发即可提升产品质量，驱动有机升级
        - 评估Anthropic/OpenAI若限制模型访问的依赖风险
      - - 向多智能体/自主编程的转变
        - 驱动因素
        - 正向
        - 1至2年
        - 极高
        - 产品从"助手"升级为"AI开发者"，ARPU跃升空间大
        - 追踪智能体采用指标；评估20亿美元ARR中智能体与内联功能各占多少
      - - 企业AI强制要求/董事会压力
        - 驱动因素
        - 正向
        - 当前
        - 高
        - CIO迫于展示AI ROI的压力；开发工具是对董事会最可见、落地最快的AI
        - 核实企业级交易管道及试用转付费转化情况
      - - PLG向企业销售模式的成熟转型
        - 驱动因素
        - 正向
        - 当前
        - 高
        - 财富500强中64%已自下而上采用，形成低摩擦的企业追加销售
        - 核实企业ACV增速及企业客群流失率
      - - 开发者信任/准确性质疑（据SO 2024，31%持怀疑态度）
        - 制约因素
        - 负向
        - 当前
        - 中
        - 失望的早期用户拖慢口碑扩散；好感度同比从77%降至72%
        - 监控NPS、流失率及流失用户的复活率
      - - 企业中的数据隐私与知识产权合规摩擦
        - 制约因素
        - 负向
        - 当前
        - 高
        - 企业采购要求SOC 2、隐私模式、数据驻留；销售周期延长至6至18个月
        - 确认合规路线图；追踪受监管行业的成交情况
      - - 版权/知识产权责任风险（GitHub Copilot诉讼）
        - 制约因素
        - 负向
        - 1至3年
        - 中高
        - AI代码输出的法律问题悬而未决，可能引发产品责任；Cursor面临类似的训练数据风险敞口
        - 就训练数据实践寻求法律意见；评估面向企业客户的赔偿政策
      - - 微软/GitHub Copilot在M365 / Azure中的捆绑销售
        - 制约因素
        - 负向
        - 当前
        - 中高
        - GitHub Copilot捆绑进企业协议形成捆绑压力；切换成本低，但用户惯性强
        - 追踪NDR及与GitHub Copilot竞争性交易的赢单率
      - - 市场整合（OpenAI约30亿美元收购Windsurf，2025年）
        - 制约因素
        - 负向
        - 1至2年
        - 高
