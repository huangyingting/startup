        - 自研模型质量测试不达标；仍须依赖 OpenAI/Anthropic
      - - 反向逻辑：Microsoft 结构性捆绑威胁
        - Copilot 已捆绑在 GitHub Enterprise、VS Code、M365 中，零增量成本
        - Microsoft 将 GitHub Copilot 从企业套餐中解绑（可能性低）
      - - 反向逻辑：近零毛利率
        - ARR 20 亿美元时毛利率约 15-20%；12-18 个月内无 GAAP 盈利
        - 18 个月内毛利率经确认超过 50%
      - - 反向逻辑：xAI 收购回报上限
        - 600 亿美元收购期权将 D 轮近期上行空间封顶在约 2 倍
        - 收购期权到期失效或 IPO 后重新谈判
      - - 反向逻辑：API 访问限制
        - OpenAI/Anthropic 与应用层工具的竞争日益加剧
        - 两家提供商公开承诺长期开放 IDE 转售商 API 访问
