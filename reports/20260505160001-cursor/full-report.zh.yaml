            body: >
              用户层面的收入集中风险较低（100 万+ 付费用户限制了单账户集中度），但企业账户层面的集中度有所上升。约 64-70% 的财富 500/1000 强公司据称已采用 Cursor，最大账户（NVIDIA
              40,000+ 名工程师、NAB 6,000+ 名且计划扩至 10,000+）在收入中可能各占相当比例。公开数据中不含前 10 大客户集中度信息。

              Cursor 的 GTM 完全依赖直销：截至 2026 年 5 月，尚无公开宣布的渠道经销商、系统集成商合作或 Marketplace 分发合作。这既构成护城河（与工程负责人的直接关系），也形成规模化约束（GTM
              人员编制须随企业账户扩张而增长）。2025 年 7 月完成的 Koala 收购为 PLG 优化团队补充了力量，以在企业销售团队持续扩张的同时维系底层开发者驱动模式。

              定价敏感性是一个已观察到的风险：2025 年 4 月的定价风波（Cursor AI 客服机器人捏造了"一台机器"政策，用户感知到变相涨价）引发了大量社交媒体反弹和 HN 讨论。个人 Pro
