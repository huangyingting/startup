              - CR023
      - number: '7.5'
        title: 风险缓解、投资逻辑破坏触发条件及尽调清单
        blocks:
          - type: paragraph
            body: >
              Cursor 已具备若干有实质意义的风险缓解措施。SOC 2 Type II 为商业企业账户提供合规基线。Privacy Mode（ZDR）回应了隐私敏感企业的数据驻留顾虑。三模型 API
              架构提供了对单一供应商故障的冗余保障。Cursor 的 PLG 增长势能在 2025 年 4 月机器人事件和广泛竞争压力下均表现出韧性，事件后 ARR 加速回升。

              可能从根本上改变投资逻辑的触发条件包括：（1）OpenAI 或 Anthropic 限制对 AI 编程 IDE 转售商的 API 访问；（2）Cursor
              智能体管道发生重大安全漏洞或供应链注入，造成企业数据泄露；（3）xAI 收购完成并引发大量企业客户流失；（4）微软在 VS Code 中原生内置高级智能体编程功能且无需额外付费；（5）版权不利判例要求
              Cursor 为企业客户的 AI 生成代码承担赔偿责任。

              优先尽调清单：（1）Cursor 企业协议条款，包括 IP 赔偿条款；（2）实际毛利率及按模型供应商分解的 COGS；（3）事件响应和漏洞赏金计划详情；（4）FedRAMP 路线图及时间表；（5）MCP
              权限控制架构及智能体操作审计日志；（6）创始人归属计划及 xAI 选择权下的收购锁定条款。
            claimRefs: []
