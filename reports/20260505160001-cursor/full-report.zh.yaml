              Anysphere 在约 28 个月内通过五轮融资累计获得约 34.7 亿美元股权融资。2023 年 10 月的种子轮融资 800 万美元，由 OpenAI Startup Fund 领投，知名天使投资人包括
              Nat Friedman（前 GitHub CEO）和 Arash Ferdowsi（Dropbox 联合创始人）。2024 年 8 月，Andreessen Horowitz 领投 6000 万美元
              Series A，投后估值 4 亿美元。2024 年 11 月，公司成为多方竞相争投的对象，Benchmark、Index Ventures 等机构据报道将 Anysphere 的估值定在约 25 亿美元。

              2025 年 1 月，Anysphere 完成 1.05 亿美元 Series B，估值 26 亿美元。2025 年 6 月，Thrive Capital 领投 9 亿美元 Series C，投后估值 99
              亿美元——彼时公司 ARR 已超过 5 亿美元。2025 年 11 月 13 日，Anysphere 完成 23 亿美元 Series D，由 Accel 和 Coatue 联合领投，估值 293 亿
              美元；Google 和 Nvidia 作为战略投资方参与其中。2026 年初，Bloomberg 和 The Information 报道 Anysphere 正在洽谈以 500 亿至 600 亿美元估值融资约
