      - number: '5.5'
        title: 技术差异化与平台护城河
        blocks:
          - type: paragraph
            body: >
              Cursor 的竞争差异化来自三层相互强化的能力。第一，自有模型（Tab 和 Composer）用真实编码环境训练，训练成本由 Anysphere 自己的基础设施承担——纯 API
              路由型竞争对手如果不自建训练基础设施，就无法复制这项投入。第二，智能体框架会产生复利效应：每接入一个前沿模型，都要配套数周的框架调优，最终在产品内表现上明显优于原生模型 API。第三，数据飞轮：超过 100
              万付费用户持续产生结构化编码任务和评估反馈，Anysphere 借助真实生产信号，用 RL 持续重训 Composer。

              企业采用会进一步加深护城河：NAB 直接基于 Cursor 的上下文工程原语（rules、skills、hooks）搭建内部工具（NAB CEL）。Amplitude 则基于 Cursor Automations
              搭建自主开发流水线。这些组织级集成形成的切换成本，类似 ERP 或 DevOps 平台锁定。

              开发者生态（JetBrains ACP 集成、Cursor Marketplace、Cursor SDK）把平台触达从独立 IDE 延伸出去，使 Cursor 更像智能体开发运行时，而不只是编辑器。SpaceX
              等客户已与 Anysphere 建立深度模型训练合作（2026 年 4 月 21 日宣布），进一步推动 Composer 的训练语料和质量提升。
