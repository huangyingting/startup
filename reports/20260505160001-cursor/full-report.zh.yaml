  foundingLocation: Cambridge, MA (MIT)
  headquarters: San Francisco, CA
  productSummary: >
    Cursor 是深度集成 LLM 的 VS Code 分支版本：Tab 自动补全（多行预测式编辑）、Composer 2（多文件智能体式编码）、行内聊天、全代码库上下文（250K token
    窗口），以及面向多步骤编码任务的智能体执行框架（Agent harness）。April 2026 发布的 Cursor 3 开始在部分补全中使用自研模型推理，这是降低对第三方模型
    API（OpenAI、Anthropic、Google）依赖的第一步。平台功能包括 SOC 2 Type II 认证、隐私模式、Enterprise SSO/SAML，以及 MCP（Model Context
    Protocol）集成生态。
  customerFocus: >
    个人开发者（Pro/Pro+ 层级）和企业工程组织（Teams/Enterprise）。企业账号约占收入 ~60%。具名客户包括 Samsung、Shopify、Stripe、Coinbase、Rippling、Vercel，以及
    40K-50K+ 企业团队（公司声称）。Fortune 500 渗透率为 64-70%（公司声称，未经独立来源验证）。
  businessModel: >
    四档订阅 SaaS：Hobby（免费）、Pro（$20/mo）、Pro+（$60/mo）、Ultra（$200/mo）和 Enterprise（定制价格）。Teams 档为 $40/user/month。收入先靠个人
    PLG（自下而上的病毒式传播）增长，再扩张到企业席位。销售成本（COGS）主要是模型 API 支出；随着自研模型推理扩展，毛利率从 ~8-12%（$200M ARR）改善到 ~15-20%（$2B ARR）。
  stage: Series D / Late-stage growth
  fundingStatus: >
    $2.3B Series D（March 2026），估值 $29.3B。累计融资约 ~$3.47B，覆盖 Seed（$8M）、Series A（$60M/$400M）、Series B（$105M/$2.6B）以及 Series
    C/D（$900M 和 $2.3B，对应 $9.9B 和 $29.3B）。主要投资方：Thrive Capital（Series D 领投）、Andreessen Horowitz、Kleiner Perkins、OpenAI
    Fund。SpaceX 持有一项 $60B 收购期权，可在 end-2026 行权。
