  productSummary: >
    Cursor 是深度集成 LLM 的 VS Code 分支：Tab 自动补全（多行预测编辑）、Composer 2（多文件智能体编码）、行内聊天、 全代码库上下文（250K token 窗口）及多步骤编码任务的 Agent
    框架。2026 年 4 月发布的 Cursor 3 为部分补全场景 引入自研模型推理，迈出降低对第三方模型 API（OpenAI、Anthropic、Google）依赖的第一步。平台特性包括 SOC 2 Type II
    认证、隐私模式、企业级 SSO/SAML 及 MCP（Model Context Protocol）集成生态。
