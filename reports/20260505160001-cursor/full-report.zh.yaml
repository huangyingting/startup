      - number: '7.5'
        title: 缓释措施、击穿论点触发器与尽调问题
        blocks:
          - type: paragraph
            body: >
              Cursor 已具备有意义的风险缓释措施。SOC 2 Type II 为商业企业账户提供合规基线。带 ZDR 的 Privacy Mode 回应了隐私敏感企业的数据驻留担忧。三模型 API
              架构为单一提供商宕机提供冗余。Cursor 的 PLG 速度已在 2025 年 4 月机器人事件和广泛竞争压力下证明韧性，事件后 ARR 仍在加速。

              会实质改变投资论点的击穿触发器包括：（1）OpenAI 或 Anthropic 限制 AI 编码 IDE 经销商的 API 访问；（2）Cursor
              智能体流水线发生重大安全漏洞或供应链注入，导致企业数据丢失；（3）xAI 收购完成并触发显著企业客户流失；（4）Microsoft 将高级智能体编码原生捆绑进 VS
              Code，且零增量成本；或（5）不利版权先例要求 Cursor 为 AI 生成代码向企业客户赔偿。

              优先尽调问题：（1）Cursor 企业协议条款，包括 IP 赔偿条款；（2）实际毛利率和按模型提供商拆分的 COGS；（3）事故响应和漏洞赏金计划细节；（4）FedRAMP 路线图和时间表；（5）MCP
              权限控制架构和智能体审计日志；（6）xAI 选择权下的创始人归属期安排和收购锁定条款。
