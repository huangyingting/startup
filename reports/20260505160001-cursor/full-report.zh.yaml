      - number: '7.3'
        title: 合作伙伴、依赖与竞争风险
        blocks:
          - type: paragraph
            body: >
              Cursor 最集中的风险是对 OpenAI、Anthropic 和 Google Gemini 三家模型 API 的高度依赖。ARR $200M 阶段，模型 API COGS 约占收入的 80-90%；ARR
              $500M 阶段，Sacra 估计已降至约 60-65%。尽管有所改善，Cursor 缺乏自托管推理回退方案，无法抵御模型供应商单方面提价。OpenAI 和 Anthropic
              均在构建各自的开发者工具（OpenAI Canvas、Anthropic Projects/Claude.ai），形成了最终限制或降低对竞争应用层 API 访问优先级的结构性动机。

              SpaceX/xAI 收购选择权是最高严重程度的合作伙伴风险。2026 年 4 月披露的 $60B 选择权——SpaceX 持有在年底前收购 Cursor 的双边权利——正在 Cursor
              最大竞争对手账户中造成企业采购瘫痪。与 SpaceX、Tesla 或 xAI 相关业务直接竞争的公司，可能拒绝在企业层面全面部署 Cursor。欧盟对该交易的反垄断审查可能历时 18-24
              个月，造成持续不确定性。若收购完成，Cursor 将与 xAI/Grok 一道并入马斯克 AI 帝国，可能流失拒绝供应商集中风险的客户。

              微软的 Copilot 捆绑是一项结构性威胁：GitHub Copilot 已内含于 GitHub Enterprise Cloud（$21/用户/月），并集成于 Microsoft 365 E3/E5
              许可证，无需额外付费。这形成了 Cursor $40-200/用户定价在微软中心化企业账户中难以克服的价格压力。Amazon Q Developer 具备 FedRAMP 资质，与 AWS
              开发者工具链深度集成，是 AWS 重仓的监管行业账户的默认选择。这两家竞争对手的结构性优势，Cursor 单靠产品速度难以复制。
