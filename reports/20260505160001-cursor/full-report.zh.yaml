  - id: TI005
    slug: public-financial-gaps-table
    title: 公开财务数据缺口
    description: Private metrics not publicly available that are critical for full financial underwriting.
    columns:
      - 缺失指标
      - 对投资判断的影响
      - 尽调路径
    rows:
      - - 毛利率（按层级）
        - 无法评估 SaaS 经济模型；须确认模型 API 成本不会在规模化后侵蚀盈利能力
        - 向管理层索取利损表；重点拆解营业成本：API 费用、基础设施、支持
      - - 净留存率（NRR）
        - 缺乏 NRR 则无法评估收入持续性及扩张与流失的动态
        - 按队列和客群索取月度 NRR；对标企业级 SaaS 同行（>130% 为强）
      - - 企业 ACV 分布
        - 无法评估合同规模集中度或客户健康度
        - 索取前20大客户 ACV、队列年份分析及企业客户扩张率
      - - 模型 API 成本结构
        - 营业成本的主要驱动因素；须评估多年期 API 合同是否锁定了有利价格
        - 审查 Anthropic、OpenAI、Google、xAI 的 API 合同条款；评估批量折扣条款
      - - 按层级月度流失率（Pro、Teams、Enterprise）
        - 流失率是可持续 ARR 建模最关键的输入变量
        - 按层级和年份队列索取月度流失率；对比递延收入与预订趋势
      - - GAAP 收入与 ARR
        - ARR 为公司或分析师报告口径；含预付款的企业合同在 GAAP 确认规则下可能存在差异
        - 索取经审计财务报表；对比 GAAP 收入与报告 ARR
      - - 企业销售周期与回本周期
        - 企业获客成本未披露；决定了当前定价下企业销售动作能否实现经济上的规模化
        - 索取平均销售周期长度、配额达成率及直销团队的 CAC 与 ACV 对比
    claimRefs:
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027
      - CI028
      - CI029
