  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与 VS Code 基础
        blocks:
          - type: paragraph
            body: >
              Cursor 是 Visual Studio Code（VS Code）的分支，构建于 Electron，有意继承 VS Code 的 扩展生态、语言服务器协议（LSP）基础架构和 TextModel
              对象系统。这一架构选择大幅降低迁入 摩擦：开发者保留原有设置、主题、快捷键和扩展，同时获得 Cursor 的 AI 层。分支由 Anysphere 规模精小但高产的工程团队维护，持续跟踪 VS Code
              上游安全补丁并按风险评估决定合并策略。

              Cursor AI 架构的核心是 2024 年 9 月引入的影子工作区（shadow workspace）。影子工作区以 隐藏 Electron 窗口运行，镜像用户文件系统而不干扰活跃编码会话，让后台 AI
              智能体获得完整 LSP 访问能力（lint 检查、类型错误、转到定义），同时保持独立性、隐私性、并发性、通用性、 可维护性和速度。这使智能体能在后台迭代代码、在每次编辑后检测 lint 错误并在呈现结果前
              自我修正。

              平台的代码库索引引擎对整个仓库构建向量嵌入——处理数十万个文件中的数百万行代码——在索引 代码库上实现语义代码搜索。Cursor Rules 允许团队将项目专属指令、规范和上下文工程逻辑 编码其中（例如，NAB
              基于 Cursor 的 rules、skills 和 hooks 原语构建的 CEL 库）。
