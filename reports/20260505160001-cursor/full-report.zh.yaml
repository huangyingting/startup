      - number: '8.2'
        title: 可比估值与市场基准
        blocks:
          - type: paragraph
            body: >
              开发者工具 M&A 格局提供了三个关键参照点。GitHub 2018 年以 $7.5B 收购，彼时 ARR 约 $200M（37.5 倍），体现了全球代码仓库平台的战略价值。Windsurf 2025 年被谷歌以
              $2.4B 收购，彼时 ARR 约 $150-250M（10-16 倍），为 AI 编程 IDE 收购设立了下限。Cursor 以 $29.3B 对应 $2B ARR（14.7
              倍），处于上述区间内，折射出财务与战略混合的估值逻辑。

              公开市场可比公司中，高增长开发者平台公司按 11-25 倍 ARR 交易：GitLab 约 11-12 倍（ARR $760M，同比增 29%，NRR 124%），Datadog 约 17-22 倍（ARR
              $2.3B，同比增约 25%），Cloudflare 约 25-30 倍（ARR $1.6B，强开发者定位）。Cursor 以 150%+ 年化增长对应 14.7
              倍，相较增速更低的同类公司显得保守，前提是毛利率改善能够兑现。

              私有 AI 公司基准方面：Databricks 以约 $62B 对应约 $1.5B ARR（41 倍，毛利率 75%），OpenAI 以 $300B 对应约 $4-5B ARR（60-75
              倍，体现模型层溢价）——这表明随着 Cursor 毛利率成熟，从 14.7 倍向 20-30 倍进一步扩张有先例可循，乐观情景下蕴含可观的上行期权价值。
            claimRefs: []
