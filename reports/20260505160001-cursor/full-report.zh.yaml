  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层——产品驱动增长基盘与企业化进程
        blocks:
          - type: paragraph
            body: >
              Cursor 采用产品驱动增长（PLG）架构，分四个购买层级。个人开发者在 Hobby（免费）层级获得有限的 AI 功能与用量配额；Pro（$20/月）和
              Pro+/Ultra（$60-$200/月）用户可使用全量 AI 补全和更高的模型用量上限。Teams 层级（$40/用户/月）服务 2-100+ 人的工程小队，提供共享账单、管理员控制、默认 Privacy
              Mode 和模型级访问治理。Enterprise（自定义定价）针对通常拥有 1,000+ 名工程师的大型组织，满足其 SSO/SCIM、CMEK、审计日志、合规记录和自定义安全审查需求。

              截至 2025 年底，Cursor 各层级付费用户约超 100 万，企业团队账户 40,000-50,000 个，公司声称在财富 500/1000 强中的采用率达 64-70%。企业账户贡献约 60% 的
              ARR，但用户数占比较小，折射出企业合同与个人 Pro 订阅约 20 倍的 ARPU 差距。

              地理覆盖涵盖北美、欧洲和亚太，cursor.com 已本地化支持 9 种语言（英语、简体中文、日语、繁体中文、西班牙语、法语、葡萄牙语、韩语、德语），显示出刻意推进的国际化战略。企业客户涵盖全球金融机构（亚太的
              NAB、全球的 Optiver）、美国科技公司（NVIDIA、Stripe、Coinbase）、金融科技（Rippling、OnePay）以及拉美科技公司（Mercado Libre）。
