        - 37.5x ARR
        - 开发者工具战略收购溢价
        - 2018 年交易；战略平台，不是生产力工具
      - - Windsurf/Codeium（M&A，2025）
        - 约 $150-250M ARR
        - $2.4B 收购价（Google）
        - 10-16x ARR
        - 直接竞争对手；最近的 AI 编码 IDE 并购可比交易
        - 规模低于 Cursor；$2.4B = 竞争性人才收购价格
      - - Databricks（私营，2024）
        - 约 $1.5B ARR
        - $62B 估值
        - 41x ARR
        - 同等规模的私营 AI 基础设施公司
        - 75% 毛利率，而 Cursor 约 15-20%；毛利结构不同
      - - OpenAI（私营，2025）
        - 约 $4-5B ARR
        - $300B 估值
        - 60-75x ARR
        - AI 超大规模厂商溢价倍数天花板
        - 模型层享受溢价；应用层相对模型层折价
