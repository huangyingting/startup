      - number: '7.6'
        title: 展示项
        blocks:
          - type: callout
            title: 版权与 IP 赔偿缺口是最高风险法律敞口
            body: >
              美国版权局 2025 年 AI 训练数据第三部分报告与 Andersen v. Stability AI 诉讼，标志着 AI 版权执法的转折点。Cursor 尚无针对企业客户的 IP 赔偿政策，而 GitHub
              Copilot Enterprise 自 2023 年起已提供赔偿保障。在竞争性企业采购中，这一缺口在法务审查中构成实质性异议——尤其对 IP 敏感代码库的科技公司而言。Cursor 应将企业 IP
              赔偿政策列为近期产品-法律优先事项。
            calloutType: risk
            claimRefs:
              - CR004
              - CR005
              - CR008
              - CR029
              - CR042
          - type: callout
            title: xAI 收购选择权是最高严重程度的单一风险
            body: >
              $60B SpaceX 收购选择权一旦行使，将把 Cursor 的独立产品路线图纳入马斯克旗下，并在欧盟触发 18-24 个月的反垄断审查，在美国可能触发 DOJ/FTC
              审查。更迫切的是，企业采购决策已受影响：与 SpaceX 相关业务（卫星互联网、汽车、航空航天）直接竞争的安全敏感账户，有充分理由暂缓 Cursor
              部署，等待收购明朗。这一风险对投资者而言是二元且不可对冲的，结果取决于创始人在选择权下的治理权利及其抵制交易的意愿。
            calloutType: risk
            claimRefs:
              - CR015
              - CR016
              - CR034
          - type: callout
            title: 模型 API 依赖可控，但需以自主推理里程碑支撑
            body: >
              Cursor 毛利率改善轨迹（从 ARR $200M 时约 15% 提升至 ARR $2B 时接近转正）证明模型 API 成本压缩可行，但达到 70%+ SaaS 毛利率需要推理价格持续下行，或 Cursor
              自主大规模部署推理。Cursor 3 模型（2026 年 4 月）是自研模型的早期信号。若自主推理到 2026 年底能覆盖 30-40% 的补全请求，毛利率风险将实质性降低。尽调应聚焦于 Cursor 实际
              API 支出构成和自主推理路线图。
            calloutType: recommendation
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR035
          - type: callout
            title: 未披露漏洞赏金或负责任披露政策
            body: >
              企业 CISO 供应商评估中，安全项目成熟度是标准考察项：漏洞赏金计划、CVE 披露历史、负责任披露政策及安全研究员参与机制。Cursor 安全页面披露了年度渗透测试和 SOC 2 Type
              II，但未提及漏洞赏金计划或 CVE 协调流程。对于在客户开发环境中执行智能体代码的产品，缺乏公开的安全研究员计划相较于 Cursor 向财富 500 强宣称的企业安全能力，是一个实质性缺口。
            calloutType: risk
            claimRefs:
              - CR030
              - CR041
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与入场背景
        blocks:
          - type: paragraph
            body: >
              Cursor 呈现了企业软件史上最引人注目的增长故事之一：从创立到 $2B ARR 约三年，是开发者 SaaS 有史以来最快的 ARR 增长轨迹。D 轮以 $29.3B 对 Cursor 估值约 14.7 倍的
              ARR，这一倍数略低于 Datadog 的公开市场溢价（约 17-22 倍），但隐含着对两件事的押注：年化 ARR 增长持续超 150%，以及毛利率从当前约 15-20% 大幅改善至企业 SaaS 基准的
              70%+。

              投资逻辑建立在四个支柱之上：（1）Cursor 在 AI 编程领域具有定义品类的市场地位——100 万+ 付费用户、64-70% 财富 500 强渗透率（公司自报）、$2B ARR；（2）AI
              编程是由模型质量、上下文管理和工作流集成驱动的赢家通吃市场，Cursor 在这些维度领先；（3）从个人 Pro 用户到 Teams 再到 Enterprise 的企业扩张，在标杆账户已展现出 3-6
              倍的"土地+扩张"乘数；（4）自主推理（Cursor 3，2026 年 4 月）发出毛利率改善信号，是估值合理性的关键依据。

              反向逻辑同样有力：微软控制 VS Code 上游和 GitHub Enterprise，具备以零增量成本捆绑同等功能的结构性能力；Cursor 当前经济面近乎零毛利率，意味着投资者在当前经济价值基础上支付了
              5-7 倍的溢价，押注未来毛利率扩张；xAI 收购选择权实际上将近期回报上限锁定在约 2 倍。
            claimRefs: []
