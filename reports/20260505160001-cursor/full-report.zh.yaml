      - CV022
      - CV016
    notes: 否决触发条件是投资委员会监控的参考指标，不构成强制卖出义务。
  - id: TV006
    title: 最终尽调清单
    columns:
      - 议题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - GAAP 毛利率与 COGS 拆分
        - 按提供商（OpenAI、Anthropic、Google）分列的精确模型 API 支出
        - 最重要的估值驱动因素；缺少此数据则无法验证利润改善逻辑
        - Cursor CFO；财务模型数据室
      - - D 轮治理条款
        - 收购否决权、董事会席位、反稀释条款
        - 若无否决权，xAI 收购对回报的封顶具有约束力；3 倍以上回报逻辑的治理权不可妥协
        - Cursor 法律总顾问；条款清单审查
      - - ARR 分群数据（各细分 NRR）
        - 企业层级 NRR、Pro 层级流失率、留存分群曲线
        - 验证拓展飞轮逻辑；企业端 NRR 若低于 130%，ARR 增长叙事将明显减弱
        - Cursor 营收副总；数据室
      - - 自研模型推理路线图
        - Cursor 3 覆盖率、自研模型补全占比达 30–40% 的时间节点
        - 提升毛利率至 50% 以上的核心路径；若无可信计划，估值溢价难以支撑
        - Cursor CTO；产品路线图审查
      - - FedRAMP 投入计划
        - FedRAMP ATO 申请的进展与时间表
        - 若缺少 FedRAMP 认证，15–25% 的企业 TAM 将无法触达，ARR 潜在增量受阻
        - Cursor CISO；合规路线图审查
      - - Koala 收购条款
        - 交易价格、业绩对赌结构、整合时间表
        - 对 D 轮股权的稀释影响；PLG 基础设施整合风险
        - Cursor 企业发展部；并购意向书
    claimRefs:
      - CV029
      - CV024
      - CV042
    notes: 优先顺序反映对投资决策信心的影响程度。所有条目均为 $29.3B 入场决策中不可绕过的尽职调查要项。
