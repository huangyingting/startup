      - number: '8.5'
        title: 展示项
        blocks:
          - type: callout
            title: $29.3B 入场是一笔押注毛利率而非单纯押注增长的赌注
            body: >
              以约 $2B 收入对应约 14.7 倍 ARR、毛利率约 15-20%，Cursor 的估值体现出比当前经济价值高出 5-7 倍的溢价。投资者隐含地承诺了一条从近乎零毛利率到 3-5 年内通过自主推理实现
              60%+ 的路径。若毛利率改善停滞——因推理成本企稳、OpenAI/Anthropic 调整定价或自研模型落地迟缓——即使 ARR
              持续高速增长，估值损伤也将显著。这是最重要的财务尽调问题，应是数据室审查的首要切入点。
            calloutType: risk
            claimRefs:
              - CV013
              - CV035
              - CV040
          - type: callout
            title: xAI 收购底价锁定 D 轮投资者的回报上限
            body: >
              SpaceX $60B 收购选择权可在 2026 年底前行使，对 D 轮投资者而言既是回报下限，也是天花板。按 $60B，投资者从 $29.3B 入场价获得约 2 倍回报——对于大多数目标 3 倍+ 的晚期 VC
              基金而言，这是尚可但低于门槛的回报。只有当投资者获得阻止或推迟收购的治理权利、从而打开 $100B+ IPO 路径时，以 $29.3B 入场才真正具有吸引力。缺乏这些权利，这笔投资实质上是一张回报上限为 2
              倍的约定，而非开放式 VC 投资。
            calloutType: risk
            claimRefs:
              - CV010
              - CV023
              - CV037
          - type: callout
            title: 仅凭增长轨迹可为入场辩护——但需附条件
            body: >
              Cursor 的 ARR 增速（$1M 到 $2B 约三年）是开发者 SaaS 史上最快。这一轨迹叠加 64-70% 的财富 500 强渗透率和有据可查的企业"土地+扩张"，使 Cursor 成为 2026
              年最具吸引力的成长型投资标的之一。基准情景下估值可辩护，乐观情景下极具吸引力。关键条件是厘清 xAI 交易的治理结构，并验证毛利率改善的可见性。若两者均在尽调中得到确认，以当前增速 $29.3B 入场是企业 AI
              领域较强的晚期机会之一。
            calloutType: strength
            claimRefs:
              - CV001
              - CV008
              - CV021
              - CV043
          - type: callout
            title: 可比分析支撑 10-20 倍 ARR 退出倍数
            body: >
              ARR $1-3B 区间的公开开发者 SaaS 可比公司，按 NRR、增速和毛利率不同交易于 11-30 倍 ARR。Cursor 以 $2B ARR 对应 14.7 倍，相较 Datadog（17-22 倍）和
              Cloudflare（25-30 倍）并不高估——两者毛利率均更高。随着 Cursor 毛利率改善，从 14.7 倍重估至 20-25 倍是纯 ARR 增长之外创造价值的主要机制。按 $6B ARR 对应 20
              倍，价值约 $120B——相较 D 轮入场价 4 倍，与乐观情景假设一致。
            calloutType: strength
            claimRefs:
              - CV007
