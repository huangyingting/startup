      - number: '4.2'
        title: 收入牵引、单元经济与成本结构
        blocks:
          - type: paragraph
            body: >
              按任何 SaaS 基准衡量，Cursor 的营收增长轨迹都极为罕见。从 2023 年 $1M ARR 起步，公司于 2025 年 1 月达到 $100M ARR（距首次实质性收入约 12 个月），2025 年 6
              月 $500M ARR，2025 年 11 月 $1B ARR，2026 年 2 月 $2B ARR [CI007]。这段从 $1M 到 $2B 的轨迹历时约 36 个月， 2025
              年全年营收大约每两个月翻番。SaaStr 认定 Cursor 是有记录以来从 $1M 到 $500M ARR 增速最快的 B2B SaaS，超越 Wiz、Deel、Ramp 等前纪录保持者
              [CI008]。Sacra 估计 Cursor 于 2026 年 4 月实现轻微毛利盈利，预测 2026 年底年化收入运行率超过 60 亿美元 [CI009]。主要 收入成本是 AI 模型推理——Cursor
              将查询路由至 Anthropic Claude、OpenAI GPT、Google Gemini 及自研 Composer 模型，按 token 支付 API 费用，这是最大的单项成本。对于行内代码补全等
              延迟敏感操作，Cursor 使用微调混合专家（MoE）模型在保证质量的同时降低单次推理成本 [CI010]。 Cursor 推出了自研模型 Composer（2025 年 10 月）和 Composer
              2（2026 年 3 月），以逐步 降低第三方 API 成本依赖、提升毛利率 [CI011]。销售和营销支出历来相对营收极低，因为 Cursor
              的增长绝大多数由产品主导：免费套餐驱动有机开发者采纳，付费转化在产品内部发生。Koala 收购后 直销团队在扩张，但获客成本（CAC）相较传统企业 SaaS 仍较低，客户获取锚定于口碑和开发者 社区推荐
              [CI012]。约 150 名员工（截至 2026 年初）意味着极高的人均营收——$2B ARR 下每名 员工超过 1300 万美元，折射出软件分发的轻资产属性与异常高速的营收增长共同作用的结果 [CI013]。
              基础设施成本主要基于 AWS，计算资源辅以 SpaceX/xAI Colossus 合作用于模型训练 [CI014]。
