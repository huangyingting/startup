      - number: '6.4'
        title: 留存动态与扩张模式
        blocks:
          - type: paragraph
            body: >
              Cursor 不公布净留存率（NRR）、GRR、分群留存率或合同续约数据。不过，ARR 轨迹为高美元留存和强劲净扩张提供了有力间接证据：在约 720,000 名付费用户的起始基盘上，年经常性收入（ARR）从
              $100M（2025 年 1 月）增长到 $2B（2026 年 2 月），历时十三个月，说明收入扩张——通过席位增加和层级升级——大幅超过任何流失。这与企业细分市场 NRR 显著高于 150% 相一致。

              落地再扩张模式已有充分记录：最初通常由 1-5 名个人工程师使用 Pro 计划开始，在工程团队内靠口碑病毒式扩散，触发 Teams 计划升级，最终走向全公司企业授权。NAB 从试点扩展到 6,000+
              名开发者，并计划达到 10,000+ 名工程师。Coinbase 从个人使用走向全公司授权。Rippling 数周内实现工程组织 60% 采用。

              企业切换成本还会因基于 Cursor 原语构建的组织工具而叠加：NAB 直接基于 Cursor 的 rules、skills 和 hooks API 构建 NAB CEL（上下文工程库）；Amplitude 基于
              Cursor Automations 构建自主开发流水线。这些是持久的组织级集成，随着时间推移会提高续约概率并加深扩张潜力。

              2025 年 4 月的支持机器人事件（AI
              生成的支持回复编造了假的「一台机器」政策，引发用户反弹）是迄今最显著的留存风险事件，也说明在缺乏护栏的情况下大规模部署基于大语言模型的支持服务存在危险。公司已公开道歉并更新支持工作流。
