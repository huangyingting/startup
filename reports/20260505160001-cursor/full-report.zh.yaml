      - number: '5.4'
        title: 安全、合规与企业控制
        blocks:
          - type: paragraph
            body: >
              Cursor 持有 SOC 2 Type II 证明（可通过 trust.cursor.com 获取），每年进行第三方渗透测试，并可按需提供执行摘要。数据静态加密使用 AES-256，传输中使用 TLS
              1.2+。Cursor 完全运行在 AWS 基础设施上，并明确声明在中国没有基础设施、不使用中国总部的子处理方，并承诺在供应商风险管理计划下每年审查子处理方。

              Privacy Mode 对所有团队成员默认启用，通过与所有模型提供商签订 Zero Data Retention（ZDR，零数据保留）合同控制，确保代码不会被提供商存储或用于训练。公司维持 GDPR 和
              CCPA 合规；用户可通过设置仪表盘删除账号。

              企业控制包括 SSO（Okta、Azure AD、Google Workspace）和 SCIM，用于自动用户开通和停用；客户托管加密密钥（CMEK）；合规日志；MDM
              部署；以及模型级访问控制，让管理员能够允许或拉黑特定模型提供商、模型配置（speed/context window），或默认阻止新提供商。软支出限制（而非硬切断）以及在 50/80/100%
              阈值自动提醒，在成本治理和开发者生产率之间做平衡。

              2025 披露了两个 CVE：CVE-2025-54135 和 CVE-2025-54136（CurxExecute/MCPoison），均与 Cursor 中 MCP 处理有关。Tenable 发布了详细
              FAQ。披露事件凸显出集成不可信 MCP 服务器带来的新兴攻击面；此后 Cursor 已在开发者文档中用 MCP 安全注意事项和智能体安全最佳实践处理这一领域。目前 Cursor
              不提供本地部署，这可能限制其在某些高度受监管环境中的采用。
