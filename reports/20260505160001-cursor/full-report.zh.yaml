      - number: '5.4'
        title: 安全、合规与企业管控
        blocks:
          - type: paragraph
            body: >
              Cursor 持有 SOC 2 Type II 认证（可通过 trust.cursor.com 获取），每年进行第三方渗透测试， 执行摘要可应要求提供。数据静态存储采用 AES-256 加密，传输采用 TLS
              1.2+。Cursor 专用 AWS 基础设施，明确声明在中国无任何基础设施，不使用总部位于中国的子处理商，并承诺在供应商风险 管理计划下进行年度子处理商审查。

              隐私模式对所有团队成员默认启用，与所有模型提供商签署零数据留存（ZDR）合同管控，确保代码 不被提供商存储或用于训练。GDPR 和 CCPA 合规持续维护；用户可通过设置仪表板删除账户。

              企业管控包括：SSO（Okta、Azure AD、Google Workspace）和 SCIM 用于自动化用户配置和解除 配置；客户自管加密密钥（CMEK）；合规日志；MDM
              部署；以及模型层访问控制，允许管理员对 特定模型提供商、模型配置（速度/上下文窗口）或新提供商默认进行允许/屏蔽设置。软性支出 限制（而非硬性截止）和在 50/80/100%
              阈值处的自动告警在成本治理与开发者效率之间取得平衡。

              2025 年披露了两项 CVE：CVE-2025-54135 和 CVE-2025-54136（CurxExecute/MCPoison），与 Cursor 中的 MCP 处理相关。Tenable 发布了详细
              FAQ。这些披露凸显了集成不可信 MCP 服务器 带来的新兴攻击面——Cursor 此后已在开发者文档中增加了 MCP 安全注意事项和智能体安全最佳
              实践。目前不提供本地部署选项，这在某些高度受监管环境中可能限制采纳。
