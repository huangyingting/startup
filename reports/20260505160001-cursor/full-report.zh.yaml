      - number: '7.2'
        title: 运营、安全与技术风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的运营风险图谱集中于三个相互叠加的因素：高度信任场景下的 AI 幻觉、持续扩展的智能体攻击面，以及 VS Code fork 技术债务。

              2025 年 4 月的客服机器人事件——Cursor AI 捏造了禁止使用竞品工具的政策——暴露了公司在面向客户部署中对 AI 生成错误信息的脆弱性。尽管直接企业影响有限，该事件揭示了 Cursor
              的运营同样面临它为客户赋能的那些 AI 失效模式。若第二起更大的事件发生在企业支持或智能体场景中（如智能体根据幻觉指令对生产代码库执行不可逆操作），可能引发重大企业法律责任和采购暂停。

              OWASP LLM Top 10 框架将提示注入（LLM01）和过度授权（LLM06）列为 AI 编程 IDE 的核心风险。Cursor Automations 和 Agent
              模式执行多步骤智能体流水线，并持有文件系统和终端访问权限，面临较高的 OWASP LLM06 风险敞口。接入第三方 MCP 工具服务器进一步扩大了信任边界：恶意 MCP 服务器可能窃取凭据，或注入指令驱使
              Cursor 智能体修改生产基础设施。Cursor 尚未披露细粒度的 MCP 权限控制或智能体操作审计日志。

              VS Code fork 随着微软不断演进 VS Code 上游，正积累复合技术债务。Cursor 的差异化功能（shadow workspace、Composer 多文件智能体）部署在 VS Code 和
              Electron 的分叉版本中。若微软原生在 VS Code 中加入同等智能体功能——Copilot Chat 已持续在这一方向推进——Cursor 的差异化将收窄，而 fork
              维护负担将加重。这一风险呈不对称结构：微软控制上游，Cursor 不然。
