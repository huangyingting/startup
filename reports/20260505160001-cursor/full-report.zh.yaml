      - number: '3.2'
        title: 竞争对手画像与定位
        blocks:
          - type: paragraph
            body: >
              GitHub Copilot 是市场在位者，拥有最大装机量：截至 FY2024，付费订阅用户 180 万、企业客户 7.7 万，按订阅量和混合 ARPU 估算隐含 ARR 约 3 亿至 3.5 亿美元
              [CP002]。Copilot 以插件 形式分发至 VS Code、JetBrains、Neovim 等编辑器，借助微软企业销售团队和 Azure 捆绑。核心 优势在于品牌信任、现有企业采购渠道及深度
              GitHub 集成；结构性弱点是插件架构带来的上下文 限制，Cursor 等独立 IDE 则可摆脱这一约束。2025 年 GitHub 本身开始对智能体会话设限，原因 是并行 AI
              工作流压垮了计算基础设施——这表明插件架构难以支撑智能体使用场景的规模扩展 [CP008]。 Windsurf（前身为 Codeium，2024 年更名）是 Cursor 最直接的竞对——基于 VS Code
              分支的独立 IDE，以智能体核心模型 Cascade 瞄准同一职业开发者细分。OpenAI 于 2025 年 5 月同意以约 30 亿美元收购 Windsurf，表明 OpenAI 意图通过模型与工具的纵向整合在
              IDE 层面参与竞争 [CP001]。 收购完成后，Windsurf 将获得 OpenAI 前沿模型的独家访问权，以及与 ChatGPT 3 亿以上用户基础 整合的潜力，形成 Cursor 所不具备的分发优势
              [CP006]。Amazon Q Developer（前身为 CodeWhisperer）以插件形式瞄准 AWS 原生开发者，Pro 套餐 $19/用户/月，个人版免费 [CP004]。 Q Developer
              差异化在于深度 AWS 服务感知能力（S3、Lambda、EC2 等代码建议）及 Amazon 企业 分发渠道，局限在于主要是 AWS 生态玩法，对多云或云中立企业吸引力有限。Tabnine 以云端、本地
              部署及气隙隔离等多种部署选项主打企业隐私，定位受监管行业——这类行业中，Cursor 等纯云工具 因数据治理要求而受阻 [CP010]。JetBrains AI 随 JetBrains 订阅内置于其 IDE
              产品线（IntelliJ、 PyCharm、WebStorm 等），无需单独授权即可触达约 1000 万以上开发者装机量 [CP011]。Replit 是相邻竞对，以 AI
              原生工具瞄准浏览器端云开发，主要面向学生和快速原型开发者，而非职业企业 开发者 [CP012]。
