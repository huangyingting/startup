      - number: '8.5'
        title: 图表
        blocks:
          - type: callout
            title: $29.3B 入场价押注的是利润率，不只是增长
            body: >
              Cursor 在 $2B 收入、约 15-20% 毛利率下按约 14.7 倍 ARR 估值，反映出相对当前经济价值 5-7 倍的溢价。投资者实际上在承销一条通过部署自有模型推理，在 3-5
              年内把毛利率从接近零推至 60%+ 的路径。如果毛利率改善停滞——原因可能是推理成本平台期、OpenAI/Anthropic 定价动作，或自有模型采用较慢——即便 ARR
              继续高增长，估值受损也会很大。这是最重要的财务尽调问题，应成为数据室审查的第一个问题。
            calloutType: risk
            claimRefs:
              - CV013
              - CV035
              - CV040
          - type: callout
            title: xAI 收购底价限制 Series D 投资者回报
            body: >
              SpaceX 可在 2026 年底前行使的 $60B 收购选择权，对 Series D 投资者既是回报底价，也是回报上限。按 $60B 计算，投资者相对 $29.3B 入场价约获 2
              倍回报——可接受，但低于多数目标 3 倍+ 的后期 VC 基金门槛。只有在投资者获得治理权、能够阻止或推迟收购，并开启 $100B+ IPO 路径时，$29.3B 入场才有吸引力。没有这些权利，这本质上是一张 2
              倍封顶票据，而不是开放式 VC 投资。
            calloutType: risk
            claimRefs:
              - CV010
              - CV023
              - CV037
          - type: callout
            title: 增长轨迹本身足以支撑入场——但有条件
            body: >
              Cursor 的 ARR 速度（约 3 年从 $1M 到 $2B）是开发者 SaaS 史上最快。单独看，这一轨迹叠加 64-70% Fortune 500 渗透率和已验证的企业落地再扩张，使 Cursor 成为
              2026 年 vintage 中最有吸引力的成长投资之一。估值在基准情景下可以辩护，在牛市情景下有吸引力。关键条件是 xAI 交易的治理清晰度，以及毛利率改善的可见性。如果尽调确认两者，按当前增长速度以
              $29.3B 入场，是企业 AI 中较强的后期机会之一。
            calloutType: strength
            claimRefs:
              - CV001
              - CV008
              - CV021
              - CV043
          - type: callout
            title: 可比分析支持 10-20 倍 ARR 退出倍数
            body: >
              $1-3B ARR 的公共开发者 SaaS 可比公司，根据 NRR、增长和毛利率不同，按 11-30 倍 ARR 交易。Cursor 在 $2B ARR 上按 14.7 倍定价，相比 Datadog（17-22
              倍）或 Cloudflare（25-30 倍）并不拉伸，尽管二者毛利率更高。随着 Cursor 毛利率改善，从 14.7 倍重估到 20-25 倍，将成为纯 ARR 增长之外的主要价值创造机制。$6B ARR
              乘以 20 倍得到 $120B——相对 Series D 入场价 4 倍，且与牛市情景假设一致。
            calloutType: strength
            claimRefs:
              - CV007
              - CV020
              - CV032
              - CV034
