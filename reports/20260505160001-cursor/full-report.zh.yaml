      - number: '3.3'
        title: 护城河耐久性、切换成本与竞争风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的护城河建立在三个相互强化的因素上：（1）工作流集成深度——将 Cursor 智能体、Rules 文件和自定义 MCP 服务器嵌入日常工作流的开发者，即便底层模型可迁移，切换时也面临相当的重新
              学习成本；（2）代码库索引——Cursor 的自研代码库索引提供随项目历史积累而改善的上下文感知补全， 形成软性数据锁定效应；（3）团队协作功能带来的网络效应——共享规则和审计日志随着团队向 Cursor
              标准化而产生组织黏性。制衡这些护城河的主要风险是多工具共用和模型商品化。调查显示，开发者通常 同时使用两种以上 AI 工具，Cursor 常用于复杂任务，而 GitHub Copilot 仍在其编辑器中保持活跃
              [CP020]。多工具共用行为限制了 Cursor 净收入留存的上限。最重要的结构性风险是模型访问集中度： Cursor 依赖 Anthropic、OpenAI、Google 和 xAI 的 API
              进行模型推理；灵活性之外，这也意味着 Windsurf（收购后）等竞对可能获得优先访问权或更优定价 [CP022]。xAI 于 2026 年 4 月授予的 600
              亿美元收购期权暗示未来可能存在基础设施绑定，但战略方向尚不明朗 [CP023]。企业客户的切换 成本中到高：配置了角色权限、白名单仓库、审计日志管道并将 Cursor 集成进 CI/CD 工作流的企业
              团队，迁移工作量不容低估 [CP015]。不过，企业锁定效应仍弱于拥有深度平台整合的在位者（如 GitHub 原生代码审查和 CI/CD 管道集成）。
