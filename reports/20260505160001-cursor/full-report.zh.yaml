      - number: '5.3'
        title: 智能体基础设施、云平台与 MCP 生态
        blocks:
          - type: paragraph
            body: >
              Cursor 智能体执行框架是中央编排层，负责管理每次 AI 交互的上下文窗口（系统提示词 + 工具描述 + 对话历史 + 用户请求）。该执行框架会按模型持续调优：当 Anysphere
              获得新前沿模型的早期访问权时，工程师会花数周定制提示词结构、上下文注入、工具描述和护栏，直到该模型在执行框架内的表现超过其原始基准结果。聊天中模型切换（April 2026
              引入）允许开发者在不丢失对话上下文的情况下切换模型。

              Cursor 3（April 2026）推出统一工作区，将本地和云端智能体合并。云端智能体在专用隔离虚拟机上运行，移除了限制并行度的本地资源约束。Amplitude 每周运行 1,000+
              次自动化智能体任务，无需人工提示词；NAB 工程师在遗留 Assembly code 上启动多个智能体分支，收集结构化流程图和迁移报告。截至 February 2026，Cursor 内部合并的 PR 中有
              35% 由自主云端智能体创建。全公司智能体使用量过去一年增长约 15×；Cursor 现在智能体用户数是 Tab 用户数的 2×（逆转了 March 2025 的 2.5:1 Tab-to-agent
              ratio）。

              Cursor Automations 支持始终在线的基于 cron 和触发器的云端智能体工作流（Amplitude 用它自动把 Slack bug reports 转成 PRs）。Cursor SDK（April
              2026，npm install @cursor/sdk）通过 TypeScript API 以编程方式暴露同一套智能体运行时、执行框架和模型，打开围绕平台的开发者生态。

              MCP（Model Context Protocol）支持让 Cursor 成为外部工具、数据库和工作流的一等集成点。Cursor Marketplace 分发插件——由 MCP
              服务器、skills、subagents、rules 和 hooks 组成的插件包——并为企业治理提供由管理员控制的分发模式（Default Off、Default On、Required）。
