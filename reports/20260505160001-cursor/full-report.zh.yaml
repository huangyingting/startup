      - number: '2.4'
        title: 增长驱动因素、约束与负面信号
        blocks:
          - type: paragraph
            body: >
              **增长驱动因素** 已有充分记录。第一，生产率证据有说服力：GitHub 2023 对照实验发现，使用 Copilot 的开发者完成编码任务快 55%；Microsoft 2024 Annual Report
              引用的生产率提升最高达 55%。第二，采用本身在加速——62% 的开发者已经使用 AI 工具（SO 2024），给观望者带来社会压力。第三，企业付费意愿正在快速建立：GitHub Copilot 以
              $19–$39/user/month（Business/Enterprise 层级）证明企业预算存在；Cursor 的 Teams 计划为 $40/user/month，略高于
              Copilot，说明产品差异化后定价权在增强。第四，模型质量提升（从 GPT-4 到 Claude 3.5/3.7 再到 Gemini 2.0）会直接转化为产品改进，而 Cursor
              无需投入模型训练。第五，多智能体工作流（Cursor 中最多 8 个并行编码智能体）正在把价值主张从“自动补全帮助”改写为“自主软件交付”，从而支撑显著更高的定价。

              **市场约束** 会削弱增长叙事。准确性和信任是主要逆风：Stack Overflow 2024 发现 31% 的开发者怀疑 AI 准确性，开发者好感度同比从 77% 降至
              72%，很可能反映早期采用者的预期落空。数据隐私担忧——尤其是代码离开企业基础设施——制造企业销售摩擦。版权责任风险不低：GitHub Copilot 集体诉讼（截至 2025 仍未解决）指称，用开源代码训练的
              AI 模型会生成侵权输出；类似敞口也可能影响 Cursor。在受监管行业（医疗、金融、国防），采购周期会拉长至 6–18 个月，限制近期 SAM 捕获。最后，市场整合压力很高：OpenAI 约 ~$3B 收购
              Windsurf/Codeium（May 2025 报道）说明超大规模云厂商愿意大规模收购；Microsoft/GitHub 已经把 Copilot 捆绑进既有企业协议，这给 Cursor
              这类独立工具带来捆绑劣势。
