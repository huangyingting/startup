      - number: '2.3'
        title: 买家分层与采用驱动因素
        blocks:
          - type: paragraph
            body: >
              AI 编码工具的买家版图覆盖四个主要分层，每个分层的决策机制都不同。

              **个人开发者（自助式 PLG）** 是 Cursor 的起始客群，并继续构成增长引擎。买家通过口碑和病毒式社区（Twitter/X、Reddit、Hacker News）自发筛选。他们个人支付
              $20–$200/month，或在无需企业审批的情况下报销。Stack Overflow 2024 调查发现，81% 的受访者把生产率提升列为采用 AI 工具的首要动机，72% 对 AI
              工具整体持正面看法（但低于 2023 的 77%，提示早期体验带来一些失望）。GitHub 调查数据确认，62% 的专业开发者现在在工作流中使用 AI 工具，高于 2023 的 44%。

              **工程团队 / SMB（Teams 计划）** 是下一层采用群体。创业公司和中型公司的团队负责人、CTO 会集中计费并推动标准化。这一分层贡献了 Cursor 40,000+
              企业团队的大部分。决策者通常是拥有自由预算的工程 VP 或 CTO，团队年度预算常为 $40–$100K/year。

              **大型企业（IT 介入）** 是未来 2–3 年的高增长分层。Fortune 500 公司面临额外采购门槛：信息安全审查、数据隐私合规（GDPR/CCPA）、软件许可证管理，以及 $100K
              以上通常需要高管审批。Cursor 的 SOC 2 Type II 认证正是针对这一分层。Microsoft 2024 Annual Report 指出，近 60% 的 Fortune 500
              公司员工以某种形式使用 Copilot，说明企业类别已经围绕 AI 工具完成正常化。

              **受监管行业（金融服务、医疗、政府）** 是一个正在出现的高价值分层，但摩擦很大。这些买家要求数据驻留保证、本地部署选项或隔离环境。医疗领域受 HIPAA 覆盖的实体和金融服务领域受 GLBA
              覆盖的公司，对代码数据处理有严格要求；稳健的供应商安全计划（SOC 2、面向政府的 FedRAMP）是门槛条件。

              市场的一个关键结构特征是 **PLG → 企业销售动作**：Cursor 和 GitHub Copilot 都依靠个人开发者先爱上产品，再把产品带入企业采购讨论。与传统企业销售相比，这种自下而上的动作显著降低
              CAC。
