  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的核心法律风险是版权问题：AI 编程模型在开源代码上训练，可能已纳入受版权保护的素材，而美国版权局 2025 年 5 月关于生成式 AI
              训练的第三部分报告（预发布）明确指出训练数据使用的法律责任尚未厘清。Andersen v. Stability AI 等在审诉讼确立了原告追诉 AI
              内容生成商版权索赔的意愿；同类索赔可能经由模型供应商或直接来自代码库包含受许可 IP 的企业客户，触达 Cursor。

              EU AI 法案构成第二波监管冲击。GPAI 模型义务已于 2025 年 8 月起适用；作为系统性风险 GPAI 模型（GPT-4o、Claude）的部署方，Cursor
              面临尚未公开应对的二级透明度与事件报告义务。欧洲企业部署还触发 GDPR 第 25 条"隐私设计"要求：除非持续启用 Privacy
              Mode（ZDR），包含个人信息或商业秘密的源代码可能经由缺乏充分传输机制的方式传至非欧盟供应商。

              最重大的近期合规缺口是尚未获得 FedRAMP 授权、缺乏本地部署方案。这从结构上将 Cursor 排除在美国联邦政府、国防承包商、HIPAA 覆盖的医疗系统以及涉密环境之外。GitHub Copilot
              Enterprise 和 Amazon Q Developer 均提供 FedRAMP 路径；Cursor 目前不具备。这意味着企业软件开发 TAM 中约 15-25% 的可寻址市场，若不进行 FedRAMP
              投入或推出本地部署产品，Cursor 将无法服务。
