      - CR011
      - CR014
      - CR015
      - CR020
      - CR029
      - CR031
  - id: FR002
    title: 风险传导图——从根因到财务影响
    type: dag
    layout: wide
    summary: >
      DAG 展示 Cursor 上游风险因素如何经运营和市场通道传导到下游收入、利润率、估值和战略结果。关键风险链条包括：模型 API 依赖 → COGS 压缩失败 → 利润率风险；版权判例 → IP 诉讼 → 企业客户犹豫；xAI
      收购 → 企业流失 → ARR 影响；MCP 安全漏洞利用 → 信任危机 → 客户流失。
