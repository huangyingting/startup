              Anysphere 在约 28 个月内通过五轮已披露股权融资，累计融资约 $3.47 billion。

              October 2023 的 $8M 种子轮由 OpenAI Startup Fund 领投，知名天使投资人包括 Nat Friedman（前 GitHub CEO）和 Arash
