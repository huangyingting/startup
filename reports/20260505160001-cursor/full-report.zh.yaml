      - number: '3.3'
        title: 护城河耐久性、切换成本与竞争风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的护城河建立在三个互相强化的因素上：（1）工作流集成深度——开发者一旦把 Cursor 智能体、Rules 文件和自定义 MCP
              服务器嵌入日常工作流，即便底层模型可迁移，切换时也要付出实质性的重新学习成本；（2）代码库索引——Cursor
              专有的代码库索引提供具备上下文感知的补全，并会随项目历史改善，形成软数据锁定；（3）通过团队协作功能形成网络效应——共享规则和审计轨迹在团队标准化使用 Cursor
              后带来组织粘性。与这些护城河相对，主要风险是多工具并用和模型商品化。调查显示，开发者通常会同时使用两个或更多 AI 工具，Cursor 常被用于复杂任务，而 GitHub Copilot 仍在编辑器中保持活跃
              [CP020]。这种多工具并用限制了 Cursor 的净收入留存率（NRR）上限。最重要的结构性风险是模型访问集中：Cursor 依赖 Anthropic、OpenAI、Google 和 xAI API
              做模型推理；这虽然带来灵活性，也意味着 Windsurf（被 OpenAI 收购后）等竞争对手可能获得优先访问或优惠定价 [CP022]。Cursor 在 April 2026 获得 xAI 的收购期权（估值
              $60B），暗示未来可能发生基础设施绑定，但战略方向仍不确定 [CP023]。企业客户的切换成本中到高：企业团队如果已配置角色权限、仓库白名单、审计日志管道，并把 Cursor 集成进 CI/CD
              工作流，迁移工作量并不低 [CP015]。不过，相比 GitHub 这种原生集成代码审查和 CI/CD 管道的平台型既有厂商，企业锁定仍然较弱。
