      - number: '5.5'
        title: 技术差异化与平台护城河
        blocks:
          - type: paragraph
            body: >
              Cursor 的竞争壁垒建立在三个相互强化的层面上。其一，自研模型（Tab 和 Composer）在 Anysphere 基础设施上针对真实编程环境训练，这笔投入是纯 API
              路由型竞品无法复制的——后者没有自建训练基础设施就无从实现。其二，智能体套件的复利效应：每次接入新的前沿模型，都要搭配数周套件调优，产品内实测性能明显优于直接调用原生模型 API。其三，数据飞轮：逾 100
              万付费用户持续产出结构化编程任务与评估反馈，Anysphere 据此用 RL 对 Composer 不断迭代，信号直接来自生产环境。

              企业采用正在加深这道护城河：NAB 在 Cursor 的上下文工程原语（rules、skills、hooks）之上构建了内部工具 NAB CEL；Amplitude 在 Cursor Automations
              之上搭建了自主开发流水线。这类组织级集成形成的切换成本，堪比 ERP 或 DevOps 平台的锁定效应。

              开发者生态（JetBrains ACP 集成、Cursor Marketplace、Cursor SDK）将平台触角延伸至独立 IDE 之外，让 Cursor 从编辑器进化为智能体开发运行时。SpaceX
              等客户已与 Anysphere 建立深度模型训练合作（于 2026 年 4 月 21 日宣布），进一步丰富了 Composer 的训练语料与质量。
