companyProfile:
  summary: >
    Anysphere Inc.（产品名：Cursor）是一家旧金山 AI 初创公司，基于 VS Code 分支构建 AI 原生代码编辑器。公司由 Aman Sanger、Arved Häberlen、Michael Truell 和
    Sualeh Asif（均为 MIT 毕业生）于 2022 年创立，将 LLM 驱动的 Tab 补全、行内编辑及智能体编码（Composer 聊天界面）直接集成进 IDE。公司于 2026 年 2 月实现 20
    亿美元年经常性收入（ARR）， 创开发者 SaaS 史上最快纪录，2026 年初 Series D 估值达 293 亿美元。SpaceX/xAI 持有一份可在 2026 年底前行权的 600 亿美元收购期权。
