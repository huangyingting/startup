        - 立即发出卖出信号；投资逻辑不再成立
      - - Microsoft Copilot 功能对等公告
        - VS Code + GitHub Copilot Workspace 在开发者调查中与 Cursor Tab+Agent 功能对等
        - Microsoft 企业账户市场份额遭侵蚀；ARR 触顶风险
        - 减仓；重新评估竞争护城河得分
      - - xAI 收购完成
        - 签署最终收购协议
        - 回报封顶在 600 亿美元（约 2 倍）；企业客户流失风险上升
        - 评估治理权；规划收购后退出时机
      - - 毛利率在 ARR 40 亿美元时停滞于 30% 以下
        - ARR 超 40 亿美元时连续两季度毛利率低于 30%
        - 估值叙事崩塌；IPO 路径延伸至 2028 年后
        - 投资逻辑受损；评级从买入降至持有
      - - 企业 NRR 跌破 100%
        - 季度数据确认企业队列 NRR 低于 100%
        - 落地扩张飞轮失效；ARR 增长大幅放缓
        - 立即复盘；若趋势持续 2 个季度则考虑卖出
      - - 重大安全泄露
        - 企业数据泄露归因于 Cursor 智能体管道
        - 企业采购信任崩塌；触发监管调查
        - 高紧迫度卖出信号；公司需 12-18 个月才能恢复
