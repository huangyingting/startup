    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位与商业模式
        blocks:
          - type: paragraph
            body: |
              Anysphere, Inc. 以产品品牌 Cursor 对外运营，注册于特拉华州，总部位于加利福尼亚州旧金山。公司由
              Michael Truell（CEO）、Sualeh Asif（CPO）、Aman Sanger（COO）及 Arvid Lunnemark（联合创始人，
              2025 年 10 月以 CTO 身份离职）于 2022 年创立，四人均在 MIT 就读期间完成注册。核心产品 Cursor 是
              一款 AI 原生集成开发环境（IDE），基于 Microsoft 开源的 Visual Studio Code 分支，叠加生成式 AI
              能力，涵盖多智能体执行、全代码库语义搜索及自研 Composer 模型。商业模式以经常性订阅（SaaS）为主：
              个人版分四档——Hobby（$0/月）、Pro（$20/月）、Pro+（$60/月）、Ultra（$200/月）；团队版
              $40/用户/月（Business）；另设企业定制合同。Cursor 在 AI 开发者工具赛道直面 GitHub Copilot
              （Microsoft）、Windsurf/Codeium（已被 OpenAI 收购）、Amazon Q Developer 及 Claude Code
              （Anthropic）的竞争。产品主导增长（PLG）模式几乎完全依赖口碑与病毒式开发者采纳，营销支出
              据报道接近零。[CO001][CO002][CO003]
