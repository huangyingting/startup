      - number: '6.4'
        title: 留存动态与扩张模式
        blocks:
          - type: paragraph
            body: >
              Cursor 未公开 NRR、GRR、队列留存率或合同续签数据。但 ARR 增长轨迹提供了高美元留存率和强劲净扩张的有力间接证据：从 $100M ARR（2025 年 1 月）到 $2B ARR（2026 年 2
              月）历时 13 个月，起点付费用户约 72 万，这意味着收入扩张——经由新增席位和层级升级——远超任何流失。这与企业细分 NRR 远超 150% 的判断一致。

              "土地+扩张"模式有充分记录：典型路径是 1-5 名工程师以 Pro 方案入局，在工程团队内经口碑病毒式传播，触发 Teams 方案升级，最终推动全公司企业级授权。NAB 从试点扩展到 6,000+
              名开发者，并计划扩至 10,000+ 名工程师。Coinbase 从个人使用演变为全公司强制推行。Rippling 在数周内实现工程部门 60% 覆盖率。

              切换成本因企业在 Cursor 原语之上构建的组织工具而倍增：NAB 在 Cursor 的 rules、skills 和 hooks API 之上直接搭建了 NAB CEL（上下文工程库）；Amplitude 在
              Cursor Automations 之上构建了自主开发流水线。这类持久的组织集成提升了续签概率，也随时间推移持续深化扩张潜力。

              2025 年 4 月的客服机器人事件（AI 生成的客服回复杜撰了虚假的"一台机器"政策，引发用户强烈反弹）是迄今最值得关注的留存风险事件，揭示了在无护栏条件下大规模部署 LLM
              客服的危险。公司已公开道歉并更新了客服工作流程。
