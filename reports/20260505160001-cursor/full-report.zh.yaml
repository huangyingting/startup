      - number: '2.2'
        title: 市场规模 — TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              估算 AI 开发者工具的总可用市场（TAM）并不简单，因为定义口径不一，市场也在快速演化。市场研究机构发布的数字从 $2.6B（狭义，仅编码助手，2024）到 $34B+（广义，涵盖所有 AI
              增强的软件开发生命周期工具，2034）不等。三个不同视角可以给出一个合理区间：

              **自下而上视角（开发者数量 × ARPU）：** 全球专业软件开发者估计有 27–29 million 名（Statista 2024），GitHub 注册用户约 100 million（Octoverse
              2024）。Stack Overflow 2024 调查发现，62% 的专业开发者已经使用 AI 工具，高于 2023 的 44%。若付费转化部分的混合 ARPU 为
              $15-$25/user/month，并假设当前采用者中有 30–50% 转为付费，则以今天采用水平计算，可服务收入约为每年 $4–8B；随着采用率到 2028 达到 70–80%，可扩至 $12–18B。

              **自上而下视角（市场研究）：** ai2.work November 2024 分析汇总的第三方估算显示，AI 开发者工具市场到 2026 约为 $12.8B，CAGR 为 27%。Grand View
              Research 估计 AI 编码助手子市场到 2031 达 $13.22B。Allied Market Research 给出更宽口径，到 2034 为 $34.1B，并包括相邻的 DevSecOps AI
              工具。

              **可比公司视角（现有厂商收入）：** GitHub Copilot 是当前市场收入领先者，在 FY2024 达到约 1.8 million 付费订阅者和 77,000 企业客户（Microsoft 2024
              Annual Report），企业客户同比增长 180%。Cursor 在 February 2026 超过 $2B ARR。这两家公司合计很可能占当前市场年收入的
              $3.5–4B+，证明市场已经达到数十亿美元规模。

              Cursor 的 SAM——特指 AI 编码助手和 AI 原生 IDE，不包括更广的 DevSecOps 和基础设施 AI——估计到 2026 为 $5–10B，并在 27–30% CAGR 下到 2029
              增长至 $15–20B。Cursor 的 SOM 按其当前市场进入动作可触达的市场定义（主要是全球个人开发者和技术前沿公司的工程团队），短期估计为 $3–5B；Cursor 已经达到 $2B
              ARR，意味着已经获取了相当可观的 SOM。
