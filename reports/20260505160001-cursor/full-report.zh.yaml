      - number: '7.4'
        title: 财务、人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的财务风险集中于 COGS 走势与资本充足性。公司在融资约 $3.47B 后于 2026 年 4 月才略微实现正毛利；达到 GAAP 盈利还需进一步压缩模型成本或部署自有模型推理。若模型 API
              价格企稳甚至上涨（逆转 2023-2025 年推理成本下行趋势），盈利路径将延长，资本需求随之上升。

              约 150 名员工对应 $2B+ ARR，人均收入（约 $13M+）极为突出，但在企业级规模下难以为继。企业客户需要专职客户成功、安全审查、专业服务和合规团队，而这些在 Cursor
              当前的人员结构中均不明显。随着交易规模增大、采购复杂度提升，缺乏企业化 GTM 基础设施将成为留存和扩张风险。

              关键人物集中风险极高：四位联合创始人主导公司运营，无任何公开的继任梯队。任何一位创始人的离开——无论是被收购事宜分心、主动离职还是健康原因——都将在超高速增长阶段引发并被放大的组织不确定性。xAI
              收购选择权带来创始人利益分歧风险：若有创始人更倾向于 xAI 交易而非独立建公司，这一张力可能体现在产品路线图决策或招募上。
            claimRefs: []
          - type: table
            tableRef: TR004
            claimRefs:
