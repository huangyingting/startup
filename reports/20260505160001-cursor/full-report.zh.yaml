      面向 IC 的记分卡，从七个投资维度对 $29.3B Series D 的 Cursor 打分。分数采用 1-10 标尺，反映本章证据评估。总体分
      7.0/10，说明该投资在乐观情景下超过回报门槛，但若要形成超过门槛的买入确信，仍需满足条件。
