      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              AI 开发者工具的总可用市场（TAM）估算因定义差异和市场快速演进而存在较大分歧。市研机构发布的 数字从 26 亿美元（窄口径，仅编码助手，2024 年）到 340 亿美元以上（宽口径，涵盖 AI 增强软件
              开发全生命周期工具，2034 年）不等。三种视角可得出合理范围：

              **自下而上（开发者数量 × ARPU）：** 全球约有 2700 万至 2900 万名职业软件开发者（Statista 2024），GitHub 注册用户约 1 亿（Octoverse 2024）。Stack
              Overflow 2024 年调查显示，62% 的 职业开发者已在使用 AI 工具，高于 2023 年的 44%。以付费转化部分的混合 ARPU $15–$25/用户/月、 当前采纳者中 30%–50%
              付费转化为假设，可服务收入目前约每年 40 亿至 80 亿美元，随采纳率升至 70%–80%，到 2028 年有望扩大至 120 亿至 180 亿美元。

              **自上而下（市场研究）：** ai2.work 2024 年 11 月汇编的第三方估算显示，AI 开发者工具市场 到 2026 年约为 128 亿美元，年均复合增长率 27%。Grand View
              Research 将 AI 编码助手细分市场 2031 年估值定为 132.2 亿美元。Allied Market Research 引用更宽口径数字——涵盖 DevSecOps AI 工具后，2034 年达
              341 亿美元。

              **可比标的（在位者营收）：** GitHub Copilot 是市场现任营收领跑者，FY2024 付费订阅用户约 180 万、企业客户 7.7 万（微软 2024 年年报），企业客户同比增长
              180%。Cursor 于 2026 年 2 月突破 $2B ARR。两家合计，当前年收入可能已达 35 亿至 40 亿美元以上，确认市场已进入数十亿 美元规模。

              Cursor 的可服务市场（SAM）——特指 AI 编码助手和 AI 原生 IDE，不含 DevSecOps 及基础设施 AI——预计 2026 年为 50 亿至 100 亿美元，以 27%–30%
              复合增长率增长至 2029 年的 150 亿至 200 亿美元。Cursor 的可获取市场（SOM），按其当前市场拓展覆盖范围（主要面向全球技术前沿企业 的个人开发者和工程团队）估算为近期 30 亿至 50
              亿美元，而 Cursor 已实现 $2B ARR——已大幅 占据该市场。
