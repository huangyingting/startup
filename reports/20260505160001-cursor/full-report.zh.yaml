  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层——PLG 基盘与企业销售动作
        blocks:
          - type: paragraph
            body: >
              Cursor 采用产品驱动增长（PLG）架构，买方分为四层。Hobby（免费）层的个人开发者可使用有限 AI 功能和用量配额；Pro（$20/月）和 Pro+/Ultra（$60-$200/月）用户可使用完整
              AI 补全和更高模型用量上限。Teams 层（$40/用户/月）服务 2-100+ 名开发者的工程团队，提供共享计费、管理员控制、默认 Privacy
              Mode，以及模型级访问治理。Enterprise（定制价格）面向大型组织（通常 1,000+ 名工程师），需求包括 SSO/SCIM、CMEK、审计日志、合规日志和定制安全审查。

              截至 2025 年末，Cursor 约有 100 万+ 付费用户，覆盖所有层级，并有 40,000-50,000 个团队账户；公司称其在 Fortune 500/1000 中的采用率为
              64-70%。企业账户虽然只占总用户的一小部分，却贡献约 60% 的年经常性收入（ARR），反映出企业合同与个人 Pro 订阅之间约 20 倍的 ARPU 差距。

              地理覆盖横跨北美、欧洲和亚太，cursor.com 本地化为 9 种语言（英语、简体中文、日语、繁体中文、西班牙语、法语、葡萄牙语、韩语、德语），显示出有意识的国际扩张。企业客户包括全球金融机构（亚太的
              NAB、全球的 Optiver）、美国科技公司（NVIDIA、Stripe、Coinbase）、金融科技（Rippling、OnePay）和 LATAM 科技公司（Mercado Libre）。
