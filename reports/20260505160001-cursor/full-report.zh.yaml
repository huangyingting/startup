      - number: '3.2'
        title: 竞争对手画像与定位
        blocks:
          - type: paragraph
            body: >
              GitHub Copilot 是市场既有领导者，装机基础最大：截至 2024 财年，拥有 1.8 million 付费订阅者和 77,000 企业客户；按订阅者数量和混合 ARPU 推算，ARR 约为
              $300–350 million [CP002]。Copilot 以插件形式分发到 VS Code、JetBrains、Neovim 和其他编辑器，借力 Microsoft 的企业销售队伍和 Azure
              捆绑。它的关键优势是品牌信任、既有企业采购渠道和深度 GitHub 集成；结构性弱点是插件架构会带来上下文限制，而 Cursor 这样的独立 IDE 可以绕开。GitHub 自身在 2025
              已开始限制智能体式会话，因为并行化 AI 工作流压垮计算基础设施——这表明插件架构难以扩展到智能体式用例 [CP008]。Windsurf（原 Codeium，2024 更名）是 Cursor
              最直接的同业——一个 VS Code 分支版本的独立 IDE，面向同一专业开发者群体，核心是名为 Cascade 的智能体模型。OpenAI 于 May 2025 同意以约 $3 billion 收购
              Windsurf，显示 OpenAI 想通过模型和工具的纵向整合，在 IDE 层竞争 [CP001]。 收购后，Windsurf 将获得 OpenAI 前沿模型的独占访问权，并有机会接入 ChatGPT 的
              300 million+ 用户基础，形成 Cursor 不具备的分发优势 [CP006]。Amazon Q Developer（原 CodeWhisperer）以插件形式面向 AWS 原生开发者，Pro
              层级价格为 $19/user/month，并为个人提供免费层 [CP004]。Q Developer 的差异化在于深度理解 AWS 服务（为 S3、Lambda、EC2 等提供代码建议）以及 Amazon
              的企业分发。局限在于它主要是 AWS 生态打法，对多云或云中立企业吸引力有限。Tabnine 主打企业隐私，提供云、本地和隔离部署选项，定位于那些因数据治理要求而无法使用 Cursor 这类纯云工具的受监管行业
              [CP010]。JetBrains AI 捆绑在 JetBrains 的 IDE 订阅组合中（IntelliJ、PyCharm、WebStorm 等），无需单独许可即可触达约 10 million+
              开发者装机基础 [CP011]。Replit 是相邻竞争者，面向基于浏览器的云开发，并提供 AI 原生工具，主要触达学生和快速原型开发者，而不是专业企业开发者 [CP012]。
