  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              Cursor 的主要法律敞口是版权：在开源代码上训练的 AI 编码模型可能纳入了受版权保护的材料，而美国版权局 2025 年 5 月关于生成式 AI
              训练的第三部分报告（预发布）明确提示，训练数据使用的责任尚未定论。Andersen v. Stability AI 等在审诉讼表明，原告会追究 AI 内容生成器的版权索赔；类似索赔可能通过 Cursor
              的模型提供商传导到 Cursor，也可能直接来自代码库含有授权 IP 的企业客户。

              欧盟 AI Act 带来第二波监管。GPAI 模型义务自 2025 年 8 月起适用；Cursor 作为系统性风险 GPAI
              模型（GPT-4o、Claude）的部署方，面临次级透明度和事故报告义务，但尚未公开回应。欧洲企业部署还会触发 GDPR 第 25 条的内建数据保护要求：除非 Privacy Mode（ZDR）持续启用，含
              PII 或商业秘密的源代码可能在缺乏充分传输机制的情况下发送给非欧盟提供商。

              近期最重要的合规缺口是缺少 FedRAMP 授权和本地部署。这会在结构上把 Cursor 排除在美国联邦政府、国防承包商、HIPAA 覆盖的医疗系统和高度机密环境之外。GitHub Copilot
              Enterprise 和 Amazon Q 提供 FedRAMP 路径；Cursor 没有。除非投入 FedRAMP 或推出本地部署产品，否则 Cursor 无法服务企业软件开发总可用市场（TAM）中约
              15-25% 的可寻址上限。
