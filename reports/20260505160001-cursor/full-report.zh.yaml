  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Cursor 在快速演进的 AI 开发者工具赛道面对多层竞争：IDE 原生直接竞对（Windsurf/Codeium，即将 并入 OpenAI）、主导性在位插件（GitHub
              Copilot，微软旗下）、超大规模云厂商自研工具（Amazon Q Developer、Google Duet AI）、企业隐私专家（Tabnine），以及 IDE 捆绑助手（JetBrains AI）。
              两大结构性力量主导竞争：（1）工具是独立 IDE 还是嵌入现有编辑器的插件；（2）供应商是否拥有 底层 AI 模型，还是依赖第三方 API。Cursor 无插件（独立 VS Code 分支），目前模型中立（通过
              API 调用 Anthropic Claude、OpenAI GPT-4 等），差异化在于 UX 深度和多智能体编排，而非模型 独家性。市场正经历快速整合：OpenAI 于 2025 年 5 月宣布约 30
              亿美元收购 Windsurf（原 Codeium）[CP001]，表明超大规模云厂商将 AI 编码工具视为值得纵向整合的战略护城河。Cursor
              缺乏自研模型，随着竞对获得更紧密的模型-工具整合优势，这是一个持续演化的竞争风险。
            claimRefs:
