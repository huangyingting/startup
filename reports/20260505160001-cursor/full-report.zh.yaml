      - number: '8.3'
        title: 多情景分析与回报测算
        blocks:
          - type: paragraph
            body: >
              乐观情景：Cursor 到 2026 年底达到 $8-10B ARR，随着自主推理贡献 30-40% 的补全请求，毛利率改善至 40-50%，且 xAI 收购选择权未被行使。按 15 倍 ARR，Cursor
              估值达 $120-150B——相较 D 轮入场价约 4-5 倍回报，2027-2028 年 IPO 时市值 $100B+。这需要持续超 150% 的年化 ARR 增长，且不出现来自微软或 API
              访问限制的重大竞争干扰。

              基准情景：Cursor 到 2026 年底达到 $5-6B ARR，毛利率改善至 30-40%，被 xAI 收购或 2028 年 IPO 时按 10-12 倍 ARR（$50-72B）退出。这意味着 D 轮入场价
              2-3 年回报约 1.7-2.5 倍，大致相当于 xAI 收购选择权的底价。对于要求 3 倍+ 回报的晚期 VC 基金，基准情景在没有 IPO 显著估值扩张的情况下无法达标。

              悲观情景：ARR 增速放缓至 $3-4B（微软捆绑、API 限制），毛利率停滞在 15-25%，风险厌恶市场环境下估值倍数重置至 8 倍。Cursor 估值落在 $24-32B，低于 D 轮入场价
              $29.3B，使最新轮投资者受损。这一情景下，以更低估值入场的早期轮次投资者仍可获得正回报，而 D 轮投资者则面临 10-20% 的亏损。
            claimRefs: []
