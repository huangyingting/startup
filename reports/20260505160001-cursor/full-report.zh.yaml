      - number: '8.4'
        title: 估值立场、投资建议与最终尽调清单
        blocks:
          - type: paragraph
            body: >
              估值立场：为增长定价，安全边际有限。以 $2B ARR 对应 14.7 倍 ARR、近乎零毛利率，Cursor 的估值已将大幅毛利率改善和持续超高速增长计入价格——而后者尚未维持超过 13
              个月。该估值可辩护，但需要相信两个尚未证实的假设：（1）随着自主推理规模化，毛利率将达到 60%+；（2）在 Cursor 企业飞轮实现自我强化之前，微软不会将捆绑优势付诸实施。

              建议：有条件择机买入。对于投资期 3-5 年、回报目标 3 倍+ 的晚期成长型基金，满足以下条件时投资成立：（a）投资者获得参与或否决 xAI 收购决定的治理权利；（b）投前尽调确认毛利率在 12
              个月路线图内可改善至 35%+；（c）ARR 队列数据确认企业层 NRR > 130%。无法满足上述条件的投资者应以 $29.3B 估值回避。

              风险评级：高。近乎零毛利率、来自微软/Copilot 的存在级竞争、xAI 收购回报上限、模型 API 依赖——这一组合形成的风险图谱明显高于企业 SaaS 投资中值。增长轨迹部分对冲，但 $29.3B
              时的安全边际薄弱。

              优先尽调清单：（1）GAAP 财务模型（利润表、按队列分解的毛利率、按模型供应商分解的 COGS）；（2）D 轮治理条款（收购否决权、董事会席位）；（3）按客户细分的 ARR 队列留存与 NRR
              数据；（4）FedRAMP 投入计划与时间表；（5）自主推理部署路线图及 ARR 覆盖率目标；（6）Koala 收购业绩对赌条款及稀释影响。
