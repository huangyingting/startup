      - number: '5.2'
        title: 自研 AI 模型——Cursor Tab 与 Composer 系列
        blocks:
          - type: paragraph
            body: >
              与主要将请求路由至第三方前沿模型的竞对不同，Cursor 自研并维护两类专有 AI：Cursor Tab （补全模型）和 Composer 系列（智能体推理模型）。

              Cursor Tab 是以强化学习训练的填充中间（FIM）微调模型，专注于多行、多文件补全。Tab 在 每次接受建议后预测下一处编辑位置，自动导入 TypeScript/Python 中未解析的符号，并建议 完整
              diff 而非单个 token。

              Composer 系列是在生产编码环境中利用强化学习大规模训练的混合专家（MoE）语言模型系列。 Composer 可调用编辑、终端、grep 和语义搜索工具，通过反映真实软件工程质量的奖励模型优化。
              训练基础设施采用自定义 MXFP8 内核，结合专家并行和混合分片数据并行，跨数千块 NVIDIA GPU （PyTorch + Ray）运行。Warp decode 内核（2026 年 4
              月）通过将计算重组围绕输出而非专家， 在 Blackwell GPU 上进一步实现 1.8 倍的 MoE 解码提速。

              Composer 2（2026 年 3 月）在 CursorBench 上得分 61.3，Terminal-Bench 2.0 得分 61.7， SWE-bench Multilingual 得分 73.7——以
              $0.50/M 输入、$2.50/M 输出（标准版）或 $1.50/$7.50 （快速版，生成速度快 4 倍）的价格实现前沿级别得分。基于 Cursor 工程师真实工程请求的内部 评测 Cursor Bench
              为持续强化学习训练设定质量基准。Cursor 还在同一 Agent 框架中开放所有 主流前沿模型（Claude Sonnet、GPT-5、Gemini Flash 2.5、Qwen Coder）供用户选择。
            claimRefs: []
