      - number: '5.3'
        title: 智能体基础设施、云平台与 MCP 生态
        blocks:
          - type: paragraph
            body: >
              Cursor Agent 框架是核心编排层，管理每次 AI 交互的上下文窗口（系统提示 + 工具描述 + 对话 历史 + 用户请求）。框架针对每个模型持续调优：Anysphere
              获得新前沿模型早期访问权后，工程师 会花数周时间定制提示结构、上下文注入方式、工具描述和护栏，直到该模型在框架内的表现超越 其原始基准。会话中模型切换（2026 年 4
              月引入）允许开发者在不丢失对话上下文的情况下 更换模型。

              Cursor 3（2026 年 4 月）引入融合本地与云端智能体的统一工作区。云端智能体在专用隔离虚拟机 上运行，消除制约并行度的本地资源约束。Amplitude 每周无需人工提示即可运行 1000 次以上自动化
              智能体任务；NAB 工程师在遗留 Assembly 代码上同时启动多个智能体分支，收集结构化流程图和 迁移报告。截至 2026 年 2 月，Cursor 内部合并的 35% PR 由自主云端智能体创建。公司整体
              智能体使用量过去一年增长约 15 倍；Cursor 目前智能体用户是 Tab 用户的 2 倍（逆转了 2025 年 3 月 Tab 用户与智能体用户 2.5:1 的比例）。

              Cursor Automations 支持持续运行的基于 cron 和触发器的云端智能体工作流（Amplitude 用其 自动将 Slack 缺陷报告转换为 PR）。Cursor SDK（2026 年 4
              月，npm install @cursor/sdk） 通过 TypeScript API 以编程方式开放相同的智能体运行时、框架和模型，为平台开辟开发者生态。 MCP（Model Context
              Protocol）支持使 Cursor 成为外部工具、数据库和工作流的一流集成节点。 Cursor Marketplace 分发插件——MCP 服务器、技能、子智能体、规则和钩子的打包集合——企业
              治理可通过管理员控制分发模式（默认关闭、默认开启、强制启用）实现。
