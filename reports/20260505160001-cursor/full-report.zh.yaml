  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Cursor 的相关市场是 AI 辅助开发者工具——把大语言模型能力直接嵌入软件开发工作流，用来加速代码编写、调试、审查和测试的软件。这个市场不同于：（a）没有深度编辑器集成的通用 AI
              聊天机器人（ChatGPT、Gemini）；（b）没有 AI 功能的传统 IDE（VS Code、JetBrains）；（c）DevOps/CI/CD 平台（GitHub
              Actions、CircleCI）；以及（d）应用监控或可观测性工具。会流入同一预算但不纳入核心定义的相邻支出包括 AI 代码审查自动化（例如独立 PR 审查机器人）、AI 测试生成平台和 AI 文档生成器。

              在 AI 开发者工具内部，市场按交付模式分层。两大主类是 IDE 原生 AI 编码工具——从底层围绕 AI 构建的全功能环境（Cursor、Windsurf）——以及挂接到现有 IDE 的编辑器扩展 /
              插件（GitHub Copilot、Tabnine、Codeium、Amazon Q Developer）。Cursor 主要在 IDE 原生类别竞争，其产品基于 VS Code
              分支版本构建；同时也吸引从扩展型工具切换过来的跨类别买家。

              主要购买单元是个人软件开发者（直接 B2C）或工程团队（B2B 企业）。收入可以来自个人直接订阅（PLG 自助）、向部门负责人或工程负责人计费的团队计划，或由 IT /
              采购管理的企业协议。在金融、医疗、国防等受监管行业，还会增加额外审批层，通常伴随数据驻留或本地部署要求。
