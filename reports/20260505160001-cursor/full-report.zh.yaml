companyProfile:
  summary: >
    Anysphere Inc.（产品名：Cursor）是一家位于 San Francisco 的 AI 创业公司，基于 VS Code 分支版本打造 AI 优先的代码编辑器。公司由 Aman Sanger、Arved
    Häberlen、Michael Truell 和 Sualeh Asif（均为 MIT 毕业生）于 2022 创立。Cursor 将由 LLM 驱动的 Tab 补全、行内编辑和基于聊天式 Composer
    界面的智能体式编码直接嵌入 IDE。公司到 February 2026 达到 $2B ARR，是开发者 SaaS 史上最快；并在 early 2026 的 Series D 中达到 $29.3B 估值。SpaceX/xAI 持有一项
    $60B 收购期权，可在 end-2026 前行权。
  foundedDate: '2022-01-01'
  founders:
