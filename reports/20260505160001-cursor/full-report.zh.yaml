      - number: '2.3'
        title: 买家分层与采纳驱动力
        blocks:
          - type: paragraph
            body: >
              AI 编码工具的买家格局涵盖四个主要细分，各具不同的决策逻辑。

              **个人开发者（自助 PLG）** 是 Cursor 的初始用户群，也是持续增长引擎。这类买家依靠口碑和病毒式 社区（Twitter/X、Reddit、Hacker News）自发选择。他们个人支付
              $20–$200/月，或无需企业审批 报销。Stack Overflow 2024 年调查显示，81% 的个人开发者将效率提升列为采纳 AI 工具的首要动机； 72% 对 AI 工具持正面评价（低于 2023
              年的 77%，反映早期采纳者中存在一定失望情绪）。GitHub 调查数据确认，62% 的职业开发者已在工作流中使用 AI 工具，高于 2023 年的 44%。

              **工程团队 / 中小企业（Teams 套餐）** 是下一层采纳主体。初创和中型公司的团队负责人与 CTO 集中管理账单、统一工具选型。这一细分构成 Cursor 4 万个以上企业团队的主体。决策者通常是工程
              VP 或 CTO，团队年预算往往在 4 万至 10 万美元之间。

              **大型企业（IT 主导）** 是未来 2–3 年的高增长细分。Fortune 500 企业需跨越额外采购门槛：信息 安全审查、数据隐私合规（GDPR/CCPA）、软件许可管理，以及超过 10
              万美元时通常需要高管审批。 Cursor 的 SOC 2 Type II 认证专门针对该细分。微软 2024 年年报指出，近 60% 的 Fortune 500 企业员工以某种形式使用
              Copilot，表明企业市场对 AI 工具的接受已趋于正常化。

              **受监管行业（金融、医疗、政府）** 是新兴高价值细分，摩擦系数高。这类买家需要数据驻留保证、 本地部署选项或气隙环境。医疗行业受 HIPAA 约束的主体和金融服务行业受 GLBA 约束的机构面临
              严格的代码数据处理要求；供应商安全计划是否完善（SOC 2、政府领域的 FedRAMP）是门槛性要求。

              市场的关键结构性特征是 **PLG → 企业销售转化**：Cursor 和 GitHub Copilot 都依赖个人开发者 先对产品产生热情，再将其带入企业采购对话。这种自下而上的路径与传统企业销售相比能大幅压低
              获客成本（CAC）。
