              Windsurf/Codeium 的销售团队有 75 人。精简的 GTM 结构反映出 Cursor 依赖自下而上的开发者采用和口碑，而非传统企业销售动作。

              到 2024 年 12 月，Cursor 已进入 OpenAI、Midjourney、Perplexity、Replicate、Shopify 和 Instacart 等知名企业。到 2025
              年，客户基盘已扩展至 NVIDIA（全公司 40,000 名工程师）、Coinbase（截至 2025 年 2 月所有工程师）、NAB（6,000+
