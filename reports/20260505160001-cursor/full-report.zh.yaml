  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >
              Cursor（Anysphere, Inc.）通过分层订阅模式变现，面向个人开发者和企业团队，并用基于用量的超额计费和 API token 定价补充，以覆盖重度智能体工作负载。产品采用免费增值模式：Hobby
              层免费，AI 使用量有限（每月 2,000 次代码补全），用于推动顶部漏斗的开发者采用和转化。Pro 层为 $20/month，解锁更高智能体限制和前沿模型访问。Pro+ 为
              $60/month（OpenAI、Claude 和 Gemini 模型用量为 3×），服务每日使用智能体的用户。Ultra 为 $200/month，相比 Pro 提供 20×
              用量，面向运行多文件智能体工作流的重度用户。Teams 为 $40/user/month，增加企业控制——集中计费、管理员仪表盘、RBAC 和 SAML/OIDC SSO——并与定制 Enterprise
              合同一起，成为主要企业获客工具 [CI001]。Cursor 还推出了自有 AI 模型：Composer 2（March 2026）以可通过 API 访问的 token 定价提供——标准档为 $0.50/M
              输入和 $2.50/M 输出 tokens，快速档为 $1.50/M 输入和 $7.50/M 输出 tokens——使基于用量的收入随智能体工作负载复杂度增长，而不是受固定订阅额度限制
              [CI002]。这种计费架构已从纯按席位 SaaS 转向混合模式，重负载产生更高比例收入，从而降低了 Cursor 在 July 2025 定价争议中暴露出的重度使用客户定价过低风险。截至 early
              2026，企业和公司买家约占总收入 60%，反映出 Koala 在 July 2025 被收购后，公司从开发者主导的自助动作快速转向企业主导合同 [CI003]。
