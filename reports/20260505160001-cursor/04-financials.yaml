callouts:
  - title: 'Revenue Quality: Exceptional Growth, Unconfirmed Margin'
    calloutType: insight
    body: >
      Cursor's ARR trajectory ($1M to $2B in ~36 months, doubling every 2 months) is the fastest documented B2B SaaS
      ramp. Combined with approaching gross-margin profitability and ~60% enterprise revenue mix, the revenue quality
      signals are strong. However, the primary underwriting gap is the unconfirmed gross margin: AI model inference is
      the dominant COGS, and until Cursor discloses its margin structure or builds significant proprietary model
      coverage, it faces a fundamental tension between growth speed (subsidized by below-cost inference) and sustainable
      margin. The March 2026 Composer 2 launch is a credible step toward proprietary model economics.
    claimRefs:
      - C112
      - C113
      - C114
      - C115
      - C116
  - title: 'Capital Adequacy Risk: xAI Concentration'
    calloutType: risk
    body: >
      Cursor's SpaceX/xAI Colossus compute partnership creates concentration risk in model training infrastructure:
      disruption to that relationship (political, commercial, or technical) could impair Cursor's ability to train and
      scale its proprietary Composer models. The April 2026 $60B xAI acquisition option adds an unusual dependency
      dimension — any move toward an xAI acquisition could transfer IP ownership or create corporate governance
      conflicts with Cursor's existing VC investors and enterprise customers, who may prefer vendor neutrality.
    claimRefs:
      - C125
      - C127
      - C130
