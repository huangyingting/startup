  evidenceGaps:
    - type: private-evidence-only
      severity: high
      topic: Gross margin by tier — not publicly disclosed; approaching breakeven but unconfirmed
      missingEvidence: >-
        Cursor has not disclosed gross margin percentage. Sacra's 'slight gross-margin profitability' is analyst
        estimate. Without margin data, the sustainability of the revenue model at scale cannot be confirmed.
      whyItMatters: >-
        If model API costs are 50-70% of revenue at current scale, reaching high gross margins requires either
        significant Composer model substitution for API calls or price increases — both carry execution risk.
      diligencePath: >-
        Request gross margin by tier (Pro vs. Teams vs. Enterprise) and COGS decomposition; compare to LLM API call logs
        and compute cost statements.
      relatedQuestionRefs:
        - RQ025
    - type: private-evidence-only
      severity: high
      topic: Net Revenue Retention (NRR) — not disclosed
      missingEvidence: >-
        Cursor's NRR by tier is not publicly reported. The enterprise expansion is inferred from revenue mix shift, not
        confirmed NRR data.
      whyItMatters: >-
        NRR is the most critical durability metric for a SaaS company. NRR below 120% would indicate significant churn
        offsetting new business; NRR above 140% would confirm strong expansion economics.
      diligencePath: Request monthly NRR by cohort vintage (2023, 2024, 2025) and by segment (Pro, Teams, Enterprise).
      relatedQuestionRefs:
        - RQ024
    - type: missing-source
      severity: moderate
      topic: Enterprise ACV distribution — no public data on deal size range
      missingEvidence: >-
        No public information on enterprise deal sizes, average contract lengths, or concentration risk among top
        customers.
      whyItMatters: >-
        If enterprise revenue is concentrated in a few large customers, the $2B ARR figure carries higher concentration
        risk than it appears.
      diligencePath: >-
        Request top-20 customer ACV, contract renewal timeline, and expansion deal size; confirm customer HHI
        (Herfindahl-Hirschman concentration index).
      relatedQuestionRefs:
        - RQ025
    - type: private-evidence-only
      severity: moderate
      topic: Model API contract terms — multi-year partnerships undisclosed
      missingEvidence: >-
        Cursor's multi-year API partnerships with Anthropic, OpenAI, Google, and xAI have not been publicly disclosed in
        terms of pricing, volume discounts, or exclusivity provisions.
      whyItMatters: >-
        Unfavorable renewal terms or API price increases could significantly worsen gross margins; exclusivity
        provisions on competing tools could be a defensive moat.
      diligencePath: >-
        Review API contract terms with each model provider; assess renewal risk, minimum commitment thresholds, and
        most-favored-nation pricing provisions.
    - type: missing-source
      severity: moderate
      topic: GAAP revenue vs. ARR reconciliation — private company
      missingEvidence: >-
        Cursor's reported ARR is analyst-estimated and company-stated. GAAP revenue may differ due to enterprise upfront
        billing, deferred revenue, and contract modifications.
      whyItMatters: >-
        GAAP revenue reconciliation is required for accurate valuation modeling and for confirming the ARR figures that
        underpin the $29.3B Series D valuation.
      diligencePath: >-
        Request audited financial statements; compare GAAP revenue recognition schedule to ARR; review deferred revenue
        balance.
      relatedQuestionRefs:
        - RQ025
