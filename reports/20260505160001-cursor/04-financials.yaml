sections:
  - id: SEC001
    title: Revenue Model and Pricing Architecture
    body: >
      Cursor (Anysphere, Inc.) monetizes through a tiered subscription model targeting individual developers and
      enterprise teams, supplemented by usage-based overage and API token pricing for heavy agentic workloads. The
      product is freemium: the Hobby tier is free with limited AI usage (2,000 monthly code completions), designed to
      drive top-of-funnel developer adoption and conversion. The Pro tier at $20/month unlocks extended agent limits and
      access to frontier models. Pro+ at $60/month (3× usage on OpenAI, Claude, and Gemini models) serves daily agent
      users. Ultra at $200/month provides 20× usage vs. Pro, targeting power users running multi-file agentic workflows.
      Teams at $40/user/month adds enterprise controls — centralized billing, admin dashboards, RBAC, and SAML/OIDC SSO
      — and is the primary enterprise acquisition vehicle alongside custom Enterprise contracts [C106]. Cursor also
      introduced its own AI models: Composer 2 (March 2026) is available at API-accessible token pricing — standard tier
      at $0.50/M input and $2.50/M output tokens, fast tier at $1.50/M input and $7.50/M output tokens — enabling
      usage-based revenue that scales with agentic workload complexity rather than fixed subscription limits [C107].
      This billing architecture has shifted from purely per-seat SaaS to a hybrid model where heavier workloads generate
      proportionally more revenue, reducing the risk of underpricing heavy-usage customers that was flagged in Cursor's
      July 2025 pricing controversy. As of early 2026, enterprise and corporate buyers account for approximately 60% of
      total revenue, reflecting a rapid shift from a developer-led self-serve motion to enterprise-led contracts since
      the Koala acquisition in July 2025 [C108].
    claimRefs:
      - C106
      - C107
      - C108
      - C109
      - C110
      - C111
  - id: SEC002
    title: Revenue Traction, Unit Economics, and Cost Structure
    body: >
      Cursor's revenue trajectory is exceptional by any SaaS benchmark. Starting from $1M ARR in 2023, the company
      reached $100M ARR in January 2025 (approximately 12 months from first material revenue), $500M ARR in June 2025,
      $1B ARR in November 2025, and $2B ARR in February 2026 [C112]. This $1M-to- $2B trajectory took approximately 36
      months, with revenue doubling roughly every two months through 2025. SaaStr identified Cursor as the
      fastest-growing B2B SaaS company from $1M to $500M ARR on record, surpassing prior records set by Wiz, Deel, and
      Ramp [C113]. Sacra estimates that Cursor reached slight gross-margin profitability in April 2026 and was
      forecasting more than $6B in annualized revenue run rate by end-2026 [C114]. The primary cost of revenue is AI
      model inference — Cursor routes queries through Anthropic Claude, OpenAI GPT, Google Gemini, and its own Composer
      models, paying per-token API fees that represent the largest single cost component. For latency-sensitive
      operations like inline code completion, Cursor uses fine-tuned Mixture-of-Experts (MoE) models to reduce inference
      cost per call while maintaining quality [C115]. Cursor launched proprietary models Composer (October 2025) and
      Composer 2 (March 2026), aiming to reduce dependency on third-party API costs over time and improve gross margins
      [C116]. Sales and marketing expenditure has historically been minimal relative to revenue because Cursor's growth
      is overwhelmingly product- led: the free tier drives organic developer adoption, with conversion to paid tiers
      occurring inside the product. Enterprise sales is supplemented by a growing direct sales team post-Koala
      acquisition, but CAC remains relatively low compared to traditional enterprise SaaS, with customer acquisition
      anchored by word-of-mouth and developer community referrals [C117]. The headcount of approximately 150 employees
      (as of early 2026) implies very high revenue per employee — over $13M ARR per employee at $2B ARR — a figure that
      reflects the capital-light nature of software distribution combined with unusually high revenue growth [C118].
      Infrastructure costs are primarily AWS-based with compute supplemented by the SpaceX/xAI Colossus partnership for
      model training [C119].
    claimRefs:
      - C112
      - C113
      - C114
      - C115
      - C116
      - C117
      - C118
      - C119
      - C120
      - C121
      - C122
  - id: SEC003
    title: Capital Adequacy, Financing History, and Financial Verdict
    body: >
      Cursor has raised approximately $3.47 billion in total venture financing across five rounds: a Seed round of
      approximately $8M, a Series A of $60M at a $400M valuation, a Series B of $105M at a $2.6B valuation (December
      2024), a Series C of $900M at a $9.9B valuation (November 2025), and a Series D of $2.3B at a $29.3B valuation
      (March 2026) [C123]. The scale of capital raised far exceeds the company's operational cash needs given its rapid
      progression to gross-margin profitability — the capital is primarily strategic: building a moat in model
      partnerships and compute infrastructure, funding the xAI Colossus training partnership, and supporting enterprise
      sales buildout [C124]. Monthly cash burn is not publicly disclosed; however, at ~$2B ARR with approaching
      gross-margin breakeven and approximately $3.47B raised, Cursor's implied runway is multiple years even under
      pessimistic burn assumptions. The Series D at a $29.3B valuation implies an ~15× forward ARR multiple if 2026 ARR
      reaches $2B, or ~5× if the $6B+ forecast is met. Key financing risks include: model API cost inflation if
      Anthropic or OpenAI raises API prices (Cursor has multi-year partnerships but terms are not disclosed), compute
      cost escalation for Composer model training, and the xAI/SpaceX compute partnership which creates dependency on a
      politically-sensitive counterparty [C020, C021]. A $60B xAI acquisition option received by Cursor in April 2026
      adds an unusual strategic optionality dimension to the capital structure but does not constitute committed
      financing [C127]. The overall financial verdict is favorable on revenue quality (strong subscription NRR proxy,
      enterprise pivot, rapid growth), capital adequacy (substantial runway), and trajectory (approaching
      profitability); the primary financial diligence blockers are gross margin confirmation (not publicly disclosed),
      model API cost structure (private), and enterprise contract ACV and NRR data (not publicly available) [C128].
    claimRefs:
      - C123
      - C124
      - C125
      - C126
      - C127
      - C128
      - C129
      - C130
