      statement: >-
        Cursor's pricing tiers as of May 2026 are: Hobby (free, limited completions), Pro ($20/month), Pro+ ($60/month,
        3× usage), Ultra ($200/month, 20× Pro usage), Teams ($40/user/month with enterprise controls), and Enterprise
        (custom pricing with pooled usage, SCIM, AI code tracking API, and audit logs).
