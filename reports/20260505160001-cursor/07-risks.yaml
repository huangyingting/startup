callouts:
  - title: Copyright and IP Indemnification Gap Is the Highest-Stakes Legal Risk
    body: >
      The US Copyright Office's 2025 Part 3 report on AI training data and the ongoing Andersen v. Stability AI
      litigation mark a turning point in AI copyright enforcement. Cursor lacks a published IP indemnification policy
      for enterprise customers, whereas GitHub Copilot Enterprise has offered indemnification since 2023. In competitive
      enterprise procurement, this gap is a material objection in legal reviews, particularly at technology companies
      that have IP-sensitive codebases. Cursor should prioritize an enterprise IP indemnification policy as a near-term
      product-legal initiative.
    claimRefs:
      - CR004
      - CR005
      - CR008
      - CR029
      - CR042
    calloutType: risk
  - title: xAI Acquisition Option Is the Single Highest-Severity Risk
    body: >
      The $60 billion SpaceX acquisition option, if exercised, would subordinate Cursor's independent product roadmap to
      the Musk enterprise and trigger an antitrust review cycle of 18-24 months in the EU and potential DOJ/FTC review
      in the US. More immediately, enterprise procurement decisions are already being affected: security-sensitive
      accounts that compete with SpaceX ventures (satellite internet, automotive, aerospace) have a rational basis to
      pause Cursor adoption pending acquisition clarity. This risk is binary and non-hedgeable from an investor
      perspective; the outcome hinges on the founders' governance rights under the option and their willingness to
      resist the transaction.
    claimRefs:
      - CR015
      - CR016
      - CR034
    calloutType: risk
  - title: Model API Dependency Is Manageable But Requires Own-Inference Milestone
    body: >
      Cursor's gross margin improvement trajectory (from ~15% at $200M ARR to near-positive at $2B ARR) demonstrates
      that model API cost compression is achievable — but the pathway to 70%+ SaaS gross margin requires either
      continued inference price declines or Cursor deploying its own inference at scale. The Cursor 3 model (April 2026)
      is an early signal of own-model development. If own-model inference covers even 30-40% of completions by end-2026,
      the margin risk recedes materially. Diligence should focus on Cursor's actual API spend composition and own-model
      inference roadmap.
    claimRefs:
      - CR017
      - CR018
      - CR019
      - CR035
    calloutType: recommendation
  - title: No Disclosed Bug Bounty or Responsible Disclosure Policy
    body: >
      Enterprise CISO vendor evaluations routinely include assessment of the vendor's security program maturity: bug
      bounty programs, CVE disclosure history, responsible disclosure policies, and security researcher engagement.
      Cursor's security page discloses annual pen testing and SOC 2 Type II but does not mention a bug bounty program or
      CVE coordination process. In a product that executes agentic code in customer development environments, the
      absence of a public security researcher program is a meaningful gap relative to the enterprise security posture
      Cursor claims to offer Fortune 500 customers.
    claimRefs:
      - CR030
      - CR041
    calloutType: risk
