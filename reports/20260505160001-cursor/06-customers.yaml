sections:
  - id: sec-01
    title: Customer Segmentation — PLG Base and Enterprise Motion
    body: >
      Cursor operates a product-led growth (PLG) architecture with four distinct buyer tiers. Individual developers on
      the Hobby (free) tier access limited AI features and usage quotas; Pro ($20/month) and Pro+/Ultra ($60-$200/month)
      users access full AI completions and higher model usage limits. The Teams tier ($40/user/month) serves engineering
      squads of 2-100+ developers with shared billing, admin controls, Privacy Mode by default, and model-level access
      governance. Enterprise (custom pricing) targets large organizations (typically 1,000+ engineers) needing SSO/SCIM,
      CMEK, audit logs, compliance logging, and custom security reviews.

      As of late 2025, Cursor had approximately 1M+ paying users across all tiers and 40,000-50,000 team accounts, with
      the company claiming 64-70% adoption across the Fortune 500/1000. Enterprise accounts contribute approximately 60%
      of ARR despite representing a smaller fraction of total users, reflecting the ~20× ARPU differential between
      enterprise contracts and individual Pro subscriptions.

      Geographic reach spans North America, Europe, and Asia-Pacific, with cursor.com localized in 9 languages (English,
      simplified Chinese, Japanese, traditional Chinese, Spanish, French, Portuguese, Korean, German), indicating
      deliberate international expansion. Enterprise customers include global financial institutions (NAB in APAC,
      Optiver globally), US tech companies (NVIDIA, Stripe, Coinbase), fintech (Rippling, OnePay), and LATAM tech
      (Mercado Libre).
  - id: sec-02
    title: Adoption Trajectory and Growth Evidence
    body: >
      Cursor's ARR trajectory is among the fastest documented in B2B software history. Anysphere's ARR grew from
      approximately $4M (April 2024) to $48M (October 2024) — a 12× expansion in six months — then to $100M ARR by
      January 2025, $200M by April 2025 (doubling in three months), $500M by June 2025, $1B by November 2025, and $2B by
      February 2026. From $100M to $2B ARR in approximately 13 months represents a roughly 20× expansion.

      The number of paying individual users reached approximately 720,000 at $200M ARR (April 2025), implying an average
      revenue per user (ARPU) of roughly $277 annually at that stage. By late 2025, Anysphere reported passing 1M paying
      users. Enterprise expansion accelerated significantly through 2025: Anysphere hired its first dedicated sales
      representative in late 2024, and by April 2025 had grown the enterprise GTM team to 7 reps (per Sacra), compared
      to competitor Windsurf/Codeium's 75-person sales team. The lean GTM structure reflects Cursor's reliance on
      bottom-up developer adoption and word-of-mouth rather than traditional enterprise sales motion.

      By December 2024, Cursor had already reached notable enterprises including OpenAI, Midjourney, Perplexity,
      Replicate, Shopify, and Instacart. By 2025, the customer base had expanded to include NVIDIA (40,000 engineers
      company-wide), Coinbase (all engineers by Feb 2025), NAB (6,000+ developers), Stripe (hundreds to thousands of
      engineers), Rippling (150 → 500+ engineers in weeks), and dozens of the largest global technology companies.
  - id: sec-03
    title: Named Customer Proof — Production Deployments and Reference Quality
    body: >
      Cursor's customer page and case studies provide direct executive testimonials from production deployments across a
      range of industries and company sizes.

      At the large-enterprise end, NVIDIA deployed Cursor company-wide to over 40,000 engineers. Coinbase CEO Brian
      Armstrong stated that by February 2025, "every Coinbase engineer had utilized Cursor" and that "single engineers
      are now refactoring, upgrading, or building new codebases in days instead of months." Stripe CEO Patrick Collison
      noted Cursor "quickly grew from hundreds to thousands of extremely enthusiastic Stripe employees." Datadog CTO and
      co-founder Alexis Lê-Quôc stated "100% adoption across our engineering team." Optiver expanded "to firm-wide
      deployment" across a global trading firm. Trimble reports 800+ engineers deployed.

      In the mid-market, National Australia Bank standardized 6,000+ developers on Cursor, choosing it over Amazon Q and
      GitHub Copilot, and ran 3× faster legacy migrations. Amplitude achieved a 3× increase in weekly production commits
      with 1,000+ automated agent runs per week. Brex CTO James Reggio confirmed "more than 70% of our engineers now use
      Cursor." Rippling CTO Albert Strasheim highlighted growth from 150 to 500+ engineers (~60% of the engineering org)
      in weeks. Monday.com reports a 2-5× increase in engineering velocity; Mercado Libre VP Technology reports features
      built in a day versus weeks previously. Fox CTO Melody Hildebrandt noted unprecedented employee gratitude for a
      tooling change.

      Across industries, independent investor validation comes from Carlyle (a top-10 global PE firm), whose technology
      executive stated engineering teams in Carlyle's portfolio are using Cursor to accelerate product roadmaps and ship
      features faster.
  - id: sec-04
    title: Retention Dynamics and Expansion Pattern
    body: >
      Cursor does not publish NRR, GRR, cohort retention rates, or contract renewal data. However, the ARR trajectory
      provides strong indirect evidence of high dollar retention and robust net expansion: growing from $100M ARR
      (January 2025) to $2B ARR (February 2026) in thirteen months, against a starting base of approximately 720,000
      paying users, implies that revenue expansion — via seat additions and tier upgrades — substantially exceeds any
      churn. This is consistent with NRR well above 150% for the enterprise segment.

      The land-and-expand pattern is well-documented: initial adoption typically starts with 1-5 individual engineers on
      the Pro plan, spreads virally through word-of-mouth within an engineering team, triggers a Teams plan upgrade, and
      ultimately leads to a company-wide enterprise mandate. NAB expanded from a pilot to 6,000+ developers to a planned
      10,000+ engineers. Coinbase went from individual use to company-wide mandate. Rippling achieved 60% of engineering
      org adoption in weeks.

      Enterprise switching costs are compounded by organizational tooling built on Cursor's primitives: NAB built NAB
      CEL (context engineering library) directly on Cursor's rules, skills, and hooks APIs; Amplitude built autonomous
      development pipelines on Cursor Automations. These represent durable organizational integrations that increase
      renewal probability and deepen expansion potential over time.

      The April 2025 support bot incident (an AI-generated support response fabricated a fake "one machine" policy,
      triggering user backlash) is the most notable retention risk event to date and illustrates the danger of deploying
      LLM-based support at scale without guardrails. The company issued a public apology and updated the support
      workflow.
  - id: sec-05
    title: Concentration Risk and Channel Dependency
    body: >
      Revenue concentration risk is modest at the user level (1M+ paying users limits single-account concentration), but
      moderately elevated at the enterprise account level. Roughly 64-70% of Fortune 500/1000 companies are claimed
      adopters, suggesting some of the largest accounts (NVIDIA at 40,000+ engineers, NAB at 6,000+ growing to 10,000+)
      could represent individually material revenue percentages. No top-10 customer concentration data is publicly
      available.

      Cursor's go-to-market is entirely direct: no channel resellers, no systems integrator partnerships, and no
      marketplace distribution partnerships have been publicly announced as of May 2026. This creates both a moat
      (direct relationships with engineering leaders) and a scaling constraint (GTM headcount must scale to serve
      enterprise accounts). The Koala acquisition (July 2025) added a PLG optimization team to maintain the bottom-up
      developer motion alongside the expanding enterprise sales team.

      Pricing sensitivity is an observed risk: the April 2025 pricing controversy (when Cursor's AI support bot
      fabricated a one-machine policy and users perceived a stealth price increase) generated significant social media
      backlash and HN discussion. Future pricing adjustments to the individual Pro tier carry the risk of alienating the
      developer base that is the primary acquisition channel for enterprise land-and-expand.
