callouts:
  - title: Fastest-Ever B2B SaaS ARR Trajectory Implies Exceptional Retention
    body: >
      Cursor's 20× ARR expansion from $100M (Jan 2025) to $2B (Feb 2026) in 13 months — against a starting base of ~720K
      paying users — cannot be explained by new-user acquisition alone. Land-and-expand from Pro to Teams to Enterprise,
      combined with high per-seat expansion in enterprise accounts (Rippling 3×, NAB 1.67×, Coinbase 100%), is the
      engine behind dollar-based net expansion that likely exceeds 150% for the enterprise cohort.
    claimRefs:
      - C185
      - C203
      - C206
    calloutType: strength
  - title: PLG-to-Enterprise Transition Creates Channel Risk
    body: >
      Cursor's GTM is almost entirely bottom-up: 7 sales reps in April 2025 versus Windsurf's 75-person team. While PLG
      velocity has overcome this gap so far, as enterprise deal complexity grows (compliance, custom contracts, security
      reviews), the absence of a scaled enterprise sales and customer success function may constrain upsell, renewal
      management, and penetration in sectors requiring heavy-touch procurement.
    claimRefs:
      - C186
      - C208
      - C211
    calloutType: risk
  - title: Deep Organizational Integrations Lock In Enterprise Accounts
    body: >
      NAB's NAB CEL library (built on Cursor Rules, skills, and hooks) and Amplitude's autonomous development pipelines
      (built on Cursor Automations) represent organizational integrations that go far beyond typical SaaS incumbency.
      These create durable switching costs that persist through typical 3-year enterprise procurement cycles and survive
      individual headcount changes.
    claimRefs:
      - C204
      - C203
    calloutType: strength
  - title: No Public Retention Metrics Limit Diligence Precision
    body: >
      Cursor does not publish NRR, GRR, cohort retention rates, contract renewal rates, or average contract value data.
      The ARR growth trajectory and named customer expansions provide strong implied evidence of high retention, but
      quantitative underwriting of customer durability requires direct access to cohort and renewal data in due
      diligence.
    claimRefs:
      - C206
      - C207
    calloutType: recommendation
