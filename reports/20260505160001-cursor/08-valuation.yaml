sections:
  - title: Investment Thesis and Entry Context
    body: >
      Cursor presents one of the most compelling growth stories in enterprise software history: $2B ARR achieved in
      approximately 3 years from founding, representing the fastest ARR trajectory ever documented in developer SaaS.
      The Series D at $29.3B values Cursor at ~14.7x trailing ARR, a multiple that sits modestly below Datadog's public
      market premium (~17-22x) but reflects an implicit bet on two things: continued 150%+ YoY ARR growth and
      substantial gross margin improvement from the current ~15-20% to enterprise SaaS norms of 70%+.

      The investment thesis rests on four pillars: (1) Cursor has category-defining market position in AI coding — 1M+
      paying users, 64-70% Fortune 500 penetration (company-claimed), $2B ARR; (2) AI coding is a winner-take-most
      market driven by model quality, context management, and workflow integration — areas where Cursor is leading; (3)
      enterprise expansion from individual Pro users to Teams to Enterprise has demonstrated 3-6x land-and-expand
      multipliers at named accounts; and (4) own-model inference (Cursor 3, April 2026) signals a pathway to margin
      improvement that is critical to valuation justification.

      The anti-thesis is equally compelling: Microsoft controls the VS Code upstream and GitHub Enterprise, giving it a
      structural ability to bundle equivalent features at zero incremental cost; Cursor's current economics show near-
      zero gross margin, meaning investors are paying a 5-7x premium over current-economics value for projected future
      margin expansion; and the SpaceX/xAI acquisition option effectively caps near-term returns at ~2x.
    tableRefs:
      - TV001
      - TV005
    figureRefs:
      - FV001
  - title: Comparable Valuations and Market Benchmarks
    body: >
      The developer tools M&A landscape provides three key data points. GitHub's 2018 acquisition at $7.5B on ~$200M ARR
      (37.5x multiple) reflected strategic platform value for the world's code repository. Windsurf's 2025 Google
      acquisition at $2.4B on ~$150-250M ARR (10-16x multiple) establishes a floor for AI coding IDE acquisitions.
      Cursor's $29.3B at $2B ARR (14.7x) sits in this range, reflecting a financial-strategic blended multiple.

      Public market comps show high-growth developer platform companies trading at 11-25x ARR: GitLab at 11-12x ($760M
      ARR, 29% YoY growth, NRR 124%), Datadog at 17-22x ($2.3B ARR, ~25% YoY growth), Cloudflare at 25-30x ($1.6B ARR,
      strong developer positioning). Cursor's 14.7x at 150%+ YoY growth appears conservatively priced relative to peers
      with lower growth rates, assuming gross margin improvement materializes.

      Private AI company benchmarks: Databricks at $62B on ~$1.5B ARR (41x multiple with 75% gross margin) and OpenAI at
      $300B on ~$4-5B ARR (60-75x, reflective of model layer premium) suggest that as Cursor matures its gross margin,
      there is precedent for further multiple expansion from 14.7x toward 20-30x, implying significant upside
      optionality in the bull case.
    tableRefs:
      - TV002
      - TV006
    figureRefs:
      - FV002
  - title: Bull / Base / Bear Scenarios and Return Analysis
    body: >
      Bull case: Cursor reaches $8-10B ARR by end-2026, gross margin improves to 40-50% with own-model inference
      contributing 30-40% of completions, and the xAI acquisition option is not exercised. At 15x ARR, Cursor is valued
      at $120-150B — implying 4-5x return from Series D entry and a 2027-2028 IPO at a $100B+ market cap. This requires
      sustained 150%+ YoY ARR growth and no material competitive disruption from Microsoft or API access restriction.

      Base case: Cursor reaches $5-6B ARR by end-2026, gross margin improves to 30-40%, and is acquired by xAI or IPOs
      in 2028 at 10-12x ARR ($50-72B). This implies a 1.7-2.5x return from Series D entry over 2-3 years, approximately
      equivalent to the xAI acquisition option floor. For late-stage VC funds requiring 3x+, the base case does not
      clear the return threshold without significant multiple expansion at IPO.

      Bear case: ARR decelerates to $3-4B (Microsoft bundling, API restriction), gross margin stalls at 15-25%, and
      multiples reset to 8x in a risk-off market correction. Cursor trades at $24-32B, below the $29.3B Series D entry,
      resulting in a loss for investors at the latest round. In this scenario, earlier-round investors at lower
      valuations still achieve positive returns while Series D investors experience a 10-20% loss.
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - title: Valuation Stance, Recommendation, and Final Diligence Asks
    body: >
      Valuation stance: PRICED FOR GROWTH WITH LIMITED MARGIN OF SAFETY. At 14.7x ARR on $2B ARR with near- zero gross
      margins, Cursor is pricing in substantial margin improvement and continued hyper-growth that has not yet been
      sustained for more than 13 months. The valuation is defensible but requires belief in two unproven assumptions:
      (1) gross margin will reach 60%+ as own-model inference scales; and (2) Microsoft will not exercise its bundling
      advantage before Cursor's enterprise flywheel becomes self-sustaining.

      Recommendation: SELECTIVE BUY WITH CONDITIONS. For late-stage growth funds with 3-5 year horizons and 3x+ return
      targets, the investment is justified IF: (a) investors obtain governance rights to participate in or block the xAI
      acquisition decision; (b) pre-investment diligence confirms gross margin improvement to 35%+ is on the 12-month
      roadmap; (c) ARR cohort data confirms >130% NRR in the enterprise tier. Investors that cannot satisfy these
      conditions should PASS at the $29.3B valuation.

      Risk rating: HIGH. The combination of near-zero gross margin, existential competitor in Microsoft/Copilot, xAI
      acquisition return cap, and model API dependency creates a risk profile that is materially above the median
      enterprise SaaS investment. The growth trajectory partially compensates, but the margin of safety at $29.3B is
      thin.

      Priority diligence asks: (1) GAAP financial model (P&L, gross margin by cohort, COGS breakdown by model provider);
      (2) Series D governance terms (acquisition veto rights, Board representation); (3) ARR cohort retention and NRR
      data by customer segment; (4) FedRAMP investment plan and timeline; (5) own-model inference deployment roadmap
      with ARR% coverage targets; (6) Koala acquisition earnout terms and dilution impact.
    tableRefs:
      - TV004
    figureRefs:
      - FV004
