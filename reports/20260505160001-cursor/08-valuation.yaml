callouts:
  - title: The $29.3B Entry Is a Bet on Margin, Not Just Growth
    body: >
      At ~14.7x ARR on $2B revenue with ~15-20% gross margins, Cursor's valuation reflects a 5-7x premium over its
      current economic value. Investors are implicitly underwriting a path from near-zero gross margin to 60%+ over 3-5
      years through own-model inference deployment. If gross margin improvement stalls — due to inference cost plateaus,
      OpenAI/Anthropic pricing moves, or slower own-model adoption — the valuation impairment is significant even at
      continued high ARR growth. This is the most important financial diligence ask and should be the first question in
      data room review.
    claimRefs:
      - CV013
      - CV035
      - CV040
    calloutType: risk
  - title: xAI Acquisition Floor Caps Returns for Series D Investors
    body: >
      The SpaceX $60B acquisition option, exercisable by end-2026, functions as both a return floor and a ceiling for
      Series D investors. At $60B, investors receive approximately 2x their $29.3B entry price — a serviceable but
      below-hurdle return for most late-stage VC funds targeting 3x+. The investment is only compelling at the $29.3B
      entry if investors obtain governance rights to block or defer the acquisition, enabling an IPO path at $100B+.
      Without those rights, this is effectively a 2x capped note, not an open-ended VC investment.
    claimRefs:
      - CV010
      - CV023
      - CV037
    calloutType: risk
  - title: Growth Trajectory Alone Justifies Entry — With Conditions
    body: >
      Cursor's ARR velocity ($1M→$2B in ~3 years) is the fastest in developer SaaS history. In isolation, this
      trajectory — combined with 64-70% Fortune 500 penetration and demonstrated enterprise land-and-expand — makes
      Cursor one of the most compelling growth investments in the 2026 vintage. The valuation is defensible in the base
      case and compelling in the bull case. The critical conditions are governance clarity on the xAI deal and gross
      margin improvement visibility. If both are confirmed in diligence, the $29.3B entry at current growth velocity is
      one of the stronger late-stage opportunities in enterprise AI.
    claimRefs:
      - CV001
      - CV008
      - CV021
      - CV043
    calloutType: strength
  - title: Comparable Analysis Supports a 10-20x ARR Exit Multiple
    body: >
      Public developer SaaS comps at $1-3B ARR trade at 11-30x ARR depending on NRR, growth, and gross margin. Cursor at
      14.7x on $2B ARR is not stretched relative to Datadog (17-22x) or Cloudflare (25-30x), both of which have higher
      gross margins. As Cursor's gross margin improves, the re-rating from 14.7x toward 20-25x represents the primary
      mechanism for value creation beyond pure ARR growth. A 20x multiple at $6B ARR yields $120B — 4x from Series D
      entry and consistent with bull case assumptions.
    claimRefs:
      - CV007
      - CV020
      - CV032
      - CV034
    calloutType: strength
