  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Cursor operates in the fast-moving AI developer tools category against a multi-tier set of competitors:
              direct IDE-native peers (Windsurf/Codeium, soon under OpenAI ownership), the dominant incumbent plugin
              (GitHub Copilot, backed by Microsoft), hyperscaler-native tools (Amazon Q Developer, Google Duet AI),
              enterprise-privacy specialists (Tabnine), and IDE-bundled assistants (JetBrains AI). Two structural forces
              define competition: (1) whether a tool is a standalone IDE replacement or a plugin that bolts onto
              existing editors; and (2) whether the vendor owns its underlying AI model or relies on third-party APIs.
              Cursor is plugin-free (standalone VS Code fork) and currently model-agnostic (relying on Anthropic Claude,
              OpenAI GPT-4, and others via API), differentiating on UX depth and multi-agent orchestration rather than
              model exclusivity. The market is experiencing rapid consolidation: OpenAI's announced ~$3 billion
              acquisition of Windsurf (formerly Codeium) in May 2025 [CP001] demonstrates that hyperscalers view AI
              coding tools as strategic moats worth vertical integration. Cursor's lack of a proprietary model is
              therefore an evolving competitive risk as peers gain tighter model-tool integration.
            claimRefs:
              - CP001
              - CP002
              - CP003
      - number: '3.2'
        title: Competitor Profiles and Positioning
        blocks:
          - type: paragraph
            body: >
              GitHub Copilot is the market incumbent with the largest installed base: 1.8 million paid subscribers and
              77,000 enterprise customers as of fiscal year 2024, implying an estimated $300–350 million in ARR based on
              subscriber counts and blended ARPU [CP002]. Copilot is distributed as a plugin across VS Code, JetBrains,
              Neovim, and other editors, leveraging Microsoft's enterprise sales force and Azure bundling. Its key
              advantages are brand trust, existing enterprise procurement channels, and deep GitHub integration; its
              structural weakness is that plugin architecture imposes context limitations that a standalone IDE like
              Cursor can escape. GitHub itself has begun imposing agentic session limits in 2025 as parallelized AI
              workflows overwhelm compute infrastructure—a sign that plugin architecture struggles to scale agentic use
              cases [CP008]. Windsurf (formerly Codeium, rebranded 2024) is Cursor's most direct peer—a VS Code-fork
              standalone IDE targeting the same professional developer segment with an agentic core model called
              Cascade. OpenAI agreed to acquire Windsurf for approximately $3 billion in May 2025, signaling OpenAI's
              intent to compete at the IDE layer through vertical integration of model and tool [CP001].
              Post-acquisition, Windsurf would gain exclusive access to OpenAI's frontier models and potential
              integration with ChatGPT's 300 million+ user base, creating a distribution advantage Cursor lacks [CP006].
              Amazon Q Developer (formerly CodeWhisperer) targets AWS-native developers as a plugin at $19/user/month
              for its Pro tier with a free tier for individuals [CP004]. Q Developer's differentiation lies in deep AWS
              service awareness (code suggestions for S3, Lambda, EC2, etc.) and Amazon's enterprise distribution. Its
              limitation is that it is primarily an AWS ecosystem play, limiting appeal to multi-cloud or cloud-agnostic
              enterprises. Tabnine competes on enterprise privacy with cloud, on-premises, and air-gapped deployment
              options, positioning itself for regulated industries where cloud-only tools like Cursor are blocked by
              data governance requirements [CP010]. JetBrains AI is bundled with JetBrains subscriptions across its IDE
