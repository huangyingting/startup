companyProfile:
  summary: >
    Anysphere Inc. (product name: Cursor) is a San Francisco AI startup that builds an AI-first code editor based on a
    VS Code fork. Founded in 2022 by Aman Sanger, Arved Häberlen, Michael Truell, and Sualeh Asif (MIT graduates),
    Cursor integrates LLM-powered tab completion, inline editing, and agentic coding via a chat-based Composer interface
    directly into the IDE. The company achieved $2B ARR by February 2026, the fastest in developer SaaS history, and
    reached a $29.3B valuation in its Series D in early 2026. SpaceX/xAI holds a $60B acquisition option exercisable by
    end-2026.
