          - type: callout
            title: PLG-to-Enterprise Transition Creates Channel Risk
            body: >
              Cursor's GTM is almost entirely bottom-up: 7 sales reps in April 2025 versus Windsurf's 75-person team.
              While PLG velocity has overcome this gap so far, as enterprise deal complexity grows (compliance, custom
              contracts, security reviews), the absence of a scaled enterprise sales and customer success function may
              constrain upsell, renewal management, and penetration in sectors requiring heavy-touch procurement.
            calloutType: risk
            claimRefs:
              - CU006
              - CU028
              - CU031
          - type: callout
            title: Deep Organizational Integrations Lock In Enterprise Accounts
            body: >
              NAB's NAB CEL library (built on Cursor Rules, skills, and hooks) and Amplitude's autonomous development
              pipelines (built on Cursor Automations) represent organizational integrations that go far beyond typical
              SaaS incumbency. These create durable switching costs that persist through typical 3-year enterprise
              procurement cycles and survive individual headcount changes.
            calloutType: strength
            claimRefs:
              - CU024
