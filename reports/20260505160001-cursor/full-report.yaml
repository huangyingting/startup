chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Anysphere, Inc. operates under the product brand Cursor. The company is incorporated in Delaware
              and headquartered in San Francisco, California. Founded in 2022 by Michael Truell (CEO), Sualeh
              Asif (CPO), Aman Sanger (COO), and Arvid Lunnemark (co-founder; departed as CTO in October 2025),
              all four were students at MIT when they incorporated the business. The core product is Cursor, an
              AI-native integrated development environment (IDE) that forks Microsoft's open-source Visual Studio
              Code and layers in generative AI capabilities including multi-agent execution, codebase-wide semantic
              search, and a proprietary model called Composer. The business model is primarily recurring
              subscription (SaaS): Individual plans at $0/month (Hobby), $20/month (Pro), $60/month (Pro+), and
              $200/month (Ultra); team plans at $40/user/month (Business); and custom enterprise contracts. Cursor
              competes in the AI developer tools segment against GitHub Copilot (Microsoft), Windsurf/Codeium
              (acquired by OpenAI), Amazon Q Developer, and Claude Code (Anthropic). The product-led growth model
              relies almost entirely on word-of-mouth and viral developer adoption; marketing spend is reportedly
              near zero. [CO001][CO002][CO003]
            claimRefs:
              - CO001
              - CO002
              - CO003
      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              The founding team consists of four MIT students who incorporated Anysphere in 2022 and built an
              early prototype before raising their first external capital in October 2023. Michael Truell (CEO)
              leads strategy and product vision; Sualeh Asif (CPO) leads product; Aman Sanger (COO) leads
              operations and go-to-market. Arvid Lunnemark co-founded the company and served as CTO until
              October 2025, when he left to found Integrous Research, a safety-focused AI research lab. His
              departure is a noted key-person risk. Post-Series D (November 2025), each original co-founder
              held approximately 4.5% of the company, making all four billionaires on paper at the $29.3B
              valuation. Board composition is not publicly disclosed; Andreessen Horowitz (Series A), Thrive
              Capital (Series C lead), and Accel/Coatue (Series D leads) are presumed board observers or
              directors based on their investment terms. Strategic investors Google and Nvidia joined in the
              Series D. In July 2025, Anysphere hired Travis McPeak (co-founder of Resourcely) to lead security.
              The company employs roughly 150 people as of August 2025, making it extraordinarily capital-
              efficient for its revenue scale. [CO004][CO005][CO006][CO007]
            claimRefs:
              - CO004
              - CO005
              - CO006
              - CO007
      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: >
              Anysphere has raised approximately $3.47 billion in disclosed equity across five rounds in roughly

              28 months. The October 2023 seed round of $8M was led by the OpenAI Startup Fund, with notable

              angels including Nat Friedman (former GitHub CEO) and Arash Ferdowsi (Dropbox co-founder). In

              August 2024, Andreessen Horowitz led a $60M Series A at a $400M post-money valuation. In

              November 2024, the company was the subject of a competitive unsolicited bidding war among

              Benchmark, Index Ventures, and others, reportedly valuing Anysphere at approximately $2.5B.

              In January 2025, Anysphere closed a $105M Series B at a $2.6B valuation. In June 2025, Thrive

              Capital led a $900M Series C at a $9.9B post-money valuation—at which point the company had

              passed $500M ARR. On November 13, 2025, Anysphere closed a $2.3B Series D co-led by Accel and

              Coatue, valuing the company at $29.3B; Google and Nvidia participated as strategic investors. By

              early 2026, Bloomberg and The Information reported that Anysphere was in discussions to raise ~$5B

              at $50–60B valuation. On April 21, 2026, xAI (SpaceX's AI subsidiary) announced it had secured

              an option to acquire Anysphere for $60B or pay $10B for a collaboration arrangement. Total

              disclosed equity raised: approximately $3.37B. No debt or project finance is reported.
              [CO008][CO009][CO010][CO011][CO012]
            claimRefs:
              - CO008
              - CO009
              - CO010
              - CO011
              - CO012
      - number: '1.4'
        title: Scale, Milestones, and Adverse Events
        blocks:
          - type: paragraph
            body: |
              Cursor is widely described as the fastest SaaS company to reach $100M ARR (reached January 2025,
              approximately 14–16 months after launch) and $1B ARR (reached November 2025). The company has
              approximately 1 million paying customers and 40,000+ paying enterprise teams as of early 2026.
              The Fortune 500 penetration is reported by the company at 64% (company-claimed, not independently
              audited). Anysphere has made three notable acquisitions: Supermaven (AI code completion, November
              2024), Koala (CRM startup acqui-hire, July 2025), and Graphite (code review startup, December
              2025, valued above $290M). Key adverse events include: (1) April 2025 — an AI help-desk agent
              named "Sam" invented a non-existent login policy, causing user cancellations before Anysphere
              apologized and issued refunds; (2) July 2025 — Cursor changed its Pro plan from 500 requests
              to usage-metered billing, triggering widespread user complaints; the company apologized, rolled
              back limits, and refunded affected users; (3) October 2025 — co-founder and CTO Arvid Lunnemark
              departed to found a safety-focused AI lab. Security vulnerabilities CVE-2025-54135 (CurXecute)
              and CVE-2025-54136 (MCPoison) disclosed in 2025 exposed critical remote code execution risks.
