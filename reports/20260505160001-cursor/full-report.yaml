  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, Legal, and Compliance Risks
        blocks:
          - type: paragraph
            body: >
              Cursor's primary legal exposure is copyright: AI coding models trained on open-source code may have
              incorporated copyrighted material, and the US Copyright Office's May 2025 Part 3 report on Generative AI
              Training (pre-publication) explicitly signals unsettled liability for training-data usage. Active
              litigation like Andersen v. Stability AI establishes that plaintiffs will pursue copyright claims against
              AI content generators; analogous claims could reach Cursor through its model providers or directly from
              enterprise customers whose codebases contain licensed IP.

              The EU AI Act presents a second regulatory wave. GPAI model obligations applied from August 2025; Cursor,
              as a deployer of systemic-risk GPAI models (GPT-4o, Claude), faces secondary transparency and
              incident-reporting obligations it has not yet publicly addressed. European enterprise deployments also
              trigger GDPR Art. 25 data-protection-by-design requirements: unless Privacy Mode (ZDR) is consistently
              activated, source code containing PII or trade secrets may be transmitted to non-EU providers without
              adequate transfer mechanisms.

              The most material near-term compliance gap is the absence of FedRAMP authorization and on-premises
              deployment. This structurally excludes Cursor from US federal government, defense contractors, HIPAA-
              covered healthcare systems, and highly classified environments. GitHub Copilot Enterprise and Amazon Q
              offer FedRAMP paths; Cursor does not. This creates an addressable market ceiling of approximately 15-25%
              of the enterprise software development TAM that Cursor cannot serve without either FedRAMP investment or
              an on-premises product.
            claimRefs: []
      - number: '7.2'
        title: Operational, Security, and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Cursor's operational risk profile centers on three compounding factors: AI hallucination in
              trust-sensitive surfaces, expanding agentic attack surface, and VS Code fork technical debt.

              The April 2025 support bot incident — in which Cursor's AI fabricated a policy banning competitor tools —
              demonstrated the company's vulnerability to AI-generated misinformation in customer-facing deployments.
              While the immediate enterprise impact was limited, the incident revealed that Cursor's operations are
              exposed to the same AI failure modes it enables for customers. A second, larger incident in an enterprise
              support or agent context (e.g., the agent taking irreversible actions on a production codebase based on a
              hallucinated instruction) could trigger significant enterprise liability and procurement pauses.

              The OWASP LLM Top 10 framework identifies prompt injection (LLM01) and excessive agency (LLM06) as the
              critical risks for AI coding IDEs. Cursor Automations and Agent mode, which execute multi-step agentic
              pipelines with filesystem and terminal access, represent elevated OWASP LLM06 exposure. The integration of
              MCP third-party tool servers further expands the trust boundary: a malicious MCP server could exfiltrate
              credentials or inject instructions that cause Cursor's agent to modify production infrastructure. Cursor
              has not disclosed fine-grained MCP permission controls or audit logging for agent actions.

              The VS Code fork creates compounding technical debt as Microsoft evolves VS Code upstream. Cursor's
              differentiating features (shadow workspace, Composer multi-file agent) are implemented in divergent forks
              of VS Code and Electron. If Microsoft adds equivalent agentic features to VS Code natively — as Copilot
              Chat has progressively done — Cursor's differentiation narrows while the fork maintenance burden grows.
              The risk is asymmetric: Microsoft controls the upstream, Cursor does not.
            claimRefs: []
      - number: '7.3'
        title: Partner, Dependency, and Competitive Risks
        blocks:
          - type: paragraph
            body: >
              Cursor's most concentrated risk is its three-model API dependency on OpenAI, Anthropic, and Google Gemini.
              At the $200M ARR stage, model API COGS represented approximately 80-90% of revenue; by the $500M ARR stage
              Sacra estimated this had declined to ~60-65%. Despite improvement, Cursor lacks a self-hosted inference
              fallback that would protect it from unilateral pricing increases by its model providers. Both OpenAI and
              Anthropic are building their own developer tooling (OpenAI Canvas, Anthropic Projects/ Claude.ai),
              creating a structural incentive to eventually restrict or de-prioritize API access for competing
              application layers.

              The SpaceX/xAI acquisition option is the highest-severity partnership risk. The $60 billion option
              disclosed in April 2026 — with SpaceX holding a bilateral right to acquire Cursor by year-end — creates
              enterprise procurement paralysis for Cursor's largest competitor accounts. Companies directly competing
              with SpaceX, Tesla, or xAI ventures may refuse to deploy Cursor enterprise-wide. EU antitrust review of
              the deal could take 18-24 months and create prolonged uncertainty. If the acquisition completes, Cursor
              becomes part of the Musk AI empire alongside xAI/Grok, potentially driving away customers who resisted
              vendor concentration.

              Microsoft's Copilot bundling is a structural threat: GitHub Copilot is included at no incremental cost in
              GitHub Enterprise Cloud ($21/user/month) and integrated into Microsoft 365 E3/E5 licenses. This creates
              pricing pressure that Cursor's $40-200/user pricing cannot overcome in Microsoft-centric enterprise
              accounts. Amazon Q Developer is FedRAMP-eligible and integrated with AWS developer toolchains, making it
              the default choice for AWS-heavy regulated sector accounts. Both competitors have structural advantages
              Cursor cannot easily replicate through product velocity alone.
            claimRefs: []
      - number: '7.4'
        title: Financial, People, and Execution Risks
        blocks:
          - type: paragraph
            body: >
              Cursor's financial risk centers on COGS trajectory and capital adequacy. The company reached only slight
              gross-margin profitability in April 2026 after raising $3.47 billion; GAAP profitability requires further
              model cost optimization or own-model inference deployment. If model API prices stabilize or increase
              (reversing the 2023-2025 trend of declining inference cost), Cursor's path to sustained profitability
              extends and capital needs grow.

              At ~150 employees against $2B+ ARR, Cursor's revenue-per-employee ratio (~$13M+) is extraordinary but
              unsustainable at enterprise scale. Enterprise customers require dedicated customer success, security
              review, professional services, and compliance teams — none of which are evident in Cursor's current
              headcount. As deal sizes grow and procurement complexity increases, the absence of enterprise go-to-market
              infrastructure becomes a retention and expansion risk.

              Key-person concentration is extreme: four co-founders run the company with no publicly disclosed
              leadership bench below them. The loss of any founder — through acquisition distraction, departure, or
              health event — would create organizational uncertainty amplified by Cursor's hyper-growth phase. The xAI
              acquisition option introduces a founder alignment risk: if any founder is more aligned with the xAI
              transaction than with independent company building, that tension could manifest in product roadmap
              decisions or recruiting.
            claimRefs: []
      - number: '7.5'
        title: Mitigations, Thesis-Break Triggers, and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Cursor has meaningful risk mitigations in place. SOC 2 Type II provides a compliance baseline for
              commercial enterprise accounts. Privacy Mode with ZDR addresses the data residency concerns of
              privacy-sensitive enterprises. The three-model API architecture provides redundancy against single-
              provider outage. Cursor's PLG velocity has demonstrated resilience through both the April 2025 bot
              incident and broad competitive pressure, with ARR accelerating post-incident.

              Thesis-break triggers that would materially change the investment thesis include: (1) OpenAI or Anthropic
              restricting API access for AI coding IDE resellers; (2) a material security breach or supply-chain
              injection through Cursor's agent pipeline causing enterprise data loss; (3) the xAI acquisition completing
              and triggering significant enterprise customer churn; (4) Microsoft bundling advanced agentic coding into
              VS Code natively at zero incremental cost; or (5) adverse copyright precedent requiring Cursor to
              indemnify enterprise customers for AI-generated code.

              Priority diligence asks: (1) Cursor's enterprise agreement terms including IP indemnification provisions;
              (2) actual gross margin and COGS breakdown by model provider; (3) incident response and bug bounty program
              details; (4) FedRAMP roadmap and timeline; (5) MCP permission control architecture and agent audit
              logging; (6) founder vesting schedules and acquisition lockup terms under the xAI option.
            claimRefs: []
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Copyright and IP Indemnification Gap Is the Highest-Stakes Legal Risk
            body: >
              The US Copyright Office's 2025 Part 3 report on AI training data and the ongoing Andersen v. Stability AI
              litigation mark a turning point in AI copyright enforcement. Cursor lacks a published IP indemnification
              policy for enterprise customers, whereas GitHub Copilot Enterprise has offered indemnification since 2023.
              In competitive enterprise procurement, this gap is a material objection in legal reviews, particularly at
              technology companies that have IP-sensitive codebases. Cursor should prioritize an enterprise IP
              indemnification policy as a near-term product-legal initiative.
            calloutType: risk
            claimRefs:
              - CR004
              - CR005
              - CR008
              - CR029
              - CR042
          - type: callout
            title: xAI Acquisition Option Is the Single Highest-Severity Risk
            body: >
              The $60 billion SpaceX acquisition option, if exercised, would subordinate Cursor's independent product
              roadmap to the Musk enterprise and trigger an antitrust review cycle of 18-24 months in the EU and
              potential DOJ/FTC review in the US. More immediately, enterprise procurement decisions are already being
              affected: security-sensitive accounts that compete with SpaceX ventures (satellite internet, automotive,
              aerospace) have a rational basis to pause Cursor adoption pending acquisition clarity. This risk is binary
              and non-hedgeable from an investor perspective; the outcome hinges on the founders' governance rights
              under the option and their willingness to resist the transaction.
            calloutType: risk
            claimRefs:
              - CR015
              - CR016
              - CR034
          - type: callout
            title: Model API Dependency Is Manageable But Requires Own-Inference Milestone
            body: >
              Cursor's gross margin improvement trajectory (from ~15% at $200M ARR to near-positive at $2B ARR)
              demonstrates that model API cost compression is achievable — but the pathway to 70%+ SaaS gross margin
              requires either continued inference price declines or Cursor deploying its own inference at scale. The
              Cursor 3 model (April 2026) is an early signal of own-model development. If own-model inference covers
              even 30-40% of completions by end-2026, the margin risk recedes materially. Diligence should focus on
              Cursor's actual API spend composition and own-model inference roadmap.
            calloutType: recommendation
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR035
          - type: callout
            title: No Disclosed Bug Bounty or Responsible Disclosure Policy
            body: >
              Enterprise CISO vendor evaluations routinely include assessment of the vendor's security program maturity:
              bug bounty programs, CVE disclosure history, responsible disclosure policies, and security researcher
              engagement. Cursor's security page discloses annual pen testing and SOC 2 Type II but does not mention a
              bug bounty program or CVE coordination process. In a product that executes agentic code in customer
              development environments, the absence of a public security researcher program is a meaningful gap relative
              to the enterprise security posture Cursor claims to offer Fortune 500 customers.
            calloutType: risk
            claimRefs:
              - CR030
              - CR041
