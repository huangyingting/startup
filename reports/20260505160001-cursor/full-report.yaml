              Cursor's ARR trajectory ($1M to $2B in ~36 months, doubling every 2 months) is the fastest documented B2B
              SaaS ramp. Combined with approaching gross-margin profitability and ~60% enterprise revenue mix, the
              revenue quality signals are strong. However, the primary underwriting gap is the unconfirmed gross margin:
              AI model inference is the dominant COGS, and until Cursor discloses its margin structure or builds
              significant proprietary model coverage, it faces a fundamental tension between growth speed (subsidized by
              below-cost inference) and sustainable margin. The March 2026 Composer 2 launch is a credible step toward
