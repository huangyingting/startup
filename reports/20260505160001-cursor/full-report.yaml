          - type: callout
            title: No Public Retention Metrics Limit Diligence Precision
            body: >
              Cursor does not publish NRR, GRR, cohort retention rates, contract renewal rates, or average contract
              value data. The ARR growth trajectory and named customer expansions provide strong implied evidence of
              high retention, but quantitative underwriting of customer durability requires direct access to cohort and
