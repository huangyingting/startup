  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              Cursor (Anysphere, Inc.) monetizes through a tiered subscription model targeting individual developers and
              enterprise teams, supplemented by usage-based overage and API token pricing for heavy agentic workloads.
              The product is freemium: the Hobby tier is free with limited AI usage (2,000 monthly code completions),
              designed to drive top-of-funnel developer adoption and conversion. The Pro tier at $20/month unlocks
              extended agent limits and access to frontier models. Pro+ at $60/month (3× usage on OpenAI, Claude, and
              Gemini models) serves daily agent users. Ultra at $200/month provides 20× usage vs. Pro, targeting power
              users running multi-file agentic workflows. Teams at $40/user/month adds enterprise controls — centralized
              billing, admin dashboards, RBAC, and SAML/OIDC SSO — and is the primary enterprise acquisition vehicle
              alongside custom Enterprise contracts [CI001]. Cursor also introduced its own AI models: Composer 2 (March
              2026) is available at API-accessible token pricing — standard tier at $0.50/M input and $2.50/M output
              tokens, fast tier at $1.50/M input and $7.50/M output tokens — enabling usage-based revenue that scales
              with agentic workload complexity rather than fixed subscription limits [CI002]. This billing architecture
              has shifted from purely per-seat SaaS to a hybrid model where heavier workloads generate proportionally
              more revenue, reducing the risk of underpricing heavy-usage customers that was flagged in Cursor's July
              2025 pricing controversy. As of early 2026, enterprise and corporate buyers account for approximately 60%
              of total revenue, reflecting a rapid shift from a developer-led self-serve motion to enterprise-led
              contracts since the Koala acquisition in July 2025 [CI003].
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
      - number: '4.2'
        title: Revenue Traction, Unit Economics, and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Cursor's revenue trajectory is exceptional by any SaaS benchmark. Starting from $1M ARR in 2023, the
              company reached $100M ARR in January 2025 (approximately 12 months from first material revenue), $500M ARR
              in June 2025, $1B ARR in November 2025, and $2B ARR in February 2026 [CI007]. This $1M-to- $2B trajectory
              took approximately 36 months, with revenue doubling roughly every two months through 2025. SaaStr
              identified Cursor as the fastest-growing B2B SaaS company from $1M to $500M ARR on record, surpassing
              prior records set by Wiz, Deel, and Ramp [CI008]. Sacra estimates that Cursor reached slight gross-margin
              profitability in April 2026 and was forecasting more than $6B in annualized revenue run rate by end-2026
              [CI009]. The primary cost of revenue is AI model inference — Cursor routes queries through Anthropic
              Claude, OpenAI GPT, Google Gemini, and its own Composer models, paying per-token API fees that represent
              the largest single cost component. For latency-sensitive operations like inline code completion, Cursor
              uses fine-tuned Mixture-of-Experts (MoE) models to reduce inference cost per call while maintaining
              quality [CI010]. Cursor launched proprietary models Composer (October 2025) and Composer 2 (March 2026),
              aiming to reduce dependency on third-party API costs over time and improve gross margins [CI011]. Sales
              and marketing expenditure has historically been minimal relative to revenue because Cursor's growth is
              overwhelmingly product- led: the free tier drives organic developer adoption, with conversion to paid
              tiers occurring inside the product. Enterprise sales is supplemented by a growing direct sales team
              post-Koala acquisition, but CAC remains relatively low compared to traditional enterprise SaaS, with
              customer acquisition anchored by word-of-mouth and developer community referrals [CI012]. The headcount of
              approximately 150 employees (as of early 2026) implies very high revenue per employee — over $13M ARR per
              employee at $2B ARR — a figure that reflects the capital-light nature of software distribution combined
              with unusually high revenue growth [CI013]. Infrastructure costs are primarily AWS-based with compute
              supplemented by the SpaceX/xAI Colossus partnership for model training [CI014].
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
