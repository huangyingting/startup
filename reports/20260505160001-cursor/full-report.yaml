      - number: '4.3'
        title: Capital Adequacy, Financing History, and Financial Verdict
        blocks:
          - type: paragraph
            body: >
              Cursor has raised approximately $3.47 billion in total venture financing across five rounds: a Seed round
              of approximately $8M, a Series A of $60M at a $400M valuation, a Series B of $105M at a $2.6B valuation
              (December 2024), a Series C of $900M at a $9.9B valuation (November 2025), and a Series D of $2.3B at a
              $29.3B valuation (March 2026) [CI018]. The scale of capital raised far exceeds the company's operational
              cash needs given its rapid progression to gross-margin profitability — the capital is primarily strategic:
              building a moat in model partnerships and compute infrastructure, funding the xAI Colossus training
              partnership, and supporting enterprise sales buildout [CI019]. Monthly cash burn is not publicly
              disclosed; however, at ~$2B ARR with approaching gross-margin breakeven and approximately $3.47B raised,
              Cursor's implied runway is multiple years even under pessimistic burn assumptions. The Series D at a
              $29.3B valuation implies an ~15× forward ARR multiple if 2026 ARR reaches $2B, or ~5× if the $6B+ forecast
              is met. Key financing risks include: model API cost inflation if Anthropic or OpenAI raises API prices
              (Cursor has multi-year partnerships but terms are not disclosed), compute cost escalation for Composer
              model training, and the xAI/SpaceX compute partnership which creates dependency on a politically-sensitive
              counterparty [CI020][CI021]. A $60B xAI acquisition option received by Cursor in April 2026 adds an
              unusual strategic optionality dimension to the capital structure but does not constitute committed
              financing [CI022]. The overall financial verdict is favorable on revenue quality (strong subscription NRR
              proxy, enterprise pivot, rapid growth), capital adequacy (substantial runway), and trajectory (approaching
              profitability); the primary financial diligence blockers are gross margin confirmation (not publicly
              disclosed), model API cost structure (private), and enterprise contract ACV and NRR data (not publicly
              available) [CI023].
            claimRefs:
              - CI018
              - CI019
              - CI020
              - CI021
              - CI022
              - CI023
              - CI024
              - CI025
