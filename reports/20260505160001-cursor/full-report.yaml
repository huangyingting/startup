  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - OpenAI/Anthropic API restriction
        - Any public announcement restricting IDE resellers
        - 'Thesis break: COGS spike + product disruption'
        - Immediate sell signal; thesis becomes non-investable
      - - Microsoft Copilot parity announcement
        - VS Code + GitHub Copilot Workspace matches Cursor Tab+Agent in developer surveys
        - Market share erosion in Microsoft-enterprise accounts; ARR plateau risk
        - Reduce position; re-evaluate competitive moat score
      - - xAI acquisition closes
        - Definitive acquisition agreement signed
        - Return capped at $60B (~2x); enterprise customer churn risk increases
        - Evaluate governance rights; model exit timing post-acquisition
      - - Gross margin plateau below 30% at $4B ARR
        - Two consecutive quarters of <30% gross margin at $4B+ ARR
        - Valuation narrative collapses; IPO path extends beyond 2028
        - Thesis impairment; downgrade conviction to Hold from Buy
      - - Enterprise NRR falls below 100%
        - Confirmed NRR below 100% for enterprise cohort in quarterly data
        - Land-and-expand flywheel broken; ARR growth decelerates sharply
        - Immediate review; possible sell if trend persists 2 quarters
      - - Major security breach
        - Enterprise data breach attributed to Cursor agent pipeline
        - Trust collapse in enterprise procurement; regulatory investigation
        - Sell signal with high urgency; company will need 12-18 months to recover
    claimRefs:
      - CV028
      - CV026
      - CV023
      - CV022
      - CV016
    notes: Kill triggers are advisory indicators for investment committee monitoring, not binding selling obligations.
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - GAAP gross margin and COGS breakdown
        - Exact model API spend by provider (OpenAI, Anthropic, Google)
        - Most important valuation driver; without this, margin improvement thesis cannot be validated
        - Cursor CFO; financial model data room
      - - Series D governance terms
        - Acquisition veto rights, Board representation, anti-dilution provisions
        - Without veto rights, xAI acquisition cap on returns is binding; governance is non-negotiable for 3x+ thesis
        - Cursor General Counsel; term sheet review
      - - ARR cohort data (NRR by segment)
        - Enterprise tier NRR, Pro tier churn rate, cohort retention curves
        - Land-and-expand flywheel validation; without NRR >130% for enterprise, ARR growth story weakens
        - Cursor VP Revenue; data room
      - - Own-model inference roadmap
        - Cursor 3 coverage %, timeline to 30-40% of completions from own model
        - Primary path to 50%+ gross margin; without a credible plan, valuation premium is unjustified
        - Cursor CTO; product roadmap review
      - - FedRAMP investment plan
        - Status and timeline for FedRAMP ATO application
        - 15-25% of enterprise TAM excluded without FedRAMP; significant ARR upside locked
        - Cursor CISO; compliance roadmap review
      - - Koala acquisition terms
        - Transaction price, earnout structure, integration timeline
        - Dilution impact on Series D; integration risk for PLG infrastructure
        - Cursor Corp Dev; M&A term sheet
    claimRefs:
      - CV029
      - CV024
      - CV042
    notes: >-
      Priority order reflects impact on investment decision confidence. All items are deal-breaker diligence for a
      $29.3B entry.
