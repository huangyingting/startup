  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and VS Code Foundation
        blocks:
          - type: paragraph
            body: >
              Cursor is a fork of Visual Studio Code (VS Code), built on Electron and deliberately inheriting VS Code's
              extension ecosystem, Language Server Protocol (LSP) infrastructure, and TextModel object system. This
              architectural choice dramatically reduces onboarding friction: developers keep their settings, themes,
              keybindings, and extensions while gaining Cursor's AI layer. The fork is maintained by Anysphere's small
              but prolific engineering team, which monitors upstream VS Code security patches and merges them based on
              risk assessment.

              Central to Cursor's AI architecture is the shadow workspace, introduced in September 2024. The shadow
              workspace runs as a hidden Electron window that mirrors the user's file system without altering their
              active coding session, giving background AI agents full LSP access (lints, type errors, go-to-definition)
              while preserving independence, privacy, concurrency, universality, maintainability, and speed. This
              enables agents to iterate on code in the background, detect lint errors after each edit, and self-correct
              before surfacing results.

              The platform's codebase indexing engine builds vector embeddings over entire repositories — handling
              millions of lines across hundreds of thousands of files — enabling semantic code search over the indexed
              codebase. Cursor Rules allow teams to encode project-specific instructions, conventions, and context
              engineering logic (e.g., NAB's CEL library built on Cursor's rules, skills, and hooks primitives).
            claimRefs: []
      - number: '5.2'
        title: Proprietary AI Models — Cursor Tab and the Composer Series
        blocks:
          - type: paragraph
            body: >
              Unlike competitors that primarily route requests to third-party frontier models, Cursor has built and
              maintains two classes of proprietary AI: Cursor Tab (completion model) and the Composer series (agentic
              reasoning model).

              Cursor Tab is a fine-tuned fill-in-the-middle (FIM) model trained with reinforcement learning to excel at
              multi-line, multi-file completions. Tab predicts the next edit location after each accepted suggestion,
              auto-imports unresolved symbols in TypeScript/Python, and suggests complete diffs rather than individual
              tokens.

              The Composer series is a mixture-of-experts (MoE) language model series trained at scale using RL in
              production coding environments. Composer is given access to editing, terminal, grep, and semantic search
              tools and optimized via a reward model reflecting real software engineering quality. Training
              infrastructure uses custom MXFP8 kernels with expert parallelism and hybrid sharded data parallelism
              across thousands of NVIDIA GPUs (PyTorch + Ray). The warp decode kernel (April 2026) further achieves 1.8x
              faster MoE decode on Blackwell GPUs by reorganizing computation around outputs rather than experts.

              Composer 2 (March 2026) achieves 61.3 on CursorBench, 61.7 on Terminal-Bench 2.0, and 73.7 on SWE-bench
              Multilingual — frontier-level scores at $0.50/M input and $2.50/M output tokens (standard) or $1.50/$7.50
              (fast variant, 4× faster generation). A companion Cursor Bench internal evaluation based on real-world
              engineering requests from Cursor engineers sets the quality bar for ongoing RL training runs. Cursor also
              exposes all major frontier models (Claude Sonnet, GPT-5, Gemini Flash 2.5, Qwen Coder) within the same
              agent harness for users to choose.
            claimRefs: []
      - number: '5.3'
        title: Agent Infrastructure, Cloud Platform, and MCP Ecosystem
        blocks:
          - type: paragraph
            body: >
              The Cursor agent harness is the central orchestration layer that manages the context window (system prompt
              + tool descriptions + conversation history + user request) for every AI interaction. The harness is
              continuously tuned per model: when Anysphere gains early access to a new frontier model, engineers spend
              weeks customizing prompt structure, context injection, tool descriptions, and guardrails until that
              model's performance inside the harness exceeds its stock benchmark results. Mid-chat model switching
              (introduced April 2026) lets developers change models without losing conversation context.

              Cursor 3 (April 2026) introduces the unified workspace combining local and cloud agents. Cloud agents run
              on dedicated isolated virtual machines, removing the local resource constraints that cap parallelism.
              Amplitude runs 1,000+ automated agent runs per week without manual prompting; NAB's engineers kick off
              multiple agent branches on legacy Assembly code, collecting structured flowcharts and migration reports.
              As of February 2026, 35% of PRs merged internally at Cursor are created by autonomous cloud agents. Agent
              usage company-wide has grown approximately 15× over the past year; Cursor now has 2× more agent users than
              Tab users (reversed from a 2.5:1 Tab-to-agent ratio in March 2025).

              Cursor Automations enable always-on cron-based and trigger-based cloud agent workflows (Amplitude uses
              them to convert Slack bug reports into PRs automatically). The Cursor SDK (April 2026, npm install
              @cursor/sdk) exposes the same agent runtime, harness, and models programmatically via a TypeScript API,
              opening a developer ecosystem around the platform.

              MCP (Model Context Protocol) support makes Cursor a first-class integration point for external tools,
              databases, and workflows. Cursor Marketplace distributes plugins — bundles of MCP servers, skills,
              subagents, rules, and hooks — with admin-controlled distribution modes (Default Off, Default On, Required)
              for enterprise governance.
            claimRefs: []
      - number: '5.4'
        title: Security, Compliance, and Enterprise Controls
        blocks:
          - type: paragraph
            body: >
              Cursor maintains a SOC 2 Type II attestation (available via trust.cursor.com) with annual third-party
              penetration testing and an executive summary available on request. Data is encrypted with AES-256 at rest
              and TLS 1.2+ in transit. Cursor operates exclusively on AWS infrastructure and explicitly maintains no
              infrastructure in China, uses no China-headquartered subprocessors, and commits to annual subprocessor
              reviews under its vendor risk management program.

              Privacy Mode — enabled by default for all team members — implements Zero Data Retention (ZDR) contractual
              controls with all model providers, ensuring that code is not stored by providers or used for training.
              GDPR and CCPA compliance is maintained; users can delete accounts via the Settings dashboard.

              Enterprise controls include SSO (Okta, Azure AD, Google Workspace) and SCIM for automated user
              provisioning and deprovisioning; Customer-Managed Encryption Keys (CMEK); compliance logging; MDM
              deployment; and model-level access controls that let admins allow/blocklist specific model providers,
              model configurations (speed/context window), or new providers by default. Soft spend limits (rather than
              hard cutoffs) and automatic alerts at 50/80/100% thresholds balance cost governance with developer
              productivity.

              Two CVEs were disclosed in 2025: CVE-2025-54135 and CVE-2025-54136 (CurxExecute/MCPoison) relating to MCP
              handling in Cursor. Tenable published a detailed FAQ. The disclosures highlight the emerging attack
              surface from integrating untrusted MCP servers, an area Cursor has since addressed with documented
              security considerations for MCP and agent security best practices in its developer docs. No on-premises
              deployment is currently offered, which may limit adoption in certain highly regulated environments.
            claimRefs: []
      - number: '5.5'
        title: Technical Differentiation and Platform Moat
        blocks:
          - type: paragraph
            body: >
              Cursor's competitive differentiation operates at three reinforcing levels. First, proprietary models (Tab
              and Composer) are trained on real-world coding environments at Anysphere's infrastructure cost — an
              investment that pure API-routing competitors cannot replicate without building their own training
              infrastructure. Second, the agent harness compounding effect: each frontier model integration is paired
              with weeks of harness tuning, yielding measurably better in-product performance than stock model APIs
              deliver. Third, the data flywheel: with over 1 million paying users generating structured coding tasks and
              evaluation feedback, Anysphere continuously retrains Composer using RL against real production signals.

              Enterprise adoption deepens the moat: NAB built internal tooling (NAB CEL) directly on Cursor's context
              engineering primitives (rules, skills, hooks). Amplitude built autonomous development pipelines on Cursor
              Automations. These organizational integrations create switching costs analogous to those from ERP or
              DevOps platform lock-in.

              The developer ecosystem (JetBrains ACP integration, Cursor Marketplace, Cursor SDK) extends platform reach
              beyond the standalone IDE, positioning Cursor as an agentic development runtime rather than an editor.
              SpaceX and other customers have entered deep model training partnerships with Anysphere (announced April
              21, 2026), further advancing Composer's training corpus and quality.
            claimRefs: []
      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Proprietary Model Stack Drives Sustainable Margin
            body: >
              Cursor's investment in Composer (MoE model, RL training on NVIDIA GPUs) directly reduces its dependency on
              expensive third-party frontier API calls for agent-mode queries. Each Composer training run — using
              production coding task data from 1M+ users — compounds quality while improving COGS per token relative to
              routing to external models.
            calloutType: strength
            claimRefs:
              - CE007
              - CE011
              - CE039
          - type: callout
            title: MCP CVEs Signal Emerging Attack Surface
            body: >
              The disclosure of CVE-2025-54135 and CVE-2025-54136 highlights a new and growing attack surface created by
              integrating untrusted third-party MCP servers. As the Marketplace ecosystem grows, prompt injection via
              malicious MCP tools becomes a material risk for enterprise adopters, requiring ongoing security controls
              and governance.
            calloutType: risk
            claimRefs:
              - CE033
              - CE020
          - type: callout
            title: Cloud-Only Deployment Limits Regulated-Industry Expansion
            body: >
              Cursor's lack of on-premises or VPC deployment constrains adoption in industries with strict data
              residency requirements (defense, central banking, healthcare in some jurisdictions). Competitors offering
              private cloud or on-premises options may gain footholds in these segments despite Cursor's technical
              superiority.
            calloutType: risk
            claimRefs:
              - CE032
          - type: callout
            title: Enterprise Organizational Integrations Create Switching Costs
            body: >
              NAB's development of NAB CEL on top of Cursor Rules, skills, and hooks — and Amplitude's full autonomous
              development pipeline built on Cursor Automations and Bugbot — represent deep organizational integrations
              that create durable enterprise switching costs beyond typical SaaS incumbency effects.
            calloutType: strength
