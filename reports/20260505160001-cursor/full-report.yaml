  headquarters: San Francisco, CA
  productSummary: >
    Cursor is a VS Code fork with deep LLM integration: Tab autocomplete (multi-line predictive editing), Composer 2
    (multi-file agentic coding), inline chat, codebase-wide context (250K token window), and an Agent harness for
    multi-step coding tasks. The April 2026 Cursor 3 release introduced own-model inference for a subset of completions,
    the first step toward reducing reliance on third-party model APIs (OpenAI, Anthropic, Google). Platform features
    include SOC 2 Type II certification, privacy mode, Enterprise SSO/SAML, and an MCP (Model Context Protocol)
    integration ecosystem.
  customerFocus: >
    Individual developers (Pro/Pro+ tier) and enterprise engineering organizations (Teams/Enterprise). Enterprise
    accounts represent ~60% of revenue. Named customers include Samsung, Shopify, Stripe, Coinbase, Rippling, Vercel,
    and 40K-50K+ enterprise teams (company-claimed). Fortune 500 penetration at 64-70% (company-claimed, unverified by
    independent sources).
  businessModel: >
    Subscription SaaS across four tiers: Hobby (free), Pro ($20/mo), Pro+ ($60/mo), Ultra ($200/mo), and Enterprise
    (custom pricing). Teams tier at $40/user/month. Revenue grows via individual PLG (bottom-up viral) expanding to
    enterprise seats. COGS dominated by model API payments; gross margin improving from ~8-12% ($200M ARR) to ~15-20%
    ($2B ARR) as own-model inference scales.
  stage: Series D / Late-stage growth
