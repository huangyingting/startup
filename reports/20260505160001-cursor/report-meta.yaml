summary:
  headline: >
    Cursor is the fastest-growing developer SaaS in history at $2B ARR, with category-
    defining AI coding leadership and 64-70% Fortune 500 penetration (company-claimed).
    At $29.3B valuation (14.7x ARR), the entry is defensible against high-growth public
    comps but priced for gross margin improvement that has not yet materialized. The SpaceX
    $60B acquisition option caps near-term returns at ~2x; investors must secure governance
    rights to the acquisition decision and confirm gross margin improvement trajectory before
    this investment clears a 3x+ return threshold. Recommendation: SELECTIVE BUY (conditional).
