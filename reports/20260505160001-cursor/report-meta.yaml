companyProfile:
  summary: >
    Anysphere Inc. (product name: Cursor) is a San Francisco AI startup that builds an
    AI-first code editor based on a VS Code fork. Founded in 2022 by Aman Sanger, Arved
    Häberlen, Michael Truell, and Sualeh Asif (MIT graduates), Cursor integrates LLM-powered
    tab completion, inline editing, and agentic coding via a chat-based Composer interface
    directly into the IDE. The company achieved $2B ARR by February 2026, the fastest in
    developer SaaS history, and reached a $29.3B valuation in its Series D in early 2026.
    SpaceX/xAI holds a $60B acquisition option exercisable by end-2026.
  foundedDate: "2022-01-01"
  founders:
    - name: "Aman Sanger"
      role: "Co-Founder & CEO"
      background: "MIT Computer Science; AI research focus"
      claimRefs: []
    - name: "Arved Häberlen"
      role: "Co-Founder"
      background: "MIT Computer Science; backend and model infrastructure"
      claimRefs: []
    - name: "Michael Truell"
      role: "Co-Founder"
      background: "MIT Computer Science; product and ML"
      claimRefs: []
    - name: "Sualeh Asif"
      role: "Co-Founder"
      background: "MIT Computer Science; AI research and product"
      claimRefs: []
  foundingLocation: "Cambridge, MA (MIT)"
  headquarters: "San Francisco, CA"
  productSummary: >
    Cursor is a VS Code fork with deep LLM integration: Tab autocomplete (multi-line predictive
    editing), Composer 2 (multi-file agentic coding), inline chat, codebase-wide context
    (250K token window), and an Agent harness for multi-step coding tasks. The April 2026
    Cursor 3 release introduced own-model inference for a subset of completions, the first
    step toward reducing reliance on third-party model APIs (OpenAI, Anthropic, Google).
    Platform features include SOC 2 Type II certification, privacy mode, Enterprise SSO/SAML,
    and an MCP (Model Context Protocol) integration ecosystem.
  customerFocus: >
    Individual developers (Pro/Pro+ tier) and enterprise engineering organizations (Teams/Enterprise).
    Enterprise accounts represent ~60% of revenue. Named customers include Samsung, Shopify,
    Stripe, Coinbase, Rippling, Vercel, and 40K-50K+ enterprise teams (company-claimed).
    Fortune 500 penetration at 64-70% (company-claimed, unverified by independent sources).
  businessModel: >
    Subscription SaaS across four tiers: Hobby (free), Pro ($20/mo), Pro+ ($60/mo), Ultra
    ($200/mo), and Enterprise (custom pricing). Teams tier at $40/user/month. Revenue grows
    via individual PLG (bottom-up viral) expanding to enterprise seats. COGS dominated by
    model API payments; gross margin improving from ~8-12% ($200M ARR) to ~15-20% ($2B ARR)
    as own-model inference scales.
  stage: "Series D / Late-stage growth"
  fundingStatus: >
    $2.3B Series D (March 2026) at $29.3B valuation. Total raised ~$3.47B across Seed
    ($8M), Series A ($60M/$400M), Series B ($105M/$2.6B), and Series C/D ($900M and $2.3B
    at $9.9B and $29.3B). Key investors: Thrive Capital (Series D lead), Andreessen Horowitz,
    Kleiner Perkins, OpenAI Fund. SpaceX holds a $60B acquisition option exercisable end-2026.
