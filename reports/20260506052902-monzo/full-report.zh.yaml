companyProfile:
  summary: >-
    Monzo 是英国最大的纯数字零售银行。公司成立于 2015，自 April 2017 起持有完整英国银行牌照，服务 12.2 million 个人客户和 625,000
    企业客户。其移动优先银行平台覆盖活期账户、储蓄、BNPL（Flex）、国际转账、投资和养老金。FY2025（截至 March 2025），Monzo 实现收入 £1,235.4 million、净利润 £94.6
    million——成为首家跑通规模化持续盈利的英国新银行。公司正筹备 IPO，Morgan Stanley 已获任首席顾问，目标是在 2026+ 于伦敦上市。
