      - number: '8.2'
        title: 估值分析与可比组
        blocks:
          - type: paragraph
            body: >
              Monzo 3.8× Price-to-Revenue 倍数处在 fintech 新银行同业最便宜一端。可比组包括三家上市公司和一家私有同业。Revolut 约以 FY2024 收入 17.9×
              交易——溢价来自其覆盖 50 个国家的全球存在、多产品宽度（包括 cryptocurrency 收入），以及由成熟投资人 Schroders 定价的 $75B 估值。Wise plc 是最接近的英国上市
              fintech 可比公司，约对应 FY2025 收入 9.1×——溢价由差异化跨境支付业务、13M+ 客户，以及高于银行 NIM 的毛利率支撑。Nubank（NYSE: NU）约以 FY2024 收入 5.4×
              交易，拥有 110M 客户，但受新兴市场折价影响。Starling Bank 最近一次私有估值（约 3.7×、基于已过时的 FY2022 标记）最接近 Monzo 当前倍数，但 Starling 的 AML
              执法事件和缺乏国际野心，解释了其折价。


              Monzo 相对 Wise 和 Nubank 的折价，部分来自英国地理集中、产品组合更早期（尚无按揭）以及尚未经历公开市场重估。若 Monzo 成功以 FY2027E 收入约 £1.93B、6× 倍数完成
              IPO，股权价值将达到约 £11.6B（$14.7B）——相对 $5.9B 入场价为 2.5× MOIC，等同于 3 年约 36% IRR。牛市情景（FY2027 收入 £2.1B、8×）带来 3.6×
              MOIC。


              CB Insights State of Fintech Q4 2024 将 Monzo 列入全球最有价值私有 fintech 前 10，与 Stripe（$70B）、Klarna（$15B）和
              Checkout.com（$11B）并列。这一同业 cohort 说明 Monzo 是 2026–2027 可信的 IPO 候选，Morgan Stanley 作为首席顾问参与也佐证了机构准备度。
