      - number: '2.4'
        title: 图表要点
        blocks:
          - type: callout
            title: 新银行渗透率 4 年内从英国成年人 25% 翻倍至 50%
            body: >
              RFI Global 数据显示，新银行产品在英国成年人中的渗透率于 2024 达到 50%，高于 2020 的 25%。这一快速渗透支撑 Monzo
              延续有机增长轨迹，但也说明市场正走向成熟；下一阶段，单纯靠量增长会相对放慢，ARPU 扩张更关键。
            calloutType: insight
            claimRefs:
              - CM003
              - CM004
              - CM016
          - type: callout
            title: Bank Rate 下行是 Monzo 收入模型近期最主要逆风
            body: >
              Monzo FY2025 收入跃升，部分来自高位 Bank Rate 下 £16.6B 存款带来的更高 NIM。随着 Bank of England 预计在 2025–2026 将利率下调至 3.5–4%，NIM
              压缩将成为 Monzo 收入增速的核心近期风险。贷款账簿扩张是主要对冲。
            calloutType: risk
            claimRefs:
