      - number: '1.3'
        title: 融资历史、估值与规模指标
        blocks:
          - type: paragraph
            body: >
              自 2015 以来，Monzo 多轮一级资本融资约 $1.9B。关键轮次包括：通过 Crowdcube 众筹（2016，£1M+）、Series A（Y Combinator 2016）、Series
              B（Passion Capital，2017）、Series C（Accel，2018，以约 £650M 估值融资 £85M）、Series D（Y Combinator、Stripe、General
              Catalyst，£113M，2019）、Series E（Y Combinator 2020，£60M）、Series F（Coatue，£425M，$4.5B 估值，2021）、Series
              G（未披露，2022）以及 Series I（March 2024 以 $5B 估值融资 $430M + May 2024 以 $5.2B 估值追加 $190M）。October 2024
              的员工二级售股确立了当前 $5.9B 基准估值。 [CO014][CO015][CO016]

              FY2025（截至 March 31, 2025）指标：收入 £1,235.4M（+48% YoY），经营利润 £60.5M / 调整后税前利润 £113.9M，净利润 £94.6M，客户 12.2M（+25%
              YoY），存款 £16.6B，卡消费 £55.2B。FY2024 指标：收入 £880M，税前利润 £15.4M，客户 9.3M。员工数约 3,700（FY2024）。
              [CO017][CO018][CO019][CO020]

              Monzo 约有 12.2 million 个人银行客户（截至 March 2025）和 625,000 企业客户（+49% YoY）。超过 20% 的英国成年人是 Monzo 客户。三分之一客户把 Monzo
              作为主银行。NPS +70，显著高于英国银行业约 30 的平均水平。公司目标在 2–3 年内 IPO，据称 Morgan Stanley 已参与。 [CO021][CO022][CO023]
