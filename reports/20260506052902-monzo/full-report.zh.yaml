      - number: '8.3'
        title: 情景、风险与建议
        blocks:
          - type: paragraph
            body: >
              牛市 / 基准 / 熊市 / 尾部情景下，按概率加权的预期 MOIC 约为 2.3×，3 年期对应 ~32% 混合 IRR。这个回报从绝对值看有吸引力，但关键取决于 IPO 能否执行。基准情景（45% 概率）假设
              2027 年以 FY2027E 收入 6× 上市，对应 2.5× MOIC。牛市情景（35% 概率）假设 2026 年以 8× 倍数上市，对应 3.6×。熊市情景（15% 概率）仅对应 1.3×，估值倍数为
              4×、上市时间为 2028 年；触发因素是 NIM 压缩和监管成本拖累。


              最可能兑现的止损触发项是：FY2026 收入增速低于 20%（20% 概率），以及 IPO 推迟到 2028 年之后（15% 概率）。FCA 执法行动（10% 概率）会是破坏性最大的单一事件，会立即损伤 IPO
              时间表和估值倍数。Revolut 拿到牌照后的竞争反击（15% 概率）是中期风险，不是即时减值因素。


              建议为 'track'，置信度中等，估值立场为 'fair'。公司执行到位，基本面扎实，但 $5.9B 标记相对 2026 年监管和竞争逆风，安全边际有限。首选进入策略是在 IPO 信号仍强时，于 $5.5B
              以下二级市场耐心累积；一旦确认 FCA 执法行动，或 FY2026 收入增速降至 20% 以下，就硬性止损。


              投资前最关键的三项尽调问题是：（1）完整股本结构表，用来确认二级买家买到的是与优先股等同、清算优先级相当的工具；（2）按产品线拆分的 P&L，用来验证 Flex 和订阅的贡献利润率；（3）FCA
              监管往来函件，用来排除 IPO 窗口前隐藏的监管风险。
