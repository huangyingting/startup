chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、产品与商业模式
        blocks:
          - type: paragraph
            body: >
              Monzo Bank Limited 是受英国监管的数字银行，18 February 2015 以 Focus FS Limited 名义注册，2016 更名为 Monzo。总部位于英国 London，Monzo
              持有 Prudential Regulation Authority (PRA) 和 Financial Conduct Authority (FCA) 颁发的完整英国银行牌照，首次获批时间为 April
              2017。 [CO001][CO002]

              Monzo 的核心产品是受完整监管的英国活期账户，通过移动 app 访问，配有标志性的珊瑚色借记卡。银行已扩展为完整个人金融
              super-app，覆盖付费订阅层级（Plus、Premium、Extra、Perks、Max）、弹性信贷（Monzo Flex BNPL）、储蓄（即时支取和定期）、投资（BlackRock
              基金）、养老金储蓄和家财保险。Monzo Business 面向 SME，提供企业活期账户；Monzo Team 服务更大规模公司。 [CO003][CO004][CO005]

              商业模式以利息收入为核心：贷款（个人贷款、BNPL、透支）和存款浮存是主要收入引擎（约占 FY2025 收入 55–60%），交易费、订阅收入（FY2025 为 £75.2M）和企业银行补足其余。Monzo
              基础活期账户不收月费，靠增值服务和信贷产品变现。 [CO006][CO007]
