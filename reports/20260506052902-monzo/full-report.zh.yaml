      - number: '7.3'
        title: 战略、竞争与执行风险
        blocks:
          - type: paragraph
            body: >
              March 2026，Revolut 获得英国银行牌照，战略风险格局明显变化。Revolut 首次可以在同等 FSCS 保护条件下争夺英国主银行关系。Revolut $75B 估值（为 Monzo $5.9B 的
              12.7x）、更高单客户收入和全球规模，意味着它能连续多年维持激进英国增长投入——这种竞争动态，Monzo 仅靠资金火力无法匹配。


              IPO 执行风险正在上升。Morgan Stanley 参与（reported March 2025）意味着 2026-2027 可能上市，但英国 IPO 市场仍有挑战。IPO
              后披露义务将要求分部级财务透明度，而 Monzo 过去从未提供——如果 NII 集中度或信用质量指标不如表面收入增长所暗示，投资人会面临风险。IPO 尝试失败会推迟员工和投资人流动性，可能带来人才留存压力。


              领导层稳定性足够，但尚未完全去风险：TS Anil 自 May 2020 任 CEO，提供连续性；但 Monzo 原始联合创始团队已全部离开，机构知识集中在当前高管一代。IPO
              准备期，关键高管最可能被竞争对手挖角，人员风险会上升。投资 thesis 的 kill criteria 包括 FCA 牌照限制、>200bp NIM 压缩，或 Revolut
              在英国主账户新增开户中夺得品类领导地位。
