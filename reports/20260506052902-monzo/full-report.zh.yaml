  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义、边界与替代品
        blocks:
          - type: paragraph
            body: >
              Monzo 主要竞争于英国零售银行市场，涵盖个人活期账户、储蓄、无担保贷款（个人贷款、透支、BNPL）以及面向英国消费者和小企业的支付基础设施。Monzo 核心 TAM 的市场边界是完整英国银行收入池——2024
              估计每年约 £65–75B ($80–91B)——其中零售银行（个人活期账户、储蓄、消费信贷）约 £35–40B。 [CM001][CM002]

              现状替代品包括 Big Six 传统高街银行（Lloyds Banking Group、Barclays、HSBC、NatWest、Santander UK、Standard Chartered），它们在
              2024 合计持有约 71% 的英国主活期账户市场份额（低于 2020 的 85%）。相邻支出池包括：(a) 信用卡（Barclaycard、MBNA、Amex），(b) BNPL
              提供商（Klarna、Clearpay），(c) 储蓄平台（Marcus、Atom），以及 (d) 投资 app（HL、Freetrade、Trading 212）。Monzo
              正靠产品扩张策略越来越多地进入这些相邻市场。 [CM003][CM004]

              英国新银行数字银行市场（移动优先的受监管银行和电子货币机构，包括 Monzo、Revolut、Starling、N26 和 Chase UK）在 2024 估值约 $6.44B，预计以约 40% CAGR
              增长，到 2033 达到 $182B——但这一口径包含支付量和客户存款，不只是收入。 [CM005][CM006]
            claimRefs: []
