      - number: '3.3'
        title: 护城河分析与竞争风险
        blocks:
          - type: paragraph
            body: >
              Monzo 的竞争护城河立在三个相互咬合的支柱上：品牌信任（NPS +70）、产品深度与粘性（账户、储蓄、贷款、投资、养老金构成的整合产品飞轮），以及由 FSCS 存款保护加固的英国银行牌照。客户采用 3+ 个
              Monzo 产品后，换户成本会显著上升——同时使用 Monzo 活期账户、Pots 储蓄、Monzo Flex 和养老金的客户，面对的摩擦远高于单产品用户。


              主要耐久性风险包括：(1) Revolut March 2026 英国银行牌照消除 FSCS 信任差异，使 Revolut 成为真正的全服务英国竞争者；(2) Monzo 单客户收入低于 Revolut 或
              Starling，限制再投资能力；(3) Monzo 在 SME 银行弱于 Starling，可能限制 B2B 扩张；(4) Monzo 国际足迹有限——英国占其客户基数超过 95%——而 Revolut
              具备全球多元化。


              尽管存在这些风险，Monzo 的 NPS 领先、整合个人金融的先发优势，以及撬走已使用多个 Monzo 产品客户的难度上升，都说明护城河真实存在，2–3 年维度仍有韧性，但边际上正在被侵蚀。关键考验是：在
              BNPL 监管、利率正常化和高端层级饱和压迫全市场净收入增长时，Monzo 能否缩小与 Revolut、Starling 的单客户收入差距。
