  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 技术架构与工程速度
        blocks:
          - type: paragraph
            body: >
              Monzo 是完全构建在 AWS 上的云原生银行，使用 Go（Golang）微服务、Apache Cassandra 分布式数据库存储，以及 Apache Kafka 高吞吐事件流。截至 2024，Monzo
              拥有约 1,500+ 个微服务，架构具备故障隔离、独立扩展和快速部署能力——这些能力，使用单体核心系统的传统银行若不投入多年转型项目，难以复制。


              工程速度是真护城河。Monzo 每年约部署 10,000 次生产发布（每天 27 次），而大型英国银行通常按季度或月度部署。50–100x 的部署频率优势，意味着 Monzo 能显著更快地发布功能、修复
              bug、落地监管变化。Monzo CI/CD 流水线完全自动化，工程团队还发布详细技术博客，覆盖部署实践、分布式追踪基础设施和基于 SLO 的可靠性框架。


              Monzo 是 Mastercard 直接 principal member（不是通过 programme manager），直接参与 UK Faster Payments Scheme 和
              CHAPS，并拥有自研实时欺诈检测 ML 平台，每月处理 100M+ 笔交易。这些与支付基础设施的直接集成，让 Monzo 相比依赖 Banking-as-a-Service
              中介的新银行，拥有更强控制权、更低单笔交易成本和更好的数据可见性。
