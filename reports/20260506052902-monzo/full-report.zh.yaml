      - number: '5.2'
        title: 产品套件与近期上线
        blocks:
          - type: paragraph
            body: >
              Monzo 消费者产品套件覆盖完整个人银行栈：免费活期账户（salary sorter、pots、分析、即时通知）、订阅层级（Plus、Premium、Perks、Extra、Max）、储蓄（ISA、easy
              access）、Monzo Flex BNPL、股票投资（BlackRock，January 2025 上线）、养老金（March 2025 上线）、家财保险和旅行保险。企业银行覆盖 625K SME
              客户，产品包括 Monzo Business 和 Team。


              2024-2025 产品发布代表 Monzo 从纯交易银行向财富管理扩展的关键一步：BlackRock 投资合作和养老金产品最重要。这些产品带来长期
              engagement（客户很少迁移养老金）、提供经常性费用收入，并加深换户成本飞轮。Monzo 2025-2026 路线图包括英国按揭、扩展企业银行（薪资、批量付款）以及继续开发美国市场。


              Monzo iOS app 评分 4.9/5、评论 400,000+；Android app 评分 4.7/5。Which? 在 2024 和 2025 均授予 Monzo Best Banking
              App。Monzo 工程博客自 2016 以来发布 200+ 篇技术文章，显示出银行业少见的技术透明文化。Monzo 是 Mastercard 直接 principal member（不是通过 programme
              manager），因此相较由 programme manager 管理的竞争者，拥有完整数据权利、产品控制权和更低单笔交易成本。


              Monzo 的自研数据资产——尤其是用于欺诈检测、信用评分和 AML 监控的 ML 模型——正在加深竞争护城河。这些模型在来自 12.2M 客户的 10
              年交易数据上训练，并随规模持续改进；新进入者或使用第三方评分系统的传统银行很难复制。Go 微服务速度、ML 数据优势和无遗留核心银行系统三者结合，拼出了一套可以说是英国零售银行业最有竞争力的技术栈。
