  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基数与分层
        blocks:
          - type: paragraph
            body: >
              Monzo 拥有 12.2M 个人客户和 625K 企业客户（FY2025），按客户数是英国聚焦型新银行中最大的一家。Monzo 覆盖约 22%
              英国成年人，已实现主流零售银行渗透——此前这一里程碑通常只属于传统高街银行。个人客户同比增长 25%，企业客户同比增长 49%，说明消费者和 SME 市场均已规模化增长，其中企业银行加速更强。


              客户年龄结构偏年轻：51% 低于 35 岁，36% 位于 25–34 cohort。这反映 Monzo 起步时就是面向 millennials 和 Gen-Z 的产品，但 YouGov 数据（2024）显示
              35–55 cohort 的「would recommend」得分为 58%，说明中年客群已有实质渗透。65 岁以上 cohort 仅占客户
              4%——这是一个明显缺口，而该财富客群持有英国大部分家庭金融资产。打入更高年龄层既是挑战，也是增长机会，尤其是 2025 上线的养老金产品。


              英国地理集中度高：约 95%+ 客户和收入来自英国。美国产品（Sutton Bank 合作，2022
              上线）和欧盟办公室（Ireland，2024）代表早期国际存在，但未单独披露客户数。国际扩张是未来增长向量，而非当前收入驱动。
