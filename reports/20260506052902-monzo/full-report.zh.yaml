      - number: '2.2'
        title: 市场规模测算——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              三种测算口径给出的 Monzo 可服务市场估计趋于一致：

              口径 1 —— 自上而下的英国银行收入池：英国零售银行收入池每年约 £65–75B（利息收入、手续费、交易收入）。截至 2024，新银行合计捕获约 5–7%。若新银行渗透率达到 10–15%（3–5
              年情景），头部新银行的合计 SAM 将达到 £6.5–11.3B。Monzo 的市场位置（占英国新银行客户 22%）意味着到 2028–2030，SOM 约为 £1.4–2.5B 收入。
              [CM007][CM008]

              口径 2 —— 英国活期账户基数：英国约有 80M 个银行账户、覆盖 55M+ 成年人；按 ARPU ~£100/account/year（利息 + 费用）计，活期账户可服务费用池约 £8B。Monzo
              12.2M 个个人账户、当前约 £100 ARPU，对应约 £1.2B 收入（与 FY2025 实际值一致）。要达到 £2–3B，Monzo 需要把 ARPU 提升至
              £160–250（可由养老金、贷款、企业业务推动），或把客户数提升到 20–25M。 [CM009][CM010]

              口径 3 —— 产品级 SAM：(a) 英国消费信贷（个人贷款、透支、BNPL）：未偿余额约 £200B，年利息和费用约 £15B；(b) 英国零售储蓄：未偿存款约 £1.5T，按 2% 平均利率产生约 £30B
              利息收入流；(c) 英国 SME 银行：每年约 £4B SME 银行收入。Monzo 当前在三个产品 SAM 的渗透率均低于 3%，扩张空间仍大。 [CM011][CM012]
            claimRefs: []
