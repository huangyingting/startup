      - number: '4.3'
        title: 资本充足与财务风险
        blocks:
          - type: paragraph
            body: >
              Monzo FY2025 资产负债表扩张至 £18.3B 总资产，资金来源约 90% 为零售和 SME 存款，约 5–7% 为股权。创立以来累计股权资本融资约 £1.5–1.9B，2024 新增
              $620M。Monzo 未披露批发融资额度，几乎完全由存款和股权资金支持。这一结构天然低杠杆，但也限制了 Monzo 贷款账簿快于存款增长的能力。


              主要财务风险是利率敏感性。FY2025 收入约 65–70% 来自 NII，且大多为浮动利率。BoE 每降息 25bp，估计 NII 减少 £30–40M。100bp 降息周期（2025-2026
              有可能出现）可能使收入减少 £100–160M——按当前成本基数，相当于完全抹去 FY2025 经营利润。部分对冲来自：订阅增长、Flex 贷款账簿扩张，以及投资 / 养老金上线提供与利率无关的收入流。


              Monzo 贷款账簿（Flex BNPL、透支、个人贷款）的信用质量未单独披露。分析师估计 FY2025 坏账费用为 £80–120M，仍在经营利润缓冲内，但在下行周期会明显压缩利润率。Monzo CET1
              资本充足率未公开披露；PRA 规则要求维持约 8–10% 的监管最低值。2024 融资显著增强了监管资本余量，FY2025 也是首次产生正自由现金流的年份。
