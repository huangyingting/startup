      - number: '7.2'
        title: 运营、信用与技术风险
        blocks:
          - type: paragraph
            body: >
              Monzo 的主要运营风险是：利率敏感性、信用质量恶化和技术依赖。净利息收入占 FY2025 收入约 65–70%；175bp BoE 降息周期（到 2026 end 的基准情景）可能使收入减少
              £200–280M，Monzo 可能重新接近盈亏平衡。这是最大的单一财务风险，且大体外生。


              Monzo Flex BNPL 和透支账簿的信用质量风险重要：Moody's 估计，轻度衰退中 BNPL 违约率可能上升 25–40%。对 Monzo 而言，这意味着下行情景中坏账费用
              £100–160M——会吃掉 FY2025 经营利润的大部分。信用账簿增长很快（Flex 是关键增长产品），承销模型虽自研且数据丰富，但尚未经历完整英国消费者衰退周期检验。


              技术风险中等：AWS 是主要云依赖，multi-region AWS 故障会导致交易不可用。Monzo 的 multi-AZ 部署和 PRA SS1/21 operational resilience
              framework 降低了持续中断风险。NCSC 2024 所指的国家级网络安全威胁，是英国金融服务业的系统性风险；Monzo 自研 ML 欺诈平台和定期安全审计提供了有意义但不完整的缓释。
