      - number: '3.2'
        title: 产品与功能对比
        blocks:
          - type: paragraph
            body: >
              Monzo 靠广度竞争：它是唯一一个在单一 app 内完整整合活期账户、BNPL（Flex）、储蓄 pots、股票投资、养老金和保险的英国新银行。Revolut 除 BNPL 和养老金外几乎匹配多数功能，并在
              crypto、大宗商品和国际 FX 上超过 Monzo。Chase UK 的产品最简单——一种账户、1% cashback、3.5% 储蓄——靠无功能复杂度的易用性取胜。


              定价上，Monzo 的分层模型（免费、Plus £5、Premium £15、Perks £7、Max £17）对标 Revolut 更清晰的四层阶梯（Free、Plus £2.99、Premium
              £6.99、Metal £12.99、Ultra £55）。入门层级，Revolut 低于 Monzo；高端层级，Monzo Premium/Max 聚焦英国本地权益（家财保险、旅行保险、cashback），而
              Revolut 主打全球旅行和投资权益。


              Monzo Flex BNPL 仍是独特差异点：它深度嵌入 Monzo app，带自动还款、信用健康跟踪和资格评分。截至 May 2025，Revolut 和 Starling 都没有可比的英国内嵌式 BNPL
              app 产品。Klarna 仍是主要 BNPL 替代品，但它是独立服务，不是完整银行关系。
