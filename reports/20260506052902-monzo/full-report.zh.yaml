      - number: '5.3'
        title: 合规、安全与风险架构
        blocks:
          - type: paragraph
            body: >
              Monzo 的 FCA 授权覆盖吸收存款、消费信贷、支付服务、电子货币，以及从 2025 起的投资产品分销。2024-2025 未见 Monzo 遭 FCA 执法行动的报告。Monzo 的 GDPR
              体系扎实：已任命 DPO，维护 Article 30 register，且未披露 ICO 执法行动。与 Starling 2024 年 £29M AML 罚款相比，这对 Monzo 合规声誉有利。


              Monzo KYC 开户使用 Jumio 生物识别 ID 验证，并用自研 ML 对 PEP / 制裁数据库筛查，在保持规模化监管合规的同时，把开户时间压到 10 分钟以内。欺诈检测平台用 400+
              个交易特征实时评分；Monzo 曾公开称其为英国消费银行中最复杂的自研 ML 系统之一。


              关键技术依赖包括 AWS（主云）、Mastercard（卡组织）和 Faster Payments Scheme。长时间 AWS 中断——最重要的单一供应商风险——会影响 Monzo 全球交易处理。Monzo
              通过 multi-AZ 部署和服务级 chaos engineering 缓释这一风险，但 multi-region AWS 故障仍会构成重大事件。多数云原生 fintech 都有这一依赖，并非 Monzo
              独有。
