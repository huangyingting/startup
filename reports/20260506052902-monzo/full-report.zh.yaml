              客户留存由产品深度机械性加固：salary sorter 活跃用户（3M+）估计流失率 2–3%，而仅使用免费层的用户为 8–10%。拥有活跃 Flex 余额、养老金 pots 或储蓄 ISA
              的客户，换户摩擦明显。Monzo 增加产品类别后，产品换户成本会继续上升——养老金尤其会形成跨几十年的 engagement 锚点。高 NPS 和持续提升的产品粘性结合，带来有韧性的留存画像。


