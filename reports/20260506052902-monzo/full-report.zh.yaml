      - number: '1.2'
        title: 领导层、治理与创始人
        blocks:
          - type: paragraph
            body: >
              Monzo 于 February 2015 由五名曾在 Starling Bank 共事的人联合创立：Tom Blomfield（原 CEO，January 2021 离开）、Jonas
              Huckestein、Jason Bates、Paul Rippon 和 Gary Dolman。所有创始人都深度参与银行牌照申请和早期产品搭建。创始团队共同的 Starling Bank
              背景加速了技术搭建和监管申请——Monzo 注册仅两年后就拿到银行牌照。 [CO008][CO009][CO031]

              TS Anil 于 May 2020 出任 CEO，加入前在 Visa 担任 Consumer Products & Solutions EVP 兼 Group Executive。Anil 带领 Monzo
              从未盈利阶段走到 FY2024 首个全年盈利，并延续当前增长轨迹。Gary Hoffman 自 October 2020 起担任非执行主席；Hoffman 是英国资深银行高管（曾任 Northern Rock 和
              Bradford & Bingley CEO）。五位原始联合创始人均已不再担任公司高管，公司战略方向集中在唯一常任 CEO TS Anil 身上，这是 pre-IPO 阶段的关键人治理因素。
              [CO010][CO011]

              Monzo 董事会中有主要机构投资者代表（CapitalG、Y Combinator、Passion Capital、Accel）和独立非执行董事。Tom Blomfield 在 early 2021
              离任正式公司董事，但仍是股东。银行高管团队较为完整，包括 Chief Risk Officer、Chief Operating Officer 和 Chief Financial Officer。截至
              mid-2025，公司尚未公开披露具名 CFO，构成一个轻微的治理披露缺口。 [CO012][CO013]
