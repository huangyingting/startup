  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资 thesis 与估值背景
        blocks:
          - type: paragraph
            body: >
              进入 2026 尽调周期时，Monzo 是英国唯一已经盈利、具规模、全服务的数字银行。October 2024 确立的 $5.9B 二级估值——当时 Singapore 主权财富基金 GIC 与
              StepStone Group 在独立公平交易中购买现有股份——仍是最明确的价格锚。按这一估值，Monzo 约对应 FY2025 收入 £1,235.4M 的 3.8×，位于 fintech
              新银行可比组底部，明显低于 Wise 和 Nubank 所享有的 5–9× 倍数。


              投资 thesis 建立在五根支柱上。第一，Monzo 拥有英国主要零售银行中最高的 NPS（+70），形成低 CAC 增长引擎，现有大行无法快速复制。这种客户拥护会复利：Monzo 报告 FY2025
              年末个人客户 12.2M，全年增长 25%，相较同业几乎不依赖付费营销。第二，公司 FY2025 实现净利润
              £94.6M——首家达到规模化持续盈利的英国数字银行。第三，收入多元化正在推进：订阅产品（Plus、Premium）和 BNPL（Flex）现占收入约
              35–40%，降低了对基准利率下调的敏感性。第四，企业银行（625K 客户，+49% YoY）是一项尚未充分变现的资产——Monzo 持有英国 SME 账户低于 5%，在结构性更高 ARPU
              上有长增长跑道。第五，国际扩张（通过 Sutton Bank 合作进入美国、欧盟足迹）打开的 TAM 至少是国内天花板的 10×。


              反方 thesis 同样可信。Revolut 英国银行牌照（March 2026）改变了竞争格局：Revolut 现在可提供 FSCS 保护存款，消除了抬高 Monzo
              感知安全性的最后一道结构性壁垒。Revolut 拥有 10M+ 英国用户，并有 $75B 估值提供资本补贴定价，是 Monzo 存款基数和产品领导地位最可信的威胁。2026 降息环境下的 NIM
              压缩是第二个逆风：150bps 基准利率下降可能使 NIM 收入减少 £150–220M，除非 Flex 和订阅增长抵消损失。BNPL 合规过渡期限（October 2026）也会带来近期运营成本压力，因为
              Monzo 需要重构 Flex 准入基础设施，以满足 FCA 消费信贷要求。
