      - number: '2.3'
        title: 买方分层、增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              Monzo 的核心买方分层为：(1) 18–34 岁英国 millennials 和 Gen Z 成年人（占客户基数 36%），是口碑获客的主力 cohort；(2) 35–55 岁、因节省费用和更好 UX
              而考虑迁移主账户的英国成年人；(3) SME（1–50 名员工），把 Monzo Business 作为主或副企业账户；(4) 承受生活成本压力的家庭，使用 Monzo Flex（BNPL）和储蓄功能管理财务。
              [CM013][CM014]

              增长驱动包括：(a) 英国 Bank Rate 在 2024 全年维持 4% 以上，抬升 Monzo 对不断增长存款基数（£16.6B）的 NIM；(b) FCA 开放银行要求降低换户摩擦，并允许账户聚合；(c)
              人口结构顺风——50% 的英国成年人已有新银行产品（2018 为 16%），年轻 cohort 明显数字优先；(d) Monzo 产品深度扩张（养老金、投资、企业银行）推动单用户 ARPU 同比提升
              15–16%；(e) FCA Consumer Duty Act（2023）带来监管顺风，要求银行按结果负责，透明费率结构因此受益。 [CM015][CM016]

              采用约束包括：(a) 信任和惯性壁垒——即便信任差距收窄，传统银行仍因 CASS 换户摩擦保住主账户关系；(b) 利率风险——Bank Rate 从 5.25%（2023 peak）向 2026 的 3.5–4%
              回落，会压缩 Monzo 存款 NIM；(c) 监管风险——BNPL 监管（FCA 咨询待定）可能收紧 Flex 准入标准；(d) 英国单一市场约束——Monzo 收入几乎全部来自英国，形成地理集中风险；(e)
              国际扩张挑战——美国和欧盟扩张近期收入贡献有限。 [CM017][CM018][CM019]
            claimRefs: []
