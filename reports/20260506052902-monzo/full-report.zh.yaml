              - CM018
              - CM019
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Monzo 身处竞争激烈的英国数字银行市场，对手包括 Revolut、Starling、Chase UK、Wise 和 Big Six
              现有大行。2020–2025，新银行板块明显成熟：多家公司已实现盈利，监管平权正在增强；功能复制加速后，产品差异正在收窄。


              Monzo 的关键竞争强项在于个人金融整合深度（pots、salary sorter、Flex BNPL、投资、养老金）、出色的 +70 NPS，以及自 2017 起持有完整英国银行牌照。这些优势推动
              FY2025 客户同比增长 25%，达到 12.2 million 个人客户，增速领先同业。


              分析期（2024–2026）最重大的竞争变化，是 Revolut 于 March 2026 获得英国银行牌照。这消除了 Monzo 近十年来受益的信任差距。Revolut 拥有 50M+
              全球客户基数，收入也显著更高（FY2023 为 £2.2B，且快速增长），对 Monzo 在英国的领先地位构成可信的长期威胁。


              Starling Bank 曾是产品深度和英国聚焦度最接近的竞争者，但 October 2024 因 FCA £29M AML 罚款受挫。这伤害了其 SME 银行业声誉并拖慢增长。Starling 在 SME
              银行仍强于 Monzo，但在消费者创新和 NPS 上更弱。
            claimRefs: []
