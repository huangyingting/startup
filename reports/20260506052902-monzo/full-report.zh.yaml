      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >
              Monzo FY2025 单客户收入（ARPU）约 £101（£1,235M / 12.2M 个人客户）。这明显低于 Starling 的约 £175/account 和 Revolut 估计
              £170/customer，反映 Monzo 庞大的免费层用户基数：这些用户除交换费和浮存收入外，贡献有限。随着高端层级采用加深，ARPU 应会改善。


              获客成本估计为每名新客户 £20–35，远低于许多 fintech 企业的 SaaS 式 CAC，体现 Monzo 的口碑飞轮。按 £101 ARPU 和约 75% 毛利率测算，估计回本周期为 6–9
              个月——可与一线消费 fintech 相比。低 CAC 是结构性优势，经过 10 年病毒式增长持续复利。


              成本收入比从 FY2022 超过 100% 改善至 FY2025 约 75–80%。人员成本（约占 opex 40–45%）是最大单项驱动。Monzo 云原生 AWS 基础设施避开了传统银行常见的硬件
              capex。经营杠杆已经可见：收入增长 40%，估计员工数增长 10–15%，意味着毛利率正在结构性抬升。要走到 50–60% 成本收入比，需要 NII 继续扩张、订阅渗透提升，并控制员工增长。
