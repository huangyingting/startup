  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              对一家产品组合多元、持续增长的英国银行来说，Monzo 的监管风险可控但不轻。最直接的监管风险是 FCA BNPL 监管（CP24/2，2025 部分生效）：Monzo Flex 每年估计产生 £100–150M
              收入，新规下需要完整 affordability 评估和更严格准入标准。审批率可能下降 15–25%，对一条有意义的收入流形成逆风。


              第二大监管风险是 PSR 强制 APP 欺诈赔付规则（October 2024），要求 Monzo 对 Authorised Push Payment 欺诈单笔最高赔付 £85,000。Monzo 拥有 12M+
              活跃交易客户，估计每年面临 £15–30M 欺诈赔付负债——直接冲击经营利润，且 FY2025 模型并未充分计入。Monzo 实时欺诈检测平台可部分缓释，但欺诈赔付现在已是不可消除的成本。


              有利的是，Monzo FCA register 干净：截至 May 2025，没有执法行动、限制或警告通知。与 Starling Bank £29M AML 罚款（October 2024）相比，Monzo
              合规优势突出。Consumer Duty Act 合规、透支监管审查，以及养老金产品分销规则（从 2025 上线起）构成额外监管层，会提高合规成本，但 Monzo 现有风险基础设施足以应对。
