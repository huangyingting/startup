  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Monzo FY2025（year ending March 2025）收入达到 £1,235.4M，较 FY2024 的 £880M 同比增长 40%。这是连续第二年大幅增长，也是第二个盈利年度，经营利润
              £60.5M、调整后税前利润 £113.9M。四年收入轨迹——£222M（FY2022）→ £381M（FY2023）→ £880M（FY2024）→
              £1,235M（FY2025）——显示规模加速，同时利润率改善。


              主导收入驱动是净利息收入（NII），估计占 FY2025 总收入 65–70%。Monzo 在 £16.6B 存款基数上赚取 NII，资金投向英国政府证券、隔夜 BoE 存款，以及包括 Monzo Flex
              BNPL 在内的零售贷款产品。Bank of England 基准利率高位（2023-2024 peak 5.25%）是 FY2024 NII 阶跃增长的主因，并在开始于 late 2025 压缩前，继续支撑
              FY2025 NII 处于高位。


              非利息收入流包括：订阅费（估计约 £80–120M）、£55.2B 年卡消费带来的交换费（估计约 £100–150M）、Monzo Flex 利息和费用（估计约 £100–150M），以及企业银行费用（估计约
              £60–90M）。这些多元收入流降低了——但没有消除——NII 集中风险。年卡消费同比增长 63% 至 £55.2B，说明 Monzo 正越来越多地成为主消费账户，而不只是补充卡——这是长期关系深度和 NII
              韧性的关键指标。
