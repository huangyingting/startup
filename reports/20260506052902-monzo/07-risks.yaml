  claims:
    - id: CR001
      statement: >-
        The FCA published Consultation Paper CP24/2 on BNPL regulation in February 2024, proposing to bring BNPL lenders
        under full FCA consumer credit authorisation. If enacted, Monzo Flex would require full affordability
        assessments, standardised disclosures, and stricter eligibility criteria — potentially reducing Flex approval
        rates and volume by 15–25%.
      type: third-party-reported
      topic: BNPL-regulatory-risk
      sourceRefs:
        - SR001
        - SR020
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QR001
