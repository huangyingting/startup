  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis and valuation context
        blocks:
          - type: paragraph
            body: |
              Monzo enters the 2026 diligence cycle as the UK's only profitable, scaled, full-service digital bank. The
              $5.9B secondary valuation established in October 2024 — when Singapore sovereign wealth fund GIC and
              StepStone Group purchased existing shares in an arms-length transaction — remains the definitive price
              anchor. At this mark, Monzo trades at approximately 3.8× its FY2025 revenue of £1,235.4M, placing it
              at the bottom of the fintech neobank comparable set and well below the 5–9× multiples commanded by
              Wise and Nubank.

              The investment thesis rests on five pillars. First, Monzo has the highest NPS (+70) of any major UK
              retail bank, creating a low-CAC growth engine that incumbents cannot replicate at speed. This customer
              advocacy compounds: Monzo reported 12.2M personal customers at FY2025 year-end, a 25% annual gain
              achieved with minimal paid marketing relative to peers. Second, the company achieved £94.6M net income
              in FY2025 — the first UK digital bank to reach sustained profitability at scale. Third, revenue
              diversification is progressing: subscription products (Plus, Premium) and BNPL (Flex) now account for
              approximately 35–40% of revenue, reducing the sensitivity to base rate cuts. Fourth, business banking
              (625K customers, +49% YoY) is an undermonetised asset — Monzo holds under 5% of UK SME accounts,
              implying a long growth runway at structurally higher ARPU. Fifth, the international expansion (US via
              Sutton Bank partnership, EU footprint) opens a total addressable market at least 10× the domestic
              ceiling.

              The anti-thesis is also credible. Revolut's UK banking licence (March 2026) transforms the competitive
              landscape: Revolut now offers FSCS-protected deposits, eliminating the last structural barrier that
              elevated Monzo's perceived safety. With 10M+ UK users and a $75B valuation providing capital to
              subsidise pricing, Revolut is the most credible threat to Monzo's deposit base and product leadership.
              NIM compression in a 2026 rate-cut environment is a second headwind: a 150bps base rate decline could
              reduce NIM revenue by £150–220M unless Flex and subscription growth offset the loss. The BNPL
              compliance transition deadline (October 2026) will also create near-term operating cost pressure as
              Monzo re-engineers Flex eligibility infrastructure to meet FCA consumer credit requirements.
            claimRefs: []
      - number: '8.2'
        title: Valuation analysis and comparable set
        blocks:
          - type: paragraph
            body: |
              Monzo's 3.8× Price-to-Revenue multiple sits at the cheapest end of the fintech neobank peer group.
              The comparable set spans three public companies and one private peer. Revolut trades at approximately
              17.9× FY2024 revenue — a premium reflecting global presence in 50 countries, multi-product breadth
              including cryptocurrency revenue, and a $75B valuation set by a sophisticated investor (Schroders).
              Wise plc, the closest UK-listed fintech comparison, commands approximately 9.1× FY2025 revenue — a
              premium justified by its differentiated cross-border payments franchise, 13M+ customers, and higher
              gross margin versus banking NIM. Nubank (NYSE: NU) trades at approximately 5.4× FY2024 revenue,
              reflecting 110M customers but with emerging market discount. Starling Bank's last private valuation
              (~3.7× stale FY2022 mark) is closest to Monzo's current multiple, though Starling's AML enforcement
              action and lack of international ambition justify its discount.

              Monzo's discount to Wise and Nubank is partially explained by its UK geographic concentration, earlier
              product mix (no mortgages yet), and the absence of a public market re-rating. If Monzo successfully
              executes its IPO at a 6× multiple on FY2027E revenue of approximately £1.93B, the equity value would
              reach approximately £11.6B ($14.7B) — a 2.5× MOIC from the $5.9B entry price, equivalent to ~36%
              IRR over 3 years. The bull case (8× at £2.1B FY2027 revenue) delivers 3.6× MOIC.

              The CB Insights State of Fintech Q4 2024 places Monzo in the top 10 most valuable private fintechs
              globally, alongside Stripe ($70B), Klarna ($15B), and Checkout.com ($11B). This peer cohort suggests
              Monzo is a credible IPO candidate by 2026–2027, with Morgan Stanley's engagement as lead adviser
              corroborating institutional readiness.
            claimRefs: []
      - number: '8.3'
        title: Scenarios, risks, and recommendation
        blocks:
          - type: paragraph
            body: |
              The probability-weighted expected MOIC across bull/base/bear/tail scenarios is approximately 2.3×
              over 3 years, equivalent to a ~32% blended IRR. This return is attractive on an absolute basis but
              depends critically on IPO execution. The base case (45% probability) delivers 2.5× MOIC assuming a
              2027 listing at 6× FY2027E revenue. The bull case (35% probability) delivers 3.6× at an 8× multiple
              in 2026. The bear case (15% probability) delivers only 1.3× at 4× in 2028 — an outcome triggered by
              NIM compression and regulatory cost drag.

              The kill triggers most likely to materialise are: a revenue growth print below 20% in FY2026 (20%
              probability) and IPO delay beyond 2028 (15% probability). An FCA enforcement action (10%
              probability) would be the most damaging single event, immediately impairing both the IPO timeline and
              the valuation multiple. Revolut's post-licence competitive response (15% probability) is a medium-term
              risk rather than an immediate impairment.

              The recommendation is 'track' at medium confidence with a 'fair' valuation stance. The company is
              executing well and the fundamentals are sound, but the $5.9B mark offers limited margin of safety
              relative to the regulatory and competitive headwinds of 2026. A preferred entry strategy is patient
              accumulation in the secondary market at sub-$5.5B if IPO signals remain strong, with a hard stop
              on any confirmed FCA enforcement action or revenue deceleration below 20% in FY2026.

              The three most critical pre-investment diligence asks are: (1) the full capitalisation table to confirm
              secondary purchasers are buying preference-equivalent instruments with comparable liquidation priority;
              (2) product-line P&L to verify Flex and subscription contribution margins; and (3) FCA supervisory
              correspondence to rule out hidden regulatory risk ahead of the IPO window.
            claimRefs: []
