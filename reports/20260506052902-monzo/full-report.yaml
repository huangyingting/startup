  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Monzo's revenue reached £1,235.4M in FY2025 (year ending March 2025), growing 40% YoY from £880M in
              FY2024. This marks the second consecutive year of substantial growth and the second profitable year, with
              £60.5M operating profit and £113.9M adjusted pre-tax profit. The four-year revenue trajectory — £222M
              (FY2022) → £381M (FY2023) → £880M (FY2024) → £1,235M (FY2025) — shows accelerating scale with improving
              margin.


              The dominant revenue driver is net interest income (NII), estimated at 65–70% of total FY2025 revenue.
              Monzo earns NII on its £16.6B deposit base, deployed into UK government securities, overnight BoE
              deposits, and retail lending products including Monzo Flex BNPL. The elevated Bank of England base rate
              (peak 5.25% in 2023-2024) was the primary driver of the FY2024 NII step-change and continued to support
              FY2025 NII at elevated levels before beginning to compress in late 2025.


              Non-interest revenue streams include: subscription fees (~£80–120M estimated), interchange from £55.2B
              annual card spend (~£100–150M estimated), Monzo Flex interest and fees (~£100–150M estimated), and
              business banking fees (~£60–90M estimated). These diversified revenue streams reduce — but do not
              eliminate — the NII concentration risk. Annual card spend growth of 63% YoY to £55.2B signals that Monzo
              is increasingly becoming a primary spending account, not just a supplementary card — a critical indicator
              of long-term relationship depth and NII durability.
            claimRefs: []
      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Monzo's revenue per customer (ARPU) was approximately £101 in FY2025 (£1,235M / 12.2M personal customers).
              This is meaningfully below Starling's ~£175/account and Revolut's estimated £170/customer, reflecting
              Monzo's large base of free-tier users who generate limited revenue beyond interchange and float income. As
              premium tier adoption deepens, ARPU should improve.


              Customer acquisition costs are estimated at £20–35 per new customer, well below the SaaS-style CAC of many
              fintech businesses, reflecting Monzo's word-of-mouth flywheel. At £101 ARPU and ~75% gross margin,
              estimated payback period is 6–9 months — competitive with best-in-class consumer fintech. The low CAC is a
              structural advantage that compounded over 10 years of viral growth.


              Cost-to-income ratio improved from over 100% in FY2022 to approximately 75–80% in FY2025. People costs
              (~40–45% of opex) are the largest single driver. Monzo's cloud-native AWS infrastructure avoids the
              hardware capex typical of legacy banks. Operating leverage is visible: 40% revenue growth with estimated
              10–15% headcount growth implies gross margin is building structurally. The path to a 50–60% cost-to-income
              ratio requires continued NII scale, subscription penetration, and controlled headcount growth.
            claimRefs: []
      - number: '4.3'
        title: Capital Adequacy and Financial Risks
        blocks:
          - type: paragraph
            body: >
              Monzo's balance sheet grew to £18.3B total assets in FY2025, funded ~90% by retail and SME deposits and
              ~5–7% by equity. Total equity capital raised since founding is approximately £1.5–1.9B, with $620M added
              in 2024. Monzo operates without disclosed wholesale funding facilities, making it almost entirely
              deposit-and-equity funded. This structure is inherently low-leverage but limits Monzo's ability to grow
              the lending book faster than deposit growth allows.


              The principal financial risk is interest rate sensitivity. Approximately 65–70% of FY2025 revenue is NII,
              mostly floating-rate. Each 25bp BoE rate cut reduces estimated NII by £30–40M. A 100bp cut cycle
              (plausible over 2025-2026) could reduce revenue by £100–160M — equivalent to erasing FY2025 operating
              profit entirely at current cost base. Partially offsetting this: subscription growth, Flex loan book
              expansion, and investing/pensions launch provide interest-rate-independent revenue streams.


              Credit quality in Monzo's lending book (Flex BNPL, overdrafts, personal loans) is not separately
              disclosed. Analysts estimate bad debt charge of £80–120M in FY2025, which is within the operating profit
              cushion but would compress margins materially in a downturn. Monzo's CET1 capital adequacy is not publicly
              disclosed; it is required to maintain regulatory minimums of ~8–10% under PRA rules. The 2024 fundraising
              materially bolstered regulatory capital headroom, and FY2025 was the first year of positive free cash flow
              generation.
            claimRefs: []
