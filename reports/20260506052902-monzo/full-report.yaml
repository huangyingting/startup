            title: First full-year profitable UK neobank (alongside Starling)
            body: >
              Monzo's FY2024 first annual profit (£15.4M) and FY2025 profit surge (£113.9M adjusted) mark a structural
              shift from growth-at-all-costs to profitable scaling. This places Monzo in a rare category — profitable,
              growing, and pre-IPO — that commands premium investor interest.
