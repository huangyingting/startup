companyProfile:
  summary: >-
    Monzo is the United Kingdom's largest pure-digital retail bank. Founded in 2015 and authorised as a full UK bank
    since April 2017, Monzo serves 12.2 million personal and 625,000 business customers with a mobile-first banking
    platform covering current accounts, savings, BNPL (Flex), international transfers, investments, and pensions. In
    FY2025 (ended March 2025), Monzo generated £1,235.4 million in revenue and £94.6 million in net income — the first
    UK neobank to achieve sustained profitability at scale. The company is preparing for an IPO with Morgan Stanley
    appointed as lead adviser, targeting a 2026+ London listing.
  foundedDate: '2015-02-18'
