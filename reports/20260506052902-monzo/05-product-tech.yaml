        Monzo deploys approximately 10,000 production releases per year — an average of 27 per day — using automated
        CI/CD pipelines. This deployment frequency is 50–100x faster than typical UK high-street banks, enabling
        continuous product improvement.
      type: third-party-reported
      topic: deployment-frequency
      sourceRefs:
