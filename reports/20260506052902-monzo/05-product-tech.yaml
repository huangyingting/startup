  claims:
    - id: CE001
      statement: >-
        Monzo's technology stack is built on Go (Golang) microservices running on AWS, using Apache Cassandra as the
        primary database and Apache Kafka for event streaming. This architecture enables independent service scaling,
        fault isolation, and high-throughput transaction processing.
      type: third-party-reported
      topic: technology-stack
      sourceRefs:
        - SE001
        - SE021
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QE002
      contradictsClaimRefs: []
    - id: CE002
      statement: >-
        Monzo's platform comprises approximately 1,500+ microservices (as of 2024) covering account management,
        payments, lending, fraud detection, notifications, and analytics. Each service is independently deployable with
        its own CI/CD pipeline, enabling rapid feature iteration.
      type: third-party-reported
      topic: microservices-count
      sourceRefs:
        - SE001
        - SE003
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QE003
      contradictsClaimRefs: []
    - id: CE003
