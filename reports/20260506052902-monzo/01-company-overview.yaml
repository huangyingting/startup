    - id: C119
      statement: >-
        Monzo had 12.2M personal banking customers as of 31 March 2025 (+25% YoY, adding 2.4M in the year); over
        two-thirds of new sign-ups came via word-of-mouth. In April 2025 alone, over 300,000 new users joined — the
        biggest month ever.
      type: third-party-reported
      topic: customers
