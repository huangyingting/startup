    - id: C118
      statement: >-
        Monzo reported operating profit of £60.5M and adjusted pre-tax profit of £113.9M for FY2025 — an approximately
        8× increase on the prior year's £15.4M reported pre-tax profit (FY2024). Net income for FY2025 was £94.6M.
      type: third-party-reported
      topic: financial-performance
      sourceRefs:
