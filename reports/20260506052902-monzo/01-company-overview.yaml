callouts:
  - title: First full-year profitable UK neobank (alongside Starling)
    body: >
      Monzo's FY2024 first annual profit (£15.4M) and FY2025 profit surge (£113.9M adjusted) mark a structural shift
      from growth-at-all-costs to profitable scaling. This places Monzo in a rare category — profitable, growing, and
      pre-IPO — that commands premium investor interest.
    claimRefs:
      - C017
      - C018
      - C019
    calloutType: strength
  - title: Five original co-founders all departed — succession execution risk
    body: >
      All five original co-founders have left Monzo as active managers. TS Anil (CEO since 2020) has effectively rebuilt
      leadership, but the company's post-founder growth phase means institutional memory now rests with a professional
      management team rather than the original builders. Key-person risk has migrated entirely to TS Anil.
    claimRefs:
      - C008
      - C009
      - C010
    calloutType: risk
