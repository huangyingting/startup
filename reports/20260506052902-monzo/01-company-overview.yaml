      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ109
    - id: C113
      statement: >-
        TS Anil (CEO) holds concentrated strategic authority at Monzo; with all founders departed, key-person risk has
        migrated to Anil. No successor has been publicly named.
      type: inferred
      topic: key-person-risk
      sourceRefs:
        - S104
        - S107
      confidence: medium
      freshness: current
    - id: C114
      statement: >-
        In March 2024, Monzo raised $430M (Series I) at a $5B post-money valuation, co-led by CapitalG (Alphabet's
        growth equity fund) and GV (Google Ventures) — a rare co-investment from both Alphabet investment arms —
        alongside HongShan Capital, Passion Capital, and Tencent.
      type: third-party-reported
      topic: funding
      sourceRefs:
        - S105
        - S120
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ110
    - id: C115
      statement: >-
        In May 2024, Monzo raised a $190M extension to the Series I at $5.2B post-money valuation; new investors
        included Hedosophia (previously a Wise backer); CapitalG also participated. Total 2024 primary: $610M — the
        largest European fintech round of 2024 by Dealroom data.
      type: third-party-reported
      topic: funding
      sourceRefs:
        - S106
        - S105
      confidence: high
      freshness: recent
    - id: C116
      statement: >-
        In October 2024, Monzo completed a secondary market employee share sale establishing a $5.9B (£4.5B) valuation.
        Purchasers included GIC (Singapore sovereign wealth fund) and StepStone Group. This is the current benchmark
        valuation for Monzo as of the report date.
      type: third-party-reported
      topic: valuation
      sourceRefs:
        - S101
        - S102
        - S114
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ111
    - id: C117
      statement: >-
        Monzo's FY2025 (ended 31 March 2025) revenue was £1,235.4M — a 48% increase year-on-year, crossing the £1B
        milestone for the first time. Revenue grew from £880M in FY2024 (which itself doubled from £355.6M in FY2023).
      type: third-party-reported
      topic: financial-performance
      sourceRefs:
