  claims:
    - id: C101
      statement: >-
        Monzo Bank Limited was founded on 18 February 2015, originally incorporated as Focus FS Limited, and rebranded
        to Monzo in 2016 after a trademark challenge on the initial name 'Mondo'.
      type: third-party-reported
      topic: founding
      sourceRefs:
        - S107
        - S131
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - RQ101
    - id: C102
      statement: >-
        Monzo holds a full UK banking licence granted by the PRA and FCA in April 2017, enabling deposit-taking with
        FSCS protection. Headquarters are in London, England.
      type: third-party-reported
      topic: regulatory-status
      sourceRefs:
        - S107
        - S126
      confidence: high
      freshness: historical
    - id: C103
      statement: >-
        Monzo's core product is a fully-regulated UK current account accessible via mobile app, accompanied by a
        distinctive coral debit card; it launched a current account (replacing the original prepaid card) in October
        2017.
      type: third-party-reported
      topic: product
      sourceRefs:
        - S107
        - S115
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - RQ102
    - id: C104
      statement: >-
        Monzo's product suite has expanded to include paid subscription tiers (Plus, Premium, Extra, Perks, Max), Monzo
        Flex (BNPL credit), instant access savings, investments (BlackRock funds), pension savings (launched 2025),
        contents insurance, and Monzo Business for SMEs.
      type: third-party-reported
      topic: products
      sourceRefs:
        - S107
        - S108
        - S115
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ103
    - id: C105
      statement: >-
        Monzo Business serves approximately 625,000 SME customers as of FY2025, growing 49% year-on-year. The business
        banking segment accounts for approximately 12% of Monzo's total revenue and includes Monzo Team for larger
        companies.
      type: third-party-reported
      topic: business-banking
      sourceRefs:
        - S108
        - S128
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ104
    - id: C106
      statement: >-
        Monzo's primary revenue drivers are lending interest income (personal loans, overdrafts, Flex BNPL) and deposit
        float, together estimated to represent approximately 55–60% of FY2025 revenue, supplemented by transaction fees,
        subscriptions (£75.2M in FY2025), and business banking.
      type: estimated
      topic: business-model
      sourceRefs:
        - S104
        - S108
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ105
    - id: C107
      statement: >-
        Monzo's base current account carries no monthly fee; the company monetises through interest on lending,
        subscription upgrades, and business products rather than charging for basic banking access — a deliberate
        customer acquisition strategy.
      type: third-party-reported
      topic: pricing-model
      sourceRefs:
        - S107
        - S104
      confidence: high
      freshness: current
    - id: C108
      statement: >-
        Monzo was co-founded by five individuals: Tom Blomfield (original CEO), Jonas Huckestein, Jason Bates, Paul
        Rippon, and Gary Dolman; all five had previously worked together at Starling Bank before leaving to start Monzo.
      type: third-party-reported
      topic: founders
      sourceRefs:
        - S107
        - S131
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - RQ106
    - id: C109
      statement: >-
        All five of Monzo's original co-founders have departed as active executives: Tom Blomfield formally stepped down
        as director in January 2021; Jason Bates departed 2017; Paul Rippon (Deputy CEO) and Jonas Huckestein departed
        circa 2019–2020; Gary Dolman (CFO) departed 2019.
      type: third-party-reported
      topic: founders-departures
      sourceRefs:
        - S107
        - S116
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - RQ107
    - id: C110
      statement: >-
        TS Anil joined Monzo as CEO in May 2020; he previously served as EVP and Group Executive for Consumer Products &
        Solutions at Visa, bringing institutional payments and product scaling expertise.
      type: third-party-reported
      topic: leadership
      sourceRefs:
        - S104
        - S105
      confidence: high
      freshness: historical
      answersQuestionRefs:
        - RQ108
    - id: C111
      statement: >-
        Gary Hoffman has served as Non-Executive Chairman of Monzo since October 2020; he is a veteran UK regulated
        banking executive, having previously served as CEO of Northern Rock and Bradford & Bingley.
      type: third-party-reported
      topic: governance
      sourceRefs:
        - S107
        - S131
      confidence: high
      freshness: historical
    - id: C112
      statement: >-
        Monzo's board includes institutional investor representatives from major funding-round participants (including
        CapitalG and Passion Capital) plus independent non-executive directors. The precise board composition by seat is
        not fully publicly disclosed.
      type: third-party-reported
      topic: governance
      sourceRefs:
        - S107
