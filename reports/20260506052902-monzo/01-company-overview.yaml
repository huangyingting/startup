  title: Company Overview
sections:
  - id: S01
    title: Identity, Product, and Business Model
    body: >
      Monzo Bank Limited is a UK-regulated digital bank incorporated on 18 February 2015 under the name Focus FS Limited
      before rebranding to Monzo in 2016. Headquartered in London, UK, Monzo holds a full UK banking licence from the
      Prudential Regulation Authority (PRA) and Financial Conduct Authority (FCA), first granted in April 2017.
      [C001][C002]

      Monzo's core product is a fully-regulated UK current account, accessible via a mobile app, with a distinctive
      coral debit card. The bank has expanded into a full personal finance super-app covering paid subscription tiers
      (Plus, Premium, Extra, Perks, Max), flexible credit (Monzo Flex BNPL), savings (instant access and fixed),
      investments (BlackRock funds), pension savings, and content insurance. Monzo Business serves SMEs with business
      current accounts and Monzo Team for larger companies. [C003][C004][C005]

      The business model is interest-income-led: lending (personal loans, BNPL, overdrafts) and deposit float are the
      primary revenue drivers (~55–60% of FY2025 revenue), supplemented by transaction fees, subscription income (£75.2M
      in FY2025), and business banking. Monzo does not charge monthly fees for the base current account, monetising
      through value-added services and credit products. [C006][C007]
  - id: S02
    title: Leadership, Governance, and Founders
    body: >
      Monzo was co-founded in February 2015 by five individuals who had previously worked together at Starling Bank: Tom
      Blomfield (original CEO, departed January 2021), Jonas Huckestein, Jason Bates, Paul Rippon, and Gary Dolman. All
      founders were instrumental in securing the banking licence and the early product build. The founding team's
      collective Starling Bank background accelerated the technical build and regulatory application — Monzo obtained
      its banking licence just two years after incorporation. [C008][C009][C031]

      TS Anil became CEO in May 2020, joining from Visa where he was the EVP and Group Executive for Consumer Products &
      Solutions. Anil has led Monzo from its pre-profit phase through to its first full-year profitability in FY2024 and
      the current growth trajectory. Gary Hoffman serves as Non-Executive Chairman since October 2020; Hoffman is a
      veteran UK banking executive (previously CEO of Northern Rock and Bradford & Bingley). With all five original
      co-founders now departed as executives, the company's strategic direction is concentrated in TS Anil as sole
      permanent CEO, representing a key-person governance consideration for the pre-IPO period. [C010][C011]

      Monzo's board includes representation from major institutional investors (CapitalG, Y Combinator, Passion Capital,
      Accel) and independent non-executives. Tom Blomfield departed as a formal company director in early 2021 but
      remains a shareholder. The bank has a diverse C-suite including a Chief Risk Officer, Chief Operating Officer, and
      Chief Financial Officer. The company has not publicly identified a named CFO as of mid-2025, which represents a
      minor governance disclosure gap. [C012][C013]
  - id: S03
    title: Funding History, Valuation, and Scale Metrics
    body: >
      Monzo has raised approximately $1.9B in primary capital across multiple rounds since 2015. Key rounds include:
      crowdfunding via Crowdcube (2016, £1M+), Series A (Y Combinator 2016), Series B (Passion Capital, 2017), Series C
      (Accel, 2018, £85M at ~£650M valuation), Series D (Y Combinator, Stripe, General Catalyst, £113M, 2019), Series E
      (Y Combinator 2020, £60M), Series F (Coatue, £425M, $4.5B valuation, 2021), Series G (undisclosed, 2022), and
      Series I ($430M at $5B valuation, March 2024 + $190M extension at $5.2B, May 2024). A secondary employee share
      sale in October 2024 established the current $5.9B benchmark valuation. [C014][C015][C016]

      FY2025 (ended March 31, 2025) metrics: £1,235.4M revenue (+48% YoY), £60.5M operating profit / £113.9M adjusted
      pre-tax profit, £94.6M net income, 12.2M customers (+25% YoY), £16.6B deposits, £55.2B card spend. FY2024 metrics:
      £880M revenue, £15.4M pre-tax profit, 9.3M customers. Headcount approximately 3,700 (FY2024).
      [C017][C018][C019][C020]

      Monzo has approximately 12.2 million personal banking customers (as of March 2025) and 625,000 business customers
      (+49% YoY). Over 20% of UK adults are Monzo customers. One-third use Monzo as their primary bank. Net Promoter
      Score of +70, well above the UK banking average of ~30. The company targets an IPO within 2–3 years, with Morgan
      Stanley reportedly engaged. [C021][C022][C023]
