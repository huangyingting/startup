callouts:
  - title: Neobank penetration doubled from 25% to 50% of UK adults in 4 years
    body: >
      RFI Global data shows neobank product penetration reached 50% of UK adults in 2024, up from 25% in 2020. This
      rapid penetration supports Monzo's continued organic growth trajectory, though it also signals the market is
      maturing and pure-volume growth will slow relative to ARPU expansion as the next phase.
    claimRefs:
      - C038
      - C039
      - C051
    calloutType: insight
  - title: Bank Rate decline is the primary near-term headwind to Monzo's revenue model
    body: >
      Monzo's FY2025 revenue surge was partly driven by higher net interest margin on £16.6B of deposits at elevated
      Bank Rate. With the Bank of England expected to cut rates toward 3.5–4% through 2025–2026, NIM compression is the
      key near-term risk to Monzo's revenue growth rate. Lending book expansion is the primary offset.
    claimRefs:
      - C052
      - C053
      - C054
    calloutType: risk
