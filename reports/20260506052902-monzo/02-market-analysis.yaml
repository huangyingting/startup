  claims:
    - id: C201
      statement: >-
        The UK retail banking market generated approximately $80–91B (£65–75B) in annual revenue in 2024, including
        interest income from lending and deposits, transaction fees, and financial services income.
      type: estimated
      topic: market-size
      sourceRefs:
        - S205
        - S217
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ201
    - id: C202
      statement: >-
        UK retail banking covers personal current accounts, savings, unsecured consumer credit (loans, overdrafts,
        BNPL), payments infrastructure, and SME banking. Monzo competes across all five sub-markets but has deepest
        penetration in current accounts.
      type: third-party-reported
      topic: market-boundary
      sourceRefs:
        - S205
        - S217
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ202
    - id: C203
      statement: >-
        Neobank product penetration among UK adults grew from 16% in 2018 to 50% in 2024, according to RFI Global survey
        of 4,000 UK consumers. The Big Six banks' share of primary current accounts fell from 85% to 71% over the same
        period.
      type: third-party-reported
      topic: market-share
      sourceRefs:
        - S201
        - S218
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ203
    - id: C204
      statement: >-
        The percentage of UK adults holding their main debit card with a neobank grew from 1% in 2020 to 9% in 2024;
        this 'primary account' penetration is a key battleground between neobanks and incumbent banks.
      type: third-party-reported
      topic: primary-account
      sourceRefs:
        - S202
        - S218
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ204
    - id: C205
      statement: >-
        The UK neobanking market was valued at approximately $6.44B in 2024 and is projected to grow at a significant
        CAGR toward $182B by 2033, though this projection includes payment volumes and deposits, not just pure revenue.
      type: estimated
      topic: neobank-TAM
      sourceRefs:
        - S222
        - S205
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ205
    - id: C206
      statement: >-
        UK neobanks collectively surpassed traditional banks in Android app downloads for the first time in 2024, with
        71.78M neobank downloads vs 71.58M for legacy banks — adding 18.6M users against legacy banks' 7.5M.
      type: third-party-reported
      topic: market-dynamics
      sourceRefs:
        - S203
        - S209
      confidence: medium
      freshness: current
    - id: C207
      statement: >-
        Using a top-down sizing lens, Monzo's SAM is approximately £6.5–11B in UK banking revenue annually within a
        5-year horizon, assuming neobanks capture 10–15% of the UK banking revenue pool. Monzo's SOM of £1.4–2.5B is
        premised on it holding 20–25% of the neobank SAM.
      type: estimated
      topic: TAM-SAM-SOM
      sourceRefs:
        - S205
        - S217
      confidence: low
      freshness: current
      answersQuestionRefs:
        - RQ206
    - id: C208
      statement: >-
        An ARPU lens for sizing: approximately 80M UK bank accounts, at ~£100 average annual revenue per account, yields
        an £8B current account fee pool. Monzo's 12.2M accounts at current ARPU of ~£100 is consistent with its £1.2B
        FY2025 revenue.
      type: estimated
      topic: ARPU-sizing
      sourceRefs:
        - S205
        - S220
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ207
    - id: C209
      statement: >-
        Monzo would need to either grow to 20–25M customers at current ARPU or expand ARPU to £160–250 per user annually
        (from ~£100 today) to reach £2–3B in revenue — implying multi-product cross-sell is the critical revenue growth
        lever.
      type: inferred
      topic: SOM-expansion-path
      sourceRefs:
        - S220
        - S221
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ208
    - id: C210
      statement: >-
        Monzo's deposit base of £16.6B at average rate of ~3% gross yield equates to approximately £500M in deposit
        interest income, representing roughly 40–45% of FY2025 revenue — making deposit growth a key revenue driver.
      type: estimated
      topic: deposit-sizing
      sourceRefs:
        - S211
        - S220
      confidence: medium
      freshness: current
    - id: C211
      statement: >-
        UK consumer credit (personal loans, overdrafts, BNPL) has approximately £200B in outstanding balances and
        generates ~£15B in annual interest and fees at ~7.5% blended yield. Monzo's lending book growing 84% in FY2024
        positions it to capture more of this pool.
      type: estimated
      topic: consumer-credit-SAM
      sourceRefs:
        - S210
        - S223
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ209
    - id: C212
      statement: >-
        UK SME banking generates approximately £4B in annual revenue across ~5M active SMEs. Monzo Business with 625,000
        customers has approximately 12% penetration by account count but much lower revenue penetration, indicating
        material upside.
      type: estimated
      topic: SME-banking-SAM
      sourceRefs:
        - S217
        - S221
      confidence: medium
      freshness: current
    - id: C213
      statement: >-
        Monzo's customer demographic skews young: 36% are aged 25–34, and 51% are under 35 years old. The over-65 age
        group represents just 4% of Monzo's base, indicating limited penetration of the wealthier older demographic.
      type: third-party-reported
      topic: buyer-demographics
      sourceRefs:
        - S212
        - S220
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ210
    - id: C214
      statement: >-
        Monzo's primary-account conversion rate of 1-in-3 customers (33%) is above the UK neobank average and represents
        a key metric for banking deepening — mortgage, salary, and direct debit migration. Monzo targets increasing this
        ratio further through pensions and savings products.
      type: third-party-reported
      topic: primary-account-conversion
      sourceRefs:
        - S225
        - S220
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ211
    - id: C215
      statement: >-
        UK Bank Rate remained above 4.5% through most of FY2025, significantly boosting Monzo's net interest margin on
        its £16.6B deposit base and growing lending book — a primary driver of the FY2025 revenue surge to £1.2B.
      type: third-party-reported
      topic: interest-rate-driver
      sourceRefs:
        - S215
        - S220
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ212
    - id: C216
      statement: >-
        FCA open banking mandates and the Account Switching Service (CASS) reduced UK current account switching
        friction; CASS-facilitated switches reached approximately 1.1M annually in 2024, benefiting neobanks that offer
        superior digital onboarding.
      type: third-party-reported
      topic: switching-drivers
      sourceRefs:
        - S213
        - S202
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ213
    - id: C217
      statement: >-
        Bank Rate is expected to decline from ~5.25% peak (August 2023) toward 3.5–4.0% by end of 2026 per Bank of
        England forward guidance. This trajectory would compress Monzo's net interest margin on deposits, partially
        offset by lending book growth and higher loan yields.
      type: third-party-reported
      topic: interest-rate-constraint
      sourceRefs:
        - S215
        - S206
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ214
    - id: C218
      statement: >-
        The FCA published a consultation on BNPL regulation in February 2024 (CP24/2), proposing to bring BNPL lenders
        including Monzo Flex under full FCA consumer credit authorisation. If enacted, this could tighten Flex
        eligibility criteria and reduce volume short-term.
      type: third-party-reported
      topic: BNPL-regulation-risk
      sourceRefs:
        - S214
        - S213
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ215
    - id: C219
      statement: >-
        Monzo's revenue is approximately 99% UK-sourced as of FY2025; the US and EU (Ireland) operations are pre-revenue
        or minimal-revenue. This geographic concentration means a material UK-specific event (recession, regulatory
        action) would disproportionately impact the company.
      type: inferred
      topic: geographic-concentration
      sourceRefs:
        - S219
        - S220
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ216
    - id: C220
      statement: >-
        FCA Consumer Duty Act (July 2023) mandates banks to deliver good outcomes for retail customers, prioritising
        transparency, fair value, and support. This regulatory tailwind benefits Monzo's no-fee, transparent model
        relative to traditional banks with complex fee structures.
      type: third-party-reported
      topic: regulatory-tailwind
      sourceRefs:
        - S213
        - S202
      confidence: high
      freshness: current
    - id: C221
      statement: >-
        Starling Bank's FCA fine of £29M in 2024 for financial crime control failings demonstrates the regulatory risk
        inherent in rapid neobank growth — Starling opened 54,000 accounts for 49,000 high-risk customers without
        adequate AML compliance.
      type: third-party-reported
      topic: peer-regulatory-risk
      sourceRefs:
        - S204
        - S202
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ217
    - id: C222
      statement: >-
        Neobank users spend approximately 20% more on debit cards than customers of traditional high-street banks,
        reflecting higher engagement, more active use of mobile banking, and greater product utilisation among neobank
        customers.
      type: third-party-reported
      topic: buyer-engagement
      sourceRefs:
        - S202
        - S218
      confidence: medium
      freshness: current
    - id: C223
      statement: >-
        UK retail savings deposits totalled approximately £1.5T as of 2024, generating approximately £30B in annual
        interest income at ~2% blended average rate. Monzo's instant access savings product paid out £250M in interest
        to 2.3M users in FY2025.
      type: estimated
      topic: savings-SAM
      sourceRefs:
        - S211
        - S221
      confidence: medium
      freshness: current
    - id: C224
      statement: >-
        Market concentration risk: the UK neobank market has three major players — Revolut (50M+ global customers),
        Monzo (12.2M UK), and Starling (4.6M UK) — with significant market gap between the top two and the rest,
        reinforcing Monzo's position as the UK-focused leader.
      type: third-party-reported
      topic: competitive-concentration
      sourceRefs:
        - S204
        - S209
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ218
    - id: C225
      statement: >-
        The adverse scenario for UK neobank market sizing: if BNPL regulation tightens significantly and Bank Rate falls
        to 3% or below, Monzo's two largest revenue growth catalysts (Flex lending + deposit NIM) could decline
        simultaneously, putting the 48% revenue CAGR at risk.
