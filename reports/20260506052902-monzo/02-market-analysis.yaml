      topic: adverse-market-scenario
      sourceRefs:
        - S214
        - S215
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ219
    - id: C226
      statement: >-
        Big Six UK banks lost approximately £100B in deposits to neobanks, specialist lenders, and building societies
        between 2019 and 2024, as consumers chased higher savings rates — the first sustained deposit outflow since the
        2008 financial crisis.
      type: third-party-reported
      topic: deposit-shift
      sourceRefs:
        - S217
        - S206
      confidence: medium
      freshness: current
    - id: C227
      statement: >-
        The UK government's open banking initiative has over 7M active users as of 2024, reflecting growing consumer
        comfort with data sharing and multi-bank account aggregation — a structural enabler of Monzo's multi-product
