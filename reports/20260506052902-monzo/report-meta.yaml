  headquarters: "London, United Kingdom"
  productSummary: "Monzo offers a full-stack digital banking platform: current accounts with instant notifications and card controls; Monzo Plus and Premium subscription tiers; Monzo Flex (BNPL up to £3,000); Monzo Savings (Easy Access ISA, Fixed Term ISA); Monzo Investments (stocks and shares ISA via BlackRock); Monzo Pension; Monzo Business (current accounts, invoicing, expense management); and international money transfers via Wise partnership."
  customerFocus: "UK adults aged 18–45 as primary segment; expanding into UK SMEs (625K business customers) and US consumers (Sutton Bank partnership)"
  businessModel: "Net interest margin on deposits (primary); subscription revenue (Plus £5/mo, Premium £15/mo); interchange on card spend; BNPL (Flex) loan interest; FX fees; business banking fees"
  stage: "late-stage / pre-IPO"
