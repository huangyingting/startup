      statement: >-
        Monzo's FY2025 revenue was £1,235.4M, up 40% YoY. Revenue per customer (12.2M personal) was approximately £101,
        compared to approximately £198 for Revolut (FY2023 global). Starling achieved approximately £175 per account in
