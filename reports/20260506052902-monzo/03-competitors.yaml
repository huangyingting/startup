      - - BNPL regulation (FCA CP24/2) constraining Flex growth
        - Risk
        - '3'
        - '4'
        - 'If enacted: higher compliance cost, possible Flex volume decline'
    notes: >-
      Moat strength and durability rated 1–5 by analyst assessment. Risk items use strength = severity, durability =
      persistence.
