  claims:
    - id: CP001
      statement: >-
        Revolut achieved a valuation of approximately $45B in a 2024 secondary share sale and later reached $75B in a
        2024 employee secondary; it reported £2.2B revenue (FY2023) and over 50 million global customers. Revenue growth
        was 95% YoY.
      type: third-party-reported
      topic: Revolut-profile
      sourceRefs:
        - SP001
        - SP022
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QP001
      contradictsClaimRefs: []
    - id: CP002
      statement: >-
        Starling Bank reported £714M revenue in FY2024 (year ending March 2024) and £223M pre-tax profit, down from
        £301M in FY2023 — reflecting higher operating costs. It had approximately 3.6M personal and 500K business
        accounts.
      type: third-party-reported
      topic: Starling-profile
      sourceRefs:
        - SP004
        - SP003
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QP002
      contradictsClaimRefs: []
    - id: CP003
      statement: >-
        Chase UK, launched in 2021 by JPMorgan, had approximately 1.6 million customers by mid-2024. Its flagship offer
        is 1% cashback on everyday debit card spending and a 3.5% instant saver account rate.
      type: third-party-reported
      topic: Chase-UK-profile
      sourceRefs:
        - SP005
        - SP006
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QP003
      contradictsClaimRefs: []
    - id: CP004
      statement: >-
        Wise PLC (London-listed) reported £1.04B revenue for FY2024 (ending March 2024), serving 12.8 million active
        customers globally. Its UK market cap as of late 2024 was approximately £8–9B.
      type: third-party-reported
      topic: Wise-profile
      sourceRefs:
        - SP007
        - SP010
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QP004
      contradictsClaimRefs: []
    - id: CP005
      statement: >-
        N26, the German neobank, has a valuation of approximately $9B (last funding round 2021) but did not raise
        materially in 2024 and is no longer available to new UK customers post-Brexit, limiting its UK competitive
        relevance.
      type: third-party-reported
      topic: N26-profile
      sourceRefs:
        - SP008
        - SP023
      confidence: medium
      freshness: historical
      answersQuestionRefs:
        - QP005
      contradictsClaimRefs: []
    - id: CP006
      statement: >-
        Revolut received its UK banking licence from the FCA and PRA in March 2026, making it fully authorised as a UK
        bank with FSCS deposit protection. This removes a longstanding regulatory disadvantage and increases competitive
        pressure on Monzo.
      type: third-party-reported
      topic: Revolut-banking-licence
      sourceRefs:
        - SP018
        - SP001
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP014
      contradictsClaimRefs: []
