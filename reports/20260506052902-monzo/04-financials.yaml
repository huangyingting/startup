  claims:
    - id: C401
      statement: >-
        Monzo Bank Limited reported total revenue of £1,235.4M for FY2025 (year ending March 2025), representing 40%
        growth from £880M in FY2024 and 78% growth from £697M in FY2023.
      type: third-party-reported
      topic: total-revenue
      sourceRefs:
        - S401
        - S403
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ401
        - RQ410
    - id: C402
      statement: >-
        Monzo's operating profit was £60.5M in FY2025, up from £15.4M PBT in FY2024 (first full-year profit). Adjusted
        pre-tax profit was £113.9M. Net income was £94.6M in FY2025.
      type: third-party-reported
      topic: operating-profit
      sourceRefs:
        - S401
        - S404
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ402
    - id: C403
      statement: >-
        Net interest income constituted approximately 65–70% of Monzo's FY2025 revenue (estimated £800–865M), driven by
        customer deposits of £16.6B deployed into UK government securities, lending products, and interbank markets at
        elevated BoE base rates.
      type: estimated
      topic: revenue-mix-NII
      sourceRefs:
        - S405
        - S421
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ403
        - RQ417
    - id: C404
      statement: >-
        Subscription revenue (Plus, Premium, Perks, Extra, Max tiers) contributed an estimated £80–120M to FY2025
        revenue. Monzo had approximately 1.5–2M paying subscribers based on public statements about 'millions of premium
        customers'.
      type: estimated
      topic: subscription-revenue
      sourceRefs:
        - S408
        - S406
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ404
        - RQ403
    - id: C405
      statement: >-
        Interchange income from card spending (annual card spend £55.2B in FY2025) contributed an estimated £100–150M to
        FY2025 revenue, at typical UK consumer interchange rates of 0.2–0.3%.
      type: estimated
      topic: interchange-revenue
      sourceRefs:
        - S416
        - S406
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ403
        - RQ419
    - id: C406
      statement: >-
        Monzo Flex BNPL interest income and fees contributed an estimated £100–150M in FY2025. Monzo does not separately
        disclose Flex revenue, but the product has an active credit book with an estimated balance of £500M–1B.
      type: estimated
      topic: BNPL-Flex-revenue
      sourceRefs:
        - S409
        - S415
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ419
        - RQ403
    - id: C407
      statement: >-
        Business banking (Monzo Business + Team) served 625K business customers in FY2025 (+49% YoY). Business account
        fees and interchange represent an estimated £60–90M of FY2025 revenue, with higher ARPU than personal accounts
        due to team plan fees.
      type: estimated
      topic: business-banking-revenue
      sourceRefs:
        - S425
        - S401
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ416
    - id: C408
      statement: >-
        Monzo's revenue per personal customer (ARPU) in FY2025 was approximately £101 (£1,235M / 12.2M customers). This
        is below Starling's (~£175/account) and Revolut's estimated £170/customer, reflecting Monzo's higher proportion
        of lower-revenue free-tier users.
      type: estimated
      topic: ARPU
      sourceRefs:
        - S406
        - S412
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ405
    - id: C409
      statement: >-
        Monzo's estimated net interest margin (NIM) was approximately 3.0–3.5% in FY2025, deployed primarily into UK
        gilts and retail lending. The BoE base rate (5.25% peak in 2023-2024, falling to ~4.5–4.75% by end of 2025)
        directly drives NIM as ~80% of Monzo's assets are floating rate.
      type: estimated
      topic: NIM
      sourceRefs:
        - S405
        - S410
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ411
    - id: C410
      statement: >-
        The Bank of England cut its base rate from 5.25% to 4.75% in late 2024 and was expected to cut further to
        ~4.0–4.25% by end of 2025. Each 25bp cut reduces Monzo's net interest income by an estimated £30–40M annually,
        given its £16.6B deposit base.
      type: estimated
      topic: interest-rate-risk
      sourceRefs:
        - S410
        - S417
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ414
