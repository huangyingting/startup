  claims:
    - id: C601
      statement: >-
        Monzo had 12.2M personal customers and 625K business customers in FY2025 (year ending March 2025), representing
        YoY growth of 25% (personal) and 49% (business). Total customer count reached approximately 12.85M.
      type: third-party-reported
      topic: customer-count
      sourceRefs:
        - S601
        - S602
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ601
        - RQ604
    - id: C602
      statement: >-
        Monzo has reached approximately 22% penetration of UK adults (12.2M / ~57M UK adults). This makes Monzo the most
        widely adopted digital bank in the UK by population coverage. However, primary current account users are
        estimated at 8–10% of UK adults.
      type: third-party-reported
      topic: UK-penetration
      sourceRefs:
        - S621
        - S601
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ602
        - RQ612
    - id: C603
      statement: >-
        Monzo's personal customer growth from FY2022 to FY2025: 5.4M (FY2022) → 7.4M (FY2023) → 9.3M (FY2024) → 12.2M
        (FY2025). This represents consistent 25–30% annual compound growth across 3 years, with growth accelerating in
        FY2025.
      type: third-party-reported
      topic: customer-growth-trajectory
      sourceRefs:
        - S601
        - S622
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ603
    - id: C604
      statement: >-
        Monzo's business customer base grew from 420K (FY2024) to 625K (FY2025), a 49% growth rate — significantly
        outpacing personal customer growth. Business customers generate higher ARPU due to subscription fees, bulk
        payment volumes, and team plan upsell.
      type: third-party-reported
      topic: business-customer-growth
      sourceRefs:
        - S618
        - S601
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ604
    - id: C605
      statement: >-
        Monzo's customer demographic skews young: 51% of Monzo personal customers are under 35, with 36% in the 25–34
        age bracket. The 18–24 cohort represents approximately 20% of users. Over-65s account for just 4% of Monzo's
        user base, indicating penetration is concentrated in younger demographics.
      type: third-party-reported
      topic: age-demographics
      sourceRefs:
        - S606
        - S615
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ613
    - id: C606
      statement: >-
        Monzo's NPS was +70 in FY2025 (disclosed). This is significantly above the industry average for UK retail
        banking (approximately +20 to +40 for digital banks, and -10 to +15 for traditional high-street banks). NPS has
        been consistently above +60 since FY2022.
      type: third-party-reported
      topic: NPS
      sourceRefs:
        - S603
        - S604
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ606
    - id: C607
      statement: >-
        Monzo's annual card spend per personal customer in FY2025 was approximately £4,525 (£55.2B / 12.2M customers).
        This is a meaningful increase from £3,645 in FY2024, suggesting customers are spending more with Monzo as a
        primary account — a strong leading indicator of primary bank adoption.
      type: estimated
      topic: card-spend-per-customer
      sourceRefs:
        - S611
        - S601
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ614
    - id: C608
      statement: >-
        Monzo does not disclose customer churn rate. Industry analysts estimate annual gross churn for Monzo at 5–10% —
        below the UK banking industry average of 8–12% due to high NPS and product switching costs. Net customer growth
        of 25% YoY despite churn confirms strong gross acquisition.
      type: estimated
      topic: churn-rate
      sourceRefs:
        - S605
        - S619
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ607
    - id: C609
      statement: >-
        Monzo's primary account usage rate (customers using Monzo as their main bank) is estimated at 30–40% of its
        12.2M base, or approximately 3.7–4.9M primary customers. This estimate is derived from salary direct deposit
        data and card spend patterns, not directly disclosed by Monzo.
      type: estimated
      topic: primary-account-rate
      sourceRefs:
        - S620
        - S605
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ608
    - id: C610
      statement: >-
        Monzo's conversion from free to paid tiers is estimated at 15–20% of active users. With 12.2M personal
        customers, this implies approximately 1.8–2.4M paying subscribers across all premium tiers. Conversion rates
        have grown consistently as product breadth increased.
      type: estimated
      topic: premium-conversion-rate
      sourceRefs:
        - S613
        - S601
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ610
    - id: C611
