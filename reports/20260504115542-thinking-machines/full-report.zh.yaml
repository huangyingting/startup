      - number: '1.3'
        title: 资本基础、估值与投资人版图
        blocks:
          - type: paragraph
            body: |
              Thinking Machines Lab 于 July 15, 2025 完成 $2 billion seed 轮融资。按 Crunchbase News 的说法，
              这在当时是 Silicon Valley 历史上最大的一笔 seed round。投后估值为 $12 billion，TechCrunch 引述公司发言人直接确认。
              Bloomberg 在 June 2025 曾报道该轮接近收官时估值约为 $10 billion，最终成交价更高。Andreessen Horowitz（a16z）领投。
              共同投资方包括 Nvidia、Accel、ServiceNow、Cisco、AMD 与 Jane Street，既有战略型科技伙伴，也有多元化财务投资人。
              其中 Nvidia 的参与尤为关键，因为公司随后在 March 2026 又与其签下 gigawatt 级算力合作。

              到 November 2025，Bloomberg 又报道称 Thinking Machines 正在洽谈一轮约 $5 billion 融资，对应约 $50 billion 估值，
              即不到 5 个月估值再跳升 4 倍。截至本次运行日期，这一轮尚未确认完成。公开信息里也没有 secondary transaction 或 debt facility 的披露。

              公司还在 March 2026 的战略合作公告中披露，Nvidia 对其进行了另一笔重要股权投资，但具体金额未公开。这看起来与 Nvidia 在 seed 轮中的出资是两笔独立承诺。
              因此，截至本次运行日期，唯一明确披露的累计融资额仍是 $2 billion（seed 轮），另加可能来自 Nvidia 的未披露战略投资。

              据报道，Meta 曾在 2025 尝试收购 Thinking Machines Lab。Murati 拒绝了这一接触；TechCrunch 称谈判从未推进到最终报价。
              此后 Mark Zuckerberg 转而推进针对个人员工的招募，包括向 Andrew Tulloch 提出一份 6 年内最高可达 $1.5 billion 的薪酬包。
