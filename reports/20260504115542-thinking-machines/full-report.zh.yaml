            title: TML 的模型规模优势，窗口期并不长
            body: >
              Tinker 当前最清晰的差异点，是能够托管微调竞争对手尚未支持的 235B+ MoE 模型。但这个窗口大概率只有 12-24 个月：Google Vertex AI、AWS SageMaker 与
              Together AI 都在扩展大模型支持。一旦这些能力补齐，TML 的技术护城河就会收窄到 API 设计与开源生态，而这两点又都面临 Hugging Face 等免费软件的强力竞争。
