            body: >
              TML 尚未公布 SOC 2、ISO 27001、HIPAA 或 FedRAMP 认证。医疗、金融和政府行业的企业采购都要求这些认证。竞争对手（OpenAI、Azure ML、Vertex
              AI）已有完整合规栈。只要认证没拿到，TML 的企业化野心就会被这个缺口卡住；按惯例，仅 SOC 2 Type II 也通常要在产品上线后约 18 个月才能完成。
