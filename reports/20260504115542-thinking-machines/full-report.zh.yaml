      - number: '5.3'
        title: 支持模型与覆盖范围
        blocks:
          - type: paragraph
            body: >
              Tinker 在 2025 年 10 月上线时支持六个 frontier LLM，覆盖 proprietary-openweight
              模型和完全开放模型。支持列表包括：Qwen-235B-A22B（Alibaba；该阵容中最大模型，采用 mixture-of-experts 架构，总参数 235 billion、激活参数 22
              billion）、Meta Llama（含 3.1 和 3.3 版本）、Alibaba Qwen（2.5 系列）、OpenAI gpt-oss（open-weight release）、DeepSeek
              V3.1（MoE 架构），以及 Moonshot AI Kimi K2（MoE）。


              纳入 Qwen-235B-A22B 和 DeepSeek V3.1 很关键：两者都是 mixture-of-experts 模型，做 LoRA 微调时需要特殊处理，因为梯度更新过程中必须正确管理 expert
              routing tables。多数托管微调平台并不支持这一规模的 MoE 模型。TML 能支持这些模型，确实构成了其面对前沿 open-weight 模型研究团队时的技术差异化。


              OpenAI gpt-oss 是一个 open-weight release，这让 TML 能提供基于 OpenAI 设计模型架构的微调服务。对部署 OpenAI
              邻近工作流的组织来说，这可能带来下游兼容性优势。与此同时，纳入部署最广的 open-weight 模型家族 Meta Llama，也让 TML 对研究和企业微调市场的覆盖更完整。


              模型覆盖并非静态。TML 已表态会继续扩充支持列表，但尚未公布 roadmap。随着 open-weight 生态中新模型持续涌现（Mistral、Cohere、Stability 等），TML
              必须不断为新架构完成 Tinker 适配，而这背后需要不轻的 kernel 层改造工作。
            claimRefs:
              - CE009
              - CE001
              - CE010
              - CE011
              - CE012
              - CE013
      - number: '5.4'
        title: 差异化、IP 与研究产出
        blocks:
          - type: paragraph
            body: >
              TML 的核心差异化，在于把可组合、研究级的原语（forward_backward、sample）和托管基础设施绑在一起卖。当前没有其他商业微调平台同时提供这两样：Together AI、Predibase
              这类平台提供的是高层 fine-tuning API，但不给直接梯度访问；self-hosted 方案（PyTorch FSDP、DeepSpeed）虽然控制力拉满，但基础设施管理负担很重。Tinker
              瞄准的就是这两端之间的空档。


              TML 已发表三篇研究论文，对应支撑平台的具体能力：（1）Batch Invariance via GPU Kernel Redesign，给 TML 自研 CUDA/TileLang kernels
              提供理论和实证基础；（2）Modular Manifolds for Neural Network Optimization，为 TML 的 LoRA adapter 优化方法提供数学基础，聚焦高维 LoRA
              manifolds 上的收敛性质；（3）On-Policy Distillation，解释 TML 如何用模型生成数据做自我提升，也是 sample 原语支持 RLHF/GRPO 应用的理论来源。


              知识产权层面，TML 的资产包括：Tinker API 设计与 SDK（商业秘密）、TileLang kernel 实现（大概率已申请专利或处于 patent-pending）、托管 LoRA
              shared-pool 编排基础设施（商业秘密），以及 Tinker Cookbook 训练示例（开源，Apache 2.0）。具备独特技术 IP 的关键人员包括 John Schulman（PPO 和核心
              RLHF 算法创建者）、Soumith Chintala（PyTorch 创建者），以及 Mira Murati（曾在 OpenAI 负责 GPT-4、DALL-E、Codex 和 Whisper）。


              Tinker Cookbook 的开源策略，本质上是开发者工具公司的标准打法：把示例和文档开源，能拉动社区、降低采用门槛，同时靠生态熟悉度形成技术护城河，而不必把核心平台代码或 kernel 实现交出去。
            claimRefs:
