      - number: '7.5'
        title: 缓释因素与击穿触发点
        blocks:
          - type: paragraph
            body: >
              TML 当前的缓释手段还很早期，更多是结构性的，比如投资人关系、创始人声誉和算力合作，而不是运营性的，比如公开安全控制、合规认证或留存指标。最强的几项缓释因素包括：（1）Mira Murati
              的个人公信力，有助于撬动关键企业对话；（2）cap table 广度较大，Nvidia、Cisco、ServiceNow 同时提供基础设施和分发上的对冲；（3）$2B
              种子资本若使用克制，足以提供财务韧性；（4）PBC 结构向安全敏感客户释放了 mission-alignment 信号。


              会击穿投资论点的触发信号包括：（1）GA 后 3 个月内仍未公布定价，说明商业可行性迟迟无法验证；（2）John Schulman 或 Mira Murati
              离开，公司在研究公信力和领导层上的基础将被改写；（3）EU AI Act 对 TML 执法，或在 GPAI 合规上遭遇实质性欧洲监管障碍；（4）Meta Llama 许可证限制，导致 Llama 从 TML
              支持模型里被移除；（5）Google Cloud 或 Nvidia 算力中断，使服务能力下降超过 50%；（6）出现低于 $12B 的 down-round，说明投资人信心已经明显转向。


              在触发点出现前，应持续观察的指标包括：GitHub Cookbook 活跃度、学术论文对 Tinker 的引用、EU AI Act 对可比 GPAI 提供方的执法动作、Nvidia/AMD 供应链报告、Meta
              Llama 商业政策变化，以及 TML 招聘是否开始加码企业销售岗位。
