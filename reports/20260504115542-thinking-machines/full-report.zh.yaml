      - number: '2.6'
        title: 关键结论
        blocks:
          - type: callout
            title: GenAI 总支出里 hardware 占大头；软件 TAM 只是其中一小块
            body: >
              Gartner 的 $644 billion GenAI 支出数字经常被直接引用，但其中约 80% 是 hardware（devices 与 servers）。对 TML 真正相关的 TAM，应该是 $2.8-6
              billion 的 fine-tuning services 市场，最多也只是 $14 billion 的 GenAI model end-user market。无论投资人还是创始人，如果用 $644B
              给这类机会定盘子，分母都选错了。
            calloutType: insight
            claimRefs:
              - CM001
              - CM001
              - CM001
          - type: callout
            title: 上线 7 个月仍无公开定价，说明变现路径仍不确定
            body: >
              Tinker 在 October 1, 2025 上线时承诺 usage-based pricing 会在“未来几周”推出。截至本次运行日期（May 4, 2026），市场仍看不到公开价格。这会直接拉高 TML
              的 SAM 转化时间、收入兑现速度，以及其相对已公开报价竞争对手的定位不确定性。
            calloutType: risk
            claimRefs:
              - CM015
          - type: callout
            title: $1-3B 的 SAM 假设，前提是 2025-2026 年继续坚持 API-first、研究者与开发者导向
            body: >
              这里的 $1-3B SAM 假设 TML 在接下来 12-24 个月维持当前定位，也就是 API 驱动、研究级用户优先、并以 North America 为重心。如果公司成功转向 enterprise 或
              European 市场，SAM 会明显放大；如果始终走不出 private beta，SOM 就会向零收缩。
            calloutType: assumption
            claimRefs:
              - CM016
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              LLM 微调的竞争格局大致可分成 5 层。最上层是前沿模型实验室型竞争者——OpenAI、Anthropic 与 Google DeepMind——它们把基础模型与 fine-tuning API 一起纳入更大的
              AI 平台战略。下一层是开源生态，主要由 Hugging Face（model hub、PEFT library、AutoTrain）与 Meta（通过 Llama
              发布并支持社区微调）主导。第三层是面向开发者的基础设施，代表包括 Together AI、Replicate 与 Modal，这类公司提供 GPU-as-a-service 或开放权重模型 fine-tuning
              API。第四层是企业定制化微调，代表有 Predibase（LoRA-first、面向 enterprise）与 MosaicML/Databricks（面向企业的完整预训练与微调流水线）。第五层则是云厂商
              fine-tuning 产品，即 AWS SageMaker、Google Vertex AI 与 Azure ML，它们分发能力极强，但微调深度未必更专。


              现有状态下，TML 最重要的间接竞争对手其实是自托管：用户基于开源框架（Axolotl、LLaMA-Factory、Unsloth、Transformers PEFT），在自己管理的 GPU 集群上完成
              fine-tuning。TML 所瞄准的研究市场里，很大一部分用户本来就这么做，而且不需要任何 managed service。真正的问题是，TML
              的基础设施抽象——把调度、资源分配和故障恢复接过去——是否足以让用户从免费的自托管迁移到付费托管，尤其是在价格尚未公布的前提下。


              Safe Superintelligence（SSI，由 Ilya Sutskever 创立）在近期并不是直接竞争对手：它没有商业产品，且核心目标是长期 AI 安全研究，与托管微调服务并不相容。
            claimRefs:
              - CP001
              - CP001
              - CP012
              - CP013
              - CP014
              - CP019
              - CP020
              - CP021
      - number: '3.2'
        title: 前沿模型实验室竞争者
        blocks:
          - type: paragraph
            body: >
              OpenAI 依靠规模占据最强竞争位置。其估值约 $500 billion、2025 年 revenue 约 $12-20 billion，且 ChatGPT 周活用户达到 700
              million，这些分发与品牌优势都不是新进入者能快速复制的。OpenAI 的 fine-tuning API 支持 GPT-4o 与 GPT-4o-mini，训练成本分别为每百万 tokens $25 与
              $3，推理价格也高于 base model。它的关键限制在于，微调只支持 proprietary 模型，用户无法借助 OpenAI 的基础设施去 fine-tune 像 Qwen-235B
              这样的开放权重模型；这正是 TML 最直接的差异点。


              Anthropic 的发展同样惊人：在 February 2026 完成 Series G 后，估值达到 $380 billion，到 March 2026 revenue run-rate 已达 $30+
              billion。Anthropic 拥有超过 300,000 家企业客户，Fortune 10 里有 8 家是其客户。关键在于，Anthropic 当前并未向外提供 Claude 的公开 fine-tuning
              API，因此它并不是 Tinker 在 fine-tuning 基础设施市场上的直接对手；它更多是在争夺更广义的“组织把 AI 实验放在哪里做”的预算份额。


              Google DeepMind 的 Gemini 模型通过 Vertex AI 对外提供，并与 Google Cloud 的企业 IAM、安全与合规基础设施打通。这对已经深度押注 GCP
              的企业买家来说，是实打实的竞争压力；但对 TML 当前以研究用户为主的 go-to-market，短期影响相对有限。
