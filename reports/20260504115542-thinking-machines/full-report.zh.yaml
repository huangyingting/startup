  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Tinker 解决的是一个非常具体的工作流瓶颈：研究员和 ML engineer 想微调大语言模型，通常会卡在两件事上。第一，要在多 GPU 集群上用 CUDA 或 PyTorch
              编写并调试分布式训练代码；第二，还得自己管硬件基础设施，包括调度、故障恢复、checkpointing 和监控。Tinker 用一个 Python API
              同时拿掉这两层负担，把底层基础设施抽象掉，只暴露研究员真正需要的两个训练原语：forward_backward（为一批样本计算梯度）和 sample（为 RLHF 风格的 on-policy 训练生成
              completions）。从简单的 instruction tuning，到复杂的 RLHF 和 Group Relative Policy
              Optimization（GRPO），各类微调工作流都能用这两个原语拼出来。


              目标用户是具备 Python 能力、需要为具体任务微调 frontier-scale 模型的研究员或 ML engineer。代表性用例包括：数学推理增强（Princeton Goedel
              Team，定理证明）、科学发现（Stanford Rotskoff Lab，化学模拟）、强化学习研究（Berkeley SkyRL），以及 AI 安全对齐（Redwood
              Research）。这些场景都需要比商用微调 API（OpenAI、Vertex AI）更强的训练控制力，但又不想承担 self-hosted 微调那套基础设施负担。Tinker 卡的正是这块空白。


              产品于 2025 年 10 月 1 日上线，首发提供 Python SDK 支持、LoRA 微调、六个支持模型，以及配套库 Tinker Cookbook。截至 2026 年 5 月，产品仍处于 private
              beta，且未公布定价。
