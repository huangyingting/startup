  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              TML 当前的客户基础，可以沿三个维度切开：买方类型、用例，以及机构属性。


              先看买方类型：所有已披露用户都来自学术机构内部的研究团队，或非营利 AI 安全组织。已披露的付费客户基础里，没有商业企业客户、政府客户，也没有个人开发者。这和 private beta
              阶段的定位一致，平台主要面向有能力使用梯度级 API 原语的研究人员。


              再看用例：已知四个 beta 用户分别对应四类不同的微调用例，合起来说明 Tinker 适用面很广：形式化推理（Princeton 定理证明）、科学模拟（Stanford 化学）、自主智能体训练（Berkeley
              RL），以及对齐研究（Redwood Research）。这四类场景都需要 Tinker 提供的训练控制力，包括直接梯度访问、on-policy 生成、自定义训练循环，黑盒商用 API 很难覆盖。


              再看地域：四个已披露客户全部在美国。欧洲、亚洲及其他国际研究机构没有出现在公开客户名单里。这可能反映 Murati 的美国人脉网络，也可能与 private beta 阶段的数据驻留约束有关。


              最后看垂类：当前研究客户高度同质，几乎都属于学术或非营利 AI 研究。未来预期中的企业客户段，如金融服务、医疗、媒体、软件，当前公开账户里一个都没有。这对于 research-first
              的产品发布并不反常，但也意味着 TML 目前完全没有企业需求弹性、企业工作流适配度，或企业销售效率方面的证据。
