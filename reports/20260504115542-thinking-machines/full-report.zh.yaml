      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              从不同分析口径出发，市场规模会得到差异极大的 headline number。Gartner 给出的 2025 年总 GenAI IT 支出是 $644 billion，但其中大约 80% 来自
              hardware，

              主要是 devices 与 servers，因此若拿它来对应 TML 真正可触达的软件市场，会明显夸大。对 TML 更有意义的 Gartner 数据，是 2025 年 $14.2 billion 的 GenAI
              model end-user spending，

              它覆盖软件许可、API 消耗与定制化服务。MarketsandMarkets 估算核心 generative AI 市场为 $71.36 billion；Dataintelo 则将 LLM fine-tuning
              services 这一更具体的市场定在 2025 年 $2.8 billion。

              如果再加上 LLM fine-tuning orchestration 子市场约 $3.2 billion，则与微调相邻的合计市场约为 $6 billion。


              TML 的 TAM 取决于公司未来把边界画多宽。如果 Tinker 继续只是一个 fine-tuning API，则 2025 年 TAM 约为 $6 billion；如果公司往完整 post-training
              基础设施或 AI lab tooling 延展，

              TAM 可以上探到 $14–71 billion 区间。可服务市场，也就是只看英语用户、以研究者和开发者为核心、通过 API 驱动的开放权重模型微调，大致在 2025 年为 $1–3 billion。North
              America 按支出计约占全球微调市场的 41%。

              对一家尚未产生收入、且仍在 private beta 的新进入者来说，近期可获得市场 realistically 低于 $100 million，取决于 beta
              转付费的效率、定价何时落地，以及托管基础设施何时扩容。Grand View Research 预计更广义的 LLM 市场到 2030 年将达 $35.4 billion，CAGR 约
              36%，这为长期增长提供了一个大方向上的支撑。
