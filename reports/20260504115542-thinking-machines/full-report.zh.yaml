      - number: '3.5'
        title: 护城河评估与竞争风险
        blocks:
          - type: paragraph
            body: >
              TML 的可持续竞争优势确实存在，但范围窄，而且未必稳。当前的核心差异点，是能够通过托管 API 支持超大开放权重模型（Qwen-235B-A22B、DeepSeek V3.1、Kimi K2）的
              fine-tuning；主要竞争者里，还没有谁能通过 managed API 支持 235B+ MoE 微调。但这一优势明显有时间窗口：随着 GPU
              供给增加、云厂商扩充微调服务，模型规模带来的领先会逐步被抹平。Tinker Cookbook 的开源发布，以及 forward_backward/sample primitive
              API，的确能靠研究者熟悉度形成一些切换成本；但 LoRA adapter 的可迁移性也意味着，训练好的权重可以迁往任何 inference provider。

              通过与顶级研究机构（Princeton、Stanford、Berkeley）的关系型分发，TML 也建立起一定 reputational moat，未来或许能通过“论文先行、再进入采购”的路径向
              enterprise 外溢，但这条路径天然偏慢，确定性也不高。


              关键的不利竞争动态有 3 点：(1) Hugging Face 依靠免费工具与 Nvidia 投资，可能把算力能力补到接近 TML 的托管基础设施；(2) Together AI
              的价格足够激进，足以把预算敏感的研究团队从 Tinker 手里拉走；(3) 大模型算力合作（Nvidia 1GW、Google Cloud）确实利好 TML，但 Google Vertex AI
              及其他平台也会同步受益。更现实的问题是，TML 没有公开定价，导致企业采购部门甚至无法把它纳入理性的 buy-vs.-build 分析，这会直接卡住销售周期启动。
