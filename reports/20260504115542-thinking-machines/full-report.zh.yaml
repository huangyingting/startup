companyProfile:
  summary: |
    Thinking Machines Lab 是一家 AI 研究与产品公司，于 February 2025 在 San Francisco 由 Mira Murati
    （OpenAI 前 CTO）及另外 5 位 OpenAI 校友创立。公司采用 public benefit corporation 结构，Murati
    持有表决权多数，因此拥有少见的治理控制力。公司公开使命是打造更容易被理解、可定制、且具备更强通用能力的 AI
    系统，重点放在 open science、人机协作与安全优先的部署路径。
    其首款产品 Tinker 是一个基于 Python 的 API，用于在托管算力基础设施上做分布式 LLM 微调，底层采用 LoRA。
    公司已完成 $2 billion seed 轮融资，对应 $12 billion 估值，并拿下 Nvidia（1 gigawatt、Vera Rubin 芯片）
    与 Google Cloud（Blackwell 芯片）的战略算力合作。截至本次运行日期，Tinker 仍在 private beta，服务对象主要是学术研究团队；
    市场尚无公开资料确认其已产生商业收入。
