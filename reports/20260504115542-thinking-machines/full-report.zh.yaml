  - id: FP001
    title: 竞争定位图——产品成熟度 vs 微调能力
    type: quadrant
    layout: wide
    summary: >
      定位图中，x 轴代表产品成熟度（企业可用性、定价是否公开、合规认证），y 轴代表微调能力

      （模型覆盖广度、算法控制深度、基础设施规模）。TML Tinker 落在高能力 / 低成熟度象限。云厂商现有产品处于高成熟度 / 中能力象限。Hugging Face 是中成熟度 / 高能力。OpenAI 则是高成熟度 /
      中能力。
