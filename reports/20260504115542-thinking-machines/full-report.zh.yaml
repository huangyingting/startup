            title: 客户基础 100% 来自创始人网络中的学术账户，且没有付费客户
            body: >
              TML 全部已披露客户，都来自 Murati、Schulman 和 Chintala 的个人与学术关系网络。这四个具名账户不能算独立市场验证。若要认定 TML 已经具备 product-market
              fit，投资人必须先看到来自创始团队网络之外的研究者和企业的自然流入需求证据。
