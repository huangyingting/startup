      - number: '4.4'
        title: 单位经济与 GTM 效率
        blocks:
          - type: paragraph
            body: >
              TML 没有公开任何单位经济数据——CAC、LTV、gross margin、payback period 或 net revenue retention 都没有。所有指标都是 private 的，而
              private beta 阶段也意味着，即便公司内部已经有 cohort 数据，成熟度也还不够。当前只能从第一性原理往下推。


              托管微调服务的 gross margin，取决于每单位训练算力收入与对应算力成本之间的差额。若按竞争性价格区间（每百万 tokens $1-5）对比 GPU 算力成本（以 Blackwell
              级硬件估算，每百万训练 tokens 约 $0.3-1.5），那么在规模化后，gross margin 可能达到 40-70%，与可比云 AI 服务大致一致。但在低利用率阶段——而 TML 在 private
              beta 几乎可以确定处于这一阶段——固定基础设施折旧会严重压缩利润率，甚至可能把 gross margin 拉到负数。


              在研究市场，客户获取基本靠口碑与关系网络推进——Murati 的 OpenAI 网络、Schulman 的学术关系，都是现成渠道。首批用户的 CAC 很可能接近于零。可一旦公司开始打 enterprise
              市场，就必须搭建销售团队、承受更长周期，并付出显著更高的 CAC。从现有招聘信号推断，TML 尚未搭起完整的 GTM 基础设施，包括 sales ops、solutions engineering 与
              enterprise contracts 能力。公司若想从研究社群分发切到 enterprise sales，必须继续增加非工程岗位投入。
