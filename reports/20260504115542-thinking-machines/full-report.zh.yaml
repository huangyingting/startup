      - number: '1.5'
        title: 里程碑、负面事件与治理背景
        blocks:
          - type: paragraph
            body: >
              Thinking Machines Lab 在成立后的前 15 个月里，资本形成、产品上线与管理层波动都被压缩在极短时间内发生。公司从 stealth launch 到完成 $12 billion seed
              轮融资只用了 5 个月；

              再过 5 个月，首款产品 Tinker 上线；随后又在截至 April 2026 的 6 个月窗口内，拿下 Nvidia 与 Google Cloud 两项具变革性的基础设施合作。


              但在这条上升轨迹背后，公司也在第一年内失去了 3 位联合创始人。Andrew Tulloch 于 October 2025 离开，与 Meta 的激进挖角直接相关，其中包括一份据称达到九位数级别的个人
              package。

              January 2026 离开的 Barret Zoph（CTO）与 Luke Metz 更值得警惕：两人都回到了 OpenAI，而 Wired 的报道还将 Zoph 的离职定性为并不和气。在最初 6
              位联合创始人

              （Murati、Schulman、Zoph、Weng、Tulloch、Metz）中，截至本次运行日期，只剩 Murati、Schulman 与 Weng 仍在。Soumith Chintala 已补位为
              CTO，但他并非创始成员。


              公司治理上有几个值得注意的特征。public benefit corporation 结构要求公司在股东之外也考虑其他利益相关方，这一点与 OpenAI Group PBC 和 Anthropic
              类似。Murati 的 super-voting control

              把战略权力高度集中在 CEO 手中，这一方面降低了被夺权的风险，另一方面也进一步放大了关键人物暴露。Meta 的收购尝试，既反映出战略买家对 Thinking Machines 研究团队稀缺性的定价，

              也侧面证明该团队容易受到外部挖角。


              往后看，Bloomberg 于 November 2025 报道的那笔潜在 $5 billion 融资、对应 $50 billion 估值，如果最终完成，将是 startup
              史上最激进的一次估值跳升之一，也会让公司的 paper valuation 直接进入成熟后期 AI 独角兽区间。

              但截至本次运行日期，这仍是一个未补上的证据缺口。
