  - id: FR002
    title: 风险传导图：TML 风险如何传导到投资结果
    type: dag
    layout: wide
    summary: |
      这张 DAG 展示了主要风险如何层层传导，最终影响收入、获客、资本充足性和估值。最关键的两条传导路径是：
      Nvidia/GCP 中断 → 算力损失 → 服务不可用 → 客户流失 → 收入下滑 → 下轮估值下修；以及核心人物离开 → 信誉崩塌 → 企业销售受阻 → 收入不及预期 → 下轮估值下修。
    data:
      nodes:
        - id: rt1
          label: 算力中断（Nvidia/GCP）
        - id: rt2
          label: 服务不可用 / 产能下降
        - id: rt3
          label: 客户流失（研究与企业客户）
        - id: rt4
          label: 收入低于投资人预期
        - id: rt5
          label: 下轮估值下修 / 估值压缩
        - id: rt6
          label: 核心人物离开（Murati/Schulman）
        - id: rt7
          label: 在研究社群中的信誉受损
        - id: rt8
          label: 企业销售管线停滞
        - id: rt9
          label: EU AI Act 执法 / GPAI 封锁
        - id: rt10
          label: EU 市场准入被拒
      edges:
        - from: rt1
          to: rt2
          label: 直接导致
        - from: rt2
          to: rt3
          label: 推动
        - from: rt3
          to: rt4
          label: 压低收入
        - from: rt4
          to: rt5
          label: 触发
        - from: rt6
          to: rt7
          label: 削弱
        - from: rt7
          to: rt8
          label: 阻断
        - from: rt8
          to: rt4
          label: 叠加恶化
        - from: rt9
          to: rt10
          label: 强制执行
        - from: rt10
          to: rt4
          label: 限制收入
    claimRefs:
      - CR013
      - CR020
      - CR021
      - CR022
      - CR011
  - id: FR003
    title: 依赖图：TML 的关键外部依赖
    type: dag
    layout: wide
    summary: |
      这张 DAG 展示了 TML 为维持运营连续性所依赖的关键外部参与方和系统。算力链条（Nvidia → GCP → TML 集群）
      是最关键的单一路径；模型许可证链条（Meta、Alibaba 等）排在第二。
    data:
