  - id: FE001
    title: Tinker 产品架构栈
    type: stack
    layout: standard
    summary: |
      这张五层架构图展示了研究员写下的 Python 代码，如何通过 Tinker 平台一路转成 GPU
      算力执行。分层设计把关注点拆开，也让 TML 能分别升级各层能力，包括算力、kernel
      和编排层。
    data:
      layers:
        - label: 用户代码（Python）
          detail: 研究员用 forward_backward 和 sample 原语编写自定义训练循环；纯 Python；不需要分布式系统知识
        - label: Tinker Python SDK
          detail: 将 Python 对象序列化为训练请求；处理 tokenization、batching、重试逻辑和日志流；把底层基础设施全部抽象掉
        - label: LoRA 编排引擎
          detail: 管理共享基础模型权重、各作业的 LoRA adapter、任务调度、故障恢复、checkpointing 和计量
        - label: TileLang Kernel 层
          detail: 面向混合精度 LoRA 训练的定制分块 GPU kernel；实现 batch invariance；针对 Blackwell 架构的内存层级做了优化
        - label: GPU 算力基础设施
          detail: Nvidia Blackwell 集群（Google Cloud 交易，2026 年 4 月）；计划部署 Vera Rubin 集群（2027）；硬件完全由 TML 配置和管理
        - label: 基础模型权重存储
          detail: Qwen-235B-A22B、Llama、Qwen 2.5、gpt-oss、DeepSeek V3.1、Kimi K2；模型权重由 TML 存储和维护；许可证合规由内部管理
        - label: 监控 / 可观测性
          detail: 训练指标、任务状态、收敛诊断和使用量计量通过 Tinker dashboard 展示（beta）
