      - number: '8.5'
        title: 估值结论与建议
        blocks:
          - type: paragraph
            body: >
              结论：基于当前证据，应维持 research-more。$12B
              种子估值是一个在充分信息下形成的市场价格；种子投资人已经接受了对应风险，考虑到团队质量和市场时点，这个价格可以成立。但如果是面向新的资金，在传闻中的 $50B 目标价位上，现有证据并不支撑该价格。


              按 $50B 进入，TML 需要在 3-5 年内做到 $2-5B ARR（对应 10-25x forward revenue multiples），新投资人才有机会拿到有意义的回报。这背后要求 TML 顺利完成
              GA、拿到企业客户牵引、在与 hyperscaler
              的对抗中做出可竞争定价，并证明自身护城河足够耐久。而这些点，从公开证据看一个都还没被验证。相较于那些创始人质量相近甚至更优、但财务证据更充分的可比公司，$50B 价位上的风险调整后回报并不吸引人。


              如果前述尽调要求，也就是定价、ARR、企业客户、EU 合规和 IP assignment，都能被充分满足，投资论点可以上调为在 $20-40B 区间投资。这个区间既能被乐观情景收入模型支撑，也反映了团队溢价。但在
              $50B、且缺少支撑证据的情况下，建议仍然是 research-more。


              Confidence：中等。不是低，因为团队和基础设施质量确实有真差异化；也不是高，因为所有财务指标都还私有，且产品仍是 pre-GA。Risk rating：高，原因是
              pre-revenue、pre-compliance、人员风险集中，且算力 capex 不确定。
            claimRefs:
              - CV020
              - CV021
              - CV022
              - CV023
              - CV001
