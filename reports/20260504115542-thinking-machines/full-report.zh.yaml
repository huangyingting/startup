    summary: |
      这张留存队列图基于可比的开发者工具和研究平台留存基准，对 TML beta 研究用户做了估算。
      所有数值均为分析师估算；TML 未披露任何留存指标。由于项目具有连续性，托管式微调平台的研究用户留存，可能高于平均水平。
