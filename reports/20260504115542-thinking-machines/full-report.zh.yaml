      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              在乐观情景（25% probability）下，TML 执行几乎无瑕：Tinker 于 2026 年 Q4 前完成 GA 并公布定价，2027 年底做到 $50M ARR，拿下 3-5 个企业
              logo，吸引全球头部学术用户，并在 Series A 以 $40-60B 融资。Nvidia 1GW 合作为公司带来一条 hyperscaler 难以复制的算力护城河。John Schulman 再发表突破性的
              on-policy distillation 研究，并成为行业标准，从而把 Tinker 钉成 RLHF 训练平台里的事实标准。到 2030 年，TML 在 $20-50B 的 fine-tuning TAM
              中拿下 15-20% 份额，实现 $3-5B ARR，并以 15-25x revenue multiple 对应 $50-100B 估值。


              在基准情景（50% probability）下，TML 于 2026 年完成 GA，2027 年底实现 $10-30M ARR，客户结构由研究团队和早期企业混合构成，Series A 估值落在 $20-35B，较
              $50B 目标有明显折价。公司维持研究社区领导地位，同时缓慢搭建企业客户基础。Tinker 的原语 API 差异化还能保持 2-3 年，之后被 hyperscaler 逐步补齐。最终在 2030-2032 年以
              $30-60B 退出，路径可能是并购（Nvidia、Google、Microsoft 都是天然买家）或在收入上规模后 IPO。对种子投资人来说，回报为正，但谈不上代际级。


              在悲观情景（25% probability）下，TML 会同时撞上几件事：（1）变现速度不足以支撑 $50B 估值目标，最终在 $15-25B 发生 down-round；（2）关键人物离开（Schulman 或
              Murati），研究公信力受损；（3）hyperscaler 竞争提前加速，让 managed fine-tuning 在 TML 做出规模前就被商品化；（4）EU AI Act
              合规问题挡住欧洲企业市场。最差情况下，TML 在没有收入的情况下持续烧钱，最后只能以困境价格（$1-5B）卖给 Nvidia 或 Google，交易标的是团队和基础设施资产。
