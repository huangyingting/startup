  - id: FR001
    title: 风险热力图：按发生概率和影响划分的 TML 风险组合
    type: matrix
    layout: wide
    summary: |
      这张热力图把 TML 的重大风险放进五档概率（列）和五档影响（行）里。越靠右上角的风险越关键；
      越靠左下角的项目越偏监测性质。所有判断都基于公开证据，由分析师给出。
    data:
      columns:
        - label: 极低
        - label: 低
        - label: 中
        - label: 高
        - label: 极高
      rows:
        - label: 灾难性影响
          values:
            - —
            - —
            - 算力中断（Nvidia/GCP）
            - 核心人物离开（Murati）
            - —
        - label: 高影响
          values:
            - —
            - Meta Llama 限制
            - EU AI Act 执法
            - 联合创始人离职（Zoph、Metz）
            - —
        - label: 中等影响
          values:
            - —
            - —
            - 版权诉讼先例
            - Capex 跑道收紧
            - 微调商品化
        - label: 低影响
