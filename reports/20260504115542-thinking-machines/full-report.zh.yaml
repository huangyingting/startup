      - number: '6.5'
        title: 客户验证结论
        blocks:
          - type: paragraph
            body: >
              TML 的客户验证可信，但很窄。四个具名学术研究用户，且都来自美国最受尊敬的一批 AI 研究机构，对研究市场来说是很强的社会证明。但它们同时也意味着：

              - 0 个企业客户

              - 0 个付费客户

              - 0 个企业工作流适配证据

              - 0 个创始团队人脉网络之外的需求证据

              - 0 个留存数据点


              截至 2026 年 5 月，这批客户更适合定义为“创始人关系户 cohort”，而不是“已被市场验证的客户基础”。这些用户确实验证了 Tinker
              的产品质量，但市场需求本身，也就是创始团队网络之外的客户会不会主动选 Tinker，目前仍未被验证。


              从尽调角度看，投资人应重点追问四项：第一，beta 用户总数；第二，实际使用量和增长率；第三，waitlist 规模；第四，是否已有创始团队关系网之外组织的自然流入需求证据。
            claimRefs:
              - CU001
              - CU004
              - CU016
              - CU017
