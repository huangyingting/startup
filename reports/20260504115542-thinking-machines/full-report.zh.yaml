      - number: '8.4'
        title: 退出准备度与最终尽调清单
        blocks:
          - type: paragraph
            body: >
              无论从哪个维度看，TML 都还远未达到 IPO-ready：没有公开收入、没有审计财务、没有企业合规认证、没有公开单元经济，产品还停留在 private beta。更现实的 IPO 时间表，是从本次运行日期往后
              4-7 年，也就是 2030-2033 年；届时至少需要 $500M+ ARR、正毛利，以及明确的企业客户牵引。更可能的退出路径还是战略并购：Nvidia（看中算力基础设施护城河）、Google（争夺 AI
              人才和 fine-tuning 生态）、Microsoft（对打 Azure ML），或 Meta（争夺 Llama 生态）都具备以 $20-60B 收购 TML 资产的财力和动机。


              在任何 $50B+ 新资金承诺前，最后五项尽调要求应当是：

              1. Tinker 公布定价，才能建立任何收入情景模型

              2. Q1 2026 ARR 或等价使用指标，才能确定收入基线

              3. 至少 1 个非创始人网络企业客户，且已签正式合同

              4. EU AI Act 合规文件，才能评估欧洲市场可达性

              5. Tulloch、Zoph 和 Metz 离职对应的 IP assignment 确认


              一旦出现以下信号，整个投资逻辑会被击穿：

              - Mira Murati 或 John Schulman 离开公司

              - EU AI Act 执法导致 TML 被认定存在 GPAI 不合规

              - Meta Llama 商业许可证限制，导致 Llama 从 Tinker 中被移除

              - 低于 $12B 种子估值的 down-round（这是投资人失去信心的结构性信号）

              - Series A 到 2026 年 12 月仍未完成（意味着 $50B 目标在任何短期里程碑下都达不到，也会把投资人需求的基本逻辑重新暴露出来）
            claimRefs:
              - CV013
              - CV016
              - CV017
              - CV018
              - CV019
