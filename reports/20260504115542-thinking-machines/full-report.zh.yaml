      - 对论点的传导
      - 行动含义
    rows:
      - - Murati 或 Schulman 离开
        - 任何离职公告
        - 整个投资论点都建立在团队质量上；两人中任何一人离开，核心投资理由就不成立
        - 立即重估论点；模型中计入 40-60% 估值减记
      - - 以低于 $12B 的价格下轮融资
        - Series A 定价低于 $12B
        - 这说明连合格投资人也不再认可当前估值
        - 若可行则退出；论点失效
      - - TML 遭遇 EU AI Act 执法
        - EU 监管机构处罚或合规封堵
        - 欧洲企业市场被直接切断，全球可信度也会受损
        - 评估 EU 市场受影响程度；TAM 可能下调 20-30%
      - - Meta Llama 商业许可限制导致 TML 无法继续使用
        - Meta 政策变化，阻断 TML 对 Llama 的微调
        - 目录中最受欢迎的开放权重模型被移除，被迫转向其他模型
        - 量化 Llama 在工作负载中的占比；评估替代模型质量
      - - 到 2026 年 12 月仍未完成 Series A
        - 到 Dec 2026 仍无 Series A 公告
        - 说明 $50B 目标不可持续；TML 可能在缺乏商业验证时继续烧钱
        - 重估 runway；推演更长烧钱周期；与管理层沟通
