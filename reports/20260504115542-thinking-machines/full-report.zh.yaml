      - number: '4.2'
        title: 收入模式与定价
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Tinker 是 TML 唯一已商业部署的产品。其收入模式是 usage-based pricing，也就是按训练消耗收费，但具体费率尚未公布。October 2025
              的产品发布公告曾表示，定价会在“未来几周”上线；但到本次运行日期，也就是 7 个月后，TML 官网、文档与第三方价格数据库里仍没有公开报价。这一点即便放在 private beta 产品里也不常见：可比平台如
              Together AI 与 OpenAI fine-tuning，都会公开列出价格表。


              从产品设计看——LoRA 共享算力池、托管基础设施、API 接入——再结合竞品价格区间（每百万训练 tokens 为 $0.48–$25），TML 的定价大概率落在每百万 tokens
              $1–5，且可能会根据模型规模与 LoRA rank 分层收费。像 Qwen-235B-A22B 这类超大模型应当会有溢价。收入确认逻辑则会遵循 ASC 606 下的 usage-based
              模式：训练算力被消耗时确认收入；除非存在 enterprise subscription 协议，否则预付 credits 不会形成 deferred revenue。


              TML 近期收入几乎可以确定仍然很小：产品处于 private beta，用户群体规模有限，而且这些研究用户在 beta 期内很可能仍享受免费使用。最乐观情形下，收入也是在 late Q4 2025 或 Q1
              2026 才开始启动；考虑到 beta 已持续 7 个月且定价仍未公布，Q4 2025 至 Q2 2026 的收入大概率低于 $1 million。
