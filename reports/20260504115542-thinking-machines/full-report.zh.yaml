      - number: '4.5'
        title: 财务结论与尽调阻点
        blocks:
          - type: paragraph
            body: >
              TML 的财务画像一半让人安心，一半让人警惕：一边是种子轮资本极厚、按当前烧钱速度看跑道几乎无限；另一边是收入零公开、定价未披露、单元经济模型缺席。公司先以 $12 billion 的种子估值募得 $2
              billion，不到六个月又寻求 $50 billion 估值，这在创业公司里几乎没有先例，理应保持高度怀疑。它要么意味着内部产品势头极强，足以在没有收入证据的情况下支撑 4x
              估值跳升；要么说明投资人押注的是创始人期权价值和市场时点，而不是基本面。


              当前财务尽调的核心卡点有四个：第一，未公开定价，收入模型无从验证；第二，缺少单元经济数据，利润率路径无法判断；第三，Nvidia 1GW、Google Cloud 等算力 capex
              承诺没有披露财务细节，真实现金消耗与跑道因此存在重大不确定性；第四，在没有收入可比的阶段，估值基本只能靠预期支撑。任何后续投资承诺前，投资人都应要求完整财务披露。按公开证据看，$50 billion
              的估值目标站不住脚。
