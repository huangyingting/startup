      - number: '3.4'
        title: 云巨头与自托管替代方案
        blocks:
          - type: paragraph
            body: >
              AWS SageMaker、Google Vertex AI 与 Azure ML，是 TML 长期最强的竞争威胁，因为它们早已占据企业采购关系。这些平台把开源模型微调作为更大 MLOps
              平台中的一项功能打包出售，同时附带 SOC2、HIPAA、FedRAMP 等合规认证、数据驻留控制以及 enterprise support SLA，这些都是现阶段 TML 无法匹敌的。对于已经深度绑定
              GCP、AWS 或 Azure 的企业买家来说，引入新厂商的切换成本很高。真正的风险不是这些 incumbent 今天微调做得更强，而是它们会随着时间推移，把微调支持扩展到更大模型，从而抹掉 TML
              现在的技术差异。


              Meta 的开源策略，是更深层的间接竞争力量。通过以宽松许可发布开放权重的 Llama，Meta 持续供给可定制基础模型，降低买方对单一 fine-tuning API 厂商的依赖。这对 TML
              是利好，因为它需要开放模型才能提供服务；但这项利好对所有竞争者都成立。Meta 自己的 AI studio 与 fine-tuning offering 仍然比较初级；其战略目标更像通过开源生态占位，而不是赚
              managed service revenue。MosaicML（于 2023 年被 Databricks 以 $1.3 billion 收购）能够提供企业级 LLM
              预训练与微调，但目标客户是具备预训练级预算的组织，而不是 TML 当前面向的研究型微调客户。
