    title: 公司概览
    sections:
      - number: '1.1'
        title: 定位、使命与运营模式
        blocks:
          - type: paragraph
            body: |
              Thinking Machines Lab 是一家 AI 研究与产品公司，注册形态为 public benefit corporation，
              总部位于 California 州 San Francisco。公司于 February 18, 2025 结束隐身、正式亮相，
              由 OpenAI 前 Chief Technology Officer Mira Murati 领军。相较于传统 Delaware C-corp 结构，
              public benefit corporation 形态意味着公司对股东回报之外的利益相关方也负有明确责任；
              这一组织选择与其推动 AI 普惠和推进 open science 的使命基本一致。

              公司公开使命是“构建一个人人都能获得相关知识和工具、让 AI 服务其独特需求与目标的未来”。
              这一使命落到 3 个支柱上：帮助用户按自身需求改造 AI 系统、为更强能力的 AI 打基础、以及通过共享研究、代码和技术博客推动
              open science。相比封闭式 proprietary lab 的路线，这种做法形成了鲜明对照，也让 Thinking Machines
              在强调使命与治理绑定的 AI 公司里，更接近 Anthropic（同样是 PBC）这一侧。

              公司上线时的运营模式，是把前沿模型研究与一层新兴的 managed-service 产品结合起来。首款产品 Tinker
              通过 usage-based pricing 把训练基础设施能力变现，同时给研究者提供 Python 原生 API，把分布式训练的复杂度藏到后台。
              公司披露 Mira Murati 持有超过董事会其余成员总和的表决权，这使她在同阶段 peer 公司里拥有相当少见的创始人控制力。

              Built In 报道称，自 Soumith Chintala 等人加入后，公司员工已超过 50 人。截至本次运行日期，团队成员来自
              OpenAI、Meta（含 PyTorch）、Character AI、Google DeepMind 与 Mistral 等机构。
