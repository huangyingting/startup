      - number: '7.3'
        title: 合作伙伴、依赖与人员风险
        blocks:
          - type: paragraph
            body: >
              TML 对合作伙伴的依赖带来了显著集中风险。Google Cloud 交易（2026 年 4 月）和 Nvidia 1GW 合作（2026 年 3 月）加在一起，几乎就是 TML 全部算力基础设施战略。若
              Google Cloud 终止或重谈协议，例如 TML 未达到最低承诺门槛，公司会立刻遭遇算力容量约束，甚至影响服务交付。面向未来的 Nvidia Vera Rubin
              承诺（2027+）虽然偏长期，但相关财务条款会带来 capex 义务，压缩财务灵活性。


              投资人兼合作伙伴的结构，即 Nvidia、ServiceNow、Cisco 同时既是战略投资人又是合作方，也带来双重风险：这些关系有助于分发和算力获取，但一旦 TML
              的商业利益与投资人利益不一致，就会出现委托代理冲突。Cisco 和 ServiceNow 也可能更希望 TML 按照它们的平台节奏做集成，从而限制 TML 的独立性，或削弱其与其他企业软件提供商合作的空间。


              人员风险是 TML 风险画像里最尖锐的一项。五位最初联合创始人中已有三位离开：Andrew Tulloch（→Meta，2025 年 10 月）、Barret Zoph（原 CTO，→OpenAI，2026 年
              1 月）和 Luke Metz（→OpenAI，2026 年 1 月）。Zoph 作为 CTO 离开后，由 Soumith Chintala 接任，后者履历很强，但到 2025 年 11 月才加入。Zoph 和
              Metz 转投 OpenAI，而 OpenAI 正是 TML 最直接的竞争对手，这让市场难免追问早期工作成果的 IP 归属、竞争情报外溢，以及留任团队士气。Mira Murati 因此承担了极高的
              key-person risk：她既是创始人也是 CEO，也是公开层面仍留在核心管理层的唯一 founding-era 高层；Chintala 和 Schulman 都是在 TML 成立之后才加入。
