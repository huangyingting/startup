      - number: '4.3'
        title: 成本结构与资本密集度
        blocks:
          - type: paragraph
            body: >
              TML 的主要成本驱动项是算力基础设施与人员。由于采取 managed-cluster 模式，基础设施成本对这个体量的 startup 来说异常高：Tinker 跑在 TML 自有的内部 GPU
              集群上，这意味着公司需要自己承担 GPU 采购与折旧的资本开支，以及持续运维成本。这与 Together AI 等依赖第三方云基础设施运行的竞争者明显不同。


              April 2026 的 Google Cloud 合作（Nvidia Blackwell 芯片）与 March 2026 的 Nvidia gigawatt 合作（2027 起提供 Vera Rubin
              芯片），都说明 TML 正在搭建自有的大规模算力基础设施。对一家成立不足两年的 startup 来说，这是一条不寻常且极度烧钱的路线。单是 1-gigawatt 的 Nvidia
              承诺，按市场价格粗略估算，就可能对应未来约 $1-2 billion 的资本开支义务；如果部署节奏很快，这几乎会吃掉大部分 $2 billion seed 资金。


              人员成本是次一级、但仍然重要的费用项。公司估计已有 50+ 名员工，其中很多来自 OpenAI、Meta、Google DeepMind 等机构的高级研究岗位；平均每人总薪酬大概率高于
              $500,000，对应年度人员成本约 $25-50 million。叠加基础设施支出后，年 burn 估计落在 $75-200 million，意味着账上仍可能保有 $1.4-1.9 billion
              现金，runway 约 7-25 年。除非基础设施承诺显著加速资本投放，否则资金面结构上仍然很强。
