      - number: '2.3'
        title: 买方分层与采用动态
        blocks:
          - type: paragraph
            body: >
              LLM 微调的买方大致分成 4 类：学术与机构研究实验室（大学、国家实验室、独立 AI 安全机构）；构建自有模型能力的 AI-native 初创公司；在医疗、金融、法律、制造等垂直场景部署定制 AI
              的中型企业团队；以及拥有独立 AI R&D 预算的大型企业创新中心。

              TML 当前的 go-to-market 主要集中在前两类。Princeton、Stanford、Berkeley 与 Redwood Research
              都被点名为早期采用者，这些组织的共同特征是技术能力强、且有研究级算力需求。


              不同分层的预算归属与采购路径差别很大。学术实验室通常依靠 grants、sponsored research agreements 或 faculty discretionary
              budgets，采购非正式，技术说服力就是核心。AI-native 初创公司则直接从 runway 里拨预算，通常由创始人或 CTO 在几天内拍板。企业团队则要经过 procurement、legal 与
              security review，周期从数周拉到数月不等。

              这一区分直接决定 TML 近期把 TAM 转成收入的效率：研究市场动作快，但预算有限；企业市场客单价更高，但推进很慢。


              研究市场的采用触发因素包括：大型开放权重模型供给增加（Llama、Qwen、DeepSeek）、论文与成果发布压力要求团队产出新型 fine-tuned 模型，以及基于 LoRA
              的共享资源池进一步压低了算力成本。企业侧的触发因素则包括模型可解释性的监管要求、对特定领域准确率的需求高于 base model 基准，以及因数据隐私要求而无法使用第三方闭源模型 API。

              从研究市场跨到企业市场，将是 TML 在未来 18–36 个月必须穿越的关键 S-curve 拐点。
