      - number: '2.5'
        title: 市场定位与可触达机会
        blocks:
          - type: paragraph
            body: >
              TML 在微调市场里的差异化定位，主要靠 3 个支柱：其一，能接入超大开放权重模型，包括 235B+ 的 MoE 架构；其二，提供保留算法控制权的 Python 原生低层
              API（forward_backward、sample primitives）；其三，托管基础设施把调度与故障恢复复杂度拿走，但不替用户代写训练逻辑。

              这让 Tinker 与云厂商 incumbent 路线形成区隔，后者更强调易用性与企业合规；也与自托管工具形成区隔，因为后者要求用户具备很强的基础设施能力。


              市场机会确实存在，而且还在长大，但 TML 当前的商业化仍极早期。截至本次运行日期，产品仍在 private beta，定价未公开，收入要么极少、要么为零。$12 billion seed 估值叠加
              pre-revenue 状态，意味着投资人押注的是一个远高于当前进展的 TAM capture 假设。这个故事要成立，TML 必须把研究社群里的早期采用者转成付费用户，把 Tinker 扩展到
              enterprise use case 并补上合规与安全能力，同时在基础设施边际成本明显低于自己的 incumbent 面前守住价格竞争力。

              如果平台在未来 2–4 年内实现 general availability 与 enterprise readiness，则 $1–3 billion 的 SAM 估算是站得住的；但近期 SOM
              仍远低于这个水平。
            claimRefs:
              - CM008
