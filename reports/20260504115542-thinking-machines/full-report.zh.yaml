      - number: '1.2'
        title: 创始团队、管理层与关键人物依赖
        blocks:
          - type: paragraph
            body: |
              Thinking Machines Lab 起步时的创始阵容极强，核心成员大多出自 OpenAI 的高级研究与产品管理层。Mira Murati
              （CEO）于 2018 加入 OpenAI，最初负责 applied AI 与 partnerships，2022 升任 CTO，主导过 ChatGPT、DALL-E
              与 Codex/GitHub Copilot，并在 November 2023 董事会危机期间短暂担任 interim CEO，随后于 September 2024 离开 OpenAI。
              John Schulman（Chief Scientist）是 OpenAI 联合创始人，发明了 PPO 强化学习算法，也是 ChatGPT 的共同创建者。
              Schulman 与 Murati 都深度绑定于前沿 AI 研究路线，而这正是 Tinker 的底层叙事基础。

              此后有 3 位联合创始人离开。Andrew Tulloch（预训练与推理专家，曾任职 OpenAI 和 Meta）于 October 2025 回到 Meta，
              据称此前一度拒绝了一份总额最高可达 $1.5 billion 的薪酬方案，最终仍选择接受。Barret Zoph（原 CTO，OpenAI 前 VP Research）
              与 Luke Metz（后训练专家，OpenAI 前员工）则在 January 2026 一同回到 OpenAI；Wired 将 Zoph 的离开描述为“not amicable”。
              Lilian Weng（AI 安全与机器人方向专家，OpenAI 前 VP）仍留在公司。

              公司成立后最关键的一笔高管引进，是 Soumith Chintala 于 November 2025 加入，并在 January 2026 出任 CTO。Chintala
              是 PyTorch 的联合创建者，在 Meta 工作了 11 年，升至 VP 级别。他的加入部分对冲了 Zoph 离开的影响，也为 Tinker
              的架构补上了极强的开源基础设施信誉。

              关键人物依赖仍然很高。Murati 是公司在战略、对外形象与产品层面的绝对核心；Schulman 提供科研连续性；Chintala 补足基础设施深度。
              6 位原始联合创始人中有 3 位在公司第一年内离开，这本身就是实质性的治理与组织凝聚力风险，后续章节需要把这部分风险明确计价。
