      - number: '3.3'
        title: 开源生态与开发者基础设施
        blocks:
          - type: paragraph
            body: >
              Hugging Face 是 TML 最容易被低估的竞争者。其估值约 $7-8.5 billion，拥有 13 million 用户，2025 年 revenue 估计为 $221
              million，已经建立起开源模型托管与微调的事实标准。其 PEFT library 免费提供 LoRA、QLoRA 与 adapter 实现，在研究社区使用极广。Hugging Face AutoTrain
              则提供 no-code/low-code 微调界面。Nvidia 于 January 2026 对 Hugging Face 投资 $500
              million，也进一步强化了其算力获取能力。其主要短板在于，Hugging Face 目前并不提供 TML 目标规模下的托管 GPU
              调度与故障恢复能力；它更像工具与托管层，而不是面向超大模型的分布式训练编排器。


              Together AI（估值 $3.3 billion，预计 2025 年 revenue 为 $120 million）是最直接的价格竞争者：它对 Llama 3.1 8B fine-tuning
              的收费为每百万 tokens $0.48，并提供完整的 API-first 开放模型微调体验。按 token 计算，Together AI 的价格大约只有 OpenAI GPT-4o fine-tuning 的
              1/50。Predibase 提供面向 enterprise 的 LoRA 微调，价格区间约为每百万 tokens $0.5-8，并配有按 seat 收费的 enterprise
              subscription；其架构与 Tinker 基于 LoRA 的方案很接近，因此在商业层面是最相似的功能型竞争者。关键差异在于，无论 Together AI 还是 Predibase，目前都还不支持 TML
              基础设施所面向的 235B 参数级超大 MoE 模型。
