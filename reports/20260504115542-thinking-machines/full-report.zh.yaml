      - number: '6.3'
        title: 采用轨迹与客户增长
        blocks:
          - type: paragraph
            body: >
              TML 于 2025 年 10 月 1 日以 private beta 形式推出 Tinker，当时获准使用的用户数量未披露。截至 2026 年 5 月，也就是上线七个月后，产品仍处于 private
              beta，且没有公布以下指标：

              - 获批 beta 用户总数

              - 已完成的微调任务总量

              - 已消耗的训练算力总量

              - 用户地域分布

              - 排队或 waitlist 规模

              - 使用增长率


              目前唯一公开的采用信号，是四个具名机构用户，而且看起来都更像靠个人关系招募而来，而不是通过市场营销形成的自然流入需求，背后主要是 Murati 的 OpenAI 网络和 Schulman
              的学术关系。这是研究工具很典型的冷启动策略：先用头部用户建立可信度，再靠研究社区口碑往外扩。


              研究社区对微调工具的采用，通常沿着一条固定路径走：早期学术用户 → 开发者社区博客和教程 → 企业评估 → 企业商业化采用。TML 目前大致停在这条曲线的第 1-2 阶段。由于缺少公开使用指标，外界无法判断
              Tinker 是否已经在更广泛的研究社区中形成强劲自然需求，还是仍局限于最初那批手选用户。


              还有一个值得盯的采用信号：GitHub 上的 Tinker Cookbook。仓库 star、fork 和 issue 量都能提供间接采用证据，但截至本次分析日期，这些指标未被纳入跟踪。
