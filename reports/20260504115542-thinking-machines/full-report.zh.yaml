  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 融资历程与资本结构
        blocks:
          - type: paragraph
            body: >
              Thinking Machines Lab 于 July 15, 2025 完成了 venture capital 史上最大的一笔 seed round：$2 billion，对应 $12 billion
              投后估值。该轮由 Andreessen Horowitz 领投，参投方包括 Nvidia、Accel、ServiceNow、Cisco、AMD 与 Jane Street。战略投资人的构成较为多元：Nvidia
              对应算力获取，ServiceNow 与 Cisco 对应 enterprise distribution，AMD 则可能作为替代性 silicon partner。

              这种 cap table 设计，明显是在对冲算力集中风险，同时为未来企业渠道铺路。


              唯一后续融资披露，是 Bloomberg 于 November 2025 的报道：TML 正在洽谈一轮新增融资，估值约 $50 billion。也就是说，公司上线不到 5 个月、且尚未披露任何公开收入前，估值就较
              seed 轮再抬升 4.2x。这会是 AI venture history 中最快的一次估值跳升之一。截至本次运行日期，这轮新融资既未官宣，也未确认完成，意味着谈判可能仍在推进、已经停滞，或是 TML 的
              runway 足够长，因此选择延后。


              公司没有披露 debt facility、project finance 或 credit line。其 PBC 结构也不要求超出 Delaware 常规公司治理之外的额外监管申报。Mira Murati
              已披露，其表决权高于董事会其余成员总和，这在 founder-led AI startup 中并不罕见，但对任何投资人权利协议分析都很关键。截至目前，外部资本总额明确可确认的只有 $2
              billion；公开信息里也没有任何 secondary transaction。
