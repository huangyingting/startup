      - number: '1.4'
        title: 产品、基础设施与合作伙伴
        blocks:
          - type: paragraph
            body: >
              Thinking Machines 的首款产品 Tinker 于 October 1, 2025 开启 private beta。Tinker 是一个 Python 原生 API，

              用于分布式 LLM 微调，并提供托管算力基础设施，让研究者与开发者无需自己管理 GPU 编排，也能运行小规模或大规模模型训练任务。

              Tinker 的核心做法是利用 LoRA（Low-Rank Adaptation）在多条并行训练任务之间共享算力池，在支撑前沿规模模型的同时压低单次训练成本。


              该 API 暴露了 low-level primitives（forward_backward、sample），足以表达大多数后训练方法，可用于自定义 RL 训练循环、SFT 以及实验性 pipeline。

              上线时支持的模型包括 Qwen-235B-A22B、Meta Llama 系列、Alibaba Qwen、OpenAI gpt-oss、DeepSeek V3.1 与 Moonshot AI Kimi K2
              Thinking。

              配套的开源库 Tinker Cookbook 提供常见后训练方法的参考实现。


              public beta 之前的学术早期采用者包括 Princeton 的 Goedel Team（形式化定理证明）、Stanford 的 Rotskoff Lab（化学推理）、Berkeley 的 SkyRL
              团队

              （多智能体 RL）以及 Redwood Research（AI control tasks）。定价策略则是先免费起步，之后切换到 usage-based pricing，从而降低学术用户和早期创业团队的进入门槛。


              在基础设施侧，Thinking Machines 已拿下两项显著降低算力风险的战略合作。March 2026，Nvidia 与 Thinking Machines 宣布一项多年期 gigawatt 级合作，

              至少部署 1 gigawatt 的 Nvidia Vera Rubin 系统，目标上线时间为 early 2027。Nvidia 同时也对公司进行了战略股权投资。April 2026，Thinking
              Machines

              又与 Google Cloud 签下 multibillion-dollar 合作（single-digit billions），可提前使用 Nvidia GB300 NVL72 GPU 系统；该系统相较前代
              GPU 在训练和服务速度上提升 2×。

              这项合作在 Google Cloud Next 2026 上公布，也是公司首个公开的公有云基础设施合作。
