      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              对一家处理敏感 AI 训练负载的公司来说，TML 已披露的 trust and safety 体系还很薄。其主要隐私承诺是数据隔离：据称 Tinker 在微调任务完成后不会保留训练数据，客户数据也不会被拿去提升
              TML 自有模型。这些只是企业级微调平台的基本门槛。截至 2026 年 5 月，TML 仍未公布正式的数据处理协议、面向企业客户的隐私政策，或安全白皮书。


              企业合规认证方面，SOC 2 Type II、ISO 27001、HIPAA、FedRAMP 均未公开宣布。这与 private beta 阶段基本一致，但一旦 TML
              开始打受监管企业垂类（金融、医疗、政府），就会立刻变成实质缺口。Google Vertex AI 和 Azure ML 这类对手都有完整企业合规栈，TML 没有。若要补齐认证，TML 在正式 GA 后还会有
              12-24 个月进不去受监管垂类。


              通过 Tinker 训练出的模型，其 AI 安全控制也是另一处缺口。Tinker 允许客户为任意用途微调 frontier 模型。TML 的 PBC 使命是 "ensuring AI is safe and
              beneficial"，这暗示公司对负责任使用有所承诺，但截至目前并未公布 acceptable use policy、模型安全过滤，或针对 Tinker
              训练模型的输出审核机制。对受监管行业里的企业客户，以及同样背负 AI 安全承诺的 Nvidia、Google Cloud 生态伙伴来说，这都是实质问题。


              训练流水线本身的质量控制，如作业成功率、收敛保证、可复现性，也都未公开。考虑到 frontier 模型微调本来就复杂，尤其是 MoE 架构，这构成了可信的可靠性风险。
            claimRefs:
