      - number: '8.6'
        title: 图示
        blocks:
          - type: callout
            title: $50B 估值要求公司在 3-5 年内做到 $2-5B ARR，这对 pre-revenue 公司是极端激进的假设
            body: >
              以 10-25x 的前瞻收入倍数计算（高增长 AI SaaS 的常见区间），若在 Series A 以 $50B 估值入场，意味着公司要在 3-5 年内做到 $2-5B ARR。TML 当前收入仍为零。若要在
              3-5 年内做到 $2B ARR，就得拿下预测中 $10-20B 微调 TAM 的 10-20%，同时还要和 Google、Microsoft、Amazon、Meta
              日益成熟的产品正面竞争。这并非不可能，但若拿不出足够的需求验证，概率并不高。
            calloutType: risk
            claimRefs:
              - CV006
              - CV012
              - CV023
          - type: callout
            title: 团队溢价确实存在，也说得通；问题在于它值不值 $50B
            body: >
              Murati、Schulman、Chintala 的组合，确实代表了顶级 AI 人才的高度集中。AI 进展当前最紧的约束就是人才稀缺，因此这支团队配得上溢价。$12B 的种子轮估值，大致意味着每位创始人对应
              ~$3-4B 的团队溢价；考虑到他们在 GPT-4、RLHF、PyTorch 上各自的贡献，这个定价还能自圆其说。到了 $50B，这部分溢价就更偏预期交易，而不是已被验证的价值。
            calloutType: strength
            claimRefs:
              - CV001
              - CV005
