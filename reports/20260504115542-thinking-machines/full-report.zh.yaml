      - number: '6.2'
        title: 具名客户验证与用例
        blocks:
          - type: paragraph
            body: >
              Princeton 的 Goedel Team 用 Tinker 做形式化数学和定理证明方向的 LLM 微调。其研究目标，是训练语言模型为 Lean 4 或 Coq 生成数学上有效的证明。这类任务需要与
              theorem prover 反馈联动的迭代式 on-policy 训练，恰好对应 sample 原语的能力边界。对研究社区来说，这是高价值用例，因为定理证明 LLM 本身就在研究前沿；Princeton 采用
              Tinker，构成了很强的社会证明。


              Stanford 的 Rotskoff Lab 聚焦计算化学和分子动力学。为化学场景微调科学 LLM，需要领域专属数据，也要求对训练过程有精细控制，避免已有科学知识发生灾难性遗忘。Tinker 的 LoRA
              路线既能保住基础模型能力，又能加入领域特异性，这正是化学微调所需。Rotskoff Lab 采用 Tinker 之所以值得看重，是因为科研客户通常对数据治理要求更高，因而本身就是更严格的平台质量评估者。


              UC Berkeley 的 SkyRL 团队使用 Tinker 做强化学习研究，具体是用模型生成的 rollouts 训练 RL agents。这会高强度使用 sample 原语，在 GRPO/PPO
              训练循环中做 on-policy 数据采集。基于 RL 的微调，本来就是最吃算力的微调范式；Berkeley 的采用，验证了 Tinker 能承载生产级 RL 训练负载。


              AI 安全组织 Redwood Research 则用 Tinker 做对齐研究，包括 adversarial training、preference learning 和 constitutional AI
              实验。Redwood 是 TML 能拿到的最有分量的外部验证者之一：它是独立 AI 安全组织，没有商业动机为 TML 基础设施背书。其采用，本身就是 Tinker 基础设施足够可靠、能支撑
              safety-critical 研究工作流的强信号。
            claimRefs:
              - CU005
