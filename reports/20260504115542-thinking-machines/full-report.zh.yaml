  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: >
              支撑 TML 的投资论点，主要有四个相互强化的优势。第一是团队：Mira Murati 曾以 OpenAI CTO 身份负责 GPT-4、DALL-E、Codex 和 Whisper；John Schulman
              是 PPO 和现代 LLM 核心 RLHF 算法的创建者；Soumith Chintala 则创建了 PyTorch。这可能是 AI 基础设施史上密度最高的 founding
              team。若真有团队能做出主导性的微调平台，大概率就是这一组。第二是时点：随着 open-weight 模型爆发，Llama、Qwen、DeepSeek 等持续涌现，LLM 微调市场正处在拐点，市场急需无需自建
              ML 工程团队也能上手的微调基础设施。第三是架构：Tinker 的可组合原语设计（forward_backward、sample）确实是开发者体验层面的创新，竞争对手还没复刻。第四是基础设施：Nvidia 1GW
              合作和 Google Cloud 交易，为 TML 带来了一个资本受限竞争者很难复制的 10 年算力护城河。


              反论点同样很强。Fine-tuning 正在商品化：开源工具（Unsloth、Axolotl、LLaMA-Factory）月月进步；hyperscaler 提供的是带完整企业合规栈的托管微调，而 TML
              没有；五位联合创始人中三位首年离开，其中包括原 CTO 和一位关键研究者，且两人都去了 OpenAI；产品上线七个月后，TML 仍没有收入、没有定价、没有单元经济，也没有企业客户；而 $50B
              估值目标，在没有收入证据时隐含的预期已经到了数学意义上的激进水平。团队确实顶级，但在一个快速商品化的市场里，再强的团队通常也只能在市场结构反扑前领先一小段时间。
