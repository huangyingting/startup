  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              TML 面临多套相互叠加的监管框架，构成了实质性监管风险，其中影响最大的是 EU AI Act（Regulation 2024/1689，2024 年 8 月生效，GPAI 义务自 2025 年 8
              月起适用）。按照 EU AI Act，具备系统性风险的通用 AI 模型（GPAI models）提供方，需要履行模型评估、事故报告和对抗测试等义务。Tinker 本身不是 GPAI 模型，它是微调平台；但 TML
              在托管集群上维护基础模型权重（Qwen-235B-A22B、DeepSeek V3.1、Llama 3.x），这件事本身可能落入法案中 “making available” GPAI 模型的范围。TML
              在欧洲的法律暴露尚不明确，但影响不小：只要面向 EU 企业客户签约，TML 就必须先证明自己符合 EU AI Act。


              在美国，最直接的法律风险来自版权。微调产物，即 LoRA adapter 加基础模型权重，可能以尚未被法院最终厘清的方式吸收了受版权保护的训练数据。Getty Images v. Stability
              AI、Andersen v. Stability AI、New York Times v. Microsoft/OpenAI 等在审案件，正在形成可能约束 AI 训练方法的判例。TML 使用
              open-weight 基础模型，并不能完全隔离自己：这些基础模型自身的训练数据可能遭遇挑战，而若在 proprietary data 上微调时处理不当，TML 也可能面临次级责任。


              Meta 的 Llama Community License 对月活超过 700M 的实体限制商业使用，并对衍生模型分发设定条件。TML 的服务会商业化分发基于 Llama 训练出的 LoRA
              adapters，因此其对 Llama 权重的商业使用要受该许可证约束。若 Meta 日后收紧商业微调访问（其在部分地区已这样做），TML 就得把 Llama 从支持模型列表里拿掉，这会明显削弱产品广度。


              数据隐私监管，如 EU 的 GDPR、California 的 CCPA，以及美国各州新兴法规，也对处理 AI 训练中个人数据的实体施加义务。TML
              宣称不会保留客户训练数据，但这并未回答更关键的问题：如果基础模型推理或微调过程涉及包含个人信息的数据，是否需要依据 GDPR Article 22 获得数据主体同意。
