      xAxis: 产品成熟度（1=pre-alpha，5=enterprise-ready）
      yAxis: 微调能力（1=无，5=专门打造）
      points:
        - label: TML Tinker
          x: 2
          'y': 4.5
        - label: OpenAI
          x: 5
