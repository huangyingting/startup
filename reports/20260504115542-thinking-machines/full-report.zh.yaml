  - id: FP003
    title: 护城河 / 就绪度 KPI——TML Tinker 竞争力评分卡
    type: kpi
    layout: standard
    summary: |
      这是一张紧凑的 KPI 评分卡，从五个维度评估 TML Tinker 的竞争耐久性：
      模型接入、技术差异化、分发、定价成熟度和合规。结果很清楚：模型接入和技术差异化很强，但定价成熟度和合规就绪度是关键短板；若不先补上，TML 很难把企业机会真正转成收入。
    data:
      items:
        - label: 模型接入（235B+ MoE）
          value: Strong
          description: 独家托管接入 Qwen-235B；目前没有竞品能对标
        - label: API 技术差异化
          value: Strong
          description: forward_backward / sample 原语；no-code 竞品做不到
        - label: 研究分发（Princeton、Stanford、Berkeley）
          value: Moderate
          description: 已有点名早期采用者；但采用深度和转化管道仍不清楚
        - label: 定价成熟度
          value: Weak
          description: 产品上线 7 个月仍无公开定价；企业销售管道因此跑不起来
        - label: 企业合规（SOC2 / HIPAA）
          value: Unknown
