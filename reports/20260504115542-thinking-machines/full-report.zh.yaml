  - id: FM001
    title: 市场规模金字塔——TAM、SAM 与 SOM
    type: pyramid
    layout: standard
    summary: |
      针对 Thinking Machines Lab 微调市场的三层规模金字塔。TAM
      是 LLM 微调服务与编排市场的合计规模（2025 年为 $6B）。SAM
      是新进入者在北美可触达、以 API 驱动且聚焦开发者 / 研究者的细分市场
      （$1–3B）。SOM 则是在私测阶段、定价尚未成熟的前提下，TML 近期开现实可拿到的市场规模
      （未来 18 个月约为 $50–100M）。
    data:
      items:
        - label: TAM
          value: 6
          unit: $B
          description: LLM 微调 + 编排服务（2025 年，全球）
        - label: SAM
          value: 2
          unit: $B
          description: API 驱动、面向开发者 / 研究者的微调市场，聚焦北美
        - label: SOM
          value: 0.1
          unit: $B
          description: TML 近期可获取市场（18 个月窗口，GA 前）
    approximationNotes: TAM 由 Dataintelo 的 $2.8B 与估算编排市场 $3.2B 相加得出。SAM 基于北美占比（41%）和研究者 / 开发者子市场做自下而上估算。SOM 则是针对私测阶段、尚未公布定价的定性估算。
