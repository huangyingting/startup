  - id: FM003
    title: 买家与细分地图——技术成熟度 vs 组织规模
    type: matrix
    layout: standard
    summary: >
      以组织规模（小到大）和技术成熟度（低到高）为两条轴，对 LLM 微调服务的买家细分进行映射。TML 当前的 Tinker 产品瞄准右上象限：技术成熟度高、规模中小的组织，例如研究实验室和 AI
      原生创业公司。右侧中部的企业客户，是未来扩张机会。
    data:
      columns:
        - label: 技术成熟度低
        - label: 技术成熟度中
        - label: 技术成熟度高
      rows:
        - label: 小型组织（< 50 人）
          values:
            - 暂不可覆盖——需要 no-code 工具
            - 个人开发者、独立研究者
            - TML 的核心目标——研究实验室、AI 安全机构（Princeton、Redwood）
        - label: 中型组织（50-500 人）
          values:
            - 暂不可覆盖
            - 配有 ML 团队的 AI 原生创业公司
            - 配有资深 ML 人员的 AI 原生创业公司——TML 的次级目标
        - label: 大型企业（500+ 人）
          values:
            - 云厂商现有工具（Vertex AI、Azure）
            - 企业级 ML 平台（SageMaker、Databricks）
            - TML 未来的企业机会（前提是补齐 SOC2、合规）
        - label: 学术 / 研究机构
          values:
            - 暂不可覆盖
            - 使用更高层框架的应用研究团队
            - TML 核心细分——拿到算力资助的大学 AI 实验室
    approximationNotes: 细分边界是定性的。技术成熟度用 ML 工程师人数和模型训练履历作近似衡量。
