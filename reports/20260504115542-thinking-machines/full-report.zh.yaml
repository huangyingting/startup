      - number: '6.4'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              Tinker 尚未披露任何留存数据，包括 NRR、GRR、流失率、续约率或 cohort 分析。处于 private
              beta、且大概率免费或补贴使用的阶段，这些指标本来也没太大意义：免费产品的用户流失，和付费客户流失不是一回事。真正能说明问题的留存证据，要等产品 GA 之后追踪付费客户行为。


              当前学术客户群内部的扩张空间也有限，因为研究预算本来就不大。即便 Princeton、Stanford、Berkeley 和 Redwood Research
              全部转成付费客户，合计每年在微调算力上的支出，可能也只有 $100K-$1M，对 TML 这个体量来说不具实质性。要打进企业，TML 需要的是完全不同的产品层级、销售动作、合规体系和定价模型。


              客户集中风险很高：目前仅披露 4 个账户、0 个企业客户，TML 未来收入高度依赖于把研究社区变成企业销售的分发渠道和线索池。如果研究社区把 Tinker
              采纳为默认微调工具，企业团队才会顺着研究团队选择跟进，这更像 OpenAI 从 ChatGPT 走向企业市场的路径。但这条路需要更长时间，也要求 TML 成功完成带企业定价与功能的 GA 发布。


              目前没有披露任何合作伙伴或渠道依赖。Nvidia 和 Google Cloud 是基础设施伙伴，不是销售渠道。ServiceNow 和 Cisco 是战略投资人，但它们是否会成为 TML
              面向企业销售的分发渠道，尚未披露。这是一个缺口：Cisco 和 ServiceNow 合计触达数千个企业 IT 部门，本可以是很有价值的渠道杠杆。
