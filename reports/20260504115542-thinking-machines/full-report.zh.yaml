      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              有几股结构性力量正在推动 LLM 微调市场加速增长。第一，高质量开放权重模型快速扩散，包括 Meta Llama 3.1/3.2、Alibaba Qwen-235B-A22B、DeepSeek V3.1 与
              Kimi K2，

              这直接扩大了可定制基础模型的供给，也同步放大了微调工具的需求。第二，参数高效微调方法（LoRA、QLoRA、DoRA）显著降低了适配成本，使没有 petaflop 级基础设施的团队也能做
              fine-tuning。第三，企业对领域准确率、数据隐私与合规材料的要求提升，推动需求从通用云 AI API 向定制 fine-tuned model 转移。第四，AI 基础设施投资周期仍在向上：Nvidia 的
              gigawatt 级承诺、Google 的数据中心扩张与 hyperscaler capex 增长，都在推高可用算力供给，而这通常会随时间压低微调成本。


              约束同样具有结构性。GPU 供应链仍高度依赖 Nvidia；虽然供给在增长，但需求增长更快，导致微调成本仍处高位。EU AI Act 为高风险 AI
              系统引入新的合规义务，也增加了欧洲企业采用摩擦。与此同时，已有深厚资本与渠道积累的 incumbent 玩家——OpenAI fine-tuning API、Google Vertex AI、AWS
              SageMaker、Azure ML——已经拥有 enterprise relationship、SOC2 认证与 procurement integration，

              对已经跑在 hyperscaler 生态里的企业来说，切换成本很高。最后，AI 人才高度集中在少数机构，也让近期可服务的研究用户盘子天然有限。
            claimRefs:
              - CM007
