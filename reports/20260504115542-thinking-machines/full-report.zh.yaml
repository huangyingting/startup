          - type: callout
            title: 可组合原语是真正的开发者体验护城河
            body: >
              目前没有其他商业化微调 API 会把梯度级原语开放出来，并允许用户在 Python 里自由组合。forward_backward + sample
              这套组合，让团队不用自己扛基础设施，也能实现任意训练算法。这对研究员极具吸引力，而 hyperscaler 平台如果不牺牲现有更严格的安全和运营模型，短期内很难快速复制。
