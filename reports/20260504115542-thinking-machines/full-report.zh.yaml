      - - Anthropic
        - Series E（2025 年初）；报道估值 $61.5B；估算 ARR 为 $2-3B
        - 约 20-30x trailing ARR；10-15x forward ARR
        - 最接近的可比：兼具研究与商业化的 AI 实验室；安全品牌强；团队履历可比
        - Anthropic 拥有 Claude（专有模型）；TML 依赖第三方开放权重模型；在相近阶段里，Anthropic 的护城河更深
      - - OpenAI
        - 最近一次报道估值超过 $300B（2024）；估算 ARR 为 $3-5B
        - 约 60-100x trailing ARR；随收入增长，倍数在回落
        - 为 AI 实验室估值设定了天花板；研究走向商业化的路径也可比
        - OpenAI 是绝对市场龙头；TML 规模小得多，直接对标会把 TML 的隐含倍数抬得过高
      - - Safe Superintelligence (SSI)
        - 以约 $32B 估值融资 $1B（2024）；纯产品前研究
        - 不适用——尚无产品；本质是纯创始人期权溢价
        - 与 TML 尚未产生收入、研究优先的定位最接近；同样由前 OpenAI 成员（Sutskever）创立
        - SSI 没有商业产品意图；TML 在做商业化微调 API，退出路径不同
      - - Mistral AI
        - Series B（2024 年 6 月）；估值 €6 billion；已有商业化 LLM API 产品
        - 约 6x 估算 ARR；ARR 低于 $100M
        - 开放权重 AI 模型公司，也有商业 API；所处欧洲监管环境相近
        - Mistral 是 AI 模型公司，不是微调平台；产品策略与 TML 不同
      - - Cohere
        - 晚期私营公司；估值约 $5B（2024）；做企业 NLP / LLM API
        - 约 5-10x 估算 ARR
        - 企业 AI API 公司；其企业 GTM 路径对 TML 的未来路径有参考价值
        - Cohere 已有企业收入；TML 的企业化计划还完全没被验证
      - - xAI (Grok)
        - 估值 $45B（2024）；$6B Series C；面向消费者的 AI 助手
        - 高倍数；企业业务线上仍偏收入前阶段
        - 又一个前 frontier lab 创始人（$TSLA / SpaceX）从零搭建；创始人溢价很高
        - 市场不同（消费级 AI vs. 微调 API）；Musk 的分发优势不是 TML 能复制的
    claimRefs:
      - CV006
      - CV007
      - CV008
      - CV009
      - CV010
