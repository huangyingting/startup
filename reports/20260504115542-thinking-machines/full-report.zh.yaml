      - number: '7.4'
        title: 财务与市场结构性风险
        blocks:
          - type: paragraph
            body: >
              TML 的财务风险，主要由算力 capex 义务的不确定范围主导。Google Cloud 的 multi-billion dollar 交易和 Nvidia 1GW 合作，可能对应总计 $1-3B 的
              capex 承诺，而公司种子轮只融了 $2B。若这些承诺快速兑现，资金跑道可能从原先估算的 10-25 年压缩到 2-5 年。在 $12B 估值、且当前仍是 pre-revenue 阶段的情况下，TML 对
              capex 加速几乎没有财务缓冲，除了继续融资别无他法。


              市场结构性风险同样不小。Fine-tuning as a service 正同时受到三股商品化力量挤压：第一，开源工具（PyTorch
              FSDP、DeepSpeed、Unsloth）持续变强，降低了托管平台存在的基础设施门槛；第二，hyperscaler（Google Vertex AI、Azure ML、AWS
              SageMaker）正扩大微调能力，而它们在合规、可靠性和价格上都拥有 TML 当前无法匹配的优势；第三，定位相似的新玩家，如果也主打研究级 fine-tuning API，可能在 TML
              建立规模优势前先把它的差异化吃掉。


              若 AI 投资市场出现整体回调，TML 会首当其冲，因为其 pre-revenue 估值极端，$12B 对应零收入，而同等估值公司通常已有明确收入基础。若下一轮融资低于 $50B
              目标，无论是受市场环境还是竞争变化影响，TML 都会面临 down-round，不仅稀释现有投资人，也可能打击团队士气和招聘能力。


              来自 Meta 的竞争风险尤其容易被低估。Meta 既有雄厚财力，也掌握 Llama 模型家族，并且本身就深度介入微调工具生态，Meta 的 fine-tuning 基础设施就是内部自建的。若 Meta
              决定推出公开的 Llama fine-tuning API，TML 最具辨识度的一个用例会被立刻打穿。
