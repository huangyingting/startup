      - number: '5.2'
        title: 产品架构与技术栈
        blocks:
          - type: paragraph
            body: >
              Tinker 的架构分三层：面向开发者的 Python API、托管编排层，以及底层算力层。


              Python API 层把 forward_backward 和 sample 作为核心原语暴露出来。forward_backward 接收一组训练样本（每个样本包含 prompt/completion
              对及可选元数据），返回梯度、loss 值，以及可选的中间 activations。sample 接收一个或一组 prompt，返回模型 completions 及其 log probabilities，从而支持
              RLHF 的 on-policy 数据生成。这两个原语都强调可组合性，用户可以直接在 Python for-loop 里串起来，实现几乎任何自定义训练算法。Python SDK 则透明处理
              batching、tokenization 和 serialization。


              编排层负责作业调度、LoRA rank/target 配置、多 GPU 分发、容错、checkpointing 和 metering。TML 采用共享 LoRA
              池模型：多个训练作业可以同时复用同一套基础模型权重，每个作业只维护各自独立的 LoRA adapter。这个 shared-pool 设计降低了 GPU 内存占用，也让 TML
              能在同一集群上并发运行更多微调任务，而不必为单个客户独占整台服务器。


              底层算力来自 TML 自建 GPU 集群，目前以 Nvidia Blackwell 架构为主，可通过 2026 年 4 月的 Google Cloud 交易获得；按 Nvidia 1GW 合作规划，2027
              年起还将扩展到 Vera Rubin 芯片。GPU kernel 执行靠 TileLang 优化。这是一种开源、嵌入 Python 的 kernel 语言，能让 TML 编写 tile-based GPU
              程序，在 mixed-precision 训练负载下拿到比标准 CUDA 库更好的内存利用率。2025 年发表的 batch invariance 研究则在解决 LoRA 训练的一个核心问题：大模型上训练
              LoRA adapter 时，梯度行为会随 batch 组成变化而波动，进而带来不稳定。TML 的 kernel 重构消除了这类方差，让不同 batch 类型下的微调更稳定、效率也更高。
            claimRefs:
              - CE004
              - CE005
