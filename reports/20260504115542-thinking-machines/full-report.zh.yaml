      - number: '7.2'
        title: 运营与基础设施风险
        blocks:
          - type: paragraph
            body: >
              TML 的运营风险，核心来自其自有托管基础设施模式。与依托公有云、享受 hyperscaler 可靠性担保的竞品不同，TML 运行的是自建 GPU 集群，且未披露 SLA、可用性承诺或灾备方案。共享 LoRA
              池架构还带来一个具体风险：如果基础模型权重损坏、集群宕机，或调度 bug 导致作业失败，所有共用该基础模型的并发用户都会同时受影响。多租户基础设施故障还可能让客户训练数据暴露给相邻租户，或造成微调
              checkpoint 的灾难性丢失。


              基础设施集中度风险很高。对 Blackwell 集群的依赖意味着，只要 Nvidia GPU 供应出现扰动，无论是美中出口管制、制造延迟，还是产能优先分配给更大客户，TML 的服务能力都会被直接压缩。公司已宣布
              2027 年迁移到 Vera Rubin 芯片，这也引入过渡风险：TML 的 TileLang kernels 目前是围绕 Blackwell 优化的，换到 Vera Rubin 后，内核要做不小规模的重写。


              从公开披露看，网络安全风险被明显低估。一个承载敏感 AI 训练负载的平台，可能处理 proprietary company data、classified research data，或 personally
              identifiable information，本身就是高价值攻击目标。TML 尚未公布渗透测试结果、安全审计或 bug bounty 计划。对任何评估 Tinker 的企业客户来说，这都是实质缺口。


              大规模 MoE 模型（Qwen-235B、DeepSeek V3.1）的训练可靠性本来就很难。MoE 微调存在已知不稳定风险，包括 expert collapse、routing degradation 和
              gradient explosion。没有公开的收敛保证或作业成功率数据，用户就无法判断 TML 是否足以支撑生产级工作流。
