  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Thinking Machines Lab 所处的位置，是两个同心市场的交叉点。最内层是 LLM 微调与定制化服务市场，即为开发者和研究人员提供平台与
              API，帮助他们把预训练的开放权重语言模型适配到特定任务、行业或行为目标上。该细分市场在 2025 年估计约为 $2.8 billion，包含托管微调 API、自托管微调编排框架及相关工具；

              但不包含原始 GPU 云算力（AWS、GCP、Azure bare-metal）、纯推理托管，也不包含 proprietary 闭源模型 API（例如不含微调能力的 OpenAI GPT-4 API）。


              第二层是更广义的生成式 AI 模型终端用户市场，涵盖用户在获取、定制与落地生成式 AI 模型输出上的支出。Gartner 预计该市场在 2025 年为 $14.2 billion，到 2029 年增至 $75
              billion。

              最外层则是总 GenAI IT 支出，Gartner 给出的 2025 年数字为 $644 billion，但这一口径主要被 hardware（devices 和 servers）拉高，并不是软件 API
              厂商真正能触达的市场。MarketsandMarkets 估算核心 GenAI software and services 市场在 2025 年为 $71.36 billion，按 43.4% CAGR 增长到
              2032 年的 $890 billion，不过这一定义更宽，也包含云 AI 基础设施。


              对 Tinker 而言，当前最现实的替代方案有 3 类：一是自己在原始 GPU 集群上做 fine-tuning（运维负担高）；二是根本不做定制，直接用 base model；三是采用云厂商的
              fine-tuning 服务（AWS SageMaker、Google Vertex AI fine-tuning、Azure OpenAI Service fine-tuning）。相邻市场则包括
              RLHF/post-training 平台（Scale AI、Labelbox）、模型评估框架与 AI 可观测性工具。
