  - id: FV001
    title: 推荐逻辑：从证据到投资决策
    type: flow
    layout: wide
    summary: |
      这条逻辑链展示了五类关键证据（市场、产品、团队、财务、风险）如何汇总成“继续研究”的建议。
      每个维度先单独评估，最终由合并信号给出整体建议。
    data:
      nodes:
        - id: rl1
          label: 市场：TAM 大（2030 年 $10-50B）；高增长；仍处早期
        - id: rl2
          label: 产品：有差异化（可组合原语）；pre-GA；无定价
        - id: rl3
          label: 团队：极强（Murati、Schulman、Chintala）；已有 3 名联合创始人离开
        - id: rl4
          label: 财务：已融资 $2B；收入几乎为零；capex 不透明
        - id: rl5
          label: 风险：高（监管、人员、算力依赖、商品化）
        - id: rl6
          label: 建议：在 $50B 估值下继续研究；若估值在 $20-40B 且补足证据，可考虑投资
      edges:
        - from: rl1
          to: rl6
          label: 支撑论点
        - from: rl2
          to: rl6
          label: 部分支撑
        - from: rl3
          to: rl6
          label: 强支撑
        - from: rl4
          to: rl6
          label: 在 $50B 处构成阻断
        - from: rl5
          to: rl6
          label: 抬高所需证据门槛
    claimRefs:
      - CV020
      - CV021
      - CV022
      - CV023
      - CV001
  - id: FV002
    title: 估值敏感性：支撑入场价格所需的隐含 ARR
    type: bar
    layout: standard
    summary: |
      这张柱状图展示了在 10x 和 25x 远期收入倍数下，支撑各估值水平所需的隐含 ARR（这是高增长 AI SaaS 的常见区间）。
      若估值达到 $50B，TML 需要 $2-5B ARR，这要求极强的市场执行。
    data:
      items:
        - label: $12B 估值 @ 25x
          value: 480
          unit: $M ARR needed
        - label: $12B 估值 @ 10x
          value: 1200
          unit: $M ARR needed
        - label: $25B 估值 @ 25x
          value: 1000
          unit: $M ARR needed
        - label: $25B 估值 @ 10x
          value: 2500
          unit: $M ARR needed
        - label: $50B 估值 @ 25x
          value: 2000
          unit: $M ARR needed
        - label: $50B 估值 @ 10x
          value: 5000
          unit: $M ARR needed
    approximationNotes: ARR 要求按估值 / 收入倍数计算。这代表在给定倍数下，让入场价格成立所需的稳态远期 ARR。高增长 AI 公司一度拿到过 25-50x；TML 随着规模扩大，其倍数会收缩。
    claimRefs:
      - CV006
      - CV007
      - CV012
      - CV013
  - id: FV003
    title: 估值 / 回报区间：Seed 投资人的情景结果
    type: range
    layout: standard
    summary: |
      这张图展示了 TML seed 投资人在三种情景下的估值结果区间（按 $12B post-money 入场），
      对应 2030-2033 时间框架内的估算退出估值。
    data:
      items:
        - label: 退出估值（悲观情景，2031-2033）
          low: 5
          mid: 12
          high: 20
          unit: $B
        - label: 退出估值（基准情景，2030-2032）
          low: 25
          mid: 45
          high: 65
          unit: $B
        - label: 退出估值（乐观情景，2029-2031）
          low: 50
          mid: 80
          high: 120
          unit: $B
        - label: Series A 入场价格（报道目标）
          low: 40
          mid: 50
          high: 65
          unit: $B
        - label: 公允价值区间（当前证据支持）
          low: 8
          mid: 20
          high: 35
          unit: $B
    approximationNotes: >-
      所有估值都是分析师情景推演。悲观情景假设困境收购；基准情景假设成功 GA + $20-30M ARR + 战略收购；乐观情景假设成功 IPO 或在高点完成战略收购。'Fair value range'
      是运行当日基于现有证据给出的分析师估值区间。
    claimRefs:
      - CV012
      - CV013
      - CV014
      - CV015
      - CV023
  - id: FV004
    title: 投资 KPI：面向 IC 的 TML 评分
    type: kpi
    layout: wide
    summary: |
      这张七维投资评分卡反映的是 TML 在运行当日的判断。分数衡量的是公开证据质量，
      不一定等同于 TML 内部真实表现。5/5 代表公开证据极强；1/5 代表证据偏弱或缺失。
    data:
      items:
        - label: 市场规模与增长
          value: 4
          unit: /5
          description: 2030 年 TAM 达 $10-50B；微调市场高增长；多家分析机构有充分论证
        - label: 产品差异化
          value: 3
          unit: /5
          description: 可组合原语是真正创新；仍处 pre-GA；无定价；无企业功能
        - label: 团队质量
          value: 5
          unit: /5
          description: Murati/Schulman/Chintala；在微调基础设施领域属于顶级创始团队；多名联合创始人离开拉低了评分
        - label: 财务证据
          value: 1
          unit: /5
          description: 收入几乎为零；无定价；无 unit economics；capex 不透明；$2B 融资是唯一财务锚点
        - label: 客户验证
          value: 2
          unit: /5
          description: 4 个可信研究用户；都来自创始人网络；无企业客户；无留存数据
        - label: 风险画像
          value: 2
          unit: /5
          description: 监管、人员、算力和竞争风险都高；多项未缓释；已有 3 名联合创始人离开
        - label: 估值纪律
          value: 2
          unit: /5
          description: $12B seed 属于市场出清价；$50B 目标意味着当前收入倍数约 5,000x；在 $50B 入场的风险调整后回报不具吸引力
    claimRefs:
      - CV001
      - CV006
      - CV020
      - CV021
      - CV022
      - CV023
