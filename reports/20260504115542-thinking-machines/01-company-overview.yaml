  - id: s5
    title: Milestones, Adverse Events, and Governance Context
    body: |
      Thinking Machines Lab's first fifteen months present a compressed timeline of
      exceptional capital formation, product launch, and leadership turbulence. The company
      went from stealth launch to $12 billion seed round in five months, then to first
      product launch (Tinker) five months after that, and then to two transformational
      infrastructure partnerships (Nvidia and Google Cloud) within a six-month window
      through April 2026.

      Against this positive trajectory, the company experienced three co-founder departures
      within its first year. The October 2025 departure of Andrew Tulloch followed Meta's
      aggressive recruitment campaign, including a reported nine-figure personal package.
      The January 2026 departures of Barret Zoph (CTO) and Luke Metz were more jarring:
      both returned to OpenAI, and Wired's reporting characterized Zoph's exit as not
      amicable. Among the founding six co-founders (Murati, Schulman, Zoph, Weng, Tulloch,
      Metz), only Murati, Schulman, and Weng remain as of run date. Soumith Chintala has
      been added as CTO but was not a founding member.

      The governance context has several noteworthy features. The public benefit corporation
      structure imposes a mandate to consider stakeholder interests beyond shareholders,
      similar to OpenAI Group PBC and Anthropic. Murati's super-voting control concentrates
      strategic authority in the CEO, which reduces overthrow risk but also concentrates
      key-person exposure. The Meta acquisition attempt reinforces the scarcity value
      ascribed to Thinking Machines' research team by strategic acquirers, while also
      confirming the team's susceptibility to external poaching.

      Looking forward, the November 2025 Bloomberg report on a potential $5 billion round
      at $50 billion valuation—if completed—would represent one of the most rapid
      valuation step-ups in startup history and would place the company's paper valuation
      within the range of established late-stage AI unicorns. This remains an unresolved
      evidence gap as of run date.
