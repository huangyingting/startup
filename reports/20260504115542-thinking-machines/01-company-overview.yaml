  - id: s3
    title: Capital Base, Valuation, and Investor Map
    body: |
      Thinking Machines Lab closed a $2 billion seed round on July 15, 2025—the largest
      seed round in Silicon Valley history at the time, according to Crunchbase News.
      The post-money valuation was $12 billion, confirmed by TechCrunch directly from a
      company spokesperson. Bloomberg had earlier reported a $10 billion valuation as the
      round was approaching its close in June 2025; the final figure was higher. Andreessen
      Horowitz (a16z) led the round. Co-investors included Nvidia, Accel, ServiceNow,
      Cisco, AMD, and Jane Street—a mix of strategic technology partners and diversified
      financial investors. The strategic participation of Nvidia is particularly notable
      given the subsequent March 2026 gigawatt-scale compute partnership.

      By November 2025, Bloomberg reported that Thinking Machines was in talks to raise
      approximately $5 billion at approximately $50 billion valuation—a potential
      four-fold valuation step-up in less than five months. As of run date, this round
      has not been confirmed as closed. No secondary transactions or debt facilities have
      been publicly disclosed.

      The company also received a significant equity investment from Nvidia as part of
      the March 2026 strategic partnership announcement—amount undisclosed. This appears
      to be a separate commitment from Nvidia's participation in the seed round. Total
      disclosed capital raised as of run date is $2 billion (seed round), with potential
      additional undisclosed amounts from Nvidia's strategic investment.

      Meta reportedly attempted to acquire Thinking Machines Lab in 2025. Murati rejected
      this approach; TechCrunch reported the discussions never progressed to a final offer.
      Mark Zuckerberg subsequently pursued individual employee recruitment, including a
      reported package of up to $1.5 billion offered to Andrew Tulloch over six years.
