company:
  name: Thinking Machines Lab
chapter:
  number: 1
  title: Company Overview
  summary: |
    Thinking Machines Lab is a San Francisco-based AI research and product company founded
    February 18, 2025 by former OpenAI CTO Mira Murati alongside six co-founders—all
    prominent OpenAI alumni. The company is organized as a public benefit corporation and
    closed a record-breaking $2 billion seed round at a $12 billion valuation on July 15,
    2025, led by Andreessen Horowitz with participation from Nvidia, Accel, ServiceNow,
    Cisco, AMD, and Jane Street. By run date, Thinking Machines has launched its first
    product (Tinker, an API for distributed LLM fine-tuning), announced a gigawatt-scale
    strategic partnership with Nvidia (March 2026), and signed a multibillion-dollar Google
    Cloud infrastructure deal (April 2026). The leadership team has undergone material
    changes: three co-founders departed in late 2025 / early 2026, including CTO Barret
    Zoph and co-founder Luke Metz, both of whom returned to OpenAI. Soumith Chintala
    (PyTorch co-creator, ex-Meta VP) joined as CTO in January 2026.
sections:
  - id: s1
    title: Identity, Mission, and Operating Model
    body: |
      Thinking Machines Lab is an AI research and product company incorporated as a public
      benefit corporation and headquartered in San Francisco, California. The company came
      out of stealth on February 18, 2025 under the leadership of Mira Murati, formerly
      Chief Technology Officer of OpenAI. Unlike a conventional Delaware C-corp structure,
      the public-benefit-corporation form signals an explicit stakeholder obligation beyond
      shareholder returns—an organizational choice consistent with the company's mission
      of democratizing AI access and advancing open science.

      The company's stated mission is "Building a future where everyone has access to the
      knowledge and tools to make AI work for their unique needs and goals." Three pillars
      flow from this mission: helping people adapt AI systems to their specific needs,
      developing strong foundations for more capable AI, and fostering open science through
      shared research, code, and technical blog posts. This approach contrasts with closed
      proprietary lab strategies and positions Thinking Machines alongside Anthropic (also
      a PBC) in mission-governance-weighted AI.

      The operating model at launch combined frontier model research with an emerging
      managed-service product layer. Tinker, the first product, monetizes training
      infrastructure expertise through usage-based pricing while giving researchers a
      Python-native API that abstracts away distributed training complexity. The company
      has stated that Mira Murati holds voting powers that outweigh the rest of the board
      of directors, giving her unusual founder control compared to peer companies at the
      same stage.

      Built In reports the company now has more than 50 people following the addition of
      Soumith Chintala and other hires since launch. As of run date, the team spans
      former researchers from OpenAI, Meta (including PyTorch), Character AI, Google
      DeepMind, and Mistral.
