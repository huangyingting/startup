  - id: s4
    title: Product, Infrastructure, and Partnerships
    body: |
      Thinking Machines' first product, Tinker, launched in private beta on October 1,
      2025. Tinker is a Python-native API for distributed LLM fine-tuning that provides
      managed compute infrastructure, allowing researchers and developers to run small or
      large model training jobs without managing GPU orchestration. At its core, Tinker
      uses LoRA (Low-Rank Adaptation) to share compute pools across multiple concurrent
      training runs, lowering per-run costs while enabling frontier-scale models.

      The API exposes low-level primitives (forward_backward, sample) that can express
      most post-training methods, enabling custom RL training loops, SFT, and
      experimental pipelines. Supported models at launch include Qwen-235B-A22B, Meta
      Llama family, Alibaba Qwen, OpenAI gpt-oss models, DeepSeek V3.1, and Moonshot AI
      Kimi K2 Thinking. An open-source companion library, the Tinker Cookbook, provides
      reference implementations of common post-training methods.

      Early academic adopters before the public beta included Princeton's Goedel Team
      (formal theorem proving), Stanford's Rotskoff Lab (chemistry reasoning), Berkeley's
      SkyRL group (multi-agent RL), and Redwood Research (AI control tasks). Pricing
      started free to start with usage-based pricing to follow, lowering the barrier for
      academic and early-stage users.

      On the infrastructure side, Thinking Machines has established two strategic
      partnerships that significantly de-risk compute access. In March 2026, Nvidia and
      Thinking Machines announced a multi-year gigawatt-scale partnership committing to
      at least one gigawatt of Nvidia Vera Rubin systems, with deployment targeted for
      early 2027. Nvidia also made a strategic equity investment in the company. In April
      2026, Thinking Machines signed a multibillion-dollar Google Cloud deal (single-digit
      billions) providing early access to Nvidia GB300 NVL72 GPU systems, which provide
      a 2× improvement in training and serving speed compared to prior-generation GPUs.
      This was announced at Google Cloud Next 2026 and is the company's first public cloud
      infrastructure partnership.
