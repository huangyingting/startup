  - id: s2
    title: Founders, Leadership, and Key-Person Dependence
    body: |
      Thinking Machines Lab launched with an exceptionally strong founding team drawn
      predominantly from OpenAI's senior research and product leadership. Mira Murati
      (CEO) joined OpenAI in 2018 as VP of applied AI and partnerships, was promoted
      to CTO in 2022, led ChatGPT, DALL-E, and Codex/GitHub Copilot, and briefly
      served as interim CEO during the November 2023 boardroom crisis before leaving
      OpenAI in September 2024. John Schulman (Chief Scientist) co-founded OpenAI,
      invented the PPO reinforcement learning algorithm, and was a co-creator of
      ChatGPT. Both Schulman and Murati are deeply identified with the frontier AI
      research agenda that underpins Tinker.

      Three co-founders have since departed. Andrew Tulloch (pretraining and reasoning
      expert, ex-OpenAI and Meta) left in October 2025 to rejoin Meta—reportedly
      after initially declining a package worth up to $1.5 billion before ultimately
      accepting. Barret Zoph (original CTO, ex-OpenAI VP Research) and Luke Metz
      (post-training specialist, ex-OpenAI) both returned to OpenAI in January 2026;
      Wired characterized Zoph's split as "not amicable." Lilian Weng (AI safety and
      robotics expert, ex-OpenAI VP) remains with the company.

      The most significant hire since launch is Soumith Chintala, who joined in
      November 2025 and became CTO in January 2026. Chintala co-created PyTorch at
      Meta and spent eleven years there, reaching VP level. His addition partially
      offsets the loss of Zoph and provides deep open-source infrastructure credibility
      directly relevant to Tinker's architecture.

      Key-person dependence remains high. Murati is the central strategic, public, and
      product figure; Schulman provides scientific continuity; Chintala provides
      infrastructure depth. The departure of three of six original co-founders within
      the company's first year is a material governance and cohesion risk that later
      chapters must price.
