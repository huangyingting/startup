callouts:
  - calloutType: risk
    title: Customer base is 100% founder-network academic accounts with zero paying customers
    body: |
      TML's entire disclosed customer base consists of personal relationships formed through
      Murati, Schulman, and Chintala's academic networks. The four named accounts do not
      constitute independent market validation. Investors must seek evidence of organic
      inbound demand from researchers and enterprises outside the founding team's network
      before crediting TML with product-market fit.
    claimRefs:
      - C146
      - C149
      - C161
  - calloutType: strength
    title: Redwood Research adoption is the strongest independent quality signal
    body: |
      Redwood Research is an independent AI safety organization with no commercial incentive
      to endorse TML's infrastructure. Their adoption of Tinker for safety-critical alignment
      research is the strongest external validation in TML's customer portfolio, suggesting
      the platform is reliable enough for sensitive, production-quality research workflows.
    claimRefs:
      - C153
