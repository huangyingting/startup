company:
  name: Thinking Machines Lab
chapter:
  number: 6
  title: Customers
  summary: |
    Thinking Machines Lab's customer base is entirely in the academic and AI safety research
    segment as of May 2026. Four named beta users have been publicly disclosed: Princeton's
    Goedel Team (formal mathematics and theorem proving), Stanford's Rotskoff Lab (chemistry
    and molecular dynamics), UC Berkeley's SkyRL team (reinforcement learning), and Redwood
    Research (AI safety alignment). All four are consistent with TML's founding thesis of
    serving researchers who require gradient-level training control unavailable in commercial
    APIs. No enterprise customers, paying customers, or disclosed revenue-generating accounts
    have been publicly identified. All use is believed to be private-beta, likely free or
    heavily subsidized. Retention, expansion, NRR, and cohort data are entirely private and
    unavailable. The customer base is highly concentrated (4 known accounts), geographically
    narrow (US only), and segment-narrow (academic research). The transition to enterprise
    customers — the addressable commercial segment — remains a future challenge with no
    disclosed pipeline, sales motion, or enterprise pricing. Named customer proof is of high
    quality for the research segment but of limited scope: these four institutions represent
    TML's relationship network (Murati/Schulman/Chintala connections), not a representative
    market sample.
sections:
  - id: s601
    title: Customer Base Segmentation
    body: |
      TML's current customer base can be segmented along three dimensions: buyer type,
      use case, and institutional affiliation.

      By buyer type: all disclosed users are research groups within academic institutions
      or non-profit AI safety organizations. There are no disclosed commercial enterprise
      customers, government customers, or individual developers in the paying customer base.
      This is consistent with a private-beta platform targeting researchers who have the
      technical sophistication to use gradient-level API primitives.

      By use case: the four known beta users represent four distinct fine-tuning use cases
      that collectively demonstrate Tinker's versatility: formal reasoning (Princeton theorem
      proving), scientific simulation (Stanford chemistry), autonomous agent training (Berkeley
      RL), and alignment research (Redwood Research). All four use cases require the kind
      of training control that Tinker provides — direct gradient access, on-policy generation,
      custom training loops — and cannot be served by black-box commercial APIs.

      By geography: all four disclosed customers are US-based. European, Asian, and other
      international research institutions are not represented in the disclosed customer list.
      This may reflect Murati's US network or data residency constraints in private beta.

      By vertical: the research segment is homogeneous — academic/non-profit AI research.
      The anticipated enterprise segment (financial services, healthcare, media, software)
      is entirely absent from current disclosed accounts. This is typical for a research-
      first product launch but means TML has zero evidence of enterprise demand elasticity,
      enterprise workflow fit, or enterprise sales efficiency.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
    tableRefs:
      - TU001
    figureRefs:
      - FU001
  - id: s602
    title: Named Customer Proof and Use Cases
    body: |
      Princeton's Goedel Team uses Tinker for LLM fine-tuning applied to formal mathematics
      and theorem proving. The research objective is training language models to generate
      mathematically valid proofs for Lean 4 or Coq — a task that requires iterative on-
      policy training with feedback from a theorem prover, matching precisely the sample
      primitive's capability. This is a high-value research use case because theorem-proving
      LLMs are at the research frontier; Princeton's use of Tinker is strong social proof
      for the research community.

      Stanford's Rotskoff Lab focuses on computational chemistry and molecular dynamics.
      Fine-tuning scientific LLMs for chemistry requires domain-specific data and precise
      control over training to avoid catastrophic forgetting of prior scientific knowledge.
      Tinker's LoRA approach preserves base model capabilities while adding domain specificity —
      exactly what chemistry fine-tuning requires. The Rotskoff Lab's use of Tinker is notable
      because scientific research customers typically have strict data governance requirements
      and are therefore sophisticated evaluators of platform quality.

      UC Berkeley's SkyRL team uses Tinker for reinforcement learning research, specifically
      for training RL agents using model-generated rollouts. This involves intensive use of
      the sample primitive for on-policy data collection in GRPO/PPO training loops. RL-based
      fine-tuning is the most compute-intensive fine-tuning paradigm; Berkeley's adoption
      validates Tinker's ability to handle production-grade RL training workloads.

      Redwood Research, an AI safety organization, uses Tinker for alignment research
      including adversarial training, preference learning, and constitutional AI experiments.
      Redwood is one of the most credible external validators TML could have: an independent
      AI safety organization with no commercial incentive to endorse TML's infrastructure.
      Their adoption is strong evidence that Tinker's infrastructure is reliable enough for
      safety-critical research workflows.
    claimRefs:
      - CU005
      - CU006
      - CU007
      - CU008
    tableRefs:
      - TU003
    figureRefs:
      - FU003
  - id: s603
    title: Adoption Trajectory and Customer Growth
    body: |
      TML launched Tinker in private beta on October 1, 2025, with an undefined number of
      approved users. As of May 2026 — seven months after launch — the product remains in
      private beta with no published metrics on:
      - Total beta users approved
      - Total fine-tuning jobs completed
      - Total training compute consumed
      - Geographic distribution of users
      - Queue or waitlist size
      - Usage growth rate

      The only publicly available adoption signal is the four named institutional users, all
      of which appear to have been recruited through personal relationships (Murati's OpenAI
      network, Schulman's academic connections) rather than inbound demand from marketing.
      This is a classic cold-start strategy for research tools: build credibility through
      prestige users, then expand via word-of-mouth in the research community.

      The research community adoption path for fine-tuning tools typically follows a pattern:
      early academic users → developer community blog posts and tutorials → enterprise
      evaluation → enterprise commercial adoption. TML is at stage 1-2 of this trajectory.
      Without published usage metrics, it is impossible to assess whether Tinker is seeing
      strong inbound demand from the broader research community or is limited to the initial
      hand-picked cohort.

      One important adoption signal: the Tinker Cookbook on GitHub. Repository star counts,
      forks, and issue volume would provide indirect adoption evidence, but these metrics are
      not being tracked in this analysis as of the run date.
    claimRefs:
      - CU009
      - CU010
      - CU011
      - CU012
    tableRefs:
      - TU002
    figureRefs:
      - FU002
  - id: s604
    title: Retention, Expansion, and Concentration Risk
    body: |
      No retention data (NRR, GRR, churn, renewal rates, cohort analysis) has been disclosed
      for Tinker. At private beta stage with likely-free or subsidized access, retention
      metrics are not yet meaningful: users don't "churn" from a free product in the same
      way as paying customers. True retention evidence will require tracking paying customer
      behavior post-general availability.

      Expansion potential within the current academic cohort is constrained by research
      budget sizes. Princeton, Stanford, Berkeley, and Redwood Research collectively may
      represent $100K-$1M in annual spending on fine-tuning compute if all were paying
      customers — not material at TML's scale. Expansion into enterprise requires an entirely
      different product tier, sales motion, compliance stack, and pricing model.

      Customer concentration risk is high: with only 4 disclosed accounts and 0 enterprise
      customers, TML's future revenue is highly dependent on converting the research community
      into a distribution channel and pipeline for enterprise sales. If the research community
      adopts Tinker as the default fine-tuning tool, enterprise teams will follow their
      research counterparts — this is the OpenAI ChatGPT-to-enterprise pattern. But this path
      requires a longer timeframe and a successful general availability launch with enterprise
      pricing and features.

      No partner or channel dependence has been disclosed. Nvidia and Google Cloud are
      infrastructure partners, not distribution channels. ServiceNow and Cisco are strategic
      investors; whether they will serve as distribution channels for enterprise TML sales
      has not been disclosed. This is a gap: Cisco and ServiceNow collectively touch thousands
      of enterprise IT departments and could be valuable distribution levers.
    claimRefs:
      - CU003
      - CU013
      - CU014
      - CU015
      - CU004
    tableRefs:
      - TU004
      - TU005
    figureRefs:
      - FU004
  - id: s605
    title: Customer Proof Verdict
    body: |
      TML's customer proof is credible but narrow. Four named academic research users,
      representing some of the most respected AI research institutions in the United States,
      are strong social proof for the research market. However, they represent:
      - Zero enterprise customers
      - Zero paying customers
      - Zero evidence of enterprise workflow fit
      - Zero evidence of demand beyond the founding team's personal network
      - Zero retention data

      The customer base as of May 2026 is best characterized as a founder-relationship
      cohort, not a market-validated customer base. Tinker's product quality is validated
      by these users, but market demand — the degree to which customers outside the founder
      network choose Tinker independently — is unvalidated.

      For diligence purposes, investor conversations should seek: (1) the total number of
      beta users, (2) the usage volume and growth rate, (3) the waitlist size, and (4) any
      evidence of inbound demand from organizations outside the founder network.
    claimRefs:
      - CU001
      - CU004
      - CU016
      - CU017
