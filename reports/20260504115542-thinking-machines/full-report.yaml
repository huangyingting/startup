      - number: '2.5'
        title: Market Position and Addressable Opportunity
        blocks:
          - type: paragraph
            body: |
              TML's differentiated positioning within the fine-tuning market rests on three pillars:
              access to very large open-weight models (including 235B+ MoE architectures), a low-level
              Python-native API that preserves algorithmic control (forward_backward, sample primitives),
              and managed infrastructure that removes scheduling and failure-recovery complexity without
              abstracting away the training logic. This positions Tinker in a distinct niche relative to
              cloud incumbents (which optimize for simplicity and enterprise compliance) and relative to
              self-hosted tooling (which requires significant infrastructure expertise).

              The market opportunity is genuine and growing, but TML's current commercialization is at
              an extremely early stage. As of the run date, the product is in private beta, pricing has
              not been publicly published, and revenue is either negligible or zero. The combination of
              a $12 billion seed valuation and pre-revenue status implies that investors are pricing in
              a TAM capture assumption far in excess of current traction. For the thesis to work, TML
              must convert its research-community early adopters into a paying user base, extend Tinker
              to enterprise use cases with appropriate compliance and security capabilities, and maintain
              pricing competitiveness against incumbents with substantially lower marginal infrastructure
              costs. The $1–3 billion SAM estimate is plausible over a 2–4 year horizon if the platform
              achieves general availability and enterprise readiness; near-term SOM remains well below
              this level.
            claimRefs:
              - C056
