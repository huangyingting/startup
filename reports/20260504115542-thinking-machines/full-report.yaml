  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Thinking Machines Lab closed the largest seed round in venture capital history — $2 billion
              at a $12 billion post-money valuation — on July 15, 2025. The round was led by Andreessen
              Horowitz and included Nvidia, Accel, ServiceNow, Cisco, AMD, and Jane Street. The diversity
              of strategic investors (Nvidia for compute access, ServiceNow and Cisco for enterprise
              distribution, AMD as a potential alternative silicon partner) signals a deliberate
              construction of the cap table to hedge compute concentration risk and open enterprise
              distribution channels.

              The only subsequent financing disclosure is the November 2025 Bloomberg report that TML
              was in talks to raise an additional round at approximately $50 billion — a 4.2x step-up
              from the seed valuation in fewer than five months after launch and before any public
              revenue disclosure. This would be one of the fastest valuation step-ups in AI venture
              history. As of the run date, no new round has been publicly announced or closed, suggesting
              the talks are ongoing, stalled, or that TML has sufficient runway to delay.

              No debt facilities, project finance, or credit lines have been disclosed. The company's
              PBC structure does not require additional regulatory filings beyond standard Delaware
              corporate governance. Mira Murati has disclosed voting control outweighing the rest of the
              board, which is standard for founder-led AI startups but relevant for any investor rights
              agreement analysis. Total external capital raised: $2 billion. No secondary transactions
              have been publicly reported.
            claimRefs:
              - C094
              - C095
              - C096
              - C097
              - C098
              - C099
              - C098
      - number: '4.2'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: |
              Tinker is TML's only commercially deployed product as of May 2026. The revenue model is
              usage-based pricing — pay for what you train — with specific rates not yet published.
              The October 2025 launch announcement stated pricing would be introduced "in the coming
              weeks," but as of the run date (seven months later), no public pricing has appeared on
              the TML website, documentation, or third-party pricing databases. This is unusual even
              for private-beta products: comparable platforms (Together AI, OpenAI fine-tuning)
              publish their pricing tables openly.

              Based on the product design (LoRA shared-pool compute, managed infrastructure, API-
              accessed) and competitor benchmarks ($0.48–$25 per million training tokens), TML's
              pricing is likely in the range of $1–5 per million tokens for fine-tuning runs, with
              potential for tiered pricing based on model size and LoRA rank. A very large model
              (Qwen-235B-A22B) would command a premium. Revenue recognition would follow an ASC 606
              usage-based model: revenue recognized as training compute is consumed, with no deferred
              revenue on prepaid credits except under enterprise subscription agreements.

              TML's near-term revenue is almost certainly negligible: the product is in private beta
              with a small cohort of research users who may be receiving free access during the beta
              period. Revenue probably launched in late Q4 2025 or Q1 2026 at best; with 7 months of
              beta and no pricing announcement, Q4 2025 through Q2 2026 revenue is likely sub-$1 million.
            claimRefs:
              - C100
              - C100
              - C101
              - C102
              - C100
              - C101
              - C103
      - number: '4.3'
        title: Cost Structure and Capital Intensity
        blocks:
          - type: paragraph
            body: |
              TML's primary cost drivers are compute infrastructure and personnel. Infrastructure costs
              are unusually high for a startup of this scale due to the managed-cluster model: Tinker
              runs on TML's own internal GPU clusters, meaning the company absorbs capital expenditure
              for GPU procurement and depreciation, plus ongoing operational costs. This contrasts
              with competitors like Together AI that run on third-party cloud infrastructure.

              The April 2026 Google Cloud deal (Nvidia Blackwell chips) and the March 2026 Nvidia
              gigawatt partnership (Vera Rubin chips from 2027) imply TML is building out proprietary
              large-scale compute infrastructure — an unusual and capital-intensive choice for a startup
              less than two years old. The 1-gigawatt Nvidia commitment represents approximately
              $1-2 billion in future capital expenditure obligations depending on pricing terms (assuming
              1 GW of AI accelerator power at market rates). This would be the majority of the $2 billion
              seed capital if deployed quickly.

              Personnel costs are a secondary but material expense. With an estimated 50+ employees
              (former senior researchers from OpenAI, Meta, Google DeepMind), average total compensation
              likely exceeds $500,000 per employee, implying $25-50 million per year in staff costs.
              Combined with infrastructure costs, total annual burn is estimated at $75-200 million, 
              implying $1.4-1.9 billion in cash remaining and 7-25 years of runway — a structurally
              strong position unless infrastructure commitments accelerate capital deployment.
            claimRefs:
              - C104
              - C105
              - C106
              - C107
              - C108
              - C103
      - number: '4.4'
        title: Unit Economics and GTM Efficiency
        blocks:
          - type: paragraph
            body: |
              No unit economic data — CAC, LTV, gross margin, payback period, or net revenue retention
              — is available for TML. Every metric is private, and the private-beta stage means even
              internal cohort data is immature. What can be inferred from first principles:

              Gross margin for a managed fine-tuning service depends on the gap between revenue per
              training compute unit and the cost of that compute. At competitive pricing ($1-5/M tokens)
              versus GPU compute costs (estimated $0.3-1.5/M tokens of training throughput on Blackwell-
              class hardware), gross margins could be 40-70% at scale. This is in line with comparable
              cloud AI service gross margins. However, at sub-scale utilization (which TML certainly
              faces in private beta), fixed infrastructure depreciation compresses margins severely,
              potentially into negative territory.

              Customer acquisition for the research segment has been word-of-mouth and relationship-
              driven (Murati's OpenAI network, Schulman's academic connections). CAC is likely near
              zero for the first cohort. The enterprise segment, if and when targeted, would require a
              sales team, longer cycles, and significantly higher CAC. GTM infrastructure (sales ops,
              solutions engineering, enterprise contracts) is absent from what can be inferred from
              TML's current hiring signals. The transition from research-community distribution to
              enterprise sales will require meaningful additional investment in non-engineering headcount.
            claimRefs:
              - C109
              - C110
              - C111
              - C100
              - C112
              - C113
      - number: '4.5'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: |
              TML's financial profile is simultaneously reassuring (massive seed capital, near-infinite
              runway at current burn) and deeply opaque (zero public revenue data, no pricing, no unit
              economics). The combination of $2 billion raised at a $12 billion seed valuation and then
              seeking $50 billion in less than six months is unprecedented and warrants significant
              skepticism: it either reflects exceptional internal product momentum that justifies a 4x
              valuation step-up with no revenue evidence, or it reflects investor speculation on founder
              optionality and market timing rather than fundamentals.

              The primary financial diligence blockers are: (1) no public pricing means no revenue
              model can be validated; (2) no unit economics means no margin path can be assessed;
              (3) compute capex commitments (Nvidia 1GW, Google Cloud) are undisclosed in financial
              detail, creating material uncertainty about true cash burn and runway; (4) valuation is
              entirely speculative at this stage without revenue comps. Investors should request full
              financial disclosure before any follow-on investment commitment. The $50 billion valuation
              target is not supportable from publicly available evidence.
            claimRefs:
              - C108
