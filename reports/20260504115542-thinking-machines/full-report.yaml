    title: Valuation Sensitivity — Implied ARR Required to Justify Entry Price
    type: bar
    layout: standard
    summary: |
      Bar chart showing the implied ARR required to justify each valuation level at
      10x and 25x forward revenue multiples (the typical range for high-growth AI SaaS).
      At $50B, TML needs $2-5B ARR — which requires extraordinary market execution.
    data:
      items:
        - label: $12B valuation @ 25x
          value: 480
          unit: $M ARR needed
        - label: $12B valuation @ 10x
          value: 1200
          unit: $M ARR needed
        - label: $25B valuation @ 25x
          value: 1000
          unit: $M ARR needed
        - label: $25B valuation @ 10x
          value: 2500
          unit: $M ARR needed
        - label: $50B valuation @ 25x
          value: 2000
          unit: $M ARR needed
        - label: $50B valuation @ 10x
          value: 5000
          unit: $M ARR needed
    approximationNotes: >-
      ARR requirements are calculated as valuation / revenue multiple. These represent the steady-state forward ARR
      needed for the entry price to be rational at the given multiple. High-growth premium AI companies have commanded
      25-50x; TML's multiples will compress as it scales.
    claimRefs:
