      - number: '5.3'
        title: Supported Models and Model Coverage
        blocks:
          - type: paragraph
            body: |
              Tinker supports six frontier LLMs at launch (October 2025), spanning both proprietary-
              openweight models and fully open models. The supported models are: Qwen-235B-A22B
              (Alibaba; the largest model in the lineup, a mixture-of-experts architecture with 235
              billion total parameters and 22 billion active parameters), Meta Llama (series, including
              3.1 and 3.3 variants), Alibaba Qwen (2.5 series), OpenAI gpt-oss (open-weight release),
              DeepSeek V3.1 (MoE architecture), and Moonshot AI Kimi K2 (MoE).

              The inclusion of Qwen-235B-A22B and DeepSeek V3.1 is significant: both are mixture-of-
              experts models that require specialized handling during LoRA fine-tuning because expert
              routing tables must be managed correctly during gradient updates. Most hosted fine-tuning
              platforms do not support MoE models at this scale. TML's support for these models
              represents a genuine technical differentiator for research teams working with the latest
              open-weight frontier models.

              OpenAI gpt-oss is an open-weight release that allows TML to offer fine-tuning on a
              model architecture designed by OpenAI, which may have downstream compatibility advantages
              for organizations deploying OpenAI-adjacent workflows. The inclusion of Meta Llama, the
              most widely deployed open-weight model family, provides broad coverage of the research
              and enterprise fine-tuning market.

              Model coverage is not static: TML has signaled intentions to expand the supported model
              list but has not published a roadmap. The rate of new model releases in the open-weight
              ecosystem (Mistral, Cohere, Stability, etc.) means TML must continuously qualify new
              architectures for Tinker support, which involves non-trivial kernel-level adaptation work.
            claimRefs:
              - C130
              - C122
              - C131
              - C132
              - C133
              - C134
      - number: '5.4'
        title: Differentiation, IP, and Research Output
        blocks:
          - type: paragraph
            body: |
              TML's primary differentiation is the combination of composable research-grade primitives
              (forward_backward, sample) with managed infrastructure. No other commercial fine-tuning
              platform provides this combination: platforms like Together AI and Predibase expose high-
              level fine-tuning APIs without direct gradient access; self-hosted alternatives (PyTorch
              FSDP, DeepSpeed) provide full control but require significant infrastructure management.
              Tinker targets the gap between these two extremes.

              TML has published three research papers that support specific platform capabilities:
              (1) "Batch Invariance via GPU Kernel Redesign" establishes the theoretical and empirical
              basis for TML's custom CUDA/TileLang kernels; (2) "Modular Manifolds for Neural Network
              Optimization" provides the mathematical foundation for TML's LoRA adapter optimization
              approach, addressing convergence properties on high-dimensional LoRA manifolds; and
              (3) "On-Policy Distillation" describes TML's approach to using model-generated data for
              self-improvement, enabling the sample primitive's RLHF/GRPO applications.

              Intellectual property includes: the Tinker API design and SDK (trade secrets), TileLang
              kernel implementations (likely patented or patent-pending), managed LoRA shared-pool
              orchestration infrastructure (trade secrets), and the Tinker Cookbook training examples
              (open-source, Apache 2.0). Key personnel with unique technical IP include John Schulman
              (creator of PPO and fundamental RLHF algorithms), Soumith Chintala (creator of PyTorch),
              and Mira Murati (who oversaw GPT-4, DALL-E, Codex, and Whisper at OpenAI).

              The Tinker Cookbook open-source strategy is standard in developer-tool companies: open-
              sourcing examples and documentation builds community, lowers adoption friction, and
              creates a technical moat through ecosystem familiarity without giving away core platform
              code or kernel implementations.
            claimRefs:
              - C135
              - C136
              - C127
              - C137
              - C138
              - C139
              - C122
      - number: '5.5'
        title: Trust, Safety, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: |
              TML's disclosed trust and safety posture is minimal for a company handling sensitive AI
              training workloads. The primary privacy commitment is data isolation: Tinker reportedly
              does not retain training data after the fine-tuning job completes, and customer data is
              not used to improve TML's own models. These are standard competitive requirements for any
              enterprise-grade fine-tuning platform. However, TML has not published a formal data
              processing agreement, privacy policy for enterprise customers, or security whitepaper as
              of May 2026.

              Enterprise compliance certifications (SOC 2 Type II, ISO 27001, HIPAA, FedRAMP) have not
              been publicly announced. This is consistent with a private-beta stage but becomes a
              material gap the moment TML targets regulated enterprise verticals (finance, healthcare,
              government). Competitors like Google Vertex AI and Azure ML carry full enterprise
              compliance stacks; TML does not. The absence of certifications will block TML from
              regulated verticals for 12-24 months post-general availability while certifications are
              obtained.

              AI safety controls for models trained via Tinker present an additional gap. Tinker enables
              fine-tuning on frontier models for any purpose the customer defines. TML's PBC mission
              ("ensuring AI is safe and beneficial") implies some commitment to responsible use, but no
              acceptable use policy, model safety filters, or output moderation for Tinker-trained
              models has been published. This is material for enterprise customers in regulated
              industries who face liability for AI outputs and for partners in the Nvidia and Google
              Cloud ecosystem who have their own AI safety commitments.

              Quality controls for the training pipeline (job success rates, convergence guarantees,
              reproducibility) have not been published. Given the complexity of fine-tuning frontier
              models (especially MoE architectures), this is a credible reliability risk.
            claimRefs:
              - C122
              - C140
              - C141
              - C142
              - C143
