  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: |
              TML faces material regulatory risk from multiple overlapping frameworks, the most
              consequential being the EU AI Act (Regulation 2024/1689, entered into force August 2024,
              GPAI obligations applicable from August 2025). Under the EU AI Act, providers of
              general-purpose AI models (GPAI models) with systemic risk must comply with model
              evaluation, incident reporting, and adversarial testing obligations. Tinker is not
              itself a GPAI model — it is a fine-tuning platform — but TML's maintenance of base
              model weights (Qwen-235B-A22B, DeepSeek V3.1, Llama 3.x) on its managed clusters
              may constitute "making available" those GPAI models within the scope of the Act.
              TML's European legal exposure is uncertain but material: any enterprise customer in the
              EU will require TML to demonstrate EU AI Act compliance before contracting.

              US copyright risk is the most immediate legal risk. The output of fine-tuning (the LoRA
              adapter plus base model weights) may incorporate copyrighted training data in ways that
              courts have not yet definitively resolved. Active litigation (Getty Images v. Stability
              AI, Andersen v. Stability AI, New York Times v. Microsoft/OpenAI) is establishing
              precedent that could constrain AI training methodologies. TML's use of open-weight
              base models does not fully insulate it: the training data used to create those base
              models may be challenged, and fine-tuning on proprietary data could create secondary
              liability if training data is mishandled.

              Meta's Llama Community License restricts commercial use by entities with >700M monthly
              active users and imposes conditions on derivative model distribution. TML's service
              commercially distributes LoRA adapters trained on Llama models; the license terms apply
              to TML's commercial use of Llama model weights. If Meta restricts commercial fine-tuning
              access (as it has done for some regions), TML would need to remove Llama from its
              supported model list — a meaningful reduction in product breadth.

              Data privacy regulation (GDPR in the EU, CCPA in California, emerging US state laws)
              imposes obligations on entities processing personal data in AI training. TML's claim
              that customer training data is not retained does not fully address the question of
              whether base model inference or fine-tuning on data containing personal information
              requires data subject consent under GDPR Article 22.
            claimRefs:
              - C176
              - C177
              - C178
              - C179
              - C180
              - C181
              - C182
              - C183
              - C184
              - C185
      - number: '7.2'
        title: Operational and Infrastructure Risk
        blocks:
          - type: paragraph
            body: |
              TML's operational risks center on its proprietary managed infrastructure model. Unlike
              competitors that run on public cloud infrastructure with hyperscaler reliability
              guarantees, TML operates its own GPU clusters with no disclosed SLA, uptime guarantee,
              or disaster recovery plan. The shared LoRA pool architecture creates a specific risk:
              if the base model weights are corrupted, the cluster suffers an outage, or a scheduling
              bug causes job failures, all concurrent users of that base model are affected
              simultaneously. Multi-tenant infrastructure failures could expose customer training
              data to adjacent tenants or cause catastrophic data loss of fine-tuning checkpoints.

              Infrastructure concentration risk is high: the Blackwell cluster dependency means that
              any disruption in Nvidia GPU supply (US-China export controls, manufacturing delays,
              or supply allocation to larger customers) could directly reduce TML's service capacity.
              The announced migration to Vera Rubin chips in 2027 introduces a transition risk:
              TML's TileLang kernels are optimized for Blackwell; architectural changes in Vera Rubin
              will require non-trivial kernel rewriting.

              Cybersecurity risk is undercharacterized by public disclosure. A platform handling
              sensitive AI training workloads — potentially including proprietary company data,
              classified research data, or personally identifiable information — is a high-value
              target for cybersecurity threats. No disclosed penetration testing results, security
              audits, or bug bounty programs have been published for TML's infrastructure. This gap
              is material for any enterprise customer evaluating Tinker.

              Model training reliability for large MoE models (Qwen-235B, DeepSeek V3.1) is
              technically challenging. MoE fine-tuning has known instability risks including expert
              collapse, routing degradation, and gradient explosion. Without published convergence
              guarantees or job success rate data, users cannot assess TML's reliability for
              production-scale workflows.
            claimRefs:
              - C186
              - C184
              - C187
              - C187
              - C188
              - C189
      - number: '7.3'
        title: Partner, Dependency, and People Risk
        blocks:
          - type: paragraph
            body: |
              TML's partner dependencies create significant concentration risk. The Google Cloud deal
              (April 2026) and Nvidia 1GW partnership (March 2026) together constitute TML's entire
              compute infrastructure strategy. If Google Cloud terminates or renegotiates the deal
              (e.g., if TML fails to meet minimum commitment thresholds), TML would face immediate
              compute capacity constraints that could halt service delivery. The Nvidia Vera Rubin
              commitment is forward-looking (2027+) but its financial terms create capex obligations
              that could constrain financial flexibility.

              The investor-partner configuration (Nvidia, ServiceNow, Cisco as strategic investors
              and partners) creates a dual risk: these relationships are valuable for distribution
              and compute access, but they also create principal-agent conflicts if TML's commercial
              interests diverge from investor interests. Cisco and ServiceNow may prefer TML to
              integrate with their platforms in ways that limit TML's independence or ability to work
              with competing enterprise software providers.

              People risk is the most acute risk in TML's profile. Three of the five original co-
              founders have departed: Andrew Tulloch (→Meta, October 2025), Barret Zoph (original
              CTO, →OpenAI, January 2026), and Luke Metz (→OpenAI, January 2026). Zoph's departure
              as CTO required replacement by Soumith Chintala, who has strong credentials but joined
              only in November 2025. The departures of Zoph and Metz to OpenAI — TML's most direct
              competitor — raise questions about competitive intelligence, IP ownership of early work,
              and morale among remaining team members. Mira Murati now carries extraordinary key-
              person risk: she is the founder, CEO, and only remaining publicly identified senior
              leader from the founding team (alongside Chintala and Schulman, both of whom joined
              after TML's founding).
            claimRefs:
              - C188
              - C190
              - C185
              - C191
              - C192
              - C193
              - C186
      - number: '7.4'
        title: Financial and Market Structural Risks
        blocks:
          - type: paragraph
            body: |
              Financial risk is dominated by the uncertain scope of TML's compute capex obligations.
              The Google Cloud multi-billion dollar deal and Nvidia 1GW partnership may represent
              $1-3B in total capex commitments from a $2B seed raise, potentially compressing runway
              from the 10-25 year estimate to 2-5 years if commitments are deployed quickly. At $12B
              valuation and current pre-revenue stage, TML has no financial buffer against capex
              acceleration except additional fundraising.

              Market structural risk is material. Fine-tuning as a service faces three convergent
              commoditization forces: (1) open-source tooling (PyTorch FSDP, DeepSpeed, Unsloth)
              continues to improve, reducing the infrastructure burden that drives demand for managed
              platforms; (2) hyperscalers (Google Vertex AI, Azure ML, AWS SageMaker) are expanding
              their fine-tuning capabilities and can offer compliance, reliability, and pricing
              advantages that TML cannot match at its current scale; (3) new entrants with similar
              positioning (research-grade fine-tuning APIs) could erode TML's differentiation before
              TML achieves scale advantages.

              A general AI investment correction would disproportionately affect TML given its
              extreme pre-revenue valuation ($12B with zero revenue) relative to companies with
              comparable valuations but established revenue. If the next fundraise falls below the
              $50B target (due to market conditions or competitive developments), TML would face a
              down-round that dilutes existing investors and potentially undermines team morale and
              recruitment.

              The competitive risk from Meta specifically is underappreciated: Meta has deep
              financial resources, the Llama model family, and direct interest in fine-tuning tool
              ecosystems (Meta's fine-tuning infrastructure is built internally). A Meta decision to
              create a public Llama fine-tuning API would eliminate one of TML's most distinctive
              use cases immediately.
            claimRefs:
              - C194
              - C195
              - C196
              - C197
              - C186
      - number: '7.5'
        title: Mitigations and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              TML's mitigations are nascent and mostly structural (investor relationships, founder
              reputation, compute partnerships) rather than operational (disclosed security controls,
              compliance certifications, retention metrics). The strongest mitigations are:
              (1) Mira Murati's personal credibility as a candidate for key enterprise conversations;
              (2) the breadth of the cap table (Nvidia, Cisco, ServiceNow) providing infrastructure
              and distribution hedges; (3) the $2B seed capital providing financial resilience if
              managed conservatively; and (4) the PBC structure signaling mission-alignment that
              matters to safety-conscious customers.

              Thesis-break triggers — signals that TML's investment thesis is failing — include:
              (1) Pricing not published within 3 months of GA, suggesting inability to validate
              commercial viability; (2) departure of John Schulman or Mira Murati, which would
              fundamentally alter TML's research credibility and leadership; (3) EU AI Act enforcement
              action against TML or material EU regulatory barrier to GPAI compliance; (4) Meta
              Llama license restriction eliminating Llama from TML's supported models; (5) Google
              Cloud or Nvidia compute disruption that reduces service capacity by >50%; (6) a down-
              round at valuation below $12B, which would signal investor loss of confidence.

              Monitoring indicators (the signals to watch before triggers are hit) include: GitHub
              Cookbook activity, academic paper citations of Tinker, EU AI Act enforcement actions
              against comparable GPAI providers, Nvidia/AMD supply chain reports, Meta Llama
              commercial policy changes, and TML job postings indicating enterprise sales investment.
            claimRefs:
              - C198
              - C199
              - C200
              - C201
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Three co-founder departures in Year 1 is a material diligence red flag
            body: |
              Andrew Tulloch, Barret Zoph, and Luke Metz all departed TML within its first year of
              operation. Zoph and Metz left for OpenAI — TML's primary competitor. While Soumith
              Chintala's hire partially mitigates the CTO gap, the pattern of founder departures
              raises legitimate questions about internal culture, leadership alignment, and IP
              ownership of early work. Investors should require IP assignment confirmations and
              departure agreement summaries before committing capital.
            calloutType: risk
            claimRefs:
              - C192
              - C193
          - type: callout
            title: EU AI Act GPAI obligations are already in force and TML has not disclosed compliance
            body: |
              GPAI obligations under the EU AI Act became applicable to providers in August 2025.
              TML may qualify as a GPAI model provider given its management of frontier model weights.
              No compliance documentation has been published. Without EU AI Act compliance evidence,
              TML cannot credibly target European enterprise customers — a material constraint on
              total addressable market.
            calloutType: risk
