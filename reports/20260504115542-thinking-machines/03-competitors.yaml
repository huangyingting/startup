callouts:
  - calloutType: risk
    title: TML's model-scale advantage has a short shelf life
    body: |
      Tinker's clearest differentiation today is managed fine-tuning of 235B+ MoE models that
      competitors do not yet support. However, this window is likely 12-24 months: Google Vertex AI,
      AWS SageMaker, and Together AI all have roadmaps for expanding large-model support. When that
      support arrives, TML's technical moat narrows to its API design and open-source ecosystem —
      both of which face strong free-software competition from Hugging Face.
    claimRefs:
      - C089
      - C079
  - calloutType: strength
    title: Anthropic's absence from fine-tuning clears the highest-credibility competitor
    body: |
      Anthropic's decision not to offer a public Claude fine-tuning API removes the most credible
      safety-first, research-focused competitor from TML's immediate competitive set. OpenAI's fine-
      tuning is proprietary-model-only. This leaves TML with clear differentiation for researchers
      needing to fine-tune very large open-weight models in a managed environment.
    claimRefs:
      - C081
      - C082
