  - id: s304
    title: Cloud Incumbents and Self-Hosted Alternatives
    body: |
      AWS SageMaker, Google Vertex AI, and Azure ML represent TML's most formidable long-term
      competitive threats due to their existing enterprise procurement relationships. These
      platforms offer fine-tuning for open-source models as features within broader MLOps
      platforms, bundled with compliance certifications (SOC2, HIPAA, FedRAMP), data residency
      controls, and enterprise support SLAs that TML cannot match at its current stage.
      Enterprise buyers who have already committed to GCP, AWS, or Azure infrastructure face
      high switching costs to adopt a new vendor. The risk is not that these incumbents are better
      at fine-tuning today, but that they will expand their fine-tuning support to cover very
      large models over time, eliminating TML's technical differentiation.

      Meta's open-source strategy is the most structurally important indirect competitive force.
      By releasing Llama models as open-weight with permissive licensing, Meta creates a
      sustainable supply of customizable foundation models that reduces buyer dependency on any
      single fine-tuning API vendor. This benefits TML (it needs open models to serve) but also
      benefits every competitor equally. Meta's AI studio and fine-tuning offerings remain
      rudimentary; its strategic goal is ecosystem dominance via open-source adoption rather than
      managed service revenue. MosaicML (acquired by Databricks for $1.3 billion in 2023)
      provides enterprise-grade LLM pretraining and fine-tuning, but targets organizations with
      pretraining-scale compute budgets rather than TML's research fine-tuning customer.
