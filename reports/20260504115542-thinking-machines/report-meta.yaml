companyProfile:
  summary: |
    Thinking Machines Lab is an AI research and product company founded in February 2025
    by Mira Murati (former CTO of OpenAI) and five other OpenAI alumni in San Francisco.
    The company is structured as a public benefit corporation with Murati holding a voting
    majority, giving her unusual governance control. Its stated mission is to build AI
    systems that are more widely understood, customizable, and generally capable — with
    emphasis on open science, human-AI collaboration, and safety-first deployment.
    Its first product, Tinker, is a Python-based API for distributed LLM fine-tuning using
    LoRA and managed compute infrastructure. The company has secured a $2 billion seed round
    at a $12 billion valuation and strategic compute partnerships with Nvidia (1 gigawatt,
    Vera Rubin chips) and Google Cloud (Blackwell chips). As of the run date, Tinker is in
    private beta serving academic research groups; no commercial revenue is publicly confirmed.
  foundedDate: "2025-02-18"
  founders:
    - name: Mira Murati
      role: CEO and Co-Founder
      background: |
        Former CTO and brief interim CEO of OpenAI (2022–2024). Led ChatGPT, DALL-E,
        Codex/GitHub Copilot, and Sora. Previously senior PM at Tesla (Model X/Autopilot)
        and VP Product/Engineering at Leap Motion. Albanian-American; studied engineering
        at Dartmouth.
      claimRefs: []
    - name: John Schulman
      role: Chief Scientist and Co-Founder
      background: |
        Co-founder of OpenAI; creator of Proximal Policy Optimization (PPO) and Generalized
        Advantage Estimation algorithms foundational to modern RLHF and LLM post-training.
        Co-creator of ChatGPT.
      claimRefs: []
    - name: Soumith Chintala
      role: CTO (as of November 2025)
      background: |
        Co-creator of PyTorch, the dominant open-source deep learning framework. Joined
        Thinking Machines Lab November 2025 from Meta. Replaced original CTO Barret Zoph.
      claimRefs: []
  foundingLocation: "San Francisco, CA, USA"
  headquarters: "San Francisco, CA, USA"
  productSummary: |
    Tinker: A Python API for distributed large language model fine-tuning. Provides
    low-level primitives (forward_backward, sample) for custom training loops while
    abstracting away GPU cluster management. Uses LoRA to share compute across training
    jobs. Supports Qwen-235B-A22B, Meta Llama, OpenAI gpt-oss, DeepSeek V3.1, Kimi K2
    Thinking, and other open-weight models. Free to start; usage-based pricing forthcoming.
    Academic early adopters include Princeton, Stanford, Berkeley, and Redwood Research.
