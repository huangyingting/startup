      services is declining or plateauing as of 2025. The absence of adverse evidence does not confirm continued growth.
    whyItMatters: >-
      Identifying any leading indicators of demand saturation or substitution (e.g., RAG replacing fine-tuning for many
      use cases) is important for market sizing accuracy.
    relatedQuestionRefs:
