  - id: EG201
    type: private-evidence-only
    severity: material
    topic: TML Tinker pricing and revenue
    missingEvidence: >-
      No public pricing for Tinker has been announced as of May 2026, seven months after launch. Revenue, paying
      customer count, and contract values are entirely private. This makes SAM-to- SOM conversion estimates highly
      uncertain.
    whyItMatters: >-
      Without pricing visibility, it is impossible to model TML's revenue potential or assess whether the $12B (or
      speculated $50B) valuation is supportable by reasonable unit economics.
    relatedQuestionRefs:
      - RQ218
  - id: EG202
    type: conflicting-data
    severity: material
    topic: Contradictory market size estimates across analyst firms
    missingEvidence: >-
      Market sizing estimates span from $2.8B (Dataintelo, fine-tuning only) to $644B (Gartner, total GenAI IT), with
      incompatible market boundaries. No independent reconciliation exists.
    whyItMatters: >-
      Investment theses that cite inflated TAM figures without adjusting for market boundary may substantially overstate
      TML's addressable opportunity. This is a common risk in early- stage AI investment analysis.
    relatedQuestionRefs:
      - RQ215
      - RQ225
