evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: headcount
    missingEvidence: >-
      No official headcount figure has been published. The estimate of 50+ employees as of April 2026 is derived from
      Built In's qualitative description; no verified count exists.
    whyItMatters: >-
      Headcount is a basic scale proxy for operational capacity and burn rate. Without this, burn rate and runway
      calculations in later chapters are speculative.
    diligencePath: Request current headcount and org chart from the company directly during due diligence data room access.
    relatedQuestionRefs:
      - RQ115
  - type: missing-source
    severity: blocking
    topic: revenue and ARR
    missingEvidence: >-
      Thinking Machines Lab has disclosed no revenue, ARR, or commercial pricing for Tinker as of run date. The product
      launched free-to-start in October 2025 and usage-based pricing was described as forthcoming; no subsequent pricing
      announcement has been publicly identified.
    whyItMatters: >-
      Without any revenue data the valuation analysis cannot be grounded in financial multiples. All later chapters must
      treat the company as pre-revenue.
    diligencePath: Request Tinker usage metrics, customer contracts, and any pilot pricing agreements during data room access.
    relatedQuestionRefs:
      - RQ116
  - type: missing-source
    severity: material
    topic: new funding round status
    missingEvidence: >-
      Bloomberg reported in November 2025 that Thinking Machines was in talks to raise approximately $5 billion at
      approximately $50 billion valuation. As of run date (May 4, 2026) no confirmation of this round closing has been
      found in any available source.
    whyItMatters: >-
      If the $50 billion round has closed, the valuation context for the entire report changes. If it has not, the
      company's capital runway remains anchored to the $2 billion seed.
    diligencePath: >-
      Monitor news for round close announcement; ask company directly about current capital status and any signed term
      sheets.
    relatedQuestionRefs:
      - RQ119
  - type: private-evidence-only
    severity: material
    topic: governance board composition
    missingEvidence: >-
      The composition of Thinking Machines Lab's board of directors, including any investor board seats from the seed
      round (a16z, Nvidia, etc.), observer rights, or independent directors, has not been publicly disclosed.
    whyItMatters: >-
      Board composition determines actual governance checks on Murati's reported super-voting control and the company's
      long-term strategic direction. This is essential for the governance section of diligence.
    diligencePath: Request board composition, director agreements, and investor rights agreements during data room access.
    relatedQuestionRefs:
      - RQ118
  - type: missing-source
    severity: material
    topic: Nvidia equity investment amount
    missingEvidence: >-
      Nvidia made a "significant investment" in Thinking Machines Lab as part of the March 2026 partnership
      announcement; the precise dollar amount was not publicly disclosed. This may represent a second Nvidia investment
      beyond the seed round participation.
    whyItMatters: >-
      The undisclosed investment amount affects total capital raised calculations and the depth of the Nvidia strategic
      relationship.
    diligencePath: Seek disclosure from company or reference the cap table in data room documents.
    relatedQuestionRefs:
      - RQ126
  - type: enumeration-incomplete
    severity: minor
    topic: leadership and founder table
    missingEvidence: >-
      The full executive team beyond the seven identified founders and CTO Soumith Chintala is not publicly disclosed.
      Board members, additional senior hires, and their roles are unknown from public sources.
    whyItMatters: Completeness of leadership mapping is required for key-person and succession analysis in later chapters.
    diligencePath: Request full org chart and board composition from company.
    relatedTableRefs:
      - T102
    relatedQuestionRefs:
      - RQ127
  - type: enumeration-incomplete
    severity: minor
    topic: stakeholder or investor map
    missingEvidence: >-
      Individual check sizes, board or observer rights, pro-rata provisions, and any secondary transactions in the seed
