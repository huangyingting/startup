callouts:
  - calloutType: insight
    title: Hardware dominates total GenAI spend; software TAM is a fraction
    body: |
      Gartner's $644 billion GenAI spend figure is often cited without caveat, but approximately
      80% is hardware (devices and servers). TML's relevant TAM is the $2.8-6 billion fine-tuning
      services segment or at most the $14 billion GenAI model end-user market. Investors and
      founders citing the $644B figure to size this opportunity are using a misleading denominator.
    claimRefs:
      - C049
      - C049
      - C049
  - calloutType: risk
    title: No public pricing 7 months post-launch signals monetization uncertainty
    body: |
      Tinker launched on October 1, 2025 with a promise to introduce usage-based pricing
      "in the coming weeks." As of the run date (May 4, 2026), no public pricing has been
      published. This creates uncertainty about TML's SAM capture timeline, revenue conversion,
      and competitive positioning relative to published-price competitors.
    claimRefs:
      - C065
  - calloutType: assumption
    title: SAM estimate assumes API-first, research-and-developer focus for 2025-2026
    body: |
      The $1-3B SAM estimate assumes TML maintains its current positioning (API-driven,
      research-grade, North America-weighted) over the next 12-24 months. A successful pivot
      into enterprise or European markets would expand the SAM materially. A failure to exit
      private beta would compress SOM toward zero.
    claimRefs:
      - C066
