chapter:
  number: 2
  title: Market Analysis
  summary: |
    Thinking Machines Lab addresses two nested markets: the specialist LLM fine-tuning and
    customization services segment, estimated at $2.8 billion in 2025 with a 23.4% CAGR to
    $18.6 billion by 2034, and the broader generative AI model end-user market, which Gartner
    forecasts at $14.2 billion in 2025 growing to $75 billion by 2029. Total GenAI IT spending
    reaches $644 billion in 2025 (hardware-heavy), while MarketsandMarkets pegs the core
    GenAI software/services segment at $71.36 billion in 2025. The company's Tinker product
    targets research scientists and AI-native developers — a technically sophisticated segment
    that values algorithmic control over no-code convenience. Primary growth drivers include
    open-weight model proliferation, LoRA-driven accessibility, and enterprise demand for
    domain-specific accuracy. Key constraints are compute cost, talent scarcity, regulatory
    uncertainty (EU AI Act), and the substantial presence of cloud-incumbent fine-tuning
    services from AWS, Google Vertex AI, and Azure ML. TML's serviceable addressable market
    is estimated at $1–3 billion in 2025, with a realistically obtainable share well below
    $100 million until the platform exits private beta and matures its go-to-market motion.
sections:
  - id: s201
    title: Market Boundary and Definition
    body: |
      Thinking Machines Lab operates at the intersection of two concentric markets. The innermost
      layer is LLM fine-tuning and customization services — platforms and APIs that allow developers
      and researchers to adapt pre-trained open-weight language models to specific tasks, domains,
      or behavioral objectives. This segment, estimated at $2.8 billion in 2025, encompasses
      managed fine-tuning APIs, self-hosted fine-tuning orchestration frameworks, and related
      tooling. It excludes raw GPU cloud compute (AWS, GCP, Azure bare-metal), inference-only
      hosting, and proprietary closed-model APIs (e.g., OpenAI's GPT-4 API without fine-tuning).

      The second layer is the broader generative AI model end-user market — spending on accessing,
      customizing, and operationalizing generative AI model outputs. Gartner sizes this at
      $14.2 billion in 2025, growing to $75 billion by 2029. The outermost layer is total GenAI
      IT spending, which Gartner puts at $644 billion for 2025 — but this is dominated by
      hardware (devices and servers) and is not the relevant addressable market for a software API
      vendor. MarketsandMarkets estimates the core GenAI software and services market at
      $71.36 billion in 2025 with a 43.4% CAGR to $890 billion by 2032, though this definition
      is broader and includes cloud AI infrastructure.

      The relevant status-quo substitute for Tinker is either self-managed fine-tuning on raw GPU
      clusters (high operational burden), no customization at all (use a base model), or cloud
      provider fine-tuning services (AWS SageMaker, Google Vertex AI fine-tuning, Azure OpenAI
      Service fine-tuning). Adjacent segments include RLHF/post-training platforms (Scale AI,
      Labelbox), model evaluation frameworks, and AI observability tools.
