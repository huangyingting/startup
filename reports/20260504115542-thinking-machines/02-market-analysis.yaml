  - id: s202
    title: 'Market Sizing: TAM, SAM, and SOM'
    body: |
      Multiple analyst lenses generate substantially different headline numbers depending on market
      definition. Gartner's total GenAI IT spending figure of $644 billion for 2025 is hardware-
      dominated — approximately 80% is attributed to devices and servers — and therefore inflated
      relative to TML's actual addressable software market. The more relevant Gartner figure is
      GenAI model end-user spending of $14.2 billion in 2025, which captures software licensing,
      API consumption, and customization services. MarketsandMarkets estimates the core generative
      AI market at $71.36 billion, while Dataintelo sizes the specific LLM fine-tuning services
      market at $2.8 billion in 2025. The LLM fine-tuning orchestration sub-market adds roughly
      $3.2 billion, bringing the combined fine-tuning-adjacent segment to approximately $6 billion.

      TML's total addressable market depends on how broadly the company eventually defines its
      scope. If Tinker remains a fine-tuning API, the TAM is approximately $6 billion in 2025.
      If the company expands into full post-training infrastructure or AI lab tooling, the TAM
      widens toward the $14–71 billion range. The serviceable addressable market — restricted to
      English-language, research-and-developer-focused, API-driven fine-tuning of open-weight
      models — is estimated at $1–3 billion in 2025. North America accounts for approximately
      41% of the global fine-tuning market by spend. The serviceable obtainable market for a
      pre-revenue private-beta entrant is realistically below $100 million in the near term,
      dependent on beta-to-paid conversion, pricing finalization, and scale-out of the managed
      infrastructure. Grand View Research projects the broader LLM market to reach $35.4 billion
      by 2030 at a CAGR of approximately 36%, providing a long-horizon growth backstop.
