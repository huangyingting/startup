  - id: s204
    title: Growth Drivers and Adoption Constraints
    body: |
      Several structural forces are accelerating the LLM fine-tuning market. First, the rapid
      proliferation of high-quality open-weight models — including Meta Llama 3.1/3.2, Alibaba
      Qwen-235B-A22B, DeepSeek V3.1, and Kimi K2 — dramatically expands the set of customizable
      foundation models, creating a larger market for fine-tuning tooling. Second, parameter-
      efficient fine-tuning methods (LoRA, QLoRA, DoRA) have reduced the compute cost of
      adaptation, making fine-tuning accessible to teams without petaflop-scale infrastructure.
      Third, enterprise demand for domain-specific accuracy, data privacy, and compliance
      documentation is driving a shift from generic cloud AI APIs toward custom fine-tuned models.
      Fourth, the investment cycle in AI infrastructure — Nvidia's gigawatt-scale commitments,
      Google's data center expansion, and hyperscaler capex growth — is increasing available
      compute supply, which tends to reduce fine-tuning costs over time.

      Constraints are equally structural. GPU supply chains remain Nvidia-dependent, and while
      supply is growing, demand has outpaced it, keeping fine-tuning costs elevated. The EU AI
      Act introduces compliance obligations for high-risk AI systems, adding friction for European
      enterprise adoption. The presence of well-capitalized incumbents — OpenAI's fine-tuning API,
      Google Vertex AI, AWS SageMaker, Azure ML — with existing enterprise relationships, SOC2
      certifications, and procurement integration creates a high switching cost for enterprises
      already operating within hyperscaler ecosystems. Finally, AI talent concentration in a small
      number of institutions limits the addressable research user base in the near term.
    claimRefs:
      - CM007
      - CM008
      - CM011
