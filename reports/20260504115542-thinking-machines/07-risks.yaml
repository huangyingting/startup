  - id: s702
    title: Operational and Infrastructure Risk
    body: |
      TML's operational risks center on its proprietary managed infrastructure model. Unlike
      competitors that run on public cloud infrastructure with hyperscaler reliability
      guarantees, TML operates its own GPU clusters with no disclosed SLA, uptime guarantee,
      or disaster recovery plan. The shared LoRA pool architecture creates a specific risk:
      if the base model weights are corrupted, the cluster suffers an outage, or a scheduling
      bug causes job failures, all concurrent users of that base model are affected
      simultaneously. Multi-tenant infrastructure failures could expose customer training
      data to adjacent tenants or cause catastrophic data loss of fine-tuning checkpoints.

      Infrastructure concentration risk is high: the Blackwell cluster dependency means that
      any disruption in Nvidia GPU supply (US-China export controls, manufacturing delays,
      or supply allocation to larger customers) could directly reduce TML's service capacity.
      The announced migration to Vera Rubin chips in 2027 introduces a transition risk:
      TML's TileLang kernels are optimized for Blackwell; architectural changes in Vera Rubin
      will require non-trivial kernel rewriting.

      Cybersecurity risk is undercharacterized by public disclosure. A platform handling
      sensitive AI training workloads — potentially including proprietary company data,
      classified research data, or personally identifiable information — is a high-value
      target for cybersecurity threats. No disclosed penetration testing results, security
      audits, or bug bounty programs have been published for TML's infrastructure. This gap
      is material for any enterprise customer evaluating Tinker.

      Model training reliability for large MoE models (Qwen-235B, DeepSeek V3.1) is
      technically challenging. MoE fine-tuning has known instability risks including expert
      collapse, routing degradation, and gradient explosion. Without published convergence
      guarantees or job success rate data, users cannot assess TML's reliability for
      production-scale workflows.
    claimRefs:
