company:
  name: Thinking Machines Lab
chapter:
  number: 7
  title: Risks
  summary: |
    Thinking Machines Lab faces a concentrated risk profile across five domains. Regulatory
    risk is elevated and growing: the EU AI Act classifies Tinker as a general-purpose AI
    system (GPAI) provider, imposing transparency and documentation obligations beginning in
    August 2025. US copyright litigation (training data) and model license restrictions
    (Meta Llama, Alibaba Qwen commercial terms) create legal exposure that could constrain
    the model library. Operationally, the shared LoRA pool architecture creates multi-tenant
    isolation risk and infrastructure concentration around Nvidia Blackwell hardware; supply
    chain disruption (US-China chip restrictions, Nvidia production constraints) would
    directly affect service availability. Partner dependency on Nvidia and Google Cloud for
    compute is existential at TML's current scale. People risk is unusually high: three
    co-founders departed within the first year (Tulloch, Zoph, Metz), leaving Mira Murati
    as the dominant decision-maker — a key-person risk concentration that rivals any startup
    in AI. Financial risk centers on compute capex obligations (potentially $1-2B+ in Nvidia
    and Google Cloud commitments) that could compress runway faster than public disclosures
    suggest. None of these risks is necessarily fatal, but their combination at a pre-revenue
    stage with a $12B valuation makes this one of the more risk-concentrated investment
    positions in AI. Key thesis-break triggers include: Nvidia/Google Cloud compute
    disruption, a major GPAI Act enforcement action in the EU, departure of John Schulman
    or Mira Murati, or failure to publish pricing and achieve positive NRR within 12 months
    of GA.
sections:
  - id: s701
    title: Regulatory and Legal Risk
    body: |
      TML faces material regulatory risk from multiple overlapping frameworks, the most
      consequential being the EU AI Act (Regulation 2024/1689, entered into force August 2024,
      GPAI obligations applicable from August 2025). Under the EU AI Act, providers of
      general-purpose AI models (GPAI models) with systemic risk must comply with model
      evaluation, incident reporting, and adversarial testing obligations. Tinker is not
      itself a GPAI model — it is a fine-tuning platform — but TML's maintenance of base
      model weights (Qwen-235B-A22B, DeepSeek V3.1, Llama 3.x) on its managed clusters
      may constitute "making available" those GPAI models within the scope of the Act.
      TML's European legal exposure is uncertain but material: any enterprise customer in the
      EU will require TML to demonstrate EU AI Act compliance before contracting.

      US copyright risk is the most immediate legal risk. The output of fine-tuning (the LoRA
      adapter plus base model weights) may incorporate copyrighted training data in ways that
      courts have not yet definitively resolved. Active litigation (Getty Images v. Stability
      AI, Andersen v. Stability AI, New York Times v. Microsoft/OpenAI) is establishing
      precedent that could constrain AI training methodologies. TML's use of open-weight
      base models does not fully insulate it: the training data used to create those base
      models may be challenged, and fine-tuning on proprietary data could create secondary
      liability if training data is mishandled.

      Meta's Llama Community License restricts commercial use by entities with >700M monthly
      active users and imposes conditions on derivative model distribution. TML's service
      commercially distributes LoRA adapters trained on Llama models; the license terms apply
      to TML's commercial use of Llama model weights. If Meta restricts commercial fine-tuning
      access (as it has done for some regions), TML would need to remove Llama from its
      supported model list — a meaningful reduction in product breadth.

      Data privacy regulation (GDPR in the EU, CCPA in California, emerging US state laws)
      imposes obligations on entities processing personal data in AI training. TML's claim
      that customer training data is not retained does not fully address the question of
      whether base model inference or fine-tuning on data containing personal information
      requires data subject consent under GDPR Article 22.
    claimRefs:
