callouts:
  - calloutType: risk
    title: Three co-founder departures in Year 1 is a material diligence red flag
    body: |
      Andrew Tulloch, Barret Zoph, and Luke Metz all departed TML within its first year of
      operation. Zoph and Metz left for OpenAI — TML's primary competitor. While Soumith
      Chintala's hire partially mitigates the CTO gap, the pattern of founder departures
      raises legitimate questions about internal culture, leadership alignment, and IP
      ownership of early work. Investors should require IP assignment confirmations and
      departure agreement summaries before committing capital.
    claimRefs:
      - CR017
      - CR018
  - calloutType: risk
    title: EU AI Act GPAI obligations are already in force and TML has not disclosed compliance
    body: |
      GPAI obligations under the EU AI Act became applicable to providers in August 2025.
      TML may qualify as a GPAI model provider given its management of frontier model weights.
      No compliance documentation has been published. Without EU AI Act compliance evidence,
      TML cannot credibly target European enterprise customers — a material constraint on
      total addressable market.
    claimRefs:
      - CR001
      - CR003
