  - id: s704
    title: Financial and Market Structural Risks
    body: |
      Financial risk is dominated by the uncertain scope of TML's compute capex obligations.
      The Google Cloud multi-billion dollar deal and Nvidia 1GW partnership may represent
      $1-3B in total capex commitments from a $2B seed raise, potentially compressing runway
      from the 10-25 year estimate to 2-5 years if commitments are deployed quickly. At $12B
      valuation and current pre-revenue stage, TML has no financial buffer against capex
      acceleration except additional fundraising.

      Market structural risk is material. Fine-tuning as a service faces three convergent
      commoditization forces: (1) open-source tooling (PyTorch FSDP, DeepSpeed, Unsloth)
      continues to improve, reducing the infrastructure burden that drives demand for managed
      platforms; (2) hyperscalers (Google Vertex AI, Azure ML, AWS SageMaker) are expanding
      their fine-tuning capabilities and can offer compliance, reliability, and pricing
      advantages that TML cannot match at its current scale; (3) new entrants with similar
      positioning (research-grade fine-tuning APIs) could erode TML's differentiation before
      TML achieves scale advantages.

      A general AI investment correction would disproportionately affect TML given its
      extreme pre-revenue valuation ($12B with zero revenue) relative to companies with
      comparable valuations but established revenue. If the next fundraise falls below the
      $50B target (due to market conditions or competitive developments), TML would face a
      down-round that dilutes existing investors and potentially undermines team morale and
      recruitment.

      The competitive risk from Meta specifically is underappreciated: Meta has deep
      financial resources, the Llama model family, and direct interest in fine-tuning tool
      ecosystems (Meta's fine-tuning infrastructure is built internally). A Meta decision to
      create a public Llama fine-tuning API would eliminate one of TML's most distinctive
      use cases immediately.
    claimRefs:
      - C194
      - C195
      - C196
      - C197
      - C186
  - id: s705
    title: Mitigations and Thesis-Break Triggers
    body: |
      TML's mitigations are nascent and mostly structural (investor relationships, founder
      reputation, compute partnerships) rather than operational (disclosed security controls,
      compliance certifications, retention metrics). The strongest mitigations are:
      (1) Mira Murati's personal credibility as a candidate for key enterprise conversations;
      (2) the breadth of the cap table (Nvidia, Cisco, ServiceNow) providing infrastructure
      and distribution hedges; (3) the $2B seed capital providing financial resilience if
      managed conservatively; and (4) the PBC structure signaling mission-alignment that
      matters to safety-conscious customers.

      Thesis-break triggers — signals that TML's investment thesis is failing — include:
      (1) Pricing not published within 3 months of GA, suggesting inability to validate
      commercial viability; (2) departure of John Schulman or Mira Murati, which would
      fundamentally alter TML's research credibility and leadership; (3) EU AI Act enforcement
      action against TML or material EU regulatory barrier to GPAI compliance; (4) Meta
      Llama license restriction eliminating Llama from TML's supported models; (5) Google
      Cloud or Nvidia compute disruption that reduces service capacity by >50%; (6) a down-
      round at valuation below $12B, which would signal investor loss of confidence.

      Monitoring indicators (the signals to watch before triggers are hit) include: GitHub
      Cookbook activity, academic paper citations of Tinker, EU AI Act enforcement actions
      against comparable GPAI providers, Nvidia/AMD supply chain reports, Meta Llama
      commercial policy changes, and TML job postings indicating enterprise sales investment.
    claimRefs:
      - C198
      - C199
      - C200
      - C201
