callouts:
  - calloutType: risk
    title: Compliance gap blocks enterprise and regulated verticals for 12-24 months
    body: |
      TML has no published SOC 2, ISO 27001, HIPAA, or FedRAMP certifications. Enterprise
      procurement in healthcare, finance, and government requires these certifications.
      Competitors (OpenAI, Azure ML, Vertex AI) carry full compliance stacks. TML's enterprise
      ambitions will be blocked by this gap until certifications are obtained, typically
      18 months from launch for SOC 2 Type II.
    claimRefs:
      - C140
      - C141
  - calloutType: strength
    title: Composable primitives are a genuine developer experience moat
    body: |
      No other commercially available fine-tuning API exposes gradient-level primitives that
      can be freely composed in Python. The combination of forward_backward + sample enables
      arbitrary training algorithm implementations without infrastructure overhead. This design
      is compelling for researchers and will be difficult for hyperscaler platforms to replicate
      quickly without compromising their more restrictive safety and operational models.
    claimRefs:
      - C125
      - C135
