  - id: s502
    title: Product Architecture and Technology Stack
    body: |
      Tinker's architecture has three layers: the developer-facing Python API, the managed
      orchestration layer, and the compute substrate.

      The Python API layer exposes forward_backward and sample as the primary primitives.
      forward_backward accepts a list of training examples (each with a prompt/completion
      pair and optional metadata) and returns gradients, loss values, and optionally
      intermediate activations. sample accepts a prompt or list of prompts and returns
      model completions with log probabilities, enabling on-policy data generation for RLHF.
      Both primitives are designed for composability: users can chain them inside Python
      for-loops to implement virtually any custom training algorithm. The Python SDK handles
      batching, tokenization, and serialization transparently.

      The orchestration layer handles job scheduling, LoRA rank/target configuration,
      multi-GPU distribution, fault tolerance, checkpointing, and metering. TML uses a
      shared LoRA pool model: multiple training jobs can use the same base model weights
      simultaneously, with each job maintaining its own distinct LoRA adapter. This shared-
      pool design reduces GPU memory requirements and allows TML to run many concurrent fine-
      tuning jobs on a given GPU cluster without dedicating entire servers to single customers.

      The compute substrate is TML's internal GPU cluster, currently built on Nvidia Blackwell
      architecture (accessible via the April 2026 Google Cloud deal) and scheduled to expand
      to Vera Rubin chips from 2027 under the Nvidia 1GW partnership. GPU kernel execution is
      optimized via TileLang, an open-source Python-embedded kernel language that allows TML
      to write tile-based GPU programs and achieve better memory utilization than standard
      CUDA libraries for mixed-precision training workloads. The batch invariance research
      (published 2025) addresses a core LoRA training problem: gradient behavior varies
      depending on batch composition when training LoRA adapters on large models, causing
      instability. TML's kernel redesign eliminates this variance, enabling more predictable
      and efficient fine-tuning across diverse batch types.
