figures:
  - id: FE001
    title: Tinker Product Architecture Stack
    type: stack
    layout: standard
    summary: |
      Five-layer architecture stack showing how a researcher's Python code translates into GPU
      compute execution via the Tinker platform. The stack isolates concerns and enables TML
      to upgrade each layer (compute, kernel, orchestration) independently.
    data:
      layers:
        - label: User Code (Python)
          detail: >-
            Researcher writes custom training loop using forward_backward and sample primitives; pure Python; no
            distributed systems knowledge required
        - label: Tinker Python SDK
          detail: >-
            Serializes Python objects to training requests; handles tokenization, batching, retry logic, streaming logs;
            abstracts all infrastructure
        - label: LoRA Orchestration Engine
          detail: >-
            Manages shared base model weights, per-job LoRA adapters, job scheduling, fault recovery, checkpointing, and
            metering
        - label: TileLang Kernel Layer
          detail: >-
            Custom tile-based GPU kernels for mixed-precision LoRA training; achieves batch invariance; optimized for
            Blackwell architecture memory hierarchy
        - label: GPU Compute Infrastructure
          detail: >-
            Nvidia Blackwell cluster (Google Cloud deal, Apr 2026); Vera Rubin cluster planned (2027); hardware
            provisioned and managed entirely by TML
        - label: Base Model Weights Storage
          detail: >-
            Qwen-235B-A22B, Llama, Qwen 2.5, gpt-oss, DeepSeek V3.1, Kimi K2; model weights stored and maintained by
            TML; license compliance managed internally
        - label: Monitoring / Observability
          detail: >-
            Training metrics, job status, convergence diagnostics, and usage metering surfaced through Tinker dashboard
            (beta)
