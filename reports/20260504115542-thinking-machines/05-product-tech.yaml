chapter:
  number: 5
  title: Product & Technology
  summary: |
    Thinking Machines Lab's sole commercial product is Tinker: a Python API for large language
    model fine-tuning using low-rank adaptation (LoRA) on TML-managed GPU infrastructure.
    Tinker's core innovation is exposing forward_backward and sample as first-class primitives
    that give researchers direct, composable access to training dynamics — a developer experience
    that no hosted platform currently matches. The product runs on TML's internal Blackwell-class
    clusters (accessed via the April 2026 Google Cloud deal), with kernel-level optimization
    via TileLang for GPU efficiency. TML has published three research papers supporting specific
    technical claims (batch invariance via GPU kernel redesign, modular manifolds for LoRA
    optimization, on-policy distillation). The Tinker Cookbook is an open-source companion
    library that demonstrates use cases and drives developer adoption. Key technical
    differentiation lies in managed infrastructure (removing engineering burden), model breadth
    (six frontier models including Qwen-235B-A22B), and composable primitives designed for
    research-grade workflows. Enterprise compliance certifications have not been publicly
    disclosed, and safety/alignment controls for Tinker-trained models remain insufficiently
    documented — a material gap for any enterprise or regulated use case.
sections:
  - id: s501
    title: Product Definition and Customer Workflow
    body: |
      Tinker solves a specific workflow bottleneck: researchers and ML engineers who want to
      fine-tune a large language model face a two-part problem — (1) writing and debugging
      distributed training code in CUDA or PyTorch across multi-GPU clusters, and (2)
      managing the hardware infrastructure (scheduling, failure recovery, checkpointing,
      monitoring). Tinker eliminates both by providing a Python API that abstracts away
      infrastructure while exposing the two core training primitives researchers actually need:
      forward_backward (which computes gradients for a batch) and sample (which generates
      completions for RLHF-style on-policy training). Every fine-tuning workflow, from simple
      instruction tuning to complex reinforcement learning from human feedback (RLHF) and
      Group Relative Policy Optimization (GRPO), can be composed from these two primitives.

      The target user is a researcher or ML engineer with Python proficiency who needs to
      fine-tune a frontier-scale model for a specific task. Representative use cases include:
      mathematical reasoning improvement (Princeton Goedel Team, theorem proving), scientific
      discovery (Stanford Rotskoff Lab, chemistry simulation), reinforcement learning research
      (Berkeley SkyRL), and AI safety alignment (Redwood Research). Each of these requires
      more control over training dynamics than commercial fine-tuning APIs (OpenAI, Vertex AI)
      provide, but less infrastructure management overhead than self-hosted fine-tuning requires.
      Tinker occupies this exact niche.

      The product was launched on October 1, 2025 with Python SDK support, LoRA fine-tuning,
      six supported models (at launch), and the Tinker Cookbook as a companion library.
      As of May 2026, the product remains in private beta with no published pricing.
