summary:
  headline: |
    Thinking Machines Lab has assembled arguably the strongest AI infrastructure team in
    history, but it is pre-revenue, has lost three of six founding co-founders in Year 1,
    and is targeting a $50B valuation with no financial evidence to support it.
    Research-more at current reported price; re-evaluate after first ARR cohort.
