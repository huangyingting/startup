summary:
  headline: |
    Thinking Machines Lab 可能组起了史上最强的一支 AI 基础设施团队，但公司仍未产生收入，成立第一年就流失了 6 名联合创始人中的 3 名，
    现在还在冲一个没有财务证据支撑的 $50B 估值。
    按当前传闻价格，更合适的结论仍是继续研究；等第一批 ARR 队列跑出来后再重估。
