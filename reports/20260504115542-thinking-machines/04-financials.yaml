callouts:
  - calloutType: risk
    title: Unpublished pricing is the single largest financial diligence blocker
    body: |
      Seven months after launch, TML has not published Tinker pricing. This prevents any
      revenue model validation, unit economic analysis, or competitive positioning assessment.
      No institutional investor should commit capital at a $50B+ valuation target without
      obtaining and validating the pricing model, at least one full cohort of unit economics,
      and a credible revenue ramp plan.
    claimRefs:
      - C100
      - C114
  - calloutType: assumption
    title: Compute capex commitments may substantially reduce effective runway
    body: |
      The public understanding of TML's capital position assumes $2B raised minus modest
      operating burn. However, the Google Cloud deal (April 2026) and Nvidia 1GW partnership
      (March 2026) may involve substantial capex commitments — potentially $500M-2B in total
      — that would compress runway from 10-25 years to 2-5 years if deployed rapidly.
    claimRefs:
      - C106
      - C107
      - C108
