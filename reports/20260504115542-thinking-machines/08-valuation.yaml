callouts:
  - calloutType: risk
    title: $50B valuation requires $2-5B ARR within 3-5 years — extraordinary assumption for a pre-revenue company
    body: |
      At a 10-25x forward revenue multiple (standard for high-growth AI SaaS), a $50B Series A
      entry price requires $2-5B ARR within 3-5 years. TML has zero current revenue. Achieving
      $2B ARR in 3-5 years would require capturing 10-20% of the projected $10-20B fine-tuning
      TAM — while competing against Google, Microsoft, Amazon, and Meta's increasingly capable
      offerings. This is possible but not probable without material evidence of demand traction.
    claimRefs:
      - C210
      - C216
      - C227
  - calloutType: strength
    title: Team premium is real and justified — the question is whether it's worth $50B
    body: |
      Murati, Schulman, and Chintala represent genuine world-class AI talent concentration.
      In a market where talent scarcity is the binding constraint on AI progress, this team
      commands a premium. The $12B seed valuation implies ~$3-4B per founder in team premium —
      defensible given their respective contributions to GPT-4, RLHF, and PyTorch. At $50B,
      the premium becomes more speculative.
    claimRefs:
      - C205
      - C209
