callouts:
  - title: Enterprise Graph is the Central Differentiation and Central Risk
    body: >-
      The Enterprise Graph is simultaneously Glean's most compelling differentiator and its most critical single point
      of architectural risk. All product capabilities — Search, Assistant, Agents — depend on the Enterprise Graph
      delivering accurate, permission-enforced, personalized knowledge representations. A data quality failure in the
      Graph propagates across all products. The Graph's value also deepens with usage time, creating lock-in, but
      creating a cold-start problem for new deployments where the Graph has insufficient data to personalize
      effectively.
    calloutType: insight
    claimRefs:
      - CE013
      - CE002
  - title: FedRAMP Gap Excludes $8–10B Federal TAM
    body: >-
      Glean has not disclosed any FedRAMP authorization progress, timeline, or investment plans. FedRAMP High
      authorization is a 12–24 month process requiring significant engineering and compliance investment. Without
      FedRAMP, Glean cannot access the US federal government's $8–10B annual AI software TAM — a segment where Microsoft
      (FedRAMP High) and Google (FedRAMP High) have structural advantages.
    calloutType: risk
    claimRefs:
      - CE015
      - CE018
