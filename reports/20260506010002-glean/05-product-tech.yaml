  title: Product and Technology
sections:
  - id: s1
    title: Product Platform Architecture
    body: >-
      Glean's Work AI platform has three core product layers: Glean Search (the foundational enterprise search engine),
      Glean Assistant (the conversational AI layer), and Glean Agents (the autonomous workflow automation layer, GA May
      2025). All three layers are built on top of the Enterprise Graph — a company-specific knowledge representation
      that models relationships between documents, employees, teams, and projects across all connected applications. The
      Enterprise Graph was announced in September 2025 as the third-generation architecture underpinning Glean's
      personalization capabilities. [CE001] [CE002]


      The search layer uses hybrid retrieval combining semantic vector search (dense retrieval) with BM25 keyword
      search, weighted by the Enterprise Graph's signal about a user's role, team, and recent work. Permission-aware
      indexing is the foundational architectural constraint: every document indexed by Glean inherits the access control
      list (ACL) from the source application, ensuring that search results never surface documents a user could not
      access in the source system. This differentiates Glean from consumer-grade search tools that aggregate data
      without permission enforcement. [CE003] [CE004]


      The AI assistant layer uses retrieval-augmented generation: a query retrieves the most relevant documents from the
      Enterprise Graph, which are then passed to a large language model (supporting OpenAI GPT-4, Anthropic Claude, and
      Google Gemini via the Model Hub) to generate a cited response. Glean does not fine-tune the base LLM on company
      data — it uses in-context retrieval, avoiding both hallucination risk and data privacy concerns that would arise
      from training company data into model weights. [CE005] [CE006]
  - id: s2
    title: Integrations, Deployment, and Reliability
    body: >-
      Glean supports 100+ connector integrations across the enterprise SaaS stack, including Google Workspace, Microsoft
      365, Slack, Salesforce, GitHub, Jira, Confluence, Notion, Dropbox, Box, ServiceNow, Workday, and more. Each
      connector is a purpose-built integration that handles authentication (OAuth 2.0), incremental indexing (delta
      updates), and ACL inheritance for that specific application. Maintaining 100+ connectors with high reliability
      requires significant ongoing engineering investment as source application APIs evolve. [CE007] [CE008]


      Deployment options include cloud SaaS (Glean-hosted on Google Cloud Platform / AWS), private cloud deployment
      within the customer's own GCP or AWS account, and a future on-premises option. The Model Hub — announced in 2025 —
      allows customers to choose which underlying LLM powers their Glean Assistant, supporting OpenAI, Anthropic,
      Google, and potentially open-source models. This model-agnostic architecture is a trust and procurement advantage
      in regulated industries. [CE009] [CE010]


      Glean operates across multiple deployment surfaces: the Glean web app, Chrome extension, Slack integration,
      Microsoft Teams integration, Zoom integration, and mobile apps. The multi-surface presence is critical for daily
      active usage: employees should encounter Glean wherever they are already working, reducing the friction of
      switching to a new search interface. The third-gen Glean Assistant in September 2025 added multi-step task
      execution — the ability to complete a research task in multiple automated steps rather than requiring the user to
      issue each query manually. [CE011] [CE012]
  - id: s3
    title: Differentiation, Trust, and Roadmap
    body: >-
      Glean's technical differentiation rests on four pillars: (1) connector breadth (100+ vs single-ecosystem
      competitors); (2) permission-aware indexing architecture that enforces source-system ACLs at query time; (3) the
      Enterprise Graph personalization layer that adapts search results to each employee's context; and (4) the Model
      Hub allowing customers to choose their preferred LLM vendor. No competitor has demonstrated all four capabilities
      simultaneously in a production enterprise deployment. [CE013] [CE014]


      Security and compliance capabilities are critical differentiators for enterprise procurement. Glean holds SOC 2
      Type II, ISO 27001, and GDPR compliance certifications, required for European deployments. The company supports
      SSO (SAML, OIDC), SCIM provisioning, field-level encryption, and data residency options for regulated industries.
      SOC 2 Type II is the minimum standard for enterprise IT procurement; ISO 27001 is required for European Union
      customers. [CE015] [CE016]


      Roadmap signals from public announcements suggest Glean is investing in: (1) deeper agent capabilities —
      multi-agent orchestration for complex enterprise workflows; (2) the Agent Library — a marketplace of pre-built
      agents for common enterprise tasks; (3) Data Analysis capabilities (launched 2025) for structured data queries;
      (4) Canvas (collaborative AI workspace); and (5) Deep Research mode for multi-step knowledge synthesis. The shift
      from pure search to agentic workflow automation is the central product evolution thesis. [CE017] [CE018]
