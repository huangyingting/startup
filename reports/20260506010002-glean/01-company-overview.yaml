callouts:
  - title: Founder Pedigree as Structural Moat
    body: >-
      Arvind Jain's unique profile — nine years as Google search infrastructure engineer plus co-founder of Rubrik
      (cloud data management IPO 2024) — is virtually impossible to replicate. This dual credibility (technical search
      depth + proven enterprise CEO) makes Glean's founder-market fit among the strongest in enterprise AI. The team's
      ability to recruit ex-Google search engineers at density creates a compounding talent moat.
    calloutType: strength
    claimRefs:
      - CO006
      - CO010
  - title: Valuation Multiple Risk
    body: >-
      At $7.2B valuation against approximately $100–200M ARR, Glean trades at 36–72x ARR — among the highest multiples
      in enterprise software. This pricing requires Glean to sustain 2x+ ARR growth for multiple years, expand its total
      addressable market beyond pure search into agentic AI, and demonstrate the defensibility of its moat against
      Microsoft 365 Copilot, the dominant incumbent. Any deceleration in ARR growth makes the current valuation
      difficult to defend.
    calloutType: risk
    claimRefs:
      - CO013
      - CO019
