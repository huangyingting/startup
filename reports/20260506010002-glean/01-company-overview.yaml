  title: Company Overview
sections:
  - id: s1
    title: Identity and Business Model
    body: >-
      Glean Technologies, Inc. is an enterprise AI platform company founded in March 2019 and headquartered in Palo
      Alto, California. The company builds a Work AI platform that unifies enterprise search, an AI assistant, and
      autonomous AI agents across more than 100 workplace application integrations. Glean's core product allows
      knowledge workers to query all company data — from Slack messages to Salesforce records to GitHub pull requests —
      through a single permission-aware interface powered by a large language model and retrieval-augmented generation
      (RAG). The AI assistant answers questions with citations grounded in the company's own documents, avoiding the
      hallucination problem that afflicts general-purpose AI chatbots. In 2025, the company launched Glean Agents (GA
      May 2025) — autonomous agents that execute multi-step workflows using company data — and the Enterprise Graph
      (September 2025), a personalization layer that adapts responses to each employee's role, team, and past
      interactions. [CO001] [CO002] [CO003]


      Glean's business model is per-seat SaaS, typically priced at enterprise ACV of $100,000–$1,000,000 per year
      depending on seat count and module usage, with larger accounts paying for premium agentic and governance features.
      The company targets mid-market and large enterprise organizations (500–100,000+ employees) that face acute
      knowledge-management fragmentation. Revenue model is subscription-based with consumption uplift for agent task
      execution. The company had no disclosed self-service tier as of Q1 2026. [CO004] [CO005]
  - id: s2
    title: Founders and Leadership
    body: >-
      Glean was co-founded by four ex-big-tech engineers with deep search and infrastructure backgrounds. Arvind Jain
      (CEO) previously co-founded Rubrik (cloud data management unicorn, IPO 2024) and spent nine years at Google as a
      principal engineer on search infrastructure, making him one of the few founders with both a prior successful exit
      and direct institutional knowledge of large-scale search systems. T.R. Vishwanath (CTO, ex-Meta) led
      infrastructure for large distributed systems at Facebook. Tony Gentilcore (ex-Google) contributed to Google's core
      search ranking and relevance teams. Piyush Prahladka (ex-Google) led AI and search product development at Google.
      [CO006] [CO007] [CO008] [CO009]


      The founding team's direct experience building Google's search infrastructure — the world's most sophisticated
      information retrieval system — is the single most important source of Glean's technical differentiation. This
      pedigree enabled Glean to hire a dense cluster of ex-Google, ex-Meta, and ex-Dropbox search engineers who would be
      difficult for a team without Google-brand credibility to recruit. [CO010] [CO011]


      Arvind Jain's prior exit via Rubrik demonstrates capital deployment discipline and go-to-market acumen in
      enterprise software, significantly reducing key-person risk relative to first-time founder CEOs. The board
      includes representation from Kleiner Perkins (Mamoon Hamid), Sequoia Capital, and General Catalyst, providing
      elite venture governance. [CO012]
  - id: s3
    title: Funding History and Capital Position
    body: >-
      Glean has raised approximately $765 million across six rounds from 2019 to 2025, reaching a $7.2 billion valuation
      in its June 2025 Series F led by Wellington Management. The funding trajectory — from $15M Series A in 2019 to
      $150M Series F six years later — reflects both early investor conviction and an accelerating willingness to pay
      premium multiples for enterprise AI software with demonstrated ARR growth. [CO013] [CO014] [CO015]


      The investor syndicate is exceptionally strong: Kleiner Perkins and Lightspeed Venture Partners co-led the Series
      A and co-led the Series D, demonstrating multi-round conviction rarely seen in enterprise software. Sequoia led
      the $100M Series C that took Glean to unicorn status in May 2022. The Series D added strategic investors Capital
      One Ventures, Databricks Ventures, Citi, and Workday Ventures — a set of enterprise software buyers validating
      both product-market fit and strategic relevance. The Series E added Altimeter Capital and DST Global; the Series F
      added Wellington Management, Khosla Ventures, Bicycle Capital, and Geodesic Capital. [CO016] [CO017] [CO018]


      ARR progressed from approximately $40M in 2023 to $100M by December 2024 — a 2.5x increase — and reached an
      estimated $200M by end of 2025, with a disclosed 2025 internal target of $200–250M. The company nearly quadrupled
      ARR in the year preceding the Series D (early 2024). Customer count has exceeded 200 enterprise accounts, roughly
      doubling year-on-year in 2024. [CO019] [CO020] [CO021]


      The company employed approximately 1,300–1,500 people as of late 2025, up from under 700 at the time of the Series
      E. This headcount trajectory is consistent with scaling an enterprise sales and go-to-market organization to
      pursue a multi-billion-dollar software opportunity globally. [CO022] [CO023]
