  - id: F801
    title: Investment Recommendation Logic Flow
    type: flow
    layout: standard
    summary: >-
      Decision flow showing the investment recommendation logic: strong thesis + strong traction + expensive valuation =
      TRACK recommendation. Key decision gates are NRR disclosure, valuation entry discipline, and hyperscaler
      competitive monitoring.
    data:
      nodes:
        - id: f1
          label: 'Market thesis: durable demand?'
          detail: Enterprise knowledge fragmentation is structural; neutral multi-ecosystem search has lasting demand
        - id: f2
          label: 'Product thesis: defensible?'
          detail: Enterprise Graph + 100+ connectors + permission-aware architecture creates switching cost moat
        - id: f3
          label: 'Traction thesis: validated?'
          detail: $200M ARR, 200+ enterprises, 40% DAU/MAU, 100% YoY growth
        - id: f4
          label: 'NRR: disclosed and >120%?'
          detail: 'NOT DISCLOSED: critical gate for investment decision'
        - id: f5
          label: 'Valuation: acceptable entry?'
          detail: '36x ARR at $7.2B: too expensive for base-case risk; need 15-20x entry'
        - id: f6
          label: 'TRACK: High-conviction watchlist'
          detail: Monitor for Series G, secondary, IPO S-1, or market correction entry at $3-4B
      edges:
        - from: f1
          to: f2
          label: YES → continue
        - from: f2
          to: f3
          label: YES → continue
        - from: f3
          to: f4
          label: YES → continue
        - from: f4
          to: f5
          label: UNKNOWN → proceed with caution
        - from: f5
          to: f6
          label: NO → TRACK; wait for better entry
    claimRefs:
      - C265
      - C266
