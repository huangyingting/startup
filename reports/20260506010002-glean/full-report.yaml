  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and ARR Trajectory
        blocks:
          - type: paragraph
            body: >-
              Glean generates revenue through per-seat SaaS subscriptions priced at the enterprise tier. Typical
              enterprise ACV ranges from $100,000 to over $1,000,000 depending on seat count, modules (Search-only vs
              Search + Assistant + Agents), and deployment complexity. The company reported $100 million in ARR by
              December 2024, up from approximately $40 million in 2023 — a 2.5x year-over-year increase. An internal
              target of $200–250 million ARR by end of 2025 was disclosed to Business Insider, consistent with continued
              2x+ growth. [C106] [C107] [C108]


              Revenue recognition is subscription-based under ASC 606, with enterprise agreements typically structured
              as annual or multi-year contracts paid annually in advance. This creates favorable working capital
              dynamics: cash collected upfront before revenue is recognized. Glean has not disclosed revenue mix between
              Search, Assistant, and Agents modules, but the launch of Agents in May 2025 represents a potential
              consumption-based revenue layer on top of the seat subscription. [C109] [C110]


              ARR progression: 2022 ~$10M (estimated from quadrupled ARR report), 2023 ~$40M, 2024 $100M, 2025 target
              $200–250M. The reported 4x ARR growth in the year preceding February 2024 (Series D) suggests 2022-to-2023
              growth was the fastest growth phase. If the 2025 target of $200–250M is achieved, it would represent the
              third consecutive year of 2x+ ARR growth. [C111] [C112]
            claimRefs: []
      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >-
              Glean's gross margin profile is not publicly disclosed. Enterprise SaaS companies with comparable
              architectures (heavy cloud infrastructure, LLM API costs, and connector maintenance) typically achieve
              70–80% gross margins at scale. However, Glean's use of third-party LLM APIs (OpenAI, Anthropic, Google
              Gemini) adds a variable cost layer that degrades gross margin at lower seat counts. Estimated gross margin
              at current scale: 65–75%, improving toward 75–80% as seat count grows and LLM API costs continue to
              decline. [C113] [C114]


              The cost structure is dominated by headcount: 1,300–1,500 employees generating approximately $150–250M in
              annual salary and benefits cost at San Francisco Bay Area market rates, plus $50–100M in cloud
              infrastructure and LLM API costs. Total estimated annual operating expense is $250–400M per year at the
              current scale. With $100M ARR (Dec 2024), this implies an operating loss of $150–300M annually, or a burn
              rate of $70–150M per quarter. [C115] [C116]


              CAC and sales efficiency: Glean's 200+ enterprise customers acquired over approximately 3 years of
              commercial operations implies 60–70 new enterprise logos per year. At an estimated $50–200K fully-loaded
              CAC per enterprise logo (including SDR, AE, SE, and marketing costs), implied total CAC spend is $3–14M
              per year. At $100M ARR and 200+ customers, implied average ACV is $500K, suggesting a CAC payback period
              of 1–2 years — favorable for enterprise SaaS but not confirmed. [C117] [C118]
            claimRefs: []
      - number: '4.3'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >-
              Glean has raised approximately $765 million across six rounds through June 2025. At an estimated burn rate
              of $70–150M per quarter ($280–600M per year), the company has an estimated 1.5–3 years of runway from the
              Series F close in June 2025. The wide range reflects the uncertainty in operating cost estimates from
              public sources. [C119] [C120]


              The company's path to profitability depends on whether ARR growth continues at 2x+ annually: if Glean
              reaches $400M ARR by 2026, operating leverage on a fixed cost base of ~$350M could approach breakeven. If
              ARR growth decelerates to 1.5x or below, the company would need additional capital before reaching
              profitability, creating financing dependency risk. [C121] [C122]


              The Series F at $7.2B valuation was led by Wellington Management — a pre-IPO institutional investor —
              which is a positive signal for an IPO readiness trajectory. At $200M ARR and 2x+ growth, Glean would
              likely qualify for a public market offering in 2026–2027, although the software IPO window remains
              uncertain. The company has not disclosed any IPO plans. [C123] [C124]
            claimRefs: []
      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: ARR Quality Cannot Be Assessed Without NRR Data
            body: >-
              The single most important financial diligence item is net dollar retention. Without NRR, investors cannot
              determine whether Glean's $100M ARR is driven by expanding cohorts (high quality, high predictability) or
              primarily by new logos (volume-dependent, churn-exposed). Enterprise SaaS companies with best-in-class NRR
              (>120%) trade at premium multiples; companies with NRR below 110% at Glean's growth stage face multiple
              compression risk.
