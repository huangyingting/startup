  productSummary: >-
    Glean's Work AI platform has three product layers: Glean Search (AI-powered enterprise search with permission-aware
    indexing across 100+ app connectors), Glean Assistant (RAG-grounded conversational AI using the multi-LLM Model
    Hub), and Glean Agents (autonomous workflow automation, GA May 2025). The Enterprise Graph (Sep 2025) is the
    proprietary personalization layer that models relationships between documents, employees, and teams across all
    connected applications, adapting all three product layers to each employee's individual context. Pricing is
    seat-based with annual enterprise commitments; estimated 5-25 per user per month at list price. SOC 2 Type II, ISO
    27001, and GDPR certifications satisfy enterprise procurement requirements for US and European customers.
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Glean Technologies, Inc. is an enterprise AI platform company founded in March 2019 and headquartered in
              Palo Alto, California. The company builds a Work AI platform that unifies enterprise search, an AI
              assistant, and autonomous AI agents across more than 100 workplace application integrations. Glean's core
              product allows knowledge workers to query all company data — from Slack messages to Salesforce records to
              GitHub pull requests — through a single permission-aware interface powered by a large language model and
              retrieval-augmented generation (RAG). The AI assistant answers questions with citations grounded in the
              company's own documents, avoiding the hallucination problem that afflicts general-purpose AI chatbots. In
              2025, the company launched Glean Agents (GA May 2025) — autonomous agents that execute multi-step
              workflows using company data — and the Enterprise Graph (September 2025), a personalization layer that
              adapts responses to each employee's role, team, and past interactions. [C001] [C002] [C003]


              Glean's business model is per-seat SaaS, typically priced at enterprise ACV of $100,000–$1,000,000 per
              year depending on seat count and module usage, with larger accounts paying for premium agentic and
              governance features. The company targets mid-market and large enterprise organizations (500–100,000+
              employees) that face acute knowledge-management fragmentation. Revenue model is subscription-based with
              consumption uplift for agent task execution. The company had no disclosed self-service tier as of Q1 2026.
              [C004] [C005]
            claimRefs: []
      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >-
              Glean was co-founded by four ex-big-tech engineers with deep search and infrastructure backgrounds. Arvind
              Jain (CEO) previously co-founded Rubrik (cloud data management unicorn, IPO 2024) and spent nine years at
              Google as a principal engineer on search infrastructure, making him one of the few founders with both a
              prior successful exit and direct institutional knowledge of large-scale search systems. T.R. Vishwanath
              (CTO, ex-Meta) led infrastructure for large distributed systems at Facebook. Tony Gentilcore (ex-Google)
              contributed to Google's core search ranking and relevance teams. Piyush Prahladka (ex-Google) led AI and
              search product development at Google. [C006] [C007] [C008] [C009]


              The founding team's direct experience building Google's search infrastructure — the world's most
              sophisticated information retrieval system — is the single most important source of Glean's technical
              differentiation. This pedigree enabled Glean to hire a dense cluster of ex-Google, ex-Meta, and ex-Dropbox
              search engineers who would be difficult for a team without Google-brand credibility to recruit. [C010]
              [C011]


              Arvind Jain's prior exit via Rubrik demonstrates capital deployment discipline and go-to-market acumen in
              enterprise software, significantly reducing key-person risk relative to first-time founder CEOs. The board
              includes representation from Kleiner Perkins (Mamoon Hamid), Sequoia Capital, and General Catalyst,
              providing elite venture governance. [C012]
            claimRefs: []
      - number: '1.3'
        title: Funding History and Capital Position
        blocks:
          - type: paragraph
            body: >-
              Glean has raised approximately $765 million across six rounds from 2019 to 2025, reaching a $7.2 billion
              valuation in its June 2025 Series F led by Wellington Management. The funding trajectory — from $15M
              Series A in 2019 to $150M Series F six years later — reflects both early investor conviction and an
              accelerating willingness to pay premium multiples for enterprise AI software with demonstrated ARR growth.
              [C013] [C014] [C015]


              The investor syndicate is exceptionally strong: Kleiner Perkins and Lightspeed Venture Partners co-led the
              Series A and co-led the Series D, demonstrating multi-round conviction rarely seen in enterprise software.
              Sequoia led the $100M Series C that took Glean to unicorn status in May 2022. The Series D added strategic
              investors Capital One Ventures, Databricks Ventures, Citi, and Workday Ventures — a set of enterprise
              software buyers validating both product-market fit and strategic relevance. The Series E added Altimeter
              Capital and DST Global; the Series F added Wellington Management, Khosla Ventures, Bicycle Capital, and
              Geodesic Capital. [C016] [C017] [C018]


              ARR progressed from approximately $40M in 2023 to $100M by December 2024 — a 2.5x increase — and reached
              an estimated $200M by end of 2025, with a disclosed 2025 internal target of $200–250M. The company nearly
              quadrupled ARR in the year preceding the Series D (early 2024). Customer count has exceeded 200 enterprise
              accounts, roughly doubling year-on-year in 2024. [C019] [C020] [C021]


              The company employed approximately 1,300–1,500 people as of late 2025, up from under 700 at the time of
              the Series E. This headcount trajectory is consistent with scaling an enterprise sales and go-to-market
              organization to pursue a multi-billion-dollar software opportunity globally. [C022] [C023]
            claimRefs: []
      - number: '1.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Founder Pedigree as Structural Moat
            body: >-
              Arvind Jain's unique profile — nine years as Google search infrastructure engineer plus co-founder of
              Rubrik (cloud data management IPO 2024) — is virtually impossible to replicate. This dual credibility
              (technical search depth + proven enterprise CEO) makes Glean's founder-market fit among the strongest in
              enterprise AI. The team's ability to recruit ex-Google search engineers at density creates a compounding
              talent moat.
            calloutType: strength
            claimRefs:
              - C006
              - C010
          - type: callout
            title: Valuation Multiple Risk
            body: >-
              At $7.2B valuation against approximately $100–200M ARR, Glean trades at 36–72x ARR — among the highest
              multiples in enterprise software. This pricing requires Glean to sustain 2x+ ARR growth for multiple
              years, expand its total addressable market beyond pure search into agentic AI, and demonstrate the
              defensibility of its moat against Microsoft 365 Copilot, the dominant incumbent. Any deceleration in ARR
              growth makes the current valuation difficult to defend.
