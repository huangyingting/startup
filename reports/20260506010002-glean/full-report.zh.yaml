          detail: GPT-4 及后续模型；主要 LLM 供应商
        - id: d2
          label: Anthropic API
          detail: Claude 模型；次要 LLM 选项
        - id: d3
          label: Google Gemini API
          detail: Gemini 模型；第三个 LLM 选项
        - id: d4
          label: GCP / AWS 基础设施
          detail: 核心计算、存储、网络
        - id: d5
          label: 源应用 API（100+）
          detail: Slack、Salesforce、Google Workspace、M365、Jira、Confluence 等
        - id: d6
          label: Glean Model Hub
          detail: LLM 路由层；用多供应商架构提高韧性
        - id: d7
          label: 企业图谱引擎
          detail: 个性化与知识图谱层；产品核心依赖
        - id: d8
          label: Glean 产品（Search / Assistant / Agents）
          detail: 面向客户的产品；全部依赖图谱引擎
      edges:
        - from: d1
          to: d6
        - from: d2
          to: d6
        - from: d3
          to: d6
        - from: d4
          to: d7
        - from: d5
          to: d7
        - from: d6
          to: d7
        - from: d7
          to: d8
    claimRefs:
      - CR014
      - CR003
  - id: FV001
    title: 投资建议逻辑流程
    type: flow
    layout: standard
    summary: 决策流展示投资建议逻辑：投资逻辑强、商业牵引强，但估值昂贵，因此给出观察（TRACK）建议。关键关口是 NRR 披露、估值入场纪律，以及对超大规模云厂商竞争的持续跟踪。
    data:
      nodes:
        - id: f1
          label: 市场逻辑：需求是否耐久？
          detail: 企业知识碎片化是结构性问题；中立、跨生态搜索需求会长期存在
        - id: f2
          label: 产品逻辑：是否守得住？
          detail: Enterprise Graph、100+ 连接器和权限感知架构共同抬高切换成本，形成护城河
        - id: f3
          label: 牵引逻辑：是否已验证？
          detail: $200M ARR、200+ 家企业、40% DAU/MAU、同比增长 100%
        - id: f4
          label: NRR：是否披露且 >120%？
          detail: 未披露：投资决策的关键关口
        - id: f5
          label: 估值：入场价是否可接受？
          detail: $7.2B 对应 36x ARR：以基准情景风险看太贵；需要 15-20x 入场
        - id: f6
          label: TRACK：高确信度观察名单
          detail: 跟踪 Series G、老股交易、IPO S-1，或市场回调后 $3-4B 入场窗口
      edges:
        - from: f1
          to: f2
          label: 是 → 继续
        - from: f2
          to: f3
          label: 是 → 继续
        - from: f3
          to: f4
          label: 是 → 继续
        - from: f4
          to: f5
          label: 未知 → 谨慎推进
        - from: f5
          to: f6
          label: 否 → 观察；等待更好入场价
    claimRefs:
      - CV015
      - CV016
  - id: FV002
    title: 按 ARR 倍数与 2027 年 ARR 测算的估值敏感性
    type: bar
    layout: wide
    summary: 柱状图展示不同 ARR 与倍数情景下，Glean 2027 年隐含估值。图中标出 $7.2B 的 Series F 入场价用于对比。只有乐观情景下 20x 倍数能产生回报；基准和悲观情景都会亏损。
    data:
      items:
        - label: 悲观 – 10x（$250M ARR）
          value: 2.5
        - label: 悲观 – 15x（$250M ARR）
          value: 3.75
        - label: 基准 – 10x（$400M ARR）
          value: 4
        - label: 基准 – 15x（$400M ARR）
          value: 6
        - label: 基准 – 20x（$400M ARR）
          value: 8
        - label: 乐观 – 15x（$600M ARR）
          value: 9
        - label: 乐观 – 20x（$600M ARR）
          value: 12
    claimRefs:
      - CV013
      - CV014
  - id: FV003
    title: 按情景划分的估值回报区间（2027 年退出）
    type: range
    layout: standard
    summary: 区间图展示从 $7.2B Series F 入场价出发，2027 年退出估值可能落在的范围（单位：$B）。悲观情景意味着 -65% 减值；乐观情景意味着 +67% 回报。基准情景下亏损 -17%，说明以基准情景下注时入场价太高。
    data:
      items:
        - label: 悲观情景估值区间
          low: 2
          high: 3.5
        - label: 基准情景估值区间
          low: 5
          high: 7
        - label: 乐观情景估值区间
          low: 10
          high: 13.5
        - label: 合理入场估值（15-20x ARR）
          low: 3
          high: 4
    claimRefs:
      - CV013
  - id: FV004
    title: 投资决策 KPI
    type: kpi
    layout: standard
    summary: 投资决策的关键绩效指标，展示当前数值相对投资逻辑阈值的表现。
    data:
      items:
        - label: ARR（2025 年估计）
          value: $200M+
          context: 纳入考虑阈值：$100M+ ✓
        - label: ARR 同比增长
          value: ~100%
          context: 阈值：>80%，支撑 AI 溢价倍数 ✓
        - label: 企业客户
          value: 200+
          context: 阈值：100+ 个标杆客户 ✓
        - label: DAU/MAU 活跃度
          value: ~40%
          context: 阈值：>30%，验证企业日常使用习惯 ✓
        - label: NRR
          value: Not disclosed
          context: 阈值：必须 >120% ✗（未知）
        - label: 入场估值
          value: $7.2B (36x ARR)
          context: 目标入场：$3-4B（15-20x ARR）✗（太贵）
        - label: 估值判断
          value: Expensive
          context: 36x ARR 没有安全边际
        - label: 建议
          value: TRACK
          context: Series G、老股交易或 IPO S-1 时再评估
    claimRefs:
      - CV015
