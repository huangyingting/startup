      - number: '8.2'
        title: 估值背景与可比公司
        blocks:
          - type: paragraph
            body: >-
              Glean 在 June 2025 以 $150M Series F 对应 $7.2B 估值，隐含约 36x 估计 $200M ARR 收入倍数——只有在 Glean 能再维持 3+ 年 80%+
              增长时，这一溢价估值才站得住。可比私募市场数据包括：Moveworks（$2.9B，2023 估值，~$50M ARR → ~58x ARR）；Guru（$1.3B，2022，ARR 更低）；以及
              Elastic（上市公司，ELK stack 企业搜索，~7x 远期收入）。Moveworks 这个可比对象最直接：Moveworks 是近身竞争对手，解决类似的企业知识管理痛点。Elastic
              的公开市场倍数（7–8x）代表增长更慢、但已站稳的企业搜索公司的底部。[CV007] [CV008] [CV009]


              公开 SaaS 市场背景：Glean 完成 Series F 时（June 2025），BVP Nasdaq Emerging Cloud Index 交易在 8–10x 远期收入；前四分位高增长云公司（>50%
              增长）可获得 15–20x；高速增长 AI 公司（>80% 增长）可获得 25–40x。Glean 的 36x ARR 倍数处于 AI 溢价区间高端，只有继续保持 >80% YoY 增长才可持续。如果增速放缓到
              60% YoY，公开市场可比公司的入场倍数会压缩到 ~20x ARR，隐含 $4B 估值——较 Series F 入场价减值 44%。[CV010] [CV011] [CV012]


              关键估值假设是 ARR 增长轨迹：在 $200M ARR、100% YoY 增长下，Glean 距离 $800M–$1B ARR 还需 3–4 年；这个规模可支撑以 12–15x 收入 IPO，对应
              $10–15B 公开市场市值。关键路径包括：（1）将 NRR 维持在 120% 以上；（2）在竞争性续约中正面对赢 Microsoft Copilot；（3）在 12–18 个月内证明 Agents
              增购收入。三者任一失败，都会构成实质性投资逻辑破裂事件。[CV013] [CV014]
            claimRefs: []
