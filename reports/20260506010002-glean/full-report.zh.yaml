      - number: '7.4'
        title: 附录
        blocks:
          - type: callout
            title: 超大规模云厂商捆绑销售是决定性长期风险
            body: >-
              Microsoft 和 Google 不只是竞争对手——它们还是大多数 Glean 客户的基础设施提供商。每个 Glean 客户已经在为 Microsoft 或 Google 的生产力套件付费。随着 M365
              Copilot 和 Google Gemini 的捆绑 AI 搜索能力提升，单独为 Glean 付费的边际价值会收窄。Glean 最好的防御，是在多生态搜索上持续保持质量优势（没有竞争对手能同时横跨
              Microsoft 和 Google 捆绑），并向捆绑替代品最弱的智能体用例扩张。这个风险无法完全缓释——它是 Glean 市场位置的结构性特征。
            calloutType: risk
