      - number: '5.2'
        title: 集成、部署与可靠性
        blocks:
          - type: paragraph
            body: >-
              Glean 支持企业 SaaS 栈上的 100+ 连接器集成，包括 Google Workspace、Microsoft
              365、Slack、Salesforce、GitHub、Jira、Confluence、Notion、Dropbox、Box、ServiceNow、Workday
              等。每个连接器都是为特定应用定制的集成，处理身份验证（OAuth 2.0）、增量索引（delta updates）和 ACL 继承。随着源应用 API 演进，要让 100+
              连接器保持高可靠，需要持续投入大量工程资源。 [CE007] [CE008]


              部署选项包括云 SaaS（Glean 托管在 Google Cloud Platform / AWS）、客户自有 GCP 或 AWS 账户内的私有云部署，以及未来的本地部署选项。2025 年宣布的 Model
              Hub 允许客户选择哪种底层 LLM 驱动 Glean Assistant，支持 OpenAI、Anthropic、Google，以及潜在开源模型。这种模型无关架构在受监管行业里构成信任和采购优势。
              [CE009] [CE010]


              Glean 覆盖多个部署表面：Glean 网页应用、Chrome 扩展、Slack 集成、Microsoft Teams 集成、Zoom 集成和移动应用。多表面存在对日活至关重要：员工应当在已经工作的地方遇到
              Glean，从而减少切换到新搜索界面的摩擦。2025 年 9 月第三代 Glean Assistant 增加了多步骤任务执行能力——可以用多个自动化步骤完成研究任务，而不是要求用户手动发出每一次查询。
              [CE011] [CE012]
            claimRefs: []
