            body: >-
              Arvind Jain 的画像几乎不可复制：在 Google 做了 9 年搜索基础设施工程师，又联合创办 Rubrik（云数据管理公司，2024 年 IPO）。这种双重可信度——搜索技术深度 + 已验证的企业软件
              CEO——让 Glean 的创始人与市场匹配度在企业 AI 里处于最强一档。团队能高密度招募前 Google 搜索工程师，进一步形成复利式人才护城河。
            calloutType: strength
