  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品平台架构
        blocks:
          - type: paragraph
            body: >-
              Glean 的 Work AI 平台有三层核心产品：Glean Search（基础企业搜索引擎）、Glean Assistant（对话式 AI 层）和 Glean Agents（自主工作流自动化层，2025 年
              5 月 GA）。三层都建立在 Enterprise Graph 之上；Enterprise Graph 是公司特定的知识表示，建模所有已连接应用中文档、员工、团队和项目之间的关系。Glean 于 2025 年 9
              月宣布 Enterprise Graph 是支撑其个性化能力的第三代架构。 [CE001] [CE002]


              搜索层采用混合检索，把语义向量搜索（dense retrieval）与 BM25 关键词搜索结合起来，并按 Enterprise Graph
              对用户角色、团队和近期工作的信号加权。权限感知索引是基础架构约束：Glean 索引的每份文档都继承源应用的访问控制列表（ACL），确保搜索结果永远不会浮现用户在源系统中无法访问的文档。这让 Glean
              区别于那些不做权限执行就聚合数据的消费级搜索工具。 [CE003] [CE004]


              AI 助手层使用检索增强生成：查询会从 Enterprise Graph 找回最相关文档，再传给大语言模型（通过 Model Hub 支持 OpenAI GPT-4、Anthropic Claude 和
              Google Gemini）生成带引用的回答。Glean 不会用公司数据微调基础 LLM，而是使用上下文内检索；这样既避开幻觉风险，也避开把公司数据训练进模型权重会引发的数据隐私问题。 [CE005]
              [CE006]
            claimRefs: []
