  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与 ARR 轨迹
        blocks:
          - type: paragraph
            body: >-
              Glean 通过按席位收费的企业级 SaaS 订阅产生收入。典型企业 ACV 从 $100,000 到超过 $1,000,000 不等，取决于席位数、模块（仅 Search vs Search +
              Assistant + Agents）和部署复杂度。公司披露截至 2024 年 12 月 ARR 达到 $100M，高于 2023 年约 $40M，同比增长 2.5x。Business Insider
              披露的内部目标是 2025 年底 ARR 达到 $200–250M，与持续 2x+ 增长相符。 [CI001] [CI002] [CI003]


              收入确认按 ASC 606 采用订阅模式，企业协议通常是年度或多年期合同，并按年预付。这带来有利的营运资本动态：现金在收入确认前先收进来。Glean 未披露 Search、Assistant 和 Agents
              模块之间的收入结构，但 2025 年 5 月 Agents 上线，可能在席位订阅之上增加一层基于用量的收入。 [CI004] [CI005]


              ARR 进展：2022 年约 $10M（根据 ARR 翻四倍报道估算）、2023 年约 $40M、2024 年 $100M、2025 年目标 $200–250M。2024 年 2 月（Series D）前一年
              ARR 增长 4x，说明 2022 到 2023 年是最快增长阶段。如果 2025 年 $200–250M 目标达成，公司将连续第三年实现 2x+ ARR 增长。 [CI006] [CI007]
