      - number: '6.3'
        title: 客户成功、NPS 与留存
        blocks:
          - type: paragraph
            body: >-
              公开记录中的 Glean 客户成功信号以正面为主。截至 2025 年，G2 Crowd 上 200+ 条评价平均为 4.6/5，主要主题包括搜索质量（“能找到其他工具找不到的东西”）、易于管理，以及 Slack
              集成质量。最常被提及的负面主题是：（1）连接器设置的实施时间高于预期；（2）源系统元数据质量不一致时，搜索相关性下降；（3）成本——多位评价者认为，相对 Microsoft 和 Google
              的捆绑替代方案，Glean 价格昂贵。 [CU013] [CU014]


              具名客户证言为 Databricks 和 Duolingo 部署提供了很强的社会证明。Databricks 用 Glean 管理工程和销售团队的知识，并在多份新闻稿中被引用为参考客户。Duolingo
              被引用为使用 Glean 提升员工入职效率。两家公司都未披露具体生产力指标。 [CU015] [CU016]


              负面客户信号主要来自成本：多条 G2 评价明确指出，对于 Glean 使用频率低的员工（例如每周一次而不是每天使用），Glean
              的每席成本很难证明合理。这种使用集中风险会在企业续约中形成脆弱点：采购团队可能把席位数削减到只覆盖高频用户，压缩 Glean 每客户 ACV。$200M ARR 增长说明该风险尚未在规模上兑现，但它是 Glean
              定价模型里的结构性弱点。 [CU017] [CU018]
