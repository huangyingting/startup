      - number: '1.3'
        title: 融资历史与资本状况
        blocks:
          - type: paragraph
            body: >-
              2019–2025 年，Glean 六轮累计融资约 $765M；2025 年 6 月由 Wellington Management 领投的 Series F 将估值推至 $7.2B。融资轨迹从 2019 年
              $15M Series A 到六年后 $150M Series F，既反映早期投资人的信念，也反映市场越来越愿意为已证明 ARR 增长的企业 AI 软件支付高倍数。 [CO013] [CO014] [CO015]


              投资人阵容极强：Kleiner Perkins 和 Lightspeed Venture Partners 共同领投 Series A，又共同领投 Series
              D，连续多轮押注在企业软件里并不常见。Sequoia 领投 $100M Series C，让 Glean 在 2022 年 5 月跻身独角兽。Series D 引入战略投资者 Capital One
              Ventures、Databricks Ventures、Citi 和 Workday Ventures；这些企业软件买方同时验证了产品市场契合和战略相关性。Series E 引入 Altimeter
              Capital 和 DST Global；Series F 加入 Wellington Management、Khosla Ventures、Bicycle Capital 和 Geodesic Capital。
              [CO016] [CO017] [CO018]


              ARR 从 2023 年约 $40M 增至 2024 年 12 月 $100M，增长 2.5x；到 2025 年底估计达到 $200M，且公司披露的 2025 年内部目标为 $200–250M。Series D
              前一年（2024 年初）公司 ARR 近乎翻了四倍。企业客户数已超过 200 家，2024 年同比大约翻倍。 [CO019] [CO020] [CO021]


              到 2025 年末，公司员工约 1,300–1,500 人，高于 Series E 时的不到 700 人。这样的人员轨迹符合公司扩张企业销售和 GTM 组织、在全球追逐数十亿美元级软件机会的阶段。 [CO022]
              [CO023]
