  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              投资 Glean 的乐观情景建立在三个相互咬合的判断上：（1）企业知识分散在 20-100+ 个 SaaS 应用中，这是一个永久性结构问题；每采用一个新的 SaaS
              工具，问题都会加重，因此中立、多生态搜索层的市场会扩大且具备持久性；（2）Glean 已经跑出企业搜索史上最快的 ARR 扩张曲线（3 年内从 $10M 到 $200M+），并由
              Databricks、eBay、Booking.com 等 200+ 家标杆企业客户验证；（3）向 Glean Agents 扩张（GA May 2025）打开了企业工作流自动化中更大、更新的价值捕获机会，而
              Microsoft 和 Google 都尚未为多生态部署有效产品化。如果 Glean 到 2027 年达到 $500M ARR，并保持 80%+ 毛利率，20–25x ARR 倍数对应 IPO 时
              $10–$12.5B 估值——较 June 2025 $7.2B 入场价有 40–75% 上行空间。[CV001] [CV002] [CV003]


              悲观情景同样有三个严肃判断：（1）Microsoft 365 Copilot 和 Google Workspace Gemini 已经捆绑进现有企业许可，并且改进很快；单独为 Glean
              付费的边际价值每个季度都在收窄；（2）Glean 以 36x 估计 $200M ARR 获得 $7.2B 估值，相比可比上市企业软件公司偏贵（ServiceNow 为 16–18x 远期收入；Salesforce
              为 7–9x）；（3）Glean 尚未披露 NRR、总流失率或单位经济模型——一家达到 $200M ARR 的公司缺少这些指标并不常见，可能意味着留存挑战。如果 Microsoft/Google 在 24
              个月内实现多生态搜索同等水平，Glean 增速放缓至 <30% YoY，估值重置为 10–12x ARR，隐含 $2–2.4B 估值——较 $7.2B 入场价减值 67–72%。[CV004] [CV005]
              [CV006]
