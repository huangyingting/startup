      - number: '2.3'
        title: 买方分层与增长驱动
        blocks:
          - type: paragraph
            body: >-
              Glean 的主要买方是 500–10,000 人技术优先公司里的 CIO、CTO 和 CPO；这类公司 SaaS
              蔓延最严重，信息碎片化痛点也最尖锐。次级买方是金融服务、医疗健康和专业服务等大型企业（10,000+ 员工）中的 IT 总监和企业架构师。购买流程涉及多方：IT /
              安全团队控制采购，业务线管理者推动采用，员工作为最终用户也可能因低参与度让采用失败。 [CM013] [CM014]


              关键增长驱动包括：（1）SaaS 蔓延加速——平均企业使用 130+ 个 SaaS 应用，高于 2020 年的 80
              个，信息碎片化速度超过内部搜索能力提升；（2）远程和混合办公常态化——远程员工不能依赖物理接近或茶水间知识共享，更依赖数字知识检索；（3）LLM 商品化——GPT-4 级模型现在可通过 API 调用，让
              Glean 能基于专有数据交付企业级 AI 回答，而不是依赖通用互联网训练；（4）ROI 驱动的 AI 支出——企业承压，需要证明 AI 投入带来实质 ROI，而能衡量搜索时间减少的生产力工具最容易被合理化。
              [CM015] [CM016] [CM017]


              关键采用约束包括：（1）Microsoft 365 Copilot 捆绑——这是最重要的结构性约束；已经为 E3/E5 许可证付费的企业，会面临强烈内部压力，避免再为独立 AI
              搜索供应商付费；（2）数据安全顾虑——IT 团队对第三方供应商索引敏感企业数据很谨慎，尤其是 HR 文件、法律文件和 M&A 记录；（3）集成复杂度——连接 100+ 应用需要大量 IT
              资源和持续维护；（4）用户采用障碍——即便产品更好，知识员工也可能抗拒改变搜索习惯。 [CM018] [CM019] [CM020]
