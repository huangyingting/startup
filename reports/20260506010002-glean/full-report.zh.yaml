      - number: '5.4'
        title: 重点展示
        blocks:
          - type: callout
            title: Enterprise Graph 是核心差异化，也是核心风险
            body: >-
              Enterprise Graph 同时是 Glean 最有说服力的差异化，也是最关键的单点架构风险。所有产品能力——Search、Assistant、Agents——都依赖 Enterprise Graph
              交付准确、权限受控、个性化的知识表示。Graph 一旦出现数据质量失败，会传导到所有产品。Graph 的价值也会随使用时间加深，制造锁定；但新部署早期 Graph 数据不足，无法有效个性化，也会形成冷启动问题。
            calloutType: insight
            claimRefs:
              - CE013
              - CE002
          - type: callout
            title: FedRAMP 缺口把 $8–10B 联邦 TAM 排除在外
            body: >-
              Glean 未披露任何 FedRAMP 授权进展、时间线或投入计划。FedRAMP High 授权需要 12–24 个月，并要求大量工程和合规投入。没有 FedRAMP，Glean 就无法进入美国联邦政府每年
              $8–10B 的 AI 软件 TAM；在这个细分市场里，Microsoft（FedRAMP High）和 Google（FedRAMP High）拥有结构性优势。
            calloutType: risk
            claimRefs:
              - CE015
              - CE018
  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户画像与牵引力
        blocks:
          - type: paragraph
            body: >-
              截至 2024 年 12 月，Glean 服务 200+ 企业客户，公开点名客户包括 Databricks、Duolingo、Plaid、BILL、Canva、Sony
              Electronics、Booking.com、eBay、Grammarly、Gong、Pagerduty、Hashicorp、Rubrik 和
              Snowflake。客户基础明显偏向高增长科技公司，这些公司有三个共同特征：（1）大型且碎片化的知识库，横跨 20+ SaaS
              应用；（2）员工人数与信息量之比高（工程密集型组织）；（3）愿意为能降低信息检索摩擦的企业软件支付溢价。 [CU001] [CU002]


              ARR 在 2024 年 12 月达到 $100M，据报道 2025 年已超过 $200M，意味着同比增速约 100%——属于企业软件史上最快的 ARR 爬坡轨迹之一。以 $200M ARR 和 200+
              客户计算，隐含平均合同价值（ACV）约 $1M，与 Glean 聚焦企业客户的 GTM 策略一致。这个 ACV 高于 SMB 型 SaaS 常见的 $100K–$300K，但仍处于大型企业软件合同范围内。
              [CU003] [CU004]


              Glean 报告 DAU/MAU 约 40%，对企业软件而言异常高；生产力工具典型值为 20–25%。较高的日常参与度归因于 Glean 的多表面部署（Slack、Teams、Chrome 扩展），它把
              Glean 放进员工自然工作流，而不是要求员工切换到单独应用。高 DAU/MAU 是净收入留存的先行指标，也降低流失风险；不过 Glean 未公开披露 NRR 或总流失率。 [CU005] [CU006]
