      - number: '7.3'
        title: 运营、财务与执行风险
        blocks:
          - type: paragraph
            body: >-
              Glean 的运营风险集中在三处：（1）LLM API 可靠性和成本——Glean 的 AI 能力依赖第三方 API，后者可能宕机、限流或调价；Model Hub
              降低了单一供应商失效风险，但增加了集成复杂度。（2）连接器维护负担——100+ 个连接器需要持续维护，源应用 API 一变就要跟进；关键连接器（如 Slack、Salesforce）发生重大 API
              变更，可能导致全企业搜索中断。（3）安全事件风险——Glean 会索引敏感企业数据（HR、法务、M&A）；如果安全事件暴露客户数据，企业信任和客户留存会遭受灾难性打击。[CR012] [CR013]
              [CR014]


              财务风险：Glean 累计融资 $765M，但尚未披露烧钱速度、现金跑道或盈利时间表。在 $200M ARR、1,300–1,500 名员工规模下，Glean 每年可能烧掉 $80–$150M
              运营费用。Series F（$150M，June 2025）按当前烧钱速度可能提供 12–24 个月现金跑道。走向盈利需要二选一：（a）ARR 继续高速增长到
              $400M+；或（b）大幅裁员——二者都没有保证。随着 AI 使用量增长，LLM API 成本上升（大规模 GPT-4 推理成本）会带来毛利率挤压风险。[CR015] [CR016]


              人员与执行风险：Arvind Jain 是 Glean 最显眼的外部面孔，也代表其产品愿景；公司没有公开披露清晰继任计划。Glean 尚未披露任何高管离职，但从创业公司转向企业级公司（到 2026 可能
              1,500+ 员工）会带来执行挑战：销售、客户成功和产品管理必须同时扩张。国际扩张（EMEA、APAC）还需要资深区域领导层和本地化投入。[CR017] [CR018]
