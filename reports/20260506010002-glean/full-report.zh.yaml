      - number: '2.4'
        title: 重点展示
        blocks:
          - type: callout
            title: Microsoft 365 Copilot：结构性 TAM 天花板风险
            body: >-
              Microsoft 365 Copilot 可以作为附加组件，以 $30/user/month 面向 4 亿多 Microsoft 365 商业用户提供。如果企业 IT 买方认为 Copilot 对搜索和 AI
              助手用例已经“够好”，Glean 的有效 SAM 会明显收缩。Microsoft 捆绑约束是 Glean 投资人最该跟踪的市场动态风险：它不会出现在分析师 TAM
              估计里，却会给企业客户可触达范围制造结构性天花板。
            calloutType: risk
            claimRefs:
              - CM005
              - CM019
          - type: callout
            title: AI 原生知识管理是新类别，不只是更好的搜索
            body: >-
              Glean 的受益点在于创造了一个新的预算类别——“企业 Work AI”——而不是争抢既有企业搜索预算。多数大型企业没有专门的企业搜索预算项；相关预算通常埋在 IT 生产力或基础设施里。能交付可衡量生产力收益的
              AI 原生平台，可以证明新增预算项合理，从而降低与 Microsoft 和 Google 的零和竞争。
            calloutType: insight
            claimRefs:
