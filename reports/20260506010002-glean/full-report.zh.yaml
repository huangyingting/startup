companyProfile:
  summary: >-
    Glean 于 2019 年 3 月在 Palo Alto 成立，四位创始人都来自 Google 或 Meta：Arvind Jain（CEO，曾在 Google 9 年、Rubrik 联合创始人）、T.R.
    Vishwanath（CTO，前 Meta）、Tony Gentilcore（前 Google）和 Piyush Prahladka（前 Google AI）。公司的核心洞察是：企业员工每天会在 20–100+ 个 SaaS
    应用里花 2–3 小时找信息，一个中立、跨生态的 AI 搜索层可以把碎片化知识收束到单一智能界面。Glean 平台分三层产品：Glean Search（混合向量 + BM25 搜索，并做权限感知索引）、Glean
    Assistant（基于 RAG 的对话式 AI，使用 Model Hub，支持 OpenAI、Anthropic 和 Gemini）以及 Glean Agents（自主工作流自动化，2025 年 5 月
    GA）。Enterprise Graph（2025 年 9 月）是面向企业的知识个性化层，会按每名员工的角色、团队和工作场景调整三层产品。公司六轮累计融资 $765M，投资方包括 Kleiner
    Perkins、Lightspeed、Sequoia、General Catalyst、Altimeter、DST Global 和 Wellington Management，2025 年 6 月 Series F 后估值达到
    $7.2B。ARR 从 $10M（2022 年估算）增至 $100M（2024 年 12 月披露），再到 $200M+（2025 年估算），同比增长约 100%；企业客户 200+ 家，包括
    Databricks、eBay、Booking.com、Duolingo、Canva、Sony Electronics 和 Plaid。CEO Arvind Jain 披露的 DAU/MAU 约
    40%，高于企业软件常态（20–25%），说明日常使用习惯较强。公司约有 1,300–1,500 名员工，尚未实现盈利。投资建议为 TRACK：赛道判断突出，牵引力也真实，但 $7.2B 估值相当于估算 ARR 的
    36x；考虑超大云厂商捆绑风险且公司未披露 NRR，安全边际不足。
