          - type: callout
            title: EU AI Act 执法形成 2026 监管期限
            body: >-
              EU AI Act 将在 August 2026 开始全面执行。Glean 的智能体 AI 能力——代表员工自主行动——可能被认定为通用 AI（GPAI）系统，需要履行第 52-53 条下的透明度和文档义务。如果
              Glean Agents 平台部署在高风险企业场景（HR 决策、财务流程），还会触发额外合格评估要求。Glean 尚未披露任何 EU AI Act 合规路线图，这给其欧洲客户群带来实质性监管风险。
            calloutType: risk
