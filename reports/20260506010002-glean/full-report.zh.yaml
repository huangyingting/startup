  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Glean 面对三层竞争：（1）带捆绑 AI 搜索的平台既有厂商——Microsoft 365 Copilot 和 Google Workspace Gemini——利用装机基础分发；（2）专业 AI
              企业搜索供应商——Elastic Enterprise Search、Coveo 和 Guru——解决更窄的用例；（3）新兴 AI 生产力平台——Notion AI、Confluence AI 和
              ServiceNow Now Assist——从相邻软件品类扩展到知识管理。最危险的竞争对手是 Microsoft，它以 $30/user/month 的价格把竞争产品捆绑分发给 4 亿现有 M365 订阅用户。
              [CP001] [CP002]


              竞争动态在跨应用搜索广度和 RAG 准确性上有利于 Glean，但 Microsoft 和 Google 拥有结构性分发优势：它们的产品通过既有企业关系销售，预算也已预先谈好，不需要新的采购周期。Glean
              要赢下企业交易，既要跨过产品评估门槛，也要跨过采购门槛。 [CP003] [CP004]
            claimRefs: []
