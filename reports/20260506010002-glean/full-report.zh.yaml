      - number: '8.3'
        title: 投资建议与退出准备度
        blocks:
          - type: paragraph
            body: >-
              建议：TRACK（高确信观察名单；不要以 $7.2B 的 Series F 入场价投资）。投资逻辑有吸引力，牵引力也真实——$200M ARR、200+ 家企业客户、40% DAU/MAU，以及企业搜索史上最快的
              ARR 扩张。卡住投资的不是逻辑质量，而是估值：36x ARR 下，考虑到超大规模云厂商捆绑风险，安全边际不足。有吸引力的入场价是 $3–4B（当前 ARR 的
              15–20x），可以来自市场回调中的平轮或下调轮，也可以来自相对新股轮价格折价的老股交易。应在 Series G 或 IPO S-1 阶段重新审视公司。[CV015] [CV016]


              退出准备度距离 IPO 还有 2–3 年。Glean 当前画像——$200M ARR、100% 增长、200+
              家企业客户、标杆投资人阵容（Sequoia、KP、Lightspeed、Altimeter、Wellington）——与 2027–2028 年 以 $600–$800M ARR 提交 IPO 文件相匹配。IPO
              前主要里程碑包括：（1）公开披露 NRR 高于 120%；（2）Agents 收入占总 ARR 的比例达到有意义水平（>15%）；（3）自由现金流转正，或 IPO 后 12 个月内有清晰路径转正。没有
              FedRAMP，Glean 会把联邦市场排除在 IPO TAM 之外，可能限制 S-1 叙事。[CV017] [CV018]


              投资逻辑破裂触发器：（1）Microsoft Copilot 在 24 个月内证明具备多生态索引能力（同时覆盖 Google Workspace + Slack + Salesforce）；（2）Glean 披露
              NRR 低于 110%，表明存在留存问题；（3）ARR 增长连续两个季度放缓到 60% YoY 以下；（4）重大企业数据泄露导致两个或更多 logo 级客户流失；或（5）关键联合创始人（Arvind
              Jain）离职，且没有清晰继任公告。上述任一事件都会触发对投资逻辑的立即重估。[CV019] [CV020]
            claimRefs: []
