          - type: callout
            title: 估值倍数风险
            body: >-
              Glean 以约 $100–200M ARR 对应 $7.2B 估值交易，等于 36–72x ARR，是企业软件里最高的一档倍数。这个价格要求 Glean 连续多年维持 2x+ ARR 增长，把 TAM
              从纯搜索扩展到智能体化 AI，并证明自己的护城河能挡住主导型既有厂商 Microsoft 365 Copilot。ARR 增速只要放缓，当前估值就很难自圆其说。
            calloutType: risk
