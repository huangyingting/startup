chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >-
              Glean Technologies, Inc. 是一家企业 AI 平台公司，2019 年 3 月成立，总部位于 California 州 Palo Alto。公司打造 Work AI 平台，在 100+
              工作应用集成之上统一企业搜索、AI 助手和自主 AI 智能体。Glean 的核心产品让知识员工可以通过一个权限感知界面查询全部公司数据——从 Slack 消息、Salesforce 记录到 GitHub pull
              request——底层由大语言模型和检索增强生成（RAG）驱动。AI 助手基于公司自有文档给出带引用的答案，避开通用 AI 聊天机器人常见的幻觉问题。2025 年，公司推出 Glean Agents（2025 年
              5 月 GA）——可以使用公司数据执行多步骤工作流的自主智能体——以及 Enterprise Graph（2025 年 9 月），后者是个性化层，会按每名员工的角色、团队和历史互动调整回答。 [CO001]
              [CO002] [CO003]


              Glean 的商业模式是按席位收费的 SaaS，企业 ACV 通常为每年
              $100,000–$1,000,000，取决于席位数和模块使用量；更大的客户会为高级智能体化和治理功能付费。公司瞄准面临严重知识管理碎片化的中型市场和大型企业组织（500–100,000+
              名员工）。收入模式以订阅为主，智能体任务执行带来用量上行。到 2026 年一季度，公司未披露自助服务层。 [CO004] [CO005]
