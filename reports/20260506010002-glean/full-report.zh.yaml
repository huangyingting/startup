      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: >-
              Glean 由四位前大型科技公司工程师共同创立，团队在搜索和基础设施上积累很深。Arvind Jain（CEO）此前联合创办 Rubrik（云数据管理独角兽，2024 年 IPO），并在 Google
              担任搜索基础设施首席工程师 9 年；他是少数既有成功退出经历、又真正理解大规模搜索系统的创始人之一。T.R. Vishwanath（CTO，前 Meta）曾在 Facebook
              负责大型分布式系统基础设施。Tony Gentilcore（前 Google）参与过 Google 核心搜索排序和相关性团队。Piyush Prahladka（前 Google）曾负责 Google 的 AI
              和搜索产品开发。 [CO006] [CO007] [CO008] [CO009]


              创始团队亲手搭过 Google 搜索基础设施——全球最复杂的信息检索系统——这是 Glean 技术差异化最重要的来源。这种履历让 Glean 能密集招到前 Google、前 Meta、前 Dropbox
              搜索工程师；没有 Google 品牌可信度的团队很难完成同样的人才招募。 [CO010] [CO011]


              Arvind Jain 通过 Rubrik 完成过一次退出，证明他在企业软件里懂资本配置，也懂 GTM，显著降低了相对首次创业 CEO 的关键人物风险。董事会包括 Kleiner Perkins（Mamoon
              Hamid）、Sequoia Capital 和 General Catalyst 的代表，带来顶级风投治理。 [CO012]
