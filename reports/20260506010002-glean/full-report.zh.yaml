      - number: '8.4'
        title: 附录
        blocks:
          - type: callout
            title: TRACK：优秀公司，错误入场价
            body: >-
              Glean 是 2020s 最具吸引力的企业 AI 公司之一——ARR 真实、客户真实、留存真实、产品差异化也真实。TRACK 的投资建议并不是质疑公司，而是坚持估值纪律：以 36x 估计 ARR、Series
              F $7.2B 的入场价投资，面对超大规模云厂商捆绑风险，下行保护有限。基准情景下，到 2027 年回报为 -17%。高风险私募成长投资所需的安全边际（通常要求入场后 3-5x 预期回报）在 $7.2B
              不存在。应在 $3-4B 入场价重新审视（老股、下调轮，或带有 NRR 披露的 IPO S-1）。
            calloutType: recommendation
            claimRefs:
              - CV015
              - CV016
          - type: callout
            title: NRR 披露是关键缺失信号
            body: >-
              Glean 在 $200M ARR 阶段仍未披露 NRR，并不常见。多数企业 SaaS 公司达到这一规模时，会把 NRR 作为增长质量的核心信号披露。Glean 未披露
              NRR，可能意味着表现异常好（>130%，留到 IPO 制造惊喜），也可能意味着存在问题（<110%，为避免投资人担忧而遮住）。VC 若考虑以 $7.2B 投资，就不能在没有 NRR
              数据的情况下承销这个逻辑。私募尽调关口是：披露 NRR >120%，否则不投。
            calloutType: risk
            claimRefs:
              - CV005
              - CV006
