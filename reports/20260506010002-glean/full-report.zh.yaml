  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 主要风险概览
        blocks:
          - type: paragraph
            body: >-
              按剩余严重度排序，Glean 面临五类重大风险：（1）被超大云厂商捆绑替代——Microsoft 365 Copilot 和 Google Workspace Gemini 以零边际成本捆绑进既有企业许可证，让
              Glean 长期处于定价劣势；（2）LLM 供应商依赖——Glean 的 AI 能力依赖第三方 LLM API（OpenAI、Anthropic、Google），这些 API
              的可用性、价格和条款都可能被单方面改变；（3）数据隐私和安全监管风险——全球 AI 数据处理监管正在收紧，尤其是欧洲 GDPR 执法和美国各州新兴 AI 法；（4）人员集中风险——公司依赖四位联合创始人，其中
              Arvind Jain 的 CEO 角色是最关键的单点领导风险；（5）执行风险——从 $200M ARR 扩到 $1B+ ARR，需要企业销售、客户成功和产品开发同时无瑕执行。 [CR001] [CR002]
              [CR003]


              超大云厂商捆绑风险在结构上最危险：Microsoft 和 Google 拥有无限金融资源、既有企业关系，并正积极投资 AI 搜索能力。Microsoft 面向 M365 的 $30/user/month
              Copilot（或包含在企业 E5 许可证中）已经触发预算整合审查，采购团队会质疑 Glean 相对捆绑替代方案是否提供足够边际价值。Glean
              的回应——证明更高搜索质量和更广连接器覆盖——可信，但需要持续跑赢一个工程资源多 10x、且快速改善的竞争对手。 [CR004] [CR005]
