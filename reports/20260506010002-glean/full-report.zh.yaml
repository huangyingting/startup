      - number: '6.2'
        title: GTM 动作与销售流程
        blocks:
          - type: paragraph
            body: >-
              Glean 的主要 GTM
              动作是企业直销，并采用多倡导者的落地策略：初始部署通常从一个部门（IT、工程或销售）开始，再通过产品驱动扩张进入同一组织内的其他部门。这种先落地再扩张模式会形成强扩张收入动态，随着席位数和功能层级增加，单客户
              ACV 会随时间增长。Glean 的 Slack / Teams 表面放大了企业内部病毒系数：早期采用者在 Slack 频道分享 Glean 生成的答案时，其他员工会看到价值并申请访问。 [CU007]
              [CU008]


              Glean 参与的企业采购周期通常为 3–6 个月，需要安全审查、法律审查和 IT 批准。采购环节的竞争护城河来自 Glean 的 SOC 2 Type II 和 ISO 27001
              认证，以及能满足信息安全团队数据暴露担忧的权限感知索引架构。没有这些认证的竞争对手会在安全审查阶段出局，Glean 面对的竞争范围因此收窄到 Microsoft 365 Copilot（捆绑）、Google
              Workspace Gemini（捆绑）和少数点解决方案。 [CU009] [CU010]


              定价按席位并绑定年度承诺；Glean 不公开披露每席价格，但行业报道显示为每用户每月 $15–$25，与 Microsoft Copilot for M365 定价（非企业版
              $30/user/month）相当。大型部署的企业折扣会降低有效每席价格。高级层级增加 Glean Agents 访问。Glean 不提供自助式免费层，刻意把客户基础限定在由 IT 管理采购的企业。
              [CU011] [CU012]
            claimRefs: []
