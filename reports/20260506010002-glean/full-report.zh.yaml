      - number: '4.3'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >-
              到 2025 年 6 月，Glean 六轮累计融资约 $765M。按估计现金消耗率每季度 $70–150M（每年 $280–600M）计算，公司从 2025 年 6 月 Series F 完成后大约有 1.5–3
              年资金续航。区间较宽，反映公开来源对运营成本估算的不确定性。 [CI014] [CI015]


              公司通向盈利取决于 ARR 是否继续以每年 2x+ 增长：如果 Glean 到 2026 年达到 $400M ARR，在约 $350M 固定成本基础上释放经营杠杆，可能接近盈亏平衡。如果 ARR 增长放缓到
              1.5x 或以下，公司会在盈利前需要额外资本，形成融资依赖风险。 [CI016] [CI017]


              $7.2B 估值的 Series F 由上市前机构投资者 Wellington Management 领投，这是 IPO 准备路径上的正向信号。以 $200M ARR 和 2x+ 增长计算，Glean
              大概率有资格在 2026–2027 年进入公开市场发行，尽管软件 IPO 窗口仍不确定。公司尚未披露任何 IPO 计划。 [CI018] [CI019]
