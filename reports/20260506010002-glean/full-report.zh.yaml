      - number: '3.3'
        title: 护城河评估与竞争耐久性
        blocks:
          - type: paragraph
            body: >-
              Glean 的主要护城河是跨应用广度（100+ 集成）叠加权限感知索引，以及 Enterprise Graph 个性化层。Enterprise Graph
              是公司特定知识图谱，会学习每名员工的角色、团队和工作场景；使用越多，切换成本越深。还没有竞争对手宣布过同时具备深度（员工级上下文）和广度（跨应用数据）的可比个性化层。 [CP011] [CP012]


              Glean 护城河能否顶住 Microsoft 365 Copilot，是竞争里的核心问题。Microsoft 正大举投资扩展 Copilot 能力，并在 2025 年宣布 M365 Copilot
              将不加价捆绑进所有 E3/E5 许可证，相当于对现有企业 M365 客户免费。这直接打击 Glean 的采购理由。Glean 的回应是用搜索质量优势加上跨应用范围胜出，而 Microsoft 很难在没有
              Salesforce、Slack、Atlassian 和 GitHub 独家合作的情况下复制这种范围。 [CP013] [CP014]


              VC 市场已经释放信号：Google 对 DeepMind、Microsoft 对 OpenAI 的投资代表 AI 策略转向捆绑，可能让企业搜索层商品化。不过，企业 IT 买方调查显示，只要生产力收益可证明，仍有
              60–70% 的公司在搜索场景上更偏好同类最优 AI 工具，而不是捆绑方案。这个偏好窗口在 Microsoft Copilot 质量追上前大概率只有 18–36 个月。 [CP015] [CP016]
              这个窗口会收窄。
