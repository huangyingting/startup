      - number: '2.2'
        title: 市场规模
        blocks:
          - type: paragraph
            body: >-
              第三方对企业 AI 搜索和知识管理软件市场的测算差异很大，取决于口径。Gartner 对企业搜索软件市场的测算（2024 年）约为 $4.5B，CAGR 约 12%。IDC 对更广义企业 AI
              软件市场的测算（包括 AI 助手、搜索和工作流自动化）到 2026 年达到 $45B。最接近 Glean 定位的口径——面向 250+ 员工公司的 AI 原生企业知识管理——2025 年估计为
              $8–12B，并随着 AI 原生产品替代传统方案，到 2028 年按 25–30% CAGR 增至 $20–30B。 [CM007] [CM008]


              TAM/SAM/SOM 拆解：面向全球 250+ 员工公司群体的企业 AI 知识管理软件 TAM 估计为 $12B（2025 年）。按 $15/seat/month 定价假设、全球 250+ 员工企业约 6500
              万知识员工计算，年化潜在收入约 $11.7B。Glean 的 SAM 收窄到英语为主市场（美国、英国、加拿大、澳大利亚）和 SaaS 渗透率高的行业，约为 $5–7B。Glean 在 3
              年窗口（2025–2027 年）的 SOM 基于当前 ARR 轨迹和已宣布的国际扩张计划，约为 $250–500M。 [CM009] [CM010]


              由于品类定义不确定，规模测算信心为中低。分析师并不一致：Microsoft 365 Copilot 是否应计入同一 TAM？计入会把市场规模抬到 $45B+，但也会让 Glean 的 SOM
              看起来更小；排除则意味着把捆绑产品放进另一个品类。Gartner（$4.5B 企业搜索）和 IDC（$45B+ 企业 AI 软件）的估计相互冲突，正反映了这种定义模糊；这些数字更适合作为上下界，而不是点估计。
              [CM011] [CM012]
