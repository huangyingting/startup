      - number: '7.2'
        title: 监管、法律与知识产权风险
        blocks:
          - type: paragraph
            body: >-
              Glean 在 GDPR 下为其欧洲客户担任数据处理方；一旦发生任何客户数据泄露，或 EU AI Act 对 AI 搜索和智能体 AI 系统施加新义务，Glean 就会面临实质性监管暴露。EU AI
              Act（August 2024 生效，2026 起执行）将部分 AI 系统划为「高风险」——如果 Glean 的智能体能力被用于高风险企业场景（HR、 信用评估、安全关键系统），Glean 可能需要承担第
              10–15 条下的注册、透明度和审计义务。Glean 尚未披露任何 EU AI Act 合规路线图。[CR006] [CR007]


              美国各州 AI 监管碎片化，而且还在升级：California SB 1047（AI 安全）在 2024 年被否决，但已在 30+ 个州触发跟进立法；拟议的美国联邦 AI 立法仍然停滞。Glean 的智能体 AI
              能力会代表员工自主行动，未来可能需要满足透明度和问责要求。目前没有具体的美国 AI 立法适用于 Glean 产品，但监管方向清楚指向更强监督。[CR008] [CR009]


              IP 风险相对可控：Glean 主要靠执行和自有数据（Enterprise Graph）竞争，而不是靠基础 AI 专利。公开记录中没有发现针对 Glean 的专利侵权主张。主要 IP
              风险在防御端——没有专利组合，Glean 无法排除复制其架构的竞争对手。Enterprise Graph
              作为商业秘密受到保护，但关键工程师流向竞争对手时，仍可能被逆向工程。截至本次研究日期，公开记录中未发现重大诉讼。[CR010] [CR011]
