      - number: '5.3'
        title: 差异化、信任与路线图
        blocks:
          - type: paragraph
            body: >-
              Glean 的技术差异化建立在四根支柱上：（1）连接器广度（100+，而竞争对手多为单生态）；（2）权限感知索引架构，在查询时执行源系统 ACL；（3）Enterprise Graph
              个性化层，按每名员工的上下文调整搜索结果；（4）Model Hub，让客户选择偏好的 LLM 供应商。还没有竞争对手在生产级企业部署中同时证明这四项能力。 [CE013] [CE014]


              安全与合规能力是企业采购中的关键差异化。Glean 拥有 SOC 2 Type II、ISO 27001 和 GDPR 合规认证，欧洲部署需要这些认证。公司支持 SSO（SAML、OIDC）、SCIM
              预配、字段级加密，以及面向受监管行业的数据驻留选项。SOC 2 Type II 是企业 IT 采购的最低标准；欧盟客户要求 ISO 27001。 [CE015] [CE016]


              公开公告释放的路线图信号显示，Glean 正在投入：（1）更深的智能体能力——面向复杂企业工作流的多智能体编排；（2）Agent Library——常见企业任务预构建智能体的市场；（3）Data Analysis
              能力（2025 年上线），用于结构化数据查询；（4）Canvas（协作式 AI 工作区）；（5）Deep Research 模式，用于多步骤知识综合。从纯搜索转向智能体化工作流自动化，是核心产品演进命题。
              [CE017] [CE018]
