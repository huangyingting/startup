          - type: callout
            title: 没有 NRR 数据，就无法判断 ARR 质量
            body: >-
              最重要的财务尽调项是净美元留存。没有 NRR，投资人无法判断 Glean 的 $100M ARR 是由扩张中的客户批次推动（高质量、高可预测性），还是主要由新增客户推动（依赖规模、暴露于流失）。NRR
              一流（>120%）的企业 SaaS 公司能拿到高倍数；Glean 这个增长阶段如果 NRR 低于 110%，会面临倍数压缩风险。
