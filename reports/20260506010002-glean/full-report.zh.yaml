  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Glean 所处市场是企业 AI 搜索和知识管理软件，位于企业搜索、AI 助手和工作流自动化的交汇处。相关可服务市场覆盖 250+ 员工组织里的知识员工，这些员工同时使用三个或更多企业 SaaS
              应用（Slack、Google Workspace、Salesforce、GitHub 等）。核心问题是信息碎片化：企业员工估计每周花 20% 工作时间在不同系统里找信息。McKinsey
              估计，改善知识员工的信息检索效率，每年可在全球释放 $230B 生产力价值。 [CM001] [CM002]


              市场边界：可服务机会包括：（1）替代老旧本地搜索设备的企业搜索软件（Elasticsearch、Solr、旧版 SharePoint）；（2）生产力套件的 AI 助手附加组件（Microsoft 365
              Copilot、Google Workspace
              AI）；（3）独立知识管理平台（Guru、Confluence、Notion）。排除范围包括消费者搜索（Google.com）、网页爬虫搜索引擎、电商商品搜索和公共网站站内搜索。AI
              智能体工作流自动化（Glean Agents）这个相邻机会构成第二层 TAM，但仍处早期，尚未反映在多数分析师估计里。 [CM003] [CM004]


              Glean 替代或竞争的关键现状方案包括：（1）Microsoft 365 Copilot，随 M365 E3/E5 捆绑，价格 $30/user/month，是最危险的既有厂商；（2）单个 SaaS
              应用内置搜索（Salesforce Einstein、Slack AI、Google Drive search）；（3）人的组织知识和部落经验；（4）没有 AI 层的老旧企业搜索设备。 [CM005]
              [CM006]
