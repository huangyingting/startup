      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >-
              Glean 未公开披露毛利率。架构可比的企业 SaaS 公司（重云基础设施、LLM API 成本和连接器维护）在规模化后通常能达到 70–80% 毛利率。不过，Glean 使用第三方 LLM
              API（OpenAI、Anthropic、Google Gemini），增加了可变成本层，在席位数较低时会压低毛利率。当前规模下估算毛利率为 65–75%；随着席位数增长、LLM API 成本继续下降，有望向
              75–80% 改善。 [CI008] [CI009]


              成本结构由人员主导：1,300–1,500 名员工按 San Francisco Bay Area 市场薪酬计算，每年工资和福利约 $150–250M，另有 $50–100M 云基础设施和 LLM API
              成本。当前规模下，年度总运营费用估计为 $250–400M。以 $100M ARR（2024 年 12 月）计算，意味着每年运营亏损 $150–300M，或每季度烧钱 $70–150M。 [CI010]
              [CI011]


              CAC 和销售效率：Glean 在约 3 年商业化运营中获得 200+ 企业客户，意味着每年新增 60–70 个企业客户。按每个企业客户全口径 CAC 约 $50–200K（包括 SDR、AE、SE
              和营销成本）估算，隐含年度 CAC 支出为 $3–14M。以 $100M ARR 和 200+ 客户计算，隐含平均 ACV 为 $500K，说明 CAC 回收期为 1–2 年——对企业 SaaS
              有利，但尚未被证实。 [CI012] [CI013]
