      - number: '6.4'
        title: 重点展示
        blocks:
          - type: callout
            title: 续约经济中的使用集中风险
            body: >-
              Glean 的企业定价按席位收费，带来续约脆弱点：如果客户主要由一小部分日活重度用户使用 Glean，客户可能削减席位数，而不是按原规模续约。多条 G2 评价把成本列为顾虑；在 IT
              整合周期中，采购团队有动力砍掉利用率不足的席位许可证。Glean 的回应——通过 Agents 和 Canvas 拓宽用例——方向正确，但需要新产品在下一轮续约前成功被采用。
            calloutType: risk
            claimRefs:
              - CU017
              - CU012
          - type: callout
            title: 40% DAU/MAU 是异常强的留存信号
            body: >-
              ~40% 的 DAU/MAU 对企业软件而言非常突出；品类领先的生产力工具通常平均为 20–25%。这个指标说明 Glean 正在形成习惯性日常使用——这是企业软件的圣杯，会推动高 NRR 和低总流失率。如果
              Glean 在客户数超过 200 后仍能维持 40% DAU/MAU，留存经济应能支撑 120%+ NRR，从而证明当前 $7.2B 估值的增长轨迹合理。
