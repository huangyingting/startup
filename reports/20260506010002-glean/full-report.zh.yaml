      - number: '3.2'
        title: 竞争对手画像与差异化
        blocks:
          - type: paragraph
            body: >-
              Microsoft 365 Copilot 是最可信的竞争威胁。它由 GPT-4 驱动，集成在 Microsoft 365 应用（Word、Excel、Outlook、Teams、SharePoint）中，提供
              AI 搜索、文档摘要和会议转写。价格为 $30/user/month（现在捆绑进 M365 E3/E5，总价 $36–57/user/month），通过 Microsoft 既有销售关系进入企业。Copilot
              的弱点是跨应用连接有限：它主要浮现 Microsoft 内容（SharePoint、OneDrive、Teams），与 Slack、Salesforce、Jira 和 GitHub 的集成有限；这些关键非
              Microsoft 数据源正是 Glean 的强项。 [CP005] [CP006]


              Google Workspace Gemini（原 Duet AI）是第二个主要平台威胁，集成在 Google Workspace（Gmail、Drive、Docs、Meet）里。在 Google
              Workspace 客户中，Glean 面临不对称挑战：Google 原生掌握 Glean 需要索引的所有数据，也掌握员工已经在使用的 UX 表面。不过，Google 在大型企业里的企业销售动作和 IT
              管理能力仍弱于 Microsoft。 [CP007] [CP008]


              Elastic Enterprise Search 和 Coveo 服务技术型企业搜索细分市场，也就是需要可定制、由开发者配置的搜索基础设施的公司。两者都需要大量 IT 配置，也不是 AI 原生；Elastic
              正把 ML 能力作为较新的增量功能部署。它们在简单性和价值兑现速度上输给 Glean，但在可配置性上赢得拥有异常数据源的客户。Guru 侧重 SMB / 中型市场，用策展知识卡片和更低 ACV 竞争；这不是
              Glean 的主要目标客群。 [CP009] [CP010]
