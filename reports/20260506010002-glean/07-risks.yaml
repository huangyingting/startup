callouts:
  - title: Hyperscaler Bundling Is the Defining Long-Term Risk
    body: >-
      Microsoft and Google are not just competitors — they are infrastructure providers for most of Glean's customers.
      Every Glean customer already pays Microsoft or Google for productivity suites. As bundled AI search capabilities
      in M365 Copilot and Google Gemini improve, the marginal value of paying separately for Glean narrows. Glean's best
      defense is a continuous quality advantage in multi-ecosystem search (no competitor bundles across both Microsoft
      and Google) and expanding into agentic use cases where bundled alternatives are weakest. This risk cannot be fully
      mitigated — it is a structural feature of Glean's market position.
    calloutType: risk
    claimRefs:
      - C214
      - C215
  - title: EU AI Act Enforcement Creates a 2026 Regulatory Deadline
    body: >-
      The EU AI Act begins full enforcement in August 2026. Glean's agentic AI capabilities — autonomous actions on
      behalf of employees — may qualify as general-purpose AI (GPAI) systems requiring transparency and documentation
      obligations under Articles 52-53. If Glean's Agents platform is deployed in high-risk enterprise contexts (HR
      decisions, financial processes), additional conformity assessment requirements apply. Glean has not disclosed any
      EU AI Act compliance roadmap, creating a material regulatory risk for its European customer base.
    calloutType: risk
    claimRefs:
      - C216
      - C217
