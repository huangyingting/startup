    rows:
      - - Market structure
        - Permanent enterprise knowledge fragmentation creates durable demand for neutral multi-ecosystem search
        - Microsoft and Google unify enterprise knowledge within their own ecosystems (M365 + Google Workspace)
        - Truth in 3-5 years; connector breadth is the linchpin
      - - ARR growth sustainability
        - $200M ARR at 100% YoY; fastest enterprise search trajectory ever; 3+ years of high growth ahead
        - Growth decelerates as bundled alternatives improve; 2025-2026 renewal cycle is the first test
        - Monitor 2026 Q2-Q3 renewal cohorts for first signal
      - - Product differentiation
        - Enterprise Graph + 100+ connectors + Agents is a 2-3 year head start on hyperscalers
