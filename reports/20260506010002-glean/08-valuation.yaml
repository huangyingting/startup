callouts:
  - title: 'TRACK: Outstanding Company, Wrong Entry Price'
    body: >-
      Glean is one of the most compelling enterprise AI companies of the 2020s — real ARR, real customers, real
      retention, and real product differentiation. The investment recommendation of TRACK reflects not doubt about the
      company but disciplined valuation: at 36x estimated ARR, an investor at the Series F $7.2B entry has limited
      downside protection against the hyperscaler bundling risk. The base case returns -17% by 2027. The margin of
      safety required for a high-risk private growth investment (typically 3-5x expected returns from entry) is not
      available at $7.2B. Revisit at $3-4B entry (secondary, down-round, or IPO S-1 with NRR disclosure).
    calloutType: recommendation
    claimRefs:
      - C265
      - C266
  - title: NRR Disclosure Is the Critical Missing Signal
    body: >-
      The absence of NRR disclosure from Glean at $200M ARR is atypical. Most enterprise SaaS companies at this scale
      disclose NRR as the primary growth quality signal. The fact that Glean has not disclosed NRR may mean it is
      exceptional (>130%, held back to create surprise at IPO) or problematic (<110%, obscured to avoid investor
      concern). A VC considering investment at $7.2B cannot underwrite the thesis without NRR data. The private due
      diligence gate is: disclose NRR >120% or no investment.
    calloutType: risk
    claimRefs:
      - C255
      - C256
