        - Monitoring hyperscaler connector announcements quarterly
      - - Valuation
        - 36x ARR is justified by AI-era premium for hyper-growth ($7.2B at $200M ARR)
        - 36x ARR is 4-5x more expensive than comparable public enterprise software; limited downside protection
        - TRACK; wait for better entry; no margin of safety at current valuation
      - - NRR and retention
        - High DAU/MAU + land-and-expand implies 120%+ NRR; Agents upsell will drive further expansion
        - NRR not disclosed; cost-sensitive renewals + Microsoft bundling threat could suppress NRR below 110%
        - 'Critical: must verify NRR in data room before any investment'
      - - Regulatory
        - SOC 2 + ISO 27001 satisfies enterprise procurement; EU AI Act compliance achievable within timeline
        - EU AI Act enforcement (Aug 2026) + US state AI laws create compliance burden; FedRAMP gap is structural
        - Monitor EU AI Act compliance roadmap; request legal opinion
