  topStrengths:
    - 企业搜索史上 ARR 爬坡最快：$10M（2022 年估计）→ $100M（2024 年 12 月披露）→ $200M+（2025 年估计），同比增长约 100%
    - 200+ 标杆企业客户（Databricks、eBay、Booking.com、Duolingo、Canva、Sony Electronics），DAU/MAU 约 40%，显著高于企业软件 20–25% 常态
    - 多生态连接器广度（100+ 应用）加权限感知索引架构，技术上有防守性：Microsoft 和 Google 都受自身生态利益冲突限制，很难中立复制
    - >-
      连续创业团队有深厚领域经验（Arvind Jain：前 Google 9 年、Rubrik 联合创始人），背后是 Sequoia、Kleiner Perkins、Lightspeed、Altimeter 和
      Wellington，一线投资人阵容
    - Glean Agents（2025 年 5 月 GA）和 Enterprise Graph（2025 年 9 月）把 TAM 从搜索扩到更大的智能体工作流；目前还没有同等规模的多生态竞争者
  topRisks:
    - 超大规模云厂商捆绑：Microsoft 365 Copilot 和 Google Workspace Gemini 以零边际成本打包进既有企业许可证——这是结构性、长期价格逆风，Glean 无法完全化解
    - NRR 未披露：做到 $200M ARR 仍没有净收入留存数据，对这个规模的公司并不常见，也是最关键的缺失投资信号
    - 估值：$7.2B 相当于约 36x 估计 ARR；在乐观 / 基准 / 悲观情景下，概率加权预期回报为负（-8%）。要有吸引力的风险回报，入场价格需压到 $3–4B（15–20x ARR）
    - LLM API 依赖：所有 AI 能力都依赖第三方 OpenAI / Anthropic / Google API；没有自研 LLM，推理用量扩大后会持续带来供应商、成本和利润率挤压风险
    - EU AI Act 执法（2026 年 8 月）：距离研究日约 15 个月就开始执法，但 Glean 没有为欧洲客户群披露任何合规路线图
  unresolvedGaps:
    - 净收入留存（NRR）和 gross logo churn 没有公开披露——任何投资决定前都必须尽调
    - LLM 推理成本占总收入比例未披露——毛利结构和单位经济性仍不透明
    - 股权结构表和清算优先权堆叠未公开披露——6 轮累计融资 $765M，可能形成显著优先权压力
    - EU AI Act 合规路线图未披露——欧洲企业部署面临重大监管风险
    - FedRAMP 授权状态未披露——挡住 $8–10B 美国联邦政府 TAM；没有披露补救时间表
