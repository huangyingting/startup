  title: Customers and Go-to-Market
sections:
  - id: s1
    title: Customer Profile and Traction
    body: >-
      Glean serves 200+ enterprise customers as of December 2024, with publicly named accounts including Databricks,
      Duolingo, Plaid, BILL, Canva, Sony Electronics, Booking.com, eBay, Grammarly, Gong, Pagerduty, Hashicorp, Rubrik,
      and Snowflake. The customer base is heavily skewed toward high-growth technology companies that exhibit three
      common characteristics: (1) large, fragmented knowledge bases spanning 20+ SaaS applications; (2) high employee
      headcount-to-information-ratio (engineering-heavy organizations); and (3) willingness to pay a premium for
      enterprise software that reduces friction in information retrieval. [CU001] [CU002]


      ARR reached $100M by December 2024 and is reported to have surpassed $200M in 2025, implying a ~100%
      year-over-year growth rate — among the fastest ARR scaling trajectories in enterprise software history. At $200M
      ARR with 200+ customers, the implied average contract value (ACV) is approximately $1M — consistent with Glean's
      enterprise-focused go-to-market strategy. This ACV is higher than the $100K–$300K typical for SMB-focused SaaS but
      well within the range of major enterprise software contracts. [CU003] [CU004]


      Glean reports a DAU/MAU ratio of approximately 40% — an unusually high engagement metric for enterprise software
      where 20–25% is typical for productivity tools. The elevated daily engagement is attributed to Glean's
      multi-surface deployment (Slack, Teams, Chrome extension) which surfaces Glean within the employee's natural
      workflow rather than requiring a separate application switch. High DAU/MAU is a leading indicator of net revenue
      retention and reduces churn risk, though Glean has not disclosed NRR or gross churn figures publicly. [CU005]
      [CU006]
  - id: s2
    title: Go-to-Market Motion and Sales Process
    body: >-
      Glean's primary go-to-market motion is enterprise direct sales with a multi-champion land strategy: initial
      deployment typically starts with one department (IT, engineering, or sales) and expands to additional departments
      within the same organization through product-led expansion. This land-and-expand model creates a strong expansion
      revenue dynamic where per-customer ACV grows over time as seat counts and feature tiers increase. The viral
      coefficient within the enterprise is amplified by Glean's Slack/Teams surface: when early adopters share
      Glean-generated answers in Slack channels, other employees observe value and request access. [CU007] [CU008]


      Glean competes in enterprise procurement cycles that typically run 3–6 months and require security review, legal
      review, and IT approval. The competitive moat in procurement is Glean's SOC 2 Type II and ISO 27001
      certifications, combined with the permission-aware indexing architecture that satisfies information security
      teams' data exposure concerns. Competitors without these certifications are eliminated at the security review
      stage, which reduces the competitive field for Glean to Microsoft 365 Copilot (bundled), Google Workspace Gemini
      (bundled), and a handful of point solutions. [CU009] [CU010]


      Pricing is seat-based with annual commitments; Glean does not publicly disclose per-seat pricing but industry
      reports suggest $15–$25 per user per month, comparable to Microsoft's Copilot for M365 pricing ($30/user/month for
      non-enterprise). Enterprise discounts reduce effective per-seat pricing for large deployments. A premium tier adds
      Glean Agents access. Glean does not offer a self-serve free tier, intentionally limiting its customer base to
      enterprises with IT-managed procurement. [CU011] [CU012]
  - id: s3
    title: Customer Success, NPS, and Retention
    body: >-
      Customer success indicators for Glean are predominantly positive in the public record. G2 Crowd ratings average
      4.6/5 across 200+ reviews as of 2025, with top themes including search quality ("finds what no other tool could
      find"), ease of administration, and the Slack integration quality. The most frequently cited negative review
      themes are: (1) higher-than-expected implementation time for connector setup; (2) search relevance degradation
      when source systems have inconsistent metadata quality; and (3) cost — several reviewers cite Glean as expensive
      relative to bundled alternatives from Microsoft and Google. [CU013] [CU014]


      Named customer testimonials provide strong social proof for the Databricks and Duolingo deployments. Databricks,
      which uses Glean to manage knowledge across engineering and sales teams, is cited as a reference customer across
      multiple press releases. Duolingo has been cited for using Glean to improve employee onboarding efficiency.
      Neither company has disclosed specific productivity metrics. [CU015] [CU016]


      The adverse customer signal is primarily cost: multiple G2 reviews explicitly note that Glean's per-seat cost is
      difficult to justify for employees with low Glean usage frequency (e.g., once per week versus daily users). This
      usage-concentration risk creates a vulnerability in enterprise renewals where procurement teams may reduce seat
      counts to only high-frequency users, compressing Glean's ACV per customer in renewal cycles. The $200M ARR growth
      suggests this risk has not yet materialized at scale, but it is a structural weakness in Glean's pricing model.
      [CU017] [CU018]
