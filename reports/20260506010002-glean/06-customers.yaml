callouts:
  - title: Usage Concentration Risk in Renewal Economics
    body: >-
      Glean's enterprise pricing model is seat-based, creating a renewal vulnerability: customers where Glean is used
      primarily by a small subset of daily-active power users may reduce seat counts rather than renew at the same
      volume. Multiple G2 reviews flag cost as a concern, and procurement teams in IT consolidation cycles are
      incentivized to cut underutilized seat licenses. Glean's response — broadening use cases via Agents and Canvas —
      is the right strategic counter, but it depends on successful new product adoption before the next renewal cycle.
    calloutType: risk
    claimRefs:
      - CU017
      - CU012
  - title: DAU/MAU of 40% Is an Exceptional Retention Signal
    body: >-
      A DAU/MAU ratio of ~40% is exceptional for enterprise software, which typically averages 20–25% for
      category-leading productivity tools. This metric suggests Glean is achieving habitual daily usage — the holy grail
      of enterprise software that drives premium NRR and low gross churn. If Glean can maintain 40% DAU/MAU as it scales
      beyond 200 customers, the retention economics should support a 120%+ NRR which justifies the current $7.2B
      valuation growth trajectory.
    calloutType: strength
    claimRefs:
      - CU005
      - CU006
