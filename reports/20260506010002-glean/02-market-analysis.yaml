callouts:
  - title: 'Microsoft 365 Copilot: Structural TAM Ceiling Risk'
    body: >-
      Microsoft 365 Copilot is available to the 400+ million Microsoft 365 commercial users as an add-on at
      $30/user/month. If enterprise IT buyers perceive Copilot as "good enough" for search and AI assistant use cases,
      Glean's effective SAM shrinks materially. The Microsoft bundling constraint is the single most important market
      dynamics risk for Glean investors to monitor, as it does not appear in analyst TAM estimates but creates a
      structural ceiling on enterprise customer reachability.
    calloutType: risk
    claimRefs:
      - CM005
      - CM019
  - title: AI-Native Knowledge Management Is a New Category, Not Just Better Search
    body: >-
      Glean benefits from creating a new budget category — "enterprise Work AI" — rather than competing for existing
      enterprise search budgets. Most large enterprises have no dedicated enterprise search line item; the budget is
      embedded in IT productivity or infrastructure. AI-native platforms that deliver measurable productivity gains can
      justify a new budget line, reducing the competitive zero-sum dynamic with Microsoft and Google.
    calloutType: insight
    claimRefs:
      - CM016
      - CM017
