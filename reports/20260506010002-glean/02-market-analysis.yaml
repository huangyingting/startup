  title: Market Analysis
sections:
  - id: s1
    title: Market Definition and Boundaries
    body: >-
      Glean competes in the enterprise AI search and knowledge management software market — a segment at the
      intersection of enterprise search, AI assistants, and workflow automation. The relevant addressable market spans
      knowledge workers at organizations with 250+ employees who use three or more enterprise SaaS applications
      simultaneously (Slack, Google Workspace, Salesforce, GitHub, etc.). The core problem being solved is information
      fragmentation: enterprise employees spend an estimated 20% of their working week searching for information across
      disparate systems. McKinsey has estimated that improving knowledge worker information retrieval could unlock $230
      billion per year in productivity value globally. [CM001] [CM002]


      Market boundaries: The addressable opportunity includes (1) enterprise search software replacing outdated
      on-premises search appliances (Elasticsearch, Solr, legacy SharePoint), (2) AI assistant add-ons to productivity
      suites (Microsoft 365 Copilot, Google Workspace AI), and (3) standalone knowledge management platforms (Guru,
      Confluence, Notion). The excluded scope includes consumer search (Google.com), web crawl search engines,
      e-commerce product search, and site search for public websites. The adjacent opportunity in AI agent workflow
      automation (Glean Agents) adds a second TAM layer but is nascent and not yet reflected in most analyst estimates.
      [CM003] [CM004]


      Key status-quo substitutes that Glean displaces or competes against include: (1) Microsoft 365 Copilot, bundled
      with M365 E3/E5 at $30/user/month, the most dangerous incumbent; (2) native search within individual SaaS
      applications (Salesforce Einstein, Slack AI, Google Drive search); (3) human institutional knowledge and tribal
      expertise; and (4) outdated enterprise search appliances with no AI layer. [CM005] [CM006]
  - id: s2
    title: Market Sizing
    body: >-
      Third-party sizing of the enterprise AI search and knowledge management software market varies substantially by
      scope. Gartner sizing of the enterprise search software market (2024) places the total at approximately $4.5
      billion growing at ~12% CAGR. IDC sizing of the broader enterprise AI software market (including AI assistants,
      search, and workflow automation) reaches $45 billion by 2026. The most comparable sizing for Glean's specific
      positioning — AI-native enterprise knowledge management for knowledge workers at 250+ employee companies — is
      estimated at $8–12 billion in 2025, growing to $20–30 billion by 2028 at a 25–30% CAGR as AI-native products
      displace legacy solutions. [CM007] [CM008]


      TAM/SAM/SOM decomposition: The TAM for enterprise AI knowledge management software for the global 250+ employee
      company segment is estimated at $12B (2025). At a $15/seat/month pricing assumption and ~65 million knowledge
      workers in enterprises with 250+ employees globally, total potential revenue is approximately $11.7 billion
      annually. Glean's SAM narrows this to English-primary markets (US, UK, Canada, Australia) and sectors with high
      SaaS penetration, yielding approximately $5–7 billion. The SOM for Glean in the 3-year window (2025–2027) is
      $250–500 million based on current ARR trajectory and announced international expansion plans. [CM009] [CM010]


      Sizing confidence is medium-low due to category definition uncertainty. Analysts disagree on whether Microsoft 365
      Copilot should be counted in the same TAM (which would inflate the market size to $45B+ but make Glean's SOM
      appear smaller) or excluded as a bundled product in a different category. Conflicting estimates from Gartner
      ($4.5B enterprise search) and IDC ($45B+ enterprise AI software) reflect this definitional ambiguity and must be
      treated as upper and lower bound brackets rather than point estimates. [CM011] [CM012]
  - id: s3
    title: Buyer Segmentation and Growth Drivers
    body: >-
      Glean's primary buyers are Chief Information Officers, Chief Technology Officers, and Chief People Officers at
      technology-first companies with 500–10,000 employees, where SaaS proliferation is highest and information
      fragmentation pain is most acute. Secondary buyers are IT directors and enterprise architects at large enterprises
      (10,000+ employees) in financial services, healthcare, and professional services. The buying process is
      multi-stakeholder: IT/security teams control procurement, line-of-business managers champion adoption, and
      employees are end users with the ability to kill adoption via low engagement. [CM013] [CM014]


      Key growth drivers include: (1) Accelerating SaaS proliferation — the average enterprise uses 130+ SaaS
      applications, up from 80 in 2020, increasing information fragmentation at a faster rate than internal search can
      address; (2) Remote and hybrid work normalization — remote workers cannot rely on physical proximity or
      water-cooler knowledge sharing, increasing dependence on digital knowledge retrieval; (3) LLM commoditization —
      GPT-4 class models are now available via API, enabling Glean to deliver enterprise-grade AI responses grounded in
      proprietary data rather than generic internet training; (4) ROI-driven AI spend — enterprises are under pressure
      to demonstrate tangible AI ROI, and productivity tools with measurable search-time reduction are among the easiest
      to justify. [CM015] [CM016] [CM017]


      Key adoption constraints include: (1) Microsoft 365 Copilot bundling — the most significant structural constraint;
      enterprises that have paid for E3/E5 licenses face strong internal pressure to avoid a separate AI search vendor
      cost; (2) Data security concerns — IT teams are risk-averse about third-party vendors indexing sensitive corporate
      data including HR files, legal documents, and M&A records; (3) Integration complexity — connecting 100+
      applications requires significant IT resources and ongoing maintenance; (4) User adoption barriers — knowledge
      workers may resist changing their search behaviors despite a better product. [CM018] [CM019] [CM020]
