evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Net dollar retention and cohort ARR quality
    missingEvidence: >-
      Glean has not disclosed NRR, GRR, or cohort-level ARR retention data. The disclosed $100M ARR figure is
      self-reported via press release with no third-party audit.
    whyItMatters: >-
      NRR is the primary indicator of ARR durability and product stickiness. Without it, investors cannot assess whether
      growth is driven by net new logos or expansion within the existing base.
    diligencePath: Request management accounts and cohort-level NRR data under NDA during DD process.
    relatedQuestionRefs:
      - QO025
