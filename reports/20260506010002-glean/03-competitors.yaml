chapter:
  number: 3
  title: Competitive Landscape
sections:
  - id: s1
    title: Competitive Landscape Overview
    body: >-
      Glean competes across three distinct competitive tiers: (1) platform incumbents with bundled AI search — Microsoft
      365 Copilot and Google Workspace Gemini — that leverage installed base distribution; (2) specialist AI enterprise
      search vendors — Elastic Enterprise Search, Coveo, and Guru — that address narrower use cases; and (3) emerging AI
      productivity platforms — Notion AI, Confluence AI, and ServiceNow Now Assist — that expand into knowledge
      management from adjacent software categories. The most dangerous competitor is Microsoft, which distributes a
      competing product at $30/user/month as a bundle to 400 million existing M365 subscribers. [CP001] [CP002]


      The competitive dynamics favor Glean in cross-app search breadth and RAG accuracy, but Microsoft and Google have
      structural distribution advantages: their products are sold through existing enterprise relationships with
      pre-negotiated budgets, requiring no new procurement cycle. Glean must overcome both a product evaluation hurdle
      and a procurement hurdle to win enterprise deals. [CP003] [CP004]
  - id: s2
    title: Competitor Profiles and Differentiation
    body: >-
      Microsoft 365 Copilot is the most credible competitive threat. Powered by GPT-4 and integrated across Microsoft
      365 apps (Word, Excel, Outlook, Teams, SharePoint), it offers AI search, document summarization, and meeting
      transcription. Priced at $30/user/month (now bundled into M365 E3/E5 at $36–57/user/month total), it reaches
      enterprises through Microsoft's existing sales relationships. Copilot's weakness is limited cross-app
      connectivity: it primarily surfaces Microsoft content (SharePoint, OneDrive, Teams) and has limited integration
      with Slack, Salesforce, Jira, and GitHub — the key non-Microsoft data sources where Glean excels. [CP005] [CP006]


      Google Workspace Gemini (formerly Duet AI) is the second major platform threat, integrated with Google Workspace
      (Gmail, Drive, Docs, Meet). Glean faces an asymmetric challenge at Google Workspace customers: Google has native
      access to all the data Glean would need to index, plus the UX surface that employees already use. However,
      Google's enterprise sales motion and IT admin capabilities remain weaker than Microsoft's in large enterprises.
      [CP007] [CP008]


      Elastic Enterprise Search and Coveo serve the technical enterprise search segment — companies that need
      customizable, developer-configured search infrastructure. Both require significant IT configuration and are not
      AI-native; Elastic is deploying ML capabilities as a newer addition. These competitors lose in simplicity and
      time-to-value but win in configurability for customers with unusual data sources. Guru focuses on the
      SMB/mid-market segment with curated knowledge cards and lower ACV, competing for a segment that is not Glean's
      primary target. [CP009] [CP010]
  - id: s3
    title: Moat Assessment and Competitive Durability
    body: >-
      Glean's primary moat is its cross-app breadth (100+ integrations) combined with permission-aware indexing and the
      Enterprise Graph personalization layer. The Enterprise Graph — a company-specific knowledge graph that learns each
      employee's role, team, and work context — is a switching-cost mechanism that deepens with usage. No competitor has
      announced a comparable personalization layer with both depth (employee-level context) and breadth (cross-app
      data). [CP011] [CP012]


      The durability of Glean's moat against Microsoft 365 Copilot is the central competitive question. Microsoft is
      investing heavily in Copilot capability expansion and announced in 2025 that M365 Copilot will be bundled into all
      E3/E5 licenses without uplift — effectively making it free for existing enterprise M365 customers. This is a
      direct attack on Glean's procurement justification. Glean's response is product superiority on search quality plus
      a cross-app scope that Microsoft cannot easily replicate without exclusive partnerships with Salesforce, Slack,
      Atlassian, and GitHub. [CP013] [CP014]


      The VC market has signaled that Google DeepMind and Microsoft OpenAI investments represent a shift toward bundled
      AI strategy that could commoditize the enterprise search layer. However, surveys of enterprise IT buyers show that
      60–70% of companies still prefer best-of-breed AI tools for search over bundled solutions when productivity gains
      are demonstrable. This preference window is likely 18–36 months before Microsoft Copilot quality catches up.
      [CP015] [CP016] This window will narrow.
