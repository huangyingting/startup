callouts:
  - title: Microsoft Bundling Is an Existential Moat Threat
    body: >-
      Microsoft announcing M365 Copilot bundled into E3/E5 without uplift in 2025 is the most material single
      competitive development for Glean investors to track. If 30% of Glean's TAM perceives M365 Copilot as "good
      enough," the effective SAM shrinks materially and Glean's $7.2B valuation becomes harder to defend. The key
      diligence question is: at what Copilot capability milestone does Glean's product advantage become insufficient to
      justify a separate procurement budget?
    calloutType: risk
    claimRefs:
      - CP013
      - CP014
