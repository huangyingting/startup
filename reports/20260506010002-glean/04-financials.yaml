callouts:
  - title: ARR Quality Cannot Be Assessed Without NRR Data
    body: >-
      The single most important financial diligence item is net dollar retention. Without NRR, investors cannot
      determine whether Glean's $100M ARR is driven by expanding cohorts (high quality, high predictability) or
      primarily by new logos (volume-dependent, churn-exposed). Enterprise SaaS companies with best-in-class NRR (>120%)
      trade at premium multiples; companies with NRR below 110% at Glean's growth stage face multiple compression risk.
    calloutType: risk
    claimRefs:
      - CI019
