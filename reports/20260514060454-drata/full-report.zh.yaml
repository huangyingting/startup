      - number: '4.4'
        title: 资本充足性、烧钱速度与融资依赖
        blocks:
          - type: paragraph
            body: >
              Drata 的融资历史在 2020 至 2025 年间至少覆盖五次融资事件。正如第 1 章所记录（这里用本地新建证据点交叉引用），已披露轮次包括：seed（约 $3.24M，Nov 2020，18
              位投资者）；Series B（$100M，Nov 2021，18 位投资者——SEC Form D 证实售出 99,999,914 份证券）；Series C（$200M，Nov 2022，21
              位投资者——SEC Form D 证实 199,999,987 份证券）；以及 2025 轮（Feb 2025 首次出售，77 位投资者，金额拒绝披露）。已披露融资总额为 $303.24M；2025
              轮又增加了一笔未知金额。Drata 没有公开披露过债务融资、授信额度或项目融资义务。

              2025 轮金额未披露、却有 77 位投资者，是需要重点追问的反向信号。一个估值 $2B+ 独角兽若进行「正常」新股成长轮，通常会披露金额（Drata 的 $100M Series B 和 $200M
              Series C 均如此），除非交易结构不同寻常。可能解释包括：（a）结构化老股交易或要约收购，单个份额低于 Form D 披露门槛；（b）平轮或 down-round
              定价，管理层不愿公开；（c）员工流动性计划，77 位参与方其实是出售股权的员工，而不是 77 家机构投资者；或（d）新股融资与老股出售混合，导致纯新股金额信息含量不高。Form D 中披露的
              126,834,036 份证券售出数量（相较 Series C 的 199,999,987 份）在证券价格可比时，可能能提示相对轮次规模，意味着新股部分或小于 Series C。

              现金消耗和现金跑道尚未确认。在 600–1,000 名员工规模下，按市场化总薪酬（美国 SaaS 中端市场全包人均约 $120,000–$180,000）估算，仅年度人员成本就为
              $72M–$180M，尚未计入基础设施、营销和 G&A。以 $303M 已披露融资为基础，并假设 2022–2024 年年度烧钱速度为 $50M–$80M，到 2025 轮融资时，此前轮次剩余现金估计为
              $63M–$153M。因此，2025 轮更像是补充弹药，而不一定是困境融资；但缺少已确认的烧钱数据，这一判断仍属推测。截至 May 2026，Drata 尚未提交 IPO 文件、S-1
              招股说明书或其他公开市场注册文件。
