      - number: '5.2'
        title: 技术架构、集成生态与开发者界面
        blocks:
          - type: paragraph
            body: >
              Drata 是云原生 SaaS 平台，托管在 Amazon Web Services（AWS）和 Google Cloud Platform（GCP）上，安全页面对此已有确认。公司在内部访问控制中采用 Zero
              Trust 网络架构原则，对敏感系统访问使用 WebAuthn 抗钓鱼多因素认证，在 CDN 层部署 Web Application Firewall，并在应用和网络层做 DDoS
              缓解；静态和传输中的数据用「已知强协议和密码套件」加密；异常检测则使用 AWS GuardDuty、Google Security Center 以及第三方服务。基础设施变更依靠 Infrastructure
              as Code（IaC），配套同行复核、IaC 漏洞安全扫描和 compliance-as-code 合规扫描——这些做法也通过 Drata 自己的 GitHub
              仓库公开展示（drata/aws-cloudformation-drata-setup、drata/gcp-terraform-drata-setup、drata/compliance-as-code-action）。

              集成层是 Drata 最深的广度型竞争差异。公司宣传有 250+ 预置连接器，覆盖云基础设施（AWS、GCP、Azure，并在 May 2026 起支持按账户 /
              项目限定范围）、身份提供商（Okta、Auth0）、CI/CD（GitHub、GitLab）、项目管理（Jira、ServiceNow）、HR（Rippling、BambooHR）、监控（Datadog、PagerDuty）和终端防护（CrowdStrike、SentinelOne）。开发者门户开放公共
              REST API（v2），用于程序化控制；Custom Connections 构建器支持本地部署或定制工具集成；Custom Workflows 提供合规自动化触发器和动作；SafeBase Trust API
              支持程序化 Trust Center 管理；Drata MCP（Model Context Protocol）集成允许 AI agent 用自然语言与 Drata 交互。GitHub 组织维护 10+
              个公开仓库，包括 Drata Agent 桌面应用（终端监控）、GCP shell 设置脚本、AWS CloudFormation 模板、FedRAMP 20x 工具，以及 integrations-extras
              仓库（Python，BSD-3-Clause，839 stars）。react-data-table-component 仓库（TypeScript，Apache-2.0，422 stars）体现了其内部 UI
              库对开源生态的贡献。
