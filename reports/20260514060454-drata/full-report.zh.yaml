        - 相邻市场；企业既有厂商（ServiceNow、IBM、MetricStream）占据这一层级；Drata 正向上切入
      - - 第三方风险管理（TPRM）
        - 供应商风险评估平台、供应商问卷自动化、持续供应商监控、供应商合规门户
        - 不含风险评分的采购软件、仅合同管理
        - CISO、采购、供应商风险团队；付款方是公司，通过安全或采购预算支付
        - 扩张中的相邻市场；Drata 于 2026 年 3 月推出 Agentic TPRM
      - - 信任中心 / 安全保障
        - 供应商安全门户托管、安全问卷自动化（AI 辅助）、认证共享枢纽、实时信任报告
        - 传统审计项目、一次性渗透测试报告
        - CISO、销售运营、客户成功；付款方是公司（营销或安全预算）
        - 新兴细分市场；Drata 收购 SafeBase 切入此领域；与 Vanta 的信任中心竞争
      - - 集成风险管理（IRM）
        - 风险识别、风险量化工具、风险事件跟踪、内部审计管理、面向董事会的合规报告
        - 纯合规 SaaS 工作流工具
        - CRO、内部审计、董事会风险委员会；付款方是公司，通过治理 / 风险预算支付
        - Gartner 跟踪的企业级细分市场；ServiceNow、IBM、SAP、MetricStream 主导；Drata 参与有限
    notes: >-
