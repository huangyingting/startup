      - number: '6.2'
        title: 具名客户证据——生产部署、成效与背书质量
        blocks:
          - type: paragraph
            body: >-
              Drata 的客户故事页面是其销售动作中的重要资产，也提供了比许多同规模私有 SaaS 公司更强的客户证据。已发布案例研究呈现出一致模式：客户从 SOC 2 自动化开始，借助 250+
              集成自动化证据收集，然后扩展到 Trust Center、Risk Management 或 TPRM。最详细的证据来自四个已发布案例。


              Magic（Web3 Wallet-as-a-Service）完成了 SOC 2 Type II、ISO 27001 和 HIPAA 证明，所有框架均为零发现。该公司的 Security Compliance
              Program Manager 表示，相比此前流程，审计效率提升 10×，并将集成的 A-LIGN 审计师工作流——审计师可直接在 Drata 中访问证据——列为关键省时点。Magic 扩展到五个框架，并积极使用
              Trust Center、Risk Management 和连续监控集成。Jamf（Apple MDM provider）部署 SafeBase Trust Center，在 90 天内上线公司级 Trust
              Center，标准化 460+ 次问卷下载，一年节省 4,000+ 小时，并带动 $10M+ 年收入，原因是安全团队能加快交易。Jamf 还替换了 $20,000+ 的其他软件工具，说明 SafeBase
              会成为信任沟通的记录系统。


              Zello（push-to-talk communications）用 Drata 同时管理 SOC 2、ISO 27001、GDPR 和 HIPAA，每年围绕 234 个合规控制节省 700+ 小时，并产生估计
              $70K+ 效率收益。Trust Center 实施将销售周期缩短 3–14 天。Palantir（data analytics，US DOD/NHS 供应商）使用 SafeBase 每年管理 31,000 次
              Trust Center 浏览和 3,500 次安全文档下载，从被动安全审查转向主动安全审查。Palantir 的 compliance engineer 将 Trust Center
              形容为「巨大的省时工具」，同时强调它向外界传递了公司对安全重视程度很高的强信号。Abnormal Security（email security，Series B 客户）在 November 2021 被列入
              Drata 创始客户群，与 FullStory、Amplitude 和 Netlify 并列，代表增长快速、与安全相邻的 SaaS 早期采用者核心群体。


              这些客户背书的共同线索是，Drata 的价值主张不只是合规准备，而是把合规变成收入加速器。Magic、Jamf、Zello 和 Palantir 的 GRC
              团队都把信任和合规状态描述为直接促进交易加速、缩短安全审查、增强企业客户信心的因素。相比单纯提升审计效率，这是一条更强的 ROI 叙事。
