  - id: TI003
    title: 单位经济表
    columns:
      - 指标
      - 估算值
      - 方法
      - 置信度
      - 缺口 / 注意事项
    rows:
      - - 平均每用户 / 客户收入（ARPU）
        - $10,000–$37,500/yr（混合估算）
        - 保守：8,000 个客户 / $80M ARR = $10K；基准：$150M / 8,000 = $18.75K；G2 数据指向 $10K–$50K 年度区间
        - 低 — 据收入估算和客户数推断
        - ARPU 高度取决于企业客户与 SMB 的组合；没有确认数据；扩展模块会随时间推高 ARPU
      - - 客户获取成本（CAC）— SMB
        - 每个客户 logo $5,000–$15,000（估算）
        - SaaS 合规品类基准；PLG 模式会降低入站需求的 CAC；没有 Drata 专属披露
        - 低 — 据品类基准推断
        - 没有 Drata CAC 数据；PLG 组件可能让 SMB CAC 低于基准；企业 CAC 明显更高
      - - 客户获取成本（CAC）— 企业
        - 每个客户 logo $30,000–$80,000（估算）
        - 企业 SaaS 基准；Drata 销售团队规模（Series C 后聘请 CRO）意味着每个客户 logo 都需要可观销售投入
        - 低 — 据基准推断；没有 Drata 数据
        - 企业 CAC 波动很大；Drata 的企业交易数量或 ACV 均未公开确认
      - - CAC 回收期 — SMB
        - 12–24 个月（估算）
        - ARPU / 毛利率 / CAC 计算使用基准输入；G2 数据中的 11 个月 ROI 提供部分印证
        - 低 — 推断；G2 的 11 个月 ROI 与 12 个月回收估算部分一致
        - G2 ROI 衡量的是客户侧价值，不是供应商侧回收；11 个月数字不能直接等同于 CAC 回收期
      - - CAC 回收期 — 企业
        - 18–36 个月（估算）
        - 销售主导型企业 SaaS、$50K–$250K ACV 的基准；更长销售周期会推高获客成本
        - 低 — 据基准推断；没有 Drata 数据
        - 如果按 TCV 衡量，多年期合同可能加速回收；没有可用数据
      - - 净收入留存（NRR）
        - ~110%–130%（估算；未确认）
        - 领先平台的合规 SaaS 品类基准；若 Drata 的扩展模块被采用，模块结构支持 >100% NRR
        - 低 — 推断；Drata 未披露 NRR
        - NRR 是最关键的缺失指标；尽管企业客户可扩张，SMB 流失可能把 NRR 拉到 120% 以下
      - - 估算毛利率
        - 70%–85%（估算）
        - SaaS 合规品类基准；软件交付 COGS 低；云托管和 CS 人员是主要成本驱动
        - 低 — 据品类推断；没有 Drata 财务数据
        - Agentic TPRM 的 AI 推理成本可能相较纯 SaaS 基准压低利润率；已确认托管在 AWS + GCP
      - - LTV / CAC（混合估算）
        - 3x–8x（估算）
