    sections:
      - number: '1.1'
        title: 身份、历史与领导层
        blocks:
          - type: paragraph
            body: >
              Drata Inc.（CIK 0001840122）是一家 Delaware 公司，总部地址为 4660 La Jolla Village Drive, Suite 100, San Diego, CA
              92122；不过 Forbes 截至 2026 年 3 月将公司的主要地点列为 San Francisco，反映出 其在 634 2nd Street 开设的 San Francisco 办公室更具存在感。公司由
              Adam Markowitz（CEO）、 Troy Markowitz（联合创始人）和 Daniel Marashlian（联合创始人）于 2020 年创立；三人此前共同创办过 电子作品集创业公司
              Portfolium。Adam Markowitz 的职业起点是 NASA Space Shuttle Program 的航空航天工程师，
              他在那里形成了严谨的文档与验证纪律，后来把这套方法带入持续合规愿景。Drata 于 2020 年末注册成立，2021 年 1 月 13 日向 SEC 提交首份 Form D，披露早期融资约 $3.24M，并在
              2021 年 1 月结束隐身期公开发布。

              三位创始人之外，领导团队还包括关键投资者派出的董事会代表。SEC Form D 文件列出 Adam Markowitz 为 CEO/董事，董事会成员还包括 Tim Jackson、Ted Wang、Oren
              Yunger、William Griffith 和 Daniel Marashlian。 公司投资方包括 ICONIQ Growth、Alkeon Capital、Salesforce Ventures、GGV
              Capital、Cowboy Ventures、 Leaders Fund、Okta Ventures、SVCI 和 SV Angel。2026 年 3 月，Drata 发布新品牌形象，并与 「Agentic
              Trust Management Platform」定位对齐，显示其战略边界已从合规自动化扩展到 AI 驱动的治理、风险与合规（GRC+A）。
