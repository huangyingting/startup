        - 索取渗透测试报告；审查网络责任保险保单；确认 VDP 范围和响应 SLA
        - 公司
      - - 审计窗口期间云基础设施宕机
        - status.drata.com 正常运行时间历史；与 AWS/GCP 状态页对照；云服务商事件期间的客户投诉量
        - 活跃客户审计窗口内持续宕机 >8 小时；任意滚动 12 个月内发生三次或以上 SLA 违约事件
        - 索取 2024–2026 年历史正常运行时间数据；索取企业合同中已发布的 SLA 承诺和赔偿机制
        - 公司
      - - GDPR 或 DORA 监管执法
        - EU DPA 执法追踪器（edpb.europa.eu）；CISA 和 ICO 公开执法名单；提及监管问询的 Drata 新闻稿
        - 针对 Drata 的重大监管罚款或执法行动；DORA 相关合同在某个具名欧盟金融机构客户处流失
        - 索取法律顾问对 DORA 和 GDPR 处理方义务的评估；索取与欧盟客户共同签署 DPA 的证据
        - 公司
      - - 融资不透明与资本风险
        - 下一次公开融资公告和估值；ARR 披露或管理层评论；从员工数轨迹推断烧钱速度
        - 下一轮以低于 $2B 估值融资（意味着较 Series C 下轮）；ARR 连续两年同比增长低于 30%
        - 索取经审计或管理层审阅的财务数据；索取自 2025 年 2 月基线以来的 ARR 桥；索取股权结构表和投资人权利协议
        - 投资人
      - - VC 融资收缩导致创业公司客户流失
        - Drata 客户数季度轨迹；通过 Crunchbase 或 PitchBook 获取 VC 融资数据；NRR 和 GRR 趋势
        - 客户数连续两个季度 QoQ 增长低于 5%；NRR 跌破 100%，显示现有基础净 ARR 收缩
        - 索取按客户层级（创业公司 / 企业）拆分的 NRR、GRR 和队列留存；索取按获客年份分组的流失率
        - 投资人
      - - 审计师渠道合作伙伴流失
        - 审计师合作伙伴数量轨迹；G2 和 Gartner Peer Insights 中关于证据接受问题的提及；审计事务所关于工具批准的公开声明
        - 一线审计事务所公开撤回对 Drata 收集证据的接受；任意 12 个月内合作伙伴数降至 1,000 以下
        - 索取审计师合作协议条款；从审计师合作伙伴样本确认证据接受率数据；评估 Big 4 是否在合作伙伴名单中
        - 投资人 + 公司
      - - CEO 离任且无继任者
        - 通过 LinkedIn 和新闻稿监测 Adam Markowitz；高管猎聘活动；董事会组成变化
        - Adam Markowitz 离任后 90 天内未公开任命继任者；CEO 与 CRO 或 CFO 同时离任
        - 索取继任计划，以及信贷工具或重大合同中的关键人条款；确认 CEO 的关键人人寿保险覆盖
        - 投资人
    notes: >-
      否决标准是投资逻辑破裂事件——它们会实质改变投资判断，而不是日常经营挑战。监测指标按季度跟踪。负责人标记反映主要由谁监测和补救：“公司”表示 Drata 运营权限内的控制；“投资人”表示投资人的尽调或治理动作；“投资人 +
      公司”需要双方协同。
