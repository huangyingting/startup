  - id: FI001
    title: 收入模型桥
    type: flow
    layout: wide
    summary: >
      展示 Drata 收入如何从初始获客流经年度订阅周期进入净 ARR，并纳入扩张杠杆（附加模块、额外框架、层级升级）和流失抵消。 该桥图体现分层 GRC 与 Assurance 产品结构内置的先落地、再扩张动作：每个客户的 ARR
      可通过增加框架、 模块升级（TPRM Pro、Risk Management Pro）和席位 / 工作区扩张而逐步增长。所有 ARR 数值均为估计区间； 未有披露数字。
    approximationNotes: >
      图中所有 ARR 数值均为估计区间，来自客户数（8,000+ 已确认但为公司声称）、G2 买家数据（16 笔采购； $10K–$50K/yr 区间）和 SaaS 合规品类基准。Drata
      未公开收入、扩张或流失数据。节点明细值只是数量级估计， 仅用于说明。
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI007
      - CI008
    data:
      nodes:
        - id: new-logo
          label: 新客户签约
          detail: 8,000+ 个累计客户 logo；由合规期限驱动的入站需求；混合 PLG + 销售辅助动作
        - id: initial-contract
          label: 初始合同 ARR
          detail: 估计 $10,000–$100,000/yr，取决于层级；Foundation 锚定 SMB；Enterprise 为最高层级
        - id: annual-renewal
          label: 年度续约
          detail: 自动续约周期；审计师工作流嵌入后，合规框架黏性强；集成越深，切换成本越高
        - id: expansion
          label: 扩张收入
          detail: 增加框架、TPRM Pro、Risk Management Pro、UAR 模块、Workspaces、Agentic TPRM Assessment； 估计 NRR 110%–130%
        - id: churn
          label: 总流失
          detail: SMB 因成本敏感或整合而流失；若集成数量低，切换更容易；流失率未披露
        - id: net-arr
          label: 净 ARR（估计）
          detail: 总额估计 $80M–$250M；基准情景约 $150M；增长率未披露；若扩张模块被采用，NRR 可被推高至 100% 以上
      edges:
        - from: new-logo
          to: initial-contract
          label: 销售成交
        - from: initial-contract
          to: annual-renewal
          label: 12 个月自动续约
        - from: annual-renewal
          to: expansion
          label: 增购 / 交叉销售动作
        - from: expansion
          to: churn
          label: 扣除流失
        - from: churn
          to: net-arr
          label: '= 留存 + 扩张 − 流失'
  - id: FI002
    title: 单位经济桥
    type: flow
    layout: standard
    summary: >
      展示估计的单位经济路径如何从获客成本走到回本周期再到客户终身价值，并呈现扩张收入对 LTV/CAC 效率的复利作用。 所有数值均为基于 SaaS 合规品类基准推断的估计；Drata
      特定的单位经济未公开披露。该桥图凸显核心尽调问题： Drata 的 NRR 是否足以在规模化后支撑 3x+ 的 LTV/CAC。
    approximationNotes: >
      CAC、回本周期、NRR 和 LTV 使用 SaaS 合规品类基准（OpenView、BVP 云指数、Bessemer 云基准） 以及来自 16 笔 Drata 采购的 G2 买家上报数据估计。Drata
      管理层未披露信息来证实或否定这些估计。输入高度不确定； LTV/CAC 估计承受所有上游变量带来的乘数不确定性。
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
    data:
      nodes:
        - id: cac
          label: 获客成本（CAC）
          detail: SMB：估计 $5,000–$15,000；Enterprise：估计 $30,000–$80,000；混合结构未确认
        - id: first-year-revenue
          label: 第 1 年总收入
          detail: 初始 ACV：$10,000–$100,000，取决于层级；G2 数据显示 SMB 为 $10K–$50K；Enterprise 更高
        - id: payback
          label: CAC 回本周期
          detail: 估计 SMB 为 12–24 个月；Enterprise 为 18–36 个月；G2 买家 ROI 为 11 个月，与之部分一致
        - id: nrr-expansion
          label: NRR 驱动的扩张（第 2 年+）
          detail: 估计 NRR 110%–130%；来自模块和框架的扩张会为每个队列累积 ARR
        - id: ltv
          label: 客户终身价值（LTV）
          detail: 估计 $25,000–$300,000；假设平均客户生命周期 3–5 年，毛利率 70–85%
        - id: ltv-cac-ratio
          label: LTV / CAC 比率
          detail: 估计 3x–8x；3x 是品类健康下限；8x 属于最佳水平；Drata 尚未确认
      edges:
        - from: cac
          to: first-year-revenue
          label: 销售投入 → 首个合同
        - from: first-year-revenue
          to: payback
          label: 毛利回收
        - from: payback
          to: nrr-expansion
          label: 回本后复利
        - from: nrr-expansion
          to: ltv
          label: 累计生命周期收入
        - from: ltv
          to: ltv-cac-ratio
          label: LTV ÷ CAC 效率倍数
