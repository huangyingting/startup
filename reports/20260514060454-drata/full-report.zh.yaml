  - id: TV001
    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 细节
    rows:
      - - 建议
        - 有条件通过 / 需数据室
        - 对市场位置和集成护城河信心高；没有 ARR、NRR 和烧钱速度披露，对当前估值信心低。收到数据室后再重新接触。没有财务确认前，不应按 $2B 参考价格投资。
      - - 信心水平
        - 中
        - '市场位置证据强（与 Vanta 并列 #1-2）、客户规模（8,000+）和集成护城河（250+ 连接器）证据强。当前财务证据弱（2025 年 2 月指引后未披露 ARR 或 NRR）。信心上限为中。'
      - - 风险评级
        - 中高
        - 品类领导者风险低；财务不透明风险高；SaaS 倍数压缩风险中；Vanta 竞争风险中；考虑到 $303M+ 已融资，优先股悬垂风险为中高。综合风险评级：中高。
      - - 估值立场
        - $2B 估值基本合理至略偏高（已过期）
        - >-
          $2B 在 2022 年 SaaS 高峰期、以 $80-130M ARR 对应 15-25x ARR 倍数时是合理的。在 2026 年 8-15x ARR 倍数下，$2B 隐含 $133-250M ARR。基准情景
          ARR 为 $120-150M。若 ARR 区间高端成立，估值可辩护；若 ARR 表现不及预期，则偏紧。需要数据室确认。
      - - 目标回报 / 持有期
        - 5-7 年 3x-5x（基准至乐观）
        - >-
          基准情景（$2B 入场，2029-2031 年通过 IPO 或 M&A 以 $3-4B 退出）隐含 1.5-2x，低于典型 VC 门槛。乐观情景（$2B 入场，$5-7B 退出）隐含 2.5-3.5x。若要在 $2B
          入场拿到 3x+ 回报，Drata 必须达到乐观情景 ARR（$200M+）和溢价退出倍数（15-20x ARR）。建议 $1.5B 或更低入场，以改善回报曲线。
      - - 决策含义
        - 任何承诺前先索取数据室
        - 若没有以下条件，不按当前过期 $2B 参考价格投资：（1）数据室确认 ARR，（2）确认 NRR ≥115%，（3）披露 2025 轮条款清单和估值，（4）确认毛利率 ≥70%，（5）确认烧钱速度和现金跑道。
    notes: >-
      建议反映的是强定性证据（市场领导、集成护城河、客户规模）与结构性财务不透明之间的平衡。有条件通过并不是对 Drata 业务质量的负面结论，而是因为证据不足，无法在 2022 年后 SaaS 倍数环境中验证 $2B
      参考价格。目标回报分析假设 2026 年入场，并用公开可比公司作为退出估值基准。所有财务估计均基于公开二手证据和本报告跨章节综合；尚未收到 Drata 的一手财务数据。
    claimRefs:
