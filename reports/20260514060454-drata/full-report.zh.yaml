        - 1,300+ 合作伙伴，但集中度未知；审计事务所（A-LIGN、Armanino）深度嵌入工作流
        - 中高——如果少数大型审计员或 MSP 合作伙伴贡献大多数客户，合作伙伴流失风险会升高
        - 索取前 10 大合作伙伴收入集中度；评估合同排他性；评估是否有单一审计员渠道贡献 >10% 客户
      - - 客户集中度
        - 未披露；8,000+ 客户暗示集中度较低，但 Palantir、Jamf、Tenable、Notion 等大型企业账户可能有实质贡献
        - 中——无集中度数据；采用多产品的企业账户 ARR 可能更高
        - 索取前 10 和前 25 大客户 ARR 集中度；索取客户级 ARR 分布直方图
      - - 竞争性流失风险（Vanta）
        - Vanta 是最接近的竞争对手；双方在初创公司 SOC 2 细分高度重叠；Vanta 类似定价带来切换风险
        - 初创客群为高——中端市场和企业客群为中，后者切换成本更高
        - 索取相对 Vanta 的赢单 / 输单数据；跟踪公开流失信号；评估 Vanta 的定价或产品同等性是否在缩小差距
      - - 地理集中度
        - 以美国为主；伦敦和悉尼办公室显示 EMEA/APAC 拓展意图；GDPR 和 DORA 支持国际框架
        - 中低——美国集中度高，但国际机会是增量而非风险
        - 跟踪国际 ARR 占总 ARR 的比例；评估 GDPR/DORA 支持是否带来欧盟客户牵引力
      - - 人员缩减风险（2024 年 9 月裁员）
        - 2024 年 9 月裁减 9%（约 40 人），此前 2023 至 2024 年员工数增长 52%；公司称这是为了“可持续增长”
        - 中 — 支持和客户成功产能可能受影响；未公开披露对 CSAT 的影响
        - 索取裁员后 CSAT 趋势；查看支持 SLA 是否在缩减后变化；对比 2023 与 2025 年员工 / 客户比
    notes: >-
      Drata 不披露客户集中度、合作伙伴来源 ARR 占比，也不披露按产品层级的留存。公开数据里，框架扩展和 Trust Center 采用是最清晰的结构性扩张驱动。渠道集中和 Vanta
      竞争导致的流失风险，是仅靠公开证据最难化解的两项风险。
    claimRefs:
      - CU036
      - CU037
      - CU038
      - CU039
      - CU040
      - CU041
      - CU042
      - CU043
      - CU044
      - CU045
  - id: TR001
    title: 监管 / 法律风险登记表
    enumerationScope:
      coverage: partial
      basis: >-
        Seven regulatory and legal risk categories assessed across public regulatory texts (GDPR, DORA, EU AI Act,
        FedRAMP, PCI DSS, CCPA), Drata's published legal documents, and comparable SaaS enforcement precedents. No
        private regulatory correspondence, pending litigation records, or internal legal counsel assessments were
        available; full litigation history and regulatory inquiry status cannot be confirmed from public sources as of
        May 2026.
    columns:
      - 风险
      - 类型
      - 可能性（高/中/低）
      - 影响（高/中/低）
      - 缓释状态
      - 剩余敞口
      - 尽调要求
    rows:
      - - GDPR 第 28 条 DPA 义务及跨境传输机制（SCCs / EU-US DPF）
        - 监管
        - 中
        - 高
        - 部分缓释 — Drata 发布 DPA 和法律中心；跨大西洋传输的充分性机制未公开确认；假设使用 SCCs
        - 中 — 欧盟 DPA 对美国 SaaS 处理方的执法在增加；Schrems III 风险仍在；罚款最高可达全球营业额 4%
        - 索取 DPA 模板以及依赖 SCCs 或 EU-US Data Privacy Framework 的证据；确认存储在美国基础设施上的欧盟客户数据范围
      - - DORA 合规风险：作为欧盟金融业 ICT 第三方服务提供商
        - 监管
        - 中
        - 高
        - 部分缓释 — Drata 支持客户使用 DORA 框架；其自身作为 ICT 第三方提供商的 DORA 合规情况未公开确认
        - 高 — 欧盟金融机构客户必须用合同把 DORA 义务传导给 ICT 提供商；不合规可能丢掉欧盟金融服务客户
        - 索取 Drata DORA 合规证明，或面向欧盟金融业客户提供的合同 DORA 附录；确认 DORA 第 30 条下的审计权
      - - FedRAMP 授权延迟（已 Ready，但未 ATO）
        - 监管
        - 高
        - 中
        - 部分缓释 — 已取得 FedRAMP Ready 认定；完整 ATO 需要担保机构和 FedRAMP PMO 的材料审查；状态未确认
        - 中 — 卡住 $10B+ 美国联邦 IT 市场；竞争厂商可能先拿到 ATO；FedRAMP 流程成本 $1M–$3M，周期 12–24 个月
        - 确认是否已有联邦机构赞助 Drata 的 ATO 申请；索取完整 FedRAMP 授权路线图和时间表
      - - Drata 自身智能体功能的 EU AI Act 合规
        - 监管
        - 中
        - 高
        - 萌芽阶段 — 为客户支持 ISO 42001 显示出认知；Drata 自身的 Agentic TPRM 和 AI Questionnaire Assistance 尚未经过独立评估
        - 高 — 受监管行业使用 Agentic TPRM，可能被归为高风险 AI；到 2027 年 8 月期限仍不合规，可能在欧盟遭遇运营禁令
        - 索取 Drata 智能体 AI 功能的 AI Act 影响评估；确认 Drata 是否已向 EU AI Office 注册 AI 系统
      - - GRC 既有厂商的知识产权与专利主张
        - 法律
        - 低
        - 高
        - 未缓释 — 未公开披露专利组合或自由实施分析；合规自动化赛道正通过 M&A 整合
        - 中 — 市场整合后，ServiceNow、IBM、RSA 或 AuditBoard 可能主张 GRC 相邻专利；即便诉讼缺乏依据，成本也会分散管理层精力
        - 索取 IP 法律顾问对核心合规自动化、证据收集和 AI 问卷功能的审查与自由实施分析
      - - 客户数据责任（审计证据泄露或未经授权访问）
        - 法律
        - 中
        - 高
        - 已缓释 — 已通过 SOC 2 Type II 和 ISO 27001 证明；与客户签署 DPA；网络责任保险推测存在但未披露
        - 中 — Drata 为 8,000+ 客户持有敏感审计证据（员工记录、访问日志、安全配置）；一旦泄露会产生直接法律责任
        - 索取网络责任保险保额和 DPA 赔偿上限；确认 Drata 是否购买错误与遗漏责任保险
      - - 加州客户数据的 CCPA 与 CPRA 合规
        - 监管
        - 低
        - 中
        - 已缓释 — Drata 维护隐私政策；B2B SaaS 处理方的 CCPA 义务较窄；标准 DPA 覆盖加州消费者数据
        - 低 — B2B SaaS 的标准合规风险；加州未出现反向信号
        - 确认 CCPA 数据地图和删除工作流；核实是否已完成敏感个人信息类别的 CPRA 风险评估
    notes: >-
      可能性和影响评级为定性评估，依据公开监管披露、Drata 已发布法律文件和可比 SaaS 厂商执法案例。截至 2026 年 5 月，公开来源未发现针对 Drata 的监管执法。FedRAMP “Ready”
      状态来自公开报道确认；完整 ATO 状态无法从公开来源核实。DORA 与 EU AI Act 敞口基于 Drata 已发布产品范围和适用监管文本评估。
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
  - id: TR002
