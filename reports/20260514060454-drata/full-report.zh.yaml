  - id: TV004
    title: 可比估值表
    enumerationScope:
      coverage: partial
      basis: >-
        Six comparables assessed across three categories: direct compliance automation peers (Vanta, AuditBoard),
        broader GRC/trust platform players (OneTrust), and public market references (Workiva, ServiceNow GRC module,
        LogicGate). Enumeration is partial because: (1) all private company valuations reflect the most recent known
        funding round, which may be stale by 2-4 years; (2) Secureframe, Hyperproof, Tugboat Logic, and Laika —
        additional direct peers — lack sufficient public valuation data for reliable comparison; (3) public M&A premia
        above reported valuations (e.g., Hg Capital's AuditBoard terms beyond the $3B headline) are not publicly
        confirmed; (4) Workiva's revenue mix (heavy professional services) makes ARR multiple comparison imprecise.
    columns:
      - 可比公司 / 交易
      - 指标
      - 倍数 / 估值 / 状态
      - 对 Drata 的参考意义
      - 局限
    rows:
      - - Vanta（2022 年 Series C 轮）
        - ARR 估计约 $100M；估值约 $1.6B；7,000+ 客户（2022 年估计）
        - ARR 约 15x（2022 年估计）
        - 最强的直接可比：同属合规自动化，客户画像一致（SMB 到中端市场），支持框架重叠（SOC 2、ISO 27001、HIPAA）。截至 2022 年，两家公司规模几乎相同。
        - 估值已过时（2022 年）；两家公司此后都在增长，但未披露更新估值；2026 年两者真实差距未知。Vanta 的 $1.6B 与 Drata 的 $2B 相比，意味着 Drata 获得溢价——原因不清。
      - - AuditBoard（Hg Capital 2023 年收购）
        - 收购时 ARR 估计约 $150-200M；收购价 $3.0B
        - ARR 约 15-20x
        - 最佳 M&A 可比：Hg Capital 作为成熟 PE 买家，对收入规模相近的企业合规 SaaS 给出了收购倍数。为战略买家或 PE 买家愿意为合规自动化平台支付的价格设定上限。
        - AuditBoard 偏企业客户（ACV 更高、客户更少），Drata 客户基底则偏 SMB；Hg 的投资逻辑是审计工作流效率，不是合规自动化广度。公开来源未确认成交时的准确 ARR。
      - - OneTrust（2021 年 Series D 轮）
        - ARR 估计约 $200M（2021 年）；估值 $9.7B（2021 年）
        - ARR 约 48x（2021 年峰值）
        - >-
          警示案例：OneTrust 在 2021 年峰值以极高倍数融资，截至 2026 年仍未 IPO。它给出一个上限，也是一记警告——合规 / 隐私 SaaS 在 2021 年拿到的异常倍数，无法在 2024-2026
          年环境里复制。
        - 业务范围比 Drata 的合规自动化核心更宽（隐私、同意管理、ESG）。2022 年后估值很可能较 $9.7B 大幅下调。IPO 延迟说明，按不低于 Series D 价格完成公开市场退出并不容易。
      - - 'Workiva（NYSE: WK，公开市场）'
        - 收入约 $700M（2025 年估计）；市值约 $3.5B
        - 收入约 5x
        - 合规 / 报告 SaaS 的公开市场锚点。说明 ESG 和财务报告合规 SaaS 公司在规模化后交易倍数约为 4-6x 收入。如果 Drata 增速放缓，这是 IPO 时的下限倍数参考。
        - Workiva 已盈利且成熟，企业与金融服务客户占比高；Drata 高增长，主要面向 SMB / 中端市场。Workiva 约 5x 的倍数不能直接套用，但为 IPO 后倍数压缩设定底部。
      - - 'ServiceNow GRC 模块（NYSE: NOW 的一部分）'
        - ServiceNow 市值约 $170B；GRC 是约 20 条产品线之一
        - 不是独立可比对象
        - 说明大型企业会把 GRC 作为统一 ITSM / ITOM 平台的一部分来采购。ServiceNow 的 GRC 胜出案例代表 Drata 在企业端的上限竞争者，也是 Drata 潜在收购方做自建还是收购时的对照基准。
        - 不是独立可比对象；GRC 收入未拆分。ServiceNow 规模（$10B+ ARR）和平台广度让直接估值比较失去意义。它只适合作为竞争和自建 vs 收购的参考。
      - - LogicGate（2021 年 Series C 轮）
        - 估值约 $500M（2021 年估计）；ARR 基数更小（约 $30-50M 估计）
        - ARR 约 10-15x（2021 年估计）
        - 规模更小，但也是直接 GRC 自动化同业。说明小规模 GRC SaaS 在峰值倍数下也能接近独角兽估值。它为合规自动化估值谱系提供较低锚点。
        - 2021 年后未披露更新估值；与 Drata 存在显著规模差（按估计 ARR，Drata 大 2-3x；按客户数，大 5x+）。LogicGate 只做企业客户，限制了 SMB 收入对比。
    notes: >-
      所有私营公司估值数据均来自最近一次披露融资轮，可能已严重过时。AuditBoard $3B 收购价被广泛报道，但准确交易结构（企业价值 vs. 股权价值、营运资本调整）未能从公开来源完全确认。Workiva 市值根据 2026
      年初公开交易数据估算。OneTrust $9.7B 估值来自 2021 年 Series D；管理层已表达 IPO 意向，但截至 2026 年 5 月尚未提交文件。私营可比公司的 ARR 估计来自分析师 /
      媒体估算，未获公司确认。本枚举不完整——更多局限见 TV004 的证据缺口。
    claimRefs:
      - CV012
      - CV013
      - CV014
      - CV015
      - CV016
      - CV017
      - CV032
      - CV040
  - id: TV005
    title: 投资逻辑失效与出局触发条件表
    columns:
      - 触发条件
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 确认发生降估值融资
        - 2025 年融资或未来任何融资披露估值低于 $1.5B
        - 直接推翻基准情景（$1.5-2.5B 可辩护），并表明投资人共识认为 Drata 还没有长进 $2B Series C 价格。意味着 ARR 或 NRR 低于预期，和 / 或倍数严重压缩。
        - 立即按新估值重新评估。若该轮估值为 $1.5B 或以下，重算回报曲线；更低入场价下投资逻辑可能仍成立，但需要重新承销。
      - - 披露 NRR 低于 100%
        - 任何官方披露或数据室披露显示 NRR < 100%（净收入流失）
        - NRR 低于 100%，说明 Drata 从现有客户流失收入的速度超过扩张收入。合规自动化若 NRR <100%，意味着 SMB 高流失、定价压力或被竞争对手替换——这些都会削弱集成护城河逻辑。
        - 投资逻辑失效。不要投资。现有投资人应评估持仓规模和退出选项。这个阶段 NRR 低于 100%，对 SaaS 是重大红旗。
      - - 客户基数低于 6,000（从 8,000+ 净下降）
        - 2026 年及之后任一数据点披露或推断客户数低于 6,000
        - 客户数从 8,000+ 下降，意味着显著净流失，很可能来自 SMB 客户转向 Vanta，或彻底退出合规市场。集成护城河价值也会下降，因为付费客户变少，250+ 连接器维护就更难证明必要性。
        - 客户规模支柱上的投资逻辑失效。重新审视集成护城河的可防御性和企业增购管线。很可能触发全面重新承销。
      - - Vanta 以 $3B+ 估值融资
        - Vanta 在 2026-2027 年宣布新融资，投后估值达到或超过 $3B
        - 说明市场把 Vanta 视为品类赢家，且相对 Drata 最后已知的 $2B 估值有溢价。Drata 需要加快披露财务、以可比估值融资，或接受作为二号玩家被折价估值。
        - 监控 Drata 的回应：对等融资、提交 IPO S-1，或保持沉默。如果 Drata 无法匹配 Vanta 的融资叙事，悲观情景概率上升。
      - - 平台安全事件
        - 可信公开披露显示客户合规证据遭到未授权访问
        - 直接摧毁核心价值主张（信任与合规自动化）。Drata 的商业模式要求它比客户自己的手工流程更可信。一旦发生泄露，客户会立即流失，声誉也会坍塌。
        - 立即击穿投资逻辑。按市场价格退出全部头寸。合规平台一旦发生客户证据泄露，没有可行修复情景。
      - - 到 2026 年底仍未披露 ARR
        - 到 2026 年 12 月，Drata 仍拒绝披露收入，也未向潜在投资人开放数据室
        - 在这个规模（已融资 $303M、上线约 5 年）下，财务不透明不再只是尽调缺口，而会变成治理问题。它表明管理层可能在掩盖业绩不佳，也可能决定长期保持私有。
        - 降低确信度。只参与明确授予数据室权限且保留 pro-rata 的跟投轮。没有财务披露，不要领投或共同领投。
    notes: >-
      投资逻辑失效触发条件是单独或共同推翻基准情景投资逻辑的阈值事件。它们不同于风险因素（风险因素按概率加权）——这些是二元事件，会要求立即重评投资决策。对 Drata 这个规模和阶段的 SaaS 公司，100% NRR
      是硬底线；任何低于 100% 的 NRR 都意味着客户基底存在结构性问题。平台安全事件是唯一一个对现有投资人与潜在投资人杀伤同样严重的出局触发条件。
    claimRefs:
      - CV022
      - CV026
      - CV027
      - CV028
      - CV033
      - CV039
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 当前 ARR 与增长率
        - Q4 2025 或 Q1 2026 的 ARR；同比 ARR 增长率；过去 8 个季度的月度 / 季度 ARR 增长趋势
        - 最重要的未知项。ARR 和增长一旦明确，整个估值区间（$0.5B-$5.0B）会收敛到窄得多的区间。没有 ARR，就无法为 $2B 参考价格套用可辩护倍数。
        - 需要数据室。询问：财务报表或收入明细；包含 ARR 瀑布图的管理层演示材料；财务团队确认。
      - - 净收入留存率（NRR）
        - 2022、2023、2024 各队列的总收入留存率（GRR）和 NRR；SMB vs 中端市场 vs 企业 NRR 拆分
        - NRR 是预测长期 SaaS 价值的最关键指标。合规自动化 NRR >120% 支撑溢价倍数；NRR <100% 会击穿投资逻辑。集成护城河逻辑需要证据证明客户会随时间在 Drata 上扩张。
        - 需要数据室。询问：队列留存分析；客户收入瀑布图（赢得 logo、流失 logo、扩张、收缩）；财务团队材料。
      - - 2025 年融资估值与结构
        - 投后估值；优先股条款；该轮是新股、老股交易还是结构化票据；2025 年融资后的完整股权结构表
        - 2025 年 77 名投资人参与但未披露估值，给当前公允价值留下根本不确定性。降估值轮会压低入场价；升估值轮会验证乐观情景。结构化票据或老股成分会改变回报机制。
        - 直接向管理层和法律顾问询问。索要股权结构表、清算瀑布模型，以及最新 409A 估值。需要董事会和管理层配合。
      - - 毛利率与单位经济
        - 毛利率 %；按渠道拆分的 CAC（入站 vs 出站 vs 合作伙伴）；CAC 回本周期；LTV/CAC 比；按客户细分的贡献利润率
        - 毛利率决定 ARR 增长有多少能转化为股权价值。毛利率在 70-85% 时，Drata 可以高效扩张。若低于 65%（例如企业实施成本高），倍数压缩会很明显。单位经济能确认企业 GTM 转型是在增厚还是稀释利润率。
        - 需要数据室。询问：包含 COGS 拆分的 P&L；按渠道拆分的销售和营销支出；带 CAC 归因的 CRM 数据导出；财务团队单位经济模型。
      - - SafeBase 集成状态与流失
        - 收购前 / 收购后的 SafeBase 客户数；集成时间表；收购以来 SafeBase 特定客户流失；SafeBase 客户贡献收入
        - SafeBase 收购（约 $250M）是一次重大资本投放。如果 SafeBase 客户因集成摩擦或功能倒退而流失，该收购已经毁损价值。集成状态直接影响 GRC+A 平台逻辑和 8,000+ 客户数的质量。
        - 需要数据室。询问：收购以来 SafeBase 客户数与留存；带里程碑日期的产品集成路线图；向工程负责人确认集成状态。
      - - 烧钱速度与现金跑道
        - 月度 / 季度现金消耗；截至 Q1 2026 的现金及等价物；按当前烧钱速度测算的现金跑道；实现盈亏平衡或现金流转正的路径
        - >-
          Drata 已融资 $303M+，2025 年融资又加入约 $127M，总资本约 $430M+。如果每年烧钱 $50-80M，现金跑道是 5-8 年；如果每年烧钱
          $100M+，下一轮融资会很快成为战略约束。烧钱速度直接影响任何 M&A 或 IPO 过程中的谈判筹码。
        - 需要数据室。询问：月度银行流水摘要；CFO 证明的烧钱速度；12 个月现金流预测；确认主要银行关系以及任何 SVB / 银行风险敞口。
      - - 审计师合作伙伴集中度
        - 按推荐客户量排序的前 10 大审计师合作伙伴；来自前 3 大审计事务所的收入；任何独家或优先合作安排
        - 1,300+ 审计师合作伙伴被称为关键分发护城河。如果 50%+ 推荐来自 5 家或更少审计事务所，护城河就比描述更窄，集中风险很高。与四大事务所签优先合作安排会是重大正向信号。
        - 在管理层渠道访谈和合作伙伴项目文件中询问。审阅审计师合作伙伴门户条款。索要按合作伙伴来源拆分的收入归因。
    notes: >-
      所有尽调问题都需要正式数据室权限或管理层配合；公开来源无法解决。潜在投资人的优先级：（1）ARR 与增长率，（2）NRR，（3）2025 年融资结构，（4）毛利率，（5）烧钱速度，（6）SafeBase
      集成状态，（7）审计师合作伙伴集中度。第 1-3 项是阻塞项——没有它们，投资决策不能推进。第 4-7 项重要，但如果第 1-3 项令人满意，单项并不阻塞。
    claimRefs:
      - CV019
      - CV020
      - CV026
      - CV027
      - CV033
      - CV037
      - CV039
