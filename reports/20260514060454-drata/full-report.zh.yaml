      - number: '4.3'
        title: 成本结构、毛利率驱动因素与服务交付经济
        blocks:
          - type: paragraph
            body: >
              作为 SaaS 合规自动化平台，Drata 的成本结构符合高毛利软件业务的典型形态。收入成本（COGS）包括 AWS 和 GCP 云基础设施托管成本 （由 drata.com/security
              确认）、客户成功、入职导入和实施团队的人力成本，以及用于集成和监控的第三方 SaaS 工具成本。 拥有 250+ 集成连接器的合规 SaaS
              平台，每个连接器都会带来增量维护成本；若管理不当，毛利率会被压缩。基于可比合规和安全 SaaS 公司基准， 该品类毛利率估计为 70–85%；Drata 的毛利率画像未确认。

              运营费用包括显著的 R&D 投入（与 Series C 博客中 Drata「invested heavily in product and engineering」的说法一致）、
              已扩张的销售和营销职能（Series C 公告提到 Drata 聘任 CRO Adam Aarons，招聘页面也显示结构化销售团队），以及支撑五个办公室、三个国家、 600–1,000 名员工的不断增长的 G&A
              职能。Drata 由 Built In 确认的 100% remote-first 文化，可能降低相对同业的房地产成本， 但全球员工分布（US、UK、Australia）会增加
              HR、福利和合规管理开销。SafeBase 收购（按重定向证据推测时间约为 2023 年）增加了产品和团队成本， 但收购价格未披露，构成一项未反映在已披露融资数据中的无形资本配置。

              公开资料没有营运资本、资本开支或债务服务数据。作为 SaaS 公司，Drata 预计实物资本开支要求较低；云基础设施属于 OpEx 项。 任何依据 ASC 350-40
              进行的大额软件开发成本资本化，只会出现在审计财务报表中，而这些报表并不公开。Agentic TPRM Assessment 和 AI 驱动问卷自动化功能的服务交付成本，可能带来增量 LLM/GPU
              推理成本，相比传统 SaaS 压缩毛利率——这是 2025–2026 年所有 AI-native SaaS 公司共同面对的风险。
            claimRefs:
              - CI017
