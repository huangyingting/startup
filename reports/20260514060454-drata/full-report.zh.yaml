      - number: '5.6'
        title: 附录证据
        blocks:
          - type: callout
            title: 集成广度是证据收集护城河的核心
            body: >
              Drata 的 250+ 预置集成超过最接近竞争对手的公开数量（Vanta 约 100–150；Secureframe
              处于可比区间），意味着客户可以从更多现有工具栈中自动收集证据，不必手工上传或写脚本。一旦客户配置了 30–40 个集成并映射到合规框架，切换成本在结构上就很高。May 2026 云范围限定更新（细粒度
              AWS/GCP/Azure 账户级监控）通过减少误报噪音进一步延展了这条护城河，也把平台更牢地固定为生产级合规运营系统，而不是单点工具。
            calloutType: strength
            claimRefs:
              - CE021
              - CE022
              - CE015
          - type: callout
            title: Trust Center 网络效应形成双边数据护城河
            body: >
              借助 SafeBase 收购，8,000+ 客户在 Drata 的 Trust Center 发布已验证合规状态，使 Drata 拥有 GRC
              类别中最大规模的预填安全状态数据集。买方消费这些资料后，问卷往来减少，也从需求侧强化飞轮；没有 Trust Center 产品的竞争对手很难复制这一机制。AI Questionnaire Assistance
              直接调用这些数据，形成二阶护城河：Trust Center 数据库越大，AI 建议的准确性和相关性越强。
            calloutType: strength
