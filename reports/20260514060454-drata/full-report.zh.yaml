      - number: '5.4'
        title: 信任、安全、隐私与合规控制
        blocks:
          - type: paragraph
            body: >
              Drata 自己也吃自己的狗粮：公司使用自家合规自动化平台，为自身产品维持 SOC 2 Type II 认证和 ISO 27001 认证，并通过 Trust Center 发布安全状态。安全页面确认了 100+
              安全控制监控、具备 24/7 自动化能力的持续检测与响应、DevSecOps 优先的软件开发生命周期（CI/CD 中的 SAST、凭证检查、OWASP Top 10 培训），以及面向所有敏感内部系统的
              WebAuthn 抗钓鱼 MFA。网络防护包括 WAF、Content Security Policy header、用于抵御域名仿冒的 DNSSEC，以及 CDN 和云服务商层面的 DDoS
              缓解。终端控制包括带加固配置的 MDM，以及 endpoint detection and response（EDR）。红队测试由内部和第三方共同开展。安全页面可访问公开 Vulnerability
              Disclosure Program（VDP）。数据在静态和传输中均加密。授权第三方分包处理方列在 Trust Center 的 sub-processor registry 中。

              AICPA 的 SOC 框架和 ISO 27001 是 Drata 发布的两大主要信任锚。公司还支持 FedRAMP（GA），并维护 FedRAMP 20x 公开 GitHub
              仓库，显示其正积极投入美国政府客户合规。GDPR sub-processor 透明度满足欧洲数据隐私义务。安全页面叙述中还出现了同行代码复核、IaC 安全扫描、通过 GuardDuty 和 Google
              Security Center 做异常检测，以及 Cloud Security Posture Management。status.drata.com 状态页可公开访问，提供实时服务状态，但公开文档没有发布合同化
              uptime SLA。AICPA 的 SOC 2 框架是 Drata 从 SMB 到中端市场客户最常寻求的合规证明；Drata 自身获得该认证，是强信任信号。
