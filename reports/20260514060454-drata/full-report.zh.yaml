    layout: wide
    summary: >-
      基于 G2 评分信号和合规软件行业基准的 Drata 客户满意度到留存估计模型。Drata 未披露 NRR、GRR 或队列留存率。 数值为说明性估计，来自 G2（4.8/5.0）、Gartner PI（评价不一，其中一条
      3.0/5.0 反向评论）以及已发布的 SaaS 合规软件 GRR 基准（SMB 权重较高的合规工具通常为 85–92%）。
    claimRefs:
      - CU026
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
    data:
      columns:
        - 第 1 年（估计）
        - 第 2 年（估计）
        - 第 3 年（估计）
      rows:
        - label: 初创队列（A–C 轮，估计）
          values:
            - 85
            - 75
            - 68
        - label: 中端市场队列（C–D 轮，估计）
          values:
            - 90
            - 83
            - 78
        - label: 企业队列（D 轮后 / Trust Center，估计）
          values:
            - 93
            - 88
            - 85
    approximationNotes: >-
      所有数值均为估计。Drata 未披露 GRR、NRR 或队列数据。由于公司死亡率、预算约束和 Vanta 竞争压力， 初创队列留存估计较低。由于 Trust Center 部署、审计师集成和多产品切换成本，企业队列留存估计较高。
      这些数字在任何数据室尽调流程中都应替换为实际披露指标。
  - id: FR001
    title: 风险热力图——可能性 vs. 影响
    type: matrix
    layout: wide
    summary: 按严重程度排序，把 Drata 主要风险放入 3×3 可能性-影响矩阵。最高严重度簇（中等可能性、高影响）包括平台安全事件、 GDPR/DORA 执法以及 EU AI Act 合规缺口。
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
      rows:
        - label: 高可能性
          values:
            - null
            - 集成 API 失效（250+ 连接器）；FedRAMP 授权延迟
            - 审计窗口期云服务中断；初创客户流失（VC 下行）
        - label: 中等可能性
          values:
            - CCPA/CPRA 合规缺口
            - LLM 提供商依赖；SafeBase 集成债；正常运行时间 SLA 缺口；GTM 执行风险；人才流失
            - 平台安全事件；GDPR/DORA 执法；EU AI Act 合规缺口；融资不透明
        - label: 低可能性
          values:
            - null
            - SafeBase 客户流失；CEO 离任
            - IP/专利主张；客户数据责任诉讼；审计师渠道倒戈
    claimRefs:
      - CR001
      - CR011
      - CR018
      - CR031
  - id: FR002
    title: 风险传导图——风险如何传导至收入和估值
    type: dag
    layout: wide
    summary: 有向图展示 Drata 的主要风险类别如何经由客户信任、收入和利润率传导，最终压缩融资和退出估值。
    data:
      nodes:
        - id: r-breach
          label: 平台安全事件
          detail: 恶意方访问客户审计证据；对信任主张的破坏最直接
        - id: r-cloud
          label: 云服务商中断
          detail: AWS/GCP 在活跃审计窗口期中断；证据不可用
        - id: r-regulatory
          label: 监管执法
          detail: GDPR 罚款、DORA 不合规、EU AI Act 执法行动
        - id: r-funding
          label: 融资不透明 / 估值下调轮
          detail: 未披露估值、2025 年结构化融资、资本约束信号
        - id: r-churn
          label: 初创客户流失
          detail: VC 融资收缩减少 SMB 成立；现有初创客户续约意愿下降
        - id: r-talent
          label: 人才流失 / CEO 风险
          detail: 关键人依赖；2024 年 9 月裁员后 GTM 团队流失
        - id: i-trust
          label: 客户信任流失
          detail: 市场不再信任 Drata 的合规权威；审计合作伙伴产生担忧
        - id: i-auditor
          label: 审计渠道受冲击
          detail: 审计事务所降低对 Drata 证据的依赖；审计来源管线丢单
        - id: i-revenue
          label: 收入流失
          detail: 即时流失、续约失败或新客户放缓
        - id: i-margin
          label: 利润率承压
          detail: 支持、合规或整改成本上升，挤压单位经济模型
        - id: i-valuation
          label: 估值 / 融资受冲击
          detail: ARR 倍数压缩；下一轮定价低于 Series C 的 $2B 估值
      edges:
        - from: r-breach
          to: i-trust
          label: 信任被摧毁
          critical: true
        - from: r-breach
          to: i-revenue
          label: 即时流失
          critical: true
        - from: r-cloud
          to: i-trust
          label: 审计中断
        - from: r-cloud
          to: i-auditor
          label: 证据不可用
        - from: r-regulatory
          to: i-margin
          label: 合规整改成本
        - from: r-regulatory
          to: i-trust
          label: 声誉信号
        - from: r-funding
          to: i-margin
          label: 资本成本上升
        - from: r-churn
          to: i-revenue
          label: ARR 收缩
          critical: true
        - from: r-talent
          to: i-revenue
          label: GTM 表现不及预期
        - from: i-trust
          to: i-auditor
          label: 审计师信心流失
        - from: i-trust
          to: i-revenue
          label: 流失级联
        - from: i-auditor
          to: i-revenue
          label: 管线流失
        - from: i-revenue
          to: i-valuation
          label: ARR 倍数压缩
          critical: true
        - from: i-margin
          to: i-valuation
          label: 盈利延后
    claimRefs:
      - CR011
      - CR012
      - CR018
      - CR025
      - CR031
  - id: FR003
    title: 依赖关系图——Drata 平台交付的关键输入
    type: dag
    layout: wide
    summary: 有向图梳理 Drata 的关键外部依赖——云主机、AI 供应商、集成、监管机构、审计网络和资本提供方——并展示各方如何连接核心平台与客户交付。
    data:
      nodes:
        - id: d-aws
          label: AWS（主要主机）
          detail: Drata SaaS 的主要计算、存储和网络；GuardDuty 异常检测
        - id: d-gcp
          label: GCP（备用主机）
          detail: 备用云主机；Google Security Center；用于搭建的 GCP Terraform IaC
        - id: d-llm
          label: LLM 供应商（未披露）
          detail: 支撑 AI 问卷辅助和智能体 TPRM；供应商身份未公开
        - id: d-integrations
          label: 250+ 第三方 API
          detail: Okta、GitHub、AWS、Azure、Jira、Salesforce、CrowdStrike、Datadog 以及另外 243+ 个
        - id: d-auditors
          label: 审计师网络（1,300+ 家事务所）
          detail: 接受 Drata 培训的认证审计事务所；执行 SOC 2 / ISO / HIPAA 审计
        - id: d-safebase
          label: SafeBase（2025 年 2 月收购）
          detail: Trust Center 产品来源；旧 SafeBase 基础设施正迁入 Drata 核心
        - id: d-iconiq
          label: ICONIQ Growth（领投方）
          detail: Series B 领投方；董事会席位；影响治理和退出策略
        - id: d-fedramp
          label: FedRAMP PMO
          detail: 美国政府授权机构；已获得 FedRAMP Ready；完整 ATO 仍待完成
        - id: d-drata
          label: Drata 平台
          detail: 核心 SaaS：合规自动化、IRM、Trust Center、治理、鉴证、AI
        - id: d-customers
          label: 8,000+ 家客户
          detail: 终端用户：覆盖 SMB、中端市场和大型企业的合规与安全团队
      edges:
        - from: d-aws
          to: d-drata
          label: 主要托管
          critical: true
        - from: d-gcp
          to: d-drata
          label: 备用托管 + CSPM
          critical: true
        - from: d-llm
          to: d-drata
          label: AI 能力
          critical: true
        - from: d-integrations
          to: d-drata
          label: 证据接入
          critical: true
        - from: d-auditors
          to: d-drata
          label: 审计认证渠道
        - from: d-safebase
          to: d-drata
          label: Trust Center 模块
        - from: d-iconiq
          to: d-drata
          label: 资本 + 治理
        - from: d-fedramp
          to: d-drata
          label: 联邦授权关口
        - from: d-drata
          to: d-customers
          label: SaaS 交付
          critical: true
    claimRefs:
      - CR011
      - CR013
      - CR014
      - CR018
      - CR019
      - CR020
  - id: FV001
    title: 推荐逻辑流
    type: flow
    layout: wide
    summary: >-
      推荐逻辑从四个证据支柱出发——市场地位、产品护城河、财务规模和财务不透明——先进入估值语境节点，综合可比公司和情景分析，再收敛到有条件放弃建议。竞争风险作为并行反向信号进入，直接修正建议，而不经过估值语境。结论不是二元的投或不投，而是要求先拿到数据室访问权后再判断的有条件放弃。
    data:
      nodes:
        - id: market-position
          label: 品类领先
          detail: 合规自动化第 1-2 名；8,000+ 家客户；GRC+A 品牌重塑
        - id: product-moat
          label: 集成护城河
          detail: 250+ 个连接器；1,300+ 家审计合作伙伴；SafeBase 信任管理
        - id: financial-scale
          label: 融资与规模
          detail: 累计融资 $303M+；2025 轮约 $127M；1,000 名员工；全球布局
        - id: financial-opacity
          label: 财务不透明
          detail: 未披露 ARR / NRR / 利润率；$2B 估值自 2022 年 11 月起已陈旧
        - id: competitive-risk
          label: 竞争风险
          detail: Vanta 接近同等水平；SaaS 倍数 2022-2026 年压缩；Vanta 约 $1.6B
        - id: valuation-context
          label: 估值语境
          detail: 基准 $1.5-2.5B；乐观 $3-5B；悲观 $0.5-1B；只有确认 ARR 后，$2B 才站得住
        - id: recommendation
          label: 有条件放弃
          detail: 必须进入数据室；若 ARR ≥$120M、NRR ≥110% 未确认，不应按 $2B 投资
      edges:
        - from: market-position
          to: valuation-context
          label: 支撑 $1.5B+ 底部
        - from: product-moat
          to: valuation-context
          label: 相对同业溢价
        - from: financial-scale
          to: valuation-context
          label: 验证投资级质量
        - from: financial-opacity
          to: recommendation
          label: 不确定性构成阻断
        - from: competitive-risk
          to: recommendation
          label: 下行压力
        - from: valuation-context
          to: recommendation
          label: 入场纪律必需
    claimRefs:
      - CV001
      - CV011
      - CV021
      - CV022
      - CV023
      - CV024
      - CV026
  - id: FV002
    title: 估值敏感性——ARR 情景与倍数
    type: bar
    layout: wide
    summary: >-
      柱状图展示 Drata 在三个 ARR 情景（$80M、$150M、$250M）和三个倍数档位（10x、15x、20x ARR）下的隐含估值。基准情景组（$150M ARR、10-15x 倍数）给出
      $1.5-2.25B，与已陈旧的 $2B 参考价高端大体一致。乐观情景组（$250M ARR、15-20x）给出 $3.75-5.0B，需要 ARR 超预期，也需要倍数重估。悲观情景（$80M ARR、10x）仅隐含
      $800M，较 $2B 参考价折价 60%，凸显未披露财务表现不及预期带来的估值风险。
    data:
      items:
        - label: ARR $80M × 10x（估值情景）
          value: 0.8
          unit: $B
        - label: ARR $80M × 20x（估值情景）
          value: 1.6
          unit: $B
        - label: ARR $150M × 10x（估值情景）
          value: 1.5
          unit: $B
        - label: ARR $150M × 15x（估值情景）
          value: 2.25
          unit: $B
        - label: ARR $150M × 20x（估值情景）
          value: 3
          unit: $B
        - label: ARR $250M × 10x（估值情景）
          value: 2.5
          unit: $B
        - label: ARR $250M × 15x（估值情景）
          value: 3.75
          unit: $B
        - label: ARR $250M × 20x（估值情景）
          value: 5
          unit: $B
      xAxis: 情景（ARR × 倍数）
      yAxis: 隐含估值（$B）
    claimRefs:
      - CV016
      - CV017
      - CV019
      - CV021
      - CV022
      - CV023
  - id: FV003
    title: 估值或回报区间——悲观 / 基准 / 乐观
    type: range
    layout: standard
    summary: >-
      区间图展示每个情景的估值低点、中位和高点。基准情景区间（$1.5-2.5B）包住已陈旧的 $2B 参考价，说明 Drata 的最近已知估值仍能自圆其说，但落在最可能区间的上半段。乐观情景（$3.0-5.0B）需要 ARR
      ≥$200M、NRR 强劲且倍数扩张。悲观情景（$0.5-1.0B）意味着较 $2B 下调 50-75%，会让 Series C 投资者承受显著减值。悲观与乐观情景相差 $4.5B，反映 Drata
      财务不透明带来的根本不确定性。
    data:
      items:
        - label: 悲观情景
          low: 0.5
          mid: 0.75
          high: 1
          unit: $B
        - label: 基准情景
          low: 1.5
          mid: 2
          high: 2.5
          unit: $B
        - label: 乐观情景
          low: 3
          mid: 4
          high: 5
          unit: $B
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV025
  - id: FV004
    title: 投资 KPI——IC 评分卡
    type: kpi
    layout: standard
    summary: >-
      IC 评分卡把关键投资维度汇总到一页仪表盘，供投资委员会展示使用。市场地位、客户规模和集成深度得分较强。ARR 区间、NRR 和毛利率未知或仅为估计，压低整体确信度。最后已知 $2B 估值在 2026
      年倍数环境下被评为合理偏高。整体 IC 得分 6/10：投资逻辑强，但财务不透明卡住确信度。
    data:
      items:
        - label: 市场地位
          value: '#1-2'
          unit: of ~20 peers
          trend: stable
          detail: 在合规自动化领域与 Vanta 共同领先；8,000+ 家客户
        - label: 客户数
          value: 8,000+
          unit: logos
          trend: up
          detail: 公司披露口径；验证 Series C 阶段的市场渗透
        - label: ARR 估计
          value: $80M-$250M
          unit: range
          trend: unknown
          detail: 因未正式披露，区间较宽；最可能约 $100-150M
        - label: 最近已知估值
          value: 2
          unit: $B
          trend: stable
          detail: 2022 年 11 月 Series C；已陈旧；重置环境下公允价值可能已漂移
        - label: 累计融资
          value: $303M+
          unit: total
          trend: up
          detail: 从种子轮到 2025 年未披露融资轮（据 SEC Form D 约 $127M）
        - label: NRR 估计
          value: 110-130%
          unit: est.
          trend: unknown
          detail: 基于 SaaS 基准推断；未正式披露；尽调关键问题
        - label: 集成深度
          value: 250+
          unit: connectors
          trend: up
          detail: 护城河强；1,300+ 家认证审计合作伙伴增加分发杠杆
        - label: 整体 IC 得分
          value: 6/10
          unit: ''
          trend: unknown
          detail: 投资逻辑强；财务不透明限制确信度；有条件放弃
    claimRefs:
      - CV001
      - CV004
      - CV005
      - CV009
      - CV011
      - CV019
      - CV020
      - CV026
      - CV035
