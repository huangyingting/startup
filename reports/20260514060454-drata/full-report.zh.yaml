      - number: '7.3'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Drata 的伙伴依赖图有几个集中点，已经结构性嵌入，短期内很难缓解。云基础设施最关键：AWS 是主托管方，GCP 是备托管方。双云能显著降低单一供应商宕机风险，但 Drata
              无法在不经历多年迁移的情况下更换云服务商，且两家供应商都能单方面改变定价和条款。以 Drata 的规模（融资 $300M+、1,000 名员工）来看，其对 AWS 和 GCP 的议价能力有限。

              审计师伙伴网络——1,300+ 家接受 Drata 培训的认证公司——既是强竞争护城河，也是集中度风险。护城河来自已建立 Drata 专属工作流的审计公司，切换成本高。风险在于，如果一家或多家 Tier-1
              审计公司（Big 4 或大型区域性公司）因质量、安全或合规担忧而拒绝 Drata 收集的证据，将结构性损害 Drata 履行核心产品承诺的能力。考虑到伙伴关系深度，这一风险发生概率低；但一旦触发，后果灾难性。

              SafeBase 收购（February 2025 宣布，约 $250M）带来集成风险。部分 SafeBase 客户仍在遗留基础设施上；把他们迁移到 Drata 核心平台，同时保持 SafeBase
              专属功能的产品一致性，是一个需要多个季度完成的工程挑战。SafeBase 收购带来的流失——不愿迁移的客户流失——尚未量化。

              ICONIQ Growth 作为 lead investor 带来治理集中度。ICONIQ 领投 Series B（$100M，2021），并被列为主要董事会级投资者。尽管 2025 轮共有 77
              位投资者，资本来源有所分散，董事会构成和治理决策仍可能受 ICONIQ 的基金回报时间表和 portfolio strategy 影响。以对普通股东不利的估值被迫出售或压缩退出，是值得尽调的情景。

              创业公司客户集中度是系统性宏观风险，而非单一伙伴风险。Drata 核心客户群是寻求 SOC 2 认证的 Series A–D 技术创业公司。风险资本部署若长期收缩，会减少新的合格 Drata
              客户形成率，并压迫现有客户续约。在 2022–2023 VC 回撤期间，合规自动化供应商普遍看到新客户 logo 增长放慢；若再次出现长时间收缩，将压缩 Drata 的收入轨迹。
