  - id: FE001
    title: Drata 产品架构图
    type: stack
    layout: wide
    summary: |
      Drata Agentic Trust Management Platform 的分层架构，展示 AI 与智能体层、应用层、集成层和云基础设施层。
    data:
      layers:
        - id: layer-ai
          label: AI 与智能体层
          detail: LLM 驱动的问卷自动化和智能体 TPRM；Drata MCP 支持 AI 智能体交互；位于应用层之上，并调用核心模块
          sublayers:
            - id: ai-questionnaire
              label: AI Questionnaire Assistance
              detail: LLM-powered automated responses to vendor security questionnaires using Trust Center posture data
            - id: agentic-tprm
              label: Agentic TPRM Assessment
              detail: Launched RSA 2026; AI-driven third-party risk scoring and automated outbound vendor questionnaires
            - id: drata-mcp
              label: Drata MCP (Model Context Protocol)
              detail: >-
                Allows external AI agents to interact with Drata in natural language; automates compliance workflows
                programmatically
        - id: layer-application
          label: 应用层
          detail: >-
            五个核心产品模块：Continuous Compliance、IRM、Trust Center、Automated Governance 和 Accelerated
            Assurance；每个模块都有自己的买方画像和工作流，但共用同一套证据与控制数据存储
          sublayers:
            - id: app-compliance
              label: Continuous Compliance
              detail: Automated control monitoring, evidence collection, real-time compliance posture for 10+ frameworks
            - id: app-irm
              label: Integrated Risk Management
              detail: Risk register, risk assessments, treatment workflows for internal and third-party risk
            - id: app-trust-center
              label: Trust Center (SafeBase)
              detail: External-facing security posture portal; acquired ~2023; SafeBase Trust API
            - id: app-governance
              label: Automated Governance
              detail: Policy management, access reviews, task ownership, custom framework builder
            - id: app-assurance
              label: Accelerated Assurance
              detail: Auditor collaboration, evidence room, 1,300+ auditor partner network
        - id: layer-integration
          label: 集成与 API 层
          detail: 公开 REST API v2 加上 250+ 个预构建连接器，覆盖云、身份、SIEM 和 ITSM 工具；本地部署系统可用自定义连接构建器； 作为自动化证据收集的摄取层
          sublayers:
            - id: int-rest-api
              label: Public REST API v2
              detail: Core programmatic interface; OAuth and webhook support; expanded endpoints and smarter data structures
            - id: int-connectors
              label: 250+ Pre-built Connectors
              detail: >-
                AWS, GCP, Azure, GitHub, GitLab, Okta, Jira, ServiceNow, Rippling, Datadog, CrowdStrike, SentinelOne,
                and 240+ more
            - id: int-custom
              label: Custom Connections & Workflows
              detail: Build bespoke integrations for on-premise tools; custom triggers and actions for compliance automation
        - id: layer-infra
          label: 云基础设施层
          detail: 主要托管在 AWS，GCP 作为备用；零信任网络架构；WAF 位于 CDN 边缘；所有数据静态和传输中加密；WebAuthn MFA；CSPM 监控
          sublayers:
            - id: infra-aws
              label: Amazon Web Services (AWS)
              detail: Primary cloud host; GuardDuty for anomaly detection; CloudFormation IaC setup
            - id: infra-gcp
              label: Google Cloud Platform (GCP)
              detail: Secondary cloud host; Google Security Center; Terraform IaC setup
            - id: infra-security
              label: Zero Trust / WAF / Encryption
              detail: Zero Trust network architecture; WAF at CDN; data encrypted at rest and in transit; WebAuthn MFA; CSPM
    claimRefs:
      - CE011
      - CE012
      - CE014
      - CE015
      - CE016
      - CE017
      - CE018
  - id: FE002
    title: 客户合规工作流——从入门到持续合规
    type: flow
    layout: wide
    summary: |
      端到端工作流，展示 Drata 客户如何从初始账户设置推进到持续合规监控和审计认证。
    data:
      nodes:
        - id: n1
          label: 账户设置
          detail: 创建工作区；配置 SSO；邀请团队成员；分配控制负责人
        - id: n2
          label: 连接集成
          detail: 连接 250+ 个工具（AWS、GitHub、Okta、Jira、HR 系统）；Drata 持续自动拉取证据
        - id: n3
          label: 选择框架
          detail: 选择 SOC 2、ISO 27001、HIPAA、PCI DSS、DORA 或自定义框架；控制项会从已连接工具自动映射
        - id: n4
          label: 差距评估
          detail: Drata 识别未通过的控制项；把整改工单分配给负责人；实时跟踪完成情况
        - id: n5
          label: 政策与培训
          detail: Drata Agent 监控设备合规；人员完成安全培训；政策以数字方式签署并留痕
        - id: n6
          label: 自动化证据收集
          detail: 从所有集成持续拉取；证据映射到控制项；支持的数据源无需手动上传
        - id: n7
          label: 实时合规仪表盘
          detail: 实时控制健康视图；测试失败时告警；带工单集成的整改工作流
        - id: n8
          label: 审计准备 / 证据室
          detail: 向审计师开放证据室访问；1,300+ 个审计师合作伙伴已接受 Drata 培训；AI 问卷答复用于尽调
        - id: n9
          label: 认证
          detail: SOC 2 Type II、ISO 27001 或其他证明签发；发布到 Trust Center
        - id: n10
          label: 持续监控
          detail: 持续自动化证据收集；新增失败时告警；多框架控制复用；更新 Trust Center
