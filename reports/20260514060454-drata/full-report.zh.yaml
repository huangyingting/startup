      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              Drata 最危险的单一运营风险，是自身平台发生重大安全事件。Drata 的全部价值主张都建立在一个前提上：它是受信任第三方，代表 8,000+
              客户持有敏感合规证据——访问日志、员工记录、安全配置、审计材料。一旦被攻破，对其核心产品叙事的伤害，会比普通 SaaS
              供应商发生泄露更严重。客户不仅会面对证据直接暴露，还会承受其合规计划运行在已被攻破平台上的声誉损害。Drata 通过强控制环境缓解该风险：Zero Trust 架构、WebAuthn 抗钓鱼 MFA、CDN 层
              WAF、应用和网络层 DDoS 缓解、用于异常检测的 AWS GuardDuty 和 Google Security Center、CSPM 部署、IaC 漏洞扫描、凭证检查、OWASP Top 10
              培训。公司自身平台持有 SOC 2 Type II 和 ISO 27001 认证。但没有任何平台不可攻破，Drata 在安全页面也承认这一点，并以 Vulnerability Disclosure Program
              作为安全成熟度的公开信号。

              云基础设施依赖是第二大影响型运营风险。Drata 托管在 AWS（主）和 GCP（备）上，并用 Infrastructure as Code 实现快速故障切换。若客户处于活跃 SOC 2 审计窗口时，AWS
              发生长时间多区域宕机——或两个云厂商同时退化——证据收集和实时控制监控会中断，直接造成审计延迟。公开来源没有显示 Drata 发布平台 uptime SLA，这是企业采购中的重要缺口，也是关键尽调问题。

              250+ 集成生态带来长期偏高的运营风险面。主要伙伴（Okta、GitHub、AWS、Jira、Salesforce、CrowdStrike）任何 API
              变更、弃用或凭证轮换，都会打断所有依赖该连接器客户的证据收集。Drata 通过监控和 Custom Connections 构建器缓解，但在 250+
              连接器规模下，任意时点至少一个连接器退化的概率很高。公司把这当成持续工程维护负担，而不是离散风险事件。

              AI Questionnaire Assistance 和 Agentic TPRM 的 LLM 供应商未披露，构成新兴依赖。供应商锁定、定价变化、模型质量退化或 LLM 供应商宕机，都会直接影响 Drata
              增长最快的产品表面积。替代方案是手工完成问卷——也就是 Drata 早先已有的工作流——因此这是产品性能风险，而非业务连续性风险。
