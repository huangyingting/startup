      - number: '7.4'
        title: 人才与执行风险
        blocks:
          - type: paragraph
            body: >-
              Drata 最突出的人员风险，是对 CEO 兼 co-founder Adam Markowitz 的关键人依赖。Markowitz
              是公司公众门面、信任与合规定位的首席发言人，也是推动各个重大里程碑的高管——初始产品发布、估值 $1B 的 Series B、估值 $2B 的 Series C、SafeBase 收购，以及 RSA 2026
              Agentic Trust Management Platform 品牌重塑。他的 LinkedIn 影响力和会议露出是 Drata 品牌的一部分。公开资料没有显示继任计划或 COO 任命。

              September 2024 约 40 人裁员（当时约 450 人员工规模的 9%，此前 2023 起员工数增长 52%）从两个方面引入执行风险。第一，如果裁员集中在客户成功或支持团队，2025 和 2026
              队列的续约率可能受损——公开数据看不到这一点。第二，裁员会制造文化不确定性，可能加速高绩效员工自愿流失，而这些人也可以选择 Vanta、Secureframe、OneTrust 或企业 GRC 公司。

              从 SMB-first go-to-market 转向企业级，是最复杂的执行挑战。SMB 合规自动化是快速、交易型、产品驱动的动作。企业 GRC 则是咨询式、多利益相关方、多年合同谈判，合规、法律、采购和
              InfoSec 团队都会参与。两种动作需要不同销售团队技能、不同客户成功结构、不同产品包装和不同定价架构。Drata 通过 Series C 后的企业销售建设和 SafeBase Trust Center
              加入来投入转型，但相较 8,000+ SMB 基础，其大型企业账户记录仍然偏薄。

              Agentic TPRM 产品——RSA 2026 早期 GA 推出——引入新的失败模式：AI
              驱动的合规建议如果错误（幻觉）、延迟或不一致，可能让客户暴露于真实审计风险。传统合规自动化中，证据是确定性的（一个控制项根据系统数据要么通过要么失败）；智能体功能则把概率性输出带入确定性合规流程。考虑到
              Drata 将自己定位为受信任的合规权威，一次高曝光 AI 治理失败造成的声誉伤害会不成比例地大。
