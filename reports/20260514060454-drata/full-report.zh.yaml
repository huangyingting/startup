      - number: '1.2'
        title: 融资历史与投资者格局
        blocks:
          - type: paragraph
            body: >
              2020 年至 2025 年间，Drata 完成了四轮已披露融资，并另有一轮金额未披露的第五轮融资。种子轮约 $3.24M， 由 18 名投资者出资，首次销售日期为 2020 年 11 月 6 日，文件于
              2021 年 1 月提交。2021 年 11 月， ICONIQ Growth 领投 $100M Series B，Alkeon Capital 和 Salesforce Ventures 参与，公司估值约
              $1B—— 也让 Drata 成为最快达到独角兽地位的 SaaS 公司之一，距发布仅 10 个月。2022 年 11 月，Drata 又以 $2B 估值完成 $200M Series C，参与投资者 21
              名，仍由 ICONIQ Growth 领投。由此，公开披露融资总额至少为 $303.24M。

              2025 年 3 月 7 日，公司向 SEC 提交第五份 Form D，披露首次销售日期为 2025 年 2 月 20 日、投资者 77 名，
              但公开文件未披露发行金额。该文件确认投资者兴趣仍在，但本轮估值和金额仍属私有信息。因此，包含 2025 年融资轮在内的 累计融资额在公开层面未知。

              声誉较高的投资者包括 ICONIQ Growth（为超高净值人群管理资本，并曾投资 Figma、Snowflake、Zoom 等公司）、 Salesforce Ventures（与 GRC
              生态相关的企业战略投资者）和 Okta Ventures（与身份和访问管理具备战略协同）。 投资者组合同时覆盖成长股权资本（ICONIQ）、企业 SaaS
              战略方（Salesforce、Okta）和早期阶段专家（Cowboy Ventures、 SV Angel）。
