      - number: '3.4'
        title: 切换成本、护城河耐久性与分销力
        blocks:
          - type: paragraph
            body: >
              Drata 的切换成本来自三个互锁机制。第一，技术集成锁定：客户把 50–200+ 云工具接入 Drata 的证据收集层。把这些集成重新连接到竞争平台，
              需要工程投入、配置返工，并会在任何合规审计周期中带来运营扰动。客户集成越深，实际切换成本越高。Vanta 也沿同一维度竞争，拥有 400+ 集成，使集成层面的切换摩擦大体相当。第二，审计师关系锁定：Drata
              拥有超过 1,300 个渠道和审计师伙伴。熟悉客户 Drata 证据工作区的审计师， 不愿在审计中途或关系中期切换到新平台。每完成一个审计周期，网络效应都会递增。第三，数据和证据历史：五年以上合规证据沉淀在
              Drata 平台上， 形成运营连续性价值；迁移到竞争对手意味着重新收集证据，或同时维护双系统。

              Drata 收购 SafeBase 后，把平台价值面延伸到买方售前和采购工作流；SafeBase 原本构建的是信任中心和供应商安全问卷自动化市场。 使用 Drata
              信任中心的公司会把面向客户的合规文档托管在那里，这给切换成本栈增加了一层 GTM 依赖。

              与在位者相比，Drata 的分销力没有那么突出。ServiceNow 和 IBM 可以通过既有企业关系销售 GRC 模块，无需单独销售周期。 Drata 和 Vanta 依靠产品驱动增长（PLG）和面向
              CISO/CTO 的外呼销售——对 SMB / 中端市场有效，但进入企业级仍需额外投入。 Drata 的 1,300+
              伙伴网络通过渠道分销部分抵消这一劣势，但在大型账户中，在位者仍拥有结构性分销优势。多平台并用风险中等： 部分企业用 Drata 做 SOC 2，同时用 ServiceNow GRC 做全企业运营风险管理，这意味着
              Drata 在大型组织中可能占据更窄的集成范围， 而不是替代在位平台。
