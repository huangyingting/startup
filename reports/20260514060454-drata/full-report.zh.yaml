      - number: '5.5'
        title: 路线图、产品成熟度与开发轨迹
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Drata 的产品开发轨迹分为三波。第一波（2021–2023）以 SOC 2 自动化、ISO 27001、HIPAA
              和早期集成生态为核心，确立合规自动化主产品。第二波（2023–2025）加入企业级能力：IRM、自定义框架、FedRAMP 支持、通过 SafeBase 收购获得的 Trust Center、AI
              问卷辅助、DORA、NIS2 和 CMMC。第三波（2026 onwards）由智能体 AI 定义：March 2026 在 RSA 推出的 Agentic TPRM Assessment 是旗舰新能力；New
              Drata Experience（基于新设计系统和技术栈、用十二个月重做的完整 UX）处于 opt-in beta，并正在扩大推出；Drata MCP 让 AI agent 通过自然语言与平台交互；ISO
              42001（AI 治理）让 Drata 能服务必须遵守 AI 特定监管框架的客户。工程博客（VPE Data，May 2026）描述了从「prompt engineering」转向「harness
              engineering」，说明 AI 实施正从实验走向生产级加固。May 2026 产品更新（AWS/GCP/Azure 连接范围限定）反映出核心合规自动化仍在持续渐进投入。关键产品不确定性包括：驱动 AI
              功能的 LLM 供应商未披露（模型风险）、Agentic TPRM 的具体准确率指标未公布，以及已宣布功能之外的完整 2026 路线图不公开。
