  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Drata 位于治理、风险与合规（GRC）软件和云原生安全自动化的交汇处。GRC 软件品类通常包括治理框架、风险管理工具、 合规工作流软件、审计管理平台和监管报告套件。不过，Drata
              的核心产品——面向云原生组织的持续合规自动化——是一个独立子细分市场， 特征是 API 优先集成、自动化证据收集、持续监控和按框架定制的就绪度评分。该子细分市场位于更广义的 GRC 市场之内，
              但不包括传统企业风险管理（ERM）平台、非软件类 GRC 专业服务与咨询、一次性审计项目，以及大型金融机构部署的传统本地 GRC 工具。

              Drata 正在积极扩张的相邻支出类别包括第三方风险管理（TPRM）、信任中心和供应商安全问卷自动化、以及集成风险管理（IRM）。
              合规自动化的现状替代方案通常是手工维护的电子表格式证据追踪，由安全工程师或合规分析师在没有专用工具的情况下管理。 替代方案还包括聘请咨询公司定期做 SOC 2
              就绪评估，以及支付审计师费用做一次性合规审查，而不是维护持续项目。 推动需求的主要合规框架包括 SOC 2（AICPA 服务组织控制标准）、ISO/IEC 27001（ISO 的 ISMS 标准）、HIPAA、
              PCI DSS、GDPR、CMMC、DORA、NIS2，以及新兴的 ISO 42001 AI 管理标准。每个框架都有自己的认证机构、审计流程和证据要求； 但共同需求都是持续控制监控和有序证据管理。
