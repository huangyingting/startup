      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              GRC 市场规模估计因分析师和市场定义不同而差异巨大。MarketsAndMarkets 估计全球 GRC 市场 2024 年约 $34.3B， 并以 11.5% CAGR 增至 2029 年
              $59.1B。Grand View Research 给出的 2024 年数字更高，约 $45.4B。 Mordor Intelligence 预计 GRC 市场到 2029 年达到
              $52.6B。这些分歧反映了根本不同的范围假设：最宽口径包括 Fortune 500 银行和保险公司部署的 ERM 平台、内部审计软件和政策管理工具；较窄口径则剔除非软件咨询支出。

              对 Drata 而言，相关总可用市场（TAM）是全球云原生合规自动化细分市场。基于供应商收入信号推算，分析师估计 2024 年为
              $600M–$1.5B；这一数字无法通过任何可访问的付费墙内独立来源精确验证。可服务市场（SAM）聚焦拥有活跃云基础设施、 且为企业销售需要第三方合规认证的公司：该群体在全球可能有 50,000–200,000
              家。Drata 的可获取市场（SOM） 则集中在北美和西欧的 Series A–D 科技公司，这些公司未来 12 个月内需要 SOC 2 或 ISO 27001 认证。 Vanta 的 16,000+
              客户、Secureframe 的 6,000+ 客户，加上 Drata 自身 8,000+ 客户，意味着前三大供应商合计渗透约 30,000 个账户；把 SMB
              和中端市场纳入后，可服务企业总数应在数十万级。相互矛盾的估计被有意保留：同一市场的分析师 TAM 口径从 $34B 到 $52B 差距很大，反映方法不兼容，应视为一个已知尽调缺口。
