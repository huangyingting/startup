  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础、分层与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Drata 报告截至 May 2026 拥有 8,000+ 全球客户，是合规自动化类别中客户基础最大的公司之一。这个数字对应一条快速增长轨迹：公司在 January 2021 结束 stealth 状态并发布；到
              November 2021，已有「数百家客户」，包括 Abnormal Security、FullStory、Amplitude 和 Netlify；到 February 2025，客户数已超过 7,000；整个
              2024 年，每季度约新增 650 家客户。About 页面确认已创建 3,000+ 个 Trust Center，每天处理 15.7 million 条证据，说明平台处于活跃生产使用，而不是买了闲置。


              主要买方是 Series A–D SaaS 或技术公司的安全、GRC 或 IT 合规负责人，他们需要 SOC 2 Type II
              认证来打开企业销售。这类公司通常总部在美国、增长快、缺少人手做手工合规。第二类客户是中端市场技术公司（$10M–$200M ARR），它们已经完成初始 SOC 2，希望在不增加员工的情况下加入 ISO
              27001、HIPAA 或其他框架。正在浮现的企业级客户群（post-Series C 扩张公司和上市公司）可在 February 2025 TechCrunch 披露中看到，当时列出的客户包括 Notion 和
              Tenable。SafeBase 收购带来 1,000+ 客户，其中不少来自更大型组织——SafeBase 披露过的具名客户包括 LinkedIn、Palantir 和 CrowdStrike。


              地理分布偏向美国，这与 Drata 的 San Diego/San Francisco 总部，以及 SOC 2 作为美国起源框架的主导地位一致。London 和 Sydney 办公室，以及
              drata.com/customers 页面展示的多地区客户，证明其具备国际存在。垂直行业最集中在 fintech、healthtech、HR tech、cybersecurity 和
              infrastructure SaaS——这些行业的合规状态会直接影响企业销售。Drata 的 1,300+ alliance
              partners（审计师、渠道伙伴、技术伙伴）是一支重要分销力量，尤其服务通过审计师关系发现 Drata 的创业公司群体。
