  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - ARR 假设
      - 估值倍数
      - 隐含估值
      - 概率信号
      - 关键风险
    rows:
      - - 乐观
        - $200M+ ARR；40%+ YoY 增长；NRR ≥125%；GRC+A 平台赢下企业账户；SafeBase 到 2026 年中完全整合
        - 15-20x ARR
        - $3.0B – $5.0B
        - 20-25% — 需要 ARR、NRR 和企业客户组合同时超预期。若 2025 轮是 ≥$2.5B 估值上行轮，且企业 ACV 在增长，则可获得支撑。
        - IPO 窗口关闭或市场环境恶化；Vanta 达到企业级能力对等并披露更优 NRR；AI 合规功能产生监管责任
      - - 基准
        - $120M–$150M ARR；25-35% YoY 增长；NRR 110-120%；SMB 核心留住；中端市场扩张推进；SafeBase 集成完成 50-75%
        - 10-15x ARR
        - $1.5B – $2.5B
        - 50-55% — 当前 $2B 估值在该区间高端仍可辩护。最符合可观察信号：8,000+ 客户、累计融资 $303M、2025 年 2 月「接近 $100M ARR」的公开表述，以及合规自动化同业倍数。
        - NRR 因 SMB 流失降至 110% 以下；企业 GTM 执行风险；SaaS 倍数进一步压缩至 8x ARR 底部；IPO 推迟至 2029 年以后
      - - 悲观
        - ARR <$80M；同比增长 <20%；NRR <110% 或下行；Vanta 抢走市场份额；SafeBase 集成延迟或造成流失；2025 年融资为降估值轮
