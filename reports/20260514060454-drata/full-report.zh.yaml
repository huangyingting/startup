      - number: '8.3'
        title: 退出准备度与尽调问题
        blocks:
          - type: paragraph
            body: >-
              Drata 最可能的退出路径，是 2027-2029 年 IPO，或被大型企业平台战略收购（ServiceNow、Salesforce、IBM、 Thales、CrowdStrike，或按 Hg Capital
              收购 AuditBoard 剧本出手的 PE 机构）。IPO 路径需要披露收入， 讲清盈利能力叙事，并给出符合 Rule of 40 的清晰路径（收入增长率 % + FCF margin % ≥ 40）。若
              ARR 为 $150M、增长 30%，Drata 在强毛利率（估计 70-85%）和受控烧钱下，可能接近 Rule of 40 门槛。M&A 路径有行业整合模式支撑（AuditBoard/Hg
              Capital、OneTrust 延后 IPO 引发战略对话、ServiceNow 扩张 GRC 模块），也有 Drata 的战略投资人基础（Salesforce Ventures、Okta
              Ventures）背书，显示生态匹配。

              退出准备度目前受三点约束：（1）财务不透明；如果没有显著新增披露基础设施，公司无法启动公开 S-1 流程， 也难以搭建可信的 M&A 数据室；（2）2025 年一轮有 77
              位投资人，任何需要多数批准的退出都会面临复杂股东协调； （3）SafeBase 集成必须实质完成，收购方才会认可完整平台价值。1,300+ 审计师伙伴网络和 8,000+ 客户基础让 Drata
              的退出议价能力很强——任何收购方都能拿到一个嵌入式分销渠道，若自行搭建，成本会超过 $500M。

              投资逻辑破裂触发点，是投资逻辑不再成立、需要立即行动（退出或不投）的情景。包括：确认以低于 $1.5B 下轮融资、披露 NRR 低于 100%、客户数低于 6,000（净流失信号）、Vanta 以 $3B+
              融资（验证 Vanta 是市场份额赢家）、 出现有记录的平台安全事件、到 2026 年底仍未披露财务，或以低于 $1B 被并购退出（验证悲观情景经济性）。 任一触发点都足以推翻基准情景投资逻辑。
