      - number: '4.2'
        title: 单位经济、GTM 动作与销售效率代理指标
        blocks:
          - type: paragraph
            body: >
              Drata 的 go-to-market 动作结合了产品驱动增长信号和直销主导模式。公司的合规自动化产品历来吸引来自创业公司和成长期科技公司的入站需求； 这些公司把 SOC 2
              认证视为企业销售周期的前置条件。买方带着紧迫合规期限主动找上 Drata，形成自然入站漏斗，相比典型外呼企业 SaaS 模式， 销售周期被压缩。Drata 的 Series C
              博客和招聘页面都强调销售与收入扩张团队，显示其采用混合 PLG + 销售辅助模式，与 $15,000–$100,000 ACV 区间相符。

              公开来源没有披露 CAC、LTV、NRR 或回本周期数据。代理估计来自 SaaS 合规品类基准和可比公司披露。对 SMB 到中端市场合规 SaaS， 最佳水平 CAC 估计为每个 logo
              $5,000–$15,000；企业 logo 估计 CAC 为 $30,000–$80,000。G2 买方数据提示平均标价折扣 13%， ROI 实现时间 11 个月。CAC 回本周期估计 SMB 层级为
              12–24 个月，企业级为 18–36 个月。合规自动化 SaaS 领导者的净收入留存（NRR） 通常在 110%–130%；Drata 的 NRR 未确认，但考虑产品层级结构中可见的扩张模块（TPRM
              Pro、额外框架、Risk Management Pro、 Workspaces、Agentic TPRM Assessment），NRR 可能为正。在这些参数下，LTV/CAC 估计为 3x–8x，处于「健康
              SaaS」区间， 但在缺乏已确认 NRR 数据时谈不上异常优秀。

              人均收入基准可以粗略代理收入规模。Forbes 报道约 1,000 名员工；招聘页面报告约 600 人。按 600–1,000 名员工和合规 SaaS 每名员工 $150,000–$200,000 ARR
              的基准，隐含 ARR 为 $90M–$200M——与基准情景 $150M ARR 大体一致。这是非常粗糙的代理；实际比率高度取决于 R&D 与 GTM 人员结构。
