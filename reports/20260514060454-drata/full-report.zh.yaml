              - CE026
              - CE027
          - type: callout
            title: LLM 供应商未披露，带来模型与集中度风险
            body: >
              Drata 尚未公开披露驱动 AI Questionnaire Assistance 和 Agentic TPRM 的 LLM
              供应商。这带来三项尽调担忧：（1）如果供应商调整定价或访问条款，会产生模型依赖风险；（2）面向客户的问卷回复可能出现包含事实错误的幻觉风险；（3）如果客户安全状态数据在缺少充分合同控制的情况下传输给第三方模型供应商，会产生数据隐私风险。独立投资者或收购方应索取
              LLM 供应商合同、数据处理附录，以及 AI 生成问卷回复的错误率指标。
            calloutType: risk
            claimRefs:
              - CE019
              - CE038
          - type: callout
            title: 未发布 uptime SLA，限制企业合同谈判
            body: >
              Drata 维护公开状态页（status.drata.com），但公开文档中没有合同化 uptime SLA 或历史 uptime 百分比。自身合规计划对可用性要求严格的企业客户可能会认为这是问题。缺少公开
              SLA 可能反映成熟度缺口（创业期做法尚未更新），也可能是有意保留灵活性；但这是企业采购周期中的已知摩擦点，也是应通过直接审阅合同解决的尽调缺口。
