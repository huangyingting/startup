  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Drata 的投资逻辑建立在四个相互咬合的支柱上：（1）在一个 $34-52B、CAGR 为 11-15% 的可服务市场中处于类别领先位置，与 Vanta 并列第 #1 或 #2；（2）250+ 企业连接器和
              1,300+ 认证审计师伙伴关系构成可防守的集成护城河，并制造结构性切换成本；（3）已证明的客户规模达到 8,000+ logo，平台从点状合规方案演进为完整 GRC+A（Governance, Risk,
              Compliance, and Assurance），并通过 SafeBase 收购和 RSA 2026 Agentic Trust Management Platform 发布扩展 TAM；（4）ICONIQ
              Growth、Salesforce Ventures、Alkeon Capital 以及 2025 轮 77 位投资者的强融资背书，共同降低近期流动性风险。

              反向逻辑同样有说服力：Drata 财务极不透明，自 February 2025 声称公司「接近 $100M ARR」以来，未披露 ARR、NRR、毛利率或烧钱速度。November 2022 的 $2B
              Series C 估值已过时超过三年，并且发生在 SaaS 倍数显著压缩之前（2022 峰值为 10-30x ARR，2024-2026 常态为 6-15x ARR）。Vanta
              以更低成本结构成长到相当或更大的客户基础，SMB segment 的定价压力也在加剧。2025 轮有 77 位投资者，结构不寻常，可能是结构化票据、老股交易，或广泛 family-office
              syndicate，而不是干净的机构成长轮——每种结构对治理、稀释和退出动态都有显著不同影响。累计融资 $303M+ 带来的优先股悬顶，会约束任何低于约 $1.5B 退出中的普通股回报。

              建议是有条件放弃：对市场位置、集成护城河和长期品类相关性有高确信；在无法访问资料室的情况下，对当前估值确信度低。阻断性尽调缺口是财务透明度。收到包含 ARR、NRR、毛利率、队列留存和 2025 轮 term
              sheet 的资料室后，再重新接触。
