      - number: '2.3'
        title: 买方细分与画像
        blocks:
          - type: paragraph
            body: >
              合规自动化买方可分为五个主要细分群体，每类在预算归属、采购触发因素和产品要求上各不相同。按客户数量看，最大且增长最快的是 成长期 SaaS 公司（Series A–D，通常 $1M–$50M ARR），它们需要
              SOC 2 Type II 认证来打开企业销售对话。 在这类交易中，CISO 或 CTO 通常既是买方也是经济决策者，工程负责人承担技术集成工作量。CFO 批准预算，但优先级低于安全负责人。

              中端市场科技公司（$10M–$100M ARR）构成第二类；它们通常需要多框架支持（SOC 2 加 ISO 27001、HIPAA 或 GDPR）， 并配备专职合规官或 GRC 分析师，运行更复杂的 GRC
              项目。进入企业级（>$100M ARR）后，相关买方转向 Chief Risk Officer 和 Chief Compliance
              Officer，他们需要跨业务单元的集成风险管理，且审计轨迹要求通常超过成长期工具能提供的能力。 金融科技和医疗健康组织受垂直行业监管约束（HIPAA、PCI
              DSS、DORA），因此合规支出持续且非自由裁量。争取国防合同的政府承包商 面临 CMMC 2.0 要求，形成一个专门买方群体。所有细分市场的采用触发因素几乎都来自外部：企业潜在客户把合规认证写入供应商采购清单，
              监管机构要求新框架，或网络保险承保人把续保与认证挂钩。内部推动者是 CISO 和合规负责人，但大多数年费超过 $50K 的采购仍需 CFO 或 CEO 批准。
