  summary: >
    Drata Inc. 是一家在 Delaware 注册的安全与合规自动化公司，2020 年由 Adam Markowitz、Troy Markowitz 和 Daniel Marashlian 创立；三人此前共同创办过教育科技公司
    Portfolium。Adam Markowitz 早年曾在 NASA Space Shuttle Program 担任航空航天工程师。Drata 于 2021 年 1 月结束隐身期并公开发布，随后迅速成为合规自动化品类领导者：
