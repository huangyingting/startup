      - number: '8.2'
        title: 估值背景与情景
        blocks:
          - type: paragraph
            body: >-
              Drata 最后一次公开确认的估值，是 2022 年 11 月 Series C 轮的 $2B。当时正处在 2021-2022 年 SaaS 估值周期顶部，合规自动化公司可拿到 15-30x ARR
              倍数。2024-2026 年之后，SaaS 倍数重置，同阶段私营公司的可比估值已回到 6-15x ARR。若按中位 ARR 估计 $130-150M、增长 30%+，10-15x 倍数对应
              $1.3-2.25B；只要增长仍然强劲，大体能支撑 $2B 的 Series C 估值。反过来，如果增长已降至 20-25%（这个阶段 SMB 权重较高的公司常见），且 ARR 更接近
              $100M，合理价值区间会压缩到 $0.7-1.5B，也就是说现有 $2B 估值偏高。

              可比公司包括 Vanta（私营，2022 年估值约 $1.6B，估计 ARR $100M+）；AuditBoard（被 Hg Capital 以约 $3B 收购，出售时 ARR 约 $150-200M，对应约
              15-20x ARR）；OneTrust（2021 年峰值 $9.7B，覆盖更广的隐私和信任场景，IPO 延后意味着估值明显下修）；Workiva（NYSE: WK，公开市值约 $3-4B，收入约
              $700M，收入倍数约 4-5x——因公开市场折价和增长曲线不同而更低）； ServiceNow GRC 模块（属于约 $170B 的 ServiceNow 市值，不是独立可比标的）；以及 LogicGate
              （2021 年估计约 $500M，规模更小、范围更窄）。

              AuditBoard 约 $3B 的收购，是最直接相关的 M&A 可比案例，因为它体现了成熟 PE 买方（Hg Capital）如何用 DCF 锚定的倍数，给客户分层、框架覆盖和收入规模相近的企业合规 SaaS
              业务定价。若 Drata 已做到与 AuditBoard 可比的 ARR（$150-200M），相近的收购倍数可支撑 $2.25-3.75B 估值。下行风险在于 Drata 的 ARR 没有跟上 2022
              年估值；这种情况下，同一类收购方会按 $80-100M ARR 基数给予 10-12x ARR，对应 $800M-1.2B。

              2025 轮未披露估值，是关键背景：如果相对 $2B Series C 平轮或下轮融资，就是投资人信心走弱的重要信号； 如果按 $2.5B+
              上轮融资，则验证乐观情景路径。没有披露时，任何投资决策都必须显式计入这份不确定性。
