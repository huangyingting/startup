      - number: '1.3'
        title: 产品、规模与里程碑
        blocks:
          - type: paragraph
            body: >
              Drata 的核心产品是 Agentic Trust Management Platform，覆盖 SOC 2、ISO 27001、HIPAA、GDPR、PCI DSS、 FedRAMP、DORA、ISO
              42001 等框架下的合规、风险管理和安全保证自动化。主要产品支柱包括：Continuous Compliance（自动化控制监控与证据收集）、Integrated Risk
              Management（内部和第三方风险）、Trust Center （自助式安全保证门户，通过 SafeBase 收购获得）、AI Questionnaire Assistance，以及 Agentic TPRM
              Assessment （2026 年 3 月在 RSA Conference 发布）。平台支持基础设施、HR、工单、HRIS 和安全工具等领域的 250+ 集成。

              截至 2026 年 5 月，Drata 声称拥有 8,000+ 全球客户、1,300+ 合作伙伴，并在 G2 上获得 4.8/5.0 评分， 还入选 Best Software Products
              2026、Mid-Market Products 2026 和 Governance, Risk & Compliance Products 2026。公司列示全球员工 600 人，分布在 10+
              国家，并在五地设有实体办公室（San Francisco、New York、San Diego、 London、Sydney）；不过 Forbes 报道截至 2026 年 3 月员工约 1,000
              人，这一差异尚未由公开信息解释。 safebase.io 截至 2026 年 5 月重定向至 drata.com，证明 Drata 已完成对 Trust Center 提供商 SafeBase 的收购。
              2025–2026 年，公司推出全面的产品与品牌改版（「New Drata Experience」），把定位从单纯合规转向企业 GRC+A。
