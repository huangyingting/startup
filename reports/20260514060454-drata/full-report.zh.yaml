      - number: '3.3'
        title: 能力、定价与定位对比
        blocks:
          - type: paragraph
            body: >
              按采购标准比较合规自动化平台，可以看到核心功能高度相似，但深度、框架覆盖和市场定位存在重要差异。主要直接竞争对手——Drata、Vanta、 Secureframe 和
              Sprinto——都提供持续自动化证据收集、多框架合规和审计师协作。差异化出现在集成数量（Vanta 400+ 对 Drata 250+）、 框架广度（Sprinto 200+、Drata 100+）、政府 /
              国防专项能力（Secureframe 的 CMMC/FedRAMP Defense 产品）以及信任中心能力 （Drata 通过 SafeBase 获得，Vanta 原生提供）。各家 AI
              自动化能力都在推进，LogicGate 的「Config Newton」和 Sprinto 的 AI 治理定位正在把品类推向智能体工作流。

              所有合规自动化供应商的定价都不透明；没有供应商公开发布对中端市场或企业级层级有约束力的价格表。公开估计显示，SMB / 创业公司套餐约为 每年 $7,500 至
              $30,000，企业合同明显更高且单独谈判。Sprinto 在国际市场上积极打价格战。ServiceNow GRC 定价捆绑在企业 ServiceNow
              合同内，成本结构完全不同。缺乏透明定价会给买方制造摩擦，但也保护供应商免于直接价格比较。

              本章中的 Feature / Capability Matrix（FP002）和 Pricing / Packaging Comparison（TP003）表只是快速演变市场的一个局部快照；
              竞争对手产品能力和定价结构频繁变化，多个单元格反映的是缺乏公开披露，而非已确认没有产品。买方应在尽调中直接比较供应商并做客户背调。
