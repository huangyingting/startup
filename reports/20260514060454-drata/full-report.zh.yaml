      - number: '6.3'
        title: 留存、粘性与客户满意度
        blocks:
          - type: paragraph
            body: >-
              Drata 没有公开披露净收入留存率、总收入留存率、平均合同期限或续约率。这是私有 SaaS 公司尽调中的标准缺口，但会限制外部独立验证其收入基础耐久性的能力。最近一次 ARR 披露——「接近 $100
              million」——来自 February 2025 SafeBase 收购时的一位 PR 代表。考虑到每季度新增 650 家客户的增长节奏，以及 2024 年报告的 100% year-over-year
              收入增长，该数字已经过时，而且几乎肯定更高。


              不过，间接留存信号对一家私有公司来说异常强。G2 将 Drata 总体评分定为 4.8/5.0，并授予 Best Software Products 2026、Mid-Market Products
              2026、Governance Risk & Compliance Products 2026 和 Security Products 2026。这些 G2 荣誉意味着评论量很大，并被 Drata
              每个产品页面和首页引用。Gartner Peer Insights 页面至少显示两条评论记录：April 2026 来自保险行业 VP of Software Development 的
              5.0/5.0「正面」评论（「如果没有 Drata 这样的工具，我不知道我们怎么能完成 SOC 2 合规」），以及 August 2025 来自 healthcare Infrastructure
              Architect 的 3.0/5.0「负面」评论（「产品扎实、稳定，持续改进，但并不完美」）。这条负面 Gartner
              评论具有重要性：它代表受监管垂直行业中的独立买方确实存在不满，而标题中的「并不完美」暗示其相对医疗行业企业级要求仍有缺口。


              TrustRadius 给出方向性反向信号：截至 2026，仅基于 3 条评论，总分为 5.5/10。该分数低于平台平均水平，且样本很小，但说明部分体验更复杂的客户没有完全满意 Drata。TrustRadius
              还显示起售价为 $7,500/year，与面向创业公司群体的落地打法一致。结构性留存驱动很强：250+ 集成制造了难以迁移的证据流依赖；Trust
              Center（SafeBase）成为外部可见资产，并被客户面向外部的页面引用，替换成本高且容易被看见；审计师关系——通过 1,300+ alliance partners——意味着与 Drata 审计师伙伴完成
              SOC 2 的客户更可能续约，而不是更换工具。


              September 2024 裁员 9%（约 40 人，被表述为在 2023 至 2024 年员工数增长 52% 后追求「可持续增长」）是服务质量和客户支持能力的反向信号。G2 和 TrustRadius
              上多条中端市场合规软件评论持续提到，支持响应速度是低层级客户的关键担忧。不过，Drata 未披露裁员后的 CSAT 分数或支持解决时长，因此无法从公开来源量化其对留存的影响。
