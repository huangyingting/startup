      - number: '2.7'
        title: 展示材料
        blocks:
          - type: callout
            title: GRC 市场估计大幅分化，制造 TAM 不确定性
            body: >
              覆盖 GRC 市场的三大分析机构（MarketsAndMarkets、Grand View Research、Mordor Intelligence）针对同一年份和同一地理范围发布的估计， 最高相差
              54%。研究时三份报告均无法访问（付费墙、被屏蔽或返回 404）。这意味着 Drata 的头部 TAM 叙事无法通过主要分析师来源独立验证。 Drata
              直接服务的合规自动化子细分市场（$600M–$1.5B）完全没有公开的独立规模测算——该数字全部来自竞争推算。尽调不应把 GRC 头部数字 当作 Drata 实际可服务市场的代理。
            calloutType: risk
            claimRefs:
              - CM011
              - CM012
          - type: callout
            title: AI 治理浪潮带来新的合规自动化 TAM 扩张
            body: >
              ISO 42001（AI 管理体系）和 EU AI Act（2026 年 8 月全面适用）代表 GDPR 以来最大的新增监管合规浪潮。部署 AI 系统的公司将需要 围绕这些标准认证 AI
              治理项目，形成一个尚无成熟合规自动化剧本的新买方群体。Drata 转向 Agentic Trust Management Platform 有助于捕捉这波需求，但前提是 Drata 先于在位者建立 ISO
              42001 的认证框架覆盖和审计师关系。
            calloutType: insight
            claimRefs:
              - CM022
              - CM030
          - type: callout
            title: 核心 SOC 2 自动化工作流的商品化风险已经发生
            body: >
              Vanta、Secureframe、Hyperproof 以及其他多家获投创业公司，都提供功能集相近的 SOC 2 和 ISO 27001 自动化。随着市场成熟， 基础合规自动化套餐的平均售价已被压缩。Drata
              必须靠 AI 能力、框架广度、TPRM 相邻性和企业级信任管理维持定价，而不能只依赖核心 SOC 2 自动化。ASP 趋势证据应成为优先尽调项。
            calloutType: risk
            claimRefs:
              - CM028
              - CM031
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 直接竞争对手与市场动态
        blocks:
          - type: paragraph
            body: >
              Drata 最直接的竞争对手是 Vanta、Secureframe 和 Sprinto——它们都是云原生合规自动化 SaaS 平台，面向成长期科技公司的 CISO 和 CTO，帮助其获取 SOC 2、ISO
              27001、HIPAA 和 PCI DSS 认证。Vanta 是融资最充足的直接竞争对手： 2024 年 7 月完成 $150M Series C，投后估值 $2.45B，此前还完成过 $17M Series A
              和 2022 年 10 月 $40M 融资。 Vanta 成立于 2016 年，总部在 San Francisco，截至 2026 年初约 361 名员工，声称拥有 400+ 集成，产品套件横跨合规自动化、 持续
              GRC、TPRM、问卷自动化、风险管理、人员和访问管理、信任中心，以及 AI 驱动合规功能。Vanta 的竞争优势来自合规自动化品类的先发位置 和庞大开发者社区；不过其估值溢价（$2.45B 对 Drata 的
              $2B）也反映投资者对其规模更有信心。

              Secureframe 是规模较小但战略差异化明确的竞争对手，2020 年创立于 Denver。它在 2020 年 10 月完成 $4.5M 种子轮， 2021 年 3 月完成 $18M Series
              A，2022 年 2 月完成 $56M Series B，已披露融资总额约 $78.5M。Secureframe 截至 2026 年有 104 名员工和三个办公室，目标客群与 Drata 一样是 SMB
              到中端市场，但已投入专门的「Defense」产品线，服务 CMMC 和 FedRAMP 合规——这是 Drata 尚未用专门国防承包商产品匹配的差异化。Sprinto 是一家印度自主合规平台，2023 年融资
              $50M，自称「Autonomous Trust Platform」，支持包括 SOC 2、ISO 27001、ISO 42001、CMMC 和 FedRAMP 在内的 200+
              框架，尤其擅长国际化扩张，以及面向全球创业公司和中端买方的价格竞争型打包。

              直接竞争格局竞争激烈。主要玩家都提供持续监控、自动化证据收集和审计师协作。集成数量已经成为能力深度的重要代理指标，但也容易被营销夸大。 没有供应商公开披露流失率、NPS 或
              ACV，客观比较困难。四家供应商用相似基础产品争夺同一买方画像，定价压力仍在持续。
