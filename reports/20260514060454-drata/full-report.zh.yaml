        - 估值低于 $1.5B 的降估值轮；客户数停滞；平台安全事件；企业 GTM 失败；Vanta 在集成和价格上胜出
    notes: >-
      情景假设基于跨章节综合与可比公司基准。概率信号是定性判断，不是定量概率分布。ARR 估算来自：2025 年 2 月「接近 $100M ARR」的公开表述、$200M Series C 轮规模暗示融资时目标 ARR 约
