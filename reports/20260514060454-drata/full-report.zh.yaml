  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台概览与产品模块地图
        blocks:
          - type: paragraph
            body: >
              Drata 将自己定位为「Agentic Trust Management Platform」——这是公司在 RSA 2026 采用的说法，用来表达其范围已从合规自动化扩展到 AI 驱动的治理、风险与保证。客户以
              SaaS
              订阅方式购买平台；平台贯穿客户合规生命周期创造价值：连接现有基础设施工具，自动收集证据，将控制项映射到一个或多个框架，并维持连续、实时的合规状态仪表盘。四个具名产品支柱分别是自动化治理（政策管理、访问复核、任务归属）、集成风险管理（内部和第三方风险登记与处置）、持续合规（控制监控、证据收集、框架映射）和加速保证（安全中心、Trust
              Center、AI 问卷自动化）。每个支柱对应不同买方任务：GRC 团队用持续合规准备审计；安全和采购团队用 IRM 与 TPRM 管理供应商风险；面向销售的团队用 Trust Center 和 AI
              问卷加快交易审查。Drata 原生支持 10+ 合规框架：SOC 2 Types I and II、ISO 27001、ISO 42001（AI 治理）、HIPAA、GDPR、CCPA、PCI
              DSS、FedRAMP、DORA、NIS2、CMMC，并提供自定义框架构建器，支持定制控制映射。帮助中心的文章数量展示了产品覆盖面：平台功能 262 篇、框架信息 67 篇、连接支持 218 篇、政策指导 42
              篇、人员管理 33 篇、监控测试指导 168 篇。Trust Center 产品来自 Drata 收购 SafeBase（约
              2023），面向外部提供门户，让公司与潜在客户和现有客户分享已验证的安全状态；竞争对手随后也开始复制这一能力。
