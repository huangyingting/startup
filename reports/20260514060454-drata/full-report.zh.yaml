  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Drata 处在隐私法、信息安全标准和金融监管的交汇处——以其规模而言，监管暴露异常宽。主要监管风险来自 GDPR 处理方义务、面向欧盟金融行业客户的 DORA、适用于 Drata 自身智能体功能的 EU AI
              Act，以及美国联邦市场 FedRAMP 授权进度。

              GDPR 让 Drata 对任何欧盟客户，或任何处理欧盟个人数据的 Drata 客户，承担 Article 28 数据处理方义务。Drata 平台摄取的审计证据经常包括员工记录、访问日志和安全状态数据——这些在
              GDPR 下都可能构成个人数据。Drata 发布 Data Processing Agreement（DPA）和 legal
              hub，确认其数据处理方身份；但公开来源没有完整披露其跨大西洋数据传输所依赖的充分性机制（EU-US Data Privacy Framework 下的 Standard Contractual
              Clauses，或符合 Schrems II 的机制）。Schrems II 之后，欧盟数据保护机构对美国 SaaS 供应商的执法明显增加，使这项风险处于上升而非静止状态。

              DORA（EU Digital Operational Resilience Act）于 January 17, 2025 生效，适用于服务欧盟金融机构的 ICT 第三方服务提供商。Drata 明确将 DORA
              作为客户合规框架提供支持，但公司自身是否属于 DORA 监管下的 ICT 第三方提供商，公开资料没有确认。欧盟金融行业客户可能要求 Drata 签署符合 DORA
              的合同、提供运营韧性测试证据，并接受审计权——这些义务 Drata 尚未公开说明。

              EU AI Act 于 August 2024 生效，并在 2026 和 2027 分阶段落地义务。Drata 的 Agentic TPRM（March 2026 推出）和 AI Questionnaire
              Assistance 功能，若用于受监管金融或 HR 决策场景，可能构成高风险 AI 系统。Drata 为客户支持 ISO 42001（AI 治理），但自身 AI 功能合规状态尚未经过独立评估，也没有公开披露。

              FedRAMP 授权仍是 Drata 进入美国联邦政府市场的入口。公司已获得「FedRAMP Ready」designation，但完整 Authority to Operate（ATO）——需要
              sponsoring agency 并由 FedRAMP PMO 完整审核 package——尚未被公开来源确认。FedRAMP 授权流程通常成本为 $1M–$3M、耗时 12–24 个月，这为 Drata
              的联邦市场野心制造了持续延迟风险。

              来自既有巨头（ServiceNow、IBM、RSA、AuditBoard）的 IP 风险真实存在，但基于当前公开证据并不重大。尚无针对 Drata 的专利诉讼。客户数据责任——一旦 Drata
              持有的敏感审计证据泄露——即便在平台安全控制较强的情况下，仍是显著残余风险，因为 SaaS DPA 通常受保险和赔偿上限约束。
