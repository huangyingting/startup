      - number: '3.2'
        title: 相邻 GRC 平台与企业在位者
        blocks:
          - type: paragraph
            body: >
              直接合规自动化竞争对手之外，Drata 还面对更广泛的相邻 GRC 平台和根基深厚的企业在位者。Optro（原 AuditBoard）在更名前曾以 $3B 估值完成 $200M Series C，服务 50%+
              Fortune 500 公司，提供企业级审计管理、合规和集成风险能力。更名为 Optro 并收购 AI-native GRC 创业公司 Midship 后，它把自身重新定位为智能体 GRC「system of
              action」——竞争位置高于 Drata 的 SMB / 中端市场重点， 但在企业合规工作流中重叠度越来越高。

              ServiceNow GRC 是 ServiceNow 企业平台内的一个模块，面向希望在现有 ServiceNow 部署中整合风险、合规和审计管理的大型组织。 ServiceNow 总 ARR 超过 $11B，在
              Fortune 1000 IT 部门中拥有极强分销力和客户惯性。IBM OpenPages 拥有 Gartner Magic Quadrant Leader 头衔，并在 IDC MarketScape
              Worldwide GRC Software 2025 中位列 Leader，提供模块化、AI 驱动的 GRC 平台，可部署在任意云或本地环境。 MetricStream 声称在 Operational Risk
              和 Audit 类别排名 #1，并提供企业级 Connected GRC，覆盖风险、合规、网络 GRC、审计和运营韧性。

              OneTrust 估值约 $9.7B，主要聚焦 AI 治理、同意管理、数据隐私和第三方风险；它服务的是不同监管团队（隐私主导 vs. 安全-合规主导）， 但仍会争夺企业合规预算。Workiva
              是上市公司（NYSE: WK），面向上市公司的 CFO 和审计委员会，提供 AI 驱动的财务、风险和可持续发展报告平台—— 与 Drata 的 CISO/CTO 买方是不同 ICP。Hyperproof 支持
              140+ 框架，面向医疗健康、科技和金融科技中的中端市场 GRC 团队。 LogicGate 自称「The Leading AI GRC Platform for the Enterprise」，用 Risk
              Cloud 平台和新的智能体能力「Config Newton」服务企业风险管理（ERM）。 Whistic 则聚焦 TPRM 和供应商信任中心，而不是持续合规认证。

              在位者通过既有 IT 合同、集成和采购关系，整体拥有更强企业分销力。未来 3–5 年，它们会给 Drata 的企业级扩张带来整合风险，尤其当 ServiceNow 和 IBM 加码 AI
              自动化、复制合规创业公司的能力时。
