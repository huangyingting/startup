        EU AI Act, FedRAMP, PCI DSS, CCPA), Drata's published legal documents, and comparable SaaS
        enforcement precedents. No private regulatory correspondence, pending litigation records, or
        internal legal counsel assessments were available; full litigation history and regulatory inquiry
        status cannot be confirmed from public sources as of May 2026.
    columns:
      - Risk
      - Type
      - Likelihood (H/M/L)
      - Impact (H/M/L)
      - Mitigation Status
      - Residual Exposure
      - Diligence Ask
    rows:
      - - GDPR Article 28 DPA obligations and cross-border transfer mechanisms (SCCs / EU-US DPF)
        - regulatory
        - M
        - H
        - >-
          Partial — Drata publishes a DPA and legal hub; adequacy mechanism for transatlantic
          transfers not publicly confirmed; SCCs assumed
        - >-
          Medium — EU DPA enforcement against US SaaS processors is increasing;
          Schrems III risk remains; fines up to 4% of global turnover
        - >-
          Request DPA template and evidence of SCCs or EU-US Data Privacy Framework reliance;
          confirm scope of EU customer data stored on US infrastructure
      - - DORA compliance as ICT third-party service provider to EU financial sector
        - regulatory
        - M
        - H
        - >-
          Partial — Drata supports DORA framework for customers; own DORA compliance as
          ICT third-party provider not publicly confirmed
        - >-
          High — EU financial institution customers must contractually enforce DORA obligations
          on ICT providers; non-compliance could lose EU finserv customers
        - >-
          Request Drata DORA compliance attestation or contractual DORA addenda offered to
          EU financial sector customers; confirm audit rights under DORA Article 30
      - - FedRAMP authorization delay (Ready but not ATO)
        - regulatory
        - H
        - M
        - >-
          Partial — FedRAMP Ready designation achieved; full ATO requires
          sponsoring agency and FedRAMP PMO package review; status unconfirmed
        - >-
          Medium — Blocks $10B+ US federal IT market; competing vendors may achieve ATO
          first; FedRAMP process costs $1M–$3M and 12–24 months
        - >-
          Confirm whether any federal agency has sponsored Drata's ATO application;
          request roadmap and timeline for full FedRAMP authorization
      - - EU AI Act compliance for Drata's own agentic features
        - regulatory
        - M
        - H
        - >-
          Emerging — ISO 42001 support for customers signals awareness; Drata's own
          Agentic TPRM and AI Questionnaire Assistance not independently assessed
