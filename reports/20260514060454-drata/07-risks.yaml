          non-compliance by August 2027 deadline carries operational bans in EU
        - >-
          Request AI Act impact assessment for Drata's agentic AI features; confirm whether
          Drata has registered AI systems with EU AI Office
      - - IP and patent assertion from GRC incumbents
        - legal
        - L
        - H
        - >-
          Not mitigated — No patent portfolio or freedom-to-operate analysis publicly
          disclosed; compliance automation space consolidating via M&A
        - >-
          Medium — ServiceNow, IBM, RSA, or AuditBoard could assert GRC-adjacent patents
          as the market consolidates; litigation cost is a distraction even without merit
        - >-
          Request IP counsel review and freedom-to-operate analysis for core compliance
          automation, evidence collection, and AI questionnaire features
      - - Customer data liability (breach or unauthorized access to audit evidence)
        - legal
        - M
        - H
        - >-
          Mitigated — SOC 2 Type II and ISO 27001 attested; DPA executed with customers;
          cyber liability insurance assumed but not disclosed
        - >-
          Medium — Drata holds sensitive audit evidence (employee records, access logs,
          security configs) for 8,000+ customers; breach creates direct legal liability
        - >-
          Request cyber liability insurance coverage limits and DPA indemnification caps;
          confirm whether Drata carries errors-and-omissions coverage
      - - CCPA and CPRA compliance for California customer data
        - regulatory
        - L
        - M
        - >-
          Mitigated — Drata maintains privacy policy; B2B SaaS processors have narrower
          CCPA obligations; standard DPA covers California consumer data
