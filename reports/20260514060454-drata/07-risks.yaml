  - id: partner-and-dependency-risk
    title: Partner and Dependency Risk
    body: >-
      Drata's partner dependency map has several concentration points that are structurally embedded
      and difficult to mitigate in the short term. Cloud infrastructure is the most critical: AWS
      serves as the primary host, GCP as the secondary host. While dual-cloud provides meaningful
      redundancy against single-provider outages, Drata cannot switch cloud providers without a
      multi-year migration, and both providers' pricing and terms can change unilaterally. For a
      company at Drata's scale ($300M+ raised, 1,000 employees), negotiating leverage against AWS
      and GCP is limited.

      The auditor partner network — 1,300+ certified firms trained on Drata — is simultaneously a
      strong competitive moat and a concentration risk. The moat exists because audit firms that
      have built Drata-specific workflows have high switching costs. The risk exists because if one
      or more Tier-1 audit firms (Big 4 or large regional firms) were to disqualify Drata-collected
      evidence due to a quality, security, or compliance concern, it would structurally impair
      Drata's ability to deliver its core product promise. This risk is low probability given the
      depth of the partner relationship but catastrophic if triggered.

      The SafeBase acquisition (announced February 2025, ~$250M) introduces integration risk. Some
      SafeBase customers are on legacy infrastructure; migrating them to the core Drata platform
      while maintaining product parity for SafeBase-specific features is a multi-quarter engineering
      challenge. SafeBase acquisition-related churn — customers who do not want to migrate — is an
      unquantified risk.

      ICONIQ Growth as lead investor creates governance concentration. ICONIQ led the Series B ($100M,
      2021) and is listed as a primary board-level investor. While 77 total investors in the 2025
      round diversify capital sources, board composition and governance decisions are likely still
      influenced by ICONIQ's fund-return timeline and portfolio strategy. A forced sale or compressed
      exit at a valuation unfavorable to common shareholders is a scenario worth diligencing.

      Startup customer concentration is a systemic macro risk rather than a single-partner risk. The
      core Drata customer base is Series A–D technology startups pursuing SOC 2 certification. A
      sustained contraction in venture capital deployment would reduce the formation rate of new
      qualified Drata customers and pressure renewals among existing ones. In the 2022–2023 VC
      drawdown, compliance automation vendors broadly saw slower new logo growth; a second prolonged
      contraction would compress Drata's revenue trajectory.
