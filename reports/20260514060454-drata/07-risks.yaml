  evidenceGaps:
    - id: drata-uptime-sla-undisclosed
      title: "Drata Platform Uptime SLA and Historical Availability Not Publicly Disclosed"
      description: >-
        Drata does not publish a numeric uptime SLA or historical availability record in any
        publicly available product, pricing, or contract page as of May 2026. The status.drata.com
        page is accessible but returned minimal content during the research window. Enterprise
        customers buying compliance automation require documented SLA commitments for SOC 2
        and HIPAA availability controls.
      impact: medium
      relatedQuestionRefs:
        - QR014
      type: missing-source
      severity: material
      topic: uptime-sla
      missingEvidence: >-
        Published SLA with numeric uptime commitment (e.g., 99.9% or 99.95%); historical uptime
        data for 2024–2026 from status.drata.com; SLA compensation mechanism for enterprise
        contracts.
      whyItMatters: >-
        Absence of a published SLA is a competitive disadvantage against enterprise GRC vendors
        with documented availability commitments. It also means investors cannot assess
        contractual exposure from availability failures during customer audit windows.
      diligencePath: >-
        Request enterprise Master Service Agreement and SLA schedule; request uptime history
        from Drata engineering or operations team; confirm whether compliance audit firms
        require SLA commitments as a condition of evidence room access.

    - id: drata-fedramp-ato-status-unconfirmed
      title: "FedRAMP Full ATO Status Not Publicly Confirmed"
      description: >-
        Drata has achieved FedRAMP Ready designation based on public reporting, but full
        Authority to Operate from a sponsoring federal agency has not been publicly confirmed
        as of May 2026. The FedRAMP Marketplace is the definitive source but was not accessible
        in this research window.
      impact: medium
      relatedQuestionRefs:
        - QR004
      relatedTableRefs:
        - TR001
      missingEvidence: >-
        Drata's listing on the FedRAMP Marketplace; sponsoring federal agency name; ATO
        authorization date and scope of authorized systems.
      whyItMatters: >-
        Full FedRAMP ATO is required for Drata to serve US federal agencies directly. Without
        ATO, the US federal market — a high-growth, high-ACV segment — is inaccessible.
        Confirmation of ATO status would materially change the TAM and competitive analysis.
      diligencePath: >-
        Search the FedRAMP Marketplace (marketplace.fedramp.gov) for Drata; confirm with
        company whether a sponsoring agency has been secured; request FedRAMP authorization
        timeline from Drata management.

    - id: drata-eu-ai-act-compliance-unconfirmed
      title: "Drata's EU AI Act Compliance Posture for Own AI Features Not Publicly Assessed"
      description: >-
        Drata launched Agentic TPRM and AI Questionnaire Assistance as commercially available
        features in 2026. Neither the EU AI Act risk classification for these features nor
        Drata's compliance assessment has been publicly disclosed.
      impact: high
      relatedQuestionRefs:
        - QR019
      type: missing-source
      severity: material
      topic: eu-ai-act
      missingEvidence: >-
        EU AI Act conformity assessment or risk classification for Drata's agentic features;
        whether Drata has registered AI systems with the EU AI Office; confirmation of which
        deployment contexts would classify Drata's AI features as high-risk under Annex III.
      whyItMatters: >-
        If Drata's Agentic TPRM is used in EU financial services or HR decision-making contexts,
        it may constitute a high-risk AI system requiring conformity assessment, documentation,
        and potentially an EU market authorization. Non-compliance by August 2027 could result
        in operational bans or fines in the EU market.
      diligencePath: >-
        Request AI Act impact assessment from Drata legal team; confirm whether Drata has
        retained EU AI Act counsel; ask whether DORA compliance addenda for EU financial sector
        customers include any AI-specific obligations.

    - id: drata-cash-runway-undisclosed
      title: "Burn Rate, Cash Position, and Runway Not Publicly Disclosed"
      description: >-
        Drata's burn rate, current cash position, and cash runway cannot be determined from
        public sources. The most recent ARR estimate was "nearing $100M" as of February 2025.
        The September 2024 workforce reduction suggests a re-calibration toward profitability
        but the actual financial trajectory is opaque.
      impact: high
      relatedQuestionRefs:
        - QR009
        - QR025
      type: private-evidence-only
      severity: material
      topic: financial-health
      missingEvidence: >-
        Current ARR as of Q1 2026; gross margin and operating margin; cash on balance sheet
        following the 2025 round; monthly or quarterly burn rate; NRR and GRR by customer tier.
      whyItMatters: >-
        Cash runway determines how much time Drata has before the next financing event.
        Given the 2025 round structure (77 investors, undisclosed terms), understanding whether
        the round provides 24 months of runway or was primarily secondary liquidity is essential
        to assessing financial risk and exit timeline.
      diligencePath: >-
        Request audited or management-reviewed financials for FY 2024 and Q1 2026; request
        ARR bridge from February 2025 baseline; request capitalization table showing all
        preference stacks; ask management to characterize the 2025 round as primary growth
        capital, structured note, or secondary liquidity.

    - id: drata-dora-processor-obligations-unconfirmed
      title: "Drata's Own DORA Compliance as ICT Third-Party Provider Not Publicly Confirmed"
      description: >-
        Drata supports DORA as a compliance framework for its customers, but its own contractual
        and technical obligations as an ICT third-party service provider to EU financial institutions
        under DORA Article 30 have not been publicly confirmed or disclosed.
      impact: medium
      relatedQuestionRefs:
        - QR005
      type: missing-source
      severity: material
      topic: dora-compliance
      missingEvidence: >-
        DORA compliance addendum offered to EU financial sector customers; confirmation of
        whether Drata has been designated a "critical ICT third-party service provider" by
        any EU financial supervisory authority; DORA Article 30 contractual provisions in
        Drata's enterprise agreements.
      whyItMatters: >-
        DORA Article 30 requires ICT third-party providers to EU financial firms to accept
        audit rights, provide sub-contractor disclosures, and demonstrate operational resilience.
        Non-compliance could disqualify Drata from serving EU financial sector customers — a
        significant revenue exposure given Drata's stated expansion into financial services.
      diligencePath: >-
        Request DORA compliance roadmap and any DORA-specific contractual addenda; confirm
        whether any EU financial institution customers have conducted DORA-required audits
        of Drata's operations; review whether Drata's 2025 enterprise contract templates
        include DORA Article 30 provisions.
