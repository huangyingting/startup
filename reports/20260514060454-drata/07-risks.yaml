      external brand presence is structurally embedded in Drata's market positioning, and no
      succession announcement has been made. SMB-to-enterprise execution is rated High because it
      is the primary growth thesis driver and requires cultural and organizational change. All other
      risks are rated Medium — material but manageable with standard diligence and monitoring.
    claimRefs:
      - CR025
      - CR026
      - CR027
      - CR028

  - id: TR005
    title: Mitigation and Kill Criteria Table
    columns:
      - Risk
      - Monitoring Indicator
      - Thesis-Break Trigger
      - Diligence Ask
      - Owner
    rows:
      - - Platform security breach
        - >-
          CVE disclosures; bug bounty payout frequency; security incident notifications
          to customers; SOC 2 certification status
        - >-
          Disclosed breach involving customer audit evidence or PII; loss of SOC 2
          Type II certification; Class-action lawsuit from breach
        - >-
          Request penetration test report; review cyber liability insurance policy;
          confirm VDP scope and response SLA
        - Company
      - - Cloud infrastructure outage during audit window
        - >-
          status.drata.com uptime history; AWS/GCP status page correlation; customer
          complaint volume during cloud provider incidents
        - >-
          Sustained outage >8 hours during active customer audit window; three or more
          SLA breach events in any rolling 12-month period
        - >-
          Request historical uptime data for 2024–2026; request published SLA commitment
          and compensation mechanism for enterprise contracts
        - Company
      - - GDPR or DORA regulatory enforcement
        - >-
          EU DPA enforcement tracker (edpb.europa.eu); CISA and ICO public enforcement
          list; Drata press releases mentioning regulatory inquiries
        - >-
          Material regulatory fine or enforcement action against Drata; DORA-related
          contract loss at a named EU financial institution customer
        - >-
          Request legal counsel assessment of DORA and GDPR processor obligations;
          request evidence of DPA counter-signed with EU customers
        - Company
      - - Funding opacity and capital risk
        - >-
          Next public fundraise announcement and valuation; ARR disclosure or
          management commentary; burn rate signal from headcount trajectory
        - >-
          Next round raises at valuation below $2B (signaling down-round from Series C);
          ARR growth below 30% year-over-year for two consecutive years
        - >-
          Request audited or management-reviewed financials; request ARR bridge from
          February 2025 baseline; request capitalization table and investor rights agreement
        - Investor
      - - Startup customer churn from VC funding contraction
        - >-
          Drata customer count quarterly trajectory; VC financing data via Crunchbase
          or PitchBook; NRR and GRR trend
        - >-
          Customer count growth below 5% QoQ for two consecutive quarters; NRR
          dropping below 100% indicating net ARR contraction in existing base
        - >-
          Request NRR, GRR, and cohort retention by customer tier (startup vs. enterprise);
          request churn rate by year-of-acquisition vintage
        - Investor
      - - Auditor channel partner defection
        - >-
          Auditor partner count trajectory; G2 and Gartner Peer Insights mentions of
          evidence acceptance issues; audit firm public statements on tool approvals
        - >-
          Tier-1 audit firm publicly withdraws acceptance of Drata-collected evidence;
          partner count declines below 1,000 over any 12-month period
        - >-
          Request auditor partner contract terms; confirm evidence acceptance rate data
          from a sample of auditor partners; assess whether Big 4 firms are on partner list
        - Investor + Company
      - - CEO departure without successor
        - >-
          LinkedIn and press release monitoring for Adam Markowitz; executive search
          activity; board composition changes
        - >-
          Adam Markowitz departure without publicly named successor within 90 days;
          simultaneous departure of CEO and CRO or CFO
        - >-
          Request succession plan and key-man clause in credit facilities or major contracts;
          confirm key-man life insurance coverage for CEO
        - Investor
    notes: >-
      Kill criteria are thesis-break events — signals that would materially change the investment
      case rather than routine business challenges. Monitoring indicators are tracked quarterly.
      Owner designations reflect who is primarily responsible for monitoring and remediation:
      "Company" indicates a control within Drata's operational authority; "Investor" indicates
      a diligence or governance action by the investor; "Investor + Company" requires coordination.
    claimRefs:
      - CR031
      - CR032
      - CR033
      - CR034
      - CR035

