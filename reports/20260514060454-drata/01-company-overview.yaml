callouts:
  - calloutType: strength
    title: Fastest SaaS Unicorn Trajectory
    body: >
      Drata reached unicorn status approximately 10 months after its public launch in January 2021,
      closing a $100M Series B at $1B valuation by November 2021. This rapid trajectory—attributed
      to founder-market fit, a recurring pain point in regulated industries, and ICONIQ Growth's
      network—positioned Drata as the compliance automation category leader early in its lifecycle.
    claimRefs:
      - CO012
      - CO013

  - calloutType: risk
    title: Revenue and 2025 Round Opacity
    body: >
      As a private company, Drata does not disclose ARR, revenue, or gross margin. The March 2025
      Form D filing confirms ongoing fundraising with 77 investors but discloses no amount or
      valuation, creating a gap in assessing current financial health, dilution, and growth
      trajectory since the 2022 Series C. This limits confidence in valuation-based analysis.
    claimRefs:
      - CO015
      - CO033

  - calloutType: insight
    title: SafeBase Acquisition Signals Platform Expansion
    body: >
      SafeBase's redirect to drata.com confirms a completed acquisition, expanding Drata's product
      footprint into trust centers and security assurance. This moves the company from pure
      compliance automation toward a full GRC+Assurance (GRC+A) platform—broadening TAM and
      competitive positioning against broader enterprise risk platforms.
    claimRefs:
      - CO028
      - CO029

