company:
  name: Drata

chapter:
  number: 1
  title: Company Overview
  summary: >
    Drata is a security and compliance automation company founded in 2020 in San Diego, California by
    Adam Markowitz, Troy Markowitz, and Daniel Marashlian—all veterans of Portfolium. The company
    emerged from stealth in January 2021 and raised $200M in a Series C at a $2B valuation in
    November 2022 led by ICONIQ Growth, bringing total disclosed funding to at least $303M. As of May
    2026, Drata reports 8,000+ global customers, ~600–1,000 employees across five offices, and
    1,300+ channel/technology partners, having rebranded as the "Agentic Trust Management Platform"
    in March 2026. A fifth funding round was filed with the SEC in March 2025 with 77 investors but
    an undisclosed amount.

sections:
  - id: identity-and-history
    title: Identity, History, and Leadership
    body: >
      Drata Inc. (CIK 0001840122) is a Delaware corporation headquartered at 4660 La Jolla Village
      Drive, Suite 100, San Diego, CA 92122—though Forbes listed the company's primary location as
      San Francisco as of March 2026, reflecting the more prominent San Francisco office opened at
      634 2nd Street. The company was founded in 2020 by Adam Markowitz (CEO), Troy Markowitz
      (co-founder), and Daniel Marashlian (co-founder), who had previously co-founded the
      e-portfolio startup Portfolium. Adam Markowitz began his career as an aerospace engineer for
      NASA's Space Shuttle Program, where he learned rigorous documentation and verification
      discipline that later informed his vision for continuous compliance. Drata was incorporated in
      late 2020, filed its first Form D with the SEC on January 13, 2021 disclosing approximately
      $3.24M in early funding, and launched publicly out of stealth in January 2021.

      The leadership team beyond the three founders includes executive board representation from key
      investors. SEC Form D filings list Adam Markowitz as CEO/Director alongside board members Tim
      Jackson, Ted Wang, Oren Yunger, William Griffith, and Daniel Marashlian. The company is
      backed by ICONIQ Growth, Alkeon Capital, Salesforce Ventures, GGV Capital, Cowboy Ventures,
      Leaders Fund, Okta Ventures, SVCI, and SV Angel. In March 2026, Drata unveiled a new brand
      identity aligned with its repositioning as the "Agentic Trust Management Platform," signaling
      its strategic expansion beyond compliance automation into AI-driven governance, risk, and
      compliance (GRC+A).
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
    tableRefs:
      - TO002
    figureRefs:
