  - id: funding-and-stage
    title: Funding History and Investor Landscape
    body: >
      Drata has executed four disclosed funding rounds between 2020 and 2025 plus an undisclosed
      fifth round. The seed round of approximately $3.24M was funded with 18 investors and had a
      first sale date of November 6, 2020, filed January 2021. The $100M Series B, led by ICONIQ
      Growth with participation from Alkeon Capital and Salesforce Ventures, closed in November 2021
      and valued the company at approximately $1B—making it one of the fastest SaaS companies to
      reach unicorn status, just 10 months after launch. In November 2022, Drata raised a $200M
      Series C at a $2B valuation with 21 investors, again led by ICONIQ Growth. This brings total
      publicly disclosed funding to at least $303.24M.

      A fifth Form D was filed with the SEC on March 7, 2025, disclosing a first sale date of
      February 20, 2025 and 77 investors, but the amount offered was not disclosed in the public
      filing. The filing confirms continued investor appetite but the valuation and amount of this
      round remain private. Total capital raised including the 2025 round is therefore unknown
      publicly.

      Investors with notable reputations include ICONIQ Growth (which manages capital for
      ultra-high-net-worth individuals and has backed companies like Figma, Snowflake, and Zoom),
      Salesforce Ventures (corporate strategic investor with GRC ecosystem relevance), and Okta
      Ventures (strategic alignment with identity and access management). The investor mix combines
      growth equity (ICONIQ), enterprise SaaS strategics (Salesforce, Okta), and early-stage
      specialists (Cowboy Ventures, SV Angel).
    claimRefs:
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
