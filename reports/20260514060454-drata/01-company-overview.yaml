      - TO001
      - TO003
    figureRefs:
      - FO001

  - id: product-and-scale
    title: Product, Scale, and Milestones
    body: >
      Drata's core product is the Agentic Trust Management Platform, which automates compliance,
      risk management, and security assurance across frameworks including SOC 2, ISO 27001, HIPAA,
      GDPR, PCI DSS, FedRAMP, DORA, ISO 42001, and others. Key product pillars include: Continuous
      Compliance (automated control monitoring and evidence collection), Integrated Risk Management
      (internal and third-party risk), Trust Center (self-serve security assurance portal, acquired
      via SafeBase), AI Questionnaire Assistance, and Agentic TPRM Assessment (launched at RSA
      Conference in March 2026). The platform supports 250+ integrations across infrastructure,
      HR, ticketing, HRIS, and security tools.

      As of May 2026, Drata claims 8,000+ global customers, 1,300+ partners, and a 4.8/5.0
      rating on G2 with Best Software Products 2026, Mid-Market Products 2026, and Governance,
      Risk & Compliance Products 2026 recognitions. The company lists 600 employees worldwide
      across 10+ countries and five physical offices (San Francisco, New York, San Diego, London,
      Sydney), though Forbes reported approximately 1,000 employees as of March 2026—a discrepancy
      not reconciled publicly. Drata acquired SafeBase (a Trust Center provider), as evidenced by
      safebase.io redirecting to drata.com as of May 2026. The company launched a comprehensive
      product and brand redesign ("New Drata Experience") in 2025–2026 to shift the positioning
      from compliance-only to enterprise GRC+A.
    claimRefs:
