  evidenceGaps:
    - type: enumeration-incomplete
      severity: minor
      topic: feature-matrix-coverage
      missingEvidence: "Competitor feature capabilities for MetricStream, LogicGate, Hyperproof, and Whistic are excluded from the Feature / Capability Matrix (TP002) and Feature Breadth Map (FP002) due to table width constraints; framework-by-framework comparisons for Sprinto's 200+ and Drata's 100+ frameworks are not enumerated individually"
      whyItMatters: "An incomplete feature matrix may obscure capability gaps or advantages in adjacent GRC segments where LogicGate, Hyperproof, or MetricStream compete; buyers evaluating mid-market GRC alternatives need a more complete comparison"
      diligencePath: "Conduct vendor demonstrations with LogicGate, Hyperproof, and MetricStream alongside Drata; request G2 category comparison data; commission analyst briefing notes from Gartner or Forrester covering compliance automation sub-segment"
      relatedQuestionRefs: [QP012]
      relatedTableRefs: [TP002]

    - type: private-evidence-only
      severity: material
      topic: pricing-structures
      missingEvidence: "No compliance automation vendor (Drata, Vanta, Secureframe, Sprinto, or ServiceNow GRC) publicly discloses binding contract values, average selling prices, ACV tiers, volume discounts, or pricing trend data; all pricing estimates in TP003 are inferred from community forums, review site commentary, and analyst inference"
      whyItMatters: "Without verified pricing data it is impossible to assess Drata's pricing power, NRR, or competitive positioning on price; undisclosed pricing creates risk of margin compression that cannot be identified from public sources; pricing wars among direct competitors could be ongoing without public signals"
      diligencePath: "Request pricing data room from Drata including ACV distribution, pricing tiers, and recent negotiation ranges; obtain reference checks from 3–5 recent Drata customers on contract size; review TrustRadius and G2 buyer-submitted pricing notes; compare Sprinto pricing in international markets vs. Drata's international contract values"
      relatedQuestionRefs: [QP025]
      relatedTableRefs: [TP003]

    - type: private-evidence-only
      severity: material
      topic: competitor-revenue
      missingEvidence: "Annual recurring revenue, gross margin, and NRR for Vanta, Secureframe, Sprinto, and other private compliance automation competitors are not publicly disclosed; no independent analyst estimates these metrics with source-backed precision; the competitive revenue gap cannot be quantified from accessible sources"
      whyItMatters: "Without competitor ARR data, it is impossible to assess Drata's revenue share, growth trajectory relative to peers, or whether Vanta's higher valuation reflects superior unit economics; this gap limits the ability to forecast Drata's competitive position over a 3–5 year investment horizon"
      diligencePath: "Request revenue comparables from Drata's investor relations; cross-reference with fund data from Pitchbook or Crunchbase (investor-disclosed); monitor press releases and LinkedIn growth signals; obtain Vanta ARR estimates from secondary market sources or former employees"
      relatedQuestionRefs: [QP005]

    - type: missing-source
      severity: minor
      topic: competitor-consolidation
      missingEvidence: "No evidence of Secureframe acquisition, merger, or shutdown activity found as of May 2026; acquisition status of smaller compliance automation vendors (Strike Graph, Conveyor, TrustCloud) was not confirmed or denied from accessible sources; AuditBoard/Optro rebranding rationale and any affiliated acquisition terms are not publicly disclosed"
      whyItMatters: "Compliance automation market consolidation could materially alter Drata's competitive set; if a well-funded acquirer (e.g., a security platform) purchases Secureframe or Sprinto, Drata could face a better-resourced competitor with distribution advantages; failure to track consolidation activity leaves a blind spot in competitive diligence"
      diligencePath: "Monitor Crunchbase, PitchBook, and SEC EDGAR for acquisition filings involving compliance automation companies; set up news alerts for Secureframe, Sprinto, and Hyperproof M&A activity; confirm with Drata management whether they are aware of any acquisition activity in the sector"
      relatedQuestionRefs: [QP026]

