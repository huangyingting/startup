  - id: adjacent-grc-incumbents
    title: Adjacent GRC Platforms and Enterprise Incumbents
    body: >
      Beyond direct compliance automation competitors, Drata faces a broader set of adjacent GRC platforms
      and well-established enterprise incumbents. Optro (formerly AuditBoard), which raised $200M at a $3B
      valuation in a Series C before rebranding, serves 50%+ of Fortune 500 companies with enterprise-grade
      audit management, compliance, and integrated risk capabilities. After rebranding to Optro and acquiring
      the AI-native GRC startup Midship, it has repositioned as an agentic GRC "system of action"—competing
      upstream of Drata's SMB/mid-market focus but increasingly overlapping in enterprise compliance workflows.

      ServiceNow GRC is a module within ServiceNow's enterprise platform, targeting large organizations that
      want to consolidate risk, compliance, and audit management within their existing ServiceNow deployment.
      ServiceNow's total ARR exceeds $11B, giving it extraordinary distribution and customer inertia among
      Fortune 1000 IT departments. IBM OpenPages holds a Gartner Magic Quadrant Leader designation and an
      IDC MarketScape Leader position for Worldwide GRC Software 2025, offering a modular, AI-powered GRC
      platform deployable on any cloud or on-premises. MetricStream claims the #1 ranking in Operational
      Risk and Audit categories and offers enterprise-grade Connected GRC across risk, compliance, cyber GRC,
      audit, and operational resilience.

      OneTrust, valued at approximately $9.7B, focuses primarily on AI governance, consent management, data
      privacy, and third-party risk—serving different regulatory teams (privacy-led vs. security-compliance-led)
      but competing for enterprise compliance budgets. Workiva, a publicly traded company (NYSE: WK), targets
      CFOs and audit committees at public companies with its AI-powered finance, risk, and sustainability
      reporting platform—a distinct ICP from Drata's CISO/CTO buyer. Hyperproof supports 140+ frameworks and
      targets mid-market GRC teams in healthcare, technology, and fintech. LogicGate, positioning itself as
      "The Leading AI GRC Platform for the Enterprise," targets enterprise risk management (ERM) with its Risk
      Cloud platform and its new agentic capability "Config Newton." Whistic focuses on TPRM and vendor trust
      centers rather than continuous compliance certification.

      The incumbents collectively hold greater enterprise distribution power through existing IT contracts,
      integrations, and procurement relationships. They represent consolidation risk to Drata's enterprise
      aspirations over a 3–5 year horizon, particularly as ServiceNow and IBM invest in AI automation that
      mirrors compliance startup capabilities.
