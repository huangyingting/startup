  foundingLocation: "San Marcos, CA (original); San Diego, CA (legal address)"
  headquarters: "San Diego, CA (legal); San Francisco, CA (primary operations per Forbes 2026)"
  productSummary: >
    Drata's Agentic Trust Management Platform automates governance, risk, and compliance (GRC+A)
    for cloud-native and SaaS companies. Core modules include Continuous Compliance (automated
    control monitoring and evidence collection), Integrated Risk Management (IRM), Trust Center
    (external security assurance portal, acquired via SafeBase), AI Questionnaire Assistance,
    and Agentic TPRM Assessment (launched March 2026). The platform supports 10+ frameworks
    (SOC 2, ISO 27001, HIPAA, GDPR, PCI DSS, FedRAMP, DORA, ISO 42001, and custom) with
    250+ pre-built integrations.
  customerFocus: >
    Primarily Series A–D tech/SaaS companies needing SOC 2 certification to close enterprise deals;
    expanding to mid-market and enterprise accounts. Verticals include fintech, healthtech, HR tech,
    cybersecurity, and infrastructure SaaS.
  businessModel: >
    Annual SaaS subscription model; tiered pricing by features and company size; expansion via
    additional frameworks, seats, TPRM assessments, and Trust Center. Partner-assisted sales
    through 1,300+ alliance and channel partners including audit firms.
  stage: "Late-stage private (Series C+)"
  fundingStatus: >
    Raised $303M+ across disclosed rounds: seed ~$3.24M (Nov 2020), Series B $100M at $1B
    (Nov 2021, ICONIQ Growth), Series C $200M at $2B (Nov 2022, ICONIQ Growth). A fifth round
    was filed with the SEC in March 2025 with 77 investors but with an undisclosed amount.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO004, CO011, CO012, CO013, CO014, CO015, CO019]

