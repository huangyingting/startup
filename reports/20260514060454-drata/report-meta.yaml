companyProfile:
  summary: >
    Drata Inc. is a Delaware-incorporated security and compliance automation company founded in 2020
    by Adam Markowitz, Troy Markowitz, and Daniel Marashlian—three co-founders of Portfolium,
    an ed-tech company. Adam Markowitz previously worked as an aerospace engineer for NASA's Space
    Shuttle Program. Drata launched from stealth in January 2021 and rapidly became the compliance
    automation category leader, reaching unicorn status ($1B valuation) within 10 months of launch
    via a $100M Series B led by ICONIQ Growth in November 2021. A $200M Series C at $2B valuation
    followed in November 2022. As of May 2026, the company claims 8,000+ global customers, 1,300+
    alliance partners, 250+ product integrations, and five offices (San Francisco, New York,
    San Diego, London, Sydney). In March 2026, Drata rebranded as the "Agentic Trust Management
    Platform," signaling a strategic expansion from compliance automation into AI-driven GRC+A.
  foundedDate: "2020-11-06"
  founders:
    - name: Adam Markowitz
      role: CEO & Co-Founder
