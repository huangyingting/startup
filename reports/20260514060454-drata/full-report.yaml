      - number: '7.4'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: >-
              Drata's most acute people risk is the key-person dependency on CEO and co-founder Adam Markowitz.
              Markowitz is the public face of the company, the lead spokesperson for its trust-and-compliance
              positioning, and the executive who has driven each of its major milestones — the initial product launch,
              the Series B at $1B valuation, the Series C at $2B valuation, the SafeBase acquisition, and the RSA 2026
              Agentic Trust Management Platform rebrand. His LinkedIn presence and conference appearances are integral
              to Drata's brand. No public succession planning or COO designation has been announced.

              The September 2024 workforce reduction of approximately 40 people (9% of the ~450-person workforce at the
              time, following 52% headcount growth from 2023) introduces execution risk in two ways. First, if the
              reductions were concentrated in customer success or support, renewal rates in the 2025 and 2026 cohorts
              may be impaired — this is not visible from public data. Second, workforce reductions create cultural
              uncertainty that can accelerate voluntary attrition among high performers who have options at Vanta,
              Secureframe, OneTrust, or enterprise GRC firms.

              The transition from SMB-first go-to-market to enterprise is the most complex execution challenge. SMB
              compliance automation is a fast, transactional, product-led motion. Enterprise GRC is consultative,
              multi-stakeholder, multi-year contract negotiation with compliance, legal, procurement, and InfoSec teams
              all involved. The two motions require different sales team skills, different customer success structures,
              different product packaging, and different pricing architecture. Drata has invested in the transition
              through its Series C enterprise sales buildout and the SafeBase Trust Center addition, but the track
              record on large enterprise accounts is thin relative to the 8,000+ SMB base.

              The Agentic TPRM product — launched in early GA at RSA 2026 — introduces a new failure mode: AI-driven
              compliance recommendations that are wrong (hallucinations), delayed, or inconsistent could expose
              customers to real audit risk. Unlike traditional compliance automation where evidence is deterministic (a
              control either passes or fails based on system data), agentic features introduce probabilistic outputs
              into a deterministic compliance process. Reputational damage from a high-profile AI governance failure
              would be disproportionate given Drata's positioning as the trusted compliance authority.
            claimRefs:
              - CR025
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
