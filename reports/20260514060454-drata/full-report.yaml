      - number: '7.5'
        title: Financial Risk and Mitigation Synthesis
        blocks:
          - type: paragraph
            body: >-
              Drata's financial risk profile is dominated by opacity rather than acute distress signals. The company has
              raised $303M+ across five rounds since 2021 — $25M Seed/Series A, $100M Series B (November 2021), $200M
              Series C (December 2022), and an undisclosed but likely $127M-scale round reflected in the March 2025 SEC
              Form D filing (77 investors, $126.8M declared). With no public ARR disclosure since "nearing $100M" in
              February 2025, investors cannot independently verify the revenue multiple implied by the $2B Series C
              valuation or whether the 2025 round was structured as a down-round, secondary sale, or growth-equity
              instrument.

              The unusually large investor count in the 2025 round (77, versus 21 in the 2022 Series C) may indicate
              structured notes with multiple investors, a secondary transaction that distributed liquidity to employees
              and early investors, or a broad family-office and angel co-investor syndicate rather than a clean
              institutional growth round. Each scenario has different implications for future governance, anti-dilution
              preferences, and exit dynamics.

              Pricing pressure from Vanta and Secureframe — particularly in the sub-$50K ACV SMB segment — creates
              ongoing risk of margin compression as Drata competes on price for new SMB logos while investing in more
              expensive enterprise sales motions. Without ARR, NRR, and gross margin disclosure, it is not possible to
              confirm that Drata's unit economics are improving as the customer mix shifts upmarket.

              The kill criteria framework identifies seven thesis-break scenarios, ranging from a documented security
              breach to a down-round funding event. Investors should track the monitoring indicators quarterly and
              request data room access to ARR, NRR, GRR, cohort retention, and burn rate to close the financial opacity
              gap identified throughout this chapter.
