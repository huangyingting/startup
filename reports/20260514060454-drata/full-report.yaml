              Drata has executed four disclosed funding rounds between 2020 and 2025 plus an undisclosed fifth round.
              The seed round of approximately $3.24M was funded with 18 investors and had a first sale date of November
              6, 2020, filed January 2021. The $100M Series B, led by ICONIQ Growth with participation from Alkeon
