      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              GRC market sizing estimates vary dramatically by analyst and market definition. MarketsAndMarkets
              estimates the global GRC market at approximately $34.3B in 2024, growing to $59.1B by 2029 at an 11.5%
              CAGR. Grand View Research puts the 2024 figure higher at approximately $45.4B. Mordor Intelligence
              projects the GRC market reaching $52.6B by 2029. These divergent estimates reflect fundamentally different
              scope assumptions: the broadest definitions include ERM platforms, internal audit software, and policy
              management tools deployed at Fortune 500 banks and insurers, while narrower definitions exclude
              non-software consulting spend.

              For Drata's purposes, the relevant total addressable market (TAM) is the global cloud-native compliance
              automation segment, estimated at $600M–$1.5B in 2024 by analyst inference from vendor revenue signals—a
              figure that cannot be precisely verified from any paywalled-accessible independent source. The serviceable
              addressable market (SAM) focuses on companies with active cloud infrastructure that require third-party
              compliance certifications for enterprise sales: this cohort likely represents 50,000–200,000 companies
              globally. Drata's serviceable obtainable market (SOM) concentrates on Series A–D technology companies in
              North America and Western Europe that need SOC 2 or ISO 27001 certification within the next 12 months.
              Vanta's 16,000+ customers and Secureframe's 6,000+ customers—alongside Drata's own 8,000+ customers—imply
              combined top-three vendor penetration of ~30,000 accounts, suggesting the total addressable enterprise
              count runs in the hundreds of thousands when SMB and mid-market are included. Contradictory estimates are
              intentionally preserved: the wide spread in analyst TAM ($34B vs. $52B for the same market) reflects
              methodological incompatibility and should be treated as a known diligence gap.
            claimRefs:
