  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Confirmed down-round valuation
        - 2025 round or any future round disclosed at valuation below $1.5B
        - >-
          Directly invalidates base case ($1.5-2.5B defensible) and signals investor consensus that Drata has not grown
          into its $2B Series C price. Implies ARR or NRR underperformance and/or severe multiple compression.
        - >-
          Immediately re-evaluate at new valuation. If round was at $1.5B or below, recalculate return profile; thesis
          may still hold at lower entry but requires re-underwriting.
      - - Disclosed NRR below 100%
        - Any official or data room disclosure of NRR < 100% (net revenue churn)
        - >-
          NRR below 100% means Drata is losing revenue from existing customers faster than it is expanding. Compliance
          automation with NRR <100% implies high SMB churn, pricing pressure, or competitive displacement — all of which
          undermine the integration moat thesis.
        - >-
          Thesis break. Do not invest. Existing investors should evaluate position sizing and exit options. NRR below
          100% at this stage is a material red flag for SaaS.
      - - Customer base below 6,000 (net decline from 8,000+)
        - Disclosed or inferred customer count below 6,000 in any 2026+ data point
        - >-
          Customer count decline from 8,000+ implies significant net churn, likely from SMB base consolidating on Vanta
          or exiting the compliance market entirely. This would also reduce the integration moat value (fewer paying
          customers to justify 250+ connector maintenance).
        - >-
          Thesis break on customer scale pillar. Re-examine integration moat defensibility and enterprise upsell
          pipeline. Likely triggers a full re-underwriting.
      - - Vanta fundraises at $3B+ valuation
        - Vanta announces a new round at post-money valuation of $3B or higher in 2026-2027
        - >-
          Signals that the market perceives Vanta as the category winner at a premium to Drata's last known $2B. Creates
          urgency for Drata to disclose financials, raise at a comparable valuation, or accept being valued as the #2
          player at a discount.
        - >-
          Monitor for Drata's response: counter-raise, IPO S-1 filing, or silence. If Drata cannot match Vanta's
          fundraise narrative, probability of bear case increases.
      - - Platform security breach
        - Credible public disclosure of unauthorized access to customer compliance evidence
        - >-
          Directly destroys the core value proposition (trust-and-compliance automation). Drata's business model
          uniquely depends on being more trustworthy than its customers' manual processes. A breach triggers immediate
          customer churn and reputational collapse.
        - >-
          Immediate thesis kill. Exit all positions at market price. No recovery scenario for a compliance platform that
          has suffered a customer evidence breach.
      - - No ARR disclosure by end of 2026
        - >-
          Drata continues to decline revenue disclosure through December 2026 with no data room provided to prospective
          investors
        - >-
          Financial opacity at this scale ($303M raised, ~5 years post-launch) becomes a governance concern rather than
          just a diligence gap. Indicates either underperformance that management is concealing or a structural decision
          to remain private indefinitely.
        - >-
          Reduce conviction. Allocate only to follow-on rounds with explicit data room rights and pro-rata reserved. Do
          not lead or co-lead without financial disclosure.
    notes: >-
      Thesis-break triggers are threshold events that would individually or collectively invalidate the base case
      investment thesis. They are not the same as risk factors (which are probability- weighted) — they are binary
      events that would require immediate re-evaluation of the investment decision. The NRR threshold of 100% is a hard
      floor for SaaS companies at Drata's scale and stage; any NRR below 100% implies structural problems in the
      customer base. The platform security breach trigger is the only kill trigger that affects existing investors as
      severely as prospective ones.
