    title: Drata Product Architecture Map
    type: stack
    layout: wide
    summary: >
      Layered architecture of the Drata Agentic Trust Management Platform showing the AI and agents layer, application
      layer, integration layer, and cloud infrastructure layer.
    data:
      layers:
        - id: layer-ai
          label: AI & Agents Layer
