            body: >-
              Drata does not publicly disclose Net Revenue Retention, Gross Revenue Retention, average contract length,
              or renewal rates. This is a standard gap for private-company SaaS diligence but limits the ability to
              independently validate the durability of its revenue base. The most recent ARR disclosure — "nearing $100
