  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model, Pricing Structure, and Revenue Mix
        blocks:
          - type: paragraph
            body: >
              Drata's revenue model is an annual SaaS subscription with tiered packaging and meaningful expansion
              revenue potential. The company's plans page (drata.com/plans) reveals a two-product structure: a GRC suite
              with three tiers (Foundation, Advanced, Enterprise) and a separate Assurance tier oriented toward audit
              readiness. The GRC Foundation tier provides the core continuous monitoring and compliance automation
              baseline; Advanced adds custom frameworks, custom connections and tests, custom fields, and add-on modules
              including Risk Management Pro, User Access Review, Workspaces, and additional frameworks; Enterprise adds
              Compliance as Code Pro, TPRM Pro, additional custom tests, and the Agentic TPRM Assessment launched at RSA
              2026. No prices are listed on the public-facing pages; the pricing page at drata.com/pricing redirects to
              the main homepage, and all plans direct visitors to "contact sales." This is consistent with the market
              norm for mid-market and enterprise compliance SaaS.

              Third-party pricing intelligence from G2 Crowd (sourced via Wayback Archive of the G2 pricing page for
              Drata as of September 2025) discloses buyer-reported data from 16 purchases: an average implementation
              time of 2 months, average ROI realization of 11 months, and an average discount of 13%. The price range is
              obfuscated in G2's "$$k–$$k per year" format, consistent with $10,000–$50,000 annual contract values for
              the SMB-to-mid-market segment. Enterprise contracts negotiated directly with Drata's sales team are likely
              substantially higher; the Series C announcement blog mentions customers including Lemonade, Airbase,
              Notion, and Bamboo HR—all suggesting a mid-market anchor customer profile. Competitor pricing data from
              Vanta and Secureframe also uses a "contact us" model with no public prices, confirming category-wide
              pricing opacity.

              Revenue recognition is expected to follow standard ASC 606 SaaS treatment: revenue recognized ratably over
              the subscription term (annual or multi-year). Expansion revenue from add-on modules (TPRM Pro, additional
              frameworks, User Access Review, Risk Management Pro) creates a land-and- expand motion that, if NRR
              exceeds 100%, results in net ARR growth from the existing base without new customer acquisition spend.
              Drata's Series C blog notes hundreds of customers "switched from legacy providers," suggesting a
              replacement-driven GTM component in addition to greenfield. No deferred revenue, multi-year prepay, or
              professional services revenue data is publicly available.
