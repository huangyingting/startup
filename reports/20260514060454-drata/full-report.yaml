              four published case studies.


              Magic (Web3 Wallet-as-a-Service) achieved SOC 2 Type II, ISO 27001, and HIPAA attestations with zero
              findings across all frameworks. The company's Security Compliance Program Manager described 10× more audit
              efficiency compared to prior processes and cited the integrated A-LIGN auditor workflow — where auditors
              access evidence directly in Drata — as a key time saver. Magic expanded to five frameworks and is actively
              using Trust Center, Risk Management, and continuous monitoring integrations. Jamf (Apple MDM provider)
              deployed SafeBase Trust Center, launched a companywide Trust Center within 90 days, standardized 460+
              questionnaire downloads, saved 4,000+ hours in one year, and lifted $10M+ in annual revenue attributable
              to the security team's ability to accelerate deals. Jamf also replaced $20,000+ of other software tools,
              signaling that SafeBase becomes the system of record for trust communication.


              Zello (push-to-talk communications) manages SOC 2, ISO 27001, GDPR, and HIPAA simultaneously with Drata,
