              figure is stale and almost certainly higher now given the 650-customers-per-quarter growth pace and 100%
              year-over-year revenue growth reported for 2024.


              Indirect retention signals are, however, unusually strong for a private company. G2 rates Drata at 4.8/5.0
              overall and awarded it Best Software Products 2026, Mid-Market Products 2026, Governance Risk & Compliance
              Products 2026, and Security Products 2026. These G2 accolades imply a large volume of reviews and are
              cited on every Drata product page and the homepage. The Gartner Peer Insights page shows at least two
              review records: a 5.0/5.0 "favorable" review from an insurance-sector VP of Software Development in April
              2026 ("I don't know how we would've achieved SOC 2 compliance without a tool such as Drata") and a 3.0/5.0
              "critical" review from a healthcare Infrastructure Architect in August 2025 ("Solid, stable product with
              constant improvement, but not perfect"). The adverse Gartner review is material: it represents an
              independent buyer in a regulated vertical with real dissatisfaction, and its title ("not perfect")
              suggests ongoing gaps relative to enterprise requirements in healthcare.


              TrustRadius provides a directional adverse signal: 5.5/10 overall based on only 3 reviews as of 2026. That
              score is below average on the platform and based on a tiny sample, but it suggests that some customers
              with nuanced experiences have not found Drata fully satisfying. TrustRadius also surfaces the starting
              price at $7,500/year, which is consistent with a land motion in the startup segment. The structural
              retention drivers are strong: 250+ integrations create evidence-flow dependencies that are painful to
              migrate; the Trust Center (SafeBase) becomes externally facing and is referenced from customer-facing
              pages, making replacement visible and costly; and auditor relationships — through 1,300+ alliance partners
