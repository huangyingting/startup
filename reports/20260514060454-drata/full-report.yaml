      - number: '4.4'
        title: Capital Adequacy, Burn Rate, and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Drata's capital history spans at least five funding events between 2020 and 2025. As documented in Chapter
              1 (and cross-referenced here with new locally minted claims), the disclosed rounds are: seed (~$3.24M, Nov
              2020, 18 investors); Series B ($100M, Nov 2021, 18 investors—confirmed by SEC Form D showing 99,999,914
              securities sold); Series C ($200M, Nov 2022, 21 investors—confirmed by SEC Form D showing 199,999,987
              securities); and a 2025 round (Feb 2025 first sale, 77 investors, amount declined to disclose). Total
              disclosed capital is $303.24M; the 2025 round adds an unknown amount. No debt facility, credit line, or
              project-finance obligation has been publicly disclosed for Drata.

              The undisclosed 2025 round amount with 77 investors is an adverse signal warranting scrutiny. A "normal"
              primary growth round by a $2B+ unicorn would be expected to disclose an amount (as Drata did for both the
              $100M Series B and $200M Series C) unless the structure is unusual. Possible explanations include: (a)
              structured secondary transaction or tender offer where individual lot sizes were below the Form D
              threshold for disclosure; (b) a flat-round or down-round pricing that management prefers not to publicize;
              (c) employee liquidity program with 77 participating sellers rather than 77 institutional investors; or
              (d) a mix of primary capital and secondary sales making the pure primary amount uninformative. The
              126,834,036 securities sold figure in the Form D (vs. 199,999,987 in the Series C) may be informative
              about relative round size if security prices are comparable, suggesting a potentially smaller primary
              component than the Series C.

              Cash burn and runway are unconfirmed. At 600–1,000 employees and a market-rate total compensation (US SaaS
              mid-market average ~$120,000–$180,000 per employee fully loaded), annual personnel cost alone is estimated
              at $72M–$180M before infrastructure, marketing, and G&A. At the $303M disclosed capital base and assuming
              $50M–$80M annual burn through 2022–2024, estimated remaining cash from prior rounds would be $63M–$153M by
              the time of the 2025 round. The 2025 round would therefore be consistent with a capital refresh rather
              than distressed fundraising, but without confirmed burn data this is speculative. No IPO filing, S-1, or
              other public market registration has been filed as of May 2026.
