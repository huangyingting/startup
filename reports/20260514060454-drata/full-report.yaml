      - number: '4.3'
        title: Cost Structure, Gross Margin Drivers, and Service-Delivery Economics
        blocks:
          - type: paragraph
            body: >
              As a SaaS compliance automation platform, Drata's cost structure is typical of high-gross-margin software
              businesses. Cost of revenue (COGS) includes cloud infrastructure hosting costs on AWS and GCP (confirmed
              from drata.com/security), personnel costs for the customer success, onboarding, and implementation teams,
              and third-party SaaS tool costs for integrations and monitoring. Compliance SaaS platforms with 250+
              integration connectors carry incremental maintenance costs per connector, which can compress margins if
              not managed carefully. Gross margin for the category is estimated at 70–85% based on benchmarks from
              comparable compliance and security SaaS companies; Drata's margin profile is unconfirmed.

              Operating expenses include a significant R&D investment (consistent with the Series C blog's statement
              that Drata "invested heavily in product and engineering"), a scaled-up sales and marketing function (Drata
              hired a CRO, Adam Aarons, noted in the Series C announcement, and has a structured sales team as evidenced
              by the careers page), and a growing G&A function supporting 600–1,000 employees across five offices in
              three countries. Drata's 100% remote-first culture (confirmed by Built In) may reduce real estate costs
              relative to peers, but global headcount (US, UK, Australia) increases HR, benefits, and compliance
              overhead. The SafeBase acquisition (timing approximately 2023 based on redirect evidence) added product
              and team costs without a disclosed acquisition price, representing an intangible capital deployment not
              reflected in the disclosed round data.

              No working capital, capex, or debt service data is publicly available. As a SaaS company, Drata is
              expected to have low physical capex requirements; cloud infrastructure is an OpEx item. Any significant
              capitalization of software development costs under ASC 350-40 would be visible only in audited financials,
              which are not public. Service delivery costs for the Agentic TPRM Assessment and AI-powered questionnaire
              automation features may have incremental LLM/GPU inference costs that compress margins relative to
              traditional SaaS—a risk common to all AI-native SaaS companies in 2025–2026.
            claimRefs:
              - CI017
