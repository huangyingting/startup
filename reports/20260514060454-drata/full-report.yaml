              company that needs SOC 2 Type II certification to unlock enterprise sales. These companies are typically
              US-headquartered, growing fast, and under-resourced for manual compliance. A secondary segment consists of
              mid-market technology companies ($10M–$200M ARR) that have completed initial SOC 2 and want to add ISO
