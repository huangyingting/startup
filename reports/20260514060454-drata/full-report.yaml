      - number: '7.2'
        title: Operational and Security Risk
        blocks:
          - type: paragraph
            body: >-
              The single most dangerous operational risk for Drata is a material security breach of its own platform.
              Drata's entire value proposition rests on being a trusted third party that holds sensitive compliance
              evidence — access logs, employee records, security configurations, audit artifacts — on behalf of 8,000+
              customers. A breach would undermine the core product narrative in a way that is qualitatively more
              damaging than a breach at a generic SaaS vendor. Customers would face both direct evidence exposure and
              the reputational harm of having their compliance program operated on a compromised platform. Drata
              mitigates this risk through a strong control environment: Zero Trust architecture, WebAuthn
              phishing-resistant MFA, WAF at the CDN layer, DDoS mitigation at application and network layers, AWS
              GuardDuty and Google Security Center for anomaly detection, CSPM deployment, IaC vulnerability scanning,
              credential checking, and OWASP Top 10 training. The company holds SOC 2 Type II and ISO 27001
              certifications for its own platform. However, no platform is impenetrable, and Drata acknowledges this on
              its security page, with a Vulnerability Disclosure Program as the public signal of security maturity.

              Cloud infrastructure dependency is the second most impactful operational risk. Drata is hosted on AWS
              (primary) and GCP (secondary), using Infrastructure as Code for fast failover. An extended multi-region
              outage on AWS — or simultaneous degradation across both providers — during a customer's active SOC 2 audit
              window would prevent evidence collection and real-time control monitoring, directly causing audit delays.
              Drata does not publish an SLA for platform uptime from public sources, which is a material gap for
              enterprise procurement and a key diligence ask.

              The 250+ integration ecosystem creates a permanently elevated operational risk surface. Any API change,
              deprecation, or credential rotation event at a major partner (Okta, GitHub, AWS, Jira, Salesforce,
              CrowdStrike) breaks evidence collection for all customers relying on that connector. Drata mitigates this
              through monitoring and a Custom Connections builder, but at 250+ connectors the probability that one is
              degraded at any point in time is high. The company handles this as ongoing engineering toil rather than a
              discrete risk event.

              The undisclosed LLM provider for AI Questionnaire Assistance and Agentic TPRM represents an emerging
              dependency. Vendor lock-in, pricing changes, model quality degradation, or an LLM provider outage would
              directly affect Drata's highest-growth product surface. The workaround is manual questionnaire completion
              — which is Drata's prior-art workflow — so this is a product performance risk rather than a business
              continuity risk.
