  - id: FV002
    title: Valuation Sensitivity — ARR Scenarios vs. Multiple
    type: bar
    layout: wide
    summary: >-
      The bar chart shows implied Drata valuations across three ARR scenarios ($80M, $150M, $250M) and three multiple
      tiers (10x, 15x, 20x ARR). The base case cluster ($150M ARR, 10-15x multiple) generates $1.5-2.25B — roughly
      consistent with the stale $2B reference price at the high end. The bull case cluster ($250M ARR, 15-20x) produces
      $3.75-5.0B, requiring both ARR outperformance and multiple re-rating. The bear case ($80M ARR, 10x) implies only
      $800M, a 60% discount to the $2B reference price, underscoring the valuation risk of undisclosed financial
      underperformance.
    data:
      items:
        - label: ARR $80M × 10x
          value: 0.8
          unit: $B
        - label: ARR $80M × 20x
          value: 1.6
          unit: $B
        - label: ARR $150M × 10x
          value: 1.5
          unit: $B
        - label: ARR $150M × 15x
          value: 2.25
          unit: $B
        - label: ARR $150M × 20x
          value: 3
          unit: $B
        - label: ARR $250M × 10x
          value: 2.5
          unit: $B
        - label: ARR $250M × 15x
          value: 3.75
          unit: $B
        - label: ARR $250M × 20x
          value: 5
          unit: $B
      xAxis: Scenario (ARR × Multiple)
      yAxis: Implied Valuation ($B)
