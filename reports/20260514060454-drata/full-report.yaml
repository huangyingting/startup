              label: Agentic TPRM Assessment
              detail: Launched RSA 2026; AI-driven third-party risk scoring and automated outbound vendor questionnaires
            - id: drata-mcp
              label: Drata MCP (Model Context Protocol)
              detail: >-
                Allows external AI agents to interact with Drata in natural language; automates compliance workflows
                programmatically
        - id: layer-application
          label: Application Layer
          detail: >-
            Five core product modules: Continuous Compliance, IRM, Trust Center, Automated Governance, and Accelerated
            Assurance; each module has its own buyer persona and workflow but shares the same evidence and control data
            store
          sublayers:
            - id: app-compliance
              label: Continuous Compliance
              detail: Automated control monitoring, evidence collection, real-time compliance posture for 10+ frameworks
            - id: app-irm
              label: Integrated Risk Management
              detail: Risk register, risk assessments, treatment workflows for internal and third-party risk
            - id: app-trust-center
              label: Trust Center (SafeBase)
              detail: External-facing security posture portal; acquired ~2023; SafeBase Trust API
            - id: app-governance
              label: Automated Governance
              detail: Policy management, access reviews, task ownership, custom framework builder
            - id: app-assurance
              label: Accelerated Assurance
              detail: Auditor collaboration, evidence room, 1,300+ auditor partner network
        - id: layer-integration
          label: Integration & API Layer
          detail: >-
            Public REST API v2 plus 250+ pre-built connectors spanning cloud, identity, SIEM, and ITSM tools; custom
            connection builder for on-premise systems; serves as the ingestion layer for automated evidence collection
          sublayers:
            - id: int-rest-api
              label: Public REST API v2
              detail: Core programmatic interface; OAuth and webhook support; expanded endpoints and smarter data structures
            - id: int-connectors
              label: 250+ Pre-built Connectors
              detail: >-
                AWS, GCP, Azure, GitHub, GitLab, Okta, Jira, ServiceNow, Rippling, Datadog, CrowdStrike, SentinelOne,
                and 240+ more
            - id: int-custom
              label: Custom Connections & Workflows
              detail: Build bespoke integrations for on-premise tools; custom triggers and actions for compliance automation
        - id: layer-infra
          label: Cloud Infrastructure Layer
          detail: >-
            Hosted primarily on AWS with GCP as secondary; Zero Trust network architecture; WAF at CDN edge; all data
            encrypted at rest and in transit; WebAuthn MFA; CSPM monitoring
          sublayers:
            - id: infra-aws
              label: Amazon Web Services (AWS)
              detail: Primary cloud host; GuardDuty for anomaly detection; CloudFormation IaC setup
            - id: infra-gcp
              label: Google Cloud Platform (GCP)
              detail: Secondary cloud host; Google Security Center; Terraform IaC setup
            - id: infra-security
              label: Zero Trust / WAF / Encryption
              detail: Zero Trust network architecture; WAF at CDN; data encrypted at rest and in transit; WebAuthn MFA; CSPM
