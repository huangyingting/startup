  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Overview and Product Module Map
        blocks:
          - type: paragraph
            body: >
              Drata markets itself as the "Agentic Trust Management Platform"—a term adopted at RSA 2026 to reflect an
              expanded scope beyond compliance automation into AI-driven governance, risk, and assurance. The platform
              is purchased as a SaaS subscription and delivers value across a customer's compliance lifecycle:
              connecting to existing infrastructure tools, automatically collecting evidence, mapping controls to one or
              more frameworks, and keeping a continuous real-time compliance posture dashboard. The four named product
              pillars are Automated Governance (policy management, access reviews, task ownership), Integrated Risk
              Management (internal and third-party risk register and treatment), Continuous Compliance (control
              monitoring, evidence collection, framework mapping), and Accelerated Assurance (security hubs, Trust
              Center, AI questionnaire automation). Each pillar corresponds to a distinct buyer job: GRC teams use
              Continuous Compliance for audit prep; security and procurement teams use IRM and TPRM for vendor risk;
              sales-facing teams use Trust Center and AI questionnaires to accelerate deal reviews. Drata supports 10+
              compliance frameworks natively: SOC 2 Types I and II, ISO 27001, ISO 42001 (AI governance), HIPAA, GDPR,
              CCPA, PCI DSS, FedRAMP, DORA, NIS2, and CMMC, plus a custom framework builder for tailored control
              mappings. The help center exposes the breadth of product coverage through its article count: 262 articles
              on platform features, 67 on framework information, 218 on connection support, 42 on policy guidance, 33 on
              personnel management, and 168 on monitoring test guidance. The Trust Center product originated from
              Drata's acquisition of SafeBase (approximately 2023) and provides an external-facing portal for sharing
              verified security posture with prospects and customers—a capability that competitors have subsequently
              moved to replicate.
