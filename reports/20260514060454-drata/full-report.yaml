      - number: '2.3'
        title: Buyer Segmentation and Personas
        blocks:
          - type: paragraph
            body: >
              The compliance automation buyer landscape divides into five primary segments, each with distinct budget
              ownership, purchase triggers, and product requirements. The largest and fastest-growing segment by unit
              volume is the growth-stage SaaS company (Series A–D, typically $1M–$50M ARR) that needs SOC 2 Type II
              certification to unlock enterprise sales conversations. In these deals, the CISO or CTO is typically both
              the buyer and the economic decision-maker, with engineering leads owning the technical integration
              workload. The CFO approves the budget but is secondary to the security leader.

              Mid-market technology companies ($10M–$100M ARR) form the second segment; they typically need
              multi-framework support (SOC 2 plus ISO 27001, HIPAA, or GDPR) and deploy more sophisticated GRC programs
              with dedicated compliance officers or GRC analysts. At the enterprise tier (>$100M ARR), the relevant
              buyers shift to the Chief Risk Officer and Chief Compliance Officer, who need integrated risk management
              across business units with audit trail requirements that exceed what growth-stage tools typically provide.
              Fintech and healthcare organizations are subject to vertical-specific regulatory mandates (HIPAA, PCI DSS,
              DORA) that create persistent, non-discretionary compliance spend. Government contractors pursuing defense
              contracts face CMMC 2.0 requirements driving a specialized buyer cohort. Across all segments, the adoption
              trigger is almost always external: either an enterprise prospect includes compliance certification in its
              vendor procurement checklist, a regulator mandates a new framework, or a cyber insurance underwriter
              conditions renewal on certification. Internal champions are CISOs and compliance leaders, but CFO or CEO
              approval is required for most purchases above $50K annually.
            claimRefs:
