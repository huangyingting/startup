  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Drata operates at the intersection of privacy law, information security standards, and financial
              regulation — making its regulatory exposure unusually broad for a SaaS company of its scale. The primary
              regulatory risks arise from GDPR processor obligations, DORA for EU financial sector customers, the EU AI
              Act for Drata's own agentic features, and the pace of FedRAMP authorization for the US federal market.

              GDPR exposes Drata to Article 28 data processor obligations for any EU-based customer or any Drata
              customer that processes EU personal data. Drata's platform ingests audit evidence that frequently includes
              employee records, access logs, and security posture data — all of which can be personal data under GDPR.
              Drata publishes a Data Processing Agreement (DPA) and legal hub confirming its status as a data processor,
              but the adequacy mechanism it relies on for transatlantic data transfers (Standard Contractual Clauses
              under the EU-US Data Privacy Framework or Schrems II-compliant mechanisms) is not fully disclosed from
              public sources. Post-Schrems II enforcement actions against US SaaS vendors by EU data protection
              authorities have materially increased, making this a growing rather than static risk.

              DORA (EU Digital Operational Resilience Act) entered into force on January 17, 2025 and applies to ICT
              third-party service providers serving EU financial institutions. Drata explicitly supports DORA as a
              compliance framework for its customers, but its own status as a DORA-regulated ICT third-party provider is
              not publicly confirmed. Financial sector customers in the EU may require Drata to sign DORA-compliant
              contracts, provide operational resilience testing evidence, and submit to audit rights — obligations Drata
              has not publicly addressed.

              The EU AI Act came into force August 2024 with phased obligations extending through 2026 and 2027. Drata's
              Agentic TPRM (launched March 2026) and AI Questionnaire Assistance features may constitute high-risk AI
              systems if used in regulated financial or HR decision-making contexts. Drata holds ISO 42001 (AI
              governance) support for customers, but its own AI feature compliance posture has not been independently
              assessed or publicly disclosed.

              FedRAMP authorization remains Drata's gateway to the US federal government market. The company achieved
              "FedRAMP Ready" designation but full Authority to Operate (ATO) — which requires a sponsoring agency and
              full package review by the FedRAMP PMO — is not confirmed from public sources. The FedRAMP authorization
              process typically costs $1M–$3M and takes 12–24 months, creating a persistent delay risk for Drata's
              federal ambitions.

              IP risk from incumbents (ServiceNow, IBM, RSA, AuditBoard) is real but not material based on current
              public evidence. No patent litigation has been filed against Drata. Customer data liability — for a breach
              of the sensitive audit evidence Drata holds — is a significant residual risk even with strong platform
              security controls, given the insurance and indemnification limits that typically govern SaaS DPAs.
            claimRefs:
