  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Current ARR and Growth Rate
        - ARR as of Q4 2025 or Q1 2026; YoY ARR growth rate; monthly/quarterly ARR growth trend for the past 8 quarters
        - >-
          The single most material unknown. The entire valuation range ($0.5B-$5.0B) collapses to a narrow band once ARR
          and growth are known. Without ARR, it is impossible to apply a defensible multiple to the $2B reference price.
        - >-
          Data room required. Ask: financial statements or revenue schedule; executive management presentation with ARR
          waterfall; finance team confirmation.
      - - Net Revenue Retention (NRR)
        - >-
          Gross revenue retention (GRR) and NRR by cohort for 2022, 2023, 2024; SMB vs mid-market vs enterprise NRR
          split
        - >-
          NRR is the single most predictive metric for long-term SaaS value. Compliance automation with NRR >120%
          warrants premium multiples; NRR <100% is a thesis killer. The integration moat thesis requires evidence that
          customers expand on Drata over time.
        - >-
          Data room required. Ask: cohort retention analysis; customer revenue waterfall (logos won, logos lost,
          expansion, contraction); finance team presentation.
      - - 2025 Round Valuation and Structure
        - >-
          Post-money valuation; preferred share terms; whether round was primary, secondary, or structured note; full
          capitalization table post-2025 round
        - >-
          The 77-investor 2025 round with undisclosed valuation creates fundamental uncertainty about current fair
          value. A down-round would compress entry price; an up-round would validate the bull case. Structured notes or
          secondary components change return mechanics.
        - >-
          Ask management directly and via legal counsel. Request cap table, liquidation waterfall model, and most recent
          409A valuation. Requires board and management cooperation.
      - - Gross Margin and Unit Economics
        - >-
          Gross margin %; CAC by channel (inbound vs outbound vs partner); CAC payback period; LTV/CAC ratio;
          contribution margin by customer segment
        - >-
          Gross margin determines how much of ARR growth converts to equity value. At 70-85% gross margin, Drata can
          scale efficiently. Below 65% (e.g., high implementation costs for enterprise), the multiple compression is
          significant. Unit economics confirm whether the enterprise GTM transition is accretive or dilutive to margins.
        - >-
          Data room required. Ask: P&L with COGS breakdown; sales and marketing spend by channel; CRM data export with
          CAC attribution; finance team unit economics model.
      - - SafeBase Integration Status and Churn
        - >-
          SafeBase customer count pre/post acquisition; integration timeline; SafeBase-specific churn since acquisition;
          revenue attribution from SafeBase customers
        - >-
          The SafeBase acquisition (~$250M) was a major capital deployment. If SafeBase customers are churning due to
          integration friction or feature regression, the acquisition has destroyed value. The integration status
          directly affects the GRC+A platform thesis and the 8,000+ customer count's quality.
        - >-
          Data room required. Ask: SafeBase customer count and retention since acquisition; product integration roadmap
          with milestone dates; engineering head for integration status.
      - - Burn Rate and Runway
        - >-
          Monthly/quarterly cash burn; cash and equivalents as of Q1 2026; projected runway at current burn; path to
          breakeven or cash flow positive
        - >-
          With $303M+ raised and the 2025 round adding ~$127M, total capital is approximately $430M+. If Drata is
          burning $50-80M/year, runway is 5-8 years. If burning $100M+/year, the next raise becomes a near-term
          strategic constraint. Burn rate directly affects negotiating leverage in any M&A or IPO process.
        - >-
          Data room required. Ask: monthly bank statement summaries; CFO-attested burn rate; 12-month cash flow
          forecast; confirmation of primary banking relationship and any SVB/bank-risk exposure.
      - - Auditor Partner Concentration
        - >-
          Top 10 auditor partners by customer volume referred; revenue attributable to top 3 audit firms; any
          exclusivity or preferred partner arrangements
        - >-
          1,300+ auditor partners is cited as a key distribution moat. If 50%+ of referrals flow through 5 or fewer
          audit firms, the moat is narrower than stated and concentration risk is high. A preferred partner arrangement
          with a Big 4 firm would be a major positive signal.
        - >-
          Ask in management channel references and partner program documentation. Review auditor partner portal terms.
          Request revenue attribution by partner source.
    notes: >-
      All diligence asks require formal data room access or management cooperation; none can be resolved from public
      sources. Priority order for a prospective investor: (1) ARR and growth rate, (2) NRR, (3) 2025 round structure,
      (4) gross margin, (5) burn rate, (6) SafeBase integration status, (7) auditor partner concentration. Items 1-3 are
      blocking — the investment decision cannot proceed without them. Items 4-7 are important but not individually
      blocking if items 1-3 are satisfactory.
    claimRefs:
      - CV019
      - CV020
      - CV026
