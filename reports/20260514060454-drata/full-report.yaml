  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >
              Drata operates at the intersection of governance, risk, and compliance (GRC) software and cloud-native
              security automation. The GRC software category broadly includes governance frameworks, risk management
              tools, compliance workflow software, audit management platforms, and regulatory reporting suites. However,
              Drata's core product—continuous compliance automation for cloud-native organizations—is a distinct
              sub-segment characterized by API-first integrations, automated evidence collection, continuous monitoring,
              and framework-specific readiness scoring. This sub-segment sits inside the broader GRC market but excludes
              traditional enterprise risk management (ERM) platforms, non-software GRC professional services and
              consulting, point-in-time audit engagements, and legacy on-premises GRC tools deployed at large financial
              institutions.

              Adjacent spend categories that Drata is actively expanding into include third-party risk management
              (TPRM), trust centers and vendor security questionnaire automation, and integrated risk management (IRM).
              The status-quo alternative to compliance automation is manual spreadsheet-based evidence tracking,
              typically managed by a security engineer or compliance analyst without dedicated tooling. Substitutes also
              include hiring a consulting firm for periodic SOC 2 readiness assessments and paying an auditor for
              point-in-time compliance reviews rather than maintaining a continuous program. The primary compliance
              frameworks driving demand are SOC 2 (AICPA standard for service organization controls), ISO/IEC 27001
              (ISMS standard from ISO), HIPAA, PCI DSS, GDPR, CMMC, DORA, NIS2, and the emerging ISO 42001 AI management
              standard. Each framework has its own certification body, audit process, and evidence requirements—yet all
              share a common need for continuous control monitoring and organized evidence management.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
