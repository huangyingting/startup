  - id: unit-economics-and-gtm-efficiency
    title: Unit Economics, GTM Motion, and Sales Efficiency Proxies
    body: >
      Drata's go-to-market motion combines product-led growth signals with a direct sales-led model.
      The company's compliance automation product has historically attracted inbound demand from
      startups and growth-stage technology companies seeking SOC 2 certification as a prerequisite
      for enterprise sales cycles. This creates a natural inbound funnel where the buyer comes to
      Drata with an urgent compliance deadline, compressing the sales cycle relative to a typical
      outbound enterprise SaaS model. Drata's Series C blog and careers page both highlight its
      sales and revenue expansion teams, suggesting a hybrid PLG + sales-assisted model consistent
      with its $15,000–$100,000 ACV range.

      No disclosed CAC, LTV, NRR, or payback data is available from public sources. Proxy estimates
      are derived from SaaS compliance category benchmarks and comparable company disclosures. For
      SMB-to-mid-market compliance SaaS, best-in-class CAC is estimated at $5,000–$15,000 per logo;
      enterprise logos carry estimated $30,000–$80,000 CAC. G2 buyer data suggests a 13% average
      discount off list price and 11 months to ROI realization. CAC payback is estimated at 12–24
      months for the SMB tier and 18–36 months for enterprise. Net Revenue Retention for compliance
      automation SaaS leaders typically ranges from 110%–130%; Drata's NRR is unconfirmed but is
      likely positive given the expansion modules visible in the product tier structure (TPRM Pro,
      additional frameworks, Risk Management Pro, Workspaces, Agentic TPRM Assessment). LTV/CAC
      at these parameters is estimated at 3x–8x, within the "healthy SaaS" range but not exceptional
      without confirmed NRR data.

      Revenue per employee benchmarks offer a rough revenue scale proxy. Forbes reports ~1,000
      employees; the careers page reports ~600. At 600–1,000 employees and a compliance SaaS
      benchmark of $150,000–$200,000 ARR per employee, implied ARR is $90M–$200M—broadly consistent
      with the base case range of $150M ARR. This is an extremely crude proxy; the actual ratio
      depends heavily on R&D versus GTM headcount mix.
