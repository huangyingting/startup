        - label: "ARR — Base Case (mixed tier, ~$18.75K ARPU, moderate NRR)"
          low: 120
          mid: 150
          high: 190
          unit: "$M"
        - label: "ARR — Optimistic (enterprise-heavy, ~$31K ARPU, NRR 125%+)"
          low: 200
          mid: 250
          high: 320
          unit: "$M"

