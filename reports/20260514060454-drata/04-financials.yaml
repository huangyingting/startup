chapter:
  number: 4
  title: Financials
  summary: >
    Drata is a private SaaS company with no public revenue, ARR, margin, or profitability disclosures.
    The known capital base is $303.24M across four disclosed rounds (seed through Series C, Nov 2022),
    plus an undisclosed fifth round filed with the SEC in March 2025 with 77 investors—bringing
    cumulative raises to an unknown total. The last disclosed post-money valuation was $2B at the
    November 2022 Series C. Estimated ARR ranges from $80M (conservative, 8,000 customers at ~$10K
    ARPU) to $250M (optimistic, enterprise-heavy mix with high NRR), with a base case of ~$150M;
    all figures are inferred proxies, not reported data. Drata's revenue model is annual subscription
    SaaS with tiered plans (Foundation / Advanced / Enterprise for GRC; Assurance tier for audit
    readiness) and expansion revenue from additional frameworks, TPRM Pro, Risk Management Pro,
    Workspaces, and the Agentic TPRM Assessment add-on. No public pricing is available on drata.com
    (redirects to a "contact sales" flow); G2 buyer data indicates an average 13% discount and
    11-month average ROI, suggesting pricing negotiation is routine. Gross margin is estimated at
    70–85% based on SaaS compliance category benchmarks; CAC payback is estimated at 12–24 months;
    LTV/CAC is estimated at 3x–8x. The undisclosed 2025 round amount with 77 investors is an adverse
    signal—an unusually high investor count that may indicate a structured secondary transaction,
    flat/down-round pricing, or founder/early-employee liquidity rather than a primary growth round.
    Key diligence blockers are: no disclosed ARR, no gross margin, no NRR, no burn/runway, and no
    confirmed unit economics.

sections:
  - id: revenue-model-and-pricing
    title: Revenue Model, Pricing Structure, and Revenue Mix
    body: >
      Drata's revenue model is an annual SaaS subscription with tiered packaging and meaningful
      expansion revenue potential. The company's plans page (drata.com/plans) reveals a two-product
      structure: a GRC suite with three tiers (Foundation, Advanced, Enterprise) and a separate
      Assurance tier oriented toward audit readiness. The GRC Foundation tier provides the core
      continuous monitoring and compliance automation baseline; Advanced adds custom frameworks,
      custom connections and tests, custom fields, and add-on modules including Risk Management Pro,
      User Access Review, Workspaces, and additional frameworks; Enterprise adds Compliance as Code
      Pro, TPRM Pro, additional custom tests, and the Agentic TPRM Assessment launched at RSA 2026.
      No prices are listed on the public-facing pages; the pricing page at drata.com/pricing redirects
      to the main homepage, and all plans direct visitors to "contact sales." This is consistent with
      the market norm for mid-market and enterprise compliance SaaS.

      Third-party pricing intelligence from G2 Crowd (sourced via Wayback Archive of the G2 pricing
      page for Drata as of September 2025) discloses buyer-reported data from 16 purchases: an average
      implementation time of 2 months, average ROI realization of 11 months, and an average discount
      of 13%. The price range is obfuscated in G2's "$$k–$$k per year" format, consistent with
      $10,000–$50,000 annual contract values for the SMB-to-mid-market segment. Enterprise contracts
      negotiated directly with Drata's sales team are likely substantially higher; the Series C
      announcement blog mentions customers including Lemonade, Airbase, Notion, and Bamboo HR—all
      suggesting a mid-market anchor customer profile. Competitor pricing data from Vanta and
      Secureframe also uses a "contact us" model with no public prices, confirming category-wide
      pricing opacity.

      Revenue recognition is expected to follow standard ASC 606 SaaS treatment: revenue recognized
      ratably over the subscription term (annual or multi-year). Expansion revenue from add-on modules
      (TPRM Pro, additional frameworks, User Access Review, Risk Management Pro) creates a land-and-
      expand motion that, if NRR exceeds 100%, results in net ARR growth from the existing base without
      new customer acquisition spend. Drata's Series C blog notes hundreds of customers "switched from
      legacy providers," suggesting a replacement-driven GTM component in addition to greenfield. No
      deferred revenue, multi-year prepay, or professional services revenue data is publicly available.
