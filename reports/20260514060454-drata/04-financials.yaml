figures:
  - id: FI001
    title: Revenue Model Bridge
    type: flow
    layout: wide
    summary: >
      Illustrates how Drata's revenue flows from initial customer acquisition through the annual
      subscription cycle to net ARR, including the expansion levers (add-on modules, additional
      frameworks, tier upgrades) and the churn offset. The bridge shows the land-and-expand motion
      inherent in the tiered GRC and Assurance product structure, where each customer's ARR can
      grow over time through framework additions, module upgrades (TPRM Pro, Risk Management Pro),
      and seat/workspace expansion. All ARR values shown are estimated ranges; no disclosed figures
      exist.
    approximationNotes: >
      All ARR figures in this diagram are estimated ranges derived from customer count (8,000+
      confirmed company-claimed), G2 buyer data (16 purchases; $10K–$50K/yr range), and SaaS
      compliance category benchmarks. No Drata revenue, expansion, or churn data is publicly
      available. Node detail values are order-of-magnitude estimates for illustrative purposes only.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI007
      - CI008
    data:
      nodes:
        - id: new-logo
          label: "New Customer Signed"
          detail: "8,000+ cumulative logos; inbound compliance-deadline-driven demand; hybrid PLG + sales-assisted motion"
        - id: initial-contract
          label: "Initial Contract ARR"
          detail: "Estimated $10,000–$100,000/yr depending on tier; Foundation SMB anchor; Enterprise top tier"
        - id: annual-renewal
          label: "Annual Renewal"
          detail: "Auto-renewal cycle; compliance frameworks are sticky once auditor workflows are embedded; switching cost increases with integration depth"
        - id: expansion
          label: "Expansion Revenue"
          detail: "Additional frameworks, TPRM Pro, Risk Management Pro, UAR module, Workspaces, Agentic TPRM Assessment; estimated NRR 110%–130%"
        - id: churn
          label: "Gross Churn"
          detail: "SMB attrition from cost sensitivity or consolidation; switching facilitated if integration count is low; rate not disclosed"
        - id: net-arr
          label: "Net ARR (Estimated)"
          detail: "Estimated $80M–$250M total; base case ~$150M; growth rate not disclosed; expansion modules widen NRR above 100% if adopted"
      edges:
        - from: new-logo
          to: initial-contract
          label: "Sales close"
        - from: initial-contract
          to: annual-renewal
          label: "12-month auto-renewal"
        - from: annual-renewal
          to: expansion
          label: "Upsell / cross-sell motion"
        - from: expansion
          to: churn
          label: "Net of attrition"
        - from: churn
          to: net-arr
          label: "= Retained + Expansion − Lost"

  - id: FI002
    title: Unit Economics Bridge
    type: flow
    layout: standard
    summary: >
      Illustrates the estimated unit economics path from customer acquisition cost through payback
      period to lifetime value, showing the compounding effect of expansion revenue on LTV/CAC
      efficiency. All values are inferred estimates using SaaS compliance category benchmarks;
      no Drata-specific unit economics have been publicly disclosed. The bridge highlights the
      central diligence question: whether Drata's NRR is sufficient to drive a 3x+ LTV/CAC ratio
      at scale.
    approximationNotes: >
      CAC, payback, NRR, and LTV figures are estimated using SaaS compliance category benchmarks
      (OpenView, BVP cloud indices, Bessemer cloud benchmarks) and G2 buyer-reported data from
      16 Drata purchases. No Drata management disclosures confirm or deny any of these estimates.
      Inputs are highly uncertain; LTV/CAC estimate carries multiplicative uncertainty from all
      upstream variables.
    claimRefs:
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
    data:
      nodes:
        - id: cac
          label: "Customer Acquisition Cost (CAC)"
          detail: "SMB: $5,000–$15,000 estimated; Enterprise: $30,000–$80,000 estimated; blended mix unconfirmed"
        - id: first-year-revenue
          label: "Year 1 Gross Revenue"
          detail: "Initial ACV: $10,000–$100,000 depending on tier; G2 data suggests $10K–$50K for SMB; enterprise higher"
        - id: payback
          label: "CAC Payback Period"
          detail: "Estimated 12–24 months SMB; 18–36 months enterprise; G2 buyer ROI of 11 months partially consistent"
        - id: nrr-expansion
          label: "NRR-Driven Expansion (Year 2+)"
          detail: "Estimated NRR 110%–130%; expansion from modules and frameworks builds cumulative ARR per cohort"
        - id: ltv
          label: "Customer Lifetime Value (LTV)"
          detail: "Estimated $25,000–$300,000; assumes 3–5 year average customer life and 70–85% gross margin"
        - id: ltv-cac-ratio
          label: "LTV / CAC Ratio"
          detail: "Estimated 3x–8x; 3x is category minimum healthy; 8x is best-in-class; unconfirmed for Drata"
      edges:
        - from: cac
          to: first-year-revenue
          label: "Sales investment → first contract"
        - from: first-year-revenue
          to: payback
          label: "Gross margin recovery"
        - from: payback
          to: nrr-expansion
          label: "Post-payback compounding"
        - from: nrr-expansion
          to: ltv
          label: "Cumulative lifetime revenue"
        - from: ltv
          to: ltv-cac-ratio
          label: "LTV ÷ CAC efficiency multiple"

  - id: FI003
    title: Financial Estimate Range
    type: range
    layout: wide
    summary: >
      ARR range estimates for Drata as of 2026 across three scenarios: conservative (8,000 customers
      at ~$10K ARPU with minimal expansion), base case (mixed tier and enterprise contribution with
      moderate NRR), and optimistic (enterprise-heavy customer mix with high NRR). All scenarios are
      inferred estimates; Drata has not disclosed ARR or revenue publicly. The wide range reflects
      genuine uncertainty about customer tier mix, enterprise penetration, NRR, and expansion adoption.
      The mid-point of the base case ($150M) corresponds to a valuation multiple of approximately
      13x ARR on the $2B Series C valuation, consistent with high-growth compliance SaaS comps.
    approximationNotes: >
      ARR estimates derived from: (1) 8,000+ customers (company-claimed) × ARPU assumptions;
      (2) revenue per employee proxy (600–1,000 employees × $150K–$200K benchmark); and (3)
      SaaS compliance category comparable multiples. G2 buyer data (16 purchases) provides a
      partial anchor for ARPU range. All estimates are order-of-magnitude; actual ARR could fall
      outside the stated ranges if customer mix, pricing, or churn differs materially from
      benchmark assumptions.
    claimRefs:
      - CI031
      - CI032
      - CI033
      - CI038
    data:
      items:
