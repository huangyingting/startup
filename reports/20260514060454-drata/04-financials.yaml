  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: arr-and-revenue
      missingEvidence: "Drata has not disclosed ARR, revenue, revenue growth rate, or any revenue proxy in any public communication, SEC filing, or press release as of May 2026. All ARR estimates in this chapter (QI001, QI002) are inferred from customer count × ARPU benchmarks and revenue per employee proxies. The resulting estimate range ($80M–$250M) is wide enough to span multiple investment thesis scenarios."
      whyItMatters: "Without confirmed ARR, it is impossible to validate Drata's $2B valuation, assess competitive position versus Vanta ($2.45B valuation, similar stage), or determine growth trajectory. A revenue figure at the low end of the range ($80M) implies a 25x ARR multiple on the Series C—elevated even for high-growth SaaS. A revenue figure at the high end ($250M) implies 8x ARR, which is more reasonable. The uncertainty directly affects terminal value calculations."
      diligencePath: "Request current-quarter and trailing-twelve-month ARR from Drata data room; request quarterly ARR cohort data going back to Series B (Nov 2021); request customer count by tier (Foundation/Advanced/Enterprise) to validate ARPU assumptions"
      relatedQuestionRefs: [QI001, QI002]
      relatedTableRefs: [TI003, TI005]

    - type: private-evidence-only
      severity: critical
      topic: burn-rate-and-runway
      missingEvidence: "No burn rate, monthly cash consumption, or projected runway data has been disclosed publicly for Drata. The estimated $40M–$50M annual burn (QI009) is derived from headcount × compensation benchmarks and may significantly understate actual burn if Drata carries heavy S&M spend, deferred compensation, or elevated infrastructure costs from AI inference workloads."
      whyItMatters: "Without confirmed burn data, capital adequacy cannot be assessed. The 2025 round may represent distressed fundraising, routine capital refresh, or early IPO preparation—these scenarios have materially different implications for investment risk. A runway of less than 18 months would indicate near-term financing dependency."
      diligencePath: "Request current monthly burn rate and trailing twelve-month average; request 12-month forward burn forecast; confirm whether the 2025 round amount is sufficient to fund planned operations to profitability or next financing event"
      relatedQuestionRefs: [QI009, QI022]
      relatedTableRefs: [TI004, TI005]

    - type: private-evidence-only
      severity: material
      topic: nrr-and-churn
      missingEvidence: "Drata has not disclosed NRR, gross churn, logo churn, or expansion rate in any public communication. The estimated NRR of 110%–130% is derived entirely from compliance SaaS category benchmarks. Actual NRR could be below 100% if SMB churn is elevated due to cost sensitivity or platform consolidation (customers using Vanta's lower-entry-point tier instead)."
      whyItMatters: "NRR is the primary driver of LTV/CAC efficiency and revenue quality. Below-100% NRR implies that Drata must continuously acquire new logos just to maintain flat ARR, compressing growth efficiency. An NRR above 120% implies strong expansion economics that could support 8x+ LTV/CAC and a premium valuation."
      diligencePath: "Request NRR by cohort year; request gross logo churn rate; request expansion revenue as a percentage of opening ARR; compare NRR to Vanta if Vanta data is available in secondary research"
      relatedQuestionRefs: [QI013]
      relatedTableRefs: [TI003, TI005]

    - type: private-evidence-only
      severity: material
      topic: 2025-round-terms
      missingEvidence: "The 2025 SEC Form D lists 77 investors and 126,834,036 securities sold but declines to disclose the dollar amount. The round structure (primary vs. secondary; valuation; liquidation preferences; investor composition) is entirely unknown from public sources. The 77-investor count is unusually high for a primary institutional round, which typically involves 1–5 lead investors and 5–15 total participants."
      whyItMatters: "The round structure directly affects cap table complexity, liquidation preferences, and exit waterfall. A primarily secondary transaction (founders or early employees selling) provides no capital to the company. A structured down-round with liquidation preference ratchets could disadvantage future investors. The high investor count may indicate a fragmented cap table that complicates future governance."
      diligencePath: "Request complete 2025 round documentation including: term sheet, closing document, investor schedule, primary vs. secondary split, price per share, post-money valuation, and any associated rights (information rights, pro-rata, anti-dilution)"
      relatedQuestionRefs: [QI022, QI011]
      relatedTableRefs: [TI004, TI005]

