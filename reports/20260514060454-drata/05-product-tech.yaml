chapter:
  number: 5
  title: Product & Technology
  summary: >
    Drata's Agentic Trust Management Platform is organized around four product pillars—Automated
    Governance, Integrated Risk Management, Continuous Compliance, and Accelerated Assurance—with an
    AI layer (questionnaire assistance, agentic TPRM) layered on top and a 250+ integration ecosystem
    as the data collection engine. The platform is hosted on AWS and GCP with a Zero Trust
    architecture, supports 10+ compliance frameworks (SOC 2, ISO 27001, ISO 42001, HIPAA, GDPR, PCI
    DSS, FedRAMP, DORA, NIS2, CMMC), and publishes 250+ pre-built connectors via REST API, OAuth, and
    webhooks. Core compliance automation is mature and GA after 5+ years; Trust Center (from SafeBase
    acquisition) and AI questionnaire assistance are GA; Agentic TPRM launched at RSA in March 2026 as
    early-stage GA; a full UX redesign ("New Drata Experience") entered opt-in beta in late 2025 with
    broader rollout underway in 2026. Drata's GitHub org shows active infrastructure-as-code repos
    (GCP Terraform, AWS CloudFormation, FedRAMP 20x tooling), a published Drata Agent, and a
    compliance-as-code-action, confirming an engineering-led developer surface. Key technical
    diligence gaps are: LLM vendor identity undisclosed, no published uptime SLA, and roadmap beyond
    announced 2026 features is private.

sections:
  - id: platform-overview
    title: Platform Overview and Product Module Map
    body: >
      Drata markets itself as the "Agentic Trust Management Platform"—a term adopted at RSA 2026 to
      reflect an expanded scope beyond compliance automation into AI-driven governance, risk, and
      assurance. The platform is purchased as a SaaS subscription and delivers value across a
      customer's compliance lifecycle: connecting to existing infrastructure tools, automatically
      collecting evidence, mapping controls to one or more frameworks, and keeping a continuous
      real-time compliance posture dashboard. The four named product pillars are Automated Governance
      (policy management, access reviews, task ownership), Integrated Risk Management (internal and
      third-party risk register and treatment), Continuous Compliance (control monitoring, evidence
      collection, framework mapping), and Accelerated Assurance (security hubs, Trust Center, AI
      questionnaire automation). Each pillar corresponds to a distinct buyer job: GRC teams use
      Continuous Compliance for audit prep; security and procurement teams use IRM and TPRM for
      vendor risk; sales-facing teams use Trust Center and AI questionnaires to accelerate deal
      reviews. Drata supports 10+ compliance frameworks natively: SOC 2 Types I and II, ISO 27001,
      ISO 42001 (AI governance), HIPAA, GDPR, CCPA, PCI DSS, FedRAMP, DORA, NIS2, and CMMC, plus a
      custom framework builder for tailored control mappings. The help center exposes the breadth of
      product coverage through its article count: 262 articles on platform features, 67 on framework
      information, 218 on connection support, 42 on policy guidance, 33 on personnel management, and
      168 on monitoring test guidance. The Trust Center product originated from Drata's acquisition of
      SafeBase (approximately 2023) and provides an external-facing portal for sharing verified
      security posture with prospects and customers—a capability that competitors have subsequently
      moved to replicate.
