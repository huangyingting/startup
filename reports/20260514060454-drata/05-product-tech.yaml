  - id: roadmap-maturity
    title: Roadmap, Product Maturity, and Development Trajectory
    body: >
      As of May 2026, Drata's product development trajectory shows three waves. The first wave
      (2021–2023) established compliance automation as the core product with SOC 2 automation, ISO
      27001, HIPAA, and the initial integration ecosystem. The second wave (2023–2025) added
      enterprise-grade capabilities: IRM, custom frameworks, FedRAMP support, Trust Center via the
      SafeBase acquisition, AI questionnaire assistance, DORA, NIS2, and CMMC. The third wave (2026
      onwards) is defined by agentic AI: the Agentic TPRM Assessment launched at RSA in March 2026
      is the flagship new capability; the New Drata Experience (full UX redesign from a new design
      system and technology stack built in twelve months) is in opt-in beta with broader rollout
      underway; Drata MCP enables AI agents to interact with the platform via natural language; and
      ISO 42001 (AI governance) positions Drata to serve customers who must comply with AI-specific
      regulatory frameworks. The engineering blog (VPE Data, May 2026) describes a shift "from prompt
      engineering to harness engineering," signaling maturation of the AI implementation from
      experimental to production-hardened. The May 2026 product update (AWS/GCP/Azure connection
      scoping) reflects ongoing incremental product investment in core compliance automation. Key
      product uncertainties are: the LLM vendor powering AI features is undisclosed (model risk),
      specific Agentic TPRM accuracy metrics are unpublished, and the full 2026 roadmap beyond
      announced features is not public.
    claimRefs:
      - CE035
      - CE036
      - CE037
      - CE038
      - CE039
      - CE040
