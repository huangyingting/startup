  - id: trust-security-compliance
    title: Trust, Security, Privacy, and Compliance Controls
    body: >
      Drata eats its own cooking: the company uses its own compliance automation platform to maintain
      SOC 2 Type II certification and ISO 27001 certification for its own product, and publishes its
      security posture via its Trust Center. The security page confirms monitoring of 100+ security
      controls, continuous detection and response with 24/7 automated capabilities, a DevSecOps
      forward software development lifecycle (SAST during CI/CD, credential checking, OWASP Top 10
      training), and phishing-resistant WebAuthn MFA for all sensitive internal systems. Network
      protections include a WAF, Content Security Policy headers, DNSSEC against domain spoofing, and
      DDoS mitigation at both CDN and cloud-provider layers. Endpoint controls include MDM with
      hardened configurations and endpoint detection and response (EDR). Red team testing is conducted
      both internally and with third parties. A public Vulnerability Disclosure Program (VDP) is
      accessible from the security page. Data is encrypted at rest and in transit. Authorized third-
      party sub-processors are listed in the Trust Center sub-processor registry.

      AICPA's SOC framework and ISO 27001 are the two primary trust anchors Drata publishes. The
      company also supports FedRAMP (GA) and maintains a FedRAMP 20x public GitHub repository,
      suggesting active investment in U.S. government customer compliance. GDPR sub-processor
      transparency satisfies European data privacy obligations. Peer code review, IaC security scans,
      anomaly detection via GuardDuty and Google Security Center, and Cloud Security Posture
      Management all appear in the security page narrative. The status page at status.drata.com is
      publicly accessible, providing real-time service status, but no contractual uptime SLA is
      published in public-facing documentation. The AICPA's SOC 2 framework is the most commonly
      sought compliance attestation by Drata's SMB-to-mid-market customers, and Drata's own
      certification under it is a strong trust signal.
    claimRefs:
