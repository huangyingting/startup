  evidenceGaps:
    - type: missing-source
      severity: material
      topic: reliability
      missingEvidence: >
        Contractual uptime SLA percentage, historical uptime data, and incident frequency/
        severity statistics for the Drata platform.
      whyItMatters: >
        Enterprise customers with strict availability requirements need contractual SLA
        guarantees. The absence of a public SLA is a gap in the trust-but-verify profile and
        could block enterprise procurement for compliance-critical use cases where platform
        downtime could result in audit evidence gaps.
      diligencePath: >
        Request enterprise MSA or order form from Drata sales; review service level terms in
        standard subscription agreements; ask for historical uptime data from last 12 months.
      relatedQuestionRefs:
        - QE023

    - type: private-evidence-only
      severity: material
      topic: ai-architecture
      missingEvidence: >
        Identity of LLM provider(s) powering AI Questionnaire Assistance and Agentic TPRM,
        contractual terms governing data processing by the LLM provider, and error rate
        metrics for AI-generated questionnaire responses.
      whyItMatters: >
        Undisclosed LLM vendor creates model dependency and data privacy risk. Customer security
        posture data transmitted to a third-party LLM provider must be covered by appropriate
        DPAs and contractual controls, especially under GDPR. Error rates in AI questionnaire
        responses are a direct product quality metric.
      diligencePath: >
        Request LLM vendor identity from Drata management; review data processing addenda for
        the AI features; request accuracy/error rate benchmarks for questionnaire assistance
        from product team.
      relatedQuestionRefs:
        - QE024

    - type: private-evidence-only
      severity: minor
      topic: roadmap
      missingEvidence: >
        Drata's full internal 2026 product roadmap beyond the publicly announced features
        (Agentic TPRM, New Drata Experience, MCP, WCAG).
      whyItMatters: >
        Knowing the full roadmap horizon helps assess whether Drata's innovation velocity is
        sufficient to maintain competitive advantage as competitors (Vanta, Secureframe) catch up
        on integration depth and AI features.
      diligencePath: >
        Request product roadmap briefing from Drata VP Product during diligence; review
        customer advisory board materials if available; analyze job posting keywords for
        emerging capability signals.
      relatedQuestionRefs:
        - QE025

