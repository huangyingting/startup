  - id: architecture-and-integrations
    title: Technical Architecture, Integration Ecosystem, and Developer Surface
    body: >
      Drata operates as a cloud-native SaaS platform hosted on Amazon Web Services (AWS) and Google
      Cloud Platform (GCP), confirmed on the security page. The company applies Zero Trust network
      architecture principles across its internal access controls, uses WebAuthn phishing-resistant
      multi-factor authentication for sensitive system access, deploys a Web Application Firewall at
      the CDN layer plus DDoS mitigation at both application and network layers, encrypts data at rest
      and in transit using "known strong protocols and ciphers," and uses AWS GuardDuty plus Google
      Security Center plus third-party services for anomaly detection. Infrastructure changes use
      Infrastructure as Code (IaC) with peer reviews, IaC vulnerability security scanning, and
      compliance-as-code compliance scans—all practices Drata publicly demonstrates through its own
      GitHub repositories (drata/aws-cloudformation-drata-setup, drata/gcp-terraform-drata-setup,
      drata/compliance-as-code-action).

      The integration layer is the deepest competitive differentiator by breadth. Drata advertises
      250+ pre-built connectors across cloud infrastructure (AWS, GCP, Azure including per-account/per-
      project scoping as of May 2026), identity providers (Okta, Auth0), CI/CD (GitHub, GitLab),
      project management (Jira, ServiceNow), HR (Rippling, BambooHR), monitoring (Datadog,
      PagerDuty), and endpoint protection (CrowdStrike, SentinelOne). The developer portal exposes a
      public REST API (v2) for programmatic control, a Custom Connections builder for on-premise or
      bespoke tool integration, Custom Workflows (triggers and actions for compliance automation), a
      SafeBase Trust API for programmatic trust center management, and a Drata MCP (Model Context
      Protocol) integration that allows AI agents to interact with Drata in natural language. The
      GitHub organization maintains 10+ public repositories including a Drata Agent desktop
      application (endpoint monitoring), GCP shell setup scripts, AWS CloudFormation templates,
      FedRAMP 20x tooling, and an integrations-extras repo (Python, BSD-3-Clause, 839 stars). The
      react-data-table-component repo (TypeScript, Apache-2.0, 422 stars) reflects internal UI
      library contributions to the open-source ecosystem.
