  - id: TE003
    title: Technology and Operating Architecture Table
    columns:
      - Layer / Component
      - Technology / Vendor
      - Role
      - Risk Flag
    rows:
      - - Cloud infrastructure
        - Amazon Web Services (AWS) + Google Cloud Platform (GCP)
        - Primary hosting for all customer data, compute, and storage
        - Dual-cloud dependency; pricing exposure if either vendor raises rates; outage
          correlation risk if both experience simultaneous issues
      - - Network security
        - Zero Trust architecture; WAF at CDN layer; DDoS mitigation (CDN + cloud provider)
        - Prevents unauthorized lateral movement; blocks application-layer attacks
        - ZT implementation complexity; CDN vendor identity not disclosed
      - - Authentication / access control
        - WebAuthn phishing-resistant MFA; SAML/SSO (Okta-compatible)
        - Identity and access control for internal systems and customer-facing SSO
        - Customer SSO dependent on Okta or compatible IdP availability
      - - CI/CD security
        - SAST (code security scanning during CI/CD); credential checking; OWASP Top 10 training
        - Secure software development lifecycle; prevents secrets leakage and common vulns
        - Specific SAST tooling vendor not disclosed
      - - Endpoint security
        - MDM + EDR (vendor names not disclosed)
        - Device management and endpoint detection/response for remote-first employee base
        - Undisclosed vendor dependency; no public configuration baseline
      - - Integration / API layer
        - REST API v2 (OAuth, webhooks); Custom Connections; SafeBase Trust API; Drata MCP
        - 250+ pre-built connectors; extensible integration layer for bespoke tools
        - Breaking changes in third-party APIs can disable evidence collection; requires
          ongoing connector maintenance
      - - AI / LLM layer
        - Large Language Models (vendor undisclosed)
        - Powers AI Questionnaire Assistance and Agentic TPRM risk scoring
        - LLM provider identity and model version not disclosed; hallucination risk in
          questionnaire responses; vendor concentration risk
      - - Monitoring / threat detection
        - AWS GuardDuty; Google Security Center; third-party SIEM/services; Cloud Security
          Posture Management (CSPM)
        - Anomaly detection; cloud misconfiguration alerts; incident detection
        - Dependent on cloud-native tooling that may miss cross-cloud lateral movement
    notes: >
      Architecture details are sourced from Drata's public security page (drata.com/security),
      GitHub repository contents, and developer portal. Specific vendor names for MDM, EDR,
      SAST, CDN, and LLM providers are not publicly disclosed; entries reflect the function
      confirmed, not the vendor name. "Undisclosed" entries are diligence gaps, not
      confirmed absences.
