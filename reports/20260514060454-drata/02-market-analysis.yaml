  - id: competitive-landscape-and-market-context
    title: Competitive Landscape and Market Context
    body: >
      The GRC and compliance automation market is segmented into two distinct tiers. The enterprise
      tier is dominated by established platforms: ServiceNow GRC (IRM suite sold into large
      enterprises), IBM OpenPages (AI-powered GRC for regulated industries), MetricStream (risk
      management for financial services and healthcare), and OneTrust (privacy management expanding
      into GRC). These platforms typically sell six-figure annual contracts to companies with 1,000+
      employees, established GRC teams, and complex multi-jurisdictional risk programs. They are
      generally not direct competitors to Drata at the growth-stage SaaS buyer segment.

      The cloud-native compliance automation tier—Drata's primary competitive arena—includes Vanta
      (16,000+ customers, $1.6B reported valuation), Secureframe (6,000+ customers), Hyperproof
      (mid-market focus), and SecurityScorecard (adjacent vendor risk management). Gartner named
      Optro (formerly AuditBoard, now rebranded) a Leader in its 2025 Magic Quadrant for GRC Tools,
      confirming the maturation of cloud-native GRC into an analyst-recognized market category.
      Drata differentiates through its 8,000+ customer scale, breadth of framework coverage
      (including ISO 42001 and CMMC), the SafeBase trust center acquisition, and its March 2026
      repositioning as the Agentic Trust Management Platform. The status-quo competitor—the
      manual spreadsheet—remains the largest single share of the non-automated compliance market,
      representing the primary greenfield expansion opportunity across all segments.
    claimRefs:
      - CM029
      - CM030
      - CM031
