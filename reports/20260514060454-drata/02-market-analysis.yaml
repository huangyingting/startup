callouts:
  - calloutType: risk
    title: Wide Variance in GRC Market Estimates Creates TAM Uncertainty
    body: >
      The three major analyst firms covering the GRC market (MarketsAndMarkets, Grand View Research,
      Mordor Intelligence) publish estimates that diverge by up to 54% for the same year and
      geography. All three reports were inaccessible at time of research (paywalled, blocked, or
      returning 404). This means Drata's headline TAM claims cannot be independently verified from
      primary analyst sources. The compliance automation sub-segment Drata directly addresses
      ($600M–$1.5B) has no published independent sizing at all—it is derived entirely from
      competitive inference. Diligence should not rely on GRC headline figures as a proxy for
      Drata's actual addressable market.
    claimRefs:
      - CM011
      - CM012

  - calloutType: insight
    title: AI Governance Wave Creates New Compliance Automation TAM Expansion
    body: >
      ISO 42001 (AI management systems) and the EU AI Act (full applicability August 2026) represent
      the largest new regulatory compliance wave since GDPR. Companies deploying AI systems will need
      to certify AI governance programs against these standards, creating a new buyer cohort with no
      established compliance automation playbook. Drata's pivot to the Agentic Trust Management
      Platform positions it to capture this wave—but it requires that Drata develop certified
      framework coverage and auditor relationships for ISO 42001 before incumbents do.
    claimRefs:
      - CM022
      - CM030

  - calloutType: risk
    title: Commoditization Risk is Active in Core SOC 2 Automation Workflow
    body: >
      Vanta, Secureframe, Hyperproof, and several other funded startups offer competing SOC 2 and
      ISO 27001 automation at comparable feature sets. Average selling prices for basic compliance
      automation packages have compressed as the market matures. Drata must sustain pricing through
      differentiation in AI capabilities, framework breadth, TPRM adjacency, and enterprise-grade
      trust management rather than relying on core SOC 2 automation alone. Evidence of ASP trends
      should be a priority diligence item.
    claimRefs:
      - CM028
      - CM031

