    title: Valuation Sensitivity — ARR Scenarios vs. Multiple
    type: bar
    layout: wide
    summary: >-
      The bar chart shows implied Drata valuations across three ARR scenarios ($80M, $150M, $250M)
      and three multiple tiers (10x, 15x, 20x ARR). The base case cluster ($150M ARR, 10-15x multiple)
      generates $1.5-2.25B — roughly consistent with the stale $2B reference price at the high end.
      The bull case cluster ($250M ARR, 15-20x) produces $3.75-5.0B, requiring both ARR outperformance
      and multiple re-rating. The bear case ($80M ARR, 10x) implies only $800M, a 60% discount to the
      $2B reference price, underscoring the valuation risk of undisclosed financial underperformance.
