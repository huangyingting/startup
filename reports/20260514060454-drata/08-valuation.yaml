  - id: valuation-context-and-scenarios
    title: Valuation Context and Scenarios
    body: >-
      Drata's last publicly confirmed valuation is $2B from the November 2022 Series C, a round
      that closed at the apex of the 2021-2022 SaaS valuation cycle when compliance automation
      companies commanded 15-30x ARR multiples. The subsequent 2024-2026 SaaS multiple reset
      has normalized comparable-stage private company valuations to 6-15x ARR. At a mid-point
      ARR estimate of $130-150M growing at 30%+, a 10-15x multiple implies a $1.3-2.25B range —
      broadly consistent with the $2B Series C valuation if growth remains strong. However, if
      growth has decelerated to 20-25% (common at this stage for SMB-heavy companies) and ARR
      is closer to $100M, the fair value range compresses to $0.7-1.5B, implying the existing
      $2B valuation is stretched.

      The comparable set includes Vanta (private, ~$1.6B 2022 valuation, estimated $100M+ ARR);
      AuditBoard (acquired by Hg Capital at ~$3B, approximately $150-200M ARR at time of sale,
      implying ~15-20x ARR); OneTrust ($9.7B 2021 peak, broader privacy and trust scope, significant
      valuation markdown implied by delayed IPO); Workiva (NYSE: WK, ~$3-4B public market cap,
      ~$700M revenue, ~4-5x revenue multiple — lower due to public market discount and different
      growth profile); ServiceNow GRC module (part of ~$170B ServiceNow market cap; not a discrete
      comparable); and LogicGate (~$500M 2021 estimate, smaller and narrower scope).

      The AuditBoard acquisition at ~$3B is the most directly relevant M&A comparable because
      it represents a sophisticated PE buyer (Hg Capital) applying a DCF-anchored multiple to
      an enterprise compliance SaaS business with similar customer segments, framework support,
      and revenue scale. If Drata has achieved AuditBoard-comparable ARR ($150-200M), a similar
      acquisition multiple would support valuations of $2.25-3.75B. The downside risk is a
      scenario where Drata's ARR has not kept pace with its 2022 valuation, in which case the
      same acquirers would apply a 10-12x ARR multiple to a $80-100M ARR base, implying $800M-1.2B.

      The 2025 round's undisclosed valuation is critical context: if it was raised flat or down
      versus the $2B Series C, that would be a material signal of eroding investor confidence.
      If it was raised up-round at $2.5B+, it validates the bull case trajectory. Without
      disclosure, the uncertainty must be explicitly priced into any investment decision.
