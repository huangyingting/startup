  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Confirmed down-round valuation
        - >-
          2025 round or any future round disclosed at valuation below $1.5B
        - >-
          Directly invalidates base case ($1.5-2.5B defensible) and signals investor consensus
          that Drata has not grown into its $2B Series C price. Implies ARR or NRR
          underperformance and/or severe multiple compression.
        - >-
          Immediately re-evaluate at new valuation. If round was at $1.5B or below,
          recalculate return profile; thesis may still hold at lower entry but requires
          re-underwriting.
      - - Disclosed NRR below 100%
        - >-
          Any official or data room disclosure of NRR < 100% (net revenue churn)
        - >-
          NRR below 100% means Drata is losing revenue from existing customers faster
          than it is expanding. Compliance automation with NRR <100% implies high SMB
          churn, pricing pressure, or competitive displacement — all of which undermine
          the integration moat thesis.
        - >-
          Thesis break. Do not invest. Existing investors should evaluate position sizing
          and exit options. NRR below 100% at this stage is a material red flag for SaaS.
      - - Customer base below 6,000 (net decline from 8,000+)
        - >-
          Disclosed or inferred customer count below 6,000 in any 2026+ data point
        - >-
          Customer count decline from 8,000+ implies significant net churn, likely from
          SMB base consolidating on Vanta or exiting the compliance market entirely.
          This would also reduce the integration moat value (fewer paying customers
          to justify 250+ connector maintenance).
        - >-
          Thesis break on customer scale pillar. Re-examine integration moat defensibility
          and enterprise upsell pipeline. Likely triggers a full re-underwriting.
      - - Vanta fundraises at $3B+ valuation
        - >-
          Vanta announces a new round at post-money valuation of $3B or higher in 2026-2027
        - >-
          Signals that the market perceives Vanta as the category winner at a premium to
          Drata's last known $2B. Creates urgency for Drata to disclose financials, raise
          at a comparable valuation, or accept being valued as the #2 player at a discount.
        - >-
          Monitor for Drata's response: counter-raise, IPO S-1 filing, or silence. If Drata
          cannot match Vanta's fundraise narrative, probability of bear case increases.
      - - Platform security breach
        - >-
          Credible public disclosure of unauthorized access to customer compliance evidence
        - >-
          Directly destroys the core value proposition (trust-and-compliance automation).
          Drata's business model uniquely depends on being more trustworthy than its customers'
          manual processes. A breach triggers immediate customer churn and reputational collapse.
        - >-
          Immediate thesis kill. Exit all positions at market price. No recovery scenario
          for a compliance platform that has suffered a customer evidence breach.
      - - No ARR disclosure by end of 2026
        - >-
          Drata continues to decline revenue disclosure through December 2026 with no
          data room provided to prospective investors
        - >-
          Financial opacity at this scale ($303M raised, ~5 years post-launch) becomes
          a governance concern rather than just a diligence gap. Indicates either
          underperformance that management is concealing or a structural decision to
          remain private indefinitely.
        - >-
          Reduce conviction. Allocate only to follow-on rounds with explicit data room
          rights and pro-rata reserved. Do not lead or co-lead without financial disclosure.
    notes: >-
      Thesis-break triggers are threshold events that would individually or collectively invalidate
      the base case investment thesis. They are not the same as risk factors (which are probability-
      weighted) — they are binary events that would require immediate re-evaluation of the investment
      decision. The NRR threshold of 100% is a hard floor for SaaS companies at Drata's scale and stage;
      any NRR below 100% implies structural problems in the customer base. The platform security breach
      trigger is the only kill trigger that affects existing investors as severely as prospective ones.
    claimRefs:
      - CV022
      - CV026
      - CV027
      - CV028
      - CV033
      - CV039

  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Current ARR and Growth Rate
        - >-
          ARR as of Q4 2025 or Q1 2026; YoY ARR growth rate; monthly/quarterly ARR
          growth trend for the past 8 quarters
        - >-
          The single most material unknown. The entire valuation range ($0.5B-$5.0B)
          collapses to a narrow band once ARR and growth are known. Without ARR,
          it is impossible to apply a defensible multiple to the $2B reference price.
        - >-
          Data room required. Ask: financial statements or revenue schedule; executive
          management presentation with ARR waterfall; finance team confirmation.
      - - Net Revenue Retention (NRR)
        - >-
          Gross revenue retention (GRR) and NRR by cohort for 2022, 2023, 2024;
          SMB vs mid-market vs enterprise NRR split
        - >-
          NRR is the single most predictive metric for long-term SaaS value. Compliance
          automation with NRR >120% warrants premium multiples; NRR <100% is a thesis killer.
          The integration moat thesis requires evidence that customers expand on Drata over time.
        - >-
          Data room required. Ask: cohort retention analysis; customer revenue waterfall
          (logos won, logos lost, expansion, contraction); finance team presentation.
      - - 2025 Round Valuation and Structure
        - >-
          Post-money valuation; preferred share terms; whether round was primary, secondary,
          or structured note; full capitalization table post-2025 round
        - >-
          The 77-investor 2025 round with undisclosed valuation creates fundamental uncertainty
          about current fair value. A down-round would compress entry price; an up-round would
          validate the bull case. Structured notes or secondary components change return mechanics.
        - >-
          Ask management directly and via legal counsel. Request cap table, liquidation waterfall
          model, and most recent 409A valuation. Requires board and management cooperation.
      - - Gross Margin and Unit Economics
        - >-
          Gross margin %; CAC by channel (inbound vs outbound vs partner); CAC payback
          period; LTV/CAC ratio; contribution margin by customer segment
        - >-
          Gross margin determines how much of ARR growth converts to equity value. At 70-85%
          gross margin, Drata can scale efficiently. Below 65% (e.g., high implementation costs
          for enterprise), the multiple compression is significant. Unit economics confirm
          whether the enterprise GTM transition is accretive or dilutive to margins.
        - >-
          Data room required. Ask: P&L with COGS breakdown; sales and marketing spend by
          channel; CRM data export with CAC attribution; finance team unit economics model.
      - - SafeBase Integration Status and Churn
        - >-
          SafeBase customer count pre/post acquisition; integration timeline; SafeBase-specific
          churn since acquisition; revenue attribution from SafeBase customers
        - >-
          The SafeBase acquisition (~$250M) was a major capital deployment. If SafeBase customers
          are churning due to integration friction or feature regression, the acquisition has
          destroyed value. The integration status directly affects the GRC+A platform thesis
          and the 8,000+ customer count's quality.
        - >-
          Data room required. Ask: SafeBase customer count and retention since acquisition;
          product integration roadmap with milestone dates; engineering head for integration status.
      - - Burn Rate and Runway
        - >-
          Monthly/quarterly cash burn; cash and equivalents as of Q1 2026; projected runway
          at current burn; path to breakeven or cash flow positive
        - >-
          With $303M+ raised and the 2025 round adding ~$127M, total capital is approximately
          $430M+. If Drata is burning $50-80M/year, runway is 5-8 years. If burning $100M+/year,
          the next raise becomes a near-term strategic constraint. Burn rate directly affects
          negotiating leverage in any M&A or IPO process.
        - >-
          Data room required. Ask: monthly bank statement summaries; CFO-attested burn rate;
          12-month cash flow forecast; confirmation of primary banking relationship and
          any SVB/bank-risk exposure.
      - - Auditor Partner Concentration
        - >-
          Top 10 auditor partners by customer volume referred; revenue attributable to
          top 3 audit firms; any exclusivity or preferred partner arrangements
        - >-
          1,300+ auditor partners is cited as a key distribution moat. If 50%+ of
          referrals flow through 5 or fewer audit firms, the moat is narrower than
          stated and concentration risk is high. A preferred partner arrangement with
          a Big 4 firm would be a major positive signal.
        - >-
          Ask in management channel references and partner program documentation.
          Review auditor partner portal terms. Request revenue attribution by partner source.
    notes: >-
      All diligence asks require formal data room access or management cooperation; none can be
      resolved from public sources. Priority order for a prospective investor: (1) ARR and growth
      rate, (2) NRR, (3) 2025 round structure, (4) gross margin, (5) burn rate, (6) SafeBase
      integration status, (7) auditor partner concentration. Items 1-3 are blocking — the investment
      decision cannot proceed without them. Items 4-7 are important but not individually blocking if
      items 1-3 are satisfactory.
    claimRefs:
      - CV019
      - CV020
      - CV026
      - CV027
      - CV033
      - CV037
      - CV039

figures:
  - id: FV001
    title: Recommendation Logic Flow
    type: flow
    layout: wide
    summary: >-
      The recommendation logic flows from four evidence pillars — market position, product moat,
      financial scale, and financial opacity — through an intermediate valuation context node
      that synthesizes the comparables and scenario analysis, then converges on the conditional
      pass recommendation. Competitive risk enters as a parallel adverse signal that directly
      modifies the recommendation without flowing through the valuation context. The result is
      a conditional pass requiring data room access rather than a binary invest or pass decision.
    data:
      nodes:
        - id: market-position
          label: "Category Leadership"
          detail: "#1-2 in compliance automation; 8,000+ customers; GRC+A rebrand"
        - id: product-moat
          label: "Integration Moat"
          detail: "250+ connectors; 1,300+ auditor partners; SafeBase trust management"
        - id: financial-scale
          label: "Funding & Scale"
          detail: "$303M+ raised; ~$127M 2025 round; 1,000 employees; global presence"
        - id: financial-opacity
          label: "Financial Opacity"
          detail: "No ARR/NRR/margin disclosure; $2B valuation stale since Nov 2022"
        - id: competitive-risk
          label: "Competitive Risk"
          detail: "Vanta at near-parity; SaaS multiple compression 2022-2026; Vanta ~$1.6B"
        - id: valuation-context
          label: "Valuation Context"
          detail: "Base $1.5-2.5B; Bull $3-5B; Bear $0.5-1B; $2B defensible only with ARR confirmation"
        - id: recommendation
          label: "Conditional Pass"
          detail: "Data room required; do not invest at $2B without ARR ≥$120M, NRR ≥110% confirmed"
      edges:
        - from: market-position
          to: valuation-context
          label: "supports $1.5B+ floor"
        - from: product-moat
          to: valuation-context
          label: "premium vs. peers"
        - from: financial-scale
          to: valuation-context
          label: "validates investment grade"
        - from: financial-opacity
          to: recommendation
          label: "blocking uncertainty"
        - from: competitive-risk
          to: recommendation
          label: "downside pressure"
        - from: valuation-context
          to: recommendation
          label: "entry discipline required"
    claimRefs:
