  evidenceGaps:
    - id: EGV001
      title: Drata ARR, NRR, and Financial Metrics Undisclosed
      description: >-
        Drata has not disclosed ARR, NRR, gross margin, or burn rate in any public communication
        since a February 2025 statement that the company was "nearing $100M ARR." This creates
        a fundamental valuation uncertainty that cannot be resolved without data room access.
        All financial estimates in this chapter are inferred from comparable company trajectories,
        SEC filing data, and secondary market intelligence rather than primary financial disclosure.
      impact: high
      relatedQuestionRefs:
        - QV017
        - QV018
        - QV028
      relatedTableRefs:
        - TV004
      type: private-evidence-only
      severity: material
      topic: financial-disclosure
      missingEvidence: >-
        ARR as of Q4 2025 or Q1 2026; YoY ARR growth rate for 2023, 2024, and 2025; NRR by
        cohort and customer segment; gross margin %; monthly burn rate and runway; 2025 round
        term sheet, post-money valuation, and updated capitalization table.
      whyItMatters: >-
        Without ARR and NRR, it is impossible to apply a defensible multiple to the $2B
        reference price or determine whether Drata is growing toward or away from its
        last known valuation. The entire valuation range ($0.5B-$5.0B) collapses to a
        narrow band once primary financial metrics are known. This is the blocking gap
        for any investment decision.
      diligencePath: >-
        Formal data room request via lead investor (ICONIQ Growth) or CFO channel; NDAs
        required; minimum data room contents: audited financial statements (2023-2025),
        unaudited Q1 2026 management accounts, ARR waterfall, NRR cohort analysis, cap
        table, and 2025 round documentation.

    - id: EGV002
      title: 2025 Round Valuation and Structure Unknown
      description: >-
        The 2025 SEC Form D filing confirms $126.8M raised from 77 investors but does not
        disclose post-money valuation or round structure (primary equity, structured notes,
        secondary transaction, or mixed). This creates uncertainty about whether Drata has
        raised at a premium to the $2B Series C (bull signal), at flat (neutral signal),
        or below (bear signal). The 77-investor count is unusual and may reflect a structured
        or secondary component not typical of a clean institutional growth round.
      impact: high
      relatedQuestionRefs:
        - QV018
        - QV027
        - QV015
      relatedTableRefs:
        - TV001
        - TV003
      type: private-evidence-only
      severity: material
      topic: round-structure
      missingEvidence: >-
        Post-money valuation of 2025 round; preferred share class and terms; liquidation
        preference and participation rights; whether any portion was secondary (sale of
        existing shares); cap table post-round; 409A valuation as of 2025.
      whyItMatters: >-
        The 2025 round valuation is the most current market signal for Drata's investor-
        consensus value. A down-round triggers bear case re-evaluation; an up-round validates
        bull case. The 77-investor count may also indicate governance complexity that
        complicates future exit consent dynamics.
      diligencePath: >-
        Direct management request for 2025 round documentation; legal counsel review of
        preferred share terms; request full cap table from CFO or general counsel;
        review any convertible notes outstanding from the 2021 initial Form D filing.

    - id: EGV003
      title: Comparable Valuation Table Enumeration Incomplete
      description: >-
        The comparable valuation table (TV004) provides six comparables across compliance
        automation, GRC, and public market references. Enumeration is partial because: (1)
        all private company valuations reflect the most recently disclosed funding round and
        may be 2-4 years stale; (2) Secureframe, Hyperproof, Tugboat Logic, and Laika lack
        sufficient public valuation data; (3) Workiva's revenue mix limits ARR multiple
        precision; and (4) M&A terms beyond headline prices are unconfirmed.
      impact: medium
      relatedQuestionRefs:
        - QV008
        - QV003
        - QV022
      relatedTableRefs:
        - TV004
      type: missing-source
      severity: minor
      topic: comparable-coverage
      missingEvidence: >-
        Updated 2024-2026 private valuations for Vanta and OneTrust; AuditBoard exact ARR
        at acquisition closing; Secureframe and Hyperproof valuation data; Workiva ARR
        breakdown (subscription vs. services); LogicGate post-2021 funding and valuation.
      whyItMatters: >-
        A more complete comparable set would narrow the valuation range and provide higher
        confidence in the bull/base/bear scenario probability weighting. Current enumeration
        is sufficient for indicative analysis but should be refreshed with any data room
        information obtained from Drata or updated market intelligence from analysts.
      diligencePath: >-
        Analyst reports from CB Insights, PitchBook, or Forge Global for private company
        valuation updates; Workiva 10-K for revenue breakdown; Hg Capital investor
        announcements for AuditBoard post-acquisition metrics.

    - id: EGV004
      title: IPO Timeline and Consolidation Scenario Projections Unverifiable
      description: >-
        Drata has not disclosed any IPO timeline, registration plans, or M&A transaction
        interest as of May 2026. The question of what a 2027-2028 IPO would imply for
        Drata's post-IPO market cap (QV017) cannot be answered from public sources without
        ARR disclosure. Similarly, whether a Vanta/Drata consolidation scenario is being
        actively explored (QV028) is entirely speculative from public data — neither company
        has disclosed M&A interest in the other.
      impact: medium
      relatedQuestionRefs:
        - QV017
        - QV028
      relatedTableRefs:
        - TV003
        - TV005
      type: private-evidence-only
      severity: minor
      topic: exit-projections
      missingEvidence: >-
        IPO registration statement (S-1) filing or management communication of IPO timeline;
        any M&A advisory engagement or strategic review documentation; management guidance
        on exit horizon and preferred path; investor relations communication on liquidity
        planning for Series C vintage investors.
      whyItMatters: >-
        IPO timing directly affects the return multiple for 2026 investors: a 2027 IPO
        at 15x ARR is meaningfully different from a 2031 M&A exit at 12x ARR. The Vanta
        consolidation scenario is strategically interesting because a merger could create
        a dominant $3-4B platform, but it is speculative without any deal signals from
        either party.
      diligencePath: >-
        Monitor SEC EDGAR for S-1 or S-1/A filings by Drata; track ICONIQ Growth portfolio
        announcements and fund life cycle; monitor Vanta fundraising announcements for
        valuation signals; track Drata press releases and executive interviews for exit
        language; review investment bank advisor relationships for both companies.
