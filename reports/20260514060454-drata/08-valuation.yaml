  - id: exit-readiness-and-diligence-asks
    title: Exit Readiness and Diligence Asks
    body: >-
      Drata's most probable exit paths are a 2027-2029 IPO or a strategic acquisition by a
      major enterprise platform (ServiceNow, Salesforce, IBM, Thales, CrowdStrike, or a
      PE firm analogous to Hg Capital's AuditBoard playbook). The IPO path requires revenue
      disclosure, profitability narrative, and a clear path to Rule of 40 compliance (revenue
      growth % + FCF margin % ≥ 40). At $150M ARR growing 30%, Drata may approach Rule of 40
      threshold with strong gross margins (70-85% estimated) and controlled burn. An M&A path
      is supported by the sector consolidation pattern (AuditBoard/Hg Capital, OneTrust's
      delayed IPO triggering strategic conversations, ServiceNow's expanding GRC module) and
      Drata's strategic investor base (Salesforce Ventures, Okta Ventures) which signals
      ecosystem alignment.

      Exit readiness is currently constrained by three factors: (1) financial opacity prevents
      a public S-1 filing process or credible M&A data room without significant new disclosure
      infrastructure; (2) the 77-investor 2025 round creates a complex shareholder coordination
      challenge for any exit requiring majority approval; and (3) the SafeBase integration must
      be substantively complete before an acquirer would receive full platform value. The 1,300+
      auditor partner network and 8,000+ customer base create strong exit defensibility — any
      acquirer gets an embedded distribution channel that would cost $500M+ to build organically.

      The thesis-break triggers represent scenarios where the investment thesis is no longer
      valid and immediate action (exit or non-investment) would be warranted. They include:
      confirmed down-round below $1.5B, disclosed NRR below 100%, customer base below 6,000
      (net churn signal), a Vanta fundraise at $3B+ (validating Vanta as the market share
      winner), a documented platform security breach, failure to disclose financials by end of
      2026, or an M&A exit below $1B (validating bear case economics). Any one of these
      triggers is sufficient to invalidate the base case thesis.
