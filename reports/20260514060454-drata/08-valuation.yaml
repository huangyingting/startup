  - id: TV004
    title: Comparable Valuation Table
    enumerationScope:
      coverage: partial
      basis: >-
        Six comparables assessed across three categories: direct compliance automation peers (Vanta,
        AuditBoard), broader GRC/trust platform players (OneTrust), and public market references
        (Workiva, ServiceNow GRC module, LogicGate). Enumeration is partial because: (1) all private
        company valuations reflect the most recent known funding round, which may be stale by 2-4 years;
        (2) Secureframe, Hyperproof, Tugboat Logic, and Laika — additional direct peers — lack
        sufficient public valuation data for reliable comparison; (3) public M&A premia above reported
        valuations (e.g., Hg Capital's AuditBoard terms beyond the $3B headline) are not publicly
        confirmed; (4) Workiva's revenue mix (heavy professional services) makes ARR multiple
        comparison imprecise.
    columns:
      - Comparable Company / Deal
      - Metric
      - Multiple / Valuation / Status
      - Relevance to Drata
      - Limitation
    rows:
      - - Vanta (Series C, 2022)
        - ~$100M ARR est.; ~$1.6B valuation; 7,000+ customers (2022 est.)
        - ~15x ARR (2022 est.)
        - >-
          Strongest direct comparable: identical product category (compliance automation),
          identical customer profile (SMB to mid-market), overlapping framework support
          (SOC 2, ISO 27001, HIPAA). Both companies at near-identical scale as of 2022.
        - >-
          Valuation is stale (2022); both companies have grown since but no updated
          valuations disclosed; actual 2026 gap between the two is unknown. Vanta's
          $1.6B vs Drata's $2B implies Drata commanded a premium — reasons unclear.
      - - AuditBoard (Hg Capital acquisition, 2023)
        - ~$150-200M ARR est. at acquisition; $3.0B acquisition price
        - ~15-20x ARR
        - >-
          Best M&A comparable: Hg Capital applied a sophisticated PE buyer's multiple to an
          enterprise compliance SaaS business at similar revenue scale. Sets a ceiling for
          what a strategic or PE buyer would pay for a compliance automation platform.
        - >-
          AuditBoard is enterprise-focused (larger ACVs, fewer customers) vs Drata's SMB
          base; Hg's thesis was audit workflow efficiency, not compliance automation breadth.
          Exact ARR at closing is unconfirmed from public sources.
      - - OneTrust (Series D, 2021)
        - ~$200M ARR est. (2021); $9.7B valuation (2021)
        - ~48x ARR (2021 peak)
        - >-
          Cautionary tale: OneTrust raised at an extreme 2021 peak multiple and has not IPO'd
          as of 2026. Provides a ceiling and a warning — compliance/privacy SaaS commanded
          extraordinary multiples in 2021 that are not replicable in the 2024-2026 environment.
        - >-
          Broader scope (privacy, consent, ESG) than Drata's compliance automation core.
          Post-2022 valuation likely significantly marked down from $9.7B. IPO delay signals
          difficulty achieving public market exit at or above Series D price.
      - - "Workiva (NYSE: WK, public market)"
        - "~$700M revenue (2025 est.); ~$3.5B market cap"
        - "~5x revenue"
        - >-
          Public market anchor for compliance/reporting SaaS. Demonstrates that ESG and
          financial reporting compliance SaaS companies trade at 4-6x revenue at scale.
          Provides a lower-bound multiple for Drata at IPO if growth decelerates.
        - >-
          Workiva is profitable and mature with heavy enterprise and financial services
          exposure; Drata is high-growth and primarily SMB/mid-market. Workiva's multiple
          (~5x) is not directly applicable but sets a floor for post-IPO compression.
      - - "ServiceNow GRC Module (part of NYSE: NOW)"
        - "~$170B ServiceNow market cap; GRC is one of ~20 product lines"
        - Not a standalone comparable
        - >-
          Demonstrates that large enterprises buy GRC as part of a unified ITSM/ITOM platform.
          ServiceNow's GRC wins represent Drata's ceiling competition in the enterprise segment
          and the benchmark that a Drata acquirer would compare against for build vs buy.
        - >-
          Not a discrete comparable; GRC revenue not broken out. ServiceNow's scale
          ($10B+ ARR) and platform breadth make direct valuation comparison meaningless.
          Relevant only as a competitive and build-vs-buy reference.
      - - LogicGate (Series C, 2021)
        - ~$500M valuation (2021 est.); smaller ARR base (~$30-50M est.)
        - ~10-15x ARR (2021 est.)
        - >-
          Smaller but direct GRC automation peer. Demonstrates that smaller-scale GRC
          SaaS companies can achieve unicorn-adjacent valuations at peak multiples.
          Provides a lower anchor for the compliance automation valuation spectrum.
        - >-
          No updated post-2021 valuation; significant scale difference from Drata
          (Drata is 2-3x larger by estimated ARR and 5x+ by customer count).
          LogicGate is enterprise-only which limits SMB revenue comparison.
    notes: >-
      All private company valuation data reflects the most recent disclosed funding round and may
      be materially stale. AuditBoard acquisition price of $3B is widely reported but the exact
      transaction structure (enterprise value vs. equity value, working capital adjustments) is
      not fully confirmed from public sources. Workiva market cap is estimated from public trading
      data as of early 2026. OneTrust $9.7B valuation reflects the 2021 Series D; management has
      indicated intent to IPO but no filing has been made as of May 2026. ARR estimates for
      private comparables are analyst/press estimates and have not been confirmed by the companies.
      This enumeration is partial — see evidenceGap for TV004 for additional limitations.
