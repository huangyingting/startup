  - id: FV003
    title: Valuation or Return Range — Bear / Base / Bull
    type: range
    layout: standard
    summary: >-
      The range chart displays the low, mid, and high valuation bounds for each scenario. The base
      case range ($1.5-2.5B) brackets the stale $2B reference price, meaning Drata's last known
      valuation is defensible but sits in the upper portion of the most likely range. The bull
      case ($3.0-5.0B) requires ARR ≥$200M with strong NRR and multiple expansion. The bear case
      ($0.5-1.0B) implies a 50-75% markdown from $2B and would represent a significant impairment
      for Series C investors. The distance between bear and bull cases ($4.5B spread) reflects the
      fundamental uncertainty created by Drata's financial opacity.
