tables:
  - id: TV001
    title: Recommendation Summary Table
    columns:
      - Dimension
      - Assessment
      - Details
    rows:
      - - Recommendation
        - Conditional Pass / Data Room Required
        - >-
          High conviction on market position and integration moat; low conviction on current
          valuation without ARR, NRR, and burn rate disclosure. Re-engage upon receipt of
          data room. Do not invest at $2B reference price without financial confirmation.
      - - Confidence Level
        - Medium
        - >-
          Strong evidence on market position (#1-2 alongside Vanta), customer scale (8,000+),
          and integration moat (250+ connectors). Weak evidence on current financials (no ARR
          or NRR disclosure since February 2025 guidance). Confidence capped at Medium.
      - - Risk Rating
        - Medium-High
        - >-
          Category leader risk is low; financial opacity risk is high; SaaS multiple
          compression risk is medium; Vanta competition risk is medium; preference overhang
          risk is medium-high given $303M+ raised. Aggregate risk rating: Medium-High.
      - - Valuation Stance
        - Fairly Valued to Slightly Rich at $2B (Stale)
        - >-
          $2B was appropriate for a 15-25x ARR multiple on $80-130M ARR at 2022 SaaS peak.
          At 2026 multiples of 8-15x ARR, $2B implies $133-250M ARR. Base case ARR is
          $120-150M. Valuation is defensible at the high end of ARR range but stretched if
          ARR has underperformed. Requires data room confirmation.
      - - Target Return / Hold
        - 3x-5x in 5-7 Years (Base to Bull)
        - >-
          Base case ($2B entry, $3-4B exit in 2029-2031 via IPO or M&A) implies 1.5-2x — below
          typical VC threshold. Bull case ($2B entry, $5-7B exit) implies 2.5-3.5x. For 3x+
          returns at $2B entry, Drata must achieve bull case ARR ($200M+) and premium exit
          multiple (15-20x ARR). Recommend entry at $1.5B or below for better return profile.
      - - Decision Implication
        - Request Data Room Before Any Commitment
        - >-
          No investment at current stale $2B reference without: (1) confirmed ARR in data room,
          (2) NRR ≥115% confirmed, (3) 2025 round term sheet and valuation disclosed,
          (4) gross margin ≥70% confirmed, (5) burn rate and runway confirmed.
    notes: >-
      Recommendation reflects the balance of strong qualitative evidence (market leadership, integration
      moat, customer scale) against structural financial opacity. The conditional pass is not a negative
      conclusion on Drata's business quality — it is a reflection of insufficient financial evidence to
      validate the $2B reference price in the post-2022 SaaS multiple environment. The target return
      analysis assumes a 2026 entry scenario and uses public comparables for exit valuation benchmarks.
      All financial estimates are based on public secondary evidence and cross-chapter synthesis from
      this report; no primary financial data from Drata has been received.
