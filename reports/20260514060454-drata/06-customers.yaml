  - id: TU005
    title: Expansion and Concentration Risk Table
    columns:
      - Dimension
      - Status
      - Risk Flag
      - Mitigation / Diligence Ask
    rows:
      - - Framework expansion (SOC 2 → ISO 27001 → HIPAA → PCI DSS → AI governance)
        - Strong structural driver; cross-mapped controls reduce incremental work; Magic reached 5 frameworks; Zello manages 4 simultaneously
        - Low — natural expansion motion with low friction
        - Request average frameworks per customer by cohort; track ISO 42001 and DORA adoption as new expansion vectors
      - - Product expansion (Compliance → Trust Center → TPRM → Risk Management → AI governance)
        - SafeBase Trust Center adds $10M+ revenue lift claim per enterprise; TPRM added in 2024; AI governance (ISO 42001) growing
        - Medium — Trust Center and TPRM require separate buying motion; not all compliance customers auto-upgrade
        - Request % of customers using 2+ products; request TPRM ARR separately; track AI governance attach rate
      - - Channel / partner concentration
        - 1,300+ partners but concentration unknown; audit firms (A-LIGN, Armanino) deeply integrated into workflows
        - Medium-High — if a few large auditor or MSP partners source majority of customers, partner churn risk is elevated
        - Request top-10 partner revenue concentration; assess contract exclusivity; evaluate if any single auditor channels >10% of customers
      - - Customer concentration
        - Not disclosed; implied to be low given 8,000+ customers; but large enterprise accounts (Palantir, Jamf, Tenable, Notion) could be meaningful
        - Medium — no concentration data; enterprise accounts with multi-product adoption likely have higher ARR
        - Request top 10 and top 25 customer ARR concentration; request customer-level ARR distribution histogram
      - - Competitive churn risk (Vanta)
        - Vanta is the closest competitor; both overlap heavily in startup SOC 2 segment; Vanta's comparable pricing creates switching risk
        - High for startup segment — moderate for mid-market and enterprise where switching cost is higher
        - Request win/loss data vs. Vanta; track any public defection signals; assess if Vanta's pricing or product parity is closing the gap
      - - Geographic concentration
        - US-primary; London and Sydney offices suggest EMEA/APAC ambitions; GDPR and DORA support international frameworks
        - Low-Medium — US-concentrated but international opportunity is additive not at risk
        - Track international ARR as % of total; assess whether GDPR/DORA support is generating EU customer traction
      - - Workforce reduction risk (Sept 2024 layoffs)
        - 9% reduction (~40 people) in September 2024 after 52% headcount growth from 2023 to 2024; described as "sustainable growth"
        - Medium — support and customer success capacity may have been impacted; no public disclosure of impact on CSAT
        - Request post-layoff CSAT trend; review if support SLAs changed post-reduction; compare headcount/customer ratio 2023 vs. 2025
    notes: >-
      Drata does not disclose customer concentration, partner-sourced ARR share, or retention by
      product tier. Framework expansion and Trust Center adoption are the clearest structural
      expansion drivers visible from public data. Channel concentration and competitive churn risk
      (Vanta) are the two risks least addressable from public evidence alone.
