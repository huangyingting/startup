  evidenceGaps:
    - id: nrr-grr-not-disclosed
      title: "Net and Gross Revenue Retention Not Publicly Disclosed"
      description: >-
        Drata does not disclose NRR, GRR, cohort retention, or renewal rates in any public source
        as of May 2026. The most recent ARR figure is the "nearing $100M" claim from February 2025
        (18 months old). Without retention metrics, it is not possible to independently evaluate
        whether the 8,000+ customer count translates to durable recurring revenue or whether the
        customer base is churning faster than the headline count implies.
      impact: high
      relatedQuestionRefs:
        - QU004
        - QU005
        - QU006
      type: private-evidence-only
      severity: material
      topic: retention-metrics
      missingEvidence: >-
        NRR and GRR by customer cohort; annual ARR as of Q1 2026; average contract length and
        renewal rate by segment (startup vs. enterprise); churn events in 2024–2025.
      whyItMatters: >-
        Retention metrics are the primary durability indicator for SaaS businesses. A company
        can grow customer count while experiencing high churn in earlier cohorts. Without NRR and
        GRR disclosure, the investment thesis depends entirely on growth signals rather than
        demonstrable compounding of existing ARR.
      diligencePath: >-
        Request NRR and GRR in diligence data room. Request ARR bridge from February 2025 ($100M)
        to present. Request cohort retention table by year-of-acquisition vintage. Ask whether
        post-layoff CSAT trends have been measured.

    - id: customer-concentration-undisclosed
      title: "Customer Revenue Concentration Not Disclosed"
      description: >-
        Drata does not disclose what percentage of ARR comes from its top 10 or top 25 customers.
        Given the customer base of 8,000+ skewing toward startups, it is likely that the ARR
        distribution is long-tail, but enterprise accounts (Palantir, Jamf, Notion, Tenable,
        LinkedIn, CrowdStrike) could contribute disproportionately to total ARR in a way that
        creates concentration risk.
      impact: medium
      relatedQuestionRefs:
        - QU026
      type: private-evidence-only
      severity: minor
      topic: customer-concentration
      missingEvidence: >-
        Top-10 and top-25 customer ARR concentration as a percentage of total ARR. Partner-sourced
        vs. direct ARR split. ARR distribution histogram by customer tier (startup vs. mid-market
        vs. enterprise).
      whyItMatters: >-
        High concentration in a few large enterprise accounts creates revenue vulnerability if
        those accounts churn or reduce scope. With an active M&A market in the compliance space,
        any large customer could be acquired by a company already using a different GRC platform.
      diligencePath: >-
        Request top-10 and top-25 customer ARR schedules. Request channel partner revenue
        concentration. Assess if any enterprise customer represents >5% of total ARR.

    - id: named-customer-proof-partial
      title: "Named Customer Proof Table Is a Representative Sample Only"
      description: |-
        Six named production deployments are documented from public case studies and media sources. With 8,000+ total customers, this is a sample, not an exhaustive enumeration. Coverage skews toward startup (Abnormal Security, FullStory, Amplitude, Netlify) and mid-market tech (Magic, Zello, Jamf). The enterprise segment is represented only by Palantir and LinkedIn/CrowdStrike (via SafeBase). No named customers from the healthcare, financial services, or federal government verticals appear in published case studies despite these being stated growth verticals.
      impact: medium
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU008
        - QU013
      type: enumeration-incomplete
      severity: minor
      topic: named-customers
      missingEvidence: >-
        Named production customer deployments beyond the six documented in public sources. No
        published case studies from financial services, healthcare, or federal government verticals.
        No enterprise customer case study with multi-million dollar ARR contract disclosed.
      whyItMatters: >-
        The published case studies represent a favorable sample. Absence of named customers in
        high-value regulated verticals limits proof of Drata's ability to serve enterprise GRC
        requirements at scale. Healthcare is a stated growth vertical but the only Gartner review
        from healthcare is the adverse 3.0/5.0 score.
      diligencePath: >-
        Request curated reference customer list for enterprise, healthcare, and financial services
        segments. Request whether any federal agency deployments exist (FedRAMP support is listed).
        Conduct reference calls with enterprise accounts independently rather than relying on
        company-curated case studies.

    - id: post-layoff-support-impact-undisclosed
      title: "Post-September 2024 Layoff Impact on Support Quality Not Public"
      description: >-
        Drata laid off approximately 40 people (9% of workforce) in September 2024 following 52%
        headcount growth. The company cited "sustainable growth" but did not disclose the functional
        breakdown of the reduction. If reductions were concentrated in customer success or support,
        the impact on post-sale service quality and renewal rates in the 2024–2025 period would be
        material but is not visible from public sources.
      impact: medium
      relatedQuestionRefs:
        - QU022
        - QU024
      type: missing-source
      severity: minor
      topic: support-quality
      missingEvidence: >-
        Post-layoff CSAT or NPS trend data. Functional breakdown of September 2024 reductions.
        Support SLA disclosure or response time data from 2025 onward.
      whyItMatters: >-
        Customer success and support are primary retention levers for compliance automation
        software. A reduction in CS capacity during a period of rapid customer growth could
        increase churn in the mid-market segment where support responsiveness is a top purchase
        criterion.
      diligencePath: >-
        Request CSAT trend from Q3 2024 to Q1 2026. Request headcount by function pre- and
        post-September 2024 reduction. Ask management to explain the retention impact, if any,
        of the workforce reduction.
