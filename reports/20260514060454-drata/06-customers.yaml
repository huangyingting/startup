chapter:
  number: 6
  title: Customers
  summary: >-
    Drata reports 8,000+ global customers as of May 2026, up from "hundreds" at its November 2021
    Series B and 7,000+ at the February 2025 SafeBase acquisition — implying roughly 650 new
    customers per quarter in 2024. The core segment is Series A–D SaaS/tech companies pursuing
    SOC 2 for enterprise sales, broadening toward mid-market and enterprise GRC buyers. Named case
    studies document quantified outcomes: Magic saw 10× more audit efficiency; Jamf saved 4,000+
    hours annually and lifted $10M+ in revenue; Zello reduced sales cycles 3–14 days and generated
    $70K+ in efficiency gains; Palantir generates 31,000 Trust Center views per year. Retention
    metrics (NRR, GRR) are not publicly disclosed, but G2's 4.8/5.0 rating (May 2026), 1,300+
    alliance partners, 250+ integrations, and 3,000+ trust centers deployed signal high stickiness.
    Adverse signals include a Gartner 3.0/5.0 critical review from a healthcare buyer, TrustRadius's
    thin 5.5/10 score on 3 reviews, and a September 2024 workforce reduction of 9%. Customer
    concentration and renewal cohort data remain key diligence gaps.

sections:
  - id: customer-base-and-segmentation
    title: Customer Base, Segmentation, and Growth Trajectory
    body: >-
      Drata reports 8,000+ global customers as of May 2026, making it one of the largest customer
      bases in the compliance-automation category. That figure traces a rapid trajectory: the company
      launched from stealth in January 2021; by November 2021 it had "hundreds of customers" including
      Abnormal Security, FullStory, Amplitude, and Netlify; by February 2025 it had surpassed 7,000
      customers; and it was adding approximately 650 new customers per quarter throughout 2024. The
      about page confirms 3,000+ trust centers created and 15.7 million evidence items processed
      daily, suggesting the platform is in active production use rather than purchased and idle.


      The primary buyer is the head of security, GRC, or IT compliance at a Series A–D SaaS or
      technology company that needs SOC 2 Type II certification to unlock enterprise sales. These
      companies are typically US-headquartered, growing fast, and under-resourced for manual compliance.
      A secondary segment consists of mid-market technology companies ($10M–$200M ARR) that have
      completed initial SOC 2 and want to add ISO 27001, HIPAA, or other frameworks without adding
      headcount. An emerging enterprise segment (post-Series C scale-ups and public companies) was
      visible in the February 2025 TechCrunch disclosure listing Notion and Tenable as customers.
      The SafeBase acquisition added 1,000+ customers, many at larger organizations — SafeBase's
      named customers included LinkedIn, Palantir, and CrowdStrike.


      Geographic distribution skews toward the US, consistent with Drata's San Diego/San Francisco
      headquarters and the dominance of SOC 2 as a US-origin framework. International presence is
      evidenced by London and Sydney offices and the drata.com/customers page showing customers
      from multiple regions. Vertical concentration is heaviest in fintech, healthtech, HR tech,
      cybersecurity, and infrastructure SaaS — all sectors where compliance posture directly affects
      enterprise sales. Drata's 1,300+ alliance partners (auditors, channel partners, technology
      partners) are a significant distribution force, particularly for the startup segment that
      discovers Drata through its auditor relationships.
