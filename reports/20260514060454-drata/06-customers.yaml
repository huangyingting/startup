figures:
  - id: FU001
    title: Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      How a Drata customer moves from awareness through initial SOC 2 achievement, ongoing
      compliance monitoring, trust center deployment, and multi-product expansion.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU013
      - CU036
      - CU037
      - CU038
    data:
      items:
        - label: Awareness
          actor: Security Lead / CISO
          touchpoints:
            - G2 or Capterra review research
            - Auditor or MSP referral
            - Peer recommendation from portfolio company
            - Outbound Drata SDR contact
          painpoint: Security or GRC lead identifies need for SOC 2 certification to unlock enterprise sales
          opportunity: 1,300+ alliance partners and auditor network drive warm inbound leads
        - label: Evaluation
          actor: Security Lead + GRC Team
          touchpoints:
            - Product demo with Drata sales
            - Review integration library for existing stack coverage
            - Reference call with auditor partner
            - Pricing evaluation (entry ~$7,500/year)
          painpoint: Must verify 250+ integrations cover existing tech stack; price sensitivity vs. Vanta
          opportunity: G2 4.8/5.0 rating and auditor-integrated workflow differentiate from competitors
        - label: Initial Onboarding
          actor: GRC / Compliance Team
          touchpoints:
            - Connect AWS/GCP/Azure, Okta, GitHub, HR systems
            - Activate policy templates and customize controls
            - Assign remediation owners via Slack/Jira integrations
            - Begin continuous monitoring cadence
          painpoint: Integration configuration complexity; control owner assignment friction
          opportunity: Automated evidence collection delivers fast time-to-value; 60–90 day SOC 2 readiness
        - label: First Audit
          actor: GRC Team + External Auditor
          touchpoints:
            - Share Drata audit view access with external auditor
            - Evidence collection and review automated
            - Address findings and remediate in platform
            - Receive certification
          painpoint: Auditor may not be a Drata partner; non-partner auditors require exports
          opportunity: Magic case study — 10× audit efficiency; auditors access evidence directly in Drata
        - label: Ongoing Compliance
          actor: GRC / Compliance Team
          touchpoints:
            - Continuous monitoring across integrated tools
            - Automated evidence reminders (Slack, Jira)
            - Add ISO 27001 or HIPAA via control remapping
            - Annual compliance review with auditor partner
          painpoint: Drift alerts and evidence reminders require employee cooperation; framework fatigue
          opportunity: 15.7M evidence items processed daily; cross-mapped controls reduce re-certification effort
        - label: Expansion
          actor: CISO + Sales Team
          touchpoints:
            - Deploy Trust Center for security questionnaire automation
            - Enable TPRM for vendor risk assessments
            - Upgrade to enterprise plan with more frameworks
            - Renew with auditor partner for next year audit cycle
          painpoint: Budget competition from other security tools; CFO scrutiny on SaaS spend
          opportunity: Jamf — $10M+ revenue lift from Trust Center; deal acceleration creates internal champion


