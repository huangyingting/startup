      gross margin %; monthly burn rate and runway; 2025 round term sheet, post-money valuation, and updated
      capitalization table.
    whyItMatters: >-
      Without ARR and NRR, it is impossible to apply a defensible multiple to the $2B reference price or determine
      whether Drata is growing toward or away from its last known valuation. The entire valuation range ($0.5B-$5.0B)
