      Non-compliance by August 2027 could result in operational bans or fines in the EU market.
    diligencePath: >-
      Request AI Act impact assessment from Drata legal team; confirm whether Drata has retained EU AI Act counsel; ask
      whether DORA compliance addenda for EU financial sector customers include any AI-specific obligations.
  - id: drata-cash-runway-undisclosed
    title: Burn Rate, Cash Position, and Runway Not Publicly Disclosed
    description: >-
      Drata's burn rate, current cash position, and cash runway cannot be determined from public sources. The most
      recent ARR estimate was "nearing $100M" as of February 2025. The September 2024 workforce reduction suggests a
      re-calibration toward profitability but the actual financial trajectory is opaque.
    impact: high
    relatedQuestionRefs:
      - QR009
      - QR025
    type: private-evidence-only
    severity: material
    topic: financial-health
    missingEvidence: >-
      Current ARR as of Q1 2026; gross margin and operating margin; cash on balance sheet following the 2025 round;
      monthly or quarterly burn rate; NRR and GRR by customer tier.
    whyItMatters: >-
      Cash runway determines how much time Drata has before the next financing event. Given the 2025 round structure (77
      investors, undisclosed terms), understanding whether the round provides 24 months of runway or was primarily
      secondary liquidity is essential to assessing financial risk and exit timeline.
    diligencePath: >-
      Request audited or management-reviewed financials for FY 2024 and Q1 2026; request ARR bridge from February 2025
      baseline; request capitalization table showing all preference stacks; ask management to characterize the 2025
      round as primary growth capital, structured note, or secondary liquidity.
  - id: drata-dora-processor-obligations-unconfirmed
    title: Drata's Own DORA Compliance as ICT Third-Party Provider Not Publicly Confirmed
    description: >-
      Drata supports DORA as a compliance framework for its customers, but its own contractual and technical obligations
      as an ICT third-party service provider to EU financial institutions under DORA Article 30 have not been publicly
      confirmed or disclosed.
    impact: medium
    relatedQuestionRefs:
      - QR005
    type: missing-source
    severity: material
    topic: dora-compliance
    missingEvidence: >-
      DORA compliance addendum offered to EU financial sector customers; confirmation of whether Drata has been
      designated a "critical ICT third-party service provider" by any EU financial supervisory authority; DORA Article
      30 contractual provisions in Drata's enterprise agreements.
    whyItMatters: >-
      DORA Article 30 requires ICT third-party providers to EU financial firms to accept audit rights, provide
      sub-contractor disclosures, and demonstrate operational resilience. Non-compliance could disqualify Drata from
      serving EU financial sector customers — a significant revenue exposure given Drata's stated expansion into
      financial services.
    diligencePath: >-
      Request DORA compliance roadmap and any DORA-specific contractual addenda; confirm whether any EU financial
      institution customers have conducted DORA-required audits of Drata's operations; review whether Drata's 2025
      enterprise contract templates include DORA Article 30 provisions.
  - id: EGV001
    title: Drata ARR, NRR, and Financial Metrics Undisclosed
    description: >-
      Drata has not disclosed ARR, NRR, gross margin, or burn rate in any public communication since a February 2025
      statement that the company was "nearing $100M ARR." This creates a fundamental valuation uncertainty that cannot
      be resolved without data room access. All financial estimates in this chapter are inferred from comparable company
      trajectories, SEC filing data, and secondary market intelligence rather than primary financial disclosure.
    impact: high
    relatedQuestionRefs:
      - QV017
      - QV018
      - QV028
    relatedTableRefs:
