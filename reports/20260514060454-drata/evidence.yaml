  - id: nrr-grr-not-disclosed
    title: Net and Gross Revenue Retention Not Publicly Disclosed
    description: >-
      Drata does not disclose NRR, GRR, cohort retention, or renewal rates in any public source as of May 2026. The most
      recent ARR figure is the "nearing $100M" claim from February 2025 (18 months old). Without retention metrics, it
      is not possible to independently evaluate whether the 8,000+ customer count translates to durable recurring
      revenue or whether the customer base is churning faster than the headline count implies.
    impact: high
    relatedQuestionRefs:
      - QU004
      - QU005
      - QU006
    type: private-evidence-only
    severity: material
    topic: retention-metrics
    missingEvidence: >-
      NRR and GRR by customer cohort; annual ARR as of Q1 2026; average contract length and renewal rate by segment
      (startup vs. enterprise); churn events in 2024–2025.
    whyItMatters: >-
      Retention metrics are the primary durability indicator for SaaS businesses. A company can grow customer count
      while experiencing high churn in earlier cohorts. Without NRR and GRR disclosure, the investment thesis depends
      entirely on growth signals rather than demonstrable compounding of existing ARR.
    diligencePath: >-
      Request NRR and GRR in diligence data room. Request ARR bridge from February 2025 ($100M) to present. Request
      cohort retention table by year-of-acquisition vintage. Ask whether post-layoff CSAT trends have been measured.
  - id: customer-concentration-undisclosed
    title: Customer Revenue Concentration Not Disclosed
    description: >-
      Drata does not disclose what percentage of ARR comes from its top 10 or top 25 customers. Given the customer base
      of 8,000+ skewing toward startups, it is likely that the ARR distribution is long-tail, but enterprise accounts
      (Palantir, Jamf, Notion, Tenable, LinkedIn, CrowdStrike) could contribute disproportionately to total ARR in a way
      that creates concentration risk.
    impact: medium
    relatedQuestionRefs:
      - QU026
    type: private-evidence-only
    severity: minor
    topic: customer-concentration
    missingEvidence: >-
      Top-10 and top-25 customer ARR concentration as a percentage of total ARR. Partner-sourced vs. direct ARR split.
      ARR distribution histogram by customer tier (startup vs. mid-market vs. enterprise).
    whyItMatters: >-
      High concentration in a few large enterprise accounts creates revenue vulnerability if those accounts churn or
      reduce scope. With an active M&A market in the compliance space, any large customer could be acquired by a company
      already using a different GRC platform.
    diligencePath: >-
      Request top-10 and top-25 customer ARR schedules. Request channel partner revenue concentration. Assess if any
      enterprise customer represents >5% of total ARR.
