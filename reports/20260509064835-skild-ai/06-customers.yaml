chapter:
  number: 6
  title: Customers
  summary: |
    Skild AI's customer base is dominated by robot OEM partners (ABB Robotics, Universal Robots/MiR)
    who embed the Skild Brain into their hardware portfolios, enterprise direct deployments led by the
    Foxconn/NVIDIA Blackwell GPU assembly line deal (the first publicly confirmed mass-production
    deployment), and strategic investor-customers including Amazon (Bezos Expeditions), Samsung, LG,
    Schneider Electric, CommonSpirit Health, and Salesforce Ventures. The April 2026 acquisition of
    Zebra Technologies' Robotics Automation business adds a set of named warehouse operator customers
    (CTL Global Solutions, Encore Fulfillment, Geneva10 Fulfillment) via the Symmetry Fulfillment
    platform. IQT (In-Q-Tel) investment signals national-security interest. Revenue grew from zero
    to approximately $30M in 2025—confirming real commercial traction—but Skild does not disclose
    customer names, counts, NRR, GRR, churn, or contract lengths. No independently verified
    third-party case studies for the Skild Brain itself exist as of the report date. The principal
    customer risk is customer concentration ambiguity, opacity on retention metrics, and the degree
    to which strategic investors represent genuine recurring revenue vs. exploratory pilots.
