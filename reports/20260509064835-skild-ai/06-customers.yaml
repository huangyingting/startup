sections:
  - id: U1
    title: Customer Base Segmentation
    body: |
      Skild AI's customer base divides into four distinct segments with different buyer
      characteristics, procurement paths, and strategic value.

      The primary segment is robot OEM partners—hardware manufacturers who license the Skild
      Brain to embed into their own robot product lines. Confirmed OEM partners include ABB
      Robotics (one of the world's largest industrial robot makers), Universal Robots (the
      global leader in collaborative robots, owned by Teradyne), and Mobile Industrial Robots
      (MiR, also owned by Teradyne). These partnerships are distribution multipliers: by
      embedding Skild Brain into ABB's and UR's portfolios of tens of thousands of installed
      robots, Skild gains access to their entire customer base without direct sales overhead.
      The OEM partner relationship is analogous to an AI software provider licensing to a
      hardware OEM—Skild earns per-robot or per-use licensing revenue, while the OEM bundles
      the AI intelligence as a differentiator.

      The second segment is enterprise direct deployers: large enterprises that procure the
      Skild Brain to automate specific workflows within their own facilities. Foxconn (via the
      NVIDIA partnership) is the first publicly named direct deployer, using the Skild Brain on
      Blackwell GPU server assembly lines in Houston. Other direct deployers are confirmed to
      exist in warehousing, construction, and inspection, but their identities are not disclosed.

      The third segment is strategic investor-customers: entities that participated in Skild's
      funding rounds and have stated operational interest. This includes Amazon (Bezos Expeditions),
      Samsung, LG (including the LG CNS commercial partnership), Schneider Electric, CommonSpirit
      Health, and Salesforce Ventures. These are simultaneously financial backers and potential
      deployment customers, making revenue attribution ambiguous.

      The fourth segment is defense and government, signaled by IQT (In-Q-Tel) investment. No
      confirmed defense deployments have been publicly announced, but IQT's mandate is to bridge
      technologies into U.S. national security agencies.
    claimRefs:
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU015
      - CU021
    tableRefs:
      - TU001
    figureRefs:
      - FU001
  - id: U2
    title: Adoption Trajectory and Growth Evidence
    body: |
      Skild AI's adoption trajectory is characterized by exceptionally rapid revenue growth
      from a standing start, combined with opacity on nearly every underlying metric that would
      allow an analyst to assess quality, concentration, or durability of that growth.

      Revenue grew from zero to approximately $30M in 2025—confirmed by the company's official
      Series C blog post, the BusinessWire Series C press release, and corroborated by multiple
      independent news sources. The company describes revenue as "growing exponentially" and
      noted the company achieved profitability in 2025 (technical.ly report). These are
      extraordinary milestones for a company that emerged from stealth in July 2024.

      The deployment footprint as confirmed through company statements spans six verticals:
      security and facility inspection, last-mile delivery, warehouses, manufacturing, data
      centers, and construction. The Skild Brain is confirmed to run on more than 30 distinct
      robot types. The Foxconn/NVIDIA production deployment (March 2026) is the first publicly
      named mass-scale customer deployment. Skild's chief of staff confirmed to technical.ly
      that prior deployments exist in warehousing, construction, and inspections, though
      without naming customers.

      The April 2026 Zebra Technologies acquisition adds established warehouse operator
      customers (CTL Global Solutions, Encore Fulfillment, Geneva10 Fulfillment) to Skild's
      installed base, providing immediate production-grade customer relationships in logistics.
      These Zebra customers have documented productivity metrics: 30% fewer robots needed
      with maintained throughput (CTL Global, Encore) and 40%+ productivity gains (Geneva10).

      What is absent is equally significant: no customer count, no revenue per customer, no
      ARR breakdown, no cohort data, and no churn or renewal history. The extremely rapid
      revenue growth rate suggests either a small number of very large enterprise contracts,
      or a genuine broad adoption across dozens of smaller deployments—but the data to
      distinguish these scenarios is not public.
