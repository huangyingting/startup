  claims:
    - id: CU001
      statement: |
        Skild AI grew from zero to approximately $30M in annual revenue in just a few months
        in 2025, confirmed by the company's official Series C blog post and a BusinessWire press
        release. The company describes revenue as "growing exponentially." This marks the
        company's transition from research/pre-revenue stage to active commercial deployment.
      type: company-claimed
      topic: revenue traction
      confidence: high
      freshness: current
      sourceRefs:
        - SU001
        - SU003
        - SU009
      answersQuestionRefs:
        - QU013
    - id: CU002
      statement: |
        Skild AI deploys the Skild Brain across six publicly confirmed verticals: security and
        facility inspection, last-mile and point-to-point delivery, warehouses, manufacturing,
        data centers, and construction. These are the company's stated deployment sectors as of
        the January 2026 Series C announcement.
      type: company-claimed
      topic: deployment verticals
      confidence: high
      freshness: current
      sourceRefs:
        - SU001
        - SU003
        - SU020
      answersQuestionRefs:
        - QU010
    - id: CU003
      statement: |
        Amazon participated in Skild AI's Series A funding round (2024) through its Amazon
        Industrial Innovation Fund, and Jeff Bezos invested personally through Bezos Expeditions
        in the Series C (2026). Amazon is therefore both a financial investor and a potential
        strategic customer, though no Amazon operational deployment of the Skild Brain has been
        publicly confirmed.
      type: third-party-reported
      topic: Amazon investor-customer relationship
      confidence: high
      freshness: current
      sourceRefs:
        - SU003
        - SU011
      answersQuestionRefs:
        - QU012
        - QU003
    - id: CU004
      statement: |
        Samsung participated as a strategic investor in the Series B (2025) and Series C (2026)
        rounds. LG invested through LG Technology Ventures and via LG CNS, which signed a
        commercial partnership with Skild AI in June 2025 to deploy Robot Foundation Models
        for smart factory, smart logistics, and urban service applications including elder care.
        LG CNS is publicly described as a deployment customer, not only an investor.
      type: third-party-reported
      topic: LG Samsung investor-customer
      confidence: high
      freshness: current
      sourceRefs:
        - SU001
        - SU003
      answersQuestionRefs:
        - QU012
    - id: CU005
      statement: |
        Schneider Electric participated as a strategic investor in the Series C round. CommonSpirit
        Health, one of the largest nonprofit Catholic health systems in the United States with
        over 140 hospitals, is also a Series C strategic investor. Salesforce Ventures joined as
        a Series C investor. These entities are strategic investors with potential future deployment
        interest, but no confirmed operational deployments have been publicly announced.
      type: third-party-reported
      topic: strategic investor-customers
      confidence: high
      freshness: current
      sourceRefs:
        - SU001
        - SU003
      answersQuestionRefs:
        - QU012
    - id: CU006
      statement: |
        In-Q-Tel (IQT), the non-profit strategic investor that serves as the technology bridge
        for U.S. intelligence and defense agencies including the CIA, DoD, and NSA, participated
        in the Series C round. IQT Partner Rita Waite stated: "Solving intelligence for the
        physical world unlocks enormous commercial value and long-term strategic national
        importance. Skild AI is uniquely positioned to do both." This signals potential
        defense and government market interest.
      type: third-party-reported
      topic: defense government customer signal
      confidence: high
      freshness: current
      sourceRefs:
        - SU001
        - SU003
      answersQuestionRefs:
        - QU012
        - QU010
    - id: CU007
      statement: |
        Skild AI announced a partnership with ABB Robotics to integrate the Skild Brain into
        ABB's industrial robot portfolio. ABB Robotics President Marc Segura stated: "Integrating
        Skild AI's generalized robot intelligence into our portfolio will help customers scale
        industrial-grade automation more quickly and address increasingly complex application
        scenarios across a broad range of industries." As of May 2026, ABB has confirmed the
        partnership but noted that details remain confidential.
      type: third-party-reported
      topic: ABB OEM partnership
      confidence: high
      freshness: current
      sourceRefs:
        - SU002
        - SU006
        - SU004
      answersQuestionRefs:
        - QU009
        - QU019
    - id: CU008
      statement: |
        Skild AI announced a partnership with Teradyne Robotics' Universal Robots (UR) and
        Mobile Industrial Robots (MiR) to integrate the Skild Brain into their cobot and
        autonomous mobile robot portfolios. Universal Robots CEO Jean-Pierre Hathout stated:
        "Working with Skild AI and NVIDIA allows us to bring advanced AI capabilities to our
        cobots — enabling them to handle more dynamic, variable tasks across industries."
        This OEM partnership gives Skild AI access to UR's installed base of hundreds of
        thousands of deployed robots globally.
      type: third-party-reported
      topic: Universal Robots MiR OEM partnership
      confidence: high
      freshness: current
      sourceRefs:
        - SU002
        - SU006
      answersQuestionRefs:
        - QU009
    - id: CU009
      statement: |
        Skild AI and NVIDIA are deploying the Skild Brain in a production manufacturing
        environment at a Foxconn facility in Houston, Texas. The deployment automates the
        assembly of NVIDIA's Blackwell GPU server racks using dual robotic arms performing
        complex tasks: picking and placing a busbar, placing a limit block, drilling 16 screws
        in succession, and removing the limit block. This is described as the first mass-scale
        public deployment of the Skild Brain after years of internal testing.
      type: company-claimed
      topic: Foxconn production deployment
      confidence: high
      freshness: current
      sourceRefs:
        - SU002
        - SU004
        - SU006
        - SU012
        - SU024
      answersQuestionRefs:
        - QU004
        - QU016
    - id: CU010
      statement: |
        Technical.ly confirmed via Skild AI's chief of staff Aditya Raghunathan that the Skild
        Brain has already been deployed to customers in warehousing, construction, and inspections
        prior to the Foxconn announcement, but Skild does not share the names of these other
        companies. The Foxconn partnership represents the first public mass-deployment, confirming
        that undisclosed prior deployments exist.
      type: third-party-reported
      topic: undisclosed prior deployments
      confidence: high
      freshness: current
      sourceRefs:
        - SU004
        - SU001
      answersQuestionRefs:
        - QU001
        - QU014
    - id: CU011
      statement: |
        Skild AI acquired Zebra Technologies' Robotics Automation business in April 2026,
        including the Symmetry Fulfillment orchestration platform. This acquisition brings
