figures:
  - id: FU001
    title: Customer Journey Map — Skild AI Adoption Stages
    type: journey-map
    layout: standard
    summary: |
      Journey map of how different customer segments progress through the Skild AI adoption
      lifecycle, from initial awareness through pilot and production deployment to platform
      expansion. OEM partners follow a different path (integration-first) than enterprise
      direct deployers (use-case-first). The data flywheel creates a self-reinforcing
      expansion loop at the production stage.
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU015
      - CU018
      - CU021
    data:
      nodes:
        - id: awareness
          label: 'Stage 1: Market Awareness'
          detail: >-
            Robot OEM evaluates foundation model licensing; enterprise evaluates Skild Brain for specific automation
            challenge; driven by NVIDIA partnership press, Series C coverage, and OEM relationship
        - id: evaluation
          label: 'Stage 2: Technical Evaluation'
          detail: >-
            OEM partner: integration feasibility assessment with Skild Brain API. Enterprise direct: pilot scope
            definition, robot hardware selection, deployment environment scoping. IQT / defense: classified evaluation
            process
        - id: pilot
          label: 'Stage 3: Pilot / POC Contract'
          detail: >-
            Limited deployment at one facility or one robot type; data generated starts feeding flywheel; OEM signs
            integration development agreement; enterprise signs pilot services agreement
        - id: production
          label: 'Stage 4: Production Deployment'
          detail: >-
            OEM embeds Skild Brain in product line (ABB, UR/MiR track). Enterprise deploys at scale (Foxconn/NVIDIA
            track: Blackwell GPU assembly). Zebra Symmetry customers: Skild Brain layer added post-acquisition
        - id: expansion
          label: 'Stage 5: Platform Expansion'
          detail: >-
            Data flywheel: each deployment improves the model across all customers. OEM rolls out to additional robot
            families. Enterprise adds new task types or new facilities. New verticals: hospitals, hotels, consumer homes
            (2026+ roadmap)
        - id: strategic_investor
          label: 'Parallel Track: Strategic Investor-Customer'
          detail: >-
            Amazon, Samsung, LG, Schneider, CommonSpirit invest first, deploy later. Investment precedes deployment;
            commercial relationship expected to follow as technology matures. LG CNS advanced to pilot/commercial track
            in 2025
