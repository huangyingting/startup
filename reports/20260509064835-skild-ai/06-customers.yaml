  - id: U3
    title: Named Customer Proof Table
    body: |
      Named customer proof for the Skild Brain itself is limited to one confirmed production
      deployment as of the report date. The named evidence base grows substantially if one
      includes the Zebra Symmetry acquired customer base and OEM partner endorsements.

      The Foxconn/NVIDIA partnership (announced March 2026) is Skild's highest-quality named
      customer proof. Foxconn is using the Skild Brain to automate dual-arm robots performing
      complex GPU server rack assembly at a Houston facility—a multi-step manipulation task
      (busbar placement, limit block, 16-screw drilling, limit block removal) currently done by
      humans. This is confirmed by the company's official blog, multiple independent press reports,
      and NVIDIA's public statement from VP Deepu Talla. However, no quantitative outcome metrics
      (throughput improvement, error rate, labor savings, ROI) have been released by either party.

      At the OEM partner level, ABB Robotics President Marc Segura and Universal Robots CEO
      Jean-Pierre Hathout have issued on-record endorsements of the Skild Brain integration, which
      represent partner-proof of strategic alignment. ABB's note that "details remain confidential"
      confirms the partnership is active but constrains verification of production deployment status.

      The three named Zebra Symmetry customers—CTL Global Solutions, Encore Fulfillment, and Geneva10
      Fulfillment—are legitimate production-grade customers of the Symmetry orchestration platform,
      with documented performance outcomes (30–40%+ productivity gains). However, these deployments
      predate the Skild acquisition and do not constitute proof that the Skild Brain itself has been
      deployed in their facilities. The integration of the Skild Brain with Symmetry post-acquisition
      has not been publicly confirmed with a specific customer or timeline.

      CommonSpirit Health and Schneider Electric are strategic investors; no deployment of Skild
      Brain in CommonSpirit hospitals or Schneider Electric facilities has been announced.
