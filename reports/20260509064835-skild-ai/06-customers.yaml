  - id: U4
    title: Retention, Durability, and Switching Costs
    body: |
      Skild AI's retention dynamics cannot be directly measured from public data: NRR, GRR,
      churn rates, contract lengths, and customer satisfaction scores are all undisclosed. The
      company began generating significant revenue only in 2025, meaning even internal cohort
      data would be limited to fewer than 24 months of history at the report date.

      The data flywheel creates a structural retention mechanism. Each customer deployment
      contributes proprietary robot operational data to Skild's post-training pipeline. This
      data improves the shared Skild Brain model, which in turn improves outcomes for all
      customers on the platform. Customers who have contributed deployment data benefit from
      a model that has learned their specific environment and task types. Switching to a
      competing robot AI platform would forfeit this accumulated model improvement, creating
      economic switching costs analogous to those in cloud machine learning platforms.

      OEM partnerships (ABB, Universal Robots, MiR) are likely structured with multi-year
      integration agreements given the engineering depth required to embed the Skild Brain
      into a robot hardware portfolio. These partnerships create durable relationships
      independent of any single end-customer deployment. Robot OEMs that integrate the Skild
      Brain into their product architecture face high switching costs to replace it, as
      doing so would require re-engineering the intelligence layer for their entire fleet.

      The Zebra Symmetry platform adds a software orchestration dependency: warehouse operators
      running Symmetry for fleet coordination face migration costs to replace the platform.
      This is an inherited retention asset from the acquisition, though its durability depends
      on successful integration with Skild Brain capabilities.

      No adverse evidence—complaints, failed deployments, customer losses, or public disputes—
      has been identified, but this is as likely a function of early-stage opacity as it is
      of genuine customer satisfaction. Diligence should request NRR, GRR, and customer
      cohort data from the company.
    claimRefs:
      - CU018
      - CU019
      - CU023
      - CU024
      - CU029
      - CU030
      - CU031
    tableRefs:
      - TU004
  - id: U5
    title: Expansion, Concentration Risk, and Strategic Outlook
    body: |
      Skild AI's expansion potential is driven by three compounding forces: the data flywheel
      (each new deployment improves the model, enabling better future deployments), the OEM
      partner ecosystem (ABB and Universal Robots each have global installed bases of hundreds
      of thousands of robots that can be upgraded with the Skild Brain), and the Zebra Symmetry
      acquired customer base (immediate entree to production warehouse operators).

      The stated expansion roadmap proceeds from semi-structured industrial environments
      (factories, warehouses) to less structured environments (hospitals, hotels), and
      ultimately to fully unstructured consumer homes. This provides a multi-decade expansion
      arc, but current customer evidence is concentrated in the earliest, most structured tier.

      Concentration risk is the most significant customer diligence gap. With revenue of ~$30M
      and an unknown number of customers, it is possible that a single customer (Foxconn, or
      an undisclosed large enterprise) represents a majority of revenue. The strategic investor-
      customer overlap creates a secondary concentration concern: if investor-customers (Amazon,
      Samsung, LG) are driving the majority of revenue through exploratory commercial pilots
      rather than arms-length production contracts, revenue durability is lower than headline
      numbers suggest. Amazon's development of its own DeepFleet robot AI (1M+ robots) raises
      the question of whether Amazon's Bezos investment is a hedge against Skild's success
      rather than a prelude to deployment.

      Channel risk is mitigated by OEM partnerships that distribute Skild's technology through
      established hardware sales channels. However, Skild has no public evidence of a self-serve
      digital sales motion, no developer marketplace, and no system integrator certification
      program—all of which limit the pace of long-tail customer acquisition. The LG CNS
      partnership is an early signal of a channel/partner model for Asia-Pacific deployments.
    claimRefs:
      - CU003
      - CU004
      - CU006
      - CU021
      - CU022
      - CU025
      - CU027
      - CU031
      - CU034
    tableRefs:
      - TU005
