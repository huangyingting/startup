company:
  name: Skild AI

chapter:
  number: 8
  title: Valuation Analysis
  summary: |
    Skild AI's January 2026 Series C established a post-money valuation of $14B+ on $30M in 2025 ARR,
    implying an approximately 467x trailing revenue multiple. This is the highest ARR multiple among
    publicly-disclosed robotics foundation model companies and sits far above the 10–30x benchmark for
    commercial-stage enterprise AI platforms, even at hyper-growth rates. The valuation is supported by
    three hypotheses: (1) winner-take-most platform dynamics in the physical AI layer; (2) massive TAM
    expansion as robot deployment costs fall from $250K to $4–15K per unit; and (3) strategic option
    value from IQT/dual-use defense positioning and NVIDIA/Samsung/LG hardware ecosystem alignment.
    Against these positives stand four high-severity risks: extreme multiple compression exposure if
    revenue growth decelerates; SoftBank concentration across all three institutional rounds; the
    absence of independent benchmarks confirming Skild's technical superiority; and open-source
    commoditization of the foundation model layer by NVIDIA GR00T and Physical Intelligence pi0.
    The valuation is characterized as stretched relative to disclosed financial metrics, conditional
    on sustained 40%+ CAGR to mid-decade.

sections:
  - id: s1
    title: Current Valuation and Revenue Multiple
    body: |
      Skild AI's $1.4B Series C, announced January 14, 2026 and led by SoftBank, established a
      post-money valuation exceeding $14B. This represents a tripling of the $4.5–4.7B Series B
      valuation (June 2025) in seven months, and a roughly 9.3x increase from the $1.5B Series A
      valuation (July 2024). Total disclosed funding across all rounds stands at $1.83B per
      Crunchbase, with CEO Deepak Pathak stating the total exceeds $2B.

      The 2025 revenue figure disclosed in the Series C press release is approximately $30M,
      described as growing from zero in "just a few months" during 2025. This implies a trailing
      revenue multiple of approximately 467x ($14B / $30M). At a conservative 50% revenue growth
      rate in 2026 (to $45M), the forward 2026 multiple remains approximately 311x. Even at a
      bullish 200% growth rate (to $90M), the forward multiple is approximately 156x.

      For context, leading enterprise AI SaaS companies at hyper-growth stages trade at 15–50x
      forward revenue in public markets. Frontier AI infrastructure companies (e.g., CoreWeave
      at IPO) commanded 20–30x forward revenue. Robotics hardware companies (e.g., iRobot at
      peak) traded at 2–8x revenue. The 467x trailing multiple is consistent only with a
      winner-take-most platform thesis where Skild captures a disproportionate share of a
      multi-trillion dollar physical AI market over a decade.

      The valuation was assigned by sophisticated institutional investors (SoftBank, NVIDIA,
      Samsung, LG, Schneider Electric, Macquarie, Bezos Expeditions, Salesforce Ventures, IQT),
      which provides some validation of the bull thesis. However, private market valuations in
      AI robotics have been systematically elevated in 2024–2026 by strategic investors pursuing
      ecosystem positioning rather than purely financial returns — a factor that can inflate
      valuations above fundamental justification.

    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007]

  - id: s2
    title: Comparable Company Valuations
    body: |
      The robotics foundation model and physical AI sector has seen a rapid escalation of private
      market valuations in 2024–2026, driven by institutional capital chasing the "general-purpose
      robot brain" thesis. Key comparables:

      Physical Intelligence (pi): Raised $600M in late 2025 at a $5.6B valuation. Physical
      Intelligence operates with reportedly minimal revenue, making its implied ARR multiple
      effectively undefined. Its primary assets are the pi0 VLA model and a strong research team
      (ex-Google, Berkeley, CMU). Physical Intelligence open-sourced pi0 in February 2025,
      creating a free model that competes directly with Skild's offering.

      Figure AI: Raised capital at a $39B valuation in early 2026, supported by a BMW
      manufacturing deployment as named customer evidence. Figure AI builds its own humanoid
      hardware (Figure 01/02), combining hardware and software economics. The $39B valuation is
      the highest in the physical AI sector and is anchored by tangible deployment evidence.

      1X Technologies: Norwegian humanoid robotics company reportedly in discussions for funding
      at up to $10B valuation. 1X builds NEO humanoid hardware and develops its own AI layer,
      similar to Figure AI's integrated hardware-software model.

      Boston Dynamics (Hyundai): Not a direct comparable (acquired, not VC-funded), but Spot and
      Atlas deployments provide a benchmark for enterprise robotics adoption timelines and the
      difficulty of scaling from pilots to mass production.

      Covariant (RFM-1): Acquired by Amazon in 2024 after raising $222M; Covariant's acquisition
      by Amazon at an undisclosed premium signals the strategic value of AI robotics software
      layer for logistics giants.

      Against this peer set, Skild's $14B valuation sits second only to Figure AI, and represents
      the highest valuation-to-revenue ratio in the sector. Skild commands this premium based on
      its omni-bodied, hardware-agnostic foundation model thesis and the investor signal from
      NVIDIA, Samsung, and IQT.

    claimRefs: [CV008, CV009, CV010, CV011, CV012, CV013, CV014]

  - id: s3
    title: Bull and Bear Valuation Scenarios
    body: |
      The $14B valuation can be defended under a bull case and challenged under a bear case:

      Bull case: Skild AI achieves 200%+ revenue CAGR from 2025 to 2030, reaching $1B+ in ARR by
      2029–2030. Goldman Sachs projects the humanoid robot market at $38B by 2035; MarketsandMarkets
      projects AI robotics at $33.4B by 2030 (40.4% CAGR). If Skild captures 5–10% of a $33B
      market, the revenue run rate would be $1.65B–$3.3B. At a 10x forward revenue multiple (a
      premium-SaaS-at-scale multiple), the implied valuation would be $16.5B–$33B — a path that
      would justify the current $14B entry. This scenario requires Skild to maintain its
      software-first lead against open-source alternatives and scale the OEM/SI channel globally.

      Base case: Skild grows at 80–120% CAGR, reaching $200–300M ARR by 2028. At 15–20x forward
      revenue (a realistic enterprise AI multiple at that scale), the implied valuation is
      $3B–$6B — representing meaningful downside from the current $14B. This scenario is consistent
      with a company that deploys successfully but faces margin compression from compute costs and
      open-source competition.

      Bear case: Revenue growth decelerates below 50% CAGR, reaching $60–100M ARR by 2027.
      Open-source GR00T or pi0 gains adoption by Skild's OEM channel partners. At 10x forward
      revenue, the implied valuation is $600M–$1B — a 90%+ drawdown from the Series C entry price.
      This scenario is low probability given IQT and NVIDIA's strategic commitment, but is not
      impossible if the foundation model layer commoditizes faster than expected.

      The 467x ARR multiple leaves no margin for commercial execution risk or multiple compression,
      making Skild one of the most valuation-sensitive AI investments in the 2026 private market.

    claimRefs: [CV015, CV016, CV017, CV018, CV019, CV020, CV021]

  - id: s4
    title: Market Size and Exit Pathways
    body: |
      Skild AI's valuation is underwritten by projected physical AI market growth that dwarfs
      current disclosed revenue. Goldman Sachs revised its humanoid robot market forecast to
      $38B by 2035, up from an earlier $6B projection, citing AI breakthroughs and 40% cost
      reductions in robot manufacturing. MarketsandMarkets projects the AI robotics market from
      $6.1B (2024) to $33.4B (2030) at a 40.4% CAGR. Morgan Stanley projects a $5T global
      humanoid robot opportunity by 2050, citing mass deployment scenarios.

      TAM at these projections is large enough to support a $14B private valuation if Skild
      captures a modest share. However, several structural barriers exist: (1) the humanoid robot
      hardware market is dominated by large industrial OEMs (FANUC, ABB, KUKA, Yaskawa), creating
      a natural limit on software-only platform margins; (2) compute costs for training and running
      frontier robotics models scale with deployment, compressing long-run gross margins; and (3)
      the open-source commoditization of the AI model layer may capture market share faster than
      expected in the 2026–2028 window.

      Exit pathways include: (1) IPO — possible at $20B+ valuation with $200M+ ARR and sustained
      growth; requires 2027–2028 at earliest; (2) strategic acquisition — NVIDIA, Samsung, LG,
      or SoftBank portfolio company acquisition is strategically plausible; (3) SPAC or direct
      listing — possible but less likely given market conditions. The IQT investment creates a
      potential defense/intelligence procurement channel that could serve as a strategic moat
      against direct competitors in certain geographies.

    claimRefs: [CV022, CV023, CV024, CV025, CV026, CV027, CV028]

  - id: s5
    title: Valuation Verdict
    body: |
      The $14B valuation for Skild AI is characterized as stretched relative to disclosed financial
      metrics. The 467x trailing ARR multiple is the highest in the physical AI sector and requires
      a very specific combination of outcomes to justify at exit: sustained 150–200% revenue CAGR
      through 2028, maintenance of software-layer pricing power against open-source competition,
      and a market environment that supports a premium ARR multiple at public-market liquidity.

      The valuation is not indefensible — the investor list (SoftBank, NVIDIA, Samsung, LG,
      Bezos Expeditions, IQT) represents some of the most sophisticated institutions in the sector,
      and the IQT signal adds a defense moat not available to competitors. The platform model,
      if it achieves the "Android OS for robotics" position, would justify enormous valuations.
      However, the absence of independent benchmarks, unaudited revenue, and no named end-customer
      evidence mean that the $14B is supported primarily by strategic intent and investor thesis
      rather than verifiable financial fundamentals.

      Any investment at or near the Series C price must be underwritten on the basis of (a) the
      bull-case revenue trajectory verified by audited financials, (b) confirmed competitive moat
      versus GR00T/pi0, and (c) a viable exit at a valuation that provides meaningful return on
      the $14B+ entry. At 1.5x on $14B (a modest return), the exit valuation must exceed $21B
      within the investment window — achievable only under the bull case.

    claimRefs: [CV001, CV004, CV006, CV017, CV020, CV028, CV029, CV030]

