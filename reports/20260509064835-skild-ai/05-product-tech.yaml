      (via Symmetry). Weakest are developer platform openness and safety certification.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE019
      - CE031
      - CE033
      - CE034
      - CE035
    data:
      columns:
        - Maturity Level
        - Evidence Quality
        - Competitive Position
      rows:
        - label: Cross-embodiment generalization
          values:
            - High — demonstrated on quadrupeds, humanoids, tabletop arms, AMRs
            - Company-stated + NVIDIA case study (partner-reported)
            - Differentiated; no peer has disclosed comparable omni-bodied model at this breadth
        - label: In-context adaptation (no retraining)
          values:
            - Medium-High — jammed wheel 2-3s recovery; limb-loss demonstrated; stilts zero-shot
            - NVIDIA case study (observed in partner evaluation)
            - Differentiated; RMA lineage; no published benchmark comparison to Physical Intelligence
        - label: Locomotion (outdoor / urban)
          values:
            - Medium — 60-80% task completion in Pittsburgh; limited environment diversity reported
            - NVIDIA case study (single urban environment evaluation)
            - On par with Agility Robotics / Boston Dynamics; foundation model approach is novel
        - label: Manipulation precision
          values:
            - Medium — AirPod insertion and desk cleanup demonstrated; industrial precision unverified
            - NVIDIA case study (demo conditions; no quantitative accuracy metrics)
            - Unclear vs. Physical Intelligence (pi_); no head-to-head published benchmark
        - label: Fleet orchestration (Symmetry)
          values:
            - High — production-grade; existing Zebra enterprise customer deployments
            - Acquisition announcement (BusinessWire); Robotics & Automation News coverage
            - Strong; adds enterprise-grade orchestration layer that AI-only competitors lack
        - label: API / developer platform
          values:
            - Low — no public SDK; GitHub empty; access enterprise-gated only as of May 2026
            - Observed (github.com/skild-ai has zero public repos; skild.ai describes API only)
            - Weak vs. open-ecosystem peers; developer moat not established
        - label: Safety certification
          values:
            - Low — no third-party physical or AI safety certifications publicly disclosed
            - Absence of public disclosure; no ISO 10218 or ASIMOV results cited
            - Gap vs. enterprise procurement requirements in regulated sectors (healthcare, gov)
callouts:
  - calloutType: strength
    title: Research-to-Product IP Lineage
    claimRefs:
      - CE028
      - CE029
      - CE030
      - CE031
    body: |
      Skild AI's technology directly commercializes 10+ years of award-winning research by its founders.
      Curiosity-driven exploration (Pathak, ICML 2017; 6,000+ citations), Rapid Motor Adaptation (RSS 2021;
      CoRL Best Robotic System Award), and large-scale self-supervised grasping (Gupta) form a direct
      technical lineage to the Skild Brain. This is among the strongest founder-IP alignments in the
      physical AI sector and provides a defensible research-based moat.
  - calloutType: strength
    title: NVIDIA + HPE Infrastructure Validation
    claimRefs:
      - CE014
      - CE015
      - CE016
    body: |
      Confirmed multi-vendor infrastructure partnerships (NVIDIA Isaac Lab + Cosmos Transfer; HPE Cray
      XD670 with H200; HPE ProLiant DL380a with L40S) provide third-party technical validation of the
      training pipeline. The NVIDIA case study independently corroborates key technical claims and reduces
      the risk of pure marketing inflation. Few robotics startups at this stage have published-partner
      technical case studies.
  - calloutType: risk
    title: No Public Benchmarks for Skild Brain
    claimRefs:
      - CE036
      - CE037
    body: |
      All performance claims for the commercial Skild Brain are company-asserted or from a partner case
      study (NVIDIA). Absence of peer-reviewed evaluation or independent third-party benchmarks leaves
      investors unable to verify the 1,000x data claim or technical superiority over Physical Intelligence
      (pi_), Google DeepMind RT-2, or other competing foundation models. This is a material due diligence
      gap that should be resolved before investment.
  - calloutType: risk
    title: Closed Developer Ecosystem
    claimRefs:
      - CE032
      - CE033
    body: |
      No public SDK, empty GitHub organization, and enterprise-only API access limit third-party developer
      adoption. Without a broader ecosystem, Skild risks losing to open-platform or more accessible
      competitors if the robotics AI field commoditizes. The lack of developer signal (GitHub stars,
      npm/HuggingFace model downloads) also makes it impossible to independently verify community traction.
  - calloutType: risk
    title: Video Training Data Legal Exposure
    claimRefs:
      - CE038
      - CE039
    body: |
      Skild's pretraining pipeline ingests billions of internet video clips without publicly disclosed
      licensing or fair-use legal analysis. This mirrors litigation risk faced by LLM providers (Sora,
      GPT-4V, Stability AI). If courts rule against transformer-based model training on scraped content,
      Skild may need to rebuild a significant portion of its pretraining data pipeline.
  - calloutType: insight
    title: Data Flywheel Moat Depends on Deployment Diversity
    claimRefs:
      - CE017
      - CE018
      - CE026
    body: |
      The compounding data flywheel is Skild's most strategically durable moat claim. However, the moat's
      value depends on deployment data diversity (tasks, environments, embodiments), not just volume. A
      rival with access to higher-quality or more diverse teleoperation data could erode this advantage
      without matching raw deployment count. The Zebra Symmetry acquisition accelerates diversity but
      integration quality is unverified.
