  researchQuestions:
    - id: QE001
      question: >-
        How does the Skild Brain's hierarchical two-tier architecture separate high-level semantic planning from
        low-level motor control, and how does this enable cross-embodiment generalization?
      type: mechanism
      status: answered
      answer: >-
        High-level planner (low-frequency transformer) handles semantic task planning integrating language/visual
        instructions. Low-level motor controller (high-frequency transformer) outputs per-joint torques for the physical
        robot. Generalization is achieved by training across thousands of parallel robot instances of diverse
        embodiments in simulation, forcing the model to learn embodiment-agnostic strategies.
      targets:
        - contentRequirements/2
        - plannedFigures/product-architecture-map
    - id: QE002
      question: >-
        What are the four data sources used in training the Skild Brain, and how are they structured across pretraining
        and post-training phases?
      type: enumeration
      status: answered
      answer: >-
        Pretraining: (1) large-scale simulation via NVIDIA Isaac Lab (trillions of synthetic experiences); (2) internet
        video (billions of human action clips). Post-training: (3) teleoperation data (images + proprioception mapped to
        joint torques); (4) real-world deployment data from commercial robot fleets.
      targets:
        - contentRequirements/2
        - plannedTables/technology-operating-architecture-table
    - id: QE003
      question: >-
        What does in-context learning mean for the Skild Brain, and how does it differ from standard RL retraining at
        deployment time?
      type: mechanism
      status: answered
      answer: >-
        In-context learning means the robot interacts with an unfamiliar environment at deployment time and adapts its
        behavior without gradient updates or retraining. The model uses past observations within the current deployment
        episode to adjust motor strategies. NVIDIA reports 2-3 second recovery from jammed wheels and recovery from
        broken legs after several attempts.
      targets:
        - contentRequirements/2
        - contentRequirements/4
    - id: QE004
      question: >-
        What NVIDIA simulation tools does Skild AI use, and what training throughput does the simulation pipeline
        achieve?
      type: verification
      status: answered
      answer: >-
        Skild AI uses NVIDIA Isaac Lab for physics-based RL simulation (thousands of parallel robot instances) and
        Cosmos Transfer for data augmentation with environmental variations. The company claims a millennium of robot
        experience can be generated within days via massive parallel simulation.
      targets:
        - contentRequirements/2
        - plannedTables/technology-operating-architecture-table
    - id: QE005
      question: How does the Skild data flywheel work mechanically, and why is it a compounding competitive moat?
      type: mechanism
      status: answered
      answer: >-
        Each commercial deployment captures real-world robot experience that is fed back as post-training data,
        improving the Skild Brain for all future deployments across the fleet. Competitors without a live deployment
        fleet cannot replicate this proprietary data source, and the moat compounds as deployment count grows.
      targets:
        - contentRequirements/4
        - plannedFigures/customer-workflow-operating-flow
    - id: QE006
      question: >-
        How does the Symmetry Fulfillment platform integrate with the Skild Brain at the API and data level
        post-acquisition?
      type: mechanism
      status: partial
      answer: >-
        Symmetry provides fleet orchestration above the skill API layer, dispatching tasks to heterogeneous robot
        fleets. The specific API integration between Symmetry and the Skild Brain motor control layer, and how
        deployment data from Symmetry-managed fleets flows into post-training, has not been independently described or
        verified since the April 2026 acquisition.
      targets:
        - contentRequirements/3
        - plannedTables/product-module-asset-matrix
    - id: QE007
      question: >-
        What is the current status of the Skild AI developer API and SDK, and how accessible is the platform to
        third-party developers?
      type: freshness
      status: answered
      answer: >-
        As of May 2026, the Skild AI GitHub organization (github.com/skild-ai) has zero public repositories. No public
        SDK or open API documentation has been released. Access is enterprise-gated; no HuggingFace model hub presence
