  - id: E2
    title: Architecture and Training Pipeline
    body: |
      The Skild Brain uses a hierarchical two-tier transformer-based architecture. The high-level component
      operates at low frequency and performs semantic task planning—determining which action to take,
      sequencing sub-tasks, and integrating language or visual instructions from the operator. The low-level
      component operates at high frequency and translates high-level commands into per-joint motor torques
      and angles for the specific physical robot. This separation mirrors how humans decompose intent and
      motor execution, and allows the same high-level planner to drive radically different physical bodies
      without modification.

      Training proceeds in two phases. The pretraining phase uses large-scale physics simulation (NVIDIA
      Isaac Lab) running thousands of parallel robot instances across multiple embodiments in diverse
      environments, generating trillions of synthetic action experiences. NVIDIA Cosmos Transfer augments
      training datasets with environmental variations—lighting, texture, and weather conditions—to maximize
      robustness. The second pretraining source is internet-scale human video: billions of clips in which
      humans perform manipulation and locomotion tasks, with the model learning object affordances by
      treating humans as biological robots. Skild reports this allows it to acquire a millennium of robot
      experience within days.

      Post-training uses two additional sources: teleoperation data (images and proprioception mapped to
      joint torques, collected through scalable interfaces, described as the richest form of training signal),
      and real-world deployment data generated continuously by commercial robot fleets. The data flywheel is
      central to Skild's competitive strategy: each new commercial deployment contributes post-training data
      that improves the model, which enables more and better deployments.

      The company's key claimed breakthrough is in-context learning: when confronted with a novel situation—a
      broken leg, jammed wheel, unfamiliar robot body, or new environment—the Skild Brain interacts with
      the environment over several attempts and adapts its behavior without gradient updates or retraining.
      NVIDIA's case study reports recovery from jammed wheels within 2–3 seconds, recovery from broken legs
      after several attempts, and zero-shot generalization to walking on stilts with leg-to-body ratios
      beyond the training distribution. In Pittsburgh urban testing, humanoid robots achieved 60–80% task
      performance within hours of data collection in never-before-seen environments.
