    - id: QE011
      question: >-
        How does the Skild Brain compare technically to Physical Intelligence (pi_), Google DeepMind RT-2, and other
        competing robotics foundation models?
      type: comparison
      status: answered
      answer: >-
        Skild differentiates on claimed data scale (1000x), omni-bodied design (any robot body without retraining), and
        in-context learning. Physical Intelligence focuses on dexterous manipulation for specific morphologies. Google
        RT-2 uses vision-language-action tokens but requires per-embodiment training. No head-to-head published
        benchmarks exist for direct quantitative comparison.
      targets:
        - contentRequirements/4
    - id: QE012
      question: >-
        How do the founders' CMU research contributions (curiosity-driven exploration, RMA, supersizing
        self-supervision) connect mechanically to the Skild Brain's architecture?
      type: mechanism
      status: answered
      answer: >-
        Curiosity-driven exploration (Pathak ICML 2017) provides autonomous learning without extrinsic rewards—the
        intrinsic motivation for generalization. RMA (RSS 2021) proves real-time adaptation to novel physical conditions
        via privileged training + online history encoder, the direct architectural precursor to Skild's in-context
        learning. Gupta's data-at-scale work establishes the training philosophy of using massive diverse data rather
        than task-specific fine-tuning.
      targets:
        - contentRequirements/4
