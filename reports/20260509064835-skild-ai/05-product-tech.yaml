    - id: QE009
      question: >-
        What are the known technical failure modes and task success rate limitations of the Skild Brain in real-world
        deployments?
      type: adverse
      status: answered
      answer: >-
        The NVIDIA case study reports 60-80% task success in Pittsburgh urban testing, implying a 20-40% failure rate in
