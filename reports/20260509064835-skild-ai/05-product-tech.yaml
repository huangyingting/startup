        - plannedTables/product-module-asset-matrix
    - id: QE008
      question: >-
        Has Skild AI published peer-reviewed benchmarks for the commercial Skild Brain comparing it to competing
        robotics foundation models?
      type: adverse
      status: answered
      answer: >-
        No. Skild AI has not published peer-reviewed benchmarks for the Skild Brain. Performance metrics are
