  - id: FV004
    title: Recommendation Logic
    type: flow
    layout: standard
    summary: |
      Decision chain from market scale, commercial proof, competitive moat, financials, risks, and
      valuation to the recommendation of research-more/track at the current $14B Series C entry price.
      Each node represents a key diligence dimension; each edge represents the logical dependency.
    approximationNotes: >-
      Flow diagram represents analyst-assessed decision logic based on public evidence. Recommendations are contingent
      on evidence quality and may change with additional disclosed information.
    data:
      nodes:
        - id: n1
          label: Market Scale
          detail: $33–38B AI robotics by 2030–2035 (Goldman Sachs, MarketsandMarkets)
          sentiment: positive
          claimRefs:
            - CV021
            - CV022
        - id: n2
          label: Commercial Proof
          detail: $30M 2025 ARR (unaudited); no named enterprise customers; Zebra/LG CNS as channel
          sentiment: mixed
          claimRefs:
            - CV003
            - CV007
        - id: n3
          label: Competitive Moat
          detail: Omni-bodied platform; hardware-agnostic; 1000x data claim unverified; GR00T/pi0 as free alternatives
          sentiment: mixed
          claimRefs:
            - CV013
            - CV029
        - id: n4
          label: Financials
          detail: 467x trailing ARR multiple; unaudited revenue; no gross margin disclosed; burn unknown
          sentiment: negative
          claimRefs:
            - CV003
            - CV004
        - id: n5
          label: Risks
          detail: Open-source commoditization; SoftBank concentration; no benchmarks; extreme multiple
          sentiment: negative
          claimRefs:
            - CV018
            - CV019
        - id: n6
          label: Valuation
          detail: $14B on $30M ARR; conditionally justified only at $1B+ ARR by 2028–2030
          sentiment: negative
          claimRefs:
            - CV028
            - CV017
        - id: n7
          label: 'Recommendation: Research-More / Track'
          detail: Pass at current price; revisit if audited ARR >$100M and independent benchmark confirmed
          sentiment: neutral
          claimRefs:
            - CV028
            - CV030
      edges:
        - from: n1
          to: n6
          label: supports large TAM
        - from: n2
          to: n6
          label: unaudited; insufficient for $14B
        - from: n3
          to: n6
          label: moat unverified; commoditization risk
        - from: n4
          to: n7
          label: extreme multiple → pass
        - from: n5
          to: n7
          label: high-severity risks → track
        - from: n6
          to: n7
          label: stretched valuation → research-more
    claimRefs:
      - CV003
      - CV004
      - CV017
      - CV018
      - CV021
      - CV028
      - CV029
      - CV030
