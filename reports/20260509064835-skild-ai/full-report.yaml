  - id: FR001
    title: Risk Heatmap
    type: matrix
    layout: wide
    summary: |
      Five-by-three risk heatmap mapping Skild AI's primary risk categories against impact and likelihood
      dimensions. The upper-right quadrant (high likelihood, high impact) contains technology generalization
      failure and valuation/revenue disconnect — both thesis-break risks. SoftBank investor concentration
      and EU regulatory exposure are high-impact but medium-likelihood near-term triggers. People and
      operational risks are material but partially mitigable.
    claimRefs:
      - CR001
      - CR009
      - CR019
      - CR026
      - CR033
      - CR038
    data:
      columns:
        - Low Likelihood
        - Medium Likelihood
        - High Likelihood
      rows:
        - label: High Impact (Blocking)
          values:
            - Emergent unsafe behavior incident (Low–Medium likelihood; event risk grows with deployment volume)
            - SoftBank capital constraint (Medium; Vision Fund 2 posted $3.6B loss in fiscal 2025)
            - Sim-to-real generalization failure in production (High; no independent validation exists)
        - label: Material Impact
          values:
            - EU regulatory adverse ruling (Low near-term; risk materializes at scale)
            - Hardware OEM in-house AI development (Medium; Samsung/LG/Schneider could pivot)
            - Valuation / revenue disconnect — down-round risk (High; 467x multiple requires exceptional execution)
        - label: Material–Minor Impact
          values:
            - Copyright / training data litigation (Low; no case filed; industry trend is adverse)
            - Zebra integration failure and talent attrition (Medium; 12-month window)
            - Talent competition — key hire failure rate (High structural risk; small talent pool)
        - label: Moderate Impact
          values:
            - Compute supply disruption (Low; NVIDIA strategic investor mitigates)
            - Academic-to-commercial leadership gap (Medium; structural; grows with revenue scale)
            - Open-source foundation model pricing pressure (Medium; Alibaba model released Feb 2026)
        - label: Minor Impact
          values:
            - US state AI workplace law patchwork (Low direct impact; affects customers primarily)
            - In-Q-Tel dual-use export control (Medium; restrictions unknown)
            - Model drift from post-training data contamination (Medium; no governance disclosed)
  - id: FR002
    title: Risk Transmission Map
    type: dag
    layout: wide
    summary: |
      Directed graph showing how primary risk categories cascade into downstream investor thesis risks.
      Technology generalization failure and competitive displacement both flow through revenue stagnation
      to valuation impairment. Regulatory failure has a direct path to market access loss. SoftBank
      concentration risk feeds directly into capital constraint, which compounds all other risks.
    claimRefs:
      - CR001
      - CR009
      - CR013
      - CR019
      - CR026
      - CR028
      - CR033
    data:
      nodes:
        - id: tech_risk
          label: Technology Risk
          detail: Sim-to-real gap; no independent benchmarks; emergent behavior; compute intensity
        - id: competitive_risk
          label: Competitive Risk
          detail: Physical Intelligence, Figure AI, Big Tech, open-source models (Alibaba Feb 2026)
        - id: regulatory_risk
          label: Regulatory Risk
          detail: EU AI Act, EU Machinery Reg 2023/1230 (Jan 2027), EU Product Liability Directive
        - id: people_risk
          label: People Risk
          detail: Key-person (Pathak/Gupta); academic-to-commercial gap; talent competition
        - id: revenue_risk
          label: Revenue Stagnation
          detail: Failure to scale $30M → $100M+ in 2026; customer concentration; long procurement cycles
        - id: valuation_risk
          label: Valuation Impairment
          detail: 467x multiple collapses; down-round in Series D; employee equity erosion
        - id: capital_risk
          label: Capital Constraint
          detail: SoftBank follow-on reduction; Series D cannot close; bridge financing required
        - id: market_access_risk
          label: Market Access Loss
          detail: EU regulatory non-compliance; export control restrictions; safety incident moratorium
      edges:
        - from: tech_risk
          to: revenue_risk
          label: Deployment failures erode customer trust and new contract wins
        - from: competitive_risk
          to: revenue_risk
          label: Competitor wins key accounts; open-source reduces ASP
        - from: people_risk
          to: tech_risk
          label: Co-founder departure or talent loss slows model development
        - from: people_risk
          to: revenue_risk
          label: Commercial execution gap prevents scaling past $50M ARR
        - from: regulatory_risk
          to: market_access_risk
          label: EU non-compliance blocks market access in primary growth geography
        - from: revenue_risk
          to: valuation_risk
          label: Missed revenue milestones force down-round valuation
        - from: valuation_risk
          to: capital_risk
          label: Down-round signals distress; SoftBank reduces follow-on; Series D on adverse terms
        - from: capital_risk
          to: tech_risk
          label: Compute and hiring budget cuts impair model development cadence
  - id: FR003
    title: Dependency Map
    type: dag
    layout: standard
    summary: |
      Critical dependency graph for Skild AI showing relationships between the company and its key
      capital, compute, hardware, and regulatory counterparties. SoftBank is the single most critical
      node with no substitute. NVIDIA is both an investor and a compute dependency. Hardware OEM partners
      are simultaneously strategic investors and revenue sources — a structural conflict of interest if
      they develop in-house AI.
    claimRefs:
      - CR013
      - CR022
      - CR026
      - CR027
      - CR036
    data:
      nodes:
        - id: softbank
          label: SoftBank Vision Fund
          detail: Primary capital provider; led Series A, B, C; $1.83B+ deployed; Vision Fund 2 posted $3.6B loss FY2025
        - id: nvidia
          label: NVIDIA / NVentures
          detail: Compute infrastructure (Isaac Lab, Cosmos Transfer); strategic investor; GPU supply dependency
        - id: oem_partners
          label: Samsung / LG / Schneider
          detail: Strategic investor-customers; hardware deployment channel; potential in-house AI development risk
        - id: skild_ai
          label: Skild AI
          detail: Robot foundation model; Skild Brain; Mobile Manipulation Platform; Symmetry (post-Zebra)
        - id: zebra_fetch
          label: Zebra / Fetch Robotics (Acquired)
          detail: April 2026 acquisition; Symmetry Fleet Orchestration; enterprise customer base; integration risk
        - id: inqtel
          label: In-Q-Tel (CIA)
          detail: Investor; dual-use / export control considerations; restrictions not publicly disclosed
      edges:
        - from: softbank
          to: skild_ai
          label: Primary capital ($1.83B+ total); follow-on capacity uncertain
        - from: nvidia
          to: skild_ai
          label: Compute infrastructure + strategic co-investment
        - from: oem_partners
          to: skild_ai
          label: Revenue (likely majority of $30M ARR) + hardware deployment channel
        - from: zebra_fetch
          to: skild_ai
          label: Acquired fleet orchestration platform and enterprise customer base
        - from: inqtel
          to: skild_ai
          label: Strategic investment; potential export control obligations
        - from: skild_ai
          to: oem_partners
          label: Skild Brain AI licensing to hardware platform
        - from: skild_ai
          to: zebra_fetch
          label: Integration and migration to Skild-unified platform
  - id: FV001
    title: Valuation Progression — Skild AI Funding Rounds
    type: waterfall
    layout: standard
    summary: |
      Skild AI valuation progression from estimated seed through Series C. Each step-up reflects
      the incremental valuation added per funding round. Total valuation growth from seed to Series C
      is approximately $13.9B in 24 months — one of the fastest valuation ramp trajectories in
      private AI company history.
    approximationNotes: >-
      Seed valuation is analyst-estimated. Series A, B, C valuations are from public press releases. Step-up amounts are
      calculated from disclosed valuations.
    data:
      items:
        - label: Seed Valuation (est.)
          value: 75
          type: start
          detail: Estimated $50–100M seed valuation; undisclosed. Founded 2023.
          tone: neutral
          claimRefs:
            - CV001
        - label: Series A Step-Up (Jul 2024)
          value: 1425
          type: delta
          detail: $300M raised; valuation reached $1.5B. Lightspeed, Coatue, SoftBank led.
          tone: positive
          claimRefs:
            - CV001
            - CV005
        - label: Series B Step-Up (Jun 2025)
          value: 3200
          type: delta
          detail: ~$135M raised; valuation reached ~$4.7B. SoftBank led; NVIDIA, Samsung joined.
          tone: positive
          claimRefs:
            - CV001
            - CV005
        - label: Series C Step-Up (Jan 2026)
          value: 9300
          type: delta
          detail: $1.4B raised; valuation exceeded $14B. SoftBank led; 9 named investors.
          tone: positive
          claimRefs:
            - CV001
            - CV002
            - CV005
        - label: Current Valuation (May 2026)
          value: 14000
          type: end
          detail: 'Post-Series C valuation: $14B+. Total raised: $1.83B+ (Crunchbase); $2B+ (CEO).'
          tone: positive
          claimRefs:
            - CV001
            - CV002
