          - type: callout
            title: Video Training Data Legal Exposure
            body: |
              Skild's pretraining pipeline ingests billions of internet video clips without publicly disclosed
              licensing or fair-use legal analysis. This mirrors litigation risk faced by LLM providers (Sora,
              GPT-4V, Stability AI). If courts rule against transformer-based model training on scraped content,
              Skild may need to rebuild a significant portion of its pretraining data pipeline.
            calloutType: risk
            claimRefs:
