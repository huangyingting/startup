          label: Fleet Orchestration
          detail: >-
            Symmetry Fulfillment Platform (acquired Zebra, April 2026); multi-robot + human frontline worker
            coordination
        - id: L2
          label: Skill Execution API
          detail: Mobile Manipulation Platform; grasping, handover, navigation exposed as API calls; enterprise-gated
        - id: L3
          label: Skild Brain Foundation Model
          detail: Omni-bodied transformer; high-level semantic planner + low-level motor controller; in-context learning
        - id: L4
          label: Training Data Pipeline
          detail: Simulation (Isaac Lab / Cosmos) + Internet Video + Teleoperation + Real-World Deployment Feedback
  - id: FE002
    title: Customer Workflow / Operating Flow
    type: flow
    layout: standard
    summary: |
      End-to-end flow from robot OEM / system integrator through API skill call, Skild Brain inference,
      robot action, and data flywheel feedback loop. Symmetry Fulfillment orchestrates multi-robot fleets
      alongside the primary inference path.
    claimRefs:
      - CE002
      - CE003
      - CE004
      - CE017
      - CE019
      - CE024
    data:
      nodes:
        - id: oem
          label: Robot OEM / Integrator
          detail: Licenses Skild Brain; integrates into robot hardware; no hardware exclusivity
        - id: customer_app
          label: Customer Application
          detail: Enterprise app calls Mobile Manipulation Platform API for skills
        - id: api_call
          label: Skill API Call
          detail: Customer app calls grasp / navigate / handover skill; enterprise-gated; no public SDK
        - id: brain_inference
          label: Skild Brain Inference
          detail: Omni-bodied model processes vision + proprioception; outputs motor commands; in-context adaptation
        - id: robot_action
          label: Robot Executes Action
          detail: Low-level motor controller drives joints; real-world physical interaction
        - id: data_capture
          label: Deployment Data Captured
          detail: New real-world experience added to post-training data flywheel for fleet improvement
        - id: model_update
          label: Model Improvement Loop
          detail: Post-training updates improve Skild Brain across all deployments; compounding moat
        - id: symmetry
          label: Symmetry Fleet Orchestration
          detail: Coordinates multiple robots and human frontline workers; warehouse / logistics layer
      edges:
        - from: oem
          to: customer_app
          label: Deploys on hardware
        - from: customer_app
          to: api_call
          label: Invokes skill
        - from: api_call
          to: brain_inference
          label: Routes to model
        - from: brain_inference
          to: robot_action
          label: Motor commands
        - from: robot_action
          to: data_capture
          label: Experience logged
        - from: data_capture
