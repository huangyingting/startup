      - number: '1.4'
        title: Key Milestones and Strategic Timeline
        blocks:
          - type: paragraph
            body: >
              Skild AI's evolution from a stealth startup to a $14B+ company has followed an unusually compressed

              timeline relative to the capital deployed. Since its founding in May 2023, the company achieved a

              number of technical, commercial, and strategic milestones at high velocity.


              On the technical front, Skild published research demonstrating in-context learning for robotics—described

              by the company as a first-ever research breakthrough in the field, which earned Best Paper Nominations at

              top robotics conferences. The Skild Brain demonstrated the ability to adapt to extreme changes in robot

              form (e.g., loss of limbs, jammed wheels, entirely new body geometries) without retraining. The company

              also developed a data flywheel combining large-scale simulation (trillions of synthetic experiences) with

              internet video (billions of human action videos), teleoperation, and real-world deployment data—training
              on

              approximately 1000x more data than competing robotic foundation models.


              Commercially, Skild went from zero revenue to approximately $30M in "just a few months" in 2025, deploying

              in warehouses, manufacturing facilities, data centers, construction sites, and security applications. The

              April 2026 Zebra acquisition—bringing the Symmetry Fulfillment warehouse orchestration platform—positions

              Skild as the first company capable of providing an end-to-end automation solution for existing warehouses,

              from humanoid pick-and-place to robotic dog inspection to AMR material movement, orchestrated by a single
              AI layer.


              The February 2026 opening of the Bengaluru, India office marked the company's first international

              expansion, extending its engineering capacity to tap India's deep pool of AI and robotics talent.
