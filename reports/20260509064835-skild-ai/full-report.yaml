      - number: '5.3'
        title: Deployment, Integration, and Roadmap
        blocks:
          - type: paragraph
            body: |
              The Mobile Manipulation Platform's API is the primary integration surface for enterprise customers and
              robot OEM partners. The API exposes discrete skills—grasping, handover, navigation—as callable
              functions, enabling application developers to orchestrate robot behavior without knowledge of underlying
              motor control. As of May 2026, no public SDK or open-source developer documentation has been released;
              the GitHub organization (github.com/skild-ai) contains no public repositories, suggesting access
              remains gated to enterprise partners. This limits third-party developer ecosystem building.

              Deployment sectors as of early 2026 include security patrol, facility inspection, last-mile delivery,
              warehouse fulfillment, factory assembly, data center operations, and construction site monitoring. The
              March 2025 HPE press release states that the Skild Brain is initially targeted for construction,
              manufacturing, and security robots. The LG CNS partnership (June 2025) targets smart factory, smart
              logistics, and urban service deployments including elder care and facility patrol, with LG Technology
              Ventures as an investor. The Symmetry Fulfillment acquisition (April 2026) brings production-grade
              enterprise warehouse orchestration with existing industrial customer relationships.

              The roadmap centers on scaling all four data sources using Series C capital, deepening research on
              model architectures and training algorithms, and expanding real-world deployments for revenue. The
              stated long-term goal is a single action-centric brain for all robot embodiments, all tasks, and all
              scenarios. Infrastructure is scaling from initial public cloud to a private AI-as-a-service deployment
              (HPE Cray XD670 servers with NVIDIA HGX H200 for training; HPE ProLiant DL380a with NVIDIA L40S for
              inference) managed by HPE partner STN, enabling secure, customizable, and scalable compute.
