  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Platform Modules
        blocks:
          - type: paragraph
            body: |
              Skild AI delivers three distinct product assets organized into a vertically integrated platform. The
              core product is the Skild Brain, described by the company as the industry's first unified robotics
              foundation model. Unlike prior robotic software purpose-built for specific robot types and tasks, the
              Skild Brain is omni-bodied: it controls any robot—quadrupeds, humanoids, tabletop arms, and mobile
              manipulators—without prior knowledge of the robot's exact physical form. The model enables robots to
              handle tasks from simple household chores (loading a dishwasher, making an egg) to physically demanding
              industrial operations (navigating slippery terrain, factory assembly).

              The second product is the Mobile Manipulation Platform, which bundles physical skills such as grasping,
              handover, pick-and-place, and navigation behind an API abstraction layer. This allows enterprise
              customers and system integrators to build robot applications without managing low-level motor control
              details. Skild describes it as enabling "users to build applications without worrying about details of
              the unstructured, messy real world."

              The third product, added through the April 2026 acquisition of Zebra Technologies' Robotics Automation
              business, is the Symmetry Fulfillment Platform—a proven fleet orchestration layer that coordinates
              heterogeneous robot fleets alongside human frontline workers in logistics environments. Together these
              three modules cover AI intelligence (Skild Brain), skill execution (Mobile Manipulation Platform), and
              fleet coordination (Symmetry), enabling Skild to offer end-to-end warehouse automation as a single vendor.

              Commercial deployments span security and facility inspection, last-mile delivery, warehouse picking and
              sortation, factory assembly, data center operations, and construction site monitoring. Revenue grew from
              zero to approximately $30M in just a few months of 2025, with multiple customers across sectors.
