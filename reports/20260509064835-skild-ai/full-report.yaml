  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: standard
    summary: |
      Four-layer stack showing how the Skild AI platform is organized from hardware-agnostic training
      infrastructure at the base through the Skild Brain foundation model, skill execution API, and fleet
      orchestration at the top. Each layer adds abstraction and enterprise value above the raw model.
    claimRefs:
