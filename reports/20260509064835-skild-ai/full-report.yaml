  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >
              Skild AI operates at the intersection of robotics hardware and artificial intelligence software,
              specifically

              targeting the physical AI or embodied intelligence layer: AI software that enables robots to perceive,
              reason,

              plan, and act in unstructured real-world environments. This distinguishes Skild from both traditional
              robot

              hardware manufacturers (e.g., ABB, KUKA, Fanuc) and task-specific automation software vendors.


              The market boundary for this analysis encompasses: (1) AI foundation model software and APIs for
              commercial

              robots; (2) robot intelligence middleware, simulation platforms, and training infrastructure; and (3)
              end-to-end

              robotic automation software solutions (such as Skild's post-acquisition Symmetry Fulfillment platform).
              Excluded

              spend includes robot hardware (actuators, sensors, frames), human-operated machinery, and classical
              rule-based

              industrial automation software (PLCs, SCADA). Adjacent markets—warehouse management systems, autonomous
              vehicles,

              and drone software—share technology DNA but serve different buyers and procurement paths.


              Status-quo substitutes for physical AI software include: (a) teach-and-repeat programming, where human
              experts

              manually demonstrate each robot motion; (b) custom per-application machine learning models, requiring
              separate

              training for each task and robot type; and (c) continued human labor, the incumbent in most unstructured

              workflows. The failure mode of these substitutes—cost, inflexibility, and inability to generalize—is
              precisely

              the wedge Skild exploits. The transition from fixed-purpose automation to generalist robot intelligence

              represents a structural market shift rather than incremental feature improvement.
