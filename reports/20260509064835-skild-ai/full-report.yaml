        - Stretched but potentially defensible under winner-take-most platform assumptions
      - - Super-Bull Case
        - 400% YoY
        - $150M
        - 93x
        - 50–100x (peak AI platform multiple)
        - Theoretical justification exists; highly contingent on market capture and moat durability
      - - Exit-Justified Case (2028)
        - 150% CAGR to 2028
        - $750M–$1B ARR
        - 14–19x (mature platform multiple)
        - 10–20x (at-scale enterprise SaaS)
        - Would justify $14B entry; requires 3-year execution without major competitive disruption
    notes: >-
      All ARR projections are analyst estimates based on the disclosed $30M 2025 revenue and hypothetical growth rates.
      Skild AI has not provided revenue guidance. Public market comparable multiples are based on SaaS/AI platform comps
      as of Q1 2026.
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Scenario analysis covers a range from bear to super-bull cases anchored to the $30M 2025 baseline and the $14B
        Series C valuation.
