  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: |
              Skild AI's customer base divides into four distinct segments with different buyer
              characteristics, procurement paths, and strategic value.

              The primary segment is robot OEM partners—hardware manufacturers who license the Skild
              Brain to embed into their own robot product lines. Confirmed OEM partners include ABB
              Robotics (one of the world's largest industrial robot makers), Universal Robots (the
              global leader in collaborative robots, owned by Teradyne), and Mobile Industrial Robots
              (MiR, also owned by Teradyne). These partnerships are distribution multipliers: by
              embedding Skild Brain into ABB's and UR's portfolios of tens of thousands of installed
              robots, Skild gains access to their entire customer base without direct sales overhead.
              The OEM partner relationship is analogous to an AI software provider licensing to a
              hardware OEM—Skild earns per-robot or per-use licensing revenue, while the OEM bundles
              the AI intelligence as a differentiator.

              The second segment is enterprise direct deployers: large enterprises that procure the
              Skild Brain to automate specific workflows within their own facilities. Foxconn (via the
              NVIDIA partnership) is the first publicly named direct deployer, using the Skild Brain on
              Blackwell GPU server assembly lines in Houston. Other direct deployers are confirmed to
              exist in warehousing, construction, and inspection, but their identities are not disclosed.

              The third segment is strategic investor-customers: entities that participated in Skild's
              funding rounds and have stated operational interest. This includes Amazon (Bezos Expeditions),
              Samsung, LG (including the LG CNS commercial partnership), Schneider Electric, CommonSpirit
              Health, and Salesforce Ventures. These are simultaneously financial backers and potential
              deployment customers, making revenue attribution ambiguous.

              The fourth segment is defense and government, signaled by IQT (In-Q-Tel) investment. No
              confirmed defense deployments have been publicly announced, but IQT's mandate is to bridge
              technologies into U.S. national security agencies.
