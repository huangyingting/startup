      - number: '2.3'
        title: Buyer and Segment Map
        blocks:
          - type: paragraph
            body: >
              Skild AI's buyer landscape divides into five distinct segments, each with different buyers, users, budget

              owners, and adoption triggers. In the warehouse and logistics segment—Skild's most active commercial

              vertical—the primary buyer is a logistics operator (3PL) or large retailer. The payer is the CFO or VP

              Operations seeking to reduce labor cost and improve throughput; the user is a robot fleet manager. Budget

              cycles are multi-year capex programs typically in the $500K–$5M range for software, often bundled with

              hardware. The April 2026 Zebra acquisition gives Skild direct enterprise relationships with these buyers.


              In discrete manufacturing, buyers are industrial OEMs or Tier 1 suppliers. Adoption triggers are quality

              consistency, repeatability, and labor availability rather than pure cost. Budget ownership sits with

              manufacturing engineering, and procurement requires safety certification, creating longer sales cycles
              (12–36

              months). Humanoid OEM partnerships represent a nascent but strategically pivotal channel: Skild provides
              the

              robot brain via SDK or cloud API, and the OEM licenses it into their hardware—analogous to a mobile OS

              licensing model. Defense and security buyers procure via government program offices with multi-year
              contracts,

              while facility inspection at hyperscalers and REITs provides fast-moving, high-margin accounts with clear

              ROI from 24/7 coverage replacing night-shift human inspection.
