      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >
              Skild AI was co-founded by Deepak Pathak (CEO) and Abhinav Gupta (President), two of the world's most

              cited researchers in robotics and AI. Together they have a combined h-index of over 150 and more than

              90,000 academic citations, reflecting their exceptional influence across the field.


              Deepak Pathak grew up in a small town in India, earned a gold medal in Computer Science from IIT Kanpur,

              then completed his PhD in AI at UC Berkeley under Alyosha Efros and Trevor Darrell. He conducted
              foundational

              research at Facebook AI Research (FAIR) before becoming the Raj Reddy Associate Professor at CMU's
              Robotics

              Institute. Pathak pioneered work on curiosity-driven exploration, self-supervised learning, and rapid
              motor

              adaptation for robots. He has received the Sloan Research Fellowship, MIT TR35 Innovator Under 35 award,

              and multiple Best Paper awards at major conferences (ICRA, CVPR, RSS, CoRL).


              Abhinav Gupta is a tenured professor at CMU's Robotics Institute and was a founding member and research

              leader at FAIR Robotics (Facebook/Meta). His research focuses on self-supervised learning, visual

              representation learning, and large-scale data for robotic systems. He has received the ONR Young
              Investigator

              Award, PAMI Young Researcher Award, Sloan Fellowship, and Okawa Research Grant. Gupta and Pathak had

              discussed starting a company for over a decade before co-founding Skild in early 2023.


              The broader Skild AI team is drawn from Meta, Tesla, Nvidia, Amazon, Google, CMU, Stanford, and UC
              Berkeley.

              LinkedIn shows approximately 85 employees on the platform as of early 2026, while Tracxn's data (based on

              legal-entity filings) reported 34 employees as of December 31, 2024—the discrepancy likely reflects rapid

              hiring after the Series B and Series C financings.
