      - number: '7.5'
        title: Financial and Capital Structure Risks
        blocks:
          - type: paragraph
            body: |
              Skild's capital structure is characterized by extreme investor concentration and a highly uncertain
              burn-to-revenue trajectory. SoftBank led the Series A ($300M, late 2024), Series B ($135M at $4.5B,
              June 2025), and Series C ($1.4B at $14B, January 2026). This means a single investor controls the
              primary capital lifeline for all three institutional rounds. SoftBank Vision Fund 2—the vehicle most
              likely to contain Skild exposure—reported a $3.6B loss in fiscal year ended March 2025 due to
              portfolio markdowns. The broader Vision Fund has reported approximately $48B in cumulative losses
              over two years through 2023. A SoftBank capital constraint, portfolio rebalancing, or internal
              mandate shift could impair follow-on investment capacity at a critical juncture for Skild.

              The $14B valuation was reached after a tripling in just seven months from the $4.5B Series B
              valuation. This pace of private market valuation inflation—driven by narrative momentum and strategic
              investor enthusiasm rather than revenue trajectory—creates structural risk: a single negative data
              point (missed revenue target, safety incident, competitor breakthrough) could trigger a significant
              valuation reset that impairs future fundraising terms and employee equity retention.

              Monthly gross burn rate is not publicly disclosed. Based on company scale (estimated 200-400 employees
              post-Zebra acquisition), model training infrastructure (GPU compute), office expansion, and
              acquisition integration, gross burn is estimated in the range of $30–60M per month. At this rate
              the $1.4B Series C proceeds (net of Zebra acquisition cash consideration, which is undisclosed) imply
              a gross runway of approximately 18–36 months from January 2026—placing a Series D trigger in late
              2027 or early 2028. Revenue partially offsets burn, but $30M ARR on a monthly basis is approximately
              $2.5M per month against an estimated $30–60M monthly burn, providing minimal offset.

              The Zebra Robotics acquisition adds acquisition integration costs, potential earnout obligations, and
              Fetch Robotics legacy operational costs. The purchase price is undisclosed; any material cash component
              reduces the net Series C runway below the headline estimate.
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
              - CR032
