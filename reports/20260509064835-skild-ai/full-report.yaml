      - number: '1.3'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              Skild AI has executed an exceptionally rapid fundraising trajectory since its founding. The company raised

              an undisclosed seed round from Sequoia Capital in 2023, followed by a landmark $300M Series A on July 9,
              2024,

              at a $1.5B post-money valuation—led by Lightspeed Venture Partners, Coatue, SoftBank Group, and Jeff Bezos

              (through Bezos Expeditions), with additional participation from Felicis Ventures, Sequoia, Menlo Ventures,

              General Catalyst, CRV, Amazon, SV Angel, and Carnegie Mellon University.


              In June 2025, Skild raised approximately $135M in a Series B led by SoftBank (at a reported $100M check),

              with Nvidia contributing $25M and Samsung $10M, at a $4.5B valuation. Seven months later, in January 2026,

              the company closed a $1.4B Series C led by SoftBank Group at a valuation exceeding $14B. That round
              brought

              in strategic investors including NVentures (NVIDIA's VC arm), Macquarie Capital, Jeff Bezos (Bezos

              Expeditions), Samsung, LG, Schneider Electric, CommonSpirit Health, Salesforce Ventures, IQT (In-Q-Tel),

              and others. Prior investors Lightspeed, Felicis, Coatue, and Sequoia all doubled down in the Series C.


              CEO Deepak Pathak stated in January 2026 that the company had raised more than $2B to date. Crunchbase

              tracked $1.83B raised across four rounds as of the Series C. Following the Series C, Skild acquired Zebra

              Technologies' Robotics Automation business in April 2026 in a transaction where Zebra received equity in

              Skild, further expanding the cap table with a strategic industrial partner.


              The investor base is notable for including both leading Silicon Valley VC firms (Sequoia, Lightspeed,
              Coatue,

              Felicis) and major strategic/corporate investors across hardware (NVIDIA, Samsung, LG), industrial
              automation

              (Schneider Electric), healthcare (CommonSpirit), enterprise software (Salesforce Ventures), US defense/

              intelligence (IQT/In-Q-Tel), and global infrastructure capital (Macquarie Capital, SoftBank).
