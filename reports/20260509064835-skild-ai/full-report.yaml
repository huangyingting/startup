  - id: TR005
    title: Mitigation and Kill Criteria Table
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - Sim-to-real generalization failure
        - >-
          Independent third-party benchmark on Skild Brain real-world task success rates; customer deployment failure
          rate reporting
        - >-
          Task success rate <70% in uncontrolled environments OR >2 reported production deployments with generalization
          failure causing customer loss
        - >-
          Thesis break — technical differentiation claim cannot be sustained without independent validation; investment
          at current valuation is not defensible
      - - Valuation / revenue disconnect
        - Quarterly revenue growth trajectory; 2026 annual revenue vs. 2025 actuals
        - >-
          2026 revenue <$100M AND next-round valuation requires >20% down-round from $14B OR next-round cannot be closed
          at any valuation
        - >-
          Thesis break — $14B valuation cannot be supported; potential mark-to-market loss; Series D on adverse terms
          signals distress
      - - SoftBank investor concentration failure
        - >-
          SoftBank Vision Fund 2 quarterly performance reports; SoftBank media coverage of portfolio rationalization;
          Skild next-round announcement
        - SoftBank declines to participate in Series D AND no new institutional lead investor closes within 9 months
        - >-
          Material concern — forces bridge financing, dilutive terms, or strategic sale; reduce exposure until new lead
          investor confirmed
      - - EU regulatory adverse ruling
        - >-
          EU Commission AI Act supervisory authority enforcement action; EU court decision on AI robot liability
          involving Skild or comparable system
        - >-
          Enforcement action naming Skild or its hardware partners; court ruling extending Product Liability Directive
          to cover Skild Brain specifically
        - >-
          Thesis modification — EU market access at risk; adjust TAM; assess cost of compliance remediation before
          increasing investment
      - - Key co-founder departure
        - Public announcement; LinkedIn status change; board 8-K equivalent disclosure (post-IPO) or media reporting
        - >-
          Either Pathak or Gupta departing in a non-planned transition without a credible external successor named
          simultaneously
        - >-
          Thesis break — investor and talent confidence collapse is likely; monitor for 90-day window; exit or maintain
          only if replacement CEO with comparable credibility is immediately announced
    notes: >-
      Kill criteria are defined for the five highest-severity risks. Triggers are designed to be observable from public
      sources or routine diligence conversations. 'Thesis break' implies material reduction or exit of investment
      position, not merely a diligence flag.
