chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Overview
        blocks:
          - type: paragraph
            body: >
              Skild AI was incorporated and founded in May 2023, emerging from stealth in July 2024 with the
              announcement

              of its $300M Series A round. The company is headquartered in Pittsburgh, Pennsylvania, with additional
              offices

              in the San Francisco Bay Area and, since February 2026, Bengaluru, India.


              Skild AI's core product is the "Skild Brain," which the company describes as the industry's first unified

              robotics foundation model. Unlike prior robotic software that was purpose-built for specific robot types
              and

              tasks, the Skild Brain is "omni-bodied": it can control any robot—quadrupeds, humanoids, tabletop arms,

              mobile manipulators—without prior knowledge of the robot's exact physical form. The model enables robots
              to

              handle tasks ranging from simple household chores to physically demanding industrial operations.


              The company's business model is that of a software platform provider: the Skild Brain serves as a

              general-purpose AI layer that hardware makers, system integrators, and enterprise customers can adopt to

              animate diverse robot fleets. Skild generates revenue from enterprise deployments in sectors including

              security/facility inspection, last-mile delivery, warehouses, manufacturing, data centers, and
              construction.

              Following the April 2026 acquisition of Zebra Technologies' Robotics Automation business (including the

              Symmetry Fulfillment platform), Skild expanded into full end-to-end warehouse automation solutions.


              As of January 2026 Skild AI had raised over $2B in total, and commands a valuation of over $14 billion,

              making it one of the most highly valued private robotics companies in the world. Its long-term ambition is

              to develop artificial general intelligence (AGI) rooted in the physical world, challenging the prevailing

              notion that AGI can arise solely from digital knowledge.
