  - id: TV004
    title: Valuation Risk Factors — Prioritized Assessment
    columns:
      - Risk Factor
      - Category
      - Severity
      - Impact on Valuation
      - Mitigant
      - Evidence Basis
    rows:
      - - Unaudited revenue ($30M)
        - Financial quality
        - High
        - If revenue is inflated or non-recurring, the 467x multiple is understated against true ARR
        - Obtain audited financials; confirm recurring contract structure
        - Company press release only; no third-party verification
      - - Open-source commoditization (GR00T, pi0)
        - Competitive
        - High
        - If OEM partners adopt free alternatives, Skild's software pricing power collapses
        - Proprietary data flywheel; enterprise support moat; 1000x training data advantage
        - GR00T open-sourced March 2025; pi0 open-sourced February 2025
      - - SoftBank concentration across all 3 rounds
        - Financial / governance
        - High
        - SoftBank Vision Fund 2 posted $3.6B+ losses in FY2025; follow-on capacity uncertain
        - NVIDIA, Samsung, LG provide diverse strategic capital base
        - Multiple financial press reports; SoftBank earnings disclosures
      - - No independent benchmarks
        - Technical
        - High
        - Without peer-reviewed performance data, Skild's claimed '1000x training data advantage' is unverifiable
        - In-context adaptation demos; NVIDIA case study; HPE partnership
        - No academic paper or third-party benchmark published as of May 2026
      - - 467x ARR multiple — extreme multiple compression risk
        - Valuation
        - High
        - Any growth deceleration or multiple compression results in 50–90%+ drawdown from Series C price
        - Bull case requires $1B+ ARR by 2028–2030 to justify entry
        - Calculated from $14B/$30M; no comparable at this multiple in enterprise AI
      - - Zebra integration risk
        - Operational
        - Medium
        - Symmetry Fulfillment integration adds hardware orchestration complexity; customer churn risk during transition
        - Zebra equity alignment; incremental integration approach
        - Acquisition announced April 2026; no integration metrics disclosed
      - - IQT/dual-use regulatory exposure
        - Regulatory
        - Medium
        - >-
          IQT investment signals defense/intelligence use; creates export control obligations (ITAR, EAR) and restricts
          investor base
        - US-friendly compliance framework; IQT provides regulatory navigation support
        - IQT confirmed as Series C investor; regulatory exposure inferred
      - - Video training data copyright
        - Legal
        - Medium
        - >-
          Skild trains on video data from internet sources; potential copyright infringement liability similar to AI
          image generator cases
        - Industry-wide issue; legal outcome uncertain; could require licensing agreements
        - Inferred from training methodology; no public lawsuit filed against Skild as of May 2026
    notes: >-
      Risk severity is analyst-assessed based on public evidence. 'Impact on Valuation' reflects qualitative effect if
      risk materializes. 'High' severity risks are those with potential to impair the valuation by 50%+ or create
      non-recoverable outcomes.
    enumerationScope:
      coverage: partial
      basis: >-
        Risk factors identified from public disclosures, analyst reports, and sector research. Additional private risks
        (undisclosed litigation, key-person departures, unreported technical failures) may exist.
  - id: TV005
    title: Recommendation Summary Table
    columns:
      - Dimension
      - Assessment
      - Evidence Basis
      - Implication
    rows:
      - - Recommendation
        - Research-more / Track
        - Revenue unaudited; no independent benchmarks; open-source risk unresolved
        - Do not invest at $14B+ without audited revenue, customer cohort data, and independent technical benchmark
      - - Confidence
        - Low
        - 467x ARR multiple; company-stated $30M revenue; no public customer list
        - High uncertainty on fundamental revenue quality and competitive moat durability
      - - Risk Rating
        - High
        - Open-source commoditization; SoftBank concentration; no independent benchmarks; extreme multiple
        - Four concurrent high-severity risks create significant probability of >50% drawdown from Series C price
      - - Valuation Stance
        - Stretched
        - $14B at 467x trailing ARR vs. 15–50x comparable multiples for hyper-growth SaaS
        - Valuation is conditionally justifiable only under the bull-case revenue trajectory
      - - Entry Discipline
        - Pass at current price; track milestones
        - No margin of safety at 467x trailing multiple even under bull growth assumptions
        - Revisit at Series D if audited ARR exceeds $100M and competitive moat is verified
      - - Decision Implication
        - Await audited financials + 2+ quarters ARR continuity
        - Current evidence insufficient to differentiate strategic from fundamental value
        - 'Trigger: audited $100M ARR, named Tier-1 customer, independent benchmark'
    notes: >-
      Recommendation is analyst-assessed based on public evidence only. It is not investment advice. Key inputs are the
      unaudited $30M revenue, the $14B Series C valuation, and the open-source commoditization risk from GR00T and pi0.
    claimRefs:
      - CV003
      - CV004
      - CV028
      - CV029
      - CV030
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner or Diligence Path
    rows:
      - - Audited Revenue
        - Audited financial statements confirming $30M 2025 ARR is recurring, recognized revenue
        - >-
          467x multiple underwritten on faith without audited confirmation; revenue quality (recurring vs one-time) is
          unknown
        - Request from company; minimum 2 prior fiscal-year audits and a current-year management account
      - - Customer Revenue Waterfall
        - Named customer list with revenue attribution, cohort vintage, contract term, and churn rate
        - Without this, growth rate and retention cannot be assessed; OEM vs end-user revenue split is unknown
        - Company data room; validate with at least 3 reference customer calls
      - - Gross Margin by Stream
        - Compute cost-adjusted gross margin for Skild Brain software vs Symmetry hardware services
        - >-
          Software-layer valuation depends on 60–80%+ gross margins; undisclosed compute costs could compress margins
          significantly
        - Request gross margin disclosure by revenue stream; compare to SaaS benchmarks
      - - Independent Technical Benchmark
        - Third-party or peer-reviewed evaluation of Skild Brain vs GR00T and pi0 on standard robotics tasks
        - >-
          '1000x training data advantage' is unverified; competitive moat is the primary basis for the $14B platform
          premium
        - Commission independent benchmark or identify academic collaboration; request any internal benchmark data
      - - SoftBank Commitment
        - Confirmation of SoftBank Vision Fund 2 follow-on capacity and reserve policy for Skild AI
        - >-
          SoftBank led all 3 institutional rounds; Vision Fund 2 posted losses in FY2025; financing concentration risk
          is material
        - SoftBank investor relations; pro-rata rights disclosure in term sheet
      - - IQT / Export Control Framework
        - Formal ITAR/EAR compliance documentation and any contractual restrictions on non-US deployments
        - >-
          IQT investment creates export control obligations; restrictions could limit the international TAM addressable
          by Skild
        - Company legal counsel; request compliance memo and jurisdiction restrictions
      - - Zebra / Symmetry ARR
        - Symmetry Fulfillment ARR at time of acquisition, customer count, and integration timeline
        - >-
          Zebra acquisition changes the revenue base and cost structure; undisclosed metrics prevent updated multiple
          calculation
        - Company M&A disclosure; request Symmetry financial statements at acquisition date
    notes: >-
      Diligence asks are threshold requirements before committing capital at the current $14B+ valuation. Any of the
      first four items, if unsatisfactory, is individually sufficient to disqualify the investment at this price.
    claimRefs:
      - CV030
      - CV029
      - CV003
      - CV019
      - CV006
      - CV026
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks represent the minimum required for investment decision; additional operational, legal, and
        technical diligence would be conducted in a full process.
