      - number: '7.3'
        title: Competitive and Market Risks
        blocks:
          - type: paragraph
            body: |
              Skild operates in one of the most capital-saturated competitive environments in technology. Physical
              Intelligence (pi) raised approximately $1.07B total with a $5.6B valuation as of November 2025 and
              has deployed its foundation models across diverse robot types, offering a subscription model at $300
              per robot per month. Figure AI raised over $1B in a September 2025 Series C at a $39B valuation,
              targeting both industrial and consumer humanoid robots with its proprietary "Helix" VLA system. Both
              are hardware-agnostic competitors with comparable foundation model approaches, comparable funding, and
              overlapping target markets.

              Google DeepMind (RT-2, Gemini Robotics), Amazon (home robots, fulfillment AI), Tesla (Optimus), and
              Meta (home robot research) all bring platform-scale compute, proprietary hardware ecosystems, and
              captive data pipelines that dwarf any startup's resources. Each poses a latent displacement threat if
              they commit resources to external licensing of their robotics AI layers.

              The open-source threat materialized in February 2026 when Alibaba open-sourced a robotics AI foundation
              model, demonstrating that well-resourced actors are willing to commoditize the foundation model layer
              to drive ecosystem adoption. If a capable open-source robot foundation model achieves broad hardware
              partner adoption—analogous to LLaMA's impact on commercial NLP model pricing—Skild's proprietary
              model licensing pricing would face severe downward pressure or displacement. The Partnership on AI
              and Georgetown CSET have both documented the commercial risk to proprietary AI incumbents from
              open-source proliferation.

              Hardware OEM dependency risk is symmetric: Skild's current strategic investors (Samsung, LG, Schneider
              Electric) are also its hardware channel. If any of these partners develop in-house AI capabilities,
              acquires a competitor, or reduces robot production, Skild loses both a revenue source and a deployment
              vector simultaneously.
            claimRefs:
              - CR013
              - CR014
              - CR015
