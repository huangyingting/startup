      - number: '7.6'
        title: Operational and People Risks
        blocks:
          - type: paragraph
            body: |
              Key-person risk is acute. Deepak Pathak (CEO) and Abhinav Gupta (President) are both Carnegie Mellon
              Robotics Institute professors who founded Skild AI in 2023. Their reputations, academic networks, and
              direct technical contributions to the research and architecture underpin the company's ability to
              attract top talent, secure strategic investors, and maintain technical credibility with enterprise
              customers. Neither has previously built and scaled a commercial technology company from early-stage
              through to hundreds of millions in revenue. Their combined 25+ years of academic AI/robotics expertise
              is a profound strength but does not translate directly to commercial operating experience at scale.

              Talent competition is severe. Skild must recruit robotics AI researchers and engineers from a small
              global talent pool simultaneously being targeted by Google DeepMind, Meta AI, Tesla Optimus, Amazon,
              Figure AI, and Physical Intelligence—all of which offer competitive compensation, compute access, and
              their own compelling missions. Loss of senior research staff or failure to hire at the required pace
              would slow model development, reduce deployment quality, and impair the data flywheel.

              The Zebra Robotics acquisition (April 2026, including the Fetch Robotics heritage team) adds
              organizational integration risk. Skild is a research-intensive AI startup; Zebra Technologies is a
              mature enterprise hardware company. Cultural alignment, systems integration, and talent retention from
              the acquired team are documented challenges in enterprise robotics acquisitions. Key Fetch Robotics
              technical personnel who built the Symmetry platform may exit if integration is mishandled, depriving
              Skild of institutional knowledge critical to serving existing Zebra enterprise customers.

              There are no disclosed succession plans for co-founders, no disclosed COO or chief commercial officer
              with enterprise scaling experience, and no evidence of a seasoned enterprise SaaS leadership team
              (VP Sales, VP Customer Success) of the caliber typically required to scale from $30M to $200M ARR
              in enterprise automation markets. Academic-to-commercial leadership transition risk is a commonly
              documented failure mode for deep-tech spinouts.
            claimRefs:
              - CR033
              - CR034
              - CR035
              - CR036
              - CR037
              - CR038
