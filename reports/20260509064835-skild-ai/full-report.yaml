      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The most durable growth driver is structural labor scarcity: the US Chamber of Commerce reports 1.7M+

              unfilled manufacturing jobs today, and the National Association of Manufacturers projects 2.1M unfilled

              positions by 2030. This is not a cyclical gap—demographic trends and reshoring mandates will keep
              automation

              demand structurally elevated for the foreseeable future. E-commerce growth compounds this effect: the

              warehouse automation software segment is growing at 14.87% CAGR through 2031 (Mordor Intelligence),

              faster than hardware, validating the thesis that intelligence—not iron—is becoming the scarce value.


              The second major driver is the AI foundation model breakthrough. For the first time, large multimodal
              models

              can generalize across robot morphologies and tasks with minimal retraining. Sequoia Capital, Skild's
              earliest

              backer, explicitly framed their investment as analogous to the GPT-3 moment for language AI—the arrival of
              a

              generalist intelligence architecture. Piece-picking robots, one of the most commercially valuable and

              technically demanding subtasks, are forecast to grow at 15.27% CAGR through 2031 (Mordor Intelligence),

              validating demand for Skild's dexterous manipulation capabilities.


              Primary constraints are training data scarcity (MarketsandMarkets identifies this as the key market

              challenge), high initial capital intensity ($15K–$75K for industrial robot hardware alone, before
              integration),

              and the complexity of deploying AI systems in unstructured environments (requiring specialized robotics

              integrators and extensive operator training). Safety certification timelines in healthcare and defense can

              extend to 24–48 months, limiting near-term revenue from regulated segments. A structural diligence
              question

              remains whether open-source foundation models (Google RT-2, OpenVLA) commoditize the AI layer faster than

              Skild can entrench data flywheel advantages and customer switching costs.
