callouts:
  - calloutType: strength
    title: Elite Founder Credentials
    body: |
      Deepak Pathak and Abhinav Gupta rank among the world's most cited researchers in embodied AI, with
      a combined 150+ h-index and 90,000+ citations. Their track record of academic breakthroughs directly
      translates to the technical capabilities embedded in the Skild Brain, providing a durable research moat.
    claimRefs:
      - CO011
      - CO012
  - calloutType: risk
    title: Key-Person Concentration Risk
    body: |
      Skild AI's technology, investor relationships, and public credibility are closely tied to the two
      co-founders. A departure, incapacitation, or conflict between Pathak and Gupta would materially
      impair the company's ability to execute its technical roadmap and maintain investor confidence at
      its current valuation. The company has not publicly disclosed a succession plan or deep leadership bench.
    claimRefs:
      - CO006
      - CO007
  - calloutType: insight
    title: SoftBank as Anchor Investor Across Three Rounds
    body: |
      SoftBank has led or participated in every post-seed round (A, B, C), contributing the majority of
      the capital across later rounds. While this signals SoftBank's conviction, it also creates
      concentration in the cap table—a risk if SoftBank's own capital priorities shift.
    claimRefs:
      - CO016
      - CO017
      - CO018
