company:
  name: Skild AI
chapter:
  number: 1
  title: Company Overview
  summary: |
    Skild AI is a Pittsburgh-based AI robotics company founded in May 2023 by CMU Robotics Institute professors
    Deepak Pathak (CEO) and Abhinav Gupta (President). The company is building the "Skild Brain," the industry's
    first unified omni-bodied foundation model capable of controlling any robot for any task without prior
    knowledge of the robot's exact body form. Since its July 2024 Series A at a $1.5B valuation, Skild has
    raised over $2B in total, reaching a $14B+ valuation in January 2026. Revenue grew from zero to approximately
    $30M in just a few months in 2025. In April 2026, Skild acquired Zebra Technologies' Robotics Automation
    business to accelerate end-to-end warehouse deployment. The company operates offices in Pittsburgh,
    SF Bay Area, and Bengaluru, India.
sections:
  - id: s1
    title: Identity and Business Overview
    body: |
      Skild AI was incorporated and founded in May 2023, emerging from stealth in July 2024 with the announcement
      of its $300M Series A round. The company is headquartered in Pittsburgh, Pennsylvania, with additional offices
      in the San Francisco Bay Area and, since February 2026, Bengaluru, India.

      Skild AI's core product is the "Skild Brain," which the company describes as the industry's first unified
      robotics foundation model. Unlike prior robotic software that was purpose-built for specific robot types and
      tasks, the Skild Brain is "omni-bodied": it can control any robot—quadrupeds, humanoids, tabletop arms,
      mobile manipulators—without prior knowledge of the robot's exact physical form. The model enables robots to
      handle tasks ranging from simple household chores to physically demanding industrial operations.

      The company's business model is that of a software platform provider: the Skild Brain serves as a
      general-purpose AI layer that hardware makers, system integrators, and enterprise customers can adopt to
      animate diverse robot fleets. Skild generates revenue from enterprise deployments in sectors including
      security/facility inspection, last-mile delivery, warehouses, manufacturing, data centers, and construction.
      Following the April 2026 acquisition of Zebra Technologies' Robotics Automation business (including the
      Symmetry Fulfillment platform), Skild expanded into full end-to-end warehouse automation solutions.

      As of January 2026 Skild AI had raised over $2B in total, and commands a valuation of over $14 billion,
      making it one of the most highly valued private robotics companies in the world. Its long-term ambition is
      to develop artificial general intelligence (AGI) rooted in the physical world, challenging the prevailing
      notion that AGI can arise solely from digital knowledge.
