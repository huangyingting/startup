companyProfile:
  summary: >
    Skild AI is a Pittsburgh-based robotics foundation model company founded in 2023 by CMU/FAIR
    researchers Deepak Pathak, Abhinav Gupta, and Ashish Kumar. Its flagship product, the Skild Brain,
    is a hardware-agnostic AI platform trained on 100,000+ simulated robot morphologies that enables
    any robot to perform complex tasks without prior knowledge of its hardware. Backed by $1.83B+
    and valued at $14B after a SoftBank-led Series C, it is the most highly capitalized software-first
    robotics AI company globally.
  foundedDate: "2023-01-01"
  founders:
    - name: Deepak Pathak
      role: Co-Founder
      background: >
        CMU Associate Professor and Meta AI Research (FAIR) researcher; creator of curiosity-driven
        RL and landmark embodied AI papers underpinning the Skild Brain's technical architecture.
      claimRefs: [CO005, CO006]
    - name: Abhinav Gupta
      role: Co-Founder
      background: >
        CMU professor and pioneering robotics ML researcher; co-inventor of large-scale visual
        learning and grasping architectures central to the Skild Brain's pre-training regime.
      claimRefs: [CO005, CO007]
    - name: Ashish Kumar
      role: "Co-Founder & CEO"
      background: >
        PhD researcher in legged locomotion and Rapid Motor Adaptation (RMA); operational leader
        responsible for commercial partnerships and the Zebra Symmetry acquisition.
      claimRefs: [CO005, CO008]
  foundingLocation: "Pittsburgh, Pennsylvania, USA"
  headquarters: "Pittsburgh, Pennsylvania, USA"
  productSummary: >
    The Skild Brain is a hardware-agnostic robotics foundation model delivered as an enterprise API,
    trained across 100,000+ simulated robot morphologies in the Multiverse simulation environment.
    It combines a hierarchical architecture (high-level planner + low-level motor controller) with
    in-context adaptation for zero-shot generalization to unseen robot hardware. The April 2026
    Zebra Symmetry acquisition adds enterprise-grade fleet orchestration and real-time monitoring.
  customerFocus: >
    Enterprise OEMs and system integrators deploying autonomous robots in security patrol, warehouse
    logistics, building inspection, construction, data center maintenance, and manufacturing.
  businessModel: >
    API-based licensing — customers pay per robot instance or per API call to embed the Skild Brain
    in their existing robot platforms. Secondary revenue from fleet orchestration (Zebra Symmetry)
    and a nascent government/dual-use channel via IQT investor relationships.
  stage: series-c
  fundingStatus: >
    Series C closed January 2026 at $14B post-money, raising $1.4B led by SoftBank Vision Fund 2.
    Prior rounds: $300M Series A (Jul 2024, ~$1.5B), $500M Series B (May 2025, $4.7B). Total: $1.83B+.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO003, CO005, CI001, CI008, CE001]

summary:
  headline: >
    Skild AI is the early platform leader in hardware-agnostic robotics AI with genuine technical
    differentiation, but its $14B valuation at ~467x ARR leaves no margin for execution risk —
    warrant research-more pending audited economics and public benchmarks.
  overallScore: 6.2
  recommendation: research-more
  confidence: medium
  riskRating: high
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 14000
    revenueRunRateUsdM: 30
    arrUsdM: 30
    revenueGrowthYoYPct: null
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 1830
    customerCount: null
    headcount: null
  topStrengths:
    - >
      Unique omni-bodied architecture trained on 100K+ morphologies has no direct public equivalent;
      the CMU/FAIR founder team has the deepest academic-to-commercial IP transfer in the physical AI sector.
    - >
      $1.83B raised from strategically aligned investors (NVIDIA, Samsung, LG, SoftBank) who are also
      distribution partners, collapsing the typical hardware go-to-market barrier for robotics AI.
    - >
      Zebra Symmetry acquisition adds enterprise fleet orchestration and an inherited customer base,
      converting a pure API play into a managed-service offer with higher switching costs.
  topRisks:
    - >
      NVIDIA GR00T N1 open model and Physical Intelligence pi0 directly compete on the core use-case
      with zero licensing cost, creating structural commoditization pressure on pricing and margins.
    - >
      $14B valuation at ~467x trailing ARR is the highest disclosed revenue multiple in the sector;
      multiple compression toward software-first comps ($3-7B range) implies negative entry-price returns.
    - >
      IQT (In-Q-Tel) investor creates dual-use/export control exposure; no Form D or audited financials
      publicly available; Zebra Symmetry IP chain and integration depth unverified.
  unresolvedGaps:
    - >
      Audited revenue, gross margin, burn rate, and cash balance are not public; the $30M ARR figure
      is third-party inferred and could not be verified against company-disclosed data.
    - >
      No named enterprise customers are publicly confirmed; claimed deployment verticals lack reference
      customers, making commercial traction verification impossible without primary access.
    - >
      IQT dual-use restrictions, export control obligations, and any government data-sharing requirements
      tied to the IQT investment are undisclosed.
