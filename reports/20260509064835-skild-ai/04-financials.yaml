company:
  name: Skild AI

chapter:
  number: 4
  title: Financials
  summary: |
    Skild AI has raised approximately $2B+ across four rounds in under three years (Seed → Series C),
    reaching a $14B+ valuation by January 2026. The company reported ~$30M in revenue for 2025—company-stated
    and unaudited—growing from zero in just a few months, across enterprise verticals including warehousing,
    security, manufacturing, delivery, data centers, and construction. The business model is software-platform
    licensing (Skild Brain API/SDK plus cloud inference services), with unconfirmed but structurally plausible
    gross margins of 60–80% at scale. Monthly burn is not publicly disclosed; the $1.4B Series C implies
    18–36+ months of runway even at aggressive AI-scale spending ($30–60M/month estimate). The April 2026
    Zebra Technologies acquisition adds hardware orchestration capabilities and a strategic equity partner.
    Key diligence blockers include: unaudited revenue, undisclosed unit economics (CAC, LTV, churn), no
    disclosed gross margin, unknown capital allocation between model training and sales/G&A, and no
    third-party verification of customer concentration or contract structure.

sections:
  - id: s1
    title: Revenue Model and Pricing
    body: |
      Skild AI's primary revenue mechanism is licensing the Skild Brain foundation model to enterprise
      customers through cloud-based APIs and SDKs. Customers—robot OEMs, system integrators, and large
      enterprise operators—pay for access to the robot intelligence layer rather than developing proprietary
      control systems. This positions Skild as a horizontal software platform in the robotics stack, analogous
      to an operating system that hardware manufacturers plug into.

      The company's publicly described revenue streams include: (1) foundation model licensing for robot
      hardware makers; (2) vertical-specific software modules for security inspection, warehouse orchestration,
      and manufacturing; (3) cloud infrastructure services for inference and training; and (4) post-Zebra
      acquisition, end-to-end warehouse automation that combines the Skild Brain with Zebra's Symmetry
      Fulfillment orchestration platform. Skild's official website describes a "Mobile Manipulation Platform"
      offering skills—grasping, handover, navigation—abstracted to API calls, suggesting a programmable
      interface model where enterprise developers build applications on top.

      Exact pricing is not publicly disclosed. Based on Sacra's analysis and comparable enterprise AI platform
      benchmarks, pricing is likely structured as multi-year enterprise subscriptions with per-robot or
      fleet-level licensing tiers, potentially supplemented by usage-based cloud compute fees. List pricing
      for enterprise robotics AI platforms in 2025 typically ranges from $10,000–$100,000+ per robot per year
      depending on capabilities and volume discounts.

      Revenue for 2025 was reported by the company as approximately $30M—growing from zero in "just a few
      months." This figure is company-stated and has not been independently audited or confirmed by a third
      party. The $30M figure implies a small number of large enterprise contracts (dozens to hundreds of
      robots at high ACV) or a larger number of smaller deals, neither of which has been publicly broken out.
      Following the Series C and the Zebra acquisition, management has described the company as "growing
      exponentially," signaling expectations of significant revenue acceleration in 2026.

    claimRefs: [CI001, CI002, CI003, CI004, CI011, CI012, CI013, CI014, CI036]

  - id: s2
    title: Cost Structure and Unit Economics
    body: |
      Skild AI's cost structure is dominated by compute—training and inference for large robotic foundation
      models is inherently capital-intensive. Frontier AI model training runs cost $30M–$200M+ per run as
      of 2024–2025, with compute costs compounding at roughly 2.4x per year (doubling every 8–10 months
      per Epoch.ai data). Robotic foundation models present additional data-infrastructure costs versus
      text or vision models: simulation environments, teleoperation datasets, sensor fusion pipelines, and
      real-world deployment feedback loops all require sustained engineering and compute investment.

      The company has not disclosed gross margin, cost of revenue, operating expenses, or capital expenditure
      figures. Structurally, a software-platform model with cloud-delivered API access should achieve high
      gross margins at scale—industry benchmarks for enterprise AI platform SaaS suggest 60–80% gross
      margin is achievable—but early-stage revenue at $30M is insufficient to amortize foundation model
      training costs. Inference serving costs, customer onboarding, and field deployment support likely
      compress near-term gross margins well below long-run targets.

      Unit economics (CAC, LTV, churn, payback period) are not publicly disclosed. The enterprise robotics
      segment typically features high sales cycle duration (6–18 months), high ACV, and high switching
      costs once a robot fleet is trained on and integrated with a specific AI layer. LTV is structurally
      high if the data flywheel increases model quality with each deployment, creating compounding value
      for existing customers. However, no customer-level retention data, churn rates, or contract renewal
      terms are publicly available for Skild AI.

      The Zebra Technologies acquisition adds hardware-integration complexity: the Symmetry Fulfillment
      orchestration platform carries different margin economics than pure-software licensing. Integration
      of fleet-level orchestration with the Skild Brain may temporarily elevate cost of revenue as
      professional services and deployment support scale with enterprise warehouse contracts.

    claimRefs: [CI020, CI021, CI022, CI023, CI029, CI030, CI032, CI035]

  - id: s3
    title: Capital Adequacy and Funding Structure
    body: |
      Skild AI has raised capital at an exceptional pace for a company of its age and stage. The funding
      chronology (documented in Chapter 1 / Company Overview, referenced here via claimRefs) spans four
      rounds from a 2023 seed to a $1.4B Series C in January 2026. CEO Deepak Pathak publicly stated the
      company has raised more than $2B in total; Crunchbase's tracked figure is $1.83B across four rounds.
      The discrepancy reflects the undisclosed seed size and any tranching or capital call structures not
      yet recorded.

      Cash on hand is not publicly disclosed. Assuming the full $1.4B Series C closed and transferred to
      the company's balance sheet in January 2026, gross proceeds provide substantial runway. At an
      estimated burn of $10–50M per month (consistent with an AI research and enterprise deployment
      company of this scale and ambition), the Series C alone implies 28–140 months of gross runway.
      A more conservative estimate of $30–50M/month burn for model training, headcount (~85+ employees),
      office expansion, and Zebra integration costs implies 28–47 months of runway from the January 2026
      close—taking the company to 2028–2030 without additional capital.

      The use of proceeds stated by the company is: continuing to scale model training and growing
      future deployment of the technology. No specific allocation to sales/marketing, R&D, G&A, or
      infrastructure capex has been disclosed. There are no publicly disclosed debt facilities, credit
      lines, or project-finance obligations. The Zebra acquisition was structured as cash plus equity
      (Zebra received shares in Skild AI), meaning not all of the Series C was deployed as cash outflow
      at acquisition closing.

      The investor base is concentrated: SoftBank has led or participated in every post-seed round (A, B, C)
      and is estimated to have committed $1B+ across those rounds. This creates financial concentration
      risk—SoftBank's continued support is important for subsequent rounds, and any change in SoftBank's
      investment posture could impair Skild's access to capital markets at favorable valuations. Strategic
      investors including NVIDIA, Samsung, LG, and Zebra also hold equity, creating alignment but also
      potential governance complexity.

    claimRefs: [CI005, CI007, CI008, CI009, CI010, CI015, CI016, CI017, CI018, CI026, CI030, CI031, CI040]

  - id: s4
    title: Public Metrics vs Evidence Gaps
    body: |
      Skild AI discloses an unusually limited set of financial metrics for a company at its scale and
      investor profile. The primary public financial data point is the ~$30M revenue figure for 2025,
      which was disclosed in the Series C press release and subsequent investor communications. No ARR,
      ACV, customer count, retention metrics, or cohort data has been provided.

      The $1.4B Series C valuation of $14B implies a revenue multiple of approximately 467x trailing
      2025 revenue—a figure that can only be justified by (a) a very high near-term revenue growth rate
      (the company's "growing exponentially" language), (b) a belief that the foundation model platform
      has winner-take-most dynamics that support a large eventual installed base, or (c) strategic option
      value from the Zebra acquisition, IQT's national-security signal, and NVIDIA's physical-AI roadmap.
      None of these hypotheses can be verified from public data.

      Key metrics that remain private include: gross margin, operating loss, monthly burn rate, next
      fundraising trigger, customer count, average contract value, churn rate, and net revenue retention.
      The company is private, is not subject to public reporting requirements, and has not filed a
      registration statement. Audited financial statements are not publicly available.

      The Zebra Technologies acquisition introduces a new revenue stream from the Symmetry Fulfillment
      platform and its existing customer base, but no revenue, margin, or EBITDA figures for the Zebra
      robotics division have been disclosed by either party. Zebra Technologies, as a public company,
      may have disclosed more detail in its 10-Q or 8-K filings following the April 2026 divestiture.

    claimRefs: [CI034, CI035, CI037, CI038, CI004, CI027, CI028, CI001, CI018]

  - id: s5
    title: Financial Verdict
    body: |
      Skild AI's financial profile presents a high-conviction bet on software-platform economics in
      physical AI, backed by compelling early revenue traction but with substantial diligence blockers.
      The $30M revenue figure—if genuine and primarily recurring—demonstrates that enterprise customers
      are willing to pay for a horizontal robotics AI layer. The speed of monetization (zero to $30M in
      months) is rare for a deep-tech foundation model company and supports the "GPT-3 moment for
      robotics" investment thesis articulated by lead investors.

      Capital adequacy is strong in the near term: the $1.4B Series C provides substantial runway even
      at aggressive burn rates implied by frontier model training and rapid enterprise scaling. Strategic
      investors (NVIDIA, Samsung, LG, Zebra, IQT) provide distribution, hardware access, and market
      signal beyond pure capital.

      The financial risks cluster around three themes: (1) Revenue quality—the $30M is unaudited,
      may be recognized on non-recurring milestones, and could be concentrated in a small number of
      pilots not yet converted to recurring contracts; (2) Margin path—compute costs are on an
      exponential trajectory, and the robotics data infrastructure required to sustain model quality
      may compress margins significantly before the company reaches scale; and (3) Valuation anchor—
      the $14B valuation at 467x 2025 revenue leaves no margin for commercial execution risk or
      multiple compression, creating a challenging path to a public-market exit or secondary-market
      liquidity without continued exponential revenue growth.

      The most material diligence gap is the absence of audited financials and any independent
      verification of the revenue figure, customer count, or contract structure. Any serious diligence
      process must obtain audited statements, a detailed revenue waterfall by customer and cohort,
      and evidence of at minimum 2–3 quarters of sustained recurring revenue before committing at
      the current valuation.

    claimRefs: [CI001, CI004, CI023, CI029, CI030, CI034, CI035, CI037]

