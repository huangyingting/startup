  - id: M2
    title: Market Sizing Analysis
    body: |
      Market sizing for physical AI / embodied intelligence software is complicated by widely varying scope definitions
      across research houses. Grand View Research sizes the embodied AI market at $4.67B in 2025, growing to $67.6B by
      2033 at a CAGR of 39.7%. MarketsandMarkets provides a similar 2025 anchor of $4.44B but a more conservative 2030
      target of $23.1B at 39.0% CAGR. These estimates represent the addressable software-centric framing most relevant
      to Skild. Broader market estimates—industrial robotics hardware ($16.9–34.0B in 2024) and warehouse automation
      systems ($19.2–30.0B in 2025)—include hardware spend that Skild does not directly capture but that defines the
      installed base of robots it can animate.

      Applying a TAM/SAM/SOM lens: Skild's TAM is the global embodied AI software market ($4.4–4.7B in 2025, growing
      toward $23–68B by 2030–2033). Its SAM is the enterprise robotic AI software market for industrial and logistics
      robots—a subset of TAM excluding consumer, medical, and defense-classified segments, estimated at approximately
      $2–3B in 2025. The SOM encompasses warehouse automation, discrete manufacturing, and facility inspection
      verticals where Skild has active partnerships or deployments, estimated at $200–500M today and expanding rapidly
      as the Zebra acquisition adds enterprise distribution.

      Humanoid robot forecasts represent an additional long-dated market vector: Goldman Sachs projects humanoid robots
      viable in factories by 2025–2028 and consumer applications by 2030–2035; Morgan Stanley sizes the total humanoid
      ecosystem at $5 trillion by 2050. Skild's omni-bodied model architecture is specifically designed to serve
      humanoid platforms, making it a potential beneficiary of whichever humanoid OEM achieves scale first. These
      long-range forecasts carry wide analyst uncertainty and should be treated as scenario data rather than base case.

      Total global robotics venture funding reached $13.8B in 2025, up from $7.8B in 2024—a signal of strong
      investor conviction in near-term robot adoption across segments.
