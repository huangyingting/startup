  - id: TM004
    title: Growth Drivers and Constraints Table
    columns:
      - Factor
      - Direction
      - Timing
      - Implication for Skild
      - Diligence Ask
    rows:
      - - Labor shortage (structural)
        - Driver
        - Now – ongoing
        - 1.7M unfilled US manufacturing jobs creates durable automation demand across Skild's target segments
        - Is Skild winning deals where labor cost is the primary driver vs. capability-driven displacement?
      - - AI foundation model breakthrough
        - Driver
        - Now – 2027
        - >-
          Generalist robot AI enables task transfer without per-task ML engineering, removing the key barrier to wide
          deployment
        - How does Skild's model performance benchmark vs. Google RT-2, OpenVLA, Physical Intelligence π0?
      - - E-commerce throughput demand
        - Driver
        - Now – 2030
        - Amazon-set fulfillment standards force 3PLs to automate; warehouse automation software growing at 14.87% CAGR
        - What share of Skild-Zebra pipeline is driven by e-commerce customers vs. other verticals?
      - - Software value-shift in automation
        - Driver
        - 2025 – 2030
        - >-
          Software segment of warehouse automation growing faster than hardware (14.87% vs. overall 13.98% CAGR),
          validating intelligence-layer thesis
        - Can Skild capture software margin without hardware bundling pressure from competitors?
      - - Piece-picking robotics growth
        - Driver
        - 2025 – 2031
        - >-
          Piece-picking is fastest-growing robotics sub-segment at 15.27% CAGR; Skild's dexterous manipulation AI
          directly addresses this
        - What is Skild's piece-picking success rate vs. industry benchmarks (>99% typically required)?
      - - Training data scarcity (constraint)
        - Constraint
        - Now – 2028
        - >-
          Real-world robot training data is expensive and proprietary; identified as #1 market challenge by
          MarketsandMarkets
        - How many robot-hours of training data has Skild accumulated? Is it defensible IP?
      - - High initial CapEx (constraint)
        - Constraint
        - Now – 2028
        - Industrial robot systems cost $15K–$75K+ before AI software; SME market largely inaccessible without financing
        - Does Skild offer RaaS (Robotics-as-a-Service) or financing options that lower CapEx barrier?
      - - Integration complexity (constraint)
        - Constraint
        - Now – 2029
        - >-
          Deployment requires coordination of robotics engineers, production managers, and IT; qualified integrators are
          scarce
        - How many certified system integrators does Skild have in its partner ecosystem?
      - - Safety and regulatory barriers (constraint)
        - Constraint
        - Now – 2030
        - >-
          Healthcare and defense deployments require 24–48 months for safety certification; creates delayed revenue
          recognition
        - Which regulatory standards (ISO 10218, IEC 62443) has Skild achieved for its AI systems?
      - - Open-source AI commoditization risk (constraint)
        - Constraint
        - 2026 – 2029
        - >-
          Google RT-2, OpenVLA, and Physical Intelligence π0 are publicly available; commoditization could compress
          Skild's software margin
        - What is Skild's performance advantage over best open-source models on standardized benchmarks?
    notes: >-
      Direction, timing, and implications are author-assessed from publicly available market data and investor
      commentary. Constraint severity ratings are qualitative. Diligence asks are unresolved as of this writing.
