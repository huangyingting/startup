company:
  name: Skild AI
chapter:
  number: 2
  title: Market Analysis
  summary: |
    Skild AI competes in the physical AI / embodied intelligence software market—the layer that makes commercial robots
    capable of generalizing across tasks and environments. The direct market (embodied AI) is estimated at $4.4–4.7B
    in 2025, growing to $23–68B by 2030–2033 at a 39%+ CAGR. The broader industrial robotics hardware market ($34B
    in 2024, CAGR ~10%) and warehouse automation ($30B in 2025, CAGR ~14–19%) define the ecosystem in which Skild
    competes for software value. Primary buyers are logistics/warehouse operators and robot hardware OEMs seeking
    embedded AI intelligence. Key growth drivers are structural labor shortages (1.7M+ unfilled US manufacturing
    jobs), AI foundation model breakthroughs, and e-commerce throughput demands. Primary constraints are training
    data scarcity, high capital intensity, and integration complexity. Analyst estimates diverge sharply—industrial
    robotics ranges from $16.9B to $34B for the same year (2024)—reflecting differing scope definitions and
    methodological choices rather than genuine market uncertainty.
sections:
  - id: M1
    title: Market Definition and Scope
    body: |
      Skild AI operates at the intersection of robotics hardware and artificial intelligence software, specifically
      targeting the physical AI or embodied intelligence layer: AI software that enables robots to perceive, reason,
      plan, and act in unstructured real-world environments. This distinguishes Skild from both traditional robot
      hardware manufacturers (e.g., ABB, KUKA, Fanuc) and task-specific automation software vendors.

      The market boundary for this analysis encompasses: (1) AI foundation model software and APIs for commercial
      robots; (2) robot intelligence middleware, simulation platforms, and training infrastructure; and (3) end-to-end
      robotic automation software solutions (such as Skild's post-acquisition Symmetry Fulfillment platform). Excluded
      spend includes robot hardware (actuators, sensors, frames), human-operated machinery, and classical rule-based
      industrial automation software (PLCs, SCADA). Adjacent markets—warehouse management systems, autonomous vehicles,
      and drone software—share technology DNA but serve different buyers and procurement paths.

      Status-quo substitutes for physical AI software include: (a) teach-and-repeat programming, where human experts
      manually demonstrate each robot motion; (b) custom per-application machine learning models, requiring separate
      training for each task and robot type; and (c) continued human labor, the incumbent in most unstructured
      workflows. The failure mode of these substitutes—cost, inflexibility, and inability to generalize—is precisely
      the wedge Skild exploits. The transition from fixed-purpose automation to generalist robot intelligence
      represents a structural market shift rather than incremental feature improvement.
    claimRefs:
