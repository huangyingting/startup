  - id: FM004
    title: Adoption Funnel or Value Chain Map
    type: flow
    layout: standard
    summary: |
      Value chain for physical AI deployment, showing actors from robot hardware manufacturing through
      enterprise deployment. Skild operates as the AI intelligence layer between hardware OEM and enterprise
      operator. Critically, operational deployment creates a real-world data flywheel that loops back to Skild
      for model improvement—a structural competitive advantage.
    data:
      nodes:
        - id: n1
          label: Robot Hardware OEM
          detail: >-
            Manufactures physical robot platforms — arms, humanoids, AMRs, quadrupeds; examples: KUKA, Boston Dynamics,
            Figure, Agility Robotics, Zebra
        - id: n2
          label: Skild AI — Foundation Model
          detail: >-
            Provides omni-bodied AI software layer (Skild Brain) via embedded SDK or cloud API; trains on real-world
            deployment data from all partners
        - id: n3
          label: System Integrator / VAR
          detail: >-
            Configures and deploys combined robot + Skild AI system for enterprise customer; requires robotics
            engineering expertise; scarce supply
        - id: n4
          label: Enterprise Operator
          detail: >-
            Warehouse, factory, or facility running Skild-powered robot fleet in production; generates real-world
            training data at scale
        - id: n5
          label: End Beneficiary
          detail: >-
            Business unit achieving measurable gains — throughput, labor cost reduction, quality improvement, or uptime
            increase
