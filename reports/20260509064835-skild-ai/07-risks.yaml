  researchQuestions:
    - id: QR001
      question: >-
        Has Skild Brain demonstrated reliable real-world generalization beyond controlled demonstration conditions, and
        what is the documented failure rate in unstructured production environments?
      type: adverse
      status: unresolved
      answer: null
      targets:
        - contentRequirements/0
        - contentRequirements/2
    - id: QR002
      question: >-
        Could SoftBank's deteriorating Vision Fund 2 financial performance force reduced follow-on investment capacity
        for Skild AI at the critical Series D juncture?
      type: adverse
      status: answered
      answer: >-
        SoftBank Vision Fund 2 posted a $3.6B loss in fiscal year ended March 2025 (Pitchbook, CNBC) and cumulative
        Vision Fund losses exceed $48B through 2023 (Bloomberg Línea). SoftBank led all three of Skild's institutional
        rounds. Follow-on capacity is uncertain but cannot be confirmed without current SoftBank mandate and LP
        commitment data.
      targets:
        - contentRequirements/3
        - contentRequirements/4
    - id: QR003
      question: >-
        Does Skild AI's internet-scale video training dataset create unresolvable copyright liability exposure that
        could require costly retraining or generate adverse court rulings?
      type: adverse
      status: answered
      answer: >-
        Skild has not publicly disclosed licensing terms for internet video training data. The copyright exposure is
        structurally similar to challenges facing Stability AI and OpenAI. No lawsuit against Skild has been identified
        as of May 2026. Risk exists but severity is unknown without legal analysis of Skild's training data composition
        and licensing.
      targets:
        - contentRequirements/1
        - contentRequirements/0
    - id: QR004
      question: >-
        Is Skild AI's $14B valuation defensible if its $30M revenue base fails to grow materially beyond $50–100M in
        2026, given the 467x multiple implied by the current valuation?
      type: adverse
      status: answered
      answer: >-
        No. At a 467x revenue multiple ($14B on $30M), Skild requires exceptional and rapid revenue growth to sustain
        any conventional valuation framework. If 2026 revenue remains below $100M, the effective multiple would remain
        above 140x — comparable to peak-cycle outlier multiples but not defensible at Series D. A down-round scenario is
        arithmetically plausible if 2026 misses.
      targets:
        - contentRequirements/0
        - contentRequirements/4
    - id: QR005
      question: >-
        Has the Skild Brain received any independent third-party physical or AI safety certification applicable to
        shared human-robot workspace deployments?
      type: verification
      status: answered
      answer: >-
        No. As of May 2026, no publicly disclosed third-party safety certifications (ISO 10218, ANSI/RIA R15.06, IEC
        62443, or equivalent) have been published for the Skild Brain. This is a procurement gate for regulated sectors
        and creates EU regulatory compliance risk under the AI Act and Machinery Regulation 2023/1230.
      targets:
        - contentRequirements/2
        - plannedTables/operational-quality-security-risk-register
    - id: QR006
      question: Is the $30M 2025 revenue figure for Skild AI audited or independently verified by any third party?
      type: verification
      status: answered
      answer: >-
        No. The $30M revenue figure is company-stated in the Series C press release and Crunchbase coverage. No
        independent audit, customer disclosure, or third-party verification has been published. Revenue quality cannot
        be assessed without audited financial statements.
      targets:
        - contentRequirements/4
        - contentRequirements/0
    - id: QR007
      question: Has Skild AI disclosed any litigation, active regulatory inquiry, or IP challenge as of May 2026?
      type: verification
      status: answered
      answer: >-
        No litigation, regulatory inquiry, or IP challenge involving Skild AI has been identified in publicly available
        sources as of May 2026. The company is a private entity not subject to SEC disclosure; absence of public record
        does not rule out undisclosed proceedings.
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
    - id: QR008
      question: >-
        Is the In-Q-Tel investment in Skild AI subject to ITAR or EAR dual-use export control restrictions that would
        limit Skild's addressable international customer base?
      type: verification
      status: answered
      answer: >-
        In-Q-Tel is a disclosed investor (cited in Lightspeed and other Series A coverage). Portfolio companies that
        receive In-Q-Tel investment may be subject to enhanced ITAR/EAR scrutiny if the underlying technology has
        intelligence or defense dual-use characteristics. Skild has not publicly disclosed any technology control plan,
        investment restriction, or export limitation arising from this relationship.
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
    - id: QR009
      question: What is Skild AI's estimated monthly gross burn rate, and how does it affect the post-Series C runway?
      type: quantification
      status: answered
      answer: >-
        Monthly gross burn rate is not publicly disclosed. Based on estimated headcount (200-400 post-Zebra), compute
        infrastructure, and comparable AI company benchmarks, gross burn is estimated at $30–60M per month. At this
        rate, the $1.4B Series C net of Zebra acquisition costs implies approximately 18–36 months runway from January
        2026, placing a Series D trigger in late 2027 or early 2028.
      targets:
        - contentRequirements/4
    - id: QR010
      question: >-
        What revenue multiple does the $14B+ valuation imply, and how does it compare to comparable AI platform
        companies at comparable revenue stages?
      type: quantification
      status: answered
      answer: >-
        The $14B valuation on $30M in company-stated 2025 revenue implies approximately 467x trailing revenue multiple.
        This exceeds peak-cycle NTM multiples for the highest-valued software companies (Snowflake at IPO was ~100x NTM;
        peak AI SaaS multiples in 2021 were 50–100x). The multiple is defensible only if Skild achieves $500M–$1B+ ARR
        within 3–4 years.
      targets:
        - contentRequirements/0
        - contentRequirements/4
    - id: QR011
      question: How many production robots are actively running the Skild Brain as of May 2026?
      type: quantification
      status: unresolved
      answer: null
      targets:
        - contentRequirements/2
    - id: QR012
      question: >-
        How many months of gross runway does Skild AI have following the January 2026 Series C close, assuming disclosed
        burn estimates?
      type: quantification
      status: answered
      answer: >-
        Estimated 18–36 months gross runway from January 2026 based on $1.4B Series C net of undisclosed Zebra
        acquisition cash consideration, at $30–60M/month estimated gross burn. Revenue ($30M ARR ≈ $2.5M/month)
        partially extends net runway. Exact figure requires CFO-confirmed cash position and burn certificate.
      targets:
        - contentRequirements/4
    - id: QR013
      question: >-
        How does Skild's sim-to-real transfer methodology address known domain randomization failure modes in robotics
        foundation models?
      type: mechanism
      status: answered
      answer: >-
        Skild uses domain randomization via NVIDIA Isaac Lab (thousands of parallel robot instances, diverse
        embodiments) and Cosmos Transfer for visual augmentation. Additionally, internet-scale video data and
        post-training on real-world deployment data provide a real-world calibration signal. However, the specific
        evaluation methodology, known failure modes, and pass/fail criteria for production deployment are not publicly
        disclosed.
      targets:
        - contentRequirements/2
        - plannedFigures/risk-heatmap
    - id: QR014
      question: >-
        What technical safeguards does Skild AI have for detecting and stopping emergent unsafe behaviors in the Skild
        Brain during production robot operation?
      type: mechanism
      status: unresolved
      answer: null
      targets:
        - contentRequirements/2
        - contentRequirements/5
    - id: QR015
      question: >-
        How does Skild's post-training data flywheel protect against model drift or degradation from low-quality or
        adversarial real-world deployment data?
      type: mechanism
      status: answered
      answer: >-
        The data flywheel mechanism is described at a high level (real-world deployment experiences improve the Skild
        Brain across all instances). No specific data quality filtering, validation pipeline, or model rollback
        mechanism for the post-training loop has been publicly described. This is a known risk for all
        continually-trained foundation models.
      targets:
        - contentRequirements/2
        - contentRequirements/5
    - id: QR016
      question: >-
        How does Skild AI's valuation multiple compare to Physical Intelligence and Figure AI on a revenue-relative
        basis?
      type: comparison
      status: answered
      answer: >-
        Skild: $14B valuation / $30M revenue = 467x multiple. Physical Intelligence: $5.6B valuation / estimated
        sub-$10M revenue = likely >500x but on smaller revenue base. Figure AI: $39B valuation / minimal disclosed
        revenue = effectively infinite multiple. All three are priced on narrative and technological potential rather
        than current revenue. Skild's multiple is extreme but not uniquely so in this cohort.
      targets:
        - contentRequirements/0
        - contentRequirements/4
    - id: QR017
      question: >-
        How does Skild AI's commercialization timeline compare to Physical Intelligence and Figure AI based on public
        deployment and revenue milestones?
      type: comparison
      status: answered
      answer: >-
        Skild reached $30M ARR in a few months of 2025 (company-stated). Physical Intelligence has deployed models
        across multiple robot types but has not disclosed ARR. Figure AI has BMW partnership for manufacturing but has
        not disclosed revenue. All three are in early commercial stages; enterprise-scale robotics adoption is expected
        to require 2–4 more years based on industry analysts.
      targets:
        - contentRequirements/0
        - plannedFigures/risk-heatmap
    - id: QR018
      question: >-
        How does Skild AI's regulatory exposure compare to hardware-integrated robotics companies given its
        software-only model as algorithm trainer?
      type: comparison
      status: answered
      answer: >-
        Skild as an algorithm trainer faces liability under the EU Product Liability Directive for software defects in
        systems deployed by its hardware OEM customers. Hardware manufacturers bear primary conformity assessment
        obligations under EU Machinery Regulation but shared supply-chain liability includes Skild. Software-only
        providers face a novel and expanding liability regime that hardware-only predecessors did not encounter.
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
    - id: QR019
      question: >-
        What are all identified current and imminent regulatory compliance requirements across Skild's primary
        deployment jurisdictions (US, EU)?
      type: enumeration
      status: answered
      answer: >-
        EU: AI Act (in force, high-risk classification likely), Machinery Regulation 2023/1230 (effective Jan 2027),
        Product Liability Directive (in force Dec 2024), General Product Safety Regulation (in force Dec 2024). US: No
        federal framework; state patchwork (CO, IL, NYC) affects customers; OSHA machine-guarding applies at deployment
        level. Export: In-Q-Tel relationship may trigger ITAR/EAR; scope not disclosed. Additional: UK PSTI Act on
        connected device cybersecurity; EU Cyber Resilience Act.
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
    - id: QR020
      question: >-
        What are all known hardware OEM partners whose own AI development capabilities could displace Skild Brain
        licensing?
      type: enumeration
      status: answered
      answer: >-
        Known strategic investor-customers who could develop in-house AI: Samsung (established AI research division), LG
        Technology Ventures (parent company invested heavily in AI), Schneider Electric (industrial automation AI),
        NVIDIA (Jetson-based robot AI; also a Skild investor with potential conflict). Hardware OEMs with undisclosed
        relationships may also pose in-house risk.
      targets:
        - contentRequirements/3
        - plannedTables/partner-dependency-risk-register
    - id: QR021
      question: >-
        What are the documented failure modes for robot foundation models in production deployments based on academic
        literature and industry evidence?
      type: enumeration
      status: answered
      answer: >-
        Documented failure modes: (1) out-of-distribution input failure when encountering novel object geometries or
        environments; (2) sensor noise and lighting variation causing misclassification; (3) sim-to-real physics gap
        causing motor command errors; (4) model drift from post-training data contamination; (5) emergent behavior
        triggering unexpected robot actions; (6) overconfident decisions under uncertainty without fail-safe mechanisms.
      targets:
        - contentRequirements/2
        - plannedTables/operational-quality-security-risk-register
    - id: QR022
      question: >-
        What is the current status of EU AI Act compliance obligations effective in 2025–2026 specifically for
        AI-controlled robots in shared human-robot workspaces?
      type: freshness
      status: answered
      answer: >-
        EU AI Act is in force; high-risk provisions for AI systems in shared human-robot workspaces are expected to
        phase in fully by 2026. No enforcement action against a robot foundation model provider has been reported as of
        May 2026. Conformity assessment requirements, data governance, and human oversight protocols are active
        compliance obligations. EU Machinery Regulation 2023/1230 adds additional requirements effective January 2027.
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
    - id: QR023
      question: >-
