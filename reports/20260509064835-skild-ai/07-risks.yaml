callouts:
  - calloutType: risk
    title: Thesis-Break Trigger — Valuation vs. Revenue
    body: |
      Skild AI carries a ~467x revenue multiple at its $14B valuation on $30M in unaudited 2025 revenue.
      If 2026 revenue does not scale past $100M, the current valuation is arithmetically unsupportable
      at any reasonable growth-adjusted multiple. A missed commercial milestone in 2026 is the single most
      likely trigger for a material valuation reset.
    claimRefs:
      - CR009
      - CR031
  - calloutType: risk
    title: Investor Concentration — SoftBank Single-Point-of-Failure
    body: |
      SoftBank led Skild's Series A, B, and C, making a single LP-dependent fund the primary capital
      provider across all institutional rounds. SoftBank Vision Fund 2 posted a $3.6B loss in fiscal 2025.
      Any SoftBank portfolio management constraint, IPO dry-up, or internal mandate change directly impairs
      Skild's next-round options at the worst possible time.
    claimRefs:
      - CR026
      - CR028
      - CR029
  - calloutType: risk
    title: Regulatory Cliff — EU Machinery Regulation January 2027
    body: |
      The EU Machinery Regulation 2023/1230 takes effect January 2027. Robots that demonstrate
      "self-evolving behaviour through experience" — precisely what Skild Brain's in-context learning
      represents — will require enhanced conformity assessments and documented safety proofs for all
      future operational states. Skild has no publicly disclosed compliance roadmap for this requirement,
      and European robotics customers face regulatory uncertainty that may delay procurement decisions.
    claimRefs:
      - CR020
      - CR025
      - CR019
  - calloutType: risk
    title: Key Person Concentration — Pathak and Gupta
    body: |
      Pathak and Gupta are the founding technical visionaries. Their departure would likely trigger talent
      attrition, investor confidence erosion, and competitive disadvantage at a stage when the company's
      competitive positioning depends entirely on executing a technically unprecedented research agenda.
      No succession plan has been disclosed.
