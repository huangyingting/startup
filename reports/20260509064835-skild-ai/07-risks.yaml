  - id: R2
    title: Business and Commercial Risks
    body: |
      The most structurally concerning commercial risk is the valuation-to-revenue multiple. Skild AI is
      valued at $14B+ on approximately $30M in 2025 revenue—a ~467x revenue multiple—placing it among the
      most richly valued pre-scale AI companies globally. This multiple presupposes rapid, durable revenue
      growth to hundreds of millions of dollars within 24–36 months. The $30M revenue figure is company-stated
      and unaudited, with no third-party verification, no disclosed customer list, no concentration data, and
      no breakdown by product line or vertical. Revenue quality cannot be assessed without these inputs.

      Commercialization of hardware-software integrated robotics is inherently longer-cycle than pure software.
      Enterprise procurement for robotic automation typically involves: pilot evaluation (3–6 months), site
      safety assessment, integration with existing warehouse management or manufacturing execution systems
      (3–12 months), and full deployment (6–18 months). This structural reality means even well-funded
      competitors with superior sales capacity take 2–4 years to achieve meaningful enterprise run rates.
      Skild's $30M revenue emerged only in 2025 after founding in 2023, consistent with this pattern, but
      it also means the path to $200M+ ARR requires sustained execution over years.

      Customer concentration is an undisclosed risk. Given the enterprise nature of Skild's sales and the
      early stage of the business, it is plausible that a handful of strategic investors (Samsung, LG,
      Schneider Electric, CommonSpirit Health) constitute the majority of current revenue. Customer departure
      or strategic partner cooling could cause material revenue decline disproportionate to customer count.
      The absence of any disclosed customer names or contract structure makes this risk unquantifiable.

      Revenue from the Zebra Robotics acquisition (April 2026) adds a second revenue stream but also adds
      integration risk, potential customer churn from the platform transition, and additional operating
      complexity during a critical commercialization phase.
