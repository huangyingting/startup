  - id: R4
    title: Regulatory, Safety, and Legal Risks
    body: |
      Skild's regulatory exposure is material and multi-jurisdictional, with the EU presenting the most
      acute near-term compliance burden. The EU AI Act, now in effect, establishes a tiered risk framework
      that is expected to classify AI-controlled robots in shared human workspaces as high-risk systems.
      High-risk classification requires conformity assessments, human oversight protocols, comprehensive
      data governance, and audit trail requirements. The EU Machinery Regulation 2023/1230—effective January
      2027—introduces three pivotal new requirements specifically targeting AI-embodied robots: (1) autonomy
      thresholds requiring safety proofs for systems demonstrating "self-evolving behaviour through experience"
      (exactly what Skild's in-context learning represents); (2) lifetime cybersecurity obligations for all
      network-connected robots; and (3) collaborative risk mapping for human-robot shared workspaces.

      The EU Product Liability Directive, which came into force December 2024, significantly expands Skild's
      liability exposure. Under this directive, AI software systems can face standalone liability claims for
      defectiveness without requiring a hardware fault. An injured party only needs to show the AI system
      caused harm; a presumption of defectiveness shifts the burden of proof to the manufacturer to demonstrate
      safety. Critically, the directive extends supply-chain accountability: data annotators and algorithm
      trainers—which Skild is—can bear shared liability for defects in deployed robots.

      In the United States, there is no unified federal regulatory framework for general-purpose workplace
      robots as of May 2026. The patchwork of state-level AI workplace laws (Colorado, Illinois, New York
      City) does not directly govern robot physical safety but could affect Skild's customers' use of
      AI-driven hiring or workforce management features. OSHA's existing machine-guarding regulations
      apply to deployed robots but predate foundation model AI; enforcement posture for autonomous AI
      robots remains undefined.

      Skild's In-Q-Tel investment introduces dual-use export control considerations. In-Q-Tel is the
      CIA's venture capital arm; its portfolio companies can be subject to enhanced scrutiny under ITAR
      (International Traffic in Arms Regulations) and EAR (Export Administration Regulations) if the
      technology has intelligence or defense applications. Skild has not publicly disclosed any restrictions
      arising from this investment.

      Training the Skild Brain on internet-scale human video clips creates potential copyright exposure
      similar to challenges facing other foundation model companies (Stability AI, OpenAI). No disclosure
      of licensing terms or fair-use legal analysis has been made publicly.
