      type: freshness
      status: answered
      answer: >-
        SoftBank Vision Fund 2 posted a $3.6B loss in fiscal year ended March 2025 (confirmed by Pitchbook and CNBC).
        SoftBank's Q1 2025 performance showed $184M in Vision Fund losses. Current (post-January 2026) SoftBank fund
        capacity and mandate for Skild follow-on is unknown; no public statement has been made.
      targets:
        - contentRequirements/3
        - contentRequirements/4
    - id: QR024
      question: >-
        What is the current state of US federal regulations governing the safety of AI-controlled robots in workplaces
        as of May 2026?
      type: freshness
      status: answered
      answer: >-
        As of May 2026, there is no dedicated US federal regulatory framework for general-purpose AI-controlled robots
        in workplaces. OSHA's existing machine-guarding rules (29 CFR 1910.212) apply at the hardware level but predate
        foundation model AI. No federal rulemaking specific to AI robot safety has been initiated. The Trump
        administration is expected to maintain a hands-off AI regulation posture (Fisher Phillips, 2025).
      targets:
        - contentRequirements/1
        - contentRequirements/5
    - id: QR025
      question: >-
        Has Alibaba's February 2026 open-source robotics AI model attracted commercial adoption that could create
        pricing pressure on Skild's licensing model?
      type: freshness
      status: answered
      answer: >-
        Alibaba open-sourced a robotics AI foundation model in February 2026 (Startupnews.fyi). As of May 2026, no
        commercial adoption data for the Alibaba model has been published. However, the precedent signals that
        open-sourcing is a strategic option for platform players, which could commoditize the foundation model layer if
        a capable open-source model achieves broad hardware partner adoption.
      targets:
        - contentRequirements/0
        - contentRequirements/3
