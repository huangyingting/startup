chapter:
  number: 7
  title: Risks
  summary: |
    Skild AI carries a dense cluster of interconnected risks that collectively represent a high-risk investment
    profile despite the company's strong technical pedigree. The most severe near-term risks are: (1) a $14B
    valuation supported by only $30M in unaudited, company-stated revenue (≈467x multiple), creating extreme
    downside if commercial scaling stalls; (2) extreme investor concentration—SoftBank led all three institutional
    rounds and its Vision Fund 2 posted a $3.6B loss in fiscal 2025, raising follow-on capacity risk; (3) a
    sim-to-real generalization gap that remains the fundamental unsolved challenge for robotics foundation
    models, with no independent benchmarks published by Skild; (4) regulatory exposure across EU AI Act
    (high-risk classification), EU Machinery Regulation 2023/1230 (effective January 2027), and EU Product
    Liability Directive (December 2024), with unclear compliance status; and (5) key-person concentration in
    two academic co-founders with no prior commercial scaling track record. Competitive risks are material:
    Physical Intelligence ($5.6B, Nov 2025), Figure AI ($39B, Sept 2025), and open-source model proliferation
    (Alibaba, Feb 2026) all pressure the addressable moat. The April 2026 Zebra Robotics acquisition adds
    integration complexity and integration cost. Thesis-break triggers include: generalization failure
    documented in production, revenue stagnation below $100M in 2026, SoftBank liquidity constraint, or
    an adverse EU safety ruling against deployed Skild robots.
sections:
  - id: R1
    title: Technology and Product Risks
    body: |
      Skild AI's central technical risk is that the "omni-bodied" generalization claims of the Skild Brain
      have not been independently validated. All performance evidence as of May 2026 is company-stated or
      partner-reported (NVIDIA case study); no peer-reviewed benchmarks on the commercial model have been
      published. The sim-to-real gap—the well-documented failure of models trained primarily in simulation
      to perform reliably in unstructured physical environments—is the most technically fundamental risk.
      Skild trains on trillions of synthetic experiences generated in NVIDIA Isaac Lab, supplemented by
      internet video and teleoperation data, but the transfer to diverse uncontrolled real-world environments
      remains an open research problem acknowledged across the robotics AI community.

      Generalization failure could manifest in several ways: (1) task success rates degrading significantly
      outside training-distribution environments; (2) unpredictable robot behavior when encountering
      edge-case physical configurations; (3) sensor noise, lighting variation, or novel object geometries
      causing motor command errors with safety-relevant consequences. The company's "in-context learning"
      capability—recovering from jammed wheels in 2-3 seconds, adapting with broken legs—is impressive in
      controlled demos but provides limited evidence for production-grade generalization.

      Compute intensity is a second structural risk. Frontier AI model training runs cost $30M–$200M+ per run
      as of 2025, with robotics data infrastructure adding simulation, teleoperation, and deployment pipeline
      costs. Skild's claimed "1,000x data scale" training implies commensurately higher compute expenditures
      that create ongoing operating expense risk and capital dependency. Emergent behavior in large foundation
      models deployed in physical environments creates liability exposure: unexpected motor commands in a
      shared human-robot workspace could cause injury, property damage, or customer loss.

      No publicly disclosed third-party physical safety certifications (ISO 10218, ANSI/RIA R15.06, or
      equivalent) exist for the Skild Brain as of May 2026, which is a procurement gate for regulated
      sectors including healthcare, government, and public-infrastructure customers.
