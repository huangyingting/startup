      answer: >-
        No public disclosure of key-person risk mitigations has been made by Skild AI. Typical mitigations (equity
        vesting cliffs, employment agreements, key-man life insurance, succession planning) are standard for VC-backed
        companies but have not been described in available sources. The co-founders' reputations and technical
        contributions are deeply integrated into the company's identity, making traditional mitigation insufficient.
      targets:
        - contentRequirements/5
        - plannedTables/people-execution-risk-register
