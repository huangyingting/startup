  claims:
  - id: CP001
    statement: 'Skild AI competes across five tiers: direct foundation model peers (Physical Intelligence), platform threats
      (NVIDIA, Google DeepMind), vertically integrated humanoid makers (Figure AI, Amazon/Agility, Tesla), legacy incumbents
      (ABB, KUKA, Fanuc), and open-source or internal-build substitutes.'
    topic: competitive-landscape
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP003
    - SP004
    - SP007
    - SP018
    - SP023
  - id: CP002
    statement: Physical Intelligence (π.ai) raised $1.07B total by end 2025 ($400M Series A in November 2024 led by Bond/Thrive
      at $2.4B valuation; $600M Series B led by CapitalG/Alphabet in November 2025 at $5.6B valuation) — Skild's closest direct
      foundation model peer.
    topic: competitive-landscape
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP001
    - SP012
    - SP002
  - id: CP003
    statement: NVIDIA's Isaac GR00T N1 open-source humanoid robot foundation model, released March 2025, represents Skild's
      most dangerous platform threat due to NVIDIA's dominant GPU infrastructure position, free model strategy, and OEM partner
      base including 1X Technologies, Agility Robotics, and Boston Dynamics.
    topic: competitive-landscape
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP003
    - SP013
  - id: CP004
    statement: Figure AI raised over $2B total by late 2025 ($675M Series B in March 2024 at $2.6B valuation; $1B+ Series
      C in September 2025 at $39B valuation), representing the highest capitalization among humanoid robot companies and the
      largest valuation in the vertically integrated tier.
    topic: competitive-landscape
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP005
    - SP022
  - id: CP005
    statement: Covariant's 2024 Amazon acqui-hire — in which Amazon hired Covariant's founding team and received a non-exclusive
      IP license to Covariant's RFM-1 foundation model — fundamentally altered Covariant's competitive position, talent density,
      and organizational independence without constituting a full acquisition.
    topic: competitive-landscape
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP007
    - SP008
  - id: CP006
    statement: Legacy robotics incumbents ABB, KUKA, Fanuc, and Yaskawa collectively hold over 70% of the global industrial
      robot installed base; ABB Robotics achieved $2.3B in revenue in 2024 with more than 80% of offerings incorporating AI
      or software-enabled capabilities, establishing a distribution moat that pure-play AI startups cannot easily replicate.
    topic: competitive-landscape
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP018
    - SP019
  - id: CP007
    statement: Open-source alternatives to Skild's proprietary foundation model include OpenVLA (Berkeley), Octo (Berkeley
      + Stanford), HuggingFace LeRobot, Physical Intelligence's openpi, and NVIDIA GR00T N1 — all available without licensing
      fees, collectively lowering the adoption barrier for robot AI but also constraining pricing power for commercial model
      vendors.
    topic: competitive-landscape
    type: third-party-reported
    confidence: medium
    freshness: current
    sourceRefs:
    - SP002
    - SP003
    - SP012
  - id: CP008
    statement: Competitive intensity in the robot AI software market is rising rapidly; $13.8B in global robotics VC funding
      in 2025 represents a 77% increase from 2024, with significant allocations to foundation model startups and humanoid
      hardware companies that are building competing AI platforms.
    topic: competitive-landscape
    type: estimated
    confidence: medium
    freshness: current
    sourceRefs:
    - SP001
    - SP005
    - SP011
  - id: CP009
    statement: 'Internal-build substitutes represent a significant competitive risk: Amazon is deploying Covariant IP in its
      own fulfillment centers, Tesla Optimus is developed in-house, and Figure AI''s Helix platform is proprietary — large
      enterprises may choose to develop or co-develop robot AI capabilities rather than license a third-party platform like
      Skild.'
    topic: competitive-landscape
    type: inferred
    confidence: medium
    freshness: current
    sourceRefs:
    - SP007
    - SP005
    - SP022
  - id: CP010
    statement: Physical Intelligence's pi-zero (π₀) architecture uses a 3B-parameter PaliGemma VLM backbone combined with
      a 300M-parameter action expert using flow matching; it was trained on 10,000+ demonstration hours across 7–8 robot platforms
      and 68+ tasks, and outperforms OpenVLA and Octo on standard manipulation benchmarks.
    topic: product-capability
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
    - SP002
    - SP012
  - id: CP011
    statement: 'NVIDIA GR00T N1 uses a dual-system architecture: System 2 (a vision-language model for slow, deliberate reasoning
      and planning) and System 1 (a diffusion transformer for fast, real-time motor action generation); released as open-source
      in March 2025 under a permissive license, with subsequent versions N1.5 and N1.6 released in 2025–2026.'
    topic: product-capability
    type: third-party-reported
    confidence: high
    freshness: current
    sourceRefs:
