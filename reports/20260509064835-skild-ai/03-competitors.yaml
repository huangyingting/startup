  - id: QP023
    type: adverse
    question: How will OpenAI's robotics division affect the robot AI market structure over 3–5 years?
    status: answered
    answer: 'OpenAI''s entry is likely to consolidate the market around two tiers: (1) enterprise LLM-first players (OpenAI,
      Google DeepMind) converting frontier model relationships into robot intelligence; (2) specialist robot AI platform companies
      (Skild, PI) competing on deployment depth and proprietary data. If OpenAI succeeds in adapting GPT-5+ for robot control
      via its enterprise channel, it will capture the highest-value enterprise accounts. This would pressure Skild to differentiate
      on integration, data, and deployment rather than the AI model itself — a feasible but significantly harder commercial
      posture.'
    targets:
    - contentRequirements/4
    - plannedFigures/competitive-positioning-map
    claimRefs:
    - CP021
    - CP022
    - CP042
  - id: QP024
    type: comparison
    question: Will the robot AI market consolidate around one foundation model or remain multi-model by 2030?
    status: answered
    answer: 'Multi-model is more likely in 2030, though with consolidation pressure. Analogies: (1) The LLM market retained
      multiple models despite GPT-4 dominance (Claude, Gemini, Llama, Mistral); (2) Industrial robot OEMs have historically
      supported multiple control systems per factory. Physical AI is likely to follow a similar pattern: NVIDIA GR00T will
      dominate training infrastructure; Skild and PI will compete for enterprise ''brain'' licensing; vertically integrated
      platforms (Figure, Tesla) will serve closed ecosystems. The open-source tier will commoditize basic manipulation tasks.'
    targets:
    - contentRequirements/4
    - plannedFigures/competitive-positioning-map
    claimRefs:
    - CP007
    - CP034
    - CP041
  - id: QP025
    type: comparison
    question: Can Skild maintain its valuation premium relative to Physical Intelligence ($14B vs. $5.6B) as datasets converge?
    status: partial
    answer: 'Uncertain. Skild''s 2.5x valuation premium over PI reflects: (1) Zebra distribution advantage, (2) claimed dataset
      scale, (3) revenue traction (~$30M ARR). If PI reaches comparable enterprise revenue and distribution by 2027–2028,
      and if independent benchmarks do not confirm Skild''s dataset advantage, the premium could compress significantly. Conversely,
      if Skild''s ARR scales to $200M+ by 2027 while PI remains pre-revenue, the premium widens. The dataset convergence timeline
      is the key unknown.'
    targets:
    - contentRequirements/4
    - plannedFigures/moat-readiness-kpis
    claimRefs:
    - CP002
    - CP035
    - CP023
  - id: QP026
    type: mechanism
    question: What switching costs does Skild create for enterprise customers post-deployment?
    status: answered
    answer: 'Three switching cost mechanisms: (1) API integration depth — Skild''s model APIs are embedded in robot control
      stacks; re-integration with a competitor model requires rewriting low-level control interfaces, estimated 6–18 months
      per deployment; (2) Task-specific fine-tuning — Skild fine-tunes its model on the customer''s specific tasks and environments;
      migrating these fine-tuned weights to a different architecture (e.g., GR00T) requires new training data and engineering;
      (3) WMS integration (post-Zebra) — customers using both Skild AI and Zebra WMS face an additional lock-in layer if the
      two products are deeply integrated.'
    targets:
    - contentRequirements/3
    - plannedTables/moat-durability-competitive-risk-register
    claimRefs:
    - CP031
    - CP030
  - id: QP027
    type: enumeration
    question: Which competitor has the largest real-world robot deployment footprint as of Q1 2026?
    status: answered
    answer: 'ABB and Fanuc dominate in absolute installed base (300,000+ robot installations globally for ABB alone). Among
