  title: Moat Durability / Competitive Risk Register
  description: Assessment of Skild AI's claimed competitive moats, the primary threat to each, severity, time to impact, and
    mitigation or diligence ask.
  notes: Severity ratings (High/Medium/Low) are author-assessed based on competitive evidence as of Q1 2026. 'Time to impact'
