    question: How does NVIDIA's GR00T platform create hardware lock-in despite being open-source?
    status: answered
    answer: By offering GR00T model weights free, NVIDIA lowers the adoption barrier for robot OEMs. But training at scale,
      synthetic data generation (Cosmos), simulation (Omniverse/Isaac Sim), and reinforcement learning (Isaac Lab) all require
      NVIDIA GPU infrastructure. Once an OEM builds its entire AI training pipeline on NVIDIA hardware, switching to alternative
      compute is extremely costly, even if the model weights themselves could theoretically run on other hardware.
