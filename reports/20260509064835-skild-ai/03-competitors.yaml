    - Open-source model commoditization; NVIDIA Cosmos synthetic data at scale; Open X-Embodiment dataset
    - High
    - 2–4 years
    - Verify actual data volume independently; confirm 'zero human in loop' annotation quality
  - - Zebra acquisition provides enterprise customers, WMS integrations, and enterprise salesforce
    - 'Integration risk: Zebra AMR fleet uses different architecture than Skild AI model'
    - Medium
    - 1–3 years
    - Track Fetch/Zebra fleet migration to Skild AI model; confirm cross-sell revenue vs. standalone
  - - Deep API + fine-tuning integration creates estimated 6–18 month migration cost per customer
    - Competitor API parity; NVIDIA GR00T N1.x feature convergence; OpenAI robotics platform entry
    - Medium
    - 2–5 years
    - Map integration depth per reference customer; validate migration cost estimates
  - - Claimed ability to run on any robot without retraining; dataset 1,000x larger than competitors
    - NVIDIA GR00T N1.x active iteration; Google DeepMind Gemini Robotics multi-platform support
    - High
    - 1–3 years
    - 'Commission independent benchmark: Skild vs. π₀ vs. GR00T N1.5 on standard manipulation tasks'
  - - Deep capital enables sustained R&D, enterprise sales, and acquisition strategy
    - Figure AI ($39B val.) and Apptronik ($935M) have comparable or greater capital; Chinese competitors backed by state
      capital
    - Medium
    - Ongoing
    - Track burn rate vs. ARR ramp; confirm Series D runway vs. competitors' capital deployment
  - - Neutral AI platform positioning attracts robot OEMs who want AI without hardware-competitor dependence
    - Vertically integrated competitors (Figure, Tesla, Amazon/Agility) reduce OEM partner pool; NVIDIA GR00T creates alternative
      OEM standard
    - High
    - 2–4 years
    - Map existing OEM partnerships; verify exclusivity terms; assess in-house AI development risk per OEM
