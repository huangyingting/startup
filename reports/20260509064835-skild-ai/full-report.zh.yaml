      - number: '6.2'
        title: 采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >
              Skild AI 的采用轨迹特点是从零起步后收入增长异常迅速，同时几乎所有能让分析师评估增长质量、集中度或耐久性的底层指标都不透明。


              收入在 2025 年从零增长到约 $30M——这一点由公司官方 Series C 博文、BusinessWire Series C
              新闻稿确认，并得到多家独立新闻来源佐证。公司称收入「指数级增长」，technical.ly 报道还提到公司在 2025 年实现盈利。对于一家 2024 年 7 月才走出隐身模式的公司，这些里程碑非常罕见。


              公司声明确认的部署足迹覆盖六个垂直领域：安防与设施巡检、最后一公里配送、仓库、制造、数据中心和建筑。已确认 Skild Brain 运行在 30 多种不同机器人类型上。Foxconn/NVIDIA
              生产部署（2026 年 3 月）是首个公开点名的大规模客户部署。Skild 的首席幕僚向 technical.ly 确认，仓储、建筑和巡检领域此前已有部署，但未披露客户名称。


              2026 年 4 月收购 Zebra Technologies，为 Skild 装机基础增加了成熟仓库运营商客户（CTL Global Solutions、Encore Fulfillment、Geneva10
              Fulfillment），立刻带来物流领域的生产级客户关系。这些 Zebra 客户有记录在案的生产率指标：在保持吞吐的同时减少 30% 机器人需求（CTL Global、Encore），以及 40%+
              生产率提升（Geneva10）。


              同样重要的是缺失项：没有客户数量、没有单客户收入、没有 ARR
              拆分、没有队列数据，也没有流失或续约历史。极快的收入增速说明两种可能：少数几个超大企业合同，或几十个较小部署带来的真实广泛采用；但区分两者所需的数据并未公开。
