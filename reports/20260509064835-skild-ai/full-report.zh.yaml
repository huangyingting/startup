      - number: '2.2'
        title: 市场规模分析
        blocks:
          - type: paragraph
            body: >
              物理 AI / 具身智能软件的市场规模测算很难，因为各研究机构的范围定义差异很大。Grand View Research 估算，具身 AI 市场 2025 年为 $4.67B，到 2033 年增至
              $67.6B，CAGR 为 39.7%。MarketsandMarkets 给出的 2025 年锚点相近，为 $4.44B，但 2030 年目标更保守，为 $23.1B，CAGR 为
              39.0%。这些估算代表了最贴近 Skild 的可服务软件口径。更宽的市场估算——工业机器人硬件（2024 年 $16.9–34.0B）和仓库自动化系统（2025 年 $19.2–30.0B）——包含 Skild
              不直接捕获的硬件支出，但定义了它可激活的机器人存量基础。


              按 TAM/SAM/SOM 看：Skild 的 TAM 是全球具身 AI 软件市场，2025 年为 $4.4–4.7B，并在 2030–2033 年走向 $23–68B。它的 SAM
              是面向工业和物流机器人的企业机器人 AI 软件市场，是 TAM 中剔除消费、医疗和国防保密细分后的子集，2025 年估计约 $2–3B。SOM 覆盖仓库自动化、离散制造和设施巡检等垂直领域，Skild
              已在这些领域有活跃合作或部署；当前估计为 $200–500M，并会随着 Zebra 收购带来企业分发而快速扩大。


              人形机器人预测提供了另一条更长期的市场向量：Goldman Sachs 预计人形机器人 2025–2028 年可在工厂落地，2030–2035 年进入消费应用；Morgan Stanley 估算，到 2050
              年，人形机器人生态总规模为 $5 trillion。Skild 的全形态模型架构专门面向人形机器人平台设计，因此无论哪家人形机器人 OEM
              率先规模化，它都可能受益。此类长期预测存在很大的分析师不确定性，应被视作情景数据，而非基准情景。


              2025 年全球机器人风险投资融资总额达到 $13.8B，高于 2024 年的 $7.8B，显示投资人对各细分市场近期机器人采用保持强烈信心。
