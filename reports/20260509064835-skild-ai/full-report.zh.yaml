chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与业务概览
        blocks:
          - type: paragraph
            body: >
              Skild AI 于 2023 年 5 月注册成立，2024 年 7 月宣布 $300M Series A 后走出隐身状态。公司总部位于 Pittsburgh, Pennsylvania，并在 San
              Francisco Bay Area 设办公室；2026 年 2 月之后又在 Bengaluru, India 设点。


              Skild AI 的核心产品是「Skild Brain」，公司称其为行业首个统一机器人基础模型。过去的机器人软件往往为特定机型和任务定制；Skild Brain
              则是「全形态」的：无论四足机器人、人形机器人、桌面机械臂还是移动机械臂，它都能在事先不了解机器人具体物理形态的情况下完成控制。机器人可由此处理从简单家务到高强度工业作业的一系列任务。


              公司的商业模式是软件平台提供商：Skild Brain 充当通用 AI 层，硬件厂商、系统集成商和企业客户可用它激活不同机器人机队。Skild 的收入来自安防 /
              设施巡检、最后一公里配送、仓库、制造、数据中心和建筑等行业的企业部署。2026 年 4 月收购 Zebra Technologies 的 Robotics Automation 业务（包括 Symmetry
              Fulfillment 平台）后，Skild 进一步扩展到端到端仓库自动化解决方案。


              截至 2026 年 1 月，Skild AI 累计融资超过 $2B，估值超过 $14 billion，是全球估值最高的私营机器人公司之一。公司的长期目标是发展根植于物理世界的人工通用智能（AGI），挑战 AGI
              只能从数字知识中产生的主流看法。
