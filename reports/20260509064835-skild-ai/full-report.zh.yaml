        - from: skild_ai
          to: oem_partners
          label: 向硬件平台授权 Skild Brain AI
        - from: skild_ai
          to: zebra_fetch
          label: 整合并迁移至 Skild 统一平台
  - id: FV001
    title: 估值演进——Skild AI 融资轮次
    type: waterfall
    layout: standard
    summary: |
      Skild AI 从估算种子轮到 Series C 的估值演进。每一次跃升代表该轮融资新增的估值。种子轮到 Series C 的总估值增长约 $13.9B，历时 24 个月——属于私营 AI 公司历史上最快的估值爬坡轨迹之一。
    approximationNotes: 种子轮估值为分析师估算。Series A、B、C 估值来自公开新闻稿。跃升金额根据披露估值计算。
    data:
      items:
        - label: 种子轮估值（估算）
          value: 75
          type: start
          detail: 估算种子轮估值 $50–100M；未披露。成立于 2023 年。
          tone: neutral
          claimRefs:
            - CV001
        - label: Series A 估值跃升（2024 年 7 月）
          value: 1425
          type: delta
          detail: 融资 $300M；估值达到 $1.5B。Lightspeed、Coatue、SoftBank 领投。
          tone: positive
          claimRefs:
            - CV001
            - CV005
        - label: Series B 轮估值跃升（Jun 2025）
          value: 3200
          type: delta
          detail: 融资 ~$135M；估值升至 ~$4.7B。SoftBank 领投；NVIDIA、Samsung 参投。
          tone: positive
          claimRefs:
            - CV001
            - CV005
        - label: Series C 轮估值跃升（Jan 2026）
          value: 9300
          type: delta
          detail: 融资 $1.4B；估值超过 $14B。SoftBank 领投；9 家具名投资方参投。
          tone: positive
          claimRefs:
            - CV001
            - CV002
            - CV005
        - label: 当前估值（May 2026）
          value: 14000
          type: end
          detail: Series C 后估值：$14B+。累计融资：$1.83B+（Crunchbase）；$2B+（CEO）。
          tone: positive
          claimRefs:
            - CV001
            - CV002
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV005
  - id: FV002
    title: 物理 AI 市场规模预测（$B）——关键预测
    type: range
    layout: standard
    summary: |
      关键物理 AI 与机器人细分市场的规模预测区间，展示支撑 Skild AI $14B 估值的总可用市场（TAM）扩张。
      所有预测均来自 2024–2026 年的第三方研究机构或投资银行。
    approximationNotes: 所有市场预测均来自第三方来源（Goldman Sachs、MarketsandMarkets、Morgan Stanley），后续可能修订。Skild AI 尚未公开自身 TAM 估算。
    data:
      items:
        - label: AI 机器人市场（2024）
          low: 6
          high: 8
        - label: AI 机器人市场（2030，MarketsandMarkets）
          low: 30
          high: 35
        - label: 人形机器人市场（2035，Goldman Sachs）
          low: 35
          high: 42
        - label: 全球人形机器人（2050，Morgan Stanley）
          low: 4000
          high: 6000
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV025
  - id: FV003
    title: ARR 倍数对比——物理 AI 赛道同业（2026）
    type: kpi
    layout: wide
    summary: |
      对比物理 AI 与机器人基础模型赛道的收入倍数。Skild AI 的 467x 尾随 ARR 倍数，
      在已披露收入的公司中最高，说明其商业化相对估值仍处在最早期。
    approximationNotes: 收入倍数按公开披露的估值和 ARR 计算。未披露 ARR 的公司标为「pre-revenue」或「N/A」。除另有注明外，所有倍数均为尾随口径。
    data:
      items:
        - label: Skild AI
          value: 467x
          status: Trailing 2025 ARR ($30M, unaudited); $14B valuation
          claimRefs:
            - CV001
            - CV004
        - label: Figure AI
          value: N/A (pre-revenue disclosed)
          status: $39B valuation; BMW deployment confirmed; no ARR disclosed
          claimRefs:
            - CV009
        - label: Physical Intelligence（pi，竞品）
          value: N/A (pre-revenue)
          status: $5.6B valuation; pi0 open-sourced; no ARR disclosed
          claimRefs:
            - CV008
        - label: 1X Technologies
          value: N/A (pre-revenue)
          status: ~$10B valuation est.; no ARR disclosed
          claimRefs:
            - CV010
        - label: Covariant（已被收购）
          value: N/A (acquired)
          status: $222M raised; acquired by Amazon 2024 at undisclosed premium
          claimRefs:
            - CV011
        - label: CoreWeave（AI 基础设施，IPO 2025）
          value: ~25x fwd
          status: AI infrastructure; public market comparable for frontier AI platform multiple
          claimRefs:
            - CV016
