      - number: '8.5'
        title: 估值结论
        blocks:
          - type: paragraph
            body: |
              相对已披露财务指标，Skild AI 的 $14B 估值偏高。467x 的历史 ARR 倍数是物理 AI
              赛道最高水平，退出时要解释这个估值，需要一组很苛刻的结果同时兑现：到 2028 年收入
              CAGR 持续维持 150–200%，面对开源竞争仍守住软件层定价权，且市场环境在公开市场流动性
              下仍支持高溢价 ARR 倍数。

              这个估值并非完全站不住脚——投资人名单（SoftBank、NVIDIA、Samsung、LG、
              Bezos Expeditions、IQT）覆盖赛道内最老练的一批机构，IQT 信号也带来竞争对手没有的
              国防护城河。如果平台模型真的占据「机器人领域 Android OS」的位置，极高估值可以成立。
              但缺少独立基准、收入未经审计、没有具名终端客户证据，意味着 $14B 主要由战略意图和
              投资人逻辑支撑，而不是可验证的财务基本面。

              任何接近 Series C 价格的投资，都必须押在三项前提上：（a）经审计财务验证的乐观情景
              收入轨迹；（b）相对 GR00T / pi0 已确认的竞争护城河；（c）在 $14B+ 入场价上能产生
              有意义回报的可行退出估值。若 $14B 投入只要求 1.5x（温和回报），投资期内退出估值也必须
              超过 $21B——只有乐观情景能做到。
            claimRefs:
