  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Skild AI 位于机器人硬件和人工智能软件的交汇处，具体瞄准物理 AI 或具身智能层：让机器人在非结构化真实环境中感知、推理、规划并行动的 AI 软件。这让 Skild 区别于传统机器人硬件制造商（如
              ABB、KUKA、Fanuc），也区别于按任务定制的自动化软件供应商。


              本分析的市场边界包括：（1）面向商用机器人的 AI 基础模型软件和 API；（2）机器人智能中间件、仿真平台和训练基础设施；（3）端到端机器人自动化软件方案，例如 Skild 收购后的 Symmetry
              Fulfillment 平台。排除的支出包括机器人硬件（执行器、传感器、机架）、人工操作机械，以及经典基于规则的工业自动化软件（PLC、SCADA）。相邻市场——仓库管理系统、自动驾驶车辆和无人机软件——共享技术
              DNA，但服务不同买家和采购路径。


              物理 AI
              软件的现状替代方案包括：（a）示教再现编程，由人类专家手工演示每一个机器人动作；（b）按应用定制的机器学习模型，每个任务和机器人类型都需要单独训练；（c）继续使用人工，这是多数非结构化工作流的既有做法。这些替代方案的失效点——成本高、缺乏弹性、无法泛化——正是
              Skild 切入的楔子。从固定用途自动化转向通用机器人智能，是结构性市场迁移，而不是渐进式功能改良。
