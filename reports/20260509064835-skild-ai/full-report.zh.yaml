      - number: '1.4'
        title: 关键里程碑与战略时间线
        blocks:
          - type: paragraph
            body: >
              从隐身创业公司到 $14B+ 公司，Skild AI 走出了一条相对投入资本异常压缩的时间线。自 2023 年 5 月创立以来，公司以很高速度完成了多项技术、商业和战略里程碑。


              技术上，Skild 发表了机器人上下文内学习研究；公司称这是该领域首个研究突破，并获得顶级机器人会议最佳论文提名。Skild Brain
              展示出无需重新训练即可适应机器人形态剧烈变化的能力，例如失去肢体、车轮卡死，或全新的身体几何结构。公司还搭建了一个数据飞轮，把大规模仿真（数万亿条合成经验）、互联网视频（数十亿个人类动作视频）、遥操作和真实部署数据结合起来，训练数据量约为竞争性机器人基础模型的
              1000x。


              商业上，Skild 在 2025 年「短短几个月」内从零收入做到约 $30M，并落地于仓库、制造设施、数据中心、建筑工地和安防应用。2026 年 4 月收购 Zebra 并纳入 Symmetry
              Fulfillment 仓库编排平台后，Skild 成为首家能够为现有仓库提供端到端自动化方案的公司：从人形机器人抓取放置、机器狗巡检，到 AMR 物料搬运，都由同一 AI 层编排。


              2026 年 2 月开设 Bengaluru, India 办公室，是公司首次国际扩张，也把工程能力延伸到印度深厚的 AI 和机器人技术人才池。
