  - id: FV004
    title: 建议逻辑
    type: flow
    layout: standard
    summary: |
      从市场规模、商业验证、竞争护城河、财务、风险和估值，一路推到在当前 $14B Series C 入场价下
      「继续研究 / 观察」的建议。每个节点是一项关键尽调维度；每条边是逻辑依赖。
    approximationNotes: 该流程图呈现分析师基于公开证据判断的决策逻辑。建议取决于证据质量；后续若有更多披露，可能调整。
    data:
      nodes:
        - id: n1
          label: 市场规模
          detail: 2030–2035 年 AI 机器人市场 $33–38B（Goldman Sachs、MarketsandMarkets）
          sentiment: positive
          claimRefs:
            - CV021
            - CV022
        - id: n2
          label: 商业验证
          detail: 2025 ARR $30M（未经审计）；未披露具名企业客户；Zebra/LG CNS 作为渠道
          sentiment: mixed
          claimRefs:
            - CV003
            - CV007
        - id: n3
          label: 竞争护城河
          detail: 跨本体平台；不绑定硬件；1000x 数据说法未验证；GR00T/pi0 可作为免费替代方案
          sentiment: mixed
          claimRefs:
            - CV013
            - CV029
        - id: n4
          label: 财务
          detail: 467x 尾随 ARR 倍数；收入未经审计；未披露毛利率；烧钱速度未知
          sentiment: negative
          claimRefs:
            - CV003
            - CV004
        - id: n5
          label: 风险
          detail: 开源商品化；SoftBank 集中风险；无基准测试；倍数极端
          sentiment: negative
          claimRefs:
            - CV018
            - CV019
        - id: n6
          label: 估值
          detail: 以 $30M ARR 支撑 $14B 估值；只有 2028–2030 年 ARR 达到 $1B+ 时才有条件成立
          sentiment: negative
          claimRefs:
            - CV028
            - CV017
        - id: n7
          label: 建议：继续研究 / 观察
          detail: 当前价格放弃；若经审计 ARR >$100M 且独立基准确认，再重新评估
          sentiment: neutral
          claimRefs:
            - CV028
            - CV030
      edges:
        - from: n1
          to: n6
          label: 支撑大 TAM
        - from: n2
          to: n6
          label: 未经审计；不足以支撑 $14B
        - from: n3
          to: n6
          label: 护城河未验证；有商品化风险
        - from: n4
          to: n7
          label: 倍数极端 → 放弃
        - from: n5
          to: n7
          label: 高严重性风险 → 观察
        - from: n6
          to: n7
          label: 估值偏高 → 继续研究
    claimRefs:
      - CV003
      - CV004
      - CV017
      - CV018
      - CV021
      - CV028
      - CV029
      - CV030
