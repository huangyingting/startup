      - number: '4.5'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >
              Skild AI 的财务画像，是一笔对物理 AI 中软件平台经济学的高信念下注：早期收入牵引力很强，但尽调阻碍也很大。如果 $30M 收入真实且主要可经常性确认，它说明企业客户愿意为横向机器人 AI
              层付费。对一家深科技基础模型公司来说，几个月内从零变现到 $30M 很罕见，也支撑了领投方提出的“机器人领域 GPT-3 时刻”投资逻辑。


              近期资本充足性很强：即便按前沿模型训练和企业快速扩张所隐含的激进烧钱速度，$1.4B Series C
              也提供了充足现金跑道。战略投资人（NVIDIA、Samsung、LG、Zebra、IQT）提供的不只是资本，还有分发、硬件入口和市场信号。


              财务风险集中在三条线上：（1）收入质量——$30M
              未经审计，可能来自非经常性里程碑确认，也可能集中在少数尚未转为经常性合同的试点；（2）利润率路径——算力成本呈指数级上升，维持模型质量所需的机器人数据基础设施，可能在公司规模化前显著压缩利润率；（3）估值锚点——$14B
              估值相当于 2025 年收入 467x，不给商业执行风险或倍数压缩留下余地；若收入不能持续指数级增长，公司通向公开市场退出或二级市场流动性的路径会很难。


              最重大的尽调缺口，是缺少经审计财务，以及对收入数字、客户数或合同结构的任何独立验证。任何严肃尽调流程在按当前估值出手前，都必须取得审计报表、按客户和队列拆分的详细收入瀑布，并看到至少 2–3
              个季度持续经常性收入的证据。
