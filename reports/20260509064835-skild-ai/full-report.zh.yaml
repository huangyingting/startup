      - number: '4.2'
        title: 成本结构与单位经济
        blocks:
          - type: paragraph
            body: >
              Skild AI 的成本结构由算力主导——大型机器人基础模型的训练和推理天然资本密集。2024–2025 年，前沿 AI 模型单次训练成本为 $30M–$200M+；按 Epoch.ai 数据，算力成本约每年
              2.4x 增长（每 8–10 个月翻倍）。相较文本或视觉模型，机器人基础模型还需要额外数据基础设施：仿真环境、遥操作数据集、传感器融合管线和真实部署反馈回路，都需要持续工程和算力投入。


              公司尚未披露毛利率、收入成本、运营费用或资本开支数据。结构上，云端 API 交付的软件平台模式在规模化后应有高毛利；企业 AI 平台 SaaS 的行业 benchmark 显示，60–80% 毛利率可以实现。但
              $30M 的早期收入不足以摊销基础模型训练成本。推理服务成本、客户导入和现场部署支持，短期很可能把毛利率压到长期目标以下。


              单位经济（CAC、LTV、流失率、回本周期）没有公开披露。企业机器人细分通常销售周期长（6–18 个月）、ACV 高；一旦机器人机队基于某一 AI
              层完成训练和集成，切换成本也高。如果数据飞轮随着每次部署提升模型质量，既有客户获得复利式价值，客户终身价值（LTV）结构上会很高。不过，Skild AI 没有公开客户层留存数据、流失率或续约条款。


              Zebra Technologies 收购增加了硬件集成复杂度：Symmetry Fulfillment 编排平台的毛利经济与纯软件授权不同。把机队级编排与 Skild Brain
              集成，可能在企业仓库合同扩张时暂时推高收入成本，因为专业服务和部署支持会随之增长。
