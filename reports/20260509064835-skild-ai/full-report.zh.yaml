      - number: '6.3'
        title: 具名客户证明表
        blocks:
          - type: paragraph
            body: >
              截至报告日，Skild Brain 本身的具名客户证明仅限于一个已确认生产部署。如果把 Zebra Symmetry 收购带来的客户基础和 OEM 伙伴背书纳入，具名证据基础会大幅扩大。


              Foxconn/NVIDIA 合作（2026 年 3 月宣布）是 Skild 质量最高的具名客户证明。Foxconn 正使用 Skild Brain 自动化 Houston 设施中双臂机器人执行复杂 GPU
              服务器机架装配——一个多步骤操控任务（母排放置、限位块、16 颗螺丝钻孔、移除限位块），目前由人工完成。公司官方博客、多家独立媒体报道，以及 NVIDIA 副总裁 Deepu Talla
              的公开声明均确认了这一点。不过，双方都未发布量化结果指标（吞吐提升、错误率、劳动力节省、ROI）。


              在 OEM 伙伴层面，ABB Robotics 总裁 Marc Segura 和 Universal Robots CEO Jean-Pierre Hathout 已公开为 Skild Brain
              集成背书，构成战略一致性的伙伴证明。ABB 提到「细节仍属机密」，确认合作处于活跃状态，但也限制了外部对生产部署状态的验证。


              三家具名 Zebra Symmetry 客户——CTL Global Solutions、Encore Fulfillment 和 Geneva10 Fulfillment——是 Symmetry
              编排平台真实的生产级客户，并有记录在案的绩效结果（30–40%+ 生产率提升）。不过，这些部署早于 Skild 收购，不能证明 Skild Brain 本身已经部署到其设施。收购后 Skild Brain 与
              Symmetry 的集成，尚未通过具体客户或时间线公开确认。


              CommonSpirit Health 和 Schneider Electric 是战略投资方；尚未宣布 Skild Brain 在 CommonSpirit 医院或 Schneider Electric
              设施中的部署。
