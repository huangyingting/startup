      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: 从研究到产品的 IP 脉络
            body: >
              Skild AI 的技术直接商业化了创始人 10 多年获奖研究。好奇心驱动探索（Pathak，ICML 2017；引用 6,000+ 次）、Rapid Motor Adaptation（RSS 2021；CoRL
              Best Robotic System Award）和大规模自监督抓取（Gupta）共同构成通往 Skild Brain 的直接技术脉络。这是物理 AI 领域最强的创始人 IP
              对齐之一，也提供了基于研究的可防御护城河。
            calloutType: strength
            claimRefs:
              - CE028
              - CE029
              - CE030
              - CE031
          - type: callout
            title: NVIDIA + HPE 基础设施验证
            body: >
              已确认的多供应商基础设施合作（NVIDIA Isaac Lab + Cosmos Transfer；HPE Cray XD670 搭配 H200；HPE ProLiant DL380a 搭配
              L40S）为训练管线提供第三方技术验证。NVIDIA 案例研究独立印证了关键技术主张，降低纯营销夸大的风险。同阶段机器人初创公司很少发布合作伙伴技术案例研究。
            calloutType: strength
            claimRefs:
              - CE014
              - CE015
              - CE016
          - type: callout
            title: Skild Brain 缺少公开基准
            body: >
              商业版 Skild Brain 的所有性能主张都来自公司自述或伙伴案例研究（NVIDIA）。缺乏同行评审评估或独立第三方基准，使投资人无法验证 1,000 倍数据主张，也无法验证其相对 Physical
              Intelligence (pi_)、Google DeepMind RT-2 或其他竞争基础模型的技术优势。这是投资前应解决的重大尽调缺口。
            calloutType: risk
            claimRefs:
              - CE036
              - CE037
          - type: callout
            title: 封闭的开发者生态
            body: >
              没有公开 SDK，GitHub 组织为空，API 仅面向企业开放，这些都限制了第三方开发者采用。如果机器人 AI 领域走向商品化，Skild
              缺少更广泛生态，可能输给开放平台或更易接入的竞争对手。缺少开发者信号（GitHub stars、npm/HuggingFace 模型下载）也让外部无法独立验证社区牵引力。
            calloutType: risk
            claimRefs:
              - CE032
              - CE033
          - type: callout
            title: 视频训练数据法律敞口
            body: >
              Skild 的预训练管线摄取数十亿段互联网视频剪辑，却没有公开披露授权或合理使用法律分析。这与 LLM 提供商面临的诉讼风险相似（Sora、GPT-4V、Stability AI）。如果法院对基于爬取内容训练
              transformer 模型作出不利裁决，Skild 可能需要重建其预训练数据管线的相当一部分。
            calloutType: risk
            claimRefs:
              - CE038
              - CE039
          - type: callout
            title: 数据飞轮护城河取决于部署多样性
            body: >
              复利式数据飞轮是 Skild
              最具战略耐久性的护城河主张。不过，护城河价值取决于部署数据多样性（任务、环境、机体），而不只是数量。竞争对手如果拿到质量更高或更多样的遥操作数据，即使原始部署数量不相当，也可能侵蚀这一优势。Zebra
              Symmetry 收购加快了多样性积累，但集成质量尚未验证。
            calloutType: insight
            claimRefs:
