      - number: '8.2'
        title: 可比公司估值
        blocks:
          - type: paragraph
            body: >
              机器人基础模型和物理 AI 赛道在 2024–2026 年经历了私募市场估值快速升级，背后是机构资本追逐「通用机器人大脑」论。关键可比公司：


              Physical Intelligence (pi)：2025 年底以 $5.6B 估值融资 $600M。Physical Intelligence 据称收入很少，隐含 ARR 倍数基本无法定义。其主要资产是
              pi0 VLA 模型和强研究团队（来自 Google、Berkeley、CMU）。Physical Intelligence 于 2025 年 2 月开源 pi0，形成一个直接竞争 Skild 产品的免费模型。


              Figure AI：2026 年初以 $39B 估值融资，并以 BMW 制造部署作为具名客户证据。Figure AI 打造自有人形机器人硬件（Figure 01/02），结合硬件和软件经济性。$39B 估值是物理
              AI 赛道最高估值，并由有形部署证据锚定。


              1X Technologies：挪威人形机器人公司，据报道正在洽谈最高 $10B 估值融资。1X 打造 NEO 人形机器人硬件，并开发自有 AI 层，类似 Figure AI 的硬件 + 软件一体化模式。


              Boston Dynamics（Hyundai）：不是直接可比公司（已被收购，非 VC 融资），但 Spot 和 Atlas 部署为企业机器人采用时间线，以及从试点扩到量产的难度，提供了基准。


              Covariant（RFM-1）：2024 年被 Amazon 收购，此前融资 $222M；Covariant 被 Amazon 以未披露溢价收购，释放出物流巨头对 AI 机器人软件层战略价值的认可。


              放在这组同业中，Skild 的 $14B 估值仅次于 Figure AI，也是该赛道最高的估值 / 收入比。Skild 的溢价来自其全机体、硬件无关基础模型论，以及 NVIDIA、Samsung 和 IQT
              释放的投资者信号。
