              - CE034
      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Skild AI 的信任与安全姿态由其部署场景决定：安防巡逻、施工现场、仓库运营都带来物理后果，机器人失效可能伤人或损坏财产。公司把 Skild Brain
              的上下文学习描述为通过实时环境适应提升安全：传感器发现异常（负载变化、地形变化、硬件退化）时，模型会调整行为，而不是沿着不安全轨迹继续执行。不过，Skild Brain
              尚未公开披露第三方物理安全认证（如协作机器人的 ISO 10218、ISO/TS 15066）或正式 AI 安全审计。


              在基础设施和数据安全上，Skild 已从公有云转向私有 AI-as-a-service 部署（HPE +
              STN），并将其定位为能为用于后训练的客户部署数据提供更高安全性和数据隐私。公开资料中看不到公司发布安全白皮书或数据处理政策文件。


              从 Zebra Technologies 收购的 Symmetry Fulfillment
              平台带来企业级机队管理软件和既有工业部署，为运营可靠性增加一层已验证基础。互联网视频训练数据的法律风险是重大未解决风险：公司摄取数十亿个第三方视频，却没有公开披露授权或合理使用法律分析；这一风险类似大语言模型提供商面临的诉讼。IQT（In-Q-Tel）是美国情报界的风险投资机构，也是
              Series C 轮投资方，可能使 Skild Brain 技术平台面对出口管制审查和军民两用分类要求。截至 2026 年 5 月，公开资料没有报道召回、安全事故或监管执法行动。
