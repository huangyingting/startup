              对于一家具有这种规模和投资人画像的公司，Skild AI 披露的财务指标异常有限。主要公开财务数据点是 2025 年约 $30M 收入，这一数字披露于 Series C 新闻稿和后续投资人沟通。公司没有提供
              ARR、ACV、客户数、留存指标或队列数据。


              $14B 估值的 $1.4B Series C，意味着相对于 2025 年尾随收入约 467x
              的收入倍数。这个数字只有在几种假设下才说得通：（a）近期收入增长率极高（公司“指数级增长”的表述）；（b）相信基础模型平台具备赢家拿走大部分的动态，并能支撑庞大最终装机基础；或（c）来自 Zebra 收购、IQT
              国家安全信号和 NVIDIA 物理 AI 路线图的战略期权价值。上述假设都无法用公开数据验证。


              仍为私密的关键指标包括：毛利率、运营亏损、月度烧钱速度、下一次融资触发条件、客户数、平均合同价值、流失率和净收入留存。公司是私营企业，不受公开报告要求约束，也没有提交注册声明。经审计财务报表没有公开。


              Zebra Technologies 收购引入了来自 Symmetry Fulfillment 平台及其既有客户基础的新收入流，但双方都没有披露 Zebra 机器人部门的收入、利润率或 EBITDA
