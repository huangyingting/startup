      - number: '8.3'
        title: 牛市与熊市估值情景
        blocks:
          - type: paragraph
            body: |
              $14B 估值在乐观情景下能撑住，在悲观情景下也很容易被挑战：

              乐观情景：Skild AI 在 2025 至 2030 年实现 200%+ 的收入 CAGR，到
              2029–2030 年 ARR 超过 $1B。Goldman Sachs 预计，到 2035 年人形机器人市场
              规模将达 $38B；MarketsandMarkets 预计，到 2030 年 AI 机器人市场规模将达
              $33.4B（40.4% CAGR）。如果 Skild 拿下 $33B 市场的 5–10%，收入运行率将达到
              $1.65B–$3.3B。按 10x 远期收入倍数（规模化高溢价 SaaS 倍数）计算，隐含估值为
              $16.5B–$33B——足以解释当前 $14B 的入场价。这个情景要求 Skild 顶住开源替代品，
              继续守住软件优先领先位置，并把 OEM / SI 渠道扩到全球。

              基准情景：Skild 以 80–120% CAGR 增长，到 2028 年 ARR 达到 $200–300M。按
              15–20x 远期收入倍数（这一规模下更现实的企业 AI 倍数）计算，隐含估值为
              $3B–$6B——相对当前 $14B 有明显下行。这个情景对应的是：公司部署跑通，但算力成本
              和开源竞争挤压利润率。

              悲观情景：收入增速降至 50% CAGR 以下，到 2027 年 ARR 仅为 $60–100M。
              开源 GR00T 或 pi0 被 Skild 的 OEM 渠道伙伴采用。按 10x 远期收入计算，隐含估值为
              $600M–$1B——较 Series C 入场价回撤 90%+。考虑到 IQT 和 NVIDIA 的战略投入，
              这一情景概率较低；但如果基础模型层商品化快于预期，并非不可能。

              467x ARR 倍数不给商业执行风险和倍数压缩留下缓冲，使 Skild 成为 2026 年私人市场
              对估值最敏感的 AI 投资之一。
