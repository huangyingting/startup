      - number: '8.4'
        title: 市场规模与退出路径
        blocks:
          - type: paragraph
            body: |
              Skild AI 的估值押注的是物理 AI 市场预测增长，市场规模远高于当前披露收入。
              Goldman Sachs 将 2035 年人形机器人市场预测上调至 $38B，高于此前 $6B 的预测，
              理由是 AI 突破和机器人制造成本下降 40%。MarketsandMarkets 预计，AI 机器人市场
              将从 $6.1B（2024）增至 $33.4B（2030），CAGR 为 40.4%。Morgan Stanley 预计，
              到 2050 年全球人形机器人机会将达 $5T，依据是大规模部署情景。

              按这些预测，只要 Skild 拿下不高的份额，TAM 就足以支撑 $14B 私募估值。
              但结构性障碍也很清楚：（1）人形机器人硬件市场由大型工业 OEM（FANUC、ABB、
              KUKA、Yaskawa）主导，天然限制纯软件平台利润率；（2）训练和运行前沿机器人模型
              的算力成本会随部署规模上升，压缩长期毛利率；（3）2026–2028 年窗口里，AI 模型层
              的开源商品化可能比预期更快夺走市场份额。

              退出路径包括：（1）IPO——若估值 $20B+、ARR $200M+ 且增长持续，则有可能；
              最早也要 2027–2028 年；（2）战略收购——NVIDIA、Samsung、LG 或 SoftBank
              投资组合公司收购具备战略合理性；（3）SPAC 或直接上市——有可能，但在当前市场环境下
              概率较低。IQT 投资打开潜在国防 / 情报采购渠道，在部分地区可能成为相对直接竞争对手的
              战略护城河。
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
