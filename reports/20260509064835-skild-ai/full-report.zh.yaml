    title: 缓释措施与终止标准表
    columns:
      - 风险
      - 可监控触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 仿真到现实泛化失败
        - Skild Brain 真实任务成功率的独立第三方基准；客户部署失败率报告
        - 非受控环境中的任务成功率 <70%，或 >2 起已报告生产部署因泛化失败造成客户流失
        - 投资逻辑破裂 — 没有独立验证，技术差异化主张撑不住；当前估值下投资不可辩护
      - - 估值 / 收入脱节
        - 季度收入增长轨迹；2026 年全年收入相对 2025 年实际值
        - 2026 年收入 <$100M，且下一轮估值较 $14B 需下调 >20%；或下一轮在任何估值下都无法完成
        - 投资逻辑破裂 — $14B 估值无法支撑；可能出现按市值计价损失；以不利条款完成 Series D 是压力信号
      - - SoftBank 投资方集中失效
        - SoftBank Vision Fund 2 季度业绩报告；媒体对 SoftBank 组合优化的报道；Skild 下一轮融资公告
        - SoftBank 拒绝参与 Series D，且 9 个月内没有新的机构领投方完成投资
        - 重大关切 — 迫使公司接受过桥融资、摊薄性条款或战略出售；新领投方确认前降低敞口
      - - 欧盟监管不利裁决
        - 欧盟委员会 AI Act 监管机构执法行动；欧盟法院就涉及 Skild 或可比系统的 AI 机器人责任作出判决
        - 执法行动点名 Skild 或其硬件伙伴；法院裁定将 Product Liability Directive 具体延伸至 Skild Brain
        - 投资逻辑需修正 — 欧盟市场准入承压；调整 TAM；增持前评估合规补救成本
      - - 关键联合创始人离职
        - 公开公告；LinkedIn 状态变化；董事会 8-K 等效披露（IPO 后）或媒体报道
        - Pathak 或 Gupta 任一人在非计划交接中离开，且未同时任命可信的外部继任者
        - 投资逻辑破裂 — 投资人和人才信心可能崩塌；观察 90 天窗口；退出，除非立即宣布同等可信度的替代 CEO 才考虑继续持有
    notes: 终止标准针对五项最高严重性风险定义。触发项设计成可从公开来源或常规尽调沟通中观察到。「投资逻辑破裂」指实质性降低或退出投资仓位，而不只是尽调标记。
