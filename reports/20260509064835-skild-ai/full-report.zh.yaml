  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              Skild AI 的客户群可分为四个截然不同的分层，买方特征、采购路径和战略价值各不相同。


              第一类也是核心分层，是机器人 OEM 伙伴——将 Skild Brain 授权嵌入自有机器人产品线的硬件制造商。已确认 OEM 伙伴包括 ABB Robotics（全球最大工业机器人厂商之一）、Universal
              Robots（协作机器人全球龙头，Teradyne 旗下）和 Mobile Industrial Robots（MiR，同属 Teradyne）。这些合作是分销倍增器：Skild Brain 嵌入 ABB 和
              UR 数万台已安装机器人组合后，Skild 无需承担直接销售开销，就能触达对方整个客户群。OEM 伙伴关系类似 AI 软件供应商向硬件 OEM 授权——Skild 按机器人或按使用收取许可收入，OEM 则把 AI
              智能捆绑成差异化卖点。


              第二类是企业直接部署方：大型企业采购 Skild Brain，在自有设施内自动化特定工作流。Foxconn（通过 NVIDIA 合作）是首个公开点名的直接部署方，正在 Houston 的 Blackwell
              GPU 服务器装配线上使用 Skild Brain。公开资料还确认仓储、建筑和巡检领域存在其他直接部署方，但身份未披露。


              第三类是战略投资者客户：参与 Skild 融资并表明运营兴趣的实体，包括 Amazon（Bezos Expeditions）、Samsung、LG（包括 LG CNS 商业合作）、Schneider
              Electric、CommonSpirit Health 和 Salesforce Ventures。它们既是财务支持者，也是潜在部署客户，使收入归因变得模糊。


              第四类是国防和政府，由 IQT（In-Q-Tel）投资释放信号。尚无公开宣布的国防部署，但 IQT 的使命是把技术桥接到美国国家安全机构。
