      - number: '3.4'
        title: 护城河耐久性、锁定与替代风险
        blocks:
          - type: paragraph
            body: >
              Skild 最可信的护城河是数据飞轮：真实机器人部署产生专有训练数据，且据称无需人工标注，从而持续放大数据集优势。Zebra 收购又加入了一支 AMR
              机队，在企业规模上产生物流和拣选数据。不过，这条护城河面临三类结构性威胁。第一，资源雄厚的竞争对手开源——NVIDIA GR00T N1（宽松许可证）、Physical Intelligence openpi
              权重——可能把模型架构层商品化，把价值完全推向数据。第二，垂直一体化玩家（Amazon 通过 Covariant IP + Agility Robotics，Figure AI 的 Helix + BotQ
              制造，Tesla Optimus 自研）正在封闭生态内部打造自我强化的数据飞轮，可能永久把 Skild 排除在其硬件渠道之外。第三，中国竞争对手（Unitree 每台
              $13.5K–$21.5K，AgiBot）正在以威胁 Skild OEM 合作伙伴经济性的规模出货。


              企业切换成本是一条关键但滞后的护城河。一旦 Skild 模型进入机器人机队的控制栈——包含专有 API、Zebra WMS 集成和按任务微调——迁移到竞争对手估计需要 6–18
              个月工程投入。这会形成真实锁定，但只发生在初始部署之后。因此，最早的一批企业合同胜利对长期护城河建设格外重要。竞争替代风险最高来自 NVIDIA：如果 GR00T N1.x 在跨形态泛化上追平
              Skild（它正通过 N1.5、N1.6、N1.7 更新快速改进），模型层可能成为嵌入 GPU 硬件的商品，压垮定价权。Google DeepMind 通过研究转产品路径带来类似风险，不过 Alphabet
              过去商业化机器人研究的困难提供了一些安慰。最不利的信号是：OpenAI 在 2025 年决定直接进入机器人领域，此前它曾投资 Figure AI 和 Physical Intelligence；这表明全球最强的
              LLM 组织把物理 AI 视为核心产品。如果 OpenAI 成功把 LLM 分发转化为机器人智能平台，Skild 的定位可能面临生存级威胁。
