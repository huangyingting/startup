      - number: '7.3'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              Skild 所处的是技术领域资本最拥挤的竞争环境之一。Physical Intelligence (pi) 截至 2025 年 11 月累计融资约 $1.07B，估值
              $5.6B，并已在多种机器人类型上部署其基础模型，提供每台机器人每月 $300 的订阅模式。Figure AI 在 2025 年 9 月 Series C 中融资超过 $1B，估值
              $39B，凭借自有「Helix」VLA 系统同时瞄准工业和消费类人形机器人。两者都是硬件无关竞争对手，基础模型路径、融资规模和目标市场都与 Skild 相近。


              Google DeepMind（RT-2、Gemini Robotics）、Amazon（家用机器人、履约 AI）、Tesla（Optimus）和
              Meta（家用机器人研究）都拥有平台级算力、专有硬件生态和自有数据管线，资源量级远超任何初创公司。一旦它们投入资源对外授权机器人 AI 层，每一家都可能形成潜在替代威胁。


              开源威胁在 2026 年 2 月变成现实，当时 Alibaba 开源了一个机器人 AI
              基础模型，证明资源充足的参与者愿意将基础模型层商品化，以推动生态采用。如果一个能力足够的开源机器人基础模型获得广泛硬件伙伴采用——类似 LLaMA 对商业 NLP 模型定价的冲击——Skild
              的专有模型授权定价将面对严重下行压力或被替代。Partnership on AI 和 Georgetown CSET 都记录了开源扩散给专有 AI 在位者带来的商业风险。


              硬件 OEM 依赖风险是对称的：Skild 当前战略投资方（Samsung、LG、Schneider Electric）同时也是硬件渠道。如果任何伙伴发展自有 AI 能力、收购竞争对手或减少机器人生产，Skild
              会同时失去收入来源和部署向量。
