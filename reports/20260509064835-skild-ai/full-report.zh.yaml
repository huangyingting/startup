  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与平台模块
        blocks:
          - type: paragraph
            body: >
              Skild AI 提供三类产品资产，并把它们组织成一个垂直一体化平台。核心产品是 Skild Brain，公司称其为行业首个统一机器人基础模型。过去的机器人软件通常为特定机器人类型和任务定制；Skild
              Brain
              则是全形态的：它能控制任意机器人——四足机器人、人形机器人、桌面机械臂和移动机械臂——无需事先了解机器人的具体物理形态。模型让机器人能够处理从简单家务（装洗碗机、煎蛋）到高强度工业作业（在湿滑地形中导航、工厂装配）的任务。


              第二个产品是 Mobile Manipulation Platform，把抓取、交接、拾放和导航等物理技能封装在 API
              抽象层之后。企业客户和系统集成商可因此构建机器人应用，而无需管理底层运动控制细节。Skild 称它让“用户能够构建应用，而不必担心非结构化、混乱真实世界中的细节”。


              第三个产品来自 2026 年 4 月对 Zebra Technologies 的 Robotics Automation 业务的收购，即 Symmetry Fulfillment
              Platform——一个已经验证的机队编排层，可在物流环境中协调异构机器人机队和一线员工。三类模块合在一起，覆盖 AI 智能（Skild Brain）、技能执行（Mobile Manipulation
              Platform）和机队协同（Symmetry），使 Skild 能以单一供应商身份提供端到端仓库自动化。


              商业部署覆盖安防和设施巡检、最后一公里配送、仓库拣选和分拣、工厂装配、数据中心运营，以及建筑工地监控。2025 年，公司在短短几个月内从零收入增长到约 $30M，客户跨越多个行业。
