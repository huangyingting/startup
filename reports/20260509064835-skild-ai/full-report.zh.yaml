      - number: '5.3'
        title: 部署、集成与路线图
        blocks:
          - type: paragraph
            body: >
              Mobile Manipulation Platform 的 API 是企业客户和机器人 OEM 伙伴的主要集成界面。API
              将离散技能——抓取、交接、导航——暴露为可调用函数，使应用开发者无需了解底层电机控制就能编排机器人行为。截至 2026 年 5 月，公司尚未发布公开 SDK 或开源开发者文档；GitHub
              组织（github.com/skild-ai）没有公开仓库，说明访问权限仍面向企业伙伴把关。这限制了第三方开发者生态建设。


              截至 2026 年初，部署领域包括安防巡逻、设施检查、最后一公里配送、仓库履约、工厂装配、数据中心运营和施工现场监控。2025 年 3 月 HPE 新闻稿称，Skild Brain
              初期目标是建筑、制造和安防机器人。LG CNS 合作（2025 年 6 月）面向智能工厂、智能物流和城市服务部署，包括养老护理和设施巡逻，LG Technology Ventures 同时是投资方。收购
              Symmetry Fulfillment（2026 年 4 月）带来生产级企业仓库编排能力，以及现有工业客户关系。


              路线图围绕几件事：用 Series C
              轮资金扩张四类数据来源，深化模型架构和训练算法研究，并扩大真实世界部署来产生收入。公司宣称的长期目标，是为所有机器人形态、所有任务、所有场景打造一个以动作为中心的单一大脑。基础设施正在从早期公有云扩到私有
              AI-as-a-service 部署（训练用 HPE Cray XD670 服务器搭配 NVIDIA HGX H200；推理用 HPE ProLiant DL380a 搭配 NVIDIA L40S），由 HPE
              伙伴 STN 管理，提供安全、可定制、可扩展的算力。
