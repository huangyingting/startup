  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与产品风险
        blocks:
          - type: paragraph
            body: >
              Skild AI 最核心的技术风险，是 Skild Brain 的「全机体」泛化主张尚未获得独立验证。截至 2026 年 5 月，所有性能证据都来自公司陈述或伙伴报告（NVIDIA
              案例研究）；商业模型尚无同行评审基准发布。仿真到现实缺口是最基础的技术风险：主要在仿真中训练的模型，能否在非结构化物理环境中可靠运行，本就是公认难题。Skild 在 NVIDIA Isaac Lab
              中训练数万亿条合成经验，并用互联网视频和遥操作数据补充，但迁移到多样、不可控真实环境，仍是机器人 AI 社区承认的开放研究问题。


              泛化失败可能有几种表现：（1）离开训练分布环境后，任务成功率显著下降；（2）遇到边缘物理配置时，机器人行为不可预测；（3）传感器噪声、光照变化或新物体几何形态导致电机命令错误，并带来安全后果。公司的「上下文学习」能力——车轮卡住后
              2-3 秒恢复、断腿后适应——在受控演示中令人印象深刻，但对生产级泛化的证明有限。


              算力强度是第二个结构性风险。截至 2025 年，前沿 AI 模型单次训练成本为 $30M–$200M+，机器人数据基础设施还要叠加仿真、遥操作和部署管线成本。Skild 声称的「1,000
              倍数据规模」训练意味着相应更高的算力支出，带来持续运营费用风险和资本依赖。部署在物理环境中的大型基础模型若出现涌现行为，会带来责任敞口：在人机共享工作空间里，意外电机命令可能造成人身伤害、财产损失或客户流失。


              截至 2026 年 5 月，Skild Brain 没有公开披露的第三方物理安全认证（ISO 10218、ANSI/RIA R15.06
              或同等标准）；对于医疗、政府和公共基础设施等受监管行业客户，这通常是采购门槛。
