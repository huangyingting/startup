    rows:
      - - 高层规划器（transformer）
        - 语义任务规划；整合语言和视觉指令；编排子任务
        - 基于仿真 + 互联网视频预训练；以低控制频率运行（约 ~10-30 Hz）
        - 面对训练分布未覆盖的新语义场景，可能规划错误或幻觉
      - - 低层运动控制器（transformer）
        - 高频将高层指令转换为各关节扭矩和角度
        - 本体感知 + 摄像头输入；以 ~1000 Hz 输出；学习参数不绑定具体本体
        - 高速操作受延迟约束；未发布独立延迟基准
      - - NVIDIA Isaac Lab 仿真
        - 面向合成训练数据的大规模物理强化学习环境
        - NVIDIA GPU 算力；Isaac Lab 开源框架；并行实例化机器人
        - 仿真到现实落差；依赖 NVIDIA 仿真生态
      - - NVIDIA Cosmos Transfer
        - 用环境变化（光照、纹理、天气）增强训练数据集
        - NVIDIA Omniverse 基础设施；Cosmos 世界基础模型
        - 增强质量上限未知；照片级真实感落差可能引入分布偏移
      - - 互联网视频摄取流水线
        - 从数十亿个人类动作视频中提取可供性，用于预训练
        - 可访问在线视频平台；先进可供性提取技术
        - 训练视频版权和许可状态未解决；法律风险未量化
      - - 遥操作数据采集
        - 最丰富的训练信号；图像 + 本体感知映射到关节扭矩
        - 人类操作员；遥操作硬件接口；数据流水线基础设施
        - 扩展速度慢于仿真；运营成本高；质量取决于操作员技能
      - - 真实世界部署反馈闭环
        - 从商业机器人机队生成自有后训练数据
        - 活跃客户部署；从已部署机器人到训练集群的数据流水线
        - 数据质量取决于部署多样性；跨客户数据治理不清晰
      - - HPE + STN 私有 AI 即服务
        - 为模型训练和推理工作负载提供安全、私有 GPU 算力
        - HPE Cray XD670（NVIDIA HGX H200）用于训练；HPE ProLiant DL380a（NVIDIA L40S）用于推理
        - 基础设施成本、GPU 供给约束；私有算力单一依赖 HPE 供应商
