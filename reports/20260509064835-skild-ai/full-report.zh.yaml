  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Skild AI 所处的物理 AI 软件市场正在快速成形，竞争可分为五个清晰层级。第一层也是最相关的一层，是直接的机器人基础模型同行——构建通用机器人 AI 模型的创业公司，其中最突出的是 Physical
              Intelligence（π.ai），到 2025 年末已融资 $1.07B、估值 $5.6B，并开源了 π₀ 模型架构。第二层是来自超大规模云厂商和半导体公司的平台威胁：NVIDIA 的 Isaac GR00T
              N1 于 2025 年 3 月开源发布，借助 NVIDIA 在 GPU 上的主导地位把机器人 OEM 拉入其生态；Google DeepMind 的 Gemini Robotics 套件（2025 年 3
              月发布）则利用 Alphabet 的前沿 AI 研究基础设施，以及与 Apptronik、Boston Dynamics 的既有 OEM 合作。第三层是垂直一体化人形机器人厂商——Figure AI（融资
              $2B+，2025 年 9 月估值 $39B）、Agility Robotics（Amazon 持多数股权）、1X Technologies 和 Tesla Optimus——它们自建 AI 智能层，可能封锁
              OEM 渠道。第四层是传统机器人龙头（ABB、Fanuc、KUKA、Yaskawa），它们在 300,000+ 台存量机器人基础上叠加软件和
              AI。第五层是开源和内部自研替代方案：OpenVLA、HuggingFace LeRobot、Amazon 对 Covariant IP 的部署，以及 Tesla 内部 Optimus 项目。Skild 的
              $14B 估值和 $2B+ 融资反映出投资人相信，一个中立、跨形态的 AI 平台可以整合碎片化机器人 AI 市场——类似 Android 在移动生态中的角色——但竞争强度也在随市场机会同步上升。2026 年 2
              月，Alphabet 将机器人软件子公司 Intrinsic 并回 Google；再加上 OpenAI 在 2025 年推出专门的机器人部门，说明最大型 AI 组织已把物理 AI
              视为核心产品领域，而不只是投资主题。
