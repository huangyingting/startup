  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 因素
      - 方向
      - 时间
      - 对 Skild 的影响
      - 尽调问题
    rows:
      - - 劳动力短缺（结构性）
        - 驱动因素
        - 现在 – 持续
        - 美国制造业 1.7M 个岗位空缺，为 Skild 目标细分市场带来持续自动化需求
        - Skild 赢单时，主要驱动因素是劳动力成本，还是能力驱动的替代？
      - - AI 基础模型突破
        - 驱动因素
        - 现在 – 2027
        - 通用机器人 AI 无需逐任务 ML 工程即可迁移任务，移除了大规模部署的关键障碍
        - Skild 的模型性能相较 Google RT-2、OpenVLA、Physical Intelligence π0 表现如何？
      - - 电商吞吐需求
        - 驱动因素
        - 现在 – 2030
        - Amazon 定下的履约标准迫使 3PL 自动化；仓储自动化软件以 14.87% CAGR 增长
        - Skild-Zebra 管线中，电商客户相较其他垂直行业贡献多大比例？
      - - 自动化价值向软件转移
        - 驱动因素
        - 2025 – 2030
        - 仓储自动化的软件部分增长快于硬件（14.87% vs. 整体 13.98% CAGR），验证智能层论点
        - 在竞争对手的硬件捆绑压力下，Skild 能否拿到软件利润率？
      - - 单件拣选机器人增长
        - 驱动因素
        - 2025 – 2031
        - 单件拣选是增长最快的机器人子细分市场，CAGR 为 15.27%；Skild 的灵巧操作 AI 正面切入这一需求
        - Skild 的单件拣选成功率相较行业基准如何（通常要求 >99%）？
      - - 训练数据稀缺（约束）
        - 约束
        - 现在 – 2028
        - '真实世界机器人训练数据昂贵且专有；MarketsandMarkets 将其列为 #1 市场挑战'
        - Skild 已累积多少机器人小时训练数据？它是否构成可防御 IP？
      - - 初始 CapEx 高（约束）
        - 约束
        - 现在 – 2028
        - 加上 AI 软件前，工业机器人系统成本已达 $15K–$75K+；若没有融资方案，中小企业市场基本难以触达
        - Skild 是否提供 RaaS（Robotics-as-a-Service）或融资选项，以降低 CapEx 门槛？
      - - 集成复杂度（约束）
        - 约束
        - 现在 – 2029
        - 部署需要机器人工程师、生产经理和 IT 协同；合格集成商稀缺
        - Skild 的合作生态中有多少认证系统集成商？
      - - 安全与监管壁垒（约束）
        - 约束
        - 现在 – 2030
        - 医疗和国防部署需要 24–48 个月完成安全认证；收入确认因此推迟
        - Skild 的 AI 系统已通过哪些监管标准（ISO 10218、IEC 62443）？
      - - 开源 AI 商品化风险（约束）
        - 约束
        - 2026 – 2029
        - Google RT-2、OpenVLA 和 Physical Intelligence π0 已公开可用；商品化可能压缩 Skild 的软件利润率
        - 相较标准化基准上最好的开源模型，Skild 性能优势是什么？
    notes: 方向、时间和影响由作者根据公开市场数据与投资者评论评估。约束严重度评级为定性判断。尽调问题截至本文写作时仍未解决。
