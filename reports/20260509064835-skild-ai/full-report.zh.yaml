      - number: '2.3'
        title: 买家与细分市场地图
        blocks:
          - type: paragraph
            body: >
              Skild AI 的买家版图可分为五个清晰细分，每个细分都有不同买家、用户、预算所有者和采用触发因素。在仓库与物流——Skild
              当前最活跃的商业垂直——主要买家是物流运营商（3PL）或大型零售商。付费方是希望降低人工成本、提升吞吐量的 CFO 或运营副总裁；用户是机器人机队经理。预算周期通常是多年期资本开支项目，软件金额常在
              $500K–$5M 区间，并经常与硬件打包。2026 年 4 月收购 Zebra 让 Skild 直接接触这些企业买家。


              离散制造领域的买家是工业 OEM 或 Tier 1 供应商。采用触发因素不是单纯成本，而是质量一致性、可重复性和劳动力可得性。预算归制造工程部门所有，采购需要安全认证，因此销售周期更长（12–36
              个月）。人形机器人 OEM 合作仍处早期，但战略意义关键：Skild 通过 SDK 或云 API 提供机器人“大脑”，OEM 再将其授权到自家硬件中，类似移动 OS
              授权模式。国防和安防买家通过政府项目办公室以多年期合同采购；超大规模云厂商和 REITs 的设施巡检则提供推进更快、毛利更高的账户，因为 24/7 覆盖替代夜班人工巡检，ROI 清晰。
