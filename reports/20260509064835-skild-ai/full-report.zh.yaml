  - id: TR003
    title: 合作伙伴 / 依赖风险登记表
    columns:
      - 依赖项
      - 交易对手
      - 角色
      - 集中度
      - 失效情景
      - 严重性
      - 缓释措施
      - 剩余风险敞口
    rows:
      - - 资本 — 主要投资方
        - SoftBank（Vision Fund）
        - 领投 Series A、B、C；主要机构资本提供方
        - 极高 — 三轮均由单一投资方主导；没有其他投资方领投过任一轮
        - SoftBank Vision Fund 2 流动性约束、组合再平衡或授权范围变化，迫使 Skild 接受过桥条款或失去后续投资
        - 阻断性
        - 在 Series D 分散投资者基础；培养 NVIDIA、Samsung 等战略投资方成为联合领投
        - 高 — SoftBank Vision Fund 2 在 2025 财年录得 $3.6B 亏损；后续投资能力和意愿不确定
      - - 算力与仿真基础设施
        - NVIDIA
        - Isaac Lab 仿真；Cosmos Transfer；NVentures 共同投资；可能拥有优先 GPU 使用权
        - 高 — 训练管线建在 NVIDIA 仿真栈上；切换成本很高
        - NVIDIA 降低 Skild 优先级或减少算力分配；GPU 出口限制影响供应
        - 重大
        - 多云算力策略；合同锁定算力配额；NVIDIA 的战略共同投资提供一定利益一致性
        - 中 — NVIDIA 同时也是直接竞争对手的基础设施伙伴；竞争动态可能变化
      - - 硬件部署渠道
        - Samsung、LG、Schneider Electric、CommonSpirit 等合作方
        - 战略投资方兼客户；Skild Brain 的主要硬件部署渠道
        - 高 — 四家战略投资方可能贡献当前收入大头
        - 任一伙伴自研 AI、收购竞争对手或减少机器人产量
        - 重大
        - 分散硬件 OEM 合作；维持技术优势，让伙伴选择授权而非自研有理由
        - 高 — 硬件 OEM 自研 AI 是机器人行业已有记录的风险
      - - 机群编排与企业客户基础
        - Zebra Technologies / Fetch Robotics（已收购）
        - 提供 Symmetry 平台、企业客户关系和运营型机器人经验
        - 中 — 收购后 Zebra 不再是独立交易对手，但整合执行成为风险
        - 整合失败、关键人才流失，或从 Zebra 向 Skild 迁移平台期间客户流失
        - 重大
        - 设立专项整合管理；为关键人员提供留任包；用合同约定客户迁移 SLA
        - 高 — 收购于 2026 年 4 月完成；整合仍在进行，未披露整合里程碑或成功指标
      - - 军民两用国家安全投资方
        - In-Q-Tel（CIA 风投部门）
        - 战略投资方；引出军民两用考量
        - 低至中 — 少数股投资方；角色偏战略而非运营
        - 出口管制限制损害国际销售或跨境数据共享；伙伴国家施加限制
        - 重大
        - 对投资条款做法律审查；维持技术管制计划；如有需要，拆分出口受控开发线
        - 中 — 限制未公开披露；没有文件审查就无法量化风险
    notes: 各行按严重性排序。SoftBank 集中度是最尖锐的结构性依赖。由于缺少已披露客户 / 收入数据，硬件 OEM 集中风险目前无法量化。Zebra 整合风险集中在收购后 12–18 个月窗口内。
