      - number: '5.2'
        title: 架构与训练管线
        blocks:
          - type: paragraph
            body: >
              Skild Brain 采用基于 transformer
              的两层分层架构。高层组件以低频运行，负责语义层任务规划——决定采取什么动作、排列子任务顺序，并整合操作员给出的语言或视觉指令。低层组件以高频运行，把高层命令转成具体物理机器人各关节的电机扭矩和角度。这种拆分接近人类分解意图与运动执行的方式，也让同一个高层规划器无需修改就能驱动形态差异很大的机器人身体。


              训练分两阶段。预训练阶段使用大规模物理仿真（NVIDIA Isaac Lab），在多种机器人形态和多样环境中并行运行数千个机器人实例，生成数万亿条合成动作经验。NVIDIA Cosmos Transfer
              用环境变化扩充训练数据集——光照、纹理、天气条件——尽可能提高鲁棒性。第二类预训练来源是互联网级人类视频：数十亿段人类执行操控和移动任务的片段，模型把人当作生物机器人来学习物体可供性。Skild
              称，这使其能在数天内获得相当于一千年的机器人经验。


              后训练还使用两类来源：遥操作数据（图像和本体感知映射到关节扭矩，通过可扩展接口采集，被称为最丰富的训练信号），以及商业机器人机队持续生成的真实部署数据。数据飞轮是 Skild
              竞争策略的核心：每一次新的商业部署都会贡献后训练数据，改进模型，再带来更多、更好的部署。


              公司声称的关键突破是上下文学习：Skild Brain 遇到新情况——断腿、车轮卡住、陌生机器人身体或新环境——会在几次尝试中与环境交互并调整行为，不需要梯度更新或重新训练。NVIDIA 案例研究称，车轮卡住后
              2–3 秒内恢复，断腿后数次尝试恢复，并能零样本泛化到踩高跷行走，腿长与身体比例超出训练分布。在 Pittsburgh 城市测试中，类人机器人在从未见过的环境中采集数据数小时后，任务表现达到 60–80%。
