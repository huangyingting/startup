      - number: '6.4'
        title: 留存、耐久性与切换成本
        blocks:
          - type: paragraph
            body: >
              Skild AI 的留存动态无法用公开数据直接衡量：NRR、GRR、流失率、合同期限和客户满意度评分都未披露。公司直到 2025 年才开始产生显著收入，这意味着即使是内部 cohort 数据，截至报告日也只有不到
              24 个月历史。


              数据飞轮创造了结构性留存机制。每一次客户部署都会向 Skild 后训练管线贡献专有机器人运营数据。数据改进共享的 Skild Brain
              模型，继而改善平台上所有客户的结果。贡献过部署数据的客户，会受益于已学习其具体环境和任务类型的模型。切换到竞争机器人 AI 平台会放弃这些累积模型改进，形成类似云机器学习平台的经济性切换成本。


              考虑到把 Skild Brain 嵌入机器人硬件组合需要很深的工程投入，OEM 合作（ABB、Universal
              Robots、MiR）很可能采用多年集成协议。这些合作创造了不依赖任何单一终端客户部署的耐久关系。机器人 OEM 如果把 Skild Brain
              集成进产品架构，再替换它会面临高切换成本，因为必须为整个机队重新工程化智能层。


              Zebra Symmetry 平台增加了一层软件编排依赖：使用 Symmetry 协调机队的仓库运营商，如果替换平台会承担迁移成本。这是收购继承来的留存资产，但其耐久性取决于能否与 Skild Brain
              能力成功集成。


              目前未发现负面证据——投诉、部署失败、客户流失或公开争议——但这与其说一定代表真实客户满意，不如说同样可能来自早期阶段不透明。尽调应向公司索取 NRR、GRR 和客户队列数据。
