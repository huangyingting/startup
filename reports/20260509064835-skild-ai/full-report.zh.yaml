      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              最持久的增长驱动来自结构性劳动力短缺：US Chamber of Commerce 报告目前有 1.7M+ 个制造业岗位空缺，National Association of Manufacturers 预计到
              2030 年空缺将达 2.1M 个。这不是周期性缺口——人口结构趋势和制造业回流要求会让自动化需求在可预见未来保持结构性高位。电商增长进一步放大这一点：仓库自动化软件细分到 2031 年的 CAGR 为
              14.87%（Mordor Intelligence），快于硬件，验证了“稀缺价值正在从钢铁转向智能”的投资逻辑。


              第二个主要驱动是 AI 基础模型突破。大型多模态模型第一次能够以极少重新训练跨机器人形态和任务泛化。Skild 最早期支持者 Sequoia Capital 明确把这笔投资类比为语言 AI 的 GPT-3
              时刻——通用智能架构的到来。单件拣选机器人是商业价值最高、技术难度也最高的子任务之一，预计到 2031 年 CAGR 为 15.27%（Mordor Intelligence），验证了市场对 Skild
              灵巧操作能力的需求。


              主要约束包括训练数据稀缺（MarketsandMarkets 将其列为关键市场挑战）、高初始资本开支强度（仅工业机器人硬件就需 $15K–$75K，尚未计入集成），以及在非结构化环境中部署 AI
              系统的复杂性（需要专门的机器人集成商和大量操作员培训）。医疗和国防的安全认证周期可延长至 24–48 个月，限制受监管细分的近期收入。一个结构性尽调问题仍然存在：开源基础模型（Google
              RT-2、OpenVLA）是否会在 Skild 夯实数据飞轮优势和客户切换成本之前，更快地把 AI 层商品化。
