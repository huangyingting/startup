      - number: '5.4'
        title: 差异化、知识产权与数据护城河
        blocks:
          - type: paragraph
            body: >
              Skild AI 的技术差异化建立在四根互相强化的支柱上。第一，训练数据规模：公司称其以动作为中心的数据量比竞争机器人模型多 1,000
              倍，来源包括大规模仿真、互联网视频摄取和不断扩大的真实部署机队。第二，全机体泛化：不同于按机器人类型或任务分别训练模型的竞争对手，Skild Brain
              可借助上下文学习适应新身体和新场景，完全不需要再训练。第三，涌现能力：演示包括在抓取中途接住滑落物体、旋转物体校正朝向、从硬件故障中恢复、踩高跷行走——这些行为并非显式编程，而是从大规模训练中涌现。第四，复利式数据飞轮：商业部署持续生成专有后训练数据，没有在线部署机队的竞争对手无法复制。


              IP 基础直接来自创始人的研究。Deepak Pathak 在 ICML 2017 发表的自监督预测驱动好奇心探索论文，奠定了用内在动机进行自主智能体探索的基础技术；这篇论文引用超过 6,000 次，直接承接到
              Skild Brain 无需显式奖励塑形即可泛化的能力。Kumar、Pathak 等人在 RSS 2021 的 Rapid Motor
              Adaptation（RMA）论文，通过两阶段方法（特权训练加在线历史编码器）证明了腿式机器人电机控制可实时适应新地形、负载和损伤——这是 Skild Brain 上下文学习的直接技术前身。Abhinav
              Gupta 的「Supersizing Self-Supervision」工作确立了大规模数据范式（50,000+ 次机器人抓取尝试、700 个机器人小时），支撑 Skild 的训练策略。Pathak 和
              Gupta 的 CMU 团队凭借 2021–2022 年仿真到现实迁移工作，在 Conference on Robot Learning 获得 Best Robotic System Award。


              尚未发布将商业版 Skild Brain 与竞争模型比较的同行评审基准。性能指标来自公司自述或 NVIDIA 伙伴案例研究。相对于具体竞争对手的 1,000 倍数据说法，也没有经过独立验证。
