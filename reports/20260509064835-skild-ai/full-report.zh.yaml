      - number: '7.5'
        title: 财务与资本结构风险
        blocks:
          - type: paragraph
            body: >
              Skild 的资本结构特点是投资者极度集中，烧钱与收入轨迹高度不确定。SoftBank 领投了 Series A（$300M，2024 年底）、Series B（$135M，估值 $4.5B，2025 年 6
              月）和 Series C（$1.4B，估值 $14B，2026 年 1 月）。这意味着单一投资者控制了全部三轮机构融资的主要资本生命线。最可能持有 Skild 敞口的 SoftBank Vision Fund
              2，在截至 2025 年 3 月的财年因组合减记报告 $3.6B 亏损。更广义的 Vision Fund 到 2023 年两年累计亏损约 $48B。SoftBank 资本受限、组合再平衡或内部授权转向，都可能在
              Skild 的关键节点削弱后续投资能力。


              $14B 估值是在短短七个月内从 $4.5B Series B
              估值翻了三倍后达到的。这种私募市场估值膨胀速度，更多由叙事动能和战略投资者热情推动，而不是收入轨迹推动，造成结构性风险：单个负面数据点（错过收入目标、安全事故、竞争对手突破）就可能触发显著估值重置，损害未来融资条款和员工股权留存。


              月度总烧钱率未公开披露。按公司规模（Zebra 收购后估计 200–400 名员工）、模型训练基础设施（GPU 算力）、办公室扩张和收购整合估算，总烧钱率为每月 $30–60M。在这一速度下，$1.4B
              Series C 资金（扣除 Zebra 收购现金对价，金额未披露）意味着自 2026 年 1 月起约 18–36 个月总资金续航——Series D 触发点落在 2027 年底或 2028
              年初。收入会部分抵消烧钱，但 $30M ARR 折算到月度约为每月 $2.5M，相对于估计 $30–60M 月度烧钱，抵消很小。


              Zebra Robotics 收购增加了收购整合成本、潜在业绩对赌义务和 Fetch Robotics 遗留运营成本。收购价未披露；任何重大现金组成都会使净 Series C 资金续航低于标题估算。
