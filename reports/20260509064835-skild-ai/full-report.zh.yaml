    title: 产品成熟度 / 能力图
    type: matrix
    layout: standard
    summary: |
      从七个产品能力维度评估成熟度和证据质量。Skild 最强的维度是跨本体泛化和机队编排（通过 Symmetry）。最弱的是开发者平台开放度和安全认证。
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE019
      - CE031
      - CE033
      - CE034
      - CE035
    data:
      columns:
        - 成熟度水平
        - 证据质量
        - 竞争位置
      rows:
        - label: 跨本体泛化
          values:
            - 高——已在四足机器人、人形机器人、桌面机械臂、AMR 上展示
            - 公司口径 + NVIDIA 案例研究（伙伴报告）
            - 差异化；没有同业披露过覆盖面相当的全本体模型
        - label: 上下文内适应（无需重新训练）
          values:
            - 中高——卡住的轮子 2–3s 恢复；展示断肢应对；零样本踩高跷
            - NVIDIA 案例研究（伙伴评估中观察）
            - 差异化；延续 RMA 技术脉络；没有发布与 Physical Intelligence 的基准对比
        - label: 移动能力（户外 / 城市）
          values:
            - 中——Pittsburgh 任务完成率 60–80%；披露的环境多样性有限
            - NVIDIA 案例研究（单一城市环境评估）
            - 与 Agility Robotics / Boston Dynamics 大体相当；基础模型路线新颖
        - label: 操作精度
          values:
            - 中——展示 AirPod 插入和桌面清理；工业级精度未验证
            - NVIDIA 案例研究（演示条件；无量化准确率指标）
            - 相对 Physical Intelligence（pi_）不清楚；无公开头对头基准
        - label: 机队编排（Symmetry）
          values:
            - 高——生产级；已有 Zebra 企业客户部署
            - 收购公告（BusinessWire）；Robotics & Automation News 报道
            - 强；补上纯 AI 竞争者缺少的企业级编排层
        - label: API / 开发者平台
          values:
            - 低——无公开 SDK；GitHub 为空；截至 2026 年 5 月仅企业门禁访问
            - 观察结果（github.com/skild-ai 零个公开代码仓库；skild.ai 仅描述 API）
            - 弱于开放生态同业；开发者护城河尚未建立
        - label: 安全认证
          values:
            - 低——未公开披露第三方物理或 AI 安全认证
            - 缺少公开披露；未引用 ISO 10218 或 ASIMOV 结果
            - 与受监管行业（医疗、政府）的企业采购要求相比存在缺口
  - id: FU001
    title: 客户旅程图——Skild AI 采用阶段
    type: journey-map
    layout: standard
    summary: |
      展示不同客户细分如何推进 Skild AI 采用生命周期，从初始认知，到试点、生产部署，再到平台扩展。OEM 伙伴走的是先集成路径，企业直采部署方走的是先用例路径。生产阶段的数据飞轮形成自我强化的扩张循环。
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU015
      - CU018
      - CU021
    data:
      nodes:
        - id: awareness
          label: 第 1 阶段：市场认知
          detail: 机器人 OEM 评估基础模型授权；企业围绕具体自动化难题评估 Skild Brain；驱动因素包括 NVIDIA 合作新闻、Series C 报道和 OEM 关系
        - id: evaluation
          label: 第 2 阶段：技术评估
          detail: OEM 伙伴：评估与 Skild Brain API 集成的可行性。企业直采：界定试点范围、选择机器人硬件、划定部署环境。IQT / 国防：机密评估流程
        - id: pilot
          label: 第 3 阶段：试点 / POC 合同
          detail: 在一个设施或一种机器人类型上有限部署；生成的数据开始进入飞轮；OEM 签署集成开发协议；企业签署试点服务协议
        - id: production
          label: 第 4 阶段：生产部署
          detail: >-
            OEM 将 Skild Brain 嵌入产品线（ABB、UR/MiR 路径）。企业大规模部署（Foxconn/NVIDIA 路径：Blackwell GPU 组装）。Zebra Symmetry 客户：收购后加上
            Skild Brain 层
        - id: expansion
          label: 第 5 阶段：平台扩展
          detail: 数据飞轮：每次部署都会改善所有客户使用的模型。OEM 推向更多机器人家族。企业增加新的任务类型或新设施。新增垂直：医院、酒店、消费家庭（2026+ 路线图）
        - id: strategic_investor
          label: 平行路径：战略投资人兼客户
          detail: Amazon、Samsung、LG、Schneider、CommonSpirit 先投资，后部署。投资先于部署；技术成熟后预计跟进商业关系。LG CNS 已于 2025 年推进到试点 / 商业路径
