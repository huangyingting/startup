      - number: '7.2'
        title: 业务与商业风险
        blocks:
          - type: paragraph
            body: >
              最具结构性担忧的商业风险，是估值与收入倍数。Skild AI 估值 $14B+，2025 年收入约 $30M——收入倍数约 467 倍——跻身全球估值最高的未规模化 AI 公司。该倍数预设公司能在 24–36
              个月内实现快速、持久增长，收入达到数亿美元。$30M 收入数字来自公司披露且未审计，没有第三方验证、没有披露客户名单、没有集中度数据，也没有按产品线或垂直领域拆分。缺少这些输入，就无法评估收入质量。


              硬件 + 软件一体化机器人的商业化周期天然长于纯软件。企业采购机器人自动化通常包括：试点评估（3–6 个月）、现场安全评估、与现有仓库管理或制造执行系统集成（3–12 个月）、全面部署（6–18
              个月）。这一结构性现实意味着，即便资金充足、销售能力更强的竞争对手，也需要 2–4 年才能达到有意义的企业收入规模。Skild 2023 年成立后到 2025 年才出现 $30M
              收入，符合这一模式；但这也意味着通向 $200M+ ARR 的路需要多年持续执行。


              客户集中度是未披露风险。考虑到 Skild 的企业销售属性和业务早期阶段，当前收入大部分来自少数战略投资方（Samsung、LG、Schneider Electric、CommonSpirit
              Health）并非不可能。客户离开或战略伙伴降温，可能造成与客户数量不成比例的重大收入下滑。没有披露任何客户名称或合同结构，使这一风险无法量化。


              Zebra Robotics 收购（2026 年 4 月）带来第二条收入流，但也带来集成风险、平台转换引发的潜在客户流失，以及关键商业化阶段额外的运营复杂度。
