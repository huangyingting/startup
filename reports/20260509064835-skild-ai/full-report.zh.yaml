      - number: '3.2'
        title: 竞争对手画像：直接同行与平台威胁
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence（π.ai）由前 Google Brain 和 Berkeley 机器人研究员创立，是 Skild 在理念和商业上最接近的同行。它的 π₀ 架构把 3B 参数
              PaliGemma VLM 主干与 300M 参数、使用流匹配的动作专家结合起来，并用来自 7–8 个机器人平台、68+ 项任务的 10,000+ 小时示范数据训练。开源的 “openpi”
              仓库带来强学术社区参与，但也带来商品化风险：免费释放模型权重，等于表明价值在训练数据和部署，而不在架构本身——这与 Skild 自身定位一致。PI 到 2025 年底累计融资 $1.07B（2024 年 11 月
              $400M Series A，2025 年 11 月 CapitalG/Alphabet 领投 $600M Series B）。Alphabet 持有 CapitalG，意味着它在 Skild
              最接近的直接竞争对手中有财务权益。


              NVIDIA 的 GR00T N1 是性质完全不同的威胁：NVIDIA 不向 AI 模型收费，而是把 GR00T 作为免费开源产品，推动 GPU 硬件采用和 NVIDIA Cosmos
              仿真订阅。双系统架构（System 2 VLM 负责推理，System 1 扩散 Transformer 负责实时动作）于 2025 年 3 月以宽松许可证发布。早期采用者包括 1X
              Technologies、Agility Robotics、Boston Dynamics、Mentee Robotics 和 NEURA Robotics——基本覆盖领先人形机器人 OEM。Google
              DeepMind 的 Gemini Robotics（2025 年 3 月）同时覆盖通用 VLA，以及具备深度 3D 空间理解的 Gemini Robotics-ER。合作伙伴包括
              Apptronik（Apollo，截至 2026 年 2 月融资 $935M）、Boston Dynamics Atlas 和 Agility Robotics Digit。


              在垂直一体化人形机器人厂商中，Figure AI 资本最充足：2024 年 3 月以 $2.6B 估值完成 $675M Series B，随后在 2025 年 9 月以 $39B 估值完成 $1B+ Series
              C。其 “Helix” AI 平台为自研且绑定硬件，2024 年 12 月首次向 BMW 商业交付。不过，Figure 在 2025 年终止了与 OpenAI 的 AI 合作，而 OpenAI
              随后推出自有机器人部门——前合作伙伴由此变成直接竞争对手。Covariant 的 RFM-1 仓库 AI 基础模型曾是先行者，但 Amazon 在 2024 年对其创始团队做收购式招聘（并取得 Amazon
              的非独占 IP 许可），从根本上削弱了公司；Covariant 于 2025 年 2 月融资 $100M 后正在重建。Covariant 的先例——大客户通过人才收购实质性掏空供应商——是 Skild
              企业战略的重大风险。
