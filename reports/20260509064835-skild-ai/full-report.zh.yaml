  - id: TP001
    title: 竞争对手画像表
    description: Leading competitors to Skild AI across five competitive tiers. Scale and funding as of Q1 2026.
    notes: 融资数字来自最新披露轮次；估值为已报道轮次的投后估值。'目标细分市场' 反映主要商业焦点。NVIDIA 和 ABB 属于大型公司旗下部门；如有数据，融资 / 估值指机器人部门。
    columns:
      - 竞争对手
      - 类别
      - 融资 / 规模
      - 目标细分市场
      - AI 路线
      - 相较 Skild 的关键优势
      - 相较 Skild 的关键限制
    rows:
      - - Physical Intelligence（π.ai，竞争者）
        - 直接同业
        - 已融资 $1.07B；估值 $5.6B（2025 年 11 月）
        - 跨形态操作；研究 + OEM 授权
        - π₀ VLA（3B 参数 PaliGemma + 流匹配）；通过 openpi 开源
        - 开源生态有牵引力；CapitalG（Alphabet）支持；学术社区强
        - 没有企业分销；没有系统集成打法；披露数据集小于 Skild 声称规模
      - - NVIDIA GR00T / Isaac
        - 平台威胁
        - 市值约 $3T；机器人业务是战略增长部门
        - 人形机器人 OEM、机器人实验室、任何搭载 NVIDIA GPU 的机器人
        - GR00T N1 双系统（VLM + 扩散），开源；Isaac Lab / Sim / Cosmos 生态
        - 计算基础设施占主导；机器人训练事实上的 GPU 标准；免费模型推动 OEM 采用
        - 不是纯 AI 软件公司；GPU 收入模式限制其对 AI 模型本身收费
      - - Google DeepMind
        - 平台威胁
        - Alphabet（市值约 $2T）；Intrinsic 已整合（2026 年 2 月）
        - 人形机器人 OEM 伙伴（Apptronik、Boston Dynamics）；企业制造
        - Gemini Robotics VLA + ER；Intrinsic IVM + Flowstate；端侧版本（2025 年中）
        - 研究算力近乎无限；领先 VLM 基础模型（Gemini 2.0）；叠加 Intrinsic 工业 SDK
        - 过去未能把机器人研究商业化；截至 2025 年商业部署仍有限
      - - Figure AI
        - 垂直整合（硬件 + 软件）
        - 已融资 >$2B；估值 $39B（2025 年 9 月）
        - 汽车制造（BMW）；物流
        - Helix 专有 AI 平台 + Figure 02 人形机器人；BotQ 制造设施
        - 资本体量巨大（估值 $39B）；BMW 商业部署；垂直整合形成全栈护城河
        - AI 绑定特定硬件（不跨形态）；高资本开支；OpenAI 合作破裂释放不稳定信号
      - - Covariant
        - 直接同业（仓储 AI）
        - 新融资 $100M（2025 年 2 月）；Amazon 人才收购后重组
        - 仓储 / 物流拣选与操作
        - RFM-1 仓储基础模型；Amazon 非独家 IP 授权
        - 最大仓储专用真实世界训练数据集；Amazon 授权验证模型质量
        - 组织不稳定；创始团队转入 Amazon；人才密度下降
      - - Apptronik
        - 相邻玩家（人形机器人硬件 + Google AI）
        - 累计融资 $935M（2026 年 2 月）；估值约 $5–5.5B
        - 企业制造（Mercedes-Benz、GXO、Jabil、John Deere）
        - Apollo 人形机器人集成 Gemini Robotics-ER；硬件 + Google AI 软件捆绑
        - Google DeepMind AI 合作面向 OEM 拼出强大的硬件 + 基础模型组合
        - 不是 AI 软件平台；依赖 Google DeepMind；范围窄于 Skild 的跨形态覆盖
      - - Unitree / AgiBot
        - 相邻玩家（低成本硬件 + AI）
        - Unitree：2025 年收入 $235M（同比 335%）；AgiBot：估值 $2.1B（2025 年）
        - 制造、物流（Unitree）；中国工业（AgiBot）；全球扩张中
        - Unitree G1 价格 $13.5K–$21.5K；AgiBot ViLLA/GO-1；快速放量
        - 硬件价格大幅更低；2025 年 Unitree 出货 5,500+ 台、AgiBot 出货 5,100+ 台
        - AI 平台能力验证较少；数据主权担忧；西方市场准入受限
      - - ABB / KUKA / Fanuc
        - 在位者（传统机器人 OEM）
        - ABB：2024 年机器人收入 $2.3B；全球市场份额并列第一
        - 工业制造、汽车、电子（企业 OEM 渠道）
        - OmniCore AI-ready 控制器（ABB）；FANUC Physical AI 倡议（2025 年 12 月）；支持 ROS2/Python
        - 300,000+ 台机器人装机基数；工业市场份额 70%+；企业信任与合规基础
        - 软件能力受限；AI 能力只是附加项，不是基础；适应基础模型范式较慢
