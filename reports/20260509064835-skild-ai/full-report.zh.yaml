      - - 机器人 AI 人才获取与留存
        - 研究人才争夺来自 Google DeepMind、Meta AI、Tesla Optimus、Amazon、Figure AI、Physical Intelligence
        - 高 — 人才短缺是结构性的；薪酬和股权竞争激烈
        - 重大
        - CMU 毗邻优势带来人才管线；$14B 估值下股权上行仍有意义，但已部分摊薄
        - 按职能确认员工数；评估自愿流失率；对照同业审查薪酬基准
      - - Zebra / Fetch Robotics 收购整合
        - 关键 Symmetry 平台工程师可能在收购后离开；AI 初创公司与企业硬件公司的文化需要整合
        - 中 — 收购后人才流失很常见；文化错配是已有记录的风险
        - 重大
