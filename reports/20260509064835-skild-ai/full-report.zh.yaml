      - number: '3.3'
        title: 对比分析：能力、定价与分发
        blocks:
          - type: paragraph
            body: >
              跨形态通用性——不针对单一机器人重新训练，也能在任意机器人形态上运行——是 Skild 声称的主要差异化。Sequoia 合作公告称，Skild 的数据集“比多数竞争对手大 1,000
              倍”。这个说法很惊人，但没有独立基准测试验证：Physical Intelligence 的 π₀ 在 8 个机器人平台、68+ 项任务的 10,000+ 小时示范数据上训练；NVIDIA GR00T
              则用真实轨迹加 Omniverse 大规模生成的合成数据训练。没有已发布的头对头基准测试能验证 Skild 的数据优势。企业就绪度上，收购 Zebra 之后，Skild 相比 PI 和 DeepMind
              有实质优势：Fetch Robotics AMR 机队、企业 WMS 集成，以及 Zebra 销售团队，提供了纯 AI 研究型组织缺少的商业基础设施。


              竞争格局中的定价大多不透明。Skild 的企业交易没有公开披露；可比 AI 机器人平台合同显示，机队部署的年合同额可能为 $200K–$5M+。NVIDIA GR00T 免费，变现靠 GPU
              硬件和云计算。Covariant 未发布定价。ABB 等传统龙头把软件与硬件打包，以混合毛利变现。中国竞争对手（Unitree G1 每台 $13.5K–$21.5K；AgiBot
              GO-1）代表市场最低硬件单台成本。Unitree 在 2025 年出货 5,500+ 台人形机器人，实现 $235M 收入（同比 335%）；AgiBot 出货 5,100+ 台，估值
              $2.1B——但它们的企业 AI 平台能力仍未充分建立，并在西方市场面临数据主权顾虑。


              分发能力是关键战场。ABB 全球 300,000+ 台存量机器人构成 AI 创业公司难以复制的分发护城河。Skild 收购 Zebra 是直接反制：通过收购企业机器人基础设施，Skild
              获得客户入口，而不是只依赖 OEM 合作。Figure AI 的 BMW 试点、Agility 在 Amazon 和 GXO 的部署（2025 年达到 100,000 次周转箱搬运里程碑），以及
              Apptronik 与 Mercedes-Benz、John Deere 的合作，都形成了分发锁定；Skild 必须用自己的企业销售能力去竞争。
