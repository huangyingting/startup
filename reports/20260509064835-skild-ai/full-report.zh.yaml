      - number: '7.6'
        title: 运营与人员风险
        blocks:
          - type: paragraph
            body: >
              关键人物风险很高。Deepak Pathak（CEO）和 Abhinav Gupta（President）都是 Carnegie Mellon Robotics Institute 教授，2023 年创立
              Skild
              AI。他们的声誉、学术网络，以及对研究和架构的直接技术贡献，支撑公司吸引顶尖人才、获得战略投资者并维持企业客户技术可信度的能力。两人都没有从早期阶段一路搭建并规模化一家商业科技公司至数亿美元收入的经历。他们合计
              25+ 年 AI/机器人学术经验是深厚优势，但不能直接转化为规模化商业运营经验。


              人才竞争激烈。Skild 必须从很小的全球机器人 AI 研究员和工程师人才池中招聘，而 Google DeepMind、Meta AI、Tesla Optimus、Amazon、Figure AI 和
              Physical Intelligence 也在争夺这些人——这些公司都能提供有竞争力的薪酬、算力资源和各自有吸引力的使命。资深研究人员流失，或未能按所需速度招聘，都会拖慢模型开发、降低部署质量并削弱数据飞轮。


              Zebra Robotics 收购（2026 年 4 月，包括 Fetch Robotics 传承团队）增加组织整合风险。Skild 是研究密集型 AI 初创公司；Zebra Technologies
              是成熟企业硬件公司。文化对齐、系统集成和被收购团队留任，是企业机器人收购中有记录的难题。如果整合处理不当，构建 Symmetry 平台的关键 Fetch Robotics 技术人员可能离开，使 Skild
              失去服务现有 Zebra 企业客户所需的制度知识。


              公司没有披露联合创始人继任计划，没有披露具备企业规模化经验的 COO 或首席商务官，也没有证据显示其拥有通常需要的成熟企业 SaaS 领导团队（VP Sales、VP Customer
              Success），以支撑在企业自动化市场从 $30M ARR 扩到 $200M ARR。学术转商业的领导力转换风险，是深科技高校分拆公司常见失败模式。
