      - number: '1.3'
        title: 融资历史与投资人基础
        blocks:
          - type: paragraph
            body: >
              Skild AI 自创立以来融资节奏极快。公司 2023 年从 Sequoia Capital 融到一轮金额未披露的种子轮；随后在 2024 年 7 月 9 日完成标志性的 $300M Series A，投后估值
              $1.5B——Lightspeed Venture Partners、Coatue、SoftBank Group 和 Jeff Bezos（通过 Bezos Expeditions）领投，Felicis
              Ventures、Sequoia、Menlo Ventures、General Catalyst、CRV、Amazon、SV Angel 和 Carnegie Mellon University 等跟投。


              2025 年 6 月，Skild 完成约 $135M Series B，由 SoftBank 领投（据报道出资 $100M），Nvidia 出资 $25M，Samsung 出资 $10M，估值
              $4.5B。七个月后，2026 年 1 月，公司完成 SoftBank Group 领投的 $1.4B Series C，估值超过 $14B。该轮引入 NVentures（NVIDIA 的 VC
              部门）、Macquarie Capital、Jeff Bezos（Bezos Expeditions）、Samsung、LG、Schneider Electric、CommonSpirit
              Health、Salesforce Ventures、IQT（In-Q-Tel）等战略投资人。此前投资人 Lightspeed、Felicis、Coatue 和 Sequoia 也都在 Series C
              继续加码。


              CEO Deepak Pathak 于 2026 年 1 月表示，公司迄今融资超过 $2B。Crunchbase 截至 Series C 跟踪到四轮合计 $1.83B。Series C 之后，Skild 于
              2026 年 4 月收购 Zebra Technologies 的 Robotics Automation 业务；交易中 Zebra 获得 Skild 股权，股权结构表因此进一步纳入战略工业伙伴。


              投资人基础值得注意：既有 Sequoia、Lightspeed、Coatue、Felicis 等硅谷一线 VC，也有横跨硬件（NVIDIA、Samsung、LG）、工业自动化（Schneider
              Electric）、医疗（CommonSpirit）、企业软件（Salesforce Ventures）、美国国防 / 情报（IQT/In-Q-Tel）和全球基础设施资本（Macquarie
              Capital、SoftBank）的主要战略 / 企业投资人。
