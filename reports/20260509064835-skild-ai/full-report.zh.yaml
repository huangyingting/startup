  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 当前估值与收入倍数
        blocks:
          - type: paragraph
            body: >
              Skild AI 于 2026 年 1 月 14 日宣布的 $1.4B Series C，由 SoftBank 领投，确立了超过 $14B 的投后估值。这相当于在七个月内从 $4.5–4.7B Series B
              估值（2025 年 6 月）翻了三倍，相比 $1.5B Series A 估值（2024 年 7 月）约提升 9.3 倍。Crunchbase 显示各轮已披露融资总额为 $1.83B，CEO Deepak
              Pathak 称总额超过 $2B。


              Series C 新闻稿披露的 2025 年收入约为 $30M，描述为 2025 年「短短几个月」内从零增长而来。这意味着历史收入倍数约 467 倍（$14B / $30M）。即使用保守的 2026 年 50%
              收入增速（至 $45M），2026 年前瞻倍数仍约 311 倍。即使用乐观的 200% 增速（至 $90M），前瞻倍数也约 156 倍。


              作为参照，公开市场中领先企业 AI SaaS 公司在高速增长阶段的前瞻收入倍数为 15–50 倍。前沿 AI 基础设施公司（如 IPO 时的 CoreWeave）前瞻收入倍数为 20–30
              倍。机器人硬件公司（如高峰期 iRobot）收入倍数为 2–8 倍。467 倍历史倍数只有在「赢家拿走大部分」平台论成立时才说得通：Skild 需要在十年内拿下数万亿美元物理 AI 市场中不成比例的一大块份额。


              这一估值由成熟机构投资者给出（SoftBank、NVIDIA、Samsung、LG、Schneider Electric、Macquarie、Bezos Expeditions、Salesforce
              Ventures、IQT），为牛市论提供了一定验证。不过，2024–2026 年 AI 机器人私募市场估值被战略投资者系统性推高，这些投资者追求生态站位，不只追求纯财务回报——这一因素会把估值推到基本面支撑之外。
