        - 整合 Symmetry Fulfillment 会增加硬件编排复杂度；过渡期存在客户流失风险
        - Zebra 股权绑定；分阶段整合路径
        - 收购于 2026 年 4 月宣布；未披露整合指标
      - - IQT / 双用途监管暴露
        - 监管
        - 中
        - IQT 投资释放出国防 / 情报用途信号；带来出口管制义务（ITAR、EAR），并限制投资者基础
        - 亲美合规框架；IQT 提供监管路径支持
        - IQT 已确认为 Series C 投资方；监管暴露为推断
      - - 视频训练数据版权
        - 法律
        - 中
        - Skild 使用互联网来源的视频数据训练；潜在版权侵权责任类似 AI 图像生成器案件
        - 行业共性问题；法律结果不确定；可能需要授权协议
        - 根据训练方法推断；截至 2026 年 5 月，未见针对 Skild 的公开诉讼
    notes: 风险严重度由分析师根据公开证据评估。「对估值的影响」反映风险落地后的定性影响。「高」严重度风险指可能让估值受损 50%+，或造成不可恢复结果的风险。
    enumerationScope:
      coverage: partial
      basis: >-
        Risk factors identified from public disclosures, analyst reports, and sector research. Additional private risks
        (undisclosed litigation, key-person departures, unreported technical failures) may exist.
  - id: TV005
    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 证据基础
      - 投资含义
    rows:
      - - 建议
        - 继续研究 / 跟踪
        - 收入未经审计；缺少独立基准测试；开源风险未解除
        - 若没有经审计收入、客户分群数据和独立技术基准，不应以 $14B+ 估值投资
      - - 置信度
        - 低
        - 467x ARR 倍数；公司口径 $30M 收入；未公开客户名单
        - 基础收入质量和竞争护城河耐久性高度不确定
      - - 风险评级
        - 高
        - 开源商品化；SoftBank 集中度；缺少独立基准；极端估值倍数
        - 四项高严重度风险并发，Series C 价格出现 >50% 回撤的概率不低
      - - 估值立场
        - 偏贵
        - $14B 对应 467x 历史 ARR，而高增长 SaaS 可比倍数为 15–50x
        - 只有乐观收入轨迹兑现，估值才有条件说得通
      - - 入场纪律
        - 当前价格放弃；跟踪里程碑
        - 即便采用乐观增长假设，467x 历史 ARR 倍数也没有安全边际
        - 若经审计 ARR 超过 $100M 且竞争护城河得到验证，可在 Series D 重新评估
      - - 决策含义
        - 等待经审计财务 + 连续 2+ 个季度 ARR
        - 现有证据不足以区分战略价值和基本面价值
        - 触发条件：经审计 $100M ARR、具名 Tier-1 客户、独立基准测试
    notes: 建议仅由分析师基于公开证据评估，不构成投资建议。关键输入包括未经审计的 $30M 收入、$14B Series C 估值，以及 GR00T 和 pi0 带来的开源商品化风险。
    claimRefs:
      - CV003
      - CV004
      - CV028
      - CV029
      - CV030
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 责任方或尽调路径
    rows:
      - - 经审计收入
        - 经审计财务报表，确认 2025 年 $30M ARR 为经常性且已确认收入
        - 没有审计确认，467x 倍数只能靠信心承接；收入质量（经常性 vs 一次性）未知
        - 向公司索取；至少包括前 2 个财年的审计，以及本年度管理账
      - - 客户收入瀑布
        - 具名客户清单，包含收入归因、分群年份、合同期限和流失率
        - 没有这些数据，就无法评估增长率和留存；OEM 与终端用户收入拆分未知
        - 公司数据室；至少通过 3 通客户推荐访谈验证
      - - 分收入流毛利率
        - 按计算成本调整后的毛利率，拆分 Skild Brain 软件与 Symmetry 硬件服务
        - 软件层估值要靠 60–80%+ 毛利率支撑；未披露的计算成本可能显著压缩毛利
        - 要求按收入流披露毛利率；与 SaaS 基准对比
      - - 独立技术基准测试
        - 第三方或同行评审评估，在标准机器人任务上比较 Skild Brain、GR00T 与 pi0
        - 「1000x 训练数据优势」未获验证；竞争护城河是 $14B 平台溢价的核心依据
        - 委托独立基准测试或确认学术合作；索取所有内部基准数据
      - - SoftBank 承诺
        - 确认 SoftBank Vision Fund 2 对 Skild AI 的后续跟投资金能力和储备政策
        - SoftBank 领投全部 3 轮机构融资；Vision Fund 2 在 FY2025 录得亏损；融资集中风险实质存在
        - SoftBank 投资者关系；投资条款清单中的按比例跟投权披露
      - - IQT / 出口管制框架
        - 正式 ITAR/EAR 合规文件，以及对美国以外部署的任何合同限制
        - IQT 投资带来出口管制义务；限制可能压缩 Skild 可触达的国际 TAM
        - 公司法律顾问；索取合规备忘录和司法辖区限制
      - - Zebra / Symmetry ARR
        - 收购时 Symmetry Fulfillment ARR、客户数量和整合时间表
        - Zebra 收购改变收入基础和成本结构；指标未披露，无法更新倍数计算
        - 公司 M&A 披露；索取收购日 Symmetry 财务报表
    notes: 这些尽调问题是在当前 $14B+ 估值下投入资本前的门槛要求。前四项中任一项结果不合格，单独就足以否决以这一价格投资。
    claimRefs:
      - CV030
      - CV029
      - CV003
      - CV019
      - CV006
      - CV026
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks represent the minimum required for investment decision; additional operational, legal, and
        technical diligence would be conducted in a full process.
