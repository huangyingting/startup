      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >
              Skild AI 由 Deepak Pathak（CEO）和 Abhinav Gupta（总裁）共同创立。两人都是全球机器人与 AI 领域引用次数最高的研究者之一，合计 h 指数超过 150，学术引用超过
              90,000 次，体现出他们在该领域的特殊影响力。


              Deepak Pathak 在印度小城长大，拿到 IIT Kanpur 计算机科学金牌，随后在 UC Berkeley 师从 Alyosha Efros 和 Trevor Darrell 完成 AI 博士。他曾在
              Facebook AI Research（FAIR）做基础研究，之后成为 CMU Robotics Institute 的 Raj Reddy 副教授。Pathak
              开创了机器人好奇心驱动探索、自监督学习和快速运动适应等方向。他获得过 Sloan Research Fellowship、MIT TR35 Innovator Under 35，以及
              ICRA、CVPR、RSS、CoRL 等顶级会议的多个最佳论文奖。


              Abhinav Gupta 是 CMU Robotics Institute 终身教授，也是 FAIR
              Robotics（Facebook/Meta）的创始成员和研究负责人。他的研究聚焦自监督学习、视觉表示学习，以及机器人系统的大规模数据。他获得过 ONR Young Investigator Award、PAMI
              Young Researcher Award、Sloan Fellowship 和 Okawa Research Grant。Gupta 和 Pathak 在 2023 年初共同创立 Skild
              之前，已经讨论创业超过十年。


              更广泛的 Skild AI 团队来自 Meta、Tesla、Nvidia、Amazon、Google、CMU、Stanford 和 UC Berkeley。LinkedIn 显示，截至 2026 年初，平台上约有
              85 名员工；Tracxn 基于法律实体备案的数据则显示，截至 2024 年 12 月 31 日有 34 名员工——差异很可能来自 Series B 和 Series C 融资后的快速招聘。
