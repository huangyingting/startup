  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: >
      5×3 风险热力图，把 Skild AI 主要风险类别映射到影响和可能性两个维度。右上象限（高可能性、高影响）包含技术泛化失败和估值 / 收入脱节，二者都可能打破投资假设。SoftBank 投资人集中和 EU
      监管暴露属于高影响但中等可能性的近期触发因素。人员和运营风险很重要，但部分可缓释。
    claimRefs:
      - CR001
      - CR009
      - CR019
      - CR026
      - CR033
      - CR038
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 高影响（阻断性）
          values:
            - 涌现不安全行为事件（低–中可能性；部署量增加会抬高事件风险）
            - SoftBank 资本约束（中；Vision Fund 2 在 2025 财年亏损 $3.6B）
            - 生产中仿真到现实泛化失败（高；没有独立验证）
        - label: 重大影响
          values:
            - EU 监管不利裁决（短期低；规模化后风险兑现）
            - 硬件 OEM 自研 AI（中；Samsung/LG/Schneider 可能转向）
            - 估值 / 收入脱节——下调估值融资风险（高；467x 倍数要求极强执行）
        - label: 重大–轻微影响
          values:
            - 版权 / 训练数据诉讼（低；尚无案件；行业趋势不利）
            - Zebra 整合失败和人才流失（中；12 个月窗口）
            - 人才竞争——关键招聘失败率（高结构性风险；人才池小）
        - label: 中等影响
          values:
            - 算力供应中断（低；NVIDIA 战略投资人身份可缓释）
            - 学术到商业的领导力缺口（中；结构性；随收入规模扩大）
            - 开源基础模型定价压力（中；Alibaba 模型 2026 年 2 月发布）
        - label: 轻微影响
          values:
            - 美国州级 AI 职场法律碎片化（低直接影响；主要影响客户）
            - In-Q-Tel 军民两用出口管制（中；限制未知）
            - 后训练数据污染导致模型漂移（中；未披露治理）
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: |
      有向图展示主要风险类别如何级联为下游投资假设风险。技术泛化失败和竞争替代都会通过收入停滞传导到估值受损。监管失败有一条直接通往市场准入丧失的路径。SoftBank 集中风险直接汇入资本约束，并放大所有其他风险。
    claimRefs:
      - CR001
      - CR009
      - CR013
      - CR019
      - CR026
      - CR028
      - CR033
    data:
      nodes:
        - id: tech_risk
          label: 技术风险
          detail: 仿真到现实鸿沟；无独立基准；涌现行为；算力强度
        - id: competitive_risk
          label: 竞争风险
          detail: Physical Intelligence、Figure AI、科技巨头、开源模型（Alibaba 2026 年 2 月）
        - id: regulatory_risk
          label: 监管风险
          detail: EU AI Act、EU Machinery Reg 2023/1230（2027 年 1 月）、EU Product Liability Directive
        - id: people_risk
          label: 人员风险
          detail: 关键人（Pathak/Gupta）；学术到商业的缺口；人才竞争
        - id: revenue_risk
          label: 收入停滞
          detail: 2026 年无法从 $30M 扩到 $100M+；客户集中；采购周期长
        - id: valuation_risk
          label: 估值受损
          detail: 467x 倍数坍塌；Series D 下调估值融资；员工股权受损
        - id: capital_risk
          label: 资本约束
          detail: SoftBank 减少后续跟投；Series D 无法关闭；需要桥接融资
        - id: market_access_risk
          label: 市场准入丧失
          detail: EU 监管不合规；出口管制限制；安全事故暂停
      edges:
        - from: tech_risk
          to: revenue_risk
          label: 部署失败削弱客户信任和新合同赢单
        - from: competitive_risk
          to: revenue_risk
          label: 竞争者拿下关键客户；开源压低 ASP
        - from: people_risk
          to: tech_risk
          label: 联合创始人离职或人才流失拖慢模型开发
        - from: people_risk
          to: revenue_risk
          label: 商业执行缺口使收入无法越过 $50M ARR
        - from: regulatory_risk
          to: market_access_risk
          label: EU 不合规阻断主要增长区域的市场准入
        - from: revenue_risk
          to: valuation_risk
          label: 错失收入里程碑迫使估值下调融资
        - from: valuation_risk
          to: capital_risk
          label: 下调估值融资释放困境信号；SoftBank 减少后续跟投；Series D 条款转差
        - from: capital_risk
          to: tech_risk
          label: 算力和招聘预算削减损害模型开发节奏
