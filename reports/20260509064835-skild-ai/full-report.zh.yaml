      - number: '6.5'
        title: 扩张、集中度风险与战略展望
        blocks:
          - type: paragraph
            body: >
              Skild AI 的扩张潜力由三股复利力量推动：数据飞轮（每次新部署都会改进模型，让未来部署更好）、OEM 伙伴生态（ABB 和 Universal Robots 各自拥有全球数十万台可用 Skild Brain
              升级的装机机器人），以及 Zebra Symmetry 收购来的客户基础（立即进入生产仓库运营商群体）。


              公司宣称的扩张路线，是从半结构化工业环境（工厂、仓库）推进到结构化更弱的环境（医院、酒店），最终进入完全非结构化的消费者家庭。这提供了一条几十年的扩张弧线，但当前客户证据集中在最早、最结构化的一层。


              集中度风险是最重要的客户尽调缺口。收入约 $30M、客户数量未知，因此单一客户（Foxconn
              或某个未披露大型企业）可能贡献了大部分收入。战略投资者与客户重叠带来第二层集中度担忧：如果投资者客户（Amazon、Samsung、LG）主要通过探索性商业试点贡献收入，而不是通过公平市场交易的生产合同贡献收入，那么收入耐久性低于标题数字所暗示。Amazon
              正在开发自有 DeepFleet 机器人 AI（1M+ 机器人），这提出一个问题：Bezos Expeditions 的这笔投资究竟是为 Skild 成功下注，还是对冲其成功。


              OEM 合作通过成熟硬件销售渠道分销 Skild 技术，缓解了渠道风险。不过，Skild 没有公开证据显示其具备自助式数字销售动作、开发者市场或系统集成商认证计划——这些缺口限制了长尾客户获取速度。LG CNS
              合作是亚太部署渠道 / 伙伴模式的早期信号。
