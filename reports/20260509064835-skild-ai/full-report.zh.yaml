      - number: '7.4'
        title: 监管、安全与法律风险
        blocks:
          - type: paragraph
            body: >
              Skild 的监管敞口重大且跨多个司法辖区，EU 带来的近期合规负担最重。已经生效的 EU AI Act 建立了分层风险框架，预计会把共享人类工作空间中的 AI
              控制机器人归为高风险系统。高风险分类要求合格评定、人类监督协议、全面数据治理和审计轨迹。EU Machinery Regulation 2023/1230 将于 2027 年 1 月生效，对 AI
              具身机器人提出三项关键新要求：（1）自治阈值，要求对表现出「通过经验自我演化行为」的系统提供安全证明（这正是 Skild
              上下文学习所代表的能力）；（2）所有联网机器人的全生命周期网络安全义务；（3）人机共享工作空间的协作风险映射。


              2024 年 12 月生效的 EU Product Liability Directive 显著扩大了 Skild 的责任敞口。根据该指令，AI 软件系统即使没有硬件故障，也可能单独因缺陷承担责任。受伤方只需证明
              AI 系统造成损害；缺陷推定会把举证责任转移给制造商，要求其证明安全。关键在于，该指令把供应链责任延伸开来：数据标注方和算法训练方——也就是 Skild——可能对已部署机器人的缺陷承担共同责任。


              截至 2026 年 5 月，美国没有针对通用工作场所机器人的统一联邦监管框架。各州 AI 工作场所法律拼图（Colorado、Illinois、New York City）不直接监管机器人物理安全，但可能影响
              Skild 客户使用 AI 驱动招聘或劳动力管理功能。OSHA 现有机器防护法规适用于已部署机器人，但早于基础模型 AI；面向自主 AI 机器人的执法姿态仍未明确。


              Skild 获得 In-Q-Tel 投资，引入军民两用出口管制考量。In-Q-Tel 是 CIA 的风险投资机构；若技术具有情报或国防应用，其被投公司可能在 ITAR（International Traffic
              in Arms Regulations）和 EAR（Export Administration Regulations）下接受更严格审查。Skild 未公开披露这项投资带来的任何限制。


              用互联网级人类视频剪辑训练 Skild Brain，会产生类似其他基础模型公司（Stability AI、OpenAI）面临的潜在版权敞口。公司未公开披露授权条款或合理使用法律分析。
