  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价
        blocks:
          - type: paragraph
            body: >
              Skild AI 的主要收入机制，是通过云端 API 和 SDK 向企业客户授权 Skild Brain 基础模型。客户——机器人
              OEM、系统集成商和大型企业运营方——付费获得机器人智能层，而不是自研专有控制系统。这把 Skild 放在机器人技术栈中的横向软件平台位置，类似硬件厂商接入的操作系统。


              公司公开描述的收入来源包括：（1）面向机器人硬件厂商的基础模型授权；（2）面向安防巡检、仓库编排和制造的垂直软件模块；（3）用于推理和训练的云基础设施服务；（4）收购 Zebra 之后，端到端仓库自动化，把
              Skild Brain 与 Zebra 的 Symmetry Fulfillment 编排平台结合起来。Skild 官网描述了一个 “Mobile Manipulation
              Platform”，把抓取、交接、导航等技能抽象为 API 调用，显示出一种可编程接口模式，企业开发者可在其上构建应用。


              精确定价没有公开披露。基于 Sacra 分析和可比企业 AI 平台基准，定价很可能采用多年期企业订阅，按单台机器人或机队层级授权，并可能叠加基于用量的云计算费用。2025 年企业机器人 AI
              平台标价通常为每台机器人每年 $10,000–$100,000+，取决于能力和批量折扣。


              公司披露 2025 年收入约 $30M——“短短几个月”内从零增长而来。这个数字由公司自述，尚未被独立审计或第三方确认。$30M 意味着少数大型企业合同（几十到数百台机器人、高
              ACV），或更多小型交易；两种情况公司都没有公开拆分。Series C 和 Zebra 收购后，管理层称公司正在“指数级增长”，释放出 2026 年收入大幅加速的预期。
