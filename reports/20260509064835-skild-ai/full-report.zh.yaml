      - number: '4.3'
        title: 资本充足性与融资结构
        blocks:
          - type: paragraph
            body: >
              以公司年龄和阶段看，Skild AI 的融资速度极不寻常。融资时间线（见第 1 章 / 公司概况，并在此通过 claimRefs 引用）从 2023 年种子轮延伸到 2026 年 1 月 $1.4B Series
              C，共四轮。CEO Deepak Pathak 公开表示，公司累计融资超过 $2B；Crunchbase 跟踪到的数字是四轮合计
              $1.83B。差异来自未披露的种子轮规模，以及尚未记录的任何分批交割或资本调用结构。


              账上现金没有公开披露。假设 $1.4B Series C 已在 2026 年 1 月全额完成并进入公司资产负债表，募资总额提供了充足现金跑道。按每月 $10–50M 的估计烧钱速度（符合这一规模和抱负的 AI
              研究与企业部署公司），仅 Series C 就意味着 28–140 个月的总现金跑道。更保守地按每月 $30–50M 烧钱估算，用于模型训练、员工（约 85+ 人）、办公室扩张和 Zebra 整合成本，则
              2026 年 1 月交割后的现金跑道为 28–47 个月，可支撑公司到 2028–2030 年而无需追加资本。


              公司披露的募资用途是：继续扩大模型训练，并推动技术的未来部署。没有披露销售 / 市场、R&D、G&A 或基础设施资本开支的具体分配。也没有公开披露债务融资、信贷额度或项目融资义务。Zebra
              收购采用现金加股权结构（Zebra 获得 Skild AI 股份），意味着并非所有 Series C 资金都在收购交割时以现金流出。


              投资人基础集中：SoftBank 领投或参与了种子轮之后的每一轮（A、B、C），估计在这些轮次中投入 $1B+。这带来财务集中风险——SoftBank 持续支持对后续融资很重要，SoftBank
              投资姿态的任何变化都可能削弱 Skild 以有利估值进入资本市场的能力。NVIDIA、Samsung、LG 和 Zebra 等战略投资人也持有股权，带来一致性，也带来潜在治理复杂度。
