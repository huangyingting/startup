  topStrengths:
    - >
      Unique omni-bodied architecture trained on 100K+ morphologies has no direct public equivalent; the CMU/FAIR
      founder team has the deepest academic-to-commercial IP transfer in the physical AI sector.
    - >
      $1.83B raised from strategically aligned investors (NVIDIA, Samsung, LG, SoftBank) who are also distribution
      partners, collapsing the typical hardware go-to-market barrier for robotics AI.
    - >
      Zebra Symmetry acquisition adds enterprise fleet orchestration and an inherited customer base, converting a pure
      API play into a managed-service offer with higher switching costs.
  topRisks:
    - >
      NVIDIA GR00T N1 open model and Physical Intelligence pi0 directly compete on the core use-case with zero licensing
      cost, creating structural commoditization pressure on pricing and margins.
    - >
      $14B valuation at ~467x trailing ARR is the highest disclosed revenue multiple in the sector; multiple compression
      toward software-first comps ($3-7B range) implies negative entry-price returns.
    - >
      IQT (In-Q-Tel) investor creates dual-use/export control exposure; no Form D or audited financials publicly
      available; Zebra Symmetry IP chain and integration depth unverified.
  unresolvedGaps:
    - >
      Audited revenue, gross margin, burn rate, and cash balance are not public; the $30M ARR figure is third-party
      inferred and could not be verified against company-disclosed data.
    - >
      No named enterprise customers are publicly confirmed; claimed deployment verticals lack reference customers,
      making commercial traction verification impossible without primary access.
    - >
      IQT dual-use restrictions, export control obligations, and any government data-sharing requirements tied to the
      IQT investment are undisclosed.
