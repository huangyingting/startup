callouts:
  - title: Multi-homing Risk is Real
    body: >-
      Enterprise developers increasingly deploy multiple TTS vendors in the same product stack—ElevenLabs for quality
      output and Cartesia for low-latency agent voice. This multi-homing pattern limits ElevenLabs' ability to capture
      100% of enterprise TTS spend and means switching costs are lower than in single-vendor stacks.
    calloutType: risk
    claimRefs:
      - CP018
      - CP025
  - title: BigTech Distribution Gap
    body: >-
      Google, Amazon, and Microsoft each have the ability to bundle TTS at near-zero marginal cost for their existing
      cloud customers. While current quality parity is not there, commoditization of basic TTS is a plausible 2026-2028
      scenario. ElevenLabs' differentiation must pivot toward quality-sensitive and volume-sensitive segments where
      quality commands a premium.
    calloutType: risk
    claimRefs:
      - CP013
      - CP014
      - CP015
      - CP033
