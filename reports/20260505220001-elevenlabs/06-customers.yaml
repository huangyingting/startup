callouts:
  - title: Enterprise Logo Quality is Exceptional
    body: >-
      Deutsche Telekom, Washington Post, TIME, Salesforce, and Revolut are among the highest-signal enterprise customer
      logos available for an AI infrastructure company at this ARR level. These relationships validate production-grade
      deployment and are difficult for competitors to unseat.
    calloutType: strength
    claimRefs:
      - CU003
      - CU005
  - title: Retention Data Gap is a Critical Diligence Blocker
    body: >-
      The absence of disclosed NRR, GRR, and churn data prevents objective assessment of revenue quality. Investors must
      demand cohort-level retention data before commitment. The strong logo list and engagement proxies are encouraging
      but insufficient substitutes.
    calloutType: risk
    claimRefs:
      - CU018
      - CU012
