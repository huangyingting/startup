callouts:
  - title: Data Flywheel is ElevenLabs' Most Durable Moat
    body: >-
      Over 1,000 years of user-generated audio provides continuous model quality improvement that competitors cannot
      replicate without similar scale. This data advantage compounds over time, making quality leadership increasingly
      difficult to displace.
    calloutType: strength
    claimRefs:
      - CE028
      - CE007
  - title: Training Data IP Risk Requires Immediate Board Attention
    body: >-
      The pending voice actor lawsuits over Adam and Bella TTS voices allege unauthorized training data use. A court
      ruling against ElevenLabs could require model retraining, restrict product availability, and set precedent for
      broader platform liability.
    calloutType: risk
    claimRefs:
      - CE018
      - CE011
