summary:
  headline: >-
    ElevenLabs is the category-defining AI voice infrastructure company: 175% ARR growth, elite investor syndicate, and
    a defensible quality moat — but Series D entry at 33× ARR compresses new investor returns and requires the platform
    thesis to beat BigTech bundling.
