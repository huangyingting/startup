  topStrengths:
    - >-
      175% YoY ARR growth at $330M base — Rule of 40 score estimated at 175+, placing it in the top 1% of global SaaS
      companies.
    - >-
      Durable quality moat: Flash model sub-75ms latency, 3-second voice cloning, 32-language AI Dubbing, and a 3,000+
      voice Voice Library with creator network effects.
    - >-
      Elite investor syndicate (Sequoia, a16z, Thrive, T. Rowe Price, Khosla, Index, Redpoint) provides implicit price
      validation and governance support for an IPO path.
    - >-
      Exceptional capital efficiency: $825K ARR per employee at 400 headcount; asset-light API-first model with 65-75%
      gross margins.
    - >-
      Enterprise momentum: enterprise growing >200% YoY, Deutsche Telekom, Revolut, Square, TIME, Washington Post as
      named customers, and a diversified enterprise vertical strategy.
  topRisks:
    - >-
      BigTech bundling risk: OpenAI GPT-4o voice, Google TTS, and Microsoft Azure TTS offer equivalent quality at 50-70%
      lower pricing; free-tier bundling within 18-24 months is the thesis-break scenario.
    - >-
      Regulatory exposure: FCC TCPA DA-24-146, EU AI Act Article 52, GDPR biometric voice print classification, and
      pending FTC rulemaking create multi-jurisdiction compliance burdens that could constrain the enterprise telephony
      TAM.
    - >-
      Deepfake misuse: documented use of ElevenLabs technology in political disinformation (Biden robocall, 2024) and
      phone scams creates reputational and regulatory liability that content safety tools (watermarking, detection)
      cannot fully eliminate.
    - >-
      Key-person dependency: CEO Mati Staniszewski and CTO Piotr Dąbkowski have no disclosed succession plan; both are
      the technical and commercial anchors of the business.
    - >-
      Compressed return profile for new investors: base case exit of $7-11B barely covers the $11B Series D entry price;
      late investors are underwriting the bull case.
  unresolvedGaps:
    - >-
      Audited GAAP financials not available; all ARR, margin, and NRR figures are analyst estimates or company
      disclosures without independent audit.
    - >-
      Customer concentration: top 10 enterprise accounts as share of ARR is not publicly disclosed; estimated 20-30%
      concentration is a material undisclosed risk.
    - >-
      Series D full term sheet: preference stack, anti-dilution, and governance provisions have not been disclosed;
      return modelling assumes standard 1× non-participating preference.
    - >-
      Independent security and GDPR compliance audit: no SOC 2 Type II or GDPR audit result has been published;
      biometric voice data handling is unverified externally.
