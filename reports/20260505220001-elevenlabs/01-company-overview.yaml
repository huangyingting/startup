callouts:
  - calloutType: strength
    title: Exceptional Revenue Velocity
    body: >
      ElevenLabs reached $100M ARR in ~20 months from public launch and $330M ARR by end-2025, making it one of the
      fastest-growing SaaS companies on record. The 175% YoY growth at $330M scale is rare and suggests product-market
      fit across both self-serve and enterprise segments.
    claimRefs:
      - CO016
      - CO017
  - calloutType: risk
    title: Deepfake Misuse and Regulatory Exposure
    body: >
      ElevenLabs' voice cloning technology was used in the January 2024 Biden deepfake robocall incident, triggering FCC
      regulatory action and sustained public scrutiny. Consumer Reports and NBC News found the company's safeguards
      insufficient. Voice actor copyright lawsuits add further legal risk. Regulatory tightening—particularly EU AI Act
      voice provisions and US state biometric laws—could impose compliance costs or restrict business model elements.
    claimRefs:
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
  - calloutType: risk
    title: Key-Person Concentration
    body: >
      Both CEO Staniszewski and CTO Dąbkowski are critical single points of failure. No CFO, COO, CPO, or publicly
      disclosed executive bench exists. For a company at $330M ARR and $11B valuation, leadership depth is materially
      below peers.
    claimRefs:
      - CO005
      - CO006
      - CO008
  - calloutType: insight
    title: Strategic Investor Network as Distribution Moat
    body: >
      ElevenLabs' investor base includes Deutsche Telekom, NTT DOCOMO, HubSpot Ventures, RingCentral Ventures, and
      Salesforce Ventures. These strategic partners simultaneously represent distribution channels into enterprise and
      telecom markets globally, converting capital-raising into go-to-market partnerships.
    claimRefs:
      - CO014
      - CO015
