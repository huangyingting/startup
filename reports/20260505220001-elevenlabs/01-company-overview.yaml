chapter:
  number: 1
  title: Company Overview
  summary: >
    ElevenLabs is a New York-based AI audio platform founded in 2022 by Polish entrepreneurs Mati Staniszewski and Piotr
    Dabkowski. The company builds text-to-speech, voice cloning, AI dubbing, and conversational AI agent infrastructure.
    It reached a $11B valuation in February 2026 after raising $500M Series D led by Sequoia Capital. ARR hit $330M at
    end-2025 on 175% YoY growth. The company is privately held, pre-IPO, and faces material reputational risk from
    deepfake/misuse controversies.
sections:
  - id: s1
    title: Identity and Business Model
    body: >
      ElevenLabs, Inc. is a privately held AI-audio-infrastructure company headquartered in New York, NY, with
      additional hubs in London and Warsaw. Founded in January 2022 by Mati Staniszewski (CEO) and Piotr Dąbkowski
      (CTO), the company launched its public platform in January 2023. ElevenLabs builds foundational AI models for
      speech synthesis, voice cloning, real-time conversational AI agents, and audio content localization. Its business
      model combines a freemium self-serve layer (starting at $22/month for creators) with enterprise SaaS contracts
      that can reach $2M+ annually. The company generates revenue from API usage, per-robot/per-seat subscriptions, and
      platform licensing, with approximately 50/50 split between self-serve and enterprise revenue as of late 2025.
      ElevenLabs describes its mission as making "speech the new standard for digital interaction" and building the most
      comprehensive audio AI platform in the world. [CO001][CO002][CO003][CO004]
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
    figureRefs:
      - FO001
      - FO002
  - id: s2
    title: Founders and Leadership
    body: >
      The company was co-founded by two childhood friends from Poland. Mati Staniszewski, CEO, previously worked as a
      deployment strategist at Palantir Technologies; Piotr Dąbkowski, CTO, was a machine learning engineer at Google.
      Both were motivated by the poor quality of voice dubbing in American films distributed to Polish audiences.
      Dąbkowski was named a TIME Magazine AI Top 100 Innovator. The founding team built the company as a tight
      two-person technical team before scaling. By January 2025, headcount had grown from 30 to 120 employees, with
      offices in London, New York, and Warsaw. By late 2025, headcount reached approximately 330. The company has not
      disclosed a CFO or COO publicly; both founders occupy all primary executive roles. Sequoia partner Andrew Reed
      joined the board in conjunction with the February 2026 Series D. Key-person dependency on the two founding
      co-CEOs/CTOs is a material risk given the early-stage leadership structure. [CO005][CO006][CO007][CO008][CO009]
    claimRefs:
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
    tableRefs:
      - TO002
    figureRefs:
      - FO003
  - id: s3
    title: Funding History and Investors
    body: >
      ElevenLabs has raised approximately $781M across five rounds since 2022. The seed round of $2M in 2022 established
      the company; a Series A of $19M in January 2023 funded the public platform launch. The $80M Series B (January
      2024) at a $1.1B valuation marked its unicorn status. The $180M Series C (January 2025) led by a16z and ICONIQ
      Growth tripled the valuation to $3.3B. The $500M Series D (February 2026) led by Sequoia Capital pushed the
      valuation to $11B—a 10× increase in two years. Strategic investors include Deutsche Telekom, LG Technology
      Ventures, HubSpot Ventures, NTT DOCOMO Ventures, RingCentral Ventures, and Salesforce Ventures. Other financial
      investors include Lightspeed Venture Partners, NEA, Bond Capital, Andreessen Horowitz, Coatue, and SV Angel. The
      company reported approximately $550M in cash on hand after the Series D, providing extended runway. No debt
      facilities have been disclosed. Secondary transactions or insider tender offers have not been publicly confirmed.
      [CO010][CO011][CO012][CO013][CO014][CO015]
    claimRefs:
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
    tableRefs:
      - TO003
  - id: s4
    title: Cover Metrics and Traction
    body: >
      ElevenLabs reached $330M ARR at end-2025, growing approximately 175% year-over-year from $120M ARR at end-2024.
      The company achieved $100M ARR in roughly 20 months from platform launch in January 2023. Enterprise adoption has
      been rapid: over 60% of Fortune 500 companies had employees using ElevenLabs tools as of early 2025. Named
      customers include TIME, The Washington Post, The New Yorker, HarperCollins, ESPN, Deutsche Telekom, Revolut,
      Square, Salesforce, NVIDIA, Perplexity, Chess.com, Synthesized, Paradox Interactive, and the Ukrainian government.
      Total audio generated by users exceeds 1,000 years of content. The Voice Library has over 5,000 shared voices and
      has disbursed $2M+ in creator payouts. Gross margin and net revenue retention figures are not publicly disclosed
      but the company has described itself as "highly capital-efficient" at the Series D stage.
      [CO016][CO017][CO018][CO019][CO020][CO021]
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
    tableRefs:
      - TO001
  - id: s5
    title: Key Milestones and Adverse Events
    body: >
      ElevenLabs' milestones include the January 2023 public platform launch, the January 2024 Series B unicorn
      milestone, a fake Biden robocall incident in January 2024 that used ElevenLabs-generated voice to tell voters not
      to vote in the New Hampshire Democratic primary, resulting in FCC regulatory action banning AI-generated robocalls
      and significant reputational scrutiny. In 2024 the company added conversational AI agents, AI dubbing in 32
      languages, sound effects models, ElevenReader (mobile app), and Voice Design. A March 2025 Consumer Reports study
      found AI voice cloning tools including ElevenLabs lacked robust safeguards, citing checkbox-only consent
      mechanisms. Voice actors and authors filed lawsuits alleging unauthorized use of their voices as training data.
      The company has implemented watermarking, forensic backtracking partnerships, and an Impact Program for
      accessibility uses, but critics call self-regulation insufficient. ElevenLabs opened a Warsaw R&D center in 2025
      and expanded into India, LATAM, and APAC. The February 2026 Series D positioned the company for a potential IPO
      within 2-3 years per management commentary. [CO022][CO023][CO024][CO025][CO026][CO027][CO028][CO029][CO030]
    claimRefs:
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
    tableRefs:
      - TO004
