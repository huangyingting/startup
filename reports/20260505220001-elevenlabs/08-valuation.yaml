  number: 8
  title: Valuation
localEvidence:
  researchQuestions:
    - id: QV001
      question: >-
        Is ElevenLabs' $11B valuation (Feb 2026) justified by its $330M ARR and 175% YoY growth on a comparable-company
        revenue multiple basis?
      type: quantification
      targets:
        - contentRequirements/2
      status: answered
    - id: QV002
      question: >-
        What revenue multiples are private AI companies with similar growth profiles (>150% YoY) trading at in 2025-2026
        private rounds?
      type: comparison
      targets:
        - contentRequirements/4
      status: answered
    - id: QV003
      question: What are the most relevant public company comparables for ElevenLabs on EV/ARR and growth-adjusted multiples?
      type: comparison
      targets:
        - contentRequirements/4
      status: answered
    - id: QV004
      question: >-
        What is the investment thesis for ElevenLabs at its current valuation, and what assumptions must hold for the
        thesis to succeed?
      type: mechanism
      targets:
        - contentRequirements/0
      status: answered
    - id: QV005
      question: 'What is the investment anti-thesis: under what scenarios does ElevenLabs fail to return capital at $11B entry?'
      type: adverse
      targets:
        - contentRequirements/0
      status: answered
    - id: QV006
      question: >-
        What is the bull case ARR trajectory and valuation exit for ElevenLabs if voice AI market grows at top-quartile
        rates?
      type: quantification
      targets:
        - contentRequirements/3
      status: answered
    - id: QV007
      question: >-
        What is the base case ARR trajectory and likely valuation range in a 2028-2029 IPO or strategic acquisition
        scenario?
      type: quantification
      targets:
        - contentRequirements/3
      status: answered
    - id: QV008
      question: >-
        What is the bear case for ElevenLabs if BigTech commoditizes TTS pricing and regulatory restrictions constrain
        US telephony use cases?
      type: adverse
      targets:
        - contentRequirements/3
      status: answered
    - id: QV009
      question: >-
        What is the current preference stack and liquidation overhang on ElevenLabs' $781M total raised, and how does it
        affect common equity returns?
      type: quantification
      targets:
        - contentRequirements/2
      status: answered
    - id: QV010
      question: >-
        What comparable M&A transactions for AI voice or speech technology companies provide benchmarks for ElevenLabs'
        exit valuation?
      type: enumeration
      targets:
        - contentRequirements/4
      status: answered
    - id: QV011
      question: What gross margin trajectory is needed for ElevenLabs to achieve public-market SaaS valuation multiples at IPO?
      type: quantification
      targets:
        - contentRequirements/3
      status: answered
    - id: QV012
      question: How does ElevenLabs' ARR per employee ($825K) compare to benchmark SaaS companies at comparable scale?
      type: comparison
      targets:
        - contentRequirements/4
      status: answered
    - id: QV013
      question: What is ElevenLabs' likely Series E valuation and timeline based on ARR growth and fundraising cadence?
      type: quantification
      targets:
        - contentRequirements/2
      status: answered
    - id: QV014
      question: >-
        What growth-adjusted EV/ARR multiple (the Rule of 40 premium) does ElevenLabs merit compared to top-quartile
        SaaS peers?
      type: quantification
      targets:
        - contentRequirements/2
        - contentRequirements/4
      status: answered
    - id: QV015
      question: >-
        What is the exit readiness of ElevenLabs: how close is it to IPO-ready financials (audited accounts, CFO,
        go-to-market maturity)?
      type: verification
      targets:
        - contentRequirements/5
      status: answered
    - id: QV016
      question: What additional diligence should a VC investor demand before committing capital at the $11B valuation?
      type: mechanism
      targets:
        - contentRequirements/5
      status: answered
    - id: QV017
      question: What is the Rule of 40 score for ElevenLabs given its growth rate and estimated free cash flow margin?
      type: quantification
      targets:
        - contentRequirements/2
      status: answered
    - id: QV018
      question: How does the Sequoia-led Series D term sheet compare to market terms for AI companies in early 2026?
      type: comparison
      targets:
        - contentRequirements/2
      status: answered
    - id: QV019
      question: >-
        What is ElevenLabs' total addressable market ceiling and what share of it is needed to justify the current
        multiple on a 5-year discounted basis?
      type: quantification
      targets:
        - contentRequirements/0
      status: answered
    - id: QV020
      question: >-
        How does ElevenLabs' net revenue retention compare to the SaaS top quartile and what does this imply for
        long-run ARR compounding?
      type: comparison
      targets:
        - contentRequirements/0
      status: answered
    - id: QV021
      question: >-
        What is the probability-weighted expected return of a $11B entry for a new investor at Series D assuming base
        case and bear case scenarios?
      type: quantification
      targets:
        - contentRequirements/1
      status: answered
    - id: QV022
      question: What milestone or ARR threshold would trigger ElevenLabs' management to pursue an IPO versus a strategic exit?
      type: mechanism
      targets:
        - contentRequirements/5
      status: answered
    - id: QV023
      question: >-
        Does Microsoft's 2022 acquisition of Nuance Communications at $19.7B provide a relevant M&A floor for
        ElevenLabs' exit valuation?
      type: comparison
      targets:
        - contentRequirements/4
      status: answered
    - id: QV024
      question: >-
        What ARR multiple did recent private AI infrastructure rounds (Anthropic, Mistral, Perplexity) achieve and how
        does ElevenLabs' 33× compare?
      type: comparison
      targets:
        - contentRequirements/2
        - contentRequirements/4
      status: answered
    - id: QV025
      question: >-
        What is ElevenLabs' total preference overhang and does it create a meaningful gap between preferred liquidation
        value and common equity upside?
      type: quantification
      targets:
        - contentRequirements/2
      status: answered
    - id: QV026
      question: >-
        What is the realistic exit timeline for early ElevenLabs investors (2022 seed investors) at the current $11B
        valuation?
      type: verification
      targets:
        - contentRequirements/5
      status: answered
    - id: QV027
      question: >-
        How does SoundHound AI's public market performance post-IPO serve as a cautionary or confirmatory data point for
        ElevenLabs' valuation?
      type: comparison
      targets:
        - contentRequirements/4
      status: answered
    - id: QV028
      question: >-
        What is the valuation step-up history across ElevenLabs' funding rounds and what implied CAGR does it represent
        for early investors?
      type: quantification
      targets:
        - contentRequirements/2
      status: answered
    - id: QV029
      question: >-
        What governance and audit infrastructure would need to be in place before ElevenLabs could file an S-1 for a US
        IPO?
      type: verification
      targets:
        - contentRequirements/5
      status: answered
    - id: QV030
      question: >-
        What is the downside scenario if ElevenLabs stays private beyond 2028 and investor distributions are delayed by
        2-3 years?
      type: adverse
      targets:
        - contentRequirements/3
        - contentRequirements/5
      status: answered
