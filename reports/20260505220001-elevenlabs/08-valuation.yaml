callouts:
  - title: 'Investment Recommendation: Conditional Buy for Long-Horizon Investors'
    body: >-
      ElevenLabs at $11B is a compelling but compressed-return investment. The growth rate (175% YoY at $330M ARR), Rule
      of 40 score (estimated 170-200+), and elite investor syndicate justify the valuation. However, new Series D
      investors should expect modest base-case returns (0.7-1.0× capital) and reserve conviction for the bull case
      (1.5-2.2×). The investment is most defensible for investors with a 5-7 year horizon and access to follow-on
      pro-rata rights in a Series E.
    calloutType: recommendation
    claimRefs:
      - CV034
      - CV017
      - CV030
      - CV039
  - title: 'Risk: Compressed Return Profile for Late Investors'
    body: >-
      The base case exit valuation of $7-11B barely covers the $11B Series D entry price. Late investors (Series D
      entry) are underwriting a bet on the bull case, not the base case. This is only appropriate for investors with
      high risk tolerance, long time horizons, and conviction in the voice AI platform thesis surviving BigTech bundling
      and regulatory headwinds.
    calloutType: risk
    claimRefs:
      - CV011
      - CV012
      - CV019
  - title: 'Strength: World-Class Capital Efficiency and Unit Economics'
    body: >-
      ElevenLabs' $825K ARR per employee at 400 headcount, combined with an estimated 175+ Rule of 40 score, places it
      in the top 1% of SaaS capital efficiency globally. These metrics justify a premium multiple and suggest the
      business model is structurally sound even if growth decelerates. The asset-light, API-first model with 65-75%
      gross margins supports a path to public-market-grade economics with further scale.
    calloutType: strength
    claimRefs:
      - CV008
      - CV009
      - CV029
