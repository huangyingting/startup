        - Platform thesis depends on strong expansion; estimated 130-150% NRR must be confirmed segment-by-segment
        - Adjust probability weight toward base case; lower conviction
      - - 'Customer concentration schedule: top 10 accounts as % of ARR'
        - High
        - Estimated 20-30% ARR concentration in anchor customers is a material undisclosed financial risk
        - Assume high concentration; haircut base-case valuation by 10-15%
      - - Independent SOC 2 Type II and GDPR audit results
        - High
        - Biometric voice data requires validated security and compliance posture before EU enterprise rollout
        - Flag as blocker for EU enterprise thesis; raise compliance timeline concern
      - - GPU/CPU infrastructure cost breakdown by product line
        - High
        - Gross margin by product determines which lines are value-accretive and which compress enterprise economics
        - Cannot underwrite margin improvement path to 75%+ without this
      - - Series D full term sheet (preference, anti-dilution, governance rights)
        - Medium
        - Liquidation preferences and governance provisions affect return distribution in exit scenarios
        - Assume 1× non-participating preference; model conservative equity waterfall
      - - Regulatory engagement log with FCC, FTC, EU AI Office
        - Medium
        - Proactive regulatory engagement reduces binary risk of enforcement action
        - Raise probability of adverse regulatory scenario from 15% to 25%
    claimRefs:
      - CV027
      - CV040
      - CV035
