  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and ARR Trajectory
        blocks:
          - type: paragraph
            body: >
              ElevenLabs has established one of the fastest ARR growth curves in enterprise software history. The
              company reached $330M ARR at end-2025 from a standing start of effectively zero in January 2023, when its
              platform launched publicly. Key milestones: $100M ARR in 20 months (January 2025), $200M ARR in September
              2025, and $330M ARR by December 2025. The most recent segment—$100M to $200M—took 10 months; the next
              $130M came in just five months. This acceleration is driven by enterprise adoption: enterprise revenue
              grew over 200% year-over-year in 2025, with the enterprise/self-serve mix approaching 50/50 from a heavily
              self-serve starting point. The largest enterprise contracts reached $2M annually.

              The company operates four revenue streams: (1) self-serve subscriptions from $5/month (Starter) to
              $1,320+/year (Business), serving millions of developer and creator users; (2) enterprise SaaS contracts
              with custom pricing, usage-based tiers, and annual commitments; (3) API usage fees charged per character
              or per minute of audio generated; and (4) marketplace commissions from the Voice Library, where creators
              license voices to enterprise customers. The marketplace has paid out over $2M to voice creators as of
              early 2026, reflecting early but growing traction. SaaStr cited ElevenLabs as exemplifying the
              "PLG-to-enterprise" motion, where a viral self-serve product converts into high-value enterprise
              relationships. [CI001][CI002][CI003][CI004][CI005][CI006][CI023]
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI023
      - number: '4.2'
        title: Unit Economics and Capital Efficiency
        blocks:
          - type: paragraph
            body: >
              ElevenLabs' unit economics are among the strongest reported by a late-stage AI venture. At $330M ARR with
              approximately 400 employees, the company generates roughly $825,000 in ARR per employee—a top-decile
              metric that compares favourably to the best-in-class public SaaS companies (Snowflake, Datadog) and well
              above typical venture-backed peers at the same stage. The company reportedly achieved operational
              breakeven at approximately $200M ARR in mid-2025, suggesting that incremental ARR is substantially
              accretive to operating income at current headcount. Gross margins are not publicly disclosed; analyst
              estimates range from 70% to 80%, consistent with model-weight-as-API-product economics where compute costs
              decline as model efficiency improves.

              Capital efficiency is similarly strong. ElevenLabs raised approximately $781M total through February 2026
              against $330M ARR—a capital-raised-to-ARR ratio of approximately 2.4×, compared to 10×+ for Anthropic and
              15×+ for OpenAI at equivalent revenue scale. After the $500M Series D, the company reported approximately
              $550M in cash, providing several years of operating runway even at growth-mode burn. The company has no
              disclosed debt obligations. ElevenLabs described its capital posture as intentionally building a
              sustainable business while pursuing product-led expansion rather than revenue-at-all-costs.
              [CI007][CI008][CI009][CI010][CI012][CI016]
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI012
              - CI016
      - number: '4.3'
        title: Financial Gaps and Diligence Assessment
        blocks:
          - type: paragraph
            body: >
              Despite the strong headline metrics, ElevenLabs' public financial disclosure has material gaps that a VC
              investor must resolve before commitment. Gross margin has not been disclosed publicly. Net revenue
              retention and gross revenue retention are absent from any investor materials in the public domain.
              Customer acquisition cost and payback period cannot be calculated without headcount-by-function data, and
              burn rate is not confirmed—the profitability claim is reported but not independently audited. Customer
              concentration is also unknown: if a handful of large enterprise clients account for more than 20% of ARR,
              the revenue quality assessment changes substantially.

              ElevenLabs' Voice Actor lawsuit (the Adam and Bella TTS voice litigation) represents a contingent
              liability that has not been quantified publicly. If the lawsuit results in damages or requires the company
              to retrain or remove those voice models, the cost and revenue impact would be material to the financials.
              Revenue recognition policy is inferred rather than verified—the mix of subscription and consumption
              revenue has different deferred revenue and cash-to-ARR timing characteristics. On balance, ElevenLabs
              presents exceptional growth and efficiency metrics, but the private financials required for
              diligence—margins, NRR, CAC, churn, burn—are not yet available through public sources and must be demanded
              as conditions of any investment process. [CI014][CI015][CI017][CI018][CI019][CI021][CI024][CI025]
