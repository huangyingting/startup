  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              ElevenLabs operates at the intersection of AI, biometric data, and consumer communications — three of the
              most actively regulated technology domains globally. The FCC's January 2024 ruling (DA-24-146) declaring
              AI-generated voices in robocalls illegal under the TCPA is the most immediate regulatory risk, directly
              affecting ElevenLabs' enterprise telephony customers. Any customer deploying ElevenLabs' Conversational AI
              platform for outbound automated calls without prior written consumer consent is now in violation of
              federal law, creating compliance liability that flows through to ElevenLabs if customers rely on its API
              as an unguarded tool. [CR001][CR002]


              In Europe, the EU AI Act and GDPR create a dual compliance burden. The EU AI Act's Article 52 requires
              AI-generated voice outputs to be clearly labelled; any ElevenLabs customer distributing synthetic audio in
              the EU without such disclosure risks fines under the Act. Simultaneously, the European Data Protection
              Board has indicated that voice prints generated during voice cloning constitute biometric data under GDPR
              Article 9, requiring explicit informed consent. This significantly increases the overhead for ElevenLabs'
              European enterprise customers and could slow EU market adoption. [CR002][CR003]


              On the litigation front, ElevenLabs has not faced a major filed lawsuit as of early 2026, but the sector
              has entered a period of active legal action from voice actors and rights holders. The removal of
              ElevenLabs' 'Adam' default voice in 2023 following misuse to recreate non-consensual celebrity content
              demonstrated the company's reactive stance, raising questions about whether proactive IP clearance for
              default voice training data has been sufficient. SAG-AFTRA's ongoing AI voice negotiations with
              entertainment studios, and EFF's analysis highlighting fragmented right-of-publicity laws across 35 US
              states, confirm that the legal landscape is unstable. [CR004][CR014][CR023][CR025]


              The FTC's Voice Cloning Challenge (January 2024) signals regulatory intent to impose safety standards on
              AI voice APIs. US Congressional hearings in 2024-2025 following the Biden deepfake robocall incident have
              increased the probability of federal legislation within ElevenLabs' investment horizon. ElevenLabs' CEO
              has committed publicly to regulatory engagement and a compliance roadmap, but the adequacy of its
              trust-and-safety measures has not been independently audited. [CR005][CR015][CR021][CR028][CR039][CR040]
            claimRefs: []
      - number: '7.2'
        title: Operational, Partner, and Competitive Risks
        blocks:
          - type: paragraph
            body: >
              ElevenLabs' operational risk profile is dominated by its cloud infrastructure dependency, deepfake misuse
              exposure, and accelerating BigTech competition. The company operates entirely on cloud infrastructure,
              primarily AWS, making it vulnerable to GPU capacity constraints, pricing changes, and unplanned outages.
              Its Conversational AI product requires real-time voice synthesis with sub-75ms latency, meaning any
              sustained AWS infrastructure disruption could breach enterprise SLAs and trigger churn among the most
              valuable customer segment. The NVIDIA GPU supply chain dependency adds another layer of risk: export
              restrictions on advanced GPUs or supply shortfalls could increase ElevenLabs' inference costs or limit
              capacity expansion. [CR006][CR032][CR037]


              Deepfake misuse remains the most structurally difficult operational risk. Despite deploying content safety
              tools — including abuse detection, usage monitoring, and AI SynthID-compatible watermarking — MIT
              Technology Review's 2024 research found that AI-generated voice detection tools achieve less than 70%
              accuracy in blind tests, suggesting ElevenLabs' watermarking programme may be insufficient as a robust
              compliance or reputational defence. The documented misuse of ElevenLabs' technology in the 2024 Biden
              robocall deepfake and various phone scam campaigns demonstrates that even policy-compliant operations
              create reputational liability. [CR009][CR015][CR016][CR022]


              On the competitive side, OpenAI's launch of GPT-4o with native voice capabilities in May 2024 represents
              the single largest competitive threat to ElevenLabs' market position. OpenAI's TTS API was priced at
              $15/million characters in 2025 — roughly 50% cheaper than ElevenLabs' base pricing — with Microsoft and
              Google offering even lower rates. Open-source TTS models including Coqui XTTS and StyleTTS2 have reached
              near-commercial-grade quality, enabling self-hosted alternatives for price-sensitive or
              on-premise-requiring customers. MOS score convergence across providers indicates model commoditization is
              proceeding faster than ElevenLabs' premium pricing implies. [CR007][CR008][CR019][CR020]


              The risk of BigTech bundling TTS as a near-zero-marginal-cost feature within their AI developer platforms
              is the most consequential long-term scenario. ElevenLabs' current moat rests on voice quality leadership,
              low latency (Flash model), and a diversified ecosystem (Voice Library, AI Dubbing, multilingual support);
              if this quality gap closes within 18-24 months, the pricing premium for ElevenLabs' self-serve tier would
              be difficult to sustain. The absence of an on-premise deployment option further constrains ElevenLabs'
              ability to compete for government, healthcare, and financial-services customers with strict data residency
              requirements. [CR019][CR029][CR031]
            claimRefs: []
      - number: '7.3'
        title: Financial, Execution, and Portfolio Kill Criteria
        blocks:
          - type: paragraph
            body: >
              ElevenLabs' financial risk profile benefits from a strong cash position (~$550M post-Series D) and rapid
              ARR growth ($120M to $330M in 2025, 175% YoY). However, several financial risks warrant close monitoring.
              Gross margins are estimated at 65-75%, below typical SaaS benchmarks of 75-80%+, primarily because
              real-time and low-latency GPU inference is computationally intensive. As Conversational AI grows as a
              share of revenue, GPU cost per session could widen this gap unless hardware costs continue declining.
              Self-serve API abuse — where bad actors generate large volumes of audio on free or low-cost plans — is a
              structural cost leak that compresses unit economics below the headline ARR numbers suggest.
              [CR011][CR012][CR038]


              Key-person dependency is an execution risk that is difficult to hedge. Mati Staniszewski (CEO) and Piotr
              Dąbkowski (CTO) are the technical and commercial anchors of ElevenLabs; no succession plan or executive
              bench depth has been disclosed. Poland's Warsaw hub provides engineering depth, but the geopolitical risk
              from Eastern European instability, though currently low probability, is non-zero. Customer concentration
              adds financial fragility: an estimated 20-30% of ARR is attributable to a small number of anchor
              enterprise customers, meaning the loss of two or three accounts could trigger double-digit ARR decline and
              investor concern. Net revenue retention, estimated by analysts at 130-150%, is unverified; if it fell
              below 110%, the growth narrative would face serious pressure. [CR013][CR017][CR030][CR036]


              The thesis-break scenario for a VC investor is a conjunction of three concurrent events: (1) a major
              BigTech player bundles equivalent voice quality at near-zero marginal cost; (2) regulatory enforcement
              materially restricts ElevenLabs' enterprise telephony and media markets; and (3) a significant data breach
              or high-profile deepfake incident causes enterprise churn above 20% NRR decline. Any single trigger is
              insufficient alone, but two of three occurring within the same 12-month period would require a fundamental
              reassessment of the investment. Monitoring indicators include BigTech pricing actions, Congressional bill
              progress, Consumer Reports ratings, and ElevenLabs' quarterly ARR update (expected at Series E).
              [CR033][CR034]
            claimRefs: []
      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Critical Risk: Deepfake Misuse Is a Systemic, Not Marginal, Threat'
            body: >-
              ElevenLabs' core technology is inherently dual-use. Documented misuse in the 2024 Biden robocall deepfake,
              widespread phone scam deployment, and ongoing SAG-AFTRA concerns confirm that ElevenLabs faces
              reputational and regulatory liability from bad actors regardless of its own policy intent. Current
              watermarking and detection tools fall below 70% accuracy, leaving a significant residual exposure that no
              compliance program can fully close without degrading product capability.
            calloutType: risk
            claimRefs:
              - CR009
              - CR014
              - CR016
              - CR024
          - type: callout
            title: 'Key Mitigation: Strong Cash Position Provides Regulatory Runway'
            body: >-
              With ~$550M in cash post-Series D and an estimated 18-24 months of runway at current burn, ElevenLabs has
              sufficient capital to invest in regulatory compliance infrastructure, legal defence, and product-level
              safety mechanisms. This is a significant advantage over smaller AI voice startups that may face regulatory
              headwinds without comparable resources.
            calloutType: strength
            claimRefs:
              - CR011
              - CR028
              - CR040
          - type: callout
            title: 'Diligence Ask: Demand Independent Security and Compliance Audit'
            body: >-
              No independent SOC 2, ISO 27001, or GDPR data processing audit has been made public. Given the biometric
              nature of voice print data and the scale of API calls, a VC investor should require a third-party security
              and compliance audit as a condition of any further investment commitment.
            calloutType: recommendation
