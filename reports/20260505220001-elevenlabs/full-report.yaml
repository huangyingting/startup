  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation and Scale
        blocks:
          - type: paragraph
            body: >
              ElevenLabs' customer base spans individual developers through Fortune 500 enterprises across five primary
              verticals: media and publishing, gaming, enterprise technology, education and e-learning, and government.
              By early 2025, more than 60% of Fortune 500 companies had employees using ElevenLabs tools—up from 41% in
              2024—with over 1 million registered developers in the community. The company served over 2 million
              conversational AI agent deployments by early 2026, a metric that illustrates adoption depth beyond passive
              API usage. Users have generated over 1,000 years of cumulative audio content on the platform, a proxy for
              engagement and stickiness that few software platforms at this age can claim.

              The customer mix by revenue is approximately 50/50 enterprise and self-serve. Enterprise revenue grew over
              200% year-over-year in 2025, outpacing self-serve growth and driving average contract value higher.
              Geographically, the customer base is predominantly North American and European, with Asia-Pacific cited as
              a key expansion target for the Series D capital. Key enterprise segments include: telecom operators
              deploying AI phone agents (Deutsche Telekom), fintech companies building customer service automation
              (Revolut), media organisations automating audio content (Washington Post, TIME), and game studios
              generating NPC voice at scale (Paradox Interactive). [CU001][CU002][CU007][CU008][CU016][CU017][CU021]
            claimRefs:
              - CU001
              - CU002
              - CU007
              - CU008
              - CU016
              - CU017
              - CU021
      - number: '6.2'
        title: Named Customer Proof and Outcomes
        blocks:
          - type: paragraph
            body: >
              ElevenLabs has assembled a reference-quality enterprise customer portfolio. In media and publishing: TIME
              Magazine, The Washington Post, The Atlantic, The New Yorker, HarperCollins, ESPN, and Perplexity's
              Discover Daily use ElevenLabs to generate audio content at scale—the Washington Post and TIME converting
              written articles to audio in seconds rather than hours. In gaming: Paradox Interactive and Chess.com embed
              ElevenLabs voices in interactive character experiences and AI chess coaching. In enterprise technology:
              Deutsche Telekom, Revolut, Square, Salesforce, and NVIDIA are named clients, with Salesforce Ventures
              being an active investor-customer. The Ukrainian government is a notable public-sector adopter.
              ElevenLabs' Chess.com deployment, where AI coaches guide players through chess games in natural-sounding
              voice, exemplifies the platform's ability to create deeply embedded, high-engagement customer experiences
              that are technically difficult to replace.

              These customer logos serve a dual purpose: revenue proof and marketing validation. The breadth of
              verticals (media, gaming, telecoms, fintech, government) signals product-market fit across multiple
              categories rather than single-niche dependence. However, individual case study depth and publicly
              documented ROI outcomes are limited—most customer evidence is logo-level disclosure rather than quantified
              outcome reporting. [CU003][CU004][CU005][CU006][CU019][CU020]
            claimRefs:
              - CU003
              - CU004
              - CU005
              - CU006
              - CU019
              - CU020
      - number: '6.3'
        title: Retention, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              ElevenLabs' retention and expansion dynamics are largely opaque from public sources. Net revenue retention
              and gross revenue retention have not been disclosed. Enterprise contracts are primarily annual, limiting
              multi-year revenue visibility. The land-and-expand motion—developer adoption within an enterprise
              triggering a company-wide agreement—mirrors Twilio's growth model and is consistent with the 50/50
              enterprise/self-serve revenue mix observed. No publicly documented cases of major enterprise contract
              terminations or competitor switches were identified, though the absence of adverse evidence does not
              confirm strong retention.

              Customer concentration is unknown; no disclosure of top-customer ARR percentage exists. Pricing friction
              on self-serve plans—particularly the credit-based model and rate limits—has generated developer complaints
              and potential churn risk. Enterprise customers who embed ElevenLabs' API directly into their product
              stacks (games, customer service platforms) accumulate switching costs through voice model integration,
              data dependency, and user experience continuity requirements. However, multi-homing remains a realistic
              pattern for enterprise buyers who use ElevenLabs for quality workloads and cheaper alternatives for
              high-volume simpler workloads. The FCC's 2024 ruling on AI voice calls creates a compliance burden for
              enterprise customers deploying Conversational AI agents over telephone networks, requiring ongoing
              regulatory monitoring. ElevenLabs provides compliance guidance and terms-of-service restrictions to
              address this, but enforcement relies on customer responsibility rather than technical controls.
              [CU009][CU010][CU012][CU013][CU014][CU018][CU022][CU024]
