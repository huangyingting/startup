  claims:
    - id: C701
      statement: >-
        The FCC ruled in January 2024 (DA-24-146) that AI-generated voices in robocalls are illegal under the TCPA,
        directly implicating any ElevenLabs customer using its API for automated outbound telephony without prior
        written consumer consent.
      type: third-party-reported
      topic: FCC-TCPA-regulatory-risk
      sourceRefs:
        - S701
        - S702
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ702
    - id: C702
      statement: >-
        EU AI Act Article 52 requires providers of AI systems that generate synthetic voice output to clearly label such
        output as AI-generated; failure exposes ElevenLabs' European customers to fines, creating compliance overhead
        that could slow enterprise adoption in the EU.
      type: third-party-reported
      topic: EU-AI-Act-compliance-risk
      sourceRefs:
        - S703
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ703
    - id: C703
      statement: >-
        The European Data Protection Board has indicated that voice prints created during voice cloning qualify as
        biometric data under GDPR Article 9, requiring explicit consent and triggering stricter processing requirements
        that ElevenLabs must comply with for EU users.
      type: third-party-reported
      topic: GDPR-biometric-voice-risk
