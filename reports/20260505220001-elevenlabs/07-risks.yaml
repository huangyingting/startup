callouts:
  - title: 'Critical Risk: Deepfake Misuse Is a Systemic, Not Marginal, Threat'
    body: >-
      ElevenLabs' core technology is inherently dual-use. Documented misuse in the 2024 Biden robocall deepfake,
      widespread phone scam deployment, and ongoing SAG-AFTRA concerns confirm that ElevenLabs faces reputational and
      regulatory liability from bad actors regardless of its own policy intent. Current watermarking and detection tools
      fall below 70% accuracy, leaving a significant residual exposure that no compliance program can fully close
      without degrading product capability.
    calloutType: risk
    claimRefs:
      - C219
      - C224
      - C226
      - C234
  - title: 'Key Mitigation: Strong Cash Position Provides Regulatory Runway'
    body: >-
      With ~$550M in cash post-Series D and an estimated 18-24 months of runway at current burn, ElevenLabs has
      sufficient capital to invest in regulatory compliance infrastructure, legal defence, and product-level safety
      mechanisms. This is a significant advantage over smaller AI voice startups that may face regulatory headwinds
      without comparable resources.
    calloutType: strength
    claimRefs:
      - C221
      - C238
      - C250
  - title: 'Diligence Ask: Demand Independent Security and Compliance Audit'
    body: >-
      No independent SOC 2, ISO 27001, or GDPR data processing audit has been made public. Given the biometric nature of
      voice print data and the scale of API calls, a VC investor should require a third-party security and compliance
      audit as a condition of any further investment commitment.
    calloutType: recommendation
    claimRefs:
      - C213
      - C228
      - C250
