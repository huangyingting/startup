companyProfile:
  summary: >-
    ElevenLabs 是领先的 AI 语音平台，提供一流的文本转语音、即时声音克隆、AI 配音（32 种语言）和对话式 AI 智能体 API。公司由 Mati Staniszewski（CEO）和 Piotr
    Dąbkowski（CTO）于 2022 年 1 月创立，在不到四年里从 $0 做到 $330M ARR，资本效率突出（人均 ARR $825K）。2026 年 2 月，公司完成由 Sequoia Capital 领投的
    Series D（$500M，估值 $11B），确立了其作为独立语音 AI 基础设施公司的主导地位。
