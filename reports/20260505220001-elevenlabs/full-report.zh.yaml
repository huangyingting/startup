  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与 ARR 轨迹
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 建立了企业软件史上最快的 ARR 增长曲线之一。公司 2023 年 1 月公开上线时几乎从零起步，到 2025 年末达到 $330M ARR。关键节点：20 个月做到 $100M
              ARR（2025 年 1 月）、2025 年 9 月达到 $200M ARR、2025 年 12 月达到 $330M ARR。最近一段从 $100M 到 $200M 用了 10 个月；随后新增 $130M 只用了
              5 个月。加速由企业采用驱动：2025 年企业收入同比增长超过 200%，企业 / 自助组合从重度自助起点接近 50/50。最大企业合同年费达到 $2M。

              公司有四条收入流：（1）自助订阅，从 $5/月（Starter）到 $1,320+/年（Business），服务数百万开发者和创作者用户；（2）企业 SaaS
              合同，采用定制定价、用量阶梯和年度承诺；（3）按字符或生成音频分钟数收取的 API 用量费；（4）Voice Library 市场佣金，创作者向企业客户授权声音。到 2026 年初，该市场已向声音创作者支付超过
              $2M，显示早期但增长中的牵引。SaaStr 将 ElevenLabs
              作为「产品驱动增长转企业销售（PLG-to-enterprise）」路径样本：病毒式自助产品转化为高价值企业关系。[CI001][CI002][CI003][CI004][CI005][CI006][CI023]
