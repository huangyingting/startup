      - number: '6.3'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 的留存和扩张动态在公开来源中大多不透明。净收入留存和总收入留存未披露。企业合同主要是一年期，限制了多年收入可见性。先落地再扩张动作——企业内部开发者采用触发全公司协议——与 Twilio
              的增长模式相似，也符合观察到的 50/50 企业 / 自助收入组合。未发现公开记录的重大企业合同终止或转向竞争对手案例，但缺少反向证据并不能确认留存强劲。

              客户集中度未知；没有披露头部客户 ARR 占比。自助计划的定价摩擦——尤其是点数制模型和速率限制——引发开发者抱怨和潜在流失风险。将 ElevenLabs API
              直接嵌入产品栈的企业客户（游戏、客服平台）会通过声音模型集成、数据依赖和用户体验连续性要求积累切换成本。不过，多供应商并用仍是企业买家的现实模式：用 ElevenLabs
              处理质量工作负载，用更便宜替代方案处理高量、较简单工作负载。FCC 2024 年关于 AI 语音电话的裁定，为在电话网络部署对话式 AI 智能体的企业客户带来合规负担，需要持续监管监测。ElevenLabs
              提供合规指引和服务条款限制，但执行依赖客户责任，而非技术控制。[CU009][CU010][CU012][CU013][CU014][CU018][CU022][CU024]
