      - number: '2.5'
        title: 规模估计缺口与冲突
        blocks:
          - type: paragraph
            body: >
              AI 语音市场规模口径不一且有争议。关键矛盾在于：MarketsandMarkets 预测 2030 年 $20.4B，而 Research and Markets 对仅 TTS 的预测温和得多，为
              $7.25B。差异来自范围模糊：更广义的「AI 语音」包含 ASR、语音助手和语音分析。分析师经常混合这些类别。进一步复杂之处在于，ElevenLabs 的主要收入驱动——对话式 AI
              智能体——通常被计入更广义的「联络中心 AI」市场（Grand View Research 预计 2030 年 $17B+），与核心 TTS 合并后会意味着更大的
              TAM。缺少竞争对手直接收入披露，使自下而上市场份额分析困难。ElevenLabs 市场份额估计（核心语音生成 7–8%，2025 年）来自披露 ARR 与分析师总市场规模对比；如果 ElevenLabs
              具体产品聚焦导致实际可服务市场更小，该估计可能有实质差异。[CM019][CM020]
            claimRefs:
              - CM019
              - CM020
