  - id: TV006
    title: 最终尽调事项
    columns:
      - 尽调事项
      - 优先级
      - 重要性
      - 若无法提供
    rows:
      - - 经审计的 2024-2025 GAAP 财务报表，并按产品拆分毛利率
        - 关键
        - 所有毛利率和单位经济估计都未经验证；公开市场投资者会要求经审计财务数据
        - 没有可验证的毛利率数据，不要按 $11B 投资
      - - 按客户队列披露 NRR：企业与自助分别列示，并按获客年份拆分
        - 关键
        - 平台逻辑依赖强扩张；估计 130-150% NRR 必须逐分部验证
        - 把概率权重调向基准情景；降低确信度
      - - 客户集中度明细：前 10 大账户占 ARR 比例
        - 高
        - 估计 20-30% ARR 集中在锚定客户，是尚未披露的重大财务风险
        - 假设集中度较高；将基准情景估值下调 10-15%
      - - 独立 SOC 2 Type II 和 GDPR 审计结果
        - 高
        - 生物识别语音数据要求先验证安全和合规姿态，再推进欧盟企业落地
        - 标记为欧盟企业逻辑阻断项；上调合规时间线担忧
      - - 按产品线拆分 GPU/CPU 基础设施成本
        - 高
        - 按产品线的毛利率决定哪些业务增值，哪些会压缩企业经济性
        - 没有这些数据，无法承销毛利率提升至 75%+ 的路径
      - - Series D 完整条款清单（优先权、反稀释、治理权）
        - 中
        - 清算优先权和治理条款会影响退出情景下的回报分配
        - 假设 1× 非参与型优先权；按保守股权瀑布建模
      - - 与 FCC、FTC、EU AI Office 的监管沟通记录
        - 中
        - 主动监管沟通降低执法行动的二元风险
        - 将不利监管情景概率从 15% 上调至 25%
    claimRefs:
      - CV027
      - CV040
      - CV035
