              ElevenLabs 的里程碑包括 2023 年 1 月公开平台上线、2024 年 1 月 Series B 独角兽节点，以及 2024 年 1 月假 Biden 自动语音电话事件：有人使用 ElevenLabs
              生成的声音告诉选民不要在新罕布什尔州民主党初选投票，导致 FCC 出台监管行动，禁止 AI 生成自动语音电话，并带来显著声誉审视。2024 年，公司新增对话式 AI 智能体、32 种语言 AI
              配音、音效模型、ElevenReader（移动应用）和 Voice Design。Consumer Reports 2025 年 3 月研究发现，包括 ElevenLabs 在内的 AI
              声音克隆工具缺少强健防护，尤其点名仅靠勾选框的同意机制。配音演员和作者提起诉讼，指控其未经授权使用他们的声音作为训练数据。公司已部署水印、法证追溯合作和面向无障碍用途的 Impact
              Program，但批评者认为自律不足。ElevenLabs 2025 年在华沙开设研发中心，并扩展至印度、拉美和亚太。管理层评论称，2026 年 2 月 Series D 使公司有望在 2–3 年内潜在
