      - number: '6.2'
        title: 具名客户证明与结果
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 已组建可作为标杆的企业客户组合。在媒体和出版领域，TIME Magazine、The Washington Post、The Atlantic、The New
              Yorker、HarperCollins、ESPN 和 Perplexity 的 Discover Daily 使用 ElevenLabs 规模化生成音频内容——Washington Post 和 TIME
              能在数秒而非数小时内把文字文章转成音频。在游戏领域，Paradox Interactive 和 Chess.com 将 ElevenLabs 声音嵌入交互式角色体验和 AI
              国际象棋教练。在企业技术领域，Deutsche Telekom、Revolut、Square、Salesforce 和 NVIDIA 是具名客户，其中 Salesforce Ventures
              也是活跃的投资者兼客户。乌克兰政府是值得注意的公共部门采用者。ElevenLabs 在 Chess.com 的部署让 AI
              教练用自然语音带玩家走完棋局，展示平台能创造深度嵌入、高参与度且技术上难以替换的客户体验。

              这些客户标识有双重作用：收入证明和营销验证。垂直广度（媒体、游戏、电信、金融科技、政府）表明产品市场契合跨多个类别，而不是依赖单一利基。不过，单个案例研究深度和公开记录的 ROI
