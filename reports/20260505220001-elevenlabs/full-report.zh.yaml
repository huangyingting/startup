      - number: '2.3'
        title: 买方与细分图谱
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 的买方覆盖开发者 / 创作者（自下而上）和企业（自上而下）两类。开发者 / 创作者细分（估计约 50% 收入）包括用 API 开发应用和游戏的独立开发者、制作音频播客和 YouTube
              内容的创作者，以及自动化客户触点的小企业团队。企业细分（约 50% 收入）包括：媒体和出版公司（TIME、Washington Post、HarperCollins）授权 ElevenLabs
              用于内容制作和配音；客服平台和联络中心使用对话式 AI 智能体；游戏工作室（Paradox Interactive）用于游戏内语音；电信运营商（Deutsche Telekom、NTT
              DOCOMO）同时作为投资者和分销渠道；以及教育科技平台（Chess.com、Praktika）。主要企业买方画像是首席数字官、CTO 或客户体验负责人。开发者细分中，买方是接入 API
              的工程师或创业者。企业交易的预算所有者通常是 IT / 数字化转型预算，而不是营销。关键采用摩擦是采购安全审查，尤其是监管行业对 AI 生成声音处理的审查。[CM009][CM010][CM011][CM012]
