        title: 融资历史与投资者
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 自 2022 年以来五轮累计融资约 $781M。2022 年 $2M 种子轮让公司起步；2023 年 1 月 $19M Series A 支撑公开平台上线。2024 年 1 月 $80M
              Series B 估值 $1.1B，使其成为独角兽。2025 年 1 月由 a16z 和 ICONIQ Growth 领投的 $180M Series C 将估值推高三倍至 $3.3B。2026 年 2 月由
              Sequoia Capital 领投的 $500M Series D 把估值推至 $11B——两年增长 10×。战略投资者包括 Deutsche Telekom、LG Technology
              Ventures、HubSpot Ventures、NTT DOCOMO Ventures、RingCentral Ventures 和 Salesforce Ventures。其他财务投资者包括
              Lightspeed Venture Partners、NEA、Bond Capital、Andreessen Horowitz、Coatue 和 SV Angel。公司报告 Series D 后账上现金约
              $550M，提供了更长现金跑道。未披露债务工具。老股交易或内部要约出售尚未公开确认。[CO010][CO011][CO012][CO013][CO014][CO015]
