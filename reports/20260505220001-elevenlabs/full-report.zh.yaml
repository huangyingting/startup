  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 在三个市场层级竞争：专门的 AI 原生语音 API 初创公司（Cartesia、Deepgram、Resemble AI、Play.ht、Murf）、捆绑 TTS
              的科技巨头在位者（Google、Amazon、Microsoft），以及向音频扩展的基础模型实验室（OpenAI，潜在还有 Anthropic）。每一层都有不同竞争动态。在 AI 原生同业中，ElevenLabs
              保持质量领先：截至 2025 年，独立 MOS（平均意见分）约 4.5/5，领先所有可通过 API 使用的替代方案。不过 Cartesia 凭借低于 95ms
              延迟和更低的按字符定价，切出可信细分，吸引优先速度而非极致自然度的语音智能体构建者。Deepgram 主要在语音转文本竞争，但其 Aura TTS 模型在企业实时场景中取得进展。

              科技巨头在位者（Google Cloud TTS、Amazon Polly、Microsoft Azure
              Speech）凭更广泛云关系、既有企业采购和与云平台捆绑的零边际成本保持分销优势。它们在声音自然度基准上落后于 ElevenLabs，但在价格和平台整合主导决策的大宗商品 TTS
              工作负载中构成真实风险。Microsoft 将 Azure Speech 集成进 Microsoft 365 Copilot 尤其值得注意，因为 Microsoft
              现有企业安装基础规模很大。[CP001][CP013][CP014][CP015]
