      - number: '2.2'
        title: 市场规模——TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              多家分析机构对核心 AI 语音生成器市场的判断趋同：2024 年约 $3B，并据 MarketsandMarkets 研究，以 37% CAGR 增至 2030 年 $20.4B。Grand View
              Research 估计的路径略高，到 2030 年达到 $21.75B（29.6% CAGR）。包含 ASR、语音助手和 TTS 的更广义语音 AI 市场到 2030 年超过 $70B。ElevenLabs
              的可服务市场（SAM）是可通过其 API 和企业合同触达的子集：企业 AI 音频、对话式 AI 智能体基础设施和 AI 媒体本地化。基于企业联络中心 AI（约 $4B）、媒体 / 出版语音 AI（$2B）和开发者
              API 基础设施（$2–4B），该 SAM 估计到 2027 年为 $8–12B。按当前轨迹，可获取市场（SOM）到 2027 年约 $1–1.5B，与公司披露增速下达到 $500–700M
              ARR、并在企业细分获得中等市场份额的路径一致。在 2025 年约 $4B 总市场中，ElevenLabs 以 $330M ARR 约占核心 AI 语音生成市场
              7–8%。[CM004][CM005][CM006][CM007][CM008]
