        blocks:
          - type: paragraph
            body: >
              公司由两位来自波兰的童年好友共同创立。CEO Mati Staniszewski 曾在 Palantir Technologies 担任部署策略师；CTO Piotr Dąbkowski 曾是 Google
              机器学习工程师。两人的创业动机来自美国电影在波兰发行时拙劣的配音质量。Dąbkowski 入选 TIME Magazine AI Top 100
              Innovator。创业初期，团队以紧凑的两人技术小队搭建公司，再逐步扩张。到 2025 年 1 月，员工数从 30 人增至 120 人，在伦敦、纽约和华沙设有办公室。到 2025 年末，员工数约 330
              人。公司尚未公开披露 CFO 或 COO；两位创始人承担所有主要高管职责。Sequoia 合伙人 Andrew Reed 在 2026 年 2 月 Series D
              交易中加入董事会。考虑到领导架构仍处早期，公司对两位创始人兼 CEO/CTO 的关键人物依赖构成实质风险。[CO005][CO006][CO007][CO008][CO009]
