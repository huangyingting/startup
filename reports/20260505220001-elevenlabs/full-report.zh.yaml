  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户工作流
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 已从单一文本转语音 API 扩展为完整 AI 音频平台，拥有八条不同产品线。核心文本转语音 API 通过 REST 或 WebSocket
              在数秒内处理自然语言文本并输出音频，服务从游戏到出版的开发者和企业应用。Voice Cloning 允许用户用音频样本创建个性化声音（Instant Cloning 需 3 秒，Professional
              Cloning 需 30+ 分钟），支撑个性化客服和品牌内容等企业用例。AI Dubbing 自动翻译并重新配音 32 种语言的视频内容，同时保留说话人身份，瞄准过去需要数周人工声音工作的媒体本地化流程。

              对话式 AI 平台驱动能进行多轮对话的语音智能体，具备打断检测、情绪感知回应和 Twilio 电话集成能力，可用于呼叫中心自动化和交互式客户体验。Voice Library 市场聚合 5,000+
              个授权声音，创作者获得收入分成，企业客户可以规模化获取多样声音人才。ElevenReader、Sound Effects AI 和 Projects studio
              将平台延展到消费阅读、音频制作和声音设计。合在一起，这些产品整合进统一 API
              接口，让企业客户无需多家供应商即可构建复合语音工作流。[CE001][CE005][CE006][CE019][CE021][CE022]
            claimRefs:
              - CE001
              - CE005
              - CE006
              - CE019
              - CE021
              - CE022
