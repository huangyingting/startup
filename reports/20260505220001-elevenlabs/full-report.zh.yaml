  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 位于 AI、生物识别数据和消费者通信交叉点——这是全球监管最活跃的三个技术领域。FCC 2024 年 1 月裁定（DA-24-146）认定 AI 生成声音自动电话违反
              TCPA，是最直接的监管风险，直接影响 ElevenLabs 的企业电话客户。任何客户如果未经消费者事先书面同意，就用 ElevenLabs 的对话式 AI 平台部署外呼自动电话，现在都违反联邦法律；如果客户把其
              API 当作无防护工具使用，合规责任可能传导至 ElevenLabs。[CR001][CR002]


              欧洲方面，EU AI Act 和 GDPR 形成双重合规负担。EU AI Act 第 52 条要求明确标注 AI 生成语音输出；任何 ElevenLabs
              客户在欧盟分发合成音频却不披露，都面临该法案下的罚款风险。同时，European Data Protection Board 已指出，声音克隆过程中生成的声纹构成 GDPR 第 9
              条下的生物识别数据，需要明确知情同意。这显著提高 ElevenLabs 欧洲企业客户的开销，并可能拖慢欧盟市场采用。[CR002][CR003]


              诉讼方面，截至 2026 年初，ElevenLabs 尚未面临已立案的重大诉讼，但该领域已进入配音演员和权利人积极采取法律行动的时期。2023 年 ElevenLabs
              的默认声音「Adam」因被滥用于复刻未经同意的名人内容而下架，暴露了公司的被动姿态，也引发默认声音训练数据是否已充分进行前置 IP 清理的问题。SAG-AFTRA 与娱乐工作室持续进行的 AI 声音谈判，以及
              EFF 关于美国 35 个州公开权法律碎片化的分析，都确认法律环境并不稳定。[CR004][CR014][CR023][CR025]


              FTC 的 Voice Cloning Challenge（2024 年 1 月）释放出监管者希望对 AI 语音 API 施加安全标准的意图。2024-2025 年 Biden
              深度伪造自动语音电话事件后的美国国会听证，提高了 ElevenLabs 投资周期内出台联邦立法的概率。ElevenLabs CEO
              已公开承诺参与监管并推进合规路线图，但其信任与安全措施的充分性尚未经过独立审计。[CR005][CR015][CR021][CR028][CR039][CR040]
