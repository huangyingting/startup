      - number: '8.3'
        title: 情景、退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >
              **乐观情景（25% 概率）：** ARR 在持续 80-100% 同比增长下，到 2027 年底达到 $900M-$1.1B；随着 Conversational AI 收入规模扩大、GPU
              单位经济性改善，毛利率提升至 73-76%；2028 年按 18-22× ARR IPO → $16.2B-$24.2B 估值。Series D 投资人隐含回报为
              1.5-2.2×。关键驱动因素：企业电话采用加速，EU AI Act 合规可控，Conversational AI 规模化为全球前三的企业产品。


              **基准情景（55% 概率）：** 在 60-70% 同比增长且承受部分 BigTech 价格压力下，ARR 到 2027 年底达到 $600M-$750M；毛利率达到 70%；2028-2029 年按
              12-15× ARR IPO 或被收购 → $7.2B-$11.25B 估值。Series D 投资人隐含回报为 0.7-1.0×（小幅保值，而非回报）。关键风险：NRR 从 140% 降至 120%，拖慢
              ARR 复合增长。


              **悲观情景（20% 概率）：** BigTech 在 18 个月内将 TTS 商品化，ARR 增长降至 40-50% 同比；监管逆风限制美国电话垂直市场；2027 年以 $8-9B
              估值进行持平轮或下轮融资；IPO 可选性有限。Series D 投资人的持仓价值处于成本或成本以下。 [CV010][CV011][CV012][CV026]


              ElevenLabs 距离 IPO 准备就绪估计还有 2-3 年。前置条件包括：经审计的 GAAP 财务报表（S-1 所需）、具备上市公司经验的 CFO、证明毛利率可持续提升至 70%
              以上，以及美国和欧盟重大监管不确定性得到化解。T. Rowe Price 和 Series D 机构共同投资人会形成走向 IPO 的结构性压力，可能加速治理改善。 [CV020][CV029][CV035]


              最终尽调要求：（1）经审计的 2024-2025 年财务报表，并按产品线拆分毛利率；（2）按客户队列年份拆分的 NRR（企业与自助分开）；（3）客户集中度明细——前 10 大账户占 ARR 比例；（4）独立
              GDPR 和 SOC 2 审计结果；（5）按产品拆分的 CPU/GPU 基础设施成本；（6）与 FCC、FTC 和 EU AI Office 的监管沟通日志；（7）Series D
              完整条款清单，包括治理权和反稀释条款。 [CV027][CV040]
            claimRefs: []
