  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 横跨三个相邻但不同的市场竞争：（1）AI 文本转语音（TTS）和语音合成基础设施，即面向开发者、出版商和创作者，通过 API 从文本输入生成语音；（2）AI
              声音克隆与定制，即企业创建品牌化或个性化声音身份；（3）对话式 AI 智能体基础设施，为客服、销售、教育和游戏提供实时语音交互 AI 智能体。公司还通过 32 种语言配音产品切入 AI
              音频本地化和配音市场。ElevenLabs 核心市场不包括：语音识别 / ASR（转录）、用于认证的声纹生物识别，以及通用语音助手（Alexa、Siri 级）。现状替代方案包括真人配音演员（内容创作）、传统
              IVR / 电话系统（联络中心）和人工配音工作室（本地化）。AI 智能体市场是最具战略意义的邻近市场，ElevenLabs 在这里与 OpenAI Realtime API、Google TTS、Amazon
              Polly，以及 Deepgram、Cartesia 等专门玩家竞争。[CM001][CM002][CM003]
            claimRefs:
