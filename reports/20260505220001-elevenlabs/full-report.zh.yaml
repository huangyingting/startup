      - number: '7.4'
        title: 附录
        blocks:
          - type: callout
            title: 关键风险：deepfake 滥用是系统性威胁，而非边缘威胁
            body: >-
              ElevenLabs 的核心技术天然具有双重用途。2024 年 Biden 自动语音电话 deepfake 事件、有记录的大规模电话诈骗部署，以及 SAG-AFTRA
              持续表达的担忧，都确认了一点：无论公司自身政策意图如何，恶意行为者都会给 ElevenLabs 带来声誉和监管责任。现有水印和检测工具准确率低于
              70%，留下显著剩余敞口；除非牺牲产品能力，否则合规计划无法完全封堵。
            calloutType: risk
            claimRefs:
              - CR009
              - CR014
              - CR016
              - CR024
          - type: callout
            title: 关键缓释因素：强现金头寸提供监管缓冲期
            body: >-
              Series D 后约 $550M 现金，加上按当前烧钱速度估计 18-24 个月的现金跑道，使 ElevenLabs
              有足够资本投入监管合规基础设施、法律防御和产品级安全机制。相比资源不足却同样面对监管逆风的小型 AI 语音创业公司，这是显著优势。
            calloutType: strength
            claimRefs:
              - CR011
              - CR028
              - CR040
          - type: callout
            title: 尽调要求：要求独立安全与合规审计
            body: 公司尚未公开独立的 SOC 2、ISO 27001 或 GDPR 数据处理审计。考虑到声纹数据具有生物识别属性，且 API 调用规模较大，VC 投资人应把第三方安全与合规审计作为追加投资承诺的前置条件。
            calloutType: recommendation
