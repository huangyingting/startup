    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              ElevenLabs, Inc. 是一家私营 AI 音频基础设施公司，总部位于纽约州纽约，并在伦敦和华沙设有枢纽。公司由 Mati Staniszewski（CEO）和 Piotr Dąbkowski（CTO）于
              2022 年 1 月创立，2023 年 1 月上线公开平台。ElevenLabs 构建面向语音合成、声音克隆、实时对话式 AI 智能体和音频内容本地化的基础 AI 模型。商业模式把免费增值的自助层（创作者起步价
              $22/月）与企业 SaaS 合同结合，后者年费可达 $2M+。公司收入来自 API 用量、按机器人 / 按席位订阅以及平台授权；截至 2025 年末，自助与企业收入约各占 50%。ElevenLabs
              将使命描述为让「语音成为数字交互的新标准」，并打造全球最完整的音频 AI 平台。[CO001][CO002][CO003][CO004]
