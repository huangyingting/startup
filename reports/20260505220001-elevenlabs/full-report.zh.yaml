              投资者在承诺前必须补齐。毛利率未公开披露。公开领域任何投资者材料都没有净收入留存和总收入留存。没有按职能拆分的员工数据，无法计算获客成本和回本周期；烧钱速度也未确认——盈利说法来自报道，未经过独立审计。客户集中度同样未知：如果少数大型企业客户贡献超过
