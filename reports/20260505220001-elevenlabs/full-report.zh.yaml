      - number: '8.4'
        title: 附录
        blocks:
          - type: callout
            title: 投资建议：适合长周期投资人的有条件买入
            body: >-
              ElevenLabs 在 $11B 估值上仍有吸引力，但回报空间已被压缩。增长率（$330M ARR 上同比 175%）、Rule of 40 分数（估计
              170-200+）以及顶级投资人组合，可以支撑这一估值。不过，新 Series D 投资人应预期基准情景回报有限（0.7-1.0× 本金），并把信念留给乐观情景（1.5-2.2×）。这笔投资最适合拥有 5-7
              年周期、且能在 Series E 获得后续按比例跟投权的投资人。
            calloutType: recommendation
            claimRefs:
              - CV034
              - CV017
              - CV030
              - CV039
          - type: callout
            title: 风险：后期投资人的回报画像被压缩
            body: >-
              基准情景的 $7-11B 退出估值，几乎只能覆盖 $11B 的 Series D 进入价格。后期投资人（Series D 进入）押注的是乐观情景，而不是基准情景。只有风险承受能力高、投资周期长，并相信语音 AI
              平台逻辑能穿越 BigTech 捆绑和监管逆风的投资人，才适合参与。
            calloutType: risk
            claimRefs:
              - CV011
              - CV012
              - CV019
          - type: callout
            title: 优势：世界级资本效率与单位经济性
            body: >-
              ElevenLabs 员工数 400、人均 ARR 为 $825K，加上估计 175+ 的 Rule of 40 分数，使其位居全球 SaaS 资本效率前
              1%。这些指标支撑溢价倍数，也说明即使增长放缓，商业模式在结构上仍然稳健。资产轻、API 优先的模式配合 65-75% 毛利率，在进一步规模化后有望跑出公共市场级别的经济性。
            calloutType: strength
            claimRefs:
              - CV008
              - CV009
              - CV029
