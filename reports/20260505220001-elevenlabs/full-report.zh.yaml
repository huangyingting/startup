            body: >
              ElevenLabs 的单位经济处于后期 AI 风险投资项目中已披露数据的最强梯队。$330M ARR、约 400 名员工意味着人均 ARR 约 $825,000——这是前十分位指标，可与
              Snowflake、Datadog 等同类最佳上市 SaaS 公司相比，并显著高于同阶段典型 VC 支持公司。据报道，公司在 2025 年中约 $200M ARR 时达到运营盈亏平衡，说明在当前员工规模下，新增
              ARR 对经营利润有显著增益。毛利率未公开披露；分析师估计在 70% 到 80% 之间，符合「模型权重即 API 产品」的经济特征，即模型效率提升后算力成本下降。

              资本效率同样强。ElevenLabs 截至 2026 年 2 月累计融资约 $781M，对应 $330M ARR，融资额 / ARR 约 2.4×；Anthropic 和 OpenAI 在相当收入规模下分别为
              10×+ 和 15×+。$500M Series D 后，公司报告现金约 $550M，即便保持增长模式烧钱，也提供数年运营跑道。公司未披露债务义务。ElevenLabs
