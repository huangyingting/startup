            body: >
              Cartesia AI 于 2024 年 9 月带着 Andreessen Horowitz 领投的 $80M 融资从隐身状态亮相。它提供 40–95ms 合成延迟——快于
              ElevenLabs——并声称对复杂文本也能无幻觉输出。其 $0.038 / 1,000 字符定价，在可比量级上显著低于 ElevenLabs。Cartesia 的限制包括声音库更小（约 130
              个声音）、支持语言更少（约 15–20 种）以及多语言深度有限。Resemble AI 借深度伪造检测和来源水印能力、面向监管行业的本地部署以及 149
              种语言覆盖做差异化——尽管它瞄准的是较小的合规优先买方市场。Play.ht 以声音库广度竞争（900+ 个声音、142 种语言），但声音自然度落后于 ElevenLabs。Murf AI
              服务非技术内容团队，采用工作室优先的 UI 和可负担订阅定价，但缺少实时合成 API 能力。[CP002][CP003][CP009][CP011][CP012][CP027]

