  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层与规模
        blocks:
          - type: paragraph
            body: >
              ElevenLabs 的客户基础覆盖个人开发者到 Fortune 500 企业，横跨五个主要垂直：媒体和出版、游戏、企业技术、教育和在线学习，以及政府。到 2025 年初，超过 60% 的 Fortune 500
              公司有员工使用 ElevenLabs 工具——高于 2024 年的 41%——社区注册开发者超过 100 万。到 2026 年初，公司服务了超过 200 万个对话式 AI
              智能体部署；该指标说明其采用深度已经超出被动 API 使用。用户已在平台上累计生成超过 1,000 年音频内容，这是这个阶段的软件平台很少能拿出的参与度和粘性替代指标。

              按收入看，客户组合约 50/50 企业和自助。2025 年企业收入同比增长超过 200%，快于自助增长，并推高平均合同价值。地域上，客户基础以北美和欧洲为主，亚太被列为 Series D
              资金的关键扩张目标。关键企业细分包括：部署 AI 电话智能体的电信运营商（Deutsche Telekom）、构建客服自动化的金融科技公司（Revolut）、自动化音频内容的媒体机构（Washington
              Post、TIME），以及规模化生成 NPC 语音的游戏工作室（Paradox Interactive）。[CU001][CU002][CU007][CU008][CU016][CU017][CU021]
