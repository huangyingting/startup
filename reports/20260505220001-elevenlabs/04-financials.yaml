      - CI010
  - title: Critical Financial Disclosure Gap
    body: >-
      The absence of disclosed gross margin, NRR, churn, and burn rate represents a material analytical gap. Investors
      must demand audited financials before any commitment. The voice actor litigation adds unquantified contingent
      liability risk.
    calloutType: risk
