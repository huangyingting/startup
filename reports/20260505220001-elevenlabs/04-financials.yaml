  - title: Exceptional Capital Efficiency
    body: >-
      ElevenLabs' $825K ARR per employee and breakeven at $200M ARR represent top-decile SaaS efficiency. With $550M
      cash post-Series D and no disclosed debt, the company's financial resilience is a key investment strength.
    calloutType: strength
