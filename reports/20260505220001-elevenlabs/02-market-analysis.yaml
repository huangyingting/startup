company:
  name: ElevenLabs
chapter:
  number: 2
  title: Market Analysis
  summary: >
    The AI voice generation market is growing at ~37% CAGR from $3B in 2024 toward $20B by 2030. ElevenLabs addresses a
    broad TAM spanning AI-generated speech, voice cloning, AI dubbing, and conversational AI agents. The SAM for its
    enterprise-addressable segments reaches $8–12B by 2027. Growth is driven by LLM proliferation, digital content
    demand, and conversational AI adoption. Adoption constraints include regulatory risk from deepfake concerns,
    enterprise trust, and growing Big Tech competition.
sections:
  - id: s1
    title: Market Boundary and Scope
    body: >
      ElevenLabs competes across three adjacent but distinct markets: (1) AI text-to-speech (TTS) and voice synthesis
      infrastructure, which covers API-delivered speech generation from text input for developers, publishers, and
      creators; (2) AI voice cloning and customization, covering enterprise creation of branded or personalized voice
      identities; and (3) conversational AI agent infrastructure, which delivers real-time voice-interactive AI agents
      for customer service, sales, education, and gaming. The company also addresses the AI audio localization and
      dubbing market through its 32-language dubbing product. Excluded from ElevenLabs' core market: speech
      recognition/ASR (transcription), voice biometrics for authentication, and general-purpose voice assistants (Alexa,
      Siri-class). Status-quo substitutes include human voiceover artists (for content creation), traditional
      IVR/telephony systems (for contact centers), and manual dubbing studios (for localization). The AI agent market
      represents the most strategically important adjacency, where ElevenLabs competes with OpenAI Realtime API, Google
      TTS, Amazon Polly, and specialized players like Deepgram and Cartesia. [CM001][CM002][CM003]
    claimRefs:
      - CM001
      - CM002
      - CM003
    tableRefs:
      - TM001
  - id: s2
    title: Market Sizing — TAM, SAM, and SOM
    body: >
      Multiple analyst sources converge on the core AI voice generator market at approximately $3B in 2024, growing to
      $20.4B by 2030 at a 37% CAGR per MarketsandMarkets research. Grand View Research estimates a slightly higher
      trajectory at $21.75B by 2030 (29.6% CAGR). The broader voice AI market including ASR, voice assistants, and TTS
      exceeds $70B by 2030. ElevenLabs' serviceable addressable market (SAM) is the subset addressable through its API
      and enterprise contracts: enterprise AI audio, conversational AI agent infrastructure, and AI media localization.
      This SAM is estimated at $8–12B by 2027, based on enterprise contact center AI (approximately $4B),
      media/publishing voice AI ($2B), and developer API infrastructure ($2–4B). The serviceable obtainable market (SOM)
      at current trajectory is approximately $1–1.5B by 2027, consistent with reaching $500–700M ARR at the company's
      disclosed growth rate with moderate market share capture in enterprise segments. At $330M ARR on a ~$4B total
      market in 2025, ElevenLabs holds approximately 7–8% share of the core AI voice generation market.
      [CM004][CM005][CM006][CM007][CM008]
    claimRefs:
      - CM004
      - CM005
      - CM006
      - CM007
      - CM008
    tableRefs:
      - TM002
    figureRefs:
      - FM001
      - FM002
  - id: s3
    title: Buyer and Segment Map
    body: >
      ElevenLabs' buyers span developer/creator (bottom-up) and enterprise (top-down) segments. The developer/creator
      segment (estimated ~50% of revenue) includes indie developers using the API for apps and games, content creators
      producing audio podcasts and YouTube content, and small business teams automating customer touchpoints. The
      enterprise segment (~50% of revenue) includes: media and publishing firms (TIME, Washington Post, HarperCollins)
      licensing ElevenLabs for content production and dubbing; customer service platforms and contact centers using
      Conversational AI agents; gaming studios (Paradox Interactive) for in-game voice; telecommunications carriers
      (Deutsche Telekom, NTT DOCOMO) as both investors and distribution channels; and educational technology platforms
      (Chess.com, Praktika). The primary enterprise buyer persona is the Chief Digital Officer, CTO, or Head of Customer
      Experience. In the developer segment, the buyer is the engineer or startup founder accessing the API. Budget owner
      for enterprise deals is typically the IT/digital transformation budget, not marketing. A key adoption friction is
      procurement security review for AI-generated voice handling, particularly in regulated industries.
      [CM009][CM010][CM011][CM012]
    claimRefs:
      - CM009
      - CM010
      - CM011
      - CM012
    tableRefs:
      - TM003
    figureRefs:
      - FM003
  - id: s4
    title: Growth Drivers and Adoption Constraints
    body: >
      Growth drivers include: (1) LLM proliferation enabling conversational AI agents at scale, creating demand for
      natural, low-latency voice output as the interface layer; (2) digital content globalization driving demand for AI
      dubbing to replace expensive human localization; (3) cost economics — AI voice at $22/month vs. $300–500/hour for
      professional voiceover artists; (4) developer API adoption following the "Twilio for voice" distribution model;
      and (5) enterprise automation of contact center workflows as AI agents replace first-tier IVR systems. Adoption
      constraints include: (1) regulatory risk from deepfake concerns leading to EU AI Act voice provisions and
      potential US biometric/voice data regulations that could restrict training data practices; (2) enterprise trust in
      AI voices for customer-facing use cases, requiring consent, watermarking, and audit trails; (3) model inference
      costs requiring continued GPU cost reduction to sustain margins; (4) Big Tech competition from Google TTS, OpenAI
      Realtime API, Amazon Polly, and Microsoft Azure Speech; and (5) the commoditization risk as open-source voice
      models (Coqui, Bark, Kokoro) approach commercial quality at zero cost. [CM013][CM014][CM015][CM016][CM017][CM018]
    claimRefs:
      - CM013
      - CM014
      - CM015
      - CM016
      - CM017
      - CM018
    tableRefs:
      - TM004
    figureRefs:
      - FM004
  - id: s5
    title: Sizing Gaps and Conflicting Estimates
    body: >
      Market sizing for AI voice is heterogeneous and contested. Key contradictions: MarketsandMarkets projects $20.4B
      by 2030 while Research and Markets projects a much more modest $7.25B for TTS-only. The difference reflects scope
      ambiguity: broader "AI voice" includes ASR, voice assistants, and speech analytics. Analysts frequently conflate
      these categories. A further complication is that ElevenLabs' primary revenue driver—conversational AI agents—is
      typically sized within the broader "contact center AI" market ($17B+ by 2030 per Grand View Research), which would
      imply a much larger TAM when combined with core TTS. The absence of direct competitor revenue disclosures makes
      bottom-up market share analysis difficult. Estimates of ElevenLabs' market share (7–8% of core voice generation,
      2025) are derived from disclosed ARR relative to analyst total market size, and may materially differ if the
      actual serviceable market is smaller due to ElevenLabs' specific product focus. [CM019][CM020]
    claimRefs:
      - CM019
      - CM020
