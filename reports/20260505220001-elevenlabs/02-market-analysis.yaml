callouts:
  - calloutType: strength
    title: Large and Fast-Growing Core Market
    body: >
      The AI voice generator market is growing at 37% CAGR and reaches $20B+ by 2030. ElevenLabs already holds
      approximately 7-8% share of the core market at $330M ARR, positioning it as a structural market leader in a
      high-growth category.
    claimRefs:
      - CM004
      - CM007
      - CM008
  - calloutType: risk
    title: Big Tech Competitive Constraint
    body: >
      Google TTS, OpenAI Realtime API, Amazon Polly, and Microsoft Azure Speech all compete directly and benefit from
      bundling with broader cloud platforms. Distribution advantages of Big Tech incumbents represent a structural
      constraint on ElevenLabs' ability to capture enterprise deals without deeper integration or differentiation.
    claimRefs:
      - CM016
      - CM017
  - calloutType: insight
    title: Conversational AI Agents Extend TAM Materially
    body: >
      ElevenLabs' entry into the conversational AI agent market (contact center AI, gaming agents, education tutors)
      adds an addressable market of $10B+ by 2030, roughly equal to the core TTS/voice market. This makes the combined
      addressable market materially larger than pure TTS estimates suggest.
    claimRefs:
      - CM002
      - CM007
      - CM013
  - calloutType: risk
    title: Open-Source Commoditization Risk
    body: >
      Open-source voice models (Coqui TTS, Bark, Kokoro) are rapidly improving in quality and approaching
      commercial-grade output at zero cost. This creates a commoditization risk for the lower end of ElevenLabs' pricing
      stack (developer freemium), though enterprise features (branded voices, compliance, support, integration) remain
      defensible in the near term.
    claimRefs:
      - CM018
      - CM019
