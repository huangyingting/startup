companyProfile:
  summary: >-
    BETA Technologies is a privately held U.S. electric-aviation OEM commercializing two ALIA aircraft platforms (CTOL
    CX300 and eVTOL A250) plus a charging-network business. The company has serial-production tooling, named cargo and
    defense customers, and a strong capital base, but outside investors still cannot price the business confidently
    without FAA type-certification timing and a refreshed post-2022 valuation mark.
  foundedDate: '2017-01-01'
  founders:
    - name: Kyle Clark
      role: Founder and CEO
      background: Former Dynapower executive and lifelong pilot; technical and external leader of BETA since founding.
      claimRefs: [CO004, CO005]
  foundingLocation: South Burlington, Vermont
  headquarters: South Burlington, Vermont
  productSummary: >-
    Two ALIA aircraft platforms — CX300 conventional take-off and landing (CTOL) and A250 electric vertical take-off and
    landing (eVTOL) — plus a Charge Cube DC fast-charging network for electric aircraft and ground vehicles.
  customerFocus: Cargo (UPS Flight Forward), defense (AFWERX / Agility Prime), passenger/regional (United Airlines LOI, Blade), and charging-network buyers.
  businessModel: Aircraft sales, charging-infrastructure deployments, and U.S. defense program revenue.
  stage: late-stage private
