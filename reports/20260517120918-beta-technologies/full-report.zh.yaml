      - number: '8.3'
        title: 可比公司估值和估值回报区间
        blocks:
          - type: paragraph
            body: >-
              可比估值表 TV004 将 BETA 与 Joby Aviation（上市，NYSE: JOBY，2024-2026 市值波动）、Archer Aviation（上市，NYSE: ACHR，市值波动）、Wisk
              Aero（Boeing 子公司，未公开定价）和 Lilium（October 2024 破产——需要警惕的同组可比）放在一起。Lilium 的破产是最强警示：一家融资充足、技术叙事很强的 eVTOL
              OEM，仍然因为认证时点和资本结构充足性没有收敛而失败。估值回报区间图 FV003 以 2022 年 $4B Series B 为锚，展示悲观 / 基准 / 乐观情景下的隐含投后估值 $B
              区间。结构性判断是：BETA 2022 年 $4B 锚点，与 Joby 和 Archer 在 2024-2026 企业价值区间中的交易位置大致一致；但 BETA
              仍是私有公司且尚未认证，不能直接套用可比估值。18-24 个月持有期对应 2026-2027 认证顺序；这是 2022 锚点能否上调的闸门，也是全球私有和公开市场头部同组可比公司 Series C
              能否成交的定价闸门。
