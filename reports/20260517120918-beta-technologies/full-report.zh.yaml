      - number: '2.4'
        title: 驱动因素、约束和采纳速度的反向观点
        blocks:
          - type: paragraph
            body: >-
              2024 FAA 动力升力整合最终规则是 2026 年最大的单一解锁项，为美国 eVTOL 飞机建立了飞行员认证和运营框架。资本供给信号（BETA 的 $375M 2022 Series B
              加上同行融资）说明投资者胃口仍在。反向因素也很实在：电池能量密度限制航程和载荷，主要大都会区的垂直起降场和充电基础设施仍不成熟，认证飞行测试的单位成本相对预测收入偏高，The Atlantic 与 The
              Economist 也发布过有分量的反向文章，认为 eVTOL 商业模式在充电和 ATC 基础设施成熟前可能仍然边际。驱动 / 约束表保留了两边论据，避免后续估值只倚赖驱动因素或反向叙事。Agility
              Prime 的防务共同出资，实质降低了 BETA 相对纯民用同行的认证单位成本。GAO-22-105020 航空预测进一步说明，空域整合是多年规划工程，取决于
              FAA、运营商和基础设施投资的协同，而不是任何单一监管决定。
