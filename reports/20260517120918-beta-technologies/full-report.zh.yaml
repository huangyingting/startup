              放眼整个队列，FAA 型号认证才是硬约束，资本不是。Business Insider 在 early 2023 记录了 Joby、Archer 和 Lilium 都已推迟认证目标；Aviation Today
              的商业报道则把该细分描绘为截至 2026 仍处于规模化创收前。The Atlantic 和 The Economist 都发表过反向文章，认为无论 OEM 执行如何，eVTOL
              商业模式本身都很难。Aviation Week 指出 FAA 认证能力是全行业瓶颈，因此同行新增资本并不会加速 BETA 的路径。KPI 快照图 FP003
              突出显示，队列成员中很少有人已经达到批量制造，或拥有多元客户基础。BETA 同样暴露于 FAA 节奏风险，但 AFWERX
