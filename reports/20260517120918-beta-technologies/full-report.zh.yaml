      - number: '3.2'
        title: 产品定位与任务细分重叠
        blocks:
          - type: paragraph
            body: >-
              BETA 的定位与同行队列结构性不同。Joby 和 Archer 都强调城市空中出租车服务，其中 Archer 叠加航司机队合作，Joby 则走自有并运营服务。Wisk
              的自动驾驶优先路线差异最大，时间也最远。Lilium 的高速区域喷气设计技术上激进，但商业上尚未证明。BETA 横跨货运（UPS Flight Forward）、防务（AFWERX Agility
              Prime）、区域电动机体（CX300）、客运 UAM（Blade）和新兴医疗 EMS 通道。任务细分矩阵表捕捉了这种重叠。关键在于，BETA 的组合宽度来自在通用航电和推进系统上同时提供常规起降电动飞机和
              eVTOL 变体；主要队列中没有同行匹配这种双平台方法。双平台排序很重要，因为 CX300 可能先按现有 Part 23 框架完成认证，带来收入和运营数据，从而降低后续 eVTOL 变体风险。作者编码的定位象限图
