  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值锚点与建议理由
        blocks:
          - type: paragraph
            body: >-
              BETA 最近一次有定价的估值锚，是 June 2022 的 $375M Series B，投后估值约 $4B（PitchBook、Axios、CNBC、Wikipedia BETA，以及失效链接
              WSJ、Verge、Business Insider）。SEC EDGAR 没有检索到 BETA 的公开文件，因此没有经审计的估值参照。CNBC April 2024 对 Vermont 工厂的报道，支撑
              2026 年「认证 + 交付」投资逻辑下的制造就绪判断。推荐摘要表 TV001 列出建议立场（继续研究）、置信度（中）、估值立场（未知——2022 锚点已过时）、建议持有期（18-24
              个月，与认证顺序匹配）、主要投资逻辑破裂点（认证延误 >2 个季度且指定客户取消），以及下一步必做尽调（管理层认证包 + Series C 条款清单）。推荐逻辑图 FV001 把决策理由从一手证据（2022
              锚点、SEC 文件缺席、2024 FAA 规则、客户名单集中、反向立场材料）一路追溯到继续研究立场。核心理由很简单：2026 年披露还不足以支持可以出手的投资决策，但认证路径和客户名单的底座足够真实，值得在未来
              18-24 个月继续跟踪。
