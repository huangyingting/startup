              Forbes（保留失效链接）、Bloomberg（付费墙）、Reuters（付费墙）、TechCrunch（失效）和 Crunchbase News（失效）佐证。Axios 与 CNBC 均报道投后估值约
              $4B，由 Fidelity Management 领投，Amazon Climate Pledge Fund 参投，TPG 和早期战略投资者同列。PitchBook 档案汇总显示，Series A、A1、B
              和此前轮次累计融资超过 $800M。Crunchbase（付费墙）与 Bizjournals（付费墙）佐证轮次数量和投资者名单。Wikipedia 的 BETA 条目和 Kyle Clark
              页面为创始人持股和时间线提供背景。因此，资本结构充足性判断（表 TI004）建立在聚合器数据和 2022 年媒体报道之上，隐含假设是 2022 Series B 到 2026 报告日之间没有新的定价轮次完成。截至
