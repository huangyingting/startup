              BETA 最醒目的融资事件是 June 7, 2022 公布的 $375 million Series B。Axios、CNBC 和 Forbes 的报道共同指向约 $4 billion
              的投后估值。披露的主要投资方包括 Amazon 的 Climate Pledge Fund、Fidelity、Baillie Gifford 和 United Airlines Ventures；其中
