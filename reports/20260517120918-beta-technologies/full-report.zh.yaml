      - number: '2.3'
        title: 买家、预算负责人和需求漏斗
        blocks:
          - type: paragraph
            body: >-
              BETA 的近期买家群体中，预算负责人异常清晰。United Airlines（航司 CFO）、UPS Flight Forward（物流 P&L）、Blade（UAM 运营商 P&L）、AFWERX /
              U.S. Air Force（军方项目办公室）以及新兴医疗后送运营商（医院系统和保险方），各自都有与认证、垂直起降场可用性或项目里程碑挂钩的已融资采用触发点。这比模糊的 UAM TAM
              更健康。行业范围内，从市场兴趣到确定订单、认证、交付和投入运营的采用漏斗仍很窄；截至 2026，所有开发商合计只有少量飞机进入创收服务。漏斗图量化了这个跌落，并显示 BETA 的商业动能必须在哪里转化：先把
              LOI 规模转成确定订单，再穿过型号认证。Wikipedia 的 United Airlines 页面记录了该航司对多家 eVTOL 供应商订单的敞口，说明买方行为偏好竞争性供应商集合，而不是单一来源承诺。
