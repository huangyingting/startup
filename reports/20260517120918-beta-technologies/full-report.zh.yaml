            body: >-
              BETA Technologies 由 Kyle Clark 于 2017 年创立。Clark 是工程师，也曾是竞技特技飞行员；他的履历见于个人 Wikipedia 条目和公司团队页。Clark 目前仍担任
              CEO，BETA
              公开团队页还列出工程、运营、商业等高级领导岗位，但留存来源没有把完整高管名单和职衔标准化。治理披露薄得多：已审阅的公开来源没有给出当前董事会、委员会章程或投资者控制权文件。治理缺口是后续章节沿用的最大领导层尽调问题。2022
              至 2024 年留存报道仍以创始人主导为主线，检索线索没有出现领导层变动公告。
