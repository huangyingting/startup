              变现爬坡提供了明确财务风险框架。Aviation Today 的商业报道也佐证该细分仍未规模化创收。Aviation Week 对 AAM 的框定进一步强化了队列在多年周期中资本密集的判断，因此任何 2026
              现金充足性观点都必须假设公司继续外部融资，而不是靠自有现金流运转。重大披露缺口——手头现金、月度烧钱、毛利率、以 USD 计的积压订单、资本开支时间表，以及可转债 / 债务工具——都列入公开财务缺口表
