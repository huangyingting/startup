    sections:
      - number: '1.1'
        title: 身份、产品范围与运营足迹
        blocks:
          - type: paragraph
            body: >-
              BETA Technologies 将自己定位为总部位于 South Burlington, Vermont 的美国电动飞机制造商，面向货运、客运和医疗物流任务，同时开发 ALIA-250 常规起降版本和
              ALIA eVTOL 版本。公司官网与 Wikipedia 对 South Burlington 基地的描述一致；CNBC 在 April 2024 的报道和 Vermont 本地媒体进一步确认，BTV
              机场园区已有一座专门建设、面积 188,500 square-foot 的制造设施。BETA
              的使命表述强调靠飞机和充电基础设施共同推动交通电动化，说明它走的是垂直整合路线，而不是单纯卖机体。现有公开来源足以确认公司身份，并让后续章节都围绕这家总部在 Vermont、双机型、私营电动飞机公司展开。
