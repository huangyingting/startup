            body: >-
              投资逻辑 / 反向逻辑表 TV002 把每根支柱（垂直整合、CTOL 优先的认证顺序、AFWERX 防务锚点、FAA 2024 Powered-Lift 规则、TAM 预测、Vermont
              工厂、战略投资方、四类客户名单、人员执行深度、充电网络）与最强反向点逐一配对（资本开支负担、货运节奏未验证、防务路径规模受限、认证时点滑坡、TAM
              膨胀、爬坡风险、投资方集中、客户集中、人才变薄、充电中断）。MarketsandMarkets、Statista 和 Grand View Research 提供分析师市场数据口径下的 TAM
              参照；Atlantic Council 和 Aviation Today 提供需求拉动和近认证节奏参照；Aviation Week 与 FlightGlobal 交叉印证成熟度。乐观 / 基准 / 悲观情景表
              TV003 捕捉各情景下的认证、Series C 和客户结果；估值敏感性图 FV002 量化隐含估值区间（乐观 $5.5B / 基准 $4B / 悲观 $2.5B）。反向立场来源（Economist
              Schumpeter、MoneyWeek 泡沫文章、Robb Report 可行性、FM 认证挑战、Air Current 安全）合起来支撑一个有分量的悲观情景。
