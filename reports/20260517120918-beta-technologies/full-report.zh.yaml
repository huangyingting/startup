            body: >-
              按 beta.team 披露，BETA 的产品面是垂直整合的：机体（ALIA CX300 常规起降加 ALIA-A250 eVTOL）、自研推进电机、自研电池、自研航电和飞控，以及 Charge Cube
              移动快充硬件产品和配套多站点充电网络。Wikipedia 的 BETA 条目和行业媒体报道（FlightGlobal、AOPA、Flying Magazine）佐证了双机体组合。团队页证明 BETA
              在推进、电池和航电上都有内部工程能力。beta.team 的历史 About、ALIA、Charge
              Cube、充电网络和新闻页面（现保留为失效历史官方引用）描述了同样的垂直整合技术定位。产品模块资产矩阵（TE001）枚举每个模块及其 2026
              状态；产品架构栈图（FE001）展示这些层如何组合成一个任务服务产品。关键在于，BETA 拥有其他 eVTOL OEM 通常会找合作伙伴完成的层，尤其是充电硬件；这构成本章垂直整合洞察的技术基础。与 Joby
              的倾转旋翼架构和 Wisk 的自动驾驶优先架构相比，BETA 是队列中唯一在自有地面基础设施之外，还提供 CTOL+eVTOL 成对机体栈的公司。这种结构性差异就是本章的论证方向；后续小节会用运营架构、监管框架和
              2026-2027 路线图检验它。
