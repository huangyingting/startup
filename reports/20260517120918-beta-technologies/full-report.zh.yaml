      - number: '2.2'
        title: 市场规模测算：分析师区间与方法限制
        blocks:
          - type: paragraph
            body: >-
              BETA 可触达市场没有单一经审计口径。MarketsandMarkets、Statista、Grand View Research、Roland Berger 和 McKinsey 都发布了 eVTOL 或
              UAM 预测：到 2030 年从低个位数十亿美元到超过 $30B 不等，最长周期情景到 2050 年达到 $90B。5x
              区间来自方法差异：自下而上的机体预测与自上而下的服务收入预测给出不同数字，而且都高度依赖认证速度假设。留存来源没有披露 BETA 专属的单一经审计 SAM。市场规模金字塔图把分析师 TAM 逐层压到作者估计的
              SAM 和 SOM，底层依据是 BETA 已宣布的 LOI 订单簿；区间图则保留彼此冲突的分析师估算，便于后续章节压力测试任何单一锚点。Sifted、GreenBiz 和 Aviation Week
              补充了欧洲需求和可持续性视角，强化了分析师规模区间高端的定性论据，但没有解决方法缺口。
