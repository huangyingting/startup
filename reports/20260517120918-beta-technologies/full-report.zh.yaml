              则明确展示，大额股权融资与无法建模的现金位置之间存在结构性错配。2026
              年的合成图景是：一个由多流收入模型支撑、估值数十亿美元且健康的公司，但现金充足性和单位经济不透明，实质限制了任何超出「观察」或「继续研究」建议的承销。
