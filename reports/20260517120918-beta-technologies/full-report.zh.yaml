          - type: paragraph
            body: >-
              本章将竞争队列定义为：已融资、面向未来几年内美国或美国邻近型号认证的电动机体 OEM。BETA 的直接可比同行是 Joby Aviation、Archer Aviation、Wisk Aero 和 Lilium
              GmbH。Joby 与 Archer 在 NYSE 上市，累计融资数十亿美元，并有活跃的 FAA 型号认证项目。Wisk 是 Boeing 子公司，优先推进自动驾驶 eVTOL
              设计；这消除了一条投资者融资风险向量，也拉长了认证周期。Lilium 在 Nasdaq 上市，但根据 Wikipedia 和其自身（现已失效）网站，2024-2025 年面临持续经营不确定性。按
              Wikipedia 的 eVTOL 目录，全球还有数十个更小项目，但主要队列占据资本、认证投入和客户注意力。截至 2024 Vermont 工厂开业，BETA
              是主要队列中唯一能看到量产工装的私营成员，也是少数任务组合横跨多细分（货运、防务、区域、客运）而非单一细分的成员之一。
