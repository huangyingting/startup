  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、细分赛道与替代方案
        blocks:
          - type: paragraph
            body: >-
              承销 BETA Technologies 时，市场边界应定义为 BETA 的 ALIA-250 常规起降机体和 ALIA eVTOL 机体能够服务的新飞机平台和服务集合。Wikipedia 的 eVTOL 与
              Advanced Air Mobility
              条目共同将其界定为一个快速兴起的类别，与更广义的城市空中交通（UAM）服务、区域电动航空和军用垂直升力重叠。可替代方案包括传统直升机包机、短途区域喷气机和地面物流，这决定了应排除的相关支出。Aviation
              Week 与 Aviation Today 的报道把 AAM 描述为一个有意义的航空航天邻近领域，而不是独立行业。这里选择的边界覆盖 eVTOL/eCTOL 机体销售、UAM
              客运服务、货运中程航班、防务电动垂直升力和医疗 EMS 任务——这些都是 BETA 通过官网和飞机页面明确瞄准的细分赛道。Wikipedia 的 electric aircraft 和
              battery-electric-aircraft 页面进一步界定更广义的动力总成类别，powered-lift 条目则说明 FAA 为什么需要创建新的适航类别来处理这项技术。
