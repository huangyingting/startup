              Airlines passenger LOI not converting, Blade operator pilot ending, Fidelity (lead investor) markdown or
              follow-on pass, Amazon CPF strategic-investor exit, DoD budget or policy shift, Vermont state site/permit
              issue, charging-network site cancellations, and AAM cohort demand slippage. People-execution risk register
              table TR004 catalogues aerospace engineering talent thinning, senior leadership transition, manufacturing
              scale-up execution risk at Vermont, customer-facing team buildout lag, cert-team capacity bottleneck,
              field-operations team buildout, and founder/CEO transition. Risk heatmap figure FR001 scores
              probability/impact/velocity across regulatory, operational, partner, people, demand dimensions. The
              chapter's posture is that customer-roster concentration combined with cert-timing risk is the
              highest-impact 2026 vector; if a single named-customer exit coincides with a cert slip, the cascade
