            body: >-
              Mitigation and kill-criteria table TR005 catalogues BETA's available mitigations (vertically integrated
              charging network, CTOL-first cert sequencing, in-house Vermont factory, defense customer anchor) and the
              kill-criteria that would break the 2026-2027 thesis (cert-delay >2 quarters in 2027, single named-customer
              cancellation, Fidelity lead-investor markdown, flight-test fatal incident). The valuation chapter consumes
              these kill-criteria directly as thesis-break triggers. The mitigation logic is that BETA's vertical
              integration (airframe + charging + manufacturing + defense customer anchor) reduces partner-dependency
              risk vs peer cohort, which in turn reduces the cascade-probability of the cert-timing slip into
              burn-coverage stress. However, mitigations do not eliminate the central cohort risks (regulator capacity,
              battery energy density, demand slippage); they only narrow the BETA-specific incremental risk relative to
              Joby/Archer/Wisk. The diligence reader should weight these mitigations modestly: they shift relative
              probability across the cohort, but the absolute probability of a 2026-2027 cert slip remains the dominant
              risk for the BETA thesis.
