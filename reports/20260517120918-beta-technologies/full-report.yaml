      - number: '1.2'
        title: Founders, leadership, and governance visibility
        blocks:
          - type: paragraph
            body: >-
              BETA Technologies was founded in 2017 by Kyle Clark, an engineer and former competitive aerobatic pilot
              whose biography is documented in his Wikipedia entry and the company's team page. Clark continues to serve
              as chief executive officer, and BETA's public team page lists additional senior leadership positions
              across engineering, operations, and commercial roles, although retained sources do not normalize a
              complete executive roster with named titles. Governance disclosure is much thinner: the public sources
              reviewed do not surface a current board of directors, committee charters, or investor control-rights
              documents. That gap is the single largest leadership-side diligence ask carried forward into later
              chapters. The founder-led structure remains the dominant narrative in retained 2022 to 2024 reporting,
              with no leadership-change announcements surfaced by the search trail.
            claimRefs:
              - CO002
