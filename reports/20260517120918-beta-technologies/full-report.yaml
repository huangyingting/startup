  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Cohort definition and lead competitors
        blocks:
          - type: paragraph
            body: >-
              For this chapter the competitive cohort is defined as funded electric airframe OEMs targeting US or
              US-adjacent type certification within the next several years. BETA's directly comparable peers are Joby
              Aviation, Archer Aviation, Wisk Aero, and Lilium GmbH. Joby and Archer are public on NYSE with billions in
              cumulative funding and active FAA type certification programs. Wisk is a Boeing subsidiary pursuing
              autonomous-first eVTOL designs, which removes one investor-funding-risk vector and also extends the
              certification horizon. Lilium is publicly listed on Nasdaq but faced going-concern uncertainty during
              2024-2025 per Wikipedia and its own (now broken) website. Several dozen additional smaller programs exist
              globally per Wikipedia's eVTOL catalogue, but the lead cohort dominates capital, certification effort, and
              customer attention. BETA is the only private member of the lead cohort with serial-production tooling
              visible as of the 2024 Vermont factory opening, and is one of the only members with a multi-segment
              mission mix (cargo, defense, regional, passenger) rather than a single-segment focus.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP022
          - type: table
            tableRef: TP001
            claimRefs:
