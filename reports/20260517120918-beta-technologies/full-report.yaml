  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, segments, and substitutes
        blocks:
          - type: paragraph
            body: >-
              For underwriting BETA Technologies the market boundary is the set of new aircraft platforms and services
              that BETA's ALIA-250 conventional takeoff and ALIA eVTOL airframes can serve. Wikipedia's eVTOL and
              Advanced Air Mobility entries together frame this as a fast-emerging category that overlaps with broader
              urban air mobility (UAM) services, regional electric aviation, and military vertical lift. Substitution
              candidates are conventional helicopter charter, short-haul regional jets, and ground logistics, which sets
              the relevant excluded spend. Aviation Week and Aviation Today coverage frame AAM as a meaningful aerospace
              adjacency rather than a separate industry. The boundary chosen here covers eVTOL/eCTOL airframe sales, UAM
              passenger services, cargo middle-mile flights, defense electric vertical lift, and medical EMS missions —
              the segments BETA explicitly targets via its homepage and aircraft pages. Wikipedia's electric aircraft
              and battery-electric-aircraft pages further frame the broader powertrain category, while the powered-lift
              entry highlights why FAA created a new airworthiness class to handle this technology.
            claimRefs:
