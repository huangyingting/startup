      - number: '1.3'
        title: Capital formation, investor mix, and public-sector partnerships
        blocks:
          - type: paragraph
            body: >-
              BETA's headline financing event is its $375 million Series B announced on June 7, 2022, covered by Axios,
              CNBC, and Forbes, which together place the post-money valuation at approximately $4 billion. Disclosed
              lead investors include Amazon's Climate Pledge Fund, Fidelity, Baillie Gifford, and United Airlines
              Ventures, the last of which doubles as a conditional customer for up to 200 aircraft. PitchBook and
              Wikipedia coverage place BETA's cumulative capital raised at roughly $800 million through 2024, although
              retained public sources do not refresh that number with a 2025-2026 round disclosure. Public-sector
              partnerships materially complement the equity stack. BETA is a contractor under the U.S. Air Force's
              AFWERX Agility Prime program, with GovCon and Department of Defense coverage documenting funding for
              flight testing and military airworthiness work that lowers the unit cost of certification activities.
