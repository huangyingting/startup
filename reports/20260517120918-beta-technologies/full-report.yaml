chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, product scope, and operating footprint
        blocks:
          - type: paragraph
            body: >-
              BETA Technologies presents itself as a U.S. electric aircraft manufacturer headquartered in South
              Burlington, Vermont, building both the ALIA-250 conventional takeoff and landing variant and the ALIA
              eVTOL variant for cargo, passenger, and medical logistics missions. The company's own website and
              Wikipedia coverage align on the South Burlington base, while April 2024 CNBC and local Vermont coverage
              confirm a purpose-built 188,500 square-foot manufacturing facility on the BTV airport campus. BETA's
              mission language emphasizes electrifying transportation through both airframes and charging
              infrastructure, signalling a vertically integrated approach rather than a pure airframe play. Retained
              public sources cover the company's identity well enough to anchor every downstream chapter on a single
              Vermont-headquartered, dual-airframe, private electric aircraft company.
