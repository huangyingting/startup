              publicly priced), and Lilium (October 2024 insolvency — cautionary cohort comparable). Lilium's insolvency
              is the strongest cautionary tale: a well-capitalized eVTOL OEM with a strong technical narrative still
              failed because cert timing and capital-stack adequacy did not converge. Valuation-return-range figure
              FV003 illustrates the bear/base/bull ranges in $B implied post-money valuation, anchored to the 2022 $4B
              Series B. The structural read: BETA's 2022 $4B anchor sits roughly in line with where Joby and Archer have
              traded in 2024-2026 by enterprise-value bands, but its private-market discount and pre-cert posture make a
              direct comparable mark unsuitable. The 18-24 month hold-period maps to 2026-2027 cert sequencing, which is
              the gating event for any markup to the 2022 anchor and which is also the gating event for Series C
