      - number: '2.2'
        title: 'Sizing the market: analyst range and methodology limitations'
        blocks:
          - type: paragraph
            body: >-
              There is no single audited sizing of BETA's addressable market. MarketsandMarkets, Statista, Grand View
              Research, Roland Berger, and McKinsey all publish eVTOL or UAM forecasts ranging from low single-digit
              billion dollars by 2030 to over $30B by 2030 and $90B by 2050 in the longest-horizon scenarios. The 5x
              range is methodology-dependent: bottom-up airframe forecasts give different numbers than top-down
              service-revenue projections, and all materially rely on assumptions about certification velocity. Retained
              sources do not disclose a single audited SAM figure for BETA specifically. The sizing pyramid figure
              layers analyst TAM down to author-estimated SAM and SOM grounded in BETA's announced LOI book, and the
              range chart preserves the conflicting analyst estimates so downstream chapters can stress-test any single
              anchor. Sifted, GreenBiz, and Aviation Week add a European demand and sustainability lens that thickens
              the qualitative case for the higher end of analyst sizings without resolving the methodology gap.
