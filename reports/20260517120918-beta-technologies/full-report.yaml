  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation anchor and recommendation rationale
        blocks:
          - type: paragraph
            body: >-
              BETA's last priced valuation anchor is the June 2022 $375M Series B at approximately $4B post-money
              (PitchBook, Axios, CNBC, Wikipedia BETA, plus broken-link WSJ, Verge, Business Insider). SEC EDGAR returns
              no public filings for BETA, so there is no audited valuation reference. CNBC's April 2024 Vermont factory
              coverage anchors manufacturing-readiness for the 2026 cert-and-deliver thesis. The recommendation summary
              table TV001 catalogues the recommended stance (research-more), confidence (medium), valuation stance
              (unknown — 2022 anchor stale), recommended hold-period (18-24 months aligned to cert sequencing), primary
              thesis-break (cert slip >2 quarters combined with named-customer cancel), and required next-step diligence
              (management cert-pack + Series C term sheet). The recommendation-logic figure FV001 makes the decision
              rationale traceable from primary evidence (2022 anchor, SEC filing absence, 2024 FAA rule, concentrated
              customer roster, adverse-stance corpus) to the research-more stance. The central rationale: 2026
              disclosure is too thin for a commit-grade investment decision, but the cert-pathway and customer-roster
              foundation is real enough to keep the file open through the next 18-24 months.
