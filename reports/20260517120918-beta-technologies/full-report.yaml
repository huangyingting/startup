      - number: '3.2'
        title: Product positioning and mission-segment overlap
        blocks:
          - type: paragraph
            body: >-
              BETA's positioning is structurally different from the peer cohort. Joby and Archer both emphasize urban
              air taxi service, with Archer adding airline-fleet partnerships and Joby pursuing own-and-operate service.
              Wisk's autonomy-first stance is the most differentiated and the longest-dated. Lilium's high-speed
              regional jet design was technically ambitious but commercially unproven. BETA spans cargo (UPS Flight
              Forward), defense (AFWERX Agility Prime), regional electric airframes (CX300), passenger UAM (Blade), and
              an emerging medical EMS lane. The mission-segment matrix table captures this overlap. Crucially, BETA's
              portfolio breadth comes from offering a conventional take-off electric aircraft and an eVTOL variant on
              common avionics and propulsion — no peer in the lead cohort matches this dual-platform approach. The
              dual-platform sequencing matters because CX300 likely certifies first under existing Part 23 frameworks,
              generating revenue and operational data that de-risks the later eVTOL variant. Author-coded positioning
              quadrant figure FP001 visualizes mission breadth against manufacturing readiness, and capability map FP002
              catalogues distinct cohort capabilities.
