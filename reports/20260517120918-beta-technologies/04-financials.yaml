- id: section-2
  title: Revenue streams and 2026 monetization paths
  body: 'BETA''s homepage and aircraft page show at least two product revenue streams (CX300 conventional
    take-off and ALIA eVTOL) plus a charging-network service revenue stream (Charge Cube). Customer evidence
    supports four distinct payer paths: cargo operators (UPS Flight Forward), passenger UAM operators
    (Blade), airlines (United Airlines LOI), and the US Air Force via AFWERX (GovCon Wire, AFWERX, DoD
    release). Aviation Today''s commercial coverage frames the industry as still pre-revenue at scale
    in 2026, so revenue is likely lumpy and tied to certification milestones. Statista and MarketsandMarkets
    provide cohort-level revenue benchmarks. FAA''s Air Taxis regulatory page determines where revenue
    ultimately accrues between OEM, operator, and infrastructure provider. The revenue-model bridge figure
    FI001 maps payer paths back to OEM and service P&L; the revenue-streams table TI001 enumerates the
    streams and pricing table TI002 surfaces disclosed pricing signals.'
  claimRefs:
  - CI006
  - CI007
  - CI019
  - CI020
  - CI021
  - CI022
  - CI030
  - CI031
  - CI033
  - CI035
