company:
  name: BETA Technologies
chapter:
  number: 4
  title: Financials
  summary: Documents BETA's public capital stack — $375M 2022 Series B at ~$4B post-money, cumulative
    $800M+ raised, no public SEC filings — and identifies the four-plus revenue streams (cargo, eVTOL,
    charging, AFWERX) while preserving the material disclosure gaps (cash, burn, gross margin) that constrain
    2026 underwriting. Adverse industry voices on unit economics are preserved.
sections:
- id: section-1
  title: 'Capital stack: rounds, lead investors, and valuation anchors'
  body: BETA Technologies' last priced round was a $375M Series B closed in June 2022, confirmed by Axios,
    CNBC, and corroborated by Forbes (broken link retained), Bloomberg (paywalled), Reuters (paywalled),
    TechCrunch (broken), and Crunchbase News (broken). Axios and CNBC both report a post-money valuation
    of approximately $4B with Fidelity Management leading and Amazon Climate Pledge Fund participating
    alongside TPG and earlier strategic investors. PitchBook's profile aggregates cumulative raised at
    above $800M across Series A, A1, B, and prior rounds. Crunchbase (paywalled) and Bizjournals (paywalled)
    corroborate the round count and investor list. Wikipedia's BETA article and Kyle Clark page contextualize
    founder ownership and chronology. The capital-stack adequacy view (table TI004) therefore rests on
    aggregator data plus 2022 press, with the implicit assumption that no further priced round has cleared
    between the 2022 Series B and the 2026 reporting date. As of 2026, SEC EDGAR returns no registered
    public filings for BETA, consistent with private-company status, which is the central reason this
    chapter cannot anchor unit economics or cash position on audited data and instead relies on press
    reports and aggregator profiles for the runway and capital-stack picture.
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  - CI008
  - CI009
  - CI010
  - CI011
  - CI014
