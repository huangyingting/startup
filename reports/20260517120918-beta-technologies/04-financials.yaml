- id: section-3
  title: Unit economics, capex, and operating burn
  body: Public information on BETA's unit economics is limited. CNBC's April 2024 coverage of the Vermont
    188,500 sq ft factory plus BETA's homepage materials evidence capital deployment on the order of low-to-mid
    hundreds of millions on manufacturing capacity alone. LinkedIn shows headcount in the ~1,000 range
    and BETA's careers page evidences continued aggressive hiring, which together imply a headcount-driven
    OPEX burn rate of nine figures annually. AFWERX/DoD co-funding offsets a portion of certification
    spend per AFWERX, DoD, and Air Force news sources, and GovCon Wire reporting confirms the AFWERX contract
    is a tangible revenue and cost-offset pathway. FlightGlobal and Aviation Week frame industry capital-intensity
    expectations relevant to BETA's burn-versus-revenue ramp. Unit-economics table TI003 catalogues the
    cost drivers and the unit-economics bridge figure FI002 shows BOM, labor, fixed-cost absorption, and
    cert amortization flowing into ASP and operating margin. None of these numbers are BETA-disclosed
    and the chapter is explicit about that throughout.
  claimRefs:
  - CI015
  - CI016
  - CI017
  - CI023
  - CI024
  - CI027
  - CI028
  - CI029
  - CI032
  - CI034
  tableRefs:
  - TI003
  figureRefs:
  - FI002
  - FI004
- id: section-4
  title: Adverse views, disclosure gaps, and 2026 financial-risk frame
  body: 'The Atlantic and The Economist both publish adverse pieces arguing eVTOL unit economics may be
    marginal until charging and ATC infrastructure mature, an explicit financial-risk frame relevant to
    BETA''s 2026 monetization ramp. Aviation Today''s commercial coverage corroborates that the segment
    is still pre-revenue at scale. Aviation Week''s AAM framing further reinforces that the cohort is
    capital-intensive on a multi-year horizon, so any 2026 cash adequacy view must assume continued external
    financing rather than self-funded operations. The material disclosure gaps — cash on hand, monthly
    burn, gross margin, backlog in USD, capex schedule, and convertible/debt instruments — are catalogued
    in public-financial-gaps table TI005. Financial-estimate range FI003 preserves the wide plausible
    2026 revenue range and last-private-valuation anchor without collapsing them into a point estimate,
    and capital-intensity figure FI004 makes explicit the structural mismatch between sizable equity raises
    and an unmodelable cash position. The combined picture for 2026: a healthy multibillion-dollar valuation
    supported by a multi-stream revenue model, but opaque cash adequacy and unit economics that materially
    constrain any underwriting beyond a ''track'' or ''research-more'' recommendation.'
  claimRefs:
