  - type: missing-source
    severity: material
    topic: Current board roster and governance map are not publicly disclosed
    missingEvidence: Current directors, observer rights, committee assignments, and investor control-rights documents.
    whyItMatters: >-
      Governance visibility is required for valuation and risk chapters, and retained public sources do not surface a
      current board roster.
    diligencePath: Request the latest board composition, voting agreement, and investor-rights schedule from management.
    relatedQuestionRefs:
      - QO020
    relatedTableRefs:
      - TO002
  - type: private-evidence-only
    severity: material
    topic: Latest post-money valuation remains undisclosed since 2022
    missingEvidence: Updated 409A or secondary-market price; 2025-2026 round disclosure; valuation refresh memo.
    whyItMatters: Stale 2022 valuation makes entry pricing impossible to underwrite without management input.
    diligencePath: Obtain the latest valuation memo, 409A report, and any 2025-2026 secondary-market marks.
    relatedQuestionRefs:
      - QO022
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Revenue, deliveries, and backlog conversion are not publicly disclosed
    missingEvidence: 2025-2026 revenue run-rate, recognized revenue, aircraft deliveries to date, backlog conversion schedule.
    whyItMatters: Commercialization pace cannot be assessed without revenue or delivery counts.
    diligencePath: Request CFO-signed revenue bridge, delivery log, and backlog-to-revenue conversion schedule.
    relatedQuestionRefs:
      - QO020
    relatedTableRefs:
      - TO001
  - type: enumeration-incomplete
    severity: minor
    topic: Leadership and founder table omits a full named executive bench
    missingEvidence: Named CTO, CFO, COO, GC, and any independent directors with backgrounds.
    whyItMatters: Key-person diligence requires more granular leadership disclosure than retained sources provide.
    diligencePath: Pull the latest management deck, LinkedIn org chart, and any press releases naming new hires.
