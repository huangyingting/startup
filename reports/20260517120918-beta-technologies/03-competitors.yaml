- id: section-4
  title: Capital position, valuation, and moat narrative
  body: Per Axios and PitchBook, BETA's 2022 Series B priced the company near $4B post-money, broadly
    comparable to Joby's pre-IPO range and Archer's de-SPAC enterprise value. Cumulative funding across
    the lead cohort is multi-billion. BETA's differentiated moat narrative — owning both the airframe
    and the charging network — is unique in the cohort. Joby and Archer rely on partner charging; Wisk
    and Lilium do not have a charging-network story. Wikipedia's United Airlines page confirms that buyers
    will source from multiple vendors, so single-vendor monopoly is unlikely; the realistic outcome is
    a small lead set sharing a fragmented market. BETA's manufacturing-and-charging moat plus AFWERX defense
    entanglement give it the strongest claim to durable position among private members of the cohort.
    The moat / risk register table TP004 catalogues each moat claim against credible threats and mitigations
    to make sure the chapter does not lean on positive moat narrative without preserving counterweights
    for valuation work.
