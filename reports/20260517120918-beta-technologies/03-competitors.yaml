company:
  name: BETA Technologies
chapter:
  number: 3
  title: Competitors
  summary: Benchmarks BETA against the lead eVTOL OEM cohort (Joby, Archer, Wisk, Lilium) on product positioning,
    mission-segment overlap, certification milestone progress, and capital stack. BETA's dual-platform
    (CX300 conventional + eVTOL), serial manufacturing in Vermont, integrated charging network, and AFWERX
    co-funded defense work differentiate it from the peer set, while cohort-wide certification slippage
    and a pre-revenue industry as of 2026 frame the shared risk.
sections:
- id: section-1
  title: Cohort definition and lead competitors
  body: For this chapter the competitive cohort is defined as funded electric airframe OEMs targeting
    US or US-adjacent type certification within the next several years. BETA's directly comparable peers
    are Joby Aviation, Archer Aviation, Wisk Aero, and Lilium GmbH. Joby and Archer are public on NYSE
    with billions in cumulative funding and active FAA type certification programs. Wisk is a Boeing subsidiary
    pursuing autonomous-first eVTOL designs, which removes one investor-funding-risk vector and also extends
    the certification horizon. Lilium is publicly listed on Nasdaq but faced going-concern uncertainty
    during 2024-2025 per Wikipedia and its own (now broken) website. Several dozen additional smaller
    programs exist globally per Wikipedia's eVTOL catalogue, but the lead cohort dominates capital, certification
    effort, and customer attention. BETA is the only private member of the lead cohort with serial-production
    tooling visible as of the 2024 Vermont factory opening, and is one of the only members with a multi-segment
    mission mix (cargo, defense, regional, passenger) rather than a single-segment focus.
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP004
  - CP005
  - CP022
  tableRefs:
  - TP001
- id: section-2
  title: Product positioning and mission-segment overlap
  body: BETA's positioning is structurally different from the peer cohort. Joby and Archer both emphasize
    urban air taxi service, with Archer adding airline-fleet partnerships and Joby pursuing own-and-operate
    service. Wisk's autonomy-first stance is the most differentiated and the longest-dated. Lilium's high-speed
    regional jet design was technically ambitious but commercially unproven. BETA spans cargo (UPS Flight
    Forward), defense (AFWERX Agility Prime), regional electric airframes (CX300), passenger UAM (Blade),
    and an emerging medical EMS lane. The mission-segment matrix table captures this overlap. Crucially,
    BETA's portfolio breadth comes from offering a conventional take-off electric aircraft and an eVTOL
    variant on common avionics and propulsion — no peer in the lead cohort matches this dual-platform
    approach. The dual-platform sequencing matters because CX300 likely certifies first under existing
    Part 23 frameworks, generating revenue and operational data that de-risks the later eVTOL variant.
    Author-coded positioning quadrant figure FP001 visualizes mission breadth against manufacturing readiness,
    and capability map FP002 catalogues distinct cohort capabilities.
  claimRefs:
  - CP005
  - CP006
  - CP007
  - CP011
  - CP026
