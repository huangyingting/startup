- id: section-3
  title: Certification race and adverse industry voices
  body: Across the cohort, FAA type certification is the binding constraint, not capital. Business Insider
    documented in early 2023 that all of Joby, Archer, and Lilium had slipped certification targets, and
    Aviation Today's commercial coverage frames the segment as still pre-revenue through 2026. The Atlantic
    and The Economist both published adverse pieces arguing the eVTOL business case is structurally hard
    regardless of OEM execution. Aviation Week notes FAA certification capacity is the industry-wide bottleneck
    — meaning incremental peer capital does not accelerate BETA's path. KPI snapshot figure FP003 highlights
    how few cohort members have hit serial manufacturing or have a diversified customer base. BETA's exposure
    to the same FAA pacing risk is partly mitigated by AFWERX co-funded military airworthiness work, which
    is a separate certification track that builds technical evidence usable in the eventual civilian type-cert
    package.
  claimRefs:
  - CP006
  - CP007
  - CP008
  - CP009
  - CP010
  - CP014
  - CP015
