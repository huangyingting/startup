  topStrengths:
    - >-
      BETA owns both the aircraft platforms and the charging network — a structural moat narrative that Joby, Archer,
      Wisk, and Lilium do not match.
    - >-
      The 188,500 sq ft Vermont factory (opened April 2024) provides serial-production tooling years ahead of most eVTOL
      peers and supports the 2026 production-lead claim.
    - >-
      Named cargo, defense, and passenger customers (UPS Flight Forward, AFWERX / Agility Prime, Blade, United Airlines
      LOI) anchor revenue optionality across multiple segments.
  topRisks:
    - >-
      FAA type-certification timing for CX300 and A250 remains the dominant 2026 risk — Lilium's October 2024 insolvency
      shows what happens when cert and capital-stack adequacy do not converge.
    - >-
      No SEC public filings and no post-2022 refreshed valuation mark means outside investors cannot anchor entry
      pricing from public evidence alone.
    - >-
      Unit economics (ASP, gross margin, plant absorption, AFWERX milestone amounts) are essentially undisclosed;
      serial-production economics remain unproven in public.
  unresolvedGaps:
    - >-
      FAA type-certification clearance dates for ALIA CX300 (CTOL) and ALIA-A250 (eVTOL) and any 2026 milestone
      progression.
    - Exact post-2022 valuation marks, Series C clearance price, 409A history, and any 2025-2026 secondary marks.
    - >-
      Revenue run-rate, gross margin, customer-contract conversion timing (UPS firm purchase order vs. LOI), and AFWERX
      milestone amounts.
    - >-
      Cap-table dilution, liquidation preferences, board composition, governance map, and any debt or
      structured-financing overhang.
