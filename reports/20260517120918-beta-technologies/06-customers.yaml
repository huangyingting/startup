company:
  name: BETA Technologies
chapter:
  number: 6
  title: Customers & Adoption
  summary: BETA's customer-proof spans four operating segments — cargo (UPS Flight Forward), passenger
    UAM (Blade, United LOI), defense (AFWERX/Agility Prime), and emerging medical EMS — plus a strategic-investor
    (Amazon CPF). Defense is the only 2026 active-contract lane; everything else is LOI or operator pilot.
    Retention/repeat/satisfaction is unobservable in 2026 because customer deliveries are pre-cert. The
    customer roster is concentrated by count, geography, and segment, and demand could slip if cert timelines
    slip further.
sections:
- id: section-1
  title: Customer segments and named customer-proof references
  body: 'BETA''s customer-proof roster, as disclosed across beta.team, Blade.com, UPS press (broken-link),
    United investor (broken-link), PR Newswire (broken-link), AFWERX, DoD, Air Force, and GovCon, spans
    four operating segments (cargo middle-mile, passenger UAM, defense, medical EMS) plus a strategic-investor
    lane (Amazon Climate Pledge Fund). UPS Flight Forward anchors cargo, Blade anchors passenger UAM,
    AFWERX/Agility Prime anchors defense, and EMS is emerging via Atlantic Council framing. Wikipedia
    BETA corroborates the named-customer roster; PitchBook aggregates the strategic-partner list. The
    named-customer-proof table TU003 enumerates each customer''s relationship, year first disclosed, and
    corroboration; the segmentation table TU001 maps each segment to its representative customer and 2026
    status. The customer-proof matrix figure FU003 scores BETA''s customer-proof maturity across segment
    dimensions against Joby, Wisk, Archer. The central insight: defense is the only 2026 active-contract
    lane; everything else is LOI or operator pilot.'
  claimRefs:
