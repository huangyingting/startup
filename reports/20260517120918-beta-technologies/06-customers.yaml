- id: section-2
  title: Adoption trajectory, delivery readiness, and operator demand context
  body: BETA's 2026 customer-adoption trajectory, drawn from FlightGlobal, AOPA, CNBC, Aviation Today,
    Federal Register, and BETA's own aircraft page, sequences first flight (2020) → UPS LOI (2021) → Blade
    LOI (2022) → Vermont factory open (2024) → FAA powered-lift final rule (2024) → first CX300 customer
    deliveries (2026 target). Adoption-trajectory table TU002 catalogues these milestones; adoption-funnel
    figure FU002 sketches the rough funnel from interested operators through to first-delivery target.
    Operator demand context comes from Atlantic Council (cargo + defense + UAM pull), The Economist (skepticism
    on demand curve), Statista and MarketsandMarkets (operator-segment TAM through 2030), and Wikipedia
    eVTOL/UAM (operator-segment maturity context). BETA's commercial organization buildout, per LinkedIn
    and careers postings, signals 2026 customer-delivery readiness ramp. Customer-journey-map figure FU001
    walks the discovery → operate → repeat phases that a 2026 BETA customer faces.
  claimRefs:
  - CU009
  - CU011
  - CU012
