  - FU002
- id: section-3
  title: Retention, repeat-usage, satisfaction observability in 2026
  body: 'BETA''s retention / repeat-usage / satisfaction observability is fundamentally limited by its
    pre-certification posture in 2026: with no completed CX300 customer deliveries on record, there is
    no first-delivery completion, no repeat-order signal, no customer NPS, no operating-hours-per-customer,
    and no churn baseline. Retention-table TU004 catalogues these dimensions and marks each as unobservable;
    cohort figure FU004 visualizes this formally with 2026-2028 cohort cells set to 0% retention to document
    that retention is structurally unmeasurable in 2026, not weak. This matters for valuation because
    the standard customer-economics levers (LTV, NPS-driven expansion, repeat-purchase rate) cannot be
    applied to the BETA base in 2026. Conservatively, the customer-roster''s value lives in commitment-quality
    (firm contracts vs LOI) rather than retention-cohort dynamics. The defense customer (AFWERX/Agility
    Prime) is the only 2026 active-contract lane, so it serves as the practical 2026 revenue anchor.'
  claimRefs:
  - CU028
  - CU031
  - CU032
  - CU035
  tableRefs:
  - TU004
  figureRefs:
  - FU004
- id: section-4
  title: Concentration and expansion risk
  body: 'BETA''s customer roster is highly concentrated by named-customer count (UPS, United, Air Force,
    Blade dominate disclosed roster), geography (US-domiciled customers only), and segment mix (cargo
    + defense overweight passenger UAM in 2026). Expansion-risk table TU005 scores each risk dimension.
    Economist and Atlantic Council together frame the adverse case: operator demand may slip in 2026 if
    cert timelines slip further, threatening BETA''s delivery-cadence assumption. UPS dominates the cargo
    lane as a single-customer concentration point, and Wikipedia''s UPS Flight Forward, Blade Air Mobility,
    and Agility Prime articles each individually corroborate this concentration pattern from the operator
    side. The mitigation lever is BETA''s defense customer (AFWERX/Agility Prime), which is contractually
    anchored and not dependent on the same cert path as the eVTOL variant. International expansion is
    not yet disclosed, and second-source cargo or second-source passenger operators have not been announced
    as of 2026, so the diligence implication is that any single-customer headline-risk event (UPS pulling
    back, United stepping away, a single defense contract pause) would translate into a sizable percentage
    of disclosed customer-proof evaporating overnight. The chapter''s overall posture is therefore: customer-proof
    is real but concentrated, retention is unobservable, and the 2026 revenue anchor sits on defense rather
    than commercial cargo or passenger lanes.'
  claimRefs:
  - CU018
  - CU027
  - CU030
  - CU033
  - CU034
  - CU035
