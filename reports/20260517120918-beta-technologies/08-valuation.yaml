company:
  name: BETA Technologies
chapter:
  number: 8
  title: Valuation & Recommendation
  summary: 'BETA''s last priced valuation anchor is the June 2022 $375M Series B at approximately $4B
    post-money. SEC EDGAR returns no public filings, so there is no audited 2026 reference. Recommendation:
    research-more; confidence: medium; valuation stance: unknown given the stale 2022 anchor and pre-cert
    posture. Bull / base / bear scenarios sit at roughly $5.5B / $4B / $2.5B implied. Thesis-break triggers
    (cert slip >2 quarters in 2027 plus named-customer cancel) and kill-criteria (Fidelity markdown, flight-test
    incident, Series C failing) are tracked. The 18-24 month hold-period maps to 2026-2027 cert sequencing.'
sections:
- id: section-1
  title: Valuation anchor and recommendation rationale
  body: 'BETA''s last priced valuation anchor is the June 2022 $375M Series B at approximately $4B post-money
    (PitchBook, Axios, CNBC, Wikipedia BETA, plus broken-link WSJ, Verge, Business Insider). SEC EDGAR
    returns no public filings for BETA, so there is no audited valuation reference. CNBC''s April 2024
    Vermont factory coverage anchors manufacturing-readiness for the 2026 cert-and-deliver thesis. The
    recommendation summary table TV001 catalogues the recommended stance (research-more), confidence (medium),
    valuation stance (unknown — 2022 anchor stale), recommended hold-period (18-24 months aligned to cert
    sequencing), primary thesis-break (cert slip >2 quarters combined with named-customer cancel), and
    required next-step diligence (management cert-pack + Series C term sheet). The recommendation-logic
    figure FV001 makes the decision rationale traceable from primary evidence (2022 anchor, SEC filing
    absence, 2024 FAA rule, concentrated customer roster, adverse-stance corpus) to the research-more
    stance. The central rationale: 2026 disclosure is too thin for a commit-grade investment decision,
    but the cert-pathway and customer-roster foundation is real enough to keep the file open through the
    next 18-24 months.'
  claimRefs:
  - CV001
  - CV002
  - CV003
  - CV004
  - CV005
  - CV006
  - CV007
  - CV008
  - CV021
  - CV034
