- id: section-2
  title: Thesis, anti-thesis, and 2026-2027 scenario analysis
  body: Thesis / anti-thesis table TV002 pairs each thesis pillar (vertical integration, CTOL-first cert
    sequencing, AFWERX defense anchor, FAA 2024 powered-lift rule, TAM forecasts, Vermont factory, strategic
    investors, four-segment customer roster, people-execution depth, charging network) with its strongest
    counter (capex burden, unproven cargo cadence, defense lane volume-limit, cert-timing slip, TAM inflation,
    scale-up risk, investor concentration, customer concentration, talent thinning, charging outage).
    MarketsandMarkets, Statista, and Grand View Research provide the analyst-market-data TAM references;
    Atlantic Council and Aviation Today provide the demand-pull and near-cert-cadence references; Aviation
    Week and FlightGlobal corroborate maturity. Bull/base/bear scenario table TV003 captures the cert
    + Series C + customer outcomes for each scenario; valuation-sensitivity figure FV002 quantifies implied
    valuation ranges ($5.5B bull / $4B base / $2.5B bear). Adverse-stance references (Economist Schumpeter,
    MoneyWeek bubble piece, Robb Report viability, FM cert challenges, Air Current safety) collectively
    support a meaningful bear case.
