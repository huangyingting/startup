- id: section-3
  title: Comparable valuations and valuation-return range
  body: 'Comparable-valuation table TV004 places BETA against Joby Aviation (public NYSE: JOBY, volatile
    cap through 2024-2026), Archer Aviation (public NYSE: ACHR, volatile cap), Wisk Aero (Boeing subsidiary,
    not publicly priced), and Lilium (October 2024 insolvency — cautionary cohort comparable). Lilium''s
    insolvency is the strongest cautionary tale: a well-capitalized eVTOL OEM with a strong technical
    narrative still failed because cert timing and capital-stack adequacy did not converge. Valuation-return-range
    figure FV003 illustrates the bear/base/bull ranges in $B implied post-money valuation, anchored to
    the 2022 $4B Series B. The structural read: BETA''s 2022 $4B anchor sits roughly in line with where
    Joby and Archer have traded in 2024-2026 by enterprise-value bands, but its private-market discount
    and pre-cert posture make a direct comparable mark unsuitable. The 18-24 month hold-period maps to
    2026-2027 cert sequencing, which is the gating event for any markup to the 2022 anchor and which is
    also the gating event for Series C clearance pricing across the full lead-cohort comparable set in
    both private and public markets globally.'
  claimRefs:
  - CV017
  - CV018
  - CV019
  - CV020
  - CV035
  - CV036
  - CV037
  tableRefs:
  - TV004
  figureRefs:
  - FV003
- id: section-4
  title: Thesis-break triggers, investment-KPIs, and final diligence asks
  body: 'Thesis-break and kill-criteria triggers table TV005 catalogues the events that would break the
    2026-2027 thesis: cert slip >2 quarters in 2027, single named-customer cancellation (thesis-break),
    Fidelity (lead investor) markdown, flight-test fatal incident, FAA powered-lift rule revision, Series
    C failing to clear (kill-criteria), founder/CEO transition, Vermont factory shutdown (risk-triggers).
    Investment-KPIs figure FV004 defines the monthly-tracking dashboard for the 2026-2027 hold-period
    (CX300 customer deliveries, ALIA-A250 cert milestones, Vermont factory output, charging-network sites
    deployed, cash runway months, Series C term-sheet status). Final diligence-asks table TV006 enumerates
    the management-pack asks before any commit: live UPS press, live United investor, Series C term sheet,
    cert-pack technical documentation, customer NPS pack, cybersecurity attestation, Vermont factory capex
    plan, cert-team headcount, charging-network site list, founder/CEO succession plan. The chapter''s
    overall valuation posture is research-more with a clear, time-bound diligence path forward.'
  claimRefs:
  - CV038
  - CV039
  - CV040
