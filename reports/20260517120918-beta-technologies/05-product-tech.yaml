- id: section-2
  title: Operating architecture, workflows, and developer-signal evidence
  body: BETA's operating architecture combines aircraft systems (airframe + avionics + flight control),
    powertrain (motors + inverters), energy storage (battery packs + thermal management), and ground infrastructure
    (Charge Cube + multi-site network). BETA's careers page is the developer-signal source confirming
    active hiring across embedded firmware, propulsion control, avionics integration, electrical, and
    mechanical disciplines as of 2026 — evidence that BETA does its own platform software in-house. LinkedIn
    corroborates continued engineering team growth into 2026 consistent with a long-cycle aerospace program.
    Operating workflows (table TE002) include cargo middle-mile (UPS), passenger UAM (Blade), defense
    (AFWERX), and emerging medical EMS, all touching the Charge Cube infrastructure at turnaround. Customer
    workflow figure FE002 walks a representative cargo operator's day-in-the-life through BETA's product
    stack. Architecture comparison against peers (Joby tilt-rotor, Wisk autonomy-first) sits in figure
    FE004 to make BETA's CTOL+eVTOL pairing structurally visible.
  claimRefs:
  - CE003
  - CE004
  - CE010
  - CE013
  - CE021
