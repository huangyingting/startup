company:
  name: BETA Technologies
chapter:
  number: 5
  title: Product & Technology
  summary: BETA's product surface is vertically integrated across ALIA CX300 (CTOL), ALIA-A250 (eVTOL),
    in-house propulsion/batteries/avionics, and the Charge Cube charging-network. The 2024 FAA powered-lift
    integration rule is the central 2026 cert path; CX300 cert sequences first to de-risk the longer eVTOL
    cert package. Battery energy density is the binding technical constraint and the cert-capacity bottleneck
    is shared with the broader cohort.
sections:
- id: section-1
  title: 'Product modules: airframes, powertrain, charging, and software'
  body: BETA's product surface, as disclosed on beta.team, is vertically integrated across airframe (ALIA
    CX300 conventional take-off plus ALIA-A250 eVTOL), in-house propulsion motors, in-house batteries,
    in-house avionics and flight control, and a Charge Cube mobile fast-charging hardware product plus
    an associated multi-site charging network. Wikipedia's BETA article and trade-press coverage (FlightGlobal,
    AOPA, Flying Magazine) corroborate the dual-airframe portfolio. The team page evidences in-house engineering
    across propulsion, batteries, and avionics. The historical About, ALIA, Charge Cube, charging-network,
    and news pages on beta.team (now broken links retained as historical official references) describe
    the same vertically integrated technical positioning. The product-module asset matrix (TE001) enumerates
    each module and its 2026 status; the product-architecture stack figure (FE001) shows how the layers
    compose into a mission-services product. Importantly, BETA owns the layers other eVTOL OEMs typically
    partner for (especially charging hardware), which is the technical basis of the chapter's vertical-integration
    insight. Compared with Joby's tilt-rotor architecture and Wisk's autonomy-first architecture, BETA
    is the only firm in the cohort offering a paired CTOL+eVTOL airframe stack alongside owned ground
    infrastructure. That structural difference is what the chapter argues into; subsequent sections test
    it against operating architecture, regulatory framing, and the 2026-2027 roadmap.
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE005
  - CE006
  - CE007
  - CE008
  - CE009
  - CE018
  - CE020
