- id: section-3
  title: 'Trust, quality, compliance: powered-lift, special airworthiness, safety'
  body: BETA's 2026 compliance posture sits at the intersection of the FAA's October 2024 powered-lift
    integration final rule (Federal Register), FAA Part 135 air taxi operations, FAA special airworthiness
    certification (broken-link reference retained), NTSB electric aircraft safety topic, and the FAA UAS
    / autonomy framework relevant for any future autonomy roadmap. The trust/quality/compliance table
    TE004 catalogues these frameworks and BETA's posture against each. Critical dependency figure FE003
    shows how battery energy density and thermal management cascade up through motor reliability and avionics
    into the type-certification gate and ultimately mission delivery — making explicit that cert is the
    choke point and that battery physics is the binding constraint. Wikipedia's eVTOL article catalogues
    technical-risk vectors (battery thermal runaway, motor failure, vertical-flight control) BETA must
    mitigate, and NTSB plus Federal Register together reinforce that the trust posture is still evolving
    with the new powered-lift rules.
  claimRefs:
  - CE011
  - CE012
  - CE013
  - CE014
  - CE015
  - CE016
  - CE027
  - CE028
  - CE032
  - CE033
  - CE035
  tableRefs:
  - TE004
  figureRefs:
  - FE003
- id: section-4
  title: Roadmap and 2026-2027 development sequencing
  body: BETA's implicit product roadmap, drawn from beta.team's aircraft page and 2024-2026 public coverage,
    sequences CX300 certification first (likely under Part 23 special class), followed by ALIA-A250 eVTOL
    certification under the FAA's 2024 powered-lift integration final rule, with the Charge Cube network
    growing in parallel through 2025-2026. CNBC's April 2024 Vermont factory opening is the manufacturing-readiness
    anchor; Flying Magazine and Aviation Today (broken-link) reference flight-test progression and the
    historical cargo operating-flow respectively. Roadmap table TE005 catalogues the public development-stage
    milestones. The 2026-2027 sequencing matters because CX300 cert-and-deliver provides operational evidence
    and revenue that de-risks the longer eVTOL cert package — a roadmap structure no single-platform peer
    in the cohort offers. Maturity figure FE004 visualizes BETA's relative maturity across CTOL, eVTOL,
    charging, software, and manufacturing dimensions, giving the diligence reader a one-glance summary
    of where BETA sits relative to peers in 2026.
  claimRefs:
  - CE017
  - CE019
  - CE020
  - CE026
  - CE029
  - CE034
