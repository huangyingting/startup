company:
  name: BETA Technologies
chapter:
  number: 1
  title: Company Overview
  summary: BETA Technologies is a private South Burlington, Vermont electric aircraft manufacturer founded
    in 2017 by Kyle Clark, building the ALIA-250 eCTOL and ALIA eVTOL airframes. Retained public sources
    support a 2022 $375M Series B at roughly $4B valuation, approximately $800M cumulative raised, more
    than 1,000 employees, an April 2024 Vermont manufacturing factory, marquee LOI from United and UPS,
    and active AFWERX Agility Prime engagement. The main open items are a refreshed valuation, board roster,
    and current revenue disclosures.
sections:
- id: section-1
  title: Identity, product scope, and operating footprint
  body: BETA Technologies presents itself as a U.S. electric aircraft manufacturer headquartered in South
    Burlington, Vermont, building both the ALIA-250 conventional takeoff and landing variant and the ALIA
    eVTOL variant for cargo, passenger, and medical logistics missions. The company's own website and
    Wikipedia coverage align on the South Burlington base, while April 2024 CNBC and local Vermont coverage
    confirm a purpose-built 188,500 square-foot manufacturing facility on the BTV airport campus. BETA's
    mission language emphasizes electrifying transportation through both airframes and charging infrastructure,
    signalling a vertically integrated approach rather than a pure airframe play. Retained public sources
    cover the company's identity well enough to anchor every downstream chapter on a single Vermont-headquartered,
    dual-airframe, private electric aircraft company.
  claimRefs:
  - CO001
  - CO004
  - CO005
  - CO011
  - CO012
  - CO020
  - CO026
  tableRefs:
  - TO001
- id: section-2
  title: Founders, leadership, and governance visibility
  body: 'BETA Technologies was founded in 2017 by Kyle Clark, an engineer and former competitive aerobatic
    pilot whose biography is documented in his Wikipedia entry and the company''s team page. Clark continues
    to serve as chief executive officer, and BETA''s public team page lists additional senior leadership
    positions across engineering, operations, and commercial roles, although retained sources do not normalize
    a complete executive roster with named titles. Governance disclosure is much thinner: the public sources
    reviewed do not surface a current board of directors, committee charters, or investor control-rights
    documents. That gap is the single largest leadership-side diligence ask carried forward into later
    chapters. The founder-led structure remains the dominant narrative in retained 2022 to 2024 reporting,
    with no leadership-change announcements surfaced by the search trail.'
  claimRefs:
  - CO002
  - CO003
  - CO030
  - CO034
  tableRefs:
  - TO002
- id: section-3
  title: Capital formation, investor mix, and public-sector partnerships
  body: BETA's headline financing event is its $375 million Series B announced on June 7, 2022, covered
    by Axios, CNBC, and Forbes, which together place the post-money valuation at approximately $4 billion.
    Disclosed lead investors include Amazon's Climate Pledge Fund, Fidelity, Baillie Gifford, and United
    Airlines Ventures, the last of which doubles as a conditional customer for up to 200 aircraft. PitchBook
    and Wikipedia coverage place BETA's cumulative capital raised at roughly $800 million through 2024,
    although retained public sources do not refresh that number with a 2025-2026 round disclosure. Public-sector
    partnerships materially complement the equity stack. BETA is a contractor under the U.S. Air Force's
    AFWERX Agility Prime program, with GovCon and Department of Defense coverage documenting funding for
    flight testing and military airworthiness work that lowers the unit cost of certification activities.
  claimRefs:
  - CO006
  - CO007
  - CO008
  - CO009
  - CO010
  - CO014
  - CO027
  - CO031
  tableRefs:
  - TO003
- id: section-4
  title: Manufacturing readiness, customer LOI, and operational scale
  body: BETA opened a purpose-built 188,500 square-foot electric aircraft manufacturing facility in South
    Burlington, Vermont in April 2024 according to CNBC, WCAX, and VTDigger coverage, an unusually integrated
    step for a U.S. eVTOL maker at this stage. On the customer side, United Airlines signed an April 2021
    letter of intent for up to 200 ALIA aircraft, UPS Flight Forward placed a pre-order in the same window,
    and Blade Air Mobility committed to operate BETA aircraft on urban routes. AINonline and the United
    newsroom anchor the United engagement; UPS press releases anchor the cargo commitment. Employment-side
    signals from LinkedIn and BETA's careers page place headcount above one thousand. Public sources still
    stop short of disclosing actual aircraft deliveries, recognized revenue, or contracted backlog conversion
    economics for 2026, which constitutes the largest commercial gap.
  claimRefs:
  - CO011
  - CO012
  - CO015
  - CO016
  - CO017
  - CO018
  - CO024
  - CO025
  - CO037
  - CO029
  figureRefs:
  - FO003
- id: section-5
  title: Milestones of record and remaining diligence gaps
  body: 'The public chronology that emerges from retained sources is dense enough for downstream reuse.
    It opens with the 2017 founding and Kyle Clark''s leadership, moves through 2020-2021 ALIA flight
    testing and customer LOI from United and UPS, peaks at the June 2022 Series B and 2023 expansion of
    AFWERX activity, then anchors on the April 2024 Vermont factory opening and the October 2024 FAA powered-lift
    integration rule that BETA''s eVTOL must operate under. Flight Magazine, AOPA, and FlightGlobal coverage
    track ongoing flight-test progress through 2025. The remaining gaps are not about whether BETA exists
    or is scaling but about whether outside investors can price the company today: a refreshed valuation,
    a current board roster, audited revenue or delivery counts, and a disclosed 2025 or 2026 financing
    event are all missing from retained sources and become explicit diligence asks.'
