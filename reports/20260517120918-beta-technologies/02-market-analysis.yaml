    severity: material
    topic: Single audited SAM number is missing for BETA's addressable market in 2026
    missingEvidence: An audited bottom-up SAM derived from BETA's LOI book, aircraft ASP, and conversion-to-firm
      rate.
    whyItMatters: Sizing precision matters for valuation work; analyst TAM range is too wide to anchor
      on.
    diligencePath: Request management bottom-up SAM build, LOI conversion assumptions, and ASP schedule.
    relatedQuestionRefs:
    - QM020
    relatedTableRefs:
    - TM002
