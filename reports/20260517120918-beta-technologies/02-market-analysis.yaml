  - FM002
- id: section-3
  title: Buyers, budget owners, and the demand funnel
  body: 'BETA''s near-term buyer set has unusually identifiable budget owners. United Airlines (airline
    CFO), UPS Flight Forward (logistics P&L), Blade (UAM operator P&L), AFWERX/U.S. Air Force (military
    program office), and emerging medical evacuation operators (hospital systems and insurers) each have
    funded adoption triggers tied to either certification, vertiport availability, or program milestones.
    This is structurally healthier than amorphous UAM TAM. The adoption funnel from market interest through
    firm orders, certification, delivery, and in-service is still very narrow industry-wide, with only
    a handful of aircraft in revenue service as of 2026 across all developers. The funnel figure quantifies
    that drop-off and shows where BETA''s commercial energy must convert: from LOI volume into firm orders,
    then through type certification. Wikipedia''s United Airlines page documents the airline''s exposure
    to multi-vendor eVTOL orders, evidence that buyer behavior favors a competitive supplier set rather
    than single-source commitments.'
  claimRefs:
  - CM010
  - CM011
  - CM012
  - CM023
  - CM026
  - CM029
  - CM031
  - CM032
  - CM033
  - CM035
