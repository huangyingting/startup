  title: Analyst TAM estimates vary by 5x or more and are highly methodology-dependent
  body: From Statista's modest forecast through Grand View Research's $25-30B 2030 estimate and Roland
    Berger's $90B 2050 long-run, the range is wide enough that any single TAM should be treated as a directional
    signal, not an anchor.
