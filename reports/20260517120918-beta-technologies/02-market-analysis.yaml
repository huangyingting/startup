    severity: material
    topic: Analyst TAM estimates conflict by 5x or more for 2030 eVTOL revenue
    missingEvidence: Reconciled forecast model that explains the gap between Statista, MarketsandMarkets,
      Grand View, and Roland Berger.
    whyItMatters: Cannot anchor on any single 2030 number without understanding methodology drift.
    diligencePath: Compare publisher methodologies and reconstruct a defensible mid-case forecast.
    relatedQuestionRefs:
