chapter:
  number: 2
  title: Market Analysis
  summary: Defines the BETA-addressable market boundary, segments it across eVTOL/eCTOL airframes, UAM,
    cargo, defense, and medical, and preserves the wide analyst TAM range (roughly $5B to $30B by 2030)
    while showing BETA's buyer-segment map maps to identifiable funded budget owners. The 2024 FAA Powered-Lift
    Integration rule is the largest 2026 adoption unlock.
sections:
- id: section-1
  title: Market boundary, segments, and substitutes
  body: For underwriting BETA Technologies the market boundary is the set of new aircraft platforms and
    services that BETA's ALIA-250 conventional takeoff and ALIA eVTOL airframes can serve. Wikipedia's
    eVTOL and Advanced Air Mobility entries together frame this as a fast-emerging category that overlaps
    with broader urban air mobility (UAM) services, regional electric aviation, and military vertical
    lift. Substitution candidates are conventional helicopter charter, short-haul regional jets, and ground
    logistics, which sets the relevant excluded spend. Aviation Week and Aviation Today coverage frame
    AAM as a meaningful aerospace adjacency rather than a separate industry. The boundary chosen here
    covers eVTOL/eCTOL airframe sales, UAM passenger services, cargo middle-mile flights, defense electric
    vertical lift, and medical EMS missions — the segments BETA explicitly targets via its homepage and
    aircraft pages. Wikipedia's electric aircraft and battery-electric-aircraft pages further frame the
    broader powertrain category, while the powered-lift entry highlights why FAA created a new airworthiness
    class to handle this technology.
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM006
  - CM010
  - CM018
  - CM020
  - CM023
  - CM026
  tableRefs:
  - TM001
- id: section-2
  title: 'Sizing the market: analyst range and methodology limitations'
  body: 'There is no single audited sizing of BETA''s addressable market. MarketsandMarkets, Statista,
    Grand View Research, Roland Berger, and McKinsey all publish eVTOL or UAM forecasts ranging from low
    single-digit billion dollars by 2030 to over $30B by 2030 and $90B by 2050 in the longest-horizon
    scenarios. The 5x range is methodology-dependent: bottom-up airframe forecasts give different numbers
    than top-down service-revenue projections, and all materially rely on assumptions about certification
    velocity. Retained sources do not disclose a single audited SAM figure for BETA specifically. The
    sizing pyramid figure layers analyst TAM down to author-estimated SAM and SOM grounded in BETA''s
    announced LOI book, and the range chart preserves the conflicting analyst estimates so downstream
    chapters can stress-test any single anchor. Sifted, GreenBiz, and Aviation Week add a European demand
    and sustainability lens that thickens the qualitative case for the higher end of analyst sizings without
    resolving the methodology gap.'
  claimRefs:
  - CM004
  - CM005
  - CM007
  - CM008
  - CM009
  - CM021
  - CM022
  - CM027
  - CM028
  tableRefs:
