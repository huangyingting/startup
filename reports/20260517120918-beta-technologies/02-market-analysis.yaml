- id: section-4
  title: Drivers, constraints, and adverse views on adoption velocity
  body: 'The 2024 FAA Powered-Lift Integration final rule is the single biggest 2026 unlock, establishing
    the U.S. pilot certification and operations framework for eVTOL aircraft. Capital-supply signals (BETA''s
    $375M 2022 Series B plus peers'' raises) confirm investor appetite remains intact. Counterweights
    are real: battery energy density caps range and payload, vertiport and charging infrastructure remain
    immature across major metros, the unit-cost of certification flight test is high relative to forecast
    revenue, and The Atlantic and The Economist have published thoughtful adverse pieces arguing the eVTOL
    business case may stay marginal until charging and ATC infrastructure mature. The drivers/constraints
    table preserves both sides so that valuation work later does not lean on driver-only or adverse-only
    framing. Defense co-funding through Agility Prime materially lowers BETA''s certification unit cost
    relative to pure-civilian peers. GAO-22-105020 aviation forecasts further frame airspace integration
    as a multi-year planning exercise that depends on coordinated FAA, operator, and infrastructure investment
    rather than any single regulatory decision.'
