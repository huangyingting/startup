- id: section-2
  title: Operational, quality, security risk and technical dependencies
  body: Operational, quality, and security risks for BETA in 2026 span battery thermal runaway, motor
    failure in flight, vertical-flight control loss (per Wikipedia eVTOL), manufacturing-defect recall
    (per CNBC Vermont coverage), charging-network outage, cybersecurity exposure on connected charging,
    software/firmware regression (per beta.team careers postings), cert-pack quality findings (FAA Special
    Class + NPRM), flight-test incident risk (NTSB + FAA AFS), and range/payload underperformance. Risk
    register table TR002 enumerates these with probability/impact ratings. The dependency-map figure FR003
    visualizes the chain from battery energy density and motor reliability through cert and partner dependencies
    into the 2026 delivery event. Battery energy density is the binding technical constraint shared with
    cohort, and it caps BETA's 2026 range/payload posture. NTSB's electric-aircraft safety topic is the
    safety-regulator framing reference. The chapter's posture here is that technical-risk vectors are
    real but no single one is uniquely BETA — they are cohort-wide, but BETA's vertically integrated charging
    reduces ground-infrastructure attack surface relative to peers.
  claimRefs:
  - CR010
  - CR018
  - CR020
  - CR021
  - CR037
  - CR041
  tableRefs:
  - TR002
  figureRefs:
  - FR003
- id: section-3
  title: Partner-dependency, people-execution, and concentration risk
  body: 'Partner-dependency risk register table TR003 catalogues the top-10 partner-dependency risks for
    BETA in 2026: AFWERX/Agility Prime program pause (defense), UPS Flight Forward cargo LOI cancellation,
    United Airlines passenger LOI not converting, Blade operator pilot ending, Fidelity (lead investor)
    markdown or follow-on pass, Amazon CPF strategic-investor exit, DoD budget or policy shift, Vermont
    state site/permit issue, charging-network site cancellations, and AAM cohort demand slippage. People-execution
    risk register table TR004 catalogues aerospace engineering talent thinning, senior leadership transition,
    manufacturing scale-up execution risk at Vermont, customer-facing team buildout lag, cert-team capacity
    bottleneck, field-operations team buildout, and founder/CEO transition. Risk heatmap figure FR001
    scores probability/impact/velocity across regulatory, operational, partner, people, demand dimensions.
    The chapter''s posture is that customer-roster concentration combined with cert-timing risk is the
    highest-impact 2026 vector; if a single named-customer exit coincides with a cert slip, the cascade
    through delivery, revenue, and burn becomes thesis-breaking.'
  claimRefs:
  - CR019
  - CR022
  - CR023
  - CR024
  - CR025
  - CR029
  - CR030
  - CR031
  - CR032
  - CR033
  - CR034
  - CR038
  - CR039
  tableRefs:
  - TR003
  - TR004
  figureRefs:
  - FR001
- id: section-4
  title: Mitigations and kill-criteria for the 2026-2027 thesis
  body: 'Mitigation and kill-criteria table TR005 catalogues BETA''s available mitigations (vertically
    integrated charging network, CTOL-first cert sequencing, in-house Vermont factory, defense customer
    anchor) and the kill-criteria that would break the 2026-2027 thesis (cert-delay >2 quarters in 2027,
    single named-customer cancellation, Fidelity lead-investor markdown, flight-test fatal incident).
    The valuation chapter consumes these kill-criteria directly as thesis-break triggers. The mitigation
    logic is that BETA''s vertical integration (airframe + charging + manufacturing + defense customer
    anchor) reduces partner-dependency risk vs peer cohort, which in turn reduces the cascade-probability
    of the cert-timing slip into burn-coverage stress. However, mitigations do not eliminate the central
    cohort risks (regulator capacity, battery energy density, demand slippage); they only narrow the BETA-specific
    incremental risk relative to Joby/Archer/Wisk. The diligence reader should weight these mitigations
    modestly: they shift relative probability across the cohort, but the absolute probability of a 2026-2027
    cert slip remains the dominant risk for the BETA thesis.'
  claimRefs:
  - CR020
  - CR021
  - CR023
  - CR024
  - CR025
  - CR040
  - CR041
  tableRefs:
  - TR005
