company:
  name: BETA Technologies
chapter:
  number: 7
  title: Risks & Mitigations
  summary: 'BETA''s 2026 risk surface is dominated by FAA powered-lift cert-timing risk (cascading through
    delivery, revenue, burn, investor, partner, talent), customer-roster concentration (AFWERX, UPS, United,
    Blade), regulator capacity bottleneck shared with cohort, battery energy density as binding technical
    constraint, and 2026-2027 capital-stack adequacy if cert slips >2 quarters. Mitigations include vertical
    integration (charging, manufacturing, defense customer anchor) and CTOL-first cert sequencing. The
    diligence reader should weight these mitigations modestly: they shift relative cohort probability,
    but not absolute 2026 cert risk.'
sections:
- id: section-1
  title: Regulatory and legal risk register
  body: 'BETA''s 2026 regulatory-and-legal risk surface is anchored on FAA''s October 2024 powered-lift
    integration final rule (Federal Register), FAA Air Taxis (Part 135) operating regime, FAA Special
    Class type certification basis for ALIA-A250, FAA UAS / advanced operations framework for autonomy
    roadmap, and FAA Flight Standards Service operating oversight. Secondary regulatory references include
    the FAA UAM newsroom, FAA progress integration press, FAA air-taxi-rule final rule press, and FAA
    UAM advanced operations page — all retained as broken-link historical references. Legal documents
    include the FAA Powered-Lift NPRM PDF (broken), GAO-22-105020 aviation forecasts, and GAO-23-105068
    aviation oversight (broken). The regulatory-and-legal risk register table TR001 enumerates the top-15
    risk items with probability/impact ratings. The risk-transmission-map figure FR002 shows how a cert-timing
    slip cascades through delivery, revenue, burn, investor, partner, and talent dimensions. The central
    insight is that 2026 cert-timing slippage is the binding risk: it is shared across the cohort because
    the FAA powered-lift rule is brand-new, but it manifests at BETA differently than at Joby/Archer/Wisk
    because BETA''s roadmap sequences CX300 cert first.'
  claimRefs:
