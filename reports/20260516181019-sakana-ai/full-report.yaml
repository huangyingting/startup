      - number: '1.2'
        title: Founders, Leadership, and Key-Person Governance
        blocks:
          - type: paragraph
            body: >-
              The three co-founders collectively cover the technical, operational, and external-relations functions
              required for an early-stage AI lab. David Ha is the most publicly visible face of the company and its
              primary source of research credibility internationally: he led Google Brain's Tokyo office, co-developed
              the concept of neural network compression and world models, and joined and then departed Stability AI amid
              that company's well-documented financial and leadership turbulence in 2022–2023. His departure from
              Stability AI and immediate founding of Sakana AI was covered widely as a signal of talent outflow from a
              struggling AI lab. Llion Jones brings hard-core Transformer architecture heritage; his co-authorship of
              "Attention Is All You Need" remains one of the most-cited papers in the field, and his presence at Sakana
              AI has been used extensively in investor materials and press coverage as a proxy for technical pedigree.
              Ren Ito, as COO, provides operational continuity and Japan-market access, with background at Mercari (one
              of Japan's largest consumer-tech unicorns) and earlier career experience in Japan's diplomatic service.
              Sakana AI has disclosed an Applied Team (事業開発本部) formally established in early 2025 to handle enterprise
              and government implementation contracts, with focus on financial services and defense and intelligence.
              The company hired from leading domestic tech firms, international AI labs, and Japanese government
              agencies. Key-person risk is material: David Ha and Llion Jones together represent the company's primary
              research brand; if either departed the company, fundraising and talent-retention dynamics would likely
              deteriorate. Board composition and outside director governance have not been publicly disclosed in detail,
              representing a diligence gap.
