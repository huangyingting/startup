      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Exit readiness is assessed across five dimensions. Revenue scale (IPO minimum ~$100M ARR): current ~$30M
              ARR is at 30% of IPO viability threshold—timeline 2028-2030 at best. Customer diversification: 2 confirmed
              production deployments (MUFG, Mitsubishi Electric) against a typical IPO requirement of 3+ enterprise
              anchors with disclosed contract values. Financial disclosure: zero public audited financials; S-1
              preparation would require three years of audited statements. US market presence: Citi and Datadog signals
              exist but no confirmed US revenue as of May 2026; NASDAQ listing requires US revenue confirmation.
              Strategic acquisition readiness is highest: the investor-customer overlap creates natural acquirer
              alignment, and all major potential acquirers (MUFG, NEC, NVIDIA, KDDI) hold equity and have information
              rights through the cap table. Five final diligence asks must be satisfied before investment commitment:
              (1) audited ARR breakdown by customer to verify the $30M estimate and quantify concentration; (2) cap
              table and preference stack to assess bear-case common stock recovery; (3) MUFG contract terms and renewal
              probability assessment—the valuation hinge event; (4) export control legal opinion on In-Q-Tel investment
              implications for open-source model distribution; and (5) key-person retention contracts for David Ha and
              Llion Jones, whose departure would eliminate the primary research credibility premium embedded in the 88x
              multiple.
            claimRefs:
              - CV008
              - CV015
              - CV016
