      - number: '1.3'
        title: Funding History, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: >-
              Sakana AI has completed three disclosed financing rounds since inception. The seed round of approximately
              $30 million closed in January 2024 and was led by Lux Capital and Khosla Ventures, both deep-tech
              specialist investors with strong AI portfolios. The Series A, announced September 4, 2024 and subsequently
              updated on September 17, 2024 with additional participating investors, raised approximately $200 million.
              NEA led alongside Khosla Ventures and Lux Capital; strategic investors included NVIDIA (whose CEO Jensen
              Huang provided a quoted endorsement), Translink Capital, and 500 Global, plus a cohort of major Japanese
              institutional investors: Mitsubishi UFJ Financial Group (MUFG), Sumitomo Mitsui Banking Corporation
              (SMBC), Mizuho Financial Group, NEC, SBI Group, Dai-ichi Life Insurance, ITOCHU, KDDI, Fujitsu, Nomura
              Holdings, ANA Holdings, Tokyo Marine Group, Global Brain, JAFCO, and Miyako Capital. The $1.5 billion
              post-money valuation established by the Series A made Sakana AI Japan's fastest startup to achieve unicorn
              status, as cited in Bloomberg reporting. The Series B closed November 17, 2025 (with an updated disclosure
              on April 9, 2026) at ¥32 billion (approximately $200M at ¥160:$1). Series B investors include MUFG, Khosla
              Ventures, Factorial, Macquarie Capital, Mouro Capital (Banco Santander venture arm), Mitsubishi Electric,
              Salesforce Ventures, Google, Datadog, Citi, CCI Group, NEA, Geodesic Capital, Lux Capital, Ora Global,
              Fundomo, MPower Partners, JAFCO, Shikoku Electric Power, and In-Q-Tel (the CIA-affiliated US government
              technology investment fund). Wikipedia and Nikkei reported the post-Series-B valuation at approximately
              ¥400 billion (~$2.6B). Total equity raised across all rounds is therefore approximately $430M at current
              exchange rates. The In-Q-Tel participation is strategically notable as it aligns with the company's
              growing engagement in Japan defense and intelligence applications.
