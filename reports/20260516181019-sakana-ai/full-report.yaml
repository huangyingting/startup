      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 88x ARR — Japan Sovereign Premium or Valuation Froth?
            body: >-
              Sakana AI at 88x trailing ARR is above all private AI peers including Mistral (60x EU sovereign) and
              Anthropic (35-40x despite 50x larger scale). The premium is partially justified: MUFG production anchor,
              Nature publication credibility, In-Q-Tel signal, and Japan's structurally favorable AI regulatory
              environment together warrant 45-70x. But 88x implies $140-200M ARR already priced in — execution delivery
              over the next 24 months will determine whether this premium holds or compresses toward the 40-60x sector
              median.
            calloutType: insight
            claimRefs:
              - CV002
              - CV007
              - CV035
          - type: callout
            title: MUFG 2028 Renewal Is the Valuation Hinge
            body: >-
              At an estimated 32-37% of ARR, MUFG's 3-year partnership renewal in May 2028 is not a customer retention
              event — it is a valuation inflection point. Renewal and expansion validates the $2.65B entry and opens the
              base case path; non-renewal likely triggers a down-round or distressed M&A at $1-2B. Monitoring MUFG's AI
              Loan Expert branch rollout progress and Sakana AI's ability to add a second and third enterprise anchor
              before 2027 are the key leading indicators.
            calloutType: risk
            claimRefs:
              - CV014
              - CV023
              - CV040
          - type: callout
            title: Unpriced Optionality — Citi Global and Defense Contracts
            body: >-
              The $2.65B valuation is underwritten on Japan domestic ARR alone, but Citi's global banking network (200+
              countries) and In-Q-Tel defense interest represent unpriced TAM optionality not yet in any public ARR
              model. If either converts — Citi deploying Sakana AI models globally, or US/Japan government AI contracts
              emerging from the defense track — the bull case $8-12B exit becomes plausible without requiring
              implausible Japan market share.
            calloutType: strength
            claimRefs:
              - CV021
              - CV022
              - CV038
