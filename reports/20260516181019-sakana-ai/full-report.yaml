              niche providers. Compute efficiency is a compounding driver: Sakana's evolutionary and model-merging
              approaches require less GPU compute than training frontier models from scratch, making Sakana's approach
              well-suited to Japan's limited semiconductor manufacturing base and current Nvidia GPU supply constraints.
              On the constraint side, ROI timelines are uncertain: Goldman Sachs explicitly states AI productivity gains
              will be "most impactful in the second half of this decade," implying that enterprise and government
              customers may face internal justification hurdles in 2025–2027. Training and deploying high-accuracy
              models for high-stakes financial or defense decisions requires extensive validation and compliance review,
