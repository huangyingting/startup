              review has been published. Infrastructure: open-weight post-training capability (evolutionary model merge,
              Llama/DeepSeek/ Mistral) provides partial frontier-API independence for post-training workloads.
              Key-person: equity vesting schedules are in place (terms undisclosed) as a retention mechanism.
              Thesis-break triggers warranting investor escalation include: MUFG contract non-renewal in 2028 without
              replacement at comparable scale; unplanned departure of CTO Llion Jones without named successor within 30
              days; regulatory enforcement action under APPI or EU AI Act carrying a fine exceeding 5% of estimated ARR;
              failure to sign any net-new enterprise customer outside Japan by end-2026; and documented hallucination
              causing a regulatory sanction on MUFG's banking license, escalating credit risk from operational to
              systemic. Monitoring cadence should be quarterly for regulatory and key-person triggers, continuous for
              technical quality incidents, and annual for MUFG renewal risk.
