  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and included spend
        blocks:
          - type: paragraph
            body: >-
              Sakana AI's relevant market should be constructed from its monetization surfaces outward rather than from
              any single top-down AI forecast. The company derives revenue from three distinct spend pools. First,
              global generative AI infrastructure and foundation-model access: buyers pay to access, fine-tune, or
              deploy foundation-model capabilities, and Sakana participates through its Namazu series of
              Japanese-optimized LLMs and its Fugu multi-agent orchestration API. Second, Japan sovereign AI and
              domestic-language model services: Japanese enterprises and government agencies that require
              Japanese-language fluency, cultural alignment, and data residency pay specifically for Japan-built or
              Japan-optimized models. This segment is smaller but strategically higher-margin and defensively positioned
              behind language and trust moats. Third, enterprise agentic AI workflows: buyers pay to automate multi-step
              reasoning and research tasks using agent orchestration (Sakana Marlin for BI research, Sakana Fugu for
              coding/science/math orchestration). Spend excluded from Sakana's market includes generic cloud
              infrastructure, GPU hardware, models that never touch Japanese workflows, and broad consulting or
              systems-integration work that does not attach to Sakana products. The practical effect of this boundary is
              that Sakana's realistic SAM is not the full $71B GenAI TAM but rather the slice where Japan-language
              capability, efficient-model architecture, and agentic orchestration intersect — a significantly narrower
              pool that is partially isolatable through the Japan AI market estimates and the agentic AI segment.
            claimRefs:
