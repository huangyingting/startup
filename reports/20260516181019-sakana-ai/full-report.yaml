      - number: '2.4'
        title: Growth drivers, adoption constraints, and diligence gaps
        blocks:
          - type: paragraph
            body: >-
              Several structural forces favor Sakana AI's market position. Japan's government has accelerated sovereign
              AI policy: METI and MIC published joint AI Guidelines for Business Ver 1.0 in April 2024, integrating
              three prior guidelines and establishing a formal regulatory framework that legitimizes and partially
              mandates AI governance investment by Japanese enterprises. The AI Strategy Council, chaired by Professor
              Matsuo Yutaka of the University of Tokyo, drives national AI R&D priorities. Japan's Prime Minister
              explicitly endorsed industrial generative AI adoption in April 2023. These policy signals increase
              government and financial-sector willingness to invest in domestic AI providers. The 47% CAGR projected for
              enterprise agentic AI (MarketsAndMarkets) reflects a structural shift from passive GenAI tools toward
              autonomous workflow agents — a segment where Sakana's multi-agent Fugu system competes. The global AI
