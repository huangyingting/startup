      - number: '8.4'
        title: Bull / Base / Bear Scenarios and Return Analysis
        blocks:
          - type: paragraph
            body: >-
              Three exit scenarios frame the investment return profile for Series B investors entering at $2.65B. The
              bull case requires ARR to reach $200-300M by 2029 via MUFG Phase 2 expansion, Citi global deployment
              across 200+ country banking network, Serendie scale-up, and US/Japan government AI contracts from the
              In-Q-Tel track. At 25-30x forward ARR on $300M, an $8-12B acquisition by Google DeepMind, Microsoft, or a
              Japanese conglomerate is plausible—3-4.5x for Series B investors. The base case requires MUFG renewal in
              2028 and 2-3 new enterprise anchors by 2027, reaching $100-150M ARR. A $4-6B strategic acquisition by NEC,
              Mitsubishi Electric parent, or NTT yields 1.5-2.3x for Series B investors. KPMG Venture Pulse Q4 2025
              confirms Japanese AI exits averaged $800M-$1.5B in 2025, well below the Series B entry, meaning the base
              case requires above-median Japanese AI exit performance. The bear case is driven by MUFG non-renewal in
              May 2028: ARR stagnation at $30-50M, displacement by Japan national AI JV (SoftBank/Sony/NEC), and a
              down-round or acqui-hire at $1-2B yields 0.4-0.75x for Series B investors—a loss. The most likely exit
              mechanism is strategic acquisition: the investor-customer overlap (MUFG, NEC, KDDI, NVIDIA all hold
              equity) makes any unfriendly exit implausible. Sakana AI's IP stack (EvoMerge, AI Scientist, AB-MCTS)
              provides a capability jump to an acquirer's enterprise AI offering. A Tokyo Stock Exchange Prime Market
              IPO is possible 2028-2032 if ARR reaches $100-200M, but requires audited financials and 3+ enterprise
              anchors not yet demonstrated.
            claimRefs:
