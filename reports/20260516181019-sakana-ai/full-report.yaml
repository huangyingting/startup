  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >-
              Sakana AI operates under three overlapping regulatory regimes. Japan's Act on Protection of Personal
              Information (APPI), as amended effective April 2026, restricts AI-driven profiling and automated
              individual decision-making, directly applicable to MUFG's AI Scientist credit-approval deployment. FSA AI
              deployment guidelines for Japanese banks add a parallel compliance layer requiring human oversight
              checkpoints for high-stakes automated decisions. Japan's AI Promotion Act enacted 2025 provides an
              innovation-first framework with limited pre-market approval requirements for research-stage AI, offering
              Sakana AI near-term regulatory headroom domestically. EU AI Act Regulation 2024/1689 classifies credit
              scoring and creditworthiness assessment as high-risk under Annex III, creating material compliance
              exposure if Sakana AI expands to European enterprise customers. US exposure remains limited to
              DoD-adjacent work via ATLA, with NIST AI RMF and CISA AI security guidelines creating soft compliance
              expectations. No SEC filings or formal enforcement actions have been identified as of May 2026. The
              absence of any publicly disclosed DPIA or APPI compliance framework is a diligence gap: the April 2026
              effective date for APPI amendments may have passed before Sakana AI completed its compliance architecture
              documentation. Regulatory risk is classified as high likelihood and medium to high impact for the
              banking-AI deployment channel, and medium likelihood and medium impact for the international expansion
              channel.
            claimRefs:
