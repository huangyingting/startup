  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      Investment committee scoring across seven dimensions for Sakana AI as of May 2026. Japan sovereign market position
      is a clear strength; customer proof is partially positive but concentration-limited; moat strength is neutral
      given open-source commoditization risk; unit economics, evidence quality, and governance are risk dimensions that
      must be resolved before full commitment.
    data:
      nodes:
        - id: kpi-market
          label: Market Position
          detail: >-
            Japan sovereign AI champion with METI tailwind; captive enterprise market in financial services and
            government; Japan top-5 AI investment market (KPMG 2025); UBS $44-70B Japan enterprise AI TAM by 2030;
            structurally defensible domestic position
          type: strength
        - id: kpi-proof
          label: Customer Proof
          detail: >-
            MUFG ¥5B production deployment and SMBC production launch (April 2026) confirmed; ATLA defense contract and
            Mitsubishi Electric integration active; however all 4 largest customers are also equity investors —
            investor-customer overlap limits reference quality
          type: neutral
        - id: kpi-moat
          label: Moat Strength
          detail: >-
            Nature publication (October 2024) and In-Q-Tel investment signal frontier credibility; MUFG production
            integration creates switching costs; AI Scientist v2 demonstrated; but EvoMerge open-source commoditization
            risk is real and narrowing competitive window
          type: neutral
        - id: kpi-economics
          label: Unit Economics
          detail: >-
            ~$30M ARR (unaudited estimate, GetLatka/Sacra June 2025); 88x ARR multiple implies significant execution
            gap; no NRR, no gross margin, no burn rate disclosed; all revenue data is third-party estimate — confidence
            in ARR base is LOW
          type: risk
        - id: kpi-risk
          label: Primary Risk
          detail: >-
            MUFG 2028 renewal at-risk (>35% ARR); open-source commoditization of EvoMerge; Japan national AI JV
            (SoftBank/Sony/NEC) competition risk; governance opacity (no audited ARR, no cap table); key-person
            concentration (Ha and Jones)
          type: risk
        - id: kpi-valuation
          label: Valuation Stance
          detail: >-
            88x trailing ARR is 20-30% above fundamental 45-70x range; Mistral (60x EU sovereign) is closest precedent
            but Sakana AI trades at 47% premium to Mistral; fair value at secondary entry is $2.0-2.3B (45-70x $30M
            ARR); CONSTRUCTIVE-WAIT at current price
          type: neutral
        - id: kpi-evidence
          label: Evidence Quality
          detail: >-
            MEDIUM — MUFG and SMBC production confirmed; Datadog 8-K SEC filing confirmed; but ARR is unaudited
            third-party estimate; cap table not disclosed; NRR not disclosed; burn rate not disclosed; audited
            financials are the single most critical diligence gap
          type: risk
    approximationNotes: >-
      Strength / neutral / risk ratings are qualitative analytic judgments based on publicly available evidence. Unit
      economics and evidence quality are rated risk not because the economics are definitively poor, but because absence
      of audited ARR, NRR, and margin data makes independent verification impossible. Valuation stance reflects analyst
      fair value range; the 88x current multiple is not necessarily wrong — it is above fundamental range and requires
      near-term execution delivery to sustain.
