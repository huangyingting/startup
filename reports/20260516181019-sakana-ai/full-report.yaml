      - number: '2.3'
        title: Buyer and segment map
        blocks:
          - type: paragraph
            body: >-
              Sakana AI's buyer universe is concentrated in Japan across three verticals and partially global for its
              Fugu API. In Japan financial services, megabanks (SMBC, MUFG, Mizuho, Resona) are the dominant early
              adopters. SMBC signed a partnership with Sakana AI in 2025 and in April 2026 deployed a wholesale-banking
              proposal-generation application — a concrete case of an enterprise workflow agent with a measurable
              productivity mandate. Budget ownership sits with the CIO/CTO and the digital transformation office, with
              compliance review from risk management; the adoption trigger is cost reduction in labor-intensive research
              and proposal workflows. In Japan government and defense, Sakana secured a contract with Japan's
              Acquisition, Technology and Logistics Agency (ATLA) in March 2026 for research into multi-domain
              command-and-control (C2) intelligence fusion using multi-agent AI. The Ministry of Internal Affairs and
              Communications (MIC) separately selected Sakana AI to develop disinformation detection and SNS-space
              visualization technology in fiscal year 2025 (announced April 2026). Budget ownership is the Ministry of
              Defense and MIC respectively, with procurement controlled through government contracting processes. In R&D
              and science automation, Sakana's AI Scientist platform (published in Nature, March 2026) targets academic
              research institutions and corporate R&D labs needing automated hypothesis generation and literature
              synthesis. Budget sits with research directors and CTO offices. For Sakana Fugu globally, buyers are
              developers and engineering teams at technology companies using the API for coding, mathematics, and
              scientific reasoning automation, with per-call or subscription pricing. The Japan domestic LLM buyer
              segment also includes NTT, KDDI, Sony, and other large Japanese conglomerates that require
              Japanese-language enterprise chat and knowledge management through Sakana Chat and the Namazu model
              series.
