chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Founding Context
        blocks:
          - type: paragraph
            body: >-
              Sakana AI Co., Ltd. is an AI R&D company headquartered in Tokyo, Japan, incorporated in 2023. Its name is
              derived from the Japanese word for fish (さかな), evoking a school of fish that forms a coherent, emergent
              collective from simple local rules — an analogy for the company's core research thesis around
              nature-inspired intelligence, evolutionary optimization, and collective AI. The official company tagline
              as of May 2026 is "We develop AI solutions for Japan's needs, and democratize AI in Japan," and its three
              commercial products are Sakana Chat (consumer-facing LLM chat powered by the Namazu model series), Sakana
              Marlin (enterprise business-intelligence research assistant), and Sakana Fugu (multi-agent orchestration
              API targeting coding, mathematics, and scientific reasoning). The founding team assembled in mid-2023
              around David Ha, who had most recently served as Head of Research at Stability AI and before that as
              Research Director at Google Brain Tokyo; Llion Jones, one of the eight co-authors of the seminal 2017
              "Attention Is All You Need" Transformer paper; and Ren Ito, who brings operational and
              government-relations experience from Mercari and prior diplomatic service. The three founders retain
              operational C-suite roles (CEO, CTO, COO), giving the company a stable founding-team governance profile.
              Sakana AI sits at the intersection of two structural tailwinds: the global demand for foundation-model
              capabilities, and Japan's ambition to build domestic sovereign AI that reflects its language, culture, and
              security requirements. The company's strategy diverges from the dominant compute-maximization paradigm by
              emphasizing evolutionary and model-merging techniques that operate on existing open-source checkpoints
              rather than training frontier models from scratch, a design choice explicitly motivated by resource
              efficiency and Japan's constrained compute environment.
