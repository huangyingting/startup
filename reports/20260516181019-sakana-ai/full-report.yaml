    summary: >-
      Sakana AI's addressable market narrows from a broad global GenAI TAM ($71B in 2025) through Japan AI ($7.9B in
      2025) and agentic AI ($6.8B in 2025) to an undisclosed Sakana-specific SAM. The pyramid illustrates that Sakana is
