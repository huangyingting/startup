        title: Exhibits
        blocks:
          - type: callout
            title: Unique research credentials and Japan-sovereign positioning
            body: >-
              Sakana AI's founding team combines rare international AI pedigree (Attention Is All You Need
              co-authorship, Google Brain leadership) with deep Japan-market access (diplomatic background, Mercari
              experience). The Nature publication of the AI Scientist in March 2026 provides an independently
              verifiable, tier-one scientific imprimatur that very few startups of any stage can claim. The company's
              nature-inspired thesis is genuinely differentiated: rather than competing on compute with OpenAI or
              Google, Sakana specializes in evolutionary optimization and model merging — an approach well-suited to
              Japan's compute-constrained environment and the sovereign-AI policy agenda.
