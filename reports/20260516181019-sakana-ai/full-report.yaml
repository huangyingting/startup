            body: >-
              The AI Scientist is Sakana AI's flagship commercial system and its most documented technical liability.
              Independent analysis published August 2024 recorded a 57% hallucination rate and a 42% experiment failure
              rate during replication testing. Sakana AI has not publicly disputed these findings or published updated
              benchmarks as of May 2026. This represents a material quality risk: a hallucination event in MUFG's
              credit-approval workflow could produce an incorrect individual credit decision subject to APPI Article 20
              notification obligations and FSA consumer-protection standards. The AI Scientist's autonomous code-writing
              and internet-access capabilities introduce prompt-injection, code execution, and data-exfiltration attack
              vectors classified as high-severity by CISA AI security guidelines. No SOC 2 Type II certification or
              third-party security audit of Sakana AI's production infrastructure has been publicly disclosed. Academic
              integrity concerns raised by the research community around AI-generated ghost authorship and fabricated
              citations add reputational risk that could impair the academic collaboration pipeline needed to sustain
              research credibility. Compute dependency on NVIDIA H100 and A100 GPU clusters creates a
              single-point-of-failure operational risk: sustained supply disruption from geopolitical export controls or
              allocation constraints would materially degrade training and inference throughput. Human-in-the-loop
              review in MUFG's deployment partially mitigates hallucination risk at the decision stage but has not been
              independently validated.
