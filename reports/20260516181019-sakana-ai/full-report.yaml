      - number: '1.5'
        title: Strategic Partnerships, Defense, and Governance Considerations
        blocks:
          - type: paragraph
            body: >-
              Sakana AI has assembled a dual-track strategic posture: building cutting-edge research credibility
              internationally while deploying proprietary AI in Japan's highest-stakes industries. The NVIDIA
              relationship, formalized with the Series A in September 2024, encompasses research collaboration, early
              access to data center infrastructure, and joint AI community building in Japan; NVIDIA's GPU access is
              critical for Sakana's evolutionary scaling experiments. The MUFG relationship dates to the Series A and
              deepened with MUFG's continued participation in the Series B; Daiwa Securities was also referenced in blog
              posts as a strategic partner. In the government space, Japan's Ministry of Internal Affairs and
              Communications (MIC) selected Sakana AI as technology developer for its fiscal 2025 program to detect and
              counter misinformation on social networks (announced April 7, 2026). Most significantly for
              risk-profiling, Sakana AI signed a commission research contract with Japan's Acquisition, Technology and
              Logistics Agency (ATLA) Defense Innovation Institute (防衛装備庁防衛イノベーション科学技術研究所) in March 2026, covering
              multi-domain (land/sea/air) data integration for command-and-control systems. The inclusion of In-Q-Tel in
              the Series B investor roster is consistent with the defense trajectory. The company's expansion into
              defense and intelligence AI raises governance questions not yet publicly addressed: there is no publicly
              available Responsible AI policy, dual-use technology governance framework, or export-control compliance
              disclosure. The scientific community has also raised questions about AI-generated research papers flooding
              peer review, with the Science/AAAS publication acknowledging that community norms for AI-authored
              manuscripts remain unsettled. These governance and reputational risks are material diligence items for any
              institutional investor.
