      - number: '1.4'
        title: Product Portfolio and Research Milestones
        blocks:
          - type: paragraph
            body: >-
              Sakana AI's product and research output can be grouped into three layers. The first layer is foundational
              research: Evolutionary Model Merge (March 2024), which demonstrated that evolutionary algorithms could
              combine knowledge from multiple open-source LLMs without retraining and was subsequently accepted to
              Nature Machine Intelligence in January 2025; The AI Scientist (August 2024 preprint, arxiv 2408.06292), a
              multi-agent system that autonomously generates research ideas, runs experiments, writes papers, and
              performs simulated peer review at a cost of under $15 per paper. The AI Scientist-v2 achieved the
              milestone of having a fully AI-generated paper pass the double-blind peer-review process at an ICLR 2025
              workshop (March 2025, with IRB approval from UBC and full cooperation of ICLR leadership). The AI
              Scientist paper, co-authored with University of British Columbia, Vector Institute, and University of
              Oxford, was published in Nature on March 26, 2026 — marking the first time an automated AI research system
              produced work acknowledged by the world's highest-impact scientific journal. Additional research
              contributions include the Darwin Gödel Machine (May 2025), a self-improving AI that rewrites its own code;
              Continuous Thought Machines (CTM, May 2025); and AB-MCTS and ShinkaEvolve. The second layer is
              Japan-optimized LLMs: the Namazu model series (Namazu α, March 2026), developed using post-training
              techniques to adapt leading open-weight models to Japanese cultural and security norms, powering the
              consumer Sakana Chat service. The third layer is commercial products: Sakana Marlin, a business
              intelligence deep-research assistant (beta April 2026) described as the company's first commercial
              product; and Sakana Fugu, a multi-agent orchestration system (beta April 2026) that coordinates pools of
              frontier foundation models and targets enterprise API use cases. Implementation work includes a
              partnership with SMBC Group since May 2025, with a proposal-generation application for Sumitomo Mitsui
              Bank deployed in production as of April 2026.
