          - type: callout
            title: Key-person concentration and undisclosed governance
            body: >-
              Sakana AI's brand, investor relationships, and talent pipeline are heavily dependent on David Ha and Llion
              Jones. Both founders departed their previous employer (Stability AI and Google respectively) under
              conditions suggesting personal agency, but a future departure from Sakana AI would likely be
              destabilizing. The company has not publicly disclosed its board composition, any outside-director
              governance structure, a Responsible AI policy, or dual-use technology safeguards relevant to its growing
              defense portfolio. The combination of material key-person risk and opaque governance is a diligence flag
              for institutional investors.
