      - number: '5.3'
        title: Technical architecture, infrastructure, and operating model
        blocks:
          - type: paragraph
            body: >-
              Sakana AI's technical stack is layered around foundation model orchestration rather than custom
              pre-training. At the base layer, the company depends heavily on third-party frontier models (OpenAI,
              Anthropic, Google Gemini families) as the underlying intelligence substrate, accessing them via API.
              Open-source models (Llama 3.x, DeepSeek, Mistral families) serve as candidates for post-training and
              evolutionary merging. NVIDIA GPU infrastructure underpins all experimental compute and is reflected in the
              announced NVIDIA partnership. At the algorithm layer, the company builds proprietary orchestration and
              search methods: AB-MCTS manages hypothesis exploration for Marlin, the Fugu model (itself a small language
              model) learns to coordinate and route calls to different frontier LLMs, and Transformer² SVF vectors
              enable inference-time weight modification without model retraining. The applied product layer uses Python
              backends, TypeScript/Next.js for web UIs, and Kotlin for Android applications. Defense deployments
              additionally require DDIL (Degraded, Disconnected, Intermittent, and Low-bandwidth)-capable distributed
              system architectures. Namazu post-training operates on open-weight frontier models, applying custom
              datasets to correct cultural bias and censorship artifacts without losing base-model benchmark
              performance. The research infrastructure for AI Scientist requires NVIDIA GPUs, CUDA, PyTorch, and LaTeX
              for paper generation, and must be containerized for safe LLM code execution. The key architectural
              dependency risk is double: Sakana's most capable commercial products (Fugu, Marlin) depend on third-party
              frontier model APIs for core reasoning, meaning cost, availability, and capability changes from providers
              like OpenAI or Anthropic flow directly into product performance and margin. The NVIDIA partnership signals
              deep GPU dependency.
