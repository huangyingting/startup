  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Sakana AI competes across three overlapping tiers. At the domestic Japan tier, eight or more companies are
              building Japanese-language foundation models, led by NTT (Tsuzumi 2), Preferred Networks (PLaMo), and
              ELYZA (KDDI subsidiary). Each addresses enterprise buyers with distinct angles: NTT on sovereignty and
              single-GPU TCO, PFN on depth of industrial integration, and ELYZA on KDDI's distribution network. At the
              global frontier tier, OpenAI, Google DeepMind, Anthropic, and Mistral AI compete for Japan enterprise API
              share; OpenAI holds Japan as its largest corporate API market outside the US, while Anthropic reached
              approximately 32% global enterprise share by mid-2025. At the emerging physical AI tier, a ¥1 trillion
              SoftBank, Sony, Honda, and NEC consortium launched in April 2026 targets industrial robotics and
              manufacturing—a segment tangential to but increasingly relevant for Sakana AI's compute-efficient
              approach. Sakana AI's primary competitive claim is methodological: evolutionary merging, AB-MCTS
              inference-time scaling, and AI-automated research distinguish it from pretraining-scale incumbents. The
              competitive map is differentiated enough that Sakana occupies a legitimate niche, but convergence risk is
              material as global labs add efficiency-focused techniques and domestic labs expand research automation
              capabilities. Japan's enterprise AI market shows multi-vendor adoption: enterprises simultaneously deploy
              multiple LLM APIs from different providers, reducing per-vendor lock-in while sustaining Sakana AI's niche
              for research automation alongside incumbent deployments.
