      - number: '8.5'
        title: Valuation Risks and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              Four structural valuation risks frame the downside. First, the revenue trajectory gap: at 88x ARR, Sakana
              AI implicitly prices in $140-200M ARR. HBR 2025 warns that 40% of AI companies above 60x ARR experienced
              >40% valuation compression when revenue missed projections by more than 20%; Deloitte's 18-24 month
              research-to-production conversion window expires October 2025-April 2026—the current period. If 2026 ARR
              growth confirms only $40-50M, valuation will compress from 88x to the sector median of 40-60x, implying a
              $1.6-3B range at $40-50M ARR. Second, customer concentration: MUFG alone likely represents 32-37% of
              estimated ARR. The 2028 renewal is not a customer event—it is a valuation inflection point. Non-renewal
              would expose a $1-2B bear scenario at current ARR without offsetting replacement wins. Third, open-source
              commoditization: EvoMerge and model-merging techniques have rapidly proliferated in the open-source
              community. Gartner's absence of Sakana AI from its 2025 Magic Quadrant reflects the research-to-enterprise
              transition gap; if commoditization outpaces enterprise delivery, the IP moat narrows significantly.
              Fourth, governance opacity: no audited ARR, no cap table, no burn rate, no liquidation preference
              disclosure. In a bear exit at $1-2B, investor preference overhang could eliminate common stockholder and
              employee returns entirely. This opacity is a systemic risk that cannot be resolved from public evidence.
            claimRefs:
              - CV007
              - CV017
              - CV020
              - CV025
