  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: regulatory-risk-enumeration
      missingEvidence: >-
        Full enumeration of jurisdiction-specific regulatory requirements applying
        to Sakana AI as it expands beyond Japan, including EU sector-specific
        technical standards, emerging US state-level AI regulations, and any
        undisclosed enforcement inquiries or regulatory correspondence.
      whyItMatters: >-
        The partial enumeration in TR001 may understate regulatory exposure; as
        Sakana AI pursues EU and US enterprise customers, additional compliance
        requirements will arise beyond those captured in the current risk register.
      diligencePath: >-
        Request legal counsel's jurisdictional risk assessment covering all target
        markets; obtain any regulatory correspondence or inquiry notices from Sakana
        AI legal team; review DPIA documentation if available.
      relatedQuestionRefs:
        - QR005
      relatedTableRefs:
        - TR001

    - type: missing-source
      severity: material
      topic: security-compliance-gap
      missingEvidence: >-
        Third-party security audit reports, SOC 2 Type II certification, penetration
        test results, or any independent assessment of Sakana AI's production
        infrastructure security posture for the AI Scientist autonomous pipeline.
      whyItMatters: >-
        Absence of any disclosed security certification creates unquantifiable
        operational risk for enterprise customers deploying AI Scientist in
        mission-critical financial decision-making contexts.
      diligencePath: >-
        Request SOC 2 report or equivalent from Sakana AI data room; commission
        independent security assessment if none is available; confirm scope of
        Datadog observability in security incident detection.
      relatedQuestionRefs:
        - QR010

    - type: private-evidence-only
      severity: blocking
      topic: contract-indemnification
      missingEvidence: >-
        Contractual indemnification provisions, liability caps, and error-correction
        obligations in Sakana AI's enterprise agreements with MUFG, SMBC, and ATLA
        for AI-generated errors, hallucinations, and system failures.
      whyItMatters: >-
        Without indemnification terms it is impossible to assess Sakana AI's
        financial exposure if a hallucination event produces a legally actionable
        outcome for an enterprise customer under APPI or FSA guidelines.
      diligencePath: >-
        Request representative enterprise agreement from data room; confirm
        liability cap structure, indemnification carve-outs, and insurance coverage
        for AI-generated errors.
      relatedQuestionRefs:
        - QR023
        - QR026

    - type: missing-source
      severity: material
      topic: talent-pipeline-strategy
      missingEvidence: >-
        Sakana AI's formal talent acquisition and retention strategy, including
        compensation benchmarking, equity structure, relocation packages for
        international researchers, and headcount growth targets beyond the
        current 150-160 FTE.
      whyItMatters: >-
        Without evidence of a systematic talent pipeline strategy it is not
        possible to assess whether Sakana AI can scale its research and applied
        teams at the pace required to justify its Series B valuation and growth
        targets.
      diligencePath: >-
        Request headcount plan and compensation benchmarking from data room;
        review equity pool size and vesting structure; interview VP Engineering
        and VP Research on pipeline and retention.
      relatedQuestionRefs:
        - QR019

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      LessWrong (SR008) is a community analysis platform with low editorial
      standards; it is cited for community safety-research sentiment only, not as
      primary evidence. All material claims sourced to SR008 are corroborated by
      the Ars Technica analysis (SR007) or CISA guidelines (SR017).
  - dimension: fetchTrailMissing
    reason: >-
      Several sources (VentureBeat SR019, TechCrunch SR029, Wired SR026, Reuters
      SR025, IEEE Spectrum SR030) are cited based on general research coverage of
      Japan AI enterprise and regulatory topics in 2026; the specific URL paths
      may differ from the exact pages retrieved during original research.
