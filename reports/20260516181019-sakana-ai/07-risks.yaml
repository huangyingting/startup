company:
  name: Sakana AI
chapter:
  number: 7
  title: Risks
  summary: >-
    Sakana AI faces a layered risk profile spanning five domains. Regulatory: Japan's
    April 2026 APPI amendments impose automated-decision-making restrictions on MUFG's
    credit-AI deployment, while EU AI Act Regulation 2024/1689 classifies autonomous
    research systems as potentially high-risk. Technical quality: the AI Scientist's
    documented 57% hallucination rate and 42% experiment failure rate create direct
    liability exposure in banking contexts. Partner dependency: MUFG represents an
    estimated 30-37% of ARR with no disclosed renewal commitment; NVIDIA GPU compute
    is a single point of failure. People: departure of CEO David Ha or CTO Llion Jones
    (Transformer co-author) would be a material confidence signal at the $2.65B
    valuation. Mitigating factors include Japan's innovation-first AI Promotion Act
    (2025), $135M Series B runway, and human-in-the-loop review in MUFG's production
    workflow. The highest-severity, highest-likelihood risk combination is an AI
    Scientist hallucination event producing a consumer-harming credit decision subject
    to APPI and FSA regulatory sanction.

sections:
  - id: section-1
    title: Regulatory and Legal Risk Landscape
    body: >-
      Sakana AI operates under three overlapping regulatory regimes. Japan's Act on
      Protection of Personal Information (APPI), as amended effective April 2026,
      restricts AI-driven profiling and automated individual decision-making,
      directly applicable to MUFG's AI Scientist credit-approval deployment. FSA AI
      deployment guidelines for Japanese banks add a parallel compliance layer
      requiring human oversight checkpoints for high-stakes automated decisions.
      Japan's AI Promotion Act enacted 2025 provides an innovation-first framework
      with limited pre-market approval requirements for research-stage AI, offering
      Sakana AI near-term regulatory headroom domestically. EU AI Act Regulation
      2024/1689 classifies credit scoring and creditworthiness assessment as
      high-risk under Annex III, creating material compliance exposure if Sakana AI
      expands to European enterprise customers. US exposure remains limited to
      DoD-adjacent work via ATLA, with NIST AI RMF and CISA AI security guidelines
      creating soft compliance expectations. No SEC filings or formal enforcement
      actions have been identified as of May 2026. The absence of any publicly
      disclosed DPIA or APPI compliance framework is a diligence gap: the April 2026
      effective date for APPI amendments may have passed before Sakana AI completed
      its compliance architecture documentation. Regulatory risk is classified as
      high likelihood and medium to high impact for the banking-AI deployment
      channel, and medium likelihood and medium impact for the international
      expansion channel.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
    tableRefs:
      - TR001
    figureRefs:
      - FR001

  - id: section-2
    title: Technical Quality and Operational Risk
    body: >-
      The AI Scientist is Sakana AI's flagship commercial system and its most
      documented technical liability. Independent analysis published August 2024
      recorded a 57% hallucination rate and a 42% experiment failure rate during
      replication testing. Sakana AI has not publicly disputed these findings or
      published updated benchmarks as of May 2026. This represents a material
      quality risk: a hallucination event in MUFG's credit-approval workflow could
      produce an incorrect individual credit decision subject to APPI Article 20
      notification obligations and FSA consumer-protection standards. The AI
      Scientist's autonomous code-writing and internet-access capabilities introduce
      prompt-injection, code execution, and data-exfiltration attack vectors
      classified as high-severity by CISA AI security guidelines. No SOC 2 Type II
      certification or third-party security audit of Sakana AI's production
      infrastructure has been publicly disclosed. Academic integrity concerns raised
      by the research community around AI-generated ghost authorship and fabricated
      citations add reputational risk that could impair the academic collaboration
      pipeline needed to sustain research credibility. Compute dependency on NVIDIA
      H100 and A100 GPU clusters creates a single-point-of-failure operational risk:
      sustained supply disruption from geopolitical export controls or allocation
      constraints would materially degrade training and inference throughput.
      Human-in-the-loop review in MUFG's deployment partially mitigates hallucination
      risk at the decision stage but has not been independently validated.
    claimRefs:
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
    tableRefs:
      - TR002

  - id: section-3
    title: Partner and Infrastructure Dependency Risk
    body: >-
      Sakana AI's commercial delivery stack rests on four dependency pillars, each
      with a distinct failure mode. First, NVIDIA GPU and CUDA: the strategic
      investor relationship likely extends compute pricing concessions and early
      hardware access that are not contractually guaranteed; any deterioration would
      remove these implicit benefits. Second, frontier API providers (OpenAI,
      Anthropic, Google Gemini): these underpin Fugu and Marlin products; their
      terms of service restrict certain autonomous agentic use cases, and enforcement
      against the AI Scientist's design would require product reformulation. Third,
      revenue concentration in MUFG: the $34M three-year contract represents an
      estimated 30-37% of ARR; non-renewal in 2028 without a replacement would
      produce a minimum 30% ARR decline. Fourth, Datadog as designated observability
      vendor (February 2026 partnership): medium-term switching costs if Sakana AI
      elects to self-host monitoring. The investor-customer overlap (MUFG, SMBC,
      Citi, and Mitsubishi Electric are both equity holders and customers) raises
      structural questions about arm's-length commercial demand. Geopolitical export
      controls on semiconductor technology represent a systemic tail risk for the
      NVIDIA dependency. Open-weight post-training capability (evolutionary model
      merge) provides partial API independence but does not address the GPU compute
      dependency.
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
    tableRefs:
      - TR003
    figureRefs:
      - FR003

  - id: section-4
    title: People and Execution Risk
    body: >-
      Sakana AI's intellectual identity is inseparably linked to CEO David Ha and
      CTO Llion Jones. Ha, a former Google Brain research director, is the architect
      of the founding vision and the primary commercial narrative. Jones, co-author
      of the original "Attention is All You Need" Transformer paper, is the technical
      credibility anchor for enterprise and investor audiences. COO Ren Ito's
      government-relations expertise is critical for Japan enterprise and defense
      sales given the cultural specificity of that market. No material technical
      leadership departures have been publicly disclosed since founding in July 2023.
      However, no succession plans or key-person retention agreements have been
      publicly disclosed for any of these three executives. Headcount of approximately
      150-160 FTE is thin relative to the $2.65B valuation; the company competes for
      frontier AI researchers against Anthropic, OpenAI, DeepMind, and Meta, which
      offer substantially higher compensation. Japan's frontier AI talent pool is
      concentrated primarily in the US and UK, requiring relocation or remote
      arrangements. The $135M Series B (November 2025) provides approximately 18-24
      months runway, but failure to demonstrate meaningful ARR growth by Q4 2026
      could impair Series C pricing and terms. Execution risk is elevated by the
      need to simultaneously scale enterprise sales, expand the applied products
      team, and sustain research publication cadence.
    claimRefs:
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
      - CR034
      - CR035
      - CR036
    tableRefs:
      - TR004
    figureRefs:
      - FR002

  - id: section-5
    title: Mitigation Framework and Kill Criteria
    body: >-
      Sakana AI's disclosed risk mitigations span four domains. Regulatory: Japan's
      AI Promotion Act innovation-first principles provide near-term legal protection
      against mandatory product recall; the data-sovereignty architecture for
      Japanese enterprise customers addresses APPI data-localization requirements.
      Technical: MUFG's deployment incorporates human-in-the-loop review for all
      credit recommendations; the AI Scientist's open-source codebase enables
      external audit, though no third-party review has been published. Infrastructure:
      open-weight post-training capability (evolutionary model merge, Llama/DeepSeek/
      Mistral) provides partial frontier-API independence for post-training workloads.
      Key-person: equity vesting schedules are in place (terms undisclosed) as a
      retention mechanism. Thesis-break triggers warranting investor escalation
      include: MUFG contract non-renewal in 2028 without replacement at comparable
      scale; unplanned departure of CTO Llion Jones without named successor within
      30 days; regulatory enforcement action under APPI or EU AI Act carrying a fine
      exceeding 5% of estimated ARR; failure to sign any net-new enterprise customer
      outside Japan by end-2026; and documented hallucination causing a regulatory
      sanction on MUFG's banking license, escalating credit risk from operational to
      systemic. Monitoring cadence should be quarterly for regulatory and key-person
      triggers, continuous for technical quality incidents, and annual for MUFG
      renewal risk.
    claimRefs:
      - CR037
      - CR038
      - CR039
      - CR040
      - CR041
      - CR042
      - CR043
      - CR044
    tableRefs:
      - TR005

