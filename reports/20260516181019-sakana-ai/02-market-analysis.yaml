    layout: standard
    summary: >-
      Sakana AI's enterprise adoption funnel progresses from awareness of Japan-specific AI need, through
      government policy alignment, to pilot deployment, contract award, and multi-year production integration.
      Government and financial-sector paths diverge at the compliance and procurement stage.
    data:
      items:
        - label: Sovereign AI awareness and policy alignment
          value: 100
          detail: >-
            Japan government AI strategy, METI AI Guidelines (2024), and PM endorsement of industrial AI
            create national-level demand signal. All domestic enterprises and ministries exposed to
            policy mandate.
        - label: Vendor qualification and due diligence
          value: 40
          detail: >-
            Buyers evaluate Japan-language benchmark performance, data-residency compliance, security
            posture, and government contract history. Sakana's ATLA and SMBC precedents aid qualification;
            In-Q-Tel backing signals US security community vetting.
        - label: Pilot deployment and proof-of-value
          value: 20
          detail: >-
            Buyers deploy agent workflows or LLM APIs in limited production or proof-of-concept environment.
            Sakana Fugu beta (April 2026) and SMBC proposal-generation application represent pilots. ROI
            measurement typically requires 3–6 months at this stage.
        - label: Contract award and production rollout
          value: 8
          detail: >-
            Signed multi-year contracts (ATLA: March 2026; MIC: FY2025; SMBC: April 2026 deployment) confirm
            production adoption. Financial-sector contracts require additional regulatory and compliance
            review before full rollout.
        - label: Platform expansion and upsell
          value: 3
          detail: >-
            Buyers expand usage across additional workflows, departments, or model variants. Sakana's
            multi-product portfolio (Chat, Marlin, Fugu, Namazu) supports cross-sell within enterprise
            accounts. Revenue visibility at this stage is highest but public data remains unavailable.
    approximationNotes: >-
      Funnel values are illustrative percentages of total addressable buyer pool moving through each stage,
      not revenue figures. Actual conversion rates are not publicly disclosed; estimates reflect typical
      enterprise AI adoption funnels combined with Sakana's known contract wins.
    claimRefs:
