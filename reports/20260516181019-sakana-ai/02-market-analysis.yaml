  - id: section-4
    title: Growth drivers, adoption constraints, and diligence gaps
    body: >-
      Several structural forces favor Sakana AI's market position. Japan's government has accelerated
      sovereign AI policy: METI and MIC published joint AI Guidelines for Business Ver 1.0 in April 2024,
      integrating three prior guidelines and establishing a formal regulatory framework that legitimizes and
      partially mandates AI governance investment by Japanese enterprises. The AI Strategy Council,
      chaired by Professor Matsuo Yutaka of the University of Tokyo, drives national AI R&D priorities.
      Japan's Prime Minister explicitly endorsed industrial generative AI adoption in April 2023. These
      policy signals increase government and financial-sector willingness to invest in domestic AI
      providers. The 47% CAGR projected for enterprise agentic AI (MarketsAndMarkets) reflects a structural
      shift from passive GenAI tools toward autonomous workflow agents — a segment where Sakana's multi-agent
      Fugu system competes. The global AI investment cycle (Goldman Sachs: ~$200B annually by 2025) creates
      aggregate demand that benefits even niche providers. Compute efficiency is a compounding driver: Sakana's
      evolutionary and model-merging approaches require less GPU compute than training frontier models from
      scratch, making Sakana's approach well-suited to Japan's limited semiconductor manufacturing base and
      current Nvidia GPU supply constraints. On the constraint side, ROI timelines are uncertain: Goldman
      Sachs explicitly states AI productivity gains will be "most impactful in the second half of this
      decade," implying that enterprise and government customers may face internal justification hurdles in
      2025–2027. Training and deploying high-accuracy models for high-stakes financial or defense decisions
      requires extensive validation and compliance review, lengthening sales cycles. Competition from
      OpenAI, Anthropic, Google, and domestic Japanese players (NTT Research, Fujitsu Takane LLM, NEC
      WISDOM2) will intensify as they expand Japanese-language capabilities. Switching costs are moderate
      in open-API segments but high in government contracts where data-residency and classified-network
      requirements create multi-year lock-in once a vendor is qualified. Evidence gaps include no public
      data on Sakana's contracted revenue or pipeline, limited disclosure on ATLA contract size, and
      absence of independent benchmarks for Namazu vs. competing Japanese LLMs.
