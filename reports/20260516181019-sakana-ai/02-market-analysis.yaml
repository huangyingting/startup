callouts:
  - calloutType: strength
    title: Confirmed government and financial-sector traction
    body: >-
      Sakana AI has closed multi-year contracts with Japan's Ministry of Defense (ATLA, March 2026),
      the Ministry of Internal Affairs and Communications (FY2025 R&D contract, April 2026), and SMBC
      Group (wholesale-banking AI agent deployed April 2026). These three contracts confirm that Japan's
      highest-priority buyer segments — defense, government intelligence, and megabanks — have cleared
      Sakana through vendor qualification and procurement processes that typically take 12–24 months.
      This is material market validation well ahead of what most early-stage AI startups achieve.
    claimRefs:
      - CM014
      - CM017
      - CM018
      - CM021
      - CM022
  - calloutType: risk
    title: Wide analyst estimate dispersion and ROI uncertainty
    body: >-
      Global GenAI market estimates for 2025 span from $37.9B (Precedence Research) to $71.4B
      (MarketsAndMarkets) — a near-2x range — reflecting unstable scope definitions and limited
      historical data. Goldman Sachs explicitly projects AI productivity gains will be most visible
      in the second half of the decade, suggesting the enterprise ROI case that drives recurring
      contract renewal may not materialize at the pace implied by CAGR forecasts. For Sakana
      specifically, no public data separates its addressable slice from the broad Japan AI market,
      making bottom-up validation of the SAM/SOM impossible without internal management data.
    claimRefs:
      - CM002
      - CM003
      - CM025
      - CM032
  - calloutType: insight
    title: Agentic AI's 47% CAGR is the most relevant near-term growth vector
    body: >-
      Of the three nested markets Sakana addresses, enterprise agentic AI (MarketsAndMarkets: $6.8B
      in 2025 growing to $46B by 2030 at 47% CAGR) is the most directly tied to Sakana Fugu and
      Sakana Marlin — the two products with confirmed enterprise deployments. This segment's growth
      is driven by enterprise demand for workflow automation beyond single-model inference, which is
      precisely the use case Sakana's multi-agent architecture is built for. If Sakana can establish
      Fugu as a production-grade API with comparable pricing to OpenAI's multi-agent offerings, the
      global agentic AI market provides a more defensible growth path than commodity LLM competition.
    claimRefs:
      - CM006
      - CM015
      - CM016
      - CM023

