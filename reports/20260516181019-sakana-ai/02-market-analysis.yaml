  - id: section-2
    title: Market sizing lenses and analyst estimates
    body: >-
      Market sizing for Sakana AI requires three nested lenses because no public source isolates a
      Sakana-specific SAM or SOM. At the broadest level, the global generative AI market attracts the widest
      range of analyst estimates: MarketsAndMarkets places it at $71.4B in 2025 growing to $890.6B by 2032
      at a 43.4% CAGR, while Precedence Research puts 2025 at $37.9B growing to $1.2T by 2035 (CAGR 37%),
      and Allied Market Research projects $191.8B by 2032 from a $10.5B 2022 base at a 34.1% CAGR. These
      disparities reflect different scope boundaries (some include chips and cloud infrastructure, others
      restrict to software) and should not be treated as interchangeable. The global LLM-specific market is
      narrower: MarketsAndMarkets projects $36.1B by 2030 at a 33.2% CAGR; Precedence Research places the
      2025 base at $7.8B growing to $149.9B by 2035 at a 34.4% CAGR. At the Japan-specific layer, IMARC
      Group estimates the Japan AI market at $7.9B in 2025, growing to $39.1B by 2034 at an 18.8% CAGR —
      a significantly lower CAGR than global because Japan's share of global AI spend has historically lagged
      its GDP weight, partly due to compute access constraints and legacy IT vendor lock-in. The agentic AI
      segment, most directly relevant to Sakana Fugu and Marlin, shows the highest projected growth:
      MarketsAndMarkets forecasts the enterprise agentic AI market at $6.8B in 2025 expanding to $46B by
      2030 at a 47% CAGR. Asia-Pacific is cited as the fastest-growing region in both generative AI and
      agentic AI by multiple sources, which is favorable context for Japan. Goldman Sachs separately
      estimates global AI-related investment approaching $200B annually by 2025, though it also notes
      productivity impact will be most visible "in the second half of this decade," implying near-term
      revenue ramp for model providers may be front-loaded on infrastructure rather than enterprise
      application value capture.
