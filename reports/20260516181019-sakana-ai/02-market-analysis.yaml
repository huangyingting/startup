  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Sakana-specific SAM and SOM
      missingEvidence: >-
        No public analyst or government source provides a Sakana-specific serviceable addressable market
        (SAM) or serviceable obtainable market (SOM). The Japan AI market estimate ($7.9B, IMARC) and
        agentic AI estimate ($6.8B, MarketsAndMarkets) are the closest proxies.
      whyItMatters: >-
        Without a SAM/SOM, valuation multiples cannot be rigorously grounded. The $2.6B Series B valuation
        implies significant market penetration assumptions that cannot be verified from public data alone.
      diligencePath: >-
        Request internal Sakana AI management accounts for contracted ARR by product and segment; ask for
        pipeline data by segment (government, megabank, enterprise); request independent customer reference
        calls to validate SMBC and ATLA contract scope and revenue.
      relatedQuestionRefs:
        - QM027
    - type: missing-source
      severity: material
      topic: Sakana AI disclosed revenue or ARR
      missingEvidence: >-
        No public source discloses Sakana AI's revenue, ARR, or contract values. ATLA, MIC, and SMBC
        contracts are confirmed but their financial scope is not disclosed.
      whyItMatters: >-
        Enterprise AI valuation requires revenue multiples. Without disclosed ARR, it is impossible to
        determine whether the $2.6B Series B valuation reflects a 10x, 50x, or higher revenue multiple.
      diligencePath: >-
        Request audited financials or management accounts; obtain LOIs or signed contract values under NDA.
      relatedQuestionRefs:
        - QM022
        - QM025
    - type: missing-source
      severity: moderate
      topic: Independent benchmark comparison of Namazu vs. competitor Japanese LLMs
      missingEvidence: >-
        No independent third-party benchmark comparing Namazu (Sakana) against NTT tsuzumi, Fujitsu Takane,
        NEC cotomi, and GPT-4o Japanese was found in accessible public sources.
      whyItMatters: >-
        Sakana's Japan-language model moat claim is central to its sovereign AI positioning but cannot be
        verified without benchmark data. If Namazu underperforms domestic or foreign competitors, the
        differentiation narrative weakens.
      diligencePath: >-
        Search for independent JLUE (Japanese Language Understanding Evaluation) or similar benchmark
        publications; request Sakana AI internal evaluation reports.
      relatedQuestionRefs:
        - QM023
        - QM025
    - type: missing-source
      severity: moderate
      topic: Japan AI market 2025 estimate corroboration from second independent source
      missingEvidence: >-
        The IMARC Group Japan AI market estimate ($7.9B, 2025) was the only accessible public source with a
        specific 2025 value for Japan. A second independent source (e.g., IDC Japan, Gartner Japan, or
        Deloitte Japan) would allow triangulation.
      whyItMatters: >-
        Single-source SAM estimates carry higher uncertainty. The Japan AI market is central to Sakana's
        near-term commercial case.
      diligencePath: >-
        Access IDC Japan or Gartner Japan AI spending reports (paywalled); alternatively use Japan's MIC
        IT investment statistics as a primary-source proxy.
      relatedQuestionRefs:
        - QM002
        - QM028
    - type: missing-source
      severity: moderate
      topic: Enterprise AI agent ROI within 12 months of deployment
      missingEvidence: >-
        No independent public study measuring enterprise AI agent ROI within 12 months of production
        deployment was found for the Japan financial services or government sectors. Goldman Sachs
        notes productivity impact will be visible "in the second half of this decade," and SMBC's
        deployment is too recent (April 2026) for ROI data to be publicly available.
      whyItMatters: >-
        If enterprise buyers require demonstrated 12-month ROI before renewing or expanding AI agent
        contracts, Sakana's ARR growth may be slower than implied by its agentic AI market positioning.
      diligencePath: >-
        Request early SMBC deployment metrics (time-per-proposal saved, analyst hours reduced); survey
        comparable AI agent deployments at Western banks with 6-18 months of production data.
      relatedQuestionRefs:
        - QM015
    - type: missing-source
      severity: low
      topic: Analyst reports arguing Japan AI market is overstated or domestic models underperform
      missingEvidence: >-
        No accessible public analyst or press report was found specifically arguing that Japan's AI
        market forecasts are overstated or that domestic Japanese LLMs materially underperform GPT-4o
        or other frontier models on standardized benchmarks.
      whyItMatters: >-
        Without adversarial evidence, the risk that Japan's sovereign AI narrative inflates near-term
        commercial potential without delivering commensurate model performance cannot be properly weighted.
      diligencePath: >-
        Search for JLUE (Japanese Language Understanding Evaluation) comparative benchmark publications;
        seek analyst commentary from Japan-focused tech media (Nikkei, Impress) on LLM performance gaps.
      relatedQuestionRefs:
        - QM030
        - QM023

