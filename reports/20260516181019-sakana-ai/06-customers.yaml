callouts:
  - calloutType: strength
    title: Anchor Enterprise Traction in Regulated Sector
    body: >-
      MUFG and SMBC production deployments in Japan's most regulated industry (banking)
      validate Sakana AI's ability to deliver enterprise-grade, compliance-adjacent AI.
      The ¥5B MUFG contract is the largest public AI contract for any Japan-based AI startup
      and provides multi-year revenue visibility.
    claimRefs:
      - CU001
      - CU002
      - CU027

  - calloutType: risk
    title: Extreme Customer Concentration and Investor-Customer Overlap
    body: >-
      The MUFG contract alone potentially represents 32-37% of estimated ARR. Combined
      with SMBC, top-2 concentration may exceed 50-60% of ARR. All four largest customers
      are also equity investors, undermining the independence of references. A non-renewal
      of MUFG in 2028 would be a material revenue event without offsetting new wins.
    claimRefs:
      - CU010
      - CU013
      - CU024
      - CU035

  - calloutType: recommendation
    title: Required Diligence Before Commitment
    body: >-
      Investors should require: (1) NRR by cohort from data room; (2) independent reference
      calls with ATLA and MIC (non-investor customers); (3) confirmation of Citi and Datadog
      revenue terms; (4) Western enterprise pipeline with conversion probability; (5) FSA
      compliance audit of MUFG and SMBC deployments.
    claimRefs:
      - CU012
      - CU022
      - CU023
      - CU025

