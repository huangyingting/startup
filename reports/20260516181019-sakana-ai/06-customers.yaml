figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Sakana AI's enterprise customer journey moves through strategic engagement, PoC,
      technical integration, production deployment, and account expansion, with
      government customers bypassing the PoC stage via direct procurement.
    data:
      items:
        - id: stage-engagement
          label: Strategic Engagement
          actor: C-suite or innovation team
          description: >-
            Enterprise buyer learns of Sakana AI through investor networks or strategic
            partnership outreach. MUFG and SMBC engaged as Series A co-investors before
            becoming customers. Government agencies engage through procurement processes.
        - id: stage-poc
          label: PoC and Pilot
          actor: Enterprise technical team and Sakana applied team
          description: >-
            Structured 3-9 month proof of concept. MUFG PoC ran July through December 2025
            (6 months) targeting loan document automation with demonstrated efficiency gains
            and human-in-the-loop verification workflows.
        - id: stage-integration
          label: Technical Integration
          actor: Enterprise IT and Sakana AI applied team
          description: >-
            AI system integrated into enterprise workflows; compliance reviewed; APPI and
            FSA requirements addressed; human oversight protocols established.
        - id: stage-production
          label: Production Deployment
          actor: Enterprise operations team
          description: >-
            System moves to production. MUFG phased branch rollout began Q1 2026; SMBC
            Proposal Generation App went live April 2026; ATLA and MIC deployments operational.
        - id: stage-expansion
          label: Account Expansion
          actor: Enterprise buyer and Sakana AI customer success
          description: >-
            Expansion to additional use cases, departments, or geographies. MUFG Phase 2
            covers credit approvals and expert knowledge embedding. Other accounts not yet
            publicly confirmed in expansion.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU015

