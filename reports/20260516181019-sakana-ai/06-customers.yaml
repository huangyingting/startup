runDate: '2026-05-16'
company:
  name: Sakana AI
chapter:
  number: 6
  title: Customers
  summary: >-
    Sakana AI's enterprise customer base is anchored by two Japanese financial-services
    production deployments — MUFG Bank (¥5B/3yr AI Scientist contract, pilot July 2025,
    phased production 2026) and SMBC Group (Automatic Proposal Generation App, live
    April 2026) — plus government-sector customers (ATLA defense agency, MIC Ministry),
    and strategic-investment partners acting as reference accounts (Citi, Mitsubishi
    Electric, Datadog). Customer concentration is extreme: the MUFG contract alone
    approximates estimated full-year ARR, no NRR or churn data is publicly disclosed,
    and most named customers are also investors, raising questions about arm's-length
    durability of the commercial traction.

sections:
  - id: section-1
    title: Customer Base Segmentation
    body: >-
      Sakana AI targets large Japanese enterprises in financial services, government/defense,
      and heavy industry, with a secondary focus on global enterprise technology partners.
      Its primary acquisition channel is direct enterprise sales combined with
      investor-to-customer conversion: MUFG, SMBC, Citi, and Mitsubishi Electric are all
      both cap-table participants and production or integration-stage customers. This
      dual-track model accelerates enterprise penetration in Japan but creates structural
      conflicts of interest. No resellers, channel partners, or marketplace distribution
      have been disclosed as of May 2026. Vertical segmentation: Japanese financial
      services megabanks (MUFG, SMBC, Citi); Japan government/defense (ATLA, MIC);
      industrial conglomerate (Mitsubishi Electric); enterprise technology (Datadog).
      This distribution is more concentrated than mature enterprise AI vendors, which
      typically diversify across five or more verticals in years two through four.
    claimRefs:
      - CU001
      - CU006
      - CU007
      - CU008
      - CU010
      - CU011
      - CU013
      - CU018
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: section-2
    title: Deployment Evidence and Production Proof
    body: >-
      The strongest customer-proof is the MUFG Bank partnership: a three-year engagement worth
      approximately ¥5 billion (~$34M total) deploying the AI Scientist for loan documentation
      and credit approvals, with a six-month PoC from July 2025 followed by phased branch-network
      production rollout in 2026. SMBC's Automatic Proposal Generation App launched into
      production in April 2026. ATLA (Japan Ministry of Defense) holds an active government AI
      contract; MIC holds a disinformation detection project — both confirmed via official
      Sakana AI blog posts. Mitsubishi Electric confirmed AI integration for manufacturing
      in its March 2026 press release. Citi's February 2026 announcement is generic:
      "advancing innovation in financial services" without a named product, suggesting
      early-stage integration. Datadog's Q1 2026 earnings highlighted the partnership for
      AI observability but no production ARR is disclosed. Proof quality: high for MUFG
      and SMBC; moderate for ATLA and Mitsubishi Electric; early-stage for Citi and Datadog.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009
      - CU014
      - CU015
      - CU021
      - CU027
      - CU028
      - CU029
    tableRefs:
      - TU002
      - TU003
    figureRefs:
      - FU002
      - FU003

  - id: section-3
    title: Retention, Durability, and Satisfaction
    body: >-
      No NRR, GRR, churn rate, or cohort data has been publicly disclosed. Retention must
      be inferred from proxy signals. Positive indicators: MUFG expanded scope from document
      automation to credit approvals in Phase 2; SMBC deployed a second product after its
      Series A co-investment; ATLA and MIC are government-mandated, mission-critical, and
      structurally unlikely to churn within the initial contract term; Citi's announcement
      explicitly frames a "long-term innovation" partnership. Negative indicators: no NRR
      or renewal data is disclosed; the investor-customer overlap creates reference-quality
      ambiguity; G2 reviews number fewer than 10 as of May 2026, indicating negligible
      SME or developer adoption; and AI Scientist hallucination concerns (57% rate in
      independent testing) remain unaddressed with customer-level quality guarantees.
    claimRefs:
      - CU012
      - CU013
      - CU015
      - CU016
      - CU019
      - CU022
      - CU024
      - CU032
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: section-4
    title: Expansion Trajectory and Concentration Risk
    body: >-
      Expansion evidence is limited to MUFG's Phase 2 scope growth (credit approvals and
      tacit-knowledge embedding beyond the original loan-doc use case). SMBC and Mitsubishi
      Electric expansion timelines and financial magnitudes are not publicly quantified.
      Customer concentration is extreme: if MUFG represents ~$11M/yr of an estimated
      $30-34M ARR base, a single customer accounts for 32-37% of revenue; adding SMBC
      pushes the top-two share above 50-60%. Geographic concentration is a structural
      risk: all confirmed production deployments are with Japanese entities. New-vertical
      entry (Mitsubishi Electric manufacturing) expands TAM but the contract scale and
      product maturity in that vertical remain unproven. All four largest customers are
      also equity investors, limiting the value of public references as proof of
      standalone commercial demand.
    claimRefs:
      - CU010
      - CU011
      - CU022
      - CU023
      - CU024
      - CU025
      - CU027
      - CU030
      - CU031
      - CU033
      - CU034
      - CU035
    tableRefs:
      - TU005

  - id: section-5
    title: Customer Verdict
    body: >-
      Sakana AI's customer base is real but nascent. MUFG's ¥5B production deployment and
      SMBC's live proposal generation app represent genuine enterprise validation in
      regulated financial services. Government contracts (ATLA, MIC) validate
      mission-critical AI deployment capability. However, the customer base is too
      small, too concentrated, and too investor-entangled to underwrite a $2.65B
      valuation with high confidence. No NRR, independent customer references, or
      Western enterprise production wins are available. The investor-as-customer
      structure, while common in Japan's keiretsu ecosystem, limits the reference
      value of existing accounts. Priority diligence: confirm MUFG Phase 2 contract
      addendum value; obtain NRR by cohort; determine whether Citi and Datadog are
      revenue-generating or marketing partnerships.
    claimRefs:
      - CU010
      - CU012
      - CU013
      - CU024
      - CU035

