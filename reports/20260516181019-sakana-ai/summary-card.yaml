summary:
  headline: >-
    Sakana AI is the leading Japan-native AI research company with production deployments at MUFG, SMBC, and ATLA, but
    its $2.65B valuation at ~88x estimated ARR and unresolved AI Scientist quality concerns warrant a TRACK stance
    pending third-party product audits and pricing normalization.
