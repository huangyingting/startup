  topStrengths:
    - >-
      First-mover advantage in Japan sovereign AI with production deployments at MUFG, SMBC, and ATLA — three
      institutions with strong collective commitment
    - >-
      Founding team credibility is exceptional: David Ha (Google Brain Research Director) and Llion Jones (transformer
      co-inventor) attract elite research talent
    - >-
      Strategic investor syndicate (MUFG, Citi, Mitsubishi Electric, NVIDIA, SoftBank) provides distribution, regulatory
      intelligence, and compute access
    - >-
      Japan AI Promotion Act 2025 is designed partly with domestic AI companies in mind; Sakana's vertical focus aligns
      with stated national strategic priorities
    - >-
      AI Scientist v2 addresses a large, underserved market: autonomous R&D acceleration for pharmaceutical, materials,
      and engineering research
  topRisks:
    - >-
      AI Scientist 57% hallucination rate (Ars Technica, August 2024) and 42% experimental failure rate raise unresolved
      production quality questions; no updated independent audit published
    - >-
      Customer concentration: MUFG contract (~$11M/yr) likely represents 35-50% of 2026E revenue; loss of MUFG would be
      materially adverse
    - >-
      Key-person risk: departures of David Ha or Llion Jones would impair research capability, talent attraction, and
      investor confidence without disclosed succession plans
    - >-
      Valuation at ~88x estimated ARR is 20-30% above the peer-group median (70x) for private AI research companies;
      secondary market entry at $2.0-2.3B would be more defensible
    - >-
      Japan APPI reform (April 2026) and EU AI Act high-risk classification create overlapping compliance obligations
      that a 155-person company may be under-resourced to manage
  unresolvedGaps:
    - >-
      No updated independent benchmark for AI Scientist hallucination or failure rates since August 2024; current
      production quality is unverifiable from public sources
    - >-
      MUFG and SMBC contract terms (SLA specifications, renewal conditions, revenue recognition) are not publicly
      disclosed
    - >-
      Series B cap table, investor voting rights, and founder vesting schedules are not publicly disclosed; governance
      transparency is low
    - >-
      Revenue, gross margins, NRR, and net income are not disclosed; all financial estimates are third-party derived and
      subject to material error
    - Key-person succession planning for David Ha, Llion Jones, and Ren Ito is not documented in any public source
