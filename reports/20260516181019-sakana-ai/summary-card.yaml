  shortDescription: >-
    Sakana AI is a Tokyo-based AI research company founded in July 2023 by David Ha (former Google Brain Research
    Director) and Llion Jones (transformer co-inventor). The company develops nature-inspired AI systems — including the
    AI Scientist autonomous research platform, EvoLLM adaptive language models, and enterprise AI agents — targeting
    Japanese financial services, defense, and industrial sectors. Strategic investors and customers include MUFG, SMBC,
    ATLA, Citi, Mitsubishi Electric, NVIDIA, SoftBank, and Sony.
