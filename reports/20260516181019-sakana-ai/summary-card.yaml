  topStrengths:
    - >-
      Nature publication + ICLR 2025 peer-review milestone validates AI Scientist as a genuine scientific advancement,
      providing unique enterprise credibility in Japan
    - >-
      MUFG AI Loan Expert in live production testing (nationwide rollout preparation April 2026): strongest enterprise
      anchor in Japan's most important banking relationship
    - >-
      Evolutionary model merging achieves 2–5× benchmark improvements over source models on Japanese-language tasks at a
      fraction of pretraining compute cost
    - >-
      Exceptional investor syndicate: NVIDIA (compute access), In-Q-Tel (US defense optionality), Khosla/NEA
      (institutional commercial conviction), MUFG (largest Japan bank anchor)
    - >-
      Japan's AI Promotion Act (September 2025) provides innovation-first regulatory environment with no meaningful
      compliance burden in the near term
  topRisks:
    - >-
      MUFG represents ~50–70% of estimated ARR; 3-year partnership renewal (May 2028) is a single-point valuation hinge
      — non-renewal is a thesis-break scenario
    - >-
      88x trailing ARR multiple is above fundamental range (45–70x); requires $140–200M ARR already priced in, demanding
      5–7× ARR growth within 3–4 years
    - >-
      No patents filed: all core techniques (EvoMerge, AI Scientist, AB-MCTS) are publicly published on arXiv;
      open-source replication (mergekit) erodes IP moat
    - >-
      AI Scientist 42% experiment failure rate (arXiv:2502.14297 independent evaluation) limits near-term commercial
      deployment in regulated research environments
    - >-
      All named enterprise customers are also equity investors, creating investor-as-customer conflict that prevents
      arm's-length commercial traction verification
  unresolvedGaps:
