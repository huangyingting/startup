      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景与回报分析
        blocks:
          - type: paragraph
            body: >-
              三个退出情景界定了以 $2.65B 入场的 Series B 投资人的回报轮廓。乐观情景要求 ARR 到 2029 年达到 $200-300M，路径包括 MUFG Phase 2 扩张、Citi 在 200+
              国家银行网络中的全球部署、Serendie 放量，以及来自 In-Q-Tel 路线的美国 / 日本政府 AI 合同。以 $300M 的 25-30x 前瞻 ARR 计算，由 Google
              DeepMind、Microsoft 或日本集团以 $8-12B 收购具有合理性——Series B 投资人回报 3-4.5x。基准情景要求 MUFG 在 2028 年续约，并在 2027 年前新增 2-3
              个企业锚点，使 ARR 达到 $100-150M。由 NEC、Mitsubishi Electric 母公司或 NTT 以 $4-6B 战略收购，可为 Series B 投资人带来 1.5-2.3x。KPMG
              Venture Pulse Q4 2025 确认，日本 AI 退出在 2025 年平均为 $800M-$1.5B，远低于 Series B 入场价；因此基准情景需要日本 AI 退出表现高于中位数。悲观情景由
              MUFG 在 2028 年 5 月不续约驱动：ARR 停滞在 $30-50M，被日本国家 AI 合资公司（SoftBank/Sony/NEC）替代，并以 $1-2B 下轮融资或人才收购收场，Series B
              投资人回报 0.4-0.75x，即亏损。最可能的退出机制是战略收购：投资者客户重叠（MUFG、NEC、KDDI、NVIDIA 均持股）使任何非友好退出都不现实。Sakana AI
              的知识产权栈（EvoMerge、AI Scientist、AB-MCTS）可为收购方企业 AI 产品带来能力跃升。若 ARR 达到 $100-200M，2028-2032 年东京证券交易所 Prime
              Market IPO 也有可能，但前提是经审计财务和 3+ 企业锚点，而这些尚未证明。
