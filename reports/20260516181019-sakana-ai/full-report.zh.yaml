        - 中
        - 等待二级市场以 $2.0-2.3B 入场，或等 Series C 后估值回调
      - - 估值立场
        - 按过去 12 个月 ARR 88x 已充分定价；合理区间为 ARR 45-70x（$30M ARR 对应 $1.35-2.1B）
        - 中
        - 当前入场价比基本面区间高 20-30%；需要耐心
      - - 风险评级
        - 高 — 客户集中、关键人、治理不透明、开源风险
        - 高
        - 任何入场都应设置 NRR 约束条款、优先权保护和披露要求
      - - 持有期
