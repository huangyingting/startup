            title: 关键人集中与治理披露不足
            body: >-
              Sakana AI 的品牌、投资者关系和人才管线高度依赖 David Ha 和 Llion Jones。两位创始人离开前雇主（分别是 Stability AI 和
              Google）时都显示出较强个人能动性，但未来若从 Sakana AI 离开，很可能造成不稳定。公司未公开披露董事会构成、任何外部董事治理结构、Responsible AI
              政策，或不断扩大的防务组合所需的军民两用技术保护措施。实质关键人风险叠加治理不透明，是机构投资者的尽调警示。
