        title: 融资背景与可比估值
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 的融资历史显示出清晰估值跃升：从 2023 年未披露种子轮，到 $1.5B 投后 Series A（2024 年 9 月，$214M，NVIDIA 领投），再到 $2.65B 投后
              Series B（2025 年 11 月，$135M）。14 个月内估值上升 77%，支撑因素是 MUFG 生产部署、Citi 战略投资和 Mitsubishi Electric 集成——这些都是 Series
              A 之后发生的事件。披露融资总额约 ~$379M，对应 $2.65B 估值，意味着账面价值 / 实缴资本约 7x，与高溢价私有 AI 公司一致。对照 GetLatka/Sacra 未审计的 $30M ARR
              估计，隐含倍数为 88x——是所有已披露私有 AI 可比公司中最高。Anthropic 约 $60B 估值、~$1.5-2B ARR（35-40x），Mistral AI $6B、~$100M
              ARR（60x），Cohere $5B、~$200M ARR（25x），AI21 Labs $1.4B，共同确认了 14-60x 的同业区间；Sakana AI 较 40-60x Series B
              中位数（PitchBook H2 2025）溢价 50-80%。Morningstar 将「主权溢价」识别为主要上行驱动：拥有独家本土市场准入的公司，在可比 ARR 下较全球同业高
              30-50%。PitchBook 确认，双重用例公司（商业 + 防务）还会获得额外 20-30% 溢价——两点都适用于 Sakana AI。CBInsights、KPMG 和 UBS 均记录，日本主权 AI
              投资项目为本土 AI 冠军企业创造溢价估值；按主权支持计，日本是全球前 5 AI 市场。
