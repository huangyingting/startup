            body: >-
              Sakana AI 的买家版图主要集中在日本三大垂直领域，Fugu API 则有部分全球买家。在日本金融服务，大型银行（SMBC、MUFG、Mizuho、Resona）是主要早期采用者。SMBC 于 2025
              年与 Sakana AI 签署合作，并在 2026 年 4 月部署批发银行提案生成应用——这是一个具体的企业工作流智能体案例，带有可衡量的生产率目标。预算归 CIO/CTO
              和数字化转型办公室所有，风险管理部门负责合规审查；采用触发点是降低研究和提案等劳动密集型工作流成本。在日本政府和防务，Sakana 于 2026 年 3 月获得 Japan's Acquisition,
              Technology and Logistics Agency（ATLA）合同，研究用多智能体 AI 融合多域指挥控制（C2）情报。Ministry of Internal Affairs and
              Communications（MIC）另选 Sakana AI 开发虚假信息检测和 SNS 空间可视化技术，项目属于 2025 财年（2026 年 4 月宣布）。预算分别由 Ministry of Defense
              和 MIC 所有，采购由政府合同流程控制。在 R&D 和科学自动化领域，Sakana 的 AI Scientist 平台（2026 年 3 月发表于
              Nature）面向需要自动化假设生成和文献综合的学术研究机构与企业 R&D 实验室。预算在研究负责人和 CTO 办公室。Sakana Fugu 的全球买家是科技公司开发者和工程团队，通过 API
              自动化编程、数学和科学推理，采用按调用或订阅定价。日本本土 LLM 买家还包括 NTT、KDDI、Sony 和其他大型日本企业集团，它们需要通过 Sakana Chat 和 Namazu
              模型系列实现日语企业聊天和知识管理。
