      - number: '3.2'
        title: 日本本土 LLM 供应商
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，八家日本本土公司已有基础模型商业部署或处于后期开发。NTT 的 Tsuzumi 2 于 2025 年 10 月发布，可在单块 NVIDIA A100-class GPU
              上运行，硬件成本约 ¥5 million（~$32,000）；NTT 将其定位为总成本比可比集群方案低 10–20×，瞄准需要本地部署数据主权的受监管企业。Preferred Networks（PFN）已完成
              16 轮融资、累计超过 $308 million，投资方包括 Toyota、Fanuc、NTT 和 Mitsubishi Corporation，估值约 ¥350 billion（~$2.2
              billion）。PFN 的 PLaMo 2.0 Prime 获得 2025 年 Nikkei Excellence in Products and Services Award，是首个获此荣誉的日本本土
              LLM；PLaMo 模型通过 Amazon Bedrock 部署，并由 150 多个日本地方政府通过 QommonsAI 平台使用。ELYZA 于 2024 年 3 月被 KDDI
              收购多数股权（53.4%），受益于 KDDI 的企业销售渠道；KDDI 承诺投入约 ¥100 billion 建设 AI 基础设施，包括扩张 ELYZA。Fujitsu 的 Takane LLM（~104B
              参数，与 Cohere 共同开发）在 JGLUE 日语基准上取得最高分。NEC 的 cotomi v3（2026）具备高速推理和 AI 智能体能力，瞄准医疗、制造和金融行业。CyberAgent 的
              CALM3-22B 是开放权重模型，在日本媒体和广告领域广泛部署。Rakuten AI 3.0（2026）采用 Mixture-of-Experts 架构，约 700 billion
              参数，是按参数规模最大的日本本土模型，可在 HuggingFace 获取。Rinna 是 Microsoft 支持的剥离公司，为日语对话任务提供开放权重模型。这八家供应商合计覆盖完整企业买家光谱，但没有一家复刻
              Sakana 的推理阶段扩展与面向科学的 AI 组合。
