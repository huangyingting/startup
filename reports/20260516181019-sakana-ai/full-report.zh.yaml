      - number: '2.2'
        title: 市场规模测算视角与分析师估计
        blocks:
          - type: paragraph
            body: >-
              要给 Sakana AI 测算市场规模，需要三层嵌套视角，因为没有公开来源单独切出 Sakana 专属 SAM 或 SOM。最宽口径是全球生成式 AI 市场，分析师估计差异最大：MarketsAndMarkets
              认为 2025 年为 $71.4B，2032 年增至 $890.6B，CAGR 43.4%；Precedence Research 给出的 2025 年基数为 $37.9B，2035 年增至 $1.2T（CAGR
              37%）；Allied Market Research 则预计从 2022 年 $10.5B 增至 2032 年 $191.8B，CAGR
              34.1%。这些差异来自不同范围边界（有的纳入芯片和云基础设施，有的只限软件），不能互换使用。全球 LLM 专属市场更窄：MarketsAndMarkets 预计到 2030 年达到 $36.1B，CAGR
              33.2%；Precedence Research 将 2025 年基数放在 $7.8B，并预计 2035 年增至 $149.9B，CAGR 34.4%。到日本层面，IMARC Group 估计 2025 年日本
              AI 市场为 $7.9B，2034 年增至 $39.1B，CAGR 18.8%——显著低于全球增速，因为日本在全球 AI 支出中的占比历来低于其 GDP 权重，部分原因是算力获取受限和传统 IT 厂商锁定。与
              Sakana Fugu 和 Marlin 绑定最直接的智能体 AI 细分市场增速最高：MarketsAndMarkets 预测企业智能体 AI 市场 2025 年为 $6.8B，到 2030 年扩至
              $46B，CAGR 47%。多家来源均称亚太地区是生成式 AI 和智能体 AI 增长最快地区，这给日本提供有利背景。Goldman Sachs 另行估计，到 2025 年全球 AI 投资接近每年
              $200B，但也指出生产率影响将在“本十年后半段”最明显，意味着模型供应商短期收入爬坡可能更多前置到基础设施，而不是企业应用价值捕获。
