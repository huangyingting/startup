      - number: '1.4'
        title: 产品组合与研究里程碑
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 的产品和研究产出可分为三层。第一层是基础研究：Evolutionary Model Merge（2024 年 3 月），证明进化算法可以在不重新训练的情况下整合多个开源 LLM 的知识，并于
              2025 年 1 月被 Nature Machine Intelligence 接收；The AI Scientist（2024 年 8 月预印本，arxiv
              2408.06292）是一个多智能体系统，可自主生成研究想法、运行实验、撰写论文并执行模拟同行评审，每篇论文成本低于 $15。AI Scientist-v2 达成一个里程碑：一篇完全由 AI 生成的论文通过
              ICLR 2025 研讨会的双盲同行评审流程（2025 年 3 月，获得 UBC IRB 批准，并得到 ICLR 领导层充分配合）。AI Scientist 论文由 University of British
              Columbia、Vector Institute 和 University of Oxford 共同署名，于 2026 年 3 月 26 日发表在 Nature——这是自动化 AI
              研究系统首次产出被全球最高影响力科学期刊认可的成果。其他研究贡献包括 Darwin Gödel Machine（2025 年 5 月），一种会改写自身代码的自我改进 AI；Continuous Thought
              Machines（CTM，2025 年 5 月）；以及 AB-MCTS 和 ShinkaEvolve。第二层是面向日本优化的 LLM：Namazu 模型系列（Namazu α，2026 年 3
              月），用后训练技术把领先开放权重模型适配到日本文化和安全规范，并驱动消费者服务 Sakana Chat。第三层是商业产品：Sakana Marlin，一个商业情报深度研究助手（2026 年 4 月 beta
              版），被描述为公司的首个商业产品；Sakana Fugu，一个多智能体编排系统（2026 年 4 月 beta 版），协调多组前沿基础模型，面向企业 API 用例。落地工作包括自 2025 年 5 月以来与
              SMBC Group 的合作，其中为 Sumitomo Mitsui Bank 开发的提案生成应用截至 2026 年 4 月已上线生产。
