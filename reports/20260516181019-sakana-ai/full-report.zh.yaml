      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 的智识身份与 CEO David Ha、CTO Llion Jones 密不可分。Ha 曾任 Google Brain 研究总监，是创始愿景的架构师，也是主要商业叙事人。Jones
              是原始「Attention is All You Need」Transformer 论文共同作者，是面向企业和投资者的技术可信度锚点。COO Ren Ito
              的政府关系经验，对日本企业和防务销售至关重要，因为该市场具有强文化特殊性。自 2023 年 7 月创立以来，公开资料未披露重大技术领导层离职。但三位高管均未公开披露继任计划或关键人留任协议。约 150-160
              名全职员工（FTE）的规模，相对 $2.65B 估值偏薄；公司要与 Anthropic、OpenAI、DeepMind 和 Meta 争夺前沿 AI 研究人员，而这些对手能提供高得多的薪酬。日本前沿 AI
              人才池主要集中在美国和英国，需要搬迁或远程安排。$135M Series B（2025 年 11 月）提供约 18-24 个月现金跑道，但若到 2026 年 Q4 仍无法显示有意义的 ARR 增长，Series
              C 定价和条款可能受损。执行风险升高，因为公司必须同时扩大企业销售、扩充应用产品团队，并维持研究发表节奏。
