  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 按客户审计的 ARR
        - 三年经审计财务报表；递延收入明细；按具名客户账户拆分的 ARR；2026 年 5 月 YTD 管理账
        - 验证 $30M ARR 估计是否基于合同收入；量化 MUFG 集中度 vs. 总 ARR；识别真实 ARR CAGR
        - CFO 数据室；向 Sakana AI 法务 / CFO 索取；要求审计事务所确认 ARR 确认政策
      - - 股权结构表和优先股堆叠
        - Series A 和 B 条款清单；清算优先权；反稀释条款；参与型优先股条款；期权池规模和 cliff 安排
        - 悲观情景（$1-2B 退出）下，若存在 1.5-2x 参与型优先股堆叠，普通股可能零回收；管理层激励一致性不清楚
        - 法律顾问；老股市场顾问；由资深 VC 律师审阅条款清单
      - - MUFG 合同续约评估
        - MUFG 3 年合同条款（到期日、续约条件、终止条款、范围和定价）；MUFG 访谈；MUFG AI Loan Expert 部署阶段进度
        - 2028 年续约是估值枢纽事件；仅不续约就会触发悲观情景；续约并扩展是基准情景的主要催化因素
        - MUFG 技术采购负责人；Sakana AI 数据室合同文件；独立渠道核查
      - - 出口管制法律意见
        - In-Q-Tel 投资后，对 Sakana AI 开源模型分发权的 ITAR / EAR 分析；双用途 AI 法规合规状态
        - In-Q-Tel 投资可能对开源模型发布施加出口管制限制，而这正是研究信誉核心；存在不合规风险
        - 有 In-Q-Tel 投资经验的美国出口管制律师；直接与 In-Q-Tel 沟通范围和限制
      - - 关键人物留任合同
        - David Ha 和 Llion Jones 股权归属时间表及 cliff 状态；竞业禁止和禁止招揽条款；董事会批准的留任计划
        - 88x 倍数中的研究信誉溢价押在两位具名联合创始人身上；若未受合同约束就离职，主要溢价依据将消失
        - 雇佣协议披露；董事会决议审查；与董事长进行 HR 尽调访谈
    notes: 尽调事项按其对估值分析的投资影响排序；顺序反映悲观情景评估的关键程度。若投资价格高于 $2.0B，承诺投资前应完成全部五项。
