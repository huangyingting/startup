      - number: '2.4'
        title: 增长驱动、采用约束与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              几股结构性力量利好 Sakana AI 的市场位置。日本政府加速推进主权 AI 政策：METI 和 MIC 于 2024 年 4 月联合发布 AI Guidelines for Business Ver
              1.0，整合此前三份指南，并建立正式监管框架，使日本企业投资 AI 治理更具合法性且部分成为要求。由 University of Tokyo 松尾豊教授担任主席的 AI Strategy Council 推动国家
              AI R&D 优先事项。日本首相在 2023 年 4 月明确支持产业界采用生成式 AI。这些政策信号提高了政府和金融行业投资本土 AI 供应商的意愿。MarketsAndMarkets 预计企业智能体 AI
              CAGR 为 47%，反映市场从被动 GenAI 工具转向自主工作流智能体——Sakana 的多智能体 Fugu 系统正是在这个细分市场竞争。全球 AI 投资周期（Goldman Sachs：到 2025 年每年
              ~$200B）创造总体需求，利好小众供应商。算力效率是复合驱动因素：Sakana 的进化式和模型合并路线，比从零训练前沿模型需要更少 GPU 算力，因此很适合日本有限的半导体制造基础和当前 Nvidia GPU
              供应约束。约束端，ROI 时间线并不确定：Goldman Sachs 明确称 AI 生产率收益将在“本十年后半段”最具影响，意味着 2025–2027
              年企业和政府客户可能面临内部论证门槛。面向高风险金融或防务决策训练并部署高准确率模型，需要大量验证和合规审查，拉长销售周期。OpenAI、Anthropic、Google 以及日本本土玩家（NTT
              Research、Fujitsu Takane LLM、NEC WISDOM2）随着扩展日语能力，竞争会加剧。开放 API
              细分市场的切换成本中等，但政府合同中很高，因为数据驻留和涉密网络要求一旦供应商通过资格认证，就会形成多年锁定。证据缺口包括：Sakana 合同收入或管线没有公开数据，ATLA 合同规模披露有限，Namazu
              与竞品日本 LLM 的独立基准缺失。
