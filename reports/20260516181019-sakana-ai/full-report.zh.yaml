  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 在三个重叠层级竞争。日本本土层面，至少八家公司在构建日语基础模型，领先者包括 NTT（Tsuzumi 2）、Preferred Networks（PLaMo）和 ELYZA（KDDI
              子公司）。每家公司用不同切入点服务企业买家：NTT 主打主权和单 GPU TCO，PFN 主打深度工业整合，ELYZA 借助 KDDI 分销网络。全球前沿层面，OpenAI、Google
              DeepMind、Anthropic 和 Mistral AI 争夺日本企业 API 份额；OpenAI 将日本视为美国之外最大的企业 API 市场，而 Anthropic 到 2025 年中达到约 32%
              全球企业份额。新兴物理 AI 层面，SoftBank、Sony、Honda 和 NEC 组成的 ¥1 trillion 联盟于 2026 年 4 月启动，瞄准工业机器人和制造业——这个细分与 Sakana AI
              只部分相邻，但对其算力高效路线越来越重要。Sakana AI 的主要竞争主张在方法论：进化式合并、AB-MCTS 推理阶段扩展，以及 AI
              自动化研究，让它不同于以预训练规模取胜的既有玩家。竞争图谱已有足够差异化，Sakana 占据了真实利基；但全球实验室加入效率导向技术、本土实验室扩展研究自动化能力后，趋同风险很实质。日本企业 AI
              市场呈现多供应商采用：企业同时部署来自不同供应商的多个 LLM API，降低单一供应商锁定，同时让 Sakana AI 在既有部署旁继续保有研究自动化利基。
