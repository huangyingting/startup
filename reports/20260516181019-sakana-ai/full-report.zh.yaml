      - number: '7.3'
        title: 合作伙伴与基础设施依赖风险
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 的商业交付栈建立在四根依赖支柱上，每根都有不同失效模式。第一，NVIDIA GPU 和
              CUDA：战略投资者关系可能带来算力定价优惠和早期硬件访问，但这些并非合同保证；任何关系恶化都会拿走这些隐性收益。第二，前沿 API 提供方（OpenAI、Anthropic、Google
              Gemini）：它们支撑 Fugu 和 Marlin 产品；其服务条款限制某些自主智能体用例，若针对 AI Scientist 设计执行限制，公司就需要重做产品。第三，MUFG 收入集中：这份三年 $34M
              合同约占估计 ARR 的 30-37%；若 2028 年不续约且没有替代客户，ARR 至少下降 30%。第四，Datadog 作为指定可观测性供应商（2026 年 2 月合作）：若 Sakana AI
              选择自建监控，中期切换成本会上升。投资者与客户重叠（MUFG、SMBC、Citi 和 Mitsubishi Electric
              既持股又是客户），使外界难以判断是否存在独立公平交易条件下的商业需求。半导体技术的地缘政治出口管制，是 NVIDIA 依赖的系统性尾部风险。开放权重后训练能力（进化模型合并）提供了部分 API 独立性，但无法解决
              GPU 算力依赖。
