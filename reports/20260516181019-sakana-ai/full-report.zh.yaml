      - number: '1.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 稀缺研究资历与日本主权定位
            body: >-
              Sakana AI 的创始团队把稀缺的国际 AI 背景（Attention Is All You Need 共同署名、Google Brain 领导经验）与深厚日本市场入口（外交背景、Mercari
              经验）结合在一起。AI Scientist 于 2026 年 3 月发表在 Nature，提供了可独立验证的一线科学背书；任何阶段的初创公司能拿到这种背书的都很少。公司的自然启发主张确实差异化：Sakana 不与
              OpenAI 或 Google 拼算力，而是专攻进化式优化和模型合并——这种路线很适合日本算力受限的环境，也契合主权 AI 政策议程。
