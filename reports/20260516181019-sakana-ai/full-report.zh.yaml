      - number: '8.7'
        title: 证据展项
        blocks:
          - type: callout
            title: 88x ARR——日本主权溢价还是估值泡沫？
            body: >-
              Sakana AI 以 88x 过去期 ARR 交易，高于所有私有 AI 同业，包括 Mistral（60x，欧盟主权）和 Anthropic（35-40x，尽管规模大 50 倍）。这一溢价有部分依据：MUFG
              生产锚点、Nature 发表可信度、In-Q-Tel 信号和日本结构性有利的 AI 监管环境，合计可支撑 45-70x。但 88x 意味着 $140-200M ARR 已被计入价格——未来 24
              个月的执行交付，将决定这一溢价能否守住，还是压缩回 40-60x 行业中位数。
            calloutType: insight
            claimRefs:
              - CV002
              - CV007
              - CV035
          - type: callout
            title: MUFG 2028 续约是估值铰链
            body: >-
              MUFG 三年合作在 2028 年 5 月续约，估计占 ARR 的 32-37%；这不是客户留存事件，而是估值拐点。续约并扩张将验证 $2.65B 入场价，并打开基准情景路径；若不续约，大概率触发下轮融资或
              $1-2B 困境并购。需要监测的关键领先指标，是 MUFG AI Loan Expert 分行推广进展，以及 Sakana AI 在 2027 年前新增第二、第三个企业锚点的能力。
            calloutType: risk
            claimRefs:
              - CV014
              - CV023
              - CV040
          - type: callout
            title: 未定价可选性——Citi 全球与防务合同
            body: >-
              $2.65B 估值只由日本国内 ARR 支撑，但 Citi 的全球银行网络（200+ 国家）和 In-Q-Tel 防务兴趣代表未定价 TAM 可选性，尚未进入任何公开 ARR 模型。若任一条转化——Citi
              在全球部署 Sakana AI 模型，或美国 / 日本政府 AI 合同从防务路线出现——即使不假设不现实的日本市场份额，$8-12B 乐观退出也会变得合理。
            calloutType: strength
            claimRefs:
              - CV021
              - CV022
              - CV038
