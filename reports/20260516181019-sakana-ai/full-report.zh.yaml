      - number: '5.2'
        title: 研究突破与核心算法贡献
        blocks:
          - type: paragraph
            body: >-
              作为一家成立不到三年的创业公司，Sakana AI 的研究产出异常高效：核心论文进入两本 Nature 系列期刊，并有一篇论文被 ICLR 接收。AI Scientist 框架（2024 年 8 月
              arXiv，2026 年 3 月 Nature）展示了机器学习研究闭环的端到端自动化：生成想法、编写并运行实验代码、撰写论文和模拟评审，每篇论文成本低于 $15。AI Scientist v2
              更进一步：一篇完全由 AI 生成的论文通过了 ICLR 2025 研讨会的盲审人工同行评审，平均分 6.33，高于研讨会接收门槛。团队为评估论文质量构建的自动评审器达到 69% 平衡准确率，可与人类
              NeurIPS 评审相比；论文质量也显示出随更好基础模型提升的清晰规模定律。Evolutionary Model Merging（2024 年 3 月 arXiv，2025 年 1 月 Nature
              Machine Intelligence）提出了同时覆盖参数空间和数据流空间的进化搜索算法，用来组合多种开源模型；由此产生的 EvoLLM-JP-v1-7B 在 MGSM-JA 等日语 LLM
              基准上达到最优水平（SOTA），并超过参数量大得多的模型。Transformer²（ICLR 2025）提出 Singular Value Finetuning（SVF），用强化学习训练紧凑的
              z-vectors，在推理时调制权重矩阵组件；它在数学、编码、推理和 VQA 任务上用更少参数超过 LoRA。Darwin Gödel Machine（2025 年 5 月预印本，2026 年 3
              月更新）通过开放式进化搜索，把编码智能体在 SWE-bench 上的表现从 20.0% 提升到 50.0%，在 Polyglot 上从 14.2% 提升到
              30.7%，且改进能泛化到不同基础模型。Continuous Thought Machine（2025 年 5 月）借鉴生物神经网络的神经元同步时序，实现逐步、可解释推理，展示了类人迷宫求解和更好的图像识别。支撑
              Sakana Marlin 的 AB-MCTS 被 NeurIPS 2025 接收为重点论文（约为接收论文前 10%）。这些突破共享同一条论点：集体智能和进化搜索能产生单体规模化模型难以轻易复制的能力。
