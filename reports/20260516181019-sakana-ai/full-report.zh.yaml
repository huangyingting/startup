      - number: '1.2'
        title: 创始人、领导层与关键人治理
        blocks:
          - type: paragraph
            body: >-
              三位联合创始人合起来覆盖早期 AI 实验室所需的技术、运营和外部关系职能。David Ha 是公司最公开的面孔，也是其国际研究信誉的主要来源：他领导过 Google Brain
              东京办公室，共同发展神经网络压缩和世界模型概念，并在 Stability AI 于 2022–2023 年出现有据可查的财务和领导层动荡期间加入后离开。媒体广泛报道他离开 Stability AI 后立即创办
              Sakana AI，将其视为困境 AI 实验室人才外流的信号。Llion Jones 带来硬核 Transformer 架构血统；他共同署名的 “Attention Is All You Need”
              仍是该领域被引用最多的论文之一，他在 Sakana AI 的存在也在投资材料和媒体报道中被频繁用作技术履历的代理指标。COO Ren Ito 提供运营连续性和日本市场入口，背景包括日本最大消费者科技独角兽之一
              Mercari，以及更早的日本外交服务经历。Sakana AI 已披露 Applied Team（事業開発本部）于 2025
              年初正式成立，负责企业和政府实施合同，重点放在金融服务、防务和情报。公司从日本头部科技公司、国际 AI 实验室和日本政府机构招聘。关键人风险很实质：David Ha 和 Llion Jones
              共同代表公司的主要研究品牌；任何一人离职，都可能削弱融资和人才留存。公司尚未详细公开董事会构成和外部董事治理，这是尽调缺口。
