      - number: '7.5'
        title: 缓释框架与终止条件
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 已披露的风险缓释覆盖四个领域。监管：日本《AI 促进法》的创新优先原则，在短期内提供对强制产品召回的法律保护；面向日本企业客户的数据主权架构，回应 APPI 数据本地化要求。技术：MUFG
              部署对所有信贷建议加入人类在环审查；AI Scientist
              的开源代码库允许外部审计，虽然尚无第三方评审发表。基础设施：开放权重后训练能力（进化模型合并、Llama/DeepSeek/Mistral）为后训练工作负载提供部分前沿 API
              独立性。关键人：股权归属安排已存在（条款未披露），作为留任机制。值得投资人升级处理的投资逻辑破裂触发器包括：MUFG 合同在 2028 年不续约，且没有同等规模替代；CTO Llion Jones 非计划离职，且
              30 天内未指定继任者；APPI 或 EU AI Act 下发生监管执法，罚款超过估计 ARR 的 5%；到 2026 年底仍未签下任何日本以外净新增企业客户；以及有记录的幻觉事件导致 MUFG
              银行业牌照遭监管处罚，把信贷风险从运营层面升级为系统性层面。监管和关键人触发器应按季度监测；技术质量事故应持续监测；MUFG 续约风险应按年监测。
