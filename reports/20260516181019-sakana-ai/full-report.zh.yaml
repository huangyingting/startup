      - number: '3.4'
        title: Sakana AI 的差异化定位
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 的竞争差异化建立在三根技术支柱上。第一，AB-MCTS（Adaptive Branching Monte Carlo Tree Search）在推理阶段编排来自不同供应商的多个异构
              LLM，让它们协作完成复杂任务，无需重新训练。由 o4-mini、Gemini-2.5-Pro 和 R1-0528 组成的 Sakana AI 模型群在 ARC-AGI-2 任务上达到 27.5%，高于单独
              o4-mini 的 23%——相对最佳单模型在复杂基准上提升约 30%。实现 AB-MCTS 的 TreeQuest 框架开源且模型无关，兼容 OpenAI、Google 和 DeepSeek
              模型。第二，Sakana AI 的进化式模型合并路线，比 NTT 或 PFN 大规模从零预训练需要少得多的 GPU 基础设施，降低资本支出，并在 GPU 受限的日本企业环境中带来算力成本优势。第三，AI
              Scientist v2 声称可自动化从假设生成到论文草拟的完整研究生命周期。独立学术评估发现其实验失败率为 42%，新颖性检测较浅，在质量缺口关闭前会限制商业采用。VentureBeat 报道称，Sakana
              AI 明确把自己定位为以受自然启发、算力高效的架构策略挑战 OpenAI 和 Anthropic 的世界级 AI 研究实验室。Sakana 的结构性优势在于，AB-MCTS
