            body: >-
              Series B 的投资方组合（In-Q-Tel、Google、Salesforce Ventures、Citi、MUFG、Mitsubishi Electric）揭示出双重商业策略：通过 In-Q-Tel
              指向美国关联的防务 / 情报方向，同时通过大型银行和工业集团在日本市场做企业落地。ATLA 防务合同和 MIC 虚假信息项目合在一起，说明 Sakana AI 正把自己定位为日本国家安全应用的首选主权 AI
              供应商——这个细分赛道政治韧性强，也能抵御美国前沿实验室竞争。
