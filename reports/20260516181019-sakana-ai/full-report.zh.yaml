      - number: '8.2'
        title: 推荐与估值立场
        blocks:
          - type: paragraph
            body: >-
              总体立场：建设性等待，信心中等、风险评级高。日本主权 AI 逻辑和 Sakana AI
              的研究可信度在全球层面确实有差异化；投资财团（Khosla、NEA、Lux）具有独立回报要求，说明商业信念不只是战略投资。但在 88x 过去期 ARR 下，入场价格比符合 Sakana AI 画像公司的
              45-70x 基本面估值区间高 20-30%，当前估值也隐含在尚未证明增长前就计入 $140-200M ARR。Datadog Q1 FY2026 SEC 8-K
              监管文件对合作的披露，是唯一达到监管文件级别的客户确认，提升了美国投资者可信度，但尚未证明商业规模。建议入场方式：在 $2.0-2.3B（45-70x ARR）老股市场入场；此时日本主权溢价仍保留，但 88x
              估值缺口在新资金进入前已收敛。另一选择是等待 2026 年 ARR 增长轨迹不及预期后，Series C 后出现估值修正。持有期：5-7 年（Khosla/NEA/Lux Series B 目标
              2030-2032 退出窗口）。提升信心前需要确认的关键催化剂：MUFG Phase 2 扩张合同补充协议价值（2026）、Citi 产品部署公告（2027）、AI Scientist v3
              质量改善结果，以及经审计 ARR 披露（数据室）。
