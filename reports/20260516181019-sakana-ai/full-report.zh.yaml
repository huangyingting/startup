companyProfile:
  summary: >-
    Sakana AI 是一家 Series B 阶段 AI 研究公司（2023 年 7 月成立，总部东京），由 CEO David Ha 和 CTO Llion Jones 领导。公司开发受自然启发和进化式 AI 系统，包括 AI
    Scientist（自主生成科研论文）、EvoLLM（进化式语言模型合并），以及面向金融文档自动化、科学发现和防务应用的一组企业 AI 智能体。截至 2026 年 5 月，已确认的生产部署包括 MUFG（信贷文档，¥5B / 3
    年合同）、SMBC（战略提案生成）、ATLA / Ministry of Defense Japan（防务 AI）和 Mitsubishi Electric。战略投资方与合作伙伴包括
    NVIDIA、SoftBank、Sony、MUFG、Citi 和 Mitsubishi Electric。Series B（$135M，2025 年 11 月）给公司的估值为 $2.65B，累计融资约 $379M。
  foundedDate: '2023-07-01'
  founders:
    - name: David Ha
      role: CEO 兼联合创始人
      background: >-
        曾任 Google Brain 研究总监和全球负责人；领导 Google 的创意 AI 研究；University of Toronto 电气工程博士；因神经进化和生成式模型研究在国际上获得认可。为创办 Sakana
        AI，从 San Francisco 迁至 Tokyo。
    - name: Llion Jones
      role: CTO 兼联合创始人
      background: >-
        “Attention Is All You Need”（Vaswani et al., 2017）共同作者，这篇奠基论文提出了 Transformer 架构；曾任 Google Brain 软件工程师。他的加入给公司在
        Transformer 时代 AI 栈上带来创始层面的技术背书。
    - name: Ren Ito
      role: COO 兼联合创始人
      background: 曾任 McKinsey 咨询顾问；负责 Sakana AI 在日本企业市场的商业化、监管沟通和运营基础设施。推动 MUFG 和 SMBC 等金融行业合作落地。
