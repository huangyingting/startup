  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: >-
      决策链从日本主权 AI 逻辑出发，经过 MUFG 生产验证、研究可信度检查、风险评估和估值校验，落到建设性等待 建议。每个节点代表一个独立尽调门槛，并标注通过 / 谨慎状态。该流程确认：尽管存在 88x ARR
      溢价和客户集中度，日本主权逻辑与 In-Q-Tel 可选性仍支持在合适入场价格（$2.0-2.3B 老股交易）下保持建设性立场。
    data:
      nodes:
        - id: japan-sovereign
          label: 日本主权 AI 投资逻辑
          detail: 日本国家 AI 战略、METI 指引和政府采购共同造出结构性封闭市场；还没有外国 AI 公司以 MUFG 这样的规模切入日本企业 AI；Morningstar、KPMG、CBInsights 2025 均确认主权溢价
          type: process
        - id: mufg-proof
          label: MUFG 生产环境验证
          detail: >-
            与日本最大银行签下 ¥5B / 3yr 合同；AI Loan Expert 2026 年在网点推进落地；SMBC 自 2026 年 4 月起进入生产；Mitsubishi Electric 2026 年 3
            月集成——在受监管金融服务规模上拿到锚定企业验证
          type: process
        - id: research-credibility
          label: 研究可信度与可选性
          detail: >-
            Nature 论文（2024 年 10 月）和 In-Q-Tel Series B 投资释放前沿 AI 可信度信号；Citi 全球路径（200+ 个国家）与美国防务路径（In-Q-Tel）带来尚未计入任何 ARR
            模型的 TAM 可选性
          type: process
        - id: risk-assessment
          label: 风险评估（反向）
          detail: >-
            88x ARR 意味着市场已计入 $140-200M ARR（谨慎）；MUFG 2028 年续约存在风险且集中度高（谨慎）；治理不透明——没有经审计 ARR、没有股权结构表（谨慎）；缺席 Gartner
            MQ——企业采购存在缺口（谨慎）
          type: process
        - id: valuation-check
          label: 估值校验
          detail: >-
            按 $30M ARR 计算，基本面区间 45-70x ARR = $1.35-2.1B；当前 88x = $2.65B，比基本面高 20-30%；Mistral（60x 欧洲主权）给出 60x 先例，但支撑不了
            88x；入场必须守在 $2.3B 或以下
          type: process
        - id: recommendation
          label: 建议——建设性等待
          detail: >-
            投资逻辑成立；主权溢价真实存在；In-Q-Tel 与 Citi 可选性也真实存在；但 88x ARR 入场价高出基本面区间 20-30%；等待 $2.0-2.3B 老股交易或 Series C
            后回调；两个催化因素确认后上调至买入
          type: process
    approximationNotes: 流程逻辑综合 CV001-CV040 的证据；单个节点断言均有分析师来源和章节证据支撑。建设性等待 取决于老股市场入场纪律；在 88x ARR 下，该仓位不适合按完整轮次配置。所有节点评估都是分析判断，不构成投资建议。
    claimRefs:
      - CV003
      - CV006
      - CV011
      - CV026
      - CV035
      - CV038
      - CV040
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: >-
      八组 ARR 与倍数组合对应的隐含企业价值（$B），覆盖悲观底部（$30M ARR 上 15x = $450M）到乐观上限（$300M ARR 上 30x = $9B）。图表确认，在当前 ARR 水平，倍数每提高
      10x，企业价值就增加 $300M–$3B；这解释了为什么在 $30M ARR 阶段，倍数选择是估值的主导杠杆。
    data:
      items:
        - label: 悲观：$30M ARR 的 15x（当前估计）
          value: 450
        - label: 悲观：$50M ARR 的 25x（增长慢）
          value: 1250
        - label: 基准：$100M ARR 的 30x（2027 估计）
          value: 3000
        - label: 基准：$150M ARR 的 35x（2028 估计）
          value: 5250
        - label: 乐观：$200M ARR 的 25x（2029 估计）
          value: 5000
        - label: 乐观：$300M ARR 的 30x（2030 估计）
          value: 9000
        - label: Series B 入场（$30M ARR 的 88x）
          value: 2650
        - label: 基本面公允价值底部（$30M ARR 的 45x）
          value: 1350
    approximationNotes: >-
      $30M ARR 基数来自第三方未经审计估计；所有估值数字只是示例性敏感性区间，不是预测。$2.65B Series B 入场价为确切数字；其他数值均为分析师估计。倍数假设来自 PitchBook H2 2025 同业数据和
      Morningstar 主权溢价分析。所有数值以百万美元计（柱状图为便于阅读显示为十亿美元）。
    claimRefs:
      - CV002
      - CV007
      - CV018
      - CV035
      - CV036
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: >-
      Sakana AI 乐观 / 基准 / 悲观退出估值区间（$B）与 $2.65B Series B 入场估值对比。乐观情景需要 MUFG 续约、Citi 全球部署和 Serendie 放量；基准情景需要 MUFG 续约并新增
      2-3 个企业锚定客户；悲观情景反映 MUFG 不续约且 ARR 停滞。
    data:
      items:
        - label: 乐观情景退出估值（$B）
          low: 8
          high: 12
        - label: 基准情景退出估值（$B）
          low: 4
          high: 6
        - label: 悲观情景退出估值（$B）
          low: 1
          high: 2
        - label: Series B 入场估值（$B）
          low: 2.65
          high: 2.65
        - label: $30M ARR 下的基本面公允价值区间（$B）
          low: 1.35
          high: 2.1
    approximationNotes: >-
      所有情景区间均为分析师估计；实际区间取决于 ARR 增长轨迹、流动性事件时的退出倍数、股权结构表中的优先股堆叠和市场环境。Series B 入场价为已确认的投后估值。基本面公允价值区间来自 $30M ARR 基数（未经审计）上的
      45-70x。所有数值以十亿美元计。
    claimRefs:
      - CV012
      - CV013
      - CV014
      - CV015
      - CV016
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: >-
      截至 2026 年 5 月，投资委员会从七个维度给 Sakana AI 打分。日本主权市场地位是明确优势；客户验证部分正面，但受集中度限制；考虑开源商品化风险，护城河强度为中性；
      单位经济、证据质量和治理仍是风险维度，正式全额投入前必须解决。
    data:
      nodes:
        - id: kpi-market
          label: 市场地位
          detail: >-
            日本主权 AI 龙头，背靠 METI 顺风；金融服务和政府形成锁定型企业市场；日本是 AI 投资前五市场（KPMG 2025）；UBS 预计 2030 年日本企业 AI TAM 为
            $44-70B；本土地位具备结构性防御力
          type: strength
        - id: kpi-proof
          label: 客户验证
          detail: >-
            MUFG ¥5B 生产部署和 SMBC 生产上线（2026 年 4 月）已确认；ATLA 防务合同与 Mitsubishi Electric 集成在推进；但 4
            大客户同时都是股权投资者——投资者与客户重叠削弱参考质量
          type: neutral
        - id: kpi-moat
          label: 护城河强度
          detail: >-
            Nature 发表论文（2024 年 10 月）与 In-Q-Tel 投资释放前沿 AI 可信度信号；MUFG 生产集成带来切换成本；AI Scientist v2 已展示；但 EvoMerge
            开源商品化风险真实存在，竞争窗口也在收窄
          type: neutral
        - id: kpi-economics
          label: 单位经济
          detail: >-
            ~$30M ARR（未经审计估计，GetLatka/Sacra 2025 年 6 月）；88x ARR 倍数意味着执行缺口很大；未披露 NRR、毛利率、烧钱速度； 所有收入数据都是第三方估计——对 ARR
            基数的信心为低
          type: risk
        - id: kpi-risk
          label: 主要风险
          detail: >-
            MUFG 2028 年续约有风险（>35% ARR）；EvoMerge 开源商品化；日本国家 AI 合资企业（SoftBank/Sony/NEC）带来竞争风险； 治理不透明（没有经审计
            ARR、没有股权结构表）；关键人集中（Ha 和 Jones）
          type: risk
        - id: kpi-valuation
          label: 估值立场
          detail: >-
            88x 往绩 ARR 比基本面 45-70x 区间高 20-30%；Mistral（60x 欧洲主权）是最接近先例，但 Sakana AI 较 Mistral 溢价 47%；老股交易入场的公允价值为
            $2.0-2.3B（$30M ARR 的 45-70x）；当前价格下维持建设性等待
          type: neutral
        - id: kpi-evidence
          label: 证据质量
          detail: 中——MUFG 与 SMBC 生产部署已确认；Datadog 8-K SEC 文件已确认；但 ARR 是未经审计的第三方估计；股权结构表未披露；NRR 未披露；烧钱速度未披露；经审计财务报表是最关键的单一尽调缺口
          type: risk
    approximationNotes: >-
      优势 / 中性 / 风险评级是基于公开证据作出的定性分析判断。单位经济和证据质量被评为风险，并不是因为经济性已确定很差，而是缺少经审计 ARR、NRR 和利润率数据，无法独立验证。估值立场反映分析师的公允价值区间；当前 88x
      倍数不一定错误——但它高于基本面区间，需要近期执行兑现才能撑住。
    claimRefs:
      - CV003
      - CV006
      - CV010
      - CV020
      - CV037
      - CV038
      - CV040
