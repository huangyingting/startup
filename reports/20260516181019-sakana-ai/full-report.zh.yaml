        title: 估值风险与投资逻辑破裂触发器
        blocks:
          - type: paragraph
            body: >-
              四项结构性估值风险界定下行空间。第一，收入轨迹缺口：在 88x ARR 下，Sakana AI 隐含计入 $140-200M ARR。HBR 2025 警告，高于 60x ARR 的 AI 公司中有 40%
              在收入低于预测超过 20% 时经历 >40% 估值压缩；Deloitte 的 18-24 个月研究到生产转化窗口在 2025 年 10 月至 2026 年 4 月到期——也就是当前时期。若 2026 年 ARR
              增长只确认 $40-50M，估值会从 88x 压缩到行业中位数 40-60x，按 $40-50M ARR 计算意味着 $1.6-3B 区间。第二，客户集中：仅 MUFG 可能贡献估计 ARR 的
              32-37%。2028 年续约不是客户事件，而是估值拐点。若不续约且没有替代赢单抵消，在当前 ARR 下会暴露 $1-2B 悲观情景。第三，开源商品化：EvoMerge
              和模型合并技术已在开源社区快速扩散。Gartner 2025 Magic Quadrant 缺少 Sakana
              AI，反映其研究到企业转型仍有缺口；若商品化速度超过企业交付，知识产权护城河会显著收窄。第四，治理不透明：没有经审计 ARR、没有股权结构表、没有烧钱速度、没有清算优先权披露。在 $1-2B
              悲观退出中，投资人优先权悬置压力可能完全吃掉普通股东和员工回报。这种不透明是无法从公开证据解决的系统性风险。
