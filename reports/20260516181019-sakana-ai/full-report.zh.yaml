        title: 进入日本的全球前沿 AI 实验室
        blocks:
          - type: paragraph
            body: >-
              五家全球前沿 AI 实验室在日本企业 AI 市场已有实质存在。OpenAI 截至 2025 年把日本视为美国之外最大的企业 API 市场，并通过与 Microsoft Japan 的 Azure OpenAI
              Service 合作运营；其全球企业 LLM API 市场份额从 2023 年约 50% 降至 2025 年中约 25%，Anthropic 和 Google 同期追上。Anthropic 的 Claude
              模型到 2025 年中达到约 32% 全球企业 AI 市场份额，在企业账户上超过 OpenAI；Claude 在日本主要通过 AWS Bedrock 分销。Google DeepMind 既是 Sakana AI
              的战略投资方，也是通过 Gemini 和开放权重 Gemma 家族竞争的直接对手；AlphaFold 2 因蛋白质结构预测赢得 2024 年诺贝尔化学奖，确立了 DeepMind 在科学发现 AI
              上的领先地位，而这正是 Sakana 的 AI Scientist 瞄准的领域。Mistral AI 于 2025 年 9 月估值超过 $13 billion，并预计 FY2025 收入约 $60
              million；其开放权重姿态吸引注重隐私的日本企业，因为这些企业可以自行托管且无需许可成本。全球前沿实验室通过主要云市场分销 AI 服务——Azure OpenAI Service、Google Cloud
              Vertex AI 和 AWS Bedrock——绕过日本本土供应商在数据驻留合规上的优势。这条云市场分销渠道是结构性竞争威胁，本土既有厂商和 Sakana 都必须用主权或性能论证来抵御。
