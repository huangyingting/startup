  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险格局
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 处在三套相互重叠的监管制度之下。日本《个人信息保护法》（APPI）修订案于 2026 年 4 月生效，限制 AI 驱动的画像和自动化个人决策，直接适用于 MUFG 的 AI Scientist
              信贷审批部署。日本金融厅面向银行的 AI 部署指南又叠加了一层合规要求，要求在高风险自动化决策中设置人类监督检查点。日本 2025 年通过的《AI 促进法》提供创新优先框架，对研究阶段 AI
              的上市前审批要求有限，使 Sakana AI 在国内短期拥有监管缓冲。EU AI Act Regulation 2024/1689 在 Annex III 下把信用评分和信用度评估归为高风险；若 Sakana
              AI 扩张到欧洲企业客户，将产生重大合规敞口。美国敞口仍限于经 ATLA 触达的 DoD 相邻工作，NIST AI RMF 和 CISA AI 安全指南带来软性合规预期。截至 2026 年 5 月，未发现 SEC
              filings 或正式执法行动。没有任何公开披露的 DPIA 或 APPI 合规框架，是一个尽调缺口：APPI 修订案 2026 年 4 月生效时，Sakana AI 可能还未完成合规架构文档。银行 AI
              部署渠道的监管风险被归类为高概率、中到高影响；国际扩张渠道为中等概率、中等影响。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
