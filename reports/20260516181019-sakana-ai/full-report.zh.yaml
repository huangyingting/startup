      - number: '5.4'
        title: 部署、集成与商业应用证据
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Sakana AI 的商业部署证据仍处早期，但在日本企业和政府部门方向上很强。最清晰的部署证明，是 2026 年 4 月在 Sumitomo Mitsui Bank 部署的 SMBC
              银行提案生成应用；它用多智能体 AI 自动生成批发银行提案，把过去需要一到两周的流程压缩到数小时。多个 AI 智能体协同完成信息收集、分析、假设构建、叙事起草和质量评估。ATLA 防务合同（2026 年 3
              月签署）要求 Sakana 投入多年研究，为指挥控制系统增强开发 AI，其中包括可在无人机边缘设备上运行的小型视觉语言模型（SVLM）。MIC 虚假信息项目（2026 年 4 月完成）交付了三项集成 AI
              能力：新颖性搜索叙事提取、带可解释推理的多模型深度伪造检测，以及用基于智能体的模型（ABM）模拟反制信息效果。Sakana Chat（2026 年 3 月推出）已完成约 1,000 名用户 beta
              测试，并通过网络搜索集成公开可用。Sakana Marlin（封闭 beta，2026 年 4 月）接受申请，面向专业战略研究场景。Sakana Fugu（开放 beta，2026 年 4 月）以 API
              形式提供，分为 fugu-mini 和 fugu-ultra 层级。所有商业产品的集成看起来都以日本优先；Applied Team 成立于 2025 年 3 月，聚焦金融和防务两个锚定垂直。公司已明确表示，计划在
              2026 年扩展到工业、制造和政府部门。截至运行日期，任何商业产品都没有公开 SLA 承诺、正常运行时间历史、事故记录或正式企业支持条款。
