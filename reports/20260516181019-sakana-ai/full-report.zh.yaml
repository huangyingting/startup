      - number: '1.5'
        title: 战略合作、防务与治理考量
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 已形成双轨战略姿态：一边在国际上建立前沿研究信誉，一边把自有 AI 部署到日本风险最高的行业。NVIDIA 关系随 2024 年 9 月 Series A
              正式化，涵盖研究合作、提前访问数据中心基础设施，以及在日本共同建设 AI 社区；NVIDIA 的 GPU 访问对 Sakana 的进化式扩展实验很关键。MUFG 关系始于 Series A，并随着 MUFG
              继续参与 Series B 加深；Daiwa Securities 也在博客文章中被提为战略合作伙伴。政府领域，日本 Ministry of Internal Affairs and
              Communications（MIC）选择 Sakana AI 作为其 2025 财年检测和应对社交网络虚假信息项目的技术开发方（2026 年 4 月 7 日宣布）。对风险画像最重要的是，Sakana AI 于
              2026 年 3 月与 Japan's Acquisition, Technology and Logistics Agency（ATLA）Defense Innovation
              Institute（防衛装備庁防衛イノベーション科学技術研究所）签署委托研究合同，内容覆盖用于指挥控制系统的多域（陆 / 海 / 空）数据集成。In-Q-Tel 出现在 Series B
              投资方名单中，与防务路径一致。公司进入防务和情报 AI，引出尚未公开回答的治理问题：公司没有公开可查的 Responsible AI 政策、军民两用技术治理框架或出口管制合规披露。科学界也担心 AI
              生成研究论文涌入同行评审；Science/AAAS 出版物承认，围绕 AI 署名稿件的社区规范仍未稳定。这些治理和声誉风险，是任何机构投资者都必须纳入尽调的实质事项。
