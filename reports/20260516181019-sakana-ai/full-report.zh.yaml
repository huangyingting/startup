        - 中
        - 与 MUFG 续约（2028）、Citi 部署（2027）和日本 IPO 资格（2030+）匹配
      - - 优先催化剂
        - Citi 产品落地、MUFG 二期扩展、AI Scientist v3、经审计 ARR
        - N/A
        - 确认任意两个催化因素后，再加仓或上调至买入
    notes: 该建议综合全部证据章节后的分析师判断；不构成买卖证券的要约。CONSTRUCTIVE-WAIT 表示投资逻辑成立，但需要守住入场纪律；若能以 $2.0-2.3B 的老股价格入场，可上调至买入。
