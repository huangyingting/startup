      - number: '8.6'
        title: 退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              退出准备度从五个维度评估。收入规模（IPO 最低约 ~$100M ARR）：当前约 ~$30M ARR 仅为 IPO 可行门槛的 30%，最早时间线也要 2028-2030。客户多元化：已确认生产部署 2
              个（MUFG、Mitsubishi Electric），而典型 IPO 要求 3+ 个企业锚点并披露合同价值。财务披露：公开经审计财务为零；准备 S-1 需要三年经审计报表。美国市场存在感：Citi 和
              Datadog 信号存在，但截至 2026 年 5 月没有确认美国收入；NASDAQ
              上市需要美国收入确认。战略收购准备度最高：投资者客户重叠创造了自然收购方一致性，所有主要潜在收购方（MUFG、NEC、NVIDIA、KDDI）都持股，并通过股权结构表拥有信息权。投资承诺前必须满足五项最终尽调要求：（1）按客户拆分经审计
              ARR，以验证 $30M 估计并量化集中度；（2）股权结构表和优先股堆叠，以评估悲观情景下普通股回收；（3）MUFG 合同条款和续约概率评估——这是估值铰链事件；（4）关于 In-Q-Tel
              投资对开源模型分发影响的出口管制法律意见；（5）David Ha 和 Llion Jones 的关键人留任合同，他们离职会消除嵌入 88x 倍数中的主要研究可信度溢价。
            claimRefs:
              - CV008
