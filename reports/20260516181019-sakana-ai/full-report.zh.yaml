              Nature Machine Intelligence）、Transformer² SVF 微调模型，以及 Namazu 后训练系列（alpha，2026 年 3
              月）：它把前沿开放权重模型适配到日本特定文化和安全要求，同时保持接近基座模型的基准表现。商业产品层包括 Sakana Chat（搭载 Namazu 的消费者聊天机器人，已上线）、Sakana
              Marlin（自主商业研究助手，封闭 beta，2026 年 4 月）和 Sakana Fugu（多智能体 API 编排系统，开放 beta，2026 年 4 月）。两项防务和情报应用已按合同部署：面向
              ATLA（日本防卫装备厅）的指挥控制情报系统，以及面向日本总务省的虚假信息检测系统。SMBC 的提案生成应用于 2026 年 4
              月上线，是第一个商业化部署的金融产品。产品组合体现出明确的双轨策略：开源研究建立全球可信度并吸引开发者采用，面向日本企业和政府部门的应用产品则产生近期收入。
