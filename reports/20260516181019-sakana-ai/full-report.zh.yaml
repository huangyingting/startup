    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与创办背景
        blocks:
          - type: paragraph
            body: >-
              Sakana AI Co., Ltd. 是一家总部位于日本东京的 AI 研发公司，2023
              年注册成立。公司名称取自日语“鱼”（さかな），意象是一群鱼在简单局部规则下形成协调、涌现的整体——这也对应公司围绕自然启发智能、进化式优化和集体 AI 的核心研究主张。截至 2026 年 5
              月，官方标语是“为日本需求开发 AI 解决方案，并在日本普及 AI”；三款商业产品分别是 Sakana Chat（面向消费者的 LLM 聊天，由 Namazu 系列模型驱动）、Sakana
              Marlin（企业商业情报研究助手）和 Sakana Fugu（面向编程、数学和科学推理的多智能体编排 API）。创始团队在 2023 年中成形，核心是 David Ha、Llion Jones 和 Ren
              Ito。David Ha 此前任 Stability AI 研究负责人，更早担任 Google Brain Tokyo 研究总监；Llion Jones 是 2017 年奠基论文 “Attention Is
              All You Need” 八位共同作者之一；Ren Ito 则带来 Mercari 的运营经验和早期外交服务积累的政府关系经验。三位创始人仍担任运营层
              高管职位（CEO、CTO、COO），创始团队治理结构稳定。Sakana AI 站在两股结构性顺风交汇处：全球对基础模型能力的需求，以及日本希望打造符合本国语言、文化和安全要求的本土主权
              AI。公司战略不同于主流的算力最大化路线，强调在既有开源检查点上运行的进化式和模型合并技术，而不是从零训练前沿模型；这种设计选择明确受到资源效率和日本算力受限环境驱动。
