      - 方向
      - 时点
      - 影响
      - 尽调问题
    rows:
      - - 日本主权 AI 政策（METI AI Guidelines、AI Strategy Council）
        - 驱动因素
        - 近期（2024–2026 年活跃）
        - 政府为 AI 治理投资提供合法性，并在一定程度上形成要求；提高国内 AI 合同授予意愿
        - 确认 Sakana 在 ATLA 和 MIC 之外的新增政府合同管线；评估是持续复购还是一次性项目结构
      - - 企业级智能体 AI 采用（全球 CAGR 47%）
        - 驱动因素
        - 近期至中期（2025–2030 年）
        - 企业给工作流自动化智能体分配的预算增加，扩大日本之外的可触达买方池；Fugu 和 Marlin 直接竞争该细分
        - 将 Fugu 与竞品智能体系统（AutoGPT、Microsoft Copilot Agents、Google Agentspace）在成本和延迟上做基准对比
      - - 日本 GPU 与算力约束
        - 驱动因素（利好 Sakana 的高效模型路线）
        - 结构性（持续存在）
        - Sakana 的进化和模型合并技术比前沿模型训练更省算力，使 Sakana 在日本资源受限的环境里更有竞争力
        - 验证算力效率主张在具体 Namazu 和 Fugu 架构上是否成立；检查每 token 推理成本与 GPT-4o 同类方案的差距
      - - ROI 不确定性与生产率兑现周期风险
        - 约束
        - 近期至中期（2025–2027 年）
        - Goldman Sachs 预计，AI 对生产力的影响会在本十年后半段最明显；企业采购 AI 智能体的预算审批要先跨过价值证明门槛，销售周期因此拉长
        - 要求提供已签署、承诺 ARR 的企业合同，而不是试点协议；检查 SMBC 与早期 Fugu beta 测试者的 NPS 和续约率
      - - 全球与日本本土 LLM 供应商竞争
        - 约束
        - 持续加剧
        - OpenAI、Google、Anthropic、NTT Research（tsuzumi）、Fujitsu（Takane）、NEC（cotomi） 都在扩展日语能力；大宗 LLM 服务的价格竞争会压缩利润率
        - 评估 Namazu 在标准日语任务上的基准分数，相比 NTT tsuzumi 和 Fujitsu Takane 如何；判断 Sakana 除品牌和政府合同通道之外，是否有持久差异化
    notes: 驱动因素与约束评估截至 2026 年 5 月。日本政府政策是短期需求最清晰的加速器；ROI 不确定性和竞争加剧，是三到五年尽调周期内主要的采用风险。
