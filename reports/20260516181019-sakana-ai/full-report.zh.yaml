  - id: TV005
    title: 投资逻辑破裂和止损触发点表
    columns:
      - 触发点
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - MUFG 不续约
        - 2027 年 Q3 前传达不续约通知或重大范围缩减（2028 年 5 月期限前的先行指标）
        - 直接 ARR 影响超过 35%；估值从 $2.65B 跌至 $1-2B 区间；大概率下轮降估；Series B 回报低于 1x
        - 立即退出持仓；消息公开前，向老股买家启动困境出售 / M&A 沟通
      - - ARR 增长不达标
        - 到 2026 年底确认 ARR 低于 $50M（意味着相对 $30M 基数增长 <67%）
        - 88x 倍数失去支撑；按 25-30x 计算，基本面估值降至 $750M–$1.5B；Series C 成为降估轮
        - 若当前市场可交易，以老股方式出售；避免参与降估的 Series C
      - - 日本国家级 AI 合资公司抢占本土市场
        - 到 2027 年底，SoftBank / Sony / NEC / Honda 合资公司签下 2+ 个直接与 Sakana AI 竞争的大型日本企业合同
        - 国内销售渠道被压缩；风险在于日本主权溢价转向合资公司
        - 降低持仓；加快监控 MUFG 和 SMBC 续约概率；要求提供客户管线数据
      - - 核心 IP 被开源商品化
        - EvoMerge 或 AI Scientist 方法在 12 个月内被开源社区完整复刻，并具备同等企业部署能力
        - IP 护城河消失；Sakana AI 差异化只剩企业交付和 MUFG 关系；倍数应压缩至 15-25x
        - 与技术顾问重新评估 IP 防御性；若交付护城河无法独立确认，则有条件出售
      - - 关键人物离职且无资深继任者
        - David Ha 或 Llion Jones 宣布离职，且没有可信的预设继任者
        - 研究信誉受损；投资者信心受冲击；研究阶段公司面临人才流失风险；日本招聘管线偏薄
        - 启动追加尽调；要求留任计划；在继任者到位前评估减仓
    notes: 触发阈值是分析师基于公开证据和同业基准给出的估计；它们不是 Sakana AI 的合同义务或披露承诺。行动含义为方向性建议，不构成投资建议。
