            body: >-
              Sakana AI 面临六项实质竞争风险。开源带来的平台商品化：NTT、Fujitsu 和 Rakuten 提供开放权重模型，降低中小企业（SME） 买家的微调切换成本；CyberAgent 的 CALM3 和
              Rakuten AI 3.0 开放权重发布，则让媒体和电商细分市场的微调商品化。企业分销缺口：日本企业软件采购受 keiretsu
              供应商关系和内部审计要求影响，系统性偏向成熟供应商（NTT、Fujitsu、NEC）和大型电信公司（KDDI/ELYZA），不利于较新的 AI 初创公司；PFN 的 PLaMo 深度嵌入 Toyota、Fanuc
              和政府数字基础设施，在这些垂直领域形成高切换成本。算力规模劣势：全球前沿实验室掌握 Sakana 无法匹配的 GPU 集群，不过算力高效路线把竞争从规模重新定位到方法。AI Scientist
              产品成熟度：独立评估（arXiv 2502.14297）发现 42% 实验失败率和较浅的新颖性检测，推迟商业 AI 研究自动化采用。全球云市场绕行：Azure 上的 OpenAI 和 Vertex AI 上的
              Google 分销服务，削弱了接受云托管方案的日本市场买家的数据驻留护城河。物理 AI 主权联盟：Japan AI Foundation Model Company 由 SoftBank、Sony、Honda 和
              NEC 共同发起，承诺资金约 ¥1 trillion，明确瞄准工业机器人和日本约 70% 全球工业机器人产量份额，借助主权物理 AI 训练数据护城河，可能取代 Sakana AI 在制造业的算力效率定位。METI
              的 GENIAC 计划瞄准到 2040 年占据全球物理 AI 市场 30%，为该联盟增加政策顺风。多归属——企业同时部署多个 LLM API——即便在既有厂商部署旁，也支撑 Sakana
