      - number: '7.2'
        title: 技术质量与运营风险
        blocks:
          - type: paragraph
            body: >-
              AI Scientist 是 Sakana AI 的旗舰商业系统，也是记录最充分的技术负债。2024 年 8 月发布的独立分析在复现测试中记录了 57% 幻觉率和 42% 实验失败率。截至 2026 年 5
              月，Sakana AI 未公开反驳这些发现，也未发布更新基准。这是重大质量风险：如果 MUFG 信贷审批工作流发生幻觉事件，可能生成错误的个人信贷决策，并触发 APPI 第 20 条通知义务和 FSA
              消费者保护标准。AI Scientist 的自主写代码和互联网访问能力引入提示注入、代码执行和数据外泄攻击向量，CISA AI 安全指南将其归为高严重性。公开资料未披露 Sakana AI 生产基础设施的 SOC
              2 Type II 认证或第三方安全审计。研究社区围绕 AI 生成幽灵作者身份和伪造引用提出的学术诚信担忧，也会带来声誉风险，削弱维持研究可信度所需的学术合作管线。对 NVIDIA H100 和 A100 GPU
              集群的算力依赖带来单点故障运营风险：若地缘政治出口管制或分配限制造成持续供应中断，训练和推理吞吐将大幅下降。MUFG 部署中的人类在环审查在决策阶段部分缓解幻觉风险，但尚未经过独立验证。
