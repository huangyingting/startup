  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与纳入支出
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 可触达的市场应从变现触点向外构建，而不是套用任何单一自上而下的 AI 预测。公司收入来自三个不同支出池。第一，全球生成式 AI
              基础设施和基础模型访问：买家付费用于访问、微调或部署基础模型能力，Sakana 通过面向日本优化的 Namazu 系列 LLM 和 Fugu 多智能体编排 API 参与其中。第二，日本主权 AI
              和本土语言模型服务：需要日语流畅度、文化对齐和数据驻留的日本企业与政府机构，会专门为日本构建或日本优化模型付费。这个细分市场更小，但战略上毛利更高，并由语言和信任护城河保护。第三，企业智能体 AI
              工作流：买家付费用智能体编排自动化多步骤推理和研究任务（Sakana Marlin 用于 BI 研究，Sakana Fugu 用于编程 / 科学 / 数学编排）。Sakana 市场不包括通用云基础设施、GPU
              硬件、从不触达日本工作流的模型，以及无法绑定 Sakana 产品的广义咨询或系统集成工作。这个边界的实际效果是，Sakana 的现实可服务市场（SAM）不是完整 $71B GenAI
              总可用市场（TAM），而是日语能力、高效模型架构和智能体编排的交集——一个窄得多、可部分通过日本 AI 市场估计和智能体 AI 细分市场隔离出来的池子。
