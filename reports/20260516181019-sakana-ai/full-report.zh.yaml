      - number: '1.3'
        title: 融资历史、估值与投资方基础
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 自成立以来已完成三轮已披露融资。约 $30 million 的种子轮于 2024 年 1 月完成，由 Lux Capital 和 Khosla Ventures 领投，两者都是 AI
              投资组合很强的深科技专业投资机构。Series A 于 2024 年 9 月 4 日宣布，并在 2024 年 9 月 17 日更新新增参投方，融资约 $200 million。NEA 与 Khosla
              Ventures、Lux Capital 共同领投；战略投资方包括 NVIDIA（其 CEO Jensen Huang 给出引述背书）、Translink Capital 和 500
              Global，另有一批日本大型机构投资方：Mitsubishi UFJ Financial Group（MUFG）、Sumitomo Mitsui Banking Corporation（SMBC）、Mizuho
              Financial Group、NEC、SBI Group、Dai-ichi Life Insurance、ITOCHU、KDDI、Fujitsu、Nomura Holdings、ANA
              Holdings、Tokyo Marine Group、Global Brain、JAFCO 和 Miyako Capital。Series A 确立的 $1.5 billion 投后估值，使 Sakana AI
              按 Bloomberg 报道成为日本最快达到独角兽地位的初创公司。Series B 于 2025 年 11 月 17 日完成（2026 年 4 月 9 日更新披露），规模为 ¥32 billion（按
              ¥160:$1 约 $200M）。Series B 投资方包括 MUFG、Khosla Ventures、Factorial、Macquarie Capital、Mouro Capital（Banco
              Santander 风险投资部门）、Mitsubishi Electric、Salesforce Ventures、Google、Datadog、Citi、CCI Group、NEA、Geodesic
              Capital、Lux Capital、Ora Global、Fundomo、MPower Partners、JAFCO、Shikoku Electric Power 和 In-Q-Tel（与 CIA
              有关联的美国政府技术投资基金）。Wikipedia 和 Nikkei 报道 Series B 后估值约 ¥400 billion（~$2.6B）。按当前汇率计算，所有轮次累计股权融资约
              $430M。In-Q-Tel 参投具有战略意义，因为这与公司在日本防务和情报应用上的参与加深相一致。
