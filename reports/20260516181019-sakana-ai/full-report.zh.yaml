      - number: '5.3'
        title: 技术架构、基础设施与运营模式
        blocks:
          - type: paragraph
            body: >-
              Sakana AI 的技术栈围绕基础模型编排分层，而不是自建预训练。最底层，公司高度依赖第三方前沿模型（OpenAI、Anthropic、Google Gemini 系列）作为底层智能基座，并通过 API
              访问。开源模型（Llama 3.x、DeepSeek、Mistral 系列）则作为后训练和进化合并候选。NVIDIA GPU 基础设施支撑全部实验算力，也体现在已宣布的 NVIDIA
              合作中。算法层，公司构建自研编排和搜索方法：AB-MCTS 管理 Marlin 的假设探索；Fugu 模型（本身是小语言模型）学习协调并路由对不同前沿 LLM 的调用；Transformer² SVF
              向量支持推理时修改权重，无需重新训练模型。应用产品层使用 Python 后端、TypeScript/Next.js 网页 UI，以及 Kotlin Android 应用。防务部署还要求分布式系统架构具备
              DDIL（降级、断连、间歇、低带宽）能力。Namazu 后训练运行在开放权重前沿模型之上，用自定义数据集纠正文化偏差和审查痕迹，同时不损失基座模型基准表现。AI Scientist 的研究基础设施需要
              NVIDIA GPU、CUDA、PyTorch 和 LaTeX 来生成论文，并必须容器化，才能安全执行 LLM 代码。关键架构依赖风险是双重的：Sakana
              最有能力的商业产品（Fugu、Marlin）在核心推理上依赖第三方前沿模型 API，这意味着 OpenAI、Anthropic 等提供方的成本、可用性和能力变化会直接传导到产品表现和利润率。NVIDIA
              合作也显示出深度 GPU 依赖。
