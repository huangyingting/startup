  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue
      missingEvidence: >-
        No audited financial statements, income statement, gross margin data, or customer
        acquisition cost metrics for Sakana AI are publicly available.
      whyItMatters: >-
        Revenue of approximately $30M is a third-party database estimate; actual ARR could
        be materially higher or lower. Without audited financials, investment decisions rest
        on proxy metrics only and gross margins remain entirely unknown.
      diligencePath: >-
        Request audited financials or management-prepared financial model from Sakana AI CFO;
        obtain at least 12 months of revenue run-rate and gross margin data from the company.
      relatedQuestionRefs:
        - QI007
        - QI017
        - QI023

    - type: private-evidence-only
      severity: material
      topic: gtm
      missingEvidence: >-
