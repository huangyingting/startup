        AI's enterprise go-to-market and determine whether the investor-as-customer bootstrap
        model will scale to independent enterprise sales.
      diligencePath: >-
        Request data room with signed customer contracts, renewal history, contract values,
        and sales pipeline metrics from the Sakana AI commercial team.
      relatedQuestionRefs:
        - QI025
