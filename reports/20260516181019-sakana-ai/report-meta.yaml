companyProfile:
  summary: >
    Sakana AI is a Tokyo-based AI research company founded in 2023 by David Ha (former Google Brain
    Research Director) and Llion Jones (co-inventor of the Transformer attention mechanism). The
    company pioneers nature-inspired AI techniques — principally evolutionary model merging, which
    combines pre-trained model weights using evolutionary algorithms to create new domain-specific
    models at a fraction of the compute cost of training from scratch. Its core products include
    EvoLLM-JP and EvoVLM-JP (Japanese-language LLMs and vision-language models via evolutionary
    merge), the AI Scientist (autonomous scientific research agent that became the first AI to pass
    formal peer review at an ICLR 2025 workshop), and AB-MCTS / TreeQuest (inference-time
    multi-model orchestration framework). With $379M+ raised and a $2.65B valuation at Series B,
    Sakana AI is Japan's most valuable AI-native startup, backed by NVIDIA, MUFG, In-Q-Tel, Khosla
    Ventures, and NEA. Its primary production customer is MUFG, where the AI Loan Expert system
    automates corporate credit approvals across Japan's largest bank.
  foundedDate: '2023-07-01'
  founders:
    - name: David Ha
      role: Co-founder & CEO
