  productSummary: >
    Evolutionary model merging framework (EvoMerge) that creates domain-specific AI models from
    open-weight base models without retraining; EvoLLM-JP and EvoVLM-JP Japanese language models
    (open-weight); AI Scientist v2 autonomous scientific research agent; AB-MCTS / TreeQuest
    open-source inference-time multi-model orchestration; bespoke enterprise AI co-development
    for financial services (MUFG AI Loan Expert) and industrial AI (Mitsubishi Electric Serendie).
  customerFocus: >
    Large enterprise and institutional customers in financial services (MUFG, Citi, Daiwa Securities),
    industrial manufacturing (Mitsubishi Electric Serendie), DevOps/cloud (Datadog), and
    defense/government (In-Q-Tel signal, ATLA award); exclusively direct enterprise co-development,
    no SMB or mid-market presence as of May 2026.
  businessModel: >
    Bespoke enterprise AI co-development: Sakana AI creates custom foundation models and AI systems
    for each enterprise customer's specific workflows (e.g., MUFG credit approval, Serendie
    industrial AI); combined with open-source model release strategy (HuggingFace, GitHub) that
    builds developer community funnel. Revenue is project-based and recurring via multi-year
    strategic partnership agreements.
  stage: Series B
  fundingStatus: >
