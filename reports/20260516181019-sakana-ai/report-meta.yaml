companyProfile:
  summary: >-
    Sakana AI is a Series B AI research company (founded July 2023, Tokyo) led by CEO David Ha
    and CTO Llion Jones. It develops nature-inspired and evolutionary AI systems including the AI
    Scientist (autonomous research paper generation), EvoLLM (evolutionary language model
    merging), and a suite of enterprise AI agents for financial document automation, scientific
    discovery, and defense applications. As of May 2026, confirmed production deployments include
    MUFG (credit documentation, ¥5B / 3-year contract), SMBC (strategic proposal generation),
    ATLA / Ministry of Defense Japan (defense AI), and Mitsubishi Electric. Strategic investors
    and partners include NVIDIA, SoftBank, Sony, MUFG, Citi, and Mitsubishi Electric. Series B
    ($135M, November 2025) values the company at $2.65B with total raised of approximately $379M.
  foundedDate: "2023-07-01"
  founders:
    - name: David Ha
      role: CEO and Co-Founder
      background: >-
        Former Research Director and Global Lead at Google Brain; led Google's creative AI
        research; PhD in Electrical Engineering (University of Toronto); internationally
        recognized for work on neural evolution and generative models. Relocated from San
        Francisco to Tokyo to found Sakana AI.
    - name: Llion Jones
      role: CTO and Co-Founder
      background: >-
        Co-author of "Attention Is All You Need" (Vaswani et al., 2017), the seminal paper
        introducing the transformer architecture; former Software Engineer at Google Brain.
        His involvement provides direct founding credibility in the transformer-era AI stack.
    - name: Ren Ito
      role: COO and Co-Founder
      background: >-
        Former McKinsey consultant; leads Sakana AI's Japan enterprise go-to-market, regulatory
        engagement, and operational infrastructure. Instrumental in securing financial-sector
        partnerships with MUFG and SMBC.
  foundingLocation: Tokyo, Japan
  headquarters: Tokyo, Japan
  productSummary: >-
    AI Scientist v2: autonomous AI system for scientific research and paper generation;
    EvoLLM: evolutionary model merging for specialized language models; enterprise AI agents
    for credit document generation (MUFG), strategic proposal writing (SMBC), defense
    intelligence analysis (ATLA), and engineering AI (Mitsubishi Electric). Products are
    delivered as API services and customized deployment packages with enterprise SLAs.
  customerFocus: >-
    Japan Tier 1 financial institutions (megabanks, insurance, brokerage) requiring AI-driven
    document automation and credit-decision support; Japan government and defense agencies;
    global enterprises seeking AI R&D automation; media and entertainment companies (Sony
    partnership) seeking creative AI. Near-term addressable universe is concentrated in
    Japanese enterprise buyers with bilingual AI requirements.
  businessModel: >-
    Multi-year enterprise contracts combining upfront licensing fees, usage-based API billing,
    and custom model deployment charges. MUFG contract (¥5B / 3 years) is the primary
    disclosed revenue arrangement. Strategic investment relationships from MUFG and Citi provide
    both capital and go-to-market preferencing. No self-serve SaaS tier is publicly disclosed.
  stage: Private (Series B, November 2025)
  fundingStatus: >-
    Series A: $214M (September 2024), investors include NVIDIA NVentures, SoftBank, Sony
    Group, Khosla Ventures; Series B: $135M (November 2025), investors include MUFG, Citi,
    Mitsubishi Electric, Khosla Ventures, NEA, Lux Capital, In-Q-Tel. Post-money Series B
    valuation: $2.65B. Total raised approximately $379M (some sources estimate up to $479M
    including undisclosed instruments).
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CI001, CI002, CU001]

