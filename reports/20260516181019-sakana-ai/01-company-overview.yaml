company:
  name: Sakana AI
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Sakana AI is a Tokyo-based AI R&D company founded in July 2023 by David Ha (CEO, ex-Google Brain Tokyo
    and ex-Stability AI), Llion Jones (CTO, co-author of "Attention Is All You Need"), and Ren Ito (COO).
    The company raised a $30M seed in January 2024, a ~$200M Series A in September 2024 at a $1.5B valuation
    (Japan's fastest unicorn at the time), and a ¥32B (~$200M) Series B in November 2025 at ~$2.6B valuation,
    backed by MUFG, NVIDIA, NEA, Khosla, Lux Capital, Google, Salesforce Ventures, Citi, In-Q-Tel, and
    others. Its flagship research products include Evolutionary Model Merge, The AI Scientist (published in
    Nature in March 2026), the Namazu family of Japan-optimized LLMs, Sakana Marlin (BI research assistant),
    and Sakana Fugu (multi-agent orchestration system); it is also pursuing Japan defense, government, and
    financial-services implementation contracts.
sections:
  - id: section-1
    title: Identity, Mission, and Founding Context
    body: >-
      Sakana AI Co., Ltd. is an AI R&D company headquartered in Tokyo, Japan, incorporated in 2023. Its name
      is derived from the Japanese word for fish (さかな), evoking a school of fish that forms a coherent,
      emergent collective from simple local rules — an analogy for the company's core research thesis around
      nature-inspired intelligence, evolutionary optimization, and collective AI. The official company tagline
      as of May 2026 is "We develop AI solutions for Japan's needs, and democratize AI in Japan," and its
      three commercial products are Sakana Chat (consumer-facing LLM chat powered by the Namazu model series),
      Sakana Marlin (enterprise business-intelligence research assistant), and Sakana Fugu (multi-agent
      orchestration API targeting coding, mathematics, and scientific reasoning). The founding team assembled
      in mid-2023 around David Ha, who had most recently served as Head of Research at Stability AI and
      before that as Research Director at Google Brain Tokyo; Llion Jones, one of the eight co-authors of the
      seminal 2017 "Attention Is All You Need" Transformer paper; and Ren Ito, who brings operational and
      government-relations experience from Mercari and prior diplomatic service. The three founders retain
      operational C-suite roles (CEO, CTO, COO), giving the company a stable founding-team governance profile.
      Sakana AI sits at the intersection of two structural tailwinds: the global demand for foundation-model
      capabilities, and Japan's ambition to build domestic sovereign AI that reflects its language, culture,
      and security requirements. The company's strategy diverges from the dominant compute-maximization
      paradigm by emphasizing evolutionary and model-merging techniques that operate on existing open-source
      checkpoints rather than training frontier models from scratch, a design choice explicitly motivated by
      resource efficiency and Japan's constrained compute environment.
