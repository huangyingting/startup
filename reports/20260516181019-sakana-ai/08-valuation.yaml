    layout: standard
    summary: >-
      Decision chain from Japan sovereign AI thesis through MUFG production proof, research
      credibility check, risk assessment, and valuation check to the CONSTRUCTIVE-WAIT
      recommendation. Each node represents a distinct diligence gate with pass/caution status.
      The flow confirms that despite the 88x ARR premium and customer concentration, the
      Japan sovereign thesis and In-Q-Tel optionality justify a CONSTRUCTIVE position at the
      right entry price ($2.0-2.3B secondary).
    data:
      nodes:
        - id: japan-sovereign
          label: Japan Sovereign AI Thesis
          detail: >-
            Japan national AI strategy, METI guidance, and government procurement create
            structural captive market; no foreign AI company has entered Japan enterprise AI
            at MUFG scale; sovereign premium confirmed by Morningstar, KPMG, CBInsights 2025
          type: process
        - id: mufg-proof
          label: MUFG Production Proof
          detail: >-
            ¥5B / 3yr contract with Japan's largest bank; AI Loan Expert in active branch
            rollout 2026; SMBC production since April 2026; Mitsubishi Electric integration
            March 2026 — anchor enterprise proof at regulated financial services scale
          type: process
        - id: research-credibility
          label: Research Credibility and Optionality
          detail: >-
            Nature paper (October 2024) and In-Q-Tel Series B investment signal frontier
            AI credibility; Citi global (200+ countries) and US defense track (In-Q-Tel)
            represent unpriced TAM optionality not in any ARR model
          type: process
        - id: risk-assessment
          label: Risk Assessment (Adverse)
          detail: >-
            88x ARR implies $140-200M ARR already priced in (CAUTION); MUFG 2028 renewal
            at-risk and concentrated (CAUTION); governance opacity — no audited ARR, no cap
            table (CAUTION); Gartner MQ absent — enterprise procurement gap (CAUTION)
          type: process
        - id: valuation-check
          label: Valuation Check
          detail: >-
            Fundamental range 45-70x ARR = $1.35-2.1B at $30M ARR; current 88x = $2.65B
            is 20-30% above fundamental; Mistral (60x EU sovereign) provides precedent
            for 60x but not 88x; entry discipline required at or below $2.3B
          type: process
        - id: recommendation
          label: Recommendation — CONSTRUCTIVE-WAIT
          detail: >-
            Thesis valid; sovereign premium is real; In-Q-Tel and Citi optionality is real;
            but 88x ARR entry price exceeds fundamental range by 20-30%; WAIT for secondary
            at $2.0-2.3B or post-Series C correction; upgrade to BUY on two catalysts confirmed
          type: process
    approximationNotes: >-
