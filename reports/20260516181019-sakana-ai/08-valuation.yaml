        - David Ha and Llion Jones equity vesting schedules and cliff status; non-compete and non-solicit terms; board-approved retention plan
        - Research credibility premium in 88x multiple is built on two named co-founders; uncontracted departure would eliminate the primary premium justification
        - Employment agreement disclosures; board resolution review; HR diligence call with chairman
    notes: >-
      Diligence items are prioritized by investor impact on valuation analysis; order reflects
      criticality for bear-case assessment. All five items should be completed before investment
      commitment at any price above $2.0B.
