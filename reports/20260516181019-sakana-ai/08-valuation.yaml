  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - MUFG non-renewal
        - Notice of non-renewal or material scope reduction communicated by Q3 2027 (leading indicator ahead of May 2028 term date)
        - Direct ARR impact >35%; valuation falls from $2.65B to $1-2B range; down-round likely; Series B returns below 1x
        - Exit position immediately; trigger distressed M&A outreach to secondary buyers before news is public
      - - ARR growth miss
        - Less than $50M ARR confirmed by end 2026 (implies <67% growth from $30M base)
        - 88x multiple becomes unsupportable; fundamental valuation drops to $750M–$1.5B at 25-30x; Series C at down-round
        - Sell secondary at current market if available; avoid participation in Series C at down-round
      - - Japan national AI JV captures domestic market
        - SoftBank / Sony / NEC / Honda JV signs 2+ major Japanese enterprise contracts competing directly with Sakana AI by end 2027
        - Domestic sales channel compression; bears the risk that the Japan sovereign premium redirects to the JV
        - Reduce position; accelerate monitoring of MUFG and SMBC renewal probability; demand customer pipeline data
      - - Open-source commoditization of core IP
        - EvoMerge or AI Scientist methodology fully replicated by open-source community with equivalent enterprise deployment capability within 12 months
        - IP moat eliminated; Sakana AI differentiation reduces to enterprise delivery and MUFG relationship; multiple should compress to 15-25x
        - Reassess IP defensibility with technical advisors; conditional sell if delivery moat cannot be independently confirmed
      - - Key-person departure without senior replacement
        - David Ha or Llion Jones departure announcement without credible pre-planned successor
        - Research credibility risk; investor confidence hit; talent flight risk at research-stage company; Japan hiring pipeline thin
        - Trigger additional diligence; demand retention plan; evaluate position reduction pending replacement hire
    notes: >-
      Trigger thresholds are analyst estimates based on public evidence and peer benchmarks;
      they are not contractual or disclosed commitments by Sakana AI. Action implications are
      directional recommendations, not investment advice.
