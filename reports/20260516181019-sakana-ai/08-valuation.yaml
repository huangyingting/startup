  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financials
      missingEvidence: >-
        Sakana AI has not disclosed audited financial statements, ARR breakdown by customer,
        cash burn rate, or runway. All revenue figures rely on third-party estimates (GetLatka,
        Sacra) that are unverified by company audit or independent accountants. No path to
        profitability or operating breakeven has been disclosed.
      whyItMatters: >-
        Without audited ARR data it is impossible to verify whether the 88x multiple is based
        on actual contracted revenue; customer concentration risk cannot be precisely quantified;
        burn rate and runway analysis is not possible from public evidence; ARR growth trajectory
        cannot be independently confirmed.
      diligencePath: >-
        Request three-year audited financial statements, deferred revenue schedule, and ARR
        breakdown by customer name from Sakana AI CFO; obtain May 2026 YTD management accounts
        to confirm ARR growth trajectory; confirm cash runway with investment-grade precision.
