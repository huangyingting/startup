    rows:
      - - Audited ARR by customer
        - Three-year audited financial statements; deferred revenue schedule; ARR by named customer account; May 2026 YTD management accounts
        - Verify the $30M ARR estimate is based on contracted revenue; quantify MUFG concentration vs. total ARR; identify true ARR CAGR
        - CFO data room; request from Sakana AI legal / CFO; require audit firm confirmation of ARR recognition policy
      - - Cap table and preference stack
        - Series A and B term sheets; liquidation preferences; anti-dilution provisions; participating preferred terms; option pool size and cliff schedules
        - Bear case ($1-2B exit) may produce zero common stock recovery if preference overhang is 1.5-2x participating; management incentive alignment unclear
        - Legal counsel; secondary market advisor; term sheet review with experienced VC counsel
      - - MUFG contract renewal assessment
        - MUFG 3-year contract terms (expiry date, renewal conditions, termination clauses, scope and pricing); MUFG reference call; MUFG AI Loan Expert deployment phase progress
        - 2028 renewal is the valuation hinge event; non-renewal alone triggers the bear case; renewal and expansion is the primary base-case catalyst
        - MUFG technology procurement lead; contract documentation from Sakana AI data room; independent channel check
      - - Export control legal opinion
        - ITAR / EAR analysis of Sakana AI open-source model distribution rights post-In-Q-Tel investment; compliance posture on dual-use AI regulations
