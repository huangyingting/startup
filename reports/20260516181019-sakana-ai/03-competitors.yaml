  - id: section-3
    title: Global Frontier AI Labs in Japan
    body: >-
      Five global frontier AI labs have material presence in Japan's enterprise AI market. OpenAI
      holds Japan as its largest corporate API market outside the United States as of 2025 and
      operates via the Azure OpenAI Service partnership with Microsoft Japan; its global enterprise
      LLM API market share declined from approximately 50% in 2023 to approximately 25% by mid-2025
      as Anthropic and Google gained ground. Anthropic's Claude models reached approximately 32%
      global enterprise AI market share by mid-2025, overtaking OpenAI in enterprise accounts;
      Claude is distributed in Japan primarily through AWS Bedrock. Google DeepMind is both a
      strategic investor in Sakana AI and a direct competitor through Gemini and the open-weight
      Gemma family; AlphaFold 2 won the 2024 Nobel Prize in Chemistry for protein-structure
      prediction, establishing DeepMind's leadership in AI for scientific discovery—the same domain
      Sakana's AI Scientist targets. Mistral AI was valued at over $13 billion in September 2025 and
      projected approximately $60 million in FY2025 revenue; its open-weight posture attracts
      privacy-focused Japanese firms who can self-host at no licensing cost. Global frontier labs
      distribute AI services via major cloud marketplaces—Azure OpenAI Service, Google Cloud Vertex
      AI, and AWS Bedrock—bypassing the data-residency compliance advantages of domestic Japanese
      providers. This cloud-marketplace distribution channel is a structural competitive threat that
      domestic incumbents and Sakana alike must overcome with sovereignty or performance arguments.
    claimRefs:
      - CP015
      - CP016
      - CP017
      - CP018
