  - id: section-2
    title: Japan Domestic LLM Providers
    body: >-
      Eight domestic Japanese companies have foundation models in commercial deployment or late-stage
      development as of May 2026. NTT's Tsuzumi 2, launched October 2025, runs on a single NVIDIA
      A100-class GPU with hardware cost approximately ¥5 million (~$32,000), and NTT positions it as
      10–20× lower total cost than comparable cluster-based solutions, targeting regulated enterprises
      that require on-premises data sovereignty. Preferred Networks (PFN) has raised more than $308
      million across 16 rounds backed by Toyota, Fanuc, NTT, and Mitsubishi Corporation, with a
      valuation of approximately ¥350 billion (~$2.2 billion). PFN's PLaMo 2.0 Prime won the 2025
      Nikkei Excellence in Products and Services Award, the first domestic Japanese LLM to receive
      the honor, and PLaMo models are deployed via Amazon Bedrock and used by more than 150 Japanese
      local governments through the QommonsAI platform. ELYZA, majority-acquired by KDDI in March
      2024 (53.4% stake), benefits from KDDI's enterprise sales channels; KDDI committed
      approximately ¥100 billion to AI infrastructure including ELYZA's expansion. Fujitsu's Takane
      LLM (~104B parameters, co-developed with Cohere) achieves top scores on the JGLUE Japanese
      language benchmark. NEC's cotomi v3 (2026) features high-speed inference and AI agent
      capabilities targeting medical, manufacturing, and financial sectors. CyberAgent's CALM3-22B
      is open-weight and widely deployed in Japanese media and advertising. Rakuten AI 3.0 (2026)
      uses a Mixture-of-Experts architecture with approximately 700 billion parameters, the largest
      domestic Japanese model by parameter count, available on HuggingFace. Rinna, a
      Microsoft-backed spinout, provides open-weight models for conversational Japanese tasks. These
      eight providers collectively span the full enterprise buyer spectrum but none replicates
      Sakana's inference-time-scaling and AI-for-science combination.
