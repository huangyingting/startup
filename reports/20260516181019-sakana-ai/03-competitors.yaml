callouts:
  - calloutType: insight
    title: AB-MCTS Reframes the Competitive Frontier
    body: >-
      Sakana AI's inference-time scaling via AB-MCTS separates its competitive thesis from
      traditional GPU-scale rivalry. By orchestrating heterogeneous models from OpenAI, Google,
      and DeepSeek at inference time, Sakana can theoretically improve outcomes without owning
      frontier compute—a capital-efficient model that turns competitors into building blocks and
      achieved a 30% benchmark improvement over best individual models on ARC-AGI-2 tasks.
    claimRefs:
      - CP021
      - CP022
      - CP023

  - calloutType: risk
    title: AI Scientist Maturity Gap Creates Commercial Adoption Barrier
    body: >-
      Independent evaluation found 42% experiment failure rates and shallow novelty detection in
      the AI Scientist system. Until these quality gaps close, commercial uptake for autonomous
      scientific research automation will lag Sakana AI's research reputation—giving incumbents
      time to close the gap and eroding the AI Scientist franchise value for enterprise buyers.
    claimRefs:
      - CP024
      - CP025
      - CP034

  - calloutType: strength
    title: Compute Efficiency as Structural Advantage in GPU-Constrained Japan
    body: >-
      Japan faces structural GPU supply constraints. Sakana AI's evolutionary merging requires a
      fraction of the training compute that NTT, PFN, or frontier labs consume—translating its
      research philosophy into a cost structure advantage that resonates in a market where H100
      availability is limited and energy costs are rising.
    claimRefs:
      - CP027
      - CP040

