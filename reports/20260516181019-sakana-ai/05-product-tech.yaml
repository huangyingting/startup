chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Sakana AI has built a layered product portfolio spanning autonomous-research tools, self-adaptive language
    models, multi-agent orchestration, and a post-trained Japanese chat service, all grounded in a
    nature-inspired research program that has placed papers in Nature and ICLR. The company has crossed from
    research-only to initial commercial deployment in finance (SMBC), defense (ATLA), and intelligence (MIC),
    but most products remain in alpha or beta and independent reliability, compliance, and competitive-moat
    evidence is thin.
sections:
  - id: product-portfolio-overview
    title: Product portfolio and module map
    body: >-
      Sakana AI's product surface as of May 2026 spans three distinct tiers. At the research and infrastructure
      tier sit the AI Scientist (automated end-to-end ML research, now published in Nature), the Darwin Gödel
      Machine (self-improving coding agent), the Continuous Thought Machine (biologically-inspired neural
      architecture), the AI CUDA Engineer (GPU kernel optimization agent), and Transformer² (self-adaptive LLM
      weight modification). These are primarily open-source or preprint tools that serve as proof-of-concept
      platforms and developer attraction. At the applied-model tier sit the Evolutionary Model Merge family
      (EvoLLM-JP, EvoVLM-JP, published in Nature Machine Intelligence), Transformer² SVF-fine-tuned models,
      and the Namazu post-training series (alpha, March 2026) that adapts frontier open-weight models for
      Japan-specific cultural and safety requirements while maintaining near-base-model benchmark performance.
      At the commercial product tier sit Sakana Chat (consumer chatbot with Namazu, live), Sakana Marlin
      (autonomous business research assistant, closed beta, April 2026), and Sakana Fugu (multi-agent API
      orchestration system, open beta, April 2026). Two defense and intelligence applications are deployed
      under contract: a command-and-control intelligence system for ATLA (Japan Defense Acquisition, Technology
      and Logistics Agency) and a disinformation detection system for the Japan Ministry of Internal Affairs.
      SMBC's proposal-generation app went live in April 2026 as the first commercially deployed finance
      product. The portfolio reflects a deliberate dual-track strategy: open-source research builds global
      credibility and developer adoption while applied products targeting Japan's enterprise and government
      sectors generate near-term revenue.
