callouts:
  - id: callout-1
    calloutType: strength
    title: Research-to-product track record is unusually strong for stage
    body: >-
      Sakana AI has placed papers in Nature (AI Scientist, March 2026), Nature Machine Intelligence
      (evolutionary model merge, January 2025), and ICLR (Transformer², 2025; Fugu methods, 2026),
      and had an AI-generated paper pass human peer review — credentials that most generative AI
      startups take many more years to accumulate. This record confers credibility with enterprise
      and government buyers and makes competitor replication harder.
    claimRefs:
      - CE003
      - CE004
      - CE006

  - id: callout-2
    calloutType: risk
    title: Commercial products are heavily beta-stage with thin independent validation
    body: >-
      As of May 2026, Sakana Fugu, Marlin, and Namazu are all in alpha or closed beta with no
      independent benchmark validation, no public SLA, and no disclosed compliance certifications.
      All commercial product benchmarks are self-reported. The business model depends on converting
      these betas to production contracts while competing against frontier model providers that
      can offer similar multi-model orchestration features.
    claimRefs:
      - CE019
      - CE041
      - CE044

  - id: callout-3
    calloutType: risk
    title: Frontier model API dependency creates structural cost and quality exposure
    body: >-
      Sakana Fugu and Marlin's core value proposition depends on orchestrating third-party frontier
      model APIs. If OpenAI, Anthropic, or Google raise prices, restrict access, or add competing
      orchestration features natively, Sakana's margin and differentiation narrow significantly.
      The NVIDIA partnership and GPU dependency add supply-chain risk on the compute side.
    claimRefs:
      - CE032
      - CE042

