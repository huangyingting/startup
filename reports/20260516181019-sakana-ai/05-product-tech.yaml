  - id: deployment-commercial-applications
    title: Deployment, integration, and commercial application evidence
    body: >-
      Sakana AI's commercial deployment evidence as of May 2026 is nascent but directionally strong
      in Japan's enterprise and government sectors. The clearest deployment proof is the SMBC bank
      proposal-generation application deployed at Sumitomo Mitsui Bank in April 2026, which uses
      multi-agent AI to automate wholesale banking proposal creation that previously required one to
      two weeks, reducing it to hours. Multiple AI agents coordinate for information gathering,
      analysis, hypothesis construction, narrative drafting, and quality evaluation. The ATLA
      defense contract (signed March 2026) commits Sakana to a multi-year research engagement to
      develop AI for command-and-control system enhancement, including a small vision language model
      (SVLM) capable of edge-device operation on drones. The MIC disinformation project (completed
      April 2026) delivered three integrated AI capabilities: novelty-search narrative extraction,
      multi-model deepfake detection with explainable reasoning, and agent-based model (ABM)
      simulation of counter-messaging effectiveness. Sakana Chat (launched March 2026) has completed
      a roughly 1,000-user beta test and is publicly available with web-search integration. Sakana
      Marlin (closed beta, April 2026) accepts applications and targets professional strategic
      research use cases. Sakana Fugu (open beta, April 2026) is available as an API with fugu-mini
      and fugu-ultra tiers. Integration across all commercial products appears Japan-first, with
      Applied Team founded in March 2025 focusing on finance and defense as anchor verticals. The
      company has explicitly stated plans to expand into industrial, manufacturing, and government
      sectors in 2026. No public SLA commitments, uptime history, incident records, or formal
      enterprise support terms have been disclosed for any commercial product as of the run date.
