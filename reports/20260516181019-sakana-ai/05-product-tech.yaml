  - id: research-breakthroughs
    title: Research breakthroughs and core algorithmic contributions
    body: >-
      Sakana AI's research output has been unusually productive for a sub-three-year-old startup, placing
      anchor papers in two Nature journals and an ICLR accepted paper. The AI Scientist framework (arXiv
      August 2024, Nature March 2026) demonstrated full end-to-end automation of the ML research loop:
      idea generation, experiment coding and execution, paper writing, and simulated review, at a cost of
      less than $15 per paper. The AI Scientist v2 went further: a fully AI-generated paper passed blind
      human peer review at an ICLR 2025 workshop with an average score of 6.33, placing it above the
      workshop acceptance threshold. The automated reviewer the team built to evaluate paper quality
      achieved 69% balanced accuracy comparable to human NeurIPS reviewers, and paper quality shows a
      clear scaling law with better foundation models. Evolutionary Model Merging (arXiv March 2024,
      Nature Machine Intelligence January 2025) introduced an evolutionary search algorithm over both
      parameter and data-flow spaces to combine diverse open-source models, producing EvoLLM-JP-v1-7B
      which achieved state-of-the-art results on Japanese LLM benchmarks including MGSM-JA, surpassing
      models with far more parameters. Transformer² (ICLR 2025) introduced Singular Value Finetuning
      (SVF) using reinforcement learning to train compact z-vectors that modulate weight matrix components
      at inference time, outperforming LoRA with fewer parameters across math, coding, reasoning, and VQA
      tasks. The Darwin Gödel Machine (preprint May 2025, updated March 2026) achieved self-improvement
      of a coding agent from 20.0% to 50.0% on SWE-bench and 14.2% to 30.7% on Polyglot through
      open-ended evolutionary search, with improvements generalizing across different foundation models.
      The Continuous Thought Machine (May 2025) uses neuron synchronization timing inspired by biological
      neural networks to enable step-by-step interpretable reasoning, demonstrating human-like maze-solving
      and improved image recognition. AB-MCTS, which powers Sakana Marlin, was accepted as a spotlight
      paper at NeurIPS 2025 (~top 10% of accepted papers). These breakthroughs share a common thesis:
      collective intelligence and evolutionary search yield capabilities that monolithic scaled models
      cannot easily replicate.
