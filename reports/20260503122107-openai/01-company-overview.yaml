  title: Company Overview
  summary: >-
    OpenAI combines frontier-model research, consumer distribution, enterprise software, and API infrastructure under a
    mission-governed structure whose commercial scale is rising faster than public financial disclosure.
sections:
  - id: S101
    title: Identity, mission, and legal structure
    body: >-
      OpenAI is best understood as a mission-governed AI lab that has become a scaled product and infrastructure company
      rather than as a pure research institute. The company states that it was founded in 2015 as a nonprofit and that
      its mission remains to ensure artificial general intelligence benefits all of humanity. That framing matters
      because nearly every later diligence question, from capital formation to product packaging, is downstream of the
      tension between mission control and commercial scale. The reviewed official materials show that OpenAI is
      explicitly trying to preserve nonprofit control while widening the financing envelope needed to train and serve
      frontier systems.


      The 2025 structure update is therefore the current ground-truth identity anchor. OpenAI says the nonprofit parent
      is now the OpenAI Foundation and the commercial operating arm is OpenAI Group PBC, a public benefit corporation.
      The Foundation keeps special governance rights over the group board, while a simpler conventional equity structure
      is meant to make fundraising and compensation more practical. This is strategically useful because it gives OpenAI
      a cleaner story than the old capped-profit construct, but it also confirms that the company is still unusual
      relative to normal venture-backed software firms. Any investor underwriting OpenAI should treat the governance
      model as a live diligence item rather than a settled footnote. 


      Public scale claims are already large enough that the structure is not academic. OpenAI reported more than 1
      million paying business customers by late 2025 and described ChatGPT weekly users at over 800 million then 900
      million by April 2026. That level of user and customer reach supports the view that OpenAI has become a
      mass-distribution platform, not merely a foundation-model vendor.
    claimRefs:
      - C001
      - C003
      - C004
      - C010
      - C011
      - C012
  - id: S102
    title: Leadership, board control, and key-person dependence
    body: >-
      Leadership concentration remains high even after the 2025 expansion. The official materials show Sam Altman
      remained CEO while Fidji Simo was added as CEO of Applications to help scale product, business, and operational
      teams. Bret Taylor chaired the foundation board, and the foundation board continued to hold replacement power over
      OpenAI Group directors. That split helps explain how OpenAI is trying to scale execution without formally giving
      up the mission-governed board architecture.


      The 2023 board crisis is still the clearest adverse event in the public record and should not be normalized away.
      OpenAI’s own announcement said the board removed Altman after a review concluded he had not been consistently
      candid with directors, temporarily elevating Mira Murati to interim CEO. Even though Altman later returned and the
      board composition changed, the episode demonstrated that governance instability can propagate into financing,
      customer confidence, and ecosystem dependence very quickly. That makes key-person risk and board process quality
      central diligence topics.


      The current setup reduces some execution risk because Simo adds operational depth and OpenAI now has a visibly
      independent board bench. Even so, the company remains highly associated with Altman’s product strategy,
      fundraising credibility, and external positioning. A prudent investor should view OpenAI as less founder-fragile
      than it was in late 2023, but still materially dependent on a narrow leadership core for capital formation,
      strategic partnerships, and safe deployment decisions.
    claimRefs:
      - C007
      - C008
      - C009
      - C004
  - id: S103
    title: Scale, ownership, and milestone trajectory
    body: >-
      OpenAI’s public ownership disclosures give only one hard valuation anchor, but it is still meaningful. The
      Foundation said its 26% stake was worth approximately $130 billion at the close of recapitalization, implying a
      company value around $500 billion at that point. The same page states Microsoft held roughly 27%, with the
      remaining 47% owned by current and former employees and investors. That is enough to conclude that OpenAI is
      already priced as a global strategic platform rather than a normal late-stage software company, even though exact
      cap-table economics, liquidation preferences, and cumulative capital raised are not public in the reviewed
      materials.


      Commercial milestones also suggest OpenAI is now operating across several scale layers simultaneously. By August
      2023 it had already launched ChatGPT Enterprise and said accounts from over 80% of Fortune 500 companies were
      present on ChatGPT. By November 2025 it claimed over 1 million paying business customers, more than 7 million
      ChatGPT for Work seats, and 9x growth in ChatGPT Enterprise seats year over year. By April 2026 enterprise
      represented more than 40% of revenue and management described Codex at 3 million weekly active users plus APIs
      processing over 15 billion tokens per minute.


      The milestone pattern is strategically attractive because it combines consumer distribution, enterprise workflow
      adoption, and developer monetization in one platform. The tradeoff is that public evidence remains thin on classic
      private-company KPIs such as total revenue, gross margin, cash balance, burn, and contractual concentration. The
      right read is not that OpenAI lacks traction, but that public evidence proves scale faster than it proves economic
      quality.
    claimRefs:
      - C005
      - C006
      - C010
      - C013
      - C012
