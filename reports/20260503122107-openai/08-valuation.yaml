  - id: T804
    title: Comparable valuation table
    columns:
      - Comparable
      - Metric
      - Multiple / valuation / status
      - Relevance
      - Limitation
    rows:
      - - OpenAI current context
        - Ownership-value anchor
        - Approx. $500B implied by foundation stake
        - Only official public valuation anchor in reviewed pack
        - Not a fresh financing term sheet
      - - Anthropic Enterprise
        - Seat pricing
        - $20 / seat / month self-serve
        - Competitive willingness-to-pay reference
        - Not a valuation multiple
      - - AWS Bedrock
        - Usage pricing posture
        - Batch can be 50% cheaper than on-demand for select models
        - Shows cost-based competitive pressure
        - Not an equity comparable
      - - OpenAI API
        - Flagship model pricing
        - $5 input / $30 output per 1M tokens for GPT-5.5
        - Shows premium monetization intent
        - Does not reveal realized net pricing
    notes: Reviewed public sources support pricing and strategic references more clearly than direct equity comparables.
