callouts:
  - type: verdict
    title: Track, not buy
    body: OpenAI looks strategically exceptional, but the public evidence does not yet make the price look generous.
    claimRefs:
      - C076
      - C068
  - type: watchout
    title: Capital intensity dominates the downside case
    body: If compute and support costs stay extreme, even excellent adoption may not rescue returns at a high entry price.
    claimRefs:
      - C075
  - type: gap
    title: A buy call requires private economics
    body: Gross margin, burn, retention, and legal exposure remain the key missing pieces.
    claimRefs:
      - C076
