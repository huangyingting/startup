  - id: T803
    title: Bull / base / bear scenario table
    columns:
      - Scenario
      - Assumptions
      - Valuation / return logic
      - Key risks
      - Probability signal
    rows:
      - - Bull
        - Enterprise mix keeps rising, premium pricing holds, governance stays stable
        - $650B+ supportable over time with stronger economics proof
        - Compute and regulation remain manageable
        - Possible but evidence-incomplete
      - - Base
        - Demand stays strong, enterprise grows, but capital intensity and competition offset upside
        - Current ~$500B context looks fair-to-expensive
        - Margin opacity, partner dependence, regulation
        - Most consistent with reviewed evidence
      - - Bear
        - Pricing compresses, workflow incidents grow, or regulation meaningfully slows high-value deployments
        - $350B-$400B supportable
        - Capital and trust issues compound
        - Downside is plausible given missing economics
    notes: Ranges are analytical estimates anchored to public evidence and risk transmission, not reported financing marks.
