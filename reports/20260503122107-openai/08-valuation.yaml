      - C068
      - C073
      - C072
  - id: T805
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Evidence / threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - Enterprise mix stalls
        - No continued proof that enterprise is compounding from the current >40% share
        - Weakens platform-quality thesis
        - Cut conviction materially
      - - New governance shock
        - Unexpected leadership or board event
        - Reopens trust and financing risk
        - Pause underwriting
      - - Material regulatory or privacy event
        - New restriction or enforcement in a core market
        - Raises friction and cost
        - Re-cut valuation support
      - - Workflow reliability deterioration
        - Persistent incidents beyond normal noise
        - Weakens expansion assumptions
        - Lower confidence and scenario range
    notes: null
