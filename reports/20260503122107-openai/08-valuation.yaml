        - Separates breadth from durability
        - Go-to-market diligence / customer cohorts
      - - Litigation and IP exposure
        - Primary legal packet not reviewed here
        - Could affect trust, economics, and launch freedom
        - Legal diligence / outside counsel memo
      - - Partner economics
        - Current detailed economics with strategic ecosystem partners not public
        - Can affect realized margins and dependence
        - Partnership diligence / commercial agreements
