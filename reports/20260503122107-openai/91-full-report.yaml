      - number: '1.2'
        title: Leadership, board control, and key-person dependence
        blocks:
          - type: paragraph
            title: null
            body: >-
              Leadership concentration remains high even after the 2025 expansion. The official materials show Sam
              Altman remained CEO while Fidji Simo was added as CEO of Applications to help scale product, business, and
              operational teams. Bret Taylor chaired the foundation board, and the foundation board continued to hold
              replacement power over OpenAI Group directors. That split helps explain how OpenAI is trying to scale
              execution without formally giving up the mission-governed board architecture.


              The 2023 board crisis is still the clearest adverse event in the public record and should not be
              normalized away. OpenAI’s own announcement said the board removed Altman after a review concluded he had
              not been consistently candid with directors, temporarily elevating Mira Murati to interim CEO. Even though
              Altman later returned and the board composition changed, the episode demonstrated that governance
              instability can propagate into financing, customer confidence, and ecosystem dependence very quickly. That
              makes key-person risk and board process quality central diligence topics.


              The current setup reduces some execution risk because Simo adds operational depth and OpenAI now has a
              visibly independent board bench. Even so, the company remains highly associated with Altman’s product
              strategy, fundraising credibility, and external positioning. A prudent investor should view OpenAI as less
              founder-fragile than it was in late 2023, but still materially dependent on a narrow leadership core for
              capital formation, strategic partnerships, and safe deployment decisions.
