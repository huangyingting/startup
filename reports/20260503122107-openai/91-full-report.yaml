      - number: '1.3'
        title: Scale, ownership, and milestone trajectory
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI’s public ownership disclosures give only one hard valuation anchor, but it is still meaningful. The
              Foundation said its 26% stake was worth approximately $130 billion at the close of recapitalization,
              implying a company value around $500 billion at that point. The same page states Microsoft held roughly
              27%, with the remaining 47% owned by current and former employees and investors. That is enough to
              conclude that OpenAI is already priced as a global strategic platform rather than a normal late-stage
              software company, even though exact cap-table economics, liquidation preferences, and cumulative capital
              raised are not public in the reviewed materials.


              Commercial milestones also suggest OpenAI is now operating across several scale layers simultaneously. By
              August 2023 it had already launched ChatGPT Enterprise and said accounts from over 80% of Fortune 500
              companies were present on ChatGPT. By November 2025 it claimed over 1 million paying business customers,
              more than 7 million ChatGPT for Work seats, and 9x growth in ChatGPT Enterprise seats year over year. By
              April 2026 enterprise represented more than 40% of revenue and management described Codex at 3 million
              weekly active users plus APIs processing over 15 billion tokens per minute.


              The milestone pattern is strategically attractive because it combines consumer distribution, enterprise
              workflow adoption, and developer monetization in one platform. The tradeoff is that public evidence
              remains thin on classic private-company KPIs such as total revenue, gross margin, cash balance, burn, and
              contractual concentration. The right read is not that OpenAI lacks traction, but that public evidence
              proves scale faster than it proves economic quality.
