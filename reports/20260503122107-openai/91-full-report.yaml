      - number: '3.2'
        title: Capability and security comparison
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI’s application-led differentiation is visible in the breadth of business features around ChatGPT and
              Codex. The company advertises more than 60 app integrations plus shared projects, custom workspace GPTs,
              record mode, data analysis, and specialized agents. That package is compelling for companies that want
              quick employee adoption and a single front door for intelligence across knowledge work, coding, and task
              execution. OpenAI Enterprise also adds SCIM, enterprise key management, user analytics, domain
              verification, and role-based controls, which helps close the gap between consumer familiarity and
              enterprise governance.


              Anthropic is highly comparable on the trust-and-control dimension. Claude Enterprise explicitly markets
              SSO, SCIM, audit logs, custom retention controls, role-based permissions, and GitHub-native workflows. The
              enterprise plan is also legible to procurement because Anthropic publishes a self-serve enterprise price
              of $20 per seat per month before usage charges, whereas OpenAI’s enterprise plan remains custom priced.
              That pricing transparency can help Anthropic in budget-controlled pilots or side-by-side evaluations.


              AWS Bedrock competes differently. Its core promise is model choice, platform neutrality, and
              enterprise-grade governance inside existing AWS infrastructure. Bedrock now even highlights OpenAI models
              as part of that choice set. For some buyers that is a reason to use Bedrock rather than OpenAI directly:
              the customer can standardize governance, routing, and cost controls across multiple labs without
              committing to one workspace vendor. OpenAI’s counter is deeper application integration and a more native
              end-user experience.
