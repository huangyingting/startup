      - number: '4.2'
        title: Commercial traction and mix quality
        blocks:
          - type: paragraph
            title: null
            body: >-
              The commercial momentum signals in the reviewed source set are strong by any normal software standard.
              OpenAI said it had more than 1 million paying business customers in late 2025, more than 7 million ChatGPT
              for Work seats, and 9x year-over-year growth in ChatGPT Enterprise seats. By April 2026 management added
              that enterprise had already become more than 40% of revenue and was on track to reach parity with the
              consumer business by year end. That pattern suggests OpenAI is converting broad awareness into enterprise
              dollars rather than remaining a consumer phenomenon with enterprise hype.


              The mix is also directionally positive because it is diversified. Consumer usage gives distribution and
              brand, while enterprise and API products give a path to larger average contract value and usage-based
              expansion. The 2023 Enterprise launch showed that Fortune 500 adoption existed before today’s scale
              numbers, which strengthens the view that OpenAI’s enterprise motion did not start from zero after the
