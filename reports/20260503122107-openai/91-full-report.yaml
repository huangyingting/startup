      - number: '2.3'
        title: Sizing lenses, constraints, and what matters for valuation
        blocks:
          - type: paragraph
            title: null
            body: >-
              Public market sizing evidence is directionally strong but methodologically messy. Stanford’s 2025 AI Index
              gives the cleanest top-down lens in the reviewed source set: $33.9 billion of generative AI private
              investment globally in 2024 and $109.1 billion of U.S. private AI investment overall. Those numbers are
              not revenue TAM figures, but they do show that capital allocation to the category remains large and
              growing. Combined with 78% reported organizational AI usage, they support the view that AI has crossed
              from pilot novelty into mainstream strategic spend.


              The constraints matter almost as much as the demand curve. Stanford also reports that AI-related
              regulation and policy attention accelerated materially in 2024, with 59 U.S. federal agency rules and a
              21.3% increase in legislative mentions across 75 countries. OpenAI’s own economic research page reinforces
              that deployment decisions can shape labor and distributional outcomes, implying that future regulation is
              not just a legal tail risk but a structural feature of the market. For OpenAI specifically, this means
              regulated-enterprise upside is real, but every additional workflow pushed into finance, healthcare,
              education, or public services increases the cost of governance and proof.


              For valuation, the practical market question is therefore not whether the market is large enough. It is
              whether OpenAI can keep converting broad demand into durable revenue while staying trusted enough to
              penetrate the highest-value workflows. The reviewed evidence supports a large and still-forming market
              with real budget urgency, but it also supports a view that compliance and buyer-proof requirements will
              gate a meaningful share of future monetization.
