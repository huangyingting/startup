      - number: '3.3'
        title: Pricing pressure, lock-in, and moat durability
        blocks:
          - type: paragraph
            title: null
            body: >-
              The reviewed sources suggest OpenAI’s moat is real but not secure enough to ignore commoditization. On the
              API side, OpenAI publishes concrete pricing for flagship models, including GPT-5.5 at $5 per million input
              tokens and $30 per million output tokens. AWS Bedrock, however, makes cost optimization and routing part
              of the product promise, including a claimed 50% batch discount for select models and tooling that can
              shift workloads toward the lowest-cost acceptable model. That creates a natural pressure toward platform
              abstraction for cost-sensitive buyers.


              Anthropic’s enterprise offer also narrows differentiation in the knowledge-work layer. It has enterprise
              controls, connectors, and a seat-based bundle that buyers can understand quickly. In other words, OpenAI
              cannot rely only on “enterprise-grade trust” as a moat because credible peers now market similar features.
              The more durable moat appears to be the combination of model quality, user familiarity, ecosystem
              momentum, and breadth across consumer, enterprise, and developer surfaces.


              Lock-in therefore cuts both ways. OpenAI benefits when customers embed custom GPTs, connectors, workflows,
              and API-based agents into everyday operations. But buyers with strong procurement leverage may actively
              seek neutral routing layers, internal abstractions, or multi-vendor setups to prevent dependency on a
              single lab. The result is a durable but contestable position: OpenAI looks strongest where speed of
              adoption and end-user experience matter most, and weaker where model optionality and platform neutrality
              are the primary buying criteria.
