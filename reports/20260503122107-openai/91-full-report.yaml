      - number: '7.3'
        title: Financial-model risk and thesis-break conditions
        blocks:
          - type: paragraph
            title: null
            body: >-
              The most important financial risk is that OpenAI may remain capital-hungry even while looking commercially
              successful. Management’s own statement that compute demand currently requires hundreds of billions of
              dollars and may reach trillions is enough to treat capital intensity as a first-order risk. A business can
              have world-class demand and still disappoint investors if the cost of sustaining model leadership, service
              quality, and enterprise support expands as fast as revenue.


              This risk compounds with pricing and product risk. OpenAI’s best monetization surfaces are clear, but
              realized pricing, margin, and discounting remain opaque. If competition compresses token economics, if
              enterprise buyers insist on more services-heavy deployments, or if neutral routing layers reduce pricing
              power, the gap between impressive usage and attractive investor returns can widen quickly. That is
              especially relevant at the valuation context implied by the foundation stake disclosure.


              The thesis-break conditions are therefore concrete. A repeat governance shock, a meaningful slowdown in
              enterprise mix despite continued user growth, a material regulatory restriction in a key geography, or a
              sustained reliability problem in workflow-critical products would all weaken the current investment case
              materially.
