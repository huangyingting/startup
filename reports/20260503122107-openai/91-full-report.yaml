  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis and anti-thesis
        blocks:
          - type: paragraph
            title: null
            body: >-
              The pro-investment case is straightforward. OpenAI has platform-scale user reach, unusually strong
              enterprise adoption signals, multi-surface monetization, and clear category leadership in a market where
              adoption and capital allocation are still accelerating. The company also appears to be turning consumer
              distribution into enterprise economics rather than treating those businesses as separate islands. If that
              conversion continues, OpenAI could become one of the defining infrastructure-and-application platforms of
              the AI era.


              The anti-thesis is just as important. Public evidence supports a valuation anchor near $500 billion while
              still leaving gross margin, burn, capital needs, retention, and litigation exposure only partially
              resolved. That means the market may already be capitalizing a very large share of future strategic upside
              before the economics are publicly provable. Capital intensity is especially dangerous here because it can
              keep even a category winner from generating attractive investor returns at an already elevated price.


              The correct synthesis is that OpenAI looks exceptional as a company and unresolved as an entry point. This
              is exactly the kind of setup where quality and price can point in different directions.
