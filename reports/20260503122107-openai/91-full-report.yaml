      - number: '7.2'
        title: Operational, privacy, and partner-dependency risk
        blocks:
          - type: paragraph
            title: null
            body: >-
              Operational risk is no longer hypothetical because OpenAI increasingly sells workflow-critical
              capabilities. The public uptime figures are solid, but the same reviewed status page also showed a live
              connector write-action incident. That is the right pattern to focus on: not catastrophic systemic failure,
              but smaller workflow-facing incidents that can undermine trust precisely where OpenAI is trying to become
              embedded in everyday work. As the product stack becomes more connector- and agent-heavy, those
              feature-level incidents can matter more than legacy chatbot downtime metrics suggest.


              Privacy and data-handling risk are similarly two-sided. OpenAI has invested heavily in no-training
              defaults, encryption, retention controls, and certification coverage, which reduces baseline enterprise
              risk. But the business-data page also makes clear that some of the strongest controls depend on qualifying
              use cases or plan-specific configuration. That means customers still have to operationalize the controls
              correctly, and OpenAI still bears exposure if expectations around default behavior, data residency, or
              retention are misunderstood in sensitive deployments.


              Partner dependence is the final operational wrinkle. OpenAI’s enterprise strategy explicitly leans on
              consulting, cloud, and data-ecosystem partners such as AWS, Databricks, Snowflake, McKinsey, BCG,
              Accenture, and Capgemini. Those relationships speed adoption, but they also create indirect concentration
              and execution risk because key deployment motions increasingly sit inside partner ecosystems rather than
              solely within OpenAI’s direct control.
