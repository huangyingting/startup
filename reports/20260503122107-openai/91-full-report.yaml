      - number: '8.3'
        title: Recommendation and diligence discipline
        blocks:
          - type: paragraph
            title: null
            body: >-
              The recommendation is track with medium confidence, significant risk, and an expensive valuation stance.
              That is not a bearish call on the company. It is a price-sensitive call based on the asymmetry between
              what the public evidence clearly proves and what it leaves unresolved. Public evidence clearly proves
              scale, demand, product breadth, and strategic importance. It does not yet prove that current valuation
              context offers enough cushion against capital intensity, governance shocks, regulatory friction, or
              reliability-driven enterprise hesitation.


              A move to buy would require either better economics evidence or a meaningfully more forgiving entry point.
              Specifically, investors would need credible private data on gross margin, burn, runway, realized
              enterprise pricing, retention, and litigation exposure, or a valuation context that gives more protection
              if those variables disappoint. A move to avoid would require a more serious governance relapse, a clear
              deterioration in reliability, or evidence that enterprise mix is stalling despite continued user growth.


              That leaves OpenAI in the high-quality, high-price bucket: strategically important, commercially real, but
              not obviously mispriced in favor of new money on the basis of public materials alone. The underwriting
              discipline here is to demand private-evidence confirmation before paying up for strategic scarcity. Until
              that evidence appears, the right posture is active monitoring with explicit price discipline rather than
              momentum-chasing and without assuming strategic scarcity automatically converts into shareholder upside.
