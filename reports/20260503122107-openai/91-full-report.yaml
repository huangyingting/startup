  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and the job to be done
        blocks:
          - type: paragraph
            title: null
            body: >-
              The relevant market is not just “AI models.” For diligence purposes, OpenAI sits at the intersection of
              consumer assistants, enterprise productivity software, developer model infrastructure, and emerging agent
              platforms that automate multi-step work. That is why one broad TAM number is less useful than
              understanding where budget authority actually sits. In practice, the buyer set spans CIO and digital
              transformation budgets, line-of-business productivity budgets, software engineering budgets, customer
              support modernization budgets, and in some cases net-new AI platform budgets. The product can therefore
              displace incumbent SaaS features, internal workflow labor, and custom model-platform effort at the same
              time.


              OpenAI’s own enterprise framing supports that broader definition. The company argues that enterprise value
              increasingly clusters around five value models: workforce empowerment, AI-native distribution, expert
              capability, dependency management, and process re-engineering. That framing is useful because it separates
              near-term copilots from harder workflow redesign. It also helps explain why OpenAI can sell through both
              seat-based collaboration products and token-based APIs. The market boundary should therefore include both
              application-layer intelligence and the model-and-tooling layer that powers custom deployments.


              The main excluded spend is generic cloud infrastructure that is not specifically tied to AI workloads,
              plus older analytics and automation tools that do not incorporate model reasoning. Status-quo substitutes
              still matter, however. A buyer can respond to the same problem with manual labor, incumbent SaaS add-ons,
              internal build on neutral cloud platforms, or a competitor assistant such as Claude or Bedrock-hosted
              model stacks. That substitute set caps pricing power and pushes diligence away from abstract market size
              toward concrete buyer urgency and switching friction.
