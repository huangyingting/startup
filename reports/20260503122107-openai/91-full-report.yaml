      - number: '8.2'
        title: Scenario framing and comparable logic
        blocks:
          - type: paragraph
            title: null
            body: >-
              The base case should assume OpenAI keeps compounding enterprise mix, preserves premium model demand, and
              remains one of the small number of default AI platforms for both knowledge work and builder workflows.
              That case is supported by the 1M-customer disclosure, the enterprise revenue-mix disclosure, and the
              market tailwind data from Stanford. The bear case is not demand collapse. It is economic compression:
              lower realized pricing, higher compute intensity, slower regulatory clearance in valuable workflows, and
              increased buyer preference for neutral routing layers or multi-vendor stacks.


              Comparable logic must be used carefully because OpenAI straddles categories. Anthropic’s published
              enterprise seat price is a useful competitive reference, and Bedrock’s batch discounting is a useful
              infrastructure reference, but neither provides a clean valuation comparable. Instead, the comparison set
              mainly proves that OpenAI operates in a market where premium pricing can be challenged both by rival
              assistant bundles and by neutral cost-optimization platforms. That compresses the confidence one should
              have in a lofty valuation multiple without private financial data.


              The valuation range in this report is therefore not a claim about exact fair value. It is a disciplined
              framing tool that shows how much execution and financing quality must go right for the current valuation
