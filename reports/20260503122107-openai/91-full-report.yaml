appendices:
  - id: A
    title: Evidence gaps and diligence asks
    blocks:
      - type: list
        title: Highest-value unresolved gaps
        body: null
        calloutType: null
        tableRef: null
        figureRef: null
        items:
          - >-
            capital raised and preference stack: Total primary capital raised, secondary transactions, and liquidation
            preference terms were not disclosed in the reviewed official materials.
          - >-
            headcount and site footprint: The reviewed sources did not provide an official current employee count or
            office count.
          - >-
            OpenAI share by enterprise segment: The reviewed sources do not quantify OpenAI share by SMB, enterprise,
            developer, or regulated vertical.
          - >-
            Market-size consensus: The reviewed sources do not provide a single public revenue TAM / SAM with a
            methodology well matched to OpenAI’s blended consumer-enterprise platform.
          - >-
            head-to-head enterprise win rates: The reviewed public sources do not quantify win rates, churn, or
            competitive losses against Anthropic or neutral cloud stacks.
          - >-
            realized enterprise pricing: OpenAI’s enterprise quotes and realized discount structure were not public in
            reviewed sources.
          - >-
            gross margin and burn: The reviewed public sources do not disclose gross margin, operating loss, burn, or
            runway.
          - >-
            enterprise discounting and retention: No public cohort or realized pricing data was available in the
            reviewed materials.
        equation: null
        claimRefs: []
  - id: B
    title: Method note
    blocks:
      - type: paragraph
        title: How to read this report
        body: >-
          This package is built from public evidence reviewed as of 2026-05-03. It is strongest on product, adoption,
          governance, and strategic positioning, and intentionally conservative where profitability, customer
          durability, legal exposure, or financing terms are not public.
        calloutType: null
        tableRef: null
        figureRef: null
        items: null
        equation: null
        claimRefs: []
