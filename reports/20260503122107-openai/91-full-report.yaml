            body: >-
              Publicly reviewed materials only partially expose the underlying technical architecture, but they are
              clear on the operating model. OpenAI combines hosted models with customer-facing workspaces, connectors,
              admin tooling, and configurable security controls. Business and Enterprise pages emphasize data
              integrations, workspace administration, and specialized agents rather than low-level infrastructure
              design. That means the public architecture story is product-forward: OpenAI wants the customer to buy an
              integrated service, not a do-it-yourself set of primitives.


              For enterprise buyers, the stronger evidence is around controls. OpenAI says business data is not used for
              training by default, that relevant services encrypt data at rest and in transit, and that qualifying
              customers can set retention windows or zero-retention modes for some API paths. The company also
              advertises SSO, role controls, analytics, domain verification, and enterprise features such as SCIM and
              enterprise key management on higher plans. That is sufficient to support a view that OpenAI has built a
              serious enterprise control layer, even if precise internal architecture and tenancy design are not fully
              disclosed in public sources.


              The practical product risk is that buyers still need to validate how those controls behave under their own
              data, identity, and workflow conditions. Public controls are necessary evidence, but they are not a
              substitute for customer-specific implementation diligence.
