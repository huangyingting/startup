chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and legal structure
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI is best understood as a mission-governed AI lab that has become a scaled product and infrastructure
              company rather than as a pure research institute. The company states that it was founded in 2015 as a
              nonprofit and that its mission remains to ensure artificial general intelligence benefits all of humanity.
              That framing matters because nearly every later diligence question, from capital formation to product
              packaging, is downstream of the tension between mission control and commercial scale. The reviewed
              official materials show that OpenAI is explicitly trying to preserve nonprofit control while widening the
              financing envelope needed to train and serve frontier systems.


              The 2025 structure update is therefore the current ground-truth identity anchor. OpenAI says the nonprofit
              parent is now the OpenAI Foundation and the commercial operating arm is OpenAI Group PBC, a public benefit
              corporation. The Foundation keeps special governance rights over the group board, while a simpler
              conventional equity structure is meant to make fundraising and compensation more practical. This is
              strategically useful because it gives OpenAI a cleaner story than the old capped-profit construct, but it
              also confirms that the company is still unusual relative to normal venture-backed software firms. Any
              investor underwriting OpenAI should treat the governance model as a live diligence item rather than a
              settled footnote. 


              Public scale claims are already large enough that the structure is not academic. OpenAI reported more than
              1 million paying business customers by late 2025 and described ChatGPT weekly users at over 800 million
              then 900 million by April 2026. That level of user and customer reach supports the view that OpenAI has
              become a mass-distribution platform, not merely a foundation-model vendor.
