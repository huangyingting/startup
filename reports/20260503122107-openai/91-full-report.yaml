  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Governance and regulatory risk
        blocks:
          - type: paragraph
            title: null
            body: >-
              Governance remains a core risk, not a solved narrative. OpenAI’s 2023 leadership transition showed that
              the board was willing to remove the CEO over candor concerns, which means governance events can become
              immediate operating and financing events rather than slow-moving corporate process issues. Even after the
              2025 structure simplification, the nonprofit foundation still retains unusual control rights over the
              operating company. That is aligned with mission preservation, but it also means the company has a
              governance structure that many later-stage investors and counterparties will still view as nonstandard.


              Regulatory and policy pressure is also rising at the same time OpenAI is pushing deeper into enterprise
              workflows. Stanford’s 2025 AI Index shows a much denser regulatory environment in 2024, and OpenAI itself
              markets compliance support for multiple privacy and sector-adjacent standards. That combination implies a
              structural risk: the company’s growth opportunity is strongest in large and regulated workflows, but those
              same workflows increase the number of jurisdictions, rules, and audit expectations that can delay or
              constrain deployment.


              The net effect is that governance and regulation are linked. Mission-governed control can be a strength
              when it increases trust, but any future leadership or policy dispute could propagate quickly into product
              roadmap decisions, enterprise sales, and financing optics.
