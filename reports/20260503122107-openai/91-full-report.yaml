      - number: '4.3'
        title: Capital adequacy and why economics remain the key diligence blocker
        blocks:
          - type: paragraph
            title: null
            body: >-
              OpenAI’s own structure note is unusually explicit that compute needs are extraordinary. Management said
              current demand already requires hundreds of billions of dollars of compute and could eventually require
              trillions. That statement, combined with the mission-preserving PBC transition and the roughly $500
              billion value anchor implied by the foundation stake, tells investors two things. First, OpenAI expects to
              keep raising and reinvesting at a scale far above conventional SaaS norms. Second, the current structure
              is as much a financing mechanism as it is a governance artifact.


              This creates a mixed financial picture. On one hand, OpenAI appears to have enough market pull and
              strategic relevance to keep attracting partners, customers, and capital. On the other hand, the business
              may remain economically unusual for years because frontier-model development and service reliability can
              absorb capital faster than software margins would in a lighter-weight model. Even strong commercial
              traction does not by itself prove attractive free-cash-flow conversion under those conditions.


              The headline financial verdict is therefore positive on demand and unresolved on quality. Public evidence
              supports that OpenAI has multiple monetization engines and strong enterprise penetration. It does not yet
              support a confident external view on gross margin path, burn trajectory, runway, or financing overhang.
