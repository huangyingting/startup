  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and pricing surfaces
        blocks:
          - type: paragraph
            title: null
            body: >-
              The reviewed public materials support a three-part monetization model: consumer subscriptions and premium
              usage inside ChatGPT, business and enterprise workspace subscriptions, and token-based API consumption for
              builders. OpenAI’s public ChatGPT plans page confirms separate packaging for individual plans, Business
              Codex, Business workspace, and Enterprise, while the API pricing page gives explicit usage rates for
              flagship models such as GPT-5.5. This matters because OpenAI is not relying on one monetization surface.
              It can monetize demand through seats, usage, or both depending on customer maturity.


              The API price book is the cleanest public revenue evidence. OpenAI lists GPT-5.5 at $5 per million input
              tokens and $30 per million output tokens, plus discounted cached-input and batch options elsewhere on the
              page. Business Codex is usage priced with no fixed seat fee, which is strategically important because it
              lets OpenAI monetize developer workflows without forcing a broad-seat sale first. By contrast, Enterprise
              remains custom priced, so the platform can still negotiate value capture on larger, higher-touch
              deployments.


              The weakness is that public list pricing is not realized revenue. The reviewed sources do not reveal
              discounts, committed-spend structures, support costs, or model-routing behavior by customer segment. The
              correct conclusion is therefore that OpenAI has many monetization levers and strong willingness-to-pay
              signals, but public evidence still stops short of proving net revenue quality.
