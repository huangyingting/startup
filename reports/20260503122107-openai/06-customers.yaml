callouts:
  - type: strength
    title: OpenAI has real named-customer proof
    body: The case-study set goes beyond logos and ties customers to operational, engineering, and regulated workflows.
    claimRefs:
      - C054
      - C055
      - C056
  - type: watchout
    title: Breadth is clearer than durability
    body: Public materials prove wide adoption better than they prove renewal, net retention, or concentration safety.
    claimRefs:
      - C050
      - C051
  - type: gap
