  - id: F202
    title: Generative AI total market revenue forecast (Bloomberg Intelligence, $B)
    type: range
    layout: standard
    summary: >-
      Bloomberg Intelligence sizes the total generative AI market at $40B in 2022 growing to $1.3T by 2032 (42% CAGR). Within
      that envelope BI breaks out $247B of generative-AI infrastructure-as-a-service revenue and $89B of specialized
      generative-AI assistant software revenue by 2032 — the two sub-segments OpenAI most directly addresses.
    data:
      items:
        - label: 'Total generative AI market: 2022 actual → 2032 forecast'
          low: 40
          mid: 247
          high: 1300
    approximationNotes: USD billions; single-source forecast from Bloomberg Intelligence (June 2023). low = total genAI market in 2022, high = total in 2032; mid = BI's 2032 forecast for the generative-AI infrastructure-as-a-service sub-segment ($247B), used here as an OpenAI-addressable anchor inside the total envelope, not a temporal midpoint of the 2022–2032 trajectory.
    claimRefs:
      - C077
      - C078
      - C079
