callouts:
  - type: strength
    title: The category is already mainstream
    body: The Stanford adoption and investment data show AI is no longer a speculative pilot market.
    claimRefs:
      - C014
      - C015
  - type: watchout
    title: Governance cost rises with penetration
    body: >-
      The same market momentum that expands spend also expands the number of regulated workflows that require proof,
      retention controls, and policy alignment.
    claimRefs:
      - C017
      - C023
  - type: gap
    title: Public TAM is still a lens, not a single answer
    body: >-
      The reviewed sources give adoption and capital proxies more clearly than they give a consensus revenue TAM or SAM
      specifically addressable by OpenAI.
