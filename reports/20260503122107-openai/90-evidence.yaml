evidenceGaps:
  - topic: capital raised and preference stack
    missingEvidence: >-
      Total primary capital raised, secondary transactions, and liquidation preference terms were not disclosed in the
      reviewed official materials.
    whyItMatters: Without cap-table economics it is hard to judge dilution risk and the true entry price for new investors.
    diligencePath: Request latest financing summary, cap table, and investor rights schedule.
  - topic: headcount and site footprint
    missingEvidence: The reviewed sources did not provide an official current employee count or office count.
    whyItMatters: Headcount is a useful proxy for burn, organizational complexity, and operating leverage.
    diligencePath: Request current org chart, headcount by function, and site list.
  - topic: OpenAI share by enterprise segment
    missingEvidence: The reviewed sources do not quantify OpenAI share by SMB, enterprise, developer, or regulated vertical.
    whyItMatters: Share by segment determines whether distribution strength translates into durable monetization.
    diligencePath: Request pipeline and ARR segmentation by seat, API, and top vertical.
  - topic: Market-size consensus
    missingEvidence: >-
      The reviewed sources do not provide a single public revenue TAM / SAM with a methodology well matched to OpenAI’s
      blended consumer-enterprise platform.
    whyItMatters: A blended market boundary can exaggerate upside if buyer budgets are double-counted.
    diligencePath: Build bottoms-up segment sizing using enterprise seat counts, API spend, and agent deployment categories.
  - topic: head-to-head enterprise win rates
    missingEvidence: >-
      The reviewed public sources do not quantify win rates, churn, or competitive losses against Anthropic or neutral
      cloud stacks.
    whyItMatters: Feature parity does not reveal which vendor is actually winning the most valuable accounts.
    diligencePath: Request pipeline conversion, loss reasons, and retention by competitor set.
  - topic: realized enterprise pricing
    missingEvidence: OpenAI’s enterprise quotes and realized discount structure were not public in reviewed sources.
    whyItMatters: Without realized pricing it is difficult to separate demand strength from price compression.
    diligencePath: Review sample MSAs, discount schedules, and gross-margin bridges by product line.
  - topic: gross margin and burn
    missingEvidence: The reviewed public sources do not disclose gross margin, operating loss, burn, or runway.
    whyItMatters: Capital intensity is the main difference between an attractive platform and an overfunded one.
    diligencePath: Request audited statements, compute contract commitments, and margin bridges by product.
  - topic: enterprise discounting and retention
    missingEvidence: No public cohort or realized pricing data was available in the reviewed materials.
    whyItMatters: Seat and customer growth alone do not establish durable economics.
    diligencePath: Review top-customer contracts, renewal terms, and cohort expansion data.
  - topic: low-level system architecture
    missingEvidence: The reviewed public sources do not disclose precise tenancy, routing, failover, or latency architecture.
    whyItMatters: Those details matter for regulated deployments and for understanding reliability under load.
    diligencePath: Request architecture review, tenant isolation details, and SRE / incident-response materials.
  - topic: connector-level risk controls
    missingEvidence: Public materials do not fully document write-action controls, rollback paths, or connector-specific auditability.
    whyItMatters: As OpenAI moves from read workflows into action workflows, connector integrity becomes a key risk vector.
    diligencePath: Review connector permissions model, incident history, and rollback controls.
  - topic: retention and churn
    missingEvidence: The reviewed public sources do not disclose NRR, GRR, logo churn, or renewal rates.
    whyItMatters: Retention is essential for separating impressive adoption from durable customer economics.
    diligencePath: Request cohort tables by product, segment, and customer size.
  - topic: revenue concentration
    missingEvidence: The reviewed public sources do not disclose top-customer contribution or channel dependence.
    whyItMatters: Large AI platforms can look diversified by logo while remaining concentrated by revenue or compute demand.
    diligencePath: Review top-20 customer revenue, compute, and support concentration.
  - topic: copyright and litigation exposure
    missingEvidence: A reliable primary legal packet was not available in the reviewed source set.
    whyItMatters: IP litigation could materially affect enterprise trust, regulatory posture, and economic terms.
    diligencePath: Request outside counsel memo, live litigation tracker, and insurance coverage summary.
  - topic: incident history by enterprise feature
    missingEvidence: The reviewed status page gives a point-in-time snapshot but not a detailed feature-level incident history.
    whyItMatters: Workflow-critical incidents can weigh on expansion and retention more than top-line uptime suggests.
    diligencePath: Request incident logs, severity distribution, and postmortem summaries for enterprise features.
  - topic: full financial packet
    missingEvidence: Audited financials, cash-flow metrics, and realized pricing were not public in the reviewed source set.
    whyItMatters: Those items determine whether a high-quality company is also a high-quality investment at the current price.
    diligencePath: Review audited statements, board materials, and product-line economics.
  - topic: current legal and cap-table detail
    missingEvidence: The reviewed source set did not fully cover litigation status, investor rights, or preference overhang.
    whyItMatters: Those factors can move downside protection and effective valuation materially.
    diligencePath: Review legal memo, cap table, financing docs, and investor agreements.
