companyProfile:
  summary: |
    project44 is the leading supply chain visibility platform, connecting over 1,300 carriers and
    175,000+ transportation providers with enterprise shippers in 180+ countries. Founded in Chicago
    in 2014 by Jett McCandless, the company built the world's most comprehensive freight tracking
    network by integrating directly with carrier APIs, EDI systems, and IoT devices. Its Movement
    platform provides real-time transportation visibility (RTTVP) across all modes — truckload, LTL,
    ocean, air, parcel, and rail. Lucas Mansfield became CEO in May 2023, succeeding founder
    McCandless, with a focus on driving the company toward profitability and IPO readiness.
  foundedDate: "2014-01-01"
  founders:
    - name: Jett McCandless
      role: Founder and former CEO (departed May 2023)
      background: Supply chain logistics entrepreneur; built carrier network from zero to 1,300+ in 9 years
      claimRefs: [CP031]
  foundingLocation: "Chicago, IL, USA"
  headquarters: "Chicago, IL, USA"
  productSummary: |
    project44's Movement platform provides multi-modal RTTVP across truckload, LTL, ocean, air,
    parcel, and rail. The carrier network of 1,300+ direct integrations and 175,000+ provider
    connections is the core data moat. Acquisitions include Convey (final-mile, 2021) and Ocean
    Insights (ocean freight analytics, Sep 2022). In 2023-2024, the company launched Supply Chain
    Intelligence, an AI module enabling cross-customer benchmarking and predictive insights not
    replicable by single-vendor ERP platforms. CEO Lucas Mansfield (former CRO at AutoGrid and
    project44) leads the company toward profitability and potential IPO.
  customerFocus: |
    Enterprise shippers across manufacturing, retail, CPG, pharmaceuticals, and industrial sectors.
    Key customers include 3M, ABInBev, Pfizer, Walmart, and Unilever. The company serves ~1,200+
    enterprise customers with multi-year SaaS contracts. Customers access multi-modal visibility
    through the Movement platform and expanding AI intelligence modules.
  businessModel: |
    SaaS subscription model with annual contracts; per-shipment or platform-based pricing; carrier
    network access fees. Revenue is primarily enterprise SaaS with additional data and analytics
    upsell. Professional services revenue from implementation. High switching costs from deep carrier
    integrations and longitudinal shipment data.
  stage: Series F
  fundingStatus: "$698M total raised; $2.7B Series F valuation (Feb 2022); no new financing since Feb 2022 — approaching profitability estimated for 2025."
  disclosureProfile: private-disclosed
  claimRefs: [CP030, CP031, CP032, CP033]

