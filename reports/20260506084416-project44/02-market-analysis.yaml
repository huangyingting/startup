callouts:
  - title: FDA DSCSA Compliance Is a Near-Term Demand Catalyst
    body: >-
      The FDA's Drug Supply Chain Security Act serialization requirements, fully effective November 2024, created a
      concentrated regulatory-driven buying wave for supply chain visibility platforms in the pharmaceutical sector.
      project44's Movement platform with multimodal tracking and carrier network depth is well-positioned to capture
      pharmaceutical enterprise contracts driven by this compliance mandate, which does not fade once implemented.
    calloutType: insight
    claimRefs:
      - CM007
      - CM025
  - title: TMS Native Integration Is the Primary Long-Term Market Risk
    body: >-
      The secular risk that SAP, Oracle, and Blue Yonder will integrate native real-time visibility into their TMS
      platforms — eliminating the need for a standalone visibility layer — is the primary structural threat to the
      supply chain visibility platform market's growth rate. project44's 1,300+ carrier network provides a data moat
      that TMS vendors cannot easily replicate, but the 5-7 year horizon risk is real and should be monitored.
    calloutType: risk
    claimRefs:
      - CM031
      - CM017
