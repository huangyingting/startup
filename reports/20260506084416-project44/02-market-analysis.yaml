  claims:
    - id: CM001
      statement: >-
        The global supply chain visibility platform market is estimated at $7.6B in 2024, growing at approximately 15%
        CAGR to $18.2B by 2028, driven by enterprise digitalization of logistics operations and growing demand for
        real-time shipment tracking.
      type: third-party-reported
      topic: tam-size-2024
      sourceRefs:
        - SM001
        - SM002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM001
      contradictsClaimRefs: []
    - id: CM002
      statement: >-
        Gartner's RTTVP market definition encompasses platforms providing real-time visibility across ocean, air, road,
        and rail modes — a category worth approximately $3.1B in 2024 software revenue, with 18-20% CAGR projected
        through 2027 as multimodal visibility becomes a C-suite supply chain priority.
      type: third-party-reported
      topic: rttvp-market-size
      sourceRefs:
        - SM003
        - SM004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM012
      contradictsClaimRefs: []
    - id: CM003
      statement: >-
        project44's SAM is estimated at approximately $4.2B, representing enterprise shippers with >$500M revenue and
        complex multi-modal supply chains in North America, Europe, and APAC — the segments where the Movement
        platform's technical depth and carrier network scale provide the greatest value relative to simpler
        alternatives.
      type: estimated
      topic: sam-estimate
      sourceRefs:
        - SM001
        - SM011
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM002
      contradictsClaimRefs: []
    - id: CM004
      statement: >-
        project44's SOM (Serviceable Obtainable Market) at current sales capacity is approximately $500-700M ARR,
        representing roughly 12-16% of its SAM — at $210M ARR, the company has captured approximately 5% SOM, suggesting
        substantial remaining white space within its core target segments.
      type: estimated
      topic: som-penetration
      sourceRefs:
        - SM001
        - SM012
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM025
        - QM018
      contradictsClaimRefs: []
    - id: CM005
      statement: >-
