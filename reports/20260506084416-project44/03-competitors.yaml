analysisCallouts:
  - title: Carrier Network Is 10-Year Moat That Cannot Be Quickly Replicated
    body: >-
      project44's 1,300+ carrier network represents the company's most defensible competitive moat — built over 10+
      years through dedicated carrier integration investment, it creates a data network effect that improves AI model
      accuracy and provides unique cross-customer benchmarking data. FourKites would need 3-5 years of focused
      investment to match this coverage, during which project44 would continue expanding.
    calloutType: strength
    claimRefs:
      - C082
      - C105
  - title: Customer Satisfaction Gap vs FourKites Requires Active Investment
    body: >-
      FourKites' 4.4/5 vs. project44's 4.2/5 Gartner Peer Insights rating is the most operationally important
      competitive gap. In enterprise B2B, satisfaction scores directly influence renewal and expansion decisions.
      project44 must invest in UX improvement and customer success to prevent FourKites from using this gap to win
      competitive renewals in mid-market accounts where project44's carrier network advantage matters less.
    calloutType: risk
    claimRefs:
      - C100
      - C084
