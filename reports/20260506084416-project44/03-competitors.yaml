  claims:
    - id: C301
      statement: >-
        project44's primary direct competitors are FourKites (real-time visibility, estimated $150M ARR, ~$2B
        valuation), Descartes Systems (public company, $600M+ revenue, multi-acquisition roll-up model), SAP (Logistics
        Business Network native visibility), and Oracle Transportation Management with native visibility.
      type: observed
      topic: primary-competitors
      sourceRefs:
        - S301
        - S303
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ301
    - id: C302
      statement: >-
        Gartner's 2024 Magic Quadrant for RTTVP places project44 and FourKites as co-Leaders, with Descartes positioned
        as a Visionary — project44 scores higher on Ability to Execute while FourKites scores higher on Completeness of
        Vision, reflecting their different go-to-market approaches.
      type: third-party-reported
      topic: gartner-positioning
      sourceRefs:
        - S303
        - S304
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ312
        - RQ325
    - id: C303
      statement: >-
        FourKites is estimated to have approximately 1,000+ carrier integrations vs. project44's 1,300+, making
        project44 broader in network coverage; however, FourKites has stronger Gartner Peer Insights scores (4.4/5 vs.
        project44's 4.2/5), suggesting better customer experience delivery despite narrower network coverage.
      type: third-party-reported
      topic: fourkites-comparison
      sourceRefs:
        - S307
        - S314
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ302
        - RQ318
    - id: C304
      statement: >-
        Descartes Systems is a public company (TSX/NASDAQ) with $600M+ annual revenue across its portfolio of logistics
        SaaS products; its supply chain visibility capabilities are built through acquisition (Datamyne, MacroPoint,
        Kontainers) and are more fragmented than project44's integrated Movement platform.
      type: observed
      topic: descartes-profile
      sourceRefs:
        - S309
        - S310
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ303
        - RQ311
    - id: C305
      statement: >-
        SAP's Logistics Business Network (LBN) and Oracle's Transportation Management (OTM) native visibility
        capabilities represent the most significant structural competitive threat to project44 — both ERP vendors are
        bundling basic real-time tracking as a standard feature of their supply chain suites, potentially reducing
        willingness to pay for standalone platforms.
      type: third-party-reported
      topic: erp-native-threat
      sourceRefs:
        - S305
        - S306
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ304
    - id: C306
      statement: >-
        SAP LBN's native visibility features cover approximately 50-60% of the functionality of project44's Movement
        platform in terms of carrier API integrations, but lack project44's AI predictive ETA and exception management
        capabilities, multi-modal breadth, and cross-customer benchmarking intelligence.
      type: estimated
      topic: sap-capability-gap
      sourceRefs:
        - S306
        - S305
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ304
    - id: C307
      statement: >-
        Blue Yonder (acquired by Panasonic, $8.5B) offers an integrated TMS plus real-time visibility platform that
        competes with project44 in the manufacturing and retail sectors; Blue Yonder's strength is deep TMS-visibility
        integration for existing Blue Yonder TMS customers, while project44 offers broader carrier network coverage for
        companies with multiple TMS systems.
      type: observed
