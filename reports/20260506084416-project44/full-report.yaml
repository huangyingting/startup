chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Platform Overview
        blocks:
          - type: paragraph
            body: >-
              project44 is a Chicago-based logistics technology company founded in 2014 by Jett McCandless, building the
              world's largest real-time supply chain visibility network. The company's flagship product, the Movement
              platform, provides enterprise shippers with real-time shipment tracking, predictive ETA calculations, and
              exception management across all major transportation modes — ocean, air, rail, and trucking [C107, C108].
              The platform integrates with 1,300+ carriers and brokers across 180+ countries, creating a network scale
              that is the company's primary competitive moat [C008].


              project44's Movement platform is API-first and architecture-agnostic, connecting to carrier APIs, EDI
              feeds, IoT sensor data, and port authority information to create a unified shipment data layer [C025]. The
              platform's AI capabilities center on predictive ETA technology — using historical carrier performance
              data, weather signals, and real-time congestion information to improve arrival time accuracy by up to 40%
              versus traditional carrier-provided ETAs [C017]. Exception management — proactive alerts on delays, port
              congestion, and carrier underperformance — is the highest-value feature cited by enterprise customers,
              reducing manual supply chain analyst work by an estimated 30-50% [C031].


              Gartner named project44 a Leader in its 2024 Magic Quadrant for Real-Time Transportation Visibility
              Platforms, confirming its market-leading position in a category it helped define [C009]. The platform
              serves 1,200+ enterprise accounts across CPG, automotive, pharmaceutical, and retail sectors, including
              reference customers 3M, AB InBev, Pfizer, Walmart, and Unilever [C116, C130].
            claimRefs: []
      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >-
              project44 underwent a significant leadership transition in May 2023 when founder and CEO Jett McCandless
              stepped down and was replaced by Lucas Mansfield, who joined from a board position [C002]. McCandless
              built project44 from a Chicago logistics data startup to a $2.7B unicorn over 8 years, establishing the
              company's carrier network strategy and key enterprise customer relationships [C027]. The founder departure
              is a noted adverse event — McCandless was the company's primary customer relationship anchor during the
              high-growth phase, and leadership transitions in founder-led B2B companies carry execution continuity risk
              [C015].


              Lucas Mansfield brings enterprise SaaS scaling experience to the CEO role and has the backing of the board
              and growth equity investors to manage the next phase of expansion [C102, C103]. The board includes
              representation from IVP (Institutional Venture Partners), Goldman Sachs, and other institutional investors
              who provide financial oversight and strategic guidance [C010]. The leadership team includes a CTO
              responsible for the Movement platform architecture and AI roadmap, and a Chief Revenue Officer overseeing
              global enterprise sales [C004].
            claimRefs: []
      - number: '1.3'
        title: Funding History and Scale Metrics
        blocks:
          - type: paragraph
            body: >-
              project44 achieved unicorn status with its $420M Series F round in February 2022, led by Goldman Sachs at
              a $2.7B valuation — becoming the first supply chain visibility platform to reach that milestone [C103,
              C129]. Total funding raised is approximately $698M+ across Series A through Series F, with investors
              including Goldman Sachs, IVP, Emergence Capital, Sapphire Ventures, and strategic logistics investors
              [C004]. The Series F funding was used to expand carrier network coverage globally, accelerate product
              development on AI-powered predictive analytics, and pursue acquisition targets to fill modal coverage gaps
              (Ocean Insights was acquired in September 2022) [C012].


              As of 2024, project44 has reached approximately $210M+ in revenue (30%+ YoY growth from ~$160M in 2023),
              based on third-party industry analyst estimates from FreightWaves and Modern Shipper [C005]. This revenue
              trajectory demonstrates consistent growth across the post-Series F period despite the CEO transition in
              2023, suggesting the business model and platform economics remain resilient to leadership change [C022].
              Headcount is approximately 900 employees globally, with offices in Chicago (HQ), Amsterdam, Atlanta,
              London, Paris, and Bangalore [C006].


              The $2.7B Series F valuation from February 2022 remains the last publicly confirmed financing reference
              point, with no subsequent equity rounds announced through May 2026 [C019]. PitchBook confirms the
              company's unicorn status is maintained as of 2024 with no evidence of a down-round [C019]. The absence of
              new financing rounds over 3+ years (2022-2025) while maintaining 30%+ growth and an estimated $210M
              revenue base suggests the company may be approaching cash flow breakeven or profitability — consistent
              with a trajectory toward an eventual IPO or strategic exit [C024]. Revenue growth has been fueled by the
              structural macro tailwind of enterprise supply chain digitalization post-COVID, with large multinationals
              increasingly mandating real-time visibility from logistics providers as a standard supply chain operations
              requirement [C028].
