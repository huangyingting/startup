      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >-
              project44 underwent a significant leadership transition in May 2023 when founder and CEO Jett McCandless
              stepped down and was replaced by Lucas Mansfield, who joined from a board position [CO002]. McCandless
              built project44 from a Chicago logistics data startup to a $2.7B unicorn over 8 years, establishing the
              company's carrier network strategy and key enterprise customer relationships [CO027]. The founder
              departure is a noted adverse event — McCandless was the company's primary customer relationship anchor
              during the high-growth phase, and leadership transitions in founder-led B2B companies carry execution
              continuity risk [CO015].


              Lucas Mansfield brings enterprise SaaS scaling experience to the CEO role and has the backing of the board
              and growth equity investors to manage the next phase of expansion [CO002][CO003]. The board includes
              representation from IVP (Institutional Venture Partners), Goldman Sachs, and other institutional investors
              who provide financial oversight and strategic guidance [CO010]. The leadership team includes a CTO
              responsible for the Movement platform architecture and AI roadmap, and a Chief Revenue Officer overseeing
              global enterprise sales [CO004].
            claimRefs: []
