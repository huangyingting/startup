  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue and Growth Profile
        blocks:
          - type: paragraph
            body: >-
              project44's estimated FY2024 revenue of $210M+ represents 30%+ year-on-year growth, based on CEO Lucas
              Mansfield's disclosed growth rate and analyst estimates from PitchBook and FreightWaves [C401, C402].
              Revenue composition is primarily SaaS subscription fees from enterprise shippers (estimated 80-85% of
              revenue at $250K-$2M+ ACV) with approximately 15-20% from carrier connectivity fees paid by carriers for
              premium API access tiers [C406, C407]. The revenue split by modal category places road freight at 55-65%,
              ocean freight at 20-25% (accelerated by the Ocean Insights acquisition), and final-mile at 10-15% (via the
              Convey acquisition) [C130]. This multi-modal revenue diversification reduces single-mode concentration
              risk while positioning project44 as the broadest-coverage pure-play supply chain visibility platform
              available to enterprise shippers globally.


              Wall Street Journal coverage in 2024 validated project44's growth trajectory with independent third-party
              reporting, complementing CEO-level disclosures [C132]. Revenue growth has been partially driven by organic
              expansion from land-and-expand dynamics within existing enterprise accounts and partly by the Convey
              (2021) and Ocean Insights (2022) acquisitions, each contributing an estimated $15-25M in incremental ARR
              [C120]. Enterprise contracts are typically 2-3 years in length with annual volume escalators, creating a
              predictable recurring revenue base with built-in expansion mechanics [C122]. The full-platform adoption
              value per large enterprise shipper can reach $2M+ annually when the shipper leverages the full suite of
              multimodal visibility, exception management, and supply chain intelligence modules [C123].


              The 30%+ growth rate significantly outpaces Descartes' organic 7% growth and the broader supply chain SaaS
              median of approximately 15%, validating project44's pure-play growth model and its ability to capture
              share from multi-product incumbents [C114]. This growth premium is the primary justification for
              project44's premium revenue multiple relative to public comps. However, the absence of audited financial
              statements means that the 30%+ growth estimate is based on company disclosures and analyst verification
              rather than independently audited figures — a material limitation for rigorous financial underwriting
              [C141].
            claimRefs: []
      - number: '4.2'
        title: Capital Structure and Financial Position
        blocks:
          - type: paragraph
            body: >-
              project44's Series F in February 2022 raised $420M primary capital at a $2.7B valuation, led by Goldman
              Sachs Equity Partners with participation from Emergence Capital and Sapphire Ventures [C109]. Total
              capital raised through Series F is approximately $698M+ across all rounds from Series A (2016) onward
              [C434, C420]. The company has not raised new capital since February 2022 — a 3+ year gap through 2025 —
              and has not filed for IPO [C110].


              The 3+ year financing gap is ambiguous: either project44 has reached cash-flow near-breakeven and does not
              need capital (positive signal), or the company has been unable to raise at or above its $2.7B 2022 carry
              (adverse signal) [C111]. If the $420M was deployed at an estimated $30-50M annual burn over 36-48 months,
              the runway would extend through late 2024 to 2026, suggesting the company is at or near cash-flow
              breakeven in mid-2026 [C127]. The quality of the investor base (Goldman Sachs, Emergence Capital) provides
              weak confidence that the company is not in financial distress [C134].


              Material financial data gaps include gross margin, NRR, EBITDA, churn, and CAC — none of which are
              publicly disclosed, making rigorous financial underwriting dependent on analyst estimates [C419, C435].
            claimRefs: []
      - number: '4.3'
        title: Unit Economics and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              project44's estimated gross margin of 65-75% is below pure SaaS benchmarks due to carrier integration
              infrastructure costs; Descartes as a public comp shows 75-78% gross margins [C116]. NRR is estimated at
              115-125% based on growth trajectory and customer base expansion patterns [C121]. Customer acquisition cost
              payback is estimated at 24-36 months based on logistics SaaS benchmarks from SaaS Capital [C124]. The
              estimated revenue-per-employee of $230K trails the SaaS enterprise benchmark but is consistent with a
              company in network expansion mode [C117].


              The $2.7B 2022 valuation implies 12-13x 2024 ARR at current trajectory, consistent with the upper range of
              public comp multiples for supply chain SaaS [C422, C433]. Bessemer's benchmarks suggest 8-15x ARR for 30%+
              growth supply chain SaaS companies, validating the $2.7B carry at the top end of the range [C139].
              However, the 2022 valuation was set at peak private market multiples; in a secondary market transaction,
              the fair value estimate would likely be $1.8-2.4B based on current public market comps [C137]. The absence
              of NRR, gross margin, and churn disclosure remains the most material risk for financial underwriting
              [C141].
