      - number: '1.3'
        title: Funding History and Scale Metrics
        blocks:
          - type: paragraph
            body: >-
              project44 achieved unicorn status with its $420M Series F round in February 2022, led by Goldman Sachs at
              a $2.7B valuation — becoming the first supply chain visibility platform to reach that milestone
              [CO003][CO029]. Total funding raised is approximately $698M+ across Series A through Series F, with
              investors including Goldman Sachs, IVP, Emergence Capital, Sapphire Ventures, and strategic logistics
              investors [CO004]. The Series F funding was used to expand carrier network coverage globally, accelerate
              product development on AI-powered predictive analytics, and pursue acquisition targets to fill modal
              coverage gaps (Ocean Insights was acquired in September 2022) [CO012].


              As of 2024, project44 has reached approximately $210M+ in revenue (30%+ YoY growth from ~$160M in 2023),
              based on third-party industry analyst estimates from FreightWaves and Modern Shipper [CO005]. This revenue
              trajectory demonstrates consistent growth across the post-Series F period despite the CEO transition in
              2023, suggesting the business model and platform economics remain resilient to leadership change [CO022].
              Headcount is approximately 900 employees globally, with offices in Chicago (HQ), Amsterdam, Atlanta,
              London, Paris, and Bangalore [CO006].


              The $2.7B Series F valuation from February 2022 remains the last publicly confirmed financing reference
              point, with no subsequent equity rounds announced through May 2026 [CO019]. PitchBook confirms the
              company's unicorn status is maintained as of 2024 with no evidence of a down-round [CO019]. The absence of
              new financing rounds over 3+ years (2022-2025) while maintaining 30%+ growth and an estimated $210M
              revenue base suggests the company may be approaching cash flow breakeven or profitability — consistent
              with a trajectory toward an eventual IPO or strategic exit [CO024]. Revenue growth has been fueled by the
              structural macro tailwind of enterprise supply chain digitalization post-COVID, with large multinationals
              increasingly mandating real-time visibility from logistics providers as a standard supply chain operations
              requirement [CO028].
