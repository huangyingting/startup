      - number: '4.2'
        title: Capital Structure and Financial Position
        blocks:
          - type: paragraph
            body: >-
              project44's Series F in February 2022 raised $420M primary capital at a $2.7B valuation, led by Goldman
              Sachs Equity Partners with participation from Emergence Capital and Sapphire Ventures [CI003]. Total
