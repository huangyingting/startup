chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Platform Overview
        blocks:
          - type: paragraph
            body: >-
              project44 is a Chicago-based logistics technology company founded in 2014 by Jett McCandless, building the
              world's largest real-time supply chain visibility network. The company's flagship product, the Movement
              platform, provides enterprise shippers with real-time shipment tracking, predictive ETA calculations, and
              exception management across all major transportation modes — ocean, air, rail, and trucking
              [CO007][CO008]. The platform integrates with 1,300+ carriers and brokers across 180+ countries, creating a
              network scale that is the company's primary competitive moat [CO008].


              project44's Movement platform is API-first and architecture-agnostic, connecting to carrier APIs, EDI
              feeds, IoT sensor data, and port authority information to create a unified shipment data layer [CO025].
              The platform's AI capabilities center on predictive ETA technology — using historical carrier performance
              data, weather signals, and real-time congestion information to improve arrival time accuracy by up to 40%
              versus traditional carrier-provided ETAs [CO017]. Exception management — proactive alerts on delays, port
              congestion, and carrier underperformance — is the highest-value feature cited by enterprise customers,
              reducing manual supply chain analyst work by an estimated 30-50% [CO031].


              Gartner named project44 a Leader in its 2024 Magic Quadrant for Real-Time Transportation Visibility
              Platforms, confirming its market-leading position in a category it helped define [CO009]. The platform
              serves 1,200+ enterprise accounts across CPG, automotive, pharmaceutical, and retail sectors, including
              reference customers 3M, AB InBev, Pfizer, Walmart, and Unilever [CO016][CO030].
