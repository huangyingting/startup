      - number: '2.4'
        title: Exhibits
        blocks:
          - type: callout
            title: FDA DSCSA Compliance Is a Near-Term Demand Catalyst
            body: >-
              The FDA's Drug Supply Chain Security Act serialization requirements, fully effective November 2024,
              created a concentrated regulatory-driven buying wave for supply chain visibility platforms in the
              pharmaceutical sector. project44's Movement platform with multimodal tracking and carrier network depth is
              well-positioned to capture pharmaceutical enterprise contracts driven by this compliance mandate, which
              does not fade once implemented.
            calloutType: insight
            claimRefs:
              - CM007
              - CM025
          - type: callout
            title: TMS Native Integration Is the Primary Long-Term Market Risk
            body: >-
              The secular risk that SAP, Oracle, and Blue Yonder will integrate native real-time visibility into their
              TMS platforms — eliminating the need for a standalone visibility layer — is the primary structural threat
              to the supply chain visibility platform market's growth rate. project44's 1,300+ carrier network provides
              a data moat that TMS vendors cannot easily replicate, but the 5-7 year horizon risk is real and should be
              monitored.
            calloutType: risk
            claimRefs:
              - CM031
              - CM017
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The real-time supply chain visibility platform market is an oligopolistic competitive market with
              project44 and FourKites as co-leaders, Descartes Systems as a public company challenger, and SAP/Oracle as
              structural threats from the ERP layer [CP001]. Gartner's 2024 Magic Quadrant places project44 and
              FourKites as co-Leaders with project44 ranked higher on Ability to Execute while FourKites leads on
              Completeness of Vision [CP002]. Forrester's Wave offers a contrasting view — rating FourKites as a Leader
              and project44 as a Strong Performer, citing gaps in user experience [CP025].


              project44's carrier network of 1,300+ carriers and brokers vs. FourKites' estimated 1,000+ is the most
              tangible differentiation — network breadth creates a data flywheel that strengthens AI model quality over
              time [CP011][CP034]. However, FourKites' superior Gartner Peer Insights rating (4.4/5 vs. 4.2/5) suggests
              that network depth alone does not fully compensate for customer experience gaps [CP003][CP029].


              Descartes, the public company competitor, has built a fragmented multi-acquisition portfolio that covers
              visibility alongside customs, compliance, and routing — making it a different business model from
              project44's integrated platform play; Descartes' visibility products represent an estimated $80-120M
              sub-segment of its $600M+ revenue base [CP004][CP032]. Blue Yonder, Overhaul, and specialized pharma
              platforms round out the competitive map as sector-specific or TMS-integrated alternatives [CP007][CP017].
            claimRefs: []
