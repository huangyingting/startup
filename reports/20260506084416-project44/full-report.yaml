  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Enterprise Traction
        blocks:
          - type: paragraph
            body: >-
              project44 serves 1,200+ enterprise customers spanning 180+ countries and 1,300+ carriers, with a customer
              base that includes marquee Fortune 500 logos across multiple industry verticals [C601, C602]. Named public
              customers include 3M (Fortune 100 manufacturer), ABInBev (global CPG), Pfizer (pharmaceutical), Walmart
              (global retailer), and Unilever (CPG/consumer goods) — each representing high-value anchor accounts that
              validate the platform across different industry use cases [C178]. Wall Street Journal's 2024 coverage
              independently confirmed project44's Fortune 500 customer roster quality, going beyond company-authored
              case studies [C194].


              Customer growth trajectory confirms 30%+ revenue growth with a customer count increase from approximately
              800 accounts in 2021 to 1,200+ by 2024 — driven by organic enterprise logo acquisition and approximately
              400+ customer additions from the Convey and Ocean Insights acquisitions [C601, C630]. The platform
              processes approximately 1 billion+ shipment events annually, generating the data volume that powers AI
              predictive models and cross-customer supply chain intelligence [C190].


              Vertical segmentation is approximately 25% CPG/FMCG, 20% retail, 15% pharmaceutical/life sciences, 15%
              automotive/industrial, and 10% technology/electronics — with pharmaceutical being the fastest-growing
              vertical driven by DSCSA compliance tailwinds and temperature chain monitoring requirements [C615, C626].
              Geographically, North America accounts for an estimated 55-65% of revenue, with Western Europe at 25-30%
              and Asia Pacific at 10-15% — notable underpenetration in APAC given its 40%+ share of global manufacturing
              [C610, C620].
            claimRefs: []
      - number: '6.2'
        title: Customer Satisfaction and Retention
        blocks:
          - type: paragraph
            body: >-
              Gartner Peer Insights rates project44 at 4.2/5 based on 127+ verified customer reviews, earning a
              Customers' Choice distinction in the RTTVP category [C181]. G2 rates the company at approximately 4.1/5
              based on 200+ reviews, with strengths in carrier network breadth and exception management [C182]. Supply
              Chain Dive's analysis of the Gartner score confirms the rating but notes the 0.2-point gap vs. FourKites
              (4.4/5) as a meaningful competitive risk at renewal for mid-market accounts [C183].


              TrustRadius reviews show a pattern where fully-deployed customers are highly satisfied, while customers in
              early implementation stages report frustration with complexity [C195]. Capterra reviews reveal that
              smaller enterprise customers (500M-1B revenue) report lower satisfaction than large enterprises,
              identifying a structural risk in the mid-market customer tier [C200]. The most consistent feedback across
              all review platforms — implementation complexity and onboarding time — is both a competitive weakness and
              a retention risk if customers fail to fully deploy within their initial contract term.


              Retention of top-tier accounts (Pfizer, Walmart, Unilever, 3M) is strong — all four Fortune 500 customers
              appear in case study material across 2021-2024, indicating 3+ year retention for the largest accounts
              [C203]. Unilever expanded its partnership in 2024 to cover global ocean and road freight visibility,
              validated by both PR Newswire and Supply Chain Dive as an independent contract expansion [C617, C634].
              Customer churn is not publicly disclosed but the 30%+ revenue growth with 1,200+ stable customer count
              implies implied NRR of 115-125% and gross churn of approximately 5-10% annually [C185].
            claimRefs: []
      - number: '6.3'
        title: Customer Expansion and Risk Patterns
        blocks:
          - type: paragraph
            body: >-
              The most common expansion patterns are multi-modal expansion (adding ocean or final-mile), geographic
              expansion (extending to additional regions), and module expansion (adding Supply Chain Intelligence) —
              each expanding ACV by an estimated 30-100% per expansion event [C187]. The September 2024 launch of the
              SCI module is being adopted primarily by mature large enterprise accounts in year 2-3 of their deployment,
              suggesting a natural expansion revenue opportunity as the customer base matures [C198].


              Customer concentration risk is moderate — with 1,200+ enterprise customers and estimated $210M revenue,
              average revenue per customer is approximately $175K; analyst estimates suggest top 10 customers account
              for 15-25% of revenue, indicating limited extreme concentration risk [C188]. project44's customer base is
              biased toward high-volume B2B shippers with 100,000+ annual shipments — the platform's AI and benchmarking
              value scales with volume, making it underserved for low-volume shippers [C209].


              Independently validated customer outcomes — Unilever's 30% exception management time reduction and
              Pfizer's temperature deviation early warning improvements — provide specific measurable ROI evidence
              beyond company-authored marketing material [C207]. No major Fortune 500 customer losses or public
              criticism were reported in 2024, though private non-renewals are not publicly trackable [C211]. The 180+
              country coverage is a key differentiator enabling Fortune 500 global shippers to consolidate onto a single
              platform rather than managing regional providers [C205].
            claimRefs: []
