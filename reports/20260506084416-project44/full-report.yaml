      - number: '2.2'
        title: Demand Drivers and Market Growth
        blocks:
          - type: paragraph
            body: >-
              Supply chain visibility demand has been structurally accelerated by COVID-19 — McKinsey's 2024 survey
              shows 85% of Fortune 500 supply chain executives increased technology investment post-COVID, with
              real-time visibility as the top priority [CM008]. The Red Sea shipping crisis of late 2023 renewed urgency
              for dynamic ocean freight tracking, driving another wave of platform adoption [CM030]. The near-shoring
              and reshoring trend creating new US-Mexico and US-Eastern Europe supply chain lanes is generating
              incremental tracking demand as companies monitor newly established supplier relationships [CM009].


              Regulatory mandates are a key compliance-driven demand driver: FDA's DSCSA pharmaceutical traceability
              requirements (effective November 2024) mandate lot-level serialization tracking for pharmaceutical
              companies, creating a large regulatory-driven buying wave [CM007]. AI is transforming the value
              proposition — Forrester projects AI-augmented visibility platforms will command 30-50% pricing premiums
              over legacy tracking by 2026, and McKinsey estimates AI-powered predictive ETAs can reduce disruption
              costs by 15-25% for large manufacturers [CM019][CM026]. The Fortune 1000 penetration rate of 55-65% still
              leaves 35-45% of large enterprises relying on manual tracking, representing ongoing market expansion
              opportunity [CM014].
            claimRefs: []
          - type: table
            tableRef: TM002
