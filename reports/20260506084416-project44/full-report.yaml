      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Carrier Network Is 10-Year Moat That Cannot Be Quickly Replicated
            body: >-
              project44's 1,300+ carrier network represents the company's most defensible competitive moat — built over
              10+ years through dedicated carrier integration investment, it creates a data network effect that improves
              AI model accuracy and provides unique cross-customer benchmarking data. FourKites would need 3-5 years of
              focused investment to match this coverage, during which project44 would continue expanding.
            calloutType: strength
            claimRefs:
              - CP011
              - CP034
          - type: callout
            title: Customer Satisfaction Gap vs FourKites Requires Active Investment
            body: >-
              FourKites' 4.4/5 vs. project44's 4.2/5 Gartner Peer Insights rating is the most operationally important
              competitive gap. In enterprise B2B, satisfaction scores directly influence renewal and expansion
              decisions. project44 must invest in UX improvement and customer success to prevent FourKites from using
              this gap to win competitive renewals in mid-market accounts where project44's carrier network advantage
              matters less.
            calloutType: risk
            claimRefs:
              - CP029
              - CP013
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue and Growth Profile
        blocks:
          - type: paragraph
            body: >-
              project44's estimated FY2024 revenue of $210M+ represents 30%+ year-on-year growth, based on CEO Lucas
              Mansfield's disclosed growth rate and analyst estimates from PitchBook and FreightWaves [CI001][CI002].
              Revenue composition is primarily SaaS subscription fees from enterprise shippers (estimated 80-85% of
              revenue at $250K-$2M+ ACV) with approximately 15-20% from carrier connectivity fees paid by carriers for
              premium API access tiers [CI006][CI007]. The revenue split by modal category places road freight at
              55-65%, ocean freight at 20-25% (accelerated by the Ocean Insights acquisition), and final-mile at 10-15%
              (via the Convey acquisition) [CI024]. This multi-modal revenue diversification reduces single-mode
              concentration risk while positioning project44 as the broadest-coverage pure-play supply chain visibility
              platform available to enterprise shippers globally.


              Wall Street Journal coverage in 2024 validated project44's growth trajectory with independent third-party
              reporting, complementing CEO-level disclosures [CI026]. Revenue growth has been partially driven by
              organic expansion from land-and-expand dynamics within existing enterprise accounts and partly by the
              Convey (2021) and Ocean Insights (2022) acquisitions, each contributing an estimated $15-25M in
              incremental ARR [CI014]. Enterprise contracts are typically 2-3 years in length with annual volume
              escalators, creating a predictable recurring revenue base with built-in expansion mechanics [CI016]. The
              full-platform adoption value per large enterprise shipper can reach $2M+ annually when the shipper
              leverages the full suite of multimodal visibility, exception management, and supply chain intelligence
              modules [CI017].


              The 30%+ growth rate significantly outpaces Descartes' organic 7% growth and the broader supply chain SaaS
              median of approximately 15%, validating project44's pure-play growth model and its ability to capture
              share from multi-product incumbents [CI008]. This growth premium is the primary justification for
              project44's premium revenue multiple relative to public comps. However, the absence of audited financial
              statements means that the 30%+ growth estimate is based on company disclosures and analyst verification
              rather than independently audited figures — a material limitation for rigorous financial underwriting
              [CI035].
            claimRefs: []
