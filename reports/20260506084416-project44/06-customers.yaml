analysisCallouts:
  - title: Unilever and Pfizer Show Multi-Year Enterprise Retention at Scale
    body: >-
      The dual-source confirmation of Unilever's 2024 global expansion contract (Supply Chain Dive + PR Newswire)
      alongside Pfizer's 3+ year pharmaceutical visibility relationship demonstrates that project44's largest enterprise
      customers expand rather than churn. Unilever's 30% reduction in exception management time and Pfizer's temperature
      deviation early warning represent independently validated ROI — the gold standard of customer evidence in
      enterprise B2B.
    calloutType: strength
    claimRefs:
      - C207
      - C193
      - C210
  - title: Mid-Market Satisfaction Gap and Implementation Complexity Are Structural Risks
    body: >-
      The consistent pattern across Gartner, G2, TrustRadius, and Capterra — implementation complexity for smaller
      logistics teams — is project44's most material customer retention risk below the Fortune 500 tier. Smaller
      enterprises in the $500M-$1B revenue segment show lower satisfaction and higher churn risk. project44 must invest
      in guided onboarding and low-code connectors to close this gap before FourKites uses the 4.4 vs. 4.2 Gartner
      satisfaction differential as an account-winning argument.
    calloutType: risk
    claimRefs:
      - C200
      - C183
      - C182
