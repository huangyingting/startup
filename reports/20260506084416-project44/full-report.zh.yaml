  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与核心产品
        blocks:
          - type: paragraph
            body: >-
              project44 的 Movement 平台是一个 API 优先、云原生供应链可视性平台，由五个主要模块组成——Real-Time Visibility、Predictive
              Intelligence、Exception Management、Supply Chain Intelligence 和 Developer Platform——全部构建在统一数据层之上
              [CE001]。平台数据架构每年通过 AWS 云原生微服务处理约 1 billion+ 个可视性事件，使用 Apache Kafka 进行实时事件流处理，并用时间序列数据库做历史分析
              [CE011]。这一现代架构支持公路货运的亚秒级追踪更新，也让 AI 模型可用最新承运商表现数据持续再训练。


              承运商数据摄取按承运商技术成熟度分三种方式——现代承运商使用 REST API，传统承运商使用旧式 EDI X12/EDIFACT，实时公路 GPS 使用 IoT 车联网 [CE002]。平台原生集成 SAP
              ERP、Oracle TMS、Blue Yonder TMS 和 Manhattan Associates WMS，按安装基数覆盖约 80% 的企业 TMS/ERP 市场 [CE018]。开发者平台包括带
              150+ 个文档化端点的 REST API v4、Python/Java/JavaScript SDK，以及用于集成测试的沙盒环境 [CE008]。G2 开发者评价给 API 文档 3.9/5
              分，指出复杂集成代码示例和旧式 EDI 迁移支持存在缺口 [CE010]。


              平台 Exception Management 模块用基于 ML 的异常检测，自动分类扰动根因（承运商延误、港口拥堵、天气、海关）并生成解决动作，使供应链管理从被动追踪转为主动应对
              [CE019]。制药解决方案在平台上叠加 IoT 温度监控和 DSCSA 序列化事件追踪，服务冷链和专科药合规 [CE020]。
