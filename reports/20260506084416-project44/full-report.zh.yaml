      - number: '7.4'
        title: 附录图表
        blocks:
          - type: callout
            title: ERP 原生商品化是概率最高的战略风险
            body: >-
              Gartner 预计 SAP LBN 到 2026 将在 SAP 标准化企业内覆盖 70%+ 的 RTTVP 功能，这是 project44 最可信的长期战略风险。应对手段是 project44 的 AI
              驱动供应链智能和跨客户基准比较；二者打开的能力差距，SAP/Oracle 若没有相当的多客户数据网络规模，很难复制。该风险需要通过 Gartner MQ 位置和 SAP 功能同等性跟踪持续监控。
            calloutType: risk
