      - number: '2.4'
        title: 展示要点
        blocks:
          - type: callout
            title: FDA DSCSA 合规是近期需求催化剂
            body: >-
              FDA 的 Drug Supply Chain Security Act 序列化要求于 2024 年 11 月全面生效，在制药行业为供应链可视性平台带来一波集中的监管驱动采购。project44 的
              Movement 平台具备多式联运追踪和深厚承运商网络，能够较好承接由这一合规要求推动的制药企业合同；一旦要求落地，这类需求不会消失。
            calloutType: insight
            claimRefs:
              - CM007
              - CM025
          - type: callout
            title: TMS 原生集成是最主要的长期市场风险
            body: >-
              SAP、Oracle 和 Blue Yonder 可能把原生实时可视性集成进各自 TMS 平台，从而消除独立可视性层的必要性——这是供应链可视性平台市场增速面临的首要结构性威胁。project44 的
              1,300+ 承运商网络提供了 TMS 厂商难以复制的数据护城河，但 5-7 年维度内的风险真实存在，必须持续跟踪。
            calloutType: risk
            claimRefs:
              - CM031
              - CM017
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              实时供应链可视性平台市场呈寡头竞争格局，project44 和 FourKites 共同领先，Descartes Systems 是上市公司挑战者，SAP/Oracle 则从 ERP 层构成结构性威胁
              [CP001]。Gartner 2024 年 Magic Quadrant 将 project44 和 FourKites 均列为领导者；project44 在执行能力上排名更高，FourKites
              则在愿景完整性上领先 [CP002]。Forrester Wave 给出相反视角——将 FourKites 评为领导者，将 project44 评为强劲表现者，并指出其用户体验存在缺口 [CP025]。


              project44 的承运商网络覆盖 1,300+ 家承运商和经纪商，而 FourKites 估计为 1,000+，这是最可见的差异化——网络广度形成数据飞轮，随着时间推移强化 AI 模型质量
              [CP011][CP034]。不过，FourKites 在 Gartner Peer Insights 上评分更高（4.4/5 vs. 4.2/5），说明网络深度本身无法完全弥补客户体验缺口
              [CP003][CP029]。


              上市公司竞争对手 Descartes 通过多次收购拼出一个碎片化产品组合，覆盖可视性以及海关、合规和路径规划——这与 project44 的一体化平台打法不同；Descartes 可视性产品估计贡献其
              $600M+ 收入基数中的 $80-120M 子板块 [CP004][CP032]。Blue Yonder、Overhaul 以及专业制药平台共同补齐竞争版图，分别作为行业专用或 TMS 集成型替代方案
              [CP007][CP017]。
