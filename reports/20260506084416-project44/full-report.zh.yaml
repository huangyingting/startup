  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础与企业牵引力
        blocks:
          - type: paragraph
            body: >-
              project44 服务 1,200+ 家企业客户，覆盖 180+ 个国家和 1,300+ 家承运商；客户基础包含多个行业垂直领域的 Fortune 500 头部标识
              [CU001][CU002]。公开具名客户包括 3M（Fortune 100 制造商）、ABInBev（全球 CPG）、Pfizer（制药）、Walmart（全球零售商）和
              Unilever（CPG/消费品）——这些高价值锚定账户验证了平台在不同行业用例中的适用性 [CU002]。Wall Street Journal 2024 年报道独立确认了 project44 Fortune
              500 客户名单质量，证据力度超过公司自写案例研究 [CU018]。


              客户增长轨迹印证 30%+ 收入增长：账户数从 2021 年约 800 个增加到 2024 年 1,200+ 个，增长来自有机新增企业客户，以及 Convey 和 Ocean Insights 收购带来的约
              400+ 个客户 [CU001][CU030]。平台每年处理约 1 billion+ 个货运事件，产生支撑 AI 预测模型和跨客户供应链智能的数据量 [CU014]。


              垂直行业拆分约为 25% CPG/FMCG、20% 零售、15% 制药 / 生命科学、15% 汽车 / 工业，以及 10% 技术 / 电子；制药是增长最快的垂直，受 DSCSA 合规顺风和温控链监测要求驱动
              [CU015][CU026]。按地域看，North America 估计贡献 55-65% 收入，Western Europe 占 25-30%，Asia Pacific 占 10-15%；考虑到 APAC
              占全球制造业 40%+，这里的低渗透尤其值得注意 [CU010][CU020]。
