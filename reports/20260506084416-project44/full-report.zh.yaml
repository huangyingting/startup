      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >-
              2023 年 5 月，project44 经历重大领导层交接：创始人兼 CEO Jett McCandless 卸任，由原董事会成员 Lucas Mansfield 接任 [CO002]。McCandless 在
              8 年内把 project44 从 Chicago 物流数据初创公司做成 $2.7B 独角兽，确立了承运商网络战略和关键企业客户关系
              [CO027]。创始人离任是一个明确的负面事件——在高速增长阶段，McCandless 是公司的核心客户关系锚点；创始人主导的 B2B 公司一旦换帅，执行连续性风险会上升 [CO015]。


              Lucas Mansfield 带着企业 SaaS 规模化经验接任 CEO，也获得董事会和成长型股权投资人的支持，负责管理下一阶段扩张 [CO002][CO003]。董事会包括 IVP（Institutional
              Venture Partners）、Goldman Sachs 和其他机构投资人代表，为公司提供财务监督和战略指导 [CO010]。领导团队中，CTO 负责 Movement 平台架构和 AI
              路线图，首席营收官负责全球企业销售 [CO004]。
            claimRefs: []
