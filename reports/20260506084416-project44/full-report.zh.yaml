        title: 客户扩张与风险模式
        blocks:
          - type: paragraph
            body: >-
              最常见的扩张模式包括多式联运扩张（新增海运或最后一公里）、地理扩张（扩展至更多区域）和模块扩张（新增 Supply Chain Intelligence）；每次扩张估计可把 ACV 提高 30-100%
              [CU011]。2024 年 9 月推出的 SCI 模块主要被部署第 2-3 年的成熟大型企业账户采用，说明随着客户基础成熟，自然会出现扩张收入机会 [CU022]。


