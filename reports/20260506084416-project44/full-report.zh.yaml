              按当前轨迹，2022 年 $2.7B 估值对应 2024 年 ARR 的 12-13x，处于供应链 SaaS 上市可比公司倍数上沿 [CI022][CI033]。Bessemer 基准显示，30%+ 增长的供应链
              SaaS 公司 ARR 倍数为 8-15x，支持 $2.7B 账面估值处于区间顶部 [CI033]。不过，2022 年估值形成于私募市场倍数峰值；在二级市场交易中，基于当前公开市场可比公司，公允价值估计更可能是
