companyProfile:
  summary: >
    project44 是领先的供应链可视性平台，在 180+ 个国家把 1,300+ 家承运商、175,000+ 家运输服务商与企业货主连接起来。公司由 Jett McCandless 于 2014 年在 Chicago
    创立，靠直接接入承运商 API、EDI 系统和 IoT 设备，搭建出全球最完整的货运追踪网络。其 Movement 平台覆盖整车、LTL、海运、空运、包裹和铁路等所有运输方式，提供实时运输可视性（RTTVP）。Lucas
    Mansfield 于 2023 年 5 月接任 CEO，接替创始人 McCandless，重点推动公司走向盈利和 IPO 准备状态。
