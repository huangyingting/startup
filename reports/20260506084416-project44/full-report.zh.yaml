      - number: '5.2'
        title: AI 与智能能力
        blocks:
          - type: paragraph
            body: >-
              project44 最重要的技术差异化是 AI 预测 ETA 模型。它采用双层架构——基础模型基于承运商特定历史表现训练，情境模型纳入实时信号（天气、港口拥堵、运力），生成概率化 ETA 窗口
              [CE021]。公司称 ETA 准确度相比静态承运商 ETA 提升 40%；FreightWaves 独立分析在高量公路货运线路上验证了这一说法，同时指出新兴市场和稀疏数据线路的准确度较低
              [CE003][CE004]。


              2024 年 9 月推出的 Supply Chain Intelligence（SCI）AI 套件，是从追踪向战略智能的一次重要产品扩张——新增 Predictive Disruption Risk
              评分、Lane Performance Benchmarking（跨客户汇总）和 Carrier Scorecard AI
              [CE012][CE023]。跨客户智能架构汇总所有平台客户的匿名货运数据，生成线路级基准；单个客户仅靠自身数据无法得出这类基准——这是独特的网络效应数据产品
              [CE015]。这项能力正在成为更强的竞争护城河，因为它需要网络规模才能生成统计显著的基准；没有可比客户覆盖的小型竞争对手难以复制 [CE015]。


              2024-2025 年路线图优先三件事——扩展 AI 驱动的 Supply Chain Intelligence、在 Southeast Asia 和 Latin America 扩大多式联运承运商覆盖，以及增强
              GraphQL API 能力以支持实时数据流集成 [CE007]。新的 Southeast Asian 承运商集成（2024 年 50+ 个）扩展了平台在亚洲制造枢纽采购全球企业的地理覆盖 [CE023]。
