  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入与增长画像
        blocks:
          - type: paragraph
            body: >-
              基于 CEO Lucas Mansfield 披露的增长率以及 PitchBook、FreightWaves 分析师估计，project44 估计 FY2024 收入为 $210M+，同比增长 30%+
              [CI001][CI002]。收入构成主要是来自企业货主的 SaaS 订阅费（估计占收入 80-85%，ACV 为 $250K-$2M+），约 15-20% 来自承运商为高级 API 访问层支付的承运商连接费
              [CI006][CI007]。按运输方式拆分，公路货运占 55-65%，海运货运占 20-25%（受 Ocean Insights 收购加速），最后一公里占 10-15%（来自 Convey
              收购）[CI024]。这种多式联运收入多元化降低了单一运输方式集中风险，也让 project44 成为全球企业货主可获得的覆盖最广的纯供应链可视性平台。


              Wall Street Journal 2024 年报道以独立第三方口径验证了 project44 的增长轨迹，补充了 CEO 层面的披露 [CI026]。收入增长部分来自现有企业账户内的
              land-and-expand 有机扩张，部分来自 Convey（2021 年）和 Ocean Insights（2022 年）两笔收购，每笔收购估计贡献 $15-25M 增量 ARR
              [CI014]。企业合同通常为 2-3 年，并带年度量级递增条款，形成可预测的经常性收入基数和内置扩张机制 [CI016]。大型企业货主若使用多式联运可视性、异常管理和 Supply Chain
              Intelligence 全套模块，单客户全平台采用价值每年可达 $2M+ [CI017]。


              30%+ 增速明显跑赢 Descartes 7% 有机增长和更广义供应链 SaaS 约 15% 的中位数，验证了 project44 纯平台增长模型以及从多产品在位厂商手中夺取份额的能力
              [CI008]。这一增长溢价是 project44 相对上市可比公司享有更高收入倍数的主要依据。不过，缺乏经审计财务报表意味着 30%+
              增长估计基于公司披露和分析师验证，而不是独立审计数据——这是严谨财务承销中的重大限制 [CI035]。
