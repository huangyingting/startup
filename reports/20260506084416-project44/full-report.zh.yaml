      - number: '2.3'
        title: 市场约束与负面因素
        blocks:
          - type: paragraph
            body: >-
              供应链可视性采用的首要市场约束是集成复杂度——60%+ 的未采用企业把接入承运商 API、传统 EDI 系统和 ERP 平台的技术负担列为主要障碍 [CM021][CM033]。没有专门企业 IT
              资源的中型市场公司最难承担这类集成负担，这解释了为什么 Fortune 100 采用率（80%+）远高于 Fortune 500-1000 采用率（30-40%）[CM014]。


              市场面临来自 TMS 平台厂商（SAP、Oracle、Blue Yonder）的长期结构性风险：这些厂商正在把原生可视性能力集成进自身平台。如果可视性从独立平台变成标准 TMS 功能，市场会被商品化，并压缩
              project44 当前能获得的溢价 [CM031]。不过，project44 的 1,300+ 承运商网络广度仍是差异化，TMS 厂商很难只靠内部开发复制。市场整合正在加速——Descartes
              已完成多笔收购，SAP/Oracle 也在投资原生可视性——意味着独立平台溢价窗口可能在 5-7 年维度内收窄 [CM017][CM022]。WTO 数据显示全球贸易量仅增长
              2.7-3.3%，这确认可视性市场增长来自技术采用率，而不是底层贸易扩张 [CM022]。市场也呈现双速采用格局：Fortune 100 公司在推动 AI 原生预测平台，Fortune 500-1000
              买家仍主要评估承运商网络广度和 ERP 集成便利度——这为 project44 提供自然的市场分层机会，可用适当分层的产品同时拿下高端和中端市场 [CM023]。


              Federal Reserve 工业生产数据显示，2024 年美国制造业产能利用率为 77-78%，说明增长环境温和，足以支撑供应链效率 IT 稳定投资，但缺少 2020-2022 年危机期那种急迫性
              [CM036]。需求驱动因素正常化之后，供应链可视性厂商必须靠产品差异化和 ROI 证明竞争，而不能再依赖 COVID 后采用浪潮中的紧迫性销售 [CM033]。
