          - type: callout
            title: 信息真空风险需要主动加码透明度
            body: >-
              CEO 过渡、3+ 年融资空窗和财务披露缺位叠加，形成「信息真空」，让外部很难独立判断 project44 的财务健康度。缺少
              NRR、毛利率或盈利能力指标，投资者和客户只能依赖第三方分析师估算。project44 应主动披露关键 SaaS 指标（NRR、Rule of 40 得分），以降低投资者不确定性，并在竞争场景中预先堵住
              FourKites 利用信息差的空间。
