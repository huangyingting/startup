      - number: '1.3'
        title: 融资历史与规模指标
        blocks:
          - type: paragraph
            body: >-
              project44 在 2022 年 2 月完成由 Goldman Sachs 领投的 $420M Series F 轮融资，估值 $2.7B，成为第一家达到这一里程碑的供应链可视性平台
              [CO003][CO029]。从 Series A 到 Series F，累计融资约 $698M+，投资人包括 Goldman Sachs、IVP、Emergence Capital、Sapphire
              Ventures 和战略物流投资人 [CO004]。Series F 资金用于全球扩张承运商网络覆盖、加速 AI 驱动预测分析产品开发，并寻找收购标的以补齐运输方式覆盖缺口（Ocean Insights 于
              2022 年 9 月被收购）[CO012]。


              截至 2024 年，基于 FreightWaves 和 Modern Shipper 等第三方行业分析师估计，project44 收入约 $210M+（较 2023 年约 $160M 同比增长
              30%+）[CO005]。2023 年 CEO 交接之后，公司在 Series F 后阶段仍保持这条收入轨迹，说明业务模型和平台经济性对领导层变化具备韧性 [CO022]。全球员工约 900 人，办公室位于
              Chicago（总部）、Amsterdam、Atlanta、London、Paris 和 Bangalore [CO006]。


              2022 年 2 月 $2.7B 的 Series F 估值仍是最后一个公开确认的融资参考点；截至 2026 年 5 月，公司未宣布后续股权融资 [CO019]。PitchBook 确认公司截至 2024
              年仍保持独角兽状态，未发现下调轮证据 [CO019]。在 3+ 年（2022-2025 年）没有新融资的情况下仍保持 30%+ 增长和估计 $210M 收入基数，说明公司可能正接近现金流盈亏平衡或盈利——这与最终
              IPO 或战略退出路径一致 [CO024]。收入增长受益于 COVID 后企业供应链数字化这一结构性宏观顺风；大型跨国公司越来越把物流服务商的实时可视性作为标准供应链运营要求 [CO028]。
