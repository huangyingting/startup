        title: 客户满意度与留存
        blocks:
          - type: paragraph
            body: >-
              Gartner Peer Insights 基于 127+ 条已验证客户评论，给 project44 评分 4.2/5，并在 RTTVP 品类授予 Customers' Choice 认可 [CU005]。G2
              基于 200+ 条评论给公司约 4.1/5，优势在承运商网络广度和异常管理 [CU006]。Supply Chain Dive 对 Gartner 评分的分析确认了这一评分，但指出与
