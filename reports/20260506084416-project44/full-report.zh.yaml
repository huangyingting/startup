      - number: '7.3'
        title: 战略与执行风险
        blocks:
          - type: paragraph
            body: >-
              project44 最重大的战略风险是 ERP 原生功能商品化——Gartner 预计，到 2026，SAP LBN 将在 SAP 标准化企业内覆盖 70%+ 的 RTTVP 功能，可能压缩 SAP
              密集垂直行业中独立可视化的可服务市场 [CR007]。CEO 从创始人 Jett McCandless 交棒给 Lucas Mansfield（May 2023），仍是执行风险——Mansfield 第一年实现
              30%+ 收入增长且未出现领导层离职，部分缓和风险；但 McCandless 9 年积累的承运商关系资本，可能需要 3+ 年才能完全复制 [CR008][CR009]。


              3+ 年融资空窗释放的是模糊的财务风险信号——要么公司接近盈亏平衡（正向），要么无法按 $2.7B 账面估值融资（反向）；它又叠加 CEO 过渡和财务披露缺位，形成「信息真空风险」，让独立评估变得困难
              [CR010][CR037]。Goldman Sachs 的基金生命周期可能制造委托代理压力，推动公司按基金周期而非公司准备度安排 IPO 或 M&A 退出 [CR011]。FourKites
              竞争性续约风险（4.4 vs 4.2 满意度差距）在 FY2025 中端市场账户续约中很尖锐 [CR016]。向拉丁美洲和东南亚扩张，因承运商集成复杂、现有关系有限而带来执行风险 [CR023]。否决条件包括
              SAP/Oracle 客户装机基础切换 >30%、收入增速放缓 >15%，或到 2026 仍无法以 $2.7B+ 融资 [CR025][CR036]。
