  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              project44 最重大的监管风险集中在数据隐私——尤其是 GDPR（EU）、CCPA（California）和 China PIPL。三套规则叠加，约束平台在 180+ 个国家处理货运和承运商数据的跨境流转
              [CR001][CR029]。GDPR 第 44-49 条要求 EU 个人数据传往美国时使用标准合同条款，这让 project44 的 EU 运营长期背负法律合规成本；EDPB 关于 SCCs 的 2024
              更新指南已进一步收紧合规要求 [CR001][CR027]。China PIPL 对 project44
              的海运可视化产品构成特定风险——中国承运商和港口数据一旦涉及大规模个人数据跨境传输，可能触发跨境安全评估要求 [CR002][CR028]。DLA Piper
              将物流平台列为多法域隐私义务高风险行业；GDPR、CCPA 与 PIPL 叠加后，合规复杂度预计会吃掉 3-5% 的工程资源 [CR029][CR039]。


              从法律诉讼看，CourtListener 检索没有发现 2022-2024 期间 project44 面临重大专利诉讼或重大法律行动——诉讼记录干净 [CR005]。反垄断风险为低到中等——project44
              估计 20-25% RTTVP 市占率，低于 DOJ 对平台加强审查的 40%+ 门槛 [CR017]。海关部门开始要求准确贸易数据后，出口管制和海关合规成为新风险，但 project44 当前暴露看起来可控
              [CR033]。CCPA 合规适用于 California 居民物流数据，因为个人信息的宽泛定义包括运输记录中的姓名和地址 [CR030]。project44 持有 SOC 2 Type II、ISO 27001
              和 GDPR 合规认证，并为 EU 数据传输使用标准合同条款；公司还落地年度 GDPR 审计计划，为 EU 客户提供 EU 区域 AWS 数据驻留 [CR021][CR026]。
