chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与平台概览
        blocks:
          - type: paragraph
            body: >-
              project44 是一家总部位于 Chicago 的物流科技公司，由 Jett McCandless 于 2014 年创立，搭建全球最大的实时供应链可视性网络。公司旗舰产品 Movement
              平台为企业货主提供实时货运追踪、预测 ETA 计算和异常管理，覆盖海运、空运、铁路和卡车等主要运输方式 [CO007][CO008]。平台接入 180+ 个国家的 1,300+
              家承运商和经纪商，网络规模是公司最主要的竞争护城河 [CO008]。


              project44 的 Movement 平台采用 API 优先设计，架构中立，可连接承运商 API、EDI 数据流、IoT 传感器数据和港务局信息，形成统一的货运数据层 [CO025]。平台 AI
              能力集中在预测 ETA 技术——利用承运商历史履约数据、天气信号和实时拥堵信息，相比传统承运商提供的 ETA，最多可把到达时间准确度提升 40%
              [CO017]。企业客户认为异常管理价值最高：平台可主动提示延误、港口拥堵和承运商表现不佳，估计可减少 30-50% 的人工供应链分析工作 [CO031]。


              Gartner 在 2024 年 Real-Time Transportation Visibility Platforms Magic Quadrant 中将 project44
              评为领导者，确认其在这个由其参与定义的品类中处于市场领先位置 [CO009]。平台服务 1,200+ 个企业账户，覆盖 CPG、汽车、制药和零售等行业，标杆客户包括 3M、AB
              InBev、Pfizer、Walmart 和 Unilever [CO016][CO030]。
