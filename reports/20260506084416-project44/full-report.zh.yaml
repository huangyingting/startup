      - number: '8.4'
        title: 附录图表
        blocks:
          - type: callout
            title: 二级市场折价下有条件买入——承运商网络护城河支撑入场
            body: >-
              project44 的 1,300+ 承运商网络护城河、30%+ 增速和 Fortune 500 客户基础，为按二级市场价格 $1.8-2.2B 给出有条件买入建议提供可信基础。相对 $2.7B 账面估值的
              19-33% 折价，已合理反映私有市场流动性不足和信息风险。乐观情景是 SAP 以 $4-6B 收购，相对悲观情景的 $1.5-2.0B 下调估值融资提供不对称上行。关键条件：承诺完整仓位前，必须拿到经审计的
              NRR 和毛利率。
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV032
              - CV010
          - type: callout
            title: ERP 商品化是投资论点最大的长期风险
            body: >-
              Gartner 预计 SAP LBN 到 2026 将在 SAP 标准化企业内覆盖 70%+ 的 RTTVP 功能，这是投资论点面临的最严重结构性威胁。project44 的 AI Supply Chain
              Intelligence 能力（单一供应商平台无法复制的跨客户基准比较）和承运商网络深度，部分缓和该风险。但仍需按季度监控 SAP LBN 功能发布，以及任何企业客户将 SAP LBN 作为 project44
              替代方案的决策。
            calloutType: risk
            claimRefs:
              - CV009
              - CV007
              - CV011
