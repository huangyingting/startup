              2023 年 5 月，创始人 Jett McCandless 离任 CEO，是 project44 近年最重要的负面事件。McCandless 在高速增长阶段是公司的核心客户关系构建者和外部布道者。Lucas
              Mansfield 具备企业 SaaS 规模化经验，但在领导层交接期维持文化动能和客户信任，本身就有风险。
            calloutType: risk
