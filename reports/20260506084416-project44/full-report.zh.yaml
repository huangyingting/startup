      - number: '7.2'
        title: 运营与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              project44 的网络安全风险很高——平台握有 1,200+ 家企业客户的供应链数据（路线、承运商定价、供应商关系、库存水平）；一旦数据泄露，极其敏感的专有商业情报会暴露，很可能引发企业客户流失和监管调查
              [CR003][CR032]。CISA 2024 框架将拥有广泛企业访问权限的 SaaS 平台列为高风险实体，要求零信任架构和持续安全监控 [CR004]。project44 的 SOC 2 Type II 和
              ISO 27001 认证提供合规背书，但 AWS 共担责任模型意味着 project44 仍负责应用层安全——任何认证都无法消除泄露风险 [CR026][CR035]。


              承运商 API 依赖是首要运营脆弱点——1,300+ 个承运商集成意味着，只要某家承运商修改 API 结构或撤销访问权限，所有使用该承运商的货主都会遇到数据质量下降 [CR006]。1,300+
              家承运商之间的数据质量差异，会制造误报异常告警风险，侵蚀客户对 AI 准确性的信任 [CR018]。AWS 单一云依赖带来基础设施风险，不过 AWS 的 99.99% 正常运行时间以及 project44 在
              2024 的 99.9%+ SLA 记录，缓和了近端担忧 [CR012]。2024 未公开报告重大平台宕机或数据泄露，事件记录保持干净 [CR020]。
