      - number: '5.3'
        title: 产品质量、缺口与风险
        blocks:
          - type: paragraph
            body: >-
              project44 拥有 SOC 2 Type II、ISO 27001 和 GDPR 合规认证，并接受年度第三方审计，满足企业采购要求 [CE006]。平台 2024 年可用性达到
              99.9%+，未公开报告重大事故；少数承运商特定数据缺口均在 SLA 时限内解决 [CE024]。数据质量标准对承运商数据设置最低刷新率门槛——公路货运优先低于 60
              分钟，低于门槛的承运商会在客户仪表盘中用置信分标记 [CE022]。


              最重要的产品缺口是实施复杂度——典型企业上线需要 3-6 个月完成初始集成，再用 3-6 个月优化，比 FourKites 更简单的上线流程更重 [CE014][CE025]。这是 Gartner Peer
              Insights 和 G2 评论中被提及最多的弱点，也造成了 4.2/5 vs. FourKites 4.4/5 的满意度差距 [CE010]。技术风险包括承运商 API schema 变化、1,300+
              承运商网络内的数据质量差异，以及跨境货运中 GDPR 和海关数据合规 [CE016]。由于海运依赖 AIS 船舶追踪（2-4 小时更新），粒度低于公路货运的实时 GPS 车联网 [CE013]。
