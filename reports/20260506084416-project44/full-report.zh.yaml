              project44 估计毛利率为 65-75%，低于纯 SaaS 基准，原因是承运商集成基础设施成本较高；上市可比公司 Descartes 毛利率为 75-78%
              [CI010]。基于增长轨迹和客户基数扩张模式，NRR 估计为 115-125% [CI015]。参照 SaaS Capital 的物流 SaaS 基准，客户获取成本回收期估计为 24-36 个月
