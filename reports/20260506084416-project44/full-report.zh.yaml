  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与规模
        blocks:
          - type: paragraph
            body: >-
              实时供应链可视性平台全球市场 2024 年估计为 $7.6B，到 2028 年将增至 $18.2B；不同分析师定义口径下，CAGR 为 15-24% [CM001][CM028]。Gartner 更窄的
              RTTVP 品类定义把 2024 年软件市场估为约 $3.1B，聚焦带 AI 预测分析的多式联运追踪平台 [CM002]。更广义的供应链管理技术市场（包括 TMS、WMS、计划和可视性）2024 年约
              $24B，CAGR 为 14-16%；其中可视性平台占企业供应链 IT 支出的 8-12%，相对其运营关键性仍明显渗透不足 [CM013]。


              供应链可视性内部的关键子市场包括最后一公里配送可视性（全球 $12B，18% CAGR，聚焦 B2C）和海运货运可视性（$2.4B，随 Red Sea
              危机后需求激增而增长）[CM010][CM011]。project44 的 TAM 是完整的 $7.6B+ 全球市场；其 SAM 约 $4.2B，聚焦具备复杂多式联运需求的大型企业货主
              [CM003][CM004]。在 $210M ARR 水平，project44 已拿下约 5% 的 SAM——后续增长仍有大量空白空间 [CM004]。
