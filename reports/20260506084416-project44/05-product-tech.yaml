sections:
  - id: SEC501
    title: Platform Architecture and Core Product
    body: >-
      project44's Movement platform is an API-first, cloud-native supply chain visibility platform comprising five
      primary modules — Real-Time Visibility, Predictive Intelligence, Exception Management, Supply Chain Intelligence,
      and the Developer Platform — all built on a unified data layer [CE001]. The platform's data architecture processes
      approximately 1 billion+ visibility events annually through AWS cloud-native microservices, using Apache Kafka for
      real-time event streaming and time-series databases for historical analytics [CE011]. This modern architecture
      enables sub-second tracking updates for road freight and enables the AI models to be continuously retrained on
      fresh carrier performance data.


      Carrier data ingestion uses three methods depending on carrier technical maturity — REST API for modern carriers,
      legacy EDI X12/EDIFACT for traditional carriers, and IoT telematics for real-time road GPS [CE002]. The platform
      natively integrates with SAP ERP, Oracle TMS, Blue Yonder TMS, and Manhattan Associates WMS, covering
      approximately 80% of the enterprise TMS/ERP market by install base [CE018]. The developer platform includes REST
      API v4 with 150+ documented endpoints, Python/Java/JavaScript SDKs, and a sandbox environment for integration
      testing [CE008]. G2 developer reviews rate API documentation at 3.9/5, citing gaps in code examples for complex
      integrations and legacy EDI migration support [CE010].


      The platform's exception management module uses ML-based anomaly detection to automatically classify disruption
      root causes (carrier delay, port congestion, weather, customs) and generate resolution actions, enabling proactive
      supply chain management rather than reactive tracking [CE019]. The pharmaceutical solution extends the platform
      with IoT temperature monitoring and DSCSA serialization event tracking for cold chain and specialty pharma
      compliance [CE020].
  - id: SEC502
    title: AI and Intelligence Capabilities
    body: >-
      project44's most significant technology differentiator is its AI predictive ETA model, which uses a two-layer
      architecture — a base model trained on carrier-specific historical performance and a contextual model
      incorporating real-time signals (weather, port congestion, capacity) to generate probabilistic ETA windows
      [CE021]. The company claims 40% ETA accuracy improvement vs. static carrier ETAs; FreightWaves' independent
      analysis validated this claim for high-volume road freight lanes while noting accuracy is lower for emerging
      markets and sparse-data lanes [CE003][CE004].


      The September 2024 launch of the Supply Chain Intelligence (SCI) AI suite represents a significant product
      expansion beyond tracking into strategic intelligence — adding Predictive Disruption Risk scoring, Lane
      Performance Benchmarking (cross-customer aggregated), and Carrier Scorecard AI [CE012][CE023]. The cross-customer
      intelligence architecture aggregates anonymized shipment data across all platform customers to generate lane-level
      benchmarks that individual customers cannot derive from their own data alone — a unique network effect data
      product [CE015]. This capability represents a growing competitive moat because it requires network scale to
      generate statistically significant benchmarks, making it irreplicable by smaller competitors without comparable
      customer coverage [CE015].


      The 2024-2025 roadmap prioritizes three themes — AI-powered Supply Chain Intelligence expansion, multi-modal
      carrier coverage growth in Southeast Asia and Latin America, and enhanced GraphQL API capabilities for real-time
      data streaming integration [CE007]. New Southeast Asian carrier integrations (50+ in 2024) extend the platform's
      geographic coverage for global enterprises sourcing from Asian manufacturing hubs [CE023].
  - id: SEC503
    title: Product Quality, Gaps, and Risk
    body: >-
      project44 holds SOC 2 Type II, ISO 27001, and GDPR compliance certifications with annual third-party audits,
      meeting enterprise procurement requirements [CE006]. The platform achieved 99.9%+ uptime in 2024 with no major
      publicly reported incidents; minor carrier-specific data gaps were resolved within SLA timelines [CE024]. Data
      quality standards require minimum refresh rate thresholds for carrier data — road freight at sub-60-minute
      preferred, with confidence scores flagging below-threshold carriers in customer dashboards [CE022].


      The most significant product gap is implementation complexity — a typical enterprise onboarding requires 3-6
      months for initial integration and another 3-6 months for optimization, making the product more demanding to
      deploy than FourKites' simpler onboarding [CE014][CE025]. This complexity is the most-cited weakness in Gartner
      Peer Insights and G2 reviews and contributes to the 4.2/5 vs FourKites' 4.4/5 satisfaction gap [CE010]. Technology
      risks include carrier API schema changes, data quality variance across the 1,300+ carrier network, and regulatory
      compliance for GDPR and customs data in cross-border shipments [CE016]. Ocean freight visibility data is less
      granular than road freight due to AIS-based vessel tracking (2-4 hour updates) vs. real-time GPS telematics for
      road [CE013].
