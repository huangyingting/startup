callouts:
  - title: Cross-Customer Intelligence Is an Underappreciated Durable Moat
    body: >-
      The September 2024 launch of the Supply Chain Intelligence AI suite marks project44's evolution from a tracking
      utility to a strategic intelligence platform. The cross-customer benchmarking module — aggregating anonymized
      shipment data across 1,200+ enterprise customers — creates a unique data network effect. No single-customer
      analytics platform can replicate lane-level benchmarks derived from multi-shipper data. This positions project44
      to expand its value proposition from operational tracking to strategic procurement and carrier management
      intelligence, potentially increasing ACV per customer significantly.
    calloutType: strength
    claimRefs:
      - CE015
      - CE012
  - title: Implementation Complexity Is the Primary Product Risk to Net Retention
    body: >-
      The most consistent product gap across Gartner Peer Insights and G2 reviews is implementation complexity — 3-6
      month initial setup and another 3-6 months to optimize. This creates two risks — slower land velocity for new
      enterprise accounts and higher churn risk for customers who fail to complete full implementation within the
      contract term. project44 must invest in low-code connectors and guided onboarding to reduce implementation time
      and close the experience gap with FourKites.
    calloutType: risk
    claimRefs:
      - CE014
      - CE025
