  claims:
    - id: CE001
      statement: >-
        project44's Movement platform is an API-first, cloud-native supply chain visibility platform with five primary
        product modules — Real-Time Visibility, Predictive Intelligence, Exception Management, Supply Chain
        Intelligence, and the Developer Platform — all accessible through a unified data layer.
      type: observed
      topic: movement-platform-modules
      sourceRefs:
        - SE001
        - SE002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
      contradictsClaimRefs: []
    - id: CE002
      statement: >-
        The Movement platform ingests carrier data from 1,300+ carriers through three primary integration methods — REST
        API (preferred), legacy EDI X12/EDIFACT (for older carriers), and IoT telematics (for road freight real-time
        location) — with each method providing different latency and data granularity characteristics.
      type: observed
      topic: data-ingestion-architecture
      sourceRefs:
        - SE001
        - SE003
        - SE004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE002
      contradictsClaimRefs: []
    - id: CE003
      statement: >-
        project44 claims its AI predictive ETA model achieves 40% improvement in estimated time of arrival accuracy vs.
        static carrier-provided ETAs, with the model trained on historical shipment data from 1,300+ carriers
        representing billions of historical tracking events.
      type: company-claimed
      topic: ai-eta-accuracy-claim
      sourceRefs:
        - SE005
        - SE006
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QE003
        - QE021
      contradictsClaimRefs: []
    - id: CE004
      statement: >-
        FreightWaves' independent analysis of project44's 40% ETA improvement claim found the figure is credible for
        road freight lanes with high carrier data density but overstated for lanes with sparse historical data —
        accuracy improvement is highest for established high-volume lanes and lower for emerging markets or infrequent
        lanes.
      type: third-party-reported
      topic: ai-eta-independent-validation
      sourceRefs:
        - SE006
        - SE018
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE003
      contradictsClaimRefs: []
    - id: CE005
      statement: >-
        project44's primary enterprise use case workflow covers the full freight lifecycle — from carrier booking
        confirmation (TMS integration), to in-transit real-time tracking (carrier API/EDI/IoT), exception management (AI
        alert generation), delivery confirmation, and post-delivery analytics and benchmarking.
