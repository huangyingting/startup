  - number: '8.3'
    title: Credit, operational, and security risk
    blocks:
    - type: callout
      title: Opportunity
      body: Financing strength, marquee customers, and workflow breadth are meaningful mitigants if internal disclosure confirms economic quality. [C015][C016][C021][C022][C024][C025][C041]
