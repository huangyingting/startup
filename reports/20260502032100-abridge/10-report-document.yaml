- number: 8
  title: Risk & Regulatory
  sections:
  - number: '8.1'
    title: Risk overview
    blocks:
    - type: callout
      title: Risk Alert
      body: Commercial traction lowers product risk, but it does not eliminate security, governance, financial-opacity, and denominator-consistency risk. [C021][C022][C023][C024][C025][C039]
