    title: Bull, base, and bear cases
    blocks:
    - type: paragraph
      title: Bull, base, and bear cases
      body: |
        The bull case is a workflow-infrastructure outcome in which clinician documentation becomes the land motion and nursing, revenue cycle, payer workflows, and CDS become the expansion engine. The base case is that Abridge is strategically excellent but still under-disclosed, so conviction cannot outrun evidence. The bear case is not product irrelevance; it is that the public narrative overstates economic quality relative to what revenue, retention, or concentration data would eventually show. That is why scenario analysis changes recommendation confidence more than it changes admiration for the product. [C007][C017][C020][C021][C022][C024][C025][C032][C033][C039][C040][C044]
