    title: Valuation framework
    blocks:
    - type: callout
      title: Risk Alert
      body: Reported private valuation markers exist, but the public evidence pack cannot determine whether those marks are attractive, fair, or stretched. [C017][C039][C040]
      calloutType: risk-alert
