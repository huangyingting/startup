sections:
- number: '1.1'
  title: Verified identity
  body: Abridge’s own materials consistently present the company as an enterprise-grade AI platform for clinical conversations rather than a narrow note-taking app. The platform narrative emphasizes clinically useful, billable, and auditable outputs and now clearly extends into nursing, revenue cycle, and clinical decision support. [C001][C007][C008][C009]
  claimRefs:
  - C001
  - C007
  - C008
  - C009
- number: '1.2'
  title: Startup introduction
  body: The clearest opening frame is that Abridge was founded in 2018 by Shiv Rao and Zack Lipton, started in Pittsburgh, and now operates with a San Francisco HQ presentation and a New York builder-hub narrative while still retaining visible Pittsburgh roots. [C002][C003][C005]
  claimRefs:
  - C002
  - C003
  - C005
- number: '1.3'
  title: Product and platform evolution
  body: Abridge evolved from a patient-facing conversation product into enterprise clinical documentation and then into a broader workflow stack spanning nursing, coding, prior authorization, and evidence-based decision support. Epic integration and the Contextual Reasoning Engine are central to that shift. [C011][C012][C007][C009][C020][C032][C033]
  claimRefs:
  - C011
  - C012
  - C007
  - C009
  - C020
  - C032
  - C033
- number: '1.4'
  title: Scale, customers, and funding status
  body: Public evidence shows rapid commercial expansion across marquee health systems such as Duke, Mayo, UPMC, UCHealth, Inova, and WVU, alongside increasingly large financing rounds from Series B through Series E. The core caution is that company materials use different denominators for deployments, health systems, partners, and conversation volume, so scale should be treated as directional rather than audited. [C015][C016][C021][C022][C024][C025][C029][C030][C040]
  claimRefs:
  - C015
  - C016
  - C021
  - C022
  - C024
  - C025
  - C029
  - C030
  - C040
- number: '1.5'
  title: Leadership and investor base
  body: Abridge has added meaningful finance and legal depth around the founder set while assembling a notable investor base that combines healthcare strategics with top-tier AI and growth investors. That mix supports the argument that Abridge is being financed as a category-defining platform, not a point product. [C004][C041]
  claimRefs:
  - C004
  - C041
- number: '1.6'
  title: Open identity and diligence questions
  body: The main unresolved Chapter 1 questions are economic and definitional. Public sources still do not disclose pricing, audited financials, detailed headcount, net revenue retention, or a reconciled cap table, and company-reported scale metrics are not normalized across materials. HQ identity also requires precise confirmation for diligence recordkeeping. [C005][C039][C040]
  claimRefs:
  - C005
  - C039
  - C040
