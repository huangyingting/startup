chapter:
  number: 1
  title: Startup Introduction & Company Snapshot
  summary: Abridge is a late-stage private healthcare AI company that has expanded from ambient clinical note capture into a broader clinical-conversation platform spanning clinicians, nursing, revenue cycle, and decision support. Public evidence strongly supports enterprise deployment breadth and financing momentum, but public disclosures remain weak on pricing, audited financials, and independently standardized scale metrics. [C001][C007][C016][C040]
startupIntroduction:
  summary: Abridge is a clinician-founded healthcare AI company founded in 2018 that turns patient-clinician conversations into structured documentation and increasingly into real-time workflow intelligence for clinicians, nurses, revenue cycle teams, and clinical decision support. The company now presents San Francisco as HQ while retaining visible Pittsburgh roots, sells primarily to U.S. health systems through deep EHR integrations, and has disclosed funding rounds of $12.5M, $30M, $150M, $250M, and $300M through June 2025, with company-posted summaries of third-party coverage referencing a roughly $5.3B valuation. [C002][C005][C006][C007][C012][C013][C014][C015][C016][C017]
  foundedDate: null
  foundedYear: 2018
  founders:
  - name: Shiv Rao, MD
    role: Co-founder and CEO
    background: Practicing cardiologist and clinician-founder. [C003][C038]
    claimRefs:
    - C003
    - C038
  - name: Zack Lipton, PhD
    role: Co-founder and CTO
    background: Machine learning researcher and technical co-founder. [C003]
    claimRefs:
    - C003
  foundingLocation: Pittsburgh, Pennsylvania
  headquarters: San Francisco, California
  website: https://www.abridge.com
  productSummary: Abridge builds enterprise AI for clinical conversations, with product surfaces for clinician note generation, nursing documentation, revenue-cycle intelligence, and contextual clinical decision support. [C001][C007][C009][C033]
  customerFocus: Large and complex U.S. health systems, their clinicians, nurses, and adjacent revenue-cycle teams. [C006][C023][C044]
  businessModel: Enterprise software/platform contracts sold to health systems through direct sales and workflow integrations; public pricing is not disclosed. [C006]
  stage: Late-stage private
  fundingStatus: Series E announced in June 2025; company-posted summaries of third-party coverage referenced a roughly $5.3B valuation. [C016][C017]
