    - Abridge 现已提供护理文档，并宣布了与 Epic Workshop 关联的护理产品；Mayo 也与 Epic 和 Abridge 在护理领域合作。[C007][C020][C022]
    - 这将平台扩展到第二个大型照护团队席位，并增强工作流黏性。
    - 观察到。
  - - 收入周期工作流
    - 产品页面现已包含收入周期，且与 Availity 的合作将 Abridge 扩展到事前授权和支付方—服务方工作流。[C007][C032][C044]
