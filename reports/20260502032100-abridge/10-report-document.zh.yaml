  type: unit-economics-waterfall
  layout: wide
  summary: 公开证据能触及融资、部署和客户 ROI 锚点，但在计算供应商单位经济模型所需的定价、成本、留存和销售效率桥接信息之前便中断。[C006][C015][C016][C026][C031][C039][C040]
  data:
    items:
