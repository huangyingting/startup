- id: T703
  title: 信用、运营、安全与竞争风险缓释摘要
  columns:
  - 风险来源
  - 有证据支撑的缓释项
  - 残余风险
  - 投资含义
  rows:
  - - Capital-access and credit risk
    - Abridge raised $250M in February 2025 and $300M in June 2025 and has backing from major AI and growth investors. [C015][C016][C041]
    - Public cash-burn, revenue, and runway remain unknown. [C039]
    - Near-term insolvency looks less likely than underwriting error on valuation and efficiency.
  - - Enterprise implementation risk
    - Duke, Mayo, UPMC, and UCHealth show that Abridge can deploy and expand in large systems. [C021][C022][C024][C025]
    - The model is still likely integration-heavy and operationally demanding. [C006][C020][C042]
    - Execution risk is moderate but manageable if services burden and go-live cycles are controlled.
  - - Security and trust risk
    - Abridge publishes BAA/privacy controls and grounds outputs with Linked Evidence. [C008][C010]
    - Independent validation is not in the retained set, and real-world control performance remains unproven here.
    - Security diligence is a gating item, not a post-investment clean-up item.
  - - Competitive risk
    - Product breadth, Epic-linked distribution, and KLAS leadership strengthen positioning. [C007][C020][C035][C044]
    - Pricing power and renewal durability are still unproven publicly. [C039]
    - Competitive risk is acceptable only if internal cohort data confirms expansion and retention.
  notes: 残余风险仍然显著，因为主要阻碍在于披露和证据质量缺口，而非缺乏客户牵引。
