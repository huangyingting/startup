- id: T401
  title: 收入模型概览与收入流
  columns:
  - 收入流
  - 有证据支撑的打包方式或接触面
  - 公开货币化证据
  - 收入质量与保留项
  - 主张基础
  rows:
  - - 核心环境文档合同
    - Abridge 向医疗系统工作流销售环境临床文档，并已在 Duke、Mayo、UPMC、UCHealth 及其他大型系统中公开部署。[C001][C006][C021][C022][C023][C024][C025]
    - 公开定价和合同结构未披露。[C039]
    - 该收入流高度可信，但 ASP、实施费用和续约经济性并不公开。
    - 观察与推断混合。
  - - 护理文档模块
    - Abridge 拥有独立的护理文档接触面，包括与 Mayo Clinic 和 Epic 的合作，Abridge for Nurses 也在 2025 年获得 TIME 认可。[C007][C020][C022][C036]
    - 未披露公开的独立模块定价或席位经济性。[C039]
    - 这很可能是附加或扩张型收入流，但货币化机制仍未验证。
    - 观察到产品接触面；货币化为推断。
  - - 收入周期与事前授权工作流
    - Abridge 与 Availity 的合作将平台扩展到事前授权以及支付方—服务方收入周期工作流。[C007][C032][C044]
    - Riverside 报告称，更完整的文档使每次就诊记录的 wRVU 提高 11%，HCC 诊断记录提高 14%。[C031]
    - 扩张潜力很明确，但公开的抽成率、模块定价和支付方工作流收入结构均缺失。
    - 观察与公司主张混合。
  - - 临床决策支持工作流
    - Abridge 当前已集成 UpToDate，并宣布引入 NEJM Group 和 JAMA Network 内容，用于工作流中的情境化证据。[C007][C033]
    - 公司还公布了其 CDS 评估在 1000+ 个案例中达到 99.5% 安全结果。[C034]
    - CDS 可增强黏性和钱包份额，但没有独立定价或采用量的公开数据。
    - 观察与公司主张混合。
  - - 企业级全面扩张与席位增长
    - Duke 的 5000 名临床医生、Mayo 的约 2000 名临床医生、UPMC 的 12000 名临床医生以及 UCHealth 的 2300+ 名提供者等大规模部署，暗示大型账户内部存在 land-and-expand 经济性。[C021][C022][C024][C025]
    - 公开披露止步于部署规模；未展示席位定价、ACV 提升或模块附加率。[C039]
    - 扩张动作清晰可见，但每名已部署临床医生对应的单位收入仍未知。
    - 观察到部署；收入经济性为推断。
  notes: 公开证据支持存在多个货币化接触面，但未披露收入结构、定价架构或渠道经济性。
