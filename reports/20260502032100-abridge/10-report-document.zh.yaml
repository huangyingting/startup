      body: 仅凭保留的公开证据，前瞻性财务情景并不具备可辩护性。最低限度的尽调资料包应包括按模块划分的确认收入、合同价值分布、实施与托管成本结构、按产品族划分的毛利率、按细分市场划分的 CAC 与回本期、按队列划分的 NRR 与流失，以及部署数、企业级医疗系统数与合作伙伴数之间的统一口径说明。在此之前，财务结论只能是：商业牵引似乎真实存在，但单位经济质量证据薄弱。[C015][C016][C018][C019][C039][C040]
