  - 有证据支撑的状态
  - 评分
  - 缺失证明
  rows:
  - - Customer proof
    - Named deployments and large rollouts are unusually strong for a private company. [C021][C022][C023][C024][C025]
    - 4 / 5
    - Need portfolio churn, concentration, and renewal data. [C039]
  - - Product breadth
    - The platform clearly extends beyond documentation into nursing, revenue cycle, and CDS. [C007][C032][C033][C044]
    - 4 / 5
    - Need attach-rate and monetization evidence by module. [C039]
  - - Market credibility
    - KLAS leadership plus marquee customer logos support strong buyer credibility. [C023][C035]
    - 4 / 5
    - Need independent benchmark data on win rates and pricing.
  - - Financial transparency
    - Public financial disclosure is sparse. [C017][C039]
    - 1 / 5
    - Need audited revenue, gross margin, deferred revenue, and cap-table clarity.
  - - Predictability and retention
    - Expansion signals are visible, but NRR and portfolio retention are not public. [C021][C022][C024][C025][C039]
    - 2 / 5
    - Need cohort renewal, contraction, and top-customer trends.
  - - Governance and trust disclosure
    - Baseline compliance and safety claims are visible, but the retained set is still company-led. [C010][C034]
    - 2 / 5
    - Need security, governance, and post-deployment monitoring evidence.
  - - Overall IPO readiness
    - Strategically impressive, operationally plausible, but financially under-disclosed. [C017][C035][C039]
    - 2 / 5
    - Need public-company-grade disclosure discipline before an IPO-readiness claim would be credible.
  notes: 这些分数是分析师基于保留证据质量作出的判断，而非外部报告评级。
