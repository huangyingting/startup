      detail: Abridge 看起来是在向医疗系统销售企业工作流软件，并已在多家大型系统中实现具名部署。[C006][C021][C022][C023][C024][C025]
      tone: positive
    - label: 已知规模锚点
      detail: 管理层在 2025 年 2 月披露超过 100 次部署，并在 2025 年 6 月披露超过 150 家企业级医疗系统，尽管后续口径出现变化。[C015][C016][C018][C019][C040]
      tone: positive
    - label: 已知客户价值锚点
      detail: 客户案例研究提到文档效率提升、倦怠降低，以及 Riverside 案例中的 wRVU 和 HCC 捕获改善。[C027][C028][C029][C030][C031]
      tone: positive
    - label: 缺失定价桥接
      detail: 公开来源未披露 ACV、席位定价、实施费用或模块附加经济性。[C039]
