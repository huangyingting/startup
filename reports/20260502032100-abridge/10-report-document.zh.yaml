- id: F702
  title: 风险向承保影响的传导图
  type: risk-transmission-map
  layout: wide
  summary: Abridge 的核心传导链条是：受监管工作流扩张与公开披露不完整，会演变为采购摩擦、模型治理负担、承保不确定性，并最终导致较低信心的投资建议。[C009][C010][C017][C020][C032][C033][C034][C039][C040][C044]
  data:
    nodes:
    - id: n1
      label: 受监管工作流扩张
      detail: Abridge 正从文档扩展到事前授权和情境化临床决策支持。[C032][C033][C044]
      tone: risk
    - id: n2
      label: 公司主导的信任证据
      detail: HIPAA、加密、BAA 和隐私控制均可见，但保留证据仍主要由公司自行披露。[C010]
      tone: risk
    - id: n3
      label: 财务披露不完整
      detail: 公开材料未披露经审计收入、定价、NRR 或统一后的股权结构表。[C017][C039]
      tone: critical
    - id: n4
      label: 规模口径冲突
      detail: 公开指标在部署数、医疗系统数、合作伙伴数和预测对话量之间切换。[C018][C019][C040]
      tone: risk
    - id: n5
      label: 采购与法务审查摩擦
      detail: 若信任资料包不完整，受监管工作流和 PHI 处理会拖慢企业采购周期。
      tone: risk
    - id: n6
