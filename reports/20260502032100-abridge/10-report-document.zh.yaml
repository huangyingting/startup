startupIntroduction:
  summary: Abridge 是一家由临床医生创立的医疗 AI 公司，成立于 2018 年，致力于将医患对话转化为结构化文档，并日益扩展为面向临床医生、护士、收入周期团队和临床决策支持的实时工作流智能。公司目前将旧金山作为总部对外呈现，同时仍保留明显的匹兹堡根基，主要通过深度 EHR 集成向美国医疗系统销售产品；截至 2025 年 6 月，公司已披露 $12.5M、$30M、$150M、$250M 和 $300M 融资轮次，且公司发布的第三方报道摘要提及其估值约为 $5.3B。[C002][C005][C006][C007][C012][C013][C014][C015][C016][C017]
