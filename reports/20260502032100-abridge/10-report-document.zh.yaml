    blocks:
    - type: paragraph
      title: IPO 就绪度与可比对象
      body: 在客户验证、市场可信度和产品广度方面，Abridge 已经像是一个具备 IPO 规模的战略故事；但在披露层面，它尚不具备 IPO 就绪度。可比对象问题也类似：保留证据支持将其与更广泛的工作流软件和替代类别做战略比较，但不足以支撑严格的公私可比倍数分析。换言之，公司或许值得溢价叙事，但当前证据包仍不足以支持精确的溢价定价判断。[C017][C020][C021][C022][C023][C024][C025][C032][C033][C035][C039][C044]
