      body: 综合风险判断为显著。Abridge 具备真实的商业实力：在大型医疗系统中的可见部署、超越笔记捕捉的产品广度、与 Epic 相关的深度集成，以及来自 KLAS 的外部类目验证。但这些优势旁边，是合规证明、财务披露、留存透明度和口径一致性方面的重大尽调缺口。因此，这不是一个需求疲弱的故事，而是一个需求强劲但承保证据不完整的故事。[C007][C020][C021][C022][C024][C025][C035][C039][C040][C044]
