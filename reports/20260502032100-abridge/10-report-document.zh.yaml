    - type: paragraph
      title: 估值框架
      body: 正确的估值方法层级应是：第一，仅将私募轮次锚点作为方向性标记；第二，请求真实的 ARR、毛利率、NRR 和集中度数据，以进行收入倍数三角校验；第三，在利润率和现金流证据存在之后，再保留 DCF 类工作。仅基于公开材料的尽调可以说明存在溢价估值标记，但无法判断其是有吸引力、公允还是偏高。根据该 schema 的证据规则，估值立场因此应保持 unknown，而非凭空猜测。[C015][C016][C017][C039][C040]
