- id: T806
  title: 止损触发条件与终止标准
  columns:
  - 触发条件
  - 证据锚点
  - 为何重要
  - 行动
  rows:
  - - 管理层在尽调期间无法提供经审计或董事会级的收入、毛利率、NRR 和集中度数据
    - 公开证据已表明这些内容缺失。[C039]
    - 没有这些输入，投资者无法判断高溢价的私募估值标记是否合理。[C017][C039]
    - 维持 research-more 或放弃
  - - 安全与合规尽调无法证实已发布的 HIPAA、BAA、加密和治理主张
    - 当前保留的基线是一套由公司主张的控制包。[C010]
    - 若此处存在重大不匹配，将破坏对一款高度依赖 PHI 的工作流产品的信任。
    - 避免投资
  - - 规模口径统一后发现部署或使用质量显著弱于公开材料暗示的水平
    - 公开规模指标在部署数、医疗系统数、合作伙伴数和预测对话量之间本就不一致。[C018][C019][C040]
    - 若统一后的质量明显更弱，增长和估值叙事都将受损。
    - 避免投资
  - - 核心文档之外的扩张在战略上流于表面或在经济上并不重要
    - 上行情景依赖护理、收入周期、事前授权和 CDS 扩张。[C007][C032][C033][C044]
    - 若附加率薄弱，Abridge 将重新趋近于单点解决方案画像。
    - 下调为 track
  - - 入场价格默认采用已报道的 $5.3B 标记，但没有相应披露质量作为补偿
    - 存在第三方报道的估值标记，但不存在公允价值证据。[C017][C039]
    - 在缺乏经济透明度的情况下支付溢价，会产生逆向选择风险。
    - 避免追高
  notes: 这些标准旨在于投资委员会批准之前，阻止基于虚假正面信号形成的错误高信心。
