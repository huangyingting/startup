- number: 9
  title: 投资与估值
  sections:
  - number: '9.1'
    title: 投资论点摘要
    blocks:
    - type: callout
      title: 核心洞察
      body: 战略资产质量是真实存在的：产品广度、与 Epic 相关的分发以及标志性医疗系统验证，支撑了高溢价的战略兴趣。[C020][C021][C022][C024][C025][C035][C044]
