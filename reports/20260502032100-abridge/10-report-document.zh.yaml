- id: T602
  title: 客户案例与部署模式
  columns:
  - 客户
  - 已报告部署或用例
  - 已报告结果
  - 投资者解读
  rows:
  - - Duke Health
    - Abridge 将覆盖 150 多家初级和专科诊所的 5000 名临床医生。[C021]
    - 公开公告强调的是广泛的临床医生可用性，而非狭窄试点。[C021]
    - 是大型企业级部署能力的强有力证明。
  - - Mayo Clinic
    - 2025 年 1 月的扩张从约 2000 名临床医生起步，并建立在 Mayo、Epic 与 Abridge 的护理合作之上。[C022]
    - 既展示了临床医生规模化部署，也展示了超越医生群体的照护团队扩张。[C022]
    - 是向护理场景 land-and-expand 的重要证据。
  - - UPMC
    - UPMC 在 2025 年 10 月表示，正将 Abridge 在企业范围内扩展至 12000 名临床医生。[C024]
    - 其企业级部署规模是账本中最强的公开部署锚点之一。[C024]
    - 是超大型系统标准化潜力的高置信度证明。
  - - UCHealth
    - UCHealth 在 2026 年 2 月表示，正将 Abridge 快速扩展至 2300+ 名提供者。[C025]
    - 确认了初始采用后的持续扩张动能。[C025]
    - 支持规模化扩张的可重复性。
  - - Akron Children’s
    - 近 200 名儿科医生在 22 个专科中使用 Abridge，生成了超过 75000 条笔记。[C026]
    - 该案例研究报告了 95% 留存率。[C026]
    - 是有用的留存信号，但仍只是单一队列且由公司报告。
  - - CHRISTUS Health
    - 企业部署强调了临床医生工作流改进。[C023][C027]
    - CHRISTUS 报告称认知负荷下降 78%、倦怠下降 40%，并在 8 天内完成实施。[C027]
    - 若可复制，这是很强的价值实现速度与临床体验证明。
  - - Corewell Health
    - Abridge 将覆盖 21 家医院和 300+ 个地点的 4000 名医生和 APP。[C028]
    - 试点结果显示认知负荷下降 61%，下班后工作减少 48%。[C028]
    - 表明在分布式医疗网络中具备良好的工作流价值信号。
  - - Inova
    - Inova 的案例研究覆盖 9400+ 名临床医生、4M+ 年访问量，以及在 Abridge 上线的 40+ 个专科。[C029]
    - 据称，初级保健的“睡衣时间”文档工作从最多两小时降至约 25 分钟。[C029]
    - 表明大型系统采用，同时带来显著的临床医生时间节省。
  - - WVU Medicine
    - WVU 报告称，拥有 4000+ 名临床医生、年末约 1500 名已配置用户，以及 1000+ 名至少录音一次的临床医生。[C030]
    - 据称，下班后文档时间下降了 52%。[C030]
    - 是激活和工作流影响的有用证据，尽管并非续约指标。
  - - Riverside Health
    - Riverside 将更完整的文档与改善收入敏感工作流联系起来。[C031]
    - 报告称每次就诊记录的 wRVU 提高 11%，HCC 诊断记录提高 14%。[C031]
    - 表明文档价值可扩展到在经济上有意义的下游用例。
  notes: 案例研究强力支持采用和工作流价值，但大多数结果由客户提供，不能替代队列层面的留存披露。
