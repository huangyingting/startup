    rows:
      - - Marquee academic and IDN customers
        - Duke Health, Mayo Clinic, UPMC, UCHealth, Johns Hopkins Medicine, UChicago Medicine, UNC Health, UCI Health, Yale New Haven Health, and others are named in the retained evidence. [C021][C022][C023][C024][C025]
