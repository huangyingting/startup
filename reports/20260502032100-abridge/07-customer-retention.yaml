  - id: T603
    title: Retention, churn, and satisfaction disclosure scorecard
    columns:
      - Metric
      - Public value
      - Disclosure status
      - What can still be inferred
      - Exact diligence ask
    rows:
      - - Gross retention
        - null
        - Not publicly disclosed
        - Portfolio renewal behavior cannot be quantified from retained public evidence. [C039]
        - Request gross retention by customer cohort, go-live year, and module family.
      - - Net revenue retention
        - null
        - Not publicly disclosed
        - Large-account expansion is visible, but actual net expansion rate is unknown. [C021][C022][C024][C025][C039]
        - Request NRR by top-20 accounts, module attach cohort, and care-setting cohort.
      - - Logo churn
        - null
        - Not publicly disclosed
        - Named customer proof exists, but logo loss and contraction drivers are unreported. [C039]
        - Request logo churn by segment, implementation path, and reason code.
      - - Cohort retention signal
        - 95% retention at Akron Children’s
        - Public single-case disclosure
        - Positive signal for one pediatric cohort, but not generalizable to the full customer base. [C026]
        - Request portfolio retention plus top-10 cohort comparisons to Akron.
      - - Time-to-value / onboarding signal
        - 8-day implementation at CHRISTUS
        - Public single-case disclosure
        - Suggests fast onboarding is possible, but not yet a standardized implementation benchmark. [C027]
        - Request median time to go-live and implementation-resource requirements by health-system size.
      - - Satisfaction and workflow-value proxies
        - Case studies report lower cognitive load, lower burnout, less after-hours work, and faster documentation
        - Public proxy only
        - Usefulness is visible, but no portfolio-wide NPS or CSAT is disclosed. [C027][C028][C029][C030][C031]
        - Request NPS, CSAT, clinician-usage frequency, and support-escalation metrics.
    notes: Nulls reflect missing public retention disclosure, not lack of customer proof.
    claimRefs:
