sections:
  - number: '6.1'
    title: Customer base and segmentation
    body: |
      Abridge’s customer evidence is strongest in large U.S. health systems. The retained record includes named deployments or expansions at Duke, Mayo, UPMC, UCHealth, Johns Hopkins Medicine, UChicago Medicine, UNC Health, UCI Health, Yale New Haven Health, Corewell Health, CHRISTUS Health, and others. That breadth is important because it shows Abridge is selling into complex enterprise clinical environments rather than only isolated pilots. [C021][C022][C023][C024][C025]
    claimRefs:
      - C021
      - C022
      - C023
      - C024
      - C025
  - number: '6.2'
    title: Case studies and deployment patterns
    body: |
      The strongest case-study pattern is successful expansion after initial adoption. Duke disclosed 5000 clinicians, Mayo started with about 2000 clinicians and linked Abridge to nursing, UPMC scaled to 12000 clinicians, and UCHealth expanded across 2300+ providers. Additional case studies from Akron, CHRISTUS, Corewell, Inova, WVU, and Riverside show that the product is being used across pediatric, academic, regional, and revenue-sensitive workflows. [C021][C022][C024][C025][C026][C027][C028][C029][C030][C031]
    claimRefs:
      - C021
      - C022
      - C024
      - C025
      - C026
      - C027
      - C028
      - C029
      - C030
      - C031
  - number: '6.3'
    title: Retention, churn, and satisfaction
    body: |
      Public retention disclosure is still the weakest part of the customer chapter. Akron Children’s reported 95% retention, which is encouraging, and multiple case studies report better cognitive load, burnout, after-hours charting, or documentation quality. But no public source discloses company-wide gross retention, NRR, churn, or NPS, so durability remains materially under-evidenced relative to adoption breadth. [C026][C027][C028][C029][C030][C031][C039]
    claimRefs:
      - C026
      - C027
      - C028
      - C029
      - C030
      - C031
      - C039
  - number: '6.4'
    title: Expansion surfaces and diligence asks
    body: |
      The best customer-thesis frame is land, standardize, and expand. Abridge appears to land through clinician documentation, expand to system-wide rollout, then add nursing, revenue-cycle, prior-authorization, and contextual decision-support surfaces. Priority diligence asks are portfolio retention by cohort, module attach rates, top-customer concentration, win-loss data, implementation-resource burden, and standardized customer-satisfaction metrics. Until then, customer acquisition signals look strong while retention evidence remains moderate at best. [C007][C021][C022][C024][C025][C032][C033][C039][C044]
    claimRefs:
      - C007
      - C021
      - C022
      - C024
      - C025
      - C032
      - C033
      - C039
      - C044
