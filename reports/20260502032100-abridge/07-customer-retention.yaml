  - id: T602
    title: Customer case studies and deployment patterns
    columns:
      - Customer
      - Reported deployment or use case
      - Reported outcome
      - Investor readout
    rows:
      - - Duke Health
        - Abridge would be available to 5000 clinicians across more than 150 primary and specialty clinics. [C021]
        - Public announcement emphasized broad clinician availability rather than a narrow pilot. [C021]
        - Strong proof of large-scale enterprise rollout capacity.
      - - Mayo Clinic
        - January 2025 expansion started with about 2000 clinicians and built on a nursing collaboration with Epic and Abridge. [C022]
        - Demonstrates both clinician-scale rollout and care-team expansion beyond physicians. [C022]
        - Important evidence for land-and-expand into nursing.
      - - UPMC
        - UPMC said in October 2025 that it was scaling Abridge enterprise-wide to 12000 clinicians. [C024]
        - Enterprise-wide rollout size is among the strongest public deployment anchors in the ledger. [C024]
        - High-confidence proof of standardization potential in a very large system.
      - - UCHealth
        - UCHealth said in February 2026 that it was rapidly expanding Abridge across 2300+ providers. [C025]
        - Confirms continued rollout momentum after initial adoption. [C025]
        - Supports repeatability of expansion at scale.
      - - Akron Children’s
        - Nearly 200 pediatricians used Abridge for more than 75000 notes across 22 specialties. [C026]
        - The case study reported 95% retention. [C026]
        - Useful retention signal, but still only one cohort and company-reported.
      - - CHRISTUS Health
        - Enterprise deployment emphasized clinician workflow improvement. [C023][C027]
        - CHRISTUS reported a 78% reduction in cognitive load, a 40% decrease in burnout, and implementation in 8 days. [C027]
        - Strong time-to-value and clinician-experience proof if replicated.
      - - Corewell Health
        - Abridge would be available to 4000 physicians and APPs across 21 hospitals and 300+ locations. [C028]
        - Pilot results reported 61% lower cognitive load and 48% less after-hours work. [C028]
        - Suggests good workflow-value signal across a distributed delivery network.
      - - Inova
        - Inova’s case study covered 9400+ clinicians, 4M+ annual visits, and 40+ specialties live on Abridge. [C029]
        - Primary-care pajama-time documentation reportedly fell from up to two hours to about 25 minutes. [C029]
        - Indicates large-system adoption plus meaningful clinician time savings.
      - - WVU Medicine
        - WVU reported 4000+ clinicians, roughly 1500 provisioned users by year-end, and 1000+ clinicians recording at least once. [C030]
        - After-hours documentation time reportedly fell by 52%. [C030]
        - Useful evidence of activation and workflow impact, though not a renewal metric.
      - - Riverside Health
        - Riverside linked more complete documentation to revenue-sensitive workflow improvement. [C031]
        - Reported 11% better wRVUs and 14% higher HCC diagnoses documented per encounter. [C031]
        - Suggests documentation value can expand into economically meaningful downstream use cases.
    notes: Case studies strongly support adoption and workflow value, but most outcomes are customer-provided and do not replace cohort-level retention reporting.
