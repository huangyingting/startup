company:
  name: Abridge
chapter:
  number: 6
  title: Customer & Retention
  summary: |
    Abridge has strong public customer proof across major U.S. health systems and multiple care settings, with especially credible deployment anchors at Duke, Mayo, UPMC, and UCHealth. Customer case studies also report meaningful workflow and clinician-experience improvements, but portfolio-level retention, churn, NRR, satisfaction, and concentration metrics remain undisclosed, so adoption breadth is strong while durability evidence is still limited. [C021][C022][C023][C024][C025][C026][C027][C028][C029][C030][C031][C039]
callouts:
  - type: key-insight
    title: Enterprise customer proof is unusually visible
    body: |
      Fetched announcements show Abridge deployed or expanding at Duke Health, Mayo Clinic, UPMC, UCHealth, Johns Hopkins Medicine, UChicago Medicine, UNC Health, UCI Health, Yale New Haven Health, Corewell Health, CHRISTUS Health, and others. [C021][C022][C023][C024][C025]
    claimRefs:
      - C021
      - C022
      - C023
      - C024
      - C025
  - type: key-insight
    title: Land-and-expand behavior is visible at marquee accounts
    body: |
      Duke disclosed 5000 clinicians, Mayo started with about 2000 clinicians, UPMC scaled to 12000 clinicians, and UCHealth expanded across 2300+ providers, indicating large-account rollout potential after initial adoption. [C021][C022][C024][C025]
    claimRefs:
      - C021
      - C022
      - C024
      - C025
  - type: opportunity
    title: Customer expansion can move beyond clinicians
    body: |
      The product is expanding from clinician documentation into nursing, revenue cycle, prior authorization, and clinical decision support, creating additional surfaces for account expansion after the initial documentation land. [C007][C022][C032][C033][C044]
    claimRefs:
      - C007
      - C022
      - C032
      - C033
      - C044
  - type: risk-alert
    title: Retention evidence is thin outside isolated case studies
    body: |
      Public materials do not disclose portfolio gross retention, NRR, churn, or NPS; Akron Children’s 95% retention is a useful cohort signal but cannot stand in for company-wide durability metrics. [C026][C039]
    claimRefs:
      - C026
      - C039
