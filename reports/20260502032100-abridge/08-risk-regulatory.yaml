sections:
  - number: '7.1'
    title: Risk overview
    body: |
      The net risk judgment is significant. Abridge has real commercial strength: visible rollouts in major health systems, product breadth beyond note capture, Epic-linked integration depth, and external category validation through KLAS. But those positives sit next to material diligence gaps in compliance proof, financial disclosure, retention transparency, and denominator consistency. This is therefore not a story of weak demand; it is a story of strong demand with incomplete underwriting evidence. [C007][C020][C021][C022][C024][C025][C035][C039][C040][C044]
    claimRefs:
      - C007
      - C020
      - C021
      - C022
      - C024
      - C025
      - C035
      - C039
      - C040
      - C044
  - number: '7.2'
    title: Regulatory and legal risk
    body: |
      Abridge’s legal and regulatory exposure rises as it moves deeper into sensitive clinical and payer workflows. The company does publish HIPAA, BAA, privacy, encryption, and U.S.-data-center claims, which is necessary for enterprise procurement. It is also extending into prior authorization and contextual decision support, where governance, auditability, and workflow accountability matter more than in simple note capture. The concern is not that the retained record proves non-compliance; it is that the retained proof is still largely company-led, while the workflow surface is becoming more regulated and more consequential. [C010][C032][C033][C034][C044]
    claimRefs:
      - C010
      - C032
      - C033
      - C034
      - C044
  - number: '7.3'
    title: Credit, operational, and security risk
    body: |
      Credit risk in the narrow solvency sense appears moderated by Abridge’s 2025 financing strength and investor base. The larger issue is financial-durability opacity: public evidence does not disclose revenue, pricing, NRR, gross margin, or a reconciled cap table, so investors cannot test whether rapid deployment growth is also high-quality growth. Operational risk is meaningful because deep EHR embedment and large-account rollouts can create implementation and support burden. Security risk remains a top diligence gate because the company processes highly sensitive clinical data and current control evidence is still management-led. [C010][C015][C016][C020][C021][C022][C024][C025][C039][C041][C042]
    claimRefs:
      - C010
      - C015
      - C016
      - C020
      - C021
      - C022
      - C024
      - C025
      - C039
      - C041
      - C042
  - number: '7.4'
    title: Competitive risk
    body: |
      Competitive risk is less about whether Abridge has a wedge and more about whether it can convert that wedge into durable workflow control. The company’s current strengths are breadth across documentation, nursing, revenue cycle, and CDS; Epic-linked distribution; and visible customer proof. The risk is that broader ambition widens the number of substitutes and incumbent workflows it must displace, while public data still does not show pricing power, attach rates, or retention durability. KLAS recognition helps, but it does not replace cohort economics. [C007][C020][C032][C033][C035][C039][C044]
    claimRefs:
      - C007
      - C020
      - C032
      - C033
      - C035
      - C039
      - C044
  - number: '7.5'
    title: Mitigation summary and diligence gates
    body: |
      The strongest mitigants are visible customer standardization, repeat deployment success, product grounding through Linked Evidence, financing access, and deep integration with existing health-system workflows. Those strengths justify continued diligence. They do not justify skipping the hard gates: independent security review, financial and retention disclosure, denominator reconciliation, and evidence that newer surfaces such as revenue cycle and CDS are becoming monetizable rather than just strategically attractive. Until those gates close, risk should be carried as significant. [C008][C015][C016][C020][C021][C022][C024][C025][C032][C033][C039][C040][C041]
