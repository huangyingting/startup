  - id: T702
    title: Regulatory, legal, and trust-risk detail
    columns:
      - Exposure
      - Evidence-backed trigger
      - Current read
      - Diligence ask
    rows:
      - - HIPAA, privacy, and PHI handling
        - Abridge publicly claims HIPAA-compliant operation, U.S.-based data centers, encryption, a BAA, and a privacy policy. [C010]
        - Necessary baseline controls are visible, but the current evidence set is still management-led rather than independently audited.
        - Request security architecture, external audit history, incident reporting, subprocessor list, and customer security-review outcomes.
      - - Clinical decision support governance
        - Abridge is moving into CDS, grounding outputs with evidence integrations and publishing a 99.5% safety result from a company evaluation. [C033][C034]
        - Strategically attractive, but clinical-governance burden rises as the product moves closer to decision support.
        - Request real-world eval design, exception-handling process, clinician override logging, and post-deployment safety monitoring.
      - - Revenue-cycle and payer workflow expansion
        - Availity extends Abridge into prior authorization and broader payer-provider workflows. [C032][C044]
        - This can expand wallet share, but it also creates additional workflow, contracting, and data-governance complexity.
        - Request module-specific regulatory review, payer-data boundaries, and implementation ownership model.
      - - Disclosure and claim normalization
        - Abridge’s public scale metrics switch between deployments, health systems, partners, and projected conversations. [C018][C019][C040]
        - The issue is not fraud evidence in the retained set; it is underwriting ambiguity created by non-standardized denominators.
        - Request a management-certified metric bridge reconciling every published scale claim to one denominator set.
    notes: This table focuses on exposure themes that can directly slow procurement, increase legal review, or weaken trust.
    claimRefs:
      - C010
      - C018
      - C019
      - C032
      - C033
      - C034
      - C040
      - C044
  - id: T703
    title: Credit, operational, security, and competitive mitigation summary
    columns:
      - Risk source
      - Evidence-backed mitigation
      - Residual risk
      - Investment implication
    rows:
      - - Capital-access and credit risk
        - Abridge raised $250M in February 2025 and $300M in June 2025 and has backing from major AI and growth investors. [C015][C016][C041]
        - Public cash-burn, revenue, and runway remain unknown. [C039]
        - Near-term insolvency looks less likely than underwriting error on valuation and efficiency.
      - - Enterprise implementation risk
        - Duke, Mayo, UPMC, and UCHealth show that Abridge can deploy and expand in large systems. [C021][C022][C024][C025]
        - The model is still likely integration-heavy and operationally demanding. [C006][C020][C042]
        - Execution risk is moderate but manageable if services burden and go-live cycles are controlled.
      - - Security and trust risk
        - Abridge publishes BAA/privacy controls and grounds outputs with Linked Evidence. [C008][C010]
        - Independent validation is not in the retained set, and real-world control performance remains unproven here.
        - Security diligence is a gating item, not a post-investment clean-up item.
      - - Competitive risk
        - Product breadth, Epic-linked distribution, and KLAS leadership strengthen positioning. [C007][C020][C035][C044]
        - Pricing power and renewal durability are still unproven publicly. [C039]
        - Competitive risk is acceptable only if internal cohort data confirms expansion and retention.
    notes: Residual risk remains meaningful because the main blockers are disclosure and proof-quality gaps rather than absence of customer traction.
