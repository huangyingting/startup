topStrengths:
- 在 Duke、Mayo、UPMC、UCHealth 及其他大型系统中拥有标志性企业客户验证。
- 产品广度现已覆盖临床医生文档、护理、收入周期和情境化 CDS。
- 与 Epic 相关的嵌入能力和持续获得 KLAS 认可，支撑其类目领导地位。
- 2025 年大额融资和强大的投资者阵容降低了短期资本获取风险。
topRisks:
- 公开 ARR、定价、毛利率、NRR 和客户集中度数据尚未披露。
- 在保留记录中，安全、合规和 CDS 安全性证据仍高度由公司主导。
- 公开规模指标在部署数、系统数、合作伙伴数和对话量之间使用了不一致的分母口径。
- 若无管理层数据室中的经济性材料，无法判断估值标记是否合理。
unresolvedGaps:
- 需要经审计或董事会级的收入、毛利率和现金消耗可见性。
- 需要按队列提供组合留存、流失、NRR 和头部客户集中度。
- 需要独立的安全/合规审查和生产监控证据。
- 需要统一部署数、企业级医疗系统数、合作伙伴数和对话量主张之间的口径。
