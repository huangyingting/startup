topStrengths:
- Marquee enterprise customer proof across Duke, Mayo, UPMC, UCHealth, and other major systems.
- Product breadth now spans clinician documentation, nursing, revenue cycle, and contextual CDS.
- Epic-linked embedment and repeat KLAS recognition support category leadership.
- Large 2025 financings and strong investor roster reduce near-term capital-access risk.
topRisks:
- Public ARR, pricing, gross margin, NRR, and concentration data are not disclosed.
- Security, compliance, and CDS safety evidence is still heavily company-led in the retained record.
- Public scale metrics use inconsistent denominators across deployments, systems, partners, and conversations.
- Valuation markers cannot be judged without management data-room economics.
unresolvedGaps:
- Audited or board-level revenue, gross margin, and cash-burn visibility.
- Portfolio retention, churn, NRR, and top-customer concentration by cohort.
- Independent security/compliance review and production monitoring evidence.
- Reconciliation of deployments, enterprise health systems, partners, and conversation-volume claims.
