sections:
  - number: '4.1'
    title: Revenue model overview
    body: |
      The most defensible revenue-model view is that Abridge sells enterprise workflow software to health systems, using ambient clinician documentation as the initial land motion and then expanding into nursing, revenue cycle, and clinical decision support. That product breadth is directly evidenced, but public sources do not disclose pricing, packaging, or channel mix, so revenue-stream sizing should remain qualitative. [C006][C007][C032][C033][C039][C044]
    claimRefs:
      - C006
      - C007
      - C032
      - C033
      - C039
      - C044
  - number: '4.2'
    title: Reported metrics versus estimates
    body: |
      Reported and estimated metrics must be kept separate. Observed disclosures include financing rounds of $12.5M, $30M, and $150M through 2024. Company-claimed disclosures add the $250M Series D, $300M Series E, more than 100 deployments in February 2025, and more than 150 enterprise health systems in June 2025. Customer-reported metrics such as Akron’s 95% retention and Riverside’s wRVU and HCC improvements are useful demand signals, but they are not substitutes for vendor financial reporting. [C012][C013][C014][C015][C016][C026][C031]
    claimRefs:
      - C012
      - C013
      - C014
      - C015
      - C016
      - C026
      - C031
  - number: '4.3'
    title: Unit economics assessment
    body: |
      Publicly retained evidence is insufficient to compute CAC, LTV, LTV/CAC, CAC payback, or gross margin. The evidence trail reaches enterprise deployments, financing, and customer workflow outcomes, then stops before pricing, implementation cost, support cost, cohort retention, and sales-efficiency disclosures. These metrics should remain null in the diligence model until management provides board-level or audited data. [C006][C026][C031][C039]
    claimRefs:
      - C006
      - C026
      - C031
      - C039
  - number: '4.4'
    title: Margin trajectory
    body: |
      Margin trajectory is not publicly underwritable. Customer ROI suggests Abridge is delivering real workflow value, and product expansion into revenue cycle and CDS could improve wallet share, but no public source shows vendor gross margin, services burden, implementation cost, or support intensity. The prudent view is that economic potential is promising while actual margin profile remains unknown. [C007][C031][C032][C033][C039][C044]
    claimRefs:
      - C007
      - C031
      - C032
      - C033
      - C039
      - C044
  - number: '4.5'
    title: Scenario modeling and diligence asks
    body: |
      Forward financial scenarios are not defensible from retained public evidence alone. The minimum diligence package should include recognized revenue by module, contract value distributions, implementation and hosting cost structure, gross margin by product family, CAC and payback by segment, NRR and churn by cohort, and a reconciliation of deployments versus enterprise health systems versus partners. Until then, the financial verdict is that commercial traction appears real, but unit-economics quality is weakly evidenced. [C015][C016][C018][C019][C039][C040]
    claimRefs:
      - C015
      - C016
      - C018
      - C019
      - C039
      - C040
