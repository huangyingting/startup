chapter:
  number: 2
  title: Market Sizing & Macro Analysis
  summary: Abridge appears to operate in an attractive healthcare workflow-AI market centered on ambient clinical documentation and expanding into nursing, revenue cycle, and clinical decision support, but the retained evidence set does not support a defensible external-dollar TAM. The strongest evidence is enterprise adoption breadth, workflow expansion, and rising conversation-volume claims rather than third-party market-size data. [C007][C015][C016][C018][C019][C032][C033][C042][C044]
callouts:
  - type: key-insight
    title: Evidence supports a broad workflow-AI market lens, not a narrow scribe lens
    body: Abridge’s disclosed product scope now spans clinician documentation, nursing, revenue cycle, and contextual clinical decision support, so the relevant market frame is workflow infrastructure for health systems rather than note generation alone. [C007][C032][C033][C042][C044]
    claimRefs:
      - C007
      - C032
      - C033
      - C042
      - C044
  - type: opportunity
    title: Enterprise adoption signals are strong even without third-party market reports
    body: Abridge disclosed more than 100 health-system deployments in February 2025, more than 150 enterprise health systems in June 2025, and directionally higher 2026 counts, while named customers include large systems such as UPMC, Mayo Clinic, Duke Health, and UCHealth. [C015][C016][C019][C021][C022][C024][C025]
    claimRefs:
      - C015
      - C016
      - C019
      - C021
      - C022
      - C024
      - C025
  - type: risk-alert
    title: Market sizing is evidence-constrained
    body: The retained ledger contains no third-party healthcare-AI market-size study or public Abridge pricing, so TAM/SAM/SOM must be expressed as workflow layers rather than unsupported dollar estimates. [C006][C039]
    claimRefs:
      - C006
      - C039
  - type: key-insight
    title: Growth is being pulled by workflow pain and ROI, not just AI novelty
    body: Customer proofs repeatedly tie adoption to lower burnout, lower cognitive load, faster documentation, and in some cases better coding or revenue capture, indicating the market is being driven by measurable operational pain. [C027][C028][C029][C030][C031]
    claimRefs:
      - C027
      - C028
      - C029
      - C030
      - C031
