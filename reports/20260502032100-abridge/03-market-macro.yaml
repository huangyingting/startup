  - id: T202
    title: Segment analysis and demand signals
    columns:
      - Segment
      - Why demand exists
      - Evidence-backed signal
      - Diligence read
    rows:
      - - Clinician documentation
        - Health systems are buying tools that reduce burnout, lower cognitive load, and generate structured billable notes at the point of care. [C001][C012][C027][C028][C029][C030]
        - Duke said Abridge would be available to 5,000 clinicians, Mayo started with about 2,000 clinicians, UPMC scaled to 12,000 clinicians, and UCHealth expanded across 2,300+ providers. [C021][C022][C024][C025]
        - This is the core and most validated segment for Abridge. [C021][C022][C024][C025]
      - - Nursing documentation
        - Nursing adds a second large care-team seat opportunity and requires workflow-specific product design rather than simple note reuse. [C007][C020][C042]
        - Abridge announced a Mayo Clinic and Epic nursing collaboration, and TIME recognized Abridge for Nurses in 2025. [C022][C036]
        - Nursing looks like a credible adjacent expansion vector with external validation but less deployment detail than core clinician documentation. [C022][C036]
      - - Revenue cycle and prior authorization
        - Revenue-cycle workflow expansion can link documentation quality to coding, HCC capture, and payer interaction. [C007][C031][C032]
        - Abridge’s Availity partnership extends the platform into prior authorization, and Riverside reported better wRVUs and HCC capture from more complete documentation. [C031][C032]
        - This segment could materially expand wallet share if self-reported ROI translates across larger cohorts. [C031][C032]
      - - Clinical decision support
        - Embedded evidence at the point of care increases workflow stickiness and moves Abridge closer to clinical operating system status. [C007][C033][C044]
        - Abridge integrates UpToDate today and announced NEJM Group and JAMA Network content, while publishing a 99.5% safety result across 1,000+ cases for its CDS evaluation. [C033][C034]
        - Strategically important, but current public evidence is earlier and more company-published than the documentation wedge. [C033][C034]
    notes: Segment attractiveness is strongest where the ledger includes both product evidence and named enterprise rollout proof. Nursing, revenue cycle, and CDS are promising adjacencies but are less directly benchmarkable than clinician documentation in the retained set.
