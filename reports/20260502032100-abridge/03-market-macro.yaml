sections:
  - number: '2.1'
    title: Market definition
    body: Abridge should be analyzed within enterprise healthcare workflow AI, with ambient documentation as the initial wedge and nursing, revenue cycle, and contextual clinical decision support as the adjacent expansion surfaces. That broader framing is supported by current product pages and partnership moves, not just management rhetoric. [C007][C032][C033][C042][C044]
    claimRefs:
      - C007
      - C032
      - C033
      - C042
      - C044
  - number: '2.2'
    title: TAM, SAM, and SOM
    body: The ledger does not contain a defensible third-party dollar market-size study, so the right diligence move is to keep TAM/SAM/SOM qualitative. TAM is healthcare workflow AI across multiple care-team surfaces; SAM is the subset of health systems capable of deploying deep EHR-integrated ambient AI; SOM is Abridge’s served footprint, which management described as more than 100 deployments in February 2025 and more than 150 enterprise health systems by June 2025, with higher but inconsistent 2026 counts. [C006][C015][C016][C019][C020][C039][C040][C042]
    claimRefs:
      - C006
      - C015
      - C016
      - C019
      - C020
      - C039
      - C040
      - C042
  - number: '2.3'
    title: Growth drivers
    body: The strongest growth drivers visible in the evidence set are clinician-burnout reduction, lower cognitive load, reduced after-hours charting, and better documentation quality. Enterprise customers also cite downstream workflow benefits such as coding quality and HCC capture, which suggests the category can expand beyond note automation into revenue-sensitive operational workflows. [C027][C028][C029][C030][C031][C032]
    claimRefs:
      - C027
      - C028
      - C029
      - C030
      - C031
      - C032
  - number: '2.4'
    title: Segment attractiveness
    body: Clinician documentation is the most mature and evidenced segment, with marquee rollouts across Duke, Mayo, UPMC, UCHealth, and other major systems. Nursing appears to be the most credible adjacency, while revenue cycle and CDS create larger platform upside but currently rely more heavily on partnership and company-published proof than on broad independent benchmarks. [C021][C022][C023][C024][C025][C032][C033][C036]
    claimRefs:
      - C021
      - C022
      - C023
      - C024
      - C025
      - C032
      - C033
      - C036
  - number: '2.5'
    title: Macro watchpoints
    body: Market attractiveness is damped by evidence quality gaps. Public materials do not disclose pricing, audited financials, or normalized scale denominators, and company materials alternate among deployments, health systems, partners, and conversation forecasts. That limits any attempt to convert adoption proof into precise market-share or monetization estimates. [C006][C018][C019][C039][C040]
    claimRefs:
      - C006
      - C018
      - C019
      - C039
      - C040
