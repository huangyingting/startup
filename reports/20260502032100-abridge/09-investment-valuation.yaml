sections:
  - number: '8.1'
    title: Investment thesis summary
    body: |
      The long thesis is straightforward: Abridge has become more than an ambient documentation company. It now combines strong enterprise proof, Epic-linked embedment, broader workflow ambition, and visible category validation. That combination could support a durable healthcare-workflow platform if management can show that deployments convert into high-quality recurring revenue and cross-module expansion. [C007][C020][C021][C022][C023][C024][C025][C032][C033][C035][C044]
    claimRefs:
      - C007
      - C020
      - C021
      - C022
      - C023
      - C024
      - C025
      - C032
      - C033
      - C035
      - C044
  - number: '8.2'
    title: Bull, base, and bear cases
    body: |
      The bull case is a workflow-infrastructure outcome in which clinician documentation becomes the land motion and nursing, revenue cycle, payer workflows, and CDS become the expansion engine. The base case is that Abridge is strategically excellent but still under-disclosed, so conviction cannot outrun evidence. The bear case is not product irrelevance; it is that the public narrative overstates economic quality relative to what revenue, retention, or concentration data would eventually show. That is why scenario analysis changes recommendation confidence more than it changes admiration for the product. [C007][C017][C020][C021][C022][C024][C025][C032][C033][C039][C040][C044]
    claimRefs:
      - C007
      - C017
      - C020
      - C021
      - C022
      - C024
      - C025
      - C032
      - C033
      - C039
      - C040
      - C044
  - number: '8.3'
    title: IPO readiness and comparables
    body: |
      Abridge already looks like an IPO-scale strategic story on customer proof, market credibility, and product breadth. It does not yet look IPO-ready on disclosure. The comparables problem is similar: the retained evidence supports strategic comparison to broader workflow software and substitute categories, but not a hard public/private peer multiple exercise. In other words, the company may deserve premium framing, yet the current evidence pack still does not justify premium pricing precision. [C017][C020][C021][C022][C023][C024][C025][C032][C033][C035][C039][C044]
    claimRefs:
      - C017
      - C020
      - C021
      - C022
      - C023
      - C024
      - C025
      - C032
      - C033
      - C035
      - C039
      - C044
  - number: '8.4'
    title: Valuation framework
    body: |
      The correct valuation method hierarchy is: first, use private-round anchors only as directional markers; second, request real ARR, gross-margin, NRR, and concentration data for revenue-multiple triangulation; third, reserve DCF-style work for a later stage when margin and cash-flow evidence exists. Public-only diligence can say that premium valuation markers exist, but it cannot say whether they are attractive, fair, or stretched. Under the schema’s evidence rule, valuation stance therefore remains unknown rather than guessed. [C015][C016][C017][C039][C040]
    claimRefs:
      - C015
      - C016
      - C017
      - C039
      - C040
  - number: '8.5'
    title: Final recommendation
    body: |
      Recommendation: research-more. The evidence is strong enough to keep Abridge on the active-investment list and to justify deep partner diligence, but not strong enough to justify a committed premium-price stance. If management can show high-quality recurring revenue, strong cohort retention, manageable implementation economics, and independently support the trust stack, the recommendation could improve quickly. Without that package, the right behavior is disciplined curiosity rather than aggressive bidding. [C010][C017][C021][C022][C024][C025][C035][C039][C040]
    claimRefs:
      - C010
      - C017
      - C021
      - C022
      - C024
      - C025
      - C035
      - C039
      - C040
  - number: '8.6'
    title: Stop-loss triggers and diligence gaps
    body: |
      The kill criteria are explicit: no audited or board-level revenue and retention package, no satisfactory security and compliance substantiation, no clean denominator reconciliation for public scale claims, or evidence that expansion beyond core documentation is strategically shallow. These are not minor follow-ups; they are the exact issues that separate a high-quality AI platform from an expensive but underwritten-light growth story. [C007][C010][C017][C018][C019][C032][C033][C039][C040][C044]
