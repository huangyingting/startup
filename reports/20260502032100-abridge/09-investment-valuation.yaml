      - C022
      - C024
      - C025
      - C032
      - C033
      - C039
      - C040
      - C044
  - id: T806
    title: Stop-loss triggers and kill criteria
    columns:
      - Trigger
      - Evidence anchor
      - Why it matters
      - Action
    rows:
      - - Management cannot provide audited or board-level revenue, gross margin, NRR, and concentration data during diligence
        - Public evidence already shows these are missing. [C039]
        - Without those inputs, investors cannot judge whether the premium private valuation markers are justified. [C017][C039]
        - Maintain research-more or decline
      - - Security and compliance diligence does not substantiate published HIPAA, BAA, encryption, and governance claims
        - The retained baseline is a company-asserted control package. [C010]
        - A material mismatch here would undermine trust in a PHI-heavy workflow product.
        - Avoid
      - - Scale-denominator reconciliation reveals materially weaker deployment or usage quality than public materials imply
        - Public scale metrics are already inconsistent across deployments, health systems, partners, and projected conversations. [C018][C019][C040]
        - If reconciled quality is materially weaker, both growth and valuation narratives degrade.
        - Avoid
      - - Expansion outside core documentation is strategically shallow or economically immaterial
        - The upside case depends on nursing, revenue cycle, prior authorization, and CDS expansion. [C007][C032][C033][C044]
        - Weak attach would narrow Abridge back toward a point-solution profile.
        - Downgrade to track
      - - Entry price assumes the reported $5.3B marker without compensating disclosure quality
        - A third-party-reported valuation marker exists, but fair-value evidence does not. [C017][C039]
        - Paying a premium without economic transparency creates adverse-selection risk.
        - Avoid paying up
    notes: These criteria are designed to stop false-positive conviction before investment committee approval.
    claimRefs:
      - C007
