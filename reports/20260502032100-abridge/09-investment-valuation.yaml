  - id: T804
    title: Public and private comparables evidence ladder
    columns:
      - Comparable lens
      - What is available in retained evidence
      - What it can support
      - Why it is insufficient for hard valuation
    rows:
      - - Abridge private-round anchors
        - Third-party-reported valuation references of roughly $2.75B in February 2025 and $5.3B in June 2025. [C017]
        - Directional last-money framing and evidence that the market awarded a premium private AI multiple.
        - A standalone fair-value opinion cannot rest on round markers without revenue, retention, and margin disclosure. [C039][C040]
      - - Direct public ambient or healthcare-AI peers
        - This run’s retained evidence is not built around peer financial disclosures or head-to-head public multiples.
        - It supports a comparability gap conclusion, not a defensible peer multiple set.
        - Using named public comps here would create false precision relative to the evidence rule. [C039]
      - - Direct private ambient-documentation peers
        - The retained record similarly lacks validated private peer financial disclosures for direct multiple work.
        - It supports caution that market positioning cannot be translated into private-market fair value from this evidence pack alone.
        - Premium-narrative comparison without economics would overstate confidence. [C039]
      - - Adjacent workflow software and substitute categories
        - Abridge is increasingly framed as provider-payer workflow infrastructure with Epic-linked embedment and multi-surface expansion. [C020][C032][C033][C044]
        - This supports a qualitative view that Abridge may deserve a broader strategic lens than a narrow scribe tool.
        - The substitute-category lens still lacks the revenue and margin bridge required for valuation underwriting. [C039]
    notes: The table is intentionally explicit that comparables evidence is insufficient for a precise multiple exercise in this public-only pass.
    claimRefs:
      - C017
      - C020
      - C032
      - C033
      - C039
      - C040
      - C044
  - id: T805
    title: Valuation framework, assumptions, and sensitivity levers
    columns:
      - Method
      - Required inputs
      - Current evidence
      - Core assumptions
      - Sensitivity levers
      - Status
    rows:
      - - Private-round anchoring
        - Latest reliable round amount, share class terms, dilution, and current operating metrics
        - Round amounts are visible and valuation markers are third-party-reported. [C015][C016][C017]
        - Assumes round pricing reflected premium AI demand plus strong deployment momentum.
        - Most sensitive to undisclosed ARR, NRR, margin, and investor-rights terms. [C039][C040]
        - Directional only
      - - Revenue multiple triangulation
        - ARR or revenue, growth rate, gross margin, net retention, and credible peer set
        - Public evidence does not disclose those operating inputs. [C039]
        - Assumes Abridge could deserve a premium software multiple if economics match strategic quality.
        - Highly sensitive to renewal quality, services burden, and customer concentration.
        - Blocked
      - - DCF or long-term cash-flow model
        - Historical revenue, margin structure, operating expense base, and cash-flow conversion
        - No public evidence supports these inputs. [C039]
        - Assumes software-like margin progression and durable renewals.
        - Extremely sensitive to implementation cost, hosting cost, and churn.
        - Blocked
      - - Scenario underwriting
        - Deployment quality, module attach, retention, and monetization by workflow surface
        - Public evidence shows large deployments and expansion surfaces but not cohort economics. [C021][C022][C024][C025][C032][C033][C044]
        - Assumes multi-surface expansion can raise wallet share over time.
        - Sensitive to attach rate outside core documentation, implementation pace, and procurement friction. [C010][C039]
        - Qualitatively useful
    notes: The framework shows method discipline while explicitly refusing unsupported numeric precision.
