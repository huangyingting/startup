  - id: T802
    title: Bull, base, and bear underwriting cases
    columns:
      - Case
      - Evidence-backed supports
      - Key blockers
      - Recommendation effect
    rows:
      - - Bull
        - Abridge converts documentation leadership into a broader clinical-workflow operating layer with strong attach across nursing, revenue cycle, and CDS, while large systems continue to standardize on the platform. [C007][C020][C021][C022][C024][C025][C032][C033][C035][C044]
        - Requires strong unseen ARR growth, high gross margin, high NRR, and low concentration risk that are not public today. [C039][C040]
        - Would justify moving from research-more toward buy if data-room evidence confirms premium economics.
      - - Base
        - Abridge remains a category-leading private company with real enterprise traction and meaningful expansion optionality. [C020][C021][C022][C024][C025][C035][C044]
        - Public evidence still cannot validate whether the reported valuation markers fairly compensate for execution and disclosure risk. [C017][C039][C040]
        - Research-more remains appropriate.
      - - Bear
        - The company’s public scale narrative proves directionally true but economically weaker than implied, with slower attach outside core documentation and insufficient retention durability. [C018][C019][C032][C033][C040]
        - Missing revenue, retention, and concentration data prevents early detection of this downside from public sources. [C039]
        - At a premium private valuation, the bear case would push the stance toward avoid.
    notes: The cases intentionally separate strategic possibility from currently demonstrated economics.
