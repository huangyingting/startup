evidenceGaps:
- gap: Public pricing, contract structure, and unit-economics disclosures are absent, making revenue quality and payback analysis impossible from public evidence alone.
  impact: high
  diligencePath: Request price books, standard MSAs/SOWs, customer cohort economics, and renewal data.
- gap: Abridge’s public scale metrics use inconsistent denominators across materials, including deployments, health systems, partners, and projected conversation volumes.
  impact: high
  diligencePath: Request a reconciled KPI bridge that defines customer, deployment, partner, clinician, and conversation metrics consistently by period.
- gap: Series E valuation evidence is indirect in the fetched set, relying on company summaries of third-party reporting rather than a standalone company financing press release.
  impact: medium
  diligencePath: Obtain financing documents, cap-table summary, and direct investor confirmation for amount, valuation, and terms.
- gap: Most ROI, burnout, coding, and retention outcomes are customer-provided or company-published case-study metrics, not independently audited benchmarks.
  impact: medium
  diligencePath: Request raw pre/post study designs, sample sizes, statistical methods, and independent validation where available.
- gap: Public materials do not fully reconcile headquarters and office identity between Pittsburgh, San Francisco, and New York.
  impact: low
  diligencePath: Confirm legal HQ, principal executive office, and major office footprint directly with the company.
