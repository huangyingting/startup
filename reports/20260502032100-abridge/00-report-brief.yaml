  type: architecture-stack
  artifact: 02-company-snapshot.yaml
- id: F103
  title: Disclosed financing sizes (USD millions)
  type: bars
  artifact: 02-company-snapshot.yaml
sourceStrategy:
  minimumRetainedSources: 100
  discoveryTracks:
  - official identity, leadership, and hiring footprint
  - funding rounds, investors, and third-party valuation references
  - product, integrations, and technical trust signals
  - customer deployments, case studies, and ROI evidence
  - awards, analyst validation, and partner ecosystem proof
  - legal, privacy, and compliance disclosures
  - disconfirming evidence around inconsistent scale metrics and unresolved financial disclosures
  evidenceRules:
  - Use only fetched URLs in the evidence ledger.
  - Keep source IDs and claim IDs stable for downstream artifacts.
  - Separate observed facts from company-claimed case-study metrics and third-party-reported valuation markers.
  - Preserve conflicting health-system count and headquarters signals explicitly rather than smoothing them over.
