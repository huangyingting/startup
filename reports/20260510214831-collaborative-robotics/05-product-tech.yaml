sections:
  - id: core-hardware-architecture
    title: Core Hardware Architecture
    body: |
      Proxie is Collaborative Robotics' first and primary commercial product, a non-humanoid
      autonomous mobile robot formally launched in November 2024 that is designed from the
      ground up for safe collaborative operation alongside human workers in warehouses, logistics
      centers, healthcare facilities, and regulated manufacturing environments. Unlike traditional
      industrial robots that require physical separation from human workers through safety cages
      and exclusion zones, Proxie is certified for cage-free collaborative operation — a hardware
      and software design requirement that shaped every subsystem from the outset.

      The core mechanical platform centers on the Glide 360 swerve drive system, an omnidirectional
      locomotion architecture that gives Proxie full 360-degree movement capability including
      lateral translation, rotation-in-place, and diagonal traversal. This swerve drive design
      enables Proxie to navigate highly congested warehouse aisles, hospital corridors, and
      irregular facility layouts that defeat conventional differential-drive or Ackermann-steering
      AMRs. A patent application has been filed covering the swerve drive architecture, reflecting
      Cobot's assessment that it represents a genuine mechanical differentiator relative to existing
      AMR locomotion systems from Boston Dynamics, GreyOrange, Vecna Robotics, and Mobile Industrial
      Robots. The hot-swappable battery system enables continuous 24/7 operation without robot
      downtime for recharging: operators swap depleted battery packs for charged ones in minutes,
      maintaining operational continuity across multi-shift warehouse and healthcare environments.

      The Scout Sense perception system comprises a multi-modal sensor array combining cameras,
      LiDAR, and ultrasonic sensors that provide comprehensive environmental awareness across
      different lighting conditions, operating distances, and obstacle types. The sensor fusion
      architecture ensures that Proxie can detect and respond to human workers, forklifts, carts,
      and other dynamic obstacles across the full operational envelope required for collaborative
      environments. The Flex Grasp manipulation system handles light material transport including
      carts, totes, and bins, enabling Proxie to perform last-mile material delivery tasks that
      previously required human labor or larger, more expensive robotic systems. Central to all
      of these systems is the NVIDIA Jetson Orin compute platform, which provides substantial
      edge AI compute that enables real-time perception, navigation, and task execution without
      cloud dependency.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE023]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: software-ai-and-data-platform
    title: Software, AI, and Data Platform
    body: |
      Collaborative Robotics was conceived as an AI-native company rather than a hardware company
      that subsequently incorporated AI, and this founding philosophy permeates the design of
      Proxie's software and intelligence stack. The AI navigation system is trained on deployment
      data and operational patterns derived from the Amazon Robotics experience of CEO Brad Porter
      and co-founder Michael Vogelsong, who built Amazon's Deep Learning Technologies team. This
      institutional knowledge translated into a proprietary navigation AI that approaches problems
      of robot motion planning, obstacle avoidance, and multi-robot coordination with deep
      learning techniques that were unavailable to the first generation of warehouse AMR vendors.

      The fleet management software handles multi-robot coordination, task scheduling, and
      enterprise system integration, connecting Proxie deployments to customer Warehouse Management
      Systems (WMS) and Enterprise Resource Planning (ERP) platforms through standard APIs. This
      integration layer is critical to enterprise adoption because Proxie must slot into existing
      operational software rather than require customers to restructure their IT infrastructure
      around new robotic systems. The WMS/ERP integration capability is particularly important for
      Cobot's healthcare customers — Mayo Clinic and Tampa General Hospital — where robotic systems
      must interface with clinical logistics software and hospital information systems that have
      strict data governance requirements.

      Large Language Model integration enables natural language task specification, allowing
      facility managers and floor supervisors to issue tasks and query fleet status through
      conversational interfaces rather than specialized robot programming tools. This dramatically
      lowers the operational skill threshold for managing Proxie deployments, reducing the
      specialized robotics expertise required for day-to-day operations and expanding the
      accessible customer base to facilities without dedicated robotics teams. Over-the-air (OTA)
      software updates continuously deliver navigation improvements, new capabilities, and safety
      patches to deployed robots without requiring manual servicing or downtime, mirroring the
      over-the-air update model pioneered in automotive and mobile computing. The data flywheel
      mechanism is Cobot's most durable long-term AI advantage: each deployed robot generates
      operational data that enriches the AI training corpus, enabling the next software release
      to perform better than the current one, compounding the intelligence gap between Cobot's
      platform and competitors who lack equivalent real-world training data at scale.
    claimRefs: [CE007, CE008, CE009, CE010, CE011, CE012, CE013]
    tableRefs: []
    figureRefs: [FE002]

  - id: technology-readiness-and-manufacturing
    title: Technology Readiness and Manufacturing
    body: |
      Proxie has achieved technology readiness levels of 8 to 9 on the standard TRL scale,
      meaning the system has been proven in operational environments through real enterprise
      deployments rather than existing only as a prototype or laboratory demonstrator. This
      maturity level places Proxie well ahead of many deep-tech robotics startups that raise
      capital at TRL 4 to 6 — at prototype or pilot stages — and reflects the accelerated product
      development trajectory enabled by Cobot's founding team's prior experience deploying
      robotics systems at Amazon scale.

      Five named enterprise customers — Maersk (global logistics and shipping), Mayo Clinic
      (healthcare and hospital logistics), Moderna (pharmaceutical manufacturing), Owens and Minor
      (medical supply distribution), and Tampa General Hospital (hospital operations) — are actively
      deploying Proxie robots as of the November 2024 public launch announcement. The breadth of
      these reference customers across three distinct verticals (logistics and shipping, healthcare
      facilities, and pharmaceutical manufacturing) demonstrates that Proxie's cage-free collaborative
      design and multi-environment adaptability are validated across meaningfully different operational
      contexts, not just a single use case. Maersk's involvement is particularly significant given
      the scale of its global logistics operations, representing a potential pathway to fleet
      deployments that could number in the hundreds to thousands of units as the relationship
      matures.

      Cobot employs a contract manufacturing model rather than self-manufacturing Proxie robots,
      following the capital-efficient approach of established hardware-as-a-service companies
      that leverage specialized contract manufacturers for production scale while maintaining
      control of design, software, and quality standards internally. This model reduces capital
      expenditure requirements for manufacturing infrastructure and allows Cobot to scale
      production volume more rapidly by leveraging the existing capacity of established contract
      manufacturing partners rather than building proprietary production lines. Contract
      manufacturing introduces supply chain concentration risk — particularly given Proxie's
      dependence on NVIDIA Jetson Orin compute modules — but reduces fixed capital requirements
      at a stage when product volume is still in early growth phase. The technology maturity
      assessment for each of Proxie's key subsystems reflects different confidence levels and
      remaining development risks, as detailed in the technology maturity table.
    claimRefs: [CE014, CE015, CE016, CE017, CE018, CE023]
    tableRefs: [TE002]
    figureRefs: [FE003]

  - id: intellectual-property-and-moats
    title: Intellectual Property and Moats
    body: |
      Cobot's sustainable competitive advantages in robotics technology derive from four
      reinforcing moat types: patent-protected hardware architecture, proprietary AI algorithms
      trained on unique deployment data, a data flywheel that compounds the AI training corpus
      with each robot deployment, and a personnel moat rooted in the deep-tech expertise of
      the founding team and key engineering hires. These moats operate at different time scales:
      the personnel moat provides immediate differentiation, the algorithm and data moats
      strengthen with fleet growth, and the patent moat creates durable legal barriers if
      successfully issued and enforced.

      Patent applications have been filed with the USPTO covering the Glide 360 swerve drive
      architecture and proprietary navigation algorithms. While the applications remain pending
      and no issued patents have been publicly announced, the filing record signals that Cobot
      considers these technical approaches protectable and distinct from prior art in the AMR
      and collaborative robotics field. The swerve drive patent is particularly relevant given
      that omnidirectional locomotion is a meaningful differentiator relative to differential-drive
      AMRs deployed by Locus Robotics, 6 River Systems, and first-generation collaborative robot
      platforms from Vecna Robotics and Mobile Industrial Robots.

      The personnel moat is exceptionally strong at the founding level. Brad Porter, as former
      Vice President of Robotics at Amazon overseeing 200,000+ deployed robots and approximately
      10,000 team members, brings a depth of robotics deployment knowledge that is effectively
      impossible to replicate through hiring alone. Michael Vogelsong's co-founding of Amazon's
      Deep Learning Technologies team provides the AI and machine learning foundation for Proxie's
      intelligence stack. These combined backgrounds — practical large-scale robotics deployment
      and deep learning research — represent a rare combination that directly informs Proxie's
      design and positions Cobot's AI as genuinely native rather than bolted on. The ISO 10218-1:2025
      and ANSI/A3 R15.06-2025 safety credentials further reinforce the moat by creating a
      regulatory hurdle that less safety-mature competitors must surmount before they can serve
      regulated healthcare and pharmaceutical customers, where Cobot is already deployed.
    claimRefs: [CE019, CE020, CE021, CE022, CE010, CE005]
    tableRefs: [TE004]
    figureRefs: []

  - id: regulatory-compliance-and-safety
    title: Regulatory Compliance and Safety
    body: |
      Safety compliance is a foundational design requirement for Proxie rather than an afterthought,
      driven by the non-negotiable need for cage-free collaborative operation in shared human
      workspaces. Two primary safety standards govern Proxie's deployment context: ANSI/A3
      R15.06-2025, the updated US standard for industrial robot safety that encompasses
      collaborative robot requirements in shared workspaces; and ISO 10218-1:2025, the
      international standard for industrial robot safety requirements covering robot design,
      manufacture, and operation. Together these standards define the binding safety validation
      requirements that Proxie must satisfy to be legally and operationally deployed in US and
      international facilities without physical safety cage separation from human workers.

      ANSI/A3 R15.06-2025, published in 2025 by the American National Standards Institute in
      collaboration with the Association for Advancing Automation (A3), establishes requirements
      for collaborative robot operation including speed-and-separation monitoring, power-and-force
      limiting, hand-guiding, and safety-rated stop functions that protect human co-workers from
      robot-inflicted injury. Compliance with this standard is effectively mandatory for Cobot's
      target verticals of healthcare, pharmaceutical manufacturing, and regulated logistics, where
      occupational safety regulations require documented safety validation for any robotic system
      operating in proximity to human workers. OSHA regulations further require employers to
      implement adequate safeguards for robotic workplaces, reinforcing the commercial importance
      of certifiable safety compliance as a prerequisite for enterprise procurement approval.

      ISO 10218-1:2025 provides the international safety framework that enables Cobot's planned
      geographic expansion into European and Asian markets where the international standard governs
      rather than the ANSI/A3 standard. Proxie's cage-free collaborative operation is itself a
      key commercial differentiator: facilities that deploy traditional industrial robots must
      create physical exclusion zones that consume valuable floor space, restrict human access to
      robot-adjacent areas, and require costly facility reconfiguration. Proxie eliminates these
      space and operational constraints, enabling deployment in existing facility layouts without
      capital construction projects. This safety design philosophy — collaborative operation as a
      design constraint rather than a feature addition — extends to Proxie's relevance in FDA-regulated
      healthcare environments, where Mayo Clinic and Tampa General Hospital have validated the
      system in active clinical logistics operations.
    claimRefs: [CE024, CE025, CE026, CE027, CE028, CE029, CE030]
    tableRefs: [TE003]
    figureRefs: []

