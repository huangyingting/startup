chapter:
  number: 5
  title: Product and Technology
  summary: >
    Collaborative Robotics' flagship product, Proxie, is a non-humanoid autonomous mobile robot
    launched in November 2024 that integrates three proprietary hardware subsystems — the Glide 360
    omnidirectional swerve drive, Scout Sense multi-modal perception array, and Flex Grasp light
    manipulation module — with an AI-native software platform powered by NVIDIA Jetson Orin edge
    compute. The Proxie platform is deployed by five named enterprise customers across logistics,
    healthcare, and pharmaceutical manufacturing, achieving technology readiness levels of 8–9
    (system proven in operational environment). Cobot has filed patent applications covering its
    swerve drive architecture and navigation algorithms, and its AI training data flywheel — fueled
    by real-world deployment data — represents a compounding moat that AI-retrofitted competitors
    cannot quickly replicate. Safety compliance with ANSI/A3 R15.06-2025 and ISO 10218-1:2025
    enables cage-free collaborative operation, a key differentiator in healthcare and regulated
    manufacturing environments.

