callouts:
  - calloutType: strength
    title: "AI-Native Architecture Creates Compounding Intelligence Moat"
    body: >
      Proxie's foundation in AI-native design — with NVIDIA Jetson Orin edge compute, LLM
      task reasoning, and a data flywheel that compounds training corpus quality with each
      deployment — means that Cobot's navigation and task intelligence improves automatically
      with fleet scale. This compounding dynamic is not replicable by competitors who retrofit
      AI onto legacy AMR hardware, as the training data generated by a growing fleet takes years
      to accumulate and cannot be purchased or synthesized at equivalent quality.
    claimRefs: [CE007, CE010, CE011, CE012]

  - calloutType: strength
    title: "Five Named Enterprise Customers Validate TRL 8–9 Technology Readiness"
    body: >
      Deployment by Maersk, Mayo Clinic, Moderna, Owens and Minor, and Tampa General Hospital
      across three distinct verticals provides exceptional TRL validation for a company that
      launched its first commercial product in November 2024. The healthcare deployments
      (Mayo Clinic, Tampa General) are particularly significant, as hospital environments are
      among the most demanding for collaborative robot safety, reliability, and system integration,
      providing a credibility signal that accelerates procurement consideration in regulated sectors.
    claimRefs: [CE023, CE014, CE015]

  - calloutType: risk
    title: "NVIDIA Orin Supply Concentration Creates Technology Risk"
    body: >
      Proxie's edge compute platform depends entirely on NVIDIA Jetson Orin modules, which are
      subject to the broader NVIDIA supply constraints that have affected the AI chip market since
      2023. A significant supply disruption or NVIDIA prioritization of higher-margin data center
      products over embedded compute modules could delay Proxie production ramp, increase hardware
      cost, or force a costly platform migration. Cobot has not publicly disclosed any supply
      agreement terms or alternative compute contingencies.
    claimRefs: [CE016, CE017]

  - calloutType: risk
    title: "Patent Applications Pending — IP Moat Unproven Until Issued"
    body: >
      Cobot's swerve drive and navigation algorithm patent applications are pending at the USPTO,
      meaning the IP moat they represent is conditional on successful prosecution. Patent office
      rejection, prior art challenges, or claim narrowing during prosecution could eliminate or
      significantly weaken the intended IP protection. Until patents are issued, competitors can
      independently develop mechanically similar swerve drive architectures without legal risk,
      reducing the durability of the hardware differentiation claim.
    claimRefs: [CE019, CE020]

  - calloutType: insight
    title: "Cage-Free Collaborative Design Is a Space and Cost Advantage in Healthcare"
    body: >
      Proxie's cage-free collaborative operation — enabled by ANSI/A3 R15.06-2025 and
      ISO 10218-1:2025 compliant hardware design — eliminates the need for physical safety
      infrastructure that traditional industrial robots require. In healthcare environments,
      where floor space is premium and safety barriers would obstruct patient access, this
      design philosophy translates directly into lower deployment cost, faster installation,
      and compatibility with existing facility layouts that could not accommodate conventional
      robot exclusion zones.
    claimRefs: [CE024, CE026, CE027, CE028]

