  shortDescription: >
    Collaborative Robotics (Cobot) is a Santa Clara-based AMR startup founded in 2022 by Brad Porter, former Amazon VP
    of Robotics and ex-CTO of Scale AI. Its flagship product, Proxie, is a non-humanoid collaborative mobile manipulator
    launched in November 2024 that works safely alongside humans in warehouses, hospitals, and pharmaceutical facilities
    — sold as a Robots-as-a-Service subscription. The company has raised $140M+ from General Catalyst, Sequoia Capital,
    Khosla Ventures, and strategic investors including Mayo Clinic.
