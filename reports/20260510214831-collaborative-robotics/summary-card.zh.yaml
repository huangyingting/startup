    Collaborative Robotics 是一家处于早期商业化阶段的 AMR
    公司，创始人履历突出，企业客户验证扎实，资金跑道充足，站在庞大且增长中的仓储自动化市场里；但硬件经济性、竞争压力和关键人集中度仍要求保持观察，买入建议应以财务和 IP 尽调通过为前提。
