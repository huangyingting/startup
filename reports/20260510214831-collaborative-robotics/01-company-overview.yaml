company:
  name: Collaborative Robotics
chapter:
  number: 1
  title: Company Overview
  summary: >
    Collaborative Robotics (known as "Cobot") is a Santa Clara, California-based robotics startup
    founded in 2022 by Brad Porter, former Vice President of Robotics at Amazon and ex-CTO of Scale AI.
    The company builds practical collaborative autonomous mobile robots (AMRs) designed to work
    alongside human workers in warehouses, logistics, healthcare, and manufacturing environments.
    Its flagship robot, Proxie, was publicly launched in November 2024 and is deployed by industry
    leaders including Maersk, Mayo Clinic, Moderna, Owens and Minor, and Tampa General Hospital.
    Cobot has raised over $140 million across seed, Series A, and Series B rounds, backed by
    General Catalyst, Sequoia Capital, Khosla Ventures, Lux Capital, and Mayo Clinic.

sections:
  - id: identity-and-business-model
    title: Identity and Business Model
    body: |
      Collaborative Robotics, incorporated in 2022 and headquartered in Santa Clara, California
      with a secondary office in Seattle, Washington, develops and deploys practical collaborative
      autonomous mobile robots — commonly referred to as "cobots" — for real-world industrial
      environments. The company markets itself under the brand "Cobot" and operates the domain
      co.bot. Its flagship and first commercially deployed product is Proxie, a mobile manipulator
      robot that performs material handling tasks such as moving carts, boxes, and totes alongside
      human workers in warehouses, healthcare facilities, and logistics centers. Cobot's stated
      mission is to create a world where trustworthy cobots seamlessly integrate into areas of
      useful work, from manufacturing and logistics to healthcare and municipal services.

      The company's primary commercial model is Robots-as-a-Service (RaaS), where customers pay
      recurring subscription fees that bundle the robot hardware, deployment, fleet management
      software, maintenance, and AI updates. This model eliminates large upfront capital expenditure
      for customers and provides Cobot with predictable recurring revenue. A supplementary
      "Flywheel Program" engages customers as deployment partners, building a virtuous cycle where
      more robots in the field produce more AI training data, improving robot capability and
      reducing per-unit cost over time. The company does not publicly disclose RaaS pricing for
      Proxie, but the broader cobot RaaS market for warehouse-grade robots typically ranges from
      $3,000–$10,000 per robot per month depending on payload capacity, service levels, and
      deployment complexity. As a privately held company, Cobot's revenue, gross margins, and
      profitability metrics are not publicly disclosed.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]

  - id: founding-history-and-leadership
    title: Founding History and Leadership
    body: |
      Brad Porter founded Collaborative Robotics in 2022 after departing Scale AI, where he served
      as Chief Technology Officer from August 2020 through March 2022 following his nearly 14-year
      career at Amazon. At Amazon, Porter served as Vice President and Distinguished Engineer of
      Robotics, leading a global team of approximately 10,000 people and overseeing the deployment
      of over 200,000 robots across Amazon's global fulfillment network. His experience scaling
      Amazon Robotics — built on the Kiva Systems acquisition — gave him direct insight into both
      the immense opportunity and the practical limitations of warehouse automation at scale.

      Porter co-founded Cobot with Jane Mooney and Steph Tryphonas (described as long-time
      friends and collaborators on the company's "story" page), and recruited early engineering
      talent from Apple, Amazon, Waymo, NASA, Google, Microsoft, and Meta. Jack Erdozain, a
      hardware engineer from Apple, was among the first hires. Sarah Rathbun, a talent acquisition
      leader who previously worked with Porter at Amazon and then at Meta, helped establish a
      rigorous recruiting pipeline modeled on big-tech standards rather than network-only hiring.

      The company's board of directors includes Paul Kwan, Managing Director at General Catalyst,
      who joined the board concurrent with the Series B, and Alfred Lin, partner at Sequoia Capital,
      who has been a board member since the Series A. Teresa Carlson — a former head of Worldwide
      Public Sector at Amazon Web Services, former SVP at Microsoft, and former President and Chief
      Commercial Officer at Flexport — joined as an advisor at the time of the Series B. Sidd
      Srinivasa, a University of Washington professor and former Amazon executive, serves as an
      advisor, and Cobot made a research grant to the UW Allen School of Computer Science and
      Engineering in support of his work. Michael Vogelsong, who co-founded Amazon's Deep Learning
      Technologies team, joined Cobot to lead its Foundation Models AI research team in Seattle.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012, CO013, CO014]
    tableRefs: [TO002]

  - id: funding-history-and-investors
    title: Funding History and Investors
    body: |
      Collaborative Robotics has raised over $140 million in total funding across three rounds in
      less than two years of operation. The company's seed round of $10 million was anchored by
      Khosla Ventures, Neo, and other early-stage investors. The $30 million Series A, raised in
      summer 2023, was led by Sequoia Capital with participation from Mayo Clinic, Khosla Ventures,
      and others; at this stage, the company had early proof-of-concept validation and three
      committed customers. The $100 million Series B, announced in April 2024, was led by General
      Catalyst with new investors Bison Ventures, Industry Ventures, and Lux Capital joining, and
      existing investors Sequoia Capital, Khosla Ventures, Mayo Clinic, Neo, 1984 Ventures, MVP
      Ventures, and Calibrate Ventures also participating.

      The investor base is notable for the diversity of strategic value it provides. General Catalyst
      brings pattern recognition across industrial automation and responsible innovation frameworks.
      Sequoia provides Tier-1 venture expertise and global network access for enterprise sales.
      Mayo Clinic is both an investor and a direct customer, creating an aligned pilot deployment
      relationship that validates the product in a demanding healthcare logistics environment.
      Lux Capital focuses specifically on deep-tech and frontier science startups, providing sector
      expertise. The total disclosed funding of over $140 million positions Cobot comfortably for
      continued product development, commercial expansion, and team growth through at least the
      next 18–24 months at estimated burn rates. The Series B post-money valuation has not been
      publicly disclosed; analyst database estimates range from $600M to $1.1B, reflecting the
      high-growth premium accorded to AI-enabled robotic platform companies with demonstrable
      enterprise traction.
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020]
    tableRefs: [TO003]

  - id: snapshot-metrics-and-scale
    title: Snapshot Metrics and Scale
    body: |
      As a private company, Collaborative Robotics does not publicly disclose most financial and
      operational metrics. The following is a best-effort snapshot using disclosed facts and
      third-party estimates as of May 2026. Total funding raised is confirmed at over $140 million
      across three rounds. Headcount was approximately 40 employees at the time of the Series B
      in April 2024, growing to approximately 150 employees by early 2026 according to database
      estimates — consistent with the company's stated plan to use Series B capital to expand
      teams in AI, engineering, and commercial functions. The company has offices in Santa Clara,
      California (headquarters) and Seattle, Washington (AI research and engineering hub opened
      in mid-2024). Revenue, ARR, and unit economics are not publicly disclosed and are treated
      as material evidenceGaps in this report.

      The five publicly named customers — Maersk, Mayo Clinic, Moderna, Owens and Minor, and
      Tampa General Hospital — represent a diverse cross-section of logistics, healthcare, and
      pharmaceutical/biotech environments, validating Proxie's adaptability across verticals.
      Maersk is one of the world's largest integrated logistics companies. Moderna operates
      sophisticated biotech manufacturing and distribution. Mayo Clinic is a globally recognized
      healthcare system with high safety and reliability standards. This customer diversity
      is strategically significant: it demonstrates that Proxie can handle different material
      types, workflow structures, and safety requirements without requiring bespoke hardware.
      The deployment scale (number of robots deployed, throughput metrics) at each customer
      is not publicly disclosed.
    claimRefs: [CO021, CO022, CO023, CO024, CO025]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: milestones
    title: Company Milestones
    body: |
      Collaborative Robotics has progressed from founding to commercial deployment in under three
      years — an unusually rapid commercialization timeline for a capital-intensive hardware startup.
      The company was founded in 2022 by Brad Porter; within weeks, the founding team began
      recruiting robotics and AI experts and initiating the engineering development process.
      By the time of the Series A in summer 2023, Cobot had achieved three committed customers
      and early proof-of-concept robot operation. By January 30, 2024 (as described in Porter's
      blog post coinciding with the Series B announcement), the company had a fully functioning
      robot field-ready. In early 2024, the first Proxie robot was deployed at a global transload
      facility handling cart movement — the company's first revenue-generating commercial
      deployment. The Series B of $100 million was announced in April 2024, concurrently with
      the hiring of Michael Vogelsong to lead the Foundation Models AI team and the opening of
      the Seattle office.

      Proxie's public launch occurred in November 2024, at which point Cobot officially announced
      its five named customers: Maersk, Mayo Clinic, Moderna, Owens and Minor, and Tampa General
      Hospital. A research grant to the University of Washington was announced at the same time,
      reinforcing the company's commitment to foundational AI research. As of May 2026, the company
      continues to operate and expand its customer fleet. No material adverse events — such as
      safety recalls, leadership departures, litigation, or significant layoffs — have been publicly
      reported for Cobot during this period, which is a positive indicator for early-stage operational
      stability. The primary milestone gap is the absence of a Series C or additional disclosed
      funding round, which investors should monitor as the company scales its commercial program
      and headcount.
    claimRefs: [CO026, CO027, CO028, CO029, CO030]
    tableRefs: [TO004]
    figureRefs: [FO001, FO002]

