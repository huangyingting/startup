callouts:
  - calloutType: strength
    title: Exceptional Founder-Market Fit
    body: >
      Brad Porter's 14-year tenure at Amazon Robotics — deploying over 200,000 robots and leading
      a 10,000-person team — provides a uniquely credible foundation for Cobot. He has operated
      at the exact scale the company aspires to reach, which reduces execution risk substantially
      compared to first-time deep-tech founders.
    claimRefs: [CO007, CO008]

  - calloutType: strength
    title: Multi-Vertical Enterprise Customer Validation
    body: >
      Having five named enterprise customers across logistics (Maersk), healthcare (Mayo Clinic,
      Tampa General), pharmaceutical (Moderna), and medical distribution (Owens and Minor) within
      two years of founding demonstrates that Proxie's design is genuinely adaptable and not
      constrained to a single vertical. This breadth is unusual for a robot platform at this stage.
    claimRefs: [CO021, CO022]

  - calloutType: risk
    title: Key-Person Concentration in Founder-CEO
    body: >
      Brad Porter is simultaneously the company's founder, CEO, primary technical visionary,
      and public face. His departure or incapacitation would be highly disruptive to fundraising,
      customer confidence, and product strategy. No clear successor has been publicly identified,
      making this a material key-person risk. Diligence should request succession planning documentation
      and confirm equity vesting terms.
    claimRefs: [CO007, CO010]

  - calloutType: risk
    title: Revenue and Unit Economics Not Publicly Disclosed
    body: >
      As a private company with no regulatory disclosure obligations, Cobot has not published
      revenue figures, gross margins, unit economics, or burn rate. All financial projections
      in this report are analyst estimates or industry averages. This is the most material
      evidence gap in the analysis.
    claimRefs: [CO024, CO025]

