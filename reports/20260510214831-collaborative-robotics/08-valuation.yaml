    - id: QV002
      question: "What diligence asks are blocking for a Series C investment commitment to Collaborative Robotics?"
      type: enumeration
      targets: ["contentRequirements/3"]
      status: answered
      answeredBy: "Three blocking asks: (1) ARR and revenue visibility, (2) RaaS unit economics per robot, (3) audited financial statements; three material asks: NVIDIA supply agreement, CAC/LTV by vertical, IP portfolio and FTO analysis — see TV003"

