      answeredBy: "Bear case of $300M–$500M is the worst structured scenario; more severe outcomes (acqui-hire, distress sale, shutdown) are possible if Series C fails after a hospital safety incident or three consecutive enterprise bid losses to Chinese AMR vendors; probability of sub-$300M outcome not precisely quantifiable without private financial data"

