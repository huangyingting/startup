      targets: ["contentRequirements/1"]
      status: answered
      answeredBy: "No major AMR M&A transactions publicly announced in early 2026 at the time of this report; the most recent reference transactions remain the Fetch/Zebra and Boston Dynamics/Hyundai 2021 deals; the 2022–2025 period saw a slowdown in hardware robotics M&A activity as acquirers reassessed valuations post-SPAC correction; analyst forecasts anticipate renewed M&A in 2026–2027 as market matures"

