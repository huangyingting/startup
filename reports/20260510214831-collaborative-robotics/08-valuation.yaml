      question: "What if hardware RaaS unit economics never scale to positive gross margin — what does that imply for valuation?"
      type: adverse
      targets: ["contentRequirements/2"]
      status: answered
      answeredBy: "If RaaS hardware gross margin remains negative at scale, Cobot would be valued as a hardware manufacturer rather than a SaaS platform, compressing the multiple to 1–3x revenue rather than 8–15x ARR; at any likely Cobot revenue level by 2027, this would imply a valuation at or below the $300M bear case floor"

    - id: QV019
      question: "How does the data flywheel translate into a valuation premium relative to hardware-only AMR companies?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      answeredBy: "Each deployed Proxie robot generates navigation training data that improves AI performance for all fleet robots; this creates a defensibility moat where more deployments → better AI → more deployments, compounding the competitive advantage; venture investors value this as a SaaS-like network effect deserving premium multiple over hardware-only AMR comparables"

    - id: QV020
      question: "How does the RaaS model create predictable recurring revenue that justifies SaaS-like valuation multiples?"
      type: mechanism
      targets: ["contentRequirements/2"]
      status: answered
      answeredBy: "RaaS bundles hardware, software, maintenance, and AI updates into monthly subscription contracts spanning 2–5 years; this converts lumpy hardware capex into annuity-like recurring revenue that institutional investors value at SaaS multiples (8–15x ARR) rather than hardware multiples (0.5–2x revenue); the durability of this premium depends on contract renewal rates not yet observable from public data"

    - id: QV021
      question: "How does team credibility and venture firm brand affect VC valuation multiples at the pre-revenue stage?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      answeredBy: "Top-decile venture firms (Sequoia, GC) command 20–40% valuation premium at pre-revenue stage because they signal rigorous selection criteria, attract institutional co-investors at Series C, and provide operational support that reduces execution risk; Brad Porter's Amazon pedigree functions as a trust anchor in enterprise sales cycles, further justifying a team premium that translates directly into valuation"

