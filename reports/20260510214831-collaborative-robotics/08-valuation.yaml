      type: comparison
      targets: ["contentRequirements/2"]
      status: answered
      answeredBy: "Pre-revenue hardware companies typically trade on comparable transaction multiples and market opportunity sizing (2–5x post-money from previous round); post-revenue software robotics companies with demonstrated ARR trade at 8–20x ARR; the gap justifies Cobot's diligence requirement for ARR data before any Series C commitment at the upper valuation range"

    - id: QV025
      question: "How does typical Series B to Series C dilution compare for hardware vs. software robotics companies?"
      type: comparison
      targets: ["contentRequirements/2"]
      status: answered
      answeredBy: "Hardware robotics Series C typically involves 15–25% dilution at 1.5–2.5x valuation step-up; software robotics Series C can involve 10–20% dilution at 2–4x step-up due to higher revenue visibility; Cobot's estimated $600M–$1.1B Series B valuation implies a Series C at $900M–$2.75B for a 1.5–2.5x step-up"

