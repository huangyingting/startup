company:
  name: Collaborative Robotics
chapter:
  number: 8
  title: Valuation
  summary: >
    Collaborative Robotics has raised $140 million across three rounds through April 2024, anchored
    by a $100 million Series B led by General Catalyst with Sequoia Capital and Lux Capital
    participating. No post-money valuation has been publicly disclosed for any round; analyst database
    estimates place the post-Series B valuation at $600 million to $1.1 billion, reflecting a
    high-growth premium accorded to AI-enabled robotics platforms backed by top-tier venture firms.
    Comparable transaction analysis draws on six reference points — Locus Robotics ($2B peak, now
    distressed), 6 River Systems ($262M acquisition by Ocado in 2019), Fetch Robotics ($290M
    acquisition by Zebra in 2021), Boston Dynamics ($1.1B SoftBank-to-Hyundai sale in 2021),
    Symbotic ($12B SPAC IPO in 2023), and Berkshire Grey ($2.7B SPAC entry, subsequent decline) —
    that together bracket a plausible range of $300M (bear) to $5B+ (upside IPO scenario). The
    valuation framework is constrained by the complete absence of publicly disclosed revenue, ARR,
    or unit economics; any investment decision requires diligence access to financial data that is
    not available in public sources. The investment recommendation is conditionally positive: Cobot's
    team premium, healthcare-first customer validation, and data-flywheel moat justify a premium
    to AMR comparables, but the ARR visibility, RaaS unit economics, and IP portfolio must be
    resolved before a Series C commitment.

