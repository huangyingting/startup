callouts:
  - calloutType: strength
    title: "AI-Native Architecture Provides Structural Product Differentiation"
    body: >
      Cobot's Proxie was architected from inception with AI as a core functional component using
      NVIDIA Orin compute and LLM-based fleet intelligence, meaningfully differentiating it from
      competitors that layered AI capabilities onto hardware platforms designed before modern
      large-language-model tooling was commercially viable. This structural distinction supports
      both product performance claims and premium RaaS pricing justification in enterprise sales cycles
      where buyers are increasingly sophisticated about AI capability depth.
    claimRefs: [CP017, CP027, CP022]

  - calloutType: strength
    title: "Brad Porter's Amazon Robotics Credential Accelerates Enterprise Sales"
    body: >
      Porter's 14-year Amazon Robotics career culminating in leadership of a 200,000+ robot global
      fleet provides institutional credibility with enterprise logistics buyers that a startup would not
      otherwise command. This founder credential shortens sales cycles and reduces the perceived execution
      risk that typically disadvantages new market entrants against established AMR vendors with
      longer track records and larger installed bases.
    claimRefs: [CP019, CP031]

  - calloutType: risk
    title: "Established Competitors Have Multi-Year Head Start and Larger Installed Bases"
    body: >
      Locus Robotics, 6 River Systems, and Zebra/Fetch collectively operate AMR fleets across hundreds
      of enterprise facilities with multi-year customer relationships, integration partnerships, and
      operational playbooks that Cobot must match as a 2024 market entrant. The combination of
      switching cost barriers protecting incumbents' installed bases and larger data pools for AI
      training creates structural advantages that Cobot's Flywheel Program must overcome to achieve
      competitive parity within the 2025–2027 investment horizon.
    claimRefs: [CP002, CP003, CP004, CP029, CP030]

  - calloutType: risk
    title: "Key-Person Risk on Brad Porter is a Material Competitive Vulnerability"
    body: >
      Cobot's competitive differentiation is significantly tied to Brad Porter's personal brand,
      Amazon Robotics credibility, and enterprise buyer relationships. This concentrated key-person
      risk is elevated relative to competitors with institutional brand recognition independent of
      any single individual, and represents a material diligence concern for enterprise customers
      and investors evaluating long-term vendor stability.
    claimRefs: [CP031, CP019]

  - calloutType: insight
    title: "AMR M&A Consolidation Wave Validates Market and Creates Potential Exit Path"
    body: >
      The acquisition of 6 River Systems by Ocado for $262M and Fetch Robotics by Zebra for $290M
      demonstrate that large automation integrators view AMR software stacks and customer relationships
      as strategic assets worth premium acquisition multiples. This consolidation precedent validates
      Cobot's market category and establishes a plausible M&A exit path for investors, particularly
      as logistics, retail, and industrial automation conglomerates seek proven AI-native robotics
      capabilities to bolt onto existing distribution and customer relationships.
    claimRefs: [CP014, CP015, CP028]

