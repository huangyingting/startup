      - number: '4.4'
        title: Path to Profitability and Runway
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics' $100 million Series B provides an estimated 18 to 36 months of runway
              at typical hardware robotics startup burn rates, depending on the pace of robot unit manufacturing,
              sales headcount expansion, and infrastructure investment. This runway window — spanning
              approximately 2024 through 2026 or 2027 — is the critical period in which Cobot must demonstrate
              sufficient ARR growth to support a Series C raise at scale or reach a sustainable cash flow
              position from operations. For context, hardware robotics startups typically achieve profitability
              at Series C or Series D, as the hardware COGS recovery cycle over multi-year RaaS contracts
              creates a significant J-curve in cash flow before the subscription economics reach maturity.

              Analyst valuation benchmarks for Series B robotics startups suggest a 3 to 5 times ARR multiple
              is typical at this stage, implying an estimated post-Series B valuation for Cobot of $600 million
              to $1.1 billion based on industry estimates — though no official valuation has been disclosed.
              The IFR reports global robot market growth at 14-plus percent CAGR, providing a favorable macro
              backdrop for fleet expansion and customer acquisition over the runway period. ANSI/A3 R15.06-2025
              compliance investments represent a necessary but manageable cost category: the new standard
              establishes binding safety validation requirements for collaborative robot deployments that affect
              both Cobot's engineering and deployment cost structures.

              Cobot's path to profitability depends on four sequential milestones: growing the deployed fleet
              to sufficient scale to achieve manufacturing and procurement leverage on hardware COGS; expanding
              software and AI subscription margins as the data flywheel enriches fleet intelligence and reduces
              per-deployment engineering labor; achieving hardware breakeven on new unit deployments; and
              demonstrating sufficient ARR to support a Series C raise that provides capital for expansion into
              new verticals and international markets. The growth from 5 named enterprise customers at Proxie
              launch (November 2024) to a broader deployment base is the most observable near-term indicator
              of whether Cobot's go-to-market execution matches the capital investment made.
