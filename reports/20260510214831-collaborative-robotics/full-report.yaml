      - number: '5.5'
        title: Regulatory Compliance and Safety
        blocks:
          - type: paragraph
            body: |
              Safety compliance is a foundational design requirement for Proxie rather than an afterthought,
              driven by the non-negotiable need for cage-free collaborative operation in shared human
              workspaces. Two primary safety standards govern Proxie's deployment context: ANSI/A3
              R15.06-2025, the updated US standard for industrial robot safety that encompasses
              collaborative robot requirements in shared workspaces; and ISO 10218-1:2025, the
              international standard for industrial robot safety requirements covering robot design,
              manufacture, and operation. Together these standards define the binding safety validation
              requirements that Proxie must satisfy to be legally and operationally deployed in US and
              international facilities without physical safety cage separation from human workers.

              ANSI/A3 R15.06-2025, published in 2025 by the American National Standards Institute in
              collaboration with the Association for Advancing Automation (A3), establishes requirements
              for collaborative robot operation including speed-and-separation monitoring, power-and-force
              limiting, hand-guiding, and safety-rated stop functions that protect human co-workers from
              robot-inflicted injury. Compliance with this standard is effectively mandatory for Cobot's
              target verticals of healthcare, pharmaceutical manufacturing, and regulated logistics, where
              occupational safety regulations require documented safety validation for any robotic system
              operating in proximity to human workers. OSHA regulations further require employers to
              implement adequate safeguards for robotic workplaces, reinforcing the commercial importance
              of certifiable safety compliance as a prerequisite for enterprise procurement approval.

              ISO 10218-1:2025 provides the international safety framework that enables Cobot's planned
              geographic expansion into European and Asian markets where the international standard governs
              rather than the ANSI/A3 standard. Proxie's cage-free collaborative operation is itself a
              key commercial differentiator: facilities that deploy traditional industrial robots must
              create physical exclusion zones that consume valuable floor space, restrict human access to
              robot-adjacent areas, and require costly facility reconfiguration. Proxie eliminates these
              space and operational constraints, enabling deployment in existing facility layouts without
              capital construction projects. This safety design philosophy — collaborative operation as a
              design constraint rather than a feature addition — extends to Proxie's relevance in FDA-regulated
              healthcare environments, where Mayo Clinic and Tampa General Hospital have validated the
              system in active clinical logistics operations.
            claimRefs:
