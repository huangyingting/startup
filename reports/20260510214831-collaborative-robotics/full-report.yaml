      - number: '7.2'
        title: Competitive Risk
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics operates in a competitive AMR landscape where the risk of disruption
              comes from multiple directions simultaneously: existing enterprise AMR vendors with established
              distribution advantages, Chinese AMR manufacturers with aggressive international expansion
              strategies, potential platform entrants from large technology companies, and the latent threat
              of Amazon Robotics commercializing its enormous internal fleet technology.

              Amazon Robotics, which operates the world's largest deployed AMR fleet — estimated at more
              than 750,000 robots across Amazon's global fulfillment network — has the engineering capability,
              distribution relationships, and balance sheet to commercialize its technology to third-party
              enterprise customers if strategic priorities shift. While Amazon has historically focused its
              robotics innovation on its own operations, its investment in Agility Robotics and broader
              interest in the automation market signals that third-party commercialization cannot be dismissed
              as implausible. Chinese AMR vendors Geek+ and HAI Robotics are already expanding aggressively
              into North American and European markets with competitive pricing and broad fleet deployment
              experience across multiple continents, directly challenging Cobot's hospital and logistics cases.

              OTTO Motors (now part of Rockwell Automation) and Boston Dynamics serve the manufacturing
              segment where Cobot has identified opportunity but not yet confirmed deployments. Incumbent
              vendors Zebra Technologies (via Fetch Robotics) and MiR (via Teradyne) bring deep enterprise
              distribution relationships, multi-year sales team investments, and existing procurement
              relationships that create structural advantages in enterprise sales cycles. The Locus Robotics
              post-pandemic experience — significant staff reductions and customer normalization — is a
              direct cautionary data point for the enterprise AMR model. NVIDIA, whose Jetson Orin chip
              powers Proxie, could theoretically develop its own robotics reference designs or partner with
              competitive OEM manufacturers, leveraging its platform relationships and ecosystem. All of
              these competitive scenarios deserve rigorous scenario planning.
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
              - CR026
