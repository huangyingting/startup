            title: Revenue and Unit Economics Are Entirely Undisclosed — Underwriting Requires Private Data
            body: >
              Collaborative Robotics does not publicly disclose any financial operating data: revenue, ARR, gross
              margin, CAC, churn rate, or working capital position are all unavailable from public sources. This creates
              a complete evidence gap for financial underwriting. All unit economics referenced in this chapter are
              industry benchmark estimates, not verified Cobot-specific data. Any investment or partnership decision
              must be conditioned on access to audited financials, ARR bridge, and unit economics dashboard under NDA.
