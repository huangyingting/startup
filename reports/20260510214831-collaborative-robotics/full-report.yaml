              - CM016
              - CM020
              - CM021
      - number: '2.4'
        title: Barriers and Risks
        blocks:
          - type: paragraph
            body: |
              Despite strong tailwinds, the AMR market faces meaningful adoption barriers and risk factors
              that moderate near-term growth projections and demand careful consideration in any investment
              diligence. Integration complexity is the most consistently cited enterprise barrier:
              connecting AMR fleets to legacy warehouse management systems (WMS), warehouse execution
              systems (WES), and enterprise resource planning (ERP) platforms requires significant IT and
              operational investment. Many facilities built before 2010 lack the network infrastructure,
              sensor coverage, or floor plan regularity that makes AMR deployment straightforward, extending
              timelines and increasing total implementation cost. Return on investment uncertainty is the
              second major barrier — enterprise buyers typically require 2–4 year payback periods for
              automation capital, and for newer platforms like Cobot's Proxie, independently validated ROI
              benchmarks remain limited, forcing buyers to rely on vendor-provided projections.

              Regulatory and safety compliance introduces additional friction. Collaborative robot
              deployments must conform to ANSI/A3 R15.06-2025 and ISO 10218:2025 standards governing
              speed limits, force thresholds, workspace demarcation, and emergency stop protocols.
              Navigating compliance across multiple jurisdictions — particularly for healthcare facilities
              subject to additional FDA and OSHA oversight — adds cost and deployment timeline complexity.
              Competitive dynamics present further risks: the market features 100+ vendors globally,
              including well-funded incumbents such as Locus Robotics, 6 River Systems, Geek+, and MiR
              that have multi-year deployment experience and established customer relationships. Sustained
              commoditization of AMR hardware could compress margins and undermine the RaaS pricing
              premium upon which Cobot's unit economics depend. Locus Robotics' workforce reductions in
              2024 illustrate that hardware-heavy AMR companies without differentiated software stacks
              face real margin pressure even in a growing market.
            claimRefs:
              - CM013
              - CM016
              - CM020
              - CM021
              - CM024
              - CM034
      - number: '2.5'
        title: Vertical and Geographic Landscape
        blocks:
          - type: paragraph
            body: |
              The AMR market is distributed across multiple industrial and commercial verticals, with
              logistics and warehousing accounting for the largest share at approximately 40–45% of global
              demand. E-commerce fulfillment, third-party logistics (3PL), and distribution center
              operations drive the bulk of this demand, with use cases spanning goods-to-person picking,
              autonomous cart transport, and inter-floor material movement. Healthcare is the second-largest
              high-growth vertical, projected at 18%+ CAGR, driven by contactless medication transport,
              sterile supply logistics, and labor cost reduction in hospital systems facing chronic nursing
              shortages. Cobot's Proxie is already deployed in healthcare at Mayo Clinic, Tampa General
              Hospital, and Owens and Minor, providing early commercial validation in this demanding
              segment. Pharmaceutical and life sciences is an emerging high-growth vertical driven by
              cleanroom-compatible AMR requirements and inventory traceability mandates. Manufacturing,
              retail, and airport logistics round out the broader vertical opportunity landscape.

              Geographically, North America represents approximately 35% of global AMR market share, fueled
              by e-commerce penetration, warehouse labor cost pressures, and a mature venture capital
              ecosystem enabling fast-follower deployment. Europe accounts for roughly 28% of demand,
              driven by stringent labor regulations, Industry 4.0 government mandates, and
              sustainability-linked logistics modernization. Asia-Pacific is the fastest-growing region,
              led by China, Japan, South Korea, and emerging Southeast Asian manufacturing hubs — though
              competitive dynamics in this region are dominated by domestic players including Geek+ and
              Hai Robotics. Cobot's current go-to-market is US-focused, positioning it well in the North
              American market where its brand and enterprise relationships provide near-term advantage,
              while limiting near-term exposure to Asian growth that domestic vendors are capturing.
