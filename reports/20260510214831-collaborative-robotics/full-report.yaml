  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Hardware Architecture
        blocks:
          - type: paragraph
            body: |
              Proxie is Collaborative Robotics' first and primary commercial product, a non-humanoid
              autonomous mobile robot formally launched in November 2024 that is designed from the
              ground up for safe collaborative operation alongside human workers in warehouses, logistics
              centers, healthcare facilities, and regulated manufacturing environments. Unlike traditional
              industrial robots that require physical separation from human workers through safety cages
              and exclusion zones, Proxie is certified for cage-free collaborative operation — a hardware
              and software design requirement that shaped every subsystem from the outset.

              The core mechanical platform centers on the Glide 360 swerve drive system, an omnidirectional
              locomotion architecture that gives Proxie full 360-degree movement capability including
              lateral translation, rotation-in-place, and diagonal traversal. This swerve drive design
              enables Proxie to navigate highly congested warehouse aisles, hospital corridors, and
              irregular facility layouts that defeat conventional differential-drive or Ackermann-steering
              AMRs. A patent application has been filed covering the swerve drive architecture, reflecting
              Cobot's assessment that it represents a genuine mechanical differentiator relative to existing
              AMR locomotion systems from Boston Dynamics, GreyOrange, Vecna Robotics, and Mobile Industrial
              Robots. The hot-swappable battery system enables continuous 24/7 operation without robot
              downtime for recharging: operators swap depleted battery packs for charged ones in minutes,
              maintaining operational continuity across multi-shift warehouse and healthcare environments.

              The Scout Sense perception system comprises a multi-modal sensor array combining cameras,
              LiDAR, and ultrasonic sensors that provide comprehensive environmental awareness across
              different lighting conditions, operating distances, and obstacle types. The sensor fusion
              architecture ensures that Proxie can detect and respond to human workers, forklifts, carts,
              and other dynamic obstacles across the full operational envelope required for collaborative
              environments. The Flex Grasp manipulation system handles light material transport including
              carts, totes, and bins, enabling Proxie to perform last-mile material delivery tasks that
              previously required human labor or larger, more expensive robotic systems. Central to all
              of these systems is the NVIDIA Jetson Orin compute platform, which provides substantial
              edge AI compute that enables real-time perception, navigation, and task execution without
              cloud dependency.
            claimRefs:
