      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: |
              The unit economics of Cobot's RaaS model can be approximated using industry benchmarks, as the
              company does not publicly disclose revenue, ARR, or per-robot margin data. An annual contract
              value (ACV) calculation for a representative 10-robot deployment at a midpoint price of $5,000
              per robot per month yields $600,000 in annual recurring revenue per customer. At the low end
              of the pricing range ($3,000/robot/month), a 10-robot deployment generates $360,000 ACV; at
              the high end ($10,000/robot/month), it generates $1.2 million ACV — illustrating meaningful
              revenue concentration risk if early enterprise deployments skew toward smaller fleets or
              lower-complexity use cases.

              Enterprise robotics customer acquisition cost (CAC) benchmarks range from $50,000 to $200,000
              per enterprise account, reflecting long sales cycles of 6 to 18 months driven by procurement
              complexity, IT integration requirements, and site safety evaluations. These elevated CAC figures
              mean payback periods of 1 to 3 years per customer at representative ACV levels, requiring
              significant upfront investment in sales, solutions engineering, and professional services before
              generating positive cash contribution per account. This dynamic places a premium on Cobot's
              ability to leverage Brad Porter's Amazon Robotics credibility to shorten sales cycles and on
              the Flywheel Program to reduce per-logo acquisition cost through channel leverage.

              RaaS gross margins at scale for autonomous mobile robot vendors are estimated at 50–65%, achieved
              by combining hardware at or near breakeven with high-margin recurring software and AI update
              fees. Hardware costs — including compute, sensors, and mechanical components — represent the
              dominant COGS element in early deployments; as fleet scale increases, Cobot can negotiate
              better component pricing, achieve manufacturing efficiencies, and allow the software margin
              layer to become a larger share of total revenue. Locus Robotics' 2024 workforce reductions
              illustrate the margin pressure that hardware-heavy AMR vendors face when growth rates normalize
              post-pandemic, underscoring Cobot's need to maintain strong software differentiation and pricing
              power throughout fleet scaling.
