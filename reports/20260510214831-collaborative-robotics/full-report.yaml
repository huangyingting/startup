      - number: '5.2'
        title: Software, AI, and Data Platform
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics was conceived as an AI-native company rather than a hardware company
              that subsequently incorporated AI, and this founding philosophy permeates the design of
              Proxie's software and intelligence stack. The AI navigation system is trained on deployment
              data and operational patterns derived from the Amazon Robotics experience of CEO Brad Porter
              and co-founder Michael Vogelsong, who built Amazon's Deep Learning Technologies team. This
              institutional knowledge translated into a proprietary navigation AI that approaches problems
              of robot motion planning, obstacle avoidance, and multi-robot coordination with deep
              learning techniques that were unavailable to the first generation of warehouse AMR vendors.

              The fleet management software handles multi-robot coordination, task scheduling, and
              enterprise system integration, connecting Proxie deployments to customer Warehouse Management
              Systems (WMS) and Enterprise Resource Planning (ERP) platforms through standard APIs. This
              integration layer is critical to enterprise adoption because Proxie must slot into existing
              operational software rather than require customers to restructure their IT infrastructure
              around new robotic systems. The WMS/ERP integration capability is particularly important for
              Cobot's healthcare customers — Mayo Clinic and Tampa General Hospital — where robotic systems
              must interface with clinical logistics software and hospital information systems that have
              strict data governance requirements.

              Large Language Model integration enables natural language task specification, allowing
              facility managers and floor supervisors to issue tasks and query fleet status through
              conversational interfaces rather than specialized robot programming tools. This dramatically
              lowers the operational skill threshold for managing Proxie deployments, reducing the
              specialized robotics expertise required for day-to-day operations and expanding the
              accessible customer base to facilities without dedicated robotics teams. Over-the-air (OTA)
              software updates continuously deliver navigation improvements, new capabilities, and safety
              patches to deployed robots without requiring manual servicing or downtime, mirroring the
              over-the-air update model pioneered in automotive and mobile computing. The data flywheel
              mechanism is Cobot's most durable long-term AI advantage: each deployed robot generates
              operational data that enriches the AI training corpus, enabling the next software release
              to perform better than the current one, compounding the intelligence gap between Cobot's
              platform and competitors who lack equivalent real-world training data at scale.
            claimRefs:
              - CE007
              - CE008
              - CE009
              - CE010
              - CE011
