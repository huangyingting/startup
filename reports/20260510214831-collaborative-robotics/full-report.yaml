      - number: '5.3'
        title: Technology Readiness and Manufacturing
        blocks:
          - type: paragraph
            body: |
              Proxie has achieved technology readiness levels of 8 to 9 on the standard TRL scale,
              meaning the system has been proven in operational environments through real enterprise
              deployments rather than existing only as a prototype or laboratory demonstrator. This
              maturity level places Proxie well ahead of many deep-tech robotics startups that raise
              capital at TRL 4 to 6 — at prototype or pilot stages — and reflects the accelerated product
              development trajectory enabled by Cobot's founding team's prior experience deploying
              robotics systems at Amazon scale.

              Five named enterprise customers — Maersk (global logistics and shipping), Mayo Clinic
              (healthcare and hospital logistics), Moderna (pharmaceutical manufacturing), Owens and Minor
              (medical supply distribution), and Tampa General Hospital (hospital operations) — are actively
              deploying Proxie robots as of the November 2024 public launch announcement. The breadth of
              these reference customers across three distinct verticals (logistics and shipping, healthcare
              facilities, and pharmaceutical manufacturing) demonstrates that Proxie's cage-free collaborative
              design and multi-environment adaptability are validated across meaningfully different operational
              contexts, not just a single use case. Maersk's involvement is particularly significant given
              the scale of its global logistics operations, representing a potential pathway to fleet
              deployments that could number in the hundreds to thousands of units as the relationship
              matures.

              Cobot employs a contract manufacturing model rather than self-manufacturing Proxie robots,
              following the capital-efficient approach of established hardware-as-a-service companies
              that leverage specialized contract manufacturers for production scale while maintaining
              control of design, software, and quality standards internally. This model reduces capital
              expenditure requirements for manufacturing infrastructure and allows Cobot to scale
              production volume more rapidly by leveraging the existing capacity of established contract
              manufacturing partners rather than building proprietary production lines. Contract
              manufacturing introduces supply chain concentration risk — particularly given Proxie's
              dependence on NVIDIA Jetson Orin compute modules — but reduces fixed capital requirements
              at a stage when product volume is still in early growth phase. The technology maturity
              assessment for each of Proxie's key subsystems reflects different confidence levels and
              remaining development risks, as detailed in the technology maturity table.
