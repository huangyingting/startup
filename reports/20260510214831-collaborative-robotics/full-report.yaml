          competitors
      - - Battery System
        - Hot-swappable; enables 24/7 operation
        - Non-swappable batteries require robot downtime for charging; Proxie eliminates shift-end charging gaps
      - - Software Updates
        - Over-the-air (OTA) continuous delivery
        - Legacy AMR systems often require manual firmware updates or scheduled service visits
      - - Safety Standard
        - ANSI/A3 R15.06-2025 and ISO 10218-1:2025 compliant
        - Many legacy AMR platforms were certified to older standards (R15.06-2012); 2025 standard is more stringent
      - - AI Platform
        - LLM integration; proprietary navigation AI; WMS/ERP APIs
        - Most first-generation AMRs use rule-based path planning without foundation model integration
