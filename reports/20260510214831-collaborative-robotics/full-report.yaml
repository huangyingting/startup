      - number: '1.5'
        title: Company Milestones
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics has progressed from founding to commercial deployment in under three
              years — an unusually rapid commercialization timeline for a capital-intensive hardware startup.
              The company was founded in 2022 by Brad Porter; within weeks, the founding team began
              recruiting robotics and AI experts and initiating the engineering development process.
              By the time of the Series A in summer 2023, Cobot had achieved three committed customers
              and early proof-of-concept robot operation. By January 30, 2024 (as described in Porter's
              blog post coinciding with the Series B announcement), the company had a fully functioning
              robot field-ready. In early 2024, the first Proxie robot was deployed at a global transload
              facility handling cart movement — the company's first revenue-generating commercial
              deployment. The Series B of $100 million was announced in April 2024, concurrently with
              the hiring of Michael Vogelsong to lead the Foundation Models AI team and the opening of
              the Seattle office.

              Proxie's public launch occurred in November 2024, at which point Cobot officially announced
              its five named customers: Maersk, Mayo Clinic, Moderna, Owens and Minor, and Tampa General
              Hospital. A research grant to the University of Washington was announced at the same time,
              reinforcing the company's commitment to foundational AI research. As of May 2026, the company
              continues to operate and expand its customer fleet. No material adverse events — such as
              safety recalls, leadership departures, litigation, or significant layoffs — have been publicly
              reported for Cobot during this period, which is a positive indicator for early-stage operational
              stability. The primary milestone gap is the absence of a Series C or additional disclosed
              funding round, which investors should monitor as the company scales its commercial program
              and headcount.
