  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: AMR Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              The global autonomous mobile robot market is among the most crowded segments in enterprise
              technology, featuring more than 100 active vendors spanning hardware manufacturers, software
              platform providers, pure-play RaaS operators, and vertically integrated automation systems
              integrators. This fragmentation reflects the market's relative immaturity — most enterprise AMR
              fleets are fewer than five years old — and the diversity of vertical applications, each with
              distinct payload, safety, speed, and integration requirements that create product niches difficult
              for a single vendor to dominate. International Federation of Robotics 2023 data confirms that
              cobots represented approximately 10.5% of the 541,302 industrial robots installed globally that
              year, illustrating both meaningful momentum and the substantial headroom remaining versus the
              broader industrial automation market.

              Competitive dynamics are shaped by three overlapping categories: direct AMR competitors operating
              collaborative picking and transport robots in warehouse logistics (Locus Robotics, 6 River Systems,
              Zebra/Fetch, Vecna, GreyOrange); platform and incumbent competitors with strong brand recognition
              or internal AMR fleets (Amazon Robotics, Boston Dynamics, OTTO Motors, Geek+, HAI Robotics, MiR);
              and emerging humanoid entrants (Figure AI, Agility Robotics) that remain pre-commercial scale for
              repetitive warehouse tasks. Consolidation is accelerating: 6 River was acquired by Ocado in 2019
              for approximately $262 million, Fetch Robotics was acquired by Zebra in 2021 for approximately
              $290 million, and MiR was acquired by Teradyne prior to that, signaling that large automation
              integrators see AMR software stacks as strategic assets. Cobot enters this landscape with a
              differentiated AI-native design and RaaS-first model but must demonstrate durable competitive
              advantage against players with multi-year deployment experience and larger installed bases.
            claimRefs:
              - CP001
              - CP023
