  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology and Execution Risk
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics' core value proposition rests on the reliability of its AI navigation
              system in real-world warehouse, hospital, and manufacturing environments. The Proxie robot
              depends on multi-modal sensor fusion — combining LiDAR, depth cameras, and inertial measurement
              units — to navigate dynamically changing operational spaces without fixed infrastructure.
              While this approach is technically proven in controlled environments, enterprise deployments
              introduce variables that stress-test AI systems in ways that simulation and lab environments
              cannot fully replicate: workers crossing robot paths unpredictably, floor debris and spills,
              lighting changes across shift transitions, and edge cases in WMS integration logic.

              AI navigation failures in cluttered or dynamically changing environments remain a real risk
              for all AMR vendors, including Cobot. Sensor degradation — whether from LiDAR calibration
              drift, camera lens contamination in pharmaceutical clean rooms, or thermal stress in warehouse
              settings with wide temperature ranges — can trigger navigation failures or force robots into
              recovery mode, reducing throughput and eroding customer trust. Hot-swap battery systems are
              a critical uptime enabler for 24/7 operations, but their reliability at scale across multi-shift
              operations in high-humidity environments remains difficult to validate without extended field data.

              Software over-the-air (OTA) update failures represent a distinct and underappreciated risk.
              Fleet-wide OTA updates — while operationally efficient — can introduce regressions that affect
              all deployed robots simultaneously, unlike a traditional hardware failure affecting a single
              unit. WMS and ERP integration complexity extends deployment timelines and creates client-specific
              failure modes that are difficult to predict or prevent before going live. Each new customer
              environment adds integration work that can delay time-to-value and increase support costs.
              The combination of untested scale, sensor reliability, and software update risk makes technology
              execution one of the highest-priority diligence areas for any prospective Series C investor.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR036
