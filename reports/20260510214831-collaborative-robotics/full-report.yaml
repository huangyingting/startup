      - number: '1.3'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics has raised over $140 million in total funding across three rounds in
              less than two years of operation. The company's seed round of $10 million was anchored by
              Khosla Ventures, Neo, and other early-stage investors. The $30 million Series A, raised in
              summer 2023, was led by Sequoia Capital with participation from Mayo Clinic, Khosla Ventures,
              and others; at this stage, the company had early proof-of-concept validation and three
              committed customers. The $100 million Series B, announced in April 2024, was led by General
              Catalyst with new investors Bison Ventures, Industry Ventures, and Lux Capital joining, and
              existing investors Sequoia Capital, Khosla Ventures, Mayo Clinic, Neo, 1984 Ventures, MVP
              Ventures, and Calibrate Ventures also participating.

              The investor base is notable for the diversity of strategic value it provides. General Catalyst
              brings pattern recognition across industrial automation and responsible innovation frameworks.
              Sequoia provides Tier-1 venture expertise and global network access for enterprise sales.
              Mayo Clinic is both an investor and a direct customer, creating an aligned pilot deployment
              relationship that validates the product in a demanding healthcare logistics environment.
              Lux Capital focuses specifically on deep-tech and frontier science startups, providing sector
              expertise. The total disclosed funding of over $140 million positions Cobot comfortably for
              continued product development, commercial expansion, and team growth through at least the
              next 18–24 months at estimated burn rates. The Series B post-money valuation has not been
              publicly disclosed; analyst database estimates range from $600M to $1.1B, reflecting the
              high-growth premium accorded to AI-enabled robotic platform companies with demonstrable
              enterprise traction.
