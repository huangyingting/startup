  - id: FV001
    type: kpi
    title: Valuation Scenario and Benchmark KPIs
    layout: standard
    summary: >-
      Eight key performance indicators spanning valuation scenarios, funding benchmarks, market context, and comparable
      transaction anchors for Collaborative Robotics as of May 2026.
    data:
      items:
        - label: Bear Case Valuation
          value: $300M–$500M
          detail: Hardware RaaS economics fail to scale; customer normalization; Series C under pressure
        - label: Base Case Valuation
          value: $600M–$1.1B
          detail: Analyst consensus; 3–5x step-up from estimated Series B post-money; partial ARR visibility
        - label: Bull Case Valuation
          value: $2B+
          detail: Healthcare multi-facility expansions; data-flywheel moat demonstrated; Series C at premium
        - label: IPO / Acquisition Upside
          value: $5B+
          detail: Symbotic precedent; scale achieved across verticals by 2028; public market AI robotics premium
        - label: Total Funding Raised
          value: $140M+
          detail: Seed $10M + Series A $30M + Series B $100M; April 2024 close
        - label: Series B Round Size
          value: $100M
          detail: Led by General Catalyst; April 2024; Sequoia, Lux Capital, Khosla, Mayo Clinic participating
        - label: AMR Market CAGR (2024–2030)
          value: 14.4%
          detail: MarketsandMarkets and Grand View Research consensus; supportive backdrop for premium multiples
        - label: 6 River Systems Acquisition (2019)
          value: $262M
          detail: Lower-bound comparable transaction; Ocado Group acquirer; logistics-only AMR; pre-AI era
    approximationNotes: >-
      Valuation scenario ranges are analyst estimates based on comparables and sector benchmarks; they do not reflect
      any disclosed company data. Bear/base/bull probabilities are 20%/55%/20%/5% respectively. AMR CAGR figure is
      sourced from MarketsandMarkets and Grand View Research.
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
      - CV018
      - CV023
      - CV008
  - id: FV002
    type: bar
    title: Comparable Company Valuations — AMR and Robotics Reference Set
    layout: standard
    summary: >-
      Valuation or transaction price in USD millions for six comparable AMR and robotics platform companies, bracketing
      the Cobot valuation range.
    data:
      items:
        - label: Symbotic (SPAC IPO, 2023)
          value: 12000
          detail: Warehouse automation platform; largest public market comparable; higher revenue base than Cobot
        - label: Berkshire Grey (SPAC, 2021)
          value: 2700
          detail: AMR platform; SPAC valuation not sustained; cautionary public market precedent
        - label: Locus Robotics (peak, 2022)
          value: 2000
          detail: Most direct operational parallel; peak valuation before financial stress; cautionary tale
        - label: Boston Dynamics (Hyundai, 2021)
          value: 1100
          detail: Strategic robotics platform acquisition; different business model; brand and IP premium
        - label: Fetch Robotics (Zebra, 2021)
          value: 290
          detail: Logistics AMR acquisition by Zebra Technologies; no AI flywheel differentiation
        - label: 6 River Systems (Ocado, 2019)
          value: 262
          detail: Lower-bound comparable; warehouse AMR; 2019 transaction requires inflation adjustment
    approximationNotes: >-
      All values in USD millions. Valuation figures sourced from news reporting; some unconfirmed by official regulatory
      filings. Berkshire Grey post-SPAC market cap decline not shown. Symbotic valuation at SPAC merger; current public
      market cap differs. Brain Corporation (~$480M, 2022) omitted due to limited corroboration.
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
  - id: FV003
    type: flow
    title: Series C Investment Decision Flow
    layout: standard
    summary: >-
      Decision flow mapping the key diligence gates that determine whether a Series C investment commitment proceeds, is
      held pending remediation, or is declined based on data room findings.
    data:
      nodes:
        - id: series_b
          label: Series B Closed ($100M, April 2024)
          type: start
        - id: diligence
          label: Pre-Series C Diligence Initiated
          type: process
        - id: arr_check
          label: ARR Visibility Confirmed?
          type: decision
        - id: unit_econ
          label: RaaS Unit Economics Validated?
          type: decision
        - id: ip_check
          label: IP Portfolio and FTO Cleared?
          type: decision
        - id: invest
          label: Proceed to Series C Commitment
          type: end
        - id: hold
          label: Hold Pending Diligence Remediation
          type: end
        - id: pass
          label: Decline / Exit Position
          type: end
      edges:
        - from: series_b
          to: diligence
          label: Initiate NDA data room
        - from: diligence
          to: arr_check
          label: Review financial data
        - from: arr_check
          to: unit_econ
          label: Yes — ARR confirmed
        - from: arr_check
          to: hold
          label: No — ARR unclear
        - from: unit_econ
          to: ip_check
          label: Yes — economics validated
        - from: unit_econ
          to: hold
          label: No — economics unresolved
        - from: ip_check
          to: invest
          label: Yes — IP cleared
        - from: ip_check
          to: pass
          label: No — IP risk material
    approximationNotes: >-
      Decision flow is a simplified representation of a complex multi-party diligence process. Actual institutional due
      diligence involves parallel workstreams (technical, financial, commercial, legal) that are not fully represented
      in a linear flow. The three decision gates shown (ARR, unit economics, IP) are the three highest-priority blocking
      gates identified in this analysis.
    claimRefs:
      - CV019
      - CV020
      - CV022
      - CV025
      - CV026
      - CV031
  - id: FV004
    type: range
    title: Valuation / Return Range
    layout: standard
    summary: >-
      Low, base, and high valuation outcomes in USD millions across four scenarios for Collaborative Robotics, with
      assumptions anchoring each range endpoint.
    data:
      items:
        - label: Bear Case
          low: 300
          mid: 400
          high: 500
          detail: Hardware cost overruns or demand normalization; valued at inflation-adjusted AMR acquisition floor
        - label: Base Case
          low: 600
          mid: 850
          high: 1100
          detail: Analyst consensus; team and healthcare premium; partial ARR visibility in data room
        - label: Bull Case
          low: 1500
          mid: 2000
          high: 3000
          detail: Healthcare multi-facility scale; data flywheel confirmed; strong Series C step-up
        - label: Upside / Exit
          low: 3000
          mid: 4000
          high: 5000
          detail: Symbotic public market analog; scale deployment by 2028; premium AI robotics multiple at exit
    approximationNotes: >-
      All values in USD millions. Range endpoints are analyst estimates; mid values are probability-weighted central
      estimates within each scenario. No audited financial data is available to anchor these estimates — they represent
      analyst bracketing based on comparables and market benchmarks.
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
