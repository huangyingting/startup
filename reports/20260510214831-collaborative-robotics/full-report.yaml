      - number: '2.3'
        title: Market Drivers
        blocks:
          - type: paragraph
            body: |
              The AMR market is propelled by a confluence of structural and technological forces creating
              durable multi-year demand well beyond the 2026 time horizon. The most pressing structural
              driver is the persistent US warehouse labor shortage, with over 500,000 unfilled positions
              documented across logistics and fulfillment operations. This shortage stems from demographic
              shifts, post-pandemic labor market rebalancing, and the physically demanding nature of
              warehouse work, constituting a structural rather than cyclical gap that robotics can
              durably address. E-commerce growth compounds this pressure: same-day and next-day delivery
              expectations require dramatically higher warehouse throughput, and human labor cannot scale
              fast enough or cost-effectively to meet fulfillment SLAs. Supply chain professionals
              increasingly rank robotics as a top 2026 investment priority in direct response to these
              twin labor and throughput pressures.

              Technological drivers are equally important to the market's acceleration. Advances in AI and
              machine learning are enabling AMRs to navigate unstructured environments, recognize varied
              object types, and handle exceptions that previously required human intervention, reducing
              integration time and total deployment cost. The maturation of fleet management software
              allows operators to coordinate dozens of robots across complex facility layouts with minimal
              human oversight. The RaaS commercial model has lowered the financial barrier to adoption by
              converting capital expenditure into predictable monthly operating expense, enabling a new
              class of buyers — mid-market 3PLs, regional healthcare networks, and pharmaceutical
              manufacturers — who previously found robot deployment economically inaccessible. Labor
              productivity pressures in manufacturing add another dimension, driving adoption of
              collaborative robots for material handling, line feeding, and assembly assist tasks.
              Together, these structural and technological drivers create a robust and expanding demand
              environment for Cobot's platform through at least 2030.
            claimRefs:
              - CM007
              - CM008
              - CM015
              - CM018
              - CM027
              - CM031
              - CM032
          - type: table
            tableRef: TM002
