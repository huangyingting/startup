      - number: '3.2'
        title: Direct AMR Competitors — Collaborative Picking and Navigation
        blocks:
          - type: paragraph
            body: |
              Locus Robotics is the most directly comparable AMR competitor to Cobot, having pioneered the
              collaborative AMR and Robots-as-a-Service model in warehouse picking environments. Its LocusBots
              are designed to accompany human pickers through fulfillment center aisles, eliminating the walking
              burden and increasing picker productivity. Locus generated strong growth during the pandemic-era
              e-commerce surge, but conducted approximately 10% workforce reductions in 2024 as the market
              normalized post-pandemic, though its CEO publicly remained bullish on the long-term AMR opportunity.
              The company has raised substantial venture funding across multiple rounds but faces margin pressure
              from high hardware costs relative to software differentiation.

              6 River Systems, acquired by Ocado in 2019 for approximately $262 million, deploys "Chuck" AMRs
              primarily in e-commerce fulfillment centers, offering a collaborative picking model where the robot
              leads workers through optimized pick paths. The Ocado acquisition provides substantial resources
              and integration with Ocado's broader warehouse automation ecosystem, though it may constrain
              6 River's independence and go-to-market agility as a standalone competitor. Fetch Robotics, acquired
              by Zebra Technologies in 2021 for approximately $290 million, now operates as Zebra's AMR division
              with a broad portfolio spanning hospital logistics, manufacturing, and warehouse transport — and
              critically benefits from Zebra's extensive enterprise distribution network and established IT
              infrastructure relationships. Vecna Robotics focuses on autonomous forklifts and pallet-moving
              AMRs alongside orchestration software, targeting heavier payload use cases than Proxie addresses.
              GreyOrange is an AI-native warehouse robotics platform with particular market strength across Asia
              Pacific deployments, offering both goods-to-person and person-to-goods workflows with a software
              orchestration layer called Butler that manages multi-robot coordination. Chinese competitors Geek+
              and HAI Robotics dominate the Asian market with price-competitive hardware and are expanding
              internationally, representing a potential commoditization threat to North American players over
              the medium term.
