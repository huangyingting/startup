      - number: '6.3'
        title: Customer Concentration Risk
        blocks:
          - type: paragraph
            body: |
              With only five publicly confirmed customers, Collaborative Robotics faces meaningful
              customer concentration risk at its current pre-commercial scale. Three of the five
              named customers — Mayo Clinic, Moderna, and Owens & Minor — operate primarily in the
              healthcare and pharmaceutical verticals, creating vertical concentration of at least
              60% by customer count. If healthcare and pharma customers generate disproportionate
              revenue relative to the logistics customer (Maersk) and the hospital customer
              (Tampa General), the effective vertical concentration by revenue could exceed 60%,
              amplifying the impact of any healthcare sector regulatory change or procurement freeze.

              The cautionary tale of Locus Robotics is directly relevant. Locus, which was once the
              most prominent enterprise AMR vendor in the US, experienced significant customer
              normalization after the pandemic-era e-commerce surge subsided, with some major customers
              declining to renew or expand contracts as fulfillment volumes returned to pre-pandemic
              baselines. Locus subsequently reduced its workforce and faced financial stress, illustrating
              how enterprise AMR customer relationships can be disrupted by macro demand shifts rather
              than product quality failures. For Cobot, any of its five current customers experiencing
              budget freezes, strategic pivots, or deployment disappointments could be material to revenue
              at this early stage.

              Geographic concentration is an additional risk dimension: all five confirmed customers
              are US-based, meaning Cobot has zero publicly confirmed international revenue. Maersk,
              as a global shipping and logistics operator, represents the most natural pathway for
              international fleet expansion, but no international deployments have been announced.
              Mid-market and SMB customers are entirely absent from the confirmed customer list,
              meaning Cobot's entire disclosed revenue base is enterprise. No customer churn,
              renewal, or upsell data has been publicly disclosed, making it impossible to assess
              customer lifetime value or retention rate from external sources.
