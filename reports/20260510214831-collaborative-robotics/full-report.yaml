      - number: '2.6'
        title: Competitive Structure Overview
        blocks:
          - type: paragraph
            body: |
              The AMR and collaborative robotics market is highly fragmented, with more than 100 active
              vendors competing across hardware design, AI software, fleet management, and service delivery.
              This fragmentation reflects the market's relative youth — most enterprise AMR deployments are
              less than five years old — and the diversity of vertical applications, each with distinct
              requirements for payload, safety, speed, and system integration. Leading AMR vendors in the
              warehouse segment include Locus Robotics, 6 River Systems (acquired by Shopify), Fetch
              Robotics (acquired by Zebra Technologies), Geek+, Mobile Industrial Robots (MiR, acquired by
              Teradyne), and Seegrid. Humanoid robot entrants including Figure AI and Boston Dynamics are
              competing for adjacent use cases but are not yet at commercial scale for repetitive warehouse
              tasks. Cobot differentiates through its emphasis on collaborative safety, ease of deployment,
              AI-driven fleet learning, and a pure-play RaaS model that avoids the custom integration
              overhead typical of incumbent vendors.

              RaaS pricing for warehouse-grade AMR robots ranges from $3,000 to $10,000 per robot per
              month depending on payload, software capability, and service level commitments. Cobot does
              not publicly disclose its Proxie pricing, but the range is consistent with comparable market
              offerings. The company's competitive advantage centers on Brad Porter's Amazon Robotics
              leadership experience, a proprietary AI learning flywheel that improves robot performance
              as the fleet scales, and deployment relationships with marquee customers including Maersk,
              Moderna, and Mayo Clinic. Locus Robotics' workforce reductions in 2024 despite bullish
              market statements illustrate the margin pressure facing hardware-heavy AMR companies without
              differentiated software stacks, reinforcing Cobot's emphasis on AI-first fleet intelligence
              as its primary differentiation vector. Market consolidation through M&A is likely over the
              2025–2030 period as larger automation integrators seek proven software stacks and customer
              bases, potentially creating both exit and partnership opportunities for Cobot.
