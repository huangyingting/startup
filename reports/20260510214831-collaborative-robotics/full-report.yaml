    title: Proxie Technical Specifications
    columns:
      - Specification
      - Value / Detail
      - Competitive Context
    rows:
      - - Drive System
        - Glide 360 swerve drive — omnidirectional
        - Most AMR competitors use differential drive (Locus, 6 River) limiting lateral movement
      - - Perception
        - Scout Sense — cameras + LiDAR + ultrasonic (multi-modal fusion)
        - Single-sensor AMRs (camera-only or LiDAR-only) have blind spots in mixed environments
      - - Manipulation
