      - number: '4.3'
        title: Funding History and Capital Allocation
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics has completed three disclosed funding rounds totaling more than $140 million
              since its founding in 2022. The company's seed round of $10 million in 2022 provided initial capital
              for technology development, prototype construction, and early team building under Brad Porter's
              leadership. The Series A round of $30 million in summer 2023 was led by Sequoia Capital, with
              Alfred Lin joining the board — a significant signal of institutional conviction from one of Silicon
              Valley's most selective venture partnerships. Additional Series A investors included Khosla Ventures,
              Mayo Clinic (notable as both an investor and early customer), Neo, 1984 Ventures, MVP Ventures, and
              Calibrate Ventures, assembling a diverse investor syndicate spanning venture capital, strategic
              corporate investors, and specialized robotics-focused funds.

              The Series B round of $100 million, announced in April 2024 and led by General Catalyst, brought
              Paul Kwan to the board and added Bison Ventures, Industry Ventures, and Lux Capital as new
              investors alongside existing backers. General Catalyst's lead role signals confidence in Cobot's
              ability to scale enterprise deployments and execute on the RaaS commercial model. Total disclosed
              funding exceeds $140 million in fewer than two years from founding, placing Cobot among the most
              rapidly capitalized AMR startups in the current cohort. Form D filings with the SEC confirm these
              exempt offerings under Regulation D for both the Series A and Series B rounds.

              Capital allocation priorities at Cobot's scale typically include manufacturing ramp and robot
              unit economics improvement, enterprise sales and solutions engineering hiring, product engineering
              for Proxie feature expansion including Flex Grasp and AI software, Flywheel Program partner
              ecosystem development, and AI research and data infrastructure investment. Mayo Clinic's
              participation as both an investor and an early customer validates the healthcare vertical as a
              genuine revenue opportunity and provides a strategic partnership that can accelerate product
              development for hospital logistics use cases. The headcount growth from approximately 40
              employees at the time of the Series B (April 2024) to approximately 150 by early 2026 reflects
              rapid scaling across engineering, sales, and operations — implying material increases in operating
              expense that must be offset by ARR growth to preserve runway adequacy.
