  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics operates a pure Robots-as-a-Service (RaaS) business model, charging
              enterprise customers a recurring monthly subscription fee that covers hardware access, software
              updates, maintenance, and continuous AI improvements delivered over the life of the contract.
              This model differs fundamentally from traditional capital equipment sales, in which the customer
              bears upfront purchase, depreciation, and maintenance costs. By converting automation from a
              capital expenditure into an operating expenditure, Cobot expands its serviceable market to
              include mid-market operators that cannot justify large equipment purchases on their balance sheets
              and makes financial approval faster for procurement teams with operational budget flexibility.

              Industry benchmarks place RaaS pricing for warehouse-grade autonomous mobile robots in the range
              of $3,000 to $10,000 per robot per month, with pricing driven by payload complexity, software
              sophistication, service level agreement terms, and fleet size commitments. Cobot's Proxie sits
              in this range, offering AI-native capabilities including NVIDIA Orin compute and LLM-based fleet
              intelligence that justify premium positioning relative to legacy AMR platforms that add AI
              incrementally. The monthly subscription model generates predictable, recurring revenue streams
              with compounding fleet economics: each robot added to a customer fleet contributes incremental ARR,
              and fleet expansions within an existing customer relationship carry lower customer acquisition cost
              than new logo wins.

              Cobot's Flywheel Program — a structured deployment partner ecosystem — accelerates customer
              acquisition by enabling systems integrators, logistics consultants, and channel partners to
              recommend and deploy Proxie. This reduces Cobot's direct sales burden while expanding the
              addressable pipeline without proportional headcount growth. The Flywheel Program also generates
              deployment data from partner-managed fleets that enriches Cobot's AI training corpus. The RaaS
              model requires Cobot to finance the upfront cost of hardware for each deployed robot and recover
              that cost over the subscription contract term, creating working capital requirements that grow
              with fleet scale and making access to the $100M Series B capital critical to sustainable expansion.
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI027
