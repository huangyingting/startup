      - number: '7.6'
        title: Regulatory and Adverse Event Risk
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics operates in regulated environments — healthcare facilities,
              pharmaceutical manufacturing plants, and US logistics operations — that each carry distinct
              regulatory compliance requirements. The most directly applicable US standard is ANSI/A3
              R15.06-2025, which establishes safety requirements for industrial robots and collaborative
              robot deployments. Achieving and maintaining compliance with this standard involves testing,
              certification, and documentation costs that grow with each new deployment environment. As
              the standard was updated in 2025, any gaps between Proxie's current certification status and
              the revised requirements would require remediation before certain enterprise deployments can
              proceed.

              FDA oversight applies to Proxie deployments in pharmaceutical manufacturing environments
              such as Moderna's GMP facility. While Proxie is a logistics robot rather than a medical
              device, FDA-regulated manufacturing environments require that all equipment — including
              automated material handling systems — meet specific documentation, validation, and change-control
              requirements. Any OTA software update deployed to robots operating in a GMP environment must
              be validated before deployment under FDA 21 CFR Part 11 and related guidance, adding complexity
              to Cobot's standard update process.

              The most severe adverse event risk is a robot safety incident in a hospital setting. A collision
              injury, near-miss with a patient, or autonomous navigation failure in a clinical corridor at
              Mayo Clinic or Tampa General Hospital would generate immediate media attention, potential
              regulatory scrutiny, and customer procurement freezes across the healthcare vertical. Such an
              event could be existential for a company with only five named customers, three of which are in
              healthcare. Workers' rights organizations have begun targeting warehouse automation companies,
              and advocacy groups opposing AMR deployment in unionized logistics facilities could create
              reputational friction or legislative pressure. The European Union AI Act imposes risk-based
              compliance requirements on AI-driven autonomous systems, which could affect Cobot's ability
              to deploy in EU jurisdictions without additional compliance investment.
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR024
