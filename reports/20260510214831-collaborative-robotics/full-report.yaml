      - number: '6.2'
        title: Deployment Evidence and Traction
        blocks:
          - type: paragraph
            body: |
              The public evidence base for Cobot's customer deployments is anchored by two official
              press releases: the April 2024 Series B funding announcement, which named all five
              enterprise customers as active or committed deployments, and the November 2024 Proxie
              product launch press release, which confirmed the same five customers in the context of
              the product's commercial availability. Both releases are sourced directly from PR Newswire
              as official company communications and are corroborated by independent trade publications
              including The Robot Report, VentureBeat, GeekWire, and Modern Materials Handling, each
              of which covered the Series B and Proxie launch with their own editorial framing.

              What the public evidence does not provide is granular deployment data: no fleet sizes
              have been disclosed for any of the five customers, no annual contract values have been
              published, no deployment footprint maps have been released, and no case studies with
              operational performance metrics have been made public. The absence of this detail is
              consistent with the pre-commercial scale of the company and the standard practice of
              enterprise SaaS and RaaS vendors protecting customer contract terms as confidential.
              Mayo Clinic's participation as both investor (Series A) and named customer represents
              the most publicly validated deployment relationship, with multiple independent sources
              confirming the dual investor-customer role. No customer has provided a public testimonial,
              press quote, or case study as of the report date, leaving deployment depth — fleet sizes,
              utilization rates, ROI outcomes — entirely opaque to external analysis.

              From an investor perspective, the five named enterprise customers at a 2022-founded
              company with a product launched in November 2024 represent a strong pre-commercial
              traction signal. Enterprise AMR buyers typically run multi-month pilots before committing
              to fleet deployments, and all five named customers had reached a stage sufficient to be
              publicly named at launch, suggesting active operational deployments rather than
              mere letters of intent or pilot agreements.
