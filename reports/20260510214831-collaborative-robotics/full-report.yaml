            title: NVIDIA Orin Supply Concentration Creates Technology Risk
            body: >
              Proxie's edge compute platform depends entirely on NVIDIA Jetson Orin modules, which are subject to the
              broader NVIDIA supply constraints that have affected the AI chip market since 2023. A significant supply
              disruption or NVIDIA prioritization of higher-margin data center products over embedded compute modules
              could delay Proxie production ramp, increase hardware cost, or force a costly platform migration. Cobot
              has not publicly disclosed any supply agreement terms or alternative compute contingencies.
            calloutType: risk
            claimRefs:
