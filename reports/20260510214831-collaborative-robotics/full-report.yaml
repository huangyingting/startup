chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics, incorporated in 2022 and headquartered in Santa Clara, California
              with a secondary office in Seattle, Washington, develops and deploys practical collaborative
              autonomous mobile robots — commonly referred to as "cobots" — for real-world industrial
              environments. The company markets itself under the brand "Cobot" and operates the domain
              co.bot. Its flagship and first commercially deployed product is Proxie, a mobile manipulator
              robot that performs material handling tasks such as moving carts, boxes, and totes alongside
              human workers in warehouses, healthcare facilities, and logistics centers. Cobot's stated
              mission is to create a world where trustworthy cobots seamlessly integrate into areas of
              useful work, from manufacturing and logistics to healthcare and municipal services.

              The company's primary commercial model is Robots-as-a-Service (RaaS), where customers pay
              recurring subscription fees that bundle the robot hardware, deployment, fleet management
              software, maintenance, and AI updates. This model eliminates large upfront capital expenditure
              for customers and provides Cobot with predictable recurring revenue. A supplementary
              "Flywheel Program" engages customers as deployment partners, building a virtuous cycle where
              more robots in the field produce more AI training data, improving robot capability and
              reducing per-unit cost over time. The company does not publicly disclose RaaS pricing for
              Proxie, but the broader cobot RaaS market for warehouse-grade robots typically ranges from
              $3,000–$10,000 per robot per month depending on payload capacity, service levels, and
              deployment complexity. As a privately held company, Cobot's revenue, gross margins, and
              profitability metrics are not publicly disclosed.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
