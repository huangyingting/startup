  - id: FR002
    type: dag
    title: Risk transmission map
    layout: standard
    summary: >-
      Directed acyclic graph showing how primary risk factors at Collaborative Robotics transmit through the
      organization to threaten revenue, customers, financing, and valuation outcomes.
    data:
      nodes:
        - id: ai_failure
          label: |-
            AI Navigation Failure
            (sensor degradation or OTA regression)
          type: risk
        - id: safety_incident
          label: |-
            Hospital Safety Incident
            (injury or near-miss in clinical setting)
          type: risk
        - id: series_c
          label: |-
            Series C Fundraising
            (timing and valuation pressure)
          type: process
        - id: healthcare_customers
          label: |-
            Healthcare Customer Base
            (Mayo Clinic, Tampa General, Owens & Minor)
          type: process
        - id: revenue
          label: |-
            Revenue and ARR
            (undisclosed; RaaS subscription)
          type: output
        - id: valuation
          label: |-
            Valuation and Investor Returns
            (Series C price; exit multiple)
          type: output
        - id: key_person
          label: |-
            Brad Porter Departure
            (key-person concentration risk)
          type: risk
      edges:
        - from: ai_failure
          to: safety_incident
          label: Triggers
        - from: safety_incident
          to: healthcare_customers
          label: Procurement freeze
        - from: healthcare_customers
          to: revenue
