      - number: '6.4'
        title: Vertical Expansion Potential
        blocks:
          - type: paragraph
            body: |
              Cobot's current customer mix — one global logistics company, two academic medical centers,
              one pharmaceutical manufacturer, and one healthcare product distributor — reflects a
              deliberate early strategy of targeting regulated, high-value environments where the
              collaborative, cage-free design of Proxie provides the clearest operational advantage
              over traditional industrial robots. The same characteristics that make healthcare and
              pharma attractive early markets — rigorous safety requirements, premium pricing tolerance,
              preference for trusted partners, long contract relationships — also create expansion
              opportunities into adjacent verticals with similar profiles.

              The global logistics and 3PL market is the broadest addressable vertical for Proxie.
              AMR adoption in warehouse and distribution center environments is growing at approximately
              14% CAGR through 2030, according to multiple analyst forecasts. Maersk's involvement as
              an anchor logistics customer creates a reference case that can be leveraged for conversations
              with other 3PL operators including DHL, FedEx, UPS, and regional 3PLs. The pharmaceutical
              manufacturing vertical — validated by Moderna's deployment — offers significant expansion
              opportunities given the FDA regulatory requirements that create procurement barriers for
              less mature competitors without GMP environment track records.

              Hospital and healthcare system logistics automation represents one of the fastest-growing
              AMR sub-verticals, driven by rising labor costs in clinical settings, Joint Commission
              requirements for infection control, and the operational complexity of managing materials
              across multi-floor hospital campuses. Owens & Minor's position as a healthcare product
              distributor servicing over 4,000 hospitals creates a potential channel partnership
              opportunity where Cobot could reach hospital customers through the Owens & Minor
              distribution relationship. The Flywheel Program — which converts customers into deployment
              partners — is particularly well-suited to healthcare networks where a health system's
              positive experience creates referral pathways to peer institutions. Manufacturing,
              retail fulfillment, and municipal services represent longer-term expansion verticals
              that Cobot has signaled interest in but has not yet confirmed with named customers.
