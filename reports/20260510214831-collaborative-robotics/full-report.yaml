            title: Series B Capitalization Places Cobot Among Most Funded AMR Startups
            body: >
              The $100 million Series B led by General Catalyst, bringing total funding to over $140 million, places
              Collaborative Robotics among the most highly capitalized autonomous mobile robot startups in the 2022–2024
              cohort. This capital position funds 18–36 months of runway at typical hardware robotics burn rates and
              provides the working capital cushion needed to finance the upfront robot hardware cost recovery inherent
              in the RaaS model — a structural requirement that under-capitalized competitors cannot match.
