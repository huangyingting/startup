      - number: '7.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Brad Porter Key-Person Concentration Is the Highest-Severity Organizational Risk
            body: >
              Brad Porter's fourteen-year Amazon robotics career and public credibility as the engineer who scaled the
              world's largest warehouse robot fleet are the primary anchors of Cobot's investment thesis. No other
              executive in the company carries comparable visibility or enterprise robotics domain expertise. A CEO
              departure event — however improbable — would simultaneously affect fundraising credibility, customer
              relationship continuity, and team retention. Investors should require explicit succession planning
              documentation, key-man insurance, and evidence of a functional C-suite below the CEO level before a Series
              C commitment.
            calloutType: risk
            claimRefs:
              - CR016
              - CR033
          - type: callout
            title: RaaS Capital Intensity Creates Structural Financial Leverage Risk at Scale
            body: >
              The Robots-as-a-Service model requires Cobot to manufacture and deploy physical robots before receiving
              subscription revenue — and to carry that hardware on balance sheet across multi-year contract periods. At
              any meaningful fleet size (500+ deployed robots), the working capital requirement becomes substantial.
              Without publicly disclosed revenue or unit economics, it is impossible to assess whether the current
              capital base is sufficient to reach the deployment density required for subscription revenue to cover
              operating costs. This is the most material financial risk for the investment thesis and deserves explicit
              quantification in Series C diligence.
            calloutType: risk
            claimRefs:
              - CR014
              - CR012
              - CR015
          - type: callout
            title: Healthcare Vertical Concentration Amplifies Regulatory and Safety Incident Risk
            body: >
              Three of Cobot's five publicly confirmed customers operate in healthcare settings — Mayo Clinic, Tampa
              General Hospital, and Owens & Minor. A serious robot navigation failure or collision incident in a
              clinical environment would generate national media coverage, potential FDA inquiry, and procurement
              freezes across the healthcare vertical. With only five named customers at this stage, losing or pausing
              three healthcare relationships simultaneously would be commercially catastrophic regardless of the
              company's underlying technology quality. Healthcare deployment is simultaneously Cobot's strongest
              validation and its greatest concentration risk.
            calloutType: risk
            claimRefs:
              - CR021
              - CR020
              - CR019
          - type: callout
            title: Locus Robotics Cautionary Tale Is Directly Applicable to Cobot's Risk Profile
            body: >
              Locus Robotics, once valued at over $2 billion and backed by comparable venture investors, experienced
              severe customer normalization and workforce reduction after the post-pandemic AMR demand contraction. The
              parallels to Cobot's current position — hardware dependency, enterprise concentration, RaaS model,
              pre-profitability — make Locus an important reference scenario for downside planning. Cobot's healthcare
              vertical diversification provides some insulation against the logistics-specific normalization that hurt
              Locus, but the structural financial risk of RaaS at scale is analogous.
            calloutType: insight
            claimRefs:
              - CR034
              - CR035
              - CR008
          - type: callout
            title: Require ANSI/A3 R15.06-2025 Gap Analysis and Compliance Roadmap Before Series C
            body: >
              The 2025 revision of the primary US collaborative robot safety standard creates an active compliance
              obligation for all AMR vendors including Cobot. Before committing to Series C, investors should require a
              complete gap analysis comparing Proxie's current safety certification status against the updated 2025
              requirements, an estimated cost and timeline for any required remediation, and confirmation of FDA
              change-control procedures for OTA updates in GMP-regulated deployment environments. This is non-negotiable
              for healthcare customer retention and new hospital procurement.
            calloutType: recommendation
            claimRefs:
              - CR019
              - CR024
          - type: callout
            title: NVIDIA Jetson Orin Availability Assumed Stable — Monitor Quarterly
            body: >
              This analysis assumes that NVIDIA Jetson Orin availability remains stable at current levels through the
              Series C fundraising period. If GPU chip allocation to robotics OEM customers is restricted in favor of
              datacenter demand — as occurred in the 2022–2023 AI GPU shortage — Cobot's production throughput could be
              materially impacted. Investors should monitor NVIDIA's embedded computing allocation announcements and
              confirm whether Cobot holds firm supply commitments or is operating on spot-market allocations.
            calloutType: assumption
            claimRefs:
              - CR009
              - CR036
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Last-Known Valuation and Funding Benchmarks
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics has raised a total of more than $140 million across three consecutive
              funding rounds since its founding in 2022. The seed round of $10 million was anchored by
              Khosla Ventures and Neo. The $30 million Series A, led by Sequoia Capital with Mayo Clinic
              as a strategic co-investor, followed in summer 2023. The $100 million Series B, closed in
              April 2024 and led by General Catalyst, drew participation from Bison Ventures, Industry
              Ventures, Lux Capital, Sequoia Capital, Khosla Ventures, Mayo Clinic, Neo, 1984 Ventures,
              MVP Ventures, and Calibrate Ventures. No post-money valuation has been publicly disclosed
              for any of these rounds, which is consistent with standard practice for pre-commercial
              hardware robotics companies that have not yet disclosed audited revenue figures.

              Analyst databases including Crunchbase and PitchBook estimate the post-Series B valuation at
              $600 million to $1.1 billion. This range reflects the premium accorded to AI-enabled robotics
              platform companies with top-decile venture backing and documented enterprise customer
              deployments. Pre-money estimates for the Series B sit in the $500 million to $900 million
              range based on typical dilution conventions for late-stage pre-revenue hardware robotics rounds
              in the 2023-2024 venture market environment. The autonomous mobile robot market growing at a
              14.4% CAGR through 2030 provides a supportive demand backdrop that underpins the upper end
              of this valuation range. With five named enterprise customers — Maersk, Mayo Clinic, Moderna,
              Owens and Minor, and Tampa General Hospital — and the commercial launch of Proxie in November
              2024, the company has progressed from pure pre-revenue status to early-commercial validation,
              which is a meaningful distinction for valuation analysis even in the absence of disclosed ARR.

              Capital efficiency benchmarking suggests $140 million to reach five enterprise customers and
              launch a commercially deployed product is broadly consistent with pre-commercial hardware
              startup benchmarks for companies at this stage. Hardware robotics companies that achieve
              commercial deployment without a public blow-up — a distinction from the Locus Robotics and
              Berkshire Grey trajectories — command premium multiples in subsequent fundraising rounds.
              Any investor contemplating a Series C position must model valuation relative to these
              comparables while accounting for the absence of any publicly available financial data.
