      - number: '7.4'
        title: Financial and Funding Risk
        blocks:
          - type: paragraph
            body: |
              Collaborative Robotics has raised $140 million across its seed, Series A, and Series B
              rounds, a strong capital base for a hardware robotics startup at this stage. However, no
              revenue figures, gross margins, unit economics, or burn rate data have been publicly
              disclosed, making it impossible to independently assess the company's financial health,
              path to profitability, or runway remaining as of the report date. The absence of disclosed
              revenue is consistent with the company's pre-commercial stage, but it creates a material
              evidence gap for any prospective investor.

              The RaaS model carries inherent capital intensity. Collaborative Robotics must manufacture
              and deploy physical robots before receiving subscription revenue, and the subscription revenue
              is typically spread over two-to-five year contract periods rather than recognized upfront.
              At any meaningful scale — say 500–1,000 deployed robots — the working capital required to
              fund hardware production, deployment, and maintenance before monthly RaaS payments reach a
              profitable run rate is substantial. This is structurally different from a software SaaS
              business where marginal delivery costs are near zero.

              The fundraising environment for hardware companies has been significantly more difficult in
              2023–2025 than the 2020–2022 peak, with multiple hardware robotics companies experiencing
              down rounds, acqui-hires, or shutdowns. Locus Robotics, once valued at over $2 billion,
              experienced severe financial stress requiring workforce reductions. While Cobot's investor
              syndicate — led by General Catalyst and Sequoia Capital — includes world-class venture firms
              capable of supporting a Series C, the valuation expectation set by the Series B creates
              execution risk. Investors need demonstrable commercial progress to justify a Series C at or
              above the Series B valuation level. The timing pressure to close a Series C before the
              Series B runway is exhausted represents among the highest-priority risks in this diligence.
            claimRefs:
              - CR012
              - CR013
              - CR014
              - CR015
              - CR032
