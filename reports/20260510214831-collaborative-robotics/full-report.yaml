            body: >
              Locus Robotics, the company that pioneered the warehouse collaborative AMR RaaS model, conducted
              approximately 10% workforce reductions in 2024 amid post-pandemic demand normalization and margin pressure
              from hardware-heavy cost structures. This trajectory is a direct risk analog for Cobot, which operates the
              same business model at an earlier commercial stage. The risk is highest if Cobot's hardware COGS recovery
