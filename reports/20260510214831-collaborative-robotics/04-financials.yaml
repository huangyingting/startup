company:
  name: Collaborative Robotics
chapter:
  number: 4
  title: Financial Analysis
  summary: >
    Collaborative Robotics has raised over $140M across seed, Series A, and Series B rounds, with
    a $100M Series B led by General Catalyst in April 2024 establishing the company as a well-capitalized
    entrant in the autonomous mobile robot market. Cobot operates a Robots-as-a-Service (RaaS) subscription
    model priced at $3,000–$10,000 per robot per month, targeting gross margins of 50–65% at scale, though
    revenue, ARR, and unit economics remain undisclosed as a private company. The path to profitability
    depends on growing the deployed fleet, expanding the Flywheel data advantage, and achieving hardware
    breakeven — a trajectory typical of Series C or Series D for hardware-centric robotics startups.

