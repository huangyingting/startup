callouts:
  - calloutType: strength
    title: "RaaS Model Generates Predictable Recurring Revenue with Fleet Compounding"
    body: >
      Cobot's pure RaaS subscription model converts each deployed robot into a predictable monthly
      revenue stream, with fleet expansions within existing accounts delivering incremental ARR at
      lower customer acquisition cost than new logo wins. The compounding effect of growing fleet size
      across enterprise accounts creates a durable revenue base that is structurally superior to
      one-time capital equipment sales and reduces cash flow volatility compared to project-based
      automation contracts.
    claimRefs: [CI007, CI031, CI027]

  - calloutType: strength
    title: "Series B Capitalization Places Cobot Among Most Funded AMR Startups"
    body: >
      The $100 million Series B led by General Catalyst, bringing total funding to over $140 million,
      places Collaborative Robotics among the most highly capitalized autonomous mobile robot startups
      in the 2022–2024 cohort. This capital position funds 18–36 months of runway at typical hardware
      robotics burn rates and provides the working capital cushion needed to finance the upfront robot
      hardware cost recovery inherent in the RaaS model — a structural requirement that under-capitalized
      competitors cannot match.
    claimRefs: [CI023, CI006, CI018]

  - calloutType: risk
    title: "Revenue and Unit Economics Are Entirely Undisclosed — Underwriting Requires Private Data"
    body: >
      Collaborative Robotics does not publicly disclose any financial operating data: revenue, ARR,
      gross margin, CAC, churn rate, or working capital position are all unavailable from public sources.
      This creates a complete evidence gap for financial underwriting. All unit economics referenced
      in this chapter are industry benchmark estimates, not verified Cobot-specific data. Any investment
      or partnership decision must be conditioned on access to audited financials, ARR bridge, and unit
      economics dashboard under NDA.
    claimRefs: [CI011, CI013, CI015]

  - calloutType: risk
    title: "Locus Robotics 2024 Workforce Reduction Is a Material Risk Analog for Hardware RaaS"
    body: >
      Locus Robotics, the company that pioneered the warehouse collaborative AMR RaaS model, conducted
      approximately 10% workforce reductions in 2024 amid post-pandemic demand normalization and margin
      pressure from hardware-heavy cost structures. This trajectory is a direct risk analog for Cobot,
      which operates the same business model at an earlier commercial stage. The risk is highest if
      Cobot's hardware COGS recovery timeline extends beyond the Series B runway, requiring another
      capital raise before reaching gross margin sustainability.
    claimRefs: [CI028, CI034, CI033]

  - calloutType: insight
    title: "ANSI/A3 R15.06-2025 Compliance Creates Both Cost and Competitive Credential"
    body: >
      ANSI/A3 R15.06-2025, which establishes binding safety requirements for collaborative robot
      deployments effective 2025, creates a dual financial dynamic for Cobot: compliance requires
      engineering and certification investment that raises development cost, but certified compliance
      provides a sales credential in regulated verticals including healthcare, pharmaceutical
      manufacturing, and food and beverage — where Cobot already operates with Mayo Clinic and Moderna.
      Vendors that clear the certification threshold early gain a durable deployment advantage in
      high-value regulated accounts.
