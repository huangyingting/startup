summary:
  headline: >
    Collaborative Robotics is an early-commercial-stage AMR company with exceptional founding pedigree, strong
    enterprise customer proof, and a well-funded runway, positioned to compete in a large and growing warehouse
    automation market — but hardware economics, competitive pressure, and key-person concentration warrant a watchful
    posture with a conditional buy recommendation subject to financial and IP diligence.
