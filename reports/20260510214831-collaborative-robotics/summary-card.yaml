  topStrengths:
    - >-
      World-class founder pedigree: Brad Porter architected Amazon's 750,000+ robot deployment as VP Robotics and served
      as CTO of Scale AI — directly applicable domain expertise and established investor relationships that accelerate
      credibility and BD.
    - >-
      Practical non-humanoid design: Proxie avoids the hype and technical risk of humanoid robots, deploying NVIDIA
      Orin-powered AI into a form factor optimized for real warehouse and hospital workflows — reducing time-to-value
      vs. humanoid competitors.
    - >-
      Multi-vertical beachhead: Five named enterprise customers across three verticals (logistics, healthcare, pharma)
      within ~18 months of commercial launch signals strong early product-market fit and diversification beyond pure
      warehouse automation.
    - >-
      RaaS model alignment: Recurring subscription removes CapEx barrier for customers, generates predictable revenue,
      and creates long-term data flywheel — the Flywheel partner program accelerates scale without proportional
      headcount growth.
    - >-
      High-pedigree investor syndicate: General Catalyst, Sequoia Capital, and Khosla Ventures alongside strategic
      investor Mayo Clinic signal institutional conviction and open enterprise channel relationships.
  topRisks:
    - >-
      Key-person concentration: Brad Porter is simultaneously the founding engineer, primary strategist, lead
      fundraiser, and market-facing voice — an exit or extended absence could materially disrupt the company's
      trajectory.
    - >-
      Hardware economics uncertainty: Gross margins in early-stage hardware RaaS businesses are typically low or
      negative until fleet scale; Cobot's unit economics are not disclosed and may require additional capital to reach
      profitability.
    - >-
      Competitive pressure from scaled incumbents: Fetch Robotics (Zebra), 6 River Systems (Ocado), and Amazon Robotics
      all have substantial capital, installed fleets, and technology depth; a pricing war or product leapfrog could
      compress Cobot's window.
    - >-
      AMR market normalization risk: Post-pandemic normalization reduced demand; Locus Robotics had layoffs ~2024
      despite bullish market rhetoric — signaling that warehouse automation adoption timelines can disappoint.
    - >-
      IP and patent exposure: No granted patents have been publicly identified for Cobot's core technology; if Proxie's
      key innovations are not adequately protected, large-cap competitors can replicate the design.
  unresolvedGaps:
    - Revenue, ARR, and gross margin not disclosed; unit economics cannot be assessed without audited financials.
    - >-
      Full capitalization table, SAFE/note terms, investor anti-dilution provisions, and liquidation preferences not
      publicly available.
    - >-
      Patent portfolio not confirmed; USPTO search did not surface granted patents under 'Collaborative Robotics' or
      'Cobot' as assignee.
    - Customer contract terms, ACV, expansion rates, and churn not disclosed.
    - Manufacturing partner, COGS structure, and hardware supply chain resilience not documented publicly.
