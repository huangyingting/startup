callouts:
  - calloutType: risk
    title: "Brad Porter Key-Person Concentration Is the Highest-Severity Organizational Risk"
    body: >
      Brad Porter's fourteen-year Amazon robotics career and public credibility as the engineer
      who scaled the world's largest warehouse robot fleet are the primary anchors of Cobot's
      investment thesis. No other executive in the company carries comparable visibility or
      enterprise robotics domain expertise. A CEO departure event — however improbable — would
      simultaneously affect fundraising credibility, customer relationship continuity, and team
      retention. Investors should require explicit succession planning documentation, key-man
      insurance, and evidence of a functional C-suite below the CEO level before a Series C
      commitment.
    claimRefs: [CR016, CR033]

  - calloutType: risk
    title: "RaaS Capital Intensity Creates Structural Financial Leverage Risk at Scale"
    body: >
      The Robots-as-a-Service model requires Cobot to manufacture and deploy physical robots
      before receiving subscription revenue — and to carry that hardware on balance sheet across
      multi-year contract periods. At any meaningful fleet size (500+ deployed robots), the
      working capital requirement becomes substantial. Without publicly disclosed revenue or unit
      economics, it is impossible to assess whether the current capital base is sufficient to
      reach the deployment density required for subscription revenue to cover operating costs.
      This is the most material financial risk for the investment thesis and deserves explicit
      quantification in Series C diligence.
    claimRefs: [CR014, CR012, CR015]

  - calloutType: risk
    title: "Healthcare Vertical Concentration Amplifies Regulatory and Safety Incident Risk"
    body: >
      Three of Cobot's five publicly confirmed customers operate in healthcare settings —
      Mayo Clinic, Tampa General Hospital, and Owens & Minor. A serious robot navigation
      failure or collision incident in a clinical environment would generate national media
      coverage, potential FDA inquiry, and procurement freezes across the healthcare vertical.
      With only five named customers at this stage, losing or pausing three healthcare
      relationships simultaneously would be commercially catastrophic regardless of the
      company's underlying technology quality. Healthcare deployment is simultaneously
      Cobot's strongest validation and its greatest concentration risk.
    claimRefs: [CR021, CR020, CR019]

  - calloutType: insight
    title: "Locus Robotics Cautionary Tale Is Directly Applicable to Cobot's Risk Profile"
    body: >
      Locus Robotics, once valued at over $2 billion and backed by comparable venture investors,
      experienced severe customer normalization and workforce reduction after the post-pandemic
      AMR demand contraction. The parallels to Cobot's current position — hardware dependency,
      enterprise concentration, RaaS model, pre-profitability — make Locus an important
      reference scenario for downside planning. Cobot's healthcare vertical diversification
      provides some insulation against the logistics-specific normalization that hurt Locus,
      but the structural financial risk of RaaS at scale is analogous.
    claimRefs: [CR034, CR035, CR008]

  - calloutType: recommendation
    title: "Require ANSI/A3 R15.06-2025 Gap Analysis and Compliance Roadmap Before Series C"
    body: >
      The 2025 revision of the primary US collaborative robot safety standard creates an active
      compliance obligation for all AMR vendors including Cobot. Before committing to Series C,
      investors should require a complete gap analysis comparing Proxie's current safety
      certification status against the updated 2025 requirements, an estimated cost and timeline
      for any required remediation, and confirmation of FDA change-control procedures for OTA
      updates in GMP-regulated deployment environments. This is non-negotiable for healthcare
      customer retention and new hospital procurement.
    claimRefs: [CR019, CR024]

  - calloutType: assumption
    title: "NVIDIA Jetson Orin Availability Assumed Stable — Monitor Quarterly"
    body: >
      This analysis assumes that NVIDIA Jetson Orin availability remains stable at current
      levels through the Series C fundraising period. If GPU chip allocation to robotics OEM
      customers is restricted in favor of datacenter demand — as occurred in the 2022–2023 AI
      GPU shortage — Cobot's production throughput could be materially impacted. Investors
      should monitor NVIDIA's embedded computing allocation announcements and confirm whether
      Cobot holds firm supply commitments or is operating on spot-market allocations.
    claimRefs: [CR009, CR036]

