company:
  name: Collaborative Robotics
chapter:
  number: 7
  title: Risks
  summary: >
    Collaborative Robotics faces a multi-dimensional risk landscape spanning technology execution,
    competitive dynamics, hardware supply chain, financial sustainability, organizational concentration,
    and regulatory compliance. The company's AI-driven autonomous mobile robot platform depends on
    sensor reliability and software stability that remains untested at scale in high-uptime enterprise
    environments. Competitive threats are real: Amazon Robotics could commercialize its internal
    fleet technology, Chinese AMR vendors such as Geek+ and HAI Robotics are expanding aggressively
    into US markets, and large technology platforms including NVIDIA itself could enter the robotics
    market directly. Hardware supply chain risks center on NVIDIA Jetson Orin availability and
    contract manufacturing dependency. Financially, Cobot's $140M total funding must sustain a
    hardware-plus-software-plus-service business model with no publicly disclosed revenue, and the
    RaaS model requires carrying hardware on balance sheet — a capital-intensive structure that
    intensifies Series C timing pressure. Key-person concentration on CEO Brad Porter is a primary
    organizational risk. Regulatory compliance requirements — particularly ANSI/A3 R15.06-2025 and
    FDA oversight in healthcare settings — add cost and timeline pressure. A serious robot safety
    incident in a clinical setting would be reputationally catastrophic. These risks are manageable
    with experienced investors and a capable leadership team, but they require explicit diligence
    attention before a Series C commitment.

