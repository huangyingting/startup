    - id: CR001
      statement: "Collaborative Robotics' AI navigation system depends on multi-modal sensor fusion combining LiDAR, depth cameras, and inertial measurement units to navigate dynamically changing operational spaces; AI navigation failures in cluttered or dynamically changing environments remain a real operational risk for all AMR vendors including Cobot."
      type: inferred
      topic: technology-risk
