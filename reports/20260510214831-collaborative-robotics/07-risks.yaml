      confidence: medium
      freshness: current
      answersQuestionRefs: [QR001, QR018]

    - id: CR002
      statement: "Multi-modal sensor failure — including LiDAR calibration drift, camera lens contamination in pharmaceutical clean rooms, or thermal stress in wide-temperature-range warehouse environments — can trigger navigation failures or force Proxie robots into recovery mode, reducing throughput and eroding customer trust."
      type: inferred
      topic: technology-risk
      sourceRefs: [SR018, SR024, SR011]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR001, QR016]

    - id: CR003
      statement: "Fleet-wide over-the-air (OTA) software updates introduce a fleet-wide regression risk that is distinct from hardware failures affecting a single unit; a single bad OTA update can simultaneously degrade all deployed Proxie robots, creating a higher blast-radius failure mode than conventional hardware defects."
      type: inferred
      topic: technology-risk
      sourceRefs: [SR018, SR016, SR024]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QR001, QR024]

