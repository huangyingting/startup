            body: >
              Cobot 客户部署的公开证据基础锚定在两份官方新闻稿：2024 年 4 月 Series B 融资公告点名全部五家企业客户为活跃或已承诺部署，2024 年 11 月 Proxie
              产品发布新闻稿则在产品商业可用性的语境下确认同一组五家客户。两份公告均直接来自 PR Newswire，属于公司官方沟通，并得到独立行业媒体佐证，包括 The Robot
              Report、VentureBeat、GeekWire 和 Modern Materials Handling；这些媒体都以各自编辑框架报道了 Series B 和 Proxie 发布。


              公开证据没有提供的是细粒度部署数据：五家客户中没有任何一家披露车队规模，没有公布年度合同价值，没有发布部署足迹地图，也没有公开带运营绩效指标的案例研究。缺少这些细节，与公司仍处于商业化前规模阶段一致，也符合企业
              SaaS 和 RaaS 供应商将客户合同条款保密的常规做法。Mayo Clinic 同时作为投资人（Series
              A）和具名客户，是公开验证程度最高的部署关系，多家独立来源确认了它的投资人兼客户双重角色。截至报告日期，没有任何客户提供公开证言、新闻引语或案例研究，因此部署深度——车队规模、利用率、ROI
              结果——对外部分析完全不透明。


              从投资人视角看，一家 2022 年成立、2024 年 11 月才发布产品的公司拥有五家具名企业客户，是很强的商业化前牵引力信号。企业 AMR
