      - number: '2.4'
        title: 壁垒与风险
        blocks:
          - type: paragraph
            body: >
              尽管顺风明显，AMR 市场仍面临实质性采用壁垒和风险因素，会压低近期增长预期，也需要任何投资尽调仔细评估。集成复杂度是企业最常提到的壁垒：将 AMR
              车队接入遗留仓库管理系统（WMS）、仓库执行系统（WES）和企业资源规划（ERP）平台，需要显著 IT 和运营投入。许多 2010 年前建成的设施缺少让 AMR
              部署变得直接的网络基础设施、传感器覆盖或规则化平面布局，这会拉长时间线并抬高总实施成本。投资回报不确定性是第二大壁垒——企业买方通常要求自动化资本在 2–4 年内回本；对于 Cobot 的 Proxie
              这类新平台，独立验证的 ROI 基准仍有限，买方不得不依赖供应商提供的预测。


              监管和安全合规又增加了摩擦。协作机器人部署必须符合 ANSI/A3 R15.06-2025 和 ISO 10218:2025
              标准，覆盖速度限制、力阈值、工作空间划分和急停协议。跨多个司法辖区处理合规，尤其是在还受 FDA 和 OSHA 额外监管的医疗设施中，会增加成本和部署时间复杂度。竞争动态带来进一步风险：全球市场有 100+
              家供应商，包括 Locus Robotics、6 River Systems、Geek+ 和 MiR 等资金充足的 incumbents，它们拥有多年部署经验和既有客户关系。AMR
              硬件若持续商品化，可能压缩利润率，并削弱 Cobot 单位经济所依赖的 RaaS 定价溢价。Locus Robotics 在 2024 年裁员说明，即便市场增长，缺少差异化软件栈的硬件重 AMR
              公司也面临真实利润率压力。
            claimRefs:
              - CM013
              - CM016
              - CM020
              - CM021
              - CM024
              - CM034
      - number: '2.5'
        title: 垂直与地理格局
        blocks:
          - type: paragraph
            body: >
              AMR 市场分布在多个工业和商业垂直，其中物流和仓储占全球需求最大份额，约为
              40–45%。电商履约、第三方物流（3PL）和配送中心运营贡献了主要需求，用例包括货到人拣选、自主推车运输和跨楼层物料移动。医疗是第二大高增长垂直，预计 CAGR 为
              18%+，由非接触式药品运输、无菌物资物流，以及长期护理人手短缺下医院系统的劳动力成本下降需求驱动。Cobot 的 Proxie 已在 Mayo Clinic、Tampa General Hospital 和
              Owens and Minor 的医疗场景部署，为这一高要求细分提供了早期商业验证。制药和生命科学是新兴高增长垂直，驱动力来自洁净室兼容 AMR
              要求和库存可追溯性规定。制造、零售和机场物流构成更广阔的垂直机会图谱。


              按地理看，北美约占全球 AMR 市场 35%，由电商渗透、仓储劳动力成本压力，以及成熟风投资本生态推动，能够支持快速跟进式部署。欧洲约占需求 28%，驱动力包括严格劳动法规、Industry 4.0
              政府要求，以及与可持续性挂钩的物流现代化。亚太是增长最快地区，由中国、日本、韩国和新兴东南亚制造中心带动；不过该地区竞争动态由 Geek+ 和 Hai Robotics 等本土玩家主导。Cobot
              当前市场进入以美国为核心，这让其在北美市场位置较好，品牌和企业关系带来近期优势；同时，它短期接触亚洲增长的能力有限，而这些增长正被本土供应商吸收。
