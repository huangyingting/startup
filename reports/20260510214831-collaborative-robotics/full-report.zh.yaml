      - number: '5.5'
        title: 合规与安全
        blocks:
          - type: paragraph
            body: >
              安全合规是 Proxie 的基础设计要求，而不是事后补丁，因为共享人类工作空间中的无围栏协作运行不可妥协。两项主要安全标准管辖 Proxie 的部署环境：ANSI/A3
              R15.06-2025，这是更新后的美国工业机器人安全标准，涵盖共享工作空间中的协作机器人要求；以及 ISO 10218-1:2025，这是覆盖机器人设计、制造和运行的工业机器人安全要求国际标准。两者共同定义了
              Proxie 必须满足的有约束力安全验证要求，只有这样，它才能在美国和国际设施中不通过物理安全围栏与人类员工隔离，也能合法且可运营地部署。


              ANSI/A3 R15.06-2025 由 American National Standards Institute 与 Association for Advancing Automation（A3）合作，于
              2025 年发布。它为协作机器人运行设定要求，包括速度与间距监控、功率与力限制、手动引导，以及保护人类同事免受机器人伤害的安全额定停止功能。对 Cobot
              的目标垂直行业——医疗、制药制造和受监管物流——而言，遵守该标准实际上是强制性的，因为职业安全法规要求任何靠近人类员工运行的机器人系统，都必须有记录化安全验证。OSHA
              规定还要求雇主为机器人工作场所实施充分防护，进一步强化可认证安全合规作为企业采购批准前置条件的商业重要性。


              ISO 10218-1:2025 提供国际安全框架，使 Cobot 计划中的欧洲和亚洲市场扩张成为可能；在这些市场，管辖标准是国际标准而非 ANSI/A3 标准。Proxie
              的无围栏协作运行本身就是关键商业差异化：部署传统工业机器人的设施必须设置物理禁入区，占用宝贵地面空间，限制人员进入机器人邻近区域，并需要昂贵的设施改造。Proxie
              消除了这些空间和运营约束，可以在现有设施布局中部署，无需资本建设项目。这种安全设计理念——把协作运行作为设计约束，而不是额外功能——也延伸到 Proxie 在 FDA 监管医疗环境中的相关性；Mayo
              Clinic 和 Tampa General Hospital 已在实际临床物流运营中验证该系统。
