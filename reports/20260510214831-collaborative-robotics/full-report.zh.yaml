      - number: '2.7'
        title: 展示要点
        blocks:
          - type: callout
            title: 多个独立分析机构确认 TAM 大且持续增长
            body: >
              Grand View Research 确认全球 AMR 市场 2025 年为 $4.74B，CAGR 为 14.4%；MarketsandMarkets（2024 年 $4.5B，到 2030 年增至
              $26B）和 IDTechEx（协作机器人 $5.2B，CAGR 18%）也相互印证。多来源对强增长路径的收敛，提高了对 Cobot 到 2030 年投资周期内总可服务市场韧性的信心。
            calloutType: strength
            claimRefs:
              - CM001
              - CM002
              - CM005
          - type: callout
            title: 结构性劳动力短缺创造持久、非周期性需求
            body: >
              美国仓储岗位空缺超过 500,000 个，短期看不到人口结构层面的解决方案，仓储运营商面临的是结构性自动化必选题，而不是可选的效率升级。这样的持久需求环境会持续推动采购，利好 Cobot 的 Proxie
              部署周期和 RaaS 订阅模式，其影响远超单一经济周期或单个财年预算窗口。
            calloutType: strength
            claimRefs:
              - CM007
              - CM031
          - type: callout
            title: 集成复杂度和 ROI 不确定性是实质采用壁垒
            body: >
              企业买方持续把遗留 WMS 集成复杂度和多年 ROI 回收期列为 AMR 采用的两大障碍。对 Cobot 这样的新进入者而言，缺少独立验证的客户 ROI
              基准可能拉长销售周期，并要求比成熟竞争对手更多的概念验证投入，从而提高获客成本。
            calloutType: risk
            claimRefs:
              - CM016
              - CM020
          - type: callout
            title: RaaS 模式从根本上扩大可触达买方群体
            body: >
              从购买资本设备转向机器人即服务订阅，根本改变了 AMR 部署的买方基础。中端 3PL、区域医院网络和制药制造商若无法证明大额资本开支合理，在每台机器人每月 $3,000–$10,000
              的模式下也能成为可触达客户，显著扩大 Cobot 在传统自动化之外可触达的市场，而不只限于原本就买得起的 Fortune 500 运营商。
            calloutType: insight
            claimRefs:
              - CM006
              - CM014
              - CM032
          - type: callout
            title: 高度分散的竞争格局造成持续定价压力
            body: >
              全球 AMR 供应商超过 100 家，其中包括资金充足、拥有多年部署经验的 incumbents。这会给新进入者带来定价压力、商品化风险和客户决策瘫痪。Cobot 必须持续证明 AI
              驱动差异化和更高部署便利性，才能在面对装机基数更大、履历更成熟的替代方案时，为溢价 RaaS 定价提供理由。
            calloutType: risk
            claimRefs:
