            title: 专利申请仍在审查——IP 护城河要等授权后才算成立
            body: >
              Cobot 的蟹行驱动和导航算法专利申请仍在 USPTO 审查中，因此它们代表的 IP 护城河取决于能否成功授权。专利局驳回、既有技术挑战或审查过程中权利要求缩窄， 都可能消除或显著削弱预期 IP
              保护。在专利授权之前，竞争对手可以在没有法律风险的情况下独立开发机械上相似的蟹行驱动架构， 从而降低硬件差异化主张的持久性。
