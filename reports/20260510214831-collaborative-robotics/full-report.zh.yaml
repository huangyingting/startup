      - number: '2.6'
        title: 竞争结构概览
        blocks:
          - type: paragraph
            body: >
              AMR 和协作机器人市场高度分散，活跃供应商超过 100 家，竞争横跨硬件设计、AI 软件、车队管理和服务交付。这种分散反映了市场仍年轻——多数企业 AMR
              部署不足五年——也反映垂直应用多样，每类应用对载荷、安全、速度和系统集成都有不同要求。仓储细分的领先 AMR 供应商包括 Locus Robotics、6 River Systems（被 Shopify
              收购）、Fetch Robotics（被 Zebra Technologies 收购）、Geek+、Mobile Industrial Robots（MiR，被 Teradyne 收购）和 Seegrid。包括
              Figure AI 和 Boston Dynamics 在内的人形机器人进入者正在争夺相邻用例，但在重复性仓储任务上尚未达到商业规模。Cobot 以协作安全、易部署、AI 驱动车队学习，以及避免
              incumbents 常见定制集成负担的纯 RaaS 模式做差异化。


              仓储级 AMR 机器人的 RaaS 定价为每台机器人每月 $3,000 到 $10,000，取决于载荷、软件能力和服务等级承诺。Cobot 未公开披露 Proxie
              定价，但该区间与可比市场方案一致。公司的竞争优势集中在 Brad Porter 的 Amazon Robotics 领导经验、自研 AI 学习飞轮——车队扩大后提升机器人表现——以及与
              Maersk、Moderna 和 Mayo Clinic 等标杆客户的部署关系。Locus Robotics 2024 年裁员，尽管其市场表态仍乐观，但这说明缺少差异化软件栈的硬件重 AMR
              公司正面临利润率压力，也强化了 Cobot 将 AI-first 车队智能作为核心差异化向量的必要性。2025–2030 年期间，随着大型自动化集成商寻找已验证软件栈和客户基础，市场很可能通过 M&A
              整合，这可能为 Cobot 同时创造退出和合作机会。
