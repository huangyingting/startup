      - number: '3.2'
        title: 直接 AMR 竞争对手 — 协作拣选与导航
        blocks:
          - type: paragraph
            body: >
              Locus Robotics 是与 Cobot 最直接可比的 AMR 竞争对手，率先在仓库拣选环境中跑通协作 AMR 和机器人即服务模式。其 LocusBots
              设计为在履约中心通道中陪同人工拣选员，减少行走负担并提高拣选效率。疫情期电商激增推动 Locus 强劲增长，但随着疫情后市场回归常态，公司在 2024 年进行了约 10% 裁员；尽管如此，其 CEO 公开仍看好
              AMR 的长期机会。公司多轮融资金额可观，但由于硬件成本高、软件差异化相对有限，利润率承压。


              6 River Systems 于 2019 年以约 $262M 被 Ocado 收购，主要在电商履约中心部署「Chuck」AMR，提供协作拣选模式：机器人带领员工沿优化路径拣货。Ocado
              收购带来大量资源，也让其接入 Ocado 更广的仓库自动化生态；但作为独立竞争对手，6 River 的独立性和市场进入敏捷性可能因此受限。Fetch Robotics 于 2021 年以约 $290M 被
              Zebra Technologies 收购，如今作为 Zebra 的 AMR 事业部运营，产品组合覆盖医院物流、制造和仓储运输，并且关键在于受益于 Zebra 广泛的企业分销网络和既有 IT
              基础设施关系。Vecna Robotics 聚焦自主叉车和搬托盘 AMR，同时提供编排软件，目标载荷用例比 Proxie 更重。GreyOrange 是 AI
              原生仓库机器人平台，在亚太部署尤其强势，既提供货到人也提供人到货工作流，并以名为 Butler 的软件编排层管理多机器人协同。中国竞争对手 Geek+ 和 HAI Robotics
              以具备价格竞争力的硬件主导亚洲市场，并正向国际扩张，中期内可能对北美玩家构成商品化威胁。
