  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              自主移动机器人（AMR）市场覆盖能够在工业和商业环境中自主导航、且不依赖固定基础设施的机器人；这与更早的自动导引车（AGV）形成鲜明区分，后者沿着嵌入设施地面的磁轨或光学轨道行进。在 AMR
              类别中，协作机器人——通常称为 cobots——专为在人类员工身边安全作业而设计，依靠机载感知、AI 驱动路径规划和限力机制，在没有物理隔离的情况下共享工作空间。Cobot 的 Proxie 机器人正落在协作型
              AMR 细分中，把推车移动能力与操作能力结合起来，在仓库和医疗设施内移动周转箱、推车和物料。


              不同分析机构对市场范围的定义差异很大，因此跨来源比较非常关键。Grand View Research 将全球 AMR 市场定义为部署在仓储、物流、医疗、零售和制造中的移动平台，估算 2025 年市场规模为
              $4.74B。MarketsandMarkets 使用更宽的工业自主导航口径，得出 2024 年 $4.5B。GMInsights 估算仓库自动化市场为 $25.3B；该市场覆盖 AMR、AS/RS
              系统、输送线和分拣，说明 AMR 面向的是整体自动化投资中一个重要但边界清晰的子集。SNS Insider 进一步收窄至物流和仓储 AMR，估算 2024 年为 $8.4B。按 IFR 数据，2023
              年全球安装的 541,302 台工业机器人中，协作机器人占 10.5%，说明其增长很快，但在更广义机器人产业中的渗透率仍属少数。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM023
      - number: '2.2'
        title: 总可服务市场
        blocks:
          - type: paragraph
            body: >
              多家独立市场研究机构对 AMR 行业的判断趋同：从 2020 年代后期到 2030 年代，市场将保持强劲多年增长。Grand View Research 估算全球 AMR 市场 2025 年为 $4.74B，并以
              14.4% 的复合年增长率增长，到 2033 年约达 $14B。这个长周期预测反映了北美、欧洲和亚太地区企业对仓库自动化、医疗物流和制造业物料搬运的持续投入。Fortune Business Insights
              以重叠的增速估算和相近终端市场范围印证了这一方向。MarketsandMarkets 给出更激进路径：2024 年 $4.5B，到 2030 年增至 $26B，CAGR 接近 34%；这意味着其方法覆盖了纯
              AMR 平台之外更广义的工业自主导航支出。


              机器人即服务市场提供了另一层可服务市场视角。Future Market Insights 和 Droidage 估算，全球 RaaS 市场 2024 年达到 $12.9B，并预计 2026 年达到
              $34B，反映自动化行业正从资本开支快速转向订阅式部署。这个 RaaS 市场与 Cobot
              尤其相关：公司的商业模式把大额前置资本支出转化为可预测的月度运营费用，让此前难以证明资本设备采购合理性的中端物流运营商和医疗系统也进入潜在买方范围。IDTechEx 单独估算协作机器人子市场 2025 年为
              $5.2B，CAGR 为 18%；这一增速高于更广义 AMR 市场，直接对应 Cobot 的 Proxie 所竞争的人机安全协作细分，也为公司的 TAM 测算提供了强独立数据点。
