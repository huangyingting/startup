      - number: '8.4'
        title: 投资前关键尽调要求
        blocks:
          - type: paragraph
            body: >
              任何机构投资人在 Series C 阶段向 Collaborative Robotics 投钱前，都必须完成六项不可谈判的尽调要求。每项要求都对应一个公开信息无法填补的证据缺口，并会实质影响估值结论。


              第一，ARR 可见性是最高优先级。没有按客户和合同开始日期拆分的、经审计或管理层认证的年经常性收入数据，就无法套用收入倍数并得出可辩护的估值锚点。哪怕只是近似 ARR
              数据，只要结合机队规模和平均合同价值，也能把估值分析从纯可比公司法推进为「倍数 + 可比」混合方法。


              第二，必须披露并验证 RaaS 单元经济，包括单台机器人硬件成本、月度 RaaS 订阅价格和估计回本周期。RaaS 模式的资本密集性会在规模化后形成复利式现金流挑战；投资人必须先量化它，才能建模 $200M 到
              $300M Series C 部署所需的营运资本。


              第三，NVIDIA Jetson Orin 供货协议条款很关键，尤其是 Cobot 是否持有确定供货承诺，还是依赖现货市场配额；这会实质影响产能风险评估，也会影响任何上行情景分析。


              第四，2023 和 2024 财年的经审计财务报表，是机构投资人的标准要求。第五，按垂直领域拆分的获客成本和客户终身价值，对建模 Series C 部署效率和 RaaS
              业务规模化经济性至关重要。第六，必须完成自由实施 IP 分析和专利组合审查，以评估竞争护城河的耐久性与诉讼风险，再承诺任何包含 IP 防御性定价的 Series C 估值。
