          - type: callout
            title: 医疗 / 制药集中度带来规模化前阶段 60% 以上垂直敞口
            body: >
              五个具名客户中有三个处在医疗或制药环境，垂直集中度让 Cobot 暴露于行业特定风险：医院预算冻结、制药制造放缓、医疗 M&A 整合，或 FDA
              监管变化，都可能同时影响多个客户。总客户数只有五个，每一段关系都很关键。Locus Robotics 疫后经历——仓库吞吐恢复常态后，企业 AMR 客户不再续约或扩张合同——说明企业 AMR
              关系即便曾有承诺信号，也可能迅速恶化。
            calloutType: risk
            claimRefs:
              - CU010
              - CU014
              - CU015
              - CU028
              - CU032
              - CU036
          - type: callout
            title: 未披露机队规模、ACV 或续约数据，部署深度不透明
            body: >
              尽管已有五个公开具名客户，公司没有披露任何定量部署数据：机队规模、年度合同价值、续约率、扩张率和运营表现指标在公开资料中全部缺失。这个信息缺口让外部无法评估真实商业动能。五个客户、每个 10
              台机器人，与五个客户、每个 100 台机器人，对应的是完全不同的增长轨迹——而公开数据目前无法分辨两者。
            calloutType: risk
