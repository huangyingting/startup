  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: AMR 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              全球自主移动机器人市场是企业技术中最拥挤的细分之一，活跃供应商超过 100 家，覆盖硬件制造商、软件平台商、纯 RaaS 运营商和垂直整合自动化系统集成商。这种分散反映出市场仍相对不成熟——多数企业 AMR
              车队历史不足五年——也反映垂直应用多样，每类应用对载荷、安全、速度和集成都有不同要求，形成难以由单一供应商主导的产品利基。International Federation of Robotics 的 2023
              年数据确认，协作机器人约占当年全球安装的 541,302 台工业机器人的 10.5%，既显示已有可观动能，也说明相较更广义工业自动化市场仍有大量增长空间。


              竞争动态由三个重叠类别塑造：在仓储物流中运营协作拣选和运输机器人的直接 AMR 竞争对手（Locus Robotics、6 River
              Systems、Zebra/Fetch、Vecna、GreyOrange）；拥有强品牌认知或内部 AMR 车队的平台与 incumbent 竞争对手（Amazon Robotics、Boston
              Dynamics、OTTO Motors、Geek+、HAI Robotics、MiR）；以及新兴人形机器人进入者（Figure AI、Agility
              Robotics），它们在重复性仓储任务上仍处于商业规模前阶段。整合正在加速：6 River 于 2019 年以约 $262M 被 Ocado 收购，Fetch Robotics 于 2021 年以约 $290M
              被 Zebra 收购，MiR 此前被 Teradyne 收购，说明大型自动化集成商将 AMR 软件栈视为战略资产。Cobot 以差异化的 AI 原生设计和 RaaS-first
              模式进入这一格局，但必须面对拥有多年部署经验和更大装机基数的玩家，证明自身具备持久竞争优势。
            claimRefs:
