      - number: '8.5'
        title: 投资建议与总结
        blocks:
          - type: paragraph
            body: >
              对 Collaborative Robotics 的投资建议，在 Series C
              阶段是有条件积极；前提是上述六项尽调要求得到令人满意的解决。建议带有条件性，是因为这家公司本质上仍是一家未公开财务数据的收入前硬件公司，估值难度很高：定性案例很有吸引力，但在财务数据通过 NDA
              分享前，任何具体估值承诺都缺少精确的定量基础。


              投资的定性逻辑建立在三根支柱上。第一是团队：Brad Porter 在 Amazon Robotics 十四年职业生涯，最终担任 Robotics
              副总裁，负责全球最大工业机器人机队，是企业机器人领域最强的创始团队履历之一。第二是市场：自主移动机器人市场到 2030 年以 14.4% CAGR
              增长，为物流、医疗和制造垂直领域提供长期需求顺风。第三是产品差异化：Flywheel Program 的数据网络效应、Mayo Clinic 与 Tampa General Hospital
              带来的医疗优先客户验证，以及由 NVIDIA Jetson Orin 驱动的 Scout Sense 感知系统，都是真实的技术护城河元素，纯硬件 AMR 竞争对手不易复制。


              可能阻止积极情景兑现的投资风险同样具体。若 ARR 爬坡慢于预期，RaaS 资本密集性可能制造流动性危机。Locus Robotics 先例表明，企业 AMR
              客户在初始部署阶段后会把需求拉回常态，进而损害续约经济性。Brad Porter 关键人物集中仍是最严重的组织风险。中国 AMR 厂商在物流领域的价格竞争，可能侵蚀 Cobot
              在任何非医疗部署中的胜率。在尽调确认 ARR 牵引力和健康单元经济的前提下，Collaborative Robotics 值得以 $700M 到 $1.1B 区间估值进行 Series C
              投资——这是基准情景上半部分，反映了团队溢价和医疗护城河，使 Cobot 区别于更简单的 AMR 可比公司。
