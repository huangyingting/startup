      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 的估值需要一组经过筛选的可比公司，才能反映其硬件-软件-服务混合模式、企业部署重点和收入前阶段。六个可比对象构成分析区间。Locus Robotics
              是最直接的运营平行样本，也是最重要的警示基准：2022 年高点时，Locus 估值约 $2B，背后风投可比，已部署机队也比今天的 Cobot 更大。之后它因疫后电商需求常态化遭遇财务压力，说明企业 AMR
              估值并不能免疫市场周期风险。这是 Cobot 最相关的下行情景。


              6 River Systems 2019 年被 Ocado Group 以约 $262M 收购，为可比区间提供下限。作为一家没有医疗垂直或 AI 模型差异化的仓库 AMR 公司，6 River
              的收购价在按五年市场通胀和 AI 溢价扩张调整后，意味着同等能力资产在 2024 年的底价约为 $350M 到 $400M。Fetch Robotics 2021 年被 Zebra Technologies 以约
              $290M 收购，提供了类似的底部锚点。


              Boston Dynamics 2021 年以 $1.1B 从 SoftBank 出售给 Hyundai，为高端机器人平台战略收购提供中位参考。Symbotic 2023 年 $12B 的 SPAC
              估值代表公开可见仓库自动化倍数的高端，尽管 Symbotic 当时收入基础大得多，客户集中度也已建立。Berkshire Grey 的轨迹——2021 年以 $2.7B SPAC
              上市，随后市值大幅下滑——是公开市场对 AMR 估值溢价可持续性的最清晰警告。Brain Corporation 2022 年约 $480M 的私有估值，则提供了偏软件的机器人 AI
              可比样本。合在一起，这组可比公司把 Cobot 框定在 $300M（困境悲观）到 $2B 以上（突破乐观）之间，$600M 到 $1.1B 是分析师共识的中枢估计。Brad Porter 的 Amazon
              Robotics 履历带来的团队溢价，以及医疗垂直差异化，都支持 Cobot 相比纯物流 AMR 可比公司处在该区间上半部分。
