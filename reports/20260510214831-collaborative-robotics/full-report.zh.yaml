      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >
              Cobot 未公开披露收入、ARR 或单台机器人利润率数据，因此其 RaaS 模式的单位经济模型只能用行业基准近似估算。以一个有代表性的 10 台机器人部署为例，若按中位价格每台每月 $5,000
              计算，年度合同价值（ACV）为每客户 $600,000 年经常性收入。定价区间低端（$3,000/robot/month）下，10 台部署产生 $360,000
              ACV；高端（$10,000/robot/month）下，产生 $1.2 million ACV。这说明，如果早期企业部署偏向小车队或低复杂度用例，收入集中度风险会很明显。


              企业机器人获客成本（CAC）基准为每个企业账户 $50,000 到 $200,000，反映采购复杂度、IT 集成要求和现场安全评估推高的 6 到 18 个月长销售周期。按代表性 ACV 水平，这些高 CAC
              意味着每个客户需要 1 到 3 年回本；在单个账户产生正向现金贡献之前，公司必须先在销售、解决方案工程和专业服务上投入大量前期资金。这个动态抬高了 Cobot 两项能力的价值：用 Brad Porter 的
              Amazon Robotics 背书缩短销售周期，以及靠 Flywheel Program 通过渠道杠杆降低单个新客户标识的获取成本。


              自主移动机器人厂商规模化后的 RaaS 毛利率估计为 50–65%，实现方式是硬件接近盈亏平衡，同时叠加高毛利的经常性软件和 AI
              更新费用。早期部署中，硬件成本——包括计算、传感器和机械部件——是销售成本（COGS）的主项；随着车队规模扩大，Cobot 可以争取更好的部件价格、提高制造效率，并让软件利润层在总收入中的占比上升。Locus
              Robotics 2024 年裁员显示，疫情后增长率正常化时，硬件占比重的 AMR 厂商会承受利润率压力，也凸显 Cobot 在车队扩张过程中必须守住强软件差异化和定价权。
