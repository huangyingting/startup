        title: 具名客户概览
        blocks:
          - type: paragraph
            body: >
              截至 2024 年 11 月产品发布，Collaborative Robotics 已公开确认五家具名企业客户正在部署 Proxie 机器人：Maersk、Mayo Clinic、Moderna、Owens &
              Minor 和 Tampa General Hospital。这些客户在 2024 年 4 月 Series B 新闻稿中被点名，并在 2024 年 11 月 Proxie
              产品发布公告中再次确认，使它们成为近年来任何协作型 AMR 初创公司中公开记录最充分的早期企业客户之一。截至 2026 年 5
              月，公司未公开宣布其他具名客户，因此确认客户数仍为五家——这是一组有意筛选的参考部署，而不是大规模商业铺开。


              Maersk 是全球第二大集装箱航运和物流公司，在 130 多个国家运营全球 3PL 网络。它采用 Proxie，意味着未来可能在庞大的仓库和码头基础设施中进行大规模车队部署。Mayo Clinic 被 U.S.
              News & World Report 评为美国第一医院，在临床供应链内部物流中使用 Proxie；这类环境对协作机器人安全性、可靠性和系统集成要求最高，验证含金量很高。Moderna 是首个 FDA 授权
              mRNA COVID-19 疫苗背后的制药企业，在制造环境中部署 Proxie，验证其在良好生产规范（GMP）和 FDA 监管生产场景中的能力。Owens & Minor 是 Fortune 500
              医疗产品分销商，其物流运营服务超过 4,000 家医院和医疗设施，为 Cobot 在 Owens & Minor 客户网络内扩张提供了显著潜力。Tampa General Hospital 是 Level I
              创伤中心，也是与 University of South Florida 附属的学术医学中心，进一步验证 Cobot 在医疗垂直行业的深度。
