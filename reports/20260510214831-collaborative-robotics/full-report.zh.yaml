      - number: '7.7'
        title: 图表
        blocks:
          - type: callout
            title: Brad Porter 关键人物集中度是最严重的组织风险
            body: >
              Brad Porter 十四年的 Amazon 机器人职业生涯，以及作为工程负责人扩展全球最大仓库机器人机队的公开可信度，是 Cobot
              投资逻辑的主要锚点。公司没有其他高管具备同等能见度或企业机器人领域经验。CEO 离任事件——无论概率多低——都会同时影响融资可信度、客户关系连续性和团队留存。投资人在承诺 Series C
              前，应要求公司提供明确继任规划文件、关键人物保险，以及 CEO 以下高管层能正常运转的证据。
            calloutType: risk
            claimRefs:
              - CR016
              - CR033
          - type: callout
            title: RaaS 资本密集性在规模化后形成结构性财务杠杆风险
            body: >
              机器人即服务（RaaS）模式要求 Cobot 先制造并部署实体机器人，再收到订阅收入，并在多年合同期内把这些硬件留在资产负债表上。只要机队规模达到有意义水平（500
              台以上已部署机器人），营运资本需求就会显著上升。公司没有公开披露收入或单元经济，因此无法判断现有资本基础是否足够支撑部署密度，直到订阅收入覆盖运营成本。这是投资逻辑中最实质的财务风险，Series C
              尽调必须明确量化。
            calloutType: risk
            claimRefs:
              - CR014
              - CR012
              - CR015
          - type: callout
            title: 医疗垂直集中度放大监管与安全事故风险
            body: >
              Cobot 五个公开确认客户中有三个处在医疗场景：Mayo Clinic、Tampa General Hospital 和 Owens &
              Minor。临床环境中的严重机器人导航失败或碰撞事故，会引发全国性媒体报道、潜在 FDA
              询问，并冻结整个医疗垂直领域的采购。公司现阶段只有五个具名客户；三段医疗关系若同时流失或暂停，无论底层技术质量如何，商业后果都会是灾难性的。医疗部署既是 Cobot 最强验证，也是最大集中度风险。
            calloutType: risk
            claimRefs:
              - CR021
              - CR020
              - CR019
          - type: callout
            title: Locus Robotics 警示案例直接适用于 Cobot 的风险画像
            body: >
              Locus Robotics 曾估值超过 $2B，并获得可比风投支持；疫后 AMR 需求收缩后，公司经历严重客户常态化和裁员。它与 Cobot 当前位置高度相似：硬件依赖、企业客户集中、RaaS
              模式、尚未盈利。Cobot 的医疗垂直多元化能部分隔离 Locus 遭遇的物流特定常态化冲击，但 RaaS 规模化后的结构性财务风险相近。
            calloutType: insight
            claimRefs:
              - CR034
              - CR035
              - CR008
          - type: callout
            title: Series C 前必须要求 ANSI/A3 R15.06-2025 差距分析和合规路线图
            body: >
              美国主要协作机器人安全标准在 2025 年修订，为包括 Cobot 在内的所有 AMR 厂商带来当前合规义务。投资人承诺 Series C 前，应要求公司提交完整差距分析，把 Proxie 当前安全认证状态与
              2025 年更新要求逐项对照；同时给出任何必要整改的估算成本和时间表，并确认 GMP 监管部署环境中 OTA 更新的 FDA 变更控制程序。医疗客户留存和新增医院采购都离不开这项工作，没有谈判空间。
            calloutType: recommendation
            claimRefs:
              - CR019
              - CR024
          - type: callout
            title: NVIDIA Jetson Orin 可得性假设稳定，应按季度监控
            body: >
              本分析假设 NVIDIA Jetson Orin 的可得性在 Series C 融资期内维持当前稳定水平。如果机器人 OEM 客户的 GPU 芯片配额因数据中心需求优先而受限——类似 2022–2023 年 AI
              GPU 短缺期间发生的情况——Cobot 的生产吞吐可能受到实质影响。投资人应监控 NVIDIA 的嵌入式计算配额公告，并确认 Cobot 是否持有确定供货承诺，还是依赖现货市场配额。
            calloutType: assumption
            claimRefs:
              - CR009
              - CR036
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 最近已知估值与融资基准
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 自 2022 年成立以来，连续完成三轮融资，累计融资超过 $140M。$10M 种子轮由 Khosla Ventures 和 Neo 锚定。2023 年夏天，公司完成
              $30M Series A，由 Sequoia Capital 领投，Mayo Clinic 作为战略共同投资人参与。2024 年 4 月，公司完成 $100M Series B，由 General
              Catalyst 领投，Bison Ventures、Industry Ventures、Lux Capital、Sequoia Capital、Khosla Ventures、Mayo
              Clinic、Neo、1984 Ventures、MVP Ventures 和 Calibrate Ventures
              参投。各轮融资均未公开披露投后估值；对于尚未披露经审计收入的前商业化硬件机器人公司，这符合常规做法。


              Crunchbase、PitchBook 等分析数据库估计，Series B 后投后估值为 $600M 到 $1.1B。这个区间反映了市场给予 AI
              机器人平台公司的溢价：顶级风投背书，以及有记录的企业客户部署。基于 2023–2024 年创投市场中后期、收入前硬件机器人轮次的典型稀释惯例，Series B 投前估值估计在 $500M 到 $900M
              区间。自主移动机器人市场到 2030 年以 14.4% CAGR 增长，为需求端提供支撑，也托住了该估值区间上沿。公司已有五个具名企业客户——Maersk、Mayo Clinic、Moderna、Owens
              and Minor 和 Tampa General Hospital——并在 2024 年 11 月商业发布 Proxie；即使没有披露 ARR，公司也已从纯收入前状态推进到早期商业验证阶段，这对估值分析很重要。


              资本效率基准显示，花费 $140M 走到五个企业客户并推出已商业部署产品，大体符合现阶段前商业化硬件初创公司的基准。能够实现商业部署且没有公开爆雷的硬件机器人公司——区别于 Locus Robotics 和
              Berkshire Grey 的轨迹——通常能在后续融资中获得溢价倍数。任何考虑 Series C 持仓的投资人，都必须在缺少公开财务数据的情况下，把估值放在这些可比公司框架中建模。
