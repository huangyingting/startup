      - number: '5.6'
        title: 证据图表
        blocks:
          - type: callout
            title: AI 原生架构形成可复利的智能护城河
            body: >
              Proxie 建立在 AI 原生设计之上，包含 NVIDIA Jetson Orin 边缘计算、LLM 任务推理，以及每次部署都会复利提升训练语料质量的数据飞轮。这意味着 Cobot
              的导航和任务智能会随着车队规模自动改善。 竞争对手若只是把 AI 改装到传统 AMR 硬件上，无法复制这种复利动态，因为增长车队产生的训练数据需要多年积累，也无法以同等质量购买或合成。
