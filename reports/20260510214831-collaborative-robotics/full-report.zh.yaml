      - number: '7.5'
        title: 关键人物与组织风险
        blocks:
          - type: paragraph
            body: >
              Brad Porter 是 Collaborative Robotics 的 CEO 和联合创始人，也是公司技术可信度、商业领导力和投资人信心的主要来源。Porter 在 Amazon 任职十四年，升至
              Robotics 副总裁和 Distinguished Engineer，并负责部署数十万台仓库机器人；这段经历提供了支撑 Cobot
              投资逻辑的领域经验和企业关系。公司没有其他高管拥有同等公开能见度或企业机器人领域可信度。若 Brad Porter
              离开——无论原因是健康、个人优先级、竞争性邀约，还是与投资人发生不可调和的战略分歧——都会成为重大负面事件，同时影响融资、客户关系和团队留存。


              联合创始人 Jane Mooney 和 Steph Tryphonas 已得到确认，但尚未承担足够公开可见的角色，外部无法独立评估其领导深度。公司尚未公开确认 CFO、COO 或 CRO
              级别高管加入，这让运营模式在 CEO 层面形成单一领导依赖；对于一家已融资 $140M、准备进入商业规模化的公司而言，这并不常见。


              Collaborative Robotics 员工数从 2024 年 4 月 Series B 时约 40 人，增长到 2026 年估计 150
              人；约两年内接近四倍扩张。硬件初创公司快速扩员会带来招聘质量风险；随着创始人直接管理跨度扩大，文化一致性风险上升；新成员在缺少机构知识的情况下处理复杂的硬件-软件-服务集成挑战，也会放大运营执行风险。公司需要在
              Santa Clara 和 Seattle 两个办公室之间投入明确运营基础设施，才能在高速扩张中建立耐久的工程与运营文化；这部分投入目前没有公开可见证据。
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR033
