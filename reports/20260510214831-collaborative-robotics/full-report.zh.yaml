  - id: TV003
    title: 最终尽调要求表
    columns:
      - 尽调主题
      - 具体要求
      - 优先级
      - 阻断性 / 重大
      - 当前可得证据
    rows:
      - - ARR 和收入可见性
        - 按客户和合同开始日期列示，经审计或管理层认证的 ARR；截至 Q1 2026 的总 ARR 运行率
        - 关键
        - 阻断性 — 没有 ARR 数据，任何收入倍数都无法适用
        - 公开无 — 截至 May 2026，公司未披露 ARR
      - - RaaS 单元经济
        - 按垂直列示单台机器人硬件成本、月度 RaaS 订阅 ASP、单台机器人月毛利率，以及硬件回本周期
        - 关键
        - 阻断性 — 没有单元经济，无法验证资本密集度模型
        - 公开无 — 未披露定价和利润率结构
      - - NVIDIA 供应协议
        - 确认 Cobot 是否持有 Jetson Orin 确定供货承诺，或依赖现货分配；查阅供应协议条款和应急计划
        - 高
        - 重大 — 生产吞吐上限直接取决于计算芯片供应
        - 公开无 — 供应协议条款未披露
      - - 经审计财务报表
        - 2023 和 2024 财年的经审计损益表、资产负债表和现金流；当前烧钱速度和现金跑道估计
        - 高
        - 阻断性 — 机构尽调标准要求经审计财务
        - 公开无 — Series C 前私营公司无需披露
      - - 按垂直划分的 CAC 和 LTV
        - 医疗和物流垂直的获客成本、平均合同价值和估计 LTV；销售周期长度和管线转化率
        - 高
        - 重大 — 建模 Series C 部署效率和可规模化增长所必需
        - 公开无 — 未披露销售周期和管线数据
      - - IP 组合和 FTO 分析
        - 完整专利组合审查；针对 Amazon Robotics、Zebra/Fetch 和关键传感器 IP 持有方的自由实施（FTO）分析；商业秘密保护评估
        - 中
        - 重大 — IP 护城河是核心估值溢价假设；诉讼敞口未量化
        - 公开无 — 截至 May 2026，未通过 USPTO 识别到 Collaborative Robotics 的已授权专利
    notes: 优先级由分析师按对估值结论的影响指定。阻断性事项在解决前会阻止任何估值承诺。重大事项会影响估值区间，但不一定阻止以保守调整后估值作出承诺。六项要求都需要 NDA 门槛下的数据室访问。
