      - number: '3.5'
        title: 护城河评估与竞争风险
        blocks:
          - type: paragraph
            body: >
              Cobot 的竞争护城河已经部分建立，但并非所有维度都足够持久。数据飞轮是结构上最有说服力的护城河要素：随着 Proxie 车队扩大，每台机器人都会从真实仓库和医疗环境中生成自有 AI 训练数据，Cobot
              能以竞争对手在没有同等部署规模时无法获得的方式积累这些数据。它形成自我强化优势，并随时间复利增长——结构上类似自动驾驶公司通过车队行驶里程积累优势——但公司需要在近期大量获客，先激活复利效应，避免竞争对手缩小差距。AMR
              部署的转换成本包括 WMS 和 ERP 集成、员工再培训和工作流重设计；Proxie 一旦嵌入客户运营，这些因素会形成有意义的留存摩擦，但转换成本不如企业软件类别那么绝对。


              关键人风险偏高，因为 Cobot 的企业品牌可信度高度绑定 Brad Porter 本人。他的 Amazon Robotics
              背景是企业销售对话中的重要竞争差异化因素；一旦他离职或出现声誉问题，客户获取势头和投资者信心都可能明显放缓。Proxie 的协作安全设计——依据 ANSI/A3 R15.06-2025 和 ISO
              10218:2025 支持无围栏人机并行作业——在高密度人类环境中是真实运营优势，但竞争对手只要投入足够工程资源，也能取得安全认证，因此这更像暂时差异化，而不是永久壁垒。每台机器人每月 $3,000 到
              $10,000 的 RaaS 定价区间带来有意义的单位年度经常性收入，但中国供应商若在规模上推动硬件持续商品化，可能压缩 RaaS 单位经济，并要求 Cobot 证明更高 AI 软件价值才能支撑溢价。Cobot
              客户名单横跨 Maersk、Mayo Clinic、Moderna 和 Tampa General，显示真实的跨垂直商业牵引力，这是企业参考销售中的关键资产；但与拥有多年装机基数的 incumbents
              相比，其绝对规模仍有限。
