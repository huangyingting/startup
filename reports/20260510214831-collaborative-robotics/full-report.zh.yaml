        - 符合 ANSI/A3 R15.06-2025 和 ISO 10218-1:2025
        - 许多早期 AMR 平台按旧标准（R15.06-2012）认证；2025 年标准更严格
      - - AI 平台
        - LLM 集成；自研导航 AI；WMS/ERP API
        - 多数第一代 AMR 使用基于规则的路径规划，未集成基础模型
