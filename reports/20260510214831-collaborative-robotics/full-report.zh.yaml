      - number: '5.2'
        title: 软件、AI 与数据平台
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 从构想之初就是一家 AI 原生公司，而不是一家后来加入 AI 的硬件公司；这种创始理念贯穿 Proxie 软件和智能栈的设计。AI 导航系统利用 CEO Brad
              Porter 和联合创始人 Michael Vogelsong 在 Amazon Robotics 的经验所产生的部署数据和运营模式训练，后者曾组建 Amazon 的 Deep Learning
              Technologies 团队。这些机构知识被转化为专有导航 AI，用第一代仓库 AMR 厂商尚不具备的深度学习技术，处理机器人运动规划、避障和多机器人协调问题。


              车队管理软件负责多机器人协调、任务调度和企业系统集成，通过标准 API 将 Proxie 部署连接到客户的仓库管理系统（WMS）和企业资源计划（ERP）平台。这个集成层对企业采用至关重要，因为 Proxie
              必须嵌入现有运营软件，而不是要求客户围绕新机器人系统重构 IT 基础设施。WMS/ERP 集成能力对 Cobot 的医疗客户——Mayo Clinic 和 Tampa General
              Hospital——尤其重要；在这些场景里，机器人系统必须与临床物流软件和有严格数据治理要求的医院信息系统对接。


              大语言模型集成支持自然语言任务设定，让设施经理和一线主管用对话界面下达任务、查询车队状态，而不是依赖专门的机器人编程工具。这大幅降低了管理 Proxie
              部署的运营技能门槛，减少日常运营所需的专业机器人知识，也把可触达客户群扩展到没有专职机器人团队的设施。无线（OTA）软件更新可在不需要人工维护或停机的情况下，持续向已部署机器人交付导航改进、新能力和安全补丁，类似汽车和移动计算率先采用的
              OTA 更新模式。数据飞轮机制是 Cobot 最持久的长期 AI 优势：每台已部署机器人都会产生运营数据，丰富 AI 训练语料，使下一版软件表现优于当前版本，并让 Cobot
              平台与缺乏同等规模真实训练数据的竞争对手之间的智能差距持续复利扩大。
