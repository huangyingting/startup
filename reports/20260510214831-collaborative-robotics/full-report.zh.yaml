      - number: '7.2'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 所处的 AMR 竞争格局中，颠覆风险来自多个方向：拥有既有分销优势的企业级 AMR 供应商、积极出海的中国 AMR 制造商、可能入场的大型科技平台，以及 Amazon
              Robotics 将其庞大内部机队技术商业化的潜在威胁。


              Amazon Robotics 运营着全球最大已部署 AMR 机队，估计在 Amazon 全球履约网络中超过 750,000 台机器人。若战略优先级转向，Amazon
              具备把技术商业化、面向第三方企业客户销售的工程能力、分销关系和资产负债表。Amazon 过去主要把机器人创新用于自身运营，但其投资 Agility Robotics
              以及对自动化市场的更广泛兴趣表明，第三方商业化不能被视为不可能。中国 AMR 厂商 Geek+ 和 HAI Robotics 已在北美和欧洲市场积极扩张，凭借有竞争力的定价和跨洲大规模机队部署经验，直接挑战
              Cobot 的医院和物流用例。


              OTTO Motors（现为 Rockwell Automation 旗下）和 Boston Dynamics 面向制造业市场，而 Cobot 已识别该机会但尚未确认部署。既有厂商 Zebra
              Technologies（通过 Fetch Robotics）和 MiR（通过 Teradyne）拥有深厚企业分销关系、多年销售团队投入和既有采购关系，在企业销售周期中形成结构性优势。Locus Robotics
              疫后经历——大幅裁员与客户需求常态化——是企业 AMR 模式的直接警示。NVIDIA 的 Jetson Orin 芯片为 Proxie 提供算力，NVIDIA 理论上也可能开发自有机器人参考设计，或与竞争性
              OEM 制造商合作，借助其平台关系和生态位势。上述竞争情景都需要严谨做情景规划。
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
              - CR026
