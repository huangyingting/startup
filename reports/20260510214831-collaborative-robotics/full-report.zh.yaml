      - number: '8.6'
        title: 图表
        blocks:
          - type: callout
            title: 顶级团队溢价支撑基准情景估值区间上半部分
            body: >
              Brad Porter 十四年的 Amazon Robotics 职业生涯——最终担任 VP 和 Distinguished Engineer，负责 200,000
              多台已部署机器人——是企业机器人史上最可信的创始团队履历之一。再叠加 Sequoia Capital 和 General Catalyst 作为领投方、Mayo Clinic
              同时作为投资人与客户，Collaborative Robotics 获得了没有同等履历的同行难以享受的团队溢价。这项溢价合理且可量化，是基准情景估值的一部分，也支撑其相对 6 River
              Systems、Fetch Robotics 收购价等更简单硬件 AMR 可比公司，处在 $600M–$1.1B 区间上半部分。
            calloutType: strength
            claimRefs:
              - CV028
              - CV031
              - CV032
          - type: callout
            title: Locus Robotics 警示先例直接适用于 Cobot 的估值风险
            body: >
              Locus Robotics 曾估值超过 $2B，并由顶级风投支持；疫后电商需求常态化削弱客户扩张率并伤害续约后，公司遭遇严重财务压力。它与 Collaborative Robotics 的结构性相似点直接：企业
              AMR 模式、RaaS 资本密集性、硬件依赖，以及集中在同一经济周期中的客户群。Cobot 的医疗垂直多元化提供了部分缓冲，但任何投资人都必须把 Locus 情景作为可信下行情景建模。$300M–$500M
              的悲观情景估值就锚定在这一先例上。
            calloutType: risk
            claimRefs:
              - CV007
              - CV033
              - CV014
          - type: callout
            title: 医疗垂直让 Cobot 相比纯物流 AMR 可比公司享有结构性估值溢价
            body: >
              Cobot 五个具名企业客户中有三个处在医疗场景：Mayo Clinic、Tampa General Hospital 和 Owens and
              Minor。临床级部署要求带来远高于物流部署的切换成本：受监管环境中的机器人安全重新验证、HIPAA 合规文档和临床运营审批流程，都会形成纯物流 AMR
              厂商无法复制的结构性锁定。这项防御性溢价——医疗科技投资人通常会相对纯物流可比倍数给出 20–40% 溢价——是支撑基准情景估值区间上半部分的核心论点，也是 Cobot 区别于 6 River Systems 和
              Fetch Robotics 可比公司的关键。
            calloutType: insight
            claimRefs:
              - CV029
              - CV032
              - CV039
          - type: callout
            title: 无论 Series C 估值如何，承诺前都必须拿到 ARR 与单元经济数据
            body: >
              如果没有先在 NDA 下获得 ARR 数据和 RaaS 单元经济，投资人不应在 $600M–$1.1B 基准情景区间内以任何估值承诺 Series
              C。公司完全没有公开收入数据，意味着所有尽调前估值估计都只能依赖可比公司和管理层叙事。仅凭团队、市场、产品这些定性因素就承诺 $700M Series C，而没有财务验证，不符合机构尽调标准；如果 RaaS
              经济性弱于市场溢价所隐含的水平，投资人会暴露于显著下行风险。
            calloutType: recommendation
            claimRefs:
              - CV022
              - CV025
              - CV040
          - type: callout
            title: 估值估计很粗，所有结论都以财务尽调为条件
            body: >
              本章所有估值估计和情景区间，都是基于公开可比数据和创投市场基准得出的分析师估计。截至 2026 年 5 月，Collaborative Robotics
              没有公开披露经审计收入、ARR、毛利率或单元经济。$600M–$1.1B
              的基准情景估计有助于框定投资逻辑讨论方向，但在财务数据室验证前，不能作为法律承诺或投资条款清单的锚点。投资人若把这些估计当作已确认估值，而不是分析近似值，将承担实质风险。
            calloutType: assumption
            claimRefs:
              - CV003
