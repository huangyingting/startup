    approximationNotes: EMS 伙伴和传感器供应商未公开识别；这些节点代表分析师对典型硬件初创公司依赖结构的估计。NVIDIA 已确认为 Proxie 的计算平台。客户和投资者身份来自官方新闻稿。
    claimRefs:
      - CR009
      - CR010
      - CR036
      - CR013
      - CR039
  - id: FV001
    type: kpi
    title: 估值情景与基准 KPI
    layout: standard
    summary: 截至 May 2026，Collaborative Robotics 有八项关键绩效指标，覆盖估值情景、融资基准、市场背景和可比交易锚点。
    data:
      items:
        - label: 悲观情景估值
          value: $300M–$500M
          detail: 硬件 RaaS 经济性未能规模化；客户回归常态；Series C 承压
        - label: 基准情景估值
          value: $600M–$1.1B
          detail: 分析师共识；较估计 Series B 投后估值上升 3–5x；部分 ARR 可见
        - label: 乐观情景估值
          value: $2B+
          detail: 医疗健康多设施扩张；数据飞轮护城河得到证明；Series C 溢价完成
        - label: IPO / 收购上行空间
          value: $5B+
          detail: Symbotic 先例；到 2028 年跨垂直领域实现规模化；公开市场给予 AI 机器人溢价
        - label: 累计融资
          value: $140M+
          detail: 种子轮 $10M + Series A $30M + Series B $100M；April 2024 完成
        - label: Series B 轮规模
          value: $100M
          detail: General Catalyst 领投；April 2024；Sequoia、Lux Capital、Khosla、Mayo Clinic 参与
        - label: AMR 市场 CAGR（2024–2030）
          value: 14.4%
          detail: MarketsandMarkets 与 Grand View Research 共识；支撑溢价倍数的背景
        - label: 6 River Systems 收购（2019）
          value: $262M
          detail: 下限可比交易；收购方为 Ocado Group；仅物流 AMR；AI 之前时代
    approximationNotes: >-
      估值情景区间为分析师基于可比公司和行业基准作出的估计；不反映任何已披露公司数据。悲观 / 基准 / 乐观 / 上行情景概率分别为 20%/55%/20%/5%。AMR CAGR 数字来自 MarketsandMarkets 和
      Grand View Research。
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
      - CV018
      - CV023
      - CV008
  - id: FV002
    type: bar
    title: 可比公司估值 — AMR 与机器人参考组
    layout: standard
    summary: 六家可比 AMR 与机器人平台公司的估值或交易价格（USD millions），用于框定 Cobot 的估值区间。
    data:
      items:
        - label: Symbotic（SPAC IPO，2023）
          value: 12000
          detail: 仓储自动化平台；最大的公开市场可比公司；收入基础高于 Cobot
        - label: Berkshire Grey（SPAC，2021）
          value: 2700
          detail: AMR 平台；SPAC 估值未能维持；公开市场警示先例
        - label: Locus Robotics（峰值，2022）
          value: 2000
          detail: 最直接的运营可比；财务压力前的峰值估值；警示案例
        - label: Boston Dynamics（Hyundai，2021）
          value: 1100
          detail: 战略性机器人平台收购；商业模式不同；品牌与 IP 溢价
        - label: Fetch Robotics（Zebra，2021）
          value: 290
          detail: Zebra Technologies 收购的物流 AMR；没有 AI 飞轮差异化
        - label: 6 River Systems（Ocado，2019）
          value: 262
          detail: 下限可比；仓储 AMR；2019 年交易需要通胀调整
    approximationNotes: >-
      所有数值均为 USD millions。估值数字来自新闻报道；部分未获官方监管文件确认。Berkshire Grey 的 SPAC 后市值下跌未展示。Symbotic 估值为 SPAC
      合并时估值；当前公开市场市值不同。Brain Corporation（约 $480M，2022）因佐证有限而省略。
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
  - id: FV003
    type: flow
    title: Series C 投资决策流程
    layout: standard
    summary: 该决策流程映射关键尽调关卡，这些关卡决定 Series C 投资承诺是推进、等待整改后再定，还是基于数据室发现而放弃。
    data:
      nodes:
        - id: series_b
          label: Series B 已完成（$100M，April 2024）
          type: start
        - id: diligence
          label: Series C 前尽调启动
          type: process
        - id: arr_check
          label: ARR 可见度已确认？
          type: decision
        - id: unit_econ
          label: RaaS 单位经济已验证？
          type: decision
        - id: ip_check
          label: IP 组合与 FTO 已通过？
          type: decision
        - id: invest
          label: 推进 Series C 投资承诺
          type: end
        - id: hold
          label: 暂缓，等待尽调整改
          type: end
        - id: pass
          label: 放弃 / 退出持仓
          type: end
      edges:
        - from: series_b
          to: diligence
          label: 启动 NDA 数据室
        - from: diligence
          to: arr_check
          label: 审阅财务数据
        - from: arr_check
          to: unit_econ
          label: 是 — ARR 已确认
        - from: arr_check
          to: hold
          label: 否 — ARR 不清晰
        - from: unit_econ
          to: ip_check
          label: 是 — 经济性已验证
        - from: unit_econ
          to: hold
          label: 否 — 经济性未解决
        - from: ip_check
          to: invest
          label: 是 — IP 已通过
        - from: ip_check
          to: pass
          label: 否 — IP 风险重大
    approximationNotes: 该决策流程是对复杂多方尽调流程的简化呈现。实际机构尽调包含并行工作流（技术、财务、商业、法律），线性流程无法完全覆盖。图中三个决策关卡（ARR、单位经济、IP）是本分析识别出的最高优先级阻断关卡。
    claimRefs:
      - CV019
      - CV020
      - CV022
      - CV025
      - CV026
      - CV031
  - id: FV004
    type: range
    title: 估值 / 回报区间
    layout: standard
    summary: Collaborative Robotics 四种情景下的低位、基准和高位估值结果（USD millions），并列出锚定各区间端点的假设。
    data:
      items:
        - label: 悲观情景
          low: 300
          mid: 400
          high: 500
          detail: 硬件成本超支或需求回归常态；按经通胀调整的 AMR 收购地板估值
        - label: 基准情景
          low: 600
          mid: 850
          high: 1100
          detail: 分析师共识；团队和医疗健康溢价；数据室中可见部分 ARR
        - label: 乐观情景
          low: 1500
          mid: 2000
          high: 3000
          detail: 医疗健康多设施规模化；数据飞轮确认；Series C 强劲升档
        - label: 上行 / 退出
          low: 3000
          mid: 4000
          high: 5000
          detail: Symbotic 公开市场类比；到 2028 年完成规模化部署；退出时享受 AI 机器人溢价倍数
    approximationNotes: 所有数值均为 USD millions。区间端点为分析师估计；中值为各情景内的概率加权中心估计。没有经审计财务数据可用于锚定这些估计——它们代表分析师基于可比公司和市场基准给出的区间框定。
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
