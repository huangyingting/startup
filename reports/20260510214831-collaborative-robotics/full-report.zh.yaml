      - number: '4.6'
        title: 证据图表
        blocks:
          - type: callout
            title: RaaS 模式用车队复利带来可预测经常性收入
            body: >
              Cobot 的纯 RaaS 订阅模式把每台已部署机器人转化为可预测的月度收入流；既有账户内的车队扩张，以低于新客户标识的获客成本贡献增量 ARR。企业账户内车队规模增长产生复利效应，
              构成比一次性资本设备销售更稳固的收入基础，也比项目制自动化合同更能降低现金流波动。
            calloutType: strength
            claimRefs:
              - CI007
              - CI031
              - CI027
          - type: callout
            title: Series B 资本化水平使 Cobot 跻身融资最多的 AMR 初创公司
            body: >
              General Catalyst 领投的 $100 million Series B 使总融资超过 $140 million，也让 Collaborative Robotics 成为 2022–2024
              年这一批自主移动机器人初创公司中资本最充足者之一。 按典型硬件机器人烧钱速度，这一资本位置可支撑 18–36 个月现金跑道，并提供 RaaS
              模式固有的前期机器人硬件成本回收所需的营运资金缓冲；资本不足的竞争对手很难匹配这个结构性要求。
            calloutType: strength
            claimRefs:
              - CI023
              - CI006
              - CI018
          - type: callout
            title: 收入和单位经济模型完全未披露——承销判断需要私人数据
            body: >
              Collaborative Robotics 未公开披露任何财务运营数据：收入、ARR、毛利率、CAC、流失率或营运资金位置，都无法从公开来源取得。这给财务承销留下完整证据缺口。
              本章引用的所有单位经济模型均为行业基准估计，并非经验证的 Cobot 特定数据。任何投资或合作决策，都必须以在 NDA 下获取经审计财务、ARR 桥表和单位经济模型仪表盘为前提。
            calloutType: risk
