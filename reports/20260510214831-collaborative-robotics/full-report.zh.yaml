  - id: TV005
    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 理由
      - 证据置信度
    rows:
      - - 投资建议
        - Series C 条件性买入
        - 团队强、市场大，产品差异化且优先切入医疗；前提是 ARR 可见度、单位经济性和 IP 权属均获确认
        - 中——定性逻辑强；缺少财务依据
      - - 置信度
        - 中
        - 尚未产生收入的硬件公司，公开财务数据为零；估值仅基于可比公司；取决于资料室结果
        - 低-中
      - - 风险评级
        - 高
        - RaaS 资本强度高；关键人物集中在 Brad Porter；Locus Robotics 前车之鉴；Series C 时间压力
        - 中
      - - 估值立场
        - $700M–$1.1B 的 Series C 进入估值
        - 基准情景区间上半段；团队溢价和医疗护城河支撑高于可比公司中位数；若 ARR 获确认，可支撑乐观情景进入估值
        - 低-中——缺少公开财务锚点；估算基于可比公司
    notes: 建议带条件且对证据敏感。ARR 数据、单位经济性或 IP 状态若变化，将直接影响投资建议和估值立场。本表为分析师评估，不构成投资建议。
