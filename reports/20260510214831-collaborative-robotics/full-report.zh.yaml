      - number: '7.6'
        title: 监管与不利事件风险
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 进入的是受监管环境——医疗机构、制药制造工厂和美国物流运营——每一类环境都有不同合规要求。美国最直接适用的标准是 ANSI/A3
              R15.06-2025，规定了工业机器人和协作机器人部署的安全要求。达到并维持该标准，需要测试、认证和文档成本；每新增一个部署环境，成本都会上升。该标准在 2025 年更新，如果 Proxie
              现有认证状态与修订要求之间存在缺口，部分企业级部署推进前就必须补齐。


              FDA 监管适用于 Proxie 在 Moderna 的 GMP 工厂等制药制造环境中的部署。Proxie 是物流机器人而非医疗器械，但 FDA
              监管的制造环境要求所有设备——包括自动化物料搬运系统——满足特定文档、验证和变更控制要求。运行在 GMP 环境中的机器人接收任何 OTA 软件更新前，都必须依据 FDA 21 CFR Part 11
              及相关指南完成验证，这会让 Cobot 的标准更新流程更复杂。


              最严重的不利事件风险，是医院场景中的机器人安全事故。Mayo Clinic 或 Tampa General Hospital
              的临床走廊里，一次碰撞伤害、与患者擦肩的未遂事故，或自主导航失败，都会立即引发媒体关注、潜在监管审查，并冻结医疗垂直领域的客户采购。公司只有五个具名客户，其中三个在医疗领域；这类事件可能威胁公司生存。工人权益组织已开始瞄准仓库自动化公司，反对在工会化物流设施部署
              AMR 的倡议团体也可能制造声誉摩擦或立法压力。欧盟 AI Act 对 AI 驱动的自主系统施加基于风险的合规要求，可能迫使 Cobot 在欧盟司法辖区部署前追加合规投入。
