      - number: '7.4'
        title: 财务与融资风险
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 从种子轮、Series A 到 Series B 累计融资
              $140M，对于现阶段硬件机器人初创公司而言资本基础较强。但公司没有公开披露收入、毛利率、单元经济或烧钱速度数据；截至报告日期，外部无法独立评估其财务健康、盈利路径或剩余现金跑道。未披露收入与公司的前商业化阶段相符，但也为潜在投资人留下重大证据缺口。


              RaaS 模式天然资本密集。Collaborative Robotics 必须先制造并部署实体机器人，之后才收到订阅收入；订阅收入通常在两到五年合同期内分摊，而不是一次性前置确认。达到任何有意义的规模——例如
              500–1,000 台已部署机器人——后，公司需要先为硬件生产、部署和维护垫付营运资本，直到月度 RaaS 付款跑到可盈利水平。这与边际交付成本接近于零的软件 SaaS 业务结构完全不同。


              2023–2025 年硬件公司融资环境明显比 2020–2022 年高峰期更艰难，多家硬件机器人公司出现降价融资、人才收购或关停。Locus Robotics 曾估值超过
              $2B，之后遭遇严重财务压力并不得不裁员。Cobot 的投资人财团由 General Catalyst 和 Sequoia Capital 领投，包含世界级风投，具备支持 Series C 的能力；但
              Series B 所设定的估值预期本身带来执行风险。投资人需要看到可验证的商业进展，才能支持 Cobot 以不低于 Series B 的估值水平完成 Series C。在 Series B 现金跑道耗尽前关闭
              Series C 的时间压力，是本次尽调中优先级最高的风险之一。
            claimRefs:
              - CR012
              - CR013
              - CR014
              - CR015
