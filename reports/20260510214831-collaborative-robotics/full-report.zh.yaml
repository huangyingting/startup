      - number: '3.4'
        title: Cobot 的竞争定位与差异化
        blocks:
          - type: paragraph
            body: >
              相比 AMR 竞争集，Collaborative Robotics 在五个核心维度上做差异化：AI 原生设计、创始人可信度、生态飞轮、纯 RaaS 模式和移动操作能力。AI 原生设计是 Cobot
              定位的核心论点——Proxie 从一开始就把 AI 和机器学习作为核心功能组件来架构，使用 NVIDIA Orin 计算和基于 LLM 的车队智能，而不是在既有硬件平台上后补 AI 能力。这与多数传统 AMR
              竞争对手明显不同；后者是在大语言模型工具具备商业可行性之前设计的硬件架构上，逐步加上 AI 功能。落到实践中，这意味着 Proxie 的导航、异常处理和任务分配，与 AI 推理的集成深度高于那些把 AI
              叠在旧规划框架之上的竞争平台。


              Brad Porter 在 Amazon Robotics 的 14 年职业经历——最终领导一支 200,000+ 台机器人车队和约 10,000
              人的全球团队——为他在企业物流买方面前提供了独特的创始人可信度，买方能识别这种运营规模经验。这个履历建立了创业公司通常难以拥有的机构信任，从而缩短企业销售周期。Flywheel Program
              创造了一个良性数据循环：每部署一台 Proxie，就产生自有运营数据，改善车队 AI 表现；随着部署增加，单位成本下降、可靠性提升，复合价值随之累积。没有同等部署车队规模的竞争对手难以复制这一点。Cobot 的纯
              RaaS 模式为买方消除大额前置资本开支，把自动化从资本预算决策转为运营费用决策，也让传统 capex 模式排除的中端买方得以采用。最后，Proxie 的 Flex Grasp
              移动操作能力让机器人能够与物体发生物理交互——不只是导航和运输——从而在需要物料拣取、周转箱处理和载荷交互的用例中区别于纯移动 AMR。Cobot 于 2024 年 11 月在 MODEX 公开发布
              Proxie，在一个已有多年先发竞争者的市场中建立商业可见度。
