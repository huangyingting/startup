  - id: TV004
    title: 投资逻辑破裂与风险触发因素表
    columns:
      - 维度
      - 悲观因素
      - 乐观催化剂
      - 分析师评估
    rows:
      - - RaaS 单元经济
        - 硬件成本无法在规模化时降至正毛利；RaaS 订阅定价相对持有成本过低
        - 产量规模化后单台硬件成本下降 30%+；RaaS ASP 维持在 $4K/robot/month 以上
        - 未解决 — 没有公开单元经济数据；这是最关键的财务尽调要求
      - - 团队与领导力
        - Brad Porter 在 Series C 前离职；没有执行 C-suite 接班计划；关键工程师被竞争对手挖走
        - Porter 留任，Series C 吸引 CFO 和 CRO；联合创始人承担可见运营角色
        - 可控 — 强投资者董事会提供治理兜底；股权留任激励已经到位
      - - 客户集中度
        - 三家医疗客户在首次部署后拒绝续约；后疫情时期需求回归常态，重演 Locus Robotics 的模式
        - 医疗客户把部署扩到多院区；Maersk 新增 5+ 个物流站点；签下 3 个知名新客户
        - 风险偏高——五个客户中医疗占 60%，需求正常化敞口实质性偏大
      - - 竞争动态
        - 中国 AMR 厂商（Geek+ 或 HAI Robotics）凭价格优势连续三次在企业物流招标中击败 Cobot
        - Cobot 在医疗招标的正面比拼中拿出可量化的 AI 导航优势；医院采购因合规门槛排除中国厂商
        - 部分缓释——医疗合规门槛保护医院垂直领域；物流板块暴露更大
      - - 市场与宏观
        - AMR 市场增速降至 10% CAGR 以下；利率环境压制尚未产生收入的硬件公司 Series C 估值
        - AMR 市场增长超预期，达到 18%+ CAGR；制造业垂直领域打开第三条收入线
        - 背景偏正面——多家分析机构给出的 14.4% CAGR 共识已经站稳；主要风险在宏观不确定性
    notes: 评估体现分析师基于公开信息的判断。实际风险催化剂平衡很大程度取决于资料室尽调。悲观因素与乐观催化并不互斥——多个因素可能同时兑现。
