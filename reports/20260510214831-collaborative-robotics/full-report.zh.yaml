      - number: '4.5'
        title: 市场基准与财务结论
        blocks:
          - type: paragraph
            body: >
              自主移动机器人市场为评估 Cobot 轨迹和财务模型质量提供了有用基准。全球 AMR 市场 2025 年估值约 $4.74 billion，按 14.4% 的复合年增长率增长，意味着 2026 年将达到约
              $5.49 billion，并按 Fortune Business Insights 预测，到 2030 年继续扩张至 $10 billion 或更高。IFR 数据确认，2023 年全球工业机器人装机量
              541,302 台，其中协作机器人占 10.5%；协作机器人板块增速快于传统工业机器人，也为能够熬过当前整合阶段的纯 RaaS 运营商提供了数十亿美元可触达基础。


              对 Cobot 收入模式的财务结论是：结构上成立，但尚未验证。RaaS 模式在 AMR 类别中是成熟商业结构，Locus Robotics 在 2024 年遭遇利润率压缩之前已经建立了模板。Cobot 的 AI
              原生定位和经 Mayo Clinic 验证的医疗垂直行业，可能支撑溢价定价和更高留存，但没有私人财务数据，两者都无法核验。2025 年起执行的 ANSI/A3 R15.06-2025
              创造了有约束力的合规成本，既是门槛（工程投入），也是凭证（面向受监管垂直行业的安全认证）。Cobot 与同行在 USPTO 的专利活动，则显示主动 IP 投入，可能支撑定价权。


              主要尽调阻断点是收入不披露和营运资金不透明。没有经审计财务、ARR、毛利率轨迹和单台机器人 COGS 数据，就无法验证 RaaS 单位经济模型是否走在可行盈利路径上，也无法判断车队扩张的营运资金强度是否会在
              ARR 达到自我维持水平前耗尽 $100M Series B。如果员工数增长（20 个月内从 40 人到 150 人）快于 ARR 发展，资本充足性就会成为问题；Locus Robotics 2024
              年裁员也有类似模式。要解除这个问题，需要在 NDA 下获取季度财务报表、ARR 桥表和单位经济模型仪表盘。
