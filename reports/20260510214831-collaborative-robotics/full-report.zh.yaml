        - 高 — 不合规可能使 Moderna 部署失效，并带来客户关系风险
        - 公司可能已有内部变更控制流程；医疗客户验证意味着公司理解 GMP 要求
        - 中 — FDA 验证文件和 OTA 政策未公开
        - 要求提供 Proxie 在 Moderna GMP 环境中 OTA 更新流程的 FDA 验证文件
      - - OSHA 29 CFR 1910 — 一般行业机器安全要求
        - 美国
        - 生效中 — 适用于美国工作场所的所有机器人部署，包括仓库和医院
        - 低 — 标准成熟；公司可能已经合规
        - 中 — 客户设施内发生 OSHA 违规，会带来责任和声誉风险
        - 医院和物流客户资格流程通常要求 OSHA 合规
        - 低 — 假设符合标准，但未公开确认
        - 确认标准客户部署包中包含 OSHA 合规文件
      - - EU AI Act — 高风险 AI 系统合规要求
        - 欧盟
        - 即将生效 — 2026–2027 年分阶段实施；适用于工作环境中的 AI 驱动自主机器人
        - 短期低（未确认欧盟部署）— 若推进国际扩张则为中
        - 中 — 任何欧盟客户部署前都需要投入欧盟合规
        - 目前未宣布欧盟部署；合规投入推迟到扩张决策之后
        - 低-中 — 未部署欧盟意味着没有即时敞口；合规成本是未来资本需求
        - 跟踪 EU AI Act 实施时间表；在国际扩张规划中纳入欧盟合规预算
      - - 劳工权益倡导与仓库自动化立法 — 美国州级风险
        - 美国（州级）
        - 立法中 — 美国多个州已提出或通过 AMR 用工通知要求
        - 低-中 — 工会化物流环境中的劳工倡导压力在上升
        - 低-中 — 工会化客户投标中会有声誉摩擦；部署密度可能受到立法限制
        - 聚焦医疗部署提供部分隔离；非工会环境中的物流客户是主要目标
        - 低 — 现有法律尚未实质限制 Cobot 运营；2–3 年视角下存在未来风险
        - 跟踪重点客户司法辖区的劳工倡导活动；投标时评估客户员工构成
    notes: >-
      监管风险登记表覆盖截至 May 2026 可公开识别的合规义务。各行按剩余严重程度排序。若无法接触具体客户合同，不列举特定客户环境中的其他合规义务（HIPAA、JCAHO 认证、州劳动法）。EU AI Act
      行反映任何未来国际扩张预期带来的合规负担。
