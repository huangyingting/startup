  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 采用纯机器人即服务（RaaS）模式，向企业客户收取经常性月度订阅费，覆盖硬件使用、软件更新、维护，以及合同期内持续交付的 AI
              改进。这个模式与传统资本设备销售根本不同：后者由客户承担前期采购、折旧和维护成本。Cobot
              把自动化从资本开支转为运营开支，扩大了可服务市场，纳入那些无法在资产负债表上合理化大额设备采购的中端运营商，也让拥有运营预算灵活性的采购团队更快拿到财务批准。


              行业基准显示，仓库级自主移动机器人 RaaS 定价通常为每台机器人每月 $3,000 到 $10,000，价格取决于载荷复杂度、软件成熟度、服务级别协议条款和车队规模承诺。Cobot 的 Proxie
              落在这个区间内，提供 NVIDIA Orin 计算和基于 LLM 的车队智能等 AI 原生能力，相比逐步补 AI 的传统 AMR
              平台，可以支撑溢价定位。月度订阅模式带来可预测的经常性收入流，并随车队规模产生复利经济：客户车队每增加一台机器人，都会贡献增量年经常性收入（ARR）；既有客户关系内的车队扩张，获客成本低于拿下新客户标识。


              Cobot 的 Flywheel Program 是一个结构化部署伙伴生态，借助系统集成商、物流顾问和渠道合作伙伴推荐并部署 Proxie，从而加速获客。Cobot
              的直接销售负担下降，可触达管线扩大，却不需要员工数等比例增长。Flywheel Program 还从伙伴管理的车队中产生部署数据，丰富 Cobot 的 AI 训练语料。RaaS 模式要求 Cobot
              为每台已部署机器人的前期硬件成本垫资，并在订阅合同期内收回成本，因此营运资金需求会随车队规模上升而增长；能否动用 $100M Series B 资本，对可持续扩张至关重要。
            claimRefs:
