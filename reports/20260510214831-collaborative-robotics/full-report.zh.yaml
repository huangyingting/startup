      - number: '6.3'
        title: 客户集中度风险
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 目前只有五家公开确认客户，在当前商业化前规模下，客户集中度风险明显。五家具名客户中有三家——Mayo Clinic、Moderna 和 Owens &
              Minor——主要处于医疗和制药垂直行业，按客户数计算，垂直行业集中度至少为 60%。如果医疗和制药客户相较物流客户（Maersk）和医院客户（Tampa
              General）贡献了不成比例的收入，按收入计算的实际垂直行业集中度可能超过 60%，放大任何医疗行业监管变化或采购冻结的冲击。


              Locus Robotics 的警示案例与此直接相关。Locus 曾是美国最突出的企业 AMR 供应商之一，但在疫情期间电商激增消退后，客户需求显著正常化；随着履约量回到疫情前基线，一些大客户减少续约或扩约。随后
              Locus 裁员并承受财务压力，说明企业 AMR 客户关系可能因宏观需求变化而中断，而不一定是产品质量失败。对 Cobot
              来说，在这个早期阶段，当前五家客户中任何一家遭遇预算冻结、战略转向或部署不及预期，都可能对收入产生实质影响。


              地理集中度是另一个风险维度：五家确认客户均位于美国，意味着 Cobot 没有公开确认的国际收入。作为全球航运和物流运营商，Maersk 是最自然的国际车队扩张路径，但公司尚未宣布任何国际部署。中端市场和 SMB
              客户完全不在确认客户名单中，意味着 Cobot 披露的收入基础全部来自企业客户。公司未公开披露客户流失、续约或增购数据，因此外部来源无法评估客户终身价值或留存率。
