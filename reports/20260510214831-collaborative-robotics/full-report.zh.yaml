      - number: '7.3'
        title: 硬件、供应链与制造风险
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 的硬件制造依赖供应链，这会带来集中度和可得性风险，与纯软件公司不同。最重要的单点依赖是 NVIDIA Jetson Orin，这是支撑 Proxie 端侧智能的边缘
              AI 计算平台。Jetson Orin 提供实时传感器融合和 AI 导航推理所需的 GPU 算力，但自 2020 年以来 GPU 芯片供应一直波动。如果 NVIDIA
              因数据中心需求优先、地缘政治导致半导体供应链中断，或自身产品供应策略而施加配额限制，Cobot 的产能和部署能力会被直接卡住。


              合同制造依赖是相关风险。硬件初创公司通常依赖电子制造服务（EMS）合作伙伴，而不是自建制造设施；这会带来质量控制、产能分配和知识产权保护问题。Cobot
              从几十台已部署机器人扩到几百台、几千台时，制造执行风险会按比例上升。定制传感器的组件交期——尤其是 Proxie 的 Scout Sense 感知系统使用的 LiDAR
              单元和立体深度相机——可能长达六到十二个月；一旦需求激增，生产计划会被卡住。


              硬件降本也是财务执行风险。RaaS 模式要盈利，必须在产量提升后持续改善毛利率，并把物料清单成本谈下来。如果硬件成本相对 RaaS
              订阅收入仍然偏高，公司就需要先把硬件放在资产负债表上，等待订阅收入兑现，形成现金流时点错配。投资人应要求公司提供单台硬件成本轨迹和目标毛利率路线图；Collaborative Robotics
              尚未公开披露这些信息。
            claimRefs:
