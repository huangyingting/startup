        - $300M–$500M
        - 20%
        - RaaS 单元经济无法达到正利润率；客户正常化轨迹跟随 Locus Robotics 路径；ARR 可见性建立前就需要 Series C
        - 硬件成本超支；连续两个客户不续约；中国 AMR 在物流领域打价格战
      - - 基准
        - $600M–$1.1B
        - 55%
        - 分析师共识；较 Series B 投后估值抬升 3–5x；ARR 部分可见；确认机队扩展至 8–12 个企业客户
        - 至少需要部分披露 ARR 来锚定估值；利率上行环境中存在倍数压缩风险
      - - 乐观
        - $2B+
        - 20%
        - 医疗系统多院区扩张；数据飞轮被证明能带来可衡量的 AI 性能优势；物流垂直在 Maersk 之外新增 3+ 个点名客户
        - 被 Amazon Robotics 或中国 AMR 厂商替代；医院安全事件冻结医疗采购
      - - 上行情景 / IPO
        - $5B+
        - 5%
        - 到 2028 年在医疗和物流中实现规模化部署；AMR 市场扩张快于预测；AI 机器人平台 IPO 获得类似 Symbotic 的公开市场反响
        - 公开市场波动；IPO 前尚未完成从硬件到软件的利润率过渡；SPAC/直接上市估值重置风险
    notes: 概率为分析师基于可比公司和行业基准作出的估计；不构成投资建议。情景触发因素仅作示意；实际结果可能有实质差异。悲观和上行情景定义为尾部情景。基准情景 55% 的概率反映在没有重大负面或正面消息时最可能的区间。
    claimRefs:
