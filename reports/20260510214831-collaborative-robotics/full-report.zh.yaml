      - number: '6.4'
        title: 垂直行业扩张潜力
        blocks:
          - type: paragraph
            body: >
              Cobot 当前客户组合——一家全球物流公司、两家学术医学中心、一家制药企业和一家医疗产品分销商——反映了一项有意的早期策略：优先瞄准受监管、高价值环境，在这些场景中，Proxie
              的协作式、无围栏设计相较传统工业机器人最能体现运营优势。让医疗和制药成为有吸引力早期市场的同一组特征——严格安全要求、较高溢价承受力、偏好可信合作伙伴、长期合同关系——也创造了进入相邻相似垂直行业的扩张机会。


              全球物流和 3PL 市场是 Proxie 最宽的可触达垂直行业。多家分析机构预测，仓库和配送中心环境中的 AMR 采用率到 2030 年将以约 14% 复合年增长率增长。Maersk 作为锚定物流客户参与，为与
              DHL、FedEx、UPS 和区域 3PL 等其他 3PL 运营商对话提供了参考案例。由 Moderna 部署验证的制药制造垂直行业也提供显著扩张机会，因为 FDA 监管要求会为没有 GMP
              环境业绩记录、成熟度较低的竞争对手制造采购壁垒。


              医院和医疗系统物流自动化是增长最快的 AMR 子垂直行业之一，驱动因素包括临床场景劳动力成本上升、Joint Commission 对感染控制的要求，以及跨多楼层医院园区管理物资的运营复杂度。Owens &
              Minor 作为服务超过 4,000 家医院的医疗产品分销商，带来潜在渠道合作机会，使 Cobot 能通过 Owens & Minor 的分销关系触达医院客户。Flywheel Program
              将客户转化为部署伙伴，尤其适合医疗网络；一个卫生系统的正面体验，可以形成通往同业机构的推荐路径。制造、零售履约和市政服务是 Cobot 表示感兴趣的更长期扩张垂直行业，但尚未用具名客户确认。
