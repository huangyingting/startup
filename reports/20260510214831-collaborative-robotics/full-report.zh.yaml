      - number: '6.5'
        title: 客户成功与留存
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 设计了两套能提升客户留存、拉长收入可预测性的结构性机制：Flywheel Program 和 RaaS 商业模式。Flywheel Program
              把客户拉成主动部署伙伴，每个客户的部署都会产出运营数据，回流到 Proxie 的 AI 训练管线里，提升全机队的导航和任务表现。双方因此形成相互依赖：客户从全体机队数据带来的 AI 改进中受益，Cobot
              则从每一次部署中拿到训练数据。部署越深，数据越多，Proxie 越强——留存激励由此自我强化，不只靠合同锁定。


              RaaS 商业模式进一步抬高切换成本，因为 Proxie 深度接入客户的仓库管理系统（WMS）和企业资源计划（ERP）平台。替换已部署的 Proxie 机队，不只是换一个机器人供应商，还要让继任系统重新接入既有
              IT 基础设施、运营流程和员工培训体系。AMR 行业的企业级 RaaS 合同通常为两到五年，并带有多年承诺，既给 Cobot 带来收入可预测性，也给客户提供部署稳定性。


              结构优势之外，客户续约、增购或扩张数据仍未公开。外部资料无法判断 Cobot 的真实留存率。客户在初始试点或短期合同结束后不续约的风险真实存在：企业 AMR
              采购可能因预算周期、战略方向变化，或机器人项目整合到单一现有供应商而被逆转。Locus Robotics 的经历说明，企业 AMR 客户关系并非天然黏性极强。Cobot
              的客户成功职能、部署支持模式和续约条款没有公开文件，留存风险评估因此留下重大证据缺口。
