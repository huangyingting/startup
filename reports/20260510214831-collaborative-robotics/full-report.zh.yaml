      - number: '1.3'
        title: 融资历史与投资方
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 运营不到两年，就通过三轮融资累计融得超过 $140M。公司 $10M 种子轮由 Khosla Ventures、Neo 和其他早期投资方支持。2023 年夏完成的
              $30M A 轮由 Sequoia Capital 领投，Mayo Clinic、Khosla Ventures 等参投；到这一阶段，公司已有早期概念验证和三家已承诺客户。2024 年 4 月宣布的 $100M
              B 轮由 General Catalyst 领投，新投资方 Bison Ventures、Industry Ventures 和 Lux Capital 加入，老股东 Sequoia Capital、Khosla
              Ventures、Mayo Clinic、Neo、1984 Ventures、MVP Ventures 和 Calibrate Ventures 也继续参投。


              这组投资方的战略价值跨度值得关注。General Catalyst 带来工业自动化和负责任创新框架上的模式识别。Sequoia 提供一线风险投资经验和面向企业销售的全球网络。Mayo Clinic
              既是投资方又是直接客户，在高要求的医疗物流环境中形成一致的试点部署关系，验证产品。Lux Capital 专注深科技和前沿科学创业公司，提供行业专长。已披露的 $140M+ 融资让 Cobot
              在估算烧钱速度下，至少未来 18–24 个月能较从容地继续产品开发、商业扩张和团队扩建。B 轮投后估值未公开披露；分析师数据库估算区间为 $600M 至 $1.1B，反映出资本市场给予具备企业牵引力的 AI
              机器人平台公司的高增长溢价。
