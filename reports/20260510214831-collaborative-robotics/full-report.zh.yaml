          - type: callout
            title: Locus Robotics 2024 年裁员是硬件 RaaS 的实质风险类比
            body: >
              Locus Robotics 曾开创仓库协作型 AMR RaaS 模式，2024 年在疫情后需求正常化和硬件占比重成本结构带来的利润率压力下，进行了约 10% 的裁员。 这条轨迹是 Cobot
              的直接风险类比：Cobot 采用同一商业模式，但商业化阶段更早。如果 Cobot 的硬件 COGS 回收周期拉长到超过 Series B 现金跑道， 在达到毛利率可持续之前就必须再融资，风险最高。
            calloutType: risk
