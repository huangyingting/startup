            title: 五家具名企业客户验证 TRL 8–9 技术成熟度
            body: >
              Maersk、Mayo Clinic、Moderna、Owens and Minor 和 Tampa General Hospital 在三个不同垂直行业部署，对于一家 2024 年 11
              月才发布首款商业产品的公司来说， 提供了异常强的 TRL 验证。医疗部署（Mayo Clinic、Tampa General）尤其重要，因为医院环境对协作机器人安全性、可靠性和系统集成要求最高之一，
              能发出可信度信号，加速受监管行业的采购考虑。
