        - Flex Grasp — 轻型物料搬运：推车、周转箱、料箱
        - 支持最后一英里交付任务；更重载荷仍不在当前范围内
      - - 边缘计算
        - NVIDIA Jetson Orin 平台
        - Orin 提供 200+ TOPS AI 算力；明显强于部分竞争对手使用的上一代 Jetson Xavier
      - - 电池系统
        - 支持热插拔；可 24/7 运行
