      - number: '1.4'
        title: 快照指标与规模
        blocks:
          - type: paragraph
            body: >
              作为私有公司，Collaborative Robotics 并不公开披露大部分财务和运营指标。以下快照基于截至 2026 年 5 月已披露事实和第三方估算，尽可能还原现状。累计融资已确认超过
              $140M，分三轮完成。2024 年 4 月 B 轮时员工约 40 人；数据库估算显示，到 2026 年初增至约 150 人，这与公司计划使用 B 轮资金扩充 AI、工程和商业团队相吻合。公司在加州 Santa
              Clara（总部）和 Washington 州 Seattle（2024 年中开设的 AI 研究与工程中心）设有办公室。营收、ARR 和单位经济未公开披露，本报告将其视为重大证据缺口。


              五家已公开点名客户——Maersk、Mayo Clinic、Moderna、Owens and Minor 和 Tampa General Hospital——横跨物流、医疗和制药 / 生物科技环境，验证了
              Proxie 跨垂直的适应性。Maersk 是全球最大的综合物流公司之一。Moderna 运营复杂的生物技术制造和分销体系。Mayo Clinic
              是全球知名医疗系统，安全和可靠性标准很高。这种客户多样性具有战略意义：它说明 Proxie
              可以处理不同物料类型、工作流结构和安全要求，而不必依赖定制硬件。各客户的部署规模（部署机器人数量、吞吐指标）尚未公开披露。
