chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 于 2022 年注册成立，总部位于加州 Santa Clara，并在 Washington 州 Seattle
              设有第二办公室。公司研发并部署面向真实工业环境的实用型协作自主移动机器人，通常称为「协作机器人」（cobots）。公司以「Cobot」品牌对外经营，域名为 co.bot。其旗舰且首个商业部署产品是
              Proxie，这是一款移动操作机器人，可在仓库、医疗机构和物流中心与人类员工并行，搬运推车、箱子和周转箱等物料。Cobot
              自述使命是创造一个让可信协作机器人无缝进入有用工作场景的世界，覆盖制造、物流、医疗和市政服务等领域。


              公司的主要商业模式是机器人即服务（RaaS）：客户支付经常性订阅费，把机器人硬件、部署、车队管理软件、维护和 AI 更新打包在一起。客户无需承担大额前置资本开支，Cobot
              也能获得更可预测的经常性收入。补充性的「Flywheel Program」把客户纳入部署伙伴，形成正循环：现场机器人越多，产生的 AI 训练数据越多，机器人能力随之提升，单机成本也会随时间下降。公司未公开披露
              Proxie 的 RaaS 定价，但更广义的仓储级协作机器人 RaaS 市场通常为每台机器人每月 $3,000–$10,000，取决于载荷能力、服务等级和部署复杂度。作为私有公司，Cobot
              的营收、毛利率和盈利指标均未公开披露。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
      - number: '1.2'
        title: 创立历史与领导层
        blocks:
          - type: paragraph
            body: >
              Brad Porter 于 2022 年离开 Scale AI 后创立 Collaborative Robotics。他在 Scale AI 于 2020 年 8 月至 2022 年 3 月担任 CTO，此前在
              Amazon 工作近 14 年。在 Amazon，Porter 曾任机器人副总裁兼杰出工程师，领导一支约 10,000 人的全球团队，并监督 Amazon 全球履约网络中超过 200,000
              台机器人的部署。他参与规模化 Amazon Robotics——其基础来自 Kiva Systems 收购——让他直接看到了仓储自动化的巨大机会，也看到了大规模落地的现实边界。


              Porter 与 Jane Mooney、Steph Tryphonas 共同创立 Cobot；公司「story」页面称两人是他的长期朋友和合作伙伴。公司早期工程人才来自
              Apple、Amazon、Waymo、NASA、Google、Microsoft 和 Meta。来自 Apple 的硬件工程师 Jack Erdozain 是最早一批员工之一。Sarah Rathbun 曾在
              Amazon 与 Porter 共事，后在 Meta 负责人才招聘，她帮助 Cobot 建起一套严格招聘流程，标准更接近大科技公司，而不是只靠人脉招人。


              公司董事会包括 General Catalyst 董事总经理 Paul Kwan，他在 B 轮同时加入董事会；Sequoia Capital 合伙人 Alfred Lin 自 A 轮起担任董事。Teresa
              Carlson 在 B 轮时加入顾问团队；她曾负责 Amazon Web Services 全球公共部门，曾任 Microsoft SVP，也曾任 Flexport 总裁兼首席商务官。University of
              Washington 教授、前 Amazon 高管 Sidd Srinivasa 担任顾问，Cobot 还向 UW Allen School of Computer Science and Engineering
              提供研究资助，支持他的工作。Michael Vogelsong 曾共同创立 Amazon 的 Deep Learning Technologies 团队，后加入 Cobot，在 Seattle 领导
              Foundation Models AI 研究团队。
