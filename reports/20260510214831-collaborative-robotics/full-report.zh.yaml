      - number: '8.3'
        title: 情景分析——悲观、基准与乐观
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 的投资案例可用三种主要估值情景来组织；每种情景都由 RaaS 经济性、医疗垂直渗透率，以及 2025–2028 年竞争动态的不同假设驱动。


              悲观情景的隐含估值区间为 $300M 到 $500M，触发因素包括：硬件成本超支导致规模化后无法实现正毛利；企业 AMR 需求按 Locus Robotics 疫后经验走向常态化；或出现竞争替代事件，尤其是中国
              AMR 厂商在物流领域施加价格压力。在该情景下，Cobot 的估值只会较 6 River Systems 和 Fetch Robotics 的收购价有温和溢价，并按市场环境调整，不会获得有意义的 ARR
              倍数扩张。若 Series C 在 ARR 得到充分证明前完成，为补偿收入风险，投资人可能要求更低倍数，悲观情景出现概率最高。


              基准情景为 $600M 到 $1.1B，反映收入前 AI 机器人平台公司的分析师共识：一级风投背书，且拥有五个或更多企业客户部署。该情景假设 RaaS 合同在积极续约和扩张，Proxie
              在医疗和物流环境中持续可靠运行，Series C 则围绕已证明的规模化机队部署叙事完成融资。鉴于 Cobot 团队和投资人基础质量，基准情景概率最高；但估值谈判至少需要一些 ARR 可见性来锚定。


              乐观情景估值达到 $2B 或以上，需要两个或更多医疗系统客户扩张到多院区部署，物流渗透超越 Maersk，并有具体证据表明数据飞轮差异化转化为可衡量、优于竞争对手的 AI 导航表现。IPO 或战略收购时 $5B
              以上的上行情景对应 Symbotic 先例，需要 Cobot 到 2028 年在多个垂直领域实现规模化部署。每种情景都有具体阈值触发条件和监控指标，投资人应在 Series C 承诺后按季度跟踪。
