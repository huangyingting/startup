  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与执行风险
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 的核心价值主张，押在其 AI 导航系统能否在真实仓库、医院和制造环境中保持可靠。Proxie 依靠多模态传感器融合——把
              LiDAR、深度相机和惯性测量单元组合起来——在没有固定基础设施的动态运营空间中导航。这套方法在受控环境里技术上已被证明可行，但企业级部署会引入仿真和实验室难以完整复现的变量：员工不可预测地穿过机器人路径、地面杂物和液体泼洒、跨班次照明变化，以及
              WMS 集成逻辑的边缘案例。


              拥挤或动态变化环境中的 AI 导航失败，对包括 Cobot 在内的所有 AMR 厂商仍是真实风险。传感器退化——无论来自 LiDAR
              校准漂移、制药洁净室里的相机镜头污染，还是温差较大的仓库环境中的热应力——都可能触发导航失败，或迫使机器人进入恢复模式，拉低吞吐并侵蚀客户信任。热插拔电池系统是 24/7
              运营的关键在线率支撑，但在高湿、多班次环境中大规模运行时的可靠性，没有长期现场数据很难验证。


              软件 OTA 更新失败是一类独立且被低估的风险。全机队 OTA 更新虽然运营效率高，但可能把回归缺陷同时推给所有已部署机器人；传统硬件故障通常只影响单台设备。WMS 和 ERP
              集成复杂度会拉长部署周期，并制造客户特定的故障模式，这些故障在上线前很难预测或预防。每新增一个客户环境，就会增加集成工作，推迟价值兑现并抬高支持成本。未经验证的规模、传感器可靠性和软件更新风险叠加，使技术执行成为任何潜在
              Series C 投资人最应优先尽调的领域之一。
            claimRefs:
