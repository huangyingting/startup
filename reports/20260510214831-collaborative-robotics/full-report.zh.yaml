            title: NVIDIA Orin 供应集中带来技术风险
            body: >
              Proxie 的边缘计算平台完全依赖 NVIDIA Jetson Orin 模块，而自 2023 年以来影响 AI 芯片市场的 NVIDIA 供应约束，也会波及这些模块。若出现重大供应中断， 或 NVIDIA
              将高毛利数据中心产品优先于嵌入式计算模块，Proxie 量产爬坡可能延后，硬件成本可能上升，甚至迫使 Cobot 进行昂贵的平台迁移。 Cobot 尚未公开披露任何供应协议条款或替代计算方案。
