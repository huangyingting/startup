      - number: '5.3'
        title: 技术成熟度与制造
        blocks:
          - type: paragraph
            body: >
              按标准 TRL 量表，Proxie 已达到 8 到 9 级技术成熟度，意味着系统已经通过真实企业部署在运营环境中得到验证，而不是仅停留在原型或实验室演示阶段。这个成熟度让 Proxie 显著领先于许多在 TRL
              4 到 6 级——原型或试点阶段——融资的深科技机器人初创公司，也反映 Cobot 创始团队过去在 Amazon 规模化部署机器人系统的经验，加速了产品开发轨迹。


              截至 2024 年 11 月公开发布公告，五家具名企业客户——Maersk（全球物流和航运）、Mayo Clinic（医疗和医院物流）、Moderna（制药制造）、Owens and
              Minor（医疗物资分销）以及 Tampa General Hospital（医院运营）——正在积极部署 Proxie 机器人。这些参考客户横跨三个不同垂直行业（物流和航运、医疗设施、制药制造），说明
              Proxie 的无围栏协作设计和多环境适应性已在差异显著的运营场景中得到验证，而不只是单一用例。Maersk 的参与尤其重要，考虑到其全球物流运营规模，随着关系成熟，它可能打开数百到数千台级别的车队部署路径。


              Cobot 采用合同制造模式，而不是自建产线生产 Proxie
              机器人，沿用了成熟硬件即服务公司的资本高效路径：利用专业合同制造商实现生产规模，同时内部掌握设计、软件和质量标准。这个模式降低了制造基础设施资本开支需求，也让 Cobot
              能借助成熟合同制造伙伴的既有产能更快扩大产量，而不必建设自有生产线。合同制造引入供应链集中风险——尤其是 Proxie 依赖 NVIDIA Jetson Orin
              计算模块——但在产品产量仍处于早期增长阶段时，能够降低固定资本需求。Proxie 各关键子系统的技术成熟度评估反映了不同置信水平和剩余开发风险，技术成熟度表中有更详细说明。
