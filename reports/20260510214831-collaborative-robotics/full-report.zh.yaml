      - number: '5.4'
        title: 知识产权与护城河
        blocks:
          - type: paragraph
            body: >
              Cobot 在机器人技术上的可持续竞争优势来自四类相互强化的护城河：受专利保护的硬件架构、用独特部署数据训练的专有 AI 算法、每次机器人部署都会让 AI
              训练语料复利增长的数据飞轮，以及植根于创始团队和关键工程人才深科技经验的人才护城河。这些护城河作用于不同时间尺度：人才护城河提供即时差异化；算法和数据护城河随车队增长而增强；如果专利成功授权并得到执行，专利护城河会形成持久法律壁垒。


              Cobot 已向 USPTO 提交覆盖 Glide 360 蟹行转向驱动架构和专有导航算法的专利申请。虽然申请仍在审查中，尚未公开宣布已授权专利，但申请记录表明 Cobot 认为这些技术路径可受保护，并且有别于
              AMR 与协作机器人领域的既有技术。鉴于全向运动相较 Locus Robotics、6 River Systems 部署的差速驱动 AMR，以及 Vecna Robotics 和 Mobile
              Industrial Robots 第一代协作机器人平台，是有意义的差异化，蟹行驱动专利尤其相关。


              创始层面的人才护城河格外强。Brad Porter 曾任 Amazon 机器人副总裁，管理 200,000+ 台已部署机器人和约 10,000
              名团队成员，带来几乎无法仅靠招聘复制的机器人部署知识深度。Michael Vogelsong 联合创立 Amazon 的 Deep Learning Technologies 团队，为 Proxie 的智能栈提供
              AI 和机器学习基础。两种背景——大规模机器人部署实践与深度学习研究——组合罕见，直接影响 Proxie 设计，也让 Cobot 的 AI 真正原生，而不是事后外挂。ISO 10218-1:2025 和
              ANSI/A3 R15.06-2025 安全资质进一步强化护城河，因为它们设置了监管门槛；安全成熟度较低的竞争对手必须跨过这道门槛，才能服务 Cobot 已经部署的受监管医疗和制药客户。
