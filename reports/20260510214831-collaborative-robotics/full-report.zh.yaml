          - type: callout
            title: Owens & Minor 关系提供通向 4,000 多家医院客户的嵌入式渠道
            body: >
              Owens & Minor 是医疗产品分销商，服务 4,000 多家医院；这让双方关系有机会超越单一客户，发展成嵌入式渠道合作。如果 Cobot 与 Owens & Minor 建立分销或渠道安排——类似
              Flywheel Program 的伙伴模式——Owens & Minor 网络可能成为间接获客渠道，大幅降低触达医院物料管理采购方的成本和摩擦；这些买方已经信任并与 Owens & Minor 交易。
