  - id: TV006
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 投资逻辑（正面）
      - 反向逻辑（负面）
      - 解决路径
    rows:
      - - 团队与领导力
        - Brad Porter 是全球最可信的企业机器人运营者之一；Sequoia 和 GC 背书位于顶级梯队；Mayo Clinic 同时是投资方和客户，是独特验证
        - 关键人物集中度极高；公司尚未宣布 CFO/CRO/COO；接班计划未公开
        - 向管理层索取组织架构、联合创始人职能分工和高管招聘计划
      - - 市场机会
        - AMR 市场到 2030 年 CAGR 为 14.4%；医疗垂直领域形成可防守的细分市场，切换成本高且有 HIPAA 合规门槛
        - 后疫情 AMR 需求回归常态已有记录（Locus Robotics）；中国 AMR 厂商在物流领域的价格竞争正在加剧
        - 按季度跟踪各垂直领域的客户续约率和竞争输赢数据
      - - 产品与技术
        - Flywheel Program 让每次部署都叠加数据护城河；Scout Sense 感知由 NVIDIA 提供算力，形成 AI 差异化；OTA 更新支持持续改进
        - 未公开 MTBF 数据；没有可识别的已授权专利组合；任何导航故障都可能让 OTA 更新风险波及全车队
        - 审计 AI 性能指标，开展 IP FTO 审查，并评估 OTA 政策
      - - 财务模型
        - 若单位经济性为正，RaaS 模式会形成类似年金的经常性收入；募集 $140M 就实现五个具名客户和产品发布，资本效率较高
        - 收入或 ARR 披露为零；RaaS 单位经济性未知；硬件留在资产负债表上，规模化后会放大杠杆风险
        - 发出任何投资条款清单前，必须在 NDA 资料室查看经审计财务和单位经济模型
      - - 估值支撑
        - 医疗护城河和团队溢价支撑基准情景上半段；数据飞轮的网络效应值得对未来 ARR 给予类似 SaaS 的倍数；可比并购提供估值底
        - 没有 ARR 可锚定任何倍数；Berkshire Grey 和 Locus 表明 AMR 估值难以维持峰值；若 RaaS 经济性失效，悲观情景为 $300M
        - 披露 ARR 并验证单位经济性，是把估值不确定性降到 40% 以下的唯一路径
    notes: 投资逻辑和反向逻辑仅基于公开信息。要彻底解决反向逻辑，需要通过 NDA 资料室取得财务数据、客户合同条款和工程性能指标。
