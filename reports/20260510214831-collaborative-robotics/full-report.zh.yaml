  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心硬件架构
        blocks:
          - type: paragraph
            body: >
              Proxie 是 Collaborative Robotics 的首款、也是当前主要商业产品。它是一款非人形自主移动机器人，于 2024 年 11
              月正式发布，从一开始就围绕在仓库、物流中心、医疗设施和受监管制造环境中与人类员工安全协作而设计。传统工业机器人通常需要用安全围栏和禁入区与人类员工物理隔离；Proxie
              则通过无围栏协作运行认证，这一硬件和软件设计要求从一开始就塑造了每个子系统。


              核心机械平台围绕 Glide 360 蟹行转向驱动系统构建。这是一种全向运动架构，让 Proxie 拥有完整 360 度移动能力，包括横向平移、原地旋转和对角穿行。该蟹行转向设计使 Proxie
              能在高度拥挤的仓库通道、医院走廊和不规则设施布局中导航；这些场景往往会难倒传统差速驱动或 Ackermann 转向 AMR。Cobot 已提交覆盖蟹行驱动架构的专利申请，反映公司认为它相较 Boston
              Dynamics、GreyOrange、Vecna Robotics 和 Mobile Industrial Robots 等既有 AMR 运动系统，是真实机械差异化。热插拔电池系统支持 24/7
              连续运行，机器人无需停机充电：操作员可在数分钟内将耗尽电池包换成满电电池，在多班次仓库和医疗环境中保持运营连续性。


              Scout Sense 感知系统由多模态传感器阵列组成，结合摄像头、LiDAR 和超声波传感器，在不同光照条件、工作距离和障碍物类型下提供全面环境感知。传感器融合架构确保 Proxie
              能在协作环境所需的完整运营边界内，检测并响应人类员工、叉车、推车和其他动态障碍。Flex Grasp 操作系统处理轻型物料运输，包括推车、周转箱和料箱，使 Proxie
              能完成此前需要人力或更大、更昂贵机器人系统承担的末端物料交付任务。所有系统的核心是 NVIDIA Jetson Orin 计算平台，它提供强大的边缘 AI 算力，使实时感知、导航和任务执行不依赖云端。
