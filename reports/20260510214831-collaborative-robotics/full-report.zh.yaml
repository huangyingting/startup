      - number: '1.5'
        title: 公司里程碑
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 从创立到商业部署不到三年；对资本密集型硬件创业公司来说，这一商业化速度相当快。公司由 Brad Porter 于 2022 年创立；数周内，创始团队开始招聘机器人和
              AI 专家，并启动工程开发。到 2023 年夏 A 轮时，Cobot 已拿到三家已承诺客户，并完成早期概念验证机器人运行。到 2024 年 1 月 30 日（Porter 在配合 B
              轮公告发布的博客中描述），公司已有一台可现场使用的完整功能机器人。2024 年初，第一台 Proxie 在一家全球转运设施部署，用于推车移动，这是公司的首个创收商业部署。2024 年 4 月，公司宣布 $100M
              B 轮，同时聘请 Michael Vogelsong 领导 Foundation Models AI 团队，并开设 Seattle 办公室。


              Proxie 于 2024 年 11 月公开发布，Cobot 同时正式公布五家已点名客户：Maersk、Mayo Clinic、Moderna、Owens and Minor 和 Tampa General
              Hospital。公司也在同一时间宣布向 University of Washington 提供研究资助，强化其对基础 AI 研究的投入。截至 2026 年 5
              月，公司仍在运营并扩大客户车队。这一期间，Cobot 未见公开报道的重大负面事件，例如安全召回、领导层离职、诉讼或重大裁员；这对早期运营稳定性是正向信号。主要里程碑缺口是尚未出现 C
              轮或其他已披露融资轮次；随着公司扩大商业项目和员工规模，投资者应持续跟踪。
