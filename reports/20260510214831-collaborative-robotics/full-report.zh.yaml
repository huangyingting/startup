      - number: '3.3'
        title: 平台与 incumbent 竞争
        blocks:
          - type: paragraph
            body: >
              Amazon Robotics 运营全球最大的私有 AMR 车队；截至 2024 年，Amazon 全球履约网络部署机器人超过 750,000 台。Amazon Robotics
              虽然不把技术作为商业产品对外销售，但其规模设定了性能预期和安全基准，企业买方评估外部 AMR 供应商时越来越会套用这些标准。Amazon 的内部机器人能力也构成间接竞争，因为它降低了 Amazon
              相邻物流运营商投资第三方 AMR 方案的动力。因此，Brad Porter 直接领导 Amazon Robotics 的经历既是竞争资产——说明他理解最高规模部署挑战——也会抬高买方对 Cobot
              产品质量和可靠性的期待。


              Boston Dynamics 专门面向仓库箱件搬运和卡车卸货应用推广 Stretch 机器人，定位高端，瞄准资金充足的企业账户。Stretch 的商业规模早于 Proxie
              的程度有限，但在物流搬运用例中构成直接竞争威胁。OTTO Motors 制造大型自主移动机器人，面向制造环境，尤其是汽车和重工业设施；这些场景的载荷要求超过协作仓储 AMR，因此它更像 Cobot 仓储 /
              医疗目标市场的互补玩家，而非直接竞争对手。Mobile Industrial Robots（MiR）被 Teradyne 收购后，在欧洲制造业 AMR
              部署中占据主导位置，并通过工业自动化经销商拥有强渠道。Geek+ 和 HAI Robotics
              是中国供应商，分别提供货到人系统和箱件搬运自动化，并以具备价格竞争力的硬件积极进入西方市场，可能对北美高端供应商造成商品化压力。整体看，平台与 incumbent 层资源充足、企业关系成熟、技术已验证；Cobot
              必须依靠 AI 原生差异化，在正面竞争评估中证明溢价 RaaS 定价合理。
