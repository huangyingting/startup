      - number: '4.3'
        title: 融资历史与资本配置
        blocks:
          - type: paragraph
            body: >
              Collaborative Robotics 自 2022 年成立以来，已完成三轮披露融资，累计超过 $140 million。公司 2022 年 $10 million 种子轮为技术开发、原型搭建以及 Brad
              Porter 领导下的早期团队建设提供了初始资本。2023 年夏季 $30 million Series A 由 Sequoia Capital 领投，Alfred Lin
              加入董事会——这对硅谷最挑剔的风投机构之一来说，是一个重要的机构信念信号。其他 Series A 投资人包括 Khosla Ventures、Mayo
              Clinic（兼具投资人和早期客户身份，尤其值得注意）、Neo、1984 Ventures、MVP Ventures 和 Calibrate
              Ventures，组成了覆盖风投、战略企业投资人和机器人专项基金的多元投资人财团。


              2024 年 4 月宣布的 $100 million Series B 由 General Catalyst 领投，Paul Kwan 加入董事会，并引入 Bison Ventures、Industry
              Ventures 和 Lux Capital 等新投资人，同时既有股东继续跟投。General Catalyst 的领投角色，释放出对 Cobot 扩大企业部署并跑通 RaaS
              商业模式的信心。成立不到两年，披露融资总额就超过 $140 million，使 Cobot 成为当前这一批 AMR 初创公司中融资速度最快的公司之一。SEC 的 Form D 文件确认，Series A 与
              Series B 均为 Regulation D 下的豁免发行。


              按 Cobot 当前阶段，资本配置重点通常包括制造爬坡和机器人单位经济模型改善、企业销售与解决方案工程招聘、Proxie 功能扩展的产品工程（包括 Flex Grasp 和 AI 软件）、Flywheel
              Program 伙伴生态建设，以及 AI 研究和数据基础设施投资。Mayo Clinic 同时作为投资人和早期客户，验证了医疗垂直行业是真实收入机会，也提供了一个能加速医院物流用例产品开发的战略合作关系。员工数从
              Series B 时点（2024 年 4 月）约 40 人，增长到 2026 年初约 150 人，反映工程、销售和运营快速扩张；这意味着运营费用显著上升，必须靠 ARR 增长抵消，才能守住现金跑道。
