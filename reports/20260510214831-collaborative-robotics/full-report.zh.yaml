    title: 缓释与否决标准表
    columns:
      - 风险
      - 可监测触发因素
      - 阈值 / 否决事件
      - 行动含义
    rows:
      - - 技术 — 医疗客户发生机器人安全事件
        - Proxie 在临床环境中的导航故障报告或客户升级事件
        - 任何公开报道的伤害、险些事故或监管调查，且涉及 Proxie 在 Mayo Clinic、Tampa General 或 Moderna 的部署
        - 立即复核投资逻辑；暂停任何未出资承诺；等待根因分析和整改计划后再推进
      - - 财务 — Series C 融资失败或严重降轮
        - Series B 完成后 18 个月内未宣布 Series C（基于烧钱估计，预计应在 Oct 2025 前后），或新一轮估值低于 Series B 估值的 1.2x
        - 确认降轮；仅由现有投资者提供过桥融资；公司启动战略买家接触
        - 对投资逻辑做实质性重估；要求更新财务预测和现金跑道分析；考虑退出替代方案
      - - 竞争 — 因价格输给中国 AMR 厂商，丢失两个或更多企业投标
        - 赢输分析显示 Geek+ 或 HAI Robotics 以 30%+ 价格折扣赢得企业物流投标
        - 在医疗相邻细分市场（非物流）连续两次输给具价格竞争力的中国厂商，且客户被点名
        - 复核竞争定位；要求管理层提供定价和产品差异化路线图；评估护城河耐久性
      - - 关键人物 — Brad Porter 离职且没有接班计划
        - 公开宣布 CEO 离职或长期病休；未指定继任者或临时 CEO
        - Series C 完成前宣布 CEO 离职，且没有获得投资者信任的确认继任者
        - 立即与投资者董事会沟通；要求正式接班流程；评估继续持有还是退出
      - - 监管 — 医院部署前发现 ANSI/A3 R15.06-2025 合规缺口
        - 医疗客户采购冻结，理由是 ANSI 2025 不合规；或公司在投资者沟通中承认认证缺口
        - 超过一家医院客户同时因 ANSI 合规缺口暂停部署
        - 要求立即给出合规路线图、时间表和成本；评估对 Series C 叙事的影响；考虑暂停尽调
    notes: 否决标准被设计成可监测的二元事件，能清楚标志投资逻辑恶化。上列风险场景并非全部是否决标准；有些可能仍可在投资逻辑内管理。技术和关键人物否决标准严重程度最高；无论其他指标如何，任一事件都需要立即采取组合行动。
