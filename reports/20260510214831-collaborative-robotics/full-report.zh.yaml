      - number: '4.4'
        title: 盈利路径与现金跑道
        blocks:
          - type: paragraph
            body: >
              按典型硬件机器人初创公司的烧钱速度估算，Collaborative Robotics 的 $100 million Series B 可提供 18 到 36
              个月现金跑道，具体取决于机器人单元制造节奏、销售团队扩张和基础设施投资。这段大约覆盖 2024 年到 2026 年或 2027 年的窗口期，是 Cobot 必须证明 ARR 增长足以支撑规模化 Series C
              融资，或从运营中达到可持续现金流位置的关键阶段。作为背景，硬件机器人初创公司通常在 Series C 或 Series D 才实现盈利，因为多年期 RaaS 合同中的硬件 COGS
              回收周期，会在订阅经济成熟之前制造显著的现金流 J 曲线。


              分析师对 Series B 机器人初创公司的估值基准显示，这一阶段通常适用 3 到 5 倍 ARR 倍数；按行业估算，这意味着 Cobot 的 Series B 后估值约为 $600 million 到 $1.1
              billion，不过公司尚未披露官方估值。IFR 报告称全球机器人市场复合年增长率超过 14%，为现金跑道期间的车队扩张和获客提供了有利宏观背景。ANSI/A3 R15.06-2025
              合规投入是一类必要但可管理的成本：新标准为协作机器人部署设定了有约束力的安全验证要求，同时影响 Cobot 的工程成本和部署成本结构。


              Cobot 的盈利路径取决于四个连续里程碑：把已部署车队扩大到足够规模，在硬件 COGS 上获得制造和采购杠杆；随着数据飞轮丰富车队智能并降低单次部署工程人力，扩大软件和 AI
              订阅利润率；在新单元部署上实现硬件盈亏平衡；证明 ARR 足以支撑 Series C 融资，为进入新垂直行业和国际市场提供扩张资本。Proxie 发布时（2024 年 11 月）有 5
              家具名企业客户，之后能否扩展到更广泛部署基础，是近期最可观察的指标，用来判断 Cobot 的市场进入执行是否匹配已投入资本。
