  本报告仅用于尽调和信息参考。报告基于截至 2026-05-10
  的公开数据、分析师报告、新闻稿和第三方媒体，不构成投资建议。前瞻性陈述反映分析师和管理层预测，本身存在不确定性。读者在作出投资决定前，应独立核验，并索取经审计财务报表、股权结构表和客户合同。Collaborative Robotics
