      question: "Does the RaaS model with WMS/ERP integration create genuine switching costs that would prevent customer churn?"
      status: answered
      answeredBy: "WMS/ERP integration creates genuine switching costs: redeploying a different vendor requires re-integration with existing IT systems, retraining staff, and validating new workflows. Multi-year contract terms (standard in enterprise RaaS) add contractual switching costs. However, Locus Robotics' experience shows that post-pandemic enterprise AMR customers did not renew at expected rates despite these structural barriers, indicating switching costs are real but not unconditional."
