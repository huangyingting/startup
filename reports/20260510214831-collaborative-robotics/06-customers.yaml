      targets: ["contentRequirements/4"]
      question: "How does the Flywheel Program create a customer-as-partner model that generates compounding AI training benefits?"
      status: answered
      answeredBy: "Each deployed Proxie robot generates operational data (navigation paths, obstacle encounters, task completions) that feeds Cobot's AI training pipeline. The Flywheel Program formalizes this data relationship by designating customers as deployment partners — giving them priority access to AI improvements in exchange for deployment data. As fleet size grows, data volume increases, enabling better model training, which makes robots more capable, attracting more customers. This compounding loop rewards deeper deployment relationships."
      sourceRefs: [SU016, SU017]
      claimRefs: [CU020, CU034]

