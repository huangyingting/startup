chapter:
  number: 6
  title: Customers
  summary: >
    Collaborative Robotics has publicly confirmed five named enterprise customers — Maersk,
    Mayo Clinic, Moderna, Owens & Minor, and Tampa General Hospital — as of its Series B
    funding announcement in April 2024 and Proxie product launch in November 2024. The customer
    base spans three verticals: global logistics and shipping (Maersk), healthcare facilities
    (Mayo Clinic, Tampa General Hospital), and pharmaceutical/healthcare distribution (Moderna,
    Owens & Minor). Three of five customers are in healthcare or pharma, creating meaningful
    vertical concentration. No fleet sizes, contract values, renewal rates, or ACV data have
    been publicly disclosed. All confirmed customers are US-based, with no international
    deployments publicly announced. The Flywheel Program turns customers into deployment
    partners generating AI training data, and the RaaS model creates structural switching
    costs through WMS/ERP integration. The competitive cautionary tale of Locus Robotics —
    which experienced customer normalization and workforce reductions after post-pandemic
    demand contraction — illustrates the risk of over-concentration in enterprise AMR customers.

