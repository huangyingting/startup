sections:
  - id: named-customer-overview
    title: Named Customer Overview
    body: |
      Collaborative Robotics has publicly confirmed five named enterprise customers deploying
      Proxie robots as of the November 2024 product launch: Maersk, Mayo Clinic, Moderna,
      Owens & Minor, and Tampa General Hospital. These customers were named in the April 2024
      Series B press release and reconfirmed in the November 2024 Proxie product launch
      announcement, making them among the most publicly documented early enterprise customers
      for any collaborative AMR startup in recent memory. No additional named customers have
      been publicly announced as of May 2026, meaning the confirmed customer count stands at
      five — a deliberately curated set of reference deployments rather than a broad commercial
      rollout.

      Maersk is the world's second-largest container shipping and logistics company, operating
      a global 3PL network across more than 130 countries. Its adoption of Proxie signals
      potential for large-scale fleet deployments across its vast warehouse and terminal
      infrastructure. Mayo Clinic, ranked the number-one hospital in the United States by
      U.S. News & World Report, uses Proxie for internal logistics operations in its clinical
      supply chain — among the most demanding validation environments for collaborative robot
      safety, reliability, and system integration requirements. Moderna, the pharmaceutical
      manufacturer behind the first FDA-authorized mRNA COVID-19 vaccine, deploys Proxie in
      its manufacturing environment, validating its capability in Good Manufacturing Practice
      (GMP) and FDA-regulated production contexts. Owens & Minor is a Fortune 500 healthcare
      products distributor whose logistics operations serve more than 4,000 hospitals and
      healthcare facilities, offering Cobot significant expansion potential within the Owens
      & Minor customer network. Tampa General Hospital, a Level I trauma center and academic
      medical center affiliated with the University of South Florida, further validates
      Cobot's healthcare vertical depth.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU007, CU008, CU009, CU030, CU031, CU023]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: deployment-evidence-and-traction
    title: Deployment Evidence and Traction
    body: |
      The public evidence base for Cobot's customer deployments is anchored by two official
      press releases: the April 2024 Series B funding announcement, which named all five
      enterprise customers as active or committed deployments, and the November 2024 Proxie
      product launch press release, which confirmed the same five customers in the context of
      the product's commercial availability. Both releases are sourced directly from PR Newswire
      as official company communications and are corroborated by independent trade publications
      including The Robot Report, VentureBeat, GeekWire, and Modern Materials Handling, each
      of which covered the Series B and Proxie launch with their own editorial framing.

      What the public evidence does not provide is granular deployment data: no fleet sizes
      have been disclosed for any of the five customers, no annual contract values have been
      published, no deployment footprint maps have been released, and no case studies with
      operational performance metrics have been made public. The absence of this detail is
      consistent with the pre-commercial scale of the company and the standard practice of
      enterprise SaaS and RaaS vendors protecting customer contract terms as confidential.
      Mayo Clinic's participation as both investor (Series A) and named customer represents
      the most publicly validated deployment relationship, with multiple independent sources
      confirming the dual investor-customer role. No customer has provided a public testimonial,
      press quote, or case study as of the report date, leaving deployment depth — fleet sizes,
      utilization rates, ROI outcomes — entirely opaque to external analysis.

      From an investor perspective, the five named enterprise customers at a 2022-founded
      company with a product launched in November 2024 represent a strong pre-commercial
      traction signal. Enterprise AMR buyers typically run multi-month pilots before committing
      to fleet deployments, and all five named customers had reached a stage sufficient to be
      publicly named at launch, suggesting active operational deployments rather than
      mere letters of intent or pilot agreements.
    claimRefs: [CU006, CU010, CU011, CU012, CU013, CU016, CU022, CU023, CU024]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: customer-concentration-risk
    title: Customer Concentration Risk
    body: |
      With only five publicly confirmed customers, Collaborative Robotics faces meaningful
      customer concentration risk at its current pre-commercial scale. Three of the five
      named customers — Mayo Clinic, Moderna, and Owens & Minor — operate primarily in the
      healthcare and pharmaceutical verticals, creating vertical concentration of at least
      60% by customer count. If healthcare and pharma customers generate disproportionate
      revenue relative to the logistics customer (Maersk) and the hospital customer
      (Tampa General), the effective vertical concentration by revenue could exceed 60%,
      amplifying the impact of any healthcare sector regulatory change or procurement freeze.

      The cautionary tale of Locus Robotics is directly relevant. Locus, which was once the
      most prominent enterprise AMR vendor in the US, experienced significant customer
      normalization after the pandemic-era e-commerce surge subsided, with some major customers
      declining to renew or expand contracts as fulfillment volumes returned to pre-pandemic
      baselines. Locus subsequently reduced its workforce and faced financial stress, illustrating
      how enterprise AMR customer relationships can be disrupted by macro demand shifts rather
      than product quality failures. For Cobot, any of its five current customers experiencing
      budget freezes, strategic pivots, or deployment disappointments could be material to revenue
      at this early stage.

      Geographic concentration is an additional risk dimension: all five confirmed customers
      are US-based, meaning Cobot has zero publicly confirmed international revenue. Maersk,
      as a global shipping and logistics operator, represents the most natural pathway for
      international fleet expansion, but no international deployments have been announced.
      Mid-market and SMB customers are entirely absent from the confirmed customer list,
      meaning Cobot's entire disclosed revenue base is enterprise. No customer churn,
      renewal, or upsell data has been publicly disclosed, making it impossible to assess
      customer lifetime value or retention rate from external sources.
    claimRefs: [CU010, CU011, CU012, CU013, CU014, CU015, CU028, CU032, CU033, CU036]
    tableRefs: [TU003]
    figureRefs: []

  - id: vertical-expansion-potential
    title: Vertical Expansion Potential
    body: |
      Cobot's current customer mix — one global logistics company, two academic medical centers,
      one pharmaceutical manufacturer, and one healthcare product distributor — reflects a
      deliberate early strategy of targeting regulated, high-value environments where the
      collaborative, cage-free design of Proxie provides the clearest operational advantage
      over traditional industrial robots. The same characteristics that make healthcare and
      pharma attractive early markets — rigorous safety requirements, premium pricing tolerance,
      preference for trusted partners, long contract relationships — also create expansion
      opportunities into adjacent verticals with similar profiles.

      The global logistics and 3PL market is the broadest addressable vertical for Proxie.
      AMR adoption in warehouse and distribution center environments is growing at approximately
      14% CAGR through 2030, according to multiple analyst forecasts. Maersk's involvement as
      an anchor logistics customer creates a reference case that can be leveraged for conversations
      with other 3PL operators including DHL, FedEx, UPS, and regional 3PLs. The pharmaceutical
      manufacturing vertical — validated by Moderna's deployment — offers significant expansion
      opportunities given the FDA regulatory requirements that create procurement barriers for
      less mature competitors without GMP environment track records.

      Hospital and healthcare system logistics automation represents one of the fastest-growing
      AMR sub-verticals, driven by rising labor costs in clinical settings, Joint Commission
      requirements for infection control, and the operational complexity of managing materials
      across multi-floor hospital campuses. Owens & Minor's position as a healthcare product
      distributor servicing over 4,000 hospitals creates a potential channel partnership
      opportunity where Cobot could reach hospital customers through the Owens & Minor
      distribution relationship. The Flywheel Program — which converts customers into deployment
      partners — is particularly well-suited to healthcare networks where a health system's
      positive experience creates referral pathways to peer institutions. Manufacturing,
      retail fulfillment, and municipal services represent longer-term expansion verticals
      that Cobot has signaled interest in but has not yet confirmed with named customers.
    claimRefs: [CU017, CU018, CU019, CU025, CU026, CU029, CU030, CU034, CU035]
    tableRefs: [TU004]
    figureRefs: [FU003]

  - id: customer-success-and-retention
    title: Customer Success and Retention
    body: |
      Collaborative Robotics has designed two structural mechanisms that promote customer
      retention and long-term revenue predictability: the Flywheel Program and the RaaS
      commercial model. The Flywheel Program engages customers as active deployment partners,
      meaning each customer's deployment generates operational data that feeds back into
      Proxie's AI training pipeline and improves fleet-wide navigation and task performance.
      This creates a mutual dependency: customers benefit from AI improvements enabled by
      the collective fleet data, while Cobot benefits from the training data generated by
      each deployment. The deeper the deployment, the more data generated, and the more
      capable Proxie becomes — creating a self-reinforcing retention incentive that goes
      beyond contractual lock-in.

      The RaaS commercial model creates additional switching costs through deep integration
      with customer warehouse management systems (WMS) and enterprise resource planning (ERP)
      platforms. Replacing a deployed Proxie fleet requires not just a new robot vendor but
      full re-integration of the successor system with existing IT infrastructure, operational
      workflows, and staff training programs. Enterprise RaaS contracts in the AMR industry
      typically run two to five years with multi-year commitments, providing revenue
      predictability for Cobot and deployment stability for customers.

      Despite these structural advantages, no customer renewal, upsell, or expansion data
      has been publicly disclosed. It is impossible to assess Cobot's actual retention rate
      from external sources. The risk that a customer does not renew after an initial
      pilot or short-term contract is real: enterprise AMR procurement decisions can be
      reversed by budget cycles, changes in strategic direction, or consolidation of
      the robotics program to a single incumbent vendor. The Locus Robotics experience
      demonstrates that enterprise AMR customer relationships are not unconditionally sticky.
      Cobot's customer success function, deployment support model, and contract renewal terms
      are not publicly documented, leaving retention risk assessment as a material evidence gap.
    claimRefs: [CU020, CU021, CU027, CU034, CU036, CU015, CU016]
    tableRefs: []
    figureRefs: []

