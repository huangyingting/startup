  - calloutType: strength
    title: "Elite Reference Customers Validate Product Across Three High-Barrier Verticals"
    body: >
      Deploying Proxie at Maersk (global 3PL), Mayo Clinic (#1 US hospital), and Moderna (pharma
      manufacturing) within two years of founding provides an exceptionally strong enterprise
      validation signal. Each of these customers operates in a high-barrier procurement environment
      with extensive safety, compliance, and vendor qualification requirements. Successfully
      navigating these procurement processes — particularly in FDA-regulated pharma manufacturing
      and JCAHO-accredited clinical settings — creates a reference asset that accelerates
      consideration by peer enterprises in the same verticals.
    claimRefs: [CU001, CU002, CU003, CU023]

  - calloutType: strength
    title: "Mayo Clinic Investor-Customer Dual Role Is Strongest Possible Customer Validation"
    body: >
      Mayo Clinic's participation as both a Series A investor and a named customer creates the
      deepest possible public validation of Proxie's healthcare logistics capability. When a
      top-ranked medical institution commits both capital and operational deployment to a
      startup's product, it represents a level of due diligence and institutional confidence
      that provides a credibility signal no marketing material can replicate. This dual
      relationship also creates an aligned incentive for Mayo Clinic to support Cobot's
      commercial success and provide deployment access for ongoing AI training data generation.
    claimRefs: [CU002, CU022, CU023]

  - calloutType: risk
    title: "Healthcare/Pharma Concentration Creates 60%+ Vertical Exposure at Pre-Scale Stage"
    body: >
      Three of five named customers operate in healthcare or pharmaceutical environments, creating
      vertical concentration that exposes Cobot to sector-specific risks: hospital budget freezes,
      pharmaceutical manufacturing slowdowns, healthcare M&A consolidation, or FDA regulatory
      changes could simultaneously affect multiple customers. At five total customers, each
      relationship is material. The Locus Robotics post-pandemic experience — in which enterprise
      AMR customers declined to renew or expand contracts as warehouse volumes normalized —
      illustrates how enterprise AMR relationships can deteriorate quickly despite prior
      commitment signals.
    claimRefs: [CU010, CU014, CU015, CU028, CU032, CU036]

  - calloutType: risk
    title: "No Fleet Sizes, ACV, or Renewal Data Disclosed — Deployment Depth Opaque"
    body: >
      Despite five publicly named customers, no quantitative deployment data has been disclosed:
      fleet sizes, annual contract values, renewal rates, expansion rates, and operational
      performance metrics are entirely absent from public sources. This information gap prevents
      external assessment of actual commercial momentum. A company with five customers at ten
      robots each has a fundamentally different growth trajectory than one with five customers
      at 100 robots each — and this distinction is currently unresolvable from public data.
    claimRefs: [CU011, CU012, CU036]

  - calloutType: insight
    title: "Owens & Minor Relationship Offers Embedded Channel to 4,000+ Hospital Customers"
    body: >
      Owens & Minor's role as a healthcare product distributor serving more than 4,000 hospitals
      creates a potential embedded channel partnership opportunity that goes beyond a single
      customer relationship. If Cobot and Owens & Minor develop a distribution or channel
      arrangement — analogous to the Flywheel Program's partner model — the Owens & Minor
      network could become an indirect customer acquisition channel, dramatically lowering
      the cost and friction of reaching hospital material management buyers who already
      trust and transact with Owens & Minor.
    claimRefs: [CU004, CU030, CU034]

