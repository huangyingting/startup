callouts:
  - calloutType: strength
    title: "Large and Growing TAM Confirmed by Multiple Independent Analysts"
    body: >
      The global AMR market is confirmed at $4.74B in 2025 with a 14.4% CAGR by Grand View
      Research, corroborated by MarketsandMarkets ($4.5B in 2024 growing to $26B by 2030) and
      IDTechEx ($5.2B collaborative robots at 18% CAGR). Multi-source convergence on strong
      growth trajectories provides high confidence in the durability of Cobot's total addressable
      market through the 2030 investment horizon.
    claimRefs: [CM001, CM002, CM005]

  - calloutType: strength
    title: "Structural Labor Shortage Creates Durable, Non-Cyclical Demand"
    body: >
      With 500,000+ unfilled US warehouse positions and no near-term demographic resolution in
      sight, warehouse operators face a structural automation imperative rather than a discretionary
      efficiency upgrade. This durable demand environment creates persistent purchasing motivation
      that benefits Cobot's Proxie deployment cycle and RaaS subscription model well beyond
      any single economic cycle or fiscal year budget window.
    claimRefs: [CM007, CM031]

  - calloutType: risk
    title: "Integration Complexity and ROI Uncertainty Are Material Adoption Barriers"
    body: >
      Enterprise buyers consistently cite legacy WMS integration complexity and multi-year ROI
      payback periods as the top two barriers to AMR adoption. For Cobot as a newer market entrant,
      the absence of independently verified customer ROI benchmarks may prolong sales cycles and
      require more intensive proof-of-concept investments than established competitors face,
      increasing customer acquisition cost.
    claimRefs: [CM016, CM020]

  - calloutType: insight
    title: "RaaS Model Fundamentally Expands the Addressable Buyer Universe"
    body: >
      The shift from capital equipment purchase to Robots-as-a-Service subscription fundamentally
      changes the buyer base for AMR deployment. Mid-market 3PLs, regional hospital networks, and
      pharmaceutical manufacturers that cannot justify large capex commitments become accessible
      customers under a $3,000–$10,000 per-robot monthly model, significantly expanding Cobot's
      reachable market beyond Fortune 500 operators who could always afford traditional automation.
    claimRefs: [CM006, CM014, CM032]

  - calloutType: risk
    title: "Highly Fragmented Competitive Landscape Creates Sustained Pricing Pressure"
    body: >
      The presence of more than 100 global AMR vendors, including well-funded incumbents with
      multi-year deployment experience, creates pricing pressure, commoditization risk, and customer
      decision paralysis for new market entrants. Cobot must continuously demonstrate AI-driven
      differentiation and superior ease of deployment to justify premium RaaS pricing against
      established alternatives with larger installed bases and proven track records.
    claimRefs: [CM013, CM029, CM034]

