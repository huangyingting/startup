companyProfile:
  summary: >
    Collaborative Robotics was founded in 2022 in Santa Clara, California, by Brad Porter (former
    Amazon VP of Robotics and former CTO of Scale AI), Jane Mooney, and Steph Tryphonas. Cobot
    builds non-humanoid autonomous mobile robots for enterprise deployment in logistics, healthcare,
    and pharmaceutical environments. Its flagship product, Proxie, launched in November 2024 and
    combines holonomic mobility (Glide 360 swerve drive), eye-level perception (Scout Sense), and
    multi-payload manipulation (Flex Grasp) on an NVIDIA Orin compute platform with AI/LLM
    integration. Cobot sells via a Robots-as-a-Service model and a Flywheel partner deployment
    program. Strategic investors include Mayo Clinic (also a customer), and board seats are held
    by General Catalyst's Paul Kwan and Sequoia Capital's Alfred Lin.
  foundedDate: "2022-01-01"
  founders:
    - name: Brad Porter
      role: Co-founder & CEO
      background: >
        Former VP of Robotics at Amazon (ran Amazon Robotics), former CTO of Scale AI. Key
        architect of Amazon's robotics program that deployed 750,000+ robots. Primary strategic,
        technical, and fundraising leader of Cobot.
      claimRefs: [CO001, CO002]
    - name: Jane Mooney
      role: Co-founder
      background: >
        Early engineering and operations co-founder at Cobot. Background in robotics systems
        engineering and commercialization.
      claimRefs: [CO003]
    - name: Steph Tryphonas
      role: Co-founder
      background: >
        Early co-founder at Cobot. Background in robotics product and business development.
      claimRefs: [CO003]
  foundingLocation: Santa Clara, California, USA
  headquarters: Santa Clara, California (primary); Seattle, Washington (AI research hub)
  productSummary: >
    Proxie is Cobot's flagship non-humanoid collaborative AMR. It features the Glide 360 swerve
    drive for omnidirectional movement, Scout Sense perception suite for eye-level environment
    mapping and obstacle detection, and Flex Grasp for cart, box, and tote manipulation — all
    powered by an NVIDIA Orin compute module and Cobot's proprietary AI stack. Proxie operates
    without safety cages and features hot-swappable batteries for continuous operation.
  customerFocus: >
    Enterprise customers in three verticals: logistics/e-commerce (Maersk), healthcare (Mayo
    Clinic, Tampa General Hospital), and pharmaceutical/life sciences (Moderna, Owens & Minor).
    Cobot targets mid-to-large facilities seeking safe, flexible human-robot collaboration without
    extensive infrastructure modifications.
  businessModel: >
    Robots-as-a-Service (RaaS) subscription model: customers pay a monthly per-robot fee covering
    hardware, software, maintenance, and support. The Flywheel Program extends reach through
    deployment partners (SIs, 3PLs). Estimated RaaS revenue: $3,000–$8,000 per robot per month,
    consistent with AMR market benchmarks.
  stage: Series B (early-stage commercial, pre-profitability)
  fundingStatus: >
    $140M+ total raised: $10M seed (2022), $30M Series A (summer 2023), $100M Series B (April
    2024, General Catalyst lead). Estimated post-money valuation: $700M–$1.1B (not publicly
    disclosed). Strategic investors include Mayo Clinic. Board includes Paul Kwan (General
    Catalyst) and Alfred Lin (Sequoia Capital).
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO003, CO005, CO007, CO017, CO020]

summary:
  headline: >
    Collaborative Robotics is an early-commercial-stage AMR company with exceptional founding
    pedigree, strong enterprise customer proof, and a well-funded runway, positioned to compete in
    a large and growing warehouse automation market — but hardware economics, competitive pressure,
    and key-person concentration warrant a watchful posture with a conditional buy recommendation
    subject to financial and IP diligence.
