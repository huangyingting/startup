company:
  name: "Dream Security"
chapter:
  number: 6
  title: "Customers"
  summary: >
    Dream Security's customer base consists exclusively of government entities, national cyber
    agencies, ministries of defense, and critical infrastructure operators. The company claims
    30+ government customers but Israeli investigative outlet Globes reported fewer than ten
    signed contracts as of early 2025, creating a material discrepancy between bookings language
    and signed-contract count. No customers are publicly named due to the classified nature of
    national security engagements. The company's $130M+ in annual bookings reflects multi-year
    contract structures rather than recognized revenue ($40M estimated by Globes). Geographic
    concentration appears focused on the Middle East (Abu Dhabi office) and European NATO members
    (Vienna office). Investor testimonial from 7GC.co confirms production deployments are occurring
    but without naming specific nations. Retention evidence is structurally favorable—government
    contracts are typically 3-5 years with high switching costs—but no NRR, GRR, or renewal data
    has been published. Concentration risk is high: a small number of large national government
    contracts likely constitute the majority of revenue. The customer base is not diversifiable
    in the short term given the product's sovereign-deployment, national-scale positioning.

sections:
  - id: customer-segmentation
    title: "Customer Base Segmentation and Target Market"
    body: |
      Dream Security's addressable customer universe is deliberately narrow: the company targets
      national governments, ministries of defense, national CERTs, and critical infrastructure
      operators requiring fully sovereign AI cybersecurity capabilities. Unlike enterprise security
      vendors with thousands of SME and mid-market customers, Dream operates in the national
      defense technology segment where individual contracts are large (multi-million to
      multi-hundred-million dollar range) and the total number of potential buyers globally is
      measured in dozens rather than thousands.

      The company's geographic go-to-market reflects this positioning. The Tel Aviv headquarters
      serves as the innovation base, while the Vienna office targets European NATO members and
      European Union agencies that have heightened sovereignty requirements under the EU's NIS2
      Directive and proposed Cyber Resilience Act. The Abu Dhabi office serves the GCC/MENA
      sovereign market, which includes UAE, Saudi Arabia, and other Gulf nations investing heavily
      in national cyber infrastructure following heightened state-sponsored threat activity in the
      region. Dream Security's leadership structure reinforces this go-to-market: CEO Shalev Hulio
      brings deep Middle East government relationships from NSO Group; President Sebastian Kurz
      has direct ties to European head-of-government networks.

      All customer segments require the same core product features: air-gapped deployment, sovereign
      data residency, and national AI training factory participation. This uniformity of requirements
      reduces product customization costs but also limits the addressable market to buyers that have
      the governance structure and budget authority to procure a national-scale cybersecurity platform.
      No commercial enterprise, financial institution, or technology company customers have been
      identified in public materials; the company appears to be exclusively a national/government
      market player at this stage of its commercial development.
    claimRefs: [CU001, CU003, CU005, CU006, CU022, CU025]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-evidence
    title: "Adoption Trajectory and Deployment Evidence"
    body: |
      The quantitative evidence for Dream Security's customer adoption is limited by deliberate
      opacity around national security engagements. The company's Series B press release in February
      2025 announced contracts with "multiple sovereign nations and critical infrastructure providers,"
      providing soft confirmation of production deployment without naming clients. Investor 7GC.co,
      an early backer, provided the clearest third-party customer validation available: "government
      customers have found previously undetected risks with Dream's technology and are using the
      platform as a new standard for critical infrastructure protection."

      The $130M+ in annual sales bookings reported by Dream's CEO represents the total contract
      value of multi-year agreements signed, not a single-year revenue figure. Israeli business
      outlet Globes, citing independent sourcing, reported that the actual number of signed contracts
      was fewer than ten as of early 2025—materially below the "30+" figure cited in company
      materials and investor pitches. This discrepancy likely reflects the difference between
      Letters of Intent, framework agreements, and fully executed binding contracts in the
      government procurement cycle. Government procurement timelines are notoriously long,
      with 12-to-24 month periods between initial engagement and signed contract being typical
      for national security platform purchases.

      The annual recognized revenue estimated at approximately $40M for 2024 (Globes estimate)
      versus $130M+ in bookings implies a significant revenue backlog and suggests Dream is still
      in the early deployment and revenue-recognition phases of its signed contracts. The National
      AI Training Factory, operational by December 2025, requires multiple sovereign deployment
      participants to generate meaningful national model improvement—indicating that platform
      utility is still in the growth phase.
    claimRefs: [CU002, CU004, CU007, CU008, CU009, CU010, CU023]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: named-customer-proof
    title: "Named Customer Proof and Validation Quality"
    body: |
      Dream Security has not publicly disclosed the names of any customer deployments as of May
      2026. The company cites national security classification requirements that prevent public
      attribution. This is a legitimate and common constraint for companies operating in the
      sovereign government cybersecurity sector—peers such as Palantir, Cellebrite, and NSO Group
      similarly declined to name government customers during comparable growth phases. However, it
      creates a material diligence limitation: no third-party deployment case studies, outcome
      reports, or customer testimonials from named organizations have been published.

      The strongest available customer proof is investor testimony. Bain Capital Ventures, leading
      a $100M Series B, referenced "earning the trust of global government entities responsible for
      national cyber defense" in its investment thesis materials. Investor 7GC.co stated that
      "government customers found previously undetected risks with Dream's technology," indicating
      active production deployment with meaningful outcomes. The F5 BIG-IP breach analysis published
      by Dream in December 2025 demonstrates the platform functioning in response to a real security
      event—though it is not confirmed whether this reflects an actual customer environment or a
      company demonstration environment.

      The G2 review page for Dream Security appears to exist but was inaccessible due to bot-blocking
      at the time of research. No reviews were visible. Capterra shows no listing for Dream Security.
      The absence of commercial review site presence is consistent with a platform that exclusively
      serves classified government environments where employees cannot publicly discuss their toolset.
      For diligence purposes, the absence of named customer references necessitates direct outreach
      to Dream Security for a reference call list under NDA.
    claimRefs: [CU007, CU011, CU012, CU013, CU014, CU024]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: retention-durability
    title: "Retention, Contract Durability, and Satisfaction"
    body: |
      Dream Security has not published any retention metrics, net revenue retention (NRR), gross
      revenue retention (GRR), or cohort-based usage data. This is both expected given its stage
      (27 months old, ~10 or fewer fully signed customers) and structurally typical for national
      government technology vendors where classified contract details are not disclosed publicly.

      Structurally, government cybersecurity platform contracts are highly durable by nature.
      Multi-year framework agreements (typically 3-7 years for national security platforms) with
      annual deployment fees provide revenue visibility. Switching costs are very high: replacing
      an installed national cyber platform that is integrated with a country's AI training factory
      and SOC operations involves significant organizational disruption, retraining, data migration,
      and re-procurement cycles. Dream's National AI Training Factory further amplifies switching
      costs by accumulating organization-specific model improvements that cannot be transferred
      to a competing platform.

      On the negative side, government procurement contracts can be terminated for convenience
      with relatively short notice in some jurisdictions, and geopolitical shifts can abruptly
      alter security relationships. If a Dream customer's government changes its national security
      posture or vendor relationships due to political factors—as occurred with several NSO Group
      customers under Shalev Hulio's prior leadership—that customer could exit quickly. The
      Israeli origin of the technology may also face resistance from certain governments, as seen
      in prior controversies over NSO Group's Pegasus software. No customer complaints, failed
      deployments, or public contract terminations have been identified as of May 2026.
    claimRefs: [CU015, CU016, CU017, CU018, CU026, CU027]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: expansion-concentration
    title: "Expansion Dynamics and Concentration Risk"
    body: |
      Dream Security's expansion model relies on land-and-expand within sovereign accounts:
      governments typically begin with a pilot or limited national deployment, then expand coverage
      to additional ministries, sectors, or cross-border agency sharing arrangements. The National
      AI Training Factory creates a natural expansion incentive—the more data ingested from
      additional sectors, the more valuable the national model becomes for all participants,
      encouraging cross-ministry expansion. Cross-border expansion (selling to neighboring allied
      nations that share threat intelligence) is a potential expansion vector in regions like
      the GCC, where the UAE, Saudi Arabia, and Bahrain participate in joint cyber programs.

      Concentration risk is the primary commercial vulnerability. With fewer than ten signed
      contracts and large individual contract values, the departure of even one major customer
      could represent 15-30% of total bookings. The concentration is compounded by geographic
      and political dependencies: contracts with governments in politically volatile regions are
      subject to geopolitical disruption, leadership changes, and shifts in bilateral relationships
      with Israel. The company has not disclosed any information about customer concentration,
      top-customer revenue share, or contract renewal terms.

      The sales cycle for new government customers is extremely long (12-24 months from engagement
      to signed contract), limiting the pace at which Dream can diversify its customer base. The
      pipeline of potential customers is global but shallow—there are only approximately 40-50
      national governments worldwide that have the budget, technical sophistication, and independence
      requirements to be realistic buyers of Dream's platform at its current stage and price point.
      This structural constraint makes customer concentration an enduring feature of the business
      model rather than a temporary early-stage issue.
    claimRefs: [CU019, CU020, CU021, CU028, CU029, CU030]
    tableRefs: [TU005]

