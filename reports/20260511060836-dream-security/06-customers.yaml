figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    layout: wide
    summary: >
      Maps the government customer journey from initial national cyber threat identification
      through procurement, pilot deployment, full sovereign production, and expansion. Reflects
      the unique constraints of national security procurement: classified engagement phases,
      extended procurement cycles, and sovereignty requirements at each stage.
    data:
      nodes:
        - id: "j1"
          label: "Government identifies national cyber threat / capability gap"
        - id: "j2"
          label: "Engagement: Dream briefing / RFP issued"
        - id: "j3"
          label: "Proof of Concept / Pilot Deployment (sovereign environment)"
        - id: "j4"
          label: "National AI Factory onboarding & CLM calibration"
        - id: "j5"
          label: "Full production deployment (all national sectors)"
        - id: "j6"
          label: "Annual renewal / cross-ministry expansion"
    approximationNotes: >
      Journey stages are derived from typical national security technology procurement processes
      and Dream Security's described deployment model. Actual stage durations and decision gates
      are not publicly disclosed. Duration estimates: stages 1-2 (3-6 months), stages 2-3
      (6-12 months), stages 3-4 (3-6 months), stages 4-5 (6-12 months), stage 6 (annual).
    claimRefs: [CU003, CU005, CU022, CU023]

  - id: FU002
    title: "Adoption / deployment funnel"
    type: funnel
    layout: standard
    summary: >
      Illustrates Dream Security's estimated conversion funnel from total addressable sovereign
      governments through qualification, pilot, signed contract, and full production deployment.
      Values are estimated based on the discrepancy between company marketing claims (30+ customers)
      and independent reporting (<10 signed), with total addressable market estimated at ~50 viable
      sovereign buyers globally at Dream's current price point.
    data:
      items:
        - label: "Total addressable sovereign governments (~50 viable buyers)"
          value: 50
        - label: "Engaged / in active discussion (inferred)"
          value: 20
        - label: "Pilot / POC initiated (inferred)"
          value: 12
        - label: "Signed contracts (Globes estimate: <10)"
          value: 8
        - label: "Full production deployment (inferred subset)"
          value: 4
    approximationNotes: >
      Funnel values are estimates based on: total addressable sovereign market (~50 governments
      with sufficient budget and sovereignty requirements); company claim of 30+ customers
      interpreted as including LOIs and pilots; Globes independent estimate of <10 signed
      contracts; inferred production subset. Actual figures are not disclosed by Dream Security.
    claimRefs: [CU002, CU004, CU009, CU010]

  - id: FU003
    title: "Customer proof matrix"
    type: matrix
    layout: wide
    summary: >
      Assesses the quality and completeness of available customer proof across four dimensions:
      deployment status, evidence type, outcome specificity, and retention visibility. All
      assessments reflect publicly available evidence as of May 2026; no named customer
      confirmations were available.
    data:
      columns:
        - "Deployment Status"
        - "Evidence Type"
        - "Outcome Specificity"
        - "Retention Visibility"
      rows:
        - label: "National Government (Series B ref.)"
          values: ["Production (investor-confirmed)", "Series B press release + investor thesis", "Generic: 'defending nations and critical infrastructure'", "None disclosed"]
        - label: "Government — 7GC.co testimony"
          values: ["Production (investor testimony)", "Third-party investor statement", "Specific: 'found previously undetected risks'", "None disclosed"]
        - label: "European NATO-region (Vienna inference)"
          values: ["Unknown (office presence only)", "Geographic inference", "None", "None"]
        - label: "GCC/MENA (Abu Dhabi inference)"
          values: ["Unknown (office presence only + FTM reporting)", "Geographic inference + adverse journalism", "None confirmed", "None"]
        - label: "Review site presence (G2/Capterra)"
          values: ["N/A", "G2: blocked; Capterra: not listed", "None", "None"]
    approximationNotes: >
      All assessments are based on publicly available evidence. The absence of named customers
      or customer-authored content is deliberate and is consistent with national security
      classification norms. The quality ratings reflect the evidentiary standard available to
      external analysts.
    claimRefs: [CU007, CU011, CU012, CU013, CU014]

  - id: FU004
    title: "Retention / repeat cohort"
    type: cohort
    layout: wide
    summary: >
      Modeled retention estimates for Dream Security's government customer cohorts based on
      structural characteristics of national security contracts (3-7 year terms, high switching
      costs, National AI Factory data lock-in). Values represent estimated retention percentages
      under best-case, base-case, and stress-case assumptions. All values are analyst estimates;
      Dream Security has published no actual retention data.
    data:
      columns:
        - "30 days"
        - "90 days"
        - "180 days"
        - "365 days"
      rows:
        - label: "National Gov (base case — multi-year contract)"
          values: [100, 100, 97, 90]
        - label: "Critical Infra (base case — framework agreement)"
          values: [100, 98, 94, 86]
        - label: "National Gov (stress case — political disruption)"
          values: [100, 95, 85, 65]
    approximationNotes: >
      All cohort values are analyst estimates based on structural contract characteristics and
      geopolitical risk assessment. No actual retention data has been published by Dream Security.
      Base case assumes multi-year contracts renew at industry norms for national security
      platforms (85-95% annual retention). Stress case reflects political risk scenario (e.g.,
      regime change, bilateral relationship shift, or legal action impacting Dream Security's
      leadership). Real retention data should be requested from management under NDA.
    claimRefs: [CU015, CU016, CU017, CU026]

callouts:
  - calloutType: risk
    title: "Signed Contract Count Materially Lower Than Marketed Customer Claim"
    body: >
      Dream Security's marketing language of '30+ customers' conflicts with Globes' independent
      reporting of fewer than ten signed contracts as of early 2025. For investors evaluating
      customer traction, the distinction between LOIs, framework agreements, and binding signed
      contracts is material. Without a precise definition of 'customer,' the stated figure is
      unreliable as a traction metric.
    claimRefs: [CU001, CU002]

  - calloutType: risk
    title: "Full Customer Opacity Creates Diligence Blockers"
    body: >
      The complete absence of named customer references, case studies, or third-party deployment
      confirmations makes standard commercial due diligence impossible without a management-facilitated
      reference call process under NDA. This is a legitimate constraint in national security but
      also a risk factor: any customer-side issue (dissatisfaction, deployment failure, political
      block) would be invisible to external observers until it affected reported bookings.
    claimRefs: [CU007, CU024]

  - calloutType: risk
    title: "Geopolitical Concentration Risk Is Structural and Enduring"
    body: >
      A company with <10 government customers in politically sensitive regions (Middle East, Eastern
      Europe) faces existential customer concentration risk. The Israeli heritage of Dream Security,
      combined with the controversial backgrounds of its founders, may constrain procurement by
      European and certain Middle Eastern buyers, limiting diversification options.
    claimRefs: [CU020, CU021, CU029]

  - calloutType: strength
    title: "Government Contract Structure Provides Strong Revenue Durability"
    body: >
      Multi-year national security contracts with high switching costs (National AI Factory data
      lock-in, organizational integration, classified infrastructure) provide structural revenue
      durability for retained customers. Even a small number of signed national contracts at
      $10M-$50M+ per year implies 3-5 years of predictable recurring revenue once fully deployed.
    claimRefs: [CU015, CU016, CU017]

