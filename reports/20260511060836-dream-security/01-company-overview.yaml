chapter:
  number: 1
  title: "Company Overview"
  summary: "Dream Security is an Israeli AI-powered national cybersecurity company founded in January 2023 by Shalev Hulio (former NSO Group CEO), Sebastian Kurz (former Austrian Chancellor), and Gil Dolev. The company achieved unicorn status in February 2025 with a $100M Series B at $1.1B valuation led by Bain Capital Ventures, reporting over $130M in annual sales to 30+ governments across Europe, the Middle East, and Southeast Asia."

sections:
  - id: identity-and-overview
    title: "Identity, Founding, and Strategic Positioning"
    body: |
      Dream Security is an Israeli AI-powered national cybersecurity company headquartered in Tel Aviv, Israel, with offices in Vienna, Austria, and Abu Dhabi, UAE. The company was founded in January 2023 with a singular mission: to deliver sovereign, AI-driven cybersecurity at national scale, specifically designed for governments and critical infrastructure operators. Unlike enterprise cybersecurity vendors, Dream was purpose-built from day one to address the unique threat environment facing nation-states, including nation-state adversaries, advanced persistent threats, and attacks on critical infrastructure such as energy grids, water systems, ports, and nuclear facilities.

      The company's core product, the Cyber Language Model (CLM), is a suite of proprietary large language models trained exclusively on cyber telemetry — including code, logs, configurations, and threat intelligence. The CLM enables Dream to automate complex security operations that traditionally require elite human analysts, providing real-time visibility across hybrid, cloud, and legacy environments without requiring hardware or software installation by the customer.

      Dream differentiates itself from conventional cybersecurity vendors through three key positioning elements: (1) a national-scale platform built for government use cases rather than retrofitted enterprise tools, (2) a founding team with deep offensive cyber experience from Israel's intelligence ecosystem, and (3) zero-integration deployment allowing rapid adoption even by organizations with legacy infrastructure. The company has been explicit that it does not operate in the offensive surveillance market, positioning itself as purely defensive.

      In February 2025, Dream became Israel's first AI-cybersecurity unicorn of 2025, reaching a $1.1B valuation after its $100M Series B led by Bain Capital Ventures. The company reported over $130M in annual sales contracts with more than 30 national-level government entities, making it one of the fastest-growing Israeli cybersecurity companies in history based on publicly available data as of early 2026.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007]
    tableRefs: [TO001]
    figureRefs: [FO001, FO003]

  - id: leadership-and-governance
    title: "Founders, Leadership, and Governance"
    body: |
      Dream Security's founding team brings together an unusual combination of government leadership, offensive cybersecurity expertise, and technical depth. Shalev Hulio, serving as CEO, co-founded and led NSO Group, the Israeli company responsible for the Pegasus surveillance platform. His deep understanding of nation-state offensive tactics is central to Dream's threat detection approach. Gil Dolev, serving as CTO, brings technical experience from Microsoft, NSO Group, and Israel's Unit 8200 defense intelligence corps. Sebastian Kurz, serving as President, was Chancellor of Austria from 2017 to 2019 and again from 2020 to 2021, giving him firsthand exposure to how governments are targeted by cyberattacks and how national-level responses are coordinated.

      The founding team is complemented by a strong board of directors assembled at the time of the Series B. Enrique Salem, a partner at Bain Capital Ventures and former CEO of Symantec (2009–2012) and Chairman of Mandiant, brings deep cybersecurity industry experience. Shlomo Yanai, former CEO of Teva Pharmaceuticals and former IDF commander, brings experience in managing large complex organizations. Existing board members include Dovi Frances (founder, Group 11) and Michael Eisenberg (founding partner, Aleph).

      Key-person risk is material. Shalev Hulio faces criminal proceedings by a Spanish court in connection with NSO Group's Pegasus spyware. A Barcelona court ruled in March 2025 that NSO Group co-founders Hulio and Omri Lavie may be indicted. Sebastian Kurz was convicted of perjury in 2024 in connection with testimony to an Austrian parliamentary inquiry, though this conviction was overturned on appeal in May 2025. Kurz remains under investigation for separate corruption allegations in Austria. These legal exposures represent material governance risks for Dream.

      As of early 2025, Dream has approximately 150 employees with plans to double to 300, reflecting rapid headcount growth consistent with its revenue trajectory. The company has strategically placed offices in Tel Aviv (R&D and headquarters), Vienna (European government relationships), and Abu Dhabi (Middle East/Gulf relationships). No formal succession plan or governance protocols for key-person absence are publicly disclosed.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO016, CO017]
    tableRefs: [TO002, TO003]
    figureRefs: [FO002]

  - id: milestones-and-trajectory
    title: "Funding History, Milestones, and Growth Trajectory"
    body: |
      Dream Security achieved extraordinary growth velocity in its first two years. From founding in January 2023, the company secured customers and revenue faster than virtually any other Israeli cybersecurity company, reaching over $130M in annual sales contracts by the time of its Series B announcement in February 2025. This pace is exceptional for a company operating in the government/national security sector, where procurement cycles typically span 12-24 months.

      The company's funding history reflects increasing investor confidence. A seed/pre-seed round preceded the $35M Series A in November 2023, co-led by Aleph and Group 11 — two of Israel's most prominent venture capital firms. The Series A was notable in that it was closed during the Israel-Hamas war, with Hulio signing the term sheet from the Gaza border while serving in IDF reserves. The $100M Series B in February 2025, led by Bain Capital Ventures at a $1.1B valuation, established Dream as a unicorn and the first Israeli AI-cyber unicorn of 2025.

      Globes reported that while Dream cited $130M in "annual sales" (likely representing contract backlog/commitments), the actual 2024 revenue was approximately $40M, with ARR at Series B time running at approximately $100M annualized pace, projected to double to $200M ARR by end of 2025. The pre-Series B valuation, per PitchBook data, was approximately $54M — implying a roughly 20x valuation increase within approximately 18 months.

      Key milestones include the volunteering of Dream's platform to an Israeli hospital during the Gaza conflict, demonstrating operational readiness and defensive use-case commitment. Dream published analysis of the F5 BIG-IP supply chain breach in December 2025, demonstrating its research capabilities. The hiring of Enrique Salem and Shlomo Yanai to the board signals ongoing professionalization of governance. Adverse events include the Spanish court ruling against NSO Group executives in March 2025 and the Skyline International human rights report in April 2025.
    claimRefs: [CO018, CO019, CO020, CO021, CO022, CO023, CO024, CO025, CO026, CO027, CO031, CO033]
    tableRefs: [TO004]

