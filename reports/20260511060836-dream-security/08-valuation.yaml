        Darktrace was acquired by Thales in 2024 at approximately £4.25B (~$5.4B), valuing the company
        at roughly 9-10x trailing twelve months revenue (£432M); this M&A transaction is the most
        directly relevant exit comparable for an AI cybersecurity platform acquired by a European
