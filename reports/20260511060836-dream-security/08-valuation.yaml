      statement: >
        SentinelOne's forward ARR multiple is approximately 10x as of early 2026, reflecting continued
        AI-native cybersecurity growth but market multiple compression since 2022; Dream Security's
        implied 11x ARR multiple (on $100M target) is modestly above SentinelOne's peer multiple.
