      statement: >
        CrowdStrike trades at approximately 21x forward ARR as of early 2026, reflecting a mature market
        leader with $3.9B ARR, 33% growth, and 29,000+ enterprise customers after 14 years of operation;
        Dream Security's 28x recognized revenue multiple exceeds CrowdStrike's multiple despite being at
        0.1% of CrowdStrike's revenue scale.
      topic: "CrowdStrike comp multiple"
      type: third-party-reported
      confidence: high
      freshness: recent
      sourceRefs: [SV001, SV020]
      answersQuestionRefs: [QV005, QV006, QV010, QV025]

    - id: CV003
      statement: >
        Palantir's government-facing business traded at approximately 33x forward revenue in early 2026
        with $2.9B in total revenue, 53% derived from US government contracts; this provides a high-ceiling
        comparable for a government-only AI analytics platform with strong political relationship-dependent
        go-to-market.
      topic: "Palantir comp multiple"
      type: third-party-reported
      confidence: high
      freshness: recent
      sourceRefs: [SV009, SV021]
      answersQuestionRefs: [QV005, QV006, QV019]

