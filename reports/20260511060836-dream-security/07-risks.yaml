chapter:
  number: 7
  title: Risks
  summary: 'Dream Security''s risk profile is dominated by three categories of exposure that are exceptional relative to typical
    early-stage enterprise security startups. CEO Shalev Hulio led NSO Group during the period when Pegasus spyware was allegedly
    used against journalists and activists, generating ongoing criminal inquiries in Spain and persistent reputational stigma
    in Western democratic markets. President Sebastian Kurz carries an Austrian criminal conviction for lying to parliament
    and remains under investigation for additional corruption allegations, creating direct procurement risk in European government
    markets. The company''s sub-ten-customer concentration profile—where a single non-renewal could represent 10–30% of bookings—creates
    existential commercial fragility. Additional structural risks include Israeli Ministry of Defense export license dependency
    for every international sale, EU AI Act compliance uncertainty, NVIDIA GPU infrastructure dependency, and the inherent
    hallucination risk of CLM-based threat detection in production national security contexts. None of the top five risks
    are novel or easily mitigated; they are structural features of how this company was built and who built it.

    '
sections:
- id: risk-framework
  title: Risk Assessment Framework
  body: 'Dream Security''s risk profile is shaped by three converging factors: the legal and reputational

    history of its leadership, the regulatory uncertainty surrounding AI-based national security

    tools, and the operational concentration inherent in a sub-ten-customer, government-only

    business model. This chapter assesses risks across five dimensions: regulatory and legal,

    operational and technical, partner and dependency, financial and model, and people and

    execution. Severity ratings use a three-tier scale—Critical, High, or Medium—reflecting

    both likelihood and potential impact if the risk materializes. Mitigation maturity is

    rated as Implemented, In Progress, or Theoretical.


    All quantified risk assessments are qualified by Dream Security''s 27-month operating history

    and limited public disclosure. The company has not published financial statements, compliance

    certifications, or production performance metrics. The analysis draws on public legal

    records, regulatory filings, investigative journalism, civil society reports, and industry

    benchmarks. Where primary evidence is unavailable, analyst inference is clearly labeled.

    Key thesis-break triggers are defined in the kill-criteria section, with explicit thresholds

    tied to monitorable events rather than subjective qualitative deterioration.

    '
