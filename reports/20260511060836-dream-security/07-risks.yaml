  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: CLM production accuracy – false-positive and false-negative rates
    missingEvidence: Dream Security has not disclosed any production accuracy metrics, third-party benchmarks, or false-positive/negative
      rates for the CLM. No peer-reviewed evaluation of CLM performance exists in public literature.
    whyItMatters: In national security threat detection, false-negative rates directly correlate with missed attacks; false-positive
      rates determine analyst workload. Without these metrics, the core product value proposition cannot be independently
      validated.
    diligencePath: Request production accuracy reports with methodology, benchmark dataset description, and third-party auditor
      name under NDA; require CLM evaluation as a Series C condition.
    relatedQuestionRefs:
    - QR011
  - type: missing-source
    severity: material
    topic: Dream Security sovereign patch / update management process
    missingEvidence: No public documentation describes how Dream Security delivers CLM model updates, security patches, or
      module upgrades to sovereign on-premises deployments, or what the average time-to-patch is for disclosed vulnerabilities.
    whyItMatters: Government change-management cycles can delay critical patches by weeks or months; undisclosed patch latency
      in a national security platform represents an ongoing unquantified exposure window.
    diligencePath: Request standard patch deployment SLA documentation; obtain a sample customer deployment update log showing
      patch timeline from release to deployment.
    relatedQuestionRefs:
    - QR016
  - type: private-evidence-only
    severity: material
    topic: Dream Security burn rate and cash runway
    missingEvidence: Dream Security has not disclosed burn rate, headcount by function, or cash runway. The $135M total raised
      minus ~$40M estimated recognized revenue and estimated operating costs provides insufficient precision for independent
      runway assessment.
    whyItMatters: An undisclosed burn rate means Series C pressure cannot be assessed; if the company is burning $50M+/year,
      a 2026 financing event is structurally required regardless of ARR trajectory.
    diligencePath: Request unaudited financial statements including cash balance, monthly burn, and headcount breakdown as
      a pre-Series C diligence requirement.
    relatedQuestionRefs:
    - QR019
  - type: private-evidence-only
    severity: material
    topic: Customer revenue concentration – top customer percentage of bookings
    missingEvidence: Dream Security has not disclosed what percentage of total bookings its single largest customer represents.
      Given <10 customers, top-customer concentration could exceed 25%.
    whyItMatters: Top-customer concentration >20% is a material risk requiring disclosure in any credible investment memo;
      it directly affects ARR durability assessment.
    diligencePath: 'Request a customer concentration table (% bookings by anonymous cohort: top-1, top-3, top-5) under NDA
      prior to any investment commitment.'
    relatedQuestionRefs:
    - QR021
  - type: missing-source
    severity: low
    topic: EU AI Act compliance roadmap and conformity assessment status
    missingEvidence: Dream Security has not published an EU AI Act conformity assessment, technical dossier, or compliance
      roadmap. Public disclosure of whether they have engaged a notified body or are targeting post-market monitoring compliance
      is absent.
    whyItMatters: Without compliance, post-August 2026 EU AI Act enforcement could block Dream's European government sales
      expansion, which depends on Kurz's political network.
    diligencePath: Request internal EU AI Act compliance assessment; verify whether legal counsel has issued an opinion on
      Annex III classification.
    relatedTableRefs:
    - TR001
    relatedQuestionRefs:
    - QR009
    - QR010
