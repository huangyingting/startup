callouts:
  - calloutType: insight
    title: "AI Cyber for Governments Has No Analyst-Sized SAM"
    body: "Despite the clear commercial logic of AI-native national cybersecurity, no independent analyst firm has published a bottom-up or primary-data SAM for this segment. Dream operates in analytically underserved territory—a sign of both early-mover advantage and elevated sizing uncertainty."
    claimRefs: [CM030, CM031]

  - calloutType: risk
    title: "NSO Shadow Creates a Structural SAM Ceiling"
    body: "Dream's inability to pursue the Five Eyes market (US, UK, Canada, Australia, New Zealand) and potentially parts of EU due to Hulio's NSO Group history represents a hard ceiling on its accessible market. The Five Eyes collectively represent ~40–50% of global advanced government cybersecurity spend, capping Dream's SOM meaningfully below the full SAM."
    claimRefs: [CM025, CM023]

  - calloutType: strength
    title: "Regulatory Mandates Are Structural Demand Drivers"
    body: "NIS2 (EU, 18 sectors), CIRCIA (US critical infrastructure), and NATO cyber pledges represent mandatory security investment that cannot be deferred. These structural tailwinds provide demand certainty for AI-native national cybersecurity vendors regardless of economic cycles."
    claimRefs: [CM022, CM026, CM028]

