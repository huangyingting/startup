summary:
  headline: >
    Dream Security 已经做出技术上可信的主权 AI 网络安全平台，ARR 速度极快；但签约政府合同少于 10 个、$1.1B 估值偏激进，
    叠加无法消除的领导层法律风险和零公开财务披露，在确认三个主权客户背书、外部法律意见和审计财务之前，更适合有条件观察，而非买入。
