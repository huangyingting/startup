companyProfile:
  summary: >
    Dream Security was founded in January 2023 in Tel Aviv by CEO Shalev Hulio (former NSO Group CEO)
    and CTO Gil Dolev. The company built the Cyber Language Model (CLM), an AI platform that ingests
    national telemetry—network logs, endpoint events, threat intelligence—and trains sovereign LLMs
    on classified government data to detect nation-state attacks without requiring any integration into
    existing security tools. Dream operates from Tel Aviv (HQ), Vienna, and Abu Dhabi, markets exclusively
    to national governments and sovereign agencies, and reached a $1.1B valuation in February 2025 after
    a $100M Series B led by Bain Capital Ventures. The company claims 30+ national government engagements
    and a $130M+ bookings run-rate, though Globes reported fewer than 10 signed contracts and approximately
    $40M in recognized revenue.
  foundedDate: "2023-01-01"
  founders:
    - name: Shalev Hulio
      role: Co-founder & CEO
      background: >
        Former CEO of NSO Group (Pegasus spyware), exited 2022 amid US entity-list designation and
        financial distress. Faces criminal inquiries in Spain related to NSO Pegasus usage by Spanish
        authorities. Primary relationship-driver for sovereign government sales.
      claimRefs: [CO003]
    - name: Gil Dolev
      role: Co-founder & CTO
      background: >
        Technical co-founder; former cybersecurity executive in Israeli intelligence-adjacent industry;
        architects the CLM platform and NVIDIA partnership.
      claimRefs: [CO004]
  foundingLocation: Tel Aviv, Israel
  headquarters: Tel Aviv, Israel
  productSummary: >
    Dream Security's core product is the Cyber Language Model (CLM)—a family of fine-tuned large
    language models trained on sovereign national telemetry data using NVIDIA NeMo and NIM infrastructure,
    LoRA adapters, LLaMA 3.3/4, and Qwen 72B base models. The CLM is deployed on-premises in
    air-gapped or sovereign cloud environments, requires zero integration with existing security tools,
    and generates natural-language threat alerts, incident summaries, and policy recommendations for
    national CISOs. A National AI Training Factory service enables governments to continuously retrain
    their sovereign model on new threat data.
  customerFocus: >
    Exclusively sovereign national governments and national agencies: ministries of defense, national
    CISOs, intelligence agencies, and critical infrastructure operators. All known engagements are in
    Europe and the Middle East. No enterprise or SMB customers.
  businessModel: >
    Multi-year sovereign government contracts (estimated $10-15M ACV per national deployment) for
    on-premises CLM software licenses and associated National AI Training Factory services.
    Revenue recognition is milestone-based, creating a material gap between bookings ($130M+) and
    recognized revenue (~$40M). No recurring SaaS subscription model; contracts are delivery-milestone
    structured.
  stage: "Series B (private), unicorn at $1.1B, February 2025"
  fundingStatus: >
    Seed round (undisclosed, 2023), Series A (~$35M, 2024, Tau Capital and undisclosed co-investors),
    Series B ($100M, February 2025, Bain Capital Ventures lead). Total raised: ~$135M.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CO004, CE001, CI001, CI002]

summary:
  headline: >
    Dream Security has built a technically credible sovereign AI cybersecurity platform with exceptional
    ARR velocity, but the $1.1B valuation at fewer than ten signed government contracts—combined with
    unresolvable leadership legal risk and zero public financial disclosure—argues for a conditional
    'track' rather than 'buy' until three sovereign references, external legal opinion, and audited
    financials are confirmed.
  overallScore: 5.5
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: expensive
  keyMetrics:
    valuationUsdM: 1100
    revenueRunRateUsdM: 40
    arrUsdM: 130
    revenueGrowthYoYPct: null
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 135
    customerCount: 10
    headcount: 300
  topStrengths:
    - "First-mover in sovereign AI cybersecurity: the CLM is purpose-built for national government telemetry, zero-integration deployment, and sovereign data residency—no existing platform vendor credibly serves this exact specification."
    - "ARR velocity: $0 to $130M+ bookings in 27 months is among the fastest recorded in enterprise security software, driven by large-ACV national government contracts in the $10-15M per deployment range."
    - "Technical moat via National AI Training Factory: once a government's classified telemetry trains a Dream CLM instance, switching cost includes physical deinstallation, years of proprietary threat data migration, and staff retraining."
    - "Credible lead investor: Bain Capital Ventures' $100M Series B at $1.1B provides institutional validation and governance backstop that other early-stage government AI companies typically lack."
    - "First-mover M&A exit target: Darktrace (Thales, £4.25B), Recorded Future (Mastercard, $2.65B), and accelerating defense-prime M&A in AI cyber confirm plausible strategic exit at 9-12x ARR for Dream's customer profile."
  topRisks:
    - "Leadership legal risk: Shalev Hulio faces criminal inquiries in Spain related to NSO Group; Sebastian Kurz (President) received an Austrian criminal conviction in 2024. Either escalation triggers procurement exclusion cascades across NATO-aligned government customers."
    - "Customer concentration: fewer than 10 signed contracts implies any single non-renewal is a 10%+ ARR event; Globes reported only ~$40M recognized revenue vs. $130M+ bookings, indicating the vast majority of bookings have not yet converted."
    - "Revenue recognition opacity: no audited financials, no disclosed CFO, no revenue recognition methodology; the bookings-to-recognized-revenue gap ($90M) is material and unresolved."
    - "Tau Capital governance: UAE investor ties raise CFIUS complications for US acquirers and create LP conflict-of-interest potential given Tau's dual investor/customer position; disclosure has not been made public."
    - "Valuation stretch: 28x estimated recognized revenue and 8.5x bookings both exceed public-market medians for comparable-stage government security companies; evidence quality is too low to support these multiples without verified financial disclosure."
  unresolvedGaps:
    - "No audited FY2025 financials; revenue recognition methodology, gross margin, and burn rate are all unconfirmed."
    - "No signed contract list; the 30+ claimed customer engagements versus Globes' <10 signed contract count is unresolved."
    - "No external legal opinion on Shalev Hulio's personal liability in Spanish or EU proceedings."
    - "No third-party CLM performance benchmark; accuracy, false-positive rate, and detection latency are company-only claims."
    - "Tau Capital LP structure and UAE government customer relationship overlap not disclosed; CFIUS risk is unquantifiable without disclosure."

