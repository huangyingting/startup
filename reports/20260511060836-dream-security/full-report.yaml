      - number: '4.4'
        title: Valuation and Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >
              Dream's $1.1 billion post-money valuation on approximately $100 million ARR run-rate implies an ARR
              multiple of approximately 11x. This multiple sits above the private-market median for cybersecurity SaaS
              (6–8x ARR according to Windsor Drake and First Page Sage 2025 data), reflecting a premium for AI-native
              architecture and government contract stickiness. It is below the typical range for premier public
              cybersecurity companies (CrowdStrike, Palo Alto Networks, SentinelOne trade at 13–37x ARR) and well below
              the 18–32x range seen in transformational M&A deals (Wiz, CyberArk transactions in 2024–2025).


              The premium over private-market median is justified by several factors: the national-government contract
              cohort provides near-zero churn (government cybersecurity programs are multi-year commitments with high
              switching costs), the AI-native architecture commands an innovation premium, and the pace of ARR growth is
              exceptional. The discount from public-company levels reflects governance risk (Hulio and Kurz legal
              exposures), geographic concentration (Middle East and Europe only, with Five Eyes exclusion), and reliance
              on a two-person sales organization — both of which create revenue fragility.


              At $200 million ARR (the stated end-2025 target) and assuming a 10x forward ARR multiple, Dream's implied
              equity value would be approximately $2 billion — a roughly 80% uplift from the Series B post-money, fully
              consistent with Bain Capital Ventures' typical return expectations within a five-to-seven-year horizon.
              The strategic M&A premium could be substantially higher if a major defense contractor or government IT
              prime acquirer enters the picture; at 20x ARR on $200 million, the implied exit value reaches $4 billion.
            claimRefs:
              - CI007
              - CI008
              - CI027
              - CI028
              - CI029
