      - number: '2.5'
        title: Sizing Gaps and Contradictory Estimates
        blocks:
          - type: paragraph
            body: >
              Market sizing for AI-native national cybersecurity faces a fundamental data gap: no independent analyst
              has segmented government-only AI cybersecurity as a distinct market category with bottom-up or primary
              data. All estimates available to this report derive from broader AI-cybersecurity TAM figures with
              vertical slices applied as rough percentages, or from company-disclosed pipeline data which has its own
              reporting biases.


              The most significant contradiction in available data is the 2.5× variance in AI-cybersecurity TAM
              estimates: MarketsandMarkets cites $25.53 billion in 2026 growing to $50.83 billion by 2031 at 14.8% CAGR,
              while Grand View Research and other sources project the same market at $93–134 billion by 2030–2031. This
              variance reflects: (a) whether AI-adjacent tools (traditional SIEM with AI features) are included, (b)
              whether all geographies or only enterprise-addressable markets are included, and (c) methodological
              differences in analyst surveys vs. vendor revenue aggregation.


              A second contradiction exists between Dream Security's claimed metrics. The company reports $130M in
              "annual sales" with 30+ national entities. Per Globes investigative reporting, actual 2024 recognized
              revenue was approximately $40M, with the $130M representing contract commitments/backlog. This distinction
              matters for SAM validation: if 30+ national entities generate $130M in commitments, the average contract
              is $4.3M — consistent with mid-range government cyber contracts but indicating the SAM per-customer is not
              dramatically large. Per the same Globes report, actual customer count at Series B time was fewer than 10
              signed agreements, with the remainder representing pipeline.


              The domain parked for GlobalNewsWire's $134B projection, the 404 status of multiple analyst press
              releases, and the limited archival availability of government cybersecurity budget data collectively mean
              this chapter relies on a smaller-than-ideal set of primary analyst sources. Diligence should request
              Dream's internal market sizing model and customer pipeline detail to verify SAM and SOM assumptions.
            claimRefs:
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
