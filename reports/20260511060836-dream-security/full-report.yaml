      - number: '2.3'
        title: Buyer and Segment Analysis
        blocks:
          - type: paragraph
            body: >
              Dream Security's primary buyer segment is sovereign national governments and their designated
              cybersecurity agencies: national CERTs, national cyber directorates, defense ministries, and intelligence
              agencies with civilian cyber mandates. Within this segment, buyers are typically concentrated in countries
              with (a) existing advanced cyber program infrastructure, (b) geopolitical risk exposure that justifies
              sovereign AI capability investment, and (c) budget capacity, typically GDP above $50 billion with defense
              spending above 1.5% of GDP.


              A secondary segment is critical infrastructure operators — entities designated as critical infrastructure
              by national governments, including energy utilities, water authorities, nuclear agencies, port operators,
              and oil/gas refineries. These buyers typically procure through national cybersecurity program frameworks
              rather than independent procurement, making the national government the channel.


              A tertiary segment includes defense and intelligence agencies seeking AI-native threat analytics as a
              complement to their internal capabilities. These buyers have the highest security classification
              requirements but also the highest willingness to pay and strongest contract stability. Dream's Cyber
              Language Model, with its zero-integration deployment model, is specifically suited for environments where
              software installation is restricted.


              Budget ownership in Dream's primary segment typically resides at the ministry or national agency level,
              not at the operator level. This creates multi-year contract structures (3–7 year national cyber programs),
              strong renewal rates once deployed, and high switching costs — all favorable to Dream's business model.
              The average contract value likely ranges from $3–15 million per national entity based on Dream's $130M
              bookings with 30+ customers.


              PwC's Global Digital Trust Insights survey finds that 60% of business and technology leaders rank cyber
              risk in their top three strategic priorities. For government buyers, this figure is likely higher given
              direct national security implications. IBM's Cost of a Data Breach report 2024 found the global average
              breach cost at $4.4 million — for critical national infrastructure, the equivalent costs are orders of
              magnitude larger.
