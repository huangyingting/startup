      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Dream Security's founding team brings together an unusual combination of government leadership, offensive
              cybersecurity expertise, and technical depth. Shalev Hulio, serving as CEO, co-founded and led NSO Group,
              the Israeli company responsible for the Pegasus surveillance platform. His deep understanding of
              nation-state offensive tactics is central to Dream's threat detection approach. Gil Dolev, serving as CTO,
              brings technical experience from Microsoft, NSO Group, and Israel's Unit 8200 defense intelligence corps.
              Sebastian Kurz, serving as President, was Chancellor of Austria from 2017 to 2019 and again from 2020 to
              2021, giving him firsthand exposure to how governments are targeted by cyberattacks and how national-level
              responses are coordinated.


              The founding team is complemented by a strong board of directors assembled at the time of the Series B.
              Enrique Salem, a partner at Bain Capital Ventures and former CEO of Symantec (2009–2012) and Chairman of
              Mandiant, brings deep cybersecurity industry experience. Shlomo Yanai, former CEO of Teva Pharmaceuticals
              and former IDF commander, brings experience in managing large complex organizations. Existing board
              members include Dovi Frances (founder, Group 11) and Michael Eisenberg (founding partner, Aleph).


              Key-person risk is material. Shalev Hulio faces criminal proceedings by a Spanish court in connection with
              NSO Group's Pegasus spyware. A Barcelona court ruled in March 2025 that NSO Group co-founders Hulio and
              Omri Lavie may be indicted. Sebastian Kurz was convicted of perjury in 2024 in connection with testimony
              to an Austrian parliamentary inquiry, though this conviction was overturned on appeal in May 2025. Kurz
              remains under investigation for separate corruption allegations in Austria. These legal exposures
              represent material governance risks for Dream.


              As of early 2025, Dream has approximately 150 employees with plans to double to 300, reflecting rapid
              headcount growth consistent with its revenue trajectory. The company has strategically placed offices in
              Tel Aviv (R&D and headquarters), Vienna (European government relationships), and Abu Dhabi (Middle
              East/Gulf relationships). No formal succession plan or governance protocols for key-person absence are
              publicly disclosed.
