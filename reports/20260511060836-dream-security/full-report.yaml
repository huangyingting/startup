      - number: '4.5'
        title: Financial Due Diligence Gaps and Verdict
        blocks:
          - type: paragraph
            body: >
              Dream's financial picture is uniquely limited by private-company disclosure norms and government contract
              confidentiality. The most material gaps for a diligence team are: (1) no audited financial statements for
              any fiscal year, making the Globes estimate of $40 million recognized 2024 revenue the only available
              independent benchmark; (2) undisclosed gross margin, meaning AI compute cost drag remains unquantified;
              (3) opaque contract structure where ACV, duration, and pricing cannot be verified; (4) a material
              discrepancy between company-stated $130 million in annual sales and the independently estimated $40
              million recognized revenue, requiring clarification on ARR calculation methodology; and (5) a customer
              count discrepancy — company-stated 30+ entities versus Globes-reported fewer than ten signed contracts —
              that directly affects ARR quality and concentration risk assessment.


              The revenue quality concerns are the most significant diligence blocker. If Dream's $100 million ARR
              run-rate is calculated from annualized TCV of multi-year signed contracts rather than from in-period
              recurring revenue, the effective in-period ARR at Series B may be materially lower — potentially in the
              $40–60 million range based on the $40 million recognized revenue data point. A diligence team should
              request: audited or reviewed financials, ARR waterfall showing cohort retention and expansion,
              contract-by-contract NRR data, and clarification on the ARR metric definition.


              On a forward-looking basis, Dream's financial model is defensible if ARR growth is genuine and the company
              achieves the $200 million target. The government contract business model provides high per-entity ACV, low
              churn, and predictable multi-year cash flows — characteristics that command premium valuations. The
              blocking concern is that a company with two founders under legal proceedings, operating in markets closed
              to 40–50% of global government cyber budgets, with no audited financials and a revenue quality gap,
              requires exceptional diligence rigor before any material commitment.
