  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation and Target Market
        blocks:
          - type: paragraph
            body: |
              Dream Security's addressable customer universe is deliberately narrow: the company targets
              national governments, ministries of defense, national CERTs, and critical infrastructure
              operators requiring fully sovereign AI cybersecurity capabilities. Unlike enterprise security
              vendors with thousands of SME and mid-market customers, Dream operates in the national
              defense technology segment where individual contracts are large (multi-million to
              multi-hundred-million dollar range) and the total number of potential buyers globally is
              measured in dozens rather than thousands.

              The company's geographic go-to-market reflects this positioning. The Tel Aviv headquarters
              serves as the innovation base, while the Vienna office targets European NATO members and
              European Union agencies that have heightened sovereignty requirements under the EU's NIS2
              Directive and proposed Cyber Resilience Act. The Abu Dhabi office serves the GCC/MENA
              sovereign market, which includes UAE, Saudi Arabia, and other Gulf nations investing heavily
              in national cyber infrastructure following heightened state-sponsored threat activity in the
              region. Dream Security's leadership structure reinforces this go-to-market: CEO Shalev Hulio
              brings deep Middle East government relationships from NSO Group; President Sebastian Kurz
              has direct ties to European head-of-government networks.

              All customer segments require the same core product features: air-gapped deployment, sovereign
              data residency, and national AI training factory participation. This uniformity of requirements
              reduces product customization costs but also limits the addressable market to buyers that have
              the governance structure and budget authority to procure a national-scale cybersecurity platform.
              No commercial enterprise, financial institution, or technology company customers have been
              identified in public materials; the company appears to be exclusively a national/government
              market player at this stage of its commercial development.
