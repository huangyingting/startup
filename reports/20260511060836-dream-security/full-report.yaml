            title: AI Cyber for Governments Has No Analyst-Sized SAM
            body: >-
              Despite the clear commercial logic of AI-native national cybersecurity, no independent analyst firm has
              published a bottom-up or primary-data SAM for this segment. Dream operates in analytically underserved
              territory—a sign of both early-mover advantage and elevated sizing uncertainty.
            calloutType: insight
            claimRefs:
