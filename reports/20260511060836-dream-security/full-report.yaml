  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue, ARR, and Bookings
        blocks:
          - type: paragraph
            body: >
              Dream Security's revenue trajectory is exceptional by any measure of Israeli or global cybersecurity
              startup norms. Within its first full operating year (2024), the company reported more than $130 million in
              annual sales — a figure representing the total contract value of deals signed across its national
              government customer base. The company simultaneously reported an annualized recurring revenue (ARR)
              run-rate of approximately $100 million as of its February 2025 Series B close, with a public target of
              reaching $200 million ARR by end-2025.


              However, the relationship between these figures and actual recognized revenue requires careful unpacking.
              Globes, Israel's leading business newspaper, estimated Dream's actual recognized 2024 revenue at
              approximately $40 million — well below the $130 million bookings figure. This gap is structurally expected
              for a company selling three-to-seven-year national program contracts: under ASC 606 and IFRS 15, revenue
              is recognized as performance obligations are satisfied, not at contract signing. A $15 million five-year
              national platform contract would generate approximately $3 million per year in recognized revenue while
              contributing $15 million to bookings and $15 million annualized to TCV-based ARR calculations. The company
              has not publicly clarified whether its stated ARR reflects annual contract portions or annualized TCV.


              Regardless of recognition timing, the pace of bookings growth is notable. Dream reached $130 million in
              annual contract volume within 24 months of founding — a milestone that took CrowdStrike and SentinelOne
              multiple years to reach even in a friendlier enterprise market. The key caveat is that this is a
              government-contract company: deal frequency is low, contract sizes are large, and a small number of
              customer decisions drive the entire revenue picture. Globes estimated fewer than ten signed customers at
              Series B time, compared to the company's "30+" public statement — a discrepancy that could reflect
              counting methodology (signed contracts versus pilots, letters of intent, or framework agreements) or a
              material overstatement.
