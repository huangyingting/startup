        - Request executed contract summary (dates, ACV, delivery stage, jurisdiction) under NDA from CFO
      - - Shalev Hulio legal status
        - No published external legal opinion on Hulio's personal liability in Spanish or EU proceedings
        - Board-level succession clarity and procurement exclusion risk assessment required before capital commitment
        - Commission Spanish and EU counsel legal opinion; require board-approved succession protocol
      - - CLM production performance
        - No published accuracy metrics, false-positive rates, or third-party CLM benchmark
        - Core product value proposition unverified; central to valuation thesis and competitive moat
        - Require independent third-party technical evaluation as pre-investment condition
      - - Audited financial statements
        - No audited financials or CFO disclosed; revenue recognition methodology unknown; burn rate not disclosed
        - Cannot confirm ARR vs. bookings, gross margins, burn rate, or deferred revenue schedule
        - >-
          Request unaudited Q1 2026 financials and FY2025 audited statements under NDA; require GAAP or IFRS compliance
          opinion
      - - Sovereign reference calls
        - No publicly named customer references; government NDA is standard but negotiable for pre-investment
        - Standard reference diligence that cannot be substituted by company narrative
        - >-
          Negotiate minimum 2 facilitated reference calls with sovereign CISOs; require production deployment
          confirmation
      - - Tau Capital LP disclosure
        - UAE investor connections documented by FTM.eu; dual investor-customer relationship not disclosed
        - CFIUS risk for US buyers; LP conflict potential; governance independence for Bain-led board decisions
        - Require written Tau Capital disclosure of LP structure and any customer relationships under NDA
    notes: >-
      All six diligence asks are prerequisite conditions before upgrading from 'track' to any form of 'buy'
      recommendation. Items 1, 2, and 4 are blocking: without signed contracts, legal clarity, and financial
      verification, the investment thesis rests on unverifiable claims.
