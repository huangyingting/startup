      - number: '7.6'
        title: Kill Criteria and Diligence Asks
        blocks:
          - type: paragraph
            body: |
              Six thesis-break triggers would materially change the investment assessment and should
              be monitored as ongoing investment conditions, not merely assessed at entry. First, a
              personal criminal indictment or conviction of Shalev Hulio would create procurement
              exclusion risk across NATO-aligned government customers and trigger MOD license review
              of existing approvals. Second, a successful European legal challenge to Dream Security's
              export authorization—filed by NSO-focused human rights advocacy organizations—could
              trigger MOD withdrawal of existing licenses. Third, customer concentration non-renewal,
              where any single customer representing more than 15% of bookings exits or does not
              renew, would require a bookings restatement and likely down-round pressure.

              Fourth, failure to close five additional sovereign contracts by Q4 2026 would indicate
              the sales pipeline is not scaling independently of founder relationships, undermining
              the $200M ARR target. Fifth, evidence of CLM accuracy failure in a production government
              deployment—for example a documented missed attack—would impair the company's core value
              proposition and trigger competitor displacement risk. Sixth, any US sanctions, Entity
              List designation, or Treasury OFAC action against Dream Security personnel or its
              Tau Capital investors would create cross-border banking complications and potential
              forced investor exit requirements for US LPs in Bain Capital Ventures.

              Priority diligence asks include: a legal opinion from US and Spanish counsel on Hulio's
              personal liability exposure; a legal opinion from Austrian counsel on Kurz's ongoing
              procurement eligibility; a full contract listing (term, ACV, stage) with ≥3 sovereign
              reference call commitments; the CLM's production accuracy metrics with false-positive
              and false-negative rates; and MOD export license approval history and pipeline timeline
              for the next three prospective deals.
