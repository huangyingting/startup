chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Founding, and Strategic Positioning
        blocks:
          - type: paragraph
            body: >
              Dream Security is an Israeli AI-powered national cybersecurity company headquartered in Tel Aviv, Israel,
              with offices in Vienna, Austria, and Abu Dhabi, UAE. The company was founded in January 2023 with a
              singular mission: to deliver sovereign, AI-driven cybersecurity at national scale, specifically designed
              for governments and critical infrastructure operators. Unlike enterprise cybersecurity vendors, Dream was
              purpose-built from day one to address the unique threat environment facing nation-states, including
              nation-state adversaries, advanced persistent threats, and attacks on critical infrastructure such as
              energy grids, water systems, ports, and nuclear facilities.


              The company's core product, the Cyber Language Model (CLM), is a suite of proprietary large language
              models trained exclusively on cyber telemetry — including code, logs, configurations, and threat
              intelligence. The CLM enables Dream to automate complex security operations that traditionally require
              elite human analysts, providing real-time visibility across hybrid, cloud, and legacy environments without
              requiring hardware or software installation by the customer.


              Dream differentiates itself from conventional cybersecurity vendors through three key positioning
              elements: (1) a national-scale platform built for government use cases rather than retrofitted enterprise
              tools, (2) a founding team with deep offensive cyber experience from Israel's intelligence ecosystem, and
              (3) zero-integration deployment allowing rapid adoption even by organizations with legacy infrastructure.
              The company has been explicit that it does not operate in the offensive surveillance market, positioning
              itself as purely defensive.


              In February 2025, Dream became Israel's first AI-cybersecurity unicorn of 2025, reaching a $1.1B valuation
              after its $100M Series B led by Bain Capital Ventures. The company reported over $130M in annual sales
              contracts with more than 30 national-level government entities, making it one of the fastest-growing
              Israeli cybersecurity companies in history based on publicly available data as of early 2026.
