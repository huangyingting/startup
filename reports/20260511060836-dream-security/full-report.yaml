              signed national government customers as of early 2025 per Globes reporting, against
              a 30+ claimed figure that likely includes pipeline engagements. With estimated
              individual contract values of $10M–$50M annually, a single non-renewal represents
              10–30% of total bookings. The company has not publicly disclosed any channel partners,
              system integrators, or resellers; all sales appear to flow through direct executive
              relationships, creating structural dependency on Hulio and Kurz as sales assets rather
              than institutional sales infrastructure.

              Technology platform dependencies include NVIDIA (NIM inference), Meta (LLaMA base
              models), and Alibaba (Qwen 72B). Each represents single-vendor concentration risk.
              If NVIDIA NIM pricing increases substantially, gross margins—estimated 70–80% based
              on comparable SaaS companies—could compress. If Meta revises LLaMA's commercial
              license for government use, Dream would need to either negotiate an enterprise license
              or migrate to an alternative base model. The Abraham Accords normalization (2020)
              created the diplomatic prerequisite for Dream's Abu Dhabi office; any deterioration
              of Israeli-UAE relations would directly impair GCC market access.

              Investment concentration also warrants attention. Bain Capital Ventures and Tau Capital
              represent the primary institutional capital. Follow the Money (FTM.eu) documented Tau
              Capital's UAE connections in investigative reporting, raising questions about potential
              conflicts of interest if UAE government entities are simultaneously investors in and
              customers of Dream Security. This dual-role possibility has not been disclosed publicly
              or addressed by the company.
