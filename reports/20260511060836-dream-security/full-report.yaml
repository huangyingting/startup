      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The primary growth driver for Dream Security's market is the escalating frequency and sophistication of
              nation-state cyberattacks on government and critical infrastructure targets. The ENISA Threat Landscape
              2024 documented a 30% year-on-year increase in significant cyber incidents affecting critical
              infrastructure. CrowdStrike's 2025 Global Threat Report found that adversary breakout times compressed to
              an average of 29 minutes, from 62 minutes in 2023 — making human-speed response insufficient and
              AI-automated defense essential. Microsoft's Digital Defense Report 2024 documented increasing targeting of
              government and critical infrastructure by state-sponsored threat actors.


              Regulatory drivers are equally important. The EU's NIS2 Directive, effective October 2024, requires 18
              critical infrastructure sectors to implement enhanced cybersecurity measures and mandates AI-assisted
              monitoring for entities above a risk threshold. The US CIRCIA (Cyber Incident Reporting for Critical
              Infrastructure Act) requires critical infrastructure operators to report significant cyber incidents
              within 72 hours, creating demand for real-time monitoring. These regulatory mandates effectively expand
              Dream's SAM by compelling mandatory security investment.


              NATO's cyber investment pledge — members are now encouraged to allocate 25% of defense spending to
              modernization including cybersecurity — is a structural spending tailwind. The NIST Cybersecurity
              Framework Version 2.0, published in 2024, explicitly integrates AI-based detection as a recommended
              control, providing procurement justification for AI-native solutions.


              The primary adoption constraints are: (1) government procurement cycles of 18–36 months from initial
              engagement to contract award, (2) data sovereignty restrictions that prohibit government telemetry from
              being processed in foreign-controlled cloud infrastructure, (3) classification requirements that
              complicate integration testing, (4) incumbent relationships with Microsoft (Defender XDR, Sentinel),
              Palantir, and Recorded Future, and (5) the reputational shadow of NSO Group on Dream's leadership — which
              limits access to the Five Eyes market, the EU members most aligned with US intelligence, and UN-monitored
              procurement.


              Verizon's 2024 Data Breach Investigations Report found that 14% of breaches involved nation-state actors,
              the highest proportion ever recorded. Sophos' State of Ransomware report documented that critical
              infrastructure suffered ransom attacks at 1.8× the rate of commercial enterprises, underscoring the
              sector-specific threat intensity.
