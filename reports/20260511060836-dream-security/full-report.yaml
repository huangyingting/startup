          - type: callout
            title: NSO Shadow Creates a Structural SAM Ceiling
            body: >-
              Dream's inability to pursue the Five Eyes market (US, UK, Canada, Australia, New Zealand) and potentially
              parts of EU due to Hulio's NSO Group history represents a hard ceiling on its accessible market. The Five
              Eyes collectively represent ~40–50% of global advanced government cybersecurity spend, capping Dream's SOM
              meaningfully below the full SAM.
            calloutType: risk
            claimRefs:
              - CM025
              - CM023
          - type: callout
            title: Regulatory Mandates Are Structural Demand Drivers
            body: >-
              NIS2 (EU, 18 sectors), CIRCIA (US critical infrastructure), and NATO cyber pledges represent mandatory
              security investment that cannot be deferred. These structural tailwinds provide demand certainty for
              AI-native national cybersecurity vendors regardless of economic cycles.
