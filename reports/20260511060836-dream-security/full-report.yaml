              creates a material diligence limitation: no third-party deployment case studies, outcome
              reports, or customer testimonials from named organizations have been published.

              The strongest available customer proof is investor testimony. Bain Capital Ventures, leading
              a $100M Series B, referenced "earning the trust of global government entities responsible for
              national cyber defense" in its investment thesis materials. Investor 7GC.co stated that
              "government customers found previously undetected risks with Dream's technology," indicating
              active production deployment with meaningful outcomes. The F5 BIG-IP breach analysis published
              by Dream in December 2025 demonstrates the platform functioning in response to a real security
