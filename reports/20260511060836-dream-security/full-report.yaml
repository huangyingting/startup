      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear'
        blocks:
          - type: paragraph
            body: |
              Three scenarios are modeled to bracket the investment outcome space. The bull scenario (20%
              probability) assumes Dream achieves $200M+ ARR by end-2026 through closing 15+ sovereign
              contracts, Hulio's legal exposure is resolved through external counsel without material
              disruption, and the company targets an IPO in 2028 at a 15x ARR multiple consistent with
              Palantir's pre-IPO trajectory. This yields a $3.0B+ valuation and approximately 2.7x return
              on Series B entry—a reasonable VC outcome but below the 3-5x typical for venture funds
              underwriting critical-legal-risk companies. The key risk is that Hulio indictment collapses
              this scenario with low warning time.

              The base scenario (50% probability) assumes $130-150M ARR by end-2026 (10-12 contracts),
              legal risks contained without escalation, and an M&A exit in 2027-2028 to a European or
              Israeli defense prime (Thales, Elbit, BAE) at 10-12x ARR. This yields $1.4-1.7B valuation
              and a 1.3-1.5x return—inadequate for most venture-style risk profiles but potentially
              acceptable for growth equity investors with lower IRR hurdles. Customer concentration and
              valuation discipline from a strategic acquirer are the primary risks.

              The bear scenario (30% probability) assumes stalled contracts below $80M ARR, escalation
              of Hulio or Kurz legal proceedings, and a flat or down-round Series C at $900M-1.1B in
              2026-2027 that dilutes Series B shareholders by 30%. This scenario yields 0.5-0.6x return
              and is the most likely outcome if the two most material risks—legal exposure and customer
              concentration—compound simultaneously. Given 30% probability on a bear scenario with near-full
              capital impairment, the expected value of the investment is approximately 1.3-1.5x on a
              probability-weighted basis, which is below the 2.0x minimum expected value threshold most
              institutional investors require for high-risk private equity positions.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
