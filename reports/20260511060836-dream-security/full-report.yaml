      - number: '1.3'
        title: Funding History, Milestones, and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Dream Security achieved extraordinary growth velocity in its first two years. From founding in January
              2023, the company secured customers and revenue faster than virtually any other Israeli cybersecurity
              company, reaching over $130M in annual sales contracts by the time of its Series B announcement in
              February 2025. This pace is exceptional for a company operating in the government/national security
              sector, where procurement cycles typically span 12-24 months.


              The company's funding history reflects increasing investor confidence. A seed/pre-seed round preceded the
              $35M Series A in November 2023, co-led by Aleph and Group 11 — two of Israel's most prominent venture
              capital firms. The Series A was notable in that it was closed during the Israel-Hamas war, with Hulio
              signing the term sheet from the Gaza border while serving in IDF reserves. The $100M Series B in February
              2025, led by Bain Capital Ventures at a $1.1B valuation, established Dream as a unicorn and the first
              Israeli AI-cyber unicorn of 2025.


              Globes reported that while Dream cited $130M in "annual sales" (likely representing contract
              backlog/commitments), the actual 2024 revenue was approximately $40M, with ARR at Series B time running at
              approximately $100M annualized pace, projected to double to $200M ARR by end of 2025. The pre-Series B
              valuation, per PitchBook data, was approximately $54M — implying a roughly 20x valuation increase within
              approximately 18 months.


              Key milestones include the volunteering of Dream's platform to an Israeli hospital during the Gaza
              conflict, demonstrating operational readiness and defensive use-case commitment. Dream published analysis
              of the F5 BIG-IP supply chain breach in December 2025, demonstrating its research capabilities. The hiring
              of Enrique Salem and Shlomo Yanai to the board signals ongoing professionalization of governance. Adverse
              events include the Spanish court ruling against NSO Group executives in March 2025 and the Skyline
              International human rights report in April 2025.
