      - number: '3.2'
        title: Competitor Profiles and Scale
        blocks:
          - type: paragraph
            body: >
              Microsoft Security is the single largest cybersecurity vendor globally, with security-specific annual
              revenue exceeding $20 billion in FY2024 — a figure larger than the entire AI-in-cybersecurity TAM for
              other vendors combined. Microsoft bundles Defender XDR, Sentinel SIEM, and Security Copilot (AI assistant)
              into existing Azure and Microsoft 365 government licensing agreements. For budget-constrained governments
              already running Azure or M365, Microsoft Security is effectively cost-free. Security Copilot, launched
              commercially in March 2024, provides AI-assisted analyst support through natural language interfaces.
              Microsoft is FedRAMP High certified and holds contracts with dozens of national governments globally.


              CrowdStrike reported ARR of $4.24 billion for fiscal year 2025 (ended January 2025), growing at 23%
              year-on-year. The Falcon platform leads in endpoint detection and response and is Gartner Magic Quadrant
              leader for EPP. CrowdStrike launched Charlotte AI, a natural language AI analyst interface, in 2023. The
              company has a dedicated public sector business unit (CrowdStrike Government) with FedRAMP High
              authorization. However, CrowdStrike's agent-based architecture requires software deployment on every
              endpoint — a fundamental architectural barrier in air-gapped, OT/SCADA, or classified government
              environments where Dream's zero-integration deployment is a distinct advantage.


              Darktrace, taken private by Thoma Bravo at a $5.3 billion valuation in 2024, is the closest philosophical
              analog to Dream: an AI-behavioral detection platform that learns normal patterns and detects anomalies
              without signature-based rules. Darktrace serves approximately 9,000 customers, primarily mid-to-large
              enterprises, with ARR at IPO of approximately $577 million. Unlike Dream, Darktrace requires network
              sensors and/or endpoint agents, operates at the organizational rather than national level, and does not
              offer sovereign AI deployment. Darktrace Federal serves some US government agencies but does not operate
              as a national-cyber platform.


              Palantir Technologies ($2.87 billion total revenue in FY2024, +29% year-on-year) is the strongest analog
              in terms of government trust and AI capabilities, but is fundamentally a data analytics and AI
              decision-support platform rather than an active cybersecurity defense platform. Palantir's US Government
              segment grew 45% to $1.11 billion in FY2024, with TITAN and MAVEN contracts showing the deepest US DoD
              trust of any commercial AI company. However, Palantir's penetration outside the Five Eyes and Israel is
              limited, and its trust deficit in the Middle East, Southeast Asia, and non-NATO Europe — Dream's primary
              markets — means they are rarely competitive in the same procurement processes.


              Recorded Future, acquired by Mastercard for $2.65 billion in September 2024, reported ARR exceeding $300
              million at acquisition and serves more than 45 government and intelligence agencies. Recorded Future is a
              threat intelligence platform — it aggregates open-source and dark-web intelligence and provides analyst
              feeds — rather than an active cyber defense or posture management platform. The Mastercard acquisition
              raises questions about whether Recorded Future will expand its threat intelligence into active defense or
              remain an analyst-facing product.
