      - number: '6.2'
        title: Adoption Trajectory and Deployment Evidence
        blocks:
          - type: paragraph
            body: |
              The quantitative evidence for Dream Security's customer adoption is limited by deliberate
              opacity around national security engagements. The company's Series B press release in February
              2025 announced contracts with "multiple sovereign nations and critical infrastructure providers,"
              providing soft confirmation of production deployment without naming clients. Investor 7GC.co,
              an early backer, provided the clearest third-party customer validation available: "government
              customers have found previously undetected risks with Dream's technology and are using the
              platform as a new standard for critical infrastructure protection."

              The $130M+ in annual sales bookings reported by Dream's CEO represents the total contract
              value of multi-year agreements signed, not a single-year revenue figure. Israeli business
              outlet Globes, citing independent sourcing, reported that the actual number of signed contracts
              was fewer than ten as of early 2025—materially below the "30+" figure cited in company
              materials and investor pitches. This discrepancy likely reflects the difference between
              Letters of Intent, framework agreements, and fully executed binding contracts in the
              government procurement cycle. Government procurement timelines are notoriously long,
              with 12-to-24 month periods between initial engagement and signed contract being typical
              for national security platform purchases.

              The annual recognized revenue estimated at approximately $40M for 2024 (Globes estimate)
              versus $130M+ in bookings implies a significant revenue backlog and suggests Dream is still
              in the early deployment and revenue-recognition phases of its signed contracts. The National
              AI Training Factory, operational by December 2025, requires multiple sovereign deployment
              participants to generate meaningful national model improvement—indicating that platform
              utility is still in the growth phase.
