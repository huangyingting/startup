      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple independent analysts have sized the AI-in-cybersecurity market, producing estimates that vary
              significantly based on scope definitions, methodology, and geographic coverage. MarketsandMarkets
              estimates the AI-in-cybersecurity market at USD 25.53 billion in 2026, growing to USD 50.83 billion by
              2031 at a CAGR of 14.8%. Grand View Research projects the AI cybersecurity market reaching $93.75 billion
              to $134 billion by 2030–2031 depending on scope. These wide variances reflect inconsistent inclusion
              criteria: narrower definitions exclude AI-adjacent tools like SIEM; broader definitions include all
              security tools with any AI feature.


              The critical infrastructure protection (CIP) market is substantially larger: MarketsandMarkets sizes it at
              $153.93 billion in 2025, growing to $197.13 billion by 2030 at a 5.1% CAGR. This market includes physical
              security, which is outside Dream's scope. The AI-native portion of CIP security—Dream's primary focus—is a
              fraction of the total CIP market.


              A government-specific AI cybersecurity SAM is not independently sized by public analysts. Based on
              available proxies—government cybersecurity budgets as a share of total security spend, analyst projections
              for the government vertical within AI security platforms, and Dream's own reported $130 million in sales
              contracts with 30+ national entities—a reasonable SAM estimate for AI-native national/government cyber is
              $3–6 billion globally in 2026. This estimate is derived and should be treated as directional.


              Dream's serviceable obtainable market (SOM) reflects its current geographic focus: Europe, the Middle
              East, and Southeast Asia, with the Five Eyes (US, UK, Canada, Australia, New Zealand) largely inaccessible
              due to NSO Group reputational factors. Given this constraint, Dream's SOM is estimated at $0.5–1.5
              billion, consistent with its ARR trajectory toward $200 million by end-2025 while leaving substantial
              expansion room. These SOM estimates are not independently verified.


              Cybercrime costs, which create the demand urgency, reached an estimated $10.5 trillion annually by 2025
              according to Cybersecurity Ventures — a figure widely cited but constructed from aggregate incident data
              rather than direct measurement.
