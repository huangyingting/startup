      - number: '6.4'
        title: Retention, Contract Durability, and Satisfaction
        blocks:
          - type: paragraph
            body: |
              Dream Security has not published any retention metrics, net revenue retention (NRR), gross
              revenue retention (GRR), or cohort-based usage data. This is both expected given its stage
              (27 months old, ~10 or fewer fully signed customers) and structurally typical for national
              government technology vendors where classified contract details are not disclosed publicly.

              Structurally, government cybersecurity platform contracts are highly durable by nature.
              Multi-year framework agreements (typically 3-7 years for national security platforms) with
              annual deployment fees provide revenue visibility. Switching costs are very high: replacing
              an installed national cyber platform that is integrated with a country's AI training factory
              and SOC operations involves significant organizational disruption, retraining, data migration,
              and re-procurement cycles. Dream's National AI Training Factory further amplifies switching
              costs by accumulating organization-specific model improvements that cannot be transferred
              to a competing platform.

              On the negative side, government procurement contracts can be terminated for convenience
              with relatively short notice in some jurisdictions, and geopolitical shifts can abruptly
              alter security relationships. If a Dream customer's government changes its national security
              posture or vendor relationships due to political factors—as occurred with several NSO Group
              customers under Shalev Hulio's prior leadership—that customer could exit quickly. The
              Israeli origin of the technology may also face resistance from certain governments, as seen
              in prior controversies over NSO Group's Pegasus software. No customer complaints, failed
              deployments, or public contract terminations have been identified as of May 2026.
