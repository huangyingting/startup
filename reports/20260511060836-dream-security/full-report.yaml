  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Dream Security operates in a competitive whitespace: no major incumbent has built a
              sovereign-government-optimized, zero-integration AI cybersecurity platform as their core product. Instead,
              Dream faces a fragmented competitive set that can be categorized into five groups: (1) enterprise
              cybersecurity platforms with government sales motions (Microsoft Security, CrowdStrike, Palo Alto
              Networks, SentinelOne); (2) government AI and data analytics platforms that are expanding into cyber
              (Palantir); (3) threat intelligence vendors serving government clients (Recorded Future, now owned by
              Mastercard); (4) AI behavioral detection specialists (Darktrace, taken private by Thoma Bravo in 2024);
              and (5) legacy SIEM vendors embedded in government infrastructure (IBM Security / QRadar, Splunk).


              The common weakness across all these competitor categories, from Dream's perspective, is that none offers
              a sovereign-government-native platform with zero-integration deployment and CLM-based AI trained
              specifically on national-scale telemetry. Microsoft's government cyber solutions are essentially
              enterprise tools with FedRAMP compliance added; CrowdStrike and SentinelOne require endpoint agents which
              cannot be deployed in many classified environments; and Palantir offers data analytics and decision
              support rather than active cybersecurity defense. Dream is positioned as the only purpose-built
              national-sovereign AI cyber platform.


              Likely new entrants in the 1–3 year horizon include Israeli startups leveraging Unit 8200 alumni (similar
              founder pool to Dream), US-based AI-native security startups expanding government focus, and potentially
              Recorded Future/Mastercard applying threat intelligence to active defense. The NSO Group-adjacent
              ecosystem also produces talent that could launch competing platforms.
