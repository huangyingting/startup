companyProfile:
  summary: >
    Dream Security was founded in January 2023 in Tel Aviv by CEO Shalev Hulio (former NSO Group CEO) and CTO Gil Dolev.
    The company built the Cyber Language Model (CLM), an AI platform that ingests national telemetry—network logs,
    endpoint events, threat intelligence—and trains sovereign LLMs on classified government data to detect nation-state
    attacks without requiring any integration into existing security tools. Dream operates from Tel Aviv (HQ), Vienna,
    and Abu Dhabi, markets exclusively to national governments and sovereign agencies, and reached a $1.1B valuation in
    February 2025 after a $100M Series B led by Bain Capital Ventures. The company claims 30+ national government
    engagements and a $130M+ bookings run-rate, though Globes reported fewer than 10 signed contracts and approximately
    $40M in recognized revenue.
