      - number: '7.2'
        title: Regulatory and Legal Exposure
        blocks:
          - type: paragraph
            body: |
              Dream Security's most severe risks stem directly from its leadership. CEO Shalev Hulio
              co-founded and led NSO Group—the Israeli surveillance technology company whose Pegasus
              spyware was allegedly deployed by sovereign clients against journalists, human rights
              activists, and foreign leaders—from 2010 until 2021. NSO Group was placed on the US
              Bureau of Industry and Security (BIS) Entity List in November 2021, the first Israeli
              technology company to receive this designation. While Hulio is not personally charged
              in US proceedings, Spanish authorities have opened criminal investigations into
              Pegasus-related surveillance of Catalan independence activists, and Hulio as NSO CEO
              has been cited as a person of interest in multiple European judicial inquiries.
              Amnesty International's forensic Security Lab documented 50,000+ targets of Pegasus
              surveillance across 50 countries.

              President Sebastian Kurz presents a separate and more immediate legal risk. Austrian
              courts convicted Kurz in late 2024 for lying to a parliamentary committee during the
              Ibiza affair investigation. The conviction carries a suspended sentence that does not
              currently restrict travel, but Kurz remains under investigation for alleged corruption
              involving paid media coverage during his chancellorship. A conviction on the more
              serious charges could render Kurz ineligible to participate in regulated European
              government procurement processes, directly impairing the European sales pipeline that
              depends on his political network.

              NSO Group was sold to a US private equity firm following its 2023 bankruptcy filing,
              legally severing any residual corporate connection to Hulio. However, reputational
              transfer is not governed by corporate law. Surveys of Western democratic government
              procurement officers cite NSO-linked executive backgrounds as a disqualifying factor
              in security tool procurements. Beyond individual leadership risk, all of Dream
              Security's international sales require Israeli Ministry of Defense export license
              approval. MOD licenses can be conditioned, delayed, or revoked under diplomatic
              pressure—giving the Israeli government implicit veto power over customer relationships.
              The EU AI Act (effective August 2024) classifies AI systems used for national
              security surveillance as high-risk, imposing conformity assessment, documentation,
              and human oversight requirements that Dream has not publicly confirmed compliance with.
