      - number: '8.2'
        title: Valuation Context and Entry Discipline
        blocks:
          - type: paragraph
            body: |
              Dream Security's $1.1B Series B post-money valuation was set in February 2025 by Bain Capital
              Ventures' $100M investment. At that date, the implied revenue multiple was approximately 28x
              estimated trailing recognized revenue ($40M per Globes) or 8.5x reported bookings ($130M).
              Both metrics are at the high end of private-market benchmarks for government security companies
              in 2025, though market multiples have compressed substantially from 2021-2022 peaks—Dream's
              2025 valuation reflects post-correction pricing, not peak-cycle exuberance.

              The preference stack must be understood by any investor entering at Series B valuation. With
              $135M total raised, approximately $140M in liquidation preferences exist across Series A,
              B, and seed classes. Common equity holders (including employee option pools) do not participate
              meaningfully until exit exceeds approximately $1.4B. A flat exit at $1.1B returns approximately
              $0.85 on the dollar to Series B investors after liquidation preference waterfall. A 2x return
              requires approximately $2.2B exit before Series C dilution—achievable in the bull scenario but
              not in the base case.

              Series C financing, likely required in 2026-2027 if recognized revenue does not catch up to
              bookings velocity, would add another 20-25% dilution layer. At a Series C at $1.5B valuation,
              Series B investors would be diluted from approximately 9% to approximately 7%, reducing the
              return profile. Entry discipline means any commitment at Series B valuation should include a
              pro-rata right to Series C, a board seat or observer right, and defined information rights
              including quarterly unaudited financial statements.
            claimRefs:
