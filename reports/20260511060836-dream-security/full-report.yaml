  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              The market in which Dream Security operates sits at the intersection of three overlapping domains: (1)
              AI-augmented cybersecurity tools and platforms, (2) critical infrastructure protection (CIP) solutions,
              and (3) government/national-level security programs. These domains share buyers, budgets, and threat
              models but are sized very differently by analysts, making precise market definition critical for
              understanding the growth opportunity.


              AI-in-cybersecurity is broadly defined as the application of machine learning, large language models, and
              behavioral AI to threat detection, incident response, posture management, and security automation. The
              critical infrastructure protection market encompasses physical and cyber security solutions for the 16
              CISA-designated critical infrastructure sectors: energy, water, transportation, communications,
              healthcare, financial services, defense industrial base, nuclear, dams, emergency services, food and
              agriculture, government facilities, manufacturing, chemical, information technology, and commercial
              facilities.


              Dream Security's serviceable market is a sub-segment: AI-native, software-only, national-scale
              cybersecurity for sovereign governments and their critical infrastructure operators. This excludes:
              enterprise commercial customers, hardware-based perimeter security, identity and access management, and
              offensive cyber tools. Status-quo substitutes include: national CERTs operating manually, legacy SIEM/SOC
              tools (IBM QRadar, Splunk), traditional MSSP contracts, and government-procured versions of enterprise
              platforms like Microsoft Defender.


              Adjacencies with potential expansion include: intelligence community analytics, OT/ICS security platforms,
              sovereign AI infrastructure, and cyber threat intelligence-as-a-service. Dream has not publicly announced
              plans to expand into these adjacencies, but the CLM architecture could support them.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
