      - number: '5.3'
        title: Deployment Model and Zero-Integration Architecture
        blocks:
          - type: paragraph
            body: |
              A core technical and commercial differentiator of Dream Security is its "zero-integration"
              deployment philosophy. The platform deploys lightweight, agentless discovery agents that
              perform passive network scanning to collect telemetry without requiring installation on
              endpoints, vendor API credentials, log-forwarding sidecar agents, or custom SIEM connectors.
              Dream claims this architecture eliminates the primary adoption friction that causes traditional
              SIEM and XDR deployments to stall at onboarding or remain perpetually underutilized.

              All collected telemetry flows into Dream Computing Services (DCS), the central orchestration
              hub which Dream describes as fully deployable on-premises, in private clouds, or in fully
              air-gapped national environments. The sovereign deployment model is architecturally designed
              so that no customer or national data ever transits outside the defined network perimeter—a
              critical requirement for government ministries, national intelligence agencies, and critical
              infrastructure operators that cannot legally or operationally use public cloud-based security
              analytics. Dream explicitly targets NATO member states, GCC nations, and EU critical
              infrastructure under this sovereign model, evidenced by its office openings in Vienna and
              Abu Dhabi.

              Dream's platform supports mixed IT, OT, and ICS environments, which is architecturally
              significant because many industrial networks have strict constraints on active scanning or
              agent installation. The company claims compatibility with air-gapped operational technology
              networks via passive traffic monitoring. Key infrastructure dependencies include NVIDIA NIM
              microservices for inference compute, on-premises or private-cloud GPU hardware for model
              serving, and open-source model weights for LLaMA and Qwen base models. Independent validation
              of the zero-integration claim through publicly referenced customer deployments remains limited
              as of May 2026, representing a material diligence gap.
