            body: |
              Dream Security has not publicly disclosed the names of any customer deployments as of May
              2026. The company cites national security classification requirements that prevent public
              attribution. This is a legitimate and common constraint for companies operating in the
              sovereign government cybersecurity sector—peers such as Palantir, Cellebrite, and NSO Group
