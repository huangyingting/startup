      - number: '8.5'
        title: Exit Readiness and Return Profile
        blocks:
          - type: paragraph
            body: |
              Dream Security's most credible near-term exit path is M&A by a European or Israeli defense
              prime. Thales (already acquired Darktrace), Airbus Defence, Leonardo SpA, Elbit Systems,
              and BAE Systems are all strategic acquirers with sovereign AI capability gaps and European
              procurement relationship dependencies that align with Kurz's network. A strategic exit in
              this set avoids CFIUS complications from Tau Capital's UAE investor profile, which would
              need to be disclosed and reviewed under a US buyer scenario.

              IPO readiness requires at minimum: audited financial statements (at least 2 years), an
              independent audit committee, a CFO with public-company reporting experience, SOC 2 or
              equivalent certification, and a diversified revenue base with at least 20+ named customers
              to support a public-market customer concentration narrative. Dream currently satisfies none
              of these conditions publicly. An IPO in 2028 at the earliest is plausible only in the bull
              scenario where ARR reaches $200M+ and legal risk is resolved.

              The preferred return waterfall creates a complex incentive structure. Bain Capital Ventures
              at approximately 9% ownership and $100M cost basis needs a $1.1B+ valuation just to
              break even on return of capital (before management fees and carry). At $1.5B exit, Bain
              returns 1.4x—below typical fund return thresholds. This creates board-level pressure for
              Bain to push for either a transformative growth event (Series C at elevated valuation) or
              an M&A exit at a sufficient premium. Investors considering co-investment alongside Bain
              should note this structural incentive alignment between Bain and a strategic M&A outcome.
            claimRefs:
              - CV018
