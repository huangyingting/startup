      - number: '8.4'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: |
              The comparable set for Dream Security is deliberately narrow: the company occupies a unique
              intersection of national sovereignty, AI-native architecture, and government-only go-to-market.
              No public company matches on all three dimensions. The closest comparables are CrowdStrike
              (AI-native cybersecurity), Palantir (government AI analytics), SentinelOne (AI threat
              detection), and Darktrace (AI cybersecurity, M&A exit).

              CrowdStrike (CRWD) is the best public-market benchmark for AI-native cybersecurity. As of
              early 2026, CrowdStrike trades at approximately 21x forward revenue with $3.9B ARR, 33%
              growth, and 74% gross margins after 14 years of operation and 29,000+ enterprise customers.
              Dream's 28x recognized revenue multiple already exceeds CrowdStrike's multiple despite being
              at 0.1% of CrowdStrike's revenue scale—a premium that is only justified by Dream's higher
              growth rate and first-mover claim in the sovereign AI niche.

              Palantir (PLTR) provides the high ceiling for the government-only AI platform model, trading
              at approximately 33x revenue in early 2026 with $2.9B in revenue. Palantir's government
              concentration (53% US government) parallels Dream's positioning but at 70x Dream's estimated
              revenue scale and after 20 years of operation. Dream's 8.5x bookings multiple compares
              favorably to Palantir's revenue multiple only if bookings are treated as equivalent to
              recognized revenue—a significant analytical stretch.

              The Darktrace M&A exit (Thales, 2024) at ~£4.25B and 9x TTM revenue is the most
              actionable exit comp: it confirms that European defense primes will pay meaningful premiums
              for AI-native cybersecurity capability at scale. However, Darktrace was profitable and had
              a diversified enterprise customer base—both conditions Dream has not yet achieved. An acquisition
              at Dream's current $1.1B valuation before achieving $100M recognized revenue would require a
              premium over book value that most strategic acquirers would resist without 2+ years of
              production deployment evidence.
