      - number: '4.2'
        title: Capital Structure, Funding Rounds, and Cash Adequacy
        blocks:
          - type: paragraph
            body: >
              Dream Security has raised approximately $135 million across three disclosed financing events. The company
              closed a seed or pre-seed round of undisclosed size in 2023, followed by a $35 million Series A in
              November 2023 co-led by Aleph and Group 11 with participation from 7GC and Tau Capital. In a notable
              demonstration of founder resilience, Shalev Hulio signed the Series A term sheet from the Gaza border
              while serving in IDF reserve duty during the Israel-Hamas conflict.


              The Series B of $100 million, announced February 17, 2025, was led by Bain Capital Ventures at a
              post-money valuation of $1.1 billion. Existing investors Group 11, Aleph, Tru Arrow, and Tau Capital all
              participated. The round was confirmed by multiple independent sources including Bloomberg, Globes,
              SecurityWeek, and BusinessWire. Bain Capital Ventures' investment memo described the round as motivated by
              Dream's unique positioning at the intersection of AI-native defense and sovereign government procurement —
              a market Bain characterized as underserved by existing enterprise-oriented vendors.


              Capital adequacy analysis from the Series B is challenging due to the absence of public financial
              disclosures. Based on Dream's stated headcount of approximately 150 employees at Series B time (with plans
              to double to 300), multi-city office operations across Tel Aviv, Vienna, and Abu Dhabi, and significant AI
              compute requirements for CLM training and inference, estimated monthly burn is in the range of $5 million
              to $10 million. At this burn rate, the $100 million Series B proceeds provide eight to eighteen months of
              runway from February 2025 — extending to mid-2026 at the low end. This runway is substantially extended if
              the company meets its ARR growth targets, since each incremental $10 million in ARR translates to
              additional cash inflows reducing net burn. No debt financing or venture debt has been disclosed. Dream's
              next capital event — whether a Series C or IPO — is most likely triggered by ARR reaching or exceeding the
              $200 million target and geographic diversification beyond Middle East and European markets.
