      - number: '4.3'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Dream's unit economics are almost entirely inferential given the company's private status and absence of
              investor-day disclosures. The most defensible estimates derive from comparable government-focused AI
              software companies and from the structural characteristics of Dream's business model.


              On the revenue side, the per-entity annual contract value is estimated at $3 million to $15 million based
              on dividing the stated ARR run-rate by the estimated number of active signed customers (ten to thirty
              entities). Contract terms are estimated at three to seven years, consistent with government procurement
              norms and the multi-year nature of national infrastructure programs. Revenue mix is estimated at
              approximately 65% platform license (CLM deployment), 25% managed SOC services, and 10% professional
              services and implementation — though this split is entirely inferred from sector benchmarks.


              On the cost side, Dream's architecture has favorable gross margin implications. The zero-integration
              deployment model — which requires no hardware shipment, no on-site agents, and no network sensor
              installation — eliminates the traditional hardware and deployment service costs that drag down competitors
              like Darktrace and CrowdStrike. Estimated gross margin of 60% to 75% reflects the software-heavy cost of
              goods sold, partially offset by significant AI compute costs for training and running the Cyber Language
              Model at scale. These AI infrastructure costs are a structural drag relative to traditional SaaS
              companies.


              Customer acquisition cost is qualitatively very high due to the CEO-led diplomatic selling model. Shalev
              Hulio and Sebastian Kurz serve as Dream's primary sales channel into government procurement, relying on
              personal relationships with heads of state, intelligence directors, and national cybersecurity agencies.
              This model produces very high average contract values but correspondingly high effective CAC per account —
              with sales cycles estimated at 12 to 24 months based on government procurement norms. Payback period,
              assuming a midpoint ACV of $8 million and a rough CAC estimate of $15 million to $20 million per large
              national account (executive time + BD costs over an 18-month cycle), is estimated at two to four years.
              Revenue per employee is approximately $0.27 million (recognized revenue basis at $40M ÷ 150 headcount),
              low at this stage but typical for a pre-scale government SaaS build-out.
