      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Dream Security's expansion model relies on land-and-expand within sovereign accounts:
              governments typically begin with a pilot or limited national deployment, then expand coverage
              to additional ministries, sectors, or cross-border agency sharing arrangements. The National
              AI Training Factory creates a natural expansion incentive—the more data ingested from
              additional sectors, the more valuable the national model becomes for all participants,
              encouraging cross-ministry expansion. Cross-border expansion (selling to neighboring allied
              nations that share threat intelligence) is a potential expansion vector in regions like
              the GCC, where the UAE, Saudi Arabia, and Bahrain participate in joint cyber programs.

              Concentration risk is the primary commercial vulnerability. With fewer than ten signed
              contracts and large individual contract values, the departure of even one major customer
              could represent 15-30% of total bookings. The concentration is compounded by geographic
              and political dependencies: contracts with governments in politically volatile regions are
              subject to geopolitical disruption, leadership changes, and shifts in bilateral relationships
              with Israel. The company has not disclosed any information about customer concentration,
              top-customer revenue share, or contract renewal terms.

              The sales cycle for new government customers is extremely long (12-24 months from engagement
              to signed contract), limiting the pace at which Dream can diversify its customer base. The
              pipeline of potential customers is global but shallow—there are only approximately 40-50
              national governments worldwide that have the budget, technical sophistication, and independence
              requirements to be realistic buyers of Dream's platform at its current stage and price point.
              This structural constraint makes customer concentration an enduring feature of the business
              model rather than a temporary early-stage issue.
