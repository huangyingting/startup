callouts:
  - calloutType: risk
    title: "Microsoft Bundling Is Dream's Biggest Competitive Threat"
    body: "Microsoft Security's inclusion in Azure Government and M365 GCC licensing means governments already in the Microsoft ecosystem receive enterprise-grade AI-augmented security at zero marginal cost. Dream must continuously demonstrate sovereign-grade advantages that justify a meaningful incremental investment above the Microsoft baseline."
    claimRefs: [CP031, CP007]

  - calloutType: strength
    title: "No Competitor Offers True Zero-Integration National AI Cyber"
    body: "Dream's zero-integration deployment is uniquely suited to the classified, air-gapped, and OT/ICS environments where its primary customers operate. Every other competitor requires either endpoint agents, network sensors, or cloud-based data pipelines — all of which are impractical or prohibited in Dream's primary target environments."
    claimRefs: [CP021, CP024, CP025]

  - calloutType: insight
    title: "Palantir Defines the High End; Dream Must Avoid That Competition"
    body: "Palantir's DoD trust, TITAN/MAVEN credentials, and AIP government platform represent the ceiling of government AI trust. Dream competes for a different buyer — national cyber agencies and critical infrastructure operators outside Five Eyes — where Palantir's US-centric trust is not transferable. Dream's opportunity is to become the Palantir of sovereign non-Five-Eyes cybersecurity."
    claimRefs: [CP017, CP034]

