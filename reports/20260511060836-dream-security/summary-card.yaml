summary:
  headline: >
    Dream Security has built a technically credible sovereign AI cybersecurity platform with exceptional ARR velocity,
    but the $1.1B valuation at fewer than ten signed government contracts—combined with unresolvable leadership legal
    risk and zero public financial disclosure—argues for a conditional 'track' rather than 'buy' until three sovereign
    references, external legal opinion, and audited financials are confirmed.
