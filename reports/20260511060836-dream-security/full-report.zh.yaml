  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概述
        blocks:
          - type: paragraph
            body: >
              Dream Security 身处竞争空白地带：没有任何主流厂商将主权政府优化的、零集成 AI 网络安全平台作为核心产品。 Dream
              面对的是碎片化的竞争格局，可划分为五类：（1）具备政府销售能力的企业级网络安全平台 （Microsoft Security、CrowdStrike、Palo Alto Networks、SentinelOne）；
              （2）正在向网络安全延伸的政府 AI 与数据分析平台（Palantir）； （3）服务政府客户的威胁情报厂商（Recorded Future，现已被 Mastercard 收购）； （4）AI
              行为检测专家（Darktrace，2024 年被 Thoma Bravo 私有化）； （5）深嵌政府基础设施的传统 SIEM 厂商（IBM Security / QRadar、Splunk）。


              从 Dream 的视角看，上述所有竞争类别的共同弱点在于：没有任何一家提供以主权政府为原生目标的平台， 同时具备零集成部署和专门基于国家级遥测训练的 CLM AI。Microsoft 政府网络安全方案本质上是加了
              FedRAMP 合规的企业工具； CrowdStrike 和 SentinelOne 需要在每个终端部署 Agent，而在众多涉密环境中这根本无法实施； Palantir
              提供的是数据分析与决策支持，而非主动网络防御。 Dream 将自身定位为唯一为国家主权而生的 AI 网络安全平台。


              预计 1 至 3 年内潜在新进入者包括：利用以色列 8200 部队校友网络的以色列初创公司（与 Dream 同源的创始人池）、 正在拓展政府业务的美国 AI 原生安全初创公司，以及 Recorded Future
              / Mastercard 将威胁情报延伸至主动防御的可能性。 NSO Group 相关生态圈也持续输出可能孵化竞争平台的人才。
