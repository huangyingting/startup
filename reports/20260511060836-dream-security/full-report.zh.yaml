            title: LLM 幻觉与对抗性训练数据构成新型运营风险
            body: >
              与基于规则的 SIEM 平台不同，基于 LLM 的态势引擎可能生成看似可信却有误的修复建议。了解部署遥测管道的攻击者可能尝试训练数据投毒。上述风险在 AI 安全文献中已有充分记录，但 Dream Security
              迄今未就对抗鲁棒性披露任何公开说明。
            calloutType: risk
