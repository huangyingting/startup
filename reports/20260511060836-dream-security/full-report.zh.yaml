      - number: '3.3'
        title: 对比分析：功能、定价与市场推广
        blocks:
          - type: paragraph
            body: >
              最核心的功能差异化是 Dream 的零集成部署。竞争对手几乎均需某种形式的接入：CrowdStrike、SentinelOne、 Darktrace 需安装 Agent；Palo Alto XSIAM 依赖深度
              API 集成；Microsoft Sentinel 依托 Azure 云基础设施。 而 Dream 的 CLM 平台无需在客户环境中安装任何软件或硬件即可部署。对拥有 OT/ICS 基础设施、
              气隙网络或涉密环境的政府而言，零集成消除了主要采购障碍。


              在 AI 架构层面，Dream 区分"AI 原生"（CLM 从零开始在网络遥测数据上训练）与"AI 增强" （传统 SIEM/XDR 附加 AI 助手）。Microsoft Security
              Copilot、CrowdStrike Charlotte AI 和 SentinelOne Purple AI 均是运行在传统规则或签名检测引擎之上的 AI 助手。 Dream 的 CLM
              通过语言模型推理直接处理原始遥测数据，公司认为这能减少误报并加快对新型攻击向量的检测速度。


              在定价与合同结构方面，Microsoft Security 实际上构成"负成本替代"（政府已为 Azure/M365 付费， 安全功能不产生额外费用），使付费替代方案在预算层面难以撼动。CrowdStrike 和
              SentinelOne 按终端数量计费， 大型政府合同通常为每年 500 万至 3000 万美元。Dream 的国家项目合同结构约为每个国家实体 300 万至 1500 万美元， 与 CrowdStrike /
              SentinelOne 面向中端政府的报价区间相近，但对无法部署 Agent 的机构而言具有价值竞争力。


              市场推广差异折射出业务形态的根本不同。Microsoft、CrowdStrike 和 Palo Alto 通过成熟渠道向 IT 采购团队和 CISO 销售。 Dream
              的市场推广以政府关系为核心驱动：Sebastian Kurz 的欧洲政府人脉、Shalev Hulio 的国防与情报关系， 以及与国家网络安全机构的高层直接对接。这意味着 Dream
              的销售周期更长，但客户黏性可能更高， 关系的不可替代性也远超渠道驱动的企业级交易。
