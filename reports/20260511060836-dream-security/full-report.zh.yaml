      - number: '7.6'
        title: 关键终止条件与尽调要求
        blocks:
          - type: paragraph
            body: >
              六项论点触发条件将实质性改变投资评估，应作为持续投资条件加以监测，而非仅在入场时评估一次。第一，Shalev Hulio 遭个人刑事起诉或定罪，将在 NATO
              盟国政府客户中产生采购排斥风险，并触发国防部对现有批准的出口许可证重审。第二，欧洲人权倡导组织（专注 NSO 议题）对 Dream Security
              出口授权提出成功法律挑战，可能触发国防部撤销现有许可证。第三，客户集中度导致不续签——任何占订单额超过 15% 的单一客户退出或不续约——需要对订单额进行重述，并可能引发压价融资压力。


              第四，若到 2026 年第四季度无法再签五份主权合同，说明销售管线无法脱离创始人关系独立扩张，有损 2 亿美元 ARR 目标。第五，CLM
              在生产政府部署中出现准确性失效——例如有据可查的攻击被漏报——将损害核心价值主张并触发竞争替换风险。第六，美国制裁、实体名单列示或财政部 OFAC 对 Dream Security 人员或 Tau Capital
              投资者的任何行动，将带来跨境银行业务并发症，以及 Bain Capital Ventures 美国有限合伙人被迫退出的潜在要求。


              优先尽调要求包括：美国和西班牙律师就 Hulio 个人责任敞口出具法律意见；奥地利律师就 Kurz 持续采购资格出具法律意见；完整合同清单（期限、ACV、阶段），附带至少 3 份主权参考电话承诺；CLM
              生产准确率指标（含假阳性率和假阴性率）；以及国防部出口许可证批准历史和下三个潜在交易的管线时间表。
