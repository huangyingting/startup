      - number: '4.4'
        title: 估值与可比公司分析
        blocks:
          - type: paragraph
            body: >
              Dream 融后估值 11 亿美元，对应约 1 亿美元 ARR 运行率，隐含 ARR 倍数约 11x。该倍数高于网络安全 SaaS 私有市场中位数（Windsor Drake 与 First Page Sage
              2025 年数据为 6–8x ARR），溢价源于 AI 原生架构与政府合同的高黏性；11x 同时低于顶级上市网络安全企业的典型区间（CrowdStrike、Palo Alto
              Networks、SentinelOne 对应 13–37x ARR），也远低于变革性并购交易的 18–32x 区间（Wiz、CyberArk 2024–2025 年交易）。


              相对私有市场中位数的溢价有多重支撑：国家政府合同客群流失率接近零（政府网络安全项目为多年承诺，切换成本极高）；AI 原生架构带来创新溢价；ARR 增速出色。相对上市公司水平的折扣，则反映了治理风险（Hulio 与
              Kurz 的法律敞口）、地理集中度（仅限中东和欧洲，被"五眼联盟"排斥），以及仅依赖两人销售团队的结构脆弱性。


              以 2 亿美元 ARR（公司声称的 2025 年底目标）和 10x 前瞻 ARR 倍数测算，Dream 隐含权益价值约 20 亿美元——较 B 轮融后估值上涨约 80%，完全符合 Bain Capital
              Ventures 在五至七年周期内的典型回报预期。若大型国防承包商或政府 IT 主承包商入场收购，战略溢价可能显著更高；以 2 亿美元 ARR、20x 倍数计算，隐含退出价值达 40 亿美元。
            claimRefs:
              - CI007
