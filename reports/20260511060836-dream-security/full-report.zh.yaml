      - number: '4.5'
        title: 财务尽调缺口与结论
        blocks:
          - type: paragraph
            body: >
              Dream 的财务披露受私人公司惯例与政府合同保密条款双重限制，信息极为有限。对尽调团队而言，最关键的缺口有五项：（1）无任何财年的审计财务报表，Globes 对 2024 年已确认收入 4000
              万美元的估算是唯一可用的独立基准；（2）毛利率未披露，AI 计算成本的拖累无从量化；（3）合同结构不透明，ACV、合同期限和定价均无法核实；（4）公司声称的 1.3 亿美元年销售额与独立估算的 4000
              万美元确认收入之间存在重大差异，需厘清 ARR 计算方法；（5）客户数存在出入——公司声称 30 家以上，Globes 报道实际签署合同不足十份——直接影响 ARR 质量和集中度风险的评估。


              收入质量是最关键的尽调障碍。若 Dream 的 1 亿美元 ARR 运行率是以多年签约合同的年化合同总价值（TCV）计算，而非当期经常性收入，则 B 轮时的实际当期 ARR 可能远低于账面数字——参照 4000
              万美元确认收入，估计区间或在 4000 万至 6000 万美元。尽调团队应要求提供：审计或已审阅财务报表、展示队列留存与扩张的 ARR 瀑布图、逐合同净留存率（NRR）数据，以及 ARR 指标定义说明。


              从前瞻角度看，若 ARR 增长真实且公司能达成 2 亿美元目标，Dream 的财务模型具备合理性。政府合同商业模式具备高单体
              ACV、低流失率和可预期多年现金流的特征，本应支撑溢价估值。真正令人担忧的是：两位创始人均面临法律诉讼，市场被全球政府网络安全预算的 40%–50%
              所排斥，既无审计财务报表，又存在收入质量缺口——在做出任何实质性承诺前，需要极为严格的尽调纪律。
