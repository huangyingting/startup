      - number: '3.2'
        title: 竞争对手画像与规模
        blocks:
          - type: paragraph
            body: >
              Microsoft Security 是全球最大的网络安全厂商，FY2024 安全专项年收入超过 200 亿美元—— 这一数字已超过其他所有厂商加总的 AI 网络安全总可用市场。Microsoft 将
              Defender XDR、Sentinel SIEM 和 Security Copilot（AI 助手）捆绑进现有的 Azure 和 Microsoft 365 政府许可协议。 对已采购 Azure 或 M365
              的预算有限政府而言，Microsoft Security 实际上是零成本的。 Security Copilot 于 2024 年 3 月商业发布，通过自然语言界面提供 AI 辅助分析师支持。 Microsoft
              持有 FedRAMP High 认证，与数十个国家政府签有合同。


              CrowdStrike FY2025（截至 2025 年 1 月）ARR 为 42.4 亿美元，同比增长 23%。Falcon 平台在终端检测与响应 领域领先，是 Gartner EPP
              魔力象限的领导者。2023 年，CrowdStrike 推出自然语言 AI 分析师界面 Charlotte AI。 公司设有专门的公共部门业务单元（CrowdStrike Government），持有
              FedRAMP High 授权。然而， CrowdStrike 基于 Agent 的架构要求在每个终端安装软件——在气隙网络、OT/SCADA 或涉密政府环境中这是无法逾越的 架构障碍，而 Dream
              的零集成部署在此具有明显优势。


              Darktrace 于 2024 年被 Thoma Bravo 以 53 亿美元估值私有化，在哲学层面最接近 Dream：一个学习正常行为模式、 无需基于签名规则即可检测异常的 AI
              行为检测平台。Darktrace 服务约 9000 家客户，主要是中大型企业， IPO 时 ARR 约为 5.77 亿美元。与 Dream 不同，Darktrace 需要网络传感器和 / 或终端
              Agent，运营层级在组织而非国家， 不提供主权 AI 部署。Darktrace Federal 服务部分美国政府机构，但不具备国家级网络平台的能力。


              Palantir Technologies（FY2024 总收入 28.7 亿美元，同比增长 29%）在政府信任度和 AI 能力方面最具参照价值， 但其本质是数据分析与 AI
              决策支持平台，而非主动网络防御平台。Palantir 美国政府业务部门 FY2024 增长 45% 至 11.1 亿美元，其 TITAN 和 MAVEN 合同代表着任何商业 AI
              公司在美国国防部获得的最深层信任。 然而，Palantir 在五眼联盟和以色列以外的渗透有限，在中东、东南亚和非北约欧洲的信任度不足—— 而这正是 Dream 的主要市场——双方鲜少在同一采购流程中竞争。


              Recorded Future 于 2024 年 9 月被 Mastercard 以 26.5 亿美元收购，收购时 ARR 超过 3 亿美元， 服务逾 45 个政府和情报机构。Recorded Future
              是威胁情报平台——汇聚开源和暗网情报并提供分析师信息流—— 而非主动网络防御或态势管理平台。Mastercard 的收购引发了外界对 Recorded Future 是否会将威胁情报延伸至
              主动防御，还是继续专注面向分析师产品的疑问。
