      - number: '8.5'
        title: 退出准备度与回报结构
        blocks:
          - type: paragraph
            body: |
              Dream Security 近期最可信的退出路径是被欧洲或以色列防务龙头并购。Thales（已收购 Darktrace）、
              Airbus Defence、Leonardo SpA、Elbit Systems 和 BAE Systems 均有主权 AI 能力缺口，且在欧洲采购
              关系上与 Kurz 的政府网络高度契合。走这条战略并购路线，可避开 Tau Capital 的 UAE 投资人背景触发的
              CFIUS 审查——若买方为美国企业，该问题必须披露并接受审查。

              IPO 就绪至少需要：至少两年的经审计财务报表、独立审计委员会、具备上市公司财报经验的 CFO、SOC 2 或
              同等级认证，以及能支撑公开市场客户集中度叙事的逾 20 家具名客户。目前公开信息显示，Dream 上述条件
              一项未达。最早于 2028 年 IPO 的可能，仅存在于 ARR 超 $200M 且法律风险得以化解的乐观情景中。

              优先股瀑布分配制造了复杂的激励结构。Bain Capital Ventures 持股约 9%，投入成本 $100M，仅要收回本金
              （不含管理费和超额收益分成），就需要估值超 $1.1B。以 $1.5B 退出，Bain 回报约 1.4 倍，低于其典型
              基金回报门槛。这会在董事会层面形成压力，推动 Bain 要么争取高估值 C 轮以实现跳跃式增长，要么推动
              溢价充足的并购退出。考虑跟投 Bain 的投资人应注意：Bain 的利益结构天然倾向战略并购结果。
            claimRefs:
