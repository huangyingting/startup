      - number: '2.5'
        title: 规模测算缺口与相互矛盾的估算
        blocks:
          - type: paragraph
            body: >
              AI 原生国家级网络安全市场的规模测算面临根本性数据缺口：没有任何独立分析师将政府专项 AI 网络安全单独列为 具有自下而上或原始数据支撑的独立市场类别。本报告可引用的所有估算，均来自更宽泛的 AI
              网络安全总可用市场 再以粗略比例切出垂直细分；或源于公司披露的管道数据，而后者本身存在报告偏差。


              现有数据中最显著的矛盾是 AI 网络安全总可用市场估算之间 2.5 倍的差距：MarketsandMarkets 预测 2026 年为 255.3 亿美元、2031 年增至 508.3 亿美元（CAGR
              14.8%），而 Grand View Research 等来源将同一市场 2030—2031 年的规模预计在 930 至 1340 亿美元之间。差异来源包括：（a）是否纳入含 AI 功能的传统 SIEM 等
              AI 周边工具； （b）是否涵盖所有地区还是仅限企业可触及市场；（c）分析师调查与厂商收入汇总在方法论上的差异。


              Dream Security 自身披露的指标之间也存在矛盾。公司报告与逾 30 个国家实体签订"年度销售额"1.3 亿美元。 据 Globes 调查性报道，2024 年实际确认收入约为 4000 万美元，1.3
              亿美元代表合同承诺 / 积压。 这一区分对可服务市场验证至关重要：若 30 余个国家实体产生 1.3 亿美元承诺，则平均合同为 430 万美元——
              符合政府网络合同中端水平，但也说明每位客户的可服务市场规模并不算大。同一 Globes 报道指出， B 轮时实际签约客户不足 10 家，其余均属管道。


              GlobalNewsWire 1340 亿美元预测的域名已被停放、多个分析师新闻稿出现 404 错误， 加之政府网络安全预算数据存档有限，共同导致本章节可用一手分析师来源少于理想数量。 尽职调查应要求 Dream
              提供内部市场规模测算模型和客户管道明细，以核实可服务市场和可获取市场假设。
            claimRefs:
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
