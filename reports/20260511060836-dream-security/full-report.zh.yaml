      - number: '7.2'
        title: 监管与法律敞口
        blocks:
          - type: paragraph
            body: >
              Dream Security 最严峻的风险直接来自其领导层。CEO Shalev Hulio 联合创立并领导了 NSO Group——这家以色列监控技术公司的 Pegasus
              间谍软件被指被主权客户用于监控记者、人权活动人士和外国领导人——任期从 2010 年持续至 2021 年。NSO Group 于 2021 年 11
              月被美国工业和安全局（BIS）列入实体名单，成为首家获此待遇的以色列科技公司。Hulio 本人未被美国诉讼起诉，但西班牙当局已就 Pegasus 监控加泰罗尼亚独立活动人士一事启动刑事调查，Hulio 作为
              NSO Group CEO 已在多起欧洲司法调查中被列为相关人员。国际特赦组织法证安全实验室记录了 Pegasus 在 50 个国家对 5 万余名目标的监控。


              总裁 Sebastian Kurz 带来另一项更为直接的法律风险。奥地利法院于 2024 年底以在"伊比沙事件"调查中向议会委员会撒谎为由判定 Kurz 有罪，获判缓刑，目前不限制出行，但 Kurz
              仍在接受关于其任首相期间涉嫌以金钱换取有利媒体报道的腐败调查。若更严重指控坐实，Kurz 可能被取消参与欧洲受监管政府采购流程的资格，直接损害依托其政治人脉的欧洲销售管线。


              NSO Group 在 2023 年申请破产后被美国私募股权公司收购，从法律层面切断了与 Hulio 的任何残余公司关联。但声誉转移不受公司法约束。西方民主国家政府采购官员的调查将 NSO
              关联高管背景列为安全工具采购的否决性因素。除个人领导层风险外，Dream Security
              的所有国际销售均需获得以色列国防部的出口许可证批准。国防部许可可能因外交压力而附带条件、被延迟或撤销——赋予以色列政府对客户关系的隐性否决权。欧盟《AI 法案》（2024 年 8 月生效）将用于国家安全监控的
              AI 系统列为高风险，要求进行合规评估、文档化和人工监督，Dream 迄今未公开确认已达到上述要求。
