      - number: '2.4'
        title: 增长驱动因素与采购障碍
        blocks:
          - type: paragraph
            body: >
              Dream Security 市场增长的首要驱动力是针对政府和关键基础设施的国家级网络攻击日益频繁、手法日趋精密。 ENISA《2024 年威胁态势报告》记录了影响关键基础设施的重大网络事件同比增加 30%。
              CrowdStrike《2025 年全球威胁报告》发现，攻击者突破时间从 2023 年的平均 62 分钟压缩至 29 分钟—— 人工响应速度已不够用，AI 自动化防御势在必行。 Microsoft《2024
              年数字防御报告》记录了国家支持的威胁行为者针对政府和关键基础设施的攻击持续增加。


              监管驱动同样不可忽视。2024 年 10 月正式生效的欧盟 NIS2 指令，要求 18 个关键基础设施行业实施强化网络安全措施， 并强制要求超过风险阈值的实体部署 AI 辅助监控。美国
              CIRCIA（关键基础设施网络事件报告法）要求关键基础设施运营商 在 72 小时内报告重大网络事件，推动了对实时监控的需求。这些监管要求实际上扩大了 Dream 的可服务市场。


              北约的网络安全投资承诺——各成员国现被鼓励将国防开支的 25% 用于包含网络安全在内的现代化建设—— 是结构性的支出顺风。NIST《网络安全框架 2.0 版》于 2024 年发布，明确将 AI
              检测纳入推荐控制项， 为 AI 原生方案的政府采购提供了依据。


              主要采购障碍包括：（1）政府采购周期从初次接触到合同落地通常需要 18 至 36 个月； （2）数据主权限制禁止政府遥测数据在境外控制的云基础设施上处理； （3）保密分级要求使集成测试复杂化；
              （4）Microsoft（Defender XDR、Sentinel）、Palantir 和 Recorded Future 等既有关系的存在； （5）NSO Group 对 Dream
              领导层的声誉阴影——限制了进入五眼联盟市场、与美国情报关系最密切的欧盟成员国， 以及联合国监管采购的通道。


              Verizon《2024 年数据泄露调查报告》发现 14% 的数据泄露涉及国家级行为者，为有史以来最高占比。 Sophos《勒索软件现状报告》显示，关键基础设施遭受勒索攻击的频率是商业企业的 1.8 倍，
              凸显了该领域的特殊威胁烈度。
