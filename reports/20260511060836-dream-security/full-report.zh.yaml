              Dream 1.3 亿美元以上年订单额与 Globes 估算的 4000 万美元 2024 年确认收入之间的差距，加上客户数的争议，意味着公司 11 亿美元估值建立在一套从未经独立审计账目验证的财务叙事之上。若
