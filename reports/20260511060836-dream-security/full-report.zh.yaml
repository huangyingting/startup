      - number: '6.3'
        title: 具名客户证明与验证质量
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Dream Security 未公开披露任何客户部署名称。公司援引国家安全保密要求无法进行公开归因，这是主权政府网络安全领域企业常见且合理的制约——同类企业如
              Palantir、Cellebrite 和 NSO Group 在类似增长阶段同样拒绝披露政府客户名称。然而，这也构成重大尽调局限：没有具名组织的第三方部署案例研究、成果报告或客户证言可供参考。


              现有最强客户证明来自投资方证词。领投 1 亿美元 B 轮的 Bain Capital Ventures 在其投资论述材料中提到"赢得了负责国家网络防御的全球政府实体的信任"。投资方 7GC.co
              表示"政府客户借助 Dream 技术发现了此前未检测到的风险"，表明平台已在生产环境中产生实质成果。Dream 于 2025 年 12 月发布的 F5 BIG-IP
              漏洞事件分析展示了平台在真实安全事件中的响应能力——但尚未确认这是实际客户环境还是公司演示环境。


              G2 上 Dream Security 的评测页面似乎存在，但研究期间因反爬虫机制无法访问，未见任何评价。Capterra 上无 Dream Security
              的相关页面。商业评测平台缺席，与平台专为保密政府环境服务、员工无法公开讨论所用工具的定位相符。尽调层面，具名客户参考案例的缺失要求在保密协议框架下直接向 Dream Security 申请参考通话名单。
