            body: >
              Dream Security 未发布任何留存指标、净留存率（NRR）、总留存率（GRR）或基于队列的使用数据。这既符合其发展阶段的预期（运营 27 个月，签约客户约 10
              家或更少），也是国家政府技术厂商保密合同细节的结构性惯例。


              从结构上看，政府网络安全平台合同天然具备高耐久性。国家安全平台通常采用多年框架协议（通常 3–7 年）加年度部署费的结构，提供良好的收入可见性。切换成本极高：替换一套已与国家 AI 训练工厂和 SOC
              运营深度集成的国家级网络平台，需要承受大规模组织变动、人员再培训、数据迁移和重新采购。Dream 的国家 AI 训练工厂通过积累无法迁移至竞争平台的组织专属模型改进，进一步放大了切换成本。


              另一面，在某些司法管辖区，政府采购合同可在较短通知期内以便利终止，地缘政治变化也可能骤然改变安全合作关系。若 Dream 客户所在国政府因政治因素调整国家安全立场或厂商关系——正如 Shalev Hulio 执掌
              NSO Group 期间多个客户的遭遇——该客户可能迅速退出。技术的以色列来源也可能遭遇部分政府的抵触，NSO Group Pegasus 软件此前引发的争议即为先例。截至 2026 年 5
              月，未发现任何客户投诉、部署失败或公开合同终止案例。
