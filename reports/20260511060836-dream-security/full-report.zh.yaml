      - number: '8.6'
        title: 最终尽调要求与论点失效触发条件
        blocks:
          - type: paragraph
            body: |
              投资决策前需完成六项最终尽调。一，在 NDA 保护下审阅已签合同文件，核实所有合同的数量、年度合同价值
              （ACV）、期限和交付阶段。二，委托西班牙及欧盟律师就 Shalev Hulio 在未决诉讼中的个人责任出具外部法律
              意见——这是单项风险敞口最高的项目，不可豁免。三，委托第三方对 CLM 性能进行评估并提供生产环境准确率
              指标——缺少这份评估，核心技术价值主张无法核实。四，获取未经审计的 2026 年一季度财报和经审计的 2025
              年全年财报，核实收入确认方法和消耗速率。五，在 NDA 保护下与两位已部署主权客户的 CISO 进行背调通话。
              六，要求 Tau Capital 出具披露函，说明其 LP 构成及任何客户关系，以评估 CFIUS 风险。

              需确立五项论点失效触发条件作为持续持仓的前提。Hulio 一旦遭个人刑事起诉，立即全面暂停。客户合同预订额
              年降幅超 15%，触发估值模型修订。FY2025 经审计后已确认收入低于 $60M（相对于 ARR $100M 的口径），触发
              卖出建议评估。任何主权客户公开宣布以竞争平台替换 Dream，触发全面重审投资逻辑。任何涉及 Dream Security、
              Tau Capital 或高管的美国监管行动，触发法律审查并可能强制启动老股退出。

              综合建议为：以 $1.1B 估值维持"观察"评级，附加条件。若能以更低估值入场——通过二级市场或平价 C 轮——
              期望回报的改善幅度足以支持在约 $700—800M 时"买入"。以 $1.1B 估值计，风险调整后期望值未能越过 2 倍
              门槛，而公司的结构性治理和客户集中风险已在本报告中全面记录。
