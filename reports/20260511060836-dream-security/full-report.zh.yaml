      - number: '6.5'
        title: 扩张动态与集中度风险
        blocks:
          - type: paragraph
            body: >
              Dream Security 的扩张模式依托主权账户内的"落地扩张"：政府通常从试点或有限国家级部署起步，再逐步扩大覆盖至更多部委、行业或跨境机构共享安排。国家 AI
              训练工厂构建了天然的扩张激励——纳入的行业数据越多，国家级模型对所有参与方的价值越高，推动跨部委扩展。在 GCC
              地区，阿联酋、沙特阿拉伯和巴林参与联合网络项目，跨境扩张（向共享威胁情报的邻国出售）是潜在的扩张路径。


              集中度风险是主要商业脆弱点。签约合同不足十份、单一合同价值巨大，任何一个主要客户流失都可能导致 15%–30%
              的订单额缩水。集中度因地理和政治依赖而加剧：与政治敏感地区政府签署的合同易受地缘政治冲击、领导层更迭以及以色列双边关系变化的影响。公司未披露任何客户集中度信息、最大客户收入占比或合同续签条款。


              新政府客户的销售周期极长（从接触到签约通常需要 12–24 个月），限制了 Dream 分散客户基础的速度。潜在客户的全球池子虽大，实则浅薄——全球只有约 40–50
              个国家政府具备预算规模、技术储备和自主要求，是 Dream 在当前阶段和价位的真实买家。这一结构性制约使客户集中度成为商业模式的永久性特征，而非暂时性早期问题。
            claimRefs:
