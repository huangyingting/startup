  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Dream Security 的投资逻辑建立在三大汇聚支柱之上。其一，国家主权 AI 网络安全的总可用市场庞大且持续加速：全球政府每年网络防御支出超过 900 亿美元，AI
              正在逐层替代传统基于规则的工具。Dream 的 CLM 解决了现有企业 SaaS 厂商在没有 Dream 专为主权架构设计的情况下无法真正满足的政府需求——国家态势感知、跨行业威胁关联、主权数据驻留。


              其二，CLM 的技术架构形成了真实的切换成本。国家政府一旦部署 Dream 的本地主权技术栈、接入国家遥测数据源并以本国数据训练国家 AI
              训练工厂，便愈发难以被替代；切换成本涵盖本地硬件退役、人员再培训以及多年主权威胁数据的迁移。平台一旦嵌入，便形成长周期收入年金。其三，ARR 增速——从零出发，不到 30 个月内冲向 1
              亿美元目标——在同等阶段的可比企业安全公司中堪称出色。


              反向逻辑同样具体。11 亿美元估值对应 4000 万美元确认收入，隐含 28x 倍数，要求完美执行一套迄今尚未脱离创始人关系扩展的销售模式。CEO Shalev Hulio 因 NSO Group
              历史背景承担法律敞口，在西班牙面临刑事调查；总裁 Sebastian Kurz
              背负奥地利刑事定罪。两项风险均具结构性，而非短暂性。不足十家主权政府客户的商业集中度，使任何单一合同不续签都成为订单额层面的生死攸关事件。订单额与确认收入之间的差距引发收入确认方法疑问。证据质量在这一估值层级被评定为"低"：无审计财务报表、无公开客户参考、无第三方基准。建议结论为"观察"而非"买入"，原因是证据质量缺口过大，无法支撑隐含价格。
