      - number: '1.3'
        title: 融资历史、里程碑与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Dream Security 在成立后两年内实现了非凡的增长速度。从 2023 年 1 月创立至 2025 年 2 月 B 轮融资宣布，
              公司获客和创收的速度几乎超越以往任何一家以色列网络安全公司，年度销售合同已超 1.3 亿美元。 这一节奏在政府 / 国家安全领域实属罕见——该领域采购周期通常长达 12 至 24 个月。


              公司融资历史折射出投资人信心的持续攀升。种子 / 天使轮过后，2023 年 11 月由 Aleph 和 Group 11 联合领投 3500 万美元 A 轮——两者均是以色列最知名的风险投资机构。A
              轮尤为值得关注：签约正值以色列与哈马斯冲突期间， Hulio 在加沙边境以色列国防军预备役服役时签署了条款清单。2025 年 2 月，Bain Capital Ventures 以 11 亿美元估值 领投 1
              亿美元 B 轮，Dream 正式跻身独角兽行列，成为 2025 年以色列首家 AI 网络安全独角兽。


              Globes 报道指出：Dream 口中的"年度销售额"1.3 亿美元很可能代表合同积压 / 承诺，而非已确认收入； 2024 年实际收入约为 4000 万美元，B 轮时 ARR 运行率约为 1 亿美元年化，预计
              2025 年底翻倍至 2 亿美元。 参照 PitchBook 数据，B 轮前估值约为 5400 万美元，意味着约 18 个月内估值上涨近 20 倍。


              关键里程碑包括：加沙冲突期间向以色列一家医院免费提供平台支持，验证了运营就绪度和防御用途； 2025 年 12 月发布 F5 BIG-IP 供应链漏洞分析，展现研究能力；延揽 Enrique Salem 和
              Shlomo Yanai 入董事会， 持续推动治理专业化。不利事件方面：2025 年 3 月西班牙法院对 NSO Group 高管作出裁定，以及 2025 年 4 月 Skyline International
              发布人权报告。
