      - number: '7.5'
        title: 财务与执行风险
        blocks:
          - type: paragraph
            body: >
              Dream Security 的财务风险状况由订单额（1.3 亿美元以上）与估算确认收入（4000 万美元）之间的差距所定义，意味着多年政府合同带来大量递延收入。递延收入在企业 SaaS
              中属正常现象，但对一家截至 2026 年 5 月仅运营 27
              个月的公司而言，这引发了对收入确认方法、合同交付里程碑以及已预订尚未赚取收入时间节点的疑问。若约定工作无法按期完成，收入确认可能被延迟或冲回。Globes 报道签约客户不足十家，与公司声称的 30
              家以上合同参与情况存在出入，进一步引发"订单额"是否涵盖未执行意向书的疑问。


              烧钱速度未披露。累计融资 1.35 亿美元，ARR 目标声称 1 亿美元，公司在订单额口径上接近盈利——但约 4000 万美元的确认收入对应可能超过 300 名员工的运营成本，意味着持续现金消耗和 C
              轮融资压力。C 轮时间表在很大程度上取决于 2026
              年确认收入能否追上订单额增速。执行风险因销售团队深度不足而加剧——创始人以下层级未见公开披露；一家整个企业管线依赖两位面临法律敞口的个人推动的公司，在市场推广层面存在结构性脆弱。目前无公开证据表明存在能够跳脱
              Hulio 和 Kurz 进行规模化的专业企业销售体系。
