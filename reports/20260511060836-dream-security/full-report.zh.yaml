      - number: '8.2'
        title: 估值背景与入场纪律
        blocks:
          - type: paragraph
            body: |
              Dream Security 的 B 轮融资后估值为 $1.1B，由 Bain Capital Ventures 于 2025 年 2 月以 $100M 领投锁定。
              彼时隐含收入倍数约为：以 Globes 报道的已确认收入（$40M）计，约 28 倍；以合同预订额（$130M）计，约
              8.5 倍。两项指标均处于 2025 年政府安全类公司私募市场基准的高位——尽管市场倍数自 2021—2022 年峰值
              已大幅收缩，Dream 当前估值体现的是泡沫后定价，而非周期顶点的狂热。

              任何以 B 轮估值入场的投资人，都必须厘清优先股堆叠结构。公司累计融资 $135M，A 轮、B 轮及种子轮合计
              清算优先权约达 $140M。普通股持有人（含员工期权池）须待退出估值超过约 $1.4B 才能实质受益。若以 $1.1B
              平价退出，B 轮投资人在清算瀑布分配后约每美元回收 $0.85。实现 2 倍回报，要求 C 轮稀释前退出估值达约
              $2.2B——乐观情景下可期，基准情景下难达。

              若已确认收入未能追上合同预订增速，C 轮融资大概率在 2026—2027 年触发，届时将再叠加 20—25% 的稀释层。
              以 $1.5B 估值完成 C 轮，B 轮持股比例将从约 9% 压缩至约 7%，回报空间进一步收窄。入场纪律要求：以
              B 轮估值做出的任何承诺，都应争取 C 轮跟投权、董事席位或观察员席位，以及包含季度未经审计财务报表的
              知情权条款。
