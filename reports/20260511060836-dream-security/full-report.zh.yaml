      - number: '6.2'
        title: 采纳轨迹与部署证据
        blocks:
          - type: paragraph
            body: >
              量化评估 Dream Security 客户采纳情况的证据受到国家安全项目有意保密的限制。公司 2025 年 2 月 B
              轮新闻稿宣布与"多个主权国家和关键基础设施提供商"签署合同，在不点名客户的情况下柔性确认了生产部署。早期投资方 7GC.co 提供了目前可获取的最清晰第三方客户验证："政府客户借助 Dream
              的技术发现了此前未检测到的风险，并将该平台作为关键基础设施保护的新标准。"


              Dream CEO 披露的 1.3 亿美元以上年销售订单额代表已签多年合同的总合同价值，而非单一年度收入数字。以色列商业媒体 Globes 援引独立信源报道，截至 2025
              年初实际签署合同数量不足十份——远低于公司材料和投资路演中援引的"30
              家以上"。这一出入可能反映了政府采购周期中意向书、框架协议与完全执行的约束性合同之间的差异。政府采购周期以周期长著称，国家安全平台采购从初步接触到签署合同通常需要 12 至 24 个月。


              2024 年大约 4000 万美元的年度确认收入估算（Globes 估算）与 1.3 亿美元以上的订单额之间，意味着大量收入积压，表明 Dream 仍处于已签合同的早期部署和收入确认阶段。国家 AI 训练工厂于
              2025 年 12 月投入运营，需要多个主权部署参与方才能产生有实质意义的国家级模型提升——说明平台价值仍处于成长阶段。
