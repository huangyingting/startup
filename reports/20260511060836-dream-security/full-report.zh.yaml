      - number: '4.2'
        title: 资本结构、融资轮次与现金储备
        blocks:
          - type: paragraph
            body: >
              Dream Security 已累计完成三轮融资，总额约 1.35 亿美元。公司于 2023 年完成金额未披露的种子轮， 随后在 2023 年 11 月完成由 Aleph 和 Group 11 联合领投的
              3500 万美元 A 轮，7GC 和 Tau Capital 参投。 值得一提的是，Shalev Hulio 在以色列与哈马斯冲突期间于加沙边境以色列国防军预备役服役时签署了 A 轮条款清单，
              展现了创始人的坚韧。


              1 亿美元 B 轮于 2025 年 2 月 17 日宣布，由 Bain Capital Ventures 领投，投后估值 11 亿美元。 现有投资方 Group 11、Aleph、Tru Arrow 和 Tau
              Capital 均跟投。该轮融资获 Bloomberg、Globes、 SecurityWeek 和 BusinessWire 多方独立来源确认。Bain Capital Ventures
              的投资备忘录表示，此次投资源于 Dream 在 AI 原生防御与主权政府采购交汇点上独特的市场定位——Bain 认为该市场被现有企业导向厂商严重服务不足。


              B 轮后的资金充裕性分析因缺乏公开财务披露而难以精确评估。以 Dream B 轮时约 150 人的员工规模（计划扩至 300 人）、 特拉维夫、维也纳、阿布扎比三地运营成本，以及 CLM 训练与推理所需的大量
              AI 算力， 估算月度烧钱速度在 500 万至 1000 万美元之间。按此烧钱速度，1 亿美元 B 轮资金可支撑自 2025 年 2 月起 8 至 18 个月的现金跑道，最低端约延伸至 2026 年中。若公司达成
              ARR 增长目标，现金跑道将大幅延长， 因为每增加 1000 万美元 ARR 均可转化为额外现金流入、降低净烧钱速度。目前未披露任何债务融资或风险贷款。 Dream 下一轮资本事件——无论是 C 轮还是
              IPO——最可能在 ARR 达到或超过 2 亿美元目标、 且地理覆盖从中东和欧洲市场进一步多元化之后触发。
