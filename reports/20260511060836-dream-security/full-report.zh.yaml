      - number: '2.3'
        title: 买家与细分市场分析
        blocks:
          - type: paragraph
            body: >
              Dream Security 的主要买家是主权国家政府及其指定网络安全机构：国家 CERT、国家网络安全局、国防部，
              以及承担民用网络安全职责的情报机构。该细分市场的买家通常集中在以下类型的国家：（a）已具备成熟网络安全体系； （b）地缘政治风险足以证明主权 AI 能力投资的必要性；（c）预算充足，GDP 通常超过 500
              亿美元且国防开支占 GDP 1.5% 以上。


              次要细分市场是关键基础设施运营商——被国家政府认定为关键基础设施的实体，包括电力公司、水务机构、 核能机构、港口运营商和油气精炼厂。这类买家通常通过国家网络安全项目框架采购，而非独立采购，
              国家政府实际上扮演着渠道角色。


              第三类细分市场是希望将 AI 原生威胁分析作为自身能力补充的国防与情报机构。这类买家安全分类要求最高， 但付费意愿也最强、合同稳定性最好。Dream 的 CLM 零集成部署模式，专为软件安装受限环境而设计。


              在 Dream 主要细分市场中，预算归属通常在部委或国家机构层面，而非运营商层面。这催生了多年期合同结构 （3 至 7 年的国家网络项目）、较高的续约率和较高的切换成本——均利于 Dream 的商业模式。 基于
              Dream 与逾 30 个客户签订的 1.3 亿美元预订合同，每个国家实体的平均合同价值估计在 300 万至 1500 万美元之间。


              PwC《全球数字信任洞察》调查显示，60% 的商业与技术领导者将网络风险列为战略前三大优先事项。 对政府买家而言，这一比例可能更高，因为直接涉及国家安全。IBM《2024
              年数据泄露成本报告》显示全球平均泄露成本为 440 万美元，而对关键国家基础设施而言，等效损失则高出数个数量级。
