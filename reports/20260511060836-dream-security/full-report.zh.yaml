      - number: '6.6'
        title: 专项展示
        blocks:
          - type: callout
            title: 实际签约合同数量远低于对外宣称的客户数
            body: >
              Dream Security 宣称"30 家以上客户"与 Globes 独立报道的 2025
              年初不足十份签约合同相互矛盾。对于评估客户牵引力的投资者而言，意向书、框架协议与具约束力的签约合同之间的区分至关重要。没有"客户"的精确定义，所引用的数字作为牵引力指标不具可靠性。
            calloutType: risk
            claimRefs:
              - CU001
              - CU002
          - type: callout
            title: 客户信息完全不透明构成尽调障碍
            body: >
              具名客户参考案例、案例研究或第三方部署确认的完全缺失，使标准商业尽调在管理层主导的保密协议参考流程之外无从开展。这在国家安全领域是合理制约，但同样是风险因素：任何客户侧问题（不满、部署失败、政治阻断）在影响到报告订单额之前都对外部观察者不可见。
            calloutType: risk
            claimRefs:
              - CU007
              - CU024
          - type: callout
            title: 地缘政治集中度风险具有结构性与持久性
            body: >
              一家在政治敏感地区（中东、东欧）拥有不足十家政府客户的公司，面临生死攸关的客户集中度风险。Dream Security
              的以色列背景，加上创始人饱受争议的履历，可能限制欧洲和部分中东买家的采购意愿，收窄多元化空间。
