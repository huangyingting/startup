      - number: '5.3'
        title: 部署模型与零集成架构
        blocks:
          - type: paragraph
            body: >
              Dream Security 的核心技术与商业差异化之一，是其"零集成"部署理念。平台部署轻量级无代理发现探针，通过被动网络扫描采集遥测数据，无需在终端安装软件、提供厂商 API 凭证、部署日志转发
              sidecar 代理或定制 SIEM 连接器。Dream 认为这一架构消除了传统 SIEM 和 XDR 部署在初始接入阶段经常卡住、或长期处于未充分利用状态的首要摩擦来源。


              所有采集的遥测数据流入 Dream Computing Services（DCS）这一中央编排枢纽，Dream
              称其可完整部署于本地、私有云或完全气隙的国家环境。主权部署模型在架构上确保客户或国家数据绝不越出定义的网络边界——这对政府部委、国家情报机构以及依法或在操作层面无法使用公有云安全分析的关键基础设施运营商而言是硬性要求。Dream
              明确面向该主权模型下的 NATO 成员国、海湾合作委员会（GCC）国家和欧盟关键基础设施，其在维也纳和阿布扎比的办公室落地即为佐证。


              Dream 平台支持 IT、OT 和 ICS 混合环境，这在架构层面意义重大——许多工业网络对主动扫描或代理安装有严格限制。公司声称通过被动流量监控兼容气隙运营技术网络。关键基础设施依赖包括 NVIDIA NIM
              微服务（推理计算）、本地或私有云 GPU 硬件（模型服务）以及 LLaMA 和 Qwen 基础模型的开源权重。截至 2026 年 5 月，零集成声明尚未通过公开引用的客户部署得到独立验证，构成重大尽调缺口。
