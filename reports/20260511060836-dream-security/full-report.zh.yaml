              Palantir 的美国国防部信任、TITAN/MAVEN 资质和 AIP 政府平台代表着政府 AI 信任的天花板。 Dream
              面向不同的买家——五眼联盟以外的国家网络安全机构和关键基础设施运营商——Palantir 以美国为中心的信任在此并不可迁移。 Dream 的目标是成为非五眼主权国家的"Palantir"。
