      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Dream Security 的核心运营风险集中在生产环境中 CLM
              的准确性与可靠性，以及基础设施依赖。基于大语言模型的系统输出概率性结果而非确定性的基于规则的告警，在威胁检测中固有假阳性和假阴性风险。Dream 未披露任何 CLM
              的第三方基准测试结果、假阳性率或准确率指标。在国家安全场景中，高假阳性率会将 SOC 分析师淹没在噪音中，而假阴性则可能放过真实攻击——带来的责任远超典型企业 SaaS 的问责边界。


              平台的主权本地部署模型带来运营碎片化风险。不同主权客户可能以不同更新节奏运行不同版本的 CLM，造成版本蔓延。安全补丁和模型更新须通过严格的政府变更管理流程编排，关键漏洞修复可能因此延迟数周乃至数月。Dream
              未披露其在政府环境中的标准补丁部署时间表或服务水平协议（SLA）。


              Dream 的推理基础设施高度依赖 NVIDIA NIM 微服务和 NVIDIA GPU 硬件。NVIDIA H100 和 H200 GPU 仍受美国 BIS
              出口管制，向特定司法管辖区的客户部署需要额外的美国出口授权。Meta LLaMA 系列模型——关键基础模型组件——的商业许可条款限制了特定高规模使用场景。若 Meta
              收紧许可制度，可能迫使公司付出较高成本迁移基础模型。聚合各主权部署匿名化遥测数据的国家 AI
              训练工厂存在一个数据主权悖论：为国家主权付费的客户可能对跨国模型改进感到不适，即便数据已匿名化。目前无公开披露正面回应这一张力。Dream 也未披露任何正式漏洞赏金计划、CVE
              披露程序或针对其平台基础设施的安全运营中心。
