      - number: '4.3'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >
              Dream 的单位经济模型几乎完全依赖推算，因为公司为私营企业，且未举办投资者日活动。 最具说服力的估算来自可比政府专注型 AI 软件公司，以及 Dream 商业模式的结构性特征。


              收入端，每个实体的年合同价值估算为 300 万至 1500 万美元，基于将已知 ARR 运行率除以估算的活跃签约客户数 （10 至 30 个实体）得出。合同期限估算为 3 至 7
              年，与政府采购规范及国家基础设施项目的多年期性质一致。 收入结构估算为：约 65% 来自平台授权（CLM 部署）、25% 来自托管 SOC 服务、10% 来自专业服务和实施—— 但该拆分完全基于行业基准推断。


              成本端，Dream 的架构对毛利率具有积极影响。零集成部署模式——无需硬件出货、无需现场 Agent、无需安装网络传感器—— 消除了 Darktrace 和 CrowdStrike
              等竞争对手的传统硬件和部署服务成本。毛利率估算为 60% 至 75%， 反映了以软件为主的销售成本结构，但受 CLM 大规模训练和运行所需大量 AI 算力的拖累。 相较传统 SaaS 公司，AI
              基础设施成本是结构性负担。


              获客成本在定性层面极高，原因在于以 CEO 为核心的外交式销售模式。Shalev Hulio 和 Sebastian Kurz 是 Dream
              进入政府采购的核心销售渠道，依赖与国家元首、情报总监和国家网络安全机构的个人关系。该模式带来极高的平均合同价值， 但相应地，每个账户的实际获客成本（CAC）也极高——基于政府采购规范，销售周期估算为 12 至
              24 个月。 以 ACV 中位值 800 万美元、每大型国家客户粗略获客成本 1500 万至 2000 万美元（高管时间 + 18 个月周期的商务拓展成本） 估算，回本周期为 2 至 4 年。员工人均收入约为
              27 万美元（以确认收入 4000 万美元 ÷ 150 名员工计算）， 现阶段偏低，但对政府 SaaS 规模前期建设期而言属正常范围。
