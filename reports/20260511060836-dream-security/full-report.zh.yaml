  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: CLM 架构与核心 AI 引擎
        blocks:
          - type: paragraph
            body: >
              Dream Security 的网络语言模型（CLM）是平台智能的底层基础。与依赖固定特征集统计异常检测的传统网络安全机器学习方案不同，CLM
              是一系列专为网络安全遥测数据训练的大语言模型，训练语料涵盖网络日志、设备配置、防火墙规则、代码文件和结构化威胁告警。这一领域专属训练语料使 CLM
              能够进行上下文推理——理解安全事件的意图与级联影响，而非仅仅标记偏离基线的统计异常。


              生产环境中，Dream 借助 NVIDIA NIM 微服务部署 CLM，在主权网络边界内实现高性能推理，无需调用外部 API。系统采用级联架构，将专有 CLM 层与开源基础模型结合，包括 Meta LLaMA
              3.3、LLaMA 4 和 Alibaba Qwen
              72B，按处理层级和任务复杂度编排。LoRA（低秩适配）适配器进一步针对每个客户组织的独特环境进行专项微调，使共享的国家级模型无需每次部署都完整微调，便能高效定制。


              一个显著的设计特色是"良性循环"：每次部署的本地化学习信号经匿名化聚合后注入国家 AI 训练工厂，持续提升共享国家级模型，再将改进反哺至所有组织部署。Dream 还集成了 NVIDIA NeMo
              框架，提升高级训练流水线能力。CLM 的创建者将其定位为持续演进的自适应资产，而非静态模型——尽管参数量、训练数据规模和再训练节奏均未对外披露。Dream
              还提及一个配套的"黑客复制模型"，用于模拟攻击者思维，但公开材料中未披露技术细节。
