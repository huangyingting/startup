      - number: '8.3'
        title: 情景分析：乐观、基准与悲观
        blocks:
          - type: paragraph
            body: |
              三个情景用于框定投资结果的边界。乐观情景（概率 20%）假设 Dream 在 2026 年底前签下 15 份以上主权客户
              合同、ARR 超过 $200M，Hulio 法律风险经外部法律顾问化解而不影响经营，公司于 2028 年以 15 倍 ARR 估值
              推进 IPO，路径与 Palantir 上市前轨迹吻合。该情景对应估值超 $3.0B，B 轮入场约 2.7 倍回报——对 VC 而言
              尚可接受，但低于承接高法律风险公司所要求的 3—5 倍基准。核心风险在于 Hulio 一旦被正式起诉，此情景将
              迅速崩塌，几乎没有预警时间。

              基准情景（概率 50%）假设 2026 年底 ARR 达 $130—150M（签约 10—12 份），法律风险可控、不升级，公司于
              2027—2028 年以 10—12 倍 ARR 被欧洲或以色列防务龙头（Thales、Elbit、BAE）并购退出。对应估值
              $1.4—1.7B，回报约 1.3—1.5 倍——不足以满足多数 VC 风险收益要求，但对 IRR 门槛较低的成长股投资人
              或可接受。主要风险来自客户集中度和战略买家的估值约束。

              悲观情景（概率 30%）假设合同增长停滞、ARR 低于 $80M，Hulio 或 Kurz 法律程序升级，公司于 2026—2027
              年以 $900M—1.1B 估值完成平价或低价 C 轮，B 轮股东被稀释 30%。该情景回报约 0.5—0.6 倍；若两大核心
              风险——法律敞口与客户集中——同时发酵，这一结果最有可能出现。悲观情景概率达 30%、资本几近全损，加权
              期望值约 1.3—1.5 倍，低于多数机构投资人对高风险私募股权头寸要求的 2.0 倍最低门槛。
