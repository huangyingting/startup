      - number: '1.2'
        title: 创始人、领导层与公司治理
        blocks:
          - type: paragraph
            body: >
              Dream Security 创始团队融合了政府管理经历、进攻性网络安全专长与技术深度，组合颇为罕见。 CEO Shalev Hulio 曾联合创立并领导 NSO Group——以色列 Pegasus
              监控平台背后的公司； 他对国家级进攻战术的深刻理解是 Dream 威胁检测体系的核心。CTO Gil Dolev 拥有 Microsoft、 NSO Group 及以色列精英情报部队 8200
              部队的技术经历。担任总裁的 Sebastian Kurz 曾于 2017 至 2019 年及 2020 至 2021 年两度出任奥地利总理，对政府如何遭受网络攻击及国家级响应如何协调有切身了解。


              董事会阵容随 B 轮融资完成而大幅强化。Bain Capital Ventures 合伙人、前 Symantec CEO（2009—2012） 及 Mandiant 董事长 Enrique Salem
              带来深厚的网络安全行业经验；前梯瓦制药 CEO 兼以色列国防军司令 Shlomo Yanai 具备管理大型复杂组织的丰富经验；现有董事成员包括 Dovi Frances（Group 11 创始人）和
              Michael Eisenberg （Aleph 创始合伙人）。


              关键人物风险不容忽视。Shalev Hulio 因 NSO Group Pegasus 间谍软件一事面临西班牙法院的刑事诉讼； 巴塞罗那法院于 2025 年 3 月裁定可对 NSO Group 联合创始人
              Hulio 和 Omri Lavie 提起诉讼。 Sebastian Kurz 于 2024 年因向奥地利议会调查委员会作伪证被判有罪，但该判决已于 2025 年 5 月上诉推翻； Kurz
              在奥地利仍面临独立腐败调查。上述法律风险对 Dream 构成实质性治理隐患。


              截至 2025 年初，Dream 员工约 150 人，计划扩招至 300 人，与其收入轨迹相匹配。 公司在特拉维夫（研发与总部）、维也纳（欧洲政府关系）和阿布扎比（中东 / 海湾地区关系）均设有战略办公室，
              但尚未公开披露针对关键人物缺位的继任计划或公司治理规程。
