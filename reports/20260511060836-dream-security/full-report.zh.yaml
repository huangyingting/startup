      - - ARR 确认差距
        - FY2025 经审计已确认收入低于 6000 万美元，与 1 亿美元 ARR 声明相悖
        - 已确认收入 18 倍以上的估值不可持续；触发下调轮
        - 发出卖出建议；要求 CFO 立即披露信息，并启动审计委员会介入
      - - 竞争性替代
        - 有具体名称的主权国政府以 Microsoft、Palantir 或 CrowdStrike 主权产品取代 Dream
        - 旗舰客户流失表明 CLM 并非核心使命级产品；市场领导者地位遭质疑
        - 30 天内全面重新评估投资逻辑；加速退出策略；评估二级出售
      - - 监管制裁
        - 美国 OFAC、BIS 或欧盟监管行动点名 Dream Security、Tau Capital 或相关高管
        - 跨境银行业务复杂化；Bain 基金中的美国有限合伙人被迫撤资
        - 立即启动法律审查；评估有限合伙人敞口；评估紧急二级出售方案
    notes: 触发条件设计为可通过公开监测及投资者更新审查加以观察。五项均代表能从根本上改变投资逻辑的事件。阈值刻意设定得具体明确，以支持可操作的监测，而非主观判断。
    claimRefs:
      - CV027
      - CV030
      - CV037
      - CV038
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 议题
      - 缺失证据
      - 重要性
      - 负责方 / 尽调路径
    rows:
      - - 已签署合同文件
        - 无经独立核实的已签署合同清单；Globes 显示已签合同不足 10 份，与声称的 30 份以上业务存在出入
        - 收入可持续性取决于了解哪些业务在合同上具有约束力、哪些仅为意向性；年度合同价值（ACV）构成决定客户集中度风险
        - 要求 CFO 在保密协议下提供已执行合同摘要（含日期、ACV、交付阶段、司法管辖区）
      - - Shalev Hulio 法律状态
        - 尚无公开的外部法律意见，就 Hulio 在西班牙或欧盟诉讼中的个人责任作出判断
        - 在资金承诺前，需明确董事会层面的继任安排并完成采购排除风险评估
        - 委托西班牙和欧盟法律顾问出具法律意见；要求董事会批准继任协议
      - - CLM 生产环境性能
        - 无已发布的准确率指标、误报率或第三方 CLM 基准测试
        - 核心产品价值主张未经验证；对估值逻辑和竞争护城河至关重要
        - 将独立第三方技术评估作为投资前提条件
      - - 经审计财务报表
        - 未披露经审计财务报告或首席财务官身份；收入确认方法不明；烧钱速度未披露
        - 无法核实 ARR 与预订额之差、毛利率、烧钱速度或递延收入计划
        - 要求在保密协议下提供 2026 年第一季度未经审计财务报告及 FY2025 经审计报表；要求出具 GAAP 或 IFRS 合规意见
      - - 主权客户参考访谈
        - 无公开具名的客户参考案例；政府保密协议为惯例，但投资前可协商调整
        - 标准参考尽调，不能以公司叙述代替
        - 争取与至少 2 位主权客户首席信息安全官（CISO）进行经安排的参考访谈；要求确认生产环境部署情况
      - - Tau Capital 有限合伙人披露
        - FTM.eu 已记录其阿联酋投资者关联；投资方与客户的双重身份未披露
        - 对美国买家存在美国外国投资委员会（CFIUS）风险；有限合伙人利益冲突隐患；Bain 主导的董事会决策中治理独立性存疑
        - 要求 Tau Capital 在保密协议下书面披露有限合伙人结构及任何客户关系
    notes: 全部六项尽调要求均为将评级从"观察"升级为任何形式"买入"前的先决条件。第 1、2、4 项属于阻塞性条件：若无已签署合同、法律明确性及财务核实，投资逻辑将建立在无法核实的声明之上。
    claimRefs:
      - CV025
      - CV027
      - CV037
      - CV038
      - CV039
      - CV040
