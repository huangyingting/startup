      - number: '2.2'
        title: 市场规模：总可用市场、可服务市场与可获取市场
        blocks:
          - type: paragraph
            body: >
              多家独立分析机构对 AI 网络安全市场进行了测算，因范围界定、研究方法和地理覆盖差异，各方估算出入明显。 MarketsandMarkets 预测 AI 网络安全市场规模将从 2026 年的 255.3
              亿美元增长至 2031 年的 508.3 亿美元， 年均复合增长率（CAGR）为 14.8%。Grand View Research 则预计该市场至 2030—2031 年将达 937.5 亿至 1340
              亿美元； 差距源于纳入标准不同——较窄口径不含含 AI 功能的传统 SIEM，较宽口径则涵盖所有具备 AI 特性的安全工具。


              关键基础设施保护（CIP）市场规模更大：MarketsandMarkets 预计 2025 年为 1539.3 亿美元，2030 年增至 1971.3 亿美元， CAGR 为 5.1%。该市场包含 Dream
              业务范围之外的实体安全。CIP 安全中的 AI 原生部分——Dream 的主要战场—— 仅占 CIP 整体的一小部分。


              政府专项 AI 网络安全的可服务市场（SAM）尚无公开分析师独立测算。综合现有参照指标——政府网络安全预算在安全总支出中 的占比、AI 安全平台政府细分的分析师预测，以及 Dream 自述的与 30
              余个国家实体签订 1.3 亿美元销售合同—— AI 原生国家 / 政府级网络安全在 2026 年的合理 SAM 估算为 30 至 60 亿美元。该估算为推导值，仅供参考。


              Dream 的可获取市场（SOM）反映其当前地理布局：欧洲、中东和东南亚；由于 NSO Group 的声誉影响， 五眼联盟（美国、英国、加拿大、澳大利亚、新西兰）在很大程度上难以进入。在此约束下，Dream 的
              SOM 估算为 5 至 15 亿美元，与其 ARR 向 2025 年底 2 亿美元迈进的轨迹一致，同时仍有较大扩展空间。 上述 SOM 估算未经独立核实。


              网络犯罪成本——需求紧迫性的主要驱动因素——据 Cybersecurity Ventures 估计到 2025 年已达每年 10.5 万亿美元。 该数字被广泛引用，但系从汇总事件数据推算，而非直接测量所得。
