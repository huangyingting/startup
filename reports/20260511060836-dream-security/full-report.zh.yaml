  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群细分与目标市场
        blocks:
          - type: paragraph
            body: >
              Dream Security 的目标客户群刻意保持狭窄：公司专注于需要完全主权 AI 网络安全能力的国家政府、国防部、国家 CERT
              和关键基础设施运营商。与面向数千家中小企业和中端市场客户的企业安全厂商不同，Dream 深耕国防科技细分市场，单一合同价值巨大（数百万至数亿美元级别），全球潜在买家总数以数十计，而非数千。


              公司的地理市场布局体现了这一定位。特拉维夫总部承担创新基地职能，维也纳办公室面向欧洲 NATO 成员国和欧盟机构——这些机构在 NIS2 指令和拟议《网络韧性法案》下面临更高的数据主权要求。阿布扎比办公室服务
              GCC/MENA 主权市场，涵盖阿联酋、沙特阿拉伯及其他在该地区国家级网络基础设施建设上持续加码的海湾国家。Dream Security 的领导层架构强化了这一市场布局：CEO Shalev Hulio 凭借
              NSO Group 背景积累了深厚的中东政府关系；总裁 Sebastian Kurz 与欧洲各国政府首脑网络有直接关联。


              所有客户群对核心产品特性的需求高度一致：气隙部署、主权数据驻留以及参与国家 AI
              训练工厂。需求的高度统一降低了产品定制成本，但也将可触达市场限定于具备相应治理架构和预算权限、能够采购国家级网络安全平台的买家。公开材料中未发现任何商业企业、金融机构或科技公司客户；在当前商业发展阶段，公司似乎是纯粹面向国家/政府市场的参与者。
