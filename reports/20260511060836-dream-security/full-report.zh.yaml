      - number: '8.4'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: |
              Dream Security 的可比集合刻意设得较窄：公司处于主权安全、AI 原生架构与纯政府市场三者的交汇点，没有
              任何上市公司同时满足这三个维度。最接近的可比标的是 CrowdStrike（AI 原生网络安全）、Palantir（政府
              AI 分析）、SentinelOne（AI 威胁检测）和 Darktrace（AI 网络安全，已完成并购退出）。

              CrowdStrike（CRWD）是 AI 原生网络安全领域最优质的公开市场基准。截至 2026 年初，CrowdStrike 市值
              对应约 21 倍预期收入，ARR 达 $3.9B，增速 33%，毛利率 74%，14 年运营、逾 29,000 家企业客户。Dream
              已确认收入对应的 28 倍倍数已超过 CrowdStrike，尽管其收入体量仅为后者的约 0.1%——这一溢价唯有靠更高
              增速和主权 AI 细分领域的先发优势来支撑。

              Palantir（PLTR）是纯政府 AI 平台模式的估值上限参照。2026 年初 Palantir 市值约 33 倍收入，年收入
              $2.9B，其中政府业务占比 53%。Palantir 的政府集中度与 Dream 定位相似，但体量约为 Dream 估计收入的
              70 倍，且已运营 20 年。Dream 的 8.5 倍合同预订倍数只有在将预订额等同于已确认收入的前提下，才能与
              Palantir 的收入倍数对标——这是相当大的分析跨越。

              最具操作参考价值的退出可比是 Darktrace 被 Thales 并购（2024 年）：约 £4.25B、9 倍 TTM 收入。这一
              案例证实，欧洲防务龙头愿意为规模化的 AI 原生网络安全能力支付显著溢价。然而 Darktrace 已实现盈利，
              且拥有多元化企业客户群——这两点 Dream 尚未做到。在已确认收入未达 $100M 之前以 $1.1B 估值完成收购，
              要求战略买家支付账面溢价，而缺乏 2 年以上生产部署证据，多数战略收购方都会抵触。
