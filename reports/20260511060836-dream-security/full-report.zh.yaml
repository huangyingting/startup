  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入、年经常性收入与预订合同
        blocks:
          - type: paragraph
            body: >
              以任何衡量以色列或全球网络安全初创公司的标准来看，Dream Security 的营收轨迹都堪称优异。在首个完整运营年（2024 年）， 公司报告年度销售额超 1.3
              亿美元——该数字代表在其国家政府客户群中已签合同的总合同价值。与此同时， 公司报告截至 2025 年 2 月 B 轮结束时，ARR 年化运行率约为 1 亿美元，并公开宣称目标是 2025 年底达到 2 亿美元
              ARR。


              然而，这些数字与实际确认收入之间的关系需要仔细厘清。以色列领先商业报纸 Globes 估算，Dream 2024 年实际确认收入 约为 4000 万美元——远低于 1.3 亿美元的预订合同数字。这一差距在销售 3
              至 7 年国家项目合同的公司中结构上可以预期： 依据 ASC 606 和 IFRS 15，收入在履行义务完成时确认，而非合同签署时。一份价值 1500 万美元的 5 年期国家平台合同， 每年可确认约 300
              万美元收入，但对预订合同贡献 1500 万美元、对以 TCV 为基础的 ARR 计算贡献 1500 万美元。 公司未公开披露其所述 ARR 究竟反映年度合同份额还是 TCV 年化。


              无论确认时间如何，预订合同增长速度均值得关注。Dream 在成立 24 个月内实现年度合同量超 1.3 亿美元—— 即便在更友好的企业市场，CrowdStrike 和 SentinelOne
              达到这一里程碑也花了数年。关键注意事项在于： 这是一家政府合同公司，合同频次低、单价高，少数客户决策决定着整体营收走向。Globes 估计 B 轮时签约客户不足 10 家，
              而公司公开宣称"30+"——差异可能源于统计口径（已签合同 vs. 试点、意向书或框架协议），也可能存在实质性夸大。
