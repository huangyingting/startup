      - number: '5.2'
        title: 产品模块全景
        blocks:
          - type: paragraph
            body: >
              Dream Security 平台包含五个核心产品模块。态势管理模块是旗舰产品，接入 CLM
              上下文分析，动态呈现组织真实攻击面。该模块不生成静态合规清单，而是同步关联错误配置、身份暴露、横向移动机会和网络分段缺口，映射真实攻击路径。威胁检测模块借助 CLM
              语言模型推理识别网络行为异常，凭借上下文理解降低对基于签名方案的依赖，提升对"就地取材"攻击等新型手法的检测能力。


              SOC 自动化与分类模块将多源告警汇聚至统一处理流水线，依据实际可利用性评分自动排定优先级，并生成针对性修复建议，专门解决在国家或企业规模运营的大型 SOC
              团队面临的告警疲劳问题。国家态势感知模块面向国防部、国家 CERT 和国家网络机构，将跨组织信号聚合为单一协调作战图，并进行跨行业关联分析。漏洞映射模块将发现的资产与 CVE
              数据库交叉比对，依据漏洞在该环境特定活跃攻击路径中的实际存在情况进行上下文评分，而非使用通用 CVSS 评分。


              Dream Security 的黑客复制模型在公司材料中被描述为一款"以攻击者思维思考"的配套 AI，支持进攻性仿真用例，但其技术架构和可用状态未单独披露。Dream Computing
              Services（DCS）枢纽承担所有模块的编排层职责。平台已于 2025 年 12 月 F5 BIG-IP 供应链漏洞事件的公开分析中展示态势管理能力，自动映射 26.6
              万台高风险设备并完成攻击路径优先级排序，全程无需人工介入。
