          - type: callout
            title: 政府合同结构赋予强劲收入耐久性
            body: >
              具有高切换成本（国家 AI 工厂数据锁定、组织集成、保密基础设施）的多年国家安全合同，为在留客户提供了结构性收入耐久性。即便只有少数签约国家合同、每份每年合同额 1000 万至 5000
              万美元以上，一旦完整部署，也意味着 3–5 年可预期的经常性收入。
