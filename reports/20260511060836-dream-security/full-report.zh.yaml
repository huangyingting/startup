chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、创立背景与战略定位
        blocks:
          - type: paragraph
            body: >
              Dream Security 是一家以色列 AI 驱动的国家级网络安全公司，总部位于以色列特拉维夫，另设奥地利维也纳和阿联酋阿布扎比办公室。 公司于 2023 年 1
              月成立，使命明确：为政府和关键基础设施运营商提供国家级主权 AI 网络安全能力。与企业级网络安全厂商不同， Dream
              从诞生之初便专为国家级威胁环境而设计——应对国家级对手、高级持续性威胁，以及针对能源网、水利系统、 港口和核设施等关键基础设施的攻击。


              公司核心产品网络语言模型（CLM）是一套专有大语言模型，经网络遥测数据（代码、日志、配置、威胁情报）专项训练而成。 CLM 让 Dream
              得以自动化原本需要顶尖安全分析师才能完成的复杂安全操作，无需客户安装任何硬件或软件， 即可跨混合、云及传统环境实现实时态势感知。


              Dream 通过三大差异化定位与传统网络安全厂商拉开距离：（1）原生面向政府应用场景的国家级平台，而非从企业工具改装而来； （2）创始团队深度植根于以色列情报生态，拥有丰富的进攻性网络作战经验；
              （3）零集成部署支持，即便拥有传统基础设施的机构也能快速落地。 公司明确表示不涉足进攻性监控市场，定位为纯防御性厂商。


              2025 年 2 月，Dream 完成 Bain Capital Ventures 领投的 1 亿美元 B 轮融资，估值达 11 亿美元， 成为 2025 年以色列首家 AI 网络安全独角兽。公司宣称与逾 30
              个国家政府实体签订年度销售合同超 1.3 亿美元， 是截至 2026 年初基于公开数据增速最快的以色列网络安全公司之一。
