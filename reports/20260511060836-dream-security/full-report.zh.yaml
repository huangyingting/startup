  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Dream Security 所处市场坐落于三大领域的交汇处：（1）AI 增强的网络安全工具与平台； （2）关键基础设施保护（CIP）方案；（3）政府 / 国家级安全项目。三者共享采购方、预算和威胁模型，
              但分析师给出的市场规模差异悬殊，精确界定市场边界是理解增长机遇的前提。


              AI 在网络安全领域的应用泛指将机器学习、大语言模型和行为 AI 应用于威胁检测、事件响应、态势管理和安全自动化。 关键基础设施保护市场涵盖 CISA 认定的 16
              个关键基础设施行业的物理与网络安全方案，包括能源、水利、 交通、通信、医疗、金融服务、国防工业基地、核设施、大坝、应急服务、食品与农业、政府设施、 制造业、化工、信息技术和商业设施。


              Dream Security 的可服务市场是一个细分领域：面向主权政府及其关键基础设施运营商的 AI 原生、纯软件、国家级网络安全。
              以下业务不在范围之内：企业商业客户、基于硬件的边界安全、身份与访问管理、进攻性网络工具。 现有替代方案包括：手动运营的国家应急响应中心（CERT）、传统 SIEM / SOC 工具（IBM
              QRadar、Splunk）、 传统托管安全服务商（MSSP）合同，以及政府采购的企业平台（如 Microsoft Defender）。


              邻近扩展领域包括：情报社区分析、OT/ICS 安全平台、主权 AI 基础设施及网络威胁情报即服务。 Dream 尚未公开宣布进入上述领域的计划，但 CLM 架构有能力支撑这些用例。
