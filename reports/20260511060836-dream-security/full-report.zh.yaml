      - number: '7.4'
        title: 合作伙伴、依赖与集中度风险
        blocks:
          - type: paragraph
            body: >
              Dream Security 的合作伙伴风险主要体现在客户集中度：据 Globes 报道，截至 2025 年初签约国家政府客户不足十家，而公司声称的 30 家以上数字可能包含了管线中的潜在客户。以单一合同价值每年
              1000 万至 5000 万美元估算，任何一份合同不续签意味着 10%–30% 的订单额损失。公司未公开披露任何渠道合作伙伴、系统集成商或经销商；所有销售似乎均通过创始人直接关系驱动，形成对 Hulio 和
              Kurz 作为销售资产的结构性依赖，而非制度化的销售体系。


              技术平台依赖包括 NVIDIA（NIM 推理）、Meta（LLaMA 基础模型）和 Alibaba（Qwen 72B），每一项都构成单一厂商集中风险。若 NVIDIA NIM 定价大幅上涨，以同类 SaaS
              公司估算的 70%–80% 毛利率可能受到压缩。若 Meta 修订 LLaMA 政府使用的商业许可，Dream 将需要谈判企业许可或迁移至替代基础模型。《亚伯拉罕协议》正常化（2020 年）为 Dream
              开设阿布扎比办公室奠定了外交前提；以色列-阿联酋关系若有所恶化，将直接损害 GCC 市场准入。


              投资集中度同样值得关注。Bain Capital Ventures 和 Tau Capital 是主要机构资本。欧洲调查性媒体 Follow the Money（FTM.eu）记录了 Tau Capital
              与阿联酋的关联，引发外界对潜在利益冲突的质疑——若阿联酋政府实体同时是 Dream Security 的投资者和客户，这一双重角色可能带来问题，但目前既未公开披露，也未经公司正面回应。
