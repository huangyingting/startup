companyProfile:
  summary: >
    Dream Security 由 CEO Shalev Hulio（前 NSO Group CEO）和 CTO Gil Dolev 于 2023 年 1 月在特拉维夫创立。公司打造了网络语言模型 （CLM）——一套 AI
    平台，接入国家级遥测数据（网络日志、终端事件、威胁情报），并在机密政府数据上训练主权 LLM， 在无需接入现有安全工具的前提下检测国家级攻击。Dream 总部位于特拉维夫，另设维也纳和阿布扎比办公室，
    服务对象仅限国家政府与主权机构。2025 年 2 月，公司完成由 Bain Capital Ventures 领投的 1 亿美元 B 轮融资，估值达 11 亿美元。 公司宣称签约逾 30 个国家政府客户、预订合同运行率超 1.3
    亿美元，但 Globes 报道显示已签合同不足 10 份，确认收入约为 4000 万美元。
