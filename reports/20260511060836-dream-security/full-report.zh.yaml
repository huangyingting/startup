  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险评估框架
        blocks:
          - type: paragraph
            body: >
              Dream Security 的风险状况由三大汇聚因素塑造：领导层的法律与声誉历史、围绕 AI
              国家安全工具的监管不确定性，以及不足十家纯政府客户商业模式固有的运营集中度。本章从五个维度评估风险：监管与法律、运营与技术、合作伙伴与依赖、财务与模型，以及人员与执行。严重程度采用三级评级——重大、高、中——综合反映可能性与风险实现后的潜在影响。缓解成熟度评级分为已落实、进行中、理论层面。


              所有量化风险评估均受制于 Dream Security 27
              个月的运营历史和有限的公开披露。公司未发布财务报表、合规认证或生产性能指标。分析基于公开法律记录、监管备案、深度调查报道、公民社会报告和行业基准。一手证据缺失之处，分析师推断均有明确标注。关键论点触发条件定义于关键终止条件部分，设有与可监测事件挂钩的明确阈值，而非主观定性判断。
