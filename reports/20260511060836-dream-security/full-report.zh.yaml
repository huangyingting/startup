            title: 国家 AI 训练工厂构建难以复制的网络效应
            body: >
              跨主权国家部署的匿名化学习信号汇聚于持续优化的国家 CLM，形成云原生竞争者难以复制的数据网络效应。随着越来越多的国家机构部署，模型持续改进，所有参与方的切换成本随之提高，强化了 Dream 在主权网络 AI
              细分市场的先发优势。
