callouts:
  - calloutType: risk
    title: "Revenue Quality Gap Is the Primary Financial Diligence Blocker"
    body: "The gap between Dream's $130M+ annual bookings and Globes-estimated $40M recognized 2024 revenue, combined with a disputed customer count, means the company's $1.1B valuation rests on a financial narrative that has not been independently verified through audited accounts. A 2.5x ARR metric inflation would require revaluation of the investment thesis."
    claimRefs: [CI002, CI024, CI031, CI032, CI035]

  - calloutType: strength
    title: "Government Contract Stickiness Creates High-Quality ARR Foundation"
    body: "Multi-year national program contracts — spanning 3 to 7 years — create an exceptionally sticky revenue base once signed. Sovereign governments with critical infrastructure obligations rarely cancel cybersecurity contracts mid-term, suggesting that authentic ARR is high-quality and low-churn even if the current metric definition requires scrutiny."
    claimRefs: [CI011, CI013, CI025]

  - calloutType: insight
    title: "11x ARR Multiple Is Defensible If ARR Targets Are Met and Governance Risk Is Resolved"
    body: "Dream's Series B multiple of ~11x ARR sits between the private-market median (6–8x) and strategic M&A comps (18–32x). The valuation becomes compelling at $200M ARR, where the implied exit at 15–20x would generate a $3–4B enterprise value and strong returns for all investors — contingent on resolving the Five Eyes access gap and founder legal proceedings."
    claimRefs: [CI007, CI027, CI028, CI029]

