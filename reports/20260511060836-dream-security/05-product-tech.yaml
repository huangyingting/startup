callouts:
  - calloutType: strength
    title: "National AI Training Factory Creates Hard-to-Replicate Network Effect"
    body: >
      The aggregation of anonymized learning signals across sovereign national deployments into a
      continuously improving national CLM creates a data network effect that cloud-native competitors
      cannot easily replicate. As more national agencies deploy, the model improves, raising the
      switching cost for all participants and reinforcing Dream's first-mover advantage in the
      sovereign cyber AI segment.
    claimRefs: [CE006, CE034]

  - calloutType: risk
    title: "LLM Hallucination and Adversarial Training Data Represent Novel Operational Risks"
    body: >
      Unlike rule-based SIEM platforms, an LLM-based posture engine may generate confident but
      incorrect remediation advice. Adversarial actors who understand the deployment's telemetry
      pipeline could attempt training data poisoning. These are well-documented risks in the AI
      security literature and have not been publicly addressed through adversarial robustness
      disclosures by Dream Security.
    claimRefs: [CE033, CE038]

  - calloutType: insight
    title: "Zero-Integration Claim Addresses the #1 Cybersecurity Deployment Failure Mode"
    body: >
      Industry surveys consistently identify complex integrations as the leading cause of security
      tool underutilization. Dream's agentless architecture directly targets this failure mode.
      If the zero-integration claim is validated at scale, it removes the single largest barrier
      to rapid enterprise and national government deployment of AI-driven security.
    claimRefs: [CE009, CE032]

  - calloutType: assumption
    title: "Product Maturity Claims Are Unverified by Independent Third Parties"
    body: >
      All GA status claims, module capability descriptions, and performance metrics cited in this
      chapter originate from Dream Security official materials, press releases, or company-authored
      technical blogs. No independent penetration test reports, SOC 2 audits, benchmark publications,
      or third-party deployment case studies were available for review as of May 2026.
    claimRefs: [CE023, CE024]

