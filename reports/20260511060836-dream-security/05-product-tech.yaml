  claims:
    - id: CE001
      statement: >
        Dream Security's Cyber Language Model (CLM) is described as a proprietary family of large
        language models trained specifically on cybersecurity telemetry including network logs,
        device configurations, security alerts, and code artifacts.
      topic: "CLM architecture"
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs: [SE001, SE002]
      answersQuestionRefs: [QE001, QE011]

    - id: CE002
      statement: >
        The CLM is designed to perform contextual reasoning about the intent and cascading impact of
        security events, distinguishing it architecturally from statistical anomaly detection models
        used by conventional SIEM and NDR platforms.
      topic: "CLM reasoning"
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs: [SE001, SE002]
      answersQuestionRefs: [QE011, QE021]

    - id: CE003
      statement: >
        Dream Security deploys the CLM using NVIDIA NIM microservices for production inference,
        enabling high-performance model serving within sovereign network perimeters without external
        API dependencies.
      topic: "NVIDIA NIM integration"
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs: [SE001, SE013]
      answersQuestionRefs: [QE003, QE016]

    - id: CE004
      statement: >
        Dream Security's CLM cascade incorporates open-source base models including Meta LLaMA 3.3,
        LLaMA 4, and Alibaba Qwen 72B as foundation layers, with proprietary CLM components
        specialized on cybersecurity data.
      topic: "open-source LLM models"
      type: company-claimed
      confidence: high
      freshness: current
      sourceRefs: [SE001, SE017]
      answersQuestionRefs: [QE002, QE011]

    - id: CE005
      statement: >
        LoRA (Low-Rank Adaptation) adapters are applied to the CLM to specialize it for each
        customer organization's specific environment, allowing efficient per-organization adaptation
        without the compute cost of full fine-tuning.
      topic: "LoRA fine-tuning"
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs: [SE001, SE002]
      answersQuestionRefs: [QE016]

    - id: CE006
      statement: >
        Dream Security's National AI Training Factory aggregates anonymized learning signals from
        all organizational deployments and feeds improvements back to the shared national-level CLM,
        creating a continuous improvement loop and data network effect.
      topic: "national AI training factory"
      type: company-claimed
      confidence: medium
      freshness: current
      sourceRefs: [SE013, SE017]
      answersQuestionRefs: [QE018]

    - id: CE007
      statement: >
        Dream Computing Services (DCS) functions as the central orchestration hub for all platform
        modules, aggregating telemetry and dispatching CLM inference requests, and is deployable
        on-premises, in private clouds, or in fully air-gapped environments.
