callouts:
  - id: CAR001
    type: risk-flag
    title: SPAC redemption risk is the most consequential near-term risk — could eliminate fleet expansion capital
    body: >-
      SPAC redemption rates of 70-90%+ would reduce net trust proceeds near zero, leaving only $113M PIPE for a
      $160-240M fleet expansion plan. A capital shortfall would delay fleet growth, Pod R&D, and the autonomous
      economics that justify Einride's $1.8B valuation.
    claimRefs:
      - CR006
      - CR007
      - CR008
  - id: CAR002
    type: risk-flag
    title: Luminar LiDAR financial distress creates a critical single-source sensor dependency
    body: >-
      Luminar Technologies' stock has fallen 85% since 2023 and the company underwent layoffs and restructuring in
      2024-2025. As Einride's primary LiDAR supplier, a Luminar production failure would require 12-24 months to
      re-qualify an alternative — disrupting new fleet deployments and requiring AV stack re-engineering.
    claimRefs:
      - CR011
      - CR012
  - id: CAR003
    type: key-finding
    title: The supervised AV model is both Einride's strength and its ceiling — L4 remains the high-risk prize
    body: >-
      Supervised Pod operation generates real commercial revenue today and is a defensible business. But Einride's $1.8B
      valuation is pricing in future unsupervised L4 economics. The 'last 10%' edge case problem makes the path to
      unsupervised L4 non-linear and uncertain, creating a long gap between current supervised operations and the fully
      autonomous economics that justify the valuation.
    claimRefs:
      - CR013
      - CR024
