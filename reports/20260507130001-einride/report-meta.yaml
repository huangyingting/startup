companyProfile:
  summary: "Einride is a Stockholm-based autonomous freight company founded in 2016 by CEO Robert Falck (former Volvo Cars). The company manufactures and operates electric freight trucks including the cabless, autonomous Einride Pod (supervised Level 4) and conventional EV models. The Freight Mobility Platform (FMP) is a proprietary SaaS layer providing fleet management, route optimization, carbon Scope 3 tracking, and AI logistics. Einride operates in 7 US states plus Sweden/EU with ~200 EVs in commercial service and 500,000+ cumulative autonomous km. In November 2025, Einride announced a SPAC merger with Legato Merger Corp. III at $1.8B enterprise value, with $113M PIPE closed February 2026. Customers include Heineken, PepsiCo/Frito-Lay, Carlsberg Sweden, and GE Appliances. Total pre-SPAC funding exceeds $635M (EQT Growth Series C $500M, SoftBank Vision Fund 2 Series B $110M). Einride was the first AV on a European public road (with DB Schenker, 2019)."
  foundedDate: "2016-01-01"
  founders:
    - name: "Robert Falck"
      role: "Co-founder and CEO"
      background: "Former Volvo Cars; automotive industry veteran; spun out Einride in 2016 with Vilhelm Hedberg"
      claimRefs: []
    - name: "Vilhelm Hedberg"
      role: "Co-founder"
      background: "Co-founded Einride; contributed to early product vision"
      claimRefs: []
  foundingLocation: "Stockholm, Sweden"
  headquarters: "Stockholm, Sweden"
  productSummary: "Three products: (1) Einride Pod — cabless autonomous EV freight truck for fixed and structured routes (supervised L4 with remote operators); (2) Conventional EV trucks — standard cab EVs for longer or unstructured routes; (3) Freight Mobility Platform (FMP) — enterprise SaaS for fleet management, CO2 Scope 3 tracking, route optimization, and AI logistics, with CSRD compliance modules."
  customerFocus: "Large enterprise shippers in CPG, food/beverage, and manufacturing with fixed or structured distribution routes requiring Scope 3 carbon transparency for CSRD compliance. US and EU operations; Heineken, PepsiCo/Frito-Lay, Carlsberg Sweden, GE Appliances are the primary disclosed accounts."
  businessModel: "TaaS (per-km or per-pallet pricing for fleet operations) + FMP SaaS subscription fees. Revenue is split between fleet operations (capital-intensive) and software platform (higher-margin); exact split undisclosed. The CSRD carbon module is sold as an add-on to FMP at premium margin."
  stage: "growth / SPAC (NYSE listing pending)"
  fundingStatus: "SPAC with Legato Merger Corp. III at $1.8B EV (announced November 2025); $113M PIPE closed February 2026; NYSE listing pending as of May 2026. Pre-SPAC: Series C $500M (EQT Growth, 2022), Series B $110M (SoftBank VF2, 2021), Series A ~$25M (EQT Ventures, 2019). Total pre-SPAC raised: >$635M."
  disclosureProfile: private-disclosed
