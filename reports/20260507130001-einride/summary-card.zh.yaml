summary:
  headline: >-
    Einride 是商业化已验证的自动驾驶货运 TaaS 公司，拥有蓝筹 CPG 客户和 500K+ AV 公里；按 2024 年收入 39-42x 看估值偏贵。观察；若 SPAC 交割且信托净 proceeds 超过
    $100M，可高确定性进入。
