              客户背书集中在三类价值：降低碳排放、减少司机依赖带来的运营成本节省，以及 CSRD/ESG 报告能力。没有客户公开披露具体成本节省数字或合同金额，财务证据质量因此受限。


              本章最大的证据缺口，是缺少公开披露的 NRR、总留存率或流失数据。多年期合同结构意味着留存被设计得偏高，但目前看不到续约数据。
