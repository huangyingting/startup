      - number: '1.3'
        title: 融资与 SPAC 合并
        blocks:
          - type: paragraph
            body: >
              Einride 的融资历史显示机构信心逐步加深：

              - 2019：Series A（$25M），EQT Ventures 领投

              - 2021：Series B（$110M），SoftBank Vision Fund 2 和 Northzone 联合领投

              - 2022：Series C（$500M），Storebrand、EQT Growth 等

              - SPAC 前累计股权融资：约 $635M+


              SPAC 合并（November 2025 公布）：Einride 与 NASDAQ 上市 SPAC Legato Merger Corp. III 签署业务合并协议。交易给 Einride 的 SPAC
              前企业价值定为 $1.8B。February 2026，Einride 从物流和能源行业战略投资者等处完成 $113M PIPE（公开股权私募投资）。


              截至 May 2026，SPAC 合并尚未完成；监管审批（SEC 注册声明审查、股东投票）仍在等待中。原计划 NYSE 上市目标为 H1
              2026，但时间线已经延长。截至本报告运行日期（2026-05-07），Einride 仍是一家私营公司。


              $1.8B 的 SPAC 估值意味着，以 $43-47M 的 2024 估计收入计算，收入倍数约为 39-42x——这个溢价更多反映自动驾驶车辆技术和 EV 货运脱碳期权，而不只是当年收入。
