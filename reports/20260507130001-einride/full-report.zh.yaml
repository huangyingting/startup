      - number: '7.2'
        title: SPAC 执行与资本风险
        blocks:
          - type: paragraph
            body: >
              与 Legato Merger Corp. III 的 SPAC 合并（2025 年 11 月宣布，PIPE 于 2026 年 2 月关闭）仍是 Einride 近期最关键的单一风险。截至 2026 年 5
              月，NYSE 上市仍待 SEC 和股东批准。2023-2026 年 SPAC 市场赎回率一直在 70-90%+；如果 Legato 股东大量赎回，信托净收益（原本 $200M+）可能接近于零，只剩 $113M
              PIPE 作为新增资本。


              仅靠 $113M PIPE 不足以支撑：（1）车队从 200 辆 EV 扩到 600 辆（$160-240M 车辆资本），（2）下一代 Pod 研发（估计
              $50-100M），以及（3）按当前烧钱速度弥补运营亏损。SPAC 失败或信托收益过薄，会造成资本断崖，迫使 Einride 以可能不利的条款举债桥接，大幅缩减路线图，或寻找战略替代方案。


              SPAC 执行还包含时间线风险：NYSE 上市拖延越久，管理层注意力被 SPAC 合规流程牵走的时间越长，商业执行就越受影响。以 Einride 当前收入规模看，SPAC 相关法律和会计成本也很重。


              如果 SPAC 顺利关闭且信托收益充足，NYSE 上市又会带来一组新的上市公司风险：季度业绩压力、做空者审视，以及上市后 12-18 个月内兑现指引的压力。
            claimRefs:
