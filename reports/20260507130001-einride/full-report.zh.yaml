  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: standard
    summary: |
      端到端流程，从客户货运订单到 Einride 自动驾驶交付，再到生成 CSRD 排放记录。
    data:
      nodes:
        - id: n1
