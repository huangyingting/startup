  - id: TM001
    title: 市场定义表
    columns:
      - 市场层级
      - 定义
      - 规模（当前）
      - 规模（2030 预测）
      - Einride 参与方式
      - 时间跨度
    rows:
      - - 美国重型卡车运输（所有模式）
        - Class 6-8 卡车运营商、货运经纪商和物流中介的收入
        - $800B/年（US）
        - 到 2030 年 $900B+
        - 间接：ECV 颠覆机会
        - 0-15 years
      - - 全球 ECV 货运市场
        - 部署并运营电动商用车做货运的公司
        - ~$30B (2023)
        - 到 2030 年 $280-400B
        - 直接：主要收入来源
        - 0-7 years
      - - 美国 ECV 运营（Class 8）
        - 美国重型电动卡车货运
        - ~$1-2B (2024 est.)
        - 到 2030 年 $50-80B
        - 直接：美国核心 TAM
        - 0-7 years
      - - 自动驾驶货运（商业规模）
        - 公共道路 Level 4 无人驾驶商业货运
        - 近零（尚无商业规模）
        - 到 2035 年 $200-400B+
        - 未来：Einride Pod 期权价值
        - 5-12 years
      - - 企业 TaaS 电动货运（Einride SAM）
        - 面向 Fortune 1000 企业托运人的多年期电动货运合同，路线 50-300 mile，覆盖美国和欧洲
        - $15-25B (2024)
        - 到 2030 年 $80-120B
        - 直接：Einride 的核心 SAM
        - 0-5 years
    notes: 市场规模估计来自 BloombergNEF、Morgan Stanley 和 McKinsey 研究。自动驾驶货运 TAM 代表一个有条件的长期情景。
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM014
  - id: TM002
    title: TAM/SAM/SOM 或规模测算视角表
    columns:
      - 层级
      - 标签
      - 数值（USD）
      - 依据
      - 关键假设
      - 风险
    rows:
      - - TAM
        - 全球电动化商用货运（2035 情景）
        - $400-600B/yr
        - 到 2035 年，$4T 全球货运市场中 10-15% 转向电动化运营
        - 欧盟和美国排放强制令大规模执行；到 2028 年达到 TCO 平价
        - 监管回摆；TCO 平价推进慢；柴油韧性
      - - SAM
        - 北美和欧洲企业 TaaS 电动货运（50-300mi 路线）
        - $15-25B (2024) → $80-120B (2030)
        - Fortune 1000 中有 ESG 承诺、并为 TaaS 合同配置多年期预算的企业托运人
        - 企业托运人的 ESG 强制目标推动 TaaS 采用；充电基础设施建成
        - 托运人自建 EV 车队而不用 TaaS；基础设施缺口持续
      - - SOM（当前）
        - Einride 当前签约 ARR
        - $65M
        - SPAC 材料披露的签约 ARR
        - 现有合同履行；无重大流失
        - 合同取消；车队交付延迟
      - - SOM（2028 乐观）
        - Einride ARR 增长到 3x
        - ~$200M ARR
        - 车队扩张到 600+ EVs；2-3 条自动驾驶 Pod 路线带来利润率改善
        - SPAC 资本完成部署；Pod 获准在美国 2 个州公共道路运行
        - 资本市场准入受限；Pod AV 审批延迟
      - - SOM（2030 情景）
        - Einride 借自动驾驶 Pod 规模化
        - $600M-1B ARR
        - 约 2,000 辆 EVs（含 Pods）；TaaS 利润率 30%+；欧盟市场扩张
        - Level 4 自动驾驶获批；司机短缺加剧；ESG 强制目标收紧
        - AV 监管失败；自动驾驶事故责任；来自 OEM TaaS 项目的竞争
    notes: SOM 数字为情景分析内部估计；不是 Einride 指引。
    claimRefs:
      - CM014
      - CM015
      - CM016
      - CM017
  - id: TM003
    title: 客群 / 买方地图
    columns:
      - 客群
      - 代表客户
      - 货运特征
      - EV 准备度
      - Einride 匹配度
      - 合同价值潜力
    rows:
      - - 包装消费品（CPG）
        - 客户：Heineken、PepsiCo、Carlsberg、AB InBev、Diageo
        - 固定、高量、枢纽到枢纽的区域配送；50-200 miles
        - 高——ESG 承诺；来自零售商的 Scope 3 压力；路线重复
        - 匹配度强——已由 Heineken、PepsiCo、Carlsberg Sweden 验证
        - 每家企业 $5-20M TaaS ARR
      - - 工业 / 家电制造
        - GE Appliances、Whirlpool、Electrolux
        - 中频、多工厂货运；100-300 mile 枢纽路线
        - 中——成本导向；Scope 3 次要；可在自有设施充电
        - 匹配度好——GE Appliances 是已披露客户
        - 每家企业 $3-15M TaaS ARR
      - - 零售 / 杂货
        - Walmart、Target、Kroger、Lidl
        - 高频、高量、配送中心到门店路线；30-150 miles
        - 高——EU 和 CA 强制要求；自有配送中心充电基础设施可行
        - 潜在匹配——尚未进入已披露客户名单；价值空间大
        - 每家企业 $10-50M TaaS ARR
      - - 3PL / 物流运营商
        - 客户：DHL、DB Schenker、Geodis、XPO
        - 路线多样；由客户驱动；频次可变
        - 中——资本开支重；等待 TCO 平价
        - 有限——3PL 通常偏好资产所有权；但可合作
        - 每家 3PL $5-25M TaaS ARR
      - - 电商 / 包裹最后一公里
        - Amazon、FedEx Ground（Class 6-7）
        - 短路线、高频、城市-郊区；<50 miles
        - 高——城市配送 EV 强制要求；自有 EV 项目活跃
        - 弱——低于 Pod 重量级；Tesla Semi / Rivian 更适合该细分
        - Einride 空间有限
    notes: null
    claimRefs:
      - CM005
      - CM006
      - CM007
      - CM008
  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 因素
      - 类型
      - 对 Einride 的影响
      - 时间线
      - 证据
      - 概率
    rows:
      - - CARB Advanced Clean Trucks (ACT) 法规
        - 驱动因素（监管）
        - 要求 CA 到 2027 年 ZEV 卡车销量占比 40%；触发车队脱碳投资
        - 2025-2028
        - CARB 2024 ACT 规则；已在 CA 和 15 个采纳州生效
        - 高——法律已生效
      - - EU Fit for 55——重型车辆 CO2 强制要求
        - 驱动因素（监管）
        - 到 2030 年，新重型卡车 CO2 减排 45%；欧洲市场顺风
        - 2025-2030
        - EU 法规 (EU) 2019/1242；在 Fit for 55 下扩展
        - 高——EU 监管已通过
      - - US 结构性司机短缺
        - 驱动因素（市场）
        - 2024 缺口 80,000+；预计到 2030 为 160,000；拉动自动驾驶货运需求
        - 立即
        - ATA 2024 卡车运输活动报告
        - 高——有记录的结构性趋势
      - - EV 电池成本下降 / TCO 平价
        - 驱动因素（技术）
        - BloombergNEF 预计 Class 8 EV 在 2025-2028 与柴油车 TCO 平价；价格门槛随之消失
        - 2025-2028
        - BloombergNEF 2024 EV 展望；Morgan Stanley 预测
        - 中——取决于燃油价格和激励环境
      - - Fortune 500 Scope 3 ESG 承诺
        - 驱动因素（市场）
        - '68% 的 Fortune 500 设有 Scope 3 目标；货运是 #1 Scope 3 类别；脱碳压力紧迫'
        - 立即
        - CDP 2024 企业气候报告
        - 高——已公开承诺
      - - 充电基础设施缺口
        - 约束
        - US（2024）可支持 Class 8 的 DC 快充桩不足 5,000；限制部署范围和路线
        - 3-7 年才能实质改善
        - ChargePoint 市场调研 2024；DOE EV 基础设施报告
        - 高——短期硬约束
      - - EV 卡车高资本成本
        - 约束
        - 激励前，每辆车较柴油车溢价 $150,000-250,000；要求 Einride 资本充足
        - 2-5 年达到 TCO 平价
        - Transport Topics；BloombergNEF 2024
        - 高——当前约束
      - - AV 监管不确定性
        - 约束
        - Level 4 自动驾驶商用卡车尚无联邦框架；NHTSA 规则制定待定
        - 3-7 年才会明朗
        - NHTSA 2024 AV 政策更新；FMCSA 公开记录
        - 中——监管路径存在，但时间线不确定
      - - 现有 OEM TaaS 项目
        - 约束 / 竞争
        - Daimler、Navistar、Volvo 推出 EV-as-a-Service；可能削弱 Einride 面向大型车队客户的定价权
        - 2-5 年
        - Daimler Trucks EaaS 公告 2024
        - 中——早期阶段
      - - 衰退 / 货运量收缩
        - 约束（周期性）
        - 2023 货运需求收缩 15%+；若再次出现货运衰退，TaaS 合同价值会下降
        - 周期性；可能在 2026-2027
        - FreightWaves 2023-2024 货运衰退分析
        - 中——周期性风险
    notes: null
    claimRefs:
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
  - id: TP001
    title: 竞争对手画像表
    columns:
      - 公司
      - 模式
      - 技术阶段
      - 融资 / 市值
      - 主要客户
      - 地理重点
      - Einride 主要受何威胁
    rows:
      - - Aurora Innovation (AUR)
        - AV 技术授权；与 OEM 车队合作
        - Level 4 商用无人驾驶卡车（Texas，April 2024）
        - ~$1.5-2B 市值（2025）；$820M IPO
        - 合作网络：Uber Freight、Werner、Schneider、FedEx
        - US（Texas，随后全国扩张）
        - 无需承担 TaaS 资本成本即可提供无人驾驶能力；与 Volvo 做 OEM 集成
      - - Waymo Via
        - AV 技术开发商（Alphabet 内部）
        - Class 8 AV 测试；已在 Phoenix AZ 商用
        - Alphabet 资助；无公开市值
        - 未披露企业托运方
        - US（西南部；计划全国扩张）
        - AV 技术护城河最深；Alphabet 提供资金背书
      - - Gatik
