            body: >-
              Aurora Innovation 2021 年以 $11B 企业价值 SPAC 上市，当时收入接近零；到 2024 年，随着商业启动延迟，其市值降至约 $3.5B。Einride 的 $1.8B SPAC
              收入倍数低得多，位置更好，但 Aurora 先例说明，AV 技术型 SPAC 估值很容易受到 L4 时间线滑坡冲击。
            calloutType: insight
