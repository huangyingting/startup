  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户画像与分层
        blocks:
          - type: paragraph
            body: >
              Einride 的商业客户群集中在两个行业：消费包装品（CPG）制造（Heineken、PepsiCo/Frito-Lay、Carlsberg Sweden）和耐用品制造（GE
              Appliances）。四个具名客户都是 Fortune 500 或 Fortune Global 500 同等级公司，拥有大型内部物流运营和公开 ESG 承诺，因此是 Einride TaaS
              产品的主要目标画像。


              典型 Einride 企业客户是大型制造商或物流运营商，面对：(1) 柴油成本上升和碳定价压力，(2) ESG 报告义务，要求提供 Scope 3 货运排放数据，(3)
              长期卡车司机短缺，增加了对具备自动化能力的车队运营商的依赖，以及 (4) 可持续发展挂钩融资或供应商承诺，奖励可衡量的脱碳行动。


              客户合同结构为多年期（3-5 年期限），包含固定月度车队费和可变里程部分。客户一旦把 FMP 接入 ERP/TMS 工作流，切换成本就会变高。企业销售周期估计为 6-12
              个月，因为采购涉及多方利益相关者（物流、可持续发展和财务团队都参与）。


              客户集中度是重大风险：公司公开具名客户只有 4 个，失去任何单一客户都会显著冲击收入。
