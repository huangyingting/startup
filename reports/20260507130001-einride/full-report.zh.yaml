      - number: '4.2'
        title: 单位经济性与资本效率
        blocks:
          - type: paragraph
            body: >
              **单位经济性框架：**

              单车经济性是 Einride 财务模型的核心单位。每部署一辆 EV 会产生：

              - 总收入：约 $325,000/vehicle/year（由 $65M ARR / 200 EVs 推算）

              - 车辆资本成本：每辆 Class 8 EV $350,000-600,000（Freightliner eCascadia 或同等车型）

              - 回本周期：按估计 TaaS 利润率，每辆车 2-3 年（早期规模毛利率 15-30%，随 Pod 自动驾驶降低司机成本而改善）

              - 自动驾驶 Pod 经济性（未来）：取消司机成本（每名司机约 $75,000/year）会在当前单车收入下把每条 Pod 路线利润率提高约 30-40 个百分点


              **资本密集度：**

              车队扩张需要大量资本：按每辆车平均 $400,000，从 200 辆 EV 扩到 600 辆需要约 $160M 车辆资本。这解释了为什么 $113M PIPE 和 SPAC 融资对 Einride
              的增长计划至关重要。


              **资本效率基准：**

              Einride 已融资约 $635M，产生约 $65M 已签约 ARR——资本效率比约 10x（已部署资本 vs. 已产生 ARR）。按 SaaS 标准这很差，但与包含大量车辆车队 CapEx 的重资产 TaaS
              模式大体一致。


              **毛利率轨迹：**

              毛利率未公开披露。行业对电动货运 TaaS 运营的估计显示，当前规模毛利率为 15-30%；随着自动驾驶 Pod 部署降低人工成本、软件收入占总收入比例提高，毛利率可扩至 35-50%。
            claimRefs:
              - CI005
              - CI006
              - CI007
              - CI008
