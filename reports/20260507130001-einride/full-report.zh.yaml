        - 关键
        - 没有毛利率数据，无法建模盈利轨迹
      - - 客户总数和按客户划分的收入集中度
        - 高
        - 量化客户集中风险
      - - Luminar 供应合同条款和替代 LiDAR 认证状态
        - 高
        - 关键供应商风险缓释评估
      - - NHTSA 豁免续期状态和 FMVSS 豁免历史
        - 高
        - 监管连续性评估
      - - AV 产品责任险保额上限
        - 高
        - 自动驾驶事故场景的尾部风险量化
      - - Pod 下一代工程里程碑和降本概念验证
        - 中
        - 技术路线图风险缓释
