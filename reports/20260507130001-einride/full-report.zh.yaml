      - number: '5.4'
        title: 路线图、研发与竞争定位
        blocks:
          - type: paragraph
            body: >
              Einride 的 2025-2028 产品路线图围绕三条线：(1) Pod next-gen——集成更强传感器，并通过 design-to-cost 工程把单车成本从约 $300K 降至 <$150K；(2)
              FMP 企业扩展——承运人 marketplace 功能和多式联运协调；(3) 自动驾驶规模化——把 Pod:operator 比例从 5-10:1 提高到 20:1+。


              从 200 辆扩到 600 辆 EV，到 2026-2027 仅车辆采购就估计需要 $160-240M——资本密集度很高，取决于 SPAC 是否完成。Einride 持有约 38
              个专利族，集中在远程监管、无驾驶舱架构和货运移动算法。Morgan Stanley 区分了 Einride 的窄 ODD 专精与聚焦高速的竞争者；在固定路线工业场景中，无驾驶舱 Pod 可把每英里人工成本降低约
              40%，但无法覆盖高速或城市路段。批评者指出「最后 10%」难题——施工、恶劣天气、应急车辆等边缘案例，让从受监管走向无监管 Level 4 的路径非线性，时间也不确定。
