chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 创立故事与使命
        blocks:
          - type: paragraph
            body: >
              Einride 由 Robert Falck 于 2016 在瑞典 Gothenburg 创立，使命是搭建全球首个商业规模的自动驾驶电动货运车辆网络。Falck 曾任职 Volvo Cars；他创办
              Einride 的判断是，货运交通约占全球 CO2 排放的 7%，必须用电动动力总成和自动驾驶技术重做。


              公司名称也折射出这套哲学：「Einride」来自北欧神话，让人想到孤独骑手——这是对自动、无司机货运车辆的隐喻。公司起步时看到的是，长途卡车行业同时面对结构性司机短缺（截至 2024，美国估计缺口超过
              80,000 名司机）和来自监管及货主的脱碳压力。


              Einride 的产品愿景是「Pod」：一款无人驾驶、电动、无驾驶舱的货运车辆。它在 2016 以概念形式亮相，到 2019 已开始在私人场地（例如封闭物流园区）商业运营。公司 Gothenburg
              总部承担工程和软件中枢职能；运营重心在美国市场（主要扩张市场），同时也在 Sweden 和其他欧洲市场商业部署。


              CEO Robert Falck 仍是公司的控制性人物和主要公开发声者。Falck 在 Volvo Cars 的背景（电气化项目经理）给了 Einride 大规模打造商用级电动货运车辆所需的汽车工程底子。
