      - number: '1.4'
        title: 团队、规模与市场背景
        blocks:
          - type: paragraph
            body: >
              领导层：Robert Falck（CEO 兼联合创始人）是主要公开面孔和主要股东。Einride 管理团队包括 Malin Liinamaa（此前为 CFO 晋升路径角色），以及具备
              Volvo、Tesla、McKinsey 背景的领导团队。公司全球约 500-600 名员工（按 2024 估计），主要分布在 Sweden 和美国。


              运营规模：截至 2025，Einride 约有 200 辆电动车投入商业运营。公司已完成超过 500,000 公里的商业电动货运运营。美国是主要扩张市场；Einride 在美国 7 个州和多个欧洲国家运营。


              市场背景：自动驾驶和电动货运市场仍处于商业化早期。美国重卡市场年规模约 $800B；未来 15 年转型周期内，电动商用货运的可服务市场估计为 $300-500B。围绕商业 EV 货运机会，Einride
              的竞争对手包括 Waymo Via、Gatik、Aurora、Kodiak Robotics（自动驾驶）以及传统 EV 卡车 OEM（Tesla Semi、Daimler eCascadia、Paccar
              electric trucks）。


              司机短缺（按 ATA，2024 美国司机缺口超过 80,000 人）和监管压力（California AB5、EU Green Deal 货运排放要求）同时给自动驾驶叙事和电动货运叙事带来结构性顺风。
