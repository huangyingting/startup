  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与当前财务位置
        blocks:
          - type: paragraph
            body: >
              Einride 通过运输即服务（TaaS）模式产生收入：与企业货主签署多年合同，收取月度车队费用（按承诺车日计算）和可变里程费。收入模式有三个关键组成部分：


              1. **车队运营收入** —— 最大组成部分；由商业部署 EV 数量乘以单车月度 TaaS 费用驱动。以约 200 辆在运营 EV 和 $65M 已签约 ARR 计算，隐含单车年收入约
              $325,000/vehicle——大体符合 Class 8 电动卡车按 TaaS 溢价运营的经济性。


              2. **软件 / 平台费** —— Freight Mobility Platform（Fleet Portal）订阅费，占总 TaaS 合同价值的一定比例。公司未单独披露；按可比 SaaS
              物流平台估计，占总合同收入 5-15%。


              3. **里程可变部分** —— 超出承诺车日最低值后的按英里可变费用；在高利用率阶段提供收入上行。


              估计财务位置（2024）：

              - 收入：$43-47M（分析师估计；未正式披露）

              - 已签约 ARR：约 $65M（SPAC 材料披露）

              - 净亏损：重大；未公开量化（与相似阶段的 SPAC 前深科技物流公司一致）

              - 现金 / 流动性：由 PIPE（$113M）和 Series C 既有现金（2022 融资 $500M）支撑；具体资产负债表未披露


              已签约 ARR（$65M）与收入（$43-47M）之间的差距说明，从签约到满量确认收入存在有意义的爬坡 / 开票周期滞后——企业车队 TaaS 部署通常如此，因为车辆必须采购、交付并投运后才能确认收入。
