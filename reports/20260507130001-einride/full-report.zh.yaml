            title: 概率加权预期回报约 1.2x，谈不上高；入场纪律很重要
            body: 从 $1.8B SPAC 价格出发，概率加权预期回报约为 1.2x——相对资本风险并不高。但如果 SPAC 赎回很重（>80%），上市后市场价格可能明显修正，为公开市场投资者创造更好的风险调整后入场点。
