      - number: '4.3'
        title: 融资历史与 SPAC 资本结构
        blocks:
          - type: paragraph
            body: |
              Einride 的融资历史反映机构认可逐步增强：

              **Series A（2019）：约 $25M**，EQT Ventures 领投。支持首批商业 Pod 运营和初步进入美国市场。

              **Series B（2021）：约 $110M**，SoftBank Vision Fund 2 和 Northzone 联合领投。支持美国扩张和传统 EV 车队建设。

              **Series C（2022）：约 $500M**，EQT Growth、Storebrand 等。当时欧洲最大一轮 AV 融资；支持完整美国 / 欧盟商业规模化。

              **SPAC（Nov 2025）：** 与 Legato Merger Corp. III 业务合并，企业价值 $1.8B；NYSE 上市待完成。SPAC 提供：
              - 无需承受 IPO 建簿波动，也能获得公开市场资本
              - 固定 $1.8B 估值上限，而不是由市场决定 IPO 价格
              - PIPE 共同投资者（$113M），为交易提供资本确定性

              **PIPE（Feb 2026）：$113M** 来自战略物流和能源投资者。

              **股权结构复杂度：** 多轮融资叠加 PIPE 和 SPAC 结构，让股权结构显著复杂。SPAC 结构中的权证稀释可能在上市后显著稀释现有股东。具体权证条款和稀释时间表见 S-4 filing。
