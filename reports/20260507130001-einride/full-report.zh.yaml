      - number: '2.3'
        title: 增长驱动因素与竞争动态
        blocks:
          - type: paragraph
            body: >
              **主要增长驱动 1：监管排放强制要求。** California Air Resources Board（CARB）的 Advanced Clean
              Trucks（ACT）规则要求大型车队运营商转向零排放车辆——到 2027 年，零排放卡车销量比例必须达到 40%。欧盟要求到 2030 年重型车辆 CO2 排放降低 45%（Fit for
              55）。这些强制要求让企业货主急于证明 EV 货运进展，也利好 Einride 这类 TaaS 运营商，因为它们能部署车队，而不要求货主自己管理 EV 基础设施。


              **主要增长驱动 2：司机短缺。** ATA 预计美国司机缺口到 2030 将超过 160,000（2024 约 80,000）。自动货运技术是解决这一短缺的唯一结构性方案——也是 Einride Pod
              自动驾驶叙事的关键中期顺风。


              **主要增长驱动 3：货主 ESG 承诺。** 68% 的 Fortune 500 公司有公开 Scope 3 排放目标（CDP 2024）。货运通常是最大的 Scope 3 排放类别；TaaS
              电动货运合同让这些公司能够报告实质性 Scope 3 进展。


              **约束。** 充电基础设施是 Class 8 EV 部署的硬约束：截至 2024，美国可公开使用、能够给 Class 8 卡车充电的 DC 快充桩少于 5,000 个（ChargePoint
              市场报告）。高前期资本成本（Class 8 EV 相比柴油车溢价：补贴前每辆 $150,000-250,000）意味着，只有 Einride 这样有资产支持的 TaaS 运营商才能吸收大车队运营所需资本。
