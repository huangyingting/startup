companyProfile:
  summary: >-
    Einride 是一家总部位于 Stockholm 的自动货运公司，由 CEO Robert Falck（前 Volvo Cars）于 2016 创立。公司制造并运营电动货运卡车，包括无驾驶舱、自动驾驶的 Einride
    Pod（受监管 Level 4）和传统 EV 车型。Freight Mobility Platform (FMP) 是自研 SaaS 层，提供车队管理、路线优化、碳 Scope 3 跟踪和 AI 物流。Einride 在美国 7
    个州及 Sweden/EU 运营，约 200 辆 EV 投入商业服务，累计自动驾驶里程超过 500,000 公里。November 2025，Einride 宣布与 Legato Merger Corp. III 进行 SPAC
    合并，企业价值 $1.8B；$113M PIPE 已于 February 2026 完成。客户包括 Heineken、PepsiCo/Frito-Lay、Carlsberg Sweden 和 GE Appliances。SPAC
    前累计融资超过 $635M（EQT Growth Series C $500M、SoftBank Vision Fund 2 Series B $110M）。Einride 是第一辆驶上欧洲公共道路的 AV（与 DB
    Schenker 合作，2019）。
