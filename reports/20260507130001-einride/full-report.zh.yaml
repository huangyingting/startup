      - number: '1.2'
        title: 商业模式与产品
        blocks:
          - type: paragraph
            body: >
              Einride
              采用「运输即服务」（TaaS）模式：公司不直接出售车辆，而是按公里、托盘或月度订阅式车队部署出售货运能力。客户（通常是消费品公司、物流运营商和大型制造商）签署多年合同，约定电动车辆和路线数量；Einride
              提供车辆、司机（需要时）、软件平台、充电基础设施支持和车队管理。


              产品组合：

              1. Einride Pod：无驾驶舱、具备自动驾驶能力的电动货运车辆，面向封闭场地，并最终面向公共道路自动驾驶运营。Pod 由 Einride Remote Operations Center
              的操作员远程监管。截至 2025，Pod 主要在私人路线和获许可路线运营。


              2. 电动卡车（传统车型）：Einride 在传统路线中部署市售电动半挂卡车（例如 Freightliner eCascadia、Peterbilt 579EV），并纳入自身车队管理体系。这构成其商业车队（约
              200 辆 EV）的大多数，也是当前主要收入来源。


              3. Freight Mobility Platform（Fleet Portal）：云端软件，覆盖路线规划、实时车辆跟踪、司机绩效监控、充电优化、碳报告和车队分析。相比商品化 EV
              租赁，这个平台是中期主要差异化。


              收入主要来自 TaaS 合同：按承诺车日收取月费，另加可变里程费。已签约 ARR 约 $65M（2025），代表已签多年合同的年化价值；多数合同期限为 3-5 年。
