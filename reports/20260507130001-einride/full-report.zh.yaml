      - number: '3.2'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              **Aurora Innovation（AUR）** —— 运营最领先的自动货运竞争者。Aurora 的自动驾驶系统（Aurora Driver）在 April 2024 于 Texas
              完成首批商业化、完全无人驾驶 Level 4 卡车运输（Dallas 到 Houston）。Aurora 与 Volvo Trucks（OEM 集成）合作，并通过网络运营商（Uber
              Freight、Werner、Schneider）运营，而不是自有卡车。Aurora 在 2021 IPO SPAC 中以 $13B 估值融资 $820M；IPO 后市值到 2025 降至约
              $1.5-2B。Aurora 相对 Einride 的优势：美国公共高速无司机运营已获联邦层面批准；劣势：没有 TaaS 车队，是纯技术授权模式，也没有直接货主关系。


              **Waymo Via** —— Alphabet 的货运自动驾驶部门。在 Phoenix AZ 运营 Waymo Trucking（Class 8），利用 Waymo
              无可匹敌的自动驾驶数据和技术护城河。Waymo Via 未公开披露商业收入；它是 Alphabet 内部资金充足的一项押注，没有 IPO 路径。Waymo Via 的优势：AV 技术护城河最深；劣势：没有
              TaaS 模式，没有直接货主关系，以技术开发商身份运营。


              **Gatik** —— 封闭网络里的短途（中间里程）自动驾驶卡车。它在可重复的固定路线上为 Walmart、Loblaw 等客户运营 Level 4 AV，并已在 Arkansas 和 Texas
              获准无人驾驶运营。Gatik 的模式最接近 Einride 的固定路线运营思路——比 Aurora 或 Waymo Via 更直接竞争。Gatik 累计融资约 $85M；资本化程度显著低于
              Einride（$635M+）。


              **Daimler Trucks EaaS** —— Einride TaaS 模式近期最危险的商业威胁。Daimler（eCascadia）现在提供打包
              EV-as-a-Service，包含卡车、维护和充电接入，且客户无需资本投入——直接争夺同一批企业 CPG 和工业货主关系。Daimler 的优势：既有 OEM
              关系、品牌信任、服务网络。劣势：没有自动驾驶栈，没有数据平台。
