      - number: '6.3'
        title: 采用轨迹与扩张风险
        blocks:
          - type: paragraph
            body: >
              Einride 的采用路径，是先拿下大型企业账户，再在单个客户关系里扩充部署车队。PepsiCo 是最成熟的例子：最初的 Frito-Lay 部署只是单路线试点，后来扩到多个 Pod 任务。公司 2025 年签约
              ARR 为 $65M，而估计收入为 $43-47M，说明已有合同覆盖未来收入，并可能把车队扩张嵌进了现有协议。


              扩张风险不小：Einride 的客户基础在地域上集中于 7 个美国州和瑞典，在行业上集中于 CPG 和家电。一旦大型 CPG 公司在下行周期冻结可持续投入，或竞争对手在续约时加大价格压力，Einride
              会面临明显流失风险。缺少公开 NRR 指标，也无法量化评估留存。


              司机短缺的顺风（截至 2024 年，美国缺口超过 80,000 人）会继续支撑自主 / 电动货运方案需求，但这一宏观因素惠及所有车队运营商，并非只利好 Einride，也挡不住客户切换到其他 TaaS 供应商。
