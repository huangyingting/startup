      - number: '4.4'
        title: 财务风险与资本充足性
        blocks:
          - type: paragraph
            body: >
              **关键财务风险：**


              1. **SPAC 执行风险。** 如果 SPAC 未能完成（例如股东投票失败、SEC 审查无法解决，或 Legato SPAC 发起人退出），Einride 会失去计划中的公开市场融资。公司历史融资约
              $635M，且大量现金已投入车队资产；SPAC 失败会迫使公司进行私募过桥融资，或大幅收缩运营。


              2. **车队资本密集。** 每新增一辆 EV 需要 $350,000-600,000 资本。按 Einride 的规模目标（600+ 辆 EV 支撑 $200M ARR），仅车辆 CapEx 就需要
              $160M-240M——必须依靠 SPAC 募资或债务融资才能执行。


              3. **收入确认滞后。** 已签约 ARR（$65M）与当前收入（约 $43-47M）的差距，反映了车辆投运和路线爬坡到满负荷所需时间。如果合同执行延误（车辆交付延迟、许可问题），ARR 可能夸大近期现金收入。


              4. **盈利前烧钱速度。** 公司未披露财务数据，烧钱速度未知。以 500-600 名员工和约 $400M 车队资产计算，年度运营成本基数很可能超过 $100M，即使有 $65M ARR，也会产生重大负
              EBITDA。现金跑道完全取决于 SPAC/PIPE 资本。


              5. **SPAC 权证稀释。** SPAC 后，公开权证可能使现有股权持有人被稀释 15-30%，具体取决于赎回率。创始人和早期投资者会面对复杂的锁定期和稀释动态。
            claimRefs:
              - CI013
              - CI014
              - CI015
              - CI016
