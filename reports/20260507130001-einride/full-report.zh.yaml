      - number: '2.4'
        title: 市场规模估计 — TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              下面的框架从三个层级估算 Einride 的市场机会。


              **TAM：全球商用货运脱碳。**

              美国重卡市场：每年约 $800B（卡车公司和中介收入）。全球商用货运市场：每年 $4-5 trillion。如果到 2035 有 10-15% 最终转向电动 TaaS 运营（与监管要求一致），全球 TAM 为
              $400-600B。


              **SAM：北美和欧洲电动化中程货运 TaaS。**

              Einride 的运营模式——面向企业货主的 50-300 英里电动路线多年合同——对应当前美国 / 欧洲 $15-25B 市场；随着 EV 采用加速，到 2030 估计达到 $80-120B。


              **SOM：Einride 现实的近期可获取份额。**

              以 $65M 已签约 ARR（2025）和估计 200 辆 EV 车队计算，Einride 在当前 SAM 中占比低于 0.5%。到 2028 年 ARR 增长 3x 至 $200M（假设车队继续扩张，且自动驾驶
              Pod 部署改善利润率）符合乐观情景，但需要资本支撑。


              自动驾驶 Pod 可能制造市场错位——如果 Level 4 自动货运在 2027-2028 获得美国联邦层面的公共道路批准，Einride 的 SOM 会大幅扩张（没有司机成本 =
              相比所有人类驾驶的电动货运竞争对手，成本位置根本性更低）。
