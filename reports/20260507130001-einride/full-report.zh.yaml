              Einride 当前 TaaS 业务（4 个客户、$43-47M 收入、有监督 AV）可支撑 6-8x 收入估值，也就是 $260-380M。$1.8B 价格嵌入了 $1.4-1.5B
              的自动驾驶技术可选性——尚未商业实现的无监督 Level 4 运营未来价值。投资者必须相信 L4 时间线，才能证明按 SPAC 价格入场合理。
