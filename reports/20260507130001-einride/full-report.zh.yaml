        - id: n3
          label: 车辆分配（Pod 或 EV）
          detail: Pod 分配给地理围栏工业 ODD；eCascadia/Peterbilt 用于高速路线
          type: process
        - id: n4
          label: 自动驾驶 / 监督运输
          detail: Pod 由远程操作员监督（5-10:1 比例）；EV 由专业司机驾驶
          type: process
        - id: n5
          label: 交付确认
          detail: FMP 遥测捕捉交付凭证；门户向客户发送通知
          type: process
        - id: n6
          label: Scope 3 排放记录
