      - number: '5.2'
        title: 技术栈与自动驾驶能力
        blocks:
          - type: paragraph
            body: >
              Pod 的自动驾驶系统基于传感器融合架构，结合 LiDAR、radar、camera 和 GPS/IMU 输入。感知、规划和控制栈为自研，在 Gothenburg 和 San Francisco 开发。不同于
              Waymo 或 Aurora，Einride 走的是窄 ODD 专精路线——优化一组明确的低速、地理围栏工业路线，而不是追求通用高速或城市自动驾驶。


              远程监管模式是核心技术差异化：Pod 操作员用多车界面实时监管车队，不必等待完全无监管 Level 4 认证即可快速扩张。远程操作栈使用 4G/5G 蜂窝连接传输视频流和低延迟干预指令。软件侧，FMP 通过
              API 与企业 TMS 系统集成，包括 SAP TM 和 Oracle TMS。关键技术依赖包括：Freightliner 和 Peterbilt（OEM 供应）、Luminar（LiDAR）、NVIDIA
              Orin（计算平台）、AWS（云）以及 Verizon/T-Mobile（连接）。Pod 的 AV 栈通过 ISO 26262 ASIL-D 功能安全标准认证。
