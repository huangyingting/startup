      - number: '8.2'
        title: 情景分析：乐观 / 基准 / 悲观
        blocks:
          - type: paragraph
            body: >
              乐观情景（30% 概率）：Einride 成功关闭 SPAC，信托收益充足，到 2027 年部署 600 辆 EV，2028 年实现无监督 Level 4 Pod 运营，2030 年签约 ARR 增至
              $300M。按 15-20x 前瞻 ARR，可支撑 $4.5-6B 估值——较 $1.8B SPAC 价格为 2.5-3.3x。


              基准情景（50% 概率）：SPAC 以中等赎回关闭（$50-80M 信托净收益 + $113M PIPE = 总资本约 $165-193M），车队到 2027 年扩至 400 辆 EV，签约 ARR 到 2028
              年增至 $150-175M。Pod AV 有监督模型继续充当商业底线；L4 滑到 2029-2030 年。按 10-12x 前瞻 ARR，可支撑 $1.5-2.1B 估值——相对 $1.8B SPAC
              价格大致持平到 1.2x。基准情景下，按 SPAC 价格进入回报有限；资本增值主要留给早期轮投资者。


              悲观情景（20% 概率）：SPAC 在高赎回下关闭（信托净收益低于 $30M），车队扩张停滞，PepsiCo/Frito-Lay 不续约，L4 延迟到 2032 年之后。到 2028 年收入仅缓慢增至
              $60-80M，并需要以困境条款做桥接融资。按 6-8x 收入，可支撑 $360-640M 估值——公开市场投资者相对 $1.8B SPAC 价格亏损 60-80%。
