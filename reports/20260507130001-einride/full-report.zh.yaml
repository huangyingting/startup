        - id: p7
          label: CEO Robert Falck 离任
          x: 20
          'y': 80
          note: 严重性高；近期可能性低
        - id: p8
          label: EU AV 监管延迟
          x: 75
          'y': 55
          note: 对 EU 扩张为中等严重性；可能性高 — EU AV 协调缓慢
        - id: p9
          label: 竞争对手（Aurora）ODD 扩张至工业场景
          x: 40
          'y': 65
          note: 严重性中高；到 2027-2028 年可能性中等
    xLabel: 可能性
    yLabel: 严重性
    approximationNotes: 风险位置基于公开披露、监管分析和行业基准的定性估计。
    claimRefs:
      - CR001
      - CR006
      - CR011
      - CR016
      - CR017
  - id: FR002
    title: 风险传导图
    type: flow
    layout: standard
    summary: |
      风险传导链展示 SPAC 执行失败如何向 Einride 的资本、
      商业和技术风险层层传导。
    data:
      nodes:
        - id: n1
          label: SPAC 赎回率 > 80%
          detail: 股东赎回信托股份；信托净收益接近零
          type: input
        - id: n2
          label: 净资本 = 仅 $113M PIPE
          detail: 不足以支撑 $160-240M 车队扩张 + $50-100M Pod 研发
          type: process
        - id: n3
          label: 车队扩张卡在 ~200 辆 EV
          detail: 无法新增车辆以达成签约 ARR 增长目标
          type: process
        - id: n4
          label: 收入增长放缓，低于计划
          detail: 没有新车队部署，$65M 签约 ARR 无法继续增长
          type: process
        - id: n5
          label: Pod 下一代研发延期
          detail: 单位成本降至 <$150K/unit 的路径停滞；TaaS 经济性仍承压
          type: process
        - id: n6
          label: NYSE 上市面临风险 / 需要桥接融资
          detail: Einride 必须以困境条款筹集桥接资金，或寻找战略收购方
          type: output
      edges:
        - from: n1
          to: n2
          label: 降低净资本
        - from: n2
          to: n3
          label: 卡住 CapEx
        - from: n2
          to: n5
          label: 卡住研发
        - from: n3
          to: n4
          label: 约束增长
        - from: n5
          to: n4
          label: 推迟单位经济性改善
        - from: n4
          to: n6
          label: 触发资本危机
    approximationNotes: null
    claimRefs:
      - CR006
      - CR007
      - CR008
      - CR009
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: standard
    summary: |
      Einride 的关键依赖网络，展示监管许可、供应商部件和资本
      如何相互牵制，并共同支撑商业运营。
    data:
      nodes:
        - id: n1
          label: NHTSA FMVSS 豁免
          detail: 需要每年续期；必须符合 ODD 限制
        - id: n2
          label: Luminar LiDAR 供应
          detail: 存在财务困境风险；Luminar 是 Einride 主要 LiDAR 供应商
        - id: n3
          label: NVIDIA Orin 计算平台
          detail: 深度集成；未披露备用平台；对 AV 技术栈至关重要
        - id: n4
          label: SPAC 资本（$113M PIPE + 信托）
          detail: 车队扩张必需；信托收益存在赎回风险
        - id: n5
          label: Daimler/PACCAR OEM 供应
          detail: Class 8 EV 交付周期 12-18 个月；若供应中断，车队扩张受阻
        - id: n6
          label: Pod AV 商业运营
          detail: 7 个美国州 + 瑞典的监督式自动货运
        - id: n7
          label: EV 车队扩张（200→600）
          detail: 当前收入增长路径；资本开支重
        - id: n8
          label: FMP SaaS 平台
          detail: 托管在 AWS；靠软件集成提升客户留存
        - id: n9
          label: NYSE 上市
          detail: 待 SEC + 股东批准；上市公司资金成本需要这一事件支撑
      edges:
        - from: n1
          to: n6
          label: 需要许可
        - from: n2
          to: n6
          label: 传感器供应
        - from: n3
          to: n6
          label: 计算供应
        - from: n4
          to: n7
          label: CapEx 资金
        - from: n5
          to: n7
          label: 车辆供应
        - from: n6
          to: n8
          label: 遥测数据
        - from: n7
          to: n8
          label: 车队数据
        - from: n4
          to: n9
          label: 资本事件
        - from: n9
          to: n7
          label: 支撑增长
    approximationNotes: null
    claimRefs:
      - CR001
      - CR011
      - CR013
      - CR014
      - CR021
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: |
      Einride 投资建议的决策逻辑，以 SPAC 信托赎回结果
      和 L4 时间线信心为门槛。
    data:
      nodes:
        - id: n1
          label: SPAC 成功完成交割
          detail: NYSE 上市完成；股东投票通过
          type: input
        - id: n2
          label: 信托赎回 < 50%
          detail: '>$100M 信托净收益 + $113M PIPE = >$213M 总资本'
          type: process
        - id: n3
          label: 信托赎回 > 80%
          detail: <$30M 信托净收益；资本计划不足
          type: process
        - id: n4
          label: 按或低于 SPAC 价格进场
          detail: 在上市后回调中投资；基准情景回报 0.8-1.2x；乐观情景 2.3-3.6x
          type: process
        - id: n5
          label: 等待 SPAC 后修正
          detail: 观察上市后 20-30% 下跌；风险调整后入场点更好
          type: process
        - id: n6
          label: L4 AV 时间线兑现
          detail: NHTSA 规则制定推进；Pod 下一代按计划
          type: process
        - id: n7
          label: 高确信买入 — 持有至 2028
          detail: 完整投资逻辑成立；到 2030 年乐观情景回报 2.5-3.3x
          type: output
        - id: n8
          label: 观察 — 以 2027 ARR 复评
          detail: 仅基准情景；回报 0.8-1.2x；若到 2027 年 ARR <$100M 则退出
          type: output
      edges:
        - from: n1
          to: n2
          label: 低赎回
        - from: n1
          to: n3
          label: 高赎回
        - from: n2
          to: n4
          label: 资本计划可行
        - from: n3
          to: n5
          label: 等待回调
        - from: n4
          to: n6
          label: 进场后
        - from: n6
          to: n7
          label: L4 按计划
        - from: n6
          to: n8
          label: L4 不确定
    approximationNotes: null
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV020
  - id: FV002
    title: 估值敏感性
    type: range
    layout: standard
    summary: |
      Einride 在 2028 年退出时，估值对 ARR 增长和 EV/ARR 倍数假设
      在乐观、基准、悲观情景下的敏感性。
    data:
      items:
        - label: 悲观情景 2028 估值
          low: 360
          base: 500
          high: 640
          note: $60-80M ARR x 6-8x；SPAC 资金薄、L4 延期、客户流失
        - label: 基准情景 2028 估值
          low: 1500
          base: 1800
          high: 2100
          note: $150-175M ARR x 10-12x；监督式 AV 延续；车队温和增长
        - label: 乐观情景 2028 估值
          low: 4200
          base: 5000
          high: 6400
          note: $280-320M ARR x 15-20x；2028 年部署 L4；600 辆 EV 车队
        - label: 当前 SPAC EV
          low: 1800
          base: 1800
          high: 1800
          note: SPAC 于 Nov 2025 宣布，EV $1.8B；无上行情景区间
    approximationNotes: 美元数值为百万美元。估值倍数基于可比公司分析和 AV 技术期权价值评估。
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: |
      以 $1.8B SPAC 价格为起点的投资者回报情景，覆盖乐观、基准、
      悲观三种情景，并给出概率加权预期回报。
    data:
      items:
        - label: 悲观情景回报（20% 概率）
          low: 0.2
          base: 0.3
          high: 0.4
          note: 亏损 60-80%；SPAC 资本薄 + 关键客户流失 + L4 延期
        - label: 基准情景回报（50% 概率）
          low: 0.8
          base: 1
          high: 1.2
          note: 持平至小幅亏损；监督式 AV 托底；没有 L4 溢价
        - label: 乐观情景回报（30% 概率）
          low: 2.3
          base: 2.8
          high: 3.6
          note: 2.3-3.6x；L4 解锁；车队扩至 600 辆 EV
        - label: 概率加权预期回报
          low: 1
          base: 1.2
          high: 1.5
          note: 0.2x(0.20) + 1.0x(0.50) + 2.8x(0.30) = 1.18x 预期回报
    approximationNotes: 回报倍数从 SPAC 价格（$1.8B EV）计算。概率为主观评估；概率加权回报仅作示意。
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      SPAC 上市后需要跟踪的关键投资指标和价值创造信号。
    data:
      items:
        - label: SPAC 信托净收益
          value: 'Target: >$100M'
          note: 入场阈值；低于 $100M = 资本计划不足以支撑基准情景
        - label: 签约 ARR（2024）
          value: $65M
          note: 已在 SPAC 材料披露；达到运行率的 1.4-1.5x；留存信号正面
        - label: EV/ARR 倍数（当前）
          value: ~28x forward ARR
          note: 偏高，但与 AV 技术期权定价一致
        - label: 2027 ARR 否决指标
          value: '>$100M ARR by Q4 2027'
          note: 若未达标，投资逻辑破裂 — 车队扩张不足
        - label: L4 NHTSA 许可里程碑
          value: 'Target: rulemaking by 2029'
          note: 若到 2029 年仍未取得，以 6-8x 收入倍数重新估值（TaaS 底部）
        - label: 概率加权预期回报
          value: ~1.2x from SPAC price
          note: 预期回报有限；离散度高（悲观 0.2x / 乐观 3.6x）
    approximationNotes: null
    claimRefs:
      - CV001
      - CV019
      - CV020
