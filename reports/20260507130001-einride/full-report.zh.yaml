  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与规模
        blocks:
          - type: paragraph
            body: >
              Einride 参与两个相互重叠的市场。必须分开理解，才不会把机会兑现时间线完全不同的市场混在一起。


              **市场 1：电动商用车（ECV）货运运营** —— 部署并运营电动卡车做商业货运的公司，可以是资产自营模式（拥有卡车、运营路线），也可以是服务化合同。这是 Einride 今天真正产生收入的市场。全球 ECV
              市场 2023 年价值约 $30B（BloombergNEF），预计到 2030 年达到 $280-400B，主要由欧盟和中国的零排放货运强制要求推动。


              美国分部——Einride 的主要收入市场——规模更小，但增长更快。截至 2024 年底，美国 Electric Class 8（重型）卡车部署估计达到 5,000-8,000 辆（仅占在运营 Class 8
              卡车总量 3.5M 的很小一部分）。EV 与柴油卡车的 TCO 平价预计在 2025 到 2028 之间到来，取决于路线类型、能源成本和激励可得性。


              **市场 2：自动货运** —— 在公共道路上商业可行的无人驾驶货运运营。这基本仍是未来机会；截至 2026，没有公司在美国公共高速上以商业规模运营无监管 Level 4 自动驾驶重型货运卡车。Waymo Via
              和 Aurora Innovation 是最先进的公共道路 AV 货运运营商；Einride 的 Pod 主要在受控或获许可环境运营。自动货运市场的 10-15 年期 TAM 估计为 $1.1
              trillion（Morgan Stanley、McKinsey），但近期（2026-2030）收入很小。


              Einride 当前收入几乎全部来自市场 1（ECV 运营）；市场 2（自动驾驶）是一项内嵌期权价值，用来支撑 SPAC 中 39-42x 的收入倍数。
