      - number: '4.5'
        title: 展品
        blocks:
          - type: callout
            title: SPAC 未能完成会成为 Einride 的生死级资本事件
            body: >
              Einride 的增长计划完全依赖 SPAC 成功完成。PIPE 提供 $113M 过桥资本，但如果没有 SPAC 募资和公开市场资本渠道，Einride 无法为车队从 200 辆扩至 600+ 辆 EV
              提供资金，也就无法达到 $200M ARR。SPAC 失败会迫使公司以可能更低的估值进行私募过桥融资，或收缩运营。SPAC 的 H1 2026 目标已经延后，执行风险上升。
            calloutType: risk
            claimRefs:
              - CI013
              - CI014
          - type: callout
            title: 自动驾驶 Pod 是财务模型转型的关键
            body: >
              Einride 当前毛利率（估计 15-25%）符合重资产物流公司的典型水平，并不具备溢价。真正改变财务模型的事件，是自动驾驶 Pod 的规模化部署：每车取消 $75-90K/year 的司机成本，会让每条
              Pod 路线增加约 25-35 个百分点毛利率。这会把 Einride 的财务模型从资本密集型物流公司，推向具备 SaaS 式利润率扩张潜力的技术赋能物流平台。
            calloutType: insight
            claimRefs:
              - CI007
              - CI008
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与资产组合
        blocks:
          - type: paragraph
            body: >
              Einride 的产品组合是一套垂直整合的货运移动平台，把实体 EV 车队资产与自研软件层结合起来。旗舰硬件资产是 Einride Pod——一款完全自动驾驶、无驾驶舱、Class 8
              等级的电动车，面向固定路线、低速工业物流（港口到仓库、工厂到配送中心）。Pod 由人类操作员远程控制；操作员可以同时监管多辆车，使一名操作员最多管理 10 辆 Pod，而传统卡车是 1:1 配比。


              传统电动车队（Freightliner eCascadia、Peterbilt 579EV、Scania PHEV）承担高速和可变路线任务，这些任务中 Pod 尚未获认证。这些车辆运行在同一个 Freight
              Mobility Platform 内，提供统一的远程信息处理、任务规划和碳报告。


              Freight Mobility Platform（FMP）是 SaaS 骨干：一个云原生车队编排系统，处理路线优化、车辆调度、实时遥测、司机 / 操作员分配和 Scope 1-3 排放核算。FMP
              是关键软件护城河——它聚合跨车队运营数据，并生成可审计排放报告；随着欧盟 CSRD 合规要求上升，这类报告越来越能支撑溢价定价。截至 2024-2025，Pod 累计行驶 500,000+ 公里，并在美国 7
              个州及 Sweden 商业运营。
