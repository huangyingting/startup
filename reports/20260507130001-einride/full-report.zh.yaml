      - number: '8.4'
        title: 建议与尽调追问
        blocks:
          - type: paragraph
            body: >
              建议：MONITOR，只有在 SPAC 关闭确认且赎回后信托资本超过 $100M 时，才有更高信心入场。Einride 的 TaaS 业务真实存在，已被蓝筹 CPG 客户商业验证，FMP
              软件护城河也带来可防守的留存。但 $1.8B 估值已经把自动驾驶路线图和车队扩张的成功执行计入价格，而这些事件仍有重大不确定性。


              投资立场：只有当信托赎回低于 50%（意味着信托净收益超过 $100M，加 $113M PIPE，总资本超过 $213M）时，才考虑按 SPAC
              价格持有。若赎回很重（>80%），资本计划太薄，无法执行增长路线图，投资案例会弱化到低于 $1.8B 公允价值。


              估值立场：偏高。39-42x 的 2024 年收入倍数，适合一家收入已经验证、且自动驾驶技术确定性很高的公司；但 Einride 当前商业阶段（有监督 AV、4 个客户、尚未盈利）还不够成熟，除非 L4
              执行兑现，否则无法支撑完整倍数。


              风险评级：高。SPAC 执行风险、客户集中度、AV 监管不确定性和资本充足性风险相互叠加。适合投资期 5 年以上、风险承受力高，并相信 AV 技术论点的投资者。
