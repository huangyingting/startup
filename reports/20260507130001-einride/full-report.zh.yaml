              Luminar Technologies 股价自 2023 年以来下跌 85%，并在 2024-2025 年裁员、重组。作为 Einride 的主要 LiDAR 供应商，如果 Luminar
              生产失败，Einride 需要 12-24 个月重新认证替代供应商——这会打断新车队部署，并迫使 AV 技术栈重构。
            calloutType: insight
