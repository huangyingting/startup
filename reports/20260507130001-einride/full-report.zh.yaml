      - number: '7.4'
        title: 商业、竞争与人员风险
        blocks:
          - type: paragraph
            body: >
              商业风险集中在 4 个客户组合上。PepsiCo/Frito-Lay 估计是按车队规模最大的客户；合同到期不续约，可能造成 20-35% 的收入冲击。OEM Electric as a
              Service（EaaS）项目（Daimler、Volvo、PACCAR）在续约时会提供更低成本替代方案——这些 OEM 项目提供没有自研软件差异化的电动车队，但定价可能比 Einride 的 TaaS 费率低
              15-25%。


              来自 Aurora Innovation 的竞争风险真实存在，但 ODD 不同：Aurora 面向美国公共道路高速货运（2024 年在 Texas 启动无人驾驶商业卡车运输），Einride 面向固定路线工业
              ODD。但 Aurora 的技术轨迹显示，它可能在 2026-2028 年切入工业 ODD。如果 Aurora 提供可比的窄 ODD AV 能力，Einride 的自动驾驶技术溢价就会承压。


              人员风险中等。CEO Robert Falck 是 Einride 的公众面孔和战略架构师；如果他离任，将是重大事件。工程领导团队集中在 Gothenburg——欧盟人才市场上，Volvo、NVIDIA 和大型
              AV 实验室的竞争会带来留才压力。Einride 的 SPAC 后股权流动性事件会帮助留才，但 SPAC 延迟会让持股员工产生挫败感。


              司机短缺顺风也有风险：如果美国货运量在衰退中下降，或自动驾驶卡车监管加速，让传统司机以更低成本可用，Einride 围绕司机短缺的价值主张会被部分削弱。
