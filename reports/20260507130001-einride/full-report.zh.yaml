          - type: callout
            title: 有监督 AV 模型既是 Einride 的强项，也是天花板——L4 仍是高风险奖品
            body: >-
              有监督 Pod 运营今天已经产生真实商业收入，也是一门有防御力的生意。但 Einride 的 $1.8B 估值定价的是未来无监督 L4 经济性。「最后 10%」长尾难题让通往无监督 L4
              的路径非线性且不确定，在当前有监督运营和支撑估值的完全自动驾驶经济性之间，留下了很长的落差。
