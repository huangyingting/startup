      - number: '8.3'
        title: 可比估值基准
        blocks:
          - type: paragraph
            body: >
              Aurora Innovation 是最相关的可比公司：Aurora 在 2021 年 11 月以约 $11B 企业价值完成 SPAC，当时收入接近零。到 2024 年（在 Texas 商业启动），Aurora
              市值已降至约 $3.5B，收入 $23M——倍数降到约 150x。Einride 以 $43-47M 收入对应 $1.8B 企业价值，收入倍数明显更好，但承担类似的 AV 技术和监管风险。


              Gatik AI 以约 $600M 估值完成 SPAC，同样聚焦固定路线自动驾驶货运；相较 Einride，Gatik 车队更小，ODD 更窄。


              企业车队物流 SaaS（project44、e2open）在 2024-2025 年市场交易于 6-12x 前瞻收入；Einride 的 28x 前瞻 ARR 倍数，意味着市场定价的是大量 AV
              技术可选性，而不是纯车队运营价值。


              如果把 Einride 纯粹按 TaaS 车队运营商估值（不给 AV 溢价），6-8x 收入倍数意味着 $258-376M 估值——较 SPAC 价格折价 79-86%。$1.8B 估值中嵌入的 AV 技术溢价约
              $1.4-1.5B，必须靠未来自动驾驶经济性来证明。
