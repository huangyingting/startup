      - number: '5.3'
        title: 信任、合规与安全
        blocks:
          - type: paragraph
            body: >
              Einride 的安全与合规姿态是商业采用的核心。Pod 在美国 7 个州持有 NHTSA AV 部署许可，并自 2019 起依据 Swedish Transport
              Agency（Transportstyrelsen）监管运营。Einride 发布年度安全报告，Pod 控制系统已达到 ISO 26262（汽车功能安全）合规。FMP 已获得 SOC 2 Type II
              数据安全认证，这是企业采购的关键要求。


              受监管 AV 卡车（包括 Einride 车队）在 2024 报告的安全关键干预为每 100,000 英里 12 次——低于早期部署行业平均水平，但也说明远程人工监管仍然必要。安全倡导者质疑，如果没有完整的联邦
              AV 框架，无驾驶舱 Pod 设计的 FMVSS 豁免能否长期维持。


              排放报告模块对齐 GHG Protocol（Scope 1-3），用于生成符合 CSRD 的 Scope 3 数据。截至 early 2026，碳审计的第三方验证仍在进行。
            claimRefs:
              - CE009
              - CE015
              - CE016
              - CE020
              - CE025
