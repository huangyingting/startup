              Einride 的客户证据是真实的，但样本很窄。Heineken 的合作从 2021 年延续至今，并公开提到在瑞典跑零排放货运。PepsiCo 在美国的 Frito-Lay 部署（Irving, Texas
              工厂）最具运营含金量：一条基于自动驾驶 Pod、连接工厂和配送中心的路线，自 2022 年起连续运行。Carlsberg Sweden 在 2023 年签了多年期零排放运输协议。GE Appliances 在
