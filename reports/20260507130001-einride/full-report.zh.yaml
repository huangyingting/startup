      - number: '2.2'
        title: 市场分层与目标客户
        blocks:
          - type: paragraph
            body: >
              Einride 的可服务客户群是中大型企业货主，通常具备：

              - 多站点美国或欧洲物流网络

              - 已承诺 Scope 3 脱碳目标（CDP、SBTi）

              - 平均 50-300 英里货运线路（在当前 EV 续航内）

              - 愿意签署 3-5 年 TaaS 合同


              按垂直行业划分的客户分部：


              **消费包装品（CPG）——核心分部。** Heineken、PepsiCo、Carlsberg 这类公司拥有庞大、重复性高的配送网络，也承受来自零售商（Walmart、Target）的高 Scope 3
              排放压力。该分部已经证明，客户愿意为符合 ESG 的货运支付溢价。


              **工业制造与家电。** GE Appliances 是这个分部的典型案例：货运量大且可预测，并拥有多设施美国制造网络。关键采购标准是可靠性和总成本，而不只是 ESG。


              **零售与电商。** 这类客户在 Einride 已披露客户集中不算突出，但顺理成章会成为下一类分部：从配送中心到零售或履约枢纽的高频、中距离路线。


              Einride 的 TaaS 合同模式把客户获取限制在能承诺多年预算的企业——通常是 Fortune 1000 公司。这会压窄短期 SAM，但显著提高收入可预测性。


              地理：美国是 Einride 的主要增长市场（截至 2024 为 7 个州）；Sweden 和其他欧盟市场提供第二收入底座。欧盟监管压力（Fit for 55、重型车辆 CO2
              强制要求）让欧洲成为强长期市场，但商业爬坡慢于美国。
