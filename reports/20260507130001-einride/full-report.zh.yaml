  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图概览
        blocks:
          - type: paragraph
            body: >
              Einride 面对的竞争横跨自动 / 电动货运栈的四个不同层次：


              **第 1 层：自动货运技术公司。** Aurora Innovation（NASDAQ: AUR）、Waymo Via（Google/Alphabet）、Gatik 和 Kodiak Robotics
              开发面向货运的 Level 4 自动驾驶系统。Aurora 在 April 2024 完成 Dallas 到 Houston 的首次完全商业化 Level 4
              无人驾驶卡车运输，成为公共道路自动货运中运营最领先的竞争者。Aurora 采用授权 / 合作模式（Uber Freight、Werner Enterprises、Schneider），而不是拥有车辆——这不同于
              Einride 的 TaaS 模式。


              **第 2 层：电动卡车 OEM 和 EaaS 提供商。** Daimler Trucks（eCascadia）、Peterbilt（579EV）、Kenworth（T680E）和 Volvo Trucks
              提供电动商用车，并正在推出 Electric-as-a-Service（EaaS）项目，把车辆 + 充电 + 维护打包，但缺少自动驾驶技术和数据软件平台。因为 OEM 有品牌信任和既有车队客户关系，这些 OEM
              项目是 Einride TaaS 模式最可规模化的竞争威胁。


              **第 3 层：原生 EV 运营商和创业公司。** Xos Trucks、Nikola Motor（NASDAQ: NKLA）和 Hexagon Purus
              面向特定分部（最后一英里、垃圾清运、中型车辆）运营电动商用车队。Nikola 在 November 2024 破产，暴露了 EV 卡车硬件制造的执行风险。Einride 与这些玩家的差异化在于 Freight
              Mobility Platform 软件和 Pod 的自动驾驶能力。


              **第 4 层：有电动化项目的传统 3PL。** DHL（2030 年 60,000 辆 EV 目标）、FedEx、UPS 和 Amazon Logistics 正在自建 EV 车队，不会成为 TaaS
              客户——它们会在 Einride 想运营的企业货运路线上形成直接竞争。
