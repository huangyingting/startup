        title: 展品
        blocks:
          - type: callout
            title: Einride 仍是私营公司 —— 截至 May 2026，SPAC 尚未完成
            body: >
              尽管 November 2025 已宣布 SPAC、February 2026 已完成 PIPE，截至本报告运行日期（May 7, 2026），Einride 通过 Legato Merger Corp. III
              登陆 NYSE 仍在等待中。Einride 在法律和运营上仍是私营公司。SPAC 给出了估值锚（$1.8B），但尚不代表公开市场验证已经完成。
            calloutType: insight
            claimRefs:
              - CO010
              - CO011
          - type: callout
            title: TaaS 模式带来经常性收入，但资本需求很重
            body: >
              Einride 的运输即服务模式把 EV、软件和运营打包成月费，带来已签约的经常性收入（ARR $65M），但每获取并部署一辆车都需要大量资本投入。$500M Series C 和 $1.8B SPAC
              估值同时反映了长期市场机会，以及扩张这一模式的资本密集度。
            calloutType: insight
            claimRefs:
              - CO004
              - CO006
              - CO009
          - type: callout
            title: Robert Falck 是很高的关键人风险
            body: >
              在投资者认知和客户关系中，Einride 几乎完全绑定创始人 CEO Robert Falck。公司没有公开披露接班计划。Falck 离开会造成显著运营风险和投资者信心风险——尤其是在 SPAC
              上市仍待完成时，创始人连续性是 SPAC/IPO 投资者的核心关切。
            calloutType: risk
            claimRefs:
