figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: standard
    summary: |
      Einride 从 2016 创立到 Nov 2025 宣布 SPAC 交易、NYSE 上市仍待完成的关键里程碑。
    data:
      items:
        - date: '2016'
          label: 成立于 Gothenburg
          detail: Robert Falck 创立 Einride；Pod 概念亮相；公司确立自动驾驶电动货运使命。
        - date: '2019'
          label: 首次商业 Pod 运营
          detail: Einride Pod 在 Sweden 的 DB Schenker 场站运营——这是首辆获准在 EU 公共道路上行驶的自动驾驶货运车辆。Series A（$25M）有 EQT Ventures 参与。
        - date: '2021'
          label: 进入美国市场 + SoftBank 投资
          detail: 在美国启动商业运营；SoftBank Vision Fund 2 与 Northzone 领投 $110M Series B。
        - date: '2022'
          label: Series C 轮 $500M
          detail: $500M Series C——当时欧洲最大 AV 融资轮；常规 EV 车队扩张启动。
        - date: '2024'
          label: 200 辆 EV 商业运营
          detail: 车队达到 ~200 辆电动车投入商业部署；已签约 ARR 达到 ~$65M。
        - date: Nov 2025
          label: 宣布 SPAC 交易
          detail: 以 $1.8B 企业价值与 Legato Merger Corp. III 合并；目标 H1 2026 在 NYSE 上市。
        - date: Feb 2026
          label: PIPE 完成（$113M）
          detail: $113M PIPE 来自战略投资者并已完成；截至 May 2026，NYSE 上市仍等待 SEC 和股东批准。
    approximationNotes: null
    claimRefs:
      - CO001
      - CO002
      - CO008
      - CO010
      - CO011
  - id: FO002
    title: 公司快照逻辑
    type: flow
    layout: standard
    summary: |
      Einride 的 Transport-as-a-Service（TaaS）模式：客户签约车队运力，
      Einride 交付电动货运运营，平台层把客户长期留存做深。
    data:
      nodes:
        - id: customer
          label: 客户（托运方）
          detail: 消费品、物流、制造企业（Heineken、PepsiCo、GE Appliances）
          type: input
        - id: contract
          label: TaaS 合同
          detail: 多年期协议：按月车日费 + 可变里程费；期限 3-5 年
          type: process
        - id: fleet
          label: 电动车队
          detail: ~200 辆 EV：Einride Pods（自动驾驶）+ 常规电动卡车（eCascadia、Peterbilt 579EV）
          type: process
        - id: platform
          label: Freight Mobility Platform 平台
          detail: Fleet Portal：路线优化、实时追踪、充电管理、碳报告
          type: process
        - id: ops
          label: 远程运营中心
          detail: 人工监督员监控自动驾驶 Pods 和车队运营；具备远程操作能力
          type: process
        - id: output
          label: 货运交付 + 减碳
          detail: 客户货物完成交付；碳排放下降；生成 ESG 报告
          type: output
      edges:
        - from: customer
          to: contract
          label: 签署多年期 TaaS 协议
        - from: contract
          to: fleet
          label: 在路线部署签约车辆
        - from: fleet
          to: platform
          label: 车辆数据输入平台
        - from: platform
          to: ops
          label: 运营监控与优化
        - from: ops
          to: fleet
          label: 远程监督与路线指令
        - from: fleet
          to: output
          label: 电动路线完成货运交付
    approximationNotes: |
      业务模式流程根据公开 TaaS 描述和客户案例推断。
      TaaS 合同经济性（确切收费结构）属专有信息，未公开披露。
    claimRefs:
      - CO004
      - CO005
      - CO006
      - CO007
