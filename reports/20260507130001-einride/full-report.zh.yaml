  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与当前倍数
        blocks:
          - type: paragraph
            body: >
              Einride 的企业价值为 $1.8B（2025 年 11 月 SPAC 公告），对比估计 2024 年收入 $43-47M，隐含收入倍数 39-42x——接近高溢价成长型 SaaS
              公司，但对一家运营实体车队的 TaaS 运营商来说偏激进。签约 ARR 为 $65M，按签约收入计算的前瞻倍数约 28x。


              作为参照，可比上市 AV 和车队技术公司在 2024-2025 年市场的前瞻收入倍数为 8-15x（Aurora Innovation SPAC 后估值约 $3.5B，收入很少；Torc Robotics 被
              Daimler 收购，条款未披露；Waymo 私募估值约 $40-45B，基于深度 AV 研发）。企业车队物流 SaaS（project44、Transfix）交易在 6-12x 收入。Einride
              的倍数反映了 AV 技术可选性（无监督 L4 承诺带来的溢价）和 TaaS 车队运营（资本密集带来的折价）的混合——大体符合 SPAC 时代其他 AV 相关估值。


              按隐含 $1.8B 估值完成的 $113M PIPE，是最主要的市场验证数据点：战略投资者（未披露）在 2026 年 2 月以这个价格投入资本。具备行业知识的战略 PIPE 投资者提供了很强的合理性校验，尽管
              PIPE 投资者通常会谈判认股权证和其他下行保护，而这些保护公开市场投资者拿不到。
