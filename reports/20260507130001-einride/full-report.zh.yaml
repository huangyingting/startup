      - number: '7.3'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >
              最主要的技术风险，是自动驾驶里的「最后 10% 难题」——非线性长尾场景挑战，会阻止有监督 AV 运营扩展到完全无监督 Level 4。Einride 计划在 2027-2028 年取得无监督 L4
              认证，但时间线高度不确定：它既取决于 NHTSA 能否为完全自动驾驶商用车建立合适监管框架（目前还未进入规则制定），也取决于 Einride 的 AV 技术栈能否在所有相关 ODD 中把接管率压到足够低。


              更近的技术风险，是 Luminar Technologies 财务不稳。Luminar 是 Einride 的主要 LiDAR 供应商，2024-2025 年遭遇明显财务压力，包括股价下跌
              85%、裁员和重组。如果 Luminar 失败或大幅削减产能，Einride 需要重新认证替代 LiDAR 供应商——这需要 12-24 个月，可能延误车队部署并迫使 AV 技术栈重构。


              运营风险包括 Pod 远程操作期间的连接故障。工业环境中 4G/5G 连接丢失会制造安全风险：Einride
              必须维持失效安全流程（靠边到安全区域、冻结车辆状态），但这些流程没有公开文档。任何导致事故的严重远程操作故障，都会触发监管审查，并可能暂停 NHTSA 豁免。


              网络安全风险也很实质：FMP SaaS 平台和 Pod 远程操作链路都是潜在攻击面。网络攻击若让已部署 Pod 的远程监督失效，可能造成安全事故和声誉损害。SOC 2 Type II 认证覆盖 FMP，但不覆盖
              Pod 嵌入式系统。
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
