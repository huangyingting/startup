            title: SPAC 赎回风险是近期最关键风险——可能抽走车队扩张资本
            body: >-
              70-90%+ 的 SPAC 赎回率会把信托净收益压到接近零，只给 $160-240M 的车队扩张计划留下 $113M PIPE。资本缺口会拖慢车队增长、Pod 研发，以及支撑 Einride $1.8B
