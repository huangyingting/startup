chapter:
  number: 6
  title: Customers
  summary: |
    Einride serves a concentrated set of blue-chip CPG and industrial enterprise customers
    under multi-year TaaS contracts: Heineken, PepsiCo (Frito-Lay), Carlsberg Sweden, and
    GE Appliances are publicly disclosed. All four are Fortune 500-equivalent companies with
    genuine sustainability mandates. The customer base is geographically concentrated in the
    US and Sweden, and is small in disclosed count — a key diligence concern for concentration
    risk at the current scale. Gross retention, NRR, and churn rates are not publicly disclosed.
    Evidence of repeat usage is inferred from multi-year contract structures and fleet
    expansion announcements. Customer proof quality is high for direct testimonials but
    narrow: only 4 named accounts are publicly confirmed.

sections:
  - id: SU_S1
    title: "Customer Profile and Segmentation"
    body: |
      Einride's commercial customer base is concentrated in two sectors: consumer packaged
      goods (CPG) manufacturing (Heineken, PepsiCo/Frito-Lay, Carlsberg Sweden) and durable
      goods manufacturing (GE Appliances). All four named customers are Fortune 500 or
      Fortune Global 500 equivalents with large internal logistics operations and public ESG
      commitments, making them the primary target profile for Einride's TaaS offering.

      The typical Einride enterprise customer is a large manufacturer or logistics operator
      facing: (1) rising diesel costs and carbon pricing pressure, (2) ESG reporting
      obligations requiring Scope 3 freight emissions data, (3) a chronic truck driver
      shortage that increases dependence on automation-capable fleet operators, and (4)
      sustainability-linked financing or supplier commitments that reward measurable
      decarbonization action.

      Customer contract structures are multi-year (3-5 year terms) with a fixed monthly
      fleet fee plus variable mileage components. This creates high switching costs once
      customers have integrated FMP into their ERP/TMS workflows. The enterprise sales
      cycle is estimated at 6-12 months given the multi-stakeholder procurement process
      (logistics, sustainability, and finance teams all involved).

      Customer concentration is a material risk: with only 4 publicly named accounts,
      the loss of any single customer would represent a significant revenue impact.
    claimRefs: [CU001, CU002, CU003, CU004]

  - id: SU_S2
    title: "Customer Proof and Evidence Quality"
    body: |
      Einride's customer proof quality is genuine but narrow. Heineken's partnership has
      been active since 2021 and publicly references zero-emission freight deliveries in
      Sweden. PepsiCo's Frito-Lay deployment in the US (Irving, Texas facility) is the
      most operationally significant: an autonomous Pod-based factory-to-DC route running
      continuously since 2022. Carlsberg Sweden signed a multi-year zero-emission transport
      agreement in 2023. GE Appliances launched a pilot TaaS contract for US manufacturing
      logistics in 2024.

      Customer testimonials focus on three value themes: carbon emissions reduction,
      operational cost savings from reduced driver dependency, and CSRD/ESG reporting
      capability. No customer has publicly disclosed specific cost savings figures or
      contract values, which limits financial proof quality.

      The absence of publicly disclosed NRR, gross retention, or churn data is the
      primary evidence gap in this chapter. Multi-year contract structures suggest
      retention is designed to be high, but no contract renewal data is available.
    claimRefs: [CU005, CU006, CU007, CU008, CU009]

  - id: SU_S3
    title: "Adoption Trajectory and Expansion Risk"
    body: |
      Einride's adoption trajectory follows a model of landing large enterprise accounts
      and expanding the deployed fleet within each customer relationship. PepsiCo represents
      the most advanced example: the initial Frito-Lay deployment was a single-route pilot
      that expanded to multiple Pod assignments. The company's contracted ARR of $65M
      (2025) vs estimated revenue of $43-47M suggests forward contract coverage with
      potential fleet expansion embedded in existing agreements.

      Expansion risk is meaningful: Einride's customer base is concentrated geographically
      (7 US states + Sweden) and sectorally (CPG + appliances). If major CPG companies
      freeze sustainability investment in a downturn, or if competitor pricing pressure
      increases at contract renewal, Einride faces meaningful churn risk. The lack of a
      publicly available NRR metric prevents quantitative retention assessment.

      The driver shortage tailwind (80,000+ shortage in the US as of 2024) supports
      continued demand for autonomous/electric freight solutions, but this macro factor
      benefits all fleet operators — not just Einride — and does not prevent switching
      to a competing TaaS provider.
    claimRefs: [CU010, CU011, CU012, CU013]

  - id: SU_S4
    title: "Customer Satisfaction and Reference Quality"
    body: |
      Available customer satisfaction evidence is limited to qualitative testimonials from
      sustainability and logistics leadership at Heineken, PepsiCo, and Carlsberg. No Net
      Promoter Score, CSAT survey, or third-party customer satisfaction rating is publicly
      available. The qualitative references are high-quality: senior VP-level endorsements
      from globally recognized brands carry strong signal value in the enterprise sales
      process.

      Critically, Einride has not publicly reported any customer churns or contract
      terminations since commercial operations began in 2019. This absence of churn is
      informative but should be interpreted with caution given the small disclosed
      customer base (4 named accounts) and the early commercial stage of the TaaS model.

      Third-party freight industry analysts (FreightWaves, Transport Topics) have assessed
      Einride's customer proof as credible but cautioned that the reference set is narrow
      and concentrated, limiting generalizability to the broader logistics market.
    claimRefs: [CU014, CU015, CU016]

