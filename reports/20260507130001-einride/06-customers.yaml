callouts:
  - id: CAU001
    type: key-finding
    title: "Blue-chip CPG references provide high-quality but narrow customer proof"
    body: "Heineken, PepsiCo, Carlsberg, and GE Appliances are globally recognized brands — their public endorsements are high-signal references in enterprise logistics procurement. However, with only 4 publicly named accounts, Einride's customer proof is narrow and cannot yet demonstrate broad market validation."
    claimRefs: [CU005, CU006, CU007, CU008]
  - id: CAU002
    type: risk-flag
    title: "Customer concentration is the primary near-term commercial risk"
    body: "With 4 publicly disclosed accounts, Einride has high customer concentration. If any single customer (particularly PepsiCo, likely the largest fleet deployment) were to terminate at renewal, the revenue impact would be material (estimated >20% of run-rate revenue). NRR and gross retention data are essential but not publicly available."
    claimRefs: [CU012, CU013]
  - id: CAU003
    type: key-finding
    title: "Multi-year TaaS contracts create structural retention but NRR remains unverified"
    body: "Contracted ARR of $65M vs. $43-47M run-rate revenue implies forward contract coverage of ~1.4-1.5x, which is a positive retention signal. However, the absence of NRR data prevents assessment of expansion versus base performance — a material gap for growth-stage underwriting."
    claimRefs: [CU011, CU014, CU015]

