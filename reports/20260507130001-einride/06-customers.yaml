figures:
  - id: FU001
    title: "Customer journey map"
    type: flow
    layout: standard
    summary: |
      Einride's enterprise customer journey from initial sustainability mandate
      through TaaS contract, FMP integration, and ongoing relationship expansion.
    data:
      nodes:
        - id: n1
          label: "Enterprise Sustainability Mandate"
          detail: "CPG or industrial company sets Scope 3 freight decarbonization target; ESG reporting obligation triggers vendor search"
          type: input
        - id: n2
          label: "RFP / Vendor Evaluation"
          detail: "6-12 month enterprise procurement process; logistics, sustainability, and finance stakeholders evaluate TaaS options"
          type: process
        - id: n3
          label: "Pilot TaaS Contract"
          detail: "Initial fleet deployment (2-5 vehicles); fixed route validated; FMP integration with customer ERP/TMS begins"
          type: process
        - id: n4
          label: "Full TaaS Contract (3-5 year)"
          detail: "Multi-year agreement signed; fixed fleet + variable mileage fee; FMP carbon reporting live"
          type: process
        - id: n5
          label: "ESG Reporting Integration"
          detail: "FMP Scope 3 data feeds into customer sustainability report; CSRD compliance enabled"
          type: process
        - id: n6
          label: "Fleet Expansion (Land-and-Expand)"
          detail: "Customer adds vehicles to contract; new routes added; NRR > 100% target for contract expansions"
          type: output
      edges:
        - from: n1
          to: n2
          label: "triggers vendor search"
        - from: n2
          to: n3
          label: "pilot contract won"
        - from: n3
          to: n4
          label: "pilot success → full contract"
        - from: n4
          to: n5
          label: "FMP integration complete"
        - from: n5
          to: n6
          label: "value proven → expand"
    approximationNotes: null
    claimRefs: [CU003, CU004, CU011]

