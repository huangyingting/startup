callouts:
  - calloutType: risk
    title: SPAC Closing Failure Is an Existential Capital Event for Einride
    body: |
      Einride's growth plan is entirely dependent on the SPAC closing successfully. 
      The PIPE provides $113M of bridge capital, but without SPAC proceeds and public 
      market capital access, Einride cannot fund the fleet expansion from 200 to 600+ 
      EVs required to reach $200M ARR. A SPAC failure would force a private bridge 
      round at potentially lower valuation or operational contraction. The SPAC's H1 
      2026 target has already extended, raising execution risk.
    claimRefs:
      - CI013
      - CI014
  - calloutType: insight
    title: Autonomous Pod Is the Key to Financial Model Transformation
    body: |
      Einride's current gross margins (estimated 15-25%) are asset-heavy-logistics-typical 
      and not premium. The transformational financial event is autonomous Pod deployment 
      at scale: eliminating a $75-90K/year driver cost per vehicle would add approximately 
      25-35 percentage points of gross margin per Pod route. This shifts Einride's 
      financial model from a capital-intensive logistics company to a tech-enabled 
      logistics platform with SaaS-like margin expansion potential.
    claimRefs:
      - CI007
      - CI008
