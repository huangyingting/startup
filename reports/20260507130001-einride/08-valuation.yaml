callouts:
  - id: CAV001
    type: key-finding
    title: The $1.8B SPAC valuation is a bet on autonomous economics, not current TaaS operations
    body: >-
      Einride's current TaaS business (4 customers, $43-47M revenue, supervised AV) would support a 6-8x revenue
      valuation of $260-380M. The $1.8B price embeds $1.4-1.5B of autonomous technology optionality — the expected
      future value of unsupervised Level 4 operations that are not yet commercially achieved. Investors must believe the
      L4 timeline to justify entry at SPAC price.
    claimRefs:
      - CV006
      - CV013
      - CV014
  - id: CAV002
    type: risk-flag
    title: Aurora Innovation's SPAC de-rating is the cautionary precedent for Einride
    body: >-
      Aurora Innovation SPACed at $11B EV in 2021 with near-zero revenue; its market cap declined to ~$3.5B by 2024 as
      commercial launch was delayed. Einride's $1.8B SPAC at a much lower revenue multiple is better positioned, but the
      Aurora precedent demonstrates that AV technology SPAC valuations are vulnerable to L4 timeline slippage.
    claimRefs:
      - CV012
      - CV016
  - id: CAV003
    type: key-finding
    title: Probability-weighted expected return of ~1.2x is modest; entry discipline matters
    body: >-
      The probability-weighted expected return from the $1.8B SPAC price is approximately 1.2x — a modest return for the
      capital risk. However, if SPAC redemptions are heavy (>80%), the post-listing market price may correct
      significantly, creating a better risk-adjusted entry point for public market investors.
    claimRefs:
      - CV008
      - CV009
      - CV010
