callouts:
  - calloutType: insight
    title: "Einride Is Still Private — SPAC Not Yet Closed as of May 2026"
    body: |
      Despite the November 2025 SPAC announcement and February 2026 PIPE closure, 
      Einride's NYSE listing via Legato Merger Corp. III remains pending as of this 
      report's run date (May 7, 2026). Einride is legally and operationally a private 
      company. The SPAC provides valuation anchoring ($1.8B) but does not yet represent 
      completed public market validation.
    claimRefs: [CO010, CO011]

  - calloutType: insight
    title: "TaaS Model Creates Recurring Revenue But Requires Heavy Capital"
    body: |
      Einride's Transport-as-a-Service model — providing EVs, software, and operations 
      as a bundled monthly fee — creates recurring contracted revenue (ARR $65M) but 
      requires significant capital deployment to acquire and deploy each vehicle. 
      The $500M Series C and $1.8B SPAC valuation reflect both the long-term 
      market opportunity and the capital intensity of scaling this model.
    claimRefs: [CO004, CO006, CO009]

  - calloutType: risk
    title: "Robert Falck Is a High Key-Person Risk"
    body: |
      Einride is entirely associated with its founder CEO Robert Falck in investor 
      perception and customer relationships. No succession plan is publicly disclosed. 
      Falck's departure would create significant operational and investor confidence 
      risk — particularly in the context of a pending SPAC listing where founder 
      continuity is a critical SPAC/IPO investor concern.
    claimRefs: [CO012, CO013]

