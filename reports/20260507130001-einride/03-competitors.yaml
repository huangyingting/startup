callouts:
  - calloutType: risk
    title: "Aurora Innovation's US L4 Approval Is a Structural Threat to Einride's AV Narrative"
    body: |
      Aurora Innovation's April 2024 commercial driverless L4 trucking in Texas — the 
      first federally approved commercial driverless heavy freight on US public roads — 
      is a significant milestone that Einride's Pod has not yet matched at public-road 
      commercial scale. If Aurora scales nationally and Volvo deepens its AV integration, 
      Einride's autonomous technology narrative may be commoditized before the Pod achieves 
      US public-road approval. Einride's durable moat shifts to software (Fleet Portal) 
      and EU market position.
    claimRefs: [CP005, CP013, CP016]

  - calloutType: insight
    title: "Nikola's Bankruptcy Validates the Execution Risk in EV Truck Hardware"
    body: |
      Nikola Motor's Chapter 11 bankruptcy in November 2024 — after years of EV truck 
      manufacturing delays and allegations of fraud — demonstrates the extreme execution 
      risk in autonomous and electric truck hardware development. Einride's TaaS model 
      (sourcing vehicles from established OEMs rather than manufacturing them) avoids the 
      most dangerous hardware execution risk while still owning the software and operations 
      layer. This is a structural advantage over pure EV hardware startups.
    claimRefs: [CP003, CP004]

