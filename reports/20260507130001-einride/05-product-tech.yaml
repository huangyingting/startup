callouts:
  - id: CAE001
    type: key-finding
    title: "Narrow-ODD AV strategy enables commercial revenue without waiting for full L4 certification"
    body: "Einride's supervised remote-operation model allows commercial AV deployment today in geo-fenced industrial ODDs while full unsupervised L4 remains a 2027-2028 aspiration. This pragmatic approach is why Einride has live commercial AV contracts while most pure-AV competitors remain in test mode."
    claimRefs: [CE001, CE002, CE008]
  - id: CAE002
    type: risk-flag
    title: "NVIDIA Orin and Luminar LiDAR dependencies create single-vendor concentration risk"
    body: "Deep integration with NVIDIA's Orin SoC and reliance on Luminar LiDAR (which has faced financial distress) means supply disruptions or pricing changes from these vendors could materially impact Einride's ability to deploy vehicles at scale or maintain AV system function."
    claimRefs: [CE012, CE033]
  - id: CAE003
    type: key-finding
    title: "FMP software platform is the compounding moat — data network effects improve over time"
    body: "The Freight Mobility Platform accumulates cross-fleet operational data that improves route optimization and AV training datasets. This data flywheel creates increasing switching costs for enterprise customers and improves product quality over time, independent of the AV technology trajectory."
    claimRefs: [CE007, CE029]

