callouts:
  - calloutType: insight
    title: Electric Freight Is Real Today; Autonomous Freight Is an Option, Not a Promise
    body: |
      Einride's $1.8B SPAC valuation reflects both current electric freight operations 
      (real, $65M ARR) and future autonomous Pod technology (option value, unproven at 
      commercial scale). Analysts should be careful not to apply autonomous freight 
      market sizes to current-year revenue analysis — the current SAM is ECV operations 
      only. The autonomous TAM is a 7-12 year call option embedded in the valuation.
    claimRefs:
      - CM001
      - CM002
      - CM003
  - calloutType: risk
    title: CARB ACT Regulatory Tailwind Could Reverse Under Federal Administration Change
    body: |
      California's ACT regulation requires zero-emission trucks, but its legal durability 
      under potential federal preemption (Clean Air Act waiver disputes) remains contested. 
      A regulatory reversal would reduce the urgency of enterprise shipper EV procurement 
      decisions — a material downside risk to Einride's near-term SAM adoption rate.
    claimRefs:
      - CM009
      - CM013
