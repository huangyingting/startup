  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Current Financial Position
        blocks:
          - type: paragraph
            body: |
              Einride generates revenue through its Transport-as-a-Service (TaaS) model: 
              multi-year contracts with enterprise shippers that provide monthly fleet fees 
              (based on vehicle-days committed) plus variable mileage fees. The revenue model 
              has three key components:

              1. **Fleet operations revenue** — the largest component; driven by the number of 
                 EVs in commercial deployment multiplied by the per-vehicle monthly TaaS fee. 
                 With ~200 EVs in operation and contracted ARR of $65M, the implied per-vehicle 
                 annual revenue is approximately $325,000/vehicle — broadly consistent with 
                 Class 8 electric truck operating economics at a TaaS premium.

              2. **Software / platform fees** — Freight Mobility Platform (Fleet Portal) 
                 subscription fees as a percentage of total TaaS contract value. Not separately 
                 disclosed; estimated to be 5-15% of total contract revenue based on comparable 
                 SaaS logistics platforms.

              3. **Mileage-variable components** — variable per-mile fees above committed 
                 vehicle-day minimums; provide revenue upside in high-utilization periods.

              Estimated financial position (2024):
              - Revenue: $43-47M (analyst estimate; not officially disclosed)
              - Contracted ARR: ~$65M (disclosed in SPAC materials)
              - Net loss: Material; not quantified publicly (consistent with pre-SPAC 
                deep-tech logistics companies of similar stage)
              - Cash / liquidity: Supported by PIPE ($113M) and pre-existing cash from Series C 
                ($500M raised 2022); exact balance sheet not disclosed

              The gap between contracted ARR ($65M) and revenue ($43-47M) suggests a meaningful 
              ramp/billing cycle lag between signing contracts and recognizing revenue at full 
              volume — normal for enterprise fleet TaaS deployments where vehicles must be 
              procured, delivered, and commissioned before revenue recognition.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
