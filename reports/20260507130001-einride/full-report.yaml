      - number: '8.2'
        title: 'Scenario Analysis: Bull / Base / Bear'
        blocks:
          - type: paragraph
            body: |
              The bull case (30% probability): Einride successfully closes the SPAC with sufficient
              trust proceeds, deploys 600 EVs by 2027, achieves unsupervised Level 4 Pod operation in
              2028, grows contracted ARR to $300M by 2030. At 15-20x forward ARR, this supports a
              $4.5-6B valuation — 2.5-3.3x from the $1.8B SPAC price.

              The base case (50% probability): SPAC closes with moderate redemptions ($50-80M net
              trust proceeds + $113M PIPE = ~$165-193M total capital), fleet expands to 400 EVs by
              2027, contracted ARR grows to $150-175M by 2028. Pod AV supervised model continues as
              commercial floor; L4 slips to 2029-2030. At 10-12x forward ARR, this supports a $1.5-2.1B
              valuation — approximately flat to 1.2x from $1.8B SPAC price. Base case return is modest
              from SPAC price; implies capital appreciation only for early-series investors.

              The bear case (20% probability): SPAC closes with heavy redemptions (<$30M net trust),
              fleet expansion stalls, PepsiCo/Frito-Lay does not renew, L4 delayed beyond 2032.
              Revenue grows slowly to $60-80M by 2028, requiring bridge financing at distressed terms.
              At 6-8x revenue, this supports a $360-640M valuation — a 60-80% loss from $1.8B SPAC
              price for public investors.
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV007
          - type: table
            tableRef: TV006
            claimRefs:
