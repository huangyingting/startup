            body: |
              Einride's funding history reflects progressive institutional validation:

              **Series A (2019): ~$25M**, EQT Ventures lead. Funded first commercial Pod 
              operations and initial US market entry.

              **Series B (2021): ~$110M**, SoftBank Vision Fund 2 and Northzone co-lead. 
              Funded US expansion and conventional EV fleet buildout.

              **Series C (2022): ~$500M**, EQT Growth, Storebrand, and others. The largest 
              European AV funding round at the time; funded full US/EU commercial scale-up.

              **SPAC (Nov 2025):** Business combination with Legato Merger Corp. III at 
              $1.8B enterprise value; NYSE listing pending. The SPAC provides:
              - Access to public market capital without the volatility of IPO book-building
              - Fixed $1.8B valuation ceiling vs. market-determined IPO price
              - PIPE co-investors ($113M) who provide capital surety for the deal

              **PIPE (Feb 2026): $113M** from strategic logistics and energy investors.

              **Cap table complexity:** Multiple financing rounds plus PIPE plus SPAC structure 
              creates significant cap table complexity. Warrant dilution from the SPAC structure 
              could meaningfully dilute existing shareholders post-listing. Exact warrant 
