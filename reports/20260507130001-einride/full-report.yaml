      - number: '7.5'
        title: Exhibits
        blocks:
          - type: callout
            title: SPAC redemption risk is the most consequential near-term risk — could eliminate fleet expansion capital
            body: >-
              SPAC redemption rates of 70-90%+ would reduce net trust proceeds near zero, leaving only $113M PIPE for a
              $160-240M fleet expansion plan. A capital shortfall would delay fleet growth, Pod R&D, and the autonomous
              economics that justify Einride's $1.8B valuation.
            calloutType: insight
            claimRefs:
              - CR006
              - CR007
              - CR008
          - type: callout
            title: Luminar LiDAR financial distress creates a critical single-source sensor dependency
            body: >-
              Luminar Technologies' stock has fallen 85% since 2023 and the company underwent layoffs and restructuring
              in 2024-2025. As Einride's primary LiDAR supplier, a Luminar production failure would require 12-24 months
              to re-qualify an alternative — disrupting new fleet deployments and requiring AV stack re-engineering.
            calloutType: insight
            claimRefs:
              - CR011
              - CR012
          - type: callout
            title: The supervised AV model is both Einride's strength and its ceiling — L4 remains the high-risk prize
            body: >-
              Supervised Pod operation generates real commercial revenue today and is a defensible business. But
              Einride's $1.8B valuation is pricing in future unsupervised L4 economics. The 'last 10%' edge case problem
              makes the path to unsupervised L4 non-linear and uncertain, creating a long gap between current supervised
              operations and the fully autonomous economics that justify the valuation.
            calloutType: insight
            claimRefs:
              - CR013
              - CR024
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Framework and Current Multiple
        blocks:
          - type: paragraph
            body: |
              Einride's $1.8B enterprise value (SPAC announcement November 2025) against estimated
              2024 revenue of $43-47M implies a revenue multiple of 39-42x — similar to premium
              growth SaaS companies but aggressive for a TaaS operator with physical fleet operations.
              Contracted ARR of $65M implies a forward multiple of ~28x on contracted revenue.

              For context, comparable public AV and fleet-tech companies trade at 8-15x forward revenue
              in the 2024-2025 market (Aurora Innovation post-SPAC at ~$3.5B with minimal revenue;
              Torc Robotics acquired by Daimler at undisclosed terms; Waymo at ~$40-45B private
              valuation on deep AV R&D). Enterprise fleet logistics SaaS (project44, Transfix) trade
              at 6-12x revenue. The Einride multiple reflects a blend of AV technology optionality
              (premium for unsupervised L4 promise) and TaaS fleet operations (discount for capital
              intensity) — roughly consistent with other SPAC-era AV-adjacent valuations.

              The $113M PIPE at implied $1.8B valuation is the primary market validation data point:
              strategic investors (undisclosed) committed capital at this price in February 2026.
              Strategic PIPE investors with industry knowledge provide a strong sanity check, though
              PIPE investors typically negotiate warrants and other downside protections not available
              to public investors.
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs:
              - CV001
              - CV002
              - CV003
          - type: table
            tableRef: TV005
            claimRefs:
