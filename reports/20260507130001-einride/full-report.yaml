          - type: callout
            title: Customer concentration is the primary near-term commercial risk
            body: >-
              With 4 publicly disclosed accounts, Einride has high customer concentration. If any single customer
              (particularly PepsiCo, likely the largest fleet deployment) were to terminate at renewal, the revenue
              impact would be material (estimated >20% of run-rate revenue). NRR and gross retention data are essential
              but not publicly available.
            calloutType: insight
            claimRefs:
              - CU012
              - CU013
          - type: callout
            title: Multi-year TaaS contracts create structural retention but NRR remains unverified
            body: >-
              Contracted ARR of $65M vs. $43-47M run-rate revenue implies forward contract coverage of ~1.4-1.5x, which
              is a positive retention signal. However, the absence of NRR data prevents assessment of expansion versus
              base performance — a material gap for growth-stage underwriting.
            calloutType: insight
