              Einride's Transport-as-a-Service model — providing EVs, software, and operations 
              as a bundled monthly fee — creates recurring contracted revenue (ARR $65M) but 
              requires significant capital deployment to acquire and deploy each vehicle. 
              The $500M Series C and $1.8B SPAC valuation reflect both the long-term 
              market opportunity and the capital intensity of scaling this model.
