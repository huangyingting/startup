      - number: '5.4'
        title: Roadmap, R&D, and Competitive Positioning
        blocks:
          - type: paragraph
            body: |
              Einride's 2025-2028 product roadmap centers on three vectors: (1) Pod next-gen —
              integrating more capable sensors and reducing unit cost from ~$300K to <$150K
              through design-to-cost engineering; (2) FMP enterprise expansion — carrier
              marketplace features and intermodal freight coordination; (3) Autonomous scale-up
              — increasing the Pod:operator ratio from 5-10:1 toward 20:1+.

              Scaling from 200 to 600 EVs by 2026-2027 requires an estimated $160-240M in
              vehicle purchases alone — a high capital intensity dependent on SPAC closing.
              Einride holds approximately 38 patent families focused on remote supervision,
              cabless architecture, and freight mobility algorithms. Morgan Stanley distinguishes
              Einride's narrow-ODD specialization from highway-focused competitors; the cabless
              Pod reduces per-mile labor cost by ~40% in fixed-route industrial settings but
              cannot address highway or urban route segments. Critics note the 'last 10% problem'
              — edge cases (construction, adverse weather, emergency vehicles) make the path
              from supervised to unsupervised Level 4 non-linear and uncertain in timeline.
