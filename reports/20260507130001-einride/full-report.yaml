  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and Asset Portfolio
        blocks:
          - type: paragraph
            body: |
              Einride's product portfolio is a vertically integrated freight mobility platform
              combining physical EV fleet assets with a proprietary software layer. The flagship
              hardware asset is the Einride Pod — a fully autonomous, cabless Class 8-equivalent
              electric vehicle designed for fixed-route, low-speed industrial logistics
              (port-to-warehouse, factory-to-distribution center). The Pod is controlled remotely
              by human operators who can supervise multiple vehicles simultaneously, enabling one
              operator to manage up to 10 Pods versus the 1:1 ratio in conventional trucking.

              The conventional electric vehicle fleet (Freightliner eCascadia, Peterbilt 579EV,
              Scania PHEV) handles highway and variable-route missions where the Pod is not
              certified. These vehicles run within the same Freight Mobility Platform, providing
              unified telematics, mission planning, and carbon reporting.

              The Freight Mobility Platform (FMP) is the SaaS backbone: a cloud-native fleet
              orchestration system that handles route optimization, vehicle dispatch, real-time
              telemetry, driver/operator assignment, and Scope 1-3 emissions accounting. The FMP
              is the key software moat — it aggregates cross-fleet operational data and produces
              auditable emissions reports that increasingly command premium pricing under EU CSRD
              compliance requirements. As of 2024-2025, the Pod has driven 500,000+ cumulative
              kilometers and operates commercially in 7 US states plus Sweden.
            claimRefs:
              - CE001
              - CE005
              - CE008
