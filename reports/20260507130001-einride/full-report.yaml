      - number: '1.2'
        title: Business Model and Product
        blocks:
          - type: paragraph
            body: |
              Einride operates a "transport-as-a-service" (TaaS) model: rather than selling 
              vehicles outright, Einride sells freight capacity by the kilometer, the pallet, 
              or as a monthly subscription fleet deployment. Customers (typically consumer 
              goods companies, logistics operators, and large manufacturers) sign multi-year 
              contracts for a defined number of electric vehicles and routes, with Einride 
              providing the vehicle, driver (where required), software platform, charging 
              infrastructure support, and fleet management.

              Product portfolio:
              1. Einride Pod: Cabless, autonomous-capable electric freight vehicle designed 
                 for closed-facility and eventually public-road autonomous operation. The Pod 
                 is remotely supervised by operators at Einride's Remote Operations Center. 
                 As of 2025, Pod operations are primarily on private and permitted routes.

              2. Electric Trucks (conventional): Einride deploys commercially available 
                 electric semi-trucks (e.g., Freightliner eCascadia, Peterbilt 579EV) on 
                 conventional routes under its fleet management umbrella. This represents 
                 the majority of its commercial vehicle fleet (~200 EVs) and the primary 
                 current revenue source.

              3. Freight Mobility Platform (Fleet Portal): Cloud-based software for route 
                 planning, real-time vehicle tracking, driver performance monitoring, charging 
                 optimization, carbon reporting, and fleet analytics. The software platform 
                 is the primary medium-term differentiation vs. commodity EV leasing.

              Revenue is generated primarily through the TaaS contracts: monthly fees based 
              on vehicle-days committed plus variable mileage fees. The contracted ARR of 
              ~$65M (2025) represents the annualized value of signed multi-year contracts, 
              most of which have 3-5 year terms.
