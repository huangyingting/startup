      - number: '1.4'
        title: Team, Scale, and Market Context
        blocks:
          - type: paragraph
            body: |
              Leadership: Robert Falck (CEO and co-founder) is the primary public face and 
              primary shareholder. Einride's management team includes: Malin Liinamaa 
              (previously CFO-track role), and a leadership team with backgrounds from Volvo, 
              Tesla, and McKinsey. The company employs approximately 500-600 people globally 
              (as of 2024 estimates), predominantly in Sweden and the US.

              Operational scale: As of 2025, Einride has approximately 200 electric vehicles 
              in commercial operation. The company has completed over 500,000 kilometers of 
              commercial electric freight operations. The US is the primary expansion market; 
              Einride has operations in 7 US states and multiple European countries.

              Market context: The autonomous and electric freight market is at an early 
              commercial stage. The US heavy trucking market represents ~$800B annually; 
              the addressable market for electrified commercial freight is estimated at 
              $300-500B over a 15-year transition horizon. Einride is competing with Waymo 
              Via, Gatik, Aurora, and Kodiak Robotics (autonomous) and conventional EV 
              truck OEMs (Tesla Semi, Daimler eCascadia, Paccar electric trucks) for 
              the commercial EV freight opportunity.

              The driver shortage (80,000+ US driver shortfall in 2024 per ATA) and 
              regulatory pressure (California AB5, EU Green Deal freight emission mandates) 
              create structural tailwinds for both the autonomous and the electric 
              freight narratives.
