            title: Blue-chip CPG references provide high-quality but narrow customer proof
            body: >-
              Heineken, PepsiCo, Carlsberg, and GE Appliances are globally recognized brands — their public endorsements
              are high-signal references in enterprise logistics procurement. However, with only 4 publicly named
              accounts, Einride's customer proof is narrow and cannot yet demonstrate broad market validation.
            calloutType: insight
            claimRefs:
