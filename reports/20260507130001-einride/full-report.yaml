chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Founding Story and Mission
        blocks:
          - type: paragraph
            body: |
              Einride was founded in 2016 by Robert Falck in Gothenburg, Sweden, with a mission 
              to create the world's first commercial-scale network of autonomous electric freight 
              vehicles. Falck, formerly of Volvo Cars, founded Einride on the conviction that 
              freight transportation — responsible for approximately 7% of global CO2 emissions — 
              needed to be reinvented with electric powertrains and autonomous technology.

              The company's name itself reflects its philosophy: "Einride" derives from Norse 
              mythology, evoking a lone rider — a metaphor for the autonomous, driver-free 
              freight vehicle. The company emerged from the observation that the long-haul 
              trucking industry was facing both a structural driver shortage (estimated 
              80,000+ driver shortage in the US as of 2024) and mounting pressure to 
              decarbonize from both regulators and shippers.

              Einride's product vision — the "Pod," a driverless, electric, cabless freight 
              vehicle — was unveiled in 2016 as a concept and began commercial operations 
              on private facilities (e.g., closed logistics yards) by 2019. The company's 
              Gothenburg headquarters serves as the engineering and software hub; operations 
              are centered in the US market (primary expansion market) with commercial 
              deployments in Sweden and other European markets.

              CEO Robert Falck remains the company's controlling figure and primary public 
              voice. Falck's background at Volvo Cars (program manager in electrification) 
              provided the automotive engineering pedigree to build commercial-grade electric 
              freight vehicles at scale.
            claimRefs:
              - CO001
              - CO002
              - CO003
