  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: |
              Einride's most material regulatory risk is the fragility of its NHTSA FMVSS exemption
              framework. The Einride Pod operates commercially via conditional exemptions from Federal
              Motor Vehicle Safety Standards, granted because the Pod's cabless design does not conform
              to occupant-protection-oriented FMVSS requirements. These exemptions require annual renewal
              and are subject to NHTSA discretion — a change in administration, a high-profile AV
              incident, or new FMVSS rulemaking could restrict or revoke existing exemptions.

              The broader US federal AV regulatory framework has been in development since 2017 (AV 1.0
              through AV 4.0) without producing binding rulemaking. This regulatory vacuum creates
              operating uncertainty for all commercial AV operators. Congressional proposals to mandate
              FMVSS compliance for all vehicles on public roads — including AV-specific designs — could
              eliminate the exemption pathway Einride currently relies on.

              In Europe, EU Regulation (EU) 2019/2144 and the evolving AI Act create overlapping
              regulatory obligations for AV safety certification. Einride's Swedish operations are
              covered by Swedish Transport Agency permits, but multi-country EU expansion requires
              regulatory reciprocity that has not been formalized. The EU AI Act classification of
              autonomous driving systems as "high-risk AI" will require third-party conformity
              assessment before commercial deployment in additional EU markets.

              Product liability exposure is significant: if an Einride Pod is involved in a serious
              accident causing property damage or personal injury, the combination of cabless design
              (no driver to shift liability) and remote supervision creates a novel product liability
              question. Einride's insurance coverage, indemnification clauses in TaaS contracts, and
              capital reserves for litigation are not publicly disclosed.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
      - number: '7.2'
        title: SPAC Execution and Capital Risk
        blocks:
          - type: paragraph
            body: |
              The SPAC merger with Legato Merger Corp. III (announced November 2025, PIPE closed
              February 2026) remains the single most consequential near-term risk for Einride. As of
              May 2026, the NYSE listing is still pending SEC and shareholder approval. SPAC redemption
              rates have been running at 70-90%+ in the 2023-2026 market — if Legato shareholders
              redeem heavily, net trust proceeds (originally $200M+) could be near-zero, leaving only
              the $113M PIPE as new capital.

              The $113M PIPE alone is insufficient to fund: (1) fleet expansion from 200 to 600 EVs
              ($160-240M vehicle capital), (2) Pod next-gen R&D ($50-100M estimated), and (3)
              operating losses at current burn rate. A SPAC failure or thin trust proceeds creates a
              capital cliff that would require Einride to raise bridge financing at potentially
              unfavorable terms, scale back the roadmap materially, or seek strategic alternatives.

              SPAC execution risk also includes timeline risk: extended NYSE listing delays increase
              the period during which management attention is diverted to SPAC compliance processes
              rather than commercial execution. SPAC-related legal and accounting costs are material
              for a company at Einride's revenue scale.

              If the SPAC closes successfully with sufficient trust proceeds, the NYSE listing creates
              a new set of public company risks: quarterly earnings pressure, short-seller scrutiny,
              and the need to meet guidance within 12-18 months of listing.
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
              - CR010
          - type: figure
            figureRef: FR002
            claimRefs:
              - CR006
              - CR007
              - CR008
              - CR009
      - number: '7.3'
        title: Technology and Operational Risk
        blocks:
          - type: paragraph
            body: |
              The primary technology risk is the 'last 10% problem' in autonomous driving — the
              non-linear edge case challenge that prevents supervised AV operation from scaling to
              full unsupervised Level 4. Einride's 2027-2028 timeline for unsupervised L4 certification
              is highly uncertain: it depends on NHTSA developing an appropriate regulatory framework
              for fully autonomous commercial vehicles (not yet in rulemaking), and on Einride's AV
              stack achieving sufficiently low intervention rates across all relevant ODDs.

              A more immediate technical risk is Luminar Technologies' financial instability. Luminar,
              Einride's primary LiDAR supplier, has faced significant financial distress in 2024-2025
              including stock price decline of 85%, layoffs, and restructuring. If Luminar fails or
              significantly reduces production capacity, Einride would need to re-qualify an alternative
              LiDAR supplier — a 12-24 month process that could delay fleet deployments and require
              AV stack re-engineering.

              Operational risk includes connectivity failure during Pod teleoperation. Loss of 4G/5G
              connectivity in industrial environments creates safety risk: Einride must maintain failsafe
              procedures (Pull-over to safe area, freeze vehicle state) that are not publicly documented.
              Any serious teleoperation failure resulting in an accident would trigger regulatory review
              and potential suspension of NHTSA exemptions.

              Cybersecurity risk is material: the FMP SaaS platform and Pod teleoperation link are
              potential attack surfaces. A cyber attack disabling remote supervision of deployed Pods
              could create safety incidents and reputational damage. SOC 2 Type II certification covers
              the FMP but not the Pod embedded systems.
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
