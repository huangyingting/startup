            title: SPAC Closing Failure Is an Existential Capital Event for Einride
            body: |
              Einride's growth plan is entirely dependent on the SPAC closing successfully. 
              The PIPE provides $113M of bridge capital, but without SPAC proceeds and public 
              market capital access, Einride cannot fund the fleet expansion from 200 to 600+ 
              EVs required to reach $200M ARR. A SPAC failure would force a private bridge 
              round at potentially lower valuation or operational contraction. The SPAC's H1 
              2026 target has already extended, raising execution risk.
            calloutType: risk
