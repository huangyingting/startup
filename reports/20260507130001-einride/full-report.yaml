      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              **Aurora Innovation (AUR)** — The most operationally advanced autonomous freight 
              competitor. Aurora's autonomous driving system (Aurora Driver) completed its first 
              commercial, fully driverless Level 4 trucking runs in Texas in April 2024 (Dallas 
              to Houston). Aurora partners with Volvo Trucks (OEM integration) and operates via 
              network operators (Uber Freight, Werner, Schneider) rather than owning trucks. 
              Aurora raised $820M in a 2021 IPO SPAC at a $13B valuation; post-IPO market cap 
              declined to ~$1.5-2B by 2025. Aurora's advantage over Einride: federally approved 
              driverless operation on public highways; disadvantage: no TaaS fleet, purely a 
              technology licensing model with no direct shipper relationships.

              **Waymo Via** — Alphabet's freight autonomous division. Operating in Phoenix AZ 
              with Waymo Trucking (Class 8), leveraging Waymo's unmatched autonomous driving 
              data and technology moat. Waymo Via has not publicly disclosed commercial revenue; 
              it is a well-funded internal bet at Alphabet with no IPO path. Waymo Via's 
              advantage: deepest technology moat in AV; disadvantage: no TaaS model, no direct 
              shipper relationships, operates as a technology developer.

              **Gatik** — Short-haul (middle-mile) autonomous trucking in closed networks. 
              Operates Level 4 AV on repeatable fixed routes for Walmart, Loblaw, and others 
              with driverless operation approved in Arkansas and Texas. Gatik's model is the 
              closest to Einride's fixed-route operational approach — a more direct competitor 
              than Aurora or Waymo Via. Gatik raised ~$85M total; significantly less capitalized 
              than Einride ($635M+).

              **Daimler Trucks EaaS** — Most dangerous near-term commercial threat to Einride's 
              TaaS model. Daimler (eCascadia) now offers a bundled EV-as-a-Service that includes 
              the truck, maintenance, and charging access without capital requirement — directly 
              competing for the same enterprise CPG and industrial shipper relationships. Daimler's 
              advantage: established OEM relationships, brand trust, service network. Disadvantage: 
              no autonomous stack, no data platform.
            claimRefs:
              - CP005
              - CP006
              - CP007
              - CP008
          - type: table
