      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Electric Freight Is Real Today; Autonomous Freight Is an Option, Not a Promise
            body: |
              Einride's $1.8B SPAC valuation reflects both current electric freight operations 
              (real, $65M ARR) and future autonomous Pod technology (option value, unproven at 
              commercial scale). Analysts should be careful not to apply autonomous freight 
              market sizes to current-year revenue analysis — the current SAM is ECV operations 
              only. The autonomous TAM is a 7-12 year call option embedded in the valuation.
            calloutType: insight
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: callout
            title: CARB ACT Regulatory Tailwind Could Reverse Under Federal Administration Change
            body: |
              California's ACT regulation requires zero-emission trucks, but its legal durability 
              under potential federal preemption (Clean Air Act waiver disputes) remains contested. 
              A regulatory reversal would reduce the urgency of enterprise shipper EV procurement 
              decisions — a material downside risk to Einride's near-term SAM adoption rate.
            calloutType: risk
            claimRefs:
              - CM009
              - CM013
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Einride faces competitors across three distinct layers of the autonomous/electric 
              freight stack:

              **Layer 1: Autonomous freight technology companies.** Aurora Innovation (NASDAQ: AUR), 
              Waymo Via (Google/Alphabet), Gatik, and Kodiak Robotics develop Level 4 autonomous 
              driving systems for freight. Aurora completed its first fully commercial Level 4 
              driverless trucking runs between Dallas and Houston in April 2024, making it the 
              most operationally advanced public-road autonomous freight competitor. Aurora operates 
              via a licensing/partnership model (Uber Freight, Werner Enterprises, Schneider) 
              rather than owning vehicles — different from Einride's TaaS model.

              **Layer 2: Electric truck OEMs and EaaS providers.** Daimler Trucks (eCascadia), 
              Peterbilt (579EV), Kenworth (T680E), and Volvo Trucks offer electric commercial 
              vehicles and are launching Electric-as-a-Service (EaaS) programs that bundle 
              vehicles + charging + maintenance but lack autonomous technology and data software 
              platforms. These OEM programs represent the most scalable competitive threat to 
              Einride's TaaS model because of OEM brand trust and established fleet customer 
              relationships.

              **Layer 3: EV-native operators and startups.** Xos Trucks, Nikola Motor (NASDAQ: NKLA), 
              and Hexagon Purus operate electric commercial vehicle fleets for specific segments 
              (last-mile, refuse, medium-duty). Nikola's bankruptcy in November 2024 demonstrated 
              execution risk in EV truck hardware manufacturing. Einride's differentiation from 
              these players is the Freight Mobility Platform software and the Pod's autonomous 
              capability.

              **Layer 4: Traditional 3PLs with electrification programs.** DHL (60,000 EV target 
              by 2030), FedEx, UPS, and Amazon Logistics are building their own EV fleets and 
              are not TaaS customers — they are direct competition for enterprise freight routes 
              that Einride seeks to operate.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
          - type: figure
            figureRef: FP001
