      - number: '5.2'
        title: Technology Stack and Autonomous Driving Capability
        blocks:
          - type: paragraph
            body: |
              The Pod's autonomous system is built on a sensor fusion architecture combining
              LiDAR, radar, camera, and GPS/IMU inputs. The perception, planning, and control
              stack is proprietary, developed in-house in Gothenburg and San Francisco. Unlike
              Waymo or Aurora, Einride's approach is narrow-ODD specialization — optimizing for
              a defined set of low-speed, geo-fenced industrial routes rather than full
              general-purpose highway or urban autonomy.

              The remote supervision model is a core technical differentiator: Pod operators use
              a multi-vehicle interface to supervise fleets in real time, enabling rapid scaling
              without waiting for full unsupervised Level 4 certification. The teleoperation stack
              uses 4G/5G cellular connectivity for video streaming and low-latency intervention
              commands. On the software side, the FMP integrates via APIs with enterprise TMS
              systems including SAP TM and Oracle TMS. Key technical dependencies include:
              Freightliner and Peterbilt (OEM supply), Luminar (LiDAR), NVIDIA Orin (compute
              platform), AWS (cloud), and Verizon/T-Mobile (connectivity). The Pod's AV stack
              is certified to ISO 26262 ASIL-D functional safety standard.
