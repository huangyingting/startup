            body: |
              Einride's financing history demonstrates progressive institutional confidence:
              - 2019: Series A ($25M), EQT Ventures lead
              - 2021: Series B ($110M), SoftBank Vision Fund 2 and Northzone co-lead
              - 2022: Series C ($500M), Storebrand, EQT Growth, and others
              - Total pre-SPAC equity raised: ~$635M+

              SPAC merger (announced November 2025): Einride entered into a business 
              combination agreement with Legato Merger Corp. III, a SPAC listed on NASDAQ. 
              The deal values Einride at $1.8B enterprise value pre-SPAC. In February 2026, 
              Einride closed a $113M PIPE (Private Investment in Public Equity) from 
              strategic investors including logistics and energy sector participants.

              As of May 2026, the SPAC merger has not yet closed; regulatory approvals 
              (SEC registration statement review, shareholder vote) remain pending. The 
              expected NYSE listing target was H1 2026, though the timeline has extended. 
              Einride remains a private company as of the run date of this report (2026-05-07).

              The $1.8B valuation at the SPAC implies an approximately 39-42x revenue 
              multiple on $43-47M estimated 2024 revenue — a premium reflecting autonomous 
              vehicle technology and EV freight decarbonization optionality rather than 
              current-year revenue alone.
