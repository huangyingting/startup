- id: comparable-valuation
  title: Comparable Set and Valuation Benchmarks
  body: 'Valuation comparables for Waabi fall into three categories: (1) public AV trucking companies at various lifecycle
    stages; (2) private AV trucking rounds at comparable milestones; and (3) logistics-automation M&A transactions. Aurora
    Innovation (NASDAQ: AUR) provides the most direct public comparable: Aurora completed its driverless commercial launch
    in April 2025 with NVIDIA backing and Uber Freight and FedEx as customers. Aurora''s market capitalisation has ranged
    from $800M to $2.5B in 2025-2026, implying a significant discount to its private round peak of $13B. The Embark Trucks
    SPAC failure ($5B implied valuation at announcement, near-zero at delisting) establishes a cautionary data point for pre-commercial
    AV trucking. Plus.ai''s Chinese market pivot and Torc Robotics'' acquisition by Daimler Truck at an undisclosed valuation
    establish strategic acquisition as a plausible Waabi exit path.


    The $3B Waabi pre-money valuation represents a 1.5-2x premium to Aurora''s current public market valuation at comparable
    commercial stage. This premium is justified if Waabi''s simulation-first approach delivers a structurally lower cost-to-autonomy
    than Aurora''s physical-mile-heavy method. If Aurora''s EBITDA margin at commercial scale provides a template, Waabi''s
    long-run margin target of 50-60 percent on RaaS (post-driverless) is plausible but not proven.'
  claimRefs:
  - CV015
