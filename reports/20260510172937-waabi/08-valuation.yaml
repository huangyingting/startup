- id: financing-context-entry-discipline
  title: Financing Context, Entry Discipline, and Dilution Overhang
  body: 'Waabi has raised $1.28B across Series A through C as of January 2026, with a $3B pre-money Series C valuation implying
    a post-money of approximately $3.5-4B. Investors in the Series C include strategic and financial investors not publicly
    disclosed in detail; the presence of Canadian institutional capital and technology-sector crossover funds is consistent
    with the round size. The $3B pre-money prices in: (a) successful Q4 2026 driverless launch, (b) Uber Freight revenue ramp
    to $50-100M ARR by end-2027, and (c) Volvo OEM fleet deployment beginning 2028. Entry discipline at this valuation is
    binary: if the driverless milestone slips by 12+ months, the $3B valuation will likely need to be reset at a flat or down
    round, implying dilution risk for Series C investors.


    Dilution overhang analysis: Waabi has raised $1.28B total. Assuming standard VC preference structures (1x non-participating),
    liquidation preference exposure at Series C is manageable if exit valuation exceeds $4B. Below that threshold, preference
    overhang begins to compress common and employee equity. For a strategic acquirer at a $5B exit, returns to Series C investors
    would be approximately 40-50 percent of exit value after waterfall. At a $10B exit (base case), returns to Series C investors
    would be 65-70 percent of exit value. Public market exit would require driverless fleet deployment at meaningful scale
    (200+ trucks, $100M+ ARR) to sustain an AV premium multiple.'
  claimRefs:
  - CV006
  - CV007
  - CV008
  - CV009
