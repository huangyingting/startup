  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: waabi-cap-table
    missingEvidence: Waabi cap table, investor composition, liquidation preference terms, and option pool size are not publicly
      disclosed.
    whyItMatters: Without cap table data, the waterfall model and return projections for Series C investors cannot be accurately
      computed.
    diligencePath: Request full cap table including preference stack, anti-dilution provisions, and option pool under NDA.
    relatedTableRefs:
    - TV001
  - type: private-evidence-only
    severity: blocking
    topic: waabi-financials
    missingEvidence: Waabi burn rate, revenue, and financial projections under the three milestone scenarios are not publicly
      disclosed.
    whyItMatters: Without financial models, base-case IRR and runway-adequacy analysis cannot be independently validated.
    diligencePath: Request audited financials and three-scenario financial model with assumptions under NDA.
  - type: missing-source
    severity: material
    topic: aurora-comparable-detail
    missingEvidence: Aurora Innovation 10-K provides comparable data but unit economics, per-mile pricing, and margin at commercial
      scale are disclosed at a summary level only.
    whyItMatters: Detailed AV trucking unit economics are required to validate the RaaS margin assumptions that underpin the
      valuation model.
    diligencePath: Review Aurora 10-K in full; request Waabi unit economics under NDA; cross-validate against Aurora public
      disclosure.
    relatedTableRefs:
    - TV004
