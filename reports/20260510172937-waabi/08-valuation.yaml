chapter:
  number: 8
  title: Valuation and Investment Recommendation
  summary: 'Waabi is a conditional buy at the $3B pre-money Series C valuation for investors with a 7-10 year horizon and
    high risk tolerance. The investment thesis is simulation-first technical moat plus Uber Freight/Volvo OEM dual-flywheel;
    the anti-thesis is regulatory uncertainty, customer concentration, and milestone execution risk. Bull/base/bear exit valuations
    of $15-25B, $8-15B, and $2-5B imply a base-case IRR of 25-35 percent; the bear case is near-zero or negative. The Q4 2026
    driverless launch is the thesis-defining event: investors should gate funding tranches to milestone achievement.'
