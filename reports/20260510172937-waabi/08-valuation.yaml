- id: exit-readiness-diligence-asks
  title: Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks
  body: 'Exit readiness analysis: Waabi is unlikely to pursue an IPO before the driverless milestone and at least 12 months
    of post-driverless revenue data. The earliest plausible public market window is 2028-2029 at $200M+ ARR run-rate and demonstrated
    unit economics at scale. Strategic acquisition by an OEM (Volvo, Daimler, PACCAR), a logistics conglomerate (XPO, J.B.
    Hunt, Werner), or a technology platform (Amazon, Alphabet) is the most likely near-term exit path if the thesis holds.
    Uber''s right-of-first-refusal or strategic option embedded in the 10-year supply agreement, if any, would be a critical
    diligence ask.


    Thesis-break triggers that should stop additional investment: (a) federal moratorium on driverless trucking; (b) Uber
    Freight suspension of AV programme; (c) fatal driverless incident in the launch window; (d) NVIDIA supply disruption lasting
    6+ months; (e) Raquel Urtasun departure before driverless milestone. Monitoring triggers that should prompt tranche hold:
    (a) Q4 2026 driverless launch missed without credible recovery plan; (b) disengagement rate above 1 per 1,000 miles in
    supervised pilots; (c) Uber Freight load utilisation below 80 percent of committed capacity.


    Final diligence asks: (1) internal safety gate criteria and current vs. target metrics; (2) Uber Freight supply agreement
    exit clauses and pricing schedule; (3) NVIDIA supply contract and multi-year allocation terms; (4) cap table and option
    pool dilution schedule; (5) Series C liquidation preference and pay-to-play provisions; (6) Voluntary Safety Self-Assessment
    draft; (7) monthly burn and runway model under three scenarios.'
  claimRefs:
  - CV020
  - CV021
  - CV022
