- id: bull-base-bear-scenarios
  title: Bull, Base, and Bear Scenario Analysis
  body: 'The bull case requires three events occurring in sequence: (1) Q4 2026 driverless launch on schedule with zero significant
    incidents; (2) Uber Freight rapid ramp to 100+ trucks and 10M+ miles in 2027; and (3) Volvo production ramp beginning
    2028. In this scenario, Waabi achieves $400-600M in RaaS revenue by 2028, supporting a 15-20x revenue multiple and an
    implied exit valuation of $6-12B. On the primary market in 2028-2029 at scale, a 30-50x ARR exit is plausible if AV trucking
    achieves mainstream institutional acceptance, implying a $15-25B valuation.


    The base case assumes: (1) Q1-Q2 2027 driverless launch (1-2 quarter delay); (2) Uber Freight ramp to 50-100 trucks by
    end-2027; and (3) Volvo production commitment confirmed but production beginning 2028-2029. In this scenario, Waabi achieves
    $150-300M ARR by end-2028 and exits at 25-40x ARR, implying an $8-15B valuation. Series C investors at $3B entry would
    achieve approximately 2.5-5x MOIC over a 7-year hold, consistent with a 20-30 percent IRR.


    The bear case assumes: (1) 2028+ driverless launch (12-18 month delay); (2) Uber Freight limited ramp or renegotiated
    terms; and (3) Volvo production timeline extended. In this scenario, Waabi''s extended supervised-pilot burn forces a
    bridge round at or below the $3B valuation; Series C investors face dilution and potential preference erosion. Exit valuation
    of $2-5B (1-1.7x revenue at $150M ARR) implies a 0-0.7x MOIC for Series C investors, representing a substantial loss relative
    to opportunity cost.'
  claimRefs:
