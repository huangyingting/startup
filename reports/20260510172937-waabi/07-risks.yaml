- id: regulatory-legal-risk
  title: Regulatory and Legal Risk
  body: Waabi's path to driverless commercial trucking is gated by two federal regulatory processes — the FMCSA
    ADS rulemaking (Docket FMCSA-2023-0052) and conditionally a NHTSA FMVSS exemption for AV-specific vehicle
    modifications. The FMCSA NPRM was published in May 2023 and a final rule has not been issued as of May 2026,
    representing a three-year lag from NPRM to final rule with no confirmed promulgation timeline. Morgan Stanley
    estimates that each 12-month rulemaking delay depresses expected valuations by 15-25% for pre-driverless AV
    trucking companies, and KPMG's 2026 AV investor risk survey identified regulatory uncertainty as the number-one
    diligence concern among institutional investors surveyed. Aurora Innovation's own 10-K risk factors flag this
    same FMCSA rulemaking risk as material, confirming its industry-wide applicability.
    State-level permits provide a partial substitute. Texas DOT has issued a supervised-operations AV permit for
    Waabi's I-10 and I-20 corridor, but this permit covers safety-driver-present operations only and would not
    survive a safety incident without regulatory review. On the intellectual property front, Waabi holds 40-plus
    patents in Gaussian splatting scene reconstruction, neural rendering, and differentiable world models providing
    a defensive patent position, but Waymo and Aurora hold dense overlapping portfolios where competitor assertion
    risk remains latent. No freedom-to-operate analysis has been publicly disclosed. Privacy regulations including
    CCPA, GDPR, and Canadian PIPEDA apply to sensor data collection and would require compliance expansion for
    geographic growth beyond Texas. The ATA's 2025 policy framework warns that state-by-state permitting is an
    inadequate substitute for federal FMCSA standards, reinforcing the regulatory gap risk that Waabi currently
    navigates. Table TR001 provides the comprehensive regulatory and legal risk register with severity rankings
    and diligence paths.
