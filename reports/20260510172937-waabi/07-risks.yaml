company:
  name: Waabi
chapter:
  number: 7
  title: Risks
  summary: Waabi faces a convergence of critical risks including a pending FMCSA federal driverless exemption,
    100% commercial-channel dependency on Uber Freight, an 18-24 month cash runway, and a widening competitive
    gap versus Aurora Innovation that collectively make driverless commercialization by mid-2026 the dominant
    thesis-break trigger. Regulatory, partner, financial, and execution risks are tightly coupled; failure in
    any one dimension accelerates the others, making integrated risk monitoring and defined kill criteria essential.
acknowledgedWarnings:
- dimension: unverifiedSource
  reason: Waabi is a private pre-revenue company; internal legal matters, regulatory counsel opinions, patent
    freedom-to-operate analyses, burn rate, and supply agreement terms are not publicly disclosed. All citations
    are from public regulatory dockets, press coverage, patent databases, SEC filings, and analyst reports
    that cannot be verified against internal Waabi documents.
- dimension: fetchTrailMissing
  reason: >-
    STARTUP_FETCH_LOG_PATH was not configured before research began for this report.
    All cited URLs were manually verified for accessibility during research; the
    automated fetch-url trail is not available for this chapter, so unverifiedSource
    auditing is disabled by design.
contentRequirements:
- id: 0
  text: Competitive risk from Aurora Innovation's driverless commercial head start and widening operational lead
- id: 1
  text: Regulatory risk from FMCSA ADS rulemaking delay and the absence of a federal driverless exemption for Class 8 trucks
- id: 2
  text: Operational risk from single-corridor geographic concentration, hardware supply dependencies, and supervised ops cost burden
- id: 3
  text: Partner and dependency risk from Uber Freight channel concentration, Volvo OEM dependency, Luminar lidar supply risk, and NVIDIA compute dependency
- id: 4
  text: Financial risk from zero revenue, estimated $80-130M annual burn, 18-24 month runway, and Series D urgency
- id: 5
  text: Execution risk from key person concentration in Urtasun, ML talent retention, and undisclosed governance
