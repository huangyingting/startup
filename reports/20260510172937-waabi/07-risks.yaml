  title: Regulatory / legal risk register
  type: enumeration
  enumeration: true
  layout: wide
  columns:
  - Rule or License or Case
  - Jurisdiction
  - Status
  - Likelihood
  - Severity
  - Mitigation
  - Residual Exposure
  - Diligence Path
  rows:
  - - FMCSA Class 8 AV exemption (49 CFR Part 390 and 392) — NPRM published 2023, final rule pending
    - Federal (US)
    - Final rule not issued as of May 2026; unattended driverless operations of Class 8 trucks legally prohibited
    - High — rule finalization is a hard gate; no interim federal exemption mechanism has been publicly offered
    - Critical
    - Active ATA coalition engagement; Texas supervised ops as interim milestone; FMCSA docket monitoring
    - Entire commercial driverless launch blocked without federal exemption regardless of technical readiness
    - Monitor FMCSA docket FMCSA-2023-0052 quarterly; obtain Waabi regulatory counsel opinion on timeline
  - - Texas DOT AV permit (supervised operations on I-10 and I-20 corridors only)
    - Texas
    - Active permit in good standing; safety-driver-present operations authorized; no driverless coverage
    - Low — permit current with no reported compliance violations or enforcement actions
    - Medium
    - Ongoing compliance with TxDOT reporting requirements and incident notification obligations
    - Permit could be suspended or revoked following any safety incident or regulatory finding
    - Confirm permit renewal cadence, compliance obligations, and incident notification triggers with Waabi
  - - NHTSA FMVSS exemption for any AV-specific vehicle modifications on Volvo VNL platform
    - Federal (US)
    - Not applied as of May 2026; Volvo VNL certified to standard FMVSS; novel AV modifications may require petition
    - Medium — standard Volvo FMVSS certifications may cover most modifications; novel AV changes create exposure
    - High
    - Volvo joint engineering minimizes novel modifications; existing FMVSS certifications reduce exemption scope
    - Unexpected exemption requirement or NHTSA denial could delay driverless launch by 12-24 additional months
    - Confirm whether Waabi or Volvo has filed or plans to file any NHTSA FMVSS exemption petition for AV mods
  - - Patent infringement exposure from Waymo and Aurora dense AV patent portfolios
    - US and international
    - No known active litigation as of May 2026; Waabi holds 40-plus defensive patents; competitor portfolios dense
    - Medium — Waymo and Aurora hold thousands of AV patents with potential simulation and perception overlap
    - High
    - Waabi's own patent portfolio provides defensive coverage; academic prior art from Urtasun research reduces exposure
    - Injunction risk if competitor asserts patent on Gaussian splatting or neural rendering methods at scale
    - Commission FTO analysis for top 20 Waymo and Aurora AV patents in simulation, perception, and planning
  - - Privacy and data regulations for sensor data (CCPA, GDPR, Canadian PIPEDA)
    - US, Canada, and international
    - Compliance required for current Texas ops and any future geographic expansion; no public privacy audit available
    - Low to medium — manageable with standard data governance program; new jurisdictions add compliance complexity
    - Medium
    - Data governance policies assumed in place; sensor data collected only on public Texas corridors currently
    - Sensor data collection from pedestrians and third-party vehicles may face regulatory challenge in new jurisdictions
    - Request Waabi privacy impact assessment, data retention policy, and cross-border data flow documentation
  notes: Regulatory and legal risk register based on FMCSA public rulemaking docket FMCSA-2023-0052, NHTSA AV
