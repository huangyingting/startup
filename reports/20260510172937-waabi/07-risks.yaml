- id: mitigations-monitoring-diligence
  title: Mitigations, Monitoring Indicators, and Diligence Asks
  body: Waabi has implemented several partial mitigations for its highest-severity risks. The appointment of Lior
    Ron (former Uber Freight CEO) as COO in August 2025 provides institutional relationship depth with the Uber
    Freight channel and operational execution capability complementing Urtasun's technical leadership. The 10-year
    Uber Freight agreement provides contractual duration, though the absence of disclosed minimum volumes limits
    its protective value considerably. NVIDIA and Khosla strategic investor relationships provide some supply
    priority signaling, though no formal supply agreement has been disclosed for NVIDIA Drive Thor. Texas DOT permit
    compliance provides active regulatory standing for supervised operations. The 40-plus patent portfolio provides
    a defensive IP position that reduces but does not eliminate competitor patent assertion risk.
    Investors should monitor the following leading indicators on a quarterly cadence — FMCSA Federal Register
    publication of a final ADS rule or advance rulemaking update; Waabi supervised-miles disclosures if provided;
    Uber Freight annual report AV freight segment metrics; NHTSA AV voluntary safety database filings for Waabi;
    Luminar Technologies quarterly financial results and cash position; Aurora Innovation fleet size and revenue
    disclosures; and any Waabi Series D financing announcement. The kill criteria that should trigger investment
    thesis re-evaluation or exit include FMCSA final rule not published by Q4 2026; Waabi cash runway falling
    below 9 months without Series D commitment or driverless revenue; Aurora reaching 50 or more driverless trucks
    with $30 million or more annualized revenue before Waabi achieves driverless launch; Uber Freight load volumes
    flat or declining for two consecutive quarters; and any safety incident involving bodily injury or fatality
    in supervised Texas operations. Required pre-investment diligence asks include regulatory counsel opinion on
    FMCSA timeline, full Uber Freight supply agreement text, Waabi board composition and governance documents,
    audited financial statements, NHTSA FMVSS exemption filing status, and FTO analysis for the top 20 competitor
    patents in simulation and perception.
