  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Waabi 的收入架构建立在机器人即服务（RaaS）模式上：车队运营商或物流客户按英里付费，把 AV 系统作为托管服务使用，不拥有也不维护自动驾驶硬件。这个模式类似 SaaS：Waabi 承担 AV
              技术栈的资本开支，再通过每份商业协议生命周期内的按英里收费收回成本。主要商业渠道是为期 10 年的 Uber Freight 合作，它把 Dallas-Houston I-45
              走廊及未来扩展线路上的货运需求直接导向 Waabi 运营的卡车，免去 Waabi 自建需求侧销售基础设施。第二条收入流来自 Waabi 与 Volvo Trucks 的 OEM 集成合作：Waabi Driver
              嵌入 VNL Autonomous 系列，作为授权软件组件，在商业量产规模下产生按车或订阅费用。截至 2026 年 Q1，Waabi
              尚未确认商业按英里收入；无人驾驶上线里程碑仍是首次商业收入确认的触发点。行业分析师估计，可商业持续的自动驾驶卡车每英里价格为 $2.50 至 $4.00；相比之下，人类司机全口径成本为每英里 $1.80 至
              $2.20，因此理论上存在溢价定价窗口。
