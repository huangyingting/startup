      - number: '3.3'
        title: Kodiak Robotics、Torc Robotics 与 Plus.ai
        blocks:
          - type: paragraph
            body: >
              Kodiak Robotics 是与 Waabi 第二接近的私营竞争对手。Kodiak 2018 年由前 Uber ATG 和 Google 高管创立，累计融资约 $300–$448M，Google
              Ventures 是领投方，并在 Texas 货运走廊的 Kenworth T680 卡车上部署 Atlas AI 栈。Kodiak 的关键差异点包括 DARPA
              自动驾驶军事物流合同（带来非商业收入和政府可信度）、严格只聚焦 Texas 的地域策略，以及与 Bridgestone 合作整合轮胎传感器数据。Kodiak 尚未上线商业无人驾驶运营，但已开展无人测试运行。

              Torc Robotics 呈现完全不同的竞争模型：Daimler Truck（现 Mercedes-Benz Trucks）于 2019 年收购 Torc，它作为 OEM 集成的自动驾驶卡车项目运营。Torc
              的竞争优势是与 Daimler 的 Class 8 Freightliner Cascadia 卡车、制造关系、经销商网络，以及 Daimler 百年安全记录带来的监管可信度深度集成。Torc 正在
              Virginia 和 New Mexico 开展商业测试。OEM 集成模型意味着，如果 Daimler 承诺商业部署，Torc 可能比纯 AV 公司更快规模化；但也意味着 Torc 的自动驾驶受制于
              Daimler 的商业决策。

              Plus.ai 走的是明显不同的市场位置：不是 Level 4 全自动驾驶，而是其 SuperDrive 系统提供 Level 2+ 高级驾驶辅助，商业运营仍有人类安全司机在场。Plus.ai 已与
              Amazon、FedEx 和中国承运人在美国、中国和欧洲商业部署 SuperDrive。这一路径技术雄心较低，但商业验证规模大于任何 Level 4 竞争对手。Plus.ai
              的风险在于，它不是司机短缺的替代方案，而是补充；来自 OEM 集成 ADAS 系统的商品化压力也可能随时间侵蚀其差异化。
            claimRefs:
              - CP014
              - CP015
              - CP016
              - CP017
              - CP018
              - CP019
              - CP020
      - number: '3.4'
        title: 能力、商业化路径与护城河对比
        blocks:
          - type: paragraph
            body: >
              从技术路径看，Waabi 与 Aurora 的核心战略差异很清晰：Waabi 使用主要在仿真（Waabi World）中训练的端到端生成式 AI 模型；Aurora
              使用模块化传感器融合流水线，明确拆分感知、预测和规划模块。Waabi 称这能借助合成数据生成更快提升能力，并在地域之间更好泛化。但截至 2026 年 5 月，Aurora 已经证明商业无人驾驶运营规模超过一年，而
              Waabi 尚未达成商业无人驾驶状态——所以此阶段 Aurora 路径才是经过实证验证的路径。

              从商业化路径看，Waabi 与 Uber Freight（投资方和商业渠道）及 Volvo（OEM 硬件伙伴）的合作，在结构上类似 Aurora 与 Werner/FedEx 及
              Kenworth/Peterbilt 的合作。关键差异是 Waabi 集中依赖单一商业渠道（Uber Freight），而 Aurora 拥有多元承运人关系。这给 Waabi
              带来更高近期收入集中风险，但也带来更深合作承诺，以及形成更一体化商业模型的可能性。

              在分销能力和切换成本上，Waabi 和 Aurora 近期都面临较低承运人切换成本——市场发展过程中，货运承运人可以同时接触多个 AV 供应商。但安全记录和特定路线数据会逐步沉淀成资产，随着承运人运营团队熟悉
              AV 系统在特定车道上的行为，事实上的锁定效应会逐渐形成。OEM 硬件合作（Waabi-Volvo、Aurora-Kenworth）在车辆层面形成中期切换成本。该领域任何 AV
              公司的护城河，最终都是安全里程数据集和商业履约记录；Aurora 目前构建得最快。
