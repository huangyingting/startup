      - number: '4.5'
        title: 财务缺口与判断
        blocks:
          - type: paragraph
            body: >
              Waabi 的收入模式逻辑完整，理论上站得住——通过 Uber Freight 渠道收取按英里 RaaS 费用——但截至 2026 年 Q1，公司仍完全没有收入，无人驾驶商业上线是首次收入确认的关键闸门。按每年
              $80M 至 $130M 的估计烧钱额，对照 Series C 后 18 至 24 个月现金跑道，公司的资金余地很紧，商业部署延误空间有限。核心财务风险很急：如果无人驾驶上线推迟到 2026 年 Q4
              之后，在有意义收入出现前，公司的现金跑道可能被压缩到 12 个月或更短。收入侧最大的单一尽调缺口是按英里定价能力——如果 Waabi 无法维持高于 Aurora 每英里 $1 至 $2
              的市场出清底价，利润率画像会坍塌。如果商业运营在 2026 年 Q4 启动，初始车队 20 至 50 辆，首年收入视定价和利用率而定，可能达到 $5M 至 $30M。最关键的缺失私有财务指标包括经审计的 2025
              年财务、2026 年 Q1 实际现金余额和烧钱速度、Uber Freight 合同下确认的每英里价格，以及 GPU
              算力和基础设施成本披露。财务判断是：模式具备投资可能，但仍等待商业执行验证；资本效率和上线时点是生死变量。
