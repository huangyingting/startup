      - number: '1.6'
        title: 关键证据
        blocks:
          - type: callout
            title: 世界级创始人，领域履历几乎无人能比
            body: >
              Raquel Urtasun 位列全球前五的自动驾驶 AI 科学家，创立 Waabi 前曾领导 Uber ATG 研究。她的学术信誉（University of Toronto 教授、与 Geoffrey
              Hinton 共同创办 Vector Institute）、产业履历（在 Uber ATG 四年）和科学网络（Hinton、Fei-Fei Li、Pieter Abbeel
              是早期支持者），共同构成极高的创始人-市场匹配度。这种履历让 Waabi 能吸引顶尖 AI 人才、知名投资方和大型 OEM / 物流合作伙伴，竞争对手很难复制。Time、Order of
              Ontario、Royal Society of Canada 和 CNBC Changemakers 都给过她荣誉，说明她在机构、政府和媒体受众中都得到验证。
            calloutType: strength
            claimRefs:
              - CO006
              - CO007
              - CO008
              - CO011
          - type: callout
            title: 无人驾驶上线延期与仿真质疑都是反向信号
            body: >
              Waabi 明确提出 2025 年底前完成完全无人驾驶商业化上线，这一目标在 2024 年 6 月 Series B 时对外传达。到 2026 年 1 月，CEO Urtasun 承认延期，并称原因是 OEM
              验证时间表。与此同时，竞争对手 Aurora 的案例（2025 年推出无人驾驶服务，但后来重新引入人类观察员）和 TuSimple
              倒闭都说明，该赛道很难把声称的能力转化为持续、安全的商业运营。行业专家和监管方仍质疑 Waabi 的仿真优先验证路径——99.7%
              的仿真准确率能否在监管审批中替代真实安全里程——因此可能带来媒体报道未充分反映的审批时间风险。
            calloutType: risk
            claimRefs:
              - CO030
              - CO031
              - CO033
              - CO037
          - type: callout
            title: 仿真优先架构让双垂直扩张以更低资本成本成立
            body: >
              Waabi 核心架构押注是一套主要在仿真（Waabi World）中训练的单一端到端 AI 模型，能够跨车型、地域和用例泛化；2026 年 1 月扩展到 robotaxi 后，这一押注正在被实操检验。Aurora
              的资本基础为 $3.46B，而 Waabi 为 $1.28B（少 $2.18B），说明 Waabi 用明显更少资本搭出了可比能力。NVIDIA CEO Jensen Huang 的背书（「Waabi
              正在打开真正部署」）和 Uber CEO Dara Khosrowshahi 的合作承诺，为该路径提供高层验证。如果 2026 年无人驾驶上线成功，且同一模型部署到 robotaxi，Waabi
              将用经验数据证明双垂直资本效率逻辑。
            calloutType: insight
            claimRefs:
