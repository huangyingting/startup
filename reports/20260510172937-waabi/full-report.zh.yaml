      - number: '4.4'
        title: 资本充足性与现金跑道
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 1 月，Waabi 全轮次累计融资约 $1.28B，核心是以 $3.0B 投前估值完成的 $200M Series C。投资方包括 Khosla Ventures、Union Square
              Ventures 和 BDC Capital，形成深科技硅谷资本与加拿大机构支持的组合。在基准情形下，若年度烧钱 $100M，并假设 Series C 带来 $200M 总现金流入，则隐含现金跑道可延伸至约
              2027 年中至下半年，尚未计入任何商业收入抵消。这个跑道估算不确定性很高，因为 Waabi
              的实际现金头寸和烧钱速度并非经审计的公开数据。公司未公开披露任何债务融资、项目融资或资产支持信贷工具，这与可抵押资产有限的商业化前技术公司特征一致。加拿大 NRC-IRAP 项目的非稀释性资金（约
              C$8M）补充了股权资本栈。如果商业收入无法充分扩大并覆盖运营成本，公司可能需要在 2027 至 2028 年进行 Series D 或基于里程碑的融资安排。由于硬件采购、实体测试基础设施以及
              Copilot4Science 对 GPU 算力的需求，Waabi 的资本强度在结构上高于纯软件公司，资本效率因此成为关键尽调点。
