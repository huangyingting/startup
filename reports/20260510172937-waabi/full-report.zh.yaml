            body: >-
              衡量 Waabi 采用进展，最合适的指标是已累积的有监督自动驾驶里程，而不是产生收入的货运单量或活跃客户账户，因为公司尚未披露商业货量或收入。公司于 2024 年中在 Interstate
              45（Dallas-Houston 走廊）启动有监督试点，并到 2026 年初扩展至 Interstate 35，显示地理覆盖在推进。Waabi 完成 Series C（2026 年 1 月）以及宣布 I-35
              扩张，是公开信息中最具体的运营动能信号。


              公开数据中没有累计行驶里程、接管率、完成货运单数或车队规模。竞争对手 Aurora Innovation 和 Waymo Via 已发布更细的运营指标（每次干预里程、车队规模、已交付货量），因此 Waabi
              的采用证据相对薄弱。如果 2026 年 Q4 无人驾驶上线目标实现，将标志公司从有监督试点采用过渡到商业规模部署。在此之前，采用轨迹可信，但缺乏独立公开证据验证。
