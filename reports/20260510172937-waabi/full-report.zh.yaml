      - 发生可能性
      - 严重性
      - 缓释措施
      - 尽调路径
    rows:
      - - Raquel Urtasun（CEO，唯一技术创始人）
        - 技术路线、投资人信任、研究策略和行业关系都集中在创始人一人身上
        - 低至中——AV 创业公司普遍有关键人物风险；Urtasun 未披露接班计划
        - 严重——若离职，很可能引发投资人撤离、合作伙伴重新评估和董事会不稳
        - COO Ron 补上运营深度；董事会参与可能保障交接连续性
        - 核实接班计划、关键人物保险覆盖和股权归属悬崖期加速条款
      - - Lior Ron（2025 年 8 月聘任的 COO）
        - 商业与运营落地；亲自管理 Uber Freight 渠道关系
        - 低——Ron 行业背景强，个人激励与 Waabi 成功一致
        - 高——Ron 是唯一直接做过货运运营、又有 Uber Freight 高管关系经验的管理层
        - 曾任 Uber Freight CEO，带来深厚运营信用和货运行业网络
        - 核实 Ron 持股、锁定期，以及约束 Uber Freight 关系延续的条款
      - - ML 工程与 AV 系统团队留存
        - 约 300 名工程师，身处 Toronto 和 San Francisco 竞争激烈的 ML 人才市场
        - 中——2025-2026 年超大规模云厂商和 AI 实验室需求旺盛，ML 人才市场竞争很激烈
        - 高——关键 ML 工程师流失会拖慢 Waabi World 迭代和 Waabi Driver 开发速度
        - 按隐含 $3 billion 估值授予的 IPO 前期权，提供高于市场的财务激励
        - 审阅员工归属时间表、股权刷新政策和工程团队流失率
      - - 董事会与治理构成
        - 董事会构成未披露；董事会可能由投资人主导；外部观察者看不清治理结构
        - 低至中——若投资人利益偏离长期运营需要，治理风险会上升
        - 中——治理安排不披露，冲突管理和受托监督留下尽调缺口
        - 暂无已知治理事件；多家投资人可能形成一定制衡
        - 要求提供董事会构成、委员会结构、投票协议和任何投资人权利协议
    notes: 人员风险评估基于公开领导层公告和 AV 行业治理惯例。董事会构成、归属时间表、关键人物保险和接班规划文件均为非公开资料，需要通过尽调获取。
    claimRefs:
      - CR033
      - CR034
      - CR037
  - id: TR005
    title: 止损条件与监测指标
    type: comparison
    layout: standard
    columns:
      - 风险类别
      - 可监测触发项
      - 阈值或事件
      - 行动含义
    rows:
      - - FMCSA 监管延迟
        - 按季度监测 Federal Register 和 FMCSA 案卷 FMCSA-2023-0052 发布情况
        - 到 2026 年 Q4 仍未发布最终规则，也未签发临时豁免
        - 无人驾驶上线实际再受阻 12 个月或更久；重新评估仅监督运营的商业逻辑
      - - 现金跑道耗尽
        - 监测月度烧钱速度，以及任何新融资公告或 Series D 条款清单
        - 没有 Series D 承诺或无人驾驶商业收入合同时，现金跑道降至 9 个月以下
        - 投资逻辑破裂触发项——Waabi 进入困境融资情景；考虑重新评估或退出投资仓位
      - - 与 Aurora 的竞争差距
        - Aurora 季度 SEC 文件；车队规模披露；收入指引公告
        - 在 Waabi 无人驾驶上线前，Aurora 达到 50 辆或更多无人驾驶卡车，且年化收入达到 $30M 或以上
        - 重新评估 Waabi Series D 叙事；先于 Aurora 跑出商业规模单位经济的概率下降
      - - Uber Freight 货量停滞
        - 若 Waabi 披露 AV 行程量则跟踪；Uber Freight 年报中的 AV 货运分部指标
        - 经 Waabi 卡车承运的货量连续两个季度持平或下降
        - 渠道集中风险兑现；立即启动退出或重组商业投资仓位
      - - Texas 监督运营中的安全事故
        - NHTSA AV 自愿安全数据库；Texas DOT 许可报告；媒体和事故监测服务
        - Waabi 在 Texas 走廊监督运营期间发生任何涉及人身伤害或死亡的事故
        - 监管许可很可能暂停；声誉大概率崩塌；考虑立即重新评估并减仓
      - - 困境 Series D 融资
        - 融资公告；条款清单披露；Waabi 股权二级市场定价信号
        - Series D 定价低于 Series C 隐含估值，或附带惩罚性清算优先权结构
        - 资本结构承压；既有投资人保护面临风险；考虑立即减仓
    notes: 止损阈值是分析师判断，参考了 TuSimple、Embark 等可比 AV 创业公司的轨迹，以及机构投资人的标准尽调口径。实际阈值应按单个投资人的风险承受力和仓位规模校准。
    claimRefs:
      - CR009
      - CR017
      - CR026
      - CR027
      - CR028
      - CR035
