      - number: '4.3'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >
              Waabi 的单位经济模型把资本密集的硬件层与规模化后高毛利的软件授权机会绑在一起。按 2025 年当前产量估算，一套完整 L4 AV 卡车系统每车成本约 $150,000 至
              $250,000；在高产量连续生产下，成本可降至 $50,000 至 $80,000。与之对应，被替代的人类司机年度全口径成本约为每座 $95,000 至 $115,000；AV 卡车每天可运行 22 至 24
              小时，而人类司机受监管上限约 11 小时约束，等于把单车有效年里程翻倍。若每年跑 50,000 英里收入里程、节省 $100,000 年度司机成本，一套 $200,000 的 AV
              系统在维护和折旧前约四年回本。但在获准无人驾驶前，有监督自动驾驶阶段每辆车每年还要承担 $50,000 至 $80,000 的安全员成本，导致单车单位经济模型严重为负。Waabi 的
              Copilot4Science 模拟平台可将实体测试里程减少约 70%，相较依赖大量传感器的竞争对手，显著压低开发阶段成本。商业规模下，软件授权组件的毛利率估计为 60% 至 80%。Waabi
              年度总烧钱额估计为 $80M 至 $130M，主要由约 300 名工程师驱动，按每人每年 $180,000 全口径成本计算，仅薪酬就达 $54M；另有硬件采购、GPU 算力和实体测试基础设施支出。
