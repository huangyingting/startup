      - number: '6.3'
        title: 具名客户证明
        blocks:
          - type: paragraph
            body: >-
              Waabi 最主要的具名客户证明，是 2024 年 6 月宣布的 Uber Freight 10 年合作协议；这是 Waabi 公开记录中最实质的商业承诺。Uber Freight
              在自己的新闻稿中确认了该合作，并称其为覆盖特定州际走廊的战略性多年供应协议。Volvo Trucks 于 2024 年 11 月确认与 Waabi 进行 VNL Autonomous OEM
              集成，代表来自大型工业交易对手的第二层量产意图验证。


              第三方托运人案例研究、参考客户或结果指标（已交付货量、运输时间缩短、破损率）均未发布。Uber Freight 合作以合同层面措辞描述（10
              年期限、特定走廊），但未披露单票定价、最低运量承诺或收入保证。这使具名客户证明的质量停留在“战略公告”层级，而不是机构买家通常要求的“生产结果”层级。Wired、FreightWaves 和 Reuters 都把
              Waabi-Uber Freight 关系视为可信，但也指出缺少结果指标是透明度缺口。
