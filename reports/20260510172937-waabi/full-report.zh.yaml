      - number: '5.2'
        title: 模块与资产图
        blocks:
          - type: paragraph
            body: >-
              Waabi 产品平台由五个集成模块构成，共同形成垂直整合的 AV 开发与部署栈。第一，Driver+（AV 软件栈）是面向客户的收入单元：它是一套实时端到端神经网络系统，运行在车载 NVIDIA Drive
              Thor 算力上，把原始传感器输入以低于 100ms 的延迟转换为卡车执行器指令。第二，Waabi World（生成式模拟器）是训练和验证环境：它通过可微渲染和 Gaussian splatting 每天生成超过
              1 亿英里的模拟驾驶里程，为对抗生成的交通场景产出逼真的 lidar 和摄像头传感器输出。第三，传感器套件（250m 距离的 Luminar Iris lidar、8 摄像头 360
              度阵列，以及提供全天候冗余的雷达阵列）是感知硬件层。第四，Volvo VNL Autonomous 平台是实体车辆层，提供符合 SAE Level 4
              能力、按汽车安全标准预认证的冗余转向、制动和电源管理。第五，Uber Freight 调度集成是商业运营层，提供货物匹配、路径规划和 ELD 合规自动化。产品模块图揭示一个关键战略模式：Waabi
              承担全栈的软件、硬件、OEM 车辆和传感器认证的资本与集成负担，却通过按英里收费而不是软件授权变现——因此比纯软件业务更资本密集，但也更能抵御商品化。每个模块都有独立尽调缺口：Driver+
              的无人驾驶安全论证尚未确认；Waabi World 的算力成本未披露；传感器 BOM 和 lidar 排他条款是私有信息；Volvo
              的生产承诺和交付时间表也未披露。这些缺口合在一起，是任何潜在投资人或合作伙伴优先级最高的尽调工作项。
            claimRefs:
              - CE004
              - CE005
              - CE006
