  - id: FR001
    title: 风险热力图：可能性 vs 影响
    type: matrix
    layout: wide
    summary: 四乘四风险热力图，按可能性（高到很低）和影响（低到关键）绘制 Waabi 的主要风险类别；最高严重度集中在高可能性、关键影响单元格，主导风险是 FMCSA 豁免延期和无人驾驶上线延期。
    approximationNotes: 可能性和影响评级为分析师判断，基于公开证据。尚未产生收入的私营公司风险没有精确概率；评级反映所引来源对相对严重性的共识。
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 严重影响
      rows:
        - label: 高可能性
          values:
            - 新司法辖区的隐私与数据合规复杂度
            - 德州恶劣天气下传感器性能衰减
            - 无人驾驶上线较 2026 年中推迟 6 个月或更久
            - FMCSA 豁免悬而未决，阻断全部商业无人驾驶运营
        - label: 中等可能性
          values:
            - 审计或治理文件缺口
            - 多伦多和旧金山市场竞争激烈，机器学习人才留存承压
            - Uber Freight 货量下降或优先级降低
            - Series D 交割前现金跑道耗尽
        - label: 低可能性
          values:
            - 新型自动驾驶改装引发 NHTSA FMVSS 豁免复杂化
            - Waymo 或 Aurora 围绕仿真或感知专利提起知识产权诉讼
            - Luminar 激光雷达因财务困境或缺陷中断供货
            - 德州走廊有安全员运营期间出现致命安全事故
        - label: 极低可能性
          values:
            - NVIDIA 与 Uber 投资方利益冲突引发董事会治理分歧
            - NVIDIA 算力供应短缺，影响 Drive Thor 可用性
            - Volvo 退出合作或 VNL Autonomous 项目暂停
            - 运营中发生灾难性多辆自动驾驶卡车事故
    claimRefs:
      - CR001
      - CR009
      - CR017
      - CR026
      - CR035
