      - number: '8.4'
        title: 可比公司与估值基准
        blocks:
          - type: paragraph
            body: >-
              Waabi 的估值参照分三类：（1）处在不同生命周期阶段的上市 AV 卡车公司；（2）达到类似里程碑时的私营 AV 卡车融资轮；（3）物流自动化并购交易。Aurora Innovation（NASDAQ:
              AUR）是最直接的上市可比公司：Aurora 2025 年 4 月完成无人驾驶商业发布，背后有 NVIDIA 支持，客户包括 Uber Freight 和 FedEx。2025–2026 年，Aurora 市值在
              $800M 至 $2.5B 之间波动，相比其私募轮峰值 $13B 有明显折价。Embark Trucks 的 SPAC 失败案例（公告时隐含估值 $5B，退市时接近归零）给前商业化阶段的 AV
              卡车公司立了一个警示样本。Plus.ai 转向中国市场，以及 Torc Robotics 被 Daimler Truck 以未披露估值收购，都说明战略并购可能成为 Waabi 的退出路径。


              Waabi $3B 的投前估值，相比 Aurora 当前同等商业化阶段的公开市场估值有 1.5–2 倍溢价。只有当 Waabi 以仿真优先的方法，跑出比 Aurora
              重物理里程方法更低的自动驾驶成本结构时，这一溢价才站得住。如果 Aurora 商业化规模下的 EBITDA 利润率能作为模板，Waabi 在 RaaS（无人驾驶之后）上 50–60%
              的长期利润率目标就有可能成立，但尚未被证明。
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
          - type: table
            tableRef: TV004
            claimRefs:
              - CV015
              - CV016
              - CV017
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV006
              - CV007
      - number: '8.5'
        title: 退出准备度、投资论证失效触发点与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              退出准备度分析：Waabi 不太可能在无人驾驶里程碑之前 IPO，也不太可能在拿到无人驾驶后至少 12 个月收入数据之前 IPO。最早可行的公开市场窗口在 2028–2029 年，前提是 ARR 运行率超过
              $200M，并证明规模化单位经济模型成立。如果投资论证兑现，近期最可能的退出路径是被 OEM（Volvo、Daimler、PACCAR）、物流集团（XPO、J.B.
              Hunt、Werner）或技术平台（Amazon、Alphabet）战略收购。Uber 在 10 年供应协议中若嵌有优先购买权或战略期权，将是关键尽调问题。


              应停止追加投资的投资论证失效触发点：（a）联邦层面对无人驾驶卡车实施禁令；（b）Uber Freight 暂停 AV 项目；（c）发布窗口出现致命无人驾驶事故；（d）NVIDIA 供应中断持续 6
              个月以上；（e）Raquel Urtasun 在无人驾驶里程碑前离任。应触发分期投资暂缓的监测信号：（a）Q4 2026 无人驾驶发布未达成，且没有可信补救计划；（b）有监督试点中脱离率高于每 1,000 英里
              1 次；（c）Uber Freight 货载利用率低于承诺运力的 80%。


              最终尽调问题：（1）内部安全门槛标准，以及当前指标与目标指标；（2）Uber Freight 供应协议的退出条款和价格表；（3）NVIDIA
              供应合同和多年配额条款；（4）股权结构和期权池稀释表；（5）Series C 清算优先权和 pay-to-play 条款；（6）Voluntary Safety Self-Assessment
              草案；（7）三种情景下的月度烧钱和 runway 模型。
            claimRefs:
              - CV020
              - CV021
              - CV022
              - CV023
