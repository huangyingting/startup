      - number: '5.4'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 Q1，Waabi 当前部署状态是在 Texas I-10 和 I-20 走廊开展有安全员商业试点，车辆为通过 Uber Freight 调度的 Class 8 Volvo VNL
              Autonomous 卡车。所有商业运营都有安全员在场。公司未公开披露卡车数量、货运量或接管率数据，因此无法仅凭公开信息独立评估运营可靠性或利用率。Waabi 于 2023 年 Q2 在
              I-45（Dallas-Houston）启动首个 Texas 商业试点，并在 2025 年扩展至 I-10/I-20（San Antonio-El Paso）。与 Uber Freight
              的集成提供自动化货物匹配和调度，但没有公开 API 文档、服务水平协议或面向承运方的看板规格。可靠性指标（正常运行时间、MTBF、接管频率）仍是私有数据。路线图中最重要的部署事件，是 2026
              年中商业无人驾驶运营目标；该目标最初定在 2025 年底，但因安全论证完成延迟和 FMCSA 监管沟通节奏，已推迟约六个月。Aurora Innovation 已在 2025 年 4 月实现商业无人驾驶运营，比
              Waabi 修订后的无人驾驶目标领先 12 个月以上。无人驾驶上线既需要完成 Driver+ 安全论证，也需要获得 FMCSA 商业无人驾驶豁免；截至 2026 年
              Q1，二者均未公开确认已提交或获批。无人驾驶上线之后，Waabi 的路线图设想扩展到更多 Southwest 走廊、通过更多 Volvo VNL Autonomous 交付扩大车队，并可能把 Driver+ 栈以
              OEM 白标授权给其他卡车制造商。路线图高度依赖 2026 年中上线里程碑：如果延误到 2026 年 Q4 之后，商业收入时间表会被压缩到距离 Series C 估计现金跑道终点不到 12
              个月的位置，形成资本和竞争风险的叠加。
