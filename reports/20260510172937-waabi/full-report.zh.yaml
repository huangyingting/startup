      - number: '3.5'
        title: 护城河耐久度与被替代风险
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车的持久护城河包括：（1）累计真实世界安全里程，建立监管可信度和保险精算数据；（2）排他或优先 OEM
              硬件合作，控制车辆供给；（3）与大规模商业货运网络深度集成；（4）自研仿真能力，降低训练数据生成成本。Aurora 目前在护城河（1）领先，因为它已有一年多商业运营。Waabi 借 Waabi World
              声称在护城河（4）更强，但实际训练效率尚未得到独立验证。Torc 通过 Daimler 集成在护城河（2）领先。

              Waabi 的被替代风险来自多个方向：（a）Aurora 达到足够规模和安全记录，成为事实标准，货运承运人围绕它建立运营锚点，实质上把后来者挡在门外；（b）Daimler 或 Volvo 的 OEM
              集成自动驾驶把 AV 栈商品化到卡车里，消除独立 AV 公司的必要性；（c）Plus.ai 等 Level 2+ 系统达到足够自动化，让承运人无限期推迟 Level 4
              采用；（d）大型科技公司（Waymo，或潜在超大规模云厂商）带着更强 AI 资源进入卡车运输。

              Waabi 竞争位置最可信的负面情景是：未来 12–24 个月内，Aurora 在 Uber Freight 自己的车道——也就是 Waabi 计划运营的同一批车道——建立强商业安全记录。如果 Waabi
              无人驾驶上线继续延期，Uber Freight 可能转而选择 Aurora 作为主要供应商，市场出现分叉。Aurora 已经持有 Uber Freight 商业合同，并于 2024 年 4
              月开始运营，因此这一路径可信。
            claimRefs:
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
