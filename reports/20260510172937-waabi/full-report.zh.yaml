  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础细分
        blocks:
          - type: paragraph
            body: >-
              Waabi 现阶段的客户结构不太像一家典型技术公司：它没有直接的托运人或承运商客户群，而只有一个商业渠道伙伴 Uber Freight；后者根据 10 年供应协议，代表 Waabi 预订并调度货运。通过 Uber
              Freight 市场发货的托运人，是 Waabi AV 服务的间接终端用户，但交易对象是 Uber Freight，而不是 Waabi。这种渠道模式意味着，从商业意义上的记录客户看，Waabi
              实际上只有一个客户——Uber Freight；最终需求基础则是更广泛的 Uber Freight 托运人网络（覆盖 CPG、零售、汽车和工业等垂直领域的 SMB 与企业托运人）。


              Volvo Trucks North America 是第二类关系——OEM 车辆伙伴。其 VNL Autonomous 项目以量产为目标，但运量承诺取决于 Waabi
              能否获得无人驾驶监管许可。公开信息中没有具名的直接企业托运人客户、承运商客户，也没有披露 Uber Freight 体系之外物流服务商的试点。缺少多元化客户关系，反映了 Waabi
              有意选择轻资产分销策略：用客户多元化换取在明确走廊上更快商业部署。
