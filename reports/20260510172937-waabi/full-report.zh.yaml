        - 低——Luminar 是专注 AV 的供应伙伴，未报告过激光雷达召回
        - 高——Luminar Iris 是 Waabi 所有自动驾驶高速运营的主要长距传感器
        - 低——雷达只提供有限备用距离；未披露替代激光雷达传感器供应商
        - 重大——未确认第二激光雷达供应商；Luminar 作为独立公司的财务可持续性不确定
