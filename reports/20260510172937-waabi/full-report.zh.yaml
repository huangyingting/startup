      - number: '1.3'
        title: 融资历程、估值与投资方
        blocks:
          - type: paragraph
            body: >
              Waabi 自 2021 年创立以来，三轮外部融资累计约 $1.28 billion。Series A（$83.5M，2021 年 6 月）当时是加拿大史上最大 Series A。Series
              B（$200M，2024 年 6 月）由 Uber 与 Khosla Ventures 领投。Series C（$750M，2026 年 1 月）由 Khosla Ventures 与 G2 Venture
              Partners 共同领投；Uber 另投入 $250M 与 robotaxi 合作挂钩的里程碑资本，使合计 $1B 的公告成为加拿大史上最大规模融资。The Globe and Mail 2025 年 12
              月报道 Series C 投前估值约 $3B；公司未公开确认投后估值。

              这组投资方横跨技术（Khosla Ventures、Radical Ventures、8VC、Incharge Capital）、战略 OEM / 交通（Volvo Group Venture
              Capital、Porsche Automobil Holding SE、Scania Invest、Ingka Investments）、网约车（Uber）、半导体 /
              AI（NVentures/NVIDIA）、金融（BlackRock、HarbourVest Partners、Abu Dhabi Investment Authority、Linse Capital、BMO
              Global Asset Management）和加拿大生态投资方（BDC Capital、Export Development Canada、TELUS Global Ventures、OMERS
              Ventures）。重要 AI 学者——Geoffrey Hinton、Fei-Fei Li、Pieter Abbeel 和 Sanja Fidler——参与了 Series A。

              战略投资方覆盖面带来优势（Uber 是商业渠道，NVIDIA 是算力伙伴，Volvo 是 OEM），也可能带来冲突（多个 OEM
              投资方可能争夺排他权）。尚未公开披露债务融资或老股交易。收入指标和烧钱速度仍未公开；公司也未公开说明预计何时盈利，或披露剩余现金跑道。
