  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车市场涵盖软件栈、感知系统及相关服务，使 Class 6–8
              商用卡车能在公共道路上减少或无需人类司机参与。为尽调目的，本章沿三层嵌套边界定义市场。最广义的可寻址市场是美国营运性卡车运输总收入，American Trucking Associations 估计 2024
              年约为 $920 billion，覆盖从本地配送到长途整车的所有货运模式。主要战略可寻址市场，也是与 Waabi 最相关的市场，是 Class 8 长途整车货运，约代表美国每年 $400–$650 billion
              支出；由于高速路里程长、可预测，且联邦工时规则结构性限制人类生产率，自动驾驶替代在这里最有经济吸引力。

              Waabi 的具体可服务市场是 Sun Belt 高运量、高频率州际车道——主要是 Texas I-45 和 I-35
              走廊——当地天气相对温和，货运密度足以支撑专用自动驾驶走廊运营。包括城市最后一英里配送、零担（LTL）集拼和堆场自动化在内的邻近市场，不在 Waabi 当前商业化路径内，但 Gatik、Outrider
              等公司覆盖。国际市场（EU、Canada、China）在结构上可进入，但监管框架不同，不属于 Waabi 近期商业计划。

              现状替代方案包括：（1）人类卡车司机，现有主力；每名司机年化全包成本估计为 $180,000–$200,000；（2）Plus.ai SuperDrive 等驾驶辅助技术（Level 2+
              自动驾驶），能降低但不能消除对司机的依赖；（3）更长距离货运中的多式联运铁路。从人类司机切换到自动驾驶，需要为配备 AV 的卡车投入资本开支——每车比传统卡车大约溢价
              $50,000–$100,000——还需要运营再培训、承运人风险承受力，以及在精算环境尚不成熟时完成保险承保。
