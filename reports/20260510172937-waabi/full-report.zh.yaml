      - number: '3.6'
        title: 关键证据
        blocks:
          - type: callout
            title: Aurora 商业运营形成复利式先发优势
            body: >
              Aurora Innovation 2024 年 4 月在 Dallas-Houston 走廊上线商业无人驾驶运营——这正是 Waabi 瞄准的无人驾驶部署路线。Aurora 每多一个月商业运营，就多积累
              Waabi 尚不具备的安全里程、监管可信度、承运人关系深度和保险精算数据。到 2026 年 5 月，Aurora 已拥有超过 13 个月商业无人驾驶数据。如果 Waabi 无人驾驶上线继续延期，Aurora
              的先发安全数据集优势会越来越难追上。在其他条件相同下，评估 AV 供应商的货运承运人会理性偏好有更长已验证安全记录的供应商。
            calloutType: risk
            claimRefs:
              - CP008
              - CP009
              - CP012
              - CP013
          - type: callout
            title: Embark、Argo 与 TuSimple 的失败是资本风险的反向证据
            body: >
              自 2022 年以来，三家资金充足、团队可信的自动驾驶卡车公司相继失败：Embark（融资 $294M）、Argo AI（承诺投入 $3.6B）、TuSimple（融资
              $1.35B）。每个案例的近因都不同：Argo 是 Ford/VW 撤资，Embark 是 SPAC 资金在收入到来前耗尽，TuSimple 则陷入监管和治理危机（国家安全调查）。Waabi
              要活下来，必须在现金跑道耗尽前持续拿到收入或融资通道。这个模式说明，技术本身不能保证存活；资本连续性和商业里程碑的时点同样关键。
            calloutType: risk
            claimRefs:
              - CP002
              - CP003
              - CP004
              - CP006
          - type: callout
            title: Volvo Trucks 作为共同 OEM 伙伴带来结构性张力
            body: >
              Volvo Trucks 同时是 Waabi 的主要 OEM 硬件伙伴，也是 Aurora Innovation 在特定欧洲部署中的商业 OEM 伙伴。这种共同 OEM 关系可能带来冲突：如果 Waabi
              的无人驾驶部署继续延后，Volvo 可能把工程和产能资源转向 Aurora，或转向自家的 Volvo Autonomous Solutions 项目。反过来，Waabi 与 Volvo 绑定更深——Volvo
              Group Venture Capital 也是股权投资方——这给双方带来 Aurora 不具备的利益一致性。尽调应弄清楚，Waabi 是否在北美 Class 8 自动驾驶应用上与 Volvo Trucks
              签有任何独家或优先供应条款。
            calloutType: insight
            claimRefs:
              - CP010
              - CP022
              - CP027
          - type: callout
            title: 模拟优先路线形成差异化，但需要实证验证
            body: >
              Waabi 将 Waabi World 模拟平台定位为核心竞争护城河：如果主要在模拟中训练确实比堆真实道路里程更省数据，Waabi 就能以 Aurora
              真实道路里程路线的一小部分资本成本，达到可比的安全能力。CEO Urtasun 曾公开称，Waabi Driver 95% 以上的训练发生在模拟中。但这一说法没有独立验证；采用真实道路里程路线的 Aurora
              已经跑通商业运营，Waabi 还没有。截至 2026 年 5 月，模拟优先假设在架构上很有吸引力，但商业上尚未被证明。
            calloutType: strength
            claimRefs:
              - CP021
              - CP025
              - CP026
          - type: callout
            title: 尽调必须核验 Uber Freight 和 Volvo 合作的排他性
            body: >
              Waabi 的竞争位置高度依赖两项合作——Uber Freight 作为商业渠道、Volvo Trucks 作为硬件供应商——而 Aurora Innovation
              也同时拥有这两类关系。尽调团队必须确认：（1）Waabi 是否在既有合同线路之外，对 Uber Freight 的自动驾驶货运运力拥有任何排他性；（2）Volvo 对 Waabi
              的投资是否带来优先供应或路线图承诺；（3）Uber Freight 同时与 Waabi 和 Aurora 合作，是否会形成冲突，并最终让其偏向已验证商业服务的 Aurora，而不是无人驾驶上线延后的 Waabi。
            calloutType: recommendation
            claimRefs:
