      - number: '5.5'
        title: 差异化、信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Waabi 的技术差异化建立在三根相互强化的支柱上。第一，模拟深度：Waabi World 用可微渲染和 Gaussian splatting 每天生成超过 1
              亿英里的模拟里程，这一吞吐量比实体道路测试能累积的里程高出几个数量级。独立分析机构（McKinsey、MIT Technology Review）认为，Waabi 的模拟能力在 AV
              卡车公司中处于行业领先。第二，无需 HD 地图运营：Driver+ 不需要预建厘米级地图，降低走廊扩张成本，也让新路线部署不受 Waymo 和同类系统所受的地图更新周期约束。第三，IP 和团队履历：Waabi
              拥有 40 多项专利，集中在生成式模拟、可微渲染和端到端神经网络策略训练；研发组织由 Raquel Urtasun 领导，她发表过 200 多篇同行评议论文，曾任 Uber ATG
              首席科学家。但差异化也有边界。Aurora Innovation 已经实现无人驾驶商业运营，累积真实世界无人驾驶里程，形成 Waabi 尚未达到的运营验证。模拟到现实的差距——Waabi World
              的合成场景能否可靠转化为稳健无人驾驶行为——尚未获得独立验证。在信任、安全和合规方面，尽调图景并不完整。Waabi 持有有效的 Texas DOT 有监督运营许可（已在 TxDOT 2025 注册表确认）。但
              FMCSA 商业无人驾驶豁免尚未取得。公司未发布公开第三方安全审计、VSSA 或正式安全论证。ISO 26262 和 SOTIF 合规尚未确认。Volvo VNL
              平台提供硬件级冗余（冗余转向、制动、电源管理），但 Waabi 的软件安全论证尚未经过独立审计。截至 2026 年 Q1，公开 TxDOT 或 NHTSA 记录中未发现安全事故。不过，缺少已发布的 VSSA
              或安全自评报告，会造成信息不对称——投资人和合作伙伴必须依赖 Waabi 的自愿披露，而非独立审计结果。
