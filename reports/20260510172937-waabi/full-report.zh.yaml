        - 联邦（美国）
        - 截至 2026 年 5 月，最终规则尚未发布；Class 8 卡车无人值守无人驾驶运营在法律上被禁止
        - 高——规则落地是硬门槛；尚无公开的临时联邦豁免机制
        - 关键
        - 积极参与 ATA 联盟；以 Texas 监督式运营作为过渡里程碑；监测 FMCSA 案卷
        - 没有联邦豁免，即便技术准备就绪，整个无人驾驶商业化启动也会被卡住
        - 按季度监测 FMCSA 案卷 FMCSA-2023-0052；获取 Waabi 监管法律顾问对时间表的意见
      - - Texas DOT AV 许可（仅限 I-10 和 I-20 走廊监督式运营）
        - Texas
        - 许可有效且状态良好；授权有安全员在场的运营；不覆盖无人驾驶
        - 低——许可仍有效，未报告合规违规或执法行动
        - 中
        - 持续遵守 TxDOT 报告要求和事故通知义务
        - 一旦发生安全事故或监管发现，许可可能被暂停或撤销
        - 向 Waabi 确认许可续期节奏、合规义务和事故通知触发条件
      - - 覆盖 Volvo VNL 平台上任何 AV 专用车辆改装的 NHTSA FMVSS 豁免
        - 联邦（美国）
        - 截至 2026 年 5 月尚未申请；Volvo VNL 已按标准 FMVSS 认证；新型 AV 改装可能需要提交申请
        - 中——Volvo 标准 FMVSS 认证可能覆盖多数改装；新型 AV 变更带来敞口
        - 高
        - Volvo 联合工程可尽量减少新型改装；现有 FMVSS 认证降低豁免范围
        - 意外豁免要求或 NHTSA 拒绝，可能让无人驾驶发布再延迟 12-24 个月
        - 确认 Waabi 或 Volvo 是否已提交，或计划为 AV 改装提交任何 NHTSA FMVSS 豁免申请
      - - Waymo 和 Aurora 密集 AV 专利组合带来的专利侵权敞口
        - 美国及国际
        - 截至 2026 年 5 月，未发现已知活跃诉讼；Waabi 持有 40 余项防御性专利；竞争对手专利组合密集
        - 中——Waymo 和 Aurora 持有数千项 AV 专利，仿真和感知可能重叠
        - 高
        - Waabi 自有专利组合提供防御覆盖；Urtasun 研究的学术先前技术降低敞口
        - 若竞争对手针对大规模 Gaussian splatting 或神经渲染方法主张专利，存在禁令风险
        - 委托对 Waymo 和 Aurora 在仿真、感知、规划领域前 20 项 AV 专利做 FTO 分析
      - - 传感器数据隐私与数据监管（CCPA、GDPR、Canadian PIPEDA）
        - 美国、加拿大及国际
        - 当前 Texas 运营和未来任何地域扩张都需要合规；暂无公开隐私审计
        - 低到中——标准数据治理项目可管理；新司法辖区增加合规复杂度
        - 中
        - 假设已有数据治理政策；目前传感器数据仅在 Texas 公共走廊采集
        - 在新司法辖区采集行人和第三方车辆的传感器数据，可能面临监管挑战
        - 索取 Waabi 隐私影响评估、数据保留政策和跨境数据流文件
    notes: >-
      监管和法律风险登记表基于截至 2026 年 5 月的 FMCSA 公开规则制定案卷 FMCSA-2023-0052、NHTSA AV 豁免数据库、USPTO 专利申请、Texas DOT AV
      许可登记和公开诉讼数据库。内部法律事项、监管法律顾问意见和未披露 IP 策略被排除，视为私有证据。
