      - number: '2.5'
        title: 监管格局与市场时点
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，美国自动驾驶商用车监管框架仍然碎片化。联邦层面，Federal Motor Carrier Safety Administration 管辖商用车安全，但尚未敲定 Level 4
              自动驾驶卡车规则。FMCSA 2023 年针对自动驾驶商用车发布 Advance Notice of Proposed
              Rulemaking（ANPRM，拟议规则制定预通知）并收到大量公众意见，但规则制定仍在推进中。NHTSA AV STEP（Automated Vehicle Exemption Program）允许针对特定
              Federal Motor Vehicle Safety Standards 逐案豁免，自动驾驶卡车公司据此在获准路线运行无人驾驶车辆。

              州层面，Texas 建立了美国最宽松的自动驾驶商用车框架。Texas House Bill 1308（2017
              年通过）及后续立法明确授权自动驾驶商用车在没有人类司机在场时上公共道路行驶，前提是自动驾驶系统遵守适用交通法律。法律清晰度叠加 Texas 相对温和天气、Dallas-Houston-San Antonio
              走廊高货运密度和庞大商用车存量，使 Texas 成为美国自动驾驶卡车事实上的试验场——Aurora、Waabi、Kodiak、Torc
              都已在那里开展或正在开展商业运营。California、Arizona、Florida 和 Georgia 也已通过宽松 AV 框架。New York 和 Illinois 仍更严格。

              市场时点分析：2022–2023 年 AV 创业公司倒闭潮——Embark Trucks（SPAC 资金耗尽后于 2023 年 2 月关停）、Argo AI（Ford 和 Volkswagen 撤回承诺资金后于
              2022 年 10 月关停）以及 TuSimple 2023 年暂停美国业务——代表资金不足玩家出清，并不意味着技术在结构上被否定。Aurora Innovation 2024 年 4 月在
              Dallas-Houston 走廊商业无人驾驶上线，标志行业进入早期商业阶段。2024–2026 年窗口的特征是特定走廊有限部署、技术验证，以及为维持收入前运营而继续融资。广泛商业采用——定义为多个运营方合计
              50 辆以上卡车——分析师估计会在 2026–2028 年先发生在条件有利的 Sun Belt 走廊；全国规模化取决于联邦监管清晰度，预计最早也要 2027–2030 年。
