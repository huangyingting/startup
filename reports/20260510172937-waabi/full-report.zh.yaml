    type: matrix
    layout: standard
    summary: 敏感性矩阵显示关键假设如何驱动 Waabi 牛市 / 基准 / 熊市估值结果。
    approximationNotes: 估值区间为分析师根据公开可比公司和自动驾驶行业基准估算。实际结果取决于监管、商业化和资本市场条件。
    data:
      columns:
        - 牛市情景
        - 基准情景
        - 熊市情景
      rows:
        - label: 无人驾驶上线时间
          values:
            - 2026 年 Q4 按期
            - 2027 年 Q1-Q2（延后 1-2 个季度）
            - 2028 年以后（延迟 12-18 个月）
        - label: 上线后第 3 年 ARR
          values:
            - $400-600M
            - $150-300M
            - <$150M
        - label: 退出时收入倍数
          values:
            - 30-50x ARR
            - 20-35x ARR
            - 10-20x ARR
        - label: 隐含退出估值
          values:
            - $15-25B
            - $8-15B
            - $2-5B
        - label: Series C MOIC（持有 10 年）
          values:
            - 5-8x
            - 2.5-5x
            - 0-0.7x
    claimRefs:
      - CV010
      - CV011
      - CV012
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 区间图显示 Waabi 在牛市 / 基准 / 熊市情景下的估值，并与当前投前估值和自动驾驶上市可比公司对比。
    approximationNotes: 估值区间为分析师估计。当前投前估值来自 2026 年 1 月官方 Series C 公告。
    data:
      items:
        - label: 熊市情景退出估值（$B）
          low: 2
          high: 5
          mid: 3
          note: 2028 年以后无人驾驶；过桥轮稀释
        - label: Series C 投前估值（$B）
          low: 3
          high: 3
          mid: 3
          note: 2026 年 1 月官方公告
        - label: Aurora Innovation 市值（$B）
          low: 0.8
          high: 2.5
          mid: 1.5
          note: 2025-2026 年商业化上线后
        - label: 基准情景退出估值（$B）
          low: 8
          high: 15
          mid: 11
          note: 2027 年 Q1-Q2 无人驾驶；Uber Freight 爬坡
        - label: 牛市情景退出估值（$B）
          low: 15
          high: 25
          mid: 20
          note: 2026 年 Q4 按期；OEM 规模爬坡
    claimRefs:
      - CV010
      - CV015
      - CV016
  - id: FV004
    title: 投资 KPI
    type: matrix
    layout: standard
    summary: 关键绩效指标矩阵，投资者可用来跟踪投资论点从当前状态迈向牛市情景的进展。
    approximationNotes: 当前状态基于公开披露。阈值为分析师估算的牛市情景要求。
    data:
      columns:
        - 当前状态（2026 年 5 月）
        - 牛市情景门槛（2027 年 Q4）
      rows:
        - label: 无人驾驶上线日期
          values:
            - 目标 2026 年 Q4（尚未达成）
            - 2027 年 Q1 或之前达成
        - label: 已部署无人驾驶卡车
          values:
            - 0（仅有安全员试点）
            - 100+ 辆卡车商业无人驾驶
        - label: 收入运行率（ARR）
          values:
            - 未披露；商业化尚无收入
            - Uber Freight RaaS 贡献 $50-100M ARR
        - label: Uber Freight 商业里程
          values:
            - 试点里程；规模未披露
            - 年商业里程 10M+
        - label: NVIDIA 算力供应确认
          values:
            - 未确认；多季度库存未披露
            - 多年分配合同确认
    claimRefs:
      - CV006
      - CV007
