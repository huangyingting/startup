      - number: '6.5'
        title: 扩张潜力与集中风险
        blocks:
          - type: paragraph
            body: >-
              Waabi 的客户集中度极高：一个渠道伙伴（Uber Freight）贡献了已披露商业里程活动的 100%。这种集中是有意的战略选择——Uber Freight 合作提供走廊准入、托运需求聚合和品牌验证，现阶段
              Waabi 很难独立复制。但它也造成生死级单一交易对手风险，机构投资人必须高度权衡。


              扩张路径存在但仍处早期：（1）无人驾驶上线后，可以增加其他货运经纪商或托运人作为直接渠道伙伴；（2）通过 Volvo VNL Autonomous 的 OEM 授权模式，2027-2028 年可延伸至其他
              OEM（Daimler、PACCAR）；（3）Copilot4Science 模拟授权可作为第三条扩张向量，服务机器人公司。这些路径都没有确认的商业条款或具名客户。地理扩张路线图（无人驾驶后进入 Sun Belt
              州际走廊）会扩大可触达托运人基础，但在签下第二个车队伙伴前，不能降低单一伙伴集中度。如果 Uber Freight 敌意退出或陷入困境，Waabi 将没有客户收入，并需要 12-18
              个月重建商业渠道，窗口期内会出现实质持续经营风险。
            claimRefs:
