  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论证、反论证与建议
        blocks:
          - type: paragraph
            body: >-
              Waabi 的投资论证建立在五根相互咬合的支柱上：（1）模拟优先技术护城河（Copilot4Science/UniSim），相比摄像头加 LiDAR 竞争对手可减少 70% 实体测试里程；（2）与 Uber
              Freight 的 10 年供应协议，既是商业证明也是收入引擎；（3）已认证的 OEM 车辆平台（Volvo VNL Autonomous），消除了第一代 AV 创业公司曾受制于的硬件集成风险；（4）$1.28B
              Series C 资本缓冲，在大多数情景下足以支持从有监督过渡到无人驾驶；（5）世界级创始团队，以 Raquel Urtasun 为核心，她的既有学术发表记录和模拟优先 IP 位置形成可防守差异化。如果 2026
              年 Q4 无人驾驶里程碑按期实现，这五根支柱会叠加发力，使投资论证在一个事件窗口内从风险投资逻辑切换到成长股权逻辑。


              反论证同样清晰：（1）Class 8 无人驾驶卡车的联邦监管路径尚不存在，也无法通过合同保证；（2）Uber Freight 提供 100%
              商业里程准入，形成生死级集中风险；（3）模拟到真实迁移问题尚未被独立验证，而且是行业争议最大的技术主张；（4）$3B 投前估值已经计入 2026 年 Q4
              成功和早期车队规模，几乎不给延误留下安全边际；（5）Raquel Urtasun 承载了过高的技术可信度和 IP 集中度，COO 任命也无法完全化解关键人风险。


              建议：在当前估值（$3B 投前）下，对持有周期长、风险承受高、且组合足够分散可吸收熊市情形归零的投资人，给出有条件买入。置信度：中等。必须以里程碑分批放款：后续资金释放应以 2026 年 Q4
              无人驾驶上线、Uber Freight 收入爬坡确认和 NVIDIA 供应安全为条件。
