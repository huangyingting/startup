      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车市场包含多个不同买方原型，预算权、采用动因和风险画像各不相同。Waabi 商业模式中的主要付款方是货运承运人或车队运营商，他们按每英里为自动驾驶卡车运力付费。大型整车承运人——Werner
              Enterprises、J.B. Hunt Transport、Schneider National 和 Knight-Swift——各自运营超过 10,000
              辆卡车，并面临强司机招聘压力；安全记录建立后，它们会成为天然早期采用者。中型承运人（500–5,000 辆卡车）代表最大运量细分，但通常缺少早期 AV 部署所需的风险资本。

              货运经纪商和物流平台——主要是 Uber Freight 和 C.H. Robinson——作为中介，把托运需求接入自动驾驶承运运力。Uber Freight 的数字原生市场模式使它天然适合集成 AV
              卡车运力，这也体现在 Waabi 合作中。托运人（制造商、零售商、CPG 公司）是支付运费的最终用户，并通过降本对采用 AV 有间接激励，但他们不直接购买 AV 系统。

              政府实体，包括 Department of Defense 和 United States Postal Service，是自动驾驶卡车中规模较小但战略上可行的采购渠道，可用于军事物流和邮政合同；Kodiak
              Robotics 通过 DARPA 合同推进过这一细分。近期最可操作的买方模型是 AV 开发商与大型经纪商-承运人组合之间的货运即服务合同：AV
              公司拥有或租赁卡车，按每英里计费，从而消除托运人的资本风险。面向承运人的轻资产授权在多年安全记录建立前可行性较低。OEM 打包销售——Volvo 将搭载 Waabi
              的卡车直接卖给车队运营商——是更长期分销渠道，需要商业规模支撑。
            claimRefs:
