      - number: '3.2'
        title: Aurora Innovation——主要直接竞争对手
        blocks:
          - type: paragraph
            body: >
              Aurora Innovation（NASDAQ: AUR）是 Waabi 的主要直接竞争对手，也是近期最重要的竞争威胁。Aurora 2017 年由前 Waymo、Tesla 和 Uber ATG
              高管创立，2021 年 11 月通过 SPAC 上市，累计融资约 $3.5 billion。Aurora Driver 部署在 Dallas-to-Houston 走廊的 Class 8 Kenworth
              T680e 卡车上，并于 2024 年 4 月 8 日上线商业无人驾驶货运服务，使 Aurora 成为美国第一家实现商业 Level 4 自动驾驶卡车运营的公司。

              Aurora 相对 Waabi 的竞争优势很强：商业运营领先多年；上市公司资本结构提供持续融资可选性；商业自动驾驶里程积累出不断扩大的安全数据集；与 FedEx、Werner Enterprises 和 Uber
              Freight 建立合作；并与 PACCAR（Kenworth 制造商）和 Volvo Trucks 建立硬件伙伴关系。Aurora 也在 Waabi 瞄准的同一 Dallas-Houston I-45
              走廊运营，直接竞争 Uber Freight 货运量。

              Aurora 的弱点包括：模块化传感器融合架构（相较 Waabi 声称的端到端生成式 AI 优势）、高资本消耗（据公开文件估计每年
              $400–$500M）、依赖公开市场情绪才能持续融资，以及安全事故历史（Aurora 公开披露过 2024 年一起需要安全审查的碰撞）。作为上市公司，Aurora 股价在 2022–2025 年间于 $0.40
              至 $7.00 之间波动，反映市场对其盈利时间表的不确定性。
