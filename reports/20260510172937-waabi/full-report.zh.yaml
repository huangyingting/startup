      - number: '1.5'
        title: 产品、竞争位置与关键风险
        blocks:
          - type: paragraph
            body: >
              Waabi 的旗舰产品是 Waabi Driver，一个端到端 AI 模型，充当自动驾驶卡车以及待部署 robotaxi 的虚拟驾驶系统。Waabi Driver 主要通过 Waabi World
              训练和验证；Waabi World 是闭环仿真器，使用生成式 AI 创建数字孪生，合成无限场景（包括安全关键长尾场景），并让 Driver 在无人干预下改进。Mixed Reality Testing 允许
              Waabi Driver 在物理测试场运行，同时遭遇叠加的仿真环境。这些技术支撑 Waabi 的说法：相比 AV 1.0 竞争对手，它用更少工程师和更小真实车队即可完成更资本高效的开发。Waabi
              称仿真器与真实条件匹配准确率为 99.7%，但行业专家和监管方质疑，纯仿真验证能否在安全认证中替代真实道路里程。

              公司双垂直策略——用同一个共享 AI 模型驱动自动驾驶卡车和 robotaxi——是竞争定位核心。Waabi 认为，一个垂直领域的进展会改善另一个领域表现，形成复利式学习优势。与主要竞争对手 Aurora
              Innovation 相比（Aurora 融资 $3.46B，经 SPAC 上市，并在 2025 年于 Texas 开通商业无人驾驶路线，随后又重新加入人类观察员），Waabi
              主张自己有资本效率优势。Kodiak Robotics（融资 $448M）仍是私营公司，专注卡车。TuSimple 在安全事故和治理失败中倒下，是该赛道的反向样本。

              关键风险包括：（1）关键人集中——Urtasun 是唯一创始人，也是世界级 AI 科学家；（2）无人驾驶上线延期——2025
              年底目标落空；（3）收入不透明——没有披露商业指标；（4）资本充足性——很可能还需继续融资；（5）单一商业伙伴集中——Uber 同时是投资方，也是唯一披露的客户 /
              渠道；（6）仿真到现实鸿沟——监管方可能要求真实道路里程来批准安全认证，而 Waabi 的仿真优先路径未必能完全满足。
