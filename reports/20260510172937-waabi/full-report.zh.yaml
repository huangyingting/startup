      - number: '2.6'
        title: 关键证据
        blocks:
          - type: callout
            title: 结构性司机短缺带来持久拉动需求
            body: >
              80,000+ 司机缺口——预计 2031 年达到 160,000——叠加 $180,000–$200,000 年化全包司机成本，不是周期性问题。人口结构（平均司机年龄 46
              岁）、生活方式因素以及相对工作条件不足的工资增长，使这一短缺具备结构性。Waabi 可能接触的每家承运人都同时承受这种压力，形成需求拉动，而不是要求 Waabi
              从零开创新市场。这种需求动态比自动化会激起被替代既有从业者抵制的市场有利得多。
            calloutType: strength
            claimRefs:
              - CM019
              - CM020
              - CM021
          - type: callout
            title: Texas 监管环境是结构性优势
            body: >
              Texas HB 1308 及后续立法，为 Waabi、Aurora 和其他 AV 公司提供了美国最清晰的无人驾驶商业卡车运营法律框架。叠加 Texas 有利天气，I-45 Dallas-Houston
              走廊是自动驾驶卡车试验场最高频路线。Waabi 聚焦 Texas 不只是地理便利——它是在监管清晰、法律风险更低的地方运营，同时积累未来支持联邦规则制定和最终全国扩张所需的安全里程，是理性策略。
            calloutType: strength
            claimRefs:
              - CM028
              - CM029
              - CM035
          - type: callout
            title: 缺少联邦 AV 卡车框架限制全国规模化
            body: >
              截至 2026 年 5 月，美国缺少联邦 Level 4 自动驾驶商用车规则。FMCSA 的 2023 年 ANPRM 尚未推进到 Notice of Proposed Rulemaking，而联邦规则制定从
              ANPRM 到最终规则通常需要 3–5 年。这意味着全国 AV 卡车规模化——在 50 个州统一运营——最早也不太可能早于 2028–2030
              年。任何尚未通过宽松立法的州都会成为壁垒，迫使公司承担昂贵路线重设或政治倡导成本。对 Waabi 来说，这把可服务市场（SAM）在可预见预测期内限制在 Sun Belt 各州。
            calloutType: risk
            claimRefs:
              - CM027
              - CM033
              - CM034
          - type: callout
            title: 分析师市场规模估算高度分歧
            body: >
              2030 年自动驾驶卡车市场规模预测从 $2.97 billion（Allied Market Research）到 $21.6 billion（MarketsandMarkets）再到 $35
              billion（Grand View Research 高情景），相差超过 10 倍。分歧来自范围定义、地域覆盖、是否纳入硬件和采用时间线假设不同；因此投资材料中的任何单一市场规模引用都应审慎看待。Waabi
              应准备使用自下而上的方法（货运吨英里乘以每英里 AV 费率）来论证市场机会，而不是依赖自上而下的分析师市场规模主张。
            calloutType: risk
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM009
          - type: callout
            title: 货运即服务是近期结构上最优的模式
            body: >
              货运即服务（FaaS）模式——Waabi 拥有或租赁卡车，并向 Uber Freight 按每英里收费——消除了制约承运人采用的资本风险壁垒，同时让 Waabi 获得高于纯授权版税的每英里经济性。但这一模式要求
              Waabi 扮演准承运人，承担车队所有权、维护和保险风险。该模式最适合以 Uber Freight 这种大型、数字化整合的货运经纪商为渠道；这也解释了为什么 Uber 兼具投资方和商业伙伴的双重角色，对
              Waabi 的商业化路径在架构上很重要。
            calloutType: insight
            claimRefs:
              - CM015
              - CM016
              - CM014
          - type: callout
            title: 市场规模基于分析师报告与自下而上估算
            body: >
              本章所有市场规模数字均来自公开分析师报告或独立尽调估算。Waabi 不披露可寻址市场测算。分析师数字在范围和方法上差异显著；尽调团队尽可能采用保守的自下而上估算。Waabi 2028 年 SOM 为
              $50–$200M 的估计属于独立计算，尚未与 Waabi 内部预测核对。
            calloutType: assumption
