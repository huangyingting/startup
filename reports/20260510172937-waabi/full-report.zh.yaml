      - number: '5.3'
        title: 架构与运营模型
        blocks:
          - type: paragraph
            body: >-
              Waabi 的技术架构围绕“模拟—训练—部署”闭环组织，这是它区别于所有主要竞争对手的地方。栈顶是商业运营层（Uber Freight API、车队运营商遥测看板、路线管理）。下方是 Driver+
              软件栈，包括规划与预测模块（端到端神经网络、无需 HD 地图、完全由 Waabi World 场景训练）、感知与传感器融合模块（实时处理 Luminar Iris lidar、摄像头和雷达流），以及 Waabi
              World 模拟器（把训练数据回灌进技术栈）。算力层运行在 NVIDIA Drive Thor（2000 TOPS）上，用 DriveOS 和安全监控协处理器执行推理。算力层之下是传感器硬件层（250m 距离的
              Luminar Iris lidar、8 摄像头阵列、雷达阵列），底层是 Volvo VNL Autonomous 平台，提供冗余机械执行（转向、制动、电力）。无需 HD 地图是明确的技术选择：Driver+
              不依赖预建厘米级地图（Waymo 和早期 Aurora 需要这种地图），而是靠传感器数据实时构建环境模型，让新走廊部署更快、更可扩展。这个设计用更高的车载算力需求，换取更低的基础设施依赖。Waabi World
              的可微渲染流水线支持对场景生成器和 AV 策略进行基于梯度的联合优化——这一技术路线已在同行评议论文（CVPR 2023、NeurIPS 2023）中得到验证，并由至少两项 USPTO
              专利申请保护（US20230131865A1、US20230059145A1）。主要架构风险包括单一算力供应商依赖（NVIDIA Drive
              Thor）、模拟到现实的差距（尚未独立验证），以及端到端神经网络在构建安全论证时的可解释性挑战。运营模型把 I-10/I-20 上卡车的现场遥测回传至 Waabi
              World，形成数据飞轮：运营中发现的真实边缘案例可以重新注入训练模拟器。
