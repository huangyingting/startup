  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险总览与严重性排序
        blocks:
          - type: paragraph
            body: >-
              Waabi 面临一组紧密耦合的风险，横跨监管、运营、合作伙伴、财务和执行。许多科技创业公司的风险可以在客户、地域和收入流之间分散，Waabi
              不同，它的风险相互依赖、相互放大。监管延迟会拉长现金跑道危机；现金跑道危机会限制无人驾驶上线所需的技术和商业推进；与 Aurora Innovation
              的竞争差距又会进一步侵蚀投资人信心。这种相互依赖意味着，任何单一风险维度一旦以较高严重性兑现，都会向其他维度级联扩散。因此，现阶段任何 Waabi 投资头寸都必须设置风险监控和明确止损标准。主导风险是 FMCSA
              联邦无人驾驶豁免。没有允许无人值守 Class 8 卡车在美国州际高速运营的最终联邦规则或单独豁免，Waabi 无论技术准备度如何，都无法产生无人驾驶收入。截至 2026 年 5 月，FMCSA 只发布了
              2023 年 NPRM，尚无最终规则，规则制定时间表已远超行业最初估计。第二层风险簇包括对 Uber Freight 100% 商业渠道依赖、每年估计 $80M-130M 烧钱额，以及 Series C 后
              18-24 个月现金跑道与 2027 年中 Series D 需求相互逼近。Aurora Innovation 已经产生无人驾驶商业收入，使 Waabi 每延误一个月都在竞争层面更昂贵。表 TR001 至
              TR005 系统覆盖各风险维度，包括可能性、严重性、缓释成熟度、剩余暴露和建议尽调动作。图 FR001 可视化风险热图。图 FR002 和 FR003 分别展示风险传导和关键依赖结构。
