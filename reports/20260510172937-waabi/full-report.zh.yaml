      - number: '1.2'
        title: 领导层、创始人与治理
        blocks:
          - type: paragraph
            body: >
              Raquel Urtasun 是 Waabi 唯一创始人兼 CEO。她 1976 年 1 月 30 日出生于西班牙 Pamplona，2006 年获 EPFL 计算机科学博士，此后在 MIT 和 UC
              Berkeley 做博士后。2009–2014 年，她任 Toyota Technological Institute at Chicago 助理教授；2014 年加入 University of Toronto
              任计算机科学教授；2017 年与 Geoffrey Hinton 共同创办 Vector Institute for AI。2017 年 5 月，Uber 招募她担任 Uber ATG
              首席科学家，领导自动驾驶研究，直到 2021 年 1 月离职创立 Waabi。她获得的荣誉包括：Time 100 Most Influential AI（2023）、Order of
              Ontario（2024）、Fellow of the Royal Society of Canada（2024）、CNBC Changemakers（2024）和 Fast Company AI
              20（2025）。Urtasun 被视为全球自动驾驶 AI 技术最顶尖的科学家之一。

              Lior Ron 于 2025 年 8 月加入 Waabi 任 COO，此前是 Uber Freight CEO。Ron 共同创办了自动驾驶卡车先行者 Otto；Uber 于 2016 年收购 Otto。Ron
              与 Urtasun 在 Uber 有交集，他从零搭建 Uber Freight，并把收入做到 $5 billion。他带来一线商业卡车经验和关键行业关系。离任后，Ron 保留 Uber Freight
              董事长职务。Urtasun 与 Ron 组合成一个创始人-市场匹配度很高的领导团队，在 AI 和货运物流两端都有深根；但 Urtasun 是唯一创始人，且没有已披露的内部接班人，关键人集中风险也由此形成。

              Waabi 是私营公司，不公开披露董事会组成或正式治理结构。战略投资方——包括 Uber、Khosla Ventures、NVIDIA 和 Volvo Group Venture
              Capital——很可能以董事或观察员身份参与，令技术、资本与商业伙伴之间保持一致。截至 runDate，未见重大治理负面事件（诉讼、领导层争议、监管行动）报道。
