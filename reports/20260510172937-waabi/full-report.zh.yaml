          - type: callout
            title: 商业牵引与财务健康高度不透明
            body: >
              作为私营公司，Waabi 不披露收入、交付货运单量、自动驾驶里程、安全事故率、现金余额、烧钱速度或任何其他运营 / 财务指标。尽调对商业牵引的判断完全依赖公开合作（Uber
              Freight、Volvo）和媒体报道的里程碑。投资者应把所有商业进展主张都视为公司自报且未验证，直到独立数据或监管文件出现。Uber Freight 合作关系也存在潜在冲突——Uber 既是 Waabi
              最大投资方、主要商业卡车渠道，也是唯一 robotaxi 部署伙伴。
