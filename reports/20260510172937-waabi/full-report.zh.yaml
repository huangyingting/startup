      - number: '4.2'
        title: 定价与变现
        blocks:
          - type: paragraph
            body: >
              Waabi 的 RaaS 定价策略尚未公开确认，但竞争和分析师背景给出有用边界。Aurora Innovation 是美国唯一已商业运营的 L4 卡车公司；自 2024 年 4 月商业上线以来，它对有监督 AV
              货运服务收取每英里 $1 至 $2。Wall Street Journal 报道的这个价格，是目前公开可见的最低 L4 AV 卡车价格，也反映 Aurora 先放量、后优化利润率的战略选择。Waabi
              根据分析师的最低成本回收模型，目标落在每英里 $2.50 至 $4.00 区间；但确切价格仍是未经确认的尽调缺口。Waabi 借 Uber Freight 推进 GTM，在获客成本上有结构性优势：Uber
              Freight 市场已经聚合承运需求和货物匹配，Waabi 不必承担直销企业团队成本。AV
              领域的企业货运合同通常包含多年最低运量承诺、安全员阶段与无人驾驶阶段不同的定价层级，以及与监管里程碑挂钩的合同调整条款。Waabi 通过 Volvo Trucks 的第二 OEM
              渠道，把采购决策导向卡车买家而非物流运营商，进一步分散收入组合，并在运营型 RaaS 模式之外形成轻资产授权层。
