  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户流程
        blocks:
          - type: paragraph
            body: >-
              Waabi 的商业产品是 Driver+，一套为北美长途货运专门打造的 SAE Level 4 自动驾驶卡车系统。从客户流程看，物流托运人在 Uber Freight 市场发布一票覆盖 500 至 1,500
              英里州际高速路段的货物；Uber Freight 的调度算法把这票货分配给 Waabi 运营的 Class 8 Volvo VNL Autonomous
              卡车；卡车自主完成高速运输（当前有监督阶段车上配有安全员）；交付完成后，通过自动化电子日志设备合规记录和实时遥测回传给运营方。核心客户价值主张，是替代司机成本（省掉 CDL 司机每年 $95,000 至
              $115,000 成本），同时把日利用率提升到 22 至 24 小时，而人类司机在 Hours of Service 规则下约只能达到 11 小时。Waabi 的运营设计域刻意收窄——只跑高速、长途、Class
              8，并限定在 Texas I-10 和 I-20 走廊——用更短的 ODD 换取更快走向商业无人驾驶的路径。产品目前不服务城市末端配送、取送货，或多式联运场站作业。这种 ODD
              限制是有意的架构选择：相比全地理范围 AV 部署，它有助于更早获得监管批准，并在可重复的州际路段上提升运营可预测性。Waabi 将 Driver+ 定位为机器人即服务托管服务，承运方不拥有也不维护 AV
              系统，从而降低客户资本开支和采用阻力，同时把硬件和运营风险集中到 Waabi 的资产负债表上。Uber Freight 是当前试点唯一商业分销渠道和货运网络，这带来深度渠道依赖，但也让 Waabi
              在现阶段部署中无需自建企业直销团队。
