    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、创立与使命
        blocks:
          - type: paragraph
            body: >
              Waabi Innovation Inc. 是一家私营 AI 公司，总部位于加拿大 Ontario 省 Toronto，并在 San Francisco 和 Texas 州 Dallas 设有业务。Raquel
              Urtasun 于 2021 年创立 Waabi。Urtasun 是西班牙裔加拿大计算机科学家、University of Toronto 教授，曾任 Uber Advanced Technologies
              Group 首席科学家。她创立公司的判断是，自动驾驶需要一种根本不同的 AI 优先路径，而不是行业主流的规则驱动、重传感器方法。公司名称有双重含义：在 Ojibwe
              语中意为「她有远见」，在日语中意为「简单」，对应创始人追求可解释、可泛化 AI 的理念，而不是堆叠复杂手写系统。

              公司使命是为现实世界开创「Physical AI」，先从自动驾驶卡车切入，再扩展到 robotaxi。Waabi 的商业化路径瞄准 $1 trillion 北美货运市场；2026 年 1 月后，又通过 Uber
              的独家 robotaxi 合作切入全球网约车市场，计划部署 25,000 辆以上 robotaxi。商业模式是开发并授权自动驾驶软件（Waabi Driver），集成进专门打造的 OEM 车辆（主要是 Volvo
              VNL Autonomous 卡车），再通过 Uber Freight 等物流网络以驾驶员即服务模式投放运力，并直接向承运人和托运人销售卡车。Waabi 将自己定位为「AV 2.0」公司，认为借助 Waabi
              World 的仿真优先训练方法，可以用比传统路径更少的资源完成商业化。
            claimRefs:
