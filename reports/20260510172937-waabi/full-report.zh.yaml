      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Waabi 通往无人驾驶商业卡车的路径，受两项联邦监管流程制约——FMCSA ADS 规则制定（案卷 FMCSA-2023-0052），以及在特定条件下针对 AV 专用车辆改装的 NHTSA FMVSS
              豁免。FMCSA NPRM 于 2023 年 5 月发布；截至 2026 年 5 月尚未出台最终规则，意味着从 NPRM 到最终规则已滞后三年，且没有确认的颁布时间表。Morgan Stanley
              估计，对尚未进入无人驾驶阶段的 AV 卡车公司，每 12 个月规则制定延迟会压低预期估值 15-25%；KPMG 2026 年 AV
              投资人风险调查也显示，监管不确定性是受访机构投资人最关注的尽调问题。Aurora Innovation 自身 10-K 风险因素同样将 FMCSA
              规则制定风险列为重大风险，说明这一风险适用于全行业。州级许可只能部分替代。Texas DOT 已为 Waabi 的 I-10 和 I-20 走廊发放有监督运营 AV
              许可，但该许可只覆盖有安全员在场的运营；一旦发生安全事故，监管复审可能使其失效。知识产权方面，Waabi 在 Gaussian splatting 场景重建、神经渲染和可微世界模型上拥有 40
              多项专利，形成防御性专利位置；但 Waymo 和 Aurora 的重叠专利组合密度很高，竞争对手主张权利的风险仍然潜伏。公司未公开披露自由实施（FTO）分析。CCPA、GDPR 和加拿大 PIPEDA
              等隐私法规适用于传感器数据采集；若地理范围超出 Texas，合规能力也需要扩张。ATA 2025 年政策框架警告，逐州许可并不能充分替代联邦 FMCSA 标准，进一步强化 Waabi 当前面对的监管缺口风险。表
              TR001 提供完整监管与法律风险登记，含严重性排序和尽调路径。
