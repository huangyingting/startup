      - number: '8.2'
        title: 融资背景、入场纪律与稀释悬压
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 1 月，Waabi 从 Series A 到 C 累计融资 $1.28B，Series C 投前估值 $3B，隐含投后估值约 $3.5-4B。Series C
              投资人包括未详细公开披露的战略和财务投资方；加拿大机构资本和科技行业跨界基金的出现，与该轮融资规模一致。$3B 投前估值已计入：（a）2026 年 Q4 无人驾驶成功上线；（b）Uber Freight 收入到
              2027 年底爬升至 $50-100M ARR；（c）Volvo OEM 车队部署于 2028 年启动。在这个估值下，入场纪律是二元的：如果无人驾驶里程碑滑延 12 个月以上，$3B
              估值很可能需要在平轮或下轮中重置，意味着 Series C 投资人面临稀释风险。


              稀释悬压分析：Waabi 累计融资 $1.28B。假设标准 VC 优先权结构（1x 非参与），若退出估值超过 $4B，Series C
              的清算优先权敞口可控。低于该门槛，优先权悬压会开始挤压普通股和员工股权。若战略收购方以 $5B 退出，Series C 投资人按清算瀑布分配后，可获得退出价值约 40-50%。若以 $10B
              退出（基准情形），Series C 投资人可获得退出价值 65-70%。公开市场退出则需要无人驾驶车队达到有意义规模（200+ 辆卡车、$100M+ ARR），才能支撑 AV 溢价倍数。
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV010
              - CV015
              - CV016
      - number: '8.3'
        title: 牛市、基准与熊市情景分析
        blocks:
          - type: paragraph
            body: >-
              牛市情形需要三件事依次发生：（1）2026 年 Q4 如期无人驾驶上线，且没有重大事故；（2）Uber Freight 在 2027 年快速爬坡至 100+ 辆卡车和 10M+ 英里；（3）Volvo 于
              2028 年开始量产爬坡。在这一情形下，Waabi 到 2028 年实现 $400-600M RaaS 收入，支撑 15-20x 收入倍数，隐含退出估值 $6-12B。若 2028-2029
              年在一级市场已形成规模，且 AV 卡车获得主流机构接受，30-50x ARR 退出具备可能，隐含 $15-25B 估值。


              基准情形假设：（1）2027 年 Q1-Q2 无人驾驶上线（延迟 1-2 个季度）；（2）Uber Freight 到 2027 年底爬坡至 50-100 辆卡车；（3）Volvo 确认量产承诺，但
              2028-2029 年才开始生产。在这一情形下，Waabi 到 2028 年底实现 $150-300M ARR，并以 25-40x ARR 退出，隐含 $8-15B 估值。Series C 投资人以 $3B
              入场，7 年持有期约可获得 2.5-5x MOIC，对应 20-30% IRR。


              熊市情形假设：（1）2028 年以后才无人驾驶上线（延迟 12-18 个月）；（2）Uber Freight 爬坡有限或重新谈判条款；（3）Volvo 量产时间表延长。在这一情形下，Waabi
              延长有监督试点带来的烧钱迫使公司以 $3B 估值或更低进行过桥轮；Series C 投资人面临稀释和潜在优先权侵蚀。退出估值 $2-5B（在 $150M ARR 下为 1-1.7x 收入）意味着 Series C
              投资人获得 0-0.7x MOIC，相对机会成本构成重大损失。
            claimRefs:
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
