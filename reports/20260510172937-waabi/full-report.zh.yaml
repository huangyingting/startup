companyProfile:
  summary: >
    Waabi Innovation Inc. 是一家总部位于 Toronto 的私营 AI 公司，2021 年 1 月由 Uber Advanced Technologies Group 前首席科学家 Raquel Urtasun
    创立。公司开发 Waabi Driver——一个端到端 AI 系统，主要通过生成式 AI 仿真器 Waabi World 训练——面向自动驾驶长途卡车，并自 2026 年 1 月起拓展到 robotaxi。Waabi 与 Volvo
    Autonomous Solutions 合作，将 Waabi Driver 集成到 Volvo VNL Autonomous 卡车；与 Uber Freight 签署 10 年协议，由后者担任商业卡车运输渠道，并与 Uber
    Rides 合作，由后者担任独家 robotaxi 部署伙伴。Waabi 已累计融资 $1.28 billion，包括 2026 年 1 月 $750M Series C 和 Uber $250M
    里程碑承诺——加拿大史上最大规模融资——投前估值约 $3 billion，员工约 300 人。公司错过了 2025 年底无人驾驶商业化上线目标，截至 2026 年 5 月 runDate 尚未确认新的时间表。
