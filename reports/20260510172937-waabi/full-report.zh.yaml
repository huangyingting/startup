      - number: '7.3'
        title: 运营与质量风险
        blocks:
          - type: paragraph
            body: >-
              Waabi 的运营风险画像由三项约束汇合而成——单一走廊地理集中、对两家上市公司且财务轨迹不确定的硬件供应依赖，以及无人驾驶前有监督阶段安全员带来的系统性成本负担。只在 Texas I-10 和 I-20
              走廊运营，意味着任何影响该特定走廊的许可暂停、安全事故或极端天气，都会让 100%
              商业活动停摆，且没有替代路线或备用运营。这种单点故障地理布局，是早期阶段为了效率有意选择的，但在无人驾驶上线前，每拖过一个月都会让运营脆弱性更尖锐。通过 Luminar Technologies 采购 lidar
              的供应风险尤其值得注意。Luminar 自 2020 年 SPAC 上市以来每年都录得经营亏损；任何财务困境或重组，都可能中断 Waabi 依赖的 Iris 传感器供应，而 Waabi
              没有披露替代供应商。NVIDIA Drive Thor 是唯一车载算力平台，公司未宣布第二套算力方案，所有运营卡车都存在单一供应商依赖。有监督运营阶段的安全员成本按每名司机每年 $80,000-$120,000
              估计消耗资本，恰好在公司最需要向 Series D 证明商业可行性的阶段压低单位经济模型。截至 2026 年 5 月，NHTSA 或 TxDOT 数据库未报告 Waabi Texas
              运营安全事故，这是正面运营信号；但公司未发布独立第三方安全审计，无法佐证该表现记录，也无法提供独立安全保证基线。表 TR002 提供完整运营风险登记，涵盖失效模式、可能性、严重性和未解决缺口。
