      - number: '6.4'
        title: 留存、耐久性与满意度
        blocks:
          - type: paragraph
            body: >-
              传统 SaaS 留存指标（NRR、GRR、logo churn）不适用于 Waabi 当前阶段，因为公司没有可用于计算留存的多期收入 cohort。Uber Freight 合作是 10
              年供应协议，在渠道层面提供了合同耐久性，但该协议中的退出条款、履约 SLA 和终止触发条件没有公开披露。使用 Uber Freight 自动驾驶货运产品的终端托运人满意度数据无法独立获得；Uber Freight
              自身的托运人 NPS 和可靠性数据也是私有的。


              结构性留存风险集中在单一交易对手：如果 Uber Freight 退出 AV 货运市场、在财务压力下重组，或行使合同终止权，Waabi 将失去整个商业渠道，且没有即时替代方案。Uber Freight 本身是
              Uber Technologies 子公司，而 Uber 历史上曾重组货运业务；这带来第二层母公司集中风险。合同耐久性还受 AV 商业化协议常见的“履约里程碑”条件约束——如果 Waabi 未能实现 2026 年
              Q4 无人驾驶里程碑，协议商业条款可能被重新谈判。
            claimRefs:
              - CU014
