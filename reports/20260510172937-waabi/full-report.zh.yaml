  - id: FE001
    title: 产品架构图
    type: stack
    layout: standard
    summary: Waabi Driver+ 平台的五层技术架构，自上而下从车队运营到基座 Volvo VNL 实体车辆平台，展示各层如何与上下层集成。
    data:
      layers:
        - label: 商业运营层
          modules:
            - Uber Freight 派单 API（货物匹配与路线规划）
            - 车队运营商遥测仪表盘
            - 自动化 ELD 合规与路线管理
          note: Single commercial channel; 100% dependency on Uber Freight platform uptime
        - label: Waabi Driver+ 软件栈
          modules:
            - 规划与预测模块（端到端神经网络，无需 HD 地图）
            - 感知与传感器融合（激光雷达 + 摄像头 + 雷达处理）
            - Waabi World 模拟器（训练数据生成反馈环）
          note: Trained exclusively in Waabi World simulation; 100M+ simulated miles/day
        - label: NVIDIA Drive Thor 计算层
          modules:
            - 实时推理引擎（低于 100ms 延迟）
            - DriveOS 运行时环境
            - 安全监控协处理器
          note: 2000 TOPS; single-vendor NVIDIA dependency; DriveOS software support required
        - label: 传感器硬件层
          modules:
            - Luminar Iris 激光雷达（250m 长距离探测）
            - 8 摄像头 360 度阵列（前向和后向）
            - 雷达阵列（全天候备份探测）
          note: Luminar single-source lidar dependency; radar provides all-weather redundancy
        - label: Volvo VNL Autonomous 平台
          modules:
            - 冗余转向系统（具备 SAE Level 4 能力）
            - 冗余制动系统（具备 SAE Level 4 能力）
            - 电源管理与电气冗余
          note: Volvo provides hardware safety certification; volume commitment undisclosed
    approximationNotes: 架构根据公开技术描述、专利文件和合作伙伴公告推断。内部组件图和 API 规格未公开。
    claimRefs:
      - CE004
      - CE006
      - CE008
      - CE010
