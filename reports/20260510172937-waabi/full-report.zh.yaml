      - number: '7.5'
        title: 缓释、监控指标与尽调要求
        blocks:
          - type: paragraph
            body: >-
              Waabi 已对最高严重性风险采取若干部分缓释措施。2025 年 8 月任命前 Uber Freight CEO Lior Ron 为 COO，为 Uber Freight
              渠道带来机构关系深度和运营执行能力，补足 Urtasun 的技术领导力。10 年 Uber Freight 协议提供合同期限，但未披露最低运量，显著限制了保护价值。NVIDIA 和 Khosla
              的战略投资人关系释放了一定供应优先信号，尽管 NVIDIA Drive Thor 没有正式供应协议披露。Texas DOT 许可合规让公司在有监督运营上保持有效监管地位。40 多项专利组合提供防御性 IP
              位置，降低但不能消除竞争对手专利主张风险。投资人应按季度节奏监控以下先行指标——FMCSA 在 Federal Register 发布最终 ADS 规则或提前规则制定更新；Waabi
              如有披露，则关注有监督里程；Uber Freight 年报中的 AV 货运分部指标；NHTSA AV 自愿安全数据库中 Waabi 的备案；Luminar Technologies
              季度财务结果和现金头寸；Aurora Innovation 车队规模和收入披露；以及任何 Waabi Series D 融资公告。应触发投资论证重评或退出的止损标准包括：FMCSA 最终规则到 2026 年 Q4
              仍未发布；Waabi 现金跑道在没有 Series D 承诺或无人驾驶收入的情况下低于 9 个月；Aurora 在 Waabi 实现无人驾驶上线前达到 50 辆或更多无人驾驶卡车且年化收入 $30M
              或以上；Uber Freight 货运量连续两个季度持平或下滑；以及 Texas 有监督运营中发生任何涉及人身伤害或死亡的安全事故。投资前必须提出的尽调要求包括：监管律师对 FMCSA 时间表的意见、完整
              Uber Freight 供应协议文本、Waabi 董事会组成和治理文件、经审计财务报表、NHTSA FMVSS 豁免提交状态，以及针对模拟和感知领域前 20 项竞争对手专利的 FTO 分析。
