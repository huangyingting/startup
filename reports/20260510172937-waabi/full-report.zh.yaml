  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年自动驾驶卡车竞争格局已经从 2019–2021 年高峰期美国 10 多家活跃玩家，大幅整合为四家主要存续的技术栈公司：Aurora Innovation、Kodiak Robotics、Torc
              Robotics 和 Waabi。第五类是 Level 2+ 自动驾驶供应商，以 Plus.ai 为代表。OEM 集成项目（Volvo Autonomous Solutions、PACCAR
              的自动驾驶开发）构成来自硬件层的独立既有玩家威胁。Waymo Via（Google 的自动驾驶卡车项目）名义上存在，但在 Class 8 运营中没有实质商业进展。

              三家失败玩家——Embark Trucks（SPAC 资金耗尽后于 2023 年 2 月关停）、Argo AI（Ford 和 Volkswagen 撤回承诺资金后于 2022 年 10 月关停）以及
              TuSimple（在国家安全调查和与中国关联方共享数据担忧后，于 2023
              年暂停美国业务）——为竞争动态提供关键反向证据。三家公司都融到大量资本，却在现金跑道耗尽前未能实现足够商业收入。这个模式凸显，在该领域，资本充足性和商业合作与技术差异化同样重要。

              邻近竞争对手包括：（1）Gatik，专注于为 Walmart 等托运人在城市和郊区环境做中间里程自动驾驶配送，与 Waabi
              属于不同细分市场；（2）Outrider，在物流设施内自动化堆场卡车作业；（3）聚焦港口和多式联运作业的短驳自动化初创公司。由于技术要求不同，这些邻近公司近期不太可能进入 Waabi
              的长途市场。国际竞争对手——中国的 Momenta、Fabu Technology 和重组后的 TuSimple China 实体——在地理上分离的监管环境中运营。
