      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              估算自动驾驶卡车市场，需要把总货运支出和 AV 技术收入拆开，因为规模化后稳定的每英里变现基准尚未形成。多个估算口径给出实质不同的结果；本章保留区间，而不是收敛为单点数字。最广义
              TAM——美国营运性卡车运输总收入约 $920 billion——代表如果所有货运都自动驾驶化的理论上限。更贴近运营的 TAM 若限定为 Class 8 长途整车货运，则为 $400–$650 billion。

              具体到自动驾驶技术层，分析师估计跨度很大：MarketsandMarkets 将 2024 年全球自动驾驶卡车市场定为 $2.1 billion，并预测 2030 年达到 $21.6 billion，对应
              48.2% 复合年增长率。Allied Market Research 在更保守采用情景下预测 2030 年为 $2.97 billion。Grand View Research 在不同监管和技术假设下估计
              2030–2035 年为 $14–$35 billion。差异主要来自对 Level 4 采用时间、是否纳入车辆硬件成本，以及地域范围（仅美国与全球）的不同假设。不存在单一共识估算，这是重大证据缺口。

              Waabi 近期 SAM 最适合估为 Class 8 长途货运中同时满足三项条件的部分：位于 Texas 和 Sun Belt 走廊，运量足以支撑专用自动驾驶部署，并可通过 Waabi 的 Uber
              Freight 商业渠道触达。若假设到 2028 年，对估计 $150 billion 的 Sun Belt 长途子市场渗透 5%，则 SAM 约 $7.5
              billion。基于当前车队规模、单一商业车道和规划中的路线扩张，Waabi 2028 年 SOM 估计为 $50–$200 million 收入；每英里费率按与现货市场价格竞争的水平计算，低于更广义 TAM 的
              0.1%。
