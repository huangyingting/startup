      - number: '7.4'
        title: 合作伙伴、依赖与财务风险
        blocks:
          - type: paragraph
            body: >-
              Waabi 的商业结构呈现极端集中，且四个依赖维度同时集中——Uber Freight 是唯一商业渠道，Volvo 是唯一 OEM 车辆伙伴，NVIDIA 是唯一算力供应商，Luminar 是唯一 lidar
              供应商。这种四重单点故障结构，即便按商业化前创业公司标准看也不常见，并形成需要系统尽调的供应链脆弱性画像。Uber Freight 依赖最尖锐，因为 10 年供应协议中的最低运量条款、SLA
              规定和终止触发条件完全未披露。如果 Uber Freight 退出 AV 货运市场或行使合同终止权，Waabi 将没有商业收入，并需估计 12-18 个月重建替代商业渠道。财务风险与伙伴结构紧密耦合。Waabi
              没有披露收入，每年估计烧钱 $80M-130M，Series C 后估计 18-24 个月现金跑道，到 2027 年中至下半年将与 Series D 融资需求相交。KPMG 和 Morgan Stanley
              研究均指出，在 AV 卡车商业化阶段，渠道集中和监管不确定性是投资人尽调的两大主导风险。投资人集中度也偏高——Khosla Ventures、Uber 和 NVIDIA
              作为战略投资方，其利益可能并不完全匹配独立商业扩张；NVIDIA 同时是投资人和唯一算力供应商，这种双重角色造成治理冲突，且没有任何公开董事会保护措施披露。表 TR003 和 TR004
              提供伙伴与执行风险登记。图 FR003 绘制完整依赖结构，展示所有关键单点故障关系，以及它们如何连接到融资和商业化结果。
