      - number: '1.4'
        title: 里程碑、规模与运营状态
        blocks:
          - type: paragraph
            body: >
              Waabi 自 2021 年创立以来，完成了一系列有意义但尚未完全商业化的里程碑。2021 年 6 月，公司以 $83.5M Series A 公开亮相。2022 年 2 月，公司发布闭环生成式 AI 仿真器
              Waabi World。2023 年 9 月，Waabi 与 Uber Freight 在 Texas 的 Dallas-to-Houston 路线上推出首批自动驾驶卡车商业货运（车上配安全司机），并宣布一项
              10 年合作，计划部署「数十亿英里」自动驾驶运力。2024 年 3 月，Waabi 与 NVIDIA 宣布合作使用 NVIDIA Drive 平台。2024 年 6 月，Waabi 完成 $200M Series
              B，目标是在 2025 年底前部署无人驾驶。2025 年 2 月，Waabi 与 Volvo Autonomous Solutions 宣布战略合作，将 Waabi Driver 集成到 Volvo VNL
              Autonomous 卡车。2025 年 8 月，Lior Ron 加入 Waabi 任 COO。2025 年 10 月，Waabi 在 TechCrunch Disrupt 发布可量产的 Volvo VNL
              Autonomous 卡车。2026 年 1 月，Waabi 宣布 $750M Series C、Uber $250M 投资以及独家 robotaxi 合作。

              但原定 2025 年底的完全无人驾驶商业化上线已经延期。CEO Urtasun 2026 年 1 月承认，上线会在「未来几个季度内」发生，并把延期归因于 OEM
              生产验证时间表，而非技术缺口。延期很重要，因为无人驾驶里程碑是投资逻辑的核心商业验证点。截至 runDate（2026 年 5 月），未见商业无人驾驶上线的独立确认报道。2026 年初媒体报道公司约有 300
              名员工。除 Uber Freight 是主要商业伙伴外，收入和客户指标均未公开披露。
