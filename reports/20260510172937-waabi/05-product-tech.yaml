  body: 'The Waabi product platform comprises five integrated modules that together form a vertically integrated AV development
    and deployment stack. First, Driver+ (the AV software stack) is the customer-facing revenue unit: a real-time end-to-end
    neural network system running on NVIDIA Drive Thor onboard compute that translates raw sensor inputs into truck actuator
    commands at sub-100ms latency. Second, Waabi World (the generative simulator) is the training and validation environment:
    it generates over 100 million simulated driving miles per day through differentiable rendering and Gaussian splatting,
    producing photorealistic lidar and camera sensor outputs for adversarially generated traffic scenarios. Third, the sensor
    suite (Luminar Iris lidar at 250m range, an 8-camera 360-degree array, and a radar array for all-weather redundancy) is
    the perception hardware layer. Fourth, the Volvo VNL Autonomous platform is the physical vehicle layer, supplying SAE
    Level 4-capable redundant steering, braking, and power management pre-certified to automotive safety standards. Fifth,
    the Uber Freight dispatch integration is the commercial operations layer, providing load matching, routing, and ELD compliance
    automation. The product module map reveals a key strategic pattern: Waabi bears the capital and integration burden of
    the full stack (software, hardware, OEM vehicle, sensor qualification) while monetizing through a per-mile fee rather
    than a software license — making it more capital-intensive than a pure-software business but more defensible against commoditization.
    Each module has distinct diligence gaps: Driver+''s driverless safety case is unconfirmed; Waabi World''s compute cost
    is not disclosed; the sensor BOM and lidar exclusivity terms are private; and the Volvo production commitment and delivery
    schedule are undisclosed. These gaps collectively represent the highest-priority diligence work items for any prospective
    investor or partner.'
