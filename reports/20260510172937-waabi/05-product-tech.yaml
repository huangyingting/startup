chapter:
  number: 5
  title: Product & Technology
  summary: Waabi delivers Driver+, a commercial SAE Level 4 autonomous trucking system trained almost entirely in simulation
    via its Waabi World generative platform, currently in supervised commercial operation on Texas I-10 and I-20 corridors
    with Volvo VNL trucks dispatched through Uber Freight. The company's simulation-first, HD-map-free, end-to-end neural
    network architecture is a genuine technical differentiator, but driverless commercial launch has slipped from end-2025
    to mid-2026, placing Waabi behind Aurora Innovation (driverless April 2025), and critical regulatory, safety-case, and
    supply-chain diligence gaps remain unresolved.
