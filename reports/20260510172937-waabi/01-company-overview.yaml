- id: funding-and-investors
  title: Funding History, Valuation, and Investors
  body: 'Waabi has raised approximately $1.28 billion in total external capital since
    its 2021 founding across three rounds. The Series A ($83.5M, June 2021) was at
    the time the largest Series A in Canadian history. The Series B ($200M, June 2024)
    was led by Uber and Khosla Ventures. The Series C ($750M, January 2026) was co-led
    by Khosla Ventures and G2 Venture Partners, with Uber contributing an additional
    $250M in milestone-based capital linked to the robotaxi partnership, making the
    combined $1B announcement the largest fundraise in Canadian history. Pre-money
    valuation at the Series C was reported at approximately $3B by The Globe and Mail
    in December 2025; the company declined to confirm post-money valuation publicly.

    The investor syndicate spans technology (Khosla Ventures, Radical Ventures, 8VC,
    Incharge Capital), strategic OEM/transportation (Volvo Group Venture Capital,
    Porsche Automobil Holding SE, Scania Invest, Ingka Investments), ride-hailing
    (Uber), semiconductors/AI (NVentures/NVIDIA), financial (BlackRock, HarbourVest
    Partners, Abu Dhabi Investment Authority, Linse Capital, BMO Global Asset Management),
    and Canadian ecosystem investors (BDC Capital, Export Development Canada, TELUS
    Global Ventures, OMERS Ventures). Key academic AI researchers—Geoffrey Hinton,
    Fei-Fei Li, Pieter Abbeel, and Sanja Fidler—participated in the Series A.

    The breadth of strategic investors creates advantages (Uber as commercial channel,
    NVIDIA as compute partner, Volvo as OEM) and potential conflicts (multiple OEM
    investors may compete for exclusivity). No debt financing or secondary transactions
    have been publicly disclosed. Revenue metrics and burn rate remain private; the
    company has not publicly indicated when it expects to reach profitability or disclosed
    remaining cash runway.

    '
