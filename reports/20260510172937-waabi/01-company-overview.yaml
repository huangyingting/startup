    loads delivered, miles driven autonomously, safety incident rates, cash balance,
    burn rate, or any other operational or financial metrics. The diligence assessment
    of commercial traction relies entirely on stated partnerships (Uber Freight, Volvo)
    and press-reported milestones. Investors must treat all commercial progress claims
    as company-reported and unverified until independent data or regulatory filings
    become available. The Uber Freight partner relationship is also a potential conflict—Uber
    is both Waabi''s largest investor, its primary commercial trucking channel, and
    its sole robotaxi deployment partner.

