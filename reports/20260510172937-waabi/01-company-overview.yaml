- calloutType: risk
  title: Driverless Launch Delay and Simulation Skepticism Are Adverse Signals
  body: 'Waabi explicitly targeted a fully driverless commercial launch by end of
    2025, communicated at the Series B in June 2024. By January 2026 CEO Urtasun acknowledged
    the delay, citing OEM validation timelines. Simultaneously, competitors at Aurora
    (which launched a driverless service in 2025 but re-introduced a human observer)
    and the collapse of TuSimple demonstrate the sector''s difficulty in translating
    claimed capability into sustained, safe commercial operation. Industry experts
    and regulators remain skeptical of Waabi''s simulation-first validation approach—questioning
    whether 99.7% simulation accuracy can substitute for real-world safety miles in
    regulatory approvals—creating potential approval timeline risk beyond what is
    reflected in press coverage.

    '
  claimRefs:
