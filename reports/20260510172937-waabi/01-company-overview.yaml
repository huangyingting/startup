  title: World-Class Founder with Unmatched Domain Pedigree
  body: 'Raquel Urtasun is among the top five autonomous vehicle AI scientists globally,
    having led Uber ATG''s research before founding Waabi. Her academic credibility
    (University of Toronto professorship, Vector Institute co-founder with Geoffrey
    Hinton), industry track record (four years at Uber ATG), and scientific network
    (Hinton, Fei-Fei Li, Pieter Abbeel as early backers) represent an exceptionally
    high founder-market fit. This pedigree enables Waabi to attract top AI talent,
    prestigious investors, and major OEM/logistics partnerships that competitors would
    struggle to replicate. She has been honored by Time, the Order of Ontario, the
    Royal Society of Canada, and CNBC''s Changemakers—validation across institutional,
    governmental, and media audiences.

    '
