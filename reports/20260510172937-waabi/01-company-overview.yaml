- calloutType: insight
  title: Simulation-First Architecture Enables Dual-Vertical at Lower Capital Cost
  body: 'Waabi''s core architectural bet—a single end-to-end AI model trained primarily
    in simulation (Waabi World) that generalizes across vehicle types, geographies,
    and use cases—is being tested in practice with the January 2026 robotaxi expansion.
    Aurora''s $3.46B capital base versus Waabi''s $1.28B ($2.18B less) demonstrates
    that Waabi has built comparably with materially less capital. NVIDIA CEO Jensen
    Huang''s endorsement ("Waabi is unlocking real deployment") and Uber CEO Dara
    Khosrowshahi''s partnership commitment provide senior validation of the approach.
    If the driverless launch succeeds in 2026 and the same model deploys robotaxis,
    Waabi will have empirically proven the dual-vertical capital efficiency thesis.

    '
