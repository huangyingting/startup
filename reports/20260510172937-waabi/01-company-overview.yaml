company:
  name: Waabi
chapter:
  number: 1
  title: Company Overview
  summary: 'Waabi is a Toronto-based AI company founded in 2021 by Raquel Urtasun
    (former Uber ATG Chief Scientist) that pioneers a simulation-first, end-to-end
    AI approach to autonomous trucking and, since January 2026, robotaxis. Having
    raised $1.28B in total funding—including a $750M Series C and $250M Uber commitment
    announced January 28, 2026—Waabi operates at a reported $3B pre-money valuation
    with Volvo as its OEM partner and Uber Freight as its commercial deployment partner,
    though its planned 2025 driverless launch was delayed to 2026.

    '
sections:
- id: identity-and-founding
  title: Identity, Founding, and Mission
  body: 'Waabi Innovation Inc. is a private artificial intelligence company headquartered
    in Toronto, Ontario, Canada, with additional operations in San Francisco and Dallas,
    Texas. Founded in 2021 by Raquel Urtasun—a Spanish-Canadian computer scientist,
    University of Toronto professor, and former Chief Scientist at Uber''s Advanced
    Technologies Group—Waabi was established with the conviction that autonomous vehicle
    technology required a fundamentally new AI-first approach distinct from the rule-based,
    sensor-heavy methods dominant in the industry. The company''s name carries dual
    meaning: "she has vision" in Ojibwe and "simple" in Japanese, reflecting the founder''s
    philosophy of building interpretable, generalizable AI rather than complex hand-coded
    systems.

    The corporate mission is to pioneer "Physical AI" for the real world, starting
    with autonomous trucking and expanding to robotaxis. Waabi''s go-to-market model
    targets the $1 trillion North American freight market and, since January 2026,
    the global ride-hailing market via an exclusive robotaxi partnership with Uber
    deploying 25,000 or more robotaxis. The business model involves developing and
    licensing autonomous driving software (the Waabi Driver) integrated into purpose-built
    OEM vehicles (principally Volvo VNL Autonomous trucks), deploying this capacity
    via a driver-as-a-service model through logistics networks like Uber Freight,
    and selling trucks directly to carriers and shippers. Waabi positions itself as
    an "AV 2.0" company that can achieve commercialization with fewer resources than
    legacy approaches thanks to its simulation-first training methodology through
    Waabi World.

    '
