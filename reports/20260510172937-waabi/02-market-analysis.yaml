chapter:
  number: 2
  title: Market Analysis
  summary: 'The North American autonomous trucking market stands at an early-commercial
    inflection in 2026, with total US for-hire trucking generating approximately $920B
    annually and analyst projections for autonomous truck technology ranging from
    $2.1B today to $21.6B by 2030. Structural demand drivers—an 80,000-plus driver
    shortage, $180K–$200K annual all-in driver cost, and approximately 4,900 annual
    Class 8 fatal crashes—are compelling; regulatory fragmentation across 20-plus
    states, capital intensity, and persistent technology edge cases constrain near-term
    adoption. Waabi''s primary served market is long-haul Class 8 freight on Texas
    Sun Belt corridors, where permissive regulation and dense freight volumes create
    the most viable near-term autonomous deployment environment.

    '
sections:
- id: market-definition
  title: Market Definition and Boundaries
  body: 'The autonomous trucking market encompasses software stacks, perception systems,
    and associated services that enable Class 6–8 commercial trucks to operate with
    reduced or no human driver involvement on public roads. For diligence purposes,
    this chapter defines the market along three nested boundaries. The broadest addressable
    market is total US for-hire trucking revenue, estimated at approximately $920
    billion in 2024 by the American Trucking Associations—covering all freight modes
    from local delivery to long-haul truckload. The primary strategic addressable
    market, and the one most relevant to Waabi, is long-haul truckload Class 8 freight,
    representing approximately $400–$650 billion in annual US spend, where the economics
    of autonomous replacement are most favorable due to long, predictable highway
    miles and federal hours-of-service regulations that structurally cap human productivity.

    The specific Waabi serviceable market is high-volume, high-frequency interstate
    lanes in the Sun Belt—principally the Texas I-45 and I-35 corridors—where weather
    conditions are relatively benign and freight density supports dedicated autonomous
    corridor operations. Adjacent markets including urban last-mile delivery, less-than-truckload
    (LTL) consolidation, and yard automation are excluded from Waabi''s current go-to-market
    but are addressed by companies like Gatik and Outrider. International markets
    (EU, Canada, China) are structurally addressable but face distinct regulatory
    frameworks and are not part of Waabi''s near-term commercial plan.

    Status-quo substitutes include: (1) human truck drivers, the incumbent, whose
    total all-in cost has been estimated at $180,000–$200,000 annually per driver;
    (2) driver-assistance technology such as Plus.ai''s SuperDrive (Level 2+ autonomy),
    which reduces but does not eliminate driver dependency; and (3) intermodal rail
    for longer-distance freight. Switching from human drivers to autonomous involves
    capital expenditure on AV-equipped trucks—roughly a $50,000–$100,000 premium per
    vehicle over conventional trucks—plus operational retraining, carrier risk tolerance,
    and insurance underwriting in an immature actuarial environment.

    '
