- id: buyer-segmentation
  title: Buyer and User Segmentation
  body: 'The autonomous trucking market involves multiple distinct buyer archetypes
    with different budget authority, adoption motivations, and risk profiles. The
    primary payer in Waabi''s commercial model is the freight carrier or fleet operator
    paying a per-mile fee for autonomous truck capacity. Large truckload carriers—Werner
    Enterprises, J.B. Hunt Transport, Schneider National, and Knight-Swift—operate
    fleets exceeding 10,000 trucks each and face intense driver recruitment pressure,
    making them natural early adopters once safety records are established. Mid-size
    carriers (500–5,000 trucks) represent the largest volume segment but typically
    lack risk capital for early AV deployment.

    Freight brokers and logistics platforms—principally Uber Freight and C.H. Robinson—act
    as intermediaries connecting shipper demand to autonomous carrier capacity. Uber
    Freight''s digital-native marketplace model makes it a uniquely natural integrator
    for AV truck capacity, which Waabi''s partnership reflects. Shippers (manufacturers,
    retailers, consumer packaged goods companies) are the end-users paying freight
    rates and have indirect incentives to adopt AV through cost reduction, but they
    do not purchase AV systems directly.

    Government entities, including the Department of Defense and United States Postal
    Service, represent a small but strategically viable procurement channel for autonomous
    trucking through military logistics and postal contracts; Kodiak Robotics has
    pursued this segment via DARPA contracts. The most tractable near-term buyer model
    is the freight-as-a-service contract between an AV developer and a major broker-carrier
    pair, where the AV company owns or leases trucks and bills per-mile, eliminating
    capital risk for the shipper. Asset-light licensing to carriers is less viable
    until multi-year safety records are established. OEM bundling—where Volvo sells
    a Waabi-enabled truck directly to a fleet operator—is a longer-term distribution
    channel that requires commercial scale.

    '
