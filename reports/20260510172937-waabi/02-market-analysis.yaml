callouts:
- calloutType: strength
  title: Structural Driver Shortage Creates Durable Pull Demand
  body: 'The 80,000-plus driver shortage—projected to reach 160,000 by 2031—combined
    with a $180,000–$200,000 annual all-in driver cost is not a cyclical problem.
    Demographic trends (average driver age 46), lifestyle factors, and insufficient
    wage growth relative to working conditions make this shortage structural. Every
    carrier Waabi could approach faces this pressure simultaneously, creating demand
    pull rather than requiring Waabi to create a new market from scratch. This demand
    dynamic is significantly more favorable than markets where automation creates
    resistance from displaced incumbents.

    '
  claimRefs:
  - CM019
  - CM020
  - CM021
- calloutType: strength
  title: Texas Regulatory Environment Is a Structural Advantage
  body: 'Texas HB 1308 and subsequent legislation provide Waabi, Aurora, and other
    AV companies with the clearest legal framework for driverless commercial truck
    operations in the US. Combined with Texas''s favorable weather, the I-45 Dallas-Houston
    corridor is the highest-frequency lane for autonomous trucking proving grounds.
    Waabi''s concentration in Texas is not merely geographic convenience—it reflects
    a rational strategy to operate where regulatory clarity reduces legal risk while
    accumulating the safety miles needed to support future federal rulemaking and
    eventual national expansion.

    '
  claimRefs:
  - CM028
  - CM029
  - CM035
- calloutType: risk
  title: Absence of Federal AV Trucking Framework Constrains National Scale
  body: 'The US lacks a federal Level 4 autonomous commercial vehicle rule as of May
    2026. FMCSA''s 2023 ANPRM has not advanced to a Notice of Proposed Rulemaking,
    and federal rulemaking timelines typically span 3–5 years from ANPRM to final
    rule. This means national AV trucking scale—operating across all 50 states uniformly—is
    unlikely before 2028–2030 at the earliest. Any state that has not enacted permissive
    legislation becomes a barrier, requiring expensive route redesigns or political
    advocacy. For Waabi, this limits the addressable SAM to Sun Belt states for the
    foreseeable forecast period.

    '
  claimRefs:
  - CM027
  - CM033
  - CM034
- calloutType: risk
  title: Analyst Market Size Estimates Are Highly Divergent
  body: 'Market size projections for autonomous trucking by 2030 range from $2.97
    billion (Allied Market Research) to $21.6 billion (MarketsandMarkets) to $35 billion
    (Grand View Research high case), a more than 10x spread. This divergence—driven
    by differing definitions of scope, geographic coverage, hardware inclusion, and
    adoption timeline assumptions—means that any single market size citation in investor
    materials should be treated skeptically. Waabi should be prepared to defend its
    market opportunity using a bottom-up approach (freight ton-miles times per-mile
    AV rate) rather than top-down analyst market size claims.

    '
  claimRefs:
  - CM006
  - CM007
  - CM008
  - CM009
- calloutType: insight
  title: Freight-as-a-Service Is the Structurally Optimal Near-Term Model
  body: 'The freight-as-a-service (FaaS) model—where Waabi owns or leases trucks and
    charges Uber Freight a per-mile fee—eliminates the capital risk barrier for carrier
    adoption while allowing Waabi to capture higher per-mile economics than a pure
    licensing royalty. However, this model requires Waabi to act as a quasi-carrier,
    taking on fleet ownership, maintenance, and insurance risk. The model is most
    viable with a large, digitally integrated freight broker like Uber Freight as
    the channel, which explains why Uber''s dual role as investor and commercial partner
    is architecturally important to Waabi''s go-to-market.

    '
  claimRefs:
  - CM015
  - CM016
  - CM014
- calloutType: assumption
  title: Market Sizing Is Based on Analyst Reports and Bottom-Up Estimates
  body: 'All market size figures in this chapter are sourced from publicly available
    analyst reports or independent diligence estimates. Waabi does not disclose addressable
    market calculations. Analyst figures differ significantly in scope and methodology;
    the diligence team has used conservative bottom-up estimates where possible. The
    Waabi SOM estimate of $50–$200M by 2028 is an independent calculation and has
    not been verified against internal Waabi projections.

    '
  claimRefs:
  - CM010
  - CM011
