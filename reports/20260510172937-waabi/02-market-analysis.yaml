  evidenceGaps:
  - type: conflicting-data
    severity: material
    topic: market-size
    missingEvidence: Consensus methodology for autonomous truck market sizing that
      separates vehicle hardware from software/services, and disaggregates US from
      global market.
    whyItMatters: The 10x spread in analyst projections ($2.97B to $35B by 2030) makes
      it impossible to cite a defensible single market size; contradictory estimates
      create investor communication risk.
    diligencePath: Commission a custom market sizing study from a Tier-1 analyst (Gartner,
      Forrester, or IDC) with explicit US/global disaggregation and hardware/software
      breakdown.
    relatedQuestionRefs:
    - QM021
    relatedTableRefs:
    - TM002
  - type: missing-source
    severity: material
    topic: insurance
    missingEvidence: Publicly available actuarial data or insurer-published underwriting
      criteria for Level 4 autonomous commercial vehicle insurance premiums.
    whyItMatters: Insurance cost and availability is a material adoption constraint;
      without quantified premium data, the economic case for AV trucks cannot be fully
      modeled by carriers.
    diligencePath: Request quotes from Zurich, Munich Re, or Berkley One (known AV
      insurance underwriters); review RMIIA publications on AV commercial vehicle
      coverage.
    relatedQuestionRefs:
    - QM023
  - type: missing-source
    severity: minor
    topic: platooning
    missingEvidence: Dedicated market sizing study for truck platooning as a distinct
      autonomous driving sub-segment, separating platooning economics from full Level
      4 deployment.
    whyItMatters: Platooning may represent a faster-to-market opportunity than full
      L4 autonomy but its standalone market size and competitive dynamics are not
      quantified in available research.
    diligencePath: Review Peloton Technology (acquired by Applied Intuition) historical
      filings; contact ATRI for platooning operational cost study; review Volvo platooning
      trial results.
    relatedQuestionRefs:
    - QM026
  - type: missing-source
    severity: minor
    topic: insurance-savings
    missingEvidence: Published actuarial data quantifying insurance cost savings from
      Level 4 autonomous commercial vehicle deployment based on real-world miles accumulated.
    whyItMatters: Insurance savings are cited as an economic benefit of AV trucking
      but no public actuarial study has been published with real-world data from commercial
      deployments.
    diligencePath: Request carrier insurance cost data from Werner Enterprises or
      J.B. Hunt investor relations; contact National Safety Council for AV insurance
      research updates.
    relatedQuestionRefs:
    - QM027
  - type: enumeration-incomplete
    severity: minor
    topic: buyer-segments
    missingEvidence: Procurement decision data from mid-size carriers (500–5,000 trucks)
      and government logistics entities on AV truck adoption intentions, budget parameters,
      and timeline.
    whyItMatters: Mid-size carriers represent the largest volume freight segment but
      their AV procurement readiness and risk tolerance are not publicly documented;
      government logistics contracts are opaque.
    diligencePath: Conduct primary interviews with 5–10 mid-size carrier fleet managers;
      review Kodiak DARPA contract public disclosures; consult USTRANSCOM for DoD
      logistics AV demand signal.
    relatedQuestionRefs:
    - QM009
    relatedTableRefs:
    - TM003
