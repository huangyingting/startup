  topStrengths:
    - World-class sole founder (Raquel Urtasun) with unmatched autonomous vehicle AI pedigree and scientific network
    - >-
      Simulation-first architecture (Waabi World) enables capital-efficient development across trucking and robotaxi
      verticals from one AI model
    - >-
      Prestigious investor syndicate spanning AI (Khosla, NVIDIA, Radical), OEM (Volvo VC, Porsche), logistics (Uber),
      and institutional capital (BlackRock, ADIA)
    - >-
      Exclusive Uber robotaxi partnership (25,000+ vehicles) creates a large new revenue channel unavailable to
      trucking-only competitors
    - Volvo OEM integration (VNL Autonomous) provides purpose-built hardware designed for true L4 driverless operation
  topRisks:
    - >-
      Driverless launch delay: end-2025 target missed; no confirmed launch date as of May 2026—primary investment thesis
      milestone unverified
    - 'Key-person concentration: Raquel Urtasun is the sole founder; no identified internal successor'
    - 'Revenue opacity: zero disclosed revenue despite 3+ years of commercial operations with Uber Freight'
    - >-
      Simulation-to-reality gap: regulators may require real-world miles for safety certification that Waabi's
      simulation-first approach cannot fully substitute
    - >-
      Single commercial partner concentration: Uber is simultaneously Waabi's largest investor, primary trucking
      channel, and sole robotaxi deployment partner—a material conflict of interest
    - >-
      Capital adequacy: estimated $150–250M/year burn rate implies next fundraise by 2028; market conditions and
      milestone risk could constrain access to capital
    - >-
      Competitor Aurora launched commercial driverless trucking in May 2025, 12+ months ahead of Waabi, while Kodiak
      Robotics has delivered customer-owned driverless trucks
  unresolvedGaps:
    - >-
      Independent verification of Waabi Driver's driverless capability and readiness for public road commercial
      operation
    - Revenue and commercial traction metrics from Uber Freight partnership (number of loads, miles, revenue generated)
    - Specific milestone conditions and cure periods attached to Uber's $250M performance-based investment
    - Board composition, governance rights, and investor control provisions
    - Cash runway and burn rate (estimated at $150–250M/year based on Aurora comparables)
    - Robotaxi regulatory approval timeline and path to FMCSA exemption for commercial interstate driverless operation
