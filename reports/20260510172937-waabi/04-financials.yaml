sections:
- id: revenue-model-and-streams
  title: Revenue Model and Revenue Streams
  contentRequirementRefs:
  - 0
  tableRefs:
  - TI001
  figureRefs:
  - FI001
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  - CI006
  - CI007
  - CI008
  body: 'Waabi''s revenue architecture is built on a Robotics-as-a-Service (RaaS) model in which fleet operators or logistics
    customers pay a per-mile fee to access the AV system as a managed service, without owning or maintaining the autonomous
    hardware. This model mirrors SaaS in that Waabi bears the capital expense of the AV stack and recovers it through per-mile
    fees over the life of each commercial agreement. The primary commercial channel is the 10-year Uber Freight partnership,
    which routes freight demand on the Dallas-Houston I-45 corridor and future expansion lanes directly to Waabi-operated
    trucks, eliminating the need for Waabi to build demand-side sales infrastructure. A secondary revenue stream exists through
    Waabi''s OEM integration partnership with Volvo Trucks, which embeds the Waabi Driver in the VNL Autonomous series as
    a licensed software component, generating per-vehicle or subscription fees at commercial production volumes. As of Q1
    2026, Waabi has not yet recognized commercial per-mile revenue, with the driverless launch milestone remaining the trigger
    for first commercial revenue recognition. Industry analyst estimates place commercially sustainable AV trucking per-mile
    rates at $2.50 to $4.00 per mile, compared to a fully-loaded human driver cost of $1.80 to $2.20 per mile, creating a
    theoretical premium pricing window.

    '
- id: pricing-and-monetization
  title: Pricing and Monetization
  contentRequirementRefs:
  - 1
  tableRefs:
  - TI002
  claimRefs:
  - CI009
  - CI010
  - CI011
  - CI012
  - CI013
  - CI014
  - CI015
  - CI016
  body: 'Waabi''s pricing strategy for its RaaS offering is not yet publicly confirmed, but the competitive and analyst context
    provides meaningful framing. Aurora Innovation—the only L4 trucking company operating commercially in the United States—has
    been charging $1 to $2 per mile for supervised AV freight service since its April 2024 commercial launch. This rate, reported
    by the Wall Street Journal, represents the lowest publicly observed L4 AV trucking price and reflects Aurora''s strategic
    decision to grow volume before optimizing margin. Waabi targets the $2.50 to $4.00 per-mile range based on analyst models
    of minimum cost-recovery pricing, though this exact rate is an unconfirmed diligence gap. Waabi''s GTM motion through
    Uber Freight creates a structural advantage in customer acquisition cost: the Uber Freight marketplace pre-aggregates
    carrier demand and load matching, meaning Waabi does not bear the cost of a direct enterprise sales team. Enterprise freight
    contract structures in the AV sector typically involve multi-year minimum volume commitments, a safety-driver phase pricing
    tier distinct from the driverless phase, and contractual adjustment provisions tied to regulatory milestones. Waabi''s
    secondary OEM channel via Volvo Trucks routes purchasing decisions through truck buyers rather than logistics operators,
    further diversifying the revenue mix and creating an asset-light licensing tier alongside the operated RaaS model.

    '
- id: unit-economics
  title: Unit Economics and Cost Structure
  contentRequirementRefs:
  - 2
  tableRefs:
  - TI003
  figureRefs:
  - FI002
  claimRefs:
  - CI017
  - CI018
  - CI019
  - CI020
  - CI021
  - CI022
  - CI023
  - CI024
  - CI025
  - CI026
  body: 'Waabi''s unit economics combine a capital-intensive hardware layer with a high-margin software licensing opportunity
    at scale. At current 2025 production volumes, a fully-equipped L4 AV truck system costs an estimated $150,000 to $250,000
    per vehicle, declining toward $50,000 to $80,000 at high-volume serial production. Against this, the annual human driver
    cost displaced is approximately $95,000 to $115,000 fully-loaded per seat, while AV trucks can operate 22 to 24 hours
    per day versus a maximum of 11 regulated human hours, doubling effective annual miles per vehicle. At 50,000 revenue miles
    per year and $100,000 in annual driver cost savings, a $200,000 AV system breaks even in approximately four years before
    maintenance and depreciation. However, the supervised autonomy phase imposes an additional $50,000 to $80,000 per truck
    per year in safety driver costs that create deeply negative per-truck unit economics before driverless certification.
    Waabi''s Copilot4Science simulation platform reduces physical test miles by approximately 70 percent, materially lowering
    the cost of the development phase relative to sensor-heavy competitors. Gross margin for the software licensing component
    at commercial scale is estimated at 60 to 80 percent. Waabi''s total annual burn rate is estimated at $80 to $130 million,
    driven primarily by approximately 300 engineers at $180,000 fully-loaded per year ($54 million in payroll alone), plus
    hardware procurement, GPU compute, and physical testing infrastructure.

    '
- id: capital-adequacy-and-runway
  title: Capital Adequacy and Runway
  contentRequirementRefs:
  - 3
  - 4
  tableRefs:
  - TI004
  figureRefs:
  - FI003
  - FI004
  claimRefs:
  - CI027
  - CI028
  - CI029
  - CI030
  - CI031
  - CI032
  - CI033
  - CI034
  body: 'Waabi has raised approximately $1.28 billion total across all rounds as of January 2026, anchored by a $200 million
    Series C closed at a $3.0 billion pre-money valuation. The investor base includes Khosla Ventures, Union Square Ventures,
    and BDC Capital, providing a combination of deep-tech Silicon Valley capital and Canadian institutional support. Under
    a base-case burn of $100 million annually and assuming $200 million gross cash inflow from the Series C, the implied runway
    extends to approximately mid-2027 to late-2027, before any commercial revenue offsets. This runway estimate carries high
    uncertainty because Waabi''s actual cash position and burn rate are not audited public data. No debt financing, project
    finance, or asset-backed credit facility has been publicly disclosed, consistent with a pre-commercial technology company
    whose bankable assets are limited. Non-dilutive capital from the Canadian NRC-IRAP program (approximately C$8 million)
    supplements the equity stack. The company will likely require a Series D or milestone-based financing facility by 2027
    to 2028 if commercial revenue does not scale sufficiently to cover operating costs. Waabi''s capital intensity is structurally
    higher than pure-software companies due to hardware procurement, physical testing infrastructure, and the GPU compute
    demands of Copilot4Science, making capital efficiency a key diligence consideration.

    '
- id: financial-gaps-and-verdict
  title: Financial Gaps and Verdict
  contentRequirementRefs:
  - 5
  tableRefs:
  - TI005
  claimRefs:
  - CI035
  - CI036
  - CI037
  - CI038
  body: 'Waabi presents a coherent and theoretically defensible revenue model—per-mile RaaS fees accessed through the Uber
    Freight channel—but remains entirely pre-revenue as of Q1 2026, with driverless commercial launch as the critical gate
    for first revenue recognition. The estimated burn of $80 to $130 million per year against an 18 to 24 month runway post-Series
    C creates a tight capital runway that allows limited room for commercial deployment delays. The principal financial risk
    is acute: a delay in driverless launch beyond Q4 2026 could compress the company''s cash runway to 12 months or fewer
    before meaningful revenue materializes. The single largest revenue-side diligence gap is per-mile pricing power—if Waabi
    cannot sustain rates above Aurora''s $1 to $2 market-clearing floor, the margin profile collapses. If commercial operations
    launch in Q4 2026 with an initial fleet of 20 to 50 trucks, first-year revenue could plausibly reach $5 million to $30
    million depending on pricing and utilization. The most critical missing private financial metrics include audited 2025
    financials, actual Q1 2026 cash balance and burn rate, confirmed per-mile pricing under the Uber Freight contract, and
    GPU compute and infrastructure cost disclosures. The financial verdict is: investable model pending commercial execution,
    but capital efficiency and launch timing are existential variables.

    '
