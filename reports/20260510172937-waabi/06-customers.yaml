chapter:
  number: 6
  title: Customers and Commercial Traction
  summary: Waabi has a single commercial channel partner — Uber Freight — under a 10-year agreement, with Volvo Trucks as
    the OEM vehicle partner. The company is pre-driverless-revenue; supervised pilot miles are accumulating on I-45 and I-35
    but no public load-count, revenue, or NRR data exist. Extreme customer concentration in Uber Freight is the dominant commercial
    diligence risk.
