sections:
- id: customer-segmentation
  title: Customer Base Segmentation
  body: 'Waabi''s customer structure is atypical for a technology company at this stage: rather than a direct shipper or carrier
    base, Waabi has a single commercial channel partner, Uber Freight, which books and dispatches freight loads on Waabi''s
    behalf under a 10-year supply agreement. Shippers who place loads on the Uber Freight marketplace are the indirect end-users
    of the Waabi AV service, but they transact with Uber Freight, not with Waabi directly. This channel model means Waabi
    has effectively one customer of record in the commercial sense — Uber Freight — while the ultimate demand base is the
    broader Uber Freight shipper network (SMB and enterprise shippers across CPG, retail, automotive, and industrial verticals).


    Volvo Trucks North America is a second category of relationship — an OEM vehicle partner — whose VNL Autonomous programme
    is production-intent but whose volume commitments are contingent on Waabi achieving driverless regulatory clearance. There
    are no publicly named direct enterprise shipper customers, no carrier customers, and no disclosed trials with logistics
    providers outside the Uber Freight umbrella. The absence of diversified customer relationships reflects Waabi''s deliberate
    asset-light distribution strategy, which trades customer diversification for speed to commercial deployment on a defined
    corridor.'
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  tableRefs:
  - TU001
  figureRefs:
  - FU001
  contentRequirementRefs:
  - 0
- id: adoption-trajectory
  title: Adoption Trajectory and Pilot Activity
  body: 'Waabi''s adoption trajectory is best measured in supervised autonomous miles accumulated rather than in revenue-generating
    loads or active customer accounts, as the company has not disclosed commercial load volumes or revenue. The company launched
    supervised pilots on Interstate 45 (Dallas-Houston corridor) in mid-2024 and expanded to Interstate 35 by early 2026,
    indicating geographic progress. Waabi''s Series C close (January 2026) and the announcement of the I-35 expansion are
    the most concrete public signals of operational momentum.


    No public data exists on cumulative miles driven, disengagement rate, number of loads completed, or fleet size. Competitors
    Aurora Innovation and Waymo Via have published more granular operational metrics (miles per intervention, fleet size,
    loads delivered), making Waabi''s adoption evidence comparatively thin. The Q4 2026 driverless launch target, if achieved,
    would mark the transition from supervised-pilot adoption to commercial-scale deployment. Until then, the adoption trajectory
    is credible but unverified by independent public evidence.'
  claimRefs:
  - CU006
  - CU007
  - CU008
  - CU009
  tableRefs:
  - TU002
  figureRefs:
  - FU002
  contentRequirementRefs:
  - 1
- id: named-customer-proof
  title: Named Customer Proof
  body: 'The primary named customer proof for Waabi is the Uber Freight 10-year partnership agreement, announced in June 2024,
    which is the most substantive commercial commitment in Waabi''s public record. Uber Freight confirmed the partnership
    in its own press release and has described the arrangement as a strategic multi-year supply agreement covering specific
    Interstate corridors. Volvo Trucks confirmed the VNL Autonomous OEM integration with Waabi in November 2024, representing
    a second tier of production-intent validation from a major industrial counterparty.


    No third-party shipper case studies, reference customers, or outcome metrics (loads delivered, transit time reduction,
    damage rate) have been published. The Uber Freight partnership is described in contract-level terms (10-year duration,
    specific corridors) but no per-load pricing, minimum volume commitments, or revenue guarantees have been disclosed. This
    leaves the quality of the named customer proof at the ''strategic announcement'' level rather than the ''production outcomes''
    level that institutional buyers would typically require. Wired, FreightWaves, and Reuters have covered the Waabi-Uber
    Freight relationship as credible but note the absence of outcome metrics as a transparency gap.'
  claimRefs:
  - CU010
  - CU011
  - CU012
  - CU013
  tableRefs:
  - TU003
  figureRefs:
  - FU003
  contentRequirementRefs:
  - 2
- id: retention-and-durability
  title: Retention, Durability, and Satisfaction
  body: 'Traditional SaaS retention metrics (NRR, GRR, logo churn) do not apply to Waabi''s current stage because the company
    has no multi-period revenue cohort from which retention can be calculated. The Uber Freight partnership is a 10-year supply
    agreement, which provides contractual durability at the channel level, but the exit clauses, performance SLAs, and termination
    triggers within that agreement have not been publicly disclosed. Satisfaction data from end shippers using Uber Freight''s
    autonomous freight offering is not independently available; Uber Freight''s own shipper NPS and reliability data are private.


    The structural retention risk is concentrated in a single counterparty: if Uber Freight exits the AV freight market, restructures
    under financial pressure, or exercises contract termination rights, Waabi loses its entire commercial channel with no
    immediate substitute. Uber Freight itself is a subsidiary of Uber Technologies, which has historically restructured its
    freight business; this creates a secondary parent-level concentration risk. Contract durability is further subject to
    the ''performance milestone'' conditionality typical of AV commercialisation agreements — if Waabi fails to achieve the
    Q4 2026 driverless milestone, the agreement''s commercial terms may be renegotiated.'
  claimRefs:
  - CU014
  - CU015
  - CU016
  - CU017
  tableRefs:
  - TU004
  figureRefs:
  - FU004
  contentRequirementRefs:
  - 3
- id: expansion-and-concentration-risk
  title: Expansion Potential and Concentration Risk
  body: 'Waabi''s customer concentration is extreme: one channel partner (Uber Freight) accounts for 100 percent of disclosed
    commercial mile activity. This concentration is a deliberate strategic choice — the Uber Freight partnership provides
    corridor access, shipper demand aggregation, and brand validation that would be difficult to replicate independently at
    this stage. However, it creates existential single-counterparty risk that institutional investors must weight heavily.


    Expansion pathways exist but are early-stage: (1) additional freight brokers or shippers could be added as direct channel
    partners post-driverless launch; (2) the OEM licensing model via Volvo VNL Autonomous could extend to other OEMs (Daimler,
    PACCAR) in 2027-2028; (3) Copilot4Science simulation licensing could serve robotics companies as a third expansion vector.
    None of these expansion pathways have confirmed commercial terms or named customers. The geographic expansion roadmap
    (Sun Belt Interstate corridors post-driverless) would expand the addressable shipper base but does not reduce single-partner
    concentration until a second fleet partner is signed. A hostile or distressed Uber Freight exit would leave Waabi with
    no customer revenue and would require 12-18 months to rebuild a commercial channel, creating a material going-concern
    risk during that window.'
  claimRefs:
  - CU018
  - CU019
  - CU020
  - CU021
  - CU022
  tableRefs:
  - TU005
  figureRefs: []
  contentRequirementRefs:
  - 4
