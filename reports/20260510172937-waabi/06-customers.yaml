  evidenceGaps:
  - type: missing-source
    severity: blocking
    topic: pilot-operational-metrics
    missingEvidence: Waabi has not disclosed cumulative pilot miles, loads delivered, fleet size, or disengagement rate for
      the I-45 and I-35 supervised pilots.
    whyItMatters: Without operational metrics, investors cannot assess whether supervised-pilot performance supports the driverless
      commercial case or whether the Uber Freight partnership is generating real demand.
    diligencePath: Request monthly operational reports (miles, loads, disengagement events) under NDA; cross-reference with
      Uber Freight operational data.
    relatedTableRefs:
    - TU002
  - type: private-evidence-only
    severity: blocking
    topic: uber-freight-contract-terms
    missingEvidence: Exit clauses, performance SLAs, minimum volume commitments, and termination triggers in the Uber Freight
      10-year agreement are not publicly disclosed.
    whyItMatters: Without contract terms, the 10-year agreement could be cancelled or renegotiated with minimal notice, eliminating
      Waabi's sole commercial channel.
    diligencePath: Obtain full Uber Freight supply agreement including exit provisions, performance milestones, and pricing
      schedule under NDA.
    relatedTableRefs:
    - TU004
  - type: missing-source
    severity: material
    topic: shipper-satisfaction
    missingEvidence: No independent shipper NPS, on-time delivery rate, or damage-per-load metric is available for Waabi autonomous
      trucking service.
    whyItMatters: Shipper satisfaction drives repeat usage and word-of-mouth adoption; without this data, the demand durability
      thesis cannot be validated.
    diligencePath: Request Uber Freight shipper satisfaction data for loads carried by Waabi trucks; interview reference shippers
      under NDA.
    relatedTableRefs:
    - TU003
  - type: missing-source
    severity: material
    topic: second-channel-partner
    missingEvidence: No second commercial channel partner has been announced; expansion beyond Uber Freight is entirely speculative
      as of May 2026.
    whyItMatters: Single-partner concentration cannot be mitigated until a second partner is signed; each month without a
      second partner increases the structural fragility of the revenue base.
    diligencePath: Ask management for a list of ongoing channel partner discussions and signed LOIs; benchmark against Aurora's
      multi-carrier approach.
  - type: private-evidence-only
    severity: minor
    topic: volvo-volume-commitments
    missingEvidence: Volvo Trucks production volume commitments and pricing terms for the VNL Autonomous programme have not
      been disclosed.
    whyItMatters: Without volume commitments, the Volvo OEM partnership could deliver minimal units, reducing the production-intent
      validation to a prototype agreement.
    diligencePath: Request Volvo OEM agreement with minimum volume schedules and milestone-based trigger conditions under
      NDA.
    relatedTableRefs:
    - TU001
