- id: moat-and-risks
  title: Moat Durability and Displacement Risk
  body: 'The durable competitive moats in autonomous trucking are: (1) accumulated
    real-world safety miles that establish regulatory credibility and actuarial insurance
    data; (2) exclusive or preferred OEM hardware partnerships that control vehicle
    supply; (3) deep integration with large-scale commercial freight networks; and
    (4) proprietary simulation capability that reduces the cost of generating training
    data. Aurora currently leads on moat (1) given its year-plus commercial operations.
    Waabi claims superiority on moat (4) through Waabi World but this has not been
    independently verified in terms of actual training efficiency. Torc leads on moat
    (2) through Daimler integration.

    Displacement risk for Waabi comes from multiple directions: (a) Aurora reaching
    sufficient scale and safety record to become the de facto standard that freight
    carriers anchor to, effectively locking out late entrants; (b) OEM-integrated
    autonomy from Daimler or Volvo commoditizing the AV stack into the truck, eliminating
    the need for an independent AV company; (c) Level 2+ systems like Plus.ai reaching
    sufficient automation that carriers delay Level 4 adoption indefinitely; and (d)
    a major technology company (Waymo, potentially a hyperscaler) entering trucking
    with superior AI resources.

    The most credible adverse scenario for Waabi''s competitive position is Aurora
    achieving a strong commercial safety record over the next 12–24 months on Uber
    Freight''s own lanes—the same lanes Waabi aims to operate—creating a bifurcation
    where Uber Freight selects Aurora as its primary provider if Waabi''s driverless
    launch continues to delay. This scenario has a plausible pathway given that Aurora
    already holds an Uber Freight commercial contract and began operations in April
    2024.

    '
