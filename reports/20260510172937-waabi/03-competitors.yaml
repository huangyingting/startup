callouts:
- calloutType: risk
  title: Aurora's Commercial Operations Create Compounding First-Mover Advantage
  body: 'Aurora Innovation launched commercial driverless operations on the Dallas-Houston
    corridor in April 2024—the same route Waabi targets for driverless deployment.
    Every month Aurora operates commercially, it accumulates safety miles, regulatory
    credibility, carrier relationship depth, and actuarial insurance data that Waabi
    does not. By May 2026, Aurora has over 13 months of commercial driverless data.
    If Waabi''s driverless launch continues to delay, Aurora''s first-mover safety
    dataset advantage becomes increasingly difficult to close. Freight carriers evaluating
    AV providers will rationally prefer the provider with a longer proven safety record,
    all else equal.

    '
  claimRefs:
  - CP008
  - CP009
  - CP012
  - CP013
- calloutType: risk
  title: Embark, Argo, and TuSimple Failures Are Adverse Evidence About Capital Risk
  body: 'Three well-funded autonomous trucking companies with credible teams have
    failed since 2022: Embark ($294M raised), Argo AI ($3.6B committed), and TuSimple
    ($1.35B raised). In each case the proximate failure was either capital withdrawal
    (Argo: Ford/VW pulled funding), SPAC funding depletion before revenue (Embark),
    or regulatory/governance crisis (TuSimple: national security investigation). Waabi''s
    survival requires sustained revenue or capital access before its runway expires.
    The pattern demonstrates that technology alone does not ensure survival—capital
    continuity and commercial milestone timing are equally critical.

    '
  claimRefs:
  - CP002
  - CP003
  - CP004
  - CP006
- calloutType: insight
  title: Volvo Trucks as Shared OEM Partner Creates Structural Tension
  body: 'Volvo Trucks is simultaneously Waabi''s primary OEM hardware partner and
    Aurora Innovation''s commercial OEM partner for specific European deployments.
    This shared OEM relationship creates a potential conflict: if Waabi''s driverless
    deployment continues to delay, Volvo may redirect engineering and production resources
    toward Aurora or its own Volvo Autonomous Solutions program. Conversely, Waabi''s
    deep Volvo partnership—including Volvo Group Venture Capital as an equity investor—creates
    alignment incentives that Aurora lacks. Diligence should clarify whether Waabi
    holds any exclusivity or preferred-supplier terms with Volvo Trucks for North
    American Class 8 autonomous applications.

    '
  claimRefs:
  - CP010
  - CP022
  - CP027
- calloutType: strength
  title: Simulation-First Approach Differentiates But Requires Empirical Validation
  body: 'Waabi''s Waabi World simulation platform is positioned as a core competitive
    moat: if training primarily in simulation is genuinely more data-efficient than
    accumulating real-world miles, Waabi can achieve comparable safety capability
    at a fraction of the capital cost of Aurora''s real-world miles approach. CEO
    Urtasun has publicly claimed 95% or more of Waabi Driver training occurs in simulation.
    However, no independent validation of this claim exists, and Aurora—with its real-world
    miles approach—has demonstrated commercial operations while Waabi has not. The
    simulation-first hypothesis is architecturally compelling but commercially unproven
    as of May 2026.

    '
  claimRefs:
  - CP021
  - CP025
  - CP026
- calloutType: recommendation
  title: Diligence Must Verify Exclusivity of Uber Freight and Volvo Partnerships
  body: 'Waabi''s competitive positioning depends critically on two partnerships—Uber
    Freight as commercial channel and Volvo Trucks as hardware supplier—that are also
    relationships held by Aurora Innovation. The diligence team must determine: (1)
    whether Waabi holds any exclusivity with Uber Freight for autonomous trucking
    capacity beyond its existing contractual lane; (2) whether Volvo''s investment
    in Waabi creates preferential supply or roadmap commitment; and (3) whether Uber
    Freight''s relationships with both Waabi and Aurora creates a conflict that could
    ultimately favor Aurora''s proven commercial service over Waabi''s delayed driverless
    launch.

    '
  claimRefs:
  - CP023
  - CP024
  - CP027
