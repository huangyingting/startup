  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: exclusivity
    missingEvidence: Contract terms between Waabi and Uber Freight and between Waabi
      and Volvo Trucks that would clarify exclusivity, preferred-supplier status,
      and minimum volume commitments.
    whyItMatters: If Aurora holds equally favorable or better terms with Uber Freight,
      Waabi's commercial channel differentiation is overstated; exclusivity would
      represent a durable competitive advantage.
    diligencePath: Request Waabi to provide commercial agreement summaries for Uber
      Freight and Volvo partnerships; specifically ask whether exclusivity exists
      on the I-45 corridor for Uber Freight loads.
    relatedQuestionRefs:
    - QP009
  - type: private-evidence-only
    severity: material
    topic: Aurora-commercial-miles
    missingEvidence: Precise count of commercial autonomous miles driven by Aurora
      since April 2024 and full disclosure of any safety incidents or disengagements.
    whyItMatters: The competitive gap between Aurora and Waabi on safety miles is
      the most critical factor in regulatory credibility; the actual gap size determines
      how difficult it is for Waabi to close.
    diligencePath: Review Aurora's public safety reports and FMCSA filings; request
      Aurora investor relations materials on cumulative miles; cross-reference quarterly
      press releases.
    relatedQuestionRefs:
    - QP011
  - type: missing-source
    severity: material
    topic: Aurora-burn-rate
    missingEvidence: Aurora Innovation's current quarterly cash burn rate and projected
      runway as of Q1 2026 from public filings.
    whyItMatters: If Aurora's burn rate is unsustainable, it may cease operations
      or accept an unfavorable acquisition before Waabi reaches commercial maturity,
      potentially opening the competitive field.
    diligencePath: Review Aurora's most recent 10-Q and 10-K SEC filings for operating
      cash flow, cash and equivalents, and management guidance on cash runway.
    relatedQuestionRefs:
    - QP014
  - type: missing-source
    severity: minor
    topic: Kodiak-DARPA
    missingEvidence: Specific dollar value, contract duration, and commercial freight
      implications of Kodiak's DARPA autonomous military logistics contracts.
    whyItMatters: DARPA contracts represent non-commercial revenue diversification
      that Waabi lacks; if material (e.g., $50M+), Kodiak has a longer runway than
      venture funding implies.
    diligencePath: Search DARPA public award database and Kodiak press releases; FOIA
      request if needed.
    relatedQuestionRefs:
    - QP016
  - type: missing-source
    severity: minor
    topic: Uber-Freight-channel
    missingEvidence: Total addressable Uber Freight freight volume on the I-45 Dallas-Houston
      corridor that Aurora and Waabi are competing for.
    whyItMatters: If total Uber Freight volume on the shared corridor is small, competitive
      tension between Aurora and Waabi for those loads is more acute than if the corridor
      supports multiple simultaneous AV deployments.
    diligencePath: Request Uber Freight commercial metrics for the I-45 corridor;
      cross-reference FreightWaves SONAR data on lane volumes.
    relatedQuestionRefs:
    - QP022
  - type: enumeration-incomplete
    severity: minor
    topic: competitive-landscape
    missingEvidence: International autonomous trucking competitors beyond Momenta
      and TuSimple, including Fabu Technology, WeRide Trucks, and EU-based programs.
    whyItMatters: Chinese and European AV trucking programs could enter the US market
      as regulatory frameworks evolve; their technology and capital depth is not fully
      captured.
    diligencePath: Conduct systematic review of Chinese AV trucking companies; review
      EU Horizon research for European AV truck development.
    relatedQuestionRefs:
    - QP025
