      - number: '5.3'
        title: Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Waabi's technology architecture is organized around a simulation-train-deploy loop that distinguishes it
              from every major competitor. At the top of the stack sits the commercial operations layer (Uber Freight
              API, fleet operator telemetry dashboard, route management). Below it is the Driver+ software stack
              comprising a planning and prediction module (end-to-end neural network, HD-map-free, trained entirely from
              Waabi World scenarios), a perception and sensor fusion module (processing Luminar Iris lidar, camera, and
              radar streams in real time), and the Waabi World simulator (feeding training data back into the stack).
              The compute layer runs on NVIDIA Drive Thor (2000 TOPS), executing inference with DriveOS and a safety
              monitor co-processor. Below compute sits the sensor hardware layer (Luminar Iris lidar at 250m range,
              8-camera array, radar array), and at the base is the Volvo VNL Autonomous platform providing redundant
              mechanical actuation (steering, braking, power). The HD-map-free architecture is an explicit technical
              choice: rather than relying on pre-built centimeter-level maps (as Waymo and earlier Aurora required),
              Driver+ builds a real-time environmental model from sensor data, making deployment on new corridors faster
              and more scalable. This design trades increased onboard compute demand for reduced infrastructure
              dependency. Waabi World's differentiable rendering pipeline enables gradient-based joint optimization of
              both the scenario generator and the AV policy — a technical approach validated in peer-reviewed
              publications (CVPR 2023, NeurIPS 2023) and protected by at least two USPTO patent filings
              (US20230131865A1, US20230059145A1). The primary architectural risks are the single-vendor compute
              dependency (NVIDIA Drive Thor), the simulation-to-reality gap (not independently validated), and the
              end-to-end neural network's interpretability challenges for safety case construction. The operating model
              routes field telemetry from trucks on I-10/I-20 back into Waabi World, creating a data flywheel where
              real-world edge cases discovered in operation can be injected back into the training simulator.
