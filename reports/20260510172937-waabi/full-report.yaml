  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: >-
              Waabi faces a tightly coupled set of risks spanning regulatory, operational, partner, financial, and
              execution dimensions. Unlike many technology startups where risks are diversifiable across a portfolio of
              customers, geographies, and revenue streams, Waabi's risks are interdependent and self-reinforcing. A
              regulatory delay extends the cash runway crisis; a cash runway crisis constrains the technical and
              commercial push needed for driverless launch; and a competitive gap with Aurora Innovation compounds
              investor confidence erosion. This interdependence means that any single risk dimension materializing at
              severity creates cascading exposure across others, making risk monitoring and defined kill criteria
              essential for any investor position in Waabi at this stage. The dominant risk is the FMCSA federal
              driverless exemption. Without a final federal rule or individual exemption permitting unattended Class 8
              truck operations on US interstate highways, Waabi cannot generate driverless revenue regardless of its
              technical readiness. As of May 2026 the FMCSA has published only an NPRM from 2023 with no final rule, and
              the rulemaking timeline has already slipped well beyond initial industry estimates. The second-tier risk
              cluster comprises the 100% commercial channel dependency on Uber Freight, an estimated $80-130 million
              annual burn rate, and an 18-24 month post-Series C cash runway converging on a Series D requirement in
              mid-2027. Aurora Innovation already generating driverless commercial revenue makes each month of Waabi
              delay incrementally more costly in competitive terms. The risk register in tables TR001 through TR005
              provides systematic coverage of each dimension with likelihood, severity, mitigation maturity, residual
              exposure, and recommended diligence actions. Figure FR001 visualizes the risk heatmap. Figures FR002 and
              FR003 show risk transmission and the critical dependency structure respectively.
