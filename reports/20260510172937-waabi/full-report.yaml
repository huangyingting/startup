      - number: '1.4'
        title: Milestones, Scale, and Operational Status
        blocks:
          - type: paragraph
            body: >
              Waabi has achieved a series of meaningful but not yet fully commercial milestones since its 2021 founding.
              In June 2021, the company launched publicly with an $83.5M Series A. In February 2022, it unveiled Waabi
              World—its closed-loop generative AI simulator. In September 2023, Waabi and Uber Freight launched the
              first autonomous truck commercial loads on the Dallas-to-Houston route in Texas (safety driver onboard),
              announcing a 10-year partnership to deploy "billions of miles" of autonomous capacity. In March 2024,
              Waabi and NVIDIA announced a partnership to use the NVIDIA Drive platform. In June 2024, Waabi raised
              $200M in its Series B, targeting driverless deployment by end of 2025. In February 2025, Waabi and Volvo
              Autonomous Solutions announced a strategic partnership to integrate the Waabi Driver into Volvo VNL
              Autonomous trucks. In August 2025, Lior Ron joined Waabi as COO. In October 2025, Waabi unveiled the
              production-ready Volvo VNL Autonomous truck at TechCrunch Disrupt. In January 2026, Waabi announced the
              $750M Series C plus $250M Uber investment and the exclusive robotaxi partnership.

              However, the fully driverless commercial launch—targeted for end of 2025—was delayed. CEO Urtasun
              acknowledged in January 2026 that the launch would occur "in the next few quarters," attributing the delay
              to OEM production validation timelines rather than technology gaps. This delay is significant since the
              driverless milestone is the primary commercial proof point for the investment thesis. As of the runDate
              (May 2026), no independent confirmation of a commercial driverless launch has been reported. Approximately
              300 employees were reported in early 2026 press coverage. Revenue and customer metrics are not publicly
              disclosed beyond Uber Freight as the primary commercial partner.
