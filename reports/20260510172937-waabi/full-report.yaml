chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Founding, and Mission
        blocks:
          - type: paragraph
            body: >
              Waabi Innovation Inc. is a private artificial intelligence company headquartered in Toronto, Ontario,
              Canada, with additional operations in San Francisco and Dallas, Texas. Founded in 2021 by Raquel Urtasun—a
              Spanish-Canadian computer scientist, University of Toronto professor, and former Chief Scientist at Uber's
              Advanced Technologies Group—Waabi was established with the conviction that autonomous vehicle technology
              required a fundamentally new AI-first approach distinct from the rule-based, sensor-heavy methods dominant
              in the industry. The company's name carries dual meaning: "she has vision" in Ojibwe and "simple" in
              Japanese, reflecting the founder's philosophy of building interpretable, generalizable AI rather than
              complex hand-coded systems.

              The corporate mission is to pioneer "Physical AI" for the real world, starting with autonomous trucking
              and expanding to robotaxis. Waabi's go-to-market model targets the $1 trillion North American freight
              market and, since January 2026, the global ride-hailing market via an exclusive robotaxi partnership with
              Uber deploying 25,000 or more robotaxis. The business model involves developing and licensing autonomous
              driving software (the Waabi Driver) integrated into purpose-built OEM vehicles (principally Volvo VNL
              Autonomous trucks), deploying this capacity via a driver-as-a-service model through logistics networks
              like Uber Freight, and selling trucks directly to carriers and shippers. Waabi positions itself as an "AV
              2.0" company that can achieve commercialization with fewer resources than legacy approaches thanks to its
              simulation-first training methodology through Waabi World.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: Leadership, Founders, and Governance
        blocks:
          - type: paragraph
            body: >
              Raquel Urtasun is the sole founder and CEO of Waabi. Born January 30, 1976 in Pamplona, Spain, she earned
              a PhD in computer science from EPFL (2006) and held postdoctoral positions at MIT and UC Berkeley. After
              serving as an assistant professor at the Toyota Technological Institute at Chicago (2009–2014), she joined
              the University of Toronto as a professor of computer science in 2014 and co-founded the Vector Institute
              for AI with Geoffrey Hinton in 2017. In May 2017, Uber recruited her to lead self-driving research as
              Chief Scientist of Uber ATG until January 2021, when she departed to found Waabi. Among her honors: Time
              100 Most Influential AI (2023), Order of Ontario (2024), Fellow of the Royal Society of Canada (2024),
              CNBC Changemakers (2024), and Fast Company AI 20 (2025). Urtasun is regarded as one of the preeminent AI
              scientists in autonomous vehicle technology globally.

              Lior Ron joined Waabi as Chief Operating Officer in August 2025, departing his role as CEO of Uber
              Freight. Ron co-founded autonomous trucking pioneer Otto, which Uber acquired in 2016, and overlapped with
              Urtasun at Uber, where he built Uber Freight from inception to $5 billion in revenue. He brings direct
              commercial trucking experience and key industry relationships. Ron retained the chairmanship of Uber
              Freight post-departure. Together, Urtasun and Ron represent a high founder-market-fit leadership team with
              deep roots in both AI and freight logistics, though this creates key-person concentration risk given that
              Urtasun is the sole founder with no identified internal successor.

              As a private company, Waabi does not publicly disclose its board composition or formal governance
              structure. Strategic investors—including Uber, Khosla Ventures, NVIDIA, and Volvo Group Venture
              Capital—are likely represented at the board or observer level, creating alignment between technology,
              capital, and commercial partners. No material governance adverse events (litigation, leadership disputes,
              regulatory actions) have been reported as of the runDate.
