      - number: '2.5'
        title: Regulatory Landscape and Market Timing
        blocks:
          - type: paragraph
            body: >
              The US regulatory framework for autonomous commercial vehicles remains fragmented as of May 2026. At the
              federal level, the Federal Motor Carrier Safety Administration holds jurisdiction over commercial vehicle
              safety but has not finalized a Level 4 autonomous trucking rule. FMCSA issued an Advance Notice of
              Proposed Rulemaking for autonomous commercial vehicles in 2023 and received extensive public comment, but
              rulemaking remains in progress. The NHTSA AV STEP (Automated Vehicle Exemption Program) allows
              case-by-case exemptions from specific Federal Motor Vehicle Safety Standards, which autonomous trucking
              companies use to operate driverless vehicles on specific permitted routes.

              At the state level, Texas has established the most permissive autonomous commercial vehicle framework in
              the US. Texas House Bill 1308 (enacted 2017) and subsequent legislation explicitly authorize autonomous
              commercial vehicles to operate on public roads without a human driver present, provided the automated
              driving system complies with applicable traffic laws. This legal clarity, combined with Texas's relatively
              benign weather, high freight density on the Dallas-Houston-San Antonio corridor, and large commercial
              vehicle population, makes Texas the de facto proving ground for US autonomous trucking—where Aurora,
              Waabi, Kodiak, and Torc have all conducted or are conducting commercial operations. California, Arizona,
              Florida, and Georgia have also enacted permissive AV frameworks. New York and Illinois maintain more
              restrictive approaches.

              Market timing analysis: The 2022–2023 wave of AV startup failures—Embark Trucks (shut down February 2023
              after SPAC failure), Argo AI (shut down October 2022), and TuSimple's suspension of US operations in
              2023—represents a shakeout of undercapitalized players but not a structural repudiation of the technology.
              Aurora Innovation's April 2024 commercial driverless launch on the Dallas-Houston corridor marks the
              industry's entry into the early-commercial phase. The 2024–2026 window is characterized by limited
              deployment on specific corridors, technology validation, and continued capital-raising to sustain
              pre-revenue operations. Broad commercial adoption—defined as 50 or more trucks across multiple
              operators—is estimated by analysts for 2026–2028 on favorable Sun Belt corridors, with national scale
              contingent on federal regulatory clarity projected no earlier than 2027–2030.
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
              - CM034
              - CM038
              - CM042
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural Driver Shortage Creates Durable Pull Demand
            body: >
              The 80,000-plus driver shortage—projected to reach 160,000 by 2031—combined with a $180,000–$200,000
              annual all-in driver cost is not a cyclical problem. Demographic trends (average driver age 46), lifestyle
              factors, and insufficient wage growth relative to working conditions make this shortage structural. Every
              carrier Waabi could approach faces this pressure simultaneously, creating demand pull rather than
              requiring Waabi to create a new market from scratch. This demand dynamic is significantly more favorable
              than markets where automation creates resistance from displaced incumbents.
            calloutType: strength
            claimRefs:
              - CM019
              - CM020
              - CM021
          - type: callout
            title: Texas Regulatory Environment Is a Structural Advantage
            body: >
              Texas HB 1308 and subsequent legislation provide Waabi, Aurora, and other AV companies with the clearest
              legal framework for driverless commercial truck operations in the US. Combined with Texas's favorable
              weather, the I-45 Dallas-Houston corridor is the highest-frequency lane for autonomous trucking proving
              grounds. Waabi's concentration in Texas is not merely geographic convenience—it reflects a rational
              strategy to operate where regulatory clarity reduces legal risk while accumulating the safety miles needed
              to support future federal rulemaking and eventual national expansion.
            calloutType: strength
            claimRefs:
              - CM028
              - CM029
              - CM035
          - type: callout
            title: Absence of Federal AV Trucking Framework Constrains National Scale
            body: >
              The US lacks a federal Level 4 autonomous commercial vehicle rule as of May 2026. FMCSA's 2023 ANPRM has
              not advanced to a Notice of Proposed Rulemaking, and federal rulemaking timelines typically span 3–5 years
              from ANPRM to final rule. This means national AV trucking scale—operating across all 50 states
              uniformly—is unlikely before 2028–2030 at the earliest. Any state that has not enacted permissive
              legislation becomes a barrier, requiring expensive route redesigns or political advocacy. For Waabi, this
              limits the addressable SAM to Sun Belt states for the foreseeable forecast period.
            calloutType: risk
            claimRefs:
              - CM027
              - CM033
              - CM034
          - type: callout
            title: Analyst Market Size Estimates Are Highly Divergent
            body: >
              Market size projections for autonomous trucking by 2030 range from $2.97 billion (Allied Market Research)
              to $21.6 billion (MarketsandMarkets) to $35 billion (Grand View Research high case), a more than 10x
              spread. This divergence—driven by differing definitions of scope, geographic coverage, hardware inclusion,
              and adoption timeline assumptions—means that any single market size citation in investor materials should
              be treated skeptically. Waabi should be prepared to defend its market opportunity using a bottom-up
              approach (freight ton-miles times per-mile AV rate) rather than top-down analyst market size claims.
            calloutType: risk
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM009
          - type: callout
            title: Freight-as-a-Service Is the Structurally Optimal Near-Term Model
            body: >
              The freight-as-a-service (FaaS) model—where Waabi owns or leases trucks and charges Uber Freight a
              per-mile fee—eliminates the capital risk barrier for carrier adoption while allowing Waabi to capture
              higher per-mile economics than a pure licensing royalty. However, this model requires Waabi to act as a
              quasi-carrier, taking on fleet ownership, maintenance, and insurance risk. The model is most viable with a
              large, digitally integrated freight broker like Uber Freight as the channel, which explains why Uber's
              dual role as investor and commercial partner is architecturally important to Waabi's go-to-market.
            calloutType: insight
            claimRefs:
              - CM015
              - CM016
              - CM014
          - type: callout
            title: Market Sizing Is Based on Analyst Reports and Bottom-Up Estimates
            body: >
              All market size figures in this chapter are sourced from publicly available analyst reports or independent
              diligence estimates. Waabi does not disclose addressable market calculations. Analyst figures differ
              significantly in scope and methodology; the diligence team has used conservative bottom-up estimates where
              possible. The Waabi SOM estimate of $50–$200M by 2028 is an independent calculation and has not been
              verified against internal Waabi projections.
            calloutType: assumption
            claimRefs:
              - CM010
              - CM011
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The autonomous trucking competitive landscape in 2026 has consolidated dramatically from its 2019–2021
              peak of ten-plus active US players to four primary surviving technology-stack companies: Aurora
              Innovation, Kodiak Robotics, Torc Robotics, and Waabi. A fifth category—Level 2+ autonomy providers—is
              represented by Plus.ai. OEM-integrated programs (Volvo Autonomous Solutions, PACCAR's autonomous
              development) represent a distinct incumbent threat from the hardware layer. Waymo Via (Google's autonomous
              trucking program) nominally exists but has made no material commercial progress in Class 8 operations.

              The three failed players—Embark Trucks (shut down February 2023 after SPAC proceeds depleted), Argo AI
              (shut down October 2022 when Ford and Volkswagen withdrew committed funding), and TuSimple (suspended US
              operations in 2023 following a national security investigation and data-sharing concerns with China-based
              affiliates)—provide critical adverse evidence about competitive dynamics. All three had raised substantial
              capital but failed to achieve sufficient commercial revenue before running out of runway. This pattern
              underscores that capital adequacy and commercial partnerships are as important as technology
              differentiation in this space.

              Adjacent competitors include: (1) Gatik, which focuses on middle-mile autonomous delivery in urban and
              suburban environments for Walmart and other shippers, in a distinct market segment from Waabi; (2)
              Outrider, which automates yard truck operations within logistics facilities; and (3) drayage automation
              startups focused on port and intermodal operations. These adjacents are unlikely to enter Waabi's
              long-haul market near-term due to distinct technology requirements. International competitors—China's
              Momenta, Fabu Technology, and the reconstituted TuSimple China entity—operate in a geographically
              separated regulatory environment.
