      - number: '4.3'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Waabi's unit economics combine a capital-intensive hardware layer with a high-margin software licensing
              opportunity at scale. At current 2025 production volumes, a fully-equipped L4 AV truck system costs an
              estimated $150,000 to $250,000 per vehicle, declining toward $50,000 to $80,000 at high-volume serial
              production. Against this, the annual human driver cost displaced is approximately $95,000 to $115,000
              fully-loaded per seat, while AV trucks can operate 22 to 24 hours per day versus a maximum of 11 regulated
              human hours, doubling effective annual miles per vehicle. At 50,000 revenue miles per year and $100,000 in
              annual driver cost savings, a $200,000 AV system breaks even in approximately four years before
              maintenance and depreciation. However, the supervised autonomy phase imposes an additional $50,000 to
              $80,000 per truck per year in safety driver costs that create deeply negative per-truck unit economics
              before driverless certification. Waabi's Copilot4Science simulation platform reduces physical test miles
              by approximately 70 percent, materially lowering the cost of the development phase relative to
              sensor-heavy competitors. Gross margin for the software licensing component at commercial scale is
              estimated at 60 to 80 percent. Waabi's total annual burn rate is estimated at $80 to $130 million, driven
              primarily by approximately 300 engineers at $180,000 fully-loaded per year ($54 million in payroll alone),
              plus hardware procurement, GPU compute, and physical testing infrastructure.
