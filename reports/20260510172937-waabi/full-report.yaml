      - number: '7.3'
        title: Operational and Quality Risk
        blocks:
          - type: paragraph
            body: >-
              Waabi's operational risk profile is shaped by three converging constraints — a single-corridor geographic
              concentration, hardware supply dependencies on two publicly traded companies with uncertain financial
              trajectories, and the systematic cost burden of safety drivers during the pre-driverless supervised phase.
              Operating exclusively on the Texas I-10 and I-20 corridor means that any permit suspension, safety
              incident, or extreme weather event affecting that specific corridor would halt 100% of commercial activity
              with no alternative route or backup operation available. This single-point-of-failure geography is a
              deliberate early-stage efficiency choice but creates acute operational fragility that compounds with each
              passing month before driverless launch. The lidar supply risk through Luminar Technologies is particularly
              notable. Luminar has posted operating losses in every year since its 2020 SPAC listing, and any financial
              distress or restructuring could interrupt supply of the Iris sensors Waabi depends on for long-range
              highway perception, with no disclosed alternative supplier available. NVIDIA Drive Thor is the sole
              onboard compute platform and no secondary compute solution has been announced, creating single-vendor
              dependency across all operational trucks. Safety driver costs during supervised operations consume capital
              at an estimated $80,000-$120,000 per driver per year, suppressing unit economics at precisely the stage
              where demonstration of commercial viability is most critical for the Series D narrative. No public safety
              incidents have been reported for Waabi's Texas operations through NHTSA or TxDOT databases as of May 2026,
              which is a positive operational signal, but no independent third-party safety audit has been published to
              corroborate the performance record or provide an independent safety assurance baseline. Table TR002
              provides the full operational risk register with failure modes, likelihoods, severities, and unresolved
