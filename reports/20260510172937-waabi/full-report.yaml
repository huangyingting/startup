  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >-
              Waabi's commercial product is Driver+, a SAE Level 4 autonomous trucking system purpose-built for North
              American long-haul freight. In customer workflow terms, a logistics shipper posts a freight load on the
              Uber Freight marketplace covering a 500-to-1,500-mile Interstate highway segment; Uber Freight's dispatch
              algorithm routes the load to a Waabi-operated Class 8 Volvo VNL Autonomous truck; the truck executes the
              highway run autonomously (with a safety driver aboard during the current supervised phase); and load
              delivery is confirmed with automated electronic logging device compliance and real-time telemetry reported
              back to the operator. The core customer value proposition is driver cost displacement (eliminating the
              $95,000-to-$115,000 annual cost of a CDL driver) combined with a 22-to-24-hour daily utilization rate
              versus the approximately 11 hours achievable under Hours of Service rules for human drivers. Waabi's
              operational design domain is deliberately narrow — highway-only, long-haul, Class 8, on defined Texas I-10
              and I-20 corridors — accepting a shorter ODD in exchange for a faster path to commercial driverlessness.
              The product does not currently serve urban last-mile delivery, pickup-and-delivery, or intermodal terminal
              operations. This ODD restriction is a deliberate architectural choice enabling earlier regulatory approval
              and higher operational predictability on repeatable Interstate segments, as opposed to full-geographic AV
              deployment. Waabi positions Driver+ as a Robotics-as-a-Service managed service in which the carrier does
              not own or maintain the AV system, reducing customer capex and adoption friction while concentrating
              hardware and operational risk on Waabi's balance sheet. Uber Freight is the sole commercial distribution
              channel and freight network for the current pilot, creating a deep channel dependency but eliminating the
              need for Waabi to build a direct enterprise sales team at this stage of deployment.
            claimRefs:
