              endorsement ("Waabi is unlocking real deployment") and Uber CEO Dara Khosrowshahi's partnership commitment
              provide senior validation of the approach. If the driverless launch succeeds in 2026 and the same model
              deploys robotaxis, Waabi will have empirically proven the dual-vertical capital efficiency thesis.
