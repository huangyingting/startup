      - number: '4.4'
        title: Capital Adequacy and Runway
        blocks:
          - type: paragraph
            body: >
              Waabi has raised approximately $1.28 billion total across all rounds as of January 2026, anchored by a
              $200 million Series C closed at a $3.0 billion pre-money valuation. The investor base includes Khosla
              Ventures, Union Square Ventures, and BDC Capital, providing a combination of deep-tech Silicon Valley
              capital and Canadian institutional support. Under a base-case burn of $100 million annually and assuming
              $200 million gross cash inflow from the Series C, the implied runway extends to approximately mid-2027 to
              late-2027, before any commercial revenue offsets. This runway estimate carries high uncertainty because
              Waabi's actual cash position and burn rate are not audited public data. No debt financing, project
              finance, or asset-backed credit facility has been publicly disclosed, consistent with a pre-commercial
              technology company whose bankable assets are limited. Non-dilutive capital from the Canadian NRC-IRAP
              program (approximately C$8 million) supplements the equity stack. The company will likely require a Series
              D or milestone-based financing facility by 2027 to 2028 if commercial revenue does not scale sufficiently
              to cover operating costs. Waabi's capital intensity is structurally higher than pure-software companies
              due to hardware procurement, physical testing infrastructure, and the GPU compute demands of
