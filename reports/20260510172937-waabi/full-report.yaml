      - number: '4.2'
        title: Pricing and Monetization
        blocks:
          - type: paragraph
            body: >
              Waabi's pricing strategy for its RaaS offering is not yet publicly confirmed, but the competitive and
              analyst context provides meaningful framing. Aurora Innovation—the only L4 trucking company operating
              commercially in the United States—has been charging $1 to $2 per mile for supervised AV freight service
              since its April 2024 commercial launch. This rate, reported by the Wall Street Journal, represents the
              lowest publicly observed L4 AV trucking price and reflects Aurora's strategic decision to grow volume
              before optimizing margin. Waabi targets the $2.50 to $4.00 per-mile range based on analyst models of
              minimum cost-recovery pricing, though this exact rate is an unconfirmed diligence gap. Waabi's GTM motion
              through Uber Freight creates a structural advantage in customer acquisition cost: the Uber Freight
              marketplace pre-aggregates carrier demand and load matching, meaning Waabi does not bear the cost of a
              direct enterprise sales team. Enterprise freight contract structures in the AV sector typically involve
              multi-year minimum volume commitments, a safety-driver phase pricing tier distinct from the driverless
              phase, and contractual adjustment provisions tied to regulatory milestones. Waabi's secondary OEM channel
              via Volvo Trucks routes purchasing decisions through truck buyers rather than logistics operators, further
              diversifying the revenue mix and creating an asset-light licensing tier alongside the operated RaaS model.
