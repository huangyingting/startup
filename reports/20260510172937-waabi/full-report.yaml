        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Waabi's customer structure is atypical for a technology company at this stage: rather than a direct
              shipper or carrier base, Waabi has a single commercial channel partner, Uber Freight, which books and
              dispatches freight loads on Waabi's behalf under a 10-year supply agreement. Shippers who place loads on
              the Uber Freight marketplace are the indirect end-users of the Waabi AV service, but they transact with
              Uber Freight, not with Waabi directly. This channel model means Waabi has effectively one customer of
              record in the commercial sense — Uber Freight — while the ultimate demand base is the broader Uber Freight
              shipper network (SMB and enterprise shippers across CPG, retail, automotive, and industrial verticals).


              Volvo Trucks North America is a second category of relationship — an OEM vehicle partner — whose VNL
              Autonomous programme is production-intent but whose volume commitments are contingent on Waabi achieving
              driverless regulatory clearance. There are no publicly named direct enterprise shipper customers, no
              carrier customers, and no disclosed trials with logistics providers outside the Uber Freight umbrella. The
              absence of diversified customer relationships reflects Waabi's deliberate asset-light distribution
              strategy, which trades customer diversification for speed to commercial deployment on a defined corridor.
