  - id: FE001
    title: Product architecture map
    type: stack
    layout: standard
    summary: >-
      Five-layer technology architecture of the Waabi Driver+ platform from fleet operations at the top to the Volvo VNL
      physical vehicle platform at the base, showing how each layer integrates with the layers above and below it.
    data:
      layers:
        - label: Commercial Operations Layer
          modules:
            - Uber Freight dispatch API (load matching and routing)
            - Fleet operator telemetry dashboard
            - Automated ELD compliance and route management
          note: Single commercial channel; 100% dependency on Uber Freight platform uptime
        - label: Waabi Driver+ Software Stack
          modules:
            - Planning and prediction module (end-to-end neural network, HD-map-free)
            - Perception and sensor fusion (lidar + camera + radar processing)
            - Waabi World simulator (training data generation feedback loop)
          note: Trained exclusively in Waabi World simulation; 100M+ simulated miles/day
        - label: NVIDIA Drive Thor Compute Layer
          modules:
            - Real-time inference engine (sub-100ms latency)
            - DriveOS runtime environment
            - Safety monitor co-processor
          note: 2000 TOPS; single-vendor NVIDIA dependency; DriveOS software support required
        - label: Sensor Hardware Layer
          modules:
            - Luminar Iris lidar (250m long-range detection)
            - 8-camera 360-degree array (forward and rear)
            - Radar array (all-weather backup detection)
          note: Luminar single-source lidar dependency; radar provides all-weather redundancy
        - label: Volvo VNL Autonomous Platform
          modules:
            - Redundant steering system (SAE Level 4 capable)
            - Redundant braking system (SAE Level 4 capable)
            - Power management and electrical redundancy
          note: Volvo provides hardware safety certification; volume commitment undisclosed
    approximationNotes: >-
      Architecture inferred from public technology descriptions, patent filings, and partner announcements. Internal
      component diagrams and API specifications are not publicly available.
