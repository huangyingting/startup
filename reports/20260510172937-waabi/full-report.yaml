      - number: '3.3'
        title: Kodiak Robotics, Torc Robotics, and Plus.ai
        blocks:
          - type: paragraph
            body: >
              Kodiak Robotics is the second-most directly comparable private competitor to Waabi. Kodiak was founded in
              2018 by former Uber ATG and Google executives, has raised approximately $300–$448M in total funding with
              Google Ventures as a lead investor, and deploys its Atlas AI stack on Kenworth T680 trucks on Texas
              freight corridors. Kodiak's key differentiators include DARPA contracts for autonomous military logistics
              (providing non-commercial revenue and government credibility), a focused Texas-only geographic discipline,
              and a partnership with Bridgestone for tire-sensor data integration. Kodiak has not yet launched
              commercial driverless operations but has conducted unmanned test runs.

              Torc Robotics presents a fundamentally different competitive model: it was acquired by Daimler Truck (now
              Mercedes-Benz Trucks) in 2019 and operates as an OEM-integrated autonomous trucking program. Torc's
              competitive advantage is deep integration with Daimler's Class 8 Freightliner Cascadia trucks,
              manufacturing relationships, dealer networks, and regulatory credibility from Daimler's century-old safety
              record. Torc is testing commercially in Virginia and New Mexico. The OEM-integration model means Torc
              could reach scale faster than pure-play AV companies if Daimler commits to commercial deployment, but it
              also means Torc's autonomy is constrained to Daimler's commercial decisions.

              Plus.ai takes a materially different market position: rather than Level 4 full autonomy, Plus.ai's
              SuperDrive system offers Level 2+ advanced driver assistance that operates commercially with a human
              safety driver present. Plus.ai has deployed SuperDrive commercially with Amazon, FedEx, and Chinese
              carriers across the US, China, and Europe. This approach is less technically ambitious but commercially
              validated at larger scale than any Level 4 competitor. Plus.ai's risk is that it is not a substitute for
              the driver shortage but a supplement—and commoditization pressure from OEM-integrated ADAS systems could
              erode its differentiation over time.
            claimRefs:
              - CP014
              - CP015
              - CP016
              - CP017
              - CP018
              - CP019
