            title: Commercial Traction and Financial Health Are Opaque
            body: >
              As a private company, Waabi does not disclose revenue, number of freight loads delivered, miles driven
              autonomously, safety incident rates, cash balance, burn rate, or any other operational or financial
              metrics. The diligence assessment of commercial traction relies entirely on stated partnerships (Uber
              Freight, Volvo) and press-reported milestones. Investors must treat all commercial progress claims as
              company-reported and unverified until independent data or regulatory filings become available. The Uber
