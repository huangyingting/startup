      - number: '4.5'
        title: Financial Gaps and Verdict
        blocks:
          - type: paragraph
            body: >
              Waabi presents a coherent and theoretically defensible revenue model—per-mile RaaS fees accessed through
              the Uber Freight channel—but remains entirely pre-revenue as of Q1 2026, with driverless commercial launch
              as the critical gate for first revenue recognition. The estimated burn of $80 to $130 million per year
              against an 18 to 24 month runway post-Series C creates a tight capital runway that allows limited room for
              commercial deployment delays. The principal financial risk is acute: a delay in driverless launch beyond
              Q4 2026 could compress the company's cash runway to 12 months or fewer before meaningful revenue
              materializes. The single largest revenue-side diligence gap is per-mile pricing power—if Waabi cannot
              sustain rates above Aurora's $1 to $2 market-clearing floor, the margin profile collapses. If commercial
              operations launch in Q4 2026 with an initial fleet of 20 to 50 trucks, first-year revenue could plausibly
              reach $5 million to $30 million depending on pricing and utilization. The most critical missing private
              financial metrics include audited 2025 financials, actual Q1 2026 cash balance and burn rate, confirmed
              per-mile pricing under the Uber Freight contract, and GPU compute and infrastructure cost disclosures. The
              financial verdict is: investable model pending commercial execution, but capital efficiency and launch
              timing are existential variables.
