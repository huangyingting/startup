          - type: callout
            title: Simulation-First Architecture Enables Dual-Vertical at Lower Capital Cost
            body: >
              Waabi's core architectural bet—a single end-to-end AI model trained primarily in simulation (Waabi World)
              that generalizes across vehicle types, geographies, and use cases—is being tested in practice with the
              January 2026 robotaxi expansion. Aurora's $3.46B capital base versus Waabi's $1.28B ($2.18B less)
