      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Aurora's Commercial Operations Create Compounding First-Mover Advantage
            body: >
              Aurora Innovation launched commercial driverless operations on the Dallas-Houston corridor in April
              2024—the same route Waabi targets for driverless deployment. Every month Aurora operates commercially, it
              accumulates safety miles, regulatory credibility, carrier relationship depth, and actuarial insurance data
              that Waabi does not. By May 2026, Aurora has over 13 months of commercial driverless data. If Waabi's
              driverless launch continues to delay, Aurora's first-mover safety dataset advantage becomes increasingly
              difficult to close. Freight carriers evaluating AV providers will rationally prefer the provider with a
              longer proven safety record, all else equal.
            calloutType: risk
            claimRefs:
              - CP008
              - CP009
              - CP012
              - CP013
          - type: callout
            title: Embark, Argo, and TuSimple Failures Are Adverse Evidence About Capital Risk
            body: >
              Three well-funded autonomous trucking companies with credible teams have failed since 2022: Embark ($294M
              raised), Argo AI ($3.6B committed), and TuSimple ($1.35B raised). In each case the proximate failure was
              either capital withdrawal (Argo: Ford/VW pulled funding), SPAC funding depletion before revenue (Embark),
              or regulatory/governance crisis (TuSimple: national security investigation). Waabi's survival requires
              sustained revenue or capital access before its runway expires. The pattern demonstrates that technology
              alone does not ensure survival—capital continuity and commercial milestone timing are equally critical.
            calloutType: risk
            claimRefs:
              - CP002
              - CP003
              - CP004
              - CP006
          - type: callout
            title: Volvo Trucks as Shared OEM Partner Creates Structural Tension
            body: >
              Volvo Trucks is simultaneously Waabi's primary OEM hardware partner and Aurora Innovation's commercial OEM
              partner for specific European deployments. This shared OEM relationship creates a potential conflict: if
              Waabi's driverless deployment continues to delay, Volvo may redirect engineering and production resources
              toward Aurora or its own Volvo Autonomous Solutions program. Conversely, Waabi's deep Volvo
              partnership—including Volvo Group Venture Capital as an equity investor—creates alignment incentives that
              Aurora lacks. Diligence should clarify whether Waabi holds any exclusivity or preferred-supplier terms
              with Volvo Trucks for North American Class 8 autonomous applications.
            calloutType: insight
            claimRefs:
              - CP010
              - CP022
              - CP027
          - type: callout
            title: Simulation-First Approach Differentiates But Requires Empirical Validation
            body: >
              Waabi's Waabi World simulation platform is positioned as a core competitive moat: if training primarily in
              simulation is genuinely more data-efficient than accumulating real-world miles, Waabi can achieve
              comparable safety capability at a fraction of the capital cost of Aurora's real-world miles approach. CEO
              Urtasun has publicly claimed 95% or more of Waabi Driver training occurs in simulation. However, no
              independent validation of this claim exists, and Aurora—with its real-world miles approach—has
              demonstrated commercial operations while Waabi has not. The simulation-first hypothesis is architecturally
              compelling but commercially unproven as of May 2026.
            calloutType: strength
            claimRefs:
              - CP021
              - CP025
              - CP026
          - type: callout
            title: Diligence Must Verify Exclusivity of Uber Freight and Volvo Partnerships
            body: >
              Waabi's competitive positioning depends critically on two partnerships—Uber Freight as commercial channel
              and Volvo Trucks as hardware supplier—that are also relationships held by Aurora Innovation. The diligence
              team must determine: (1) whether Waabi holds any exclusivity with Uber Freight for autonomous trucking
              capacity beyond its existing contractual lane; (2) whether Volvo's investment in Waabi creates
              preferential supply or roadmap commitment; and (3) whether Uber Freight's relationships with both Waabi
              and Aurora creates a conflict that could ultimately favor Aurora's proven commercial service over Waabi's
              delayed driverless launch.
            calloutType: recommendation
            claimRefs:
              - CP023
              - CP024
              - CP027
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >
              Waabi's revenue architecture is built on a Robotics-as-a-Service (RaaS) model in which fleet operators or
              logistics customers pay a per-mile fee to access the AV system as a managed service, without owning or
              maintaining the autonomous hardware. This model mirrors SaaS in that Waabi bears the capital expense of
              the AV stack and recovers it through per-mile fees over the life of each commercial agreement. The primary
              commercial channel is the 10-year Uber Freight partnership, which routes freight demand on the
              Dallas-Houston I-45 corridor and future expansion lanes directly to Waabi-operated trucks, eliminating the
              need for Waabi to build demand-side sales infrastructure. A secondary revenue stream exists through
              Waabi's OEM integration partnership with Volvo Trucks, which embeds the Waabi Driver in the VNL Autonomous
              series as a licensed software component, generating per-vehicle or subscription fees at commercial
              production volumes. As of Q1 2026, Waabi has not yet recognized commercial per-mile revenue, with the
              driverless launch milestone remaining the trigger for first commercial revenue recognition. Industry
              analyst estimates place commercially sustainable AV trucking per-mile rates at $2.50 to $4.00 per mile,
              compared to a fully-loaded human driver cost of $1.80 to $2.20 per mile, creating a theoretical premium
              pricing window.
            claimRefs:
