      - number: '1.5'
        title: Products, Competitive Position, and Key Risks
        blocks:
          - type: paragraph
            body: >
              Waabi's flagship product is the Waabi Driver—an end-to-end AI model that serves as the virtual driving
              system for autonomous trucks and, pending deployment, robotaxis. The Waabi Driver is trained and validated
              primarily through Waabi World, a closed-loop simulator that uses generative AI to create digital twins,
              synthesize infinite scenarios (including safety-critical edge cases), and teach the Driver to improve
              without human intervention. Mixed Reality Testing allows the Waabi Driver to operate on a physical test
              track while experiencing overlaid simulated environments. These technologies allow Waabi to claim
              capital-efficient development requiring fewer engineers and smaller real-world fleets than AV 1.0
              competitors. Waabi claims a 99.7% accuracy rate in matching real-world conditions in its simulator, though
              industry experts and regulators have expressed skepticism about whether simulation-only validation can
              substitute for real-world miles in safety certification.

              The company's dual-vertical strategy—autonomous trucking and robotaxis powered by a single shared AI
              model—is central to competitive positioning. Waabi asserts advances in one vertical improve performance in
              the other, creating a compounding learning advantage. Compared to primary competitor Aurora Innovation
              (which raised $3.46B, went public via SPAC, and launched a commercial driverless route in Texas in 2025
              before adding a human observer back), Waabi claims capital efficiency advantage. Kodiak Robotics ($448M
              raised) remains private and trucking-focused. TuSimple's collapse amid safety incidents and governance
              failures serves as a sector adverse data point.

              Key risks include: (1) Key-person concentration—Urtasun is the sole founder and a world-leading AI
              scientist; (2) Driverless launch delay—end-2025 target missed; (3) Revenue opacity—no commercial metrics
              disclosed; (4) Capital adequacy—further fundraising likely required; (5) Single commercial partner
              concentration—Uber is both investor and sole disclosed customer/channel; (6) Simulation-to-reality
              gap—regulators may require real-world miles for safety certification approval that Waabi's
              simulation-first approach cannot fully satisfy.
