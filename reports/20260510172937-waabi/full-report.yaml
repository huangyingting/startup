      - number: '5.5'
        title: Differentiation, Trust, Safety, and Compliance
        blocks:
          - type: paragraph
            body: >-
              Waabi's technology differentiation rests on three mutually reinforcing pillars. First, simulation depth:
              Waabi World generates over 100 million simulated miles per day using differentiable rendering and Gaussian
              splatting, a throughput figure that is orders of magnitude beyond what physical road testing can
              accumulate. Independent analysts (McKinsey, MIT Technology Review) assess Waabi's simulation capability as
              industry-leading among AV trucking companies. Second, HD-map-free operation: Driver+ does not require
              pre-built centimeter-level maps, reducing corridor expansion cost and enabling deployment on new routes
              without the map update cycle that constrains Waymo and comparable systems. Third, IP and team pedigree:
              Waabi holds 40-plus patents concentrated in generative simulation, differentiable rendering, and
              end-to-end neural network policy training, built by a research organization led by Raquel Urtasun
              (200-plus peer-reviewed publications, former Uber ATG chief scientist). However, the differentiation has
              limits. Aurora Innovation has already achieved driverless commercial operations, accumulating real-world
              driverless miles that provide a form of operational validation Waabi has not yet reached. The
              simulation-to-reality gap — whether Waabi World's synthetic scenarios translate reliably to robust
              driverless behavior — has not been independently validated. On trust, safety, and compliance, the
              diligence picture is incomplete. Waabi holds an active Texas DOT supervised operation permit (confirmed in
              TxDOT 2025 registry). However, FMCSA commercial driverless exemption has not been obtained. No public
              third-party safety audit, VSSA, or formal safety case has been published. ISO 26262 and SOTIF compliance
              are unconfirmed. The Volvo VNL platform provides hardware-level redundancy (redundant steering, braking,
              power management), but Waabi's software safety case has not been independently audited. No safety
              incidents have been identified in public TxDOT or NHTSA records through Q1 2026. However, the absence of a
              published VSSA or safety self-report creates an information asymmetry — investors and partners must rely
              on Waabi's voluntary disclosures rather than independent audit outputs.
