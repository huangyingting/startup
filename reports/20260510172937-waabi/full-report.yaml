      - number: '7.4'
        title: Partner, Dependency, and Financial Risk
        blocks:
          - type: paragraph
            body: >-
              Waabi's commercial structure is characterized by extreme concentration across all four dependency
              dimensions simultaneously — Uber Freight is the sole commercial channel, Volvo is the sole OEM vehicle
              partner, NVIDIA is the sole compute vendor, and Luminar is the sole lidar supplier. This quadruple
              single-point-of-failure structure is unusual even by pre-revenue startup standards and creates a supply
              chain fragility profile that requires systematic diligence. The Uber Freight dependency is the most acute
              because the 10-year supply agreement's minimum volume terms, SLA provisions, and termination triggers are
              entirely undisclosed. If Uber Freight exits the AV freight market or exercises contract termination
              rights, Waabi would have no commercial revenue and would require an estimated 12-18 months to rebuild an
              alternative commercial channel. The financial risk is tightly coupled to the partner structure. Waabi has
              no disclosed revenue, burns an estimated $80-130 million per year, and has an estimated 18-24 month
              post-Series C runway converging on a Series D financing requirement by mid-to-late 2027. KPMG and Morgan
              Stanley research both identify channel concentration and regulatory uncertainty as the two dominant
              investor diligence risks for AV trucking companies at this commercialization stage. Investor concentration
              is also elevated — Khosla Ventures, Uber, and NVIDIA as strategic investors have interests that may not
              perfectly align with independent commercial scaling, and NVIDIA's dual role as investor and sole compute
              supplier creates a governance conflict not addressed by any publicly disclosed board protections. Tables
              TR003 and TR004 provide the partner and execution risk registers. Figure FR003 maps the full dependency
              structure showing all critical single-point-of-failure relationships and how they connect to financing and
              commercialization outcomes.
            claimRefs:
