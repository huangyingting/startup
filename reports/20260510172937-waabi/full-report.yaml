      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Estimating the autonomous trucking market requires separating total freight spend from AV technology
              revenue, as no stable per-mile monetization benchmark exists at scale. Multiple sizing lenses produce
              materially different estimates; this chapter preserves the range rather than resolving it into a single
              figure. The broadest TAM—total US for-hire trucking revenue of approximately $920 billion—represents the
              theoretical maximum if all freight moved autonomously. A more operationally grounded TAM scoped to
              long-haul Class 8 truckload yields $400–$650 billion.

              For the autonomous technology layer specifically, analyst estimates span a wide range: MarketsandMarkets
              pegged the global autonomous truck market at $2.1 billion in 2024 and projects $21.6 billion by 2030,
              implying a 48.2% compound annual growth rate. Allied Market Research projected $2.97 billion by 2030 under
              a more conservative adoption scenario. Grand View Research estimated a range of $14–$35 billion by
              2030–2035 under varying regulatory and technology assumptions. These figures differ primarily in their
              assumptions about Level 4 adoption timelines, whether vehicle hardware costs are included, and the
              geographic scope (US-only vs. global). No single consensus estimate exists, representing a material
              evidence gap.

              Waabi's near-term SAM is best estimated as the portion of long-haul Class 8 freight that is geographically
              within Texas and Sun Belt corridors, high enough in volume to support dedicated autonomous deployment, and
              accessible via Waabi's Uber Freight commercial channel. Applying a 5% penetration rate on an estimated
              $150 billion Sun Belt long-haul sub-market by 2028 yields an approximate SAM of $7.5 billion. Waabi's SOM
              by 2028—based on current fleet scale, one commercial lane, and planned route expansion—is estimated at
              $50–$200 million in revenue at per-mile rates competitive with spot market pricing, representing less than
              0.1% of the broader TAM.
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM009
