      - number: '3.4'
        title: Capability, GTM, and Moat Comparison
        blocks:
          - type: paragraph
            body: >
              Comparing Waabi against Aurora on technology approach reveals the core strategic differentiation: Waabi
              employs an end-to-end generative AI model trained primarily in simulation (Waabi World), while Aurora uses
              a modular sensor-fusion pipeline with explicit perception, prediction, and planning modules. Waabi claims
              this enables faster capability improvement through synthetic data generation and better generalization
              across geographies. However, Aurora has demonstrated commercial driverless operations at scale for over
              one year, while Waabi has not yet achieved commercial driverless status as of May 2026—making Aurora's
              approach the empirically validated one at this stage.

              From a go-to-market perspective, Waabi's partnership with Uber Freight (as investor and commercial
              channel) and Volvo (as OEM hardware partner) is structurally similar to Aurora's partnerships with
              Werner/FedEx and Kenworth/Peterbilt. The key difference is Waabi's exclusive concentration on a single
              commercial channel (Uber Freight) versus Aurora's diversified carrier relationships. This creates higher
              near-term revenue concentration risk for Waabi but also deeper partnership commitment and potential for a
              more integrated commercial model.

              On distribution power and switching cost, both Waabi and Aurora face low carrier switching costs in the
              near term—freight carriers can engage multiple AV providers as the market develops. However, safety
              records and route-specific data accumulate into an asset that creates de facto lock-in over time, as a
              carrier's operations team becomes familiar with the AV system's behavior on specific lanes. OEM hardware
              partnerships (Waabi-Volvo, Aurora-Kenworth) create medium-term switching costs at the vehicle level. The
              moat for any AV company in this space is ultimately the safety miles dataset and commercial track record,
              which Aurora is currently building fastest.
