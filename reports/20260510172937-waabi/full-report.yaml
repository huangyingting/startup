      - number: '5.4'
        title: Deployment, Integration, Reliability, and Roadmap
        blocks:
          - type: paragraph
            body: >-
              Waabi's current deployment state as of Q1 2026 is supervised commercial pilot on Texas I-10 and I-20
              corridors with Class 8 Volvo VNL Autonomous trucks dispatched through Uber Freight. Safety drivers are
              present in all commercial operations. No public truck count, load volume, or disengagement rate data has
              been disclosed, making it impossible to independently assess operational reliability or utilization from
              public sources. The company launched its first Texas commercial pilot on I-45 (Dallas-Houston) in Q2 2023
              and expanded to I-10/I-20 (San Antonio-El Paso) in 2025. The integration with Uber Freight provides
              automated load matching and dispatch, but no public API documentation, service level agreement, or
              carrier-facing dashboard specification has been released. Reliability metrics (uptime, MTBF, disengagement
              frequency) are private. The most significant deployment event in the roadmap is the mid-2026 target for
              commercial driverless operations, which was originally targeted for end-2025 but slipped by approximately
              six months due to safety case completion delays and FMCSA regulatory engagement pace. Aurora Innovation
              achieved commercial driverless operations in April 2025, placing Aurora 12-plus months ahead of Waabi's
              revised driverless target. The driverless launch requires both completion of the Driver+ safety case and
              receipt of an FMCSA commercial driverless exemption — neither has been publicly confirmed as filed or
              approved as of Q1 2026. Following driverless launch, Waabi's roadmap envisions expansion to additional
              Southwest corridors, fleet scale-up through additional Volvo VNL Autonomous deliveries, and potential OEM
              white-label licensing of the Driver+ stack to additional truck manufacturers. The roadmap is heavily
              dependent on the mid-2026 launch milestone: delays beyond Q4 2026 would compress commercial revenue
              timelines to within 12 months of the estimated Series C runway endpoint, creating a compounding capital
              and competitive risk.
