  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis, Anti-Thesis, and Recommendation
        blocks:
          - type: paragraph
            body: >-
              Waabi's investment thesis is built on five interlocking pillars: (1) a simulation-first technical moat
              (Copilot4Science/UniSim) that reduces physical test miles by 70 percent relative to camera-plus-LiDAR
              competitors; (2) a 10-year supply agreement with Uber Freight as the commercial proof and revenue engine;
              (3) a certified OEM vehicle platform (Volvo VNL Autonomous) that eliminates the hardware integration risk
              that constrained first-generation AV startups; (4) a $1.28B Series C capital buffer sufficient to fund the
              supervised-to-driverless transition on most scenarios; and (5) a world-class founding team anchored by
              Raquel Urtasun, whose prior-art publication record and simulation-first IP position creates defensible
              differentiation. These five pillars compound: if the Q4 2026 driverless milestone is achieved on schedule,
              the thesis accelerates from venture to growth-equity on a single event horizon.


              The anti-thesis is equally structured: (1) the federal regulatory pathway for driverless Class 8 trucking
              does not exist and cannot be contractually guaranteed; (2) Uber Freight represents 100 percent of
              commercial mile access, creating existential concentration risk; (3) the simulation-to-real transfer
              problem has not been independently validated and is the industry's most contested technical claim; (4) a
              $3B pre-money valuation prices in Q4 2026 success and early fleet scale, leaving almost no margin of
              safety for delay; and (5) Raquel Urtasun's concentration of technical credibility and IP creates
              key-person risk that no COO hire fully resolves.


              Recommendation: Conditional buy at current valuation ($3B pre-money) for long-duration,
              high-risk-tolerance investors with portfolio diversification to absorb bear-case write-off. Confidence:
              medium. Milestone gating is essential: tranche release should be conditional on Q4 2026 driverless launch,
              Uber Freight revenue ramp confirmation, and NVIDIA supply security.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
          - type: table
            tableRef: TV001
            claimRefs:
              - CV001
              - CV002
          - type: table
            tableRef: TV002
