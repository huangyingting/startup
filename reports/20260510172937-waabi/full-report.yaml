              - CV003
              - CV004
          - type: figure
            figureRef: FV001
            claimRefs:
              - CV001
              - CV003
      - number: '8.2'
        title: Financing Context, Entry Discipline, and Dilution Overhang
        blocks:
          - type: paragraph
            body: >-
              Waabi has raised $1.28B across Series A through C as of January 2026, with a $3B pre-money Series C
              valuation implying a post-money of approximately $3.5-4B. Investors in the Series C include strategic and
              financial investors not publicly disclosed in detail; the presence of Canadian institutional capital and
              technology-sector crossover funds is consistent with the round size. The $3B pre-money prices in: (a)
              successful Q4 2026 driverless launch, (b) Uber Freight revenue ramp to $50-100M ARR by end-2027, and (c)
              Volvo OEM fleet deployment beginning 2028. Entry discipline at this valuation is binary: if the driverless
              milestone slips by 12+ months, the $3B valuation will likely need to be reset at a flat or down round,
              implying dilution risk for Series C investors.


              Dilution overhang analysis: Waabi has raised $1.28B total. Assuming standard VC preference structures (1x
              non-participating), liquidation preference exposure at Series C is manageable if exit valuation exceeds
              $4B. Below that threshold, preference overhang begins to compress common and employee equity. For a
              strategic acquirer at a $5B exit, returns to Series C investors would be approximately 40-50 percent of
              exit value after waterfall. At a $10B exit (base case), returns to Series C investors would be 65-70
              percent of exit value. Public market exit would require driverless fleet deployment at meaningful scale
              (200+ trucks, $100M+ ARR) to sustain an AV premium multiple.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV010
              - CV015
              - CV016
      - number: '8.3'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >-
              The bull case requires three events occurring in sequence: (1) Q4 2026 driverless launch on schedule with
              zero significant incidents; (2) Uber Freight rapid ramp to 100+ trucks and 10M+ miles in 2027; and (3)
              Volvo production ramp beginning 2028. In this scenario, Waabi achieves $400-600M in RaaS revenue by 2028,
              supporting a 15-20x revenue multiple and an implied exit valuation of $6-12B. On the primary market in
              2028-2029 at scale, a 30-50x ARR exit is plausible if AV trucking achieves mainstream institutional
              acceptance, implying a $15-25B valuation.


              The base case assumes: (1) Q1-Q2 2027 driverless launch (1-2 quarter delay); (2) Uber Freight ramp to
              50-100 trucks by end-2027; and (3) Volvo production commitment confirmed but production beginning
              2028-2029. In this scenario, Waabi achieves $150-300M ARR by end-2028 and exits at 25-40x ARR, implying an
              $8-15B valuation. Series C investors at $3B entry would achieve approximately 2.5-5x MOIC over a 7-year
              hold, consistent with a 20-30 percent IRR.


              The bear case assumes: (1) 2028+ driverless launch (12-18 month delay); (2) Uber Freight limited ramp or
              renegotiated terms; and (3) Volvo production timeline extended. In this scenario, Waabi's extended
              supervised-pilot burn forces a bridge round at or below the $3B valuation; Series C investors face
              dilution and potential preference erosion. Exit valuation of $2-5B (1-1.7x revenue at $150M ARR) implies a
              0-0.7x MOIC for Series C investors, representing a substantial loss relative to opportunity cost.
            claimRefs:
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
          - type: table
            tableRef: TV003
            claimRefs:
              - CV010
              - CV011
              - CV012
          - type: figure
            figureRef: FV002
            claimRefs:
              - CV010
              - CV011
              - CV012
      - number: '8.4'
        title: Comparable Set and Valuation Benchmarks
        blocks:
          - type: paragraph
            body: >-
              Valuation comparables for Waabi fall into three categories: (1) public AV trucking companies at various
              lifecycle stages; (2) private AV trucking rounds at comparable milestones; and (3) logistics-automation
              M&A transactions. Aurora Innovation (NASDAQ: AUR) provides the most direct public comparable: Aurora
              completed its driverless commercial launch in April 2025 with NVIDIA backing and Uber Freight and FedEx as
              customers. Aurora's market capitalisation has ranged from $800M to $2.5B in 2025-2026, implying a
              significant discount to its private round peak of $13B. The Embark Trucks SPAC failure ($5B implied
              valuation at announcement, near-zero at delisting) establishes a cautionary data point for pre-commercial
              AV trucking. Plus.ai's Chinese market pivot and Torc Robotics' acquisition by Daimler Truck at an
              undisclosed valuation establish strategic acquisition as a plausible Waabi exit path.


              The $3B Waabi pre-money valuation represents a 1.5-2x premium to Aurora's current public market valuation
              at comparable commercial stage. This premium is justified if Waabi's simulation-first approach delivers a
              structurally lower cost-to-autonomy than Aurora's physical-mile-heavy method. If Aurora's EBITDA margin at
              commercial scale provides a template, Waabi's long-run margin target of 50-60 percent on RaaS
              (post-driverless) is plausible but not proven.
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
          - type: table
            tableRef: TV004
            claimRefs:
              - CV015
              - CV016
              - CV017
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV006
              - CV007
      - number: '8.5'
        title: Exit Readiness, Thesis-Break Triggers, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Exit readiness analysis: Waabi is unlikely to pursue an IPO before the driverless milestone and at least
              12 months of post-driverless revenue data. The earliest plausible public market window is 2028-2029 at
              $200M+ ARR run-rate and demonstrated unit economics at scale. Strategic acquisition by an OEM (Volvo,
              Daimler, PACCAR), a logistics conglomerate (XPO, J.B. Hunt, Werner), or a technology platform (Amazon,
              Alphabet) is the most likely near-term exit path if the thesis holds. Uber's right-of-first-refusal or
              strategic option embedded in the 10-year supply agreement, if any, would be a critical diligence ask.


              Thesis-break triggers that should stop additional investment: (a) federal moratorium on driverless
              trucking; (b) Uber Freight suspension of AV programme; (c) fatal driverless incident in the launch window;
              (d) NVIDIA supply disruption lasting 6+ months; (e) Raquel Urtasun departure before driverless milestone.
              Monitoring triggers that should prompt tranche hold: (a) Q4 2026 driverless launch missed without credible
              recovery plan; (b) disengagement rate above 1 per 1,000 miles in supervised pilots; (c) Uber Freight load
              utilisation below 80 percent of committed capacity.


              Final diligence asks: (1) internal safety gate criteria and current vs. target metrics; (2) Uber Freight
              supply agreement exit clauses and pricing schedule; (3) NVIDIA supply contract and multi-year allocation
              terms; (4) cap table and option pool dilution schedule; (5) Series C liquidation preference and
              pay-to-play provisions; (6) Voluntary Safety Self-Assessment draft; (7) monthly burn and runway model
              under three scenarios.
            claimRefs:
              - CV020
              - CV021
              - CV022
              - CV023
