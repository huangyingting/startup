  - id: section-milestones
    title: Milestone Timeline
    body: >
      Tamara's trajectory from founding to unicorn status spans approximately four years,
      marked by rapid geographic and product expansion alongside successive funding rounds.
      The company launched commercial operations in Saudi Arabia in Q3 2020, entering a
      market that at that time lacked formal BNPL regulation — SAMA introduced its BNPL
      regulatory framework in 2021, providing the legal foundation for Tamara's fully
      licensed operations and establishing it as one of the first compliant operators
      in the Kingdom.

      The September 2021 Series A ($110M) marked Tamara's first major institutional
      funding milestone, followed closely by a $150M Series B in January 2022. Geographic
      expansion followed, with Tamara entering the UAE approximately in 2022 and Bahrain
      in 2023, establishing a three-market GCC presence. The launch of the Smart premium
      membership product represented a significant product diversification milestone,
      adding a subscription revenue stream alongside the core merchant-fee model.

      The August 2024 Series C extension ($340M) was the defining milestone, conferring
      unicorn status at a $1B+ valuation and cementing Tamara as Saudi Arabia's leading
      BNPL platform. The simultaneous achievements of 10 million+ shoppers and 30,000+
      merchant partners in 2024 demonstrate the scale attained. The issuance and
      formalization of SAMA license 95/A Sh/202502 with registered capital of SAR 515M
      represents regulatory maturation and capital adequacy recognition, positioning
      Tamara for potential IPO consideration or further regional expansion in the
      medium term.
