  - id: section-funding
    title: Funding History and Capital Structure
    body: >
      Tamara has raised approximately $400 million in equity funding across three rounds
      between 2021 and 2024, culminating in unicorn status in August 2024 at a $1 billion+
      valuation. The company's capital formation reflects progressive validation from both
      international institutional investors and Saudi government-linked funds, signalling
      strong strategic alignment with Saudi Vision 2030 financial sector development goals.

      The Series A ($110M, September 2021) was co-led by Checkout.com and included Coatue
      Management, Endeavor Catalyst, and Shorooq Partners — providing both fintech-industry
      validation and MENA-specific geographic expertise. The Series B ($150M, January 2022)
      was led by Sanabil Investments (a Saudi Aramco-affiliated sovereign investment vehicle)
      with participation from SNB Capital (Saudi National Bank's investment arm) and Colony
      Capital, reflecting deep Saudi institutional commitment. The Series C extension ($340M,
      August 2024), again backed by Sanabil Investments and Colony Capital alongside Goldman
      Sachs, confirmed unicorn status and positioned Tamara for further regional expansion
      and product development.

      Formally, Tamara Finance Company holds registered capital of SAR 515,000,000 per its
      SAMA-regulated balance sheet as disclosed in official legal filings. This capital base
      underpins its lending and credit operations and satisfies regulatory capital adequacy
      requirements. The concentration of Saudi government-affiliated investors (Sanabil/Aramco,
      SNB Capital) is both a strategic asset — providing regulatory goodwill and network access
      — and a potential governance consideration that warrants independent diligence on
      voting rights and protective provisions.
