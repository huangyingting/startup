chapter:
  number: 1
  title: Company Overview
  summary: >-
    Tamara Finance Company is Saudi Arabia's leading Buy Now Pay Later (BNPL) and payments
    platform, operating across KSA, UAE, and Bahrain with 10 million+ registered shoppers
    and 30,000+ merchant partners. Founded in Q3 2020, certified Sharia-compliant, and
    SAMA-licensed, Tamara achieved unicorn status in August 2024 following a $340M Series C
    extension at a $1B+ valuation, bringing total equity raised to approximately $400M.

sections:
  - id: section-identity
    title: Identity and Business Model
    body: >
      Tamara Finance Company (full legal name, joint-stock Saudi company) is the leading
      shopping and payments platform in the Gulf Cooperation Council (GCC) region. Founded
      in Q3 2020 and headquartered in Riyadh, Saudi Arabia, Tamara operates a
      Sharia-compliant Buy Now Pay Later (BNPL) platform available in Saudi Arabia, the
      United Arab Emirates, and Bahrain. The company holds SAMA (Saudi Central Bank) license
      number 95/A Sh/202502 with a registered capital of SAR 515,000,000 (approximately USD
      137 million), Commercial Registration No. 1010627663, and Unified No. 7016874419.

      Tamara's core product suite spans flexible consumer payment options: Pay in Full,
      Split in 2, Split in 3, Split in 4, and Pay in up to 24 months — all structured
      without interest or late fees, consistent with Islamic finance principles certified
      by the Shariyah Review Bureau. Beyond its installment products, Tamara offers a
      "Smart" premium membership (SAR 19/month, free for the first month) that provides
      cashback rewards and exclusive shopping benefits, diversifying its revenue model
      beyond merchant transaction fees alone.

      The platform operates both online (e-commerce API integration) and in-store
      (point-of-sale), making it accessible across digital and physical merchant channels.
      Tamara's stated mission is "to empower people in their daily lives and revolutionize
      how they shop, pay, and bank." With 24/7 transaction monitoring and security
      infrastructure, Tamara positions itself as a trusted financial services partner
      for both consumers and merchants across a rapidly growing regional BNPL market.
