  - id: section-scale
    title: Company Scale and Key Metrics
    body: >
      As of 2024, Tamara serves more than 10 million registered shoppers across its
      three-market footprint (Saudi Arabia, UAE, and Bahrain), and has onboarded over
      30,000 merchant partners. This merchant network includes major regional and
      international brands such as IKEA Saudi Arabia, Jarir Bookstore, SHEIN, Al-Othaim,
      H&M, L'Oréal, LEGO, Puma, The Luxury Closet, and Ounass — demonstrating strong
      adoption across consumer electronics, fashion, home goods, and luxury categories.

      Saudi Arabia represents the dominant market by consumer base and transaction volume,
      where Tamara was among the first licensed BNPL operators following SAMA's introduction
      of a formal BNPL regulatory framework in 2021. The platform supports both online
      (API and e-commerce plugin) and in-store (POS) transactions, broadening total
      addressable merchant coverage. Tamara's developer documentation infrastructure
      at docs.tamara.co supports direct API integration for enterprise merchants.

      Revenue-generating mechanisms include the merchant transaction fee model (merchants
      pay Tamara per successful BNPL transaction at checkout) and the Smart premium
      subscription (SAR 19/month after a free first month) offering consumers cashback
      and rewards. The dual revenue model reduces dependence on any single monetization
      mechanism. Key metrics disclosed publicly are limited to shopper and merchant counts;
      financial performance data including GMV, revenue, and profitability remain undisclosed
      as Tamara is a private company, representing a significant due diligence gap for
      prospective investors.
    claimRefs:
      - CO032
