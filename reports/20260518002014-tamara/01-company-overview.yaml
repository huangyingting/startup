  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financials
      missingEvidence: >-
        Tamara has not disclosed revenue, gross merchandise volume (GMV), net income,
        or unit economics as a private company. No audited financials are publicly
        available.
      whyItMatters: >-
        Without financial performance data, it is impossible to assess Tamara's path
        to profitability, unit economics, or whether its funded capital is sufficient
        for sustainable operations — standard BNPL investor diligence requirements.
      diligencePath: >-
        Request audited financial statements, management accounts, GMV data, and
        cohort-level revenue metrics in a VDR or via direct data request to management.
      relatedQuestionRefs: [QO021, QO022, QO027]

    - type: private-evidence-only
      severity: material
      topic: credit-risk
      missingEvidence: >-
        Tamara has not publicly disclosed credit loss rates, default rates, receivables
        aging schedules, or underwriting methodology details. No vintage cohort data
        is publicly available.
      whyItMatters: >-
        BNPL business models carry inherent consumer credit risk; default rates and
        credit loss ratios are primary determinants of long-term unit economics and
        capital adequacy sufficiency. This is a core diligence gap for any prospective
        investor in a BNPL company.
      diligencePath: >-
        Request vintage-level default cohort data, credit bureau integration
        documentation, underwriting scorecard details, and stress-test scenarios
        in the data room.
      relatedQuestionRefs: [QO028]

    - type: enumeration-incomplete
      severity: minor
      topic: leadership and founder table — board composition and full C-suite roster not public
      missingEvidence: >-
        Tamara's full board of directors composition, independent director information,
        and C-suite roles beyond the three co-founders are not publicly disclosed.
      whyItMatters: >-
        Governance quality and key-person risk cannot be fully assessed without knowing
        the board composition, independent oversight, and whether post-Series C investors
        have board representation.
      diligencePath: >-
        Request articles of association, board minutes, and full organizational chart
        through the data room; confirm investor board seat rights with Sanabil and
        Goldman Sachs.
      relatedTableRefs: [TO002]

    - type: enumeration-incomplete
      severity: minor
      topic: stakeholder or investor map — per-investor allocation and governance rights undisclosed
      missingEvidence: >-
        Individual investor allocations per round, voting rights, anti-dilution provisions,
        liquidation preferences, and board seat assignments for each investor are not
        publicly disclosed.
      whyItMatters: >-
        Understanding control structure, liquidation waterfall, and governance rights
        is essential for any investor evaluating economic and protective rights in
        a Series D or acquisition scenario.
      diligencePath: >-
        Request shareholder register, term sheets, and shareholders agreement through
        the data room.
      relatedTableRefs: [TO003]

    - type: enumeration-incomplete
      severity: minor
      topic: milestone table — internal and unannounced operational milestones not captured
      missingEvidence: >-
        Internal product launches, team growth milestones, operational achievements,
        and adverse events (e.g., credit incidents, regulatory correspondence) not
        publicly announced may be absent from the milestone timeline.
      whyItMatters: >-
        A complete milestone record enables trend analysis and adverse event detection
        that is currently impossible with only public-source milestones.
      diligencePath: >-
        Request a management-compiled company timeline, board pack history, and any
        regulatory correspondence log through the data room.
      relatedTableRefs: [TO004]
