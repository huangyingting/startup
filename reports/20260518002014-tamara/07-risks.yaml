  - id: section-mitigation-kill-criteria
    title: Mitigation Framework and Kill Criteria
    body: >-
      Tamara's risk mitigation framework rests on five principal pillars: (1) regulatory
      alignment via active SAMA licence maintenance and Sharia-compliance certification by
      the Shariyah Review Bureau, which pre-empts consumer protection enforcement by design
      through the zero-interest, zero-late-fee model; (2) capital buffer from SAR 515M
      registered capital and $340M Series C extension proceeds available for credit loss
      absorption or regulatory capital top-ups; (3) merchant network breadth of 30,000+
      partners, providing GMV resilience against single-merchant churn; (4) three-jurisdiction
      geographic diversification across KSA, UAE, and Bahrain, partially mitigating
      single-market regulatory risk; and (5) the merchant zero-liability model — Tamara
      absorbs all credit and fraud risk — which structurally reduces merchant-switching
      friction and reinforces platform stickiness versus bank alternatives.

      Regulatory risk mitigation is strengthened by Tamara's product structure alignment
      with SAMA consumer protection intent. However, this alignment does not extend to
      prudential capital requirements, which SAMA can adjust independently of product
      design. The BIS global convergence trend toward prudential BNPL regulation suggests
      increasing capital pressure in the medium term across multiple GCC jurisdictions.
      Credit risk mitigation relies on inferred mechanisms: automated credit decisioning
      using national ID and payment history data, auto-debit repayment mechanics reducing
      willful non-payment, and progressive credit limit increases tied to repayment
      performance — none of which are independently verifiable from public sources.

      Competitive risk mitigation is limited by Tamara's structural scale disadvantage
      versus Tabby. The primary competitive moats are Sharia-compliance certification
      (a credentialing barrier for non-Islamic BNPL models) and KSA-market depth (an
      established merchant and regulatory relationship barrier). The GCC BNPL market's
      early-stage growth profile provides room for both players to grow in absolute terms,
      reducing the urgency of zero-sum share competition in the near term. However, the
      compounding network effect gap represents a medium-term strategic threat if Tamara's
      growth rate does not narrow the Tabby user and merchant scale gap.

      Kill criteria define the conditions under which the investment thesis for Tamara would
      be materially impaired. SAMA licence revocation or formal suspension is the highest-
      severity kill criterion — it would halt KSA operations entirely. A consumer default
      rate spike causing capital inadequacy without accessible funding within six months
      would create an existential credit crisis. Simultaneous loss of the top-3 merchant
      relationships is estimated to reduce GMV by 15–30% based on typical BNPL merchant
      concentration dynamics. CEO departure without named successor within 90 days would
      disrupt investor narrative and governance stability. A material data breach affecting
      500,000+ consumers with a PDPL sanction would cause reputational damage likely
      irreversible at scale. Tabby crossing 50M users without proportional Tamara growth
      would signal irreversible network effect disadvantage. Table TR005 provides the full
      kill criteria framework with monitoring indicators and assessment guidance for each.
    claimRefs:
      - CR035
      - CR036
      - CR037
      - CR038
