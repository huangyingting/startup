    notes: >-
      Kill criteria thresholds are qualitative assessments defined by the diligence team based
      on standard BNPL platform risk frameworks and the specific risk profile of Tamara as
      a SAMA-licensed, KSA-headquartered BNPL unicorn. Monitoring indicators are limited to
      publicly available signals; private data room access would enable more precise
      early-warning monitoring. The SAR 515M registered capital and $340M Series C proceeds
      are the primary financial cushions against credit and regulatory capital risks. All
      probability estimates are qualitative; formal probability-weighted kill criteria models
      would require undisclosed financial and operational data from Tamara. The regulatory
      kill criterion is the highest severity as it admits no recovery path while operational.
