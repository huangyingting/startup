  evidenceGaps:
    - type: private-evidence-only
      severity: moderate
      topic: sama-licence-conditions-and-compliance-details
      missingEvidence: >-
        SAMA's full BNPL regulatory framework conditions specific to Tamara's licence class
        (95/A Sh/202502) are not publicly available as of May 2026. The specific capital
        adequacy thresholds, minimum liquidity requirements, consumer protection conduct
        obligations, reporting frequencies, and any licence conditions imposed at the time
        of grant are contained in private regulatory correspondence between SAMA and Tamara
        that is not accessible from public sources.
      whyItMatters: >-
        Without the specific licence conditions, it is impossible to assess whether Tamara
        is in full compliance with all SAMA-imposed obligations, what capital buffer headroom
        exists relative to the SAMA minimum, and whether any conditions restrict Tamara's
        product design, geographic expansion, or credit facility structure in ways not
        observable externally.
      diligencePath: >-
        Request copy of SAMA licence grant letter and all subsequent amendments; confirm
        capital adequacy threshold applicable to Tamara's licence class; request latest
        SAMA compliance self-assessment submission and any SAMA examination reports received.
      relatedQuestionRefs: [QR004]
      relatedTableRefs: [TR001]

    - type: private-evidence-only
      severity: material
      topic: credit-quality-and-default-rate
      missingEvidence: >-
        Tamara has not disclosed any consumer default rate, NPL ratio, credit loss provision,
        or ECL methodology in any public document as of May 2026. This is the single most
        material evidence gap in the risk chapter: without credit quality data, capital
        adequacy, provisioning adequacy, and the overall health of the lending book cannot
        be independently assessed.
      whyItMatters: >-
        Default rate is the primary driver of credit loss, capital adequacy pressure, and
        potential SAMA regulatory intervention. A hidden deterioration in credit quality —
        unobservable from public sources — represents a latent financial risk that could
        surface suddenly in a stress scenario, triggering an emergency capital raise or
        forcing a SAMA-mandated remediation plan.
      diligencePath: >-
        Request NPL ratio by product (Split in 3/4 vs 24-month); ECL provision as percentage
        of outstanding receivables; 30-day, 60-day, and 90-day delinquency rates by cohort
        vintage; write-off history; and comparison to SAMA minimum required provision ratios.
      relatedQuestionRefs: [QR006, QR007, QR009, QR028]

    - type: private-evidence-only
      severity: material
      topic: capital-adequacy-and-lending-book-size
      missingEvidence: >-
        Tamara's total outstanding BNPL receivables (lending book size) are not publicly
        disclosed. Without this figure, the SAR 515M capital-to-receivables ratio cannot
        be calculated and SAMA capital adequacy compliance cannot be independently confirmed.
        Annual GMV is also undisclosed, preventing estimation of receivable balances.
      whyItMatters: >-
        Capital adequacy is directly linked to both SAMA licence maintenance and the
        capacity to absorb credit losses. If the lending book leverage ratio is high
        relative to peers, a moderate default rate increase could create a regulatory
        capital breach requiring emergency equity without prior public warning.
      diligencePath: >-
        Request outstanding BNPL receivables balance by product; capital adequacy ratio
        relative to SAMA minimum; facility utilisation rates; and any SAMA capital
        adequacy correspondence.
      relatedQuestionRefs: [QR007, QR028]

    - type: private-evidence-only
      severity: material
      topic: cybersecurity-certification-and-incident-history
      missingEvidence: >-
        No ISO 27001 certification, SOC 2 Type II report, PCI DSS compliance certificate,
        or third-party security audit has been confirmed for Tamara from public sources as
        of May 2026. No incident history (outages, breaches, fraud events) is publicly
        disclosed. The security page (tamara.co/en/security) references controls at a
        high level without third-party attestation.
      whyItMatters: >-
        Tamara holds extremely sensitive data for 10 million+ consumers including national
        IDs and financial account details. A security breach at this scale would trigger
        PDPL enforcement, SAMA regulatory action, and consumer trust damage that could
        be irreversible. The absence of third-party security certifications means the
        adequacy of Tamara's security controls cannot be independently confirmed.
      diligencePath: >-
        Request ISO 27001 or equivalent certification; most recent SOC 2 Type II report;
        PCI DSS compliance attestation; penetration test results from last 12 months;
        incident log with resolution documentation; and BCP/DR test records.
      relatedQuestionRefs: [QR019, QR022, QR023]

    - type: private-evidence-only
      severity: moderate
      topic: banking-credit-facility-terms
      missingEvidence: >-
        Tamara's banking credit facility partners, facility sizes, interest rate structures,
        maturity profiles, and covenant terms are not publicly disclosed as of May 2026.
        This prevents independent assessment of funding cost structure, SAIBOR rate
        sensitivity, refinancing risk, and the potential for covenant breach under a
        credit stress scenario.
      whyItMatters: >-
        Credit facility terms directly determine Tamara's cost of funds and the conditions
        under which lenders could accelerate repayment or restrict drawdowns. A covenant
        breach during a credit quality deterioration could trigger a funding crisis at the
        worst possible time, amplifying the credit risk scenario.
      diligencePath: >-
        Request term sheets or summaries of all credit facility agreements; total committed
        and drawn facility amounts; pricing margins over SAIBOR; financial covenants
        applicable; maturity schedule and refinancing requirements.
      relatedQuestionRefs: [QR008, QR028]
