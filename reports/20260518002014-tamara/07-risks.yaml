  - id: FR002
    title: Risk transmission map
    type: dag
    layout: standard
    summary: >-
      Directed acyclic graph showing how Tamara's primary shock origination events transmit
      through intermediate risk nodes to terminal outcomes. Two primary shock sources are
      identified: macro/oil shock (which drives rising defaults and funding cost increases)
      and competitive loss to Tabby (which drives valuation pressure directly). Both chains
      converge on capital pressure, with regulatory tightening acting as an independent
      amplifier. The terminal node is valuation decline, representing unicorn status threat
      and potential down-round financing risk. All edges represent causal transmission
      pathways with medium-to-high confidence based on BNPL platform risk research.
    data:
      nodes:
        - id: macro_shock
          label: Macro / Oil shock
          detail: "GCC economic downturn or sustained oil price decline below Saudi fiscal breakeven"
          tone: warning
        - id: default_rise
          label: Rising defaults
          detail: "Consumer inability to repay BNPL installments; NPL rate increase"
          tone: warning
        - id: funding_risk
          label: Funding cost rise
          detail: "SAIBOR-linked credit facility cost increase; compression of net margin"
          tone: warning
        - id: regulatory_tightening
          label: Regulatory tightening
          detail: "SAMA raises capital requirements or restricts product design"
          tone: warning
        - id: capital_pressure
          label: Capital pressure
          detail: "SAMA capital adequacy squeeze; potential emergency equity raise required"
          tone: warning
        - id: competitive_loss
          label: Merchant and user loss to Tabby
          detail: "Tabby network effect advantage attracts merchants and consumers away from Tamara"
          tone: warning
        - id: valuation_impact
