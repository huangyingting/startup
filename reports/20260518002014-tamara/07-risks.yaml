  - id: section-credit-financial
    title: Credit and Financial Risks
    body: >-
      Tamara's primary financial risk is consumer credit default — the inability or
      unwillingness of installment borrowers to repay their BNPL obligations on schedule.
      Tamara targets underserved consumer segments including younger consumers with limited
      credit history and those without traditional bank relationships, who carry structurally
      higher credit risk than established bank borrowers. The complete absence of any public
      disclosure of default rates, non-performing loan ratios, or expected credit loss
      provisioning as of May 2026 makes independent credit risk assessment impossible from
      public sources alone. Tamara is the only GCC BNPL unicorn that has not disclosed any
      credit quality indicator.

      BNPL platforms globally have experienced rising default rates during economic downturns
      and rising interest rate environments; the GCC BNPL market is exposed to identical
      credit cycle dynamics. Tamara's 24-month installment product carries materially longer
      credit exposure duration than its core Split in 3 and Split in 4 products, requiring
      different provisioning methodology and higher capital allocation against longer-tenor
      receivables. Moody's credit research on GCC financial institutions highlights the
      cyclical vulnerability of consumer credit portfolios in commodity-export economies
      to oil price shocks — a pattern applicable to Tamara's BNPL lending book.

      Capital adequacy risk is compounded by opacity in leverage. The SAR 515M registered
      capital supports a lending book whose total size is not disclosed; if the leverage
      ratio is material (as is typical for growth-stage BNPL platforms), a moderate default
      rate increase could create capital adequacy pressure relative to SAMA minimum
      requirements. Tamara's banking credit facilities are sensitive to SAIBOR-linked
      interest rate movements; a rise in facility costs would compress net interest margin.
      Fitch Ratings notes that GCC BNPL platforms face increasing capital adequacy scrutiny
      as lending volumes scale, with capital-to-receivables ratio becoming a key factor for
      platforms seeking debt market access.

      Foreign exchange risk arises from USD-denominated equity funding against
      SAR-denominated revenue operations. While the SAR/USD peg has been stable since 1986,
      peg adjustment risk remains a tail scenario. Tabby, as the larger and better-capitalised
      competitor at $4.5B valuation, likely accesses funding at lower cost, creating a
      structural funding cost disadvantage for Tamara that may compound as Tabby's scale
      advantage widens. The IMF projects positive Saudi Arabia GDP growth in 2026–2027
      supported by non-oil sector development under Vision 2030, providing a near-term
      macroeconomic mitigant; however, sustained oil prices below GCC fiscal breakeven
      levels would compress consumer incomes and increase BNPL default risk materially.
