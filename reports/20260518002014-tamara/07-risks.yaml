    - id: QR004
      question: "What specific consumer protection obligations and capital requirements does SAMA's 2021 BNPL framework impose on Tamara's licence class?"
      type: enumeration
      targets: [contentRequirements/0]
      status: unresolved
      evidenceGap: >-
        SAMA's full BNPL regulatory framework conditions and Tamara-specific licence obligations
        are not publicly disclosed in detail. SAMA's website confirms the regulatory framework
        exists but the full licence conditions, capital ratios, and conduct requirements
        applicable to Tamara's specific licence (95/A Sh/202502) are not publicly available
        as of May 2026.

    - id: QR005
      question: "Could Saudi Vision 2030 fintech regulations introduce new compliance obligations for BNPL operators in 2026?"
      type: mechanism
      targets: [contentRequirements/0]
      status: answered

    - id: QR006
      question: "What is Tamara's disclosed consumer default rate or non-performing loan ratio as of 2026?"
      type: quantification
      targets: [contentRequirements/1]
      status: unresolved
      evidenceGap: >-
        Tamara has not disclosed any consumer default rate, NPL ratio, credit loss provision,
        or expected credit loss methodology in any public document as of May 2026. As a
        private company, Tamara has no public credit rating or regulatory filing obligation
        to publish this data. This is the most material single evidence gap in the credit
        risk assessment.

    - id: QR007
      question: "How does Tamara's SAR 515M registered capital compare to its total lending book size as of 2026?"
      type: quantification
      targets: [contentRequirements/1]
      status: unresolved
      evidenceGap: >-
        Tamara's total lending book size (outstanding BNPL receivables) is not publicly
        disclosed. Without this figure, the capital-to-receivables ratio cannot be calculated.
        Annual GMV and average loan tenor are both undisclosed, preventing estimation of
        outstanding receivables from public data alone.

    - id: QR008
      question: "What are the terms, rates, and facility sizes of Tamara's banking credit lines as of 2026?"
      type: quantification
      targets: [contentRequirements/1]
      status: unresolved
      evidenceGap: >-
        Tamara's banking credit facility partners, facility sizes, interest rate structures,
        and covenant terms are not publicly disclosed. This prevents independent assessment
        of Tamara's funding cost structure and SAIBOR rate sensitivity.

    - id: QR009
      question: "What expected credit loss provisioning methodology does Tamara use for its BNPL receivables book?"
      type: mechanism
      targets: [contentRequirements/1]
      status: unresolved
      evidenceGap: >-
        Tamara has not disclosed its credit loss provisioning methodology, ECL model
        parameters, or provision coverage ratios in any public document as of May 2026.
        This prevents assessment of whether provisions are adequate relative to the risk
        profile of the lending book, particularly for the 24-month instalment product.

