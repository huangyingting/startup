figures:
  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Risk heatmap mapping 9 key Tamara risk items across probability (Low/Medium/High) and
      impact (Low/Medium/High) dimensions. The highest-severity quadrant — High Probability
      × High Impact — contains regulatory tightening by SAMA, reflecting its active BNPL
      oversight mandate and established precedent of framework evolution. Credit default
      spike sits at Medium Probability × High Impact, reflecting its macroeconomic
      dependence and undisclosed provisioning status. Tabby's competitive pressure is High
      Probability × Medium Impact, a persistent but not immediately existential threat.
      Data breach and platform outage occupy Low Probability × High/Critical Impact,
      representing low-frequency but severe tail risks.
    data:
      columns: [Low Impact, Medium Impact, High Impact]
      rows:
        - label: "Low Probability"
          values: ["Vision 2030 open banking mandate", "FX / SAR peg stress; global BNPL market entry", "Platform outage (peak period); data breach with PDPL sanction"]
        - label: "Medium Probability"
          values: ["Merchant integration errors", "Merchant churn to Tabby; staff turnover (non-founder)", "BNPL default rate spike; funding cost rise (SAIBOR)"]
        - label: "High Probability"
          values: ["API minor security findings", "Competitive pressure from Tabby network effect", "Regulatory tightening by SAMA; SIMAH credit reporting mandate"]
