  - id: FR003
    title: Dependency map
    type: dag
    layout: standard
    summary: >-
      Directed acyclic graph mapping Tamara's operational dependencies and failure propagation
      paths from upstream infrastructure to downstream GMV output. The SAMA operating licence
      is the highest-criticality single dependency — its revocation halts all KSA operations
      regardless of technology or capital status. Banking credit facilities, payment rails,
      and cloud infrastructure are parallel upstream dependencies of the Tamara platform core.
      The platform serves two downstream layers: 30,000+ merchant integrations and 10M+
      consumer accounts, both of which drive the transaction GMV output node. Failure of any
      upstream node propagates downward through the platform to affect merchant and consumer
      availability and ultimately GMV.
    data:
      nodes:
        - id: sama_licence
          label: SAMA Operating Licence
          detail: "Licence 95/A Sh/202502 — required for all KSA BNPL operations"
          tone: warning
        - id: banking_facilities
          label: Banking Credit Facilities
          detail: "Undisclosed banking partners providing BNPL lending credit lines"
          tone: neutral
        - id: payment_rails
          label: Payment Rails (Mada / Visa / MC)
          detail: "Core transaction processing and settlement infrastructure"
          tone: neutral
        - id: cloud_infra
          label: Cloud Infrastructure
          detail: "Platform hosting and data storage; provider undisclosed publicly"
          tone: neutral
        - id: tamara_platform
          label: Tamara Platform Core
          detail: "BNPL API engine, credit decisioning system, and consumer app"
          tone: positive
        - id: merchant_integrations
          label: 30,000+ Merchant Integrations
          detail: "API connections powering merchant checkout BNPL across e-commerce and POS"
          tone: positive
        - id: consumer_layer
          label: 10M+ Consumer Accounts
          detail: "Registered shoppers transacting via merchant checkout and Tamara app"
          tone: positive
        - id: gmv_output
          label: Transaction GMV
          detail: "Undisclosed total; Tamara's primary revenue driver via merchant MDR"
          tone: positive
      edges:
        - from: sama_licence
          to: tamara_platform
        - from: banking_facilities
          to: tamara_platform
        - from: payment_rails
          to: tamara_platform
        - from: cloud_infra
          to: tamara_platform
        - from: tamara_platform
          to: merchant_integrations
        - from: tamara_platform
          to: consumer_layer
        - from: merchant_integrations
          to: gmv_output
        - from: consumer_layer
          to: gmv_output
