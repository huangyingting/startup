  researchQuestions:
    - id: QR001
      question: "What are the current SAMA BNPL licensing requirements and capital thresholds applicable to Tamara as of 2026?"
      type: quantification
      targets: [contentRequirements/0]
      status: answered

    - id: QR002
      question: "What cross-border regulatory licences does Tamara hold for its UAE and Bahrain operations as of 2026?"
