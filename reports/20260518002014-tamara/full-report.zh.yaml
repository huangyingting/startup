      - number: '8.4'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: >-
              可比估值分析采用四家参考公司：Tabby（GCC 直接可比）、Klarna（全球 BNPL 龙头，IPO 阶段）、Affirm（美国公开 BNPL 公司，NASDAQ: AFRM）和 SplitIt（小市值公开
              BNPL 公司）。这四家公司合起来，从规模、地域和商业模式维度给出 BNPL 平台定价区间，并为当前公允价值范围和各情景下的隐含退出倍数提供参照。

              Tabby 是最相关的可比公司。作为在 Saudi Arabia 和 UAE 运营、持有 SAMA 牌照且采用相同 Sharia 合规模型的 BNPL 运营商，Tabby 的指标设定了 GCC 市场愿意为主导
              BNPL 平台支付的上限。在 $4.5B 估值、25M 注册用户和 $17B+ 年化交易量下，Tabby 对应每注册用户 $180 和约 0.26× GMV。将这些倍数套用到 Tamara，并因 #2
              市场位置和用户规模小 2.5× 施加 40–55% 规模折价，得到 $810M–$1.35B 的可比调整区间——覆盖 $1B 独角兽价格，但相对当前进入价上行有限。

              Klarna 提供全球规模参照。以约 $14.6B 估值（反映截至 mid-2025 的 pre-IPO 与 IPO 区间报道）、85M+ 用户和 $80B+ GMV 计算，Klarna 对应每用户 $172
              和约 0.18× GMV。Klarna 偏重美国的地域结构和非 Sharia 模型限制了直接可比性，但其利润率画像和收入倍数为 BNPL 板块分布的上沿提供参考。Klarna 的 IPO 轨迹也为 Tamara
              在 Goldman Sachs 协助下的退出路径提供了可行模板；不过 Saudi Arabia 国内资本市场深度不足，难以承接 Tamara 当前规模的 fintech 上市。

              Affirm（NASDAQ: AFRM）提供公开市场校验，但规模显著不同。按交易状况不同，Affirm 市值在 $8–12B 区间，年度 GMV $80B+，收入约 $2B，对应公开市场 4–6×
              收入倍数——相比 2021 年 BNPL 估值中常见的 10–15× 私募市场倍数，压缩明显。Affirm 数据点说明，未来 Tamara 若 IPO，公开市场很可能给出比当前 Series C
              私募标记更保守的倍数，给退出估值造成结构性逆风。SplitIt 市值约 ~$100M，代表 BNPL 分布的尾部，用于确认规模不足平台的 BNPL 倍数压缩底部。

              混合来看，四套可比框架（GMV 倍数、收入倍数、用户估值和可比调整）给出 Tamara $700M–$1.1B 的中枢估计，$1B 独角兽估值大约位于混合区间的第 60
              百分位。这与偏高的估值立场一致：当前价格可以辩护，但并不舒服；只要估计 GMV、收入或可比倍数下修，中枢估计就会迅速跌破独角兽门槛。
