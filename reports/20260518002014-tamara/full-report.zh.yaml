        - 未公开确认；可能为零或打包
        - 未披露；行业惯例通常是在启动规模阶段由 MDR 吸收入驻成本
        - 近期很小或为零；若推出高级商户服务，有上行空间
        - 确认是否收取单独的集成费、API 费或 SLA 层级费用；索取商户服务条款
      - - 数据分析 / 推荐 / 交叉销售
        - 未来可能通过消费者购买数据变现、商户推荐佣金或金融产品交叉销售（保险、信贷）产生收入
        - 推测性；截至 2026 年无已确认产品
