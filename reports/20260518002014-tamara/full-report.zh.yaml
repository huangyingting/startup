      - number: '5.2'
        title: 技术架构与开发者平台
        blocks:
          - type: paragraph
            body: >-
              Tamara 的技术基础设施按 API 优先平台设计，为商户提供四种主要接入方式：直接 API 集成（REST API）、店内结账（POS 终端集成）、可嵌入 Widgets（商户网站 UI
              组件），以及覆盖主流电商平台的预构建插件生态。docs.tamara.co 的开发者门户提供完整 API 参考、集成指南和带沙盒环境的测试指南。沙盒环境允许商户在上线前端到端测试 BNPL 流程，这是支付 API
              平台的标准做法，可以减少集成错误并加快商户上线。

              Merchant Portal 可通过面向商户的仪表盘访问，支持商户管理交易、查看客户订单历史，并处理退货和退款。这套自助运营工具降低商户支持负担，也为平台上 30,000+ 商户提供运营透明度。通过 POS
              终端接入线下门店，把 Tamara 的触达从电商渠道延伸到实体零售；相对纯线上 BNPL 提供商，这是一个差异点，对沙特阿拉伯仍然可观的线下零售客流尤其重要。

              核心平台逻辑围绕实时信贷决策构建，必须在结账时近实时评估消费者信用并批准或拒绝 BNPL
              交易。这要求数据分析和风险评分引擎能够处理消费者交易历史、行为信号和第三方数据输入，并实现亚秒级决策延迟。具体的信用评分方法、特征集、模型架构和数据合作伙伴并未公开披露。基于 API
              驱动集成的规模以及实时决策要求，可以推断平台基础设施是云原生的（可能托管在 AWS 或 Microsoft Azure 等主要超大规模云厂商上），但 Tamara 尚未公开确认其云服务商或基础设施架构。

              技术栈还延伸到 iOS 和 Android 上以移动端优先的消费者 UX；面向消费者的文档确认了应用商店存在。与沙特和 GCC 银行基础设施的支付轨道集成，支撑了结算能力，因为商户会从 Tamara
              处预先收到全额购买价。checkout.com 在 Series A 中投资，暗示 Tamara 与一家全球领先收单和支付处理平台关系紧密，可能影响其收单、结算和银行卡处理基础设施。
