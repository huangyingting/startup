      - number: '6.4'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >-
              Tamara 的地理扩张遵循顺序推进、一次一个市场的模式：上线于沙特阿拉伯（2020 年 Q3），随后进入
              UAE，再进入巴林。按消费者数量和交易量看，沙特阿拉伯仍是主导市场，也形成单一监管辖区内的结构性收入集中风险。SAMA 对沙特业务的监管意味着 KSA 的监管变化——包括 BNPL 框架修订、MDR
              上限或资本充足性调整——相较更地理多元化的运营商，会不成比例地影响 Tamara 业务。

              30,000+ 商户基础没有按商户收入贡献公开拆分。全球 BNPL 平台通常会在前 20–50 名商户中出现有意义的收入集中，尤其当企业品牌（IKEA、SHEIN、H&M）的交易量相对长尾 SME
              商户不成比例时。Tamara 没有披露是否有单一商户贡献超过 10% GMV。商户收入集中风险无法通过公开来源解决，是关键私有证据尽调问题。

              消费者侧没有公开数据说明 Tamara 的消费分布——尤其是按交易频率或客单价排名前十分位消费者是否贡献了不成比例的
              GMV；在消费者金融科技中，重度用户驱动超额经济性是常见模式。消费者在沙特阿拉伯的地理集中，放大了上文提到的单一市场监管风险。

              Tamara 在消费者侧的落地后扩张机制通过 Smart 订阅层级运作：参与度更高的消费者被激励升级到 Smart，从而在交易型 MDR 分成经济性之外提高单个消费者收入。商户侧，Tamara 的 API 与
              POS 集成深度在部署后制造切换摩擦，支撑商户留存；但同一商户部署多个 BNPL 提供商很常见，限制了结账独家性。未来扩张机会包括更多 GCC 市场（科威特、卡塔尔、埃及）、现有市场更深入的线下 POS
              渗透，以及进入旅行和服务等 BNPL 采用仍处早期但正在增长的品类。
