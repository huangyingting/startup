      - number: '1.4'
        title: 公司规模与关键指标
        blocks:
          - type: paragraph
            body: >
              截至 2024 年，Tamara 在三大市场（沙特阿拉伯、阿联酋和巴林）服务 10 million+ 注册购物用户，并接入 30,000+ 商户合作伙伴。商户网络包括 IKEA Saudi
              Arabia、Jarir Bookstore、SHEIN、Al-Othaim、H&M、L'Oréal、LEGO、Puma、The Luxury Closet 和 Ounass
              等区域与国际大品牌，显示其在消费电子、时尚、家居和奢侈品等品类获得了强劲采用。

              沙特阿拉伯是消费者基础和交易量上的主导市场。SAMA 在 2021 年推出正式 BNPL 监管框架后，Tamara 是首批获牌 BNPL 运营商之一。平台支持线上（API
              和电商插件）与线下（POS）交易，扩大了可触达商户总盘子。Tamara 位于 docs.tamara.co 的开发者文档基础设施支持企业商户直接接入 API。

              变现机制包括商户交易费模式（商户在结账时按成功 BNPL 交易向 Tamara 付费）和 Smart 高级订阅（首月免费后 SAR
              19/月），后者向消费者提供返现和奖励。双收入模式降低了对单一变现机制的依赖。公开披露的关键指标仅限购物用户和商户数量；Tamara 作为私营公司，未披露
              GMV、收入和盈利能力等财务表现数据，这对潜在投资者构成重大尽调缺口。
