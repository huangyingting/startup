  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: GCC BNPL 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              GCC 语境下的先买后付（BNPL），指让消费者在不收利息的前提下，将付款递延或拆分为两到四期，或最长 24 个月的短期消费融资产品，完全符合伊斯兰金融原则。GCC BNPL
              市场由三项核心特征定义：（1）利息收入不是主要收入来源，商户改向 BNPL 提供商支付交易费；（2）费用结构由商户承担，零售商以补贴消费者融资换取转化率和客单价提升；（3）通过电商结账 API 和线下 POS
              集成实现数字优先部署。在伊斯兰金融原则影响消费者金融产品偏好的 GCC 市场，不收息模式是结构性优势。

              沙特中央银行 SAMA 于 2021 年在更广泛的金融科技牌照计划下推出正式 BNPL 监管框架，使沙特阿拉伯成为首批将 BNPL 运营制度化的 GCC 监管者之一。该框架要求取得 SAMA
              牌照、满足资本充足合规，并披露消费者保护信息，清晰区分持牌 BNPL 运营商与非正式店铺赊账、无牌分期方案。Tamara 按 SAMA License 95/A Sh/202502 运营；Tabby 持有同等
              SAMA 授权。

              GCC BNPL 市场的地理范围主要包括沙特阿拉伯、阿联酋、巴林、科威特、卡塔尔和阿曼。沙特阿拉伯是主导市场，原因在于人口规模大（约 35 million）、智能手机渗透率超过 90%，且政府在 Vision
              2030 下明确推动金融科技增长。Tamara 在沙特阿拉伯、阿联酋和巴林运营，覆盖 GCC 内按交易量计算最大的三个 BNPL 市场。

              市场边界不包括传统信用卡分期计划、没有持牌数字获客的零售店铺赊账计划、纯借记/预付产品，以及按独立牌照提供的正式伊斯兰个人金融（Murabaha）银行产品。GCC 历史上替代 BNPL
              的现状方案是货到付款，至今仍是主导电商支付方式；此外，银行信用卡仅由约 10–15% 的沙特成年人持有。相邻板块包括 B2B BNPL（SME 采购融资）和跨境 BNPL（帮助国际商户服务 GCC 消费者），截至
              2024–2026 年两者均处于早期增长阶段。
