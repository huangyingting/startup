      - number: '8.5'
        title: 最终建议、投资逻辑失效触发器与尽调要求
        blocks:
          - type: paragraph
            body: >-
              当前估值下的建议投资立场是观察，风险评级高，置信度中，估值立场偏高。整体质量分 6/10，反映了积极的市场背景（符合 SAMA、顺应 Vision 2030、商户网络强、Goldman Sachs 背书），但被
              Tabby 的主导竞争威胁、完全财务不透明，以及处在公开信息分析可支持上沿的估值所抵消。

              给出观察而非买入，基于四个因素。第一，在保守假设下，没有任何估值方法能稳健支撑高于 $1B 的价格。当前价格并非明显错误，但也并非明显正确，置信区间宽得令人不安。第二，Tabby
              的主导规模优势造成路径依赖问题：Tamara 必须在 Tabby 资本更多、商户更多、用户更多的环境里，比 Tabby 增长更快。第三，审计财务完全缺席，意味着以 Series C
              估值进入的投资者，实际上在承销一个无法独立核验的信贷和收入模型。第四，全球 BNPL 板块自 2022 年以来经历估值重定价——Affirm 在公开市场的 4–6× 收入倍数，对比 2021 年时期的
              20–30× 倍数——任何老股交易或 IPO 退出都会面对比当前私募标记所隐含水平更审慎的公开市场倍数。

              投资逻辑失效触发器，是会把观察立场转换为买入（上行触发）或退出（下行否决条件）的情形。上行触发包括：Tamara 披露审计财务，显示 GMV 超过 $3B 且 EBITDA 为正；Tamara 用户基数突破
              15M，同时 Tabby 仍低于 30M；或战略收购方以高于当前估值的溢价发起交易。否决条件包括：SAMA 限制或撤销牌照；以低于 $750M 隐含估值完成下轮融资；Tabby 与 Tamara
              已确认的前五大商户伙伴签署独家协议；或 CEO 离任且没有指定继任者。

              最终尽调要求，是把观察转为买入所需的最低数据集。最重要的一项，是 FY2022– FY2025 审计财务报表，并确认 GMV、收入、分品类 MDR 费率、信贷损失准备和 EBITDA
              桥。没有这些资料，任何独立投资者都无法承销 $1B 估值。辅助要求包括：SAMA 合规确认和高于监管最低要求的资本充足裕度；完整股权结构表和投资者权利文件；商户 HHI 集中度分析；以及一份 2026
              运营计划，列明 Series C 资金使用里程碑。
