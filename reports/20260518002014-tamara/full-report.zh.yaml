      - number: '7.3'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Tamara 最重要的竞争风险是 Tabby 的主导性规模优势。截至 2024 年中，Tabby 报告约 2500 万注册用户和 $4.5B 估值，而 Tamara 为 1000 万+ 用户和约 $1B
              独角兽估值——用户差距 2.5 倍，估值差距 4.5 倍。Tabby 的网络效应优势会随时间复合：更大的消费者基础吸引更多商户合作，更多商户又吸引更多消费者；如果 Tamara
              相对增长率落后，差距可能继续扩大。Fintech Times 和区域行业出版物将 Tabby 描述为 GCC BNPL 的主导运营商，把 Tamara 定位为面对艰难竞争轨迹的第二名在位者。

              沙特银行构成结构性竞争威胁，这一点并不完全由 Tabby 复制。Al Rajhi、SNB（Saudi National Bank）和 Riyad Bank 等银行提供基于 MADA
              的分期产品和消费者信贷工具，争夺消费者钱包份额；它们可以利用既有客户关系、存款融资的资金成本和监管熟悉度。银行分期产品通常带有利息收费，与 Sharia 合规范式不兼容；Tamara
              的零费用模式满足这些规范，因此形成产品差异化护城河，部分抵消银行在分销和成本上的结构性优势。

              截至 2026 年 5 月，Klarna 和其他全球 BNPL 运营商尚未大规模进入 GCC 市场；新的 SAMA BNPL 牌照存在监管壁垒，提供近期保护。多 BNPL 商户部署——同一商户在结账页同时提供
              Tamara 和 Tabby——在 GCC 电商中很常见，意味着 Tamara 在每个符合条件的结账场景都面临逐笔交易的消费者选择竞争。公开来源没有确认任何独家协议，商户切换惯性主要来自 API
              重新集成工作，而非合同锁定。

              竞争动态放大了商户集中风险。如果 Tamara 的头部商户伙伴——基于具名商户证据，可能包括 IKEA、SHEIN 或 Jarir——独家切换到 Tabby 或银行替代方案，GMV
              可能显著下降。公开资料中没有商户 GMV 集中度数据（HHI 或头部商户份额），无法从外部来源量化这一风险。Tamara 的 $1B 估值约比 Tabby 的 $4.5B 低 4.5
              倍，反映投资人对竞争差距的感知，也限制 Tamara 用股权作为激进增长投资货币的能力。GCC BNPL 市场仍处早期，两个玩家都可以随市场规模扩张实现绝对增长；但双边平台的网络效应往往会随时间复合规模优势。
