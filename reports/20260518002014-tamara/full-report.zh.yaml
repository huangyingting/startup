      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 财务不透明阻碍独立估值承销
            body: >-
              本章所有估值框架都建立在估计而非已确认的财务输入上。截至 May 2026，Tamara 没有披露 GMV、收入、信贷损失率或盈利指标。$1B 独角兽估值是唯一已确认锚点；所有区间分析都依赖估计可比公司和假设
              MDR 费率。收入估计存在 3× 不确定区间（$50M–$160M），在收入倍数框架下会直接变成 6× 估值区间（$250M–$1.5B）。没有审计财务报表确认收入、信贷质量和前瞻运营计划，任何机构投资者都不应以
              $1B 或更高价格投入资本。
            calloutType: risk
            claimRefs:
              - CV001
              - CV003
              - CV033
          - type: callout
            title: Tabby 规模优势是最主要的估值约束
            body: >-
              Tamara 估值分析中最重要的事实不是 Tamara 自己的财务，而是 Tabby 的财务。Tabby 在 25M 用户和 $17B+ GMV 下获得 $4.5B 估值，为 GCC BNPL
              市场愿意给主导平台支付的价格设定了上限。Tamara 在同一司法辖区运营、产品等价，用户规模只有 Tabby 的 40%，结构上只能按 #2 玩家定价。在 Tamara 追上 Tabby
              的规模差距，或让产品形成实质差异化之前，基准情景估值上限约为 $1.5B。$2.5–4B 的乐观情景要求 Tamara 功能性接近 Tabby 的规模——这同时要求 Tabby 停止增长。
            calloutType: insight
            claimRefs:
              - CV015
              - CV027
              - CV028
