    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Tamara Finance Company（全称，沙特股份公司）是海湾合作委员会（GCC）地区领先的购物和支付平台。公司成立于 2020 年
              Q3，总部位于沙特阿拉伯利雅得，运营符合伊斯兰教法的先买后付（BNPL）平台，覆盖沙特阿拉伯、阿联酋和巴林。公司持有 SAMA（沙特中央银行）牌照 95/A Sh/202502，注册资本 SAR
              515,000,000（约 USD 137 million），商业登记号 1010627663，统一编号 7016874419。

              Tamara 的核心产品覆盖灵活的消费者支付选项：Pay in Full、Split in 2、Split in 3、Split in 4，以及最长 24 个月付款；所有产品均不收利息或滞纳金，符合
              Shariyah Review Bureau 认证的伊斯兰金融原则。除分期产品外，Tamara 还提供 “Smart” 高级会员（SAR
              19/月，首月免费），带来返现奖励和专属购物权益，把收入模式从单一商户交易费拓展出去。

              平台同时覆盖线上（电商 API 集成）和线下（销售点），可触达数字和实体商户渠道。Tamara 的公开使命是「赋能人们的日常生活，并革新他们购物、支付和银行服务的方式」。依托 24/7
              交易监控和安全基础设施，Tamara 将自身定位为消费者和商户可信赖的金融服务伙伴，服务一个快速增长的区域 BNPL 市场。
