      - number: '5.4'
        title: 商户价值主张
        blocks:
          - type: paragraph
            body: >-
              Tamara 面向商户的价值主张由四个商业上可区分的收益构成。第一，商户预先收到全额购买价——Tamara
              在交易批准时立即向商户结算（扣除商户折扣率），消除商户的应收账款风险和现金流不确定性。即时结算模式意味着商户不承担消费者信贷或分期还款风险；所有信贷敞口都由 Tamara 留存。

              第二，Tamara 明确代表商户承担所有欺诈和信贷风险：有文档记录的价值主张写道「专注于你的核心业务，让我们承担欺诈和信贷风险」。风险转移是商户支付 MDR 的主要经济理由——MDR 补偿 Tamara
              吸收原本会落到商户或其支付处理商身上的违约、欺诈和争议风险。

              第三，BNPL 结账选项已被证明能提高转化率和平均订单价值（AOV）。Tamara 面向商户的营销材料明确把这一点列为核心收益：因即时现金流约束而可能推迟或放弃购买的消费者，可以借助分期付款完成交易。更高 AOV
              和转化率为商户带来增量 GMV，从而支撑 MDR 成本。独立 BNPL 行业研究也支持全球市场中的这一转化效应，但 Tamara 没有披露自身商户层面的转化提升数据。

              第四，Tamara 的 Sharia 认证在 GCC 市场为商户带来独特定位收益：商户与一种 Sharia 认证支付方式联合露出，可以触达大量只愿使用 halal 金融产品的消费者。这一合规凭证，让 Tamara
              的商户主张区别于区域内未获 Sharia 认证的支付替代方案。

              支撑商户上线的开发者生态——REST API、沙盒、Widgets、POS 集成和 Merchant Portal——把 Tamara 的结账流程嵌入商户基础设施，制造运营粘性。Tamara
              部署后，重新集成成本和结账 UX 中断会形成切换摩擦，有助于商户留存。不过，在 GCC 电商中，多 BNPL 提供商部署很常见（商户在结账页同时提供 Tamara 和 Tabby），这限制了独家性。
