        - ~3–6%（分析师估计；未确认）
        - 低
        - GMV 为 $2.5B 时，1 个百分点变化约影响 USD 25M 年收入，是核心收入杠杆
        - 确认实际平均 MDR；按商户类别、交易量层级和产品期限提供加权 MDR
      - - 年化 MDR 收入（估计）
        - USD 45M–160M（低值：$1.5B × 3%；高值：$4B × 4%）
        - 低
        - 收入倍数评估基础；中位情景下 USD 1B 估值意味着约 11× 收入
        - 提供经审计收入数据，并拆分分部（MDR vs. 订阅）
      - - Smart 订阅用户数
        - 未披露；假设 500K → ~USD 30M/年
        - 低
        - 订阅收入叠加在 MDR 之上；订阅用户数驱动 LTV 计算
        - 披露订阅用户数、月流失率和订阅净收入贡献
      - - 平均订单价值（AOV）
        - 估计 USD 150–400（未披露；基于 GCC 零售基准）
        - 低
        - GMV 关键驱动项；AOV 越高，单笔信用敞口越大，但 MDR 经济性更好
        - 按商户类别和产品变体提供 AOV；确认相对非 BNPL 基线的声称提升
      - - 消费者获客成本（CAC）
        - 未披露；全球 BNPL 基准为每名获客用户 USD 5–50
        - 低
        - 决定回本周期和 LTV/CAC 比率是否跑得通
        - 按渠道（自然、付费、推荐）和队列年份提供 CAC；确认增量 CAC 与平均 CAC 的差异
      - - 扣除资金成本后的净 MDR
        - 未披露；扣除混合授信额度成本后估计为 0.5–2.5%
        - 低
        - 放款资产簿的有效经济利润率；利润率薄，需要高规模才可能盈利
        - 披露授信额度综合成本（Sharia 结构、利差、费用），以估算净利润率
      - - 信用损失率 / 核销率
        - 未披露；全球 BNPL 基准为放款额的 1–5%
        - 低
        - GMV 为 $2.5B 时，2% 损失率 = 约 USD 50M 年信用成本；这是最关键的单位经济模型变量
        - 提供按年份/期次划分的队列数据：按放款季度拆分的 30/60/90 天逾期和核销
      - - 运营费用率（OpEx/Revenue）
        - 未披露
        - null
        - 决定达到经营盈亏平衡所需规模；成长期技术和风控运营投入高
        - 按职能提供员工数、平均薪酬区间和技术基础设施成本
      - - 贷款损失准备覆盖率
        - 未披露
        - null
        - 准备金相对预期和非预期信用损失的充足性
        - 披露贷款损失准备金额、计提政策依据，以及相对逾期资产簿的覆盖率
    notes: >-
      所有量化指标都是分析师估计，或根据已披露运营指标（10M+ 消费者、30,000+ 商户）做出的结构性推断。Tamara 未公布 GMV、收入、CAC、MDR 费率、信用损失率或盈利数据。 'null'
      条目表示没有公司一手数据就完全无法估计的指标。全球 BNPL CAC 和信用损失基准来自 PYMNTS 与 CBInsights 行业研究；GCC 专属基准未公开。USD/SAR 汇率约 3.75。 所有标记为
      confidence=low 的估计，在用于估值模型前都需要管理层确认。
