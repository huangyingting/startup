      - number: '6.3'
        title: 客户旅程与留存
        blocks:
          - type: paragraph
            body: >-
              Tamara 的消费者旅程沿着六个阶段展开：从初始发现，到重复参与，再到潜在 Smart 订阅升级。发现通常发生在商户结账页（线上或线下 POS 终端），或来自社交媒体和应用商店推广。注册是一次性流程，需要沙特或
              UAE 国民 ID、手机号码和支付方式；其低摩擦上线设计与 GCC ID 基础设施一致。第一次购买完成上线旅程：消费者选择 Tamara 分期计划（Split in 2、3 或
              4），获得实时信贷批准，并以无利息、无滞纳金方式完成结账。

              还款通过已注册支付方式自动扣款，降低追踪账单和手动发起付款的认知负担。这种无摩擦还款机制支撑留存：如果消费者顺畅完成还款且没有争议，结构上更可能在后续交易中回流。Tamara 的 Smart 订阅层级（首月免费后
              SAR 19/月）提供明确留存激励——订阅用户获得现金返还奖励和独家商户优惠，提高消费者在单笔交易之外维持 Tamara 关系的感知价值。

              留存和重复使用指标并未公开披露。截至 2026 年 5 月，Tamara 未发布 NPS（Net Promoter
              Score）、客户满意度分数、重复购买率、活跃用户比率或队列留存数据。下方队列图展示的是分析师估算的留存率，建模参照类似市场（东南亚、澳大利亚、欧洲）的可比 BNPL
              平台；这些估算明确只是近似值，不能被视为已确认的 Tamara 数据。缺少已披露留存数据时，同样未披露的 Smart
              订阅用户数，是当前最有信息量的高参与消费者留存代理指标，因为月费形成了消费者忠诚度的显示偏好信号。

              可用的消费者参与间接证据包括：四年内注册购物者从 0 增至 10M+；地理覆盖从一个市场扩至三个；商户基数从上线增长到 30,000+；以及 2024 年 8 月在 $1B+
              估值下继续获得机构投资人支持。这些信号与一个保有有意义消费者参与度的平台相一致，但不构成经核验的留存测量。任何投资流程都应优先直接尽调月活用户数、12 个月队列留存率和 Smart 订阅用户数。
