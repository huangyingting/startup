  - id: FU004
    title: 留存 / 复购队列
    type: cohort
    layout: standard
    summary: >-
      按首次交易年份估算消费者留存队列，展示第 1、第 3、第 6 和第 12 个月留存率。所有数值都是分析师估算，基于东南亚和澳大利亚可比 BNPL 平台；截至 2026 年 5 月，Tamara
      未公开披露任何队列留存数据。跨队列年份的改善趋势反映假设的产品成熟、Smart 订阅推出和商户网络增长——不是已确认的 Tamara 数据。
    notes: >-
      重要：所有队列数值均为分析师估算，模型参照可比 BNPL 平台。Tamara 未披露真实队列留存数据。这些估算只能作为方向性参考，并应在任何投资数据室请求中用 Tamara 真实队列数据替换。第 1 个月标准化为
      100（所有队列成员都计入第 1 个月）。第 3、第 6 和第 12 个月数值代表仍活跃的第 1 个月用户估算比例。
    data:
      columns:
        - 第 1 个月
        - 第 3 个月
        - 第 6 个月
        - 第 12 个月
      rows:
        - label: 2021 队列（估算）
          values:
            - 100
            - 62
            - 48
            - 38
        - label: 2022 队列（估算）
          values:
            - 100
            - 65
            - 50
            - 40
        - label: 2023 队列（估算）
          values:
            - 100
            - 68
            - 52
            - 42
        - label: 2024 队列（估算）
          values:
            - 100
            - 70
            - 54
            - 44
    claimRefs:
      - CU033
      - CU035
      - CU038
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: >-
      风险热力图将 9 个关键 Tamara 风险项映射到发生概率（低 / 中 / 高）和影响（低 / 中 / 高）两个维度。最高严重性象限——高概率 × 高影响——包含 SAMA 监管收紧，反映其主动 BNPL
      监管职责和框架演进的既有先例。信用违约激增位于中概率 × 高影响，反映其受宏观经济影响且拨备状态未披露。Tabby 竞争压力为高概率 × 中影响，是持续但短期内不致命的威胁。数据泄露和平台宕机位于低概率 × 高 /
      严重影响，代表低频但严重的尾部风险。
    data:
      columns:
        - 低影响
        - 中影响
        - 高影响
      rows:
        - label: 低概率
          values:
            - Vision 2030 开放银行要求
            - 外汇 / SAR 联系汇率压力；全球 BNPL 玩家进入
            - 平台宕机（高峰期）；伴随 PDPL 处罚的数据泄露
        - label: 中概率
          values:
            - 商户集成错误
            - 商户流失至 Tabby；员工流失（非创始人）
            - BNPL 违约率激增；资金成本上升（SAIBOR）
        - label: 高概率
          values:
            - API 轻微安全问题
            - Tabby 网络效应带来的竞争压力
            - SAMA 监管收紧；SIMAH 征信报送要求
    claimRefs:
      - CR001
      - CR003
      - CR011
      - CR014
      - CR019
      - CR025
      - CR028
      - CR029
      - CR033
  - id: FR002
    title: 风险传导图
    type: dag
    layout: standard
    summary: >-
      有向无环图展示 Tamara 主要冲击源事件如何经中间风险节点传导到最终结果。图中识别出两个主要冲击源：宏观 / 油价冲击（推动违约上升和资金成本增加）以及竞争中输给
      Tabby（直接带来估值压力）。两条链都汇聚到资本压力，监管收紧则作为独立放大器。终点节点是估值下滑，代表独角兽地位受威胁和潜在估值下调融资风险。所有边都表示因果传导路径；基于 BNPL 平台风险研究，置信度为中到高。
    data:
      nodes:
        - id: macro_shock
          label: 宏观 / 油价冲击
          detail: GCC 经济下行，或油价持续低于沙特财政盈亏平衡线
          tone: warning
        - id: default_rise
          label: 违约上升
          detail: 消费者无力偿还 BNPL 分期；NPL 率上升
          tone: warning
        - id: funding_risk
          label: 资金成本上升
          detail: SAIBOR 挂钩信贷额度成本上升；净利差被压缩
          tone: warning
        - id: regulatory_tightening
          label: 监管收紧
          detail: SAMA 提高资本要求或限制产品设计
          tone: warning
        - id: capital_pressure
          label: 资本压力
          detail: SAMA 资本充足率挤压；可能需要紧急股权融资
          tone: warning
        - id: competitive_loss
          label: 商户和用户流失至 Tabby
          detail: Tabby 网络效应优势吸走商户和消费者
          tone: warning
        - id: valuation_impact
          label: 估值下滑
          detail: 独角兽地位受威胁；估值下调融资风险；投资者信心流失
          tone: warning
      edges:
        - from: macro_shock
          to: default_rise
        - from: macro_shock
          to: funding_risk
        - from: default_rise
          to: capital_pressure
        - from: funding_risk
          to: capital_pressure
        - from: regulatory_tightening
          to: capital_pressure
        - from: competitive_loss
          to: valuation_impact
        - from: capital_pressure
          to: valuation_impact
    claimRefs:
      - CR011
      - CR012
      - CR013
      - CR014
      - CR003
      - CR019
      - CR026
  - id: FR003
    title: 依赖图
    type: dag
    layout: standard
    summary: >-
      有向无环图将 Tamara 的运营依赖和故障传播路径从上游基础设施映射到下游 GMV 输出。SAMA 运营牌照是关键性最高的单一依赖——一旦被撤销，无论技术或资本状态如何，KSA
      全部业务都会停止。银行信贷额度、支付通道和云基础设施是 Tamara 平台核心的并行上游依赖。平台服务两个下游层：30,000+ 商户集成和 10M+ 消费者账户，两者共同驱动交易 GMV
      输出节点。任一上游节点故障都会经平台向下传导，影响商户和消费者可用性，最终影响 GMV。
    data:
      nodes:
        - id: sama_licence
          label: SAMA 运营牌照
          detail: 牌照 95/A Sh/202502——所有 KSA BNPL 业务必需
          tone: warning
        - id: banking_facilities
          label: 银行信贷额度
          detail: 未披露的银行合作伙伴提供 BNPL 放贷信贷额度
          tone: neutral
        - id: payment_rails
          label: 支付通道（Mada / Visa / MC）
          detail: 核心交易处理和结算基础设施
          tone: neutral
        - id: cloud_infra
          label: 云基础设施
          detail: 平台托管和数据存储；供应商未公开披露
          tone: neutral
        - id: tamara_platform
          label: Tamara 平台核心
          detail: BNPL API 引擎、信贷决策系统和消费者 App
          tone: positive
        - id: merchant_integrations
          label: 30,000+ 商户集成
          detail: API 连接支撑商户在电商和 POS 场景提供 BNPL 结账
          tone: positive
        - id: consumer_layer
          label: 10M+ 消费者账户
          detail: 注册购物用户通过商户结账和 Tamara App 交易
          tone: positive
        - id: gmv_output
          label: 交易 GMV
          detail: 总额未披露；Tamara 通过商户 MDR 获得收入的主要驱动
          tone: positive
      edges:
        - from: sama_licence
          to: tamara_platform
        - from: banking_facilities
          to: tamara_platform
        - from: payment_rails
          to: tamara_platform
        - from: cloud_infra
          to: tamara_platform
        - from: tamara_platform
          to: merchant_integrations
        - from: tamara_platform
          to: consumer_layer
        - from: merchant_integrations
          to: gmv_output
        - from: consumer_layer
          to: gmv_output
    claimRefs:
      - CR001
      - CR027
      - CR030
      - CR032
      - CR040
  - id: FV001
    title: 推荐决策逻辑
    type: flow
    layout: standard
    summary: 决策流展示从 Tamara 公开信息分析，经估值框架、可比分析和风险评估，推导出观察建议、高风险和估值偏高立场的逻辑路径。流程标出可能上调或下调推荐的关键上行和下行关口。
    data:
      nodes:
        - id: entry
          label: 入口：C 轮 ~$1B 估值
          detail: 2024 年 8 月 C 轮延伸；融资 $340M；投后估值 ~$1B+
          tone: neutral
        - id: market-check
          label: GCC BNPL 市场检查
          detail: Vision 2030 顺风；SAMA 持牌双寡头；无现金支付渗透率上升
          tone: positive
        - id: comparable-check
          label: 可比分析
          detail: Tabby $4.5B / 25M 用户；Klarna $14.6B / 85M 用户；Affirm $8-12B 上市公司
          tone: neutral
        - id: valuation-range
          label: 混合估值区间
          detail: GMV 倍数 $270M-$1.0B；收入倍数 $250M-$1.5B；用户口径 $720M-$1.8B
          tone: neutral
        - id: financial-opacity
          label: 财务不透明关口
          detail: 未披露经审计财务；无 GMV；无收入；无信用损失数据
          tone: warning
        - id: competitive-check
          label: 竞争检查：Tabby
          detail: 用户 2.5x；商户 2.2x；估值 4.5x——规模优势明显
          tone: warning
        - id: risk-assessment
          label: 风险评估：高
          detail: 信用不透明 + Tabby 占优 + SAMA 监管风险 + 财务不透明
          tone: warning
        - id: recommendation
          label: 观察 — 评分 6/10 — 偏高
          detail: 在转为买入前，观察财务披露或竞争位置重塑
          tone: neutral
        - id: upgrade-trigger
          label: 上调触发点 → 买入
          detail: 经审计财务（GMV >$3B、EBITDA 转正）或与 Tabby 的用户差距收窄到 60%
          tone: positive
        - id: downgrade-trigger
          label: 否决标准 → 退出
          detail: SAMA 牌照受限，或估值下调轮 <$750M，或 Tabby 商户独家
          tone: negative
      edges:
        - from: entry
          to: market-check
          label: GCC 背景评估
        - from: market-check
          to: comparable-check
          label: 与同业对标
        - from: comparable-check
          to: valuation-range
          label: 套用行业倍数
        - from: valuation-range
          to: financial-opacity
          label: 关口：能否做投资判断？
        - from: financial-opacity
          to: competitive-check
          label: 无法独立核验
        - from: competitive-check
          to: risk-assessment
          label: 识别出 Tabby 规模差距
        - from: risk-assessment
          to: recommendation
          label: 高风险 + 估值偏高
        - from: recommendation
          to: upgrade-trigger
          label: 若上行触发点满足
        - from: recommendation
          to: downgrade-trigger
          label: 若触发否决标准
  - id: FV002
    title: 估值对比 — Tamara 与同业
    type: bar
    layout: standard
    summary: >-
      条形图对比 Tamara 当前 $1B 独角兽估值、乐观和悲观情景估计，以及 BNPL 板块关键可比公司的估值。图中显示，Tamara 当前估值仅为 Tabby 估值的 22%、Klarna 的
      7%——若要支撑明显更高的退出估值，乐观情景必须补上这道规模差。
    data:
      items:
        - label: Tamara（当前）
          value: 1000
          unit: USD M
          detail: 2024 年 8 月 Series C 延伸轮；融资 $340M；投后估值约 $1B+
          tone: neutral
        - label: Tamara（乐观）
          value: 2500
          unit: USD M
          detail: 若达到与 Tabby 相当的规模，拥有 18-22M 用户且 EBITDA 转正
          tone: positive
        - label: Tamara（悲观）
          value: 400
          unit: USD M
          detail: 估值下调轮情景：Tabby 主导市场，违约率上升，SAMA 收紧资本要求
          tone: warning
        - label: Tabby（GCC 可比公司）
          value: 4500
          unit: USD M
          detail: $4.5B 估值；25M 用户；年化 TV 超 $17B；同属 SAMA 管辖
          tone: neutral
        - label: Affirm（上市可比公司）
          value: 10000
          unit: USD M
          detail: NASDAQ：AFRM；市值区间 $8-12B；公开市场收入倍数 4-6x
          tone: neutral
  - id: FV003
    title: Tamara 按方法论划分的估值区间
    type: range
    layout: standard
    summary: 区间图展示四套独立估值框架给出的低、中、高估计。$1B 独角兽估值高于其中三套框架的中位情景，与「偏高但并非站不住脚」的估值判断一致。
    data:
      items:
        - label: GMV 倍数估值
          low: 350
          mid: 650
          high: 950
          unit: USD M
          basis: 0.10-0.26x estimated GMV ($1.5B-$4B range); Tabby and Klarna multiples applied
        - label: 收入倍数估值
          low: 250
          mid: 750
          high: 1500
          unit: USD M
          basis: 5-15x estimated revenue ($50M-$160M range); consistent with BNPL growth-stage multiples
        - label: 按用户估值
          low: 400
          mid: 1000
          high: 1800
          unit: USD M
          basis: $40-$180 per registered user; $180 Tabby benchmark with 0-78% scale discount applied
        - label: 可比公司调整估值
          low: 300
          mid: 800
          high: 1500
          unit: USD M
          basis: Blended discount to Tabby and Klarna for smaller scale and
  - id: FV004
    title: Tamara 关键投资 KPI
    type: kpi
    layout: standard
    summary: 概括截至 2026 年 5 月定义 Tamara 投资画像的关键绩效指标和估值指标；仅基于公开信息分析。
    data:
      items:
        - label: 估值（Series C 投后）
          value: $1B+
          detail: 2024 年 8 月 Series C 延伸轮；融资 $340M；已确认达到独角兽门槛
          tone: neutral
        - label: 注册购物用户
          value: 10 million+
          detail: 截至 2024 年 8 月新闻稿；公司未公开精确数字
          tone: neutral
        - label: 商户合作伙伴
          value: 30,000+
          detail: 截至 2024 年 8 月；覆盖 KSA、UAE 和巴林市场
          tone: neutral
        - label: 累计融资
          value: ~$400M+
          detail: 种子轮约 $6M + Series A $110M + Series B $150M + Series C $340M
          tone: neutral
        - label: SAMA 注册资本
          value: SAR 515M (~$137M)
          detail: 监管资本底线；SAMA 牌照 95/A Sh/202502
          tone: neutral
        - label: 估计 GMV 区间
          value: $1.5B–$4B
          detail: 分析师根据用户基数和 MDR 基准估算；Tamara 未披露
          tone: warning
        - label: 估计收入区间
          value: $50M–$160M
          detail: 对估计 GMV 应用 3–6% MDR；未经确认
          tone: warning
        - label: 相对 Tabby 的单用户估值
          value: $100 vs. $180
          detail: Tamara 注册用户单用户估值较 Tabby 折价 44%；与偏高判断一致
          tone: warning
        - label: 整体尽调评分
          value: 6 / 10
          detail: 中等置信度；高风险；Vision 2030 的顺风被 Tabby 主导地位和不透明度抵消
          tone: neutral
        - label: 相对 Tabby 的可比差距
          value: 4.5× valuation gap
          detail: Tabby 估值 $4.5B，Tamara $1.0B；乐观情景需要把差距收窄到 <2×
          tone: warning
