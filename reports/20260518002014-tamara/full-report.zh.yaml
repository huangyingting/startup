    summary: 定性流程展示 GMV、MDR、信贷损失和资金成本如何相互作用，形成 Tamara BNPL 业务的净单位经济性；由于缺少公开披露，所有数字输入均为分析师估计。
    approximationNotes: 所有数字标签都是分析师基于 GCC BNPL 行业基准和已披露指标的结构性推断得出的估计。Tamara 未确认 GMV、MDR 费率、信贷损失率或资金成本。该桥应视为情景示意，而非已验证的单位经济性。
    data:
      nodes:
        - id: gmv
          label: 估计 GMV：USD 1.5B–4B
          detail: 10M+ 购物者、USD 150–400 AOV、每年 2–4 笔交易；中位情景 USD 2.5B
          tone: neutral
        - id: gross-mdr
          label: 毛 MDR 收入：USD 45M–160M
          detail: 对 GMV 区间适用 3–6% MDR；中位情景 USD 87.5M
          tone: positive
        - id: subscription
          label: Smart 订阅：估计 USD 5–30M
          detail: SAR 19/月 × 未披露订阅用户数；对 MDR 形成增量
          tone: positive
        - id: credit-losses
          label: 信贷损失：估计 USD 15–80M
          detail: 中位情景 GMV 下 1–2% 核销 = USD 25–50M；区间不确定
          tone: warning
        - id: cost-capital
          label: 资金成本：未披露
          detail: 符合 Sharia 的信贷额度；实际成本未披露；压低净 MDR
          tone: warning
        - id: opex
          label: 运营费用：未披露
          detail: 技术、风控、合规、营销、G&A；未报告；可能显著
          tone: warning
        - id: net-economics
          label: 净单位经济性：未知
          detail: 盈利 / 亏损状况未披露；按当前增长阶段看，很可能为负
          tone: neutral
      edges:
        - from: gmv
          to: gross-mdr
          label: × MDR 费率（3–6%）
        - from: gross-mdr
          to: net-economics
          label: 主要收入输入项
        - from: subscription
          to: net-economics
          label: 叠加订阅收入
        - from: net-economics
          to: credit-losses
          label: 扣减信用损失（GMV 的 1–5%）
        - from: net-economics
          to: cost-capital
          label: 扣减信贷额度资金成本
        - from: net-economics
          to: opex
          label: 扣减运营费用
    claimRefs:
      - CI023
      - CI024
      - CI025
      - CI026
      - CI028
      - CI029
      - CI030
      - CI032
