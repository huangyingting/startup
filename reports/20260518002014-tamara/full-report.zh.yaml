  - id: TV006
    title: 最终尽调要求
    columns:
      - 优先级
      - 要求类别
      - 具体要求
      - 重要性
      - 所需格式
    rows:
      - - P0 — 阻断
        - 经审计财务报表
        - FY2022–FY2025 经审计利润表；带应收账款拆分的资产负债表；现金流量表；管理层对 GMV、收入和 EBITDA 桥接的说明
        - 没有财务报表，$1B 估值无法独立承销。本章所有估值倍数都是估计值。这是最关键的单一尽调缺口。
        - IFRS 或 Saudi GAAP 经审计财务报表；外部审计师身份和无保留意见函
      - - P0 — 阻断
        - 信贷质量数据
        - NPL 比率；按产品和放款批次拆分的 FY2022–FY2025 30/60/90 天逾期；核销率；ECL 准备金额和覆盖率；承销评分卡摘要
        - 信贷损失是 BNPL 盈利的核心驱动项。若 $2.5B GMV 出现 2% 核销，意味着每年 $50M 信贷损失，足以吃掉全部 MDR 净利润。信贷质量未知就是二元风险。
        - 放款批次级队列数据表；管理层关于信贷周期管理和拨备方法的讨论
      - - P1 — 重大
        - GMV 和收入确认
        - FY2023–FY2025 按市场（KSA、UAE、Bahrain）拆分的季度 GMV；已实现加权平均 MDR；Smart 订阅收入；按收入流拆分的总收入调节表
        - MDR 收入估计存在 3× 不确定区间（$50M–$160M）。GMV 和 MDR 一旦确认，估值框架才能从估计值细化为有依据的数字。
        - 管理层准备的 GMV 桥接；按市场和产品拆分的分部 P&L；MDR 费率表或加权平均 MDR
      - - P1 — 重大
        - SAMA 合规和资本充足率
        - 当前资本充足率与 SAMA 最低要求的对比；最近一次 SAMA 检查结果；任何 SAMA 整改计划或正式函件；牌照条件和修订历史
        - SAMA 监管风险是首要否决标准。投入资本前，必须确认资本充足率仍有缓冲，并且历史上没有 SAMA 关切。
        - SAMA 牌照授予函；最近一次 SAMA 合规自评；资本充足率计算
      - - P1 — 重大
        - 股权结构表和治理
        - Series C 之后的完整股权结构表；清算优先权瀑布；投资者权利协议；董事会构成和独立董事人数；关键决策同意门槛
        - 鉴于此前已有 $400M+ 资金以不同价格点投入，Series C 投资者需要知道自己在优先股堆叠中的位置、治理权利和反稀释保护。
        - Excel 版股权结构表；投资者权利协议；董事会章程或职权范围
      - - P2 — 重要
        - 商户集中度分析
        - 前 10 大商户 GMV 贡献占总 GMV 的比例；商户流失率；平均商户合作年限；现有任何排他或多年期协议
        - 没有 HHI 数据，就无法量化商户集中度。若前 5 大商户贡献 >50% GMV，单一商户转向 Tabby 排他合作就会带来重大收入风险。
        - 商户 HHI 报告；匿名化前 10 大商户 GMV 贡献；平均商户合同期限数据
      - - P2 — 重要
        - 2026 运营计划和融资
        - 董事会批准的 2026 运营计划；GMV 目标和用户获取计划；按渠道拆分的 CAC；结合 Series C 资金部署节奏的现金跑道分析；任何计划中的 Series D 时间表
        - Series C 募资提供现金跑道，但资金部署计划决定 $1B 估值能否被业绩消化。可信的 2026 计划可以重新加权各情景概率。
        - 董事会批准的 2026 业务计划；Series C 资金用途拆分；融资时间表
      - - P2 — 重要
        - 信贷额度条款
        - 所有银行信贷额度条款清单；已承诺和已提款额度总额；相对 SAIBOR 的全包定价；到期安排；财务契约；Sharia 合规审计函
        - 信贷额度资金成本决定 MDR 净收益。额度条款未知，就无法判断 Tamara 当前规模下的经济模型是否在结构上跑得通。
        - 条款清单或额度摘要；使用安排；契约合规证书；Sharia 审计函
    notes: >-
      尽调要求按 P0（阻断——缺失则无法形成投资意见）、P1（重大——显著影响估值和风险评估）和 P2（重要——完整投资逻辑需要，但本身不构成阻断）排序。任何投资决策前，所有 P0
      要求都必须满足。本表假设采用标准私募股权或成长股权尽调流程，并可进入虚拟数据室。数据包应配套管理层演示和问答，以澄清方法并提供前瞻指引。数据室审阅本身很可能带出更多要求。
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: Tamara 从 2020 年 Q3 创立，到 2024 年 8 月 Series C 独角兽轮和 SAMA 牌照正式化的关键里程碑，展示公司约四年内从沙特初创公司跑成 GCC 领先 BNPL 平台的速度。
    data:
      items:
