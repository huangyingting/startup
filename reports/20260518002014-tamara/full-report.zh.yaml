      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              按所有已披露规模指标看，Tabby 都是 GCC 最大的 BNPL 平台。Tabby 成立于 2019 年，总部位于利雅得，服务沙特阿拉伯、阿联酋和科威特，提供四期免息分期产品，以及最长 12
              个月的月付计划。Tabby Card 是一张联名 VISA 实体卡，把 BNPL 式灵活性延伸到实体零售交易；截至 2026 年，Tamara 尚无对应能力。Tabby Shop 是嵌入 Tabby
              平台的商品发现功能，通过把商品搜索和发现导入 Tabby 生态，增加一层消费者锁定。凭借 65,000+ 品牌伙伴，约为 Tamara 商户数量的两倍，Tabby
              建立了更广的商户网络，但代价可能是单商户集成深度较低。Tabby 最新估值 $4.5 billion（据报道来自 2024 年 Series D 轮），约为 Tamara $1 billion Series C
              后估值的 4.5 倍，显示双方资本获取能力存在明显差距。

              SplitIt 是结构上不同的竞争者：它不发起新的消费者信贷，而是使用买方现有 Visa 或 Mastercard 信用额度来资助分期，无需新的信用检查或消费者注册。商户从 SplitIt
              预先收到完整交易额。该模式适合高客单价商品和持信用卡客户的商户，但对 GCC 欠银行服务消费者群体在结构上不相关，而后者正是 Tamara 和 Tabby 业务的人群核心。SplitIt 在 30+
              国家运营，但专门的 GCC 消费者存在有限。

              Klarna 是全球 BNPL 领导者，约有 85 million 用户，主要分布在欧洲和北美；截至 2026 年，尚未推出持牌、受 SAMA 监管的 GCC 消费 BNPL 产品。其 “buy now pay
              later” 和 “pay in 30” 产品在全球有认知度，AI 驱动购物应用和 Klarna Card 也扩展了国际消费者触达，但 GCC 伊斯兰金融合规与 SAMA
              牌照要求仍是直接进入消费者市场的未解决门槛。

              Postpay 是以阿联酋为中心的 BNPL 运营商，用户基础和商户名单更小，主要聚焦阿联酋电商。其地域集中在 Tamara 核心沙特市场之外，降低了直接竞争重叠。Spotii 曾是 GCC BNPL
              玩家，后被澳大利亚 BNPL 集团 Zip 收购，并显著降低其独立 GCC 存在。沙特商业银行提供信用卡分期产品作为现状替代方案，但相关性只限于约 10–15% 持有银行信用卡的沙特成年人；这个群体也是最不需要
              BNPL 替代方案的细分人群。
