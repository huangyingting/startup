      - number: '6.5'
        title: 竞争背景与客户缺口
        blocks:
          - type: paragraph
            body: >-
              Tabby 是 Tamara 在 GCC BNPL 市场的主要竞争对手；截至 2026 年，Tabby 在消费者和商户两侧都拥有明显更大的客户足迹。Tabby 公开报告约 2500 万注册用户——约为
              Tamara 1000 万+ 购物者基数的 2.5 倍——并声称「UAE 和 KSA 每三名成年人中就有两名」使用 Tabby。Tabby 的商户网络为 65,000+ 品牌，约为 Tamara 30,000+
              商户基数的两倍。这一规模差异是 Tamara 在客户侧最重要的竞争风险：在双边市场中，更大的消费者触达会吸引更大的商户基础，反之亦然；如果 Tamara 增长率不能超过 Tabby，复合网络效应会随时间拉大差距。

              Tabby 在 2024 年 Series D 中达到 $4.5B 估值，显著高于 Tamara 的 $1B+ 独角兽估值。估值差异反映了多重因素，其中包括消费者和商户规模差异。Tabby 还提供 Tabby
              Card（一种与奖励挂钩的卡产品），把消费者互动模型从纯 BNPL 延伸到更广泛的消费和奖励生态，类似 Tamara 的 Smart 订阅，但交付机制不同。

              Tamara 尚未公开详细阐述其应对规模差距的竞争策略。潜在差异化策略包括：Sharia 合规定位（Tamara 持有明确 SRB 认证，而 Tabby 的 Sharia
              合规定位不那么突出）；特定品类的商户深度；KSA 地理堡垒，Tamara 是较早获得 SAMA 牌照的 BNPL 运营商之一；以及 Smart 订阅形成 Tabby
              模式无法直接复制的忠诚度与留存护城河。不过，这些只是推断出的战略优势，而非已确认的竞争数据。

              从尽调角度看，Tamara 在消费者和商户数据上的缺口很大。关键未知指标包括：月活用户数与注册用户数对比；队列留存率；每活跃消费者 GMV；头部商户收入集中度；Smart 订阅用户数和 LTV；以及
              2024–2025 年消费者增长率相对 Tabby 同期增长率的表现。这些缺口阻碍了对 Tamara 消费者经济性是否支撑其相对 Tabby 和全球 BNPL 同行估值的明确判断。
