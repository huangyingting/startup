      - number: '2.5'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              GCC BNPL 市场实际上是 Tamara 与 Tabby 的双雄竞争，同时还面临较小区域运营商和探索进入 GCC 的全球 BNPL 平台的次级竞争。Tabby 成立于 2019
              年，主要在沙特阿拉伯和阿联酋运营，是 Tamara 最接近、最直接的竞争对手：截至 2024–2025 年，Tabby 报告 25 million 注册用户、超过 65,000 个品牌合作伙伴，年化交易量超过
              $17 billion。Tabby 最新估值为 $4.5 billion，显著高于 Tamara 的 $1 billion+ 独角兽估值，反映出 Tabby 更早进入市场和更大的已披露用户基础。

              Postpay（总部位于阿联酋）是规模较小的 BNPL 平台，聚焦阿联酋市场，采用类似的无息分期模式。SplitIt 提供全球 BNPL 产品，但它使用现有 Visa/Mastercard
              信用额度，而非发起新信贷；这是一种不同模式，在 GCC 消费 BNPL 上与 Tamara 的直接竞争较弱。Klarna 是来自瑞典的全球 BNPL 市场领导者，拥有数亿级全球用户；截至 2026
              年，Klarna 尚未在 GCC BNPL 市场形成重要直接存在，但其潜在进入构成长线竞争风险。

              Tamara 在 GCC 内的竞争优势包括 SAMA 牌照和监管合规历史、深厚的沙特商户网络（30,000+）、Sharia 认证，以及本地团队经验。Tabby
              的竞争优势包括更大的用户规模、更高的已披露交易量和更充足的资本基础。本市场的竞争动态将在第 3 章（竞争格局）中详细分析。
