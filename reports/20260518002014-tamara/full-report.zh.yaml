      - number: '1.2'
        title: 管理团队与治理
        blocks:
          - type: paragraph
            body: >
              Tamara 由三位创始人共同创建，能力覆盖金融科技、运营和工程。CEO 兼联合创始人 Turki Bin Zahra 此前在 STC Pay（Saudi Telecom Company
              的数字支付部门）积累了扎实的金融科技经验，也曾在 Procter & Gamble 负责消费品业务。国内市场理解叠加大规模运营经验，让他适合在沙特打造领先的 BNPL 平台；他也是 Tamara
              投资者关系和公开传播中的核心人物。

              COO 兼联合创始人 Abdulmajeed Alsukhan 负责技术和运营职能。他的技术与运营背景支撑 Tamara 扩展平台基础设施和商户集成，服务 30,000+ 合作商户。CTO 兼联合创始人
              Faisal Alsaqqaf 负责工程和产品开发，搭建了 Tamara 的核心技术栈，包括信用承保、支付处理和 API 基础设施，支撑线上与线下交易。

              治理结构体现了 Tamara 作为受监管股份公司的定位：公司接受 SAMA 直接监管，商业登记号为 1010627663，统一编号为 7016874419。创始团队在支付、技术和运营上的领域经验，构成了其把握
              GCC BNPL 机会的强创始人-市场匹配度。考虑到 CEO 在投资者叙事和媒体沟通中的突出地位，关键人物集中风险是值得关注的治理议题。
