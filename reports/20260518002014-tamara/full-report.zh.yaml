      - number: '7.5'
        title: 缓释框架与放弃标准
        blocks:
          - type: paragraph
            body: >-
              Tamara 的风险缓释框架靠五根支柱撑住：（1）监管对齐：持续维护 SAMA 牌照，并由 Shariyah Review Bureau 出具 Sharia
              合规认证；零利息、零滞纳金的产品设计，从源头上提前化解消费者保护执法风险；（2）资本缓冲：SAR 515M 注册资本，加上 $340M Series C
              延展轮资金，可用于吸收信贷损失或补充监管资本；（3）商户网络：30,000+ 合作伙伴分散单一商户流失对 GMV 的冲击；（4）地域分散：覆盖 KSA、UAE、Bahrain
              三个司法辖区，部分对冲单一市场监管风险；（5）商户零责任模式——Tamara 承担全部信用和欺诈风险——从结构上降低商户切换阻力，也强化平台相对银行替代方案的黏性。

              Tamara 的产品结构贴合 SAMA 的消费者保护意图，监管风险缓释因此更强。但这种对齐不覆盖审慎资本要求；SAMA 可以独立于产品设计调整资本规则。BIS 推动全球 BNPL 审慎监管趋同，意味着中期多个
              GCC 司法辖区的资本压力会继续上升。信用风险缓释主要依赖推断机制：用 national ID
              和支付历史做自动化信用决策，用自动扣款降低故意不还款，用还款表现挂钩的渐进授信提额；这些机制没有一项能从公开来源独立核验。

              竞争风险缓释受限于 Tamara 相对 Tabby 的结构性规模劣势。Tamara 的主要竞争护城河是 Sharia 合规认证（对非伊斯兰 BNPL 模式构成资质门槛）和 KSA
              市场深度（已经积累的商户与监管关系门槛）。GCC BNPL 市场仍处早期增长阶段，两个玩家都有绝对增长空间，短期内零和份额战的紧迫性因此降低。但如果 Tamara 的增速不能收窄与 Tabby
              在用户和商户规模上的差距，复利型网络效应差距会构成中期战略威胁。

              否决条件界定了哪些情形会实质性削弱 Tamara 的投资逻辑。SAMA 撤销牌照或正式暂停牌照是最严重的否决条件——这会让 KSA
              业务完全停摆。消费者违约率飙升，并在六个月内无法获得资金补充资本，会造成生存级信贷危机。若同时失去前三大商户关系，按典型 BNPL 商户集中度动态估计，GMV 将减少 15–30%。CEO 离任且 90
              天内未指定继任者，会打断投资者叙事并冲击治理稳定性。涉及 500,000+ 消费者且触发 PDPL 处罚的重大数据泄露，会造成规模化后很可能不可逆的声誉损害。若 Tabby 突破 50M 用户而 Tamara
              没有同比例增长，将显示网络效应劣势已不可逆。表 TR005 给出完整否决条件框架，以及每项的监测指标和评估指引。
