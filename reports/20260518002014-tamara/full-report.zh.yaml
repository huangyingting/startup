  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 消费者分层与采用
        blocks:
          - type: paragraph
            body: >-
              自 2020 年 Q3 推出以来，Tamara 的消费者基础从零增长到 2024 年在沙特阿拉伯、UAE 和巴林拥有超过 1000
              万注册购物者——约四年的复合增长，既受结构性市场顺风推动，也来自信贷供给不足人群中的产品市场契合。按消费者数量和交易量看，沙特阿拉伯是主导市场；Tamara 的创立地、最早 SAMA
              监管牌照以及最深商户网络渗透都支撑了这一点。UAE 和巴林是次级市场，Tamara 在建立沙特阿拉伯基本盘后依次扩张过去。

              消费者人口画像对 BNPL 采用非常有利。沙特阿拉伯人口年龄中位数约为 30 岁，使多数劳动年龄人口落在全球 BNPL 使用最相关的 25–40 岁区间。KSA 智能手机渗透率超过
              90%，支持移动优先产品大规模交付。沙特阿拉伯传统信用卡渗透率估计仅为成年人的 10–15%，远低于全球平均水平；这创造了一个庞大且未被充分服务的信贷人群，Tamara
              的免息分期产品为他们提供有意义的财务灵活性，不需要获得信用卡所需的传统银行关系。

              消费者对 Sharia 合规金融产品的文化偏好，进一步强化了传统有息信贷替代方案的结构性采用障碍。Tamara 由 Shariyah Review Bureau 认证，完整 BNPL
              产品套件处于零利息、零滞纳金框架下，使其在 halal 金融产品享有消费者偏好的市场中，成为受信任的伊斯兰金融方案。这种一致性不只是营销定位选择——它反映真实的消费者行为偏好，信用卡发行方和西方 BNPL
              模式若不重构收入模型，无法复制。

              消费者采用还得到低摩擦注册流程的运营支持：流程接受沙特和 UAE 国民 ID、手机号码，以及银行账户或银行卡信息；这一设计针对 GCC 特定 ID 基础设施优化，降低注册放弃率。四年内从 0 增至
              10M+，与类似阶段可比市场中观察到的高速度 BNPL 采用曲线一致；但缺少季度或年度拆分，限制了精确计算逐期增长率。活跃用户与注册用户比率没有公开披露，无法评估注册基数中真正参与使用的人群比例，而非沉睡账户。
