      - number: '3.4'
        title: Tamara 的护城河与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Tamara 的竞争护城河建立在四个结构性支柱上。第一，来自 Shariyah Review Bureau 的 Sharia 合规认证，是 GCC
              以伊斯兰金融为主导的消费者市场中的重要差异化。没有直接同业持有同等公开认证，这使其在消费者采用和机构合作决策中都成为可防守的信任信号。第二，SAMA 牌照对新的 GCC BNPL
              进入者构成监管壁垒：取得沙特中央银行 BNPL 牌照，需要满足资本充足、消费者保护基础设施和 12–24+
              个月监管审查周期。这一结构性进入壁垒，短期内能阻隔国际平台（Klarna、Afterpay）和本土初创。第三，Tamara 的 30,000+ 商户 API 集成创造了运营切换成本：已在结账环节接入 Tamara
              SDK 的商户，要迁移到竞争平台，需要投入额外工程和商业资源。多平台接入（同时集成 Tamara 和 Tabby）在技术上可行且相对常见，但它削弱而不是消除既有平台粘性。第四，Tamara
              与锚定品牌商户（IKEA、Jarir、SHEIN、H&M、L'Oréal）的关系，强化了其对沙特高端商户板块的主张。

              主要竞争风险是 Tabby 不断复合的规模优势。Tabby 用户数为 25 million，而 Tamara 为 10 million；Tabby
              拥有更高网络密度，并形成自我强化循环：更多消费者带来更多商户集成，更多商户带来更多消费者注册，而可得数据表明 2.5× 用户差距正在扩大而非收窄。Tabby Card 延伸到线下零售，是第二个结构性风险：它打开了
              Tamara 当前无法触达的支付渠道。$4.5 billion 与 $1 billion 的估值差距转化为资本获取差异，可能让 Tabby 的产品开发和商户获取速度快于 Tamara。第三个风险是 Tamara
              未公开披露 GMV 或交易量，外部无法独立验证其竞争位置是在改善还是恶化。尽调团队应优先获取 Tamara 的沙特特定 GMV、相对 Tabby
              的市场份额估计、按队列划分的复购率，以及商户独家数据。没有这些数据，竞争风险无法充分量化。
