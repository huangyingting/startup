  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: >-
              Tamara 的收入模式围绕两项已披露的主要来源：商户侧交易费和消费者订阅产品。核心机制是商户折扣率（MDR），即对每笔获批 BNPL 交易在销售点向商户收取一定比例费用。Tamara 在商户结算时收取
              MDR；消费者随后按约定期限向 Tamara 分期还款。行业分析师和 GCC 金融科技研究估计，GCC BNPL 平台 MDR 区间约为总交易额的 3–6%，与全球 BNPL 基准一致。Tamara
              未公开确认其确切 MDR 区间或按品类的定价表；本章所有 MDR 估计均来自分析师测算，需要管理层确认。

              MDR 模式在收入质量上结构性有利：收入在交易发起时确认（而不是分期期间确认），费用由商户承担、不转嫁给消费者，商户交易量扩张会直接拉动收入。不过，MDR 容易受到竞争性定价压力。Tabby 拥有 65,000+
              商户合作伙伴，约为 Tamara 网络的两倍，在商户谈判中有更大规模杠杆；若商户开始要求竞争性对齐，MDR 将承压。此外，Tamara 产品组合的期限从 Pay in Full 到 24
              个月分期不等，意味着不同期限的信用风险画像不同；更长期限可能需要更高 MDR 来补偿更长信用敞口，但分层定价未披露。

              第二项收入来源是 Smart 高级会员：首月免费后每月 SAR 19（按当前汇率约 USD 5.07）。订阅者获得返现奖励和专属商户优惠。该订阅在不违反 Tamara 符合 Sharia
              的无息、无滞纳金承诺下增加消费者侧变现，因为费用支付的是奖励服务，而不是信用准入。Smart 订阅收入可预测、可重复，部分对冲 MDR
              交易量波动。订阅人数、流失率和订阅收入贡献未披露；按当前渗透率估计，该收入相对 MDR 较小。Tamara
              的商户条款明确确认，任何产品变体均不向消费者收取利息或滞纳金。第三个潜在收入来源——数据变现、推荐费或交叉销售佣金——尚未被公司确认或描述为活跃业务。
