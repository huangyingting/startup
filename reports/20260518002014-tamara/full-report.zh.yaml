  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与核心功能
        blocks:
          - type: paragraph
            body: >-
              Tamara 面向消费者的产品组合覆盖六种不同支付体验，横跨即时付款、短期分期和中期融资需求。底座是 Pay in
              Full——单笔付款选项，消费者可以不分期完成购买；它更像结账便利产品，而不是信贷产品。分期阶梯从 Split in 2（两笔等额付款）、Split in 3（三笔等额付款）到 Split in
              4（四笔等额付款）展开；其中三期和四期分拆，是区域 BNPL 平台最典型、交易量最高的产品。针对更高客单价购买，Pay in up to 24 months 提供中期融资，相比短周期分期产品显著拉长信贷敞口。

              第六个产品是 Smart——消费者会员层级，首月免费后每月 SAR 19（约 USD 5.07）。Smart 提供现金返还奖励和独家商户优惠，而不是发放信贷；费用被设计成奖励服务付款，而非利息收费。这一
              Sharia 合规设计意味着 Smart 不构成伊斯兰金融原则下的 riba（利息），从而维持 Tamara 全产品集的 Sharia 认证。

              六个产品都可通过 Tamara 移动应用（iOS 和 Android）以及网页界面使用。产品集覆盖三个 GCC 市场：沙特阿拉伯、UAE 和巴林；鉴于 Tamara
              的创立地、监管牌照和最大注册资本基础，沙特阿拉伯是主市场。产品条款——包括所有 BNPL 变体均无利息、无滞纳金的承诺——已在 Tamara 的商户条款和消费者 FAQ 中获得合同确认。从 Pay in Full
              到 24 个月融资的宽度，让 Tamara 覆盖比纯短周期 BNPL 提供商更宽的消费者信贷谱系，但也意味着期限阶梯上的风险画像不同；公开资料并未拆分披露这些差异。
