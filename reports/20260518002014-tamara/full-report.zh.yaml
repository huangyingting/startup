      - number: '2.3'
        title: 买方分群与需求驱动因素
        blocks:
          - type: paragraph
            body: >
              GCC BNPL 的核心买方是 18–35 岁、智能手机原生的年轻城市消费者。沙特阿拉伯人口中位年龄约 30 岁，智能手机渗透率超过 90%，互联网连接度高。这一人群画像直接对应 BNPL
              的核心价值主张：无需银行信用卡，也能以可负担分期购买非必需品。GCC BNPL 支出的品类分布偏向时尚和服饰（最大单一品类）、电子和科技、家居（Tamara 与 IKEA
              的合作在该板块突出）、旅行和体验，以及美妆和个人护理。

              商户侧买方（付款方）是电商或实体零售商，他们承担 BNPL 费用，通常为交易额的 2–6%，以换取更高转化率、更高平均订单额，以及触达无法或不愿使用信用卡的更广泛消费者。IKEA、Jarir
              Bookstore、H&M、SHEIN、L'Oréal 等大型锚定商户证明了模式可行；Tamara 30,000+ 商户合作伙伴的长尾则显示市场宽度。

              文化和宗教因素让沙特阿拉伯成为对 BNPL 特别友好的市场。伊斯兰金融禁止 riba（利息）的原则，使传统信用卡在相当一部分人群中受到社会和宗教层面的排斥。BNPL 的无息、收费模式只要结构设计得当，就明确符合
              Sharia 原则，因此吸引了主动偏好 BNPL 而非信用卡的消费者群体。

              一个新生但增长中的 B2B BNPL 板块正在服务 SME 采购融资：企业通过 BNPL 平台以延期付款条款采购库存、设备和物料，填补传统贸易信用或银行贷款通常无法覆盖的小企业营运资金缺口。截至
              2024–2026 年，该板块在 GCC 仍处早期，但对 Tamara 这类已拥有商户网络的平台而言，是结构性扩张机会。

              Tabby 的数据点显示，阿联酋和沙特阿拉伯约每三名成年人中就有两名是 Tabby 注册用户，说明 BNPL 在 GCC 消费者基础中已达到极高渗透率；市场更像是快速主流化采用，而不是早期探索。
