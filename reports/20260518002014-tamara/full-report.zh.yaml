        - SAMA 公开监管登记；Tamara 官方沟通；阿联酋 / 巴林牌照文件
        - 投资逻辑立即失效；进入全面退出情景；除非牌照恢复，否则没有恢复路径
      - - 信用 / 财务
        - 消费者违约率大幅升至 SAR 515M 资本缓冲无法吸收的水平
        - 违约率要求注资，而 Tamara 无法在 6 个月内筹到资金
        - 若未来披露季度亏损报告；来自征信机构的消费者逾期信号；以受压估值紧急股权融资
        - 关注 SAMA 强制资本补足、紧急融资轮、银行家委任公告
      - - 竞争
        - Tabby 达到 50M 用户，或签下品类独家商户协议将 Tamara 排除在外
        - Tabby 注册用户超过 50M，或独家锁定 3+ 家 Tamara 前十商户
        - Tabby 公开公告；对已点名头部合作伙伴做商户结账页监测；行业媒体
        - 升级触发点：Tamara 必须证明用户同比增长 40%+，才能留在竞争区间内
      - - 运营
        - 重大数据泄露影响 500,000+ 名消费者，并引发 PDPL 处罚或 SAMA 运营限制
        - 泄露触发 PDPL 执法行动或 SAMA 运营通知
        - SAMA PDPL 执法登记；消费者投诉量；网络安全新闻监测
        - 这种规模的声誉损害很可能不可逆；评估监管回应强度和时间线
      - - 人才
        - CEO 离任后 90 天内未宣布指定继任者
        - Turki Bin Zahra 离任，且董事会 90 天内未宣布继任者
        - LinkedIn 动态；Tamara 新闻稿；投资者沟通；高管猎聘委任
        - 治理回应质量是关键信号；评估董事会独立性和投资者董事席位
      - - 宏观
        - 油价连续 12 个月以上低于 $55/barrel
        - 沙特非油 GDP 增速低于 1%；消费者收入压缩可衡量地影响 BNPL 交易量
        - 沙特 NDMO GDP 数据；SAMA 季度经济报告；IMF 沙特第四条款磋商
        - 将 Tamara 支付量趋势与宏观指标对照；确认信用损失拨备是否充足
      - - 技术
        - 平台持续宕机超过 48 小时，或 12 个月内发生六次及以上宕机
        - 商户因平台可靠性故障流失，或违反 SAMA 运营标准
        - Tamara 平台状态沟通；商户反馈；社交媒体监测；SAMA 报告
        - 平台可靠性是商户信任的基本门槛；反复宕机意味着基础设施风险
    notes: >-
      终止标准阈值是尽调团队基于标准 BNPL 平台风险框架，以及 Tamara 作为 SAMA 持牌、总部在沙特的 BNPL
      独角兽所具备的特定风险画像做出的定性评估。监测指标仅限公开可得信号；若可进入私有数据室，早期预警监测会更精确。SAR 515M 注册资本和 $340M C
      轮募资，是抵御信用风险和监管资本风险的主要财务缓冲。所有概率估计均为定性判断；正式的概率加权终止标准模型需要 Tamara 未披露的财务和运营数据。监管终止标准严重性最高；只要业务仍依赖该牌照运营，触发后就没有恢复路径。
