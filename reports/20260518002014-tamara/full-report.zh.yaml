      - number: '4.4'
        title: 财务缺口与尽调索取项
        blocks:
          - type: paragraph
            body: >-
              Tamara
              是一家私营公司，没有监管义务披露财务报表，也没有披露任何报表。由此带来的尽调约束很重：收入、GMV、盈利能力、信贷质量、资金成本和资本充足性要么只能估计，要么完全未知。本节梳理五个关键财务缺口、它们对投资决策的影响，以及需要执行的具体尽调动作。

              缺口 1 — GMV 与收入：没有经过核验的营收口径数据。分析师估计 GMV 介于 USD 1.5B–4B，收入介于 USD 45M–160M，区间宽到无法支撑估值承销。商户折扣率（MDR）尚未确认；在中性情景
              GMV（USD 2.5B）下，MDR 相差 1 个百分点，收入就相差 USD 25M。尽调路径：索取 2022–2025 年经审计利润表，按 MDR 与订阅收入拆分，并按市场和季度提供 GMV。

              缺口 2 — 信贷质量：BNPL 商业模式成败取决于消费者违约率。Tamara 没有披露应收账款账龄、损失拨备、逾期率或授信方法。2023–2024 年，疫情后信贷环境收紧，全球 BNPL
              平台违约率上升；Tamara 的敞口未知。尽调路径：索取 vintage 级别队列数据（按放款季度拆分的 30/60/90 天逾期与核销）、拨备覆盖率，以及授信评分卡文档。

              缺口 3 — 盈利能力：Tamara 是否已经产生净利润、仍在烧钱，还是接近盈亏平衡，完全未知。这一规模的高增长 BNPL 平台很可能仍在消耗资本；缺少披露的 EBITDA
              或净亏损数字，无法估算现金跑道。尽调路径：索取截至 2026 年 Q1 的管理账，包含分部 P&L 和 EBITDA 桥接表。

              缺口 4 — 资本充足性：没有应收账款数据，就无法评估 Tamara 的 BNPL 应收账款账簿与 SAR 515M 注册资本之间的关系。SAMA 可能对 BNPL
              运营商施加高于注册资本底线的风险加权资本要求；监管资本充足率未知。尽调路径：索取 SAMA 资本充足性往来文件、最新 SAMA 监管报表，以及内部资本充足性评估。

              缺口 5 — 资金成本：Tamara 银行授信额度的条款、规模、贷款方和 Sharia 结构，决定 BNPL
              放款账簿能否产生正利差。尽调路径：索取授信额度条款清单、综合资金成本测算、契约文件以及任何提款历史。确认 Sharia 合规结构是否由 Shariyah Review Bureau 或独立 Sharia
              顾问审计。

              这些缺口还被几项风险叠加放大：USD 计价融资与 SAR 计价 BNPL 业务之间的外汇错配，Tabby 规模优势带来的 MDR 压缩风险，以及全球信贷损失环境上行。Tamara
              因此属于尽调强度很高的投资机会，任何估值承销之前都必须先完成财务核验。
