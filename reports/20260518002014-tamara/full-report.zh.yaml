      - number: '7.2'
        title: 信贷与财务风险
        blocks:
          - type: paragraph
            body: >-
              Tamara 的主要财务风险是消费者信用违约——分期借款人无法或不愿按期偿还 BNPL 义务。Tamara
              面向服务不足的消费者群体，包括信用记录有限的年轻消费者，以及缺少传统银行关系的人群；这些人结构上比成熟银行借款人信贷风险更高。截至 2026 年 5 月，Tamara
              没有公开披露任何违约率、不良贷款比率或预期信用损失拨备，仅靠公开来源无法独立评估信贷风险。Tamara 是唯一没有披露任何信贷质量指标的 GCC BNPL 独角兽。

              全球 BNPL 平台在经济下行和利率上升环境中都经历过违约率上升；GCC BNPL 市场暴露于相同的信贷周期动态。Tamara 的 24 个月分期产品，相比核心 Split in 3 和 Split in 4
              产品，信贷敞口期限显著更长，因此需要不同的拨备方法，并对长期限应收账款配置更高资本。Moody's 关于 GCC
              金融机构的信贷研究强调，大宗商品出口经济体中的消费者信贷组合会受到油价冲击的周期性脆弱性影响；这一模式适用于 Tamara 的 BNPL 放款账簿。

              杠杆不透明进一步放大资本充足性风险。SAR 515M 注册资本支撑的放款账簿总规模没有披露；如果杠杆率较高（成长阶段 BNPL 平台通常如此），中等幅度的违约率上升就可能相对 SAMA
              最低要求造成资本充足性压力。Tamara 的银行授信额度对 SAIBOR 相关利率变动敏感；授信成本上升会压缩净息差。Fitch Ratings 指出，随着放款量扩大，GCC BNPL
              平台面临越来越强的资本充足性审查，应收账款资本比会成为平台进入债务市场的关键因素。

              外汇风险来自 USD 计价股权融资与 SAR 计价收入业务之间的错配。虽然 SAR/USD 汇率挂钩自 1986 年以来保持稳定，但挂钩调整风险仍是尾部情景。作为估值
              $4.5B、更大且资本更充足的竞争对手，Tabby 可能以更低成本获得资金，给 Tamara 造成结构性资金成本劣势；随着 Tabby 规模优势扩大，这一劣势可能复合放大。IMF 预计，在 Vision 2030
              下非油部门发展支撑下，沙特阿拉伯 GDP 在 2026–2027 年保持正增长，提供近期宏观缓冲；但如果油价持续低于 GCC 财政盈亏平衡水平，消费者收入会被压缩，BNPL 违约风险将实质性上升。
