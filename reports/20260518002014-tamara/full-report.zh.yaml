      - number: '3.3'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              在五个主要竞争者和一个既有替代类别之间，有几项能力维度把 Tamara 和 Tabby 与全球、区域同行区分开来。在核心支付分期结构上，Tamara 提供最宽的期限范围：Pay in 4、Split in
              2、Split in 3、Pay in Full，以及最长 24 个月的月付分期；这比 Tabby 的 12 个月上限更灵活，也达到或超过 Klarna 的全球产品。Tamara 和 Tabby
              都把产品定位为消费者零利息、零隐藏费用，符合 SAMA 牌照下的伊斯兰金融原则和 GCC 监管要求。

              Tamara 最具结构性差异的特征，是其 Shariyah Review Bureau（SRB）Sharia 合规认证，即一项正式、经审计的伊斯兰金融背书；Tabby
              没有公开确认的同等认证。在伊斯兰金融原则影响消费者金融产品偏好的市场，SRB 认证是真正的信任差异化。Tamara 还公开确认不收滞纳金；Tabby 是否同样不存在滞纳金政策，尚未得到独立确认。

              相比之下，Tabby 在线下支付能力上有明确优势：Tabby Card（Visa 联名）可在任何线下 Visa 终端启用 BNPL 式支付，把 BNPL 体验从电商延伸到实体零售。截至 2026 年，Tamara
              没有同等实体卡产品，这是大型线下零售场景中的竞争缺口。Tabby Shop 的商品发现层进一步增强生态锁定，Tamara 仅部分复制，范围未能匹配。

              商户侧，两家平台都为电商结账提供开发者 API 和 SDK 集成；Tamara 在 docs.tamara.co 披露的 API 层显示出开发者优先的集成方式。两家平台均未披露商户费用（商户折扣率）；行业基准显示
              GCC BNPL 常见 MDR 区间为 2–6%，但两家平台的实际水平均未独立验证。SplitIt 较低的 MDR（估计 1.5–3%）反映出其信用卡支持模式带来的较低承保风险。Klarna 的 GCC
              特定定价未公开披露；其全球 MDR 估计为 2–5%。沙特银行分期产品和 Postpay 定价也都没有在公开来源中完全透明。
