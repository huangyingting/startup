  - id: TM004
    title: 增长驱动与约束表
    columns:
      - 因素
      - 方向
      - 时间
      - 影响
      - 尽调事项
    rows:
      - - Saudi Vision 2030 金融科技议程
        - 增长驱动
        - 持续推进（2016–2030）
        - 政府政策拉动 BNPL 牌照申请储备和政府主导的推广项目；Fintech Saudi 主动推动行业增长
        - 核实 SAMA 当前金融科技牌照发放储备，以及是否有新的 BNPL 专项激励
      - - 信用卡渗透率低（沙特成年人约 10–15%）
        - 增长驱动
        - 结构性（多年）
        - 替代信贷产品面对大量未被服务的人群；BNPL 填补了传统银行未解决的结构性缺口
        - 获取最新 SAMA 信用卡渗透率数据；评估信用卡采用率是否上升（替代风险）
      - - 伊斯兰金融兼容性（无 riba）
        - 增长驱动
        - 结构性（永久）
        - 消除 Sharia 合规门槛；让规避计息信贷的消费者可以接受 BNPL；Tamara 的 Shariyah Review Bureau 认证具备差异化
        - 确认 Sharia 委员会监督是否持续，以及产品结构在伊斯兰金融标准演进中仍然合规
      - - 年轻中位年龄（约 30 岁）和 >90% 智能手机渗透率
        - 增长驱动
        - 结构性（人口）
        - 天然拥有数字优先消费者基础；采用周期快；不断壮大的客群在 2024–2030 年进入可选消费高峰期
        - 跟踪未来 5 年人口年龄上移曲线和数字渗透饱和阈值
      - - GCC 电商增长（约 15–20% CAGR）
        - 增长驱动
        - 持续（2024–2028）
        - BNPL 市场搭上电商可服务基础扩张；商户版图扩大，会自动增加 BNPL 结账触点
        - 确认区域电商增长指标能否作为 BNPL 市场扩张代理；评估线下零售 BNPL 能否抵消潜在电商放缓
      - - SAMA 监管收紧
        - 约束
        - 近期风险（2024–2026）
        - 资本充足率提高、消费者信用额度上限、强制接入征信局，或新增披露要求，都可能推高合规成本或压缩 BNPL 发放量
        - 向管理层索取监管路线图；监测 SAMA 征求意见文件和金融科技通函更新
      - - Tabby 规模和资本优势（竞争）
        - 约束
        - 当前且持续
        - Tabby $4.5B 估值、25M 用户和 $17B+ 年化交易量，使其具备定价杠杆和商户排他潜力；Tamara 在竞争性商户谈判中面临利润率压缩风险
        - 监测 Tamara 净商户数增长和商户流失率；评估 Tamara 合同中是否有商户排他条款
      - - BNPL 信用违约和周期风险
        - 约束
        - 周期性（衰退触发）
        - 经济下行期间 BNPL 违约率上升，会侵蚀单位经济模型并触发监管介入；Tamara 和 Tabby 都没有公开披露 GCC 信用损失率
        - 向 Tamara 索取信用损失率、放款期队列数据和准备金方法；跟踪沙特消费者征信局汇总违约指标
