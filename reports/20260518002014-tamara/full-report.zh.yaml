  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年，GCC BNPL 竞争格局呈现双寡头形态，Tamara 和 Tabby 捕获了沙特阿拉伯、阿联酋及周边市场绝大多数持牌平台交易量。总部位于利雅得的 Tabby 是主导玩家：25
              million+ 注册用户和约 $17 billion 年化交易量，使其明显领先 Tamara 的 10 million+ 注册购物用户基础。据报道，阿联酋和沙特阿拉伯约每三名成年人中就有两名是 Tabby
              注册用户，这一渗透率凸显 BNPL 进入 GCC 消费钱包的速度。不过，Tamara 以商户深度和 Sharia 合规定位宣称其在沙特领先，其 30,000+ 商户合作伙伴覆盖 GCC 最大零售品牌。

              除 Tamara 和 Tabby 外，竞争场域分为三类。第一类是全球 BNPL 领导者（Klarna、SplitIt），其产品结构显著不同，或在 GCC 消费者端存在有限。Klarna 约 85 million
              全球用户和强劲的欧洲、美国足迹，截至 2026 年尚未转化为持牌 GCC 消费 BNPL 产品；其监管缺位让它在近期不构成直接威胁。SplitIt 运营的是信用卡支持的分期模式，要求买方已持有 Visa 或
              Mastercard；其受众只与 BNPL 主要服务的 GCC 银行服务不足消费者部分重叠。第二类是区域次级玩家（Postpay、Spotii/Zip），规模更小，或在市场整合后 GCC 活动收缩。Postpay
              聚焦阿联酋商户和消费者，足迹明显更小；Spotii 被全球金融科技公司 Zip 收购后，已显著降低其独立 GCC 存在。第三类是既有替代者：沙特商业银行（Al Rajhi、SABB
              等）向现有信用卡客户提供信用卡分期产品，但这只覆盖 GCC 成年人口中的信用卡持有人子集，排除了代表 BNPL 核心增长人群的银行服务不足多数。竞争地图显示，市场集中但并未被垄断，Tamara 和 Tabby
              仍有有意义的竞争扩张空间；若 Tabby 的网络效应比 Tamara 的商户和用户增长更快复合，Tamara 将面临不对称规模风险。
