      - number: '7.4'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Tamara 平台 24/7 运行，并称具备交易监控能力；但截至 2026 年 5 月，任何公开文件都没有披露正常运行时间 SLA、历史宕机率、事件响应流程或业务连续性计划细节。GCC
              零售高峰期——斋月、沙特国庆日、White Friday 大促——发生平台宕机，可能造成重大 GMV 损失并损害商户关系。考虑到 Tamara API 基础设施与 30,000+
              商户伙伴深度集成，系统性平台故障会同时影响整个伙伴网络的商户结账，造成连锁声誉风险。公开资料没有披露任何业务连续性计划或灾难恢复能力。

              鉴于 Tamara 持有数据高度敏感，网络安全风险较高：1000 万+ 消费者的国民 ID、银行账户信息、支付卡号、购买历史和信贷决策记录。一旦发生这一规模的数据泄露，会暴露受 PDPL（Saudi
              Personal Data Protection Law）约束的 PII，引发 SAMA 监管审查，并严重损害消费者信任，且很难逆转。Dark Reading 报道称，针对 MENA
              金融服务平台的网络攻击活动正在增加，包括合成身份欺诈、账户接管和 API 层利用等 BNPL 特定向量。IBM Security Intelligence 将 BNPL
              平台视为高价值目标，因为它们同时具备实时交易量、消费者 PII 和 API 攻击面。Tamara 没有公开披露 ISO 27001 认证、SOC 2 合规状态或 PCI DSS
              认证，因此外部无法核验其安全项目成熟度。

              欺诈风险由 Tamara 直接承担：公司明确代表商户吸收所有欺诈和信贷风险，把覆盖欺诈交易作为核心商户价值主张。平台规模扩大后，部署合成身份欺诈、第一方欺诈和账户接管的有组织欺诈团伙，会形成由 Tamara
              P&L 直接吸收的不断增长的财务敞口。30,000+ 商户集成使用的 API 层如果安全不足，可能暴露交易操纵漏洞，并同时影响多个商户。

              三位联合创始人——Turki Bin Zahra（CEO）、Abdulmajeed Alsukhan（COO）和 Faisal Alsaqqaf（CTO）——带来关键人物依赖和执行风险。CEO
              一直是投资者关系和对外沟通的主要面孔；如果离任，会扰乱投资者叙事并可能触发治理担忧。公司未披露任何继任计划。Risk.net 分析将关键人物依赖和第三方技术集中列为成长阶段 BNPL
              平台尽调中的首要运营风险。第三方云基础设施依赖——平台托管、支付处理伙伴、银行集成 API——造成不在 Tamara 直接控制之下的运营风险；服务商身份和 SLA 条款均未披露。
