  - id: TE005
    title: 产品路线图表（推断和估计）
    columns:
      - 项目
      - 时间窗口
      - 证据依据
      - 置信度
      - 战略逻辑
      - 尽调问题
    rows:
      - - 店内 POS 渠道扩张（加深实体零售覆盖）
        - 近期（6–18 个月）
        - 当前 POS 集成已确认；沙特实体零售可触达空间大；运营岗位招聘释放信号
        - 中
        - 沙特实体零售相对电商仍然庞大；POS 扩张可在不进入新市场的情况下拉动 GMV
        - 确认当前 POS 终端部署数量和商户覆盖；新增店内商户签约储备
      - - 进入更多 GCC 市场
        - 中期（12–36 个月）
        - 沙特→阿联酋→巴林的顺序扩张模式；与 Vision 2030 对齐；科威特、卡塔尔、埃及是合乎逻辑的下一批市场
        - 低
        - 邻近 GCC 市场的 BNPL 监管框架相似，穆斯林消费者人口结构接近；可复用现有平台
        - 确认是否已在科威特、卡塔尔或埃及提交 BNPL 牌照申请；提供市场进入时间表
      - - 扩展电商平台集成
        - 近期（3–12 个月）
        - 开发者文档已确认集成支持；商户要求即插即用选项，竞争上也必须补齐
        - 高
        - 降低集成摩擦可加快获商；更广的平台支持是 BNPL 的标准增长杠杆
        - 列出当前支持的所有电商平台；确认 2026 年新增平台插件发布路线图
      - - Smart 订阅规模化与功能扩展
        - 近期至中期（6–24 个月）
        - Smart 已上线；返现 / 奖励基础设施已到位；可自然向增长中的消费者基数增购
        - 中
        - 经常性订阅收入分散对 MDR 的依赖；奖励生态积累数据和互动护城河
        - 披露当前 Smart 订阅用户数；确认新增 Smart 功能路线图（例如高级信贷访问、保险）
      - - 相邻金融科技产品发布（个人金融、保险、储蓄）
        - 长期（24–48 个月）
        - 从金融服务平台愿景推断；Goldman Sachs 参与暗示资本市场轨迹
        - 低
        - 借助消费者信任和交易数据推出相邻产品，是 BNPL 平台走向超级 App 的标准演进路径
        - 确认 Tamara 是否已持有或正在申请 BNPL 以外的保险、储蓄或借贷产品牌照
      - - AI/ML 信用模型增强
        - 持续
        - 实时信用决策是平台核心；竞争上必须投入；全球 BNPL 同行正大举投资 ML 信用模型
        - 中
        - 更准确的信用模型可降低损失率和误拒率，改善单位经济和消费者通过率
        - 披露信用模型是否使用第三方征信数据、自有行为数据或两者兼用；确认模型刷新节奏
      - - B2B BNPL 或 SME 信贷产品
        - 长期（36–60 个月）
        - 全球 BNPL 正转向 B2B 分期；Tamara 的商户关系提供自然的 SME 切入口
        - 低
        - 商户数据可见性和既有关系带来分发优势；GCC 的 SME 信贷市场规模大且供给不足
        - 确认是否有任何 B2B 产品处于开发或监管评估中；确认 SAMA 牌照范围是否覆盖 B2B 信贷
    notes: >-
      该路线图完全由公开信号推断和估计；截至 2026 年 5 月，Tamara 未发布正式产品路线图。所有时间窗口估计和置信度评级均代表分析师根据招聘模式、公开公告、竞争动态和行业基准作出的推断，并非公司已确认计划。近期 =
      6–18 个月；中期 = 12–36 个月；长期 = 24–60 个月。尽调问题被设计为管理层沟通中的确认性问题。任何投资人若要用路线图项目构建投资逻辑，都应直接向 Tamara 管理层确认每一项，并要求提供正式产品路线图文件。
