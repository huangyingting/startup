      - number: '8.3'
        title: 情景分析——乐观、基准与悲观
        blocks:
          - type: paragraph
            body: >-
              三个离散情景刻画了投资者以 August 2024 Series C 延展轮确立的 $1B 估值标记或接近该价格进入时，可能结果的分布。

              乐观情景（概率：20–25%）假设 Tamara 成功兑现 Vision 2030 顺风：用 Series C 资金激进获客，到 2027 年把注册购物者扩大到 18–22M；借 UAE、Bahrain 和
              Egypt 扩张把商户网络做到 50,000+；依靠 MDR 规模经济在 2026 年底前实现 EBITDA 盈亏平衡；并为战略收购或 GCC fintech IPO 做好位置，退出估值达到
              $2.5–4B。在该情景下，Goldman Sachs 的参与催化 Tadawul 上市或双重上市流程；按接近 Tabby 的每用户倍数，并因 #2 位置打 30% 折扣，隐含退出估值为
              $2.5B–$3.5B。乐观情景要求 SAMA 不出现重大监管扰动，且信贷质量保持在计划范围内。

              基准情景（概率：50–55%）假设 Tamara 巩固为 Tabby 之后的 #2 GCC BNPL 运营商，到 2027 年增至 13–15M 注册用户，维持商户网络并温和扩张，同时在 2027
              年底前维持中性到略正的 EBITDA 轨迹。通过增量融资轮或部分老股交易，估值保持在 $1B–$1.5B 区间；在战略 M&A 情景下，完整退出可达到 $1.5–2B。基准情景意味着 Series C 投资者若以
              $1.5B 退出、持有 4–5 年，资本回报约 1.5–2×——考虑风险画像，这一回报偏平淡。

              悲观情景（概率：20–25%）设想 Tabby 获得品类独家商户协议或达到 5× 用户规模，SAMA 施加显著更高的资本要求、迫使 Tamara 稀释性增发，同时消费者违约率上升，把 Tamara 的 MDR
              经济性压到资本成本以下。在该情景下，Tamara 下一轮融资以平轮或下轮估值完成。最可能的结果是 $300–$500M 的困境老股交易或结构化退出，意味着以接近 $1B 估值标记进入的 Series C
              投资者亏损 50–70%。
