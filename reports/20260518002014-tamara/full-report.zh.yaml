      - number: '2.2'
        title: 市场规模测算：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              多个规模测算口径把 GCC BNPL 机会锚定在不同的地理和产品颗粒度上。最宽口径下，GCC 电商市场总商品交易额预计到 2026 年约达 $50 billion，这是可被 BNPL
              兼容支出抽取的总可用市场（TAM）上限。并非所有电商支出都适合 BNPL：杂货、公用事业等大宗商品化支出和微交易，很少在结账时使用 BNPL。若按 BNPL
              兼容商户品类调整，主要包括时尚、电子、家居、旅行和美妆，GCC B2C 可触达板块估计约为 $30–35 billion。

              多个行业来源估计，GCC BNPL 垂直的可服务市场（SAM）到 2026 年为 $25–30 billion，代表在当前监管和商户采用环境下，现实中可经持牌 BNPL 平台流转的总交易量。受电商快速扩张和
              BNPL 在结账方式中份额上升驱动，MENA BNPL 的复合年增长率约为 20–30%。

              沙特阿拉伯是 Tamara 运营足迹中最大的单一市场，估计 2024 年 BNPL GMV 为 $5–7 billion，按当前渗透率约占 GCC SAM 的 20–25%。BNPL 在 MENA
              电商支付中的份额已从 2020 年约 2% 增至 2024 年大约 8–10%，四年内渗透率提升约四倍。若渗透率到 2026 年继续升至 15–20%，与澳大利亚（约 20%）等成熟市场一致，仅沙特 BNPL
              市场就可能接近 $9–12 billion。

              Tamara 的可获取市场（SOM）覆盖其三个运营市场：沙特阿拉伯、阿联酋和巴林。Tamara 未公开披露 GMV；公司的 10M+ 注册购物用户和 30,000+ 商户合作伙伴表明，其在沙特 $5–7B
              市场中拥有重要但未披露的份额。Tabby 披露的 $17B+ 年化交易量覆盖其多市场足迹，可作为 GCC BNPL 平台合计交易量的上限代理。

              估算之间存在矛盾：部分分析师报告称 2023 年 MENA BNPL 市场仅为 $2–3B，这意味着基数更保守、增长路径慢于 $5–7B 的沙特单一市场估计。差异来自方法论基础不同：部分报告只统计持牌平台
              GMV，另一些则包含非正式分期安排。两类估算及其限制都保留在规模测算表中。
