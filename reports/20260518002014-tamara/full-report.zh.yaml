      - number: '1.5'
        title: 里程碑时间线
        blocks:
          - type: paragraph
            body: >
              Tamara 从创立到跻身独角兽大约用了四年，期间快速扩张地域和产品，并连续完成融资。公司于 2020 年 Q3 在沙特阿拉伯启动商业化，当时市场尚无正式 BNPL 监管；SAMA 在 2021 年推出 BNPL
              监管框架，为 Tamara 完全持牌运营提供法律基础，也使其成为沙特首批合规运营商之一。

              2021 年 9 月的 Series A（$110M）是 Tamara 第一个重要机构融资节点，随后公司在 2022 年 1 月完成 $150M Series B。地域扩张随之推进：Tamara 大约在 2022
              年进入阿联酋，2023 年进入巴林，形成 GCC 三市场布局。Smart 高级会员产品上线，是重要的产品多元化节点，在核心商户费模式之外增加订阅收入。

              2024 年 8 月的 Series C 延展轮（$340M）是决定性里程碑，使公司以 $1B+ 估值获得独角兽地位，并巩固了 Tamara 作为沙特领先 BNPL 平台的位置。2024 年同时达到 10
              million+ 购物用户和 30,000+ 商户合作伙伴，显示其已经取得规模。SAMA 牌照 95/A Sh/202502 的签发和正式化，以及 SAR 515M
              注册资本，标志着监管成熟和资本充足得到认可，也让 Tamara 在中期具备潜在 IPO 或进一步区域扩张的基础。
