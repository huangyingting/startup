      - number: '4.3'
        title: 单位经济与盈利路径
        blocks:
          - type: paragraph
            body: >-
              Tamara 未公开披露单位经济。以下所有定量估计均来自分析师报告、公开基准，以及基于已披露运营指标的结构性推断；应视为情景输入，而非经验证的经营数据。缺少审计财务报表或管理层披露，使本节天然带有估算性质。

              毛收入方面，主要驱动因素是作用于总 GMV 的 MDR。基于 10M+ 注册购物用户、按 GCC 零售基准估算的 USD 150–400 平均订单额（AOV），以及每名活跃购物用户每年 2–4
              笔交易的假设，Tamara 2024 年年化 GMV 估计在 USD 1.5B–4B 区间。对该 GMV 区间应用 3–6% 混合 MDR，得到年化 MDR 收入估计约 USD 45M–160M。中性情景（USD
              2.5B GMV、3.5% 混合 MDR）意味着约 USD 87.5M 年化 MDR 收入。Smart 订阅收入是增量来源；假设有 500,000 名订阅者按 SAR 19/月（约 USD
              5/月）付费，年订阅收入约 USD 30M，相对 MDR 低情景具有重要性，但相对中性情景较为温和。Tamara 未确认订阅人数或订阅收入贡献。

              盈利路径取决于四个相互作用的变量：（1）MDR 收益稳定性，即 Tamara 能否在 Tabby 更大商户网络和未来价格发现的竞争压力下维持 3–6% MDR 区间；（2）信用损失率，全球成熟市场 BNPL
              行业经验显示坏账率为发放额的 1–5%，但 GCC 特定费率未公开；若在中性 GMV 情景下出现 2% 坏账，年信用损失约 USD 50M，会把净 MDR 压到接近零；（3）信贷额度资金成本，符合 Sharia
              的 murabaha 或 wakala 结构，其实际综合成本可能高于传统循环信贷额度；（4）运营杠杆，即交易量能否比风控、技术、合规和客户运营等固定运营成本增长更快。全球 BNPL
              同业在达到规模盈利前，增长阶段普遍报告显著运营亏损；Tamara 没有就盈利能力或亏损状态提供指引。

              $340M Series C 带来有意义的资本现金跑道，但应收账款融资与运营费用覆盖之间的拆分未披露。Goldman Sachs 进入以及 $1B+
              估值释放出投资者对资本效率型盈利路径的信心，但缺少可独立佐证该观点的财务数据。按所采用收入估计不同，$1B 估值隐含收入倍数约为 6× 至 22×；该区间过宽，无法支撑独立估值承销判断。
