      - number: '5.3'
        title: 信任、合规与安全
        blocks:
          - type: paragraph
            body: >-
              Tamara 的合规基础设施围绕三根支柱搭建：Saudi Central Bank（SAMA）牌照、Sharia 认证，以及 AML/KYC 流程。SAMA 金融科技牌照（No. 95/A
              Sh/202502）授权 Tamara Finance Company 在 SAMA 监管框架下作为 BNPL 提供商运营；该框架于 2021 年推出时，是全球较早专门面向 BNPL 的监管框架之一。SAMA
              监管对费用透明、投诉处理和信用资格披露提出监管报告义务、资本充足性要求（体现在 SAR 515M 注册资本中）和消费者保护标准。

              Sharia 合规由国际认可的 Sharia 顾问机构 Shariyah Review Bureau 认证。认证覆盖完整产品套件，确认 Tamara 的所有产品——包括 24 个月分期选项和 Smart
              订阅——都不违反伊斯兰金融对 riba（利息）或 gharar（过度不确定性）的禁令。Sharia 认证是 Tamara 在沙特阿拉伯和 GCC 的关键竞争差异点，因为多数消费者对有息信贷产品存在宗教偏好约束。

              安全基础设施包括 24/7 交易监控，Tamara 在安全页面上明确强调这一点。这意味着它具备全天候运营覆盖的实时欺诈检测能力。SAMA 要求所有持牌金融机构执行 AML/KYC
              流程，覆盖消费者身份验证、制裁筛查和可疑交易报告。Tamara 的隐私政策规定消费者数据如何被收集、处理和存储，并在 2021 年生效的沙特 Personal Data Protection
              Law（PDPL）框架下运行。

              一个明显限制是，Tamara 的公开文档中没有披露任何第三方安全审计、SOC 2 认证、ISO 27001 认证或渗透测试报告。全球可比规模的金融科技同行通常会发布安全审计认证，以建立机构商户信心。Tamara
              面向公众的文档缺少这类披露，机构商户在上线尽调时可能会把它作为缺口提出。
