  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与方法
        blocks:
          - type: paragraph
            body: >-
              Tamara 的估值必须放在私募市场语境下判断：公司没有披露审计财务、年度 GMV、收入、信贷损失率，也没有披露盈利指标。截至 May 2026，August 2024 Series C 延展轮（融资
              $340M）确立的 $1B+ 投后估值，是唯一得到确认的估值锚。其他估值输入都来自公开信息：用户规模、可比公司指标和行业 MDR
              基准。本章采用三套主要估值框架，并用四家可比公司交叉校验，框定一个合理的公允价值区间。

              GMV 倍数法按企业价值 / GMV 口径，把 Tamara 与区域和全球 BNPL 同业对标。最接近的 GCC 可比公司 Tabby，在 $4.5B 估值和 $17B+ 年化交易量下，对应 GMV 倍数约
              0.26×；Klarna 在 $14.6B 估值和 $80B+ GMV 下，对应约 0.18×。将这些倍数套用到 Tamara 估计 $1.5–4B 的 GMV，得到 $270M–$1.04B 区间。要撑住
              $1B 独角兽标记，Tamara 必须接近 GMV 估计上沿，并在该框架下拿到最高可比倍数。

              收入倍数法使用估计 MDR 收入 $50M–$160M（以 3–6% MDR 作用于 $1.5–4B 估计 GMV 区间得出），并套用 BNPL 板块 5–15× 收入倍数，符合全球成长期 BNPL
              平台在私募市场的定价。所得 $250M–$1.5B 区间覆盖 $1B 独角兽标记，但只有高端情形支持它——意味着 GMV 接近 $4B，收入倍数约 10×。10×
              收入倍数只有在平台增长轨迹强、盈利路径清晰且本市场没有主导竞争对手时才站得住；Tamara 部分满足这些条件，但尚未完全证实。

              用户估值法把 Tamara 的 10M+ 注册购物者，对标 Tabby 在 $4.5B 估值下的 25M 用户（即每用户 $180）。考虑 Tamara 规模更小、验证程度更低，施加 20–60%
              规模折价后，隐含估值为 $720M–$1.8B。$1B 独角兽标记接近该区间中点，需要约每注册用户 $100——较 Tabby 每用户估值折价 44%。这是最支持当前估值的框架，但规模折价本身带有判断色彩。

              SAMA 注册资本 SAR 515M（~USD 137M）提供监管资本底线，但不是独立估值驱动因素。Goldman Sachs 参与 Series C 延展轮，释放出潜在 IPO 顾问授权信号，说明 $1B
              标记可能是在考虑资本市场退出路径的情况下谈成的。Affirm 的公开市值 $8–12B、GMV $80B+，对应 0.10–0.15× 公开市场 GMV 倍数——显著低于支撑 Tamara
              当前估值的私募市场倍数——意味着未来任何 IPO 相对 Series C 私募标记都很可能出现倍数压缩。
