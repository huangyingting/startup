      - number: '1.3'
        title: 融资历程与资本结构
        blocks:
          - type: paragraph
            body: >
              2021 至 2024 年间，Tamara 通过三轮融资累计募集约 $400 million 股权资金，并在 2024 年 8 月以 $1 billion+
              估值跻身独角兽。公司的资本形成路径显示，国际机构投资者和沙特政府关联基金持续验证其价值，也表明 Tamara 与沙特 Vision 2030 金融部门发展目标高度契合。

              Series A（$110M，2021 年 9 月）由 Checkout.com 共同领投，参投方包括 Coatue Management、Endeavor Catalyst 和 Shorooq
              Partners，既带来金融科技行业背书，也带来 MENA 地域经验。Series B（$150M，2022 年 1 月）由 Sanabil Investments（Saudi Aramco
              关联主权投资载体）领投，SNB Capital（Saudi National Bank 投资部门）和 Colony Capital 参投，反映沙特机构资本的深度投入。Series C 延展轮（$340M，2024
              年 8 月）再次获得 Sanabil Investments 和 Colony Capital 支持，并引入 Goldman Sachs，确认其独角兽地位，也为 Tamara 进一步区域扩张和产品开发补足弹药。

              从正式口径看，Tamara Finance Company 按其 SAMA 监管资产负债表及官方法律文件披露，注册资本为 SAR
              515,000,000。这一资本基础支撑其放贷和信用业务，并满足监管资本充足要求。沙特政府关联投资方（Sanabil/Aramco、SNB
              Capital）的集中度既是战略资产，可带来监管善意和网络资源，也可能带来治理层面的关注点，需要独立尽调投票权和保护性条款。
