      - number: '6.2'
        title: 商户基础与具名验证
        blocks:
          - type: paragraph
            body: >-
              Tamara 的商户网络覆盖 30,000+ 合作伙伴，横跨时尚、家居、电子产品、图书、杂货和奢侈品等消费者品类。具名企业商户部署的广度，为平台生产就绪度和商户价值主张提供了跨品类验证。官方 Tamara
              商户页面和独立商户网站支付选项披露确认的具名伙伴包括 IKEA Saudi Arabia（家居与家具）、Jarir Bookstore（电子产品与文具）、SHEIN（快时尚）、Al-Othaim（杂货与
              FMCG）、H&M（服装）、L'Oréal（美妆）、LEGO（玩具）、Puma（运动服饰）、The Luxury Closet（奢侈品转售）和 Ounass（奢侈品多品牌市场）。

              这份具名商户名单横跨五个不同消费者品类：家居与家具（IKEA）、时尚与服装（SHEIN、H&M、Puma）、奢侈品（The Luxury
              Closet、Ounass）、消费品与美妆（L'Oréal、LEGO），以及食品与杂货（Al-Othaim）。同时覆盖奢侈品和大众市场值得注意——奢侈品部署（Ounass、The Luxury
              Closet）显示平台能够支持需要更高额度和更长期限的大额交易，大众市场部署（SHEIN、H&M、Al-Othaim）则证明平台能处理较低客单价下的高频交易。

              Tamara 的商户价值主张包含三部分：（i）预先全额结算——交易发生时，商户从 Tamara 收到扣除商户折扣率（MDR）后的全额购买价，消除应收账款风险；（ii）欺诈与信贷风险转移——Tamara
              明确代表商户吸收所有欺诈和信贷损失风险；以及（iii）转化率和 AOV 提升——Tamara 声称可提高商户转化率和平均订单价值（AOV），这与全球 BNPL 行业基准中可比 BNPL 集成带来 10–30%
              AOV 提升的观察一致。

              下方商户验证表仅填入已确认的生产部署。截至 2026 年 5 月，Tamara 尚未发布正式商户案例研究，也没有披露特定商户伙伴的量化结果数据。单个商户部署证据来自 Tamara
              官方商户页面、独立商户支付选项页面和新闻报道。没有任何商户被确认独家使用 Tamara；多 BNPL 部署（同一商户结账页同时提供 Tamara 与 Tabby 或其他 BNPL 提供商）在 GCC
              电商生态中很常见。
