  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Tamara 持有 SAMA 牌照编号 95/A Sh/202502，依据 Saudi Central Bank 于 2021 年推出的 BNPL 监管框架签发。SAMA
              保留收紧资本充足性要求、施加额外消费者保护规则、强制增强信用局报告，或撤销运营牌照的权力。2021 年 BNPL
              框架确立了最低资本门槛、行为标准和消费者披露义务；后续修订可能对费用结构、产品期限上限或放款集中度上限引入约束。Bank for International Settlements 关于将 BNPL
              视为消费者信贷的指引——要求审慎监管并对 BNPL 应收账款进行风险加权——正在全球演进；如果 SAMA 采纳与 BIS 对齐的框架，Tamara 放款账簿的资本占用会增加。

              Tamara 在 UAE 和巴林的跨境业务，需要分别获得 Central Bank of the UAE（CBUAE）和 Central Bank of
              Bahrain（CBB）的监管批准。要在三个央行辖区保持有效合规，会增加开销，也放大不利监管变化影响运营的触点。如果 CBUAE 或 CBB 政策偏离 SAMA
              路径——例如更严格的消费者披露义务或更低费用上限——Tamara 可能需要针对具体市场调整产品设计，增加复杂度和成本。

              沙特阿拉伯 Vision 2030 金融科技议程总体支持数字支付创新，但也可能引入开放银行义务、Personal Data Protection
              Law（PDPL）下的数据本地化要求，或带有合规成本的金融普惠授权。SAMA 有在市场扩张后作出监管回应的先例——2021 年 BNPL 框架本身就是在市场发展加速后推出的。如果 SAMA 提高 BNPL
              运营商最低资本要求，Tamara 可能需要额外融资；若发生在不利市场环境中，估值可能被稀释。

              向 SIMAH（Saudi Credit Bureau）报告消费者信用，是近期监管风险。如果 SAMA 要求将 BNPL 分期义务上报
              SIMAH，消费者信用评分会受影响，信用敏感消费者群体的需求可能下降。Tamara 的 Sharia 合规、零费用模式与 SAMA
              消费者保护意图有一定结构性一致——无利息、无滞纳金减少了执法触点——但这一优势不延伸到审慎资本或报告要求。截至 2026 年 5 月，公开来源中未发现针对 Tamara 的监管处罚。
