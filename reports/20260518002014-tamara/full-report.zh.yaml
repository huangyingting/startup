  - id: TI003
    title: 单位经济模型表
    columns:
      - 指标
      - 数值或估计
      - 置信度
      - 重要性
      - 尽调要求
    rows:
      - - 商品交易总额（GMV）— 2024 年年化
        - USD 1.5B–4.0B（估计；未披露）
        - 低
        - 核心规模输入；决定 MDR 收入绝对值和总信用敞口
