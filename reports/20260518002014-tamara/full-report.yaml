    title: Tamara Valuation Range by Methodology
    type: range
    layout: standard
    summary: >-
      Range chart showing the low, mid, and high estimates from four independent valuation frameworks. The $1B unicorn
      mark sits above the mid-case of three of the four frameworks, consistent with a STRETCHED but not indefensible
      valuation stance.
