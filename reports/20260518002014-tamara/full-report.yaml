      - number: '6.5'
        title: Competitive Context and Customer Gap
        blocks:
          - type: paragraph
            body: >-
              Tabby is Tamara's primary competitor in the GCC BNPL market and presents a materially larger customer
              footprint on both the consumer and merchant side as of 2026. Tabby has publicly reported approximately 25
              million registered users — approximately 2.5 times Tamara's 10 million+ shopper base — and has claimed
              that "two out of three adults in the UAE and KSA" use Tabby. Tabby's merchant network of 65,000+ brands is
              approximately twice the size of Tamara's 30,000+ merchant base. This scale differential is the most
              material customer-side competitive risk for Tamara: in a two-sided marketplace, larger consumer reach
              attracts larger merchant bases and vice versa, creating compounding network effects that can widen the gap
              over time if Tamara's growth rate does not exceed Tabby's.

              Tabby achieved its $4.5 billion valuation in a 2024 Series D, substantially above Tamara's $1B+ unicorn
              valuation. The valuation differential reflects — among other factors — the consumer and merchant scale
              difference. Tabby also offers the Tabby Card (a rewards-linked card product), extending its consumer
              engagement model beyond pure BNPL into a broader spending and rewards ecosystem, analogous to Tamara's
              Smart subscription but with a different delivery mechanism.

              Tamara's competitive response to the scale gap has not been publicly articulated in detail. Potential
              differentiation strategies include: Sharia-compliance positioning (Tamara holds explicit SRB certification
              whereas Tabby's Sharia compliance positioning is less prominent); merchant depth in specific categories;
              geographic stronghold in KSA where Tamara was among the earliest SAMA-licensed BNPL operators; and Smart
              subscription as a loyalty-and-retention moat that Tabby's model does not directly replicate. However,
              these are inferred strategic advantages rather than confirmed competitive data.

              The consumer and merchant data gaps for Tamara are significant from a diligence perspective. Critical
              unknown metrics include: monthly active users vs registered users; cohort retention rates; GMV per active
              consumer; top-merchant revenue concentration; Smart subscriber count and LTV; and the rate of consumer
              growth in 2024–2025 relative to Tabby's growth rate in the same period. These gaps prevent a definitive
              assessment of whether Tamara's consumer economics justify its valuation relative to Tabby and global BNPL
              peers.
