      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple sizing lenses anchor the GCC BNPL opportunity at distinct levels of geographic and product
              specificity. At the broadest level, GCC total e-commerce market gross merchandise value is estimated to
              reach approximately $50 billion by 2026, representing the upper-bound total addressable market (TAM) from
              which BNPL-compatible spend is drawn. Not all e-commerce spend is BNPL-compatible: groceries, commodity
              utilities, and micro-transactions rarely carry BNPL at checkout. Adjusting for BNPL-compatible merchant
              categories — primarily fashion, electronics, home goods, travel, and beauty — yields an estimated B2C
              addressable segment of approximately $30–35 billion across the GCC.

              The serviceable addressable market (SAM) for the GCC BNPL vertical is estimated by multiple industry
              sources at $25–30 billion by 2026, representing the total transaction volume that could realistically
              route through licensed BNPL platforms under the current regulatory and merchant adoption environment. MENA
              BNPL is growing at a compound annual growth rate of approximately 20–30%, driven by rapid e-commerce
              expansion and BNPL's rising share of checkout methods.

              Saudi Arabia, the largest single market within Tamara's operating footprint, is estimated to account for
              $5–7 billion in BNPL GMV in 2024 — approximately 20–25% of the GCC SAM at current penetration rates.
              BNPL's share of total MENA e-commerce payments has grown from approximately 2% in 2020 to roughly 8–10% by
              2024, a fourfold penetration gain in four years. If penetration continues to 15–20% by 2026 — consistent
              with developed markets such as Australia (~20%) — the Saudi BNPL market alone could approach $9–12
              billion.

              Tamara's serviceable obtainable market (SOM) spans its three operating markets: Saudi Arabia, UAE, and
              Bahrain. No public GMV figure has been disclosed by Tamara; the company's 10M+ registered shoppers and
              30,000+ merchant partners suggest a material but undisclosed share of the Saudi $5–7B market. Tabby's
              disclosed annualized transaction volume of $17B+ across its multi-market footprint provides a ceiling
              proxy for combined GCC BNPL platform volume.

              Contradictory estimates exist: some analyst reports cite the MENA BNPL market as only $2–3B in 2023, which
              would imply a more conservative base and slower growth trajectory than the $5–7B Saudi-only estimate
              suggests. The discrepancy reflects different methodological bases — some reports count only licensed
              platform GMV while others include informal installment arrangements. Both estimates are preserved in the
              sizing table with their respective limitations.
