  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Context and Methodology
        blocks:
          - type: paragraph
            body: >-
              Tamara's valuation must be assessed through a private-market lens: the company has disclosed no audited
              financials, no annual GMV figure, no revenue, no credit loss rate, and no profitability metric. The $1B+
              post-money valuation established by the August 2024 Series C extension ($340M raised) is the sole
              confirmed valuation anchor as of May 2026. All other valuation inputs are estimated from publicly
              available information on user base size, comparable company metrics, and industry MDR benchmarks. This
              chapter applies three primary valuation frameworks, cross-checked against four comparable companies, to
              bracket a plausible fair-value range.

              The GMV multiple approach benchmarks Tamara against regional and global BNPL peers on an
              enterprise-value-to-GMV basis. Tabby, the closest GCC comparable, implies a GMV multiple of approximately
              0.26× at its $4.5B valuation and $17B+ annualized transaction volume; Klarna implies approximately 0.18×
              at a $14.6B valuation against $80B+ GMV. Applying these multiples to Tamara's estimated GMV of $1.5–4B
              generates a range of $270M–$1.04B. The $1B unicorn mark requires Tamara to be at or near the upper GMV
              estimate and the highest comparable multiple for this framework to close.

              The revenue multiple approach uses estimated MDR revenue of $50M–$160M (derived from a 3–6% MDR applied to
              the $1.5–4B estimated GMV range) and applies BNPL sector revenue multiples of 5–15×, consistent with
              private-market pricing of growth-stage BNPL platforms globally. The resulting range of $250M–$1.5B
              brackets the $1B unicorn mark but only supports it at the high end — implying GMV toward $4B and a revenue
              multiple of approximately 10×. A 10× revenue multiple is defensible only for a platform with a strong
              growth trajectory, visible path to profitability, and no dominant in-market competitor — conditions that
              are partially met but not fully confirmed for Tamara.

              The user-based valuation benchmarks Tamara's 10M+ registered shoppers against Tabby's 25M users at $4.5B
              (implying $180 per user). Applying a 20–60% scale discount for Tamara's smaller and less-proven scale
              yields an implied valuation of $720M–$1.8B. The $1B unicorn mark sits near the midpoint of this range,
              requiring approximately $100 per registered user — a 44% discount to Tabby on a per-user basis. This is
              the most supportive framework for the current valuation, though scale discount quantification is
              inherently judgmental.

              SAMA-registered capital of SAR 515M (~USD 137M) provides a regulatory capital floor but is not a
              standalone valuation driver. Goldman Sachs' participation in the Series C extension signals a potential
              IPO advisory mandate, suggesting the $1B mark was negotiated with a capital-markets exit pathway in mind.
              Affirm's public market capitalization of $8–12B with $80B+ GMV implies a 0.10–0.15× public-market GMV
              multiple — materially below the private-market multiples supporting Tamara's current valuation —
              indicating likely multiple compression at any eventual IPO relative to the Series C private mark.
