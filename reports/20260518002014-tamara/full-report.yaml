      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Financial Opacity Prevents Independent Valuation Underwriting
            body: >-
              Every valuation framework in this chapter rests on estimated, not confirmed, financial inputs. Tamara has
              disclosed no GMV, revenue, credit loss rate, or profitability metric as of May 2026. The $1B unicorn
              valuation is the only confirmed anchor; all range analysis depends on estimated comparables and assumed
              MDR rates. A 3× revenue estimate uncertainty range ($50M–$160M) directly translates into a 6× valuation
              range ($250M–$1.5B) under the revenue multiple framework. No institutional investor should commit capital
              at or above $1B without access to audited financial statements confirming revenue, credit quality, and a
              forward operating plan.
