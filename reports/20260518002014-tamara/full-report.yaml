  - id: FV001
    title: Recommendation Decision Logic
    type: flow
    layout: standard
    summary: >-
      Decision flow showing the logical path from public-information analysis of Tamara through the valuation framework,
      comparable analysis, and risk assessment to the TRACK recommendation at HIGH risk and STRETCHED valuation stance.
      The flow identifies the key upside and downside gates that would upgrade or downgrade the recommendation.
    data:
      nodes:
        - id: entry
          label: 'Entry: Series C ~$1B valuation'
          detail: August 2024 Series C extension; $340M raised; post-money ~$1B+
          tone: neutral
        - id: market-check
          label: GCC BNPL Market Check
          detail: Vision 2030 tailwinds; SAMA-licensed duopoly; growing cashless payment penetration
          tone: positive
        - id: comparable-check
          label: Comparable Analysis
          detail: Tabby $4.5B / 25M users; Klarna $14.6B / 85M users; Affirm $8-12B public
          tone: neutral
        - id: valuation-range
          label: Blended Valuation Range
          detail: GMV multiple $270M-$1.0B; Revenue multiple $250M-$1.5B; User-based $720M-$1.8B
          tone: neutral
        - id: financial-opacity
          label: Financial Opacity Gate
          detail: No audited financials; no GMV; no revenue; no credit loss data disclosed
          tone: warning
        - id: competitive-check
          label: 'Competitive Check: Tabby'
          detail: 2.5x users; 2.2x merchants; 4.5x valuation — dominant scale advantage
          tone: warning
        - id: risk-assessment
          label: 'Risk Assessment: HIGH'
          detail: Credit opacity + Tabby dominance + SAMA regulatory risk + financial opacity
          tone: warning
        - id: recommendation
          label: TRACK — Score 6/10 — Stretched
          detail: Monitor for financial disclosure or competitive repositioning before BUY
          tone: neutral
        - id: upgrade-trigger
          label: Upgrade Trigger → BUY
          detail: Audited financials (GMV >$3B, EBITDA positive) OR user gap closure to 60% of Tabby
          tone: positive
        - id: downgrade-trigger
          label: Kill Criterion → EXIT
          detail: SAMA licence restriction OR down-round <$750M OR Tabby merchant exclusivity
          tone: negative
      edges:
        - from: entry
          to: market-check
          label: GCC context assessment
        - from: market-check
          to: comparable-check
          label: Benchmark to peers
        - from: comparable-check
          to: valuation-range
          label: Apply sector multiples
        - from: valuation-range
          to: financial-opacity
          label: 'Gate: can we underwrite?'
        - from: financial-opacity
          to: competitive-check
          label: Cannot independently verify
        - from: competitive-check
          to: risk-assessment
          label: Tabby scale gap identified
        - from: risk-assessment
          to: recommendation
          label: HIGH risk + STRETCHED valuation
        - from: recommendation
          to: upgrade-trigger
          label: If upside trigger met
        - from: recommendation
          to: downgrade-trigger
          label: If kill criterion triggered
  - id: FV002
    title: Valuation Comparison — Tamara vs. Peers
    type: bar
    layout: standard
    summary: >-
      Bar chart comparing Tamara's current $1B unicorn valuation against bull and bear scenario estimates and key BNPL
      sector comparable valuations. Illustrates that Tamara's current mark sits at 22% of Tabby's valuation and 7% of
      Klarna's — the scale gap the bull case requires closing to support a materially higher exit.
    data:
      items:
        - label: Tamara (current)
          value: 1000
          unit: USD M
