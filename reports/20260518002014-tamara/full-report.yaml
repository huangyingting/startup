          - type: callout
            title: Tabby Scale Advantage Is the Dominant Valuation Constraint
            body: >-
              The most important fact in Tamara's valuation analysis is not Tamara's own financials — it is Tabby's.
              Tabby's $4.5B valuation at 25M users and $17B+ GMV establishes the ceiling for what the GCC BNPL market
              will pay for a dominant platform. Tamara, operating in the same jurisdiction with an equivalent product at
              40% of Tabby's user scale, is structurally priced as the #2 player. Until Tamara either closes the scale
              gap with Tabby or differentiates its product meaningfully, the base-case valuation ceiling is
              approximately $1.5B. The bull case at $2.5–4B requires Tamara to functionally approach Tabby's scale —
              which requires Tabby to stop growing at the same time.
            calloutType: insight
            claimRefs:
              - CV015
              - CV027
              - CV028
