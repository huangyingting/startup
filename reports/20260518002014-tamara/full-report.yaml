      - number: '6.4'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Tamara's geographic expansion has followed a sequential, single-market-at-a-time pattern: Saudi Arabia at
              launch (Q3 2020), followed by UAE, then Bahrain. Saudi Arabia remains the dominant market by consumer
              count and transaction volume, creating a structural revenue concentration risk in a single regulatory
              jurisdiction. SAMA oversight of Saudi operations means regulatory changes in KSA — including BNPL
              framework revisions, MDR caps, or capital adequacy adjustments — would disproportionately affect Tamara's
              business relative to a more geographically diversified operator.

              The 30,000+ merchant base has not been publicly disaggregated by merchant revenue contribution. It is
              standard for BNPL platforms globally to exhibit meaningful revenue concentration among the top 20–50
              merchants, particularly when enterprise brands (IKEA, SHEIN, H&M) represent disproportionate transaction
              volumes relative to long-tail SME merchants. Tamara has not disclosed whether any single merchant accounts
              for more than 10% of GMV. This merchant revenue concentration risk is unresolvable from public sources and
              represents a key private-evidence diligence ask.

              On the consumer side, no public data exists on Tamara's consumer spending distribution — specifically
              whether the top decile of consumers by transaction frequency or basket value accounts for a
              disproportionate share of GMV (a common pattern in consumer fintech where power users drive outsized
              economics). Consumer geographic concentration within Saudi Arabia amplifies the single-market regulatory
              risk noted above.

              Tamara's land-and-expand mechanism on the consumer side operates through the Smart subscription tier:
              higher-engagement consumers are incentivised to upgrade to Smart, increasing per-consumer revenue beyond
              the transactional MDR-sharing economics. On the merchant side, Tamara's API and POS integration depth
              creates switching friction that supports merchant retention once deployed, though multi-BNPL deployment by
              the same merchant is common and limits checkout exclusivity. Future expansion opportunities include
              additional GCC markets (Kuwait, Qatar, Egypt), deeper in-store POS penetration within existing markets,
              and category expansion into travel and services where BNPL adoption is nascent but growing.
