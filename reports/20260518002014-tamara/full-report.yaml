          tone: warning
        - label: Tabby (GCC comp)
          value: 4500
          unit: USD M
          detail: $4.5B valuation; 25M users; $17B+ annualised TV; same SAMA jurisdiction
          tone: neutral
        - label: Affirm (public comp)
          value: 10000
          unit: USD M
          detail: 'NASDAQ: AFRM; $8-12B market cap range; public market multiple 4-6x revenue'
          tone: neutral
