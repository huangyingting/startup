      - - Downside — WATCH
        - CEO Turki Bin Zahra departs without named successor within 90 days
        - Watch / Review
        - CEO departure announcement with no Board-confirmed successor within 90-day window
        - LinkedIn activity; Tamara press releases; Reuters / Bloomberg executive monitoring
        - Place thesis under active review; assess Board independence; hold position pending successor confirmation
      - - Downside — WATCH
        - SAMA issues sector-wide BNPL capital adequacy enhancement or credit quality mandate
        - Watch / Review
        - SAMA consultation paper or formal circular on BNPL capital or SIMAH reporting requirements
        - SAMA regulatory consultation portal; Finextra / Fintech Global BNPL sector reporting; Moody's GCC notes
        - Request Tamara management brief on capital adequacy headroom; escalate to EXIT if confirmed breach
    notes: >-
      Thesis-break triggers are qualitative assessments by the diligence team based on identified risk factors,
      comparable BNPL market dynamics, and Tamara-specific public information as of May 2026. Upside triggers require
      confirmed primary evidence — audited financials, official press releases, or regulatory filings — not news
      speculation. Kill criteria should be monitored quarterly at minimum. All monitoring signals rely on publicly
      available information; private data room access would enable more precise early-warning indicators. The two
      highest-priority downside triggers are SAMA licence restriction (irreversible, immediate impact) and a down-round
      below $750M (signals fundamental valuation re-rating requiring full thesis reassessment).
    claimRefs:
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
  - id: TV006
    title: Final Diligence Asks
    columns:
      - priority
      - ask-category
      - specific-request
      - why-it-matters
      - format-requested
    rows:
      - - P0 — Blocking
        - Audited financials
        - >-
          Audited income statements FY2022–FY2025; balance sheet with receivables breakdown; cash flow statement;
          management commentary on GMV, revenue, and EBITDA bridge
        - >-
          Without financial statements the $1B valuation cannot be independently underwritten. Every valuation multiple
          in this chapter is estimated. This is the single most critical diligence gap.
        - Audited IFRS or Saudi GAAP financials; external auditor identity and unqualified opinion letter
      - - P0 — Blocking
        - Credit quality data
        - >-
          NPL ratio; 30/60/90-day delinquency by product and vintage cohort FY2022–FY2025; charge-off rate; ECL
          provision amount and coverage ratio; underwriting scorecard summary
        - >-
          Credit loss is the primary earnings driver for BNPL. A 2% charge-off on $2.5B GMV implies $50M in annual
          credit losses that could eliminate all MDR net margin. Unknown credit quality is a binary risk.
        - Vintage-level cohort data table; management discussion of credit cycle management and provisioning methodology
      - - P1 — Material
        - GMV and revenue confirmation
        - >-
          Quarterly GMV by market (KSA, UAE, Bahrain) FY2023–FY2025; realized weighted-average MDR; Smart subscription
          revenue; total revenue reconciliation by stream
        - >-
          MDR revenue estimates carry a 3× uncertainty range ($50M–$160M). Confirmed GMV and MDR allows valuation
          frameworks to be refined from estimated to grounded figures.
        - Management-prepared GMV bridge; segment P&L by market and product; MDR fee schedule or weighted-average MDR
      - - P1 — Material
        - SAMA compliance and capital adequacy
        - >-
          Current capital adequacy ratio versus SAMA minimum requirement; most recent SAMA examination results; any SAMA
          remediation plans or formal correspondence; licence conditions and amendment history
        - >-
          SAMA regulatory risk is the primary kill criterion. Capital adequacy headroom and absence of historical SAMA
          concerns are essential before committing capital.
        - SAMA licence grant letter; most recent SAMA compliance self-assessment; capital adequacy ratio calculation
      - - P1 — Material
        - Cap table and governance
        - >-
          Complete capitalization table post-Series C; liquidation preference waterfall; investor rights agreement;
          board composition and independent director count; consent thresholds for key decisions
        - >-
          Series C investors need to know their position in the priority stack, governance rights, and anti-dilution
          protections given the $400M+ already deployed at various price points.
        - Cap table in Excel; investor rights agreement; board charter or terms of reference
      - - P2 — Important
        - Merchant concentration analysis
        - >-
          GMV contribution by top-10 merchants as percentage of total GMV; merchant churn rate; average merchant tenure;
          any exclusivity or multi-year agreements in place
        - >-
          Merchant concentration is unquantifiable without HHI data. If top-5 merchants represent >50% of GMV,
          single-merchant defection to Tabby exclusivity creates material revenue risk.
        - Merchant HHI report; anonymized top-10 merchant GMV contribution; average merchant contract tenure data
      - - P2 — Important
        - 2026 operating plan and fundraising
        - >-
          Board-approved 2026 operating plan; GMV target and user acquisition plan; CAC by channel; cash runway analysis
          against Series C deployment schedule; any planned Series D timeline
        - >-
          Series C proceeds provide runway but the deployment plan determines whether the $1B valuation can be grown
          into. A credible 2026 plan enables scenario probability re-weighting.
        - Board-approved 2026 business plan; Series C use-of-proceeds breakdown; fundraising timeline
      - - P2 — Important
        - Credit facility terms
        - >-
          All banking credit facility term sheets; total committed and drawn facility amounts; all-in pricing over
          SAIBOR; maturity schedule; financial covenants; Sharia compliance audit letters
        - >-
          Cost of capital on credit facilities determines net MDR yield. Unknown facility terms prevent assessment of
          whether Tamara's economics are structurally viable at current scale.
        - Term sheets or facility summaries; utilization schedule; covenant compliance certificate; Sharia audit letter
    notes: >-
      Diligence asks are ranked P0 (blocking — cannot form investment opinion without), P1 (material — significantly
      affects valuation and risk assessment), and P2 (important — required for a complete investment thesis but not
      independently blocking). All P0 asks must be satisfied before any investment decision can be made. This table
      assumes a standard private equity or growth equity diligence process with virtual data room access. Management
      presentations and Q&A sessions should accompany the data package to clarify methodology and provide forward
      guidance. Additional asks will likely emerge from the data room review process itself.
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
