  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The GCC BNPL competitive landscape as of 2026 is a duopoly-shaped market, with Tamara and Tabby capturing
              the vast majority of licensed platform volume across Saudi Arabia, the UAE, and neighbouring markets.
              Tabby, headquartered in Riyadh, is the dominant player: more than 25 million registered users and
              approximately $17 billion in annualized transaction volume place it significantly ahead of Tamara's 10
              million+ registered shopper base. Approximately two out of every three adults in the UAE and Saudi Arabia
              are reported to be registered Tabby users — a penetration rate that underscores the pace at which BNPL has
              entered GCC consumer wallets. Tamara, however, claims the leading position in KSA by merchant depth and
              Sharia compliance positioning, and its 30,000+ merchant partners span the largest GCC retail brands.

              Beyond Tamara and Tabby, the competitive field divides into three categories. First, global BNPL leaders
              (Klarna, SplitIt) with materially different product structures or limited GCC consumer presence. Klarna's
              approximately 85 million global users and strong European and US footprints have not translated into a
              licensed GCC consumer BNPL offering as of 2026; its regulatory absence removes it as a direct near-term
              threat. SplitIt operates a credit-card-backed installment model that requires the buyer to already hold a
              Visa or Mastercard — an audience that overlaps only partially with the underbanked GCC consumer segment
              that BNPL primarily addresses. Second, regional secondary players (Postpay, Spotii/Zip) with smaller scale
              or diminished GCC activity following market consolidation. Postpay focuses on UAE merchants and consumers
              and has a materially smaller footprint; Spotii was acquired by global fintech Zip and has significantly
              reduced its standalone GCC presence. Third, incumbent substitutes: Saudi commercial banks (Al Rajhi, SABB,
              and others) that offer credit-card installment products to existing credit-card-holding customers — a
              subset of the GCC adult population that excludes the underbanked majority who represent BNPL's core growth
              segment. This competitor map reflects a market that is concentrated but not monopolised, leaving
              meaningful competitive runway for both Tamara and Tabby, while creating asymmetric scale risk if Tabby's
              network effects compound faster than Tamara's merchant and user growth.
