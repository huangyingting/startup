      - number: '3.3'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >-
              Across the five primary competitors and one incumbent substitute category, several capability dimensions
              distinguish Tamara and Tabby from global and regional peers. On core payment installment structure, Tamara
              offers the broadest tenor range: Pay in 4, Split in 2, Split in 3, Pay in Full, and monthly installments
              up to 24 months — more flexible than Tabby's 12-month ceiling and competitive with or exceeding Klarna's
              global offerings. Both Tamara and Tabby position their products as zero-interest and zero-hidden-fees for
              consumers, consistent with Islamic finance principles and GCC regulatory requirements under SAMA
              licensing.

              Tamara's most structurally distinctive feature is its Shariyah Review Bureau (SRB) Sharia compliance
              certification — a formal, audited Islamic finance endorsement that Tabby does not hold as a publicly
              confirmed equivalent. In a market where Islamic finance principles govern consumer financial product
              preferences, SRB certification is a genuine trust differentiator. Tamara also maintains a publicly
              confirmed no-late-fee policy; Tabby's equivalent policy has not been independently confirmed as absent.

              In contrast, Tabby holds a clear advantage on physical payment capability: its Tabby Card (Visa co-brand)
              enables BNPL-style payments at any physical Visa terminal, extending the BNPL experience from e-commerce
              to brick-and-mortar. Tamara has no equivalent physical card product as of 2026, which is a competitive gap
              in the large in-store retail segment. Tabby Shop's product discovery layer represents a further ecosystem
              lock-in capability Tamara partially replicates but does not match in scope.

              On the merchant side, both platforms offer developer APIs and SDK integrations for e-commerce checkout;
              Tamara's documented API layer at docs.tamara.co demonstrates a developer-first integration approach.
              Merchant fees (merchant discount rates) are undisclosed by both platforms; industry benchmarks suggest a
              2–6% MDR range typical of GCC BNPL, but this has not been independently verified for either platform.
              SplitIt's lower MDR (estimated 1.5–3%) reflects its lower underwriting risk given the credit-card-backed
              model. Klarna's GCC-specific pricing is not publicly disclosed; its global MDR is estimated at 2–5%.
              Neither Saudi bank installment products nor Postpay's pricing is fully transparent in public sources.
