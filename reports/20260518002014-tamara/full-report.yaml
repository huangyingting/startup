      - number: '4.2'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Tamara has raised approximately $400M in equity across four confirmed rounds, building a capital base
              commensurate with its unicorn valuation and its credit-funded BNPL lending operations. The seed round of
              approximately $6M in 2020 provided initial runway for platform development and Saudi Arabia merchant
              onboarding. The Series A of $110M in September 2021, co-led by Checkout.com and Coatue Management, was
              among the largest MENA early-stage fintech rounds at the time and validated Tamara's commercial traction
              in under twelve months of operations. The Series B of $150M in January 2022, led by Sanabil Investments (a
              Saudi Aramco-affiliated investment vehicle), embedded Tamara within Saudi Arabia's Vision 2030 investment
              ecosystem, adding strategic government-linked capital and political goodwill. The Series C extension of
              $340M in August 2024, completed at a $1B+ valuation, confirmed unicorn status and was the largest single
              BNPL fundraise in MENA to date. Repeat participants Sanabil Investments and Colony Capital were joined by
              Goldman Sachs — whose entry at unicorn stage signals potential future capital-markets mandate and IPO
              advisory positioning.

              From a regulatory capital perspective, Tamara Finance Company's SAMA-registered capital is SAR 515,000,000
              (~USD 137M), as disclosed in the legal footer of its official press releases page and required by SAMA's
              prudential framework for licensed BNPL operators. This registered capital floor must be maintained as a
              minimum buffer. The total equity raised (~$400M+) substantially exceeds registered capital, with the
              surplus deployed across BNPL receivables funding, operational build-out, and three-market geographic
              expansion. Tamara funds its BNPL book through credit facilities from banking partners rather than retail
              deposits, a structure that is both SAMA-compliant and Sharia-consistent when structured on a murabaha or
              wakala basis. The size, cost, lenders, and covenants of these facilities are not publicly disclosed.

              The capital adequacy picture contains a material diligence gap: while SAR 515M registered capital
              satisfies SAMA's minimum requirement, the actual capital adequacy ratio relative to Tamara's receivables
              book is unknowable without receivables size and credit loss rate data. A high-growth BNPL platform
              deploying hundreds of millions of dollars in new originations quarterly must maintain capital buffers
              capable of absorbing unexpected credit-loss spikes. Without the receivables portfolio size and loss rate,
              independent capital adequacy assessment is not possible. The foreign currency mismatch between
              USD-denominated equity rounds and SAR-denominated BNPL operations creates an FX translation risk that
              compounds balance-sheet opacity.
