      - number: '7.3'
        title: Competitive and Market Risks
        blocks:
          - type: paragraph
            body: >-
              Tamara's most material competitive risk is Tabby's dominant scale advantage. Tabby reports approximately
              25 million registered users and a $4.5 billion valuation as of mid-2024, compared to Tamara's 10 million+
              users and approximately $1 billion unicorn valuation — a 2.5x user gap and 4.5x valuation gap. Tabby's
              network effect advantage compounds over time: a larger consumer base attracts more merchant partnerships,
              which attract more consumers, potentially widening the gap if Tamara's relative growth rate lags. The
              Fintech Times and regional industry publications characterise Tabby as the dominant GCC BNPL operator,
              positioning Tamara as the second-place incumbent facing an uphill competitive trajectory.

              Saudi banks represent a structural competitive threat that Tabby does not fully replicate. Banks including
              Al Rajhi, SNB (Saudi National Bank), and Riyad Bank offer MADA-based installment products and consumer
              credit tools that compete for consumer wallet share, leveraging existing customer relationships,
              deposit-funded cost of capital, and regulatory familiarity. Bank installment products typically carry
              interest charges incompatible with Sharia-compliance norms in the same way Tamara's zero-fee model
              satisfies them, providing a product differentiation moat that partially offsets the bank structural
              advantage in distribution and cost.

              Klarna and other global BNPL operators have not entered the GCC market at scale as of May 2026; regulatory
              barriers to new SAMA BNPL licensing provide near-term protection. Multi-BNPL merchant deployment — where
              the same merchant simultaneously offers both Tamara and Tabby at checkout — is common across GCC
              e-commerce, meaning Tamara faces direct per-transaction consumer selection competition at every eligible
              checkout. No exclusivity agreements have been confirmed in public sources, and merchant-switching inertia
              is limited to API re-integration effort rather than contractual lock-in.

              Merchant concentration risk is amplified by competitive dynamics. If Tamara's top merchant partners —
              which may include IKEA, SHEIN, or Jarir based on named merchant evidence — were to switch exclusively to
              Tabby or a bank alternative, GMV could drop significantly. No merchant GMV concentration data (HHI or
              top-merchant share) is available publicly, making it impossible to size this risk from external sources.
              Tamara's $1B valuation at approximately 4.5x below Tabby's $4.5B reflects investor perception of the
              competitive gap and constrains Tamara's ability to use equity as currency for aggressive growth
              investment. The GCC BNPL market is early-stage and both players can grow in absolute terms as market size
              expands, but network effects in two-sided platforms tend to compound scale advantages over time.
