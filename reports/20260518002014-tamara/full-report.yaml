  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Tamara operates under SAMA license number 95/A Sh/202502, issued under the Saudi Central Bank's BNPL
              regulatory framework introduced in 2021. SAMA retains the authority to tighten capital adequacy
              requirements, impose additional consumer protection rules, mandate enhanced credit bureau reporting, or
              revoke operating licences. The 2021 BNPL framework established minimum capital thresholds, conduct
              standards, and consumer disclosure obligations; subsequent amendments could introduce constraints on fee
              structures, product tenor limits, or lending concentration caps. Bank for International Settlements
              guidance on treating BNPL as consumer credit — requiring prudential oversight and risk-weighting of BNPL
              receivables — is evolving globally; SAMA adoption of BIS-aligned frameworks would increase capital charges
              for Tamara's lending book.

              Tamara's cross-border operations in the UAE and Bahrain require separate regulatory approvals from the
              Central Bank of the UAE (CBUAE) and the Central Bank of Bahrain (CBB). Maintaining active compliance
              across three central bank jurisdictions creates overhead and multiplies the surfaces on which adverse
              regulatory developments could affect operations. A divergence in CBUAE or CBB policy from SAMA's approach
              — for example, stricter consumer disclosure obligations or lower fee caps — could require market-specific
              product design changes, increasing complexity and cost.

              Saudi Arabia's Vision 2030 fintech agenda is directionally supportive of digital payment innovation but
              may also introduce open banking obligations, data localisation requirements under the Personal Data
              Protection Law (PDPL), or financial inclusion mandates that carry compliance costs. SAMA has a precedent
              of regulatory response to market scale-up — the 2021 BNPL framework itself was introduced after market
              development accelerated. An increase in SAMA's minimum capital requirements for BNPL operators could
              require Tamara to raise additional equity at potentially dilutive valuations if required during an adverse
              market environment.

              Consumer credit reporting to SIMAH (Saudi Credit Bureau) represents a near-term regulatory risk. If SAMA
              mandates that BNPL installment obligations be reported to SIMAH, consumer credit scores would be affected
              and demand from credit-sensitive consumer segments could fall. Tamara's Sharia-compliant, zero-fee model
              provides some structural alignment with SAMA consumer protection intent — the absence of interest and late
              fees reduces the enforcement surface — but this advantage does not extend to prudential capital or
              reporting requirements. No regulatory sanctions against Tamara have been identified in publicly available
              sources as of May 2026.
