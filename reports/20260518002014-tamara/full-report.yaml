      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              Tamara was co-founded by three individuals who bring complementary expertise in financial technology,
              operations, and engineering. Turki Bin Zahra, the CEO and Co-Founder, brings substantial fintech
              experience from his prior role at STC Pay (Saudi Telecom Company's digital payments arm) and consumer
              goods experience from Procter & Gamble. His combination of domestic market knowledge and large-scale
              operational experience positioned him well to build a market-leading BNPL platform in Saudi Arabia and is
              a central figure in Tamara's investor relations and public communications.

              Abdulmajeed Alsukhan, the COO and Co-Founder, oversees technology and operational functions. His
              background in tech and operations has been central to scaling Tamara's platform infrastructure and
              merchant integrations to serve over 30,000 partner merchants. Faisal Alsaqqaf, the CTO and Co-Founder,
              leads engineering and product development, having built Tamara's core technology stack including its
              credit underwriting, payment processing, and API infrastructure that underpins both online and in-store
              transactions.

              The governance structure reflects Tamara's incorporation as a regulated joint-stock company under direct
              SAMA supervision, with Commercial Registration No. 1010627663 and Unified No. 7016874419. The founding
              team's combined domain expertise across payments, technology, and operations represents a strong
              founder-market fit for the GCC BNPL opportunity. Key-person concentration risk on the CEO is a notable
              governance consideration given his prominence in investor narratives and media engagement.
