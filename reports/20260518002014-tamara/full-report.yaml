      - number: '4.4'
        title: Financial Gaps and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Tamara is a private company with no regulatory obligation to publish financial statements and has
              disclosed none. The resulting diligence constraints are severe: revenue, GMV, profitability, credit
              quality, cost of capital, and capital adequacy are all estimated or entirely unknown. This section
              catalogs the five material financial gaps, their investment-decision relevance, and the specific diligence
              actions required.

              Gap 1 — GMV and Revenue: No verified top-line figure exists. Analyst estimates span USD 1.5B–4B for GMV
              and USD 45M–160M for revenue, a range too wide for valuation underwriting. The MDR rate is unconfirmed; a
              1-percentage-point difference across the mid-case GMV (USD 2.5B) changes revenue by USD 25M. Diligence
              path: request audited income statements for 2022–2025, segmented by MDR and subscription, with GMV by
              market and quarter.

              Gap 2 — Credit Quality: BNPL business models live and die on consumer default rates. Tamara has disclosed
              nothing about receivables aging, loss provisioning, delinquency rates, or underwriting methodology. Global
              BNPL platforms faced rising defaults in 2023–2024 as post-pandemic credit conditions tightened; Tamara's
              exposure is unknown. Diligence path: request vintage-level cohort data (30/60/90-day delinquency and
              charge-off by origination quarter), provision coverage ratio, and underwriting scorecard documentation.

              Gap 3 — Profitability: Whether Tamara is generating net income, burning cash, or approaching breakeven is
              entirely unknown. A high-growth BNPL platform of this scale is likely burning capital; the absence of a
              disclosed EBITDA or net loss figure prevents runway estimation. Diligence path: request management
              accounts through Q1 2026 with segment-level P&L and EBITDA bridge.

              Gap 4 — Capital Adequacy: The relationship between Tamara's BNPL receivables book and its SAR 515M
              registered capital cannot be assessed without receivables data. SAMA may impose risk-weighted capital
              requirements on BNPL operators beyond the registered capital floor; the regulatory capital adequacy ratio
              is unknown. Diligence path: request SAMA capital adequacy correspondence, the latest SAMA regulatory
              return, and the internal capital adequacy assessment.

              Gap 5 — Cost of Capital: The terms, size, lenders, and Sharia structure of Tamara's banking credit
              facilities determine whether the BNPL lending book can generate positive carry. Diligence path: request
              the credit facility term sheets, all-in cost computation, covenant documentation, and any drawdown
              history. Confirm whether the Sharia compliance structure is audited by the Shariyah Review Bureau or a
              separate Sharia advisor.

              Compounding these gaps, the FX mismatch between USD-denominated funding and SAR-denominated BNPL
              operations, the MDR compression risk from Tabby's scale advantage, and the rising global credit loss
              environment make Tamara a high-diligence-intensity investment opportunity where financial verification is
              prerequisite to any valuation underwriting.
