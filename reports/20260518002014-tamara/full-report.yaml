  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Core Features
        blocks:
          - type: paragraph
            body: >-
              Tamara's consumer-facing product portfolio spans six distinct payment experiences, covering immediate,
              short-term installment, and medium-term financing needs. The foundation is Pay in Full — a single-payment
              option allowing consumers to complete a purchase without installments, which serves as a checkout
              convenience product rather than a credit product. The installment ladder begins with Split in 2 (two equal
              payments), Split in 3 (three equal payments), and Split in 4 (four equal payments) — the three-part and
              four-part splits being the highest-volume BNPL products typical of regional BNPL platforms. For
              larger-value purchases, Pay in up to 24 months provides medium-term financing, extending credit exposure
              significantly relative to the short-cycle split products.

              The sixth product is Smart — a consumer membership tier priced at SAR 19 per month (approximately USD
              5.07) after the first month free. Smart delivers cashback rewards and exclusive merchant offers rather
              than credit extension, structuring the fee as a rewards service payment rather than an interest charge.
              This Sharia-compliance design choice means Smart does not constitute riba (interest) under Islamic finance
              principles, preserving Tamara's Sharia certification across its full product set.

              All six products are available through Tamara's mobile application (iOS and Android) and web interface.
              The product set is available across three GCC markets: Saudi Arabia, UAE, and Bahrain, with Saudi Arabia
              as the primary market given Tamara's founding, regulatory licensing, and largest registered capital base.
              Product terms — including the no-interest, no-late-fee commitment across all BNPL variants — are
              contractually confirmed in Tamara's merchant terms and consumer FAQ. The breadth from Pay in Full to
              24-month financing positions Tamara across a wider consumer credit spectrum than a pure short-cycle BNPL
              provider, but also implies differentiated risk profiles across the tenor ladder that are not publicly
              disaggregated in available sources.
