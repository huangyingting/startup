  - id: section-buyer-segments
    title: Buyer Segments and Demand Drivers
    body: >
      The primary BNPL buyer in the GCC is a young, smartphone-native urban consumer
      aged 18–35. Saudi Arabia's median age is approximately 30 years, with over
      90% smartphone penetration and high internet connectivity. This demographic
      profile maps directly onto BNPL's core value proposition: affordable installments
      for discretionary purchases, without the need for a bank credit card. The
      category distribution of GCC BNPL spending skews toward fashion and apparel
      (the largest single category), electronics and technology, home furnishings
      (a segment where Tamara's partnership with IKEA is prominent), travel and
      experiences, and beauty and personal care.

      The merchant-side buyer (payer) is an e-commerce or physical retailer absorbing
      BNPL fees — typically 2–6% of transaction value — in exchange for higher
      conversion rates, increased average order values, and access to a broader
      addressable consumer base who cannot or prefer not to use credit cards. Large
      anchor merchants (IKEA, Jarir Bookstore, H&M, SHEIN, L'Oréal) demonstrate
      the model's viability; the long tail of Tamara's 30,000+ merchant partners
      shows market breadth.

      Cultural and religious factors create a uniquely favorable BNPL environment
      in Saudi Arabia. The Islamic finance principle of prohibiting riba (interest)
      makes conventional credit cards socially and religiously disfavored by a
      significant share of the population. BNPL's no-interest, fee-based model
      is explicitly compatible with Sharia principles when structured correctly,
      creating a consumer segment that actively prefers BNPL over credit cards.

      A nascent but growing B2B BNPL segment addresses SME procurement financing:
      businesses use BNPL platforms to purchase inventory, equipment, and supplies
      with deferred payment terms, filling a working capital gap that traditional
      trade credit or bank lending often leaves unaddressed for small businesses.
      This segment is still early-stage in the GCC as of 2024–2026 but represents
      a structural expansion opportunity for platforms like Tamara with existing
      merchant networks.

      Tabby's data point that approximately two out of every three adults in the
      UAE and Saudi Arabia are registered users of Tabby illustrates the extraordinary
      penetration already achieved in the GCC consumer base, suggesting the market
      is in rapid mainstream adoption rather than early-stage discovery.
