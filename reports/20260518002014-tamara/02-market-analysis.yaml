  - id: section-competitive-overview
    title: Competitive Landscape Overview
    body: >
      The GCC BNPL market is effectively a two-player contest between Tamara and
      Tabby, with secondary competition from smaller regional operators and global
      BNPL platforms exploring GCC entry. Tabby, founded in 2019 and operating
      primarily in Saudi Arabia and the UAE, is Tamara's closest and most direct
      competitor: it reported 25 million registered users, over 65,000 brand
      partnerships, and annualized transaction volume exceeding $17 billion as of
      2024–2025. Tabby's most recent valuation was $4.5 billion, significantly
      exceeding Tamara's $1 billion+ unicorn valuation, reflecting Tabby's earlier
      market entry and larger disclosed user base.

      Postpay (UAE-based) operates as a smaller BNPL platform focused on the UAE
      market with a similar no-interest installment model. SplitIt provides a
      global BNPL product that leverages existing Visa/Mastercard credit lines
      rather than new credit origination — a different model less directly competing
      with Tamara in GCC consumer BNPL. Klarna, the global BNPL market leader
      from Sweden with multi-hundred-million global users, has not yet mounted a
      significant direct presence in the GCC BNPL market as of 2026, though its
      potential entry represents a long-term competitive risk.

      Tamara's competitive advantages within the GCC include SAMA licensing and
      regulatory compliance history, deep Saudi merchant network (30,000+), Sharia
      certification, and local team expertise. Tabby's competitive advantages
      include greater user scale, higher disclosed transaction volume, and richer
      capital base. The competitive dynamics of this market will be analyzed in
      detail in Chapter 3 (Competitors).
