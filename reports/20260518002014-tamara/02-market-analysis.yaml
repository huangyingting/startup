  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: tamara-market-share
      missingEvidence: >-
        Tamara has not publicly disclosed its GMV, BNPL transaction volume, or
        implied market share within the Saudi Arabia or GCC BNPL market. No
        third-party audited data is available to independently size Tamara's
        portion of the $5–7B KSA BNPL market.
      whyItMatters: >-
        Without Tamara's GMV or market share data, it is impossible to assess
        whether Tamara is gaining or losing competitive position against Tabby,
        what its revenue base implies, or whether the $25–30B GCC SAM translates
        into a credible economic opportunity at Tamara's current scale.
      diligencePath: >-
        Request GMV by market and quarter (KSA, UAE, BHR separately), transaction
        count, and average order value through the VDR or via direct management
        request. Benchmarking against Tabby's disclosed $17B+ annualized volume
        would provide a relative market share estimate.
      relatedQuestionRefs: [QM025]

    - type: private-evidence-only
      severity: material
      topic: bnpl-credit-loss-rates
      missingEvidence: >-
        Neither Tamara nor Tabby has publicly disclosed BNPL credit loss rates,
        default rates, receivables aging data, or reserve methodology for their
        GCC consumer portfolios. No GCC BNPL credit performance benchmarks from
        SAMA or independent rating agencies are publicly available.
      whyItMatters: >-
        BNPL platforms carry consumer credit risk as the primary operating risk;
        default rates directly determine unit economics, capital adequacy requirements,
        and resilience to economic downturns. Without credit performance data, the
        addressable market's economic quality cannot be assessed.
      diligencePath: >-
        Request vintage-level credit loss cohort data, reserve methodology, credit
        bureau integration approach, and Saudi consumer credit default benchmarks
        from SAMA from Tamara's management or data room.
      relatedQuestionRefs: [QM026]

    - type: contradicting-estimates
      severity: moderate
      topic: market-sizing-range
      missingEvidence: >-
        Market sizing estimates for KSA and MENA BNPL range from $2–3B (conservative,
        licensed platforms only) to $5–7B for Saudi Arabia alone (broader estimates
        that may include informal installments), creating a 2–3x range of uncertainty
        in the true market size. No authoritative methodology or audited market
        measurement has reconciled these estimates.
      whyItMatters: >-
        A $2–3B MENA market versus a $5–7B Saudi-only market implies fundamentally
        different market growth trajectories and different potential market shares for
        Tamara. The contradictory estimates cannot be reconciled from public sources.
      diligencePath: >-
        Request Tamara management's internal view of total KSA BNPL market size
        and the basis for their estimate; cross-reference against SAMA aggregate
        transaction reporting data if accessible.
      relatedQuestionRefs: [QM027]

