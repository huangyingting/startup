  - id: section-comparable-valuation
    title: Comparable Company Valuation Analysis
    body: >-
      The comparable valuation analysis draws on four reference companies: Tabby (GCC
      direct comparable), Klarna (global BNPL leader, IPO-stage), Affirm (US public BNPL,
      NASDAQ: AFRM), and SplitIt (small-cap public BNPL). Together these four provide a
      bracketed view of where BNPL platforms are priced across scale, geography, and
      business model, informing both the current fair-value range and the implied exit
      multiple under each scenario.

      Tabby is the most relevant comparable. As a Saudi Arabia and UAE BNPL operator
      licensed under SAMA and operating an identical Sharia-compliant model, Tabby's
      metrics establish the ceiling for what the GCC market will pay for a dominant
      BNPL platform. At a $4.5B valuation, 25M registered users, and $17B+ annualized
      transaction volume, Tabby implies $180 per registered user and approximately 0.26×
      GMV. Applying these multiples to Tamara with a 40–55% scale discount for the #2
      market position and 2.5× smaller user base generates a comparable-adjusted range
      of $810M–$1.35B — bracketing the $1B unicorn price but providing limited upside
      from current entry.

      Klarna provides the global scale reference. At approximately $14.6B valuation
      (reflecting pre-IPO and IPO-range reports through mid-2025), 85M+ users, and $80B+
      GMV, Klarna implies $172 per user and approximately 0.18× GMV. While Klarna's
      US-heavy geography and non-Sharia model limit direct comparability, its margin
      profile and revenue multiple inform the upper bound of the BNPL sector distribution.
      Klarna's IPO trajectory also provides a plausible template for Tamara's Goldman
      Sachs-assisted exit pathway, though Saudi Arabia's domestic capital markets lack
      equivalent depth for a fintech listing of Tamara's current scale.

      Affirm (NASDAQ: AFRM) provides a public market check at a materially different
      scale. With a market capitalization in the $8–12B range depending on trading
      conditions, $80B+ annual GMV, and revenue of approximately $2B, Affirm implies
      a 4–6× revenue multiple in the public market — a significant compression from the
      10–15× private-market multiples that characterised 2021 BNPL valuations. The Affirm
      data point suggests that public markets will apply a more conservative multiple at
      any eventual Tamara IPO than the current Series C private mark implies, creating
      a structural headwind for exit valuation. SplitIt, at a ~$100M market cap, represents
      the tail of the BNPL distribution and serves to confirm the floor of BNPL multiple
      compression for under-scale platforms.

      On a blended basis, the four comparable frameworks (GMV multiple, revenue multiple,
      user-based, and comparable-adjusted) produce a central estimate of $700M–$1.1B for
      Tamara, with the $1B unicorn valuation sitting at approximately the 60th percentile
      of the blended range. This is consistent with a STRETCHED valuation stance: the
      current price is defensible but not comfortable, and any downward revision in
      estimated GMV, revenue, or comparable multiples quickly pushes the central estimate
      below the unicorn threshold.
