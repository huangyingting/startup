  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: audited-financial-statements
      missingEvidence: >-
        Tamara has not disclosed any audited financial statements, income statement,
        balance sheet, or cash flow data in any public source as of May 2026. No GMV,
        revenue, credit loss rate, EBITDA, or profitability metric is publicly available.
        All valuation frameworks in this chapter depend on estimated rather than confirmed
        financial inputs, producing a 3–6× valuation range uncertainty that cannot be
        resolved without financial disclosure.
      whyItMatters: >-
        Financial statements are the foundation for every valuation framework. Without them,
        the $1B unicorn valuation cannot be confirmed or refuted independently. The 3× revenue
        estimate uncertainty range directly produces a 6× valuation range under the revenue
        multiple framework. No institutional investor should commit capital at or above $1B
        without confirmed financials.
      diligencePath: >-
        Request audited IFRS or Saudi GAAP income statements for FY2022–FY2025; balance sheet
        with receivables breakdown; cash flow statement; external auditor identity and
        unqualified opinion letter; management discussion of GMV by market and product,
        weighted-average MDR, subscription revenue, and EBITDA bridge.
      relatedQuestionRefs: [QV011, QV012, QV013]
      relatedTableRefs: [TV006]

    - type: private-evidence-only
      severity: blocking
      topic: credit-quality-and-default-rates
      missingEvidence: >-
        Tamara has not disclosed any consumer default rate, NPL ratio, ECL provision,
        charge-off rate, or credit loss methodology in any public document as of May 2026.
        This is the most critical financial evidence gap: a 2% charge-off rate on $2.5B
        estimated GMV implies $50M in annual credit losses that could eliminate all MDR
        net margin, but the actual rate is entirely unknown.
      whyItMatters: >-
        Credit loss is the primary earnings driver for BNPL. Unknown credit quality is a
        binary risk: if credit losses are within plan, the bull and base scenarios are
        plausible; if they are materially above plan, the EBITDA trajectory and capital
        adequacy could be compromised simultaneously, accelerating the bear case.
      diligencePath: >-
        Request vintage-level cohort data (origination quarter, 30/60/90-day delinquency,
        charge-off rate) for FY2022–FY2025; ECL provision amount and coverage ratio; SAMA
        minimum provision requirement and Tamara's coverage ratio relative to minimum;
        underwriting scorecard summary; fraud loss rate separately disclosed.
      relatedQuestionRefs: [QV024]
      relatedTableRefs: [TV006]

    - type: private-evidence-only
      severity: material
      topic: merchant-concentration-hhi
      missingEvidence: >-
        Tamara has not disclosed GMV concentration data for its 30,000+ merchant network.
        The top merchant contributors by GMV are unidentified beyond the three named
        merchants (IKEA KSA, SHEIN, Jarir Bookstore). The Herfindahl-Hirschman Index
        of merchant concentration cannot be calculated from public data.
      whyItMatters: >-
        If top-5 merchants represent more than 50% of GMV, a single-merchant defection
        to Tabby exclusivity could cause a material and sudden reduction in GMV and revenue
        that would compromise the base case valuation trajectory and trigger Series C
        covenant concerns.
      diligencePath: >-
        Request GMV contribution by top-10 merchants as percentage of total GMV; merchant
        churn rate by cohort; average merchant contract tenure; any exclusivity agreements
        or minimum-volume commitments in place.
      relatedQuestionRefs: [QV023]
      relatedTableRefs: [TV006]

    - type: private-evidence-only
      severity: material
      topic: credit-facility-terms
      missingEvidence: >-
        Tamara's banking credit facility partners, facility sizes, interest rate structures,
        maturity profiles, and covenant terms are not publicly disclosed as of May 2026.
        The company relies on wholesale debt funding to finance its BNPL receivables book,
        but the all-in cost of funds, SAIBOR rate sensitivity, and maturity concentration
        cannot be independently assessed from public sources.
      whyItMatters: >-
        Credit facility terms directly determine Tamara's net MDR yield and interest rate
        risk exposure. A 200bps rise in SAIBOR could compress net yield by 1–2 percentage
        points, materially affecting the path to EBITDA breakeven and the bull case scenario.
        Covenant triggers linked to credit quality or GMV thresholds could also create a
        liquidity cliff in the bear case.
      diligencePath: >-
        Request term sheets and facility agreements for all revolving credit and warehouse
        facilities; lender identities, facility sizes, maturity dates, interest rate basis
        (fixed vs SAIBOR-linked), covenants, and borrowing-base eligibility criteria;
        current drawn vs committed capacity and headroom.
      relatedQuestionRefs: [QV026]
      relatedTableRefs: [TV006]

    - type: private-evidence-only
      severity: material
      topic: cap-table-and-liquidation-preference
      missingEvidence: >-
        Tamara's investor rights agreement, post-Series C cap table, liquidation preference
        waterfall, and governance rights are not publicly disclosed. Prior-round investors
        (Shorooq Partners, SNB Capital, Checkout.com, Coatue) hold shares at materially
        different entry prices and may hold liquidation preference or anti-dilution
        protections that affect the effective return available to Series C investors.
      whyItMatters: >-
        In a bear case exit below the $1B Series C entry valuation, liquidation preference
        stacks determine who recovers capital first. Without cap table visibility, effective
        Series C IRR in downside scenarios cannot be modelled. Governance rights at entry
        also determine protective provisions available to new investors if the business
        underperforms.
      diligencePath: >-
        Request post-Series C cap table (fully diluted, by investor and round); investor
        rights agreement including liquidation preference type (participating vs
        non-participating), multiple, and anti-dilution provisions; board composition and
        protective voting rights; ESOP pool size and cliff/vesting schedule.
      relatedQuestionRefs: [QV027]
      relatedTableRefs: [TV006]

    - type: private-evidence-only
      severity: material
      topic: comparable-valuation-table-private-financials
      missingEvidence: >-
        The comparable valuation table (TV004) is based on publicly-available market
        capitalisations and disclosed financial metrics for listed BNPL peers (Affirm,
        SplitIt) and rumoured/disclosed private round valuations (Tabby, Klarna IPO).
        However, no listed BNPL peer operates in a Saudi/GCC regulatory environment,
        and Tamara's own GMV and revenue are not publicly confirmed, making all
        derived multiples (P/S, P/GMV, EV/EBITDA) indicative estimates only.
      whyItMatters: >-
        A comparable analysis that applies listed-market multiples to an unconfirmed
        revenue range (3× uncertainty band) produces a 6× valuation uncertainty range.
        The table is directionally useful but cannot provide precision without confirmed
        Tamara financials. GCC market premium (regulatory moat, lower competition)
        may justify a modest premium to listed comparables, but cannot be quantified.
      diligencePath: >-
        Obtain Tamara's confirmed revenue and GMV for FY2024 or FY2025; apply disclosed
        multiple range from Affirm 10-K, Klarna IPO prospectus, and Tabby Series D;
        recalculate implied valuation range with confirmed inputs and tighter bands.
      relatedQuestionRefs: [QV011, QV012]
      relatedTableRefs: [TV004]
