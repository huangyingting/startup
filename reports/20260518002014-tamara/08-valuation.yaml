  - id: section-final-recommendation
    title: Final Recommendation, Thesis-Break Triggers, and Diligence Asks
    body: >-
      The recommended investment stance is TRACK at current valuation with a HIGH risk
      rating, MEDIUM confidence, and a STRETCHED valuation stance. An overall quality
      score of 6/10 reflects the constructive market backdrop (SAMA-compliant, Vision 2030
      aligned, strong merchant network, Goldman Sachs-backed) offset by the dominant
      competitive threat from Tabby, complete financial opacity, and a valuation at the
      upper boundary of what public-information analysis can support.

      The TRACK designation — rather than BUY — is driven by four factors. First, no
      valuation method robustly supports a price above $1B on conservative assumptions.
      The current price is not obviously wrong, but it is not obviously correct, and the
      confidence interval is uncomfortably wide. Second, Tabby's dominant scale advantage
      creates a path-dependency problem: Tamara must grow faster than Tabby in an
      environment where Tabby has more capital, more merchants, and more users. Third,
      the complete absence of audited financials means an investor entering at the Series C
      valuation is underwriting a credit and revenue model they cannot independently
      verify. Fourth, the BNPL sector globally has undergone a valuation re-rating since
      2022 — Affirm's public-market 4–6× revenue multiple versus 2021-era 20–30× multiples
      — and any secondary or IPO exit would face more skeptical public-market multiples
      than the current private mark implies.

      Thesis-break triggers are the conditions that would convert the TRACK stance to
      either a BUY (upside triggers) or an EXIT (downside kill criteria). Upside triggers
      include: Tamara disclosing audited financials showing GMV above $3B and positive
      EBITDA; Tamara's user base crossing 15M while Tabby remains below 30M; or a
      strategic acquirer initiating a transaction at a premium to the current valuation.
      Kill criteria include: SAMA licence restriction or revocation; a down-round financing
      at below $750M implied valuation; Tabby securing exclusive agreements with Tamara's
      top-five confirmed merchant partners; or CEO departure without a named successor.

      The final diligence asks represent the minimum data set required to convert a TRACK
      to a BUY. The single most important ask is audited financial statements for FY2022–
      FY2025 with confirmed GMV, revenue, MDR rates by category, credit loss provisioning,
      and an EBITDA bridge. Without this, no independent investor can underwrite the $1B
      valuation. Supporting asks include: SAMA compliance confirmations and capital
      adequacy margin above regulatory minimum; full capitalization table and investor
      rights documentation; merchant HHI concentration analysis; and a 2026 operating plan
      with milestones against Series C deployment proceeds.
