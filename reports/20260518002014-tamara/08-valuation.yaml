  - id: section-scenario-analysis
    title: Scenario Analysis — Bull, Base, and Bear
    body: >-
      Three discrete scenarios capture the distribution of plausible outcomes for an
      investor entering at or near the $1B valuation mark established by the August
      2024 Series C extension.

      The bull scenario (probability: 20–25%) assumes Tamara successfully executes on
      Vision 2030 tailwinds: expanding its registered shopper base to 18–22M by 2027
      through aggressive consumer acquisition funded by Series C proceeds, growing the
      merchant network to 50,000+ through expansion in UAE, Bahrain, and Egypt, achieving
      EBITDA breakeven by late 2026 through MDR scale economics, and positioning for a
      strategic acquisition or GCC fintech IPO at a $2.5–4B exit valuation. In this
      scenario, Goldman Sachs' involvement catalyses a Tadawul listing or dual-listing
      process, and a comparable-to-Tabby per-user multiple with a 30% discount for
      the #2 position implies an exit valuation of $2.5B–$3.5B. The bull case requires
      no major SAMA regulatory disruption and credit quality remaining within plan.

      The base scenario (probability: 50–55%) projects Tamara consolidating as the #2
      GCC BNPL operator behind Tabby, growing to 13–15M registered users by 2027,
      maintaining its merchant network with moderate expansion, and sustaining a
      neutral-to-slightly-positive EBITDA trajectory by late 2027. Valuation remains
      in the $1B–$1.5B range through incremental funding rounds or a partial secondary
      transaction, with a full exit at $1.5–2B achievable in a strategic M&A scenario.
      The base case implies approximately 1.5–2× return on capital for Series C investors
      at a $1.5B exit over a 4–5 year horizon — a muted return given the risk profile.

      The bear scenario (probability: 20–25%) envisions Tabby achieving category-exclusive
      merchant agreements or 5× user scale, SAMA imposing materially higher capital
      requirements that force a dilutive equity raise, and rising consumer default rates
      compressing Tamara's MDR economics below the cost of capital. In this scenario,
      Tamara's next fundraising round occurs at a flat or down-round valuation. A
      distressed secondary or structured exit at $300–$500M represents the likely
      resolution, implying a 50–70% loss for Series C investors at entry near the $1B
      valuation mark.
