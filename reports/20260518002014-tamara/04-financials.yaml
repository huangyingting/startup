  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: financial-performance-and-profitability
      missingEvidence: >-
        Tamara has not disclosed GMV, revenue, profitability, or loss position. No audited
        financial statements are available. The Smart subscription subscriber count and
        subscription revenue contribution are also undisclosed. Profitability status is
        entirely unknown; the company may be generating significant operating losses.
      whyItMatters: >-
        Without revenue and profitability data, the $1B+ unicorn valuation cannot be
        independently underwritten. The implied revenue multiple (6–22× estimated revenue)
        is too wide a range for investment-grade pricing decisions. Profitability status
        determines runway, sustainability, and IPO readiness timeline.
      diligencePath: >-
        Request audited income statements for 2022–2025, management accounts through Q1 2026,
        GMV by market and quarter, EBITDA bridge, and a segment-level P&L showing MDR revenue
        vs. subscription revenue. Confirm Smart subscriber count, monthly churn, and
        net subscription contribution.
      relatedQuestionRefs: [QI026, QI029]

    - type: private-evidence-only
      severity: blocking
      topic: credit-quality-metrics
      missingEvidence: >-
        Tamara has not disclosed credit loss rates, charge-off rates, receivables aging,
        30/60/90-day delinquency, loan loss provisions, or underwriting methodology. Consumer
        CAC by channel and vintage is also undisclosed. These are the most critical
        unit-economics inputs for any BNPL business.
      whyItMatters: >-
        A 2% charge-off rate at the mid-case GMV estimate of USD 2.5B implies USD 50M/year
        in credit losses — potentially eliminating the entire net MDR margin. Without credit
        quality data, the economic quality of Tamara's BNPL book is entirely unknown. Rising
        global BNPL defaults in 2023–2024 heighten the urgency of this disclosure gap.
      diligencePath: >-
        Request vintage-level cohort data (origination quarter, 30/60/90-day delinquency rate,
        charge-off rate), loan loss reserve amount, coverage ratio, and underwriting scorecard
        documentation. Request CAC by acquisition channel and cohort vintage. Cross-reference
        with SAMA regulatory return for any disclosed credit quality metrics.
      relatedQuestionRefs: [QI015, QI016]

    - type: private-evidence-only
      severity: material
      topic: credit-facility-terms-and-mdr-confirmation
      missingEvidence: >-
        The terms, lenders, size, Sharia structure, and all-in cost of Tamara's banking
        credit facilities are not publicly disclosed. Tamara's realized MDR rate is also
        unconfirmed; the 3–6% range used throughout this chapter is an analyst estimate.
      whyItMatters: >-
        The cost of capital on credit facilities determines the net MDR yield (gross MDR minus
        credit losses and cost of capital). If the all-in facility cost exceeds 2–3%, the net
        economic margin on the lending book may be at or near zero at current scale. The
        unconfirmed MDR rate means revenue estimates carry a 3.5× uncertainty range.
      diligencePath: >-
        Request all credit facility term sheets, drawdown history, Sharia compliance audit
        letters, lender identities, and any covenant documentation. Request Tamara's actual
        realized MDR by merchant category and volume tier (ideally with the full merchant
        fee schedule or a weighted-average MDR computation by management).
      relatedQuestionRefs: [QI002, QI027]
