  - id: section-unit-economics
    title: Unit Economics and Profitability Path
    body: >-
      Tamara's unit economics are not publicly disclosed. All quantitative estimates below are
      derived from analyst reports, public benchmarks, and structural inferences from disclosed
      operating metrics; they should be treated as scenario inputs, not verified performance
      data. The absence of audited financials or management disclosures makes this section
      inherently estimative.

      On gross revenue: the primary driver is MDR applied to total GMV. With 10M+ registered
      shoppers, an estimated average order value (AOV) of USD 150–400 based on GCC retail
      benchmarks, and an assumed transaction frequency of 2–4 transactions per active shopper
      per year, Tamara's 2024 annualized GMV is estimated in the USD 1.5B–4B range. Applying
      a 3–6% blended MDR to this GMV band yields estimated annualized MDR revenue of
      approximately USD 45M–160M. The mid-case estimate (USD 2.5B GMV at 3.5% blended MDR)
      implies approximately USD 87.5M in annualized MDR revenue. Smart subscription revenue
      is additive; at a hypothetical 500,000 subscribers paying SAR 19/month (~USD 5/month),
      annual subscription revenue would be approximately USD 30M — material relative to the
      MDR low-case, modest relative to the mid-case. Tamara has not confirmed subscriber count
      or subscription revenue contribution.

      The path to profitability depends on four interacting variables: (1) MDR yield stability
      — whether Tamara can maintain its 3–6% MDR band against competitive pressure from
      Tabby's larger merchant network and eventual price discovery; (2) credit loss rate — BNPL
      industry experience globally places charge-off rates at 1–5% of originations in mature
      markets, but GCC-specific rates are private; a 2% charge-off at the mid-case GMV implies
      approximately USD 50M in annual credit losses, compressing net MDR to near zero;
      (3) cost of capital on credit facilities — Sharia-compliant murabaha or wakala structures
      may carry higher effective all-in cost than conventional revolving credit lines; and
      (4) operating leverage — whether transaction volume can scale faster than fixed operational
      costs in risk, technology, compliance, and customer operations. Global BNPL peers reported
      significant operating losses in growth phases before reaching scale-based profitability;
      Tamara has provided no guidance on its profitability or loss position.

      The $340M Series C provides meaningful capital runway, but the split between receivables
      funding and operating expense coverage is undisclosed. Goldman Sachs' entry and the $1B+
      valuation signal investor confidence in a capital-efficient profitability path, but the
      financial data to independently corroborate this view is unavailable. The implied revenue
      multiple at $1B valuation spans approximately 6× to 22× depending on the revenue estimate
      used, a range too wide to support independent valuation underwriting.
