chapter:
  number: 4
  title: Financials
  summary: >-
    Tamara's financial model is merchant-funded: the primary revenue stream is a merchant
    discount rate (MDR) estimated at 3–6% of transaction value, supplemented by a SAR 19/month
    Smart subscription. With 10M+ registered shoppers and an estimated 2024 GMV of
    USD 1.5B–4B, annualized revenue is estimated at USD 45M–160M — a wide band reflecting
    total absence of public financial disclosure. Total equity raised is approximately $400M+
    across seed (~$6M), Series A ($110M, Sep 2021), Series B ($150M, Jan 2022), and Series C
    extension ($340M, Aug 2024) at a $1B+ unicorn valuation backed by Sanabil Investments,
    Goldman Sachs, and Colony Capital. SAMA-registered capital is SAR 515,000,000 (~USD 137M).
    No audited financials, credit loss rates, consumer CAC, profitability data, or credit
    facility terms are publicly available — making credit risk, margin path, and capital
    adequacy the primary diligence blockers for any investor.

sections:
  - id: section-revenue-model
    title: Revenue Model and Monetization
    body: >-
      Tamara's revenue model is built around two primary disclosed streams: a merchant-side
      transaction fee and a consumer subscription product. The core mechanism is the merchant
      discount rate (MDR) — a percentage of each approved BNPL transaction charged to the
      merchant at point of sale. Tamara receives the MDR at the time of merchant settlement;
      the consumer then repays Tamara in installments over the agreed tenor. Industry analysts
      and GCC fintech research estimates place the MDR range for GCC BNPL platforms at
      approximately 3–6% of gross transaction value, consistent with global BNPL benchmarks.
      Tamara has not publicly confirmed its exact MDR range or per-category pricing schedule;
      all MDR estimates in this chapter are analyst-derived and require management confirmation.

      The MDR model is structurally favorable for revenue quality: income is earned at
      transaction origination (not over the installment tenor), the merchant absorbs the fee
      without pass-through to the consumer, and scaling merchant transaction volume directly
      scales revenue. However, MDR is susceptible to competitive pricing pressure. Tabby,
      with 65,000+ merchant partners (approximately twice Tamara's network), has greater
      scale leverage in merchant negotiations, creating downward MDR pressure if merchants
      begin requesting competitive parity. Additionally, Tamara's product suite spans tenors
      from Pay in Full to 24-month installments, implying differentiated credit risk profiles
      by tenor — longer tenors likely command higher MDR to compensate for extended credit
      exposure, though the tier pricing is not disclosed.

      The second revenue stream is the Smart premium membership: SAR 19 per month (approximately
      USD 5.07 at current exchange rates) after the first free month. Subscribers receive
      cashback rewards and exclusive merchant offers. This subscription adds consumer-side
      monetization without violating Tamara's Sharia-compliant no-interest, no-late-fee
      commitment, since the fee is paid for a rewards service rather than for credit access.
      Smart subscription revenue is predictable and recurring, providing a partial counterweight
      to MDR transaction-volume variability. Subscriber count, churn rate, and subscription
      revenue contribution are not disclosed; the revenue contribution is estimated to be small
      relative to MDR at current penetration. Tamara's merchant terms explicitly confirm no
      interest charges or late fees to consumers under any product variant. A third potential
      revenue stream — data monetization, referral fees, or cross-sell commissions — has not
      been confirmed or described as active by the company.
