summary:
  headline: Tamara 是拿到 SAMA 牌照的可信 BNPL 独角兽，沙特契合度高、商户网络在扩张；但规模落后 Tabby、财务不透明，信贷风险也看不清，更适合密切观察，而不是立即下重注。
