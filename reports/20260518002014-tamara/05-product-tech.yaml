  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: credit-decisioning-model-opacity
      missingEvidence: >-
        Tamara has not disclosed its credit scoring methodology, feature inputs, model
        architecture, data partnerships (including bureau usage), or adverse action procedures.
        The credit decisioning engine is the most strategically critical technology asset and
        is entirely opaque in public sources as of May 2026.
      whyItMatters: >-
        The quality and sophistication of the credit decisioning model determines approval
        rates (consumer experience), false decline rates (GMV leakage), and credit loss rates
        (unit economics). Without model transparency, independent assessment of Tamara's
        risk management competency and technology moat is not possible.
      diligencePath: >-
        Request credit model documentation including feature set, model type (rules vs. ML),
        training data vintage, bureau integration confirmation (SIMAH, Al Etihad), model
        accuracy metrics (Gini coefficient, KS statistic), false positive/negative rates, and
        adverse action policy. Request third-party model validation report if available.
      relatedQuestionRefs: [QE007, QE025]

    - type: private-evidence-only
      severity: material
      topic: security-certification-absence
      missingEvidence: >-
        No SOC 2, ISO 27001, PCI DSS, or equivalent third-party security certification has
        been disclosed by Tamara. The 24/7 monitoring claim on the security page lacks
        third-party validation. No security audit reports or penetration test summaries
        are publicly available.
      whyItMatters: >-
        Institutional enterprise merchants and large-scale B2B partners typically require
        SOC 2 Type II or equivalent before integrating payment infrastructure providers.
        Absence of security certifications creates onboarding friction with large retailers
        and is a diligence gap for institutional investment assessment.
      diligencePath: >-
        Request SOC 2 Type II report (or equivalent), PCI DSS compliance attestation,
        ISO 27001 certificate if held, and most recent penetration testing report summary.
        Confirm whether any major enterprise merchant has completed a formal security
        assessment of Tamara's platform.
      relatedQuestionRefs: [QE011, QE018, QE008, QE012]

    - type: private-evidence-only
      severity: minor
      topic: technology-roadmap-undisclosed
      missingEvidence: >-
        Tamara has not published a formal product or technology roadmap. No engineering blog,
        developer community, technical conference presentations, or patent filings have been
        identified. The product development trajectory is entirely inferred from hiring signals
        and competitive benchmarking.
      whyItMatters: >-
        Without a disclosed roadmap or engineering transparency, investors cannot assess the
        depth of Tamara's technology investment, planned feature differentiation, or whether
        the platform is building defensible IP. The absence of a developer community limits
        external innovation and ecosystem growth relative to global BNPL peers.
      diligencePath: >-
        Request formal product roadmap document for 2026–2028, engineering team headcount
        and organizational structure, any filed patents or IP applications, and technology
        investment budget as a percentage of operating expenditure.
