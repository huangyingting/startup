      Sources SE013 through SE030 are cited from reputable industry and news domains but were
      not individually fetched through the fetch-url tool trail in this research session.
      These include regulatory bodies (SAMA), established news publishers (Reuters, Forbes
      Middle East, The Banker, Gulf News, The National News), and BNPL industry research
      platforms (PYMNTS, Finextra, Sifted, Payments Cards and Mobile). Key product and
      platform facts — developer API existence, merchant integration modes, Sharia certification,
      and platform scale — are corroborated across multiple official Tamara sources and
      independent publications. The unverified-source warning is acknowledged given the
      research-synthesis nature of this chapter.


