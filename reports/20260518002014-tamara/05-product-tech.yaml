  - id: section-technical-architecture
    title: Technical Architecture and Developer Platform
    body: >-
      Tamara's technology infrastructure is designed as an API-first platform with four
      primary integration modes for merchants: Direct API integration (REST API), In-Store
      Checkout (POS terminal integration), embeddable Widgets (UI components for merchant
      websites), and a pre-built plugin ecosystem covering major e-commerce platforms.
      The developer portal at docs.tamara.co provides a complete reference API, integration
      guides, and a Testing Guide with a sandbox environment. The sandbox environment allows
      merchants to test end-to-end BNPL flows before going live, a standard practice for
      payment API platforms that reduces integration errors and accelerates merchant
      onboarding.

      The Merchant Portal — accessible through the merchant-facing dashboard — enables
      merchants to manage transactions, review customer order history, and process returns
      and refunds. This self-service operational tooling reduces merchant support overhead
      and provides operational transparency to the 30,000+ merchants on the platform.
      In-store integration via POS terminals extends Tamara's reach to physical retail
      alongside the e-commerce channel, a differentiator relative to pure-play online BNPL
      providers and important for Saudi Arabia's still-significant in-store retail footfall.

      The core platform logic is built around real-time credit decisioning, which must
      evaluate consumer creditworthiness and approve or decline BNPL transactions at
      checkout in near-real time. This requires a data analytics and risk scoring
      engine capable of processing consumer transaction history, behavioral signals,
      and third-party data inputs with sub-second decision latency. The exact credit
      scoring methodology, feature set, model architecture, and data partnerships are
      not publicly disclosed. The platform infrastructure is inferred to be cloud-native
      (likely hosted on a major hyperscaler such as AWS or Microsoft Azure) based on the
      scale of API-driven integrations and real-time decisioning requirements, though
      Tamara has not publicly confirmed its cloud provider or infrastructure architecture.

      The technical stack extends to mobile-first consumer UX on iOS and Android, with
      app store presence confirmed from consumer-facing documentation. Payment rails
      integration with Saudi and GCC banking infrastructure underpins settlement
      capabilities, as merchants receive full purchase price upfront from Tamara. The
      checkout.com investment in Series A suggests a close payment-infrastructure
      relationship with a leading global acquiring and payment processing platform,
      potentially informing Tamara's acquiring, settlement, and card-processing
      infrastructure.
