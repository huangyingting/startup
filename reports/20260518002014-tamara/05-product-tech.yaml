  - id: section-trust-compliance
    title: Trust, Compliance, and Security
    body: >-
      Tamara's compliance infrastructure is built around three pillars: Saudi Central Bank
      (SAMA) licensing, Sharia certification, and AML/KYC processes. The SAMA fintech
      license (No. 95/A Sh/202502) authorizes Tamara Finance Company to operate as a BNPL
      provider under SAMA's regulatory framework, which was among the first BNPL-specific
      regulatory frameworks globally when introduced in 2021. SAMA supervision imposes
      regulatory reporting obligations, capital adequacy requirements (reflected in the
      SAR 515M registered capital), and consumer protection standards on fee transparency,
      complaint handling, and credit eligibility disclosures.

      Sharia compliance is certified by the Shariyah Review Bureau, an internationally
      recognized Sharia advisory body. The certification applies to the full product suite,
      confirming that none of Tamara's products — including the 24-month installment option
      and the Smart subscription — violates Islamic finance prohibitions on riba (interest)
      or gharar (excessive uncertainty). The Sharia certification is a critical competitive
      differentiator in Saudi Arabia and the GCC, where a majority of consumers have
      religious preferences against interest-bearing credit products.

      Security infrastructure includes 24/7 transaction monitoring, which Tamara explicitly
      highlights on its security page. This implies real-time fraud detection capabilities
      with round-the-clock operational coverage. The AML/KYC process is required by SAMA
      for all licensed financial institutions and covers consumer identity verification,
      sanctions screening, and suspicious transaction reporting. Tamara's privacy policy
      governs how consumer data is collected, processed, and stored, operating under Saudi
      Arabia's Personal Data Protection Law (PDPL), which came into effect in 2021.

      One notable limitation is the absence of any disclosed third-party security audit,
      SOC 2 certification, ISO 27001 accreditation, or penetration testing report in
      Tamara's public documentation. Global fintech peers at comparable scale typically
      publish security audit certifications to build institutional merchant confidence.
      The absence of such disclosures from Tamara's public-facing documentation is a gap
      that institutional merchants may raise during onboarding due diligence.
