  - id: section-merchant-value-proposition
    title: Merchant Value Proposition
    body: >-
      Tamara's merchant-facing value proposition is organized around four commercially
      distinct benefits. First, merchants receive the full purchase price upfront — Tamara
      settles the merchant immediately at the time of transaction approval (net of the
      merchant discount rate), eliminating receivables risk and cash-flow uncertainty for
      the merchant. This immediate settlement model means the merchant bears no consumer
      credit or installment repayment risk; all credit exposure is retained by Tamara.

      Second, Tamara explicitly assumes all fraud and credit risk on behalf of the merchant:
      the documented value proposition states "focus on your core business and let us cover
      the fraud and credit risk." This risk transfer is the primary economic rationale
      for the merchant paying the MDR — the MDR is compensation for Tamara absorbing
      default, fraud, and dispute risk that would otherwise fall on the merchant or their
      payment processor.

      Third, BNPL checkout options demonstrably increase conversion rates and average order
      value (AOV). Tamara's merchant-facing marketing explicitly cites this as a core
      benefit: consumers who might defer or decline a purchase due to immediate cash-flow
      constraints can complete the transaction using installment payments. Higher AOV and
      conversion rates generate incremental GMV for merchants that justifies the MDR cost.
      Independent BNPL industry research supports this conversion effect across global
      markets, though Tamara has not disclosed its own merchant-level conversion lift data.

      Fourth, Tamara's Sharia certification provides a unique merchant positioning benefit
      in the GCC market: merchants co-branding with a Sharia-certified payment method can
      appeal to the significant segment of consumers who restrict their financial interactions
      to halal products. This compliance credential differentiates Tamara's merchant
      proposition from non-Sharia-certified payment alternatives in the region.

      The developer ecosystem supporting merchant onboarding — REST API, sandbox, Widgets,
      POS integration, and Merchant Portal — creates operational stickiness by embedding
      Tamara's checkout flow into merchant infrastructure. Re-integration costs and checkout
      UX disruption create switching friction once Tamara is deployed, supporting merchant
      retention. However, multi-BNPL provider deployments are common in GCC e-commerce
      (merchants simultaneously offering Tamara and Tabby at checkout), limiting exclusivity.
