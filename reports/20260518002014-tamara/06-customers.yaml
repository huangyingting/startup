  - id: section-merchant-base
    title: Merchant Base and Named Proof
    body: >-
      Tamara's merchant network encompasses 30,000+ partners across consumer categories
      including fashion, home furnishings, electronics, books, grocery, and luxury goods.
      The breadth of named enterprise merchant deployments provides cross-category validation
      of the platform's production readiness and merchant value proposition. Named partners
      confirmed from official Tamara merchant pages and independent merchant website
      payment-option disclosures include IKEA Saudi Arabia (home and furniture), Jarir
      Bookstore (electronics and stationery), SHEIN (fast fashion), Al-Othaim (grocery
      and FMCG), H&M (apparel), L'Oréal (cosmetics), LEGO (toys), Puma (sportswear),
      The Luxury Closet (luxury resale), and Ounass (luxury multi-brand marketplace).

      This named-merchant list spans five distinct consumer categories: home and furniture
      (IKEA), fashion and apparel (SHEIN, H&M, Puma), luxury (The Luxury Closet, Ounass),
      consumer goods and cosmetics (L'Oréal, LEGO), and food and grocery (Al-Othaim). The
      simultaneous presence in both luxury and mass-market segments is notable — luxury
      deployments (Ounass, The Luxury Closet) signal capability to support high-ticket
      transactions requiring larger credit limits and longer repayment tenors, while
      mass-market deployments (SHEIN, H&M, Al-Othaim) demonstrate volume-transaction
      capability at lower basket sizes.

      Tamara's merchant value proposition has three components: (i) upfront full settlement
      — merchants receive the full purchase price net of merchant discount rate (MDR) from
      Tamara at the point of transaction, eliminating receivables risk; (ii) fraud and credit
      risk transfer — Tamara explicitly absorbs all fraud and credit loss risk on behalf of
      merchants; and (iii) conversion and AOV uplift — Tamara claims to increase merchant
      conversion rates and average order value (AOV), consistent with global BNPL industry
      benchmarks showing 10–30% AOV uplifts at comparable BNPL integrations.

      The merchant proof table below is populated from confirmed production deployments only.
      Tamara has not published formal merchant case studies or quantified outcome data for
      specific merchant partners as of May 2026. Evidence for individual merchant deployments
      is sourced from Tamara's official merchant page, independent merchant payment-option
      pages, and news coverage. No merchant is confirmed as exclusive to Tamara; multi-BNPL
      deployment (Tamara alongside Tabby or other BNPL providers at the same merchant
      checkout) is common in the GCC e-commerce ecosystem.
