  - id: section-customer-journey
    title: Customer Journey and Retention
    body: >-
      The consumer journey on Tamara follows a six-stage arc from initial discovery through
      repeat engagement and potential Smart subscription upgrade. Discovery typically occurs
      at a merchant checkout page (online or in-store POS terminal) or through social media
      and app store promotion. Registration is a one-time process requiring Saudi or UAE
      national ID, mobile number, and payment method — designed for low-friction onboarding
      consistent with GCC ID infrastructure. The first purchase completes the onboarding
      journey: the consumer selects a Tamara split plan (Split in 2, 3, or 4), receives
      real-time credit approval, and completes checkout with no interest and no late fees.

      Repayment occurs via auto-debit from the registered payment method, reducing the
      cognitive overhead of tracking and manually initiating payments. This frictionless
      repayment mechanic is a retention-supporting design: consumers who experience smooth
      repayment without disputes are structurally more likely to return for subsequent
      transactions. Tamara's Smart subscription tier (SAR 19/month after the first month
      free) creates an explicit retention incentive — subscribers receive cashback rewards
      and exclusive merchant offers, increasing the consumer's perceived value of maintaining
      the Tamara relationship beyond any single transaction.

      Retention and repeat-usage metrics are not publicly disclosed. Tamara has not released
      NPS (Net Promoter Score), customer satisfaction scores, repeat purchase rates, active
      user ratios, or cohort retention data as of May 2026. The cohort figure below presents
      analyst-estimated retention rates modelled on comparable BNPL platforms in similar
      markets (Southeast Asia, Australia, Europe); these estimates are explicitly approximate
      and must not be treated as confirmed Tamara data. In the absence of disclosed retention
      data, the Smart subscription subscriber count — also undisclosed — serves as the most
      informative available proxy for high-engagement consumer retention, since the monthly
      fee creates a revealed-preference signal of consumer loyalty.

      Available indirect evidence for consumer engagement includes: four-year growth from 0
      to 10M+ registered shoppers; geographic expansion from one to three markets; merchant
      base growth from launch to 30,000+; and continued institutional investor support at
      $1B+ valuation in August 2024. These signals are consistent with a platform that
      retains meaningful consumer engagement, but they do not constitute verified retention
      measurement. A direct diligence ask of monthly active user count, 12-month cohort
      retention rates, and Smart subscriber count should be prioritised in any investment
      process.
