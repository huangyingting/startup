  - id: section-competitor-profiles
    title: Competitor Profiles
    body: >-
      Tabby is the largest GCC BNPL platform by every disclosed scale metric. Founded in 2019
      and headquartered in Riyadh, Tabby serves Saudi Arabia, the UAE, and Kuwait with a
      split-into-4 interest-free installment product and monthly payment plans extending up to
      twelve months. Its Tabby Card — a co-branded VISA physical card — extends BNPL-style
      flexibility to physical retail transactions, a capability Tamara does not match as of 2026.
      Tabby Shop, a product discovery feature embedded in the Tabby platform, creates an additional
      consumer lock-in layer by routing product search and discovery through Tabby's ecosystem.
      With 65,000+ brand partners — approximately twice Tamara's merchant count — Tabby has built
      a broader merchant network at the cost of potentially less deep per-merchant integration.
      Tabby's most recent valuation of $4.5 billion (on a Series D round reported in 2024) is
      approximately 4.5 times Tamara's $1 billion post-Series C valuation, signalling a meaningful
      capital access differential.

      SplitIt is a structurally different competitor: it does not originate new consumer credit
      but instead uses the buyer's existing Visa or Mastercard credit limit to fund installments,
      requiring no new credit check or consumer registration. Merchants receive the full transaction
      value upfront from SplitIt. This model is ideal for merchants with high-ticket items and
      credit-card-holding customers, but it is structurally irrelevant to GCC's underbanked consumer
      segment — the demographic core of Tamara's and Tabby's business. SplitIt operates in 30+
      countries but has limited dedicated GCC consumer presence.

      Klarna, the global BNPL leader with approximately 85 million users primarily in Europe and
      North America, has not launched a licensed SAMA-regulated GCC consumer BNPL product as of
      2026. Its "buy now pay later" and "pay in 30" products are globally recognised, and its
      AI-powered shopping app and Klarna Card extend its consumer reach internationally, but GCC
      Islamic finance compliance and SAMA licensing requirements remain unmet barriers to direct
      consumer entry.

      Postpay is a UAE-centric BNPL operator with a smaller user base and merchant roster,
      focused primarily on UAE e-commerce. Its geographic concentration outside Tamara's primary
      KSA market reduces direct competitive overlap. Spotii, once a GCC BNPL player, was
      acquired by Australian BNPL group Zip and has materially reduced its standalone GCC
      presence. Saudi commercial banks offer credit-card installment products as a status-quo
      substitute, but their relevance is limited to the approximately 10–15% of Saudi adults
      who hold bank credit cards — the segment least in need of BNPL alternatives.
