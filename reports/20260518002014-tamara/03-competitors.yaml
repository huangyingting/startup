      evidence-backed ordinal axes: (x) Platform Scale (registered users and GMV), scored
      0–100 based on disclosed metrics; (y) GCC-Specific Focus (SAMA license, Islamic finance
      certification, local merchant depth), scored 0–100 based on confirmed capabilities. Tamara
      occupies the high-focus, moderate-scale quadrant. Tabby dominates the high-focus, high-scale
      position. Klarna and SplitIt are in the global-scale, low-GCC-focus quadrant. Postpay
      occupies a focused but small-scale niche. Axes are ordinal evidence-backed scores, not
      linear revenue or user-count axes.
