  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: tamara-gmv
      missingEvidence: >-
        Tamara has not publicly disclosed its GMV, annualized transaction volume, or implied
        market share within the GCC BNPL market. Without this data, it is impossible to
        independently assess whether Tamara is gaining or losing competitive share against
        Tabby, or to validate the company's "leading position" claim.
      whyItMatters: >-
        Without Tamara's GMV or market share data, competitive position assessment relies
        entirely on user count (10M+ vs. Tabby's 25M) and merchant count (30,000+ vs. 65,000+),
        both of which show Tamara behind Tabby on scale. GMV data could reveal either a
        higher-value transaction mix for Tamara or a wider gap than user counts suggest.
      diligencePath: >-
        Request GMV by market and quarter (KSA, UAE, Bahrain separately), total transaction
        count, average order value, and repeat purchase rate through VDR or direct management
        request. Cross-reference against Tabby's $17B+ annualized figure to compute implied
        market share.
      relatedQuestionRefs: [QP025]

    - type: private-evidence-only
      severity: material
      topic: merchant-fee-structure
      missingEvidence: >-
        No GCC BNPL platform has publicly disclosed its merchant discount rate (MDR). The
        2–6% industry benchmark range cited in this chapter is an estimate from analyst
        sources; realized MDR for Tamara is unknown. This is the primary revenue lever for
        Tamara's business model.
      whyItMatters: >-
        MDR directly drives gross revenue; a 1-percentage-point difference in realized MDR
        across 30,000+ merchants and millions of transactions materially changes Tamara's
        revenue and gross margin profile. The competitive pricing pressure from Tabby's larger
        merchant network and capital access may result in MDR compression over time.
      diligencePath: >-
        Request Tamara's realized average MDR by merchant segment and category (fashion,
        electronics, etc.), volume tier pricing, and any disclosed MDR trends over 2022–2025.
        Compare against Tabby if accessible or estimate from gross revenue and GMV.
      relatedQuestionRefs: [QP007]

    - type: private-evidence-only
      severity: minor
      topic: tamara-adverse-reports
      missingEvidence: >-
        No published regulatory actions, SAMA enforcement actions, adverse consumer reports,
        or critical analyst investigations against Tamara's competitive or product conduct
        practices were found in public sources as of 2026-05-18. This absence of adverse
        evidence may reflect genuine clean conduct, limited press coverage, or access
        limitations.
      whyItMatters: >-
        Absence of adverse evidence is not equivalent to confirmed clean conduct. Any
        unreported SAMA compliance breaches, consumer complaints, or merchant disputes
        would materially affect competitive position and regulatory standing.
      diligencePath: >-
        Request SAMA correspondence, consumer complaint log, and any regulatory notices
        or warning letters received from Tamara's management or VDR. Search SAMA's public
        enforcement registry for any Tamara-related actions.
      relatedQuestionRefs: [QP023]

