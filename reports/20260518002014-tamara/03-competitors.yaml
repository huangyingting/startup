chapter:
  number: 3
  title: Competitive Landscape
  summary: >-
    The GCC Buy Now Pay Later market is dominated by two licensed platforms — Tamara and Tabby —
    with Tabby holding a decisive scale advantage: 25 million registered users, $17B+ annualized
    transaction volume, and a $4.5B valuation, versus Tamara's 10 million+ shoppers, 30,000+
    merchant partners, and $1B+ post-Series C valuation. International players (Klarna with ~85M
    global users, SplitIt's credit-card-backed model) have limited direct GCC consumer relevance,
    while regional secondaries (Postpay in UAE, Spotii acquired by Zip) occupy smaller niches.
    Tamara differentiates through Shariyah Review Bureau Sharia certification, a no-late-fee
    consumer policy, deep KSA anchor-merchant relationships (IKEA, Jarir, SHEIN, H&M, L'Oréal),
    and developer-first API integrations across 30,000+ merchants. Key competitive risks include
    Tabby's 2.5× user-scale advantage with compounding network effects, the absence of a Tamara
    physical card product (Tabby Card VISA available), Saudi bank installment expansion at the
    top of the credit-card-holder segment, and potential international BNPL entry post-SAMA
    licensing. Tamara's KSA-first regulatory moat and Islamic finance positioning are durable
    short-term structural advantages, but GMV opacity prevents independent competitive share
    assessment.

sections:
  - id: section-landscape-overview
    title: Competitive Landscape Overview
    body: >-
      The GCC BNPL competitive landscape as of 2026 is a duopoly-shaped market, with Tamara and
      Tabby capturing the vast majority of licensed platform volume across Saudi Arabia, the UAE,
      and neighbouring markets. Tabby, headquartered in Riyadh, is the dominant player: more than
      25 million registered users and approximately $17 billion in annualized transaction volume
      place it significantly ahead of Tamara's 10 million+ registered shopper base. Approximately
      two out of every three adults in the UAE and Saudi Arabia are reported to be registered Tabby
      users — a penetration rate that underscores the pace at which BNPL has entered GCC consumer
      wallets. Tamara, however, claims the leading position in KSA by merchant depth and Sharia
      compliance positioning, and its 30,000+ merchant partners span the largest GCC retail brands.

      Beyond Tamara and Tabby, the competitive field divides into three categories. First, global
      BNPL leaders (Klarna, SplitIt) with materially different product structures or limited GCC
      consumer presence. Klarna's approximately 85 million global users and strong European and
      US footprints have not translated into a licensed GCC consumer BNPL offering as of 2026;
      its regulatory absence removes it as a direct near-term threat. SplitIt operates a
      credit-card-backed installment model that requires the buyer to already hold a Visa or
      Mastercard — an audience that overlaps only partially with the underbanked GCC consumer
      segment that BNPL primarily addresses. Second, regional secondary players (Postpay, Spotii/Zip)
      with smaller scale or diminished GCC activity following market consolidation. Postpay focuses
      on UAE merchants and consumers and has a materially smaller footprint; Spotii was acquired
      by global fintech Zip and has significantly reduced its standalone GCC presence. Third,
      incumbent substitutes: Saudi commercial banks (Al Rajhi, SABB, and others) that offer
      credit-card installment products to existing credit-card-holding customers — a subset of
      the GCC adult population that excludes the underbanked majority who represent BNPL's core
      growth segment. This competitor map reflects a market that is concentrated but not monopolised,
      leaving meaningful competitive runway for both Tamara and Tabby, while creating asymmetric
      scale risk if Tabby's network effects compound faster than Tamara's merchant and user growth.
