companyProfile:
  summary: >-
    Tamara Finance Company is a Saudi-licensed buy-now-pay-later fintech headquartered in
    Riyadh, founded in 2020 by Turki Bin Zahra (CEO), Abdulmajeed Alsukhan (COO), and
    Faisal Alsaqqaf (CTO). The company operates a Sharia-compliant BNPL platform that
    allows consumers to split purchases across 2, 3, or 4 installments — or finance over
    up to 24 months — with no interest or late fees. Tamara serves 10 million+ registered
    shoppers and 30,000+ merchant partners across Saudi Arabia, UAE, and Bahrain. It
    achieved unicorn status in August 2024 with a $340M Series C extension at a $1B+
    valuation, backed by Sanabil Investments (Saudi Aramco affiliate), Colony Capital, and
    Goldman Sachs. Tamara holds a SAMA license (95/A Sh/202502) and registered capital of
    SAR 515 million (~USD 137M).
