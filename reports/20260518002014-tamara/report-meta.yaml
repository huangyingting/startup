summary:
  headline: >-
    Tamara is a credible, SAMA-licensed BNPL unicorn with strong Saudi alignment and a
    growing merchant network, but trails Tabby in scale, lacks financial transparency, and
    faces credit-risk opacity that warrants close monitoring rather than immediate
    conviction.
