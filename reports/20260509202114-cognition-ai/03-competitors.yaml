  - id: SP-ide-native-competitors
    title: IDE-Native Competitors — Cursor and Windsurf
    body: >
      Cursor (Anysphere) is the most commercially formidable competitor to Cognition in the pure-ARR sense, having
      scaled from zero to $2 billion ARR within approximately 24 months of its public launch. Its Series D funding round
      in November 2025 raised $2.3 billion at a $29.3 billion valuation—the largest venture financing in AI coding
      history at the time. Investors include Thrive Capital, Andreessen Horowitz, Accel, Nvidia, and Google. Cursor's
      architecture relies on a VS Code fork with deep token-budget controls, model-agnostic routing (Sonnet, GPT-4o,
      Gemini), and a multi-agent background agents feature that runs up to eight parallel task threads—narrowing the
      functionality gap with Devin's full-autonomy proposition. Cursor's 1 million-plus paying customers and 50,000
      enterprise teams demonstrate product-market fit across the individual developer and team segments. Cursor is
      growing faster than Cognition on ARR metrics and has more paying customers, providing proportionally more training
      signal and pricing power.

      Windsurf (formerly Codeium) built strong developer mindshare with a free-tier, VS Code compatible AI IDE and over
      800,000 users before the Cognition acquisition in July 2025. Post-acquisition, Windsurf's enterprise book ($82M
      ARR contributed, 350-plus enterprise customers) was folded into Cognition's revenue base, converting a direct
      competitor into a distribution channel. The integration is not yet complete, and retention of Windsurf's
      enterprise customers under the Cognition brand is a key execution risk. The acquisition also demonstrated
      Cognition's willingness to pursue inorganic growth to defend against IDE-layer encroachment—a signal that the
      competitive pressure from Cursor in the IDE tier was viewed as existential to distribution strategy.
    claimRefs:
