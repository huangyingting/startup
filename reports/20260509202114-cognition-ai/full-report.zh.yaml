    title: 最终尽调请求表
    columns:
      - 尽调请求
      - 优先级
      - 关键原因
      - 可接受阈值
    rows:
      - - 按队列划分的净收入留存率（季度，滚动 4Q）
        - 关键
        - ARR 质量；判断增长是扩张驱动，还是被流失掩盖
        - NRR ≥110% 证实健康；<90% 则破坏投资逻辑
      - - 按产品线划分的毛利率（Devin ACU、Windsurf、Enterprise）
        - 关键
        - LLM 成本结构；盈利路径；毛利压缩风险
        - 目标毛利率 50%+；<30% 会让规模化可持续性存疑
      - - 前五大客户 ARR 及其占总 ARR 比例
        - 关键
        - 集中度风险；单一客户流失事件的影响
        - 前五大客户 <40% 总 ARR；任一单一客户 >15% ARR 即为高集中
      - - Devin 2.0 后渗透测试报告或红队摘要（December 2024 补丁后）
        - 高
        - 安全可信度；智能体能力扩展后需要重新审计
        - 签署 NDA 后开放 SOC 2 Type II + 至少 1 次 Devin 2.0 后独立渗透测试
      - - Windsurf 整合后的客户留存率（收购后 6 个月）
        - 高
        - 整合执行证明；IDE 客户流失风险
        - 收购后 6 个月，Windsurf 企业账户留存率 ≥85%
      - - LLM API 合同条款（Anthropic、OpenAI）：批量价格、智能体用例条款、控制权变更
        - 高
        - 供应商利益冲突；毛利率底线判断
        - 价格锁定至 2027 年，或多模型分散策略已落地
      - - 欧盟 GPAI 合规计划与监管事务人员配置
        - 中
        - 2026 年 8 月合规截止；若不合规，欧盟收入面临风险
        - 已明确欧盟监管事务负责人；GPAI 透明度文件时间表 <6 个月
      - - 美国政府垂直市场 FedRAMP 授权状态与时间表
        - 中
        - 政府 ARR 管线；政府垂直市场上线可信度（2026 年 2 月）
        - FedRAMP 授权时间表清晰；具名机构确认过渡期用例
