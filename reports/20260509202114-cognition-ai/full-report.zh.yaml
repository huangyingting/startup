      - number: '7.5'
        title: 执行、人员与合作伙伴风险
        blocks:
          - type: paragraph
            body: >
              Cognition 三位联合创始人——Scott Wu（CEO）、Steven Hao 和 Walden Yan——都是竞技编程冠军，技术资历极强，但在早期创业之外没有构建企业软件公司的历史业绩。关键人风险集中在
              Scott Wu 身上，他驱动技术愿景、投资人关系和产品战略。Anthropic、OpenAI、Google DeepMind 和 Microsoft 争夺 AI 人才异常激烈，且都在以超过 $500K
              总薪酬的待遇运营前沿 AI 项目，直接竞争 Cognition 依赖的竞技编程和 ML 工程人才池，给其 AI 人才管线造成压力。Devin 平台高度依赖第三方伙伴：AWS（VPC 算力）、GitHub（PR
              工作流集成）以及 Slack/Teams（企业沟通）。这些平台中任何一家修改 API 访问、定价或集成政策，都可能破坏 Devin 的企业价值主张。Anthropic 和 OpenAI
              既是供应商又是竞争者：它们供应 Devin 编排的底层模型，同时分别通过 Claude Code 和 OpenAI Codex 竞争，形成利益冲突激励。2026 年 Q1–Q2
              宣布向日本、新加坡和欧盟扩张，引入了司法辖区特定的合规义务，需要在收入兑现前招聘法律和运营人员。美国政府客户通常要求 FedRAMP 或等效授权，流程一般需要 12–24 个月；已宣布政府垂直线与实际
              FedRAMP 授权之间的时间差，形成声誉和合同风险窗口。国际法律基础设施——欧盟 DPO 任命、日本 PIPL 合规、新加坡 PDPA——正在成为缺口；这家公司此前更优先产品速度，而不是监管脚手架。
            claimRefs: []
