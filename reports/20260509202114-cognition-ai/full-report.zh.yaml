      - number: '6.4'
        title: 留存、满意度与耐久性
        blocks:
          - type: paragraph
            body: >
              Cognition AI 公开可得的留存和满意度指标有限。公司没有披露净留存率（NRR）、总留存率（GRR）、客户流失率或队列分析数据。最接近满意度的公开指标是 PR 合并率（截至 2025 年 4 月为
              67%，发布时为 34%），它衡量 Devin 打开的 PR 被人工审查者接受的比例——这是输出质量的合理代理，但不是标准客户满意度指标。67% 的 PR 接受率意味着 Devin
              三分之一的工作产物会被拒绝或需要大量返工；对高量自主任务或许可以接受，但相较人类工程师仍是明显质量缺口。

              独立来源的开发者情绪参差不齐。Hacker News 社区指出，早期 Devin 演示看起来打磨得很好，但复杂任务的真实表现落后于最初 13.86% SWE-bench 公告设定的预期。imseankim.com
              的独立评测者在等待六周观察产品生产表现后指出，相比 Cognition 官方性能数字，「独立测试者讲述的是更复杂的故事」，并提示 ACU 成本在实践中累积很快：中等使用量就很容易让名义 $20/月 Core
              计划下的月账单超过 $100–200。2024 年 12 月披露的安全漏洞也短暂损害了注重安全的企业客户信任。

              耐久性信号方面，Nubank 部署描述了持续且扩大的使用（数据、催收和风险业务单元逐步采用 Devin）。Cognition 内部使用 Devin（2026 年 2 月每周合并 659 个
              PR）说明产品驱动留存较强。Cognizant 和 Mercedes-Benz 合作一旦嵌入企业工作流，会形成结构性切换成本。不过，具名企业客户的合同期限、续约率和部署后满意度并不公开。
