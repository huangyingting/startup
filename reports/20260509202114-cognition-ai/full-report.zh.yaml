chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              Cognition AI 是一家总部位于 San Francisco、以 AI 为底层的软件公司，正在构建可执行端到端软件工程任务的自主智能体。旗舰产品 Devin 对外定位为全球首个 AI
              软件工程师：它能理解工单、规划方案、编写和调试代码、运行测试，并在极少人工介入下部署到生产环境。公司面向个人开发者和小团队提供 SaaS 订阅（Core 方案 $20/month），Team 方案为
              $500/month，包含 250 个 Agent Compute Units，并向企业提供带 VPC 部署选项的定制合同。July 2025 收购 AI 原生 IDE Windsurf 后，Cognition
              扩充了产品组合，可以服务更偏好交互式、IDE 中心工作流的开发者，而不只覆盖完全自主的智能体。双产品策略让 Cognition 同时切入智能体自动化板块，以及由 GitHub Copilot 和 Cursor
              主导的传统代码助手市场。收入主要按用量计费：超出方案包含额度的 Agent Compute Units 约按 $2.25/ACU 定价，形成随企业任务量扩张的计量模型。公司网站和博客是面向公众的渠道；公司不发布
              GAAP 财务数据，只通过投资人沟通和公司主导的新闻稿披露信息。
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO028
              - CO029
      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >-
              Cognition AI 由三位顶尖竞技程序员共同创立；每人都是 International Olympiad in Informatics 金牌得主，公司从一开始就拥有极深的技术底座。CEO Scott Wu
              三次获得 IOI 金牌，曾是 2011 MATHCOUNTS 全国冠军，并拥有 Harvard 经济学学位。在 Codeforces 竞技编程平台上，Wu 的称号为最高等级 Legendary
              Grandmaster，体现了持续的算法解题能力。创办 Cognition 之前，他曾联合创立 AI 职业社交产品 Lunchclub。CTO Steven Hao 同样是 IOI 金牌得主，曾在 Scale
              AI、DeepMind、Waymo、Nuro、Modal 和 Cursor 任职，经历横跨前沿 AI 研究与生产工程系统。CPO Walden Yan 则带来产品领导力和 IOI 级算法深度。公司创立时约 10
              人的团队合计持有 10 枚 IOI
              金牌，这种竞技编程人才密度在早期创业公司中极为罕见。这个画像吸引了顶级投资人与人才，但也带来明显的关键人物依赖：创始人的技术信誉与公司的市场定位高度绑定。公司尚未公开披露董事会组成或独立董事信息。
