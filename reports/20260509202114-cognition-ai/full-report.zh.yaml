      - number: '4.2'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Cognition AI 在不到 18 个月内通过三轮主要融资筹集约 $696 million 风险资本，成为有记录以来融资最快的 AI 基础设施公司之一。March 2024 的种子 / Series A 从
              Founders Fund 筹集约 $21 million，投前估值 $350 million；在尚无产品收入前，这已经释放出对创始团队的早期信心。April 2024，发布数周后，Cognition 又以 $2
              billion 投后估值完成 $175 million 融资，仍由 Founders Fund 领投，并在成立六个月内跨过独角兽门槛。September 2025 的 Series B 以 $10.2
              billion 投后估值融资 $400 million，共同投资人包括 Lux Capital、8VC、Elad Gil、Bain Capital Ventures、D1 Capital、Definition
              Capital 和 Swish Ventures。VentureBeat 和 TechCrunch 在 September 2025 确认了这一轮融资。

              公司披露从成立到 Q3 2025 的净现金消耗低于 $20 million；考虑到融资规模，这个烧钱水平极低，说明大部分资本被保留，而不是像同阶段公司那样快速花在人员或基础设施上。July 2025 的
              Windsurf 收购估计约 $250 million，由现有资本储备支付，没有新一轮新股融资；相对于员工数和交易规模，这体现了财务纪律。收购后员工数据报道在裁掉 30 人、部分 Windsurf 员工接受 9
              个月买断方案前达到约 249 人。
