      - number: '5.2'
        title: 产品与技术地图
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Cognition AI 的产品组合由四个清晰单元组成：(1) Devin Core/Pro/Max/Enterprise——面向个人、团队和企业客户的云端智能体套餐；(2)
              Windsurf IDE——带有 Cascade AI 智能体的智能体桌面 IDE，2025 年 7 月从 Codeium 收购而来；(3) Devin API——用于编程式创建会话和 CI/CD 流水线自动化的
              RESTful API；(4) Windsurf Enterprise——IDE 的企业层，提供 SSO、集中计费和高级管理员控制。第五个元素是 Windsurf Codemaps：由 SWE-1.5 和
              Claude Sonnet 4.5 驱动的 AI 标注结构化代码库地图，把导航锚定到精确行号和可视化节点图，帮助团队快速上手和调试。

              2026 年 4 月的套餐调整取消了原有 Core 和 Team 计划，改成五层结构：Free（ACU 有限）、Pro、Max、Teams 和 Enterprise。这个改动指向先落地再扩张的策略：Free
              层让个人开发者和编程训练营学生低门槛接触，Pro 和 Max 服务高强度用户，Teams/Enterprise 则承接组织级部署。SWE-Check 是 2026 年 4 月与 Applied Compute
              合作推出的专用缺陷检测模型，通过强化学习训练，内部评测追平 Opus 4.6，同时运行速度约快 10x——定位是在 Devin 智能体循环里更省成本的质量闸门。

              Cognition 的自研模型 SWE-1.5 同时支撑 SWE-Check 和 Windsurf Codemaps，代表公司在 Devin
              运行时模型组合之外第一次发布自有模型。所有产品都以云优先方式交付；需要本地部署或隔离云基础设施的企业客户可以选择 VPC 部署。2026 年发布的 Devin for Terminal
              允许开发者从本地终端启动智能体会话，并在任务超出本地资源时升级到云端，把 CLI 和云部署两种模式接了起来。
