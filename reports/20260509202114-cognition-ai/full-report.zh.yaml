      - number: '4.5'
        title: 资本充足性与现金跑道
        blocks:
          - type: paragraph
            body: >
              Cognition 已融资约 $696M，并披露截至 Q3 2025 烧钱低于 $20M，因此进入 2026 年时，即使没有新融资，也拥有充足财务跑道。Windsurf 收购估计消耗 $250M 储备，剩余约
              $426M，再扣除持续运营费用。按保守的 200 名员工、每人每年 $400K 烧钱（混合全负担成本）计算，不含算力的年度运营成本可能达到 $80M 或更高。如果公司以中等毛利率（考虑推理成本，估计
              50–70%）产生 $155M ARR，毛利可能足以支持持续运营，无需立即补充资本。不过，$25B+ 估值讨论说明公司寻求资本是为了加速，而不仅是维持运营。新资本的预期用途包括 Devin
              下一代模型研发、扩建企业销售队伍、为大规模推理建设全球数据中心容量，以及为整合 AI 编码基础设施市场而进行潜在后续收购。

              Founders Fund 的领投关系带来额外跑道可选性：Founders Fund 过去愿意为表现突出的被投公司领投后续轮，降低融资风险。D1 Capital、Bain Capital Ventures
              等大型机构共同投资人的存在，也说明公司可触达跨界投资和后期资本。总体资本充足性评级为中高：按当前烧钱估计，公司至少有 24 个月跑道，但激进增长执行和 Windsurf 整合成本可能让烧钱速度快于现有估计。
