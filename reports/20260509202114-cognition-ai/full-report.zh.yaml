      - number: '6.2'
        title: 采用轨迹与增长指标
        blocks:
          - type: paragraph
            body: >
              Cognition AI 最突出的采用信号，是年经常性收入（ARR）的增长轨迹：从正式可用时（2024 年 12 月）约 $1M ARR，到 2025 年 4 月约 $73M ARR——四个月内大约增长
              73x。这个增速与 Sacra 对 2024 年 10 月约 $15M ARR 的估计、以及 Growjo 平台当前 $73M 的估计相吻合，但两组数字都是第三方估计，不是审计后或公司披露的财务数据。2025 年
              4 月的定价重置（Core 计划从 $500/月降到 $20/月基础价）在维持企业收入规模的同时，加速了个人开发者采用。

              内部使用信号很有信息量。到 2026 年 2 月，Cognition 自己的工程团队每周合并 659 个 Devin PR，是 2025 年最佳周 154 个的四倍。这个「自用」信号重要：打造 Devin
              的团队也是最重度的用户，形成高质量反馈循环，很可能加快迭代速度。PR 合并率从 Devin 发布时的 34% 提高到 2025 年 4 月的
              67%——可视为输出质量改善的代理指标——但该指标为自报，分母方法未说明。

              2026 年上半年在伦敦、东京、新加坡扩张，说明管理层相信收入足以支撑多办公室开销。Cognizant 合作尤其重要，因为它是渠道放大器：Cognizant 全球客户基础覆盖金融服务、制造和医疗等 300+
              组织，即便部分渗透，也可能在不同比例增加 Cognition 销售人手的情况下，显著拉动 Devin 的企业账户数。不过，关于活跃付费账户数量、平均合同价值或 ARR 估计之外的客户增长率，公开数据不存在。
