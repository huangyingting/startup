      - number: '6.3'
        title: 具名客户证明与引用质量
        blocks:
          - type: paragraph
            body: >
              质量最高的具名客户证明是 Nubank 案例研究，也是唯一公开详细且量化的生产部署。Nubank 是拉美最大数字银行（约 1 亿客户），使用 Devin 将一个 600 万行 ETL
              单体迁移到子模块；该任务原本估计需要 1,000+ 名工程师投入 18 个月。借助
              Devin，每个业务单元（Data、Collections、Risk）的迁移以周为单位推进，相比全人工基线，实现了按节省工时计算的 12x 工程效率提升和 20x
              成本节省。关键在于，案例研究记录了针对客户特定迁移模式的微调，带来 4x 速度提升（单任务从 40 分钟降到 10 分钟）和内部基准上 2x 准确率提升。

              Mercedes-Benz 在一篇博客文章（2026 年 4 月 27 日）中被列为客户，称其在「全球工程组织内」部署 Devin 和
              Windsurf，用于遗留系统现代化、云原生开发和物流。公开信息没有披露结果指标；该公告仍处于合作 / 宣布阶段，而非事后案例研究。Cognizant（2026 年 1 月 28 日宣布）正在把 Devin 和
              Windsurf 部署到「其工程组织和全球客户」中——这更像渠道合作，而不是具名终端客户，也没有生产结果数据。

              其他未具名客户证据包括：财富 500 强 COBOL 现代化部署（2026 年 4 月 8 日博客文章，无具名客户）、美国政府（Cognition for Government 2026 年 2 月 25
              日推出，无具名机构）、日本企业（2026 年 4 月 9 日推出，无具体客户）。证据深度和新鲜度差异极大：Nubank 是带量化结果的生产案例；其他仍在公告阶段。这造成证据质量集中风险——如果 Nubank
              不能代表典型部署，客户证明基础就很浅。
