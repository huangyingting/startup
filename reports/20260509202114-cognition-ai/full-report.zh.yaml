      - number: '5.6'
        title: 信任、安全、安保与合规
        blocks:
          - type: paragraph
            body: >
              Devin 的主要安全架构依赖沙箱化计算隔离：每个会话都运行在临时容器中，除非通过集成凭证明确授权，否则无法访问其他会话或客户生产环境。代码变更以 PR 形式呈现并需要人工批准；Devin
              执行轨迹会记录会话中每一条 shell 命令、每一次文件编辑和每一次 API 调用，形成可审计日志。VPC 部署把源代码留在客户自己的云边界内，又增加了一层隔离。

              2024 年末，一次直播演示暴露了重大安全事件：Devin 的系统提示处理存在严重漏洞，实际上允许提示注入攻击操纵 Devin 行为。Cognition
              承认问题并迅速修补，但事件凸显了部署自主智能体的内在风险——这类智能体可以根据文本输入执行 shell 命令。Hacker News 评论把这次失败称为「考虑到严重性，显得很业余」，并指出对具备 shell
              执行能力的智能体来说，提示注入防御本应是第一优先级安全控制。

              截至 2026 年 5 月，Cognition 尚未公开披露 SOC 2 Type II、ISO 27001 或同等级企业安全认证。trust.devin.ai 子域名存在，但研究时返回的公开信息有限。依赖
              VPC 部署和定制训练模型的企业客户可能受单独安全协议约束，但这些协议无法公开审计。Devin 会话中执行代码的数据隐私与留存政策，在 Cognition
              面向公众的文档中没有完整披露；对金融服务和受监管行业客户来说，这是实质性合规缺口。Mercedes-Benz 和 Goldman Sachs
              的合作关系显示，合规障碍可能已通过定制协议解决；但缺少公开披露，外部无法独立评估。
            claimRefs: []
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              Cognition AI 面向技术领先企业、中端市场公司和开发者优先组织中的专业工程团队。买方画像通常是希望在不按比例增加人手的情况下放大开发吞吐量的工程负责人或
              CTO；使用者通常是单个软件工程师或工程经理，通过 Slack、Jira 或 Devin 网页界面直接分派任务。付款方则是工程预算负责人，可能是部门预算所有者，也可能是大型企业里的集中 IT 采购部门。

              已确认生产部署的垂直行业包括金融服务和金融科技（Nubank——拉美最大数字银行）、汽车 / 制造（Mercedes-Benz）、IT 服务与外包（Cognizant）、企业技术，以及美国联邦政府。COBOL
              现代化博客文章确认，财富 500 强中仍运行大量 COBOL 工作负载的行业已经部署，覆盖金融服务、保险和公用事业。2026 年，Cognition 推出 Government
              垂直线，瞄准美国联邦机构的遗留软件现代化。日本和新加坡企业市场在 2026 年 4 月开放，说明东南亚金融服务、制造和技术公司可能是下一批目标细分市场。

              地理分布以美国优先（截至 2026 年初，多数收入和具名客户来自美国），欧洲（伦敦办公室 2026 年 1 月开设）和 APAC（日本、新加坡办公室 2026 年 4
              月开设）是增长中心。渠道分布包括直销企业销售、Windsurf IDE 的免费转付费漏斗（收购时日活跃用户 250K+），以及 Cognizant 转售合作，把 Devin 和 Windsurf 部署到
              Cognizant 自有工程团队及其全球客户基础。Windsurf 集成在自上而下的企业采购之外，又创造了自下而上、开发者主导的采用路径。
