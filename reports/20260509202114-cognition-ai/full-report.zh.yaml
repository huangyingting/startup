      - number: '1.3'
        title: 融资历史与投资人
        blocks:
          - type: paragraph
            body: >-
              Cognition AI 的融资速度在近年风险投资史上名列前茅。March 2024 的首轮约 $21M 种子 / Series A 融资，在尚无实质收入之前就给出约 $350M
              估值，反映投资人押注创始团队的执行能力。仅数周后的 April 2024，Cognition 以 $2B 估值完成 $175M 融资，成立六个月内进入独角兽行列。Founders Fund——Peter
              Thiel 的风险投资机构——领投两轮，不仅提供资本，也向市场释放声誉信号。到 September 2025，随着 Windsurf 收购完成、ARR 快速增长，Cognition 以 $10.2B 投后估值融资
              $400M，累计融资约 $696M。September 2025 轮的共同投资人包括 Lux Capital、8VC、Elad Gil（知名天使投资人和运营者）、Bain Capital Ventures、D1
              Capital、Definition Capital 和 Swish Ventures。截至 May 2026，据报道公司正洽谈新一轮融资，潜在估值 $25B+，说明投资人对智能体 AI
              编码基础设施仍有强烈兴趣。值得注意的是，公司披露从成立到 Q3 2025 的净现金消耗低于 $20M，说明收购前的高速增长以极高资本效率实现。
