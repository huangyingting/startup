      - number: '1.5'
        title: 治理与关键人物风险
        blocks:
          - type: paragraph
            body: >-
              Cognition AI 是一家私营
              C-corporation，没有公开财务披露，没有公开确认的董事会组成，除股权结构表内相关方外，投资人与分析师也不知道是否存在独立董事。公司治理结构仍不透明：投资人权利、Founders Fund
              及其他领投方获得的董事席位、二级市场交易条款均未披露。产品愿景和技术信誉高度集中在三位联合创始人身上，尤其是 Scott Wu；他的公众形象和编程传奇身份与 Devin
              品牌密不可分，由此形成重大关键人物风险。2025 年，公司向 Windsurf 员工提出自愿买断，原因是 CEO 公开要求
              80-hour、每周六天工作制；这种强制性文化引发人才留存疑问，尤其是被收购员工原本并未主动选择这种环境。收购后 Windsurf 工程师流失，可能削弱支撑约 $250M 交易合理性的 IDE
              产品能力。批评者和独立评测者指出，Devin 在真实任务中的成功率显著低于公司筛选后的基准演示所暗示的水平，“完全自主软件工程师”的叙事可能高估当前能力，进而带来未来投资人和客户预期风险。
