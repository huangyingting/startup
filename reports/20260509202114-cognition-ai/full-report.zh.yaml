      - number: '6.5'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              Cognition AI 的先落地再扩张策略很清楚：Nubank 部署从一个业务单元的 ETL 迁移开始，随后扩展到 Data、Collections 和 Risk 单元。Cognizant
              合作也暗示类似结构——Cognizant 先内部部署，再向全球客户基础增购。Free 和 Pro 套餐面向开发者主导采用：个人开发者以低成本试用，推动内部采用，并制造自下而上的企业采购压力。Windsurf
              IDE 的 250,000+ 日活跃用户提供了庞大自然安装基础，可转化为付费 Devin 使用。

              集中风险显著，且没有公开披露。在 ARR 约 $73M、已确认具名账户很少的情况下，少数大型企业合同（Nubank 量级、Mercedes-Benz 量级）很可能构成收入主导份额。如果 Cognizant
              渠道合作表现良好，它本身也可能通过单一转售商带来不成比例的收入集中，而不是多元化直客关系。COBOL
              现代化垂直线瞄准高价值项目（多年遗留系统），但这类项目在结构上通常是一次性工作，除非重新谈成长周期支持合同；初始迁移结束后，收入可能面临断崖风险。

              受监管行业采购摩擦很高。金融服务、医疗和政府客户要求安全认证（SOC 2、FedRAMP）和数据驻留控制，而 Cognition 未公开披露已经满足这些要求。VPC
              部署缓解了数据驻留担忧，但缺少已发布的合规证明，会限制其在监管最严格行业垂直中的可服务市场。2026 年 2 月推出 Government 垂直线，说明 Cognition 正在主动处理 FedRAMP
              等效认证要求，但时间表和当前状态并不公开。这个合规缺口是 Cognition 面向目标大型企业客户的主要企业采购障碍。
