      - number: '7.3'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              Cognition 最尖锐的竞争风险，是曾经定义其领先地位的智能体编码基准正在快速商品化。Devin 在 2024 年 3 月发布时，SWE-bench Full 得分 13.86% 曾具有突破性。到 2025
              年中，Claude Code Opus 4 在 SWE-bench Verified 上达到 72.5%——约 15 个月里提升五倍。OpenAI Codex 和 GPT-5 也达到可比的 Verified
              分数。这样的改善速度威胁 Devin 的技术差异化：其多步规划、执行和测试循环可能在 12–18 个月内被基础模型提供商复制。GitHub Copilot（250M+ 安装量、Microsoft
              分发）、Cursor（$500M+ ARR、$9B 估值、$40/月定价）和 Claude Code（Anthropic）都在争夺与 Devin（$500/月 Team 计划）相同的企业开发者生产力预算。FTC
              已经担心，基础 AI 输入要素的集中控制——包括 Devin 依赖的模型——可能让这些提供商扭曲下游 AI 应用市场竞争，这对 Cognition 是结构性风险。Cognition 收购
              Windsurf（2025 年 7 月）带来 350+ 企业账户和 250K+ DAU，但也带来集成风险：两个独立的 AI 智能体代码库、模型流水线、计费系统和销售动作必须同时合并，还要维持 ARR
              增长。Devin 发布时，开发者社区围绕基准可靠性、封闭演示和误导性优势主张产生怀疑，形成不利声誉动态；这增加了技术成熟买家的采用摩擦，并且随着企业评估更严格，仍是逆风。定价压缩已经出现：Devin 2.0
              将有效价格下调约 3×；未来竞争压力可能要求进一步降价，压缩每会话收入。
