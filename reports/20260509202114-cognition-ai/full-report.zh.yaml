      - number: '3.4'
        title: 自主智能体竞争对手 — Claude Code、OpenAI Codex 与 SWE-agent
        blocks:
          - type: paragraph
            body: >
              在自主智能体层，Claude Code（Anthropic）可以说是 Cognition 最直接的质量型竞争对手。Claude Code 是终端原生的智能体编码助手，构建在 Anthropic 的 Claude
              3.7 Sonnet 和 Claude 4 模型之上；这些模型在 SWE-bench Verified 上长期位居前列，该独立基准衡量智能体解决真实 GitHub issue 的能力。Devin 在 March
              2024 的首个 SWE-bench 分数 13.86% 当时是突破，但 Anthropic 后续模型改进把 Claude 系智能体推到 50% 以上，削弱了 Devin 的基准差异化。Claude Code
              定价（Pro $10/month，Max $100/month）在入门价格上低于或接近 Devin Core 档（$20/month，5 ACUs），尽管用于智能体规模自主使用时经济性不同。关键架构差距在于
              Claude Code 仍需要人工操作者在终端监督，而 Devin 设计为在企业云环境中完全无人值守运行；对大规模自动化来说，这是有意义的运营差别。

              OpenAI 在 2025 年以基于网页的智能体编码环境重新推出 Codex，并由 o3 模型家族支持，定位为直接的 Devin 竞争对手。Codex Workspace 允许用户分配高层级功能任务并收到完成后的
              PR，复制了 Devin 的核心价值主张。考虑到 OpenAI 的 $300 billion-plus 估值、API 分发和 ChatGPT 开发者生态，如果 OpenAI 优先投入执行质量和激进定价，Codex
              的竞争入场将对 Cognition 差异化构成根本威胁。SWE-agent（Princeton NLP Group）是开源研究框架，不是商业产品；它的重要性主要在于基准比较器，也在于它释放了招聘信号：世界级 ML
              研究者正积极在商业体系之外研究自主代码执行框架，可能加速核心技术的开源商品化。
