      - number: '8.4'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: >
              Cognition 的可比公司组包括 AI 原生开发者生产力工具（Cursor、Replit）、拥有编码产品的基础模型提供商（Anthropic/Claude Code、OpenAI/Codex），以及 ARR
              运行率相近的更广义企业 AI SaaS 公司。Cursor/Anysphere 是最接近的可比对象：两者都是面向企业开发者的 AI 编码工具，都是 VC 支持，并且都在 2025
              年下半年达到最新估值。Cursor 以约 $500M ARR 完成 $9.9B Series D（Bloomberg，2025 年 11 月），对应 18–20× ARR 倍数。Cognition 以约 $73M
              ARR 对应 $10.2B 估值，意味着约 140× ARR 倍数，按 ARR 口径相对 Cursor 有 7–8× 溢价。Cognition 的溢价部分由更高增长率（Devin 从发布起增长更快）支撑，但随着
              Cursor 的 ARR（$500M）已经证明更高收入质量和更宽客户基础，这种溢价在结构上不可持续。Harvey AI（法律 AI，$3B 估值，约 $100M ARR，约 30× ARR）是垂直 AI SaaS
              可比对象，高质量 NRR 支撑其溢价倍数。Glean（企业 AI 搜索，$4.6B，约 $100M ARR，约 46× ARR）说明企业 AI SaaS 在 $100M ARR 时可以维持 40–50× ARR
              倍数，但 Glean 的 NRR 据报道高于 150%。Replit（2023 年 $1.16B 估值，带 AI 转型的开发平台）代表品类风险：一个先锋转型故事，后来把市场份额输给更聚焦的 AI
              原生竞争者。2025 年，接近盈利或已盈利 AI SaaS 公司的隐含 IPO 入场倍数约为 15–25× 前瞻 ARR；Cognition 若以 $10.2B 和约 $73M ARR
              为基准，需要在标准倍数下达到 $400–680M ARR，IPO 才能守住 $10.2B 入场估值。没有公开市场可比对象：GitHub Copilot 嵌在 Microsoft Azure 收入中，Amazon
              Q 嵌在 AWS 中，Claude Code 嵌在 Anthropic API 收入中。私募市场相对公开可比的溢价历史上为 20–40%；这意味着在基准情景假设下，Cognition 的公允价值区间为
              $3–7B，低于上一轮 $10.2B，说明当前轮次价格较内在价值带有 1.5–3× 投机溢价。合适的投资人回应是保持入场纪律——等待 ARR 在 $300M+ 得到确认，或估值修正到 $4–6B。
