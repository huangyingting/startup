  - id: FU003
    title: 获客与扩张流
    type: flow
    description: >
      流程图展示 Cognition AI 的获客和扩张动作。通过 Windsurf IDE（免费）或 Devin Free/Pro 做开发者主导入口，随后靠 PR 质量提升推动团队级采用，再进入企业级采购和定制部署（VPC、微调
      Devin）。渠道层显示 Cognizant 是并行的企业入口。账户内扩张以跨业务单元的横向扩张呈现（Nubank 模式）。
