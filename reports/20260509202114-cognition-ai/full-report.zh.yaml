      - number: '7.4'
        title: 财务与运营风险
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，Cognition 已披露融资约 $1.575B。公司有 222 名员工（按 Growjo，年化员工增长 102%），产品又高度消耗算力，估计月烧钱为 $5–15M；保守情景下现金跑道约
              18–36 个月。从 GA（2024 年 12 月）约 $1M ARR 增长到约 $73M ARR（2025 年 4 月估计）非常出色，但也引入客户集中风险：少数具名企业账户支撑 $73M
              ARR，说明可能存在几个超大合同，续约时会带来实质流失风险。Nubank 是唯一披露且量化的生产案例研究。如果 Nubank 或同等规模客户因安全事件、预算重分配或转向竞品而流失，ARR 下滑可能削弱未来以
              $10.2B 假定估值融资的能力。ACU 定价模型（超额使用每 ACU $2.25）会带来不可预测的使用量收入，也会让低估消耗的客户因账单冲击而流失。LLM 推理成本带来的毛利压缩——以商业
              Anthropic/OpenAI 价格调用第三方 API——会限制毛利率扩张，直到 Cognition 构建自有模型或拿到规模定价。公司没有公开披露盈利路径、EBITDA 或毛利率目标。Windsurf
              集成增加了运营复杂度：同时合并计费系统、企业合同和产品团队，会提高执行风险并可能拖慢战略路线图。2025 年 1 月 Series A 的 $2B 估值与 Windsurf 后融资所暗示的 $10.2B
              Growjo 估值估计，意味着任何 ARR 增长轨迹的实质失误、流失事件或下一轮融资下调，都可能打击团队动机并触发关键员工离职。公司拒绝披露毛利率、NRR 或队列留存指标，使财务风险进一步升高。
            claimRefs: []
