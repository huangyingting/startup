        - 高
        - 若执行失速，以 $10.2B 入场有较高资本减值风险
      - - 估值立场
        - 投机性溢价 — 当前 $10.2B、约 140× ARR，是 Cursor 倍数的 7×
        - 倍数对比：Cursor $9.9B / $500M ARR = 20× ARR；Cognition $10.2B / $73M ARR = 140× ARR
        - 中
        - 基准情景下公允价值区间为 $3–7B；高于 $7B 入场需要乐观情景证据点
      - - 乐观情景目标
        - $18–25B 退出（持有 3 年，$700M+ ARR，25–35× 前瞻 ARR）
        - 增长率可持续；Windsurf 整合成功；NRR ≥120%
        - 低-中
        - 以 $10.2B 入场可获 1.5–2.5× 回报；只有近乎完美执行，才足以支撑风投 IRR
      - - 悲观情景目标
        - $800M–$1.8B 退出（第二起安全事件，或重大流失，或竞争对手降价 >3×）
        - 安全阴影；基准商品化；LLM 定价风险
        - 中
        - 以 $10.2B 入场可能损失 90%+ 资本；没有更高置信度的 NRR 数据，不接受这种不对称
