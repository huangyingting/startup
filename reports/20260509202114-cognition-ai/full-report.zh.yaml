companyProfile:
  summary: >
    Cognition AI 是一家总部位于 San Francisco 的 AI 初创公司，2023 年由 Scott Wu、Steven Hao 和 Walden Yan
    创立；三位创始人都是竞技编程冠军，也曾获得奥林匹克竞赛奖牌。公司的旗舰产品 Devin 是云端托管的自主 AI 软件工程师，能够端到端规划、写代码、测试和部署，无需持续人工输入。用户可通过 API、Slack、Jira
    或网页界面访问 Devin，定价采用基于用量的 Agent Compute Units（ACUs）模式。July 2025，Cognition 收购 Windsurf IDE，新增 250K+ 日活跃用户和 350+
    企业账户。公司已融资约 $1.575B，最近一轮为 September 2025 的 $400M，估值 $10.2B。
