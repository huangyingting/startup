      - number: '4.3'
        title: 单位经济与利润率结构
        blocks:
          - type: paragraph
            body: >
              Cognition 不披露毛利率、获客成本（CAC）或 cohort 级留存数据，因此很难精确建模单位经济。但仍可做结构性推断。ACU
              模型意味着收入成本一部分可变（每个任务的推理算力），一部分固定（模型托管、沙盒环境、CI/CD 基础设施）。前沿模型规模的企业 AI 推理（每个任务很可能调用 GPT-4 或 Claude API）按当前云
              spot 价格可达到每小时智能体运行 $5–$50；企业 ACU 包约按 $2.25/ACU 定价，Team 方案每月含 250 ACUs，因此毛利率高度取决于任务长度和模型调用效率。

              高价值企业合同（Goldman Sachs、Citi、Nubank）可能采用带批量折扣的定制价格；如果基础设施成本能在大任务量上摊薄，规模化后利润率可能改善。Nubank 案例研究称代码迁移工作流效率提升
              12x，说明客户认为 Devin 相对节省的开发者工时价值很高，这是定价权的有利信号。不过，完全自主编码智能体的内在难点在于任务复杂度差异很大：简单 bug
              修复执行成本低，复杂的多周功能构建却可能不成比例地消耗算力预算。除非 Cognition 在企业层面限制任务范围，否则规模化利润率管理需要成熟的算力预测能力。

              公司收购前资本效率（收入规模化前，在融资 $350M+ 的情况下烧钱低于 $20M）与收购后的成本结构可能形成鲜明反差。把 250 名员工（Windsurf 人员）加到约 49
              人团队之上，员工数增加四倍以上，短期内会显著压缩人均收入，除非整合协同迅速兑现。
