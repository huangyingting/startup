      - number: '5.4'
        title: 部署、集成与可靠性
        blocks:
          - type: paragraph
            body: >
              Devin 支持两种主要部署模式：云托管（默认，运行在 Cognition 管理的基础设施上）和 VPC 部署，后者面向需要数据驻留、网络隔离或监管合规的企业客户。VPC 模式允许 Devin 在客户自己的
              AWS、GCP 或 Azure 环境中运行，避免把源代码传到 Cognition 服务器。企业层还提供定制训练的 Devin 实例，客户可以用自有代码库和内部规范微调智能体。

              平台与 GitHub、GitLab、Bitbucket 原生集成，用于源码管理（创建 PR、代码审查自动化、分支管理）；与 Jira 和 Linear 集成，用于工单分派和状态跟踪；与 Slack 和
              Microsoft Teams 集成，用于从沟通渠道发起会话并汇报进度。REST API 支持 CI/CD 流水线里的编程式会话管理，工程组织可以在特定事件发生时自动触发 Devin
              会话（例如测试套件失败、客户缺陷报告）。MCP Marketplace
              把集成延伸到监控平台（Sentry、Datadog、PagerDuty）、数据库（PostgreSQL、MySQL、MongoDB）和文档工具（Notion、Confluence）。Windsurf IDE
              在本地集成 Cascade AI 智能体，并通过「Devin in Windsurf」把任务交接到云端。

              Cognition 公开材料没有通过正常运行时间 SLA 或状态页数据正式披露可靠性。单个会话的任务执行时间上限为 45 分钟，但更长项目可以拆成连续子会话。Devin 2.0
              的信心仪表会在执行前估计任务成功概率，让团队在消耗 ACU 前过滤低概率任务。这些质量控制能减少浪费，也说明 Devin 在复杂任务上的可靠性仍是概率性的，而不是有保证的。
