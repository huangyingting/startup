      - number: '7.2'
        title: 安全与技术风险
        blocks:
          - type: paragraph
            body: >
              Cognition 的核心产品风险在于 Devin 以较高系统权限运行——自主编写、执行、测试并部署代码——这相较被动代码助手大幅扩大了攻击面。2024 年 12
              月，一次直播演示公开暴露了提示注入漏洞：攻击者可以在仓库 README 文件中嵌入恶意指令，使 Devin 泄露密钥、发起未授权 API 调用，或在客户代码库中植入后门。Cognition
              承认并修补了问题。不过，事件表明，提示注入防御——OWASP Top 10 for LLM Applications 中排在首位的 LLM01——在 GA 发布前没有充分加固。Cognition
              安全页面确认其拥有 SOC 2 Type II 认证（2024 年 3 月审计）、传输中和静态数据加密，以及全员 MFA。Trust Center 要求先签署
              NDA，才披露渗透测试报告、审计范围和第三方评估结果——限制了企业采购团队独立评估控制有效性。关键未解缺口包括：没有公开漏洞赏金计划；没有正式 Agent Security
              Framework；没有公开渗透测试范围或红队披露；也没有发布 SLA 或历史正常运行时间数据。Devin 2.0（2025 年 4 月）把能力扩展到直接合并
              PR，并在客户基础设施上调度智能体，显著扩大了未来任何提示注入漏洞的爆炸半径。OWASP GenAI Security Project 将智能体自主性识别为超越经典 LLM
              漏洞的新兴独立风险类别。随着企业采用增长到数百家公司中的 VPC 部署，未被发现的 Devin 漏洞可能同时污染多个企业代码库——这是单个客户安全团队无法独立缓解的系统性供应链尾部风险。
