      - 评估
      - 证据基础
      - 置信度
      - 含义
    rows:
      - - 建议
        - 观察名单 — 入场估值低于 $5B 时有条件投资
        - ARR 增长异常强劲；估值倍数高达 140× ARR；安全和集中度风险未解决
        - 中
        - 跟踪 NRR、毛利率和整合进展；必须严守入场纪律
      - - 风险评级
        - 高
