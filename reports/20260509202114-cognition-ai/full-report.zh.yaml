      - number: '8.5'
        title: 退出准备度与最终尽调清单
        blocks:
          - type: paragraph
            body: >
              以当前 ARR 轨迹和公开市场要求的披露缺口看，Cognition 距离 IPO 准备就绪仍有 2–4 年。若要以 $8B+ 市值 IPO，公司需要约 $400–500M ARR、正向单位经济（40%+
              毛利率）、披露 NRR 高于 120%，以及清晰的 SOC 2 Type II + GDPR 合规基础设施。M&A 退出路径存在：Microsoft（GitHub Copilot/Azure
              定位）、Alphabet（Google Cloud 开发者工具）、Salesforce（Einstein 平台内的开发者生产力）或
              Snowflake/Databricks（数据工程自动化）都是合理收购方。$10.2B 估值让战略收购路径变难：Microsoft 此前 2018 年以 $7.5B 收购 GitHub 时，GitHub
              已有规模；若以 $10.2B 收购 Cognition，将跻身 Microsoft 最大 AI 收购之一，需要董事会级别信念。最可能的退出路径仍是后期私募股权 / pre-IPO 跨轮资金参与；如果 ARR
              轨迹持续，IPO 窗口在 2028–2030 年。投资前最终尽调优先事项：(1) 按队列披露的 NRR——高于 110% 是绿灯，低于 90% 会打破投资逻辑；(2) 规模化毛利率——目标 50%+
              毛利率；(3) Devin-2.0 后审计的渗透测试报告；(4) Windsurf 集成路线图，以及被收购客户基础的留存数据；(5) LLM 提供商合同条款，包括智能体用例定价底线；(6) GPAI
              合规计划和欧盟监管时间表；(7) 前五大客户 ARR 集中度（前五大超过 50% 是实质集中风险）；(8) 按职能划分的员工数，用于评估烧钱速度相对 ARR 覆盖率。打破投资逻辑的条件包括：12
              个月内第二次披露安全事件、NRR 披露低于 90%、ARR 增速降至 <50% YoY，或确认重大企业客户流失。
