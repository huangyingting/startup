      - number: '8.2'
        title: 估值背景与融资历史
        blocks:
          - type: paragraph
            body: >
              Cognition 已完成三轮披露融资，合计约 $1.575B。$21M 种子轮在 2023 年确立了创始团队。$175M Series A（2025 年 1 月至 4 月，Founders Fund IX
              领投）把最初机构轮投后估值定在 $2B。SEC EDGAR 记录确认 Founders Fund IX（CIK 0001971631）是向 Cognition 出资的大型机构载体；Cognition
              Capital SPV I（CIK 0002072175，Form D 于 2025-06-11 提交）显示，Windsurf 收购交割同期或之后不久设立了后续结构化载体。$400M 融资（2025 年 9
              月）将公司投后估值定在 $10.2B，较 Series A 在约九个月内上升 5.1×——这是 AI 软件史上最陡峭的估值跃升轨迹之一。总融资约 $1.575B 暗示在 $10.2B 投后基础上稀释约
              15%+，但具体优先权堆叠和清算瀑布未披露。以 $10.2B 估值计算，主要收入倍数约为 2025 年 4 月约 $73M ARR 估计的 140×，高于所有已披露 AI
              软件同业。Cursor/Anysphere 于 2025 年 9 月以约 $500M ARR 完成 $9.9B Series D，对应 20× ARR 倍数。Cognition
              的溢价部分由更高增长率和品类先锋定位支撑，但对以 $10B+ 入场的投资人来说，执行风险已经被计入价格。Windsurf 收购（2025 年 7 月）以 Cognition
              股权和现金完成，收购价未披露；Cognition Capital SPV I 指向一个结构化投资人层面载体，可能用于出资收购对价或为合并实体经营计划兜底。Winbuzzer 在 2025 年 8
              月报道的「文化重置」——Cognition 向 Windsurf 员工提供九个月买断，并据称要求每周工作 80 小时——引入了头条估值没有体现的人才整合风险。任何以 $10.2B 入场的新机构投资人，在低于
              $10.2B 的退出价值下回本前，都要面对种子轮、Series A 和 $400M 轮形成的实质优先权悬挂。
            claimRefs: []
