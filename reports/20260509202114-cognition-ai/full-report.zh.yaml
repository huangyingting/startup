      - number: '3.2'
        title: 第一梯队：超大规模云厂商支持的竞争对手
        blocks:
          - type: paragraph
            body: >
              Microsoft 收购 GitHub 后拥有 GitHub Copilot，Copilot 受益于嵌入全球最大开发者平台的无可匹敌分发。90% 的 Fortune 100 公司使用
              Copilot，活跃开发者超过 20 million，这种规模形成强切换成本惯性。Copilot 定价从个人 $10/month，到 Business 档 $19/month、Enterprise 档
              $39/month，是多数开发团队默认的低成本入口。平台已经从行内代码补全逐步扩展到聊天、PR 摘要和工作区级 Copilot Workspace；后者是多步规划和执行智能体，正在侵入 Devin
              的自主领地。GitHub Copilot 到 early 2025 年经常性收入超过 $2 billion，是全球最大的纯 AI 编码收入线。

              Amazon Q Developer 最直接回应企业细分市场的合规和安全需求，提供 Free 档和 $19/user/month 的 Pro 档。它的原生 AWS 服务集成、200,000-token
              上下文窗口，以及 Agents for Amazon CodeWhisperer 能力组合，使其成为 AWS 标准化组织的优选。Q Developer 已获得 SOC 2 Type II 认证，并支持 VPC
              隔离——多数创业公司竞争对手尚不具备这样的安全姿态。与 Cognition 相比，超大规模云厂商层的主要限制是缺少全周期自主任务完成能力：Copilot 和 Q Developer
              都不能在每个阶段没有人工在环确认的情况下，自主完成规划、实现、测试和端到端部署。这一架构约束正是 Devin 设计要利用的可触达缺口，尽管两家超大规模云厂商都在积极把智能体能力延伸到这一前沿。
