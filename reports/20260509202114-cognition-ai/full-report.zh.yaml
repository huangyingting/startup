  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险格局
        blocks:
          - type: paragraph
            body: >
              Cognition 处在快速演变的监管环境中。三大框架会在近期形成实质义务。EU AI Act（Regulation 2024/1689）对 GPAI 模型提供商的要求在 2026 年 8
              月生效，要求透明度文档、版权合规政策和 EU AI Office 注册。由 ICO 管理的 UK GDPR 适用于英国 / 欧盟居民的所有数据处理，并要求对高风险 AI 处理开展数据保护影响评估；Devin
              的自主 PR 合并和代码部署能力很可能触发 Article 35。2025 年 1 月的白宫行政令 撤销了此前拜登时期的 AI 安全义务，使美国联邦环境走向放松监管，但后续机构层面规则（尤其是政府 AI
              采购）仍在生效。California SB 1047 原本会施加前沿模型问责要求，已在 2024 年 9 月被否决；后续立法（AB 2013、SB 1235）在 2025–2026 会期仍处于活跃状态。另一起
              Doe v. GitHub、Microsoft 和 OpenAI 版权诉讼已在加州北区联邦地区法院合并审理，主张 AI 代码模型用开源仓库训练构成版权侵权；Cognition
              未披露其模型训练数据来源，形成类似的潜在 IP 暴露。Cognition 服务条款限制使用输出训练竞争模型，但上游模型训练数据的版权状态无法独立验证。相较 Cognition
              的规模及其横跨欧盟、日本和新加坡的企业客户基础，合规监控、跨司法辖区 DPA 覆盖和 GPAI 透明度文档都明显投入不足。若没有专职监管事务职能，到 2026 年 Q3，Cognition
              可能面临执法行动、GPAI 未注册处罚，或欧盟市场准入受限。当前国际扩张阶段，主动监管项目应被视为业务关键投资，而不是可有可无的法务开销。
            claimRefs: []
