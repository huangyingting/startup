      - number: '1.4'
        title: 规模与里程碑
        blocks:
          - type: paragraph
            body: >-
              按任何 SaaS 基准看，Cognition AI 的收入曲线都异常陡峭。公司在 2024 年末达到约 $1M ARR（September 2024），到 June 2025 加速至 $73M
              ARR；九个月约增长 73x，动力来自企业采用 Devin 处理代码迁移、修 bug 和功能自动化任务。July 2025 收购 Windsurf 后，来自 350+ 企业账户的 $82M ARR
              被并入，合并业务在数周内升至约 $155M ARR。Goldman Sachs（据报道正在让 12,000 名开发者试点 Devin）、Citi、Dell、Cisco、Ramp、Palantir、Nubank 和
              Mercado Libre 等大型企业客户已被公开提及。Nubank 据称用 Devin 处理代码迁移工作流，实现 12x 效率提升。April 2026，Cognition 在 Singapore 开设
              APAC 总部，释放国际扩张意图。同月，公司宣布与 Mercedes-Benz 建立合作。员工数未详细公开；收购前外部估计 Cognition 团队约 49 人，而 Windsurf
