      - number: '5.3'
        title: 技术架构与智能体运行时
        blocks:
          - type: paragraph
            body: >
              Devin 的核心技术架构围绕一个智能体运行时展开，负责在沙箱化云环境中管理长周期规划和多步执行。智能体接收自然语言任务说明后，会拆成有序子步骤：探索代码库、搭建环境、实现功能、执行测试、创建
              PR。每一步里，智能体都会在隔离计算容器中调用专用工具——代码编辑器、Unix shell 和无头浏览器——防止横向访问其他会话或客户数据。这种沙箱设计把 Devin
              的执行上下文与客户生产环境切开；代码变更只通过 PR 交付，合并前需要人工批准。

              DeepWiki 服务器通过构建向量化项目图来理解大型代码库，图中表示文件、函数和模块之间的关系。相比只靠 token 上下文窗口，这种图表示让 Devin 更能驾驭百万行代码库。BlockDiff
              快照会在任务执行过程中记录增量状态检查点；测试失败或方案被放弃时，可以快速回滚。DeepWiki 和 BlockDiff 是 Cognition 最有辨识度的技术能力之一，因为它们正面处理了基于 LLM
              的编码智能体两类主要失败模式：大型仓库里的上下文丢失，以及不可恢复的错误级联。

              2025–2026 年发布的自研 SWE-1.5 模型支撑 SWE-Check 和 Windsurf Codemaps。它专门针对软件工程任务通过强化学习训练，区别于多数竞品以通用 LLM
              作为基础层的做法。智能体运行时还支持 Model Context Protocol（MCP），让 Devin 可以通过可扩展插件市场连接
              Sentry、Datadog、PostgreSQL、MongoDB、Notion 等外部工具，以及数百个其他服务。ACU（Agent Compute Units）是按任务消耗计量的计算 token，价格约为每
              ACU $2.25，各套餐包含的配额不同。
