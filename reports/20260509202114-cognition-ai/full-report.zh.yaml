  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Cognition AI 的 Devin 所在市场，处在两类重叠市场的交叉处：AI
              驱动的开发者工具（copilot、代码补全、代码审查自动化）和自主软件工程智能体（端到端任务执行，需要规划、多步推理和自我纠错）。前者是成熟大市场，GitHub Copilot 以 $2B+ ARR
              锚定；后者是新兴细分市场，Devin 占据先行者位置。测算市场规模时，相关总可用市场覆盖专业软件开发团队可能采购、用于提升工程速度的工具——从自动补全插件，到无需人工监督即可执行工单的完全自主智能体。

              纳入的支出包括：企业和 SMB 对 AI 编码助手的订阅、面向工程团队销售的自主智能体平台，以及用于程序化代码生成的 API 消耗。不纳入的支出包括：并非面向代码场景销售的通用大语言模型 API
              访问，面向业务用户的低代码 / 无代码应用构建器（买方和工作流不同），基础设施软件（计算、存储、网络），以及传统外包软件开发服务。现状替代品包括离岸人力外包、无 AI 的传统 IDE、基于底层 LLM API
              自建的内部开发者工具，以及云厂商捆绑的 IDE 扩展，如 AWS CodeWhisperer 和 Azure GitHub Copilot bundles。

              不同分析机构对市场边界仍有争议。Grand View Research 以限制性口径测算“生成式 AI 编码助手”，认为 2030 年仅 $92–98M；Mordor Intelligence 则把“AI
              代码工具”宽口径定义到 2030 年 $24B。Cognition 的 Devin 位于高端智能体细分市场，Team 方案 $500/month，企业合同在每年 $500K+ 区间，远高于
              $10–$19/seat 的 copilot 档位。因此，可服务市场由愿意为自主工单解决支付生产率溢价的大型企业构成，估计占全球 27–28.7 million 专业工程师中的 5–15%。
