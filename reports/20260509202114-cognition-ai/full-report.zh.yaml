      - number: '2.3'
        title: 买方、用户与付费方分层
        blocks:
          - type: paragraph
            body: >
              Cognition AI 面向三类主要买方，它们的预算归属和采用触发点不同。第一类、也是核心细分市场，是企业软件团队：工程副总裁或 CTO 是买方，软件工程师是用户，IT
              预算是付费方。采用触发点是可衡量的生产率缺口，通常通过把 AI 工具 ROI 与人力成本做基准对比来发现。Goldman Sachs（12K 开发者试点）、Citi、Cisco、Dell 和 Nubank
              等参考客户展示了这个细分市场。企业合同每年规模从 $100K 到 $2M+ 不等，销售周期 3–9 个月，包含法务和安全审查。

              第二类是高增长科技创业公司：CTO 或创始工程师同时充当买方和用户，创始人把种子资金分配为付费来源。采用触发点是速度：Devin 能让 10 人团队打出 50 人团队的执行力。这类买方通常从 $20/month
              的 Core 方案开始，再升级到 Team。关键参考客户包括 Ramp 和 Nubank，后者报告 12× 效率提升。交易价值较低，每年 $500–$6,000，但量大，且随着公司扩张，转为企业合同的可能性高。

              第三类是个人开发者和自由职业者，战略优先级较低。买方和用户是同一人；付费方是按小时计费的自雇开发者。采用触发点是竞争必要性，因为 AI 工具正成为专业开发者的基本门槛。$20/month 的 Core
              方案面向该群体；该群体对流失高度敏感，主要承担产品反馈循环和获客漏斗功能，而不是核心收入引擎。金融服务企业是横向优先细分市场，原因是 Goldman Sachs 的 12K 开发者 Devin 试点和 Citi
              据报道的部署；这些买方在企业签约前需要 SOC 2 Type II、数据驻留和监管合规承诺。
