  - id: TV005
    title: 投资逻辑破坏与止损触发表
    columns:
      - 触发事件
      - 阈值
      - 监测指标
      - 行动含义
    rows:
      - - 第二起安全事件或供应链泄露
        - Dec 2024 补丁后 18 个月内，任何已确认的第二起 Devin 安全事件
        - CVE 披露；企业安全公告；HN / 安全社区
        - 立即复盘投资逻辑；评估修复可信度；可能退出
      - - 重大客户流失
        - 最大客户 ARR 同比下降 >25%，或丢失任何 ARR >$10M 的单一客户
        - 融资时 ARR 披露；新闻公告；客户访谈
        - 减仓；用流失情景重建 ARR 轨迹模型
      - - 能力相当时，竞争对手价格比 Devin 等价方案低 3× 以上
        - 竞争对手 SWE-bench Verified ≥80%，且价格 ≤$160/month（Devin 等价）
        - SWE-bench 排行榜；每月查看竞争对手定价页
        - 审查结构性差异化；加快 Windsurf 护城河评估
      - - 披露 NRR 低于 90%
        - 任何已披露或估计的队列测算中，NRR <90%
        - 下一轮融资财务披露；资料室
        - 重建 ARR 增长模型；规模化后的高流失会破坏 $10B+ 入场逻辑
      - - 因 GPAI 不合规遭遇欧盟监管执法
        - EU AI Office 对 Cognition 启动正式调查或发出合规命令
        - EU AI Office 公告；DPC 新闻稿；Reuters/FT 监管报道
        - 评估欧盟收入风险；建模执法成本；可能触发更大范围的企业采购暂停
