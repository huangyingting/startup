      - number: '3.3'
        title: IDE 原生竞争对手 — Cursor 与 Windsurf
        blocks:
          - type: paragraph
            body: >
              从纯 ARR 维度看，Cursor（Anysphere）是 Cognition 最强的商业竞争对手。它在公开发布后约 24 个月内从零扩张到 $2 billion ARR。November 2025 的
              Series D 融资以 $29.3 billion 估值融资 $2.3 billion，是当时 AI 编码史上最大的一笔风险融资。投资人包括 Thrive Capital、Andreessen
              Horowitz、Accel、Nvidia 和 Google。Cursor 的架构依赖 VS Code fork，并配有深度 token
              预算控制、模型无关路由（Sonnet、GPT-4o、Gemini）和最多可运行八条并行任务线程的多智能体后台执行功能，正在缩小与 Devin 完全自主主张之间的功能差距。Cursor 拥有超过 1 million
              付费客户和 50,000 个企业团队，证明其在个人开发者和团队细分市场都具备产品-市场匹配。Cursor 在 ARR 指标上增长快于 Cognition，付费客户更多，因此按比例获得更多训练信号和定价权。

              Windsurf（原 Codeium）在 July 2025 被 Cognition 收购前，凭借免费档、兼容 VS Code 的 AI IDE 和超过 800,000
              用户，建立了强开发者心智。收购后，Windsurf 的企业账本（贡献 $82M ARR，350+ 企业客户）并入 Cognition 收入基础，把直接竞争对手转为分发渠道。整合尚未完成，在 Cognition
              品牌下留住 Windsurf 企业客户，是关键执行风险。此次收购也表明 Cognition 愿意通过外延增长抵御 IDE 层侵蚀；这释放一个信号：来自 Cursor 的 IDE
              层竞争压力，被视为分发策略的生存级威胁。
