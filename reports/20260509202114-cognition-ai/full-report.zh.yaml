  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年，AI 辅助软件工程市场分成三大竞争层。第一层是成熟工作流 copilot，包括 GitHub Copilot（Microsoft）和 Amazon Q
              Developer，背后都有云超大规模厂商分发支持。GitHub Copilot 到 early 2025 拥有估计 42% 的品类市场份额、20 million 用户和超过 $2 billion
              年经常性收入，已经深嵌企业开发者工具链。Amazon Q Developer 提供类似的补全和聊天能力，并针对 AWS 工作负载优化，面向庞大的 AWS 企业客户存量，带有 SOC 2 Type II 合规和原生
              IAM 集成。

              第二层是 IDE 原生 AI 编码助手，领头者是 Cursor（Anysphere）。Cursor 在 mid-2024 推出首个付费档位后，到 February 2026 已达到 $2 billion
              ARR，当前估值 $29.3 billion。Cursor 的 VS Code fork 模型带来插件型竞争对手无法获得的深度编辑器集成；其多智能体并行执行架构（最多八个并发智能体）与 Devin
              的自主编码用例越来越重叠。Windsurf（原 Codeium）在被 Cognition 收购前也属于这一层。

              第三层是完全自主的 AI 软件工程师，Cognition 的 Devin 直接定位在这里。Claude Code（Anthropic）、OpenAI Codex（以网页智能体形式重新推出）和
              SWE-agent（开源学术基准框架）都在不同程度上参与竞争。Claude Code 的终端原生路径和在 SWE-bench 评测上的更高代码质量构成质量威胁；OpenAI Codex
              以智能体执行环境重新发布，直指 Devin 的核心定位。差异化前沿正从基准分数转向可衡量的企业工作流集成和可验证 ROI 指标；在这片地形上，Cognition 与 Goldman Sachs
              等客户的部署证据目前提供优势。
