  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与 ARR 曲线
        blocks:
          - type: paragraph
            body: >
              Cognition AI 运营的是基于消耗的 SaaS 收入模型，锚定 Agent Compute Units（ACUs）——一种按自主任务消耗计算资源的自有计量单位。个人开发者按 $20/month
              订阅（Core 方案：5 ACUs），团队按 $500/month 订阅（Team 方案：250 ACUs），企业通过定制合同购买，含批量折扣和额外 ACU
              池。这个价格阶梯按任务复杂度和数量等比例货币化，因此结构上不同于 GitHub Copilot 或 Cursor 这类按席位工具。但该模型也让收入更不平滑：企业客户的 sprint
              工作负载波动，会带来不均匀的月度消耗；公司需要细致的 cohort 级分析，才能区分耐久 ARR 与一次性扩张。

              Cognition 的 ARR 曲线是企业 AI 史上最快的一批。公司运营前六个月几乎没有收入，September 2024 跨过 $1M ARR，到 June 2025 达到 $73M ARR——九个月增长
              73x——随后在 July 2025 收购 Windsurf 后跃升至约 $155M 合并 ARR（Windsurf 贡献 $82M ARR）。Cognition AI 在 September 2024
              发布的博客《Funding, Growth, and the Next Frontier of AI Coding Agents》确认了 $73M ARR 数字，并概述了公司的双产品策略。Windsurf
              之后，合并实体拥有分叉收入基础：Devin 的企业自动化收入（高 ACV、低席位数）和 Windsurf 的 IDE 订阅收入（较低 ACV、较高席位数）。一边整合团队，一边拆分并增长两条收入线，是重大执行风险。

              截至 April 2026，报道显示公司正讨论以潜在 $25B+ 估值进行额外融资，意味着投资人相信 ARR 将在 $155M 之上继续显著增长。不过，收购后的 ARR 披露数字应谨慎解读：Windsurf 的
              $82M ARR 贡献是在收购时点测量，未必反映迁移后的留存率。
