      - number: '4.4'
        title: 公开财务数据缺口与披露限制
        blocks:
          - type: paragraph
            body: >
              Cognition AI 是一家私营 Delaware C-corporation，没有公开申报义务，没有披露 GAAP
              财务报表，也没有投资者日或业绩电话会。本章所有财务数据依赖：（1）公司撰写的博客文章；（2）引用匿名来源的第三方新闻报道；（3）投资人沟通和新闻稿摘要；（4）二级市场研究估计。这种披露姿态在 IPO 前 AI
              公司中常见，但会给试图验证 ARR 曲线可持续性的投资人和客户带来重大风险。

              最重要的未披露财务指标包括：按产品线划分的毛利率（Devin vs. Windsurf）、客户流失和净留存率（NRR）、CAC 和回本周期、企业交易规模与合同期限（ACV），以及 Windsurf
              整合后的成本。没有 NRR 数据，就无法判断 $73M 到 $155M ARR 的跃升来自自然客户扩张，还是完全来自非有机收购贡献。其他公司的企业 AI 工具合同在采用强劲时通常显示 100–140%
              NRR；如果 Cognition 的 NRR 低于 100%，即使有 Windsurf 注入，仅 Devin 的底层 ARR 也可能停滞。Sacra、CB Insights
              和其他二级研究平台提供了部分收入和员工数估计，但必须把这些数字视为近似值。

              第二个担忧是 early 2026 据报道的 $25B+ 估值讨论，这意味着基于 $155M ARR 的前瞻收入倍数约 160x。极高倍数在早期高速增长 AI 公司中历史上并不少见，但只有在 ARR 继续每年增长
              2x+ 时才可持续；这个门槛要求大量新增企业客户获取，并留住 Windsurf 基础。任何 ARR 增长放缓都会显著压缩估值倍数。
