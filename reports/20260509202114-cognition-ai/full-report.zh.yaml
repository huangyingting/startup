      - number: '2.2'
        title: 市场规模测算 — TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              为了约束机会空间并调和差异很大的分析师估计，本报告采用多组独立测算镜头。考虑到不同来源的方法差异显著，镜头法优于单一自上而下估计。

              镜头 1 — AI 代码工具市场（Mordor Intelligence，2025）：广义 AI 代码工具市场 2025 年价值 $7.37B，预计 2030 年达到 $23.97B，CAGR 为
              26.6%。该口径覆盖从 IDE 插件到完整智能体的所有 AI 辅助编码工具。TAM 候选值：$7.4B（2025）、$24B（2030）。局限：口径过宽；包含低代码工具、文档 AI 和测试自动化，与 Devin
              的买方画像并不直接可比。

              镜头 2 — 开发者席位 × 支付意愿：全球有 27–28.7 million 专业开发者（Evans Data / Statista 2024）。GitHub Copilot 在 $10–$19/month
              档位，2025 年从这部分人群中获得约 1.3 million 付费席位。面向企业买方、价格为每团队 $500–$5,000/month 的自主智能体工具，可能可触达约 10% 的企业工程团队——约
              500K–1M 个开发者席位 × $2,000/year 平均合同价值 = 2026 年 $1B–$2B SAM；随着采用扩散，2030 年扩展到 $5B–$8B。

              镜头 3 — 企业软件工程支出占比：2024 年全球软件支出约 $675–$700B（WIPO）。即便软件项目劳动力成本的 1% 转向 AI 工具，也意味着 $6.7B 市场；3% 转移则意味着
              $20B。这个上限镜头与 Mordor 的 2030 年 $24B 数字相互印证。

              镜头 4 — Gartner 采用曲线：Gartner 预测，到 2028 年 90% 企业工程师将使用 AI 代码助手，early 2024 为 14%。全球企业工程师总数估计约 15 million。按
              90% 渗透率 × $500/year 平均价格计算，仅企业细分市场到 2028 年就达到 $6.75B。这些估计彼此冲突明显：Grand View Research 的 2030 年 $92–98M
              狭义数字完全排除了代码相邻 AI 工具，而 ResearchAndMarkets 的 $97.9B 数字似乎使用了异常宽泛的口径，抬高了可触达市场。尽调应主要参考 $1–8B 的 SAM 区间。
