  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Cognition AI 提供两个核心产品：Devin，一个云端托管的自主 AI 软件工程师；Windsurf，一个用于本地和云辅助开发的智能体 IDE。Devin
              接收自然语言任务描述——可通过网页仪表盘、Slack、Linear 或 Jira 提交——然后自主执行完整端到端软件工程任务：规划路径、编写和修改代码、运行测试、按失败结果迭代，并打开带可审查 diff
              和置信度指标的 PR。不同于代码补全工具（GitHub Copilot、Cursor），Devin 接管的是整个任务，而不是辅助人类写单行代码。

              在典型企业工作流中，开发者或工程经理把 Jira 工单或 Slack 消息分配给 Devin。Devin 读取工单，使用 DeepWiki server
              探索代码库上下文，搭建必要环境，编写实现，运行测试套件，并以 PR 形式回报。PR 包含 Devin 内部决策轨迹，供人工审查。Devin 2.0
              版本新增置信度仪表，在提交前量化任务成功概率，帮助团队高效分流任务。Devin 可以在多个会话中并发处理任务，使团队能够委托整个 sprint 待办列表，而不是逐个工单分配。

              Windsurf IDE 通过集成 AI Cascade agent，为 Devin 补充本地开发环境。开发者可在 Windsurf 本地启动编码会话，并在会话中途把复杂、算力密集型工作交给云端
              Devin，状态在切换中保留。April 2026 公布的 “Devin in Windsurf” 功能正式定义了本地到云端的交接工作流。两个产品合在一起覆盖完整开发者生命周期：Windsurf
              服务日常编码辅助，Devin 负责被委托的自主任务执行。
