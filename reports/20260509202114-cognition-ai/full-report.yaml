      - number: '7.5'
        title: Execution, People, and Partner Risk
        blocks:
          - type: paragraph
            body: >
              Cognition's three co-founders—Scott Wu (CEO), Steven Hao, and Walden Yan—are competitive programming
              champions with exceptional technical credentials but no prior track record building enterprise software
              companies beyond early-stage startups. Key-person risk is concentrated in Scott Wu, who drives technical
              vision, investor relationships, and product strategy. The company's AI talent pipeline is stressed by
              intense competition from Anthropic, OpenAI, Google DeepMind, and Microsoft—all operating frontier AI
              programs at compensation packages exceeding $500K total compensation, directly competing for the same
              competitive programming and ML engineering talent pool that Cognition relies on. Devin's platform depends
              critically on third-party partners: AWS (VPC compute), GitHub (PR workflow integrations), and Slack/Teams
              (enterprise communication). Any of these platforms modifying API access, pricing, or integration policy
              could disrupt Devin's enterprise value proposition. Anthropic and OpenAI present a dual risk as both
              supplier and competitor: they supply the underlying models Devin orchestrates, but compete via Claude Code
              and OpenAI Codex respectively, creating conflict-of-interest incentives. Geographic expansion to Japan,
              Singapore, and the EU—announced in Q1–Q2 2026—introduces jurisdiction-specific compliance obligations that
              require legal and operations hiring ahead of revenue materialization. US Government customers require
              FedRAMP or equivalent authorization, typically a 12–24 month process; the gap between announced government
              vertical and actual FedRAMP authorization creates a window of reputational and contractual risk.
              International legal infrastructure—EU DPO appointment, Japan PIPL compliance, Singapore PDPA— represents
              an emerging gap for a company that has prioritized product velocity over regulatory scaffolding.
