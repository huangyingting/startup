      - number: '5.4'
        title: Deployment, Integration, and Reliability
        blocks:
          - type: paragraph
            body: >
              Devin supports two primary deployment modes: cloud-hosted (the default, operating in Cognition-managed
              infrastructure) and VPC deployment for enterprise customers requiring data residency, network isolation,
              or regulatory compliance. VPC mode allows Devin to operate within the customer's AWS, GCP, or Azure
              environment, eliminating the need to transmit source code to Cognition's servers. Custom-trained Devin
              instances are available at the enterprise tier, allowing customers to fine-tune the agent on their
              proprietary codebases and internal conventions.

              The platform integrates natively with GitHub, GitLab, and Bitbucket for source control (PR creation, code
              review automation, branch management); with Jira and Linear for ticket assignment and status tracking; and
              with Slack and Microsoft Teams for communication-channel session initiation and progress reporting. The
              REST API enables programmatic session management for CI/CD pipelines, allowing engineering organizations
              to trigger Devin sessions automatically on specific events (e.g., failing test suite, customer bug
              report). The MCP Marketplace extends integration to monitoring platforms (Sentry, Datadog, PagerDuty),
              databases (PostgreSQL, MySQL, MongoDB), and documentation tools (Notion, Confluence). The Windsurf IDE
              integrates Cascade AI agent locally and the "Devin in Windsurf" handoff for cloud-based tasks.

              Reliability is not formally disclosed through uptime SLAs or status page data in Cognition's public
              materials. Task execution time is bounded by a 45-minute maximum runtime per session, though tasks can be
              broken into sequential sub-sessions for longer projects. The confidence meter in Devin 2.0 provides a
              pre-execution estimate of task success probability, enabling teams to filter out low-probability tasks
              before consuming ACUs. These quality controls reduce waste but also signal that Devin's reliability on
              complex tasks remains probabilistic rather than guaranteed.
