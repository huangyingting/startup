      - number: '5.6'
        title: Trust, Safety, Security, and Compliance
        blocks:
          - type: paragraph
            body: >
              Devin's primary security architecture relies on sandboxed compute isolation: each session runs in an
              ephemeral container with no access to other sessions or the customer's production environment unless
              explicitly granted through integration credentials. Code changes are surfaced as pull requests requiring
              human approval, and the Devin execution trace provides an auditable log of every shell command, file edit,
              and API call made during the session. VPC deployment adds an additional isolation layer by keeping source
              code within the customer's own cloud perimeter.

              A significant security incident emerged in late 2024 when a live-streamed demonstration exposed a major
              vulnerability in Devin's system prompt handling—effectively allowing prompt-injection attacks to
              manipulate Devin's behavior. Cognition acknowledged the issue and patched it rapidly, but the incident
              highlighted the inherent risks of deploying autonomous agents that can execute shell commands based on
              text inputs. Hacker News commentary characterized the failure as "amateurish given the severity," noting
              that prompt-injection defenses should have been a first-priority security control for an agent with shell
              execution capabilities.

              Cognition has not publicly disclosed SOC 2 Type II certification, ISO 27001, or equivalent enterprise
              security certifications as of May 2026. The trust.devin.ai subdomain exists but returned limited public
              information at time of research. Enterprise customers relying on VPC deployment and custom-trained models
              are likely subject to separate security agreements, but these are not publicly auditable. Data privacy and
              retention policies for code executed in Devin sessions are not fully disclosed in Cognition's
              public-facing documentation, representing a material compliance gap for financial-services and
              regulated-industry customers. The Mercedes-Benz and Goldman Sachs partnerships suggest compliance barriers
              have been addressed in custom agreements, but without public disclosure, independent assessment is not
              possible.
            claimRefs: []
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Cognition AI targets professional engineering teams at technology-forward enterprises, mid-market
              companies, and developer-first organizations. The buyer profile is an engineering leader or CTO seeking to
              multiply developer throughput without proportional headcount growth; the user is typically an individual
              software engineer or engineering manager who delegates tasks directly via Slack, Jira, or the Devin web
              interface. The payer is the engineering budget owner, whether a department budget or a centralized IT
              procurement function at large enterprises.

              Verticals with confirmed production deployments include financial services and fintech (Nubank—LatAm's
              largest neobank), automotive/manufacturing (Mercedes-Benz), IT services and outsourcing (Cognizant),
              enterprise technology, and the US Federal Government. The COBOL modernization blog post confirmed Fortune
              500 deployments in sectors that still run significant COBOL workloads: financial services, insurance, and
              public utilities. In 2026, Cognition launched a Government vertical to target legacy software
              modernization in US federal agencies. Japan and Singapore enterprise markets were opened in April 2026,
              suggesting Southeast Asia financial services, manufacturing, and technology firms are the next target
              segments.

              The geographic distribution is US-first (the majority of revenue and named customers as of early 2026),
              with Europe (London office opened January 2026) and APAC (Japan and Singapore offices opened April 2026)
              serving as growth centers. Channel distribution includes direct enterprise sales, the Windsurf IDE
              free-to-paid conversion funnel (250K+ daily active users at acquisition), and the Cognizant reseller
              partnership that deploys Devin and Windsurf across Cognizant's own engineering teams and its global client
              base. The Windsurf integration creates a bottom-up, developer-led adoption vector in addition to top-down
              enterprise procurement.
