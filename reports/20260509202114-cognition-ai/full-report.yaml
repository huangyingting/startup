      - number: '6.4'
        title: Retention, Satisfaction, and Durability
        blocks:
          - type: paragraph
            body: >
              Publicly available retention and satisfaction metrics for Cognition AI are limited. The company has not
              disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), customer churn rate, or cohort
              analysis data. The most proximate public indicator of satisfaction is the PR merge rate (67% as of April
              2025, up from 34% at launch), which measures the share of Devin-opened pull requests that are accepted by
              human reviewers—a reasonable proxy for output quality but not a standard customer satisfaction metric. A
              67% PR acceptance rate implies that one-third of Devin's work products require rejection or significant
              rework, which may be acceptable for high-volume autonomous tasks but is a notable quality gap versus human
              engineers.

              Developer sentiment from independent sources is mixed. Hacker News communities have noted that early Devin
              demos appeared polished but real-world performance on complex tasks lagged expectations set by the
              original 13.86% SWE-bench announcement. The independent reviewer at imseankim.com—after waiting six weeks
              to observe the product in production—noted that "independent testers tell a more complicated story"
              relative to Cognition's official performance numbers, and flagged that ACU costs accumulate quickly in
              practice, with moderate usage easily exceeding $100-200 per month on the nominally $20/month Core plan.
              The security vulnerability disclosed in December 2024 temporarily damaged trust among security-conscious
              enterprise customers.

              On durability signals, the Nubank deployment describes continued and expanding use (data, collections, and
              risk business units progressively adopting Devin). Internal Cognition usage of Devin (659 PRs/week merged
              in Feb 2026) suggests strong product-led retention. The Cognizant and Mercedes-Benz partnerships represent
              structural switching costs once integrated into enterprise workflows. However, the contract length,
              renewal rates, and post-deployment satisfaction at named enterprise customers are not publicly known.
