      - number: '4.4'
        title: Public Financial Data Gaps and Disclosure Limitations
        blocks:
          - type: paragraph
            body: >
              Cognition AI is a privately held Delaware C-corporation with no public filing obligations, no disclosed
              GAAP financial statements, and no investor day or earnings calls. All financial data in this chapter
              relies on: (1) company-authored blog posts; (2) third-party news reports citing unnamed sources; (3)
              investor communications and press release summaries; and (4) secondary market research estimates. This
              disclosure posture is typical for pre-IPO AI companies but creates material risk for investors and
              customers attempting to verify sustainability of the ARR trajectory.

              The most significant undisclosed financial metrics are: gross margin by product line (Devin vs. Windsurf),
              customer churn and net revenue retention (NRR), CAC and payback period, enterprise deal sizes and contract
              lengths (ACV), and post-Windsurf integration costs. Without NRR data, it is impossible to distinguish
              whether the $73M to $155M ARR jump reflects organic customer expansion or purely inorganic acquisition
              contribution. Enterprise AI tool contracts in other companies typically show NRR of 100–140% when adoption
              is strong; if Cognition's NRR is below 100%, the underlying Devin-only ARR may be stagnating despite the
              Windsurf injection. Sacra, CB Insights, and other secondary research platforms provide partial revenue and
              headcount estimates that must be treated as approximations.

              A secondary concern is the reported $25B+ valuation discussions in early 2026, which would imply a forward
              revenue multiple of approximately 160x on $155M ARR. While extreme multiples are historically common for
              hypergrowth AI companies in their early stages, they are sustainable only if ARR continues growing at 2x+
              annually—a bar that requires substantial new enterprise customer acquisition and retention of the Windsurf
              base. Any deceleration in ARR growth would make the valuation multiple compress significantly.
