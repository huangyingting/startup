  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >
              The market for Cognition AI's Devin product sits at the intersection of two overlapping categories:
              AI-powered developer tools (copilots, code completion, review automation) and autonomous software
              engineering agents (end-to-end task execution requiring planning, multi-step reasoning, and
              self-correction). The former is a large established market anchored by GitHub Copilot with $2B+ ARR; the
              latter is an emerging sub-segment where Devin occupies a pioneer position. For sizing purposes, the
              relevant Total Addressable Market spans tools that professional software development teams might purchase
              to increase engineering velocity—from autocomplete plugins through fully autonomous agents that can
              execute tickets without human oversight.

              The included spend is: enterprise and SMB subscriptions to AI coding assistants, autonomous agent
              platforms sold to engineering teams, and API consumption for programmatic code generation. Excluded spend
              is: general large language model API access not sold for code use-cases, low-code/no-code application
              builders targeting business users (distinct buyer and workflow), infrastructure software (compute,
              storage, networking), and traditional outsourced software development services. Status-quo substitutes
              include offshore staff augmentation, traditional IDEs without AI, internal developer tooling built on base
              LLM APIs, and cloud-vendor bundled IDE extensions such as AWS CodeWhisperer and Azure GitHub Copilot
              bundles.

              The market boundary is contested across analyst firms. Grand View Research segments "generative AI coding
              assistants" narrowly at $92–98M by 2030 using a restrictive scope, while Mordor Intelligence defines "AI
              code tools" broadly at $24B by 2030. Cognition's Devin occupies the premium agentic sub-segment with
              $500/month Team plans and enterprise contracts in the $500K+ per year range—far above the $10–$19/seat
              copilot tier. The serviceable addressable market thus comprises large enterprises willing to pay a
              productivity premium for autonomous ticket resolution, estimated at 5–15% of the global developer
              population of 27–28.7 million professional engineers.
            claimRefs:
              - CM001
              - CM003
              - CM007
              - CM021
              - CM023
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM021
              - CM023
      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Multiple independent sizing lenses are applied to bound the opportunity and reconcile widely varying
              analyst estimates. The lens approach is preferred over a single top-down estimate given material
              methodological variation across sources.

              Lens 1 — AI code tools market (Mordor Intelligence, 2025): The broad AI code tools market is valued at
              $7.37B in 2025 and forecast to reach $23.97B by 2030 at a 26.6% CAGR. This covers all AI-assisted coding
              tools from IDE plugins through full agents. TAM candidate: $7.4B (2025), $24B (2030). Limitation: overly
              broad; includes low-code tools, documentation AI, and testing automation not directly comparable to
              Devin's buyer profile.

              Lens 2 — Developer seats × willingness-to-pay: 27–28.7 million professional developers globally (Evans
              Data / Statista 2024). GitHub Copilot at $10–$19/month captures approximately 1.3 million paid seats from
              this pool in 2025. Autonomous agent tools targeting enterprise buyers at $500–$5,000/month per team are
              addressable to perhaps 10% of enterprise engineering teams—roughly 500K–1M developer seats × $2,000/year
              average contract value = $1B–$2B SAM in 2026, expanding to $5B–$8B by 2030 as adoption broadens.

              Lens 3 — Enterprise software engineering spend share: Global software spending reached approximately $675–
              $700B in 2024 (WIPO). Even a 1% shift of software project labor costs to AI tools implies a $6.7B market;
              a 3% shift implies $20B. This is an upper-bound lens corroborating the Mordor $24B 2030 figure.

              Lens 4 — Gartner adoption curve: Gartner forecasts 90% of enterprise engineers using AI code assistants by
              2028 versus 14% in early 2024. Total estimated enterprise engineering headcount globally approximately 15
              million. At 90% penetration × $500/year average price = $6.75B enterprise sub-segment alone by 2028. These
              estimates conflict materially: the narrow Grand View Research figure of $92–98M by 2030 excludes
              coding-adjacent AI tools entirely, while the $97.9B ResearchAndMarkets figure appears to use an atypically
              broad scope that inflates the addressable market. Diligence should weight the $1–8B SAM range most
              heavily.
            claimRefs:
              - CM001
