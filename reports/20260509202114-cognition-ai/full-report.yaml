  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The AI-assisted software engineering market in 2026 is stratified into three broad competitive tiers. The
              first tier—established workflow co-pilots—includes GitHub Copilot (Microsoft) and Amazon Q Developer, both
              backed by cloud hyperscaler distribution. GitHub Copilot commands an estimated 42% category market share
              with 20 million users and over $2 billion in annual recurring revenue as of early 2025, deeply embedded
              across enterprise developer toolchains. Amazon Q Developer provides similar completion and chat
              capabilities optimized for AWS workloads, targeting the large installed base of AWS enterprise customers
              with SOC 2 Type II compliance and native IAM integrations.

              The second tier—IDE-native AI coding assistants—is led by Cursor (Anysphere), which reached $2 billion ARR
              by February 2026 after launching its first paid tiers in mid-2024 and now operates at a $29.3 billion
              valuation. Cursor's VS Code fork model allows deep editor integration unavailable to plugin-based
              competitors, and its multi-agent parallel execution architecture (up to eight concurrent agents)
              increasingly overlaps with Devin's autonomous coding use case. Windsurf (formerly Codeium), now acquired
              by Cognition, previously competed in this tier before integration.

              The third tier—fully autonomous AI software engineers—is where Cognition's Devin directly positions.
              Claude Code (Anthropic), OpenAI Codex (re-launched as a web-based agent), and SWE-agent (open-source
              academic benchmark harness) all compete here to varying degrees. Claude Code's terminal-native approach
