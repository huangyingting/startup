      - number: '6.3'
        title: Named Customer Proof and Reference Quality
        blocks:
          - type: paragraph
            body: >
              The highest-quality named customer proof is the Nubank case study, the only publicly detailed and
              quantified production deployment. Nubank, Latin America's largest neobank (approximately 100 million
              customers), used Devin to migrate a 6-million-line ETL monolith to sub-modules—a task originally estimated
              to require 1,000+ engineers over 18 months. With Devin, the migration progressed in weeks for each
              business unit (Data, Collections, Risk), achieving 12x engineering efficiency improvement in hours saved
              and 20x cost savings versus the all-human baseline. Crucially, the case study documents fine-tuning on the
              customer's specific migration patterns, which led to a 4x speed improvement (40 minutes per task to 10
              minutes) and a 2x accuracy improvement on the internal benchmark.

              Mercedes-Benz is named in a blog post (April 27, 2026) as deploying Devin and Windsurf "across its global
              engineering organization" for legacy modernization, cloud-native development, and logistics. No outcome
              metrics are publicly disclosed; the announcement is at the partnership/announcement stage rather than a
              post-hoc case study. Cognizant (announced January 28, 2026) is deploying Devin and Windsurf "across its
              engineering organization and global clients"—this is a channel partnership rather than a named
              end-customer, and no production outcome data is available.

              Additional unnamed customer evidence: Fortune 500 COBOL modernization deployments (blog post April 8,
              2026, no named customers), US Government (Cognition for Government launched February 25, 2026, no named
              agencies), Japan enterprise (launched April 9, 2026, no specific customers named). The depth and freshness
              of proof varies enormously: Nubank is production with quantified outcomes; others are at announcement
              stage. This creates a concentration of evidence quality risk—if Nubank is not representative of typical
              deployments, the customer proof base is shallow.
