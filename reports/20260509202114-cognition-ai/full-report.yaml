      - number: '5.3'
        title: Technical Architecture and Agent Runtime
        blocks:
          - type: paragraph
            body: >
              Devin's core technical architecture centers on an agent runtime that manages long-horizon planning and
              multi-step execution within a sandboxed cloud environment. The agent receives a natural-language task
              specification and decomposes it into an ordered sequence of sub-steps: repository exploration, environment
              setup, implementation, test execution, and pull request creation. At each step, the agent calls
              specialized tools—a code editor, a Unix shell, and a headless browser— within an isolated compute
              container that prevents lateral access to other sessions or customer data. This sandboxed design separates
              Devin's execution context from the customer's production environment, with code changes surfaced only
              through pull requests that require human approval before merge.

              The DeepWiki server enables large-codebase comprehension by building vectorized project graphs that
              represent relationships between files, functions, and modules. This graph-based representation allows
              Devin to navigate million-line codebases more effectively than purely token-based context windows.
              BlockDiff snapshotting records incremental state checkpoints during task execution, enabling rapid
              rollback when a test fails or an approach is abandoned. These two features—DeepWiki and BlockDiff—are
              among Cognition's most differentiating technical capabilities, as they address the two primary failure
              modes of LLM-based coding agents: context loss in large repositories and unrecoverable error cascades.

              The proprietary SWE-1.5 model, released in 2025-2026, underlies SWE-Check and Windsurf Codemaps. It was
              trained via reinforcement learning specifically for software engineering tasks, contrasting with the
              general-purpose LLMs used as base layers in most competitor products. The agent runtime also supports
              Model Context Protocol (MCP), allowing Devin to connect to external tooling including Sentry, Datadog,
              PostgreSQL, MongoDB, Notion, and hundreds of other services through an extensible plugin marketplace. ACUs
              (Agent Compute Units) are the metered token of computation consumed per task, priced at approximately
              $2.25 per ACU with plan-included allocations varying by tier.
