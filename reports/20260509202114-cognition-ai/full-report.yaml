      - number: '4.3'
        title: Unit Economics and Margin Structure
        blocks:
          - type: paragraph
            body: >
              Cognition's unit economics are difficult to model precisely because the company does not disclose gross
              margins, customer acquisition cost (CAC), or cohort-level retention data. However, structural inferences
              are possible. The ACU model implies a cost-of-revenue that is partially variable (inference compute per
              task) and partially fixed (model hosting, sandbox environments, CI/CD infrastructure). Enterprise AI
              inference at frontier model scale (likely GPT-4 or Claude API calls per task) can cost $5–$50 per hour of
              agent runtime at current cloud spot prices, while enterprise ACU packages price at roughly $2.25 per ACU
              with 250 ACUs per Team plan month—creating a gross margin that depends heavily on task length and model
              call efficiency.

              High-value enterprise contracts (Goldman Sachs, Citi, Nubank) likely have custom pricing with volume
              discounts that could improve margin at scale if infrastructure costs are amortized across large task
              volumes. The Nubank case study reporting a 12x efficiency improvement in code migration workflows suggests
              that customers perceive strong value relative to developer hours saved—a favorable indicator for pricing
              power. However, the inherent challenge for fully autonomous coding agents is that task complexity variance
              is high: simple bug fixes cost little to execute but complex multi-week feature builds can consume compute
              budget disproportionately. Unless Cognition gates task scope at the enterprise level, margin management at
              scale will require sophisticated compute forecasting.

              The company's capital efficiency pre-acquisition (sub-$20M burn on $350M+ raised before revenue scale)
              contrasts sharply with the likely post-acquisition cost structure. Adding 250 employees (Windsurf
              personnel) to a ~49-person team more than quadruples headcount, compressing per-employee revenue
              significantly in the near term unless post-integration synergies materialize quickly.
