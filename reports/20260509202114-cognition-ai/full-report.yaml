      - number: '1.5'
        title: Governance and Key-Person Risk
        blocks:
          - type: paragraph
            body: >-
              Cognition AI is a privately held C-corporation with no public financial disclosures, no publicly
              identified board composition, and no independent directors known to investors or analysts outside the cap
              table. The company's governance structure remains opaque: investor rights, board seats granted to Founders
              Fund and other lead investors, and secondary market transaction terms have not been disclosed. The extreme
              concentration of product vision and technical credibility in the three co-founders—particularly Scott Wu,
              whose public persona and coding legend status are inseparable from Devin's brand—creates substantial
              key-person risk. The mandatory 80-hour, six-day workweek culture that prompted voluntary buyout offers to
              Windsurf employees in 2025 raises questions about talent retention, especially for acquired personnel who
              did not self-select for that environment. Post-acquisition attrition among Windsurf engineers could erode
              the IDE product capabilities that justified the ~$250M deal. Critics and independent reviewers have noted
              that Devin's real-world task success rates are substantially lower than company-curated benchmark
              demonstrations suggest, and that the 'fully autonomous software engineer' framing may oversell current
              capabilities, creating future investor and customer expectation risk.
