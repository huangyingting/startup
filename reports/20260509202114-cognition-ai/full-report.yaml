      - number: '8.2'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >
              Cognition has completed three disclosed financing rounds totaling approximately $1.575B. The $21M seed
              round established the founding team in 2023. The $175M Series A (January to April 2025, Founders Fund IX
              lead) set the initial institutional valuation at $2B post-money. SEC EDGAR records confirm Founders Fund
              IX (CIK 0001971631) as a large institutional vehicle that committed capital to Cognition; the Cognition
              Capital SPV I (CIK 0002072175, Form D filed 2025-06-11) indicates a follow-on structured vehicle was
              established concurrent with or shortly after the Windsurf acquisition close. The $400M round (September
              2025) valued the company at $10.2B post-money, a 5.1× step-up from the Series A in approximately nine
              months—one of the steepest step-up trajectories in AI software history. The total financing of ~$1.575B
              implies approximately 15%+ dilution on a $10.2B post-money basis, though exact preference stack and
              liquidation waterfall are not disclosed. At the $10.2B valuation, the primary revenue multiple is
              approximately 140× the April 2025 ~$73M ARR estimate—a premium to all disclosed AI software peers.
              Cursor/Anysphere closed its Series D at $9.9B on approximately $500M ARR (September 2025), implying a 20×
              ARR multiple. Cognition's premium is partially justified by its superior growth rate and category-pioneer
              positioning but represents execution risk priced in for investors entering at $10B+. The Windsurf
              acquisition (July 2025) was completed via Cognition equity and cash for an undisclosed purchase price; the
              Cognition Capital SPV I suggests a structured investor-level vehicle, possibly used to fund the
              acquisition consideration or backstop the combined entity's operating plan. A "culture reset" reported by
              Winbuzzer in August 2025—Cognition offering nine-month buyouts to Windsurf staff and reportedly requiring
              80-hour workweeks—introduces talent integration risk not reflected in the headline valuation. Any new
              institutional investor at $10.2B would face a meaningful preference overhang from the seed, Series A, and
              $400M round before reaching par on any return calculation below a $10.2B exit value.
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs:
