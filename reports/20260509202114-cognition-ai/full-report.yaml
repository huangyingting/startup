      - number: '7.2'
        title: Security and Technical Risk
        blocks:
          - type: paragraph
            body: >
              Cognition's core product risk is that Devin operates with elevated system privileges— writing, executing,
              testing, and deploying code autonomously—which dramatically expands the attack surface compared to passive
              coding assistants. In December 2024, a live-streamed demonstration publicly exposed a prompt-injection
              vulnerability: an adversary could embed malicious instructions in a repository's README file, causing
              Devin to exfiltrate secrets, make unauthorized API calls, or plant backdoors in customer codebases.
              Cognition acknowledged and patched the issue. However, the incident revealed that prompt-injection
              defenses—top of the OWASP Top 10 for LLM Applications (LLM01)—were inadequately hardened prior to GA
              launch. Cognition's security page confirms SOC 2 Type II certification (audited March 2024), data
              encrypted in transit and at rest, and MFA for all employees. The Trust Center requires NDA execution
              before disclosing penetration test reports, audit scope, and third-party assessment results—limiting
              enterprise procurement teams' independent assessment of control effectiveness. Key unresolved gaps
              include: no published bug-bounty program; no formal Agent Security Framework; no public penetration test
              scope or red-team disclosure; and no published SLA or historical uptime data. Devin 2.0 (April 2025)
              expanded capabilities to merge PRs directly and schedule agents on customer infrastructure, materially
              increasing the blast radius of any future prompt-injection exploit. The OWASP GenAI Security Project
              identifies agent autonomy as an emerging, distinct risk category beyond classical LLM vulnerabilities. As
              enterprise adoption grows to VPC deployments at hundreds of companies, an undetected Devin exploit could
              simultaneously contaminate multiple enterprise codebases—a systemic supply-chain tail risk that individual
              customer security teams cannot independently mitigate.
