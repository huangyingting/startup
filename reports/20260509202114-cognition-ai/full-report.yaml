  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >
              Cognition operates in a rapidly evolving regulatory environment. Three major frameworks create material
              near-term obligations. The EU AI Act (Regulation 2024/1689), effective August 2026 for GPAI model
              providers, imposes transparency documentation, copyright compliance policies, and EU AI Office
              registration. The UK GDPR—as administered by the ICO—applies to all data processing of UK/EU residents and
              requires Data Protection Impact Assessments for high-risk AI processing, which Devin's autonomous PR-merge
              and code-deployment capabilities likely trigger under Article 35. The January 2025 White House Executive
              Order revoked prior Biden-era AI safety obligations, creating a deregulatory US federal environment, but
              successor agency-level rules (particularly for government AI procurement) remain active. California SB
              1047, which would have imposed frontier model accountability requirements, was vetoed in September 2024;
              successor legislation (AB 2013, SB 1235) is active through the 2025–2026 session. Separately, Doe v.
              GitHub, Microsoft, and OpenAI copyright litigation—consolidated in the Northern District of
              California—alleges AI code model training on open-source repositories constitutes copyright infringement;
              Cognition has not disclosed its model training data provenance, creating analogous latent IP exposure.
              Cognition's terms of service restrict output from being used to train competing models, but the upstream
              model training data copyright status is not independently verifiable. Compliance monitoring,
              cross-jurisdictional DPA coverage, and GPAI transparency documentation are each materially underfunded
              relative to Cognition's scale and enterprise customer base across the EU, Japan, and Singapore. Absent a
              dedicated regulatory affairs function, Cognition risks enforcement action, GPAI non-registration
              penalties, or restricted EU market access by Q3 2026. A proactive regulatory program should be treated as
              a business-critical investment at this stage of international expansion, not an optional legal overhead
              item.
