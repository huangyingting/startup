      - number: '8.3'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              The bull scenario assumes Devin's ARR continues at a sustained 50% quarterly growth rate through 2027,
              reaching approximately $700M–$800M ARR by end of 2027. At this scale, with improving gross margins from
              model cost optimization and volume contracts, Cognition would likely command an IPO or acquisition
              valuation of $15–25B—a 1.5–2.5× return from $10.2B entry. The bull case requires: no material security
              incidents post- December 2024; successful Windsurf integration adding a credible IDE channel; NRR
              disclosed at ≥120%; and competitor models failing to commoditize at Devin's enterprise workflow
              integration depth. The base scenario assumes moderate ARR growth (30–40% quarterly decay from the 2025
              sprint) reaching $200–350M ARR by end of 2027, with gross margin improvement to 50–60%. At a normalized
              25–35× forward ARR multiple (consistent with high-growth AI SaaS), this implies a $5–12B valuation—at or
              near flat to entry at $10.2B, suggesting negligible return for investors at that entry. The base case
              requires no major churn events, reasonable Windsurf integration, and sustained AI infrastructure
              investment by enterprises. The bear scenario assumes a material adverse event within 18 months: a second
              security incident, Nubank churn, or a Devin price war triggered by Claude Code or OpenAI Codex
              commoditization. Under the bear case, ARR plateaus at $80–120M, NRR is disclosed below 90%, and the
              valuation compresses to 10–15× ARR implying an $800M–$1.8B exit value—a 90%+ capital loss for investors
              entering at $10.2B. The bear trigger probability is estimated at 20–30% given the concentration of known
              risk factors, particularly the security overhang and the structural benchmark commoditization trend.
              Return expectations are asymmetric: the bull upside (1.5–2.5× in 3 years) does not adequately compensate
              for a 30%+ probability of severe capital loss at a $10.2B entry valuation. This is the core investment
              thesis challenge: the risk-adjusted return at current entry is unattractive unless the investor has
              high-conviction, differentiated information about NRR and gross margin that the market does not.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs:
              - CV008
              - CV009
              - CV010
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV008
              - CV009
              - CV010
              - CV003
      - number: '8.4'
        title: Comparable Company Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Cognition's peer group for comparables purposes includes AI-native developer productivity tools (Cursor,
              Replit), foundation model providers with coding products (Anthropic/Claude Code, OpenAI/Codex), and
              broader enterprise AI SaaS companies at comparable ARR run-rates. Cursor/Anysphere is the closest
              comparator: both are AI coding tools targeting enterprise developers, both are VC-backed, and both reached
              their most recent valuations in the second half of 2025. Cursor closed its Series D at $9.9B (Bloomberg,
              November 2025) on approximately $500M ARR—an 18–20× ARR multiple. Cognition at $10.2B on ~$73M ARR implies
              a ~140× ARR multiple, a 7–8× premium to Cursor on ARR-basis. The Cognition premium is partially justified
              by higher growth rate (Devin grew faster from launch) but is structurally unsustainable as Cursor's ARR
              ($500M) already demonstrates greater revenue quality and breadth. Harvey AI (legal AI, $3B valuation,
              ~$100M ARR, ~30× ARR) represents a vertical AI SaaS comparator where high-quality NRR justifies premium
              multiples. Glean (enterprise AI search, $4.6B, ~$100M ARR, ~46× ARR) demonstrates that enterprise AI SaaS
              can sustain 40–50× ARR multiples at $100M ARR, but NRR at Glean is reported above 150%. Replit ($1.16B
              valuation, 2023, development platform with AI pivot) represents the category risk: a pioneer pivot story
              that lost market share to more focused AI-native competitors. The implied IPO entry multiple for AI SaaS
              companies at or near profitability in 2025 is approximately 15–25× forward ARR; Cognition at $10.2B and
              ~$73M ARR would need to reach $400–680M ARR before an IPO at standard multiples would preserve the $10.2B
              entry valuation. No public market comparator exists: GitHub Copilot is embedded in Microsoft Azure
              revenue, Amazon Q in AWS, and Claude Code in Anthropic's API revenue. Private market premium over public
              comps is historically 20–40% for growth-stage AI; this suggests a fair-value range for Cognition (on
              base-case assumptions) of $3–7B, below the $10.2B last round, implying the current round was priced at a
              1.5–3× speculative premium to intrinsic value. Entry discipline—waiting for either ARR confirmation at
              $300M+ or valuation correction to $4–6B—is the appropriate investor response.
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV030
              - CV031
              - CV032
              - CV033
      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Cognition is 2–4 years from an IPO readiness event given current ARR trajectory and the disclosure gap
              that public markets require. For IPO at $8B+ market capitalization, the company needs approximately
              $400–500M ARR, positive unit economics (40%+ gross margin), disclosed NRR above 120%, and a cleared SOC 2
              Type II + GDPR compliance infrastructure. M&A exit paths exist: Microsoft (GitHub Copilot/Azure
              positioning), Alphabet (Google Cloud developer tools), Salesforce (developer productivity within Einstein
              platform), or Snowflake/Databricks (data engineering automation) are logical acquirers. The $10.2B
              valuation makes a strategic acquirer path challenging: Microsoft's prior GitHub acquisition at $7.5B
              (2018) was at scale, and a $10.2B bid for Cognition would be among the largest Microsoft AI
              acquisitions—requiring board-level conviction. The most likely exit path remains late-stage private equity
              / pre-IPO crossover participation, with an IPO window in 2028–2030 if ARR trajectory sustains. Final
              diligence priorities before investment: (1) NRR by cohort—disclosed above 110% is a green flag; below 90%
              is thesis-break; (2) gross margin at scale—target 50%+ gross; (3) penetration test report from post-
              Devin-2.0 audit; (4) Windsurf integration roadmap with customer retention data from the acquired base; (5)
              LLM provider contract terms including agentic use-case pricing floors; (6) GPAI compliance plan and EU
              regulatory timeline; (7) top-5 customer ARR concentration (>50% from top-5 is a material concentration
              risk); and (8) headcount by function to assess burn relative to ARR coverage ratio. Thesis-break
              conditions: a second disclosed security incident within 12 months, NRR disclosed below 90%, ARR growth
              rate deceleration to <50% YoY, or a confirmed major enterprise customer churn event.
            claimRefs: []
          - type: table
            tableRef: TV005
            claimRefs:
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
