      - number: '4.5'
        title: Capital Adequacy and Financial Runway
        blocks:
          - type: paragraph
            body: >
              With approximately $696M raised and sub-$20M cash burn disclosed through Q3 2025, Cognition had
              substantial financial runway heading into 2026 even before any new financing. The Windsurf acquisition
              consumed an estimated $250M of that reserve, leaving approximately $426M available minus ongoing operating
              expenses. At a conservative 200-employee burn rate of $400K per employee-year (blended fully-loaded cost),
              annual operating costs could be $80M or higher excluding compute. If the company is generating $155M ARR
              with moderate gross margins (estimated 50–70% given inference costs), gross profit could fund ongoing
              operations without immediate new capital. However, the $25B+ valuation discussions suggest the company is
              seeking capital to accelerate—not merely to sustain—operations. Expected uses of new capital include R&D
              for Devin next-generation models, enterprise sales force expansion, global data center capacity for
              inference at scale, and potential further acquisitions to consolidate the AI coding infrastructure market.

              The Founders Fund lead investor relationship provides additional runway optionality: Founders Fund has
              historically shown willingness to lead follow-on rounds for breakout portfolio companies, reducing
              financing risk. The presence of large institutional co-investors (D1 Capital, Bain Capital Ventures)
              signals access to crossover and late-stage capital. Overall capital adequacy is rated medium-high: the
              company has sufficient runway for at least 24 months at current burn estimates, but aggressive growth
              execution and integration costs from Windsurf could accelerate burn faster than current estimates suggest.
