      - number: '7.4'
        title: Financial and Operational Risk
        blocks:
          - type: paragraph
            body: >
              Cognition has raised approximately $1.575B in disclosed funding through mid-2026. With 222 employees (102%
              annual headcount growth, per Growjo) and a compute- intensive product, estimated monthly burn is $5–15M,
              implying 18–36 months of runway under conservative scenarios. Revenue growth from ~$1M ARR at GA (December
              2024) to ~$73M ARR (April 2025 estimate) is exceptional but introduces customer concentration risk: the
              $73M ARR figure across a handful of named enterprise accounts suggests a small number of very large
              contracts that create material churn risk at renewal. Nubank accounts for the only disclosed quantified
              production case study. If Nubank or a comparably large customer churns—due to a security incident, budget
              reallocation, or competitive switch—the ARR decline could impair future fundraising at an assumed $10.2B
              valuation. ACU pricing models ($2.25 per ACU overage) create unpredictable usage-based revenue and
              potential bill-shock churn for customers who underestimate consumption. Margin compression from LLM
              inference costs—third-party API calls at commercial Anthropic/OpenAI rates—limits gross margin expansion
              until Cognition builds proprietary models or achieves volume pricing. No path to profitability, EBITDA, or
              gross margin targets has been publicly disclosed. Windsurf integration introduces additional operational
              complexity: merging billing systems, enterprise contracts, and product teams simultaneously increases
              execution risk and may slow the strategic roadmap. The January 2025 Series A at $2B valuation and
              post-Windsurf round imply a $10.2B Growjo valuation estimate; any material miss on ARR growth trajectory,
              a churn event, or a down round from a next capital raise could impair team motivation and trigger key
              employee departures. Financial risk is elevated by the company's refusal to disclose gross margins, NRR,
              or cohort retention metrics.
