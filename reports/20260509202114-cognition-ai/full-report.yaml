      - number: '5.2'
        title: Product and Technology Map
        blocks:
          - type: paragraph
            body: >
              Cognition AI's product portfolio as of May 2026 comprises four distinct product units: (1) Devin
              Core/Pro/Max/Enterprise—cloud agent plans for individual, team, and enterprise customers; (2) Windsurf
              IDE—the agentic desktop IDE with Cascade AI agent, acquired from Codeium in July 2025; (3) the Devin API—a
              RESTful API for programmatic session creation and CI/CD pipeline automation; and (4) Windsurf
              Enterprise—the enterprise tier of the IDE with SSO, centralized billing, and advanced admin controls. A
              fifth element, Windsurf Codemaps, is an AI-annotated structured codebase map powered by SWE-1.5 and Claude
