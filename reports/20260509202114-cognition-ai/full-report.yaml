      - number: '6.2'
        title: Adoption Trajectory and Growth Metrics
        blocks:
          - type: paragraph
            body: >
              Cognition AI's most striking adoption signal is the ARR growth trajectory: from approximately $1M ARR at
              general availability (December 2024) to approximately $73M ARR by April 2025—a roughly 73x increase in
              four months. This rate of growth is consistent with Sacra's estimate of ~$15M ARR in October 2024 and the
              Growjo platform's current estimate of $73M, though both figures are third-party estimates rather than
              audited or company-disclosed financials. The April 2025 pricing reset (Core plan from $500/month to
              $20/month base) accelerated individual developer adoption while maintaining enterprise revenue through
              volume.

              Internal usage signals are revealing. By February 2026, Cognition's own engineering team was merging 659
              Devin PRs per week—four times the 154 per week achieved at their best week in 2025. This "dog-fooding"
              signal is significant: the team building Devin is also its most intensive user, providing a high-quality
              feedback loop that likely accelerates iteration velocity. The PR merge rate improved from 34% at Devin's
              launch to 67% by April 2025—a proxy for output quality improvement—though the metric is self-reported and
              denominator methodology is not specified.

              Geographic expansion (London, Tokyo, Singapore) in the first half of 2026 suggests management confidence
              in revenue sufficiency to support multi-office overhead. The Cognizant partnership is particularly
              significant as a channel amplifier: Cognizant's global client base spans 300+ organizations across
              financial services, manufacturing, and healthcare, meaning even partial penetration could materially
              accelerate Devin's enterprise account count without proportional Cognition sales headcount. However, no
              public data exists on the number of active paying accounts, the average contract value, or the customer
              growth rate beyond the ARR estimates.
