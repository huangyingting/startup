      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Cognition AI's land-and-expand strategy is evident: the Nubank deployment started with one business unit's
              ETL migration, then expanded to the Data, Collections, and Risk units. The Cognizant partnership implies a
              similar structure—Cognizant begins with internal deployment and then upsells to its global client base.
              The Free and Pro plan tiers are designed for developer-led adoption: individual developers experiment at
              low cost, drive internal adoption, and create bottom-up enterprise procurement pressure. The Windsurf
              IDE's 250,000+ daily active users provide a large organic install base from which to convert to paid Devin
              usage.

              Concentration risks are significant and not publicly disclosed. With ARR of ~$73M and a small set of
              confirmed named accounts, there is a material risk that a handful of large enterprise contracts
              (Nubank-scale, Mercedes-Benz-scale) constitute a dominant share of revenue. If the Cognizant channel
              partnership is performing well, it may itself represent disproportionate revenue concentration through a
              single reseller rather than diversified direct customer relationships. The COBOL modernization vertical
              targets high-value projects (multi-year legacy systems) that are structurally one-time engagements unless
              renegotiated as long-term support contracts, creating potential revenue cliff risk after initial
              migrations complete.

              Procurement friction at regulated industries is high. Financial services, healthcare, and government
              customers require security certifications (SOC 2, FedRAMP) and data residency controls that Cognition has
              not publicly disclosed meeting. VPC deployment mitigates the data residency concern, but the absence of
              published compliance attestations limits the addressable market in the most regulated industry verticals.
              The Government vertical launch in February 2026 suggests Cognition is actively addressing
              FedRAMP-equivalent certification requirements, but timelines and current status are not public. This
              compliance gap represents the primary enterprise procurement barrier for Cognition's target
              large-enterprise segment.
