        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Cognition AI has raised approximately $696 million in venture capital across three primary rounds in under
              18 months, making it one of the fastest-funded AI infrastructure companies on record. The seed/Series A in
              March 2024 raised approximately $21 million at a $350 million pre-money valuation from Founders Fund,
              signaling early conviction in the founding team before any product revenue. In April 2024, just weeks
              after launch, Cognition closed $175 million at a $2 billion post-money valuation—again led by Founders
              Fund—crossing unicorn status within six months of founding. The September 2025 Series B raised $400
              million at a $10.2 billion post-money valuation, with co-investors including Lux Capital, 8VC, Elad Gil,
              Bain Capital Ventures, D1 Capital, Definition Capital, and Swish Ventures. VentureBeat and TechCrunch
              confirmed this round in September 2025.

              The company disclosed a remarkably low net cash burn of under $20 million from founding through Q3
              2025—extraordinary given the fundraising scale—suggesting the bulk of capital was held in reserve rather
              than spent on headcount or infrastructure at a rate typical for similar-stage companies. The Windsurf
              acquisition in July 2025 was estimated at approximately $250 million, funded from existing capital
              reserves without a new primary raise—a sign of financial discipline given the scale of the transaction
              relative to employee count. Post-acquisition headcount reportedly reached approximately 249 before layoffs
              of 30 employees and the departure of Windsurf personnel who accepted the 9-month buyout offer.
