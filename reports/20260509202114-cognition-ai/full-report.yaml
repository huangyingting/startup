chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Cognition AI is a San Francisco-based AI-native software company building autonomous agents that perform
              end-to-end software engineering tasks. Its flagship product, Devin, is marketed as the world's first AI
              software engineer: an agent that can interpret tickets, plan solutions, write and debug code, run tests,
              and deploy to production with minimal human intervention. The company operates a SaaS subscription model
              for individual developers and small teams (Core plan at $20/month), a Team plan at $500/month including
              250 Agent Compute Units, and custom enterprise contracts with VPC deployment options. Following the July
              2025 acquisition of Windsurf—an AI-native IDE—Cognition expanded its product portfolio to serve developers
              who prefer a more interactive, IDE-centered workflow rather than a fully autonomous agent. The
              dual-product strategy allows Cognition to address both the agentic automation segment and the traditional
              coding-assistant market that GitHub Copilot and Cursor dominate. Revenue is primarily usage-based:
              additional Agent Compute Units beyond plan inclusions are priced at roughly $2.25 per ACU, creating a
              metered model that scales with enterprise task volume. The company's website and blog are public-facing
              channels; it does not publish GAAP financials and reports only via investor communications and
              company-controlled press releases.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO028
              - CO029
      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >-
              Cognition AI was co-founded by three elite competitive programmers, each an International Olympiad in
              Informatics gold medalist, giving the company an exceptionally deep technical foundation from inception.
              Scott Wu, CEO, is a three-time IOI gold medalist, a 2011 MATHCOUNTS national champion, and holds a Harvard
              economics degree. On the Codeforces competitive programming platform, Wu holds the top designation of
              Legendary Grandmaster, reflecting continued excellence in algorithmic problem-solving. Prior to Cognition,
              he co-founded Lunchclub, an AI-powered professional networking product. Steven Hao, CTO, is also an IOI
              gold medalist with prior experience at Scale AI, DeepMind, Waymo, Nuro, Modal, and Cursor—a background
              spanning both frontier AI research and production engineering systems. Walden Yan, CPO, brings product
              leadership and IOI-level algorithmic depth. The founding team of approximately 10 individuals collectively
              held 10 IOI gold medals at launch, an extraordinary concentration of competitive-programming talent rarely
              seen at an early-stage startup. This profile has attracted top-tier investors and talent but also creates
              a meaningful key-person dependency: the founders' technical credibility is inseparable from the company's
              market positioning. No board composition or independent director information has been publicly disclosed.
