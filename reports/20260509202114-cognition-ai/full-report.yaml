  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and ARR Trajectory
        blocks:
          - type: paragraph
            body: >
              Cognition AI operates a consumption-based SaaS revenue model anchored to Agent Compute Units (ACUs)—a
              proprietary token of compute capacity consumed per autonomous task. Individual developers subscribe at $20
              per month (Core plan: 5 ACUs), teams at $500 per month (Team plan: 250 ACUs), and enterprises under custom
              contracts with volume discounts and additional ACU pools. The pricing ladder is designed to monetize
              proportionally to task complexity and volume, making it structurally different from seat-based tools like
              GitHub Copilot or Cursor. However, this model creates lumpy revenue: enterprise customers with variable
              sprint workloads may have uneven monthly consumption patterns, requiring careful cohort-level analysis to
              distinguish durable ARR from one-time expansion.

              Cognition's ARR trajectory has been one of the most rapid in enterprise AI history. The company exited the
              first six months of operations with negligible revenue, crossed $1M ARR in September 2024, reached $73M
              ARR by June 2025—a 73x increase in nine months—and then jumped to approximately $155M combined ARR
              following the July 2025 Windsurf acquisition ($82M ARR contributed). The Cognition AI blog post from
              September 2024 ("Funding, Growth, and the Next Frontier of AI Coding Agents") confirmed the $73M ARR
              figure and outlined the company's two-product strategy. Post-Windsurf, the combined entity has a
              bifurcated revenue base: Devin's enterprise automation revenue (high ACV, low seat count) and Windsurf's
              IDE subscription revenue (lower ACV, higher seat count). Separating and growing both lines while
              integrating the teams is a material execution risk.

              As of April 2026, reports suggest the company is in discussions for additional financing at a potential
              $25B+ valuation, implying investors believe ARR will continue growing materially above $155M. However,
              post-acquisition ARR disclosed figures should be interpreted cautiously: the $82M Windsurf ARR
              contribution was measured at time of acquisition and may not reflect post-migration retention rates.
