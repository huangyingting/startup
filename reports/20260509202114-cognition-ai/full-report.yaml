              graphs.

              The April 2026 plan revision retired the original Core and Team plans, replacing them with a five-tier
              structure: Free (limited ACUs), Pro, Max, Teams, and Enterprise. This signals a land-and-expand strategy:
              the Free tier provides entry-level exposure for individual developers and bootcamp students, while Pro and
              Max serve power users, and Teams/Enterprise capture organizational deployment. SWE-Check, introduced in
              collaboration with Applied Compute in April 2026, is a specialized bug detection model trained via
              reinforcement learning that matches Opus 4.6 on internal evals while running approximately 10x
              faster—positioned as a cost-efficient quality gate within the Devin agent loop.

              The company's in-house model, SWE-1.5, powers both SWE-Check and Windsurf Codemaps, representing
              Cognition's first proprietary model release beyond the Devin runtime ensemble. All products are delivered
              cloud-first, with VPC deployment available for enterprise customers requiring on-premise or isolated cloud
              infrastructure. The Devin for Terminal feature, released in 2026, enables developers to start agent
              sessions from their local terminal and escalate to the cloud when the task outgrows local resources,
              bridging the CLI and cloud deployment modes.
