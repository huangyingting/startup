      - number: '3.2'
        title: Tier-One Hyperscaler-Backed Competitors
        blocks:
          - type: paragraph
            body: >
              GitHub Copilot, owned by Microsoft since the GitHub acquisition, benefits from unmatched distribution
              embedded in the world's largest developer platform. With 90% of Fortune 100 companies using Copilot and
              over 20 million active developers, its scale creates high switching-cost inertia. Copilot's pricing ranges
              from $10 per month for individuals to $19 per month for Business tier and $39 per month for Enterprise,
              making it the default low-cost entry point for most developer teams. The platform has progressively
              expanded from inline code completions to chat, pull-request summarization, and workspace-level Copilot
              Workspace—a multi-step planning and execution agent that increasingly encroaches on Devin's autonomous
              territory. GitHub Copilot reached over $2 billion in annual recurring revenue by early 2025, making it the
              largest pure-play AI coding revenue line globally.

              Amazon Q Developer addresses the enterprise segment's compliance and security requirements most directly,
              offering a Free tier and a Pro tier at $19 per user per month. Its native AWS service integrations,
              200,000-token context window, and Agents for Amazon CodeWhisperer capability set position it as the
              preferred choice for organizations standardized on AWS. Q Developer achieved SOC 2 Type II certification
              and supports VPC isolation—security postures unavailable from most startup competitors. The hyperscaler
              tier's primary limitation versus Cognition is the absence of full-cycle autonomous task completion:
              neither Copilot nor Q Developer autonomously plans, implements, tests, and deploys end-to-end without
              human-in-the-loop confirmation at each stage. This architectural constraint creates the addressable gap
              Devin is designed to exploit, though both hyperscalers are actively extending agent capabilities toward
