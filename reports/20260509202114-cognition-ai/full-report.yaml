      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              Cognition AI targets three principal buyer segments with distinct budget ownership and adoption triggers.
              The primary segment, enterprise software teams, sees VP Engineering or CTO act as buyer with software
              engineers as users and IT budget as payer. The adoption trigger is a measurable productivity gap—typically
              revealed by benchmarking AI tool ROI against headcount costs. Reference customers Goldman Sachs (12K
              developer pilot), Citi, Cisco, Dell, and Nubank illustrate this segment. Deal sizes range from $100K to
              $2M+ annually for enterprise contracts, with sales cycles of 3–9 months including legal and security
              review.

              The secondary segment, high-growth technology startups, sees CTOs or founding engineers as both buyer and
              user, with founders allocating seed capital as payer. The adoption trigger is velocity: Devin allows a
              10-person team to execute like a 50-person team. These buyers typically start on the $20/month Core plan
              and upgrade to Team. Key reference customers include Ramp and Nubank, which reported a 12× efficiency
              gain. Deal value is lower at $500–$6,000/year but volume is high and conversion to enterprise contracts is
              likely as companies scale.

              The tertiary segment, individual developers and freelancers, presents lower strategic priority. Buyers and
              users are the same person; payers are self-employed developers billing hourly. The adoption trigger is
              competitive necessity as AI tooling becomes table-stakes for professional developers. The Core plan at
              $20/month targets this group, which has high churn sensitivity and primarily serves as a product feedback
              loop and lead-generation funnel rather than a primary revenue driver. Financial services enterprises
              represent a cross-cutting priority segment given Goldman Sachs' 12K-developer Devin pilot and Citi's
              reported deployment—these buyers require SOC 2 Type II, data residency, and regulatory compliance
              commitments before enterprise sign-off.
            claimRefs:
              - CM010
              - CM011
              - CM018
              - CM019
              - CM022
