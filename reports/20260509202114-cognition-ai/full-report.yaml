  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >
              Cognition AI offers two core products: Devin, a cloud-hosted autonomous AI software engineer, and
              Windsurf, an agentic IDE for local and cloud-assisted development. Devin accepts natural-language task
              descriptions—submitted via the web dashboard, Slack, Linear, or Jira—and executes full end-to-end software
              engineering tasks autonomously: planning the approach, writing and modifying code, running tests,
              iterating on failures, and opening pull requests with reviewable diffs and confidence indicators. Unlike
              code-completion tools (GitHub Copilot, Cursor), Devin takes ownership of entire tasks rather than
              assisting a human in writing individual lines.

              In a typical enterprise workflow, a developer or engineering manager assigns a Jira ticket or Slack
              message to Devin. Devin reads the ticket, explores the repository context using its DeepWiki server, sets
              up the necessary environment, writes the implementation, runs the test suite, and reports back with a pull
              request. The PR includes Devin's internal trace of decisions for human review. The Devin 2.0 release added
              a confidence meter that quantifies the probability of task success before committing, allowing teams to
              triage tasks efficiently. Devin can handle tasks concurrently across multiple sessions, enabling teams to
              delegate entire sprint backlogs rather than individual tickets.

              Windsurf IDE complements Devin by providing a local development environment with AI Cascade agent
              integration. Developers can start a coding session locally in Windsurf and hand off complex,
              compute-intensive work to Devin in the cloud mid-session, with state preserved across the transition. The
              "Devin in Windsurf" feature announced in April 2026 formalizes this local-to-cloud handoff workflow.
              Together, the two products target the full developer lifecycle: Windsurf for daily coding assistance and
              Devin for delegated autonomous task execution.
