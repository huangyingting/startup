summary:
  headline: >
    Cognition AI is a category-defining autonomous software engineering platform with exceptional ARR growth ($1M → $73M
    in 9 months), but the $10.2B valuation at ~140× ARR prices in near-flawless execution in a market facing rapid
    benchmark commoditization and critical undisclosed financial metrics.
