    - id: CV001
      statement: "Cognition AI's $10.2B September 2025 post-money valuation divided by an estimated $73M trailing ARR (April 2025) implies approximately a 140× ARR multiple—a 7× premium to the closest comparable Cursor/Anysphere, which closed a $9.9B Series D at approximately $500M ARR, implying ~20× ARR."
      type: estimated
      topic: valuation
      sourceRefs: [SV011, SV012, SV010]
      confidence: medium
      freshness: current

    - id: CV002
      statement: "The recommendation for Cognition AI at $10.2B valuation is watchlist / conditional invest: the bull thesis (70×/year ARR growth, Windsurf integration moat, enterprise lighthouse customers) is structurally compelling but insufficient to justify a risk-adjusted positive return at 140× ARR without NRR, gross margin, and top-customer concentration data."
      type: inferred
      topic: recommendation
      sourceRefs: [SV012, SV013, SV017]
      confidence: medium
      freshness: current

    - id: CV003
      statement: "Entry discipline recommendation: investors should target a Cognition AI entry valuation below $5B (implying ≤70× current estimated ARR), at which the bull case returns are 3.5–5× in 3 years and the bear case returns imply losses limited to 50–80% of investment, reflecting a more acceptable risk-reward asymmetry."
      type: inferred
      topic: recommendation
      sourceRefs: [SV012, SV013]
      confidence: low
      freshness: current

    - id: CV004
      statement: "Cognition AI raised $175M at a $2B valuation in its Series A round led by Founders Fund IX (CIK 0001971631, EDGAR); this represents a 5.1× step-up to the September 2025 $10.2B round in approximately nine months—one of the fastest large-round step-up trajectories in AI software startup history."
      type: observed
