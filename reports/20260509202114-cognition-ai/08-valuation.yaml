      sourceRefs: [SV002, SV011]
      confidence: high
      freshness: current

    - id: CV005
      statement: "Cognition Capital SPV I (CIK 0002072175, Form D filed June 2025) was structured contemporaneously with the Windsurf acquisition; the SPV structure suggests one or more institutional investors required a structured co-investment vehicle, which is a common signal of concentration risk in a single institution funding the Windsurf consideration."
