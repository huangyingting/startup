  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: expensive
  keyMetrics:
    valuationUsdM: 10200
    revenueRunRateUsdM: 73
    arrUsdM: 73
    revenueGrowthYoYPct: null
