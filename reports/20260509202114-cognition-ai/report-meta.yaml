companyProfile:
  summary: >
    Cognition AI is a San Francisco-based AI startup founded in 2023 by Scott Wu,
    Steven Hao, and Walden Yan—competitive programming champions and former
    olympiad medalists. The company's flagship product, Devin, is a cloud-hosted
    autonomous AI software engineer that plans, writes, tests, and deploys code
    end-to-end without constant human input. Devin is accessed via API, Slack,
    Jira, or a web interface and priced on a usage-based model (ACUs). In July 2025,
    Cognition acquired Windsurf IDE, adding 250K+ daily active users and 350+
    enterprise accounts. The company has raised approximately $1.575B, with the
    most recent $400M round in September 2025 valuing it at $10.2B.
  foundedDate: "2023-01-01"
  founders:
    - name: Scott Wu
      role: CEO
      background: Competitive programming world champion; US Math Olympiad team member
      claimRefs: [CO001]
    - name: Steven Hao
      role: Co-founder
      background: Competitive programming champion; ex-Google DeepMind researcher
      claimRefs: [CO001]
    - name: Walden Yan
      role: Co-founder
      background: Competitive programming champion; formerly at Scale AI and Nuro
      claimRefs: [CO001]
  foundingLocation: "San Francisco, CA"
  headquarters: "San Francisco, CA"
  productSummary: >
    Devin is a cloud-hosted autonomous AI software engineer that accepts tasks via
    Slack, Jira, or web interface, then plans, writes code, tests, and deploys
    independently using Agent Compute Units (ACUs). Devin 2.0 (April 2025) added
    direct PR merging at a 3× lower effective price per task. Windsurf IDE (acquired
    July 2025) adds 250K+ daily active users and 350+ enterprise accounts to the platform.
  customerFocus: >
    Enterprise engineering teams (1,000+ developers), mid-market technology companies,
    and individual professional developers. Named enterprise customers: Nubank, Mercedes-Benz,
    Cognizant. US Government vertical launched February 2026.
  businessModel: >
    Usage-based SaaS: $500/month Team plan plus $2.25/ACU overage; Enterprise plan requires
    direct negotiation. Windsurf IDE adds free-to-paid conversion funnel. Cognizant channel
    partnership adds reseller revenue layer.
  stage: Late Private (post-Series A)
  fundingStatus: >
    $21M seed (2023), $175M Series A at $2B (Founders Fund IX, Jan/Apr 2025),
    $400M round at $10.2B (Sep 2025). Total ~$1.575B disclosed.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CI001, CI002]

summary:
  headline: >
    Cognition AI is a category-defining autonomous software engineering platform with
    exceptional ARR growth ($1M → $73M in 9 months), but the $10.2B valuation at
    ~140× ARR prices in near-flawless execution in a market facing rapid benchmark
    commoditization and critical undisclosed financial metrics.
