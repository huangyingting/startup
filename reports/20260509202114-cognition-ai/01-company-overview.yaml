callouts:
  - calloutType: strength
    title: Exceptional Founder-Market Fit
    body: >-
      Three IOI gold medalists building autonomous coding software is one of the highest founder-market fit signals in
      recent venture history. The team collectively held 10 IOI golds at launch, attracting Founders Fund lead backing
      even before product release.
    claimRefs:
      - CO007
      - CO019
      - CO020
  - calloutType: risk
    title: Culture and Talent Retention Risk
    body: >-
      CEO Scott Wu's publicly stated commitment to 80-hour, six-day workweeks resulted in forced buyout offers to ~200
      Windsurf employees. This concentrated culture model risks attrition of acquired talent whose capabilities are
      essential to sustaining the dual-product strategy.
    claimRefs:
      - CO035
      - CO022
      - CO023
  - calloutType: insight
    title: Fastest Unicorn-to-Decacorn Trajectory in AI
    body: >-
      Cognition went from zero revenue to $10.2B valuation in approximately 24 months. The combination of exceptional
      team credentials, bold product framing, and accelerating enterprise adoption underpins this trajectory—but also
      creates significant multiple-compression risk if growth decelerates.
    claimRefs:
      - CO009
      - CO014
      - CO037
