company:
  name: Cognition AI
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Cognition AI, founded in November 2023 by competitive-programming champions Scott Wu, Steven Hao, and Walden Yan,
    created Devin—the world's first autonomous AI software engineer. After a $175M Series A at a $2B valuation in April
    2024 and a $400M raise at $10.2B in September 2025 (following the strategic acquisition of AI-IDE startup Windsurf),
    the company reached approximately $155M combined ARR and is positioning itself as the infrastructure layer for
    autonomous software development.
sections:
  - id: identity-business-model
    title: Identity and Business Model
    body: >-
      Cognition AI is a San Francisco-based AI-native software company building autonomous agents that perform
      end-to-end software engineering tasks. Its flagship product, Devin, is marketed as the world's first AI software
      engineer: an agent that can interpret tickets, plan solutions, write and debug code, run tests, and deploy to
      production with minimal human intervention. The company operates a SaaS subscription model for individual
      developers and small teams (Core plan at $20/month), a Team plan at $500/month including 250 Agent Compute Units,
      and custom enterprise contracts with VPC deployment options. Following the July 2025 acquisition of Windsurf—an
      AI-native IDE—Cognition expanded its product portfolio to serve developers who prefer a more interactive,
      IDE-centered workflow rather than a fully autonomous agent. The dual-product strategy allows Cognition to address
      both the agentic automation segment and the traditional coding-assistant market that GitHub Copilot and Cursor
      dominate. Revenue is primarily usage-based: additional Agent Compute Units beyond plan inclusions are priced at
      roughly $2.25 per ACU, creating a metered model that scales with enterprise task volume. The company's website and
      blog are public-facing channels; it does not publish GAAP financials and reports only via investor communications
      and company-controlled press releases.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO028
      - CO029
  - id: founders-leadership
    title: Founders and Leadership
    body: >-
      Cognition AI was co-founded by three elite competitive programmers, each an International Olympiad in Informatics
      gold medalist, giving the company an exceptionally deep technical foundation from inception. Scott Wu, CEO, is a
      three-time IOI gold medalist, a 2011 MATHCOUNTS national champion, and holds a Harvard economics degree. On the
      Codeforces competitive programming platform, Wu holds the top designation of Legendary Grandmaster, reflecting
      continued excellence in algorithmic problem-solving. Prior to Cognition, he co-founded Lunchclub, an AI-powered
      professional networking product. Steven Hao, CTO, is also an IOI gold medalist with prior experience at Scale AI,
      DeepMind, Waymo, Nuro, Modal, and Cursor—a background spanning both frontier AI research and production
      engineering systems. Walden Yan, CPO, brings product leadership and IOI-level algorithmic depth. The founding team
      of approximately 10 individuals collectively held 10 IOI gold medals at launch, an extraordinary concentration of
      competitive-programming talent rarely seen at an early-stage startup. This profile has attracted top-tier
      investors and talent but also creates a meaningful key-person dependency: the founders' technical credibility is
      inseparable from the company's market positioning. No board composition or independent director information has
      been publicly disclosed.
    claimRefs:
      - CO004
      - CO005
      - CO006
      - CO007
      - CO026
      - CO027
      - CO032
      - CO038
      - CO039
      - CO019
    tableRefs:
      - TO002
  - id: funding-investors
    title: Funding History and Investors
    body: >-
      Cognition AI's capital formation has been among the fastest in recent venture history. An initial ~$21M
      seed/Series A round in March 2024 valued the company at approximately $350M before any meaningful revenue existed,
      reflecting investor conviction in the founding team's ability to execute. Just weeks later in April 2024,
      Cognition closed $175M at a $2B valuation, crossing into unicorn territory within six months of founding. Founders
      Fund—Peter Thiel's venture firm—led both rounds, providing not only capital but reputational signal to the broader
      market. By September 2025, following the Windsurf acquisition and rapid ARR growth, Cognition raised $400M at a
      post-money valuation of $10.2B, bringing total capital raised to approximately $696M. Co-investors in the
      September 2025 round included Lux Capital, 8VC, Elad Gil (prominent angel and operator), Bain Capital Ventures, D1
      Capital, Definition Capital, and Swish Ventures. As of May 2026, the company is reportedly in discussions for a
      new financing round at a potential $25B+ valuation, implying continued strong investor appetite for agentic AI
      coding infrastructure. Notably, the company has disclosed a total net cash burn of under $20M from founding
      through Q3 2025, suggesting the rapid growth was achieved with remarkable capital efficiency prior to the
      acquisition.
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO020
      - CO030
      - CO031
      - CO036
      - CO037
      - CO016
    tableRefs:
      - TO001
      - TO003
    figureRefs:
      - FO002
  - id: scale-milestones
    title: Scale and Milestones
    body: >-
      Cognition AI's revenue trajectory is extraordinary by any SaaS benchmark. The company exited 2024 at approximately
      $1M ARR (September 2024) and accelerated to $73M ARR by June 2025—a roughly 73x increase in nine months driven by
      enterprise adoption of Devin for code migration, bug-fixing, and feature automation tasks. The July 2025
      acquisition of Windsurf, which contributed $82M ARR from 350+ enterprise accounts, pushed the combined business to
      approximately $155M ARR within weeks. Major enterprise clients including Goldman Sachs (reportedly piloting Devin
      with 12,000 developers), Citi, Dell, Cisco, Ramp, Palantir, Nubank, and Mercado Libre have been publicly cited.
      Nubank reportedly achieved a 12x efficiency improvement in code migration workflows using Devin. In April 2026,
      Cognition opened a Singapore APAC headquarters, signaling international expansion intent. The same month, a
      Mercedes-Benz partnership was announced. Headcount data is not publicly disclosed in detail; pre-acquisition
      estimates placed the Cognition team at roughly 49 employees, while the Windsurf acquisition added potentially 200
      individuals before layoffs and buyout departures.
    claimRefs:
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO033
      - CO040
    tableRefs:
      - TO004
    figureRefs:
      - FO001
      - FO003
  - id: governance-key-person-risk
    title: Governance and Key-Person Risk
    body: >-
      Cognition AI is a privately held C-corporation with no public financial disclosures, no publicly identified board
      composition, and no independent directors known to investors or analysts outside the cap table. The company's
      governance structure remains opaque: investor rights, board seats granted to Founders Fund and other lead
      investors, and secondary market transaction terms have not been disclosed. The extreme concentration of product
      vision and technical credibility in the three co-founders—particularly Scott Wu, whose public persona and coding
      legend status are inseparable from Devin's brand—creates substantial key-person risk. The mandatory 80-hour,
      six-day workweek culture that prompted voluntary buyout offers to Windsurf employees in 2025 raises questions
      about talent retention, especially for acquired personnel who did not self-select for that environment.
      Post-acquisition attrition among Windsurf engineers could erode the IDE product capabilities that justified the
      ~$250M deal. Critics and independent reviewers have noted that Devin's real-world task success rates are
      substantially lower than company-curated benchmark demonstrations suggest, and that the 'fully autonomous software
      engineer' framing may oversell current capabilities, creating future investor and customer expectation risk.
    claimRefs:
      - CO034
      - CO035
      - CO041
      - CO022
      - CO023
