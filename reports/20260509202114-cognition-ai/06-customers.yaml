company:
  name: Cognition AI
chapter:
  number: 6
  title: Customers
  summary: >
    Cognition AI grew ARR from approximately $1M to $73M in roughly nine months between
    mid-2024 and April 2025, reflecting rapid enterprise uptake of Devin. Named
    production customers include Nubank (LatAm fintech—12x efficiency, 20x cost savings
    in ETL migration), Mercedes-Benz (legacy modernization and cloud-native development),
    and Cognizant (channel partner deploying Devin and Windsurf across its own engineering
    and client organizations). The US Government vertical was launched in February 2026,
    and APAC expansion (Japan April 2026, Singapore April 2026) opened new enterprise
    demand centers. PR merge rate improved from 34% at launch to 67% by April 2025—a
    proxy for task quality improvement—but independent testers report performance gaps
    for complex or novel tasks. Net revenue retention, churn, and top-10 customer
    concentration are not disclosed.

sections:
  - id: SU-customer-segmentation
    title: Customer Base Segmentation
    body: >
      Cognition AI targets professional engineering teams at technology-forward
      enterprises, mid-market companies, and developer-first organizations. The buyer
      profile is an engineering leader or CTO seeking to multiply developer throughput
      without proportional headcount growth; the user is typically an individual software
      engineer or engineering manager who delegates tasks directly via Slack, Jira, or
      the Devin web interface. The payer is the engineering budget owner, whether a
      department budget or a centralized IT procurement function at large enterprises.

      Verticals with confirmed production deployments include financial services and
      fintech (Nubank—LatAm's largest neobank), automotive/manufacturing (Mercedes-Benz),
      IT services and outsourcing (Cognizant), enterprise technology, and the US Federal
      Government. The COBOL modernization blog post confirmed Fortune 500 deployments
      in sectors that still run significant COBOL workloads: financial services, insurance,
      and public utilities. In 2026, Cognition launched a Government vertical to target
      legacy software modernization in US federal agencies. Japan and Singapore enterprise
      markets were opened in April 2026, suggesting Southeast Asia financial services,
      manufacturing, and technology firms are the next target segments.

      The geographic distribution is US-first (the majority of revenue and named
      customers as of early 2026), with Europe (London office opened January 2026)
      and APAC (Japan and Singapore offices opened April 2026) serving as
      growth centers. Channel distribution includes direct enterprise sales, the
      Windsurf IDE free-to-paid conversion funnel (250K+ daily active users at
      acquisition), and the Cognizant reseller partnership that deploys Devin and
      Windsurf across Cognizant's own engineering teams and its global client base.
      The Windsurf integration creates a bottom-up, developer-led adoption vector
      in addition to top-down enterprise procurement.

  - id: SU-adoption-trajectory
    title: Adoption Trajectory and Growth Metrics
    body: >
      Cognition AI's most striking adoption signal is the ARR growth trajectory: from
      approximately $1M ARR at general availability (December 2024) to approximately
      $73M ARR by April 2025—a roughly 73x increase in four months. This rate of growth
      is consistent with Sacra's estimate of ~$15M ARR in October 2024 and the Growjo
      platform's current estimate of $73M, though both figures are third-party estimates
      rather than audited or company-disclosed financials. The April 2025 pricing reset
      (Core plan from $500/month to $20/month base) accelerated individual developer
      adoption while maintaining enterprise revenue through volume.

      Internal usage signals are revealing. By February 2026, Cognition's own engineering
      team was merging 659 Devin PRs per week—four times the 154 per week achieved at
      their best week in 2025. This "dog-fooding" signal is significant: the team building
      Devin is also its most intensive user, providing a high-quality feedback loop that
      likely accelerates iteration velocity. The PR merge rate improved from 34% at
      Devin's launch to 67% by April 2025—a proxy for output quality improvement—though
      the metric is self-reported and denominator methodology is not specified.

      Geographic expansion (London, Tokyo, Singapore) in the first half of 2026 suggests
      management confidence in revenue sufficiency to support multi-office overhead.
      The Cognizant partnership is particularly significant as a channel amplifier:
      Cognizant's global client base spans 300+ organizations across financial services,
      manufacturing, and healthcare, meaning even partial penetration could materially
      accelerate Devin's enterprise account count without proportional Cognition sales headcount.
      However, no public data exists on the number of active paying accounts, the average
      contract value, or the customer growth rate beyond the ARR estimates.

  - id: SU-named-customer-proof
    title: Named Customer Proof and Reference Quality
    body: >
      The highest-quality named customer proof is the Nubank case study, the only
      publicly detailed and quantified production deployment. Nubank, Latin America's
      largest neobank (approximately 100 million customers), used Devin to migrate a
      6-million-line ETL monolith to sub-modules—a task originally estimated to require
      1,000+ engineers over 18 months. With Devin, the migration progressed in weeks
      for each business unit (Data, Collections, Risk), achieving 12x engineering
      efficiency improvement in hours saved and 20x cost savings versus the all-human
      baseline. Crucially, the case study documents fine-tuning on the customer's
      specific migration patterns, which led to a 4x speed improvement (40 minutes
      per task to 10 minutes) and a 2x accuracy improvement on the internal benchmark.

      Mercedes-Benz is named in a blog post (April 27, 2026) as deploying Devin and
      Windsurf "across its global engineering organization" for legacy modernization,
      cloud-native development, and logistics. No outcome metrics are publicly disclosed;
      the announcement is at the partnership/announcement stage rather than a post-hoc
      case study. Cognizant (announced January 28, 2026) is deploying Devin and
      Windsurf "across its engineering organization and global clients"—this is a
      channel partnership rather than a named end-customer, and no production outcome
      data is available.

      Additional unnamed customer evidence: Fortune 500 COBOL modernization deployments
      (blog post April 8, 2026, no named customers), US Government (Cognition for
      Government launched February 25, 2026, no named agencies), Japan enterprise
      (launched April 9, 2026, no specific customers named). The depth and freshness of
      proof varies enormously: Nubank is production with quantified outcomes; others are
      at announcement stage. This creates a concentration of evidence quality risk—if
      Nubank is not representative of typical deployments, the customer proof base is
      shallow.

  - id: SU-retention-satisfaction
    title: Retention, Satisfaction, and Durability
    body: >
      Publicly available retention and satisfaction metrics for Cognition AI are limited.
      The company has not disclosed Net Revenue Retention (NRR), Gross Revenue Retention
      (GRR), customer churn rate, or cohort analysis data. The most proximate public
      indicator of satisfaction is the PR merge rate (67% as of April 2025, up from 34%
      at launch), which measures the share of Devin-opened pull requests that are accepted
      by human reviewers—a reasonable proxy for output quality but not a standard
      customer satisfaction metric. A 67% PR acceptance rate implies that one-third of
      Devin's work products require rejection or significant rework, which may be
      acceptable for high-volume autonomous tasks but is a notable quality gap versus
      human engineers.

      Developer sentiment from independent sources is mixed. Hacker News communities
      have noted that early Devin demos appeared polished but real-world performance
      on complex tasks lagged expectations set by the original 13.86% SWE-bench
      announcement. The independent reviewer at imseankim.com—after waiting six weeks
      to observe the product in production—noted that "independent testers tell a more
      complicated story" relative to Cognition's official performance numbers, and flagged
      that ACU costs accumulate quickly in practice, with moderate usage easily exceeding
      $100-200 per month on the nominally $20/month Core plan. The security vulnerability
      disclosed in December 2024 temporarily damaged trust among security-conscious enterprise
      customers.

      On durability signals, the Nubank deployment describes continued and expanding use
      (data, collections, and risk business units progressively adopting Devin). Internal
      Cognition usage of Devin (659 PRs/week merged in Feb 2026) suggests strong
      product-led retention. The Cognizant and Mercedes-Benz partnerships represent
      structural switching costs once integrated into enterprise workflows. However, the
      contract length, renewal rates, and post-deployment satisfaction at named enterprise
      customers are not publicly known.

  - id: SU-expansion-concentration
    title: Expansion and Concentration Risk
    body: >
      Cognition AI's land-and-expand strategy is evident: the Nubank deployment started
      with one business unit's ETL migration, then expanded to the Data, Collections, and
      Risk units. The Cognizant partnership implies a similar structure—Cognizant begins
      with internal deployment and then upsells to its global client base. The Free and
      Pro plan tiers are designed for developer-led adoption: individual developers
      experiment at low cost, drive internal adoption, and create bottom-up enterprise
      procurement pressure. The Windsurf IDE's 250,000+ daily active users provide a
      large organic install base from which to convert to paid Devin usage.

      Concentration risks are significant and not publicly disclosed. With ARR of ~$73M
      and a small set of confirmed named accounts, there is a material risk that a
      handful of large enterprise contracts (Nubank-scale, Mercedes-Benz-scale) constitute
      a dominant share of revenue. If the Cognizant channel partnership is performing
      well, it may itself represent disproportionate revenue concentration through a
      single reseller rather than diversified direct customer relationships. The COBOL
      modernization vertical targets high-value projects (multi-year legacy systems) that
      are structurally one-time engagements unless renegotiated as long-term support
      contracts, creating potential revenue cliff risk after initial migrations complete.

      Procurement friction at regulated industries is high. Financial services, healthcare,
      and government customers require security certifications (SOC 2, FedRAMP) and
      data residency controls that Cognition has not publicly disclosed meeting. VPC
      deployment mitigates the data residency concern, but the absence of published
      compliance attestations limits the addressable market in the most regulated
      industry verticals. The Government vertical launch in February 2026 suggests Cognition
      is actively addressing FedRAMP-equivalent certification requirements, but timelines
      and current status are not public. This compliance gap represents the primary
      enterprise procurement barrier for Cognition's target large-enterprise segment.

