      nodes:
        - {id: "user_task", label: "User Task Input (NL description)"}
        - {id: "repo_context", label: "Repository Context (Git history)"}
        - {id: "agent_runtime", label: "Agent Runtime (Planning + SWE-1.5)"}
        - {id: "deepwiki", label: "DeepWiki (Vectorized code graph)"}
        - {id: "acu_meter", label: "ACU Metering Layer"}
        - {id: "sandbox", label: "Sandboxed Container (shell, editor, browser)"}
        - {id: "mcp_tools", label: "MCP External Tools (Sentry, Notion, DBs)"}
        - {id: "output_pr", label: "Output: PR + Trace + BlockDiff"}
      edges:
        - {from: "user_task", to: "agent_runtime"}
        - {from: "repo_context", to: "deepwiki"}
        - {from: "deepwiki", to: "agent_runtime"}
        - {from: "agent_runtime", to: "acu_meter"}
