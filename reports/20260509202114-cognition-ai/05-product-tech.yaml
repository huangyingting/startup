  researchQuestions:
    - id: QE001
      question: "What are all integration categories and specific tools that Devin supports natively and via MCP?"
      type: enumeration
      targets: ["contentRequirements/3"]
      status: answered
      answerSummary: "Native: GitHub, GitLab, Bitbucket, Jira, Linear, Slack, Teams. MCP Marketplace: Sentry, Datadog, PostgreSQL, MySQL, MongoDB, Notion, Confluence + hundreds more."

    - id: QE002
      question: "What is Devin's SWE-bench resolution rate on the full benchmark versus competitors?"
      type: quantification
      targets: ["contentRequirements/4"]
      status: answered
      answerSummary: "Devin: 13.86% (2024, Full 25% subset unassisted). Prior SOTA: 1.96%. Claude Code Opus 4: 72.5% (SWE-bench Verified 2025). mini-SWE-agent: 65% (Verified 2025). Note: different benchmark versions."

    - id: QE003
      question: "How does the Devin agent execution loop work end-to-end from task input to pull request output?"
      type: mechanism
      targets: ["contentRequirements/2"]
      status: answered
      answerSummary: "Task input → agent planning → DeepWiki codebase exploration → sandboxed execution (code+test+iterate) → BlockDiff snapshot → PR creation with confidence score and execution trace."

    - id: QE004
      question: "Does Devin have SOC 2 Type II or ISO 27001 security certification?"
      type: verification
      targets: ["contentRequirements/5"]
      status: answered
      answerSummary: "Not publicly disclosed as of May 2026. Neither SOC 2 Type II nor ISO 27001 attestation appears in public documentation. May exist under NDA for enterprise customers."

    - id: QE005
      question: "What are all product SKUs and pricing tiers for Devin and Windsurf products?"
      type: enumeration
      targets: ["contentRequirements/1"]
      status: answered
      answerSummary: "Devin: Free, Pro, Max, Teams, Enterprise (VPC). Windsurf IDE: Free/Pro ($15/mo), Enterprise. Devin API included in paid plans. April 2026 plan refresh added Free and Max tiers."

    - id: QE006
      question: "What is the Devin 2.0 ACU efficiency improvement versus version 1.x?"
      type: quantification
      targets: ["contentRequirements/0"]
      status: answered
      answerSummary: "Devin 2.0 completes 83% more tasks per ACU versus v1.x, per company claims at April 2025 launch."

    - id: QE007
      question: "How does Devin's SWE-bench score from 2024 compare to current SOTA agents in 2025-2026?"
      type: comparison
      targets: ["contentRequirements/4"]
      status: answered
      answerSummary: "Devin's 13.86% (2024) has been surpassed: Claude Code Opus 4 (72.5% Verified), mini-SWE-agent (65% Verified). The field has advanced dramatically while Devin's 2025 Verified score is not disclosed."

    - id: QE008
      question: "What is the Agent Compute Unit (ACU) and how is it metered?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      answerSummary: "ACU is Cognition's proprietary compute token. Approximately $2.25/ACU overage price. Plan inclusions: ~5 ACUs (Free/Core), 250 ACUs (Team). Consumed by task duration/complexity, not capped per request."

    - id: QE009
      question: "Is Devin available for on-premises or VPC deployment?"
      type: verification
      targets: ["contentRequirements/3"]
      status: answered
      answerSummary: "Yes, Enterprise tier includes VPC deployment. Devin runs within the customer's cloud (AWS/GCP/Azure) environment, keeping source code within the customer's perimeter."

    - id: QE010
      question: "What source control, project management, and communication platforms does Devin integrate with?"
      type: enumeration
      targets: ["contentRequirements/3"]
      status: answered
      answerSummary: "Source control: GitHub, GitLab, Bitbucket. Project management: Jira, Linear. Communication: Slack, Microsoft Teams. MCP: hundreds of additional tools."

    - id: QE011
      question: "What are the known technical limitations and failure modes of Devin?"
      type: adverse
      targets: ["contentRequirements/5"]
      status: answered
      answerSummary: "Known limits: 45-minute runtime cap, probabilistic (not guaranteed) task success, prompt-injection vulnerability (patched 2024), poor handling of tasks requiring software architecture design vs. implementation."

    - id: QE012
      question: "Has Devin's benchmark performance improved with Devin 2.0 and newer releases?"
      type: freshness
      targets: ["contentRequirements/4"]
      status: answered
      answerSummary: "83% more tasks per ACU (efficiency improvement per Cognition). No updated SWE-bench Verified score disclosed. Competitor benchmarks (Claude Code 72.5%) significantly exceed Devin's 2024 published score."

    - id: QE013
      question: "What is the maximum task duration limit for a single Devin session?"
      type: quantification
      targets: ["contentRequirements/2"]
      status: answered
      answerSummary: "45 minutes maximum per session. Longer tasks must be decomposed into sub-sessions. Devin 2.0's efficiency improvements allow more work per 45-minute block."

    - id: QE014
      question: "How does Devin handle security and data isolation between customer sessions?"
      type: mechanism
      targets: ["contentRequirements/5"]
      status: answered
      answerSummary: "Each session runs in an isolated ephemeral container. Code changes are PR-gated. VPC deployment keeps source code within customer perimeter. Execution trace is auditable. No SOC 2 disclosed."

    - id: QE015
      question: "What programming languages and development frameworks does Devin officially support?"
      type: enumeration
      targets: ["contentRequirements/0"]
      status: partial
      answerSummary: "Primarily Python-based tasks on SWE-bench (documentation context). Documentation references JavaScript, TypeScript, common web frameworks. No exhaustive official language/framework list published."

    - id: QE016
      question: "How does Windsurf IDE differ technically from Devin cloud agent in their execution models?"
      type: comparison
      targets: ["contentRequirements/1"]
      status: answered
      answerSummary: "Windsurf: local desktop IDE with Cascade AI agent for real-time coding assistance. Devin: cloud agent for autonomous multi-hour task execution. Post-acquisition, Devin-in-Windsurf enables handoff between the two."

    - id: QE017
      question: "Does Devin use open-source components or third-party model APIs as part of its runtime?"
      type: verification
      targets: ["contentRequirements/2"]
      status: partial
