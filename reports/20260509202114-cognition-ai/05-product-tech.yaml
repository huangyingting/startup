figures:
  - id: FE001
    title: Devin task lifecycle flow
    type: flow
    description: >
      Flow diagram depicting the end-to-end Devin task execution lifecycle from task
      input through pull request creation. Shows six key stages: (1) Task input via Slack,
      Jira, Linear, or web dashboard; (2) Planning and decomposition by the agent runtime;
      (3) Repository exploration via DeepWiki; (4) Sandboxed code execution (coding, testing,
      iteration); (5) BlockDiff snapshotting and rollback if tests fail; (6) PR creation
      with confidence score and execution trace for human review. Feedback loop from
      test failure back to coding step is shown.
    claimRefs: [CE003, CE010, CE017, CE021]
    sourceRefs: [SE001, SE002]
    data:
      nodes:
        - {id: "task_input", label: "Task Input (Slack / Jira / Linear / Web)"}
        - {id: "planning", label: "Agent Planning & Decomposition"}
        - {id: "deepwiki", label: "Repository Exploration (DeepWiki)"}
        - {id: "sandbox_exec", label: "Sandboxed Execution (Code + Test)"}
        - {id: "blockdiff", label: "BlockDiff Snapshot / Rollback"}
        - {id: "pr_output", label: "PR Creation + Confidence Score + Trace"}
      edges:
        - {from: "task_input", to: "planning"}
        - {from: "planning", to: "deepwiki"}
        - {from: "deepwiki", to: "sandbox_exec"}
        - {from: "sandbox_exec", to: "blockdiff"}
        - {from: "blockdiff", to: "sandbox_exec", label: "Retry on failure"}
        - {from: "blockdiff", to: "pr_output", label: "On success"}

  - id: FE002
    title: SWE-bench performance bar chart
    type: bar
    description: >
      Bar chart comparing key SWE-bench performance milestones across AI coding agents.
      Shows Devin's original 13.86% on SWE-bench Full (2024), the prior SOTA of 1.96%,
      the assisted SOTA of 4.80%, open-source SWE-agent at 12.47% on Lite, and SOTA
      agents Claude Code (Opus 4) at 72.5% and mini-SWE-agent at 65% on SWE-bench
      Verified (500 instances). Illustrates the rapid advancement of the field and
      Devin's relative positioning versus current top performers.
    claimRefs: [CE002, CE016, CE020, CE023]
    sourceRefs: [SE003, SE006, SE010, SE020]
    data:
      series:
        - name: "SWE-bench Performance (% Resolved)"
          points:
            - {label: "Prior SOTA unassisted (2024)", value: 1.96}
            - {label: "Best assisted LLM (2024)", value: 4.8}
            - {label: "SWE-agent Lite (2024)", value: 12.47}
            - {label: "Devin Full 25% subset (2024)", value: 13.86}
            - {label: "mini-SWE-agent Verified (2025)", value: 65.0}
            - {label: "Claude Code Opus 4 Verified (2025)", value: 72.5}

  - id: FE003
    title: Product capability KPIs
    type: kpi
    description: >
      KPI panel summarizing Devin's key product capability metrics as of May 2026:
      SWE-bench resolution rate at launch, Devin 2.0 ACU efficiency improvement,
      maximum task runtime, Windsurf daily active users at acquisition, enterprise
      customers at acquisition, and GitHub repo stars for the open-source benchmark
      results. These metrics serve as a proxy for product maturity and adoption.
    claimRefs: [CE002, CE004, CE014, CE016, CE026]
    sourceRefs: [SE003, SE005, SE015]
    data:
      items:
        - {label: "SWE-bench Full (2024 launch)", value: "13.86", unit: "% resolved"}
        - {label: "Devin 2.0 ACU efficiency gain", value: "83", unit: "% improvement vs v1"}
        - {label: "Max task runtime per session", value: "45", unit: "minutes"}
        - {label: "Windsurf DAU (at acquisition)", value: "250,000+", unit: "daily active users"}
        - {label: "Windsurf enterprise customers", value: "350+", unit: "accounts"}
        - {label: "GitHub benchmark repo stars", value: "124", unit: "stars"}

  - id: FE004
    title: Technical architecture layers flow
    type: flow
    description: >
      Flow diagram showing Cognition AI's layered technical architecture. Left column:
      input layer (user task, repo context). Center: agent runtime layer (SWE-1.5 model,
      DeepWiki, ACU metering). Right column: execution layer (sandboxed container, tool
      calls — editor/shell/browser). Bottom: output layer (PR diff, execution trace,
      BlockDiff snapshot). MCP connections to external services shown as lateral arrows
      from the agent runtime.
