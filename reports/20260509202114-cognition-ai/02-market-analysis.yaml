callouts:
  - calloutType: insight
    title: "TAM Definition Determines Investment Thesis"
    body: "The 100-fold difference between Grand View Research ($92M narrow) and Mordor Intelligence ($24B broad) 2030 forecasts illustrates how market definition is the critical variable. Cognition's true SAM—the premium autonomous agent tier—sits in the $1–8B range by 2030, which is large enough to support a $10B+ valuation if the company can capture 10–20% market share, but far smaller than headline AI market figures might suggest."
    claimRefs: [CM001, CM002, CM003, CM005]

  - calloutType: strength
    title: "Structural Tailwinds: Gartner 90% Enterprise Adoption Forecast"
    body: "Gartner's forecast that 90% of enterprise engineers will use AI code assistants by 2028 (versus 14% in early 2024) represents a 6× adoption rate expansion in four years. This creates category-level procurement legitimacy that benefits all AI coding tool vendors including Cognition, but disproportionately favors those with proven enterprise ROI—Cognition's customers such as Goldman Sachs and Nubank provide exactly this evidence."
    claimRefs: [CM008, CM010, CM015]

  - calloutType: risk
    title: "Trust Deficit as Enterprise Adoption Constraint"
    body: "Research from Deloitte, Forbes, and Berkeley CMR consistently identifies trust deficits—hallucination risk, security concerns, and unclear ROI frameworks—as the dominant barrier to enterprise deployment of autonomous AI coding agents. These are not temporary product issues but structural challenges requiring organizational change management, audit infrastructure, and legal clarity that can extend enterprise sales cycles to 9+ months even for buyers motivated to adopt."
    claimRefs: [CM013, CM014, CM016, CM031, CM033]

