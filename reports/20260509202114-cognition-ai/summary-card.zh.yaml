summary:
  headline: >
    Cognition AI 定义了自主软件工程平台这个品类，ARR 9 个月从 $1M 冲到 $73M；但 $10.2B 估值约等于 140×
    ARR，已经把近乎完美的执行定价进去，而这个市场的基准能力正快速商品化，关键财务指标也未披露。
  overallScore: 6
