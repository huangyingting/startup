      items:
        - {label: "Founding ARR (Nov 2023)", value: 0, unit: "M USD ARR"}
        - {label: "ARR (Sep 2024)", value: 1, unit: "M USD ARR"}
        - {label: "ARR (Jun 2025)", value: 73, unit: "M USD ARR"}
        - {label: "Windsurf Acquisition Contribution (Jul 2025)", value: 82, unit: "M USD ARR"}
        - {label: "Combined ARR (Jul 2025)", value: 155, unit: "M USD ARR"}

