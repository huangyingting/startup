    type: range
    description: >
      Range chart showing analyst estimate ranges for key unit economics metrics
      (gross margin %, NRR %, enterprise ACV). Each metric shown with low, mid, and
      high estimates, with the mid representing the central analyst expectation and
      low/high representing the credible range based on comparable SaaS companies.
