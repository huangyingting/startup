    title: Revenue model bridge
    type: waterfall
    description: >
      Waterfall chart showing ARR progression from $0 at founding (Nov 2023) through four
      discrete milestones: $1M (Sep 2024), $73M (Jun 2025), +$82M Windsurf acquisition
      contribution (Jul 2025), and combined $155M (Jul 2025). Each step labeled with
      milestone event and period. Illustrates the step-change nature of growth and the
      material contribution of the Windsurf acquisition.
