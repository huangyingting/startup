company:
  name: Neko Health
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Neko sits in an unusual overlap between preventive medicine, premium consumer health services, and medtech-enabled
    diagnostics.
sections:
  - id: s1
    title: Market Boundary
    body: >-
      The relevant market is not the entire healthcare system. Neko occupies a narrower wedge: preventive health checks
      for consumers who are willing to pay directly for speed, design, and a feeling of comprehensive insight. Public
      systems and primary-care doctors already perform preventive work, but Neko reframes it as a branded experience
      rather than a sporadic medical interaction.
    claimRefs:
      - C001
      - C002
  - id: s2
    title: Demand Drivers
    body: >-
      The macro tailwind is credible. Chronic disease burden, overloaded primary care, and growing consumer interest in
      optimization all favor a product that promises earlier intervention. The challenge is that these drivers do not
      automatically create a large private-pay market unless the experience feels meaningfully better than existing care
      pathways.
    claimRefs:
      - C001
      - C003
  - id: s3
    title: Constraint on Expansion
    body: >-
      Neko’s market opportunity is constrained by affordability, regulation, clinical trust, and willingness to operate
      physical sites. That makes this more operationally complex than a typical software-enabled health business: every
      new city requires clinical staffing, device workflows, and local regulatory comfort.
    claimRefs:
      - C002
      - C003
