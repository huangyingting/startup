      - - Insurance-backed preventive diagnostics
        - Payer
        - Longer-term adjacency if economics and evidence improve
    notes: Neko is currently best understood as a private-pay clinic model rather than a reimbursed care pathway.
    claimRefs:
      - C002
      - C003
  - id: T202
    title: Growth Drivers and Constraints
    columns:
      - Factor
      - Direction
      - Comment
    rows:
      - - Consumer interest in prevention
        - Positive
        - Supports waitlist formation and repeat scans
      - - Primary-care overload
        - Positive
        - Creates appetite for alternatives
      - - Premium out-of-pocket pricing
        - Negative
        - Limits immediate market breadth
      - - Clinic rollout complexity
        - Negative
        - Makes expansion slower than software scaling
    notes: >-
      The market case is compelling, but the service must still prove broader affordability and operational
      repeatability.
    claimRefs:
      - C001
      - C003
