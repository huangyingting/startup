company:
  name: Neko Health
chapter:
  number: 8
  title: Valuation
  summary: >-
    Neko deserves credit for reaching private-unicorn status quickly, but public evidence still points to a stretched
    valuation relative to disclosed economics.
sections:
  - id: s1
    title: What Supports Value
    body: >-
      Neko has what investors want to see in consumer health: strong demand, social proof, distinctive design, and
      enough retention to suggest routine rather than one-off usage. The founding story and media resonance also give
      the company distribution advantages that many clinical startups lack.
    claimRefs:
      - C001
      - C002
  - id: s2
    title: Why the Valuation Feels Rich
    body: >-
      The company is still fundamentally a clinic operator with physical rollout constraints. Revenue is undisclosed,
      clinic margins are undisclosed, and U.S. scaling remains partly conditional on approvals. A $1.8 billion valuation
      can make sense if Neko becomes a durable preventive-care network; it looks aggressive if the model remains a
      premium niche service.
    claimRefs:
      - C001
      - C003
  - id: s3
    title: Investment View
    body: >-
      The right stance is to keep Neko close rather than chase it blindly. The company is clearly more than hype, but
      the next stage of evidence has to come from location economics, clinical outcomes, and successful expansion beyond
      its initial urban flagship model.
    claimRefs:
      - C002
      - C003
tables:
