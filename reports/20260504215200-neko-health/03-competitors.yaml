company:
  name: Neko Health
chapter:
  number: 3
  title: Competitors
  summary: >-
    Neko is building in a category that is crowded enough to validate demand but still unsettled enough that no one has
    proven a dominant, mass-market model.
sections:
  - id: s1
    title: Direct Screening Competitors
    body: >-
      The most obvious peers are other premium screening companies such as Prenuvo, Ezra, and Echelon Health. These
      businesses vary in modality, but they compete for the same customer desire: reassurance, early detection, and a
      more controlled preventive experience than standard care pathways provide.
    claimRefs:
      - C001
  - id: s2
    title: Current Differentiation
    body: >-
      Neko’s visible edge is its attempt to make prevention feel more like a repeatable annual routine at a lower ticket
      price than some MRI-led rivals. The company also emphasizes a vertically integrated clinic workflow rather than a
      loosely coordinated set of devices and partners. That differentiation is meaningful, but only if it remains
      clinically trusted at scale.
    claimRefs:
      - C002
  - id: s3
    title: Why the Category Is Still Open
    body: >-
      This category is still searching for a stable end state. Some providers may win on imaging depth, some on design
      and convenience, and some on integration with broader care networks. Neko has strong early demand, but the overall
      category still faces skepticism about medical necessity, false positives, and elite positioning.
    claimRefs:
      - C003
tables:
  - id: T301
    title: Competitor Comparison Table
    columns:
      - Company
      - Primary angle
      - How it compares with Neko
    rows:
      - - Prenuvo
        - Whole-body MRI screening
        - Higher-imaging-intensity brand, often framed as premium competitor
      - - Ezra
        - MRI-based screening service
        - Competes on imaging access and brand positioning
      - - Echelon Health
        - Preventive assessment clinic
        - Closer clinic-format analogue, especially in the UK
      - - Neko Health
        - Multi-sensor body scan plus doctor consult
        - Lower-price, high-design preventive clinic experience
    notes: Comparison is directional and based on public positioning rather than a like-for-like clinical outcomes study.
    claimRefs:
      - C001
      - C002
      - C003
figures: []
callouts:
  - calloutType: risk
    title: Being early does not guarantee category leadership
    body: >-
      Neko’s waitlist advantage is meaningful, but premium preventive health is likely to remain contested by
      imaging-led rivals, incumbent diagnostics, and standard primary care.
    claimRefs:
      - C001
      - C003
