    type: observed
    topic: use-of-proceeds
    sourceRefs:
      - S001
      - S025
    confidence: high
    freshness: current
  - id: C016
    statement: >-
      Neko’s scan is sold as a fast clinic visit that combines multi-sensor screening, blood work, and an in-person
      doctor consultation.
    type: observed
    topic: product
    sourceRefs:
      - S001
      - S002
    confidence: high
    freshness: current
