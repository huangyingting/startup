claims:
  - id: C001
    statement: Neko Health was co-founded in 2018 by Daniel Ek and Hjalmar Nilsonne.
    type: observed
    topic: founding
    sourceRefs:
      - S001
      - S006
    confidence: high
    freshness: current
  - id: C002
    statement: Neko raised a $260 million Series B in January 2025 at a $1.8 billion post-money valuation.
    type: observed
    topic: funding
    sourceRefs:
      - S001
      - S002
    confidence: high
    freshness: current
  - id: C003
    statement: >-
      The company had completed roughly 10,000 scans across London and Stockholm and reported a global waitlist above
      100,000 by early 2025.
    type: observed
    topic: traction
    sourceRefs:
      - S001
      - S003
      - S004
    confidence: high
    freshness: current
  - id: C004
    statement: >-
      Neko sells a premium preventive health check priced around £299 in the UK and intends to use new capital to expand
      in Europe and the U.S.
    type: observed
    topic: business-model
    sourceRefs:
      - S001
      - S005
    confidence: high
    freshness: current
  - id: C005
    statement: About 80% of customers were reported to rebook and prepay for the next year at the end of their appointment.
    type: observed
    topic: retention
    sourceRefs:
      - S001
      - S003
      - S004
    confidence: high
    freshness: current
  - id: C006
    statement: Neko is riding a broader shift in healthcare from reactive treatment toward earlier detection and prevention.
    type: observed
    topic: market-shift
    sourceRefs:
      - S009
      - S011
      - S012
    confidence: medium
    freshness: current
  - id: C007
    statement: >-
      Public-health systems already offer lower-cost preventive interventions such as the NHS Health Check, so Neko is
      not inventing prevention but repackaging it into a premium consumer format.
    type: observed
    topic: market-boundary
    sourceRefs:
      - S010
    confidence: high
    freshness: current
  - id: C008
    statement: >-
      The commercial opportunity depends on consumers paying for convenience, design, and higher perceived insight
      rather than on insurers or national health systems underwriting the service today.
    type: observed
    topic: buyer
    sourceRefs:
      - S010
      - S013
    confidence: medium
    freshness: current
  - id: C009
    statement: >-
      Neko competes with other premium preventive-screening providers such as Prenuvo, Ezra, and Echelon Health,
      alongside broader diagnostics and primary-care substitutes.
    type: observed
    topic: competitors
    sourceRefs:
      - S016
      - S017
      - S018
    confidence: high
    freshness: current
  - id: C010
    statement: >-
      Neko’s differentiation is its lower price point, vertically integrated clinic workflow, and multi-sensor body-scan
      experience rather than an MRI-only proposition.
    type: observed
    topic: differentiation
    sourceRefs:
      - S016
      - S017
      - S019
    confidence: medium
    freshness: current
  - id: C011
    statement: >-
      Competitive framing increasingly asks whether these full-body-scan startups are the future of prevention or an
      experience some primary-care physicians would avoid.
    type: observed
    topic: skepticism
    sourceRefs:
      - S019
    confidence: medium
    freshness: current
  - id: C012
    statement: >-
      Neko raised $65 million in Series A in 2023 and $260 million in Series B in 2025, implying roughly $325 million of
      disclosed funding.
    type: observed
    topic: capital-raised
    sourceRefs:
      - S001
      - S021
      - S022
    confidence: high
    freshness: current
  - id: C013
    statement: >-
      The January 2025 Series B was led by Lightspeed with General Catalyst, O.G. Venture Partners, Rosello, Lakestar,
      and Atomico participating.
    type: observed
    topic: investors
    sourceRefs:
      - S001
      - S022
      - S023
    confidence: high
    freshness: current
  - id: C014
