companyProfile:
  summary: >-
    Neko Health is a Stockholm-founded preventive-health startup that combines a fast full-body scan, a physician
    consultation, and a premium direct-pay clinic model. Its January 2025 Series B valued the company at $1.8 billion
    after unusually strong early demand signals, but the next investment debate is whether those signals convert into
    attractive, repeatable clinic economics.
  foundedDate: '2018-01-01'
  founders:
    - name: Hjalmar Nilsonne
      role: CEO and Co-Founder
      background: Operator and public face of Neko’s clinic and product rollout.
      claimRefs: []
    - name: Daniel Ek
      role: Co-Founder
      background: Spotify co-founder whose brand and capital have amplified Neko’s visibility.
      claimRefs: []
  foundingLocation: Stockholm, Sweden
  headquarters: Stockholm, Sweden
  productSummary: >-
    Neko sells a preventive body scan experience that combines multiple screening modalities, software, and a doctor
    consultation into an annual health-check workflow.
  customerFocus: Direct-paying consumers seeking preventive screening and health reassurance.
  businessModel: Clinic-based direct-pay healthcare with recurring annual check-ups and future diagnostic expansion.
  stage: Series B
  fundingStatus: Raised $260M Series B at $1.8B post-money in January 2025; approximately $325M total disclosed funding.
  claimRefs: []
chapters:
  - number: 2
    title: Company Overview
    sections:
      - number: '2.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Neko is not telehealth software and not a diagnostics lab. It is a vertically integrated clinic operator
              that uses hardware, software, workflow design, and physician consultation to sell a preventive health
              check directly to consumers. The commercial pitch is simple: a relatively affordable annual body scan that
              catches risk factors early and encourages recurring engagement before symptoms become expensive disease
              states.
            claimRefs:
              - C001
              - C004
      - number: '2.2'
        title: Founders and Positioning
        blocks:
          - type: paragraph
            body: >-
              The founding pairing of Daniel Ek and Hjalmar Nilsonne gives Neko brand visibility well beyond typical
              health-tech startups. Ek contributes capital, attention, and systems-thinking credibility; Nilsonne is the
              operating CEO and the more day-to-day steward of the product and rollout. That combination has helped Neko
              win media attention quickly, but it also raises the bar for execution because the company is already
              priced and perceived like a breakout category creator.
            claimRefs:
              - C001
              - C002
      - number: '2.3'
        title: Traction Signals
        blocks:
          - type: paragraph
            body: >-
              The strongest early proof points are demand and retention. Multiple sources converge on roughly 10,000
              scans completed, a waiting list above 100,000, and an 80% rebooking rate. Those are unusually strong
              top-of-funnel and repeat-use signals for a clinic model. They do not yet prove durable unit economics, but
              they clearly show product resonance among early adopters.
            claimRefs:
              - C002
              - C003
              - C005
      - number: '2.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Demand is real; economics are still the open question
            body: >-
              Neko has stronger early consumer pull than many digital-health startups, but the missing variable is
              whether a clinic-heavy model can scale while staying affordable enough to become more than a niche premium
              service.
            calloutType: insight
            claimRefs:
              - C003
              - C004
              - C005
