  - number: 3
    title: Market Analysis
    sections:
      - number: '3.1'
        title: Market Boundary
        blocks:
          - type: paragraph
            body: >-
              The relevant market is not the entire healthcare system. Neko occupies a narrower wedge: preventive health
              checks for consumers who are willing to pay directly for speed, design, and a feeling of comprehensive
              insight. Public systems and primary-care doctors already perform preventive work, but Neko reframes it as
              a branded experience rather than a sporadic medical interaction.
            claimRefs:
              - C006
              - C007
      - number: '3.2'
        title: Demand Drivers
        blocks:
          - type: paragraph
            body: >-
              The macro tailwind is credible. Chronic disease burden, overloaded primary care, and growing consumer
              interest in optimization all favor a product that promises earlier intervention. The challenge is that
              these drivers do not automatically create a large private-pay market unless the experience feels
              meaningfully better than existing care pathways.
            claimRefs:
              - C006
              - C008
      - number: '3.3'
        title: Constraint on Expansion
        blocks:
          - type: paragraph
            body: >-
              Neko’s market opportunity is constrained by affordability, regulation, clinical trust, and willingness to
              operate physical sites. That makes this more operationally complex than a typical software-enabled health
              business: every new city requires clinical staffing, device workflows, and local regulatory comfort.
            claimRefs:
              - C007
              - C008
      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: This is preventive care as a consumer product
            body: >-
              Neko’s opportunity exists because it packages prevention in a way consumers are willing to buy
              proactively, not because prevention itself is a new concept.
            calloutType: insight
            claimRefs:
              - C006
              - C007
              - C008
          - type: table
            tableRef: T201
            claimRefs:
              - C007
              - C008
          - type: table
            tableRef: T202
            claimRefs:
              - C006
              - C008
  - number: 4
    title: Competitors
    sections:
      - number: '4.1'
        title: Direct Screening Competitors
        blocks:
          - type: paragraph
            body: >-
              The most obvious peers are other premium screening companies such as Prenuvo, Ezra, and Echelon Health.
              These businesses vary in modality, but they compete for the same customer desire: reassurance, early
              detection, and a more controlled preventive experience than standard care pathways provide.
            claimRefs:
              - C009
      - number: '4.2'
        title: Current Differentiation
        blocks:
          - type: paragraph
            body: >-
              Neko’s visible edge is its attempt to make prevention feel more like a repeatable annual routine at a
              lower ticket price than some MRI-led rivals. The company also emphasizes a vertically integrated clinic
              workflow rather than a loosely coordinated set of devices and partners. That differentiation is
              meaningful, but only if it remains clinically trusted at scale.
            claimRefs:
              - C010
      - number: '4.3'
        title: Why the Category Is Still Open
        blocks:
          - type: paragraph
            body: >-
              This category is still searching for a stable end state. Some providers may win on imaging depth, some on
              design and convenience, and some on integration with broader care networks. Neko has strong early demand,
              but the overall category still faces skepticism about medical necessity, false positives, and elite
              positioning.
            claimRefs:
              - C011
      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Being early does not guarantee category leadership
            body: >-
              Neko’s waitlist advantage is meaningful, but premium preventive health is likely to remain contested by
              imaging-led rivals, incumbent diagnostics, and standard primary care.
            calloutType: risk
            claimRefs:
              - C009
              - C011
          - type: table
            tableRef: T301
            claimRefs:
              - C009
              - C010
              - C011
  - number: 5
    title: Financials
    sections:
      - number: '5.1'
        title: Funding Trajectory
        blocks:
          - type: paragraph
            body: >-
              The company’s disclosed funding path is clear: seed support, a $65 million Series A in 2023, and a $260
              million Series B in 2025. That is a very large capital base for a clinic-centric consumer health business,
              which implies the next step is proving that each new location compounds value rather than merely adding
              operating complexity.
            claimRefs:
              - C012
              - C013
      - number: '5.2'
        title: What Investors Are Buying
        blocks:
          - type: paragraph
            body: >-
              Investors are buying into a consumer-health platform thesis, not a single clinic. The round’s use of
              proceeds points to international expansion, acquisitions, R&D, and additional diagnostic depth. In other
              words, the financing case assumes Neko can become a repeatable preventive-care brand with technology
              leverage, not just a one-off flagship experience in affluent neighborhoods.
            claimRefs:
              - C013
              - C015
      - number: '5.3'
        title: Key Missing Economics
        blocks:
          - type: paragraph
            body: >-
              Despite the strong capital raise, the critical economics remain private: revenue per scan, location
              utilization, staffing cost, customer acquisition cost, and contribution margin. Without those numbers,
              investors can see demand but cannot yet independently judge whether the current valuation is conservative
              or exuberant.
            claimRefs:
              - C014
      - number: '5.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The valuation assumes clinic replication works
            body: >-
              Neko’s financing profile already prices in a future with many more locations and deeper diagnostic
              products. The public evidence still stops short of proving that rollout economics.
            calloutType: insight
            claimRefs:
              - C012
              - C014
              - C015
          - type: table
            tableRef: T401
            claimRefs:
              - C012
              - C013
          - type: table
            tableRef: T402
            claimRefs:
              - C014
  - number: 6
    title: Product & Technology
    sections:
      - number: '6.1'
        title: Current Product
        blocks:
          - type: paragraph
            body: >-
              At its simplest, Neko sells a body scan plus physician interpretation. The customer experience matters as
              much as the hardware: rapid intake, attractive clinical design, an immediate doctor discussion, and a
              sense of comprehensive coverage. That blend is what makes the product feel consumer-tech-like while still
              remaining grounded in healthcare delivery.
            claimRefs:
              - C016
      - number: '6.2'
        title: Technology Stack
        blocks:
          - type: paragraph
            body: >-
              The product is not purely proprietary. Public reporting says Neko mixes its own Class I devices with
              third-party hardware, while aiming to improve data capture and add diagnostics over time. This hybrid
              model is pragmatic because it accelerates launch, but it also means differentiation must come from
              workflow, software, and trust rather than from device ownership alone.
            claimRefs:
              - C017
              - C018
      - number: '6.3'
        title: Technical Maturity
        blocks:
          - type: paragraph
            body: >-
              The technology looks promising, but the right diligence standard is clinical usefulness, not sensor count.
              More parameters, more data points, and more diagnostics only matter if they improve actionable prevention
              without creating confusion, false positives, or regulatory drag.
            claimRefs:
              - C019
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The workflow may matter more than the hardware
            body: >-
              Neko’s moat is likely to come from making prevention feel easy, repeatable, and trustworthy — not from
              claiming that every device is uniquely proprietary.
            calloutType: strength
            claimRefs:
              - C016
              - C018
          - type: table
            tableRef: T501
            claimRefs:
              - C016
              - C018
              - C019
  - number: 7
    title: Customers
    sections:
      - number: '7.1'
        title: Who the Customer Is
        blocks:
          - type: paragraph
            body: >-
              Today’s customer is effectively a premium consumer willing to pay directly for preventive insight. That
              makes the value proposition cleaner to explain but also narrows the initial audience. Neko is selling
              peace of mind, convenience, and a feeling of control over one’s health — not merely a medical test.
            claimRefs:
              - C020
      - number: '7.2'
        title: Evidence of Product-Market Fit
        blocks:
          - type: paragraph
            body: >-
              The waitlist, completed scans, and rebooking data are the best public proof of resonance. These are not
              perfect proxies for long-term value, but they do show that consumers are not treating Neko as a one-time
              novelty. Repeat intent looks materially stronger than many wellness-adjacent startups achieve.
            claimRefs:
              - C021
      - number: '7.3'
        title: Expansion Challenge
        blocks:
          - type: paragraph
            body: >-
              The next question is whether the current customer profile travels. London and Stockholm are not a
              guarantee that New York, and later other U.S. cities, will deliver the same utilization, staffing
              economics, or regulatory smoothness. Expansion therefore doubles as a customer-segmentation test.
            claimRefs:
              - C022
      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The repeat signal is unusually valuable
            body: >-
              A preventive clinic that persuades customers to prepay for next year is already doing something harder
              than simple acquisition: it is creating an annual habit.
            calloutType: strength
            claimRefs:
              - C021
          - type: table
            tableRef: T601
            claimRefs:
              - C021
              - C022
  - number: 8
    title: Risks
    sections:
      - number: '8.1'
        title: Clinical Trust Risk
        blocks:
          - type: paragraph
            body: >-
              Any company selling more preventive information than conventional care invites a hard question: does more
              data create better outcomes, or simply more anxiety and follow-up? The Bloomberg framing captures the
              issue well. Neko does not just need happy customers; it needs a durable answer to physician skepticism and
              the risk of overmedicalizing otherwise healthy people.
            claimRefs:
              - C024
      - number: '8.2'
        title: Regulatory and Liability Risk
        blocks:
          - type: paragraph
            body: >-
              The move into new geographies, especially the U.S., introduces device, clinic, physician-supervision, and
              medical-liability complexity. Even if the current product is relatively low acuity, a company that markets
              early detection at scale cannot afford ambiguity about what is diagnostic, what is advisory, and who is
              responsible when something is missed or overinterpreted.
            claimRefs:
              - C023
              - C026
      - number: '8.3'
        title: Economic Breadth Risk
        blocks:
          - type: paragraph
            body: >-
              The waitlist is strong, but the current offering is still a premium, self-pay service. If the model does
              not become materially broader over time, Neko could end up as a beloved but narrow service business. That
              would still be valuable, but not necessarily at a venture return profile consistent with a unicorn
              valuation.
            claimRefs:
              - C025
      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The bear case is a premium wellness trap
            body: >-
              If Neko never moves beyond affluent early adopters and cannot prove broad clinical value, it risks
              becoming a beautifully designed but economically narrow healthcare service.
            calloutType: risk
            claimRefs:
              - C024
              - C025
          - type: table
            tableRef: T701
            claimRefs:
              - C023
              - C024
              - C025
              - C026
  - number: 9
    title: Valuation
    sections:
      - number: '9.1'
        title: What Supports Value
        blocks:
          - type: paragraph
            body: >-
              Neko has what investors want to see in consumer health: strong demand, social proof, distinctive design,
              and enough retention to suggest routine rather than one-off usage. The founding story and media resonance
              also give the company distribution advantages that many clinical startups lack.
            claimRefs:
              - C027
              - C028
      - number: '9.2'
        title: Why the Valuation Feels Rich
        blocks:
          - type: paragraph
            body: >-
              The company is still fundamentally a clinic operator with physical rollout constraints. Revenue is
              undisclosed, clinic margins are undisclosed, and U.S. scaling remains partly conditional on approvals. A
              $1.8 billion valuation can make sense if Neko becomes a durable preventive-care network; it looks
              aggressive if the model remains a premium niche service.
            claimRefs:
              - C027
              - C029
      - number: '9.3'
        title: Investment View
        blocks:
          - type: paragraph
            body: >-
              The right stance is to keep Neko close rather than chase it blindly. The company is clearly more than
              hype, but the next stage of evidence has to come from location economics, clinical outcomes, and
              successful expansion beyond its initial urban flagship model.
            claimRefs:
              - C028
              - C029
      - number: '9.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Track, but insist on clinic economics
            body: >-
              Neko looks like a real category candidate, but at the current valuation the next underwriting step must be
              evidence that each new clinic creates attractive payback and not just more waiting-list enthusiasm.
            calloutType: recommendation
            claimRefs:
              - C027
              - C029
          - type: table
            tableRef: T801
            claimRefs:
              - C027
              - C028
              - C029
