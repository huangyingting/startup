      - - Premium self-pay positioning
        - medium
        - Could constrain TAM if the service stays niche
      - - Device and evidence complexity
        - medium
        - More features create more compliance burden
    notes: >-
      The key risk is not that consumers dislike the product; it is that scale may be clinically and operationally
      harder than demand suggests.
    claimRefs:
      - C001
