company:
  name: Neko Health
chapter:
  number: 7
  title: Risks
  summary: >-
    Neko’s biggest risks are clinical trust, regulation, and whether a premium private-pay clinic concept can scale
    without becoming either too expensive or too medically ambiguous.
sections:
  - id: s1
    title: Clinical Trust Risk
    body: >-
      Any company selling more preventive information than conventional care invites a hard question: does more data
      create better outcomes, or simply more anxiety and follow-up? The Bloomberg framing captures the issue well. Neko
      does not just need happy customers; it needs a durable answer to physician skepticism and the risk of
      overmedicalizing otherwise healthy people.
    claimRefs:
      - C002
  - id: s2
    title: Regulatory and Liability Risk
    body: >-
      The move into new geographies, especially the U.S., introduces device, clinic, physician-supervision, and
      medical-liability complexity. Even if the current product is relatively low acuity, a company that markets early
      detection at scale cannot afford ambiguity about what is diagnostic, what is advisory, and who is responsible when
      something is missed or overinterpreted.
    claimRefs:
      - C001
      - C004
  - id: s3
    title: Economic Breadth Risk
    body: >-
      The waitlist is strong, but the current offering is still a premium, self-pay service. If the model does not
      become materially broader over time, Neko could end up as a beloved but narrow service business. That would still
      be valuable, but not necessarily at a venture return profile consistent with a unicorn valuation.
    claimRefs:
      - C003
tables:
  - id: T701
