  - calloutType: risk
    title: The bear case is a premium wellness trap
    body: >-
      If Neko never moves beyond affluent early adopters and cannot prove broad clinical value, it risks becoming a
      beautifully designed but economically narrow healthcare service.
    claimRefs:
      - C002
      - C003
