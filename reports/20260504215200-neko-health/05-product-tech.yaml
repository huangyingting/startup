  name: Neko Health
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Neko’s product edge is not one breakthrough sensor but the integration of many screening steps into a fast, branded
    clinical workflow.
sections:
  - id: s1
    title: Current Product
    body: >-
      At its simplest, Neko sells a body scan plus physician interpretation. The customer experience matters as much as
      the hardware: rapid intake, attractive clinical design, an immediate doctor discussion, and a sense of
      comprehensive coverage. That blend is what makes the product feel consumer-tech-like while still remaining
      grounded in healthcare delivery.
    claimRefs:
      - C001
  - id: s2
    title: Technology Stack
    body: >-
      The product is not purely proprietary. Public reporting says Neko mixes its own Class I devices with third-party
      hardware, while aiming to improve data capture and add diagnostics over time. This hybrid model is pragmatic
      because it accelerates launch, but it also means differentiation must come from workflow, software, and trust
      rather than from device ownership alone.
    claimRefs:
      - C002
      - C003
  - id: s3
    title: Technical Maturity
    body: >-
      The technology looks promising, but the right diligence standard is clinical usefulness, not sensor count. More
      parameters, more data points, and more diagnostics only matter if they improve actionable prevention without
      creating confusion, false positives, or regulatory drag.
    claimRefs:
      - C004
