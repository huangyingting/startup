  topStrengths:
    - Strong early consumer demand with a large waitlist and high rebooking rate
    - Distinctive product positioning at the intersection of preventive care and premium consumer experience
    - Large 2025 financing gives the company room to expand and deepen diagnostics
    - Founding and investor base provide unusual brand visibility for a health startup
  topRisks:
    - Clinic-level economics remain undisclosed despite a unicorn valuation
    - U.S. expansion introduces regulatory, staffing, and liability complexity
