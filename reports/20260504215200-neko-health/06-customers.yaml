company:
  name: Neko Health
chapter:
  number: 6
  title: Customers
  summary: >-
    Neko’s customer evidence is unusually strong for an early clinic model, but it is still concentrated in affluent
    early adopters rather than a broad, reimbursed patient base.
sections:
  - id: s1
    title: Who the Customer Is
    body: >-
      Today’s customer is effectively a premium consumer willing to pay directly for preventive insight. That makes the
      value proposition cleaner to explain but also narrows the initial audience. Neko is selling peace of mind,
      convenience, and a feeling of control over one’s health — not merely a medical test.
    claimRefs:
      - C001
  - id: s2
    title: Evidence of Product-Market Fit
    body: >-
      The waitlist, completed scans, and rebooking data are the best public proof of resonance. These are not perfect
      proxies for long-term value, but they do show that consumers are not treating Neko as a one-time novelty. Repeat
      intent looks materially stronger than many wellness-adjacent startups achieve.
    claimRefs:
      - C002
  - id: s3
    title: Expansion Challenge
    body: >-
      The next question is whether the current customer profile travels. London and Stockholm are not a guarantee that
      New York, and later other U.S. cities, will deliver the same utilization, staffing economics, or regulatory
      smoothness. Expansion therefore doubles as a customer-segmentation test.
    claimRefs:
      - C003
