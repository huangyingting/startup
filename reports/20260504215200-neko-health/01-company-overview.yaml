company:
  name: Neko Health
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Neko Health is a premium preventive-health startup that packages a multi-sensor full-body scan, doctor consultation,
    and recurring annual check-up model into a clinic-based consumer product.
sections:
  - id: s1
    title: Identity and Business Model
    body: >-
      Neko is not telehealth software and not a diagnostics lab. It is a vertically integrated clinic operator that uses
      hardware, software, workflow design, and physician consultation to sell a preventive health check directly to
      consumers. The commercial pitch is simple: a relatively affordable annual body scan that catches risk factors
      early and encourages recurring engagement before symptoms become expensive disease states.
    claimRefs:
      - C001
      - C004
  - id: s2
    title: Founders and Positioning
    body: >-
      The founding pairing of Daniel Ek and Hjalmar Nilsonne gives Neko brand visibility well beyond typical health-tech
      startups. Ek contributes capital, attention, and systems-thinking credibility; Nilsonne is the operating CEO and
      the more day-to-day steward of the product and rollout. That combination has helped Neko win media attention
      quickly, but it also raises the bar for execution because the company is already priced and perceived like a
      breakout category creator.
    claimRefs:
      - C001
      - C002
  - id: s3
    title: Traction Signals
    body: >-
      The strongest early proof points are demand and retention. Multiple sources converge on roughly 10,000 scans
      completed, a waiting list above 100,000, and an 80% rebooking rate. Those are unusually strong top-of-funnel and
      repeat-use signals for a clinic model. They do not yet prove durable unit economics, but they clearly show product
      resonance among early adopters.
    claimRefs:
      - C002
      - C003
      - C005
