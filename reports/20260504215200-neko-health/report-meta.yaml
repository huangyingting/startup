companyProfile:
  summary: >-
    Neko Health is a Stockholm-founded preventive-health startup that combines a fast full-body scan, a physician
    consultation, and a premium direct-pay clinic model. Its January 2025 Series B valued the company at $1.8 billion
    after unusually strong early demand signals, but the next investment debate is whether those signals convert into
    attractive, repeatable clinic economics.
  foundedDate: '2018-01-01'
  founders:
    - name: Hjalmar Nilsonne
      role: CEO and Co-Founder
      background: Operator and public face of Neko’s clinic and product rollout.
      claimRefs: []
    - name: Daniel Ek
      role: Co-Founder
      background: Spotify co-founder whose brand and capital have amplified Neko’s visibility.
      claimRefs: []
  foundingLocation: Stockholm, Sweden
  headquarters: Stockholm, Sweden
  productSummary: >-
    Neko sells a preventive body scan experience that combines multiple screening modalities, software, and a doctor
    consultation into an annual health-check workflow.
  customerFocus: Direct-paying consumers seeking preventive screening and health reassurance.
  businessModel: Clinic-based direct-pay healthcare with recurring annual check-ups and future diagnostic expansion.
  stage: Series B
  fundingStatus: Raised $260M Series B at $1.8B post-money in January 2025; approximately $325M total disclosed funding.
  claimRefs: []
summary:
  headline: >-
    Neko has real product pull and one of the strongest early demand curves in premium preventive care, but it still
    looks priced ahead of public evidence on clinic economics. The company is worth tracking closely, especially through
    its U.S. expansion, but not yet worth underwriting as though it were a software platform.
  overallScore: 6.8
