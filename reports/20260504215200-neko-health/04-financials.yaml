company:
  name: Neko Health
chapter:
  number: 4
  title: Financials
  summary: >-
    Neko has attracted growth capital at a valuation that implies investors believe its clinic model can scale far
    beyond a boutique screening service, but public financial disclosure is still minimal.
sections:
  - id: s1
    title: Funding Trajectory
    body: >-
      The company’s disclosed funding path is clear: seed support, a $65 million Series A in 2023, and a $260 million
      Series B in 2025. That is a very large capital base for a clinic-centric consumer health business, which implies
      the next step is proving that each new location compounds value rather than merely adding operating complexity.
    claimRefs:
      - C001
      - C002
  - id: s2
    title: What Investors Are Buying
    body: >-
      Investors are buying into a consumer-health platform thesis, not a single clinic. The round’s use of proceeds
      points to international expansion, acquisitions, R&D, and additional diagnostic depth. In other words, the
      financing case assumes Neko can become a repeatable preventive-care brand with technology leverage, not just a
      one-off flagship experience in affluent neighborhoods.
    claimRefs:
      - C002
      - C004
  - id: s3
    title: Key Missing Economics
    body: >-
      Despite the strong capital raise, the critical economics remain private: revenue per scan, location utilization,
      staffing cost, customer acquisition cost, and contribution margin. Without those numbers, investors can see demand
      but cannot yet independently judge whether the current valuation is conservative or exuberant.
    claimRefs:
      - C003
