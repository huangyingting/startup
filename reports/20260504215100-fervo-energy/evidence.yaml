evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Undisclosed private-company operating metrics
    missingEvidence: Revenue, gross margin, contracted backlog value, and headcount are not disclosed in reviewed public materials.
    whyItMatters: These metrics are necessary to separate infrastructure development risk from platform-like growth narratives.
    diligencePath: Request investor deck, project finance model, backlog schedule, and current cash runway from management.
  - type: private-evidence-only
    severity: material
    topic: Undisclosed unit economics
    missingEvidence: No public project IRR, EBITDA, gross margin, or cost-per-well disclosure was located.
    whyItMatters: >-
      These metrics determine whether Fervo is creating an attractive venture return profile or only a capital-intensive
      infrastructure story.
    diligencePath: Request project model, lender materials, tax-credit assumptions, and updated drilling-cost curves.
  - type: conflicting-data
    severity: material
    topic: Exact private valuation
    missingEvidence: >-
      Reviewed public materials do not provide a company-confirmed post-money valuation for the 2025 Series E, while
      media estimates vary.
    whyItMatters: Recommendation quality and dilution analysis depend on knowing the actual valuation basis for the recent round.
    diligencePath: Request cap table, round documents, and any banker materials used in the IPO preparation process.
