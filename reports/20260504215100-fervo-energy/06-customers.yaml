  title: Customers
  summary: >-
    Fervo’s best customer proof is not logo count but the quality of its few named counterparties: Google, Southern
    California Edison, Shell Energy, and California load-serving entities.
sections:
  - id: s1
    title: Reference Customer Proof
    body: >-
      Google is the clearest third-party validation point because it publicly described the Nevada geothermal project as
      operational and tied it directly to the grid that serves its Nevada data centers. That matters more than generic
      “pilot” language: it shows Fervo can be part of a real customer energy stack.
    claimRefs:
      - C001
  - id: s2
    title: Offtake Quality
    body: >-
      For Cape Station, Fervo’s commercial model appears anchored by utility-grade offtake. Public reporting states that
      the project is fully contracted, with Southern California Edison taking the majority of output and Shell Energy
      plus community choice aggregators taking smaller positions. This is strong proof of demand, but it also highlights
      concentration risk.
    claimRefs:
      - C002
      - C003
  - id: s3
    title: Go-to-Market Implications
    body: >-
      Because each project needs a handful of high-credit counterparties rather than thousands of small customers,
      Fervo’s sales motion is long-cycle and relationship-heavy. Winning a few serious offtakers can unlock project
      finance, but losing one can stall a phase. In other words, quality of customer matters far more than quantity.
    claimRefs:
      - C003
