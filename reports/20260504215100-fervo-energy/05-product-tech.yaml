  name: Fervo Energy
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Fervo’s technology thesis is that geothermal becomes scalable when oil-and-gas drilling techniques, real-time
    sensing, and better reservoir analytics are integrated into a repeatable development workflow.
sections:
  - id: s1
    title: Core Technical System
    body: >-
      The company’s technical stack is straightforward in concept and difficult in execution. Fervo drills horizontally
      into geothermal reservoirs, runs fiber optic cables for real-time flow and temperature monitoring, and uses
      data-driven reservoir management to improve well and field performance. This matters because the investment case
      depends on repeatability, not on a one-off demonstration.
    claimRefs:
      - C001
      - C002
  - id: s2
    title: Why the Technology Matters Commercially
    body: >-
      The value of Fervo’s approach is not merely scientific. Horizontal drilling and better sensing are intended to
      improve drilling productivity, expand siting options, and reduce the effective surface footprint of development.
      If the company can continue converting technical gains into faster, cheaper, and more predictable wells, the
      technology becomes a financing asset rather than a research story.
    claimRefs:
      - C003
      - C005
  - id: s3
    title: Technical Risk Surface
    body: >-
      The same techniques that make enhanced geothermal attractive also create risk. Reservoir behavior can disappoint,
      wells can underperform, and induced seismicity must be monitored carefully. The product verdict is therefore
      positive on technical originality but still conditional on long-run field results across multiple projects.
    claimRefs:
      - C004
