company:
  name: Fervo Energy
chapter:
  number: 8
  title: Valuation
  summary: >-
    Fervo’s valuation case is driven by scarcity value in clean firm power and unusually strong commercialization
    evidence for a geothermal startup, but public evidence is still too thin to justify aggressive precision.
sections:
  - id: s1
    title: What Supports Value
    body: >-
      Fervo has already crossed the threshold that many climate startups never reach: serious utility-grade offtake, a
      public hyperscaler reference customer, and non-recourse construction finance for a flagship project. Those signals
      make the company more valuable than a typical pre-revenue hardware venture because they indicate real asset
      bankability.
    claimRefs:
      - C003
  - id: s2
    title: What Limits Precision
    body: >-
      The problem is not absence of enthusiasm; it is absence of operating detail. The company has not publicly
      disclosed revenue, project-level returns, or a confirmed post-money valuation in the Series E announcement. Media
      estimates exist, but they vary. That means the right diligence posture is valuation discipline rather than heroic
      extrapolation.
    claimRefs:
      - C001
      - C002
  - id: s3
    title: Investment View
    body: >-
      On balance, Fervo looks strategically important and commercially promising, but still early in multi-asset proof.
      The right stance is to treat it as a high-upside infrastructure technology platform deserving continued attention,
      while requiring stronger evidence on unit economics and repeatable project execution before underwriting a premium
      multiple.
    claimRefs:
      - C003
      - C004
