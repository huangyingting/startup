chapter:
  number: 7
  title: Risks
  summary: >-
    Fervo’s biggest risks are not demand-related; they are execution, subsurface, capital-intensity, and concentration
    risks that matter precisely because the market opportunity is real.
sections:
  - id: s1
    title: Subsurface and Technical Risk
    body: >-
      The cleantech narrative around EGS can understate geologic uncertainty. Fervo may be using proven drilling tools,
      but each geothermal field is still a subsurface system with reservoir behavior, productivity, and induced
      seismicity considerations that need active management. This is not a software rollout; it is an engineered energy
      asset with real physical downside.
    claimRefs:
      - C001
  - id: s2
    title: Execution and Financing Risk
    body: >-
      Cape Station is the proof asset, which means any delay, cost overrun, or underperformance there could reverberate
      through financing, customer confidence, and public-market timing. The move into non-recourse finance is a
      strength, but it also creates performance obligations that are harder to narrate away if milestones slip.
    claimRefs:
      - C002
      - C003
  - id: s3
    title: Concentration and Market Timing Risk
    body: >-
      Fervo benefits from a clean-firm-power tailwind, but today’s commercial proof still rests on a few named projects
      and counterparties. If growth in firm-power procurement slows, or if public markets become less enthusiastic about
      capital-intensive climate stories, valuation support can compress even with solid technical progress.
    claimRefs:
      - C004
      - C005
