  name: Fervo Energy
subtitle: 'Clean Firm Power from Next-Generation Geothermal: VC Diligence Report'
coverageNotes: >-
  This report relies on public evidence only. Fervo discloses financing and project milestones far more readily than
  operating financials, so valuation and unit-economics precision remain limited.
