companyProfile:
  summary: >-
    Fervo Energy is one of the most credible recent private-unicorn candidates in U.S. climate infrastructure because it
    has combined a novel geothermal commercialization story with visible customer proof, named offtake, and
    project-level bank financing. The company is building Cape Station in Utah as its flagship proof asset and is
    positioning geothermal as clean firm power for utilities, hyperscalers, and large load growth.
  foundedDate: null
  founders:
    - name: Tim Latimer
      role: CEO and Co-Founder
      background: Public-facing commercial and strategic leader for Fervo’s geothermal buildout.
      claimRefs: []
    - name: Jack Norbeck, PhD
      role: CTO and Co-Founder
      background: Technical co-founder tied closely to the company’s EGS and reservoir-engineering approach.
      claimRefs: []
  foundingLocation: null
  headquarters: Houston, TX
  productSummary: >-
    Fervo develops geothermal power projects using horizontal drilling, distributed fiber optic sensing, and subsurface
    analytics to create utility-scale, always-on carbon-free electricity assets.
  customerFocus: Utilities, power marketers, hyperscalers, and large corporate buyers seeking clean firm power.
  businessModel: Project development and ownership, monetized through long-term electricity offtake and asset-level financing.
  stage: Late-stage private
  fundingStatus: Series E closed at $462M in December 2025; Cape Station Phase I also secured $421M in non-recourse financing.
  claimRefs: []
chapters:
  - number: 2
    title: Company Overview
    sections:
      - number: '2.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Fervo Energy presents itself as a developer, owner, and operator of next-generation geothermal assets
              rather than a pure technology licensor. The company’s core promise is always-on, carbon-free electricity,
              sold through long-duration power purchase agreements and backed by a project-development model that looks
              more like infrastructure than software. Its public materials emphasize that geothermal’s commercial appeal
              increases as data centers, electrification, and decarbonization targets create demand for power that is
              both clean and dispatchable.
            claimRefs:
              - C001
              - C002
      - number: '2.2'
        title: Leadership and Commercial Maturity
        blocks:
          - type: paragraph
            body: >-
              Fervo’s disclosed leadership profile is unusually execution-oriented for a climate unicorn. The public
              team page highlights Tim Latimer as CEO and co-founder, Jack Norbeck as CTO and co-founder, and David
              Ulrey as CFO, while also surfacing structured-finance, permitting, operations, legal, and commercial
              functions that matter for project delivery. The breadth of roles listed suggests the company has evolved
              from a technical demonstration effort into a multi-disciplinary developer with internal capability across
              permitting, capital formation, and offtake management.
            claimRefs:
              - C003
      - number: '2.3'
        title: Capital Formation and Milestones
        blocks:
          - type: paragraph
            body: >-
              The clearest recent inflection was the December 2025 Series E, a $462 million round led by B Capital with
              participation from Google and a large set of climate, industrial, and infrastructure-oriented investors.
              Proceeds were explicitly tied to Cape Station buildout and other pipeline projects. Public reporting in
              2026 also shows the company preparing for an IPO, which implies a new level of scrutiny on project
              economics, execution quality, and offtake durability.
            claimRefs:
              - C004
              - C005
              - C006
              - C007
      - number: '2.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Infrastructure startup, not a software startup
            body: >-
              Fervo’s investability turns less on user growth and more on project bankability, drilling performance, and
              the credibility of long-term offtake.
            calloutType: insight
            claimRefs:
              - C001
              - C004
              - C005
