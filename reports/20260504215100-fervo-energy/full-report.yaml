  - number: 3
    title: Market Analysis
    sections:
      - number: '3.1'
        title: Market Boundary
        blocks:
          - type: paragraph
            body: >-
              The right market boundary is not “renewables” in general. Fervo competes specifically in clean firm power:
              electricity that can run around the clock and reduce reliance on fossil backup while supporting load
              growth from electrification and data centers. This framing matters because geothermal’s value proposition
              strengthens as grid planners and large buyers begin paying for reliability, not just levelized energy
              output.
            claimRefs:
              - C008
              - C012
      - number: '3.2'
        title: Demand Drivers
        blocks:
          - type: paragraph
            body: >-
              Public market commentary and industry advocacy increasingly connect geothermal to three macro tailwinds:
              data-center load growth, reindustrialization, and the need to complement large volumes of solar and wind.
              Fervo’s own narrative is aligned to that thesis. If power buyers continue shifting from annual renewable
              matching toward hourly carbon-free procurement and reliability hedging, geothermal moves from a niche
              climate technology into a strategic infrastructure category.
            claimRefs:
              - C009
              - C011
      - number: '3.3'
        title: Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The market is attractive but not frictionless. Geothermal development remains constrained by permitting
              timelines, drilling intensity, reservoir uncertainty, and the need for transmission-ready sites. Even
              where subsurface heat exists, development still depends on execution against land, water, and regulatory
              interfaces. Those constraints make the market large in theory but slow in realized deployment.
            claimRefs:
              - C010
      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The relevant TAM is firm power, not geothermal alone
            body: >-
              Fervo becomes more valuable if buyers pay for reliability, flexibility, and carbon-free capacity rather
              than just megawatt-hours.
            calloutType: insight
            claimRefs:
              - C008
              - C009
              - C012
          - type: table
            tableRef: T201
            claimRefs:
              - C008
              - C009
              - C012
          - type: table
            tableRef: T202
            claimRefs:
              - C009
              - C010
              - C011
  - number: 4
    title: Competitors
    sections:
      - number: '4.1'
        title: Direct Geothermal Peers
        blocks:
          - type: paragraph
            body: >-
              The direct peer group mixes legacy and next-generation geothermal companies. Incumbents such as Ormat
              bring operating history and asset bases, while Eavor and Quaise represent alternative advanced-geothermal
              architectures with their own scale and commercialization narratives. Fervo’s position is strongest where
              buyers prefer commercially grounded development over purely experimental technology.
            claimRefs:
              - C013
      - number: '4.2'
        title: Substitutes Outside Geothermal
        blocks:
          - type: paragraph
            body: >-
              From the buyer’s perspective, the real alternatives include gas with offsets, long-duration storage,
              nuclear, and other clean-firm approaches. That means Fervo must compete on bankability, reliability, site
              readiness, and delivery timing rather than on category novelty alone. This is good for demand but bad for
              easy competitive moats.
            claimRefs:
              - C015
      - number: '4.3'
        title: Current Competitive Advantage
        blocks:
          - type: paragraph
            body: >-
              Fervo’s best current edge is that Cape Station has moved beyond concept language into construction,
              financing, and named offtake. That combination matters more than slide-deck comparisons because it tells
              investors the company can translate drilling innovation into a financeable asset class.
            claimRefs:
              - C014
      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Execution is the moat
            body: >-
              Fervo’s near-term advantage is not that no one else can drill geothermal wells; it is that few peers have
              simultaneously assembled technology proof, utility-grade offtake, and project finance.
            calloutType: strength
            claimRefs:
              - C013
              - C014
          - type: table
            tableRef: T301
            claimRefs:
              - C013
              - C014
              - C015
  - number: 5
    title: Financials
    sections:
      - number: '5.1'
        title: Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Fervo’s disclosed financing history now has two distinct layers. The first is venture-style equity,
              culminating in the December 2025 $462 million Series E. The second is asset-backed, project-level
              financing, evidenced by the $421 million non-recourse package for Cape Station Phase I. That split matters
              because it suggests future scaling can happen partly at the asset level if lenders remain convinced by
              drilling performance, offtake quality, and construction discipline.
            claimRefs:
              - C016
              - C017
              - C019
      - number: '5.2'
        title: Monetization Model
        blocks:
          - type: paragraph
            body: >-
              Unlike climate software businesses that monetize through recurring SaaS seats, Fervo monetizes through
              power project development and long-term contracted electricity sales. The public reporting that Cape
              Station is fully contracted is strategically important because it links technical progress to
              financeability. Offtake and credit support are what convert geothermal progress into a bankable revenue
              stream.
            claimRefs:
              - C020
      - number: '5.3'
        title: What Is Still Missing
        blocks:
          - type: paragraph
            body: >-
              Despite the capital-market momentum, investors still lack public visibility into revenue, EBITDA,
              project-level returns, cost per drilled well, and expected cash conversion from Cape Station’s first
              phase. Those missing numbers are the main reason the current diligence outcome remains more “track” than
              “underwrite blindly.”
            claimRefs:
              - C016
              - C017
      - number: '5.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The financing structure is a major proof point
            body: >-
              A climate startup that can move first-of-a-kind geothermal assets into non-recourse financing is building
              a much stronger commercialization case than one that depends only on venture equity.
            calloutType: insight
            claimRefs:
              - C017
              - C019
          - type: table
            tableRef: T401
            claimRefs:
              - C016
              - C017
              - C018
              - C019
          - type: table
            tableRef: T402
            claimRefs:
              - C016
              - C017
              - C020
  - number: 6
    title: Product & Technology
    sections:
      - number: '6.1'
        title: Core Technical System
        blocks:
          - type: paragraph
            body: >-
              The company’s technical stack is straightforward in concept and difficult in execution. Fervo drills
              horizontally into geothermal reservoirs, runs fiber optic cables for real-time flow and temperature
              monitoring, and uses data-driven reservoir management to improve well and field performance. This matters
              because the investment case depends on repeatability, not on a one-off demonstration.
            claimRefs:
              - C021
              - C022
      - number: '6.2'
        title: Why the Technology Matters Commercially
        blocks:
          - type: paragraph
            body: >-
              The value of Fervo’s approach is not merely scientific. Horizontal drilling and better sensing are
              intended to improve drilling productivity, expand siting options, and reduce the effective surface
              footprint of development. If the company can continue converting technical gains into faster, cheaper, and
              more predictable wells, the technology becomes a financing asset rather than a research story.
            claimRefs:
              - C023
              - C025
      - number: '6.3'
        title: Technical Risk Surface
        blocks:
          - type: paragraph
            body: >-
              The same techniques that make enhanced geothermal attractive also create risk. Reservoir behavior can
              disappoint, wells can underperform, and induced seismicity must be monitored carefully. The product
              verdict is therefore positive on technical originality but still conditional on long-run field results
              across multiple projects.
            claimRefs:
              - C024
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Execution risk remains technical before it becomes financial
            body: >-
              Until multiple geothermal fields show repeatable drilling and production outcomes, Fervo’s technology edge
              remains promising rather than fully de-risked.
            calloutType: risk
            claimRefs:
              - C021
              - C024
          - type: table
            tableRef: T501
            claimRefs:
              - C021
              - C022
              - C025
  - number: 7
    title: Customers
    sections:
      - number: '7.1'
        title: Reference Customer Proof
        blocks:
          - type: paragraph
            body: >-
              Google is the clearest third-party validation point because it publicly described the Nevada geothermal
              project as operational and tied it directly to the grid that serves its Nevada data centers. That matters
              more than generic “pilot” language: it shows Fervo can be part of a real customer energy stack.
            claimRefs:
              - C026
      - number: '7.2'
        title: Offtake Quality
        blocks:
          - type: paragraph
            body: >-
              For Cape Station, Fervo’s commercial model appears anchored by utility-grade offtake. Public reporting
              states that the project is fully contracted, with Southern California Edison taking the majority of output
              and Shell Energy plus community choice aggregators taking smaller positions. This is strong proof of
              demand, but it also highlights concentration risk.
            claimRefs:
              - C027
              - C028
      - number: '7.3'
        title: Go-to-Market Implications
        blocks:
          - type: paragraph
            body: >-
              Because each project needs a handful of high-credit counterparties rather than thousands of small
              customers, Fervo’s sales motion is long-cycle and relationship-heavy. Winning a few serious offtakers can
              unlock project finance, but losing one can stall a phase. In other words, quality of customer matters far
              more than quantity.
            claimRefs:
              - C028
      - number: '7.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Anchor customers unlock capital
            body: >-
              In infrastructure-style businesses, a high-credit utility or hyperscaler customer is often more important
              than early revenue disclosure because it enables project finance and validates demand.
            calloutType: strength
            claimRefs:
              - C026
              - C027
          - type: table
            tableRef: T601
            claimRefs:
              - C026
              - C027
  - number: 8
    title: Risks
    sections:
      - number: '8.1'
        title: Subsurface and Technical Risk
        blocks:
          - type: paragraph
            body: >-
              The cleantech narrative around EGS can understate geologic uncertainty. Fervo may be using proven drilling
              tools, but each geothermal field is still a subsurface system with reservoir behavior, productivity, and
              induced seismicity considerations that need active management. This is not a software rollout; it is an
              engineered energy asset with real physical downside.
            claimRefs:
              - C029
      - number: '8.2'
        title: Execution and Financing Risk
        blocks:
          - type: paragraph
            body: >-
              Cape Station is the proof asset, which means any delay, cost overrun, or underperformance there could
              reverberate through financing, customer confidence, and public-market timing. The move into non-recourse
              finance is a strength, but it also creates performance obligations that are harder to narrate away if
              milestones slip.
            claimRefs:
              - C030
              - C031
      - number: '8.3'
        title: Concentration and Market Timing Risk
        blocks:
          - type: paragraph
            body: >-
              Fervo benefits from a clean-firm-power tailwind, but today’s commercial proof still rests on a few named
              projects and counterparties. If growth in firm-power procurement slows, or if public markets become less
              enthusiastic about capital-intensive climate stories, valuation support can compress even with solid
              technical progress.
            claimRefs:
              - C032
              - C033
      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: The bull case already assumes good execution
            body: >-
              At this stage, demand for clean firm power is not the bottleneck. The bottleneck is whether Fervo can
              repeatedly build, finance, and operate large geothermal assets on schedule.
            calloutType: risk
            claimRefs:
              - C031
              - C032
          - type: table
            tableRef: T701
            claimRefs:
              - C029
              - C030
              - C031
              - C032
              - C033
  - number: 9
    title: Valuation
    sections:
      - number: '9.1'
        title: What Supports Value
        blocks:
          - type: paragraph
            body: >-
              Fervo has already crossed the threshold that many climate startups never reach: serious utility-grade
              offtake, a public hyperscaler reference customer, and non-recourse construction finance for a flagship
              project. Those signals make the company more valuable than a typical pre-revenue hardware venture because
              they indicate real asset bankability.
            claimRefs:
              - C036
      - number: '9.2'
        title: What Limits Precision
        blocks:
          - type: paragraph
            body: >-
              The problem is not absence of enthusiasm; it is absence of operating detail. The company has not publicly
              disclosed revenue, project-level returns, or a confirmed post-money valuation in the Series E
              announcement. Media estimates exist, but they vary. That means the right diligence posture is valuation
              discipline rather than heroic extrapolation.
            claimRefs:
              - C034
              - C035
      - number: '9.3'
        title: Investment View
        blocks:
          - type: paragraph
            body: >-
              On balance, Fervo looks strategically important and commercially promising, but still early in multi-asset
              proof. The right stance is to treat it as a high-upside infrastructure technology platform deserving
              continued attention, while requiring stronger evidence on unit economics and repeatable project execution
              before underwriting a premium multiple.
            claimRefs:
              - C036
              - C037
      - number: '9.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Track with bias to engage
            body: >-
              Fervo is one of the more credible recent private-unicorn clean-energy stories, but valuation discipline
              should remain anchored to execution proof rather than scarcity enthusiasm alone.
            calloutType: recommendation
            claimRefs:
              - C035
              - C036
              - C037
          - type: table
            tableRef: T801
            claimRefs:
              - C034
              - C035
              - C036
              - C037
