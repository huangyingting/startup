    notes: Amounts reflect publicly disclosed financing packages, not full lifetime capital spent or future funding needs.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
  - id: T402
    title: Publicly Observable Financial Gaps
    columns:
      - Metric
      - Public status
      - Why it matters
    rows:
      - - Revenue
        - Not disclosed
        - Needed to separate development narrative from monetized output
      - - Project IRR / payback
        - Not disclosed
        - Key for assessing whether geothermal scales economically
      - - Gross margin or EBITDA
        - Not disclosed
        - Needed for public-market comparables
      - - Backlog value
        - Not disclosed
        - Would validate offtake quality beyond generic “fully contracted” language
    notes: >-
      The report relies on financing and offtake signals because the company does not publish operating financial
      statements.
    claimRefs:
      - C001
      - C002
      - C005
