company:
  name: Fervo Energy
chapter:
  number: 4
  title: Financials
  summary: >-
    Public disclosures show a company that is increasingly financed like an energy infrastructure platform, even though
    core operating metrics remain private.
sections:
  - id: s1
    title: Capital Structure
    body: >-
      Fervo’s disclosed financing history now has two distinct layers. The first is venture-style equity, culminating in
      the December 2025 $462 million Series E. The second is asset-backed, project-level financing, evidenced by the
      $421 million non-recourse package for Cape Station Phase I. That split matters because it suggests future scaling
      can happen partly at the asset level if lenders remain convinced by drilling performance, offtake quality, and
      construction discipline.
    claimRefs:
      - C001
      - C002
      - C004
  - id: s2
    title: Monetization Model
    body: >-
      Unlike climate software businesses that monetize through recurring SaaS seats, Fervo monetizes through power
      project development and long-term contracted electricity sales. The public reporting that Cape Station is fully
      contracted is strategically important because it links technical progress to financeability. Offtake and credit
      support are what convert geothermal progress into a bankable revenue stream.
    claimRefs:
      - C005
  - id: s3
    title: What Is Still Missing
    body: >-
      Despite the capital-market momentum, investors still lack public visibility into revenue, EBITDA, project-level
      returns, cost per drilled well, and expected cash conversion from Cape Station’s first phase. Those missing
      numbers are the main reason the current diligence outcome remains more “track” than “underwrite blindly.”
    claimRefs:
      - C001
      - C002
