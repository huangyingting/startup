callouts:
  - calloutType: insight
    title: The financing structure is a major proof point
    body: >-
      A climate startup that can move first-of-a-kind geothermal assets into non-recourse financing is building a much
      stronger commercialization case than one that depends only on venture equity.
    claimRefs:
      - C002
      - C004
