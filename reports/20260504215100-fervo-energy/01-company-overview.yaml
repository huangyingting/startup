company:
  name: Fervo Energy
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Fervo Energy is a Houston-based next-generation geothermal developer whose flagship Cape Station project has become
    one of the clearest commercial tests of enhanced geothermal systems at grid scale.
sections:
  - id: s1
    title: Identity and Business Model
    body: >-
      Fervo Energy presents itself as a developer, owner, and operator of next-generation geothermal assets rather than
      a pure technology licensor. The company’s core promise is always-on, carbon-free electricity, sold through
      long-duration power purchase agreements and backed by a project-development model that looks more like
      infrastructure than software. Its public materials emphasize that geothermal’s commercial appeal increases as data
      centers, electrification, and decarbonization targets create demand for power that is both clean and dispatchable.
    claimRefs:
      - C001
      - C002
  - id: s2
    title: Leadership and Commercial Maturity
    body: >-
      Fervo’s disclosed leadership profile is unusually execution-oriented for a climate unicorn. The public team page
      highlights Tim Latimer as CEO and co-founder, Jack Norbeck as CTO and co-founder, and David Ulrey as CFO, while
      also surfacing structured-finance, permitting, operations, legal, and commercial functions that matter for project
      delivery. The breadth of roles listed suggests the company has evolved from a technical demonstration effort into
      a multi-disciplinary developer with internal capability across permitting, capital formation, and offtake
      management.
    claimRefs:
      - C003
  - id: s3
    title: Capital Formation and Milestones
    body: >-
      The clearest recent inflection was the December 2025 Series E, a $462 million round led by B Capital with
      participation from Google and a large set of climate, industrial, and infrastructure-oriented investors. Proceeds
      were explicitly tied to Cape Station buildout and other pipeline projects. Public reporting in 2026 also shows the
      company preparing for an IPO, which implies a new level of scrutiny on project economics, execution quality, and
      offtake durability.
    claimRefs:
      - C004
      - C005
      - C006
      - C007
