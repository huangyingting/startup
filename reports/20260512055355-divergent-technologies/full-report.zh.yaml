companyProfile:
  summary: >-
    Divergent Technologies 是一家总部位于美国加州 Torrance 的未上市公司，处于工业 / 硬件 / 数字制造领域。Divergent Adaptive Production System (DAPS)
    将生成式设计软件、增材制造、自动化装配和认证工作流合在一起，面向复杂车辆与防务部件。本报告把最新一轮确认独角兽身份的融资视为可信筛选证据，但最终投资判断前仍需要查看非公开经营材料。
  foundedDate: '2014-01-01'
  founders:
    - name: Kevin Czinger
      role: 创始人兼 CEO
      background: 与 Divergent 和 Czinger Vehicles 相关的创业者和先进制造运营者。
      claimRefs:
        - CO001
  foundingLocation: Los Angeles, California, USA
  headquarters: Torrance, California, USA
  productSummary: Divergent Adaptive Production System (DAPS) 将生成式设计软件、增材制造、自动化装配和认证工作流结合起来，服务复杂车辆与防务部件。
  customerFocus: 需要更快完成认证硬件生产的防务主承包商、航空航天项目、汽车 OEM 和先进制造买家。
  businessModel: 资本密集型制造平台，覆盖工程项目、部件生产、合作伙伴项目，以及战略性防务 / 航空航天合同。
  stage: Series E private unicorn
  fundingStatus: 2025 年 9 月宣布 $290M Series E 轮融资，其中 $250M 为股权、$40M 为债务，据报道估值 $2.3B。
