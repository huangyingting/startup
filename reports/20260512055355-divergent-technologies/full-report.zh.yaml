        - 低
        - 请求提供估值第 2 项的源材料包和数据室备份
      - - 估值「最终尽调请求表」第 3 项
        - 需要私有证据
        - 支持尽调方向，但不足以单独支撑最终投资判断
        - 中
        - 请求提供估值第 3 项的源材料包和数据室备份
      - - 估值「最终尽调请求表」第 4 项
        - 公开证据支持
        - 需管理层或客户证据确认
        - 低
        - 请求提供估值第 4 项的源材料包和数据室备份
    notes: 各行汇总估值章节留存的公开证据；如缺少私有指标，则仍列为明确尽调事项。
