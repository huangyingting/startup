              - CR040
      - number: '7.6'
        title: Partner, Dependency, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Halcyon's operational model relies on several external dependencies that create concentration risk. The
              company's endpoint agent is deployed on Microsoft Windows systems and integrates with third-party EDR
              platforms including CrowdStrike Falcon, Microsoft Defender, and SentinelOne — making Halcyon functionally
              dependent on these vendors' kernel-level APIs and operating system interfaces. Changes to Windows kernel
              security policies, such as Microsoft's post-CrowdStrike-outage consideration of restricting kernel-level
              access for third-party security vendors, could fundamentally disrupt Halcyon's deployment architecture.
              The company's cloud infrastructure dependencies are not publicly disclosed, but as a SaaS platform
              delivering real-time ransomware intelligence, Halcyon presumably relies on hyperscale cloud providers
              (AWS, Azure, or GCP) for backend processing and threat intelligence delivery. Cloud provider outages or
              pricing changes could impact service availability and margins. Channel dependency is increasing: the
              October 2025 Climb Channel Solutions distribution agreement extends Halcyon's reach to thousands of North
              American resellers but creates single-distributor concentration risk for the SMB and mid-market segments.
              If the Climb relationship deteriorates or Climb's business faces challenges, Halcyon's channel-sourced
              pipeline would be materially impacted. International expansion through Dell and Cisco partnerships for the
              Japanese market creates partner dependency in a strategically important geography. Revenue concentration
              risk is entirely opaque: Halcyon does not disclose top-customer revenue percentages, and if a small number
              of large enterprise accounts generate a disproportionate share of revenue, standard top-10-customer
              concentration risk applies. The incident response partner program, which includes Booz Allen Hamilton,
              creates referral dependency for post-breach customer acquisition.
            claimRefs:
              - CR026
              - CR033
              - CR037
              - CR041
              - CR042
              - CR043
              - CR044
