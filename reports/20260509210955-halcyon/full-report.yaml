            title: Cloud Infrastructure Dependency Is Inferred
            body: >-
              Halcyon does not disclose its hosting provider or cloud architecture. The assumption that Halcyon relies
              on hyperscale cloud providers for backend processing and threat intelligence delivery is based on standard
              SaaS architecture patterns and is unverified.
            calloutType: assumption
