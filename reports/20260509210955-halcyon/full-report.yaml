      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Regulatory stack creates non-discretionary ransomware protection spending
            body: |
              SEC four-day disclosure rules, CISA ransomware guidance, HIPAA breach notification, and PCI-DSS
              requirements collectively create a multi-jurisdiction compliance floor for ransomware protection
              spending. This regulatory overlay makes anti-ransomware investment non-discretionary for public
              companies, healthcare organizations, and critical infrastructure operators, insulating core demand
              from budget cycles and economic downturns.
            calloutType: strength
            claimRefs:
              - CM018
              - CM019
              - CM020
              - CM021
          - type: callout
            title: Platform consolidation compresses standalone anti-ransomware TAM
            body: |
              CrowdStrike, Microsoft, Palo Alto Networks, and SentinelOne are aggressively bundling ransomware
              detection features into their EDR/XDR platforms. As these incumbents add ransomware-specific
              capabilities — including behavioral analysis, rollback, and key interception — the willingness of
              CISOs to pay for a separate anti-ransomware layer diminishes. Halcyon must demonstrate measurable
              detection superiority over bundled alternatives to sustain pricing power and prevent TAM compression.
            calloutType: risk
            claimRefs:
              - CM030
              - CM031
              - CM032
          - type: callout
            title: Cyber insurance market functions as indirect demand accelerator
            body: |
              The $16.3–26.25 billion cyber insurance market is tightening underwriting standards, increasingly
              requiring policyholders to demonstrate dedicated ransomware controls beyond baseline EDR. Insurers
              are mandating specific technical controls — endpoint isolation, immutable backups, ransomware-specific
              detection — as conditions of coverage. This creates an institutional demand channel for anti-ransomware
              tools that is independent of enterprise risk perception, driven instead by insurance carrier
              requirements and premium economics.
            calloutType: insight
            claimRefs:
              - CM017
              - CM026
              - CM029
          - type: callout
            title: SOM estimate lacks validated bottom-up enterprise count
            body: |
              The $500 million SOM estimate assumes approximately 5,000 target enterprises at $100K average ACV.
              Neither the enterprise count nor the ACV assumption has been validated with Halcyon's sales data.
              Actual SOM may be materially different depending on average deal size, win rates against EDR-bundled
              alternatives, and geographic market penetration beyond North America.
            calloutType: assumption
            claimRefs:
              - CM010
              - CM033
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Halcyon occupies a narrow but defensible niche within the broader endpoint security market:
              purpose-built anti-ransomware defense. Unlike general-purpose EDR/XDR vendors that treat ransomware
              as one threat category among many, Halcyon's entire platform — including key-capture decryption,
              Kernel Guard Protection, and Data Exfiltration Protection — is architected exclusively to prevent,
              detect, and recover from ransomware attacks. The 2025 Gartner Magic Quadrant for Endpoint Protection
              Platforms identified five Leaders — Microsoft, CrowdStrike, SentinelOne, Palo Alto Networks, and
              Sophos — all of whom include ransomware modules within their broader EDR/XDR platforms. Halcyon
              does not appear in the Magic Quadrant because it positions itself as a complementary layer deployed
              alongside existing EDR, not a replacement. This complement-versus-replace positioning is both
              Halcyon's primary differentiation and its central competitive risk: if incumbent EDR vendors close
              the ransomware detection gap, the willingness of CISOs to pay for a separate anti-ransomware layer
              diminishes. As of 2025, the endpoint security market is valued at $16.25 billion and growing at
              7–12% CAGR, with ransomware-specific spending representing an incremental budget layer beyond
              baseline EDR.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
          - type: figure
            figureRef: FP001
            claimRefs:
              - CP001
              - CP007
              - CP018
