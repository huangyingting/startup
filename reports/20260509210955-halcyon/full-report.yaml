  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Halcyon is a cybersecurity company headquartered in Austin, Texas, at 5900 Balcones Drive, Suite 5464,
              Austin, TX 78731. Founded in 2021, the company is singularly focused on defeating ransomware through a
              purpose-built anti-ransomware platform. Unlike traditional endpoint detection and response (EDR) vendors
              that treat ransomware as one of many threat types, Halcyon's entire technology stack is architected
              specifically to prevent, detect, and recover from ransomware attacks. The company's stated mission is to
              "make ransomware history" by eliminating it as a viable business model for cybercriminals. Halcyon
              operates as a private company and has grown rapidly from stealth to unicorn status in approximately three
              years. The company's development workforce is primarily remote, though it maintains its corporate
              headquarters in Austin. Halcyon competes in the endpoint security and cyber resilience market,
              differentiating through its ransomware-specific focus and proprietary key-capture decryption capabilities.
