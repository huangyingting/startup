      - number: '3.3'
        title: Adjacent and Emerging Competitors
        blocks:
          - type: paragraph
            body: |
              Beyond direct EDR/XDR competitors, Halcyon faces competitive pressure from adjacent categories.
              Rubrik operates in the data security and ransomware recovery space, reporting $886.5 million in
              FY2025 revenue (up 41% year-over-year) and $1.09 billion in subscription ARR following its April
              2024 IPO. Rubrik's approach to ransomware focuses on data protection, immutable backups, and
              cyber recovery rather than endpoint-level prevention, making it complementary to Halcyon's
              detection-and-decryption approach but competitive for ransomware-specific budget dollars. Zscaler
              applies a zero trust architecture to ransomware prevention, generating $2.67 billion in FY2025
              revenue with over $3 billion in ARR and a market cap of approximately $42–44 billion. Zscaler's
              ThreatLabz 2025 Ransomware Report documented a 146% year-over-year surge in ransomware attacks,
              reinforcing market demand. Cybereason, historically an EDR competitor with an operation-centric
              approach, raised $120 million in March 2025 led by SoftBank but was acquired by LevelBlue in
              October 2025 as part of LevelBlue's consolidation of managed security services alongside its
              earlier Trustwave acquisition. Cybereason's absorption into LevelBlue effectively removes it
              as an independent competitive threat but illustrates the broader trend of EDR vendor consolidation
              that reshapes Halcyon's competitive landscape.
            claimRefs:
              - CP018
              - CP019
