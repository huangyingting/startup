      - number: '2.3'
        title: Buyer Segmentation and Adoption Patterns
        blocks:
          - type: paragraph
            body: |
              The primary buyer for anti-ransomware solutions is the Chief Information Security Officer (CISO) or
              VP of Security Operations, typically within enterprises exceeding $500 million in revenue. Budget
              ownership sits within the information security line item, which now averages 13.2% of total IT
              spending — up from 8.6% in 2020 — reflecting the sustained shift of enterprise IT budgets toward
              security. KPMG's 2025 cybersecurity survey found 99% of CISOs expect to increase security spending,
              with ransomware defense cited as a top-three priority.

              Enterprise verticals with the highest ransomware exposure drive adoption: financial services,
              healthcare, manufacturing, and critical infrastructure. Healthcare organizations face HIPAA breach
              notification requirements and patient safety risks from encrypted medical systems. Financial
              institutions face regulatory scrutiny from OCC, FFIEC, and SEC disclosure obligations. Manufacturing
              and industrial firms are targeted for operational disruption, with average downtime costs exceeding
              the $5.08 million mean ransomware incident cost. Government and public sector entities face CISA
              compliance requirements and are frequent targets of state-sponsored ransomware groups.

              The user persona differs from the buyer: while CISOs approve budgets, security operations center
              (SOC) analysts and incident response teams are the daily operators of anti-ransomware tools. The
              payer is typically the enterprise IT budget, though cyber insurance carriers increasingly require
              proof of ransomware-specific controls as a condition of coverage, making insurers indirect payers
              who subsidize adoption through premium discounts. The cyber insurance market ($16.3–26.25 billion
              in 2025) thus functions as an adoption accelerator for dedicated anti-ransomware tooling.
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM015
