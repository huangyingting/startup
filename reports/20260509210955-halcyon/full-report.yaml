      - number: '5.2'
        title: Architecture and Technical Implementation
        blocks:
          - type: paragraph
            body: >
              Halcyon's architecture employs a multi-layered defense model where each layer targets a different stage of
              the ransomware attack chain. The pre-execution layer uses AI and purpose-built machine learning
              micro-models trained exclusively on real-world ransomware tactics, techniques, and procedures (TTPs) to
              block known and emerging strains before they execute. The exploitation mitigation layer employs deception
              techniques including geo-fencing, sandbox spoofing, and credential mirages to make endpoints appear as
              unattractive targets. The behavioral detection layer monitors for suspicious activities such as privilege
              escalation, lateral movement, and process injection using ransomware-focused models. The resilience and
              recovery layer autonomously halts active attacks, isolates impacted endpoints, and recovers affected files
              using captured encryption key material. Kernel Guard Protection, introduced in 2025, addresses Bring Your
              Own Vulnerable Driver (BYOVD) attacks by detecting and blocking malicious usage of known vulnerable signed
              drivers that attackers exploit to disable security controls. EDR Last Gasp detects when ransomware
              attempts to terminate third-party security solutions including CrowdStrike Falcon, SentinelOne
              Singularity, Microsoft Defender for Endpoint, and Palo Alto Cortex XDR. Data Exfiltration Protection (DXP)
              2.0 monitors for excessive data transfer volume or suspicious destinations, addressing double-extortion
              tactics by automatically engaging the RDR team when preset thresholds are crossed. The platform's AI/ML
              engine is trained only on ransomware, not general malware, which the company claims increases accuracy and
              reduces false positives compared to general-purpose tools.
            claimRefs:
