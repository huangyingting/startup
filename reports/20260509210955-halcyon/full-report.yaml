      - number: '5.3'
        title: Deployment, Integrations, and Ecosystem
        blocks:
          - type: paragraph
            body: >
              Halcyon's platform is deployed through a lightweight endpoint agent compatible with automated software
              deployment tools, with minimal performance impact and built-in anti-tampering and health monitoring
              features. The agent streams security and threat telemetry to SIEM tools including Google SecOps, Microsoft
              Sentinel, Sumo Logic, Splunk, and Exabeam. Integration with EDR/XDR solutions (CrowdStrike, SentinelOne,
              Microsoft Defender, Cortex XDR) enables Halcyon to detect and block attacks that bypass these tools while
              monitoring for EDR tampering attempts. The platform provides a documented REST API accessible at
              api.halcyon.ai and api.eu.halcyon.ai for custom integration, automation, and orchestration with SOAR
              platforms, ticketing systems, identity providers, and custom dashboards. Enterprise Policy Management
              enables organizations and MSSPs to apply Detection, Protection, or Lock Down policies to designated asset
              groups through Policy Groups for scalable security management. The Sophos partnership established in 2025
              provides mutual anti-tamper protection and threat intelligence sharing. Halcyon's deployment typically
              begins in monitor mode to baseline and tune policies before transitioning to active blocking. The company
              has also partnered with Dell for distribution and technology integration, as reflected in technical
              datasheets available through Dell's partner portal.
            claimRefs:
              - CE018
              - CE019
