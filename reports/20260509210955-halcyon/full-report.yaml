      - number: '2.2'
        title: Market Size and Growth Trajectory
        blocks:
          - type: paragraph
            body: |
              Multiple analyst firms size the ransomware protection market with overlapping but divergent
              methodologies. Research and Markets estimates the global ransomware protection market at $28.5 billion
              in 2025, growing to $33.4 billion in 2026 at a 17.2% CAGR. The Business Research Company projects
              a similar trajectory from $32.8 billion in 2025. Mordor Intelligence forecasts the market reaching
              $33.15 billion by 2030 with a CAGR exceeding 15%. Fortune Business Insights sizes the adjacent
              endpoint security market at $16.25 billion in 2025, growing at 7–12% CAGR, representing the baseline
              EPP/EDR spend atop which anti-ransomware tools layer.

              Grand View Research estimates the global ransomware protection market will grow at a 17.5% CAGR
              through 2030, driven by endpoint protection demand which accounted for 33.15% of market share in
              2024. The anti-ransomware solutions segment specifically — a narrower cut than the full protection
              market — is estimated at $22.15 billion in 2025, projected to reach $38.92 billion by 2032 at a
              10.8% CAGR according to Market Growth Reports.

              Gartner's information security spending forecast provides the broadest frame: $213 billion in 2025,
              rising to $240 billion in 2026 (12.5% growth), with security software — the segment containing
              endpoint protection — as the fastest-growing category at $105.9 billion in 2025. These figures
              establish the macroeconomic ceiling for Halcyon's market opportunity. Total ransomware damages of
              $57 billion globally in 2025, projected to reach $74 billion in 2026, quantify the economic loss
              that ransomware protection spending aims to reduce.
            claimRefs:
