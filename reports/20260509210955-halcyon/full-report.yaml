  - id: FE001
    title: Product architecture map
    type: stack
    summary: Halcyon's multi-layered anti-ransomware defense architecture from endpoint to cloud management.
    data:
      layers:
        - id: cloud-management
          label: Cloud Management & API
          detail: Centralized console, REST API (api.halcyon.ai), policy management, telemetry aggregation
        - id: managed-services
          label: Managed Services (RDR/RISE)
          detail: 24/7 ransomware detection and recovery, RISE team, forensic analysis
        - id: integration
          label: Integration Layer
          detail: SIEM streaming (Splunk, Sentinel, SecOps), EDR augmentation, SOAR orchestration
        - id: data-protection
          label: Data Protection
          detail: DXP 2.0 exfiltration monitoring, key capture and decryption recovery
        - id: detection-response
          label: Detection & Response
          detail: Behavioral detection engine, EDR Last Gasp, automated isolation
        - id: prevention
          label: Prevention Layer
          detail: Pre-execution AI/ML micro-models, deception (geo-fencing, sandbox spoofing, credential mirages)
        - id: kernel-protection
          label: Kernel & Driver Protection
          detail: Kernel Guard (BYOVD defense), anti-tamper, agent self-protection
        - id: endpoint-agent
          label: Endpoint Agent
          detail: Lightweight agent for Windows (10/11, Server 2012-2022) and Linux (RHEL, Ubuntu, AWS Linux, SUSE)
    claimRefs:
      - CE008
      - CE009
      - CE016
      - CE018
      - CE020
  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    summary: End-to-end workflow showing how Halcyon protects an enterprise from ransomware attack through recovery.
    data:
      nodes:
        - id: deploy
          label: Deploy Agent
          detail: Install lightweight endpoint agent via automated deployment tools
        - id: monitor-mode
          label: Monitor Mode
          detail: Baseline environment; tune detection policies before active blocking
        - id: active-protection
          label: Active Protection
          detail: Enable Detection/Protection/Lock Down policies per asset group
        - id: pre-execution
          label: Pre-Execution Scan
          detail: AI/ML models classify incoming executables for ransomware indicators
        - id: behavioral-detect
          label: Behavioral Detection
          detail: Monitor runtime behavior for privilege escalation, lateral movement, encryption
        - id: deception
          label: Deception Layer
          detail: Geo-fencing, sandbox spoofing, credential mirages confuse ransomware
        - id: key-capture
          label: Key Capture
          detail: Intercept encryption keys during active ransomware attack
        - id: auto-isolate
          label: Auto-Isolate
          detail: Halt attack, isolate impacted endpoints
        - id: rdr-alert
          label: RDR/RISE Alert
          detail: 24/7 managed team notified for investigation and response
        - id: decrypt-recover
          label: Decrypt & Recover
          detail: Use captured keys to decrypt files; restore to pre-attack state
        - id: siem-stream
          label: SIEM Telemetry
          detail: Stream alerts and events to Splunk, Sentinel, SecOps, Exabeam
        - id: forensics
          label: Forensic Analysis
          detail: Root cause investigation, compliance reporting
      edges:
        - from: deploy
          to: monitor-mode
          label: initial setup
        - from: monitor-mode
          to: active-protection
          label: policy tuning complete
        - from: active-protection
          to: pre-execution
          label: threat arrives
        - from: pre-execution
          to: behavioral-detect
          label: passes pre-exec
        - from: behavioral-detect
          to: deception
          label: suspicious behavior
        - from: behavioral-detect
          to: key-capture
          label: encryption detected
        - from: key-capture
          to: auto-isolate
          label: keys captured
        - from: auto-isolate
          to: rdr-alert
          label: escalate
        - from: rdr-alert
          to: decrypt-recover
          label: RISE responds
        - from: decrypt-recover
          to: forensics
          label: post-incident
        - from: active-protection
          to: siem-stream
          label: continuous telemetry
    claimRefs:
      - CE002
      - CE003
      - CE006
      - CE019
      - CE024
