      - number: '5.4'
        title: Trust, Security, and Quality Controls
        blocks:
          - type: paragraph
            body: >
              Halcyon maintains infrastructure, organizational, and product security measures including encryption for
              data in transit and at rest, restricted access controls, account authentication, continuous penetration
              testing, disaster recovery plans, and data retention and deletion policies. The company follows standard
              SaaS security practices though specific certifications such as SOC 2 Type II for Halcyon.ai (the
              anti-ransomware company, distinct from the unrelated Halcyon Financial Technology entity) have not been
