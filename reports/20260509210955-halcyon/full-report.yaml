      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              CrowdStrike Falcon is the dominant EDR/XDR platform with $3.95 billion in fiscal year 2025
              revenue, $4.24 billion in ARR, and a market capitalization of approximately $119 billion. Its
              Falcon platform provides cloud-native endpoint protection with Charlotte AI and maintains a 97%
              gross retention rate. CrowdStrike has been named a Leader in the Gartner Magic Quadrant for
              Endpoint Protection Platforms for six consecutive years. SentinelOne Singularity generated $821.5
              million in FY2025 revenue with $920 million in ARR, growing 32% year-over-year. SentinelOne
              differentiates through autonomous detection and response with ransomware rollback capabilities,
              and has been a Gartner MQ Leader for five consecutive years. Its market cap stands at approximately
              $5.6 billion. Palo Alto Networks' Cortex XDR platform is part of a broader security portfolio
              that generated $9.22 billion in FY2025 revenue, with Next-Generation Security ARR of $5.6 billion.
              Its market cap exceeds $139 billion. Microsoft Defender for Endpoint holds 28.6% market share in
              modern endpoint security according to IDC, ranking number one for three consecutive years.
              Defender's integration with Windows and M365 creates an unmatched distribution advantage, making
              it the default endpoint protection for many enterprises. Sophos, a Gartner MQ Leader for 16
              consecutive years, was taken private by Thoma Bravo in 2020 for $3.9 billion and acquired
              Secureworks for $859 million in early 2025, expanding its MDR customer base to over 28,000
              accounts. Notably, Sophos partnered with Halcyon in August 2025 for mutual anti-tamper protection
              and intelligence sharing, suggesting a complementary rather than purely competitive relationship.
