      - number: '8.3'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: |
              The bull scenario assumes Halcyon achieves $200M ARR by end of FY2027, successfully expands from
              anti-ransomware into adjacent data extortion prevention and incident response automation, maintains
              net retention above 125%, and files for IPO in late 2026 or 2027 at a 12–15x forward revenue
              multiple. Under these assumptions, the fully-diluted IPO valuation reaches $2.5–3.5B, implying a
              2.5–3.5x return from the $1B post-money — an attractive outcome for a Series C entry.

              The base scenario models $140M ARR by FY2027, net retention declining to 110–115% as initial
              enterprise cohorts mature, gross margin stabilizing around 72–75%, and either an IPO at 8–10x or
              a strategic acquisition at 10x forward revenue yielding a $1.4–1.6B valuation. Under this scenario,
              Series C investors realize a modest 1.4–1.6x return — acceptable but below typical venture targets.

              The bear scenario involves CrowdStrike or Palo Alto Networks successfully bundling competitive
              anti-ransomware capabilities into existing platform licenses at no additional cost, compressing
              Halcyon's average selling price or triggering a wave of non-renewals. In this scenario, ARR growth
              stalls at $90M, net retention drops below 100%, and a distressed acquisition occurs at $400–600M.
              Probability weights: bull 30%, base 45%, bear 25%.
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
      - number: '8.4'
        title: Thesis-Break Triggers and Diligence Priorities
        blocks:
          - type: paragraph
            body: |
              The investment thesis for Halcyon at $1B breaks if any of the following occur: (1) CrowdStrike or
              SentinelOne launches a purpose-built anti-ransomware module with key-capture and autonomous recovery
              parity, eliminating Halcyon's core differentiation; (2) quarterly NRR drops below 100%, signaling
              customer churn exceeds expansion; (3) Halcyon discloses a material ransomware breach affecting a
              customer — destroying the zero-loss track record that anchors enterprise sales; (4) revenue growth
              decelerates below 40% YoY, compressing the implied multiple below private market median levels.

              Final diligence priorities before committing to a co-investment include: (a) audited ARR and
              quarterly revenue schedule from the CFO, confirming the $79.5M third-party estimate; (b) cohort-level
              NRR data showing retention durability beyond 12 months; (c) competitive win/loss data against
              CrowdStrike Falcon and SentinelOne Singularity in ransomware-specific evaluations; (d) Ransomware
              Warranty claim history and actuarial reserves; (e) customer concentration analysis — whether top-10
              accounts represent more than 40% of ARR; (f) product roadmap for expansion beyond anti-ransomware
              into adjacent categories.

              The diligence conclusion is conditional support: the anti-ransomware category is real, Halcyon's
              technology is differentiated, and the zero-loss record is compelling. At $1B, the valuation is
              reasonable if growth sustains, but financial transparency is insufficient for a high-conviction
              commitment. Track and reassess at the next funding event or upon receipt of audited financials.
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
          - type: table
            tableRef: TV005
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
          - type: table
            tableRef: TV006
            claimRefs:
              - CV020
              - CV024
              - CV025
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV021
              - CV022
              - CV023
      - number: '8.5'
        title: Recommendation and Risk Rating
        blocks:
          - type: paragraph
            body: |
              Investment recommendation: Track with medium confidence. Halcyon's anti-ransomware category
              leadership is compelling, the $1B valuation implies a 12.6x revenue multiple that is within
              defensible range for a high-growth cybersecurity pure-play, and the zero-customer-loss track record
              is a powerful differentiator. However, the recommendation stops short of Buy due to three factors:
              (1) revenue figures are unaudited third-party estimates with no GAAP disclosure; (2) the point-solution
              vs platform risk is structurally unresolved; (3) the competitive moat against CrowdStrike and Palo
              Alto bundling has not been durably tested over multiple enterprise renewal cycles.

              Risk rating: Medium-High. The combination of point-solution positioning risk, limited financial
              transparency, competitive bundling pressure from well-capitalized incumbents, and dependence on
              sustained ransomware threat intensity creates a risk profile that requires continuous monitoring.
              The mitigating factors — strong investor syndicate, zero-loss customer track record, and favorable
              market tailwinds — prevent the risk rating from reaching High.

              Valuation stance: Fairly valued at $1B. The 12.6x implied multiple is within the range of
              defensible cybersecurity growth multiples (sector median 7.8x, high-growth tier 13–15x). The
              valuation does not require heroic assumptions — $140M ARR at 10x generates a return at base case.
              The primary upside catalyst would be confirmation of audited revenue growth above 60% YoY and
              successful product expansion beyond anti-ransomware into data extortion prevention.
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Investment Recommendation: Track with Medium Confidence'
            body: >-
              Track / Conditional Buy — Halcyon's anti-ransomware category leadership is compelling, the $1B valuation
              implies a moderate 12.6x revenue multiple, and the zero-customer-loss track record is a powerful
              differentiator. However, unaudited financials, point-solution risk, and unproven NRR durability prevent a
              high-conviction Buy recommendation. Upgrade to Buy upon receipt of audited ARR confirming >60% YoY growth
              and NRR above 120%.
            calloutType: recommendation
            claimRefs:
              - CV021
              - CV024
              - CV025
          - type: callout
            title: Platform Bundling is the Primary Structural Risk
            body: >-
              CrowdStrike, SentinelOne, and Palo Alto Networks all include ransomware protection within their platform
              licenses. If any of these vendors achieves feature parity with Halcyon's autonomous key-capture recovery,
              the point-solution premium that supports the 12.6x multiple could compress rapidly to the private market
              median of 2.6–3.2x, implying a $200–250M valuation.
            calloutType: risk
            claimRefs:
              - CV004
              - CV016
              - CV017
          - type: callout
            title: Zero-Loss Track Record is a Unique and Defensible Moat
            body: >-
              Halcyon's claim that zero customers have experienced significant ransomware disruptions, data
              exfiltration, or ransom payments is an extraordinary competitive claim. If validated through independent
              customer reference checks, this track record represents a quantifiable risk-transfer value proposition
              that platform vendors cannot replicate through bundling alone — it requires Halcyon's proprietary
              key-capture and autonomous recovery technology.
            calloutType: insight
            claimRefs:
              - CV002
              - CV003
          - type: callout
            title: Revenue Estimate Must Be Confirmed Before Upgrading Recommendation
            body: >-
              This analysis relies on a third-party revenue estimate of ~$79.5M for 2025. If actual audited revenue is
              materially lower (below $50M), the implied multiple exceeds 20x and the valuation stance would shift from
              Fairly Valued to Premium, requiring a downgrade to Avoid at the $1B entry.
            calloutType: assumption
            claimRefs:
              - CV001
              - CV020
