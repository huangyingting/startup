companyProfile:
  summary: >-
    Halcyon is an Austin, Texas-based cybersecurity company founded in 2021 that has built a purpose-built
    anti-ransomware platform designed to detect, prevent, and recover from ransomware attacks. The company
    differentiates through its proprietary key-capture technology that automatically captures encryption keys during
    ransomware attacks, enabling decryption without paying ransoms. Led by cybersecurity veterans Jon Miller (CEO) and
    Ryan Smith (CTO), who previously held leadership roles at Cylance, Boldend, and Accuvant, Halcyon achieved unicorn
    status with a $1B valuation after raising $190M across four funding rounds. The company serves enterprise and
    mid-market customers across Fortune 500 and public sector organizations, with an estimated ~$79.5M in annual revenue
    and approximately 506 employees as of early 2026.
