        - 'Ransomware protection market growing at 17% CAGR to $117.5B by 2034; ransomware is the #1 CISO concern'
        - Anti-ransomware may be absorbed into endpoint/XDR platform features; standalone category could contract
        - High
      - - Product
        - Proprietary key-capture and autonomous recovery; zero-loss customer record; Ransomware Warranty
        - Point-solution architecture; CrowdStrike/SentinelOne can replicate features within platform bundles
        - High
      - - Customers
        - Enterprise adoption growing; zero ransom payments, zero data exfiltration across all customers
        - Customer concentration and NRR data not publicly disclosed; retention durability unproven beyond early cohorts
        - Medium
      - - Financials
        - ~$79.5M estimated revenue with strong growth trajectory from $90M total raised prior to Series C
        - Revenue is a third-party estimate, not audited; profitability and burn rate unknown
        - High
      - - Competition
        - Only pure-play anti-ransomware vendor; differentiated technology vs generic endpoint protection
        - CrowdStrike ($85B+), Palo Alto ($120B+), SentinelOne ($15B) have massive R&D budgets for ransomware features
        - High
      - - Valuation
        - 12.6x revenue multiple is moderate vs CrowdStrike (18.6x) and Wiz (24x); reasonable for growth stage
        - Multiple exceeds private market median (2.6–3.2x); requires sustained 60%+ growth to justify premium
        - Medium
