  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Category Definition
        blocks:
          - type: paragraph
            body: |
              The ransomware protection market encompasses all products and services designed to prevent, detect,
              contain, and recover from ransomware attacks across endpoints, networks, email gateways, and cloud
              workloads. This includes endpoint protection platforms (EPP), endpoint detection and response (EDR),
              anti-ransomware-specific tools, backup and recovery solutions, and managed detection and response (MDR)
              services. The broader cybersecurity spending envelope — projected at $212 billion in 2025 by Gartner,
              growing 15.1% year-over-year — provides the total addressable ceiling from which ransomware-specific
              budgets are drawn.

              Halcyon's addressable segment is narrower: purpose-built anti-ransomware platforms that sit alongside
              or on top of existing EPP/EDR stacks to provide ransomware-specific detection, key capture, and
              automated recovery. This positioning excludes general-purpose endpoint security (a $16.25–22.8 billion
              market) and broader network security, focusing instead on the incremental spend enterprises allocate
              specifically for ransomware resilience beyond their baseline endpoint protection. Adjacent categories
              include cyber insurance ($16.3–26.25 billion in 2025), which creates indirect demand by requiring
              policyholders to demonstrate anti-ransomware controls, and security operations (SIEM/SOAR), which
              integrates ransomware detection signals.

              The status-quo substitute for dedicated anti-ransomware tooling is reliance on existing EDR/XDR
              platforms from CrowdStrike, SentinelOne, Microsoft Defender, or Palo Alto Cortex XDR. These platforms
              include ransomware detection modules but are not purpose-built for ransomware-specific attack chains
              such as kernel-level encryption, BYOVD (bring your own vulnerable driver) exploitation, or data
              exfiltration prior to encryption. Halcyon's value proposition is that general-purpose EDR misses
              ransomware variants specifically engineered to evade behavioral detection engines.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM014
