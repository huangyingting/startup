      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Halcyon operates in an increasingly regulated cybersecurity landscape with material compliance obligations
              across multiple jurisdictions. The SEC's cybersecurity disclosure rules, effective December 2023, require
              public companies to disclose material cybersecurity incidents within four business days and to describe
              their cybersecurity risk management processes in annual reports — including risks originating from
              third-party vendors. As Halcyon's customers are predominantly enterprise organizations subject to these
              SEC rules, Halcyon faces contractual flow-down requirements for timely incident notification and security
              documentation. The EU NIS2 Directive, which Member States were required to transpose by October 2024,
              extends mandatory cybersecurity risk management and incident reporting obligations to essential and
              important entities across critical infrastructure sectors, with penalties up to €10 million or 2% of
              global annual turnover for non-compliance. NIS2 explicitly requires supply chain security assessments,
              meaning Halcyon's European expansion will require demonstrating compliance with EU-specific cybersecurity
              standards. The FTC has heightened enforcement against cybersecurity vendors through actions under Section
              5 of the FTC Act and the expanded Safeguards Rule, requiring comprehensive information security programs,
              multi-factor authentication, encryption, and service provider oversight. The 2024 Marriott consent order
              established specific benchmarks for what the FTC considers "reasonable" security practices, which now
              apply broadly to technology vendors. Separately, the rise of cyber insurer subrogation lawsuits represents
              an emerging legal risk: in 2025, Ace American Insurance sued cybersecurity vendors to recoup losses paid
              after a ransomware attack, alleging that vendor failures enabled the breach. Federal court data shows
              ransomware-related complaints rose over 600% between 2021 and 2023, with cybersecurity vendors
              increasingly named as defendants. For Halcyon specifically, the $5 million ransomware warranty creates
              contingent liability exposure if a customer experiences a ransomware incident that bypasses Halcyon's
              defenses. The warranty terms, claims history, and actuarial reserves are not publicly disclosed, making
              this liability impossible to assess externally. Additionally, Halcyon's endpoint agent operates at the
              kernel level of customer systems — a privileged access position that creates heightened liability exposure
              if a software update causes system instability, as demonstrated by the July 2024 CrowdStrike outage that
              affected 8.5 million Windows systems globally. Halcyon does not publicly disclose SOC 2 Type II
              certification status, GDPR Data Processing Agreements, or HIPAA Business Associate Agreement templates,
              creating a compliance documentation gap for regulated customers.
            claimRefs:
