            body: >
              Halcyon was co-founded by Jon Miller (CEO) and Ryan Smith (CTO), both veterans of the cybersecurity
              industry with deep offensive and defensive security expertise. Jon Miller previously served as Chief
              Research Officer at Cylance (now part of BlackBerry), co-founded Boldend (a next-generation defense
              contractor), and was an early employee at Accuvant (now Optiv), where he helped build one of the largest
              cybersecurity consultancies serving the Fortune 500. He also worked as a penetration tester with ISS
              X-Force (now IBM). Ryan Smith brings over 25 years of cybersecurity experience, having previously served
              as CTO at Boldend and Exodus Intelligence, Chief Scientist at Optiv and Accuvant LABS, and VP of Research
              at Cylance. He is recognized as an early industry expert on binary vulnerabilities and exploitation
              techniques. The leadership team also includes Aaron Mick as COO, Ryan Golden as Chief Brand Officer, Kevin
              Furgal as General Counsel, Kelly Fiedler as CMO, and Jeff Stclair as Chief Revenue Officer. Enrique Salem,
              Partner at Bain Capital Ventures and former CEO of Symantec, joined the board alongside Richard Seewald of
