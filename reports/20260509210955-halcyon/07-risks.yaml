callouts:
  - calloutType: risk
    title: "Platform Consolidation Is the Existential Threat"
    body: "CrowdStrike, Palo Alto Networks, and Microsoft are each bundling ransomware-specific capabilities into their EDR/XDR platforms at no additional cost, creating a 'feature vs. product' risk that threatens Halcyon's entire category. With enterprises consolidating from 83 tools to fewer than 10 core platforms, Halcyon must demonstrate differentiation that justifies a standalone procurement decision."
    claimRefs: [CR001, CR002, CR003, CR004]

  - calloutType: risk
    title: "Regulatory Compliance Posture Is Entirely Opaque"
    body: "Halcyon does not publicly disclose SOC 2, ISO 27001, or FedRAMP certification status, nor does it publish GDPR Data Processing Agreements or HIPAA BAA templates. As SEC cybersecurity disclosure rules, EU NIS2, and FTC enforcement tighten vendor obligations, this documentation gap may block enterprise and government sales."
    claimRefs: [CR008, CR009, CR010, CR017, CR018]

  - calloutType: risk
    title: "Key-Person Concentration in Co-Founders"
    body: "CEO Jon Miller and CTO Ryan Smith carry the company's technical vision, investor relationships, and industry credibility. Succession planning, management team depth, and key-person insurance status are undisclosed, creating binary risk if either founder departs."
    claimRefs: [CR027, CR028, CR029]

  - calloutType: risk
    title: "Ransomware Warranty Creates Uncapped Aggregate Liability"
    body: "Halcyon's $5 million per-customer ransomware warranty creates contingent financial exposure that scales with customer count. With 500+ customers, the theoretical maximum aggregate liability exceeds $2.5 billion. Claims history, actuarial reserves, and reinsurance arrangements are not disclosed."
    claimRefs: [CR036, CR037]

  - calloutType: recommendation
    title: "Priority Diligence: Request Compliance Certifications and Warranty Claims Data"
    body: "Investors should request SOC 2 Type II audit reports, ISO 27001 certification status, ransomware warranty claims history, key-person insurance details, and unit economics (burn rate, runway, NRR) before finalizing investment decisions. These are the highest-priority gaps for de-risking the thesis."
    claimRefs: [CR017, CR018, CR033, CR034, CR037]

  - calloutType: assumption
    title: "Cloud Infrastructure Dependency Is Inferred"
    body: "Halcyon does not disclose its hosting provider or cloud architecture. The assumption that Halcyon relies on hyperscale cloud providers for backend processing and threat intelligence delivery is based on standard SaaS architecture patterns and is unverified."
    claimRefs: [CR043]

