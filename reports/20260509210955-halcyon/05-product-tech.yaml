  evidenceGaps:
    - type: missing-source
      severity: material
      topic: performance benchmarks
      missingEvidence: >-
        Independent benchmark results comparing Halcyon's detection rates, false-positive rates, and recovery success
        rates against competing EDR and anti-ransomware solutions.
      whyItMatters: >-
        Without independent performance data, claims of superior ransomware detection and recovery remain unverified
        marketing assertions.
      diligencePath: Request internal benchmark results and customer case studies with quantified outcomes from Halcyon management.
      relatedQuestionRefs:
        - QE021
    - type: missing-source
      severity: material
      topic: SOC 2 certification
      missingEvidence: >-
        SOC 2 Type II attestation letter or public trust page specifically for Halcyon.ai (the anti-ransomware company,
        not Halcyon Financial Technology).
      whyItMatters: Enterprise buyers require compliance attestation; inability to verify SOC 2 status creates procurement friction.
      diligencePath: Request SOC 2 attestation directly from Halcyon; verify through auditor confirmation.
      relatedQuestionRefs:
        - QE010
    - type: private-evidence-only
      severity: material
      topic: RISE team SLA
      missingEvidence: >-
        Published SLA response times, escalation procedures, and staffing levels for the RISE team's 24/7 RDR managed
        service.
      whyItMatters: >-
        Managed service quality is a key differentiator; undocumented SLAs make it impossible to evaluate service
        reliability.
      diligencePath: Request RDR service agreement and SLA documentation from Halcyon sales team.
      relatedQuestionRefs:
        - QE026
    - type: missing-source
      severity: minor
      topic: macOS support
      missingEvidence: Official statement on macOS endpoint support plans or timeline.
      whyItMatters: Enterprises with mixed OS environments need cross-platform coverage; macOS gap limits addressable market.
      diligencePath: Ask Halcyon product team about macOS roadmap during diligence meetings.
      relatedQuestionRefs:
        - QE023
    - type: private-evidence-only
      severity: material
      topic: key capture success rate
      missingEvidence: Data on key-capture success rates across different ransomware families and attack scenarios.
      whyItMatters: >-
        Key capture is Halcyon's core differentiator; without success rate data, its reliability as a recovery mechanism
        is unquantified.
      diligencePath: Request internal key-capture success metrics and case studies from Halcyon engineering leadership.
      relatedQuestionRefs:
        - QE003
    - type: missing-source
      severity: minor
      topic: ML retraining cadence
      missingEvidence: Documentation of AI/ML model retraining frequency, data pipeline, and how new ransomware TTPs are incorporated.
      whyItMatters: Model drift risk increases if retraining cadence does not keep pace with evolving ransomware tactics.
      diligencePath: Request ML operations documentation and retraining schedule from Halcyon CTO.
      relatedQuestionRefs:
        - QE027
    - type: private-evidence-only
      severity: material
      topic: ransomware warranty terms
      missingEvidence: >-
        Full warranty terms, exclusions, claim procedures, and maximum coverage amounts for Halcyon's ransomware
        warranty.
      whyItMatters: >-
        Warranty is a key commercial differentiator; without visible terms, its value as a procurement factor is
        uncertain.
      diligencePath: Request warranty agreement template from Halcyon legal or sales team during diligence.
      relatedQuestionRefs:
        - QE011
    - type: missing-source
      severity: minor
      topic: Linux agent maturity
      missingEvidence: >-
        Comparative feature matrix showing Linux vs. Windows agent capabilities, supported distributions, and feature
        parity status.
      whyItMatters: >-
        Linux ransomware is a growing threat; understanding Linux agent maturity is critical for server-heavy
        environments.
      diligencePath: Request Linux agent feature parity documentation from Halcyon product team.
      relatedQuestionRefs:
        - QE022
    - type: private-evidence-only
      severity: minor
      topic: encryption standards
      missingEvidence: Specific cipher suites, key management practices, and encryption standards used for data in transit and at rest.
      whyItMatters: Enterprise security teams require specific encryption details for compliance and risk assessment.
      diligencePath: Request security architecture documentation specifying encryption standards from Halcyon security team.
      relatedQuestionRefs:
        - QE024
    - type: private-evidence-only
      severity: minor
      topic: Enterprise Policy Management details
      missingEvidence: >-
        Detailed documentation on policy granularity, RBAC capabilities, multi-tenancy support, and MSSP management
        features.
      whyItMatters: >-
        Policy management is key for enterprise and MSSP deployments; limited public documentation leaves operational
        questions unanswered.
      diligencePath: Request Enterprise Policy Management documentation and MSSP deployment guide from Halcyon.
      relatedQuestionRefs:
        - QE025
    - type: private-evidence-only
      severity: material
      topic: RISE team SLA response times
      missingEvidence: Documented SLA response time commitments, escalation tiers, and staffing guarantees for 24/7 RDR service.
      whyItMatters: Quantified SLA commitments are essential for enterprise procurement decisions and SLA-based service agreements.
      diligencePath: Request RDR SLA documentation and service agreement template from Halcyon.
      relatedQuestionRefs:
        - QE026
    - type: private-evidence-only
      severity: material
      topic: ML retraining pipeline
      missingEvidence: >-
        Details on AI/ML model retraining frequency, ransomware sample acquisition pipeline, and model update deployment
        process.
      whyItMatters: Ransomware TTPs evolve rapidly; model freshness directly affects detection efficacy.
      diligencePath: Request ML operations documentation from Halcyon CTO or engineering leadership.
      relatedQuestionRefs:
