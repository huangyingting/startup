  - id: deployment-and-integrations
    title: Deployment, Integrations, and Ecosystem
    body: >
      Halcyon's platform is deployed through a lightweight endpoint agent compatible with automated software deployment
      tools, with minimal performance impact and built-in anti-tampering and health monitoring features. The agent
      streams security and threat telemetry to SIEM tools including Google SecOps, Microsoft Sentinel, Sumo Logic,
      Splunk, and Exabeam. Integration with EDR/XDR solutions (CrowdStrike, SentinelOne, Microsoft Defender, Cortex XDR)
      enables Halcyon to detect and block attacks that bypass these tools while monitoring for EDR tampering attempts.
      The platform provides a documented REST API accessible at api.halcyon.ai and api.eu.halcyon.ai for custom
      integration, automation, and orchestration with SOAR platforms, ticketing systems, identity providers, and custom
      dashboards. Enterprise Policy Management enables organizations and MSSPs to apply Detection, Protection, or Lock
      Down policies to designated asset groups through Policy Groups for scalable security management. The Sophos
      partnership established in 2025 provides mutual anti-tamper protection and threat intelligence sharing. Halcyon's
      deployment typically begins in monitor mode to baseline and tune policies before transitioning to active blocking.
      The company has also partnered with Dell for distribution and technology integration, as reflected in technical
      datasheets available through Dell's partner portal.
    claimRefs:
      - CE018
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
      - CE024
      - CE025
  - id: trust-compliance-quality
    title: Trust, Security, and Quality Controls
    body: >
      Halcyon maintains infrastructure, organizational, and product security measures including encryption for data in
      transit and at rest, restricted access controls, account authentication, continuous penetration testing, disaster
      recovery plans, and data retention and deletion policies. The company follows standard SaaS security practices
      though specific certifications such as SOC 2 Type II for Halcyon.ai (the anti-ransomware company, distinct from
      the unrelated Halcyon Financial Technology entity) have not been independently verified through public
      documentation. Halcyon's ransomware warranty provides financial coverage of up to $5M or more if protection fails,
      functioning as a quality guarantee and supplement to traditional cyber insurance. The platform includes automated
      health monitoring and anti-tampering features to ensure agent integrity. The managed RDR service provides 24/7
      monitoring, investigation, response, and forensic analysis at no additional licensing cost, with the RISE team
      guaranteeing rapid investigation and guided recovery. The Omdia Technical Validation report from February 2026
      independently assessed Halcyon's anti-ransomware capabilities, providing third-party validation of the platform's
      technical claims.
    claimRefs:
      - CE026
      - CE027
      - CE028
      - CE029
      - CE030
      - CE031
      - CE032
    tableRefs:
      - TE004
  - id: roadmap-and-maturity
    title: Product Roadmap and Development Trajectory
    body: >
      Halcyon's product roadmap is driven by evolving ransomware tactics, with a pattern of releasing defensive features
      in direct response to emerging attack techniques. In January 2025, the company launched Kernel Guard Protection
      and enhanced DXP capabilities. Throughout 2025, Enterprise Policy Management with group-based policies was
      introduced for streamlined management across diverse enterprise environments. The RDR service was made standard in
      all deployments, providing 24/7 ransomware detection and recovery without additional cost. DXP 2.0 expanded
      coverage to both Windows and Linux environments. In 2026, the company showcased at RSAC Conference 2026 with
      enhanced AI-driven detection and the latest exfiltration prevention features. The roadmap also includes ongoing UX
      improvements such as streamlined data exports, easier protection mode management, webhook configuration
      enhancements, and better asset filtering. Linux support continues to expand, with the company adding distributions
      and addressing the growing threat of ransomware targeting Linux infrastructure. The channel-centric strategy
      leveraging partnerships with distributors including Climb and Dell supports MSSP-focused expansion, particularly
      in North America. While the product has matured rapidly since its 2022 launch, areas such as macOS support,
      independent performance benchmarks, and comprehensive public documentation of the API remain gaps.
