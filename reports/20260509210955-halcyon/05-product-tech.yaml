callouts:
  - calloutType: strength
    title: Unique Key-Capture Technology
    body: >-
      Halcyon's proprietary ability to intercept encryption keys during active ransomware attacks enables automated
      decryption recovery without paying ransoms — a capability no other endpoint security vendor has publicly
      demonstrated at scale.
    claimRefs:
      - CE010
      - CE004
  - calloutType: strength
    title: Ransomware-Specific AI/ML Architecture
    body: >-
      By training machine learning models exclusively on ransomware TTPs rather than general malware, Halcyon achieves
      higher specificity for ransomware detection, potentially reducing false positives that plague general-purpose EDR
      tools.
    claimRefs:
      - CE008
      - CE009
  - calloutType: risk
    title: Limited Independent Validation
    body: >-
      Despite strong marketing claims, Halcyon lacks published independent benchmark results, false-positive/negative
      rates, or comprehensive third-party security audits. The single Omdia Technical Validation (Feb 2026) is the only
      public independent assessment.
    claimRefs:
      - CE031
      - CE043
  - calloutType: risk
    title: Windows-Centric Platform Risk
    body: >-
      Halcyon's platform is primarily Windows-focused, with Linux support still expanding and no macOS support. As
      ransomware increasingly targets Linux infrastructure, the maturity gap in cross-platform coverage presents
      competitive and customer risk.
    claimRefs:
      - CE016
      - CE017
      - CE041
  - calloutType: assumption
    title: SOC 2 Certification Status
    body: >-
      SOC 2 Type II certification for Halcyon.ai could not be independently confirmed through public sources. Search
      results consistently reference an unrelated entity (Halcyon Financial Technology at halcyon.us). Enterprise buyers
      should request direct attestation.
    claimRefs:
      - CE026
