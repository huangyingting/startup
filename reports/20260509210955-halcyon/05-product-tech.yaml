  title: Product & Technology
  summary: >-
    Halcyon delivers a purpose-built anti-ransomware platform with proprietary key-capture technology, multi-layer
    behavioral detection, kernel-level driver protection, and data exfiltration prevention. The platform differentiates
    through ransomware-specific AI/ML models, automated decryption recovery, and a 24/7 managed Ransomware Detection and
    Recovery service backed by an industry-leading ransomware warranty.
sections:
  - id: product-definition
    title: Product Definition and Customer Value
    body: >
      Halcyon's Anti-Ransomware Platform is a purpose-built endpoint security solution designed exclusively to prevent,
      detect, and recover from ransomware attacks. Unlike traditional endpoint detection and response (EDR) products
      that treat ransomware as one threat vector among many, Halcyon's entire technology stack is architected for
      ransomware-specific defense. The platform is deployed as a lightweight endpoint agent on Windows (Windows 10/11,
      Server 2012–2022 including Core editions) and Linux (RHEL, Ubuntu, AWS Linux, SUSE) environments, operating
      alongside existing EDR, SIEM, and backup solutions without agent conflicts. Halcyon's core customer value
      proposition centers on three pillars: preventing ransomware execution through pre-execution AI detection and
      deception techniques; capturing encryption keys during active attacks to enable automated decryption without
      paying ransoms; and providing 24/7 managed ransomware detection and recovery (RDR) through the RISE (Rapid
      Incident Support and Engineering) team. The platform targets mid-market and enterprise organizations, including
      Fortune 500 companies and public sector entities, offering measurable ROI through reduced dwell time, minimized
      recovery costs, and compliance support. Halcyon supplements this with a ransomware warranty providing financial
      coverage if protection fails, positioning it as both a technical and financial risk mitigation tool.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
