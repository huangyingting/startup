slug: halcyon
runDate: '2026-05-09'
company:
  name: Halcyon
chapter:
  number: 4
  title: Financials
  summary: >-
    Halcyon operates a SaaS subscription model selling per-endpoint anti-ransomware licenses at $35–$75/endpoint/year,
    with third-party estimates placing 2025 revenue near $79.5M against a $1B valuation (~12.6x revenue multiple). As a
    private company, Halcyon discloses no ARR, gross margin, burn rate, or unit economics; diligence must gap-fill these
    metrics through management data-room access before underwriting.
sections:
  - id: revenue-streams-and-pricing
    title: Revenue Streams and Pricing Model
    body: >
      Halcyon generates revenue exclusively through annual SaaS subscription licenses for its anti-ransomware endpoint
      agent. The product is sold as a per-endpoint, per-year subscription and positioned as a complementary add-on to
      existing EDR/XDR platforms rather than a replacement. Published list pricing from a Texas DIR (Department of
      Information Resources) contract shows: Windows endpoints at $55/endpoint/year for 1–99 seats, dropping to
      $35/endpoint/year for 100+ seats; cloud workloads at $75/endpoint/year; Mac endpoints at $75/endpoint/year; and
      Linux endpoints at $50/endpoint/year. Halcyon also offers a managed Ransomware Detection and Recovery (RDR)
      service — bundled into every deployment as of early 2025 — which augments subscription revenue with a 24/7
      managed-detection overlay delivered by the Halcyon RISE team. The company does not publicly disclose its revenue
      mix between direct enterprise sales, channel partners (including Dell and Cisco partnerships in Japan), or managed
      service provider resellers. Enterprise contracts are typically multi-year, though realized pricing versus list
      pricing is unknown. No professional services, usage-based, or transactional revenue streams have been disclosed.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
    tableRefs:
      - TI001
      - TI002
  - id: gtm-and-sales-efficiency
    title: GTM Motion and Sales Efficiency
    body: >
      Halcyon employs a direct enterprise sales motion supported by channel partnerships. The company has announced
      strategic go-to-market partnerships with Dell and Cisco for the Japanese market and has a partnership with Sophos
      for mutual intelligence sharing and anti-tamper protection. Jeff Stclair serves as Chief Revenue Officer and Kelly
      Fiedler as CMO, indicating investment in both direct sales leadership and marketing. As of early 2026, the company
      has approximately 506 employees, though the split between engineering, sales, and G&A is not disclosed. Sales
      cycle length, average contract value (ACV), customer acquisition cost (CAC), and CAC payback period are all
      undisclosed. Using SaaS cybersecurity industry benchmarks as a proxy, enterprise security companies typically see
      CAC payback periods of 13–20 months and LTV:CAC ratios of 3–5x. However, these benchmarks may not reflect
      Halcyon's actual performance given its positioning as an add-on (lower ACV per deal) versus full-platform security
      vendors. Channel economics, including partner margins and co-sell arrangements, are also undisclosed.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
    figureRefs:
      - FI002
  - id: cost-structure-and-margins
    title: Cost Structure and Gross Margin Drivers
    body: >
      Halcyon does not disclose its cost structure, gross margin, or operating expenses. As a cloud-delivered SaaS
      endpoint agent, the company's cost of revenue likely includes cloud infrastructure hosting, the managed RDR
      service delivery (RISE team staffing), and customer support. Comparable public cybersecurity SaaS companies
      provide useful benchmarks: CrowdStrike reported 78% GAAP subscription gross margin (80% non-GAAP) in fiscal 2025
      on $3.76B subscription revenue, while SentinelOne reported 74% gross margin on $821.5M revenue in its fiscal 2025.
      Industry benchmarks for cybersecurity SaaS place typical subscription gross margins at 75–85%. Halcyon's managed
      RDR service component may compress gross margins below pure-software peers if the RISE team requires significant
      headcount. Operating expenses are likely dominated by R&D (platform and AI model development) and sales &
      marketing (direct enterprise sales force and channel partner programs). With approximately 506 employees and an
      estimated revenue of ~$79.5M, revenue per employee is approximately $157K — below the $200K+ typical of scaled
      SaaS companies, suggesting the company is still investing ahead of revenue in headcount.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021
    tableRefs:
      - TI003
    figureRefs:
      - FI001
  - id: traction-and-revenue-estimates
    title: Public Traction and Revenue Estimates
    body: >
      Halcyon has not officially disclosed ARR, revenue, customer count, net revenue retention, or any other financial
      traction metric. Third-party data aggregators provide the only available revenue estimates: Growjo estimates
      approximately $79.5M in annual revenue as of 2025, while Latka's database also references similar figures. These
      estimates are algorithmically derived from headcount, funding, and web traffic signals and carry medium confidence
      at best. The company serves enterprise and mid-market customers including Fortune 500 organizations, but the exact
      customer count, average deal size, and logo retention rate are unknown. At the estimated $79.5M revenue against a
      $1B post-money valuation, Halcyon trades at approximately 12.6x revenue — a premium compared to the broader SaaS
      market median of 6–8x but below CrowdStrike's 15–20x forward revenue multiple and SentinelOne's approximately
      10–12x forward multiple. This valuation positioning suggests investors are pricing in significant growth
      acceleration. No ARR, GMV, or active-user metrics have been disclosed, and the company has not provided guidance
      or forecasts.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027
      - CI028
    figureRefs:
      - FI003
  - id: capital-adequacy
    title: Capital Adequacy and Financing Dependency
    body: >
      Halcyon has raised $190M in total equity financing across four rounds: $18.7M seed (October 2022), $50M Series A
      (April 2023, led by SYN Ventures), $40M Series B (December 2023, led by Bain Capital Ventures, oversubscribed),
      and $100M Series C (November 2024, led by Evolution Equity Partners at a $1B valuation). Cash on hand is not
      disclosed. Using industry benchmarks for cybersecurity startups at this stage — monthly burn rates of $3–6M for
      companies with 400–500 employees — estimated annual burn could range from $36–72M. If the company retains a
      substantial portion of its $100M Series C raise, runway could extend 18–30+ months from the Series C close,
      depending on revenue growth offsetting burn. No debt, credit facilities, or project finance obligations have been
      disclosed. The company has not announced plans for a Series D or any IPO timeline. The rapid fundraising cadence
      (four rounds in 24 months) and oversubscribed Series B suggest strong investor demand, but the capital intensity
      of scaling a direct enterprise sales force in cybersecurity means continued external financing is likely before
      profitability. Burn multiple — the ratio of net burn to net new ARR — is a key metric investors will scrutinize,
      with top-tier cybersecurity startups targeting sub-2x burn multiples at this stage.
    claimRefs:
      - CI029
      - CI030
      - CI031
      - CI032
      - CI033
      - CI034
      - CI035
      - CI036
    tableRefs:
      - TI004
    figureRefs:
      - FI004
  - id: financial-verdict
    title: Financial Verdict and Diligence Blockers
    body: >
      Halcyon's financial profile presents a company with strong investor backing and a clear product-market fit signal
      (rapid funding, $1B valuation) but near-total opacity on the metrics required to underwrite an investment. Revenue
      quality cannot be assessed without ARR, retention, and churn data. The margin path is unclear without gross margin
      and operating cost breakdowns. Capital intensity is unknown without burn rate and runway disclosures. The
      company's add-on positioning (per-endpoint pricing at $35–75/year) suggests lower ACV than full-platform
      competitors, which could pressure CAC payback if sales cycles are enterprise-length. The $12.6x revenue multiple
      is defensible if the company is growing at 80%+ year-over-year, but no growth rate has been disclosed. Key
      diligence blockers include: (1) confirmed ARR and revenue trajectory, (2) gross margin and unit economics, (3)
      customer count and retention metrics (NRR, logo churn), (4) burn rate and cash position, and (5) sales efficiency
      metrics (CAC, ACV, payback). Without these inputs, financial underwriting relies entirely on third-party estimates
      and comparable company benchmarks, which is insufficient for a $1B valuation decision.
    claimRefs:
      - CI037
      - CI038
      - CI039
      - CI040
      - CI041
      - CI042
    tableRefs:
      - TI005
