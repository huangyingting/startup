callouts:
  - calloutType: risk
    title: Near-Total Financial Opacity
    body: >-
      Halcyon discloses no ARR, gross margin, customer count, retention, burn rate, or growth rate. At a $1B valuation,
      this level of opacity makes independent financial underwriting impossible without data-room access.
    claimRefs:
      - CI037
      - CI038
      - CI039
  - calloutType: insight
    title: Add-On Pricing May Limit ACV
    body: >-
      Halcyon's per-endpoint pricing of $35–$75/year is significantly below full-platform competitors ($180–$185/year),
      reflecting its add-on positioning. This may constrain average contract values and require higher endpoint volumes
      per deal to achieve attractive unit economics.
    claimRefs:
      - CI001
      - CI002
      - CI043
      - CI044
  - calloutType: risk
    title: Revenue Multiple Requires Growth Validation
    body: >-
      The estimated 12.6x revenue multiple is defensible only if Halcyon is growing at 80%+ YoY, which has not been
      disclosed. If growth is decelerating, the valuation premium relative to public peers like SentinelOne (10–12x) may
      not be justified.
    claimRefs:
      - CI026
      - CI027
      - CI028
  - calloutType: assumption
    title: Third-Party Revenue Estimates Are Unconfirmed
    body: >-
      The ~$79.5M revenue figure from Growjo and Latka is algorithmically derived and has not been confirmed by Halcyon.
      Actual revenue could differ materially in either direction.
    claimRefs:
      - CI022
      - CI023
      - CI024
  - calloutType: recommendation
    title: Prioritize Data-Room Financial Metrics
    body: >-
      Any investment decision requires confirmed ARR, gross margin, NRR, burn rate, and customer count from the data
      room. Third-party estimates and benchmarks are insufficient for underwriting a $1B valuation.
    claimRefs:
      - CI037
      - CI040
      - CI041
      - CI042
