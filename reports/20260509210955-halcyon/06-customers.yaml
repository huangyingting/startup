schemaVersion: "report-v2"
artifact: customers
slug: halcyon
runDate: "2026-05-09"
company:
  name: Halcyon

chapter:
  number: 6
  title: "Customers"
  summary: "Halcyon serves 500+ organizations protecting over 1.75 million endpoints, with 300% customer growth in 2024–2025 spanning Fortune 500 enterprises, public sector agencies, and mid-market firms across financial services, healthcare, manufacturing, and legal verticals, though customer-specific retention metrics and individual account names remain largely undisclosed."

sections:
  - id: customer-segmentation
    title: "Customer Base Segmentation"
    body: |
      Halcyon's customer base spans enterprise, mid-market, and — through its MSSP channel — SMB organizations. The primary buyer persona is the Chief Information Security Officer (CISO) or VP of Security at organizations with 500+ endpoints, where ransomware represents an existential operational risk. Vertically, Halcyon's adoption is concentrated in financial services, healthcare, manufacturing, retail, and legal sectors, all of which face elevated ransomware targeting and carry heavy regulatory compliance obligations. The public sector represents a growing segment, with government agencies and defense-adjacent organizations deploying the platform. Geographically, Halcyon's direct sales footprint is North America-centric, though international expansion has begun through technology partnerships with Dell and Cisco for the Japanese market. The payer structure is predominantly direct enterprise subscription, with a growing share intermediated through MSSPs and VARs. As of late 2025, Halcyon's Revolution Partner Program had attracted over 70 channel partners, and the October 2025 distribution agreement with Climb Channel Solutions extended reach to thousands of additional resellers and MSPs. Halcyon does not publicly disclose customer count granularity by segment, revenue concentration by vertical, or average contract value, making precise segmentation reliant on third-party review platforms and partner announcements.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008]

  - id: adoption-trajectory
    title: "Customer Growth and Adoption Trajectory"
    body: |
      Halcyon achieved 300% customer growth in the period spanning 2024 to early 2025, expanding from an undisclosed base to over 500 organizations protecting more than 1.75 million devices. This trajectory was recognized in the 2025 SC Awards, where Halcyon won Best Enterprise Security Solution partly on the strength of this deployment scale. The company's adoption model follows a phased deployment pattern: new customers begin in monitor mode for safe integration and policy tuning, typically with weekly review calls with Halcyon's deployment team, before transitioning to full enforcement mode. This phased approach reduces friction and false-positive risk during onboarding. The 24/7 Ransomware Operations Center (ROC) and Ransomware Intelligence, Support, and Enablement (RISE) team provide ongoing managed support, functioning as a virtual SOC extension for customers. Halcyon's platform is designed to complement existing EDR and backup solutions rather than replace them, which lowers procurement friction by avoiding rip-and-replace dynamics. The company reports that 68% of customers experienced Halcyon stopping a ransomware threat that would have significantly impacted their business, and 99% of customers report feeling confident in their ransomware resiliency after deployment. However, key adoption metrics such as time-to-value, average deployment duration, and endpoint utilization rates remain undisclosed. The absence of publicly reported ARR or customer count time series makes it impossible to independently verify the 300% growth claim with precision.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017]

  - id: named-customer-proof
    title: "Named and Anonymized Customer Evidence"
    body: |
      Halcyon does not publicly name most customers, but anonymized case studies and testimonials provide meaningful evidence of production deployment. FeaturedCustomers lists 14 customer references with a composite rating of 4.7 out of 5 from 356 reference ratings. Specific anonymized proof points include a large North American law firm that selected Halcyon to counter sophisticated low-and-slow ransomware attacks bypassing traditional EDR; a national leading healthcare insurer that valued Halcyon's unique encryption key capture capability as a safety net no other vendor offered; and a retail distribution company where Halcyon detected and blocked a Sunburst backdoor missed by existing security tools during post-incident remediation. Additionally, a partially deployed customer reported that a threat actor disabled their antivirus and EDR, but endpoints running Halcyon remained unaffected, forcing attackers to pivot. On Gartner Peer Insights, Halcyon's Anti-Ransomware Platform holds a 4.8 out of 5 rating from 19 verified reviews as of mid-2025, with users praising implementation ease, phased rollout support, and reliability. PeerSpot reviews cite robust performance, strong analytics, and scalability, though users note room for improvement in technical support responsiveness and third-party integrations. The absence of named Fortune 500 references is a gap — while the company claims Fortune 500 customers and public sector deployments including defense-adjacent organizations, no specific names are publicly confirmed, limiting reference-check ability for prospective buyers or investors.
    claimRefs: [CU018, CU019, CU020, CU021, CU022, CU023, CU024, CU025, CU026, CU027]

  - id: retention-satisfaction
    title: "Retention, Satisfaction, and Durability Signals"
    body: |
      Halcyon does not disclose Net Revenue Retention (NRR), Gross Revenue Retention (GRR), logo churn, or contract renewal rates. As a private company with no public filings, these metrics are entirely opaque. However, indirect signals suggest strong retention. The company's customer satisfaction survey reports 99% of customers feel confident in ransomware resiliency post-deployment, up from 7% before Halcyon, and 100% report being less concerned about ransomware as a business risk. On review platforms, Gartner Peer Insights ratings of 4.8/5 and FeaturedCustomers ratings of 4.7/5 indicate high satisfaction among the subset of customers who submit reviews. Industry benchmarks for enterprise cybersecurity SaaS suggest median NRR of 115–130% with top-quartile performers exceeding 120%, driven by seat expansion, module cross-sell, and high switching costs. Halcyon's architecture — complementary to existing EDR rather than competing — may reduce churn risk by lowering rip-and-replace pressure. The ransomware warranty, offering up to $5 million in coverage for ransomware incidents that bypass Halcyon's defenses, serves as both a retention mechanism and a confidence signal. Customer support receives mixed reviews: generally rated 4.6–4.7/5, but with recurring feedback about slower responsiveness for complex integration issues and requests for more robust training resources. The absence of cohort-level retention data, contract length distribution, or expansion revenue metrics remains a material gap for diligence.
    claimRefs: [CU028, CU029, CU030, CU031, CU032, CU033, CU034, CU035, CU036]

  - id: expansion-concentration-risk
    title: "Expansion, Concentration, and Channel Risk"
    body: |
      Halcyon's land-and-expand motion operates through endpoint seat expansion within existing accounts, cross-selling new modules such as Data Exfiltration Protection and Ransomware Detection and Recovery, and upselling from monitor-only to full enforcement mode. The company's channel strategy has evolved rapidly: from 70+ MSSP and VAR partners in late 2023 to the October 2025 Climb Channel Solutions distribution agreement, which extends access to thousands of resellers across North America for SMB, commercial, and enterprise segments. The Revolution Partner Program earned a 5-Star Rating in the CRN 2025 Partner Program Guide, indicating strong channel partner satisfaction. International expansion through Dell and Cisco partnerships targets Japan, though the geographic revenue concentration appears heavily North American. Concentration risk is difficult to assess without revenue-by-customer disclosure. If Halcyon's 500+ organizations include a small number of large enterprise accounts generating a disproportionate share of revenue, the standard top-10-customer concentration risk applies. Channel dependence is a growing consideration: as MSSP-intermediated revenue grows, Halcyon becomes exposed to partner economics, margin sharing, and channel conflict between direct sales and partner-sourced deals. The incident response partner program launched in 2026, which includes Booz Allen Hamilton among its partners, adds a new customer acquisition channel through post-breach remediation scenarios. Procurement friction is reportedly low given the complementary deployment model, but pricing is cited by some reviewers as relatively high, which may slow mid-market penetration absent channel discounting.
    claimRefs: [CU037, CU038, CU039, CU040, CU041, CU042, CU043, CU044, CU045]

