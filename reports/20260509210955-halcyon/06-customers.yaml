callouts:
  - calloutType: strength
    title: "Rapid Customer Growth to Critical Mass"
    body: "300% customer growth to 500+ organizations protecting 1.75M+ devices demonstrates strong product-market fit in the anti-ransomware category, validated by the 2025 SC Award for Best Enterprise Security Solution."
    claimRefs: [CU009, CU010, CU011]

  - calloutType: strength
    title: "High Customer Satisfaction Across Review Platforms"
    body: "Gartner Peer Insights (4.8/5) and FeaturedCustomers (4.7/5) ratings, combined with 99% ransomware resiliency confidence, indicate strong customer satisfaction despite limited sample sizes."
    claimRefs: [CU023, CU024, CU030]

  - calloutType: risk
    title: "Complete Retention Metrics Opacity"
    body: "NRR, GRR, churn, renewal rates, and contract lengths are entirely undisclosed. Without these metrics, retention durability cannot be independently assessed, representing a material diligence gap."
    claimRefs: [CU028, CU029, CU033]

  - calloutType: risk
    title: "No Named Customer References"
    body: "Despite claiming Fortune 500 and public sector customers, Halcyon has not publicly named any individual customer. All case studies are anonymized, limiting reference-check ability and raising questions about reference quality."
    claimRefs: [CU025, CU026, CU027]

  - calloutType: risk
    title: "Growing Channel Dependency"
    body: "As MSSP/VAR-intermediated revenue grows through Climb Channel Solutions and 70+ partners, Halcyon faces margin pressure, channel conflict, and single-distributor concentration risk for SMB segments."
    claimRefs: [CU039, CU040, CU041]

  - calloutType: recommendation
    title: "Request Cohort-Level Retention Data in Diligence"
    body: "Investors should request NRR, GRR, and cohort retention data directly from management, along with top-10 customer revenue concentration and contract length distribution, to validate the retention assumptions implicit in Halcyon's valuation."
    claimRefs: [CU028, CU029, CU034]

