      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >
              CrowdStrike Falcon 是主导性 EDR/XDR 平台，2025 财年收入 $3.95 billion、ARR $4.24 billion，市值约 $119 billion。其 Falcon
              平台提供云原生端点防护，集成 Charlotte AI，并保持 97% 的总留存率。CrowdStrike 已连续六年被 Gartner Magic Quadrant for Endpoint
              Protection Platforms 评为 Leader。SentinelOne Singularity 2025 财年收入为 $821.5 million，ARR 为 $920 million，同比增长
              32%。SentinelOne 以自主检测与响应、勒索软件回滚能力形成差异化，并已连续五年成为 Gartner MQ Leader；其市值约 $5.6 billion。Palo Alto Networks 的
              Cortex XDR 平台属于更宽的安全组合，后者 2025 财年收入 $9.22 billion，Next-Generation Security ARR 为 $5.6 billion；其市值超过 $139
              billion。IDC 数据显示，Microsoft Defender for Endpoint 在现代端点安全中拥有 28.6% 市场份额，连续三年排名第一。Defender 与 Windows 和 M365
              的集成带来无可匹敌的分发优势，使其成为许多企业的默认端点防护。Sophos 连续 16 年为 Gartner MQ Leader，2020 年被 Thoma Bravo 以 $3.9 billion 私有化，并于
              2025 年初以 $859 million 收购 Secureworks，把 MDR 客户基础扩至 28,000+ 个账户。值得注意的是，Sophos 于 2025 年 8 月与 Halcyon
              达成合作，开展互相防篡改保护和情报共享，说明两者更偏互补关系，而非纯粹竞争。
