      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: >
              Halcyon 由 Jon Miller（CEO）和 Ryan Smith（CTO）共同创立。两人都是网络安全行业老兵，在攻防安全上积累很深。Jon Miller 曾任 Cylance（现属
              BlackBerry）首席研究官，联合创办下一代防务承包商 Boldend，也曾是 Accuvant（现 Optiv）早期员工，参与打造了服务 Fortune 500 的大型网络安全咨询业务之一。他还曾在 ISS
              X-Force（现 IBM）担任渗透测试员。Ryan Smith 拥有 25 年以上网络安全经验，曾任 Boldend 和 Exodus Intelligence CTO、Optiv 和 Accuvant
              LABS 首席科学家，以及 Cylance 研究副总裁。他被视为二进制漏洞与利用技术领域的早期行业专家。管理团队还包括首席运营官 Aaron Mick、首席品牌官 Ryan Golden、总法律顾问 Kevin
              Furgal、首席市场官 Kelly Fiedler，以及首席营收官 Jeff Stclair。Bain Capital Ventures 合伙人、Symantec 前 CEO Enrique Salem
              已加入董事会；董事会成员还包括 Evolution Equity Partners 的 Richard Seewald、Gula Tech Adventures 的 Ron Gula，以及 SYN
              Ventures 的 Jay Leek。
