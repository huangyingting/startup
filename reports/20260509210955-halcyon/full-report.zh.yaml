      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Halcyon 所处的网络安全环境监管越来越强，在多个司法辖区承担实质合规义务。SEC 的网络安全披露规则已于 2023 年 12
              月生效，要求上市公司在四个工作日内披露重大网络安全事件，并在年报中描述其网络安全风险管理流程——包括来自第三方供应商的风险。Halcyon 的客户主要是受这些 SEC 规则约束的企业组织，因此 Halcyon
              会面临合同向下传导要求，需要及时通知事件并提供安全文档。EU NIS2 Directive 要求成员国在 2024 年 10
              月前完成转化，把强制网络安全风险管理和事件报告义务扩展到关键基础设施领域的基本和重要实体；不合规处罚最高可达 €10 million 或全球年营业额的 2%。NIS2 明确要求供应链安全评估，这意味着
              Halcyon 在欧洲扩张时必须证明符合欧盟特定网络安全标准。FTC 通过 FTC Act Section 5 和扩展后的 Safeguards Rule
              加强了对网络安全厂商的执法，要求全面信息安全计划、多因素认证、加密和服务提供商监督。2024 年 Marriott 同意令为 FTC
              认定“合理”安全实践设定了具体基准，现在广泛适用于技术供应商。另一个新兴法律风险来自网络保险人的代位求偿诉讼：2025 年，Ace American Insurance
              起诉网络安全厂商，试图追回勒索软件攻击后支付的损失，理由是厂商失误导致了入侵。联邦法院数据显示，2021 至 2023 年间，勒索软件相关投诉增长超过 600%，网络安全厂商越来越多被列为被告。就 Halcyon
              而言，如果客户发生绕过 Halcyon 防御的勒索软件事件，$5 million 勒索软件保障会产生或有负债敞口。保障条款、索赔历史和精算准备金均未公开披露，因此外部无法评估这一负债。此外，Halcyon
              的终端代理在客户系统的内核级运行，这是一种特权访问位置；若软件更新导致系统不稳定，责任敞口会更高。2024 年 7 月 CrowdStrike 故障影响全球 8.5 million 台 Windows
              系统，已经证明了这一点。Halcyon 不公开披露 SOC 2 Type II 认证状态、GDPR Data Processing Agreements 或 HIPAA Business Associate
              Agreement 模板，给受监管客户留下合规文档缺口。
