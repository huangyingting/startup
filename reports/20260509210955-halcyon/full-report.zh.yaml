      - number: '4.6'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              Halcyon 的财务画像呈现出强投资人支持和清晰产品-市场匹配信号（快速融资、$1B 估值），但承销投资所需指标几乎完全不透明。没有
              ARR、留存和流失数据，就无法评估收入质量。没有毛利率和运营成本拆分，就无法判断利润率路径。没有烧钱速度和现金跑道披露，就无法判断资本强度。公司加购定位（按端点定价 $35–75/year）意味着 ACV
              可能低于全平台竞争对手；如果销售周期仍是企业级长度，CAC 回本会承压。如果公司同比增长 80%+，12.6x 收入倍数可以辩护；但增长率没有披露。关键尽调阻断项包括：（1）经确认的 ARR
              和收入轨迹，（2）毛利率和单位经济性，（3）客户数和留存指标（NRR、客户 logo
              流失），（4）烧钱速度和现金位置，以及（5）销售效率指标（CAC、ACV、回本）。缺少这些输入，财务承销只能依赖第三方估算和可比公司基准；这不足以支撑 $1B 估值决策。
