        title: 公开牵引力与收入估算
        blocks:
          - type: paragraph
            body: >
              Halcyon 尚未正式披露 ARR、收入、客户数、净收入留存或任何其他财务牵引力指标。第三方数据聚合平台给出了唯一可用的收入估算：Growjo 估计 2025 年年收入约 $79.5M，Latka
              数据库也引用了相近数字。这些估算由员工数、融资和网站流量信号通过算法推导，置信度最多只能算中等。公司服务企业级和中端市场客户，包括 Fortune 500 组织；但精确客户数、平均客单价和客户 logo
              留存率未知。按估计 $79.5M 收入和 $1B 投后估值计算，Halcyon 交易倍数约为 12.6x 收入——高于更宽 SaaS 市场 6–8x 的中位数，但低于 CrowdStrike 15–20x
              的远期收入倍数，也低于或接近 SentinelOne 约 10–12x 的远期收入倍数。这个估值定位说明投资人正在计入显著的增长加速。公司没有披露 ARR、GMV 或活跃用户指标，也未给出指引或预测。
