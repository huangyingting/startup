            body: >
              Halcyon 已通过四轮融资累计募资约 $190M，大约两年内从种子轮推进到 Series C 轮。公司于 2022 年 10 月完成 $18.7M 种子轮，用于早期产品开发和初始商业化。2023 年 4
              月，Halcyon 完成由 SYN Ventures 领投的 $50M Series A 轮，Dell Technologies Capital 和 Corner Ventures 参投。仅八个月后，2023 年
              12 月，公司完成由 Bain Capital Ventures 领投、获得超额认购的 $40M Series B 轮，并让 Symantec 前 CEO Enrique Salem 加入董事会。2024 年
              11 月 25 日宣布的 Series C 轮为 $100M，由 Evolution Equity Partners 领投，Bain Capital Ventures、SYN Ventures、Harmony
              Group、Corner Capital Management、Dropbox Ventures 和 ServiceNow Ventures 参投。该轮将 Halcyon 估值推至 $1
              billion，进入独角兽行列。作为交易的一部分，Evolution Equity Partners 管理合伙人 Richard Seewald 加入董事会。约 24
