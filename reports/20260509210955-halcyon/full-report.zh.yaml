  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争替代与平台整合风险
        blocks:
          - type: paragraph
            body: >
              Halcyon 最大的战略风险，是现有网络安全厂商通过平台整合把它竞争替代掉。企业安全市场正在快速平台化；平均企业运行来自 29 家厂商的 83
              个安全工具，却在主动整合到更少的一体化平台。CrowdStrike、Palo Alto Networks 和 Microsoft 都已在各自 EDR 和 XDR
              平台内新增或增强面向勒索软件的能力。CrowdStrike 的 Falcon 平台已向现有订阅者免费提供勒索软件防护模块，实际上把 Halcyon 的核心价值主张捆绑成免费功能。Palo Alto
              Networks 的 Cortex XDR 和 Microsoft Defender for Endpoint 也把反勒索软件保护整合进平台套件。平台化趋势正在加速：2024–2025 年网络安全 M&A
              创纪录，一体化平台厂商变得主导，CISO 优先考虑厂商整合，以降低运营复杂度和总拥有成本。Halcyon
              作为单点方案，面对典型的“功能被产品吸收”风险——公司所在的整个品类可能被吸收到更大的平台里，而企业客户已经部署这些平台。Halcyon
              的反驳是，其专门构建的勒索软件防护架构，包括加密密钥捕获和自动恢复，覆盖范围超过通用 EDR
              平台。不过，随着平台厂商改进勒索软件模块，这种技术差异更难沟通，也更难货币化。中端市场风险尤其突出，采购简单和厂商整合的优先级高于同类最佳的勒索软件覆盖。公司的补充式部署模型设计为与 EDR
              共存而非替代，能缓解“推倒重来式替换”的竞争动态；但当 CISO 面临减少工具数量和安全支出的压力时，采购预算被挤出风险并未消失。
