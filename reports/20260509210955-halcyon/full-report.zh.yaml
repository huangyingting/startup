      - number: '2.5'
        title: 增长驱动、约束与市场动态
        blocks:
          - type: paragraph
            body: >
              勒索软件防护市场由五个结构性增长驱动。第一，勒索软件即服务（RaaS）平台把攻击运营工业化，降低了威胁行为者的技术门槛并推高攻击量——2025 年，72% 的组织遭遇过勒索软件尝试，7,500+
              受害组织出现在泄露网站上，同比增长 58%。第二，零日漏洞武器化让勒索软件组织能够绕过基于特征码的检测，迫使防守方投资行为检测和 AI 检测层。第三，双重和三重勒索策略把加密、数据窃取和 DDoS
              结合起来，提高受害方在攻击前投资防护的财务动机。第四，AI 赋能的勒索软件攻击正在加速，威胁行为者用大语言模型编写多态恶意软件并自动化侦察。第五，网络保险市场增长（2025 年 $16.3–26.25
              billion）带来机构化的勒索软件控制需求，因为承保要求正在收紧。

              与这些驱动相对，三项实质约束限制了市场速度。大型网络安全厂商——CrowdStrike、Palo Alto Networks、Microsoft、SentinelOne——的平台整合把勒索软件检测打包进更宽的
              EDR/XDR 平台，压缩独立反勒索软件工具的可寻址市场。安全团队已经管理 40–70 个安全产品，工具疲劳让买方抗拒再增加一个点解决方案。SIEM、SOAR 和端点管理系统的集成带来高切换成本，使客户被既有
              EDR 厂商锁定，并放慢互补型反勒索软件工具的采用。Gartner 预计安全支出 2026 年将达到 $240 billion，但增量预算越来越多被既有平台厂商的功能扩张吸走，而非流向新的点解决方案进入者。
