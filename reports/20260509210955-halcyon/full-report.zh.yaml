      - number: '5.3'
        title: 部署、集成与生态
        blocks:
          - type: paragraph
            body: >
              Halcyon 平台通过轻量终端代理部署，兼容自动化软件部署工具，对性能影响很小，并内置防篡改和健康监控能力。代理会把安全和威胁遥测流式发送到 SIEM 工具，包括 Google SecOps、Microsoft
              Sentinel、Sumo Logic、Splunk 和 Exabeam。平台与 EDR/XDR 方案（CrowdStrike、SentinelOne、Microsoft Defender、Cortex
              XDR）集成后，Halcyon 可以检测并阻断绕过这些工具的攻击，同时监控 EDR 被篡改的迹象。平台提供有文档的 REST API，可通过 api.halcyon.ai 和 api.eu.halcyon.ai
              访问，用于与 SOAR 平台、工单系统、身份提供商和定制仪表盘做自定义集成、自动化和编排。Enterprise Policy Management 让企业和 MSSP 能通过 Policy Groups，把
              Detection、Protection 或 Lock Down 策略应用到指定资产组，从而实现可扩展的安全管理。2025 年建立的 Sophos 合作提供双向防篡改保护和威胁情报共享。Halcyon
              部署通常先进入监控模式，建立基线并调优策略，然后切到主动阻断。公司还与 Dell 在分销和技术集成上合作；Dell 合作伙伴门户中的技术资料也体现了这一点。
            claimRefs:
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
              - CE024
              - CE025
      - number: '5.4'
        title: 信任、安全与质量控制
        blocks:
          - type: paragraph
            body: >
              Halcyon 维护基础设施、组织和产品层面的安全措施，包括传输中和静态数据加密、受限访问控制、账户认证、持续渗透测试、灾难恢复计划，以及数据保留和删除政策。公司遵循标准 SaaS
              安全做法，但公开资料尚未独立验证 Halcyon.ai（这家反勒索软件公司，不同于无关的 Halcyon Financial Technology 实体）是否具备 SOC 2 Type II
              等具体认证。若防护失效，Halcyon 的勒索软件保障提供最高 $5M 或更高的财务赔付，既像质量保证，也补充传统网络保险。平台包含自动化健康监控和防篡改功能，以守住代理完整性。托管式 RDR
              服务不额外收取许可费，提供 24/7 监控、调查、响应和取证分析；RISE 团队承诺快速调查并指导恢复。2026 年 2 月的 Omdia Technical Validation 报告独立评估了 Halcyon
              的反勒索软件能力，为平台技术主张提供第三方验证。
