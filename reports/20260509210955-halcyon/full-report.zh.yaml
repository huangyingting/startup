              - CV015
      - number: '8.4'
        title: 论点失效触发因素与尽调优先事项
        blocks:
          - type: paragraph
            body: >
              Halcyon 在 $1B 估值下的投资论点会在以下任一情况发生时失效：(1) CrowdStrike 或 SentinelOne 推出专门的反勒索软件模块，在密钥捕获和自主恢复上达到同等水平，消除
              Halcyon 的核心差异化；(2) 季度 NRR 跌破 100%，说明客户流失超过扩张；(3) Halcyon 披露影响客户的重大勒索软件入侵，摧毁支撑企业销售的零损失记录；(4) 收入增长放缓至 40%
              YoY 以下，把隐含倍数压到私营市场中位数以下。


              承诺跟投前，最终尽调优先事项包括：(a) 向 CFO 获取经审计 ARR 和季度收入明细，确认 $79.5M 第三方估计；(b) 队列层面 NRR 数据，显示 12 个月后的留存耐久性；(c)
              在勒索软件专项评估中，对 CrowdStrike Falcon 和 SentinelOne Singularity 的竞争赢单 / 输单数据；(d) Ransomware Warranty
              索赔历史和精算准备金；(e) 客户集中度分析——前十大账户是否超过 ARR 的 40%；(f) 从反勒索软件扩展到相邻品类的产品路线图。


              尽调结论是有条件支持：反勒索软件品类真实存在，Halcyon 技术有差异化，零损失记录也有说服力。在 $1B
              估值下，如果增长持续，估值合理；但财务透明度不足，尚不能形成高确信度承诺。应持续跟踪，并在下一轮融资事件或收到经审计财务数据后重新评估。
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
          - type: table
            tableRef: TV005
            claimRefs:
