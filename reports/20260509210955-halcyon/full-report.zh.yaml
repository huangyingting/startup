            body: >
              Halcyon 不披露净收入留存（NRR）、毛收入留存（GRR）、客户 logo 流失或合同续约率。作为没有公开申报文件的私营公司，这些指标完全不透明。不过，间接信号显示留存较强。公司的客户满意度调查显示，99%
