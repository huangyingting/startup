      - number: '8.2'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: >
              Halcyon 的 $1B 投后估值基于约 $79.5M 估计收入，隐含 12.6x 收入倍数；相对私营网络安全独角兽基准属于中等。Wiz 以 $500M ARR 获得 $12B
              估值（24x）；CrowdStrike 以 $4.24B ARR 在公开市场交易约 18.6x NTM 收入；Palo Alto Networks 基于 $9.2B 收入交易约
              12–15x；SentinelOne 基于约 $1B 收入交易约 3.5–4.5x；Zscaler 约 12–15x。网络安全板块 NTM 倍数中位数约为 7.8x。


              在私营同业中，Halcyon 的 12.6x 介于高增长溢价层和 2.6–3.2x 私营市场中位数之间。溢价部分来自反勒索软件品类领导地位、强投资者财团质量（Evolution Equity、Bain
              Capital Ventures、SYN Ventures），以及勒索软件市场 17% CAGR 增速。不过，相对 SentinelOne（一家产品范围更广的上市公司）的溢价，说明投资者在定价持续 60%+
              收入增长，而这一点尚未通过经审计财务数据公开确认。


              以 2027 年退出情景为锚的自下而上估值框架显示：牛市情形——$200M ARR × 15x 倍数 = $3.0B；基准情形——$140M ARR × 10x = $1.4B；熊市情形——$90M ARR ×
              6x = $540M。相对于 $1B 投后估值，牛市情形意味着 3x 回报，基准情形为 1.4x，熊市情形为 0.54x——与许多后期网络安全独角兽相比，风险回报中等偏有吸引力。
