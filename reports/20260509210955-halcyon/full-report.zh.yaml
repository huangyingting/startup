      - number: '7.6'
        title: 合作伙伴、依赖与集中度风险
        blocks:
          - type: paragraph
            body: >
              Halcyon 的运营模型依赖多项外部因素，由此产生集中度风险。公司的终端代理部署在 Microsoft Windows 系统上，并与包括 CrowdStrike Falcon、Microsoft
              Defender 和 SentinelOne 在内的第三方 EDR 平台集成——这让 Halcyon 在功能上依赖这些厂商的内核级 API 和操作系统接口。Windows 内核安全政策变化可能从根本上冲击
              Halcyon 的部署架构，例如 CrowdStrike 故障后，Microsoft 曾考虑限制第三方安全厂商的内核级访问。公司的云基础设施依赖未公开披露，但作为提供实时勒索软件情报的 SaaS
              平台，Halcyon 很可能依赖超大规模云服务商（AWS、Azure 或 GCP）来做后端处理和威胁情报交付。云服务商故障或价格变化可能影响服务可用性和利润率。渠道依赖正在上升：2025 年 10 月的
              Climb Channel Solutions 分销协议把 Halcyon 触达范围扩展到数千家北美经销商，但也为 SMB 和中端市场细分带来单一分销商集中度风险。如果 Climb 关系恶化或 Climb
              业务遇到挑战，Halcyon 的渠道来源 pipeline 会受到实质影响。通过 Dell 和 Cisco
              面向日本市场的合作推进国际扩张，也在一个战略重要地区造成伙伴依赖。收入集中度风险完全不透明：Halcyon 不披露头部客户收入占比；如果少数大型企业账户贡献了不成比例的收入，标准的前十大客户集中度风险就适用。包括
              Booz Allen Hamilton 在内的事件响应伙伴计划，为数据泄露后获客带来转介绍依赖。
