      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >
              2024 至 2025 年初，Halcyon 实现 300% 客户增长，从未披露的基数扩展到 500 多家组织，保护超过 1.75 million 台设备。这一轨迹获得 2025 SC Awards
              认可，Halcyon 获得最佳企业安全解决方案奖，部分原因就是部署规模。公司的采用模型遵循分阶段部署：新客户先进入监控模式，安全完成集成和策略调优，通常每周与 Halcyon
              部署团队复盘，然后再切到完全执行模式。这种分阶段做法降低了上线摩擦和误报风险。24/7 Ransomware Operations Center（ROC）和 Ransomware Intelligence,
              Support, and Enablement（RISE）团队提供持续托管支持，像客户的虚拟 SOC 扩展。Halcyon 平台设计成补充现有 EDR
              和备份方案，而不是替换它们；避免推倒重来式替换后，采购阻力更低。公司称，68% 的客户经历过 Halcyon 阻止原本会显著影响业务的勒索软件威胁，99%
