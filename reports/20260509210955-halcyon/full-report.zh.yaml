      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Halcyon 已通过四轮股权融资累计募资 $190M：$18.7M 种子轮（2022 年 10 月）、$50M Series A 轮（2023 年 4 月，由 SYN Ventures 领投）、$40M
              Series B 轮（2023 年 12 月，由 Bain Capital Ventures 领投，获得超额认购），以及 $100M Series C 轮（2024 年 11 月，由 Evolution
              Equity Partners 领投，估值 $1B）。现金余额没有披露。以这一阶段网络安全初创公司的行业基准估算——400–500 名员工公司的月烧钱速度为 $3–6M——年烧钱可能在 $36–72M
              之间。如果公司保留了 $100M Series C 轮融资的大部分资金，现金跑道可能从 Series C 轮完成后延长 18–30+
              个月，具体取决于收入增长能抵消多少烧钱。公司未披露债务、授信额度或项目融资义务，也未宣布 Series D 计划或 IPO 时间表。快速融资节奏（24 个月四轮）和超额认购的 Series B
              轮说明投资人需求强劲；但扩张网络安全企业直销团队资本强度较高，盈利前继续外部融资的可能性仍大。烧钱倍数——净烧钱与新增净 ARR 的比率——将是投资人重点审视的指标；一线网络安全初创公司在这一阶段通常以低于 2x
