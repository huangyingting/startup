  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反向论点
        blocks:
          - type: paragraph
            body: >
              Halcyon 的 $1B 估值（Series C，2024 年 11
              月）建立在几股因素交汇上：勒索软件市场的结构性顺风、具备专有密钥捕获和自主恢复技术的差异化反勒索软件平台，以及竞争对手无法匹配的零损失客户记录。反勒索软件防护市场预计到 2034 年将以 17% CAGR
              增长，全球规模达到 $117.5B；Halcyon 把自己定位为唯一专注击败勒索软件的纯玩家厂商，这种专注度能打动把勒索软件视为运营连续性最大网络风险的 CISO。


              牛市论点认为，Halcyon 的收入轨迹（2025 年估计约 $79.5M，较此前年份大幅提高）使其有望在 2027 年快速达到 $150–200M ARR；届时公开市场可比公司（CrowdStrike 约
              18.6x，Palo Alto Networks 约 12–15x）可支撑 $2–3B IPO 估值，为 Series C 投资者带来 2–3x 回报。Ransomware
              Warranty——针对勒索软件损失的财务保证——是独特商业化差异点，能为企业买方提供可量化的风险转移价值主张。


              反向论点集中在平台风险：CrowdStrike、SentinelOne 和 Palo Alto Networks
              都在更广的终端和云安全平台内提供勒索软件防护功能。随着这些现有厂商改进反勒索软件能力，Halcyon 的单点方案溢价可能被压缩。此外，$1B
              估值建立在有限财务披露之上——估计收入来自第三方近似值，而非经审计财务数据，投资者评估真实收入倍数时存在信息不对称。
