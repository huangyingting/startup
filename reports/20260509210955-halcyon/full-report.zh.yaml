    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与使命
        blocks:
          - type: paragraph
            body: >
              Halcyon 是一家网络安全公司，总部位于 Texas 州 Austin，地址为 5900 Balcones Drive, Suite 5464, Austin, TX 78731。公司成立于 2021
              年，核心目标只有一个：用专门打造的反勒索软件平台击败勒索软件。传统端点检测与响应（EDR）厂商把勒索软件视为众多威胁类型之一；Halcyon
              则从技术栈底层就围绕勒索软件攻击的预防、检测和恢复来设计。公司公开使命是让“勒索软件成为历史”，也就是消除勒索软件作为网络犯罪商业模式的可行性。Halcyon
              是私营公司，从隐身状态成长为独角兽大约只用了三年。公司开发团队以远程办公为主，但公司总部仍设在 Austin。Halcyon 所在市场横跨端点安全与网络韧性，差异化来自对勒索软件的专注，以及自研密钥捕获解密能力。
