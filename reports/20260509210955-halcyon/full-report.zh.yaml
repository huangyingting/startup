      - number: '5.2'
        title: 架构与技术实现
        blocks:
          - type: paragraph
            body: >
              Halcyon 的架构采用多层防御模型，每一层对应勒索软件攻击链的不同阶段。执行前层使用 AI
              和专门构建的机器学习微模型；这些模型只用真实世界的勒索软件战术、技术和流程（TTPs）训练，用于在已知和新兴变种运行前拦截。漏洞利用缓解层借助地理围栏、沙箱伪装和凭据海市蜃楼等欺骗技术，让终端看起来不是有吸引力的目标。行为检测层用聚焦勒索软件的模型监控权限提升、横向移动、进程注入等可疑活动。韧性和恢复层会自主叫停正在发生的攻击，隔离受影响终端，并用捕获到的加密密钥材料恢复受影响文件。2025
              年推出的 Kernel Guard Protection 面向 Bring Your Own Vulnerable Driver（BYOVD）攻击，检测并阻断攻击者滥用已知有漏洞的签名驱动来关闭安全控制。EDR
              Last Gasp 会发现勒索软件试图终止第三方安全方案的行为，包括 CrowdStrike Falcon、SentinelOne Singularity、Microsoft Defender for
              Endpoint 和 Palo Alto Cortex XDR。Data Exfiltration Protection (DXP) 2.0 监控过量数据传输或可疑目的地；一旦超过预设阈值，系统自动拉起 RDR
              团队，以应对双重勒索战术。平台的 AI/ML 引擎只用勒索软件训练，而不是通用恶意软件。公司称，与通用工具相比，这能提高准确率并降低误报。
