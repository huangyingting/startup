      - number: '8.3'
        title: 牛市、基准和熊市情景
        blocks:
          - type: paragraph
            body: >
              牛市情景假设 Halcyon 到 FY2027 年末达到 $200M ARR，成功从反勒索软件扩展到相邻的数据勒索预防和事件响应自动化，净留存保持在 125% 以上，并在 2026 年末或 2027 年以
              12–15x 远期收入倍数提交 IPO。在这些假设下，完全稀释后 IPO 估值达到 $2.5–3.5B，相对 $1B 投后估值带来 2.5–3.5x 回报——Series C 入场能拿到这样的结果，吸引力足够。


              基准情景建模为 FY2027 年达到 $140M ARR；随着早期企业队列成熟，净留存降至 110–115%；毛利率稳定在约 72–75%；公司要么以 8–10x 倍数 IPO，要么以 10x
              远期收入被战略收购，对应 $1.4–1.6B 估值。在这一情景下，Series C 投资者实现温和的 1.4–1.6x 回报——可以接受，但低于典型风投目标。


              熊市情景是 CrowdStrike 或 Palo Alto Networks 成功把有竞争力的反勒索软件能力免费捆绑进现有平台许可，压缩 Halcyon 平均售价，或引发一波不续约。在这一情景下，ARR 增长停在
              $90M，净留存跌破 100%，公司以 $400–600M 价格被困境收购。概率权重：牛市 30%、基准 45%、熊市 25%。
            claimRefs:
              - CV011
              - CV012
