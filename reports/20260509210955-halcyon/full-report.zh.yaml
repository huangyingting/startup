      - number: '5.5'
        title: 产品路线图与开发轨迹
        blocks:
          - type: paragraph
            body: >
              Halcyon 的产品路线图由勒索软件战术演进牵引，常见节奏是针对新兴攻击技术直接发布防御功能。2025 年 1 月，公司推出 Kernel Guard Protection，并增强 DXP 能力。2025
              年内，带有分组策略的 Enterprise Policy Management 上线，用于简化多样化企业环境中的管理。RDR 服务成为所有部署的标准配置，无需额外成本即可提供 24/7 勒索软件检测与恢复。DXP
              2.0 把覆盖范围扩展到 Windows 和 Linux 环境。2026 年，公司在 RSAC Conference 2026 展示了增强版 AI 驱动检测和最新外泄防护功能。路线图还包括持续 UX
              改进，例如简化数据导出、更易管理保护模式、增强 webhook 配置，以及改进资产过滤。Linux 支持继续扩展，公司不断增加发行版，并应对勒索软件瞄准 Linux 基础设施的上升威胁。借助 Climb、Dell
              等分销伙伴的渠道中心策略支撑了面向 MSSP 的扩张，尤其是在北美。虽然产品自 2022 年推出后成熟很快，macOS 支持、独立性能基准和完整公开 API 文档仍是缺口。
