  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Halcyon 在更宽的端点安全市场中占据一个狭窄但可防守的细分：专门反勒索软件防御。通用 EDR/XDR 厂商把勒索软件视为许多威胁类别之一；Halcyon 的整个平台——包括密钥捕获解密、Kernel
              Guard Protection 和 Data Exfiltration Protection——则只围绕预防、检测并恢复勒索软件攻击来设计。2025 年 Gartner Magic Quadrant for
              Endpoint Protection Platforms 评出五家领导者：Microsoft、CrowdStrike、SentinelOne、Palo Alto Networks 和
              Sophos；这些厂商都在更宽的 EDR/XDR 平台内包含勒索软件模块。Halcyon 不在该 Magic Quadrant 中，因为它把自己定位为部署在现有 EDR
              旁边的互补层，而非替代品。互补而非替代，既是 Halcyon 的主要差异化，也是它的核心竞争风险：如果既有 EDR 厂商补上勒索软件检测缺口，CISO 为独立反勒索软件层付费的意愿就会下降。截至 2025
              年，端点安全市场价值 $16.25 billion，CAGR 为 7–12%；勒索软件专项支出则是在基础 EDR 之上的增量预算层。
            claimRefs:
