      - number: '4.2'
        title: 商业化动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Halcyon 采用企业直销动作，并由渠道合作伙伴支持。公司已宣布与 Dell 和 Cisco 在日本市场建立战略商业化合作，也与 Sophos 建立了互相情报共享和防篡改保护合作。Jeff Stclair
              担任首席营收官，Kelly Fiedler 担任首席市场官，显示公司同时投入直销领导力和市场营销。截至 2026 年初，公司约有 506 名员工，但工程、销售和 G&A
              的拆分没有披露。销售周期长度、平均合同价值（ACV）、获客成本（CAC）和 CAC 回本周期均未披露。以 SaaS 网络安全行业基准作为参照，企业安全公司通常 CAC 回本周期为 13–20 个月，LTV:CAC
              比率为 3–5x。不过，Halcyon 的定位是加购（单笔 ACV 低于全平台安全厂商），这些基准未必反映其真实表现。渠道经济性，包括合作伙伴利润率和联合销售安排，也未披露。
