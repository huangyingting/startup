      - number: '7.4'
        title: 人员、关键人物与执行风险
        blocks:
          - type: paragraph
            body: >
              Halcyon 由网络安全老兵 Jon Miller（CEO 兼联合创始人）和 Ryan Smith（CTO 兼联合创始人）创立。两人此前在 Cylance（现为 BlackBerry）、Boldend 和
              ISS X-Force（现为
              IBM）的经历，为其带来深厚行业信用。公司的技术愿景、投资者关系、行业声誉和客户信任，很大程度上集中在这两个人身上。网络安全创业公司的关键人物风险尤其突出，因为创始团队往往掌握对威胁格局的独特技术认知，维系关键客户和伙伴关系，并在企业买方做高信任安全采购决策时，充当公司的主要信用信号。Halcyon
              100% 远程、全球分布式的人才模式既带来好处（接触全球人才、降低办公室开销），也带来执行风险（文化凝聚、知识传递、大规模管理监督）。公司的 24/7 Ransomware Operations
              Center（ROC）和 RISE 团队需要专门的勒索软件专业能力，而这种能力在网络安全劳动力市场中稀缺。扩张 24/7 SOC
              运营同时守住质量和响应时间，运营难度很高；所需的勒索软件专长也让可用人才池比通用网络安全运营分析师更窄。Halcyon
              不披露总员工数、流失率，或官网所示高管团队之外的组织结构。没有这些信息，仅靠公开来源无法评估管理层厚度、继任准备和运营扩张能力。公司增长很快——2024–2025 年客户增长
              300%——这通常会拉紧创业公司的运营流程、内控和管理带宽。Halcyon 是否按比例投资了运营基础设施、中层管理和治理框架来支撑这条增长轨迹，仍是未知数。
