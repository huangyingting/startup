      - number: '2.3'
        title: 买方分层与采用模式
        blocks:
          - type: paragraph
            body: >
              反勒索软件方案的主要买方是首席信息安全官（CISO）或安全运营副总裁，通常来自收入超过 $500 million 的企业。预算归属在信息安全科目下；该科目目前平均占总 IT 支出的 13.2%，高于 2020
              年的 8.6%，说明企业 IT 预算持续向安全倾斜。KPMG 2025 年网络安全调查显示，99% 的 CISO 预计会提高安全支出，勒索软件防御被列为前三大优先事项之一。


              勒索软件暴露最高的企业垂直行业推动采用：金融服务、医疗、制造和关键基础设施。医疗机构面对 HIPAA 泄露通知要求，以及医疗系统被加密后的患者安全风险。金融机构面对 OCC、FFIEC 和 SEC
              披露义务带来的监管审查。制造与工业企业因运营中断而成为目标，平均停机成本超过 $5.08 million 的勒索软件事件平均成本。政府和公共部门实体需要满足 CISA
              合规要求，也经常成为国家支持型勒索软件组织的目标。


              用户画像不同于买方：CISO 批准预算，但安全运营中心（SOC）分析师和事件响应团队才是反勒索软件工具的日常使用者。付款方通常是企业 IT
              预算；不过，网络保险承保人越来越多地把勒索软件专项控制证明作为承保条件，使保险公司成为间接付款方，通过保费折扣补贴采用。因此，2025 年规模为 $16.3–26.25 billion
              的网络保险市场，成为专门反勒索软件工具的采用加速器。
