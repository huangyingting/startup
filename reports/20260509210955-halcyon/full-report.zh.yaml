      - number: '3.3'
        title: 相邻与新兴竞争对手
        blocks:
          - type: paragraph
            body: >
              除了直接 EDR/XDR 竞争对手，Halcyon 还面对相邻品类的竞争压力。Rubrik 处于数据安全和勒索软件恢复领域，2025 财年收入 $886.5 million（同比增长 41%），2024 年 4
              月 IPO 后订阅 ARR 达 $1.09 billion。Rubrik 的勒索软件路径聚焦数据保护、不可变备份和网络恢复，而非端点级预防；它与 Halcyon
              的检测加解密路径互补，但也会争夺勒索软件专项预算。Zscaler 用零信任架构预防勒索软件，2025 财年收入 $2.67 billion，ARR 超过 $3 billion，市值约 $42–44
              billion。Zscaler 的 ThreatLabz 2025 Ransomware Report 记录到勒索软件攻击同比激增 146%，进一步强化市场需求。Cybereason 历史上是以运营为中心的
              EDR 竞争对手，2025 年 3 月获 SoftBank 领投 $120 million，但在 2025 年 10 月被 LevelBlue 收购，成为 LevelBlue 整合托管安全服务的一部分；此前
              LevelBlue 还收购了 Trustwave。Cybereason 被并入 LevelBlue，实际上让它退出独立竞争威胁行列，但也说明 EDR 厂商整合正在重塑 Halcyon 的竞争格局。
