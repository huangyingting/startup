      - number: '3.5'
        title: 竞争定位与护城河评估
        blocks:
          - type: paragraph
            body: >
              Halcyon 的主要护城河是勒索软件专项技术栈，尤其是自研密钥捕获引擎和内核级驱动保护；截至 2026 年中，既有 EDR 厂商尚未复制这些能力。这个技术护城河有意义，但边界较窄：CrowdStrike
              每年产生 $1.07 billion 自由现金流，Palo Alto Networks 产生 $3.5 billion 自由现金流；只要市场需求足够，它们有 R&D
              资源去搭建竞争性勒索软件专项模块。Halcyon 的第二道护城河是互补而非替代的定位，降低了与既有 EDR 装机基础的摩擦。Sophos 合作验证了这一路径：一家 Gartner MQ Leader 选择与
              Halcyon 合作，而不是在勒索软件防御上直接竞争。不过，工具疲劳是结构性约束——管理 40–70 个安全工具的 CISO 会抗拒新增点解决方案。Halcyon
              的第三个潜在护城河是数据网络效应：企业部署越多，勒索软件遥测量越大，检测模型越好。但 Halcyon 估计收入只有约 ~$79.5 million，而 CrowdStrike 收入为 $3.95
              billion，遥测差距相当大。最大的竞争风险来自平台整合：CrowdStrike、Microsoft、Palo Alto 和 SentinelOne 把越来越强的勒索软件模块打包进 XDR
              平台，压缩独立反勒索软件工具市场。
