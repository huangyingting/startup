      - number: '2.6'
        title: 要点
        blocks:
          - type: callout
            title: 监管叠加创造非可选的勒索软件防护支出
            body: >
              SEC 四日披露规则、CISA 勒索软件指南、HIPAA 泄露通知和 PCI-DSS
              要求，共同构成跨辖区的勒索软件防护合规底线。这层监管覆盖让上市公司、医疗机构和关键基础设施运营方不能把反勒索软件投资视为可选项，也让核心需求更能抵御预算周期和经济下行。
            calloutType: strength
