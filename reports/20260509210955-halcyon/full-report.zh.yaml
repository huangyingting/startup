      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >
              多家分析机构都在测算勒索软件防护市场，但方法重叠且结论不一。Research and Markets 估计，2025 年全球勒索软件防护市场为 $28.5 billion，2026 年将以 17.2% CAGR
              增至 $33.4 billion。The Business Research Company 从 2025 年 $32.8 billion 出发，给出相近轨迹。Mordor Intelligence 预计市场到
              2030 年达到 $33.15 billion，CAGR 超过 15%。Fortune Business Insights 估算相邻端点安全市场 2025 年规模为 $16.25 billion，CAGR 为
              7–12%；这是反勒索软件工具叠加其上的基础 EPP/EDR 支出。


              Grand View Research 估计，全球勒索软件防护市场到 2030 年将以 17.5% CAGR 增长，核心动力是端点防护需求；该需求在 2024 年占市场份额的
              33.15%。更窄的反勒索软件解决方案细分——小于完整防护市场口径——据 Market Growth Reports 估计，2025 年为 $22.15 billion，到 2032 年将以 10.8% CAGR
              增至 $38.92 billion。


              Gartner 的信息安全支出预测给出了最宽的框架：2025 年为 $213 billion，2026 年增至 $240 billion（增长
              12.5%）；其中安全软件是包含端点防护的板块，也是增长最快的类别，2025 年规模为 $105.9 billion。这些数字构成 Halcyon 市场机会的宏观上限。2025 年全球勒索软件损失合计 $57
              billion，预计 2026 年达到 $74 billion；这一损失规模量化了勒索软件防护支出试图减少的经济损害。
