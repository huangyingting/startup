              直销足迹以北美为中心，不过公司已通过 Dell 和 Cisco 面向日本市场的技术合作启动国际扩张。付费结构以企业直签订阅为主，经 MSSP 和 VAR 中介的占比正在上升。截至 2025 年末，Halcyon
