  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Halcyon 的收入完全来自其反勒索软件端点代理的年度 SaaS 订阅许可。产品按端点、按年订阅销售，定位为现有 EDR/XDR 平台的互补加购，而非替代品。Texas DIR（Department of
              Information Resources）合同公布的目录价显示：Windows 端点 1–99 席为 $55/endpoint/year，100+ 席降至 $35/endpoint/year；云工作负载为
              $75/endpoint/year；Mac 端点为 $75/endpoint/year；Linux 端点为 $50/endpoint/year。Halcyon 还提供托管 Ransomware Detection
              and Recovery（RDR）服务——截至 2025 年初已打包进每次部署——由 Halcyon RISE 团队交付 24/7
              托管检测覆盖，补充订阅收入。公司没有公开披露收入在直销企业客户、渠道合作伙伴（包括日本市场的 Dell 和 Cisco
              合作）或托管服务提供商转售之间的结构。企业合同通常为多年期，但实际成交价相对目录价如何仍未知。公司未披露专业服务、按量计费或交易型收入来源。
