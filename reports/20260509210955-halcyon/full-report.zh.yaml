  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户价值
        blocks:
          - type: paragraph
            body: >
              Halcyon 的 Anti-Ransomware Platform 是专门应对勒索软件攻击的终端安全方案，负责预防、检测和恢复。传统 EDR 把勒索软件当作众多威胁向量之一，Halcyon
              则把整套技术栈都围绕勒索软件防御搭建。平台以轻量终端代理部署在 Windows（Windows 10/11、Server 2012–2022，包括 Core 版本）和 Linux（RHEL、Ubuntu、AWS
              Linux、SUSE） 环境中，可与现有 EDR、SIEM 和备份方案并行运行，不产生代理冲突。Halcyon 的核心客户价值落在三点：用执行前 AI
              检测和欺骗技术阻断勒索软件运行；在攻击过程中捕获加密密钥，自动解密恢复，避免支付赎金；通过 RISE (Rapid Incident Support and Engineering) 团队提供 24/7
              托管式勒索软件检测与恢复（RDR）。平台面向中端市场和企业客户， 包括 Fortune 500 公司和公共部门实体，以缩短驻留时间、压低恢复成本和支持合规带来可量化 ROI。Halcyon
              还叠加勒索软件保障，若防护失效提供财务赔付，因此既是技术工具，也是财务风险缓释工具。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
