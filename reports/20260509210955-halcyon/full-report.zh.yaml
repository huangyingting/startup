          - type: callout
            title: 平台整合压缩独立反勒索软件 TAM
            body: >
              CrowdStrike、Microsoft、Palo Alto Networks 和 SentinelOne 正在积极把勒索软件检测功能打包进自己的 EDR/XDR
              平台。随着这些既有厂商加入行为分析、回滚和密钥拦截等勒索软件专项能力，CISO 为独立反勒索软件层付费的意愿会下降。Halcyon 必须证明检测效果相较打包替代方案有可量化优势，才能守住定价权并避免 TAM
              被压缩。
