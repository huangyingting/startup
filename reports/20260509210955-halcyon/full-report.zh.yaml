      - number: '8.5'
        title: 建议与风险评级
        blocks:
          - type: paragraph
            body: >
              投资建议：中等置信度下观察。Halcyon 在反勒索软件品类的领导地位有吸引力，$1B 估值隐含 12.6x
              收入倍数，对一家高速增长的网络安全纯标的仍在可辩护区间内；零客户损失记录也是强差异化。但建议没有上调到买入，原因有三点：（1）收入数字来自未经审计的第三方估计，没有 GAAP 披露；（2）单点解决方案 vs
              平台化的风险在结构上仍未解决；（3）面对 CrowdStrike 和 Palo Alto 捆绑销售，护城河还没有在多个企业续约周期里经受持久检验。


              风险评级：中高。单点解决方案定位风险、有限财务透明度、资本充足的既有厂商带来的捆绑压力，以及对勒索软件威胁强度持续存在的依赖，共同构成需要持续跟踪的风险画像。强投资人组合、零客户损失记录和顺风市场趋势能缓释风险，因此评级没有升到高。


              估值立场：$1B 估值基本合理。12.6x 的隐含倍数落在可辩护的网络安全成长倍数区间内（行业中位数 7.8x，高增长梯队 13–15x）。该估值不需要激进假设——基准情景下，$140M 年经常性收入（ARR）配
              10x 倍数即可产生回报。主要上行催化剂，是确认经审计收入同比增长高于 60%，并且产品从反勒索软件成功扩展到数据勒索预防。
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 投资建议：中等置信度下观察
            body: >-
              观察 / 有条件买入 — Halcyon 在反勒索软件品类的领导地位有吸引力，$1B 估值隐含温和的 12.6x
              收入倍数，零客户损失记录也是强差异化。但未经审计的财务数据、单点解决方案风险，以及净留存率（NRR）能否长期维持还未验证，因此不能给出高置信度买入建议。拿到经审计年经常性收入（ARR），确认同比增长 >60% 且
              NRR 高于 120% 后，再上调为买入。
            calloutType: recommendation
            claimRefs:
              - CV021
              - CV024
              - CV025
          - type: callout
            title: 平台捆绑是最主要的结构性风险
            body: >-
              CrowdStrike、SentinelOne 和 Palo Alto Networks 都把勒索软件防护纳入平台许可。如果任一厂商在 Halcyon 的自主密钥捕获恢复能力上实现功能对等，支撑 12.6x
              倍数的单点解决方案溢价可能迅速压缩到私募市场中位数 2.6–3.2x，对应 $200–250M 估值。
            calloutType: risk
            claimRefs:
              - CV004
              - CV016
              - CV017
          - type: callout
            title: 零客户损失记录是独特且可防守的护城河
            body: >-
              Halcyon 称没有客户遭遇过重大勒索软件中断、数据外泄或支付赎金，这是一个分量很重的竞争主张。如果能通过独立客户背调验证，这项记录就代表一种可量化的风险转移价值，平台厂商仅靠捆绑无法复制——它需要
              Halcyon 自研的密钥捕获和自主恢复技术。
            calloutType: insight
            claimRefs:
              - CV002
              - CV003
          - type: callout
            title: 上调建议前必须确认收入估计
            body: 本分析依赖第三方对 2025 年约 $79.5M 收入的估计。如果实际经审计收入显著更低（低于 $50M），隐含倍数将超过 20x，估值立场会从合理转向溢价，并要求在 $1B 进入价下调为回避。
            calloutType: assumption
            claimRefs:
              - CV001
              - CV020
