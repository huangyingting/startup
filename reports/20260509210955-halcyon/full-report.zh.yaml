  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与品类定义
        blocks:
          - type: paragraph
            body: >
              勒索软件防护市场涵盖用于预防、检测、遏制并恢复勒索软件攻击的全部产品与服务，覆盖端点、网络、邮件网关和云工作负载。范围包括端点保护平台（EPP）、端点检测与响应（EDR）、专门反勒索软件工具、备份与恢复方案，以及托管检测与响应（MDR）服务。更宽的网络安全支出池构成可寻址上限：Gartner
              预计 2025 年该支出将达到 $212 billion，同比增长 15.1%；勒索软件专项预算从这一大盘中切出。


              Halcyon 的可寻址细分更窄：专门反勒索软件平台，部署在现有 EPP/EDR 技术栈旁边或其上层，提供面向勒索软件的检测、密钥捕获和自动恢复。这一定位排除了通用端点安全（$16.25–22.8 billion
              市场）和更宽的网络安全市场，聚焦企业在基础端点保护之外，为勒索软件韧性额外拨出的增量支出。相邻品类包括 2025 年规模为 $16.3–26.25 billion
              的网络保险；保险通过要求投保人证明反勒索软件控制，间接创造需求。安全运营（SIEM/SOAR）也是相邻品类，可整合勒索软件检测信号。


              专门反勒索软件工具的现状替代方案，是继续依赖 CrowdStrike、SentinelOne、Microsoft Defender 或 Palo Alto Cortex XDR 等现有 EDR/XDR
              平台。这些平台包含勒索软件检测模块，但并非为内核级加密、BYOVD（自带易受攻击驱动）利用，或加密前数据外泄等勒索软件特定攻击链而专门设计。Halcyon 的价值主张在于：通用 EDR
              会漏掉那些专门为绕过行为检测引擎而设计的勒索软件变种。
