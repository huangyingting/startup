      - number: '3.4'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              Halcyon 的竞争差异化落在三项通用 EDR 厂商尚未复制的能力上：自研加密密钥捕获，可在不支付赎金的情况下自动解密勒索软件；Kernel Guard Protection，在内核层阻断
              BYOVD（自带易受攻击驱动）攻击；Data Exfiltration Protection 2.0，在双重勒索场景中检测加密前数据窃取。CrowdStrike 和 SentinelOne
              提供勒索软件回滚（从影子副本恢复加密文件），但不提供用于主动解密的密钥捕获。Palo Alto Cortex XDR 提供跨网络与端点的跨域检测关联，但依赖行为分析，而非勒索软件专项内核钩子。Microsoft
              Defender 的主要优势是分发——它预装在 Windows 端点上——但其勒索软件专项检测依赖需要联网的云端行为分析。Rubrik
              通过不可变备份和备份数据异常检测解决攻击后的恢复阶段，但不提供实时端点检测或密钥捕获。Zscaler 通过零信任交换阻止勒索软件投递，但不在端点层处理投递后的遏制。独立评估中，CrowdStrike 和
              SentinelOne 在 MITRE ATT&CK 评估中取得接近满分的检测得分；Halcyon 的有效性数据则主要来自厂商声明和 Gartner Peer Insights 评论，而不是标准化第三方基准。
