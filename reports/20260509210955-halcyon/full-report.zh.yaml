            title: 独有的密钥捕获技术
            body: Halcyon 在勒索软件攻击发生时拦截加密密钥的专有能力，可以在不支付赎金的情况下自动解密恢复。其他终端安全厂商尚未公开证明自己能大规模做到这一点。
