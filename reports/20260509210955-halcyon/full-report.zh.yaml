      - number: '4.3'
        title: 成本结构与毛利驱动
        blocks:
          - type: paragraph
            body: >
              Halcyon 不披露成本结构、毛利率或运营费用。作为云交付的 SaaS 端点代理，公司收入成本可能包括云基础设施托管、托管 RDR 服务交付（RISE 团队人员），以及客户支持。可比上市网络安全 SaaS
              公司提供了有用基准：CrowdStrike 在 2025 财年 $3.76B 订阅收入上报告 78% GAAP 订阅毛利率（non-GAAP 为 80%）；SentinelOne 2025 财年在 $821.5M
              收入上报告 74% 毛利率。网络安全 SaaS 的行业基准显示，典型订阅毛利率为 75–85%。如果 RISE 团队需要大量人力，Halcyon 的托管 RDR
              服务部分可能把毛利率压低到纯软件同行以下。运营费用可能主要由 R&D（平台和 AI 模型开发）以及销售与营销（企业直销团队和渠道合作项目）构成。公司约 506 名员工、估计收入约 ~$79.5M，对应人均收入约
