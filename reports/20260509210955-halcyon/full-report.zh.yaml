      - number: '7.3'
        title: 技术与威胁演进风险
        blocks:
          - type: paragraph
            body: >
              Halcyon 的核心防御架构依赖拦截勒索软件加密操作并捕获加密密钥——这是一种技术上复杂的做法，前提是勒索软件遵循可检测的加密模式。随着勒索软件运营者演进战术、技术和流程（TTPs），多项技术风险浮现。AI
              驱动攻击正在催生更复杂的规避技术，包括每次执行都改变代码签名的多态勒索软件、完全在内存中运行且不触碰磁盘的无文件勒索软件，以及完全绕过加密、改以威胁公开被盗数据为手段的纯数据外泄攻击。Halcyon 的 Data
              Exfiltration Protection (DXP)
              模块覆盖外泄向量，但这一较新产品面对复杂外泄技术的效果尚未得到独立验证。更大的技术风险在于架构：如果勒索软件运营者从文件加密转向其他勒索方式——例如运营中断、供应链投毒或基于凭据的攻击——Halcyon
              的密钥捕获差异化就会变得不那么相关。没有任何反勒索软件方案能做到 100% 检测；采用新技术的高级勒索软件变种，可能在 Halcyon
              更新算法前短暂逃过检测。公司的内核级代理部署同时带来优势（深层系统可见性）和风险（内核级故障可能造成全系统宕机）。2024 年 7 月 CrowdStrike
              故障表明，内核级安全代理是单点故障：一次有缺陷的更新影响了全球 8.5 million 个系统。虽然 Halcyon 的分阶段部署模型和监控模式上线降低了这一风险，基础架构仍承受同样的内核级敞口。Halcyon
              代理自身的零日漏洞可能被复杂威胁行为者利用，把防御工具变成攻击向量——这种供应链攻击场景已有 SolarWinds Sunburst 事件作为先例。Halcyon 的竞争护城河取决于持续 R&D
              投入，以在快速演进的勒索软件 TTPs 面前保持技术领先，这会带来长期资本强度压力。
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
