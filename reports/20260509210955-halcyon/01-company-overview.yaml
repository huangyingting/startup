company:
  name: Halcyon
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Halcyon is an Austin-based anti-ransomware cybersecurity startup founded in 2021 by Jon Miller and Ryan Smith,
    achieving unicorn status with a $1B valuation after raising $190M through its $100M Series C led by Evolution Equity
    Partners in November 2024. The company's purpose-built platform uses proprietary key-capture technology to enable
    automated ransomware decryption without paying ransoms.
sections:
  - id: identity-and-mission
    title: Identity and Mission
    body: >
      Halcyon is a cybersecurity company headquartered in Austin, Texas, at 5900 Balcones Drive, Suite 5464, Austin, TX
      78731. Founded in 2021, the company is singularly focused on defeating ransomware through a purpose-built
      anti-ransomware platform. Unlike traditional endpoint detection and response (EDR) vendors that treat ransomware
      as one of many threat types, Halcyon's entire technology stack is architected specifically to prevent, detect, and
      recover from ransomware attacks. The company's stated mission is to "make ransomware history" by eliminating it as
      a viable business model for cybercriminals. Halcyon operates as a private company and has grown rapidly from
      stealth to unicorn status in approximately three years. The company's development workforce is primarily remote,
      though it maintains its corporate headquarters in Austin. Halcyon competes in the endpoint security and cyber
      resilience market, differentiating through its ransomware-specific focus and proprietary key-capture decryption
      capabilities.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
    figureRefs:
      - FO002
  - id: founders-and-leadership
    title: Founders and Leadership
    body: >
      Halcyon was co-founded by Jon Miller (CEO) and Ryan Smith (CTO), both veterans of the cybersecurity industry with
      deep offensive and defensive security expertise. Jon Miller previously served as Chief Research Officer at Cylance
      (now part of BlackBerry), co-founded Boldend (a next-generation defense contractor), and was an early employee at
      Accuvant (now Optiv), where he helped build one of the largest cybersecurity consultancies serving the Fortune
      500. He also worked as a penetration tester with ISS X-Force (now IBM). Ryan Smith brings over 25 years of
      cybersecurity experience, having previously served as CTO at Boldend and Exodus Intelligence, Chief Scientist at
      Optiv and Accuvant LABS, and VP of Research at Cylance. He is recognized as an early industry expert on binary
      vulnerabilities and exploitation techniques. The leadership team also includes Aaron Mick as COO, Ryan Golden as
      Chief Brand Officer, Kevin Furgal as General Counsel, Kelly Fiedler as CMO, and Jeff Stclair as Chief Revenue
      Officer. Enrique Salem, Partner at Bain Capital Ventures and former CEO of Symantec, joined the board alongside
      Richard Seewald of Evolution Equity Partners, Ron Gula of Gula Tech Adventures, and Jay Leek of SYN Ventures.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
    tableRefs:
      - TO002
  - id: funding-history
    title: Funding History and Capital Structure
    body: >
      Halcyon has raised approximately $190M across four funding rounds, progressing from seed through Series C in
      roughly two years. The company raised an $18.7M seed round in October 2022, which funded initial product
      development and early go-to-market efforts. In April 2023, Halcyon closed a $50M Series A led by SYN Ventures,
      with participation from Dell Technologies Capital and Corner Ventures. Just eight months later, in December 2023,
      the company secured an oversubscribed $40M Series B led by Bain Capital Ventures, which brought former Symantec
      CEO Enrique Salem onto the board. The Series C, announced November 25, 2024, was a $100M round led by Evolution
      Equity Partners, with participation from Bain Capital Ventures, SYN Ventures, Harmony Group, Corner Capital
      Management, Dropbox Ventures, and ServiceNow Ventures. This round valued Halcyon at $1 billion, achieving unicorn
      status. Richard Seewald, Managing Partner of Evolution Equity Partners, joined the board as part of the
      transaction. The rapid funding cadence — four rounds in approximately 24 months — reflects strong investor
      confidence in the anti-ransomware market opportunity and Halcyon's differentiated technology approach.
    claimRefs:
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
    tableRefs:
      - TO003
    figureRefs:
      - FO001
  - id: scale-and-traction
    title: Scale and Traction Metrics
    body: >
      As of early 2026, Halcyon has scaled to approximately 506 employees, up from an estimated 435 in 2025, reflecting
      continued hiring across engineering, sales, and operations functions. Third-party data aggregators report
      Halcyon's annual revenue at approximately $79.5M as of 2025, though this figure has not been officially confirmed
      by the company and should be treated as an estimate derived from external analytics platforms. Customer count data
      is not publicly disclosed, but the company serves mid-market and enterprise clients across both private and public
      sectors, including Fortune 500 organizations. Halcyon has expanded internationally, including partnerships with
      Dell and Cisco to reach the Japanese market. The company's growth trajectory from founding to unicorn valuation in
      approximately three years positions it among the fastest-growing cybersecurity startups of recent years, though
      precise customer retention and net revenue retention metrics remain undisclosed as a private company.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
    tableRefs:
      - TO001
    figureRefs:
      - FO003
  - id: milestones-and-events
    title: Key Milestones and Events
    body: >
      Halcyon's timeline from founding to unicorn status spans approximately three years of rapid execution. The company
      was founded in 2021 by Jon Miller and Ryan Smith, leveraging their combined experience from Cylance, Boldend, and
      Accuvant. In October 2022, the company raised its $18.7M seed round and began building its anti-ransomware
      platform. The Series A of $50M in April 2023 marked the company's emergence from stealth, followed quickly by the
      $40M Series B in December 2023. Throughout 2024, Halcyon expanded its platform capabilities and customer base,
      culminating in the $100M Series C at a $1B valuation in November 2024. In 2025, the company launched Kernel Guard
      Protection to counter BYOVD attacks, introduced Data Exfiltration Protection 2.0, and added Ransomware Detection
      and Recovery (RDR) as a standard feature in every deployment. Halcyon also established a partnership with Sophos
      for mutual anti-tamper protection and threat intelligence sharing. In 2026, the company showcased its platform at
      RSAC Conference 2026 and continued expanding its product portfolio. Throughout this period, no significant adverse
      events such as layoffs, lawsuits, or regulatory actions have been publicly reported, though the company's rapid
      growth and limited public transparency present typical private-company visibility challenges.
    claimRefs:
