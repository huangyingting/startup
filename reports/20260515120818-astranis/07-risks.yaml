slug: astranis
runDate: '2026-05-15'
company:
  name: Astranis Space Technologies
chapter:
  number: 7
  title: Risks
  summary: Astranis faces a constellation of interrelated risks spanning technical execution, regulatory compliance, partner
    concentration, financial runway, and competitive displacement. The Arcturus satellite anomaly (2023) demonstrated real
    mission-failure risk at scale; the nascent manufacturing ramp and capital-intensive model create financial exposure; FCC
    licensing, ITAR/EAR controls, and PTS-G program risk add regulatory and contractual tail risks. Most mitigations are nascent
    and unverifiable without primary diligence; multiple thesis-break triggers are identified for monitoring.
sections:
- id: SR001
  title: Technical and Operational Risk
  body: 'Astranis''s most material technical risk is demonstrated spacecraft failure. The Arcturus satellite suffered a power
    subsystem anomaly in 2023 that rendered it a total loss, costing CBN Alaska its primary in-orbit asset at a time when
    no backup was available. This event exposed a single-point-of-failure architecture inherent in small-GEO designs: each
    satellite serves a single operator, so anomalies are immediately revenue-impacting rather than fleet-dilutive.


    Second-order operational risks include the manufacturing scale-up. Astranis is transitioning from low-rate initial production
    to higher-throughput multi-satellite builds, which introduces supply-chain fragility, component commonality risk, and
    integration process immaturity. Quality escapes at scale could generate multi-satellite recall scenarios or batch in-orbit
    failures. Additionally, software-defined radio payloads introduce a cyber-attack surface: an adversary compromising the
    mission-management platform could disable commercial or government satellites simultaneously.


    Launch risk is partially mitigated through rideshare with SpaceX Transporter missions, but rideshare delays propagate
    directly to revenue recognition and customer SLAs. The operational track record as of Q1 2026 covers one fully functional
    on-orbit satellite (Omega, serving Alaska via CBN) and one IFC satellite (Anuvu Pacific)—too small a population to statistically
    characterize reliability. Detailed diligence is warranted immediately.'
  tableRefs:
  - TR001
  - TR002
  figureRefs:
  - FR001
- id: SR002
  title: Regulatory, Legal, and Compliance Risk
  body: 'Astranis operates in a heavily regulated environment spanning ITU spectrum coordination, FCC licensing, ITAR/EAR
    export controls, and government-contract compliance. Each represents a distinct risk vector.


    FCC licensing: Astranis holds FCC market-access authorizations for GEO operations from specific orbital slots. Any modification
    to mission parameters (orbit, frequency, power) requires FCC approval, introducing timeline risk for new satellites. Competing
    applications from SpaceX, Amazon, and others for adjacent spectrum create interference coordination delays.


    ITAR/EAR: As a manufacturer of military-grade satellite hardware, all hardware and technical data are likely USML Category
    XV items. The PTS-G contract increases ITAR scrutiny; any unauthorized technical disclosure to foreign nationals—even
    in shared manufacturing facilities—can trigger DDTC enforcement. Historical satellite-sector ITAR penalties have reached
    hundreds of millions of dollars.


    PTS-G contract risk: As a prime contractor, Astranis bears full cost, schedule, and technical performance liability. Cost
    overruns on a fixed-price contract would directly compress margins or require capital infusion. Contract termination for
    convenience by the government—historically not rare in DoD space programs—would eliminate a significant expected revenue
    stream.


    IP risk: The software-defined payload architecture generates claims overlapping with established satellite players including
    ViaSat and SES. No active litigation is publicly known, but freedom-to-operate in SDR payload processing has not been
    publicly confirmed.'
  tableRefs:
  - TR003
  figureRefs:
  - FR002
- id: SR003
  title: Partner, Customer Concentration, and Financial Risk
  body: 'Astranis''s revenue model is highly concentrated. As of early 2026, the company has five named customers and ~10+
    satellites on contract. The top three identifiable customers—CBN Alaska, Anuvu, and Chunghwa Telecom—represent a substantial
    share of existing contracted revenue. Churn by any single anchor customer before the next fundraise would materially compress
    runway.


    Financial risk is compounded by capital intensity. Each satellite requires tens of millions in materials and labor; the
    series-E raise of $455M (2026) provides a runway of several years at current burn, but achieving cash-flow breakeven requires
    manufacturing at scale not yet demonstrated. If per-unit costs do not fall on the learning curve as projected, the company
    will face a choice between raising additional capital at potentially dilutive terms or slowing delivery commitments.


    Supply-chain concentration is a critical dependency risk. Astranis sources solar panels from a single reported supplier,
    and custom-radiation-hardened FPGA components are available from a limited vendor base. Any supplier disruption—particularly
    given export controls on advanced semiconductors—could halt production.


    Talent and execution risk is pronounced. The company is competing for senior RF and space systems engineers in a market
    tightened by SpaceX, Rocket Lab, and large defense primes. Key-person dependencies on the founding team (John Gedmark,
    Trevor Bennett) represent single points of failure for investor and government relationships.'
  tableRefs:
  - TR004
  - TR005
  figureRefs:
  - FR003
