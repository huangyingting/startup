    - 'Thesis break: reliability not proven; pause additional capital deployment'
  - - ITAR enforcement action
    - DDTC consent agreements, Federal Register
    - Any formal DDTC investigation or voluntary disclosure
    - 'Diligence blocker: obtain compliance certification before close'
  - - PTS-G contract termination
    - SAM.gov award modifications, DoD budget press releases
    - Contract T4C or scope reduction > 30%
    - 'Thesis break: government revenue anchor disappears; reforecast revenue model'
  - - Manufacturing cost overrun vs plan
    - Management reporting
    - Per-satellite cost >120% of plan at Series E close
    - Trigger deeper cost audit; re-model unit economics before additional tranches
  - - Key customer churn (CBN or Anuvu)
    - Customer press releases, service filings, capacity broker market
    - Non-renewal or confirmed migration to competitor
    - 'Yellow flag: assess customer concentration metrics; request replacement pipeline data'
  - - Capital-raise failure
    - TechCrunch, PitchBook, press releases in 2026–2027
    - No Series F announcement within 24 months of Series E close at projected burn rate
    - 'Diligence flag: verify runway; assess bridge options'
