summary:
  headline: >-
    Astranis has built the only commercially validated small-GEO dedicated-capacity satellite product with five named
    customers, a government anchor contract (PTS-G), and $455M Series E runway — but the high-risk profile (anomaly
    track record, unproven manufacturing scale, capital intensity, ITAR obligations) and price-sensitive Series E entry
    require completion of five specific diligence items before capital commitment. Recommendation: Conditional Proceed —
    begin primary diligence; do not commit without resolving insurance, manufacturing yield, PTS-G terms, ITAR audit,
    and IP freedom-to-operate.
