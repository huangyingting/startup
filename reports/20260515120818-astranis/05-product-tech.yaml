- id: FE001
  title: Astranis MicroGEO Product Architecture Stack
  type: stack
  data:
    layers:
    - label: 'Customer Value: Sovereign Connectivity Infrastructure'
      detail: Dedicated national broadband or government communications with full capacity exclusivity and long-term service
        guarantee (10–15 yr)
    - label: 'Operations Layer: Ground Software and TT&C'
      detail: Proprietary Astranis platform for 24/7 satellite monitoring, payload management, and in-orbit firmware updates
        from San Francisco operations centre
    - label: 'Payload Layer: Software-Defined Radio (Ka-band)'
      detail: Custom FPGA/ASIC DSP with digital beamforming; 5–8 Gbps (Gen 1) or 50 Gbps (Gen 2); in-orbit waveform and frequency
        reconfiguration
    - label: 'Satellite Bus: Power, Attitude Control, Propulsion'
      detail: Solar power array + battery; three-axis stabilisation; Impulse Space propulsion for GTO-to-GEO transfer; ~400
        kg total mass
    - label: 'Launch Platform: SpaceX Falcon 9 Rideshare (GTO)'
      detail: Commercial rideshare to geostationary transfer orbit; Impulse Space kick-stage for final GEO circularisation;
        ~3–6 months to operational orbit
