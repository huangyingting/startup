chapter:
  number: 5
  title: Product and Technology
  summary: Astranis builds MicroGEO satellites weighing approximately 400 kg that deliver 5–8 Gbps (Gen 1) or up to 50 Gbps
    (Gen 2) of dedicated Ka-band broadband capacity. The core technology differentiator is a software-defined radio (SDR)
    payload that is reprogrammable in orbit, enabling waveform updates, spectrum reassignment, and anomaly recovery without
    hardware replacement. Astranis manufactures 70% of satellite components in-house at its 153,000 sq ft San Francisco facility,
    achieving a 12-month build-to-orbit cycle. The platform has demonstrated on-orbit firmware-update capability (Arcturus
    2023 recovery), Ka-band FCC licensing, and commercial service for five distinct customers. Key dependencies include Ka-band
    spectrum licensing, Impulse Space propulsion, SpaceX launches, and a US export control / ITAR compliance framework that
    governs technology transfer.
