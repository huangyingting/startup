sections:
- id: SE-product-definition
  title: Product Definition and Customer Value Proposition
  body: 'Astranis delivers a vertically integrated satellite connectivity service: the customer receives a dedicated geostationary
    satellite built to their national or regional coverage requirements, operated by Astranis under a long-term managed-service
    arrangement. The product is not a spectrum lease or a capacity sublease on a shared satellite — it is a custom-built small-GEO
    asset designed, manufactured, launched, and operated specifically for one customer. The customer outcome is sovereign
    broadband infrastructure with dedicated bandwidth: a national telco gets a satellite that serves only their subscribers;
    a government gets a satellite only its agencies can access; a connectivity provider like Anuvu gets a satellite whose
    full capacity it controls for resale to airline passengers. Astranis'' Gen 1 platform (MicroGEO / UtilitySat) delivers
    5–8 Gbps of Ka-band capacity from a 400 kg satellite; the Gen 2 platform targets 50 Gbps at similar mass. Five missions
    are on orbit as of May 2026 serving Tonga/Pacific Islands (MB Group), Philippines (DITO), Alaska (CBN), in-flight connectivity
    (Anuvu), and the US DoD (PTS-G program). The key customer value drivers are lead time (12 months vs. 3–7 years for traditional
    GEO), cost efficiency (~$60–100M all-in vs. $330–550M), and sovereignty (dedicated asset, not shared capacity).'
  tableRefs:
  - TE001
  - TE002
  figureRefs:
  - FE001
  sourceRefs:
  - SE001
  - SE009
  - SE018
  - SE022
- id: SE-architecture-manufacturing
  title: Platform Architecture and Manufacturing
  body: The Astranis MicroGEO satellite bus is designed around a software-defined radio payload as the primary differentiator.
    The SDR payload combines custom FPGA/ASIC-based digital signal processing with digital beamforming to enable in-orbit
    frequency reassignment, waveform updates, and beam shaping without physical hardware modification. This reconfigurability
    proved operationally critical during the Arcturus anomaly (2023), where a power management firmware update resolved a
    power conditioning issue that would have permanently disabled a traditional satellite. The satellite bus subsystems include
    Ka-band phased array antennas, solar power generation and battery storage, propulsion (integrated with Impulse Space for
    GEO circularisation), attitude control, and a radiation-tolerant computer. Ground operations use a proprietary software
    platform for telemetry, command, control, and payload management, with some open-source utilities published on GitHub.
    Astranis manufactures approximately 70% of components in-house at its 153,000 sq ft San Francisco facility, targeting
    24 satellites per year by 2026. The remaining 30% of procured components includes RF parts, solar panels, batteries, and
    structural elements from aerospace suppliers. The UtilitySat variant introduced in 2023 standardised and simplified the
    platform, reducing assembly time and component count. Launch is via SpaceX Falcon 9 rideshare to GTO, followed by Impulse
    Space kick-stage propulsion for GEO orbit insertion, a 3–6 month sequence after launch.
  tableRefs:
  - TE003
  figureRefs:
  - FE002
  - FE003
  sourceRefs:
  - SE002
  - SE003
  - SE005
  - SE007
  - SE011
  - SE012
  - SE017
  - SE021
- id: SE-differentiation-ip
  title: Technology Differentiation and Intellectual Property
  body: 'Astranis'' technology moat rests on four pillars: (1) SDR payload IP — custom digital beamforming algorithms and
    in-orbit reconfigurability firmware developed over 10+ years; (2) in-house manufacturing process know-how — 70% vertical
    integration enabling the 12-month lead time that traditional satellite integrators cannot match; (3) regulatory assets
    — FCC Ka-band GEO spectrum licences for multiple orbital slots, which require years of ITU coordination and FCC review
    to replicate; and (4) operational data — multi-mission experience managing five distinct satellites for sovereign and
    government customers. Patent filings at the USPTO (including applications for reconfigurable satellite payload and digital
    beamforming methods) provide some IP protection, though the full patent portfolio is not publicly disclosed. The competitive
    threat is that large primes (Airbus, Boeing, Northrop) and SDR specialists (Kratos, Comtech) could develop competing small-GEO
    SDR platforms with larger R&D budgets, though replicating Astranis'' system-level integration, manufacturing speed, and
    orbital slot portfolio requires years of parallel investment. SDR technology is increasingly commoditised at the component
    level, so Astranis must continue to advance its system-level integration advantage, particularly in Gen 2 DSP performance.'
  tableRefs:
  - TE004
  figureRefs:
  - FE004
  sourceRefs:
  - SE004
  - SE010
  - SE015
  - SE016
  - SE020
- id: SE-trust-compliance
  title: Deployment, Reliability, Trust, and Compliance
  body: Astranis' five-mission operational track record provides the most direct evidence of product reliability; the Arcturus
    anomaly resolution via firmware update is both a risk event (a satellite malfunctioned) and a validation event (software-defined
    architecture enabled recovery without hardware replacement). Customer deployments span four distinct regulatory regimes
    (Pacific Islands, Philippines, Alaska/US, and DoD/classified), demonstrating Astranis' ability to navigate multi-jurisdictional
    regulatory requirements. All Astranis satellite technology is subject to ITAR (International Traffic in Arms Regulations),
    which restricts transfer of satellite hardware and software to foreign nationals; managing ITAR compliance in international
    commercial deployments adds overhead but also provides a barrier to entry for foreign-owned competitors. The PTS-G program
    requires Astranis to satisfy DoD cybersecurity frameworks (likely CMMC Level 3 or equivalent) and government satellite
    security standards. FCC Ka-band licence obligations require ongoing coordination compliance. No public disclosure of AS9100
    aerospace quality certification has been made, which is a diligence gap for institutional investors evaluating manufacturing
    process maturity. Support for in-orbit satellites includes 24/7 telemetry monitoring, firmware update capability, and
    customer-facing SLA commitments on capacity availability.
  tableRefs:
  - TE005
  figureRefs: []
  sourceRefs:
  - SE013
  - SE019
  - SE022
  - SE025
  - SE026
