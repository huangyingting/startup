sections:
  - id: section-1
    title: Identity, mission, and operating model
    body: >-
      Astranis Space Technologies is a San Francisco-based satellite manufacturer founded in 2015 by
      John Gedmark (CEO) and Ryan McLinko (CTO). The company's core thesis is that broadband connectivity
      for developing markets, island nations, and enterprises is constrained by the high cost, long lead
      times, and oversized capacity of traditional geostationary orbit (GEO) satellites—and that a small,
      dedicated MicroGEO satellite weighing roughly 400 kg can address each of these bottlenecks
      simultaneously. Rather than selling access to a shared constellation, Astranis sells dedicated
      satellite capacity: each customer gets their own satellite, parked over their geography, providing
      throughput that is not shared with any third party. This dedicated model is philosophically and
      commercially distinct from both Starlink's mass-market LEO approach and from traditional GEO
      operators like SES or Intelsat.

      The business model flows from satellite hardware and operations into long-duration satellite
      services contracts. Customers—typically national telecoms, satellite operators, enterprise
      broadband providers, and increasingly government and defense clients—contract for a dedicated
      satellite and the service it delivers. Astranis retains operational responsibility during the
      satellite's life. This services wrapper means revenue is spread over multi-year contracts rather
      than recognized as a single hardware sale, analogous to an aircraft lessor's economics. As of
      May 2026, Astranis states it has sold more than $1 billion in satellite services (total contracted
      value), with five satellites on orbit, five in production, and more than ten on contract.

      The company operates from a 153,000 square foot Northern California facility where it manufactures
      approximately 70% of components in-house. This vertical integration reduces lead time, maintains
      cost discipline, and gives Astranis tighter control over supply chain risk than a pure systems
      integrator approach. The target production capacity of 24 satellites per year would represent a
      significant ramp from current throughput and is the operational proof point that the 100-by-2030
      plan requires.
    claimRefs: [CO001, CO006, CO007, CO011, CO012, CO037, CO038, CO042]
    tableRefs: [TO001]
    figureRefs: [FO003]
  - id: section-2
    title: Founders, leadership, and governance
    body: >-
      Astranis was co-founded by John Gedmark and Ryan McLinko, who serve as CEO and CTO respectively.
      Both remain active in their roles as of May 2026. The leadership team has been significantly
      reinforced since 2024 with a wave of experienced C-suite hires: Mark Mesler (CFO, ex-Archer
      Aviation and Bloom Energy), Matt Long (General Counsel, ex-Palantir first GC who scaled that
      company's legal function from 100 to 3,000 employees), and Shane Noe (SVP People, ex-ClickUp
      and Okta)—all hired simultaneously on September 22, 2025. This cluster of senior hires is a
      common pattern for late-stage private companies preparing for either major customer scaling or
      a public market transition.

      The appointment of General (Ret.) John E. Hyten as Strategic Advisory Board chairman in March
      2026 is strategically significant. Hyten served as Vice Chairman of the Joint Chiefs of Staff
      and as commander of U.S. Strategic Command—arguably the most senior military role in nuclear and
      strategic deterrence. His joining an early-stage satellite commercial company reflects both
      Astranis' defense ambitions and the broader defense-tech investor thesis that military
      procurement will flow to commercial satellite providers capable of delivering resilient, low-cost,
      rapidly deployable capacity.

      Governance remains founder-controlled given the private nature of the company. Key-person
      concentration risk around CEO Gedmark is material: Astranis' strategy, customer relationships,
      and investor confidence have been built around his leadership through multiple adverse events,
      including the Arcturus failure in 2023. The simultaneous hiring of a CFO, GC, and CHRO in
      September 2025 suggests preparation for greater financial rigor and potential future liquidity
      events, but also reflects that the company was previously thin on these functions given its
      relative scale.
    claimRefs: [CO002, CO003, CO020, CO021, CO022, CO023, CO024]
    tableRefs: [TO002]
  - id: section-3
    title: Capital base, funding history, and investor map
    body: >-
      Astranis has raised more than $1.2 billion in total across its equity and debt financing rounds
      since founding. The most recent round, a $455 million Series E package closed in May 2026,
      consists of $300 million in equity co-led by Snowpoint Ventures and Franklin Templeton—two
      institutional investors with deep capital markets experience—plus a $155 million delayed-draw
      credit facility from Trinity Capital. Wilson Sonsini Goodrich & Rosati served as legal counsel
      on this transaction. The post-money valuation of $2.8 billion was reported by SpaceNews citing
      a source close to the deal, making it the first independent third-party valuation confirmation
      for the company.

      The investor roster is notable for its institutional breadth: the Series D (July 2024, $200M,
      led by Andreessen Horowitz Growth Fund, co-led by BAM Elevate/Balyasny) added blue-chip crossover
      institutional investors—BlackRock, Fidelity, and Baillie Gifford—who typically participate in
      pre-IPO rounds. Their continued presence in the Series E reinforces that the investor base is
      anchored by long-duration institutional capital rather than purely venture capital. Chunghwa
      Telecom's $115M strategic investment added a customer-investor dynamic with Taiwan exclusivity
      rights, though the precise structure (equity stake, convertible note, or revenue-sharing agreement)
      is not fully confirmed from public sources.

      The $155M Trinity Capital debt facility is a meaningful complication. At a pre-revenue-positive
      stage, debt covenants add operating constraints, and the "delayed-draw" structure suggests the
      funds will be drawn in tranches as production milestones are met. The terms, interest rate, and
      covenant structure are not publicly disclosed and represent a material diligence item.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO025, CO034, CO036]
    tableRefs: [TO003]
  - id: section-4
    title: Milestones, adverse events, and competitive context
    body: >-
      Astranis' milestone history runs from founding in 2015 through the first SpaceX launch agreement
      in August 2019, initial satellite launches in 2023, rapid multi-satellite deployment in December
      2024, and the Series E in May 2026. The most consequential adverse event is the Arcturus solar
      array drive assembly failure in July 2023: Arcturus (AK1) was Astranis' first commercial
      satellite, launched on a SpaceX Falcon Heavy alongside ViaSat-3 (which itself suffered a $420
      million insurance write-down for an unrelated antenna failure). The Arcturus failure reduced
      power output and limited the satellite's commercial value. Pacific Dataport, the original
      Astranis customer for Alaska broadband, now shows Starlink and OneWeb as its connectivity
      partners—suggesting possible customer attrition following the technical incident. Astranis
      responded by developing the UtilitySat multi-mission platform and accelerating the Omega Gen 2
      roadmap.

      The recovery trajectory from 2023 to 2026 is impressive: four satellites launched in a single
      Falcon 9 mission in December 2024, Anuvu's private GEO network going live in August 2025, PTS-G
      prime contractor designation from the U.S. Space Force in August 2025, and the Series E in May
      2026. This recovery narrative—and the defense pivot—define the current investment thesis. The
      addition of the Impulse Space 2027 direct-inject mission also signals an intent to diversify
      launch providers beyond SpaceX.

      Against the competitive backdrop, Astranis sits in a unique niche: it is not competing against
      Starlink for mass-market broadband, but rather for the dedicated national or enterprise broadband
      capacity market that traditional GEO operators have historically served with much larger, more
      expensive satellites. Traditional operators face 3-7 year lead times and $200-400M satellites;
      Astranis offers under-12-month replacement timelines and a far smaller capital commitment per
      satellite. This positioning is defensible as long as capacity per dollar continues to improve
      through Omega (50 Gbps Gen 2) and UtilitySat multi-mission variants.
    claimRefs: [CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO033, CO035, CO039, CO040, CO041, CO042, CO043, CO044, CO045, CO046, CO047]
    tableRefs: [TO004]
    figureRefs: [FO001, FO002]
