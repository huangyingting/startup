chapter:
  number: 1
  title: Company Overview
  summary: >-
    Astranis Space Technologies is a San Francisco-based satellite manufacturer founded in 2015 that
    builds small geostationary orbit (MicroGEO) satellites for dedicated national broadband. With
    five satellites on orbit, five in production, and more than ten on contract, Astranis has
    demonstrated it can manufacture and operate small GEO satellites at commercially viable scale.
    The company raised a $455M Series E package in May 2026 (valuing it at $2.8B) and has assembled
    a defense-credentialed executive team to pursue US Space Force and broader government contracts
    alongside its commercial telecom pipeline. Its MicroGEO platform addresses a gap between mass-market
    LEO constellations and traditional multi-ton GEO satellites, offering dedicated national capacity
    at dramatically lower cost and faster lead time.
