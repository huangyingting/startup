  title: Market Analysis
  summary: >-
    Astranis operates in the global satellite communications market, targeting the dedicated GEO
    broadband segment within a total satellite comms market of $90.3B (2024) growing at 10.2% CAGR
    to $159.6B by 2030. The serviceable market for dedicated small-GEO capacity—national broadband,
    sovereign connectivity, and government/defense tactical comms—is estimated at $8–15B, with Astranis
    claiming $1B+ in contracted services already secured. Key demand drivers include unserved rural and
    maritime markets, national telecom sovereignty concerns, defense budget expansion, and the cost
    advantage of small-GEO versus traditional multi-ton GEO solutions. Constraints include GEO orbital
    slot scarcity, ITU coordination complexity, and competition from LEO constellations for some use
    cases.
