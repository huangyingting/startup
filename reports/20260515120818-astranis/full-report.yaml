      - number: '8.3'
        title: Scenarios, Exit Readiness, and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Bull case (~25% probability): Astranis delivers 5–7 satellites on the current backlog without anomaly,
              PTS-G expands to a second contract lot, manufacturing cost falls below $40M/satellite, and the company
              raises a Series F at $6B+ ahead of a strategic acquisition by a defense prime or major telco operator.
              Exit multiple: 6–8x EV/revenue on $800M–1B projected revenue at delivery run rate.


              Base case (~50% probability): Astranis delivers 3–5 satellites by 2028, achieves PTS-G milestone 1, grows
              contracted revenue to $400–600M, raises Series F at $3–5B. Exit via strategic M&A (Lockheed, Northrop,
              L3Harris) or IPO in 2029–2031. Returns to Series E investors: 1.5–2.5x.


              Bear case (~25% probability): Second satellite anomaly, PTS-G program slip, or macro-driven capital
              drought triggers a down-round Series F at $1.5B or restructuring. Returns to Series E investors: 0.3–0.8x.
              Thesis-break if anomaly occurs within 18 months of the next satellite commissioning.


              Exit readiness: Astranis is not yet exit-ready for IPO given the limited operating history and unproven
              manufacturing scale; strategic acquisition is the more likely exit path. Defense prime acquirers
              (Northrop, L3Harris, Leidos) or large commercial satellite operators (SES, Intelsat, Viasat) are natural
              buyers. The PTS-G contract significantly increases defense-acquisition appeal.


              Final diligence asks are structured to resolve the five thesis-blocking uncertainties before committing
              capital.
