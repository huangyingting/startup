      - number: '4.4'
        title: Financial Verdict and Diligence Blockers
        blocks:
          - type: paragraph
            body: >-
              Astranis occupies an attractive position in the satellite infrastructure investment landscape: its
              dedicated-capacity model generates long-term, recurring, hard-to-cancel revenue from creditworthy
              sovereign and government customers, providing high revenue quality once contracts are on orbit. The
              company's manufacturing cost advantage versus legacy GEO is credible and company-validated, though not
              independently audited. The primary financial risk is capital intensity: building and launching each
              satellite requires USD 60–100M before any recurring revenue is recognised, and the pipeline of 7+
              additional satellites requires substantial further capital. Revenue concentration risk is elevated, with
              any single satellite failure or delay representing a significant portion of near-term revenue. The
              Arcturus satellite malfunction in 2023, resolved via firmware update, demonstrated that operational risk
              is material but manageable. The adverse scenario concern is that if the Series F or project finance round
              is delayed while burn continues, runway risk becomes acute within 18 months. Key diligence blockers
              include: (1) actual revenue and ARR not publicly disclosed; (2) contract backlog composition and
              counterparty creditworthiness; (3) DoD PTS-G contract value and payment schedule; and (4) manufacturing
              cost variance between company claims and actual build costs.
