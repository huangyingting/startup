chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >-
              Astranis Space Technologies is a San Francisco-based satellite manufacturer founded in 2015 by John
              Gedmark (CEO) and Ryan McLinko (CTO). The company's core thesis is that broadband connectivity for
              developing markets, island nations, and enterprises is constrained by the high cost, long lead times, and
              oversized capacity of traditional geostationary orbit (GEO) satellites—and that a small, dedicated
              MicroGEO satellite weighing roughly 400 kg can address each of these bottlenecks simultaneously. Rather
              than selling access to a shared constellation, Astranis sells dedicated satellite capacity: each customer
              gets their own satellite, parked over their geography, providing throughput that is not shared with any
              third party. This dedicated model is philosophically and commercially distinct from both Starlink's
              mass-market LEO approach and from traditional GEO operators like SES or Intelsat.

              The business model flows from satellite hardware and operations into long-duration satellite services
              contracts. Customers—typically national telecoms, satellite operators, enterprise broadband providers, and
              increasingly government and defense clients—contract for a dedicated satellite and the service it
              delivers. Astranis retains operational responsibility during the satellite's life. This services wrapper
              means revenue is spread over multi-year contracts rather than recognized as a single hardware sale,
              analogous to an aircraft lessor's economics. As of May 2026, Astranis states it has sold more than $1
              billion in satellite services (total contracted value), with five satellites on orbit, five in production,
              and more than ten on contract.

              The company operates from a 153,000 square foot Northern California facility where it manufactures
              approximately 70% of components in-house. This vertical integration reduces lead time, maintains cost
              discipline, and gives Astranis tighter control over supply chain risk than a pure systems integrator
              approach. The target production capacity of 24 satellites per year would represent a significant ramp from
              current throughput and is the operational proof point that the 100-by-2030 plan requires.
