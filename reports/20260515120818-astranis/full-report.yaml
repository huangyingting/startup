figures:
  - id: FO001
    title: Astranis Company Milestone Timeline (2015–2026)
    type: timeline
    data:
      items:
        - date: '2015'
          label: Astranis Founded
          details: John Gedmark and Ryan McLinko found Astranis in San Francisco to build MicroGEO satellites.
          tone: positive
          claimRefs:
            - CO001
            - CO046
        - date: Aug 2019
          label: First SpaceX Launch Deal
          details: Astranis signs its first launch agreement with SpaceX; Pacific Dataport Alaska contract announced.
          tone: positive
          claimRefs:
            - CO047
        - date: May 2023
          label: Arcturus Launched (Falcon Heavy)
          details: First commercial MicroGEO satellite launched; Astranis reaches geostationary orbit.
          tone: positive
          claimRefs:
            - CO026
        - date: Jul 2023
          label: Arcturus Solar Array Failure
          details: Solar array drive assembly failure reported; operational capability reduced; Pacific Dataport impacted.
          tone: negative
          claimRefs:
            - CO027
            - CO032
        - date: Jul 2024
          label: 'Series D: $200M'
          details: a16z leads $200M Series D, joined by BlackRock, Fidelity, Baillie Gifford, BAM Elevate.
          tone: positive
          claimRefs:
            - CO018
            - CO019
        - date: Dec 2024
          label: Four Satellites Launched Simultaneously
          details: SpaceX Falcon 9 launches four Astranis satellites in a single mission to GEO.
          tone: positive
          claimRefs:
            - CO031
        - date: Aug 2025
          label: Anuvu Private GEO Network Live
          details: Two Astranis satellites power first privately operated MicroGEO broadband network for Anuvu.
          tone: positive
          claimRefs:
            - CO028
        - date: Aug 2025
          label: US Space Force PTS-G Prime Contractor
          details: Astranis selected as prime contractor for Proliferated Tactical Support Ground program.
          tone: positive
          claimRefs:
            - CO029
            - CO030
        - date: Sep 2025
          label: C-Suite Expansion
          details: CFO, General Counsel, and SVP People hired simultaneously; defense and scale preparation.
          tone: positive
          claimRefs:
            - CO020
            - CO021
            - CO022
        - date: Mar 2026
          label: Gen. Hyten Joins Advisory Board
