      - number: '1.3'
        title: Capital base, funding history, and investor map
        blocks:
          - type: paragraph
            body: >-
              Astranis has raised more than $1.2 billion in total across its equity and debt financing rounds since
              founding. The most recent round, a $455 million Series E package closed in May 2026, consists of $300
              million in equity co-led by Snowpoint Ventures and Franklin Templeton—two institutional investors with
              deep capital markets experience—plus a $155 million delayed-draw credit facility from Trinity Capital.
              Wilson Sonsini Goodrich & Rosati served as legal counsel on this transaction. The post-money valuation of
              $2.8 billion was reported by SpaceNews citing a source close to the deal, making it the first independent
              third-party valuation confirmation for the company.

              The investor roster is notable for its institutional breadth: the Series D (July 2024, $200M, led by
              Andreessen Horowitz Growth Fund, co-led by BAM Elevate/Balyasny) added blue-chip crossover institutional
              investors—BlackRock, Fidelity, and Baillie Gifford—who typically participate in pre-IPO rounds. Their
              continued presence in the Series E reinforces that the investor base is anchored by long-duration
              institutional capital rather than purely venture capital. Chunghwa Telecom's $115M strategic investment
              added a customer-investor dynamic with Taiwan exclusivity rights, though the precise structure (equity
              stake, convertible note, or revenue-sharing agreement) is not fully confirmed from public sources.

              The $155M Trinity Capital debt facility is a meaningful complication. At a pre-revenue-positive stage,
              debt covenants add operating constraints, and the "delayed-draw" structure suggests the funds will be
              drawn in tranches as production milestones are met. The terms, interest rate, and covenant structure are
              not publicly disclosed and represent a material diligence item.
