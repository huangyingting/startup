      - number: '2.2'
        title: Market sizing and growth drivers
        blocks:
          - type: paragraph
            body: >-
              Multiple analyst sources confirm the satellite communications market's growth trajectory, though estimates
              diverge on the scope. Grand View Research's $90.3B (2024) base with 10.2% CAGR is the most frequently
              cited figure, corroborated directionally by Mordor Intelligence and MarketsandMarkets forecasts with 8–12%
              CAGR ranges. The key growth drivers are structural: GSMA Intelligence counts 2.6 billion people still
              unconnected globally, largely in geographies where satellite is the only viable infrastructure option;
              NTIA's Internet for All program and analogous international broadband mandates create government-backed
              demand stimulus; and defense agencies—particularly the US Space Force—are expanding commercial satellite
              communications budgets in the FY2027 request to support distributed tactical operations.

              The government and defense segment is the fastest-growing vertical. US Space Force FY2027 budget documents
              show increased appropriations for commercial satellite communications, consistent with the broader
              defense-tech industry thesis that military procurement will flow to commercial providers capable of
              delivering rapidly deployable, resilient capacity. For Astranis, this means PTS-G and similar government
              programs represent a recurring, durable revenue opportunity rather than one-time contract wins.

              On the commercial side, in-flight connectivity is a high-value niche. Aviation Week estimates the IFC
              market will grow through 2030 as airlines restore capacity and upgrade to premium bandwidth. Anuvu's
              two-satellite dedicated MicroGEO network—the world's first small-GEO-powered private broadband
              network—demonstrates real-world commercial adoption of the model. The market also benefits from secular
              geopolitical tailwinds: Taiwan Strait tensions and Eastern European conflict have elevated awareness of
              satellite communications resilience among sovereign customers, creating incremental demand for dedicated,
              nationally controlled capacity.
