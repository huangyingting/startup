      - number: '1.2'
        title: Founders, leadership, and governance
        blocks:
          - type: paragraph
            body: >-
              Astranis was co-founded by John Gedmark and Ryan McLinko, who serve as CEO and CTO respectively. Both
              remain active in their roles as of May 2026. The leadership team has been significantly reinforced since
              2024 with a wave of experienced C-suite hires: Mark Mesler (CFO, ex-Archer Aviation and Bloom Energy),
              Matt Long (General Counsel, ex-Palantir first GC who scaled that company's legal function from 100 to
              3,000 employees), and Shane Noe (SVP People, ex-ClickUp and Okta)—all hired simultaneously on September
              22, 2025. This cluster of senior hires is a common pattern for late-stage private companies preparing for
              either major customer scaling or a public market transition.

              The appointment of General (Ret.) John E. Hyten as Strategic Advisory Board chairman in March 2026 is
              strategically significant. Hyten served as Vice Chairman of the Joint Chiefs of Staff and as commander of
              U.S. Strategic Command—arguably the most senior military role in nuclear and strategic deterrence. His
              joining an early-stage satellite commercial company reflects both Astranis' defense ambitions and the
              broader defense-tech investor thesis that military procurement will flow to commercial satellite providers
              capable of delivering resilient, low-cost, rapidly deployable capacity.

              Governance remains founder-controlled given the private nature of the company. Key-person concentration
              risk around CEO Gedmark is material: Astranis' strategy, customer relationships, and investor confidence
              have been built around his leadership through multiple adverse events, including the Arcturus failure in
              2023. The simultaneous hiring of a CFO, GC, and CHRO in September 2025 suggests preparation for greater
              financial rigor and potential future liquidity events, but also reflects that the company was previously
              thin on these functions given its relative scale.
