              - CV007
      - number: '8.2'
        title: Valuation Context and Comparable Analysis
        blocks:
          - type: paragraph
            body: >-
              Astranis raised $455M in its Series E (Q1 2026), which press reports suggest values the company at
              approximately $2.5–3.5B post-money. No public cap-table data confirms this; estimates are derived from
              reported raise size and leaked commentary on ownership percentages. For context:


              Revenue-based valuation: If the 10+ satellite backlog represents $500–700M in contracted revenue (at
              estimated $50–70M per satellite), and applying a 4–7x revenue multiple comparable to growth-stage
              aerospace/defense primes, the implied enterprise value is $2–5B. Margin compression risk and capital
              intensity justify the lower end of the range absent confirmed delivery milestones.


              Comparable transactions: SES and Intelsat traded at 4–6x EV/revenue in pre-distress periods; SpaceX
              Starlink's internal valuation implied 20–30x revenue multiples but with >3,000 satellites in orbit, which
              is not comparable. Telesat LEO raised at ~$5B pre-money before execution challenges compressed
              expectations. The most comparable private transaction is Astroscale's post-Series F valuation (~$1.5B for
              a smaller market), suggesting Astranis at $3B is defensible if manufacturing ramp proceeds as planned.


              Adverse valuation context: Euroconsult notes that commercial satellite finance multiples compressed 30–40%
              from 2021 peak to 2025 as macro rates rose and LEO competition intensified. A down-round scenario if the
              next capital raise occurs in a weakened macro environment or after a program setback is a real risk
              horizon. Public market analogues (Viasat post-Inmarsat acquisition; SES post-O3b acquisition) show that
              satellite integration complexity often pressures valuations below pre-acquisition marks.
            claimRefs: []
          - type: table
            tableRef: TV003
