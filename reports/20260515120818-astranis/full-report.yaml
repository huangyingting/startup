  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >-
              Astranis generates revenue through long-term dedicated satellite capacity contracts: a national telco,
              ISP, or government agency pays for exclusive use of a custom-built small-GEO satellite parked over their
              territory. Each satellite delivers approximately 5–8 Gbps of broadband capacity (Gen 1) or up to 50 Gbps
              (Gen 2), providing the customer with sovereign connectivity infrastructure for a 10–15 year operational
              lifespan. The revenue model is most analogous to a capital lease or an infrastructure-as-a-service
              arrangement where the satellite is designed, built, and delivered to geostationary orbit on a fixed-price
              basis, after which recurring in-orbit operations, firmware updates, and spectrum management generate
              ongoing service fees. Customers include Chunghwa Telecom (Taiwan), DITO Telecommunity (Philippines), CBN
              (Alaska), Connect Tonga (Pacific Islands), Anuvu (in-flight connectivity), and the US DoD via the PTS-G
              program. Contract values are not publicly disclosed, but comparable small-GEO capacity agreements
              historically range from USD 10–30M per year per satellite. With five satellites on orbit as of 2025 and a
              pipeline of follow-on contracts, Astranis' annualised addressable in-service revenue is estimated at USD
              50–125M. A secondary revenue stream arises from US government contracts under the PTS-G program, which are
              classified and not independently verifiable. Astranis has also announced a future "as-a-service" capacity
              marketplace model where residual capacity on existing satellites could be sold to third-party enterprise
              or carrier customers, providing optionality beyond anchor contracts.
