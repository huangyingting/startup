      - number: '2.3'
        title: Buyer, user, and payer segmentation
        blocks:
          - type: paragraph
            body: >-
              The dedicated GEO broadband market exhibits a clear buyer typology. National telecom operators are the
              primary commercial buyers: companies like Chunghwa Telecom (Taiwan), RATTAN (Philippines), and MB Group
              (Oman) are national operators seeking to own capacity over their home geography. Their budget ownership is
              at the C-suite level, with capital expenditure decision cycles of 12–24 months. The adoption trigger is
              typically a capacity gap that cannot be economically filled by either LEO constellations (cost, latency,
              coverage) or traditional large GEO (cost, lead time).

              Government and defense agencies represent a distinct buyer type with higher per-unit willingness to pay
              and less price sensitivity. The US Space Force PTS-G prime contractor designation places Astranis directly
              in the defense procurement pipeline, where contract cycles are longer but more durable and revenue is
              protected by annual appropriations. NASA and other government bodies with connectivity requirements in
              remote or contested environments also represent potential buyers.

              In-flight connectivity providers (Anuvu) and enterprise connectivity operators are the third segment.
              These buyers value throughput consistency and coverage guarantees over a specific airline route geography,
              which dedicated GEO handles better than LEO shared capacity over variable paths. The switching cost after
              satellite launch is very high—a dedicated satellite is a multi-year infrastructure commitment—creating
              durable revenue but also a lengthy acquisition process. All three buyer types show low overlap with SpaceX
              Starlink's mass-market consumer broadband positioning, though Starlink Business and government contracts
              create limited competitive overlap at the low end of Astranis' SAM.
            claimRefs:
              - CM009
              - CM010
              - CM013
              - CM014
