  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Market Demand
        blocks:
          - type: paragraph
            body: >-
              Astranis serves four distinct customer segments, each with a different buyer profile, use case, and demand
              driver. The first and largest segment is sovereign national telcos and government-backed operators (DITO
              Philippines, MB Group Pacific Islands, Chunghwa Telecom Taiwan) who purchase dedicated national satellite
              capacity for strategic sovereignty and connectivity infrastructure reasons. These customers cannot use
              shared LEO or large-GEO capacity because they need sovereign control and dedicated bandwidth, and they
              cannot afford the $330–550M required for a traditional large-GEO satellite. Astranis' $60–100M all-in
              price point creates an entirely new addressable market. The second segment is regional ISPs and rural
              connectivity operators (CBN Alaska) who serve geographically challenging markets where terrestrial
              connectivity is economically infeasible. The third segment is in-flight connectivity operators (Anuvu) who
              need high-throughput Ka-band capacity over specific oceanic routes where neither fibre nor LEO coverage is
              available. The fourth and most recently added segment is the US government and DoD (Space Force PTS-G),
              which uses dedicated GEO capacity for proliferated tactical communications. Demand is structurally driven
              by geopolitical events (e.g., the 2025 Taiwan cable cut accelerating Chunghwa Telecom's procurement),
              digital divide policy (NTIA Internet for All), and the security imperative of avoiding
              shared-infrastructure dependency.
