      - number: '6.3'
        title: Retention, Durability, and Contract Structure
        blocks:
          - type: paragraph
            body: >-
              Satellite service contracts are fundamentally different from SaaS subscription models: once a satellite is
              on orbit and accepted by the customer, the service relationship is effectively locked in for the 10–15
              year operational lifetime. There is no monthly cancellation option, no downgrade path, and switching to a
              competitor requires procuring and launching an entirely new satellite (a multi-year, multi-hundred-million
              dollar decision). This structural lock-in implies near-100% gross revenue retention during the contract
              term, making traditional GRR and NRR metrics largely inapplicable. The relevant retention question for
              Astranis is end-of-life renewal: when the satellite reaches end of operational life (~2032–2037 for the
              earliest missions), will customers choose to replace it with another Astranis satellite or a competitor's
              offering? No renewals have yet been required given the company's age; the first renewal decisions will
              emerge around 2032. No contract cancellations have been publicly reported. The Arcturus firmware update
              recovery demonstrates that operational resilience strengthens rather than damages the customer
              relationship. Astranis does not disclose NPS, CSAT, or SLA compliance data publicly; obtaining these from
              management due diligence is a critical input for end-of-life renewal risk assessment.
