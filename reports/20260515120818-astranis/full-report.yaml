  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technical and Operational Risk
        blocks:
          - type: paragraph
            body: >-
              Astranis's most material technical risk is demonstrated spacecraft failure. The Arcturus satellite
              suffered a power subsystem anomaly in 2023 that rendered it a total loss, costing CBN Alaska its primary
              in-orbit asset at a time when no backup was available. This event exposed a single-point-of-failure
              architecture inherent in small-GEO designs: each satellite serves a single operator, so anomalies are
              immediately revenue-impacting rather than fleet-dilutive.


              Second-order operational risks include the manufacturing scale-up. Astranis is transitioning from low-rate
              initial production to higher-throughput multi-satellite builds, which introduces supply-chain fragility,
              component commonality risk, and integration process immaturity. Quality escapes at scale could generate
              multi-satellite recall scenarios or batch in-orbit failures. Additionally, software-defined radio payloads
              introduce a cyber-attack surface: an adversary compromising the mission-management platform could disable
              commercial or government satellites simultaneously.


              Launch risk is partially mitigated through rideshare with SpaceX Transporter missions, but rideshare
              delays propagate directly to revenue recognition and customer SLAs. The operational track record as of Q1
              2026 covers one fully functional on-orbit satellite (Omega, serving Alaska via CBN) and one IFC satellite
              (Anuvu Pacific)—too small a population to statistically characterize reliability. Detailed diligence is
              warranted immediately.
            claimRefs: []
