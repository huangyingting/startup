      - number: '1.4'
        title: Milestones, adverse events, and competitive context
        blocks:
          - type: paragraph
            body: >-
              Astranis' milestone history runs from founding in 2015 through the first SpaceX launch agreement in August
              2019, initial satellite launches in 2023, rapid multi-satellite deployment in December 2024, and the
              Series E in May 2026. The most consequential adverse event is the Arcturus solar array drive assembly
              failure in July 2023: Arcturus (AK1) was Astranis' first commercial satellite, launched on a SpaceX Falcon
              Heavy alongside ViaSat-3 (which itself suffered a $420 million insurance write-down for an unrelated
              antenna failure). The Arcturus failure reduced power output and limited the satellite's commercial value.
              Pacific Dataport, the original Astranis customer for Alaska broadband, now shows Starlink and OneWeb as
              its connectivity partners—suggesting possible customer attrition following the technical incident.
              Astranis responded by developing the UtilitySat multi-mission platform and accelerating the Omega Gen 2
              roadmap.

              The recovery trajectory from 2023 to 2026 is impressive: four satellites launched in a single Falcon 9
              mission in December 2024, Anuvu's private GEO network going live in August 2025, PTS-G prime contractor
              designation from the U.S. Space Force in August 2025, and the Series E in May 2026. This recovery
              narrative—and the defense pivot—define the current investment thesis. The addition of the Impulse Space
              2027 direct-inject mission also signals an intent to diversify launch providers beyond SpaceX.

              Against the competitive backdrop, Astranis sits in a unique niche: it is not competing against Starlink
              for mass-market broadband, but rather for the dedicated national or enterprise broadband capacity market
              that traditional GEO operators have historically served with much larger, more expensive satellites.
              Traditional operators face 3-7 year lead times and $200-400M satellites; Astranis offers under-12-month
              replacement timelines and a far smaller capital commitment per satellite. This positioning is defensible
              as long as capacity per dollar continues to improve through Omega (50 Gbps Gen 2) and UtilitySat
              multi-mission variants.
