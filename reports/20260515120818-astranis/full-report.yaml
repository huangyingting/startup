      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >-
              The core value proposition of Astranis rests on dramatically lower capital intensity per satellite
              compared to traditional GEO operators. Legacy full-size GEO communication satellites weigh 5,000–8,000 kg
              and cost USD 250–400M to manufacture, plus USD 80–150M in launch costs, yielding a total investment of USD
              330–550M per satellite. Astranis' small-GEO satellites weigh approximately 400 kg and are company-claimed
              to cost roughly USD 30M to manufacture, with launch costs of USD 30–70M on Falcon 9 or rideshare services,
              giving a total all-in capital cost of USD 60–100M per satellite. This represents an approximately 5–8×
              cost reduction per satellite. Because small-GEO satellites carry less capacity, the capex-per-Gbps
              comparison is more nuanced: at ~$70M for 8 Gbps, Astranis achieves roughly $9M/Gbps versus ~$4.5M/Gbps for
              a large-GEO, but Astranis wins on minimum contract size, lead time, and sovereign fit for smaller markets.
              Gross margins for satellite capacity providers typically range from 40–70% once launch and insurance costs
              are amortised over the satellite lifetime, with operating expenses dominated by ground operations,
              headcount, and spectrum licensing fees. Customer acquisition at the satellite level involves 18–36 month
              sales cycles for government and telco buyers, but these yield sticky multi-year contracts. Astranis'
              ~400-person workforce and 153,000 sq ft manufacturing facility imply operating expenses of approximately
              USD 100–175M/year, placing the company firmly in investment-mode with revenue lagging behind operational
              costs through at least 2026.
