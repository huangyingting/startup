      - number: '2.4'
        title: Growth constraints, adoption barriers, and market risks
        blocks:
          - type: paragraph
            body: >-
              Despite a compelling demand picture, the dedicated small-GEO market faces meaningful structural
              constraints. ITU orbital slot coordination is the most significant: obtaining rights to a new GEO slot can
              take 7–10 years under normal ITU processes, though operators can acquire existing filed slots from
              incumbent operators to bypass part of this timeline. Scarcity at prime orbital positions (particularly
              over densely populated regions) limits how many new dedicated GEO operators can realistically enter the
              market, which is a partial competitive moat for Astranis but also a ceiling on how many satellites it can
              deploy independently.

              Launch vehicle availability creates a second constraint. Astranis depends primarily on SpaceX Falcon 9 and
              Falcon Heavy for launch, with the Impulse Space 2027 direct-inject mission providing a future alternative.
              Launch slots are competitive, and SpaceX's pricing and availability can affect Astranis' production ramp.
              The December 2024 four-satellite mission demonstrated operational scale, but 24 satellites per year would
              require multiple launches annually—an ambitious but achievable ramp given current Falcon 9 cadence.

              Technology substitution risk from improving LEO constellations is real but bounded. Starlink's enterprise
              and government services are encroaching on some use cases (maritime, enterprise WAN) where Astranis could
              also compete. However, for dedicated national broadband requiring sovereignty, specific geographic
              coverage, and institutional procurement requirements, LEO shared capacity does not offer the same value
              proposition. Market saturation is a distant risk: with 5 satellites on orbit and 10+ on contract against a
              100+ target, Astranis is still early in its addressable market penetration.
            claimRefs:
              - CM005
              - CM016
              - CM026
