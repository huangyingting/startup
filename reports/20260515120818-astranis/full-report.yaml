      - number: '3.4'
        title: Pricing comparison and commercial dynamics
        blocks:
          - type: paragraph
            body: >-
              Astranis' commercial model involves selling a dedicated satellite and associated services on a multi-year
              contract basis. Per-satellite contract values are not publicly disclosed, but Chunghwa Telecom's $115M
              strategic investment provides an indirect benchmark: if that investment includes rights to a dedicated
              satellite, the implied contract value is in the $80–150M range for a 10–15 year satellite life. This is
              far below the $400–600M cost of a traditional large GEO satellite but substantially above LEO broadband
              subscription pricing.

              Starlink's pricing for government terminals is reported at approximately $2,500/month per terminal, which
              is far cheaper per terminal than dedicated GEO but provides shared rather than dedicated capacity.
              Traditional GEO transponder capacity is priced at $200–600 per MHz per month for dedicated leases—a very
              different cost structure from Astranis' satellite services model. The dedicated satellite model means
              Astranis captures most of the capacity-economics upside once the satellite is deployed, but also means the
              revenue depends on launch success and on-orbit reliability.

              Hughes Jupiter-3 and ViaSat's HTS offerings provide shared capacity at scale (hundreds of Gbps) but
              require customers to share bandwidth with other users—this is acceptable for mass market but not for
              national sovereignty or dedicated enterprise use cases. The pricing dynamics suggest Astranis sits in a
              sweet spot: far cheaper than traditional large GEO per satellite, far more capable per geography than
              shared LEO, and with a business model that rewards long contract duration.
