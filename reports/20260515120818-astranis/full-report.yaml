  productSummary: >-
    Astranis's primary product is the MicroGEO satellite — a ~400 kg, software-defined geostationary microsatellite
    providing dedicated broadband capacity. Key differentiators: (1) Software-defined radio (SDR) payload allowing
    in-orbit frequency and beam reconfiguration without hardware replacement; (2) Dedicated capacity model — each
    satellite serves a single operator, unlike shared-capacity transponders; (3) Compact size enables rideshare launches
    via SpaceX Transporter, reducing launch costs vs. dedicated rockets; (4) In-house manufacturing in San Francisco
    with vertical integration of hardware, software, and mission operations. Product pipeline includes the Gen-2
    satellite platform targeting higher power and capacity in the same bus class. The PTS-G government program likely
    uses a military-grade variant of the same core architecture.
  customerFocus: >-
    Primary customer segments: (1) National/government operators in developing markets lacking existing GEO capacity —
    small telcos, ISPs, or government ministries needing dedicated national broadband; (2) Defense and government (US
    Space Force PTS-G; resilience applications); (3) In-flight connectivity (IFC) providers like Anuvu serving airline
    passengers on Pacific routes; (4) Telecom operators in island nations and remote markets where terrestrial broadband
    is uneconomical. Named customers as of 2026: CBN Alaska, Anuvu, Chunghwa Telecom (Taiwan), DITO Telecommunity
    (Philippines), MB Group (Pacific).
  businessModel: >-
    Capacity-as-a-service: Astranis manufactures and launches satellites, then sells or leases dedicated capacity to
    operators under multi-year contracts. Revenue model is contracted capacity revenue per satellite (estimated $50–70M
    per satellite over operational life), with potential for follow-on satellite sales. Government contracts (PTS-G) may
    use a fixed-price or cost-reimbursable structure. No SaaS or recurring software revenue stream exists; revenue is
    tied to satellite delivery and capacity contracts.
  stage: Late Stage (Series E, 2026)
  fundingStatus: >-
    Total raised approximately $700M+ through Series E (Q1 2026). Key rounds: Series E (Q1 2026): $455M at an estimated
    $2.5–3.5B post-money valuation, led by institutional investors (composition not fully public). Prior rounds: Series
