      - number: '3.3'
        title: Competitive risks and moat durability
        blocks:
          - type: paragraph
            body: >-
              Astranis' competitive moats are real but still maturing. The most durable moats are: (1) first-mover
              advantage in the dedicated small-GEO segment—no competitor has demonstrated comparable manufacturing depth
              or on-orbit operational scale; (2) high switching costs after satellite deployment; (3) the
              defense-credentialed team (Gen. Hyten, Matt Long's Palantir background) that provides differentiated
              access to national security customers; and (4) the PTS-G prime contractor designation, which creates a
              government program of record reference.

              The most significant competitive risks are: (1) Starlink price cuts could make shared LEO attractive to
              customers who would otherwise buy dedicated GEO capacity; (2) traditional large-GEO operators or defense
              primes could develop small dedicated satellite products leveraging their existing balance sheets and
              customer relationships; (3) another on-orbit technical failure could damage customer confidence,
              particularly given the Arcturus precedent; and (4) defense procurement is subject to budget and policy
              changes that can affect contract timing and scope. ViaSat-3's $420M write-down illustrates that on-orbit
              risk is not trivial even for established operators.

              Overall, Astranis occupies a differentiated niche that is difficult to challenge in the near term, but the
              moats are not yet wide enough to be called durable at the $2.8B valuation. Scaling to 24 satellites per
              year, winning additional government programs, and successfully launching Omega Gen 2 are the key
              milestones that would substantially strengthen the competitive position.
