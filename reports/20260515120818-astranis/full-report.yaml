      - number: '6.4'
        title: Expansion, Concentration Risk, and Growth Outlook
        blocks:
          - type: paragraph
            body: >-
              Customer concentration is the primary commercial risk at Astranis' current scale: five customers each
              representing approximately 20% of current on-orbit revenue leaves no margin for customer loss. The DoD as
              a customer introduces a new type of concentration — government revenue could grow from ~20% to a much
              larger share as the PTS-G program scales, creating an anchor tenant effect but also policy dependency. The
              land-and-expand thesis — selling additional satellites to existing customers — has not been publicly
              demonstrated; no multi-satellite follow-on order from any existing customer has been announced. Chunghwa
              Telecom represents a potentially important test case for Astranis' ability to sign new customers at a
              faster pace. The pipeline of 10+ satellites on contract suggests that Astranis is successfully acquiring
              new customers, but without transparency on the counterparty names, timelines, and contract values,
              pipeline quality cannot be independently validated. Growth to 20+ customers would substantially reduce
              concentration risk and validate the addressable market thesis. Procurement friction (18–36 month sales
