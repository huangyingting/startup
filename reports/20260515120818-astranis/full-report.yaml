  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and addressable segments
        blocks:
          - type: paragraph
            body: >-
              The global satellite communications market, as defined by Grand View Research, encompasses all revenue
              derived from the transmission of voice, data, and video via geostationary, medium-orbit, and low-earth
              orbit satellites. This total market was valued at $90.3 billion in 2024 and is projected to grow at a
              10.2% CAGR to reach $159.6 billion by 2030. The relevant segments for Astranis are much narrower: fixed
              satellite services (FSS) for national broadband, government and military satellite communications, and
              emerging mobility/aeronautical connectivity (in-flight). Mass-market direct-to-home (DTH) television,
              machine-to-machine IoT services, and consumer broadband via LEO constellations are largely outside
              Astranis' target scope.

              Within FSS, the critical distinction is between shared-capacity and dedicated-capacity models. Traditional
              GEO operators (SES, Intelsat, Eutelsat) primarily operate high-throughput satellites (HTS) that distribute
              shared Gbps capacity across many customers in a geography. Astranis' model sells dedicated capacity: one
              satellite, one customer, one geography. This dedicated architecture is structurally attractive for
              national telecoms seeking to own their connectivity infrastructure, sovereign governments protecting
              against single points of foreign control, and defense agencies requiring isolated communications channels.

              The serviceable addressable market (SAM) for Astranis—focused on dedicated small-GEO contracts— is
              estimated at $8–15 billion, compared to the $90B total. This estimate is rough because no independent
              analyst tracks the dedicated small-GEO segment specifically; it is constructed by applying Astranis'
              average contract value to the universe of potential national telecom and government customers. Both
              Starlink's LEO competition and incumbent large-GEO operators create substitution pressure at the edges of
              this SAM, though buyer type (institutional vs. consumer) limits overlap.
            claimRefs:
              - CM001
              - CM003
              - CM009
