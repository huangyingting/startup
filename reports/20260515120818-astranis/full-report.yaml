  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape overview
        blocks:
          - type: paragraph
            body: >-
              Astranis operates in a competitive environment that spans three distinct arenas. The first is the LEO
              broadband market, dominated by SpaceX Starlink (6,000+ satellites, growing government and enterprise
              segments) and challenged by Eutelsat OneWeb (struggling financially) and Telesat Lightspeed (delayed). The
              second is the traditional large-GEO market occupied by SES, Intelsat, Eutelsat, ViaSat, and Hughes, which
              use multi-ton satellites with 3–7 year lead times and shared capacity models. The third is the US defense
              satellite communications market, where Northrop Grumman, Lockheed Martin, and L3Harris compete for prime
              contracts with established DoD relationships.

              The critical observation is that Astranis does not have a direct peer: no other company is manufacturing
              and operating dedicated small-GEO satellites (~400 kg) commercially at its scale. This means Astranis'
              primary competition is either (a) indirect substitution from Starlink or shared HTS GEO for buyers with
              more flexible requirements, or (b) traditional defense primes for government programs. The PTS-G prime
              contractor designation demonstrates Astranis can win government programs against established primes; the
              Anuvu two-satellite network demonstrates it can win and execute commercial contracts in the IFC market.
              These two proof points are the most important competitive facts as of May 2026.

              The competitive landscape is fluid. Starlink continues to expand its enterprise and government offerings,
              which could erode demand at the low end of Astranis' SAM. Traditional GEO operators are under financial
              pressure, which creates market gaps but also reduces the ceiling for dedicated GEO market pricing. The
              defense prime competitors have structural advantages in program management and established procurement
              relationships that Astranis must overcome through technical and economic differentiation.
