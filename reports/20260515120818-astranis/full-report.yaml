  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Value Proposition
        blocks:
          - type: paragraph
            body: >-
              Astranis delivers a vertically integrated satellite connectivity service: the customer receives a
              dedicated geostationary satellite built to their national or regional coverage requirements, operated by
              Astranis under a long-term managed-service arrangement. The product is not a spectrum lease or a capacity
              sublease on a shared satellite — it is a custom-built small-GEO asset designed, manufactured, launched,
              and operated specifically for one customer. The customer outcome is sovereign broadband infrastructure
              with dedicated bandwidth: a national telco gets a satellite that serves only their subscribers; a
              government gets a satellite only its agencies can access; a connectivity provider like Anuvu gets a
              satellite whose full capacity it controls for resale to airline passengers. Astranis' Gen 1 platform
              (MicroGEO / UtilitySat) delivers 5–8 Gbps of Ka-band capacity from a 400 kg satellite; the Gen 2 platform
              targets 50 Gbps at similar mass. Five missions are on orbit as of May 2026 serving Tonga/Pacific Islands
              (MB Group), Philippines (DITO), Alaska (CBN), in-flight connectivity (Anuvu), and the US DoD (PTS-G
              program). The key customer value drivers are lead time (12 months vs. 3–7 years for traditional GEO), cost
              efficiency (~$60–100M all-in vs. $330–550M), and sovereignty (dedicated asset, not shared capacity).
