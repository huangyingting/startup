          - type: paragraph
            body: >-
              Astranis's revenue model is highly concentrated. As of early 2026, the company has five named customers
              and ~10+ satellites on contract. The top three identifiable customers—CBN Alaska, Anuvu, and Chunghwa
              Telecom—represent a substantial share of existing contracted revenue. Churn by any single anchor customer
              before the next fundraise would materially compress runway.


              Financial risk is compounded by capital intensity. Each satellite requires tens of millions in materials
              and labor; the series-E raise of $455M (2026) provides a runway of several years at current burn, but
              achieving cash-flow breakeven requires manufacturing at scale not yet demonstrated. If per-unit costs do
              not fall on the learning curve as projected, the company will face a choice between raising additional
              capital at potentially dilutive terms or slowing delivery commitments.


              Supply-chain concentration is a critical dependency risk. Astranis sources solar panels from a single
              reported supplier, and custom-radiation-hardened FPGA components are available from a limited vendor base.
              Any supplier disruption—particularly given export controls on advanced semiconductors—could halt
              production.


              Talent and execution risk is pronounced. The company is competing for senior RF and space systems
              engineers in a market tightened by SpaceX, Rocket Lab, and large defense primes. Key-person dependencies
              on the founding team (John Gedmark, Trevor Bennett) represent single points of failure for investor and
              government relationships.
            claimRefs: []
