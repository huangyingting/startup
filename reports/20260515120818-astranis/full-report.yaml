  - id: FU001
    title: Customer Journey Map — Sovereign Telco to Deployed Satellite
    type: journey-map
    data:
      items:
        - label: Trigger
          detail: >-
            Geopolitical event (cable cut, security threat) or digital divide policy mandate (NTIA, government broadband
            plan) creates urgent need for dedicated national satellite capacity.
          touchpoints:
            - Cable infrastructure vulnerability
            - Government broadband policy
            - ITU spectrum coordination deadline
        - label: Awareness
          detail: >-
            Astranis introduced to national telco or government through direct outreach, satellite industry conference,
            or reference from existing customer in peer market.
          touchpoints:
            - Industry conference introduction
            - Customer reference from existing deployment
            - Direct business development outreach
        - label: Evaluation
          detail: >-
            Customer evaluates Astranis against traditional GEO (too expensive), LEO (no sovereignty/dedicated), and
            no-satellite (unacceptable connectivity gap). 18–36 month procurement process.
          touchpoints:
            - Technical feasibility study
            - Legal/regulatory review (ITAR, host-country spectrum)
            - Budget cycle approval (national or ministry level)
        - label: Contract
          detail: >-
            Long-form satellite service agreement signed; coverage specifications, capacity requirements, contract term
            (10–15yr), and payment schedule agreed.
          touchpoints:
            - Legal due diligence
            - ITAR/export licence approval
            - Payment structure negotiation
        - label: Build and Launch
          detail: >-
            12-month satellite manufacturing; integration and test at Astranis San Francisco facility; SpaceX Falcon 9
            launch; Impulse Space GEO insertion (3–6 months).
          touchpoints:
            - Progress milestones and factory acceptance
            - Launch manifest coordination
            - In-orbit testing and commissioning
        - label: Service
          detail: >-
            Customer operates ground terminals; Astranis provides 24/7 TT&C and firmware updates; customer sells
            broadband or uses capacity for government communications.
          touchpoints:
            - Ongoing TT&C from Astranis operations centre
            - Customer NOC integration
            - SLA monitoring and reporting
