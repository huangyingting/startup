  - id: FE003
    title: Critical Dependency Map — Astranis MicroGEO Platform
    type: dag
    data:
      nodes:
        - id: d1
          label: SpaceX Falcon 9 Launch
          detail: >-
            Primary launch provider for GTO rideshare; manifest availability drives satellite delivery schedule; no
            committed multi-satellite launch contract publicly disclosed
          type: dependency
        - id: d2
          label: Impulse Space Propulsion
          detail: >-
            Partner for GTO-to-GEO orbit insertion; failure or delay here blocks satellite entering service; alternative
            kick-stages are limited
          type: dependency
        - id: d3
          label: Ka-Band RF Components
          detail: >-
            Phased array elements, amplifiers, and filters from aerospace suppliers; supply chain tightness in
            defence-grade RF components creates lead-time risk
          type: dependency
        - id: d4
          label: FCC / ITU Spectrum Licences
          detail: >-
            Required for each orbital slot; ITU coordination takes 2–4 years; slot scarcity limits how many customers
            Astranis can simultaneously serve at scale
          type: dependency
        - id: d5
          label: FPGA / ASIC Chips (DSP)
          detail: >-
            Custom or COTS FPGA/ASIC for digital beamforming; semiconductor supply chain risk if key chip enters
            end-of-life or allocation constraint
          type: dependency
        - id: d6
          label: Solar Panels and Batteries
          detail: >-
            Procured from aerospace-qualified suppliers; power system is the subsystem that failed on Arcturus in 2023;
            power conditioning is critical
          type: dependency
        - id: d7
          label: ITAR Licences (DoS/DDTC)
          detail: >-
            Export licences required for all international satellite deliveries; delays in ITAR licence approval can
            push launch dates by months
          type: dependency
        - id: d8
          label: Astranis MicroGEO Satellite
          detail: >-
            Integrated platform combining all dependencies; 12-month build cycle requires all dependencies to be
            resolved in parallel
          type: system
      edges:
        - from: d1
          to: d8
        - from: d2
          to: d8
        - from: d3
          to: d8
        - from: d4
          to: d8
        - from: d5
          to: d8
        - from: d6
          to: d8
        - from: d7
          to: d8
    claimRefs:
      - CE006
      - CE013
      - CE014
      - CE017
