            body: >-
              Astranis has raised approximately USD 455–550M in equity and debt financing across multiple rounds: a USD
              13M Series A in 2019, a USD 90M Series B in 2021, a USD 200M Series C in 2022, a USD 150M Series D
              announced in July 2024, and a reported Series E of USD 200M+ in January 2026. The Series D at $150M from
