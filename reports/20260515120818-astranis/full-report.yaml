      - number: '3.2'
        title: Feature and capability comparison
        blocks:
          - type: paragraph
            body: >-
              On the key buying criteria that matter for Astranis' target customers, the MicroGEO platform has distinct
              advantages and disadvantages versus each competitor class. Against traditional large-GEO operators,
              Astranis wins on lead time (under 12 months vs. 3–7 years), dedicated capacity (one customer per
              satellite), and cost per satellite. Against Starlink, Astranis wins on dedicated national capacity,
              institutional procurement compatibility, and sovereignty; Starlink wins on price per Mbps for shared
              broadband and on global coverage without ITU coordination. Against defense primes, Astranis wins on
              commercial speed and satellite production efficiency; primes win on program management depth and DoD
              contract track record.

              The Omega (Gen 2) satellite addresses the most significant capability gap: throughput. At 50 Gbps, Omega
              closes the distance with traditional HTS operators while maintaining the dedicated capacity model. This is
              critical for in-flight connectivity and government applications where throughput requirements are growing
              faster than current Gen 1 MicroGEO can support. The UtilitySat multi-mission variant and Vanguard mobile
              ad-hoc service add further differentiation for defense and mobility markets.

              Switching costs are a critical competitive dynamic. Once a customer commits to a dedicated GEO satellite
              and it is on orbit, they cannot switch providers for 7–15 years without significant sunk cost. This
              creates durable, predictable revenue for Astranis but also makes initial customer acquisition expensive
              and time-consuming. The same lock-in applies to competitors: a customer with a contracted Intelsat or SES
              satellite will not defect to Astranis mid-contract, limiting Astranis' ability to displace incumbents
              until contracts expire.
            claimRefs:
              - CP003
              - CP007
              - CP013
              - CP014
              - CP017
