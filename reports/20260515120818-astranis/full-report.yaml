      - number: '5.2'
        title: Platform Architecture and Manufacturing
        blocks:
          - type: paragraph
            body: >-
              The Astranis MicroGEO satellite bus is designed around a software-defined radio payload as the primary
              differentiator. The SDR payload combines custom FPGA/ASIC-based digital signal processing with digital
              beamforming to enable in-orbit frequency reassignment, waveform updates, and beam shaping without physical
              hardware modification. This reconfigurability proved operationally critical during the Arcturus anomaly
              (2023), where a power management firmware update resolved a power conditioning issue that would have
              permanently disabled a traditional satellite. The satellite bus subsystems include Ka-band phased array
              antennas, solar power generation and battery storage, propulsion (integrated with Impulse Space for GEO
              circularisation), attitude control, and a radiation-tolerant computer. Ground operations use a proprietary
              software platform for telemetry, command, control, and payload management, with some open-source utilities
              published on GitHub. Astranis manufactures approximately 70% of components in-house at its 153,000 sq ft
              San Francisco facility, targeting 24 satellites per year by 2026. The remaining 30% of procured components
              includes RF parts, solar panels, batteries, and structural elements from aerospace suppliers. The
              UtilitySat variant introduced in 2023 standardised and simplified the platform, reducing assembly time and
              component count. Launch is via SpaceX Falcon 9 rideshare to GTO, followed by Impulse Space kick-stage
              propulsion for GEO orbit insertion, a 3–6 month sequence after launch.
