      - number: '7.2'
        title: Regulatory, Legal, and Compliance Risk
        blocks:
          - type: paragraph
            body: >-
              Astranis operates in a heavily regulated environment spanning ITU spectrum coordination, FCC licensing,
              ITAR/EAR export controls, and government-contract compliance. Each represents a distinct risk vector.


              FCC licensing: Astranis holds FCC market-access authorizations for GEO operations from specific orbital
              slots. Any modification to mission parameters (orbit, frequency, power) requires FCC approval, introducing
              timeline risk for new satellites. Competing applications from SpaceX, Amazon, and others for adjacent
              spectrum create interference coordination delays.


              ITAR/EAR: As a manufacturer of military-grade satellite hardware, all hardware and technical data are
              likely USML Category XV items. The PTS-G contract increases ITAR scrutiny; any unauthorized technical
              disclosure to foreign nationals—even in shared manufacturing facilities—can trigger DDTC enforcement.
              Historical satellite-sector ITAR penalties have reached hundreds of millions of dollars.


              PTS-G contract risk: As a prime contractor, Astranis bears full cost, schedule, and technical performance
              liability. Cost overruns on a fixed-price contract would directly compress margins or require capital
              infusion. Contract termination for convenience by the government—historically not rare in DoD space
              programs—would eliminate a significant expected revenue stream.


              IP risk: The software-defined payload architecture generates claims overlapping with established satellite
              players including ViaSat and SES. No active litigation is publicly known, but freedom-to-operate in SDR
              payload processing has not been publicly confirmed.
