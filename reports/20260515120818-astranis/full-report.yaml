              Astranis' technology moat rests on four pillars: (1) SDR payload IP — custom digital beamforming
              algorithms and in-orbit reconfigurability firmware developed over 10+ years; (2) in-house manufacturing
              process know-how — 70% vertical integration enabling the 12-month lead time that traditional satellite
              integrators cannot match; (3) regulatory assets — FCC Ka-band GEO spectrum licences for multiple orbital
