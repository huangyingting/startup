companyProfile:
  summary: >-
    Astranis Space Technologies was founded in 2015 by John Gedmark (CEO) and Trevor Bennett
    (CTO) in San Francisco. The company's core product is the MicroGEO satellite: a ~400 kg
    software-defined microsatellite operating in geostationary orbit that provides dedicated
    broadband capacity to a single operator, typically under a multi-year capacity contract.
    The satellite's software-defined radio (SDR) payload enables in-orbit frequency and beam
    reconfigurability, allowing a single hardware design to serve diverse customer requirements.
    Astranis manufactures satellites in-house in San Francisco and targets operator segments
    that are too small for traditional large-GEO procurement but require dedicated spectrum
    and coverage precision not achievable via LEO mega-constellations.

    The company suffered a total mission loss (Arcturus, 2023) affecting its CBN Alaska
    customer, then successfully recovered by launching the Omega satellite (also for CBN,
    2024) and an IFC satellite for Anuvu (2024). In Q1 2026, Astranis closed a $455M Series
    E and was named prime contractor for the US Space Force PTS-G (Protected Tactical Satellite
    Ground) program — a significant government credibility milestone. The company has 10+
    satellites on contract and a growing manufacturing facility in San Francisco.

  foundedDate: "2015-01-01"
  founders:
    - name: John Gedmark
      role: CEO and Co-Founder
      background: >-
