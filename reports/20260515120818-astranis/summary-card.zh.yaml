summary:
  headline: >-
    Astranis 已经做出唯一获得商业验证的小 GEO 专属容量卫星产品，拿下五个具名客户、一个政府锚定合同（PTS-G）和 $455M Series E 现金跑道；但异常记录、制造规模尚未验证、资本开支重、ITAR
    义务等高风险，再加上 Series E 入场价格敏感，意味着出资前必须完成五项具体尽调。建议：有条件推进——启动一手尽调；保险、制造良率、PTS-G 条款、ITAR 审计和 IP 自由实施未厘清前，不承诺出资。
