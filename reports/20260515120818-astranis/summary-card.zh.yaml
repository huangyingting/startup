  shortDescription: >-
    Astranis Space Technologies is a small-GEO satellite manufacturer and operator that builds dedicated,
    software-defined microsatellites (~400 kg) delivering broadband connectivity to underserved national markets,
    government clients, and in-flight connectivity operators. Founded in 2015 by John Gedmark and Trevor Bennett, the
    company has raised $455M in a Series E (Q1 2026), holds a US Space Force PTS-G prime contract, and has five named
    commercial customers including CBN Alaska, Anuvu, Chunghwa Telecom, DITO (Philippines), and MB Group (Pacific
    Islands), with 10+ satellites on contract.
