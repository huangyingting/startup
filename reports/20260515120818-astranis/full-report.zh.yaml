      - number: '3.4'
        title: 定价对比与商业动态
        blocks:
          - type: paragraph
            body: >-
              Astranis 的商业模式，是按多年合同出售一颗专属卫星及相关服务。单星合同价值未公开披露，但 Chunghwa Telecom 的 $115M
              战略投资提供了一个间接基准：如果这笔投资包含一颗专属卫星权利，那么以 10–15 年卫星寿命计，隐含合同价值在 $80–150M 区间。这个数字远低于传统大型 GEO 卫星 $400–600M 成本，但显著高于
              LEO 宽带订阅价格。

              据报道，Starlink 政府终端定价约为每台终端 $2,500/month，单终端成本远低于专属 GEO，但提供的是共享容量而非专属容量。传统 GEO 转发器专属租赁容量价格为每 MHz 每月
              $200–600，成本结构与 Astranis 的卫星服务模式很不同。专属卫星模式意味着，一旦卫星部署，Astranis 可以捕获大部分容量经济上行；但这也意味着收入依赖发射成功和在轨可靠性。

              Hughes Jupiter-3 和 ViaSat 的 HTS 产品以规模提供共享容量（数百 Gbps），但客户必须与其他用户共享带宽——这对大众市场可接受，却不适合国家主权或专属企业使用场景。定价动态显示
              Astranis 位于一个甜点：按单星计远便宜于传统大型 GEO，按单一地理区域能力计远强于共享 LEO，且商业模式奖励长合同周期。
