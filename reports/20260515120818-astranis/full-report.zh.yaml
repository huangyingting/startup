  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与市场需求
        blocks:
          - type: paragraph
            body: >-
              Astranis 服务 4 类不同客户，每类都有不同的买方画像、使用场景和需求驱动。第一类也是最大的一类，是主权国家电信公司和政府背书运营商（DITO Philippines、MB Group Pacific
              Islands、Chunghwa Telecom Taiwan），它们出于战略主权和连接基础设施原因采购专属国家卫星容量。这些客户不能使用共享 LEO 或大型 GEO
              容量，因为它们需要主权控制和专属带宽；同时也负担不起传统大型 GEO 卫星所需的 $330–550M。Astranis 的 $60–100M 全包价格点创造了一个全新的可服务市场。第二类是区域 ISP
              和农村连接运营商（CBN Alaska），服务地理条件复杂、地面连接经济性不可行的市场。第三类是机上连接运营商（Anuvu），它们需要在特定远洋航线上获得高吞吐 Ka-band
              容量，而这些地方既没有光纤，也没有可用 LEO 覆盖。第四类也是最新加入的一类，是美国政府和 DoD（Space Force PTS-G），使用专属 GEO
              容量支持分布式战术通信。需求受结构性因素驱动：地缘政治事件（例如 2025 年 Taiwan 海缆切断加速 Chunghwa Telecom 采购）、数字鸿沟政策（NTIA Internet for
              All），以及避免依赖共享基础设施的安全要求。
