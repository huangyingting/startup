      - number: '7.3'
        title: 伙伴、客户集中度与财务风险
        blocks:
          - type: paragraph
            body: >-
              Astranis 的收入模型高度集中。截至 2026 年初，公司有五个具名客户，约 10+ 颗卫星已签约。前三个可识别客户——CBN Alaska、Anuvu 和 Chunghwa
              Telecom——占现有签约收入的相当大比例。下一轮融资前，任何单一锚定客户流失都会显著压缩现金跑道。


              资本强度会放大财务风险。每颗卫星需要数千万美元材料和人工；2026 年 $455M Series E
              融资按当前烧钱速度可提供数年现金跑道，但要实现现金流盈亏平衡，必须证明公司能规模化制造。如果单颗成本不能像预测那样沿学习曲线下降，公司将面临两难：按可能稀释的条款继续融资，或放慢交付承诺。


              供应链集中是关键依赖风险。据报道，Astranis 从单一供应商采购太阳能板；定制抗辐射 FPGA 组件也只有有限供应商可选。任何供应商扰动——尤其考虑到先进半导体出口管制——都可能让生产停摆。


              人才与执行风险同样突出。公司在争夺资深 RF 和空间系统工程师，市场已被 SpaceX、Rocket Lab 和大型国防主承包商抢紧。创始团队（John Gedmark、Trevor
              Bennett）的关键人物依赖，是投资人和政府关系的单点风险。
