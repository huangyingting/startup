      - number: '1.4'
        title: 里程碑、逆风事件与竞争背景
        blocks:
          - type: paragraph
            body: >-
              Astranis 的里程碑从 2015 年创立开始，经过 August 2019 首份 SpaceX 发射协议、2023 年首批卫星发射、December 2024 快速多星部署，再到 May 2026 的
              Series E。最关键的逆风事件是 July 2023 的 Arcturus 太阳翼驱动组件故障：Arcturus（AK1）是 Astranis 首颗商业卫星，随 SpaceX Falcon Heavy 与
              ViaSat-3 一同发射（ViaSat-3 本身也因无关的天线故障计提了 $420 million 保险减记）。Arcturus 故障降低了功率输出，限制了卫星商业价值。Alaska 宽带项目的原始
              Astranis 客户 Pacific Dataport，如今在其连接合作伙伴中列出 Starlink 和 OneWeb——暗示技术事件后可能出现客户流失。Astranis 的回应是开发 UtilitySat
              多任务平台，并加速 Omega Gen 2 路线图。

              2023 年到 2026 年的恢复轨迹相当亮眼：December 2024 一次 Falcon 9 任务发射四颗卫星；Anuvu 的私有 GEO 网络于 August 2025 上线；August 2025
              获美国 Space Force 指定为 PTS-G 主承包商；May 2026 完成 Series E。这条恢复叙事——以及向国防的转向——定义了当前投资逻辑。加入 Impulse Space 2027
              直接注入任务，也表明公司有意在 SpaceX 之外分散发射供应商。

              放在竞争背景下，Astranis 占据一个独特利基：它不是与 Starlink 争夺大众宽带，而是争夺专属国家或企业宽带容量市场；这个市场过去由传统 GEO 运营商用更大、更贵的卫星服务。传统运营商面临 3–7
              年交付周期和 $200-400M 卫星；Astranis 提供 12 个月以内的替换时间线，以及每颗卫星小得多的资本投入。只要 Omega（50 Gbps Gen 2）和 UtilitySat
              多任务变体继续提升每美元容量，这一定位就有防御性。
