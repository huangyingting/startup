      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >-
              专属 GEO 宽带市场的买方类型很清晰。国家电信运营商是主要商业买方：Chunghwa Telecom（Taiwan）、RATTAN（Philippines）和 MB
              Group（Oman）等公司希望在本国地理区域上空拥有容量。预算归属在 C-suite 层面，资本开支决策周期为 12–24 个月。采用触发点通常是容量缺口，而这个缺口无法由 LEO
              星座（成本、延迟、覆盖）或传统大型 GEO（成本、交付周期）以经济方式填补。

              政府和国防机构是另一类买方，单价支付意愿更高，价格敏感度更低。美国 Space Force 指定 Astranis 为 PTS-G
              主承包商，使公司直接进入国防采购管线；这里合同周期更长，但更耐久，收入由年度拨款保护。NASA 及其他在偏远或有争议环境中有连接需求的政府机构，也代表潜在买方。

              机上连接供应商（Anuvu）和企业连接运营商构成第三类。这些买方更看重特定航空路线地理区域上的吞吐稳定性和覆盖保证，而专属 GEO 比路径不断变化时的 LEO
              共享容量更能满足这一点。卫星发射后的切换成本很高——专属卫星是多年基础设施承诺——这带来耐久收入，也让获客过程漫长。3 类买方与 SpaceX Starlink 的大众消费者宽带定位重叠很低，不过
              Starlink Business 和政府合同在 Astranis SAM 的低端形成有限竞争重叠。
