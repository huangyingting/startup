  - id: FE003
    title: 关键依赖图 — Astranis MicroGEO 平台
    type: dag
    data:
      nodes:
        - id: d1
          label: SpaceX Falcon 9 发射
          detail: GTO 拼车的主要发射服务商；发射清单可用性决定卫星交付节奏；未公开披露已承诺的多星发射合同
          type: dependency
        - id: d2
          label: Impulse Space 推进
          detail: GTO 至 GEO 入轨合作伙伴；这里失败或延误会卡住卫星投运；可替代上面级有限
          type: dependency
        - id: d3
          label: Ka-band RF 组件
          detail: 相控阵元件、放大器和滤波器来自航天供应商；国防级 RF 组件供应链偏紧，带来交付周期风险
          type: dependency
        - id: d4
          label: FCC / ITU 频谱许可
          detail: 每个轨道槽位都需要许可；ITU 协调需 2–4 年；槽位稀缺限制 Astranis 同时规模化服务的客户数量
          type: dependency
        - id: d5
          label: FPGA / ASIC 芯片（DSP）
          detail: 用于数字波束成形的定制或 COTS FPGA/ASIC；若关键芯片停产或进入配额约束，半导体供应链会构成风险
          type: dependency
        - id: d6
          label: 太阳能板与电池
          detail: 从航天级合格供应商采购；电力系统是 2023 年 Arcturus 故障的子系统；电源调理至关重要
          type: dependency
        - id: d7
          label: ITAR 许可（DoS/DDTC）
          detail: 所有国际卫星交付都需要出口许可；ITAR 许可审批延误可能把发射日期推迟数月
          type: dependency
        - id: d8
          label: Astranis MicroGEO 卫星
          detail: 整合所有依赖的平台；12 个月建造周期要求所有依赖并行解决
          type: system
      edges:
        - from: d1
          to: d8
        - from: d2
          to: d8
        - from: d3
          to: d8
        - from: d4
          to: d8
        - from: d5
          to: d8
        - from: d6
          to: d8
        - from: d7
          to: d8
    claimRefs:
      - CE006
      - CE013
      - CE014
      - CE017
