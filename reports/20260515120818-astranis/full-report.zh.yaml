  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与可服务细分
        blocks:
          - type: paragraph
            body: >-
              按 Grand View Research 的定义，全球卫星通信市场包括通过地球静止轨道、中轨和低地球轨道卫星传输语音、数据和视频产生的全部收入。该总市场在 2024 年估值为 $90.3 billion，预计以
              10.2% 年复合增长率（CAGR）增长，到 2030 年达到 $159.6 billion。对 Astranis 真正相关的细分窄得多：面向国家宽带的固定卫星服务（FSS）、政府和军事卫星通信，以及新兴的移动
              / 航空连接（机上连接）。大众市场的直播到户（DTH）电视、机器对机器 IoT 服务，以及通过 LEO 星座提供的消费者宽带，基本不在 Astranis 的目标范围内。

              在 FSS 内，关键区别是共享容量和专属容量模式。传统 GEO 运营商（SES、Intelsat、Eutelsat）主要运营高通量卫星（HTS），在一个地理区域内将共享 Gbps
              容量分配给众多客户。Astranis
              的模式出售专属容量：一颗卫星、一个客户、一个地理区域。对希望拥有连接基础设施的国家电信公司、需要防范单点外国控制的主权政府，以及要求隔离通信通道的国防机构来说，这种专属架构具备结构性吸引力。

              Astranis 的可服务市场（SAM）聚焦专属小 GEO 合同，估计为 $8–15 billion，相比总市场 $90B 小得多。这个估算较粗，因为没有独立分析师专门跟踪专属小 GEO 细分；它是将
              Astranis 的平均合同价值套用到潜在国家电信和政府客户池后构建出来的。Starlink 的 LEO 竞争和既有大型 GEO 运营商，都在这个 SAM 边缘形成替代压力，不过买方类型（机构 vs.
              消费者）限制了重叠。
