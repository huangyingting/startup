      - number: '2.2'
        title: 市场规模与增长驱动
        blocks:
          - type: paragraph
            body: >-
              多家分析机构确认了卫星通信市场的增长轨迹，尽管口径不同。Grand View Research 的 $90.3B（2024）基数和 10.2% CAGR 是最常被引用的数字，Mordor Intelligence
              和 MarketsandMarkets 的 8–12% CAGR 预测区间也在方向上形成佐证。关键增长驱动都是结构性的：GSMA Intelligence 统计全球仍有 2.6 billion
              人未接入网络，主要分布在卫星是唯一可行基础设施方案的地区；NTIA 的 Internet for All 项目及类似国际宽带授权，创造了政府背书的需求刺激；国防机构——尤其是美国 Space Force——在
              FY2027 预算申请中扩大商业卫星通信预算，以支持分布式战术行动。

              政府和国防是增长最快的垂直市场。美国 Space Force FY2027 预算文件显示，商业卫星通信拨款增加，与更广泛的国防科技行业逻辑一致：军事采购会流向能够快速部署、交付韧性容量的商业供应商。对
              Astranis 来说，PTS-G 以及类似政府项目代表的是经常性、耐久的收入机会，而非一次性合同胜利。

              商业侧，机上连接是高价值利基。Aviation Week 估计，随着航空公司恢复运力并升级至高端带宽，IFC 市场将持续增长至 2030。Anuvu 的 2 星专属 MicroGEO 网络——全球首个由小 GEO
              驱动的私有宽带网络——证明该模式已被真实商业采用。市场还受益于长期地缘政治顺风：Taiwan Strait 紧张和 Eastern European
              冲突提高了主权客户对卫星通信韧性的认知，带来对专属、国家控制容量的增量需求。
