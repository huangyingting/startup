  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价架构
        blocks:
          - type: paragraph
            body: >-
              Astranis 通过长期专属卫星容量合同获得收入：国家电信公司、ISP 或政府机构付费，独占一颗定制小 GEO 卫星，这颗卫星停驻在其领土上空。每颗卫星提供约 5–8 Gbps（Gen 1）或最高 50
              Gbps（Gen 2）的宽带容量，为客户带来 10–15
              年运行寿命的主权连接基础设施。收入模型最接近资本租赁或基础设施即服务安排：卫星按固定价设计、建造并交付至地球静止轨道，之后在轨运营、固件更新和频谱管理持续产生服务费。客户包括 Chunghwa
              Telecom（Taiwan）、DITO Telecommunity（Philippines）、CBN（Alaska）、Connect Tonga（Pacific
              Islands）、Anuvu（机上连接），以及通过 PTS-G 项目服务的美国 DoD。合同价值未公开披露，但历史上可比小 GEO 容量协议通常为每颗卫星每年 USD 10–30M。截至 2025 年有 5
              颗卫星在轨，加之后续合同管线，Astranis 年化可服务在役收入估计为 USD 50–125M。第二条收入流来自 PTS-G 项目下的美国政府合同；该项目保密，无法独立核验。Astranis
              还宣布未来将推出“as-a-service”容量市场模式，把现有卫星的剩余容量出售给第三方企业或运营商客户，为锚定合同之外提供可选性。
