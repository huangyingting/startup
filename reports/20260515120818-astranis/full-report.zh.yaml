  productSummary: >-
    Astranis 的主产品是 MicroGEO 卫星——一颗约 400
    kg、软件定义的地球静止轨道微型卫星，提供专属宽带容量。关键差异点包括：（1）软件定义无线电（SDR）载荷，无需更换硬件即可在轨重配频率和波束；（2）专属容量模式——每颗卫星服务单一运营商，不同于共享容量转发器；（3）紧凑尺寸支持通过
    SpaceX Transporter 拼车发射，相比专用火箭降低发射成本；（4）San Francisco 内部制造，硬件、软件和任务运营垂直整合。产品管线包括 Gen-2 卫星平台，目标是在同一平台等级内提高功率和容量。PTS-G
    政府项目很可能使用同一核心架构的军规变体。
  customerFocus: >-
    主要客户细分包括：（1）缺乏既有 GEO 容量的新兴市场国家 / 政府运营商——需要专属国家宽带的小型电信公司、ISP 或政府部门；（2）国防和政府（美国 Space Force
    PTS-G；韧性应用）；（3）服务太平洋航线航空旅客的 Anuvu 等机上连接（IFC）供应商；（4）岛屿国家和偏远市场中，地面宽带不具经济性的电信运营商。截至 2026 年已披露客户包括：CBN
    Alaska、Anuvu、Chunghwa Telecom（Taiwan）、DITO Telecommunity（Philippines）、MB Group（Pacific）。
  businessModel: >-
    容量即服务：Astranis 制造并发射卫星，然后根据多年期合同向运营商出售或出租专属容量。收入模式是每颗卫星的合同容量收入（估计每颗卫星在运行期内贡献
    $50–70M），并可能带来后续卫星销售。政府合同（PTS-G）可能采用固定价或成本补偿结构。公司没有 SaaS 或经常性软件收入流；收入与卫星交付和容量合同绑定。
  stage: Late Stage (Series E, 2026)
