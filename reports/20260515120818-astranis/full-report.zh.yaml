  - id: FU001
    title: 客户旅程图 — 从主权电信到卫星部署
    type: journey-map
    data:
      items:
        - label: 触发
          detail: 地缘政治事件（海缆中断、安全威胁）或数字鸿沟政策指令（NTIA、政府宽带计划）催生对专用国家卫星容量的紧急需求。
          touchpoints:
            - 海缆基础设施脆弱性
            - 政府宽带政策
            - ITU 频谱协调截止期
        - label: 认知
          detail: Astranis 靠直接拓展、卫星行业会议，或同类市场现有客户推荐，进入国家电信运营商或政府视野。
          touchpoints:
            - 行业会议介绍
            - 现有部署客户背书
            - 直接商务拓展
        - label: 评估
          detail: 客户会把 Astranis 与传统 GEO（太贵）、LEO（没有主权控制 / 专用容量）和不上卫星（连接缺口不可接受）逐一比较。采购周期为 18–36 个月。
          touchpoints:
            - 技术可行性研究
            - 法律 / 监管审查（ITAR、东道国频谱）
            - 预算周期批准（国家或部委级）
        - label: 合同
          detail: 正式卫星服务协议签署；覆盖规格、容量要求、合同期限（10–15 年）和付款计划已敲定。
          touchpoints:
            - 法律尽职调查
            - ITAR / 出口许可证批准
            - 付款结构谈判
        - label: 制造与发射
          detail: 卫星制造周期 12 个月；在 Astranis 旧金山设施完成集成和测试；SpaceX Falcon 9 发射；Impulse Space 负责 GEO 入轨（3–6 个月）。
          touchpoints:
            - 进度里程碑与工厂验收
            - 发射任务清单协调
            - 在轨测试与调试
        - label: 服务
          detail: 客户运营地面终端；Astranis 提供 24/7 TT&C 和固件更新；客户销售宽带，或把容量用于政府通信。
          touchpoints:
            - Astranis 运营中心持续提供 TT&C
            - 客户 NOC 对接
            - SLA 监控与报告
