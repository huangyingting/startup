  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >-
              Astranis 最实质的技术风险，是已经发生过的航天器故障。Arcturus 卫星在 2023 年遭遇电力子系统异常，导致整星全损；CBN Alaska 在没有备份的情况下失去主要在轨资产。这次事件暴露了小型
              GEO 设计内生的单点失效架构：每颗卫星服务单一运营商，因此异常会立刻冲击收入，而不是被星队规模摊薄。


              二阶运营风险包括制造爬坡。Astranis
              正从低速初始生产切换到更高吞吐的多星制造，这会带来供应链脆弱性、组件共性风险和集成流程不成熟。规模化后若出现漏检质量问题，可能引发多星召回情景或同批在轨故障。另一个风险来自软件定义无线电载荷：如果对手攻破任务管理平台，可能同时瘫痪商业或政府卫星。


              借助 SpaceX Transporter 任务拼车发射，发射风险得到部分缓解；但拼车延迟会直接传导到收入确认和客户 SLA。截至 2026 年 Q1，运营记录只覆盖一颗功能完整的在轨卫星（Omega，通过
              CBN 服务 Alaska）和一颗 IFC 卫星（Anuvu Pacific）——样本太小，无法用统计方式刻画可靠性。需要立刻开展细尽调。
