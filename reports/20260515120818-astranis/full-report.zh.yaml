      - number: '6.3'
        title: 留存、耐久性与合同结构
        blocks:
          - type: paragraph
            body: >-
              卫星服务合同和 SaaS 订阅模型本质不同：卫星入轨并由客户验收后，服务关系基本锁定 10–15
              年运营寿命。客户没有月度取消选项，也没有降级路径；切换到竞争对手，意味着重新采购并发射一颗全新卫星，这是数年、数亿美元级决策。上述结构性锁定意味着合同期内总收入留存率（GRR）接近 100%，传统 GRR
              和净留存率（NRR）指标基本不适用。Astranis 真正的留存问题是寿命期满后的续约：最早任务的卫星在约 2032–2037 年到达运营寿命末期时，客户会选择再买一颗 Astranis
              卫星，还是转向竞争对手？公司成立时间尚短，尚未进入续约节点；第一批续约决策大约会在 2032 年出现。公开渠道没有合同取消记录。Arcturus
              通过固件更新恢复，说明运营韧性不是损害客户关系，而是在加固客户关系。Astranis 未公开披露 NPS、CSAT 或 SLA 达成数据；管理层尽调必须拿到这些信息，才能评估寿命期满续约风险。
