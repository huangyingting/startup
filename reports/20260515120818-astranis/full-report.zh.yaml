      - number: '5.2'
        title: 平台架构与制造
        blocks:
          - type: paragraph
            body: >-
              Astranis MicroGEO 卫星平台围绕软件定义无线电载荷设计，这是主要差异点。SDR 载荷将基于定制 FPGA/ASIC
              的数字信号处理与数字波束成形结合起来，使在轨频率重分配、波形更新和波束塑形无需物理硬件改造即可完成。这种可重配置性在 Arcturus
              异常（2023）期间被证明有运营关键性：一次电源管理固件更新解决了电源调节问题；如果是传统卫星，该问题本会使卫星永久失效。卫星平台子系统包括 Ka-band 相控阵天线、太阳能发电与电池储能、推进（与
              Impulse Space 集成，用于 GEO 圆化）、姿态控制，以及抗辐射计算机。地面运营使用自研软件平台处理遥测、指令、控制和载荷管理，并在 GitHub 上发布了部分开源工具。Astranis 在 San
              Francisco 153,000 sq ft 设施内约 70% 组件自制，目标到 2026 年达到年产 24 颗卫星。剩余 30% 外购组件包括来自航空航天供应商的 RF 零件、太阳能板、电池和结构件。2023
              年推出的 UtilitySat 变体对平台做了标准化和简化，减少了装配时间和组件数量。发射路径是通过 SpaceX Falcon 9 拼车进入 GTO，随后由 Impulse Space kick-stage
              推进完成 GEO 入轨，发射后流程为 3–6 个月。
