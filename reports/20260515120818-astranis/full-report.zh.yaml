      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >-
              Astranis 的核心价值主张，建立在相较传统 GEO 运营商大幅降低单星资本强度之上。传统全尺寸 GEO 通信卫星重 5,000–8,000 kg，制造成本 USD 250–400M，另需 USD
              80–150M 发射成本，单星总投资 USD 330–550M。Astranis 的小 GEO 卫星重约 400 kg，公司称制造成本约 USD 30M，使用 Falcon 9 或拼车服务发射成本 USD
              30–70M，单星全包资本成本 USD 60–100M。这意味着单星成本约降低 5–8×。由于小 GEO 卫星容量更低，按每 Gbps 资本开支比较会更微妙：以 ~$70M 支撑 8 Gbps
              计算，Astranis 约为 $9M/Gbps，而大型 GEO 约为 $4.5M/Gbps；但 Astranis
              赢在最低合同规模、交付周期，以及对小市场的主权适配。卫星容量供应商的毛利率在发射和保险成本按卫星寿命摊销后，通常为
              40–70%；运营费用主要来自地面运营、人员和频谱许可费。卫星级客户获取面向政府和电信买方，销售周期为 18–36 个月，但会形成粘性多年合同。Astranis 约 400 人团队和 153,000 sq ft
              制造设施，意味着运营费用约 USD 100–175M/year，使公司明确处于投资模式，收入至少到 2026 年仍落后于运营成本。
