      - number: '4.3'
        title: 资本充足性与融资位置
        blocks:
          - type: paragraph
            body: >-
              Astranis 已通过多轮股权和债务融资募集约 USD 455–550M：2019 年 USD 13M Series A、2021 年 USD 90M Series B、2022 年 USD 200M
              Series C、July 2024 宣布的 USD 150M Series D，以及 January 2026 据报道的 USD 200M+ Series E。Andreessen Horowitz 等参与的
              $150M Series D，按同期报道隐含投后估值约 USD 1.5–2.5B。按估计每月烧钱 USD 10–18M（反映约 400 名员工和活跃卫星制造），mid-2024 的 USD 150M
              新资金可提供估计 8–15 个月现金跑道，把下一次融资事件推到 mid-to-late 2025 或 early 2026——与 January 2026 的 Series E 公告一致。美国 Space
              Force 于 2025 年授予的 PTS-G 主合同，可能带来非稀释性政府收入，部分抵消烧钱；但项目时间线和里程碑付款为保密信息。除项目融资讨论外，Astranis
              未公开披露任何循环信贷额度或长期债务义务。将制造规模扩大到规划的 24 颗 / 年产能，需要额外资本，使公司在 Series E 之后至少未来 18–24 个月仍依赖融资。
