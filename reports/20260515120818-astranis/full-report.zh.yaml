      - number: '8.2'
        title: 估值语境与可比分析
        blocks:
          - type: paragraph
            body: >-
              Astranis 在 2026 年 Q1 完成 $455M Series E；媒体报道显示公司投后估值约 $2.5–3.5B。没有公开股权结构表能确认这一点；估算来自已报道融资规模和泄露的持股比例评论。背景如下：


              收入口径估值：如果 10+ 颗卫星积压订单代表 $500–700M 签约收入（按每颗卫星估计 $50–70M），再套用可比成长阶段航空航天 / 国防主承包商的 4–7x 收入倍数，隐含企业价值为
              $2–5B。在交付里程碑被确认前，利润率压缩风险和资本强度都支持区间低端。


              可比交易：SES 和 Intelsat 在陷入困境前以 4–6x EV / 收入交易；SpaceX Starlink 内部估值隐含 20–30x 收入倍数，但其在轨卫星超过 3,000
              颗，不具可比性。Telesat LEO 曾以约 $5B 投前估值融资，随后执行挑战压低预期。最可比的私有交易是 Astroscale 的 Series F 后估值（较小市场约
              $1.5B）；这意味着如果制造爬坡按计划推进，Astranis 约 $3B 估值有防守性。


              反向估值背景：Euroconsult 指出，宏观利率上升、LEO 竞争加剧后，商业卫星金融倍数从 2021 年峰值到 2025 年压缩了
              30–40%。如果下一轮融资发生在宏观环境走弱或项目受挫之后，下轮降估值融资是真实风险窗口。公开市场可比公司（Viasat 收购 Inmarsat 后；SES 收购 O3b
              后）显示，卫星整合复杂性常常把估值压到收购前标记以下。
            claimRefs: []
