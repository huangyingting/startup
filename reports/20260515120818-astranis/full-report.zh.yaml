  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图概览
        blocks:
          - type: paragraph
            body: >-
              Astranis 所处竞争环境横跨 3 个不同战场。第一是 LEO 宽带市场，由 SpaceX Starlink 主导（6,000+ 颗卫星，政府和企业细分持续增长），Eutelsat OneWeb（财务承压）和
              Telesat Lightspeed（延迟）构成挑战。第二是传统大型 GEO 市场，由 SES、Intelsat、Eutelsat、ViaSat 和 Hughes 占据，它们使用数吨级卫星，交付周期 3–7
              年，采用共享容量模式。第三是美国国防卫星通信市场，Northrop Grumman、Lockheed Martin 和 L3Harris 凭借既有 DoD 关系争夺主承包合同。

              关键观察是：Astranis 没有直接同类公司。没有其他公司以其规模商业化制造并运营专属小 GEO 卫星（约 400 kg）。这意味着 Astranis 的主要竞争来自 2 类：（a）对需求更灵活买方的
              Starlink 或共享 HTS GEO 间接替代；（b）政府项目中的传统国防主承包商。PTS-G 主承包商资格证明 Astranis 能在政府项目中击败成熟主承包商；Anuvu 2 星网络证明公司能在 IFC
              市场赢下并执行商业合同。截至 May 2026，这 2 个证明点是最重要的竞争事实。

              竞争格局仍在流动。Starlink 持续扩展企业和政府产品，可能侵蚀 Astranis SAM 低端需求。传统 GEO 运营商承受财务压力，这会打开市场缺口，但也压低专属 GEO
              市场定价上限。国防主承包竞争对手在项目管理和既有采购关系上有结构性优势，Astranis 必须靠技术和经济性差异化跨过去。
            claimRefs:
              - CP001
