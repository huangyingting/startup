      - number: '1.3'
        title: 资本基础、融资历史与投资人版图
        blocks:
          - type: paragraph
            body: >-
              自创立以来，Astranis 通过股权和债务融资累计募集超过 $1.2 billion。最新一轮是在 May 2026 完成的 $455 million Series E 组合融资，其中包括 Snowpoint
              Ventures 和 Franklin Templeton 共同领投的 $300 million 股权融资——两家都是资本市场经验很深的机构投资人——以及 Trinity Capital 提供的 $155
              million 延迟提款信贷额度。Wilson Sonsini Goodrich & Rosati 担任该交易法律顾问。SpaceNews 援引接近交易的消息人士报道称投后估值为 $2.8
              billion，这是公司首次获得独立第三方估值确认。

              投资人名单的机构宽度值得注意：Series D（July 2024，$200M，由 Andreessen Horowitz Growth Fund 领投，BAM Elevate/Balyasny 共同领投）引入了
              BlackRock、Fidelity 和 Baillie Gifford 等蓝筹跨界机构投资人，这类投资人通常参与 IPO 前轮次。它们在 Series E
              中继续出现，强化了一个判断：公司投资人基础由长久期机构资本锚定，而不只是纯 VC。Chunghwa Telecom 的 $115M 战略投资带来客户兼投资人的关系，并附带 Taiwan
              排他权；但公开来源尚未完全确认其精确结构（股权、可转债，或收入分成协议）。

              Trinity Capital 的 $155M
              债务额度是一个有意义的复杂变量。公司尚未进入收入转正阶段，债务契约会增加运营约束；“延迟提款”结构也意味着资金会随生产里程碑分批提取。条款、利率和契约结构未公开披露，是重要尽调事项。
