      - number: '2.4'
        title: 增长约束、采用壁垒与市场风险
        blocks:
          - type: paragraph
            body: >-
              尽管需求图景有吸引力，专属小 GEO 市场仍面临实质结构约束。ITU 轨道槽位协调最关键：按正常 ITU 流程，取得新的 GEO 槽位权利可能需要 7–10
              年；不过运营商可以从既有运营商处收购已申报槽位，绕过部分时间线。黄金轨位（尤其是人口稠密地区上空）的稀缺，限制了新专属 GEO 运营商现实中能进入市场的数量；这既是 Astranis
              的部分竞争护城河，也限制了它独立部署卫星的上限。

              发射工具可得性构成第二道约束。Astranis 发射主要依赖 SpaceX Falcon 9 和 Falcon Heavy，Impulse Space 2027
              直接注入任务提供未来替代。发射窗口竞争激烈，SpaceX 的定价和可得性会影响 Astranis 的产能爬坡。December 2024 的 4 星任务证明了运营规模，但年产 24
              颗卫星需要每年多次发射——考虑当前 Falcon 9 节奏，这一爬坡有雄心但可实现。

              来自不断改进的 LEO 星座的技术替代风险真实存在，但边界明确。Starlink 的企业和政府服务正在侵入部分使用场景（海事、企业 WAN），这些场景 Astranis
              也可能竞争。不过，对于要求主权、特定地理覆盖和机构采购条件的专属国家宽带，LEO 共享容量无法提供同等价值主张。市场饱和仍是远期风险：相对于 100+ 目标，Astranis 目前只有 5 颗在轨、10+
              颗签约，仍处在可服务市场渗透早期。
