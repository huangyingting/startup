      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >-
              在 Astranis 目标客户最看重的关键采购标准上，MicroGEO 平台相对各类竞争者各有优劣。对比传统大型 GEO 运营商，Astranis 赢在交付周期（12 个月以内 vs. 3–7
              年）、专属容量（每颗卫星一个客户）和单星成本。对比 Starlink，Astranis 赢在专属国家容量、机构采购兼容性和主权控制；Starlink 赢在共享宽带的每 Mbps 价格，以及无需 ITU
              协调的全球覆盖。对比国防主承包商，Astranis 赢在商业速度和卫星生产效率；主承包商赢在项目管理深度和 DoD 合同履历。

              Omega（Gen 2）卫星补上了最重要的能力缺口：吞吐。50 Gbps 的 Omega 在保留专属容量模式的同时，拉近了与传统 HTS
              运营商的距离。对机上连接和政府应用来说，这一点关键，因为吞吐需求增长速度超过当前 Gen 1 MicroGEO 的支撑能力。UtilitySat 多任务变体和 Vanguard
              移动自组网服务，又为国防和移动市场增加了差异化。

              切换成本是关键竞争动态。客户一旦承诺一颗专属 GEO 卫星并进入在轨状态，若不承担重大沉没成本，7–15 年内无法更换供应商。这为 Astranis
              创造耐久、可预测收入，也让初始获客昂贵且耗时。同样的锁定效应也适用于竞争者：已有 Intelsat 或 SES 合同卫星的客户，不会在合同中期转向 Astranis，这限制了 Astranis
              在合同到期前替换既有运营商的能力。
