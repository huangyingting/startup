      - number: '8.3'
        title: 情景、退出准备度与尽调问题
        blocks:
          - type: paragraph
            body: >-
              乐观情景（约 25% 概率）：Astranis 在当前积压订单中交付 5–7 颗卫星且无异常，PTS-G 扩展到第二个合同批次，制造成本降至每颗卫星 $40M
              以下，并在被国防主承包商或大型电信运营商战略收购前，以 $6B+ 估值完成 Series F。退出倍数：基于交付运行率下 $800M–1B 预测收入，EV / 收入为 6–8x。


              基准情景（约 50% 概率）：Astranis 到 2028 年交付 3–5 颗卫星，完成 PTS-G 里程碑 1，签约收入增至 $400–600M，并以 $3–5B 估值完成 Series
              F。通过战略并购（Lockheed、Northrop、L3Harris）或 2029–2031 年 IPO 退出。Series E 投资人回报：1.5–2.5x。


              悲观情景（约 25% 概率）：第二次卫星异常、PTS-G 项目延误，或宏观驱动的资本枯竭，触发 $1.5B 估值的 Series F 降轮融资或重组。Series E
              投资人回报：0.3–0.8x。下一颗卫星投运后 18 个月内若出现异常，投资逻辑失效。


              退出准备度：鉴于运营历史有限、制造规模尚未证明，Astranis 还没有达到 IPO
              退出准备度；战略收购更可能。国防主承包商买方（Northrop、L3Harris、Leidos）或大型商业卫星运营商（SES、Intelsat、Viasat）都是自然买家。PTS-G
              合同显著增强了被国防买方收购的吸引力。


              最终尽调问题围绕五个会阻断投资逻辑的不确定性展开，目标是在出资前把它们打穿。
