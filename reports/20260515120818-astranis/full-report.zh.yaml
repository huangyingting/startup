chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >-
              Astranis Space Technologies 是一家位于 San Francisco 的卫星制造商，由 John Gedmark（CEO）和 Ryan McLinko（CTO）于 2015
              年创立。公司的核心判断是：新兴市场、岛屿国家和企业宽带连接被传统地球静止轨道（GEO）卫星的高成本、长交付周期和过大容量卡住；一颗约 400 kg 的小型专属 MicroGEO
              卫星，可以同时解决这些瓶颈。Astranis 不出售共享星座接入，而是出售专属卫星容量：每个客户拥有自己的卫星，停驻在其地理区域上空，提供不与任何第三方共享的吞吐。这个专属模式在理念和商业上，都不同于
              Starlink 的大众市场 LEO 路线，也不同于 SES 或 Intelsat 等传统 GEO 运营商。

              商业模式从卫星硬件和运营，延伸为长期卫星服务合同。客户通常是国家电信公司、卫星运营商、企业宽带供应商，以及越来越多的政府和国防客户；他们为一颗专属卫星及其交付的服务签约。卫星寿命期内，Astranis
              保留运营责任。服务外壳意味着收入按多年合同摊开，而不是一次性硬件销售确认，更接近飞机出租方的经济模型。截至 May 2026，Astranis 称已销售超过 $1 billion 的卫星服务（总合同价值），已有
              5 颗卫星在轨、5 颗在产、10+ 颗签约。

              公司在 Northern California 一处 153,000 square foot 设施运营，约 70% 组件由内部制造。垂直整合缩短交付周期、守住成本纪律，也让 Astranis
              比纯系统集成商更能控制供应链风险。目标年产能 24 颗卫星，意味着相对当前吞吐需要大幅爬坡，也是 100-by-2030 计划必须证明的运营关口。
