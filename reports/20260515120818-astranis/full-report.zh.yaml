    notes: 这些触发项设计成无需私有访问也能监控。尽调阻断项会叫停投资；投资逻辑 破裂则需要重新承销。
  - id: TV001
    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 置信度
      - 含义
    rows:
      - - 建议
        - 观察 / 有条件推进
        - 中
        - 只有 5 个关键风险项解决后，才进入一手尽调
      - - 风险评级
        - 高
        - 高
        - 异常、资本密集度和 ITAR 尾部风险都很重大
      - - 估值立场
        - Series E 投后 $2.5–3.5B 有条件可支持
        - 低–中
        - 对价格敏感；悲观情景有降价轮风险
      - - 投资逻辑
        - 只有制造执行到位且避免异常，投资逻辑才成立
        - 中
        - 第二次异常或 Series F 失败会打破投资逻辑
      - - 证据质量
        - 中 — 核心商业事实已确认；财务和合规细节缺失
        - 中
        - 最终承诺前必须尽调
    claimRefs:
      - CV001
      - CV002
      - CV003
    notes: 有条件推进意味着：启动一手尽调；五个尽调阻断项解决前，不承诺出资。
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 证据
      - 何种情况会改变判断
    rows:
      - - 投资逻辑：面向服务不足市场的小型 GEO 专用容量先行者
        - 5 个具名客户、政府 PTS-G 合同、10+ 颗卫星待交付
        - 多家资金充足的竞争者在 Astranis 规模化前进入小型 GEO
      - - 投资逻辑：软件定义的可重配置能力带来持久差异化
        - SDR 有效载荷架构可在轨重分配频率；同等价位尚无可比商业 产品
        - 既有玩家（SES、Intelsat、ViaSat）以更低成本推出竞争性 SDR 产品
      - - 投资逻辑：$455M Series E 提供执行跑道
        - 据报道 2026 年 Q1 融资 $455M；Bloomberg/TechCrunch 新闻已确认
        - 制造成本超支将现金跑道压到 24 个月以下
      - - 反向逻辑：Arcturus 异常说明任务失败是真实风险
        - 2023 年确认全损；电力子系统故障；此后第二颗卫星已入轨
        - 后续 3 颗卫星入役后 24 个月内无异常
      - - 反向逻辑：资本密集度和现金流盈亏平衡尚未证明
        - 单位经济模型未公开；硬件业务资本密集；制造良率未确认
        - 制造审计确认单星成本不高于计划
      - - 反向逻辑：有限运营历史撑不起估值
        - 截至 2026 年初仅 2 颗在轨卫星；未披露收入；Series E 隐含估值要求公司 持续执行
        - 按期交付 3+ 颗卫星，并确认满足客户 SLA
    claimRefs:
      - CV004
      - CV005
      - CV006
      - CV007
    notes: 改变判断的条件都设计为可证伪事项，触发后会实质改变投资建议。
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - 关键假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 乐观
        - 2028 年前交付 5–7 颗卫星；PTS-G 扩大；制造成本 <$40M/颗；Series F 估值 $6B+
        - $800M–1B 收入运行率 × 7–10x = $6–10B EV；Series E 回报 2–3.5x
        - 执行风险；单次异常就会击穿该情景
        - ~25%
      - - 基准
        - 2028 年前 3–5 颗卫星；PTS-G 里程碑 1 达成；Series F 估值 $3–5B；2029–2031 年 M&A 退出
        - $400–600M 收入 × 5–7x = $2–4B EV；Series E 回报 1.2–2x
        - 制造延误；资本利率环境；客户流失
        - ~50%
      - - 悲观
        - 第二次异常或 PTS-G T4C 或资本枯竭；$1–2B 降价轮；重组风险
        - EV 低于 $1.5B；Series E 回报 <1x；可能减值
        - 异常风险是该情景最可能的触发因素
        - ~25%
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
    notes: 估值倍数参考防务航天成长期可比公司校准。未披露收入，无法做 DCF。
  - id: TV004
    title: 可比估值表
    columns:
      - 可比对象
      - 指标
      - 倍数 / 估值 / 状态
      - 相关性
      - 局限
    rows:
      - - SpaceX Starlink
        - EV/收入（2024 年内部标记）
        - 估计收入 >$10B，对应 20–25x
        - 唯一规模化商业卫星服务；执行已经跑通
        - 规模、LEO vs GEO、成熟度均不可比
      - - Telesat LEO（Series F 后）
        - EV/合同收入
        - $3B+ 合同待履约收入对应 3–5x；执行前峰值估值 $5B
        - 有政府支持的新进入商业卫星公司
        - 轨道不同、产品不同；执行挑战压缩估值
      - - Viasat（Inmarsat 前）
        - 上市公司 EV/收入
        - 收入 2.5–4x；政府 + 商业混合
        - 成熟 GEO 运营商，有政府和 IFC 收入
        - 上市公司、业务成熟；与早期公司可比性有限
      - - SES 收购 O3b 后
        - 上市公司 EV/收入
        - $2B 收入对应 3–5x；LEO/GEO 混合运营商
        - 小卫星整合和国家级连接服务具可比性
        - 收购整合复杂度造成相对独立公司的折价
      - - Astroscale（Series F 后）
        - 私有企业价值
        - 估值约 ~$1.5B，面向更小可寻址市场
        - 新进入空间技术公司，投资人画像相近
        - 任务不同（碎片清除 vs 连接）；战略价值较低
      - - Maxar Technologies（收购前）
        - 上市公司 EV/收入
        - $2B 收入对应 1.5–2.5x；政府影像业务占主导
        - 政府锚定的航天公司；处在防务和情报交汇点
        - 影像业务不同于连接；Advent 收购压缩了倍数
    claimRefs:
      - CV012
      - CV013
      - CV014
    enumerationScope:
      coverage: partial
      basis: Six comps selected from public satellite operators, private new-entrants, and M&A transactions; not exhaustive.
    notes: Astranis 现阶段没有完美可比对象；倍数只是方向性输入，不是精确锚点。
  - id: TV005
    title: 投资逻辑破裂与否决触发项表
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 第二次在轨异常
        - 下一颗卫星入役后 18 个月内出现任何异常
        - 可靠性逻辑崩塌；客户 SLA 违约；融资受损
        - 投资逻辑破裂：停止追加资本；按重组条款重新承销
      - - ITAR 执法行动
        - 任何 DDTC 正式调查或自愿披露
        - 政府合同承压；投资人信心受损；可能遭制裁
        - 尽调阻断项：认证前不交割
      - - PTS-G 终止或范围缩减 >30%
        - SAM.gov 合同修改显示 T4C 或范围削减
        - 收入锚点消失；重做模型预测；公司可能需要紧急融资
        - 投资逻辑破裂：重新评估持有还是在二级市场退出
      - - 制造成本相对计划超支 >20%
        - 下一里程碑单星成本 > 计划的 120%
        - 单位经济模型受损；盈亏平衡推迟；融资条款恶化
        - 黄色预警：索取补救计划；暂停后续分期
      - - 24 个月内未宣布 Series F
        - 按预计烧钱速度，Q1 2028 前没有公开融资
        - 现金跑道堪忧；可能走向困境路径
        - 尽调标记：索要过桥融资方案；评估流动性
    claimRefs:
      - CV015
      - CV016
    enumerationScope:
      coverage: partial
      basis: Top five thesis-break triggers defined for the most material risk dimensions.
    notes: 触发条件设计成无需私有访问也能观察。尽调阻断项会暂停投资；投资逻辑破裂则需要重新承销。
  - id: TV006
    title: 最终尽调问题清单
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人 / 尽调路径
    rows:
      - - 在轨保险覆盖
        - 未公开保险凭证或 Arcturus 恢复情况披露
        - 未投保损失风险是悲观情景建模中的主要下行变量
        - 管理层 / 承保方 — 索要保险凭证和 Arcturus 恢复文件
      - - 制造良率与成本
        - 未公开良率、缺陷率或单星成本趋势
        - 单位经济性是基准情景回报的核心驱动
        - 管理层 — 索要制造审计、良率指标、BOM 成本数据
      - - PTS-G 合同条款
        - 定价结构、CLIN 明细、绩效激励和 T4C 条件未公开
        - 合同风险状况是收入确定性的关键决定因素
        - 管理层 / 律师 — 索要带商业条款的合同摘要
      - - ITAR 合规审计
        - 未确认 DDTC 审计历史或自愿披露
        - 若存在未披露违规，ITAR 执法足以构成公司级致命风险
        - 法务 / 合规 — 索要 DDTC 注册、TCP、过往披露
      - - SDR 载荷 FTO 意见书
        - 软件定义载荷架构没有公开 FTO 确认
        - ViaSat 或 SES 的 IP 主张可能限制商业化
        - IP 律师 — 交割前委托 FTO 分析
      - - 股权结构表与优先股堆叠
        - 未公开股权结构表；Series E 优先权条款未披露
        - 回报建模需要看清清算优先权瀑布
        - 法务 / VC 律师 — 尽调中索要股权结构表和优先权条款
    claimRefs:
      - CV017
      - CV018
    enumerationScope:
      coverage: partial
      basis: Six highest-priority diligence asks; additional asks exist but are lower priority.
    notes: 第 1–5 项是投资决策前的尽调阻断项；第 6 项是回报建模必需材料。
