      - number: '3.3'
        title: 竞争风险与护城河耐久性
        blocks:
          - type: paragraph
            body: >-
              Astranis 的竞争护城河真实存在，但仍在成熟。最耐久的护城河包括：（1）专属小 GEO
              细分的先发优势——尚无竞争者证明同等制造深度或在轨运营规模；（2）卫星部署后的高切换成本；（3）有国防背书的团队（Gen. Hyten、Matt Long 的 Palantir
              背景），为国家安全客户带来差异化触达；（4）PTS-G 主承包商资格，形成政府在册项目背书。

              最重要的竞争风险包括：（1）Starlink 降价可能让共享 LEO 对原本会购买专属 GEO 容量的客户具备吸引力；（2）传统大型 GEO
              运营商或国防主承包商，可能依托既有资产负债表和客户关系开发小型专属卫星产品；（3）再次出现在轨技术故障可能损害客户信心，尤其已有 Arcturus
              先例；（4）国防采购受预算和政策变化影响，合同时间和范围都可能被改变。ViaSat-3 的 $420M 减记说明，即便对成熟运营商，在轨风险也不小。

              整体看，Astranis 占据一个短期难以挑战的差异化利基，但在 $2.8B 估值下，护城河还不能称为足够宽。爬坡至年产 24 颗卫星、赢得更多政府项目、成功发射 Omega Gen
              2，是显著强化竞争位置的关键里程碑。
