            - 规模化制造质量漏检
        - label: 高影响
          values:
            - 发射延误；网络入侵
            - PTS-G 合同 T4C；供应链中断；关键客户流失
            - 融资失败；成本超支
        - label: 中影响
          values:
            - ITU 协调延误
            - FCC 许可证修改延误
            - 拼车发射排期延后
  - id: FR002
    title: 风险传导图：风险如何流向估值
    type: dag
    claimRefs:
      - CR002
      - CR006
      - CR009
      - CR012
      - CR014
    description: 该 DAG 展示主要风险触发因素如何传导到收入、利润率、融资和估值。
    data:
      nodes:
        - id: n1
          label: 在轨异常
          detail: 航天器失效；资产全部损失
          type: risk
        - id: n2
          label: ITAR 执法
          detail: DDTC 执法行动或自愿披露
          type: risk
        - id: n3
          label: PTS-G 终止
          detail: 政府合同 T4C 或范围缩减
          type: risk
        - id: n4
          label: 成本超支
          detail: 单星成本高于计划
          type: risk
        - id: n5
          label: 客户流失
          detail: 锚定客户不续约或迁移
          type: risk
        - id: n6
          label: 收入不达预期
          detail: 交付未达标或合同取消
          type: impact
        - id: n7
          label: 利润率受压
          detail: 单星成本上升或罚金支出
          type: impact
        - id: n8
          label: 融资风险
          detail: 投资人信心下降或融资失败
          type: impact
        - id: n9
          label: 估值受损
          detail: 下轮融资估值下调或公司陷入困境
          type: impact
      edges:
        - from: n1
          to: n6
        - from: n1
          to: n8
        - from: n2
          to: n6
        - from: n2
          to: n8
        - from: n3
          to: n6
        - from: n3
          to: n7
        - from: n4
          to: n7
        - from: n4
          to: n8
        - from: n5
          to: n6
        - from: n6
          to: n9
        - from: n7
          to: n9
        - from: n8
          to: n9
  - id: FR003
    title: 依赖图：关键合作方、供应商和监管机构
    type: dag
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR003
    description: 该 DAG 展示 Astranis 的关键外部依赖，以及这些依赖与核心业务功能的关系。
    data:
      nodes:
        - id: d1
          label: SpaceX（Transporter）
          detail: 通过拼车发射提供主要运载火箭
          type: supplier
        - id: d2
          label: 太阳能板供应商
          detail: 单一来源 GaAs 太阳能阵列
          type: supplier
        - id: d3
          label: 抗辐射 FPGA 供应商
          detail: 任务关键计算组件（Xilinx / Microchip，估计）
          type: supplier
        - id: d4
          label: FCC
          detail: GEO 频谱许可机构
          type: regulator
        - id: d5
          label: DDTC / ITAR
          detail: 出口管制监管机构
          type: regulator
        - id: d6
          label: 美国空军（PTS-G）
          detail: 关键政府客户和项目锚点
          type: customer
        - id: d7
          label: CBN Alaska
          detail: Omega 卫星的锚定商业客户
          type: customer
        - id: d8
          label: Astranis 运营
          detail: 核心卫星制造和任务运营
          type: company
      edges:
        - from: d1
          to: d8
        - from: d2
          to: d8
        - from: d3
