  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Astranis 的投资逻辑有三根支柱：（1）在小型 GEO 专用容量上具备先发优势，服务结构性供给不足的市场——发展中国家电信运营商、政府韧性通信买家、航空 IFC 运营商；这些场景里，大型 GEO
              太贵，LEO 超级星座又缺少覆盖精度；（2）软件定义架构支持多任务重构，迭代周期快于传统卫星制造商；（3）2026 年 $455M Series E 提供多年现金跑道，可执行 PTS-G 政府锚定合同和 10+
              颗卫星商业积压订单。


              反向逻辑同样清晰：Arcturus 全损说明任务失败不是尾部风险，而是已经发生的结果；第二次异常很可能重置投资人信心。资本强度高，现金流盈亏平衡还需要尚未证明的制造规模。PTS-G
              合同虽有声望，却引入固定价格执行风险。五个具名运营商带来客户集中度；Series E 隐含估值在悲观情景下未必能被 DCF 支撑。ITAR 合规、IP 实施自由和频谱协调仍是未解决的尾部风险。


              建议是有条件的：现有证据不支持简单买入或放弃，而是支持尽调设闸的投资——如果五个关键风险项（保险、制造良率、PTS-G 合同条款、FTO 意见、ITAR
              审计）都能得到正面解决，再推进完整一手尽调。估值高度价格敏感；入场纪律至关重要。
            claimRefs: []
