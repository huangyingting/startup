      - number: '6.4'
        title: 扩张、集中度风险与增长展望
        blocks:
          - type: paragraph
            body: >-
              在 Astranis 目前规模下，客户集中度是最主要的商业风险：五个客户各自约占当前在轨收入的 20%，任何客户流失都没有缓冲。DoD 成为客户后又引入一种新的集中度——PTS-G 项目放大后，政府收入可能从约
              20% 升至高得多的占比，形成锚定租户效应，也带来政策依赖。先落地、再扩张的逻辑——向现有客户销售更多卫星——尚未被公开验证；公司没有宣布任何现有客户的多星追加订单。Chunghwa Telecom
              可能是关键测试，验证 Astranis 能否以更快节奏签下新客户。10+ 颗已签约卫星的管线说明 Astranis 正在成功获取新客户，但交易对手名称、时间表和合同金额不透明，管线质量无法独立验证。客户数增至
              20+ 将大幅降低集中度风险，并验证可服务市场逻辑。即便需求环境有利，采购摩擦（18–36 个月销售周期）和 ITAR 合规负担也会压住客户增长速度。
