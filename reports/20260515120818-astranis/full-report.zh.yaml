      - number: '6.2'
        title: 已披露客户证明与采用轨迹
        blocks:
          - type: paragraph
            body: >-
              Astranis 的五个客户都已有卫星投入商业服务，客户证据质量最高：不是试点或评估，而是正式商用部署。DITO Telecommunity（菲律宾）在 2023
              年末开通服务，为这个群岛国家的第三家全国性电信运营商提供全国宽带覆盖。CBN（Alaska） 在 2024 年 4 月接收 Omega 卫星，验证了区域 ISP 服务农村连接的用例。MB Group 通过
              Astranis 建造的卫星运营太平洋岛屿连接服务，Pacific Data Port 服务构成直接客户参照。Anuvu 在 2024 年为太平洋航线部署 MicroGEO 卫星，这是首个商业小型 GEO IFC
              部署，并获 Runway Girl Network 独立确认。U.S. Space Force PTS-G 主承包合同在 2025 年 8 月授予，是 Astranis
              首个政府主承包合同，也验证了平台可服务机密国防通信。管线端，Chunghwa Telecom（台湾）在 2024 年末签署服务协议，Astranis 披露另有 10+ 颗卫星已签约。2023 年 Arcturus
              卫星异常（Alaska 客户）通过在轨固件更新解决，没有导致合同终止，验证了运营韧性。三年内（2022–2025）在轨卫星从 1 颗增至 5 颗，说明执行持续推进，但绝对数量仍小。
