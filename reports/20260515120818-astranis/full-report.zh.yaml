      - number: '5.4'
        title: 部署、可靠性、信任与合规
        blocks:
          - type: paragraph
            body: >-
              Astranis 5 项任务的运营记录，是产品可靠性最直接的证据；Arcturus 异常通过固件更新解决，既是风险事件（1 颗卫星故障），也是验证事件（软件定义架构无需更换硬件即可恢复）。客户部署跨越 4
              个不同监管体系（Pacific Islands、Philippines、Alaska/US 和 DoD/classified），证明 Astranis 有能力处理多司法辖区监管要求。所有 Astranis
              卫星技术均受 ITAR（International Traffic in Arms Regulations）约束，该规则限制卫星硬件和软件向外国公民转移；在国际商业部署中管理 ITAR
              合规会增加开销，但也为外资竞争者设置进入壁垒。PTS-G 项目要求 Astranis 满足 DoD 网络安全框架（很可能为 CMMC Level 3 或同等要求）以及政府卫星安全标准。FCC Ka-band
              许可义务要求持续保持协调合规。公司未公开披露 AS9100 航空航天质量认证，这是机构投资人评估制造流程成熟度时的尽调缺口。在轨卫星支持包括 24/7 遥测监控、固件更新能力，以及面向客户的容量可用性 SLA
              承诺。
