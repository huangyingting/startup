companyProfile:
  summary: >-
    Astranis Space Technologies 由 John Gedmark（CEO）和 Trevor Bennett（CTO）于 2015 年在 San Francisco 创立。公司的核心产品是 MicroGEO
    卫星：一颗约 400
    kg、在地球静止轨道运行的软件定义微型卫星，为单一运营商提供专属宽带容量，通常采用多年期容量合同。卫星的软件定义无线电（SDR）载荷支持在轨频率和波束重配置，使同一套硬件设计能够服务不同客户需求。Astranis 在 San
    Francisco 自建卫星产线，瞄准的运营商细分市场既小到不适合传统大型 GEO 采购，又需要 LEO 巨型星座无法给出的专属频谱和精准覆盖。

    公司曾遭遇 Arcturus（2023）任务全损，影响 CBN Alaska 客户；随后通过发射 Omega 卫星（同样服务 CBN，2024）以及面向 Anuvu 的 IFC 卫星（2024）完成恢复。Q1
    2026，Astranis 完成 $455M Series E 融资，并获任美国 Space Force PTS-G（Protected Tactical Satellite
    Ground）项目主承包商——这是重要的政府信用里程碑。公司已有 10+ 颗卫星签约，并在 San Francisco 扩建制造设施。
