      - number: '4.4'
        title: 财务结论与尽调阻塞项
        blocks:
          - type: paragraph
            body: >-
              Astranis 在卫星基础设施投资版图中占据有吸引力的位置：其专属容量模式，从信用质量较高的主权和政府客户处产生长期、经常性、难取消的收入；一旦合同对应卫星在轨，收入质量很高。公司相对传统 GEO
              的制造成本优势可信，并得到公司运营验证，但尚未独立审计。主要财务风险是资本强度：每建造并发射一颗卫星，都需要在任何经常性收入确认前先投入 USD 60–100M；7+
              颗追加卫星管线还需要大量后续资本。收入集中风险偏高，任何单颗卫星故障或延迟，都会代表近期收入的显著部分。2023 年 Arcturus
              卫星故障通过固件更新解决，说明运营风险真实存在但可管理。逆风情景的担忧在于，如果 Series F 或项目融资轮延迟、同时烧钱继续，现金跑道风险会在 18
              个月内迅速变得尖锐。关键尽调阻塞项包括：（1）实际收入和年经常性收入（ARR）未公开披露；（2）合同积压订单构成及交易对手信用质量；（3）DoD PTS-G
              合同价值和付款计划；（4）公司声称的制造成本与实际建造成本之间的差异。
            claimRefs: []
