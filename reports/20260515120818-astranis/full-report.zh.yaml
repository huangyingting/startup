      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Astranis 由 John Gedmark 和 Ryan McLinko 共同创立，二人分别担任 CEO 和 CTO。截至 May 2026，二人仍在一线任职。自 2024
              年以来，公司领导层显著补强，引入了一批有经验的 C-suite 高管：Mark Mesler（CFO，曾任 Archer Aviation 和 Bloom Energy）、Matt Long（总法律顾问，曾任
              Palantir 首任总法律顾问，将该公司法务职能从 100 人阶段扩展到 3,000 人阶段）、Shane Noe（SVP People，曾任 ClickUp 和 Okta）——3 人均于 September
              22, 2025 同时入职。对后期私营公司来说，这类高管集中补位通常意味着公司在准备重大客户规模化，或为进入公开市场做准备。

              General (Ret.) John E. Hyten 于 March 2026 出任战略顾问委员会主席，战略意义很强。Hyten 曾任 Joint Chiefs of Staff 副主席，也曾任 U.S.
              Strategic Command 司令——可谓核威慑与战略威慑体系中级别最高的军方角色之一。他加入一家早期商业卫星公司，既反映 Astranis
              的国防野心，也呼应更广泛的国防科技投资逻辑：军事采购会流向能交付韧性强、成本低、部署快的商业卫星供应商。

              鉴于公司仍为私营，治理仍由创始人控制。CEO Gedmark 的关键人物集中风险很实质：Astranis 的战略、客户关系和投资人信心，都是围绕他的领导力建立起来的，并经历了包括 2023 年 Arcturus
              失败在内的多次逆风。September 2025 同时招聘 CFO、GC 和 CHRO，说明公司在为更强的财务纪律和未来潜在流动性事件做准备；同时也反映，以其当前规模看，公司过去在这些职能上偏薄。
