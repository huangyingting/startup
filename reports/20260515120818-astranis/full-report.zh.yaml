      - number: '5.3'
        title: 技术差异化与知识产权
        blocks:
          - type: paragraph
            body: >-
              Astranis 的技术护城河由 4 根支柱支撑：（1）SDR 载荷 IP——10+ 年开发积累的定制数字波束成形算法和在轨可重配置固件；（2）内部制造流程 know-how——70%
              垂直整合带来传统卫星集成商无法匹配的 12 个月交付周期；（3）监管资产——覆盖多个轨道槽位的 FCC Ka-band GEO 频谱许可，复制这些资产需要多年 ITU 协调和 FCC
              审查；（4）运营数据——为主权和政府客户管理 5 颗不同卫星的多任务经验。USPTO 专利申请（包括可重构卫星载荷和数字波束成形方法申请）提供一定 IP
              保护，但完整专利组合未公开披露。竞争威胁在于，大型主承包商（Airbus、Boeing、Northrop）和 SDR 专家（Kratos、Comtech）可能用更大的 R&D 预算开发竞争性小 GEO SDR
              平台；不过复制 Astranis 的系统级集成、制造速度和轨位组合，需要多年并行投入。SDR 技术在组件层面日益商品化，因此 Astranis 必须持续推进系统级集成优势，尤其是 Gen 2 DSP 性能。
