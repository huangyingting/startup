  - id: FV001
    title: 推荐逻辑：从证据到决策
    type: flow
    claimRefs:
      - CV001
      - CV004
      - CV005
      - CV007
    description: 流程图追踪证据链：市场机会、产品验证、财务健康度、竞争位置和风险画像如何共同导向有条件的投资建议。
    data:
      nodes:
        - id: n1
          label: 市场机会
          detail: $15B+ 小型 GEO TAM；服务不足的国家和 IFC 细分市场
          type: input
        - id: n2
          label: 产品验证
          detail: 2 颗在轨、5 个客户、PTS-G 主承包；SDR 差异化已获验证
          type: input
        - id: n3
          label: 财务健康度
          detail: $455M Series E；资本密集；盈亏平衡尚未验证
          type: input
        - id: n4
          label: 竞争位置
          detail: 小型 GEO 先发；LEO 竞争间接；传统可比方案太贵
          type: input
        - id: n5
          label: 风险画像
          detail: 异常风险、ITAR、资本密集、PTS-G T4C = 高
          type: input
        - id: n6
          label: 投资逻辑强度
          detail: 市场 + 产品强；财务历史记录弱
          type: intermediate
        - id: n7
          label: 估值评估
          detail: $2.5–3.5B 投后估值；有条件可支持；对价格敏感
          type: intermediate
        - id: n8
          label: 有条件推进
          detail: 推进一手尽调；投资承诺前解决 5 个阻碍项
          type: output
      edges:
        - from: n1
          to: n6
        - from: n2
          to: n6
        - from: n3
          to: n7
        - from: n4
          to: n6
        - from: n5
          to: n7
        - from: n6
          to: n8
        - from: n7
          to: n8
  - id: FV002
    title: 估值敏感性：关键 EV 驱动因素
    type: bar
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV012
    description: 条形图展示 EV 敏感性如何随关键估值假设变化：收入倍数、卫星交付节奏、PTS-G 合同价值和制造成本。
    data:
      items:
        - label: 悲观：异常 + 2x 倍数
          value: 1200
        - label: 悲观：PTS-G 终止 + 3x
          value: 1500
        - label: 基准：3 颗卫星 + 5x 倍数
          value: 2500
        - label: 基准：5 颗卫星 + 6x 倍数
          value: 3800
        - label: 乐观：7 颗卫星 + 8x 倍数
          value: 6400
        - label: 乐观：10 颗卫星 + 9x 倍数
          value: 9000
  - id: FV003
    title: 估值 / 回报区间：Series E 入场
    type: range
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
    description: 区间图展示退出时低 / 基准 / 高三种企业价值结果，以及以 $3B 投后估值进入的 Series E 投资人的对应回报倍数。
    data:
      items:
        - label: 退出 EV（USD M）
          low: 1000
          mid: 3200
          high: 8500
        - label: Series E 回报倍数（x）
          low: 0.3
          mid: 1.8
          high: 3.5
        - label: 净 IRR 估计（%）
          low: -15
          mid: 12
          high: 28
        - label: 退出时间（自 2026 年起的年数）
          low: 3
          mid: 5
          high: 7
  - id: FV004
    title: 投资 KPI：IC 就绪评分
    type: kpi
    claimRefs:
      - CV001
      - CV004
      - CV006
      - CV014
      - CV018
    description: 投资委员会评分卡从 7 个维度给 Astranis 打分：市场、产品、护城河、经济性、风险、估值和证据质量。
    data:
      items:
        - label: 市场机会
          value: 8
          detail: 国家和 IFC 卫星容量需求大、服务不足且增长中
        - label: 产品 / 验证
          value: 6
          detail: 2 颗在轨卫星；5 个客户；但 Arcturus 后只有 2 年记录
        - label: 竞争护城河
          value: 7
          detail: SDR 架构有差异化；具备先发优势；但小型 GEO 进入壁垒中等
        - label: 单位经济
          value: 4
          detail: 资本密集；制造规模未验证；没有公开成本或利润率数据
        - label: 风险画像
          value: 3
          detail: 异常风险、ITAR、资本密集和 PTS-G 固定价格风险都很实质
        - label: 估值纪律
          value: 5
          detail: $3B 投后估值有条件可支持；缺少公开财务数据，无法精确锚定
        - label: 证据质量
          value: 5
          detail: 核心商业事实已确认；财务和合规细节需要一手尽调
