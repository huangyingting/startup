      - number: '7.2'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >-
              Astranis 所处环境监管很重，横跨 ITU 频谱协调、FCC 许可、ITAR/EAR 出口管制和政府合同合规。每一项都是不同的风险向量。


              FCC 许可：Astranis 持有特定轨位 GEO 运营的 FCC 市场准入授权。任何任务参数调整（轨道、频率、功率）都需要 FCC 批准，从而给新卫星引入时间表风险。SpaceX、Amazon
              等对相邻频谱的竞逐申请，也会拉长干扰协调。


              ITAR/EAR：Astranis 制造军用级卫星硬件，所有硬件和技术数据很可能属于 USML Category XV 项目。PTS-G 合同会提高 ITAR
              审查强度；任何向外国国民的未授权技术披露——即便发生在共享制造设施中——都可能触发 DDTC 执法。卫星行业历史上的 ITAR 罚款曾高达数亿美元。


              PTS-G 合同风险：作为主承包商，Astranis 承担完整的成本、进度和技术履约责任。固定价格合同一旦成本超支，会直接压缩利润率，或迫使公司补充资本。政府按便利条款终止合同——在 DoD
              太空项目中历史上并不少见——会抹掉一条重要的预期收入流。


              知识产权风险：软件定义载荷架构会产生与 ViaSat、SES 等成熟卫星公司重叠的权利主张。公开渠道没有已知在审诉讼，但 SDR 载荷处理的实施自由尚未公开确认。
