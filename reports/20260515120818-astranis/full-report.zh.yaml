  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户价值主张
        blocks:
          - type: paragraph
            body: >-
              Astranis 交付的是垂直整合的卫星连接服务：客户获得一颗按其国家或区域覆盖需求建造的专属地球静止轨道卫星，并由 Astranis
              在长期托管服务安排下运营。产品不是频谱租赁，也不是共享卫星上的容量转租——而是一项为单一客户专门设计、制造、发射和运营的定制小 GEO
              资产。客户获得的结果是带有专属带宽的主权宽带基础设施：国家电信公司得到一颗只服务其用户的卫星；政府得到一颗只有其机构可访问的卫星；Anuvu
              这样的连接供应商得到一颗可由其全容量控制、再转售给航空旅客的卫星。Astranis 的 Gen 1 平台（MicroGEO / UtilitySat）由 400 kg 卫星提供 5–8 Gbps Ka-band
              容量；Gen 2 平台目标是在相近质量下达到 50 Gbps。截至 May 2026，5 项任务在轨，服务 Tonga/Pacific Islands（MB
              Group）、Philippines（DITO）、Alaska（CBN）、机上连接（Anuvu）和美国 DoD（PTS-G 项目）。关键客户价值驱动是交付周期（12 个月 vs. 传统 GEO 的 3–7
              年）、成本效率（全包约 $60–100M vs. $330–550M）和主权控制（专属资产，而非共享容量）。
