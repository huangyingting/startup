  claims:
  - id: CI001
    statement: Astranis' primary revenue mechanism is the sale of dedicated GEO satellite capacity through long-term fixed-price
      contracts with national telcos, ISPs, and government agencies, typically 10–15 years in duration.
    type: company-claimed
    topic: revenue-model
    sourceRefs:
    - SI001
    - SI005
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QI001
    - QI002
  - id: CI002
    statement: Astranis had five satellites on orbit as of mid-2025, serving customers in Tonga, the Philippines (DITO Telecommunity),
      Alaska (CBN), in-flight connectivity (Anuvu), and a classified US DoD mission.
    type: third-party-reported
    topic: revenue-traction
    sourceRefs:
    - SI006
    - SI017
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QI013
  - id: CI003
    statement: Astranis' Gen 1 satellite delivers 5–8 Gbps of broadband capacity; its Gen 2 satellite is designed for 50 Gbps,
      representing a 6–10× increase in capacity for an estimated 2× increase in manufacturing cost, improving the revenue-per-satellite
      economics materially.
    type: company-claimed
    topic: capacity-economics
    sourceRefs:
    - SI001
    - SI011
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QI003
    - QI004
  - id: CI004
    statement: No satellite contract values have been publicly disclosed by Astranis; market estimates for small-GEO dedicated
      capacity range from USD 10–30M per year per satellite based on comparable satellite service agreements and NSR/Euroconsult
      benchmarks.
    type: inferred
    topic: pricing
    sourceRefs:
    - SI005
    - SI013
    - SI020
    confidence: low
