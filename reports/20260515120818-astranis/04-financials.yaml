- id: TI004
  title: Capital Adequacy Table
  columns:
  - Item
  - Current / Estimated Value
  - Source
  - Notes
  rows:
  - - Total equity raised (cumulative through Series E)
    - ~$455–550M
    - SpaceNews; TechCrunch; WSGR announcement
    - Includes ~$13M Series A (2019), ~$90M Series B (2021), ~$200M Series C (2022), ~$150M Series D (2024), ~$200M+ Series
      E (2026)
  - - Last reported cash / liquidity position
    - Not publicly disclosed
    - Private company — no public reporting requirement
    - Inferred from funding dates and burn estimates; see runway estimate row
  - - Estimated monthly cash burn
    - ~$10–18M/month
    - Inferred from headcount and capex activity
    - ~400 FTE at avg $300k loaded + manufacturing overhead = $120–200M/yr; partially offset by milestones
  - - Estimated runway from Series D close (Jul 2024)
    - ~8–15 months (i.e., into mid-to-late 2025)
    - Derived from $150M Series D and burn estimate
    - Series E in Jan 2026 is directionally consistent with this runway projection
  - - Planned use of Series E capital
    - Gen 2 production; manufacturing scale-up to 24 sats/yr; DoD expansion
    - WSGR press release; SpaceNews reporting
    - Capex-heavy program; each satellite requires $60–100M all-in capital
  - - Debt / project finance obligations
    - Not publicly disclosed; project finance discussed but unconfirmed
    - Inferred from reporting; no required disclosure for private company
    - If project finance closes, may allow off-balance-sheet satellite capex capacity
  - - Next major financing trigger
    - Gen 2 satellite pre-production milestone OR additional DoD contract award
    - Analyst inference from burn and pipeline
    - Series F or follow-on project finance likely required within 18–24 months of Series E
