- id: SI-capital-adequacy
  title: Capital Adequacy and Financing Position
  body: 'Astranis has raised approximately USD 455–550M in equity and debt financing across multiple rounds: a USD 13M Series
    A in 2019, a USD 90M Series B in 2021, a USD 200M Series C in 2022, a USD 150M Series D announced in July 2024, and a
    reported Series E of USD 200M+ in January 2026. The Series D at $150M from Andreessen Horowitz and others implies a post-money
    valuation of approximately USD 1.5–2.5B based on contemporaneous reporting. Given an estimated monthly cash burn of USD
    10–18M (reflecting ~400 employees plus active satellite manufacturing), USD 150M of new capital in mid-2024 provides an
    estimated 8–15 months of runway, placing the next financing event in mid-to-late 2025 or early 2026 — consistent with
    the Series E announcement in January 2026. The PTS-G prime contract with the US Space Force, awarded in 2025, may provide
    non-dilutive government revenue to partially offset cash burn, though program timelines and milestone payments are classified.
    Astranis has not publicly disclosed any revolving credit facility or long-term debt obligations beyond project finance
    discussions. Manufacturing scale-up to the planned 24 satellites/year capacity requires additional capital, making the
    company financing-dependent for at least the next 18–24 months beyond the Series E.'
  tableRefs:
  - TI004
  figureRefs:
  - FI004
  sourceRefs:
  - SI002
