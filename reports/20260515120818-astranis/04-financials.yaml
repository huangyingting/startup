  - id: CI005
    statement: Astranis' customer acquisition cycle for dedicated satellite contracts is estimated at 18–36 months, consistent
      with government and telco procurement timelines; once signed, contracts are effectively non-cancellable for the satellite's
      operational life.
    type: inferred
    topic: sales-cycle
    sourceRefs:
    - SI005
