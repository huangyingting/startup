- id: TI005
  title: Public Financial Gaps Table
  columns:
  - Missing Private Metric
  - Impact on Investment Decision
  - Exact Diligence Path
  rows:
  - - Total annual revenue / ARR
    - Cannot validate revenue trajectory, growth rate, or proximity to breakeven
    - Request audited income statement and monthly revenue schedule by contract for FY2022–FY2025
  - - Per-satellite contract value and term
    - Cannot compute satellite-level IRR, payback, or portfolio yield
    - Request signed service agreements or redacted revenue schedules per on-orbit satellite
  - - DoD PTS-G contract value and milestone payments
    - Government revenue likely 20–50% of total; fully opaque; large uncertainty band
    - Request unclassified revenue summary; review unclassified USSF budget exhibits
  - - Actual manufacturing COGS per satellite
    - Determines whether $30M cost claim is accurate and whether margins are real
    - Request bill-of-materials, overhead allocation, and completed satellite COGS schedules
  - - Actual monthly cash burn and current cash balance
    - Cannot verify runway or financing dependency without balance sheet data
    - Request management accounts showing monthly cash burn and current balance; review bank covenant disclosures
  notes: These are the five highest-priority financial diligence items for any investment in Astranis.
  enumerationScope:
    coverage: sample
    basis: Financial gaps identified through systematic analysis of publicly available information and confirmed by absence
      of disclosures in all accessible public sources as of May 2026.
