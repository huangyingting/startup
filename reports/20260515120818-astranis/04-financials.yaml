  - id: CI010
    statement: 'Based on public-company GEO satellite operator gross margins (Iridium FY2024: ~63%; Viasat satellite services
      segment: ~40–55%), Astranis'' satellite operations gross margin is estimated at 40–65% once capex is amortised, assuming
      contract revenue consistent with market benchmarks.'
