  rows:
  - - Manufacturing cost per satellite (Gen 1)
    - ~$30M (company-claimed)
    - Low — company-claimed; not independently audited
    - Drives gross margin and capital-efficiency thesis
    - Request audited COGS for at least two completed satellites
  - - Manufacturing cost per satellite (Gen 2)
    - ~$50–70M (estimated)
    - Low — inferred from Gen 2 complexity and benchmarks
    - Higher Gen 2 capex may compress margins vs Gen 1 narrative
    - Request Gen 2 target cost model and variance analysis
  - - Launch cost per satellite (Falcon 9)
    - ~$30–70M
    - Medium — SpaceX commercial pricing publicly available
    - Second-largest cost item; rideshare availability critical
    - Confirm locked launch contracts and pricing for pipeline satellites
  - - Total all-in capex per satellite
    - ~$60–100M
    - Medium — combination of two partially public data points
    - Anchor for return-on-satellite calculations
    - Request actual all-in build + launch cost for completed missions
  - - Annual contract revenue per satellite (Gen 1)
    - ~$10–30M/yr (market estimate)
    - Low — no contract values disclosed
    - Determines payback period and IRR per satellite
    - Request signed contract revenue schedules for each on-orbit satellite
  - - Simple payback period per satellite
    - ~3–7 years (derived)
    - Low — derived from two low-confidence inputs
    - Key underwriting metric; range too wide for conviction
    - Triangulate from actual contract value and capex disclosures
  - - Gross margin (satellite operations)
    - ~40–65% (industry benchmark range)
    - Low — derived from public GEO operator comps; Astranis undisclosed
    - Core profitability indicator for satellite-as-infrastructure model
    - Request actual gross margin by satellite or contract cohort
