    - QI008
  - id: CI006
    statement: Astranis had raised approximately USD 455–550M in cumulative equity and debt by early 2026, with a Series E
      financing of approximately USD 200M+ announced in January 2026 according to reporting from WSGR and Viasatellite, and
      a Series D of USD 150M closed in July 2024.
    type: third-party-reported
    topic: capital-raised
    sourceRefs:
    - SI024
    - SI025
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QI017
    - QI018
  - id: CI007
    statement: Astranis claims a satellite manufacturing cost of approximately USD 30M per small-GEO satellite, compared to
      USD 250–400M for traditional large-GEO satellites, representing a roughly 8–13× reduction in manufacturing cost per
      satellite.
    type: company-claimed
    topic: manufacturing-cost
    sourceRefs:
    - SI001
    - SI016
    confidence: medium
    freshness: current
    answersQuestionRefs:
