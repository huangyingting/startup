  title: Financials
  summary: Astranis generates revenue through long-term dedicated satellite capacity contracts with national telcos, ISPs,
    and government agencies, with five satellites on orbit as of 2025. The company's satellite manufacturing cost claim of
    ~$30M per satellite versus $250–400M for traditional large-GEO is the linchpin of its investment thesis, though independently
    unverified. Total capital raised reaches ~$455–550M through the January 2026 Series E. Revenue, margins, and cash burn
    are not publicly disclosed; all financial metrics require management confirmation. The primary diligence blockers are
    actual contract values, COGS per satellite, and cash runway confirmation.
