    - QI010
  - id: CI008
    statement: Launch costs for Astranis satellites on SpaceX Falcon 9 are estimated at USD 30–70M per mission; SpaceX commercial
      pricing for dedicated Falcon 9 is approximately USD 67M per launch as of 2025, with rideshare options providing partial
      cost reductions.
    type: third-party-reported
    topic: launch-cost
    sourceRefs:
    - SI009
    - SI014
    confidence: medium
    freshness: current
    answersQuestionRefs:
