  evidenceGaps:
  - type: private-evidence-only
    severity: critical
    topic: revenue-and-contract-values
    missingEvidence: Astranis does not disclose revenue, ARR, or per-satellite contract values; without these, no reliable
      financial model can be built from public data alone.
    whyItMatters: Revenue and margin are the two most fundamental inputs to any investment valuation; their absence makes
      financial underwriting entirely contingent on management disclosures.
    diligencePath: Request audited annual income statements for FY2022–FY2025; per-satellite revenue schedules; DoD PTS-G
      unclassified summary; and management 3-year financial forecast.
