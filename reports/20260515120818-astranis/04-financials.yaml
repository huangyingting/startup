  - id: CI009
    statement: On an all-in capex basis (manufacturing plus launch), each Astranis small-GEO satellite requires approximately
      USD 60–100M, versus USD 330–550M for a traditional large-GEO satellite; the cost-per-Gbps advantage of small-GEO narrows
      when adjusted for capacity delivered per satellite.
    type: inferred
    topic: capex-per-satellite
    sourceRefs:
