    - Not demonstrated — no public multi-satellite order from existing customer
    - Medium
    - 'Diligence ask: request any signed follow-on orders from existing accounts'
  - - Pipeline quality (10+ on contract)
    - Not publicly verifiable — no customer names or values disclosed
    - Medium
    - Astranis claims 10+ on contract; independent verification unavailable
  - - Geographic concentration (Asia-Pacific + North America)
    - Moderate — two regions; no EU or LATAM presence yet
    - Low-Medium
    - Addressable market spans 60+ countries; LATAM and Africa represent expansion opportunity
  - - Sales channel dependency (direct only)
    - All known customers acquired via direct sales; no channel disclosed
    - Medium
    - Long procurement cycles; no reseller or integrator leverage announced
  notes: Risk assessment based on public information as of May 2026.
