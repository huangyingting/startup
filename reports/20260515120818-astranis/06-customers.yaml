sections:
- id: SU-segmentation
  title: Customer Segmentation and Market Demand
  body: Astranis serves four distinct customer segments, each with a different buyer profile, use case, and demand driver.
    The first and largest segment is sovereign national telcos and government-backed operators (DITO Philippines, MB Group
    Pacific Islands, Chunghwa Telecom Taiwan) who purchase dedicated national satellite capacity for strategic sovereignty
    and connectivity infrastructure reasons. These customers cannot use shared LEO or large-GEO capacity because they need
    sovereign control and dedicated bandwidth, and they cannot afford the $330–550M required for a traditional large-GEO satellite.
    Astranis' $60–100M all-in price point creates an entirely new addressable market. The second segment is regional ISPs
    and rural connectivity operators (CBN Alaska) who serve geographically challenging markets where terrestrial connectivity
    is economically infeasible. The third segment is in-flight connectivity operators (Anuvu) who need high-throughput Ka-band
    capacity over specific oceanic routes where neither fibre nor LEO coverage is available. The fourth and most recently
    added segment is the US government and DoD (Space Force PTS-G), which uses dedicated GEO capacity for proliferated tactical
    communications. Demand is structurally driven by geopolitical events (e.g., the 2025 Taiwan cable cut accelerating Chunghwa
    Telecom's procurement), digital divide policy (NTIA Internet for All), and the security imperative of avoiding shared-infrastructure
    dependency.
  tableRefs:
  - TU001
  figureRefs:
  - FU001
  sourceRefs:
  - SU001
  - SU016
  - SU019
  - SU020
  - SU021
- id: SU-customer-proof
  title: Named Customer Proof and Adoption Trajectory
  body: All five Astranis customers have satellites in commercial service, representing the highest quality of customer evidence
    — production deployment rather than pilot or evaluation. DITO Telecommunity (Philippines) entered service in late 2023,
    providing national broadband coverage across the archipelago for the country's third national telco. CBN (Alaska) received
    the Omega satellite in April 2024, demonstrating the regional ISP use case for rural connectivity. MB Group operates a
    Pacific Islands connectivity service over the Astranis-built satellite, with the Pacific Data Port service as a direct
    customer reference. Anuvu deployed a MicroGEO satellite for Pacific aviation routes in 2024, the first commercial small-GEO
    IFC deployment, independently confirmed by Runway Girl Network. The US Space Force PTS-G prime contract, awarded August
    2025, represents the first government prime contract for Astranis and validates the platform for classified defense communications.
    On the pipeline side, Chunghwa Telecom (Taiwan) signed a service agreement in late 2024, and Astranis reports 10+ additional
    satellites under contract. The 2023 Arcturus satellite anomaly (Alaska customer) was resolved via in-orbit firmware update
    without contract termination, confirming operational resilience. Growth from 1 to 5 on-orbit satellites in three years
    (2022–2025) demonstrates consistent execution, though the absolute count remains small.
  tableRefs:
  - TU002
  - TU003
  figureRefs:
  - FU002
  - FU003
  sourceRefs:
  - SU002
  - SU003
  - SU005
  - SU006
  - SU007
  - SU008
  - SU009
  - SU022
- id: SU-retention
  title: Retention, Durability, and Contract Structure
  body: 'Satellite service contracts are fundamentally different from SaaS subscription models: once a satellite is on orbit
    and accepted by the customer, the service relationship is effectively locked in for the 10–15 year operational lifetime.
    There is no monthly cancellation option, no downgrade path, and switching to a competitor requires procuring and launching
    an entirely new satellite (a multi-year, multi-hundred-million dollar decision). This structural lock-in implies near-100%
    gross revenue retention during the contract term, making traditional GRR and NRR metrics largely inapplicable. The relevant
    retention question for Astranis is end-of-life renewal: when the satellite reaches end of operational life (~2032–2037
    for the earliest missions), will customers choose to replace it with another Astranis satellite or a competitor''s offering?
    No renewals have yet been required given the company''s age; the first renewal decisions will emerge around 2032. No contract
    cancellations have been publicly reported. The Arcturus firmware update recovery demonstrates that operational resilience
    strengthens rather than damages the customer relationship. Astranis does not disclose NPS, CSAT, or SLA compliance data
    publicly; obtaining these from management due diligence is a critical input for end-of-life renewal risk assessment.'
  tableRefs:
  - TU004
  figureRefs:
  - FU004
  sourceRefs:
  - SU013
  - SU014
  - SU016
  - SU023
- id: SU-expansion
  title: Expansion, Concentration Risk, and Growth Outlook
  body: 'Customer concentration is the primary commercial risk at Astranis'' current scale: five customers each representing
    approximately 20% of current on-orbit revenue leaves no margin for customer loss. The DoD as a customer introduces a new
    type of concentration — government revenue could grow from ~20% to a much larger share as the PTS-G program scales, creating
    an anchor tenant effect but also policy dependency. The land-and-expand thesis — selling additional satellites to existing
    customers — has not been publicly demonstrated; no multi-satellite follow-on order from any existing customer has been
    announced. Chunghwa Telecom represents a potentially important test case for Astranis'' ability to sign new customers
    at a faster pace. The pipeline of 10+ satellites on contract suggests that Astranis is successfully acquiring new customers,
    but without transparency on the counterparty names, timelines, and contract values, pipeline quality cannot be independently
    validated. Growth to 20+ customers would substantially reduce concentration risk and validate the addressable market thesis.
    Procurement friction (18–36 month sales cycles) and ITAR compliance overhead constrain the speed of customer growth even
    in a favourable demand environment.'
  tableRefs:
  - TU005
  figureRefs: []
  sourceRefs:
  - SU014
  - SU015
  - SU016
  - SU017
  - SU026
