chapter:
  number: 6
  title: Customers
  summary: 'Astranis has five named satellite customers across four customer segments: sovereign national telcos (DITO Philippines,
    MB Group Pacific Islands), regional ISPs (CBN Alaska), IFC operators (Anuvu), and government/DoD (US Space Force PTS-G).
    All five customers have active on-orbit satellites, representing the highest quality of customer proof — production use
    rather than pilot or evaluation. Contracts are 10–15 years in duration with no public cancellations, implying near-100%
    retention during satellite service life. Concentration risk is high: five customers represent 100% of current on-orbit
    revenue, with any single satellite representing ~20% of total. The adversarial concern is that Astranis has not yet demonstrated
    renewal, upsell, or multi-satellite expansion within a single customer relationship, leaving the land-and-expand thesis
    unproven.'
