        Starlink, OneWeb/Eutelsat), traditional large-GEO shared capacity (SES, Intelsat, ViaSat),
        and government/defense satellite communications (Northrop Grumman, Lockheed Martin, L3Harris).
      type: inferred
      topic: competitive-landscape
      sourceRefs: [SP001, SP003, SP009]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001]
