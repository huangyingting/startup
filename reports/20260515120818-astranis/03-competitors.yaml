chapter:
  number: 3
  title: Competitive Positioning
  summary: >-
    Astranis occupies a distinct niche in satellite communications: dedicated small geostationary
    satellites weighing ~400 kg, versus the 3,000–6,400 kg of traditional GEO satellites and the
    shared LEO capacity of Starlink. Its primary competitors can be segmented into three groups:
    (1) LEO constellations (SpaceX Starlink, OneWeb/Eutelsat, AST SpaceMobile) competing for
    broadband connectivity budget; (2) traditional large-GEO operators (SES, Intelsat, Eutelsat,
    ViaSat) offering shared high-throughput capacity; and (3) defense-focused satellite providers
    (Northrop Grumman, Lockheed Martin, L3Harris) competing for US government contracts. Astranis'
    differentiation lies in speed-to-orbit (under 12 months vs. 3–7 years), dedicated national
    capacity, lower per-satellite cost, and proven small-GEO manufacturing capability. Its moats
    are still maturing: it lacks the scale of Starlink and the prime contractor track record of
    traditional defense primes, but the PTS-G award and Anuvu network demonstrate real competitive wins.
