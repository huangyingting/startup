- id: TV002
  title: Thesis / Anti-Thesis Table
  columns:
  - Argument
  - Evidence
  - What Would Change the View
  rows:
  - - 'THESIS: First-mover in small-GEO dedicated capacity for underserved markets'
    - Five named customers, government PTS-G contract, 10+ satellite backlog
    - Multiple well-funded competitors entering small-GEO before Astranis scales
  - - 'THESIS: Software-defined reconfigurability creates durable differentiation'
    - SDR payload architecture with in-orbit frequency reassignment; no comparable commercial product at same price point
    - Established player (SES, Intelsat, ViaSat) launches competitive SDR product at lower cost
  - - 'THESIS: $455M Series E provides execution runway'
    - Reported $455M raise in Q1 2026; confirmed by Bloomberg/TechCrunch press
    - Manufacturing cost overruns reduce runway below 24 months
  - - 'ANTI-THESIS: Arcturus anomaly shows mission failure is a real risk'
    - Confirmed total loss 2023; power subsystem failure; second satellite on orbit since
    - No anomaly on next 3 satellites within 24 months of commissioning
  - - 'ANTI-THESIS: Capital intensity and cash-flow breakeven unproven'
    - No public unit economics; capital-intensive hardware business; no confirmed manufacturing yield
    - Confirmed per-satellite cost at or below plan with manufacturing audit
  - - 'ANTI-THESIS: Valuation not supported by limited operating history'
    - Only 2 on-orbit satellites as of early 2026; no revenue disclosure; Series E implied valuation requires execution
    - Delivery of 3+ satellites on schedule with confirmed customer SLAs met
  claimRefs:
  - CV004
  - CV005
  - CV006
  - CV007
  notes: View changes are defined as falsifiable conditions that would materially shift the recommendation.
