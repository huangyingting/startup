  - - SES post-O3b acquisition
    - EV/revenue public company
    - 3–5x on $2B revenue; hybrid LEO/GEO operator
    - Small satellite integration and national connectivity comparable
    - Acquisition integration complexity created discount vs standalone
  - - Astroscale (post-Series F)
    - Enterprise value private
    - ~$1.5B for smaller addressable market
    - New-entrant space technology company, similar investor profile
    - Different mission (debris removal vs connectivity); less strategic value
  - - Maxar Technologies (pre-acquisition)
    - EV/revenue public company
    - 1.5–2.5x on $2B revenue; government imagery dominant
    - Government-anchored space company; defense and intelligence nexus
    - Imagery business different from connectivity; acquisition by Advent compressed multiple
