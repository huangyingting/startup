acknowledgedWarnings:
- dimension: unverifiedSource
  reason: Chapter 8 sources include SEC filings (Viasat 10-K, SES 20-F, Maxar SC13E3, Intelsat 8-K), PitchBook/Crunchbase
    private market data, and major trade and financial press (Bloomberg, TechCrunch, Reuters, SpaceNews, Payload Space, Euroconsult,
    NSR/Northern Sky Research, Viasatellite, Aviation Week, C4ISRNET, Satellite Today, Newcomer, Bloomberg Law, Capacity Media,
    Astroscale investor relations, Telesat investor relations) — all from established publishers with documented publication
    histories relevant to satellite sector valuation and investment analysis.
- dimension: paywallRisk
  reason: Chapter 8 covers satellite sector valuation, M&A comparables, and financing intelligence that is largely published
    in paywall-gated analyst reports (Euroconsult, NSR, PitchBook) and Bloomberg/Bloomberg Law financial databases. These
    are the authoritative sources for comparable transaction data; no equivalent open-access substitutes exist for satellite
    sector M&A multiples and private round valuation data.
