- id: TV005
  title: Thesis-Break and Kill Triggers Table
  columns:
  - Trigger
  - Threshold
  - Transmission to Thesis
  - Action Implication
  rows:
  - - Second on-orbit anomaly
    - Any anomaly within 18 months of commissioning of next satellite
    - Reliability thesis collapses; customer SLAs breach; financing impaired
    - 'Thesis break: halt additional capital; re-underwrite at restructuring terms'
  - - ITAR enforcement action
    - Any DDTC formal investigation or voluntary disclosure
    - Government contract at risk; investor confidence impaired; potential sanctions
    - 'Diligence blocker: do not close before certification'
  - - PTS-G termination or >30% scope reduction
    - SAM.gov contract modification showing T4C or scope cut
    - Revenue anchor gone; re-forecast model; company may need emergency raise
    - 'Thesis break: reassess hold vs exit on secondary market'
  - - Manufacturing cost overrun >20% vs plan
    - Per-satellite cost >120% of Plan at next milestone
    - Unit economics impaired; breakeven delayed; capital raise terms worsen
    - 'Yellow flag: request remediation plan; hold further tranches'
  - - Series F not announced within 24 months
    - No public capital raise by Q1 2028 at projected burn rate
    - Capital runway concern; distress path possible
    - 'Diligence flag: request bridge options; assess liquidity'
  claimRefs:
  - CV015
  - CV016
  enumerationScope:
    coverage: partial
    basis: Top five thesis-break triggers defined for the most material risk dimensions.
  notes: Triggers are designed to be observable without private access. Diligence blockers halt investment; thesis breaks
    require re-underwriting.
- id: TV006
  title: Final Diligence Asks Table
  columns:
  - Topic
  - Missing Evidence
  - Why It Matters
  - Owner / Diligence Path
  rows:
  - - On-orbit insurance coverage
    - No public insurance certificate or Arcturus recovery disclosure
    - Uninsured loss risk is a major downside variable in bear-case modeling
    - Management / underwriter — request certificates and Arcturus recovery docs
  - - Manufacturing yield and cost
    - No public yield rate, defect rate, or per-satellite cost trend
    - Unit economics are the core driver of the base-case return
    - Management — request manufacturing audit, yield metrics, BOM cost data
  - - PTS-G contract terms
    - Pricing structure, CLIN detail, performance incentives, T4C conditions not public
    - Contract risk profile is a key determinant of revenue certainty
    - Management / counsel — request contract summary with commercial terms
  - - ITAR compliance audit
    - No DDTC audit history or voluntary disclosure confirmed
    - ITAR enforcement is a company-ending risk if violations are undisclosed
    - Legal / compliance — request DDTC registration, TCP, past disclosures
  - - SDR payload FTO opinion
    - No public FTO confirmation for software-defined payload architecture
    - IP claims from ViaSat or SES could restrict commercialization
    - IP counsel — commission FTO analysis before closing
  - - Cap table and preference stack
    - No public cap table; Series E preference terms not disclosed
    - Return modeling requires understanding liquidation preference waterfall
    - Legal / VC counsel — request cap table and preference terms in diligence
  claimRefs:
  - CV017
  - CV018
  enumerationScope:
    coverage: partial
    basis: Six highest-priority diligence asks; additional asks exist but are lower priority.
  notes: Items 1–5 are diligence blockers before investment commit; item 6 is required for return modeling.
