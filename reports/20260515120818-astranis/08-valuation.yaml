    - $400–600M revenue × 5–7x = $2–4B EV; 1.2–2x on Series E
    - Manufacturing delay; capital rate environment; customer churn
    - ~50%
  - - Bear
    - Second anomaly OR PTS-G T4C OR capital drought; down-round at $1–2B; restructuring risk
    - Sub-$1.5B EV; <1x on Series E; potential impairment
    - Anomaly risk is the most likely trigger for this case
    - ~25%
