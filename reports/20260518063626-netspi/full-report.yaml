      - number: '7.5'
        title: Risk Mitigations and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              NetSPI has deployed a range of mitigations across its principal risk clusters. On the competitive
              front, the May 2026 launch of AI-powered Continuous Pentesting represents the most significant
              strategic mitigation: by embedding AI-assisted workflows into human-led testing, NetSPI attempts
              to maintain the depth advantage of expert analysis while reducing unit economics. The proprietary
              Resolve platform creates workflow lock-in that pure-automated alternatives cannot replicate
              without substantial switching cost. [CR001] [CR032]

              On the talent side, NetSPI's CREST accreditation, research publication program (18 CVEs,
              150+ offensive security tools on GitHub), and competitive compensation in a Minneapolis
              cost-of-living context provide relative advantages over coastal competitors for talent retention.
              The depth of its three-acquisition talent base (Silent Break, nVisium, Hubble) provides a
              pentester bench that newer competitors cannot replicate quickly. [CR004] [CR028]

              KKR's involvement is both a risk and a mitigation: the financial backing reduces liquidity risk,
              enables M&A-based growth (Hubble acquisition), and provides operational expertise from KKR's
              portfolio company network. The board composition (Niloo Razi Howe as CISA advisory council
              member and Tenable board member, Scott Lundgren as VMware Carbon Black CTO) provides strategic
              oversight depth. [CR009] [CR036]

              Regulatory complexity is partially mitigated by NetSPI's established financial sector client
              relationships and its compliance-focused delivery methodology, which aligns with DORA TLPT
              standards, TIBER-EU, and NIS2 obligations. [CR022] [CR023]

              Thesis-break conditions that would warrant fundamental re-evaluation of the NetSPI investment
              thesis include: (1) a demonstrated cost collapse in automated AI pentesting to below 20% of
              human-led testing cost within 24 months, accompanied by coverage quality parity on web/API
              attack surfaces; (2) Aaron Shilts' departure without a pre-designated and credibly qualified
              successor in place; (3) a high-profile client breach demonstrably linked to a vector tested
              but missed by NetSPI, triggering litigation, public reputational damage, and client cancellations;
              (4) KKR forcing an exit event at below-market valuation that destroys employee equity incentives
              and triggers talent attrition; or (5) sustained financial services sector cybersecurity spending
              reduction exceeding 20% over two consecutive years.

              The mitigation and kill-criteria table (TR005) provides monitorable trigger conditions with
              specific thresholds and action implications for each thesis-break scenario.
            claimRefs:
