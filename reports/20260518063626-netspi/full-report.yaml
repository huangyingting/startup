              PTaaS (branded as the Resolve platform) is NetSPI's flagship offering, deploying 350+ in-house pentesters
              across 50+ distinct service types. Service categories span Application security (web, API, mobile, thick
              client, H-DAP), Cloud security (AWS, Azure, GCP), Hardware, Network, Mainframe, and AI/ML security
