      - number: '7.3'
        title: Regulatory, Legal, and Compliance Risks
        blocks:
          - type: paragraph
            body: |
              NetSPI's regulatory risk profile is primarily an opportunity risk (regulations create mandatory
              pentesting demand) but carries compliance burden risk from both a delivery-model and an
              internal-operations perspective. The most significant current regulatory developments are
              DORA, NIS2, and the SEC cybersecurity disclosure rules.

              The EU Digital Operational Resilience Act (DORA) became fully effective January 17, 2025,
              requiring financial entities operating in the EU to conduct regular ICT risk assessments and
              Threat-Led Penetration Testing (TLPT). For NetSPI's nine-of-ten top US banks and other
              financial sector clients with European operations, DORA creates a mandatory procurement trigger
              for advanced penetration testing services — but also imposes specific delivery and reporting
              standards that NetSPI must meet to qualify for TLPT engagements. TIBER-EU (the ECB's
              threat-intelligence-based red-team methodology) is the benchmark; NetSPI must demonstrate
              TIBER-EU alignment for European financial sector clients. [CR022] [CR033]

              NIS2 (EU Network and Information Security Directive 2), transposed into member state law by
              October 2024, expands the scope of critical infrastructure sectors subject to cybersecurity
              requirements to include energy, transport, healthcare, digital infrastructure, and manufacturing.
              For NetSPI's European customer base, NIS2 creates new mandatory security assessment obligations.
              However, NIS2 compliance also requires NetSPI to maintain adequate controls for its own
              platform and delivery model — a supplier security requirement that imposes internal compliance
              costs. [CR023]

              The SEC's cybersecurity disclosure rules (effective December 2023) require US public companies
              to disclose material cybersecurity incidents within four business days and to include cybersecurity
              risk management strategy in annual reports. While NetSPI's clients bear this disclosure risk,
              the rules create a pull-through demand signal: public company CISOs are under board-level
              scrutiny to demonstrate security testing rigor. The rules also create a context where a NetSPI
              client experiencing a breach post-testing has heightened incentive to scrutinize the testing
              engagement — creating a tail-risk liability exposure for NetSPI. [CR024]

              CREST (the Council of Registered Ethical Security Testers) accreditation is a gating requirement
              for many of NetSPI's enterprise and government clients. Loss of CREST accreditation would
              disqualify NetSPI from significant portions of its addressable market. The ISO/IEC 27001:2022
              standard governs NetSPI's internal information security management systems — a certification
              renewal risk if operational or delivery practices drift from documented controls. [CR027] [CR028]

              FCC router security requirements and CCPA/GDPR data handling obligations add further compliance
              complexity for a firm that routinely handles sensitive client infrastructure data. [CR033] [CR034]

              The partner and dependency risk register (TR003) documents third-party dependencies including
              regulatory frameworks as critical dependencies. The critical dependency map (FR003) shows how
              regulatory frameworks and external dependencies interact.
