              EASM was relaunched in December 2024 with three commercial tiers: Lite (automated asset discovery),
              Standard (plus expert validation), and Plus (plus continuous external penetration testing). EASM features
              include weekly asset discovery, cloud configuration reviews, dark web monitoring, and domain monitoring.

              CAASM was introduced via the June 2024 Hubble acquisition, which brought the Aurora platform into the
              NetSPI portfolio. Aurora delivers agentless internal asset visibility via a knowledge graph, complementing
              EASM's external view with internal asset context in a unified exposure management workflow.

              BAS (Breach and Attack Simulation) won the "BAS Solution of the Year" award in 2023 and delivers
              continuous threat validation aligned to the MITRE ATT&CK framework. The module enables continuous
              detective-controls testing to identify defensive gaps between periodic penetration tests.
