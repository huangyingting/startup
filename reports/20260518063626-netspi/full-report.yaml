      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: |
              NetSPI's executive team combines deep offensive security expertise with
              enterprise software and financial services leadership. CEO Aaron Shilts joined
              in 2017 alongside the first institutional investment from Sunstone Partners,
              transforming the bootstrapped firm into a growth-stage platform business. Shilts
              represents a significant key-person risk given his centrality to KKR's ongoing
              investment relationship and external positioning.

              The broader leadership team has been substantially built out since the 2021 KKR
              investment. CTO Tom Parker (formerly Accenture Security CTO and founder of
              acquired Hubble Technology) drives product and technology vision. CPO Vinay
              Anand (formerly Palo Alto Networks Prisma Cloud VP of Product), CFO Jay Golonka
              (formerly Prometheus Group CFO with 25+ years of experience), COO Charles
              Horton, and CISO Norman Kromberg (30+ years in security operations, formerly at
              SouthernCarlson and Optum) collectively provide deep functional leadership.
              Tom Parker's dual role as former Hubble founder and current CTO creates a
              secondary key-person concentration in product and AI strategy.

              The board of directors reflects KKR's governance requirements alongside
              strategic cybersecurity depth. Scott Lundgren (CTO, VMware Carbon Black),
              John Spiliotis (KKR-affiliated, former SVP Sales at Palo Alto Networks), and
              Niloo Razi Howe (former CSO at RSA and Endgame, CISA advisory council member,
              board member at Tenable and Recorded Future) provide security-specialized
              oversight. This board composition is consistent with a KKR portfolio company
              being prepared for a potential future exit or public offering.
