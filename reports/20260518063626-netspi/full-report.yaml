  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Revenue growth deceleration
        - Two consecutive years of sub-10% YoY growth confirmed via official press releases
        - >-
          Thesis of market-share gain collapses; multiple compresses to 3–5x; enterprise value drops to $400–700M bear
          case
        - Downgrade from TRACK to AVOID; require evidence of recovery before re-evaluation
      - - NRR revealed below 100% (net churn)
        - Any disclosed NRR below 100% in data-room or public filing
        - >-
          Indicates customer contraction and undermines the recurring revenue premium underpinning the 8x+ multiple
          assumption
        - Immediate thesis break; no investment at any price above $700M without retention restructuring plan
      - - AI automation accelerates displacement
        - >-
          Pentera, Horizon3, or equivalent platforms capture 20%+ share of enterprise pentesting budget in any disclosed
          market study within 24 months
        - PTaaS pricing power erodes; structural gross margin compression below 40% likely; multiple re-rates to 3–4x
        - >-
          Downgrade to AVOID unless NetSPI demonstrates AI Continuous Pentesting cannibalizes threat offensively at >20%
          cost reduction
      - - KKR exit pressure or down-round signals
        - >-
          Reported M&A sale process, secondary market transaction below $800M, or EBITDA-based debt refinancing at
          below-market terms
        - Signals KKR is exiting below thesis; overhang from preference stack creates commons equity impairment risk
        - Immediate hold; require cap-table waterfall analysis before any further action
      - - Key executive departure
        - CEO Aaron Shilts or CTO Tom Parker departs without planned succession within 12 months of investment
        - Key-person risk materializes; KKR relationship and AI product roadmap continuity both threatened
        - Place on watchlist; trigger 90-day review of leadership transition plan and customer impact assessment
    notes: >-
      Triggers are defined for diligence and portfolio monitoring purposes. Thresholds are indicative, not contractually
      binding. Transmission analysis assumes all other thesis factors remain constant.
    claimRefs:
      - CV006
      - CV007
      - CV024
      - CV027
      - CV028
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Net Revenue Retention (NRR)
        - No NRR, GRR, or cohort retention data disclosed in any public source as of May 2026
        - >-
          NRR above 110% would justify 10x+ multiple; NRR below 100% is thesis-breaking; single most important metric
          for enterprise SaaS/PTaaS valuation
        - Data-room request; KKR investor relations; CFO interview
      - - Gross Margin
        - >-
          No gross margin, contribution margin, or EBITDA disclosed; estimated 40–55% based on services-model
          comparables
        - >-
          Gross margin determines the path to profitability and the earnings-based exit multiple; below 40% limits exit
          to revenue-only buyers
        - Financial data room; audited P&L request; benchmarking against Tenable/Rapid7 cost structures
      - - Customer Concentration
        - Top-10 customer revenue percentage and largest single-customer share not disclosed
        - >-
          High concentration (top-10 > 40% revenue) introduces churn risk and negotiating leverage imbalance that
          materially affects valuation
        - Data-room customer revenue table; CFO or CRO interview; reference checks with top named customers
      - - KKR Cap Table and Preference Structure
        - >-
          Preference terms, liquidation preference multiples, participation rights, and anti-dilution provisions for
          KKR's $500M+ commitment are undisclosed
        - >-
          Preference overhang directly determines common-equity return waterfall; investment may be uneconomic for
          common at current enterprise value estimates
        - Legal data room; KKR portfolio team disclosure; cap-table modeling under 3 exit scenarios
      - - Competitive Win Rate vs. Automated Platforms
        - No win/loss data against Pentera, Horizon3.ai, or other automated PTaaS platforms disclosed publicly
        - >-
          Determines whether NetSPI's human-AI hybrid model maintains pricing premium; if win rate is declining, AI
          displacement thesis accelerates
        - >-
          Sales CRM data-room pull; battlecard review; customer reference checks specifically asking about evaluation of
          automated alternatives
      - - Post-2024 Revenue Trajectory
        - >-
          2024 growth rate described as double-digit only; no 2025 guidance or actuals; no disclosed ARR, ACV, or
          backlog
        - >-
          Growth trajectory and ARR visibility in 2025 are critical to validating or invalidating the base-case
          $130–140M ARR assumption
        - CFO interview; Q1/Q2 2025 actuals request; bookings data review; pipeline analysis from CRO
    notes: >-
      All items are blocking or material diligence requirements per this chapter's gate. The NRR and cap-table items are
      classified blocking; the remainder are material. Obtaining even three of these six items would materially narrow
      the valuation range uncertainty.
    claimRefs:
      - CV027
      - CV028
      - CV015
      - CV035
