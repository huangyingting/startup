        - Series B-stage; no public valuation
        - Medium — PTaaS direct competitor; similar platform approach; channel-led GTM
        - Pre-revenue-scale; no comparable valuation mark; recent fundraising may be distressed
      - - Bishop Fox (private)
        - No disclosed financials; comparable service scope
        - Private; no disclosed valuation
        - Medium — offensive security services firm with comparable enterprise clientele; CREST-certified
        - No financial metrics; limited public comparable data; differentiated by red-team services focus
      - - PTaaS Market Multiple (synthesized)
        - Public cybersecurity services comps (Tenable 5x, Rapid7 3x) weighted for growth premium
        - 5–8x revenue for 15–20% growth; 10–15x for 25%+ growth
        - High — defines the multiple corridor within which NetSPI must be priced
        - Synthesized from limited public comps; private market illiquidity and preference overhang not modeled
    notes: >-
      Private comparable metrics are based on disclosed funding rounds and analyst estimates, not audited financials.
