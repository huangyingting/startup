  - id: FE002
    title: Customer Workflow / Operating Flow
    slug: customer-workflow-operating-flow
    type: flow
    layout: wide
    summary: >-
      End-to-end customer workflow for a NetSPI penetration testing engagement from scope definition through continuous
      testing, showing integration touchpoints and real-time reporting stages.
    data:
      nodes:
        - id: n1
          label: Scope Definition
          detail: >-
            Customer defines test scope, asset inventory, compliance targets, and regulatory requirements; NetSPI
            scoping consultation aligns 350+ pentesters to customer risk priorities
          type: step
        - id: n2
          label: Assessment Execution
          detail: >-
            CREST-accredited pentesters execute targeted attacks across application, cloud, network, hardware, and AI/ML
            surfaces using internal tooling and NetSPI AI recon acceleration
          type: step
        - id: n3
          label: Real-Time Reporting
          detail: >-
            Findings published to the Resolve portal as discovered, not held for final report; CVSS scoring, exploit
            evidence, and remediation guidance included per finding
          type: step
        - id: n4
          label: Remediation Tracking
          detail: >-
            JIRA, ServiceNow, and Slack integrations create tickets for each finding; remediation ownership assigned at
            creation; bidirectional status sync with enterprise ITSM
          type: step
        - id: n5
          label: Validation and Re-test
          detail: >-
            NetSPI pentesters validate remediation completeness; re-test patched findings; provide formal remediation
            evidence for compliance and audit documentation
          type: step
        - id: n6
          label: Continuous Testing
          detail: >-
            Continuous Pentesting subscription (launched May 2026) enables always-on coverage using NetSPI AI between
            major assessment cycles; BAS provides continuous MITRE ATT&CK threat validation independently
          type: step
      edges:
        - from: n1
          to: n2
          label: Scope approved; pentesters assigned
        - from: n2
          to: n3
          label: Findings submitted in real time
        - from: n3
          to: n4
          label: High/Critical findings trigger immediate tickets
        - from: n4
          to: n5
          label: Remediated findings submitted for validation
        - from: n5
          to: n2
          label: Open findings require additional assessment cycles
        - from: n5
          to: n6
          label: Mature customers transition to subscription coverage
