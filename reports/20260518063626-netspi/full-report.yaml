        title: Go-to-Market and Sales Efficiency
        blocks:
          - type: paragraph
            body: |
              NetSPI targets enterprise organizations with mature security programs, selling
              primarily to Chief Information Security Officers (CISOs), VP of Security, and
              senior IT risk leadership. The enterprise-first approach produces longer sales cycles
              — typical of multi-six-figure subscription deals — but also generates stickier
              customer relationships and higher contract values. NetSPI's GTM motion leverages two
              primary acquisition channels: direct enterprise sales and a partner channel comprising
              148 revenue-generating partners as of 2023, with 57 new partners added in 2024.
              Partner-sourced revenue grew 31% year-over-year in 2023, signaling that indirect
              distribution is becoming a material growth lever. The company's AWS ISV Accelerate
              partnership positions NetSPI within enterprise cloud procurement workflows, reducing
              friction for AWS-centric security teams. A partnership with Chubb, a global insurance
              carrier, creates an inbound demand channel where cyber-insurance underwriting
              requirements funnel prospective clients toward NetSPI assessments. These channels
              improve sales efficiency by reducing net-new customer acquisition cost for a portion
              of the pipeline. Customer Acquisition Cost (CAC), payback period, Average Contract
              Value (ACV), and Net Revenue Retention (NRR) have not been publicly disclosed. The
              41%+ CAGR in estimated revenue across 2021–2023 combined with ~26–30% annual headcount
              growth suggests gross margin is expanding over time, but this inference requires
              management confirmation. The deceleration in new-logo growth rates from 2022 to 2024
              warrants due-diligence attention to pipeline composition and CAC trends.
