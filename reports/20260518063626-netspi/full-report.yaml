  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >
              NetSPI's directly relevant market is not the entire cybersecurity stack. The company competes within
              proactive offensive security—the

              segment of the security industry focused on simulating adversary behavior to discover exploitable
              weaknesses before attackers do. Three

              delivery categories define this market: penetration testing as a service (PTaaS), which combines human
              expertise with continuous

              automation; external attack surface management (EASM), which inventories and risk-scores all
              internet-facing assets on an ongoing

              basis; and breach and attack simulation (BAS), which validates security controls against known attack
              techniques. These three

              categories are included in the addressable market because they share the same buyer (CISO/VP Security),
              the same budget line (offensive

              security or red team), and the same purchasing motion (annual or retainer contracts awarded through IT
              security procurement).


              Excluded from the core market boundary are passive vulnerability management platforms (Rapid7 InsightVM,
              Tenable.io), endpoint

              detection and response (EDR), SIEM platforms, and cloud workload protection. These tools are adjacent—they
              share regulatory compliance

              drivers and some buyer overlap—but they do not deliver adversarial validation, which is the defining
              characteristic of NetSPI's

              services. The primary status-quo substitutes are: boutique penetration testing firms that deliver
              point-in-time engagements, Big Four

              consulting security practices (Deloitte, PwC, KPMG, EY) that bundle pen testing into broader advisory
              mandates, in-house corporate

              red teams that replicate adversarial testing internally, crowdsourced platforms (HackerOne, Bugcrowd) that
              deploy researcher

              communities for bug discovery, and automated BAS tools (Pentera) that simulate attacks without human
              testers. Forrester's Q1 2023

              EASM Landscape documented 36 notable vendors and its Q1 2026 Proactive Security Platforms Landscape
              documented 42, confirming both

              the market's breadth and its fragmentation.
