      - number: '1.5'
        title: Company Milestones and Trajectory
        blocks:
          - type: paragraph
            body: |
              NetSPI's history spans over two decades and divides into three phases: the
              bootstrapped growth phase (2001-2016), the institutional acceleration phase
              (2017-2022), and the platform consolidation and AI transition phase (2023-present).

              Key milestones include the founding in Minneapolis in 2001 as a specialized
              penetration testing consultancy; the first institutional investment from Sunstone
              Partners in 2017 enabling structured growth; the acquisition of Silent Break
              Security in December 2020 adding advanced offensive research capabilities; the
              $90M KKR co-investment in May 2021 funding product development and hiring; the
              landmark $410M KKR round in October 2022 enabling acquisitions and effecting
              majority ownership transfer; the acquisition of nVisium in early 2023 adding
              red team depth and over 400 new customers; the acquisition of Hubble Technology
              in June 2024 adding CAASM capabilities and bringing Tom Parker on as CTO; and
              the 2026 launch of AI-powered Continuous Pentesting.

              The company's March 2026 recognition in the Forrester Proactive Security
              Platforms Landscape (one of 42 vendors) validates its expanded market positioning
              beyond pure pentesting. NetSPI's April 2026 pursuit of $80M+ acquisitions
              signals continued growth investment under KKR backing. No material adverse
              events, regulatory actions, or litigation are identified in public records
              reviewed for this chapter; however, the absence of public filings limits the
              completeness of adverse event screening.
