  - id: FM003
    title: Buyer Segment vs. Decision Criteria Matrix
    type: matrix
    layout: wide
    summary: >-
      Regulated industries with mandatory compliance drivers—banking and healthcare—offer the most predictable adoption
      path for NetSPI; cloud/tech buyers are high-value but more likely to consider automation substitutes; mid-market
      is accessible but margin-sensitive.
    data:
      columns:
        - Compliance-Driven
        - Security-Led (Risk)
        - Incident-Recovery
        - Cost Sensitivity
      rows:
        - label: Fortune 500 Financial Services
          values:
            - label: High
              tone: positive
              detail: PCI-DSS v4, DORA, SEC disclosure rules create recurring, non-discretionary testing mandates.
            - label: High
              tone: positive
              detail: Board-level risk scrutiny post-high-profile banking breaches drives proactive investment.
            - label: Medium
              tone: neutral
              detail: Post-incident remediation is an adoption trigger but not the primary driver for Tier 1 banks.
            - label: Low
              tone: positive
              detail: Premium pricing accepted given regulatory stakes; price is secondary to depth and compliance coverage.
        - label: Large Healthcare / Life Sciences
          values:
            - label: High
              tone: positive
              detail: HIPAA mandates annual penetration testing for covered entities and business associates.
            - label: Medium
              tone: neutral
              detail: EHR breach risk is high but security investment still lags financial services maturity.
            - label: High
              tone: warning
              detail: Healthcare organizations frequently adopt new services following a sector-defining breach event.
            - label: Medium
              tone: neutral
              detail: Budget sensitivity is moderate; large health systems can absorb premium pricing but mid-size cannot.
        - label: Cloud Infrastructure / Technology
          values:
            - label: Medium
              tone: neutral
              detail: >-
                SOC 2 and ISO 27001 are common triggers; FedRAMP authorization adds strong compliance pull for cloud
                providers.
            - label: High
              tone: positive
              detail: Product security risk is core to brand trust; API and AI surface testing demand is growing rapidly.
            - label: Low
              tone: neutral
              detail: Tech companies typically have internal security teams and are less reactive to external incidents.
            - label: High
              tone: warning
              detail: >-
                Automation substitution risk is highest here; sophisticated buyers evaluate Pentera and internal red
                teams as alternatives.
        - label: Government / Federal Agencies
          values:
            - label: High
              tone: positive
              detail: FedRAMP, FISMA, CMMC create mandatory testing schedules; regulatory clock is non-negotiable.
            - label: Medium
              tone: neutral
              detail: Security maturity varies widely; large agencies are more sophisticated than small SLED buyers.
            - label: Medium
              tone: neutral
              detail: Government can be slow to procure post-incident but incidents create durable program expansions.
            - label: Medium
              tone: neutral
              detail: Government pricing is contract-constrained; GSA schedules and IDIQ vehicles cap flexibility.
        - label: Mid-Market Enterprise
          values:
            - label: High
              tone: positive
              detail: SOC 2, ISO 27001, and cyber insurance requirements drive first-time penetration testing purchases.
            - label: Low
              tone: warning
              detail: Security maturity is often low; security-led proactive investment is rare without a compliance trigger.
            - label: Medium
              tone: neutral
              detail: Incidents can trigger upgrades from annual assessments to continuous retainers.
            - label: High
              tone: warning
              detail: >-
                Most price-sensitive segment; most likely to substitute with automated tools or crowdsourced
                alternatives.
    claimRefs:
