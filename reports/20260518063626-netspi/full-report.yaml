      - number: '4.3'
        title: Cost Structure and Margin Profile
        blocks:
          - type: paragraph
            body: |
              NetSPI's cost structure is dominated by human capital. With 650+ employees and 350+
              in-house pentesters as of 2024, direct labor constitutes the largest component of
              cost of revenue. The pentester workforce requires ongoing investment in technical
              training, certification maintenance, and competitive compensation to attract talent
              in a specialized labor market where certified offensive security practitioners command
              premium salaries. Platform development and infrastructure represent the second
              significant cost category; the Resolve platform and its integrations are hosted on
              AWS, and ongoing engineering investment is required to maintain platform quality and
              develop new AI-assisted testing features. Three acquisitions — Silent Break (2020),
              nVisium (2023), and Hubble (2024) — generated integration costs and goodwill, though
              management has described each as successfully integrated with no outstanding operational
              separation issues. The CFO, Jay Golonka, brings 25+ years of CFO experience including
              the Prometheus Group, signaling financial rigor in cost management and capital allocation.
              Gross margin for the PTaaS/SaaS hybrid model is estimated at 60–70% based on
              public-company analogues in managed security services and cybersecurity SaaS, though
              NetSPI's higher human-services component likely positions it toward the lower end of
              that range. No audited cost or margin data is publicly available, making this estimate
              unverifiable without due-diligence access to financial statements. Pentera's automated
              approach presents a potential long-run pricing pressure vector, as it delivers
              continuous testing at lower per-engagement cost, potentially compressing realized
              pricing for service-led competitors like NetSPI.
