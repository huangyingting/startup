      - number: '2.2'
        title: Market Sizing
        blocks:
          - type: paragraph
            body: >
              The market sizing for NetSPI's addressable opportunity requires three nested lenses, not a single top-down
              estimate. The broadest

              lens is the global cybersecurity market, which Bloomberg Intelligence reported exceeds $200B annually,
              establishing the total

              ecosystem from which offensive security carves its share. The second lens is the penetration testing and
              proactive security market

              specifically: various analyst and news sources estimate the global penetration testing market at
              approximately $1.7B in 2023,

              growing to roughly $3.8B by 2030, implying a compound annual growth rate in the 11–14% range. PTaaS—the
              delivery model where

              services are platform-enabled and continuous rather than point-in-time engagements—is growing faster than
              traditional pen test

              engagements within that overall figure. Incorporating EASM and BAS adjacencies, the serviceable available
              market (SAM) for proactive

              offensive security services is estimated at $4–8B globally, though this range reflects significant
              methodology uncertainty because

              no single analyst has published a combined PTaaS + EASM + BAS market sizing with consistent scope
              definitions.


              NetSPI's own trajectory provides a bottom-up cross-check. The company reported approximately 42% revenue
              growth in 2023, reaching

              an estimated $111M, and continued with double-digit growth in 2024, implying revenues of $130–145M.
              Applied against even the low

              end of the SAM range ($4B), NetSPI's 2024 SOM represents approximately 3.3–3.6% of the PTaaS market. KKR's
              $410M growth funding

              in 2022 at an implied valuation of $700M–$1.5B was explicitly tied to the Bloomberg-reported view of
              cybersecurity as a

              high-growth sector exceeding $200B. Sizing estimates from multiple sources are preserved in TM002 with
              methodology notes; the

              wide spread between the lowest ($1.7B 2023 base) and the highest ($3.8B 2030 projection) reflects genuine
              disagreement about

              PTaaS scope definitions rather than data errors, and this uncertainty is carried forward as a diligence
              gap.
