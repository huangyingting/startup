        title: Retention, NRR, and Customer Durability
        blocks:
          - type: paragraph
            body: >
              NetSPI does not publicly disclose net revenue retention (NRR), gross revenue retention (GRR), average
              contract length, or cohort-level churn rates. These metrics are the primary evidence gap in this chapter.
              The absence prevents any direct assessment of whether the customer base is expanding in value,
              contracting, or churning at a rate that would impair the growth story. [CU031]

              Indirect durability signals from named customer evidence are positive but narrow. HumanGood's yearly
              pentesting pattern implies at minimum one renewal cycle. Medtronic's "extension of our own team" framing
              implies deep integration that raises switching costs. EAB Global's operational metric ("15 seconds to
              attack surface improvement") implies platform dependency. Everywhen's characterization of NetSPI as "an
              integral part of your internal team" implies organizational embedding. [CU013] [CU015] [CU017] [CU022]

              The compliance-driven buying context across financial services (FFIEC, DORA), healthcare (HIPAA), retail
              (PCI DSS), and government customers is a structural retention mechanism: annual compliance attestation
              cycles create recurring purchase occasions regardless of satisfaction-driven churn. [CU006] [CU008]
