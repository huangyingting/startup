  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              NetSPI operates in a competitive landscape segmented across five distinct
              categories of alternatives that enterprise buyers evaluate when sourcing
              adversarial security testing. The first and most direct category is PTaaS
              platforms: Synack, Cobalt, and Bishop Fox all deliver penetration testing
              as a service but via differing delivery models. Synack and Cobalt rely on
              vetted crowdsourced researcher communities, while Bishop Fox combines
              in-house offensive security teams with the Cosmos continuous EASM platform.
              The second category is crowdsourced discovery platforms: HackerOne and
              Bugcrowd began as bug bounty programs and have since expanded into managed
              PTaaS, framing their researcher communities as continuous threat exposure
              management (CTEM) solutions.

              The third category is automated BAS and exposure validation: Pentera
              delivers fully automated penetration simulation claiming to reduce
              third-party testing costs by 60%, representing a direct budget substitution
              threat in cost-sensitive enterprise segments. The fourth category is VM
              incumbents: Rapid7 (InsightVM, approximately $700M ARR) and Tenable
              (Nessus/Tenable.io, approximately $900M ARR) are large public companies
              whose passive vulnerability management platforms are adjacent to proactive
              testing but do not deliver adversarial simulation as core services. Both
              retain large enterprise installed bases that could serve as launch pads
              for proactive testing product extensions. The fifth category is the status
              quo: traditional boutique penetration testing firms (NCC Group, IOActive,
              Optiv) and in-house corporate red teams that deliver point-in-time
              engagements without platform continuity or managed tooling.

              Forrester's Q1 2026 Proactive Security Platforms Landscape, which lists
              NetSPI among 42 vendors, confirms both the competitive density and
              fragmentation of this market.
