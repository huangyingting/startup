              Pentera's automated platform approach poses a displacement risk: Pentera claims 60% reduction in
              third-party pentesting costs through automation, which could attract cost-sensitive customers —
              particularly at the SMB tier and for standardized workloads — away from NetSPI's service model. NetSPI's
              platform positioning (PTaaS plus breach and attack simulation, attack surface management) differentiates
              from pure automation, but the competitive pressure is a material retention consideration. [CU034]

