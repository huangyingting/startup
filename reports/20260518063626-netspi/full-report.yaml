appendices:
  - id: A
    title: Methodology and Limitations
    blocks:
      - type: paragraph
        body: >-
          This report was produced using publicly available sources only. Revenue estimates are derived by applying
          company-disclosed organic growth rates to a $49M 2021 base figure implied by the 51% growth disclosure. All
          financial estimates carry ±15% uncertainty and should be treated as directional only. Valuation inference is
          based on KKR's $500M+ majority investment position; no official valuation was publicly disclosed for the
          October 2022 round. Sources were fetched between May 2026 and May 18, 2026 using automated retrieval tools.
          Paywalled third-party analyst reports were accessed via official NetSPI press releases referencing those
          reports.
        claimRefs: []
      - type: callout
        calloutType: assumption
        title: Revenue Estimation Methodology
        body: >-
          Base revenue estimated at ~$49M for 2021 (implied by KKR's $90M investment at typical 2x ARR multiple for
          growth stage cybersecurity). Applied disclosed growth rates: +51% (2022e: ~$74M), +58% (2023e: ~$117M), +42%
          (2024e: ~$130–145M). These are estimates only; actual figures may differ materially.
        claimRefs:
          - CI001
          - CI005
          - CI006
          - CI007
          - CI008
