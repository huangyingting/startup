      - number: '2.3'
        title: Buyer and Segment Map
        blocks:
          - type: paragraph
            body: >
              The primary buyer for penetration testing and proactive security services is the Chief Information
              Security Officer (CISO) or VP of

              Security at enterprise and upper-mid-market organizations. Budget is almost universally owned within the
              IT security budget line, which

              reports through the CISO or CTO. End users are internal red teams, SOC analysts, and security engineers
              who act on the test findings.

              Procurement typically runs through centralized IT or security procurement, often with multi-year retainer
              structures for strategic

              vendors like NetSPI. Adoption triggers cluster around four recurring patterns: compliance requirements
              such as PCI-DSS, HIPAA, SOC 2,

              and FedRAMP that mandate periodic or continuous testing; M&A due diligence that requires security
              assessments of target organizations;

              post-incident remediation where organizations need to identify root causes and remediate gaps after a
              breach; and board-level security

              mandates following high-profile industry incidents.


              Regulated industries dominate adoption. NetSPI's verified customer base—which includes 9 of the top 10 US
              banks, 4 of the top 5 cloud

              providers, and 4 of the top 5 healthcare companies—confirms that financial services, healthcare, and cloud
              infrastructure form the

              primary customer concentration. Government and federal agencies represent a growing adjacent segment
              driven by FedRAMP and CMMC

              requirements. Mid-market enterprises are a secondary segment where PTaaS economics (continuous coverage at
              lower per-engagement cost

              than boutique firms) are most compelling. Cobalt and Synack's publicly positioned buyer
              profiles—enterprise security teams at

              technology, financial services, and healthcare companies—validate this buyer map from the competitive
              side. Bishop Fox and Pentera

              target overlapping segments but emphasize different personas: Pentera skews toward automation-first buyers
              who want to reduce human

              testing costs, while Bishop Fox targets large enterprises with complex continuous testing needs similar to
              NetSPI's core market.
