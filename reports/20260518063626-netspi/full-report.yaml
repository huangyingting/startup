      - number: '4.4'
        title: Public Traction Metrics
        blocks:
          - type: paragraph
            body: |
              NetSPI has disclosed consistent annual growth through press releases for each year
              2021–2024, providing the primary basis for financial estimates. In 2021, the company
              reported 51% organic revenue growth, 319 new clients, and 119 net new employees.
              In 2022, organic revenue growth accelerated to 58%, with 300+ new clients and
              230+ new employees. In 2023, growth decelerated to 42% year-over-year — still
              robust given the larger base — with 400+ new logos (a 30%+ increase in new-logo
              volume) and 26% headcount growth. In 2024, NetSPI described "double-digit" revenue
              growth and crossed 1,942 total customers across 37 countries, conducted 4,500+
              assessments, and reached 650+ total employees. The 2021–2023 compounding of stated
              rates yields estimated revenues of ~$50M (2021), ~$78M (2022), and ~$111M (2023).
              Applying a conservative double-digit midpoint such as 20% to 2023 yields ~$133M
              for 2024, while a 30% midpoint yields ~$144M; the $130–145M range is therefore
              the best public estimate for 2024. None of these figures represent audited revenue;
              they are analyst-derived from percentage-based disclosures applied to a
              forward-extrapolated base. The 2021–2023 CAGR of approximately 41% significantly
              outpaces public cybersecurity peers such as Rapid7, which grew single-to-low double
              digits across the same period. However, growth deceleration from 58% to 42% to
              an unspecified double-digit rate in 2024 is a signal that organic expansion is
              normalizing even as absolute revenue continues to grow. NetSPI has not disclosed
              ARR, MRR, NRR, logo churn, EBITDA, or gross margin for any year. The 128M+
              vulnerabilities identified to date is a cumulative operational metric, not a
              financial KPI, but it validates the scale of delivery operations.
