      - number: '2.4'
        title: Growth Drivers
        blocks:
          - type: paragraph
            body: >
              Multiple structural forces are converging to expand the proactive security market. The most immediate
              regulatory driver is the SEC's

              December 2023 cybersecurity disclosure rule, which requires publicly listed companies to disclose material
              cyber incidents within

              four business days. This rule creates direct board-level scrutiny of security posture and pushes CISOs to
              demonstrate proactive

              testing as evidence of due diligence. Simultaneously, PCI-DSS version 4.0 (effective March 2025) expands
              continuous testing

              requirements for payment card merchants, while the EU's DORA (Digital Operational Resilience Act) and NIS2
              Directive impose mandatory

              penetration testing obligations on European financial institutions and critical infrastructure operators
              respectively. NIST CSF 2.0,

              released in 2024, formally elevated the "Govern" function and increased emphasis on continuous threat
              exposure monitoring.


              Gartner's CTEM (Continuous Threat Exposure Management) framework, introduced in 2022 and gaining adoption
              through 2025–2026,

              provides the conceptual infrastructure for buyers to justify moving from point-in-time pen testing to
              continuous coverage models.

              Gartner predicts that organizations prioritizing CTEM-based investments will suffer significantly fewer
              breaches than those relying

              on reactive security. AI and cloud expansion also act as structural drivers: new AI-powered applications
              introduce novel attack

              surfaces that require specialized testing, and NetSPI's 2026 announcement of AI-powered continuous pen
              testing confirms the company

              is adapting its service delivery to capture this demand. The 42% revenue growth NetSPI reported in
              2023—sustained across 2021,

              2022, and 2023—provides direct evidence that market demand is translating into revenue acceleration.
            claimRefs:
              - CM028
              - CM029
              - CM030
              - CM031
              - CM032
