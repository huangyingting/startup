  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: |
              NetSPI generates revenue through four primary subscription streams plus project-based
              engagements. The flagship offering is Penetration Testing as a Service (PTaaS),
              delivered via the Resolve platform, where clients subscribe to an ongoing retainer
              that allocates pentester hours and continuous access to the Resolve dashboard. This
              subscription model replaces the traditional project-by-project engagement structure,
              improving revenue predictability and reducing customer churn friction. The second
              stream is External Attack Surface Management (EASM), a SaaS subscription that
              continuously maps and monitors customer-exposed digital assets. The third, launched
              via the June 2024 Hubble Technology acquisition, is Cyber Asset Attack Surface
              Management (CAASM), branded as Hubble Aurora, which provides internal asset inventory
              and hygiene monitoring on a per-organization subscription basis. The fourth stream
              is Breach and Attack Simulation (BAS), also sold as a subscription. Beyond
              subscriptions, project-based penetration testing engagements remain available for
              clients seeking discrete assessments rather than a retainer. Revenue recognition for
              subscription arrangements follows a ratable model — recognized over the contract term
              — whereas project engagements are recognized upon delivery milestones. As a private
              company, NetSPI has not disclosed the absolute split between recurring and project-based
              revenue, ARR, or contract lengths; these represent the primary revenue quality diligence
              gaps. NetSPI's pricing model is not publicly disclosed, and there is no list pricing
              on the company's website. Enterprise contracts are negotiated directly, with pricing
              likely varying by scope, team size, and subscription tier.
