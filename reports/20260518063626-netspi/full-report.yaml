      - number: '8.2'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: |
              NetSPI's financing history spans two institutional phases. The first phase began in 2017
              with Sunstone Partners' initial investment, and the second with KKR co-leading a $90M
              round in May 2021 alongside Ten Eleven Ventures. KKR then led a $410M growth round in
              October 2022, the largest cybersecurity services investment of that year, at which point
              Sunstone Partners fully exited. Total committed capital exceeds $500M, all from KKR and
              Ten Eleven Ventures. KKR holds a controlling majority stake as of the October 2022 round.

              Post-2022 valuation has not been publicly disclosed. Bloomberg and the Star Tribune
              both reported the $410M round without disclosing the associated valuation, and no
              subsequent equity marks, secondary transactions, or third-party appraisals are publicly
              accessible. This opacity is structurally consistent with private KKR portfolio company
              norms but severely limits precision in any external enterprise value estimate.

              Revenue estimates derived from successive annual growth announcements suggest a trajectory
              from approximately $50M in 2021 to approximately $78M in 2022, $111M in 2023, and
              $130–145M in 2024. These estimates are derived by applying stated growth percentages to
              a plausible revenue base; they are not independently audited or confirmed figures.
              KKR's total capital commitment of $500M+ for a majority stake implies an entry enterprise
              value somewhere in the $700M–$1.5B range depending on deal structure, debt, and preference
              terms — none of which are publicly disclosed. The implied multiple at entry ranges from
              approximately 9–20x 2021 revenue depending on the assumed enterprise value.

              KKR's typical hold period of 5–7 years implies a potential exit window beginning as early
              as 2026 and extending through 2029. No IPO signals, S-1 filings, or public secondary
              market activity have been observed as of the research date.
