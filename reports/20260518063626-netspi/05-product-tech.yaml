  summary: >-
    End-to-end customer workflow for a NetSPI penetration testing engagement from scope definition
    through continuous testing, showing integration touchpoints and real-time reporting stages.
  data:
    nodes:
    - id: n1
      label: Scope Definition
      detail: >-
        Customer defines test scope, asset inventory, compliance targets, and regulatory requirements;
        NetSPI scoping consultation aligns 350+ pentesters to customer risk priorities
      type: step
    - id: n2
      label: Assessment Execution
      detail: >-
        CREST-accredited pentesters execute targeted attacks across application, cloud, network,
        hardware, and AI/ML surfaces using internal tooling and NetSPI AI recon acceleration
      type: step
    - id: n3
