- id: TE003
  title: Technology / Operating Architecture Table
  slug: technology-operating-architecture-table
  notes: >-
    Architecture details sourced from netspi.com/trust, netspi.com/the-netspi-platform, press
    releases, and GitHub. AWS infrastructure confirmed via trust page. Internal architecture
    details (NetSPI AI engine specifics, CAASM graph database) are not publicly documented.
  columns:
  - Layer / Component
  - Role
  - Technology / Approach
  - Dependency
  - Risk
  rows:
  - - NetSPI Unified Portal
    - Customer-facing SaaS interface for all four modules; real-time reporting dashboard
    - Web application portal (launched 2024); single pane of glass for PTaaS, EASM, CAASM, BAS
    - AWS cloud infrastructure; SOC 2 Type II certified environment
    - AWS availability and platform uptime SLA not publicly documented; portal failure affects
      all modules simultaneously
  - - PTaaS Resolve Platform
    - Delivery engine for 350+ human pentesters; manages 50+ service type workflows
    - Purpose-built pentesting management SaaS; real-time collaborative reporting; CREST-accredited
    - Human pentester workforce (350+); internal tooling and methodology documentation
    - Workforce scaling constraints; staff retention risk in competitive pentesting talent market;
      delivery quality dependent on individual pentester expertise
  - - NetSPI AI Engine
    - Reconnaissance automation and data processing acceleration for Continuous Pentesting
    - Proprietary AI engine for recon and data analysis; augments human-led testing phases
    - Internal ML infrastructure (AWS-hosted); training data from 128M+ historical vulnerability findings
    - AI model accuracy and false-negative rate not publicly benchmarked; adversarial robustness
      of the AI itself unverified
  - - CAASM Aurora Platform
    - Internal asset visibility via knowledge graph; agentless scanning from Hubble acquisition
    - Agentless internal asset discovery; graph-based relationship mapping across asset types
    - Customer environment access for agentless scanning; cloud provider API integrations
    - Post-acquisition integration complexity; CAASM platform architecture parity with rest
      of NetSPI portal not confirmed in external documentation
  - - EASM Data Sources
    - External attack surface discovery via OSINT, dark web, and cloud config feeds
    - Weekly automated asset discovery; dark web monitoring; domain monitoring; cloud config review
    - Third-party dark web feeds; OSINT data sources; cloud provider APIs
    - Dark web feed completeness and freshness not independently verified; EASM Plus coverage
      limits not disclosed
  - - JIRA / ServiceNow / Slack Integrations
    - Remediation workflow automation; finding-to-ticket creation for enterprise ITSM tools
    - API-based integrations connecting Resolve portal findings to enterprise ticketing systems
    - Customer ITSM platform APIs; version compatibility with JIRA, ServiceNow, Slack
    - Integration maintenance burden on API version upgrades; depth of bidirectional sync not documented
  claimRefs:
  - CE001
  - CE018
  - CE027
  - CE037
  - CE039

