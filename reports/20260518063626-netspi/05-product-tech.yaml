  title: Product & Technology
  summary: >-
    NetSPI operates a unified offensive security platform launched in 2024 that combines four
    core modules — Penetration Testing as a Service (PTaaS/Resolve), External Attack Surface
    Management (EASM), Cyber Asset Attack Surface Management (CAASM), and Breach and Attack
    Simulation (BAS) — under a single portal. The platform is positioned within the Continuous
    Threat Exposure Management (CTEM) framework, enabling always-on offensive security rather
    than point-in-time assessments. PTaaS remains the flagship revenue driver, backed by 350+
    in-house certified pentesters who conducted 4,500+ assessments in 2024 and identified 128
    million total vulnerabilities. CAASM was added via the June 2024 Hubble acquisition
    (Aurora platform, agentless knowledge graph). EASM was relaunched in December 2024 with
    three commercial tiers. The May 2026 launch of Continuous Pentesting, powered by proprietary
    NetSPI AI, marks a significant product evolution toward subscription-based always-on security
    validation. NetSPI Labs (led by three VPs of Research) drives offensive research, open-source
    tooling (PowerUpSQL, 2,700+ GitHub stars), and CVE discovery. Trust is anchored by SOC 2
    Type II, CREST, GDPR, CCPA, and Cyber Essentials Plus certifications on an AWS infrastructure
    base. Key diligence gaps include the absence of publicly accessible SOC 2 attestation documents,
    undisclosed post-Hubble CAASM integration architecture, and no published platform performance SLAs.

sections:
- id: platform-architecture
  title: NetSPI Platform Architecture and CTEM Integration
  body: >-
    NetSPI launched a unified platform portal in 2024 combining four core modules — Penetration
    Testing as a Service (PTaaS/Resolve), External Attack Surface Management (EASM), Cyber Asset
    Attack Surface Management (CAASM), and Breach and Attack Simulation (BAS) — into a single
    customer-facing interface. This unification positions NetSPI within the Continuous Threat
    Exposure Management (CTEM) framework, enabling organizations to move from periodic assessments
    toward continuous security validation across their entire attack surface.

    The platform is hosted on AWS infrastructure, providing scalable backend capacity for
    human-led assessment workflows alongside the proprietary NetSPI AI acceleration layer.
    Customer-facing integrations with JIRA, ServiceNow, and Slack enable remediation tracking
    directly within existing security operations toolchains, eliminating the friction of manual
    ticket creation from PDF reports. Real-time reporting allows security teams to prioritize
    and remediate findings while assessments remain active rather than waiting for final deliverables.

    The Forrester Proactive Security Platforms Landscape Q1 2026 recognized NetSPI among 42
    notable vendors, validating its positioning in proactive security alongside established peers.
    The earlier Forrester External Attack Surface Management Landscape Q1 2023 inclusion confirmed
    NetSPI's EASM market presence. The trust layer of the platform is anchored by SOC 2 Type II,
    CREST, GDPR, CCPA, and Cyber Essentials Plus certifications, supporting global enterprise
    buyers with diverse regulatory requirements.
