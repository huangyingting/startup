- id: core-product-modules
  title: 'Core Product Modules: PTaaS, EASM, CAASM, and BAS'
  body: >-
    PTaaS (branded as the Resolve platform) is NetSPI's flagship offering, deploying 350+ in-house
    pentesters across 50+ distinct service types. Service categories span Application security
    (web, API, mobile, thick client, H-DAP), Cloud security (AWS, Azure, GCP), Hardware, Network,
    Mainframe, and AI/ML security assessments. NetSPI conducted 4,500+ assessments in 2024 alone,
    identifying 128 million total vulnerabilities and discovering 17,000+ critical issues in 2023.
    Pentester certifications include OSCP, OSCE, GXPN, GPEN, GWAPT, CISSP, CEH, and CREST,
    positioning NetSPI as a premium human-expert-led provider. Real-time collaborative reporting
    through the Resolve portal enables customers to view findings as they are discovered rather
    than waiting for final report delivery.

    EASM was relaunched in December 2024 with three commercial tiers: Lite (automated asset
    discovery), Standard (plus expert validation), and Plus (plus continuous external penetration
    testing). EASM features include weekly asset discovery, cloud configuration reviews, dark web
    monitoring, and domain monitoring.

    CAASM was introduced via the June 2024 Hubble acquisition, which brought the Aurora platform
    into the NetSPI portfolio. Aurora delivers agentless internal asset visibility via a knowledge
    graph, complementing EASM's external view with internal asset context in a unified exposure
    management workflow.

    BAS (Breach and Attack Simulation) won the "BAS Solution of the Year" award in 2023 and
    delivers continuous threat validation aligned to the MITRE ATT&CK framework. The module
    enables continuous detective-controls testing to identify defensive gaps between periodic
    penetration tests.
