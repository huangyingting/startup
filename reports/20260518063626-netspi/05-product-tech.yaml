        Findings published to the Resolve portal as discovered, not held for final report;
        CVSS scoring, exploit evidence, and remediation guidance included per finding
      type: step
    - id: n4
      label: Remediation Tracking
      detail: >-
        JIRA, ServiceNow, and Slack integrations create tickets for each finding; remediation
        ownership assigned at creation; bidirectional status sync with enterprise ITSM
      type: step
    - id: n5
      label: Validation and Re-test
      detail: >-
        NetSPI pentesters validate remediation completeness; re-test patched findings;
        provide formal remediation evidence for compliance and audit documentation
      type: step
    - id: n6
      label: Continuous Testing
      detail: >-
        Continuous Pentesting subscription (launched May 2026) enables always-on coverage
        using NetSPI AI between major assessment cycles; BAS provides continuous MITRE ATT&CK
        threat validation independently
