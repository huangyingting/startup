  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: soc2-attestation-access
    missingEvidence: >-
      Publicly accessible SOC 2 Type II attestation report for the NetSPI platform including
      scope boundary, covered services, and audit period dates
    whyItMatters: >-
      Regulated enterprise buyers in financial services, healthcare, and government require the
      full SOC 2 Type II attestation document — not just a certification claim — to approve
      vendor procurement under their third-party risk management programs
    diligencePath: >-
      Request the SOC 2 Type II attestation report directly from NetSPI during vendor assessment;
      confirm scope covers the unified platform portal, PTaaS Resolve, and any cloud-hosted EASM/
      CAASM/BAS components; verify audit period recency (within 12 months)
    relatedQuestionRefs:
    - QE011
    - QE025
  - type: missing-source
    severity: material
    topic: platform-sla-reliability
    missingEvidence: >-
      Published platform performance SLAs, uptime commitments, and historical incident reports
      for the NetSPI unified portal; no public status page was identified during research
    whyItMatters: >-
      Enterprise security buyers deploying NetSPI for continuous pentesting and EASM require
      reliability commitments; the absence of published SLAs is a procurement risk for customers
      with contractual uptime requirements for security monitoring services
    diligencePath: >-
      Request NetSPI's platform SLA documentation and incident history from the sales team;
      ask for a reference to a public status page (e.g., status.netspi.com) if one exists;
      check whether Continuous Pentesting subscription agreements include SLA terms
    relatedQuestionRefs:
    - QE026
  - type: enumeration-incomplete
    severity: material
    topic: caasm-integration-architecture
    missingEvidence: >-
      Detailed technical architecture documenting how the Aurora CAASM platform (acquired from
      Hubble, June 2024) is integrated into the NetSPI unified portal; knowledge graph schema,
      data connectors, and supported asset types
    whyItMatters: >-
      The post-acquisition integration depth determines whether CAASM delivers a genuinely unified
      attack surface view or operates as a bolt-on module with limited portal integration; CAASM
      buyers need to verify agentless connector breadth and graph data freshness
    diligencePath: >-
      Request the NetSPI CAASM technical datasheet and architecture overview from the pre-sales
      team; confirm which asset types the agentless scanner discovers, how frequently the knowledge
      graph is refreshed, and which cloud platforms are supported as of 2026
    relatedQuestionRefs:
    - QE005
    - QE027
    relatedTableRefs:
    - TE001
  - type: missing-source
    severity: minor
    topic: pentera-cost-reduction-validation
    missingEvidence: >-
      Independent third-party validation or enterprise customer case study confirming or
      refuting Pentera's claimed 60% reduction in third-party pentesting costs through AI
      automation at enterprise scale
    whyItMatters: >-
      If validated, Pentera's cost-reduction claim creates direct pricing pressure on NetSPI's
      premium human-led PTaaS model; if unsubstantiated, it is a marketing claim that does not
      affect NetSPI's competitive positioning materially
    diligencePath: >-
      Review Pentera customer case studies and analyst reports (Gartner, Forrester) for evidence
      of enterprise-scale cost reduction; commission an independent pentesting benchmark comparing
      automated and human-led approaches on the same target environment
    relatedQuestionRefs:
    - QE028
  - type: private-evidence-only
    severity: material
    topic: rd-investment-breakdown
    missingEvidence: >-
      NetSPI R&D investment figures as a percentage of revenue, technology headcount composition,
      and comparison to public offensive security company peers (e.g., CrowdStrike, Rapid7)
    whyItMatters: >-
      R&D spend intensity determines whether NetSPI's product velocity (AI engine, CAASM integration,
      continuous pentesting) is sustainably funded or dependent on continued private equity backing;
      an undisclosed R&D ratio limits assessment of long-term technology competitiveness
    diligencePath: >-
      Request R&D investment data and technology headcount breakdown from NetSPI management during
      investment diligence; benchmark against public offensive security peers on engineering spend
      as a proportion of revenue
    relatedQuestionRefs:
    - QE029
  - type: missing-source
    severity: minor
    topic: platform-reliability-incident-history
    missingEvidence: >-
      Public incident reports, customer disclosures, or news coverage of platform reliability
      incidents, data breaches, or SLA violations affecting the NetSPI platform or assessment
      deliverables
    whyItMatters: >-
      Enterprise security buyers entrusting NetSPI with offensive security testing data need
      confidence that no prior security incidents have compromised customer finding confidentiality
      or platform integrity; absence of public evidence is not equivalent to a clean history
    diligencePath: >-
      Request NetSPI's incident response history and bug bounty disclosure records; search for
      SEC filings or news coverage of any NetSPI-related security incidents; ask for contractual
      representations and warranties regarding platform security history
    relatedQuestionRefs:
    - QE030

