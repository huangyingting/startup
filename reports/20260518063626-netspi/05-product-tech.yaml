- id: trust-compliance
  title: Trust, Compliance, and Security Quality Controls
  body: >-
    NetSPI's trust posture is documented on its public trust page, which lists SOC 2 Type II,
    GDPR, CCPA, Cyber Essentials Plus, and CREST certifications. CREST, the international
    accreditation body for penetration testing organizations, validates NetSPI's technical
    competency, methodology standards, and ethical conduct across its assessment services.
    Individual pentester certifications including OSCP, OSCE, GXPN, GPEN, GWAPT, CISSP, CEH,
    and CREST provide additional quality assurance at the practitioner level.

    AWS infrastructure underpins the NetSPI platform, with cloud-native reliability and
    scalability supporting global customer deployments. NetSPI's assessment work aligns to the
    NIST Cybersecurity Framework 2.0, enabling customers to map findings to the Identify,
    Protect, Detect, Respond, and Recover functions for compliance reporting purposes.

    A material diligence gap exists: the publicly accessible SOC 2 Type II attestation report
    was not located during research. Regulated buyers in financial services, healthcare, and
    government typically require the full attestation document for vendor procurement approval,
    not just a certification claim. The Cyber Essentials Plus certification applies to the UK
    entity and is not a globally recognized information security standard. ISO 27001 certification
    was not confirmed at the time of research, representing an additional gap for enterprise
    buyers requiring ISO-aligned third-party validation.
