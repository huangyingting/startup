- id: roadmap-innovation
  title: Product Roadmap and Innovation Trajectory
  body: >-
    NetSPI's product roadmap from 2023 to 2026 reflects a deliberate progression from human-expert
    PTaaS toward an AI-augmented continuous security validation platform. The August 2023 AI/ML
    Pentesting launch established first-mover positioning in LLM and machine learning security
    assessment. The June 2024 Hubble acquisition brought CAASM capabilities (Aurora platform)
    into the unified portal. The December 2024 EASM three-tier relaunch completed the EASM
    module's commercial packaging with a graduated service model. The May 2026 Continuous
    Pentesting launch marks the first subscription-based always-on service, enabled by the
    NetSPI AI engine. Agentic MCP Platform Integrations, also launched in 2026, position NetSPI
    for the emerging agentic AI ecosystem.

    Competitive pressure is a key strategic variable. Pentera, a direct competitor, claims a
    60% reduction in third-party pentesting costs through AI automation, which directly challenges
    the pricing premium of NetSPI's human-led model. PTaaS peers Cobalt and Synack also pursue
    the enterprise penetration testing market, with Cobalt emphasizing 24-hour assessment
    turnaround and Synack operating a vetted researcher network. The degree to which NetSPI's
    Human-Led, AI-Accelerated model can sustain premium pricing as automated alternatives
    mature is the central long-term risk for the product strategy.

    Publicly available roadmap details are limited. R&D investment as a percentage of revenue
    is not disclosed, and the post-Hubble CAASM integration architecture has not been documented
    in external sources. Platform SLA and uptime commitments are also absent from public
    materials.
