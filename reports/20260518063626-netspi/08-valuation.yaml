chapter:
  number: 8
  title: "Valuation"
  summary: >-
    NetSPI's valuation analysis yields a TRACK / research-more recommendation grounded in
    strong evidence of market position and revenue trajectory but constrained by the opacity
    of a private company that has not disclosed NRR, gross margins, or cap-table terms. KKR's
    $500M+ total commitment across a May 2021 $90M co-investment and October 2022 $410M growth
    round implies an enterprise value range of $700M–$1.5B; a base-case estimate at 8x ~$135M
    ARR yields approximately $1.0–$1.1B. No valuation has been publicly disclosed after the
    2022 round. Exit window is estimated 2026–2029 per typical KKR 5–7 year hold periods.
    Key blockers to a buy recommendation are undisclosed NRR, gross margin, customer
    concentration, and the unquantified displacement risk from AI-automated penetration
    testing platforms such as Pentera.

sections:
  - id: investment-thesis
    title: "Investment Thesis and Anti-Thesis"
    body: |
      NetSPI presents a compelling but data-limited investment opportunity. The thesis rests on
      three pillars: dominant positioning as the self-described largest pure-play penetration
      testing provider globally, a KKR majority-backed capital structure providing an M&A war
      chest and operational credibility, and a demonstrated multi-year revenue trajectory
      delivering 50%, 58%, and 42% growth in 2021, 2022, and 2023 respectively. The Forrester
      Q1 2026 Proactive Security Platforms Landscape inclusion among 42 vendors provides
      third-party analyst validation of the platform's maturity beyond pure services.

      The anti-thesis is equally concrete. Revenue growth decelerated from 58% in 2022 to 42%
      in 2023 and then to double-digit (unspecified) in 2024, suggesting a maturing growth
      curve potentially approaching the 10–20% range. NRR, gross margins, and customer
      concentration are entirely undisclosed, creating a governance opacity that is unusual
      even for high-growth private companies. The $500M+ KKR capital commitment at majority
      ownership implies significant preference overhang that complicates common-equity return
      modeling. AI automation platforms such as Pentera threaten to compress PTaaS pricing and
      margins over a 3–5 year horizon, potentially structurally altering NetSPI's addressable
      market and competitive differentiation.

      The recommendation is TRACK / research-more. A formal data-room review resolving NRR,
      gross margin, cap-table waterfall, and competitive win-rate data is required before the
      recommendation can be upgraded to buy. The base-case valuation of approximately $1.0–$1.1B
      at 8x estimated $130–140M ARR is defensible but not compelling without superior unit
      economics evidence. A bull case of $1.5B+ requires AI strategy success and growth
      reacceleration above 25%; neither is verifiable from public data as of May 2026.
