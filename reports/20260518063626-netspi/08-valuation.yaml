  - id: bull-base-bear
    title: "Bull, Base, and Bear Case Scenarios"
    body: |
      The bull case for NetSPI assumes successful execution of the AI-powered continuous
      pentesting strategy launched in May 2026, driving a growth reacceleration to 25%+ and
      demonstrating improved unit economics via automation leverage. Under this scenario,
      $140M+ ARR with a 15x revenue multiple yields an enterprise value of $2.0B or greater.
      Supporting bull-case signals include the Forrester PSP Landscape inclusion, the April
      2026 acquisition posture indicating balance sheet confidence, strong enterprise customer
      concentration in regulated industries, and the 148-partner channel ecosystem providing
      distribution leverage.

      The base case assumes continued double-digit revenue growth at 15–20% annually, with
      estimated 2024 ARR of $130–140M. At a market-implied 8x multiple for a maturing
      cybersecurity services platform with unknown but likely 40–55% gross margins, the
      implied enterprise value is approximately $1.0–$1.1B. This scenario requires no
      material deterioration in customer retention, no disruptive AI automation impact on
      core services pricing, and KKR continuing to fund growth acquisitions through the
      hold period.

      The bear case assumes AI-driven pricing compression accelerates, reducing PTaaS market
      growth and compressing NetSPI's achievable revenue multiple to 5x. Under a bear scenario,
      estimated $130–140M ARR at 5x yields $650–700M enterprise value. This scenario is
      triggered if Pentera or equivalent automated platforms capture 15–25% of enterprise
      pentesting budget share within 24 months, or if revenue growth decelerates below 10%.

      Revenue per employee of approximately $215K at $140M / 650 headcount is below software
      pure-plays ($300K+) but above average professional services firms, consistent with a
      PTaaS model transitioning toward greater automation leverage. Headcount growing 30%+
      in 2024 signals strong demand but also rising cost structure that constrains margin
      expansion without automation efficiency.
