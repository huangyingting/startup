callouts:
  - calloutType: recommendation
    title: "Recommendation: TRACK / Research-More"
    body: >-
      NetSPI warrants active tracking and a formal data-room request before any capital
      deployment. The company's market position, KKR backing, and multi-year revenue growth
      trajectory are compelling investment signals, but the opacity of private company
      financials — specifically the absence of disclosed NRR, gross margin, customer
      concentration, and cap-table waterfall — prevents a buy recommendation. Initiate a
      data-room request targeting the six missing evidence items in TV006. Re-evaluate
      recommendation upon receipt of NRR (threshold: ≥100%), gross margin (threshold: ≥45%),
      and customer concentration (threshold: top-10 < 40% revenue). If all three clear their
      thresholds, upgrade to BUY with a base-case enterprise value of $1.0–$1.1B.
    claimRefs:
      - CV027
      - CV028
      - CV016
      - CV003

  - calloutType: risk
    title: "Valuation Opacity and Benchmark Gap"
    body: >-
      NetSPI's most significant valuation risk is not competitive or market risk — it is
      information risk. The $410M KKR round in October 2022 was the last valuation-adjacent
      event, and no audited financials, S-1 filing, secondary transaction, or public marks have
      been disclosed since. Bloomberg and the Star Tribune explicitly confirmed valuation was
      undisclosed. This opacity creates a benchmark gap: any external enterprise value estimate
      carries a ±30–40% confidence interval that cannot be narrowed without primary data-room
      access. At an estimated base-case EV of $1.0–$1.1B, a 35% uncertainty band spans
      $650M–$1.5B — a range that encompasses both the bear and bull cases simultaneously.
      This is not a risk that can be managed through public research; it requires formal
      due diligence with management access.
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV027
      - CV028

