  - id: comparable-analysis
    title: "Comparable Company and Transaction Analysis"
    body: |
      Public market comparables for NetSPI are constrained by the company's human-intensive
      service delivery model, which differs from pure-software cybersecurity SaaS businesses
      commanding the highest multiples. The two most directly relevant public comps are Tenable
      and Rapid7, both of which operate adjacent cybersecurity platform businesses. Tenable's
      FY2024 revenue of approximately $990M carries a market capitalization of approximately
      $4–5B, implying roughly 4.5–5x revenue. Rapid7's FY2024 revenue of approximately $800M
      carries a market capitalization of approximately $2.5B, implying approximately 3x revenue.
      Both comps suggest a 3–5x revenue multiple range for maturing cybersecurity platform
      businesses with slowing growth.

      Private comparables in the penetration testing space are smaller and less comparable
      in scale. Synack has raised approximately $52M with an estimated private valuation of
      approximately $300M, implying a much smaller revenue base. Cobalt.io has raised
      approximately $29M in venture capital — a pre-scale trajectory. Bishop Fox is a
      privately held pen-testing services firm with comparable service scope but no disclosed
      financials. None of these private comparables provides a market-clearing price discovery
      event comparable to NetSPI's $500M+ KKR commitment.

      A revenue multiple sensitivity analysis spanning 5x–15x on an assumed $130–145M ARR
      base yields a valuation range of approximately $700M–$2.1B. At the current growth
      deceleration trend, the most defensible market-clearing multiple is 7–9x, implying
      an enterprise value of $910M–$1.3B. Premium multiples of 12–15x are justifiable only
      if AI platform execution yields growth reacceleration above 25% or if the company
      demonstrates SaaS-like gross margins above 60% — neither of which is verifiable from
      public disclosures. The comparable set strongly supports a base-case enterprise value
      of approximately $1.0–$1.1B and a bear case of approximately $700–800M if AI
      automation accelerates competitive pressure materially.
