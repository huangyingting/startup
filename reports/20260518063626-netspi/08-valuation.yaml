  - id: exit-diligence
    title: "Exit Readiness and Final Diligence Asks"
    body: |
      KKR's investment thesis and typical hold period of 5–7 years implies an exit window
      beginning in 2026 and extending through 2029. No IPO filing, SPAC target rumors, or
      confirmed M&A sale process has been identified in public sources as of May 2026. NetSPI's
      active acquisition posture in April 2026 suggests KKR continues to invest for growth
      rather than executing a near-term exit. NetSPI has no SEC public filings, confirming its
      private company status. The combination of no IPO signals, ongoing acquisitions, and
      strong double-digit growth suggests a 2027–2029 exit timeline is more likely than a
      near-term transaction.

      Exit readiness indicators are mixed. Positive signals include a full C-suite with CFO Jay
      Golonka (25+ years experience), the Forrester analyst recognition, board composition
      including Niloo Razi Howe (Tenable board member), and the broad customer base of 1,942
      customers. Negative signals include the absence of audited financials in any public
      filing, undisclosed NRR/GRR, undisclosed gross margin, and no declared EBITDA or
      free-cash-flow metrics — all of which are standard pre-IPO disclosure requirements.

      The regulatory environment supports continued demand growth: NIST CSF compliance,
      CISA nation-state threat advisories, CREST accreditation, and ISO 27001 requirements
      all create structural repeat-purchase occasions. CREST accreditation provides a
      procurement differentiator in European and UK markets. ISO 27001 certification
      requirements drive annual pentesting demand from enterprise customers globally.

      Five critical diligence blockers require resolution before any investment can be priced:
      NRR (primary retention signal), gross margin (profitability ceiling), customer
      concentration (top-10 customer revenue share), KKR preference structure (dilution
      and waterfall modeling), and AI-platform competitive win rate. Without these data
      points, any valuation is necessarily a range estimate with wide uncertainty bands.
