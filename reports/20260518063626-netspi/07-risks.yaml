tables:
  - id: TR001
    title: Regulatory / Legal Risk Register
    sectionRef: competitive-market-risks
    type: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Top regulatory and legal risk factors for US-based cybersecurity firm operating globally
        as of May 2026. Covers the highest-impact regulatory frameworks affecting NetSPI's
        delivery obligations, client mandates, and internal compliance posture. Additional
        minor compliance obligations exist but are not material to the investment thesis.
    columns:
      - Regulation / Risk
      - Jurisdiction
      - Status
      - Likelihood
      - Severity
      - Mitigation
      - Residual Exposure
      - Diligence Path
    rows:
      - - DORA — ICT Risk / TLPT Compliance
        - EU (financial entities)
        - Effective Jan 17 2025; fully operative
        - High — mandatory for EU financial sector clients
        - High — disqualification from EU financial sector TLPT engagements if non-compliant
        - TIBER-EU methodology alignment; dedicated EU delivery team
        - Ongoing compliance burden; methodology evolution risk
        - Confirm NetSPI's TIBER-EU certification status; request DORA TLPT client case evidence
      - - NIS2 — Supplier Security Requirements
        - EU (28 member states)
        - Transposed by Oct 2024; enforcement 2025+
        - Medium — NetSPI is a supplier to NIS2-covered entities
        - Medium — supply chain security audits could impose new contractual obligations
        - ISO 27001 certification; SOC 2 Type II controls
        - Supplier audit requests may increase; contract renegotiation risk
        - Request NetSPI's NIS2 supplier security compliance documentation and audit status
      - - SEC Cybersecurity Disclosure Rules
        - USA (public companies)
        - Effective Dec 2023; full enforcement ongoing
        - Medium — creates post-breach scrutiny of vendor testing quality
        - Medium — post-incident liability risk if testing missed disclosed vulnerability
        - Limitation-of-liability clauses; engagement scope documentation
        - Contractual limitation clauses may not fully shield reputational harm
        - Review NetSPI's standard MSA and limitation-of-liability terms with counsel
      - - FCC Router Security Requirements
        - USA
        - Evolving; proposed rules 2024+
        - Low-medium — affects specific IoT/network device testing scope
        - Low — narrow applicability to router testing service line
        - Monitor FCC rulemaking; router testing methodology updates
        - Minimal residual exposure; narrow service line risk
        - Monitor FCC broadband equipment security rulemaking for applicability
      - - CCPA / GDPR Data Handling
        - USA (CA); EU
        - Operative; ongoing compliance required
        - Medium — NetSPI handles sensitive client infrastructure data
        - Medium — data breach during an engagement would trigger regulatory reporting obligations
        - Data handling policies; engagement data minimization; DPA agreements
        - Data breach during engagement creates regulatory + reputational exposure
        - Request NetSPI's CCPA/GDPR DPA templates and data retention policy documentation
    notes: >-
      Regulatory risk is simultaneously a driver of demand (mandates create recurring testing
      requirements) and a compliance burden (delivery methodology must meet evolving standards).
      Likelihood scores reflect probability of compliance failure, not likelihood of regulatory
      change. Severity reflects impact on NetSPI's business model if compliance fails.
