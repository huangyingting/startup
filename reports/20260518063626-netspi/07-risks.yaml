callouts:
  - calloutType: risk
    title: AI-Driven Commoditization Threat
    body: >-
      Pentera's public claims of 60% cost reduction versus human-led pentesting and 80% risk reduction
      represent a direct attack on NetSPI's premium pricing model. If automated platforms achieve
      coverage quality parity on the highest-volume attack surfaces (web applications, APIs, cloud
      misconfigurations) within the 3–5 year investment horizon, the human expertise premium that
      justifies NetSPI's ASP and margin structure will compress. NetSPI's May 2026 AI-powered
      Continuous Pentesting launch is the primary strategic mitigation, but the race between
      automation cost curves and human-led value differentiation is the central competitive
      uncertainty of the investment thesis. [CR001] [CR032] [CR037]
    claimRefs:
      - CR001
      - CR032
      - CR037
  - calloutType: risk
    title: Key-Person Dependency on Aaron Shilts
    body: >-
      Aaron Shilts has served as CEO since 2017 and is the single most important individual to
      NetSPI's KKR investment relationship, external growth narrative, and M&A execution track record.
      As a private company without SEC filing obligations, there is no public succession plan,
      no disclosed employment agreement, and no independent board governance charter available
      for review. Any leadership transition — voluntary or involuntary — during the 2026–2028 KKR
      exit window would create material uncertainty at the most operationally critical point in
      the company's history. This risk is unmitigated by public evidence and requires specific
      diligence attention. [CR006] [CR031]
    claimRefs:
      - CR006
      - CR031

