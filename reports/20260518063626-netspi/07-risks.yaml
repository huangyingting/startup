  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: customer-revenue-concentration
      missingEvidence: >-
        Top-customer revenue as a percentage of total ARR is not publicly disclosed. It is unknown
        whether any single customer exceeds 5% of total revenue, whether the top 10 customers
        collectively represent a concentration risk, or how financial services sector revenue
        compares to other verticals as a percentage of total revenue.
      whyItMatters: >-
        Revenue concentration drives fundamental risk assessment of the customer base. High
        single-customer or single-sector concentration creates correlated churn risk that could
        be material to revenue trajectory. The claimed 9-of-10 top US bank penetration suggests
        possible financial services concentration exceeding safe thresholds.
      diligencePath: >-
        Request top-10 customer revenue share, sector revenue breakdown, and single-largest
        customer as % of ARR. Model non-renewal scenarios for the top 3 accounts.
      relatedQuestionRefs:
        - QR006

    - type: private-evidence-only
      severity: blocking
      topic: employee-turnover-rate
      missingEvidence: >-
        Annual employee turnover rate, pentester attrition rate, and post-acquisition talent
        retention metrics are not publicly disclosed by NetSPI or any of its acquired companies.
        LinkedIn headcount signals are available but are insufficient as quantitative metrics.
      whyItMatters: >-
        For a human-intensive delivery model where pentester expertise is the core value
        driver, high turnover — especially post-acquisition — would signal delivery quality
        risk and potentially compress capacity growth even as customer count grows.
      diligencePath: >-
        Request employee headcount by quarter for 2022–2025, pentester-to-revenue ratio
        trend, and post-acquisition retention data for nVisium and Hubble personnel cohorts.
      relatedQuestionRefs:
        - QR003
        - QR025

    - type: private-evidence-only
      severity: material
      topic: kkr-exit-timeline-details
      missingEvidence: >-
        KKR's specific exit timeline, fund lifecycle position, and target return parameters
        for the NetSPI investment are not publicly disclosed. The PE industry standard 5–7 year
        hold period implies pressure, but no confirmation of the specific fund's maturity
        timeline or NetSPI's targeted exit valuation is available.
      whyItMatters: >-
        Exit timeline misalignment with operational investment needs is a material governance
        risk. If KKR is under pressure to exit by 2027–2028, it may resist operational
        investment decisions (hiring, R&D, further acquisitions) that are necessary for
        long-term platform growth but depress near-term EBITDA.
      diligencePath: >-
        Request KKR fund lifecycle documentation, investor rights agreement, and any
        co-investor exit rights or drag-along provisions in the shareholder agreement.
      relatedQuestionRefs:
        - QR018

    - type: private-evidence-only
      severity: material
      topic: hubble-integration-completion-status
      missingEvidence: >-
        The completion status of the Hubble Technology integration — including product roadmap
        consolidation, platform merging of Aurora into Resolve, and personnel integration of
        the acquired team — is not publicly disclosed as of May 2026, approximately 11 months
        post-acquisition.
      whyItMatters: >-
        Incomplete or delayed integration creates dual risk: platform fragmentation (two
        separate product suites rather than a unified offering) and personnel retention risk
        (Hubble employees on transition plans may leave if integration is unsatisfying).
        The Tom Parker CTO appointment mitigates this partially but does not eliminate it.
      diligencePath: >-
        Request integration roadmap, Aurora/Resolve combined customer count with cross-sell
        rates, and Hubble team retention metrics at 12 months post-acquisition.
      relatedQuestionRefs:
        - QR020

    - type: no-public-evidence
      severity: material
      topic: litigation-legal-proceedings
      missingEvidence: >-
        As a private company with no public filings, NetSPI is not required to disclose
        pending litigation, legal proceedings, regulatory investigations, or material
        contingent liabilities. No public sources confirm or deny the existence of any
        customer breach liability claims, IP disputes, or regulatory enforcement actions.
      whyItMatters: >-
        Undisclosed legal proceedings represent a material contingent liability risk for
        investors. A single high-profile customer breach claim or IP dispute could result
        in material financial liability or reputational damage not reflected in any
        disclosed financial metric.
      diligencePath: >-
        Request litigation schedule from legal counsel, review all MSA limitation-of-liability
        clauses, and search public court records for NetSPI as defendant in civil filings.
      relatedQuestionRefs:
        - QR012

    - type: private-evidence-only
      severity: material
      topic: regulatory-certification-tiber-eu-tr001
      missingEvidence: >-
        NetSPI's TIBER-EU certification status and DORA Threat-Led Penetration Testing (TLPT)
        engagement portfolio are not publicly confirmed. While NetSPI holds CREST accreditation
        (per trust page), its specific qualification status for TIBER-EU methodology and its
        track record of completed DORA TLPT engagements with EU financial entities are not
        publicly documented as of May 2026. The regulatory risk register (TR001) reflects
        partial coverage of this gap given the enumeration basis covers known regulatory
        frameworks but cannot confirm NetSPI's compliance status for each.
      whyItMatters: >-
        TIBER-EU alignment is a gating requirement for financial sector TLPT engagements under
        DORA, which became fully operative January 17, 2025. If NetSPI lacks confirmed TIBER-EU
        certification, it could be disqualified from serving its existing European financial
        sector clients under the new regulatory mandate, directly threatening the most
        compliance-driven and recurring revenue segment.
      diligencePath: >-
        Request NetSPI's TIBER-EU certification documentation, DORA TLPT engagement references
        with EU financial entities, and CREST accreditation renewal date. Confirm with at least
        two named European financial sector clients that NetSPI has successfully completed
        DORA-compliant engagements.
      relatedQuestionRefs:
        - QR008
        - QR007
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: moderate
      topic: financial-covenant-details
      missingEvidence: >-
        NetSPI's debt structure, credit facility terms, and financial covenant thresholds
        (if any) are not publicly disclosed. The $410M KKR round is described as equity
        growth capital, but whether any debt components or financial covenants exist is unknown.
      whyItMatters: >-
        Financial covenant violations triggered by a revenue shortfall or margin compression
        event could constrain operational flexibility at precisely the moment when management
        needs to respond to competitive or talent challenges.
      diligencePath: >-
        Request the complete capital structure summary, any credit facility agreements,
        and covenant compliance certificates from the most recent fiscal year.
      relatedQuestionRefs:
        - QR016
