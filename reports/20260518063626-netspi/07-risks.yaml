  - id: operational-talent-risks
    title: Operational, Talent, and Delivery Risks
    body: |
      The global scarcity of offensive security talent is structurally constraining for any human-led
      pentesting business. NetSPI CEO Aaron Shilts has publicly stated that talent availability is
      "one of the biggest issues" facing the offensive security industry. With 350+ in-house
      pentesters as of 2024, NetSPI requires continuous recruitment in a labor market where demand
      from financial institutions, technology companies, and government agencies competes directly
      with specialist security firm hiring. Any acceleration in growth without corresponding talent
      supply will create delivery quality risk. [CR004] [CR005] [CR040]

      Key-person risk is concentrated at three levels. At the CEO level, Aaron Shilts has led NetSPI
      since 2017, has been central to the KKR investment relationship, and represents the primary
      external-facing growth narrative. His departure would create material uncertainty for KKR's
      ongoing investment thesis and client relationships. At the product and technology level, CTO
      Tom Parker is a dual key-person risk: he both leads the platform roadmap and is the founder of
      the acquired Hubble technology — meaning his departure could simultaneously impair platform
      development and the Hubble integration thesis. CISO Norman Kromberg (30+ years experience,
      formerly Optum) represents a further concentration in security operations leadership. [CR006]
      [CR007] [CR008] [CR041]

      Integration risk has been building over four years. NetSPI completed three acquisitions: Silent
      Break Security (~2020, offensive security consulting depth), nVisium (2021, penetration testing
      talent and methodology), and Hubble Technology (June 2024, CAASM/attack surface management
      platform). Each acquisition carries integration complexity: personnel retention, culture
      alignment, product roadmap consolidation, and client relationship transitions. The Hubble
      acquisition is the most recent and represents the highest current integration risk — the CAASM
      and Aurora product lines must be fully integrated into the Resolve platform while the acquired
      team (including Tom Parker as CTO) is being absorbed. [CR014] [CR015] [CR016] [CR017]

      Delivery quality risk at scale is a structural concern as NetSPI grows toward $150M+ revenue
      and 4,500+ annual assessments. SLA breach risk increases when pentester capacity growth lags
      customer growth, when post-acquisition teams operate under inconsistent methodologies, or when
      AI-assisted workflows introduce false positives or missed vulnerabilities. For a company whose
      value proposition is expert-led depth, a quality incident with a high-profile client is an
      asymmetric reputational risk. [CR041]

      The risk transmission map (FR002) shows how talent attrition, key-person departure, and delivery
      quality failures cascade through revenue decline to valuation compression.
