  - id: financial-governance-risks
    title: Financial, Governance, and Concentration Risks
    body: |
      KKR's majority ownership position — with total investment exceeding $500 million across its
      2021 ($410M) and 2022 follow-on rounds — creates a significant governance and strategic
      concentration risk. As a private equity owner, KKR has investment lifecycle pressures including
      fund maturity timelines, return expectations, and exit event requirements (IPO or strategic
      sale). These pressures can conflict with the long-term operational investment that a platform
      business like NetSPI may need. KKR's historical PE portfolio exit timeline (typically 5–7
      years) suggests an exit event pressure window of 2026–2028, which aligns with the current
      investment period. [CR009] [CR010] [CR036]

      Revenue concentration risk is present but unquantifiable from public data. NetSPI's 9-of-10
      top US bank penetration creates structural sector concentration: if financial services
      represents 40-50% of revenue (a reasonable estimate given disclosed customer penetration),
      any financial services sector spending slowdown, DORA/FFIEC compliance cycle change, or
      banking M&A activity could create correlated multi-customer revenue risk. No specific customer
      concentration data (top customer as % of ARR) is publicly disclosed. [CR011] [CR035]

      Private company opacity is a structural governance risk for investors. NetSPI does not file
      with the SEC (confirmed by EDGAR search, SR032), does not publish audited financial statements,
      and does not provide public disclosure of revenue metrics beyond high-level growth signals in
      press releases. This limits independent verification of: revenue trajectory, gross margin,
      employee turnover rate, customer concentration, or debt covenant compliance. The absence of
      public financial disclosure means the estimated $130-145M 2024 revenue figure cannot be
      independently verified. [CR012] [CR013]

      Post-testing breach liability creates an adversarial reputational risk that is not fully
      mitigable. If a NetSPI client is breached through a vector that NetSPI tested and did not
      identify — or that emerged after NetSPI testing — the company faces reputational damage, potential
      contract loss, and possible legal liability. While NetSPI's engagement contracts likely include
      limitation-of-liability clauses, the reputational harm from a high-profile client breach is
      not contractually bounded. [CR019]

      Market downturn risk affects enterprise cybersecurity spending. In an economic recession,
      security budgets are not immune to cuts: discretionary security spending (red team exercises,
      CAASM expansion, BAS deployments) may be deferred, even if compliance-driven pentesting
      remains relatively resilient. NetSPI's exposure to discretionary security spend has grown as
      it has expanded beyond core compliance pentesting into EASM, CAASM, and BAS. [CR020]

      The people/execution risk register (TR004) quantifies the leadership dependency and governance
      gap risks across the CEO, CTO, CISO, and VP Research functions.
