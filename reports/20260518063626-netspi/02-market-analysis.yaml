  - id: FM004
    title: "Proactive Security Purchase and Deployment Flow"
    type: flow
    layout: standard
    summary: >-
      The purchase flow for PTaaS/proactive security moves from a triggering event through scoping and procurement to continuous
      delivery; each stage has distinct actors and gating conditions that inform where NetSPI can accelerate or lose deals.
    data:
      nodes:
        - id: "n1"
          label: "Adoption Trigger"
          detail: "Compliance mandate (PCI-DSS, HIPAA, SOC 2), board mandate, cyber insurance requirement, post-incident directive, or M&A due diligence."
          tone: neutral
        - id: "n2"
          label: "CISO / VP Security Evaluates Options"
          detail: "CISO compares PTaaS vendors (NetSPI, Cobalt, Synack), traditional pen test firms, in-house red teams, and automated BAS (Pentera). Budget and timeline set."
          tone: neutral
        - id: "n3"
          label: "Scoping and Procurement"
          detail: "Security team scopes the engagement (network, application, cloud, AI). Legal and procurement review contract terms. Multi-year retainer negotiated for continuous coverage."
          tone: neutral
        - id: "n4"
          label: "Initial Engagement Delivery"
          detail: "NetSPI deploys human penetration testers supported by its platform. Findings are delivered with remediation guidance via the NetSPI platform portal."
          tone: positive
        - id: "n5"
          label: "Findings Remediation and Validation"
          detail: "Security engineering team remediates vulnerabilities. NetSPI validates remediation. Attack surface data feeds into EASM continuous monitoring."
          tone: positive
        - id: "n6"
          label: "Continuous Retainer and Expansion"
          detail: "Satisfied customers expand to continuous retainer model. EASM and BAS added as adjacent services. Multi-year contract renewals drive NRR above 100%."
          tone: positive
