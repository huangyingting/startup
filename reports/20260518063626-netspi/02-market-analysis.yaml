  - id: growth-drivers
    title: "Growth Drivers"
    body: |
      Multiple structural forces are converging to expand the proactive security market. The most immediate regulatory driver is the SEC's
      December 2023 cybersecurity disclosure rule, which requires publicly listed companies to disclose material cyber incidents within
      four business days. This rule creates direct board-level scrutiny of security posture and pushes CISOs to demonstrate proactive
      testing as evidence of due diligence. Simultaneously, PCI-DSS version 4.0 (effective March 2025) expands continuous testing
      requirements for payment card merchants, while the EU's DORA (Digital Operational Resilience Act) and NIS2 Directive impose mandatory
      penetration testing obligations on European financial institutions and critical infrastructure operators respectively. NIST CSF 2.0,
      released in 2024, formally elevated the "Govern" function and increased emphasis on continuous threat exposure monitoring.

      Gartner's CTEM (Continuous Threat Exposure Management) framework, introduced in 2022 and gaining adoption through 2025–2026,
      provides the conceptual infrastructure for buyers to justify moving from point-in-time pen testing to continuous coverage models.
      Gartner predicts that organizations prioritizing CTEM-based investments will suffer significantly fewer breaches than those relying
      on reactive security. AI and cloud expansion also act as structural drivers: new AI-powered applications introduce novel attack
      surfaces that require specialized testing, and NetSPI's 2026 announcement of AI-powered continuous pen testing confirms the company
      is adapting its service delivery to capture this demand. The 42% revenue growth NetSPI reported in 2023—sustained across 2021,
      2022, and 2023—provides direct evidence that market demand is translating into revenue acceleration.
    claimRefs:
      - CM028
      - CM029
      - CM030
      - CM031
      - CM032
      - CM033
    tableRefs:
      - TM004

  - id: constraints
    title: "Adoption Constraints and Competitive Risks"
    body: |
      The primary structural constraint on premium PTaaS pricing is automation disruption. Pentera, an automated BAS vendor, publicly claims
      its platform reduces third-party penetration testing costs by 60%. This claim directly targets NetSPI's value proposition and reflects
      a broader market tension: buyers facing budget pressure may substitute lower-cost automated tools for higher-cost human-led testing,
      at least for commodity use cases. HackerOne similarly frames its crowdsourced model as generating $4M+ ROI per critical vulnerability
      discovered, framing researcher communities as cost-competitive with managed pen testing for certain discovery tasks. The 42-vendor
      Forrester Proactive Security Platforms Landscape (2026) confirms meaningful competitive fragmentation, creating pricing pressure
      across the market.

      Budget cycles and macroeconomic compression represent a near-term constraint. Security testing budgets, while generally resilient
      compared to other IT spending categories, are subject to consolidation pressure when CISOs face flat or declining budgets. In those
      scenarios, automation substitution and crowdsourced alternatives become more attractive relative to premium human-led engagements.
      Additionally, Rapid7 and Tenable—who occupy the adjacent vulnerability management market—could extend into active offensive testing
      as product extensions, while large cloud providers could bundle basic attack surface scanning into their security services at zero
      marginal cost. The absence of publicly disclosed ARR, unit economics, or gross margin data for NetSPI prevents precise validation of
      the company's SOM claim and limits the ability to triangulate whether its growth reflects market expansion or share capture.
    claimRefs:
      - CM034
      - CM035
      - CM036
      - CM037
      - CM038
      - CM039
      - CM040
