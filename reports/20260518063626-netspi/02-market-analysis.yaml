  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: market-sizing-som
      missingEvidence: >-
        NetSPI does not publicly disclose ARR, gross margin, net revenue retention (NRR), or customer unit economics. Revenue estimates
        ($111M 2023, $130–145M 2024) are derived from company-disclosed growth percentages, not independently verified financial filings.
        No third-party analyst has published a NetSPI-specific revenue or market share estimate with explicit methodology.
      whyItMatters: >-
        Without audited or independently verified revenue data, the SOM calculation rests on management-stated growth percentages that
        could reflect bookings rather than recognized revenue, include partner-attributed revenue, or be subject to restatement. Investors
        cannot anchor to a precise market share figure or calculate ARR-to-valuation multiples without this data.
      diligencePath: >-
        Request NetSPI ARR, NRR, and gross margin data under NDA in management meetings. Cross-reference against PitchBook or Harmonic
        revenue estimates if available. Obtain the last three years of audited financials from management to validate stated growth rates.
      relatedQuestionRefs: [QM028]
      relatedTableRefs: [TM002]

    - type: stale
      severity: material
      topic: tam-sizing
      missingEvidence: >-
        No single analyst firm (Gartner, Forrester, IDC) has published a combined PTaaS + EASM + BAS market sizing report with consistent
        scope definitions as of the 2026-05-18 research date. The $1.7B–$3.8B penetration testing estimates are synthesized from multiple
        sources with different scope definitions and base years. No updated 2025–2026 penetration testing market sizing from a major
        analyst was identified.
      whyItMatters: >-
        Stale or scope-inconsistent market sizing makes it difficult to validate the $4–8B SAM estimate or assess whether the 11–14%
        CAGR assumption remains valid following the 2024 macroeconomic environment. Investors could be anchoring to a TAM that overstates
        or understates the actual addressable opportunity.
      diligencePath: >-
        Commission or purchase a 2025–2026 vintage Gartner or Forrester market sizing report covering PTaaS and EASM with explicit scope
        definitions. Cross-reference against public financial data from Cobalt (private), Synack (private), and Bishop Fox (private) if any
        have disclosed ARR or booking metrics. Request NetSPI management's own TAM analysis and the data sources underlying their investor presentations.
      relatedQuestionRefs: [QM025, QM026]
      relatedTableRefs: [TM002]

    - type: conflicting-data
      severity: material
      topic: automation-substitution
      missingEvidence: >-
        Pentera's claim of 60% cost reduction versus third-party pen testing is unverified by an independent third party. The claim
        appears in Pentera's own marketing materials. No independent study comparing total cost of ownership between PTaaS and automated
        BAS was found during this research run.
      whyItMatters: >-
        If Pentera's 60% cost reduction claim is substantiated by enterprise buyers, it represents a material pricing ceiling on NetSPI's
        PTaaS pricing power, particularly for commodity compliance testing use cases. This affects long-term margin assumptions and the
        pricing sustainability of the premium PTaaS model.
      diligencePath: >-
        Request win/loss analysis from NetSPI management showing deals where Pentera or automated BAS was the competing alternative and
        the decision criteria. Survey reference customers on whether they evaluated automated alternatives and why they selected human-led
        PTaaS. Commission an independent TCO analysis comparing PTaaS versus automated BAS for representative use cases.
      relatedQuestionRefs: [QM027]

