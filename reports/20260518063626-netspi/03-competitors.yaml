  - id: profiles
    title: "Competitor Profiles"
    body: |
      Synack operates a vetted crowdsourced model with 1,500+ security researchers
      completing penetration tests under managed platform conditions, originally
      built to serve US government and defense clients before expanding to
      enterprise technology, financial services, and healthcare. Its differentiator
      is platform-managed researcher workflows combined with a security intelligence
      layer; its key limitation is the absence of EASM, CAASM, and BAS capabilities
      and the inherent quality variance in distributed researcher pools.

      Cobalt pioneered PTaaS with the Cobalt Core freelance community and has raised
      approximately $100M total, targeting SMB and mid-market segments with
      fast-turnaround testing. Bishop Fox offers continuous offensive security via
      the Cosmos cloud-native platform, combining EASM with human-led offensive
      testing — the closest structural analog to NetSPI's multi-capability approach,
      but lacking CAASM integration and a platform of comparable breadth.

      Rapid7 (public, RPID) and Tenable (public, TENB) are the most prominent
      adjacent incumbents. Rapid7's InsightVM and Tenable's Nessus/Tenable.io are
      passive vulnerability scanners that identify known CVEs rather than simulate
      adversarial attack chains. Neither company's core product is a PTaaS
      equivalent, though both have large enterprise footprints. HackerOne has raised
      approximately $140M, positions its crowdsourced bug bounty ecosystem as a
      CTEM-compatible platform, and claims 25% of its findings are actionable.
      Pentera has raised approximately $150M at Series C and offers automated
      penetration simulation claiming 80% risk reduction and a 60% reduction in
      third-party testing spend. Traditional boutique firms (NCC Group, IOActive,
      Optiv) deliver expert point-in-time testing without platform continuity or
      SLA guarantees. Bugcrowd similarly competes in crowdsourced vulnerability
      discovery alongside bug bounty program management.
