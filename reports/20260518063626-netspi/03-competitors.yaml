  - id: capability-comparison
    title: "Capability and Feature Comparison"
    body: |
      The capability comparison between NetSPI and its peer set reveals differentiation
      along two axes: delivery model and platform breadth. On delivery model, NetSPI's
      in-house expert model (350+ pentesters) contrasts sharply with Synack's vetted
      researcher community, Cobalt's Core community, HackerOne's open bug bounty
      ecosystem, and Pentera's fully automated simulation — each representing a
      distinct point on the human-to-automation spectrum. On platform breadth,
      NetSPI's integration of PTaaS, EASM, CAASM (via Hubble Aurora), and BAS
      across 50+ test service types is unique among direct PTaaS competitors.

      CAASM is absent from every direct competitor: Synack, Cobalt, HackerOne, and
      Bishop Fox do not offer cyber asset attack surface management as a first-party
      capability. BAS or control validation is offered by Pentera (automated) and
      partially by Bishop Fox (Cosmos simulation), but neither combines this with
      EASM and CAASM in a single managed platform. Rapid7 and Tenable do not deliver
      adversarial penetration testing as a core service and are classified as adjacent
      VM incumbents rather than direct PTaaS competitors.

      NetSPI's AI-powered Continuous Pentesting, launched May 2026, represents the
      most visible AI differentiation claim in the PTaaS market as of the research
      date; no direct competitor has announced an equivalent agentic AI-accelerated
      capability. The competitor pricing landscape is universally opaque: no direct
      competitor discloses enterprise list pricing, preventing exact price-per-finding
      comparisons and creating an evidence gap addressed in the research questions.
