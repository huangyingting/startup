callouts:
- calloutType: strength
  title: Deep Financial Services Penetration with Regulatory Tailwind
  body: 'NetSPI''s penetration of 9 of 10 top US banks creates a high-value, compliance-driven
    revenue base with structural renewal mechanics. Financial services institutions face ongoing
    FFIEC exam requirements, DORA compliance (EU), OCC guidance, and SWIFT CSP requirements
    that mandate recurring penetration testing. This regulatory tailwind means customer retention
    in the financial services vertical is partly driven by mandatory compliance cycles rather
    than purely by satisfaction — reducing churn risk in the most strategically valuable segment
    even absent disclosed NRR data. [CU001] [CU006]

    '
  claimRefs:
  - CU001
  - CU006
- calloutType: risk
  title: NRR and Concentration Data Absent — Retention Thesis Unverifiable
  body: 'NetSPI discloses customer count and new logo growth but no retention metrics (NRR, GRR,
    churn rate, or cohort data). Combined with undisclosed top-customer revenue concentration,
    this prevents verification of whether the 1,942-customer base is expanding in value or quietly
    churning at the base while new logos mask the problem. The financial services concentration
    (9/10 top US banks) could represent both the highest-value and highest-concentration risk
    in the portfolio — a single large bank non-renewal could be material. [CU031] [CU006]

    '
  claimRefs:
  - CU031
  - CU006
