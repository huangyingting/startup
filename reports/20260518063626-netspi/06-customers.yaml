  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: nrr-undisclosed
    missingEvidence: 'Net revenue retention (NRR) and gross revenue retention (GRR) by customer segment
      and vintage cohort; no public disclosure exists.'
    whyItMatters: 'NRR is the primary metric for assessing whether revenue growth is durable or driven
      solely by new logo acquisition masking churn at the base. Without NRR, the retention thesis cannot
      be verified and the 1,942 customer base could be declining in value even as gross customer count
      grows.'
    diligencePath: 'Request NRR and GRR by segment (enterprise/mid-market/SMB) and by vintage cohort
      (2021, 2022, 2023, 2024) in the data room. Benchmark against >110% NRR for a healthy growth
      narrative.'
    relatedQuestionRefs:
    - QU008
    - QU020
  - type: private-evidence-only
    severity: material
    topic: customer-concentration
    missingEvidence: 'Top-10 and top-20 customer revenue concentration as a percentage of total ARR;
      not publicly disclosed.'
    whyItMatters: 'With 9 of 10 top US banks as customers, financial services concentration could
      be substantial. A single large bank non-renewal could represent a material revenue event. Concentration
      above 5% per single customer in any segment would elevate the risk profile significantly.'
    diligencePath: 'Request top-10 customer revenue share, revenue by vertical segment, and largest
      single customer as % of ARR. Model non-renewal scenario for the top 3 accounts.'
    relatedQuestionRefs:
    - QU016
  - type: private-evidence-only
    severity: material
    topic: contract-renewal
    missingEvidence: 'Average contract length, multi-year vs annual mix, and renewal rate by segment;
      none publicly disclosed.'
    whyItMatters: 'Contract length determines revenue predictability and the structural renewal
      pressure inherent in the compliance-driven customer base. Without this data, the compliance-tailwind
      thesis cannot be quantified.'
    diligencePath: 'Request contract length distribution, renewal rate by vintage cohort and segment,
      and average time-to-renewal from expiry.'
    relatedQuestionRefs:
    - QU020
  - type: private-evidence-only
    severity: material
    topic: churn-data
    missingEvidence: 'Annual customer churn rate and dollar churn rate (logo churn vs revenue churn)
      by segment; no public disclosure.'
    whyItMatters: 'Without churn data, the 400+ new logos per year headline obscures whether total
      customer count is growing net-net or flat due to offsetting churn. Revenue churn is even more
      critical if high-value accounts churn while low-ACV logos are added.'
    diligencePath: 'Request logo churn rate and revenue churn rate annually for 2021-2024; segment
      by enterprise, mid-market, and SMB cohorts.'
    relatedQuestionRefs:
    - QU015
  - type: enumeration-incomplete
    severity: minor
    topic: named-customer-enumeration
    missingEvidence: 'Complete list of all named customers with outcome metrics; current public
      disclosure covers approximately 13 named references from NetSPI-owned channels only.'
    whyItMatters: 'All named customer evidence is sourced from NetSPI-controlled channels, introducing
      selection bias. No independent review platform (G2, Gartner Peer Insights, Capterra) data is
      available to corroborate satisfaction or surface dissatisfied customers.'
    diligencePath: 'Search G2, Gartner Peer Insights, TrustRadius, and Capterra for NetSPI reviews.
      Request customer reference list from NetSPI including willing references not on the public
      customer stories page.'
    relatedQuestionRefs:
    - QU015
    relatedTableRefs:
    - TU003
