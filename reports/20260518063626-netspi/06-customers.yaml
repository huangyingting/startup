- id: named-customer-proof
  title: Named Customer Proof and Production Deployments
  body: 'NetSPI publishes named customer proof across at least thirteen distinct organizations
    spanning financial services, healthcare, government, technology, SaaS, sports tech, and
    benefits navigation. All identified named references are described in production contexts
    with recurring or multi-year engagement patterns; no pilots-only or proof-of-concept-only
    deployments are described in public materials.

    Microsoft, the most prominent technology reference, engaged NetSPI for AI security testing
    and publicly credited the firm with "demonstrated ability to listen and adapt to emerging
    requirements" — a forward-looking quote that positions NetSPI as an evolving partner rather
    than a commodity vendor. [CU011] [CU035] The US Air Force reference anchors the government
    and critical infrastructure segment. [CU012]

    In healthcare, Medtronic''s testimonial ("extension of our own team") implies deep operational
    integration consistent with recurring engagement. HumanGood, a non-profit senior living
    operator, engages NetSPI for yearly penetration testing, a repeat-purchase pattern with
    durability implications. [CU013] [CU017]

    EAB Global''s outcome metric — "15 seconds to see attack surface improvements" — is the most
    specific quantified result in the public portfolio and references NetSPI''s platform-layer
    speed advantage. [CU015] Chubb''s named contact (Craig Guiliano, Cyber Intelligence Officer)
    provides an insurance risk use case where NetSPI findings directly inform claims assessments.
    [CU014] Trimble ("takes us to next level of cybersecurity maturity") and Quantum Health
    (eliminated unnecessary spend) add cross-industry breadth. [CU016] [CU020]

    SaaS-sector references (Gong, Hudl) round out the named proof set. Gong cites platform
    integrations and ease of collaboration; Hudl cites "actionable and insightful recommendations."
    [CU018] [CU019] The limitation common to all named references is that they originate from
    NetSPI-owned channels (customer stories page, press releases, partner page), which introduces
    selection bias: customers willing to appear on the vendor''s site likely skew toward satisfied
    outcomes. No independent review platform evidence (G2, Gartner Peer Insights, Capterra) was
    identified for NetSPI as of the research date. [CU036]

    '
