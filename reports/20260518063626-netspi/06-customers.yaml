- id: TU005
  title: Expansion and Concentration Risk Table
  sectionRef: expansion-concentration
  columns:
  - Expansion Driver
  - Concentration Risk
  - Impact
  - Diligence Path
  rows:
  - - Land-and-expand within existing accounts (additional service lines — ASM, BAS, cloud)
    - Partially mitigated by modular platform; expansion not confirmed in individual customer disclosures
    - High positive impact if upsell rate is substantiated; increases NRR above 100%
    - Request multi-service attach rate and average ACV expansion by cohort vintage
  - - Channel partner growth (148 partners, 57 new in 2024, 31% partner revenue YoY)
    - Dependence on Ingram Micro, VLCM, Softcat as distribution intermediaries
    - High positive impact for SMB/mid-market reach; concentration risk if top 3 partners exceed
      30% of channel revenue
    - Request top-10 partner revenue concentration; confirm partner contract duration and exclusivity
  - - Insurance/payer channel via Chubb partnership
    - Single named insurance partner; channel not fully developed
    - Medium positive — unique monetization path through claims-risk alignment
    - Request Chubb-sourced revenue and pipeline; explore replication with other cyber insurers
  - - Top-customer revenue concentration (financial services anchor)
    - 9/10 top US banks implies heavy financial services weighting; one large non-renewal is material
    - High risk if any single customer exceeds 5% of ARR; regulatory budget cycles create
      correlated timing risk across the segment
    - Request top-10 and top-20 customer revenue share; model scenario with largest bank non-renewal
  - - Geographic concentration (North America dominant)
    - 37 countries claimed; MEA partner (SecureLink) added in 2024; EMEA share of ARR unknown
    - Medium risk — international revenue under-penetrated relative to stated country footprint
    - Request revenue by geography (North America vs EMEA vs APAC); assess FX exposure
  notes: 'Expansion metrics are company-claimed or estimated from disclosed partner count and revenue
    growth rates. Concentration risks are qualitative assessments based on segment disclosure patterns;
    actual ARR concentration is not publicly available.

    '
