- id: adoption-trajectory
  title: Customer Growth and Adoption Trajectory
  body: 'NetSPI''s public disclosures trace a consistent upward trajectory of new logo additions
    from 2021 through 2024. The company added 319 new clients in 2021 (alongside 50% organic
    revenue growth), 300+ new clients in 2022, 400+ new logos in 2023 (30%+ year-over-year growth),
    and reached a total of 1,942 customers by December 2024. [CU001] [CU003] [CU004] [CU005] The
    multi-year pattern is consistent, though the absolute YoY change in total customer count from
    2023 to 2024 is not inferable from disclosed data alone.

    Assessment volume is a strong adoption signal: 4,500+ penetration testing assessments were
    completed in 2024, implying an average of approximately 2.3 assessments per customer annually
    across the base — a figure consistent with multi-engagement enterprise relationships rather
    than one-time pilots. [CU002] In 2023, NetSPI''s customer base generated 17,000+ critical
    issue remediation events, reflecting deep operational integration. [CU033]

    The geographic spread (37 countries) and vertical breadth signal that growth is not confined
    to a single market. The $410 million KKR growth funding received reinforces institutional
    confidence in the trajectory, though it is a capital event, not an independent customer
    count verification. [CU037] Headcount growing 30%+ to 650+ employees in 2024 provides a
    supply-side corroboration that the customer volume growth is operationally supported. [CU032]

    Comparison to competitors: Cobalt.io and Synack operate similar PTaaS models but have not
    publicly disclosed customer counts of comparable magnitude. Bishop Fox positions as a
    services-led firm without a recurring platform model. NetSPI''s disclosed customer count
    advantage is notable, though conversion and retention metrics remain undisclosed. [CU034]

    '
