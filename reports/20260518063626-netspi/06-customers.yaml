company:
  name: NetSPI
chapter:
  number: 6
  title: Customers
  summary: 'NetSPI has accumulated 1,942 customers across 37 countries as of December 2024, including
    9 of 10 top US banks, 4 of 5 top cloud providers, 4 of 5 top US healthcare companies, and 7 of
    10 top US retailers, with 4,500+ assessments completed in 2024. Named customer proof is strong
    across financial services, healthcare, government (US Air Force), and technology (Microsoft AI
    security testing), with specific measurable outcomes published for EAB Global (15 seconds to
    attack surface visibility), Medtronic, Chubb, and others. The 148-partner channel ecosystem grew
    31% in partner-sourced revenue in 2023. Critical diligence gaps remain: net revenue retention,
    gross revenue retention, customer churn rate, top-customer revenue concentration, and contract
    renewal rates are all undisclosed publicly.

    '
sections:
- id: customer-segmentation
  title: Customer Segmentation and Vertical Coverage
  body: 'NetSPI''s 1,942-customer base as of December 2024 spans financial services, healthcare,
    cloud infrastructure, technology, retail, government, and insurance verticals across 37 countries.
    The financial services vertical is the deepest anchor: NetSPI claims penetration into 9 of the
    10 largest US banks, a penetration rate that implies multi-year institutional procurement cycles
    and regulatory compliance drivers (DORA, FFIEC, OCC guidance) that create structural renewal
    pressure. [CU001] [CU006]

    Healthcare represents the second major pillar, with NetSPI claiming 4 of 5 of the largest US
    healthcare companies and specific named references (Medtronic, HumanGood) published via the
    customer stories page. Healthcare customers face HIPAA obligations and increasing regulatory
    scrutiny of medical device security, which compounds pentesting demand. [CU008] [CU013] [CU017]

    Cloud infrastructure customers (4 of 5 top cloud providers) and technology companies including
    three FAANG/MAMAA firms (with Microsoft explicitly named) indicate that NetSPI serves both
    vendors of cloud platforms and the enterprises running workloads on them. [CU007] [CU010] [CU011]
    Retail penetration (7 of 10 top US retailers) adds PCI DSS compliance as a further structural
    renewal driver. [CU009]

    The government and defense vertical is represented by the US Air Force. International expansion
    is evidenced by the SecureLink (Dubai) partnership serving the Middle East and Africa region and
    by geographic breadth across 37 countries. [CU012] [CU023] The buyer persona across all segments
    is primarily CISO-led with security engineering involvement for platform deployments; insurance
    partners (Chubb) represent a distinct payer-not-user pattern where NetSPI findings directly
    inform claims underwriting. [CU014] [CU033]

    '
