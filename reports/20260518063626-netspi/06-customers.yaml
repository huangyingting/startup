- id: expansion-concentration
  title: Expansion, Channel Partners, and Concentration Risk
  body: 'NetSPI''s channel partner ecosystem reached 148 partners by end-2024, with 57 new
    partners added during the year — a 63% single-year expansion in the partner count.
    Partner-sourced revenue grew 31% year-over-year in 2023, indicating the channel is
    generating meaningful incremental customer acquisition. [CU024] [CU025]

    Named partners include distribution (Ingram Micro), value-added resellers (VLCM, Defy,
    Softcat), cloud marketplace (AWS ISV Accelerate Program), and regional specialists
    (SecureLink for MEA). [CU026] [CU027] [CU028] [CU029] [CU030] The Chubb partnership
    represents a payer-model expansion where an insurer embeds NetSPI findings into claims
    assessment — a non-traditional channel that could scale independently of direct sales
    headcount. [CU014] MSSP partner Nuspire (CEO endorsement) signals service-provider-led
    resale, another expansion vector into accounts too small or distributed for direct coverage.
    [CU021]

    Land-and-expand mechanics within the existing customer base are signaled by the platform
    structure (attack surface management, breach and attack simulation, cloud security testing
    as modular additions) and by the 4,500+ assessment volume across 1,942 customers implying
    multi-engagement relationships. [CU001] [CU002] [CU038]

    Concentration risk is a material unknown. NetSPI does not disclose the revenue share of
    its largest customers. Given that the financial services segment includes 9 of 10 top US
    banks — each likely representing a substantial contract — the top-customer concentration
    could be significant. [CU006] If any single top-10 bank represents more than 5% of ARR,
    a non-renewal would create a visible revenue event. The same risk applies to government
    and large healthcare accounts. A data-room request for top-10 and top-20 customer revenue
    concentration is essential for assessing this risk. [CU039]

    '
