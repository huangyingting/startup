schemaVersion: "report-v2"
artifact: financials
slug: netspi
runDate: "2026-05-18"
company:
  name: NetSPI
chapter:
  number: 4
  title: "Financials"
  summary: >-
    NetSPI grew from an estimated ~$50M revenue in 2021 to ~$130–145M in 2024, compounding
    at 40%+ annually through organic growth and three bolt-on acquisitions, backed by
    $500M+ of KKR capital. Revenue quality is elevated by a subscription/retainer model
    for PTaaS and growing SaaS lines (EASM, CAASM, BAS); however, all critical financial
    inputs — audited revenue, gross margin, ARR, burn rate, and exact valuation — remain
    undisclosed, limiting external underwriting without direct access to management accounts.

sections:
  - id: revenue-model
    title: "Revenue Model and Streams"
    body: |
      NetSPI generates revenue through four primary subscription streams plus project-based
      engagements. The flagship offering is Penetration Testing as a Service (PTaaS),
      delivered via the Resolve platform, where clients subscribe to an ongoing retainer
      that allocates pentester hours and continuous access to the Resolve dashboard. This
      subscription model replaces the traditional project-by-project engagement structure,
      improving revenue predictability and reducing customer churn friction. The second
      stream is External Attack Surface Management (EASM), a SaaS subscription that
      continuously maps and monitors customer-exposed digital assets. The third, launched
      via the June 2024 Hubble Technology acquisition, is Cyber Asset Attack Surface
      Management (CAASM), branded as Hubble Aurora, which provides internal asset inventory
      and hygiene monitoring on a per-organization subscription basis. The fourth stream
      is Breach and Attack Simulation (BAS), also sold as a subscription. Beyond
      subscriptions, project-based penetration testing engagements remain available for
      clients seeking discrete assessments rather than a retainer. Revenue recognition for
      subscription arrangements follows a ratable model — recognized over the contract term
      — whereas project engagements are recognized upon delivery milestones. As a private
      company, NetSPI has not disclosed the absolute split between recurring and project-based
      revenue, ARR, or contract lengths; these represent the primary revenue quality diligence
      gaps. NetSPI's pricing model is not publicly disclosed, and there is no list pricing
      on the company's website. Enterprise contracts are negotiated directly, with pricing
      likely varying by scope, team size, and subscription tier.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006, CI007, CI008]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: gtm
    title: "Go-to-Market and Sales Efficiency"
    body: |
      NetSPI targets enterprise organizations with mature security programs, selling
      primarily to Chief Information Security Officers (CISOs), VP of Security, and
      senior IT risk leadership. The enterprise-first approach produces longer sales cycles
      — typical of multi-six-figure subscription deals — but also generates stickier
      customer relationships and higher contract values. NetSPI's GTM motion leverages two
      primary acquisition channels: direct enterprise sales and a partner channel comprising
      148 revenue-generating partners as of 2023, with 57 new partners added in 2024.
      Partner-sourced revenue grew 31% year-over-year in 2023, signaling that indirect
      distribution is becoming a material growth lever. The company's AWS ISV Accelerate
      partnership positions NetSPI within enterprise cloud procurement workflows, reducing
      friction for AWS-centric security teams. A partnership with Chubb, a global insurance
      carrier, creates an inbound demand channel where cyber-insurance underwriting
      requirements funnel prospective clients toward NetSPI assessments. These channels
      improve sales efficiency by reducing net-new customer acquisition cost for a portion
      of the pipeline. Customer Acquisition Cost (CAC), payback period, Average Contract
      Value (ACV), and Net Revenue Retention (NRR) have not been publicly disclosed. The
      41%+ CAGR in estimated revenue across 2021–2023 combined with ~26–30% annual headcount
      growth suggests gross margin is expanding over time, but this inference requires
      management confirmation. The deceleration in new-logo growth rates from 2022 to 2024
      warrants due-diligence attention to pipeline composition and CAC trends.
    claimRefs: [CI009, CI010, CI011, CI012, CI013, CI014, CI015]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: cost-structure
    title: "Cost Structure and Margin Profile"
    body: |
      NetSPI's cost structure is dominated by human capital. With 650+ employees and 350+
      in-house pentesters as of 2024, direct labor constitutes the largest component of
      cost of revenue. The pentester workforce requires ongoing investment in technical
      training, certification maintenance, and competitive compensation to attract talent
      in a specialized labor market where certified offensive security practitioners command
      premium salaries. Platform development and infrastructure represent the second
      significant cost category; the Resolve platform and its integrations are hosted on
      AWS, and ongoing engineering investment is required to maintain platform quality and
      develop new AI-assisted testing features. Three acquisitions — Silent Break (2020),
      nVisium (2023), and Hubble (2024) — generated integration costs and goodwill, though
      management has described each as successfully integrated with no outstanding operational
      separation issues. The CFO, Jay Golonka, brings 25+ years of CFO experience including
      the Prometheus Group, signaling financial rigor in cost management and capital allocation.
      Gross margin for the PTaaS/SaaS hybrid model is estimated at 60–70% based on
      public-company analogues in managed security services and cybersecurity SaaS, though
      NetSPI's higher human-services component likely positions it toward the lower end of
      that range. No audited cost or margin data is publicly available, making this estimate
      unverifiable without due-diligence access to financial statements. Pentera's automated
      approach presents a potential long-run pricing pressure vector, as it delivers
      continuous testing at lower per-engagement cost, potentially compressing realized
      pricing for service-led competitors like NetSPI.
    claimRefs: [CI016, CI017, CI018, CI019, CI020, CI021, CI022]

  - id: traction
    title: "Public Traction Metrics"
    body: |
      NetSPI has disclosed consistent annual growth through press releases for each year
      2021–2024, providing the primary basis for financial estimates. In 2021, the company
      reported 51% organic revenue growth, 319 new clients, and 119 net new employees.
      In 2022, organic revenue growth accelerated to 58%, with 300+ new clients and
      230+ new employees. In 2023, growth decelerated to 42% year-over-year — still
      robust given the larger base — with 400+ new logos (a 30%+ increase in new-logo
      volume) and 26% headcount growth. In 2024, NetSPI described "double-digit" revenue
      growth and crossed 1,942 total customers across 37 countries, conducted 4,500+
      assessments, and reached 650+ total employees. The 2021–2023 compounding of stated
      rates yields estimated revenues of ~$50M (2021), ~$78M (2022), and ~$111M (2023).
      Applying a conservative double-digit midpoint such as 20% to 2023 yields ~$133M
      for 2024, while a 30% midpoint yields ~$144M; the $130–145M range is therefore
      the best public estimate for 2024. None of these figures represent audited revenue;
      they are analyst-derived from percentage-based disclosures applied to a
      forward-extrapolated base. The 2021–2023 CAGR of approximately 41% significantly
      outpaces public cybersecurity peers such as Rapid7, which grew single-to-low double
      digits across the same period. However, growth deceleration from 58% to 42% to
      an unspecified double-digit rate in 2024 is a signal that organic expansion is
      normalizing even as absolute revenue continues to grow. NetSPI has not disclosed
      ARR, MRR, NRR, logo churn, EBITDA, or gross margin for any year. The 128M+
      vulnerabilities identified to date is a cumulative operational metric, not a
      financial KPI, but it validates the scale of delivery operations.
    claimRefs: [CI023, CI024, CI025, CI026, CI027, CI028, CI029, CI030]
    tableRefs: [TI006]
    figureRefs: [FI003]

  - id: capital
    title: "Capital Structure and Adequacy"
    body: |
      NetSPI's capital structure is shaped entirely by private equity. The company
      bootstrapped to profitability before Sunstone Partners made an undisclosed minority
      investment around 2017. KKR's $90M growth-equity round in May 2021, co-led with
      Ten Eleven Ventures, marked the company's first institutional scale-up capital.
      Fifteen months later, KKR led a $410M growth round in October 2022, becoming
      majority owner upon Sunstone Partners' exit. Total KKR-led capital exceeds $500M.
      KKR's public statement on the 2022 round cited "significant outperformance" relative
      to the initial 2021 investment, implying above-plan revenue execution in that
      interval. No debt obligations, credit facilities, or deferred revenue notes have
      been disclosed publicly; this is expected for a private, equity-backed growth company
      with no need for project finance or capital-intensive assets. The company's publicly
      stated acquisition strategy — including an April 2026 Minneapolis Business Journal
      report citing a target for $80M+ in AI-focused acquisitions — indicates management
      views the balance sheet as capable of supporting further M&A. The SEC EDGAR
      company search for NetSPI reveals the company's filing history, consistent with
      a private placement under Regulation D that carries minimal public disclosure
      requirements. Capital adequacy appears strong relative to the company's current
      growth profile. The historical round-by-round chronology is established in the
      Company Overview chapter; this chapter mints local Financials claims for the same
      financing facts with independent source references. Exact cash balances, runway
      months, and EBITDA remain undisclosed. See TI004 for capital adequacy metrics and
      TI005 for the full list of financial diligence blockers.
    claimRefs: [CI031, CI032, CI033, CI034, CI035, CI036, CI037, CI038, CI039, CI040, CI041, CI042]
    tableRefs: [TI004, TI005]

