  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "audited-revenue"
      missingEvidence: >-
        NetSPI has not disclosed absolute revenue in dollar terms in any press release, filing,
        or third-party source. All estimates are derived from stated YoY growth percentages
        applied to an assumed 2021 base; the base itself is inferred, not audited.
      whyItMatters: >-
        Without audited revenue, the investment thesis cannot be underwritten with
        confidence. Revenue recognition methodology, deferred revenue balances, and
        the split between subscription and project revenue are all unknowable externally.
      diligencePath: >-
        Request audited P&L statements for FY2021–FY2024 from management; confirm revenue
        base used to calculate stated growth percentages; verify subscription vs project split.
      relatedQuestionRefs: [QI006]

    - type: private-evidence-only
      severity: material
      topic: "absent-audited-financials"
      missingEvidence: >-
        No audited P&L, balance sheet, or cash flow statement is publicly available.
        The company is private and does not file with the SEC. Gross margin, EBITDA,
        cash position, and debt are all unknown externally.
      whyItMatters: >-
        The absence of audited financials materially elevates due-diligence risk. An
        outside investor cannot assess burn rate, runway, profitability, or capital adequacy
        without access to management accounts, creating binary underwriting dependency on
        a formal data-room process.
      diligencePath: >-
        Obtain three to five years of audited financial statements from KKR and management;
        verify against data room; cross-check with PitchBook or Crunchbase estimates where
        available.
      relatedQuestionRefs: [QI024]

    - type: private-evidence-only
      severity: high
      topic: "arr-nrr-churn"
      missingEvidence: >-
        ARR, MRR, NRR, gross dollar retention, logo churn rate, cohort retention, and
        average contract duration are not publicly available for any year.
      whyItMatters: >-
        These are the most critical subscription quality metrics. Without them, the
        revenue quality elevation from the retainer model cannot be verified, and expansion
        dynamics within the customer base are entirely opaque.
      diligencePath: >-
        Request ARR by product line, NRR by cohort vintage, and contract renewal schedules
        in the data room; confirm whether renewal rates support the assumed recurring
        revenue model.
      relatedQuestionRefs: [QI012]

    - type: private-evidence-only
      severity: high
      topic: "gross-margin-undisclosed"
      missingEvidence: >-
        Cost of revenue, gross margin by product line, and EBITDA are not disclosed.
        The 60–70% gross margin estimate is derived entirely from public-company analogues
        and is not NetSPI-specific.
      whyItMatters: >-
        Gross margin is the primary determinant of unit economics, reinvestment capacity,
        and long-run profitability. The higher human-services component relative to pure
        SaaS peers creates meaningful uncertainty in this estimate.
      diligencePath: >-
        Obtain audited P&L with COGS breakdown; compare pentester utilization rates and
        per-head revenue against public managed security services peers; confirm platform
        vs. services margin differential.
      relatedQuestionRefs: [QI014]

    - type: private-evidence-only
      severity: high
      topic: "enterprise-valuation-undisclosed"
      missingEvidence: >-
        No enterprise value, implied revenue multiple, or KKR equity stake percentage
        has been disclosed for either the 2021 or 2022 rounds. The $410M investment
        amount and majority ownership are confirmed, but the post-money EV is unknown.
      whyItMatters: >-
        Without a disclosed or derivable valuation, it is impossible to assess the
        implied return profile for KKR, price any secondary transaction, or benchmark
        against comparable public company EV/revenue multiples.
      diligencePath: >-
        Request capitalization table and most-recent 409A or board-approved valuation
        from management; apply public-company EV/Revenue multiples (5–12x for high-growth
        cybersecurity) to revenue estimates to triangulate a range.
      relatedQuestionRefs: [QI023]

