evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: valuation
    missingEvidence: >-
      No public filings, no disclosed post-money valuation from either KKR round, no secondary market transaction data,
      and no 409A or board-approved valuation in the public domain.
    whyItMatters: >-
      Without a disclosed or derivable valuation, it is impossible to assess the implied return profile for KKR, price
      any secondary transaction, or benchmark against comparable public companies.
    diligencePath: >-
      Request capitalization table and most recent 409A or board-approved valuation from management; obtain three years
      of audited financials to apply comparable public company EV/revenue multiples.
    relatedQuestionRefs:
      - QO026
      - QO027
  - type: private-evidence-only
    severity: material
    topic: financials
    missingEvidence: >-
      Revenue figures are entirely self-reported via press releases with no audited P&L, balance sheet, or cash flow
      statement made public. ARR vs. total revenue breakdown not disclosed.
    whyItMatters: >-
      Revenue recognition methodology for PTaaS subscriptions vs. project-based work may differ materially; unaudited
      growth rates cannot support investment thesis pricing with confidence.
    diligencePath: >-
      Request three years of audited financial statements; confirm ARR vs. total revenue split; assess EBITDA margins,
      free cash flow conversion, and deferred revenue balances.
    relatedQuestionRefs:
      - QO007
      - QO029
  - type: private-evidence-only
    severity: material
    topic: ownership-structure
    missingEvidence: >-
      KKR's exact ownership percentage and post-2022 capitalization structure are undisclosed. Ten Eleven Ventures'
      current stake and management equity pool details are unconfirmed.
    whyItMatters: >-
      Governance rights, protective provisions, and drag-along/tag-along terms determine risk profile for any
      co-investor or secondary buyer and affect exit optionality.
    diligencePath: >-
      Request full capitalization table, shareholder agreement, board observer and approval rights documentation, and
      management equity plan terms.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs:
      - QO018
      - QO017
  - type: data-sparse
    severity: low
    topic: adverse-events
    missingEvidence: >-
      No material adverse events, litigation, regulatory actions, or controversies identified in public records reviewed
      for this chapter. Absence of public filings limits completeness of adverse event screening.
    whyItMatters: >-
      NetSPI handles sensitive security data for major financial institutions; any data breach, insider threat,
      negligence claim, or regulatory action could be material to reputation and client retention.
    diligencePath: >-
      Conduct PACER federal litigation search, request management representations on material litigation, review client
      contract terms for liability caps and indemnification obligations.
    relatedQuestionRefs:
      - QO028
  - type: private-evidence-only
    severity: low
    topic: leadership and founder completeness
    missingEvidence: >-
      Pre-2017 NetSPI founder identity, full management team beyond disclosed executives, and management equity pool
      details are not publicly confirmed. Some leadership positions may have changed without public announcement.
    whyItMatters: >-
      Incomplete leadership history limits assessment of founder continuity and key-person dependencies beyond currently
      disclosed senior executives.
    diligencePath: >-
      Request company founding documents, capitalization table, and complete current management org chart from
      management.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs:
      - QO011
      - QO012
  - type: data-sparse
    severity: low
    topic: milestone record completeness
    missingEvidence: >-
      Internal operational milestones, unannounced product releases, and detailed business events between 2001-2017 are
      not available in public records. The bootstrapped era lacks milestone documentation.
    whyItMatters: >-
      The 16-year bootstrapped era lacks detailed milestone documentation, limiting assessment of early business model
      evolution and original product market fit trajectory.
    diligencePath: >-
      Request board minutes, company history documentation, and major customer milestone records for the pre-KKR
      2001-2017 period.
    relatedTableRefs:
      - TO004
    relatedQuestionRefs:
      - QO014
  - type: private-evidence-only
    severity: blocking
    topic: market-sizing-som
    missingEvidence: >-
      NetSPI does not publicly disclose ARR, gross margin, net revenue retention (NRR), or customer unit economics.
      Revenue estimates ($111M 2023, $130–145M 2024) are derived from company-disclosed growth percentages, not
      independently verified financial filings. No third-party analyst has published a NetSPI-specific revenue or market
      share estimate with explicit methodology.
    whyItMatters: >-
      Without audited or independently verified revenue data, the SOM calculation rests on management-stated growth
      percentages that could reflect bookings rather than recognized revenue, include partner-attributed revenue, or be
      subject to restatement. Investors cannot anchor to a precise market share figure or calculate ARR-to-valuation
      multiples without this data.
    diligencePath: >-
      Request NetSPI ARR, NRR, and gross margin data under NDA in management meetings. Cross-reference against PitchBook
      or Harmonic revenue estimates if available. Obtain the last three years of audited financials from management to
      validate stated growth rates.
    relatedQuestionRefs:
      - QM028
    relatedTableRefs:
      - TM002
  - type: stale
    severity: material
    topic: tam-sizing
    missingEvidence: >-
      No single analyst firm (Gartner, Forrester, IDC) has published a combined PTaaS + EASM + BAS market sizing report
      with consistent scope definitions as of the 2026-05-18 research date. The $1.7B–$3.8B penetration testing
      estimates are synthesized from multiple sources with different scope definitions and base years. No updated
      2025–2026 penetration testing market sizing from a major analyst was identified.
    whyItMatters: >-
      Stale or scope-inconsistent market sizing makes it difficult to validate the $4–8B SAM estimate or assess whether
      the 11–14% CAGR assumption remains valid following the 2024 macroeconomic environment. Investors could be
      anchoring to a TAM that overstates or understates the actual addressable opportunity.
    diligencePath: >-
      Commission or purchase a 2025–2026 vintage Gartner or Forrester market sizing report covering PTaaS and EASM with
      explicit scope definitions. Cross-reference against public financial data from Cobalt (private), Synack (private),
      and Bishop Fox (private) if any have disclosed ARR or booking metrics. Request NetSPI management's own TAM
      analysis and the data sources underlying their investor presentations.
    relatedQuestionRefs:
      - QM025
      - QM026
    relatedTableRefs:
      - TM002
  - type: conflicting-data
    severity: material
    topic: automation-substitution
    missingEvidence: >-
      Pentera's claim of 60% cost reduction versus third-party pen testing is unverified by an independent third party.
      The claim appears in Pentera's own marketing materials. No independent study comparing total cost of ownership
      between PTaaS and automated BAS was found during this research run.
    whyItMatters: >-
      If Pentera's 60% cost reduction claim is substantiated by enterprise buyers, it represents a material pricing
      ceiling on NetSPI's PTaaS pricing power, particularly for commodity compliance testing use cases. This affects
      long-term margin assumptions and the pricing sustainability of the premium PTaaS model.
    diligencePath: >-
      Request win/loss analysis from NetSPI management showing deals where Pentera or automated BAS was the competing
      alternative and the decision criteria. Survey reference customers on whether they evaluated automated alternatives
      and why they selected human-led PTaaS. Commission an independent TCO analysis comparing PTaaS versus automated BAS
      for representative use cases.
    relatedQuestionRefs:
      - QM027
