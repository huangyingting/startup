    whyItMatters: >-
      The absence of audited financials materially elevates due-diligence risk. An outside investor cannot assess burn
      rate, runway, profitability, or capital adequacy without access to management accounts, creating binary
      underwriting dependency on a formal data-room process.
    diligencePath: >-
