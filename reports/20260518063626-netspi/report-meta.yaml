companyProfile:
  summary: >-
    NetSPI, founded in 2001 and headquartered in Minneapolis, Minnesota, has
    evolved from a bootstrapped regional penetration testing firm into the
    world's largest pure-play proactive security provider. Under CEO Aaron
    Shilts, who joined with Sunstone Partners' institutional investment in
    2017, NetSPI has scaled through a combination of organic growth and
    strategic acquisitions (Silent Break Security 2020, nVisium 2023, Hubble
    Technology 2024). KKR's two-tranche $500M+ investment—$90M in May 2021
    and $410M in October 2022—makes it the majority owner. With an estimated
    $130–145M in 2024 revenue, 650+ employees, 350+ in-house pentesters, and
    1,942 customers across 37 countries, NetSPI serves nine of the top ten
    U.S. banks, four of the top five cloud providers, four of the top five
    healthcare companies, and many Fortune 500 organizations.
  foundedDate: "2001-01-01"
  founders:
    - name: Aaron Shilts
      role: CEO & President
      background: >-
        Joined NetSPI in 2017 when Sunstone Partners made the first institutional
        investment; led the company through hypergrowth and $500M+ KKR capital raise.
      claimRefs: [CO010]
  foundingLocation: Minneapolis, MN, USA
  headquarters: Minneapolis, MN, USA
  productSummary: >-
    NetSPI Platform: a unified portal offering Penetration Testing as a Service
    (PTaaS via Resolve), External Attack Surface Management (EASM with Lite,
    Standard, and Plus tiers), Continuous Asset and Attack Surface Management
    (CAASM, via the Hubble-acquired Aurora platform), and Breach and Attack
    Simulation (BAS). The platform combines 350+ in-house security experts
    with proprietary AI to provide continuous, real-time security testing
    across 50+ service types covering applications, cloud, network, hardware,
    AI/ML systems, and mainframes.
  customerFocus: >-
    Large enterprise and mid-market organizations in financial services,
    healthcare, cloud/technology, retail, and government sectors globally,
    with particular depth in regulated industries and Fortune 500 companies.
  businessModel: >-
    Recurring subscription and retainer-based revenue model via PTaaS platform
    licensing; supplemented by channel/partner-sourced revenues (148 partners,
    31% YoY growth in partner revenue in 2023); and strategic technology
    partnerships (e.g., Chubb cyber insurance).
  stage: Private — KKR majority-owned growth stage
  fundingStatus: >-
    $500M+ total from KKR (majority owner post-Oct 2022 round). Most recent
    round: $410M led by KKR in October 2022. Also backed by Ten Eleven Ventures.
    Sunstone Partners (original institutional backer) exited at 2022 round.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO010, CO028, CO030, CI001, CU001]

summary:
  headline: >-
    NetSPI is the dominant pure-play proactive security platform at scale,
    with $500M+ KKR backing, consistent 30–50%+ organic revenue growth through
    2023, and an unmatched combination of elite human expertise and AI—making
    it a compelling strategic asset in the expanding CTEM market.
  overallScore: 8.2
  recommendation: buy
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: null
    revenueRunRateUsdM: 140
    arrUsdM: null
    revenueGrowthYoYPct: 42
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 500
    customerCount: 1942
    headcount: 650
  topStrengths:
    - >-
      Category leader in pure-play proactive security with $500M+ in KKR
      backing and consistent 30–50%+ organic revenue growth.
    - >-
      350+ in-house elite pentesters creates a human-expertise moat that
      AI-only automated testing cannot replicate at fidelity.
    - >-
      Full-stack platform (PTaaS + EASM + CAASM + BAS) addresses the emerging
      CTEM use case, deepening switching costs and expanding TAM.
    - >-
      Customer concentration in deeply regulated verticals (9/10 top US banks,
      4/5 top healthcare companies) creates high retention and large ACV.
    - >-
      Strategic acquisitions (nVisium, Hubble) rapidly expanded both talent
      base and product breadth with proven integration track record.
  topRisks:
    - >-
      AI-native automated pentesting competitors (Pentera, others) could
      commoditize lower-complexity tests and compress ASPs.
    - >-
      Heavy KKR majority ownership creates exit timeline pressure; potential
      secondary offering or PE recapitalization could change strategic priorities.
    - >-
      Human-capital intensity limits gross margin expansion and creates
      talent-acquisition risk in a scarce offensive security labor market.
    - >-
      Private company opacity makes audited revenue verification impossible
      without direct access to financials; all revenue estimates are derived.
    - >-
      Integration risk from three acquisitions (2020, 2023, 2024) could create
      technical debt and cultural friction at scale.
  unresolvedGaps:
    - >-
      Exact audited revenue and gross margin figures (private company
      non-disclosure); requires management access or sell-side package.
    - >-
      Net Revenue Retention (NRR) and logo churn rate are not publicly disclosed;
      critical for subscription health assessment.
    - >-
      KKR's exit timeline and planned liquidity event (IPO vs. strategic sale);
      no public signals on expected exit window.
    - >-
      R&D investment as a percentage of revenue and product roadmap detail;
      required for competitive moat assessment.
    - >-
      International revenue breakdown (EMEA, APAC); company has 37-country
      customer base but revenue mix is opaque.

appendices:
  - id: A
    title: Methodology and Limitations
    blocks:
      - type: paragraph
        body: >-
          This report was produced using publicly available sources only.
          Revenue estimates are derived by applying company-disclosed organic
          growth rates to a $49M 2021 base figure implied by the 51% growth
          disclosure. All financial estimates carry ±15% uncertainty and
          should be treated as directional only. Valuation inference is based
          on KKR's $500M+ majority investment position; no official valuation
          was publicly disclosed for the October 2022 round. Sources were
          fetched between May 2026 and May 18, 2026 using automated retrieval
          tools. Paywalled third-party analyst reports were accessed via
          official NetSPI press releases referencing those reports.
        claimRefs: []
      - type: callout
        calloutType: assumption
        title: Revenue Estimation Methodology
        body: >-
          Base revenue estimated at ~$49M for 2021 (implied by KKR's $90M
          investment at typical 2x ARR multiple for growth stage cybersecurity).
          Applied disclosed growth rates: +51% (2022e: ~$74M), +58% (2023e:
          ~$117M), +42% (2024e: ~$130–145M). These are estimates only; actual
          figures may differ materially.
        claimRefs: [CI001, CI005, CI006, CI007, CI008]

