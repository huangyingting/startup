company:
  name: NetSPI
chapter:
  number: 1
  title: "Company Overview"
  summary: >-
    NetSPI is a Minneapolis-based offensive security platform founded in 2001 that
    bootstrapped profitably for 16 years before KKR's $500M+ investment in 2021-2022
    made it one of the best-capitalized independent penetration testing companies
    globally. The company operates a Penetration Testing as a Service (PTaaS) model
    via its Resolve platform, complemented by EASM, CAASM (via Hubble Aurora), and
    BAS offerings, serving 1,942 customers across 37 countries including 9 of the
    top 10 US banks. With 650+ employees, 350+ in-house pentesters, and estimated
    2024 revenue of $130-145M, NetSPI is executing an AI-powered growth strategy
    that includes additional acquisitions in 2026.

sections:
  - id: identity
    title: "Identity and Business Model"
    body: |
      NetSPI is a Minneapolis, Minnesota-based cybersecurity company founded in 2001,
      specializing in offensive security services delivered at enterprise scale. The
      company's core business model is Penetration Testing as a Service (PTaaS),
      delivered through its proprietary Resolve platform, which enables continuous
      automated workflows combined with expert human analysis. Unlike traditional
      project-based consulting, NetSPI's platform model generates recurring revenue
      and persistent client relationships, differentiating it from time-and-materials
      security consulting competitors.

      Beyond PTaaS, NetSPI has expanded its product portfolio to include External
      Attack Surface Management (EASM), Cyber Asset Attack Surface Management (CAASM)
      via its Hubble Aurora technology (acquired June 2024), and Breach and Attack
      Simulation (BAS). This suite positions NetSPI as a proactive security platform
      addressing the full offensive security lifecycle from asset discovery through
      continuous validation — consistent with the Gartner-defined Continuous Threat
      Exposure Management (CTEM) framework.

      NetSPI serves enterprise clients across financial services, healthcare, retail,
      and technology sectors, including 9 of the top 10 US banks and 4 of the top 5
      global cloud providers. The company maintains its headquarters in Minneapolis
      with additional offices in the US, Canada, United Kingdom, and India, serving
      customers across 37 countries. In May 2026, NetSPI launched AI-powered
      Continuous Pentesting, marking a strategic shift toward agentic security
      automation and differentiating it from purely automated competitors such as
      Pentera, Cobalt.io, and Synack.
    claimRefs: [CO001, CO004, CO005, CO028, CO031, CO034, CO042, CO043]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: leadership
    title: "Leadership and Governance"
    body: |
      NetSPI's executive team combines deep offensive security expertise with
      enterprise software and financial services leadership. CEO Aaron Shilts joined
      in 2017 alongside the first institutional investment from Sunstone Partners,
      transforming the bootstrapped firm into a growth-stage platform business. Shilts
      represents a significant key-person risk given his centrality to KKR's ongoing
      investment relationship and external positioning.

      The broader leadership team has been substantially built out since the 2021 KKR
      investment. CTO Tom Parker (formerly Accenture Security CTO and founder of
      acquired Hubble Technology) drives product and technology vision. CPO Vinay
      Anand (formerly Palo Alto Networks Prisma Cloud VP of Product), CFO Jay Golonka
      (formerly Prometheus Group CFO with 25+ years of experience), COO Charles
      Horton, and CISO Norman Kromberg (30+ years in security operations, formerly at
      SouthernCarlson and Optum) collectively provide deep functional leadership.
      Tom Parker's dual role as former Hubble founder and current CTO creates a
      secondary key-person concentration in product and AI strategy.

      The board of directors reflects KKR's governance requirements alongside
      strategic cybersecurity depth. Scott Lundgren (CTO, VMware Carbon Black),
      John Spiliotis (KKR-affiliated, former SVP Sales at Palo Alto Networks), and
      Niloo Razi Howe (former CSO at RSA and Endgame, CISA advisory council member,
      board member at Tenable and Recorded Future) provide security-specialized
      oversight. This board composition is consistent with a KKR portfolio company
      being prepared for a potential future exit or public offering.
    claimRefs: [CO003, CO020, CO021, CO022, CO023, CO024, CO025, CO026, CO027, CO040]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding
    title: "Funding and Ownership Structure"
    body: |
      NetSPI operated as a bootstrapped, profitable business for approximately 16
      years before receiving its first institutional investment from Sunstone Partners
      in 2017. This extended pre-institutional phase is notable in the cybersecurity
      services market and suggests a durable, cash-generative operating model.

      External funding history accelerated substantially from 2021. In May 2021, KKR
      and Ten Eleven Ventures co-led a $90 million growth equity round. In October
      2022, KKR led a $410 million growth round — one of the largest cybersecurity
      investment rounds of that year — resulting in KKR becoming the majority owner
      and Sunstone Partners fully exiting. Total disclosed capital raised stands at
      over $500 million, all from KKR and Ten Eleven Ventures.

      The company has not pursued an IPO and no public valuation has been disclosed.
      KKR's $410M investment at majority ownership implies a significant enterprise
      value, but without disclosed terms or audited financials a precise multiple
      cannot be derived from public sources. In April 2026, NetSPI was reported
      pursuing acquisitions of $80 million or more, suggesting continued investment
      appetite likely backed by further KKR capital commitments. Debt and credit
      facilities are not publicly disclosed and represent a material information gap
      for diligence purposes.
    claimRefs: [CO002, CO006, CO007, CO008, CO036, CO038, CO039]
    tableRefs: [TO003]
    figureRefs: []

  - id: scale
    title: "Scale and Operational Metrics"
    body: |
      NetSPI has demonstrated a consistent high-growth trajectory since the 2021 KKR
      investment. The company reported 51% organic revenue growth in 2021, 58% in
      2022, and 42% in 2023. For 2024, the company reported double-digit growth
      without specifying a percentage; estimated revenue of $130-145 million implies
      continued strong performance.

      Headcount grew from approximately 400 in 2022 to 500+ in 2023 and 650+ by the
      end of 2024, with more than 350 in-house penetration testers — one of the
      largest employed pentesting teams in the industry according to company claims.
      As of 2024, NetSPI served 1,942 customers across 37 countries, conducted over
      4,500 assessments, and has cumulatively identified 128 million vulnerabilities.

      The partner ecosystem expanded to 148 channel partners by end of 2024, including
      Ingram Micro, Softcat, and members of the AWS ISV Accelerate program, indicating
      strong distribution investment. Enterprise client depth is notable: 9 of the
      top 10 US banks, 4 of the top 5 global cloud providers, 4 of the top 5
      healthcare companies, and 7 of the top 10 US retailers are reported clients.
      Revenue figures are not publicly audited; all figures in this section are
      derived from company press releases or analyst estimates and should be
      independently verified through formal financial due diligence.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO028, CO029, CO030, CO032, CO033, CO037]
    tableRefs: []
    figureRefs: [FO003]

  - id: milestones
    title: "Company Milestones and Trajectory"
    body: |
      NetSPI's history spans over two decades and divides into three phases: the
      bootstrapped growth phase (2001-2016), the institutional acceleration phase
      (2017-2022), and the platform consolidation and AI transition phase (2023-present).

      Key milestones include the founding in Minneapolis in 2001 as a specialized
      penetration testing consultancy; the first institutional investment from Sunstone
      Partners in 2017 enabling structured growth; the acquisition of Silent Break
      Security in December 2020 adding advanced offensive research capabilities; the
      $90M KKR co-investment in May 2021 funding product development and hiring; the
      landmark $410M KKR round in October 2022 enabling acquisitions and effecting
      majority ownership transfer; the acquisition of nVisium in early 2023 adding
      red team depth and over 400 new customers; the acquisition of Hubble Technology
      in June 2024 adding CAASM capabilities and bringing Tom Parker on as CTO; and
      the 2026 launch of AI-powered Continuous Pentesting.

      The company's March 2026 recognition in the Forrester Proactive Security
      Platforms Landscape (one of 42 vendors) validates its expanded market positioning
      beyond pure pentesting. NetSPI's April 2026 pursuit of $80M+ acquisitions
      signals continued growth investment under KKR backing. No material adverse
      events, regulatory actions, or litigation are identified in public records
      reviewed for this chapter; however, the absence of public filings limits the
      completeness of adverse event screening.
    claimRefs: [CO002, CO016, CO017, CO018, CO034, CO035, CO036, CO041]
    tableRefs: [TO004]
    figureRefs: [FO001]

