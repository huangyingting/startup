callouts:
  - calloutType: strength
    title: "23-Year Bootstrapped Track Record"
    body: "NetSPI's 23-year operating history and 16-year profitable bootstrapped phase demonstrate a durable, cash-generative business model unusual in high-growth cybersecurity. This history de-risks the post-KKR investment thesis by confirming baseline operational resilience independent of external capital."
    claimRefs: [CO001, CO002]

  - calloutType: strength
    title: "Elite Enterprise Client Roster"
    body: "The client portfolio — 9 of the top 10 US banks, 4 of the top 5 global cloud providers, named engagements with Microsoft (AI security) and the US Air Force — provides strong proof of enterprise trust and creates meaningful barriers to competitor displacement. Breadth across financial services, cloud, healthcare, and defense is a structural competitive advantage."
    claimRefs: [CO028, CO029]

  - calloutType: risk
    title: "Key-Person Concentration in CEO and CTO"
    body: "Key-person risk is concentrated in Aaron Shilts (CEO, KKR relationship, M&A execution) and Tom Parker (CTO, product vision, AI strategy, Hubble integration). Loss of either individual would risk disruption to investor relations, product roadmap, and the acquisition integration thesis. Diligence should assess succession planning and retention equity for both executives."
    claimRefs: [CO003, CO020]

  - calloutType: risk
    title: "Revenue and Valuation Unaudited"
    body: "All financial metrics — revenue, growth rates, and implied valuation — derive from company press releases and are not independently audited. Formal financial due diligence including audited financials for at least three years, normalized EBITDA, and confirmation of revenue recognition methodology for PTaaS subscriptions is essential before any investment decision."
    claimRefs: [CO009, CO039]

  - calloutType: insight
    title: "AI Pivot Signals Platform Expansion Strategy"
    body: "The 2026 launch of AI-powered Continuous Pentesting and pursuit of $80M+ acquisitions signal NetSPI's intention to evolve from a managed services operator to a technology-led security platform. The Forrester Proactive Security Platforms inclusion could expand the total addressable market substantially but introduces execution risk in transitioning from human-labor-intensive PTaaS to AI-augmented delivery."
    claimRefs: [CO034, CO035, CO036]

