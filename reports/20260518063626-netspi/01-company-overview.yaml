  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "valuation"
      missingEvidence: "No public filings, no disclosed post-money valuation from either KKR round, no secondary market transaction data, and no 409A or board-approved valuation in the public domain."
      whyItMatters: "Without a disclosed or derivable valuation, it is impossible to assess the implied return profile for KKR, price any secondary transaction, or benchmark against comparable public companies."
      diligencePath: "Request capitalization table and most recent 409A or board-approved valuation from management; obtain three years of audited financials to apply comparable public company EV/revenue multiples."
      relatedQuestionRefs: [QO026, QO027]

    - type: private-evidence-only
      severity: material
      topic: "financials"
      missingEvidence: "Revenue figures are entirely self-reported via press releases with no audited P&L, balance sheet, or cash flow statement made public. ARR vs. total revenue breakdown not disclosed."
      whyItMatters: "Revenue recognition methodology for PTaaS subscriptions vs. project-based work may differ materially; unaudited growth rates cannot support investment thesis pricing with confidence."
      diligencePath: "Request three years of audited financial statements; confirm ARR vs. total revenue split; assess EBITDA margins, free cash flow conversion, and deferred revenue balances."
      relatedQuestionRefs: [QO007, QO029]

    - type: private-evidence-only
      severity: material
      topic: "ownership-structure"
      missingEvidence: "KKR's exact ownership percentage and post-2022 capitalization structure are undisclosed. Ten Eleven Ventures' current stake and management equity pool details are unconfirmed."
      whyItMatters: "Governance rights, protective provisions, and drag-along/tag-along terms determine risk profile for any co-investor or secondary buyer and affect exit optionality."
      diligencePath: "Request full capitalization table, shareholder agreement, board observer and approval rights documentation, and management equity plan terms."
      relatedTableRefs: [TO003]
      relatedQuestionRefs: [QO018, QO017]

    - type: data-sparse
