      - number: '4.5'
        title: 资本结构与充足性
        blocks:
          - type: paragraph
            body: >
              NetSPI 的资本结构完全由私募股权塑造。公司在 Sunstone Partners 约 2017 年进行未披露少数股权投资前，已自举至盈利。KKR 于 2021 年 5 月与 Ten Eleven
              Ventures 共同领投 $90M 成长股权轮，标志着公司获得第一笔机构规模化资本。15 个月后，KKR 在 2022 年 10 月领投 $410M 成长轮，并在 Sunstone Partners
              退出后成为多数股东。KKR 领投资本总额超过 $500M。KKR 对 2022 年轮次的公开表述提到，相较 2021
              年初始投资，公司实现“显著超预期表现”，意味着这段期间收入执行高于计划。公司未公开披露债务义务、信贷额度或递延收入票据；这符合一家私营、股权支持的成长型公司特征，该公司不需要项目融资或资本密集资产。公司公开提出的收购战略——包括
              Minneapolis Business Journal 2026 年 4 月报道称其目标是 $80M+ AI 相关收购——说明管理层认为资产负债表足以支撑进一步 M&A。SEC EDGAR 对 NetSPI
              的公司搜索显示了其申报历史，符合 Regulation D
              下私募发行且公开披露要求极少的特征。相对于公司当前增长画像，资本充足性看起来较强。逐轮融资的历史时间线已在公司概况章节确立；本章针对同一融资事实，用独立来源引用生成本地财务声明。精确现金余额、现金跑道月数和
              EBITDA 仍未披露。资本充足性指标见 TI004，完整财务尽调阻碍清单见 TI005。
