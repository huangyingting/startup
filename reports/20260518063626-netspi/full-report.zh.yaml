          - type: callout
            title: Pentera 自动化渗透测试降本主张是直接定价风险
            body: >-
              Pentera 是自动化渗透测试领域的直接竞争对手，公开声称 AI 自动化可将第三方渗透测试成本降低 60%。如果这一主张在企业级规模得到验证，就会直接威胁 NetSPI
