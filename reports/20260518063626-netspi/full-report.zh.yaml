  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点类型
      - 论点
      - 证据
      - 何种证据会改变判断
    rows:
      - - 投资逻辑
        - NetSPI 是全球最大的纯渗透测试服务商，拥有 350+ 名内部渗透测试人员，并在美国前 10 大银行中的 9 家建立企业品牌信任，形成结构性护城河
        - 公司声明（2024 年 12 月）；1,942 家客户、4,500+ 次评估；入选 Forrester PSP Landscape
        - 若可信竞争对手达到相近客户规模或评估量，护城河论点会被削弱
      - - 投资逻辑
        - KKR 累计投入 $500M+，验证资产质量，也为向相邻攻防安全市场加速 M&A 提供资产负债表支撑
        - 官方新闻稿 SV001、SV002；2026 年 4 月收购活动已确认
        - 如果 KKR 释放退出时间表信号，或暂停继续投放资本，投资逻辑置信度会下降
      - - 投资逻辑
        - 连续三年收入增长 50%、58%、42%，说明需求韧性强于约 11–14% 的 PTaaS 市场 CAGR；公司在拿份额
        - 官方年度增长新闻稿 2021–2023（SV003、SV004、SV005）
        - 如果收入增速连续两年低于 15%，更像是份额流失，而不是市场增速放缓
      - - 反向逻辑
        - 收入增速从 58% 降至 42%，2024 年又降至未具体披露的两位数；轨迹指向逐步接近市场增速的渐近增长，并压缩估值倍数
        - 2024 年“丰收之年”官方稿（SV006）未披露增长百分比；此前各年均披露
        - 若 2024 年增长为 20%+，且 2025 年指引显示重新加速，减速论点会被削弱
      - - 反向逻辑
        - NRR、GRR、毛利率、客户集中度和股权结构表清算顺序完全未披露；缺少这些，外部估值建模结构性失准
        - 无公开监管文件；Bloomberg 和 Star Tribune 确认估值未披露（SV013、SV014）
        - 数据室若披露 NRR 高于 110%、毛利率高于 55%，判断会实质改变
      - - 反向逻辑
        - AI 自动化平台（Pentera）声称相较第三方人工渗透测试可降本 60%；若企业采用加速，未来 3–5 年 NetSPI 的定价权和毛利率会面临结构性挤压
        - Pentera 公开声明（SV026）；相邻网络安全品类已能观察到结构性自动化趋势
        - 如果 NetSPI 的 AI Continuous Pentesting 能把自动化效率内化并拉升毛利率，竞争威胁会下降
    notes: 投资逻辑和反向逻辑均基于截至 2026 年 5 月的公开证据。私营公司不透明限制了反向逻辑的证据基础；许多反向逻辑风险来自推断。上述论点未按概率加权。
