    title: 工作流 / 用例表
    slug: workflow-use-case-table
    notes: 用例来自 netspi.com 官方产品页面、新闻稿，以及 netspi.com trust 和 platform 页面。可量化收益反映供应商主张；多数用例没有独立基准。
