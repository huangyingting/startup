      - number: '4.3'
        title: 成本结构与利润率画像
        blocks:
          - type: paragraph
            body: >
              NetSPI 的成本结构以人力资本为主。截至 2024 年，公司有 650+ 名员工和 350+
              名内部渗透测试人员，直接人工构成收入成本的最大部分。渗透测试团队需要持续投入技术培训、认证维护和有竞争力的薪酬，以便在认证攻击性安全人才溢价明显的专业劳动力市场中吸引人才。平台开发和基础设施是第二大成本类别；Resolve
              平台及其集成托管在 AWS 上，持续工程投入用于维持平台质量并开发新的 AI 辅助测试功能。三笔收购——Silent Break（2020）、nVisium（2023）和
              Hubble（2024）——带来整合成本和商誉；不过管理层称每笔收购均已成功整合，没有未解决的运营分离问题。CFO Jay Golonka 拥有 25+ 年 CFO 经验，包括在 Prometheus Group
              任职，显示公司在成本管理和资本配置上具备财务纪律。基于托管安全服务和网络安全 SaaS 上市公司类比，PTaaS / SaaS 混合模式毛利率估计为 60–70%；但 NetSPI
              的人工服务成分更高，很可能落在该区间低端。公开资料没有审计后的成本或利润率数据，若无法接触财务报表，估算不可验证。Pentera 的自动化路径构成潜在长期定价压力：它以更低的单次项目成本交付持续测试，可能压缩
              NetSPI 这类服务主导竞争者的实际定价。
