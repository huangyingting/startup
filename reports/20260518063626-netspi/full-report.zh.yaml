      - number: '3.3'
        title: 能力与功能对比
        blocks:
          - type: paragraph
            body: >
              NetSPI 与同业的能力对比显示，差异化沿两条轴展开：交付模式和平台宽度。交付模式上，NetSPI 的内部专家模式（350+ 名渗透测试人员）与 Synack 的筛选研究员社区、Cobalt 的 Core
              社区、HackerOne 的开放漏洞赏金生态，以及 Pentera 的全自动模拟形成鲜明对比——它们分别落在人到自动化光谱的不同位置。平台宽度上，NetSPI 把 PTaaS、EASM、CAASM（通过
              Hubble Aurora）和 BAS 整合起来，并覆盖 50+ 种测试服务类型，这在直接 PTaaS 竞争者中独一无二。


              所有直接竞争者都缺少 CAASM：Synack、Cobalt、HackerOne 和 Bishop Fox 都不以第一方能力提供网络资产攻击面管理。BAS 或控制验证由 Pentera（自动化）提供，Bishop
              Fox（Cosmos 模拟）也部分提供，但二者都没有在单一托管平台中同时结合 EASM 和 CAASM。Rapid7 和 Tenable 不把对抗性渗透测试作为核心服务，因此应归为相邻 VM 既有厂商，而不是直接
              PTaaS 竞争者。


              截至研究日期，NetSPI 于 2026 年 5 月推出的 AI 驱动 Continuous Pentesting，是 PTaaS 市场中最显眼的 AI 差异化主张；直接竞争者尚未宣布等价的智能体 AI
              加速能力。竞争者定价普遍不透明：没有直接竞争者披露企业标价，因此无法精确比较每项发现的价格，也形成了研究问题中需要处理的证据缺口。
