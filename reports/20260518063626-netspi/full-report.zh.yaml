      - number: '1.4'
        title: 规模与运营指标
        blocks:
          - type: paragraph
            body: >
              自 2021 年 KKR 投资以来，NetSPI 一直保持高增长轨迹。公司披露 2021 年内生收入增长 51%，2022 年增长 58%，2023 年增长 42%。2024
              年，公司称收入实现双位数增长但未给出具体百分比；估算收入 $130-145M，意味着表现仍然强劲。


              员工数从 2022 年约 400 人，增至 2023 年 500+ 人，并在 2024 年底达到 650+ 人，其中内部渗透测试人员超过 350 名——按公司说法，这是行业内规模最大的雇佣制渗透测试团队之一。截至
              2024 年，NetSPI 在 37 个国家服务 1,942 家客户，执行超过 4,500 次评估，累计识别 1.28 亿个漏洞。


              合作伙伴生态到 2024 年底扩至 148 家渠道伙伴，包括 Ingram Micro、Softcat 和 AWS ISV Accelerate
              计划成员，显示出强劲的分销投入。企业客户深度突出：据公司披露，客户包括美国前十大银行中的 9 家、全球前五大云服务商中的 4 家、前五大医疗健康公司中的 4 家，以及美国前十大零售商中的 7
              家。收入数据未经公开审计；本节所有数字均来自公司新闻稿或分析师估算，正式财务尽调需要独立核验。
