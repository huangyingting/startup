    rows:
      - - DORA——ICT 风险 / TLPT 合规
        - 欧盟（金融实体）
        - 2025 年 1 月 17 日生效；已全面适用
        - 高——欧盟金融行业客户必须满足
        - 高——若不合规，将失去欧盟金融行业 TLPT 项目资格
        - 对齐 TIBER-EU 方法论；专门的欧盟交付团队
        - 持续合规负担；方法论演变风险
        - 确认 NetSPI 的 TIBER-EU 认证状态；索取 DORA TLPT 客户案例证据
      - - NIS2——供应商安全要求
        - 欧盟（28 个成员国）
        - 2024 年 10 月前完成转化；2025 年起执法
        - 中——NetSPI 向 NIS2 覆盖实体供货
        - 中——供应链安全审计可能带来新的合同义务
        - ISO 27001 认证；SOC 2 Type II 控制
        - 供应商审计请求可能增加；存在合同重谈风险
        - 索取 NetSPI 的 NIS2 供应商安全合规文件和审计状态
      - - SEC 网络安全披露规则
        - 美国（上市公司）
        - 2023 年 12 月生效；全面执法持续推进
        - 中——数据泄露后，供应商测试质量会被追查
        - 中——若测试漏掉已披露漏洞，事故后存在责任风险
        - 责任限制条款；项目范围文档
        - 合同责任限制未必能完全挡住声誉损害
        - 让法律顾问审阅 NetSPI 标准 MSA 和责任限制条款
      - - FCC 路由器安全要求
        - 美国
        - 仍在演进；2024 年后提出规则草案
        - 低至中——影响特定 IoT / 网络设备测试范围
        - 低——仅适用于路由器测试服务线，范围窄
        - 跟踪 FCC 规则制定；更新路由器测试方法论
        - 剩余暴露很小；服务线风险范围窄
        - 跟踪 FCC 宽带设备安全规则制定，评估适用性
      - - CCPA / GDPR 数据处理
        - 美国（CA）；欧盟
        - 已适用；需要持续合规
        - 中——NetSPI 处理客户敏感基础设施数据
        - 中——项目期间数据泄露会触发监管报告义务
        - 数据处理政策；项目数据最小化；DPA 协议
        - 项目期间数据泄露会带来监管和声誉暴露
        - 索取 NetSPI 的 CCPA/GDPR DPA 模板和数据留存政策文件
    notes: 监管风险一面拉动需求（强制要求带来重复测试需求），一面也是合规负担（交付方法论必须跟上持续演进的标准）。可能性评分衡量的是合规失败概率，不是监管变化概率。严重性衡量的是合规失败后对 NetSPI 商业模式的影响。
