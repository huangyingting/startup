      - number: '1.5'
        title: 公司里程碑与发展轨迹
        blocks:
          - type: paragraph
            body: >
              NetSPI 的历史跨越二十多年，可分为三个阶段：自举增长期（2001-2016）、机构资本加速期（2017-2022），以及平台整合与 AI 转型期（2023 至今）。


              关键里程碑包括：2001 年在明尼阿波利斯创立，起初是一家专业渗透测试咨询公司；2017 年获得 Sunstone Partners 首笔机构投资，推动结构化增长；2020 年 12 月收购 Silent
              Break Security，补强高级攻击研究能力；2021 年 5 月获得 KKR 共同投资 $90M，用于产品开发和招聘；2022 年 10 月完成标志性的 KKR $410M
              轮次，支撑收购并完成多数股权转移；2023 年初收购 nVisium，增加红队深度并带来 400 多家新客户；2024 年 6 月收购 Hubble Technology，补上 CAASM 能力，并引入 Tom
              Parker 担任 CTO；2026 年推出 AI 驱动的 Continuous Pentesting。


              2026 年 3 月，公司入选 Forrester Proactive Security Platforms Landscape（42 家供应商之一），验证了其超越纯渗透测试的市场定位。2026 年 4
              月，NetSPI 寻求 $80M+ 收购，显示其在 KKR 支持下仍会继续投入增长。本章审阅的公开记录未发现重大负面事件、监管行动或诉讼；但缺乏公开申报文件，限制了负面事件筛查的完整性。
