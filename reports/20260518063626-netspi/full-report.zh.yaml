      - number: '5.5'
        title: 产品路线图与创新轨迹
        blocks:
          - type: paragraph
            body: >-
              2023 至 2026 年，NetSPI 的产品路线图显示出清晰推进：从人类专家驱动的 PTaaS，走向 AI 增强的持续安全验证平台。2023 年 8 月推出 AI/ML Pentesting，确立了公司在
              LLM 和机器学习安全评估上的先发定位。2024 年 6 月收购 Hubble，把 CAASM 能力（Aurora 平台）带入统一门户。2024 年 12 月 EASM 三层级重新发布，以分级服务模型完成
              EASM 模块的商业包装。2026 年 5 月 Continuous Pentesting 上线，标志着在 NetSPI AI 引擎支撑下，公司首次推出订阅制常态化服务。同样在 2026 年推出的 Agentic
              MCP Platform Integrations，则让 NetSPI 卡位新兴智能体 AI 生态。

              竞争压力是关键战略变量。直接竞争对手 Pentera 声称，AI 自动化可把第三方渗透测试成本降低 60%，这直接挑战 NetSPI 人工主导模型的定价溢价。PTaaS 同行 Cobalt 和 Synack
              也在争夺企业渗透测试市场，Cobalt 强调 24 小时评估周转，Synack 则运营经过筛选的研究员网络。随着自动化替代方案成熟，NetSPI 的人工主导、AI
              加速模型能否继续守住溢价，是产品战略的核心长期风险。

              公开可得的路线图细节有限。R&D 投入占收入比例未披露，Hubble 之后 CAASM 的集成架构也没有在外部来源中记录。公开材料同样缺少平台 SLA 和正常运行时间承诺。
