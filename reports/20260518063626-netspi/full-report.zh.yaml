appendices:
  - id: A
    title: 方法论与限制
    blocks:
      - type: paragraph
        body: >-
          本报告仅使用公开来源。收入估计基于公司披露的有机增长率，并套用到 2021 年 $49M 的基准收入；该基准由 51% 增长披露反推得出。所有财务估计均有 ±15% 不确定性，只能作为方向性参考。估值推断基于 KKR 的
          $500M+ 多数股权投资；2022 年 10 月轮次没有公开披露官方估值。来源抓取时间为 2026 年 5 月至 2026 年 5 月 18 日，使用自动化检索工具。付费墙后的第三方分析师报告通过引用这些报告的
          NetSPI 官方新闻稿访问。
        claimRefs: []
      - type: callout
        calloutType: assumption
        title: 收入估计方法
        body: >-
          2021 年基准收入估计为 ~$49M（由 KKR $90M 投资按成长阶段网络安全公司常见的 2x ARR
          倍数反推）。套用已披露增长率：+51%（2022e：~$74M）、+58%（2023e：~$117M）、+42% （2024e：~$130–145M）。这些只是估计，实际数字可能存在重大差异。
        claimRefs:
          - CI001
          - CI005
          - CI006
          - CI007
          - CI008
