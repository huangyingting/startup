  - id: FE001
    title: NetSPI 平台产品架构
    slug: product-architecture-map
    type: stack
    layout: wide
    summary: NetSPI 统一平台的分层架构，从基础设施底座到面向客户的集成层。每一层代表截至 2026 年 5 月平台交付的一项独立功能能力。
    data:
      layers:
        - label: 基础设施层
          detail: AWS 云基础设施承载 NetSPI 平台；环境通过 SOC 2 Type II 认证；GDPR、CCPA、Cyber Essentials Plus 和 CREST 认证适用于这一层
        - label: PTaaS / Resolve 平台
          detail: 350+ 名内部认证渗透测试人员交付 50+ 种服务（应用、云、硬件、网络、大型机、AI/ML）；Resolve 门户支持实时协作报告；方法论获 CREST 认可
        - label: EASM 模块
          detail: 外部攻击面管理设三档（Lite/Standard/Plus，2024 年 12 月发布）；每周资产发现、云配置审查、暗网监测、域名监测；Plus 档包含持续外部渗透测试
        - label: CAASM 模块
          detail: Aurora 平台提供无代理内部资产可见性（2024 年 6 月从 Hubble 收购）；知识图谱映射内部资产关系；用内部攻击面语境补足 EASM 的外部视图
        - label: BAS 模块
          detail: 入侵与攻击模拟对齐 MITRE ATT&CK 框架；持续威胁验证；检测性控制测试；2023 年 BAS 年度解决方案；识别周期性渗透测试之间的防御缺口
        - label: NetSPI AI / 持续渗透测试
          detail: NetSPI 自研 AI 引擎加速侦察和数据处理；驱动持续渗透测试订阅服务（2026 年 5 月发布）；Agentic MCP Platform Integrations 支持 AI 智能体互操作（2026 年发布）
        - label: 集成与工作流层
          detail: JIRA、ServiceNow 和 Slack API 集成用于修复工作流自动化；可直接从 Resolve 门户把发现项创建为工单；连接企业 ITSM
    claimRefs:
      - CE001
      - CE008
      - CE011
      - CE016
      - CE017
      - CE037
      - CE039
  - id: FE002
    title: 客户工作流 / 运营流程
    slug: customer-workflow-operating-flow
    type: flow
    layout: wide
    summary: NetSPI 渗透测试项目从范围界定到持续测试的端到端客户工作流，展示集成触点和实时报告阶段。
    data:
      nodes:
        - id: n1
          label: 范围界定
          detail: 客户定义测试范围、资产清单、合规目标和监管要求；NetSPI 的范围咨询把 350+ 名渗透测试人员匹配到客户风险优先级
          type: step
        - id: n2
          label: 评估执行
          detail: CREST 认可的渗透测试人员使用内部工具和 NetSPI AI 侦察加速，在应用、云、网络、硬件和 AI/ML 攻击面执行定向攻击
          type: step
        - id: n3
          label: 实时报告
          detail: 发现项一经发现就发布到 Resolve 门户，不等最终报告；每个发现项包含 CVSS 评分、漏洞利用证据和修复建议
          type: step
        - id: n4
          label: 修复跟踪
          detail: JIRA、ServiceNow 和 Slack 集成为每个发现项创建工单；创建时即分配修复责任人；与企业 ITSM 双向同步状态
          type: step
        - id: n5
          label: 验证与复测
          detail: NetSPI 渗透测试人员验证修复完整性；复测已修补发现项；为合规和审计文件提供正式修复证据
          type: step
        - id: n6
          label: 持续测试
          detail: 持续渗透测试订阅（2026 年 5 月发布）借助 NetSPI AI，在大型评估周期之间保持常开覆盖；BAS 独立提供持续 MITRE ATT&CK 威胁验证
          type: step
      edges:
        - from: n1
          to: n2
          label: 范围获批；分配渗透测试人员
        - from: n2
          to: n3
          label: 实时提交发现项
        - from: n3
          to: n4
          label: 高危 / 严重发现项立即触发工单
        - from: n4
          to: n5
          label: 修复后的发现项提交验证
        - from: n5
          to: n2
          label: 未关闭发现项需要额外评估周期
        - from: n5
          to: n6
          label: 成熟客户转向订阅式覆盖
    claimRefs:
      - CE002
      - CE004
      - CE013
      - CE016
      - CE037
      - CE040
