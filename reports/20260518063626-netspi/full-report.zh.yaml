  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与垂直覆盖
        blocks:
          - type: paragraph
            body: >
              截至 2024 年 12 月，NetSPI 拥有 1,942 家客户，覆盖金融服务、医疗健康、云基础设施、科技、零售、政府和保险等垂直行业，分布在 37 个国家。金融服务是最深的锚点：NetSPI 称已进入美国
              10 大银行中的 9 家，这一渗透率意味着多年机构采购周期和监管合规驱动（DORA、FFIEC、OCC guidance）会形成结构性续约压力。[CU001] [CU006]

              医疗健康是第二大支柱。NetSPI 称客户包括美国最大 5 家医疗健康公司中的 4 家，并在客户故事页面发布了 Medtronic、HumanGood 等具名案例。医疗健康客户承担 HIPAA
              义务，也面临对医疗设备安全更严格的监管审查，进一步放大渗透测试需求。[CU008] [CU013] [CU017]

              云基础设施客户（前 5 大云提供商中的 4 家）以及包括三家 FAANG/MAMAA 公司在内的科技公司（Microsoft 被明确点名），说明 NetSPI
              同时服务云平台供应商和在这些平台上跑工作负载的企业。[CU007] [CU010] [CU011] 零售渗透率（美国前 10 大零售商中的 7 家）又把 PCI DSS
              合规变成另一项结构性续约驱动。[CU009]

              政府和国防垂直由 US Air Force 代表。SecureLink（Dubai）合作服务 Middle East and Africa 地区，以及 37 个国家的地理覆盖，说明公司在国际扩张。[CU012]
              [CU023] 各细分市场的买方画像主要由 CISO 牵头，安全工程团队参与平台部署；保险合作伙伴 Chubb 则代表一种「付款方不是使用方」的模式，NetSPI 的发现项直接进入理赔承保判断。[CU014]
