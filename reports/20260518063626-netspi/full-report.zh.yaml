      - number: '6.4'
        title: 留存、NRR 与客户耐久性
        blocks:
          - type: paragraph
            body: >
              NetSPI
              不公开披露净留存率（NRR）、总留存率（GRR）、平均合同长度或队列层面的流失率。这些指标构成本章最主要的证据缺口。缺少这些数据，就无法直接判断客户基础是在扩张价值、收缩，还是以会损害增长叙事的速度流失。[CU031]

              来自具名客户证据的间接耐久性信号为正，但范围很窄。HumanGood 每年渗透测试的模式至少意味着一个续约周期。Medtronic「我们自己团队的延伸」的表述暗示深度集成，会提高切换成本。EAB Global
              的运营指标（「15 秒实现攻击面改善」）暗示平台依赖。Everywhen 把 NetSPI 描述为「你内部团队不可或缺的一部分」，意味着组织嵌入。[CU013] [CU015] [CU017] [CU022]

              金融服务（FFIEC、DORA）、医疗健康（HIPAA）、零售（PCI
              DSS）和政府客户的合规驱动采购环境，是一种结构性留存机制：年度合规鉴证周期会创造经常性采购场景，不完全取决于满意度驱动的流失。[CU006] [CU008] [CU009]

              Pentera 的自动化平台路径带来替代风险：Pentera 声称自动化可将第三方渗透测试成本降低 60%，可能把成本敏感型客户——尤其是 SMB 层级和标准化工作负载——从 NetSPI
              的服务模型中吸走。NetSPI 的平台定位（PTaaS 加入侵与攻击模拟、攻击面管理）有别于纯自动化，但竞争压力仍是实质性留存因素。[CU034]

              估算队列数据（FU004）仅作示意，基于企业安全服务行业基准，而非 NetSPI 披露数据。形成留存判断前，必须在数据室要求按细分市场（enterprise、mid-market、SMB）提供
              NRR、按年份队列的留存、以及平均合同价值。[CU031]
