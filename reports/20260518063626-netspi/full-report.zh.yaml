          - type: paragraph
            body: >
              评估 NetSPI 可触达机会，需要三层嵌套视角，而不是一个自上而下的单一估算。最宽的一层是全球网络安全市场；Bloomberg Intelligence 报告称该市场年规模超过
              $200B，构成攻击性安全切分份额的总生态。第二层是更具体的渗透测试和主动安全市场：多家分析机构和新闻来源估计，全球渗透测试市场 2023 年约 $1.7B，到 2030 年约 $3.8B，对应 11–14%
              左右的复合年增长率。PTaaS——即服务由平台承载且持续交付，而非一次性项目——在这个总体数字内增速快于传统渗透测试项目。若纳入 EASM 和 BAS 相邻领域，主动攻击性安全服务的可服务市场（SAM）估计为全球
              $4–8B；但由于没有单一分析机构以一致范围定义发布 PTaaS + EASM + BAS 的合并市场规模，这一区间存在显著方法论不确定性。

              NetSPI 自身轨迹提供了自下而上的交叉校验。公司披露 2023 年收入增长约 42%，达到估算 $111M，并在 2024 年继续双位数增长，意味着收入为 $130–145M。即便按 SAM
              区间低端（$4B）计算，NetSPI 2024 年 SOM 也约占 PTaaS 市场 3.3–3.6%。KKR 2022 年以隐含估值 $700M–$1.5B 投入 $410M 成长资金，明确关联到
              Bloomberg 对网络安全市场超过 $200B、仍在高增长的判断。TM002 保留了多个来源的规模估算和方法论说明；最低值（2023 年基数 $1.7B）与最高值（2030 年预测
              $3.8B）差距较大，反映的是 PTaaS 范围定义上的真实分歧，而非数据错误，这一不确定性会作为尽调缺口延续。
