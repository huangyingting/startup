      - number: '3.2'
        title: 竞争者画像
        blocks:
          - type: paragraph
            body: >
              Synack 采用经过筛选的众包模式，拥有 1,500+
              名安全研究员，在托管平台条件下完成渗透测试。公司最初服务美国政府和国防客户，之后扩展到企业科技、金融服务和医疗健康。其差异化在于平台管理的研究员工作流叠加安全情报层；关键限制则是缺少 EASM、CAASM 和
              BAS 能力，以及分布式研究员池天然存在的质量波动。


              Cobalt 借助 Cobalt Core 自由职业者社区开创 PTaaS，累计融资约 $100M，面向 SMB 和中型市场，主打快速交付测试。Bishop Fox 通过 Cosmos
              云原生平台提供持续攻击性安全，把 EASM 与人工主导的攻击测试结合起来——这是与 NetSPI 多能力路径最接近的结构性类比，但缺少 CAASM 集成，也没有同等宽度的平台。


              Rapid7（上市，RPID）和 Tenable（上市，TENB）是最突出的相邻既有厂商。Rapid7 的 InsightVM 和 Tenable 的 Nessus/Tenable.io
              是被动漏洞扫描器，识别已知 CVE，而不是模拟对抗性攻击链。两家公司的核心产品都不是 PTaaS 等价物，尽管它们有庞大的企业足迹。HackerOne 累计融资约 $140M，把其众包漏洞赏金生态定位为 CTEM
              兼容平台，并称 25% 的发现可执行。Pentera 在 Series C 时累计融资约 $150M，提供自动化渗透模拟，声称可降低 80% 风险，并把第三方测试支出降低 60%。传统精品公司（NCC
              Group、IOActive、Optiv）交付专家一次性测试，但缺少平台连续性或 SLA 保证。Bugcrowd 同样在众包漏洞发现和漏洞赏金项目管理中竞争。
