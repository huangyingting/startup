      - number: '4.4'
        title: 公开牵引指标
        blocks:
          - type: paragraph
            body: >
              NetSPI 通过每年新闻稿披露了 2021–2024 年的持续年度增长，这是财务估算的主要基础。2021 年，公司披露内生收入增长 51%，新增 319 家客户，净增 119 名员工。2022
              年，内生收入增长加速至 58%，新增客户超过 300 家，新增员工超过 230 名。2023 年，收入同比增长放缓至 42%——考虑到基数更大，仍然强劲——新增 logo 超过 400 个（新增 logo
              数量增长 30%+），员工数增长 26%。2024 年，NetSPI 称收入实现“双位数”增长，累计客户数达到 1,942 家，覆盖 37 个国家，执行 4,500+ 次评估，员工总数达到 650+ 人。按
              2021–2023 年披露增长率复合计算，估算收入约为 ~$50M（2021）、~$78M（2022）和 ~$111M（2023）。若对 2023 年收入套用保守双位数中位值，例如 20%，则 2024 年约为
              ~$133M；若套用 30% 中位值，则约为 ~$144M；因此 $130–145M 区间是 2024 年最佳公开估算。这些数字都不是审计收入；它们由分析师根据百分比披露套用到前推基数得出。2021–2023
              年约 41% 的 CAGR 明显跑赢 Rapid7 等上市网络安全同业，后者同期只实现个位数到低双位数增长。不过，增长率从 58% 到 42%，再到 2024
              年未具体披露的双位数，说明内生扩张正在正常化，尽管绝对收入仍在增长。NetSPI 未披露任何年度的 ARR、MRR、NRR、logo 流失、EBITDA 或毛利率。迄今识别 1.28 亿+
              漏洞是累计运营指标，不是财务 KPI，但它验证了交付运营规模。
