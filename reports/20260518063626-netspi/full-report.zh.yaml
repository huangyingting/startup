      - number: '8.4'
        title: 乐观、基准和悲观情景
        blocks:
          - type: paragraph
            body: >
              NetSPI 的乐观情景假设：公司能跑通 2026 年 5 月推出的 AI 驱动连续渗透测试战略，增速重新回到 25% 以上，并靠自动化杠杆改善单位经济。该情景下，ARR 超过 $140M，按 15x
              收入倍数计算，企业价值可达到 $2.0B 或更高。支撑乐观情景的信号包括：入选 Forrester PSP Landscape、2026 年 4 月并购姿态显示资产负债表有余力、受监管行业企业客户占比高，以及
              148 家合作伙伴渠道生态带来的分发杠杆。


              基准情景假设收入继续保持每年 15–20% 的两位数增长，估计 2024 年 ARR 为 $130–140M。作为逐步成熟的网络安全服务平台，毛利率未知但可能在 40–55%，按市场隐含 8x
              倍数计算，企业价值约为 $1.0–$1.1B。该情景要求客户留存不出现实质恶化、AI 自动化不冲击核心服务定价，且 KKR 在持有期内继续为增长型并购提供资金。


              悲观情景假设 AI 驱动的价格压缩加速，压低 PTaaS 市场增长，并把 NetSPI 可实现收入倍数压到 5x。悲观情景下，估计 $130–140M ARR 按 5x 计算，对应 $650–700M
              企业价值。如果 Pentera 或同类自动化平台在 24 个月内拿下企业渗透测试预算 15–25% 份额，或收入增速降到 10% 以下，该情景就会触发。


              按 $140M / 650 人计算，单名员工收入约 $215K，低于纯软件公司（$300K+），但高于普通专业服务公司；这符合 PTaaS 模型向更高自动化杠杆过渡的状态。2024 年员工数增长 30%
              以上，显示需求强劲，但也推高成本结构；如果没有自动化效率，利润率扩张会受限。
            claimRefs:
