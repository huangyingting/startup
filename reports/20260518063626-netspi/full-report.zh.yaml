        - 每年或每半年一次点状渗透测试；两次测试之间无法实时跟踪暴露面
        - PTaaS Resolve + EASM + BAS 统一平台；评估期间实时报告
        - 累计识别 128M 个漏洞；每年 4,500+ 次评估；发现实时可见，而非项目结束后才交付
        - 相比纯自动化工具价格更高；未公布评估响应时间 SLA
      - - 安全工程师跟踪关键渗透测试发现的修复
        - 手工用电子表格跟踪，或把 PDF 转成工单；修复状态可见性滞后
        - 集成 JIRA、ServiceNow 和 Slack；可从 Resolve 门户发现直接创建工单
        - 省掉手工建单；发现生成时即分配修复负责人
        - 集成深度取决于客户工单平台版本和 API 配置
      - - 红队评估防御控制对 MITRE ATT&CK 技术的有效性
        - 每年一次红队演练，报告周转需数周；没有持续覆盖
        - BAS 持续威胁验证，对齐 MITRE ATT&CK 框架
        - 相比点状红队，持续识别检测缺口；控制项按持续节奏验证，而非一年一次
