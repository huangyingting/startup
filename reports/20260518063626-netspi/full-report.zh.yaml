      - number: '6.6'
        title: 图表
        blocks:
          - type: callout
            title: 金融服务渗透很深，并有监管顺风
            body: >
              NetSPI 进入美国前 10 大银行中的 9 家，形成一个高价值、合规驱动的收入基础，并具备结构性续约机制。金融机构持续面对 FFIEC 检查要求、DORA 合规（EU）、OCC guidance 和
              SWIFT CSP 要求，这些都强制要求经常性渗透测试。监管顺风意味着金融服务垂直的客户留存，部分由强制合规周期推动，而不完全由满意度决定——即便没有披露 NRR
              数据，也降低了最具战略价值细分市场的流失风险。[CU001] [CU006]
            calloutType: strength
            claimRefs:
              - CU001
              - CU006
          - type: callout
            title: 缺少 NRR 和集中度数据——留存逻辑无法验证
            body: >
              NetSPI 披露客户数和新客户增长，但不披露留存指标（NRR、GRR、流失率或队列数据）。再加上头部客户收入集中度未披露，外部无法验证 1,942
              家客户基础是在扩张价值，还是底盘悄悄流失、被新客户掩盖了问题。金融服务集中度（美国前 10 大银行中的 9
              家）可能既代表组合中最高价值，也代表最高集中度风险——单家大型银行不续约就可能具有实质影响。[CU031] [CU006]
