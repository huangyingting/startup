      - number: '6.3'
        title: 具名客户证明与生产部署
        blocks:
          - type: paragraph
            body: >
              NetSPI 发布的具名客户证明至少覆盖 13
              个不同组织，横跨金融服务、医疗健康、政府、科技、SaaS、体育科技和福利导航。所有已识别的具名案例都描述为生产环境中的部署，并呈现经常性或多年合作模式；公开材料没有描述仅试点或仅概念验证的部署。

              Microsoft 是最突出的科技客户案例，曾让 NetSPI 负责 AI 安全测试，并公开称赞其「展现了倾听并适应新兴需求的能力」——这句前瞻性评价把 NetSPI
              定位为不断进化的合作伙伴，而不是商品化供应商。[CU011] [CU035] US Air Force 案例则锚定政府和关键基础设施细分市场。[CU012]

              医疗健康领域，Medtronic 的评价（「我们自己团队的延伸」）暗示深度运营集成，符合经常性合作特征。HumanGood 是非营利性养老居住运营商，每年聘请 NetSPI
              做渗透测试，体现出具备耐久性的重复采购模式。[CU013] [CU017]

              EAB Global 的结果指标——「15 秒内看到攻击面改善」——是公开客户组合中最具体的量化结果，指向 NetSPI 平台层的速度优势。[CU015] Chubb 的具名联系人（Craig
              Guiliano，网络情报官）提供了保险风险使用场景，NetSPI 发现项直接支持理赔评估。[CU014] Trimble（「把我们的网络安全成熟度带到新层级」）和 Quantum
              Health（消除了不必要支出）增加了跨行业宽度。[CU016] [CU020]

              SaaS 领域案例（Gong、Hudl）补齐了具名证明集合。Gong 提到平台集成和协作便利；Hudl 提到「可执行且有洞察的建议」。[CU018] [CU019] 所有具名案例共同的局限在于，它们都来自
              NetSPI 自有渠道（客户故事页、新闻稿、合作伙伴页），存在选择偏差：愿意出现在供应商网站上的客户，很可能偏向满意结果。截至研究日，没有发现 NetSPI 在独立评论平台（G2、Gartner Peer
              Insights、Capterra）上的证据。[CU036]
