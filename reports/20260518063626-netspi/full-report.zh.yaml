chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              NetSPI 是一家位于明尼苏达州明尼阿波利斯的网络安全公司，成立于 2001 年，专注于以企业级规模交付攻击性安全服务。公司的核心商业模式是渗透测试即服务（PTaaS），通过自研 Resolve
              平台交付，把连续自动化工作流与专家人工分析结合起来。不同于传统项目制咨询，NetSPI 的平台模式带来经常性收入和更持久的客户关系，使其区别于按工时和材料收费的安全咨询竞争者。


              在 PTaaS 之外，NetSPI 已把产品组合扩展到外部攻击面管理（EASM）、通过 Hubble Aurora 技术提供的网络资产攻击面管理（CAASM，2024 年 6
              月收购），以及攻击与入侵模拟（BAS）。这套组合让 NetSPI 成为主动安全平台，覆盖从资产发现到持续验证的完整攻击性安全生命周期，也与 Gartner 定义的持续威胁暴露管理（CTEM）框架一致。


              NetSPI 服务金融服务、医疗健康、零售和科技等行业的企业客户，包括美国前十大银行中的 9 家和全球前五大云服务商中的 4 家。公司总部在明尼阿波利斯，并在美国、加拿大、英国和印度设有办公室，服务遍及 37
              个国家。2026 年 5 月，NetSPI 推出 AI 驱动的 Continuous Pentesting，标志着其战略转向智能体安全自动化，并与 Pentera、Cobalt.io、Synack
              等纯自动化竞争者拉开差异。
