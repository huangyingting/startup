      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 投资建议：观察 / 继续研究
            body: >-
              NetSPI 值得主动跟踪，并且在投出任何资本前应正式请求数据室。公司的市场地位、KKR 背书和多年收入增长轨迹都是有吸引力的投资信号；但私营公司财务不透明——尤其是没有披露
              NRR、毛利率、客户集中度和股权结构瀑布——使其无法获得买入建议。应发起数据室请求，目标是 TV006 中六项缺失证据。收到 NRR（阈值：≥100%）、毛利率（阈值：≥45%）和客户集中度（阈值：前 10
              大客户 < 40% 收入）后，重新评估建议。如果三项都越过阈值，升至买入，基准情景企业价值为 $1.0–$1.1B。
            calloutType: recommendation
            claimRefs:
              - CV027
              - CV028
              - CV016
              - CV003
          - type: callout
            title: 估值不透明与基准缺口
            body: >-
              NetSPI 最大的估值风险不是竞争或市场风险，而是信息风险。2022 年 10 月 KKR 的 $410M 融资是最后一次接近估值的事件，此后没有披露经审计财务、S-1
              申报、老股交易或公开估值标记。Bloomberg 和 Star Tribune 均明确确认估值未披露。这种不透明造成了基准缺口：任何外部企业价值估计都带有 ±30–40%
              的置信区间；没有一手数据室访问，区间无法收窄。在估计基准情景 EV 为 $1.0–$1.1B 时，35% 的不确定性带覆盖
              $650M–$1.5B——同时包含悲观和乐观情景。该风险无法靠公开研究管理；它需要有管理层访问权限的正式尽职调查。
            calloutType: risk
            claimRefs:
              - CV008
              - CV009
              - CV010
              - CV027
