  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              NetSPI 的收入来自四条主要订阅流，外加项目制服务。旗舰产品是渗透测试即服务（PTaaS），通过 Resolve 平台交付；客户订阅持续保留式安排，获得渗透测试人员工时和 Resolve
              仪表盘的持续访问权。这一订阅模式替代传统逐项目合作结构，提高收入可预测性，也降低客户流失摩擦。第二条收入流是外部攻击面管理（EASM），一种持续绘制和监控客户对外暴露数字资产的 SaaS 订阅。第三条由 2024
              年 6 月收购 Hubble Technology 引入，即网络资产攻击面管理（CAASM），品牌为 Hubble
              Aurora，按组织订阅提供内部资产盘点和卫生状态监控。第四条是攻击与入侵模拟（BAS），同样以订阅方式销售。订阅之外，若客户需要离散评估而非保留式安排，项目制渗透测试仍可购买。订阅安排采用按期确认模型——在合同期内确认收入；项目则在交付里程碑时确认。作为私营公司，NetSPI
              未披露经常性收入与项目制收入的绝对拆分、ARR 或合同期限；这些构成收入质量尽调的主要缺口。NetSPI 未公开披露定价模型，公司网站也没有标价。企业合同直接谈判，定价很可能随范围、团队规模和订阅档位而变化。
