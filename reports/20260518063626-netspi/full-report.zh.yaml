      - number: '6.5'
        title: 扩张、渠道合作伙伴与集中度风险
        blocks:
          - type: paragraph
            body: >
              到 2024 年末，NetSPI 的渠道合作伙伴生态达到 148 家，当年新增 57 家，伙伴数量单年扩张 63%。2023 年，渠道来源收入同比增长 31%，说明渠道正在带来有意义的增量客户获取。[CU024]
              [CU025]

              具名合作伙伴包括分销（Ingram Micro）、增值转售商（VLCM、Defy、Softcat）、云市场（AWS ISV Accelerate Program）和区域专家（面向 MEA 的
              SecureLink）。[CU026] [CU027] [CU028] [CU029] [CU030] Chubb 合作代表一种付款方模型扩张：保险公司把 NetSPI
              发现项嵌入理赔评估，这是一个非传统渠道，可能不依赖直销人头而独立放大。[CU014] MSSP 合作伙伴 Nuspire（CEO
              背书）则显示服务商主导转售，成为进入那些太小或太分散、直销难以覆盖账户的另一条扩张路径。[CU021]

              现有客户基础内的先落地再扩张机制，可以从平台结构（攻击面管理、入侵与攻击模拟、云安全测试作为模块化增购）以及 1,942 家客户上的 4,500+ 次评估量中看出，这暗示多次合作关系。[CU001]
              [CU002] [CU038]

              集中度风险是重要未知数。NetSPI 不披露最大客户收入占比。考虑到金融服务细分包含美国 10 大银行中的 9 家——每家都可能代表可观合同——头部客户集中度可能很高。[CU006] 如果任何一家前 10
              大银行贡献超过 5% ARR，不续约就会造成可见收入事件。政府和大型医疗健康账户也有同样风险。评估这一风险，必须在数据室要求前 10 和前 20 大客户收入集中度。[CU039]
