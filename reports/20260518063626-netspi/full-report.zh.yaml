      - number: '8.5'
        title: 退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >
              KKR 的投资逻辑和典型 5–7 年持有期意味着退出窗口从 2026 年开始，延续到 2029 年。截至 2026 年 5 月，公开资料中没有发现 IPO 申报、SPAC
              标的传闻或已确认的并购出售流程。NetSPI 2026 年 4 月仍在主动并购，说明 KKR 还在投入增长，而不是推进近期退出。NetSPI 没有 SEC 公开文件，确认其仍为私营公司。没有 IPO
              信号、并购仍在进行、增长保持强劲两位数，这几项合在一起，指向 2027–2029 年退出比近期交易更可能。


              退出准备度信号并不一致。正面信号包括：高管团队完整，CFO Jay Golonka 拥有 25 年以上经验；获得 Forrester 分析师认可；董事会包括 Tenable 董事 Niloo Razi
              Howe；客户基础广，达到 1,942 家。负面信号包括：没有任何公开文件披露经审计财务、NRR/GRR 未披露、毛利率未披露，也没有公布 EBITDA 或自由现金流指标——这些都是 IPO 前标准披露要求。


              监管环境支撑需求继续增长：NIST CSF 合规、CISA 国家级威胁提示、CREST 认证和 ISO 27001 要求，都创造了结构性复购场景。CREST 认证在欧洲和英国市场提供采购差异化。ISO 27001
              认证要求推动全球企业客户形成年度渗透测试需求。


              任何投资定价前，五个关键尽调阻断项必须解决：NRR（核心留存信号）、毛利率（盈利能力上限）、客户集中度（前 10 大客户收入占比）、KKR 优先权结构（稀释和瀑布模型），以及 AI
              平台竞争胜率。缺少这些数据点，任何估值都只能是区间估计，且不确定性带很宽。
            claimRefs:
