              Aaron Shilts 自 2017 年起担任 CEO，是 NetSPI 的 KKR 投资关系、外部增长叙事和 M&A 执行记录中最重要的个人。作为没有 SEC 申报义务的私营公司，NetSPI
              没有公开继任计划，没有披露雇佣协议，也没有可供审查的独立董事会治理章程。2026–2028 年 KKR
              退出窗口期间，无论自愿还是非自愿，任何领导层交接都会在公司历史上最关键的运营节点制造重大不确定性。公开证据没有缓释这一风险，需要在尽调中专门关注。[CR006] [CR031]
