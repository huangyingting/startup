      - number: '1.3'
        title: 融资与所有权结构
        blocks:
          - type: paragraph
            body: >
              NetSPI 在 2017 年获得 Sunstone Partners 首笔机构投资前，约 16
              年一直以自举且盈利的方式经营。这个漫长的机构化前阶段在网络安全服务市场并不常见，说明其运营模式具备持久的现金生成能力。


              2021 年起，外部融资明显提速。2021 年 5 月，KKR 和 Ten Eleven Ventures 共同领投 $90M 成长股权轮。2022 年 10 月，KKR 领投 $410M
              成长轮——这是当年规模最大的网络安全投资轮次之一——并成为多数股东，Sunstone Partners 完全退出。已披露累计融资超过 $500M，全部来自 KKR 和 Ten Eleven Ventures。


              公司尚未推进 IPO，也未披露公开估值。KKR 以多数所有权投入 $410M，意味着企业价值可观；但在条款和审计财务缺失的情况下，无法从公开资料精确推导倍数。2026 年 4 月，据报道 NetSPI 正在寻求
              $80M 或以上的收购，说明其仍有投资意愿，且很可能由 KKR 继续提供资本支持。债务和信贷额度未公开披露，是尽调中的重要信息缺口。
