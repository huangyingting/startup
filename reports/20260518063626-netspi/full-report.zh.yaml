  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              NetSPI
              直接相关的市场不是整个网络安全技术栈。公司竞争的场域是主动攻击性安全：安全行业中模拟攻击者行为，在真实攻击者之前发现可利用弱点的细分领域。这个市场由三类交付形态定义：渗透测试即服务（PTaaS），把人工专家和持续自动化结合起来；外部攻击面管理（EASM），持续盘点所有面向互联网的资产并给出风险评分；攻击与入侵模拟（BAS），用已知攻击技术验证安全控制。这三类被纳入可服务市场，是因为它们对应同一买方（CISO
              / 安全副总裁）、同一预算科目（攻击性安全或红队），也采用同一采购动作（通过 IT 安全采购授予年度合同或保留式合同）。

              核心市场边界不包括被动漏洞管理平台（Rapid7 InsightVM、Tenable.io）、终端检测与响应（EDR）、SIEM
              平台和云工作负载保护。这些工具相邻——共享合规驱动因素，也有部分买方重叠——但它们不交付对抗性验证，而这正是 NetSPI
              服务的定义性特征。主要现状替代方案包括：交付一次性项目的精品渗透测试公司；把渗透测试打包进更广泛咨询项目的 Big Four
              安全咨询业务（Deloitte、PwC、KPMG、EY）；在内部复制对抗性测试的企业自建红队；用研究员社区发现漏洞的众包平台（HackerOne、Bugcrowd）；以及不依赖人工测试员、模拟攻击的自动化 BAS
              工具（Pentera）。Forrester 2023 年 Q1 EASM Landscape 记录了 36 家重要供应商，2026 年 Q1 Proactive Security Platforms
              Landscape 记录了 42 家，确认了市场的广度和碎片化。
