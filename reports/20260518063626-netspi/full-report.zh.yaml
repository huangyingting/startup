      - number: '7.3'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              NetSPI 的监管风险画像主要是机会风险（监管创造强制渗透测试需求），但也同时带来交付模型和内部运营层面的合规负担风险。当前最重要的监管发展是 DORA、NIS2 和 SEC 网络安全披露规则。


              EU Digital Operational Resilience Act（DORA）于 2025 年 1 月 17 日全面生效，要求在 EU 运营的金融实体定期开展 ICT
              风险评估和威胁主导渗透测试（TLPT）。NetSPI 已进入美国前十大银行中的九家，这些银行及其他在欧洲运营的金融客户会因 DORA 产生先进渗透测试服务的强制采购触发点——但 DORA
              也设置了具体交付和报告标准，NetSPI 必须满足这些标准才能获得 TLPT 项目资格。TIBER-EU（ECB 的基于威胁情报的红队方法论）是基准；NetSPI 必须向欧洲金融行业客户证明与 TIBER-EU
              对齐。[CR022] [CR033]


              NIS2（EU Network and Information Security Directive 2）于 2024 年 10
              月转化为成员国法律，扩大了受网络安全要求约束的关键基础设施行业范围，纳入能源、交通、医疗健康、数字基础设施和制造业。对 NetSPI 的欧洲客户基础而言，NIS2 创造了新的强制安全评估义务。不过，NIS2
              合规也要求 NetSPI 为自身平台和交付模型维持足够控制——这是一项供应商安全要求，会带来内部合规成本。[CR023]


              SEC 网络安全披露规则（2023 年 12 月生效）要求美国上市公司在四个工作日内披露重大网络安全事件，并在年报中纳入网络安全风险管理策略。披露风险由 NetSPI 客户承担，但规则创造了拉动需求：上市公司
              CISO 承受董事会层面的审视，必须证明安全测试足够严谨。这些规则也制造了一种场景：如果 NetSPI 客户在测试后遭遇入侵，就更有动力复盘测试项目，从而给 NetSPI 带来尾部责任暴露。[CR024]


              CREST（Council of Registered Ethical Security Testers）认证是 NetSPI 许多企业和政府客户的准入门槛。一旦失去 CREST 认证，NetSPI
              将被排除在可服务市场的相当部分之外。ISO/IEC 27001:2022 标准约束 NetSPI 的内部信息安全管理体系；如果运营或交付实践偏离书面控制，就会产生认证续期风险。[CR027] [CR028]


              FCC 路由器安全要求和 CCPA/GDPR 数据处理义务，为一家经常处理敏感客户基础设施数据的公司增加了合规复杂度。[CR033] [CR034]


              合作伙伴和依赖风险登记表（TR003）把包括监管框架在内的第三方依赖列为关键依赖。关键依赖图（FR003）展示了监管框架和外部依赖如何相互作用。
