  - id: TM001
    title: 市场定义表
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 主要买方 / 付款方
      - NetSPI 意义
    rows:
      - - 渗透测试即服务（PTaaS）
        - 人工主导的对抗模拟、连续服务合约项目、红队即服务、AI 增强测试工作流
        - 被动漏洞扫描、仅由智能体执行的自动化扫描、EDR、SIEM、没有对抗测试的合规审计
        - 企业组织的 CISO / 安全副总裁；通过 IT 安全预算采购
        - 核心收入引擎；NetSPI 的 PTaaS 平台是主要差异化来源，也是估计 $130–145M 2024 年收入的最大贡献项
      - - 外部攻击面管理（EASM）
        - 持续发现并风险评分互联网暴露资产，检测影子 IT，监控证书和域名，确定暴露优先级
        - 内部网络扫描工具（非互联网暴露）、CNAPP 运行时保护、缺少暴露上下文的被动漏洞管理（VM）
        - CISO / 安全运营负责人；IT 安全和云安全团队
        - 高速增长的相邻市场，提升 NetSPI 平台粘性，并支撑 Gartner 所描述的 CTEM 框架采纳趋势
      - - 入侵和攻击模拟（BAS）
        - 自动化控制验证、对手模拟框架（基于 MITRE ATT&CK）、紫队演练、检测有效性测试
        - EDR 端点检测、网络监控、缺少对抗模拟组件的 SIEM 关联分析
        - CISO 和 SOC 总监；通常来自检测与响应预算
        - PTaaS 的新兴相邻市场；Pentera 在此竞争，并声称相较手工渗透测试可降低 60% 成本——直接约束 NetSPI 定价
      - - 传统时点型渗透测试
        - 年度或半年度项目制渗透测试、合规强制评估（PCI-DSS、SOC 2、HIPAA）、精品咨询项目
        - 连续覆盖模型、平台化服务合约、EASM、BAS
        - CISO；采购通常由合规官或 GRC 团队推动
        - PTaaS 正在替代的现状方案；四大会计咨询和精品公司（Bishop Fox）在该细分竞争
      - - 相邻漏洞管理（VM）
        - 基于代理的扫描、VM SaaS 平台、云风险评分、容器镜像扫描
        - 主动对抗模拟、人工主导的红队、超出扫描器输出的可利用性验证
        - 安全工程团队；IT 安全副总裁；DevSecOps 团队
        - 相邻市场（Rapid7、Tenable）；不计入 NetSPI 的 SAM，但如果 VM 供应商延伸到主动测试，可能带来替代风险
    notes: 市场边界基于 NetSPI 平台能力（PTaaS、EASM、BAS）和公开可得的竞争对手产品描述定义。支出类别为示意；没有单一分析师报告以一致范围覆盖 PTaaS + EASM + BAS。
