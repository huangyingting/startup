      - number: '2.3'
        title: 买方与细分市场图谱
        blocks:
          - type: paragraph
            body: >
              渗透测试和主动安全服务的主要买方，是企业和较大中型市场组织的首席信息安全官（CISO）或安全副总裁。预算几乎都归在 IT 安全预算科目下，并向 CISO 或 CTO 汇报。终端用户是内部红队、SOC
              分析师和安全工程师，他们会根据测试发现采取行动。采购通常经过集中式 IT 或安全采购流程；对 NetSPI
              这类战略供应商，往往采用多年期保留式结构。采用触发因素集中在四种反复出现的模式：PCI-DSS、HIPAA、SOC 2、FedRAMP 等合规要求要求定期或持续测试；M&A
              尽调要求对标的组织开展安全评估；事件后的补救需要组织在入侵后识别根因并修补缺口；以及行业高知名度事件之后，董事会层面下达安全要求。

              受监管行业主导采用。NetSPI 已验证的客户基础——包括美国前十大银行中的 9 家、前五大云服务商中的 4 家、前五大医疗健康公司中的 4
              家——确认金融服务、医疗健康和云基础设施构成主要客户集中区。政府和联邦机构是增长中的相邻细分市场，受 FedRAMP 和 CMMC 要求驱动。中型市场企业是次级细分市场，在这里 PTaaS
              经济性最有吸引力：以低于精品公司的单次项目成本，获得持续覆盖。Cobalt 和 Synack 公开定位的买方画像——科技、金融服务和医疗健康公司的企业安全团队——从竞争侧验证了这张买方图谱。Bishop Fox
              和 Pentera 覆盖重叠细分市场，但强调不同画像：Pentera 更偏向希望降低人工测试成本的自动化优先买方；Bishop Fox 则面向有复杂持续测试需求的大型企业，与 NetSPI 核心市场相似。
