      - number: '5.2'
        title: 核心产品模块：PTaaS、EASM、CAASM 和 BAS
        blocks:
          - type: paragraph
            body: >-
              PTaaS（品牌为 Resolve 平台）是 NetSPI 的旗舰产品，调动 350+ 名内部渗透测试人员，覆盖 50+
              种服务类型。服务类别包括应用安全（web、API、移动端、厚客户端、H-DAP）、云安全（AWS、Azure、GCP）、硬件、网络、大型机，以及 AI/ML 安全评估。仅 2024 年，NetSPI 就完成
              4,500+ 次评估，识别出 1.28 亿个漏洞总量，并在 2023 年发现 17,000+ 个严重问题。渗透测试人员持有 OSCP、OSCE、GXPN、GPEN、GWAPT、CISSP、CEH、CREST
              等认证，使 NetSPI 成为高端、人工专家主导的供应商。Resolve 门户提供实时协同报告，客户可以在发现项出现时查看，而不必等最终报告交付。

              EASM 于 2024 年 12 月重新发布，设置三个商业层级：Lite（自动化资产发现）、Standard（再加专家验证）和 Plus（再加持续外部渗透测试）。EASM
              功能包括每周资产发现、云配置审查、暗网监控和域名监控。

              CAASM 来自 2024 年 6 月收购 Hubble 后引入的 Aurora 平台。Aurora 通过知识图谱提供无代理内部资产可见性，把内部资产上下文补到 EASM 的外部视图旁，形成统一的暴露管理工作流。

              BAS（Breach and Attack Simulation）在 2023 年获得「BAS Solution of the Year」奖，并提供与 MITRE ATT&CK
              框架对齐的持续威胁验证。该模块持续测试侦测控制，找出周期性渗透测试之间的防御缺口。
