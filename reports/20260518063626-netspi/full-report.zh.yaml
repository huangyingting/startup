      - number: '1.2'
        title: 领导团队与治理
        blocks:
          - type: paragraph
            body: >
              NetSPI 的高管团队兼具深厚的攻击性安全经验、企业软件经验和金融服务领导力。CEO Aaron Shilts 于 2017 年随 Sunstone Partners
              的首笔机构投资加入，把这家自举起家的公司转成成长期平台型业务。Shilts 对 KKR 持续投资关系和对外定位都居于核心，因此形成显著关键人物风险。


              2021 年 KKR 投资之后，公司大幅补强了更广泛的领导层。CTO Tom Parker（曾任 Accenture Security CTO，也是被收购的 Hubble Technology
              创始人）负责产品与技术愿景。CPO Vinay Anand（曾任 Palo Alto Networks Prisma Cloud 产品副总裁）、CFO Jay Golonka（曾任 Prometheus
              Group CFO，拥有 25+ 年经验）、COO Charles Horton，以及 CISO Norman Kromberg（拥有 30+ 年安全运营经验，曾任职 SouthernCarlson 和
              Optum）共同提供深厚职能领导力。Tom Parker 兼具前 Hubble 创始人和现任 CTO 双重身份，使产品和 AI 战略上也存在第二个关键人物集中点。


              董事会既反映 KKR 的治理要求，也具备网络安全战略深度。Scott Lundgren（VMware Carbon Black CTO）、John Spiliotis（KKR 关联人士，曾任 Palo Alto
              Networks 销售高级副总裁）和 Niloo Razi Howe（曾任 RSA 与 Endgame CSO、CISA 咨询委员会成员，Tenable 和 Recorded Future
              董事）提供安全专业监督。这样的董事会结构符合 KKR 投资组合公司为未来潜在退出或上市做准备的特征。
