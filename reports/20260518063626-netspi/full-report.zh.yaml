  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              企业买方采购对抗性安全测试时，会在五类替代方案中评估 NetSPI。第一类也是最直接的一类，是 PTaaS 平台：Synack、Cobalt 和 Bishop Fox
              都交付渗透测试即服务，但交付模式不同。Synack 和 Cobalt 依赖经过筛选的众包研究员社区；Bishop Fox 则把内部攻击性安全团队与 Cosmos 持续 EASM
              平台结合起来。第二类是众包发现平台：HackerOne 和 Bugcrowd 起初是漏洞赏金项目，之后扩展到托管 PTaaS，并把研究员社区包装成持续威胁暴露管理（CTEM）解决方案。


              第三类是自动化 BAS 和暴露验证：Pentera 交付全自动渗透模拟，声称可将第三方测试成本降低 60%，在成本敏感的企业细分中构成直接预算替代威胁。第四类是 VM
              既有厂商：Rapid7（InsightVM，ARR 约 $700M）和 Tenable（Nessus/Tenable.io，ARR 约
              $900M）是大型上市公司，其被动漏洞管理平台与主动测试相邻，但核心服务不交付对抗性模拟。两家公司都拥有大型企业安装基础，可作为主动测试产品延伸的起跳点。第五类是现状方案：传统精品渗透测试公司（NCC
              Group、IOActive、Optiv）和企业内部红队，它们交付一次性项目，但缺少平台连续性或托管工具。


              Forrester 2026 年 Q1 Proactive Security Platforms Landscape 将 NetSPI 列入 42 家供应商之一，确认了该市场的竞争密度和碎片化。
