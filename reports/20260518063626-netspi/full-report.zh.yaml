      - number: '5.4'
        title: 信任、合规与安全质量控制
        blocks:
          - type: paragraph
            body: >-
              NetSPI 在公开信任页面上列出 SOC 2 Type II、GDPR、CCPA、Cyber Essentials Plus 和 CREST 认证，记录了其信任姿态。CREST
              是渗透测试机构的国际认证机构，验证 NetSPI 在各类评估服务中的技术能力、方法标准和伦理规范。个人层面，渗透测试人员持有 OSCP、OSCE、GXPN、GPEN、GWAPT、CISSP、CEH、CREST
              等认证，进一步提供质量保证。

              NetSPI 平台由 AWS 基础设施托底，云原生可靠性和可扩展性支撑全球客户部署。NetSPI 的评估工作与 NIST Cybersecurity Framework 2.0 对齐，客户可以把发现项映射到
              Identify、Protect、Detect、Respond、Recover 五个功能，用于合规报告。

              这里有一个实质性尽调缺口：研究期间没有找到可公开访问的 SOC 2 Type II 鉴证报告。金融服务、医疗健康和政府等受监管买家通常需要完整鉴证文件才能批准供应商采购，而不只是认证声明。Cyber
              Essentials Plus 认证适用于英国实体，并不是全球认可的信息安全标准。截至研究时，ISO 27001 认证也未被确认，这给需要 ISO 对齐第三方验证的企业买家留下另一个缺口。
