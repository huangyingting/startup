  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: NetSPI 平台架构与 CTEM 集成
        blocks:
          - type: paragraph
            body: >-
              2024 年，NetSPI
              上线统一平台门户，把四个核心模块——渗透测试即服务（PTaaS/Resolve）、外部攻击面管理（EASM）、网络资产攻击面管理（CAASM）和入侵与攻击模拟（BAS）——收进同一个客户界面。统一之后，NetSPI
              进入持续威胁暴露管理（CTEM）框架，客户可以从周期性评估转向覆盖整个攻击面的持续安全验证。

              平台跑在 AWS 基础设施上，后端容量可扩展，既支撑人工主导的评估流程，也承载自研 NetSPI AI 加速层。面向客户的 JIRA、ServiceNow、Slack
              集成，让修复跟踪直接进入既有安全运营工具链，省掉从 PDF 报告手工建票的摩擦。实时报告让安全团队在评估仍在进行时就能排序并修复发现项，而不是等最终交付件。

              Forrester Proactive Security Platforms Landscape Q1 2026 将 NetSPI 列入 42 家值得关注的厂商，验证了它在主动安全赛道的定位。更早的
              Forrester External Attack Surface Management Landscape Q1 2023 收录，则确认了 NetSPI 在 EASM 市场的存在感。平台的信任层由 SOC 2
              Type II、CREST、GDPR、CCPA 和 Cyber Essentials Plus 认证托底，支撑有不同监管要求的全球企业买家。
