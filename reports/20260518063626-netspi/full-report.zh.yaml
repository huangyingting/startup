      - number: '7.2'
        title: 运营、人才与交付风险
        blocks:
          - type: paragraph
            body: >
              全球进攻性安全人才稀缺，对任何人工主导的渗透测试业务都是结构性约束。NetSPI CEO Aaron Shilts 曾公开表示，人才可得性是进攻性安全行业面临的「最大问题之一」。截至 2024 年，NetSPI
              拥有 350+ 名内部渗透测试人员，需要在一个需求紧张的劳动力市场持续招聘；金融机构、科技公司和政府机构都在与专业安全公司直接争抢人才。如果增长加速而人才供给跟不上，就会产生交付质量风险。[CR004]
              [CR005] [CR040]


              关键人风险集中在三个层面。CEO 层面，Aaron Shilts 自 2017 年起领导 NetSPI，是 KKR 投资关系的核心人物，也代表公司面向外部的主要增长叙事。他离任会给 KKR
              持续投资逻辑和客户关系带来重大不确定性。产品和技术层面，CTO Tom Parker 是双重关键人风险：他既领导平台路线图，又是被收购 Hubble 技术的创始人——也就是说，他离任可能同时损害平台开发和
              Hubble 集成逻辑。CISO Norman Kromberg（30+ 年经验，曾任 Optum）则让安全运营领导力进一步集中。[CR006] [CR007] [CR008] [CR041]


              整合风险已经累积四年。NetSPI 完成了三笔收购：Silent Break Security（约 2020 年，补强进攻性安全咨询深度）、nVisium（2021 年，带来渗透测试人才和方法论）以及
              Hubble Technology（2024 年 6 月，带来 CAASM/攻击面管理平台）。每笔收购都有整合复杂度：人员留存、文化对齐、产品路线图整合和客户关系迁移。Hubble
              是最近的一笔收购，也是当前最高的整合风险——CAASM 和 Aurora 产品线必须完全并入 Resolve 平台，同时被收购团队（包括出任 CTO 的 Tom Parker）还在被吸收。[CR014]
              [CR015] [CR016] [CR017]


              随着 NetSPI 迈向 $150M+ 收入和 4,500+ 次年度评估，规模化交付质量风险成为结构性问题。当渗透测试人员产能增长落后于客户增长、收购后团队沿用不一致的方法论，或 AI
              辅助工作流引入误报或漏掉漏洞时，SLA 违约风险都会上升。NetSPI 的价值主张是专家主导的深度；一旦高知名度客户发生质量事故，声誉风险是不对称的。[CR041]


              风险传导图（FR002）展示了人才流失、关键人离任和交付质量失败如何层层传导，经由收入下滑走向估值压缩。
