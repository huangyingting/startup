      - - 企业在生产部署前评估 AI/LLM 系统安全
        - 缺少标准化方法；由通用渗透测试人员临时做安全审查
        - AI/ML Pentesting、LLM Benchmarking 和 Jailbreaking 服务（2023/2024）
        - 率先推出 LLM 安全方法论；覆盖越狱、提示注入、数据抽取攻击和对抗鲁棒性
        - AI/ML 渗透测试方法论尚未公开标准化；监管尚无 AI 安全评估结果采信框架
