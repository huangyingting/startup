  - id: FM003
    title: 买方细分 vs. 决策标准矩阵
    type: matrix
    layout: wide
    summary: 受强制合规驱动的行业——银行和医疗——给 NetSPI 带来最可预测的采用路径；云 / 科技买方价值高，但更可能考虑自动化替代；中端市场可触达，却对利润率更敏感。
    data:
      columns:
        - 合规驱动
        - 安全主导（风险）
        - 事件后恢复
        - 成本敏感度
      rows:
        - label: Fortune 500 金融服务
          values:
            - label: 高
              tone: positive
              detail: PCI-DSS v4、DORA、SEC 披露规则带来经常性、非可选的测试要求。
            - label: 高
              tone: positive
              detail: 高知名度银行泄露事件后，董事会层面的风险审视推动主动投资。
            - label: 中
              tone: neutral
              detail: 事件后修复会触发采用，但不是一线银行的主要驱动。
            - label: 低
              tone: positive
              detail: 考虑到监管风险，买方接受溢价定价；价格次于深度和合规覆盖。
        - label: 大型医疗 / 生命科学
          values:
            - label: 高
              tone: positive
              detail: HIPAA 要求受监管实体和业务伙伴每年做渗透测试。
            - label: 中
              tone: neutral
              detail: EHR 泄露风险很高，但安全投入仍落后于金融服务成熟度。
            - label: 高
              tone: warning
              detail: 行业标志性泄露事件之后，医疗机构经常采用新服务。
            - label: 中
              tone: neutral
              detail: 预算敏感度中等；大型医疗系统能消化溢价定价，中型机构难以承受。
        - label: 云基础设施 / 科技
          values:
            - label: 中
              tone: neutral
              detail: SOC 2 和 ISO 27001 是常见触发因素；FedRAMP 授权为云服务商增加强合规拉力。
            - label: 高
              tone: positive
              detail: 产品安全风险是品牌信任的核心；API 和 AI 表面测试需求正在快速增长。
            - label: 低
              tone: neutral
              detail: 科技公司通常有内部安全团队，对外部事件的反应性较低。
            - label: 高
              tone: warning
              detail: 这里的自动化替代风险最高；成熟买方会评估 Pentera 和内部红队等替代方案。
        - label: 政府 / 联邦机构
          values:
            - label: 高
              tone: positive
              detail: FedRAMP、FISMA、CMMC 形成强制测试周期；监管时钟不可协商。
            - label: 中
              tone: neutral
              detail: 安全成熟度差异很大；大型机构比小型 SLED 买方更成熟。
            - label: 中
              tone: neutral
              detail: 政府在事件后采购可能较慢，但事件会带来持久的项目扩张。
            - label: 中
              tone: neutral
              detail: 政府定价受合同约束；GSA 采购目录和 IDIQ 合同工具限制灵活性。
        - label: 中端企业
          values:
            - label: 高
              tone: positive
              detail: SOC 2、ISO 27001 和网络保险要求驱动首次购买渗透测试。
            - label: 低
              tone: warning
              detail: 安全成熟度往往较低；如果没有合规触发，安全主导的主动投资很少见。
            - label: 中
              tone: neutral
              detail: 事件可触发企业从年度评估升级到持续服务合约。
            - label: 高
              tone: warning
              detail: 价格最敏感的细分；最可能用自动化工具或众包替代方案替换。
    claimRefs:
      - CM019
      - CM021
      - CM022
      - CM023
      - CM034
  - id: FM004
    title: 主动安全采购与部署流程
    type: flow
    layout: standard
    summary: PTaaS/主动安全采购流程从触发事件开始，经范围界定和采购进入持续交付；每个阶段都有不同参与者和门槛条件，决定 NetSPI 在哪里能加速成交或丢单。
    data:
      nodes:
        - id: n1
          label: 采用触发因素
          detail: 合规要求（PCI-DSS、HIPAA、SOC 2）、董事会要求、网络保险要求、事件后指令，或并购尽调。
          tone: neutral
        - id: n2
          label: CISO / VP Security 评估选项
          detail: CISO 比较 PTaaS 供应商（NetSPI、Cobalt、Synack）、传统渗透测试公司、内部红队和自动化 BAS（Pentera）。预算和时间表随之确定。
          tone: neutral
        - id: n3
          label: 范围界定与采购
          detail: 安全团队界定项目范围（网络、应用、云、AI）。法务和采购审查合同条款。为持续覆盖谈判多年期持续服务合约。
          tone: neutral
        - id: n4
          label: 初始项目交付
          detail: NetSPI 部署由其平台支持的人类渗透测试人员。发现项通过 NetSPI 平台门户交付，并附修复指导。
          tone: positive
        - id: n5
          label: 发现项修复与验证
          detail: 安全工程团队修复漏洞。NetSPI 验证修复结果。攻击面数据流入 EASM 持续监控。
          tone: positive
        - id: n6
          label: 持续服务合约与扩张
          detail: 满意客户扩展到持续服务合约模式。EASM 和 BAS 作为相邻服务加入。多年期续约推动 NRR 高于 100%。
          tone: positive
      edges:
        - from: n1
          to: n2
          label: 触发因素启动 CISO 评估
        - from: n2
          to: n3
          label: 选定供应商；确定范围
        - from: n3
          to: n4
          label: 签署合同；开始交付
        - from: n4
          to: n5
          label: 发现项交付；开始修复
        - from: n5
          to: n6
          label: 结果验证；出现扩展机会
    claimRefs:
