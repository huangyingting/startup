      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >
              NetSPI 的公开披露勾勒出 2021 至 2024 年新客户持续增加的轨迹。公司 2021 年新增 319 家客户（同时实现 50% 自然收入增长），2022 年新增 300+ 家客户，2023 年新增
              400+ 个新客户（同比增长 30%+），并在 2024 年 12 月达到 1,942 家客户总数。[CU001] [CU003] [CU004] [CU005] 多年模式一致，不过仅凭披露数据无法推算 2023
              到 2024 年客户总数的绝对同比变化。

              评估量是很强的采用信号：2024 年完成 4,500+ 次渗透测试评估，意味着整个客户基础平均每年每家客户约 2.3 次评估——这一数字更符合多次交付的企业关系，而不是一次性试点。[CU002] 2023
              年，NetSPI 客户基础产生 17,000+ 次严重问题修复事件，反映出深度运营集成。[CU033]

              37 个国家的地理分布和垂直行业宽度表明，增长并未局限在单一市场。收到 KKR 的 $410 million 成长资金，强化了机构对增长轨迹的信心，虽然这只是资本事件，并不是独立客户数验证。[CU037]
              2024 年员工数增长 30%+ 至 650+ 人，也从供给侧佐证客户量增长有运营支撑。[CU032]

              与竞争对手相比：Cobalt.io 和 Synack 运营类似 PTaaS 模型，但没有公开披露同等规模的客户数。Bishop Fox 定位为服务主导型公司，没有经常性平台模型。NetSPI
              披露的客户数优势值得注意，但转化率和留存指标仍未披露。[CU034]
