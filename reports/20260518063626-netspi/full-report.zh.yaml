  - id: TV005
    title: 投资逻辑击穿与终止触发条件表
    columns:
      - 触发条件
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 收入增长放缓
        - 官方新闻稿确认连续两年 YoY 增长低于 10%
        - 抢占市场份额的投资逻辑失效；倍数压缩至 3–5x；悲观情景下企业价值降至 $400–700M
        - 从观察下调至回避；重新评估前需看到复苏证据
      - - NRR 披露低于 100%（净流失）
        - 数据室或公开文件披露任何低于 100% 的 NRR
        - 表明客户收缩，并削弱支撑 8x+ 倍数假设的经常性收入溢价
        - 投资逻辑立即击穿；若无留存重构计划，高于 $700M 的任何价格均不投资
      - - AI 自动化加速替代
        - 24 个月内，任何已披露市场研究显示 Pentera、Horizon3 或同类平台拿下企业渗透测试预算 20%+ 份额
        - PTaaS 定价权被侵蚀；结构性毛利率很可能压到 40% 以下；倍数重估至 3–4x
        - 除非 NetSPI 证明 AI Continuous Pentesting 能以 >20% 的成本下降主动吞掉威胁，否则下调至回避
      - - KKR 退出压力或下轮融资信号
        - 据报道启动并购出售流程、二级市场交易低于 $800M，或按 EBITDA 做低于市场条款的债务再融资
        - 表明 KKR 以低于投资逻辑的价格退出；优先股堆叠带来的包袱使普通股面临减值风险
        - 立即暂停；任何后续动作前需完成股权结构表瀑布分析
      - - 关键高管离职
        - CEO Aaron Shilts 或 CTO Tom Parker 在投资后 12 个月内离职，且没有计划内继任安排
        - 关键人风险落地；KKR 关系和 AI 产品路线图连续性都受威胁
        - 列入观察名单；触发 90 天领导层交接计划和客户影响评估
    notes: 触发条件用于尽调和投后监控。阈值为指示性口径，不具合同约束力。传导分析假设其他投资逻辑因素保持不变。
    claimRefs:
      - CV006
      - CV007
      - CV024
      - CV027
      - CV028
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 净留存率（NRR）
        - 截至 2026 年 5 月，任何公开来源均未披露 NRR、GRR 或队列留存数据
        - NRR 高于 110% 可支撑 10x+ 倍数；NRR 低于 100% 会击穿投资逻辑；这是企业 SaaS/PTaaS 估值最关键的单一指标
        - 数据室请求；KKR 投资者关系；CFO 访谈
      - - 毛利率
        - 未披露毛利率、贡献利润率或 EBITDA；按服务模式可比公司估计为 40–55%
        - 毛利率决定盈利路径和基于利润的退出倍数；低于 40% 会把退出限制在只看收入的买方
        - 财务数据室；索取经审计 P&L；对标 Tenable/Rapid7 成本结构
      - - 客户集中度
        - 未披露前 10 大客户收入占比和最大单一客户占比
        - 高集中度（前 10 大客户 > 40% 收入）会引入流失风险和议价权失衡，并实质影响估值
        - 数据室客户收入表；CFO 或 CRO 访谈；与头部具名客户做参考访谈
      - - KKR 股权结构表与优先权结构
        - KKR $500M+ 承诺的优先权条款、清算优先权倍数、参与权和反稀释条款均未披露
        - 优先权包袱直接决定普通股回报瀑布；按当前企业价值估计，普通股投资可能不具经济性
        - 法务数据室；KKR 投后团队披露；按 3 种退出情景建股权结构模型
      - - 相对自动化平台的竞争胜率
        - 公开来源未披露对 Pentera、Horizon3.ai 或其他自动化 PTaaS 平台的赢单 / 输单数据
        - 决定 NetSPI 的人类-AI 混合模式能否维持定价溢价；若胜率下滑，AI 替代逻辑会加速
        - 拉取销售 CRM 数据室数据；复盘竞争战卡；客户参考访谈需专门询问是否评估过自动化替代方案
      - - 2024 年后的收入轨迹
        - 2024 年增长率仅描述为两位数；没有 2025 年指引或实际值；未披露 ARR、ACV 或积压订单
        - 2025 年增长轨迹和 ARR 可见度，是验证或推翻基准情景 $130–140M ARR 假设的关键
        - CFO 访谈；索取 2025 年 Q1/Q2 实际值；审阅 bookings 数据；由 CRO 提供管道分析
    notes: 所有事项均为本章门槛下的阻断性或重要尽调要求。NRR 和股权结构表事项列为阻断项；其余列为重要项。即便只拿到六项中的三项，也会显著缩窄估值区间的不确定性。
    claimRefs:
      - CV027
      - CV028
      - CV015
      - CV035
