      - number: '8.3'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >
              NetSPI 的公开市场可比公司受到限制，因为公司采用人工密集型服务交付模型，不同于可获得最高倍数的纯软件网络安全 SaaS 业务。最直接相关的两个公开可比公司是 Tenable 和
              Rapid7，二者都运营相邻的网络安全平台业务。Tenable FY2024 收入约 $990M，市值约 $4–5B，隐含收入倍数约 4.5–5x。Rapid7 FY2024 收入约 $800M，市值约
              $2.5B，隐含收入倍数约 3x。两个可比公司都指向 3–5x 的收入倍数区间，适用于增长放缓的成熟网络安全平台业务。


              渗透测试领域的私营可比公司规模更小，可比性更弱。Synack 已融资约 $52M，估计私营估值约 $300M，意味着收入基数小得多。Cobalt.io 已获得约 $29M
              风险资本融资，仍处于规模化前轨迹。Bishop Fox 是私营渗透测试服务公司，服务范围相近，但未披露财务数据。这些私营可比公司都没有提供可与 NetSPI $500M+ KKR 承诺相当的市场出清价格发现事件。


              以假设 $130–145M ARR 为基数，对 5x–15x 收入倍数做敏感性分析，得到约 $700M–$2.1B 的估值区间。在当前增长放缓趋势下，最能站住脚的市场出清倍数是 7–9x，对应
              $910M–$1.3B 企业价值。只有当 AI 平台执行带来 25% 以上增长再加速，或公司证明具备 60% 以上 SaaS 式毛利率时，12–15x
              的溢价倍数才有理由成立——公开披露无法验证两者。可比集合强烈支持约 $1.0–$1.1B 的基准情景企业价值；如果 AI 自动化显著加速竞争压力，悲观情景约为 $700–800M。
