      - number: '4.2'
        title: 进入市场与销售效率
        blocks:
          - type: paragraph
            body: >
              NetSPI 面向安全项目成熟的企业组织，主要销售对象是首席信息安全官（CISO）、安全副总裁和高级 IT
              风险负责人。企业优先路径会带来更长销售周期——这符合六位数美元级订阅交易的典型特征——但也产生更粘的客户关系和更高合同价值。NetSPI 的 GTM 动作利用两条主要获客渠道：直接企业销售，以及由 148
              家创收伙伴组成的合作伙伴渠道（截至 2023 年，2024 年新增 57 家伙伴）。伙伴来源收入 2023 年同比增长 31%，说明间接分销正在成为重要增长杠杆。公司加入 AWS ISV Accelerate
              合作，把 NetSPI 放进企业云采购工作流，降低以 AWS 为中心的安全团队采购摩擦。与全球保险公司 Chubb 的合作，则创造了入站需求渠道：网络保险承保要求会把潜在客户导向 NetSPI
              评估。上述渠道通过降低部分管线的净新增客户获取成本，改善销售效率。客户获取成本（CAC）、回本周期、平均合同价值（ACV）和净收入留存率（NRR）均未公开披露。2021–2023 年估算收入 CAGR 超过
              41%，同时员工数年增长约 26–30%，说明毛利率可能随时间扩张，但这一推断需要管理层确认。2022 至 2024 年新 logo 增长率放缓，值得在尽调中关注管线构成和 CAC 趋势。
