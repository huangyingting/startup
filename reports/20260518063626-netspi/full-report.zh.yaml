      - number: '5.3'
        title: 技术差异化与 AI 创新
        blocks:
          - type: paragraph
            body: >-
              NetSPI 最核心的技术差异化，是人工主导、AI 加速模型：自研 NetSPI AI 增强渗透测试中的侦察和数据处理环节，但不取代人类专家在利用和发现项验证中的判断。2026 年 5 月推出的
              Continuous Pentesting 服务体现了这一路线，NetSPI AI 让订阅制、常态化的攻防测试成为可能，而不是一次性的项目制交付。

              2023 年 8 月，NetSPI 率先推出 AI/ML Pentesting，在行业尚未形成标准方法之前，就开始评估大语言模型和机器学习系统的安全性。2024 年，公司又加入 LLM 基准测试与越狱，把进攻性
              AI 能力扩展到对抗鲁棒性评估。2026 年推出的 Agentic MCP Platform Integrations，则把平台延伸到新兴的智能体 AI 生态。

              NetSPI Labs 由三位研究副总裁 Karl Fosaaen、Nick Landers 和 Scott Sutherland 领导，负责进攻性安全研究、CVE 发现和开源工具。2026 年，Labs
              团队披露了 Palo Alto PAN-OS CVE-2026-0300、cPanel CVE-2026-41940，以及 FortiNet 和 LiteLLM 的漏洞，并在 Hack Responsibly
              技术博客发布研究。ForceHound Salesforce 安全评估工具于 2026 年 4 月开源。

              在 GitHub 上，NetSPI 组织托管的 PowerUpSQL 获得 2,700+ 个 star 和 477 个 fork，说明从业者确实在采用这套进攻性 SQL Server 安全工具。这个开发者信号为
              NetSPI 的研究可信度提供了独立佐证，不只依赖公司自述。
