      - number: '7.5'
        title: 风险缓释与打破投资逻辑的触发条件
        blocks:
          - type: paragraph
            body: >
              NetSPI 已围绕主要风险簇部署多项缓释。竞争层面，2026 年 5 月推出 AI 驱动的 Continuous Pentesting，是最重要的战略缓释：NetSPI 试图把 AI
              辅助工作流嵌入人工主导测试，在降低单位经济成本的同时维持专家分析的深度优势。自研 Resolve 平台形成工作流锁定，纯自动化替代方案没有大规模切换成本就很难复制。[CR001] [CR032]


              人才层面，NetSPI 的 CREST 认证、研究发布计划（18 个 CVE、GitHub 上 150+ 个进攻性安全工具），以及在 Minneapolis
              生活成本环境下有竞争力的薪酬，相比沿海竞争对手具备相对留才优势。Silent Break、nVisium、Hubble 三笔收购沉淀的人才深度，提供了后来竞争者难以快速复制的渗透测试人员储备。[CR004]
              [CR028]


              KKR 的介入既是风险，也是缓释：资金支持降低流动性风险，支持通过 M&A 增长（Hubble 收购），并通过 KKR 的被投公司网络提供运营专长。董事会构成（Niloo Razi Howe 是 CISA
              咨询委员会成员和 Tenable 董事会成员，Scott Lundgren 是 VMware Carbon Black CTO）提供战略监督深度。[CR009] [CR036]


              NetSPI 与金融行业客户的既有关系，以及与 DORA TLPT 标准、TIBER-EU 和 NIS2 义务对齐的合规导向交付方法，部分缓释了监管复杂度。[CR022] [CR023]


              需要对 NetSPI 投资逻辑做根本重估的打破条件包括：（1）自动化 AI 渗透测试成本在 24 个月内确证性降至人工主导测试成本的 20% 以下，同时在 web/API
              攻击面覆盖质量上达到同等水平；（2）Aaron Shilts 离任，且没有预先指定、可信合格的继任者到位；（3）高知名度客户入侵被证明与 NetSPI
              测试过但漏掉的向量有关，引发诉讼、公开声誉损害和客户取消；（4）KKR 强行推动低于市场估值的退出事件，摧毁员工股权激励并触发人才流失；或（5）金融服务行业网络安全支出连续两年下降超过 20%。


              缓释与终止标准表（TR005）为每个打破投资逻辑的情景提供可监控的触发条件、具体阈值和行动含义。
