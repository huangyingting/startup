      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              多重结构性力量正在共同扩大主动安全市场。最直接的监管驱动，是 SEC 2023 年 12 月的网络安全披露规则，要求上市公司在四个工作日内披露重大网络事件。该规则把安全态势直接置于董事会审视之下，也推动 CISO
              以主动测试作为尽责证据。与此同时，PCI-DSS 4.0 版（2025 年 3 月生效）扩大了支付卡商户的持续测试要求；欧盟 DORA（Digital Operational Resilience Act）和
              NIS2 Directive 则分别对欧洲金融机构和关键基础设施运营商施加强制渗透测试义务。2024 年发布的 NIST CSF 2.0 正式提升了「Govern」职能，并更强调持续威胁暴露监测。

              Gartner 于 2022 年提出、并在 2025–2026 年持续被采用的 CTEM（Continuous Threat Exposure
              Management）框架，为买方从一次性渗透测试转向持续覆盖模式提供了概念基础设施。Gartner 预测，优先投入 CTEM 的组织遭遇重大入侵的概率会显著低于依赖被动安全的组织。AI
              和云扩张也构成结构性驱动：新的 AI 应用带来新型攻击面，需要专门测试；NetSPI 2026 年宣布 AI 驱动的持续渗透测试，确认公司正在调整服务交付以捕捉这类需求。NetSPI 2023 年披露的 42%
              收入增长——且 2021、2022、2023 年连续保持高增长——直接证明市场需求正在转化为收入加速。
            claimRefs:
