    sectionRef: competitive-market-risks
    type: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Top regulatory and legal risk factors for US-based cybersecurity firm operating globally as of May 2026. Covers
        the highest-impact regulatory frameworks affecting NetSPI's delivery obligations, client mandates, and internal
        compliance posture. Additional minor compliance obligations exist but are not material to the investment thesis.
