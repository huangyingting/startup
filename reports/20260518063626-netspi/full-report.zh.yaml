  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - NetSPI 影响
      - 尽调问题
    rows:
      - - SEC 网络安全披露规则（2023 年 12 月）
        - 增长驱动因素
        - 立即生效；大型加速申报公司自 2023 年 12 月起适用
        - 董事会急需证明主动安全姿态；CISO 对测试服务的预算授权随之扩大
        - 量化 NetSPI 2024 年新增客户中，有多少将 SEC 合规列为首要采购触发因素
      - - PCI-DSS v4.0 持续测试要求
        - 增长驱动因素
        - 近期；PCI-DSS v4.0 完整要求将于 2025 年 3 月生效
        - 支付处理商的强制渗透测试范围扩大；频率和覆盖要求提高，更利好 PTaaS，而不是一次性项目
        - 评估 NetSPI 金融服务客户群中，有多大比例因 PCI-DSS v4 在 2025 年续约或升级覆盖范围
      - - Gartner CTEM 框架采用
        - 增长驱动因素
        - 中期；Gartner 预计到 2026 年 CTEM 将被大范围采用，并带来降低数据泄露的效果
        - CTEM 给 CISO 一套解释持续进攻性安全投入的概念框架，直接支撑 NetSPI 的平台叙事
        - 用企业实际采购数据核验 Gartner 的 CTEM 采用曲线；评估贴合 CTEM 的话术是否与交易加速相关
      - - 自动化 / BAS 价格冲击（Pentera）
        - 约束
        - 持续；Pentera 等供应商正在积极营销 60% 成本降低的说法
        - 给人工主导的 PTaaS 定价压上限；倒逼 NetSPI 用深度、专家能力和自动化工具难以复制的覆盖范围做差异化
        - 向 NetSPI 索取以 Pentera 或自动化 BAS 为竞争替代方案的交易赢单 / 输单数据
      - - AI 扩大攻击面
        - 增长驱动因素
        - 持续；企业部署 AI 应用和 LLM 集成后正在加速
        - 新的 AI 攻击面带来专业 AI/ML 渗透测试需求，能交付的供应商很少；NetSPI 2026 年 AI 渗透测试公告让公司切入这个新兴子赛道
        - 评估 AI 专项渗透测试项目在 2024–2025 年新增订单中的收入占比
      - - 欧盟 DORA 与 NIS2 监管要求
        - 增长驱动因素
        - 近期；DORA 已于 2025 年 1 月开始执行；NIS2 正在转化为欧盟成员国法律
        - 欧洲强制渗透测试要求扩大；如果 NetSPI 已有或能建立欧洲交付能力，将从中受益
        - 确认 NetSPI 欧洲收入占比和交付模式（FTE、合作伙伴），评估其能否承接欧盟监管需求
    notes: 时间判断基于公开披露的监管生效日期和 Gartner 预测评论。影响和尽调问题是分析判断，并非来自单一文件，应结合管理层评论验证。
