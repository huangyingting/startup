  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              NetSPI 所处的进攻性安全市场变化很快，两类结构性威胁正在同时汇合：来自纯玩家竞争对手的 AI 原生自动化，以及大型网络安全在位厂商的平台捆绑。Pentera
              是最先进的自动化渗透测试平台，公开声称相比人工主导的渗透测试服务可降低 60% 成本，也声称相比传统方法最高可降低 80% 风险。这个叙事直接攻击
              NetSPI「深度和专业性优于自动化速度」的价值主张。[CR001] [CR037]


              Palo Alto Networks（Cortex XSOAR、Cortex Xpanse）、CrowdStrike（Falcon Exposure Management）和 Microsoft（Defender
              Vulnerability Management）等平台厂商，正主动把攻击面管理和自动化漏洞检测功能加入既有安全套件。这些集成从上方制造定价压力：已经为 Palo Alto 或 CrowdStrike
              平台付费的企业，可能用捆绑安全功能替代独立渗透测试服务，从而压缩 NetSPI 在成本敏感型 mid-market 买家中的可服务市场。[CR002] [CR038]


              PTaaS 市场也在承受来自低成本自动化替代方案的结构性定价压力。Cobalt.io 的众包模型和 Synack
              的按需平台，都在价格上低于传统人工主导测试。随着自动化平台的覆盖质量提升，专家主导测试的溢价理由会收窄，压迫 NetSPI 的混合价目表，并可能迫使其压缩利润率来留住价格敏感账户。[CR003] [CR039]


              AI 模型颠覆风险不同于短期竞争定价压力。NetSPI 对人类 + AI 混合交付的战略押注（2026 年 5 月推出），使其在深度和覆盖面上高于纯自动化平台。不过，如果全自主 AI 渗透测试在 3–5
              年内成熟到可在人类专家覆盖 web 应用、API 和云配置——这些最高量级渗透测试类别——上实现同等效果，人类溢价就会消失。这个打破投资逻辑的情景并非迫在眉睫，但值得持续监控。[CR032]


              监管风险登记表（TR001）记录了 DORA、NIS2 和 SEC 披露规则的变化如何同时创造机会（强制合规周期）和风险（若 NetSPI
              的交付模型不符合演进中的标准，则产生合规负担）。风险热力图（FR001）按严重性和可能性绘制了所有已识别的 NetSPI 风险。
