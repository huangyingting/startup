      - number: '2.5'
        title: 采用约束与竞争风险
        blocks:
          - type: paragraph
            body: >
              高端 PTaaS 定价面临的主要结构性约束，是自动化带来的冲击。自动化 BAS 供应商 Pentera 公开称，其平台可把第三方渗透测试成本降低 60%。这一说法直指 NetSPI
              的价值主张，也反映出更广泛的市场张力：在预算承压时，买方可能用成本更低的自动化工具替代价格更高的人工主导测试，至少在商品化用例中如此。HackerOne 也把其众包模式包装为每发现一个关键漏洞可带来 $4M+
              ROI，把研究员社区定位成在某些发现任务上可与托管渗透测试竞争的成本方案。2026 年 Forrester Proactive Security Platforms Landscape 纳入 42
              家供应商，确认竞争碎片化程度不低，并给整个市场带来定价压力。

              预算周期和宏观压缩是近期约束。相较其他 IT 支出类别，安全测试预算整体更有韧性，但当 CISO
              面临预算持平或下降时，仍会承受整合压力。在这些情境下，相比高端人工主导项目，自动化替代和众包方案会更有吸引力。此外，占据相邻漏洞管理市场的 Rapid7 和
              Tenable，可能把主动攻击测试扩展为产品延伸；大型云服务商也可能以零边际成本把基础攻击面扫描打包进安全服务。NetSPI 未公开披露 ARR、单位经济性或毛利率，阻碍了对其 SOM
              主张的精确验证，也限制了判断其增长来自市场扩张还是份额获取的能力。
            claimRefs:
