companyProfile:
  summary: >
    Neko Health is an early-commercial preventive health company with a clear product-market
    fit signal (80% annual repurchase, 100K+ UK waitlist at £299/scan) and a premium investor
    syndicate (Lightspeed, General Catalyst, Atomico). The non-MRI sensor architecture enables
    significantly lower clinic CAPEX than MRI-based competitors, potentially enabling faster
    geographic expansion. The company's core risk is the complete absence of peer-reviewed
    clinical validation for its AI diagnostic platform — a structural gap that creates legal
    liability, regulatory, and reputational exposure that scales with scan volume. The $1.8B
    Series B valuation is highly stretched at 360-600x estimated revenue and requires near-
    perfect 8-10 year execution to deliver investor-grade returns.
  foundedDate: "2022-01-01"
  productSummary: >
    Neko Health's core product is a 60-minute full-body health scan using a proprietary
    sensor booth with 70+ sensors (HD/3D/thermal cameras, radar, lasers, infrared, and
    a blood draw station), delivering 100+ health biomarkers across skin, cardiovascular,
    metabolic, respiratory, and eye health domains — all at £299 per scan. An AI system
    trained on 10,000+ scans analyses results before a physician reviews them with the
    patient on the same visit. All data is stored in the Neko app for longitudinal tracking.
    The non-MRI architecture enables significantly lower per-clinic CAPEX than MRI-based
    competitors. Regulatory approvals: MHRA (UK), CQC (UK), CE mark (EU MDR).
  founders:
    - name: Daniel Ek
      role: Co-Founder and Chairman
      background: >
        Swedish technology entrepreneur and co-founder/CEO of Spotify. One of Europe's
        most recognised tech founders; personal brand drives significant organic awareness
        for Neko Health across tech and lifestyle media globally. Invested personally
        in both Series A and Series B rounds.
      claimRefs: []
    - name: Hjalmar Nilsonne
