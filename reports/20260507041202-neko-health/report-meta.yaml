        Swedish entrepreneur and technical co-founder; leads Neko Health's day-to-day
        operations, technology development, and clinical strategy. Previously founded
        and led Kry/Livi (Swedish digital health company). Primary operational and
        technical risk-concentration point alongside Ek's brand contribution.
      claimRefs: []
