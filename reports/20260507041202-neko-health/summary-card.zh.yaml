summary:
  headline: >
    Neko Health 早期需求指标很亮眼：年复购率 80%、英国 waitlist 超过 100,000 人、价格 £299。但 $1.8B Series B 估值相当于估算收入
    360–600x，明显偏高，而且建立在尚无同行评审验证的临床 AI 主张上。临床证据和多城市收入证明投资逻辑前，维持观察。
