  shortDescription: >
    Neko Health is a Swedish preventive health technology company founded in 2022 by Spotify co-founder Daniel Ek and
    CEO Hjalmar Nilsonne. The company offers a 60-minute full-body health scan using 70+ proprietary sensors
    (HD/3D/thermal cameras, radar, infrared, lasers) capturing 100+ biomarkers at £299 per scan. Operations span
    Stockholm (since 2022) and London (since September 2024). $325M raised; $1.8B Series B valuation (January 2025).
    10,000+ scans completed; 100,000+ UK waitlist; 80% annual repurchase.
