chapter:
  number: 5
  title: Product and Technology
  summary: |
    Neko Health's core product is a proprietary multi-modal non-MRI body scanning
    platform using 70+ sensors including HD cameras, 3D cameras, thermal cameras,
    radar, lasers, infrared, and a blood draw station. The system collects 2,000+
    body data points in under 60 minutes and analyses them with a proprietary AI
    system trained on 10,000+ scans. Clinical outputs cover skin (moles, melanoma risk),
    cardiovascular (arterial stiffness, blood pressure, ECG), metabolic (blood glucose,
    cholesterol, HbA1c), and body composition markers. The product is differentiated
    by speed, price, and consumer UX but lacks MRI soft-tissue imaging. The technology
    roadmap includes AI accuracy improvement, new biomarkers, expanded clinic rollout,
    and potential US market entry. Regulatory approvals include MHRA (UK), CE mark (EU),
    and CQC clinical registration. No peer-reviewed clinical validation studies have been
    published; proprietary AI performance claims are unverified externally.

