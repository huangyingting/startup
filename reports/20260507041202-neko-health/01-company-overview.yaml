chapter:
  number: 1
  title: Company Overview
  summary: |
    Neko Health is a Swedish preventive health technology company that offers full-body
    health scans combining MRI, ultrasound, and AI-powered biomarker analysis to detect
    early signs of cancer, cardiovascular disease, and metabolic dysfunction — typically in
    under one hour. Founded in 2022 by Daniel Ek (co-founder and CEO of Spotify) and
    Hjalmar Nilsonne (CEO of Neko Health), the company raised a $260M Series B at a
    $1.8B valuation in January 2025, making it a confirmed unicorn. It operates clinics
    in Stockholm and London and is rapidly expanding across Europe. The business model
    is direct-to-consumer subscription and per-scan fee: approximately £2,500-£3,000
    per comprehensive scan.
