sections:
  - id: SO_IDENTITY
    title: Company Identity and Founding
    order: 1
    claimRefs:
      - CO001
      - CO003
      - CO004
      - CO013
      - CO017
      - CO018
      - CO024
      - CO032
      - CO035
    body: |
      Neko Health is a Stockholm-based preventive health technology company founded in
      2022 by Daniel Ek (co-founder and CEO of Spotify) and Hjalmar Nilsonne (operational
      CEO of Neko Health). The company's thesis is that most serious diseases — cancer,
      cardiovascular disease, metabolic disorders — are detectable years before symptoms
      using existing medical imaging technology, and that democratizing access to this
      preventive intelligence will transform healthcare outcomes for early adopters.

      Daniel Ek's co-founding role is strategic and financial: he provides capital through
      his family office Prima Materia, serves as chairman, and provides substantial brand
      equity and media profile. Hjalmar Nilsonne, a Swedish physicist and entrepreneur
      (previously co-founded energy AI company Watty), is the operational CEO responsible
      for clinic buildout, technology development, and day-to-day execution. The founding
      motivation draws on personal experience: Ek has cited his father's cardiac arrest as
      a founding catalyst — the company's mission is to give individuals the health data
      they need before a crisis, not after.

      The company's rapid clinic launch (founded 2022, first clinic May 2023 — 12 months)
      suggests substantial pre-founding technology investment. Neko Health is incorporated
      in Sweden, subject to EU GDPR, Swedish data protection authority (IMY), and UK ICO
      for its London operations. Medical device regulatory compliance in Sweden (EU MDR
      CE mark) and UK (MHRA) governs the clinical scanning environment.
    tableRefs:
      - TO002
      - TO004
    figureRefs:
      - FO001
  - id: SO_PRODUCT
    title: Product, Technology, and Business Model
    order: 2
    claimRefs:
      - CO002
      - CO005
      - CO008
      - CO012
      - CO015
      - CO016
      - CO021
      - CO022
      - CO023
      - CO025
      - CO026
      - CO031
      - CO034
    body: |
      Neko Health's product is a 60-75 minute full-body health scan: whole-body MRI
      (multiple sequences), ultrasound (thyroid, abdominal aorta), blood tests, ECG,
      and spirometry. Neko's proprietary AI platform analyzes 100+ health biomarkers
      across cardiovascular, metabolic, oncological, and neurological domains, with
      radiologist review of flagged findings. Results are delivered via a digital health
      report and physician video consultation within 48 hours. The AI is trained on
      10,000+ anonymized Swedish patient scans — not yet peer-reviewed externally.

      The business model is direct-to-consumer (DTC) per-scan: £2,500-£3,000 per
      comprehensive scan in the UK, SEK equivalent in Sweden. The high price point
      creates a premium market positioning accessible to high-income individuals,
      corporate health programs, and HNW individuals. At 10-15 scans per day per
      clinic at £2,500 each, a single clinic at capacity generates £9-12M annual
      revenue — a strong unit economics basis for the multi-clinic expansion strategy.

      Neko operates under EU MDR CE mark (Sweden) and MHRA registration (UK). It
      is not FDA-cleared, limiting near-term US market entry. The Lancet (2024)
      finds moderate evidence for cancer detection in high-risk populations and
      limited evidence for general population benefit — the clinical evidence base
      is genuine but evolving. The BMJ raises valid concerns about false positives,
      overdiagnosis, and lack of proven all-cause mortality benefit — concerns that
      create ongoing medical and regulatory risk.
    figureRefs:
      - FO002
      - FO003
  - id: SO_CAPITAL
    title: Capital Structure, Investors, and Growth Plan
    order: 3
    claimRefs:
      - CO006
      - CO007
      - CO009
      - CO010
      - CO011
      - CO019
      - CO020
      - CO027
      - CO028
      - CO029
      - CO030
      - CO033
    body: |
      Neko Health achieved unicorn status with a $260M Series B at $1.8B valuation in
      January 2025 — one of the largest Series B rounds in European healthcare technology.
      Total capital raised is approximately $265-300M including a smaller undisclosed
      Series A. The company is pre-profitability; capital is deployed against clinic
      buildout ($10-20M per clinic), technology development, and clinical staff hiring.
      Daniel Ek invests through Prima Materia; Series B institutional investors were
      not fully disclosed at announcement.

      The growth plan is ambitious: 10+ European clinics by 2026, targeting Germany,
      Netherlands, Switzerland, and Nordic markets. Each new clinic requires capital
      expenditure for MRI and ultrasound equipment, fit-out, and staff recruitment —
      making capital efficiency a critical execution risk. The current two clinics
      (Stockholm, London) serve as operational proof-of-concept and technology
      training environments.

      Headcount is estimated at 200-350 employees (Q1 2025), growing significantly
      post-Series B for clinical operations. The customer profile is high-income
      professional/executive, 35-60 age range; corporate employer packages and
      private health insurer partnerships are identified as secondary channel
      opportunities. Neko's board structure is not fully public; governance
      depth for a company at $1.8B valuation is a diligence question.
    tableRefs:
      - TO001
      - TO003
