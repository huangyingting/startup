callouts:
  - id: KCO001
    type: key-finding
    title: >-
      Neko Health is an early-stage but well-capitalized bet on preventive health becoming a mainstream consumer
      category
    body: >
      The $1.8B valuation for a 2-clinic company reflects the market's belief in preventive scanning as a multi-billion
      dollar consumer health category — not current revenue. Neko Health's technology is real, the first clinics are
      operational, and the $260M Series B provides substantial runway for European expansion. The primary unresolved
      question is whether the clinical evidence base will strengthen sufficiently (peer- reviewed studies, insurance
      reimbursement) to expand the addressable market from HNW individuals to middle-income populations — the transition
      required to justify the $1.8B valuation on a revenue multiple basis.
    claimRefs:
      - CO001
      - CO002
      - CO007
      - CO015
      - CO034
