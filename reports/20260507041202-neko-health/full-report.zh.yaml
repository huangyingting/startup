      - number: '3.3'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: |
              Neko Health 有四道耐久性不同的护城河。数据飞轮（10,000+ 次扫描训练 AI
              系统）会随规模变得更有价值，短期内难以复制。Daniel Ek 的品牌资产和媒体放大器降低获客成本，并以几乎为零的边际成本提供媒体可信度。监管批准（MHRA、CE
              标志）对于新型诊断设备通常需要 12-24+ 个月，为欧洲新进入者制造时间壁垒。长期数据锁定（Neko
              app 中逐年对比数据）创造切换成本，也支撑了 80% 复购率。

              护城河耐久性的主要风险包括：Prenuvo 带着 $120M 新资金扩张欧洲，是最直接威胁；它会把更具临床可信度的
              MRI 产品带入 Neko 的本土市场，虽然价格更高。技术商品化风险也不小——传感器硬件成本在下降，AI 模型越来越开源，资金充足的新进入者可能在
              3-5 年内复刻 Neko 的技术。Big Tech（Apple Health、Google Health）可能把预防性扫描整合进健康平台生态，不过截至
              2025 年还没有进入实体临床运营。缺少同行评审的头对头临床比较数据，使 Neko
              相对 MRI 的临床差异化主张无法验证；一旦监管机构要求达到临床证据门槛，公司就会暴露出弱点。
