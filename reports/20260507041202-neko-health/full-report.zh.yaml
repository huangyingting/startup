      - number: '1.2'
        title: 产品、技术与商业模式
        blocks:
          - type: paragraph
            body: |
              Neko Health 的产品是一项 60-75 分钟的全身健康扫描：全身 MRI（多序列）、
              超声（甲状腺、腹主动脉）、血液检测、ECG 和肺功能测定。Neko 自研 AI 平台分析
              100+ 项健康生物标志物，覆盖心血管、代谢、肿瘤和神经系统领域，并由放射科医生复核被标记的发现。结果通过数字健康报告和医生视频咨询在 48 小时内交付。AI 用
              10,000+ 份匿名瑞典患者扫描训练——尚未经过外部同行评审。

              商业模式是直接面向消费者（DTC）的单次扫描收费：英国每次综合扫描
              £2,500-£3,000，瑞典收取等值 SEK。高价格让公司定位于高端市场，面向高收入个人、企业健康项目和高净值人群。若单诊所每天做
              10-15 次扫描、单价 £2,500，满负荷单店年收入可达 £9-12M——足以支撑多诊所扩张策略的单店经济模型。

              Neko 在瑞典持有 EU MDR CE 标志，在英国完成 MHRA 注册。公司尚未获得
              FDA 清除，限制了近期进入美国市场。Lancet（2024）认为，高风险人群癌症检测有中等强度证据，普通人群获益证据有限——临床证据确实存在，但仍在演进。BMJ
              对假阳性、过度诊断以及尚无全因死亡率获益证明提出合理担忧；上述担忧构成持续的医疗和监管风险。
