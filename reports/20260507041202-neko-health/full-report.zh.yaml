  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 临床与监管风险
        blocks:
          - type: paragraph
            body: |
              Neko Health 面临的最重大风险，是 AI 诊断平台完全缺少同行评审临床验证。截至
              2026 年 5 月，没有任何已发表研究验证其 AI 在任何扫描模态中的敏感性、特异性或阳性预测值——无论是皮肤癌检测、心血管风险还是代谢评估。BMJ、The
              Lancet、Science-Based Medicine 和 Frontiers in Health Services 等学术机构和作者持续认为，面向无症状人群的
              AI 预防性身体扫描，会带来过度诊断、假阳性、下游 NHS 负担和消费者心理伤害。STAT News
              2024 年专家分析称，这一品类运行在标准循证医学协议之外。

              监管风险会放大临床风险。EU MDR 要求 IIa 类设备开展上市后临床随访（PMCF）研究——Neko
              Health 并未披露已满足这一要求。MHRA 不断演进的 AI 医疗器械（AIaMD）框架，可能把
              Neko 的 AI 从决策支持工具重新归类为独立诊断设备，从而要求更高标准的合格评定。英国脱欧后的
              UKCA 过渡也增加了监管不确定性。NICE 的数字健康证据标准框架，目前并未把 AI
              预防性扫描纳入推荐路径。UK National Screening Committee 未背书面向无症状人群的全身扫描。若出现监管调查、MHRA
              执法或 CQC 临床治理失败，后果可能是诊所立即停业。
