      - number: '7.3'
        title: 财务、竞争与运营风险
        blocks:
          - type: paragraph
            body: |
              Neko Health 的 $1.8B 估值，对应估计 $3-5M 年收入的 360-600x 收入倍数——远高于典型医疗服务公司倍数，并隐含
              10+ 年近乎完美执行。$260M Series B 显著延长跑道（按模型化烧钱速度估计
              5-8 年），但诊所扩张资本密集；每家新诊所在产生收入前，就要投入 $3-8M
              用于建设、设备和医生招聘。盈利路径要求单诊所扫描量显著更高（50-100 次 / 天，而当前估计为
              15-25 次），或涨价；但涨价可能削弱大众化价值主张。

              竞争风险正在加剧。Prenuvo 2025 年完成 $120M Series B 并获得 FDA 清除，再叠加其公开的欧洲扩张计划，意味着一个获得
              FDA 背书的 MRI 竞争对手可能在 12-24 个月内进入 Neko Health 的核心市场。Prenuvo
              的临床可信度护城河（MRI、FDA 清除 AI）很难在没有 Neko Health 自身监管投入的情况下匹配。关键人风险显著：Daniel
              Ek 的全球品牌驱动自然认知，若用付费媒体替代，同等成本难以实现；CEO Hjalmar
              Nilsonne 代表技术和运营深度。运营规模风险会随诊所数量上升而变大：在医疗人员紧缺市场招聘医生、传感器校准标准化、质量治理和管理带宽，在超过
              5 家诊所后都会更难守住。宏观敏感度中等——目标客群收入 £50K+，消费健康支出部分可选，但比奢侈品更抗周期。
