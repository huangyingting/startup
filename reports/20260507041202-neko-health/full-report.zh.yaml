      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: |
              Neko Health 的单位经济模型无法从公开数据核验，但可以用可比医疗诊所模型估算。单次扫描的可变成本包括医生咨询时间（15-20
              分钟）、血液检测耗材（约 £30-50）、按次分摊的场地开销，以及传感器维护摊销。在 £299
              价格点、估计可变成本 £120-180/次下，单次扫描毛利率约为 40-60%。相比之下，
              Prenuvo 的隐含经济模型是：$100M 收入来自 110,000 名客户，平均收入约
              $909；MRI 机器成本、放射科人员和场地租金让单诊所固定开销显著。

              Neko 的非 MRI 传感器方案降低了单诊所 CAPEX，相比 MRI 诊所无需 $1-3M
              MRI 机器；每家诊所的装修、传感器硬件和 IT 估计为 £500K-£2M。新增 10
              家诊所总 CAPEX 为 £5-20M，用 $260M Series B 足以覆盖。主要运营成本是人员：200-350
              名研发和运营员工对应年薪酬 £12-28M，是最大的运营费用。这意味着当前规模下 EBITDA 为负，烧钱速度估计为每年
              £7-25M。若 2026E 达到 10+ 家诊所、每家每年约 8,000 次扫描，收入可达约
              £24M；若人员扩张慢于收入，可能接近运营盈亏平衡。
