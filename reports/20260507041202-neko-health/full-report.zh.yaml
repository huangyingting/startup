      - number: '7.2'
        title: 法律责任与声誉风险
        blocks:
          - type: paragraph
            body: >
              Neko Health 的潜在法律责任来自两个方向：假阴性（漏诊）和假阳性（不必要随访造成伤害）。根据英国《1987

              年消费者保护法》和欧盟医疗器械法，若患者因有缺陷的诊断结果受损，可提起产品责任或医疗疏忽索赔。英国和欧盟的

              AI 责任法律正在快速演进；EU AI Act（2024）和《产品责任指令》修订案专门处理

              AI 产品造成的损害。CMS Law 2024 年关于 AI 医疗器械责任的分析，将临床验证不足列为主要责任放大器。


              GDPR 数据保护风险被低估了：Neko Health 存储 10,000+ 名患者的生物识别健康数据，并用于

              AI 模型训练；若每个训练数据用途缺少明确知情同意文件，公司会面临 ICO 执法风险，以及最高达年营业额

              4% 的 GDPR
              罚款。若数据泄露暴露患者生物识别记录，将同时引发监管和声誉后果。单一高曝光不良事件——漏诊癌症、假阳性导致不必要手术，或媒体调查报道——是最具情景性的声誉风险，可能迅速击穿消费者信任。医生咨询这一缓释措施降低了风险，但不能消除风险，因为

              AI 输出会框定整个临床互动。
