chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与创立背景
        blocks:
          - type: paragraph
            body: |
              Neko Health 是一家总部位于 Stockholm 的预防健康科技公司，2022 年由
              Daniel Ek（Spotify 联合创始人兼 CEO）和 Hjalmar Nilsonne（Neko Health 运营
              CEO）创立。公司的核心判断是：多数严重疾病——癌症、心血管疾病、代谢紊乱——在症状出现前多年，就能借助现有医学影像技术检出；把这种预防性情报做成大众可及的服务，将改变早期采用者的医疗结果。

              Daniel Ek 的联合创始人角色偏战略和财务：他通过家族办公室 Prima Materia
              出资，担任董事长，并贡献显著的品牌资产和媒体声量。Hjalmar Nilsonne 是瑞典物理学家和创业者（此前联合创立能源 AI 公司
              Watty），担任运营 CEO，负责诊所建设、技术开发和日常执行。创立动因来自个人经历：Ek 曾提到父亲心脏骤停是触发因素——公司的使命，是在危机发生前而非之后，把个人所需的健康数据交到用户手上。

              公司从成立到首家诊所开业推进很快（2022 年成立，2023 年 5 月首店开业——12 个月），说明创立前已有大量技术投入。Neko
              Health 注册于瑞典，受 EU GDPR、瑞典数据保护机构 IMY 监管；London 业务还受英国 ICO 监管。瑞典（EU MDR CE
              标志）和英国（MHRA）的医疗器械监管合规，约束其临床扫描环境。
