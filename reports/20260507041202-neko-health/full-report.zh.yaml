      - number: '4.3'
        title: 资本充足性、财务结论与尽调阻塞项
        blocks:
          - type: paragraph
            body: |
              Neko Health 的 $260M Series B（2025 年 1 月）提供了充足资本。即便按每年
              £15M 烧钱速度（中位估计）计算，本轮融资也能支撑约 13-17 年当前规模跑道——远超执行
              10 家诊所计划所需。真正的问题是，计划是否需要比保守估计更多的运营投入（营销、研发、监管）。Daniel
              Ek 通过 Prima Materia 的个人投入，以及 Lightspeed、General Catalyst 等头部投资人的质量，提供了隐性财务支持信心。股权结构表包含优先清算权；除非退出显著超过
              $1.8B，普通股回报可能有限。

              财务结论是：按当前规模看，结构上偏难。$1.8B 估值意味着按估计 £3-5M 年收入计算，收入倍数为
              300-600x。即便到 2026 年预测规模（约 £24M），倍数仍为 75x——远高于传统医疗公司
              5-20x 收入倍数。估值只能靠一个折现后的未来情景解释：每年 500,000+
              次扫描（>50 家诊所）或大幅涨价。假阳性和监管限制的临床风险，可能显著打击收入。最大的财务尽调阻塞项，是缺少任何可公开获取的经审计财务数据；本章所有估计都来自牵引力和同业数据推断。
