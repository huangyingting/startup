      - number: '1.3'
        title: 资本结构、投资人和增长计划
        blocks:
          - type: paragraph
            body: |
              Neko Health 在 2025 年 1 月以 $1.8B 估值完成 $260M Series B，迈入独角兽行列——这是欧洲医疗科技领域规模最大的
              Series B 之一。包括一笔规模较小且未披露的 Series A 在内，公司累计融资约
              $265-300M。公司尚未盈利；资金投向诊所建设（每家 $10-20M）、技术开发和临床人员招聘。
              Daniel Ek 通过 Prima Materia 投资；Series B 公告时未完整披露机构投资人名单。

              增长计划很激进：到 2026 年开出 10+ 家欧洲诊所，目标市场包括德国、
              荷兰、瑞士和北欧。每家新诊所都要投入 MRI 与超声设备、装修和人员招聘——资本效率因此成为关键执行风险。目前两家诊所（Stockholm、London）承担运营概念验证和技术训练场的角色。

              员工数估计为 200-350 人（2025 年 Q1），Series B 后为临床运营继续显著扩编。客户画像是
              35-60 岁高收入专业人士 / 高管；企业雇主套餐和私人健康保险合作被视为第二增长渠道。Neko 的董事会结构并未完全公开；以
              $1.8B 估值看，治理深度是尽调问题。
