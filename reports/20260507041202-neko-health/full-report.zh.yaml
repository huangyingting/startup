  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户牵引力与需求信号
        blocks:
          - type: paragraph
            body: >
              相比自身运营阶段，Neko Health 展现出异常强的早期需求信号。截至 2025 年 1

              月，公司已在 Stockholm 和 London 完成 10,000+ 次扫描，年度预付复购率达到

              80%——这个指标代表未来预付收入，也比大多数消费健康服务更能验证产品市场匹配。英国等候名单到 2025 年

              1 月已超过 100,000；London 诊所开业不足 6 个月，说明公司面对的是产能约束，而不是需求获取问题。瑞典市场

              2+ 年客户队列可作为长期留存代理，80% 复购率在成熟市场仍然保持。


              相比 100,000+ 英国等候名单，Neko 只完成了 10,000 次扫描，服务过的表达需求不到

              10%——需求供给失衡极为明显。也就是说，每开一家新诊所，都能立即触达既有客户管线，而不必从零获客。瑞典市场的历史记录进一步强化了留存动态的耐久性：完成首次扫描的客户绝大多数会回来，说明产品在客户感知中创造了真实的长期健康价值。Trustpilot

              和媒体消费者评价也持续支撑这一满意度叙事。
