      - number: '6.2'
        title: 客户画像与市场打法
        blocks:
          - type: paragraph
            body: |
              Neko Health 的核心客户，是 30-65 岁、健康意识强、收入高于中位数（£50K+/年）的成年人，通常是
              London 或 Stockholm 的专业人士或生活方式健康消费者。£299 价格点介于免费 NHS
              检查和 £2,500+ 高管医疗项目之间，是有意为之的大众化打法。市场打法几乎完全靠自然流量：
              Daniel Ek 的全球品牌通过科技媒体带来大量初始认知；2024 年 9 月 London
              发布又获得英国媒体铺天盖地报道——Evening Standard、Telegraph、Sky News、Vogue、GQ、Daily
              Express——几乎没有付费媒体成本。口碑和等候名单 FOMO 继续推动自然获客。

              品牌跨性别受众都有吸引力，生活方式媒体为男性和女性受众都提供了大量曝光。NHS 健康检查（免费、每
              5 年一次、面向 40 岁以上人群且生物标志物有限）并不是重大竞争威胁——Neko
              更像是补充 NHS，而非替代 NHS。关键市场打法风险在可复制性：进入新城市后，品牌认知较弱，发布叙事也不再新鲜，自然媒体浪潮未必能带来同等需求。公司到
              2026 年底扩张到 10+ 城市，将首次真正验证这个假设。企业健康 B2B 销售仍处早期，但可能成为一个渠道：相比个人消费者获客，它长期或许能带来更可预测收入和更低
              CAC。
