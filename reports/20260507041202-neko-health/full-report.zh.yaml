      - number: '8.2'
        title: 估值分析——情景与可比公司
        blocks:
          - type: paragraph
            body: |
              $1.8B 估值对应估计 ~$3-5M 年收入运行率的 360-600x 收入倍数——即便在
              2024 年更克制的健康科技市场中，也是极端离群值；彼时 Series B 中位倍数为
              15-40x。最接近的公开可比公司是 Prenuvo：2024 年收入 $100M，17
              家诊所，110,000+ 名客户；按其可能的 $500M-$1.5B 估值计算，隐含倍数为
              5-15x。CB Insights 报告称，缺少临床证据的消费健康公司中位倍数为 7x，而经过临床验证的诊断平台为
              20-40x。

              三个情景帮助界定估值区间。基准情景（2030 年：15 个城市、每城每年
              15,000 次扫描）下，收入约 £67M；按 10x 倍数，企业价值约 £670M（$840M），低于
              Series B 入场价。乐观情景（2033 年：50 个城市、每城 50,000 次扫描）下，收入约
              £750M；按 3x 倍数，企业价值约 £2.25B（$2.8B），相对 $1.8B
              入场只有温和正回报。悲观情景下，一次临床不良事件或监管执法会击穿模型，企业价值低于
              $100M。按概率加权，预期结果约为 $660M——低于 $1.8B 入场价，说明当前估值要求乐观情景兑现，投资人才可能打平。
