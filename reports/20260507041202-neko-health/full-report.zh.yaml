      - number: '8.3'
        title: 投资建议与上行可选项
        blocks:
          - type: paragraph
            body: |
              建议：观察。Neko Health 拥有可信的长期逻辑——预防健康市场大且增长中（2032 年
              $18B）、早期留存指标出色（80% 年度复购）、非 MRI 架构资本效率更高，投资人阵容也具备深厚消费和健康科技经验。乐观情景——获得
              FDA 清除后进入美国、保险报销、健康数据平台变现、50+ 城市——并非不可能。若公司发布临床验证研究，并在多城市扩张中未出现不良事件，2028-2030
              年估值达到 $3-5B+ 也可能说得通。

              但 $1.8B Series B 入场价偏紧：它已经把多年成功执行计入价格，而临床证据尚不存在。对于
              Series B 投资人，风险调整后的预期结果约为 $660M，意味着除非乐观情景概率高于
              40%，否则入场后的风险调整回报为负。把建议改为“投资”的关键条件包括：（1）发表首篇同行评审临床验证研究；（2）5+
              城市顺利运营且没有重大不良事件；（3）Series C 时经审计收入 >£30M；（4）Prenuvo
              未能以有竞争力的价格点取得 UK MHRA 注册。临床证据缺口是最关键的投资风险；若无法补上，估值完全建立在市场叙事和早期需求指标上，而不是已证明的临床价值。2027-2028
              年的 Series C 将真正检验投资人是否继续以 $1.8B 或更高估值看待这个增长故事。
