  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户流程
        blocks:
          - type: paragraph
            body: |
              Neko Health 的核心产品是 60 分钟全身多传感器健康扫描，定价 £299。扫描使用自研舱体，配备
              70+ 传感器：HD 相机和 3D 相机（采集 2,000+ 张体表图像）、热成像相机（红外体温映射）、雷达传感器（动脉硬度和血流）、激光和绿光传感器（血管成像）、四肢血压袖带（ABI
              和血压梯度）、采血站（HbA1c、胆固醇、葡萄糖、脂质面板、炎症标志物）、ECG（心律）、肺功能测定（肺功能）、握力测试，以及用于青光眼风险的眼压测量。

              输出为 100+ 项健康生物标志物，按五个临床领域组织：皮肤健康（痣图谱、黑色素瘤风险）、心血管健康（动脉硬度、
              ABI、血压、ECG）、代谢健康（血糖、HbA1c、胆固醇、BMI）、呼吸健康（FEV1、FVC
              肺功能）和身体成分。扫描后数小时内，AI 会分析结果；医生在 20-30 分钟的当天咨询中与患者复核完整报告，并就任何被标记异常给出转诊建议。所有数据存入
              Neko app，用于逐年对比和跨次趋势追踪。消费者评价持续认为体验专业、非侵入，且相对 £299 价格点很有价值——这验证了产品设计的市场接受度。
