      - number: '3.2'
        title: 差异化、定价与分发
        blocks:
          - type: paragraph
            body: >
              Neko Health 的差异化由四根支柱撑起。第一，价格可及：£299（约 $375）的价格比

              Prenuvo（$2,500）低 7-8x，比 Ezra（$1,500）低 3-5x。由此，Neko 可以跑大众市场和复购模型，而 Prenuvo 的 MRI 成本结构难以匹配。第二，技术路线：

              Neko 的 70+ 传感器多模态平台（HD 相机、3D 相机、热成像相机、雷达、红外、激光）速度更快（<60

              分钟，MRI 为 60-90 分钟）、不需要 MRI 机器（CAPEX 更低），且擅长皮肤癌检测、心血管风险和代谢标志物。第三，消费者体验：48

              小时内出结果、含医生咨询、app 中保留长期健康档案，使体验更像健康会员，而非一次性临床服务。第四，欧洲监管定位：Neko 持有

              MHRA 注册和 EU MDR CE 标志，在 Prenuvo 尚未进入的欧洲市场拥有先发监管覆盖。


              关键限制在临床范围：Neko 的传感器路线不提供软组织 MRI 影像（器官肿瘤检测），而这正是

              Prenuvo 的主要临床价值主张。因此，Neko 与 Prenuvo
              并非完全相同的替代品——两者检测的健康风险不同，可能共存而不是纯粹正面竞争。但在消费者眼里，它们都被包装成“综合健康扫描”，因此争夺的是同一份钱包份额和注意力。
