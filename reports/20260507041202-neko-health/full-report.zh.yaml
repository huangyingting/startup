  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: |
              Neko Health 位于三层嵌套市场的交叉点，每一层的规模和增速都很不同。最广义的相关市场，是全球预防医疗技术和服务，2025
              年估计规模为 USD 366.91 billion，并以 12.6% CAGR 增长至 2030 年的
              USD 665.31 billion。中间层是全球预防健康筛查服务，2024 年估计为
              USD 5.15 billion，以 22.9% CAGR 增长至 2032 年的 USD 26.74
              billion；或者可用更宽的健康体检市场作为参照，2024 年规模 USD 53.95 billion，年增速
              6.6%。最具体的相关市场——直接面向消费者的全身多传感器预防性扫描——仍处萌芽期，2024 年全球估计为
              USD 200-400 million，目前没有权威报告精确切出这个子赛道。

              DTC 扫描赛道区别于传统高管体检（Bupa、Nuffield Health、AXA Health、Cleveland
              Clinic、Mayo Clinic 等提供）：它采用多模态、AI 集成的传感器方案，价格更贴近消费者，并采用直接预订模式。英国传统高管健康项目价格在
              £1,000-£5,000，主要服务雇主推荐人群。Neko Health 最直接替代的现状方案，是
              NHS 全科年度体检——免费，但数据深度有限，也没有 AI 驱动的综合分析。市场规模估计会因定义不同相差
              100x。用于投资分析时，最稳妥的 TAM 锚点是预防筛查服务赛道（$5.15B，22.9% CAGR），更宽的预防医疗科技市场（$367B）则代表长期天花板。
