      - number: '2.3'
        title: 增长驱动、约束与相邻机会
        blocks:
          - type: paragraph
            body: >
              四个结构性增长驱动支撑 Neko Health 的市场逻辑。第一，COVID 之后，健康意识提升，消费者更愿意为预防健康付费；Millennial

              和 Gen X 人群（25-55 岁）的自费健康服务支出增加已有持续证据，这也正是

              Neko 的主要目标客群。第二，西欧人口老龄化，让更多富裕且重视健康的消费者在慢病患病率随年龄上升时，寻找更早的疾病发现手段。第三，Oura

              Ring、Apple Watch 等可穿戴设备，以及 Thriva、ZOE 等 DTC 检测，已经让每年

              £200-500 的健康投入成为行为先例。第四，全球企业健康福利市场超过 $60 billion，Neko

              的 B2B 雇主计划代表一个尚未开发的相邻渠道。


              五个结构性约束限制采用速度。最重要的是临床怀疑：同行评审证据并未证明，无症状人群常规全身扫描可降低全因死亡率。这会引发医生群体抵触、NHS

              可能出台不鼓励转诊的指引，并带来报销障碍。EU、UK、US
              之间的监管碎片化，使每个新地区都要承担多年市场准入成本。资本密集也会拖慢扩张：每家诊所都需要建设、硬件投入和医疗人员配置，扩张速度被限制在每年少数城市。若没有分层定价或保险合作，富裕人群之外的价格敏感性会压住可触达市场。最后，NHS

              负担问题——商业扫描产生的偶然发现会挤压公共医疗资源——在英国构成政治和系统性风险，在其他公共医疗优先的欧洲市场也可能出现。
