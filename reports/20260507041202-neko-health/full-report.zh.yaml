  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与 GTM 经济性
        blocks:
          - type: paragraph
            body: |
              Neko Health 当前收入模型，是直接面向消费者按次收费：英国每次扫描 £299，瑞典收取等值
              SEK。截至 2025 年 1 月，公司没有正式订阅计划、没有保险报销，也没有披露 B2B
              雇主计划，尽管正在探索企业健康福利打包。Neko 的定价在 DTC 预防扫描市场中独一档：£299，低于
              Prenuvo 的 $2,500 MRI 扫描，也低于 Echelon Health 的 £10,000+ 全天体检。

              按已披露牵引力（2023 年 5 月以来，两家诊所累计 10,000+ 次扫描）推算，累计扫描收入约为
              £3M——相对 $1.8B 估值极小。按年化口径，2 家诊所每家约 5,000 次扫描 / 年、单价
              £299，收入运行率约 £3M。80% 年度预付率为未来年度预订提供部分可见度，也构成事实上的经常性收入信号——如果正式设计成年度订阅，将显著提升收入质量和可预测性。获客受益于
              Daniel Ek 的媒体声量和自然需求（100,000+ 等候名单），说明 CAC 可能较低；若
              80% 复购率能多年保持，LTV/CAC 动态会很强。按 5 年 LTV 约 £1,200-£1,500
              计算，只要 CAC 压在 £150-200 以下，LTV/CAC 经济性就可能非常好。
