      - number: '2.2'
        title: TAM、SAM 和 SOM 估算
        blocks:
          - type: paragraph
            body: |
              Neko Health 的总可用市场（TAM）可以用三种视角拼出。若采用狭义 DTC
              扫描市场，2025 年全球 TAM 约为 USD 300-500 million，主要由 Prenuvo
              和 Ezra/Function Health 等北美玩家主导。自下而上看，仅欧洲目标人群——约
              50-80 million 名家庭收入高于中位数的富裕成年人——就对应每年 500,000-800,000
              次潜在扫描；按当前 £299 定价，欧洲 TAM 约为 £150-240M。若 Neko
              进入美国，可触达美国约 50-100 million 名合格购买者，价格点可能相当或更高。

              可服务市场（SAM）受实体诊所覆盖限制。英国、瑞典和计划中的欧洲市场，对应 2027 年
              SAM 估计为 £80-120M/年。若英国富裕成年人渗透率为 0.5%，则每年约
              300,000 次扫描，按 £299 计算仅英国即可贡献约 £90M 年收入。Neko Health
              的可获取市场（SOM）则被诊所吞吐量牢牢卡住。每家诊所每天处理 25-40 名患者，全年可做
              6,000-10,000 次扫描。若 2026 年开出 10+ 家计划诊所，SOM 天花板约为
              60,000-100,000 次扫描，收入 £18-30M——显著低于 $1.8B 估值隐含的收入预期。

              Neko Health 的 £299 定价，是 DTC 扫描市场中最可及的价格，比 Prenuvo 的
              $2,500 便宜 7-8x。由此形成的大众市场机会，现有玩家若不重做成本模型就无法匹配；但 Neko 也必须
              跑出更高体量，才能达到可比收入。Prenuvo 以 $2,500 单价完成 100,000+
              次扫描，即 $250M+ 运行收入，验证了市场存在；Neko 若要达到同等收入规模，需要约
              833,000 次扫描，单价按 £299 计算。
