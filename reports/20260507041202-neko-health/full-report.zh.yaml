      - number: '5.2'
        title: 技术架构与 AI 平台
        blocks:
          - type: paragraph
            body: |
              Neko Health 平台在架构上不同于 MRI 竞争对手。使用多传感器非 MRI 舱体，让
              Neko 避开 £1-3M+ 的 MRI 机器资本成本，可能以更轻资产的方式铺开诊所。传感器数据管线在扫描中采集
              2,000+ 张图像和生理测量数据，传输到云端 AI 处理系统，执行计算机视觉分析（皮肤）、雷达信号处理（心血管）和结构化数据分析（血液生物标志物、
              ECG）。AI 系统已用 10,000+ 份匿名患者扫描训练；样本量小于 FDA 清除的医学影像
              AI 模型（通常 100,000+ 例），但对于皮肤表面和心血管生物标志物分析等更窄用例，可能已经足够。

              技术架构采用医生在环模型：AI 输出是供医生复核的决策支持工具，不是自主诊断结果。这个设计避免把产品完全归类为
              EU MDR 下的自主诊断设备，从而降低监管风险。扫描中实时 AI 处理，让医生咨询开始前即可拿到结果。平台为自研，产品开发会随每一批新增扫描迭代
              AI 模型。关键架构限制在于：非 MRI 路线无法检测软组织器官肿瘤（胰腺、卵巢、肝脏、结肠），而这些正是预防筛查中死亡率最高的癌症检测目标。
