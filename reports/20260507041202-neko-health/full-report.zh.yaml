      - number: '5.3'
        title: 监管批准、信任与临床证据缺口
        blocks:
          - type: paragraph
            body: |
              Neko Health 在英国持有医疗器械 MHRA 注册和临床服务 CQC 注册，可按英国医疗监管标准运营
              London 诊所。在欧盟，Neko 持有 EU MDR 2017/745 下的 CE 标志认证；考虑到
              AI 软件的诊断决策支持属性，可能属于 IIa 或 IIb 类医疗器械。英国脱欧后的现行监管姿态（在
              UKCA 过渡期内 Great Britain 接受 CE 标志）降低了近期合规复杂度。所有患者数据采集、AI
              训练同意以及瑞典与英国之间的跨境数据传输，都受 GDPR 约束。

              最大的产品风险，是缺少同行评审的临床验证。尚无已发表研究验证 Neko Health 的 AI
              在任何扫描模态中的敏感性、特异性或阳性预测值。医学研究者（与 BMJ 观点一致、Frontiers in Health
              Services、Science-Based Medicine）持续警告：面向无症状人群的全身扫描，会带来过度诊断、假阳性引发的心理伤害，以及偶然发现转诊对
              NHS 的下游负担。NICE 尚未背书全身预防扫描，NHS 指引也不推荐。Neko 的扫描无法提供与
              MRI 等同的高死亡率内脏肿瘤覆盖。上述缺口意味着，Neko Health 的临床价值主张主要依赖公司数据和消费者证言，而非独立临床证据；市场成熟、监管审查加强后，产品可信度风险会更突出。
