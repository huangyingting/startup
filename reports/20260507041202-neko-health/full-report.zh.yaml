  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图概览
        blocks:
          - type: paragraph
            body: >
              Neko Health 面临三层竞争。最接近的全球主题竞争对手是 Prenuvo（Vancouver/US），它使用全身非增强

              MRI，单次收费 $2,500，运营 17 家北美自营诊所，2024 年收入 $100M，服务

              110,000+ 名客户——是全球 DTC 预防性扫描的规模领先者。Prenuvo 2025 年

              2 月完成由 Forerunner Ventures 领投的 $120M 新一轮融资，并计划扩张至欧洲和澳大利亚；因此它成为

              Neko Health 欧洲先发位置的近期直接威胁。Prenuvo 的 MRI 方案提供高分辨率软组织影像，且其 AI Body

              Composition Report 近期获得 FDA 清除，临床可信度进一步增强。


              在美国 / 北美层级，Ezra（被 Function Health 收购）通过合作诊所网络提供

              MRI 和 CT 扫描，价格 $1,500-$2,700；Function Health 将血液面板和扫描权益打包，年费

              $499+。SimonMed、Q Bio 和 Human Longevity Inc. 服务高端美国市场，价格

              $3,000-$25,000+。在英国 / 欧洲层级，Echelon Health 提供 £10,000+

              的高端高管体检，Bupa 和 Nuffield Health 则提供 £500-£2,000 的传统健康评估。上述英国 / 欧洲现有玩家都没有在 Neko 的价格点提供 AI
              集成的多传感器扫描。市场仍然分散，没有全球主导者；Neko、Prenuvo

              等公司累计获得 $400M+ VC 投资，显示投资人相信这个市场会有多个赢家。
