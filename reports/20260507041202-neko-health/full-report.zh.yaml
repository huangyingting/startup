      - number: '1.4'
        title: 图表
        blocks:
          - type: callout
            title: Neko Health 仍处早期，但资本充足；它押注预防健康会成为主流消费品类
            body: >
              一家只有 2 家诊所的公司能拿到 $1.8B 估值，反映的不是当下收入，而是市场相信预防性扫描会成长为数十亿美元级消费健康品类。Neko Health 的技术真实存在，首批诊所已经运营，$260M Series
              B 也为欧洲扩张提供了充足跑道。最大的未解问题是：临床证据能否补强到足以支撑更大市场——包括同行评审研究、保险报销——从高净值人群扩展到中等收入人群。只有完成这一步，$1.8B 估值才有可能在收入倍数上站得住。
