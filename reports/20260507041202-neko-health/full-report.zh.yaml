  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 融资历史与估值背景
        blocks:
          - type: paragraph
            body: >
              Neko Health 于 2025 年 1 月以 $1.8B 投后估值完成 $260M Series B——这是预防健康扫描赛道规模最大的一轮融资，甚至超过 Prenuvo 2025 年 2 月 $120M
              融资。本轮由 Lightspeed Venture Partners 领投，General Catalyst、Lakestar、Atomico、O.G. Venture Partners 和 Rosello
              参投。披露融资总额约 $325M，包括 Series A（$65M，2023）和 Series B（$260M，2025）。截至 2026 年 5 月，无论瑞典 AB 实体还是英国 Ltd
              实体，都没有公开经审计财务报表；所有收入估计均基于扫描量推算（10,000 次扫描 × £299 = 约 £3M 生命周期总收入）。公司为约 £3M 生命周期收入融资 $325M，资本效率比为
              107:1，反映投资人预期业务仍处规模化前阶段，未来会出现更大收入。资本密集型实体基础设施业务常有这种特征，对于 Series B 健康科技公司并不异常。Crunchbase 和 CB Insights
              证实了融资历史和投资人构成，但除轮次规模外，详细财务披露仍属私人信息，外部无法审阅或分析。
