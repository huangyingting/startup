companyProfile:
  summary: >
    Neko Health 是一家早期商业化的预防健康公司，产品市场匹配信号清晰：年度复购率 80%，英国 £299/次扫描的等候名单超过 100K；投资人阵容也很强，Lightspeed、General
    Catalyst、Atomico 均在列。非 MRI 传感器架构让单诊所 CAPEX 显著低于 MRI 竞争对手，理论上能更快铺开地域。公司的核心风险，是 AI
    诊断平台完全缺少同行评审临床验证——这个结构性缺口会随扫描量放大法律责任、监管和声誉敞口。$1.8B 的 Series B 估值高度偏紧，约为估计收入的 360-600x，需要近乎完美执行 8-10
    年，才可能交出机构投资人可接受的回报。
  foundedDate: '2022-01-01'
  productSummary: >
    Neko Health 的核心产品是 60 分钟全身健康扫描：自研传感器舱配备 70+ 传感器（HD/3D/热成像相机、雷达、激光、红外以及采血站），以每次 £299 的价格输出 100+
    项健康生物标志物，覆盖皮肤、心血管、代谢、呼吸和眼部健康。AI 系统用 10,000+ 次扫描训练，先分析结果，再由医生在同次到访中与患者复核。全部数据存入 Neko app，支持长期追踪。非 MRI 架构让单诊所 CAPEX
    显著低于 MRI 竞争对手。监管批准包括 MHRA（英国）、CQC（英国）、CE 标志（EU MDR）。
