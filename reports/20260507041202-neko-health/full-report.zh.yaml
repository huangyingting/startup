      - number: '6.3'
        title: 不利结果与渠道风险
        blocks:
          - type: paragraph
            body: |
              主要不利客户风险，是偶然发现引发焦虑。临床文献（BMJ、Frontiers in Health Services、Science-Based
              Medicine）记录，无症状筛查会因假阳性给消费者造成明显痛苦，并需要昂贵的下游转诊，给 NHS
              系统制造负担。Neko Health 的扫描后医生咨询旨在解释发现、避免不必要恐慌，但该干预能否降低焦虑，尚未经过独立验证。截至
              2026 年 5 月，Neko Health 尚未公开提交客户不良事件报告或临床事件；考虑到已完成扫描量，信号积极。但报告缺口（没有公开不良事件追踪系统）意味着，真实的心理不良结果发生率未知。

              纯自费模式（无 NHS 或私人保险整合）把可触达市场限制在愿意自掏腰包的健康消费者，这是总市场规模的结构性约束。公司未公开披露
              NPS、CSAT 或系统性客户满意度数据；正面评价来自自选择早期采用者（记者、健康爱好者），未必代表包含不利结果在内的完整消费者体验分布。企业
              B2B 渠道仍处早期，收入贡献未知。若 80% 留存率在规模化和新地域中保持，五年
              LTV 估计 £1,500-£2,000 很有吸引力；但随着核心市场自然品牌认知饱和，低认知扩张城市需要付费获客，CAC
              很可能上升。
