      - number: '5.2'
        title: Technology Architecture and AI Platform
        blocks:
          - type: paragraph
            body: |
              The Neko Health platform is architecturally distinct from MRI-based competitors.
              By using a multi-sensor non-MRI booth, Neko avoids the £1-3M+ capital cost of
              MRI machines, enabling a potentially more asset-light clinic rollout model. The
              sensor data pipeline collects 2,000+ images and physiological measurements during
              the scan, transmitting to a cloud-based AI processing system that performs computer
              vision analysis (skin), radar signal processing (cardiovascular), and structured
              data analysis (blood biomarkers, ECG). The AI system has been trained on 10,000+
              anonymized patient scans, which while smaller than FDA-cleared medical imaging AI
              models (typically 100,000+ cases), may be sufficient for the narrower use cases
              of skin surface and cardiovascular biomarker analysis.

              The technology architecture uses a physician-in-the-loop model: AI outputs are
              decision-support tools reviewed by a physician, not autonomous diagnostic outputs.
              This design reduces regulatory risk by avoiding full classification as an autonomous
              diagnostic device under EU MDR. Real-time AI processing during the scan enables
              results to be available before the physician consultation begins. The platform is
              proprietary and product development iterates on AI models with each new cohort of
              scans. Key architecture limitation: the non-MRI approach cannot detect soft-tissue
              organ tumors (pancreatic, ovarian, liver, colon), which represent the highest-mortality
              cancer detection targets in preventive screening.
            claimRefs:
              - CE004
              - CE017
              - CE024
              - CE025
              - CE026
              - CE029
              - CE030
              - CE032
              - CE033
              - CE035
      - number: '5.3'
        title: Regulatory Approvals, Trust, and Clinical Evidence Gaps
        blocks:
          - type: paragraph
            body: |
              Neko Health holds MHRA registration as a medical device in the UK and CQC
              registration for clinical service delivery, enabling operation of its London
              clinics under UK healthcare regulatory standards. In the EU, Neko holds CE mark
              certification under EU MDR 2017/745, likely as a class IIa or IIb medical device
              given the diagnostic decision-support nature of its AI software. The UK's current
              post-Brexit regulatory posture (accepting CE marks in Great Britain pending UKCA
              transition) reduces near-term compliance complexity. GDPR governs all patient data
              collection, AI training consent, and cross-border data transfer between Sweden and UK.

              The most significant product risk is the absence of peer-reviewed clinical validation.
              No published study has verified Neko Health's AI sensitivity, specificity, or positive
              predictive value for any of its scan modalities. Medical researchers (BMJ-aligned,
              Frontiers in Health Services, Science-Based Medicine) have consistently warned that
              whole-body scanning of asymptomatic populations risks overdiagnosis, psychological
              harm from false positives, and downstream NHS burden from incidental finding referrals.
              NICE has not endorsed whole-body preventive scanning, and NHS guidelines do not
              recommend it. Neko's scan does not provide MRI-equivalent coverage for high-mortality
              internal organ tumors. These gaps mean Neko Health's clinical value proposition rests
              substantially on company-provided data and consumer testimonials rather than independent
              clinical evidence — a material product credibility risk as the market matures and
              regulatory scrutiny increases.
