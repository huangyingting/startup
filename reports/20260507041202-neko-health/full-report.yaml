  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Neko Health competes across three competitive tiers. The closest global thematic competitor
              is Prenuvo (Vancouver/US), which uses whole-body non-contrast MRI at $2,500 per scan,
              operates 17 owned North American clinics, and reported $100M in 2024 revenue serving
              110,000+ customers — the scale leader in DTC preventive scanning globally. Prenuvo raised
              $120M in a new round in February 2025 led by Forerunner Ventures and is now planning
              Europe and Australia expansion, making it a near-term direct threat to Neko Health's
              European first-mover position. Prenuvo's MRI approach delivers high-resolution soft-tissue
              imaging and recently received FDA clearance for its AI Body Composition Report, strengthening
              its clinical credibility.

              In the US/North America tier, Ezra (acquired by Function Health) offers MRI and CT scans
              at $1,500-$2,700 through a network of partner clinics, with Function Health bundling blood
              panels and scan access for $499+/year. SimonMed, Q Bio, and Human Longevity Inc. serve
              the high-end US market at $3,000-$25,000+. In the UK/Europe tier, Echelon Health offers
              premium executive health at £10,000+, while Bupa and Nuffield Health provide traditional
              health assessments at £500-£2,000. None of these UK/EU incumbents offer AI-integrated
              multi-sensor scanning at Neko's price point. The market is fragmented with no dominant
              global player, and VC investment of $400M+ across Neko, Prenuvo, and others signals
              investor conviction in a multi-winner outcome.
