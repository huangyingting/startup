companyProfile:
  summary: >
    Neko Health is an early-commercial preventive health company with a clear product-market fit signal (80% annual
    repurchase, 100K+ UK waitlist at £299/scan) and a premium investor syndicate (Lightspeed, General Catalyst,
    Atomico). The non-MRI sensor architecture enables significantly lower clinic CAPEX than MRI-based competitors,
    potentially enabling faster geographic expansion. The company's core risk is the complete absence of peer-reviewed
    clinical validation for its AI diagnostic platform — a structural gap that creates legal liability, regulatory, and
    reputational exposure that scales with scan volume. The $1.8B Series B valuation is highly stretched at 360-600x
    estimated revenue and requires near- perfect 8-10 year execution to deliver investor-grade returns.
