        title: Exhibits
        blocks:
          - type: callout
            title: >-
              Neko Health is an early-stage but well-capitalized bet on preventive health becoming a mainstream consumer
              category
            body: >
              The $1.8B valuation for a 2-clinic company reflects the market's belief in preventive scanning as a
              multi-billion dollar consumer health category — not current revenue. Neko Health's technology is real, the
