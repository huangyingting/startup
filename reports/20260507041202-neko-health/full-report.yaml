  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: |
              Neko Health's core product is a 60-minute full-body multi-sensor health scan priced
              at £299. The scan uses a proprietary booth equipped with 70+ sensors: HD cameras and
              3D cameras (capturing 2,000+ body surface images), thermal cameras (infrared body
              temperature mapping), radar sensors (arterial stiffness and blood flow), lasers and
              green light sensors (vascular imaging), blood pressure cuffs on all four limbs (ABI
              and BP gradient), a blood draw station (HbA1c, cholesterol, glucose, lipid panel,
              inflammation markers), an ECG (cardiac rhythm), spirometry (lung function), grip
              strength test, and intraocular pressure measurement for glaucoma risk.

              The output is over 100 health biomarkers organized across five clinical domains:
              skin health (mole mapping, melanoma risk), cardiovascular health (arterial stiffness,
              ABI, blood pressure, ECG), metabolic health (blood glucose, HbA1c, cholesterol,
              BMI), respiratory health (FEV1, FVC spirometry), and body composition. Results are
              analysed by AI within hours of the scan, and a physician reviews the full report
              with the patient in a 20-30 minute same-day consultation, providing referral advice
              for any flagged anomalies. All data is stored in the Neko app for longitudinal
              year-on-year comparison, enabling trend tracking across visits. Consumer reviews
              consistently rate the experience as professional, non-invasive, and high-value
              relative to the £299 price point — providing market validation of the product design.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE010
