          low: 0.02
          mid: 0.05
          high: 0.1
          note: Clinical incident or regulatory shutdown; ~$50M asset recovery
        - label: Enterprise value at exit (base case, 2030)
          low: 0.6
          mid: 0.84
          high: 1.2
          note: 15 cities, £67M revenue, 10x multiple; below Series B entry
        - label: Enterprise value at exit (bull case, 2033)
          low: 2
          mid: 2.8
          high: 4.5
          note: 50 cities, £750M+ revenue, 3-6x multiple; positive return on entry
        - label: Probability-weighted expected EV
          low: 0.45
          mid: 0.66
          high: 0.95
          note: 70% base × 10% bear × 20% bull; negative expected return on $1.8B entry
  - id: FV002
    title: Recommendation logic — invest vs track vs avoid
    type: flow
    claimRefs:
      - CV029
      - CV035
      - CV040
    notes: Decision logic for investment recommendation.
    data:
      nodes:
        - id: start
          label: Neko Health investment decision
        - id: clinical
          label: Peer-reviewed clinical validation published?
        - id: revenue
          label: Audited revenue > £30M?
        - id: adverse
          label: Material adverse event occurred?
        - id: competitive
          label: Prenuvo in UK at £299 equivalent?
        - id: track
          label: TRACK — monitor for evidence milestones
        - id: invest
          label: INVEST — risk-adjusted return now positive
        - id: avoid
          label: AVOID — fundamental thesis broken
      edges:
        - from: start
          to: clinical
        - from: clinical
          to: revenue
          label: 'Yes'
        - from: clinical
          to: track
          label: No → track
        - from: revenue
          to: adverse
          label: 'Yes'
        - from: revenue
          to: track
          label: No → track
        - from: adverse
          to: avoid
          label: Yes → avoid
        - from: adverse
          to: competitive
          label: 'No'
        - from: competitive
          to: track
          label: Yes → reassess differentiation
        - from: competitive
          to: invest
          label: No → invest
