  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: |
              Neko Health operates at the intersection of three nested markets with very different
              size and growth profiles. The broadest relevant market is global preventive healthcare
              technologies and services, estimated at USD 366.91 billion in 2025 and growing at a
              12.6% CAGR to USD 665.31 billion by 2030. The intermediate market is global preventive
              health screening services, estimated at USD 5.15 billion in 2024 at a 22.9% CAGR to
              USD 26.74 billion by 2032, or alternatively the broader health check-up market at
              USD 53.95 billion in 2024 growing at 6.6% per year. The most specific relevant
              market — direct-to-consumer full-body multi-sensor preventive scanning — is nascent
              and estimated at USD 200-400 million globally in 2024, with no authoritative report
              isolating this sub-segment precisely.

              The DTC scanning segment is distinguished from conventional executive health check-ups
              (offered by Bupa, Nuffield Health, AXA Health, Cleveland Clinic, Mayo Clinic) by its
              multi-modal AI-integrated sensor approach, accessible consumer price point, and direct
              booking model. Traditional executive health programs are priced at £1,000-£5,000 in
              the UK and serve an employer-referred cohort. The status-quo substitute most directly
              displaced by Neko Health is the NHS general practice annual check-up — free but providing
              limited data depth and no AI-driven synthesis. Market sizing estimates diverge by 100x
              depending on the definition chosen. The most defensible TAM anchor for investment analysis
              is the preventive screening services segment ($5.15B growing at 22.9% CAGR), while the
              broader preventive healthcare technology market ($367B) provides the long-term ceiling.
