      - number: '1.2'
        title: Product, Technology, and Business Model
        blocks:
          - type: paragraph
            body: |
              Neko Health's product is a 60-75 minute full-body health scan: whole-body MRI
              (multiple sequences), ultrasound (thyroid, abdominal aorta), blood tests, ECG,
              and spirometry. Neko's proprietary AI platform analyzes 100+ health biomarkers
              across cardiovascular, metabolic, oncological, and neurological domains, with
              radiologist review of flagged findings. Results are delivered via a digital health
              report and physician video consultation within 48 hours. The AI is trained on
              10,000+ anonymized Swedish patient scans — not yet peer-reviewed externally.

              The business model is direct-to-consumer (DTC) per-scan: £2,500-£3,000 per
              comprehensive scan in the UK, SEK equivalent in Sweden. The high price point
              creates a premium market positioning accessible to high-income individuals,
              corporate health programs, and HNW individuals. At 10-15 scans per day per
              clinic at £2,500 each, a single clinic at capacity generates £9-12M annual
              revenue — a strong unit economics basis for the multi-clinic expansion strategy.

              Neko operates under EU MDR CE mark (Sweden) and MHRA registration (UK). It
              is not FDA-cleared, limiting near-term US market entry. The Lancet (2024)
              finds moderate evidence for cancer detection in high-risk populations and
              limited evidence for general population benefit — the clinical evidence base
              is genuine but evolving. The BMJ raises valid concerns about false positives,
              overdiagnosis, and lack of proven all-cause mortality benefit — concerns that
              create ongoing medical and regulatory risk.
