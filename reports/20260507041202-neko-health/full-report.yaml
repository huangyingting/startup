chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Founding
        blocks:
          - type: paragraph
            body: |
              Neko Health is a Stockholm-based preventive health technology company founded in
              2022 by Daniel Ek (co-founder and CEO of Spotify) and Hjalmar Nilsonne (operational
              CEO of Neko Health). The company's thesis is that most serious diseases — cancer,
              cardiovascular disease, metabolic disorders — are detectable years before symptoms
              using existing medical imaging technology, and that democratizing access to this
              preventive intelligence will transform healthcare outcomes for early adopters.

              Daniel Ek's co-founding role is strategic and financial: he provides capital through
              his family office Prima Materia, serves as chairman, and provides substantial brand
              equity and media profile. Hjalmar Nilsonne, a Swedish physicist and entrepreneur
              (previously co-founded energy AI company Watty), is the operational CEO responsible
              for clinic buildout, technology development, and day-to-day execution. The founding
              motivation draws on personal experience: Ek has cited his father's cardiac arrest as
              a founding catalyst — the company's mission is to give individuals the health data
              they need before a crisis, not after.

              The company's rapid clinic launch (founded 2022, first clinic May 2023 — 12 months)
              suggests substantial pre-founding technology investment. Neko Health is incorporated
              in Sweden, subject to EU GDPR, Swedish data protection authority (IMY), and UK ICO
              for its London operations. Medical device regulatory compliance in Sweden (EU MDR
              CE mark) and UK (MHRA) governs the clinical scanning environment.
            claimRefs:
