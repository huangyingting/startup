      - number: '3.2'
        title: Differentiation, Pricing, and Distribution
        blocks:
          - type: paragraph
            body: |
              Neko Health's differentiation rests on four pillars. First, price accessibility: at £299
              (~$375), Neko charges 7-8x less than Prenuvo ($2,500) and 3-5x less than Ezra ($1,500).
              This enables a mass-market, repeat-purchase model that Prenuvo's MRI cost structure cannot
              match. Second, technology approach: Neko's 70+ sensor multi-modal platform (HD cameras,
              3D cameras, thermal cameras, radar, infrared, lasers) is faster (<60 min vs 60-90 min for
              MRI), requires no MRI machine (lower CAPEX), and excels at skin cancer detection,
              cardiovascular risk, and metabolic markers. Third, consumer UX: results within 48 hours,
              physician consultation included, and an app-based longitudinal health profile create a
              health membership experience rather than a one-time clinical service. Fourth, European
              regulatory positioning: Neko holds MHRA registration and CE mark for EU MDR compliance,
              providing first-mover regulatory coverage in the European geography where Prenuvo had
              no presence.

              The key limitation is clinical scope: Neko's sensor approach does not offer soft-tissue
              MRI imaging (tumor detection in organs), which is Prenuvo's primary clinical value
              proposition. Neko and Prenuvo are therefore not identical substitutes — they detect
              different health risks, suggesting potential for coexistence rather than pure head-to-head
              competition. However, in the consumer framing of "comprehensive health scan," they compete
              for the same share of wallet and attention.
            claimRefs:
              - CP003
              - CP008
              - CP009
              - CP010
