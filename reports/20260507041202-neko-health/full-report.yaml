      - number: '2.2'
        title: TAM, SAM, and SOM Estimation
        blocks:
          - type: paragraph
            body: |
              Neko Health's Total Addressable Market (TAM) can be constructed through three lenses.
              Using the narrow DTC scanning market, the global 2025 TAM is approximately USD 300-500
              million, dominated by North American players including Prenuvo and Ezra/Function Health.
              Applying a bottom-up approach, the target demographic in Europe alone — approximately
              50-80 million affluent adults with above-median household incomes — represents a
              potential 500,000-800,000 annual scans at £299, implying a European TAM of £150-240M
              at current pricing. If Neko achieves US expansion, the addressable US population adds
              perhaps 50-100 million qualified buyers at a comparable or higher price point.

              The Serviceable Addressable Market (SAM) is constrained by physical clinic presence.
              The UK, Swedish, and planned European markets yield a 2027 SAM estimate of £80-120M/year.
              At 0.5% penetration of the UK's affluent adult population, this equates to approximately
              300,000 scans/year at £299 generating roughly £90M annually for UK alone. The Serviceable
              Obtainable Market (SOM) for Neko Health is tightly constrained by clinic throughput. Each
              clinic processing 25-40 patients per day generates 6,000-10,000 scans annually. With 10+
              planned clinics by 2026, the SOM ceiling is approximately 60,000-100,000 scans, generating
              £18-30M at £299 — a significant gap below the $1.8B valuation's implied revenue expectations.

              Neko Health's £299 price point is the most accessible in the DTC scanning market, 7-8x
              cheaper than Prenuvo's $2,500. This creates a mass-market opportunity incumbents cannot
              match without restructuring cost models, while simultaneously requiring higher volume to
              achieve comparable revenue. Prenuvo's 100,000+ scans at $2,500 = $250M+ run-rate validate
              the market; Neko would need ~833,000 scans at £299 to match that revenue scale.
            claimRefs:
              - CM004
              - CM005
              - CM006
              - CM007
              - CM010
              - CM017
              - CM018
              - CM019
              - CM021
              - CM031
      - number: '2.3'
        title: Growth Drivers, Constraints, and Adjacencies
        blocks:
          - type: paragraph
            body: |
              Four structural growth drivers support the Neko Health market thesis. First, post-COVID
              health consciousness has elevated consumer willingness to invest in preventive health,
              with consistent evidence across Millennial and Gen X cohorts (ages 25-55) of increased
              out-of-pocket spending on health services — the same demographic forming Neko's primary
              target. Second, aging demographics in Western Europe create a growing pool of health-
              conscious affluent consumers seeking earlier disease detection as chronic disease
              prevalence rises with age. Third, the normalization of DTC health spending through
              wearables (Oura Ring, Apple Watch) and DTC testing (Thriva, ZOE) has created behavioral
              precedent for £200-500 annual health investments. Fourth, corporate wellness exceeds
              $60 billion globally, and Neko's B2B employer plans represent an untapped adjacent channel.

              Five structural constraints limit adoption velocity. The most material is clinical
              skepticism: peer-reviewed evidence does not demonstrate that routine whole-body scanning
              in asymptomatic individuals reduces all-cause mortality. This generates institutional
              pushback from physicians, potential NHS guidance discouraging referrals, and reimbursement
              barriers. Regulatory fragmentation across the EU, UK, and US creates multi-year market
              entry overhead for each new geography. Capital intensity constrains expansion: each clinic
              requires buildout, hardware investment, and medical staffing that limits scaling to a few
              cities per year. Price sensitivity beyond the affluent segment caps the addressable market
              unless tiered pricing or insurance partnerships emerge. Finally, the NHS burden concern —
              that commercially generated incidental findings strain public healthcare — creates
              political and systemic risk in the UK and likely in other public-health-first European markets.
