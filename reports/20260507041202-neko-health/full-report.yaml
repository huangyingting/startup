      - number: '1.3'
        title: Capital Structure, Investors, and Growth Plan
        blocks:
          - type: paragraph
            body: |
              Neko Health achieved unicorn status with a $260M Series B at $1.8B valuation in
              January 2025 — one of the largest Series B rounds in European healthcare technology.
              Total capital raised is approximately $265-300M including a smaller undisclosed
              Series A. The company is pre-profitability; capital is deployed against clinic
              buildout ($10-20M per clinic), technology development, and clinical staff hiring.
              Daniel Ek invests through Prima Materia; Series B institutional investors were
              not fully disclosed at announcement.

              The growth plan is ambitious: 10+ European clinics by 2026, targeting Germany,
              Netherlands, Switzerland, and Nordic markets. Each new clinic requires capital
              expenditure for MRI and ultrasound equipment, fit-out, and staff recruitment —
              making capital efficiency a critical execution risk. The current two clinics
              (Stockholm, London) serve as operational proof-of-concept and technology
              training environments.

              Headcount is estimated at 200-350 employees (Q1 2025), growing significantly
              post-Series B for clinical operations. The customer profile is high-income
              professional/executive, 35-60 age range; corporate employer packages and
              private health insurer partnerships are identified as secondary channel
              opportunities. Neko's board structure is not fully public; governance
              depth for a company at $1.8B valuation is a diligence question.
