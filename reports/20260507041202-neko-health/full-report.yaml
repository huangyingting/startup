  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Clinical and Regulatory Risks
        blocks:
          - type: paragraph
            body: |
              The most material risk facing Neko Health is the complete absence of peer-reviewed
              clinical validation for its AI diagnostic platform. No published study has verified
              the sensitivity, specificity, or positive predictive value of its AI for any scan
              modality — skin cancer detection, cardiovascular risk, metabolic assessment — as of
              May 2026. Academic authorities including BMJ, The Lancet, Science-Based Medicine, and
              Frontiers in Health Services have consistently argued that AI-powered preventive body
              scanning of asymptomatic populations risks overdiagnosis, false positives, downstream
              NHS burden, and consumer psychological harm. STAT News expert analysis in 2024
              described the category as operating outside standard evidence-based medicine protocols.

              Regulatory risk compounds clinical risk. EU MDR requires post-market clinical follow-up
              (PMCF) studies for class IIa devices — a requirement Neko Health has not disclosed
              meeting. The MHRA's evolving AI as a Medical Device (AIaMD) framework could reclassify
              Neko's AI from a decision-support tool to a standalone diagnostic device, requiring
              a higher-standard conformity assessment. The UK's post-Brexit UKCA transition adds
              further regulatory uncertainty. NICE's evidence standards framework for digital health
              does not currently include AI preventive scanning in its recommended pathways. The UK
              National Screening Committee has not endorsed whole-body scanning for asymptomatic
              populations. If a regulatory inquiry, MHRA enforcement action, or CQC clinical
              governance failure were to occur, the consequences could be immediate clinic suspension.
            claimRefs:
              - CR001
              - CR004
              - CR005
              - CR006
              - CR007
              - CR015
              - CR017
              - CR024
              - CR025
              - CR026
