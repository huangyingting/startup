      - number: '3.3'
        title: Moat Durability and Competitive Risk
        blocks:
          - type: paragraph
            body: |
              Neko Health has four moats of varying durability. The data flywheel (10,000+ scans
              training its AI system) becomes more valuable with scale and is difficult to replicate
              quickly. The Daniel Ek brand equity and media multiplier reduces customer acquisition
              costs and provides media credibility at negligible marginal cost. Regulatory approvals
              (MHRA, CE mark) take 12-24+ months for novel diagnostic devices, creating a temporal
              barrier for new European entrants. Longitudinal data lock-in (year-on-year comparison
              data in the Neko app) creates switching costs that contribute to the 80% repurchase rate.

              The key risks to moat durability are: Prenuvo's Europe expansion with $120M in fresh
              capital is the most immediate threat, bringing a more clinically credible MRI offering
              at a higher price point into Neko's home geography. Technology commoditization risk is
              meaningful — sensor hardware costs are declining and AI models are increasingly
              open-source, which could allow well-funded entrants to replicate Neko's technology
              within 3-5 years. Big Tech (Apple Health, Google Health) could integrate preventive
              scanning into health platform ecosystems, although none has entered physical clinical
              operations as of 2025. The absence of peer-reviewed head-to-head clinical comparison
              data leaves Neko's clinical differentiation claim unverifiable relative to MRI, creating
              vulnerability if any regulatory body requires clinical evidence thresholds.
