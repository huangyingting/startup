  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Funding History and Valuation Context
        blocks:
          - type: paragraph
            body: >
              Neko Health closed its $260M Series B at a $1.8B post-money valuation in January 2025 —

              the largest funding round in the preventive health scanning category, exceeding even

              Prenuvo's $120M February 2025 raise. The round was led by Lightspeed Venture Partners

              and joined by General Catalyst, Lakestar, Atomico, O.G. Venture Partners, and Rosello.

              Total disclosed funding reached approximately $325M across Series A ($65M, 2023)

              and Series B ($260M, 2025). No audited financial statements are publicly available

              for either the Swedish AB or UK Ltd entity as of May 2026; all revenue estimates

              are based on scan-count inference (10,000 scans × £299 = ~£3M lifetime gross revenue).

              At $325M raised for approximately £3M lifetime revenue, the capital efficiency ratio

              of 107:1 reflects the expectation that the business is in a pre-scale phase with

              much larger revenue to come. This is characteristic of capital-intensive physical

              infrastructure businesses and not unusual for Series B healthtech. Crunchbase and

              CB Insights confirm the funding history and investor composition, though detailed

              financial disclosures beyond round size remain private and unavailable for any external review or
              analysis.
            claimRefs:
              - CV001
              - CV002
              - CV011
              - CV022
              - CV032
              - CV033
      - number: '8.2'
        title: Valuation Analysis — Scenarios and Comparables
        blocks:
          - type: paragraph
            body: |
              The $1.8B valuation implies a 360-600x revenue multiple on the ~$3-5M estimated
              annual run-rate — an extreme outlier even in 2024's more disciplined healthtech market
              where median Series B multiples are 15-40x. The closest publicly comparable is
              Prenuvo, which generated $100M revenue in 2024, 17 clinics, 110,000+ customers, and
              trades at an implied 5-15x multiple at its likely $500M-$1.5B estimated valuation.
              CB Insights reports that consumer health companies without clinical evidence receive
              median 7x multiples vs 20-40x for clinically validated diagnostic platforms.

              Three scenarios inform the valuation range. In the base case (2030: 15 cities,
              15,000 scans/city/year), revenues reach ~£67M, implying an enterprise value of
              approximately £670M ($840M) at 10x — below the Series B entry price. In the bull
              case (2033: 50 cities, 50,000 scans/city), revenues reach ~£750M, implying ~£2.25B
              ($2.8B) at 3x — a modest positive return on $1.8B entry. In the bear case,
              a clinical adverse event or regulatory enforcement collapses the model, with
              enterprise value below $100M. Probability-weighted, the expected outcome is
              approximately $660M — below the $1.8B entry, suggesting the current valuation
              requires the bull case to materialise for investors to break even.
            claimRefs:
              - CV003
              - CV004
              - CV005
              - CV006
              - CV012
              - CV013
              - CV015
              - CV020
              - CV026
              - CV027
              - CV031
              - CV034
      - number: '8.3'
        title: Investment Recommendation and Upside Optionality
        blocks:
          - type: paragraph
            body: |
              Recommendation: Track. Neko Health has a credible long-term thesis — a large
              and growing preventive health market ($18B by 2032), exceptional early retention
              metrics (80% annual repurchase), a capital-efficient non-MRI architecture, and a
              premium investor syndicate with deep consumer and healthtech credentials. The bull
              case — US expansion post-FDA clearance, insurance reimbursement, health data
              platform monetisation, and 50+ cities — is not implausible. If clinical validation
              studies are published and multi-city expansion is demonstrated without adverse
              incidents, the company could justify $3-5B+ valuations by 2028-2030.

              However, the $1.8B Series B entry price is stretched: it has priced in years of
              successful execution without clinical evidence existing yet. For Series B investors,
              the risk-adjusted expected outcome is approximately $660M, implying negative risk-
              adjusted returns at entry unless the probability of the bull case is above 40%.
              The key conditions to change this recommendation to 'invest' are: (1) publication
              of first peer-reviewed clinical validation study; (2) successful operation of
              5+ cities without major adverse events; (3) audited revenue >£30M at Series C;
              (4) Prenuvo not achieving UK MHRA registration at competitive price points.
              The clinical evidence gap is the most critical investment risk; without it, the
              valuation rests entirely on market narrative and early demand metrics rather than
              demonstrated clinical value. The Series C round in 2027-2028 will be the true
              test of whether investors continue to value the growth story at or above $1.8B.
