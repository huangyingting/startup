              The primary unresolved question is whether the clinical evidence base will strengthen sufficiently (peer-
              reviewed studies, insurance reimbursement) to expand the addressable market from HNW individuals to
              middle-income populations — the transition required to justify the $1.8B valuation on a revenue multiple
