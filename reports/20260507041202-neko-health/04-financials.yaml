sections:
  - id: SI_REVENUE_MODEL
    title: "Revenue Model and GTM Economics"
    order: 1
    claimRefs: [CI001, CI002, CI003, CI007, CI008, CI018, CI023, CI024, CI032, CI033, CI034]
    body: |
      Neko Health's current revenue model is direct-to-consumer per-scan fees at £299 per
      scan in the UK and SEK equivalent in Sweden. There is no formal subscription plan,
      no insurance reimbursement, and no disclosed B2B employer plan as of January 2025,
      though the company is exploring corporate wellness packaging. Neko's pricing stands
      alone as the lowest in the DTC preventive scanning market: £299 versus Prenuvo's
      $2,500 MRI scan and Echelon Health's £10,000+ full-day assessment.

      From disclosed traction (10,000+ scans across 2 clinics since May 2023), implied
      cumulative scanning revenue is approximately £3M — an extremely small number relative
      to the $1.8B valuation. On an annualized basis, 2 clinics at ~5,000 scans/year each
      at £299 implies roughly £3M in annual revenue run-rate. The 80% annual prepay rate
      provides partial visibility into future year bookings and acts as a de facto recurring
      revenue signal — if formally structured as an annual subscription, it would improve
      revenue quality and predictability materially. Customer acquisition benefits from
      Daniel Ek's media presence and organic demand (100,000+ waitlist), suggesting relatively
      low CAC and strong LTV/CAC dynamics if the 80% repurchase rate is maintained over
      multiple years. At a 5-year LTV of ~£1,200-£1,500 per customer, LTV/CAC economics are
      potentially excellent if CAC can be kept below £150-200.

  - id: SI_UNIT_ECON
    title: "Unit Economics and Cost Structure"
    order: 2
    claimRefs: [CI009, CI010, CI011, CI012, CI013, CI014, CI015, CI016, CI019, CI020, CI028, CI030, CI035]
    body: |
      Neko Health's unit economics cannot be verified from public data, but can be estimated
      from comparable healthcare clinic models. Per-scan variable costs include physician
      consultation time (15-20 minutes), blood test consumables (~£30-50), facility overhead
      allocated per scan, and sensor maintenance amortization. At a £299 price point with
      estimated variable costs of £120-180 per scan, gross margin per scan is approximately
      40-60%. This compares to Prenuvo's implied economics: $100M revenue from 110,000
      customers implies ~$909 average revenue, with MRI machine costs, radiology staff, and
      facility rent creating significant fixed overhead per clinic.

      Neko's non-MRI sensor approach reduces per-clinic CAPEX versus an MRI clinic (no
      $1-3M MRI machine required), estimated at £500K-£2M per clinic for fit-out, sensor
      hardware, and IT. For 10 new clinics, total CAPEX is £5-20M — manageable from the
      $260M Series B. The principal operating cost is headcount: at 200-350 employees across
      R&D and operations, annual payroll of £12-28M is the dominant operating expense. This
      implies negative EBITDA at current scale, with a burn rate estimated at £7-25M per year.
      At 10+ clinics with ~8,000 scans per clinic annually (2026E), revenue would reach ~£24M,
      potentially approaching operating breakeven if staffing scales more slowly than revenue.

  - id: SI_CAPITAL
    title: "Capital Adequacy, Financial Verdict, and Diligence Blockers"
    order: 3
    claimRefs: [CI004, CI005, CI006, CI017, CI025, CI026, CI027, CI029, CI031]
    body: |
      Neko Health's $260M Series B (January 2025) provides substantial capital adequacy.
      Even at a burn rate of £15M/year (midpoint estimate), the raise provides approximately
      13-17 years of runway at current scale — far more than needed to execute the 10-clinic
      plan. The actual question is whether the plan requires significantly more operating
      investment (marketing, R&D, regulatory) than our conservative estimate. Daniel Ek's
      personal commitment through Prima Materia and the caliber of lead investors (Lightspeed,
      General Catalyst) provide implicit financial backing confidence. The cap table includes
      preferred liquidation preferences that could result in common equity receiving limited
      returns unless exits exceed $1.8B significantly.

      The financial verdict is structurally challenged at current scale: the $1.8B valuation
      implies a revenue multiple of 300-600x on estimated £3-5M annual revenue. Even at 2026
      projected scale (~£24M), the multiple remains 75x — well above conventional healthcare
      company multiples of 5-20x revenue. The valuation can only be justified on a discounted
      future scenario requiring 500,000+ scans per year (>50 clinics) or a major price increase.
      The clinical risk of false positives and regulatory restriction represents a plausible
      path to significant revenue impairment. The single largest financial diligence blocker
      is the absence of any publicly available audited financial data; all estimates in this
      chapter are inferences from traction and peer data.

