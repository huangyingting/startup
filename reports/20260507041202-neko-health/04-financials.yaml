chapter:
  number: 4
  title: Financials
  summary: |
    Neko Health is a pre-profitability, capital-intensive healthcare startup with no
    disclosed revenue, burn rate, or unit economics. The core financial model is
    direct-to-consumer per-scan fees at £299, with each clinic requiring significant
    upfront CAPEX and ongoing medical staffing. From disclosed traction (10,000+ scans,
    2 clinics), implied revenue is ~£3M from scanning alone — far below the $1.8B
    valuation-implied metrics. The $260M Series B was raised in January 2025 and is
    intended for R&D and multi-clinic European expansion. Capital adequacy appears
    sufficient for 2-3 years at estimated burn rates. Key financial risks: the 10+
    clinic expansion plan requires substantial CAPEX, revenue is entirely out-of-pocket
    with no insurance coverage, and no financial statements have been filed publicly
    in accessible registries.

