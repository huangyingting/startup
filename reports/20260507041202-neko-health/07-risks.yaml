sections:
  - id: SR_CLINICAL
    title: "Clinical and Regulatory Risks"
    order: 1
    claimRefs: [CR001, CR004, CR005, CR006, CR007, CR015, CR017, CR024, CR025, CR026, CR033, CR039]
    body: |
      The most material risk facing Neko Health is the complete absence of peer-reviewed
      clinical validation for its AI diagnostic platform. No published study has verified
      the sensitivity, specificity, or positive predictive value of its AI for any scan
      modality — skin cancer detection, cardiovascular risk, metabolic assessment — as of
      May 2026. Academic authorities including BMJ, The Lancet, Science-Based Medicine, and
      Frontiers in Health Services have consistently argued that AI-powered preventive body
      scanning of asymptomatic populations risks overdiagnosis, false positives, downstream
      NHS burden, and consumer psychological harm. STAT News expert analysis in 2024
      described the category as operating outside standard evidence-based medicine protocols.

      Regulatory risk compounds clinical risk. EU MDR requires post-market clinical follow-up
      (PMCF) studies for class IIa devices — a requirement Neko Health has not disclosed
      meeting. The MHRA's evolving AI as a Medical Device (AIaMD) framework could reclassify
      Neko's AI from a decision-support tool to a standalone diagnostic device, requiring
      a higher-standard conformity assessment. The UK's post-Brexit UKCA transition adds
      further regulatory uncertainty. NICE's evidence standards framework for digital health
      does not currently include AI preventive scanning in its recommended pathways. The UK
      National Screening Committee has not endorsed whole-body scanning for asymptomatic
      populations. If a regulatory inquiry, MHRA enforcement action, or CQC clinical
      governance failure were to occur, the consequences could be immediate clinic suspension.

  - id: SR_LEGAL
    title: "Legal Liability and Reputational Risks"
    order: 2
    claimRefs: [CR002, CR003, CR014, CR018, CR019, CR020, CR021, CR032, CR034, CR036]
    body: |
      Neko Health faces latent legal liability risks from two directions: false negatives
      (missed diagnoses) and false positives (unnecessary follow-up harm). Under UK product
      liability law (Consumer Protection Act 1987) and EU Medical Device law, a patient
      harmed by a defective diagnostic result could pursue a product liability or medical
      negligence claim. UK and EU AI liability law is evolving rapidly; the EU AI Act
      (2024) and Product Liability Directive revision specifically address AI-enabled
      product harm. CMS Law's 2024 analysis of AI medical device liability identifies
      inadequate clinical validation as the primary liability amplifier.

      GDPR data protection risk is underappreciated: Neko Health stores biometric health
      data for 10,000+ patients and uses it for AI model training; without explicit informed
      consent documentation for each training data use case, the company faces ICO enforcement
      risk and potential GDPR fines of up to 4% of annual turnover. A data breach exposing
      patient biometric records would create both regulatory and reputational consequences.
      Reputational risk from a single high-profile adverse event — a missed cancer, a false
      positive leading to unnecessary surgery, or a media exposé — is the most scenario-
      specific risk vector that could collapse consumer trust rapidly. The physician consultation
      mitigant reduces but does not eliminate this risk, as the AI output frames the entire
      clinical interaction.

  - id: SR_FINANCIAL_COMPETITIVE
    title: "Financial, Competitive, and Operational Risks"
    order: 3
    claimRefs: [CR008, CR009, CR010, CR011, CR012, CR013, CR016, CR022, CR023, CR027, CR029, CR031, CR035, CR038, CR040]
    body: |
      Neko Health's $1.8B valuation implies a 360-600x revenue multiple on estimated $3-5M
      annual revenues — far exceeding typical healthcare services multiples and implying
      near-perfect execution over a 10+ year horizon. The $260M Series B extends runway
      significantly (estimated 5-8 years at modelled burn rate), but clinic expansion
      capital intensity means each new clinic costs $3-8M in build-out, equipment, and
      physician hiring before generating revenue. The path to profitability requires either
      significantly higher scan volume per clinic (50-100 scans/day vs estimated current 15-25)
      or price increases that may reduce the democratic value proposition.

      Competitive risk is intensifying. Prenuvo's $120M Series B and FDA clearance in 2025,
      combined with its stated European expansion plans, puts an FDA-endorsed MRI competitor
      in Neko Health's primary markets within 12-24 months. Prenuvo's clinical credibility
      moat (MRI, FDA-cleared AI) is difficult to match without Neko Health's own regulatory
      investment. Key-person risk is significant: Daniel Ek's global brand drives organic
      awareness that would be irreplaceable by paid media at equivalent cost. CEO Hjalmar
      Nilsonne represents technical and operational depth. Operational scale risk grows with
      clinic count: physician hiring in healthcare-scarce markets, sensor calibration
      standardisation, quality governance, and management bandwidth all become harder to
      maintain above 5 clinics. Macroeconomic sensitivity is moderate — consumer health
      spending is partially discretionary for the target £50K+ income demographic but less
      cyclical than luxury goods.

