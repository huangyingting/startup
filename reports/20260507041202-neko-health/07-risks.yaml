chapter:
  number: 7
  title: Risks and Red Flags
  summary: |
    Neko Health faces a convergence of clinical, regulatory, competitive, financial, and
    operational risks that collectively make this a high-risk investment. The most significant
    risk is the absence of peer-reviewed clinical validation: the company's AI diagnostic
    claims have never been independently verified, creating legal liability, regulatory
    exposure, and consumer trust risks that could be triggered by a single high-profile
    false negative outcome. Secondary risks include: the UK/EU regulatory environment for
    AI medical devices tightening under EU MDR post-market surveillance requirements;
    competitive risk from Prenuvo's US expansion and potential EU entry; dependence on
    a single celebrity co-founder (Daniel Ek) for brand equity; NHS political risk from
    media narratives about diverting health spending from the NHS; consumer churn if
    adverse scan outcomes trigger media backlash; and a stretched $1.8B valuation at
    sub-$5M estimated annual revenue. One structural risk factor is difficult to dismiss:
    if Neko Health scans cause a statistically significant number of unnecessary surgical
    biopsies or cardiac investigations from false positives, the resulting harm could
    trigger regulatory crackdown and reputational collapse. No evidence of material
    adverse outcomes has emerged to date, but the risk scales with scan volume.

