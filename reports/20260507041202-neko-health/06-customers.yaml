sections:
  - id: SU_TRACTION
    title: "Customer Traction and Demand Signals"
    order: 1
    claimRefs: [CU001, CU002, CU003, CU011, CU012, CU016]
    body: |
      Neko Health has demonstrated unusually strong early demand signals relative to
      its operational stage. By January 2025, the company had completed 10,000+ total
      scans across Stockholm and London, with an 80% annual prepay repurchase rate —
      a metric that represents prepaid future revenue and validates product-market fit
      better than most consumer health services. The UK waitlist had exceeded 100,000
      by January 2025, less than 6 months after the London clinic opened, indicating
      that the company faces a capacity constraint rather than a demand acquisition
      problem. Sweden's 2+ year customer cohort provides a proxy for long-term retention,
      with the 80% repurchase rate sustained in a mature market.

      At 10,000 scans versus a 100,000+ UK waitlist, Neko has served less than 10% of
      expressed UK demand — an extraordinary demand-supply imbalance. This implies that
      each new clinic opened will have immediate access to a pre-existing customer pipeline
      rather than needing to acquire customers from scratch. The Swedish market's track
      record further reinforces the durability of the retention dynamic: customers who
      experience their first scan overwhelmingly return, suggesting the product creates
      genuine longitudinal health value in the customer's perception. Trustpilot and
      media consumer reviews consistently support this satisfaction narrative.

  - id: SU_PROFILE
    title: "Customer Profile and Go-to-Market"
    order: 2
    claimRefs: [CU004, CU005, CU006, CU007, CU018, CU022, CU024, CU028, CU029, CU030, CU031]
    body: |
      The core Neko Health customer is a health-conscious adult aged 30-65 with above-
      median income (£50K+/year), typically a professional or lifestyle-health consumer
      in London or Stockholm. The £299 price point sits between free NHS checks and £2,500+
      executive medical programs — a deliberate democratisation play. Go-to-market has been
      almost entirely organic: Daniel Ek's global brand drove significant initial awareness
      via tech media, and the London launch in September 2024 generated wall-to-wall UK press
      coverage — Evening Standard, Telegraph, Sky News, Vogue, GQ, Daily Express — at near-zero
      paid media cost. Word-of-mouth and waitlist FOMO drive additional organic acquisition.

      The brand appeals across gender demographics, with lifestyle-oriented publications
      generating significant coverage for both male and female audiences. NHS health checks
      (free, every 5 years, limited biomarkers for over-40s) are not a significant competitive
      threat — Neko supplements rather than substitutes for NHS care. The key GTM risk is
      replicability: organic media waves may not generate equivalent demand in new cities
      where the brand is less established and the launch narrative is less fresh. The company's
      expansion to 10+ cities by end of 2026 will be the first real test of this hypothesis.
      Corporate wellness B2B sales, while early-stage, represent a channel that could
      deliver more predictable revenue at potentially lower CAC than individual consumer
      acquisition over time.

  - id: SU_RISK
    title: "Adverse Outcomes and Channel Risks"
    order: 3
    claimRefs: [CU013, CU014, CU015, CU017, CU019, CU020, CU021, CU023, CU025, CU027, CU032, CU033, CU034]
    body: |
      The principal adverse customer risk is incidental findings anxiety: the clinical
      literature (BMJ, Frontiers in Health Services, Science-Based Medicine) documents that
      asymptomatic screening leads to significant consumer distress from false positives and
      requires costly downstream referrals, creating NHS system burden. Neko Health's post-scan
      physician consultation is designed to contextualise findings and prevent unnecessary
      alarm, but the effectiveness of this intervention in reducing anxiety has not been
      independently validated. No customer adverse event reports or clinical incidents have
      been publicly filed for Neko Health as of May 2026, which is encouraging given the
      volume of scans performed, but the reporting gap (no public adverse event tracking
      system) means the true incidence of adverse psychological outcomes is unknown.

      The self-pay only model (no NHS or private insurance integration) limits the addressable
      market to out-of-pocket health spenders, which is a structural constraint on total
      market size. No NPS, CSAT, or systematic customer satisfaction data has been publicly
      disclosed; positive reviews derive from self-selected early adopters (journalists, health
      enthusiasts) who may not represent the full distribution of consumer experiences including
      adverse outcomes. Corporate B2B channel is early-stage and its revenue contribution
      is unknown. LTV estimates of £1,500-£2,000 over five years are attractive if the 80%
      retention rate holds at scale and in new geographies, but CAC is likely to increase
      as organic brand awareness saturates in core markets and paid acquisition becomes necessary
      in lower-awareness expansion cities.

