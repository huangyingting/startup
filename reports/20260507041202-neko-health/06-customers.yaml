chapter:
  number: 6
  title: Customers and Go-to-Market
  summary: |
    Neko Health targets health-conscious, affluent adults aged 30-65 who are proactively
    monitoring their health outside traditional NHS care. With 10,000+ scans completed and
    a 100,000+ person UK waitlist by January 2025, early demand signals are strong. The
    £299 price point democratises preventive health scanning relative to £2,500+ executive
    medical programs. The 80% annual repurchase rate is a standout consumer loyalty
    metric. Go-to-market relies on organic word-of-mouth, media coverage, celebrity
    endorsements, and waitlist buzz rather than paid acquisition — a capital-efficient
    model so far but untested at scale beyond 2 clinics. The customer base skews
    affluent and London/Stockholm-centric. Corporate wellness partnerships represent
    an underpenetrated adjacent channel. Key risks: customer concentration in two cities,
    absence of NHS pathway integration, dependence on consumer referrals, and potential
    adverse outcomes from incidental findings driving customer anxiety and churn.

