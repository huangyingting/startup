chapter:
  number: 8
  title: Valuation and Investment Outlook
  summary: |
    Neko Health's $1.8B valuation at its January 2025 Series B is highly stretched
    relative to estimated current revenues ($3-5M), implying a 360-600x revenue multiple.
    Even in an optimistic bull case — 50 cities, 50,000 scans/year each, 80% retention
    at £299 — annual revenues would reach ~£750M by 2033, making the $1.8B valuation
    plausible at a 2x revenue multiple but requiring nearly flawless execution over 8+
    years. The investment thesis depends on three compressing risks: (1) clinical evidence
    being established before a regulatory or reputational event; (2) Prenuvo and other
    MRI competitors not eroding the preventive scanning market share; and (3) unit
    economics at scale being positive (each clinic profitable with 30+ scans/day).
    Key upside scenarios include NHS or insurance integration, US market entry, and
    data monetisation. Key downside scenarios include clinical event-triggered valuation
    collapse and competitive displacement. Recommendation: track rather than invest now.
    The company needs 2-3 years of clinical evidence development and proven multi-city
    expansion before the risk-adjusted return justifies the stretched entry valuation.

