chapter:
  number: 2
  title: Market Analysis
  summary: |
    Neko Health addresses a three-tier market: the broad global preventive healthcare
    technology and services market (~$367B in 2025), the intermediate global preventive
    health screening services segment ($5.15B growing at 22.9% CAGR), and the nascent
    DTC full-body multi-sensor scanning niche (~$200-400M globally, 2024). The company
    differentiates on price (£299 vs. $2,500 for Prenuvo) and multi-modal sensor
    technology. Demand evidence is compelling: 100,000+ waitlist and 80% annual repurchase
    rate. The Serviceable Obtainable Market through 2026 is capacity-constrained at
    ~£18-30M, well below the $1.8B valuation. Core adoption constraints include lack of
    clinical evidence for mortality benefit, NHS system strain from incidental findings,
    capital-intensive clinic rollout, and regulatory fragmentation across expansion markets.

