chapter:
  number: 3
  title: Competitors
  summary: |
    Neko Health competes in a nascent DTC preventive scanning market against Prenuvo
    (North America, MRI-based, $2,500, 17 clinics, $100M 2024 revenue), Ezra/Function
    Health (MRI/CT, $499-$2,700), and traditional executive health programs (Bupa, Echelon
    Health, £500-£10,000+). Neko's core differentiation is price (£299), speed (<60 min),
    multi-modal non-MRI sensor technology (radar, infrared, HD cameras), and consumer UX.
    Its moats include proprietary data flywheel (10,000+ scans growing), brand equity from
    Daniel Ek, EU/UK regulatory approvals, and early-mover advantage in price-accessible
    European preventive scanning. Key risks: Prenuvo's Europe expansion with $120M fresh
    capital, inability to prove clinical efficacy, and potential for large healthcare
    systems or Apple/Google health to enter at scale.
