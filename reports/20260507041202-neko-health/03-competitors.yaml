sections:
  - id: SP_LANDSCAPE
    title: Competitive Landscape Overview
    order: 1
    claimRefs:
      - CP001
      - CP002
      - CP004
      - CP005
      - CP006
      - CP007
      - CP012
      - CP025
      - CP028
      - CP031
      - CP032
    body: |
      Neko Health competes across three competitive tiers. The closest global thematic competitor
      is Prenuvo (Vancouver/US), which uses whole-body non-contrast MRI at $2,500 per scan,
      operates 17 owned North American clinics, and reported $100M in 2024 revenue serving
      110,000+ customers — the scale leader in DTC preventive scanning globally. Prenuvo raised
      $120M in a new round in February 2025 led by Forerunner Ventures and is now planning
      Europe and Australia expansion, making it a near-term direct threat to Neko Health's
      European first-mover position. Prenuvo's MRI approach delivers high-resolution soft-tissue
      imaging and recently received FDA clearance for its AI Body Composition Report, strengthening
      its clinical credibility.

      In the US/North America tier, Ezra (acquired by Function Health) offers MRI and CT scans
      at $1,500-$2,700 through a network of partner clinics, with Function Health bundling blood
      panels and scan access for $499+/year. SimonMed, Q Bio, and Human Longevity Inc. serve
      the high-end US market at $3,000-$25,000+. In the UK/Europe tier, Echelon Health offers
      premium executive health at £10,000+, while Bupa and Nuffield Health provide traditional
      health assessments at £500-£2,000. None of these UK/EU incumbents offer AI-integrated
      multi-sensor scanning at Neko's price point. The market is fragmented with no dominant
      global player, and VC investment of $400M+ across Neko, Prenuvo, and others signals
      investor conviction in a multi-winner outcome.
    tableRefs:
      - TP001
  - id: SP_DIFFERENTIATION
    title: Differentiation, Pricing, and Distribution
    order: 2
    claimRefs:
      - CP003
      - CP008
      - CP009
      - CP010
      - CP015
      - CP017
      - CP018
      - CP021
      - CP022
      - CP023
      - CP033
      - CP034
    body: |
      Neko Health's differentiation rests on four pillars. First, price accessibility: at £299
      (~$375), Neko charges 7-8x less than Prenuvo ($2,500) and 3-5x less than Ezra ($1,500).
      This enables a mass-market, repeat-purchase model that Prenuvo's MRI cost structure cannot
      match. Second, technology approach: Neko's 70+ sensor multi-modal platform (HD cameras,
      3D cameras, thermal cameras, radar, infrared, lasers) is faster (<60 min vs 60-90 min for
      MRI), requires no MRI machine (lower CAPEX), and excels at skin cancer detection,
      cardiovascular risk, and metabolic markers. Third, consumer UX: results within 48 hours,
      physician consultation included, and an app-based longitudinal health profile create a
      health membership experience rather than a one-time clinical service. Fourth, European
      regulatory positioning: Neko holds MHRA registration and CE mark for EU MDR compliance,
      providing first-mover regulatory coverage in the European geography where Prenuvo had
      no presence.

      The key limitation is clinical scope: Neko's sensor approach does not offer soft-tissue
      MRI imaging (tumor detection in organs), which is Prenuvo's primary clinical value
      proposition. Neko and Prenuvo are therefore not identical substitutes — they detect
      different health risks, suggesting potential for coexistence rather than pure head-to-head
      competition. However, in the consumer framing of "comprehensive health scan," they compete
      for the same share of wallet and attention.
    tableRefs:
      - TP002
      - TP003
    figureRefs:
      - FP001
      - FP002
  - id: SP_MOAT
    title: Moat Durability and Competitive Risk
    order: 3
    claimRefs:
      - CP013
      - CP014
      - CP016
      - CP019
      - CP020
      - CP024
      - CP026
      - CP027
      - CP029
      - CP030
      - CP035
    body: |
      Neko Health has four moats of varying durability. The data flywheel (10,000+ scans
      training its AI system) becomes more valuable with scale and is difficult to replicate
      quickly. The Daniel Ek brand equity and media multiplier reduces customer acquisition
      costs and provides media credibility at negligible marginal cost. Regulatory approvals
      (MHRA, CE mark) take 12-24+ months for novel diagnostic devices, creating a temporal
      barrier for new European entrants. Longitudinal data lock-in (year-on-year comparison
      data in the Neko app) creates switching costs that contribute to the 80% repurchase rate.

      The key risks to moat durability are: Prenuvo's Europe expansion with $120M in fresh
      capital is the most immediate threat, bringing a more clinically credible MRI offering
      at a higher price point into Neko's home geography. Technology commoditization risk is
      meaningful — sensor hardware costs are declining and AI models are increasingly
      open-source, which could allow well-funded entrants to replicate Neko's technology
      within 3-5 years. Big Tech (Apple Health, Google Health) could integrate preventive
      scanning into health platform ecosystems, although none has entered physical clinical
      operations as of 2025. The absence of peer-reviewed head-to-head clinical comparison
      data leaves Neko's clinical differentiation claim unverifiable relative to MRI, creating
      vulnerability if any regulatory body requires clinical evidence thresholds.
    tableRefs:
      - TP004
    figureRefs:
      - FP003
