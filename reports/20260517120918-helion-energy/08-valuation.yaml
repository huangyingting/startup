chapter:
  number: 8
  title: "Valuation"
  summary: >
    At $5.425B post-money (Series F, January 2025), Helion Energy's valuation is entirely
    predicated on a probability-weighted expectation of commercial fusion power delivery —
    an outcome that has never occurred in history. The recommended stance is TRACK /
    SPECULATIVE: the Microsoft PPA and Polaris D-T milestone represent genuine commercial
    validation, but Q>1 net energy gain remains undemonstrated, the 2028 timeline requires
    unprecedented engineering compression, and $10B+ in post-Q>1 capital is needed. The
    risk of total loss is material; upside is enormous if Polaris succeeds.

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: "Source URL not in fetch trail; content independently corroborated by multiple secondary sources reporting the same Helion valuation and financing facts"

sections:
  - id: section-1
    title: "Investment Thesis and Recommendation"
    body: >-
      Helion Energy is the world's only private fusion company with an executed commercial
      power purchase agreement — a 50 MW contract with Microsoft carrying a penalty clause
      and a 2028 delivery deadline. That singular commercial anchor justifies investor
      attention. The investment thesis has three pillars: first, Helion's field-reversed
      configuration magneto-inertial fusion approach is the fastest-demonstrated path toward
      net energy gain, with seven prototype generations and a February 2026 D-T plasma
      temperature milestone of 150 million degrees Celsius; second, the Microsoft PPA and
      Nucor 500 MWe development agreement constitute binding commercial validation that no
      other fusion company possesses; and third, if Q>1 is achieved, the target cost would
      disrupt global electricity markets, with the addressable opportunity exceeding two
      trillion dollars per year globally. The anti-thesis is equally compelling: Q>1 net
      energy gain has never been demonstrated in any private fusion program, the 2028 delivery
      deadline has been described by independent nuclear physicists as astounding, and the
      $1.4B raised to date falls $10B+ short of the estimated cost of the first commercial
      Orion plant. Sam Altman's March 2026 board departure introduces governance uncertainty,
      and Bloomberg's July 2024 investigation raised internal culture concerns. The recommended
      stance is TRACK / SPECULATIVE, not a buy at $5.425B. Confidence is LOW; risk rating is
      CRITICAL. The upgrade trigger to BUY requires independent third-party confirmation of
      Q>1 achievement on Polaris, a credible Orion construction contract with a fixed-price
      EPC bid, and resolution of the Microsoft PPA penalty schedule through disclosed terms.
      The Recommendation Summary Table (TV001) and Thesis / Anti-Thesis Table (TV002) provide
      the full structured investment case.
    claimRefs: [CV007, CV008, CV009, CV010, CV013, CV014, CV015, CV026, CV039]
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]

  - id: section-2
    title: "Valuation Context and Financing History"
    body: >-
      Helion Energy's Series F closed January 28, 2025 at a $5.425 billion post-money
      valuation, raising $425 million. Lead investors were Lightspeed Venture Partners and
      SoftBank Vision Fund 2, with participation from Mithril Capital, Capricorn Investment
      Group, Sam Altman personally, Nucor Corporation, and Good Ventures Foundation. Total
      capital raised across all rounds since 2013 exceeds $1.4 billion, with Sam Altman's
      personal investment across multiple rounds estimated at approximately $350 million. The
      company has zero disclosed revenue or ARR; the valuation is entirely milestone-contingent
      and reflects investor probability-weighted expectations of Q>1 net energy gain and
      commercial electricity delivery to Microsoft by 2028. The Series F raised $425M at
      $5.425B post-money, implying approximately 7.8% dilution to pre-Series-F investors.
      The preference stack is not publicly disclosed; with Lightspeed and SoftBank Vision Fund
      2 as Series F leads, standard institutional terms including 1x liquidation preference
      are probable and would materially affect returns in sub-bull exit scenarios. Secondary
      market indicators from Sacra, Hiive, and Caplight suggest an implied valuation of
      $12-15B as of mid-2025, though these are unverified by Helion and should be treated as
      speculative demand signals rather than marks. Forge Global secondary data shows Helion
      trading above its last primary round mark. Investors in the Series F at $5.425B
      post-money require a minimum exit of $54.25B to achieve 10x return — a threshold no
      private energy company has ever reached via IPO. The Nucor 8-K and 10-K confirm a
      $35 million Nucor investment and a 500 MWe development agreement. No publicly known
      debt or project finance arrangements exist.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV011, CV012, CV028, CV029, CV036, CV041]
    figureRefs: [FV003, FV004]

  - id: section-3
    title: "Bull / Base / Bear Scenarios"
    body: >-
      The valuation distribution across scenarios is wide and binary, reflecting the Q>1
      technology gate. Bull case: Polaris achieves Q>1 by end of 2026, Orion is constructed
      on schedule with first power delivered to Microsoft in 2028, the Microsoft penalty clause
      is never invoked, Nucor proceeds with a commercial plant agreement by 2030, and OpenAI
      multi-gigawatt discussions convert to a binding agreement. In this scenario, Helion could
      target a $20-25B+ post-money valuation for an IPO or strategic acquisition in 2030-2032.
      This outcome requires sequential execution that has no historical precedent. Base case:
      Q>1 is demonstrated in late 2026 or early 2027 but Orion delivery slips 12-18 months to
      2029-2030; the Microsoft PPA is renegotiated to reduce or defer penalties; Nucor stays
      committed on a revised schedule; OpenAI has not yet signed a binding agreement; and a
      $2-5B follow-on round dilutes current investors significantly. The base case supports a
      $5-8B hold valuation and an IPO window no earlier than 2031. Bear case: Q>1 is not
      demonstrated by the 2028 Microsoft deadline; Microsoft invokes the penalty clause;
      the next capital raise fails or prices below $5.425B; Helion operates in resource-constrained
      mode. This scenario implies a sub-$500M valuation, primarily reflecting IP and patent value
      from over a decade of FRC research, with near-total loss for Series F investors. The
      probability distribution is not quantifiable with public evidence, but qualitative
      assessment places highest mass in a base case with material bear-case tail risk. The
      Bull / Base / Bear Scenario Table (TV003) and Valuation Sensitivity figure (FV002)
      provide structured scenario detail.
    claimRefs: [CV021, CV022, CV023, CV024, CV025, CV030, CV034, CV035]
    tableRefs: [TV003]
    figureRefs: [FV002]

  - id: section-4
    title: "Comparable Set and Market Benchmarks"
    body: >-
      Helion's comparable universe is thin. Within private fusion, Commonwealth Fusion Systems
      (CFS) raised approximately $3 billion total and carries the closest technology-stage
      comparison; CFS uses a high-temperature superconducting tokamak approach versus Helion's
      FRC magneto-inertial approach. Pacific Fusion raised a $900M milestone-gated Series A in
      October 2024 at an early pre-commercial stage; the $900M committed capital without a
      disclosed valuation suggests a discount to Helion's implied premium. TAE Technologies has
      raised over $1.3B using field-reversed configurations — the closest technology peer — and
      carries an estimated $1-2B implied valuation, reflecting Helion's unique commercial PPA
      premium above peer marks. Among public clean energy and nuclear companies, Bloom Energy
      (NYSE: BE) with a $2B market cap at approximately $1.5B revenue and 1.3x revenue multiple
      serves as a commercial PPA infrastructure reference; it differs materially as a fuel-cell
      company with proven revenue. NuScale Power (NYSE: SMR) with an approximately $800M market
      cap and no revenue serves as a cautionary tale for pre-revenue nuclear energy companies:
      NuScale cancelled its first US commercial project in 2023 and its market cap compressed by
      over 80% from its SPAC debut high. Helion commands a premium to all private fusion peers
      on an absolute valuation basis, justified by the world's only commercial fusion PPA with
      binding penalty terms and the first D-T plasma demonstration. The premium is defensible if
      Q>1 is delivered but not yet supported by proven physics. The Comparable Valuation Table
      (TV004) provides full peer detail.
    claimRefs: [CV016, CV017, CV018, CV019, CV020, CV024, CV025, CV034, CV037]
    tableRefs: [TV004]

  - id: section-5
    title: "Exit Readiness and Final Diligence Asks"
    body: >-
      Helion has no near-term exit path. The company is pre-revenue, pre-commercial, and
      operating at a stage where IPO readiness requires at minimum a functioning commercial
      plant with auditable revenue and cost data. The earliest realistic IPO window is 2030-2032,
      conditioned on Orion delivering power and establishing a multi-customer revenue base. A
      strategic M&A exit to a major utility, oil supermajor, or hyperscaler is conceivable but
      would require demonstrated Q>1 and a functioning commercial plant to command a premium
      above the current $5.425B mark. A distressed exit below the current mark constitutes the
      bear case. Thesis-break triggers that require immediate portfolio reassessment include:
      Polaris fails to demonstrate Q>1 by end of 2027; Microsoft formally invokes or signals
      intent to invoke the penalty clause; David Kirtley departs as CEO; the next equity raise
      prices below $5.425B post-money (down-round); or Nucor or OpenAI publicly terminate their
      agreements. The Thesis-Break and Kill Triggers Table (TV005) provides structured thresholds
      and action implications. Critical evidence missing for an informed investment decision:
      the Microsoft PPA full penalty schedule and renegotiation rights, the Polaris Q>1 data
      independently reviewed by third-party physicists, the Series F cap table showing preference
      stack and anti-dilution provisions, the Orion engineering cost estimate with fixed-price
      EPC bids, and NRC pre-application correspondence. The Final Diligence Asks Table (TV006)
      details the required evidence for each ask. The overall recommendation remains TRACK /
      SPECULATIVE until at least one of the critical physics milestones is independently confirmed.
    claimRefs: [CV031, CV032, CV033, CV035, CV039, CV040]
    tableRefs: [TV005, TV006]

