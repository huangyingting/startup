callouts:
- id: KV001
  type: recommendation
  title: "Investment Stance \u2014 CONDITIONAL HOLD / SPECULATIVE BUY"
  body: "At $5.425 billion post-money, Helion represents the highest-valued private\
    \ fusion company in history\u2014a position justified entirely by option value\
    \ on an unachieved physics milestone. Our stance is CONDITIONAL HOLD for existing\
    \ holders and SPECULATIVE BUY only for patient deep-tech capital with a 5-10 year\
    \ horizon, high risk tolerance, and the ability to absorb complete loss. The primary\
    \ condition is independent validation of Polaris net-electricity output (Q>1),\
    \ expected H2 2026. At current valuation, investors pay for the bull case without\
    \ the bull case having been achieved. Entry above $5.4B is not recommended without\
    \ Q>1 confirmation.\n"
  sourceRefs:
  - SV001
  - SV002
  - SV014
  claimRefs:
  - CV001
  - CV031
  - CV032
- id: KV002
  type: risk
  title: Valuation Is Entirely Option Value — No DCF Support at $5.4B
  body: "Helion\u2019s $5.425B Series F valuation cannot be supported by any conventional\
    \ discounted cash flow analysis. With zero revenue, zero gross margin, undemonstrated\
    \ Q>1 physics, and a 2028 first-plant delivery target that mainstream fusion physicists\
    \ regard as aggressive, the valuation represents a pure option on a physics breakthrough.\
    \ General Fusion\u2014a direct analog company\u2014raised $300M+ over 20 years\
    \ and shut down in 2024 without achieving Q>1. This defines the character of the\
    \ risk: binary outcome, 5-10 year horizon, and no meaningful recovery scenario\
    \ if fusion physics takes another decade.\n"
  sourceRefs:
  - SV011
  - SV014
  - SV001
  claimRefs:
  - CV011
  - CV026
  - CV027
  - CV031
- id: KV003
  type: insight
  title: AI Power Demand Is the Structural Tailwind — But Not the Thesis
  body: "Goldman Sachs forecasts 165% growth in AI-driven data center power demand\
    \ by 2030. ARPA-E announced $135M in new fusion funding in April 2026. Wood Mackenzie\
    \ reports the SMR pipeline surged 42% driven by data center demand. SMR Intel\
    \ tracks 40+ nuclear data center deals in 2024\u20132026. These are structural\
    \ tailwinds for Helion\u2019s addressable market, but they are not the investment\
    \ thesis. The thesis depends entirely on Helion\u2019s fusion physics succeeding\
    \ on schedule. If Q>1 is not achieved, the market opportunity does not matter.\
    \ If it is achieved, the opportunity is transformative.\n"
  sourceRefs:
  - SV004
  - SV025
  - SV006
  - SV008
  claimRefs:
  - CV005
  - CV006
  - CV020
  - CV028
- id: KV004
  type: recommendation
  title: Minimum Conditions Before Increasing Allocation
  body: "An investor should not increase allocation to Helion without confirming:\
    \ (1) Polaris net-electricity output independently validated; (2) Microsoft PPA\
    \ penalty exposure quantified under NDA; (3) Orion capex budget confirmed under\
    \ $600M with a credible construction schedule; (4) Series G closed at or above\
    \ $5.4B with \u22652 institutional leads; and (5) capitalization table reviewed\
    \ for preference overhang. Meeting all five conditions shifts the stance from\
    \ CONDITIONAL HOLD to SPECULATIVE BUY with higher conviction. Failing any one\
    \ preserves current allocation without increase.\n"
  sourceRefs:
  - SV001
  - SV013
  - SV030
  claimRefs:
