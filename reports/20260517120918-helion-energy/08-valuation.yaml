  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: Microsoft PPA penalty terms — contractually confidential
    missingEvidence: The per-unit penalty rate and total cap for non-delivery under
      the Microsoft PPA are contractually confidential; unconfirmed industry estimates
      of ~$0.05/kWh have circulated but not been verified by any official filing or
      NDA disclosure
    whyItMatters: The penalty exposure could represent hundreds of millions of dollars
      in contingent liability if Orion is delayed; this is the primary financial downside
      trigger in the bear case and cannot be modeled without NDA-level disclosure
    diligencePath: Request Microsoft PPA term sheet under NDA from Helion; monitor
      FERC or WA UTC regulatory filings that may require public price disclosure;
      model sensitivity at $0.01 to $0.10/kWh penalty rates
    relatedQuestionRefs:
    - QV025
  - type: private-evidence-only
    severity: blocking
    topic: Series G financing terms — not yet announced
    missingEvidence: Series G has not been announced as of May 2026; timing, size,
      valuation mark, lead investor, and use-of-funds are entirely unknown; a down-round
      vs. flat vs. up-round would materially change the investment thesis for existing
      holders
    whyItMatters: Series G is the next externally verifiable confidence signal from
      institutional investors; its terms determine whether the base or bull case is
      trending; a distressed Series G is the most important thesis-break trigger
    diligencePath: Monitor Helion communications for announcement; when announced,
      request term sheet, lead investor name, and use-of-funds breakdown; compare
      implied valuation to Series F $5.425B mark
    relatedQuestionRefs:
    - QV029
  - type: private-evidence-only
    severity: material
    topic: OpenAI deal — unconfirmed, terms unknown
    missingEvidence: Negotiations between OpenAI and Helion for a 5 GW power supply
      deal have been reported by GeekWire and others but no agreement has been signed
      or confirmed by either party as of May 2026; all valuation impact is speculative
    whyItMatters: The OpenAI deal is the primary driver of the bull-case and transformative-case
      valuations; without a signed agreement, the transformative scenario should receive
      near-zero weighting in base-case models; a signed deal would materially re-rate
      the thesis
    diligencePath: Monitor OpenAI and Helion press releases; request any non-confidential
      term sheet or heads-of-agreement under NDA; do not incorporate OpenAI revenue
      into base-case valuation models until a signed agreement is announced
    relatedQuestionRefs:
    - QV009
    - QV020
  - type: enumeration-incomplete
    severity: material
    topic: comparable valuation table — no fully analogous private fusion precedent
    missingEvidence: No private fusion company has achieved commercial electricity
      generation; the comparable set is necessarily indirect (pre-commercial peers,
      public SMR proxy, utility reference); CFS and TAE last-round valuations are
      from 2021 and may not reflect current marks
    whyItMatters: Without current valuation marks for peers, the Helion premium calculation
      is based on stale data; the true peer premium or discount is unverifiable from
      public sources
    diligencePath: Monitor CFS and TAE for new funding rounds that would provide fresh
      valuation marks; use secondary market data from Hiive and Caplight for real-time
      implied pricing on private fusion peers
    relatedQuestionRefs:
    - QV009
    relatedTableRefs:
    - TV004
  - type: private-evidence-only
    severity: minor
    topic: secondary market pricing — limited Hiive/Caplight visibility
    missingEvidence: Hiive and Caplight provide directional signals on secondary market
      pricing for Helion shares but do not publish transaction prices or bid-ask spreads
      publicly; the implied discount to Series F cannot be precisely quantified
    whyItMatters: Secondary market pricing is a real-time signal on holder sentiment
      and liquidity; a growing discount to Series F would be an adverse thesis signal;
      cannot be tracked without access to trading platform data
    diligencePath: Create accounts on Hiive and Caplight to access transaction data;
      track bid-ask spread trends quarterly; compare to Series F $5.425B mark as
      an ongoing sentiment indicator
    relatedQuestionRefs:
    - QV023
