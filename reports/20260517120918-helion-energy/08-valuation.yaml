sections:
- id: SV-VAL-01
  title: Investment Thesis and Recommendation
  body: "Helion Energy occupies a singular position in the private markets: the highest-valued\
    \ private fusion company on earth at a $5.425 billion post-money Series F valuation\
    \ (January 2025), backed by the world\u2019s only two signed commercial fusion\
    \ power purchase agreements, and buoyed by the most compelling structural market\
    \ tailwind in the energy sector\u2014AI-driven data center power demand that Goldman\
    \ Sachs projects will grow 165% by 2030. These facts define the bull thesis. The\
    \ anti-thesis is equally stark: Helion has zero revenue, has never demonstrated\
    \ net energy gain (Q>1) from its fusion device, and is attempting to deliver commercial\
    \ electricity by 2028\u2014a timeline that mainstream fusion physicists regard\
    \ as extraordinarily aggressive. The $5.425 billion valuation cannot be supported\
    \ by any conventional discounted cash flow analysis. It is entirely option value\
    \ on an unachieved physics milestone.\n\nOur recommendation is CONDITIONAL HOLD\
    \ for existing holders and SPECULATIVE BUY only for patient deep-tech capital\
    \ with a five-to-ten-year horizon, the capacity to absorb a complete loss, and\
    \ a minimum check size large enough to survive multiple dilutive rounds before\
    \ any liquidity event. The primary condition triggering higher conviction is independent\
    \ validation of Polaris net-electricity output (Q>1), expected in the second half\
    \ of 2026. Until that milestone is confirmed, investors are paying for the bull\
    \ case without the bull case having occurred.\n\nThe structural case for Helion\
    \ rests on four pillars: (1) the Microsoft PPA with binding financial penalties\
    \ creates urgency that no other fusion company faces; (2) the Nucor 500 MW industrial\
    \ deal, confirmed in Nucor\u2019s SEC 8-K filing, provides the largest contracted\
    \ fusion pipeline globally; (3) AI power demand creates a multi-decade addressable\
    \ market of unprecedented scale; and (4) ARPA-E\u2019s $135 million new fusion\
    \ commitment (April 2026) signals continued government validation. Against these\
    \ pillars, the anti-thesis is rooted in physics uncertainty, valuation discipline,\
    \ and governance complexity. The recommendation logic flows through all six factors\
    \ summarized in FV001; the formal stance is captured in TV001.\n"
  tableRefs:
  - TV001
  figureRefs:
  - FV001
  calloutRefs:
  - KV001
- id: SV-VAL-02
  title: Valuation Context and Comparable Analysis
  body: "Helion\u2019s $5.425 billion Series F valuation represents a 3.0x premium\
    \ over Commonwealth Fusion Systems (CFS), the next-highest-valued private fusion\
    \ company at approximately $1.8 billion at its Series B-equivalent round in 2021.\
    \ TAE Technologies, with $1.2 billion in total capital raised, and Zap Energy,\
    \ with approximately $130 million raised, are far smaller. General Fusion\u2014\
    the most cautionary comparable\u2014raised over $300 million and shut down in\
    December 2024 without achieving net energy gain, demonstrating that substantial\
    capital is no guarantee of physics success. In the public markets, NuScale Power\u2019\
    s collapse from a $1.8 billion market cap to below $200 million after losing its\
    lead customer shows how quickly firm low-carbon baseload valuations can reset.\
    \ S&P Global estimates the private fusion sector has attracted over $7 billion\
    \ in investment since 2000, and the Fusion Industry Association identifies 40+\
    \ active companies.\n\nThe entry discipline problem is acute: at $5.425 billion,\
    \ Helion is already priced well above the entire comparable peer set. No fusion\
    \ company has achieved commercial electricity generation. The valuation multiple\
    \ cannot be computed against revenue, EBITDA, or any standard financial metric;\
    \ investors are implicitly underwriting an option on physics and manufacturing\
    \ scale-up. The comparable set in TV004 attempts to bound this option value from\
    \ multiple angles\u2014private fusion peers, public SMR analogues, and utility-scale\
    \ reference points. FV002 illustrates sensitivity across valuation scenarios.\
    \ The core question for entry discipline is whether the option value at $5.4 billion\
    \ is fair relative to milestone risk. At current valuation, investors need a bull-case\
    \ outcome (Q>1, Orion on schedule, OpenAI deal closed) to generate meaningful\
    \ returns. Any deviation toward the base or bear case implies flat or negative\
    \ absolute returns from the Series F entry price.\n\nBloombergNEF\u2019s 2025\
    \ data showing corporate clean energy buying declined in 2025 after a decade of\
    \ growth is a modest adverse signal: it suggests the PPA market faces headwinds\
    \ even before fusion is commercially available. This does not break the thesis\u2014\
    hyperscaler baseload demand is structurally different from general corporate PPA\
    \ demand\u2014but it signals the competitive environment for future Helion PPA\
    \ pricing.\n"
  tableRefs:
  - TV002
  - TV004
  figureRefs:
  - FV002
  calloutRefs:
  - KV002
- id: SV-VAL-03
  title: 'Scenario Analysis: Bull, Base, and Bear Cases'
  body: "Three valuation scenarios bound the investment decision at the Series F entry\
    \ price of $5.425 billion. The bull case ($10\u201315 billion by 2028) requires\
    \ Q>1 to be achieved in the second half of 2026, Orion delivered on schedule by\
    \ 2028, the OpenAI deal closed and financed with credible capital, and a Series\
    \ G round of $1 billion or more at a valuation premium to the Series F. In this\
    \ scenario, Helion becomes the world\u2019s first commercial fusion electricity\
    \ generator and rerates as a platform energy infrastructure company. Return from\
    \ Series F entry would be approximately 1.9\u20132.8x on the round itself, or\
    \ 10\u201330x from earlier entry points. The base case ($3\u20136 billion) assumes\
    \ Q>1 is delayed to 2027, Orion is delivered 12\u201318 months late, one of the\
    \ two PPAs is renegotiated without penalty, and the Series G closes at a flat\
    \ or modest step-up valuation. In this scenario, Series F investors realize flat\
    \ to modest negative returns and must hold through 2030 or later for meaningful\
    \ liquidity. The bear case (below $1 billion, potentially near-zero) assumes Q>1\
    \ is not achieved by 2029, the Microsoft penalty clause is triggered, and the\
    \ Series G either fails to close or closes at a significant down-round. This scenario\
    \ implies near-total loss for Series F investors.\n\nThe probability distribution\
    \ across these scenarios is highly asymmetric and difficult to calibrate from\
    \ public evidence. The best available signal is milestones: Q>1 confirmation from\
    \ Polaris (expected H2 2026) would shift weight materially from bear to base or\
    \ bull. Failure to confirm by year-end 2026 would shift weight toward bear. MIT\
    \ Climate experts and the Bloomberg investigation of Helion\u2019s scientific\
    \ claims introduce material adversarial evidence that the company\u2019s 2028\
    \ timeline is not credible under standard fusion physics assumptions. TV003 captures\
    \ the full scenario structure. FV003 plots the valuation ranges.\n"
  tableRefs:
  - TV003
  figureRefs:
  - FV003
  calloutRefs:
  - KV003
- id: SV-VAL-04
  title: Investment KPIs and Final Diligence Summary
  body: "The investment KPI dashboard for Helion concentrates six observable metrics\
    \ that any investor should track before committing capital or increasing allocation.\
    \ These metrics\u2014Series F valuation, cumulative capital raised, contracted\
    \ PPA pipeline, peer premium, AI power demand tailwind, and government validation\u2014\
    do not in themselves justify the investment; they frame the option value being\
    \ purchased. FV004 renders these metrics in a dashboard format for quick IC review.\
    \ The central diligence deficit is the absence of independently verifiable financial\
    \ and technical data: Helion has not published audited financials, disclosed its\
    \ Orion capex budget, confirmed its monthly burn rate, or quantified the Microsoft\
    \ PPA penalty exposure. Without these five data points, any valuation model is\
    \ speculative.\n\nTV005 identifies the five events that would break or confirm\
    \ the investment thesis: (1) Polaris net-electricity failure by Q4 2027 is a terminal\
    \ thesis-break event; (2) Microsoft penalty triggering is an existential capital\
    \ drain; (3) a distressed Series G below $5.4 billion indicates loss of institutional\
    \ confidence; (4) OpenAI deal collapse removes the transformative revenue scenario;\
    \ and (5) key executive departure (especially CEO David Kirtley) creates leadership\
    \ risk at the critical Polaris-to-Orion transition. TV006 provides the structured\
    \ diligence ask list that any prospective investor should work through under NDA\
    \ before making a commitment. The five items are sequenced by materiality: (1)\
    \ Polaris milestone validation, (2) PPA penalty terms, (3) Orion capex budget,\
    \ (4) capitalization table, and (5) Series G terms when announced. Wood Mackenzie\
    \ reports the SMR pipeline has surged 42% driven by data center demand; SMR Intel\
    \ tracks 40+ nuclear data center deals signed in 2024\u20132026\u2014establishing\
    \ that the competitive race for firm carbon-free baseload is live and Helion must\
    \ deliver on its timeline to capture the window.\n"
  tableRefs:
  - TV005
  - TV006
  figureRefs:
  - FV004
  calloutRefs:
  - KV004
- id: SV-VAL-05
  title: Exit Readiness and Thesis-Break Triggers
  body: "Exit readiness for Helion investors is constrained by the pre-commercial\
    \ nature of the business and the binary outcome structure of fusion physics. Three\
    \ exit paths are plausible within a ten-year horizon. First, strategic acquisition:\
    \ Microsoft (the PPA counterparty), Nucor (the strategic investor), or an energy\
    \ major such as Constellation Energy or Exelon could acquire Helion to secure\
    \ exclusive access to fusion electricity or to monetize a technology leadership\
    \ position. Acquisition premium would likely be 1.5\u20133.0x the prevailing\
    \ funding-round valuation, implying a range of $8\u201316 billion in the bull\
    \ case. Second, IPO: a public offering is unlikely before the 2028 Orion delivery\
    \ milestone provides at least one operational plant and the beginnings of a revenue\
    \ track record. Post-2028, an IPO at a premium to the then-current funding valuation\
    \ is conceivable if Orion delivers on schedule. Third, secondary liquidity: Hiive\
    \ and Caplight both provide pre-IPO secondary market access to Helion shares.\
    \ Hiive data suggests secondary market interest exists but at implied discounts\
    \ to the Series F valuation, indicating that liquidity-seeking early holders are\
    \ exiting below round price. This is a mild adverse signal.\n\nFusion industry\
    \ M&A precedent is essentially non-existent. General Fusion shut down rather than\
    \ finding an acquirer. TAE Technologies and CFS remain private and are not acquisition\
    \ targets as of May 2026. This means Helion\u2019s exit comparables must be drawn\
    \ from broader deep-tech and energy infrastructure M&A, where acquisition premiums\
    \ range widely based on strategic fit and technology uniqueness. For thesis-break\
    \ triggers, investors should monitor five events: the Polaris Q>1 milestone result\
    \ (expected H2 2026), the Series G valuation and investor composition (expected\
    \ 2026\u20132027), any Microsoft PPA renegotiation or delay announcement, Sam\
    \ Altman\u2019s ongoing role in the OpenAI\u2013Helion commercial discussions,\
    \ and the competitive trajectory of SMR data center deployments. If any two of\
    \ these five signals move adversely in the same 12-month period, a full position\
    \ reassessment is warranted regardless of other factors. The Hiive and Caplight\
    \ secondary markets provide a continuous real-time signal on how well-informed\
    \ early holders are valuing the company relative to the last funding round.\n"
