- id: TV005
  title: Thesis-Break and Kill Triggers Table
  columns:
  - Trigger
  - Threshold
  - Transmission to Thesis
  - Action Implication
  rows:
  - - Polaris Q>1 physics failure
    - Polaris fails to achieve independently verified net-electricity output by Q4
      2027
    - Eliminates the primary technology gate; no credible path to Orion commercial
      delivery by 2028 or 2030; all PPA revenue scenarios collapse
    - Immediate thesis break; position exit or write to zero; do not provide bridge
      capital absent a credible revised physics roadmap
  - - Microsoft PPA penalty triggered
    - Orion delivers fewer than 50 MW to Microsoft by end-2028 or fails to deliver
      at all
    - Activates binding financial penalties of unquantified but material magnitude;
      creates existential capital drain; triggers distressed Series G or bankruptcy
      scenario
    - Full capital-structure reassessment; determine whether penalty is survivable;
      reduce position until penalty magnitude is quantified
  - - Distressed Series G
    - Series G priced below $5.425B post-money (Series F valuation) or fails to close
      within 18 months of expected announcement
    - Signals institutional loss of confidence at the critical Polaris-to-Orion transition;
      triggers dilution for existing holders; potential bridge-financing death spiral
    - Reduce or exit position; monitor for bankruptcy or strategic acquisition trigger;
      Series G terms are the clearest market signal of institutional confidence
  - - OpenAI deal collapse or competitor win
    - OpenAI selects a competing energy source (SMR, renewables) or negotiations
      fail before Q4 2027 announcement
    - Removes transformative revenue scenario from bull and base cases; compresses
      implied valuation toward Series F entry; reduces probability of Series G premium
    - Shift to base-case valuation model; revise return expectations; the Microsoft
      and Nucor PPAs alone do not justify the Series F valuation without a third
      anchor customer
  - - Key executive departure
    - David Kirtley (CEO) or senior technical leadership departs without credible
      pre-announced succession
    - Founder-led deep-tech companies rarely survive founder transitions at critical
      pre-commercial phases; leadership vacuum at Polaris-to-Orion transition is especially
      dangerous
    - Immediate diligence escalation; assess management pipeline before any new capital
      commitment; review board governance for succession plan
  notes: 'Triggers are defined by observable, verifiable events or thresholds. Probability
    of each trigger is not estimable from public evidence. Any two triggers firing
    in the same 12-month period should prompt full position reassessment regardless
    of other factors. Thesis-break triggers do not resolve to a price target; they
    define the conditions under which the binary outcome resolves negatively.

    '
  claimRefs:
  - CV034
  - CV041
  - CV040
  - CV012
  - CV042
- id: TV006
  title: Final Diligence Asks Table
  columns:
  - Topic
  - Missing Evidence
  - Why It Matters
  - Owner / Diligence Path
  rows:
  - - Polaris net-electricity milestone (Q>1)
    - No independent third-party validation of Polaris energy balance; company claims
      direct conversion milestone (Feb 2026) but no peer-reviewed publication confirms
      Q>1
    - Primary physics gate — all valuation scenarios depend on Q>1; without independent
      confirmation, the entire thesis rests on company-claimed milestones
    - Request independent technical expert review; monitor arXiv, Physical Review
      Letters, and Helion press releases for peer-reviewed Q>1 confirmation; commission
      expert technical due diligence with access to Polaris data
  - - Microsoft PPA penalty exposure
    - PPA terms including penalty schedule, price, and termination provisions are
      contractually confidential; circulating industry estimates (~$0.05/kWh for
      undelivered energy) are unconfirmed
    - Penalty exposure could represent hundreds of millions of dollars in contingent
      liability if Orion is delayed; material to downside thesis and capital adequacy
      assessment
    - Request PPA term sheet under NDA; monitor FERC or WA UTC regulatory filings
      that may require public price disclosure; model penalty scenarios at $0.01 to
      $0.10/kWh
  - - Orion capital budget and construction schedule
    - No official capex budget or EPC contract disclosed; $400M estimate is from
      third-party trade press with high uncertainty (±50%)
    - Without confirmed budget, capital adequacy for the 2028 milestone cannot be
      assessed; determines timing and size of Series G and whether current capital
      is sufficient
    - Request EPC contract summary, construction schedule, and contingency reserve
      under NDA; interview project finance advisors on likely cost overrun range;
      compare to SMR first-plant analogues
  - - Capitalization table and liquidation preferences
    - Private company; investor rights agreement, voting agreement, and liquidation
      waterfall are not public; investor names confirmed but preferences unknown
    - Liquidation waterfall directly affects equity holder recovery in bear and base
      scenarios; preference overhang could eliminate common equity value entirely
      in distress
    - Request capitalization table, investor rights agreement, and voting agreement
      under NDA from Helion; compute liquidation waterfall at bear-case valuation
      scenarios
  - - Series G terms and investor composition
    - Series G not yet announced; timing and size unknown; likely required 2026-2027
      before Orion peak construction
    - Series G valuation is the next externally verifiable institutional confidence
      signal; a down-round would trigger thesis-break; a flat or up-round would sustain
      the base case
    - Monitor for announcement; when announced, request term sheet, lead investor
      identification, and use-of-funds disclosure; compare implied valuation to Series
      F mark
  notes: 'Five diligence items are prioritized by materiality to the investment thesis.
    Items 1-3 are blocking diligence items that should be completed before any new
    capital commitment. Items 4-5 are material but can be addressed on a parallel
    track. All five items require NDA-protected data room access from Helion management.

    '
  claimRefs:
  - CV031
