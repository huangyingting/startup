- id: TV004
  title: Comparable Valuation Table
  columns:
  - Comparable
  - Type
  - Valuation / Status
  - Helion Premium
  - Relevance to Helion
  - Key Limitation
  rows:
  - - Commonwealth Fusion Systems (CFS)
    - Private fusion (SPARC tokamak)
    - '$1.8B Series B-equivalent (2021); has not re-raised publicly since'
    - 3.0x Helion premium at Series F
    - Closest peer on technology maturity and private-market stage; MIT-affiliated;
      government-contracted
    - Different fusion approach (tokamak vs. FRC); no signed PPAs; pre-commercial
      milestones at earlier stage than Helion Polaris
  - - TAE Technologies
    - Private fusion (beam-driven field-reversed configuration)
    - '$1.2B total raised ($880M Series H equivalent, 2021); no re-raise announced'
    - 4.5x Helion premium by implied valuation at Series H
    - Established long-duration player with Chevron and Google backing; operational
      longer than Helion
    - No signed commercial PPAs; revenue model unproven; different physics path;
      recent focus on medical applications signals pivot risk
  - - Zap Energy
    - Private fusion (z-pinch)
    - '$130M total raised; Series B in 2022'
    - ~42x Helion premium by capital raised; no public valuation
    - Shows capital-efficiency range of early-stage fusion sector; demonstrates that
      some approaches require far less capital
    - Much earlier development stage; limited physics milestones disclosed; no PPAs;
      not a direct valuation comparable
  - - General Fusion
    - Private fusion (magnetized target, steam compression)
    - '$300M+ raised over 20 years; shut down December 2024'
    - Cautionary analog — same capital range as earlier Helion rounds
    - Most important adverse comparable; demonstrates that $300M+ over 20 years can
      be insufficient without physics breakthrough; validates bear-case risk
    - Company no longer operating; no PPAs ever executed; different approach; failure
      underscores binary outcome risk
  - - NuScale Power (SMR)
    - Public small modular reactor (utility/IPO)
    - Market cap ~$800M (2024 post-UAMPS contract loss); IPO'd at $1.8B equivalent
    - 6.7x Helion premium at NuScale post-collapse; near-parity at IPO
    - Best public comparable for firm carbon-free baseload at hyperscaler scale;
      serves same addressable market; illustrates regulatory and customer risk
    - Cash-flow-positive public utility-adjacent model; NuScale lost lead customer
      and stock collapsed from $18 to <$2; illustrates valuation fragility of pre-revenue
      firm baseload companies
  - - Constellation Energy (reference)
    - Public nuclear utility / power operator
    - Market cap ~$70B (2025); power marketer in Microsoft PPA
    - Reference only — 13x larger than Helion implied fleet value at bull case
    - Major utility PPA buyer and power marketer; sets scale benchmark for mature
      nuclear power operations; Helion bull case implies Helion as a Constellation-scale
      business
    - Cash-flow positive, regulated utility; incomparable business model stage and
      risk profile; included only as aspirational scale reference
  notes: "Comparable set is partial; no directly analogous company exists at the\
    \ same technology stage (private fusion with signed PPAs). Valuations for private\
    \ peers are as of their last disclosed funding rounds and may not reflect current\
    \ marks. NuScale is included as the best available public proxy for firm low-carbon\
    \ baseload but is not a fusion company. All \u2018Helion Premium\u2019 figures\
    \ are illustrative estimates based on public data.\n"
