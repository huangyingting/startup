  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "secondary-market-valuation"
      missingEvidence: >
        Confirmed post-money valuation from Helion or primary source documentation of Series F
        closing terms; secondary market pricing from Sacra and Contrary Research provides
        estimates but no primary disclosure of the actual post-money valuation exists.
      whyItMatters: >
        Without confirmed post-money valuation, entry discipline analysis rests on estimated
        secondary data that could be materially wrong, changing the risk-reward calculus
        for any follow-on investment decision.
      diligencePath: >
        Request directly from Helion IR under NDA; review any SEC filings from Permira or
        co-investors that might disclose Helion investment values; monitor Helion statements
        for any valuation reference in media or conference appearances.
      relatedQuestionRefs: [QV014, QV015]

    - type: missing-source
      severity: material
      topic: "cap-table-preference-stack"
      missingEvidence: >
        Full Series F capitalization table including share classes, liquidation preferences,
        anti-dilution provisions, ratchets, and pay-to-play terms; none publicly disclosed.
      whyItMatters: >
        Preference stack determines return distribution in sub-bull exit scenarios; anti-
        dilution provisions affect Series F investor recovery in a down-round; material for
        any investment decision at all entry levels.
      diligencePath: >
        Request from Helion CFO under NDA as part of formal Series G due diligence process;
        standard requirement for any institutional investor participating in a follow-on round.
      relatedQuestionRefs: [QV016]

    - type: missing-source
      severity: material
      topic: "openai-binding-status"
      missingEvidence: >
        No binding term sheet, executed letter of intent, or heads of terms for the OpenAI
        multi-gigawatt fusion power framework has been publicly confirmed; all coverage is
        based on anonymous sources reporting early-stage discussions as of May 2026.
      whyItMatters: >
        If OpenAI converts to binding terms it is the largest single upside catalyst; if
