      - number: '4.4'
        title: 资本充足性与现金跑道
        blocks:
          - type: paragraph
            body: >
              Helion 已分六轮累计完成约 $1.425 billion 股权融资。Series E（$500 million，November 2021）由 Sam Altman 个人 $375 million
              投资领投，OpenAI 等共同参与。Series F（$425 million，January 2025）包括 Nucor 的战略参与（$35 million）以及多类机构和个人投资者，投后估值 $5.425
              billion。Nucor 投资在 Nucor October 2023 SEC 8-K 文件中得到确认，文件把「September 2023 投资 Helion Energy 以开发 500MW
              聚变电站」列为公司可持续行动的一部分。September 2020 的 Series D（$40 million）曾把公司估值定在 $1.25 billion。

              Helion 没有披露当前现金余额、月度烧钱速度或现金跑道。根据公开指标——员工数、建设时间表、研发强度——我们估计年度现金消耗在 $150–300 million 区间。以中值（$225
              million/year）计算，Series F 的 $425 million 融资款扣除费用和此前支出后，可从 January 2025 交割起支撑约 18–24 个月，延伸到 2026
              年中至年末。这一估计意味着 Helion 需要在 2026–2027 年 Orion 建设高峰期之前或期间完成下一轮融资——很可能是 Series G。

              Helion 没有公开披露债务或信贷额度。Orion 项目融资也尚未宣布。考虑到项目的监管和技术画像没有先例，Polaris
              展示净电力输出前，传统项目融资可能难以安排；近期公司很可能继续依赖股权资本。Microsoft PPA 的罚则结构形成金额未披露的或有财务负债，但 CEO David Kirtley
              将其称为「带有财务罚则的约束性协议」，说明下行敞口并不轻。Helion 最大投资者（Altman）、最新潜在客户（OpenAI）和治理变化（Altman
              退出董事会）之间的战略绑定，需要持续监控是否出现利益冲突或依赖集中。
