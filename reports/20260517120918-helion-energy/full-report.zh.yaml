      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >
              Helion 由四位科学家和工程师在 2013 年创立：David Kirtley（CEO）、Chris Pihl（CTO）、George Votroubek（首席科学家）和 John
              Slough（名誉联合创始人）。四人都深耕等离子体物理和聚变装置设计，背景可追溯到华盛顿大学和国家实验室的研究。创始团队少见地同时具备学术聚变专长和工程优先思维。

              David Kirtley 以亲自下场的迭代工程理念领导公司——本人参与车间里的聚变机器测试——并在十二年里把 Helion 从一个小型学术衍生项目带到 $5.4B 估值企业。CTO Chris Pihl 负责
              FRC 等离子体路线和原型开发的技术路线图。George Votroubek 继续以首席科学家身份领导等离子体物理研究。

              商业化提速后，管理层明显扩充。Pragav Jain 约在 2024 年中从 Waymo（Alphabet）加入担任 CFO，意味着公司转向更强的商业和财务纪律。Scott Krisiloff
              任首席商务官；Sachin Desai 任总法律顾问；Savanna Thompson 任首席业务运营官。OpenAI CEO、Helion 最大个人投资人 Sam Altman 自 2015 年起担任执行主席
              / 董事会主席——这段关系始于 Altman 担任 Y Combinator 总裁期间，Helion 被招入 Y Combinator 2014 夏季批次。Altman 此前在多个轮次向 Helion 个人投资
              $350M。Kirtley（CEO）和 Altman（董事长）的影响力高度集中，给工程推进和后续融资连续性带来关键人风险。
