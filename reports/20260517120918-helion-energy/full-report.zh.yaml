      - number: '8.6'
        title: 最终尽调问题与投资建议
        blocks:
          - type: paragraph
            body: >
              对 Helion Energy 的总体投资建议是跟踪 /
              继续研究，置信度为中等，二元风险评级为高。该论点可信、有技术根基、也有商业差异化，但在当前隐含估值水平下，证明还不足以支持强信念资本投入。最重要的单一跟踪催化剂，是 Polaris 机器在 2026 年预期实现
              Q_electrical 大于 1。通过同行评议论文或第三方等离子体诊断审计独立确认这一里程碑，而不是公司新闻稿，将是投资立场转向更建设性的主要升级触发因素。如果 Series G 投前估值高于
              $8B，入场必须同时满足：Q 大于 1 已证明，且 NRC Orion 许可证申请已提交，且 Microsoft 交付时间线确认按计划推进。任何强信念买入建议前，还需要六项最终尽调要求。第一，由 PPPL 或
              GA Technologies 等具备资质的核物理组织，对 Polaris Q 大于 1 数据进行独立等离子体审计。第二，完整 Microsoft PPA 罚则时间表和重谈条款。第三，完整 Series F
              资本结构表，显示股票类别、清算优先权和反稀释条款。第四，可信的 Orion 建设成本估算，并配有固定价 EPC 投标或第三方工程验证。第五，Orion 电站的 NRC
              预申请会议纪要或任何监管函件。第六，OpenAI 多吉瓦框架讨论的当前状态，包括是否已签署条款清单或意向书。投资 KPI 记分卡图以 0-10 分制总结了从市场机会到证据质量的八个维度表现。Helion
              的风险回报极不对称，熊市情景接近归零，牛市情景则可能带来颠覆性回报；对高风险承受能力、长周期投资者而言，这足以支持持续研究关注，并在二级市场保留跟踪仓位。最终尽调问题表列出了每个问题对应的缺失证据、重要性和尽调路径。
