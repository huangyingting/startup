              Nucor 同时作为 Series F 投资方和 500 MW PPA 签署方，是有说服力的市场信号。EAF 钢铁生产需要全天候电力，间歇性会造成惩罚。到 2030 年工业脱碳市场投资轨迹达到
              $250B，说明系统性需求正在转向清洁基荷。Helion 在钢铁脱碳中的定位，为全球其他 EAF 生产商提供了可复制模板。
