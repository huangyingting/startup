companyProfile:
  summary: >-
    Helion Energy, Inc. 是一家位于华盛顿州埃弗里特的核聚变公司，2013 年由 David Kirtley（CEO）、Chris Pihl（CTO）、George Votroubek（首席科学家）和 John
    Slough 创立。公司采用场反位形（FRC）等离子体路线开发 磁惯性聚变，关键差异在于借助法拉第感应直接取电——目标是比传统蒸汽轮机路线效率更高。Helion 现有装置 Trenta（第 7 代）在 2023 年实现 150M°C
    等离子体温度。下一台装置 Polaris（第 8 代）正在埃弗里特建设，目标是实现净能量增益（Q>1）。2023 年 5 月，Helion 与 Microsoft 签署全球首份商业聚变购电协议，承诺到 2028 年交付
    50MW。2025 年 1 月，Helion 完成 $425M Series F 轮，投后估值 $5.425B（累计融资：$1B+），Sam Altman（执行主席）参投，新投资方包括 Lightspeed 和 SoftBank
    Vision Fund。Nucor Steel 已签署意向书，拟长期采购 500MW 聚变电力。公司尚未产生收入；所有收入都取决于 Polaris 实现净能量增益以及商业规模部署。
