      - number: '1.4'
        title: 技术里程碑与原型开发
        blocks:
          - type: paragraph
            body: >
              创立以来，Helion 已建成并运行七台聚变原型机，遵循快速迭代理念，在压缩时间表内建造、测试、学习。第六代原型 Trenta 于 2019 年完成，并在约两年里几乎每天运行——执行超过 10,000
              次高功率脉冲，维持真空运行 16 个月。Trenta 让 Helion 成为第一家实现 100 million°C（9 keV）体离子温度的私营聚变公司；这一温度通常被视为商业门槛等离子体温度。Trenta 于
              2023 年 1 月停止运行。

              第七代原型 Polaris 代表了重要工程进步：磁体更强，脉冲频率最高比 Trenta 快 100x，并使用内部制造的更高电压电容器。Polaris 于 2024 年底开始运行，并在 2026 年 1
              月成为第一台证明可测量氘-氚（D-T）聚变的私营资金聚变机器。2026 年 2 月，Polaris 达到 150 million°C 等离子体温度——创下私营部门新纪录，并比商业门槛高 50%。Helion
              也是第一家获得华盛顿州卫生部监管批准、可持有并使用氚开展聚变能源演示的公司。

              Polaris 之外，Helion 还在华盛顿州 Malaga 的场址同步开发 Orion——其第一台商业规模机器。为满足 2028 年 Microsoft 交付承诺，Orion 建设已于 2025 年 7
              月启动。商业路线的关键技术属性包括：脉冲式非点火（避开持续点火的工程复杂度）、通过法拉第感应直接回收电力，以及商业配置中的氘-氦-3 燃料循环（氦-3 通过内部 D-D 聚变产生）。
