      - number: '8.4'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Helion 的可比样本很薄，也并不完美，因为一家拥有带罚则约束性客户合同的私营商业聚变公司没有先例。私营聚变领域内，Commonwealth Fusion Systems 在 2021 年 Series B
              融资约 $1.8B，并在 2024 年前继续获得追加资本，是技术层级上最接近的可比公司。CFS 使用高温超导托卡马克技术，目标是净等离子体增益，但未披露任何带罚则条款的商业 PPA；其隐含私募估值估计约
              $4B。Pacific Fusion 2024 年在早期商业化前阶段融资 $900M，采用与 Helion 相似的脉冲磁惯性聚变，没有商业 PPA 或客户合同；鉴于缺少客户验证，它应相对 Helion
              折价。TAE Technologies 已用场反向构型路线融资超过 $1.3B，是机器架构上最接近 Helion 的同行，估计隐含估值 $1-2B，体现了 Helion 独有商业 PPA
              溢价。公开先进核能公司中，NuScale Power 给收入前新型核能公司提供了警示样本：它在 2023 年取消首个美国商业项目，市值较 SPAC 上市高点压缩超过 80%。Springer Journal of
              Fusion Energy 和 arXiv 上 Kirtley 及同事发表的论文，为 FRC 等离子体物理提供了技术深度，也构成 Helion 科学可信度的估值输入。收入前聚变的估值方法必须依赖里程碑概率加权项目
              NPV、可比私募轮倍数和期权价值模型；标准收入或 EBITDA 倍数不适用。在 $3-5B 隐含估值、且拥有全球唯一带罚则商业聚变 PPA 的情况下，鉴于不对称上行潜力，Helion
              相对同行的溢价有其防守性。可比估值表和估值敏感性图给出了完整同行细节和敏感性分析。
