      - number: '6.3'
        title: Nucor — 工业客户兼共同投资方
        blocks:
          - type: paragraph
            body: >
              Nucor Corporation 是按收入计美国最大钢铁回收商（年收入约 $35 billion），也是美国最大电弧炉（EAF）钢企。September 2023，Nucor 宣布与 Helion
              达成一项合并投资和 500 MW 聚变电力协议。Nucor 直接向 Helion 投资 $35 million（可能是 Series F
              附近的一笔分批融资，也可能是单独战略投资），同时承诺在其一家钢铁设施承载一座 500 MW Helion 聚变电站，目标约在 2030 年运营。Hogan Lovells
              就这一开创性法律结构提供建议，把客户和投资人角色合并到同一关系中。

              Nucor 的战略理由直接指向 EAF 运营脱碳。EAF 炼钢使用废钢和电力，而不是煤炭，因此排放已低于碱性氧气炉（BOF）炼钢。不过，其采购电网电力的碳强度仍是重要排放来源。聚变电力将降低 Nucor 的
              Scope 2 排放，支撑其可持续目标，并可能在低碳供应链能拿到溢价的钢铁市场提供长期竞争优势。共同投资结构把 Nucor 的财务激励与 Helion 成功绑定，降低了纯承购协议的交易对手风险。

              采用指标仍处于商业化前：500 MW 电站不存在，没有电力交付，2030 年时间表取决于 Polaris 展示净能量增益，以及 Orion 从 50 MW
              扩到商业运行。留存指标（NRR、GRR、流失率）不适用于交付前协议。Nucor 协议的耐久性取决于技术里程碑，也取决于 Nucor 是否继续信任 Helion 路线图。$35M 共同投资带来有意义的绑定，但相对于
              Nucor 的 $35B 收入基数并不重大，说明 Nucor 更可能把它视为研发合作对冲，而不是核心运营承诺。
