      - number: '8.7'
        title: 附录材料
        blocks:
          - type: callout
            title: Q>1 是唯一关口事件
            body: >
              每一个估值情景、退出路径和尽调升级条件，都卡在 Polaris 机器上 Q_electrical 大于 1 的独立确认。没有其他里程碑可以替代已证明的净能量增益，Nucor 开发协议不行，OpenAI
              讨论不行，Polaris D-T 温度里程碑也不行。在 Q>1 得到独立确认前部署资本的投资者，承担的是一笔未被定价的二元技术赌注。建议姿态是，在形成强信念判断前、接受任何高于 $8B
              投前估值前，先等待这一里程碑。
