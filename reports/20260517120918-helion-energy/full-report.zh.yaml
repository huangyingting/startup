      - number: '6.5'
        title: 集中度风险、合同耐久性与扩张策略
        blocks:
          - type: paragraph
            body: >
              Helion 的客户集中度无论按什么口径都极端。两个客户——Microsoft 和 Nucor——代表 100% 已知商业承诺。其中 Microsoft 是带财务罚则的约束性协议；Nucor 是开发阶段协议。若
              Microsoft PPA 交付失败，将触发财务罚则，损害 Helion 面向所有未来潜在客户的信誉，并很可能引爆资本危机。承购风险没有在多个买方、地域或合同结构之间分散。

              没有完整 PPA 条款，很难评估合同耐久性。Microsoft 协议带有罚则结构，从 Microsoft 角度看说明合同有耐久性——它设计成能约束 Helion
              不愿支付的情形，因此代表买方真正的长期承诺。不过，不可抗力条款、技术失败除外条款和提前终止条款（如有）仍未知。Nucor 协议作为开发阶段交易，考虑到 2030
              年目标，很可能给双方都保留更多弹性，但具体终止权、罚则和基于里程碑的闸门没有公开披露。

              扩张策略很清楚：拿下超大规模云厂商和工业锚定客户，把 Microsoft PPA 用作标杆，并在商业运营被证明后加速成交。不过，在交付第一 MWh
              之前，所有扩张都仍是假设。采购摩擦很大：每笔交易都需要定制选址、环境许可、电网互联协议和双边 PPA 谈判。OpenAI 报道说明管线活跃，但缺少确认和交易结构细节。任何投资人都应把 Helion
              客户簿视为一家单合同企业（Microsoft PPA），外加一个管线阶段（Nucor 开发交易）和一次投机性对话（OpenAI），没有收入，也没有交付记录。
