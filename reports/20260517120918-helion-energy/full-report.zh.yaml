      - number: '4.3'
        title: 成本结构与单位经济性
        blocks:
          - type: paragraph
            body: >
              Helion 的成本结构由三项主导：人力资本、Orion 电站资本开支，以及 Polaris 和配套技术研发。截至 early 2026，公司约有 350
              名员工，按西雅图走廊深科技工程人才的竞争性薪酬估算，全口径人员成本为每年 $85–120 million。Orion 建设成本据报道约 $400 million；这是首台套估算，偏差很可能很大。Polaris
              研发、Everett 园区和 Malaga 电站场址的设施成本、HERCULES 资助流出，以及常规管理及行政（G&A）合计后，2025–2026 年总年度运营支出很可能被推到每年 $150–300
              million 区间。

              对商业化前聚变公司来说，单位经济性根本无法计算。没有产品售出，没有产能存在，关键成本项——每次脉冲材料消耗、磁体更换周期、氚/氘采购、直接能量转换系统维护——要么是自研保密，要么仍属推测。Helion
              称直接法拉第感应可把聚变能转为电力，效率可能超过 60%，高于蒸汽轮机循环的
              30–35%；若商业规模下成立，这会形成结构性成本优势。但商业规模效率还没有独立验证发表。卖出第一度电之前，毛利率不存在，最早也可能要到 2028 年。

              营运资金需求很低（没有库存、没有应收账款），但资本开支强度极高：每座新电站都很可能需要数亿美元投入专用磁体、脉冲功率系统和基础设施。若要在 2030 年前满足 OpenAI 5 GW 目标，需要约 100 座
              Orion 规模电站，意味着累计资本开支数百亿美元——远超任何私营聚变公司当前资本底座。这引出根本性的资本结构问题，现有公开证据回答不了。
