      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              自创立以来，Helion 已通过至少七轮融资累计获得超过 $1B 资金。早期资金包括 NASA、DOE 和 DARPA 的政府资助，随后在 2014 年引入 Y Combinator 和 Mithril
              Capital 等私营风险投资。进入 2020 年代初，随着聚变商业可行性越来越可信，公司的融资轨迹明显加速。

              2021 年 11 月的 Series E 轮融资 $500M，规模本身醒目，Sam Altman 还亲自牵头组织投资，因此更受关注。该轮投后估值约 $2.2B。最近披露的一轮是 2025 年 1 月
              Series F，融资 $425M，新投资方包括 Lightspeed Venture Partners、SoftBank Vision Fund 2 和一所未具名大型大学捐赠基金，老股东包括 Sam
              Altman、Mithril Capital、Capricorn Investment Group、通过 Good Ventures Foundation 投资的 Dustin Moskovitz，以及
              Nucor。Series F 被描述为超额认购并扩大规模。Series F 后投后估值为 $5.425B，累计融资超过 $1B。Nucor 的参与兼具战略属性（未来 500 MW 客户）和财务属性（2023 年
              9 月宣布直接投资 $35M）。

              公司尚未产生收入；Series F 旨在支持公司运营到目标中的 2028 年商业部署。二级市场指标显示隐含估值可能高达 $15B，但公司验证过的投后估值仍是 2025 年 1 月该轮的 $5.425B。
