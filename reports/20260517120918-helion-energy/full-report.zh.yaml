            body: >
              FIA 2025 报告显示，53% 的聚变公司预计到 2035 年实现并网发电——比 Helion 2028 年目标晚七年。Helion 的激进时间表是离群值。尽管 Helion 的里程碑（2026 年 1
              月首次私营 D-T 聚变、150M°C 等离子体温度）是真实的技术进展标记，但其商业时间表与行业共识之间的差距，放大了投资者面对的技术和可信度风险。
