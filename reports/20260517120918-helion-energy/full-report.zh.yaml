  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览与分层
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Helion Energy 没有付费客户。公司的全部商业管线由收入前协议和据报道的谈判构成。商业模式瞄准需要大规模基荷无碳电力的大企业买方：AI
              超大规模数据中心、能源密集型工业制造商，以及潜在公用事业公司。共同点是，买方需要 24/7 清洁电力，规划周期长，且规模足以支撑一座专用或共址聚变电站。

              买方始终是承担电力承购义务的实体（Microsoft、Nucor）；用户是消耗电力的工业流程或数据中心负载；付款方也是同一实体，因为这些是直接双边
              PPA，并非通过公用事业中介。这里没有消费者分层，没有经销商分销，也没有市场或平台渠道。收入一旦出现，将由容量费和按交付 MWh 收取的电量费共同构成，但两份现有协议的确切定价都未公开披露。

              从地域看，所有已知客户都在美国，这限制了近期跨境多元化。从垂直行业看，当前管线覆盖 AI/云基础设施（Microsoft）和电弧炉（EAF）钢铁制造（Nucor），超大规模
              AI/计算（OpenAI，未确认）是第三条垂直线。Nucor 这类工业客户的需求画像不同于数据中心客户：前者需要极高利用率的连续基荷，对停电容忍度低；后者看重 24/7
              无碳电力，以履行可持续承诺。客户获取模式是直销 B2B 大企业交易，前置周期多年，双方高管层都要参与。
