      - number: '3.3'
        title: 竞争差异化与 Helion 护城河
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Helion 的竞争差异化建立在三项结构性优势上，其他私营聚变公司尚未复制：

              第一，商业 PPA 领先。Helion 是唯一签署了带罚则商业购电协议的私营聚变公司。Microsoft PPA（到 2028 年 50
              MW）如果交付失败将触发财务罚则——没有竞争对手接受过这种硬约束问责机制。Nucor 协议（到 2030 年 500 MW）增加了一个具有共同投资方一致性的工业锚点。这些 PPA
              形成客户特定收入锁定和声誉杠杆，使 Helion 成为近期工业客户评估聚变时的默认选择。

              第二，FRC 磁惯性直接转换。Helion 的脉冲式场反位形（FRC）路线将两个等离子体团加速到 1 million mph，压缩到 >100
              million°C，并根据法拉第定律，从膨胀等离子体诱发的磁通变化中直接回收电力——绕开所有托卡马克和大多数其他竞争对手使用的蒸汽轮机循环。这条直接转换路径在理论上具有效率优势（往返效率可能
              >60%，而蒸汽轮机约 35–40%）、机械复杂度更低，并完全不需要蒸汽循环。Helion 的 D-He3 商业燃料计划（近无中子、中子更少）进一步降低材料活化，并支撑长期电站经济性。没有其他私营聚变公司同时组合
              FRC、直接转换和商业规模客户承诺。

              第三，原型节奏与技术去风险。Helion 已建成 7 台能力逐步提升的原型机——数量超过任何其他私营聚变公司。2026 年 1 月，Polaris 成为第一台且唯一一台实现 D-T
              聚变的私营资金机器，等离子体温度达到 150 million°C（私营聚变最高）。该里程碑获得外部验证，为 Helion 提供了大多数尚无 PPA 的竞争对手所缺少、可核验的技术去风险凭证。

              TAE Technologies 同样采用 FRC 路线，并已建造 5 代装置（加上 Norm 现在为 6 代），但在燃料循环（p-B11 更难）、能量转换（计划使用蒸汽轮机）和商业阶段（无
              PPA）上分叉。CFS 同样追求早期商业化，并拥有更强资金和机构背书，但采用托卡马克 + 蒸汽循环，也缺少绑定客户承诺的商业客户。Pacific Fusion
              仍处早期，尚无已演示等离子体里程碑，且资金按里程碑解锁，而非可自由部署。

              Helion 护城河的关键脆弱点：（1）净能量增益尚未公开证明；Polaris→Orion 技术转换是主要执行风险。（2）TAE 仅靠 NBI 的 FRC 突破，在共同的 FRC 空间里代表真实 IP
              新意——如果 TAE 按竞争性时间表实现能量增益，它可能在 2030 年代中期争夺工业锚定客户。（3）如果 Helion 的 2028 年 Microsoft 交付延误，CFS 的 ARC 或某个 SMR
              可能拿下 Microsoft 的下一份合同。
