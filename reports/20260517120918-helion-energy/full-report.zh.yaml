  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与结构
        blocks:
          - type: paragraph
            body: >
              Helion Energy 处在两条宏观趋势的交汇处：全球电力市场结构性转向无碳发电，以及 AI 时代数据中心和难减排工业脱碳推动的稳定、可调度基荷电力需求加速。Helion
              最宽口径的总可用市场（TAM）是全球电力市场——每年约 $3.8T，2025 年用电量约 28,200 TWh（IEA）。更精确地说，Helion 的相关市场是无碳、稳定 / 可调度、可 24/7
              供电且不受间歇性影响的基荷电力子市场。该市场排除间歇性可再生能源（太阳能、风电），是能获得更高价值长期合同的高端细分。

              该市场中的现状替代品包括先进核裂变（SMR 和大型电站）、带碳捕集与封存（CCS）的天然气、与可再生能源配套的长时储能，以及地热。按规模化后的 Helion $0.01/kWh
              目标看，这些方案没有一个能与聚变的预计成本竞争，但各自面对的障碍和时间表不同。相邻市场包括工业过程热、绿氢生产和离网微电网供电——这些行业都重视紧凑、连续的能源来源。
