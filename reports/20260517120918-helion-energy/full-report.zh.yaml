              在做出投资或尽调承诺前，应要求提供：（1）当前现金余额和月度烧钱速度；（2）Microsoft PPA 条款清单，包括价格和罚则表；（3）Orion
              资本开支预算和建设进度；（4）带清算优先权的股权结构表；（5）Helion 的 ARPA-E 获奖历史和任何待定政府资金。这五个数据点是为商业化前聚变公司承保资本充足性和收入质量所需的最低信息。
