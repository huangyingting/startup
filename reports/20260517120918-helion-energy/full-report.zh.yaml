      - number: '8.2'
        title: 融资背景与估值入场点
        blocks:
          - type: paragraph
            body: >
              Helion 最近一次披露的融资，是 2025 年 1 月 28 日交割的 $425M Series F 轮，由 Permira 领投，既有投资者参投。Series F 新闻稿未披露投后估值；Sacra
              和私募市场分析师数据给出的二级市场估算显示，2025 年初隐含估值在 $3B 至 $5B 区间，但这些估计未经公司确认，应视为指示性参考，而不是已验证的估值点。自成立以来所有轮次累计融资估计约 $2.5B，包括
              2021 年 11 月报道的 $500M Series E。公司收入为零，完全处于商业化前阶段；因此，全部估值都取决于里程碑，反映投资者对 Q 大于 1 净能量增益和 2028 年前成功向 Microsoft
              交付商业电力的概率加权预期。按员工数和资本强度分析推断，Helion 年烧钱速度估计为 $200-300M，意味着 Series F 交割后大约有两年现金跑道，Series G 融资很可能需要在 2026 或
              2027 年完成。潜在投资者必须守住入场纪律：如果 2026 年证明 Q 大于 1，当前 $3-5B 隐含估值或许站得住；但如果 Q 大于 1 尚未证明，Series G 投前估值高于 $8B
              就会很差。Helion 没有公开已知债务、项目融资或结构化融资安排。ARPA-E 在 Alpha、Bethe 和 Hercules 项目中提供了非稀释性政府拨款，代表联邦层面对 FRC 路线的累计验证。Nucor
              SEC 文件确认，Nucor 在开发协议之外直接股权投资 Helion，与公司最大已承诺工业客户建立了战略资本关系。ITER 公开聚变里程碑为公共部门聚变成本和进度纪律提供了有用时间线基准，也凸显 Helion
              相比历时数十年的政府项目，在 2028 年商业交付目标上的非凡激进程度。
            claimRefs:
              - CV009
              - CV010
              - CV011
