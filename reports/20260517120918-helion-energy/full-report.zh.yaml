  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Helion Energy 仍是商业化前公司，产品收入为零。它的收入模型完全押在已签购电协议（PPA）项下未来交付电力上。Microsoft PPA 是全球首份商业聚变能源合同，要求
              Helion 到 2028 年向 Microsoft 数据中心交付至少 50 MW 聚变电力，并设置一年爬坡期；未交付则触发财务罚则。Nucor PPA 于 November 2023 宣布，同时 Nucor 对
              Helion 做出 $35 million 战略投资；协议目标是在 2030 年前为工业炼钢应用提供 500 MW 聚变电力。两份协议合计形成 550 MW
              已承诺承购义务，是全球最大的已签约聚变管线；但所有收入都在未来，取决于技术和建设里程碑，而这些里程碑此前没有任何公司跑通过。

              March 2026，Helion 确认正与 OpenAI 深入谈判，潜在协议将在 2030 年前提供最高 5 GW 电力，并在 2035 年前扩至 50 GW。这份潜在协议的规模将比现有 PPA
              管线高出两个数量级，但仍未签署；除 Microsoft 和 Nucor 外，Helion 未确认任何新增已签客户协议。另一个变化是，Sam Altman 作为 Helion 最大个人投资者、前董事会成员，已于
              March 2026 退出董事会，以处理其同时担任 OpenAI CEO 和 Helion 支持者带来的利益冲突观感。

              附带收入线索包括外部研究合作。April 2026，Helion 宣布 HERCULES 计划，到 2028 年投入超过 $17 million，资助 20 所大学和国家实验室的 25
              个提案，推进配套技术。HERCULES 是成本，不是收入——Helion 负责发放资助——但它体现了支出纪律，也在围绕知识产权搭建生态。非稀释性公共资金也在补充资本：ARPA-E 自 2014
              年以来已向商业聚变技术投入约 $134 million，带动全行业超过 $1.5 billion 私人后续融资；April 2026，ARPA-E 又宣布将在 18 个月内追加 $135
              million。Helion 过往获得的具体拨款没有公开列项，但公司的 FRC 工作与 ARPA-E 公布的组合方向直接重合。向第三方技术许可并不是 Helion 当前商业模式的一部分；所有电站都由 Helion
              直接拥有并运营。
