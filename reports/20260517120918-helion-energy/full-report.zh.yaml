      - number: '5.3'
        title: 装置代际、里程碑与商业路线图
        blocks:
          - type: paragraph
            body: >
              约 2013 至 2024 年间，Helion 已连续建成七代 FRC 聚变装置，路线清晰地从 Venti（Gen 1）推进到 Trenta（Gen 6），再到 Polaris（Gen
              7）。每一代都瞄准更高的等离子体温度、更长约束时间和更高系统集成里程碑。Trenta（Gen 6）实现 9 keV 等离子体温度——当时任何私营 FRC 装置的最高记录——并展示了 Polaris
              所需的等离子体物理基础。第七代装置 Polaris 于 2024 年在 Helion 的 Everett, Washington 园区投运。February 2026，Helion
              宣布行业首创里程碑：Polaris 达到聚变相关等离子体条件，并通过法拉第感应完成 FRC 聚变脉冲首次直接电转换；BusinessWire 和 Power Magazine 报道了这一成果，NEI
              Magazine 对 NRC 许可里程碑的报道也予以确认。

              下一里程碑是净能量增益（Q>1，即电输出超过电输入），目标为 H2 2026，但尚未公开展示。第八代装置 Orion 是 Helion 首座商业电站：Malaga, Washington 场址已于 July
              2025 破土动工，估计建设成本约 $400 million。Orion 按合同要在 2028 年向 Microsoft 交付 50 MW，独立聚变物理学家认为这一时间表很激进。截至 early
              2026，Helion 约有 350 名员工，同时支撑 Polaris 研发和 Orion 建设。
