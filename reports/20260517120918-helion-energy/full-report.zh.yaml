      截至 2026 年 5 月，Helion Energy 的投资评分卡可直接提交 IC，覆盖八个维度：市场机会、技术证明、客户验证、竞争护城河、财务健康、风险状况、估值支撑和证据质量，按 0-10 分打分。
    layout: standard
    data:
      items:
        - label: 市场机会
          value: 9/10
          note: 清洁能源 TAM 达万亿美元级；AI 驱动需求加速已确认
        - label: 技术证明
          value: 4/10
          note: Q>1 尚未证明；Polaris 2026 年 2 月 D-T >1 keV 是必要条件，但还不充分
        - label: 客户验证
          value: 6/10
          note: 两份 PPA（Microsoft + Nucor）属全球首例；尚未交付，但有罚则背书
        - label: 竞争护城河
          value: 7/10
          note: FRC 加直接转换形成差异化；率先签下 PPA；Kirtley 团队积累深
        - label: 财务健康
          value: 4/10
          note: 资金充足但尚无收入；$10B+ 资本缺口；Series F 后约 2 年现金跑道
        - label: 风险状况
          value: 3/10
          note: 二元技术风险高；2028 年期限紧；Bloomberg 疑虑仍未关闭
        - label: 估值支撑
          value: 5/10
          note: 隐含 $3-5B 估值较合理；若没有 Q>1 独立证明，>$8B 偏贵
        - label: 证据质量
          value: 4/10
          note: 第三方验证有限；没有等离子体审计；股权结构表未披露
