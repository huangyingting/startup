  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    type: comparison
    columns:
      - 情景
      - 关键假设
      - 估值逻辑
      - 概率信号
      - 关键风险
    rows:
      - - 乐观情景
        - Q>1 确认于 2026 年底；Orion 2028 年按期推进；Nucor 2030 年签约束性协议；OpenAI 多 GW 签约；NRC 2027 年发放许可
        - 2030-2032 年通过 IPO 或战略收购，投后估值 $30B-$80B；Series F 投资人以 $3-5B 进入可获 8-20x 回报
        - 低到中；需要连续技术和商业突破，且没有历史先例
        - Orion 建设成本超支；NRC 许可延误；Microsoft 重谈导致承诺容量下降
      - - 基准情景
        - 2026 年底或 2027 年初证明 Q>1；Orion 延后 12-18 个月；Microsoft PPA 重谈；后续融资 $2-5B
        - 到 2031 年持有估值 $12B-$25B；IPO 不早于 2031 年；后续融资带来显著稀释，压低有效回报
        - 中等概率；考虑到仍处于 Q>1 前阶段，且技术和商业并行执行很复杂，这是最可能情景
        - Q>1 延误超过 12 个月会触发 Microsoft 罚则讨论；下一轮融资大幅折价
      - - 悲观情景
        - Q>1 到 2028 年仍未达成；Microsoft 触发罚则条款；下一轮融资失败或严重降价轮
        - $1.0B-$3.5B，主要反映 IP 和专利底价；Series F 和后期投资人几乎全损
        - 存在实质概率，因为 Q>1 尚未演示，且据报道内部存在怀疑
        - 任何 Polaris 物理挫折；Kirtley 离任；降价轮；Microsoft PPA 终止或罚则触发
    notes: |
      所有估值区间均为分析师基于可比公司分析和里程碑条件期望值作出的估计；并非公司指引。概率信号是基于截至 2026 年 5 月公开证据的定性判断。
