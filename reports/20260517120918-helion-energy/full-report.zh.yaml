    blocks:
      - type: paragraph
        body: >-
          本报告基于研究运行期间获取的公开来源，规范日期为 2026-05-17。Helion Energy
          是尚无收入的私营公司，不发布经审计财务报表。所有财务预测都取决于尚未达成的技术里程碑（净能量增益、商业电站建设）。阅读本报告时，应把它视为技术与战略分析，而非财务承销报告。
        claimRefs: []
      - type: paragraph
        body: >-
          估值分析以 Series F 投后 $5.425B（2025 年 1 月）为基础。可比私营聚变公司的估值（CFS 隐含约 $3B，Pacific Fusion 2024 年 Series A 为
          $900M）用于勾勒参照区间。本报告以 2026-05-17 作为规范运行日期。所有技术里程碑声明均来自公司公告，尚未经过第三方核物理审查的独立验证。
