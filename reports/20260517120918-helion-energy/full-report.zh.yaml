      - number: '7.6'
        title: 附录材料
        blocks:
          - type: callout
            title: 净能量增益（Q>1）尚未证明——基础技术风险
            body: >
              截至 2026 年 5 月，Helion 尚未在任何设备上证明净能量增益（Q>1）。整个投资论点——2028 年 Microsoft PPA、Nucor 500 MW 交易、$5.425B Series F
              估值，以及已经开工的 Orion——完全取决于 Polaris 能否在商业窗口关闭前实现 Q>1。这不是程度问题，而是一道二元的通过 / 失败关口。NIF 2022 年 12 月实现 Q>1，但条件是惯性约束，与
              Helion 的脉冲磁惯性 FRC 路线根本不同。全球科学界尚未独立验证 Helion 的等离子体温度里程碑等同于 Q>1，或足以作为 Q>1 的前置指标。如果 Polaris 在 2027 年中前未证明
              Q>1，2028 年 Orion 投运路径基本坍塌。无论其他指标多么有利，投资者都必须把这视为组合中排名第一的风险。
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: Q>1 前开建 Orion 是最大单项投资风险
            body: >
              Helion 2025 年 7 月在华盛顿州 Malaga 为 Orion 破土动工——早于 Polaris 实现
              Q>1。能源基础设施里没有这种商业先例。传统风险管理框架会要求先拿到科学概念验证，再投入数亿美元建设商业电站。Helion 反过来排序，等于押下一笔带杠杆的赌注：如果 Q>1 按期到来，Orion
              施工进展会缩短收入到来的时间；如果 Q>1 推迟或失败，已沉没的建设成本无法收回。Orion 建设投资估计为 $1B+，叠加 Polaris 研发每年约 $150M 的持续烧钱，在未计入任何 Microsoft
              罚款暴露前，Q>1 失败情景下的风险资本总额已超过 $2B。这是 Helion 投资案例的决定性结构风险，任何机构组合模型都需要为它单独设置风险分层。
            calloutType: insight
            claimRefs:
              - CR003
              - CR022
              - CR023
          - type: callout
            title: 客户集中于 Microsoft——单一对手方面临 2028 年罚则暴露
            body: >
              Helion 唯一已签约的购电协议，是 2028 年前向 Microsoft 供应 50 MW 聚变电力。单一客户关系代表 100% 已确认收入承诺，也对应 100% 的 PPA
              罚则暴露集中。具体罚款条款尚未公开披露，但行业标准 PPA 对未能交付的罚则通常包括 $10-50M 的违约金，或带资产索赔的合同终止。Microsoft 有资源强势执行这些条款。Nucor 500 MW
              框架协议提供了管线多元化，但时间线更长（2030+），也有自己的技术依赖。2026 年初报道的 OpenAI 讨论仍属推测，没有约束性承诺。除非在 2028
              年交付窗口前拿到更多独立对手方、规模相当的约束性合同，否则客户集中风险无法缓释。
            calloutType: insight
            claimRefs:
              - CR007
              - CR008
              - CR009
          - type: callout
            title: NRC Part 53 规则结果是 Orion 的二元监管风险
            body: >
              Helion Orion 将成为首个寻求 NRC 运营许可证的商业聚变电站。还没有任何监管路径被端到端跑通过。2024 年最终确定的 Part 53
              框架创建了风险知情的先进反应堆许可流程，但它如何用于聚变——而不是裂变——仍有未解决的技术判断，NRC 工作人员必须逐案决定，没有先例。如果 NRC 要求额外环境影响评估、扩展版安全分析报告，或针对 FRC
              等离子体约束路线提出新的安全系统要求，许可时间线可能比 Helion 的 2028 年目标延后 2-5 年。最坏情况下，Part 53 不利规则或立法变化可能制造需要国会介入的许可障碍。这个监管二元变量不在
              Helion 直接控制之内，也不能只靠技术进展完全缓释。应聘请独立监管法律顾问，评估 NRC 预申请沟通状态和可能时间线。
            calloutType: insight
            claimRefs:
              - CR005
              - CR006
              - CR010
          - type: callout
            title: He-3 自繁殖效率未经商业验证——模型风险
            body: >
              Helion 的商业 D-He3 燃料循环要求反应堆从氘聚变反应中自行繁殖氦-3——这个过程从未在任何规模上得到证明，更不用说达到商业可行所需的效率水平。全球民用 He-3 供应量约为每年 25-30
              kg，成本约 $1,000/克，对 50 MW 设施来说，外部采购 He-3 在商业上不可行。因此，自繁殖效率不是技术选项，而是商业必需。Helion 对 He-3
              繁殖产量的建模尚未得到独立验证，也没有同行评议论文确认其声称的效率预测。如果繁殖效率显著低于预测——Bloomberg 2024 年调查专门提出了这一风险——即使在 D-T Polaris 设备上实现
              Q>1，整个长期商业模型也会失效。这让 He-3 繁殖成为商业路径中隐性的第二道二元关口，虽然没有 Q>1 那么显眼，但若不解决，同样致命。
            calloutType: insight
            claimRefs:
              - CR015
              - CR016
              - CR017
          - type: callout
            title: Series G 前必须用独立等离子体审计解决 Bloomberg 提出的科学疑虑
            body: >
              Bloomberg 2024 年 7 月调查提出了几项具体疑虑：Helion 的科学透明度、直接 Faraday 能量转换效率主张，以及等离子体数据缺乏独立第三方验证。Helion
              尚未以独立科学评审回应，也未发布原始实验数据。这个未解决的可信度缺口，对 Series G 融资构成实质风险：此前未进入的机构投资者（主权财富基金、养老基金、大型家族办公室）会要求独立技术尽调，而 Helion
              当前的不透明状态无法满足。建议的尽调动作，是聘请独立等离子体物理顾问小组（例如 MIT、Princeton Plasma Physics Laboratory 或 Lawrence Livermore NIF
              团队），在 NDA 下审查 Polaris 实验数据，并出具书面技术评估。这个单项动作比其他任何可用缓释手段都更能降低可信度风险，也应成为任何 Series G 领投承诺的条件。
            calloutType: insight
            claimRefs:
              - CR004
              - CR032
              - CR033
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: >
              Helion Energy 的投资命题高度二元，核心是公司能否在 Polaris 机器上证明 Q_electrical 大于 1，并随后在 2028 年前向 Microsoft
              交付商业聚变电力。牛市论点有三根支柱。第一，Helion 的场反向构型磁惯性聚变已经历七代原型机验证，并在 2026 年 2 月实现行业首次 D-T 等离子体里程碑：Polaris 上等离子体超过 1
              keV，且具备净等离子体电流；这是目前技术上展示得最快的商业净能量增益路径。第二，Microsoft 50 MW 带罚则购电协议与 Nucor 500 MWe
              开发协议，合在一起构成全球第一和第二份商业聚变合同，也是其他私营聚变公司尚未匹配的约束性客户证明。第三，如果 Q 大于 1 实现，且 Helion 直接能量转换达到规格，公司目标电力成本低于每 MWh
              $50，这一价格几乎可以挤掉所有既有基荷电源，并对应年规模超过两万亿美元的市场。Fusion Industry Association Global Fusion Industry Report 2025
              估计，2024-2025 年全球私营聚变投资超过 $2.5B，显示战略投资者兴趣广泛。反论点同样强。全球没有任何私营聚变项目实现过 Q 大于 1 的净能量增益。Bloomberg 2024 年 7 月调查提出了
              Helion 等离子体温度数据和内部文化方面尚未解决的疑虑。MIT 和独立核物理学家将 2028 年交付期限形容为惊人。Helion 在证明 Q 大于 1 后，还需要 $10B 或更多额外资本来建设 Orion
              商业电站；这些资本尚未承诺，并会实质稀释所有现有投资者。投资建议摘要表和论点 / 反论点表给出了结构化投资案例摘要。投资建议逻辑图展示了从证据到立场的关键决策链。
