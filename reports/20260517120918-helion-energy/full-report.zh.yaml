      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              三类买方定义了 Helion 近中期商业机会：

              **超大规模数据中心运营商** 是最直接的买方。Meta、Amazon、Google 和 Microsoft 在 2025 年合计占全球企业清洁能源 PPA 活动的
              49%（BloombergNEF），并越来越多签约核能和先进能源，以满足 24/7 无碳能源（CFE）承诺。Gartner 对数据中心电力的预测（2025 年 448 TWh → 2030 年 980
              TWh）意味着到 2030 年约有 530 TWh 净新增需求需要清洁来源。这些买方拥有专门能源采购团队、多年期 PPA 执行能力，也已适应新型结构（Microsoft 的 Helion PPA 和 Three
              Mile Island 重启就是证据）。

              **工业脱碳方**——尤其是电弧炉（EAF）钢铁生产商——构成第二个关键细分。工业部门消耗全球终端能源的 38%，排放直接 CO₂ 的 25%（ResearchAndMarkets）。EAF
              炼钢使用回收废钢和电力，排放仅约 0.3 t CO₂/t steel，相比高炉路线约 2.2 t CO₂/t steel。EAF 采用率正在上升，规划中的新增炼钢产能约 50% 使用
              EAF。Nucor——全球最大的 EAF 运营商——正是这一细分的代表：它与 Helion 签署 500 MW 聚变 PPA，并在 Series F 中投资
              $35M，显示双方围绕脱碳钢铁生产所需清洁基荷电力达成战略一致。

              **公用事业公司和电网运营商** 是聚变成熟后的中期细分。需要新增基荷容量的受监管公用事业公司，以及负责资源充足性的 ISO/RTO，将自然成为 2030 年代数百 MW
              部署的买方。这一细分采购周期更长，且需要监管批准。
