      - number: '6.2'
        title: Microsoft PPA — 锚定客户分析
        blocks:
          - type: paragraph
            body: >
              Microsoft 购电协议于 May 10, 2023 宣布，是 Helion 商业战略的核心，也代表全球首份商业聚变购电协议。在这份有约束力的协议下，Helion 承诺到 2028 年向 Microsoft
              交付至少 50 MW 聚变发电电力，Constellation Energy 担任电力营销方和输电管理方。协议明确规定，若 Helion 未能按期交付，需要向 Microsoft 支付财务罚则。New Atlas
              将这一罚则结构称为「大胆到夸张的一步」，它把原本可能只是非约束性意向书的安排，变成了硬性商业义务。

              Microsoft 的战略理由来自其碳承诺（目标是到 2030 年实现碳负排放、到 2050 年实现无碳）以及 AI 数据中心快速上升的电力需求。公司已把 24/7
              无碳电力列为明确采购优先级，而聚变在理论上是完美解：基荷、零排放、且规模化后不受燃料约束。Sam Altman 同时担任 Helion 董事长和 OpenAI CEO（也是 Microsoft 的 AI
              伙伴），可能推动了早期讨论，但 Microsoft 的战略逻辑并不依赖个人关系。

              Microsoft PPA 的证据质量高，且有多源交叉验证，包括 Microsoft 自身博客、多家一线媒体（NYT、Bloomberg、WSJ、Washington Post）以及 Helion
              官方传播。这份协议真实、有约束力，代表真正的商业里程碑。不过，确切定价、罚金金额、提前终止条款和不可抗力条款都没有公开披露。50 MW 目标相对于典型 Microsoft
              数据中心园区并不大，说明初始合同可能同样是在建立先例、锁定选择权，而不只是马上拿到能源供应。MIT 专家在 2023 年被引述称 2028 年时间表「惊人」且「值得怀疑」，反映出这项商业承诺中仍嵌着科学不确定性。
