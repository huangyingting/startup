      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Helion 的监管和安全状态正从研发转向商业。NRC 已确认围绕 Helion 的 Polaris 设施开展预申请讨论，NEI Magazine 报道 Helion 在 2026 年获得许可，可推进
              Polaris 聚变设施。NRC Part 53 框架——美国首个专门针对聚变的许可框架——截至 May 2026 仍处于最终规则制定阶段，意味着 Orion 商业运营许可证要等 Part 53 定稿且
              Helion 完成完整申请后才能发放。另一个独立问题是，Polaris 运行中 D-T 副反应产生的氚，需要 DOE 和 Department of Health 的单独批准，不依赖 NRC 路径。

              Helion 装置还没有公开发布独立第三方安全审计。Bloomberg 2024 年报道指出，外部专家无法从现有公开数据验证 Helion 的能量收支或安全表现，这是关键透明度缺口。MIT Climate
              研究者指出，2028 年时间表被主流聚变物理学家视为非常激进。Helion 没有发布确认 Q>1 能量增益的同行评审数据，商业规模下的 He-3 增殖比也没有被外部验证。HERCULES 计划到 2028 年向
              20+ 所大学和国家实验室提供超过 $17 million，是主要外部同行评审机制，但截至研究日期，该计划尚未产出公开论文。等离子体控制软件的质量控制文件未公开，Helion 聚变控制系统也没有披露任何 IEC
              61513 等效核软件认证。
