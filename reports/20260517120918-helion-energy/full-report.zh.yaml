      - number: '4.2'
        title: 定价与商业化路径
        blocks:
          - type: paragraph
            body: >
              Helion 与 Microsoft、Nucor 的 PPA 定价都受合同保密约束；两笔交易都没有公开披露每 MWh 价格。New Atlas 对 May 2023 Microsoft PPA
              的调查提到未交付会有「财务罚则」，但没有说明单位金额；行业评论曾引用接近 $0.05/kWh 的未交付电力罚金，但这一数字未经确认。Helion 长期平准化度电成本（LCOE）目标——多份公司材料披露，并被
              New Atlas 文章引用——在商业规模下约为 $0.01/kWh（$10/MWh），大约比燃煤发电成本中位数（~$36/MWh）低 10 倍，也显著低于当前 SMR 估计的 $90–160/MWh。

              商业化路径是直销式企业销售，面向大型工业企业和超大规模数据中心运营商，这些客户需要稳定、长期、超过 50 MW 的基荷电力。这里没有渠道、转售商或分销层；交易直接在高管层 /
              董事会层面完成。获客成本（CAC）无法按传统口径计算；首份同类聚变 PPA 的成交周期很可能牵涉多年技术尽调、监管沟通和高管关系。Microsoft 交易中，Constellation Energy
              是具名电力营销方，负责电网接入和输电服务。

              商业定价曲线取决于未来 Orion 规模和机群规模部署。Helion 没有披露标价，没有公布量折，也没有可分析的已实现收入。若 Microsoft 和 Nucor 的定价被披露，它们将是评估可比聚变 PPA
              经济性的唯一数据点。在 Helion 交付第一度商业电之前，定价质量仍只是公司说法，无法验证。
