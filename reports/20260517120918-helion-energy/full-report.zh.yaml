  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与时间表风险
        blocks:
          - type: paragraph
            body: >
              Helion Energy 最关键的风险是二元且关乎生死：截至 May 2026，Polaris 尚未展示净能量增益（Q>1），而整个商业投资逻辑都依赖这一里程碑。Polaris 在 January 2026
              使用氘-氚燃料实现 150 million degrees Celsius 的世界纪录等离子体温度——这是真正的科学成就——但等离子体温度不是
              Q>1。净能量增益要求聚变能输出超过总能量输入，全球只跨过一次这道门槛（NIF，December 2022），且条件与 Helion 的脉冲磁惯性路线根本不同。Q>1 之外，Helion
              还必须在商业规模下展示直接法拉第能量转换——Bloomberg July 2024 调查专门质疑过这项技术，且没有已发表的同行评审验证。时间压缩非常严苛：Polaris 必须及时实现 Q>1，才能让
              Orion——其建设已于 July 2025、在 Q>1 证明前启动——在 2028 年投运。独立物理学家和 MIT Technology Review 都质疑，在没有工程先例的情况下，12–18 个月内从
              Q>1 走到商业电站是否可行。技术失败或实质延迟会级联到 Microsoft 罚则敞口、融资能力受损和潜在项目收缩。风险热力图（FR001）把技术失败放在组合中最高的严重度—可能性组合。
