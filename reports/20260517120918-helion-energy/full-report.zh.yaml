      - number: '5.4'
        title: 关键依赖、架构与竞争位置
        blocks:
          - type: paragraph
            body: >
              Helion 的技术栈依赖少数关键供应商、监管机构和战略伙伴。最重要的内部依赖是氦-3 增殖过程：He-3 在装置运行中由 D+D
              副反应原位产生，其商业规模产率尚未得到独立确认。外部来看，公司依赖同位素纯氘（商业可得），也依赖 NRC 完成 Part 53 聚变许可规则制定，以便 Orion 取得商业运营许可证。Constellation
              Energy 是 Microsoft PPA 的电网交付伙伴，降低了电网接入执行风险。ARPA-E BETHE 计划和 DOE Fusion Energy Sciences 已为更广泛的 FRC
              与商业聚变生态提供非稀释性研究资金，利好 Helion 的配套技术开发。

              放在竞争格局中，Helion 在商业承诺上领先私营聚变公司：Commonwealth Fusion Systems（SPARC，托卡马克路线）已验证高温超导磁体，但没有已签商业 PPA；TAE
              Technologies 追求氢-硼聚变，仍处于商业化前；Zap Energy 的 Z-pinch 和 General Fusion 的机械压缩路线处在更早商业阶段。Fusion Industry
              Association 2025 报告确认，前一年全球聚变行业投资超过 $2.5 billion，并把 Helion 识别为按累计融资和商业合同管线计算的领先公司。FIA 识别出全球 43
              家私营聚变公司，其中只有 Helion 持有已签商业电力交付义务。
