      - number: '4.6'
        title: 附录要点
        blocks:
          - type: callout
            title: 已签聚变 PPA 形成独特需求侧护城河
            body: >
              Helion 拿下了全球仅有的两份已签商业聚变 PPA——Microsoft（50 MW，2028）和 Nucor（500
              MW，2030）——形成独特的需求侧护城河。没有其他聚变公司拥有带财务罚则的约束性电力合同，这给 Helion 带来竞争对手没有的结构性紧迫感，也支撑了研发投资逻辑。
            calloutType: insight
            claimRefs:
              - CI001
              - CI002
          - type: callout
            title: PPA 定价保密是核心尽调阻塞项
            body: >
              PPA 定价完全保密。若无法披露 Microsoft 或 Nucor PPA 价格，就无法评估收入质量、毛利潜力和罚则敞口。行业评论中流传的 $0.05/kWh 罚金数字若适用于未交付电力且准确，Orion
              延迟时可能形成数亿美元或有负债。这是核心尽调阻塞项。
            calloutType: insight
            claimRefs:
              - CI010
              - CI011
          - type: callout
            title: OpenAI 规模目标意味着异常严苛的制造挑战
            body: >
              从 50 MW（Orion）扩到 5 GW（OpenAI 框架）需要在四年内制造约 100 座 Orion 规模电站。按每座 $400 million 计算，累计资本开支为 $40
              billion——约为公司迄今累计融资的 28x。OpenAI 交易仍属推测，技术难度也异常高；在没有已签协议和可信规模化计划前，不应纳入基准情景财务模型。
            calloutType: insight
            claimRefs:
              - CI004
              - CI005
              - CI030
          - type: callout
            title: 现金余额和烧钱速度仍是未经验证的估计
            body: >
              本分析假设 Helion 的 Series F 融资款（$425M，January 2025）基本仍在账上，且公司年度烧钱约
              $150–300M。这些数字都是未经验证的估计；实际现金余额和烧钱速度可能有显著差异。投资人应把审计财务报表和当前现金流预测作为任何投资决策的前置条件。
            calloutType: insight
