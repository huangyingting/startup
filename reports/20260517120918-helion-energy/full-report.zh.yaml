chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Helion Energy, Inc. 是一家美国私营聚变能源公司，注册并总部位于华盛顿州埃弗里特 75th St SW 1415 号。公司成立于 2013
              年，唯一使命是建成全球第一座商业聚变电站，提供其所说的无限清洁电力。Helion 处于后期私营阶段，运营尚无收入——商业模式是开发并商业化聚变发电机，通过购电协议（PPA）直接向商业客户售电，最终接入电网。

              Helion 的技术围绕磁惯性聚变（MIF）展开，采用脉冲式场反位形（FRC）等离子体路线。系统生成两个 FRC
              等离子体团，将其加速后在压缩腔内合并，并从由此产生的磁通变化中直接回收电力——绕开传统电站使用的蒸汽轮机循环。商业运营计划使用氘-氦-3（D-He3）作为燃料，这一路线可减少中子释放，并支撑高效直接能量转换。公司长期度电成本目标为
              $0.01/kWh；Helion 认为，低燃料成本、高效率和紧凑电站设计能够支撑这一目标。

              公司首个客户是 Microsoft。2023 年 5 月，Microsoft 签署 50 MW PPA，约定从 2028 年开始由华盛顿州一座电站供电（该电站选址在 WA 的 Malaga，2025 年 7
              月开工）。第二个已知客户是 Nucor Corporation，美国最大的钢铁回收企业；Nucor 于 2023 年 9 月同意在其一家炼钢设施托管 500 MW 聚变电站，目标 2030
              年投运。Constellation Energy 在 Microsoft 交易中担任电力营销商和输电管理方。
