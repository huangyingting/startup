      - number: '2.5'
        title: 市场证据缺口
        blocks:
          - type: paragraph
            body: >
              四个市场尽调缺口约束了本分析。第一，Helion 除 $0.01/kWh
              的长期愿景外，尚未披露其电力输出的具体商业定价；首座电站实际售电经济性未知。第二，分析师对“聚变能源市场”的估计高度异质，将研发支出、商业电站收入、供应链价值和投机性预测混在一起——没有权威独立口径。第三，“稳定无碳电力”的
              SAM 边界不精确，因为市场尚未由标准化采购工具或经认证产品类别定义。第四，除 Microsoft 和 Nucor 交易外，买方是否愿意为聚变相对 SMR 或长时储能支付溢价，尚未得到公开验证。
            claimRefs: []
      - number: '2.6'
        title: 展示材料
        blocks:
          - type: callout
            title: AI 用电激增创造稳定无碳基荷的持久需求
            body: >
              数据中心用电激增，是聚变目标市场最强的结构性需求驱动。数据中心用电预计将从 448 TWh（2025）翻倍至 2030 年的 980 TWh（Gartner），AI 优化服务器占该负荷比例从 21% 升至
              44%。这些工作负载需要连续、可调度电力；如果没有海量储能，太阳能和风电无法可靠供给。这为稳定无碳基荷打开了代际机会——也正是聚变提供的东西。Microsoft 愿意签署带财务罚则的
              PPA，验证了超大规模云厂商愿为确定性支付溢价。
