      - number: '6.4'
        title: OpenAI 合作谈判与超大规模云厂商管线
        blocks:
          - type: paragraph
            body: >
              March 2026，GeekWire 和 Power Magazine 报道称 OpenAI 正与 Helion 讨论获取多 GW 聚变电力，其中一篇报道提到 2030 年 5 GW、2035 年最高 50
              GW 的目标——这些数字将远超 Helion 当前规划的商业产能。随着 OpenAI-Helion 合作谈判推进，Sam Altman 于 March 2026 退出 Helion
              董事会，以消除潜在利益冲突。截至 May 2026，双方都没有公开确认交易；尽调中应把它视为未确认且具投机性。

              若 OpenAI-Helion 交易哪怕按报道规模的一小部分得到确认，也会重塑 Helion 的客户集中度和收入潜力。OpenAI
              的电力需求随大语言模型训练和推理工作负载快速增长，使其成为全球需求最高的超大规模电力买方之一。Altman 关系（OpenAI CEO、Helion
              前董事长）既带来机会（可信关系、共同投资人基础），也带来风险（利益冲突、裙带交易观感、自我交易的监管审查）。

              除 OpenAI 外，Helion 的长期客户逻辑是服务一波 AI 超大规模云厂商（Microsoft Azure、AWS、Google
              Cloud）、工业脱碳方（钢铁、水泥、铝）以及潜在受监管公用事业公司。客户获取路径靠关系，而不是产品驱动：没有自助渠道，没有市场，也没有转售商网络。每一笔大交易都需要高管层参与、多年谈判，以及定制选址和电网互联规划。这给规模化获客设置了高门槛。反过来，如果
              Helion 完成 Microsoft PPA，随之而来的标杆客户和概念验证将大幅压缩后续超大规模云厂商和工业买方的销售周期。
