      - number: '6.6'
        title: 附录要点
        blocks:
          - type: callout
            title: 极端客户集中：全部商业订单 = 一份有约束力的 PPA
            body: >
              截至 May 2026，Helion 全部已签商业收入都压在一份有约束力的协议上：Microsoft 50 MW PPA。若 2028 年交付失败，将触发财务罚则，摧毁公司唯一的标杆客户关系，并消灭其与
              Nucor、OpenAI 或任何后续买方签约所需的可信度。投资人必须把这种集中度视为二元赌局：2028 年 Microsoft 交付实际上是生死级里程碑，在同一事件中同时测试技术、建设、电网接入和商业可行性。
