  - id: TV006
    title: 最终尽调事项表
    type: comparison
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 独立等离子体审计
        - 第三方同行评审确认 Polaris Q_electrical > 1；具资质核物理机构提供独立等离子体诊断
        - Q>1 是唯一闸门事件；公司自称里程碑存在利益冲突风险
        - 在 NDA 下委托 PPPL 或 GA Technologies 做物理审查；要求访问原始等离子体诊断数据
      - - Microsoft PPA 完整条款
        - 完整罚则时间表、重谈权、终止条款和任何附函
        - 若错过 2028 年截止期，罚则条款可能制造超过现金的资产负债表负债
        - 在 NDA 下向 Helion 投资者关系团队索取；要求 Microsoft 以书面确认公开声明
      - - Series F 股权结构表
        - 完整股权结构表，列明股份类别、清算优先权、反稀释条款和期权池
        - 优先股堆叠决定非乐观情景下的回报分配；反稀释影响降价轮中的回收
        - 在 NDA 下向 Helion CFO 索取；这是任何机构 Series G 参与方的标准 VC 尽调文件
      - - Orion 建设成本估算
        - Orion 商业电站的固定价 EPC 投标或独立工程成本估算
        - Q>1 之后 $10B+ 资本缺口估计尚未验证；实际成本决定未来融资规模和稀释
        - 向 Helion 投资者关系团队索取；委托 Bechtel 或 Jacobs 等独立核能建设成本估算方
      - - NRC 监管沟通
        - NRC 预申请会议纪要、Helion 监管沟通、DOE 氚供应授权讨论
        - 全球尚无商业核聚变许可发放；监管时间表是仅次于 Q>1 失败的第二大风险
        - 向 NRC 提交 FOIA 请求，索取 Helion 沟通；审查 NRC Part 53 适用性；核查 nrc.gov 案卷
      - - OpenAI 谈判状态
        - OpenAI 多 GW 核聚变电力框架的约束性条款清单或意向书
        - 如果 OpenAI 转为约束性条款，这是最大单一上行催化剂；如果停滞，乐观情景会变弱
        - 向 Helion 投资者关系团队索取；监控 OpenAI 能源公开声明；留意同时提及双方的并网申请
    notes: |
      尽调事项按重要性排序。第 1-3 项会阻断任何买入建议。第 4-6 项也很重要，应在任何超过 $100M 的后续资金投入前解决。
