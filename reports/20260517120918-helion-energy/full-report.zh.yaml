      - number: '7.5'
        title: 人员、执行与财务风险
        blocks:
          - type: paragraph
            body: >
              Helion 有两处关键人物高度集中。David Kirtley 同时担任 CEO 和主要技术架构师，公司未披露任一角色的继任计划——对一家已进入商业规模部署阶段的公司来说，这种领导结构异常集中。Sam
              Altman 2026 年 3 月离开 Helion 董事会，以管理 OpenAI 的利益冲突暴露；他仍保留 $350M+ 投资，但治理角色下降，削弱了他原本提供的投资者关系锚点和融资网络。George
              Votroubek 的 FRC 等离子体物理专长是 Helion 技术项目的核心，而全球拥有这一专长的人才池极其有限。财务侧，Helion 累计已融资约 $1.4B+，但 Q>1 之后，要按商业规模建设并运营
              Orion，预计还需要 $10B+ 资本，相当于当前资源约 6-7 倍的资金缺口。Helion 没有收入；年烧钱速度估计为 $150M+，但公司未公开披露。如果 Polaris 错过 Q>1，$5.425B 的
              Series F 估值在下一轮融资中就撑不住，严重下轮降估值风险随之出现。Microsoft 罚款——一旦触发——可能耗尽可用现金。Bloomberg 2024
              年调查提出治理和文化疑虑，也可能让机构投资者参与变得更难。人员 / 执行风险登记表（TR004）和缓释与论点破裂标准表（TR005）覆盖了这些维度。
