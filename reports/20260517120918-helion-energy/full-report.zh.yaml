      - number: '7.3'
        title: 运营与供应链风险
        blocks:
          - type: paragraph
            body: >
              Helion 的运营风险集中在多个单点依赖上。氚——Polaris D-T 聚变的燃料——是受监管材料，全球民用供应估计只有 25–30 kg，主要由 DOE 出于国家安全目的管理。Orion
              商业规模氚获取尚未获批，DOE 分配也未确认。Helion 更长期的 D-He3 燃料路线图面临严重供应链障碍：氦-3 成本约 $1,000/gram，且不存在达到聚变相关规模的商业 He-3
              供应链。氚增殖所需的 Lithium-6 又面临中国主导锂供应的地缘政治风险。高温超导磁体供应集中在少数制造商手中；一旦中断，可能以 12–24 个月前置周期推迟装置制造。最关键的是，Malaga 的 Orion
              建设已于 July 2025 启动——这是在底层物理验证前开工的首台套绿地工业项目——在 2028 年截止日期压力下，进度、成本超支和技术执行风险叠加。运营 / 质量 /
              安全风险登记表（TR002）量化了每一种失效模式。
