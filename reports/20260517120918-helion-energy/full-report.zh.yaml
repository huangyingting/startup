  - id: TV005
    title: 投资逻辑击穿与终止触发项表
    type: comparison
    columns:
      - 触发项
      - 阈值事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Q>1 物理失败
        - Polaris 持续运行但到 2027 年底仍未实现 Q_electrical > 1
        - 估值唯一物理基础消失；没有 Q>1 就无法建设商业电站；投资逻辑坍塌
        - 若二级市场可用，退出全部仓位；不参与任何后续融资
      - - Microsoft 触发罚则
        - Microsoft 正式触发或公开释放将触发 PPA 罚则条款的意图
        - 立即形成资产负债表负债；显示 2028 年截止期失败；触发降价轮或重组
        - 立即进行组合复盘；降低仓位；要求提供独立股权结构表和负债时间表
      - - CEO 离任
        - David Kirtley 辞职或被免职，且未同步宣布具资质的等离子体物理继任者
        - 关键人物风险兑现；机构性 FRC 知识和技术领导可信度受损
        - 列入观察名单；要求董事会披露继任安排；在 90 天继任者评估前持有
      - - 降价轮融资
        - 下一次股权融资价格低于 Series F 隐含投后估值；Series G 任何低于 $3B 的估值
        - 显示投资人重估 Q>1 概率；优先股堆叠的高级别权利伤害早期投资人
        - 立即重估投资逻辑；没有独立 Q>1 数据，不参与降价轮
      - - 伙伴终止
        - Nucor 或 OpenAI 公开终止或正式退出与 Helion 的协议
        - 商业验证支柱消失；显示内部可能掌握技术进展的负面信息
        - 下调投资建议；不投入新资金；要求 Helion 投资者关系解释
      - - 科学调查坐实
        - 重大调查报道确认等离子体结果存在系统性误述，或存在重大治理失灵
        - 声誉和监管风险兑现；融资渠道受损；NRC 许可流程面临风险
        - 暂停投入新资金；聘请独立技术顾问做等离子体物理审计
    notes: |
      触发阈值基于截至 2026 年 5 月的公开信息。非公开 PPA 罚则条款、股权结构表和内部里程碑，可能设置公开证据看不到的额外触发项。
