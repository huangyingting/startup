      - number: '3.4'
        title: 替代与商品化风险
        blocks:
          - type: paragraph
            body: >
              对 Helion 最可能的商品化情景是：到 2032–2035 年，聚变能源成为已验证技术，10+ 家资金充足的公司试图服务同一批超大规模云和工业客户。在该情景下，Helion 的先发——两份
              PPA——带来一个周期的优势，但不会带来永久定价权。护城河能维持多久，关键在于 Helion 能否借早期商业成功（2028–2030）建立供应链、制造能力和客户关系，从而比后来者扩张更快。

              CFS 是唯一可能在关键 2026–2030 年窗口凭借资本规模（$3B）超过 Helion（$1B+）投入的竞争对手。不过，CFS 的托卡马克路线比 Helion 紧凑的 FRC
              设计需要更大型、更复杂的电站工程。CFS 已有 Google 作为 ARC 的承诺购电方，但这是初步购买承诺（不是带罚则 PPA），因此与 Helion 的 Microsoft 交易相比，CFS
              的商业紧迫性更低。

              Helion 的负面情景包括：Polaris→Orion 之间出现 12–24 个月技术断档、Nucor 场址许可延迟、Microsoft 罚则触发，以及 CFS 以更宽松条款结构拿下第二个超大规模云客户（如
              Amazon 或 Meta）。在该情景下，CFS 的 2030 年代初 ARC 电站可能取代 Helion，成为商业聚变参考供应商。该情景概率高度取决于 Helion 能否守住 2028 年里程碑，并在 2027
              年前公开证明净能量增益。

              专家对 Helion 时间表的质疑已有记录：2024 年 Bloomberg 调查对 2028 年截止日期的科学基础提出担忧，MIT Technology Review 将 2028
              年时间表形容为行业里的“非常快”。Helion 尚未反驳这些担忧，但 2026 年 2 月 Polaris 里程碑已部分缓解。公司发表了几篇同行评议技术论文，支持 FRC 扩展路线，但以 IP
              保护为由，尚未公开发布等离子体能量平衡数据。
