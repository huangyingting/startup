        - 通过独立工程审查验证 Faraday 感应系统效率
      - - 目标价格下单座电站年收入
        - 50 MW × 8,760 h × $10/MWh = LCOE 目标下每座电站 ~$4.4M/年；按 $80/MWh 企业 PPA 为 ~$35M/年
        - 低
