      - number: '4.5'
        title: 财务缺口与结论
        blocks:
          - type: paragraph
            body: >
              Helion
              的财务尽调图景受到商业化前状态的强约束。所有标准财务指标——收入、毛利率、营业利润、经营现金流、获客成本（CAC）、客户终身价值（LTV）、流失率——不是零，就是未定义，或不可得。五个关键尽调阻塞项是：（1）账上现金和月度烧钱速度，它们决定公司能否在不进行稀释性或困境融资的情况下到达
              2028 年 Orion 里程碑；（2）Microsoft PPA 罚则敞口，它量化 Orion 延迟时的下行；（3）Orion 资本开支预算和进度，它们决定首座电站经济性；（4）来自 ARPA-E 或 DOE
              INFUSE 计划的任何过往政府拨款收入，这代表真实现金流入；（5）Series G 条款和投资人构成，它们会在 Polaris 到 Orion 的关键过渡期释放外部信心信号。

              现阶段的财务结论只能是定性判断：Helion 已拿到足够资本推进近期研发阶段，投资人和客户绑定较强，且基于 January 2025
              融资，短期看不到明显流动性危机。不过，公司作为收入前业务资本强度极高，没有展示通向毛利率的路径；在形成有意义的机群资本强度前，还需要多轮数亿美元级别的后续融资。战略投资人基础（Altman/OpenAI、Nucor、SoftBank、Lightspeed）降低了传统投资人风险，却带来集中度和利益冲突动态。OpenAI
              交易谈判若落地，将重塑财务画像——但所需技术和制造规模化比 Helion 已实现的一切高出多个数量级。
