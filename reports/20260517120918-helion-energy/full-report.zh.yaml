      - number: '2.2'
        title: 市场规模：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              Helion 的 TAM 是全球电力市场：约 $3.8T/年，2025 年用电量 28,200 TWh，并以 3.6% 平均 CAGR 增至 2030 年的 33,600 TWh（IEA）。IEA 预计，到
              2030 年，发达经济体贡献约 20% 的新增需求，其中数据中心驱动约 50% 的美国新增需求增长。

              SAM——无碳、稳定基荷细分——更难精确划界。截至 2025 年，企业清洁能源 PPA 规模为 55.9 GW（BloombergNEF），其中“类基荷”的稳定电力交易（核能、地热、共址储能）占 5.2
              GW。如果到 2030 年清洁电力达到全球发电量 50%（IEA），则意味着约 $1.9T 的电力收入 SAM。稳定电力溢价子细分更小，全球可能约
              $200–400B，因为稳定清洁电力目前相对间歇性可再生能源享有溢价。

              Helion 当前 SOM 是已承诺的早期商业足迹：Microsoft 到 2028 年的 50 MW PPA，加上 Nucor 到 2030 年的 500 MW，总计 550 MW 合同容量。按
              $50–80/MWh 的典型批发电价，550 MW 可产生约 $240–390M 年化电力收入。更宽的 SOM 还包括其他超大规模云厂商、工业 EAF
              运营商，以及采购无碳基荷的公用事业公司；仅美国企业交易这一细分在 2025 年就增长到 $29.5 GW。

              研究机构对商业聚变行业的市场规模估计（TBRC：2025 年 $288B，2030 年增至
              $420B）应谨慎解读：这些数字包括研发支出、设备、基础设施和相邻服务——不是单纯的发电收入。它们方向上有用，但方法不透明。
