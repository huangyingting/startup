  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 直接聚变竞争格局
        blocks:
          - type: paragraph
            body: >
              私营聚变行业快速增长。Fusion Industry Association（FIA）2025 年调查识别出全球 53 家公司，累计投资 $9.77B——较 2021 年增长五倍。美国拥有其中 29
              家公司，并与中国一起吸收全球大部分私营聚变资本。投资高度集中：仅 CFS 一家公司就持有全球私营聚变资本约三分之一（2025 年 8 月 $863M Series B2 后累计融资约 $3B）。

              Commonwealth Fusion Systems（CFS）2018 年从 MIT 分拆出来，是 Helion 最先进的直接竞争对手。CFS 采用托卡马克路线，在 SPARC
              演示装置中使用高温超导（HTS）REBCO 磁体技术。SPARC 正在马萨诸塞州 Devens 建设，目标是在本十年结束前实现净能量增益。商业 ARC 电站选址弗吉尼亚州 Chesterfield
              County，与 Dominion Energy 合作，将根据购买承诺向 Google 供应 ARC 一半发电量。CFS 受益于 MIT
              的机构可信度、最大私营聚变资本基础，以及托卡马克这一全球验证最充分的聚变概念（ITER 是公共部门参照）。不过，CFS 首次商业供电目标在 2030 年代初——晚于 Helion 的 2028 年承诺——且
              CFS 未披露带约束交付条款和罚则的商业 PPA。

              TAE Technologies（1998 年成立，总部加州 Foothill Ranch）已从 Google、Chevron 等融资 >$1.3B，是 Helion 最接近的 FRC 路线同行。TAE
              的「Norm」机器于 2025 年 4 月宣布，实现了首次仅靠 NBI 的稳定 FRC 等离子体形成，取消 theta-pinch 形成硬件，使机器复杂度最多降低 50%。TAE 2025 年 11
              月里程碑（发表于 Nature Communications，并在 APS DPP 展示）验证了 NBI 驱动的 FRC 形成稳定且可重复。随后 TAE 压缩路线图，跳过计划中的第六代 Copernicus
              装置，直接推进「Da Vinci」商业电站——目标在 2030 年代初交付，使用氢-硼（p-B11）燃料。TAE 的 p-B11 路线是无中子聚变（不会产生显著放射性废物），商业上有吸引力，但 p-B11
              所需等离子体温度约为 D-T 或 D-He3 的 30x，且尚未在商业相关条件下演示。

              Pacific Fusion（2023 年成立）由 General Catalyst 领投、获得 $900M 里程碑门控 Series A 资金，采用脉冲磁性套筒箍缩聚变，使用最初由 Lawrence
              Livermore National Laboratory 开发的 Impedance-Matched Marx Generator（IMG）技术。公司目标是在约 2030 年用 D-T
              燃料实现设施净增益（设施层面能量输出 > 能量输入）。Pacific Fusion 领导层包括前 LLNL 专家和 Alphabet 前员工。$900M
              是按里程碑解锁，而非可自由部署，这提供了问责机制，但如果里程碑延误，也会带来资金断崖风险。

              Tokamak Energy（英国，已融资 $335M，2009 年作为 UKAEA 衍生公司成立）、Proxima Fusion（德国 / 英国，已融资 €185M，Max Planck Institute
              衍生公司，2023 年）和 Type One Energy（美国，已融资 >$160M，选址 TVA 的仿星器）构成第二梯队私营聚变公司。Tokamak Energy
              是唯一一家运行球形托卡马克超过十年的私营公司，其 ST40 达到 100 million°C。Proxima Fusion 2025 年 6 月 €130M Series A 是欧洲最大私营聚变轮次，资金用于
              HTS QI-stellarator 仿星器，目标是 2027 年 Stellarator Model Coil（SMC）和 2031 年 Alpha demo（Q>1）。Type One Energy 目标是在
              2030 年代中期，于一处退役 TVA 燃煤电站建设 350 MW 仿星器商业电站（Infinity Two），采用技术授权而非电站所有权模式。

              ITER 是由 35 国参与、正在法国 Cadarache 建设的国际聚变托卡马克，不是商业竞争对手，但设定技术基准。ITER 首次等离子体最早已推迟至 2020 年代末，首次全功率 D-T 运行目前预计在
              2030 年代中期，商业衍生项目（DEMO）不太可能早于 2040 年代。ITER 的公共资金和数十年时间线意味着它是可信度代理，而不是市场竞争者。
