      - number: '8.5'
        title: 论点破裂触发因素与退出准备
        blocks:
          - type: paragraph
            body: >
              Helion 近期没有退出路径。公司收入前、商业化前，至少需要一座正常运行的商业电站，并提供可审计的收入和成本数据，才可能现实地 IPO。最早可行的公开退出窗口是 2030-2032 年，前提是 Orion
              已交付电力，并建立足以经受公开市场估值审视的多客户收入基础。在 IPO 前卖给大型公用事业公司、石油超级巨头、科技公司或超大规模云厂商也可以想象，但必须已经证明 Q 大于
              1，并拥有正常运行的商业电站，才可能拿到高于当前隐含估值的溢价。EEPower 行业报道指出，Helion
              代表一类资本密集型先进技术公司，其估值几乎完全取决于未来里程碑，而非当前现金流，因此具备深科技投资典型的超大二元风险。需要立即重新评估组合的论点破裂触发因素包括：Polaris 到 2027 年底未能证明 Q
              大于 1；Microsoft 正式触发或释放触发 PPA 罚则条款的意图；David Kirtley 离任 CEO 且没有具备资质的物理学继任者；下一轮股权融资低于隐含 Series F
              水平，形成下轮降估值；Nucor 或 OpenAI 公开终止与 Helion 的协议；或重大调查报道确认等离子体物理结果存在系统性虚假陈述。NRC
              针对首创商业聚变许可证的监管路径增加了额外时间线和执行风险，论点破裂监控必须按季度纳入。需要监控的运营信号包括公司公告中披露的 Polaris 射击频率和等离子体能量指标、NRC 预申请会议文件，以及 Orion
              投运前 18-24 个月必需的建设与运营岗位招聘数据。论点破裂与叫停触发因素表，为每个触发事件给出结构化阈值和行动含义。
