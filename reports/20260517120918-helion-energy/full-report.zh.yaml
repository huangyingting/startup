      - number: '1.5'
        title: 负面信号与关键质疑
        blocks:
          - type: paragraph
            body: >
              Helion 激进的 2028 年商业时间表持续引来核能专家和技术记者质疑。MIT Technology Review 2023 年 5 月报道记录了多位核能研究者的担忧：Helion
              尚未公开披露是否跨过最基础的聚变里程碑——聚变反应产生的能量超过驱动反应所消耗的能量（物理盈亏平衡或净能量增益）。公司承认没有就此置评，也不会公开披露，理由是知识产权考虑。MIT Technology
              Review 引述的独立学者认为，2028 年商业交付日期对整个聚变行业来说“非常快”，有人指出，大多数竞争对手即便是有限发电演示也瞄准 2030 年代初。

              2024 年 7 月，Bloomberg 调查带来更强审视，指出 Helion 相比 45+ 家发布科研结果并在会议上展示的同行，对进展“尤其守口如瓶”。Bloomberg
              报道还提到内部矛盾指控，包括性别歧视；Helion 否认这些说法，称外部调查员没有发现所述具体事件的证据。公司回应强调，有限发表是出于保护 IP 的理由。

              截至 2026 年 5 月报告日期，Helion 尚未发布有等离子体存在时的能量回收数据，也就是说，其声称的高电力回收效率（无等离子体条件下已证明 >95%）尚未在聚变条件下验证。从当前 150M°C D-T
              等离子体演示走向由 D-He3 聚变产生可持续净电力，这条技术路径仍未被证明，也构成 2028 年承诺的重大执行风险。
            claimRefs:
              - CO037
              - CO038
              - CO039
