        - 不适用（PPA 企业模式）
        - n/a
        - 交易流由 C 级关系 / 伙伴关系驱动；不适用漏斗式 CAC
        - 记录 Microsoft 和 Nucor 交易发起成本与耗时，作为政策输入
      - - D-He3 燃料成本
        - 未披露；氘：~$1,000/kg（商品）；He-3 在反应堆内增殖
        - 低
        - 若 He-3 可自增殖，规模化后燃料成本可能接近零；这是 LCOE 模型关键变量
        - 向技术团队索取建模燃料循环成本和 He-3 增殖产率
      - - 能量转换效率（直接）
        - ~60–70%（公司声称）；蒸汽轮机基准为 30–35%
        - 中
