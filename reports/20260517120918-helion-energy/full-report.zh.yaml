  - id: TM004
    title: 增长驱动与约束表
    notes: >-
      时间与方向为分析师判断，基于 FIA 2025、IEA Electricity 2026、Wood Mackenzie SMR 管线和 BNEF PPA 数据。约束严重程度是定性评估； 尽调问题反映报告日期（May
      2026）仍未解答的问题。
    columns:
      - 驱动因素或约束
      - 方向
      - 时间
      - 对 Helion 的影响
      - 尽调问题
    rows:
      - - AI 时代数据中心用电激增
        - 需求驱动（+）
        - 2025–2030 年紧迫
        - 稳定无碳电力需求迫切，单靠可再生能源无法满足；Microsoft 和超大规模云厂商正在积极寻找替代基荷
        - 量化超大规模云厂商到 2028-2030 年的电力采购预算，以及对非间歇性电源的需求
      - - 工业 EAF 电气化与脱碳
        - 需求驱动（+）
        - 2025–2035 年扩张
        - Nucor 等 EAF 运营商需要低碳连续电力；Helion 的钢铁 PPA 是该细分的概念验证
        - 梳理全球需要清洁基荷的可服务 EAF 产能，以及 Nucor 总电力采购预算
      - - 24/7 CFE / Scope 2 GHG Protocol 小时级追踪
        - 需求驱动（+）
        - 2025–2027 年政策转向
        - 稳定电力相对年度可再生能源证书的价值上升；BNEF 跟踪到 5.8 GW 共址和混合交易，正是对这一转向的响应
        - 跟踪 GHG Protocol Scope 2 最终规则；评估买方采购是否转向按小时匹配的 CFE
      - - IEA 电力需求增长（全球 3.6% CAGR）
        - 市场规模驱动（+）
        - 2026–2030
        - 总市场上限扩大；发达经济体需求 15 年来首次重新加速，尤其是美国（+2%/年）和欧盟（+2.3%/年）
        - 跟踪 EIA 和 IEA 季度需求修订，判断 TAM 增长上行 / 下行空间
      - - SMR 与先进核能竞争者建设
        - 竞争约束（-）
        - 2028–2035
        - >-
          SMR 管线激增 42% 至 47 GW（2025 年 Q1，Wood Mac）；SMR LCOE 为 $90-160/MWh，仍远高于 Helion 目标，但 SMR 时间表更清晰； 39% 的 SMR
          管线由数据中心驱动——与 Helion 直接重叠
        - 跟踪 SMR 成本曲线；评估超大规模云厂商会等待 Helion，还是先签 SMR 交易
      - - 资本强度与 $77B 资金缺口
        - 采用约束（-）
        - 持续存在
        - FIA：全行业已融资 $9.7B，而所有试点电站需要 $77B；Helion 资金好于平均水平，但 F 轮后仍需更多资本支撑 Orion 和商业化扩张
        - 核实 Helion 到 2028 年的资本充足性；评估 G 轮的可能性和条款
      - - 缺少核聚变专门监管框架
        - 采用约束（-）
        - 2025–2030 年紧迫
        - 美国尚无成熟的 NRC 核聚变许可路径；特定场址审查会增加 2-5 年；Helion 已获 Washington DOH 氚批准，但 NRC 商业许可仍未定义
        - 跟踪 NRC 核聚变监管规则制定；评估 Helion 与 NRC、DOE 的互动
      - - 商业层面尚未证明净能量增益
        - 技术 / 市场风险（-）
        - 里程碑达成前持续存在
        - Helion 尚未披露实现净能量增益；FIA 行业共识认为首次商业交付在 2030-2035 年；里程碑实现前，买方信任会承压
        - 要求独立技术验证等离子体能量平衡；跟踪 Polaris 和 Orion 里程碑
      - - 电网并网队列与基础设施
        - 采用约束（-）
        - 2026–2030
        - 美国部分地区电网并网排队需 5-7 年；Helion 的 Malaga WA 电站需要 BPA 并网批准；Nucor 选址受电网容量约束
        - 向 BPA 核实 Malaga WA 并网申请状态；评估 Nucor 设施的队列位置
      - - 钢 / 铝关税与供应链
        - 成本约束（-）
        - 2025–2030
        - Wood Mac：关税预计到 2030 年将推高 SMR 建设成本约 6%；也可能影响 Helion 电站建设成本
        - 评估 Helion 对受关税影响材料的供应链敞口；核查 Orion 预算中的成本缓冲
