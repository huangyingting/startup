        - Meta、Amazon、Google、Microsoft 及二线超大规模云厂商
        - 价值最高的早期采用者；Microsoft 是已承诺的 Helion 买方
      - - EAF 钢铁与工业脱碳（sub-SAM）
        - EAF 炼钢、化工、水泥所需无碳电力
        - 化石燃料驱动工业；高炉 BF-BOF 钢铁
        - Nucor 及其他 EAF 生产商；工业能源经理
        - Nucor 是已承诺买方；500 MW PPA 代表战略切入
      - - 商业聚变行业（早期市场）
        - 研发、试点电站建设、供应链、相关技术
        - 成熟聚变机组发电收入（2035 年后）
        - VC、工业企业、政府、公用事业公司作为 PPA 对手方
        - 对投资可比对象有用，但不等同于电力收入 TAM
