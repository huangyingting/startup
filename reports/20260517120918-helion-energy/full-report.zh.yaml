      - number: '5.6'
        title: 附录要点
        blocks:
          - type: callout
            title: 直接法拉第感应消除了蒸汽轮机效率损失
            body: >
              Helion 的直接法拉第感应能量回收，是私营聚变格局中商业意义最强的技术差异点。它把等离子体膨胀直接感生为压缩线圈中的电流，完全绕过蒸汽循环；Helion 因此瞄准约 95%
              的理论转换效率，而任何基于蒸汽循环的电站约为 33–35%。若商业规模下实现，在同等聚变输出下，它会带来竞争路线无法匹配的度电成本优势。February 2026 的 Polaris 里程碑首次在 FRC
              聚变史上确认概念验证级直接转换；即便 Q>1 仍未证明，这本身也是独立重要结果。
            calloutType: insight
            claimRefs:
              - CE003
              - CE007
          - type: callout
            title: Microsoft 2028 年 PPA 交付取决于尚未证明的 Q>1
            body: >
              Helion 的整个商业产品时间表都压在 Polaris 于 H2 2026 实现净能量增益（Q>1）上——这一里程碑没有独立数据链证明已经接近。Bloomberg 在 2024
              年指出，外部专家无法从公开数据验证 Helion 的能量收支。MIT Climate 研究者把 2028 年时间表称为非常激进。若 Q>1 延迟到 mid-2027 之后，2028 年 Microsoft PPA
              交付窗口将崩塌，触发财务罚则，并可能在任何商业收入产生前迫使公司追加资本。2028 年截止日期是 Helion 投资逻辑中赌注最高的单一二元节点。
            calloutType: insight
            claimRefs:
              - CE019
              - CE020
              - CE021
          - type: callout
            title: 产品与技术评估前的最低尽调数据点
            body: >
              在任何投资承诺前，应要求 Helion 在 NDA 下提供：（1）Polaris Q>1 实验数据，以及对能量收支测量的独立技术审查；（2）多个 Polaris 脉冲周期的 He-3 增殖比测量；（3）Orion
              电站详细工程进度表，以及带应急余量的建设里程碑计划；（4）NRC Part 53 预申请提交内容和 NRC 工作人员反馈；（5）等离子体控制软件质量文件和任何 IEC 61513 合规评估。这五个数据点是评估
              2028 年 Microsoft PPA 交付义务是否可达、以及 Helion 技术主张能否被独立验证的最低要求。
            calloutType: insight
            claimRefs:
              - CE019
