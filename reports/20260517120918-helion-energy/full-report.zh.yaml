      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              需求侧非常有利。AI 时代数据中心建设潮，是现代史上最集中的电力需求激增：Gartner 预测数据中心用电将从 448 TWh 翻倍至 2030 年的 980 TWh，其中 AI
              优化服务器在数据中心用电中的占比从 21% 升至 44%。Goldman Sachs 预计，到 2030 年整体数据中心电力需求将增长
              165%。这些买方无法靠间歇性太阳能和风电服务，除非承受高得难以接受的电池储能成本——他们需要可调度、无碳基荷，这正是聚变承诺提供的东西。

              工业脱碳进一步放大机会。工业脱碳技术投资在 2022 年达到 $87B，预计到 2030 年每年超过
              $250B（ResearchAndMarkets）。钢铁、化工和水泥的电气化推动对无碳电力的需求，而且电力供给需要匹配工艺周期——这再次偏向稳定、全天候供应。

              采用约束严厉，且部分不由 Helion 控制。最关键的是技术成熟度：Helion 尚未证明商业级净能量增益。FIA 行业共识（2030–2035 年实现并网聚变）比 Helion 的 2028 年目标保守；FIA
              调查的 53 家公司中有 83% 将投资称为“重大挑战”。资本密集度构成结构性约束：行业建设试点电站还需要 $77B 额外投资，而迄今仅融资 $9.7B，存在 8:1
              的资金缺口。美国聚变电站监管路径仍未定义。电网互联排队、首批电站的高资本成本，以及聚变“总是还要 20 年”的长期记录，都会给企业买方带来基于可信度的切换摩擦。
