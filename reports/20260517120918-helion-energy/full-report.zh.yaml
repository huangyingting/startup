      - number: '7.4'
        title: 合作伙伴、依赖与竞争风险
        blocks:
          - type: paragraph
            body: >
              Helion 的商业模式有极端客户集中：Microsoft 是首座电站唯一已签约电力承购伙伴，同时握有触发罚则的权利，也是 Helion 商业叙事的主要可信度锚点。Nucor 的 500 MW
              开发协议是另一个已确认合作，但它明确以 Helion 技术成功为条件。DOE 是氚的结构性单一来源依赖，没有商业替代。Sam Altman 在 March 2026
              退出董事会，削弱了关键融资阶段的资本网络触达。2024–2026 年，竞争风险显著加剧：Commonwealth Fusion Systems 已融资超过 $3B+，拥有 MIT 可信度和 SPARC
              托卡马克；Pacific Fusion 带着 $900M Series A 走出隐身，目标是在 2030 年前实现 D-T 净设施增益；GE-Hitachi 的 BWRX-300 SMR 正在加拿大建设，目标
              2030 年，给低碳基荷电力承诺提供可行替代。Microsoft 没有披露排他条款，意味着一旦对 Helion 2028 年交付信心下降，它可以与替代供应商谈判。依赖图（FR003）和合作伙伴 /
              依赖风险登记表（TR003）识别了关键交易对手和失效场景。
