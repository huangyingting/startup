      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              商业聚变能源在美国没有许可先例。NRC 已于 June 2023 完成面向聚变系统的 Part 30 副产物材料规则，Part 53 先进反应堆框架也在 2024
              年可用，但还没有商业聚变电站在任一框架下取得运营许可证。Helion 在 2024 年取得 NRC 氚持有许可证——这是私营聚变公司首例——但 Orion 的完整商业运营许可路径仍未开拓。先行者身份意味着
              Helion 面对的是没有先例可依的逐案监管裁量，NRC 商业聚变许可时间不可预测。Price-Anderson Act 的核责任条款能否适用于商业聚变设施并不清楚，澄清前仍有未封顶责任敞口。Malaga
              建设场址需要 Washington State SEPA 环境审查，可能给 Orion 时间表增加 12–18 个月。法律层面，Microsoft PPA 包含未披露的 2028 年交付失败财务罚则，这是
              Helion 画像中最高的已量化法律敞口。Bloomberg July 2024 调查提出科学可信度担忧，虽然不是正在进行的诉讼，却会给未来融资带来声誉风险。监管 /
              法律风险登记表（TR001）和风险传导图（FR002）详细列出了这些敞口。
