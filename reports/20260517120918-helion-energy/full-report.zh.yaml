  - id: TV004
    title: 可比估值表
    type: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        All private fusion companies that raised over $500M publicly disclosed as of May 2026 per FIA 2025 Global Fusion
        Industry Report; excludes early-stage private companies with undisclosed funding and companies in stealth
    columns:
      - 可比对象
      - 阶段
      - 隐含估值
      - 与 Helion 的相关性
      - 局限
    rows:
      - - Commonwealth Fusion Systems (CFS)
        - 私营；累计融资约 $3B；SPARC 高温超导托卡马克以净等离子体增益为目标
        - 私募隐含估值约 $4B+；没有含罚则条款的商业 PPA
        - 直接的私营核聚变竞争对手；投资人层级相似；争夺超大规模云厂商电力合同
        - 托卡马克与 FRC 技术不同；没有商业 PPA；SPARC 净增益尚未独立验证
      - - Pacific Fusion
        - 私营；2024 年 10 月 $900M 里程碑闸门式 Series A；D-T 脉冲磁惯性聚变；未披露商业 PPA
        - 早期商业化前阶段；因没有客户证明，相对 Helion 有有效折价
        - D-T 燃料路径与 Helion Polaris 相似；面对同一超大规模云厂商客户市场；FIA 确认为同业
        - 尚无技术演示；没有商业 PPA；每个维度都比 Helion 更早期
      - - TAE Technologies
        - 私营；累计融资 $1.3B+；采用氢-硼路径的场反位形；Google 支持
        - 估计私募隐含估值 $1-2B；相比 Helion 有显著折价，反映 PPA 溢价
        - FRC 架构是最接近 Helion 的机器同业；运营历史长；Google 背书提升可信度
        - 氢-硼燃料物理难度高于 D-T；没有商业 PPA；距离 Q>1 比 Helion 更远
      - - Nucor Energy PPA + Equity
        - 战略工业客户；500 MWe 开发协议；SEC 文件确认股权投资
        - 每 MWe 隐含容量价值显示，基载核聚变相对电网替代方案享有溢价
        - 真实客户经济性验证了可服务市场和客户为核聚变电力付费的意愿
        - 开发协议不保证交付；Nucor 钢铁市场带来客户集中风险
      - - 'NuScale Power (NYSE: SMR)'
        - 上市公司；先进 SMR；2023 年取消首个美国项目；仍无收入；2026 年 5 月市值约 $800M
        - 市值较 SPAC 首秀高点约 $4B 压缩 80%+；是先进核能收入前阶段的警示案例
        - 先进核能监管和资本执行风险；收入前估值压缩先例
        - 裂变不是聚变；监管更成熟；失败由建设成本超支驱动，不是物理问题
      - - ITER International Fusion Project
        - 公共部门；预算 $20B+；目标 2035 年前 Q>10；多十年时间表
        - 不是估值可比对象；用来说明 Helion 2028 年目标相对全球共识的野心尺度
        - 提供公共核聚变时间表背景，显示 Helion 2028 年商业化目标有多激进
        - 政府项目；证明物理可行，但商业化时间表完全独立
    notes: |
      按绝对估值看，Helion 相比所有私营核聚变同业都有溢价，理由是全球唯一带罚则条款的商业核聚变 PPA，以及行业首个 D-T 等离子体演示。NuScale 作为警示案例纳入；ITER 仅用于校准时间表。
