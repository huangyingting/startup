              $35M 的 Nucor 投资作为工业客户信心信号具有战略意义，但相对于 Nucor 的 $35B 收入基数并不重大。即便 Helion 投资全部归零，Nucor 也能承受，且不会造成重大财务影响。500 MW
              开发协议以 Helion 技术成功为前提，这意味着若里程碑错过，Nucor 实际上保留退出选择权。尽调应核实开发协议是否包含有约束力的里程碑闸门，从而为任一方创造罚则敞口。
