      - number: '3.2'
        title: 替代技术与在位者
        blocks:
          - type: paragraph
            body: >
              对 Helion 近中期商业地位最重要的替代威胁，是先进小型模块化裂变反应堆（SMR），尤其是 GE Vernova Hitachi BWRX-300。BWRX-300（300
              MWe、轻水冷却沸水堆设计）正在加拿大 Ontario Power Generation 的 Darlington 场址积极建设，目标 2030 年商业运行。Ontario 计划部署四台 BWRX-300
              机组（总计 1.2 GW）。Tennessee Valley Authority 已为田纳西州 Oak Ridge 的 Clinch River 场址提交美国首份 BWRX-300 建设许可申请。全球
              BWRX-300 管线覆盖波兰（约 24 台机组、6 个场址，获得 $4B US EXIM 承诺支持）、瑞典、英国等地。

              SMR 对 Helion 的威胁真实但有边界。SMR 解决的也是 Helion 面向的“稳定无碳基荷”问题，时间线与 Helion 的 2028–2030 年客户窗口重叠。不过，SMR 的 LCOE 估计为
              $90–160/MWh（Wood Mackenzie、BloombergNEF），远高于 Helion 预计的长期 $0.01/kWh（约 $10/MWh）目标。买方若在 2025–2026 年承诺 SMR
              PPA，会减少 Helion 2028 年交付的可用容量，但 SMR 签约后无法重新导向 Helion 的工业客户。Helion 的 Nucor 交易有结构性保护，因为 Nucor
              既是共同投资方，也有战略一致性。

              NuScale Power 持有唯一获得 NRC 设计认证的 SMR（77 MWe US460，2025 年 5 月认证），但其旗舰项目已在 2023 年取消，目前正在寻找新的部署。Oklo（Aurora
              先进裂变、HALEU 燃料）尚未开工，正在等待 NRC 批准更新后的申请。TerraPower Natrium 为怀俄明州 Kemmerer 演示电站提交的建设许可申请，正在接受 NRC 审查。

              其他替代品包括天然气（2025 年占美国电网 >40%，最便宜的可调度选项）、与可再生能源配套的长时储能（技术初生、成本不确定）和地热（稳定且无碳，但受地理资源限制）。对 Helion
              的超大规模云客户（Microsoft 及潜在其他方）而言，24/7 无碳电力要求排除了未减排天然气，也限制了储能经济性，因此有效替代集合只剩先进核能——竞争战场更聚焦。
