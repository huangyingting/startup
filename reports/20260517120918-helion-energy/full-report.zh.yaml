            body: >
              研究机构对“聚变能源市场”的估计（2030 年 $288B–$420B）不能误认为可服务的发电收入。这些数字合并了研发支出、设备供应链和推测性商业电站价值——2026–2030
              年聚变电站仍处商业化前阶段，实际电力收入基本为零。真正的商业收入 TAM 只会在演示后显现。
