  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 聚变技术架构与运行机理
        blocks:
          - type: paragraph
            body: >
              Helion Energy 的核心技术是使用场反位形（FRC）等离子体的磁惯性聚变（MIF）。FRC 是紧凑、自约束的环形等离子体结构，不需要大型外部超导环向线圈。FRC
              等离子体靠等离子体环内流动的内部电流约束自身，使系统比 Commonwealth Fusion Systems 等托卡马克路线竞争对手紧凑得多。运行周期从线性真空管两端同时形成两个 FRC
              等离子体团开始，形成方式是 θ-pinch 电磁线圈。每个等离子体团被随时间变化的外部磁场沿管道加速，随后两者在装置中点碰撞并合并。塌缩磁镜进一步压缩合并后的等离子体，使其达到聚变条件——温度超过 100
              million degrees Celsius——且不需要托卡马克依赖的连续外部加热系统。

              最关键的商业差异点是直接法拉第感应能量回收：每次聚变脉冲后等离子体膨胀，变化的磁通量直接在周围压缩线圈中感生电流。这完全绕开蒸汽轮机循环。理论转换效率接近 95%，而任何基于蒸汽循环的电站约为
              33–35%。Helion 的燃料循环使用氘（商业可得），并把运行中氘-氘副反应原位增殖出的氦-3 结合使用，从而摆脱外部氦-3 供应链依赖。Springer 的 FRC 物理研究和 APS Physics
              综述确认，FRC 是科学上可信的聚变路径，但还没有任何私营聚变装置在商业相关条件下展示净能量增益。
            claimRefs:
              - CE002
              - CE003
              - CE004
              - CE005
