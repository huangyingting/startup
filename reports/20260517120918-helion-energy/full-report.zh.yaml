      - number: '5.2'
        title: 商业产品与客户工作流
        blocks:
          - type: paragraph
            body: >
              Helion 的商业产品是通过长期购电协议（PPA）直接向客户交付稳定、清洁的基荷电力。从客户工作流看，Helion 用一个可规模化、可现场部署或并网接入的电源，替代既有的燃气调峰机组、核电站和间歇性可再生能源
              PPA，提供 24/7 无碳电力，不燃烧燃料，也不产生需要长期储存的放射性废物。Microsoft PPA 于 May 2023 签署，要求 Helion 到 2028 年向 Microsoft 数据中心交付至少
              50 MW 聚变发电电力；未交付将触发财务罚则，Constellation Energy 提供电网接入服务。Nucor PPA 目标是在 2030 年前提供 500 MW 聚变电力，用于钢铁制造脱碳，并由
              Nucor 的 $35 million 战略投资支持。April 2026，Hogan Lovells 确认 Helion 与 Nucor 已宣布计划在一家美国钢厂开发 500 MWe 聚变电站——这是扩展后
              Nucor 安排首次得到确认的法律文件。

              Helion 的 HERCULES 计划到 2028 年向 20+ 所大学和国家实验室投入超过 $17 million，围绕 FRC 聚变搭建配套技术生态，在间接支撑产品管线的同时产生外部研究验证。关于
              OpenAI 在 2030 年前达成潜在 5 GW 安排的讨论，截至 May 2026 仍未确认，不应纳入基准情景预测。两份已确认 PPA 使 Helion
              成为唯一一家承担有约束力商业电力义务、且未履约有实质财务下行的聚变公司。
