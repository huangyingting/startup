    columns:
      - 层 / 流程 / 组件
      - 作用
      - 依赖
      - 风险
    rows:
      - - FRC 等离子体团形成（theta-pinch 线圈）
        - 通过真空管两端的 theta-pinch 电磁线圈，形成自约束环形等离子体
        - 同位素纯氘燃料供应；精密 theta-pinch 线圈制造和时序电子设备
        - 若无法形成稳定 FRC 等离子体团，聚变循环即中止；未见公开后备机制
      - - 等离子体加速与压缩（脉冲 EM 线圈 + 磁镜）
        - 将两个 FRC 等离子体团加速至碰撞中点；合并并压缩到聚变相关温度和密度
        - 脉冲电磁线圈系统；磁镜压缩；精密时序控制
        - 时序抖动或线圈退化会降低压缩比；等离子体不稳定会提前终止聚变事件
      - - 氘-氦-3 聚变反应与 He-3 增殖
        - 通过 D+He-3 反应产生聚变能；运行时由 D+D 旁支反应原位增殖 He-3
        - D+D 中子通量足以在装置寿命内增殖 He-3；等离子体约束持续时间足够
        - 商业规模 He-3 增殖比未获独立确认；D+T 反应会产生氚，需要单独监管处理
      - - 直接法拉第感应能量回收
        - 在压缩线圈中借电磁感应，将膨胀等离子体动能直接转为电力
        - 可控的等离子体膨胀阶段；线圈在反复高场脉冲循环下保持完整性和绝缘
        - 反复脉冲导致线圈疲劳，是寿命风险；未发布商业规模寿命数据
      - - NRC Part 53 许可与场址许可
        - 在 Part 53 聚变框架下，为 Orion 电站商业运行取得监管授权
        - NRC Part 53 规则制定完成（2025–2026 年进行中）；场址特定环境审查；DOE 氚批准
        - 截至 2026 年 5 月，Part 53 框架尚未最终定稿；许可时间表直接卡住 Orion 商业启动日期
    enumerationScope:
