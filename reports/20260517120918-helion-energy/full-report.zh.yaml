      - number: '8.3'
        title: 牛市 / 基准 / 熊市情景
        blocks:
          - type: paragraph
            body: >
              各情景下的估值分布极宽，本质上二元，Q 大于 1 是所有结果中最关键的单一道闸。牛市情景要求 Helion 连续完成一串没有历史先例的动作：Polaris 在 2026 年底前实现 Q_electrical 大于
              1；Orion 按期建成，并在 2028 年向 Microsoft 交付首电；Microsoft 罚则条款从未触发；Nucor 在 2030 年前推进约束性商业电站协议；OpenAI
              将多吉瓦框架讨论转成约束性购电协议。在这种情景下，凭借商业聚变先发优势、增长中的签约客户管线，以及颠覆性的电力成本主张，Helion 到 2030-2032 年可能通过 IPO 或战略收购取得 $30-80B
              估值。基准情景假设 Q 大于 1 在 2026 年末或 2027 年初得到证明，但 Orion 交付滑后 12-18 个月至 2029-2030 年；Microsoft PPA
              被重新谈判，以推迟或降低罚则暴露；Nucor 在修订时间表下保持承诺；OpenAI 尚未签署约束性协议；并且一轮 $2-5B 后续融资在资助 Orion 建设的同时显著稀释当前投资者。基准情景支持 $12-25B
              估值，IPO 窗口不会早于 2031 年。熊市情景建模为：到 2028 年 Microsoft 截止期仍未证明 Q 大于 1；Microsoft 触发罚则条款；下一轮融资失败或定价低于隐含 Series F
              水平；Helion 进入资源受限运营。该情景意味着 $1.0-3.5B 估值，主要反映十多年 FRC 研究形成的 IP
              和专利价值，后期投资者几乎全损。仅凭公开证据无法量化概率分布，但定性分析显示概率质量最高落在基准情景，同时存在实质熊市尾部风险。Hacker News 和 Reddit
              上的开发者与投资者社区讨论表明，即便在熟悉等离子体物理、并且对技术乐观的人群中，对 2028 年时间线也存在广泛怀疑。
