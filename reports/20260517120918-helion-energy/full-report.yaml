  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Structure
        blocks:
          - type: paragraph
            body: >
              Helion Energy operates at the intersection of two converging macro-trends: the global electricity market's
              structural shift toward carbon-free generation, and the accelerating demand for firm, dispatchable
              baseload power driven by AI-era data centers and hard-to-abate industrial decarbonization. The total
              addressable market (TAM) for Helion is, at its broadest, the global electricity market — worth
              approximately $3.8 trillion per year and consuming ~28,200 TWh in 2025 (IEA). More precisely, Helion's
              relevant market is the sub-market for carbon-free, firm/dispatchable baseload electricity capable of
              delivering 24/7 supply without intermittency. This excludes intermittent renewables (solar, wind) and
              represents a premium segment commanding higher-value long-term contracts.

              Status-quo substitutes in this market include advanced nuclear fission (SMRs and large plants), natural
              gas with carbon capture and storage (CCS), long-duration energy storage paired with renewables, and
              geothermal. None of these is cost-competitive with fusion's projected $0.01/kWh target at scale, but each
              faces different barriers and timelines. Adjacencies include industrial process heat, green hydrogen
              production, and off-grid micro-grid power — sectors that would value a compact, continuous energy source.
