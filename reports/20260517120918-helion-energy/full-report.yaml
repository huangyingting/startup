      - number: '1.4'
        title: Technology Milestones and Prototype Development
        blocks:
          - type: paragraph
            body: >
              Helion has built and operated seven fusion prototypes since its founding, following a rapid-iteration
              philosophy of building, testing, and learning on compressed timescales. The sixth-generation prototype,
              Trenta, was completed in 2019 and operated nearly daily for approximately two years — executing over
              10,000 high-power pulses and sustaining vacuum operation for 16 months. Trenta made Helion the first
              private fusion company to achieve a bulk ion temperature of 100 million degrees Celsius (9 keV), which is
              broadly considered the commercial threshold plasma temperature. Trenta operations ceased in January 2023.

              The seventh-generation prototype, Polaris, represents a significant engineering advance: stronger magnets,
              pulse rates up to 100x faster than Trenta, and higher-voltage capacitors manufactured in-house. Polaris
              began operating at end of 2024, and in January 2026 became the first privately funded fusion machine to
              demonstrate measurable deuterium-tritium (D-T) fusion. In February 2026, Polaris achieved a plasma
              temperature of 150 million degrees Celsius — a new private-sector record and 50% above the commercial
              threshold. Helion was also the first company to receive regulatory approval from the Washington state
              Department of Health to possess and use tritium for fusion energy demonstration purposes.

              Beyond Polaris, Helion is simultaneously developing Orion — its first commercial-scale machine — at a site
              in Malaga, Washington, with construction having begun in July 2025 to meet the 2028 Microsoft delivery
              commitment. Key technical attributes of the commercial approach include: pulsed non-ignition (avoiding the
              engineering complexity of sustained ignition), direct electricity recovery via Faraday induction, and
              deuterium-helium-3 fuel cycle for the commercial configuration (helium-3 produced in-house via D-D
              fusion).
