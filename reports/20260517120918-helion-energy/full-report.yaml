      - number: '6.3'
        title: Nucor — Industrial Customer and Co-Investor
        blocks:
          - type: paragraph
            body: >
              Nucor Corporation, the largest U.S. steel recycler by revenue (~$35 billion annually) and the nation's
              largest electric arc furnace (EAF) steelmaker, announced a combined investment and 500 MW fusion power
              agreement with Helion in September 2023. Nucor invested $35 million directly into Helion (Series
              F-adjacent tranche or separate strategic investment) while simultaneously committing to host a 500 MW
              Helion fusion plant at one of its steelmaking facilities, with operations targeted for approximately 2030.
              Hogan Lovells advised on the pioneering legal structure, which merges customer and investor roles into one
              relationship.

              Nucor's strategic rationale is directly tied to decarbonizing its EAF operations. EAF steelmaking already
              achieves lower emissions than basic oxygen furnace (BOF) steelmaking by using scrap metal and electricity
              rather than coal. However, the carbon intensity of the grid electricity it purchases remains a significant
              emissions source. Fusion-derived electricity would reduce Nucor's Scope 2 emissions, support its
              sustainability targets, and potentially provide a long-term competitive advantage in steel markets where
              low-carbon supply chains command a premium. The co-investment structure aligns Nucor's financial
              incentives with Helion's success, reducing the counterparty risk of pure off-take agreements.

              Adoption metrics are pre-commercial: the 500 MW plant does not exist, no electricity has been delivered,
              and the 2030 timeline depends on Polaris demonstrating net energy gain and Orion scaling up from 50 MW to
              commercial operation. Retention metrics (NRR, GRR, churn) are not applicable to pre-delivery agreements.
              The Nucor agreement's durability depends on both technology milestones and Nucor's continued confidence in
              Helion's roadmap. The $35M co-investment creates meaningful alignment but is immaterial relative to
              Nucor's $35B revenue base, suggesting Nucor views this as an R&D partnership hedge rather than a primary
              operational commitment.
