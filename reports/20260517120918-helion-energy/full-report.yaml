      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Net Energy Gain (Q>1) Undemonstrated — Foundational Technology Risk
            body: >
              As of May 2026, Helion has not demonstrated net energy gain (Q>1) on any device. The entire investment
              thesis — the 2028 Microsoft PPA, the Nucor 500 MW deal, the $5.425B Series F valuation, and Orion
              construction already underway — depends entirely on Polaris achieving Q>1 before the commercial window
              closes. This is not a risk of degree; it is a binary pass/fail gate. NIF achieved Q>1 in December 2022
              under inertial confinement conditions fundamentally different from Helion's pulsed magneto-inertial FRC
              approach. The global scientific community has not independently validated Helion's plasma temperature
              milestone as equivalent to, or a precursor for, Q>1. If Q>1 is not demonstrated on Polaris before
              mid-2027, the path to 2028 Orion commissioning effectively collapses. Investors must treat this as the
              single highest-ranked risk in the portfolio regardless of all other favorable indicators.
            calloutType: insight
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: Orion Construction Ahead of Q>1 Is the Single Largest Investment Risk
            body: >
              Helion broke ground on Orion at Malaga, Washington in July 2025 — before achieving Q>1 on Polaris. This
              sequencing has no commercial precedent in energy infrastructure. A conventional risk management framework
              would require scientific proof-of-concept before committing hundreds of millions in commercial plant
              construction capital. By inverting this sequence, Helion effectively placed a leveraged bet: if Q>1 comes
              on schedule, Orion construction progress accelerates time-to-revenue; if Q>1 is delayed or fails, sunk
              construction costs become unrecoverable. The construction investment — estimated at $1B+ for Orion —
              combined with ongoing Polaris R&D burn of ~$150M/year means the total capital at risk in a Q>1 failure
              scenario exceeds $2B before any Microsoft penalty exposure is counted. This is the defining structural
              risk of the Helion investment case and requires a dedicated risk tranche in any institutional portfolio
              model.
            calloutType: insight
            claimRefs:
              - CR003
              - CR022
              - CR023
          - type: callout
            title: Customer Concentration in Microsoft — Single Counterparty Exposed to 2028 Penalty
            body: >
              Helion's only contracted power purchase agreement is with Microsoft for 50 MW of fusion electricity by
              2028. This single customer relationship represents 100% of confirmed revenue commitments and a
              corresponding 100% concentration of PPA-related penalty exposure. The specific penalty terms have not been
              publicly disclosed, but industry-standard PPA penalties for failure-to-deliver typically range from
              liquidated damages of $10-50M to contract termination with asset claims. Microsoft has the resources to
              enforce such provisions aggressively. The Nucor 500 MW framework agreement provides pipeline
              diversification but has a longer (2030+) timeline with its own technical dependencies. OpenAI discussions,
              as reported in early 2026, remain speculative with no binding commitments. Customer concentration risk
              cannot be mitigated without binding contracts from additional independent counterparties at comparable
              scale before the 2028 delivery window.
            calloutType: insight
            claimRefs:
              - CR007
              - CR008
              - CR009
          - type: callout
            title: NRC Part 53 Rulemaking Outcome Is a Binary Regulatory Risk for Orion
            body: >
              Helion Orion will be the first commercial fusion power plant to seek an NRC operating license. No
              regulatory pathway has been tested end-to-end. The Part 53 framework, finalized in 2024, creates a
              risk-informed advanced reactor licensing process, but its application to fusion — versus fission —
              involves unresolved technical determinations that NRC staff must make on a case-by-case basis with no
              precedent. If NRC requires additional environmental impact assessments, expanded safety analysis reports,
              or novel safety system requirements for the FRC plasma containment approach, the licensing timeline could
              extend 2-5 years beyond Helion's 2028 target. Worst case, a Part 53 adverse rulemaking or legislative
              change could create licensing barriers requiring congressional action. This regulatory binary is outside
              Helion's direct control and cannot be fully mitigated by technical progress alone. Independent regulatory
              counsel should be engaged to assess NRC pre-application engagement status and likely timeline.
            calloutType: insight
            claimRefs:
              - CR005
              - CR006
              - CR010
          - type: callout
            title: He-3 Self-Breeding Efficiency Is Commercially Unvalidated — Model Risk
            body: >
              Helion's commercial D-He3 fuel cycle requires the reactor to breed its own helium-3 from deuterium fusion
              reactions — a process that has not been demonstrated at any scale, let alone at the efficiency levels
              required for commercial viability. The global civilian He-3 supply is approximately 25-30 kg/year at a
              cost of ~$1,000/gram, making external He-3 procurement commercially infeasible for a 50 MW facility.
              Self-breeding efficiency is therefore not a technical option but a commercial necessity. Helion's modeling
              of He-3 breeding yield has not been independently validated and no peer-reviewed publication confirms the
              claimed efficiency projections. If breeding efficiency is materially below projections — a risk
              specifically surfaced by the Bloomberg 2024 investigation — the entire long-term commercial model fails
              even if Q>1 is achieved on a D-T Polaris device. This makes He-3 breeding a hidden second binary gate in
              the commercial pathway, less visible than Q>1 but equally fatal if unresolved.
            calloutType: insight
            claimRefs:
              - CR015
              - CR016
              - CR017
          - type: callout
            title: Bloomberg Scientific Concerns Must Be Resolved via Independent Plasma Audit Before Series G
            body: >
              Bloomberg's July 2024 investigation raised specific concerns about Helion's scientific transparency,
              direct Faraday energy conversion efficiency claims, and the absence of independent third-party validation
              of plasma data. Helion has not publicly responded with independent scientific review or released raw
              experimental data. This unresolved credibility gap represents a material risk for Series G fundraising:
              institutional investors (sovereign wealth funds, pension funds, large family offices) who were not in
              earlier rounds will demand independent technical due diligence that Helion's current opacity cannot
              satisfy. The recommended diligence action is to engage an independent plasma physics advisory panel (e.g.,
              MIT, Princeton Plasma Physics Laboratory, or Lawrence Livermore NIF team) to review Polaris experimental
              data under NDA and produce a written technical assessment. This single action would de-risk the
              credibility dimension more than any other available mitigation and should be a condition of any Series G
              lead investor commitment.
            calloutType: insight
            claimRefs:
              - CR004
              - CR032
              - CR033
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Recommendation
        blocks:
          - type: paragraph
            body: >
              Helion Energy occupies a singular position in the private markets: the highest-valued private fusion
              company on earth at a $5.425 billion post-money Series F valuation (January 2025), backed by the world’s
              only two signed commercial fusion power purchase agreements, and buoyed by the most compelling structural
              market tailwind in the energy sector—AI-driven data center power demand that Goldman Sachs projects will
              grow 165% by 2030. These facts define the bull thesis. The anti-thesis is equally stark: Helion has zero
              revenue, has never demonstrated net energy gain (Q>1) from its fusion device, and is attempting to deliver
              commercial electricity by 2028—a timeline that mainstream fusion physicists regard as extraordinarily
              aggressive. The $5.425 billion valuation cannot be supported by any conventional discounted cash flow
              analysis. It is entirely option value on an unachieved physics milestone.


              Our recommendation is CONDITIONAL HOLD for existing holders and SPECULATIVE BUY only for patient deep-tech
              capital with a five-to-ten-year horizon, the capacity to absorb a complete loss, and a minimum check size
              large enough to survive multiple dilutive rounds before any liquidity event. The primary condition
              triggering higher conviction is independent validation of Polaris net-electricity output (Q>1), expected
              in the second half of 2026. Until that milestone is confirmed, investors are paying for the bull case
              without the bull case having occurred.


              The structural case for Helion rests on four pillars: (1) the Microsoft PPA with binding financial
              penalties creates urgency that no other fusion company faces; (2) the Nucor 500 MW industrial deal,
              confirmed in Nucor’s SEC 8-K filing, provides the largest contracted fusion pipeline globally; (3) AI
              power demand creates a multi-decade addressable market of unprecedented scale; and (4) ARPA-E’s $135
              million new fusion commitment (April 2026) signals continued government validation. Against these pillars,
              the anti-thesis is rooted in physics uncertainty, valuation discipline, and governance complexity. The
              recommendation logic flows through all six factors summarized in FV001; the formal stance is captured in
              TV001.
