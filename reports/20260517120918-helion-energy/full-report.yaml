      - number: '4.3'
        title: Cost Structure and Unit Economics
        blocks:
          - type: paragraph
            body: >
              Helion's cost structure is dominated by three categories: human capital, capital expenditure for the Orion
              plant, and research and development for Polaris and enabling technologies. With approximately 350
              employees as of early 2026, the fully-loaded personnel cost is estimated at $85–120 million per year based
              on competitive deep-tech engineering compensation in the Seattle corridor. Orion's construction cost has
              been reported at approximately $400 million; this is a first-of-kind estimate and highly likely to carry
              significant variance. Polaris R&D, facility costs at the Everett campus and the Malaga plant site, the
              HERCULES grant outflows, and normal G&A together likely push total annual operating expenditure to the
              range of $150–300 million per year in 2025–2026.

              Unit economics are fundamentally not calculable for a pre-commercial fusion company. No product has been
              sold, no production capacity exists, and the critical cost components—materials per pulse, magnet
              replacement cycles, tritium/deuterium procurement, direct energy conversion system maintenance—remain
              either proprietary or speculative. Helion claims direct Faraday induction converts fusion energy to
              electricity at efficiency rates potentially above 60 percent, compared with 30–35 percent for
              steam-turbine cycles; if this holds at scale, it provides a structural cost advantage. However, no
              independent validation of commercial-scale efficiency has been published. Gross margin will not exist
              until the first kilowatt-hour is sold, likely in 2028 at the earliest.

              Working capital needs are minimal (no inventory, no receivables) but capex intensity is extreme: each new
              plant likely requires hundreds of millions of dollars in specialized magnets, pulsed-power systems, and
              infrastructure. A fleet capable of meeting the OpenAI 5 GW target by 2030 would require the equivalent of
              roughly 100 Orion-scale plants, implying tens of billions in cumulative capex—well beyond any private
              fusion company's current capital base. This raises fundamental capital structure questions that are not
              addressable with current public evidence.
