      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              The TAM for Helion is the global electricity market: ~$3.8 trillion/year, consuming 28,200 TWh in 2025 and
              growing to 33,600 TWh by 2030 at an average 3.6% CAGR (IEA). The IEA projects that advanced economies
              account for ~20% of incremental demand through 2030, with data centers driving ~50% of US incremental
              demand growth.

              The SAM — the carbon-free, firm baseload segment — is harder to bound precisely. As of 2025, clean energy
              corporate PPA volumes were 55.9 GW (BloombergNEF), of which "baseload-like" firm power deals (nuclear,
              geothermal, co-located storage) accounted for 5.2 GW. If clean power reaches 50% of global generation by
              2030 (IEA), that implies a ~$1.9T SAM in electricity revenue. The firm-power premium sub-segment is
              smaller, perhaps $200–400B globally, as firm clean power currently commands a premium over intermittent
              renewables.

              Helion's current SOM is the committed early-commercial footprint: Microsoft's 50 MW PPA by 2028 and
              Nucor's 500 MW by 2030 = 550 MW of contracted capacity. At typical wholesale rates of $50–80/MWh, 550 MW
              generates ~$240–390M in annualized electricity revenue. A broader SOM includes other hyperscalers,
              industrial EAF operators, and utilities procuring carbon-free baseload — a segment that grew to $29.5 GW
              of corporate deals in the US alone in 2025.

              Commercial fusion industry market sizing estimates from research firms (TBRC: $288B in 2025, growing to
              $420B by 2030) should be interpreted with caution: these figures include R&D expenditures, equipment,
              infrastructure, and adjacent services — not electricity generation revenue alone. They are directionally
              useful but methodologically opaque.
