      - number: '4.4'
        title: Capital Adequacy and Runway
        blocks:
          - type: paragraph
            body: >
              Helion has raised approximately $1.425 billion in cumulative equity capital across six rounds. The Series
              E ($500 million, November 2021) was led by Sam Altman's personal $375 million investment alongside OpenAI
              and others. The Series F ($425 million, January 2025) included strategic participation from Nucor ($35
              million) and various institutional and individual investors, valuing the company at $5.425 billion
              post-money. The Nucor investment is confirmed in Nucor's SEC 8-K filing from October 2023, which documents
              the "SEP 2023 Investment in Helion Energy to develop 500MW fusion plant" as part of the company's
              sustainability initiatives. A Series D ($40 million) in September 2020 had valued the company at $1.25
              billion.

              Helion has not disclosed its current cash position, monthly burn rate, or runway horizon. Based on
              publicly available indicators—headcount, construction timeline, R&D intensity—we estimate annual cash
              consumption in the range of $150–300 million. At the midpoint ($225 million/year), the $425 million Series
              F proceeds (net of expenses and prior spending) would provide approximately 18–24 months of runway from
              the January 2025 close, extending into mid-to-late 2026. This estimate implies Helion will need to close
              an additional funding round—likely a Series G—before or during the peak Orion construction phase in
              2026–2027.

              Helion carries no publicly disclosed debt or credit facilities. Project finance for Orion has not been
              announced. Given the novel regulatory and technical profile of the project, traditional project finance
              may be difficult to arrange before Polaris demonstrates net electricity output; the company is likely to
              rely on equity capital for the near term. The Microsoft PPA's penalty structure creates contingent
              financial liability whose magnitude is not disclosed, but CEO David Kirtley described it as a "binding
              agreement with financial penalties," suggesting non-trivial downside exposure. The strategic alignment
              between Helion's largest investor (Altman), its newest potential customer (OpenAI), and the governance
              change (Altman's board exit) merits monitoring for conflict or dependency concentration.
