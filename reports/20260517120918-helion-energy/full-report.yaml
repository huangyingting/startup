      - number: '5.5'
        title: Trust, Safety, Regulatory Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >
              Helion's regulatory and safety posture is in transition from R&D to commercial. The NRC has confirmed
              pre-application discussions for Helion's Polaris facility, and NEI Magazine reported that Helion secured a
              licence to advance its Polaris fusion facility in 2026. The NRC's Part 53 framework — the first dedicated
              US fusion licensing framework — remains in final rulemaking as of May 2026, meaning Orion's commercial
              operation license cannot be issued until Part 53 is finalized and Helion completes a full application.
              Separately, tritium produced as a byproduct of D-T side reactions during Polaris operation requires
              distinct DOE and Department of Health approvals independent of the NRC pathway.

              No independent third-party safety audit of Helion's devices has been publicly published. Bloomberg
              reported in 2024 that external experts cannot verify Helion's energy balance or safety performance from
              available public data, a critical transparency gap. MIT Climate researchers noted that the 2028 timeline
              is viewed as very aggressive by mainstream fusion physicists. Helion has not published peer-reviewed data
              confirming Q>1 energy gain, and the He-3 breeding ratio at commercial scale remains unverified by external
              parties. The HERCULES program, providing over $17 million to 20+ universities and national laboratories
              through 2028, is the primary external peer-review mechanism, but publications from that program had not
              yet emerged as of the research date. Quality control documentation for plasma control software is not
              publicly available, and no IEC 61513-equivalent nuclear software certification has been disclosed for
              Helion's fusion control systems.
