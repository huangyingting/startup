      - number: '6.5'
        title: Concentration Risk, Contract Durability, and Expansion Strategy
        blocks:
          - type: paragraph
            body: >
              Helion's customer concentration is extreme by any measure. Two customers — Microsoft and Nucor — represent
              100% of known commercial commitments. One of those (Microsoft) is binding with financial penalties; the
              other (Nucor) is a development-stage agreement. A failure to deliver on the Microsoft PPA would trigger
              financial penalties, damage Helion's credibility with all future prospective customers, and likely
              precipitate a capital crisis. There is no diversification of off-take risk across multiple buyers,
              geographies, or contract structures.

              Contract durability is difficult to assess without full PPA terms. The Microsoft agreement has a penalty
              structure, which signals durability from Microsoft's perspective — it is designed to survive Helion's
              reluctance to pay and thus represents a genuine long-term commitment from the buyer. However, force
              majeure provisions, technology failure carve-outs, and early termination clauses (if any) are unknown.
              Nucor's agreement, as a development-stage deal, likely carries more flexibility for both parties given the
              2030 target, but specific termination rights, penalties, and milestone-based gates are not publicly
              disclosed.

              The expansion strategy is clearly to land hyperscale and industrial anchor customers, use the Microsoft
              PPA as a reference, and accelerate deal-making once commercial operations are proven. However, without the
              first delivered MWh, all expansion remains hypothetical. Procurement friction is significant: each deal
              requires custom siting, environmental permitting, grid interconnection agreements, and bilateral PPA
              negotiation. The OpenAI reports suggest the pipeline is active, but confirmation and deal structure
              details are lacking. Any investor should treat Helion's customer book as a single-contract enterprise
              (Microsoft PPA) with one pipeline stage (Nucor development deal) and one speculative conversation
              (OpenAI), with no revenue and no track record of delivery.
