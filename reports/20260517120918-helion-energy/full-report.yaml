      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Three buyer segments define Helion's near- and medium-term commercial opportunity:

              **Hyperscale data center operators** are the most immediate buyers. Meta, Amazon, Google, and Microsoft
              together accounted for 49% of all global corporate clean energy PPA activity in 2025 (BloombergNEF), and
              are increasingly contracting nuclear and advanced energy to meet 24/7 carbon-free energy (CFE)
              commitments. The Gartner data center electricity forecast (448 TWh in 2025 → 980 TWh by 2030) implies ~530
              TWh of net new demand requiring clean sourcing by 2030. These buyers have dedicated energy procurement
              teams, multi-year PPA execution capability, and are already comfortable with novel structures (as
              evidenced by Microsoft's Helion PPA and Three Mile Island restart).

              **Industrial decarbonizers** — particularly electric arc furnace (EAF) steel producers — form the second
              key segment. The industrial sector consumes 38% of global final energy and emits 25% of direct CO₂
              (ResearchAndMarkets). EAF steelmaking, which uses recycled scrap and electricity, emits only ~0.3 t CO₂/t
              steel vs ~2.2 t CO₂/t steel for blast furnace routes. EAF adoption is growing, with ~50% of new
              steelmaking capacity in development using EAF. Nucor — the largest EAF operator globally — exemplifies
              this segment: it signed a 500 MW fusion PPA with Helion and invested $35M in the Series F, indicating
              strategic alignment around clean baseload for decarbonized steel production.

              **Utilities and grid operators** are a medium-term segment as fusion matures. Regulated utilities
              acquiring new baseload capacity and ISOs/RTOs managing resource adequacy will be the natural buyers for
              multi-hundred-MW deployments in the 2030s. This segment has longer procurement cycles and requires
              regulatory approval.
            claimRefs: []
          - type: table
            tableRef: TM003
            claimRefs:
