      - number: '8.4'
        title: Investment KPIs and Final Diligence Summary
        blocks:
          - type: paragraph
            body: >
              The investment KPI dashboard for Helion concentrates six observable metrics that any investor should track
              before committing capital or increasing allocation. These metrics—Series F valuation, cumulative capital
              raised, contracted PPA pipeline, peer premium, AI power demand tailwind, and government validation—do not
              in themselves justify the investment; they frame the option value being purchased. FV004 renders these
              metrics in a dashboard format for quick IC review. The central diligence deficit is the absence of
              independently verifiable financial and technical data: Helion has not published audited financials,
              disclosed its Orion capex budget, confirmed its monthly burn rate, or quantified the Microsoft PPA penalty
              exposure. Without these five data points, any valuation model is speculative.


              TV005 identifies the five events that would break or confirm the investment thesis: (1) Polaris
              net-electricity failure by Q4 2027 is a terminal thesis-break event; (2) Microsoft penalty triggering is
              an existential capital drain; (3) a distressed Series G below $5.4 billion indicates loss of institutional
              confidence; (4) OpenAI deal collapse removes the transformative revenue scenario; and (5) key executive
              departure (especially CEO David Kirtley) creates leadership risk at the critical Polaris-to-Orion
              transition. TV006 provides the structured diligence ask list that any prospective investor should work
              through under NDA before making a commitment. The five items are sequenced by materiality: (1) Polaris
              milestone validation, (2) PPA penalty terms, (3) Orion capex budget, (4) capitalization table, and (5)
              Series G terms when announced. Wood Mackenzie reports the SMR pipeline has surged 42% driven by data
              center demand; SMR Intel tracks 40+ nuclear data center deals signed in 2024–2026—establishing that the
              competitive race for firm carbon-free baseload is live and Helion must deliver on its timeline to capture
              the window.
            claimRefs: []
