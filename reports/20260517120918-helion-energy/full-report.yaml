      - number: '3.2'
        title: Substitute Technologies and Incumbents
        blocks:
          - type: paragraph
            body: >
              The most material substitution threat to Helion's near-term commercial position is advanced small modular
              fission reactors (SMRs), particularly the GE Vernova Hitachi BWRX-300. The BWRX-300 (300 MWe,
              light-water-cooled boiling water design) is under active construction at Ontario Power Generation's
              Darlington site in Canada, with commercial operation targeted for 2030. Ontario plans four BWRX-300 units
              (1.2 GW total). The Tennessee Valley Authority has filed the first US Construction Permit Application for
              a BWRX-300 at the Clinch River site, Oak Ridge, Tennessee. The global BWRX-300 pipeline spans Poland (~24
              units at 6 sites backed by a $4B US EXIM commitment), Sweden, the UK, and others.

              The SMR threat to Helion is real but bounded. SMRs solve the "firm carbon-free baseload" problem that
              Helion also addresses, and SMR timelines overlap with Helion's 2028-2030 customer window. However, SMR
              LCOE estimates range from $90–160/MWh (Wood Mackenzie, BloombergNEF) — far above Helion's projected
              $0.01/kWh (~$10/MWh) long-run target. A buyer that commits to an SMR PPA in 2025-2026 reduces available
              capacity for Helion's 2028 delivery, but SMRs cannot be redirected to Helion's industrial customers once
              contracted. Helion's Nucor deal is structurally protected because Nucor is co-investor and strategically
              aligned.

              NuScale Power holds the only NRC design certification for an SMR (77 MWe US460, certified May 2025), but
              its flagship project was cancelled in 2023 and it is currently seeking new deployments. Oklo (Aurora
              advanced fission, HALEU fuel) is pre-construction and awaiting NRC approval for an updated application.
              TerraPower Natrium has a construction permit application under active NRC review for the Kemmerer, Wyoming
              demonstration plant.

              Other substitutes include natural gas (>40% of US grid in 2025, cheapest dispatchable option),
              long-duration storage paired with renewables (nascent technology, cost-uncertain), and geothermal (firm
              and carbon-free but resource-constrained geographically). For Helion's hyperscaler customers (Microsoft,
              potential others), the 24/7 carbon-free electricity requirement eliminates unabated natural gas and limits
              storage economics, so the effective substitute set is advanced nuclear only — making the competitive
              battleground more focused.
