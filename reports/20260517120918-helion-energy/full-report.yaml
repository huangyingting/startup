      - number: '8.2'
        title: Valuation Context and Comparable Analysis
        blocks:
          - type: paragraph
            body: >
              Helion’s $5.425 billion Series F valuation represents a 3.0x premium over Commonwealth Fusion Systems
              (CFS), the next-highest-valued private fusion company at approximately $1.8 billion at its Series
              B-equivalent round in 2021. TAE Technologies, with $1.2 billion in total capital raised, and Zap Energy,
              with approximately $130 million raised, are far smaller. General Fusion—the most cautionary
              comparable—raised over $300 million and shut down inDecember 2024 without achieving net energy gain,
              demonstrating that substantialcapital is no guarantee of physics success. In the public markets, NuScale
              Power’s collapse from a $1.8 billion market cap to below $200 million after losing itslead customer shows
              how quickly firm low-carbon baseload valuations can reset. S&P Global estimates the private fusion sector
              has attracted over $7 billion in investment since 2000, and the Fusion Industry Association identifies 40+
              active companies.


              The entry discipline problem is acute: at $5.425 billion, Helion is already priced well above the entire
              comparable peer set. No fusion company has achieved commercial electricity generation. The valuation
              multiple cannot be computed against revenue, EBITDA, or any standard financial metric; investors are
              implicitly underwriting an option on physics and manufacturing scale-up. The comparable set in TV004
              attempts to bound this option value from multiple angles—private fusion peers, public SMR analogues, and
              utility-scale reference points. FV002 illustrates sensitivity across valuation scenarios. The core
              question for entry discipline is whether the option value at $5.4 billion is fair relative to milestone
              risk. At current valuation, investors need a bull-case outcome (Q>1, Orion on schedule, OpenAI deal
              closed) to generate meaningful returns. Any deviation toward the base or bear case implies flat or
              negative absolute returns from the Series F entry price.


              BloombergNEF’s 2025 data showing corporate clean energy buying declined in 2025 after a decade of growth
              is a modest adverse signal: it suggests the PPA market faces headwinds even before fusion is commercially
              available. This does not break the thesis—hyperscaler baseload demand is structurally different from
              general corporate PPA demand—but it signals the competitive environment for future Helion PPA pricing.
