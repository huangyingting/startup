              The GE Vernova Hitachi BWRX-300 is the only clean firm-power technology actually under construction and
              scheduled for commercial operation in the same 2028-2030 timeframe as Helion's PPAs. At LCOE of
              $90-160/MWh it is far more expensive than Helion's long-run target, but it offers regulatory clarity,
