  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Helion Energy is a pre-commercial company with zero product revenue as of May 2026. Its revenue model
              rests entirely on future electricity deliveries under signed Power Purchase Agreements (PPAs). The
              Microsoft PPA—the world's first commercial fusion energy contract—commits Helion to deliver at least 50
              megawatts of fusion-generated electricity to Microsoft data centers by 2028, with a one-year ramp-up,
              enforced by financial penalties if undelivered. The Nucor PPA, announced in November 2023 alongside a $35
              million strategic investment in Helion by Nucor, targets 500 megawatts of fusion electricity for
              industrial steelmaking applications by 2030. Together these represent committed offtake obligations of 550
              MW—the largest contracted fusion pipeline globally—but all revenue lies in the future, contingent on
              technical and construction milestones that have never been achieved by any company.

              In March 2026, Helion confirmed it is in advanced negotiations with OpenAI for a deal that would provide
              up to 5 gigawatts of power by 2030, scaling to 50 gigawatts by 2035. This potential agreement would dwarf
              the existing PPA pipeline by two orders of magnitude, but remains unexecuted; Helion has not confirmed any
              new signed customer agreements beyond Microsoft and Nucor. Separately, Sam Altman—Helion's largest
              individual investor and formerly a board member—stepped down from the board in March 2026 to manage the
              conflict-of-interest optics of his dual role as OpenAI CEO and Helion backer.

              Ancillary income streams include external research partnerships. In April 2026 Helion announced its
              HERCULES program, committing more than $17 million through 2028 to 25 funded proposals across 20
              universities and national labs to advance enabling technologies. HERCULES is a cost, not a revenue—Helion
              pays out the grants—but it demonstrates spending discipline and IP-adjacent ecosystem building.
              Non-dilutive public funding supplements capital: ARPA-E has invested approximately $134 million in
              commercial fusion technologies since 2014, catalyzing more than $1.5 billion in private follow-on funding
              across the sector; in April 2026 ARPA-E announced an additional $135 million commitment over 18 months.
              Specific prior grants to Helion are not publicly itemized, but the company's FRC work aligns directly with
              ARPA-E's stated portfolio areas. Technology licensing to third parties is not part of Helion's current
              business model; all plants are owned and operated directly.
