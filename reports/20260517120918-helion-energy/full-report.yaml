      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The demand side is powerfully favorable. The AI-era data center buildout represents the most concentrated
              power demand surge in modern history: Gartner forecasts data center electricity to double from 448 TWh to
              980 TWh by 2030, with AI-optimized servers growing from 21% to 44% of all data center power. Goldman Sachs
              projects a 165% increase in overall data center power demand by 2030. These buyers cannot be served by
              intermittent solar and wind without prohibitive battery storage costs — they need dispatchable,
              carbon-free baseload, which is precisely what fusion promises.

              Industrial decarbonization compounds the opportunity. Investment in industrial decarbonization
              technologies reached $87B in 2022 and is projected to exceed $250B annually by 2030 (ResearchAndMarkets).
              Electrification of steel, chemicals, and cement drives demand for carbon- free electricity that matches
              process cycle timing — again favoring firm, round-the-clock supply.

              Adoption constraints are severe and partially beyond Helion's control. The most critical is technology
              readiness: Helion has not yet demonstrated commercial-grade net energy gain. The FIA industry consensus
              (2030–2035 for grid-connected fusion) is more conservative than Helion's 2028 target, and 83% of the FIA's
              53 surveyed companies cite investment as a "major challenge." Capital intensity is structurally
              constraining: the industry collectively needs $77B additional investment for pilot plants against $9.7B
              raised to date — an 8:1 funding gap. Regulatory pathways for fusion plants remain undefined in the US.
              Grid interconnection queues, high capital costs for early-of-a-kind plants, and the long track record of
              fusion "always being 20 years away" create credibility-based switching friction for corporate buyers.
