          Raises value of firm power vs annual renewable certificates; BNEF tracks 5.8 GW of co-located and hybrid deals
          responding to this shift
        - Monitor GHG Protocol Scope 2 final rules; assess buyer procurement shifts to hourly-matched CFE
      - - IEA electricity demand growth (3.6% CAGR global)
        - Market size driver (+)
        - 2026–2030
        - >-
          Larger total market ceiling; advanced economies re-accelerating demand for first time in 15 years, especially
          US (+2% yr) and EU (+2.3% yr)
        - Track EIA and IEA quarterly demand revisions for upside/downside to TAM growth
      - - SMR and advanced nuclear competitor buildout
        - Competitive constraint (-)
        - 2028–2035
        - >-
          SMR pipeline surged 42% to 47 GW (Q1 2025, Wood Mac); SMR LCOE of $90-160/MWh still far above Helion's target,
          but SMR timeline is better established; 39% of SMR pipeline driven by data centers — direct Helion overlap
        - Monitor SMR cost trajectory; assess if hyperscalers will wait for Helion or commit to SMR deals first
      - - Capital intensity and $77B funding gap
        - Adoption constraint (-)
        - Persistent
        - >-
          FIA: $9.7B raised vs $77B needed for all pilot plants; Helion is better-funded than average but needs
          additional capital post-Series F for Orion + commercial scaling
        - Verify Helion's capital adequacy through 2028; assess likelihood and terms of Series G
      - - Absence of fusion-specific regulatory framework
        - Adoption constraint (-)
        - 2025–2030 acute
        - >-
          No established NRC licensing pathway for fusion in US; site-specific reviews add 2-5 years; Helion received
          Washington DOH tritium approval but NRC commercial licensing is undefined
        - Track NRC fusion regulation rulemaking; assess Helion's engagement with NRC and DOE
      - - No demonstrated net energy gain commercially
        - Technology/market risk (-)
        - Persistent until milestone
        - >-
          Helion has not disclosed net energy gain achievement; FIA industry consensus is 2030-2035 for first commercial
          delivery; buyer credibility at risk until milestone is achieved
        - Request independent technical verification of plasma energy balance; track Polaris and Orion milestones
      - - Grid interconnection queue and infrastructure
        - Adoption constraint (-)
        - 2026–2030
        - >-
          US grid interconnection queues are 5-7 years in some regions; Helion's Malaga WA plant needs BPA
          interconnection approval; Nucor site selection constrained by grid capacity
        - Verify Malaga WA interconnection application status with BPA; assess queue position for Nucor facility
      - - Trade tariffs on steel/aluminum and supply chain
        - Cost constraint (-)
        - 2025–2030
        - >-
          Wood Mac: tariffs expected to raise SMR construction costs ~6% by 2030; may affect Helion's plant construction
          costs as well
        - Assess Helion's supply chain exposure to tariff-affected materials; cost contingency in Orion budget
