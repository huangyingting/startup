      - number: '6.4'
        title: OpenAI Partnership Discussions and Hyperscaler Pipeline
        blocks:
          - type: paragraph
            body: >
              In March 2026, GeekWire and Power Magazine reported that OpenAI is in discussions with Helion to secure
              multi-gigawatt fusion power, with one report citing 5 GW by 2030 and up to 50 GW by 2035 targets — figures
              that would vastly exceed Helion's currently planned commercial capacity. Sam Altman stepped down from
              Helion's board in March 2026 to eliminate potential conflicts of interest as the OpenAI-Helion partnership
              talks advanced. The deal has not been publicly confirmed by either party as of May 2026 and should be
              treated as unconfirmed and speculative for diligence purposes.

              If an OpenAI-Helion deal were confirmed at even a fraction of the reported scale, it would represent a
              transformative shift in Helion's customer concentration and revenue potential. OpenAI's rapid electricity
              demand growth, driven by large language model training and inference workloads, makes it one of the
              highest-demand hyperscale power buyers globally. The Altman connection (OpenAI CEO, former Helion board
              chair) creates both an opportunity (trusted relationship, shared investor base) and a risk (conflicts of
              interest, nepotistic deal optics, regulatory scrutiny of self-dealing).

              Beyond OpenAI, Helion's long-term customer thesis rests on serving a wave of AI hyperscalers (Microsoft
              Azure, AWS, Google Cloud), industrial decarbonizers (steel, cement, aluminum), and potentially regulated
              utilities. The customer acquisition path is relationship-driven rather than product-led: no self-serve
              channel exists, no marketplace, and no reseller network. Every major deal requires C-suite engagement,
              multi-year negotiation, and custom siting and grid interconnection planning. This creates high barriers to
              customer acquisition at scale. On the other hand, if Helion delivers on the Microsoft PPA, the resulting
              reference customer and proof-of-concept should dramatically compress the sales cycle for subsequent
              hyperscaler and industrial buyers.
            claimRefs:
              - CU021
              - CU022
