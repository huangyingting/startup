      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Helion has raised over $1 billion in cumulative capital across at least seven financing rounds since its
              founding. Early funding included government grants from NASA, the DOE, and DARPA, followed by private
              venture participation through Y Combinator and Mithril Capital in 2014. The company's financing trajectory
              accelerated sharply in the early 2020s as fusion's commercial viability became increasingly credible.

              The Series E round in November 2021, totaling $500 million, was notable both for its scale and for Sam
              Altman's direct personal leadership role in organizing the investment. That round valued the company at
              approximately $2.2 billion post-money. The latest disclosed round, a Series F in January 2025, raised $425
              million from new investors Lightspeed Venture Partners, SoftBank Vision Fund 2, and an unnamed major
              university endowment, alongside existing investors Sam Altman, Mithril Capital, Capricorn Investment
              Group, Dustin Moskovitz through Good Ventures Foundation, and Nucor. The Series F was described as
              oversubscribed and upsized. The post-money valuation after the Series F was $5.425 billion, bringing total
              capital raised to more than $1 billion. Nucor's involvement is both strategic (as a future 500 MW
              customer) and financial ($35 million direct investment announced in September 2023).

              The company is pre-revenue; the Series F is intended to fund operations through the targeted 2028
              commercial deployment. Secondary market indicators suggest implied valuations as high as $15 billion, but
              the company-verified post-money figure remains $5.425 billion from the January 2025 round.
