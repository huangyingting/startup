      - number: '1.5'
        title: Adverse Signals and Critical Perspectives
        blocks:
          - type: paragraph
            body: >
              Helion's aggressive 2028 commercial timeline has attracted sustained skepticism from nuclear experts and
              technical journalists. A May 2023 MIT Technology Review report documented concern from multiple nuclear
              researchers that Helion has not publicly disclosed whether it has crossed the most fundamental fusion
              milestone — generating more energy from fusion reactions than was consumed to drive them (physics
              breakeven or net energy gain). The company acknowledged it had not commented on this and would not do so
              publicly, citing intellectual property considerations. Independent academics quoted in MIT Technology
              Review found a 2028 commercial delivery date "very fast" for the fusion sector at large, with some noting
              that most competitors are targeting early-2030s for even limited power demonstrations.

              In July 2024, a Bloomberg investigation drew heightened scrutiny, noting that Helion is "particularly
              tight-lipped" about its progress relative to the 45+ peers who publish scientific results and present at
              conferences. The Bloomberg story also reported allegations of internal strife including gender
              discrimination; Helion disputed these claims, stating an external investigator found no evidence of the
              specific incident described. The company's response emphasized its IP protection rationale for limited
              publishing.

              As of the May 2026 reporting date, Helion has not released data on energy recovery with plasmas present,
              meaning its stated high electricity recovery efficiencies (>95% demonstrated without plasma) have not yet
              been validated in fusion conditions. The technical path from the current 150M°C D-T plasma demonstration
              to sustained net electricity from D-He3 fusion remains unproven and represents material execution risk for
              the 2028 commitment.
            claimRefs:
              - CO037
              - CO038
              - CO039
      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: World's First Commercial Fusion PPA with Binding Penalties
            body: >
              The May 2023 Microsoft PPA — the world's first commercial fusion power purchase agreement — includes
              financial penalties if Helion fails to deliver. This transforms Helion from a pure R&D venture into a
              company with hard commercial commitments and accountability to a marquee counterparty. Constellation
              Energy's role as power marketer adds commercial-grade infrastructure around the delivery.
            calloutType: strength
            claimRefs:
              - CO026
              - CO028
          - type: callout
            title: 'Private-Sector Fusion Records: 100M°C and First D-T Fusion'
            body: >
              Helion's 7th-generation Polaris prototype set two private fusion records in early 2026: first privately
              funded D-T fusion demonstration, and a plasma temperature of 150 million degrees Celsius. These milestones
              were validated by external experts including a DOE Associate Director for Fusion Energy Sciences and a
              Sandia National Laboratories alumnus, providing meaningful third-party credibility.
            calloutType: strength
            claimRefs:
              - CO023
              - CO024
              - CO025
          - type: callout
            title: Net Energy Gain Not Publicly Demonstrated
            body: >
              As of May 2026, Helion has not publicly disclosed results showing fusion energy output exceeds the energy
              consumed to drive the reaction. The company cites IP protection for its lack of publishing. Without a
              verified physics or engineering breakeven milestone, the 2028 commercial delivery commitment carries
              material technical execution risk. Independent experts have called the timeline "very fast" for the
              sector.
            calloutType: risk
            claimRefs:
              - CO038
              - CO039
          - type: callout
            title: Key-Person Concentration in Kirtley and Altman
            body: >
              David Kirtley (CEO) is the technical and organizational fulcrum of Helion's engineering progress. Sam
              Altman (Board Chair) is simultaneously the company's largest individual investor, strategic anchor, and
              CEO of a major potential future customer (OpenAI). Loss of or distraction from either figure would
              materially impair fundraising, technical execution, or commercial credibility.
            calloutType: risk
            claimRefs:
              - CO003
              - CO007
              - CO009
          - type: callout
            title: Nucor Investment Signals Industrial Credibility
            body: >
              Nucor Corporation — a NYSE-listed industrial giant and North America's largest steel recycler — has
              committed both as a $35 million investor and as the host and anchor customer for Helion's 500 MW plant.
              This dual role (investor and customer) provides unusually strong validation of Helion's commercial
              feasibility from a capital-intensive industrial user.
            calloutType: insight
