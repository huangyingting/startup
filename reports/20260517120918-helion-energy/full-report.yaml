      - number: '1.2'
        title: Founders and Leadership Team
        blocks:
          - type: paragraph
            body: >
              Helion was founded in 2013 by four scientists and engineers: David Kirtley (CEO), Chris Pihl (CTO), George
              Votroubek (Principal Scientist), and John Slough (emeritus co-founder). All four share deep backgrounds in
              plasma physics and fusion device design, with roots in research conducted at the University of Washington
              and national laboratories. The founding team represents a rare combination of academic fusion expertise
              and engineering-first thinking.

              David Kirtley leads the company with a hands-on, iterative engineering philosophy — personally involved in
              testing fusion machines on the floor — and has guided Helion from a small academic spinout to a $5.4
              billion enterprise over twelve years. Chris Pihl as CTO oversees the technical roadmap for the FRC plasma
              approach and prototype development. George Votroubek continues to lead plasma physics research as
              Principal Scientist.

              The executive team has expanded significantly as commercialization has intensified. Pragav Jain joined as
              CFO in approximately mid-2024 after a role at Waymo (Alphabet), signaling a shift toward commercial and
              financial rigor. Scott Krisiloff serves as Chief Business Officer; Sachin Desai as General Counsel; and
              Savanna Thompson as Chief Business Operations Officer. Sam Altman, CEO of OpenAI and Helion's largest
              individual investor, has served as Executive Chairman / Board Chair since 2015 — a relationship that began
              when Helion was recruited into Y Combinator's Summer 2014 cohort under Altman's presidency. Altman
              previously invested $350 million personally in Helion across multiple rounds. The heavy concentration of
              influence in Kirtley (CEO) and Altman (chair) creates key-person risk for both engineering and
              capital-raising continuity.
