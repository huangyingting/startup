  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Direct Fusion Competitor Landscape
        blocks:
          - type: paragraph
            body: >
              The private fusion sector has grown rapidly, with the Fusion Industry Association (FIA) 2025 survey
              identifying 53 companies globally with cumulative investment of $9.77 billion — a fivefold increase since
              2021. The US hosts 29 of these companies and captures the majority of global private fusion capital
              alongside China. Investment is highly concentrated: CFS alone holds approximately one-third of total
              private fusion capital globally (~$3 billion raised after its August 2025 Series B2 of $863 million).

              Commonwealth Fusion Systems (CFS), spun out of MIT in 2018, is Helion's most advanced direct competitor.
              CFS is pursuing a tokamak approach using high-temperature superconducting (HTS) REBCO magnet technology in
              its SPARC demonstration device. SPARC is under construction in Devens, Massachusetts, with net energy gain
              targeted before the end of this decade. The commercial ARC power plant — sited in Chesterfield County,
              Virginia, in partnership with Dominion Energy — will supply electricity to Google under a purchase
              commitment for half of ARC's output. CFS benefits from MIT institutional credibility, the largest private
              fusion capital base, and a tokamak approach that is the most validated fusion concept globally (ITER is
              the public-sector reference). However, CFS's first commercial power is targeted for the early 2030s —
              after Helion's 2028 commitment — and CFS has not disclosed a commercial PPA with binding delivery terms
              and penalties.

              TAE Technologies (founded 1998, Foothill Ranch, California), with >$1.3 billion raised from Google,
              Chevron, and others, is Helion's nearest FRC-approach peer. TAE's "Norm" machine — announced in April 2025
              — achieved the first-ever NBI-only stable FRC plasma formation, eliminating theta-pinch formation hardware
              and reducing machine complexity by up to 50%. TAE's November 2025 milestone (published in Nature
              Communications, presented at APS DPP) validated NBI-driven FRC formation as stable and repeatable. TAE
              subsequently compressed its roadmap, skipping a planned sixth-generation Copernicus device to proceed
              directly to the "Da Vinci" commercial power plant — targeting early 2030s delivery using hydrogen-boron
              (p-B11) fuel. TAE's p-B11 approach is aneutronic (no significant radioactive waste), which is commercially
              attractive, but p-B11 requires plasma temperatures approximately 30x higher than D-T or D-He3 and has not
              been demonstrated at commercially relevant conditions.

              Pacific Fusion (founded 2023), backed by $900 million in milestone-gated Series A funding led by General
              Catalyst, pursues pulsed magnetic liner-pinch fusion using Impedance-Matched Marx Generator (IMG)
              technology originally developed at Lawrence Livermore National Laboratory. The company targets net
              facility gain (energy out > energy in at facility level) by approximately 2030 using D-T fuel. Pacific
              Fusion's leadership includes former LLNL experts and Alphabet alumni. The $900M is milestone-gated rather
              than freely deployable, which provides accountability but also creates funding-cliff risk if milestones
              slip.

              Tokamak Energy (UK, $335M raised, founded 2009 as UKAEA spin-out), Proxima Fusion (Germany/UK, €185M
              raised, Max Planck Institute spin-out, 2023), and Type One Energy (US, >$160M raised, TVA-sited
              stellarator) represent the tier-two private fusion field. Tokamak Energy is the only private company to
              have operated spherical tokamaks for more than a decade, achieving 100 million°C in its ST40. Proxima
              Fusion's €130M Series A (June 2025), the largest private fusion round in Europe, funds an HTS
              QI-stellarator with the Stellarator Model Coil (SMC) target in 2027 and the Alpha demo (Q>1) target in
              2031. Type One Energy targets a 350 MW stellarator commercial plant (Infinity Two) at a retired TVA coal
              site in the mid-2030s under a technology-licensing rather than plant-ownership model.

              ITER — the 35-nation international fusion tokamak under construction in Cadarache, France — is not a
              commercial competitor but sets the technical benchmark. ITER's first plasma has been pushed to the late
              2020s at earliest, with first full-power D-T operation now expected in the mid-2030s and commercial
              derivatives (DEMO) unlikely before the 2040s. ITER's public funding and multi-decade timeline mean it is a
              credibility proxy but not a market competitor.
