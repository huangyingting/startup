      - number: '7.2'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Commercial fusion energy has no licensing precedent in the United States. The NRC finalized its Part 30
              byproduct-material rule for fusion systems in June 2023, and the Part 53 advanced reactor framework became
              available in 2024, but no commercial fusion plant has received an operating license under either
              framework. Helion obtained an NRC tritium possession license in 2024 — the first for a private fusion
              company — but the full commercial operating license pathway for Orion is uncharted. First-mover status
              means Helion faces case-by-case regulatory determinations with no precedent to rely on, and the timing for
              NRC commercial fusion licensing is unpredictable. The Price-Anderson Act's nuclear liability provisions
              have unclear applicability to commercial fusion facilities, creating residual uncapped liability exposure
              until clarified. Washington State SEPA environmental review is required for the Malaga construction site
              and could add 12-18 months to the Orion schedule. On the legal side, the Microsoft PPA contains
              undisclosed financial penalty provisions for 2028 delivery failure that represent the highest quantified
              legal exposure in Helion's profile. Bloomberg's July 2024 investigation raised scientific credibility
              concerns that, while not active litigation, create reputational risk for future capital raises. The
              Regulatory/Legal Risk Register (TR001) and Risk Transmission Map (FR002) detail these exposures.
