      - number: '3.4'
        title: Displacement and Commoditization Risk
        blocks:
          - type: paragraph
            body: >
              The most likely commoditization scenario for Helion is a world in which fusion energy becomes a proven
              technology by 2032-2035, at which point 10+ well-funded companies attempt to serve the same hyperscaler
              and industrial customer base. In that scenario, Helion's head start — the two PPAs — provides a one-cycle
              advantage but not permanent pricing power. The key moat durability question is whether Helion can leverage
              early commercial success (2028-2030) to build the supply chain, manufacturing expertise, and customer
              relationships needed to expand faster than later entrants.

              CFS is the only competitor with the capitalization ($3B) to potentially out-invest Helion ($1B+) in the
              critical 2026-2030 window. However, CFS's tokamak approach requires larger, more complex plant engineering
              than Helion's compact FRC design. CFS has Google as a committed offtaker for ARC, but this is a
              preliminary purchase commitment (not a penalty-backed PPA), reducing CFS's commercial urgency compared to
              Helion's Microsoft deal.

              An adverse scenario for Helion involves: a 12-24 month Polaris→Orion technology gap, a Nucor site
              permitting delay, the Microsoft penalty trigger, and CFS securing a second hyperscaler customer (e.g.,
              Amazon or Meta) under a more lenient term structure. In this scenario, CFS's early 2030s ARC plant could
              displace Helion as the reference commercial fusion provider. The probability of this scenario depends
              heavily on Helion's ability to maintain its 2028 milestone and to demonstrate net energy gain publicly
              before 2027.

              Expert skepticism about Helion's timeline is documented: a 2024 Bloomberg investigation raised concerns
              about the scientific basis for the 2028 deadline, and MIT Technology Review characterized the 2028
              timeline as "very fast" for the sector. These concerns have not been refuted by Helion but have been
              partially addressed by the Polaris milestones of February 2026. The company has published several
              peer-reviewed technical papers supporting the FRC scaling approach but has not released plasma energy
              balance data publicly, citing IP protection.
            claimRefs: []
