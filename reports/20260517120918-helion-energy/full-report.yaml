      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear Cases'
        blocks:
          - type: paragraph
            body: >
              Three valuation scenarios bound the investment decision at the Series F entry price of $5.425 billion. The
              bull case ($10–15 billion by 2028) requires Q>1 to be achieved in the second half of 2026, Orion delivered
              on schedule by 2028, the OpenAI deal closed and financed with credible capital, and a Series G round of $1
              billion or more at a valuation premium to the Series F. In this scenario, Helion becomes the world’s first
              commercial fusion electricity generator and rerates as a platform energy infrastructure company. Return
              from Series F entry would be approximately 1.9–2.8x on the round itself, or 10–30x from earlier entry
              points. The base case ($3–6 billion) assumes Q>1 is delayed to 2027, Orion is delivered 12–18 months late,
              one of the two PPAs is renegotiated without penalty, and the Series G closes at a flat or modest step-up
              valuation. In this scenario, Series F investors realize flat to modest negative returns and must hold
              through 2030 or later for meaningful liquidity. The bear case (below $1 billion, potentially near-zero)
              assumes Q>1 is not achieved by 2029, the Microsoft penalty clause is triggered, and the Series G either
              fails to close or closes at a significant down-round. This scenario implies near-total loss for Series F
              investors.


              The probability distribution across these scenarios is highly asymmetric and difficult to calibrate from
              public evidence. The best available signal is milestones: Q>1 confirmation from Polaris (expected H2 2026)
              would shift weight materially from bear to base or bull. Failure to confirm by year-end 2026 would shift
              weight toward bear. MIT Climate experts and the Bloomberg investigation of Helion’s scientific claims
              introduce material adversarial evidence that the company’s 2028 timeline is not credible under standard
              fusion physics assumptions. TV003 captures the full scenario structure. FV003 plots the valuation ranges.
