      - number: '5.3'
        title: Device Generations, Milestones, and Commercial Roadmap
        blocks:
          - type: paragraph
            body: >
              Helion has built seven successive FRC fusion device generations between approximately 2013 and 2024,
              following an explicit iterative progression from Venti (Gen 1) through Trenta (Gen 6) to Polaris (Gen 7).
              Each generation targeted progressively higher plasma temperatures, confinement times, and system
              integration milestones. Trenta (Gen 6) achieved a plasma temperature of 9 keV — the highest recorded for
              any private FRC device at that time — and demonstrated the plasma physics foundation required for Polaris.
              Polaris, the seventh-generation device, became operational at Helion's Everett, Washington campus in 2024.
              In February 2026, Helion announced industry-first milestones: Polaris achieved fusion-relevant plasma
              conditions and the first-ever direct electrical conversion from an FRC fusion pulse via Faraday induction,
              as reported by BusinessWire and Power Magazine and confirmed by NEI Magazine's coverage of the NRC
              licensing milestone.

              The next milestone — net energy gain (Q>1, where electrical output exceeds electrical input) — is targeted
              for H2 2026 and has not been publicly demonstrated. The eighth-generation device, Orion, is Helion's first
              commercial plant: groundbreaking at the Malaga, Washington site occurred in July 2025 with an estimated
              construction cost of approximately $400 million. Orion is contracted to deliver 50 MW to Microsoft by
              2028, a timeline viewed as aggressive by independent fusion physicists. Helion employs approximately 350
              people as of early 2026, supporting both Polaris R&D and Orion construction simultaneously.
