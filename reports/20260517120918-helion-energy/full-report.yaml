      - number: '3.3'
        title: Competitive Differentiators and Helion's Moat
        blocks:
          - type: paragraph
            body: >
              Helion's competitive differentiation rests on three structural advantages that no other private fusion
              company has replicated as of May 2026:

              First, commercial PPA primacy. Helion is the only private fusion company with signed, penalty-backed
              commercial power purchase agreements. The Microsoft PPA (50 MW by 2028) includes financial penalties if
              delivery fails — a hard accountability mechanism no competitor has accepted. The Nucor agreement (500 MW
              by 2030) adds an industrial anchor with co-investor alignment. These PPAs create customer-specific revenue
              locks and reputational leverage that make Helion the default choice for industrial customers evaluating
              fusion in the near term.

              Second, FRC magneto-inertial direct conversion. Helion's pulsed Field-Reversed Configuration (FRC)
              approach accelerates two plasmoids to 1 million mph, compresses them to >100 million°C, and recovers
              electricity directly via Faraday's law from the expanding plasma-induced magnetic flux change — bypassing
              the steam turbine cycle used by all tokamak and most other competitors. This direct conversion pathway has
              theoretical efficiency advantages (>60% round-trip vs ~35–40% for steam turbines), lower mechanical
              complexity, and eliminates the need for a steam cycle entirely. Helion's D-He3 commercial fuel plan
              (aneutronic, fewer neutrons) further reduces material activation and enables long-term plant economics. No
              other private fusion company combines FRC + direct conversion + a commercial-scale customer commitment.

              Third, prototype cadence and technology de-risking. Helion has built 7 progressively capable prototypes —
              more than any other private fusion company. In January 2026, Polaris became the first and only privately
              funded machine to achieve D-T fusion, with plasma temperatures of 150 million°C (the highest in private
              fusion). This milestone was externally validated and provides Helion with a verifiable technology
              de-risking credential that pre-PPAs most competitors lack.

              TAE Technologies shares the FRC approach and has built 5 generations of devices (now 6 with Norm), but
              diverges in fuel cycle (p-B11 is harder), energy conversion (steam turbine planned), and commercial stage
              (no PPAs). CFS shares the ambition for early commercialization and has superior funding and institutional
              backing, but uses tokamak + steam cycle and lacks commercial customer binding commitments. Pacific Fusion
              is early-stage with no demonstrated plasma milestones and funding that is milestone-contingent rather than
              freely deployable.

              Key vulnerabilities in Helion's moat: (1) Net energy gain has not been publicly demonstrated; the
              Polaris→Orion technology transition is the dominant execution risk. (2) TAE's NBI-only FRC breakthrough
              represents genuine IP novelty in the shared FRC space — if TAE achieves competitive energy gain timelines,
              it could compete for industrial anchor customers in the mid-2030s. (3) If Helion's 2028 Microsoft delivery
              slips, CFS's ARC or an SMR could capture Microsoft's next contract.
