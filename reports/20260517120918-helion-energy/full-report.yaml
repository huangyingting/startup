chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Helion Energy, Inc. is a private American fusion energy company incorporated and headquartered at 1415
              75th St SW, Everett, Washington. Founded in 2013, the company's singular mission is to build the world's
              first commercial fusion power plant, enabling what it describes as unlimited clean electricity. The
              company operates at the late-stage private stage with no revenue from operations — its business model is
              to develop and commercialize fusion power generators that sell electricity directly to commercial
              customers under power purchase agreements (PPAs) and eventually to the grid.

              Helion's technology revolves around magneto-inertial fusion (MIF) using a pulsed Field-Reversed
              Configuration (FRC) plasma approach. The system forms two FRC plasmoids, accelerates and merges them
              inside a compression chamber, and recovers electricity directly from the resulting magnetic flux change —
              bypassing the steam-turbine cycle used in conventional power plants. Commercial operations are planned to
              use deuterium-helium-3 (D-He3) as fuel, an approach that minimizes neutron emissions and enables efficient
              direct energy conversion. The company's long-term electricity cost target is $0.01 per kilowatt-hour, a
              figure it argues is achievable through low fuel cost, high efficiency, and compact plant design.

              The company's first customer is Microsoft, which in May 2023 signed a 50 MW PPA for power delivery
              beginning in 2028 from a plant being sited in Washington state (construction began July 2025 at a site in
              Malaga, WA). Its second known customer is Nucor Corporation, the largest U.S. steel recycler, which in
              September 2023 agreed to host a 500 MW fusion plant at one of its steelmaking facilities, targeting 2030
              operations. Constellation Energy serves as the power marketer and transmission manager for the Microsoft
              deal.
