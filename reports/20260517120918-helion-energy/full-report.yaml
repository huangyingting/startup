      - number: '4.2'
        title: Pricing and GTM
        blocks:
          - type: paragraph
            body: >
              Helion's PPA pricing with both Microsoft and Nucor is contractually confidential; no per-megawatt-hour
              pricing has been publicly disclosed for either deal. The New Atlas investigation of the May 2023 Microsoft
              PPA noted "financial penalties" for non-delivery without specifying the per-unit amount; industry
              commentary has cited a figure near $0.05 per kilowatt-hour for undelivered energy, but this figure is
              unconfirmed. Helion's long-run levelized cost of energy (LCOE) target—published in multiple company
              communications and cited in the New Atlas article—is approximately $0.01 per kilowatt-hour ($10/MWh) at
              commercial scale, roughly ten times lower than the median cost of coal-fired power (~$36/MWh) and
              dramatically below current SMR estimates of $90–160/MWh.

              The go-to-market model is a direct enterprise sales motion targeting large industrials and hyperscale data
              center operators with firm, long-duration baseload needs exceeding 50 MW. There is no channel, reseller,
              or distribution layer; deals are executed directly at the C-suite/board level. Customer acquisition costs
              are not calculable in the conventional sense; the deal cycle for a first-of-kind fusion PPA likely
              involves multi-year technical due diligence, regulatory engagement, and executive relationships.
              Constellation Energy is the named power marketer for the Microsoft deal, providing grid integration and
              transmission services.

              The commercial pricing trajectory depends on future rounds of Orion-scale and fleet-scale deployment.
              There are no list-price disclosures, no volume discounts published, and no realized revenue to analyze.
              The Microsoft and Nucor pricing—if disclosed—would be the only data points for comparable fusion PPA
              economics. Until Helion delivers the first commercial kilowatt-hour, pricing quality remains
              company-claimed and unverifiable.
