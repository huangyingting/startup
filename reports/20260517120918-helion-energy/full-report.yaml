appendices:
  - id: A
    title: Coverage Notes and Methodology
    blocks:
      - type: paragraph
        body: >-
          This report is based on public sources fetched during the research run with canonical date 2026-05-17. Helion
          Energy is a private pre-revenue company that does not publish audited financials. All financial projections
          are contingent on technical milestones (net energy gain, commercial plant construction) not yet achieved. This
          report should be read as a technology and strategic analysis, not as a financial underwriting report.
        claimRefs: []
      - type: paragraph
        body: >-
          Valuation analysis reflects the $5.425B Series F post-money (January 2025). Comparable private fusion company
          valuations (CFS ~$3B implied, Pacific Fusion $900M Series A 2024) inform the landscape. The report uses
          2026-05-17 as the canonical run date. All technical milestone claims are based on company announcements and
          have not been independently verified by a third-party nuclear physics review.
        claimRefs: []
