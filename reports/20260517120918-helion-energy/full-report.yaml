      - number: '6.2'
        title: Microsoft PPA — Anchor Customer Analysis
        blocks:
          - type: paragraph
            body: >
              The Microsoft Power Purchase Agreement, announced May 10, 2023, is the centerpiece of Helion's commercial
              strategy and represents the world's first commercial fusion power purchase agreement. Under the binding
              agreement, Helion commits to deliver at least 50 MW of fusion-generated electricity to Microsoft by 2028,
              with Constellation Energy serving as the power marketer and transmission manager. The agreement includes
              explicit financial penalties payable to Microsoft if Helion fails to meet the delivery deadline. This
              penalty structure, described by New Atlas as "an outrageously audacious move," transforms what might
              otherwise be a non-binding letter of intent into a hard commercial obligation.

              Microsoft's strategic rationale is rooted in its carbon commitments (it aims to be carbon negative by 2030
              and carbon free by 2050) and the surging electricity demand from its AI data centers. The company has made
              24/7 carbon-free electricity a stated procurement priority, and fusion represents a theoretically perfect
              solution: baseload, zero-emissions, and fuel-agnostic at scale. Sam Altman's dual role as both Helion's
              board chair and OpenAI CEO (and Microsoft's AI partner) may have facilitated initial discussions, though
              the strategic logic for Microsoft stands independently of personal relationships.

              The evidence quality for the Microsoft PPA is high and multi-sourced, with confirmation from Microsoft's
              own blog, multiple tier-one press outlets (NYT, Bloomberg, WSJ, Washington Post), and Helion's official
              communications. The agreement is real, binding, and represents a genuine commercial milestone. However,
              exact pricing, penalty amounts, early termination clauses, and force majeure provisions are not publicly
              disclosed. The 50 MW target is modest relative to a typical Microsoft data center complex, suggesting the
              initial contract may be as much about establishing precedent and securing optionality as about immediate
              energy supply. MIT experts quoted in 2023 called the 2028 timeline "astounding" and "questionable,"
              reflecting the scientific uncertainty still embedded in this commercial commitment.
