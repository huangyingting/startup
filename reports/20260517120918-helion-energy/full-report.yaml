            title: Microsoft 2028 PPA Delivery Depends on Q>1 Not Yet Demonstrated
            body: >
              Helion's entire commercial product timeline rests on achieving net energy gain (Q>1) with Polaris in H2
              2026 — a milestone with no independent data trail to validate its proximity. Bloomberg noted in 2024 that
              external experts cannot verify Helion's energy balance from public data. MIT Climate researchers described
              the 2028 timeline as very aggressive. If Q>1 is delayed beyond mid-2027, the 2028 Microsoft PPA delivery
              window collapses, triggering financial penalties and potentially requiring additional capital before any
              commercial revenue is generated. The 2028 deadline is the single highest-stakes binary in the Helion
              investment thesis.
