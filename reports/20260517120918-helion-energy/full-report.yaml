      - number: '5.4'
        title: Critical Dependencies, Architecture, and Competitive Position
        blocks:
          - type: paragraph
            body: >
              Helion's technology stack depends on a small number of critical suppliers, regulatory bodies, and
              strategic partners. The most significant internal dependency is the helium-3 breeding process: He-3 is
              produced in-situ from D+D side reactions during device operation, and its yield at commercial scale has
              not been independently confirmed. Externally, the company depends on isotopically pure deuterium
              (commercially available) and on the NRC completing its Part 53 fusion licensing rulemaking so that Orion
              can receive a commercial operation license. Constellation Energy serves as the grid delivery partner for
              the Microsoft PPA, reducing grid-integration execution risk. ARPA-E BETHE program and DOE Fusion Energy
              Sciences have provided non-dilutive research funding to the broader FRC and commercial fusion ecosystem,
              benefiting Helion's enabling-technology development.

              Against the competitive landscape, Helion leads private fusion companies on commercial commitments:
              Commonwealth Fusion Systems (SPARC, tokamak approach) has proven high-temperature superconducting magnets
              but has no signed commercial PPAs; TAE Technologies pursues hydrogen-boron fusion and remains
              pre-commercial; Zap Energy's Z-pinch and General Fusion's mechanical compression approach are at earlier
              commercial stages. The Fusion Industry Association 2025 report confirmed over $2.5 billion invested in the
              global fusion industry in the preceding year, and identified Helion as the leading company by cumulative
              capital raised and commercial contract pipeline. FIA identified 43 private fusion companies globally, with
              Helion holding the only signed commercial electricity delivery obligations.
