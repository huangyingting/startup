      - number: '8.5'
        title: Exit Readiness and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              Exit readiness for Helion investors is constrained by the pre-commercial nature of the business and the
              binary outcome structure of fusion physics. Three exit paths are plausible within a ten-year horizon.
              First, strategic acquisition: Microsoft (the PPA counterparty), Nucor (the strategic investor), or an
              energy major such as Constellation Energy or Exelon could acquire Helion to secure exclusive access to
              fusion electricity or to monetize a technology leadership position. Acquisition premium would likely be
              1.5–3.0x the prevailing funding-round valuation, implying a range of $8–16 billion in the bull case.
              Second, IPO: a public offering is unlikely before the 2028 Orion delivery milestone provides at least one
              operational plant and the beginnings of a revenue track record. Post-2028, an IPO at a premium to the
              then-current funding valuation is conceivable if Orion delivers on schedule. Third, secondary liquidity:
              Hiive and Caplight both provide pre-IPO secondary market access to Helion shares. Hiive data suggests
              secondary market interest exists but at implied discounts to the Series F valuation, indicating that
              liquidity-seeking early holders are exiting below round price. This is a mild adverse signal.


              Fusion industry M&A precedent is essentially non-existent. General Fusion shut down rather than finding an
              acquirer. TAE Technologies and CFS remain private and are not acquisition targets as of May 2026. This
              means Helion’s exit comparables must be drawn from broader deep-tech and energy infrastructure M&A, where
              acquisition premiums range widely based on strategic fit and technology uniqueness. For thesis-break
              triggers, investors should monitor five events: the Polaris Q>1 milestone result (expected H2 2026), the
              Series G valuation and investor composition (expected 2026–2027), any Microsoft PPA renegotiation or delay
              announcement, Sam Altman’s ongoing role in the OpenAI–Helion commercial discussions, and the competitive
              trajectory of SMR data center deployments. If any two of these five signals move adversely in the same
              12-month period, a full position reassessment is warranted regardless of other factors. The Hiive and
              Caplight secondary markets provide a continuous real-time signal on how well-informed early holders are
              valuing the company relative to the last funding round.
            claimRefs: []
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Investment Stance — CONDITIONAL HOLD / SPECULATIVE BUY
            body: >
              At $5.425 billion post-money, Helion represents the highest-valued private fusion company in history—a
              position justified entirely by option value on an unachieved physics milestone. Our stance is CONDITIONAL
              HOLD for existing holders and SPECULATIVE BUY only for patient deep-tech capital with a 5-10 year horizon,
              high risk tolerance, and the ability to absorb complete loss. The primary condition is independent
              validation of Polaris net-electricity output (Q>1), expected H2 2026. At current valuation, investors pay
              for the bull case without the bull case having been achieved. Entry above $5.4B is not recommended without
              Q>1 confirmation.
            calloutType: insight
            claimRefs:
              - CV001
              - CV031
              - CV032
          - type: callout
            title: Valuation Is Entirely Option Value — No DCF Support at $5.4B
            body: >
              Helion’s $5.425B Series F valuation cannot be supported by any conventional discounted cash flow analysis.
              With zero revenue, zero gross margin, undemonstrated Q>1 physics, and a 2028 first-plant delivery target
              that mainstream fusion physicists regard as aggressive, the valuation represents a pure option on a
              physics breakthrough. General Fusion—a direct analog company—raised $300M+ over 20 years and shut down in
              2024 without achieving Q>1. This defines the character of the risk: binary outcome, 5-10 year horizon, and
              no meaningful recovery scenario if fusion physics takes another decade.
            calloutType: insight
            claimRefs:
              - CV011
              - CV026
              - CV027
              - CV031
          - type: callout
            title: AI Power Demand Is the Structural Tailwind — But Not the Thesis
            body: >
              Goldman Sachs forecasts 165% growth in AI-driven data center power demand by 2030. ARPA-E announced $135M
              in new fusion funding in April 2026. Wood Mackenzie reports the SMR pipeline surged 42% driven by data
              center demand. SMR Intel tracks 40+ nuclear data center deals in 2024–2026. These are structural tailwinds
              for Helion’s addressable market, but they are not the investment thesis. The thesis depends entirely on
              Helion’s fusion physics succeeding on schedule. If Q>1 is not achieved, the market opportunity does not
              matter. If it is achieved, the opportunity is transformative.
            calloutType: insight
            claimRefs:
              - CV005
              - CV006
              - CV020
              - CV028
          - type: callout
            title: Minimum Conditions Before Increasing Allocation
            body: >
              An investor should not increase allocation to Helion without confirming: (1) Polaris net-electricity
              output independently validated; (2) Microsoft PPA penalty exposure quantified under NDA; (3) Orion capex
              budget confirmed under $600M with a credible construction schedule; (4) Series G closed at or above $5.4B
              with ≥2 institutional leads; and (5) capitalization table reviewed for preference overhang. Meeting all
              five conditions shifts the stance from CONDITIONAL HOLD to SPECULATIVE BUY with higher conviction. Failing
              any one preserves current allocation without increase.
            calloutType: insight
            claimRefs:
              - CV031
              - CV041
              - CV042
