  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview and Segmentation
        blocks:
          - type: paragraph
            body: >
              Helion Energy has no paying customers as of May 2026. The company's entire commercial pipeline consists of
              pre-revenue agreements and reported discussions. Its business model targets large enterprise buyers who
              require baseload, carbon-free electricity at scale: AI hyperscale data centers, energy-intensive
              industrial manufacturers, and potentially utilities. The common thread is that buyers need 24/7 clean
              power, have long planning horizons, and have sufficient scale to justify a dedicated or co-located fusion
              plant.

              The buyer is always the entity with the electricity off-take obligation (Microsoft, Nucor); the user is
              the industrial process or data center workload consuming the power; the payer is the same entity given
              that these are direct bilateral PPAs, not intermediated through a utility. There is no consumer segment,
              no distribution through resellers, and no marketplace or platform channel. Revenue, when it materializes,
              will be a combination of capacity charges and energy charges per MWh delivered, though exact pricing is
              not publicly disclosed for either existing agreement.

              Geographically, all known customers are U.S.-based, which limits near-term cross-border diversification.
              Vertically, the current pipeline spans AI/cloud infrastructure (Microsoft) and electric arc furnace (EAF)
              steelmaking (Nucor), with hyperscale AI/compute (OpenAI, unconfirmed) as the third vertical. Industrial
              customers like Nucor represent a different demand profile — continuous baseload at extremely high
              utilization with low tolerance for outages — compared to data center customers who value 24/7 carbon-free
              electricity for sustainability commitments. The customer acquisition model is direct B2B enterprise
              deal-making with multi-year lead times and C-suite involvement on both sides.
            claimRefs:
