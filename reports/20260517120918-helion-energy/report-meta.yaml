companyProfile:
  summary: >-
    Helion Energy, Inc. is an Everett, Washington-based nuclear fusion company founded
    in 2013 by David Kirtley (CEO), Chris Pihl (CTO), George Votroubek (Principal
    Scientist), and John Slough. The company is developing magneto-inertial fusion using
    a Field-Reversed Configuration (FRC) plasma approach, with a key differentiator
    being direct electricity extraction via Faraday induction — targeting higher
    efficiency than conventional steam turbine approaches. Helion's current device,
    Trenta (7th generation), achieved 150M°C plasma temperature in 2023. The next
    device, Polaris (8th generation), is under construction in Everett and targets net
    energy gain (Q>1). In May 2023, Helion signed the world's first commercial fusion
    power purchase agreement with Microsoft for 50MW delivery by 2028. In January 2025,
    Helion closed a $425M Series F at a $5.425B post-money valuation (total capital
    raised: $1B+), with Sam Altman (Executive Chairman) and new investors Lightspeed
    and SoftBank Vision Fund. Nucor Steel has signed a letter of intent for a 500MW
    long-term fusion power supply. Pre-revenue; all revenue is contingent on achieving
    net energy gain with Polaris and commercial-scale deployment.
  foundedDate: "2013-01-01"
  founders:
    - name: "David Kirtley"
      role: "Co-Founder & CEO"
      background: >-
