  foundingLocation: "Everett, WA"
  headquarters: "Everett, WA"
  productSummary: >-
    Magneto-inertial fusion technology platform: FRC plasma generation, plasma
    compression, direct Faraday electricity extraction, repetitive pulsed operation.
    Current device: Trenta (7th gen, 150M°C achieved). Next device: Polaris (8th gen,
    targeting Q>1 net energy gain). Commercial product: fusion power plant for B2B
    electricity supply under long-term PPAs.
  customerFocus: >-
    Large enterprise electricity consumers requiring firm, dispatchable, carbon-free
    baseload power. Primary targets: hyperscale data center operators (Microsoft, OpenAI
    potential), heavy industry (Nucor Steel), and utilities. B2B power purchase agreement
    (PPA) model.
  businessModel: >-
    B2B power purchase agreements (PPAs) for firm carbon-free baseload electricity
    at industrial scale (50MW–500MW+). Pre-revenue as of run date; all contracted
    revenue contingent on Polaris demonstration and commercial plant construction.
    Potential future licensing of FRC and direct conversion IP to utilities and
    industrial partners.
  stage: "Series F"
