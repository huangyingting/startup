sections:
- id: S4A
  title: Revenue Model and Streams
  body: 'Helion Energy is a pre-commercial company with zero product revenue as of
    May 2026. Its revenue model rests entirely on future electricity deliveries under
    signed Power Purchase Agreements (PPAs). The Microsoft PPA—the world''s first
    commercial fusion energy contract—commits Helion to deliver at least 50 megawatts
    of fusion-generated electricity to Microsoft data centers by 2028, with a one-year
    ramp-up, enforced by financial penalties if undelivered. The Nucor PPA, announced
    in November 2023 alongside a $35 million strategic investment in Helion by Nucor,
    targets 500 megawatts of fusion electricity for industrial steelmaking applications
    by 2030. Together these represent committed offtake obligations of 550 MW—the
    largest contracted fusion pipeline globally—but all revenue lies in the future,
    contingent on technical and construction milestones that have never been achieved
    by any company.

    In March 2026, Helion confirmed it is in advanced negotiations with OpenAI for
    a deal that would provide up to 5 gigawatts of power by 2030, scaling to 50 gigawatts
    by 2035. This potential agreement would dwarf the existing PPA pipeline by two
    orders of magnitude, but remains unexecuted; Helion has not confirmed any new
    signed customer agreements beyond Microsoft and Nucor. Separately, Sam Altman—Helion''s
    largest individual investor and formerly a board member—stepped down from the
    board in March 2026 to manage the conflict-of-interest optics of his dual role
    as OpenAI CEO and Helion backer.

    Ancillary income streams include external research partnerships. In April 2026
    Helion announced its HERCULES program, committing more than $17 million through
    2028 to 25 funded proposals across 20 universities and national labs to advance
    enabling technologies. HERCULES is a cost, not a revenue—Helion pays out the grants—but
    it demonstrates spending discipline and IP-adjacent ecosystem building. Non-dilutive
    public funding supplements capital: ARPA-E has invested approximately $134 million
    in commercial fusion technologies since 2014, catalyzing more than $1.5 billion
    in private follow-on funding across the sector; in April 2026 ARPA-E announced
    an additional $135 million commitment over 18 months. Specific prior grants to
    Helion are not publicly itemized, but the company''s FRC work aligns directly
    with ARPA-E''s stated portfolio areas. Technology licensing to third parties is
    not part of Helion''s current business model; all plants are owned and operated
    directly.

    '
  tableRefs:
  - TI001
  figureRefs:
  - FI001
  calloutRefs:
  - KI001
- id: S4B
  title: Pricing and GTM
  body: 'Helion''s PPA pricing with both Microsoft and Nucor is contractually confidential;
    no per-megawatt-hour pricing has been publicly disclosed for either deal. The
    New Atlas investigation of the May 2023 Microsoft PPA noted "financial penalties"
    for non-delivery without specifying the per-unit amount; industry commentary has
    cited a figure near $0.05 per kilowatt-hour for undelivered energy, but this figure
    is unconfirmed. Helion''s long-run levelized cost of energy (LCOE) target—published
    in multiple company communications and cited in the New Atlas article—is approximately
    $0.01 per kilowatt-hour ($10/MWh) at commercial scale, roughly ten times lower
    than the median cost of coal-fired power (~$36/MWh) and dramatically below current
    SMR estimates of $90–160/MWh.

    The go-to-market model is a direct enterprise sales motion targeting large industrials
    and hyperscale data center operators with firm, long-duration baseload needs exceeding
    50 MW. There is no channel, reseller, or distribution layer; deals are executed
    directly at the C-suite/board level. Customer acquisition costs are not calculable
    in the conventional sense; the deal cycle for a first-of-kind fusion PPA likely
    involves multi-year technical due diligence, regulatory engagement, and executive
    relationships. Constellation Energy is the named power marketer for the Microsoft
    deal, providing grid integration and transmission services.

    The commercial pricing trajectory depends on future rounds of Orion-scale and
    fleet-scale deployment. There are no list-price disclosures, no volume discounts
    published, and no realized revenue to analyze. The Microsoft and Nucor pricing—if
    disclosed—would be the only data points for comparable fusion PPA economics. Until
    Helion delivers the first commercial kilowatt-hour, pricing quality remains company-claimed
    and unverifiable.

    '
  tableRefs:
  - TI002
  figureRefs: []
  calloutRefs:
  - KI002
- id: S4C
  title: Cost Structure and Unit Economics
  body: 'Helion''s cost structure is dominated by three categories: human capital,
    capital expenditure for the Orion plant, and research and development for Polaris
    and enabling technologies. With approximately 350 employees as of early 2026,
    the fully-loaded personnel cost is estimated at $85–120 million per year based
    on competitive deep-tech engineering compensation in the Seattle corridor. Orion''s
    construction cost has been reported at approximately $400 million; this is a first-of-kind
    estimate and highly likely to carry significant variance. Polaris R&D, facility
    costs at the Everett campus and the Malaga plant site, the HERCULES grant outflows,
    and normal G&A together likely push total annual operating expenditure to the
    range of $150–300 million per year in 2025–2026.

    Unit economics are fundamentally not calculable for a pre-commercial fusion company.
    No product has been sold, no production capacity exists, and the critical cost
    components—materials per pulse, magnet replacement cycles, tritium/deuterium procurement,
    direct energy conversion system maintenance—remain either proprietary or speculative.
    Helion claims direct Faraday induction converts fusion energy to electricity at
    efficiency rates potentially above 60 percent, compared with 30–35 percent for
    steam-turbine cycles; if this holds at scale, it provides a structural cost advantage.
    However, no independent validation of commercial-scale efficiency has been published.
    Gross margin will not exist until the first kilowatt-hour is sold, likely in 2028
    at the earliest.

    Working capital needs are minimal (no inventory, no receivables) but capex intensity
    is extreme: each new plant likely requires hundreds of millions of dollars in
    specialized magnets, pulsed-power systems, and infrastructure. A fleet capable
    of meeting the OpenAI 5 GW target by 2030 would require the equivalent of roughly
    100 Orion-scale plants, implying tens of billions in cumulative capex—well beyond
    any private fusion company''s current capital base. This raises fundamental capital
    structure questions that are not addressable with current public evidence.

    '
  tableRefs:
  - TI003
  figureRefs:
  - FI002
  calloutRefs:
  - KI003
- id: S4D
  title: Capital Adequacy and Runway
  body: 'Helion has raised approximately $1.425 billion in cumulative equity capital
    across six rounds. The Series E ($500 million, November 2021) was led by Sam Altman''s
    personal $375 million investment alongside OpenAI and others. The Series F ($425
    million, January 2025) included strategic participation from Nucor ($35 million)
    and various institutional and individual investors, valuing the company at $5.425
    billion post-money. The Nucor investment is confirmed in Nucor''s SEC 8-K filing
    from October 2023, which documents the "SEP 2023 Investment in Helion Energy to
    develop 500MW fusion plant" as part of the company''s sustainability initiatives.
    A Series D ($40 million) in September 2020 had valued the company at $1.25 billion.

    Helion has not disclosed its current cash position, monthly burn rate, or runway
    horizon. Based on publicly available indicators—headcount, construction timeline,
    R&D intensity—we estimate annual cash consumption in the range of $150–300 million.
    At the midpoint ($225 million/year), the $425 million Series F proceeds (net of
    expenses and prior spending) would provide approximately 18–24 months of runway
    from the January 2025 close, extending into mid-to-late 2026. This estimate implies
    Helion will need to close an additional funding round—likely a Series G—before
    or during the peak Orion construction phase in 2026–2027.

    Helion carries no publicly disclosed debt or credit facilities. Project finance
    for Orion has not been announced. Given the novel regulatory and technical profile
    of the project, traditional project finance may be difficult to arrange before
    Polaris demonstrates net electricity output; the company is likely to rely on
    equity capital for the near term. The Microsoft PPA''s penalty structure creates
    contingent financial liability whose magnitude is not disclosed, but CEO David
    Kirtley described it as a "binding agreement with financial penalties," suggesting
    non-trivial downside exposure. The strategic alignment between Helion''s largest
    investor (Altman), its newest potential customer (OpenAI), and the governance
    change (Altman''s board exit) merits monitoring for conflict or dependency concentration.

    '
