    severity: material
    topic: PPA pricing terms — contractually confidential
    missingEvidence: Per-MWh pricing and penalty structure in both the Microsoft and
      Nucor PPAs are contractually confidential; no public filing, regulatory document,
      or court proceeding has disclosed these terms
    whyItMatters: Without pricing disclosure, revenue quality and downside penalty
      exposure cannot be assessed; the penalty structure is the primary financial
      risk if Orion is delayed
    diligencePath: Request PPA term sheet under NDA; monitor any FERC or WA UTC regulatory
      filings that might require public price disclosure
    relatedTableRefs:
