    severity: critical
    topic: cash position and burn rate — undisclosed financial metrics
    missingEvidence: Helion's current cash position, monthly burn rate, and runway
      to 2028 milestone are not publicly disclosed; all estimates are derived from
      proxies and carry high uncertainty
    whyItMatters: Without confirmed cash position and burn rate, capital adequacy
      cannot be underwritten; the company could face a funding gap before the 2028
      Microsoft PPA delivery deadline
    diligencePath: Request audited cash flow statements and quarterly balance sheet
      from Helion under NDA; this is the highest-priority diligence item
    relatedQuestionRefs:
