    severity: material
    topic: capitalization table and investor rights — undisclosed private round terms
    missingEvidence: Liquidation preferences, anti-dilution provisions, voting rights,
      and cap table structure for all funding rounds are not public; investor identity
      is known but economic terms are not
    whyItMatters: Preference overhang and governance structure determine investor
      returns in acquisition or IPO scenarios; essential for underwriting
    diligencePath: Request investor rights agreement, voting agreement, and capitalization
      table from Helion management under NDA
    relatedQuestionRefs:
    - QI010
