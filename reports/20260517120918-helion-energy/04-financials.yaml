    whyItMatters: Non-dilutive government grants reduce equity burn; if significant,
      they improve capital efficiency and reduce Series G pressure
    diligencePath: Review arpa-e.energy.gov/projects for Helion-tagged awards; cross-reference
      with Helion 990 filings if available
