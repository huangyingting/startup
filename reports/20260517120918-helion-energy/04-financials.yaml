callouts:
- id: KI001
  type: insight
  title: Signed Fusion PPAs Create Unique Demand-Side Moat
  body: 'Helion has secured the only two signed commercial fusion PPAs globally—Microsoft
    (50 MW, 2028) and Nucor (500 MW, 2030)—representing a unique demand-side moat.
    No other fusion company has a binding electricity contract with financial penalties,
    giving Helion structural urgency that competitors lack and underwriting the R&D
    investment case.

    '
  sourceRefs:
  - SI004
  - SI001
  claimRefs:
  - CI001
  - CI002
- id: KI002
  type: risk
  title: PPA Pricing Confidentiality Is a Primary Diligence Blocker
  body: 'PPA pricing is entirely confidential. Without disclosure of the Microsoft
    or Nucor PPA price, revenue quality, margin potential, and penalty exposure cannot
    be assessed. The contractually undisclosed $0.05/kWh penalty figure circulating
    in industry commentary—if accurate for undelivered energy—could represent hundreds
    of millions in contingent liability if Orion is delayed. This is a primary diligence
    blocker.

    '
  sourceRefs:
  - SI004
  - SI013
  claimRefs:
  - CI010
  - CI011
- id: KI003
  type: risk
  title: OpenAI Scale Target Implies Extraordinary Manufacturing Challenge
  body: 'Scaling from 50 MW (Orion) to 5 GW (OpenAI framework) requires manufacturing
    approximately 100 Orion-scale plants in four years. At $400 million per plant,
    this implies $40 billion in cumulative capex—roughly 28x the company''s total
    capital raised to date. The OpenAI deal is speculative and technically extraordinary;
    it should not be incorporated into base-case financial models without a signed
    agreement and credible scale-up plan.

    '
  sourceRefs:
  - SI003
  - SI005
  claimRefs:
  - CI004
  - CI005
  - CI030
- id: KI004
  type: assumption
  title: Cash Position and Burn Rate Are Unverified Estimates
  body: 'This analysis assumes Helion''s Series F proceeds ($425M, January 2025) remain
    largely intact and that the company is burning approximately $150–300M annually.
    These figures are unverified estimates; actual cash position and burn may differ
    materially. Investors should request audited financial statements and a current
    cash flow projection as a precondition to any investment decision.

    '
  sourceRefs:
  - SI009
  - SI007
  claimRefs:
  - CI025
  - CI026
  - CI027
- id: KI005
  type: risk
  title: Altman Board Departure Creates Governance Uncertainty
  body: 'Sam Altman''s departure from the Helion board in March 2026 to manage conflict-of-interest
    concerns around the OpenAI deal creates governance uncertainty. Altman personally
    invested $375 million in Helion (Series E, 2021) and participated in the Series
    F. As OpenAI''s CEO he is now the prospective customer and must recuse from deal
    terms. This is an unusual principal-agent configuration that warrants independent
    board oversight and a third-party fairness opinion on any OpenAI-Helion commercial
    agreement.

    '
  sourceRefs:
  - SI003
  - SI008
  claimRefs:
  - CI006
  - CI028
- id: KI006
  type: recommendation
  title: Minimum Diligence Data Points Before Investment
  body: 'Before making an investment or diligence commitment, request: (1) current
    cash position and monthly burn rate; (2) Microsoft PPA term sheet including price
    and penalty schedule; (3) Orion capex budget and construction schedule; (4) capitalization
    table with liquidation preferences; (5) Helion''s ARPA-E award history and any
    pending government funding. These five data points are the minimum required to
    underwrite capital adequacy and revenue quality for a pre-commercial fusion company.

    '
  sourceRefs:
  - SI001
  - SI009
  claimRefs:
  - CI031
  - CI032
  - CI033
