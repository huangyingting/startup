callouts:
  - calloutType: strength
    title: "AI Power Surge Creates Durable Demand for Firm Carbon-Free Baseload"
    body: >
      The data center power surge is the most powerful structural demand driver for fusion's
      target market. Data center electricity is forecast to double from 448 TWh (2025) to 980 TWh
      by 2030 (Gartner), with AI-optimized servers growing from 21% to 44% of that load. These
      workloads require continuous, dispatchable power that solar and wind cannot reliably provide
      without massive storage. This is a once-in-a-generation opening for firm carbon-free baseload —
      precisely what fusion offers. Microsoft's willingness to sign a PPA with financial penalties
      validates that hyperscalers are willing to pay a premium for certainty.
    claimRefs: [CM005, CM006, CM007, CM026]

  - calloutType: strength
    title: "Industrial Decarbonization Validates the EAF-Fusion Market Signal"
    body: >
      Nucor's dual role as Series F investor and 500 MW PPA signatory is a compelling market
      signal. EAF steel production requires round-the-clock electricity and is penalized by
      intermittency. The $250B industrial decarbonization market investment trajectory to 2030
      demonstrates systemic demand for clean baseload. Helion's positioning in steel decarbonization
      creates a replicable template for other EAF producers globally.
    claimRefs: [CM020, CM022, CM023, CM026]

  - calloutType: risk
    title: "Fusion Market Sizing Estimates Are Not Electricity Revenue"
    body: >
      Research firm estimates of the "fusion energy market" ($288B–$420B by 2030) must not be
      mistaken for addressable electricity generation revenue. These figures aggregate R&D spending,
      equipment supply chain, and speculative commercial plant values — the actual electricity revenue
      from fusion power plants in 2026-2030 is effectively zero while still in pre-commercial phase.
      The true commercial revenue TAM materializes only post-demonstration.
    claimRefs: [CM018, CM030]

  - calloutType: risk
    title: "FIA Industry Consensus Implies Helion Is 5-7 Years Ahead of the Field"
    body: >
      The FIA 2025 report shows 53% of fusion companies expect grid-connected electricity by 2035 —
      seven years after Helion's 2028 target. Helion's aggressive timeline is an outlier. While
      Helion's milestones (first private D-T fusion in Jan 2026, 150M°C plasma temperature) are
      genuine technical progress markers, the gap between Helion's commercial timeline and industry
      consensus amplifies technology and credibility risk for investors.
    claimRefs: [CM015, CM016, CM017]

  - calloutType: insight
    title: "Firm Clean Power Supply Gap May Persist for Decades"
    body: >
      The SMR pipeline of 47 GW is almost entirely unrisked (pre-construction or early development)
      and requires ~$360B in investment; even if fully built, it would meet only part of the clean
      baseload need by 2035. Geothermal and long-duration storage face resource constraints and cost
      curves that limit near-term scale. This creates a multi-decade supply gap for firm carbon-free
      power that fusion — if it delivers — could fill at an economically transformative cost point.
    claimRefs: [CM012, CM013, CM014, CM028]

