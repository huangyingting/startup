  title: Market Analysis

sections:
  - id: SM-SEC-01
    title: "Market Boundary and Structure"
    body: >
      Helion Energy operates at the intersection of two converging macro-trends: the global electricity
      market's structural shift toward carbon-free generation, and the accelerating demand for firm,
      dispatchable baseload power driven by AI-era data centers and hard-to-abate industrial
      decarbonization. The total addressable market (TAM) for Helion is, at its broadest, the global
      electricity market — worth approximately $3.8 trillion per year and consuming ~28,200 TWh in 2025
      (IEA). More precisely, Helion's relevant market is the sub-market for carbon-free, firm/dispatchable
      baseload electricity capable of delivering 24/7 supply without intermittency. This excludes
      intermittent renewables (solar, wind) and represents a premium segment commanding higher-value
      long-term contracts.

      Status-quo substitutes in this market include advanced nuclear fission (SMRs and large plants),
      natural gas with carbon capture and storage (CCS), long-duration energy storage paired with
      renewables, and geothermal. None of these is cost-competitive with fusion's projected $0.01/kWh
      target at scale, but each faces different barriers and timelines. Adjacencies include industrial
      process heat, green hydrogen production, and off-grid micro-grid power — sectors that would value
      a compact, continuous energy source.
    tableRefs: [TM001]
    figureRefs: [FM003]

  - id: SM-SEC-02
    title: "Market Sizing: TAM, SAM, and SOM"
    body: >
      The TAM for Helion is the global electricity market: ~$3.8 trillion/year, consuming 28,200 TWh in
      2025 and growing to 33,600 TWh by 2030 at an average 3.6% CAGR (IEA). The IEA projects that
      advanced economies account for ~20% of incremental demand through 2030, with data centers driving
      ~50% of US incremental demand growth.

      The SAM — the carbon-free, firm baseload segment — is harder to bound precisely. As of 2025,
      clean energy corporate PPA volumes were 55.9 GW (BloombergNEF), of which "baseload-like" firm
      power deals (nuclear, geothermal, co-located storage) accounted for 5.2 GW. If clean power
      reaches 50% of global generation by 2030 (IEA), that implies a ~$1.9T SAM in electricity
      revenue. The firm-power premium sub-segment is smaller, perhaps $200–400B globally, as firm
      clean power currently commands a premium over intermittent renewables.

      Helion's current SOM is the committed early-commercial footprint: Microsoft's 50 MW PPA by 2028
      and Nucor's 500 MW by 2030 = 550 MW of contracted capacity. At typical wholesale rates of
      $50–80/MWh, 550 MW generates ~$240–390M in annualized electricity revenue. A broader SOM
      includes other hyperscalers, industrial EAF operators, and utilities procuring carbon-free
      baseload — a segment that grew to $29.5 GW of corporate deals in the US alone in 2025.

      Commercial fusion industry market sizing estimates from research firms (TBRC: $288B in 2025,
      growing to $420B by 2030) should be interpreted with caution: these figures include R&D
      expenditures, equipment, infrastructure, and adjacent services — not electricity generation
      revenue alone. They are directionally useful but methodologically opaque.
    tableRefs: [TM002]
    figureRefs: [FM001, FM002]

  - id: SM-SEC-03
    title: "Buyer Segmentation and Adoption Path"
    body: >
      Three buyer segments define Helion's near- and medium-term commercial opportunity:

      **Hyperscale data center operators** are the most immediate buyers. Meta, Amazon, Google, and
      Microsoft together accounted for 49% of all global corporate clean energy PPA activity in 2025
      (BloombergNEF), and are increasingly contracting nuclear and advanced energy to meet 24/7
      carbon-free energy (CFE) commitments. The Gartner data center electricity forecast (448 TWh in
      2025 → 980 TWh by 2030) implies ~530 TWh of net new demand requiring clean sourcing by 2030.
      These buyers have dedicated energy procurement teams, multi-year PPA execution capability, and
      are already comfortable with novel structures (as evidenced by Microsoft's Helion PPA and Three
      Mile Island restart).

      **Industrial decarbonizers** — particularly electric arc furnace (EAF) steel producers — form
      the second key segment. The industrial sector consumes 38% of global final energy and emits 25%
      of direct CO₂ (ResearchAndMarkets). EAF steelmaking, which uses recycled scrap and electricity,
      emits only ~0.3 t CO₂/t steel vs ~2.2 t CO₂/t steel for blast furnace routes. EAF adoption is
      growing, with ~50% of new steelmaking capacity in development using EAF. Nucor — the largest EAF
      operator globally — exemplifies this segment: it signed a 500 MW fusion PPA with Helion and
      invested $35M in the Series F, indicating strategic alignment around clean baseload for
      decarbonized steel production.

      **Utilities and grid operators** are a medium-term segment as fusion matures. Regulated utilities
      acquiring new baseload capacity and ISOs/RTOs managing resource adequacy will be the natural
      buyers for multi-hundred-MW deployments in the 2030s. This segment has longer procurement cycles
      and requires regulatory approval.
    tableRefs: [TM003]

  - id: SM-SEC-04
    title: "Growth Drivers and Adoption Constraints"
    body: >
      The demand side is powerfully favorable. The AI-era data center buildout represents the most
      concentrated power demand surge in modern history: Gartner forecasts data center electricity to
      double from 448 TWh to 980 TWh by 2030, with AI-optimized servers growing from 21% to 44% of
      all data center power. Goldman Sachs projects a 165% increase in overall data center power demand
      by 2030. These buyers cannot be served by intermittent solar and wind without prohibitive
      battery storage costs — they need dispatchable, carbon-free baseload, which is precisely what
      fusion promises.

      Industrial decarbonization compounds the opportunity. Investment in industrial decarbonization
      technologies reached $87B in 2022 and is projected to exceed $250B annually by 2030
      (ResearchAndMarkets). Electrification of steel, chemicals, and cement drives demand for carbon-
      free electricity that matches process cycle timing — again favoring firm, round-the-clock supply.

      Adoption constraints are severe and partially beyond Helion's control. The most critical is
      technology readiness: Helion has not yet demonstrated commercial-grade net energy gain. The FIA
      industry consensus (2030–2035 for grid-connected fusion) is more conservative than Helion's 2028
      target, and 83% of the FIA's 53 surveyed companies cite investment as a "major challenge."
      Capital intensity is structurally constraining: the industry collectively needs $77B additional
      investment for pilot plants against $9.7B raised to date — an 8:1 funding gap. Regulatory
      pathways for fusion plants remain undefined in the US. Grid interconnection queues, high capital
      costs for early-of-a-kind plants, and the long track record of fusion "always being 20 years
      away" create credibility-based switching friction for corporate buyers.
    tableRefs: [TM004]
    figureRefs: [FM004]

  - id: SM-SEC-05
    title: "Market Evidence Gaps"
    body: >
      Four market diligence gaps constrain this analysis. First, Helion has not disclosed specific
      commercial pricing for its electricity output beyond the $0.01/kWh long-term aspiration; actual
      first-plant commercial offtake economics are unknown. Second, analyst estimates of the "fusion
      energy market" are highly heterogeneous, conflating R&D expenditure, commercial plant revenue,
      supply chain value, and speculative projections — no authoritative independent sizing exists.
      Third, the SAM boundary for "firm carbon-free power" is imprecise because the market is not yet
      defined by standardized procurement instruments or certified product categories. Fourth, buyer
      willingness to pay a premium for fusion vs SMR or long-duration storage has not been publicly
      validated beyond the Microsoft and Nucor deals.

