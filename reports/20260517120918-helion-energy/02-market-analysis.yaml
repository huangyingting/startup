  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: helion-commercial-pricing
      missingEvidence: "Actual first-plant commercial electricity pricing, contract structure, offtake terms, and Nucor PPA economics beyond announced MW capacity"
      whyItMatters: "Without knowing actual commercial pricing, the $0.01/kWh target cannot be validated; the economic basis for the SOM revenue estimate cannot be confirmed"
      diligencePath: "Request PPA term sheet under NDA; compare Helion's commercial terms to Microsoft Three Mile Island PPA economics ($16B/835 MW = ~$19.2B/GW)"
      relatedQuestionRefs: [QM018, QM003]

    - type: missing-source
      severity: material
      topic: firm-carbon-free-power-SAM
      missingEvidence: "Authoritative third-party sizing of the 'firm/dispatchable carbon-free electricity' sub-market as a distinct product category with standard certification and pricing"
      whyItMatters: "The SAM is imprecisely bounded because the market lacks standardized product definitions; the $200-400B estimate is analyst judgment, not a published market figure"
      diligencePath: "Review EnergyTag, M-RETS, and GHG Protocol hourly CFE registry data; commission BloombergNEF or Wood Mackenzie custom analysis of firm clean power contract volumes and values"
      relatedQuestionRefs: [QM002]

    - type: stale
      severity: material
      topic: fusion-market-sizing-methodology
      missingEvidence: "Methodology documentation for research firm fusion market sizing estimates (TBRC, Allied Market Research, Precedence Research); the $288-840B range is unexplained and contradicts electricity generation revenue logic"
