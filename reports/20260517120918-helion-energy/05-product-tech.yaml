      detail: 50-500 MW delivered to grid or direct industrial customer under long-term PPA; first delivery target 2028 (Microsoft)
    - label: Direct Faraday Induction Conversion
      detail: "Electromagnetic induction in compression coils as plasma expands; ~95% theoretical efficiency; no steam turbine required"
    - label: D+He-3 Fusion Plasma
      detail: Deuterium plus in-situ-bred He-3 fusion at 100M+ degrees C; magnetically self-confined FRC plasma ring
