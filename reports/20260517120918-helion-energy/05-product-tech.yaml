  claims:
    - id: CE001
      statement: "Helion Energy uses magneto-inertial fusion (MIF) with a pulsed Field-Reversed Configuration (FRC) plasma that self-confines via internal plasma currents, enabling a compact linear vacuum chamber architecture without large external superconducting coils for steady-state confinement."
      type: company-claimed
      topic: "FRC-plasma-physics-architecture"
      sourceRefs: [SE001, SE003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QE001]

    - id: CE002
      statement: "Helion's operating cycle forms two FRC plasmoids via theta-pinch electromagnetic coils at opposite ends of a linear vacuum tube, accelerates them to merge at the midpoint, and then collapses a magnetic mirror to compress the merged plasma to fusion-relevant temperatures."
      type: company-claimed
      topic: "FRC-device-operating-principle"
      sourceRefs: [SE001, SE003]
      confidence: medium
      freshness: current

    - id: CE003
      statement: "Helion's long-run commercial fuel cycle targets D + He-3, with He-3 produced in situ from D+D side reactions within the FRC device to avoid external He-3 procurement and eliminate the need for a tritium breeding blanket."
      type: company-claimed
      topic: "He-3-fuel-cycle-breeding-strategy"
      sourceRefs: [SE001, SE002]
      confidence: medium
      freshness: current

    - id: CE004
      statement: "The He-3 breeding ratio required for a commercially self-sustaining D + He-3 fuel cycle has not been experimentally demonstrated at any Helion device scale; Kirtley et al. (2023) provides theoretical analysis only and no experimental validation of in-situ breeding yield has been published."
