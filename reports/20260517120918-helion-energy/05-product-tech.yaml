    title: "Product Architecture Map"
    type: stack
    layout: wide
    summary: >
      Six-layer architecture stack from device hardware through regulatory compliance, showing how
      Helion's magneto-inertial FRC fusion approach delivers firm baseload electricity via direct
      Faraday induction without a steam turbine — the core structural differentiation.
    data:
      layers:
        - label: "Device / Hardware Layer"
          detail: "Superconducting compression coils, capacitor banks, rotating magnetic field coils, vacuum chamber, cryogenic systems, pulse-power switches — all fabricated in-house at Malaga WA facility"
        - label: "Plasma Physics Layer"
          detail: "FRC formation, supersonic merging, and magnetic compression to 100M+ deg-C; D+He-3 thermonuclear reaction; D+D side reactions producing He-3; validated at Polaris scale per Kirtley 2023 Springer paper"
        - label: "Energy Conversion Layer"
          detail: "Direct Faraday induction from expanding plasma into external coils; proprietary coil geometry; 60-70% claimed conversion efficiency at PoC scale (Polaris Feb 2026); no steam turbine in design chain"
        - label: "Fuel Cycle Layer"
          detail: "Deuterium (commercial supply), tritium (DOH-licensed inventory), He-3 (in-situ D+D breeding), isotope separation and closed-loop recirculation; tritium handling under NRC and DOH regulation"
        - label: "Customer and Commercial Layer"
          detail: "Microsoft 50 MW PPA (2028), Nucor 500 MW (2030), OpenAI framework (unexecuted), Constellation Energy power marketing, HERCULES co-R&D at 20 institutions"
        - label: "Regulatory and Permitting Layer"
          detail: "NRC research license (Polaris), DOH tritium permit, NRC Part 53 commercial pathway (pending finalization), WA construction permits, ARPA-E grant compliance (BETHE, OPEN 2018)"
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006]

