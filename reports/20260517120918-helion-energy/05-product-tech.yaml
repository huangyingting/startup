callouts:
- id: KE001
  type: strength
  title: Direct Faraday Induction Eliminates Steam-Turbine Efficiency Loss
  body: >
    Helion's direct Faraday induction energy recovery is the most commercially significant
    technical differentiator in the private fusion landscape. By inducing current directly
    from plasma expansion into compression coils — bypassing the steam cycle entirely —
    Helion targets approximately 95% theoretical conversion efficiency versus approximately
    33-35% for any steam-cycle-based plant. If achieved at commercial scale, this yields a
    cost-of-energy advantage that no rival approach can match at equivalent fusion output.
    The February 2026 Polaris milestone confirmed proof-of-concept direct conversion for
    the first time in FRC fusion history, an independently significant result even if Q>1
    remains undemonstrated.
  sourceRefs:
  - SE001
  - SE009
  - SE025
  claimRefs:
  - CE003
  - CE007

- id: KE002
  type: risk
  title: Microsoft 2028 PPA Delivery Depends on Q>1 Not Yet Demonstrated
  body: >
    Helion's entire commercial product timeline rests on achieving net energy gain (Q>1)
    with Polaris in H2 2026 — a milestone with no independent data trail to validate its
    proximity. Bloomberg noted in 2024 that external experts cannot verify Helion's energy
    balance from public data. MIT Climate researchers described the 2028 timeline as very
    aggressive. If Q>1 is delayed beyond mid-2027, the 2028 Microsoft PPA delivery window
    collapses, triggering financial penalties and potentially requiring additional capital
    before any commercial revenue is generated. The 2028 deadline is the single highest-stakes
    binary in the Helion investment thesis.
  sourceRefs:
  - SE007
  - SE018
  - SE017
  claimRefs:
  - CE019
  - CE020
  - CE021

- id: KE003
  type: recommendation
  title: Minimum Diligence Data Points for Product and Technology Assessment
  body: >
    Before any investment commitment, request the following from Helion under NDA:
    (1) Polaris Q>1 experimental data and independent technical review of energy balance
    measurements; (2) He-3 breeding ratio measurements across multiple Polaris pulse cycles;
    (3) Orion plant detailed engineering schedule and construction milestone plan with
    contingency; (4) NRC Part 53 pre-application submission contents and NRC staff feedback;
    (5) plasma control software quality documentation and any IEC 61513 compliance assessment.
    These five data points are the minimum required to assess whether the 2028 Microsoft PPA
    delivery obligation is achievable and whether Helion's technical claims are independently verifiable.
  sourceRefs:
  - SE007
  - SE009
  - SE020
  claimRefs:
  - CE019
  - CE020

