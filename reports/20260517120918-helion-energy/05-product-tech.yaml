  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: net-energy-gain-Q1-unverified
    missingEvidence: Helion has not published peer-reviewed data confirming Q>1 electrical energy gain from Polaris. All Q>1 targets are company-stated for H2 2026. Bloomberg and MIT researchers confirmed that external experts cannot verify the energy balance from available public data.
    whyItMatters: "Net energy gain is the foundational technical prerequisite for commercial fusion power. Without independent Q>1 verification, neither the 2028 Microsoft PPA delivery nor the Orion construction rationale can be underwritten by an independent investor. This is the single most important diligence blocker in the Helion product thesis."
    diligencePath: "Request Helion's internal Q>1 experimental dataset and energy balance measurements under NDA with independent technical review by a fusion physics expert at a national laboratory such as PPPL or MIT Plasma Science and Fusion Center. Commission an independent technical audit before any investment commitment."
    relatedQuestionRefs:
    - QE006
    - QE017
    - QE018

  - type: enumeration-incomplete
    severity: material
    topic: IP-portfolio-scope
    missingEvidence: "Helion's patent portfolio covering FRC geometry, direct Faraday induction, He-3 breeding, and plasma control systems is not publicly enumerated in any available source. No comprehensive patent landscape analysis is available from public sources."
    whyItMatters: "Without a confirmed IP portfolio map, the defensibility of Helion's technology differentiation cannot be assessed independently. If core FRC or direct conversion claims are unpatented or subject to prior art, the competitive moat may be narrower than company communications suggest."
    diligencePath: "Conduct a USPTO patent search on Helion Energy as assignee, review international PCT filings at WIPO, and request from Helion a full IP ownership map including licensed-in third-party IP and university-originated IP from HERCULES program agreements."
    relatedQuestionRefs:
    - QE020

  - type: missing-source
    severity: material
    topic: safety-quality-controls-documentation
    missingEvidence: "No publicly available safety audit, plasma control software quality certification (IEC 61513 or equivalent), or independent quality management review has been published for any Helion device."
    whyItMatters: "For a commercial fusion plant seeking NRC licensing, quality control documentation is a regulatory prerequisite. The absence of any public safety or software quality disclosure leaves diligence teams unable to assess process maturity and regulatory readiness for Orion's commercial operation license application."
    diligencePath: "Request under NDA -- (1) Helion's quality assurance program document; (2) plasma control software quality plan and any IEC 61513 compliance assessment; (3) NRC pre-application safety evaluation summary. Review against NRC Part 53 quality assurance requirements once the final rule is published."
    relatedQuestionRefs:
    - QE026

