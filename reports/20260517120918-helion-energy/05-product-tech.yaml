company:
  name: "Helion Energy"
chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Helion Energy's commercial product is firm, clean baseload electricity sold under penalty-backed
    PPAs — not hardware or licensing. The core technology is magneto-inertial fusion (MIF) using a
    pulsed Field-Reversed Configuration (FRC) plasma with direct Faraday induction energy recovery,
    bypassing the steam turbine cycle used by all competitors. Polaris (7th gen) achieved 150M°C
    D-T plasma in January 2026 and produced the first direct electrical current from fusion plasma
    in February 2026. Net energy gain (Q>1) has not been demonstrated, and the commercial Orion
    plant broke ground in July 2025 before physics breakeven — the dominant execution risk in this chapter.

sections:
  - id: SE-TECH-01
    title: "Fusion Technology Architecture"
    body: >
      Helion Energy's commercial product is firm, clean baseload electricity. The technology is
      magneto-inertial fusion (MIF) using a pulsed FRC plasma. Unlike tokamak approaches (e.g.,
      CFS), the FRC plasma self-confines via internal currents, enabling a compact architecture.
      Operating cycle: two FRC plasmoids form at opposite ends of a linear vacuum tube via
      theta-pinch EM coils, are accelerated and collide/merge at midpoint, then a collapsing
      magnetic mirror compresses the merged plasma. Direct Faraday induction energy recovery:
      expanding plasma induces current in compression coils — no heat exchanger, no steam
      generator, no turbine. Polaris (7th gen) achieved 150M°C D-T plasma temperature in
      January 2026 — the highest by a private fusion device. Net energy gain (Q>1) has NOT
      been demonstrated. Peer-reviewed FRC physics validation by Kirtley et al. (Springer 2023)
      and government funding through ARPA-E's BETHE and OPEN 2018 programs provide third-party
      anchoring of the underlying plasma physics.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006]
    tableRefs: [TE003]
    figureRefs: [FE001]

  - id: SE-TECH-02
    title: "Product Module and Asset Map"
    body: >
      Helion's revenue-generating product is firm fusion electricity sold under long-term PPAs —
      not hardware or licensing. Five physical asset modules: (1) FRC plasma formation/compression
      system — vacuum tube, theta-pinch coils, acceleration magnets; (2) direct energy conversion
      subsystem — Faraday induction coils, power conditioning, grid interface; (3) fuel handling
      and tritium breeding system, NRC-licensed; (4) in-house high-voltage capacitor bank (~2,500
      units per Orion plant, manufactured at Everett campus); (5) superconducting compression
      magnets (100x faster pulse rates vs. Trenta). Polaris (7th gen) is primary R&D asset
      targeting Q>1. Orion commercial plant broke ground Malaga WA July 2025, targeting 50 MW
      delivery to Microsoft by 2028.
    claimRefs: [CE007, CE008, CE009, CE010, CE011, CE012]
    tableRefs: [TE001]
    figureRefs: [FE002]

  - id: SE-TECH-03
    title: "Device Roadmap and Development Stage"
    body: >
      Seven-generation prototype progression: Trenta (Gen 6, 2019-2023) operated 16 months
      without vacuum break, 10,000+ pulses, crossed 100M°C threshold, validated FRC compression
      physics. Polaris (Gen 7) began operations late 2024 with improved superconducting magnets,
      in-house capacitors (100x faster pulse rates), NRC-licensed tritium handling. January 2026:
      Polaris achieved 150M°C D-T plasma (first private device D-T fusion). February 2026: Polaris
      produced first direct electrical current from fusion plasma via Faraday induction. Polaris
      continues targeting Q>1 net energy gain as of May 2026. Orion (Gen 8, 1st commercial plant)
      broke ground July 2025 targeting 50 MW by 2028. Compressed timeline from Q>1 (not yet
      achieved) to Orion commissioning is dominant execution risk. ARPA-E BETHE and OPEN 2018
      grants provided government-validated research milestones; Cygnus simulation code underpins
      the device design scaling from Trenta to Polaris.
    claimRefs: [CE013, CE014, CE015, CE016, CE017, CE018, CE019]
    tableRefs: [TE005]

  - id: SE-TECH-04
    title: "Differentiation, IP, and Competitive Moat"
    body: >
      Five compounding advantages: (1) Only private fusion company with binding commercial PPAs
      carrying financial penalties — Microsoft 50 MW (May 2023) and Nucor 500 MW (Sept 2023).
      (2) Only private fusion company to achieve D-T fusion (Polaris, Jan 2026). (3) Direct
      Faraday induction ~95% theoretical efficiency vs. ~33% for steam-cycle plants — structural
      advantage enabling $10/MWh LCOE target. (4) 70+ patents covering FRC plasma formation,
      direct energy conversion, D-He3 fuel cycle, capacitor manufacturing; NRC tritium license
      (2024) provides multi-year regulatory head start. (5) Twelve years of iterative device
      development produces proprietary plasma physics data, coil designs, and capacitor specs
      not replicable from literature. HERCULES program ($17M, April 2026) extends into academic
      networks. Bloomberg July 2024 investigation noted external scientific concerns about
      undisclosed energy balance data — the primary adverse signal for this chapter.
    claimRefs: [CE020, CE021, CE022, CE023, CE024, CE025, CE026]
    tableRefs: [TE002]

  - id: SE-TECH-05
    title: "Trust, Safety, Regulatory Compliance, and Supply Chain"
    body: >
      Fusion safety advantage: if plasma confinement fails, reaction immediately stops — no
      runaway chain reaction, no meltdown, no sustained fuel release. FRC pulsed architecture
      limits plasma inventory to milligrams per pulse. D-He3 commercial fuel cycle produces no
      tritium byproduct and no long-lived activation products. NRC research license (2024) —
      first private fusion company to obtain NRC site authorization for radiological materials.
      Polaris D-T experiments operate under this license. Full NRC fusion plant licensing for
      Orion NOT yet obtained. NRC Part 53 rulemaking for advanced nuclear ongoing 2024-2025;
      Orion will require separate plant license. Supply chain risks: (1) tritium supply;
      (2) He-3 scarcity (~$1,000/gram); (3) in-house capacitor bottleneck (~2,500/Orion);
      (4) superconducting wire constraints. Bloomberg July 2024 documented scientific concerns
      about Helion's undisclosed energy balance data.
    claimRefs: [CE027, CE028, CE029, CE030, CE031, CE032, CE033, CE034]
    tableRefs: [TE004]
    figureRefs: [FE003]

  - id: SE-TECH-06
    title: "Commercial Roadmap, Delivery Architecture, and Execution Risk"
    body: >
      Helion's commercial roadmap 2026-2030 is the most aggressive in private fusion history.
      Sequential logic: Q>1 electrical gain (Polaris, H2 2026 target) → Orion design finalization
      → Orion commissioning (2027-2028) → Microsoft PPA delivery (2028) → Nucor 500 MW (2030).
      Orion commercial delivery rests on three parallel tracks: (1) physics validation — Q_electrical
      > 1 on Polaris, stable high-repetition pulsed operations, translate results to Orion scale;
      (2) construction and regulatory — Orion at Malaga WA broke ground July 2025, must obtain
      NRC Part 53 commercial license; (3) commercial and grid — Microsoft PPA penalty provisions
      create hard delivery obligation, Constellation Energy power marketing, OpenAI framework
      agreement. The 2028 delivery date requires ~18 months from Q>1 to commissioning —
      unprecedented in nuclear energy given no precedent for fusion plant construction.
      External He-3 at ~$1,000/gram represents a secondary commercial risk if in-situ breeding
      proves insufficient.
    claimRefs: [CE035, CE036, CE037]
    figureRefs: [FE004]

