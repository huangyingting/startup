callouts:
  - calloutType: strength
    title: "Polaris: First Private-Sector D-T Fusion and Direct Electrical Conversion (2026)"
    body: >
      In January 2026, Helion's Polaris became the first privately funded fusion device to achieve
      D-T fusion under NRC and DOH license. In February 2026, Polaris produced the first-ever
      direct electrical current from a fusion plasma via Faraday induction — both Helion
      self-reported industry firsts not yet independently verified.
    claimRefs: [CE007, CE008, CE013]

  - calloutType: risk
    title: "Net Energy Gain Not Yet Demonstrated: Primary Execution Risk"
    body: >
      Helion has not publicly demonstrated Q > 1 as of May 2026. The 2028 Microsoft PPA delivery
      depends on demonstrating Q_electrical > 1 (H2 2026 target) and scaling to Orion commercial
      parameters. Bloomberg (July 2024) and MIT Technology Review (May 2023) both noted Helion's
      reluctance to disclose energy balance data, with external experts citing opacity concerns.
      This is the most material technology risk in this chapter.
    claimRefs: [CE019, CE020, CE029]

  - calloutType: insight
    title: "Direct Faraday Conversion: Structural Cost Advantage If Validated"
    body: >
      Helion's direct Faraday induction approach eliminates the steam turbine and thermal
      bottleneck that constrain all competitors to the Carnot limit. Helion claims 60-70%
      efficiency at proof-of-concept scale (Polaris, Feb 2026). If validated at Orion scale,
      this is the primary structural technology differentiation enabling Helion's LCOE target
      and the Microsoft PPA economics.
    claimRefs: [CE005, CE011, CE012, CE013]

  - calloutType: insight
    title: "HERCULES Program Signals Institutional R&D Maturity and IP Strategy"
    body: >
      Helion's April 2026 HERCULES program ($17M+ to 20 universities and national labs through
      2028) targets fusion materials durability, system efficiency, and manufacturing scalability.
      It creates an IP pipeline and talent network for Orion operations. IP ownership terms for
      HERCULES research outputs are not publicly disclosed.
    claimRefs: [CE028, CE034, CE036]

  - calloutType: risk
    title: "He-3 Breeding Commercial Viability Entirely Undemonstrated"
    body: >
      Helion's long-run commercial case depends on self-sustaining He-3 breeding from D+D side
      reactions. External He-3 is scarce and expensive. The breeding ratio required has never been
      demonstrated at any scale. Kirtley et al. (2023) provides theoretical analysis only. If
      breeding proves insufficient, the D + He-3 commercial fuel cycle economics collapse.
    claimRefs: [CE003, CE004, CE030, CE035]

  - calloutType: risk
    title: "Orion Construction Commenced July 2025 Before Physics Breakeven"
    body: >
      Helion broke ground on Orion at Malaga WA in July 2025 before demonstrating net energy gain
      on any device. This construction-before-breakeven sequence is unprecedented in nuclear energy.
      The EPC contractor has not been publicly named, and no Orion-specific NRC commercial license
      pre-application has been publicly filed. Capital at risk in construction before physics
      validation is the core financial risk in this chapter.
    claimRefs: [CE009, CE021, CE022, CE023, CE026, CE027]

