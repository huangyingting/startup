- id: SE-TECH-02
  title: Commercial Product and Customer Workflow
  body: >
    Helion's commercial product is firm, clean baseload electricity delivered directly to
    customers under long-term Power Purchase Agreements (PPAs). From a customer workflow
    perspective, Helion replaces the existing infrastructure of gas-fired peakers, nuclear
    plants, and intermittent renewable PPAs with a single, scalable, on-site or grid-connected
    electricity source providing 24/7 carbon-free power without fuel combustion or radioactive
    waste requiring long-term storage. The Microsoft PPA, signed in May 2023, commits Helion
    to deliver at least 50 megawatts of fusion-generated electricity to Microsoft data centers
    by 2028, enforced by financial penalties for non-delivery and grid integration services
    provided by Constellation Energy. The Nucor PPA targets 500 MW of fusion electricity
    for steelmaking decarbonization by 2030, backed by Nucor's $35 million strategic investment.
    In April 2026 Hogan Lovells confirmed that Helion and Nucor announced plans to develop a
    500 MWe fusion power plant at a US steel mill — the first confirmed legal documentation
    of the expanded Nucor arrangement.

    Helion's HERCULES program, committing over $17 million through 2028 to 20+ universities
    and national laboratories, builds an enabling-technology ecosystem around FRC fusion,
    indirectly supporting the product pipeline while generating external research validation.
    OpenAI discussions for a potential 5 GW arrangement by 2030 remain unconfirmed as of
    May 2026 and should not be incorporated into base-case projections. Both confirmed PPAs
    position Helion as the only fusion company with binding commercial electricity obligations
    and meaningful financial downside for non-performance.

