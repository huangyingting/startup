sections:
- id: SE-TECH-01
  title: Fusion Technology Architecture and Operating Mechanism
  body: >
    Helion Energy's core technology is magneto-inertial fusion (MIF) using a Field-Reversed
    Configuration (FRC) plasma — a compact, self-confining toroidal plasma geometry that
    does not require large external superconducting toroidal coils. The FRC plasma confines
    itself via internal currents flowing within the plasma ring, making the system far more
    compact than tokamak-based competitors such as Commonwealth Fusion Systems. The operating
    cycle begins with two FRC plasmoids formed simultaneously at opposite ends of a linear
    vacuum tube via theta-pinch electromagnetic coils. Each plasmoid is accelerated along
    the tube by time-varying external magnetic fields, then the two collide and merge at
    the midpoint of the device. A collapsing magnetic mirror further compresses the merged
    plasma to fusion conditions — temperatures exceeding 100 million degrees Celsius — without
    the continuous external heating systems tokamaks require.

    The defining commercial differentiator is direct Faraday induction energy recovery: when
    the plasma expands following each fusion pulse, the changing magnetic flux induces
    electrical current directly in the surrounding compression coils. This eliminates the
    steam turbine cycle entirely. Theoretical conversion efficiency approaches 95% compared
    to approximately 33-35% for any steam-cycle-based power plant. Helion's fuel cycle uses
    deuterium (commercially available) combined with helium-3 bred in-situ from deuterium-deuterium
    side reactions during operation, eliminating dependence on an external helium-3 supply chain.
    Springer FRC physics research and APS Physics reviews confirm that the FRC approach is
    a scientifically credible path to fusion, though no private fusion device has yet demonstrated
    net energy gain at commercially relevant conditions.

