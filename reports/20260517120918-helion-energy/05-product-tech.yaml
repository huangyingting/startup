  columns:
  - Layer/Process/Component
  - Role
  - Dependency
  - Risk
  rows:
  - - FRC Plasmoid Formation (theta-pinch coils)
    - Create self-confining toroidal plasma via theta-pinch electromagnetic coils at both ends of vacuum tube
    - Isotopically pure deuterium fuel supply; precision theta-pinch coil fabrication and timing electronics
    - Failure to achieve stable FRC plasmoid aborts fusion cycle; no publicly documented fallback mechanism
  - - Plasma Acceleration and Compression (pulsed EM coils plus magnetic mirror)
    - Accelerate two FRC plasmoids to collision midpoint; merge and compress to fusion-relevant temperature and density
    - Pulsed electromagnetic coil system; magnetic mirror compression; precision timing control
    - Timing jitter or coil degradation reduces compression ratio; plasma instability terminates fusion event prematurely
  - - Deuterium-Helium-3 Fusion Reaction and He-3 Breeding
    - Produce fusion energy via D+He-3 reactions; He-3 bred in-situ from D+D side reactions during operation
    - Sufficient D+D neutron flux to breed He-3 within device lifetime; sustained plasma confinement duration
    - He-3 breeding ratio at commercial scale not independently confirmed; D+T reactions produce tritium requiring separate regulatory handling
  - - Direct Faraday Induction Energy Recovery
    - Convert expanding plasma kinetic energy directly to electricity via electromagnetic induction in compression coils
    - Controlled plasma expansion phase; coil integrity and insulation under repeated high-field pulse cycling
    - Coil fatigue from repeated pulses is a lifetime risk; no commercial-scale longevity data published
  - - NRC Part 53 Licensing and Site Permitting
    - Regulatory authorization for commercial operation of Orion plant under Part 53 fusion framework
    - NRC Part 53 rulemaking completion (in progress 2025-2026); site-specific environmental review; DOE tritium approval
    - Part 53 framework not finalized as of May 2026; licensing timeline directly gates Orion commercial startup date
  enumerationScope:
    coverage: partial
    basis: Five architecture layers identified from Helion official sources and FRC physics literature. Internal engineering specifications and software architecture not publicly available.
  notes: "Architecture descriptions reflect publicly available FRC physics principles and Helion's disclosed design choices; internal subsystem specifications, software layers, and engineering tolerances are not publicly available and are not reflected in this table."

