callouts:
  - calloutType: strength
    title: "Only Private Fusion Company with Penalty-Backed Commercial PPAs"
    body: >
      As of May 2026, Helion is the only private fusion company with signed, penalty-backed
      power purchase agreements. The Microsoft 50 MW PPA includes financial penalties for
      non-delivery — a hard accountability structure no other fusion company has accepted.
      The Nucor 500 MW agreement adds industrial scale and a co-investor who is commercially
      aligned. This PPA primacy creates structural customer lock-in and early-mover commercial
      credibility that CFS, TAE, Pacific Fusion, and all other fusion companies lack.
    claimRefs: [CP018, CP026]

  - calloutType: strength
    title: "Direct Faraday Energy Conversion — Structural Efficiency Advantage"
    body: >
      Helion's pulsed FRC approach recovers electricity directly from the expanding plasma's
      magnetic field change via Faraday's law, bypassing the steam turbine cycle used by all
      tokamak competitors (CFS, Tokamak Energy) and by TAE's planned Da Vinci plant. This
      structural design difference yields theoretical round-trip efficiency advantages (potentially
      >60% vs 35–40% for steam) and eliminates mechanical complexity. No other private fusion
      company targets both FRC and direct conversion at commercial scale simultaneously.
    claimRefs: [CP016, CP017]

  - calloutType: risk
    title: "CFS Capital Lead Creates Mid-Decade Catch-Up Risk"
    body: >
      Commonwealth Fusion Systems has raised approximately $3 billion — roughly 3x Helion's
      cumulative capital — and has Google as an offtaker for ARC's output. If Helion's 2028
      milestone slips by 18-24 months and CFS delivers ARC first-power in 2031-2032, CFS
      could displace Helion as the preferred fusion supplier for hyperscaler contracts in the
      2030s. Helion's PPA penalties limit runway flexibility if Polaris→Orion transition
      encounters unexpected engineering obstacles.
    claimRefs: [CP001, CP002, CP003, CP023]

  - calloutType: risk
    title: "TAE NBI-Only FRC Breakthrough Narrows Helion's FRC Exclusivity"
    body: >
      TAE's November 2025 Nature Communications finding — first-ever NBI-only FRC plasma
      formation — represents genuine IP novelty in the same FRC plasma space Helion occupies.
      TAE's simplified approach reduces FRC machine complexity by up to 50% and directly
      accelerates Da Vinci development. While TAE plans steam cycle (not direct conversion)
      and targets p-B11 fuel (harder physics), the Norm breakthrough narrows the perceived
      uniqueness of Helion's FRC approach and raises freedom-to-operate questions for future
      Helion FRC patents.
    claimRefs: [CP005, CP006, CP027]

  - calloutType: insight
    title: "SMR Deployment is the Most Certain Near-Term Substitute Threat"
    body: >
      The GE Vernova Hitachi BWRX-300 is the only clean firm-power technology actually under
      construction and scheduled for commercial operation in the same 2028-2030 timeframe as
      Helion's PPAs. At LCOE of $90-160/MWh it is far more expensive than Helion's long-run
      target, but it offers regulatory clarity, proven fission physics, and construction track
      record that Helion cannot currently match. Any customer facing Helion delivery risk may
      substitute with an SMR PPA in 2026-2027.
    claimRefs: [CP019, CP020, CP030]

  - calloutType: assumption
    title: "Expert Skepticism on 2028 Timeline Is Not Fully Resolved"
    body: >
      A 2024 Bloomberg investigation raised concerns about Helion's scientific basis for the
      2028 commercial deadline, and independent experts characterized the timeline as aggressive.
      While the February 2026 Polaris milestones (D-T fusion, 150M°C) partially address these
      concerns, net energy gain remains undisclosed. This analysis assumes Helion can demonstrate
      net energy gain in the Polaris testing campaign before Orion begins operation, but treats
      this as a medium-confidence assumption requiring verification before any forward valuation
      or investment commitment.
    claimRefs: [CP033, CP036]

