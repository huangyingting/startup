figures:
  - id: FP001
    title: "Competitive Positioning Map"
    type: quadrant
    layout: wide
    summary: >
      Quadrant positioning of fusion and substitute competitors on two axes: x = Technology Validation
      Score (0 = concept only, 10 = operating at commercial scale) and y = Commercial Proximity
      Score (0 = 15+ years to first power, 10 = power delivered or 2026-2028). Helion occupies
      the high-readiness / nearest-commercial position among pure-fusion companies, with the
      BWRX-300 SMR as the dominant substitute in the same quadrant.
    data:
      xAxis: "Technology Validation Score (0=concept, 10=operating commercial plant)"
      yAxis: "Commercial Proximity (0=15+ yrs away, 10=delivering now / 2028)"
      points:
        - label: "Helion Energy"
          x: 7
          y: 9
        - label: "CFS (SPARC/ARC)"
          x: 8
          y: 6
        - label: "TAE Technologies"
          x: 6
          y: 5
        - label: "Pacific Fusion"
          x: 3
          y: 4
        - label: "Tokamak Energy"
          x: 6
          y: 4
        - label: "Type One Energy"
          x: 4
          y: 3
        - label: "Proxima Fusion"
          x: 3
          y: 3
        - label: "ITER (public)"
          x: 9
          y: 1
        - label: "GEH BWRX-300 (SMR)"
          x: 9
          y: 9
        - label: "NuScale (SMR)"
          x: 9
          y: 6
    approximationNotes: >
      Scores are analyst estimates based on published milestones, funding stages, and commercial commitments
      as of May 2026. Not derived from a standardized TRL scoring framework; ordinal and directional only.
      ITER's high validation score reflects decades of physics validation; its commercial proximity is near-zero.
