company:
  name: "Helion Energy"
chapter:
  number: 3
  title: "Competitors"
  summary: >
    Helion Energy competes in a field of 53+ private fusion companies and faces substitution
    pressure from small modular fission reactors (SMRs) and other firm baseload sources.
    Commonwealth Fusion Systems (CFS, ~$3B raised) is the best-funded direct competitor
    pursuing a tokamak-HTS magnet approach with an ARC power plant targeting the early 2030s.
    TAE Technologies ($1.3B+) uses a field-reversed configuration (FRC) with neutral beam
    injection (NBI) and targets a hydrogen-boron fuel cycle, with a Da Vinci commercial plant
    in the early 2030s. Pacific Fusion ($900M Series A) pursues liner-pinch pulsed magnetic
    fusion targeting net facility gain by 2030. Helion's differentiated position rests on three
    durable advantages: the only private fusion company with signed commercial PPAs (Microsoft
    50 MW by 2028; Nucor 500 MW by 2030), the only company to demonstrate D-T fusion as a
    private entity (January 2026), and direct Faraday induction energy conversion that bypasses
    the steam cycle. These moats are real but require successful Polaris→Orion transition to
    become defensible. Substitution risk from GE-Hitachi BWRX-300 (under construction in Canada,
    2030 target) is the most material near-term competitive threat to Helion's early customer base.

sections:
  - id: SP-SEC-01
    title: "Direct Fusion Competitor Landscape"
    body: >
      The private fusion sector has grown rapidly, with the Fusion Industry Association (FIA) 2025
      survey identifying 53 companies globally with cumulative investment of $9.77 billion — a
      fivefold increase since 2021. The US hosts 29 of these companies and captures the majority
      of global private fusion capital alongside China. Investment is highly concentrated: CFS alone
      holds approximately one-third of total private fusion capital globally (~$3 billion raised
      after its August 2025 Series B2 of $863 million).

      Commonwealth Fusion Systems (CFS), spun out of MIT in 2018, is Helion's most advanced
      direct competitor. CFS is pursuing a tokamak approach using high-temperature superconducting
      (HTS) REBCO magnet technology in its SPARC demonstration device. SPARC is under construction
      in Devens, Massachusetts, with net energy gain targeted before the end of this decade.
      The commercial ARC power plant — sited in Chesterfield County, Virginia, in partnership with
      Dominion Energy — will supply electricity to Google under a purchase commitment for half of
      ARC's output. CFS benefits from MIT institutional credibility, the largest private fusion
      capital base, and a tokamak approach that is the most validated fusion concept globally
      (ITER is the public-sector reference). However, CFS's first commercial power is targeted for
      the early 2030s — after Helion's 2028 commitment — and CFS has not disclosed a commercial PPA
      with binding delivery terms and penalties.

      TAE Technologies (founded 1998, Foothill Ranch, California), with >$1.3 billion raised
      from Google, Chevron, and others, is Helion's nearest FRC-approach peer. TAE's "Norm"
      machine — announced in April 2025 — achieved the first-ever NBI-only stable FRC plasma
      formation, eliminating theta-pinch formation hardware and reducing machine complexity by
      up to 50%. TAE's November 2025 milestone (published in Nature Communications, presented
      at APS DPP) validated NBI-driven FRC formation as stable and repeatable. TAE subsequently
      compressed its roadmap, skipping a planned sixth-generation Copernicus device to proceed
      directly to the "Da Vinci" commercial power plant — targeting early 2030s delivery using
      hydrogen-boron (p-B11) fuel. TAE's p-B11 approach is aneutronic (no significant radioactive
      waste), which is commercially attractive, but p-B11 requires plasma temperatures
      approximately 30x higher than D-T or D-He3 and has not been demonstrated at commercially
      relevant conditions.

      Pacific Fusion (founded 2023), backed by $900 million in milestone-gated Series A funding
      led by General Catalyst, pursues pulsed magnetic liner-pinch fusion using Impedance-Matched
      Marx Generator (IMG) technology originally developed at Lawrence Livermore National
      Laboratory. The company targets net facility gain (energy out > energy in at facility level)
      by approximately 2030 using D-T fuel. Pacific Fusion's leadership includes former LLNL
      experts and Alphabet alumni. The $900M is milestone-gated rather than freely deployable,
      which provides accountability but also creates funding-cliff risk if milestones slip.

      Tokamak Energy (UK, $335M raised, founded 2009 as UKAEA spin-out), Proxima Fusion
      (Germany/UK, €185M raised, Max Planck Institute spin-out, 2023), and Type One Energy
      (US, >$160M raised, TVA-sited stellarator) represent the tier-two private fusion field.
      Tokamak Energy is the only private company to have operated spherical tokamaks for more than
      a decade, achieving 100 million°C in its ST40. Proxima Fusion's €130M Series A (June 2025),
      the largest private fusion round in Europe, funds an HTS QI-stellarator with the Stellarator
      Model Coil (SMC) target in 2027 and the Alpha demo (Q>1) target in 2031. Type One Energy
      targets a 350 MW stellarator commercial plant (Infinity Two) at a retired TVA coal site
      in the mid-2030s under a technology-licensing rather than plant-ownership model.

      ITER — the 35-nation international fusion tokamak under construction in Cadarache, France —
      is not a commercial competitor but sets the technical benchmark. ITER's first plasma has been
      pushed to the late 2020s at earliest, with first full-power D-T operation now expected in
      the mid-2030s and commercial derivatives (DEMO) unlikely before the 2040s. ITER's public
      funding and multi-decade timeline mean it is a credibility proxy but not a market competitor.
    tableRefs: [TP001]
    figureRefs: [FP001]
    calloutRefs: []

  - id: SP-SEC-02
    title: "Substitute Technologies and Incumbents"
    body: >
      The most material substitution threat to Helion's near-term commercial position is advanced
      small modular fission reactors (SMRs), particularly the GE Vernova Hitachi BWRX-300. The
      BWRX-300 (300 MWe, light-water-cooled boiling water design) is under active construction at
      Ontario Power Generation's Darlington site in Canada, with commercial operation targeted
      for 2030. Ontario plans four BWRX-300 units (1.2 GW total). The Tennessee Valley Authority
      has filed the first US Construction Permit Application for a BWRX-300 at the Clinch River
      site, Oak Ridge, Tennessee. The global BWRX-300 pipeline spans Poland (~24 units at 6 sites
      backed by a $4B US EXIM commitment), Sweden, the UK, and others.

      The SMR threat to Helion is real but bounded. SMRs solve the "firm carbon-free baseload"
      problem that Helion also addresses, and SMR timelines overlap with Helion's 2028-2030 customer
      window. However, SMR LCOE estimates range from $90–160/MWh (Wood Mackenzie, BloombergNEF) —
      far above Helion's projected $0.01/kWh (~$10/MWh) long-run target. A buyer that commits to
      an SMR PPA in 2025-2026 reduces available capacity for Helion's 2028 delivery, but SMRs
      cannot be redirected to Helion's industrial customers once contracted. Helion's Nucor deal
      is structurally protected because Nucor is co-investor and strategically aligned.

      NuScale Power holds the only NRC design certification for an SMR (77 MWe US460, certified
      May 2025), but its flagship project was cancelled in 2023 and it is currently seeking new
      deployments. Oklo (Aurora advanced fission, HALEU fuel) is pre-construction and awaiting
      NRC approval for an updated application. TerraPower Natrium has a construction permit
      application under active NRC review for the Kemmerer, Wyoming demonstration plant.

      Other substitutes include natural gas (>40% of US grid in 2025, cheapest dispatchable
      option), long-duration storage paired with renewables (nascent technology, cost-uncertain),
      and geothermal (firm and carbon-free but resource-constrained geographically). For Helion's
      hyperscaler customers (Microsoft, potential others), the 24/7 carbon-free electricity
      requirement eliminates unabated natural gas and limits storage economics, so the effective
      substitute set is advanced nuclear only — making the competitive battleground more focused.
    tableRefs: [TP003]
    figureRefs: []
    calloutRefs: []

  - id: SP-SEC-03
    title: "Competitive Differentiators and Helion's Moat"
    body: >
      Helion's competitive differentiation rests on three structural advantages that no other
      private fusion company has replicated as of May 2026:

      First, commercial PPA primacy. Helion is the only private fusion company with signed,
      penalty-backed commercial power purchase agreements. The Microsoft PPA (50 MW by 2028)
      includes financial penalties if delivery fails — a hard accountability mechanism no
      competitor has accepted. The Nucor agreement (500 MW by 2030) adds an industrial anchor
      with co-investor alignment. These PPAs create customer-specific revenue locks and
      reputational leverage that make Helion the default choice for industrial customers evaluating
      fusion in the near term.

      Second, FRC magneto-inertial direct conversion. Helion's pulsed Field-Reversed Configuration
      (FRC) approach accelerates two plasmoids to 1 million mph, compresses them to >100 million°C,
      and recovers electricity directly via Faraday's law from the expanding plasma-induced magnetic
      flux change — bypassing the steam turbine cycle used by all tokamak and most other competitors.
      This direct conversion pathway has theoretical efficiency advantages (>60% round-trip vs
      ~35–40% for steam turbines), lower mechanical complexity, and eliminates the need for a
      steam cycle entirely. Helion's D-He3 commercial fuel plan (aneutronic, fewer neutrons) further
      reduces material activation and enables long-term plant economics. No other private fusion
      company combines FRC + direct conversion + a commercial-scale customer commitment.

      Third, prototype cadence and technology de-risking. Helion has built 7 progressively capable
      prototypes — more than any other private fusion company. In January 2026, Polaris became
      the first and only privately funded machine to achieve D-T fusion, with plasma temperatures
      of 150 million°C (the highest in private fusion). This milestone was externally validated
      and provides Helion with a verifiable technology de-risking credential that pre-PPAs most
      competitors lack.

      TAE Technologies shares the FRC approach and has built 5 generations of devices (now 6
      with Norm), but diverges in fuel cycle (p-B11 is harder), energy conversion (steam turbine
      planned), and commercial stage (no PPAs). CFS shares the ambition for early commercialization
      and has superior funding and institutional backing, but uses tokamak + steam cycle and lacks
      commercial customer binding commitments. Pacific Fusion is early-stage with no demonstrated
      plasma milestones and funding that is milestone-contingent rather than freely deployable.

      Key vulnerabilities in Helion's moat: (1) Net energy gain has not been publicly demonstrated;
      the Polaris→Orion technology transition is the dominant execution risk. (2) TAE's NBI-only
      FRC breakthrough represents genuine IP novelty in the shared FRC space — if TAE achieves
      competitive energy gain timelines, it could compete for industrial anchor customers in the
      mid-2030s. (3) If Helion's 2028 Microsoft delivery slips, CFS's ARC or an SMR could capture
      Microsoft's next contract.
    tableRefs: [TP002, TP004]
    figureRefs: [FP002, FP003]
    calloutRefs: []

  - id: SP-SEC-04
    title: "Displacement and Commoditization Risk"
    body: >
      The most likely commoditization scenario for Helion is a world in which fusion energy becomes
      a proven technology by 2032-2035, at which point 10+ well-funded companies attempt to serve
      the same hyperscaler and industrial customer base. In that scenario, Helion's head start —
      the two PPAs — provides a one-cycle advantage but not permanent pricing power. The key moat
      durability question is whether Helion can leverage early commercial success (2028-2030) to
      build the supply chain, manufacturing expertise, and customer relationships needed to expand
      faster than later entrants.

      CFS is the only competitor with the capitalization ($3B) to potentially out-invest Helion
      ($1B+) in the critical 2026-2030 window. However, CFS's tokamak approach requires larger,
      more complex plant engineering than Helion's compact FRC design. CFS has Google as a
      committed offtaker for ARC, but this is a preliminary purchase commitment (not a
      penalty-backed PPA), reducing CFS's commercial urgency compared to Helion's Microsoft deal.

      An adverse scenario for Helion involves: a 12-24 month Polaris→Orion technology gap,
      a Nucor site permitting delay, the Microsoft penalty trigger, and CFS securing a second
      hyperscaler customer (e.g., Amazon or Meta) under a more lenient term structure. In this
      scenario, CFS's early 2030s ARC plant could displace Helion as the reference commercial
      fusion provider. The probability of this scenario depends heavily on Helion's ability to
      maintain its 2028 milestone and to demonstrate net energy gain publicly before 2027.

      Expert skepticism about Helion's timeline is documented: a 2024 Bloomberg investigation
      raised concerns about the scientific basis for the 2028 deadline, and MIT Technology Review
      characterized the 2028 timeline as "very fast" for the sector. These concerns have not been
      refuted by Helion but have been partially addressed by the Polaris milestones of February 2026.
      The company has published several peer-reviewed technical papers supporting the FRC scaling
      approach but has not released plasma energy balance data publicly, citing IP protection.
    tableRefs: []
    figureRefs: []
    calloutRefs: []

