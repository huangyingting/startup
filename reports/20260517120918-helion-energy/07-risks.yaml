- id: section-5
  title: People, Execution, and Financial Risk
  body: 'Helion has two critical key-person concentrations. David Kirtley serves simultaneously as CEO and principal technical architect with no disclosed succession plan for either role — an unusually
    concentrated leadership structure for a company at commercial-scale deployment stage. Sam Altman departed the Helion board in March 2026 to manage OpenAI conflict-of-interest exposure; while retaining
    his $350M+ investment, his reduced governance role weakens the investor-relations anchor and capital-access network he provided. George Votroubek''s FRC plasma physics expertise is core to Helion''s
    technical program, and the global talent pool for this specialization is extremely limited. On the financial side, Helion has raised approximately $1.4B+ in total but post-Q>1 capital to build and operate
    Orion at commercial scale is estimated at $10B+, representing a funding gap of approximately 6-7x current resources. Helion has no revenue; burn rate is estimated at $150M+ annually but not publicly
    disclosed. If Polaris misses Q>1, the $5.425B Series F valuation becomes unsupportable in a subsequent raise, creating severe down-round risk. Microsoft penalty payments — if triggered — could deplete
    available cash. Bloomberg''s 2024 investigation raised governance and culture concerns that could complicate institutional investor participation. The People/Execution Risk Register (TR004) and Mitigation
    and Thesis-Break Criteria Table (TR005) capture these dimensions.

    '
