- id: KR003
  type: risk
  title: Customer Concentration in Microsoft — Single Counterparty Exposed to 2028 Penalty
  body: 'Helion''s only contracted power purchase agreement is with Microsoft for 50 MW of fusion electricity by 2028. This single customer relationship represents 100% of confirmed revenue commitments
    and a corresponding 100% concentration of PPA-related penalty exposure. The specific penalty terms have not been publicly disclosed, but industry-standard PPA penalties for failure-to-deliver typically
    range from liquidated damages of $10-50M to contract termination with asset claims. Microsoft has the resources to enforce such provisions aggressively. The Nucor 500 MW framework agreement provides
    pipeline diversification but has a longer (2030+) timeline with its own technical dependencies. OpenAI discussions, as reported in early 2026, remain speculative with no binding commitments. Customer
    concentration risk cannot be mitigated without binding contracts from additional independent counterparties at comparable scale before the 2028 delivery window.

    '
  sourceRefs:
  - SR001
  - SR009
  - SR019
  claimRefs:
  - CR007
  - CR008
  - CR009
- id: KR004
  type: risk
  title: NRC Part 53 Rulemaking Outcome Is a Binary Regulatory Risk for Orion
  body: 'Helion Orion will be the first commercial fusion power plant to seek an NRC operating license. No regulatory pathway has been tested end-to-end. The Part 53 framework, finalized in 2024, creates
    a risk-informed advanced reactor licensing process, but its application to fusion — versus fission — involves unresolved technical determinations that NRC staff must make on a case-by-case basis with
    no precedent. If NRC requires additional environmental impact assessments, expanded safety analysis reports, or novel safety system requirements for the FRC plasma containment approach, the licensing
    timeline could extend 2-5 years beyond Helion''s 2028 target. Worst case, a Part 53 adverse rulemaking or legislative change could create licensing barriers requiring congressional action. This regulatory
    binary is outside Helion''s direct control and cannot be fully mitigated by technical progress alone. Independent regulatory counsel should be engaged to assess NRC pre-application engagement status
    and likely timeline.

    '
  sourceRefs:
  - SR004
  - SR005
  - SR026
  claimRefs:
  - CR005
  - CR006
  - CR010
- id: KR005
  type: insight
  title: He-3 Self-Breeding Efficiency Is Commercially Unvalidated — Model Risk
  body: 'Helion''s commercial D-He3 fuel cycle requires the reactor to breed its own helium-3 from deuterium fusion reactions — a process that has not been demonstrated at any scale, let alone at the efficiency
    levels required for commercial viability. The global civilian He-3 supply is approximately 25-30 kg/year at a cost of ~$1,000/gram, making external He-3 procurement commercially infeasible for a 50
    MW facility. Self-breeding efficiency is therefore not a technical option but a commercial necessity. Helion''s modeling of He-3 breeding yield has not been independently validated and no peer-reviewed
    publication confirms the claimed efficiency projections. If breeding efficiency is materially below projections — a risk specifically surfaced by the Bloomberg 2024 investigation — the entire long-term
    commercial model fails even if Q>1 is achieved on a D-T Polaris device. This makes He-3 breeding a hidden second binary gate in the commercial pathway, less visible than Q>1 but equally fatal if unresolved.

    '
  sourceRefs:
  - SR002
  - SR003
  - SR011
  claimRefs:
  - CR015
  - CR016
  - CR017
- id: KR006
  type: recommendation
  title: Bloomberg Scientific Concerns Must Be Resolved via Independent Plasma Audit Before Series G
  body: 'Bloomberg''s July 2024 investigation raised specific concerns about Helion''s scientific transparency, direct Faraday energy conversion efficiency claims, and the absence of independent third-party
    validation of plasma data. Helion has not publicly responded with independent scientific review or released raw experimental data. This unresolved credibility gap represents a material risk for Series
    G fundraising: institutional investors (sovereign wealth funds, pension funds, large family offices) who were not in earlier rounds will demand independent technical due diligence that Helion''s current
    opacity cannot satisfy. The recommended diligence action is to engage an independent plasma physics advisory panel (e.g., MIT, Princeton Plasma Physics Laboratory, or Lawrence Livermore NIF team) to
    review Polaris experimental data under NDA and produce a written technical assessment. This single action would de-risk the credibility dimension more than any other available mitigation and should
    be a condition of any Series G lead investor commitment.

    '
