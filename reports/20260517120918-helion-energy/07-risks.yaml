- id: section-3
  title: Operational and Supply Chain Risk
  body: 'Helion''s operational risk profile centers on multiple single-point dependencies. Tritium — the fuel for Polaris D-T fusion — is a regulated material whose global civilian supply is estimated at
    25-30 kilograms, managed primarily by DOE for national security. Commercial-scale tritium access for Orion is not yet authorized, and DOE allocation is not confirmed. Helion''s longer-term D-He3 fuel
    roadmap faces a severe supply chain barrier: helium-3 costs approximately $1,000 per gram and no commercial He-3 supply chain exists at fusion-relevant scale. Lithium-6 required for tritium breeding
    carries geopolitical risk from China''s dominant lithium supply position. High-temperature superconducting magnet supply is concentrated among a small number of manufacturers; disruptions could delay
    machine builds with 12-24 month lead times. Most significantly, Orion construction at Malaga commenced July 2025 — a first-of-kind greenfield industrial build before underlying physics was validated
    — introducing schedule, cost overrun, and technical execution risks compounded by the 2028 deadline pressure. The Operational/Quality/Security Risk Register (TR002) quantifies each failure mode.

    '
  claimRefs:
  - CR007
