- id: section-4
  title: Partner, Dependency, and Competition Risk
  body: 'Helion''s commercial model has extreme customer concentration: Microsoft is the sole contracted power offtake partner for the first plant, holding both penalty-trigger rights and the primary credibility
    anchor for Helion''s commercial narrative. Nucor''s 500 MW development agreement is the only other confirmed partnership, but it is explicitly conditioned on Helion''s technology success. DOE represents
    a structural single-source dependency for tritium with no commercial alternative. Sam Altman''s March 2026 board departure reduces capital network access at a critical fundraising juncture. Competitive
    risk intensified markedly in 2024-2026: Commonwealth Fusion Systems has raised over $3B+ with MIT credibility and the SPARC tokamak; Pacific Fusion emerged from stealth with a $900M Series A targeting
    D-T net facility gain by 2030; and GE-Hitachi''s BWRX-300 SMR, under construction in Canada with a 2030 target, provides a viable substitute for low-carbon baseload power commitments. Microsoft has
    disclosed no exclusivity clause, meaning it could negotiate with alternative suppliers if confidence in Helion''s 2028 delivery fades. The Dependency Map (FR003) and Partner/Dependency Risk Register
    (TR003) identify critical counterparties and failure scenarios.

    '
  claimRefs:
