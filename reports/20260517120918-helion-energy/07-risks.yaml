company:
  name: Helion Energy
chapter:
  number: 7
  title: Risks
  summary: 'Helion Energy carries extreme binary technology risk (Q>1 not demonstrated), compressed timeline risk (2028 Microsoft PPA with financial penalties), massive post-Q>1 capital requirements ($10B+),
    fuel supply chain risk (helium-3 scarcity), NRC regulatory risk (fusion plant license not yet issued), and key-person concentration (Kirtley and Altman). The Bloomberg investigation (July 2024) raised
    credible scientific questions about direct Faraday energy conversion at commercial scale. Any single major risk — especially technology failure or 2028 timeline miss — could be fatal.

    '
sections:
- id: section-1
  title: Technology and Timeline Risk
  body: 'Helion Energy''s most critical risk is binary and existential: Polaris has not demonstrated net energy gain (Q>1) as of May 2026, and the entire commercial investment thesis depends on this milestone.
    Polaris achieved a world-record plasma temperature of 150 million degrees Celsius with deuterium-tritium fuel in January 2026 — a genuine scientific achievement — but plasma temperature is not Q>1.
    Net energy gain requires fusion energy output to exceed total energy input, a bar only crossed once globally (NIF, December 2022) under conditions fundamentally different from Helion''s pulsed magneto-inertial
    approach. Beyond Q>1, Helion must demonstrate direct Faraday energy conversion at commercial scale — a technology Bloomberg''s July 2024 investigation specifically questioned and that has no published
    peer-reviewed validation. The timeline compression is severe: Polaris must achieve Q>1 in time for Orion — whose construction began July 2025 before Q>1 was demonstrated — to be commissioned by 2028.
    Independent physicists and MIT Technology Review have expressed skepticism that a 12-18 month Q>1-to-commercial-plant sequence is achievable with no engineering precedent. Technology failure or meaningful
    delay cascades into Microsoft penalty exposure, capital raise impairment, and potential program wind-down. The Risk Heatmap (FR001) places technology failure at the highest severity-likelihood combination
    in the portfolio.

    '
