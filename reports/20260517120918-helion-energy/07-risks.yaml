callouts:
- id: KR001
  type: risk
  title: Net Energy Gain (Q>1) Undemonstrated — Foundational Technology Risk
  body: 'As of May 2026, Helion has not demonstrated net energy gain (Q>1) on any device. The entire investment thesis — the 2028 Microsoft PPA, the Nucor 500 MW deal, the $5.425B Series F valuation, and
    Orion construction already underway — depends entirely on Polaris achieving Q>1 before the commercial window closes. This is not a risk of degree; it is a binary pass/fail gate. NIF achieved Q>1 in
    December 2022 under inertial confinement conditions fundamentally different from Helion''s pulsed magneto-inertial FRC approach. The global scientific community has not independently validated Helion''s
    plasma temperature milestone as equivalent to, or a precursor for, Q>1. If Q>1 is not demonstrated on Polaris before mid-2027, the path to 2028 Orion commissioning effectively collapses. Investors must
    treat this as the single highest-ranked risk in the portfolio regardless of all other favorable indicators.

    '
  sourceRefs:
  - SR001
  - SR002
  - SR003
  - SR006
  claimRefs:
  - CR001
  - CR002
  - CR003
- id: KR002
  type: risk
  title: Orion Construction Ahead of Q>1 Is the Single Largest Investment Risk
  body: 'Helion broke ground on Orion at Malaga, Washington in July 2025 — before achieving Q>1 on Polaris. This sequencing has no commercial precedent in energy infrastructure. A conventional risk management
    framework would require scientific proof-of-concept before committing hundreds of millions in commercial plant construction capital. By inverting this sequence, Helion effectively placed a leveraged
    bet: if Q>1 comes on schedule, Orion construction progress accelerates time-to-revenue; if Q>1 is delayed or fails, sunk construction costs become unrecoverable. The construction investment — estimated
    at $1B+ for Orion — combined with ongoing Polaris R&D burn of ~$150M/year means the total capital at risk in a Q>1 failure scenario exceeds $2B before any Microsoft penalty exposure is counted. This
    is the defining structural risk of the Helion investment case and requires a dedicated risk tranche in any institutional portfolio model.

    '
