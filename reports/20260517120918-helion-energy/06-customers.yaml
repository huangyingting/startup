company:
  name: "Helion Energy"
chapter:
  number: 6
  title: "Customers"
  summary: >
    Helion Energy has zero revenue-generating customers as of May 2026. Its commercial book
    rests entirely on two pre-revenue commitments: a binding 50 MW Power Purchase Agreement with
    Microsoft (May 2023, financial penalties on non-delivery by 2028) and a 500 MW development
    agreement with Nucor Corporation (September 2023, Nucor also invested $35M). Reported
    multi-gigawatt negotiations with OpenAI remain unconfirmed. Extreme customer concentration,
    no revenue, and a binary technology dependency on Polaris achieving net energy gain define
    the customer risk profile. The Microsoft PPA is a historic first for commercial fusion and
    represents a genuine moat, but it also establishes an unprecedented delivery obligation.

sections:
  - id: SU-SEC-01
    title: "Customer Base Overview and Segmentation"
    body: >
      Helion Energy has no paying customers as of May 2026. The company's entire commercial
      pipeline consists of pre-revenue agreements and reported discussions. Its business model
      targets large enterprise buyers who require baseload, carbon-free electricity at scale: AI
      hyperscale data centers, energy-intensive industrial manufacturers, and potentially utilities.
      The common thread is that buyers need 24/7 clean power, have long planning horizons, and
      have sufficient scale to justify a dedicated or co-located fusion plant.

      The buyer is always the entity with the electricity off-take obligation (Microsoft, Nucor);
      the user is the industrial process or data center workload consuming the power; the payer
      is the same entity given that these are direct bilateral PPAs, not intermediated through a
      utility. There is no consumer segment, no distribution through resellers, and no marketplace
      or platform channel. Revenue, when it materializes, will be a combination of capacity charges
      and energy charges per MWh delivered, though exact pricing is not publicly disclosed for
      either existing agreement.

      Geographically, all known customers are U.S.-based, which limits near-term cross-border
      diversification. Vertically, the current pipeline spans AI/cloud infrastructure (Microsoft)
      and electric arc furnace (EAF) steelmaking (Nucor), with hyperscale AI/compute (OpenAI,
      unconfirmed) as the third vertical. Industrial customers like Nucor represent a different
      demand profile — continuous baseload at extremely high utilization with low tolerance for
      outages — compared to data center customers who value 24/7 carbon-free electricity for
      sustainability commitments. The customer acquisition model is direct B2B enterprise
      deal-making with multi-year lead times and C-suite involvement on both sides.
    claimRefs: [CU001, CU002, CU003, CU007, CU008, CU009, CU010]
    tableRefs: [TU001]
    figureRefs: [FU002]

  - id: SU-SEC-02
    title: "Microsoft PPA — Anchor Customer Analysis"
    body: >
      The Microsoft Power Purchase Agreement, announced May 10, 2023, is the centerpiece of
      Helion's commercial strategy and represents the world's first commercial fusion power
      purchase agreement. Under the binding agreement, Helion commits to deliver at least 50 MW
      of fusion-generated electricity to Microsoft by 2028, with Constellation Energy serving as
      the power marketer and transmission manager. The agreement includes explicit financial
      penalties payable to Microsoft if Helion fails to meet the delivery deadline. This penalty
      structure, described by New Atlas as "an outrageously audacious move," transforms what
      might otherwise be a non-binding letter of intent into a hard commercial obligation.

      Microsoft's strategic rationale is rooted in its carbon commitments (it aims to be carbon
      negative by 2030 and carbon free by 2050) and the surging electricity demand from its AI
      data centers. The company has made 24/7 carbon-free electricity a stated procurement
      priority, and fusion represents a theoretically perfect solution: baseload, zero-emissions,
      and fuel-agnostic at scale. Sam Altman's dual role as both Helion's board chair and OpenAI
      CEO (and Microsoft's AI partner) may have facilitated initial discussions, though the
      strategic logic for Microsoft stands independently of personal relationships.

      The evidence quality for the Microsoft PPA is high and multi-sourced, with confirmation
      from Microsoft's own blog, multiple tier-one press outlets (NYT, Bloomberg, WSJ, Washington
      Post), and Helion's official communications. The agreement is real, binding, and represents
      a genuine commercial milestone. However, exact pricing, penalty amounts, early termination
      clauses, and force majeure provisions are not publicly disclosed. The 50 MW target is modest
      relative to a typical Microsoft data center complex, suggesting the initial contract may be
      as much about establishing precedent and securing optionality as about immediate energy
      supply. MIT experts quoted in 2023 called the 2028 timeline "astounding" and "questionable,"
      reflecting the scientific uncertainty still embedded in this commercial commitment.
    claimRefs: [CU001, CU004, CU005, CU006, CU011, CU012, CU013]
    tableRefs: [TU002, TU003]
    figureRefs: [FU001]

  - id: SU-SEC-03
    title: "Nucor — Industrial Customer and Co-Investor"
    body: >
      Nucor Corporation, the largest U.S. steel recycler by revenue (~$35 billion annually) and
      the nation's largest electric arc furnace (EAF) steelmaker, announced a combined investment
      and 500 MW fusion power agreement with Helion in September 2023. Nucor invested $35 million
      directly into Helion (Series F-adjacent tranche or separate strategic investment) while
      simultaneously committing to host a 500 MW Helion fusion plant at one of its steelmaking
      facilities, with operations targeted for approximately 2030. Hogan Lovells advised on the
      pioneering legal structure, which merges customer and investor roles into one relationship.

      Nucor's strategic rationale is directly tied to decarbonizing its EAF operations. EAF
      steelmaking already achieves lower emissions than basic oxygen furnace (BOF) steelmaking
      by using scrap metal and electricity rather than coal. However, the carbon intensity of
      the grid electricity it purchases remains a significant emissions source. Fusion-derived
      electricity would reduce Nucor's Scope 2 emissions, support its sustainability targets, and
      potentially provide a long-term competitive advantage in steel markets where low-carbon
      supply chains command a premium. The co-investment structure aligns Nucor's financial
      incentives with Helion's success, reducing the counterparty risk of pure off-take agreements.

      Adoption metrics are pre-commercial: the 500 MW plant does not exist, no electricity has
      been delivered, and the 2030 timeline depends on Polaris demonstrating net energy gain and
      Orion scaling up from 50 MW to commercial operation. Retention metrics (NRR, GRR, churn)
      are not applicable to pre-delivery agreements. The Nucor agreement's durability depends on
      both technology milestones and Nucor's continued confidence in Helion's roadmap. The $35M
      co-investment creates meaningful alignment but is immaterial relative to Nucor's $35B
      revenue base, suggesting Nucor views this as an R&D partnership hedge rather than a
      primary operational commitment.
    claimRefs: [CU014, CU015, CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU004, TU005]

  - id: SU-SEC-04
    title: "OpenAI Partnership Discussions and Hyperscaler Pipeline"
    body: >
      In March 2026, GeekWire and Power Magazine reported that OpenAI is in discussions with
      Helion to secure multi-gigawatt fusion power, with one report citing 5 GW by 2030 and
      up to 50 GW by 2035 targets — figures that would vastly exceed Helion's currently planned
      commercial capacity. Sam Altman stepped down from Helion's board in March 2026 to eliminate
      potential conflicts of interest as the OpenAI-Helion partnership talks advanced. The
      deal has not been publicly confirmed by either party as of May 2026 and should be treated
      as unconfirmed and speculative for diligence purposes.

      If an OpenAI-Helion deal were confirmed at even a fraction of the reported scale, it would
      represent a transformative shift in Helion's customer concentration and revenue potential.
      OpenAI's rapid electricity demand growth, driven by large language model training and
      inference workloads, makes it one of the highest-demand hyperscale power buyers globally.
      The Altman connection (OpenAI CEO, former Helion board chair) creates both an opportunity
      (trusted relationship, shared investor base) and a risk (conflicts of interest, nepotistic
      deal optics, regulatory scrutiny of self-dealing).

      Beyond OpenAI, Helion's long-term customer thesis rests on serving a wave of AI hyperscalers
      (Microsoft Azure, AWS, Google Cloud), industrial decarbonizers (steel, cement, aluminum),
      and potentially regulated utilities. The customer acquisition path is relationship-driven
      rather than product-led: no self-serve channel exists, no marketplace, and no reseller
      network. Every major deal requires C-suite engagement, multi-year negotiation, and custom
      siting and grid interconnection planning. This creates high barriers to customer acquisition
      at scale. On the other hand, if Helion delivers on the Microsoft PPA, the resulting reference
      customer and proof-of-concept should dramatically compress the sales cycle for subsequent
      hyperscaler and industrial buyers.
    claimRefs: [CU021, CU022, CU023, CU024, CU025]
    figureRefs: [FU003]

  - id: SU-SEC-05
    title: "Concentration Risk, Contract Durability, and Expansion Strategy"
    body: >
      Helion's customer concentration is extreme by any measure. Two customers — Microsoft and
      Nucor — represent 100% of known commercial commitments. One of those (Microsoft) is binding
      with financial penalties; the other (Nucor) is a development-stage agreement. A failure to
      deliver on the Microsoft PPA would trigger financial penalties, damage Helion's credibility
      with all future prospective customers, and likely precipitate a capital crisis. There is no
      diversification of off-take risk across multiple buyers, geographies, or contract structures.

      Contract durability is difficult to assess without full PPA terms. The Microsoft agreement
      has a penalty structure, which signals durability from Microsoft's perspective — it is
      designed to survive Helion's reluctance to pay and thus represents a genuine long-term
      commitment from the buyer. However, force majeure provisions, technology failure carve-outs,
      and early termination clauses (if any) are unknown. Nucor's agreement, as a development-stage
      deal, likely carries more flexibility for both parties given the 2030 target, but specific
      termination rights, penalties, and milestone-based gates are not publicly disclosed.

      The expansion strategy is clearly to land hyperscale and industrial anchor customers,
      use the Microsoft PPA as a reference, and accelerate deal-making once commercial operations
      are proven. However, without the first delivered MWh, all expansion remains hypothetical.
      Procurement friction is significant: each deal requires custom siting, environmental
      permitting, grid interconnection agreements, and bilateral PPA negotiation. The OpenAI
      reports suggest the pipeline is active, but confirmation and deal structure details are
      lacking. Any investor should treat Helion's customer book as a single-contract enterprise
      (Microsoft PPA) with one pipeline stage (Nucor development deal) and one speculative
      conversation (OpenAI), with no revenue and no track record of delivery.
    claimRefs: [CU026, CU027, CU028, CU029, CU030, CU031, CU032, CU033, CU034, CU035]
    tableRefs: [TU006]

