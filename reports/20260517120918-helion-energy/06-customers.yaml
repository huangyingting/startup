callouts:
  - calloutType: risk
    title: "Extreme Customer Concentration: Entire Commercial Book = One Binding PPA"
    body: >
      As of May 2026, Helion's entire contracted commercial revenue rests on a single binding
      agreement: the Microsoft 50 MW PPA. A delivery failure in 2028 would trigger financial
      penalties, destroy the company's only reference customer relationship, and eliminate the
      credibility needed to close future agreements with Nucor, OpenAI, or any subsequent buyer.
      Investors must treat this concentration as binary: the 2028 Microsoft delivery is effectively
      an existential milestone that simultaneously tests technology, construction, grid integration,
      and commercial viability in one event.
    claimRefs: [CU001, CU026, CU027]

  - calloutType: insight
    title: "Microsoft PPA as a Permanent Moat if Delivered"
    body: >
      Successfully delivering 50 MW to Microsoft by 2028 would be a category-defining event: the
      world's first operating commercial fusion power plant, a signed reference customer at one of
      the world's largest technology companies, and proof that the Helion model works. This would
      compress sales cycles for all subsequent deals and create a reference asset that competitors
      cannot replicate without their own first plants. The moat is not the PPA itself — it's the
      demonstrated delivery.
    claimRefs: [CU001, CU007, CU033]

  - calloutType: risk
    title: "Nucor Co-Investment Is Alignment, Not Guarantee"
    body: >
      The $35M Nucor investment is strategically important as a signal of industrial customer
      confidence, but it is immaterial relative to Nucor's $35B revenue base. Nucor can absorb
      a total loss of its Helion investment without material financial impact. The development
      agreement for 500 MW is contingent on Helion's technology succeeding, which means Nucor
      retains effective optionality to walk away if milestones are missed. Diligence should
      verify whether the development agreement includes binding milestone gates that create
      any penalty exposure for either party.
    claimRefs: [CU014, CU015, CU016, CU019, CU034]

