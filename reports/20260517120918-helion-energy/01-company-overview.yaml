company:
  name: "Helion Energy"
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    Helion Energy, founded in 2013 and headquartered in Everett, Washington, is pursuing
    commercialization of magneto-inertial fusion power using a Field-Reversed Configuration (FRC)
    approach aimed at direct electricity generation from deuterium-helium-3 fusion. The company has
    raised over $1 billion across multiple rounds, most recently a $425M Series F in January 2025
    valuing it at $5.425B, and holds the world's first commercial fusion Power Purchase Agreement
    with Microsoft for 50 MW of power by 2028, with construction of its Orion commercial plant
    begun in Malaga, Washington in July 2025.

sections:
  - id: identity-and-business-model
    title: "Identity and Business Model"
    body: >
      Helion Energy, Inc. is a private American fusion energy company incorporated and headquartered
      at 1415 75th St SW, Everett, Washington. Founded in 2013, the company's singular mission is
      to build the world's first commercial fusion power plant, enabling what it describes as
      unlimited clean electricity. The company operates at the late-stage private stage with no
      revenue from operations — its business model is to develop and commercialize fusion power
      generators that sell electricity directly to commercial customers under power purchase
      agreements (PPAs) and eventually to the grid.

      Helion's technology revolves around magneto-inertial fusion (MIF) using a pulsed
      Field-Reversed Configuration (FRC) plasma approach. The system forms two FRC plasmoids,
      accelerates and merges them inside a compression chamber, and recovers electricity directly
      from the resulting magnetic flux change — bypassing the steam-turbine cycle used in
      conventional power plants. Commercial operations are planned to use deuterium-helium-3 (D-He3)
      as fuel, an approach that minimizes neutron emissions and enables efficient direct energy
      conversion. The company's long-term electricity cost target is $0.01 per kilowatt-hour, a
      figure it argues is achievable through low fuel cost, high efficiency, and compact plant design.

      The company's first customer is Microsoft, which in May 2023 signed a 50 MW PPA for power
      delivery beginning in 2028 from a plant being sited in Washington state (construction began
      July 2025 at a site in Malaga, WA). Its second known customer is Nucor Corporation, the
      largest U.S. steel recycler, which in September 2023 agreed to host a 500 MW fusion plant
      at one of its steelmaking facilities, targeting 2030 operations. Constellation Energy serves
      as the power marketer and transmission manager for the Microsoft deal.
    claimRefs: [CO001, CO002, CO003, CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO033]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: founders-and-leadership
    title: "Founders and Leadership Team"
    body: >
      Helion was founded in 2013 by four scientists and engineers: David Kirtley (CEO), Chris Pihl
      (CTO), George Votroubek (Principal Scientist), and John Slough (emeritus co-founder). All four
      share deep backgrounds in plasma physics and fusion device design, with roots in research
      conducted at the University of Washington and national laboratories. The founding team
      represents a rare combination of academic fusion expertise and engineering-first thinking.

      David Kirtley leads the company with a hands-on, iterative engineering philosophy — personally
      involved in testing fusion machines on the floor — and has guided Helion from a small academic
      spinout to a $5.4 billion enterprise over twelve years. Chris Pihl as CTO oversees the
      technical roadmap for the FRC plasma approach and prototype development. George Votroubek
      continues to lead plasma physics research as Principal Scientist.

      The executive team has expanded significantly as commercialization has intensified. Pragav Jain
      joined as CFO in approximately mid-2024 after a role at Waymo (Alphabet), signaling a shift
      toward commercial and financial rigor. Scott Krisiloff serves as Chief Business Officer;
      Sachin Desai as General Counsel; and Savanna Thompson as Chief Business Operations Officer.
      Sam Altman, CEO of OpenAI and Helion's largest individual investor, has served as Executive
      Chairman / Board Chair since 2015 — a relationship that began when Helion was recruited into
      Y Combinator's Summer 2014 cohort under Altman's presidency. Altman previously invested
      $350 million personally in Helion across multiple rounds. The heavy concentration of influence
      in Kirtley (CEO) and Altman (chair) creates key-person risk for both engineering and
      capital-raising continuity.
    claimRefs: [CO003, CO004, CO005, CO006, CO007, CO008, CO009, CO010, CO035]
    tableRefs: [TO002]

  - id: funding-history
    title: "Funding History and Capital Structure"
    body: >
      Helion has raised over $1 billion in cumulative capital across at least seven financing rounds
      since its founding. Early funding included government grants from NASA, the DOE, and DARPA,
      followed by private venture participation through Y Combinator and Mithril Capital in 2014.
      The company's financing trajectory accelerated sharply in the early 2020s as fusion's
      commercial viability became increasingly credible.

      The Series E round in November 2021, totaling $500 million, was notable both for its scale
      and for Sam Altman's direct personal leadership role in organizing the investment. That round
      valued the company at approximately $2.2 billion post-money. The latest disclosed round, a
      Series F in January 2025, raised $425 million from new investors Lightspeed Venture Partners,
      SoftBank Vision Fund 2, and an unnamed major university endowment, alongside existing
      investors Sam Altman, Mithril Capital, Capricorn Investment Group, Dustin Moskovitz through
      Good Ventures Foundation, and Nucor. The Series F was described as oversubscribed and upsized.
      The post-money valuation after the Series F was $5.425 billion, bringing total capital raised
      to more than $1 billion. Nucor's involvement is both strategic (as a future 500 MW customer)
      and financial ($35 million direct investment announced in September 2023).

      The company is pre-revenue; the Series F is intended to fund operations through the targeted
      2028 commercial deployment. Secondary market indicators suggest implied valuations as high as
      $15 billion, but the company-verified post-money figure remains $5.425 billion from the
      January 2025 round.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO036]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: technology-milestones
    title: "Technology Milestones and Prototype Development"
    body: >
      Helion has built and operated seven fusion prototypes since its founding, following a
      rapid-iteration philosophy of building, testing, and learning on compressed timescales. The
      sixth-generation prototype, Trenta, was completed in 2019 and operated nearly daily for
      approximately two years — executing over 10,000 high-power pulses and sustaining vacuum
      operation for 16 months. Trenta made Helion the first private fusion company to achieve a
      bulk ion temperature of 100 million degrees Celsius (9 keV), which is broadly considered the
      commercial threshold plasma temperature. Trenta operations ceased in January 2023.

      The seventh-generation prototype, Polaris, represents a significant engineering advance:
      stronger magnets, pulse rates up to 100x faster than Trenta, and higher-voltage capacitors
      manufactured in-house. Polaris began operating at end of 2024, and in January 2026 became
      the first privately funded fusion machine to demonstrate measurable deuterium-tritium (D-T)
      fusion. In February 2026, Polaris achieved a plasma temperature of 150 million degrees Celsius
      — a new private-sector record and 50% above the commercial threshold. Helion was also the
      first company to receive regulatory approval from the Washington state Department of Health
      to possess and use tritium for fusion energy demonstration purposes.

      Beyond Polaris, Helion is simultaneously developing Orion — its first commercial-scale
      machine — at a site in Malaga, Washington, with construction having begun in July 2025 to
      meet the 2028 Microsoft delivery commitment. Key technical attributes of the commercial
      approach include: pulsed non-ignition (avoiding the engineering complexity of sustained
      ignition), direct electricity recovery via Faraday induction, and deuterium-helium-3 fuel
      cycle for the commercial configuration (helium-3 produced in-house via D-D fusion).
    claimRefs: [CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023, CO024, CO025, CO029]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: adverse-signals
    title: "Adverse Signals and Critical Perspectives"
    body: >
      Helion's aggressive 2028 commercial timeline has attracted sustained skepticism from nuclear
      experts and technical journalists. A May 2023 MIT Technology Review report documented concern
      from multiple nuclear researchers that Helion has not publicly disclosed whether it has crossed
      the most fundamental fusion milestone — generating more energy from fusion reactions than was
      consumed to drive them (physics breakeven or net energy gain). The company acknowledged
      it had not commented on this and would not do so publicly, citing intellectual property
      considerations. Independent academics quoted in MIT Technology Review found a 2028 commercial
      delivery date "very fast" for the fusion sector at large, with some noting that most
      competitors are targeting early-2030s for even limited power demonstrations.

      In July 2024, a Bloomberg investigation drew heightened scrutiny, noting that Helion is
      "particularly tight-lipped" about its progress relative to the 45+ peers who publish scientific
      results and present at conferences. The Bloomberg story also reported allegations of internal
      strife including gender discrimination; Helion disputed these claims, stating an external
      investigator found no evidence of the specific incident described. The company's response
      emphasized its IP protection rationale for limited publishing.

      As of the May 2026 reporting date, Helion has not released data on energy recovery with plasmas
      present, meaning its stated high electricity recovery efficiencies (>95% demonstrated
      without plasma) have not yet been validated in fusion conditions. The technical path from
      the current 150M°C D-T plasma demonstration to sustained net electricity from D-He3 fusion
      remains unproven and represents material execution risk for the 2028 commitment.
    claimRefs: [CO037, CO038, CO039]

