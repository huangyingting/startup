callouts:
  - calloutType: strength
    title: "World's First Commercial Fusion PPA with Binding Penalties"
    body: >
      The May 2023 Microsoft PPA — the world's first commercial fusion power purchase agreement —
      includes financial penalties if Helion fails to deliver. This transforms Helion from a
      pure R&D venture into a company with hard commercial commitments and accountability
      to a marquee counterparty. Constellation Energy's role as power marketer adds
      commercial-grade infrastructure around the delivery.
    claimRefs: [CO026, CO028]

  - calloutType: strength
    title: "Private-Sector Fusion Records: 100M°C and First D-T Fusion"
    body: >
      Helion's 7th-generation Polaris prototype set two private fusion records in early 2026:
      first privately funded D-T fusion demonstration, and a plasma temperature of 150 million
      degrees Celsius. These milestones were validated by external experts including a DOE
      Associate Director for Fusion Energy Sciences and a Sandia National Laboratories alumnus,
      providing meaningful third-party credibility.
    claimRefs: [CO023, CO024, CO025]

  - calloutType: risk
    title: "Net Energy Gain Not Publicly Demonstrated"
    body: >
      As of May 2026, Helion has not publicly disclosed results showing fusion energy output
      exceeds the energy consumed to drive the reaction. The company cites IP protection for its
      lack of publishing. Without a verified physics or engineering breakeven milestone, the 2028
      commercial delivery commitment carries material technical execution risk. Independent
      experts have called the timeline "very fast" for the sector.
    claimRefs: [CO038, CO039]

  - calloutType: risk
    title: "Key-Person Concentration in Kirtley and Altman"
    body: >
      David Kirtley (CEO) is the technical and organizational fulcrum of Helion's engineering
      progress. Sam Altman (Board Chair) is simultaneously the company's largest individual
      investor, strategic anchor, and CEO of a major potential future customer (OpenAI). Loss
      of or distraction from either figure would materially impair fundraising, technical
      execution, or commercial credibility.
    claimRefs: [CO003, CO007, CO009]

  - calloutType: insight
    title: "Nucor Investment Signals Industrial Credibility"
    body: >
      Nucor Corporation — a NYSE-listed industrial giant and North America's largest steel
      recycler — has committed both as a $35 million investor and as the host and anchor customer
      for Helion's 500 MW plant. This dual role (investor and customer) provides unusually strong
      validation of Helion's commercial feasibility from a capital-intensive industrial user.
    claimRefs: [CO027, CO011]

