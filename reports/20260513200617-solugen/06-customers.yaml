  - id: section-4
    title: Retention, Contract Structure, and Durability
    body: >-
      Solugen has disclosed no NRR, GRR, churn, renewal rate, or contract length data as of
      May 2026. The structural characteristics of the industrial specialty chemical market,
      however, provide a reasonable basis for estimating retention dynamics. Specialty
      chemical supply agreements in the industrial water treatment, construction, and
      agricultural sectors typically run one to three years with renewal options, and are
      characterized by high switching friction once a product is qualified. Qualification
      processes for industrial chemicals involve six to eighteen months of performance
      testing, regulatory review, and supply chain integration, creating a structural
      barrier to switching once a buyer adopts a new product. Solugen's drop-in
      substitution positioning — whereby its bio-based products replace petroleum-derived
      chemicals without requiring modification to customer dosing equipment or process
      workflows — lowers upfront adoption friction but does not reduce post-qualification
      switching friction. The energy sector customer base concentrated at the Slaton Texas
      hub suggests multi-year supply relationships given the operational continuity
      requirements of oilfield chemical supply. Municipal wastewater utilities, by contrast,
      are subject to public procurement requirements that may require competitive re-bidding
      at contract renewal, creating slightly lower structural retention compared to private
      industrial buyers. No customer case studies, renewal announcements, or retention
      disclosures are available to substantiate these structural inferences. The cohort
      retention estimates in figure FU004 are structural analogues based on sector norms,
      not company-disclosed data.
