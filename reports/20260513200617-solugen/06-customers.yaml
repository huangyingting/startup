  - id: section-5
    title: Expansion Drivers and Concentration Risks
    body: >-
      Solugen's land-and-expand potential operates at two levels: product line expansion
      within a single customer account (e.g., a wastewater customer that qualifies the
      H2O2 equivalent could subsequently adopt glucaric acid derivatives), and geographic
      expansion as Bioforge Marshall scales and Sasol's distribution network extends reach
      to international markets. The ADM partnership creates a natural expansion vector into
      agricultural chemical buyers through ADM's existing relationships with agribusiness
      customers. The Sasol distribution partnership provides reach into Sasol's European,
      Asian, and African chemical distribution channels that Solugen's direct sales team
      could not efficiently cover independently. Concentration risk is elevated on three
      dimensions. First, Sasol is the sole disclosed distribution partner, meaning channel
      concentration creates supply-chain-level dependency; any deterioration in the Sasol
      relationship would constrain Solugen's reach to direct sales only. Second, ADM is
      the sole disclosed feedstock partner, creating feedstock concentration risk that
      could limit production at Bioforge Marshall if the ADM relationship were disrupted.
      Third, the energy sector customer hub in Slaton Texas represents likely geographic
      concentration in Gulf Coast oil and gas, with no disclosed diversification outside
      that region. Bioforge Marshall's entry into the upper Midwest agricultural and
      wastewater markets represents the primary geographic diversification event, but
      as of May 2026 that facility has not been confirmed operational.
