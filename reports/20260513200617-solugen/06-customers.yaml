  - id: section-6
    title: Adverse Signals and Diligence Gaps
    body: >-
      The most significant adverse signal in the customer evidence base is the complete
      absence of named end-customer proof beyond distribution and feedstock partners.
      Glassdoor employee reviews for Solugen (EI_IE3424745) and Indeed reviews contain
      themes consistent with a growth-stage industrial startup: references to rapid scaling
      challenges, organizational structure evolution, and the pressures of building a first-
      of-kind manufacturing platform. Neither review platform provided direct evidence of
      customer dissatisfaction, failed pilot deployments, or procurement cancellations, but
      the absence of negative customer evidence cannot be treated as positive customer
      evidence — it reflects the private nature of the company's B2B relationships. No
      public procurement records, water utility tender documents, or construction RFQ
      responses naming Solugen as a supplier have been identified. No third-party analyst
      report, market assessment, or industry publication has named Solugen's end-customers
      as of May 2026. The DOE conditional loan guarantee represents the strongest external
      commercial validation because the Loan Programs Office due diligence process typically
      requires commercial commitment evidence from anchor customers, but the terms and
      specific customer commitments reviewed by DOE are not publicly accessible. The
      absence of public customer outcomes, NPS data, or third-party reviews creates an
      evidence gap that is material for investment diligence and should be addressed through
      primary engagement requesting customer references, anonymized cohort data, and
      contract term disclosures.
    claimRefs:
      - CU022
      - CU023
      - CU032
      - CU036
      - CU008
      - CU016
      - CU017
