  - id: section-2
    title: Named Customer and Partner Evidence
    body: >-
      Solugen has publicly disclosed two strategic relationships that constitute the named
      customer and partner evidence base available as of May 2026. The first is Sasol
      Chemicals, a South Africa-headquartered multinational specialty chemical company with
      global distribution networks across industrial chemistry markets. Sasol functions as
      Solugen's primary distribution partner, providing market access to industrial chemical
      buyers across Solugen's target segments. No revenue terms, volume commitments, or
      customer outcomes have been disclosed from the Sasol partnership. The second is
      Archer-Daniels-Midland (ADM), a global food and agricultural processing company
      operating one of the largest corn wet-milling complexes in North America. ADM is both
      Solugen's primary dextrose feedstock supplier at Bioforge Marshall — co-located
      adjacent to the ADM corn complex in Marshall, Minnesota — and a strategic go-to-market
      adjacency given ADM's relationships with agricultural chemical buyers. Bloomberg
      reported in January 2023 that Solugen was building its new bio-chemicals facility in
      Marshall, Minnesota adjacent to the ADM complex, confirming the co-location strategy.
      Beyond Sasol and ADM, no named end-customers have been disclosed. The absence of
      named customers is consistent with standard B2B industrial chemical commercial practice
      for private companies at Solugen's stage, where customer confidentiality is routine and
      investor communications do not require public disclosure of customer names. However,
      this creates a verification gap for investment diligence purposes that requires
      primary engagement with the company to close. The DOE conditional loan guarantee
      required commercial viability review, suggesting the government assessment captured
      customer commitment or letter-of-intent evidence not publicly available.
