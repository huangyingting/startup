acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      Three sources carry paywall or broken accessStatus — Bloomberg (SU018), WSJ (SU026),
      Glassdoor (SU016), Indeed (SU017), AgWeb (SU025), and WaterOnline (SU027). All
      material claims drawn from these sources are independently corroborated by at
      least one open-access primary source. Bloomberg (SU018) confirms the ADM/Marshall
      announcement also covered by Solugen's own blog post (SU004); WSJ (SU026) provides
      market-context corroboration available from ICIS (SU021). Restricted sources are
      used for supplementary corroboration only; no unique material claim depends solely
      on a paywalled or broken source.
  - dimension: unverifiedSource
    reason: >-
      Employee review sources (Glassdoor SU016, Indeed SU017) returned broken links
      at fetch time and could not be verified. These sources are cited for adverse-signal
      completeness only; no specific claim relies on their exact content. The adverse
      dimension is covered by the absence of negative signals rather than the presence
      of confirmed negative content, which is an appropriate characterization for a
      private B2B company with no public customer failure record.
