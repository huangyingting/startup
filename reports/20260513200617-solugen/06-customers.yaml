  - id: FU004
    title: Estimated Customer Retention Cohorts — Structural Sector Analogue
    type: cohort
    layout: standard
    summary: >-
      Estimated year-1 to year-2 retention cohorts for three Solugen customer segment
      types, based on structural analogues from specialty industrial chemical markets.
      No company-disclosed retention data is available; these estimates are sector-norm
      analogues only and should be replaced with company-reported cohort data in primary
      diligence. All values are Year-1 enrollment indexed at 100 with Year-2 estimated
      retention as a percentage of the initial cohort.
    approximationNotes: >-
      All values are structural estimates derived from published specialty chemical market
      research and industry association data on B2B industrial chemical supplier retention.
      No Solugen-specific retention, churn, or renewal data has been publicly disclosed.
      Industrial chemical (80-90% estimated), energy sector (~90%), and municipal wastewater
      (~80%) retention ranges reflect sector-level patterns documented in ICIS and AWWA
      sources and should not be attributed to Solugen specifically.
    data:
      columns:
        - "Year 1 (enrollment)"
        - "Year 2 (estimated renewal)"
      rows:
        - label: "Industrial chemical buyer cohort (estimated)"
          values:
            - 100
            - 85
          note: >-
            Estimated based on typical industrial specialty chemical retention; no
            company-disclosed data available. Structural estimate from ICIS specialty
            chemical market research.
        - label: "Energy sector customers (estimated)"
          values:
            - 100
            - 90
          note: >-
            Estimated; energy sector typically has high retention for qualified chemical
            suppliers due to oilfield operational continuity requirements; Slaton TX hub
            suggests multi-year relationships but no disclosed data.
        - label: "Wastewater treatment buyers (estimated)"
          values:
            - 100
            - 80
          note: >-
            Estimated; municipal procurement typically involves multi-year contracts but
            is subject to competitive re-bidding requirements; budget constraints at
            utilities create slightly lower structural retention vs. private buyers.
    claimRefs:
      - CU010
      - CU012
      - CU016
      - CU017
      - CU020

