    - type: private-evidence-only
      severity: material
      topic: Bioflex-capacity-and-scaling
      missingEvidence: >-
        No public information exists about Bioflex's current enzyme production capacity,
        production economics, or scaling plan for Bioforge Marshall. As the sole disclosed
        internal enzyme supplier, Bioflex is a critical dependency whose capacity and
