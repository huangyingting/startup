    notes: >-
      People and execution risk register covers key-person dependencies, leadership
      gaps, and workforce scaling requirements as of May 2026. Severity and likelihood
      are qualitative assessments. Rows ordered by severity.
    columns:
      - Role / Function
      - Dependency or Gap
      - Likelihood
      - Severity
      - Mitigation
      - Diligence Path
    rows:
      - - CEO — Gaurab Chakrabarti (MD/PhD)
        - Sole public face of company; drives investor relationships, commercial narrative,
            DOE engagement, and strategic vision
        - Low — no public signal of departure or dissatisfaction
        - Critical — departure would trigger investor concern, potential DOE relationship
            disruption, and leadership vacuum
        - Co-founder alignment; equity incentives typical at this stage; strong product mission
        - Confirm retention packages and vesting status; confirm board-level succession
            planning protocol
      - - CTO — Sean Hunt (PhD MIT)
        - Core technical architect of enzymatic chemistry platform; anchors IP credibility
            and product design capability
        - Low — no public signal of departure
        - Critical — technical direction and IP development concentrated in co-founder CTO
        - Co-founder alignment; technical organization likely built around CTO's leadership
        - Confirm CTO retention packages; confirm depth of technical team below CTO level
      - - VP/Director Engineering — Bioforge Marshall construction and commissioning
        - Senior engineering leadership required to execute 500,000 sf facility buildout
        - Unknown — no senior engineering hires disclosed publicly
        - High — without experienced chemical plant engineering leadership, construction
            risk increases materially
        - Gap — no disclosed senior engineering hire for Marshall commissioning
        - Request Solugen org chart; confirm construction project management lead and
            engineering leadership depth
      - - Biochemical engineer and enzyme designer workforce
        - Specialized technical staff for enzyme design, Bioflex operations, and Bioforge
            process optimization
        - Medium — competitive market for PhD-level biochemical talent
        - High — attrition of specialized enzyme engineers would constrain product development
            and quality
        - Competitive equity and technical mission attract talent; DOE loan validation
            provides stability signal
        - Confirm headcount trajectory and voluntary attrition rate; review any disclosed
            equity program
      - - Environmental, Health & Safety (EHS) compliance team
        - EHS staff required for TCEQ, MN PCA, and OSHA compliance at both facilities
        - Unknown — EHS team composition not publicly disclosed
        - Medium — non-compliance due to understaffed EHS could trigger regulatory action
        - Standard industrial chemical operator requirements; GAP if EHS team not yet
            scaled for Marshall
        - Request EHS team headcount and certification levels; confirm MN PCA permit
            application lead
      - - Board governance — independent directors
        - No independent non-executive director publicly identified on Solugen's board
        - Unknown — board composition not publicly disclosed
        - Medium — governance gap at $640M+ funding stage increases oversight risk
        - Series D lead investor likely has board representation; governance standard
            for LPO loan requirements
        - Request board composition; confirm LPO governance requirements; confirm
            independent director presence
    claimRefs:
      - CR041
      - CR042
      - CR043
      - CR044
      - CR029

  - id: TR005
    title: Mitigation and Kill Criteria Table
    notes: >-
      Kill criteria define thesis-breaking events that would materially change investment
      risk assessment. Monitorable triggers are observable signals that can be tracked
      through public disclosures, primary engagement, or industry monitoring.
      Action implications reflect portfolio management decisions at each threshold.
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - Bioforge Marshall construction failure / indefinite delay
        - Company press release, DOE status update, or absence of Marshall startup
            announcement beyond Q2 2026
        - Marshall production start not confirmed by Q3 2026 (one year past original target)
        - Thesis break — revenue inflection assumption fails; require revised construction
            timeline and capital plan before further commitment
      - - DOE loan guarantee withdrawn or indefinitely delayed
        - No DOE loan close announcement by Q4 2026; regulatory or political disruption
            to DOE LPO program
        - Conditional commitment expires or is publicly rescinded
        - High urgency — require immediate disclosure of alternative financing plan; assess
            dilution risk from emergency equity raise
      - - ADM supply disruption or contract termination
        - ADM press release, supply disruption news, or Solugen statement about feedstock
            alternatives
        - ADM terminates or suspends dextrose supply agreement for Marshall
        - Thesis break for Marshall operations — require alternative feedstock plan;
            assess whether Houston can maintain commercial operations independently
      - - Key founder departure (CEO or CTO)
        - Company announcement, LinkedIn update, or press coverage of leadership change
        - Gaurab Chakrabarti or Sean Hunt departs Solugen
        - Material adverse signal — require board and investor explanation of succession
            plan; monitor DOE and investor relationship continuity
      - - Petroleum price sustained below $40/barrel
        - EIA crude oil price data; Bloomberg commodity indices
        - WTI crude below $40/barrel sustained for 6+ months
        - Increased competitive risk — require updated cost-parity analysis for Solugen
            products vs. petroleum-derived alternatives; assess margin impact
      - - Regulatory enforcement action or permit denial
        - TCEQ, MN PCA, or EPA enforcement records; EPA ECHO database
        - Any formal enforcement action, consent order, or permit denial at Houston or
            Marshall
        - High severity — require explanation and remediation plan; assess timeline
            impact on Marshall construction and operations
      - - Major competitor successfully commercializes enzymatic glucaric acid alternative
        - Patent filings, product announcements, trade press in Chemical Engineering,
            ICIS, C&EN
        - Named incumbent (Evonik, Solvay, BASF) or bio-based competitor announces
            commercial-scale enzymatic glucaric acid production
        - Competitive moat reassessment required — evaluate IP position and cost
            competitiveness; update TAM and market share assumptions
    claimRefs:
      - CR001
      - CR002
      - CR017
      - CR018
      - CR024
      - CR031
      - CR033
      - CR036
      - CR037
      - CR041

