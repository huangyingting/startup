  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: DOE-loan-conditions
      missingEvidence: >-
        The specific legal, technical, financial, and environmental conditions of the
        DOE $213.6M conditional commitment are not publicly disclosed. The DOE LPO
        announced the conditional commitment in June 2024 but did not publish the
        condition checklist or timeline for loan closing. Primary engagement with Solugen
        and the DOE LPO is required to assess compliance status and closing timeline.
      relatedQuestionRefs:
        - QR003
        - QR002

    - type: missing-source
      severity: material
      topic: TCEQ-MN-PCA-permit-records
      missingEvidence: >-
        Specific TCEQ permit records for the Houston Bioforge and MN PCA permit
        applications for Bioforge Marshall were not found in publicly searchable
        state permit databases as of May 2026. This reflects search limitations
        (TCEQ STEERS database requires specific facility identifiers) rather than
        certain permit absence. The TR001 regulatory risk register reflects partial
        coverage of the regulatory obligation set. Primary engagement to obtain permit
        numbers and permit condition summaries is required.
      relatedTableRefs:
        - TR001
      relatedQuestionRefs:
        - QR004
        - QR005
        - QR032

    - type: missing-source
      severity: material
      topic: Kennivik-investor-identity
      missingEvidence: >-
        No publicly accessible information about Kennivik — the Series D lead investor —
        has been identified in SEC EDGAR (Regulation D filings), Crunchbase, PitchBook,
        LinkedIn, or any news source. Kennivik's ownership, fund size, investment
        strategy, and capacity for follow-on investment cannot be assessed from
        public sources.
      relatedQuestionRefs:
