  - id: section-6
    title: Partner and Dependency Risks
    body: >-
      Solugen's partner and dependency risk profile is concentrated in four relationships:
      ADM (feedstock supply), DOE LPO (financing), Sasol Chemicals (distribution), and
      Bioflex (internal enzyme production). The ADM dependency is the highest-severity
      single-party dependency: co-location at the Marshall corn complex provides cost
      and logistics advantages but eliminates geographic diversification of feedstock
      supply. The ADM supply agreement terms — including pricing, volume commitments,
      duration, and termination rights — are not publicly disclosed, making it impossible
      to assess the contractual protection Solugen has against supply disruption or
      price renegotiation. The DOE LPO represents an institutional dependency that is
      unprecedented for a chemical scale-up: the conditional $213.6M commitment subjects
      Solugen's financing timeline to the LPO's approval process, which has historically
      taken 12-24+ months from conditional commitment to loan closing. Political shifts
      in DOE priorities, budget constraints, or staff changes at the LPO could affect
      the pace of loan finalization. The Sasol distribution partnership is structurally
      beneficial but creates a channel concentration risk: Sasol is the sole publicly
      disclosed distribution partner, meaning Solugen's go-to-market reach in certain
      segments depends on Sasol's execution. If the Sasol relationship deteriorates or
      Sasol deprioritizes Solugen's products, Solugen would need to build or activate
      alternative distribution channels. Bioflex, Solugen's internal enzyme production
      unit, is a dependency with limited public information — its capacity, operational
      status, and ability to scale alongside Marshall are unknown from public sources.
      Any bottleneck in enzyme production would directly constrain Bioforge capacity
      and productivity. Kennivik, the Series D lead investor, represents an unusual
      financial dependency: no public information about Kennivik's ownership, fund size,
      or investment thesis has been identified, making it difficult to assess whether
      this investor can provide follow-on capital or support in a financing shortfall.
