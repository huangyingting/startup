    - type: private-evidence-only
      severity: material
      topic: ADM-supply-agreement-terms
      missingEvidence: >-
        The specific terms of the ADM dextrose supply agreement for Bioforge Marshall —
        including pricing mechanism, volume commitments, duration, and termination rights
        — are not publicly disclosed. Without these terms, concentration risk cannot be
        fully quantified and force majeure protections cannot be assessed.
      relatedQuestionRefs:
