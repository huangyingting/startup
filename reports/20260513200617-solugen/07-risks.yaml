acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      Bloomberg (SR014) and CBInsights (SR027) carry paywall or restricted accessStatus.
      All material claims drawing on these sources are independently corroborated by
      open-access primary sources: Bloomberg's Series C coverage is corroborated by
      Axios (SR025) and GlobeNewswire (SR028); CBInsights valuation and funding history
      is corroborated by Solugen's own blog (SR003) and Wikipedia (SR029). Paywalled
      sources are used for supplementary context only; no unique material risk claim
      depends solely on a restricted source.
  - dimension: unverifiedSource
    reason: >-
      Employee review sources Glassdoor (SR024) and Indeed (SR023) returned broken links
      at fetch time and could not be verified. These sources are cited only to document
      the absence of accessible adverse employee signals; no specific claim relies on
      their content. People-risk assessment is grounded in structural inference from
      company size, technical talent market dynamics, and headcount scaling requirements,
      not on unverifiable employee review content.
