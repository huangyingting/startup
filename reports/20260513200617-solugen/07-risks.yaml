  - id: section-2
    title: Regulatory, Legal, and Environmental Risks
    body: >-
      Solugen operates under multiple overlapping regulatory frameworks across two states
      and several federal agencies. In Texas, the Texas Commission on Environmental Quality
      (TCEQ) is the primary permitting authority for air quality, water quality, and industrial
      waste management at the Houston Bioforge. TCEQ regulates air emission sources, wastewater
      discharges, and solid/hazardous waste handling under authority delegated by the EPA.
      Industrial chemical facilities in Texas with air emission sources above threshold levels
      require preconstruction permits, operating permits (Title V if major source), and must
      comply with Texas emission standards. No specific TCEQ permit records for Solugen's
      Houston facility have been identified in publicly accessible TCEQ permit databases as
      of May 2026; this represents a diligence gap rather than a permit absence, since
      TCEQ database searchability by company name is limited and permit records may be
      filed under the facility's legal entity name. In Minnesota, the Minnesota Pollution
      Control Agency (MN PCA) is the equivalent authority for Bioforge Marshall. Large
      industrial facilities in Minnesota typically require air quality permits (potentially
      a major source Title V if emission thresholds are exceeded), water pollution control
      permits, and environmental review under Minnesota Environmental Policy Act (MEPA).
      The DOE LPO's conditional commitment requires that Solugen meet DOE's legal, technical,
      financial, and environmental requirements before loan drawdown — creating a regulatory
      compliance dependency directly tied to the primary financing instrument for Marshall.
      At the federal level, EPA's Toxic Substances Control Act (TSCA) governs new chemical
      substances and significant new uses; Solugen's glucaric acid derivatives and enzymatic
      process outputs must be consistent with TSCA compliance. OSHA Process Safety Management
      (PSM) standards may apply if hydrogen peroxide concentrations at any facility exceed
      PSM threshold quantities. EPA's Green Chemistry Challenge Award (2023) provides
      regulatory goodwill but not compliance assurance. IRA Section 45Z clean fuels production
      credit and DOE bioenergy programs represent potential regulatory benefit but are
      contingent on policy continuity under changing political environments. Patent portfolio
      risks include the possibility that core enzymatic oxidation patents could be challenged
      by competitors seeking freedom-to-operate in the glucaric acid or enzymatic peroxide
      production space; the Google Patents database shows patents assigned to Solugen,
      confirming active IP protection, but freedom-to-operate analyses by competitors
      are not publicly disclosed.
