tables:
  - id: TR001
    title: Regulatory / Legal Risk Register
    notes: >-
      Risk register covers known regulatory and legal obligations across federal and
      state jurisdictions as of May 2026. Status assessments are based on public-source
      research only; specific permit numbers, application filings, or DOE loan condition
      compliance have not been independently verified. Severity and likelihood ratings
      are qualitative assessments; rows are ordered by severity (high → low).
      This is an enumeration table: regulatory and legal obligations are partially
      enumerable from public sources but permit-specific filings are not publicly searchable
      by company name with sufficient granularity to achieve exhaustive coverage.
    columns:
      - Rule / License / Case
      - Jurisdiction
      - Status
      - Likelihood
      - Severity
      - Mitigation
      - Residual Exposure
      - Diligence Path
    rows:
      - - DOE LPO Conditional Loan Guarantee ($213.6M) — legal, technical, financial,
            environmental conditions
        - Federal (DOE)
        - Conditional commitment issued June 2024; not yet finalized as of May 2026
        - High — conditions must be met before drawdown
        - Critical — Marshall financing depends on this; delay or withdrawal blocks construction
        - DOE due diligence reflects prior government validation; conditions likely standard
            for LPO project finance
        - Loan finalization delay or condition failure would force bridge financing or
            equity dilution
        - Obtain DOE condition checklist; confirm legal close timeline; verify environmental
            review status
      - - TCEQ Air Quality and Operating Permit — Houston Bioforge (Title V if major source)
        - State (Texas — TCEQ)
        - Presumed obtained for operational facility; specific permit not identified in
            public TCEQ database
        - Medium — operational facility implies permit compliance; gap is verification
        - High — permit violation would trigger enforcement; facility shutdown possible
        - EPA Green Chemistry Award implies regulatory good standing; operational facility
            implies compliance
        - Cannot confirm permit status or conditions without TCEQ permit database search
            or company disclosure
        - Request TCEQ permit number from Solugen; verify via TCEQ STEERS online database
      - - MN PCA Air Quality and Environmental Permit — Bioforge Marshall
        - State (Minnesota — MN PCA)
        - Not yet obtained (facility under construction); permit application status unknown
        - High — required before Marshall operations can begin
        - High — permit delay would push production start; conditions may require design changes
        - Co-location with ADM provides precedent site experience; standard industrial permit process
        - No permit in hand for greenfield facility; application status and conditions unknown
        - Confirm MN PCA permit application status; request permit condition summary from Solugen
      - - EPA Toxic Substances Control Act (TSCA) — New Chemical / Significant New Use
        - Federal (EPA)
        - Glucaric acid and derivatives appear on TSCA inventory; no PMN filing identified publicly
        - Medium — existing chemical pathways reduce TSCA filing burden; novel outputs may trigger review
        - Medium — delay in TSCA clearance could constrain commercialization of new product lines
        - EPA Green Chemistry Award indicates regulatory engagement; bio-based processes
            typically face lighter TSCA burden
        - Novel enzyme-derived chemical products or significant new uses could trigger
            PMN or SNUR filings
        - Confirm TSCA inventory status of all Solugen product lines; identify any pending
            PMN or SNUR filings
      - - OSHA PSM — Hydrogen Peroxide Concentration Threshold
        - Federal (OSHA)
        - OSHA PSM applies if H2O2 at ≥52% concentration exceeds 7,500 lb threshold
        - Low–Medium — Solugen's enzymatic process produces dilute H2O2; PSM threshold
            may not be met
        - Medium — PSM non-compliance creates safety and enforcement risk; OSHA citation
            carries fines and shutdown risk
        - Bio-based dilute H2O2 production is designed to avoid concentrated H2O2 risk;
            enzymatic chemistry inherently safer
        - If process modifications concentrate H2O2 above PSM threshold, full PSM compliance
            program required
        - Confirm H2O2 concentration levels at Houston and Marshall; verify OSHA PSM
            applicability
      - - IRA Section 45Z Clean Fuels Production Credit — Policy Risk
        - Federal (IRS / DOE)
        - IRA enacted 2022; 45Z credit in effect 2025–2027; bio-based chemical eligibility
            is indirect
        - Low–Medium — direct applicability to Solugen's industrial chemicals depends
            on product qualification
        - Low — financial upside if qualified; limited downside risk if not applicable
        - DOE bioenergy technology office engagement provides pathway awareness
        - Policy reversal or credit phase-out would eliminate a potential financial tailwind
        - Confirm whether any Solugen product lines qualify for 45Z or related DOE
            bioenergy credits
      - - Patent Portfolio — Freedom to Operate / Competitor Challenge Risk
        - Federal (USPTO)
        - Solugen patents confirmed active via Google Patents; no patent litigation
            identified in public sources
        - Low–Medium — glucaric acid enzymatic oxidation is a relatively nascent patent
            space; competition may emerge
        - Medium — successful patent challenge on core enzymatic processes could impair
            competitive moat
        - First-mover patent portfolio provides defensive position; academic publications
            support prior art
        - Competitor patent applications in adjacent enzymatic chemistry space could
            create FTO risk for future products
        - Review USPTO patent landscape for Solugen-adjacent enzymatic oxidation claims;
            confirm no pending IPR proceedings
    enumerationScope:
      coverage: partial
      basis: >-
        Regulatory obligations identified through EPA, OSHA, TCEQ, MN PCA, DOE LPO,
        SEC EDGAR, and Google Patents public sources. TCEQ and MN PCA permit-specific
        records for Solugen facilities were not found in publicly searchable databases
