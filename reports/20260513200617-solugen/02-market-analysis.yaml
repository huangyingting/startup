  - id: section-3
    title: Buyer and Segment Analysis
    body: >-
      Solugen serves a diverse set of industrial buyers across its seven-plus target market
      segments, each with distinct procurement structures, qualification requirements, and
      switching costs. In wastewater treatment, primary buyers are municipal water authorities
      and industrial facility operators who purchase treatment chemicals through procurement
      departments under environmental compliance mandates. Demand is non-discretionary: EPA
      effluent standards and state environmental regulations require continuous chemical dosing
      for permit compliance, making this one of the most stable customer segments. Construction
      companies — particularly concrete manufacturers and specialty contractors — buy chemical
      admixtures through materials procurement, with adoption increasingly triggered by green
      building certification requirements such as LEED or BREEAM. Agricultural operators purchase
      specialty chemicals through dealers and cooperatives, with budget decisions made at the
      farm-operator or cooperative level. Oil and gas operators use chemicals for water injection,
      corrosion inhibition, and scale control in wells and pipelines, with procurement typically
      handled by field operations and engineering teams managing well-operating expenses.
      Budget ownership for all these verticals sits with procurement and operations departments
      rather than end consumers, confirming Solugen's sales model is pure B2B. A critical
      adoption pattern: industrial buyers in wastewater and energy typically require 12–24 months
      of supplier qualification testing before switching from established vendors, creating a
      natural lag between commercial engagement and revenue recognition. The payer in each case
      is the purchasing organization itself, funded through operating budgets or capital budgets
      depending on whether the chemical is a consumable or part of a process-plant upgrade.
    claimRefs:
