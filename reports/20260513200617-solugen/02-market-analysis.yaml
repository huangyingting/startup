acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      Fourteen of thirty sources have restricted or broken access status (paywall, js-only,
      broken, or 404). All material market sizing claims are corroborated by at least one
      accessible source (EPA, DOE, IBISWorld, WaterWorld, Construction Dive, OGJ, Solugen
      official pages). Restricted sources serve as supplementary references; no unique
      quantitative claim depends solely on a paywalled source without an accessible
      corroborating source.
  - dimension: paywallRisk
    reason: >-
      Nine of thirty sources are paywalled (Grand View Research, MarketsandMarkets, Fortune
      Business Insights, Precedence Research, IEA, ICIS, Statista, S&P Global, Mordor
      Intelligence). This is expected for the analyst-market-data source type which is
      predominantly subscription-gated. All market sizing claims are categorized as estimated
      with low confidence and are cross-referenced against at least one accessible source.
      No high-confidence claim relies solely on a paywalled source.
