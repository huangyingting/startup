  evidenceGaps:
    - type: missing-source
      severity: material
      topic: market-size
      missingEvidence: >-
        Independent, subscription-accessible analyst report providing granular SAM breakdown
        for Solugen's specific product categories (H2O2 substitutes, glucaric acid) in North
        America across wastewater, construction, agriculture, and energy verticals.
      whyItMatters: >-
        All major bio-based chemicals analyst reports are paywalled or return 404 errors,
        preventing independent validation of the $12B North American SAM estimate. This gap
        means the SAM figure is derived from synthesized headlines rather than verified
        sub-segment data.
      diligencePath: >-
        Obtain direct subscriptions to Grand View Research, MarketsandMarkets, or IBISWorld
        specialty chemicals sub-reports for wastewater treatment chemicals, construction
        chemicals, and agricultural specialty chemicals separately.
      relatedQuestionRefs:
        - QM004
        - QM005
      relatedTableRefs:
        - TM002
    - type: private-evidence-only
      severity: material
      topic: revenue
      missingEvidence: >-
        Solugen's actual revenue, gross margin, customer count, and utilization rate at the
        Houston Bioforge to validate commercial traction against the stated TAM/SAM.
      whyItMatters: >-
        Without revenue data, it is impossible to verify that the market opportunity is being
        captured at the pace implied by the company's expansion plans and Bioforge Marshall
        capital investment.
      diligencePath: >-
        Request audited financial statements, customer roster (even anonymized), and
        utilization metrics directly from Solugen management during due diligence.
      relatedQuestionRefs:
        - QM019
    - type: missing-source
      severity: minor
      topic: construction-chemicals
      missingEvidence: >-
        Current 2025–2026 market data for global construction chemicals specifically, including
        bio-based admixtures penetration rate.
      whyItMatters: >-
        Construction is one of Solugen's stated target markets; without current size data,
        the segment contribution to SAM is an older estimate that may have shifted with
        post-COVID construction trends.
      diligencePath: >-
        Search for post-2024 construction chemicals market reports from IBISWorld, Mordor
        Intelligence, or The Freedonia Group.
      relatedQuestionRefs:
        - QM025
      relatedTableRefs:
        - TM001
    - type: enumeration-incomplete
      severity: minor
      topic: regulatory-drivers
      missingEvidence: >-
        Complete enumeration of all federal, state, and sector-specific regulations that
        mandate or incentivize bio-based chemical procurement across Solugen's target markets.
      whyItMatters: >-
        The regulatory tailwind narrative depends on multiple overlapping incentives; a
        complete enumeration would allow prioritization of which regulations most directly
        accelerate Solugen's commercial opportunities.
      diligencePath: >-
        Commission a regulatory landscape review covering EPA effluent standards, IRA Section
        45Z details, state green procurement mandates, and agricultural chemical registration
        requirements by state.
      relatedQuestionRefs:
        - QM026
      relatedTableRefs:
        - TM004
    - type: private-evidence-only
      severity: minor
      topic: justice40
      missingEvidence: >-
        Specific federal program eligibility documentation and contract opportunity details
        confirming Solugen's Justice40 market access advantage for Bioforge Marshall.
      whyItMatters: >-
        The Justice40 tailwind is currently an inferred benefit; without documentation of
        program eligibility and contract award data, it cannot be valued as a market access
