  - id: TP003
    title: Pricing / Packaging Comparison
    notes: >-
      Industrial H2O2 pricing ranges are indicative estimates based on public commodity references
      and industry literature; actual contract prices are confidential. Solugen pricing is not
      publicly disclosed. All values are for bulk industrial-grade product and approximate as of
      May 2026.
    columns:
      - Competitor
      - Price / Unit / Contract Model
      - Included Capabilities
      - Discount / Unknowns
      - Implication for Solugen
    rows:
      - - Solugen
        - "Not disclosed; claims cost parity with petroleum chemistry at commercial scale"
        - Bio-based H2O2 and oxidized intermediates; wastewater, construction, agriculture
        - Pricing entirely undisclosed; no third-party verification of cost parity available
        - Solugen must demonstrate cost parity independently; lack of disclosure is diligence gap
      - - "Evonik / Solvay (H2O2)"
        - "Commodity index-linked; bulk industrial grades approximately $0.30–$0.80/kg depending on concentration and contract"
        - Multiple concentration grades (30%, 50%, 70%); bulk delivery; application support
        - Volume discounts for long-term supply agreements; spot market exposure to oil prices
        - Solugen must match or undercut this price band at scale to win volume from incumbents
      - - "Kemira (H2O2 for water treatment)"
        - "Contract pricing with utilities and paper mills; bundled with technical service"
        - H2O2 product plus on-site dosing systems; process optimization service; monitoring
        - Long-term supply contracts with bundled services create high switching cost barriers
        - Application bundling makes pure product substitution harder; Solugen needs service parity
      - - "Genomatica (Bio-BDO)"
        - "Not publicly disclosed; targets bio-based premium pricing tier for polymer customers"
        - Bio-BDO certified bio-based; ISCC+ certification for value-chain traceability
        - Bio-premium pricing model; not directly comparable to H2O2 commodity markets
        - Genomatica's bio-premium model may not transfer to Solugen's cost-parity strategy
      - - "Status quo (conventional H2O2)"
        - "Anthraquinone process; $0.30–$0.60/kg bulk depending on scale and location"
        - No bio-based certification; no sustainability reporting value; no ESG benefit
        - Petroleum feedstock volatility creates price floor uncertainty in low-oil environments
        - Solugen's cost-parity claim must hold across oil price cycles, not just at spot prices
  - id: TP004
    title: Moat Durability / Competitive Risk Register
    notes: >-
      Severity ratings (Low / Medium / High) are qualitative assessments based on publicly available
      evidence and competitive landscape analysis as of May 2026. No independent validation of moat
      claims has been performed; diligence asks represent recommended verification steps.
    columns:
      - Moat Claim
      - Threat
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - Proprietary cell-free enzymatic platform with IP protection
        - Novozymes, BASF, or Evonik enzyme divisions develop competing cell-free enzymes or design around patents
        - Medium
        - Conduct patent landscape analysis; assess claim breadth, expiry timeline, freedom-to-operate coverage
      - - "95%+ integrated product yield vs. ~70–80% for fermentation"
        - Incumbent fermentation companies improve yields via directed evolution or metabolic engineering
        - Low-Medium
        - Request third-party yield verification at Houston Bioforge; confirm no undisclosed process losses
      - - Room-temperature no-hazardous-waste process enabling faster permitting
        - Regulatory changes reduce permitting advantage; incumbents adopt cleaner processes over time
        - Low
        - Verify permit timelines for Bioforge Marshall vs. comparable chemical plant; confirm EPA status
      - - Cost parity with petroleum chemistry at commercial scale
        - Oil price drop widens cost gap; ADM dextrose price volatility compresses margins
        - High
        - Obtain independent cost audit; model sensitivity to corn/dextrose price; disclose full COGS structure
      - - ADM partnership as secured low-cost dextrose feedstock supply
        - ADM is sole disclosed feedstock supplier; price renegotiation or supply disruption risk
        - Medium
        - Review ADM contract terms; confirm pricing lock-in duration; assess secondary feedstock sources
      - - Single facility risk at Houston Bioforge
        - Plant outage, accident, or force majeure leaves customers without supply
        - High
        - Confirm business continuity insurance; customer contract force majeure terms; Marshall timeline
