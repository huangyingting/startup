  - id: section-4
    title: Adjacent Competitors — Water Treatment and Industrial Process Chemicals
    body: >-
      Kemira is a Finnish specialty chemicals company that manufactures and supplies hydrogen
      peroxide specifically for pulp and paper bleaching, water treatment, and other industrial
      applications, directly competing with Solugen in the wastewater and industrial water treatment
      segments. Kemira's competitive strength lies in deep application expertise in water treatment,
      established customer relationships at paper mills and municipal water treatment facilities,
      and a global supply chain backed by large production facilities. Kemira additionally offers
      bundled technical services — including real-time monitoring, process control, and dosing
      system optimization — that create switching cost barriers beyond the product itself. Solenis
      is a water-intensive industrial chemicals company serving pulp and paper, oil and gas, and
      food and beverage sectors with process chemicals including oxidants, scale inhibitors, and
      specialty biocides, competing in Solugen's wastewater and industrial water treatment segments.
      Nouryon, in addition to commodity H2O2 production, offers specialty chemicals for water
      treatment and construction that overlap with Solugen's target verticals. Cargill operates
      bio-industrial products programs that include bio-based agricultural derivatives but has not
      disclosed a downstream bio-based oxidant chemistry development program that would directly
      compete with Solugen. The status quo competitive force — petroleum-derived synthesis routes
      including anthraquinone H2O2, Fenton chemistry, and chlorine-based oxidants — represents
      the default competitive alternative for any Solugen customer that does not adopt the
      Bioforge-supplied product. In the construction vertical, BASF and Dow supply concrete
      admixtures and corrosion inhibitors that compete with Solugen's glucaric acid-derived
      construction chemistry. Verdezyne, a bio-based diacid startup, appears inactive as of May
      2026 based on minimal web presence, removing one potential future direct competitor in
      bio-based chemical intermediates.
