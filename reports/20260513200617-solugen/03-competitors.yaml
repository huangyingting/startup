  - id: section-7
    title: Evidence Gaps and Diligence Priorities
    body: >-
      Three material diligence gaps limit the ability to fully assess Solugen's competitive
      position. First, no independent third-party cost benchmarking comparing Solugen's bio-based
      H2O2 production cost per kilogram to anthraquinone-process H2O2 from Evonik or Solvay at
      industrial grade is publicly available, making cost-parity claims unverifiable. Second, the
      patent landscape covering Solugen's cell-free enzymatic oxidation platform — including claim
      breadth, expiry timelines, and potential design-around risk from Novozymes, BASF, or Evonik
      enzyme divisions — has not been disclosed in a format enabling independent analysis. Third,
      no strategic response from incumbent H2O2 producers (Evonik, Solvay, Kemira) regarding
      bio-based substitution has been publicly disclosed, leaving open the question of whether any
      major player has an active internal bio-based H2O2 development program or acquisition
      strategy targeting Solugen-like technologies. Minor gaps include lack of global H2O2 market
      share disaggregation by producer and end market, absence of disclosed Kemira production
      capacity for competitive sizing, and no public confirmation that Solugen holds bio-based
      content certifications (USDA BioPreferred, ISCC+) that would create compliance-based
      switching costs. Additionally, the global H2O2 market share distribution among the top
      producers — Evonik, Solvay, Nouryon, Kemira, Arkema — has not been disaggregated by
      geography or end market in publicly accessible sources reviewed during this research,
      preventing precise competitor market share analysis and limiting the ability to quantify
      which incumbents hold the largest share in Solugen's primary target markets.
