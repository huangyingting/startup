  - id: section-2
    title: Incumbent Chemical Producers — Hydrogen Peroxide and Specialty Oxidants
    body: >-
      The global hydrogen peroxide market is dominated by established chemical conglomerates
      producing H2O2 via the anthraquinone oxidation (AO) process — an energy-intensive multi-step
      catalytic cycle that requires hydrogen gas from fossil sources, organic solvents, and
      high-pressure processing equipment. Evonik Industries is among the world's largest H2O2
      producers; the company is active in more than 100 countries and generated €14.1B in group
      sales and €1.9B in adjusted EBITDA in 2025. Solvay, which traces its heritage to Ernest
      Solvay's soda ash innovations in 1863, reported €4.7B in underlying net sales in 2024 and
      has committed to carbon neutrality by 2050. Nouryon, formerly the specialty chemicals
      division of AkzoNobel, is a major global H2O2 supplier serving industrial, water treatment,
      and construction markets. Arkema manufactures specialty peroxides. BASF and Dow produce
      industrial chemicals including oxidants and serve overlapping markets. These incumbents'
      core advantages are scale-driven: production costs benefit from decades of process
      optimization; logistics networks connect to multiple customer sites via long-term supply
      agreements; and technical service teams are deeply embedded in procurement processes at
      wastewater utilities, paper mills, and chemical intermediaries. For Solugen to displace
      incumbents in these verticals, it must offer a product meeting the same performance
      specifications at equivalent or lower cost, backed by sufficient production capacity for
      supply reliability. The incumbents' primary vulnerabilities are their petroleum and
      fossil-energy dependence, creating regulatory risk under tightening carbon pricing regimes,
      and reputational risk under corporate ESG Scope 3 procurement mandates. Both Evonik and
      Solvay have stated sustainability programs that include bio-based chemistry exploration,
      potentially signaling latent interest in acquiring bio-based H2O2 technologies.
    claimRefs:
      - CP006
