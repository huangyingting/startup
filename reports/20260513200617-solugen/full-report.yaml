            body: >-
              Solugen's near-term technology roadmap centers on three workstreams. First, the commercial launch of
              Bioforge Marshall, which — if completed as planned — would represent a roughly 50-fold increase in
              manufacturing footprint over Houston and would unlock the first large-scale demonstration of the Bioforge
