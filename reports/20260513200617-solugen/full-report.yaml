      - number: '8.2'
        title: Recommendation, Confidence, and Risk Rating
        blocks:
          - type: paragraph
            body: >-
              The recommendation is Research-More / Track. This is a conditional stance: Solugen's technology proof at
              Houston scale, institutional investor quality, and DOE validation are genuine differentiators in the
              climate tech industrial space, but committing capital without primary management engagement would mean
              underwriting an opaque private valuation with insufficient verification of the most critical near-term
              milestones. The confidence level is medium overall — high on technology demonstrated at Houston scale,
              medium on investor quality and DOE commitment credibility, and low on Marshall execution timeline, Series
              D valuation, and commercial financial traction. The risk rating is high, anchored by three structural
              vulnerabilities: Marshall scale-up execution risk (50x unproven scale expansion, fall 2025 target
              slipped), DOE conditionality risk (the $213.6M commitment remains conditional and unfunded with
              undisclosed open conditions), and valuation opacity risk (Series D terms unverified, Kennivik identity
              undisclosed, revenue and margin absent from public disclosures). The Amyris precedent — peak valuation of
              approximately $4B followed by Chapter 11 bankruptcy in 2023 — is directly applicable and must be held in
              mind throughout diligence. Key positive signals that would upgrade the stance to a conditional buy
              include: (1) confirmed Marshall construction completion and commercial production start; (2) DOE loan
              finalization announcement; (3) primary engagement confirming Series D terms, Kennivik institutional
              identity, and a credible cap table; and (4) at least directional revenue and gross margin data under NDA.
              The Investment KPIs scorecard captures the dimension-level assessment: market opportunity scores 7/10
              (large, secular), technology proof scores 7/10 (commercial at Houston, unproven at Marshall), financing
              resilience scores 6/10 (strong capital but DOE conditionality), risk profile scores 3/10 (high execution
              and opacity risk), and valuation support scores 3/10 (insufficient public data to price the round).
