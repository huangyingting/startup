        title: Customer Segments and Market Coverage
        blocks:
          - type: paragraph
            body: >-
              Solugen targets five primary industrial chemical customer segments with its bio-based product portfolio
              derived from the Bioforge enzymatic process. The first and largest disclosed segment is wastewater
              treatment — both municipal utilities and industrial plants that require oxidizing agents (bio-based
              hydrogen peroxide equivalents) and chelating agents (glucaric acid derivatives) for scale inhibition,
              contaminant removal, and corrosion control. The American Water Works Association (AWWA) and Water
              Environment Federation (WEF) represent the primary professional associations for these buyers, which
              include tens of thousands of municipal utilities and industrial facilities across North America. The
              second segment is construction chemistry, where glucaric acid derivatives function as concrete admixtures,
              scale inhibitors, and corrosion inhibitors for infrastructure projects; buyers include cement producers
              and specialty construction chemical formulators represented by the Associated General Contractors (AGC)
              and Portland Cement Association (PCA). The third segment is agriculture, where bio-based chelating agents
              improve micronutrient bioavailability in fertilizers; buyers are agrochemical companies and precision
              nutrition formulators regulated by USDA AMS. The fourth segment is the oil and gas energy sector, served
              primarily through the Slaton Texas distribution hub; buyers include oilfield service companies and E&P
              operators who use scale inhibitors and water treatment chemicals represented by API member companies. The
              fifth and emerging segment is broad ESG-driven industrial procurement, where Solugen's bio-based products
              enable corporate Scope 3 emission reductions across multiple verticals. Solugen publicly states it serves
              seven or more distinct markets, suggesting additional niche applications beyond the five primary segments.
