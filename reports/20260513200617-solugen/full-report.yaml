      - number: '1.3'
        title: Capital Raises, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: >-
              Solugen has raised $640 million or more in total capital across four venture rounds plus a conditional
              federal loan guarantee, making it one of the best-funded bio-industrial chemistry companies globally. The
              2018 Series A of $13.5M was co-led by Fifty Years, Founders Fund, and Y Combinator. The 2019 Series B of
              $32M, led by Founders Fund with participation from YC, Refactor Capital, Fifty Years, and KdT Ventures,
              funded construction of the first Houston Bioforge. The landmark 2021 Series C of $357M — led by Singapore
              sovereign wealth fund GIC and Baillie Gifford — set Solugen's $1.8 billion post-money valuation and drew
              in a global institutional investor base including Temasek Holdings, BlackRock (the world's largest asset
              manager), Carbon Direct Capital Management, Refactor Capital, and Fifty Years. The 2022 Series D of
              $200M+, co-led by Kennivik, Lowercarbon Capital, and Refactor Capital, funded expansion and continued
              technology development. In 2024 the DOE Loan Programs Office issued a conditional $213.6M loan guarantee
              commitment for Bioforge Marshall, subject to legal, technical, financial, and environmental conditions.
              Solugen has no primary SEC EDGAR issuer filings, consistent with its private company status. Revenue,
              margins, and the capitalization table remain undisclosed.
