      - number: '4.5'
        title: Financial Gaps, Data Quality, and Diligence Requirements
        blocks:
          - type: paragraph
            body: >-
              Solugen's financial opacity is comprehensive: no revenue figure, gross margin, cash position, burn rate,
              customer revenue concentration, realized pricing, or capitalization table is publicly available in any
              form. The company has never filed audited financial statements with the SEC; EDGAR search returns only
              Form D private-placement exemptions confirming equity raises, not financial performance data. PitchBook's
              private company profile is paywalled and does not provide independently verifiable financial data in
              accessible form; analyst-consensus estimates for private companies at this development stage are not
              publicly available without NDA access. The critical diligence gaps fall into three tiers. Blocking gaps
              include: (1) annual revenue and growth rate — without this, no revenue quality assessment is possible; (2)
              gross margin percentage — without this, the cost-parity thesis cannot be underwritten; and (3) cash burn
              and runway — without this, capital adequacy cannot be independently assessed given the Series D close date
              and uncertain DOE loan status. Material gaps include: (4) realized per-ton pricing by product line —
              required to assess business value at any reasonable revenue multiple; (5) customer concentration — top
              five customers by revenue is the minimum disclosure for revenue-risk assessment; (6) Bioforge Marshall
              total construction cost and DOE loan conditions — essential for project-finance risk; and (7)
              capitalization table — needed to assess dilution structure and preference stack. The Kennivik investor
              opacity gap is minor from a financial underwriting perspective but is unusual at this stage and rounds of
              this size. Any serious diligence engagement with Solugen must begin with NDA-protected access to audited
              financial statements and cash flow projections.
