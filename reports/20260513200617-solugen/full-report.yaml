      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >-
              Multiple analyst firms have published estimates for the global bio-based chemicals market, with
              projections ranging from $65B to over $150B by 2030 depending on scope definition, geographic coverage,
              and base year. Grand View Research, MarketsandMarkets, Fortune Business Insights, and Precedence Research
              all project CAGRs between 9–11%, reflecting accelerating regulatory pressure and improving production
              economics. The market sizing exercise for Solugen requires a three-lens approach. The TAM (Total
              Addressable Market) at the broadest boundary is the entire $4,500B global chemicals industry, which
              Solugen could theoretically address over time as its Bioforge platform scales to additional product
              categories. A more scoped and credible TAM of approximately $98B encompasses the bio-based chemicals
              segment specifically. The SAM (Served Addressable Market) is defined by Solugen's current product
              portfolio and target verticals: wastewater treatment, construction, agriculture, and industrial/energy,
              representing approximately $45–55B globally and $12B in North America. The SOM (Serviceable Obtainable
              Market) in the near term is bounded by Solugen's plant capacity — 10,000 tons at the Houston Bioforge and
              the targeted 500,000 sf Bioforge Marshall in Minnesota — and is estimated at well under $1B annually until
              Marshall reaches full throughput. Analyst estimates diverge substantially due to differing scope
              decisions: some include bio-based solvents and polymers that Solugen does not currently produce, inflating
              the market figure relative to Solugen's actual opportunity. Diligence should obtain Solugen's own
              vertical-level sizing methodology and stress-test it against independent vertical market data for
              wastewater, construction, and energy chemicals separately.
