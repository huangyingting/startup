      - number: '4.2'
        title: Pricing and Monetization Mechanics
        blocks:
          - type: paragraph
            body: >-
              Solugen's list pricing, contract pricing, and realized revenue per ton are entirely undisclosed for all
              product lines. The only public pricing benchmarks available are for conventional (petroleum-derived)
              hydrogen peroxide: commodity industrial-grade H2O2 typically trades at approximately $300–$400/ton for
              bulk delivery, while food-grade and specialty-grade concentrations command $500–$700/ton. Specialty
              oxidants such as glucaric acid derivatives and corrosion inhibitors — which are among Solugen's
              differentiated product offerings — typically command higher pricing in the range of $1,000–$3,000/ton for
              specialty chemical grades, based on industry chemical market benchmarks. Solugen claims cost parity with
              conventional chemistry at commercial scale, which implies its pricing is set at or near conventional
              commodity H2O2 benchmarks (not at a bio-premium), though this is an unverified company claim. The pricing
              mechanism for industrial chemicals of this type is typically long-term supply contracts with volume-based
              tiered pricing, rather than spot-market transactions — meaning revenue predictability depends heavily on
              contract duration and renewal terms, which are undisclosed. An important monetization risk: if Solugen
              prices at commodity parity rather than a bio-based premium, gross margins depend entirely on achieving a
              lower cost-of-goods than conventional producers, which has not been independently verified. Any realized
              bio-based premium above commodity pricing — for example, from ESG-driven procurement mandates at
              wastewater utilities or construction companies with sustainability targets — would expand gross margin,
              but the magnitude of this premium in actual signed contracts is unknown.
