    title: Bioforge Product Architecture Stack
    type: stack
    layout: standard
    summary: >-
      Five-layer architecture map of the Solugen Bioforge platform from raw material inputs through the enzyme and
      catalyst conversion steps to bio-based chemical outputs sold into industrial end markets. The stack illustrates
      the vertical integration from feedstock supply through Bioflex enzyme production, two-step Bioforge conversion,
      and final product delivery.
    approximationNotes: >-
      Layer ordering reflects process sequence from bottom (inputs) to top (customer markets), consistent with
      manufacturing stack convention. Item labels derived from Solugen's publicly disclosed technology page and blog
      posts.
    data:
      layers:
        - label: Customer Market Layer
          detail: End-markets where bio-based chemicals are sold to industrial buyers
          items:
            - label: Wastewater Treatment
              detail: Municipal and industrial wastewater oxidation and chelation
            - label: Construction Chemicals
              detail: Concrete admixtures, scale inhibitors, corrosion control
            - label: Agriculture
              detail: Micronutrient chelation, soil treatment applications
            - label: Energy Sector
              detail: Industrial water treatment, oilfield chemistry
        - label: Product Layer
          detail: Bio-based chemical outputs from Bioforge conversion
          items:
            - label: Glucaric Acid Derivatives
              detail: Primary product — industrial chelating and sequestering agent
            - label: Bio-based H2O2 Equivalent
              detail: Oxidizing agent replacing anthraquinone-process H2O2
            - label: Gluconic Acid Derivatives
              detail: Mild industrial cleaner and food-grade acidulant
