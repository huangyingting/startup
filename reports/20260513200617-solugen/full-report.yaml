      - number: '8.3'
        title: Financing Context and Valuation Entry
        blocks:
          - type: paragraph
            body: >-
              Solugen's financing history establishes a meaningful but dated valuation anchor. The Series C of $357M in
              October 2021 is corroborated by SEC Form D filings, Bloomberg reporting, and ICIS coverage; the implied
              post-money valuation was approximately $2B. Series C investors included GIC, Temasek, BlackRock, and
              Baillie Gifford — all institutional-quality capital allocators whose participation provides governance
              credibility. The Series D of reportedly ~$200M, led by Kennivik (a Delaware entity with no publicly
              disclosed ownership, fund size, or institutional background), is unconfirmed in SEC Form D filings as of
              May 2026. Crunchbase News and CB Insights report KKR involvement, but Kennivik's relationship to KKR is
              not independently verified. A Series D at $3-4B would imply a 50-100% premium to the 2021 Series C; this
              premium is unverifiable without Series D terms or financial performance data. The DOE LPO conditional
              commitment of $213.6M, if finalized, provides a non-dilutive capital layer that would reduce the equity
              burden for Marshall construction, estimated at $300M-$600M based on analogous industrial biotech facility
              benchmarks. If the DOE conditions remain unmet, Solugen faces a capital gap of $150M-$400M that would
              likely require additional equity financing, creating dilution risk for current investors. Preference
              overhang analysis requires the full cap table, which is not publicly available. Entry discipline for any
              investor depends on: (1) confirmed Series D terms and post-money valuation; (2) DOE loan finalization
              status; (3) cap table and liquidation preference structure; and (4) at least directional revenue and
              margin under NDA to support a multiple-based valuation. Without these data points, the entry price and
              dilution stack cannot be assessed from public sources alone. The valuation range figure illustrates the
              wide scenario dispersion: a base case of $1.5B-$3B EV, a bull case of $4B-$8B EV, and a bear case of
              $300M-$900M, reflecting fundamental uncertainty in Marshall execution and DOE conditionality.
