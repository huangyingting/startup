            body: >-
              Solugen's land-and-expand potential operates at two levels: product line expansion within a single
              customer account (e.g., a wastewater customer that qualifies the H2O2 equivalent could subsequently adopt
              glucaric acid derivatives), and geographic expansion as Bioforge Marshall scales and Sasol's distribution
              network extends reach to international markets. The ADM partnership creates a natural expansion vector
              into agricultural chemical buyers through ADM's existing relationships with agribusiness customers. The
              Sasol distribution partnership provides reach into Sasol's European, Asian, and African chemical
              distribution channels that Solugen's direct sales team could not efficiently cover independently.
              Concentration risk is elevated on three dimensions. First, Sasol is the sole disclosed distribution
