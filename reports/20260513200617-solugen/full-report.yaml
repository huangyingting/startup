          detail: Core enzymatic-to-metal-catalyst two-step manufacturing process
          items:
            - label: Enzyme Oxidation Reactor (Step 1)
              detail: Cell-free enzymatic oxidation at room temperature; no living organisms
            - label: Metal Catalyst Reactor (Step 2)
              detail: Proprietary heterogeneous catalysis for conversion efficiency and selectivity
            - label: Downstream Processing (Step 3)
              detail: Evaporation and crystallization to produce solid final product
