      - number: '1.2'
        title: Technology Platform — Bioforge and Bioflex
        blocks:
          - type: paragraph
            body: >-
              Solugen's core technology platform consists of two integrated systems: the Bioforge, a modular chemical
              manufacturing unit, and the Bioflex, a fermentation platform that produces the engineered enzymes used in
              Bioforge reactions. The Bioforge process uses bio-based circular feedstocks — dextrose (corn-derived
              sugar), water, and compressed air — eliminating the need for fossil-fuel-derived hydrocarbon precursors.
              Engineered enzymes, optimized through AI/ML-driven directed evolution and DNA library design, carry out
              oxidation reactions at room temperature with significantly lower energy consumption than conventional
              thermochemical processes. These enzymatic steps are followed by proprietary heterogeneous metal catalysts
              that enhance conversion efficiency and selectivity. The Bioflex fermentation platform produces both
              intracellular and extracellular enzymes using bacteria, yeast, and filamentous fungi, providing biological
              manufacturing continuity for enzyme supply. Solugen claims integrated product yields exceeding 95%, in
              some cases approaching unity, while generating no hazardous waste streams and little-to-no harmful air
              emissions. The company's AI/ML stack covers enzyme evolution, DNA library design, metal catalyst design,
              and real-time plant operations optimization, creating a vertically integrated data flywheel that compounds
              process improvements over successive manufacturing runs. The complete Bioforge process flow converts
              dextrose, water, and compressed air into industrial chemicals via an enzyme oxidation reactor followed by
              metal catalyst conversion, evaporation, and crystallization.
