  - id: FU001
    title: Customer Journey Map — Solugen Industrial Chemical Buyer Path
    type: journey-map
    layout: standard
    summary: >-
      Six-stage journey map tracing the Solugen industrial chemical buyer path from initial need identification through
      product qualification, supply contract, production and delivery, end application, and renewal and expansion. Nodes
      reflect the standard B2B specialty chemical procurement and retention lifecycle applied to Solugen's drop-in
      bio-based chemical positioning. The journey emphasizes the structural retention dynamic created by multi-month
      qualification cycles and multi-year supply agreements.
    approximationNotes: >-
      Journey stages are derived from standard industrial specialty chemical procurement patterns and Solugen's
      disclosed commercial structure (drop-in products, Sasol distribution, Slaton hub). No named customer has publicly
      confirmed this journey sequence. The renewal loop back to supply contract reflects sector-typical multi-year
      renewal patterns, not company-disclosed renewal data.
    data:
      nodes:
        - id: cj1
          label: Need Identification
          detail: >-
            Industrial buyer identifies need for oxidizing or chelating agent; ESG mandate or cost review triggers
            evaluation of bio-based alternative
          tone: neutral
        - id: cj2
          label: Product Qualification
          detail: >-
            6-18 month qualification testing for drop-in bio alternative against existing performance specification;
            dosing and compatibility verification
          tone: neutral
        - id: cj3
          label: Supply Contract
          detail: >-
            Multi-year supply agreement at volume-based pricing; Sasol distribution or direct Solugen supply depending
            on region and segment
          tone: positive
        - id: cj4
          label: Production and Delivery
          detail: >-
            Bioforge Houston or Marshall produces; Slaton TX hub for energy sector; Sasol network for broader industrial
            distribution
          tone: positive
        - id: cj5
          label: Application and Use
          detail: >-
            Drop-in deployment in wastewater, construction, agriculture, or energy workflow; no equipment modification
            required
          tone: positive
        - id: cj6
          label: Renewal and Expansion
          detail: >-
            Renew multi-year supply contract; expand to additional product lines or geographies; high structural
            retention once qualified
          tone: positive
