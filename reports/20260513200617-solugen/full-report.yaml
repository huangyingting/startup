      - number: '3.7'
        title: Evidence Gaps and Diligence Priorities
        blocks:
          - type: paragraph
            body: >-
              Three material diligence gaps limit the ability to fully assess Solugen's competitive position. First, no
              independent third-party cost benchmarking comparing Solugen's bio-based H2O2 production cost per kilogram
              to anthraquinone-process H2O2 from Evonik or Solvay at industrial grade is publicly available, making
              cost-parity claims unverifiable. Second, the patent landscape covering Solugen's cell-free enzymatic
              oxidation platform — including claim breadth, expiry timelines, and potential design-around risk from
              Novozymes, BASF, or Evonik enzyme divisions — has not been disclosed in a format enabling independent
              analysis. Third, no strategic response from incumbent H2O2 producers (Evonik, Solvay, Kemira) regarding
              bio-based substitution has been publicly disclosed, leaving open the question of whether any major player
              has an active internal bio-based H2O2 development program or acquisition strategy targeting Solugen-like
              technologies. Minor gaps include lack of global H2O2 market share disaggregation by producer and end
              market, absence of disclosed Kemira production capacity for competitive sizing, and no public confirmation
              that Solugen holds bio-based content certifications (USDA BioPreferred, ISCC+) that would create
              compliance-based switching costs. Additionally, the global H2O2 market share distribution among the top
              producers — Evonik, Solvay, Nouryon, Kemira, Arkema — has not been disaggregated by geography or end
              market in publicly accessible sources reviewed during this research, preventing precise competitor market
              share analysis and limiting the ability to quantify which incumbents hold the largest share in Solugen's
              primary target markets.
            claimRefs: []
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Business Architecture
        blocks:
          - type: paragraph
            body: >-
              Solugen's revenue model is a straightforward volume chemical-sales model: the company manufactures
              bio-based industrial chemicals at its Bioforge facilities and sells them by weight (per-ton or
              per-kilogram) as drop-in replacements for petroleum-derived chemical equivalents. This is a pure-product
              manufacturing revenue model — not a licensing, SaaS, or services model — meaning revenue scales directly
              with production volume, realized per-ton pricing, and capacity utilization. The company serves customers
              across at least seven disclosed markets: wastewater treatment, construction, agriculture, energy,
              industrial specialty, and others. As of the research date, Solugen operates from two confirmed locations —
              the Houston Bioforge (10,000-ton-per-year capacity) and the Slaton, TX distribution warehouse — with the
              Bioforge Marshall 500,000 sq ft facility under construction in Southwest Minnesota. Revenue is recognized
              at the point of chemical delivery; there is no disclosed subscription, usage-based, or recurring-service
              revenue component. The company's 2022 About page claims "production hits critical mass" at Houston
              Bioforge in its first year of operation, implying early revenue generation from that facility. Solugen
              states it has "top-tier customers" for existing solutions but names no customer publicly; revenue
              concentration, contract duration, and customer churn are all undisclosed. The business model bears more
              resemblance to a specialty chemical manufacturer like Cabot or Quaker Houghton than to a technology
              licensor, meaning valuation and margin benchmarks from specialty chemical incumbents are the most relevant
              financial comparables.
