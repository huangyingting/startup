          detail: Three commodity raw material inputs to the Bioforge process
          items:
            - label: Dextrose (Corn Sugar)
              detail: Bio-based carbon source from ADM corn wet-milling
            - label: Water
              detail: Aqueous reaction medium; removed in downstream evaporation
            - label: Compressed Air
              detail: Oxygen source for enzymatic oxidation step
