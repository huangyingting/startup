    title: Company Overview
    sections:
      - number: '1.1'
        title: Founding, History, and Corporate Identity
        blocks:
          - type: paragraph
            body: >-
              Solugen was founded in 2016 in Houston, TX by two researchers who met at a medical school poker game:
              Gaurab Chakrabarti, an MD/PhD graduate of UT Southwestern Medical Center where he studied pancreatic
              cancer drug discovery, and Sean Hunt, a chemical engineering PhD from MIT whose doctoral work focused on
              noble metal catalysts. The unexpected pairing of a physician-scientist and a catalytic chemist created the
              intellectual foundation for Solugen's core innovation: applying biology-inspired enzymatic reactions to
              replace fossil-fuel-based chemical synthesis with a greener, lower-energy alternative. From the outset,
              the company's stated mission has been to reimagine chemical manufacturing using biology and chemistry,
              targeting an industry responsible for more than 8% of global greenhouse gas emissions according to Y
              Combinator's company profile. The founders claim Solugen operates the world's first sustainable chemical
              plant — a designation used to differentiate its Bioforge platform from conventional petrochemical
              facilities. The company progressed rapidly through the startup ecosystem: winning the MIT $100K
              competition in 2017, joining Y Combinator that same year, and earning Forbes 30 Under 30 recognition for
              its founders. By 2018 Solugen had raised a $13.5M Series A and acquired a brownfield industrial site in
              Houston to house its first production facility. The company is headquartered in Houston, TX with a 20,000+
              square foot laboratory, 10,000 sf warehouse, and co-located Bioforge, and employs 115+ people across 7+
              end markets.
