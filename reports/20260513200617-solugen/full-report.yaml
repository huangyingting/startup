              if the ADM relationship were disrupted. Third, the energy sector customer hub in Slaton Texas represents
              likely geographic concentration in Gulf Coast oil and gas, with no disclosed diversification outside that
              region. Bioforge Marshall's entry into the upper Midwest agricultural and wastewater markets represents
