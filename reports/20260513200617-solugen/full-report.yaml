      - number: '8.5'
        title: Comparable Set
        blocks:
          - type: paragraph
            body: >-
              Valuing Solugen from public sources requires constructing a comparable set across three categories: public
              bioprocessing companies, failed or distressed bio-based chemistry precedents, and public specialty
              chemicals companies as a floor reference. LanzaTech (NASDAQ: LNZA) is the highest-relevance public
              comparable: a bioprocessing company that converts waste gases to chemicals, with a similar
              capital-intensive model and government partnership profile. As of May 2026, LanzaTech traded at
              approximately $400M market capitalization, a significant discount to Solugen's Series C valuation of ~$2B
              and even further below an unconfirmed Series D at $3-4B. The LanzaTech comp is a cautionary anchor: it
              demonstrates what the public market currently pays for commercial-stage industrial bioprocessing even with
              revenue, public filing transparency, and regulatory track record. Amyris represents the primary adverse
              comparable: peak market cap of approximately $4B in 2021 followed by Chapter 11 bankruptcy in August 2023.
              The parallels to Solugen's situation are material — large capital raise, institutional investor backing,
              bio-based chemistry scale-up ambition, and premium valuation. Genomatica remains private with
              approximately $260M total capital raised and no public valuation mark. Corbion and Avient (specialty
              chemicals) trade at 1.5-2x and 1.2x EV/Revenue respectively, providing a floor reference for mature
              specialty chemistry businesses. Solugen's last known valuation mark remains the 2021 Series C at
              approximately $2B — now more than four years old and entirely pre-Marshall. The enumeration is limited to
              publicly accessible sources; paywall-blocked analyst reports (PitchBook, Bloomberg) may contain additional
              private comparable marks or more precise public comps as of May 2026. Any market participant with access
              to institutional databases should cross-check these references against PitchBook's private company
              valuation database and Bloomberg's comparable transactions screen before finalizing a valuation model.
