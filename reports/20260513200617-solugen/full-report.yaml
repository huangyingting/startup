  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Bioforge Platform — Core Technology and Process Architecture
        blocks:
          - type: paragraph
            body: >-
              Solugen's Bioforge platform converts three commodity inputs — dextrose (corn sugar), water, and compressed
              air — into a portfolio of oxidized sugar derivatives through a sequential two-reactor process followed by
              standard downstream purification. The first reactor is an engineered enzyme oxidation system that operates
              at room temperature using cell-free reactions. Cell-free means no living organisms are present: the
              engineered enzyme proteins are isolated from their host microorganisms and deployed directly in aqueous
              solution, eliminating bioreactor contamination risk, sterility maintenance costs, and the
              organism-engineering constraints that limit whole-cell fermentation platforms. The second reactor uses a
              proprietary heterogeneous metal catalyst to enhance conversion efficiency and direct product selectivity
              toward the target chemical species. Downstream processing consists of an evaporator (to remove water) and
              a crystallizer (to yield a solid final product). Solugen claims approximately one ton of product output
              per one ton of feedstock input, consistent with the theoretical atom economy for oxidative sugar
              functionalization. Integrated yield is claimed at 95%+. The process produces no hazardous waste and
              little-to-no harmful emissions. No independent third-party yield verification has been publicly disclosed
              as of May 2026, representing a material diligence gap. The architecture is captured in the product stack
              figure (FE001) and the operating process table (TE003).
