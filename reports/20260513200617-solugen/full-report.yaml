  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology and Scale-Up Execution Risks
        blocks:
          - type: paragraph
            body: >-
              Solugen's most acute execution risk is the leap from Bioforge Houston (~10,000 metric tons/year, ~10,000
              sf estimated) to Bioforge Marshall (500,000 sf, targeted fall 2025). This 50× scale expansion represents a
              first-of-kind commercial deployment of enzymatic oxidation chemistry at a scale that has no industrial
              template. The Houston Bioforge has operated commercially since approximately 2021, demonstrating the
              enzymatic process at what Solugen calls commercial scale, but the jump to Marshall introduces material
              unknowns across reactor engineering, thermal management, enzyme catalyst throughput, product separation,
              and waste handling at 50× volume. Industrial chemical scale-up from pilot to commercial production
              routinely surfaces unexpected bottlenecks: reaction kinetics that differ at scale, heat and mass transfer
              limitations, catalyst deactivation rates, and product quality variation that are invisible at smaller
              volumes. Solugen acknowledges the scale transition risk in its technology documentation by describing a
              pilot plant testing phase specifically designed to address limitations that emerge between bench-scale and
              commercial operation. However, no third-party engineering validation, front-end engineering and design
              (FEED) completion, or independent techno-economic assessment of Marshall's process design has been
              disclosed. The Bioflex enzyme production plant must also scale proportionally to supply Marshall with
              sufficient engineered enzyme catalyst — a secondary scale-up risk that depends on internal enzyme
              manufacturing capacity. AI/ML-assisted enzyme design, while a competitive advantage in the design phase,
              may encounter unpredictable failure modes when optimized enzyme variants are introduced at manufacturing
              scale for the first time. As of May 2026, Solugen has not confirmed completion of Bioforge Marshall, and
              the fall 2025 production start target appears to have slipped without public announcement. This production
              timeline uncertainty is the highest-severity execution risk in the investment case.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
              - CR008
