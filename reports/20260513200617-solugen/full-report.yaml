      - number: '1.4'
        title: Facilities, Scale, and Operational Milestones
        blocks:
          - type: paragraph
            body: >-
              Solugen's physical infrastructure spans three distinct addresses. The Houston, TX headquarters combines a
              20,000+ square foot laboratory with a 10,000-ton-capacity Bioforge that came online in 2021 — marking the
              company's transition from demo-scale to commercial production — plus a 10,000 sf product warehouse. A
              second operational address in Slaton, TX provides a 20,000 square foot distribution hub dedicated to
              energy sector customers. Bioforge Marshall, Solugen's flagship expansion project in Marshall, Minnesota,
              is a 500,000 square foot facility sited adjacent to ADM's corn processing complex, enabling direct
              co-location of corn-derived dextrose feedstock supply. Construction began in 2024 after ground-breaking,
              and the facility was originally targeted to begin operations in fall 2025. Bioforge Marshall is projected
              to reduce annual carbon emissions by up to 18 million kilograms versus conventional methods, create up to
              100 construction jobs and 56 permanent full-time manufacturing roles, and support community development
              through MOUs with Marshall Public Schools and Southwest MN Private Industry Council. The project aligns
              with the White House Justice40 Initiative and was the basis for Solugen's $213.6M conditional DOE loan
              guarantee. As of the May 2026 report date, independent confirmation of Bioforge Marshall's operational
              status or commissioning progress has not been obtained from sources beyond the 2024 groundbreaking
              announcement, making the facility's current state an open evidence gap.
