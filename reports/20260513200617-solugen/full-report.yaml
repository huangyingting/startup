      - number: '7.4'
        title: Operational and Supply Chain Risks
        blocks:
          - type: paragraph
            body: >-
              Solugen's operational risk profile is shaped by three interconnected dependencies: ADM as the sole public
              feedstock supplier for Bioforge Marshall, the Marshall, Minnesota construction execution, and the scale of
              the employee and infrastructure transition required to operate a 500,000 sf facility. ADM operates one of
              the largest corn wet-milling complexes in North America adjacent to the planned Marshall site; co-location
              provides significant logistics and cost advantages but creates a single-supplier concentration risk for
              dextrose input. If ADM experiences supply disruption — due to crop failure, operational issues at the
              Marshall complex, a contract dispute, or change in strategic direction — Solugen has no publicly disclosed
              backup feedstock supply option for Marshall. Corn and dextrose prices are commodity-driven and subject to
              weather, geopolitical, and agricultural policy volatility; price increases translate directly to Solugen's
              input cost structure. Marshall construction execution risk is material: the facility requires specialized
              process equipment, bioreactor systems, enzyme production infrastructure, chemical processing equipment,
              and environmental control systems — all of which face supply chain lead times, installation sequencing
              risks, and labor availability constraints in the upper Midwest. Weather-related delays in Minnesota's
              climate are also a potential construction schedule risk. Bioforge Houston's operational continuity risk is
              lower (the facility has been operational for several years) but still exists: any unplanned outage,
              equipment failure, or safety incident at Houston would affect near-term revenue generation. Employee
              retention is a growing operational risk: with 115+ employees, many of whom are specialized biochemical
              engineers, process engineers, and AI/ML researchers, competitive talent pressure from other bio-industrial
              and chemical technology companies is significant. As operations scale to Marshall, the company will need
              to substantially grow its workforce, adding execution risk to an already complex operational transition.
            claimRefs:
