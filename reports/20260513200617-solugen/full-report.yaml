      - number: '8.4'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              Three distinct valuation scenarios capture the range of plausible outcomes for Solugen over a two-to-three
              year investment horizon, reflecting the binary nature of the Marshall execution risk and DOE
              conditionality. The bull case ($4B-$8B EV) requires Marshall reaching 80%+ utilization by 2027, DOE loan
              finalization, confirmed Series D at ~$3B, ESG premium pricing on key product lines, and an IPO or
              strategic acquisition by 2028. In this scenario, Solugen would command a 5-6x EV/Revenue multiple
              justified by bio-based premium, scale-up proof, and strategic scarcity value. The return logic implies
              3-4x on current entry. This outcome requires multiple concurrent optimistic developments and is assigned a
              low probability signal given that Marshall's fall 2025 target has apparently slipped without public
              announcement. The base case ($1.5B-$3B EV) assumes Marshall at 40-60% utilization by late 2027, DOE loan
              closes, no IPO before 2028, commodity pricing at scale, and gradual customer adoption. A 3-4x EV/Revenue
              multiple would imply $1.5B-$3B EV depending on actual revenue trajectory. The return logic supports 1.5-2x
              on entry in a secondary or strategic exit scenario. This case is consistent with disclosed facts but
              requires Marshall construction to complete, which remains unconfirmed. The bear case ($300M-$900M EV)
              assumes Marshall delayed beyond 2028 or cancelled, DOE loan failure, additional dilutive equity raises,
              sustained petroleum price weakness, and potential Amyris-type restructuring. In this scenario, Solugen
              would be valued closer to LanzaTech's public market comp (~$400M), reflecting a bio-based industrial
              company without its primary revenue-inflection asset. Below-cost-of-capital returns or a loss of capital
              are plausible in the bear case. The bear case probability signal is medium, reflecting the material
              execution risk and unresolved DOE conditionality. The valuation sensitivity figure shows how the midpoint
              valuation estimate shifts across key revenue and multiple assumptions.
