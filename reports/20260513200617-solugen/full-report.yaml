      - number: '3.6'
        title: Competitive Moat Claims, Durability, and Risk Register
        blocks:
          - type: paragraph
            body: >-
              Solugen articulates four core moat claims: (1) proprietary cell-free enzymatic platform that is difficult
              to replicate without Solugen's specific enzyme engineering and catalyst intellectual property; (2) 95%+
              integrated product yield versus approximately 70–80% for typical whole-cell fermentation; (3) no hazardous
              waste, no harmful emissions, and near-room- temperature processing enabling faster environmental
              permitting than conventional chemical plants; and (4) established feedstock partnership with ADM for corn
              dextrose supply, creating a vertically integrated North American bio-based supply chain. The cell-free
              approach is genuinely differentiated from Genomatica's whole-cell fermentation and from anthraquinone
              processes; it does not require organism containment, sterile fermentation environments, or downstream cell
              separation. However, moat durability depends on patent protection scope — Novozymes (world's largest
              industrial enzyme company) has not disclosed a competing cell-free enzymatic platform for H2O2 production,
              but its R&D capability represents a potential future threat. Petroleum price volatility is the most
              material near-term competitive risk: when oil prices fall, the cost advantages of petroleum-derived H2O2
              production widen, compressing Solugen's cost-parity window. Amyris is a direct cautionary precedent: it
              raised over $1B, went public, and filed for Chapter 11 in 2023 after failing to achieve profitable scale.
              The bio-based sector has seen multiple failures including Myriant (wound down) and Verdezyne (inactive),
              confirming that the path from demonstrated technology to durable commercial profitability is consistently
              longer than early projections. Independent verification of Solugen's IP scope, yield claims, and cost
              structure is the highest-priority diligence gap.
