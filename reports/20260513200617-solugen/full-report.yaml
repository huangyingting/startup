      - number: '7.7'
        title: People, Governance, and Execution Capacity Risks
        blocks:
          - type: paragraph
            body: >-
              Solugen's people risk is anchored by key-person concentration in two founders: Gaurab Chakrabarti (CEO,
              MD/PhD UT Southwestern) and Sean Hunt (CTO, PhD MIT). Both founders are central to Solugen's scientific
              credibility, investor relationships, customer development, regulatory engagement, and strategic direction.
              Chakrabarti represents the public face of the company and has driven its commercial narrative, while Hunt
              anchors the technical credibility of the enzymatic design platform. The departure of either founder would
              be a material adverse event that could affect investor confidence, customer relationships, and DOE loan
              finalization. At 115+ employees, Solugen's leadership team appears thin relative to the operational scale
              required to complete Bioforge Marshall construction, onboard and train a substantially larger workforce,
              manage simultaneous Houston and Marshall operations, and advance multiple product lines and customer
              relationships. No independent non-executive director appointments have been publicly disclosed for
              Solugen's board; for a company at the $640M+ funding stage approaching a major capital deployment, board
              governance depth is a standard diligence concern. Headcount scaling from the current ~115+ to the level
              required to operate a 500,000 sf facility will require aggressive hiring in biochemical engineering,
              process operations, safety, environmental compliance, and commercial roles — all of which face competitive
              labor markets. Technical talent retention is particularly acute: biochemical engineers and enzyme design
              researchers with commercial-scale experience are in high demand across the growing bio-industrial economy,
              and Solugen competes for this talent against better-resourced incumbents and other well-funded bio-based
              startups. Glassdoor and Indeed review profiles for Solugen returned broken or inaccessible results at
              research time, providing no adverse or confirming employee experience signal.
