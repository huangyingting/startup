      - number: '3.5'
        title: Capability and Pricing Comparison
        blocks:
          - type: paragraph
            body: >-
              A systematic comparison across key buying criteria reveals where Solugen's differentiation is defensible
              and where it remains unverified. On process sustainability — producing chemicals without fossil
              feedstocks, hazardous solvents, or significant GHG emissions — Solugen scores highest among all
              competitors. Evonik and Solvay, producing H2O2 via the anthraquinone process, require fossil-derived
              hydrogen gas and organic solvents in large quantities. On supply scale and commercial reliability,
              incumbents have multi-gigaton global capacity, global logistics networks, and decades-long supply
              agreements with major customers — advantages Solugen cannot replicate from a single 10,000-ton Houston
              facility plus the under-construction Bioforge Marshall. On product yield, Solugen claims 95%+ integrated
              yield versus approximately 70–80% for typical whole-cell fermentation; no independent third-party
              verification of this claim is publicly available. On pricing, Solugen claims cost parity with
              petroleum-based chemistry at commercial scale, but no pricing data is publicly disclosed. Incumbents
              benefit from multi-decade process optimization and economies of scale that are not replicable quickly.
              Multi-homing risk is moderate: industrial chemical buyers often maintain dual-supply relationships for
              supply security, which reduces Solugen's lock-in but also reduces the switching cost barrier to trial
              adoption. Application-specific technical service — on-site dosing engineering, process optimization, and
              regulatory compliance support — is a non-trivial buying criterion where Evonik, Kemira, and Solenis have
              deeply experienced local teams that Solugen at its current stage cannot fully replicate. No incumbent has
              publicly disclosed a bio-based H2O2 development program that would directly compete with Solugen's
              enzymatic platform, as of May 2026.
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
