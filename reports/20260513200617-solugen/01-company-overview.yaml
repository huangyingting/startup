  - calloutType: insight
    title: AI/ML-Driven Enzyme Evolution Creates Compounding Process Advantages
    body: >-
      Solugen's use of AI/ML across enzyme evolution, DNA library design, metal catalyst
      design, and operations optimization creates a vertically integrated data flywheel.
      Each production run generates data that feeds further enzyme and catalyst optimization,
