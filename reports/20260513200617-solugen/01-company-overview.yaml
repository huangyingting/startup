    figureRefs:
      - FO001
  - id: section-2
    title: Technology Platform — Bioforge and Bioflex
    body: >-
      Solugen's core technology platform consists of two integrated systems: the Bioforge, a
      modular chemical manufacturing unit, and the Bioflex, a fermentation platform that produces
      the engineered enzymes used in Bioforge reactions. The Bioforge process uses bio-based
      circular feedstocks — dextrose (corn-derived sugar), water, and compressed air — eliminating
      the need for fossil-fuel-derived hydrocarbon precursors. Engineered enzymes, optimized
      through AI/ML-driven directed evolution and DNA library design, carry out oxidation reactions
      at room temperature with significantly lower energy consumption than conventional
      thermochemical processes. These enzymatic steps are followed by proprietary heterogeneous
      metal catalysts that enhance conversion efficiency and selectivity. The Bioflex fermentation
      platform produces both intracellular and extracellular enzymes using bacteria, yeast, and
      filamentous fungi, providing biological manufacturing continuity for enzyme supply. Solugen
      claims integrated product yields exceeding 95%, in some cases approaching unity, while
      generating no hazardous waste streams and little-to-no harmful air emissions. The company's
      AI/ML stack covers enzyme evolution, DNA library design, metal catalyst design, and real-time
      plant operations optimization, creating a vertically integrated data flywheel that compounds
      process improvements over successive manufacturing runs. The complete Bioforge process flow
      converts dextrose, water, and compressed air into industrial chemicals via an enzyme
      oxidation reactor followed by metal catalyst conversion, evaporation, and crystallization.
    claimRefs:
      - CO031
      - CO032
      - CO033
      - CO034
      - CO035
      - CO036
      - CO037
      - CO038
      - CO039
    figureRefs:
      - FO002
  - id: section-3
    title: Capital Raises, Valuation, and Investor Base
    body: >-
      Solugen has raised $640 million or more in total capital across four venture rounds plus a
      conditional federal loan guarantee, making it one of the best-funded bio-industrial chemistry
      companies globally. The 2018 Series A of $13.5M was co-led by Fifty Years, Founders Fund,
      and Y Combinator. The 2019 Series B of $32M, led by Founders Fund with participation from
      YC, Refactor Capital, Fifty Years, and KdT Ventures, funded construction of the first
      Houston Bioforge. The landmark 2021 Series C of $357M — led by Singapore sovereign wealth
      fund GIC and Baillie Gifford — set Solugen's $1.8 billion post-money valuation and drew in
      a global institutional investor base including Temasek Holdings, BlackRock (the world's
      largest asset manager), Carbon Direct Capital Management, Refactor Capital, and Fifty Years.
      The 2022 Series D of $200M+, co-led by Kennivik, Lowercarbon Capital, and Refactor Capital,
      funded expansion and continued technology development. In 2024 the DOE Loan Programs Office
      issued a conditional $213.6M loan guarantee commitment for Bioforge Marshall, subject to
      legal, technical, financial, and environmental conditions. Solugen has no primary SEC EDGAR
      issuer filings, consistent with its private company status. Revenue, margins, and the
      capitalization table remain undisclosed.
    claimRefs:
      - CO012
      - CO014
      - CO015
      - CO017
      - CO018
      - CO019
      - CO022
      - CO023
      - CO052
    tableRefs:
      - TO001
      - TO003
    figureRefs:
      - FO003
  - id: section-4
    title: Facilities, Scale, and Operational Milestones
    body: >-
      Solugen's physical infrastructure spans three distinct addresses. The Houston, TX
      headquarters combines a 20,000+ square foot laboratory with a 10,000-ton-capacity Bioforge
      that came online in 2021 — marking the company's transition from demo-scale to commercial
      production — plus a 10,000 sf product warehouse. A second operational address in Slaton,
      TX provides a 20,000 square foot distribution hub dedicated to energy sector customers.
      Bioforge Marshall, Solugen's flagship expansion project in Marshall, Minnesota, is a
      500,000 square foot facility sited adjacent to ADM's corn processing complex, enabling
      direct co-location of corn-derived dextrose feedstock supply. Construction began in 2024
      after ground-breaking, and the facility was originally targeted to begin operations in fall
      2025. Bioforge Marshall is projected to reduce annual carbon emissions by up to 18 million
      kilograms versus conventional methods, create up to 100 construction jobs and 56 permanent
      full-time manufacturing roles, and support community development through MOUs with Marshall
      Public Schools and Southwest MN Private Industry Council. The project aligns with the White
      House Justice40 Initiative and was the basis for Solugen's $213.6M conditional DOE loan
      guarantee. As of the May 2026 report date, independent confirmation of Bioforge Marshall's
      operational status or commissioning progress has not been obtained from sources beyond the
      2024 groundbreaking announcement, making the facility's current state an open evidence gap.
    claimRefs:
      - CO016
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
      - CO049
      - CO050
      - CO051
    tableRefs:
      - TO004
  - id: section-5
    title: Partnerships, Awards, and Strategic Position
    body: >-
      Solugen has established strategic partnerships with two major industrial companies — Sasol
      Chemicals, a global specialty chemicals producer, and ADM, one of the world's largest
      agricultural processors — both announced in 2023. The ADM partnership is structurally
      embedded in the Bioforge Marshall siting decision, with the facility built adjacent to
      ADM's Marshall, MN corn complex for feedstock continuity. The Sasol partnership signals
      Solugen's entry into specialty chemical supply chains as a credible manufacturing partner.
      Additional community-level MOUs with Marshall Public Schools and Southwest MN Private
      Industry Council support the Justice40-aligned workforce development narrative. Solugen has
      accumulated broad third-party validation across regulatory, financial, and technology press:
      EPA Green Chemistry Challenge Award (2023), EY Entrepreneur of the Year (2023), Forbes
      Sustainability Leaders (2024), MIT Technology Review 15 Climate Tech (2024), CNBC Disruptor
      50 (2024), TIME America's Top Greentech (2024), a16z American Dynamism 50 (2025), Fast
      Company #2 Most Innovative in Manufacturing (2022), and Fast Company World Changing Ideas
      (2021). The company's long-term vision — 1 million mini-mill Bioforges globally — positions
      it as a distributed manufacturing infrastructure play for the decarbonization of an industry
      generating over 8% of global GHG. Competitive positioning versus LanzaTech (gas fermentation),
      Ginkgo Bioworks (cell programming), and Genomatica (bio-based chemicals) relies on Solugen's
      distinct enzyme-plus-metal-catalyst hybrid approach and its DOE-backed capital access.
    claimRefs:
