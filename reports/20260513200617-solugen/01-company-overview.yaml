chapter:
  number: 1
  title: Company Overview
  summary: >-
    Solugen is a Houston, TX-based bio-industrial chemicals company founded in 2016 by Gaurab
    Chakrabarti (CEO, MD/PhD UT Southwestern) and Sean Hunt (CTO, PhD MIT). The company designs
    and operates Bioforges — sustainable chemical manufacturing plants using engineered enzymes
    and heterogeneous metal catalysts to convert bio-based feedstocks (dextrose, water, compressed
    air) into industrial chemicals with 95%+ integrated product yields, no hazardous waste, and
    near-zero harmful emissions. Solugen has raised $640M+ across Series A through D plus secured
    a conditional $213.6M DOE loan guarantee, backed by GIC, Baillie Gifford, Founders Fund,
    BlackRock, and Lowercarbon Capital, reaching a peak valuation of $1.8B at its 2021 Series C.
    The company operates a 10,000-ton Houston Bioforge, a Slaton TX distribution hub, and is
    constructing Bioforge Marshall (500,000 sf, Minnesota, targeted fall 2025). It serves 7+
    markets with 115+ employees and has received the EPA Green Chemistry Challenge Award (2023)
    and Fast Company #2 Most Innovative in Manufacturing (2022).
