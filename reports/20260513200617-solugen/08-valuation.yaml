  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "comparable-data"
      missingEvidence: >-
        Independent analyst comparable data from PitchBook (SV005) and Bloomberg (SV004)
        remain behind paywalls; additional private-round comparable marks and Series D
        valuation data may be available in institutional databases not accessible during
        research.
      whyItMatters: >-
        Without comparable private-round marks, the comparable valuation table enumeration
        is limited to public comparables and one private round (Solugen's own Series C),
        reducing precision of the valuation range analysis for TV004.
      diligencePath: >-
        Access PitchBook and Bloomberg through institutional data agreements; commission
        a proprietary comparable transactions search from an investment bank with access
        to private company valuation databases.
      relatedQuestionRefs:
        - QV027
        - QV028
      relatedTableRefs:
        - TV004

    - type: private-evidence-only
      severity: blocking
      topic: "valuation-entry-terms"
      missingEvidence: >-
        Solugen's Series D terms (post-money valuation, share class, preference stack),
        Kennivik's institutional identity and financial capacity, Marshall construction
        completion status, and Houston Bioforge revenue and gross margin are all private
        evidence that cannot be verified from publicly accessible sources.
      whyItMatters: >-
        Entry pricing, dilution economics, exit waterfall, and thesis viability all depend
        on evidence that is not publicly available; without it no capital commitment can
        be responsibly underwritten from public evidence alone.
      diligencePath: >-
        Engage Solugen management directly for primary briefing under NDA; request SEC
        Form D for Series D; conduct Delaware entity search for Kennivik; request DOE LPO
        current status update; commission financial data package request under NDA.
      relatedQuestionRefs:
        - QV029
        - QV030
        - QV031
        - QV032

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      Hard-paywall sources (Bloomberg SV004, PitchBook SV005, BCG SV026, McKinsey SV028,
      Deloitte SV027) are standard references for private company valuation and analyst
      market data in this sector. They are included as corroborating citations; no unique
      material claim relies solely on a restricted source.
  - dimension: unverifiedSource
    reason: >-
      Access-blocked sources (Corbion SV017, BCG SV026, Deloitte SV027, McKinsey SV028,
      Reuters SV032) returned 404 or access-denied during research. These are cited for
      provenance; claims do not rely solely on access-blocked sources and all material
      claims have at least one accessible corroborating source.
