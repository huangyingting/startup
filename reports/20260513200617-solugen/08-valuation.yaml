  - id: section-6
    title: Exit Readiness and Final Diligence Asks
    body: >-
      Solugen's exit readiness is assessed as low from public evidence: the company has not
      disclosed audited financials, has no announced IPO timeline, has an unconfirmed Series D
      with an opaque lead investor, and its primary revenue-inflection asset (Marshall) has
      missed its stated production timeline. Strategic acquirer interest from specialty
      chemicals companies or industrial conglomerates is a plausible exit path given
      Solugen's enzymatic IP, DOE validation, and institutional investor base. An IPO is
      possible if Marshall achieves commercial production and Solugen discloses financials,
      but is not near-term without those conditions. A secondary sale or co-investment at
      a disclosed mark could occur but requires Series D terms to be confirmed. The
      thesis-break and stop-loss triggers table lists five specific thresholds that would
      require immediate action: Marshall construction cancelled or indefinitely delayed,
      DOE loan not finalized by mid-2026, revenue and margin disclosed below break-even,
      Series D lead investor identity revealing governance conflicts, and sustained
      petroleum price below $40/barrel. These are monitorable criteria that protect
      capital discipline, not probability estimates. The final diligence asks table
      specifies five concrete information requests that would materially reduce uncertainty:
      Marshall construction status (current completion percentage and updated commercial
      start date), DOE loan finalization timeline (remaining open conditions), Series D
      terms and Kennivik identity (SEC Form D search, Delaware entity search), revenue
      and unit economics (FY2024-2025 data under NDA from CFO), and cap table with
      preference overhang (full capitalization table with liquidation preferences). None
      of these items require Solugen to disclose publicly sensitive information; all are
      standard pre-investment diligence requests that any serious institutional investor
      would make. The decision implication is clear: do not commit capital before obtaining
      primary engagement on Marshall status and Series D terms. The conditions that would
      upgrade from Research-More to a conditional buy are achievable through standard
      diligence processes if Solugen management is willing to engage.
