company:
  name: Solugen
chapter:
  number: 4
  title: Financials
  summary: >-
    Solugen is a private, venture-backed bio-based chemical manufacturer that has raised over $640M
    in equity across four rounds (Series A $13.5M in 2018 through Series D $200M+ in 2022) and
    holds a conditional $213.6M DOE loan guarantee announced June 2024 for Bioforge Marshall
    construction. The company operates a volume chemical-sales revenue model — it manufactures
    and sells bio-based drop-in chemicals (hydrogen peroxide, oxidants, corrosion inhibitors)
    by the ton into wastewater, construction, agriculture, and energy markets. Revenue, gross margin,
    cash burn, and realized pricing are entirely undisclosed; no public financial filing or
    audited statement is available. Based on Houston Bioforge capacity (10,000 tons/year) and
    industry commodity-pricing benchmarks, annual revenue is estimated at $10–$50M, with gross
    margin likely in the 20–40% specialty-chemical range. The most pressing financial diligence
    risks are (1) inability to independently verify cost parity with conventional chemistry,
    (2) the DOE loan guarantee remaining conditional and not yet funded as of May 2026,
    (3) unclear runway position given the $200M+ Series D was raised in 2022 and no subsequent
    equity round has been publicly announced, and (4) the unknown identity and institutional
    standing of Kennivik, the Series D lead investor.

sections:
  - id: section-1
    title: Revenue Model and Business Architecture
    body: >-
      Solugen's revenue model is a straightforward volume chemical-sales model: the company
      manufactures bio-based industrial chemicals at its Bioforge facilities and sells them by
      weight (per-ton or per-kilogram) as drop-in replacements for petroleum-derived chemical
      equivalents. This is a pure-product manufacturing revenue model — not a licensing, SaaS,
      or services model — meaning revenue scales directly with production volume, realized
      per-ton pricing, and capacity utilization. The company serves customers across at least
      seven disclosed markets: wastewater treatment, construction, agriculture, energy, industrial
      specialty, and others. As of the research date, Solugen operates from two confirmed
      locations — the Houston Bioforge (10,000-ton-per-year capacity) and the Slaton, TX
      distribution warehouse — with the Bioforge Marshall 500,000 sq ft facility under
      construction in Southwest Minnesota. Revenue is recognized at the point of chemical
      delivery; there is no disclosed subscription, usage-based, or recurring-service revenue
      component. The company's 2022 About page claims "production hits critical mass" at
      Houston Bioforge in its first year of operation, implying early revenue generation from
      that facility. Solugen states it has "top-tier customers" for existing solutions but
      names no customer publicly; revenue concentration, contract duration, and customer
      churn are all undisclosed. The business model bears more resemblance to a specialty
      chemical manufacturer like Cabot or Quaker Houghton than to a technology licensor,
      meaning valuation and margin benchmarks from specialty chemical incumbents are the
      most relevant financial comparables.
    claimRefs:
      - CI016
      - CI017
      - CI009
      - CI012
