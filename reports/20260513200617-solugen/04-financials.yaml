  - id: section-3
    title: Unit Economics and Cost Structure
    body: >-
      Solugen's unit economics are not publicly disclosed. The primary variable cost drivers
      for the Bioforge platform are corn dextrose feedstock, energy, enzyme production, and
      direct labor — in that order of estimated importance. Corn dextrose (the primary carbon
      source) is typically priced at $0.15–$0.25/lb ($330–$550/ton) in the US bulk market;
      Solugen's ADM partnership provides a partially hedged supply but the contract pricing
      and duration are undisclosed. The company claims its cell-free enzymatic process operates
      at room temperature, which it asserts reduces energy costs relative to the energy-intensive
      anthraquinone (AO) hydrogen peroxide process that requires high-pressure hydrogen and
      organic solvents at elevated temperatures. If the room-temperature claim holds, energy
      cost per ton of H2O2 could be materially lower than the AO process benchmark. Gross
      margin for comparable specialty chemical manufacturers (oxidants, chelators, corrosion
      inhibitors) typically ranges from 20% to 40% at commercial scale. At 10,000 tons/year
      of Houston Bioforge capacity and an estimated blended realized price of $400–$600/ton,
      Solugen's implied annual revenue from Houston is approximately $4M–$6M at the low end;
      at higher specialty pricing of $600–$1,000/ton, revenue could reach $6M–$10M per year
      from that facility alone. These estimates are highly uncertain and sensitive to pricing
      assumptions. A larger Marshall facility — designed at 500,000 sq ft — should produce
      materially more volume but its specific production output, feedstock consumption,
      and unit economics are not disclosed. Independent cost verification has not been
      performed; all unit-economics data derive from company claims, industry benchmarks,
      and engineering estimates with low confidence.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
