      (facility CapEx, operations, R&D). Net estimated position is highly uncertain given
      undisclosed burn rates and construction costs. The DOE commitment is conditional and
      shown at face value for illustrative purposes only.
    approximationNotes: >-
      All figures are estimates. Total equity raised ($640M+) is from company disclosure.
      DOE conditional loan ($214M) is from the June 2024 announcement; finalization is not
      confirmed. Houston CapEx is estimated from facility size and industrial benchmarks.
      Operations/R&D burn is estimated from headcount and industry norms for 2018–2024.
      Marshall CapEx is estimated from industrial facility benchmarks. Net position assumes
      all flows; actual cash position is undisclosed and could differ materially.
    claimRefs:
