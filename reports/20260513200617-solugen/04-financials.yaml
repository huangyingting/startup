      activity into gross profit. The model is a straightforward volume chemical-sales
      chain with no SaaS, licensing, or recurring-service components. Revenue realization
      depends on three critical conversion points — winning the customer account, shipping
      volume, and pricing above COGS — all of which are currently undisclosed.
