  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue-financials
      missingEvidence: >-
        Annual revenue, revenue growth rate, gross margin, and Houston Bioforge
        capacity utilization rate for Solugen for any fiscal year since the
        facility came online in 2021.
      whyItMatters: >-
        Without any revenue figure, it is impossible to assess the business's commercial
        traction, revenue quality, or any revenue-based valuation metric. Capacity
        utilization at Houston directly determines cash generation. These are the
        foundational financial gaps blocking all underwriting.
      diligencePath: >-
        Request audited financial statements under NDA from Solugen's CFO; minimally,
        request unaudited revenue, gross margin, and throughput summary for fiscal
        years 2022–2025.
      relatedQuestionRefs:
        - QI006
        - QI011
      relatedTableRefs:
        - TI003
        - TI005

    - type: private-evidence-only
      severity: blocking
      topic: cash-burn-runway
      missingEvidence: >-
        Monthly cash burn rate, cash on hand as of the most recent quarter, and
        management's internal runway forecast from the Series D capital.
      whyItMatters: >-
        The Series D was raised in 2022. Without burn-rate and cash-position data,
        it is not possible to assess whether Solugen has sufficient capital to complete
        Bioforge Marshall construction without an additional raise, especially given that
        the DOE loan guarantee remains conditional.
      diligencePath: >-
        Request monthly operating cash outflow summary and treasury cash position
        from the most recent quarter; request management's internal runway model.
      relatedQuestionRefs:
        - QI008
      relatedTableRefs:
        - TI004
        - TI005

    - type: missing-source
      severity: blocking
      topic: unit-economics
      missingEvidence: >-
        Per-ton COGS breakdown (feedstock, energy, labor, overhead), realized revenue
        per ton by product line, and audited gross margin for Solugen's chemical operations.
      whyItMatters: >-
        Solugen's commercial thesis rests on cost parity with petroleum chemistry at
        commercial scale. Without verified unit economics, this thesis is entirely
        unverifiable — a company claim without independent corroboration.
      diligencePath: >-
        Commission an independent process economics study or request audited COGS
        data under NDA; cross-check against ICIS published H2O2 commodity benchmarks
        and comparable specialty chemical producers.
      relatedQuestionRefs:
        - QI007
        - QI019
      relatedTableRefs:
        - TI003
        - TI005

    - type: private-evidence-only
      severity: material
      topic: doe-loan-finalization
      missingEvidence: >-
        Current status of the DOE $213.6M conditional loan guarantee finalization,
        including which conditions have been satisfied and which remain open as of May 2026.
      whyItMatters: >-
        If the DOE loan has not been finalized, Bioforge Marshall may be underfunded
        for completion, forcing an additional equity raise or delaying the facility.
        This directly affects capital adequacy assessment.
      diligencePath: >-
        Contact DOE LPO directly for project status update; request from Solugen a
        conditions-satisfaction checklist and current DOE correspondence.
      relatedQuestionRefs:
        - QI012
        - QI015
      relatedTableRefs:
        - TI004
        - TI005

    - type: missing-source
      severity: material
      topic: customer-concentration
      missingEvidence: >-
        Top five customers by revenue contribution, including customer identity,
        revenue amount, contract duration, and renewal dates.
      whyItMatters: >-
        A single-customer concentration above 30% of revenue would materially increase
        commercial risk, particularly for a company with a single operating production
        facility. This data is completely absent from public sources.
      diligencePath: >-
        Request customer revenue breakdown with contract terms under NDA; standard
        diligence item for any material investment at this stage.
      relatedQuestionRefs:
        - QI014
      relatedTableRefs:
        - TI001
        - TI005

    - type: private-evidence-only
      severity: material
      topic: capitalization-structure
      missingEvidence: >-
        Full capitalization table including all share classes, option pool size and
        status, liquidation preferences, Series D round terms including pre-money
        valuation and price per share, and current enterprise value indication.
      whyItMatters: >-
        Without the cap table, equity investors cannot assess dilution impact, preference
        stack overhang, or the current enterprise value at any given exit price. The
        $1.8B Series C valuation (2021) may not reflect current value given climate tech
