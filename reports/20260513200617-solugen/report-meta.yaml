companyProfile:
  summary: "Solugen is a Houston, Texas-based industrial biotechnology company founded in 2016 by Gaurab Chakrabarti (CEO) and Sean Hunt (CTO). Using its proprietary Bioforge platform—an enzymatic oxidation process that converts bio-based feedstocks into high-value industrial chemicals—Solugen produces bio-based alternatives to petroleum-derived chemicals for wastewater treatment, construction, agriculture, and energy markets. The company has raised $640M+ across four funding rounds and secured a $213.6M conditional DOE loan guarantee to build its second commercial facility in Marshall, Minnesota."
