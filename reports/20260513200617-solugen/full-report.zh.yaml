      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >-
              三个估值情景覆盖 Solugen 在两到三年投资期内的合理结果区间，也反映 Marshall 执行风险和 DOE 条件性近似二元的特征。乐观情景（$4B-$8B EV）要求 Marshall 在 2027
              年利用率达到 80%+，DOE 贷款最终落地，Series D 以约 ~$3B 估值确认完成，关键产品线获得 ESG 溢价定价，并在 2028 年前 IPO 或被战略收购。在这种情景下，Solugen 可获得
              5-6x EV/Revenue 倍数，由生物基溢价、放大验证和战略稀缺价值支撑。回报逻辑对应当前入场价的 3-4x。这一结果需要多项乐观进展同时发生；鉴于 Marshall 的 2025
              年秋季目标似乎已经滑期且没有公开公告，给出的概率信号为低。基准情景（$1.5B-$3B EV）假设 Marshall 到 2027 年末利用率为 40-60%，DOE 贷款关闭，2028 年前不
              IPO，规模化后按大宗商品定价，客户逐步采用。3-4x EV/Revenue 倍数将随实际收入轨迹对应 $1.5B-$3B EV。若以老股交易或战略退出实现，回报逻辑支持入场价的
              1.5-2x。该情景与已披露事实相符，但要求 Marshall 建设完成，而这一点仍未确认。悲观情景（$300M-$900M EV）假设 Marshall 延迟到 2028 年以后或被取消，DOE
              贷款失败，追加股权融资带来稀释，石油价格持续疲软，并可能出现 Amyris 式重组。在这种情景下，Solugen 的估值会更接近 LanzaTech 的公开市场可比公司（约
              $400M），市场会把它看作缺少核心收入拐点资产的生物基工业公司。悲观情景下，回报低于资本成本甚至本金亏损都合理。悲观情景的概率信号为中，反映实质性执行风险和未解决的 DOE
              条件性。估值敏感性图展示了在关键收入和倍数假设变化下，中点估值如何移动。
