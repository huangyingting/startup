  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 流程图将 Solugen 的技术证明、机构投资者质量、DOE 验证、Marshall 执行风险、估值不透明性，与「继续研究」建议连接起来。
    claimRefs:
      - CV006
      - CV007
      - CV009
      - CV011
      - CV023
      - CV028
      - CV039
    data:
      nodes:
        - id: n1
          label: Houston Bioforge 商业证明
          detail: 自 2021 年以来约 10,000 MT/yr 的酶促氧化
        - id: n2
          label: 机构投资者质量
          detail: GIC、Temasek、BlackRock、Baillie Gifford 与 Founders Fund
        - id: n3
          label: DOE 条件性承诺 $213.6M
          detail: 非稀释性验证；条件尚未满足
        - id: n4
          label: Marshall 50x 规模扩张未确认
          detail: 2025 年秋季目标已推迟；截至 2026 年 5 月未公开确认完工
        - id: n5
          label: 估值与融资不透明
          detail: Series D 未确认；Kennivik 身份未知；收入未披露
        - id: n6
          label: Amyris 警示性先例
          detail: 类似生物基规模化故事之后，2023 年进入 Chapter 11 破产保护
        - id: n7
          label: 继续研究 / 观察
          detail: 取决于 Marshall 确认、DOE 最终落地和 Series D 条款
      edges:
        - from: n1
          to: n7
        - from: n2
          to: n7
        - from: n3
          to: n7
        - from: n4
          to: n7
        - from: n5
          to: n7
        - from: n6
          to: n7
    notes: 该建议明确取决于四个缺失输入能否解决：Marshall 状态、DOE 最终落地、Series D 条款和收入数据。四项全部解决后，可支持上调至有条件买入。
