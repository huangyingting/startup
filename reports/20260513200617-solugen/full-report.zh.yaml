      - number: '3.2'
        title: 既有化学品生产商——过氧化氢与特种氧化剂
        blocks:
          - type: paragraph
            body: >-
              全球过氧化氢市场由成熟化工集团主导，它们通过蒽醌氧化（AO）工艺生产 H2O2；该工艺是高能耗、多步骤催化循环，需要来自化石来源的氢气、 有机溶剂和高压加工设备。Evonik Industries 是全球最大
              H2O2 生产商之一；公司在 100 多个国家开展业务，2025 年集团销售额 €14.1B， 调整后 EBITDA €1.9B。Solvay 的历史可追溯到 Ernest Solvay 1863
              年在纯碱上的创新，2024 年报告基础净销售额 €4.7B，并承诺到 2050 年实现碳中和。Nouryon 原为 AkzoNobel 的特种化学品部门，是服务工业、水处理和建筑市场的主要全球 H2O2
              供应商。Arkema 生产特种过氧化物。 BASF 和 Dow 生产包括氧化剂在内的工业化学品，并服务重叠市场。这些既有厂商的核心优势来自规模：生产成本受益于数十年工艺优化；物流网络通过长期供应协议
              连接多个客户场址；技术服务团队深度嵌入废水公用事业、造纸厂和化学中间体客户的采购流程。Solugen 若要在这些垂直市场替代既有厂商，必须提供达到相同性能规格、
              成本相当或更低的产品，并用足够产能支撑供应可靠性。既有厂商的主要脆弱点在于依赖石油和化石能源；在碳定价制度收紧下，这会带来监管风险，也会在企业 ESG Scope 3 采购要求下带来声誉风险。Evonik 和
              Solvay 都披露过包含生物基化学探索的可持续项目，可能说明其对收购生物基 H2O2 技术存在潜在兴趣。
            claimRefs:
              - CP006
              - CP007
              - CP008
              - CP009
              - CP010
              - CP011
      - number: '3.3'
        title: 生物基化学品初创公司——直接同行
        blocks:
          - type: paragraph
            body: >-
              Genomatica 是与 Solugen 最直接可比的生物基化学品初创公司，率先跑通 BDO（1,4-butanediol）和己内酰胺的商业规模发酵路线，并与 Novamont、Covestro
              等建立合作。Genomatica 已披露融资超过 $100M。其路线使用全细胞发酵，这与 Solugen 的无细胞酶平台在生物学上根本不同；
              全细胞路线需要生物体封闭控制、无菌发酵环境和下游细胞分离步骤。LanzaTech 通过气体发酵，把工业废气流（钢厂尾气、农业废弃物）转化为乙醇和化学中间体； 其拆分公司 LanzaJet
              聚焦可持续航空燃料。LanzaTech 已融资超过 $500M，并运营多座商业规模工厂。它的原料（工业废气）和当前主要产品（乙醇）不同于 Solugen
              基于玉米葡萄糖的氧化剂平台，但双方都争夺生物工业投资资本和可持续合作伙伴。Ginkgo Bioworks 通过与 Zymergen 合并形成，是一家上市合成生物学平台公司 （NYSE:
              DNA），向第三方授权生物体工程能力，而不是在商业规模下自己生产化学品。Corbion 是一家盈利的荷兰公司，拥有一个多世纪发酵经验， 聚焦食品保鲜用乳酸及衍生物；它不生产 H2O2 替代品。最重要的警示性对比是
              Amyris：该公司曾上市、市值达到数十亿美元，并在融资超过 $1B 后， 因未能实现盈利规模化于 2023 年申请 Chapter 11
              破产。这说明生物基公司即便证明技术可行，仍可能无法实现商业盈利。Calysta 通过中国 Calysseo 合作， 用甲烷发酵生产单细胞蛋白（FeedKind），面向动物饲料市场，与 Solugen
              没有产品重叠。
            claimRefs:
              - CP012
              - CP013
              - CP014
              - CP015
              - CP016
              - CP017
              - CP018
      - number: '3.4'
        title: 相邻竞争者——水处理与工业工艺化学品
        blocks:
          - type: paragraph
            body: >-
              Kemira 是一家芬兰特种化学品公司，专门制造并供应用于纸浆和造纸漂白、水处理及其他工业应用的过氧化氢，直接在废水和工业水处理细分市场与 Solugen 竞争。Kemira
              的竞争强项在于深厚的水处理应用专长、造纸厂和市政水处理设施中的既有客户关系，以及由大型生产设施支撑的全球供应链。Kemira
              还提供打包技术服务，包括实时监测、流程控制和加药系统优化，这些服务在产品本身之外制造了切换成本壁垒。Solenis 是一家服务用水密集型行业的工业化学品公司，
              覆盖纸浆和造纸、油气、食品饮料等行业，提供包括氧化剂、阻垢剂和特种杀菌剂在内的工艺化学品，也在 Solugen 的废水和工业水处理细分市场竞争。Nouryon 除生产大宗 H2O2 外，还提供与 Solugen
              目标垂直市场重叠的水处理和建筑特种化学品。Cargill 运营生物工业产品项目，包括生物基农业衍生物，但未披露会与 Solugen 直接竞争的下游生物基氧化剂化学品开发项目。现状竞争力量——包括蒽醌
              H2O2、芬顿化学和氯基氧化剂等石油衍生合成路线——是任何未采用 Bioforge 供应产品的 Solugen 客户默认可选方案。在建筑垂直市场，BASF 和 Dow 供应混凝土外加剂和缓蚀剂，与 Solugen
              源自葡糖二酸的建筑化学品竞争。 基于极少网页存在判断，生物基二酸初创公司 Verdezyne 截至 2026 年 5 月似乎已不活跃，这移除了一个潜在的未来生物基化学中间体直接竞争者。
            claimRefs:
              - CP019
              - CP020
              - CP021
              - CP022
              - CP023
          - type: table
            tableRef: TP003
            claimRefs: []
      - number: '3.5'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: >-
              系统比较关键采购标准后，可以看出 Solugen 的差异化在哪里站得住，也在哪里尚未验证。在工艺可持续性——不使用化石原料、有害溶剂或显著 GHG 排放来生产化学品—— 上，Solugen
              在所有竞争者中得分最高。Evonik 和 Solvay 通过蒽醌工艺生产 H2O2，需要大量化石衍生氢气和有机溶剂。在供应规模和商业可靠性上，既有厂商拥有
              数十亿吨级全球产能、全球物流网络和与大客户持续数十年的供应协议；Solugen 仅凭一座 10,000-ton Houston 设施，加上一座仍在建设中的 Bioforge Marshall，
              无法复制这些优势。在产品收率上，Solugen 声称综合收率为 95%+，而典型全细胞发酵约为 70–80%；该主张没有公开可得的独立第三方验证。在定价上， Solugen
              声称商业规模下与石油基化学品成本相当，但未公开任何定价数据。既有厂商受益于数十年工艺优化和规模经济，Solugen 很难快速复制。多供应商并用风险为中等： 工业化学品买家常为供应安全维持双供关系，这会削弱
              Solugen 的锁定效应，但也降低试用采用的切换成本壁垒。应用特定技术服务——现场加药工程、工艺优化和监管合规支持—— 是一个不可忽视的采购标准；Evonik、Kemira 和 Solenis
              拥有经验深厚的本地团队，Solugen 在当前阶段还无法完全复制。到 2026 年 5 月，没有既有厂商公开披露 会直接与 Solugen 酶平台竞争的生物基 H2O2 开发项目。
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
          - type: table
            tableRef: TP002
            claimRefs: []
          - type: figure
            figureRef: FP002
            claimRefs: []
      - number: '3.6'
        title: 竞争护城河主张、持久性与风险清单
        blocks:
          - type: paragraph
            body: >-
              Solugen 提出四项核心护城河主张：（1）自研无细胞酶平台，若没有 Solugen 特定酶工程和催化剂知识产权，很难复制；（2）综合产品收率 95%+， 相比典型全细胞发酵约
              70–80%；（3）无有害废物、无有害排放，并以接近室温的工艺运行，使环境许可速度快于传统化工厂；（4）与 ADM 建立玉米葡萄糖原料合作， 形成纵向整合的北美生物基供应链。无细胞路线确实区别于
              Genomatica 的全细胞发酵和蒽醌工艺；它不需要生物体封闭控制、无菌发酵环境或下游细胞分离。 不过，护城河持久性取决于专利保护范围——Novozymes（全球最大工业酶公司）尚未披露用于 H2O2
              生产的竞争性无细胞酶平台，但其 R&D 能力构成潜在未来威胁。 石油价格波动是最重要的近端竞争风险：油价下跌时，石油衍生 H2O2 生产的成本优势扩大，压缩 Solugen 的成本平价窗口。Amyris
              是直接警示先例： 它融资超过 $1B、上市，并在未能实现盈利规模化后于 2023 年申请 Chapter 11。生物基领域已有多个失败案例，包括 Myriant（已清盘）和 Verdezyne（不活跃），
              说明从已验证技术走到可持续商业盈利的路径，总是比早期预测更长。独立验证 Solugen 的 IP 范围、收率主张和成本结构，是最高优先级尽调缺口。
