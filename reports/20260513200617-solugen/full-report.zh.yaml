      - number: '2.4'
        title: 市场增长驱动因素
        blocks:
          - type: paragraph
            body: >-
              多股强劲结构性力量正在加速生物基工业化学品需求，为 Solugen 提供有利市场背景。第一，碳监管在 Solugen 的主要市场 全面加强：EPA Green Chemistry Challenge Award
              项目释放了监管偏好清洁化学创新的信号；Inflation Reduction Act 的 Section 45Z 条款为可持续化学制造创造税收激励；EU Green Deal 要求工业到 2050
              年实现碳中和。第二， 供应链回流本土的势头——由疫情时期扰动和美国两党工业政策共同加速——让国内制造化学品更受青睐。Solugen 的 Minnesota 和 Texas
              设施适合承接美国原产供应承诺。第三，ESG 报告要求正沿工业供应链扩散：大型工业买家面临 Scope 3 排放披露义务， 因而更有动力从低碳化学品供应商采购。第四，DOE Bioenergy
              Technologies Office（BETO）为生物基制造放大提供拨款和成本分担， 降低早期采用者和合作伙伴风险。Solugen 已获得 $213.6M 的有条件 DOE
              贷款担保，验证了联邦层面对其模式的支持。第五， Justice40 对齐——Minnesota 的 Marshall Bioforge 场址服务于合格区域——可能带来联邦合同偏好和社区发展激励。第六，
              Solugen 声称在商业规模下与传统石油基化学品成本相当，意味着可持续溢价可能为零，从而移除采购团队围绕总拥有成本的一个主要反对点。
            claimRefs:
