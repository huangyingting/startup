    title: 公司概况
    sections:
      - number: '1.1'
        title: 创立、历史与公司身份
        blocks:
          - type: paragraph
            body: >-
              Solugen 于 2016 年在 Houston, TX 创立，两位创始人是在医学院一场扑克局上认识的研究者： Gaurab Chakrabarti 是 UT Southwestern Medical
              Center 的 MD/PhD 毕业生，研究胰腺癌药物发现； Sean Hunt 是 MIT 化学工程 PhD，博士课题聚焦贵金属催化剂。医师科学家与催化化学家的意外组合， 奠定了 Solugen
              核心创新的知识基础：用受生物启发的酶反应，替代依赖化石燃料的化学合成，提供更绿色、 能耗更低的路径。公司从一开始就把使命定义为用生物学和化学重塑化学制造业；按 Y Combinator 公司资料，
              该行业贡献了全球温室气体排放的 8% 以上。创始人称 Solugen 运营着全球第一座可持续化学工厂——这个标签 用来把 Bioforge 平台与传统石化设施区分开。公司在创业生态里推进很快：2017 年赢得
              MIT $100K 大赛， 同年加入 Y Combinator，创始人还入选 Forbes 30 Under 30。到 2018 年，Solugen 已完成 $13.5M 的 Series A，并收购
              Houston 一处棕地工业场地，用作第一座生产设施。公司总部位于 Houston, TX，拥有 20,000+ square foot 实验室、10,000 sf 仓库和同址 Bioforge，员工超过 115
              人，覆盖 7+ 个终端市场。
