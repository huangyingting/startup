      - number: '4.3'
        title: 单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >-
              Solugen 的单位经济性没有公开披露。Bioforge 平台的主要可变成本驱动，按估计重要性排序，是玉米葡萄糖原料、能源、酶生产和直接人工。玉米葡萄糖（主要碳源） 在美国大宗市场通常定价为
              $0.15–$0.25/lb（$330–$550/ton）；Solugen 与 ADM 的合作提供了部分对冲供应，但合同价格和期限未披露。公司称其无细胞酶工艺
              在室温下运行，并称这相对需要高压氢和高温有机溶剂的高能耗蒽醌（AO）过氧化氢工艺降低了能源成本。若室温主张成立，H2O2 每吨能源成本可能显著低于 AO 工艺基准。
              可比特种化学品制造商（氧化剂、螯合剂、缓蚀剂）在商业规模下毛利率通常为 20% 到 40%。按 Houston Bioforge 10,000 tons/year 产能和估计混合实现价格
              $400–$600/ton 计算，Solugen 仅 Houston 设施低端隐含年收入约为 $4M–$6M；若特种产品价格更高，达到 $600–$1,000/ton，则该设施年收入可达 $6M–$10M。
              这些估计高度不确定，且对定价假设敏感。更大的 Marshall 设施设计为 500,000 sq ft，应能生产显著更多数量，但具体产量、原料消耗和单位经济性未披露。
              尚未完成独立成本验证；所有单位经济性数据都来自公司主张、行业基准和工程估计，置信度低。
