  - id: TR001
    title: 监管 / 法律风险登记表
    notes: >-
      风险登记表覆盖截至 2026 年 5 月已知的联邦和州层面监管与法律义务。状态评估仅基于公开来源研究；具体许可编号、申请文件或 DOE 贷款条件履约情况未独立核验。严重性和可能性评级为定性评估；各行按严重性排序（高 →
      低）。这是一张枚举表：监管和法律义务可从公开来源部分枚举，但按公司名称公开检索许可级文件的颗粒度不足，无法做到穷尽覆盖。
    columns:
      - 规则 / 许可 / 案件
      - 管辖区
      - 状态
      - 可能性
      - 严重性
      - 缓解措施
      - 残余风险
      - 尽调路径
    rows:
      - - DOE LPO 有条件贷款担保（$213.6M）——法律、技术、财务、环境条件
        - 联邦（DOE）
        - 2024 年 6 月发出有条件承诺；截至 2026 年 5 月尚未最终落定
        - 高——提款前必须满足条件
        - 关键——Marshall 融资依赖该担保；延迟或撤回会卡住建设
        - DOE 尽调反映政府此前已验证；条件可能是 LPO 项目融资的标准要求
        - 贷款最终落地延迟或条件未达成，将迫使公司过桥融资或股权稀释
        - 获取 DOE 条件清单；确认法律交割时间线；核验环境审查状态
      - - TCEQ 空气质量和运营许可——Houston Bioforge（若为主要排放源则适用 Title V）
        - 州（Texas——TCEQ）
        - 运营设施推定已取得许可；公开 TCEQ 数据库未识别具体许可
        - 中——设施已运营意味着许可合规；缺口在于核验
        - 高——许可违规会触发执法；设施可能停产
        - EPA 绿色化学奖暗示监管状态良好；设施运营也暗示合规
        - 若不检索 TCEQ 许可数据库或取得公司披露，无法确认许可状态或条件
        - 向 Solugen 索取 TCEQ 许可编号；通过 TCEQ STEERS 在线数据库核验
      - - MN PCA 空气质量和环境许可——Bioforge Marshall
        - 州（Minnesota——MN PCA）
        - 尚未取得（设施在建）；许可申请状态未知
        - 高——Marshall 投运前必须取得
        - 高——许可延迟会推迟投产；条件可能要求设计变更
        - 与 ADM 共址带来既有场地经验；工业许可流程标准化
        - 新建场地尚无许可在手；申请状态和条件未知
        - 确认 MN PCA 许可申请状态；向 Solugen 索取许可条件摘要
      - - EPA《有毒物质控制法》（TSCA）——新化学品 / 重大新用途
        - 联邦（EPA）
        - 葡糖二酸及其衍生物似乎列入 TSCA 清单；未公开识别到 PMN 申报
        - 中——既有化学路径降低 TSCA 申报负担；新型产物可能触发审查
        - 中——TSCA 放行延迟可能限制新产品线商业化
        - EPA 绿色化学奖显示公司已与监管互动；生物基工艺通常面临较轻 TSCA 负担
        - 新型酶衍生化学品或重大新用途可能触发 PMN 或 SNUR 申报
        - 确认所有 Solugen 产品线的 TSCA 清单状态；识别任何待审 PMN 或 SNUR 申报
      - - OSHA PSM——过氧化氢浓度阈值
        - 联邦（OSHA）
        - H2O2 浓度 ≥52% 且超过 7,500 lb 门槛时，OSHA PSM 适用
        - 低–中 — Solugen 的酶法工艺产出稀释 H2O2；可能达不到 PSM 门槛
        - 中 — PSM 不合规会带来安全和执法风险；OSHA 处罚可能包含罚款和停产风险
        - 生物基稀释 H2O2 生产本来就是为了避开高浓度 H2O2 风险；酶法化学本身更安全
        - 如果工艺调整把 H2O2 浓缩到 PSM 门槛以上，就必须建立完整 PSM 合规项目
        - 确认 Houston 和 Marshall 的 H2O2 浓度水平；核验 OSHA PSM 是否适用
      - - IRA 第 45Z 条清洁燃料生产税收抵免 — 政策风险
        - 联邦（IRS / DOE）
        - IRA 于 2022 年通过；45Z 抵免 2025–2027 年生效；生物基化学品资格是间接的
        - 低–中 — Solugen 工业化学品能否直接适用，取决于产品资格认定
        - 低 — 若获认定有财务上行；若不适用，下行风险有限
        - 参与 DOE 生物能源技术办公室，为公司提供政策路径认知
        - 政策逆转或抵免提前终止，会消除一个潜在财务顺风
        - 确认 Solugen 是否有产品线符合 45Z 或 DOE 生物能源类抵免资格
      - - 专利组合 — 自由实施 / 竞争对手挑战风险
        - 联邦（USPTO）
        - Google Patents 确认 Solugen 专利仍有效；公开来源未发现专利诉讼
        - 低–中 — 葡糖二酸酶法氧化仍是相对早期的专利领域；竞争可能出现
        - 中 — 如果核心酶法工艺的专利挑战成功，可能削弱竞争护城河
        - 先发专利组合提供防御位置；学术论文支撑在先技术
        - 相邻酶法化学领域的竞争对手专利申请，可能给未来产品带来自由实施风险
        - 审查 USPTO 中与 Solugen 相邻的酶法氧化权利要求专利版图；确认没有待决 IPR 程序
    enumerationScope:
      coverage: partial
      basis: >-
        Regulatory obligations identified through EPA, OSHA, TCEQ, MN PCA, DOE LPO, SEC EDGAR, and Google Patents public
        sources. TCEQ and MN PCA permit-specific records for Solugen facilities were not found in publicly searchable
        databases as of May 2026, indicating search limitations rather than permit absence. The DOE loan conditions are
        referenced in the June 2024 conditional commitment announcement but not enumerated publicly. This register
        likely understates the total regulatory obligation set; primary engagement with Solugen's legal and compliance
        team is required to achieve complete coverage.
    claimRefs:
