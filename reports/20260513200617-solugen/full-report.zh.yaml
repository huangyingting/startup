      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              多家分析机构发布了全球生物基化学品市场估计；到 2030 年的预测从 $65B 到超过 $150B 不等，差异取决于范围定义、 地理覆盖和基准年份。Grand View
              Research、MarketsandMarkets、Fortune Business Insights 和 Precedence Research 均预计 CAGR 介于
              9–11%，反映监管压力加速和生产经济性改善。对 Solugen 做市场规模测算， 需要三层视角。边界最宽的 TAM（总可用市场）是整个 $4,500B 全球化学品行业；Bioforge
              平台扩展到更多产品类别后， Solugen 理论上可逐步触达这个市场。更收窄、也更可信的 TAM 约为 $98B，专指生物基化学品板块。SAM（可服务市场） 由 Solugen
              当前产品组合和目标垂直市场定义：废水处理、建筑、农业和工业 / 能源，全球约 $45–55B，北美为 $12B。 近端 SOM（可获取市场）受 Solugen 工厂产能约束——Houston Bioforge 为
              10,000 tons，Minnesota Bioforge Marshall 目标为 500,000 sf——在 Marshall 达到满负荷前，年规模估计远低于 $1B。分析师估计分歧很大，
              因为范围取舍不同：有些把 Solugen 目前并不生产的生物基溶剂和聚合物纳入其中，相对 Solugen 的真实机会抬高了市场数字。 尽调应取得 Solugen
              自己的垂直市场规模测算方法，并分别用废水、建筑和能源化学品的独立垂直市场数据做压力测试。
