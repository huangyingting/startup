      - number: '6.4'
        title: 留存、合同结构与耐久性
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Solugen
              没有披露净留存率（NRR）、总留存率（GRR）、流失率、续约率或合同期限数据。不过，工业特种化学品市场的结构特征，为估算留存动态提供了合理基础。工业水处理、建筑和农业领域的特种化学品供应协议通常期限为 1 到 3
              年，并带有续约选项；一旦产品通过认证，切换阻力很高。工业化学品认证流程包括 6 到 18 个月的性能测试、监管审查和供应链整合；买方采用新产品后，这些流程会形成结构性切换壁垒。Solugen
              的直接替代定位——生物基产品替换石油基化学品，不需要改造客户投加设备或工艺流程——降低了前期采用阻力，但不会降低认证后的切换阻力。集中在 Texas Slaton
              枢纽的能源行业客户基础，考虑到油田化学品供应对运营连续性的要求，暗示多年度供应关系。相比之下，市政废水公用事业受公共采购要求约束，合同续约时可能需要竞争性重新招标，因此结构性留存略低于私营工业买方。没有客户案例研究、续约公告或留存披露可支撑这些结构性推断。图
              FU004 中的队列留存估计，是基于行业规范的结构性类比，不是公司披露数据。
