      - number: '1.2'
        title: 技术平台——Bioforge 与 Bioflex
        blocks:
          - type: paragraph
            body: >-
              Solugen 的核心技术平台由两套集成系统组成：Bioforge 是模块化化学制造单元，Bioflex 是发酵平台， 用来生产 Bioforge 反应所需的工程酶。Bioforge
              工艺使用生物基循环原料——葡萄糖（玉米衍生糖）、 水和压缩空气——因此不需要化石燃料衍生的烃类前体。工程酶经 AI/ML 驱动的定向进化和 DNA 文库设计优化后，
              在室温下完成氧化反应，能耗显著低于传统热化学工艺。酶促步骤之后接入自研异相金属催化剂，提高转化效率和选择性。 Bioflex
              发酵平台用细菌、酵母和丝状真菌生产胞内酶与胞外酶，为酶供应提供生物制造连续性。Solugen 称， 综合产品收率超过 95%，部分情况下接近 100%，同时不产生有害废物流，几乎没有有害空气排放。公司的
              AI/ML 栈覆盖酶进化、DNA 文库设计、金属催化剂设计和工厂实时运营优化，形成纵向整合的数据飞轮；每一轮生产都会 推动后续工艺改进。完整 Bioforge
              工艺把葡萄糖、水和压缩空气送入酶氧化反应器，再经金属催化转化、蒸发和结晶， 产出工业化学品。
