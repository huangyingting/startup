          tone: positive
        - id: dep4
          label: Bioflex（酶）
          detail: 内部酶生产工厂
          tone: positive
        - id: dep5
          label: TCEQ（TX 许可）
          detail: Houston Bioforge 环境许可
          tone: neutral
        - id: dep6
          label: MN PCA（MN 许可）
          detail: Marshall Bioforge 环境许可
          tone: neutral
        - id: dep7
          label: Bioforge Marshall
          detail: 500,000 sf 在建设施
          tone: warning
      edges:
