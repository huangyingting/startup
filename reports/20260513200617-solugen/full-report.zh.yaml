      - number: '8.5'
        title: 可比公司组
        blocks:
          - type: paragraph
            body: >-
              仅靠公开来源给 Solugen 估值，需要跨三类对象搭建可比组：公开生物加工公司、失败或承压的生物基化学先例，以及作为底部参照的公开特种化学品公司。LanzaTech（NASDAQ:
              LNZA）是相关性最高的公开可比公司：它把废气转化为化学品，同样是资本密集型模式，也有政府合作伙伴画像。截至 2026 年 5 月，LanzaTech 市值约 $400M，明显低于 Solugen 约 ~$2B
              的 Series C 估值，更远低于尚未确认的 $3-4B Series D。LanzaTech
              可比项是一个警示性锚点：即便有收入、公开文件透明度和监管记录，公开市场目前愿意给商业阶段工业生物加工支付的价格就是如此。Amyris 是主要反向可比项：2021 年峰值市值约 $4B，随后在 2023 年 8
              月申请 Chapter 11 破产。它与 Solugen 的处境有实质相似之处——大额融资、机构投资人背书、生物基化学放大野心和高估值。Genomatica 仍为私有公司，累计融资约
              $260M，未公开估值标记。Corbion 和 Avient（特种化学品）分别以 1.5-2x 和 1.2x EV/Revenue 交易，为成熟特种化学业务提供底部参照。Solugen 最后一个已知估值标记仍是
              2021 年 Series C 的约 $2B——距今已超过四年，且完全发生在 Marshall 之前。上述列举仅限公开可得来源；截至 2026 年 5
              月，被付费墙挡住的分析师报告（PitchBook、Bloomberg）可能包含额外私有可比估值标记或更精确的公开可比公司。任何能访问机构数据库的市场参与者，在最终确定估值模型前，都应把这些参照与
              PitchBook 私营公司估值数据库和 Bloomberg 可比交易界面交叉核对。
