  - id: TM001
    title: 市场定义——纳入细分、排除支出与买方图谱
    columns:
      - 细分 / 类别
      - 纳入支出（估计）
      - 排除支出
      - 买方 / 付款方
      - 与 Solugen 的相关性
    rows:
      - - 废水处理化学品
        - 全球 $33B
        - 大宗水务基础设施资本开支；海水淡化膜
        - 市政公用事业；工业设施运营方
        - 核心市场；用于达成处理合规的 H2O2 和氧化剂
      - - 建筑化学品
        - 全球 $58B
        - 结构材料（钢、混凝土骨料）；重型机械
        - 建筑公司；混凝土制造商
        - 外加剂和缓蚀剂；由 LEED 驱动采用
      - - 农业特种化学品
        - ~$12B 可触达子细分市场
        - 大宗商品化肥；除草剂；种子
        - 农场经营者；农业合作社
        - 特种作物处理和土壤修复应用
      - - 工业 / 能源化学品
        - ~$8B 生物基可触达
        - 大宗石化原料；LNG；原油
        - 油气运营商；管道运营商
        - 注水、缓蚀、阻垢
      - - 生物基化学品（广义市场）
        - 全球 $65–70B（2023e）
        - 医药级；半导体工艺化学品
        - 各行业工业买方
        - Solugen 产品类别的基准参照市场
      - - 全球化学品（总行业）
        - 全球 ~$4,500B
        - 所有医药、消费、半导体化学品
        - 多元工业和消费买方
        - 理论上限；不是 Solugen 的近期目标
    notes: >-
      市场规模估计综合了多个分析师来源（Grand View Research、IBISWorld、MarketsandMarkets）和 Solugen 公司文件；数字为近似值，会受范围和方法差异影响。排除支出行列出明确不在
      Solugen 当前产品组合内的类别。
    claimRefs:
      - CM001
