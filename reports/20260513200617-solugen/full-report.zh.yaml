  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术与放大执行风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 最尖锐的执行风险，是从 Bioforge Houston（约 10,000 metric tons/year，估计约 10,000 sf）跃迁到 Bioforge Marshall（500,000
              sf，目标 2025 年秋季）。这次 50× 规模扩张，代表酶促氧化化学在没有工业模板的尺度上做同类首创商业部署。Houston Bioforge 约自 2021 年起商业运营，证明了 Solugen
              所称商业规模下的酶促工艺；但跳到 Marshall 后，50×
              体量下的反应器工程、热管理、酶催化剂通量、产品分离和废物处理都会引入重大未知。工业化学品从试点放大到商业生产，通常会暴露意外瓶颈：规模改变后的反应动力学差异、传热传质限制、催化剂失活速度，以及小体量下看不见的产品质量波动。Solugen
              在技术文件中提到一个专门用于解决台架规模和商业运营之间限制的试验工厂测试阶段，等于承认规模转换风险。但公司没有披露第三方工程验证、前端工程设计（FEED）完成情况，或针对 Marshall
              工艺设计的独立技术经济评估。Bioflex 酶生产厂也必须按比例放大，向 Marshall 供应足够的工程化酶催化剂——这是取决于内部酶制造能力的第二层放大风险。AI/ML
              辅助酶设计在设计阶段是竞争优势，但优化后的酶变体首次进入制造规模时，可能遇到不可预测的失效模式。截至 2026 年 5 月，Solugen 尚未确认 Bioforge Marshall 完工，2025
              年秋季投产目标似乎已经滑期且没有公开公告。生产时间线不确定，是投资案例中最高严重性的执行风险。
