      - number: '6.2'
        title: 命名客户与合作伙伴证据
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Solugen 公开披露了两项战略关系，构成可用的命名客户和合作伙伴证据基础。第一项是 Sasol
              Chemicals，这是一家总部位于南非的跨国特种化学品公司，在工业化学品市场拥有全球分销网络。Sasol 是 Solugen 的主要分销伙伴，为 Solugen
              目标分群中的工业化学品买方提供市场入口。Sasol 合作关系没有披露收入条款、销量承诺或客户结果。第二项是
              Archer-Daniels-Midland（ADM），一家全球食品和农业加工公司，运营北美最大的玉米湿磨综合体之一。ADM 既是 Bioforge Marshall 的主要右旋糖原料供应商——与
              Minnesota Marshall 的 ADM 玉米综合体共址相邻——也因 ADM 与农业化学品买方的关系，成为战略性的市场拓展邻接资源。Bloomberg 2023 年 1 月报道称，Solugen 正在
              Minnesota Marshall 的 ADM 综合体旁建设新的生物化学品设施，确认了共址策略。除 Sasol 和 ADM 外，公司没有披露任何命名终端客户。缺少命名客户，符合 Solugen
              这个阶段私营公司在 B2B 工业化学品商业实践中的常态：客户保密很常见，投资者沟通也不要求公开客户名称。但从投资尽调角度看，这造成了验证缺口，需要与公司一手沟通来补齐。DOE
              有条件贷款担保要求商业可行性审查，说明政府评估可能看到了未公开的客户承诺或意向书证据。
