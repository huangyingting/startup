  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Bioforge 平台——核心技术与工艺架构
        blocks:
          - type: paragraph
            body: >-
              Solugen 的 Bioforge
              平台用三种大宗投入物——右旋糖（玉米糖）、水和压缩空气——经过串联的双反应器流程，再接标准下游纯化，转化成一组氧化糖衍生物。第一台反应器是工程化酶氧化系统，在室温下运行无细胞反应。无细胞意味着体系里没有活体生物：工程化酶蛋白先从宿主微生物中分离出来，再直接投放到水溶液中，避开生物反应器污染风险、无菌维护成本，以及限制全细胞发酵平台的微生物工程约束。第二台反应器使用自有非均相金属催化剂，提高转化效率，并把产品选择性导向目标化学物种。下游处理包括蒸发器（去除水）和结晶器（产出固体最终产品）。Solugen
              声称约 1 吨原料投入可产出 1 吨产品，符合氧化糖官能化的理论原子经济性。公司声称综合收率为 95%+。该工艺不产生危险废物，几乎没有有害排放。截至 2026 年 5
              月，公开资料中没有独立第三方收率验证，这是重大尽调缺口。产品栈图（FE001）和运营流程表（TE003）概括了这套架构。
