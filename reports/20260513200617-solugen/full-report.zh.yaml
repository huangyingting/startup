      - number: '6.6'
        title: 反向信号与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              客户证据基础中最重要的反向信号，是除分销和原料合作伙伴外，完全没有命名终端客户证据。Solugen 的 Glassdoor 员工评论（EI_IE3424745）和 Indeed
              评论，主题与成长期工业初创公司一致：快速扩张挑战、组织结构演变，以及建设同类首创制造平台的压力。两个评论平台都没有提供客户不满、试点部署失败或采购取消的直接证据；但没有负面客户证据，不能当作正面客户证据——这反映的是公司
              B2B 关系的私密性。未发现将 Solugen 列为供应商的公开采购记录、水务公用事业招标文件或建筑 RFQ 回复。截至 2026 年 5 月，没有第三方分析师报告、市场评估或行业出版物点名 Solugen
              的终端客户。DOE 有条件贷款担保是最强的外部商业验证，因为 Loan Programs Office 尽调流程通常要求来自锚定客户的商业承诺证据；但 DOE
              审阅的条款和具体客户承诺并未公开。缺少公开客户结果、NPS 数据或第三方评论，造成对投资尽调重要的证据缺口；应通过一手沟通要求客户推荐、匿名队列数据和合同条款披露来补齐。
