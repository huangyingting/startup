companyProfile:
  summary: >-
    Solugen 是一家总部位于 Houston, Texas 的工业生物技术公司，2016 年由 Gaurab Chakrabarti（CEO） 和 Sean Hunt（CTO）创立。公司依托自研 Bioforge
    平台，用酶促氧化工艺把生物基原料转化为高价值工业化学品， 为废水处理、建筑、农业和能源市场提供石油衍生化学品的生物基替代品。Solugen 已通过四轮融资累计募得 $640M+，并拿到 $213.6M 的 DOE
    有条件贷款担保，用于在 Minnesota 的 Marshall 建设第二座商业化工厂。
