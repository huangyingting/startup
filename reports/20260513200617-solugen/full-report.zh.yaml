  - id: TM004
    title: 增长驱动因素与采用约束
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 对 Solugen 的影响
      - 尽调问题
    rows:
      - - 碳监管（EPA、IRA Sec. 45Z、EU Green Deal）
        - 顺风
        - 近期（2024–2028）
        - 结构性需求拉动；生物化学品生产商可获得税收激励
        - 确认 Solugen 是否符合 IRA Section 45Z 抵免资格，并量化收益
      - - 供应链回流本土（美国工业政策）
        - 顺风
        - 近期（2024–2027）
        - 联邦采购和工业寻源偏好本土来源
        - 评估 Solugen 获取政府合同或国防相关合同的能力
      - - 工业买方承受 ESG / Scope 3 报告压力
        - 顺风
        - 中期（2025–2030）
        - 采购团队因低碳采购获得激励；Solugen 形成差异化
        - 量化有公开 Scope 3 承诺的 Solugen 客户数量
      - - 客户认证周期（每个客户 12–24 个月）
        - 逆风
        - 近期（持续）
        - 收入爬坡慢于交易管线显示；烧钱周期拉长
        - 向 Solugen 管理层获取平均销售周期和赢单率数据
      - - 石油价格波动（削弱生物基成本优势）
        - 逆风
        - 周期性（持续）
        - 成本平价主张暴露于油价下行；TAM 可能实际收缩
        - 用 $40–$120/bbl 油价情景压力测试 Solugen 成本模型
      - - 大型工业买方怀疑首套规模化装置
        - 逆风
        - 近期（随 Marshall 爬坡而减弱）
        - 拖慢大客户采用；签全面合同前需要试点项目
        - 向 Solugen 获取参考客户名单及其认证阶段
    notes: 驱动因素和约束来自监管来源（EPA、DOE）、公司披露（Solugen 网站、DOE 贷款担保新闻稿），以及行业媒体和分析师报告的行业分析。时间判断是基于监管节奏和行业采用模式的方向性估计；实际时间线可能不同。
