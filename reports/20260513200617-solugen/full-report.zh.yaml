      - number: '5.6'
        title: 质量控制、安全、合规与第三方验证
        blocks:
          - type: paragraph
            body: >-
              Solugen 的技术和环境主张拿到过三类值得注意的第三方验证。2023 年获得的 EPA Green Chemistry Challenge
              Award，按绿色化学十二项原则评估化学工艺，包括源头减量、更安全化学品、原子经济性和降低能源需求。该奖项提供独立监管背书，说明 Bioforge 工艺符合 EPA 对环境更优化学的标准。DOE Loan
              Programs Office 对 Bioforge Marshall 项目的有条件承诺，要求完成覆盖技术、环境和商业可行性的严格尽调审查——这为技术就绪度提供了第二项政府机构验证。Fast Company
              2022 年将 Solugen 评为制造业第二大最具创新力公司，代表商业媒体的第三方认可，但不是技术标准。工艺安全和环境合规方面，Solugen
              自己披露该工艺不产生危险废物，几乎没有有害排放。无细胞设计消除了病原微生物暴露相关的生物危害污染担忧。截至 2026 年 5 月，Solugen 没有公开确认取得 ISO 9001
              或同等质量管理体系认证；其生产的工业化学品也不需要 GMP 或 FDA 监管流程。信任与质量表（TE004）汇总了完整合规姿态。
