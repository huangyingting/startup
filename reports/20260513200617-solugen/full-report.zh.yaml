        - Marshall 失去主要融资来源；形成 $200M+ 资本缺口；迫使公司以稀释方式融资
        - 暂停；要求 Solugen 管理层就 DOE 时间表和替代方案做一手沟通
      - - Marshall 规模下披露的收入和利润率低于盈亏平衡
