      - number: '8.2'
        title: 建议、置信度与风险评级
        blocks:
          - type: paragraph
            body: >-
              建议为继续研究 / 观察。这是有条件的立场：Solugen 在 Houston 规模上的技术验证、机构投资人质量和 DOE
              验证，确实是气候科技工业领域的差异点；但如果没有与管理层一手沟通就投入资本，就等于承销一个不透明的私有估值，同时缺乏对最关键近期里程碑的充分核实。整体置信度为中等——Houston 规模技术验证为高，投资人质量和
              DOE 承诺可信度为中，Marshall 执行时间线、Series D 估值和商业财务牵引力为低。风险评级为高，核心来自三项结构性脆弱性：Marshall 放大执行风险（50x 未验证扩产，2025
              年秋季目标已滑期）、DOE 条件风险（$213.6M 承诺仍有条件且未放款，未披露未完成条件），以及估值不透明风险（Series D 条款未核实、Kennivik
              身份未披露、公开披露中没有收入和毛利率）。Amyris 先例——峰值估值约 $4B，随后在 2023 年申请 Chapter 11
              破产——与本案直接相关，整个尽调过程都必须记在心里。能把立场上调为有条件买入的关键信号包括：（1）确认 Marshall 建设完成并启动商业生产；（2）宣布 DOE 贷款最终落地；（3）一手沟通确认 Series
              D 条款、Kennivik 的机构身份和可信股权结构表；（4）至少在 NDA 下获得方向性的收入和毛利率数据。投资 KPI 评分卡给出维度级判断：市场机会 7/10（规模大、长期趋势明确），技术验证
              7/10（Houston 已商业化，Marshall 尚未验证），融资韧性 6/10（资本实力强，但 DOE 仍有条件），风险画像 3/10（执行和不透明风险高），估值支撑 3/10（公开数据不足以给本轮定价）。
