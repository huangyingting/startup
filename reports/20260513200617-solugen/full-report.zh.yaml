  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              全球化学品行业年规模超过 $4,500B，覆盖石化原料、特种化学品、农业化学品、医药原料和工业化学品。Solugen
              的生物基化学路线瞄准其中一个明确子集：可在工业应用中替代石油衍生化学品的氧化葡萄糖衍生物。最直接可比的参照市场 是生物基化学品板块，2023 年全球估计为 $65–70B，2030 年预计达到
              $98–120B。在这个更大板块内，Solugen 当前服务的核心垂直市场——废水处理化学品（全球 $33B）、建筑化学品（全球 $58B）、农业特种化学品（相关可服务子市场 约 $12B）以及工业 /
              能源领域可由生物基方案覆盖的化学品（约 $8B）——合计代表约 $12B 的北美可服务市场。关键边界条件
              在于，生物基化学品能否在商业规模下达到与既有石油衍生产品相当或更好的性能，因为所有目标垂直市场要大规模采用， 都需要在价格相当的前提下替换。现状替代品包括石油衍生过氧化氢（全球市场约
              ~$3.6B）、葡糖二酸以及其他通过高能耗蒽醌 和化石燃料工艺制造的氧化剂。Solugen 可服务市场明确排除的支出包括医药级化学品、半导体工艺化学品，以及农业宏观投入品
              （大宗化肥、商品化除草剂）；在这些领域，生物基价值主张要么不够差异化，要么尚未商业验证。
