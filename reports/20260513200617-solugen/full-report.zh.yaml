  - id: TP001
    title: 竞争对手画像表
    notes: 融资数据来自公开披露报道和背景事实；收入数字来自公司年报或官方披露。“大型规模”指收入达数十亿美元级、但本表没有具体来源数字的公司。状态反映 2026 年 5 月的研究日期。
    columns:
      - 竞争对手
      - 类别
      - 规模 / 融资
      - 目标细分市场
      - 差异化
      - 相对 Solugen 的局限
    rows:
      - - Evonik Industries
        - 既有 H2O2 生产商
        - €14.1B 收入（2025）；31,000 名员工；>100 个国家
        - 废水处理、纸浆与造纸、化学合成
        - 规模、多站点供应、全球物流、数十年客户关系
        - 依赖化石原料；蒽醌法；没有生物基路径
      - - Solvay
        - 既有 H2O2 生产商
        - €4.7B 净销售额（2024）；约 9,000 名员工；Euronext 上市
        - 废水、食品安全、特种化学品、建筑
        - 160 年化学积累、既有客户信任、多元产品组合
        - 碳密集工艺；承诺 2050 年碳中和，但没有生物基 H2O2
      - - Nouryon
        - 既有特种化学品生产商
        - 大型规模；前身为 AkzoNobel Specialty Chemicals；收入数十亿美元
        - H2O2、特种过氧化物、水处理、造纸、建筑
        - 特种化学品组合广、分销网络成熟
        - 石油衍生原料；未披露生物基差异化
      - - Genomatica
        - 生物基化学品创业公司
        - 已融资 $100M+；与 Novamont 和 Covestro 合作
        - Bio-BDO（尼龙、PBT）、己内酰胺、生物基聚合物
        - BDO 的发酵路线已证明商业规模；合作伙伴网络强
        - 全细胞发酵；不生产 H2O2 或氧化剂替代品
      - - LanzaTech
        - 生物基化学品创业公司
        - 已融资 $500M+；多座商业化工厂在运营
        - 工业废气制乙醇；化学品；LanzaJet SAF
        - 废气原料增值；行业合作多元；LCA 已验证
        - 原料不同（废气 vs. 葡萄糖）；主要产品是乙醇，不是氧化剂
      - - Ginkgo Bioworks
        - 合成生物学平台
        - '上市（NYSE: DNA）；融资规模大；Zymergen 合并后'
        - 通过许可平台生产生物基化学品；广义工业生物技术
        - 平台模式；生物体库庞大；客户基础广
        - 不生产自有商业化化学品；平台 / 授权模式有风险
      - - Kemira
        - 相邻水处理化学品
        - 大型规模；芬兰公司；收入数十亿美元
        - 纸浆与造纸 H2O2、市政水处理、油气工艺化学品
        - 水处理应用经验深；捆绑技术服务
        - 蒽醌法 H2O2；化石来源；没有生物基差异化
      - - Solenis
        - 相邻工业化学品
        - 大型规模；私募股权支持；收入数十亿美元
        - 纸浆与造纸、水处理、油气、食品与饮料工艺化学品
        - 特种化学品配方广；技术服务组织强
        - 石油衍生工艺化学品；没有生物基替代产品
      - - Corbion
        - 生物基发酵公司
        - 盈利；Euronext Amsterdam 上市；约 $1B 收入
        - 乳酸、食品保鲜、生物基聚合物、藻类成分
        - 100+ 年发酵积累；盈利；产品组合多元
        - 不生产 H2O2 或氧化剂替代品；终端市场不同
      - - Amyris（2023 年破产）
        - 生物基化学品创业公司 — 警示先例
        - 已融资 $1B+；NASDAQ 上市（AMRS）；2023 年申请 Chapter 11
        - 特种生物基成分（化妆品、香精香料、燃料）
        - 早期生物基特种化学品规模化先行者；技术已验证
        - 2023 年申请破产；为生物基规模化风险提供警示先例
