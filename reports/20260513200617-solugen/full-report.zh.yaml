      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              从公开证据看，Solugen 的退出准备度较低：公司未披露经审计财务，没有公布 IPO 时间线，Series D 尚未确认且领投方不透明，核心收入拐点资产（Marshall）也错过了公司曾表述的投产时间线。考虑到
              Solugen 的酶 IP、DOE 验证和机构投资人基础，特种化学品公司或工业集团作为战略买家是合理退出路径。如果 Marshall 实现商业生产且 Solugen 披露财务，IPO
              也有可能；但缺少这些条件，IPO 不是近期事件。以披露估值做老股出售或共同投资也可能发生，但前提是确认 Series D 条款。投资逻辑破裂和止损触发条件表列出五个需要立即行动的具体阈值：Marshall
              建设被取消或无限期延迟，DOE 贷款到 2026 年中仍未最终落地，披露的收入和毛利率低于盈亏平衡，Series D 领投方身份暴露治理冲突，以及石油价格持续低于
              $40/barrel。这些是可监控的资本纪律标准，不是概率估计。最终尽调问题表列出五项能大幅降低不确定性的具体信息请求：Marshall 建设状态（当前完工百分比和更新后的商业启动日期）、DOE
              贷款最终落地时间线（剩余未完成条件）、Series D 条款和 Kennivik 身份（SEC Form D 搜索、Delaware 实体搜索）、收入和单位经济性（CFO 在 NDA 下提供的
              FY2024-2025 数据），以及含清算优先权压力的股权结构表（完整股权结构表及清算优先权）。这些事项都不要求 Solugen
              公开披露敏感信息；任何严肃机构投资人在投资前都会提出这些标准尽调请求。决策含义很清楚：在获得 Marshall 状态和 Series D 条款的一手沟通前，不要投入资本。如果 Solugen
              管理层愿意配合，标准尽调流程就能满足从继续研究上调到有条件买入的条件。
            claimRefs:
