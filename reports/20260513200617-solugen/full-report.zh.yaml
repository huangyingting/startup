  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分群与市场覆盖
        blocks:
          - type: paragraph
            body: >-
              Solugen 用基于 Bioforge
              酶促工艺的生物基产品组合，面向五类主要工业化学品客户。第一类、也是已披露的最大分群，是废水处理——包括市政公用事业和工业工厂，它们需要氧化剂（生物基过氧化氢等效品）和螯合剂（葡糖二酸衍生物）来阻垢、去除污染物和控制腐蚀。American
              Water Works Association（AWWA）和 Water Environment
              Federation（WEF）是这些买方的主要专业协会；买方群体覆盖北美数万家市政公用事业和工业设施。第二类是建筑化学，葡糖二酸衍生物在基础设施项目中充当混凝土外加剂、阻垢剂和防腐蚀剂；买方包括水泥生产商和特种建筑化学配方商，其代表协会包括
              Associated General Contractors（AGC）和 Portland Cement Association（PCA）。第三类是农业，生物基螯合剂改善肥料中微量营养素的生物可利用性；买方是受
              USDA AMS 监管的农化公司和精准营养配方商。第四类是油气能源行业，主要通过 Texas Slaton 配送枢纽服务；买方包括油田服务公司和 E&P 运营商，它们使用 API
              成员公司代表的阻垢剂和水处理化学品。第五类、也是新兴分群，是广义 ESG 驱动的工业采购，Solugen 的生物基产品帮助企业在多个垂直领域降低 Scope 3 排放。Solugen
              公开称其服务七个或更多不同市场，说明五个主要分群之外还有额外利基应用。
