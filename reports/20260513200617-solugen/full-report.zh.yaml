      - number: '5.5'
        title: 技术差异化、IP 与竞争护城河
        blocks:
          - type: paragraph
            body: >-
              Solugen 的技术差异化靠四根相互重叠的支柱支撑。第一，无细胞酶促氧化路线不同于传统石油基蒽醌法，也不同于生物燃料时代的全细胞发酵。Evonik、Solvay 和 Nouryon
              使用的蒽醌法需要化石来源氢气、有机溶剂和高压设备。Genomatica 等平台采用的全细胞发酵，则需要无菌生物反应器容器、微生物封存，以及细胞分离下游步骤。Solugen
              的无细胞路线在室温和常压下运行，既取消高能耗工艺要求，也避开微生物封存约束。第二，Solugen
              声称其商业规模无细胞酶促平台属于同类首创；公开可识别的直接竞争对手中，没有公司在商业规模下用同样的无细胞酶促工艺生产 H2O2 或葡糖二酸。第三，自有酶变体和金属催化剂配方构成商业秘密，也可能是受专利保护的
              IP。以 Solugen 作为专利权人在 Google Patents 搜索可返回结果，但专利组合的范围和可执行性没有公开披露。第四，AI/ML 酶发现平台形成学习飞轮：筛选的变体越多，ML
              模型越好，从而加速新酶家族发现，并支持产品线快速延展。产品成熟度能力图（FE004）按这些维度比较了四项平台资产。
