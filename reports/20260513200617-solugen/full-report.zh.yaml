      - number: '1.4'
        title: 设施、规模与运营里程碑
        blocks:
          - type: paragraph
            body: >-
              Solugen 的实体基础设施分布在三个不同地址。Houston, TX 总部包括一间 20,000+ square foot 实验室、 一座 2021 年投产的 10,000-ton-capacity
              Bioforge——这标志着公司从示范规模走向商业生产——以及 10,000 sf 产品仓库。第二个运营地址位于 Slaton, TX，提供 20,000 square foot 配送枢纽，专门服务能源行业客户。
              Bioforge Marshall 是 Solugen 在 Minnesota 的 Marshall 推出的旗舰扩张项目，设施面积 500,000 square foot， 选址紧邻 ADM
              的玉米加工综合体，便于直接协同获取玉米衍生葡萄糖原料。项目 2024 年破土后开工，最初计划于 2025 年秋季投产。Bioforge Marshall 预计相比传统方法每年最多减少 18 million
              kilograms 碳排放， 创造最多 100 个建筑岗位和 56 个永久全职制造岗位，并通过与 Marshall Public Schools 和 Southwest MN Private Industry
              Council 签署 MOU 支持社区发展。该项目契合 White House Justice40 Initiative，也是 Solugen 获得 $213.6M DOE 有条件贷款担保的基础。截至 2026
              年 5 月报告日，除 2024 年破土公告外，尚未从其他来源 获得 Bioforge Marshall 运营状态或调试进展的独立确认，因此该设施当前状态仍是一个证据缺口。
