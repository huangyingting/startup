  - id: TR005
    title: 缓释措施与否决标准表
    notes: 否决标准定义会实质改变投资风险评估、并打破投资逻辑的事件。可监测触发因素是可通过公开披露、一级沟通或行业监测跟踪的信号。行动含义反映各阈值下的组合管理决策。
    columns:
      - 风险
      - 可监测触发因素
      - 阈值 / 事件
      - 行动含义
    rows:
      - - Bioforge Marshall 施工失败 / 无限期延误
        - 公司新闻稿、DOE 状态更新，或 Q2 2026 之后仍没有 Marshall 投产公告
        - 到 Q3 2026 仍未确认 Marshall 开始生产（比原目标晚一年）
        - 投资逻辑破裂 — 收入拐点假设失效；进一步承诺前，必须拿到修订后的施工时间表和资本计划
      - - DOE 贷款担保撤回或无限期延误
        - Q4 2026 前没有 DOE 贷款交割公告；DOE LPO 项目遭遇监管或政治扰动
        - 有条件承诺到期或被公开撤销
        - 高紧迫度 — 要求立即披露替代融资计划；评估紧急股权融资带来的稀释风险
      - - ADM 供应中断或合同终止
        - ADM 新闻稿、供应中断消息，或 Solugen 关于原料替代的声明
        - ADM 终止或暂停 Marshall 右旋糖供应协议
        - Marshall 运营投资逻辑破裂 — 要求替代原料计划；评估 Houston 能否独立维持商业运营
      - - 关键创始人离职（CEO 或 CTO）
        - 公司公告、LinkedIn 更新，或媒体关于领导层变动的报道
        - Gaurab Chakrabarti 或 Sean Hunt 离开 Solugen
        - 重大反向信号 — 要求董事会和投资人解释继任计划；监测 DOE 与投资人关系延续性
      - - 石油价格持续低于 $40/barrel
        - EIA 原油价格数据；Bloomberg 大宗商品指数
        - WTI 原油连续 6+ 个月低于 $40/barrel
        - 竞争风险上升 — 要求更新 Solugen 产品与石油基替代品的成本平价分析；评估利润率影响
      - - 监管执法行动或许可被拒
        - TCEQ、MN PCA 或 EPA 执法记录；EPA ECHO 数据库
        - Houston 或 Marshall 出现任何正式执法行动、同意令或许可被拒
        - 高严重性 — 要求解释和补救计划；评估对 Marshall 施工和运营时间表的影响
      - - 主要竞争对手成功商业化酶法葡糖二酸替代品
        - Chemical Engineering、ICIS、C&EN 的专利申请、产品公告和行业媒体报道
