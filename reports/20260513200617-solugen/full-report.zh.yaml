    notes: 数值单位为百万美元。特种化学品底部使用 Corbion / Avient EV/Revenue，并套用到估计 Houston 收入。所有 Solugen 情景值均为分析师估计。
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 投委会可用评分卡，从 8 个投资维度按 0-10 分评价 Solugen。
    claimRefs:
      - CV006
      - CV007
      - CV011
      - CV013
      - CV023
      - CV032
      - CV033
      - CV037
    data:
      items:
        - label: 市场机会
          value: 7/10
          note: 生物基化学品 TAM $200B+；长期 ESG 顺风；对石油价格敏感
        - label: 技术证明
          value: 7/10
          note: Houston Bioforge 自 2021 年起商业化；Marshall 50x 规模扩张未验证
        - label: 融资韧性
          value: 6/10
          note: 已融资 $640M；DOE 条件性；Kennivik 不透明；烧钱速度未知
        - label: 投资者质量
          value: 8/10
          note: GIC, Temasek, BlackRock, Baillie Gifford 参与 Series C；机构信号强
        - label: 风险画像
          value: 3/10
          note: 高：Marshall 执行、DOE 条件性、估值不透明、Amyris 先例
        - label: 估值支撑
          value: 3/10
          note: Series D 未确认；收入未披露；上市可比相对隐含价值深度折价
        - label: 退出准备度
          value: 3/10
          note: 尚不具备 IPO 条件；无经审计财务；战略退出路径取决于 Marshall 完工
        - label: 证据质量
          value: 4/10
          note: 技术和投资者质量证据强；财务、Series D 和 Marshall 状态证据弱
    notes: 0-10 分评分反映基于公开来源判断的可投资性和证据质量，不代表公司绝对质量。风险项 3 分并不意味着 Solugen 生意差；它只说明公开记录还不足以让投资人据此承诺出资。
