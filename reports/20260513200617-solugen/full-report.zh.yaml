      - number: '5.4'
        title: 制造设施、产能与供应链整合
        blocks:
          - type: paragraph
            body: >-
              Solugen 运营两座生产设施和一个配送枢纽。Bioforge Houston 是第一座商业化 Bioforge，包括 20,000+ square-foot 实验室和制造车间、约 10,000 metric
              tons per year 的产品产能，以及 10,000 square-foot 仓库。Houston 约自 2021 年起运营。Texas Slaton 配送枢纽是一座 20,000 square-foot
              设施，专门服务 Texas/Gulf Coast 地区能源行业客户。Bioforge Marshall 是公司的计划扩建设施：一座位于 Minnesota Marshall、在建的 500,000
              square-foot 制造综合体，毗邻 Archer-Daniels-Midland（ADM）玉米湿磨综合体。毗邻 ADM 让 Solugen
              与主要右旋糖供应源形成直接物理共址，降低入厂物流成本和原料供应链风险。DOE 的 Loan Programs Office 已发出 $213.6 million 贷款担保的有条件承诺，支持 Bioforge
              Marshall 建设，前提是技术、环境和商业审查持续令人满意。截至 2026 年 5 月研究日，Marshall 2025 年秋季目标完工日期尚未确认达成，这是一个状态待核实的尽调项。与 ADM
              的供应链整合，以及通过 Sasol 合作伙伴做化学品分销，是关键结构性依赖。关键依赖图（FE003）展示了主要上游和下游依赖。
