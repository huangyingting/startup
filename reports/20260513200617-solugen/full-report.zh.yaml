      - number: '4.2'
        title: 定价与变现机制
        blocks:
          - type: paragraph
            body: >-
              Solugen 所有产品线的标价、合同价和每吨实现收入都完全未披露。公开可得的唯一定价基准来自传统（石油衍生）过氧化氢：大宗交付的商品级工业 H2O2 通常约为
              $300–$400/ton，食品级和特种级浓度则可达到 $500–$700/ton。葡糖二酸衍生物和缓蚀剂等特种氧化剂——也是 Solugen 的差异化产品之一——
              通常以更高价格销售；按行业化学品市场基准，特种化学品等级约为 $1,000–$3,000/ton。Solugen 声称商业规模下与传统化学品成本相当，这意味着其定价设在或接近 传统商品级 H2O2
              基准（而不是收取生物溢价），但这仍是未经验证的公司主张。这类工业化学品的定价机制通常是带有基于销量阶梯定价的长期供应合同，而不是现货交易；
              因此收入可预测性高度依赖合同期限和续约条款，而这些均未披露。一个重要变现风险是：如果 Solugen 按商品平价而不是生物基溢价定价，毛利率就完全依赖比传统生产商
              更低的销货成本，而这一点尚未独立验证。任何高于商品定价的实际生物基溢价——例如来自废水公用事业或有可持续目标的建筑公司的 ESG 驱动采购要求——都会扩大毛利率， 但已签合同中这种溢价的幅度未知。
