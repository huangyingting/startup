      - number: '7.7'
        title: 人员、治理与执行能力风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 的人员风险锚定在两位创始人的关键人集中：Gaurab Chakrabarti（CEO，MD/PhD UT Southwestern）和 Sean Hunt（CTO，PhD MIT）。两位创始人都是
              Solugen 科学可信度、投资者关系、客户开发、监管沟通和战略方向的核心。Chakrabarti 是公司对外形象，并推动商业叙事；Hunt
              则支撑酶设计平台的技术可信度。任一创始人离职都将构成重大不利事件，可能影响投资者信心、客户关系和 DOE 贷款最终落地。Solugen 有 115+ 名员工；相对于完成 Bioforge Marshall
              建设、入职并培训大幅扩大的员工队伍、同时管理 Houston 和 Marshall 运营、推进多条产品线和客户关系所需的运营规模，领导团队显得偏薄。Solugen
              董事会没有公开披露独立非执行董事任命；对于一家已融资 $640M+、即将进入重大资本部署阶段的公司，董事会治理深度是标准尽调关注点。员工数从当前约 115+ 增长到运营 500,000 sf
              设施所需水平，将要求在生化工程、工艺运营、安全、环境合规和商业岗位上激进招聘，而这些岗位都面对竞争激烈的劳动力市场。技术人才留存尤其紧迫：具备商业规模经验的生化工程师和酶设计研究人员，在不断扩大的生物工业经济中需求很高；Solugen
              要与资源更充足的既有企业和其他资金充足的生物基初创公司争夺这些人才。研究时，Solugen 的 Glassdoor 和 Indeed 评论档案返回损坏或无法访问的结果，没有提供反向或证实性的员工体验信号。
