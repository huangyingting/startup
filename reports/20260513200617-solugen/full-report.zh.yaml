      - number: '7.5'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 的竞争风险格局由两个结构性威胁锚定：石油价格波动，以及 Amyris 2023 年破产所示范的生物基化学品放大失败先例。Amyris 曾是领先的生物基特种化学品公司，公开和私募资本合计募集约
              $1B，并实现商业规模生产；但它在 2023 年申请 Chapter 11 破产，理由包括放大成本、原料价格波动，以及石油基替代品带来的竞争压力。Amyris
              的失败说明，生物基化学品做到商业规模是可行的，但还不够——公司还必须在投入成本波动的条件下，与既有供应商实现成本平价。Solugen 的酶促工艺在架构上不同于 Amyris 的发酵路线，DOE
              支持也提供了不同的财务架构；但底层竞争动态相似：如果石油价格大幅下跌，生物基替代品的相对成本优势会收窄。美国碳定价仍不足以为生物基工业化学品创造强制需求——自愿 ESG
              采购市场真实存在，但如果没有具备成本竞争力的经济性，它还不足以支撑 Solugen 规划中的规模。Evonik、Solvay、BASF 和 Dow 等既有化学品公司拥有大量 R&D
              预算，可能投资更清洁的酶促或催化工艺；虽然酶促化学的先发优势显著，但并非永久。客户切换成本是双刃剑：6–18 个月认证周期在客户通过认证后创造留存，但也成为 Solugen
              替换深度嵌入的既有供应商的障碍。Sasol 作为分销伙伴有助于市场进入，但也意味着 Solugen 的市场拓展成功部分取决于 Sasol 的商业执行和客户关系；如果 Sasol
              优先其他产品线，就会形成间接竞争风险。
