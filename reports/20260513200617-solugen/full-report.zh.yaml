        - 低—中
        - 要求提供 Houston Bioforge 第三方收率验证；确认没有未披露的工艺损失
      - - 室温、无危险废物工艺，许可更快
        - 监管变化削弱许可优势；既有厂商随时间采用更清洁工艺
        - 低
        - 核验 Bioforge Marshall 相比同类化工厂的许可时间线；确认 EPA 状态
      - - 商业规模下与石油化学品成本平价
        - 油价下跌拉大成本差距；ADM 葡萄糖价格波动压缩利润率
        - 高
        - 获取独立成本审计；建模玉米 / 葡萄糖价格敏感性；披露完整 COGS 结构
      - - ADM 合作锁定低成本葡萄糖原料供应
