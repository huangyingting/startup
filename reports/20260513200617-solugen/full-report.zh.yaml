      - number: '5.2'
        title: AI/ML 平台与酶工程能力
        blocks:
          - type: paragraph
            body: >-
              Solugen 的工程能力已经大幅超出传统生物化学。公司把 AI 和机器学习用在三个功能区：用于生成酶变体候选的 DNA 文库设计、金属催化剂设计优化，以及 Bioforge
              设施的制造运营优化。在酶工程上，平台把三套互补方法拼在一起：计算理性设计（用结构预测模型提出有益突变）、定向进化（通过实验室筛选反复选择高活性酶变体），以及在不断扩展的实验数据集上训练机器学习模型，预测下一批该合成哪些变体。学术文献和工业生物技术出版物显示，这种整合方法——有时称为
              ML 引导定向进化——已经成为工业酶工程的主流范式。Solugen 的 Bioflex
              发酵厂可在多种微生物底盘上生产胞内和胞外酶，包括细菌、酵母和丝状真菌。多底盘能力让公司可按具体酶类别灵活选择表达策略。研发实验室配有 UPLC、GC、ICP、TOF-MS 和 NMR
              等分析仪器，用于工艺和产品表征。试验工厂在转入商业运营前，以中间规模测试酶和金属催化剂，把台架化学和全规模 Bioforge 部署接起来。
            claimRefs:
              - CE008
              - CE009
              - CE010
              - CE011
              - CE012
              - CE027
      - number: '5.3'
        title: 产品线与终端市场应用
        blocks:
          - type: paragraph
            body: >-
              Solugen 的 Bioforge 生产一族基于氧化葡萄糖的特种化学品。主要商业产品线包括：（1）生物基过氧化氢等效品——功能上可替代蒽醌法生产的石油基
              H2O2，在废水处理、漂白和消毒中充当氧化剂；（2）葡糖二酸及其衍生物，在工业废水处理（阻垢）、建筑化学（混凝土外加剂和防腐蚀剂）以及农业应用（养分螯合）中作为螯合剂和掩蔽剂；（3）葡萄糖酸衍生物，用作温和工业清洗剂和食品级酸味剂。Solugen
              称其服务七个或更多不同终端市场，包括市政和工业废水处理、工业水处理、建筑、农业以及能源行业化学品应用。产品定位是现有石油基化学品的直接替代品，不要求客户改造投加设备或应用流程。这个直接替代定位在商业上很重要，因为它降低客户采用阻力——采购团队可以按既有性能规格认证
              Solugen 产品，而不是重新设计流程。产品模块和资产矩阵（TE001）、工作流和用例表（TE002）把这些产品线映射到买方、工作流和限制。
