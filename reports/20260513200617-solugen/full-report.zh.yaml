      - number: '7.4'
        title: 运营与供应链风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 的运营风险由三项相互关联的依赖塑造：ADM 是 Bioforge Marshall 唯一公开的原料供应商；Minnesota Marshall 建设需要执行到位；运营一座 500,000 sf
              设施还要求员工和基础设施完成大规模转换。ADM 在规划中的 Marshall 场址旁运营北美最大的玉米湿磨综合体之一；共址带来显著物流和成本优势，但也让右旋糖投入形成单一供应商集中风险。如果 ADM
              因作物歉收、Marshall 综合体运营问题、合同争议或战略方向改变而发生供应中断，Solugen 没有为 Marshall
              公开披露备用原料供应选项。玉米和右旋糖价格由大宗商品驱动，受天气、地缘政治和农业政策波动影响；价格上涨会直接进入 Solugen 的投入成本结构。Marshall
              建设执行风险很高：该设施需要专用工艺设备、生物反应器系统、酶生产基础设施、化学加工设备和环境控制系统；这些环节都面临供应链交期、安装顺序风险，以及中西部北部劳动力可得性限制。Minnesota
              气候带来的天气延误，也是潜在建设进度风险。Bioforge Houston 的运营连续性风险较低（该设施已运营数年），但仍然存在：Houston
              任何计划外停机、设备故障或安全事件都会影响近期收入产生。员工留存是不断上升的运营风险：Solugen 有 115+ 名员工，其中许多是专业生化工程师、工艺工程师和 AI/ML
              研究人员，来自其他生物工业和化学技术公司的竞争性人才压力很大。随着运营放大到 Marshall，公司需要大幅扩张员工队伍，在本已复杂的运营过渡上再叠加执行风险。
