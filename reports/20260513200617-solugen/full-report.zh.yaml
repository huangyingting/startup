        - 中
        - 审阅 ADM 合同条款；确认价格锁定期限；评估第二原料来源
      - - Houston Bioforge 单一设施风险
        - 工厂停产、事故或不可抗力会让客户断供
        - 高
        - 确认业务连续性保险；客户合同不可抗力条款；Marshall 时间线
