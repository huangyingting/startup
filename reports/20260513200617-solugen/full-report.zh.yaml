        title: 技术路线图与未来开发
        blocks:
          - type: paragraph
            body: >-
              Solugen 近期技术路线图围绕三条线。第一，Bioforge Marshall 商业投产；如果按计划完工，制造占地将比 Houston 大约增加 50 倍，也会打开 Bioforge
              工艺在完全工业规模下的首次大型验证。第二，公司的 AI/ML
              平台支持酶和产品组合持续扩张：生产葡糖二酸所用的同一套“先酶、后催化剂”两步架构，原则上可通过选择不同酶家族生成其他官能化糖衍生物。平台可扩展性是长期价值逻辑的核心。第三，Bioflex 发酵设施为
              Houston 和规划中的 Marshall 运营提供酶供应；它能生产多种微生物底盘（细菌、酵母、真菌），为酶生产放大提供灵活性。路线图近期关键依赖和不确定性包括：确认 Marshall 是否在 2025
