      - number: '2.3'
        title: 买方与细分市场分析
        blocks:
          - type: paragraph
            body: >-
              Solugen 服务 7+ 个目标细分市场中的多类工业买方；各市场的采购结构、资质要求和切换成本都不同。在废水处理中，
              主要买方是市政水务机构和工业设施运营方，采购部门会在环境合规要求下购买处理化学品。需求是刚性的： EPA
              排放标准和州级环境法规要求持续投加化学品以满足许可要求，因此这是最稳定的客户群之一。建筑公司——尤其是混凝土 生产商和特种承包商——通过材料采购购买化学外加剂，LEED 或 BREEAM
              等绿色建筑认证要求正越来越多地触发采用。农业经营者 通过经销商和合作社购买特种化学品，预算决策在农场经营者或合作社层面完成。油气运营商在井和管道中使用化学品，用于注水、
              缓蚀和阻垢；采购通常由管理井运营费用的现场运营和工程团队负责。所有这些垂直市场的预算所有权都在采购和运营部门， 而不是终端消费者手中，说明 Solugen 的销售模式是纯
              B2B。一个关键采用模式是：废水和能源领域的工业买家在从既有供应商 切换前，通常需要 12–24 个月的供应商资质测试，因此商业接触与收入确认之间天然存在滞后。每种情况下的付款方都是采购组织本身；
              资金来自运营预算或资本预算，取决于该化学品是消耗品还是工艺工厂升级的一部分。
            claimRefs:
