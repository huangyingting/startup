              - CR034
              - CR035
      - number: '7.6'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 的合作伙伴和依赖风险集中在四项关系上：ADM（原料供应）、DOE LPO（融资）、Sasol Chemicals（分销）和 Bioflex（内部酶生产）。ADM 依赖是严重性最高的单方依赖：与
              Marshall 玉米综合体共址带来成本和物流优势，但也消除了原料供应的地理多元化。ADM 供应协议条款——包括定价、销量承诺、期限和终止权——没有公开披露，因此无法评估 Solugen
              在供应中断或价格重新谈判面前拥有多少合同保护。DOE LPO 代表一种对化学放大来说罕见的机构依赖：$213.6M 有条件承诺让 Solugen 的融资时间线受制于 LPO
              审批流程；历史上，从有条件承诺到贷款交割通常需要 12–24+ 个月。DOE 优先事项的政治转向、预算限制或 LPO 人员变化，都可能影响贷款最终落地速度。Sasol
              分销合作在结构上有利，但带来渠道集中风险：Sasol 是唯一公开披露的分销伙伴，意味着 Solugen 在某些分群的市场触达取决于 Sasol 执行。如果 Sasol 关系恶化，或 Sasol 降低
              Solugen 产品优先级，Solugen 就需要建设或激活替代分销渠道。Bioflex 是 Solugen 的内部酶生产单元，也是公开信息有限的依赖点——其产能、运营状态以及能否随 Marshall
              同步放大，都无法从公开资料判断。酶生产任何瓶颈都会直接限制 Bioforge 产能和生产率。Series D 领投方 Kennivik 代表一种不寻常的财务依赖：公开资料没有识别出 Kennivik
              的所有权、基金规模或投资逻辑，难以评估这家投资方能否在融资缺口中提供追加资本或支持。
