      - number: '4.5'
        title: 财务缺口、数据质量与尽调要求
        blocks:
          - type: paragraph
            body: >-
              Solugen 的财务不透明是全维度的：收入、毛利率、现金余额、烧钱速度、客户收入集中度、实际价格、股权结构表，任何一项都没有以任何形式公开。公司从未向 SEC 提交审计财务报表；EDGAR
              搜索只返回确认股权融资的 Form D 私募发行豁免备案，没有财务表现数据。PitchBook 的私营公司档案需要付费，公开可访问版本不提供可独立核验的财务数据；处在这一发展阶段的私营公司，若没有 NDA
              访问权限，也拿不到公开的分析师共识估计。关键尽调缺口分三档。阻断性缺口包括：（1）年收入和增长率——没有这项，就无法评估收入质量；（2）毛利率——没有这项，成本平价逻辑无法支撑；（3）现金烧钱速度和现金跑道——考虑到
              Series D 交割时间和 DOE
              贷款状态不确定，缺少这项就无法独立判断资本充足性。重大缺口包括：（4）按产品线划分的每吨实际定价——评估任何合理收入倍数下的业务价值都需要这项；（5）客户集中度——按收入计的前五大客户，是评估收入风险的最低披露要求；（6）Bioforge
              Marshall 总建设成本和 DOE 贷款条件——这是项目融资风险的核心；（7）股权结构表——评估稀释结构和优先股堆叠必须要看。Kennivik
              投资方不透明，从财务承做角度看不是最大缺口，但在这个阶段、这个轮次规模上并不寻常。任何严肃的 Solugen 尽调，都必须先拿到 NDA 保护下的审计财报和现金流预测。
