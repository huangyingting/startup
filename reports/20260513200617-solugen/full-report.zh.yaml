      - number: '3.7'
        title: 证据缺口与尽调优先级
        blocks:
          - type: paragraph
            body: >-
              三个重大尽调缺口限制了对 Solugen 竞争位置的完整评估。第一，公开渠道没有独立第三方成本基准，无法比较 Solugen 生物基 H2O2 每公斤生产成本与 Evonik 或 Solvay 工业级蒽醌工艺
              H2O2，因此成本平价主张无法验证。第二，覆盖 Solugen 无细胞酶氧化平台的专利格局——包括权利要求宽度、到期时间线， 以及 Novozymes、BASF 或 Evonik
              酶业务可能绕开专利设计的风险——没有以便于独立分析的格式披露。第三，既有 H2O2 生产商（Evonik、Solvay、Kemira）
              对生物基替代的战略回应没有公开披露，因此无法判断是否有任何主要玩家正在内部开发生物基 H2O2，或有针对 Solugen 类技术的收购策略。次要缺口包括： 全球 H2O2
              市场份额缺乏按生产商和终端市场拆分的数据；Kemira 未披露生产能力，难以做竞争规模测算；也没有公开确认 Solugen 持有可制造合规型切换成本的 生物基内容认证（USDA
              BioPreferred、ISCC+）。此外，本研究审阅的公开可得来源没有把全球 H2O2 市场份额在头部生产商——Evonik、Solvay、Nouryon、
              Kemira、Arkema——之间按地区或终端市场拆分，导致无法精确分析竞争者市场份额，也限制了量化哪些既有厂商在 Solugen 主要目标市场占据最大份额的能力。
            claimRefs: []
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与业务架构
        blocks:
          - type: paragraph
            body: >-
              Solugen 的收入模式是直接的按销量销售化学品模式：公司在 Bioforge 设施制造生物基工业化学品，并按重量（按吨或按公斤）销售，
              作为石油衍生化学品等效物的可直接替代品。这是纯产品制造收入模式——不是授权、SaaS 或服务模式——因此收入随产量、实现的单吨价格和产能利用率直接增长。
              公司服务至少七个已披露市场：废水处理、建筑、农业、能源、工业特种化学品及其他。截至研究日期，Solugen 有两个已确认运营地点——Houston Bioforge （10,000-ton-per-year
              产能）和 Slaton, TX 配送仓库——另有 Minnesota 西南部在建的 500,000 sq ft Bioforge Marshall 设施。收入在化学品交付点确认；
              未披露任何订阅、按用量计费或经常性服务收入组成。公司 2022 年 About 页面称，Houston Bioforge 投运第一年“产量达到临界规模”，暗示该设施已经产生早期收入。 Solugen
              表示现有解决方案拥有“一线客户”，但没有公开任何客户名称；收入集中度、合同期限和客户流失均未披露。该业务模式更像 Cabot 或 Quaker Houghton
              这样的特种化学品制造商，而不是技术授权商，因此特种化学品既有厂商的估值和利润率基准最有财务可比性。
