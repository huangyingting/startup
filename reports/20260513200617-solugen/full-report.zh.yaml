  - id: TP003
    title: 定价 / 包装比较
    notes: 工业 H2O2 价格区间是基于公开大宗商品参考和行业文献的指示性估算；实际合同价格保密。Solugen 定价未公开披露。所有数值均针对散装工业级产品，约截至 2026 年 5 月。
    columns:
      - 竞争对手
      - 价格 / 单位 / 合同模式
      - 包含能力
      - 折扣 / 未知项
      - 对 Solugen 的影响
    rows:
      - - Solugen
        - 未披露；声称商业规模下与石油化学品成本平价
        - 生物基 H2O2 和氧化中间体；废水、建筑、农业
        - 定价完全未披露；没有可用第三方验证成本平价
        - Solugen 必须独立证明成本平价；披露不足是尽调缺口
      - - Evonik / Solvay（H2O2）
        - 与大宗商品指数挂钩；散装工业级产品约 $0.30–$0.80/kg，取决于浓度和合同
        - 多种浓度等级（30%、50%、70%）；散装交付；应用支持
        - 长期供应协议享有量价折扣；现货市场受油价影响
        - Solugen 必须在规模化后匹配或低于这一区间，才能从既有厂商手中赢得销量
      - - Kemira（水处理 H2O2）
        - 与公用事业和纸厂签订合同定价；捆绑技术服务
        - H2O2 产品加现场投加系统；工艺优化服务；监测
        - 捆绑服务的长期供应合同形成高切换成本壁垒
        - 应用捆绑让单纯产品替代更难；Solugen 需要服务能力平价
      - - Genomatica（Bio-BDO）
        - 未公开披露；面向聚合物客户瞄准生物基溢价定价层
        - Bio-BDO 获生物基认证；ISCC+ 认证用于价值链可追溯
        - 生物溢价定价模式；与 H2O2 大宗商品市场不可直接比较
        - Genomatica 的生物溢价模式未必适用于 Solugen 的成本平价策略
      - - 现状（传统 H2O2）
        - 蒽醌法；散装价格 $0.30–$0.60/kg，取决于规模和地点
        - 无生物基认证；无可持续报告价值；无 ESG 收益
        - 石油原料波动使低油价环境下价格底部不确定
        - Solugen 的成本平价主张必须穿越油价周期，而不只是某个现货价格
