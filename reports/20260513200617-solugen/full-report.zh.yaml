  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - Marshall 建设施工状态
        - 当前施工完成百分比；更新后的商业投产日期；里程碑清单
        - 整个收入拐点逻辑取决于 Marshall 投产；2025 年秋季目标似乎已经错过
        - Solugen CEO/CFO 一手沟通；施工现场走访或第三方检查报告
      - - DOE 贷款最终敲定
        - 仍未关闭的条件清单；预计关闭日期；环境审查状态
        - Marshall 的主要融资带有条件；没有这笔融资，Solugen 将面临资本缺口
        - DOE LPO 项目页面；直接询问 Solugen 法律顾问；向 DOE LPO 提交 FOIA 请求
      - - Series D 条款与估值
        - 投前估值；股权类别条款；Kennivik LP/GP 身份与机构背景
        - 若没有 Series D 估值标记，就无法评估入场价格和稀释堆叠；Kennivik 不透明不寻常
        - SEC Form D LP 检索；Delaware 实体检索；在 NDA 下询问 Solugen 法律顾问
      - - 收入与单位经济性
        - FY2024 和 FY2025 经审计或未经审计的收入；按产品线划分的毛利率；COGS 拆分
        - 商业牵引和成本平价说法完全未验证；收入倍数缺少依据
        - 在 NDA 下向 Solugen CFO 索取财务数据包；委托独立流程经济性研究
      - - 股权结构表与优先权负担
        - 完整股权结构表，包含全部股权类别；各轮清算优先权；最新 409A
        - 没有股权结构表，就无法评估稀释、退出分配瀑布或股权投资人的上行空间
        - 标准 VC 尽调请求；在 NDA 下通过 Solugen 法律顾问获取
    notes: 这五项尽调材料是从“继续研究”走向有条件投资决定的最低要求。它们都不需要公开披露；全部属于标准投前信息请求。
    claimRefs:
      - CV008
      - CV023
      - CV024
      - CV036
      - CV037
      - CV042
