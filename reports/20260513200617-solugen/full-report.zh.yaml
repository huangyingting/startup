      - number: '6.5'
        title: 扩张驱动因素与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 的“先落地、再扩张”潜力分两层：一是在单个客户账户内扩展产品线（例如，已认证 H2O2 等效品的废水客户，后续可能采用葡糖二酸衍生物）；二是随着 Bioforge Marshall
              放量、Sasol 分销网络把触达延伸到国际市场，推动地理扩张。ADM 合作借助 ADM 与农业客户的既有关系，为切入农业化学品买方提供天然扩张路径。Sasol 分销合作把 Solugen 接入 Sasol
              在欧洲、亚洲和非洲的化学品分销渠道，这些渠道不是 Solugen 直销团队能够高效独立覆盖的。集中度风险在三个维度上偏高。第一，Sasol 是唯一披露的分销伙伴，渠道集中带来供应链层面的依赖；如果 Sasol
              关系恶化，Solugen 的触达将被限制在直销。第二，ADM 是唯一披露的原料伙伴，造成原料集中风险；如果 ADM 关系受扰，Bioforge Marshall 的生产可能受限。第三，Texas Slaton
              的能源行业客户枢纽，代表 Gulf Coast 油气行业可能存在地理集中，公司没有披露该区域外的多元化。Bioforge Marshall 进入中西部北部农业和废水市场，是主要地理多元化事件；但截至 2026 年
              5 月，该设施尚未确认投运。
