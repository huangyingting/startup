      - number: '7.2'
        title: 监管、法律与环境风险
        blocks:
          - type: paragraph
            body: >-
              Solugen 横跨两个州和多个联邦机构，受多套相互重叠的监管框架约束。在 Texas，Texas Commission on Environmental Quality（TCEQ）是 Houston
              Bioforge 在空气质量、水质和工业废物管理上的主要许可机构。TCEQ 根据 EPA 授权，监管空气排放源、废水排放以及固体 / 危险废物处理。Texas
              工业化学品设施若空气排放源超过阈值，需要施工前许可、运营许可（若为主要排放源则需 Title V），并遵守 Texas 排放标准。截至 2026 年 5 月，在公开可访问的 TCEQ 许可数据库中没有识别出
              Solugen Houston 设施的具体 TCEQ 许可记录；这代表尽调缺口，不代表没有许可，因为 TCEQ 数据库按公司名称的可搜索性有限，许可记录也可能以设施法律实体名称备案。在
              Minnesota，Minnesota Pollution Control Agency（MN PCA）是 Bioforge Marshall 的对应主管机构。Minnesota
              大型工业设施通常需要空气质量许可（若排放阈值超标，可能成为需 Title V 的主要排放源）、水污染控制许可，并根据 Minnesota Environmental Policy
              Act（MEPA）接受环境审查。DOE LPO 的有条件承诺要求 Solugen 在贷款提款前满足 DOE 的法律、技术、财务和环境要求——这形成了一个直接绑定 Marshall
              主要融资工具的监管合规依赖。联邦层面，EPA Toxic Substances Control Act（TSCA）监管新化学物质和重大新用途；Solugen 的葡糖二酸衍生物和酶促工艺产出必须符合 TSCA
              合规要求。如果任何设施的过氧化氢浓度超过 PSM 阈值，OSHA Process Safety Management（PSM）标准可能适用。EPA Green Chemistry Challenge
              Award（2023）提供监管善意，但不能保证合规。IRA Section 45Z 清洁燃料生产抵免和 DOE
              生物能源项目可能带来监管收益，但取决于政治环境变化下的政策连续性。专利组合风险包括：核心酶促氧化专利可能被寻求在葡糖二酸或酶促过氧化物生产领域取得 实施自由的竞争对手挑战；Google Patents
              数据库显示有专利转让给 Solugen，确认其 IP 保护活跃，但竞争对手的实施自由分析并未公开。
