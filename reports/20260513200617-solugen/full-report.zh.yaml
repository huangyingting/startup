      - number: '8.3'
        title: 融资背景与估值入场
        blocks:
          - type: paragraph
            body: >-
              Solugen 的融资历史给出了有意义但已经偏旧的估值锚。2021 年 10 月 $357M 的 Series C，可由 SEC Form D 文件、Bloomberg 报道和 ICIS
              覆盖相互印证；隐含投后估值约 $2B。Series C 投资人包括 GIC、Temasek、BlackRock 和 Baillie Gifford——这些都是机构级资本配置方，参与本轮提高了治理可信度。据报道约
              ~$200M 的 Series D 由 Kennivik 领投；Kennivik 是一家 Delaware 实体，未公开披露所有权、基金规模或机构背景，截至 2026 年 5 月，SEC Form D
              文件中也未确认该轮。Crunchbase News 和 CB Insights 报道 KKR 参与，但 Kennivik 与 KKR 的关系尚未独立核实。如果 Series D 以 $3-4B 估值完成，相比
              2021 年 Series C 将隐含 50-100% 溢价；没有 Series D 条款或财务表现数据，无法核实这部分溢价。DOE LPO 的 $213.6M 有条件承诺如果最终落地，将提供一层非稀释资本，降低
              Marshall 建设的股权融资负担；参照类似工业生物技术设施基准，Marshall 建设成本估计为 $300M-$600M。如果 DOE 条件仍未满足，Solugen 将面临 $150M-$400M
              资本缺口，大概率需要追加股权融资，从而给现有投资人带来稀释风险。清算优先权压力需要完整股权结构表才能分析，而公开渠道拿不到。任何投资人的入场纪律都取决于：（1）确认 Series D 条款和投后估值；（2）DOE
              贷款最终落地状态；（3）股权结构表和清算优先权结构；（4）至少在 NDA
              下获得方向性的收入和毛利率，以支撑基于倍数的估值。缺少这些数据点，仅靠公开来源无法评估入场价格和稀释堆叠。估值区间图展示了宽阔的情景离散：基准情景 EV 为 $1.5B-$3B，乐观情景 EV 为
              $4B-$8B，悲观情景为 $300M-$900M，反映 Marshall 执行和 DOE 条件性上的根本不确定性。
