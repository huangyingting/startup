          detail: 按量定价的多年供应协议；视地区和细分市场，通过 Sasol 分销或 Solugen 直接供应
          tone: positive
        - id: cj4
          label: 生产与交付
          detail: Bioforge Houston 或 Marshall 生产；能源行业使用 Slaton TX 枢纽；更广泛工业分销使用 Sasol 网络
          tone: positive
        - id: cj5
          label: 应用与使用
          detail: 直接替换部署到废水处理、建筑、农业或能源工作流；无需改造设备
          tone: positive
        - id: cj6
          label: 续约与扩张
          detail: 续签多年供应合同；扩展到更多产品线或地区；一旦通过验证，结构性留存较高
          tone: positive
    claimRefs:
      - CU010
      - CU011
      - CU012
      - CU018
  - id: FU002
    title: 采用与部署漏斗——Solugen 客户管线
    type: funnel
    layout: standard
    summary: >-
      Solugen 工业化学品客户管线的结构性采用漏斗，从可触达的工业化学品买家，到验证中的管线、已签约活跃客户、多产品 / 扩张账户。所有数值都是基于 Solugen
      已披露产品、合作伙伴关系和设施版图的结构性估算——公司未披露任何管线或客户数量数据。该漏斗展示 B2B 工业化学品采用结构，而非报告指标。
    approximationNotes: 所有数值都是结构性估算。可触达买家总数（100%）以 Solugen 五个目标细分市场中的可触达工业化学品买家群体为指数基准。漏斗收窄反映典型 B2B 特种化学品转化率和验证周期流失，而非 Solugen 披露的转化数据。
    data:
      items:
        - label: 5+ 个细分市场中的可触达工业化学品买家
          value: 100
        - label: 已知晓并验证中（管线）
          value: 20
        - label: 已签供应合同（活跃客户）
          value: 5
        - label: 多产品或扩张账户
          value: 1
    claimRefs:
      - CU003
      - CU008
      - CU010
      - CU034
  - id: FU003
    title: 客户证明矩阵——按客户和维度评估证据质量
    type: matrix
    layout: standard
    summary: >-
      五列矩阵，从四个维度评估 Solugen 五类可识别客户关系或细分市场代表的客户证据质量：证据类型、生产还是试点状态、结果披露、证据质量等级。矩阵显示证据集中在中等或低质量，除分销 /
      原料合作伙伴外，缺少具名终端客户的生产证明，也显示尽调工作需要更深。
    approximationNotes: 证据质量评估反映截至 2026 年 5 月的公开记录。Sasol 和 ADM 的生产状态反映已披露关系的性质（分销和原料），不代表已确认的终端客户产品部署。废水处理、建筑和能源各行基于设施存在和产品描述推断。
    data:
      columns:
        - Sasol Chemicals
        - ADM
        - 废水公用事业客户（匿名）
        - 建筑用户（匿名）
        - 能源行业客户（匿名）
      rows:
        - label: 证据类型
          values:
            - 合作公告
            - 合作公告
            - 由 Bioforge Houston 运营推断
            - 由产品描述推断
            - Slaton TX 枢纽存在
        - label: 生产 vs 试点
          values:
            - 生产（分销合作伙伴）
            - 生产（原料合作伙伴）
            - Unknown
            - Unknown
            - 生产（由分销枢纽推断）
        - label: 是否披露结果？
          values:
            - 否
            - 否
            - 否
            - 否
            - 否
        - label: 证据质量等级
          values:
            - 中等——新闻稿
            - 中等——新闻稿 + Bloomberg
            - 低——结构性推断
            - 低——仅产品描述
            - 低——仅设施存在
    claimRefs:
      - CU001
      - CU002
      - CU008
      - CU013
      - CU014
      - CU015
      - CU032
  - id: FU004
    title: 估计客户留存队列——结构性行业类比
    type: cohort
    layout: standard
    summary: >-
      基于特种工业化学品市场的结构性可比对象，估算 Solugen 三类客户细分市场从第 1 年到第 2 年的留存队列。公司未披露留存数据；这些估计只是行业常态类比，在初步尽调中应替换为公司报告的队列数据。所有数值以第 1
      年加入客户数为 100 进行指数化，第 2 年估计留存以初始队列百分比表示。
    approximationNotes: >-
      所有数值都是从已发表的特种化学品市场研究、以及行业协会关于 B2B 工业化学品供应商留存的数据中推导出的结构性估算。Solugen 未公开披露任何特定留存、流失或续约数据。工业化学品（估计
      80-90%）、能源行业（~90%）和市政废水处理（~80%）留存区间反映 ICIS 和 AWWA 来源记录的行业层面模式，不应具体归因于 Solugen。
    data:
      columns:
        - 第 1 年（加入）
        - 第 2 年（估计续约）
      rows:
        - label: 工业化学品买家队列（估计）
          values:
            - 100
            - 85
          note: 基于典型工业特种化学品留存估计；无公司披露数据。结构性估算来自 ICIS 特种化学品市场研究。
        - label: 能源行业客户（估计）
          values:
            - 100
            - 90
          note: 估计值；由于油田运营连续性要求，能源行业通常对通过验证的化学品供应商有较高留存；Slaton TX 枢纽暗示多年关系，但没有披露数据。
        - label: 废水处理买家（估计）
          values:
            - 100
            - 80
          note: 估计值；市政采购通常涉及多年合同，但受竞争性重新招标要求约束；公用事业预算约束使结构性留存略低于私营买家。
    claimRefs:
      - CU010
      - CU012
      - CU016
      - CU017
      - CU020
  - id: FR001
    title: 风险热力图——可能性 vs. 影响
    type: matrix
    layout: standard
    summary: 九宫格热力图，将 Solugen 已识别风险按三个可能性等级（低、中、高）和三个影响等级（高、中、低）映射。Marshall 建设延误和 ADM 原料中断位于综合风险最高的格子。
    approximationNotes: 可能性和影响评级是基于截至 2026 年 5 月公开来源证据的定性评估。对于现阶段私人公司的运营风险，没有精算或定量概率数据。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 高影响
          values:
            - DOE 贷款条件未满足
            - Marshall 建设延误
            - ADM 原料中断
        - label: 中等影响
          values:
            - 碳定价停滞
            - 石油价格暴跌
            - 关键人物离职
        - label: 低影响
          values:
            - 小规模监管许可延误
            - 玉米价格上涨
            - 员工流失（非高管）
    claimRefs:
      - CR001
      - CR002
      - CR017
      - CR024
      - CR031
      - CR041
  - id: FR002
    title: 风险传导图——风险如何流向估值
    type: dag
    layout: standard
    summary: 七节点有向无环图，展示上游运营、供应和融资风险如何经由生产和资本充足性传导，最终压缩退出估值。ADM 原料风险和 Marshall 建设风险是主要上游风险节点；石油价格风险是独立逆风。
    approximationNotes: 传导路径是基于 Solugen 已披露商业模式和财务架构作出的结构性推断。因果关系代表可能依赖，而非正式建模的财务传导路径。
    data:
      nodes:
        - id: r1
          label: ADM 原料风险
          detail: Marshall 葡萄糖投入的单一供应商
          tone: warning
        - id: r2
          label: Marshall 建设风险
          detail: 500,000 sf 规模扩张执行不确定性
          tone: warning
        - id: r3
          label: DOE 贷款条件
          detail: 条件性融资必须最终落地
          tone: warning
        - id: r4
          label: 收入 / 生产缺口
          detail: Marshall 投产延迟会推迟收入规模化
          tone: negative
        - id: r5
          label: 资本充足性风险
          detail: 若 Marshall 延误，现金跑道承压
          tone: negative
        - id: r6
          label: 估值风险
          detail: 若生产延迟，退出倍数被压缩
          tone: negative
        - id: r7
          label: 石油价格风险
          detail: 低油价削弱生物基竞争优势
          tone: warning
      edges:
        - from: r1
          to: r2
        - from: r2
          to: r4
        - from: r3
          to: r5
        - from: r4
          to: r5
        - from: r5
          to: r6
        - from: r7
          to: r4
    claimRefs:
      - CR001
      - CR002
      - CR017
      - CR018
      - CR024
      - CR031
      - CR036
      - CR037
  - id: FR003
    title: 依赖图——关键合作伙伴、监管方与融资
    type: dag
    layout: standard
    summary: >-
      七节点依赖图，展示 Bioforge Marshall 要投运必须全部运转的关键上游使能方（ADM、DOE LPO、Bioflex、TCEQ、MN PCA），以及下游对 Sasol 的分销依赖。所有流向 Bioforge
      Marshall 的上游节点均为警示或中性色调，反映未解决状态。
    approximationNotes: 依赖关系来自公开披露，并根据设施共址和融资结构推断。关系条款和合同保护未公开。依赖关键性反映当前单一来源或未确认状态，而非正式概率估计。
    data:
      nodes:
