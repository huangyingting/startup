      - number: '1.3'
        title: 融资、估值与投资者基础
        blocks:
          - type: paragraph
            body: >-
              Solugen 已通过四轮风险融资加一项有条件联邦贷款担保，累计募得 $640M 或更多资本，是全球融资最充足的 生物工业化学公司之一。2018 年 $13.5M 的 Series A 由 Fifty
              Years、Founders Fund 和 Y Combinator 共同领投。2019 年 $32M 的 Series B 由 Founders Fund 领投，YC、Refactor
              Capital、Fifty Years 和 KdT Ventures 参投，资金用于建设第一座 Houston Bioforge。2021 年标志性的 $357M Series C 由新加坡 主权财富基金 GIC
              与 Baillie Gifford 领投，把 Solugen 的投后估值推至 $1.8 billion，并引入全球机构投资者， 包括 Temasek
              Holdings、BlackRock（全球最大资产管理公司）、Carbon Direct Capital Management、 Refactor Capital 和 Fifty Years。2022 年
              $200M+ 的 Series D 由 Kennivik、Lowercarbon Capital 和 Refactor Capital 共同领投，用于扩张和持续技术开发。2024 年，DOE Loan
              Programs Office 为 Bioforge Marshall 出具 $213.6M 的有条件贷款担保承诺，前提是满足法律、技术、财务和环境条件。Solugen 没有作为 发行人在 SEC EDGAR
              上提交主要文件，这与其私营公司身份一致。收入、利润率和股权结构表均未披露。
