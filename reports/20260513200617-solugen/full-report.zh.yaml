      - number: '1.5'
        title: 合作伙伴、奖项与战略位置
        blocks:
          - type: paragraph
            body: >-
              Solugen 已与两家大型工业公司建立战略合作：全球特种化学品生产商 Sasol Chemicals，以及全球最大农业加工商之一 ADM，双方合作均在 2023 年宣布。ADM 合作被结构性嵌入
              Bioforge Marshall 的选址：工厂建在 ADM 位于 Marshall, MN 的玉米综合体旁，以保证原料连续性。Sasol 合作显示 Solugen 正作为可信制造伙伴切入特种化学品供应链。 与
              Marshall Public Schools 和 Southwest MN Private Industry Council 签署的社区层面 MOU，则支撑其符合 Justice40
              的劳动力发展叙事。Solugen 已从监管、金融和科技媒体获得广泛第三方背书：EPA Green Chemistry Challenge Award（2023）、EY Entrepreneur of the
              Year（2023）、Forbes Sustainability Leaders（2024）、 MIT Technology Review 15 Climate Tech（2024）、CNBC Disruptor
              50（2024）、TIME America's Top Greentech（2024）、 a16z American Dynamism 50（2025）、Fast Company #2 Most
              Innovative in Manufacturing（2022），以及 Fast Company World Changing Ideas（2021）。公司的长期愿景是在全球部署 1 million 座小型工厂
              Bioforge， 把自身定位成服务行业脱碳的分布式制造基础设施机会；目标行业贡献全球 GHG 排放超过 8%。相对 LanzaTech （气体发酵）、Ginkgo Bioworks（细胞编程）和
              Genomatica（生物基化学品），Solugen 的竞争定位建立在其 酶加金属催化剂的混合路线，以及 DOE 支持下的资本获取能力之上。
