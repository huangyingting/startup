    missingEvidence: >-
      Solugen's revenue, ARR, gross margin, EBITDA, and cash burn rate are not publicly disclosed. No audited financial
      statements are available for this private company.
    whyItMatters: >-
      Without revenue or financial metrics, it is impossible to assess Solugen's path to profitability, capital
      efficiency, or whether the $640M+ raised is sufficient to fund Bioforge Marshall through commissioning and
      ramp-up.
    diligencePath: >-
      Request audited financials, management accounts, or investor data room access directly from Solugen. Query
      PitchBook (SO022) or Bloomberg Terminal for any disclosed revenue estimates from analyst coverage.
