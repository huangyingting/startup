      question: >-
        What is the targeted production capacity in metric tons per year for Bioforge Marshall
        once fully operational?
      type: quantification
      targets:
        - contentRequirements/1
        - contentRequirements/3
      status: answered
    - id: QE011
      question: >-
        What is Solugen's manufacturing cost per ton compared to anthraquinone-process H2O2
        producers at full scale in 2026, and does cost parity hold?
      type: quantification
      targets:
        - contentRequirements/4
      status: unresolved
    - id: QE012
      question: >-
        How large is the Bioforge Marshall facility in square footage, and what is the
        construction timeline and current completion status as of 2026?
      type: quantification
      targets:
        - contentRequirements/1
        - contentRequirements/3
      status: answered
    - id: QE013
      question: >-
        What is the complete list of bio-based chemical products that Solugen currently produces
        and sells from its Bioforge platform as of 2026?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/product-module-asset-matrix
      status: answered
    - id: QE014
      question: >-
        What are all the end-markets and customer verticals that Solugen currently serves with
        its bio-based chemical portfolio in 2026?
      type: enumeration
      targets:
        - contentRequirements/0
        - plannedTables/workflow-use-case-table
      status: answered
    - id: QE015
      question: >-
        What are all the key upstream dependencies (supply chain, partners, facilities, financing)
        required for Bioforge Marshall to reach commercial operation?
      type: enumeration
      targets:
        - contentRequirements/3
        - plannedFigures/critical-dependency-map
      status: answered
    - id: QE016
      question: >-
        What analytical instruments does Solugen use for process and product characterization
        in its R&D laboratory, and what process monitoring capabilities exist at Houston?
      type: enumeration
      targets:
        - contentRequirements/5
      status: answered
    - id: QE017
      question: >-
        What third-party certifications, awards, and external validations of Solugen's technology
        and process quality are publicly confirmed as of 2026?
      type: enumeration
      targets:
        - contentRequirements/5
        - plannedTables/trust-quality-compliance-table
      status: answered
    - id: QE018
      question: >-
        What is the mechanistic basis by which cell-free enzymatic reactions differ from
        whole-cell fermentation in terms of yield, contamination risk, and operating conditions?
      type: mechanism
      targets:
        - contentRequirements/2
        - contentRequirements/4
      status: answered
    - id: QE019
      question: >-
        How does Solugen's AI/ML directed evolution platform generate enzyme variant candidates
        and predict enzyme activity before laboratory screening?
      type: mechanism
      targets:
        - contentRequirements/2
        - plannedFigures/product-architecture-map
      status: answered
    - id: QE020
      question: >-
        How does the Bioflex fermentation plant produce cell-free enzymes and supply them to
        the Bioforge reactors at commercial scale?
      type: mechanism
      targets:
        - contentRequirements/2
      status: answered
    - id: QE021
      question: >-
        By what mechanism does the proprietary heterogeneous metal catalyst enhance conversion
        efficiency and direct product selectivity in Step 2 of the Bioforge process?
      type: mechanism
      targets:
        - contentRequirements/2
        - contentRequirements/4
      status: answered
