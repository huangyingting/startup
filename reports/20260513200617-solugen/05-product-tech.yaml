  - id: section-4
    title: Manufacturing Facilities, Capacity, and Supply Chain Integration
    body: >-
      Solugen operates two production facilities and one distribution hub. The Bioforge Houston
      facility is the first commercial Bioforge, comprising a 20,000+ square-foot laboratory and
      manufacturing floor, approximately 10,000 metric tons per year of product capacity, and a
      10,000 square-foot warehouse. Houston has been operating since approximately 2021. The Slaton,
      Texas distribution hub is a 20,000 square-foot facility dedicated to serving energy sector
      customers in the Texas/Gulf Coast region. Bioforge Marshall is the company's planned
      expansion facility: a 500,000 square-foot manufacturing complex under construction in Marshall,
      Minnesota, adjacent to an Archer-Daniels-Midland (ADM) corn wet-milling complex. The ADM
      adjacency provides direct physical co-location with a major dextrose supply source, reducing
      inbound logistics costs and feedstock supply-chain risk. The DOE's Loan Programs Office
      issued a conditional commitment for a $213.6 million loan guarantee to support Bioforge
      Marshall construction, contingent on continued satisfactory technical, environmental, and
      commercial reviews. The fall 2025 target completion date for Marshall had not been confirmed
      as achieved as of the May 2026 research date, representing an open status diligence item.
      Supply chain integration with ADM and chemical distribution through Sasol partners are
      key structural dependencies. The critical dependency map (FE003) illustrates the key
      upstream and downstream dependencies.
