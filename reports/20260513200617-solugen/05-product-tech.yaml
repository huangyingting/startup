        - plannedTables/trust-quality-compliance-table
      status: partial
    - id: QE023
      question: >-
        What evidence exists that Solugen's manufacturing process generates no hazardous waste
        beyond company self-disclosure, and are there any regulatory violations or environmental
        incidents on record?
      type: adverse
      targets:
        - contentRequirements/5
        - plannedTables/trust-quality-compliance-table
      status: partial
    - id: QE024
      question: >-
        How does Solugen's Bioforge cell-free enzymatic process compare to Genomatica's
        whole-cell fermentation in terms of yield, capital intensity, and operating cost?
      type: comparison
      targets:
        - contentRequirements/4
        - plannedFigures/product-maturity-capability-map
      status: answered
