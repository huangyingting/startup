  - id: section-7
    title: Technology Roadmap and Future Development
    body: >-
      Solugen's near-term technology roadmap centers on three workstreams. First, the commercial
      launch of Bioforge Marshall, which — if completed as planned — would represent a roughly
      50-fold increase in manufacturing footprint over Houston and would unlock the first large-scale
      demonstration of the Bioforge process at fully industrial scale. Second, the company's AI/ML
      platform enables continuous expansion of the enzyme and product portfolio: the same
      two-step enzymatic-then-catalyst architecture that produces glucaric acid can in principle
      generate other functionalized sugar derivatives through selection of different enzyme
      families. This platform extensibility is a core part of the long-term value thesis.
      Third, the Bioflex fermentation facility supports enzyme supply for both Houston and the
      planned Marshall operations, and its capacity to produce diverse microbial chassis (bacteria,
      yeast, fungi) provides flexibility for enzyme production scale-up. The key near-term
      dependencies and uncertainties in the roadmap include: confirmation of fall 2025 completion
      date for Marshall; finalization of DOE loan guarantee drawdown; and ramp-up of commercial
      sales through the Sasol distribution partnership. The roadmap table (TE005) and the customer
      workflow figure (FE002) detail deployment timeline and customer-facing delivery flow.
