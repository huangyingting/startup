  - id: section-3
    title: Product Lines and End-Market Applications
    body: >-
      Solugen's Bioforge generates a family of oxidized glucose-based specialty chemicals. The
      primary commercial product lines are: (1) bio-based hydrogen peroxide equivalents —
      functionally interchangeable with petroleum-derived H2O2 produced via the anthraquinone
      process, serving as oxidizing agents in wastewater treatment, bleaching, and disinfection;
      (2) glucaric acid and its derivatives, which function as chelating and sequestering agents
      in industrial wastewater treatment (scale inhibition), construction chemistry (concrete
      admixtures and corrosion inhibitors), and agricultural applications (nutrient chelation);
      (3) gluconic acid derivatives that serve as mild industrial cleaners and food-grade
      acidulants. Solugen states it serves seven or more distinct end markets including municipal
      and industrial wastewater treatment, industrial water treatment, construction, agriculture,
      and energy sector chemical applications. The products are intended as drop-in substitutes
      for incumbent petroleum-based chemicals, requiring no modification to customer dosing
      equipment or application workflows. This drop-in positioning is commercially important
      because it reduces customer adoption friction — procurement teams can qualify Solugen's
      products against existing performance specifications rather than redesigning processes.
      The product module and asset matrix (TE001) and the workflow and use-case table (TE002)
      map these product lines across buyers, workflows, and limitations.
