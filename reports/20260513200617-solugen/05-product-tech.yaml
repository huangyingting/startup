    layout: standard
    summary: >-
      Six-row matrix comparing Solugen's four core technology assets (Bioforge Houston, Bioforge
      Marshall, Bioflex, AI/ML Design) across six capability dimensions: operational status,
      capacity, feedstock/input type, technology readiness level, key diligence gap, and 2026
      status. The matrix highlights where Solugen has achieved commercial readiness vs. where
      material risks remain.
    approximationNotes: >-
      TRL ratings are inferred from company disclosures and milestone evidence; they have not
      been independently assessed. Bioforge Marshall capacity in tons is not publicly disclosed —
      only floor area (500,000 sf) is known. All cells reflect May 2026 evidence state.
