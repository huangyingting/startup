  - id: section-2
    title: AI/ML Platform and Enzyme Engineering Capabilities
    body: >-
      Solugen's engineering capabilities extend substantially beyond classical biochemistry. The
      company applies AI and machine learning across three distinct functional areas: DNA library
      design for generating enzyme variant candidates, metal catalyst design optimization, and
      manufacturing operations optimization at its Bioforge facilities. In enzyme engineering,
      the platform combines three complementary methodologies: computational rational design
      (using structure-prediction models to propose beneficial mutations), directed evolution
      (iterative selection of high-activity enzyme variants through laboratory screening), and
      machine learning models trained on the evolving experimental dataset to predict which
      variants to synthesize next. This integrated approach — sometimes called ML-guided directed
      evolution — has become the dominant paradigm for industrial enzyme engineering, as
      documented in academic literature and industrial biotech publications. Solugen's Bioflex
      fermentation plant produces both intracellular and extracellular enzyme types across multiple
      microbial chassis including bacteria, yeast, and filamentous fungi. This multi-chassis
      capability provides flexibility in enzyme expression strategy depending on the specific
      enzyme class being produced. The R&D laboratory maintains analytical instruments including
      UPLC, GC, ICP, TOF-MS, and NMR for process and product characterization. A pilot plant
      is used to test enzymes and metal catalysts at intermediate scale before transfer to
      commercial operations, bridging bench chemistry and full-scale Bioforge deployment.
    claimRefs:
      - CE008
