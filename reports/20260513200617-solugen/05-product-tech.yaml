  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: yield-verification
      missingEvidence: >-
        No independent third-party verification of Solugen's claimed 95%+ integrated product
        yield has been published as of May 2026. A public process audit, third-party yield
        test, or academic life-cycle analysis using actual Bioforge data would close this gap.
      relatedQuestionRefs:
        - QE022
    - type: private-evidence-only
      severity: material
      topic: patent-portfolio
      missingEvidence: >-
        The scope, claim breadth, and enforceability of Solugen's patent portfolio covering
        its enzymatic process, enzyme variants, and metal catalyst formulations has not been
        publicly disclosed. A freedom-to-operate analysis and patent landscape review would
        be required as part of diligence.
      relatedQuestionRefs:
        - QE023
    - type: missing-source
      severity: material
      topic: bioflex-capacity
      missingEvidence: >-
        Bioflex fermentation plant enzyme production capacity in kg or tons per year has not
        been publicly disclosed by Solugen. Without knowing enzyme yield per unit feedstock
        and total Bioflex output, the enzyme supply adequacy for both Bioforge Houston and
        Marshall cannot be independently assessed.
      relatedQuestionRefs:
        - QE009
    - type: missing-source
      severity: material
      topic: manufacturing-cost
      missingEvidence: >-
        Solugen has not publicly disclosed manufacturing cost per ton for any product, gross
        margin, or cost-parity analysis versus anthraquinone-process H2O2 producers. Cost
        competitiveness at commercial scale is unverified and is a critical investment diligence
        ask that requires primary engagement with the company.
      relatedQuestionRefs:
        - QE011
