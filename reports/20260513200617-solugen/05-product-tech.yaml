      question: >-
        How does Solugen's room-temperature enzymatic process compare to the anthraquinone
        H2O2 process used by Evonik and Solvay in terms of energy consumption and environmental
        footprint per ton of product?
      type: comparison
      targets:
        - contentRequirements/4
      status: answered
