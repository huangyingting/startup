  researchQuestions:
    - id: QE001
      question: >-
        Does the Bioforge process use dextrose, water, and compressed air as its only inputs,
        and does Step 1 operate at room temperature via cell-free enzymatic reactions?
      type: verification
      targets:
        - contentRequirements/0
        - contentRequirements/2
      status: answered
    - id: QE002
      question: >-
        Is Solugen's 95%+ integrated product yield claim supported by any independent third-party
        verification published as of May 2026?
      type: verification
      targets:
        - contentRequirements/4
      status: answered
    - id: QE003
      question: >-
        Has Solugen received the EPA Green Chemistry Challenge Award, and what criteria did its
        Bioforge process satisfy for that award?
      type: verification
      targets:
        - contentRequirements/5
      status: answered
    - id: QE004
      question: >-
        Did the DOE Loan Programs Office issue a conditional loan guarantee commitment for
        Bioforge Marshall in 2024, and what was the amount and conditions?
      type: verification
      targets:
        - contentRequirements/3
        - contentRequirements/5
      status: answered
    - id: QE005
      question: >-
        Is there any public evidence of a patent portfolio assigned to Solugen covering its
        enzymatic process or metal catalyst technology as of May 2026?
      type: verification
      targets:
        - contentRequirements/4
      status: answered
    - id: QE006
      question: >-
        Does Solugen use AI and machine learning for DNA library design, metal catalyst
        optimization, and manufacturing operations as disclosed on its technology page?
      type: verification
      targets:
        - contentRequirements/2
        - contentRequirements/4
      status: answered
    - id: QE007
      question: >-
        Is Bioforge Houston confirmed operational at commercial scale with approximately 10,000
        metric tons per year of capacity as of May 2026?
      type: verification
      targets:
        - contentRequirements/1
        - contentRequirements/3
      status: answered
    - id: QE008
      question: >-
        What is Solugen's publicly disclosed production capacity at Bioforge Houston in metric
        tons per year as of 2026?
