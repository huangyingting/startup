summary:
  headline: >
    Agility Robotics 做到了其他人形机器人公司还没做到的事：经验证、生产级、规模化商业部署。GXO Logistics 已搬运 100,000+ 个 tote，公司累计融资 $641M，并拥有目标年产 10,000
    台的专用工厂，因此相对同行有 12–24 个月商业化领先。 核心投资问题是：Figure AI 估值 $39B、Tesla Optimus 拥有制造规模，竞争对手补上部署差距前，Agility
    能否把先发优势转成持久市场位置。规模化单位经济尚未验证，客户集中度是真风险，协作安全认证仍是更广泛采用的技术闸门。
