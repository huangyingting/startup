companyProfile:
  summary: >
    Agility Robotics is a Tangent, Oregon-based robotics company that designs, manufactures, and
    deploys Digit — a bipedal humanoid robot purpose-built for logistics and warehouse tasks. Founded
    in 2015 as a spinout from Oregon State University, Agility pioneered the cassowary-inspired
    biomimetic leg design that gives Digit its distinctive energy-efficient gait. The company achieved
    a critical industry milestone in June 2024 when it signed the world's first multi-year commercial
    Robot-as-a-Service (RaaS) agreement for a humanoid robot with GXO Logistics. By November 2025,
    Digit surpassed 100,000 totes moved in live commercial deployment at GXO's Flowery Branch, Georgia
    fulfillment center — validating the technology as production-grade rather than showcase-only.
    Agility raised $400 million in Series C funding in March 2025 at a $2.1 billion post-money
    valuation, backed by WP Global Partners, SoftBank, Amazon Industrial Innovation Fund, and NVIDIA's
    NVentures. The company is building out RoboFab, a 70,000-square-foot manufacturing facility in
    Salem, Oregon, targeting 10,000 units per year capacity.
  foundedDate: "2015-01-01"
  founders:
    - name: "Jonathan Hurst"
      role: "Co-founder, Chief Robot Officer"
      background: "OSU robotics professor; invented the Cassie bipedal platform that became Digit's foundation."
      claimRefs: [CO007]
    - name: "Damion Shelton"
      role: "Co-founder, President & Chairman"
      background: "Serial robotics entrepreneur; drives commercial and strategic direction alongside CEO."
      claimRefs: [CO007]
  foundingLocation: "Corvallis, Oregon, USA"
  headquarters: "Tangent, Oregon, USA"
  productSummary: >
    Digit is a 5'9", 65 kg bipedal humanoid robot with 16 kg payload capacity, 4+ hour battery life,
    and task-optimized end effectors for logistics use cases. It integrates 3D LiDAR, stereo cameras,
    and onboard AI to navigate warehouse environments and manipulate totes and packages. The Arc cloud
    platform provides fleet management, AMR integration (MiR, Zebra Technologies), and WMS/WES
    connectivity. Digit operates under functional safety (FSoE CAT1) standards and currently deploys
    in safety-caged environments, with cooperative certification targeted for 2026–2027.
  customerFocus: "Tier-1 third-party logistics operators (3PLs), e-commerce fulfillment centers, and manufacturing facilities facing labor shortages in repetitive material-handling tasks."
  businessModel: "Hybrid: Robot-as-a-Service (RaaS) at $10K–$15K/month per unit with multi-year contracts, and direct capital sale at ~$150K per unit. Arc cloud platform subscription revenue (pricing undisclosed)."
  stage: "Series C — commercial deployment phase"
  fundingStatus: "$641M raised; Series C $400M in March 2025; post-money valuation $2.1B."
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO003, CO007, CO012, CO015, CO019, CO022]

summary:
  headline: >
    Agility Robotics has achieved what no other humanoid robot company has: a proven, production-grade
    commercial deployment at scale. With 100,000+ totes moved at GXO Logistics, a $641M funding base,
    and a dedicated manufacturing facility targeting 10,000 units per year, Agility holds a 12–24 month
    commercialization lead over the field. The central investment question is whether it can convert
    this first-mover advantage into durable market position before better-funded competitors (Figure AI
    at $39B valuation, Tesla Optimus with manufacturing scale) close the deployment gap. Unit economics
    are unproven at scale, customer concentration is a real risk, and cooperative safety certification
    remains the gating technology for broader adoption.
