chapter:
  number: 5
  title: Product & Technology
  summary: >
    Agility Robotics delivers Digit, a 175 cm / 65 kg bipedal humanoid robot with a 16 kg
    payload, 4+ hour battery life, and 3D LiDAR perception, paired with the Arc cloud platform
    for fleet management and enterprise integration. Digit's locomotion derives from over a decade
    of OSU biomechanics research on energy-efficient bipedal walking, translated into a cassowary-
    inspired leg architecture. The Arc platform integrates with WMS/WES/MES systems and dispatches
    AMRs (MiR, Zebra Technologies) as a unified warehouse automation layer. RoboFab in Salem,
    Oregon is designed for 10,000 units/year. Critical limitations include cage-segregated
    operation (no cooperative safety certification as of 2026), task-specific end effectors, and
    payload substantially below heavier competitors. The cooperative safety certification roadmap
    (targeted 2026) and a fifth-generation Digit with expanded payload are the highest-stakes
    near-term milestones.

sections:
  - id: ESEC01
    title: Product Overview and Digit Hardware Architecture
    body: |
      Digit is Agility Robotics' commercial bipedal humanoid robot, designed from the ground up
      for logistics and warehouse automation. The current-generation Digit stands 175 cm (5'9"),
      weighs approximately 65 kg, and handles payloads up to 16 kg (35 lbs). Its locomotion
      system uses cassowary-inspired backward-bending legs derived from over a decade of
      biomechanics research at Oregon State University's Dynamic Robotics Laboratory under
      professor Jonathan Hurst. The robot navigates autonomously through warehouses using a
      perception suite comprising 3D LiDAR, stereo RGB cameras, an inertial measurement unit
      (IMU), joint encoders, proximity sensors, and force sensors. Onboard compute runs dual
      Intel i7 CPUs, with a modular open payload bay accommodating NVIDIA Jetson or Intel NUC
      accelerators for AI inference tasks. Digit walks at up to 1.5 m/s, navigates stairs and
      curbs, and can operate for 4+ hours before autonomously docking at its charging station.
      Connectivity is provided via WiFi and 4G cellular. The robot is designed with approximately
      6,000 parts per unit, with roughly 80% sourced from US-based suppliers, reflecting a supply
      chain resiliency strategy aligned with domestic manufacturing priorities. The end effectors
      are task-optimized for logistics tote handling rather than general-purpose five-finger
      manipulation, representing an intentional design trade-off: simpler, more reliable
      manipulation for a narrow but commercially validated task set.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE018, CE025, CE026]

  - id: ESEC02
    title: Locomotion Research Basis and AI Perception Technology
    body: |
      Digit's locomotion architecture traces its lineage to the Cassie bipedal robot developed at
      Oregon State University starting in 2015, representing some of the most rigorous academic
      work in energy-efficient legged locomotion. The biomimetic design prioritizes dynamic
      stability over quasi-static balance, allowing Digit to handle ground disturbances and
      recover from perturbations more robustly than statically-stable designs. The leg geometry,
      inspired by the cassowary's joint configuration, achieves passive energy return during
      walking, reducing actuator demand and extending battery life. Agility employs reinforcement
      learning for grasping and manipulation tasks, training onboard AI models to generalize across
      tote geometries and varying conveyor heights. The perception pipeline processes 3D LiDAR
      point clouds combined with stereo camera feeds through onboard neural inference, enabling
      autonomous path planning and obstacle avoidance without human teleoperation. Published
      academic work on the Cassie and Digit platforms in IEEE and other peer-reviewed venues
      provides a documented technical lineage that competitors relying on newer, less published
      research cannot easily replicate. However, Agility has not published specific benchmark
      results for task success rates, manipulation latency, or failure recovery time in its
      commercial deployments, limiting independent technical validation of claimed performance.
      The open payload bay allows third-party AI compute modules, enabling the platform to
      upgrade inference capabilities as hardware generations advance without full hardware replacement.
    claimRefs: [CE012, CE013, CE019, CE028, CE033, CE034]

  - id: ESEC03
    title: Arc Cloud Platform and Enterprise Integration Architecture
    body: |
      The Arc cloud platform is Agility's software-as-a-service layer that orchestrates Digit
      fleets, integrates with enterprise warehouse systems, and provides remote monitoring and
      diagnostics. Arc connects directly to warehouse management systems (WMS), warehouse
      execution systems (WES), manufacturing execution systems (MES), and PLCs via webhooks and
      custom APIs, allowing operators to assign tasks to Digit units from existing operational
      tooling without a parallel human-machine interface. A key differentiating capability
      announced in March 2025 is direct AMR integration: Arc can dispatch MiR and Zebra
      Technologies autonomous mobile robots as part of the same workflow, enabling Digit to load
      or unload AMRs as part of a fully automated tote-handling sequence. This positions Arc not
      merely as a Digit fleet manager but as a unified heterogeneous robot orchestration platform
      for logistics facilities that already operate AMR fleets. Arc also supports safety fleet
      monitoring and remote shutdown capabilities, critical for enterprise deployments requiring
      centralized control room oversight. The platform uses EtherCAT fieldbus for the robot's
      internal control communication, with a safety PLC coordinating FSoE-compliant safety
      commands. The Arc API architecture allows WMS integrators and systems integrators to build
      custom workflow automation that spans Digit and third-party automation equipment, providing
      a potential expansion moat as the integration library matures. Specific API documentation,
      SDK availability, and published developer resources are not fully transparent in the public
      domain as of 2026, representing a gap for technology partners evaluating integration depth.
    claimRefs: [CE009, CE010, CE011, CE027, CE032]

  - id: ESEC04
    title: Manufacturing, Supply Chain, and Intellectual Property
    body: |
      Agility Robotics operates RoboFab, a dedicated humanoid robot manufacturing facility in
      Salem, Oregon, announced in September 2023 and opened in 2024. The 70,000 sq ft facility
      is designed for a production capacity target of 10,000 Digit units per year at full build-out,
      making it one of the largest dedicated humanoid robot production sites globally. As of early
      2026, approximately 100 units have been commercially deployed across GXO and Amazon, indicating
      the facility remains in its production ramp phase. The unit's approximately 6,000-part bill of
      materials draws roughly 80% from US-based suppliers, reducing single-geography supply chain
      risk relative to competitors with heavier China-sourced component exposure. Agility's
      intellectual property portfolio spans bipedal locomotion (originating from the Cassie research
      lineage), manipulation and task-optimized end effector design, safety and control system
      architectures incorporating FSoE protocols, and multi-robot orchestration in the Arc platform.
      The exact patent count is not publicly disclosed. Key foundational IP derives from OSU's
      Dynamic Robotics Laboratory, where Jonathan Hurst's research on passive dynamic walking and
      energy-efficient bipedalism was translated into commercially filed patents. The combination of
      RoboFab's dedicated production capacity, the US-sourced supply chain, and the academic IP
      lineage creates a manufacturing and IP moat that would be time-consuming for newer entrants to
      replicate. However, the gap between the 10,000-unit design capacity and the ~100 currently
      deployed represents a significant execution and scaling risk that investors and partners
      should monitor closely over the 2026-2027 period.
    claimRefs: [CE016, CE017, CE018, CE019, CE029, CE037]

  - id: ESEC05
    title: Safety Certification, Compliance, and Product Roadmap
    body: |
      Digit's current safety architecture includes Functional Safety over EtherCAT (FSoE) CAT1
      stop capability, a safety PLC, on-robot and wireless emergency stop systems, and Arc's
      remote fleet shutdown. Despite this hardware safety infrastructure, Digit as of 2026 operates
      in cage-segregated environments where physical barriers separate the robot from human workers
      during active operation. The company has not yet achieved ISO/TS 15066-compliant cooperative
      safety certification that would allow Digit to work directly alongside humans without barriers.
      CEO Peggy Johnson has publicly targeted 2026 for cooperative safety certification, which would
      represent the single largest capability step-change in Digit's commercial deployment potential,
      opening facilities where cage installation is impractical or cost-prohibitive. Independent
      analysts and critics at IEEE Spectrum and Fortune have noted that this certification timeline
      has slipped from earlier commitments and that full uncaged human-robot collaboration in
      logistics environments involves regulatory review processes that could extend well into 2027.
      The announced product roadmap includes enhanced runtime, expanded AMR integration, and improved
      safety features in 2025; cooperative certification in 2026; and a fifth-generation Digit
      targeting fully cooperative workflows and a higher payload (50 lbs vs current 35 lbs) for a
      2027+ rollout. Longer-term, Agility has stated ambitions to expand beyond logistics into light
      manufacturing, healthcare, and retail, though no specific product variants or customer
      engagements for these verticals have been publicly confirmed. Key technical limitations that
      could constrain this expansion include: the task-specific end effector design (not general-
      purpose), the structured-environment assumption baked into current AI models, and battery
      capacity that limits continuous multi-shift deployment without autonomous charging infrastructure.
    claimRefs: [CE014, CE015, CE020, CE021, CE022, CE023, CE024, CE030, CE031, CE035, CE036, CE038]

