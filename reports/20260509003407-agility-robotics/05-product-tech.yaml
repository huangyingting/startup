figures:
  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: wide
    summary: >
      A layered view of the Agility Robotics product stack, from cloud orchestration
      through AI/perception, safety and control, and the underlying Digit hardware platform,
      with key integration and component items at each layer.
    claimRefs: [CE009, CE011, CE014, CE033]
    data:
      layers:
        - id: cloud-layer
          label: "Cloud Platform (Arc)"
          detail: "Fleet management, WMS/WES/MES/PLC integration via webhooks and custom APIs, remote diagnostics, AMR dispatch (MiR, Zebra Technologies), safety fleet monitoring, remote shutdown."
        - id: ai-layer
          label: "AI / Perception Layer"
          detail: "Onboard reinforcement learning for grasping; 3D LiDAR + stereo RGB camera fusion; neural inference for path planning and obstacle avoidance; task context from sensor streams."
        - id: control-layer
          label: "Safety & Control Layer"
          detail: "Safety PLC with IEC 61508 compliance; FSoE CAT1 emergency stop; EtherCAT real-time fieldbus; on-robot and wireless E-stop; cage-segregated operation; cooperative cert targeted 2026."
        - id: hardware-layer
          label: "Hardware Platform (Digit)"
          detail: "Biomimetic bipedal, 175 cm / 65 kg; 16 kg payload; 4+ hr battery; 3D LiDAR; stereo RGB cameras; dual Intel i7 onboard compute; modular payload bay; ~6,000 parts; ~80% US-sourced."
        - id: integration-layer
          label: "Integration & Peripheral Components"
          detail: "AMR dispatch (MiR, Zebra via Arc API); WMS/WES webhook APIs; NVIDIA Jetson / Intel NUC payload bay; task-optimized end effectors; autonomous charging dock infrastructure."
        - id: connectivity-layer
          label: "Connectivity & Remote Operations"
          detail: "WiFi and 4G cellular telemetry; Arc remote shutdown; real-time fleet dashboards; remote E-stop; diagnostic streaming to operations center."

  - id: FE002
    title: Customer Workflow / Operating Flow
    type: flow
    layout: standard
    summary: >
      End-to-end customer workflow showing how a warehouse operator deploys Digit through
      the Arc platform from task assignment in the WMS through robot execution to reporting.
    claimRefs: [CE009, CE010, CE011, CE032]
    data:
      nodes:
        - id: wms-order
          label: "WMS Issues Task Order"
          detail: "Warehouse management system creates a tote-handling or transport task; dispatches to Arc via webhook or API call."
        - id: arc-assign
          label: "Arc Platform Assigns Task"
          detail: "Arc fleet management layer receives task, identifies available Digit unit, checks battery level and proximity; assigns task to optimal robot."
        - id: amr-check
          label: "Arc Optionally Dispatches AMR"
          detail: "If task involves AMR loading/unloading, Arc simultaneously dispatches MiR or Zebra AMR to rendezvous point."
        - id: digit-navigate
          label: "Digit Navigates to Work Area"
          detail: "Digit uses 3D LiDAR and stereo vision to autonomously navigate warehouse aisles to designated pick/place station; avoids obstacles in real time."
        - id: digit-execute
          label: "Digit Executes Manipulation Task"
          detail: "Digit uses RL-based grasping to pick tote from conveyor or AMR; places tote at target location using task-optimized end effector."
        - id: arc-monitor
          label: "Arc Monitors and Logs"
          detail: "Arc records task completion, cycle time, any errors or safety events; streams telemetry to remote operations dashboard."
        - id: digit-dock
          label: "Digit Returns to Dock (Low Battery)"
          detail: "When battery falls below threshold, Digit autonomously navigates to charging dock without human intervention."
        - id: wms-report
          label: "WMS Receives Completion Report"
          detail: "Arc pushes task completion confirmation back to WMS; updates inventory or sortation records; closes the work order loop."

  - id: FE003
    title: Critical Dependency Map
    type: dag
    layout: wide
    summary: >
      A directed acyclic graph of the critical external dependencies affecting Digit production,
      deployment, and platform operation, spanning component suppliers, cloud infrastructure,
      regulatory bodies, and enterprise integration partners.
    claimRefs: [CE018, CE033, CE009, CE016, CE020]
    data:
      nodes:
        - id: digit-hw
          label: "Digit Hardware Unit"
          detail: "~6,000 parts assembled at RoboFab Salem; the core commercial product."
        - id: us-suppliers
          label: "US Component Suppliers"
          detail: "~80% of Digit's BOM from US sources; motors, actuators, structural components, sensors."
        - id: intel-cpu
          label: "Intel CPU Supply"
          detail: "Dual Intel i7 onboard compute; Intel supply chain dependency for each unit produced."
        - id: lidar-sensor
          label: "3D LiDAR Vendor"
          detail: "Single-source risk for perception hardware; LiDAR vendor not publicly named; critical safety sensor."
        - id: robofab
          label: "RoboFab (Salem, OR)"
          detail: "70,000 sq ft dedicated humanoid factory; sole production site; 10,000 unit/yr design capacity."
        - id: arc-cloud
          label: "Arc Cloud Platform"
          detail: "SaaS fleet management; required for enterprise workflow integration, remote monitoring, AMR dispatch."
        - id: cloud-infra
          label: "Cloud Infrastructure (AWS/Equiv.)"
          detail: "Arc platform hosted on public cloud; uptime and latency dependency for remote operations."
        - id: wms-partner
          label: "WMS/WES Integration Partners"
          detail: "Enterprise WMS vendors (e.g., Manhattan Associates, Blue Yonder); webhook/API integration required per deployment."
        - id: safety-regulator
          label: "Safety Certification Bodies"
          detail: "ISO/TS 15066, relevant national safety authorities; required for cooperative operation certification."
        - id: amr-vendor
          label: "AMR Vendors (MiR, Zebra)"
          detail: "Arc currently integrates MiR and Zebra Technologies AMRs; expansion to other AMR brands needed for broader market."
      edges:
        - from: us-suppliers
          to: digit-hw
          detail: "Parts supply for RoboFab assembly; ~80% domestic sourcing reduces but does not eliminate supply concentration risk."
        - from: intel-cpu
          to: digit-hw
          detail: "Dual Intel i7 CPUs shipped to RoboFab; Intel supply chain disruptions would directly impact production rate."
        - from: lidar-sensor
          to: digit-hw
          detail: "3D LiDAR is a critical perception component; vendor not named publicly; potential single-source risk."
        - from: robofab
          to: digit-hw
          detail: "Sole manufacturing site for Digit; single-facility concentration risk; ramp to 10K/yr not yet achieved."
        - from: digit-hw
          to: arc-cloud
          detail: "Digit units connect to Arc via WiFi/4G for telemetry, task dispatch, and remote safety control."
        - from: cloud-infra
          to: arc-cloud
          detail: "Arc platform depends on public cloud availability; outage would interrupt remote monitoring and dispatch."
        - from: wms-partner
          to: arc-cloud
          detail: "Arc integration with WMS/WES systems requires API configuration per deployment site; integration partner ecosystem critical for scale."
        - from: safety-regulator
          to: digit-hw
          detail: "Cooperative safety certification from relevant bodies required before uncaged deployment; regulatory timeline is externally controlled."
        - from: amr-vendor
          to: arc-cloud
          detail: "Arc's AMR dispatch relies on vendor APIs; MiR and Zebra currently supported; additional vendors require engineering investment."

