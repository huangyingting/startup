    notes: >
      Kill criteria are defined as threshold events requiring material reassessment of the investment
      thesis — not necessarily automatic divestment. Each trigger should be monitored quarterly
      through public disclosures, partner communications, and industry news. The safety incident
      trigger is the highest-priority monitoring item given the potential for irreversible reputational
      damage to both Agility and the broader humanoid robotics sector. Investors with board
      representation should ensure all triggers are built into a formal portfolio monitoring protocol.
