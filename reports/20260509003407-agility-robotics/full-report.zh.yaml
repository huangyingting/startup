  - id: TR005
    title: 缓释措施与终止标准表
    columns:
      - 风险
      - 可监测触发信号
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 安全事故 — 客户设施发生涉及 Digit 机器人的工作场所伤害
        - OSHA 可记录事故，或客户以安全担忧为由宣布暂停部署
        - 任何需列入 OSHA 300 日志的 Digit 相关伤害；或客户以 Digit 安全为由主动叫停
        - 立即重估投资逻辑；要求根因分析和整改计划；调查结果明确前，考虑减仓
      - - GXO 合同不续约，或范围较初始承诺大幅缩减
        - GXO 新闻稿或 SEC 文件显示不续约；合同周年时 Agility 对续约保持沉默
        - 确认 GXO 不续约，或范围缩减至原始 Digit 机队承诺的 50% 以下
        - 从投资逻辑中移除主要商业验证点；下调收入增长假设；加快索取替代管线客户证据
      - - Amazon 竞争威胁 — 宣布内部人形机器人项目
        - Amazon 发布内部人形机器人产品新闻稿或专利申请；Amazon 在 Sumner 设施逐步淘汰 Digit
        - 确认 Amazon 内部人形机器人开发项目进入生产测试阶段
        - 重大重估 TAM 可触达性和商业独立性；评估 Amazon 从客户变成直接竞争对手的情景
      - - 协作安全认证滑至 2027 年底以后
        - 到 2027 Q1 仍未披露认证机构名称；到 2027 Q3 仍未宣布审计启动里程碑
        - CEO 或投资者沟通确认认证目标推迟到 2027 年 12 月之后
        - 修订部署 TAM 和时间线假设；下调估值模型中赋予无围栏部署可选性的溢价
      - - 关键高管离职 — 总裁 Damion Shelton 或 CRO Jonathan Hurst
        - LinkedIn 或媒体发布离职消息；不再出现在投资者沟通中；出现职位空缺招聘
        - 确认 Damion Shelton 辞任或被免去总裁职务，或 Jonathan Hurst 辞任或被免去 CRO 职务
        - 高优先级响应：立即要求董事会继任计划；评估领导层连续性风险；考虑把保护性董事席位列为投资条件
      - - 制造爬坡停滞，低于最低可行商业门槛
        - 季度生产指标；投资者更新中披露 RoboFab 产能利用率
        - 到 2026 日历年底商业部署少于 300 台，即低于设计产能的 3%
        - 修订收入爬坡模型；提高扩产假设对应的折现率；要求提供包含已承诺供应商协议的详细生产计划
    notes: >
      终止标准指需要重大重估投资逻辑的阈值事件，并不必然等于自动退出。每个触发信号都应通过公开披露、合作伙伴沟通和行业新闻按季度跟踪。安全事故触发信号优先级最高，因为它可能给 Agility
      和整个人形机器人行业造成不可逆声誉损害。拥有董事会席位的投资者应确保所有触发信号纳入正式投后监控机制。
