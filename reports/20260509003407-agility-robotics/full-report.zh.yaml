      - number: '2.2'
        title: TAM、SAM 与 SOM 测算
        blocks:
          - type: paragraph
            body: >
              物流人形机器人的 TAM 最适合用三种口径理解。口径 1（自上而下的人形机器人市场）：全球人形机器人市场 2025 年估计为 $2.9B（MarketsandMarkets），物流 /
              仓储是两大主要垂直之一。若物流占人形机器人支出的 20–30%，则物流专用人形机器人 TAM 在 2025 年为 $580M–$870M，到 2030 年增长至 $2.3B–$4.6B。口径
              2（劳动力替代）：美国仓库劳动力市场雇用约 1.8M 名工人，每名工人每年全负荷成本约 $42K–$55K，形成约 $75B–$99B 年度劳动力支出。即便到 2030 年只有 5% 被人形机器人替代，也意味着
              $3.7B–$5.0B 的年度市场机会。口径 3（仓库自动化自下而上）：在 2025 年 $29.9B 的仓库自动化 TAM 中，人形机器人约占当前支出的 3–5%，但预计到 2030 年将升至 $63.4B
              市场的 10–15%，意味着十年末人形仓库自动化机会为 $6.3B–$9.5B。Agility 2025 年的 SAM 明显更小：美国和西欧愿意签多年期 RaaS 合同、设施面积 ≥250,000 sq ft
              的第三方物流（3PL）和大型电商履约运营商。该 SAM 估计为 $800M–$1.5B。Agility 2025 年的 SOM 受制于产能（数百到低千台）和活跃销售管线，按已披露部署和估计 RaaS
              合同价值，大概率为 $20M–$100M。
