  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Agility Robotics
              所处的商用人形机器人市场仍处早期，但已有六个有实质意义的竞争对手，覆盖不同融资规模、技术路线和商业野心。格局可分为三层。第一层是资金充足、短期内瞄准同一物流和制造垂直的竞争者：Figure AI（2025 年 9
              月估值 $39B）、Apptronik Apollo（估值约 $5B，Samsung 投资）和 1X Technologies NEO（寻求 $10B 估值，OpenAI
              支持）。第二层是拥有相邻技术优势的平台型现有玩家：Tesla Optimus（背靠 Tesla 的垂直一体化制造和 FSD AI 栈）以及 Boston Dynamics Atlas（归 Hyundai
              Motor Group 所有，56 DOF、IP67 等级）。第三层是低成本中国进入者：Unitree G1（起售价 $16K），有能力侵蚀研究和试点细分。关键差异事实是，截至 2026 年中，Agility
              是唯一一家公开记录显示已有多年期、商业规模 RaaS 部署的竞争者。这一部署领先带来运营数据、客户背书和流程集成锁定，而竞争对手尚未复刻。不过商业窗口有限：Figure AI、Apptronik 和 1X
              都把商业生产目标放在 2026–2027 年，Tesla 也释放信号称 Optimus 可能在 2026–2027 年时间段对外可用。Agility
              已经建立的竞争护城河真实存在，但有时间边界；防御力高度取决于客户获取、产能爬坡和 AI 能力提升的执行速度。
