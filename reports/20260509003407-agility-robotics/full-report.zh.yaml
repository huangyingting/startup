      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: |
              客户集中度风险很高。GXO Logistics 是唯一公开确认的生产客户；如果 GXO 决定不续约或不扩大部署，
              Agility 的商业可信度和近期收入都会受到实质性损害。Amazon 的参与在财务和战略上都很重要，
              但它是投资方加试点关系，而非已确认的生产收入来源。如果 Amazon 决定利用自有机器人能力，
              或部署竞争性人形平台（Boston Dynamics Spot、Figure AI、1X Technologies），
              Agility 市场定位的下游影响可能很严重。

              扩张驱动因素可信，但取决于执行。先落地再扩张的模式——先部署在大型 3PL 网络内一个站点，
              再推向更多设施——是主要增长路径。GXO 在全球运营数百个 DC；即便只是再增加 10–20 个 GXO
              站点、每站点 5–10 台机器人，也意味着相对当前推断基数扩大 10–20 倍。向 GEODIS、Amazon
              和新的 Partner Program 进入者扩张遵循同一模式。瓶颈在部署周期（OSHA 批准、设施改造、
              WMS 集成），而不是需求。

              RaaS 模式放大了收入集中度风险：多年合同能降低季度间波动，但若大客户不续约，
              收入会台阶式下滑，而不是逐步衰减。尽调应确认 GXO 的续约意向、处于主动部署阶段的客户管线
              （而不只是 Partner Program 准入），以及是否有任何试点被终止或转为“无决定”。
