chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 为工业物流和仓库自动化设计、制造并部署双足人形机器人。公司的核心产品 Digit 被推向市场时定位为首个持续进入商业生产部署的人形机器人，这一定位有 GXO Logistics
              和 Amazon 履约中心的已记录部署支撑。Agility 主要靠机器人即服务（RaaS）订阅模式销售 Digit 使用权，通常每台机器人每月收费
              $10,000–$15,000，把硬件、维护、软件更新和车队管理打包在一起。公司也通过约每台 $150,000 的直接销售，以及 Agility Arc 云平台订阅获得收入；Arc
              负责编排机器人车队，并与仓库管理系统集成。Agility 的公开使命是自动化仓库里“枯燥、肮脏、危险、重复”的任务，解决物流和供应链运营中长期存在的用工短缺。公司总部位于 Washington 州
              Redmond，并运营位于 Oregon 州 Salem 的 RoboFab，这是一座 70,000 sq ft 制造设施。公司称 Digit 约 6,000 个零部件中约 80%
              来自美国，体现其供应链韧性策略。截至 2026 年，Agility 称自己正在交付“经验证的成果”，并把 Digit 与 Agility Arc 软件平台一起定位为面向设施运营商的完整自动化方案。
            claimRefs:
