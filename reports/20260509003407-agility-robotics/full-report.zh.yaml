      - number: '5.4'
        title: 制造、供应链与知识产权
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 运营 RoboFab，这是一座位于 Oregon 州 Salem 的专用人形机器人制造设施，
              2023 年 9 月宣布，2024 年投产。该设施面积 70,000 sq ft，满产后的产能目标为
              每年 10,000 台 Digit，是全球最大的专用人形机器人生产基地之一。截至 2026 年初，
              约 100 台已在 GXO 和 Amazon 商业部署，说明该设施仍处在产能爬坡阶段。单台约
              6,000 个零件的 BOM 中，约 80% 来自美国供应商；相比更依赖中国来源组件的竞争者，
              这降低了单一地理供应链风险。Agility 的知识产权组合覆盖双足运动（源自 Cassie 研究谱系）、
              操控与任务优化末端执行器设计、纳入 FSoE 协议的安全与控制系统架构，以及 Arc 平台中的
              多机器人编排。确切专利数量未公开披露。关键基础 IP 来自 OSU 的 Dynamic Robotics Laboratory，
              Jonathan Hurst 关于被动动态行走和能效型双足运动的研究被转化为商业专利申请。
              RoboFab 的专用产能、美国来源供应链和学术 IP 谱系叠加，形成制造与 IP 护城河；
              新进入者要复制会耗费多年时间。不过，10,000 台设计产能与当前约 100 台部署之间的落差，
              是重大的执行与规模化风险，投资者和伙伴应在 2026–2027 年密切跟踪。
            claimRefs:
              - CE016
