      - number: '4.5'
        title: 财务风险与盈利路径
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 面临多项财务风险，可能实质影响其盈利路径。第一，每机器人小时运营成本（$10–$12/hr）仍低于目标计费价格
              $30/hr；差距必须靠硬件降本和软件杠杆共同收窄，但两者都没有保证。如果当前现金耗尽时成本曲线仍未改善，公司将需要追加资本，而届时 RaaS 模式可行性仍未被最终证明。第二，收入集中是实质风险：两个公开已知客户
              Amazon 和 GXO Logistics 可能占当前合同价值的绝大多数；任何部署放缓或合同重谈都会对收入造成不成比例影响。第三，直接销售 $150K ASP 和 RaaS 每月 $10K–$15K
              的价格，可能在 Boston Dynamics、1X Technologies、Figure AI 等竞争者推出竞争产品后承受下行压力，在规模尚未形成前压缩利润率。第四，RoboFab 资本强度高——70,000
              sq ft，目标 10,000 台 / 年——需要持续高利用率才能获得单台成本杠杆；低生产良率或爬坡延迟会推高实际 COGS。第五，隐含收入倍数为 15×–60×（$2.1B 估值对应估计 $10M–$80M
              收入），对近期商业执行提出极高要求。持怀疑态度的行业分析质疑，人形机器人能否在下一轮融资周期前达到足以支撑当前定价和估值溢价的可靠性和利用率。缺少经审计财务数据、且公司为私人公司，使得在没有正式尽调权限的情况下独立评估这些风险较为困难。
