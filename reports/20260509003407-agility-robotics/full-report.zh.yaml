      - number: '6.2'
        title: 已具名客户部署与证据
        blocks:
          - type: paragraph
            body: |
              截至 2026 年初，GXO Logistics 是 Agility Robotics 唯一确认的商业生产客户。
              双方关系始于 2024 年 6 月宣布的多年 RaaS 协议，Digit 被部署在 Georgia 州 Lithia Springs
              由 GXO 运营的 SPANX 履约中心。到 2025 年底，Digit 已在真实生产中完成超过 100,000 次
              周转箱搬运；Robotics & Automation News 于 2025 年 11 月独立报道了这一里程碑，
              并称其为全球首个正式商业人形机器人部署。该部署在围栏隔离环境中运行，并取得 OSHA NRTL
              站点特定批准；这是关键安全资质步骤，使 GXO 能在 OSHA 管辖下让 Digit 与人类工人同场运行。
              GXO 按收入计也是全球最大的纯合约物流公司，因此是可信度很高的标杆客户。

              Amazon 确认参与 Agility Partner Program——这是 Agility 面向企业客户的结构化商业接入路径——
              并已在 Amazon 履约设施的探索性试点场景中部署 Digit。Amazon Industrial Innovation Fund
              参与了 Series B 和 Series C 两轮融资，既提供资本，也传递了隐性的产品市场验证信号。
              不过，Amazon 尚未被确认为生产部署客户，且公司自身运营 Amazon Robotics 机器人研发项目，
              因而长期独家依赖 Agility 的可能性不高。

              法国全球物流运营商、全球前十 3PL GEODIS 确认参与 Agility Partner Program，
              Digit 试点聚焦仓库周转箱搬运和拖车卸货任务。截至报告日期，GEODIS 尚未公开宣布生产部署
              或多年协议。

              据报道，未具名零售商和电商运营商也在贸易展演示（NRF 2025、MODEX 2024）中表现出
              试点阶段兴趣，但尚无其他已具名生产客户获得公开确认。
