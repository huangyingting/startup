      - number: '8.4'
        title: 情景与回报分析
        blocks:
          - type: paragraph
            body: |
              2025–2030 年投资周期内，Agility 的估值路径由三种情景主导。乐观情景假设 RoboFab 到
              2027 年达到每年 5,000+ 台，拥有 5+ 个具名生产客户，ARR 到 2028 年超过 $300M，
              并以 10–15 倍 ARR 完成 IPO 或战略并购，对应 $3B–$5B 企业价值。Series C 进入的投资者
              在稀释前 3–4 年回报约为 2–3 倍。基准情景假设 RoboFab 到 2027 年生产 1,500–2,500 台，
              拥有 2–3 个具名生产客户，2028 年 ARR 为 $150M–$250M，并以 $1.5B–$2.5B 完成并购退出。
              Series C 回报约为 0.9–1.4 倍——按 Series C 价格看只是勉强。悲观情景包括 RoboFab
              生产延迟到 2028 年以后、GXO 客户流失、OSHA 驱动的部署限制，以及无法按 Series C 价格
              募集 Series D，最终以下调估值的 $700M–$1.0B 融资，或以困境估值被迫并购。该情景下
              Series C 回报为 0.4–0.6 倍，优先股堆叠会保护机构投资者，但普通股会遭到重创。

              下行情景不是尾部风险：六个投资逻辑破裂触发点中有三个（RoboFab 延迟、第二个客户增加、
              OSHA 批准泛化）在 18 个月内可观察。主动型投资者应围绕这些里程碑建立监控仪表盘，
              并在 Series D 进入时设定价格纪律。截至 2026 年 Q1，概率分布约为 30% 乐观、45% 基准、
              25% 悲观。
            claimRefs: []
          - type: table
            tableRef: TV004
