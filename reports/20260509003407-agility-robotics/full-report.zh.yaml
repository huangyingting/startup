  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: |
      二维风险热力图，将 Agility Robotics 主要风险类别按发生可能性和影响严重性排列。每个单元格标出对应可能性-影响象限中的风险，便于在不同风险域中排序缓释资源和监控重点。
    claimRefs:
      - CR001
      - CR011
      - CR021
      - CR030
      - CR037
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
        - 近乎确定
      rows:
        - label: 极高影响
          values:
            - 无
            - 工作场所安全事件触发 OSHA；Amazon 竞争策略转向内部人形机器人
            - 制造爬坡失败（99 倍产能缺口持续到 2026 年）
            - 无
        - label: 高影响
          values:
            - IP 专利侵权索赔；出口管制执法行动
            - EU AI Act 高风险认定；GXO 不续约；网络安全泄露；SoftBank 战略转向；Shelton 或 Hurst 离职
            - 供应链半导体中断；商业规模下电池或可靠性失效
            - 无
        - label: 中等影响
          values:
            - 机器人税或工会岗位替代立法通过
            - 制造爬坡期间 CEO 执行缺口；董事会投资人协调摩擦
            - AI 与机器人工程人才流失至 Big Tech 竞争对手
            - 无
        - label: 低影响
          values:
            - 单个非 Intel 本土零部件供应商失效
            - 无
            - 无
            - 无
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: |
      有向图展示 Agility Robotics 的主要风险事件如何沿因果链传导，进入影响收入、客户、毛利、运营和投资人信心的下游结果。每条边代表风险事件之间的因果或条件依赖。
    claimRefs:
      - CR011
      - CR014
      - CR021
      - CR030
      - CR037
      - CR038
    data:
      nodes:
        - id: safety-incident
          label: 安全事件（Digit 伤人）
          detail: 客户现场发生与 Digit 相关的工伤；达到 OSHA 可记录级别或更严重分类。
        - id: regulatory-action
          label: OSHA 调查或执法
          detail: 伤害触发 OSHA 调查；可能收到违规通知、罚款或部署暂停令。
        - id: deployment-ban
          label: 部署暂停
          detail: 由客户发起或监管强制的 Digit 部署暂停；可能跨客户扩散。
        - id: media-fallout
          label: 媒体与声誉冲击
          detail: 负面报道放大安全疑虑；伤害 Agility 销售管线和投资人信心。
        - id: customer-loss
          label: 客户流失或合同违约
          detail: GXO、Amazon 或其他客户以安全事件为由终止合同或缩减范围。
        - id: manufacturing-gap
          label: 制造爬坡失败
          detail: RoboFab 无法达到生产规模；当前约 100 台，对比 10,000 台设计产能。
        - id: delivery-delay
          label: 订单交付延迟
          detail: 商业客户收到的 Digit 单元，比合同交付承诺晚数月甚至数年。
        - id: customer-churn
          label: 客户流失与订单取消
          detail: 交付延迟使客户无法达到内部 ROI 目标，进而取消或减少待履约订单。
        - id: competitor-scale
          label: 竞争对手领先放量
          detail: 某个人形机器人竞争对手率先实现商业规模、更优规格或协作认证。
        - id: price-war
          label: RaaS 价格战与毛利压缩
          detail: 竞争压力迫使 RaaS 降价，压缩贡献毛利并推迟盈亏平衡。
        - id: talent-war
          label: AI 与机器人人才竞争升级
          detail: 竞争对手提高关键 AI 工程师薪酬；Agility 面临更快的人才流失压力。
        - id: key-person-loss
          label: 关键高管离职
          detail: Shelton、Hurst 或关键工程团队成员流失，扰乱执行并打击投资人信心。
        - id: capital-depletion
          label: 资金续航压缩
          detail: 收入短缺叠加制造投入和人才成本，使 Series C 资金消耗快于模型预期。
        - id: runway-end
          label: 被迫以受压估值融资
          detail: 资金耗尽迫使公司在商业里程碑达成前进行估值下调轮或困境融资。
        - id: acquisition-pressure
          label: 被迫并购或战略出售
          detail: 资金枯竭或投资人压力触发战略出售，交易条款低于内在价值。
      edges:
        - from: safety-incident
          to: regulatory-action
          detail: OSHA General Duty Clause 要求调查涉及动力工业设备的严重伤害。
        - from: safety-incident
          to: media-fallout
          detail: 人形机器人工作场所伤害是高可见度新闻事件，且会被媒体对该赛道的强烈兴趣放大。
        - from: regulatory-action
          to: deployment-ban
          detail: OSHA 罚单或整改令可能要求暂停 Digit 运营，直到隐患完成整改。
        - from: media-fallout
          to: customer-loss
          detail: 负面媒体报道会让正在评估 Digit 的企业客户转向保守采购决策。
        - from: deployment-ban
          to: customer-loss
          detail: 监管叫停部署会直接终止或暂停正在执行的商业 RaaS 协议。
        - from: manufacturing-gap
          to: delivery-delay
          detail: 生产速度低于接单速度，会拉长新商业客户订单的交付周期。
        - from: delivery-delay
          to: customer-churn
          detail: 交付日期延后时，部署时间表固定的企业客户会取消或缩减订单。
        - from: competitor-scale
          to: price-war
          detail: 如果竞争对手跑通有成本竞争力的量产，Agility 的 RaaS 定价会承受下行压力。
        - from: competitor-scale
          to: talent-war
          detail: 已有商业进展、资金充足的竞争对手会争抢同一批 AI 和机器人工程人才。
        - from: talent-war
          to: key-person-loss
          detail: 薪酬与竞争对手长期拉开差距，会导致工程和管理岗位人员流失。
        - from: customer-loss
          to: capital-depletion
          detail: RaaS 收入合同流失会压低预期现金流入，并缩短现金跑道。
        - from: manufacturing-gap
          to: capital-depletion
          detail: 在当前低利用率下继续投入制造，会形成高固定成本，但收入覆盖不足。
        - from: price-war
          to: capital-depletion
          detail: RaaS 合同利润率被压缩，会降低单台机器人的贡献利润，并明显恶化单位经济性。
        - from: capital-depletion
          to: runway-end
          detail: 烧钱速度与现金余额决定现金跑道；负向偏差会迫使公司提前紧急融资。
        - from: runway-end
          to: acquisition-pressure
          detail: 困境融资失败或条款不可接受时，战略出售会成为唯一可行退出路径。
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: |
      这张有向依赖关系图展示 Agility Robotics 的关键外部依赖：客户、投资人、制造、供应链、平台基础设施和监管认证路径。 这些依赖共同决定商业执行能否跑通。
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
    data:
      nodes:
        - id: agility
          label: Agility Robotics
          detail: 核心实体——人形机器人开发商、RaaS 运营方、Arc 平台提供方和雇主。
        - id: amazon
          label: Amazon（AIIF 与客户）
          detail: 通过 Amazon Industrial Innovation Fund 投资；通过 Sumner WA 部署成为客户；兼具双重战略角色。
        - id: gxo
          label: GXO Logistics（锚定客户）
          detail: 唯一公开确认的多年期 RaaS 商业合同；位于 Flowery Branch GA；已达成 100K+ 个周转箱处理里程碑。
        - id: softbank
          label: SoftBank（领投方）
          detail: Series B 领投方；战略信誉锚点；可能提供后续资本并影响治理。
        - id: robofab
          label: RoboFab（唯一工厂）
          detail: Salem Oregon 工厂面积 70,000 sq ft，设计产能 10,000 台 / 年；全球唯一制造基地。
        - id: us-suppliers
          label: 美国零部件供应商
          detail: Digit BOM 约 80% 来自美国本土供应商；包括电机、执行器、结构件、传感器。
        - id: intel-nvidia
          label: Intel 与 NVIDIA（计算）
          detail: 机载双 Intel i7；载荷舱可选配 NVIDIA Jetson；依赖外部半导体供应。
        - id: arc-cloud
          label: Arc 云平台
          detail: 车队编排、WMS 集成、远程急停、安全监控；由 Agility 运营的 SaaS 平台。
        - id: enterprise-customers
          label: 企业客户管线
          detail: GXO 和 Amazon 之外，商业部署管线中的物流、制造和零售运营商。
      edges:
        - from: amazon
          to: agility
          detail: Amazon AIIF 参与 Series B 和 C 轮融资；同时签下 Sumner 设施 Digit 部署客户合同。
        - from: softbank
          to: agility
          detail: SoftBank 领投 Series B；战略投资方，可能在董事会层面影响治理。
        - from: agility
          to: robofab
          detail: Agility 拥有并运营 RoboFab；所有已出货商业 Digit 单元唯一生产设施。
        - from: us-suppliers
          to: robofab
          detail: Digit 约 6,000 个零部件中，约 80% 来自美国本土供应商；供应中断会直接影响产速。
        - from: intel-nvidia
          to: robofab
          detail: 每台在 Salem Oregon RoboFab 组装的 Digit 都需要 Intel 和 NVIDIA 供应计算芯片。
        - from: robofab
          to: agility
          detail: RoboFab 是 Digit 单元唯一来源；量产规模决定全部商业交付能力。
        - from: agility
          to: arc-cloud
          detail: Agility 开发并运营 Arc；这是主要的车队管理、安全和 WMS 集成平台。
        - from: arc-cloud
          to: gxo
          detail: GXO Flowery Branch 部署由 Arc 管理；覆盖 WMS 集成和周转箱作业流编排。
        - from: arc-cloud
          to: amazon
          detail: Amazon Sumner 部署由 Arc 管理；覆盖遥测、任务分发和远程安全急停控制。
        - from: arc-cloud
          to: enterprise-customers
          detail: Arc 平台是未来所有企业级规模化部署的商业交付机制。
  - id: FV001
    title: 投资建议逻辑
    type: flow
    notes: 从证据支柱到风险，再到建议姿态的逻辑链。
    claimRefs:
