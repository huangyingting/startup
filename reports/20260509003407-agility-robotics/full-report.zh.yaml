      - number: '1.5'
        title: 里程碑与公司时间线
        blocks:
          - type: paragraph
            body: >
              Agility Robotics
              的历史可分为五个阶段：学术起源（2015–2017）、早期商业化（2018–2020）、资本形成（2021–2022）、制造建设（2023–2024）和商业扩张（2025–2026）。公司 2015 年创立于
              Oregon State University；第一个重要外部机器人 Cassie 于 2017 年发布，并卖给研究实验室。Digit 平台约在 2019–2020
              年首次推出，是一款能力更强、带手臂和操作能力的双足人形机器人。2022 年的 $150M Series B 支撑公司转向商业部署。2024 年 6 月，公司与 GXO Logistics 签下多年期 RaaS
              协议，被称为行业首例；随后在 2025 年 11 月达成搬运 100,000 个周转箱的里程碑。2025 年 3 月的 $400M Series C 是公司最大单笔融资事件。位于 Salem 的 RoboFab
              于 2023 年 9 月公开宣布，2024 年开业，并正在爬坡至满产。2024 年 3 月，Peggy Johnson 加入并出任 CEO。截至 2026 年，Agility 把“协作安全”版本 Digit
              作为下一个重大产品里程碑，目标是让机器人无需安全围栏即可与人类协作；计划 2026–2027 年推出，并配备载荷 50-lb 的第五代机型。
