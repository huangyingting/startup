      - number: '8.3'
        title: 可比公司与市场基准
        blocks:
          - type: paragraph
            body: |
              收入前阶段的人形机器人公司没有直接上市公司可比。最有用的可比对象横跨三类：
              人形机器人私募轮次、相邻工业自动化公司，以及战略并购先例。

              在人形机器人私募轮次中，Figure AI 是最相关的同业。Figure AI 在 2024 年 2 月一轮融资中
              募集 $675M，投后估值 $2.6B，投资方包括 Microsoft、Bezos Expeditions 和 Intel Capital。
              其 BMW 工厂试点和 OpenAI 集成显示出不同的 GTM（汽车 / 通用型，相对于 Agility 的物流专用型）。
              Apptronik 2024 年从 Samsung 等投资方募集 $350M，估值未披露。1X Technologies 2024 年
              在 OpenAI 支持下以约 $400M 估值募集 $100M。Tesla Optimus 未独立估值，但受益于
              Gigafactory 制造集成。同业区间说明，收入前人形机器人的估值可在 $400M–$2.6B 之间波动，
              取决于制造验证、战略支持和伙伴生态深度。Agility 的 $1.75B 处于该区间上沿，
              其商业生产里程碑可以支撑这一位置，但相对未公开披露收入的同业仍显得偏紧。

              在工业自动化领域，Zebra Technologies（工业移动机器人，约 $15B）、Cognex（机器视觉，
              约 $8B）和 Teradyne（协作机器人，约 $4B）的交易倍数为远期收入 5–8 倍。
              这些不适合作为直接倍数，但如果 Agility 能实现 $250M–$500M ARR，可为退出区间提供锚点。
              Boston Dynamics 先例有参考意义：Hyundai 2021 年以 $1.1B 从 SoftBank 手中收购 Boston Dynamics——
              价格低于开发成本，但符合收入前机器人战略并购逻辑。若 RoboFab 达到每年 3,000–5,000+ 台，
              并证明多客户 RaaS，带战略溢价的物流自动化战略收购方可能给 Agility $3B–$5B+ 估值。
            claimRefs: []
          - type: table
            tableRef: TV003
