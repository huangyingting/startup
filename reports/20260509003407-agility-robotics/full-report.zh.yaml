      - number: '1.2'
        title: 创立历史与领导层
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 于 2015 年从 Oregon State University 的 Dynamic Robotics Laboratory 分拆成立，实验室由 Jonathan Hurst
              教授领导，他多年研究腿式运动和双足机器人。联合创始人 Damion Shelton 自公司成立起担任 CEO 至 2024 年初，把公司从学术原型带到商业产品。2024 年 3 月，Microsoft
              前总裁、Magic Leap 前 CEO Peggy Johnson 接任 CEO，为一家从研发转向大规模部署的公司带来企业级商业化经验。Hurst 现任首席机器人官，聚焦技术愿景；Shelton
              则出任总裁兼董事长。其他关键高管包括 Melonee Wise（首席产品官，曾任 Fetch Robotics CTO/CEO）、Pras Velagapudi（CTO）、Aindrea
              Campbell（COO，曾任职 Apple 和 Zymergen）、Rich Bohne（首席商务官）和 Ana Lang（首席法务与人力官）。Hurst 与 Shelton
              这对创始组合仍是公司身份的核心：深厚的学术机器人能力与商业野心结合在一起。截至 2026 年中，公开记录中没有有争议的创始人离职或治理纠纷，不过 2024 年的 CEO 交接是一次实质性组织变化。公司源自
              OSU，使其在腿式运动研究上拥有被认可的研究传承。
