  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: |
              截至 2026 年初，Agility Robotics 是商业化进展最靠前的双足人形机器人公司。
              其投资逻辑建立在五个相互强化的支柱上。第一，公司做到了竞争对手尚未做到的事：
              一个具名企业客户（GXO Logistics）在持续多月生产中运行商业 RaaS 合同，并在 SPANX
              履约中心搬运超过 100,000 个周转箱。第二，公司拿下 Amazon 作为战略投资方和试点伙伴，
              既获得资本，也获得接触全球最大仓库运营商的入口。第三，RoboFab 这个位于 Oregon 州 Salem 的
              专用制造设施，代表了 $70M 资本投入，目标是建设每年 10,000 台的可扩展生产基础设施；
              若达成，Agility 将成为第一个达到有意义工业规模的人形机器人制造商。第四，公司在 Oregon State University
              十余年开发出的双足运动 IP，为人形机器人最难的工程问题提供了可防守护城河。第五，
              $400M Series C 带来 24–36 个月运营现金跑道，降低近期融资风险。

              反向逻辑同样清楚。Agility 当前收入基础很薄：只有一个具名生产客户，估计 ARR 低于 $10M，
              $1.75B 估值意味着 150 倍或更高收入倍数——只有当 RaaS 规模化模型以强单位经济性跑通时，
              这个倍数才站得住。Figure AI 在 Microsoft、OpenAI 等支持下以 $2.6B 估值融资，
              其 Helix 通用 AI 模型可能让它更快打入广泛市场。Tesla Optimus 在 Tesla 既有 gigafactory
              中制造，可能具备 Agility 无法匹敌的成本优势。Unitree G1 以每台 $16,000 进入市场——
              比 Digit 隐含的 RaaS 成本基准便宜三个数量级——瞄准开发者和研究市场，可能在企业市场成熟前
              建立平台锁定。专业执行器的供应链集中度带来规模化生产风险。支撑 Agility 市场的劳动力替代叙事
              也有政治风险：工会反对、自动化征税提案，以及 OSHA 按站点审批要求，都可能拖慢企业采用。
            claimRefs: []
