      - number: '3.2'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              Figure AI（2022 年创立，位于 California 州 Sunnyvale）是知名度最高、资本最充足的纯人形机器人竞争者。其 B2 机器人高 5'6"，重 60kg，载荷 20kg，步行速度 1.2
              m/s，电池周期 5 小时。Figure AI 的 Helix 视觉-语言-动作模型代表了真正差异化的 AI 能力，可从人类示范中学习通用任务；Agility 当前 AI 栈在通用性上无法匹配。Figure 于
              2025 年 9 月以 $39B 投后估值完成超过 $1B 的 Series C。不过，其 BMW 工厂试点——公司的第一个有实质意义的商业测试——在 2025 年初中止，原因是发现明显依赖遥操作；截至 2026
              年中，Figure AI 尚未达到与 Agility 可比的商业规模。Tesla Optimus Gen 2 是战略变数：机器人高 5'8"，重 57kg，载荷 20kg，一旦商业化，目标单价为
              $20K–$30K。截至 2026 年，Tesla 仅在自有制造设施内部部署 Optimus，没有对外商业销售。Boston Dynamics electric Atlas（2024）是身体能力最强的平台，高
              6'2"，重 90kg，载荷 50kg，但单价 $150K+，重点是 Hyundai/Kia 汽车装配，而非物流。挪威创业公司 1X Technologies 的 NEO 提供 $20K 直接销售 / 每月
              $499 订阅模式，承载能力 25kg；它完成由 OpenAI 和 EQT Ventures 支持的 $125M Series B，据报道正以 $10B 估值寻求 $1B 融资。Apptronik Apollo
              是一款 5'9"、72kg、25kg 载荷的平台，拥有 NASA 合作、Samsung 投资，以及开放开发者平台路线。Unitree G1 起价约 $16K，远低于所有西方竞争者，主要瞄准研究和试点预算。
