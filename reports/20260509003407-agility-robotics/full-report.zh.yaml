      - number: '3.3'
        title: 能力与功能差异化
        blocks:
          - type: paragraph
            body: >
              从整个竞争场看，物流客户最看重的能力维度是载荷、电池续航、任务灵活性、安全认证和商业集成成熟度。Agility 的 Digit 载荷为 16kg，在主要竞争者中最低；Figure AI B2、Tesla
              Optimus、1X NEO 和 Apptronik Apollo 都把载荷目标定在 20–25kg。Digit 聚焦周转箱物流流程，而 16kg
              已超过实际需求，这缓和了载荷差距，但规格弱点仍然存在。电池续航方面，Digit 的 4+ 小时与 1X NEO 的竞争性参数相当；Boston Dynamics Atlas 的运行周期最受限制。Agility
              的关键能力差异来自部署栈：Agility Arc 平台、3D LiDAR + 立体摄像头传感器融合、WMS 集成能力，以及 FSoE CAT1
              功能安全认证。没有竞争者在第三方物流环境中取得同等商业规模部署认证。AI 能力方面，Figure AI 的 Helix VLA 模型被认为技术上优于 Agility
              当前方案，因为它可从示范中支持通用多任务操作，而 Digit 的 AI 栈针对范围更窄的物流任务优化。如果 Tesla 决定投入人形机器人专用训练管线，源自 FSD 的 AI 栈会给 Optimus 长期 AI
              开发优势。Apptronik 的开放开发者平台差异化在生态扩张，而非核心 AI 能力。
