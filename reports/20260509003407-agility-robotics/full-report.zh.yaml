  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 竞争所在市场是人形机器人，具体落在物流和仓库自动化子赛道。公司的产品 Digit 面向人类尺度环境中的体力重复任务：搬运周转箱、装载传送带、堆叠容器，并支持最后一段履约流程。因此
              Agility
              处在两个更大市场的交叉点：（1）全球人形机器人市场；（2）更广义的仓库自动化市场。仓库自动化市场指所有部署在履约设施内、用于自动化仓储、分拣、拣选、包装和运输的软硬件。ResearchAndMarkets
              估计该市场 2025 年规模约 $29.9B，到 2030 年增长至 $63.4B，CAGR 为 16.2%。其中，物流机器人硬件（AMR、AGV、人形机器人、拣选机械臂）按 Grand View
              Research 口径，2024 年是一个 $14.5B 细分市场。对 Digit 更相关的竞争边界是人形机器人市场本身；MarketsandMarkets 估计 2025 年全球规模约 $2.9B，到 2030
              年增长至约 $15.3B，CAGR 为
              39.2%。关键替代方案和相邻方案包括自主移动机器人（AMR）、机器人拣选臂、固定传送系统、传统用工中介和外包仓库劳动力。人形机器人的差异在于，它们可在非结构化、按人类尺度设计的环境中运行，无需改造设施；对无法承担或无法论证现有仓库布局改造的客户来说，这是核心卖点。
