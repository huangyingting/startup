      - number: '1.4'
        title: 封面指标与规模信号
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月研究日，Agility Robotics 作为私人公司，大多数财务指标仍未披露。最可靠的已记录数字包括：投后估值约 $2.12B（2025 年 3 月 Series C）；累计融资约
              $641M；以及 2025 年估计年收入约 $35.5M，该数字来自第三方数据提供商（CompWorth、CBInsights），置信度较低。员工数估计在 250 到 500+ 之间，仅 Salem
              RoboFab 设施就以 500+ 为目标。公司未公开披露毛利率、ARR 或 RaaS 合同数量。公司称 Digit 已“进入生产部署”，且至少有两个具名企业客户（GXO Logistics 和
              Amazon）。2025 年 11 月，GXO 部署搬运周转箱超过 100,000 次，形成一个有记录的运营吞吐里程碑。Agility 预计 RoboFab 完全建成后年产能为 10,000 台 Digit，但
              2024 年和 2025 年的实际产量处在数百台而非数千台区间。考虑到制造扩张所需资本投入，公司收入预计尚未达到盈亏平衡。截至研究日，公开信息中没有披露债务融资或老股交易。
