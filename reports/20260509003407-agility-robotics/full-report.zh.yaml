      - number: '3.5'
        title: 竞争护城河与替代风险
        blocks:
          - type: paragraph
            body: >
              Agility 的竞争优势包括：（1）先发部署数据——GXO 超过 100,000 次周转箱搬运产生专有运营数据，可反哺 AI 和机械优化。（2）RaaS 软件锁定——Agility Arc 的 WMS
              集成形成类似企业 SaaS 的切换成本；更换 Digit 需要把 WMS 与竞争平台重新集成、重新培训操作员，并重新设计安全区域。（3）生产基础设施——位于 Oregon 州 Salem、70,000 sq ft
              的 RoboFab 目标年产 10,000 台，提供多数竞争者尚未建立的供应链规模。（4）安全认证——FSoE CAT1
              与既有围栏隔离部署经验带来监管熟悉度和合规路径，竞争者还需要复刻。关键替代风险包括：（a）Figure AI 到 2027 年实现商业部署规模，凭更强通用 AI
              能力和可比价格进入，这是考虑融资和人才后最可能的近期威胁。（b）Tesla Optimus 达成 $20–30K 目标单价，使直接购买在 12–18 个月总拥有成本口径下可与 Agility 的 RaaS
              竞争。（c）中国制造商，尤其是 Unitree，通过价格压力侵蚀试点和早期采用者细分，迫使 Agility 下探到低于其企业定位的市场。（d）如果 Figure AI 或 Apptronik 在 Agility
              之前拿下 GXO 竞争对手的企业合同，商业窗口会比 Agility 扩张速度更快收窄。IEEE 在 2025 年发布评估指出，全行业在 AI
              可靠性、运行时间和安全集成等商业成熟度方面仍有显著缺口；这些问题也适用于 Agility 及其竞争者。
