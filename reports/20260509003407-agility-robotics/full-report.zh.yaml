      - number: '2.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 结构性用工短缺是需求的核心催化剂
            body: >
              美国仓库和物流就业已连续多年面临结构性短缺，2024–2025 年在工资高于 $20/hr 的情况下，开放职位仍超过
              500,000。人口结构变化和电商增长共同驱动这一需求信号，为人形自动化带来持久、非周期性拉力，而且很大程度上不依赖单一技术厂商。
            calloutType: insight
            claimRefs:
              - CM016
              - CM017
          - type: callout
            title: 分析师预测分歧很大，应谨慎使用
            body: >
              主要分析机构对人形机器人市场的预测差异明显：2025 年规模从 $1.9B 到 $2.9B，2030 年从 $11B 到 $15.3B，意味着 2030 年估计值相差
              50%+。这种分歧反映了围绕安全认证节奏、技术成熟度和企业采用的深度不确定性；这些风险可能把 Agility 的可服务市场压到共识预期以下。
            calloutType: risk
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: callout
            title: 协作安全认证是打开市场的关键
            body: >
              当前所有 Digit 部署都在安全围栏环境中运行。拿到“协作安全”认证——让 Digit 能在没有隔离屏障的情况下与人类工人并肩作业——是近期大规模采用最重要的单一前提；Agility 的目标时间是 2026
              年末至 2027 年。
            calloutType: assumption
            claimRefs:
