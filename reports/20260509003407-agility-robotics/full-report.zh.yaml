      - number: '7.4'
        title: 人才与执行风险
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 的人才风险集中在高级领导层和技术联合创始人层面。CEO Peggy Johnson
              于 2024 年 3 月加入，背景来自 Microsoft、Qualcomm 和 Verizon 的商业与业务发展，
              而非机器人工程。Johnson 在完成 $400M Series C 融资和签下 GXO RaaS 协议上展现出
              很强的商业直觉，但她在机器人制造运营上的经验有限，在 RoboFab 产能爬坡关键阶段会带来执行风险。
              董事会和投资方群体尚未公开说明 CEO 以下的接班计划或运营梯队深度。

              Damion Shelton（总裁兼联合创始人）是最关键的技术与战略锚点。作为拥有深厚产品和业务发展经验的
              联合创始人，Shelton 连接了公司的技术与商业两端。他若离开，将显著冲击投资者信心和运营连续性。
              Jonathan Hurst（Chief Robotics Officer 兼联合创始人）发明了 Digit 底层受食火鸡启发的
              双足运动系统，并深耕腿足机器人动力学。Hurst 若流失，将拖慢运动控制研发；鉴于他在
              OSU 共同开发 IP 中的基础角色，也会带来专利连续性风险。

              AI 和机器人工程师的人才竞争极其激烈。Google DeepMind、Tesla、Meta AI，以及包括
              Figure AI 和 Physical Intelligence 在内的资金充足创业公司，都在激烈争夺同一批强化学习、
              运动控制和嵌入式系统工程师。Agility 作为一家商业部署约 100 台机器人规模的公司，
              能否留住并吸引这类人才，高度依赖股权激励结构和技术使命吸引力。董事会一致性风险也存在：
              Amazon、SoftBank 和 WP Global Partners 可能有不同的退出时间偏好和风险容忍度，
              在下一次战略拐点上形成治理摩擦。
