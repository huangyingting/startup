      - number: '5.2'
        title: 运动研究基础与 AI 感知技术
        blocks:
          - type: paragraph
            body: |
              Digit 的运动架构可追溯到 Oregon State University 2015 年开始开发的
              Cassie 双足机器人；这条技术谱系代表了能效型腿足运动领域最严谨的一批学术成果。
              仿生设计把动态稳定性放在准静态平衡之前，因此 Digit 面对地面扰动和外力偏差时，
              比静态稳定方案更能顶住并恢复。腿部几何受到食火鸡关节构型启发，行走时能被动回收能量，
              降低执行器负荷并延长电池续航。Agility 将强化学习用于抓取和操控任务，
              训练机载 AI 模型在不同周转箱形状和输送线高度之间泛化。感知管线把 3D LiDAR 点云
              与双目摄像头画面结合起来，在机载端跑神经网络推理，不靠人工遥操作也能自主规划路径和避障。
              IEEE 等同行评审刊物上围绕 Cassie 和 Digit 平台发表的学术论文，
              给出了一条有文献支撑的技术谱系；依赖更新、公开发表更少研究的竞争者不容易复制。
              不过，Agility 尚未公布商业部署中的任务成功率、操控延迟或故障恢复时间等具体基准结果，
              限制了外部对其所称性能的独立技术验证。开放式载荷舱允许接入第三方 AI 计算模块，
              硬件代际升级时，平台可以提升推理能力，而不必整机更换。
            claimRefs:
              - CE012
              - CE013
              - CE019
              - CE028
              - CE033
              - CE034
      - number: '5.3'
        title: Arc 云平台与企业集成架构
        blocks:
          - type: paragraph
            body: |
              Arc 云平台是 Agility 的软件即服务层，负责编排 Digit 机队、接入企业仓储系统，
              并提供远程监控和诊断。Arc 通过 webhook 和自定义 API 直接连接仓库管理系统（WMS）、
              仓库执行系统（WES）、制造执行系统（MES）和 PLC，让运营人员能在既有运营工具里
              给 Digit 分配任务，不必再搭一套并行的人机界面。2025 年 3 月宣布的关键差异化能力
              是 AMR 直连集成：Arc 能在同一工作流里调度 MiR 和 Zebra Technologies 的
              自主移动机器人，让 Digit 在全自动周转箱搬运链路中装卸 AMR。Arc 因此不只是
              Digit 机队管理器，而是面向已经运营 AMR 机队的物流设施的异构机器人统一编排平台。
              Arc 还支持安全机队监控和远程停机能力，这对需要集中控制室监督的企业部署至关重要。
              平台在机器人内部控制通信中使用 EtherCAT 现场总线，并由安全 PLC 协调符合 FSoE 的
              安全指令。Arc API 架构让 WMS 集成商和系统集成商能搭建横跨 Digit 与第三方自动化设备的
              自定义工作流自动化；集成库越成熟，这条能力越可能形成扩张护城河。截至 2026 年，
              具体 API 文档、SDK 可用性和公开开发者资源仍不充分透明，对评估集成深度的技术伙伴来说
              是一个缺口。
