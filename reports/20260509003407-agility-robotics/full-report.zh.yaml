    notes: 证据评级反映每个论点的来源深度和独立性。所有主张均基于公开信息。
    claimRefs:
      - CV005
      - CV006
      - CV007
      - CV008
      - CV009
    rows:
      - - 正向：唯一已达到商业化人形机器人生产里程碑
        - GXO SPANX：搬运 100,000+ 个周转箱；多年期 RaaS 协议；OSHA NRTL 站点批准
        - 强
        - 若 GXO 不续约或公开披露运营失败，判断反转
      - - 正向：Amazon 战略投资并担任试点伙伴
        - Amazon Industrial Innovation Fund；Agility Partner Program；Amazon 设施持续开展部署测试
        - 强
        - 若 Amazon 推出达到生产规模的内部人形机器人项目，论点削弱
      - - 正向：RoboFab 制造基础设施
        - 资本开支 $70M+；Salem OR 设施；10,000 台/年设计产能；Agility 保留制造控制权
        - 中
        - 若 RoboFab 产能爬坡晚于 2025 Q4 承诺，论点明显削弱
      - - 反向：估值相对已披露收入偏高
        - ARR 估计低于 $10M；投后隐含估值 $1.75B；收入倍数 >150x
        - 强
        - 若 2026 年靠机队扩张把 ARR 推到 $100M+，该反向论点被中和
      - - 反向：竞争对手资本强度和覆盖广度
        - Figure AI（$2.6B）、Tesla Optimus（超级工厂支撑）、Unitree G1（每台 $16K）、Apptronik（Samsung 支撑）
        - 强
        - 若 Agility 在 500+ 台机器人规模证明 RaaS 毛利率 >40%，该反向论点减弱
