  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 商业模式与收入结构
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 采用混合收入模式，结合经常性订阅收入、一次性硬件销售和仍处早期的软件平台收入。主要渠道是机器人即服务（RaaS）：企业客户估计每台机器人每月支付 $10,000 到
              $15,000，获得硬件使用权、维护、软件更新，以及通过 Agility Arc
              平台提供的车队管理支持。该订阅结构把物流运营商的资本开支决策转成运营开支，降低大规模部署的采用门槛。公司公开的长期目标是每机器人小时 $30——与美国仓库环境中全负荷人工成本相当——因此 RaaS
              经济性本质上是直接替代劳动力。第二条收入流是约每台 Digit $150,000 的直接硬件销售，可能服务偏好资产所有权或研究采购的客户。第三，Arc 云平台提供车队编排和仓库管理系统集成；Arc
              独立订阅定价尚未公开披露。由于公司为私人公司，这三条收入流的结构未知。第三方对 2025 年年收入估计从 $10M 到 $80M 不等，最常被引用的中点接近
              $35M（Growjo）。公司未披露官方收入数字或经审计财务报表。收入确认方法——尤其是 RaaS 硬件组成部分如何按 ASC 606 或 IFRS 15 处理——尚未公开说明，任何交易前都需要尽调审查。
