      - number: '5.5'
        title: 安全认证、合规与产品路线图
        blocks:
          - type: paragraph
            body: |
              Digit 当前的安全架构包括 Functional Safety over EtherCAT（FSoE）CAT1 停止能力、
              安全 PLC、机身和无线急停系统，以及 Arc 的远程机队停机。尽管有这套硬件安全基础设施，
              截至 2026 年，Digit 仍在围栏隔离环境中运行，机器人主动作业时由物理屏障与人类工人隔开。
              公司尚未取得符合 ISO/TS 15066 的协作安全认证；该认证将允许 Digit 在无屏障环境中
              直接与人并肩工作。CEO Peggy Johnson 公开把 2026 年定为协作安全认证目标，
              这将是 Digit 商业部署潜力中最大的阶跃式能力提升，可打开不适合或无法承受围栏安装成本的设施。
              IEEE Spectrum 和 Fortune 的独立分析师与批评者指出，该认证时间表已较早前承诺推迟；
              物流环境中的完整无围栏人机协作还涉及监管审查，可能延伸到 2027 年相当晚的阶段。
              已宣布的产品路线图包括：2025 年提升续航、扩展 AMR 集成并改进安全功能；2026 年取得
              协作认证；2027 年及以后推出第五代 Digit，目标是完全协作式工作流和更高载荷
              （50 lbs，而当前为 35 lbs）。更长期看，Agility 称希望从物流扩展到轻制造、医疗和零售，
              但这些垂直领域尚无公开确认的具体产品变体或客户合作。可能限制这类扩张的关键技术瓶颈包括：
              末端执行器按任务设计而非通用型、当前 AI 模型内置了结构化环境假设，以及电池容量不足以在
              没有自主充电基础设施的情况下支撑连续多班次部署。
