      - number: '2.3'
        title: 买方与细分客户格局
        blocks:
          - type: paragraph
            body: >
              Digit 的主要买方是大型物流运营商、电商履约公司和合同制造商中的运营 / 供应链高管。仓库自动化预算通常归运营或资本开支 / 自动化部门管理；涉及数百万美元、多年期 RaaS 承诺时，CFO
              和高管层会参与。可以识别出三个主要买方细分。细分 1——一级 3PL 运营商（如 GXO、DHL、Ryder、XPO）：拥有大型、标准化设施，周转箱 /
              纸箱搬运流程劳动密集，采购动机是降低人工成本和提升吞吐，同时具备部署人形机器人的财务能力和运营成熟度。细分 2——大型电商运营商（如
              Amazon、Walmart、Target）：兼具高货量、极高劳动强度和内部自动化能力；它们是早期采用者，但也会自研竞争性机器人方案。细分
              3——专业制造商和零售商（如服装、汽车零部件）：在难以用固定设备自动化的人类尺度环境中处理高混合、低批量流程。RaaS 模式的付款方是设施运营商，使用者是一线仓库员工。企业采用周期较长（销售周期 12–18+
              个月，集成 3–6 个月），原因包括安全认证要求、WMS 集成复杂度，以及在扩大车队前必须证明 ROI。较小运营商（收入 <$50M）因最低合同经济性限制，基本不在 Agility 当前 SAM 内。
