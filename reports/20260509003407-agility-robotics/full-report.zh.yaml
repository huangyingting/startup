      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 的运营风险集中在五类故障模式：安全事故、电池与可靠性限制、网络安全漏洞、
              供应链中断和制造爬坡失败。与 Digit 相关的工作场所伤害是严重性最高的运营风险。
              这类事件会触发 OSHA 调查，引发大量媒体报道，促使客户暂停部署，并可能对更广泛的人形机器人行业
              造成永久性声誉损害。当前过渡阶段风险更高：围栏隔离部署降低但不能消除人机接触事件，
              尤其是在维护、充电坞交互，或需要在运行机器人附近干预的紧急情况下。

              电池与可靠性限制是持续存在的运营约束。Digit 当前 4 小时电池续航要求多班次运营配置多个充电坞，
              提高部署总拥有成本，并在充电坞处形成单点故障。Agility 未公开现场可靠性数据，
              包括平均维护间隔时间、故障率和电池衰减曲线，因此外部难以独立评估运营风险。
              在 GXO 和 Amazon 的商业部署中，任何现场故障模式都会削弱支撑企业采用的 RaaS 单位经济性。

              Arc 云平台引入了网络安全攻击面。Digit 通过 WiFi 和 4G 蜂窝网络与 Arc 通信；
              机队级命令注入或拒绝服务攻击可能同时瘫痪所有客户站点的商业运营。公司尚未公布 SOC 2 认证、
              渗透测试结果或公开安全披露计划。Dark Reading 和行业安全分析师已将机器人机队连接性
              标记为新兴攻击向量。

              制造爬坡失败是最可量化的运营风险。RoboFab 设计产能为每年 10,000 台；当前商业部署约
              100 台。这个 99 倍差距代表根本性执行挑战。供应链依赖包括 20% 国际组件来源和来自 Intel 的
              半导体供应，进一步带来产速风险。若半导体短缺长期持续，或美国主要供应商发生重大故障，
              都可能延迟支撑 Agility 收入和估值增长逻辑的生产爬坡。
