      - number: '4.2'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 多轮累计融资约 $641M，最高峰是 2025 年 3 月完成的 $400M Series C，由 WP Global Partners 领投，SoftBank
              Group、Amazon Industrial Innovation Fund 和 NVIDIA 的 NVentures 参投。Series C 确立了约 $1.75B 投前估值和接近 $2.1B
              的投后估值。上一轮 Series B（$150M，2022 年）由 Amazon Industrial Innovation Fund 领投，DCVC 和 Playground Global 参投。更早资本包括
              Ford Motor Company 投资（约 $6M，约 2020 年）以及 Amazon Industrial Innovation Fund 未披露金额的种子期股权（2021
              年）。投资方组合值得注意，既包括战略运营方 / 客户（Amazon），也包括大型综合基金（SoftBank、WP Global）、深科技专门机构（DCVC、Playground
              Global）和半导体伙伴（NVIDIA）。公开文件中没有发现已备案债务工具、信贷额度或项目融资安排。公司似乎也没有发行可转债或收入分成融资。Series C
              的董事会构成和治理条款——包括清算优先权、反稀释条款和按比例跟投权——未公开披露。Series D 门槛尚未宣布；如果到约 2027 年单位经济性仍未达到商业化自我维持门槛，公司预计将寻求 Series D 或
              IPO 前轮融资。任何正式交易中，都应对照 Series C 条款清单和股东协议核验资本结构信息。
