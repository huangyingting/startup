        - GXO 有 100,000+ 个料箱记录；成本约 $3/hr，对比人工 $17–25/hr
        - 需要结构化环境；仅限同尺寸料箱格式
      - - AMR 装载 / 卸载
        - 人工在站点交接处为 AMR 小车装卸货
        - Arc 调度 Digit 装卸 MiR 或 Zebra AMR 载荷
        - 省去 AMR 交接站点人工；打开无人值守作业窗口
        - 截至 2025 年，集成仅限 MiR 和 Zebra；定制 AMR 需要工程投入
      - - 场内库存搬运
        - 人工拣选员长距离步行，在区域间搬运料箱
        - Digit 或 Digit + AMR 串联自主完成搬运
        - 减少拣选员步行时间；把人力转到增值任务
        - 仅适用于结构化巷道布局；需要地面建图和站点设置
      - - 重复分拣劳动力
        - 夜班工人分拣包裹；岗位难招且流动率高
        - Digit 在低峰和夜间班次无人值守运行
        - 缓解夜间物流岗位招聘难；吞吐更稳定
        - 当前围栏要求降低开放式设施的部署灵活性
      - - 机队监控与告警
        - 主管手动检查机器人状态；故障响应慢
        - Arc 提供实时机队仪表盘、告警和远程 E-stop
        - 降低主管与机器人配比；支持远程运营监管
        - Arc 监控深度随集成而异；4G 下远程控制延迟未公开基准测试
    notes: 收益主张来自公司沟通和 GXO 新闻稿。$3/hr 运营成本是公司引用数字，未经过独立审计。 截至 2026 年 5 月，所有部署都需要结构化环境。Agility 未公开围栏成本和安装时间。
