  productSummary: >
    Digit 是一款 5'9"、65 kg 的双足人形机器人，载荷 16 kg，电池续航 4+ 小时，并配有针对物流场景优化的末端执行器。它集成 3D LiDAR、立体摄像头和机载 AI，可在仓库环境中导航并搬运周转箱和包裹。Arc
    云平台提供车队管理、AMR 集成（MiR、Zebra Technologies）以及 WMS/WES 连接。Digit 按功能安全（FSoE CAT1）标准运行，目前部署在安全围栏环境中，目标在 2026–2027
