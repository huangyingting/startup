companyProfile:
  summary: >
    Agility Robotics 是一家位于 Oregon 州 Tangent 的机器人公司，设计、制造并部署 Digit——一款专为物流和仓储任务打造的双足人形机器人。公司 2015 年从 Oregon State
    University 分拆成立，开创了受食火鸡启发的仿生腿部设计，Digit 因此拥有标志性的节能步态。2024 年 6 月，公司与 GXO Logistics
    签下全球首份人形机器人多年期商业机器人即服务（RaaS）协议，拿到关键行业里程碑。到 2025 年 11 月，Digit 在 GXO 位于 Georgia 州 Flowery Branch 的履约中心真实商业部署中已搬运超过
    100,000 个周转箱，证明技术已达到生产级，而不只是展示。2025 年 3 月，Agility 完成 $400M Series C 融资，投后估值 $2.1B，投资方包括 WP Global
    Partners、SoftBank、Amazon Industrial Innovation Fund 和 NVIDIA 的 NVentures。公司正在 Oregon 州 Salem 建设 70,000-square-foot
    制造设施 RoboFab，目标年产能 10,000 台。
