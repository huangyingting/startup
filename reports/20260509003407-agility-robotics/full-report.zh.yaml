      - number: '8.5'
        title: 建议、退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: |
              建议姿态是观察（TRACK），并设置有条件买入触发点。按 Series C 价格（隐含 $1.75B）进入，
              多数机构 LP 授权下的风险 / 回报不具吸引力：基准情景 3 年回报为 1.0–1.4 倍，
              悲观情景则意味着实质性资本损失。不过，若投资者拥有战略机器人基础设施授权、长期持有周期（5–7 年），
              或能与 ARCH/NEA 在 Series C 价格共同投资，乐观情景上行空间（$3B–$5B 退出、2–3 倍）
              可以支撑相应仓位。

              退出准备度中等。战略收购方正在积极评估人形机器人领域：Amazon 这类战略投资者通常会有
              优先购买权条款，Toyota 的 Woven Planet 部门已表达对双足机器人合作的兴趣，Hyundai 也已证明
              愿意为商业化前状态的 Boston Dynamics 支付 $1.1B。如果 RoboFab 实现每年 2,000+ 台产能，
              并签下第二个具名生产客户，2026–2028 年实现 $2B–$3.5B 战略并购退出是可行的。
              IPO 准备度要求 $200M+ ARR 和正毛利率；在基准情景下，最早也可能要到 2028–2030 年。

              在上调至买入（BUY）之前，五个关键尽调缺口是：确认 GXO 在初始期限后的续约；通过第三方运营审计
              验证 RoboFab 产速；签下第二个具名生产客户协议；披露 Series C 优先股堆叠和清算瀑布；
              以及证明当前机队规模下毛利率正在向盈亏平衡改善。
            claimRefs: []
          - type: table
            tableRef: TV005
