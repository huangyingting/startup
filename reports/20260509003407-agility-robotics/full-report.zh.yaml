      - number: '2.5'
        title: 采用约束与市场风险
        blocks:
          - type: paragraph
            body: >
              多个结构性约束限制物流场景中人形机器人的近期采用。约束 1——单位经济性：以每台 Digit $10,000–$15,000/月（RaaS）的价格，与人工（全负荷约
              $22–28/hr）相比达到盈亏平衡，要求机器人接近连续运行且停机极少。早期商业部署中的硬件可靠性和服务成本仍不确定。Interact Analysis 估计，到 2027
              年，物流人形机器人实际市场渗透率仍会非常有限，2028 年后才会出现有意义的规模。约束 2——集成复杂度：仓库管理系统（WMS）集成、安全认证、设施测绘和工人共存规程，需要 3–6
              个月上线时间和大量技术资源。约束 3——安全与监管：截至 2025–2026 年，所有 Digit
              部署都在围栏或隔离区域运行，因为机器人尚未取得可在无限制人机共作环境中使用的完整协作安全认证。取得“协作安全”状态，是大多数大规模部署的必要前提。约束 4——技术集中与切换成本：早期多年期 RaaS
              合同会把运营商锁进特定平台技术，形成有利于现有厂商（Agility）的切换成本；但当技术被认为尚不成熟时，也可能阻碍采用。约束 5——竞争强度：资金充足的竞争对手（Tesla Optimus、Figure
              AI、Boston Dynamics、1X Technologies）正在开发竞争平台，可能通过更低价格或更强能力侵蚀 Agility 的先发优势。
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
