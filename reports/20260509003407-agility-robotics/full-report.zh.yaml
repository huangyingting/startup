      - number: '4.3'
        title: 单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >
              Digit 的单位经济性仍处于早期、盈亏平衡前阶段，这是一代硬件即服务业务的典型状态。按当前产量估计，每台 Digit 的物料清单和组装成本（COGS）约为 $80,000–$100,000；相对于约
              $150,000 的直接销售 ASP，意味着毛利率约 30–40%。该估算来自可比工业机器人制造商和第三方部件成本分析；Agility 未披露实际 COGS。RaaS
              模式下，每机器人小时的全负荷运营成本——包括用电、计划维护、软件授权和摊销资本成本——估计为 $10–$12/hr。当前 RaaS 计费约 $14–$17/hr（由每月 $10K–$15K
              除以典型运行小时推算），因此毛利率从负到略正不等。公司公开目标 $30/hr，既体现匹配人工成本的意图，也体现规模化后随着硬件 COGS
              随制造量下降、软件成本摊到更大车队上而释放经营杠杆的野心。管理层曾提到成熟规模下目标毛利率为 60%+，与遵循软件利润模型的机器人即服务业务一致。RoboFab 的 70,000 sq ft 设施目标年产
              10,000 台；达到规模后，组件采购量提升、制造良率改善和面向制造的设计迭代，预计会压缩 COGS 并推高毛利。公司未公开分享客户层面的回本或 ROI 数据，不过按 $30/hr 对比美国仓库典型全包人工
              $25–$35/hr，如果满负荷使用，客户理论上可在 12–24 个月内达到盈亏平衡。
