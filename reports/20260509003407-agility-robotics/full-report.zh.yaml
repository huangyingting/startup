      - number: '8.2'
        title: 融资背景与估值框架
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 已通过多轮股权融资累计募集约 $1.2B。融资历史始于 Oregon State
              获 DARPA 资助的早期研究，随后是 2020 年 Series A、2022 年由 Amazon Industrial
              Innovation Fund 领投的约 $150M Series B，以及 2025 年 3 月由 ARCH Venture Partners
              领投、NEA、DCVC 和 Amazon 参与的 $400M Series C。Bloomberg 和 CB Insights 报道的
              Series C 投后估值约为 $1.75B，但精确股权结构——包括优先股堆叠、清算优先权和反稀释条款——
              尚未公开披露。投资者应假设存在标准 VC 清算优先权；若为 2x 参与型，在低于 $2.5B 的中等退出情景中，
              普通股回报会被显著压低。

              适用于 Agility 的估值框架是按情景加权的折现里程碑模型，而不是收入倍数。在 ARR 低于 $10M 时，
              传统 SaaS 倍数没有意义。正确锚点是：RaaS 模型在 1,000+ 台机器人部署时的概率加权预期价值，
              折现到今天是多少？在基准情景下，到 2028 年部署 2,000 台机器人、每台每年 RaaS 收入 $120K，
              年经常性收入（ARR）约达 $240M；按工业软件可比公司 7–12 倍的远期 EV/ARR 倍数计算，
              企业价值为 $1.7B–$2.9B。Series C 价格在这一进入点是合理的，但不便宜：
              上行空间要求 RoboFab 执行到位、多站点客户扩张，以及毛利率在机队规模下从当前为负提升至
              40–50%+。Forge 和 EquityZen 的老股交易市场数据表明流动性很薄，买卖价差相对 Series C
              价格有 20–35% 折价，反映规模化不确定性。
            claimRefs: []
