      - number: '4.4'
        title: 资本充足性与现金跑道分析
        blocks:
          - type: paragraph
            body: >
              2025 年 3 月 $400M Series C 交割后，扣除交易成本和短期义务，Agility Robotics 估计持有 $300M–$400M 现金及现金等价物。月度现金消耗估计为 $4–$7M，包括
              250–500 名员工约 $3–$5M 的工资成本，以及 RoboFab 资本开支、零部件库存建设、下一代 Digit 迭代和协作安全系统 R&D 支出。按约 $5.5M/月的中位烧钱速度，从 2025 年 3
              月起，现金跑道延伸至约 55–70 个月（约 4.5–6 年），意味着现金可支撑到 2029 年末或 2031 年。在高烧钱情景下（$7M/月，含制造扩张成本），跑道缩短至约 43 个月（2028
              年中）。公司未披露 Series C 资金用途拆分。资本配置优先项推断包括：RoboFab 爬坡至目标产能、下一代 Digit 与 Arc AI 功能
              R&D、面向企业销售周期的商业团队扩张，以及零部件库存所需营运资金（每台约 6,000 个零部件，80% 美国来源）。公开文件或媒体报道中没有发现已披露债务、循环信贷或项目融资安排。公司下一次重大资本事件预计是
              Series D 或 IPO 前轮融资，触发条件可能是 RaaS 单位经济性接近盈亏平衡，或车队规模跨过需要额外制造投入的门槛。现金跑道充足性被评为近期足够，但对制造爬坡速度和毛利率兑现敏感。
