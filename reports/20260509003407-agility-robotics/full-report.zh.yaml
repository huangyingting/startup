      - number: '6.4'
        title: 留存与客户耐久性
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 的客户留存证据目前更多是结构性信号，而非已观察到的数据，因为客户基数小、
              商业历史短。与 GXO 的多年 RaaS 协议是主要留存证据：Agility 未披露合同期限，
              但多年意味着至少两年；GXO 持续运行并完成 100,000 个周转箱里程碑，说明关系仍活跃且在扩展。
              GXO 未公开宣布终止合同、缩小范围或重新竞标，这是一个弱正面信号。

              结构性锁定机制包括：（1）Arc 平台与 GXO 的 WMS 集成，若改用替代供应商，需要重新做 API 集成，
              形成切换成本；（2）设施改造投入（围栏基础设施、地面传感器、充电站）已经沉没，
              换供应商时需要替换；（3）操作员围绕 Digit 专属工作流形成的培训和肌肉记忆；（4）OSHA NRTL
              站点特定批准绑定 Digit，同一设施若换成任何替代系统都要重新取得批准。

              Agility 或 GXO 均未公开 NPS、CSAT 或运营满意度数据。曾与 GXO 运营人员交流的行业分析师
              （截至 2025 年底见于行业媒体引用）称，该部署达到或超过吞吐目标，但这属于轶事证据。
              Amazon 和 GEODIS 尚未公开评论试点结果。GXO 协议签署 18 个月后仍没有第二个具名生产客户，
              是一个警示信号——它可能反映正常企业销售周期、RoboFab 产能约束，或其他潜在客户未披露的
              试点失败。
