        - 收入倍数 >150x；没有规模证明时偏高；优先股堆叠未披露
  - id: TV005
    title: 投资逻辑破裂与止损触发表
    columns:
      - 触发项
      - 阈值 / 信号
      - 对投资逻辑的传导
      - 提前期
      - 行动含义
    notes: 触发项在 2026 年 Q1 后 6–18 个月内可观察。监控看板应纳入季度 RoboFab 产量报告和公开披露。
    claimRefs:
      - CV019
      - CV020
      - CV021
    rows:
      - - GXO 合同未续约或公开运营失败
        - GXO 新闻稿或财报披露合同终止，或 Digit 出现重大运营问题
        - 唯一的商业量产证据消失；竞争对手叙事被触发；估值有重估至 $1B 以下的风险
        - 12–18 个月
        - 立即退出或对冲；下调至卖出；把 Amazon 反应作为次级信号监控
      - - 到 2026 年底确认 RoboFab 产量低于 500 台/年
        - 第三方媒体报道或客户交付时间线与 10K/yr 目标不一致
        - 乐观情景出局；基准情景受威胁；下轮降估值风险显著上升
        - 6–12 个月
        - 降低持仓；参与 D 轮前要求 RoboFab 审计证据
      - - Figure AI 在物流场景跑通量产规模商业 RaaS
        - Figure AI 公开宣布与具名客户签署 100+ 台、多年期物流 RaaS 合同
        - 削弱 Agility 的先发叙事；定价权承压；客户选择提速
        - 12–24 个月
        - 重新评估竞争差异；聚焦 Agility 毛利率与 Figure AI 定价的对比
      - - Amazon 大规模推出内部竞争性人形机器人
        - Amazon 公开宣布自研人形机器人制造，或收购竞争对手
        - 战略投资方变成竞争对手；优先地位不再带来定价优势
        - 12–36 个月
        - 复核合作协议中的优先购买权和竞业限制条款
      - - D 轮估值大幅走低（低于 $1.5B 的降估值融资）
        - 公开报道显示 D 轮成交价格低于 C 轮
        - 确认悲观情景；普通股受损；释放内部执行短板信号
        - 18–30 个月
        - 退出二级持仓；若确认战略买方兴趣，评估困境并购时点
      - - OSHA 发布限制人形机器人仓库部署的通用指引
        - OSHA Federal Register 公告或执法行动引用人形机器人事故
        - 客户流失风险实质上升；多站点审批流程停摆；市场节奏推迟 2–3 年
        - 6–18 个月
        - 全面复核持仓；核查企业客户情绪；就监管影响取得法律意见
  - id: TV006
    title: 最终尽调清单
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    notes: 尽调问题按对投资决策的重要性排序。第 1–3 项是上调至买入的阻断项。第 4–5 项对观察仓位重要但不阻断。
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV025
    rows:
      - - GXO 合同续约状态
        - GXO 是否已承诺续签初始多年期 RaaS 协议；合同 ACV 和剩余期限
        - 唯一量产客户；不续约会打掉商业化证据；投资逻辑以这份合同为锚
        - CFO/CRO 直接尽调；GXO 运营副总裁访谈；合同条款法律审阅
      - - RoboFab 产能爬坡验证
        - Salem 工厂投产以来的实际季度产量；良率；供应链瓶颈
        - 乐观 / 基准情景的分界完全取决于 1,000–5,000 台/年爬坡；未验证产量是财务模型的首要风险
        - 运营审计；现场走访；供应商访谈；Agility CFO/COO 直访
      - - C 轮优先股堆叠与股权结构表
        - 清算优先权结构；反稀释条款；$1.5B–$2.5B 并购情景下的优先权压力
        - 在低于 $2B 的悲观 / 基准并购退出中，优先权压力可能吃掉普通股回报
        - 公司律师审阅条款清单；ARCH Venture Partners；Delaware 公司注册证书
      - - 第二个具名量产客户
        - 除 GXO 外，已签署 RaaS 协议的第二个具名企业客户
        - 证明获客可复制；降低单一客户集中风险；验证定价模型
        - 业务拓展渠道核查；物流行业访谈；供应链会议情报
      - - 当前机队规模下的毛利率轨迹
        - GXO RaaS 合同的实际毛利率；每台 Digit 硬件成本；服务 / 支持成本结构
        - 当前规模毛利率为负在预期内，但轨迹决定 D 轮价格
        - CFO 直接尽调；供应链成本建模；参考工业自动化 RaaS 毛利率基准
