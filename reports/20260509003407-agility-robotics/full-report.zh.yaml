      - number: '3.4'
        title: 定价模式与市场进入对比
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，人形机器人市场有三类清晰的定价和市场进入范式。Agility 的 RaaS 模式（$10K–$15K/月，或约
              $30/hr）把硬件、软件、维护和车队管理打包在一起——为客户把资本开支转成运营开支，也为 Agility 创造经常性收入。该模式让 Agility 与企业客户激励一致，因为 Agility
              保留硬件所有权，并在运行时间和可靠性上有财务利益。直接销售选项（$150K/台）存在，但不是主要商业动作。截至 2026 年中，Figure AI 尚未公开披露商业定价模式，不过行业报告称其可能采用类似 RaaS
              路径。Boston Dynamics 每台 $150K+ 的 Atlas 面向 Hyundai 内部资本预算，预计不会达到 RaaS 或大众市场价位。1X Technologies 的双轨定价——$20K
              直接销售或 $499/月——显著低于 Agility，但瞄准不同客户细分（家庭 / 轻工业，而非企业物流）。Unitree G1 起价 $16K，从绝对价格上压低所有竞争者，瞄准学术和试点客户。Tesla
              Optimus 的目标单价为 $20K–$30K，但时间表尚未兑现。Apptronik 尚未公开发布价格。最关键的市场进入差异是，Agility
              已证明能打穿一级运营商（GXO、Amazon）的企业销售周期，而竞争对手仍处于商业化前或早期商业阶段。
