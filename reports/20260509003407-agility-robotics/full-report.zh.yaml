      - number: '7.5'
        title: 风险缓释与监控
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 已针对主要风险类别实施早期缓释措施，但大多数措施仍处于商业化前阶段，
              尚未在规模化环境下验证。监管与安全风险的近期缓释，是围栏隔离部署方式和符合 ISO 10218 的
              安全架构。若在 2026 年或 2027 年取得 ISO/TS 15066 协作安全认证，
              将实质性降低监管暴露，并解锁更广泛的设施部署形态。运营风险中，Arc 的实时远程急停能力和
              机队监控提供了部分网络安全缓释；但未公布 SOC 2 认证和安全披露计划，是一个监控缺口。
              双来源组件认证和优先采用美国国内供应商，提供了部分供应链韧性。

              投资者层面的风险监控应跟踪五个代表投资逻辑破裂触发点的门槛事件：第一，Digit 在客户站点发生
              任何 OSHA 可报告事件；第二，GXO 合同不续约或缩小范围；第三，Amazon 宣布自研人形机器人
              或逐步淘汰 Digit；第四，协作安全认证滑到 2027 年 Q4 之后；第五，Damion Shelton 或
              Jonathan Hurst 离开高管或顾问角色。这些事件单独或叠加发生，都需要实质性重估投资逻辑。
              能降低风险的正面监控指标包括：到 2026 年底已签多年 RaaS 合同达到三个或更多；
              到 2026 年底商业场景中每月部署 Digit 达到 200 台或更多；以及协作认证进展里程碑，
              包括具名认证机构和独立审计启动。学术与实务文献中的风险管理框架表明，
              现阶段人形机器人部署应纳入季度运营 KPI 复盘、独立安全审计，以及针对重大监管变化预先谈妥的
              合同升级条款。Agility 当前公开披露未确认这些机制存在，它们也是任何正式投资流程中的尽调问题。
            claimRefs:
              - CR037
              - CR038
              - CR039
              - CR040
