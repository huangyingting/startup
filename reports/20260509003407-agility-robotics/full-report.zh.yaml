  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: |
      Agility Robotics 产品栈的分层视图：从云端编排，到 AI/感知、安全与控制，再到底层 Digit 硬件平台，并列出每层关键集成和组件。
    claimRefs:
      - CE009
      - CE011
      - CE014
      - CE033
    data:
      layers:
        - id: cloud-layer
          label: 云平台（Arc）
          detail: 机队管理，通过 webhooks 和自定义 API 集成 WMS/WES/MES/PLC，远程诊断，AMR 调度（MiR、Zebra Technologies），机队安全监控，远程关停。
        - id: ai-layer
          label: AI / 感知层
          detail: 机载强化学习用于抓取；3D LiDAR + 立体 RGB 摄像头融合；神经网络推理用于路径规划和避障；传感器流提供任务上下文。
        - id: control-layer
          label: 安全与控制层
          detail: 符合 IEC 61508 的安全 PLC；FSoE CAT1 急停；EtherCAT 实时现场总线；机身和无线 E-stop；围栏隔离运行；协作认证目标为 2026 年。
        - id: hardware-layer
          label: 硬件平台（Digit）
          detail: 仿生双足，175 cm / 65 kg；16 kg 载荷；4+ 小时电池；3D LiDAR；立体 RGB 摄像头；双 Intel i7 机载计算；模块化载荷舱；约 6,000 个零件；约 80% 来自美国。
        - id: integration-layer
          label: 集成与外围组件
          detail: AMR 调度（MiR、Zebra，经 Arc API）；WMS/WES webhook API；NVIDIA Jetson / Intel NUC 载荷舱；按任务优化的末端执行器；自主充电底座基础设施。
        - id: connectivity-layer
          label: 连接与远程运营
          detail: WiFi 和 4G 蜂窝遥测；Arc 远程关停；实时机队仪表盘；远程 E-stop；诊断流式传输至运营中心。
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: standard
    summary: |
      端到端客户工作流，展示仓库运营商如何通过 Arc 平台部署 Digit：从 WMS 下发任务，到机器人执行，再到报告回传。
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE032
    data:
      nodes:
        - id: wms-order
          label: WMS 下发任务单
          detail: 仓库管理系统创建料箱搬运或运输任务；通过 webhook 或 API 调用分发给 Arc。
        - id: arc-assign
          label: Arc 平台分配任务
          detail: Arc 机队管理层接收任务，识别可用 Digit 单元，检查电量和距离；将任务分配给最优机器人。
        - id: amr-check
          label: Arc 视情况调度 AMR
          detail: 如果任务涉及 AMR 装卸，Arc 同时调度 MiR 或 Zebra AMR 到会合点。
        - id: digit-navigate
          label: Digit 导航至作业区
          detail: Digit 使用 3D LiDAR 和立体视觉，自主穿行仓库通道到达指定取放工位；实时避障。
        - id: digit-execute
          label: Digit 执行操作任务
          detail: Digit 用基于 RL 的抓取，从输送线或 AMR 上取下料箱；再用按任务优化的末端执行器将料箱放到目标位置。
        - id: arc-monitor
          label: Arc 监控并记录
          detail: Arc 记录任务完成、周期时间、错误或安全事件；将遥测流式传输至远程运营仪表盘。
        - id: digit-dock
          label: Digit 返回充电座（低电量）
          detail: 电池低于阈值时，Digit 无需人工干预，自主导航至充电座。
        - id: wms-report
          label: WMS 接收完成报告
          detail: Arc 将任务完成确认推回 WMS；更新库存或分拣记录；闭合作业单循环。
  - id: FE003
    title: 关键依赖图
    type: dag
    layout: wide
    summary: |
      一张有向无环图，展示影响 Digit 生产、部署和平台运行的关键外部依赖，覆盖零部件供应商、云基础设施、监管机构和企业集成伙伴。
    claimRefs:
      - CE018
      - CE033
      - CE009
      - CE016
      - CE020
    data:
      nodes:
        - id: digit-hw
          label: Digit 硬件单元
          detail: 约 6,000 个零件在 RoboFab Salem 组装；核心商业产品。
        - id: us-suppliers
          label: 美国零部件供应商
          detail: Digit BOM 约 80% 来自美国；包括电机、执行器、结构件、传感器。
        - id: intel-cpu
          label: Intel CPU 供应
          detail: 双 Intel i7 机载计算；每台量产单元都依赖 Intel 供应链。
        - id: lidar-sensor
          label: 3D LiDAR 供应商
          detail: 感知硬件存在单一来源风险；LiDAR 供应商未公开披露；关键安全传感器。
        - id: robofab
          label: RoboFab（Salem, OR）
          detail: 70,000 sq ft 专用人形机器人工厂；唯一生产基地；设计产能 10,000 台/年。
        - id: arc-cloud
          label: Arc 云平台
          detail: SaaS 机队管理；企业工作流集成、远程监控和 AMR 调度都需要它。
        - id: cloud-infra
          label: 云基础设施（AWS / 同类）
          detail: Arc 平台托管在公有云；远程运营依赖正常运行时间和低延迟。
        - id: wms-partner
          label: WMS/WES 集成伙伴
          detail: 企业 WMS 厂商（如 Manhattan Associates、Blue Yonder）；每次部署都需要 webhook/API 集成。
        - id: safety-regulator
          label: 安全认证机构
          detail: ISO/TS 15066、相关国家安全主管机构；协作运行认证必须经过这些机构。
        - id: amr-vendor
          label: AMR 厂商（MiR、Zebra）
          detail: Arc 目前集成 MiR 和 Zebra Technologies AMR；要覆盖更广市场，还需要扩展到其他 AMR 品牌。
      edges:
        - from: us-suppliers
          to: digit-hw
          detail: 零部件供给 RoboFab 组装；约 80% 本土采购降低了供应集中风险，但没有消除。
        - from: intel-cpu
          to: digit-hw
          detail: 双 Intel i7 CPU 送往 RoboFab；Intel 供应链中断会直接影响产速。
        - from: lidar-sensor
          to: digit-hw
          detail: 3D LiDAR 是关键感知部件；供应商未公开披露；存在潜在单一来源风险。
        - from: robofab
          to: digit-hw
          detail: Digit 唯一制造基地；单一设施集中风险；尚未实现 10K 台/年爬坡。
        - from: digit-hw
          to: arc-cloud
          detail: Digit 单元通过 WiFi/4G 连接 Arc，用于遥测、任务调度和远程安全控制。
        - from: cloud-infra
          to: arc-cloud
          detail: Arc 平台依赖公有云可用性；宕机会中断远程监控和调度。
        - from: wms-partner
          to: arc-cloud
          detail: Arc 与 WMS/WES 系统集成，需要按部署站点配置 API；集成伙伴生态对规模化至关重要。
        - from: safety-regulator
          to: digit-hw
          detail: 无围栏部署前，必须获得相关机构的协作安全认证；监管时间表由外部控制。
        - from: amr-vendor
          to: arc-cloud
          detail: Arc 的 AMR 调度依赖厂商 API；目前支持 MiR 和 Zebra；新增厂商需要工程投入。
  - id: FE004
    title: 产品成熟度 / 能力图
    type: matrix
    layout: wide
    summary: |
      按成熟度评估 Digit 核心技术和产品模块，对照竞争基线给出当前商业状态，并识别关键缺口。
    claimRefs:
      - CE008
      - CE012
      - CE013
      - CE020
      - CE021
      - CE030
      - CE035
    data:
      columns:
        - 成熟度水平
        - 商业状态
        - 相对主要竞争对手
        - 缺口 / 风险
      rows:
        - label: 双足移动
          values:
            - 高
            - 商业部署
            - 仓库地面场景一流；Atlas 更敏捷；Optimus 可比
            - 电池限制在约 4 小时；尚无协作安全
        - label: 任务操作（料箱处理）
          values:
            - 中高
            - 商业化——结构化任务
            - 相比通用型有定制优势；载荷低于 Atlas
            - 不是通用型；若不重新设计末端执行器，任务变化范围有限
        - label: AI 感知与规划
          values:
            - 中
            - 商业化——结构化环境
            - RL 操作能力能否追平 Figure AI 仍有争议；公开学术基础是加分项
            - 非结构化环境中的边缘场景表现未公开跑过基准测试
        - label: 安全架构（围栏隔离）
          values:
            - 高
            - 已部署并获认证
            - 与工业机器人安全规范持平；若出现协作认证平台，会落后于它们
            - 围栏认证限制设施类型；围栏安装成本是部署障碍
        - label: 协作安全（无围栏）
          values:
            - 低
            - 尚未实现
            - 人形机器人竞争对手也没有在商业规模拿到 ISO/TS 15066 协作认证
            - 2026 年目标来自 CEO 表述；外部监管审批有风险；可能滑后 12-18 个月
        - label: Arc 机队管理
          values:
            - 中高
            - 商业化——2 个大客户
            - AMR 集成（MiR、Zebra）形成差异化；WMS webhook 路线务实
            - SDK 透明度低；API 文档未公开；存在客户锁定风险
        - label: 制造规模
          values:
            - 中低
            - 爬坡阶段（已部署约 100 台）
            - RoboFab 是全球首个人形机器人专用工厂；Figure AI 和 Tesla 也在扩产
            - 当前产出距离 10,000 台/年仍有缺口，是最大执行风险；良率数据未披露
        - label: IP 与差异化
          values:
            - 中高
            - 已建立基础 IP
            - OSU 研究传承提供学术防御性；Figure AI 拥有更广 AI IP
            - 专利数量未披露；相对 AI 原生竞争对手，AI/ML 专利较弱
  - id: FU001
    title: 客户旅程图——从潜在客户到生产部署
    type: journey-map
    layout: wide
    summary: |
      企业仓储客户从初次认知到多年期生产部署的端到端旅程，突出关键决策门、延迟点，以及 Agility 在每一阶段的角色。
    claimRefs:
      - CU019
      - CU020
      - CU021
      - CU022
    data:
      items:
        - label: 认知
          detail: 客户通过展会（NRF、MODEX）、分析师报告，或 GXO/GEODIS 同行推荐了解到 Digit。Agility Partner Program 提供正式的接洽入口。
        - label: 评估与 RFI
          detail: 运营团队发出 RFI；Agility 进行现场任务评估和 ROI 建模。竞争人形机器人（Figure AI、1X、Boston Dynamics）可能被并行评估。
        - label: 试点协议
          detail: 签署 Partner Program 协议；确定试点范围（任务类型、场地、时长）。客户承诺提供设施访问和 WMS 集成投入。
        - label: 设施准备
          detail: 安装围栏基础设施；布置充电站；放置地面传感标记；配置 WMS/Arc API 集成。典型周期：2-4 个月。
        - label: OSHA NRTL 现场批准
          detail: Agility 和客户提交 OSHA NRTL 站点专属安全认证申请。当前先例来自 GXO SPANX；每个新站点审批周期为 1-3 个月。
        - label: 试点运行
          detail: Digit 在有人监督的生产环境中运行；收集吞吐量和可靠性数据。跟踪 Arc 遥测。开展操作员培训。
        - label: 生产部署决策
          detail: 客户决定是否将试点转为多年期 RaaS 协议。ROI 验证和运营反馈驱动决策。竞争报价可能被重新评估。
        - label: 多年期生产部署
          detail: 签署 RaaS 合同（约 $10K-$15K/机器人/月）；按运营需求扩大机队；Arc 接入实时 WMS 工作流；包含持续维护和软件更新。
  - id: FU002
