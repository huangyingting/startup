  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群细分
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 瞄准的是仓储与物流市场中一块狭窄但高价值的需求：合约物流运营商
              （3PL）和运营高吞吐、结构化履约环境的大型企业货主。主要买方画像是一线或二线 3PL、
              或全渠道零售商的运营副总裁 / 首席供应链官，他们希望对冲仓库劳动力每年 30–40% 的流失率
              和不断上升的工资压力。用户是仓库一线操作员；付款方是动用 RaaS 预算的物流业务单元。
              次级客群包括电商纯玩家和汽车零部件分销商，它们同样有结构化、重复性任务。

              Digit 专为具备三类特征的任务设计：结构化物理环境（通道、输送线、固定拣选 / 放置工位）、
              中等载荷下的高重复动作（最高 35 lbs 的周转箱），以及大型轮式自动化难以进入的空间约束。
              这让可触达客户基数小于通用人形机器人，但提升了已具名客户的任务成功率和部署信心。
              Agility 当前商业销售明确避开非结构化或变化大的环境，把足迹限制在拥有明确输送线基础设施的
              中大型配送中心（DC）。

              各细分客群的收入和战略价值差异很大。一个 24/7 运转的 3PL DC，在 RaaS 模式下每台机器人
              每年可贡献 $120K–$180K；若单站点部署 5–50 台机队，年合同额可达 $600K–$9M。
              Amazon 这类大型电商运营商看重的，可能不只是即时财务回报，而是共同开发以及提前试点
              新兴劳动力替代平台的战略价值——这也解释了 Amazon Industrial Innovation Fund 的持股，
              并不要求 Amazon 在现阶段成为主要收入贡献方。
