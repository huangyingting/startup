      - number: '1.3'
        title: 融资历史与投资方
        blocks:
          - type: paragraph
            body: >
              Agility Robotics 多轮融资累计约 $641M。最重要的一轮是 2025 年 3 月完成的 $400M Series C，由私募股权机构旗下创投部门 WP Global Partners
              领投，SoftBank Group 和 Amazon Industrial Innovation Fund 参投。本轮融资对应约 $1.75B 投前估值和约 $2.12B 投后估值。在 Series C
              之前，公司于 2022 年完成 $150M Series B，估值约 $620M，由 Amazon Industrial Innovation Fund 领投，DCVC 和 Playground Global
              参投。Amazon 的参与早于 2022 年：2021 年，它通过 Industrial Innovation Fund 投入一笔未披露金额，同时也是战略客户。Ford Motor Company 约在 2020
              年较早的种子轮 / Series A 阶段投资约 $6M。Canon 和 Sony Innovation Fund
              也被列为早期轮次投资方，反映硬件和影像公司对该赛道的战略兴趣。投资方组合值得注意：既有战略企业运营方（Amazon，同时也是大客户），也有大型综合基金（SoftBank、WP
              Global），还有使命契合的深科技投资方（DCVC、Playground Global）。SoftBank 参与 Series C 也有信号意义，因为此前有报道称 SoftBank 曾探索以超过 $900M
              的估值收购 Agility。约 $641M 的已披露资本基本预先覆盖了 RoboFab 扩产和商业扩张，按当前烧钱估计，至少可支撑未来 18–24 个月。
