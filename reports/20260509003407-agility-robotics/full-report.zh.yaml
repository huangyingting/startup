        - 收入前人形机器人（Spot 已商业化但规模小）
        - 战略并购先例；显示机器人平台并购底价
        - 人形机器人尚未商业化；Spot 是主要收入来源；买方画像不同
      - - Apptronik
        - 人形机器人私募轮（2024 年）
        - 融资 $350M；估值未披露
        - 收入前（物流 / 汽车试点）
        - Samsung 战略投资方；Apollo 人形机器人瞄准物流
        - 估值未披露；Samsung 制造协同可能压缩估值折价
      - - 1X Technologies
        - 人形机器人私募轮（2024 年）
        - 约 $400M 投后；融资 $100M
        - 收入前（试点部署）
        - OpenAI 支持；双足；规模小于 Agility
        - 规模更小；披露部署更少；阶段早于 Agility
      - - Tesla Optimus
        - 内部项目（上市公司）
        - 未独立估值
        - 内部部署阶段
        - Gigafactory 制造优势；最大上市公司赞助方
        - 无法独立交易；制造成本不可比
      - - Agility Robotics（C 轮）
