  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品概览与 Digit 硬件架构
        blocks:
          - type: paragraph
            body: >
              Digit 是 Agility Robotics 的商用双足人形机器人，从一开始就为物流和仓库自动化而设计。当前一代 Digit 高 175 cm（5'9"），重约 65 kg，可处理最高 16 kg（35
              lbs）载荷。其运动系统采用受食火鸡启发的反向弯曲腿，源自 Oregon State University Dynamic Robotics Laboratory 在 Jonathan Hurst
              教授领导下十余年的生物力学研究。机器人通过一套感知组件在仓库中自主导航，包括 3D LiDAR、立体 RGB 摄像头、惯性测量单元（IMU）、关节编码器、接近传感器和力传感器。机载计算运行双 Intel i7
              CPU，模块化开放载荷舱可容纳 NVIDIA Jetson 或 Intel NUC 加速器，用于 AI 推理任务。Digit 最高步行速度 1.5 m/s，可上下楼梯和路缘，并能运行 4+
              小时后自主对接充电站。连接方式包括 WiFi 和 4G 蜂窝网络。每台机器人约由 6,000 个零部件组成，其中约 80%
              来自美国供应商，体现了与本土制造优先级一致的供应链韧性策略。末端执行器针对物流周转箱搬运而非通用五指操作优化，这是一项有意的设计取舍：用更简单、更可靠的操作能力，服务一个范围较窄但已被商业验证的任务集。
