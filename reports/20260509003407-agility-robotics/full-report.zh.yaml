      - number: '2.4'
        title: 增长驱动与采用顺风
        blocks:
          - type: paragraph
            body: >
              四个主要驱动支撑人形机器人物流市场增长。驱动 1——结构性用工短缺：美国仓库和物流就业长期面临结构性短缺；BLS 数据显示，2024–2025 年即便工资高于 $20/hr，仓库岗位空缺也经常超过
              500,000。人口老龄化和替代就业机会增加，使可服务劳动力池持续收缩。驱动 2——电商量增长：美国电商销售在 2024–2025 年期间年增速约
              10%，订单量和履约复杂度同步上升。当日达和次日达预期要求设施以更高吞吐、更高灵活性运行。驱动 3——资本可得性：截至 2025 年，全球人形机器人公司累计获得超过 $10B 私募融资，主要投资方包括
              SoftBank、Microsoft、Amazon 和 NVIDIA。这些资本支撑持续 R&D 和制造扩张。驱动 4——技术成熟度拐点：强化学习、大型视觉-语言-动作（VLA）模型和储能进步，已在
              2024–2025 年把人形机器人能力从实验室演示推到持续商业部署；Digit 在 GXO 搬运 100K+ 个周转箱就是证据。此外，监管顺风包括 OSHA
              越来越认可仓库场景中的人体工学伤害成本，给体力要求高的任务自动化带来制度压力。
            claimRefs:
