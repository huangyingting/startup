      - number: '6.3'
        title: 采用轨迹与商业动能
        blocks:
          - type: paragraph
            body: |
              GXO 的 100,000 个周转箱里程碑，是目前最具体的公开采用指标。Agility 尚未披露 GXO SPANX
              站点部署了多少台 Digit、每个周转箱的循环时间或正常运行率；这些指标本可用于估算机队规模
              和吞吐效率。行业估计基于报道的周转箱量和运行小时数，认为该部署约有 4–8 台 Digit，
              但这是推断，不是确认数据。

              多年 RaaS 协议结构是强留存和收入信号：不同于硬件销售，多年订阅带来经常性收入和合同锁定，
              降低合同期内的流失风险。Agility Partner Program 对符合条件的企业客户开放，
              设置了明确的准入、试点和生产路径，形成结构化商业管线。除 GXO 外，Amazon 和 GEODIS
              是仅有的公开具名 Partner Program 参与方。

              采用受三类因素约束：（1）部署复杂度高，需要 OSHA 站点特定批准、设施改造（围栏基础设施、
              充电站、传感器标记）和 WMS/Arc API 集成，每一项都会让从部署到收入确认增加 3–9 个月；
              （2）RoboFab 产能仍在从低得多的基数爬坡至每年 10,000 台，限制了同时服务客户数量；
              （3）客户在承诺前会测试多个人形机器人平台，竞争评估周期较长。GXO SPANX 取得的 OSHA NRTL
              批准是站点特定的，每个新设施都要重新办理，形成快速扩张的监管瓶颈。

              积极的一面是，仓库劳动力市场动态强烈支持采用：美国仓库和物料搬运劳动力的全负担成本平均为
              $18–$22/hour，30–40% 的年流失率带来每次招聘和培训 $2,000–$5,000 的成本。
              在 $10K–$15K/robot/month 的 RaaS 价格下，ROI 要打平，每台机器人每班需要替代约
              1.5–2.0 个 FTE；高吞吐 DC 能达到这一门槛。
