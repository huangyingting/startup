  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: |
              Agility Robotics 所处监管环境快速变化，覆盖工作场所安全标准、AI 治理框架、劳动法、
              知识产权和出口管制。最直接的监管敞口是商业仓库机器人部署中的 OSHA 合规。根据一般责任条款
              和 OSHA 1910.212 机器防护标准，部署 Digit 的雇主必须确保充分防护并消除危险。
              当前所有 Digit 部署都采用围栏隔离配置，满足 ISO 10218-1/2 工业机器人安全规范。
              但若按 ISO/TS 15066 转向协作式无围栏运行，就需要一套明显不同的风险评估框架、
              新的 OSHA 合规文件，并可能重新谈判客户部署协议。协作认证前一旦发生任何工作场所事件，
              都可能带来 OSHA 传票、媒体反噬和客户流失，成为公司商业轨迹的门槛性风险。

              2024 年 8 月生效的 EU AI Act 将部署在安全关键工作场所场景中的 AI 系统归为高风险，
              要求合格评定、技术文件、人类监督和透明度。共享仓库环境中的人形机器人可能落入 Annex III
              高风险类别。美国关于 AI 安全的行政令以及新出现的两党机器人立法，显示联邦审查正在加强。
              日本、英国、韩国和欧盟正在为自主系统制定不同监管框架，给 Agility 计划中的国际扩张
              带来碎片化合规格局。

              IP 风险中等但真实存在。Tesla、Boston Dynamics、Figure AI 和 Apptronik 已提交大量覆盖
              双足运动、操控和机队管理的专利组合。随着 Digit 部署扩大、Agility 商业能见度提升，
              专利侵权索赔的概率会上升。美国 Bureau of Industry and Security 管理的出口管制适用于
              先进机器人技术；Agility 80% 的美国组件来源提供了一定缓冲，但 20% 的国际组件敞口、
              以及 Digit AI 系统的军民两用潜力，仍带来出口许可风险。美国多个州和欧盟提出的机器人税立法，
              可能提高 Digit 客户的总拥有成本，压低需求增长。
