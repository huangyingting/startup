      - number: '7.3'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: |
              伙伴与依赖风险集中在三组关系：Amazon 投资方兼客户的双重关系、GXO 锚定客户依赖，
              以及横跨 Intel、NVIDIA 和国内组件供应商的技术供应链依赖。Amazon 既可能是 Agility
              最大客户，也是通过 Amazon Industrial Innovation Fund 进入的财务投资方。这种利益一致
              同时是战略资产和结构性风险：Amazon 有能力、资本和机器人野心去开发自有人形替代方案。
              有关 Amazon 内部机器人投入和收购历史的报道说明，这一风险并非理论问题。若 Amazon 决定
              减少或终止 Digit 部署，转向内部开发方案，Agility 会同时失去一个标志性客户背书，
              也可能失去一个财务支持方。

              GXO Logistics 是唯一公开确认的多年 RaaS 商业合同。不续签 GXO 协议将实质性损害 Agility
              的商业牵引叙事和 RaaS 收入。GXO 受到 3PL 行业宏观压力影响；若物流市场持续下行，
              GXO 的技术投资预算可能减少，并影响续约概率。SoftBank 和 WP Global Partners 的投资者关系
              引入财务依赖风险：如果任一投资方面临内部资本约束或战略调整，后续融资支持可能在关键制造爬坡阶段延后。

              Intel 和 NVIDIA 对 Digit 计算栈的供应依赖构成外部技术风险。若出现类似 2021–2022 年
              全球芯片短缺的重大半导体供应中断，RoboFab 生产爬坡会直接放慢。Arc 云平台依赖公有云基础设施，
              带来运营可用性风险：任何主要云区域故障都会同时中断所有客户站点的机队遥测、远程安全监控和任务调度。
              这些平台级依赖未公开披露，多区域故障转移架构的程度也未知。
