summary:
  headline: >
    Agility Robotics has achieved what no other humanoid robot company has: a proven, production-grade commercial
    deployment at scale. With 100,000+ totes moved at GXO Logistics, a $641M funding base, and a dedicated manufacturing
    facility targeting 10,000 units per year, Agility holds a 12–24 month commercialization lead over the field. The
    central investment question is whether it can convert this first-mover advantage into durable market position before
    better-funded competitors (Figure AI at $39B valuation, Tesla Optimus with manufacturing scale) close the deployment
    gap. Unit economics are unproven at scale, customer concentration is a real risk, and cooperative safety
    certification remains the gating technology for broader adoption.
