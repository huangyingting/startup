  topStrengths:
    - First and only commercially deployed humanoid robot — 100,000+ totes moved at GXO in live fulfillment workflow.
    - Multi-year RaaS agreement with GXO Logistics (world's largest pure-play 3PL) establishes durable anchor revenue.
    - >-
      $641M in funding with strategic investors including Amazon IIF and NVIDIA NVentures, providing both capital and
      ecosystem access.
    - RoboFab dedicated manufacturing facility with 10K unit/yr target capacity creates defensible supply chain.
    - >-
      Cassie/Digit biomimetic locomotion IP derived from decade-long OSU research; functionally superior gait for
      logistics environments.
    - Arc cloud platform provides fleet management and AMR integration, creating software-layer switching costs.
  topRisks:
    - >-
      Customer concentration: GXO and Amazon represent the majority of known commercial deployments; loss of either
      anchor customer would be materially damaging.
    - >-
      Unit economics unproven at scale: operating cost $10–12/hr vs. $30/hr target RaaS price; gross margin path to 50%+
      requires significant production ramp.
    - >-
      Competitive threat from Tesla Optimus ($20–30K target price) and Figure AI ($39B valuation, Helix AI) — both with
      manufacturing scale or AI advantages.
    - >-
      Cooperative safety certification delay: current cage-segregated deployment limits addressable market and customer
      types until certification achieved.
    - >-
      All revenue and financial projections are analyst estimates; no audited financials available; actual burn rate and
      runway are undisclosed.
  unresolvedGaps:
    - Audited financial statements and verified revenue figures not available for any fiscal year.
    - RoboFab unit cost structure and manufacturing cost curve not publicly disclosed.
    - GXO and Amazon contract renewal terms, pricing, and multi-site expansion commitments not disclosed.
    - Cooperative safety certification timeline and regulatory pathway remain speculative.
    - Patent portfolio scope and defensive IP position vs. Tesla, Figure AI, and Boston Dynamics not fully assessed.
