callouts:
  - calloutType: insight
    title: Structural Labor Shortage Is the Core Demand Catalyst
    body: >
      US warehouse and logistics employment has faced structural shortages for multiple years,
      with open positions exceeding 500,000 at wages above $20/hr in 2024–2025. This demand
      signal—driven by demographic shifts and e-commerce growth—creates a durable, non-cyclical
      pull for humanoid automation that is largely independent of individual technology players.
    claimRefs: [CM016, CM017]

  - calloutType: risk
    title: Analyst Forecasts Are Highly Divergent and Should Be Treated with Caution
    body: >
      Humanoid robot market forecasts range from $1.9B to $2.9B for 2025 and from $11B to
      $15.3B for 2030 across leading analysts, implying a 50%+ spread on 2030 estimates.
      This divergence reflects deep uncertainty about the pace of safety certification,
      technology readiness, and enterprise adoption—risks that could significantly compress
      Agility's addressable market below consensus projections.
    claimRefs: [CM001, CM002, CM003]

  - calloutType: assumption
    title: Cooperative Safety Certification Is a Critical Market Unlock
    body: >
      All current Digit deployments operate in safety-caged environments. Achieving
      "cooperatively safe" certification—enabling Digit to work side-by-side with human
      workers without barriers—is the single most important near-term prerequisite for
      large-scale adoption and is targeted by Agility for late 2026 to 2027.
    claimRefs: [CM023, CM025]

