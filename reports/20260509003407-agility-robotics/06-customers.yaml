figures:
  - id: FU001
    title: Customer Journey Map — From Prospect to Production
    type: journey-map
    layout: wide
    summary: >
      End-to-end journey of an enterprise warehouse customer from initial awareness through multi-year production
      deployment, highlighting key decision gates, delays, and Agility's role at each stage.
    claimRefs:
      - CU019
      - CU020
      - CU021
      - CU022
    data:
      items:
        - label: Awareness
          detail: >-
            Customer learns of Digit via trade show (NRF, MODEX), analyst report, or peer reference from GXO/GEODIS.
            Agility's Partner Program provides a formal intake path.
        - label: Evaluation and RFI
          detail: >-
            Operations team issues RFI; Agility conducts on-site task assessment and ROI modeling. Competing humanoids
            (Figure AI, 1X, Boston Dynamics) may be evaluated in parallel.
        - label: Pilot Agreement
          detail: >-
            Partner Program agreement signed; pilot scope defined (task type, site, duration). Customer commits to
            facility access and WMS integration effort.
        - label: Facility Preparation
          detail: >-
            Cage infrastructure installed; charging stations positioned; floor sensor markers placed; WMS/Arc API
            integration configured. Typical timeline: 2-4 months.
        - label: OSHA NRTL Site Approval
          detail: >-
            Agility and customer submit for OSHA NRTL site-specific safety certification. Current precedent from GXO
            SPANX; approval timeline 1-3 months per new site.
        - label: Pilot Operation
          detail: >-
            Digit operates in supervised production environment; throughput and reliability data collected. Arc
            telemetry tracked. Operator training conducted.
        - label: Production Decision
          detail: >-
            Customer decides whether to convert pilot to multi-year RaaS agreement. ROI validation and operational
            feedback drive decision. Competing offers may be re-evaluated.
        - label: Multi-Year Production Deployment
          detail: >-
            RaaS contract signed (~$10K-$15K/robot/month); fleet scaled per operational need; Arc integrated into live
            WMS workflows; ongoing maintenance and software updates included.
