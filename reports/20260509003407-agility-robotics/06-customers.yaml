company:
  name: Agility Robotics
chapter:
  number: 6
  title: Customers
  summary: >
    Agility Robotics' commercial customer base is narrow but strategically significant. GXO Logistics is the world's
    first operator to run a humanoid robot in sustained commercial production—moving 100,000+ totes at the SPANX
    fulfillment center in Georgia under a multi-year RaaS agreement signed June 2024. Amazon and GEODIS are confirmed
    Agility Partner Program participants at pilot or exploratory stage. The RaaS model (~$10K–$15K/ robot/month) targets
    contract logistics operators and large enterprise shippers motivated by 30–40% annual warehouse labor turnover and
    rising labor costs. Concentration risk is severe: one named production customer as of early 2026. OSHA NRTL
    site-specific approval at the GXO SPANX facility is a meaningful enterprise-adoption unlock, but approval has not
    yet been generalized across sites or customers. Retention data beyond contract duration is unavailable; the
    multi-year RaaS structure is the primary retention signal.
sections:
  - id: CU-SEC01
    title: Customer Base Segmentation
    body: |
      Agility Robotics targets a narrow, high-value slice of the warehouse and logistics
      market: contract logistics operators (3PLs) and large enterprise shippers who operate
      high-volume, structured fulfillment environments. The primary buyer persona is a VP of
      Operations or Chief Supply Chain Officer at a Tier-1 or Tier-2 3PL or omnichannel
      retailer seeking to offset 30–40% annual warehouse labor turnover and rising wage
      pressure. The user is the warehouse floor operator; the payer is the logistics business
      unit deploying RaaS budget. Secondary segments include e-commerce pure-plays and
      automotive parts distributors who share the same structured, repetitive task profile.

      Digit is purpose-built for tasks with three defining characteristics: structured
      physical environments (aisles, conveyors, defined pick/place stations), high repetition
      at moderate payload (totes up to 35 lbs), and spatial constraints that make large
      wheeled automation infeasible. This narrows the addressable customer base relative to
      general-purpose humanoids but increases task success rates and deployment confidence
      for named accounts. Agility explicitly avoids unstructured or variable environments in
      current commercial pitches, limiting its footprint to mid-to-large distribution centers
      (DCs) with defined conveyor infrastructure.

      Revenue and strategic value differ sharply by segment. A 3PL DC running 24/7 operations
      can generate $120K–$180K/robot/year under RaaS, with fleet deployments of 5–50 units
      creating $600K–$9M annual contract value per site. For large e-commerce operators like
      Amazon, the strategic value of co-development and pilot access to the emerging labor
      substitution platform may exceed immediate financial returns—explaining Amazon's
      Industrial Innovation Fund position without requiring Amazon to be a major revenue
      contributor at this stage.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
    tableRefs:
      - TU001
  - id: CU-SEC02
    title: Named Customer Deployments and Proof
    body: |
      GXO Logistics is Agility Robotics' sole confirmed commercial production customer as of
      early 2026. The relationship began with a multi-year RaaS agreement announced June 2024,
      deploying Digit at the GXO-operated SPANX fulfillment center in Lithia Springs, Georgia.
      By late 2025, Digit had completed more than 100,000 tote movements in live production—a
      milestone independently reported by Robotics & Automation News in November 2025 and
      cited as the world's first formal commercial humanoid robot deployment. The deployment
      operates in a cage-segregated environment with OSHA NRTL site-specific approval obtained,
      a critical safety credentialing step that enabled GXO to run Digit alongside human
      workers under OSHA jurisdiction. GXO is also the world's largest pure-play contract
      logistics company by revenue, making it a high-credibility reference account.

      Amazon confirmed participation in the Agility Partner Program—Agility's structured
      commercial engagement track for enterprise accounts—and has deployed Digit in exploratory
      pilot settings at Amazon fulfillment facilities. Amazon's Industrial Innovation Fund
      participated in both Series B and Series C funding rounds, providing both capital and
      an implicit product-market validation signal. However, Amazon is not confirmed as a
      production deployment customer, and the company operates its own robotics R&D program
      (Amazon Robotics), making long-term exclusive dependence on Agility unlikely.

      GEODIS, the French global logistics operator and a top-10 global 3PL, confirmed
      participation in the Agility Partner Program with Digit pilots focused on warehouse
      tote handling and trailer unloading tasks. GEODIS has not publicly announced a
      production deployment or multi-year agreement as of the report date.

      Additional pilot-stage interest has been reported from unnamed retailers and e-commerce
      operators at trade show demonstrations (NRF 2025, MODEX 2024), but no additional named
      production customers have been publicly confirmed.
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU010
