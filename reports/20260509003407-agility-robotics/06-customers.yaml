  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: GXO fleet size and contract ACV
      missingEvidence: Fleet size and unit count at GXO SPANX deployment not publicly disclosed, preventing revenue estimation.
      whyItMatters: >-
        Without fleet size, total Agility ARR from its only production customer cannot be estimated, making revenue
        concentration analysis speculative.
      diligencePath: Request GXO and Agility for deployed unit count, ACV, and contract term length under NDA.
    - type: private-evidence-only
      severity: material
      topic: Partner Program conversion rate and pipeline
      missingEvidence: Pilot-to-production conversion rate and total Partner Program membership not disclosed.
      whyItMatters: >-
        Without conversion rate data, the commercial pipeline cannot be assessed and adoption trajectory claims remain
        unverified.
      diligencePath: >-
        Ask Agility for total Partner Program roster, stage distribution (intake/pilot/production), and historical
        conversion rate.
    - type: private-evidence-only
      severity: material
      topic: Named customer proof — terminated or failed pilots
      missingEvidence: No public record of any terminated or failed pilot deployments; adverse customer outcomes unknown.
      whyItMatters: >-
        Absence of adverse disclosures does not confirm clean pilot history; unreported failures would substantially
        change customer quality assessment.
      diligencePath: >-
        Request reference checks with GXO DC operations staff and any former pilot participants; ask Agility directly
        about failed or paused pilots.
      relatedQuestionRefs:
        - QU029
      relatedTableRefs:
        - TU003
    - type: private-evidence-only
      severity: material
      topic: GXO contract renewal terms and expansion intent
      missingEvidence: GXO contract renewal intent not public; risk of non-renewal or scope reduction not quantifiable.
      whyItMatters: >-
        Non-renewal would represent a revenue cliff and substantial credibility loss for Agility's commercial deployment
        thesis.
      diligencePath: Obtain GXO contract term, renewal clause, and multi-site expansion option details.
    - type: private-evidence-only
      severity: material
      topic: Digit operational performance at GXO
      missingEvidence: Digit uptime percentage, task success rate, and unplanned downtime data not published by Agility or GXO.
      whyItMatters: >-
        Operational performance metrics are the foundation of customer retention and expansion decisions; absence makes
        ROI validation impossible.
      diligencePath: Request Arc telemetry data exports or operational performance summary from GXO deployment under NDA.
    - type: private-evidence-only
      severity: material
      topic: Amazon pilot scope and outcome
      missingEvidence: Amazon pilot scope, unit count, facility count, and outcome not publicly disclosed.
      whyItMatters: >-
        Amazon is the highest-potential expansion account; pilot outcome determines whether conversion to production is
        likely or stalled.
      diligencePath: >-
        Seek reference call with Amazon Robotics or Amazon operations executive; review any public statements from
        Amazon re: Digit.
    - type: private-evidence-only
      severity: material
      topic: GEODIS pilot outcome and conversion timeline
      missingEvidence: GEODIS pilot outcome and conversion timeline not public.
      whyItMatters: >-
        GEODIS is a top-10 global 3PL; conversion to production would establish Agility's second named production
        customer and reduce concentration risk.
      diligencePath: Request GEODIS reference call; ask Agility for GEODIS conversion timeline and blockers.
    - type: private-evidence-only
      severity: material
      topic: OSHA NRTL approval process timeline for new sites
      missingEvidence: OSHA NRTL site-specific approval timeline for new facilities not benchmarked beyond GXO SPANX.
      whyItMatters: >-
        Approval timeline determines how fast Agility can expand to new customer sites; if approval takes 6-12 months
        per site, expansion will be severely bottlenecked.
      diligencePath: >-
        Interview OSHA NRTL body; ask Agility legal/regulatory team for approval process timeline data from any
        in-progress applications.
