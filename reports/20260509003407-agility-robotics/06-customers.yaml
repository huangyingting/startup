  - id: CU-SEC04
    title: Retention and Customer Durability
    body: |
      Customer retention evidence for Agility Robotics is limited to structural signals rather
      than observed data, given the small customer base and short commercial history. The
      multi-year RaaS agreement with GXO is the primary retention artifact: Agility has not
      disclosed contract length, but multi-year implies at least a two-year term, and GXO's
      continued operation and the 100,000-tote milestone suggest the relationship is active
      and expanding. GXO has not publicly announced contract termination, scope reduction, or
      competitive rebid, which is a weak positive signal.

      Structural lock-in mechanisms include: (1) Arc platform integration with GXO's WMS,
      creating switching costs tied to API re-integration with an alternative provider;
      (2) facility modification investment (cage infrastructure, floor sensors, charging
      stations) that is sunk and would require replacement if switching vendors; (3) operator
      training and muscle memory on Digit-specific workflows; and (4) the OSHA NRTL site-
      specific approval, which is Digit-specific and would need to be re-obtained for any
      replacement system at the same facility.

      No public NPS, CSAT, or operational satisfaction data has been published by Agility or
      GXO. Industry analysts who have spoken with GXO operations staff (cited in trade press
      through late 2025) describe the deployment as meeting or exceeding throughput targets,
      but this is anecdotal. Amazon and GEODIS have not publicly commented on pilot outcomes.
      The absence of a second named production customer 18 months after the GXO agreement is
      a flag—it may reflect normal enterprise sales cycles, RoboFab capacity constraints, or
      unreported pilot failures at other prospective accounts.
    claimRefs:
      - CU025
      - CU026
      - CU027
      - CU028
      - CU029
      - CU030
    tableRefs:
      - TU004
    figureRefs:
      - FU004
  - id: CU-SEC05
    title: Expansion and Concentration Risk
    body: |
      Customer concentration risk is material. GXO Logistics is the only publicly confirmed
      production customer, meaning that a decision by GXO not to renew or expand its
      deployment would substantially impair Agility's commercial credibility and near-term
      revenue. Amazon's involvement is financially and strategically significant but is an
      investor-and-pilot relationship rather than a confirmed production revenue source.
      If Amazon decided to leverage its own robotics capabilities or to deploy a competing
      humanoid platform (Boston Dynamics Spot, Figure AI, 1X Technologies), the downstream
      impact on Agility's market positioning could be severe.

      Expansion drivers are credible but execution-dependent. The land-and-expand model—
      deploying at one site within a large 3PL's network, then rolling out to additional
      facilities—is the primary growth path. GXO operates hundreds of DCs globally; even
      10–20 additional GXO sites at 5–10 robots each would represent a 10–20x deployment
      expansion from the current inferred base. Expansion to GEODIS, Amazon, and new
      Partner Program entrants follows the same pattern. The bottleneck is deployment
      cycle time (OSHA approvals, facility modification, WMS integration), not demand.

      Revenue concentration risk is compounded by the RaaS model: while multi-year contracts
      reduce quarter-to-quarter volatility, contract non-renewal at a major account represents
      a step-down in revenue rather than a gradual decline. Diligence should seek confirmation
      of GXO's contract renewal intent, pipeline of accounts in active deployment (not just
      Partner Program intake), and whether any pilots have been terminated or converted to
      "no decision."
