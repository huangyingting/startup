  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold / Signal
      - Transmission to Thesis
      - Lead Time
      - Action Implication
    notes: >-
      Triggers are observable within 6–18 months from Q1 2026. Monitoring dashboards should include quarterly RoboFab
      production reporting and public disclosures.
    claimRefs:
      - CV019
      - CV020
      - CV021
    rows:
      - - GXO contract non-renewal or public operational failure
        - GXO press release or earnings disclosing contract termination or significant Digit operational issues
        - Eliminates only commercial production proof; triggers competitor narrative; risks valuation rerating below $1B
        - 12–18 months
        - Exit or hedge immediately; downgrade to SELL; monitor Amazon reaction as secondary signal
      - - RoboFab production confirmed below 500 units/yr by end 2026
        - Third-party press reports or customer delivery timelines inconsistent with 10K/yr target
        - Bull case eliminated; base case threatened; down-round risk increases materially
        - 6–12 months
        - Reduce position; require RoboFab audit evidence before Series D participation
      - - Figure AI achieves production-scale commercial RaaS in logistics
        - Figure AI public announcement of multi-year logistics RaaS contract with 100+ units at named customer
        - Erodes Agility's first-mover narrative; pricing power risk; customer choice accelerates
        - 12–24 months
        - Reassess competitive differentiation; focus on Agility gross margin vs. Figure AI pricing
      - - Amazon launches competing internal humanoid at scale
        - Amazon public announcement of internal humanoid robot manufacturing or acquisition of a rival
        - Strategic investor becomes competitor; preferred status eliminates pricing advantage
        - 12–36 months
        - Review rights-of-first-refusal and competitive covenant provisions in partnership agreement
      - - Series D at materially lower valuation (down-round below $1.5B)
        - Public reporting of Series D closing below Series C price
        - Confirms bear case; common equity impaired; signals internal execution shortfall
        - 18–30 months
        - Exit secondary position; evaluate distressed M&A timing if strategic buyer interest confirmed
      - - OSHA issues general advisory restricting humanoid warehouse deployment
        - OSHA Federal Register notice or enforcement action citing humanoid robot incident
        - Material customer churn risk; multi-site approval process halted; market timing set back 2–3 years
        - 6–18 months
        - Full position review; enterprise customer sentiment check; legal opinion on regulatory impact
