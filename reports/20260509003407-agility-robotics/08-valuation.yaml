          Bull/base case distinction depends entirely on 1,000–5,000 unit/year ramp; unvalidated production is the
          primary financial model risk
        - Operations audit; site visit; supplier reference checks; Agility CFO/COO direct
      - - Series C Preference Stack and Cap Table
