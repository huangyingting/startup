company:
  name: Agility Robotics
chapter:
  number: 8
  title: Valuation
  summary: >
    Agility Robotics closed a $400M Series C in March 2025, implying a post-money valuation of approximately $1.75B on
    roughly $1.2B of cumulative capital raised. The valuation is supported by first-mover commercial evidence (GXO SPANX
    production, Amazon partnership), a purpose-built logistics moat, and RoboFab capacity scaling toward 10,000
    units/year. However, it is stretched relative to disclosed revenue (estimated sub-$10M ARR), reflects a significant
    bet on RaaS scaling that has not yet been stress-tested at multi-customer volume, and is compressed by well-funded
    rivals (Figure AI at $2.6B, Tesla Optimus, Unitree at sub-$20K/unit pricing). The recommended posture is TRACK:
    conditional buy for investors with a robotics-infrastructure thesis at disciplined entry, contingent on RoboFab
    milestone confirmation, a second named production customer, and clarity on Series C preference overhang. Exit
    pathways include strategic M&A (Amazon, Hyundai/Kia, Toyota) at $2B–$5B, or IPO readiness in 2028–2030 at $3B–$8B
    depending on ARR trajectory.
sections:
  - id: S01
    title: Investment Thesis and Anti-Thesis
    body: |
      Agility Robotics is the most commercially advanced bipedal humanoid robotics company
      as of early 2026. Its investment thesis rests on five mutually reinforcing pillars.
      First, the company has achieved what no rival has: a named enterprise customer (GXO
      Logistics) running a commercial RaaS contract in sustained multi-month production,
      moving over 100,000 totes at the SPANX fulfillment center. Second, it has secured
      Amazon as a strategic investor and pilot partner—providing both capital and access to
      the world's largest warehouse operator. Third, RoboFab, its purpose-built manufacturing
      facility in Salem, Oregon, represents a $70M capital commitment to a scalable production
      infrastructure targeting 10,000 units per year, which would make Agility the first
      humanoid manufacturer at meaningful industrial scale. Fourth, the company's bipedal
      locomotion IP, developed over a decade at Oregon State University, provides a defensible
      moat in the hardest engineering problem in humanoid robotics. Fifth, the $400M Series C
      provided 24-36 months of operating runway, reducing near-term financing risk.

      The anti-thesis is equally clear. Agility's current revenue base is thin: with one
      named production customer and an estimated sub-$10M ARR, the $1.75B valuation implies
      a revenue multiple of 150x or more—only defensible if the RaaS scaling model proves
      out with high unit economics. Figure AI has raised at a $2.6B valuation with backing
      from Microsoft, OpenAI, and others, and its Helix general-purpose AI model may allow
      faster broad-market penetration. Tesla Optimus is being manufactured at Tesla's existing
      gigafactories at potential cost advantages that Agility cannot match. Unitree G1 enters
      the market at $16,000 per unit—three orders of magnitude cheaper than Digit's implied
      RaaS cost basis—targeting developer and research markets that could establish platform
      lock-in before enterprise markets mature. Supply chain concentration in specialty
      actuators creates production risk at scale. The labor displacement narrative that drives
      Agility's market has a political risk dimension: union opposition, automation taxation
      proposals, and OSHA site-by-site approval requirements could slow enterprise adoption.
    tableRefs:
      - TV001
      - TV006
    figureRefs:
      - FV001
  - id: S02
    title: Financing Context and Valuation Framework
    body: |
      Agility Robotics has raised approximately $1.2B in total equity across multiple rounds.
      The funding history begins with early DARPA-funded research at Oregon State, followed
      by a 2020 Series A, a 2022 Series B of approximately $150M led by Amazon Industrial
      Innovation Fund, and the March 2025 Series C of $400M led by ARCH Venture Partners
      with participation from NEA, DCVC, and Amazon. The Series C post-money valuation is
      reported by Bloomberg and CB Insights at approximately $1.75B, though the precise cap
      table structure—including preference stack, liquidation preferences, and anti-dilution
      provisions—has not been publicly disclosed. Investors should assume standard VC
      liquidation preference; 2x participating would materially impair common returns in
      moderate exit scenarios below $2.5B.

      The appropriate valuation framework for Agility is a scenario-weighted discounted
      milestone model, not a revenue multiple. At sub-$10M ARR, traditional SaaS multiples
      are meaningless. The correct anchor is: what is the probability-weighted expected value
      of the RaaS model at 1,000+ robot deployments, discounted to today? Under a base case
      of 2,000 deployed robots at $120K/robot/year RaaS by 2028, annual recurring revenue
      reaches approximately $240M—yielding a forward EV/ARR multiple of 7–12x in line with
      industrial software comps, or a $1.7B–$2.9B enterprise value. The Series C price is
      fair, not cheap, at this entry point: upside requires execution on RoboFab, multi-site
      customer expansion, and gross margin improvement from current negative to 40-50%+ at
      fleet volumes. Secondary market data from Forge and EquityZen suggest thin liquidity
      and bid-ask spreads of 20–35% discount to Series C price, reflecting scale uncertainty.
    tableRefs:
      - TV002
    figureRefs:
      - FV002
  - id: S03
    title: Comparable Companies and Market Benchmarks
    body: |
      No direct public company comparable exists for a pre-revenue humanoid robotics company.
      The most useful comps span three categories: humanoid robotics private rounds, adjacent
      industrial automation companies, and strategic M&A precedents.

      In humanoid robotics private rounds, Figure AI is the most relevant peer. Figure AI
      raised $675M in a February 2024 round at a $2.6B post-money valuation, backed by
      Microsoft, Bezos Expeditions, and Intel Capital. Its BMW factory pilot and OpenAI
      integration suggest a different GTM (automotive/general-purpose vs. Agility's
      logistics-specific). Apptronik raised $350M from Samsung and others at an undisclosed
      valuation in 2024. 1X Technologies raised $100M at approximately $400M valuation in
      2024 with OpenAI backing. Tesla Optimus is not independently valued but benefits from
      Gigafactory manufacturing integration. The peer range implies pre-revenue humanoid
      robots are valued at $400M–$2.6B depending on manufacturing proof, strategic backing,
      and partner ecosystem depth. Agility at $1.75B sits in the upper tier of this range,
      justified by its commercial production milestone but stretched relative to peers without
      publicly disclosed revenue.

      In industrial automation, Zebra Technologies (industrial mobile robots, approximately
      $15B), Cognex (machine vision, approximately $8B), and Teradyne (collaborative robots,
      approximately $4B) trade at 5–8x forward revenue. These are inappropriate as direct
      multiples but establish the exit range for Agility if it can achieve $250M–$500M ARR.
      The Boston Dynamics precedent is instructive: Hyundai acquired Boston Dynamics from
      SoftBank in 2021 at $1.1B—a discount to development cost but consistent with
      pre-revenue robotics strategic M&A. A logistics-automation strategic acquirer with a
      strategic premium could value Agility at $3B–$5B+ if RoboFab reaches 3,000-5,000+
      annual units with multi-customer RaaS proof.
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - id: S04
    title: Scenarios and Return Analysis
    body: |
      Three scenarios govern Agility's valuation trajectory over the 2025–2030 investment
      horizon. The bull case assumes RoboFab reaches 5,000+ annual units by 2027, with 5+
      named production customers, ARR exceeding $300M by 2028, and an IPO or strategic M&A
      at 10–15x ARR yielding $3B–$5B enterprise value. Investor returns from Series C entry
      would be approximately 2–3x in 3–4 years before dilution. The base case assumes
      RoboFab produces 1,500–2,500 units by 2027, with 2–3 named production customers, ARR
      of $150M–$250M by 2028, and an M&A exit at $1.5B–$2.5B. Series C returns would be
      approximately 0.9–1.4x—marginal at Series C price. The bear case involves RoboFab
      production delays beyond 2028, customer churn at GXO, OSHA-driven deployment
      restrictions, and inability to raise a Series D at Series C price, yielding a
      down-round at $700M–$1.0B or forced M&A at distressed valuation. Series C returns in
      this scenario would be 0.4–0.6x, with preference stack protecting institutional
      investors but devastating common equity.

      The downside scenario is not tail risk: three of the six thesis-break triggers
      (RoboFab delay, second customer addition, OSHA approval generalization) are observable
      within 18 months. Active investors should define monitoring dashboards around these
      milestones and establish price discipline at Series D entry. The probability
      distribution is approximately 30% bull, 45% base, 25% bear as of Q1 2026.
    tableRefs:
      - TV004
    figureRefs:
      - FV004
  - id: S05
    title: Recommendation, Exit Readiness, and Final Diligence Asks
    body: |
      The recommended posture is TRACK with a conditional buy trigger. At Series C price
      ($1.75B implied), the risk/reward is unattractive for most institutional LP mandates:
      the base case return is 1.0–1.4x over 3 years, and the bear case represents material
      capital loss. However, for investors with strategic robotics-infrastructure mandates,
      a long hold horizon (5–7 years), or co-investment access alongside ARCH/NEA at Series
      C price, the bull case upside ($3B–$5B exit, 2–3x) justifies the position size.

      Exit readiness is moderate. Strategic acquirers are actively evaluating the humanoid
      robotics space: Amazon's right-of-first-refusal provisions are typical for strategic
      investors of this type, Toyota's Woven Planet division has expressed interest in
      bipedal robotics partnerships, and Hyundai demonstrated willingness to pay $1.1B for
      Boston Dynamics in a pre-commercial state. A $2B–$3.5B strategic M&A exit is
      achievable in 2026–2028 if RoboFab delivers at 2,000+ unit/year capacity and a second
      named production customer is signed. IPO readiness requires $200M+ ARR and positive
      gross margin—likely 2028–2030 at earliest under the base case.

      The five critical diligence gaps before upgrading to BUY are: confirmation of GXO
      contract renewal beyond initial term; RoboFab production rate validation from a
      third-party operations audit; a second named production customer agreement; disclosure
      of Series C preference stack and liquidation waterfall; and evidence that gross margin
      is trending toward breakeven at current fleet sizes.
    tableRefs:
      - TV005
