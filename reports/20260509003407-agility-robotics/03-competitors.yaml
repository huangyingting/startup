company:
  name: Agility Robotics

chapter:
  number: 3
  title: Competitors
  summary: >
    Agility Robotics faces competition from six identifiable humanoid robot companies across
    the direct, adjacent, and likely-entrant categories: Figure AI, Tesla Optimus, Boston
    Dynamics Atlas, 1X Technologies NEO, Apptronik Apollo, and Unitree G1. As of mid-2026,
    Agility holds a distinct first-mover advantage in commercial logistics deployment, with
    GXO and Amazon as paying customers and over 100,000 documented tote movements. No
    competitor has matched Agility's commercial deployment track record. Figure AI leads on
    AI valuation but has not achieved sustainable commercial scale after its BMW pilot ended.
    Tesla Optimus has the largest potential manufacturing scale advantage but remains
    factory-internal only. Competitive moats include Agility's RaaS model software lock-in,
    deployment data, and RoboFab production ramp, but are threatened by Figure AI's AI
    capabilities and Tesla's cost trajectory.

sections:
  - id: SP-SEC01
    title: Competitive Landscape Overview
    body: |
      Agility Robotics competes in the nascent commercial humanoid robotics market, where
      six meaningful competitors have emerged across a spectrum of funding scales, technical
      approaches, and commercial ambitions. The landscape divides into three tiers. First,
      well-funded near-term competitors targeting the same logistics and manufacturing
      verticals: Figure AI (valuation $39B, Sept 2025), Apptronik Apollo (~$5B valuation,
      Samsung investment), and 1X Technologies NEO ($10B sought, backed by OpenAI). Second,
      platform-scale incumbents with adjacent technology strengths: Tesla Optimus (backed by
      Tesla's vertically integrated manufacturing and FSD AI stack) and Boston Dynamics
      Atlas (owned by Hyundai Motor Group with 56 DOF and IP67 rating). Third, low-cost
      Chinese entrants: Unitree G1 ($16K starting price) capable of eroding the research
      and pilot segment. The critical distinguishing fact is that Agility is the only
      competitor with publicly documented, multi-year, commercial-scale RaaS deployments
      as of mid-2026. This deployment lead provides operational data, customer references,
      and workflow integration lock-in that competitors have not yet replicated. However,
      the commercial window is finite: Figure AI, Apptronik, and 1X are all targeting
      commercial production by 2026–2027, and Tesla has signaled that Optimus may become
      externally available in the 2026–2027 timeframe. The competitive moat Agility has
      built is real but time-bounded, and defensibility depends heavily on execution
      velocity in customer acquisition, production ramp, and AI capability advancement.
    claimRefs: [CP001, CP004, CP017, CP022, CP033]

  - id: SP-SEC02
    title: Direct Competitor Profiles
    body: |
      Figure AI (founded 2022, Sunnyvale CA) is the highest-profile and most heavily
      capitalized pure-play humanoid competitor. Its B2 robot stands 5'6", weighs 60kg,
      carries 20kg payload, and achieves 1.2 m/s walking speed with a 5-hour battery
      cycle. Figure AI's Helix visual-language-action model represents a genuinely
      differentiated AI capability that enables generalist task learning from human
      demonstration, which Agility's current AI stack does not match in generality. Figure
      raised over $1B in a September 2025 Series C at a $39B post-money valuation.
      However, its BMW factory pilot—the company's first meaningful commercial test—was
      discontinued in early 2025 after significant teleoperation dependency was identified,
      and Figure AI had not achieved comparable commercial scale to Agility as of
      mid-2026. Tesla Optimus Gen 2 is a strategic wildcard: the robot is 5'8", 57kg,
      carries 20kg payload, and targets a $20K–$30K unit price once commercially
      available. Tesla is deploying Optimus exclusively in its own manufacturing
      facilities as of 2026 with no external commercial sale. Boston Dynamics electric
      Atlas (2024) is the most physically capable platform at 6'2", 90kg, and 50kg
      payload, but it is priced at $150K+ per unit and is focused on Hyundai/Kia
      automotive assembly, not logistics. 1X Technologies NEO (Norwegian startup) offers
      a $20K direct/$499 per month subscription model with 25kg carrying capacity; it
      raised $125M Series B with OpenAI and EQT Ventures, and is reportedly seeking $1B
      at a $10B valuation. Apptronik Apollo is a 5'9", 72kg, 25kg payload platform with
      a NASA partnership, Samsung investment, and an open developer platform approach.
      Unitree G1 starts at approximately $16K—well below all Western competitors—and
      primarily targets research and pilot budgets.
    claimRefs: [CP001, CP002, CP003, CP005, CP006, CP007, CP008, CP009, CP010, CP011, CP012, CP013, CP014, CP016]

  - id: SP-SEC03
    title: Capability and Feature Differentiation
    body: |
      Across the competitive field, the most critical capability dimensions for logistics
      customers are payload capacity, battery uptime, task flexibility, safety certification,
      and commercial integration maturity. Agility's Digit carries a 16kg payload—the
      lowest among the main competitors, where Figure AI B2, Tesla Optimus, 1X NEO, and
      Apptronik Apollo all target 20–25kg payloads. This payload gap is mitigated by
      Digit's focus on tote-centric logistics workflows where 16kg exceeds practical need,
      but it remains a specification weakness. On battery life, Digit's 4+ hours and 1X
      NEO's competitive spec are comparable; Boston Dynamics Atlas's operational cycle is
      the most constrained. The key capability differentiator for Agility is its
      deployment stack: the Agility Arc platform, 3D LiDAR + stereo cameras sensor
      fusion, WMS integration capability, and FSoE CAT1 functional safety certification.
      No competitor has achieved equivalent commercial-scale deployment certification in a
      third-party logistics environment. On AI capability, Figure AI's Helix VLA model is
      considered technically superior to Agility's current approach, as it enables
      generalist multi-task operation from demonstrations, while Digit's AI stack is
      optimized for a narrower set of logistics tasks. Tesla's FSD-derived AI stack gives
      Optimus long-term AI development advantages if Tesla decides to invest in
      humanoid-specific training pipelines. Apptronik's open developer platform
      differentiates on ecosystem expansion, not core AI capability.
    claimRefs: [CP002, CP003, CP008, CP015, CP020, CP026, CP035]

  - id: SP-SEC04
    title: Pricing Models and Go-To-Market Comparison
    body: |
      The humanoid robot market features three distinct pricing and go-to-market
      archetypes as of mid-2026. Agility's RaaS model ($10K–$15K/month or ~$30/hr)
      bundles hardware, software, maintenance, and fleet management—shifting capital
      expenditure to operating expenditure for customers and creating recurring revenue
      for Agility. This model aligns incentives between Agility and its enterprise
      customers, as Agility retains hardware ownership and has a financial stake in
      uptime and reliability. The direct-sale alternative ($150K/unit) is available but
      not the primary commercial motion. Figure AI has not publicly disclosed a
      commercial pricing model as of mid-2026, though industry reports suggest it may
      pursue a similar RaaS approach. Boston Dynamics' $150K+ per unit Atlas targets
      Hyundai's internal capital budget and is not expected to reach a RaaS or mass
      market price point. 1X Technologies' dual pricing—$20K direct or $499/month—is
      significantly lower than Agility's but targets a different customer segment
      (home/light industrial versus enterprise logistics). Unitree G1's $16K starting
      price undercuts all others in absolute terms and targets academic and pilot
      customers. Tesla Optimus targets a $20K–$30K unit price on a not-yet-available
      timeline. Apptronik has not published pricing publicly. The most critical
      go-to-market distinction is Agility's proven ability to navigate enterprise sales
      cycles at Tier-1 operators (GXO, Amazon) while competitors are still in pre-commercial
      or early-commercial stages.
    claimRefs: [CP006, CP009, CP010, CP018, CP022, CP024, CP027]

  - id: SP-SEC05
    title: Competitive Moat and Displacement Risk
    body: |
      Agility's competitive advantages include: (1) First-mover deployment data—over 100,000
      tote movements at GXO create proprietary operational data that informs AI and
      mechanical refinement. (2) RaaS software lock-in—the Agility Arc WMS integration
      creates switching costs analogous to enterprise SaaS; replacing Digit requires
      re-integrating the WMS with a competing platform, retraining operators, and
      redesigning safety zones. (3) Production infrastructure—RoboFab's 70,000 sq ft
      Salem, Oregon facility targets 10,000 units per year, providing a supply chain
      scale that most competitors have not yet built. (4) Safety certification—FSoE CAT1
      and existing cage-segregated deployment experience creates regulatory familiarity
      and a compliance path that competitors need to replicate. The key displacement
      risks are: (a) Figure AI achieves commercial deployment scale by 2027, bringing
      superior AI generalist capability at comparable pricing—the most probable near-term
      threat given funding and talent. (b) Tesla Optimus achieves its target $20–30K
      unit price, making direct purchase economically competitive with Agility's RaaS
      on a total cost basis after 12–18 months. (c) Chinese manufacturers, particularly
      Unitree, erode the pilot and early-adopter segment through pricing pressure, forcing
      Agility to compete lower in the market than its enterprise positioning intends.
      (d) The commercial window narrows faster than Agility can scale if Figure AI or
      Apptronik close enterprise contracts with GXO's competitors before Agility does.
      The IEEE published an assessment in 2025 noting significant industry-wide gaps in
      commercial readiness across AI reliability, uptime, and safety integration, which
      applies to Agility alongside its competitors.
    claimRefs: [CP017, CP019, CP021, CP023, CP024, CP028, CP029, CP030, CP031, CP032, CP036]

