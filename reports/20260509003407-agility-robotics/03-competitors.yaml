callouts:
  - calloutType: strength
    title: "First-Mover Commercial Deployment Is Agility's Most Durable Moat"
    body: >
      No competitor had achieved comparable commercial-scale RaaS deployment in a third-party
      logistics environment as of mid-2026. The combination of operational data from 100,000+
      tote movements, WMS integration via Agility Arc, and FSoE CAT1 safety certification
      creates a multi-layer advantage that requires time and capital to replicate—not
      just engineering effort.
    claimRefs: [CP017, CP022, CP026, CP028, CP029]

  - calloutType: risk
    title: "Figure AI's Valuation Premium Signals Near-Term Competitive Escalation"
    body: >
      Figure AI's $39B post-money valuation—18.5× Agility's own—reflects deep investor
      conviction that AI capability breadth will ultimately define the market winner.
      Figure AI's Helix VLA model is a technically credible threat to Agility's task-specific
      AI approach. If Figure AI achieves commercial scale by 2027–2028, the competitive
      window will narrow sharply, and Agility's first-mover advantage becomes time-limited
      without accelerated customer acquisition.
    claimRefs: [CP001, CP003, CP004, CP023, CP030]

  - calloutType: risk
    title: "Tesla's Cost Trajectory Could Undercut RaaS Economics"
    body: >
      Tesla's $20K–$30K unit price target for Optimus, if achieved, could make direct
      purchase economically competitive with Agility's $10K–$15K/month RaaS on a
      14–18 month total cost of ownership basis. Tesla's manufacturing and supply chain
      scale advantages are unmatched in the industry, and its FSD AI stack gives it
      a credible long-term AI development path. This risk is medium-term (2027–2029)
      rather than immediate, but warrants close monitoring.
    claimRefs: [CP005, CP006, CP007, CP024]

