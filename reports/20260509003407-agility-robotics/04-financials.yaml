  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Revenue and gross margin
      missingEvidence: >-
        Agility Robotics has not disclosed audited revenue, gross margin by segment, or COGS data. All financial
        estimates are third-party approximations with wide uncertainty ranges.
      whyItMatters: >-
        Without confirmed revenue and margin data, it is impossible to underwrite unit economics, assess burn
        sustainability, or validate the capital raise size.
      diligencePath: >-
        Request audited financial statements (P&L, balance sheet, cash flow) and segment-level margin bridge in formal
        diligence.
      relatedQuestionRefs:
        - QI014
        - QI026
      relatedTableRefs:
        - TI003
        - TI005
    - type: missing-source
      severity: material
      topic: Arc platform revenue and pricing
      missingEvidence: >-
        Agility Robotics has not published Arc platform pricing, standalone subscription terms, or disclosed its
        contribution to total revenue.
      whyItMatters: >-
        Arc represents the software layer with potential for high-margin recurring revenue; its absence from financial
        analysis understates or overstates total revenue quality.
      diligencePath: >-
        Request Arc pricing schedule, number of active subscriptions, and whether Arc is priced separately or bundled in
        RaaS contracts.
      relatedQuestionRefs:
        - QI015
      relatedTableRefs:
        - TI001
        - TI002
    - type: private-evidence-only
      severity: material
      topic: Next-round trigger and capital planning
      missingEvidence: >-
        The board's internal threshold for a Series D or pre-IPO raise—including unit economics targets, fleet size, and
        revenue milestones—has not been disclosed publicly.
      whyItMatters: >-
        Understanding the capital trigger helps assess whether current funding is adequate and what conditions could
        accelerate or delay the next raise.
      diligencePath: Review board-approved financial model and capital allocation plan in formal due diligence.
      relatedQuestionRefs:
        - QI017
      relatedTableRefs:
        - TI004
    - type: private-evidence-only
      severity: high
      topic: RoboFab working capital and scale-up costs
      missingEvidence: >-
        The working capital requirements—component inventory, tooling investment, yield ramp costs—needed to scale
        RoboFab from current output to 10,000 units per year have not been publicly quantified.
      whyItMatters: >-
        Underestimating working capital could compress cash runway significantly; manufacturing scale-up is
        capital-intensive and non-linear.
      diligencePath: Obtain manufacturing scale-up plan, inventory build schedule, and capex timeline from operations management.
      relatedQuestionRefs:
        - QI024
      relatedTableRefs:
        - TI004
        - TI005
    - type: missing-source
      severity: material
      topic: IPO timeline and liquidity path
      missingEvidence: >-
        No official guidance on IPO timing, pre-IPO secondary activity, or management liquidity plans has been provided
        by Agility Robotics.
      whyItMatters: >-
        Investor and employee liquidity depends on the exit path; a lack of IPO clarity prolongs capital lock-up and
        affects talent retention incentives.
      diligencePath: Request board's current view on liquidity path and timeline from investor relations or CEO communications.
      relatedQuestionRefs:
        - QI027
      relatedTableRefs:
        - TI004
