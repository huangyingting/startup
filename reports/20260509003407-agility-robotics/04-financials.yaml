  - id: FI-SEC04
    title: Capital Adequacy and Runway Analysis
    body: |
      Following the $400M Series C close in March 2025, Agility Robotics held an estimated
      $300M–$400M in cash and cash equivalents after accounting for transaction costs and
      near-term obligations. Monthly cash consumption is estimated at $4–$7M, combining an
      approximate payroll cost of $3–$5M for 250–500 employees, plus RoboFab capital
      expenditures, component inventory build, and R&D spending for next-generation Digit
      iterations and cooperative safety systems. At the midpoint burn of ~$5.5M/month, the
      runway extends to approximately 55–70 months (roughly 4.5–6 years) from March 2025,
      implying cash into late 2029 or 2031. Under a high-burn scenario ($7M/month with
      manufacturing scale-up costs), runway shortens to ~43 months (mid-2028). The company has
      not disclosed a use-of-funds breakdown for the Series C proceeds. Capital allocation
      priorities are inferred to include: RoboFab ramp to target capacity, R&D for next-gen
      Digit and Arc AI features, commercial team expansion for enterprise sales cycles, and
      working capital for component inventory (approximately 6,000 parts per unit, 80% US-
      sourced). No disclosed debt, revolving credit, or project-finance arrangements have been
      identified in public filings or press coverage. The company's next material capital event
      is expected to be a Series D or pre-IPO round, likely triggered if RaaS unit economics
      approach breakeven or if fleet size crosses a threshold requiring additional manufacturing
      investment. Runway adequacy is rated sufficient for the near term but sensitive to
      manufacturing ramp speed and gross margin realization.
