company:
  name: Agility Robotics

chapter:
  number: 1
  title: Company Overview
  summary: >
    Agility Robotics is a Redmond, WA-based humanoid robotics company founded in 2015 as
    an Oregon State University spin-off. Its flagship product, Digit, is the first bipedal
    humanoid robot in commercial production deployment, serving logistics and warehouse
    operators under a Robots-as-a-Service model. The company raised a $400M Series C in
    March 2025 at a ~$2.12B post-money valuation, bringing total funding to ~$641M. CEO
    Peggy Johnson joined in March 2024. The RoboFab factory in Salem, Oregon is designed
    for 10,000+ Digit units per year. Key customers include GXO Logistics and Amazon.

sections:
  - id: S01
    title: Identity and Business Model
    body: |
      Agility Robotics designs, manufactures, and deploys bipedal humanoid robots for industrial
      logistics and warehouse automation. The company's primary product, Digit, is marketed as the
      first humanoid robot in sustained commercial production deployment—a positioning it supports
      with documented deployments at GXO Logistics and Amazon fulfillment centers. Agility sells
      access to Digit primarily through a Robots-as-a-Service (RaaS) subscription model, typically
      priced in the range of $10,000–$15,000 per robot per month, which bundles the hardware,
      maintenance, software updates, and fleet management. The company also generates revenue
      through direct sales at roughly $150,000 per unit and through subscriptions to its Agility
      Arc cloud platform, which orchestrates robot fleets and integrates with warehouse management
      systems. Agility's stated mission is to automate "dull, dirty, dangerous, and repetitive"
      warehouse tasks, addressing persistent labor shortages in logistics and supply chain
      operations. The company is headquartered in Redmond, Washington, and operates RoboFab, a
      70,000 sq ft manufacturing facility in Salem, Oregon. The company states that approximately
      80% of Digit's ~6,000 parts are sourced from the United States, reflecting a supply-chain
      resiliency strategy. As of 2026, Agility describes itself as delivering "proven results"
      and positions Digit alongside the Agility Arc software platform as a complete automation
      solution for facility operators.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]

  - id: S02
    title: Founding History and Leadership
    body: |
      Agility Robotics was founded in 2015 as a spin-off from Oregon State University's Dynamic
      Robotics Laboratory, led by Professor Jonathan Hurst, who had spent years researching
      legged locomotion and bipedal robotics. Co-founder Damion Shelton served as CEO from
      inception through early 2024, building the company from academic prototype to commercial
      product. In March 2024, Peggy Johnson—former President of Microsoft and former CEO of
      Magic Leap—assumed the CEO role, bringing enterprise-scale commercialization experience
      to a company transitioning from R&D to mass deployment. Hurst now holds the title of
      Chief Robot Officer, focusing on technical vision, while Shelton became President and
      Chairman. Other key executives include Melonee Wise (Chief Product Officer, formerly
      CTO/CEO at Fetch Robotics), Pras Velagapudi (CTO), Aindrea Campbell (COO, previously
      at Apple and Zymergen), Rich Bohne (Chief Commercial Officer), and Ana Lang (Chief
      Legal and People Officer). The founding duo of Hurst and Shelton remains central to the
      company's identity, blending deep academic robotics expertise with commercial ambitions.
      Agility counts no contested founder departures or governance disputes on public record
      as of mid-2026, though the CEO transition in 2024 represented a material organizational
      change. The company's academic origins at OSU provide it a recognized research heritage
      in legged locomotion.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012]

  - id: S03
    title: Funding History and Investor Base
    body: |
      Agility Robotics has raised approximately $641M in total funding across several rounds.
      The most significant event was a $400M Series C closed in March 2025, led by WP Global
      Partners—the venture arm of the private equity firm—with participation from SoftBank
      Group and the Amazon Industrial Innovation Fund. This round valued the company at
      approximately $1.75B pre-money and ~$2.12B post-money. Prior to the Series C, the
      company raised a $150M Series B in 2022 at approximately $620M valuation, anchored by
      Amazon's Industrial Innovation Fund alongside DCVC and Playground Global. Amazon's
      involvement predates the 2022 round: it invested an undisclosed amount through the
      Industrial Innovation Fund in 2021 and was also a strategic customer. Ford Motor Company
      invested approximately $6M in 2020 in an earlier seed/Series A-era round. Canon and Sony
      Innovation Fund have also been cited among investors in earlier rounds, reflecting
      strategic interest from hardware and imaging companies. The investor base is notable for
      mixing strategic enterprise operators (Amazon, a major customer), large-scale generalist
      VCs (SoftBank, WP Global), and mission-aligned deep-tech investors (DCVC, Playground
      Global). SoftBank's participation in the Series C is significant given SoftBank had
      previously been reported to have explored a potential acquisition of Agility at a
      valuation exceeding $900M. Total disclosed capital of ~$641M substantially pre-funds
      RoboFab's scale-up and commercial expansion through at least the next 18–24 months
      at current burn estimates.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019]

  - id: S04
    title: Cover Metrics and Scale Indicators
    body: |
      As of the May 2026 research date, most financial metrics for Agility Robotics remain
      undisclosed given its private status. The most reliably documented figures are: post-money
      valuation of ~$2.12B (March 2025 Series C); total funding ~$641M; and an estimated annual
      revenue of approximately $35.5M for 2025, sourced from third-party data providers (CompWorth,
      CBInsights) with low confidence. Headcount estimates range from 250 to 500+ employees,
      with 500+ targeted for the Salem RoboFab facility alone. The company does not disclose
      gross margin, ARR, or RaaS contract count publicly. Digit is described by the company as
      "in production deployment" with at least two named enterprise customers (GXO Logistics and
      Amazon). The GXO deployment surpassed 100,000 tote movements in November 2025, representing
      a documented operational throughput milestone. Agility projects RoboFab capacity at
      10,000 Digit units per year at full build-out, though actual production volume in 2024
      and 2025 was in the range of hundreds of units rather than thousands. Revenue is expected to
      be pre-breakeven given the level of capital investment required to scale manufacturing. No
      debt financing or secondary transactions have been publicly disclosed as of the research date.
    claimRefs: [CO020, CO021, CO022, CO023, CO024]

  - id: S05
    title: Milestones and Company Timeline
    body: |
      Agility Robotics' history can be structured across five phases: academic origins
      (2015–2017), early commercialization (2018–2020), capital formation (2021–2022),
      manufacturing build-out (2023–2024), and commercial scale-up (2025–2026). The company
      was founded in 2015 at Oregon State University; the first significant external robot,
      Cassie, was unveiled in 2017 and sold to research labs. The Digit platform was first
      introduced circa 2019–2020 as a more capable bipedal humanoid with arms and manipulation
      capability. The $150M Series B in 2022 funded transition to commercial deployment. The
      multi-year RaaS agreement with GXO Logistics—described as the first of its kind in the
      industry—was signed in June 2024, followed by the 100,000-tote milestone in November 2025.
      The $400M Series C in March 2025 represented the largest single funding event. RoboFab in
      Salem was publicly announced in September 2023, opened in 2024, and is being ramped to
      full production capacity. In March 2024, Peggy Johnson joined as CEO. As of 2026, Agility
      is targeting a "cooperatively safe" version of Digit—capable of working without safety
      cages alongside humans—as its next major product milestone, with a planned 2026–2027
      rollout and a fifth-generation model capable of 50-lb payload.
    claimRefs: [CO025, CO026, CO027, CO028, CO029, CO030]

