callouts:
  - calloutType: strength
    title: First-Mover in Commercial Humanoid Deployment
    body: >
      Agility Robotics is the only humanoid robotics company with confirmed multi-year
      commercial RaaS deployments at named enterprise customers (GXO Logistics, Amazon).
      The 100,000-tote milestone at GXO's Flowery Branch facility (November 2025) provides
      documented proof of industrial throughput at scale—a differentiator versus competitors
      still in pilot or demo phases.
    claimRefs: [CO022, CO030]

  - calloutType: risk
    title: Key-Person Dependency on Founders and New CEO
    body: >
      The company depends on co-founders Hurst (technical IP) and Shelton (commercial vision),
      plus a recently joined CEO (Johnson, March 2024) with no prior robotics operating
      experience. A second leadership transition during the critical commercialization phase
      would pose meaningful execution risk.
    claimRefs: [CO007, CO009]

  - calloutType: insight
    title: Amazon Investor-Customer Duality Creates Alignment and Concentration Risk
    body: >
      Amazon's dual role as a Series B/C investor and primary enterprise deployment customer
      creates strong near-term alignment but also significant customer concentration risk.
      Any deterioration in the Amazon relationship—through a competing internal robotics
      initiative or commercial dispute—could simultaneously affect revenue, investor sentiment,
      and technical roadmap priorities.
    claimRefs: [CO016, CO029]

