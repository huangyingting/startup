  foundingLocation: Corvallis, Oregon, USA
  headquarters: Tangent, Oregon, USA
  productSummary: >
    Digit is a 5'9", 65 kg bipedal humanoid robot with 16 kg payload capacity, 4+ hour battery life, and task-optimized
    end effectors for logistics use cases. It integrates 3D LiDAR, stereo cameras, and onboard AI to navigate warehouse
    environments and manipulate totes and packages. The Arc cloud platform provides fleet management, AMR integration
    (MiR, Zebra Technologies), and WMS/WES connectivity. Digit operates under functional safety (FSoE CAT1) standards
    and currently deploys in safety-caged environments, with cooperative certification targeted for 2026–2027.
  customerFocus: >-
    Tier-1 third-party logistics operators (3PLs), e-commerce fulfillment centers, and manufacturing facilities facing
    labor shortages in repetitive material-handling tasks.
  businessModel: >-
    Hybrid: Robot-as-a-Service (RaaS) at $10K–$15K/month per unit with multi-year contracts, and direct capital sale at
    ~$150K per unit. Arc cloud platform subscription revenue (pricing undisclosed).
