      - number: '7.4'
        title: People and Execution Risks
        blocks:
          - type: paragraph
            body: |
              People risk at Agility Robotics concentrates at the senior leadership and technical co-founder level.
              CEO Peggy Johnson joined in March 2024 with a background in commercial and business development from
              Microsoft, Qualcomm, and Verizon rather than robotics engineering. While Johnson has demonstrated
              strong commercial instincts in raising the $400M Series C and closing the GXO RaaS agreement, her
              limited operational experience in robotics manufacturing creates execution risk during the critical
              RoboFab production ramp phase. The board and investor group has not publicly articulated a succession
              plan or operational depth below the CEO level.

              Damion Shelton (President and co-founder) is the most critical technical and strategic anchor. As a
              co-founder with deep product and business development expertise, Shelton bridges the technical and
              commercial dimensions of the company. His departure would represent a significant disruption to both
              investor confidence and operational continuity. Jonathan Hurst (Chief Robotics Officer and co-founder)
              is the inventor of the cassowary-inspired bipedal locomotion system underlying Digit and holds deep
              expertise in legged robot dynamics. Loss of Hurst would decelerate locomotion R&D and create patent
              continuity risk given his foundational role in OSU-co-developed IP.

              The competitive talent environment for AI and robotics engineers is severe. Google DeepMind, Tesla,
              Meta AI, and well-funded startups including Figure AI and Physical Intelligence compete aggressively
              for the same pool of reinforcement learning, locomotion, and embedded systems engineers. Agility's
              ability to retain and attract this talent at a company with approximately 100 units commercially
              deployed depends heavily on equity incentive structures and technical mission appeal. Board alignment
              risk also exists: Amazon, SoftBank, and WP Global Partners may have divergent exit timeline
              preferences and risk tolerance levels creating governance friction at the next strategic inflection.
            claimRefs:
