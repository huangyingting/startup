      - number: '5.5'
        title: Safety Certification, Compliance, and Product Roadmap
        blocks:
          - type: paragraph
            body: |
              Digit's current safety architecture includes Functional Safety over EtherCAT (FSoE) CAT1
              stop capability, a safety PLC, on-robot and wireless emergency stop systems, and Arc's
              remote fleet shutdown. Despite this hardware safety infrastructure, Digit as of 2026 operates
              in cage-segregated environments where physical barriers separate the robot from human workers
              during active operation. The company has not yet achieved ISO/TS 15066-compliant cooperative
              safety certification that would allow Digit to work directly alongside humans without barriers.
              CEO Peggy Johnson has publicly targeted 2026 for cooperative safety certification, which would
              represent the single largest capability step-change in Digit's commercial deployment potential,
              opening facilities where cage installation is impractical or cost-prohibitive. Independent
              analysts and critics at IEEE Spectrum and Fortune have noted that this certification timeline
              has slipped from earlier commitments and that full uncaged human-robot collaboration in
              logistics environments involves regulatory review processes that could extend well into 2027.
              The announced product roadmap includes enhanced runtime, expanded AMR integration, and improved
              safety features in 2025; cooperative certification in 2026; and a fifth-generation Digit
              targeting fully cooperative workflows and a higher payload (50 lbs vs current 35 lbs) for a
              2027+ rollout. Longer-term, Agility has stated ambitions to expand beyond logistics into light
              manufacturing, healthcare, and retail, though no specific product variants or customer
              engagements for these verticals have been publicly confirmed. Key technical limitations that
              could constrain this expansion include: the task-specific end effector design (not general-
              purpose), the structured-environment assumption baked into current AI models, and battery
              capacity that limits continuous multi-shift deployment without autonomous charging infrastructure.
