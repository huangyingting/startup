      - number: '7.3'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: |
              Partner and dependency risk concentrates in three relationship clusters: the Amazon investor-customer
              dual relationship, the GXO anchor customer dependency, and technology supply chain dependencies
              spanning Intel, NVIDIA, and domestic component suppliers. Amazon is both Agility's largest likely
              customer and a financial investor through the Amazon Industrial Innovation Fund. This alignment of
              incentives is simultaneously a strategic asset and a structural risk: Amazon has the capability,
              capital, and robotics ambition to develop its own humanoid alternative. Reports of Amazon's internal
              robotics investments and its acquisition history suggest this risk is not theoretical. A decision to
              reduce or terminate Digit deployments in favor of an internally developed solution would remove a
              marquee customer reference and potentially a financial supporter simultaneously.

              GXO Logistics represents the only publicly confirmed multi-year RaaS commercial contract. Non-renewal
              of the GXO agreement would materially damage Agility's commercial traction narrative and RaaS revenue.
              GXO is subject to macro pressures in the 3PL sector; any sustained logistics market downturn could
              reduce GXO's technology investment budget and affect contract renewal probability. SoftBank and WP
              Global Partners investor relationships introduce financial dependency risk: if either investor faces
              internal capital constraints or strategic realignment, follow-on funding support could be delayed at
              a critical manufacturing ramp stage.

              Intel and NVIDIA supply dependencies for Digit's compute stack represent external technology risks. A
              major semiconductor supply disruption similar to the 2021-2022 global chip shortage could directly slow
              RoboFab's production ramp. The Arc cloud platform's dependency on public cloud infrastructure introduces
              operational availability risk: any major cloud region outage would interrupt fleet telemetry, remote
              safety monitoring, and task dispatch across all customer sites simultaneously. These platform-level
              dependencies are not publicly disclosed and the extent of multi-region failover architecture is unknown.
