  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Overview and Digit Hardware Architecture
        blocks:
          - type: paragraph
            body: |
              Digit is Agility Robotics' commercial bipedal humanoid robot, designed from the ground up
              for logistics and warehouse automation. The current-generation Digit stands 175 cm (5'9"),
              weighs approximately 65 kg, and handles payloads up to 16 kg (35 lbs). Its locomotion
              system uses cassowary-inspired backward-bending legs derived from over a decade of
              biomechanics research at Oregon State University's Dynamic Robotics Laboratory under
              professor Jonathan Hurst. The robot navigates autonomously through warehouses using a
              perception suite comprising 3D LiDAR, stereo RGB cameras, an inertial measurement unit
              (IMU), joint encoders, proximity sensors, and force sensors. Onboard compute runs dual
              Intel i7 CPUs, with a modular open payload bay accommodating NVIDIA Jetson or Intel NUC
              accelerators for AI inference tasks. Digit walks at up to 1.5 m/s, navigates stairs and
              curbs, and can operate for 4+ hours before autonomously docking at its charging station.
              Connectivity is provided via WiFi and 4G cellular. The robot is designed with approximately
              6,000 parts per unit, with roughly 80% sourced from US-based suppliers, reflecting a supply
              chain resiliency strategy aligned with domestic manufacturing priorities. The end effectors
              are task-optimized for logistics tote handling rather than general-purpose five-finger
              manipulation, representing an intentional design trade-off: simpler, more reliable
              manipulation for a narrow but commercially validated task set.
