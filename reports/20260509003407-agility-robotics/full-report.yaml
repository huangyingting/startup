  - id: FR002
    title: Risk Transmission Map
    type: dag
    layout: wide
    summary: >
      A directed graph showing how primary risk events at Agility Robotics propagate through causal chains into
      downstream outcomes affecting revenue, customers, margin, operations, and investor confidence. Each edge
      represents a causal or conditional dependency between risk events.
    claimRefs:
      - CR011
      - CR014
      - CR021
      - CR030
      - CR037
      - CR038
    data:
      nodes:
        - id: safety-incident
          label: Safety Incident (Digit Injury)
          detail: A Digit-related workplace injury at a customer site; OSHA recordable or more serious classification.
        - id: regulatory-action
          label: OSHA Investigation or Enforcement
          detail: OSHA investigation triggered by injury; potential citation, fine, or deployment suspension order.
        - id: deployment-ban
          label: Deployment Suspension
          detail: Customer-initiated or regulator-mandated halt to Digit deployments; potential cross-customer contagion.
        - id: media-fallout
          label: Media and Reputational Fallout
          detail: Negative press coverage amplifies safety concerns; damages Agility sales pipeline and investor confidence.
        - id: customer-loss
          label: Customer Departure or Contract Breach
          detail: GXO, Amazon, or other customers cite safety incident as grounds for contract termination or scope reduction.
        - id: manufacturing-gap
          label: Manufacturing Ramp Failure
          detail: RoboFab unable to achieve production scale; current 100 units versus 10,000-unit design capacity.
        - id: delivery-delay
          label: Order Delivery Delays
          detail: Commercial customers receive Digit units months or years behind contractual schedule commitments.
        - id: customer-churn
          label: Customer Churn and Order Cancellation
          detail: Customers unable to meet internal ROI targets due to delivery delays cancel or reduce pending orders.
        - id: competitor-scale
          label: Competitor Scaling Ahead of Agility
          detail: A competing humanoid robot achieves commercial scale, superior specs, or cooperative certification first.
        - id: price-war
          label: RaaS Price War and Margin Compression
          detail: Competitive pressure forces RaaS price reductions, compressing contribution margin and delaying breakeven.
        - id: talent-war
          label: AI and Robotics Talent Competition Escalates
          detail: Competitors raise compensation for key AI engineers; Agility faces accelerating attrition pressure.
        - id: key-person-loss
          label: Key Person Departure from Leadership
          detail: Loss of Shelton, Hurst, or critical engineering team members disrupts execution and investor confidence.
        - id: capital-depletion
          label: Capital Runway Compression
          detail: >-
            Revenue shortfall plus manufacturing investment plus talent costs deplete Series C runway faster than
            modeled.
        - id: runway-end
          label: Forced Fundraise at Distressed Valuation
          detail: Capital depletion forces a down-round or distressed fundraise before commercial milestones are achieved.
        - id: acquisition-pressure
          label: Forced Acquisition or Strategic Sale
          detail: Capital exhaustion or investor pressure triggers a strategic sale at below-intrinsic-value terms.
      edges:
        - from: safety-incident
          to: regulatory-action
          detail: OSHA General Duty Clause requires investigation of serious injuries involving powered industrial equipment.
        - from: safety-incident
          to: media-fallout
          detail: >-
            Humanoid robot workplace injuries are high-visibility news events amplified by strong press interest in the
            sector.
        - from: regulatory-action
          to: deployment-ban
          detail: OSHA citation or abatement order could mandate suspension of Digit operations until hazard is remediated.
        - from: media-fallout
          to: customer-loss
          detail: Negative press coverage triggers risk-averse procurement decisions at enterprise customers evaluating Digit.
        - from: deployment-ban
          to: customer-loss
          detail: Regulatory deployment suspension directly terminates or suspends active commercial RaaS agreements.
        - from: manufacturing-gap
          to: delivery-delay
          detail: Production rate below order rate results in extended lead times for new commercial customer orders.
        - from: delivery-delay
          to: customer-churn
          detail: Enterprise customers with fixed deployment timelines cancel or reduce orders when delivery dates slip.
        - from: competitor-scale
          to: price-war
          detail: A competitor achieving cost-competitive production forces downward pressure on Agility RaaS pricing.
        - from: competitor-scale
          to: talent-war
          detail: Well-funded competitors with commercial traction attract the same AI and robotics engineering talent pool.
        - from: talent-war
          to: key-person-loss
          detail: Sustained compensation gap with competitors results in departures from engineering and leadership roles.
        - from: customer-loss
          to: capital-depletion
          detail: Loss of RaaS revenue contracts reduces expected cash inflows and accelerates runway depletion timeline.
        - from: manufacturing-gap
          to: capital-depletion
          detail: Manufacturing investment at current low utilization creates high fixed cost with low revenue coverage ratio.
        - from: price-war
          to: capital-depletion
          detail: Margin compression on RaaS contracts reduces contribution per robot and worsens unit economics materially.
        - from: capital-depletion
          to: runway-end
          detail: Burn rate versus cash balance determines runway; negative variance forces early emergency fundraise.
        - from: runway-end
          to: acquisition-pressure
          detail: Distressed fundraise fails or terms are unacceptable; strategic sale becomes the only viable exit path.
