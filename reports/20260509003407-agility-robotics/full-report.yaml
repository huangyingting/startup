              - CO009
          - type: callout
            title: Amazon Investor-Customer Duality Creates Alignment and Concentration Risk
            body: >
              Amazon's dual role as a Series B/C investor and primary enterprise deployment customer creates strong
              near-term alignment but also significant customer concentration risk. Any deterioration in the Amazon
              relationship—through a competing internal robotics initiative or commercial dispute—could simultaneously
              affect revenue, investor sentiment, and technical roadmap priorities.
            calloutType: insight
            claimRefs:
