  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: |
              Agility Robotics targets a narrow, high-value slice of the warehouse and logistics
              market: contract logistics operators (3PLs) and large enterprise shippers who operate
              high-volume, structured fulfillment environments. The primary buyer persona is a VP of
              Operations or Chief Supply Chain Officer at a Tier-1 or Tier-2 3PL or omnichannel
              retailer seeking to offset 30–40% annual warehouse labor turnover and rising wage
              pressure. The user is the warehouse floor operator; the payer is the logistics business
              unit deploying RaaS budget. Secondary segments include e-commerce pure-plays and
              automotive parts distributors who share the same structured, repetitive task profile.

              Digit is purpose-built for tasks with three defining characteristics: structured
              physical environments (aisles, conveyors, defined pick/place stations), high repetition
              at moderate payload (totes up to 35 lbs), and spatial constraints that make large
              wheeled automation infeasible. This narrows the addressable customer base relative to
              general-purpose humanoids but increases task success rates and deployment confidence
              for named accounts. Agility explicitly avoids unstructured or variable environments in
              current commercial pitches, limiting its footprint to mid-to-large distribution centers
              (DCs) with defined conveyor infrastructure.

              Revenue and strategic value differ sharply by segment. A 3PL DC running 24/7 operations
              can generate $120K–$180K/robot/year under RaaS, with fleet deployments of 5–50 units
              creating $600K–$9M annual contract value per site. For large e-commerce operators like
              Amazon, the strategic value of co-development and pilot access to the emerging labor
              substitution platform may exceed immediate financial returns—explaining Amazon's
              Industrial Innovation Fund position without requiring Amazon to be a major revenue
              contributor at this stage.
