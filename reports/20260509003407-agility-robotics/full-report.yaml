      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: First-Mover in Commercial Humanoid Deployment
            body: >
              Agility Robotics is the only humanoid robotics company with confirmed multi-year commercial RaaS
              deployments at named enterprise customers (GXO Logistics, Amazon). The 100,000-tote milestone at GXO's
              Flowery Branch facility (November 2025) provides documented proof of industrial throughput at scale—a
              differentiator versus competitors still in pilot or demo phases.
            calloutType: strength
            claimRefs:
              - CO022
              - CO030
          - type: callout
            title: Key-Person Dependency on Founders and New CEO
            body: >
              The company depends on co-founders Hurst (technical IP) and Shelton (commercial vision), plus a recently
              joined CEO (Johnson, March 2024) with no prior robotics operating experience. A second leadership
              transition during the critical commercialization phase would pose meaningful execution risk.
            calloutType: risk
            claimRefs:
