      - number: '2.5'
        title: Adoption Constraints and Market Risks
        blocks:
          - type: paragraph
            body: |
              Several structural constraints limit near-term humanoid robot adoption in logistics.
              Constraint 1—Unit economics: At $10,000–$15,000/month per Digit unit (RaaS), the
              breakeven vs. human labor (at ~$22–28/hr fully loaded) requires the robot to operate
              at near-continuous utilization with minimal downtime. Hardware reliability and servicing
              costs in early commercial deployments remain uncertain. Interact Analysis estimates that
              actual market penetration for humanoid robots in logistics remains very limited through
              2027, with meaningful scale after 2028. Constraint 2—Integration complexity: Warehouse
              management system (WMS) integration, safety certification, facility mapping, and worker
              co-existence protocols require 3–6 months of onboarding and significant technical resources.
              Constraint 3—Safety and regulation: As of 2025–2026, all Digit deployments operate in
              caged or segregated zones because the robot lacks full cooperative safety certification for
              unrestricted human co-working environments. Achieving "cooperatively safe" status is a
              necessary precondition for most large-scale deployments. Constraint 4—Technology
              concentration and switching cost: Early multi-year RaaS contracts lock operators into
              platform-specific technology, creating switching costs that may favor incumbents (Agility)
              but may also deter adoption when technology is perceived as immature. Constraint 5—
              Competitive intensity: Well-capitalized competitors (Tesla Optimus, Figure AI, Boston
              Dynamics, 1X Technologies) are developing competing platforms, which may erode Agility's
              first-mover advantage through lower pricing or superior capabilities.
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
          - type: figure
            figureRef: FM004
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural Labor Shortage Is the Core Demand Catalyst
            body: >
              US warehouse and logistics employment has faced structural shortages for multiple years, with open
              positions exceeding 500,000 at wages above $20/hr in 2024–2025. This demand signal—driven by demographic
              shifts and e-commerce growth—creates a durable, non-cyclical pull for humanoid automation that is largely
              independent of individual technology players.
            calloutType: insight
            claimRefs:
              - CM016
              - CM017
          - type: callout
            title: Analyst Forecasts Are Highly Divergent and Should Be Treated with Caution
            body: >
              Humanoid robot market forecasts range from $1.9B to $2.9B for 2025 and from $11B to $15.3B for 2030 across
              leading analysts, implying a 50%+ spread on 2030 estimates. This divergence reflects deep uncertainty
              about the pace of safety certification, technology readiness, and enterprise adoption—risks that could
              significantly compress Agility's addressable market below consensus projections.
            calloutType: risk
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: callout
            title: Cooperative Safety Certification Is a Critical Market Unlock
            body: >
              All current Digit deployments operate in safety-caged environments. Achieving "cooperatively safe"
              certification—enabling Digit to work side-by-side with human workers without barriers—is the single most
              important near-term prerequisite for large-scale adoption and is targeted by Agility for late 2026 to
              2027.
            calloutType: assumption
            claimRefs:
              - CM023
              - CM025
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Agility Robotics competes in the nascent commercial humanoid robotics market, where
              six meaningful competitors have emerged across a spectrum of funding scales, technical
              approaches, and commercial ambitions. The landscape divides into three tiers. First,
              well-funded near-term competitors targeting the same logistics and manufacturing
              verticals: Figure AI (valuation $39B, Sept 2025), Apptronik Apollo (~$5B valuation,
              Samsung investment), and 1X Technologies NEO ($10B sought, backed by OpenAI). Second,
              platform-scale incumbents with adjacent technology strengths: Tesla Optimus (backed by
              Tesla's vertically integrated manufacturing and FSD AI stack) and Boston Dynamics
              Atlas (owned by Hyundai Motor Group with 56 DOF and IP67 rating). Third, low-cost
              Chinese entrants: Unitree G1 ($16K starting price) capable of eroding the research
              and pilot segment. The critical distinguishing fact is that Agility is the only
              competitor with publicly documented, multi-year, commercial-scale RaaS deployments
              as of mid-2026. This deployment lead provides operational data, customer references,
              and workflow integration lock-in that competitors have not yet replicated. However,
              the commercial window is finite: Figure AI, Apptronik, and 1X are all targeting
              commercial production by 2026–2027, and Tesla has signaled that Optimus may become
              externally available in the 2026–2027 timeframe. The competitive moat Agility has
              built is real but time-bounded, and defensibility depends heavily on execution
              velocity in customer acquisition, production ramp, and AI capability advancement.
            claimRefs:
              - CP001
              - CP004
