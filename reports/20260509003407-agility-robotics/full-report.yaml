              - CV011
              - CV012
              - CV013
      - number: '8.3'
        title: Comparable Companies and Market Benchmarks
        blocks:
          - type: paragraph
            body: |
              No direct public company comparable exists for a pre-revenue humanoid robotics company.
              The most useful comps span three categories: humanoid robotics private rounds, adjacent
              industrial automation companies, and strategic M&A precedents.

              In humanoid robotics private rounds, Figure AI is the most relevant peer. Figure AI
              raised $675M in a February 2024 round at a $2.6B post-money valuation, backed by
              Microsoft, Bezos Expeditions, and Intel Capital. Its BMW factory pilot and OpenAI
              integration suggest a different GTM (automotive/general-purpose vs. Agility's
              logistics-specific). Apptronik raised $350M from Samsung and others at an undisclosed
              valuation in 2024. 1X Technologies raised $100M at approximately $400M valuation in
              2024 with OpenAI backing. Tesla Optimus is not independently valued but benefits from
              Gigafactory manufacturing integration. The peer range implies pre-revenue humanoid
              robots are valued at $400M–$2.6B depending on manufacturing proof, strategic backing,
              and partner ecosystem depth. Agility at $1.75B sits in the upper tier of this range,
              justified by its commercial production milestone but stretched relative to peers without
              publicly disclosed revenue.

              In industrial automation, Zebra Technologies (industrial mobile robots, approximately
              $15B), Cognex (machine vision, approximately $8B), and Teradyne (collaborative robots,
              approximately $4B) trade at 5–8x forward revenue. These are inappropriate as direct
              multiples but establish the exit range for Agility if it can achieve $250M–$500M ARR.
              The Boston Dynamics precedent is instructive: Hyundai acquired Boston Dynamics from
              SoftBank in 2021 at $1.1B—a discount to development cost but consistent with
              pre-revenue robotics strategic M&A. A logistics-automation strategic acquirer with a
              strategic premium could value Agility at $3B–$5B+ if RoboFab reaches 3,000-5,000+
              annual units with multi-customer RaaS proof.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs:
              - CV010
              - CV011
              - CV012
              - CV013
          - type: figure
            figureRef: FV003
            claimRefs:
