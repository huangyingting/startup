      - number: '4.2'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Agility Robotics has raised approximately $641M in total funding across multiple rounds,
              culminating in a $400M Series C in March 2025 led by WP Global Partners with participation
              from SoftBank Group, the Amazon Industrial Innovation Fund, and NVIDIA's NVentures. The
              Series C established a pre-money valuation of approximately $1.75B and a post-money
              valuation near $2.1B. The prior Series B ($150M, 2022) was anchored by the Amazon
              Industrial Innovation Fund alongside DCVC and Playground Global. Earlier capital
              included a Ford Motor Company investment (~$6M, ~2020) and an undisclosed Amazon
              Industrial Innovation Fund seed stake (2021). The investor base is notable for combining
              strategic operator-customers (Amazon), large generalist funds (SoftBank, WP Global),
              deep-tech specialists (DCVC, Playground Global), and semiconductor partners (NVIDIA).
              No publicly filed debt instruments, credit facilities, or project-finance arrangements
              have been identified. The company does not appear to have issued convertible notes or
              revenue-based financing. Board composition and governance terms from the Series C—including
              liquidation preferences, anti-dilution provisions, and pro-rata rights—have not been
              disclosed publicly. The Series D threshold has not been announced; the company is expected
              to pursue either a Series D or a pre-IPO round if unit economics do not reach a
              commercially self-sustaining threshold by approximately 2027. Capital structure
              information should be verified against the Series C term sheet and shareholder agreement
              in any formal transaction.
