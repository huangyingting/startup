  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: |
              Agility Robotics is the most commercially advanced bipedal humanoid robotics company
              as of early 2026. Its investment thesis rests on five mutually reinforcing pillars.
              First, the company has achieved what no rival has: a named enterprise customer (GXO
              Logistics) running a commercial RaaS contract in sustained multi-month production,
              moving over 100,000 totes at the SPANX fulfillment center. Second, it has secured
              Amazon as a strategic investor and pilot partner—providing both capital and access to
              the world's largest warehouse operator. Third, RoboFab, its purpose-built manufacturing
              facility in Salem, Oregon, represents a $70M capital commitment to a scalable production
              infrastructure targeting 10,000 units per year, which would make Agility the first
              humanoid manufacturer at meaningful industrial scale. Fourth, the company's bipedal
              locomotion IP, developed over a decade at Oregon State University, provides a defensible
              moat in the hardest engineering problem in humanoid robotics. Fifth, the $400M Series C
              provided 24-36 months of operating runway, reducing near-term financing risk.

              The anti-thesis is equally clear. Agility's current revenue base is thin: with one
              named production customer and an estimated sub-$10M ARR, the $1.75B valuation implies
              a revenue multiple of 150x or more—only defensible if the RaaS scaling model proves
              out with high unit economics. Figure AI has raised at a $2.6B valuation with backing
              from Microsoft, OpenAI, and others, and its Helix general-purpose AI model may allow
              faster broad-market penetration. Tesla Optimus is being manufactured at Tesla's existing
              gigafactories at potential cost advantages that Agility cannot match. Unitree G1 enters
              the market at $16,000 per unit—three orders of magnitude cheaper than Digit's implied
              RaaS cost basis—targeting developer and research markets that could establish platform
              lock-in before enterprise markets mature. Supply chain concentration in specialty
              actuators creates production risk at scale. The labor displacement narrative that drives
              Agility's market has a political risk dimension: union opposition, automation taxation
              proposals, and OSHA site-by-site approval requirements could slow enterprise adoption.
