companyProfile:
  summary: >
    Agility Robotics is a Tangent, Oregon-based robotics company that designs, manufactures, and deploys Digit — a
    bipedal humanoid robot purpose-built for logistics and warehouse tasks. Founded in 2015 as a spinout from Oregon
    State University, Agility pioneered the cassowary-inspired biomimetic leg design that gives Digit its distinctive
    energy-efficient gait. The company achieved a critical industry milestone in June 2024 when it signed the world's
    first multi-year commercial Robot-as-a-Service (RaaS) agreement for a humanoid robot with GXO Logistics. By November
    2025, Digit surpassed 100,000 totes moved in live commercial deployment at GXO's Flowery Branch, Georgia fulfillment
    center — validating the technology as production-grade rather than showcase-only. Agility raised $400 million in
    Series C funding in March 2025 at a $2.1 billion post-money valuation, backed by WP Global Partners, SoftBank,
    Amazon Industrial Innovation Fund, and NVIDIA's NVentures. The company is building out RoboFab, a 70,000-square-foot
    manufacturing facility in Salem, Oregon, targeting 10,000 units per year capacity.
  foundedDate: '2015-01-01'
  founders:
    - name: Jonathan Hurst
      role: Co-founder, Chief Robot Officer
      background: OSU robotics professor; invented the Cassie bipedal platform that became Digit's foundation.
      claimRefs:
        - CO007
    - name: Damion Shelton
      role: Co-founder, President & Chairman
      background: Serial robotics entrepreneur; drives commercial and strategic direction alongside CEO.
