  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: |
              Agility Robotics competes in the humanoid robotics market—specifically the logistics and
              warehouse automation subsegment. The company's product, Digit, is designed to perform
              physically repetitive tasks in human-scale environments: moving totes, loading conveyors,
              stacking containers, and supporting last-meter fulfillment workflows. This places Agility
              at the intersection of two broader markets: (1) the global humanoid robot market, and
              (2) the broader warehouse automation market. The warehouse automation market—defined as
              all hardware and software deployed to automate storage, sorting, picking, packing, and
              transport within fulfillment facilities—is estimated at approximately $29.9B in 2025 by
              ResearchAndMarkets, growing to $63.4B by 2030 at 16.2% CAGR. Within this, logistics
              robotics hardware (AMRs, AGVs, humanoids, picking arms) represents a $14.5B segment in
              2024 per Grand View Research. The humanoid robot market specifically—the more relevant
              competitive boundary for Digit—is estimated at ~$2.9B globally in 2025 by MarketsandMarkets,
              growing to ~$15.3B by 2030 at 39.2% CAGR. Key substitutes and adjacencies include:
              Autonomous Mobile Robots (AMRs), robotic picking arms, fixed conveyor systems, traditional
              staffing agencies, and outsourced warehouse labor. Humanoid robots differentiate from
              these by their ability to operate in unstructured, human-designed environments without
              facility redesign—a key selling point for customers unable to afford or justify redesigning
              existing warehouse layouts.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
