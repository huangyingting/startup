  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Business Model and Revenue Architecture
        blocks:
          - type: paragraph
            body: |
              Agility Robotics operates a hybrid revenue model combining recurring subscription income,
              one-time hardware sales, and nascent software platform revenue. The primary channel is
              Robots-as-a-Service (RaaS), under which enterprise customers pay an estimated $10,000 to
              $15,000 per robot per month, bundling hardware access, maintenance, software updates, and
              fleet management support through the Agility Arc platform. This subscription structure is
              designed to convert capital expenditure decisions into operating expenditure for logistics
              operators, lowering the adoption barrier for large-scale deployments. The company's stated
              long-term target is $30 per robot-hour—comparable to fully-loaded human labor costs in US
              warehouse environments—positioning RaaS economics as a direct labor substitution play. A
              second revenue stream is direct hardware sales at approximately $150,000 per Digit unit,
              which likely serves customers preferring asset ownership or research procurement. Third, the
              Arc cloud platform provides fleet orchestration and warehouse management system integration;
              pricing for Arc standalone subscriptions has not been publicly disclosed. Revenue mix across
              these three streams is unknown due to the company's private status. Third-party revenue
              estimates range from $10M to $80M annually for 2025, with the most-cited midpoint near
              $35M (Growjo). The company has not disclosed official revenue figures or audited financial
              statements. Revenue recognition methodology—specifically, how RaaS hardware components are
              treated under ASC 606 or IFRS 15—has not been publicly described and warrants due-diligence
              scrutiny before any transaction.
