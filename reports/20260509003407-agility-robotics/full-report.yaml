      - number: '2.2'
        title: TAM, SAM, and SOM Sizing
        blocks:
          - type: paragraph
            body: |
              The TAM for humanoid robots in logistics is best understood through three sizing lenses.
              Lens 1 (Top-down humanoid market): Global humanoid robot market estimated at $2.9B in 2025
              (MarketsandMarkets), with logistics/warehousing being one of the two primary verticals. If
              logistics represents 20–30% of humanoid robot spending, the logistics-specific humanoid TAM
              is $580M–$870M in 2025, growing to $2.3B–$4.6B by 2030. Lens 2 (Labor displacement lens):
              The US warehouse labor market employs approximately 1.8M workers with fully-loaded costs of
              ~$42K–$55K per worker per year, creating a ~$75B–$99B annual labor spend. Even a 5%
              displacement by humanoid robots by 2030 implies a $3.7B–$5.0B annual market opportunity.
              Lens 3 (Warehouse automation bottom-up): Within the $29.9B warehouse automation TAM in
              2025, humanoid robots represent approximately 3–5% of current spend but are expected to
              grow to 10–15% of a $63.4B market by 2030, implying a $6.3B–$9.5B humanoid warehouse
              automation opportunity by decade end. Agility's SAM in 2025 is materially smaller:
              third-party logistics (3PL) and large e-commerce fulfillment operators in the US and
              Western Europe with ≥250,000 sq ft facility footprints willing to sign multi-year RaaS
              contracts. This SAM is estimated at $800M–$1.5B in 2025. Agility's SOM in 2025—constrained
              by production capacity (hundreds to low thousands of units) and active sales pipeline—is
              likely $20M–$100M based on disclosed deployments and estimated RaaS contract values.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
          - type: table
            tableRef: TM002
            claimRefs:
              - CM005
              - CM006
              - CM007
