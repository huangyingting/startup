        - id: hardware-layer
          label: Hardware Platform (Digit)
          detail: >-
            Biomimetic bipedal, 175 cm / 65 kg; 16 kg payload; 4+ hr battery; 3D LiDAR; stereo RGB cameras; dual Intel
            i7 onboard compute; modular payload bay; ~6,000 parts; ~80% US-sourced.
        - id: integration-layer
          label: Integration & Peripheral Components
          detail: >-
            AMR dispatch (MiR, Zebra via Arc API); WMS/WES webhook APIs; NVIDIA Jetson / Intel NUC payload bay;
            task-optimized end effectors; autonomous charging dock infrastructure.
        - id: connectivity-layer
          label: Connectivity & Remote Operations
          detail: >-
            WiFi and 4G cellular telemetry; Arc remote shutdown; real-time fleet dashboards; remote E-stop; diagnostic
            streaming to operations center.
  - id: FE002
    title: Customer Workflow / Operating Flow
    type: flow
    layout: standard
    summary: >
      End-to-end customer workflow showing how a warehouse operator deploys Digit through the Arc platform from task
      assignment in the WMS through robot execution to reporting.
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE032
    data:
      nodes:
        - id: wms-order
          label: WMS Issues Task Order
          detail: >-
            Warehouse management system creates a tote-handling or transport task; dispatches to Arc via webhook or API
            call.
        - id: arc-assign
          label: Arc Platform Assigns Task
          detail: >-
            Arc fleet management layer receives task, identifies available Digit unit, checks battery level and
            proximity; assigns task to optimal robot.
        - id: amr-check
          label: Arc Optionally Dispatches AMR
          detail: If task involves AMR loading/unloading, Arc simultaneously dispatches MiR or Zebra AMR to rendezvous point.
        - id: digit-navigate
          label: Digit Navigates to Work Area
          detail: >-
            Digit uses 3D LiDAR and stereo vision to autonomously navigate warehouse aisles to designated pick/place
            station; avoids obstacles in real time.
        - id: digit-execute
          label: Digit Executes Manipulation Task
          detail: >-
            Digit uses RL-based grasping to pick tote from conveyor or AMR; places tote at target location using
            task-optimized end effector.
        - id: arc-monitor
          label: Arc Monitors and Logs
          detail: >-
            Arc records task completion, cycle time, any errors or safety events; streams telemetry to remote operations
            dashboard.
        - id: digit-dock
          label: Digit Returns to Dock (Low Battery)
          detail: >-
            When battery falls below threshold, Digit autonomously navigates to charging dock without human
            intervention.
        - id: wms-report
          label: WMS Receives Completion Report
          detail: >-
            Arc pushes task completion confirmation back to WMS; updates inventory or sortation records; closes the work
            order loop.
