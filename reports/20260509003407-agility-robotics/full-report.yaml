      - number: '7.5'
        title: Risk Mitigation and Monitoring
        blocks:
          - type: paragraph
            body: |
              Agility Robotics has implemented early-stage mitigations across its primary risk categories, but most
              mitigations remain pre-commercial and unvalidated at scale. For regulatory and safety risk, the
              cage-segregated deployment approach and ISO 10218-compliant safety architecture represent appropriate
              near-term mitigations. Achieving ISO/TS 15066 cooperative safety certification in 2026 or 2027 would
              materially reduce the regulatory surface area and unlock broader facility deployment configurations.
              For operational risk, Arc's real-time remote E-stop capability and fleet monitoring provide partial
              cybersecurity mitigation, but the absence of published SOC 2 certification and security disclosure
              program is a monitoring gap. Dual-source component qualification and US domestic supplier preference
              provide partial supply chain resilience.

              Investor-level risk monitoring should track five threshold events representing thesis-break triggers:
              first, any OSHA-reportable incident involving Digit at a customer site; second, GXO contract
              non-renewal or scope reduction; third, Amazon in-house humanoid robot announcement or Digit phase-out;
              fourth, cooperative safety certification slip beyond Q4 2027; and fifth, departure of Damion Shelton
              or Jonathan Hurst from executive or advisory roles. These events, individually or in combination,
              would require material reassessment of the investment thesis. Positive monitoring indicators that
              reduce risk include the number of signed multi-year RaaS contracts targeting three or more by end of
              2026, monthly Digit units deployed in commercial settings targeting 200 or more by end of 2026, and
              progress milestones toward cooperative certification including named certification body and independent
              audit commencement. Risk management frameworks from academic and practitioner literature suggest that
              humanoid robot deployments at this stage should incorporate quarterly operational KPI reviews,
              independent safety audits, and pre-negotiated contract escalation clauses for material regulatory
              changes. Agility's current public disclosures do not confirm the presence of these mechanisms and
              they represent diligence asks for any formal investment process.
