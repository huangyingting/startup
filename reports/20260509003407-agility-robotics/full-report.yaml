      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Customer concentration risk is material. GXO Logistics is the only publicly confirmed
              production customer, meaning that a decision by GXO not to renew or expand its
              deployment would substantially impair Agility's commercial credibility and near-term
              revenue. Amazon's involvement is financially and strategically significant but is an
              investor-and-pilot relationship rather than a confirmed production revenue source.
              If Amazon decided to leverage its own robotics capabilities or to deploy a competing
              humanoid platform (Boston Dynamics Spot, Figure AI, 1X Technologies), the downstream
              impact on Agility's market positioning could be severe.

              Expansion drivers are credible but execution-dependent. The land-and-expand model—
              deploying at one site within a large 3PL's network, then rolling out to additional
              facilities—is the primary growth path. GXO operates hundreds of DCs globally; even
              10–20 additional GXO sites at 5–10 robots each would represent a 10–20x deployment
              expansion from the current inferred base. Expansion to GEODIS, Amazon, and new
              Partner Program entrants follows the same pattern. The bottleneck is deployment
              cycle time (OSHA approvals, facility modification, WMS integration), not demand.

              Revenue concentration risk is compounded by the RaaS model: while multi-year contracts
              reduce quarter-to-quarter volatility, contract non-renewal at a major account represents
              a step-down in revenue rather than a gradual decline. Diligence should seek confirmation
              of GXO's contract renewal intent, pipeline of accounts in active deployment (not just
              Partner Program intake), and whether any pilots have been terminated or converted to
              "no decision."
