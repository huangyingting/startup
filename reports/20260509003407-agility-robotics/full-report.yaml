  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: |
              Agility Robotics operates in a rapidly evolving regulatory environment spanning workplace safety
              standards, AI governance frameworks, labor law, intellectual property, and export controls. The most
              immediate regulatory exposure is OSHA compliance for robot deployment in commercial warehouses. Under
              the General Duty Clause and OSHA 1910.212 machine guarding standards, employers deploying Digit must
              ensure adequate guarding and hazard elimination. All current Digit deployments use cage-segregated
              configurations satisfying ISO 10218-1/2 industrial robot safety norms. However, the targeted
              transition to cooperative uncaged operation under ISO/TS 15066 would require a substantially different
              risk assessment framework, new OSHA compliance documentation, and potential renegotiation of customer
              deployment agreements. Any workplace incident before cooperative certification could result in OSHA
              citations, media fallout, and customer departure, creating a threshold risk for the company's
              commercial trajectory.

              The EU AI Act, effective August 2024, classifies AI systems deployed in safety-critical workplace
              contexts as high-risk, imposing conformity assessment, technical documentation, human oversight, and
              transparency requirements. Humanoid robots operating in shared warehouse environments could fall under
              Annex III high-risk categories. US executive orders on AI safety and emerging bipartisan robotics
              legislation signal increasing federal scrutiny. Japan, the UK, South Korea, and the EU are developing
              distinct regulatory frameworks for autonomous systems, creating a fragmented compliance landscape for
              Agility's planned international expansion.

              IP risk is moderate but real. Tesla, Boston Dynamics, Figure AI, and Apptronik have filed substantial
              patent portfolios covering bipedal locomotion, manipulation, and fleet management. As Digit deployments
              scale and Agility's commercial profile rises, the probability of patent infringement claims increases.
              Export controls administered by the US Bureau of Industry and Security apply to advanced robotics
              technology; Agility's 80% US component sourcing provides some insulation, but 20% international
              component exposure and the dual-use potential of Digit's AI systems create export license risk.
              Proposed robot tax legislation in multiple US states and the EU could increase total cost of ownership
              for Digit customers, dampening demand growth.
            claimRefs:
