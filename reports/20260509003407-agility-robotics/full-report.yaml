  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: wide
    summary: >
      A layered view of the Agility Robotics product stack, from cloud orchestration through AI/perception, safety and
      control, and the underlying Digit hardware platform, with key integration and component items at each layer.
    claimRefs:
      - CE009
      - CE011
      - CE014
      - CE033
    data:
      layers:
        - id: cloud-layer
          label: Cloud Platform (Arc)
          detail: >-
            Fleet management, WMS/WES/MES/PLC integration via webhooks and custom APIs, remote diagnostics, AMR dispatch
            (MiR, Zebra Technologies), safety fleet monitoring, remote shutdown.
        - id: ai-layer
          label: AI / Perception Layer
          detail: >-
            Onboard reinforcement learning for grasping; 3D LiDAR + stereo RGB camera fusion; neural inference for path
            planning and obstacle avoidance; task context from sensor streams.
        - id: control-layer
          label: Safety & Control Layer
          detail: >-
            Safety PLC with IEC 61508 compliance; FSoE CAT1 emergency stop; EtherCAT real-time fieldbus; on-robot and
