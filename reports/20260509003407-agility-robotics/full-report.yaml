              - CV014
              - CV015
      - number: '8.4'
        title: Scenarios and Return Analysis
        blocks:
          - type: paragraph
            body: |
              Three scenarios govern Agility's valuation trajectory over the 2025–2030 investment
              horizon. The bull case assumes RoboFab reaches 5,000+ annual units by 2027, with 5+
              named production customers, ARR exceeding $300M by 2028, and an IPO or strategic M&A
              at 10–15x ARR yielding $3B–$5B enterprise value. Investor returns from Series C entry
              would be approximately 2–3x in 3–4 years before dilution. The base case assumes
              RoboFab produces 1,500–2,500 units by 2027, with 2–3 named production customers, ARR
              of $150M–$250M by 2028, and an M&A exit at $1.5B–$2.5B. Series C returns would be
              approximately 0.9–1.4x—marginal at Series C price. The bear case involves RoboFab
              production delays beyond 2028, customer churn at GXO, OSHA-driven deployment
              restrictions, and inability to raise a Series D at Series C price, yielding a
              down-round at $700M–$1.0B or forced M&A at distressed valuation. Series C returns in
              this scenario would be 0.4–0.6x, with preference stack protecting institutional
              investors but devastating common equity.

              The downside scenario is not tail risk: three of the six thesis-break triggers
              (RoboFab delay, second customer addition, OSHA approval generalization) are observable
              within 18 months. Active investors should define monitoring dashboards around these
              milestones and establish price discipline at Series D entry. The probability
              distribution is approximately 30% bull, 45% base, 25% bear as of Q1 2026.
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
      - number: '8.5'
        title: Recommendation, Exit Readiness, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: |
              The recommended posture is TRACK with a conditional buy trigger. At Series C price
              ($1.75B implied), the risk/reward is unattractive for most institutional LP mandates:
              the base case return is 1.0–1.4x over 3 years, and the bear case represents material
              capital loss. However, for investors with strategic robotics-infrastructure mandates,
              a long hold horizon (5–7 years), or co-investment access alongside ARCH/NEA at Series
              C price, the bull case upside ($3B–$5B exit, 2–3x) justifies the position size.

              Exit readiness is moderate. Strategic acquirers are actively evaluating the humanoid
              robotics space: Amazon's right-of-first-refusal provisions are typical for strategic
              investors of this type, Toyota's Woven Planet division has expressed interest in
              bipedal robotics partnerships, and Hyundai demonstrated willingness to pay $1.1B for
              Boston Dynamics in a pre-commercial state. A $2B–$3.5B strategic M&A exit is
              achievable in 2026–2028 if RoboFab delivers at 2,000+ unit/year capacity and a second
              named production customer is signed. IPO readiness requires $200M+ ARR and positive
              gross margin—likely 2028–2030 at earliest under the base case.

              The five critical diligence gaps before upgrading to BUY are: confirmation of GXO
              contract renewal beyond initial term; RoboFab production rate validation from a
              third-party operations audit; a second named production customer agreement; disclosure
              of Series C preference stack and liquidation waterfall; and evidence that gross margin
              is trending toward breakeven at current fleet sizes.
            claimRefs: []
          - type: table
            tableRef: TV005
            claimRefs:
              - CV019
              - CV020
              - CV021
