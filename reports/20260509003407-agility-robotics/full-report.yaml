      - number: '4.3'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: |
              Digit's unit economics are in an early-stage, pre-breakeven phase typical of first-
              generation hardware-as-a-service businesses. The estimated bill-of-materials and assembly
              cost (COGS) per Digit unit is approximately $80,000–$100,000 at current production volumes,
              implying a gross margin of roughly 30–40% on the direct-sale ASP of ~$150,000. This
              estimate is derived from analogous industrial robot manufacturers and third-party component
              cost analyses; Agility has not disclosed actual COGS figures. For the RaaS model, the
              fully-loaded operating cost per robot-hour—incorporating power consumption, scheduled
              maintenance, software licensing, and amortized capital cost—is estimated at $10–$12 per
              hour. Against the current RaaS billing rate of approximately $14–$17 per hour (implied by
              $10K–$15K monthly divided by typical operational hours), the gross margin is negative to
              slightly positive. The company's publicly stated target of $30/hr reflects both an ambition
              to match human labor costs and, at scale, to generate meaningful operating leverage as
              hardware COGS falls with manufacturing volume and software costs amortize over a larger
              fleet. Management has cited a target gross margin of 60%+ at mature scale, consistent with
              robotics-as-a-service businesses that follow the software margin model. RoboFab's 70,000
              sq ft facility targets 10,000 units per year; at scale, COGS compression via increased
              component volumes, manufacturing yield improvement, and design-for-manufacture iteration
              is expected to drive margin expansion. No customer-specific payback or ROI data has been
              publicly shared, though at $30/hr versus typical US warehouse labor at $25–$35/hr all-in,
              customers could theoretically reach break-even within 12–24 months at full utilization.
