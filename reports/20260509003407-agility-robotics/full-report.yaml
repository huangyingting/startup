      - number: '6.3'
        title: Adoption Trajectory and Commercial Momentum
        blocks:
          - type: paragraph
            body: |
              The 100,000-tote milestone at GXO is the most concrete public adoption metric available.
              Agility has not disclosed the number of Digit units deployed at the GXO SPANX site, the
              cycle time per tote, or the uptime percentage—metrics that would allow estimation of
              fleet size and throughput efficiency. Industry estimates place the deployment at
              approximately 4–8 Digit units based on reported tote volumes and operating hours, but
              these are inferred, not confirmed.

              The multi-year RaaS agreement structure is a strong retention and revenue signal: unlike
              hardware sales, multi-year subscriptions create recurring revenue and contractual lock-in,
              reducing churn risk for the contract term. Agility's Partner Program—open to qualified
              enterprise accounts with a defined intake, pilot, and production pathway—creates a
              structured commercial pipeline. Amazon and GEODIS are the only publicly named Partner
              Program participants beyond GXO.

              Adoption is constrained by three factors: (1) deployment complexity requiring OSHA
              site-specific approval, facility modification (cage infrastructure, charging stations,
              sensor markers), and WMS/Arc API integration, each adding 3–9 months to time-to-revenue;
              (2) production capacity at RoboFab, currently ramping toward 10,000 units/year from a
              much lower base, limiting how many accounts can be served simultaneously; and (3)
              competitive evaluation cycles in which customers test multiple humanoid platforms before
              committing. The OSHA NRTL approval obtained at GXO SPANX is site-specific and must be
              repeated at each new facility, creating a regulatory bottleneck for rapid expansion.

              On the positive side, warehouse labor market dynamics strongly favor adoption: US
              warehouse and material-moving labor averages $18–$22/hour fully-loaded, with 30–40%
              annual turnover generating $2,000–$5,000 per-hire recruiting and training costs. At
              $10K–$15K/robot/month RaaS, the ROI case requires ~1.5–2.0 FTE equivalents per robot
              per shift to break even, a threshold achievable in high-throughput DCs.
