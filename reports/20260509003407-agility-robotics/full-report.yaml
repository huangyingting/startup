      - number: '5.2'
        title: Locomotion Research Basis and AI Perception Technology
        blocks:
          - type: paragraph
            body: |
              Digit's locomotion architecture traces its lineage to the Cassie bipedal robot developed at
              Oregon State University starting in 2015, representing some of the most rigorous academic
              work in energy-efficient legged locomotion. The biomimetic design prioritizes dynamic
              stability over quasi-static balance, allowing Digit to handle ground disturbances and
              recover from perturbations more robustly than statically-stable designs. The leg geometry,
              inspired by the cassowary's joint configuration, achieves passive energy return during
              walking, reducing actuator demand and extending battery life. Agility employs reinforcement
              learning for grasping and manipulation tasks, training onboard AI models to generalize across
              tote geometries and varying conveyor heights. The perception pipeline processes 3D LiDAR
              point clouds combined with stereo camera feeds through onboard neural inference, enabling
              autonomous path planning and obstacle avoidance without human teleoperation. Published
              academic work on the Cassie and Digit platforms in IEEE and other peer-reviewed venues
              provides a documented technical lineage that competitors relying on newer, less published
              research cannot easily replicate. However, Agility has not published specific benchmark
              results for task success rates, manipulation latency, or failure recovery time in its
              commercial deployments, limiting independent technical validation of claimed performance.
              The open payload bay allows third-party AI compute modules, enabling the platform to
              upgrade inference capabilities as hardware generations advance without full hardware replacement.
            claimRefs:
              - CE012
              - CE013
              - CE019
              - CE028
              - CE033
              - CE034
      - number: '5.3'
        title: Arc Cloud Platform and Enterprise Integration Architecture
        blocks:
          - type: paragraph
            body: |
              The Arc cloud platform is Agility's software-as-a-service layer that orchestrates Digit
              fleets, integrates with enterprise warehouse systems, and provides remote monitoring and
              diagnostics. Arc connects directly to warehouse management systems (WMS), warehouse
              execution systems (WES), manufacturing execution systems (MES), and PLCs via webhooks and
              custom APIs, allowing operators to assign tasks to Digit units from existing operational
              tooling without a parallel human-machine interface. A key differentiating capability
              announced in March 2025 is direct AMR integration: Arc can dispatch MiR and Zebra
              Technologies autonomous mobile robots as part of the same workflow, enabling Digit to load
              or unload AMRs as part of a fully automated tote-handling sequence. This positions Arc not
              merely as a Digit fleet manager but as a unified heterogeneous robot orchestration platform
              for logistics facilities that already operate AMR fleets. Arc also supports safety fleet
              monitoring and remote shutdown capabilities, critical for enterprise deployments requiring
              centralized control room oversight. The platform uses EtherCAT fieldbus for the robot's
              internal control communication, with a safety PLC coordinating FSoE-compliant safety
              commands. The Arc API architecture allows WMS integrators and systems integrators to build
              custom workflow automation that spans Digit and third-party automation equipment, providing
              a potential expansion moat as the integration library matures. Specific API documentation,
              SDK availability, and published developer resources are not fully transparent in the public
              domain as of 2026, representing a gap for technology partners evaluating integration depth.
