      - number: '2.3'
        title: Buyer and Segment Landscape
        blocks:
          - type: paragraph
            body: |
              The primary buyer for Digit is the operations/supply chain executive at large logistics
              operators, e-commerce fulfillment companies, and contract manufacturers. Budget ownership
              for warehouse automation typically sits in operations or capex/automation departments, with
              CFO/C-suite involvement for multi-million-dollar multi-year RaaS commitments. Three primary
              buyer segments are identifiable. Segment 1—Tier-1 3PL operators (e.g., GXO, DHL, Ryder,
              XPO)—have large, standardized facility footprints and labor-intensive tote/carton handling
              workflows, are motivated by labor cost reduction and throughput improvement, and have the
              financial capacity and operational sophistication for humanoid deployment. Segment 2—Large
              e-commerce operators (e.g., Amazon, Walmart, Target)—combine high volume, extreme labor
              intensity, and in-house automation capability; they are early adopters but also develop
              competing in-house robotics solutions. Segment 3—Specialty manufacturers and retailers
              (e.g., apparel, automotive parts) with high-mix, low-volume workflows in human-scale
              environments that are hard to automate with fixed equipment. The payer for the RaaS model
              is the facility operator; the user is the warehouse floor workforce. Enterprise adoption
              timelines are long (12–18+ months for sales cycle, 3–6 months for integration) due to
              safety certification requirements, WMS integration complexity, and the need for demonstrated
              ROI before expanding fleet size. Smaller operators (<$50M revenue) are effectively
              outside Agility's current SAM due to minimum contract economics.
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM014
              - CM015
