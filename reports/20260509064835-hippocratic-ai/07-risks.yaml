  - id: SR-4
    title: People, Execution, and Key-Person Risk
    body: |
      CEO and co-founder Munjal Shah is the sole publicly prominent executive at Hippocratic AI. Shah
      founded the company, drove the product vision, led all three funding rounds, and is the primary
      spokesperson in all major press coverage, investor communications, and technical publications.
      This concentration of public identity, investor trust, and product direction in a single individual
      constitutes a classic key-person risk. In the event of Shah's departure, incapacitation, or
      reputational event, the company lacks a clearly communicated succession plan or a co-equal
      executive whose credibility and relationships could maintain investor and customer confidence.

      Beyond Shah, the publicly identifiable executive team is thin: 3-4 named individuals appear in
      company materials and press coverage. The Chief Medical Officer role - critical for a company
      whose entire value proposition rests on clinical safety and regulatory positioning - is not
      publicly named as of May 2026. A strong CMO with regulatory and clinical credibility is standard
      for Series C healthcare AI companies at the $3.5B valuation stage, and the absence of a named
      CMO represents both an execution gap and a diligence signal that warrants direct investigation.

      Execution risk is amplified by the pace of growth. Hippocratic AI reportedly signed 23 contracts
      in 23 weeks in late 2024 - a velocity that implies aggressive sales hiring, implementation
      capacity building, and customer success resourcing in parallel. Rapid customer acquisition in
      enterprise healthcare often produces quality-of-service degradation, where early customers
      experience service deterioration as the company prioritizes growth over retention. There is
      no public evidence of customer success team scale, implementation capacity, or support
      infrastructure at this growth rate. The April 2026 AI Front Door and Nurse Co-Pilot product
      launches simultaneously expand the product surface area and the engineering, clinical validation,
      and customer implementation demands - increasing execution risk in multiple dimensions at once.
      These simultaneous strategic moves are consistent with a company optimizing for next-round
      valuation rather than operational consolidation, creating a heightened execution risk environment.
    claimRefs:
      - CR023
      - CR024
      - CR025
      - CR026
    tableRefs:
