  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: FDA SaMD reclassification risk
      missingEvidence: >-
        No FDA enforcement guidance or advisory opinion specifically addressing AI patient communication agents outside
        SaMD classification exists as of May 2026.
      whyItMatters: >-
        FDA reclassification is the highest-impact regulatory scenario; without an authoritative determination, the risk
        cannot be precisely calibrated for investment decision-making.
      diligencePath: >-
        Request FDA pre-submission meeting (Q-Sub) through regulatory counsel; obtain expert opinion from
        FDA-specialized law firm with AI device practice.
      relatedQuestionRefs:
        - QR005
    - type: missing-source
      severity: material
      topic: Babylon Health direct comparability analysis
      missingEvidence: >-
        No independent analysis directly comparing Hippocratic AI's financial structure and burn profile to Babylon
        Health's pre-bankruptcy metrics has been published.
      whyItMatters: >-
        Without a structured comparison, Babylon's cautionary tale remains illustrative rather than predictive for
        Hippocratic AI's specific risk profile and business model.
      diligencePath: >-
        Commission independent financial analyst comparison using Babylon's public SPAC filings versus Hippocratic AI's
        estimated unit economics and revenue structure.
      relatedQuestionRefs:
        - QR012
    - type: private-evidence-only
      severity: blocking
      topic: Financial sustainability scenarios and burn rate
      missingEvidence: >-
        Hippocratic AI has not disclosed revenue, COGS, operating expenses, or financial projections; burn rate and
        runway are estimated from industry benchmarks only.
      whyItMatters: >-
        Without actual financial data, the sustainability of the $3.5B valuation and adequacy of $126M Series C capital
        cannot be assessed with investment-grade confidence.
      diligencePath: >-
        Request audited financials and board-approved financial model in Series D or secondary diligence process with
        standard NDA protections.
      relatedQuestionRefs:
        - QR019
    - type: missing-source
      severity: minor
      topic: Security certifications (SOC 2, HITRUST)
      missingEvidence: >-
        No public SOC 2 Type II report, HITRUST certification, or equivalent security assurance documentation has been
        found for Hippocratic AI as of May 2026.
      whyItMatters: >-
        Enterprise health system customers typically require SOC 2 Type II or HITRUST as a procurement prerequisite;
        absence signals either in-progress status or a compliance gap.
      diligencePath: >-
        Request SOC 2 Type II report directly from company under NDA; verify HITRUST certification status in MyCSF
        public registry.
      relatedQuestionRefs:
        - QR024
    - type: missing-source
      severity: material
      topic: Patient-specific safety incident documentation
      missingEvidence: >-
        No independent incident reports, adverse event disclosures, or patient complaint records related to Hippocratic
        AI deployments are publicly available from any source.
      whyItMatters: >-
        Absence of documented incidents may reflect strong safety performance or may reflect limited monitoring and
        disclosure; the two scenarios cannot be distinguished without independent review.
      diligencePath: >-
        Request internal incident logs and near-miss reports from company; contact WellSpan and UHS compliance teams for
        independent validation of safety record.
      relatedQuestionRefs:
        - QR028
    - type: enumeration-incomplete
      severity: material
      topic: Regulatory risk register completeness
      missingEvidence: >-
        The regulatory risk register covers publicly known risk categories only; unreported enforcement inquiries,
        informal FDA communications, or state investigations may not be captured.
      whyItMatters: >-
        Unidentified regulatory risks could materially affect the investment thesis timeline and capital requirements
        for compliance remediation.
      diligencePath: >-
        Request regulatory counsel review of all FDA pre-submission filings, state correspondence, legal holds, and any
        informal regulatory communications received by the company.
      relatedTableRefs:
        - TR001
