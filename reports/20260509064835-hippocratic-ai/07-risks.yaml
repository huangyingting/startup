  - id: SR-2
    title: Operational, Quality, and Safety Risk
    body: |
      Hippocratic AI's clinical safety claims are the single most important unverified assertion in
      the company's commercial narrative. The company reports a 99.38% clinical accuracy rate for
      Polaris 3.0, validated through 6,200 clinician testers and 1.85 million real patient call tests.
      This claim is self-reported by the company and has not been independently audited, peer-reviewed,
      or published in a clinical journal. No independent hospital IRB study, third-party clinical
      evaluation firm, or regulatory body has reviewed or validated these metrics. NEJM Catalyst has
      specifically documented clinical risks from large language model hallucination in patient-facing
      healthcare contexts, noting that even low error rates in high-volume settings produce meaningful
      patient harm potential. At 180M+ patient interactions reported as of April 2026, a 1% error rate
      - far below the company's claimed 0.62% - implies over 1.8 million potentially inaccurate patient
      interactions. The clinical consequences range from missed medication reminders to inappropriate
      reassurance for serious symptoms.

      The liability framework for AI-mediated patient harm is unresolved in US law. If a patient
      follows guidance from a Hippocratic AI agent, experiences an adverse outcome, and sues the
      health system, the health system may seek indemnification from Hippocratic AI as the technology
      vendor. Legal analysis from multiple firms indicates that standard healthcare IT vendor liability
      caps and limitation-of-liability clauses may not fully insulate Hippocratic AI from damages if
      a court determines the AI product was a proximate cause. No published case law specific to AI
      patient agent liability exists as of May 2026.

      Voice AI specific risks are particularly relevant to Hippocratic AI's deployment profile. The
      company's primary customer segment - health systems serving elderly, chronically ill, and
      multilingual patient populations - is precisely the demographic most susceptible to voice
      interface failure modes. Background noise in home environments, accent variability outside
      training data, hearing impairment, and cognitive load under stress all degrade voice AI
      accuracy. At scale across 29 UHS hospitals and 50+ partner institutions, 24/7 operations mean
      patient safety incidents could accumulate faster than internal monitoring and response capacity
      can address them. Security risk is amplified by the PHI handling requirements: voice call
      recordings, patient identifiers, and clinical data processed in real time across cloud
      infrastructure represent a high-value target for adversarial attack. No public SOC 2 Type II,
      HITRUST, or equivalent security certification documentation has been identified as of May 2026.
    claimRefs:
