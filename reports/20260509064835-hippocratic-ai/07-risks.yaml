  - id: SR-3
    title: Partner, Dependency, and Competitive Risk
    body: |
      Hippocratic AI's technical architecture creates three material external dependency risks. First,
      the NVIDIA GPU dependency is the most acute near-term operational risk. Hippocratic AI's real-time
      voice AI requires H100/H200 GPU infrastructure with TensorRT-LLM optimization - hardware that
      was subject to sustained global supply shortage through 2024 and into 2025. GPU supply normalization
      is improving but NVIDIA retains pricing power and allocates supply preferentially to hyperscaler
      customers. A GPU supply disruption or NVIDIA pricing increase of 20-30% would directly raise
      Hippocratic AI's per-interaction compute cost, compressing margins in a usage-based revenue model
      where $9/hour pricing leaves limited headroom. AWS cloud dependency compounds this: a single-cloud
      hosting architecture for a 24/7 patient-facing product creates availability risk if AWS experiences
      regional outages in data centers serving production deployments.

      The second dependency risk category is EHR vendor competition. Epic and Cerner collectively hold
      70%+ of the US health system EHR market. Both vendors have launched AI roadmaps - Epic's Cosmos
      AI and Cerner's CommunityWorks AI - that compete directly with Hippocratic AI's core use cases
      including patient outreach, care gap closure, and clinical documentation support. Health systems
      that are already paying Epic or Cerner licensing fees have a strong financial incentive to adopt
      AI features from their existing EHR vendor as a bundle, rather than paying an additional $9/hour
      to Hippocratic AI. Epic's deep integration advantage is a structural moat that Hippocratic AI
      cannot match without extensive API integration investment. Hyro AI, with $95M raised and 45+
      health system deployments and native Epic integration, represents an independent competitor
      targeting the same segment with a demonstrated Epic integration playbook.

      The third dependency is the clinician validator network. Hippocratic AI employs 7,500+ licensed
      clinicians to review and validate AI outputs - a human-in-the-loop safety mechanism that also
      represents a recurring operating cost. If clinician validator turnover increases, if market wages
      for part-time clinical reviewer roles rise, or if the validator network cannot scale proportionally
      with interaction volume growth, the safety architecture's human check layer degrades. This is
      both a cost risk (COGS expansion) and a quality risk (fewer validators per interaction reviewed).
      The COGS structure of this model is not publicly disclosed, but industry estimates suggest
      reviewer labor represents 15-30% of total operating cost at current scale.
