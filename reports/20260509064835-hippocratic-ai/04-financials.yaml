figures:
  - id: FI001
    title: Revenue model bridge
    type: flow
    notes: >-
      Illustrates how Hippocratic AI's $9/agent-hour pricing flows from product delivery through health system value
      capture to ultimate revenue recognition. Each node represents a stage in the value chain from product capability
      to economic outcome. Arrows show the directional flow of value and money.
    data:
      nodes:
        - id: A
          label: Polaris 3.0 Inference
          detail: >-
            22 LLMs, 4.2T parameters on NVIDIA H100/H200 GPUs generate AI patient conversation; cost $1–3/hour in
            compute COGS (estimated)
          type: input
        - id: B
          label: Clinician Safety Validation
          detail: >-
            7,500+ licensed validators certify conversation quality and safety; ongoing and certification-phase costs;
            key gross margin driver
          type: process
        - id: C
          label: Patient Interaction Delivery
          detail: >-
            Voice-first AI agent call completes patient outreach task (post-discharge, medication adherence, etc.);
            180M+ interactions to date
          type: process
        - id: D
          label: $9/Agent-Hour Billing
          detail: >-
            Health system billed $9 per agent-hour at list price; volume discounts and enterprise minimums not
            disclosed; usage-based, metered revenue
          type: output
