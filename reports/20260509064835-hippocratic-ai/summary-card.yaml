  headline: >
    Hippocratic AI commands a $3.5B valuation on unverified revenue of an estimated $10–50M ARR, implying 70–350x
    trailing multiple — stretched even for a high-growth healthcare AI leader. Track pending audited revenue disclosure
    and observable NRR data from named health system customers.
