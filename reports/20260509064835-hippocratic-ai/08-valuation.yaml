  - id: SV-3
    title: Comparable Company Analysis
    body: |
      The comparable set for Hippocratic AI valuation spans three categories: (1) private healthcare
      AI peers at similar stage; (2) public healthcare SaaS/analytics companies providing market
      anchor multiples; and (3) M&A precedents illustrating exit valuations.

      Among private peers, Abridge is the most relevant direct comparable. Abridge raised $550M
      at a $6B valuation in May 2025, positioning it as the highest-valued private healthcare AI
      company in the clinical documentation category. Abridge serves 500+ health systems with
      AI ambient clinical documentation (physician-facing), has NVIDIA, Google, and Highmark as
      investors, and is estimated at 50-80x ARR based on analyst estimates. The Abridge valuation
      demonstrates that private market investors are willing to pay category-leader premiums
      exceeding 50x ARR for healthcare AI companies with enterprise scale and institutional
      backing. Hippocratic AI's $3.5B at an estimated 35-93x ARR positions it below Abridge on
      an absolute valuation basis but at a similar implied multiple range. Hyro AI ($95M raised,
      $200-300M estimated valuation, 45+ health system deployments with native Epic integration)
      is a direct competitor at an earlier stage, offering a lower-risk comparator for investors
      seeking more mature unit economics.

      Public market healthcare SaaS comps provide the anchor for exit multiples. Health Catalyst
      (HCAT, NASDAQ) trades at approximately 3.2x ARR on $220M revenue with an enterprise value
      of approximately $700M as of May 2026 — reflecting the public market discount for non-AI-
      native healthcare analytics platforms. Phreesia (PHR, NYSE) trades at approximately 4x ARR
      on $375M revenue with an EV of approximately $1.5B — a patient intake SaaS platform
      directly comparable to Hippocratic's patient communication function. Evolent Health trades
      at approximately 1.3x revenue reflecting its health plan services model rather than pure
      AI SaaS. The public comp multiples (1.3x-4x revenue) indicate that an IPO at the current
      $3.5B valuation would require significantly higher revenue and growth rate than the current
      estimate suggests — confirming that the current $3.5B mark is a late-stage private market
      premium requiring a 5-7 year exit horizon or a strategic M&A at premium multiples.

      The most relevant M&A precedent is Microsoft's acquisition of Nuance Communications for
      $19.7B (April 2021), at approximately 10x Nuance's $1.5-2B ARR at the time of acquisition.
      This precedent illustrates that strategic acquirers (Microsoft, Google, Epic) have
      demonstrated willingness to pay significant premiums for healthcare AI at scale. If
      Hippocratic AI achieves $250-500M ARR by 2028-2030 and retains category leadership,
      a strategic acquisition at $5-15B is consistent with the Nuance precedent.
