figures:
  - id: FV001
    title: Recommendation logic
    type: flow
    notes: >-
      Decision tree from key thesis pillars through risk gates to the final investment recommendation. Red nodes
      represent thesis-break conditions that override the positive recommendation.
    data:
      nodes:
        - id: safety
          label: Clinical Safety Moat
          detail: 7,500+ clinician validators; 22-LLM Safety Constellation; 99.38% Polaris 3.0 accuracy (self-reported)
        - id: market
          label: Labor Displacement Economics
          detail: $9/hr vs $39-65/hr RN cost; 78-86% savings; 180M+ patient interactions; 50+ enterprise partners
        - id: nvidia
          label: NVIDIA Strategic Partnership
          detail: $17M NVentures investment; H100/H200 GPU access; TensorRT-LLM optimization for real-time voice AI
        - id: traction
          label: Enterprise Traction
          detail: 50+ health systems; 6 countries; 23 contracts in 23 weeks; UHS 29 hospitals deployed
        - id: fda_gate
          label: FDA Classification Gate
          detail: Non-SaMD maintained? If FDA reclassifies product as SaMD requiring 510(k), thesis breaks
        - id: rev_gate
          label: Revenue Validation Gate
          detail: ARR > $50M and growing 80%+ YoY? Required for $3.5B valuation to be defensible
        - id: ehr_gate
          label: EHR Competitive Gate
          detail: Epic/Cerner bundling threatening > 3 named customers? If yes, moat is cracking
        - id: conditional_pos
          label: CONDITIONAL POSITIVE
          detail: >-
            Invest at Series D or new primary at $3-4B with confirmed ARR, NRR > 110%, and FDA opinion in hand; target
            3-5x return over 5-7 years
        - id: research_more
          label: RESEARCH-MORE
          detail: >-
            No data room access or revenue unconfirmed; hold decision pending diligence completion; do not commit at
            Series C secondary above $4B
        - id: avoid
          label: AVOID / EXIT
          detail: >-
            Thesis-break trigger fired: FDA reclassifies, named customer safety churn, or Series D down-round; exit
            within 90 days
      edges:
        - from: safety
          to: fda_gate
          label: regulatory risk overlay
        - from: market
          to: rev_gate
          label: revenue confirmation required
        - from: nvidia
          to: ehr_gate
          label: competitive moat check
        - from: traction
          to: rev_gate
          label: traction to revenue conversion
        - from: fda_gate
          to: conditional_pos
          label: FDA non-SaMD maintained
        - from: fda_gate
          to: avoid
          label: FDA reclassifies SaMD
        - from: rev_gate
          to: conditional_pos
          label: ARR > $50M confirmed
        - from: rev_gate
          to: research_more
          label: ARR unconfirmed or < $50M
        - from: ehr_gate
          to: conditional_pos
          label: EHR moat intact
        - from: ehr_gate
          to: avoid
          label: EHR displaces 3+ customers
