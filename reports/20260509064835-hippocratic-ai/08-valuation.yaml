  - id: SV-2
    title: Valuation Context and Financing History
    body: |
      Hippocratic AI has raised $404 million across five rounds since May 2023 with a valuation
      step-up trajectory that is exceptional even by healthcare AI standards. The seed round
      (approximately $50M, May 2023) was led by General Catalyst and a16z. The Series A ($53M,
      March 2024) was co-led by General Catalyst and Premji Invest at a $500M valuation, with
      strategic participation from five health systems including Cincinnati Children's, WellSpan
      Health, Universal Health Services, HonorHealth, and OhioHealth. NVIDIA made a $17M
      strategic investment via NVentures in August 2024. The Series B ($141M, January 2025,
      $1.64B valuation) was led by Kleiner Perkins with continued General Catalyst and NVIDIA
      participation. The Series C ($126M, November 2025, $3.5B valuation) was led by Avenir
      Growth Capital with new participation from CapitalG (Google's growth equity fund) and
      continued strategic backers.

      The valuation progression — $500M (March 2024) to $1.64B (January 2025) to $3.5B
      (November 2025) — implies a 3.28x step-up in eight months from Series B to Series C.
      This trajectory reflects the broader healthcare AI market re-rating driven by documented
      enterprise adoption across health systems and payers. The Series C use of funds was publicly
      stated as product expansion (AI Front Door, Nurse Co-Pilot launches), international growth
      across 6 countries, and acquisitions — the M&A earmark being unusual for a pre-revenue-
      disclosed growth stage company and suggesting the company is seeking inorganic accelerants
      to defend its category position.

      The current implied ARR multiple at $3.5B depends critically on actual revenue. Using
      three proxy methods: (1) Contract value proxy — 50+ enterprise partners at estimated
      $300K-$2M ACV yields $15M-$100M ARR range; (2) Interaction volume proxy — 180M annual
      patient interactions at $9/hr ($1.50/interaction average) yields up to $270M gross
      interaction value, though actual billing likely reflects pilot discounts and usage caps;
      (3) Comparable precedent — the Series B-to-C step-up of 2.1x with new enterprise revenue
      validation suggests ARR growth well above 100% YoY. The midpoint diligence estimate is
      $37.5M ARR (base case), yielding a 93x ARR multiple. Healthcare AI private market leaders
      have traded at 10-50x ARR in 2024-2025 based on industry benchmarking, suggesting the
      $3.5B valuation requires bull-case ARR confirmation to be fully defensible.

      Dilution and preference dynamics are relevant. $404M raised implies significant cumulative
      dilution; assuming seed through Series C investors hold 40-55% aggregate, the founders
      and employees retain 45-60% equity. Liquidation preferences in a down-round scenario
      could impair common stockholder returns. The Series C preference stack is not publicly
      disclosed but standard 1x non-participating liquidation preference is assumed; if 2x
      preferences exist, downside scenarios become more complex for later investors entering
      at high valuation marks.
