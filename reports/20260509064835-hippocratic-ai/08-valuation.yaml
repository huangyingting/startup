  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: ARR and revenue confirmation
      missingEvidence: >-
        Hippocratic AI has not disclosed ARR, MRR, NRR, gross margin, or burn rate as of May 2026; all revenue estimates
        are proxy-derived from partner count and pricing benchmarks.
      whyItMatters: >-
        The $3.5B valuation implies 35-233x ARR depending on the revenue proxy used; no investment thesis can be
        finalized without confirming whether the company is at the 35x (bull) or 233x (bear) end of this range.
      diligencePath: >-
        Request data room with trailing 8-quarter ARR schedule, quarterly MRR by product line, NRR cohort table, and
        CFO-attested revenue report signed by outside auditors.
      relatedQuestionRefs:
        - QV005
        - QV014
        - QV016
    - type: private-evidence-only
      severity: blocking
      topic: FDA regulatory opinion on SaMD classification
      missingEvidence: >-
        No FDA pre-submission (Q-Sub) result, regulatory counsel opinion, or informal FDA communication regarding
        Hippocratic AI's SaMD classification status has been publicly disclosed.
      whyItMatters: >-
        FDA reclassification is a blocking thesis-break trigger; the investment case is uninsurable at $3.5B without an
        expert regulatory opinion that the non-SaMD position is defensible through 2027.
      diligencePath: >-
        Request FDA regulatory counsel memo from company (Ropes & Gray, Sidley, or equivalent); verify no informal FDA
        inquiry letters have been received.
      relatedQuestionRefs:
        - QV023
    - type: missing-source
      severity: material
      topic: Public adverse valuation commentary from investors or analysts
      missingEvidence: >-
        No published skeptical analyst report, short thesis, or credible investor public commentary specifically
        targeting the $3.5B Series C valuation has been identified as of May 2026.
      whyItMatters: >-
        Absence of public adverse commentary may reflect genuine consensus or information asymmetry between informed
        insiders and public observers; cannot distinguish without secondary market pricing data.
      diligencePath: >-
        Monitor FT Alphaville, Seeking Alpha Healthcare section, and secondary market platforms for adverse Hippocratic
        AI valuation commentary; check LP-level investor communication for any dissent signals.
      relatedQuestionRefs:
        - QV030
    - type: private-evidence-only
      severity: material
      topic: Cap table and liquidation preference structure
      missingEvidence: >-
        The full cap table, liquidation preferences, anti-dilution provisions, and board composition of Hippocratic AI
        are not publicly disclosed; assumptions of 1x non-participating preference are unverified.
      whyItMatters: >-
        If 2x or participating liquidation preferences exist across $404M in cumulative investment, downside scenarios
        produce significantly worse returns than modeled; preference overhang is unquantifiable without cap table.
      diligencePath: >-
        Request full cap table and charter documents for all preferred series in the data room; engage legal counsel to
        map preference waterfall in downside scenarios.
      relatedQuestionRefs:
        - QV022
    - type: enumeration-incomplete
      severity: material
      topic: Comparable valuation table completeness
      missingEvidence: >-
        The comparable set covers publicly available data; private company ARR for Abridge, Hyro AI, and Omada Health
        are analyst estimates, not confirmed figures. Additional private comps (Nabla, Suki, Aidoc) may exist but have
        insufficient public valuation data.
      whyItMatters: >-
        An incomplete or inaccurate comparable set could mis-calibrate the implied valuation multiple range for the
        investment committee; private company ARR estimates have wide confidence intervals.
      diligencePath: >-
        Access PitchBook or CB Insights full comparable company reports with primary ARR estimates; request Abridge and
        Hyro investor relations contacts for any public revenue disclosures.
      relatedTableRefs:
        - TV004
