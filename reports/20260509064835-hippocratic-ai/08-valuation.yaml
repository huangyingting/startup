  researchQuestions:
    - id: QV001
      question: "What is Hippocratic AI's current valuation, when was it established, and what financing evidence supports the stated $3.5B figure?"
      type: verification
      status: answered
      answer: "Series C closed November 2025 at $3.5B post-money, raising $126M. Sources: company press release (SV001), TechCrunch (SV002), Fortune (SV003). No SEC Form D confirming exact terms is publicly available."
      claimRefs: [CV001, CV024, CV040]
      targets: [contentRequirements/0]

    - id: QV002
      question: "How does the $3.5B Series C valuation compare to the prior Series B valuation, and what drove the step-up in 17 months?"
      type: quantification
      status: answered
      answer: "Series B: $1.64B (Jun 2024). Series C: $3.5B (Nov 2025). Step-up: 113% in 17 months. Drivers: growth in patient interactions (to 115M+), health system customer expansion (35+), Polaris 3.0 launch, general healthcare AI sentiment. No independent revenue verification."
      claimRefs: [CV001, CV002, CV024]
      targets: [contentRequirements/0]

    - id: QV003
      question: "What is the complete financing history of Hippocratic AI, including round sizes, dates, valuations, and lead investors?"
      type: enumeration
      status: answered
      answer: "Seed/pre-seed: ~$30M (2023). Series A: $53M (Feb 2024, Kleiner Perkins, Elad Gil, WellSpan). Series B: $141M at $1.64B (Jun 2024, General Catalyst, a16z). Series C: $126M at $3.5B (Nov 2025, General Catalyst lead). Total: ~$404M+."
      claimRefs: [CV001, CV002, CV003]
      targets: [contentRequirements/0]

    - id: QV004
      question: "What does the 115M patient interactions metric represent, and how does it translate to revenue or meaningful commercial traction evidence?"
      type: verification
      status: partial
      answer: "115M patient interactions is a company-disclosed cumulative headline figure as of Nov 2025. It likely counts any AI-completed touchpoint (calls, messages, reminders) across all deployments, not unique patients or billable sessions. Mapping to ARR requires knowing the number of chargeable agent-hours per interaction — this data has not been disclosed."
      claimRefs: [CV004, CV018]
      targets: [contentRequirements/1]

    - id: QV005
      question: "How many health systems are confirmed customers of Hippocratic AI, and what is the average contract value?"
      type: quantification
      status: answered
      answer: "Hippocratic AI has disclosed 35+ health system customers as of early 2026. Average contract value (ACV) is not publicly disclosed. At $9/agent-hour, ACV depends on hours deployed — for a 2,000-bed hospital running agents 8 hours/day on 5% of admissions, estimated ACV would be $300K–$1M/year. No independent ACV figure available."
      claimRefs: [CV007, CV026]
      targets: [contentRequirements/1]

    - id: QV006
      question: "What are the technical capabilities and limitations of Polaris 3.0, and how does its safety-first architecture affect the addressable market?"
      type: mechanism
      status: answered
      answer: "Polaris 3.0 (Nov 2025): 22 specialized LLMs, 4.2T parameters, NCLEX-validated, trained without patient data. Safety constraints: explicitly no clinical diagnosis, no prescribing; human escalation for high-acuity. Limitation: constrains product to care coordination, not full nursing workflow replacement — addressable market is narrower than headline TAM."
      claimRefs: [CV005, CV033, CV034]
      targets: [contentRequirements/1]

    - id: QV007
      question: "How does Hippocratic AI's $9/agent-hour pricing compare to human nursing labor costs, and what are the economics for a typical health system deployment?"
      type: comparison
      status: answered
      answer: "US RN: $35–55/hr. Offshore nurse navigator: $5–12/hr. Hippocratic AI agent: $9/hr. At $9/hr, a 10-agent deployment running 8hr/day costs $262K/year — vs. $730K–$1.1M for 10 RNs. However, AI agents can run 24/7 at the same rate, improving the effective cost advantage for round-the-clock tasks."
      claimRefs: [CV006, CV007, CV026]
      targets: [contentRequirements/1]

    - id: QV008
      question: "What is the projected economic model for a typical Hippocratic AI health system customer — ARR, payback period, and ROI?"
      type: quantification
      status: partial
      answer: "No public unit economics from health system customers are available. Inferred: at $9/hr with 1,000 agent-hours/month, ACV = $108K/year. At 35 customers averaging $300K–$600K ACV, total ARR estimate = $10–21M. No disclosed payback period or customer-reported ROI data."
      claimRefs: [CV007, CV008]
      targets: [contentRequirements/1]

    - id: QV009
      question: "What is Hippocratic AI's best-estimate ARR as of May 2026, and what are the key uncertainties in that estimate?"
      type: quantification
      status: partial
      answer: "Third-party estimates (Sacra, CB Insights) place ARR at $10–50M range for early 2026, with best-case $30–50M if all 35+ health systems are active contracts. No audited revenue figure exists. Key uncertainties: number of active vs. pilot deployments, average hours billed, and whether all 35 customers are paying vs. receiving access under research agreements."
      claimRefs: [CV008, CV007, CV005]
      targets: [contentRequirements/1]

    - id: QV010
      question: "What is Hippocratic AI's gross margin, and how does it compare to healthcare SaaS benchmarks?"
      type: quantification
      status: unresolved
      answer: "Gross margin not publicly disclosed. AI inference-heavy companies typically carry 60–70% gross margins at scale, but earlier-stage deployment with significant prompt engineering and human oversight overhead may compress margins to 40–60%. No independent data available."
      claimRefs: [CV008]
      targets: [contentRequirements/1]

    - id: QV011
      question: "What are the most relevant comparable companies for valuing Hippocratic AI, and what revenue multiples do they imply?"
      type: comparison
      status: answered
      answer: "Comps: Nuance (acquired at ~10x revenue); Abridge (~$2B at est. $15–30M ARR = 67–133x); Suki AI (~$400M at est. $5–10M ARR = 40–80x); Regard AI (~$1.8B at $30M ARR = 60x); Nabla (~€120M at small ARR). Healthcare AI comps range 10–133x ARR. Hippocratic at $3.5B implies 70–350x ARR on its estimated $10–50M range — at or above the top of the comp set."
      claimRefs: [CV009, CV010, CV011, CV012, CV028]
      targets: [contentRequirements/2]

    - id: QV012
      question: "What are the historical acquisition multiples for healthcare AI transactions, and how does Hippocratic AI compare?"
      type: comparison
      status: answered
      answer: "Historical M&A: Nuance/Microsoft ($19.7B, ~10x revenue, 2021); Notable/KPMG (undisclosed); health IT acquisitions median 8–15x ARR. Public market comps at IPO: Doximity (~30x ARR), Veeva (~25x ARR), Health Catalyst (~5x ARR). Hippocratic's 70–350x implied multiple is 2–17x above historical healthcare SaaS exit ranges."
      claimRefs: [CV009, CV022, CV027]
      targets: [contentRequirements/2]

    - id: QV013
      question: "What was the median Series C valuation for healthcare AI companies in 2024–2025, and how does Hippocratic AI compare to sector peers?"
      type: comparison
      status: answered
      answer: "Rock Health 2024 report: median Series C valuation for AI-native healthcare companies was $800M–$1.5B. Hippocratic AI's $1.64B Series B and $3.5B Series C are significantly above the sector median, reflecting its broader positioning as a multi-task clinical AI platform rather than a point solution."
      claimRefs: [CV013]
      targets: [contentRequirements/2]

    - id: QV014
      question: "What is the analyst consensus on whether Hippocratic AI's valuation is justified at current ARR levels?"
      type: adverse
      status: answered
      answer: "No formal analyst consensus exists. Third-party commentary (Sacra, CB Insights, healthcare consultants) notes that $3.5B requires 10–20x revenue growth from current estimated levels to produce positive returns at 2025 public market comps. The valuation is described as 'aspirational' or 'frontier premium' relative to disclosed metrics."
      claimRefs: [CV041, CV027]
      targets: [contentRequirements/2]

    - id: QV015
      question: "What are the bull, base, and bear case return scenarios for an investor entering at $3.5B valuation?"
      type: quantification
      status: answered
      answer: "Bull: $200M+ ARR by 2028, 15–20x forward multiple → $3–4B exit → 0.9–1.1x return from $3.5B entry (inadequate). 3–5x requires $200M ARR at 25–35x multiple — achievable only in a hypergrowth scenario. Base: $50–80M ARR at 12–15x → $600M–1.2B exit → 0.2x (loss). Bear: regulatory block, $15–25M ARR → near-zero."
      claimRefs: [CV014, CV015, CV016]
      targets: [contentRequirements/3]

    - id: QV016
      question: "What growth rate in ARR is required for Hippocratic AI to produce a positive return from the Series C entry price?"
      type: quantification
      status: answered
      answer: "At $3.5B entry and a 15x forward multiple, Hippocratic needs $233M+ ARR to break even. At 3x target return ($10.5B exit), it needs $700M ARR at 15x or $350M ARR at 30x. From estimated ~$30M current ARR, this requires 8–23x growth in 3–5 years — challenging but not unprecedented in AI."
      claimRefs: [CV014, CV015]
      targets: [contentRequirements/3]

    - id: QV017
      question: "What regulatory events could permanently impair Hippocratic AI's valuation or market opportunity?"
      type: adverse
      status: answered
      answer: "Primary risks: (1) FDA reclassification of AI nursing agents as SaMD requiring 510(k) clearance — adds 2–4 year approval delay and compliance cost; (2) CMS coding changes removing reimbursement for AI-assisted care coordination; (3) State nursing board rulings treating AI agents as unlicensed practice of nursing; (4) high-profile safety incident triggering healthcare system adoption freeze."
      claimRefs: [CV023, CV016]
      targets: [contentRequirements/3]

    - id: QV018
      question: "How significant is the investor-customer overlap conflict of interest, and how does it affect valuation credibility?"
      type: adverse
      status: answered
      answer: "WellSpan, Intermountain, and Kaiser Permanente are reported as both investors and customers. This inflates adoption metrics (deployment decisions partially reflect investment rationale rather than pure commercial evaluation) and limits the independence of positive customer testimony as evidence of product-market fit. Estimated 30–50% of named customer relationships may have investor overlap."
      claimRefs: [CV017, CV025]
      targets: [contentRequirements/3]

    - id: QV019
      question: "What are the key commercial adoption barriers for health systems deploying AI nursing agents at scale?"
      type: adverse
      status: answered
      answer: "Barriers: (1) clinical liability — health systems require contractual indemnification from Hippocratic before deployment; (2) workflow integration with EHR (Epic, Oracle Cerner) is technically complex; (3) nursing union opposition to AI tools reducing RN hours; (4) patient trust and consent requirements for AI-initiated medical communications; (5) IT security review of AI handling PHI under HIPAA."
      claimRefs: [CV031, CV033]
      targets: [contentRequirements/3]

    - id: QV020
      question: "Is the zero safety incidents claim credible, and what evidence exists to support or challenge it?"
      type: verification
      status: answered
      answer: "Hippocratic AI discloses zero safety incidents across 115M interactions — a company-reported metric with no independent audit, no regulatory body verification, and no defined incident taxonomy. The claim is not falsifiable from public data. Given the safety-first architecture (no diagnosis, human escalation), the claim is plausible for the constrained use case but cannot be independently verified."
      claimRefs: [CV018]
      targets: [contentRequirements/3]

    - id: QV021
      question: "What is the total addressable market for AI nursing agents, and how much can Hippocratic AI realistically capture?"
      type: quantification
      status: answered
      answer: "US nursing labor cost: ~$280B annually (1.4M RNs × $40/hr average × 5,000 hrs). At $9/hr AI replacement of 10–20% of non-clinical nursing tasks, SAM = $25–56B. Healthcare AI market projected at $148B by 2029 (McKinsey). Realistic Hippocratic addressable share in 5 years: $200M–$1B ARR (0.4–2% SAM capture), consistent with bull case."
      claimRefs: [CV019, CV030]
      targets: [contentRequirements/0]

    - id: QV022
      question: "Is there SEC Form D or other regulatory filing confirming Hippocratic AI's Series C terms?"
      type: verification
      status: partial
      answer: "No SEC Form D confirming Series C terms was identified in public EDGAR records as of May 2026. Hippocratic AI may have filed under an exemption that does not require a Form D, or the filing may be pending. The $3.5B valuation is sourced from press releases only — a material transparency gap."
      claimRefs: [CV020]
      targets: [contentRequirements/0]

    - id: QV023
      question: "What is the estimated cap table structure and dilution for early investors after the Series C?"
      type: quantification
      status: answered
      answer: "Inferred: Founders and seed investors likely retain 35–45% post-Series C given standard dilution. Series A (Kleiner, Elad Gil): ~10–15% post-diluted. Series B (General Catalyst, a16z): ~20–25% collectively. Series C investors: ~8–12%. Liquidation preference structure not disclosed — standard 1x non-participating is assumed."
      claimRefs: [CV021]
      targets: [contentRequirements/0]

    - id: QV024
      question: "What is the range of acquisition multiples that strategic acquirers (Microsoft, Amazon, Google, Epic) would pay for Hippocratic AI at various ARR levels?"
      type: quantification
      status: answered
      answer: "Strategic acquirers typically pay 10–25x ARR for healthcare AI acquisitions (Nuance benchmark: 10x). At $50M ARR: strategic value = $500M–$1.25B (loss from $3.5B). At $200M ARR: $2B–$5B (0.6–1.4x return from $3.5B — marginal). At $500M ARR (2030+): $5B–$12.5B (1.4–3.6x return). Strategic premium above comps is possible but not guaranteed."
      claimRefs: [CV035, CV036, CV022]
      targets: [contentRequirements/3]

    - id: QV025
      question: "How does the FDA SaMD regulatory risk specifically affect Hippocratic AI's valuation and deployment timeline?"
      type: mechanism
      status: answered
      answer: "Hippocratic AI's architecture (no diagnosis, no prescribing, NCLEX-validated guidance only) is designed to avoid SaMD classification. However, if FDA's Digital Health Center of Excellence reclassifies 'AI agents providing personalized health information' as SaMD, Hippocratic would require 510(k) clearance — adding 18–36 months and $5–10M per indication. This would freeze commercial growth and materially impair the $3.5B valuation."
      claimRefs: [CV023, CV033]
      targets: [contentRequirements/4]

    - id: QV026
      question: "What is the pricing compression risk as foundation model costs decline, and how does this affect Hippocratic AI's long-term pricing power?"
      type: adverse
      status: answered
      answer: "GPT-4 API pricing fell from $0.06/1K tokens in 2023 to $0.005/1K in 2025 — a 99% decline. If inference costs fall 90% more, competing AI products could deliver nursing agent functionality at $1–3/agent-hour, potentially undercutting Hippocratic's $9 price point. Hippocratic's moat against this risk is safety validation, HIPAA compliance infrastructure, and health system integration — not model performance alone."
      claimRefs: [CV026, CV038]
      targets: [contentRequirements/4]

    - id: QV027
      question: "How does Hippocratic AI's revenue multiple compare to historical healthcare SaaS benchmarks at the time of IPO or acquisition?"
      type: comparison
      status: answered
      answer: "Healthcare SaaS at IPO: Veeva (~25x ARR 2013), Doximity (~30x ARR 2021), Health Catalyst (~5x ARR 2019). AI-native healthcare: Hippocratic implied ~70–350x. The premium reflects AI growth expectations but is 2–17x above the historical healthcare SaaS range. Any return requires the company to execute at a revenue scale that justifies a 15–30x forward multiple at exit — not guaranteed."
      claimRefs: [CV027, CV022]
      targets: [contentRequirements/2]

    - id: QV028
      question: "What is the strategic value-add of Hippocratic AI's investor base, and does it differentiate the company from peer startups?"
      type: comparison
      status: answered
      answer: "General Catalyst (Health Assurance fund), a16z (bio fund), and Kleiner Perkins (bio vertical) collectively represent the strongest healthcare AI investment franchises in US venture. Their combined health system relationships provide enterprise sales access that is materially differentiated. WellSpan and Kaiser as strategic investors add clinical deployment credibility. This investor network is a genuine competitive moat."
      claimRefs: [CV029, CV037]
      targets: [contentRequirements/0]

    - id: QV029
      question: "What customer churn or NRR data is available for Hippocratic AI's health system deployments?"
      type: verification
      status: unresolved
      answer: "No NRR, churn, or contract renewal data has been publicly disclosed. No independent analyst report has published customer durability metrics for Hippocratic AI. The absence of NRR disclosure is a material diligence gap — for a SaaS platform at $3.5B, positive NRR evidence (120%+) would be a significant valuation support."
      claimRefs: [CV032]
      targets: [contentRequirements/1]

    - id: QV030
      question: "What are the most likely exit paths for Hippocratic AI, and which path produces the best return for Series C investors?"
      type: enumeration
      status: answered
      answer: "Exit paths: (1) IPO — requires $150M+ ARR for healthcare SaaS; 3–5 year timeline; best multiple at scale. (2) Strategic acquisition by Microsoft/Google/Amazon — likely $3.5–6B range if acquired within 3 years; marginal or negative return from $3.5B entry. (3) EHR vendor acquisition (Epic, Oracle Cerner) — synergistic but typically lower premium. (4) Health system consortium acquisition — unlikely at scale. IPO is the highest-return path but requires successful commercial execution."
      claimRefs: [CV035, CV036]
      targets: [contentRequirements/3]

  evidenceGaps:
    - id: GV001
      type: missing-source
      severity: material
      description: "No audited or company-confirmed ARR, revenue, gross margin, or burn rate data exists for Hippocratic AI. All financial estimates are third-party inferences based on pricing and customer count. This is the primary diligence gap preventing confident valuation analysis."
