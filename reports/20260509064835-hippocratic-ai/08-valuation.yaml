  - id: SV-5
    title: Exit Readiness and Diligence Framework
    body: |
      Hippocratic AI's exit readiness is immature relative to the $3.5B valuation mark. The
      company has not disclosed ARR, gross margin, NRR, or burn rate — four metrics that are
      standard for public-market readiness. Without these, institutional investors considering
      pre-IPO or crossover positions lack the financial foundation for an investment-grade
      valuation. The company's Series C press release (BusinessWire, November 2025) emphasizes
      M&A ambitions, suggesting that a strategic sale to a larger healthcare IT, health system,
      or technology acquirer is the most likely exit path rather than an IPO on the current
      trajectory. Potential strategic acquirers include Microsoft (Azure Health, Nuance precedent),
      Google (Google Health, CapitalG investor), UnitedHealth Group (Optum clinical automation),
      and CVS Health (Aetna clinical services scale).

      Public market comparables imply a significant revenue build is required before an IPO
      is viable at the current valuation. Phreesia IPO'd at approximately $1.4B market cap on
      $107M ARR (2019) — a 13x multiple. For Hippocratic AI to IPO at $3.5B+ it would need
      $270M+ ARR at IPO scale with consistent NRR above 110% and positive gross margin trending
      toward profitability. The earliest plausible IPO window given current ARR estimates is
      2028-2030.

      The diligence framework for any capital commitment at this stage is anchored on ten
      specific asks that must be satisfied before investment. The three most blocking are:
      (1) trailing 8-quarter ARR and MRR trend with customer-level cohort attribution;
      (2) FDA regulatory counsel opinion on SaMD classification risk including any informal
      FDA communications to date; and (3) NRR by customer cohort to assess retention quality.
      Without these three, the investment remains in the "research-more" category regardless
      of qualitative thesis strength. The remaining seven diligence asks (burn rate, cap table,
      customer concentration, EHR integration documentation, safety audit, M&A pipeline, and
      liquidation preferences) are material but not individually blocking — they are required
      for the full diligence package in advance of a term sheet.
