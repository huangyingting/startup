  - id: TV006
    title: Final diligence asks table
    notes: >-
      Priority ratings: P0 = blocking (must resolve before commitment); P1 = material (required for full diligence); P2
      = important (needed for ongoing monitoring). Acceptable evidence specifies the minimum standard for each ask.
    columns:
      - Diligence Topic
      - Ask
      - Priority
      - Why It Matters
      - Acceptable Evidence
    rows:
      - - ARR Trend
        - Provide trailing 8-quarter ARR and MRR with customer-level attribution and cohort breakdown
        - P0
        - >-
          Valuation at 35-93x implied ARR is only defensible with confirmed revenue and growth rate; no investment
          without this data
        - Audited or board-approved financial summary with quarterly ARR schedule; CFO attestation
      - - Net Revenue Retention
        - Provide NRR by customer cohort (health systems, payers, pharma) for trailing 4 quarters
        - P0
        - >-
          Usage-based model NRR determines whether the base is expanding or contracting; NRR above 110% is required to
          justify the growth premium
        - Cohort retention schedule in data room; controller-signed NRR calculation
      - - FDA Regulatory Opinion
        - >-
          Provide FDA regulatory counsel opinion on SaMD classification risk and any informal FDA communications
          received to date
        - P0
        - >-
          FDA reclassification is a blocking thesis-break trigger; unknown regulatory position cannot be priced at $3.5B
          entry
        - >-
          Outside regulatory counsel memo (Ropes & Gray, Sidley, or equivalent); pre-submission Q-Sub results if
          applicable
      - - Burn Rate and Runway
        - Disclose monthly burn rate, cash position, and runway against the $126M Series C at the data room date
        - P1
        - >-
          At $404M raised with undisclosed burn, runway could be 12-36 months; insufficient runway would require
          emergency Series D at disadvantaged terms
        - CFO-signed cash flow statement for trailing 6 months; board-approved 24-month budget
      - - Cap Table and Preferences
        - Provide full cap table with liquidation preferences, anti-dilution provisions, and board composition
        - P1
        - >-
          Liquidation preferences and pro-rata rights in a down-round scenario could materially impair Series C common
          holder returns
        - Capitalization table signed by legal counsel; charter documents for Series A through C preferred terms
      - - Customer Concentration
        - Disclose top-10 customer concentration as percent of ARR and churn history by customer cohort
        - P1
        - >-
          Strategic investor-customers may represent 40-60% of ARR; concentration risk in a usage-based model is acute
          if one health system reduces volume
        - Customer concentration report; contract renewal schedule for top-10 accounts
      - - EHR Integration Documentation
        - Provide Epic and Cerner API integration architecture and any partnership or integration agreements
        - P1
        - >-
          EHR integration is the competitive moat against native Epic/Cerner AI features; depth and exclusivity of
          integration is a key differentiator
        - >-
          Technical integration architecture document; any Epic App Orchard registration or Cerner integration
          documentation
      - - Safety Audit Evidence
        - Provide independent audit of safety validation protocols and Polaris 3.0 accuracy claim corroboration
        - P1
        - >-
          99.38% accuracy is self-reported; no independent clinical audit identified; safety claim is central to the
          commercial value proposition
        - IRB study results or peer-reviewed clinical study; independent third-party audit report
      - - M&A Pipeline Disclosure
        - 'Disclose Series C M&A pipeline: targets under consideration, deal status, and capital allocated'
        - P2
        - >-
          Series C earmarks M&A; undisclosed acquisitions introduce execution risk and could dilute focus during a
          critical product expansion phase
        - Board-approved M&A framework; summary of active due diligence targets under NDA
      - - International Revenue Breakdown
        - Disclose revenue or contract value by geography for the 6-country footprint
        - P2
        - >-
          International expansion is cited as a growth driver; non-US contracts may carry different reimbursement,
          regulatory, and contract value profiles than US health system deals
        - Revenue breakdown by geography or country-level partner count with ACV ranges
