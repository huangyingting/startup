  - id: SV-4
    title: Bull, Base, and Bear Scenarios
    body: |
      The investment case resolves into three scenarios driven by ARR growth, competitive
      positioning, and regulatory outcomes over a 3-5 year horizon.

      Bull case (probability weight: 25%): Hippocratic AI executes on its stated strategy,
      achieving ARR of $100M-$200M by end-2026 and $400M-$600M by 2028 on the strength of
      the AI Front Door and Nurse Co-Pilot product launches, international expansion across
      6+ countries, and strategic M&A funded by the Series C. In this scenario the company
      maintains 100%+ ARR growth, NRR exceeds 120% reflecting usage expansion within health
      systems, and NVIDIA partnership provides sustained GPU access advantage. At 20-30x ARR
      on $500M, the 2028 valuation is $10-15B, representing a 2.9x-4.3x return on the $3.5B
      Series C mark. A strategic acquisition by Microsoft (EHR AI integration), Google (health
      AI cloud), or Epic (patient engagement platform) at $12-20B would represent 3.4x-5.7x
      return. This scenario requires FDA to maintain the non-SaMD classification through 2028
      and Epic/Cerner integration to remain accessible.

      Base case (probability weight: 45%): The company grows ARR from the diligence-estimated
      $37.5M base to $150-250M by 2028 on 60-80% annual growth, driven by deeper penetration
      of existing health system partners and measured international expansion. The AI Front Door
      and Nurse Co-Pilot products add incremental revenue but face 12-18 month enterprise
      procurement cycles. NVIDIA partnership holds. FDA classification is unchanged. In this
      scenario the company raises a Series D at $5-7B (1.4-2x the current $3.5B mark) and
      IPOs or is acquired by 2029-2031 at 15-25x on $300M+ ARR, yielding an exit valuation
      of $4.5-7.5B. Returns from the Series C entry: 1.3-2.1x. This is a positive but
      not exceptional return for growth-stage capital.

      Bear case (probability weight: 30%): Revenue is below $25M ARR at the Series C mark;
      growth decelerates to 30-50% YoY as health system procurement slows, Epic/Cerner launch
      competing AI outreach features as bundle offerings, and the FDA initiates an inquiry into
      SaMD reclassification. A patient safety incident at a named health system triggers
      contract scrutiny and reputational damage. The Series D occurs at $2-3B (flat or
      down-round), diluting Series C investors. The 2028 valuation at 10-15x on $75M ARR is
      $750M-$1.1B — below the $3.5B Series C entry. Capital loss is the outcome.
