chapter:
  number: 8
  title: Valuation and Return Analysis
  summary: |
    Hippocratic AI's November 2025 Series C established a $3.5B post-money valuation on total
    disclosed capital of $404M+, implying approximately 70–350x trailing ARR depending on
    revenue estimates that range from $10M to $50M annually. The company has disclosed no
    audited financials, making precise revenue-multiple analysis impossible. Closest public
    comps — Abridge (ambient clinical documentation AI), Suki AI, and the 2021 Nuance/Microsoft
    deal — trade or traded at 10–150x ARR; Hippocratic is at or above the top of that range.
    Bull-case justification requires Hippocratic to achieve $200M+ ARR by 2028 and command a
    15–20x forward multiple at exit, implying ~3–5x return from the $3.5B entry. A base case
    of $50–80M ARR by 2028 implies exit values of $750M–1.5B, representing a loss from Series C.
    Bear-case risks include healthcare liability backlash, regulatory reclassification of
    AI nursing agents as medical devices, and a narrowing path to clinical reimbursement.
    Recommendation: track — pending audited revenue disclosure and observable churn/NRR data
    from named health system customers before committing capital at this valuation.

