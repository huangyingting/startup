  - id: TV005
    title: Thesis-break and kill triggers table
    notes: >-
      Kill triggers are analyst-defined thresholds; monitoring cadence recommendations reflect the urgency and liquidity
      of each risk category for a growth-stage investor.
    columns:
      - Trigger Event
      - Early Signal
      - Rationale
      - Kill Action
    rows:
      - - FDA SaMD Reclassification Order
        - >-
          FDA issues formal guidance or enforcement letter classifying AI patient agents as SaMD requiring 510(k)
          clearance
        - >-
          Would freeze commercial deployment, trigger product redesign, and impose 6-18 month clearance process with
          $500K-$2M regulatory cost; revenue growth halts
        - Exit position immediately or reduce to minimal tracking stake; seek secondary buyers before public news breaks
      - - NVIDIA Partnership Termination
        - NVIDIA publicly withdraws strategic investment or discontinues GPU allocation priority for Hippocratic AI
        - >-
          H100/H200 GPU access is critical for real-time voice AI inference; loss of NVIDIA relationship raises compute
          COGS and destroys the partnership credibility signal
        - >-
          Exit within 90 days; GPU dependency makes the business model uneconomic at scale without the strategic
          relationship
      - - Named Customer Churn with Safety Disclosure
        - >-
          A named health system (UHS, WellSpan, Cincinnati Children's) publicly terminates contract citing AI safety or
          quality concerns
        - >-
          Contract termination with safety citation triggers regulatory scrutiny, media attention, and other health
          system contract reviews in rapid sequence
        - Exit immediately; one safety-cited churn creates a cascading review risk across all 50+ partners
      - - Epic or Cerner Displaces 3+ Named Customers
        - >-
          Three or more named Hippocratic AI health system customers switch to Epic Cosmos AI or Cerner AI patient
          engagement within 12 months
        - >-
          Signals that EHR bundling strategy is succeeding in displacing Hippocratic's integration moat; the competitive
          moat is cracking
        - Exit within 6 months; reduce exposure before next funding round reveals the churn
      - - Series D at Flat or Down Valuation
        - Next financing round prices at or below $3.5B post-money valuation
        - >-
          Down-round signals stalled ARR growth, market concern about competitive dynamics, or investor fatigue;
          compresses future return multiple materially
        - >-
          Do not participate in Series D; begin orderly position reduction; target secondary sale above $3.5B before
          round closes
      - - ARR Growth Falls Below 50% YoY
        - Company discloses or data room reveals ARR growth rate below 50% year-over-year for two consecutive quarters
        - >-
          At 93x+ ARR multiple, growth deceleration below 50% makes the $3.5B valuation mathematically indefensible vs
          comparable company multiples
        - Reassess position within 30 days of data availability; initiate exit process if confirmed
