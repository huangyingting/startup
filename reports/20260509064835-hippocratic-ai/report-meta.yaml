companyProfile:
  summary: >
    Hippocratic AI is a Palo Alto-based clinical AI company founded in May 2023 by Munjal Shah
    (CEO) and Karandeep Anand. The company deploys AI nursing agents — powered by its proprietary
    Polaris 3.0 model (22 LLMs, 4.2 trillion parameters) — that handle post-discharge follow-up,
    chronic-care management, and medication adherence for 35+ U.S. health systems. Backed by
    $404M+ across four rounds and valued at $3.5B after its November 2025 Series C, it is one
    of the most highly capitalized pure-play clinical AI agent companies globally.
  productSummary: >
    The core product is an AI agent platform priced at $9/agent-hour that allows health systems
    to scale patient communication without adding clinical headcount. Polaris 3.0 orchestrates
    22 specialized language models (4.2T parameters) with a multi-layer safety stack that the
    company reports has produced zero adverse patient incidents across 115M+ interactions. The
    platform targets reimbursable chronic-care management (CCM) CPT codes, allowing health systems
    to partially offset deployment cost through Medicare billing.
  foundedDate: "2023-05-01"
  founders:
    - name: Munjal Shah
      role: "CEO & Co-founder"
      background: >
        Serial entrepreneur; previously founded Like.com (acquired by Google) andArka (acquired).
        Conceived Hippocratic AI after observing staffing shortages at health system partners.
      claimRefs: [CO005]
    - name: Karandeep Anand
      role: "Co-founder"
      background: >
        Former Chief Digital Officer at UC San Diego Health and VP of Product at Microsoft Health;
        brings enterprise health system integration and EHR workflow expertise.
      claimRefs: [CO006]
  foundingLocation: "Palo Alto, California, USA"
  headquarters: "Palo Alto, California, USA"
  customerFocus: "U.S. health systems and hospital networks (35+ customers)"
  businessModel: >
    Usage-based SaaS: $9/agent-hour for AI nursing interactions; revenue scales with interaction
    volume. Secondary revenue from chronic-care management (CCM) reimbursement facilitation.
  stage: "Series C"
  fundingStatus: >
    $126M Series C (Nov 2025, $3.5B post-money, General Catalyst lead); $141M Series B
    (Jun 2024, $1.64B, General Catalyst/a16z); $53M Series A (Feb 2024); ~$30M Seed.
    Total disclosed: ~$404M+.
  claimRefs: [CV001, CV002, CV003]

summary:
  headline: >
    Hippocratic AI commands a $3.5B valuation on unverified revenue of an estimated $10–50M ARR,
    implying 70–350x trailing multiple — stretched even for a high-growth healthcare AI leader.
    Track pending audited revenue disclosure and observable NRR data from named health system customers.
  overallScore: 5.8
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched
