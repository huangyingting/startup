  - id: FU002
    title: Deployment funnel — partner acquisition to production scale
    type: flow
    notes: >-
      Illustrates the funnel from Hippocratic AI's total potential enterprise health system addressable market (large US
      health systems) through to confirmed production deployments and expansion. Numbers are diligence estimates based
      on publicly disclosed aggregate figures. The funnel reveals a significant gap between 'signed partner' count (50+)
      and 'confirmed named production deployment' (6 confirmed).
    data:
      nodes:
        - id: F1
          label: US Health Systems (addressable)
          detail: >-
            Approximately 6,000 US hospitals; Hippocratic AI's primary TAM is large health systems (500+ beds) and IDNs
            — approximately 600–700 addressable enterprise accounts in the US; additional addressable market in payers
            (~50 large MCOs) and pharma (~25 large pharma companies)
          type: input
        - id: F2
          label: Engaged / In Pipeline
          detail: >-
            Estimated 150–300 health systems have had substantive sales conversations based on typical enterprise health
            IT conversion rates; no disclosure of pipeline size or deal stage from Hippocratic AI
          type: process
        - id: F3
          label: Signed Enterprise Partners (50+)
          detail: >-
            50+ confirmed enterprise contracts across health systems, payers, and pharma in 6 countries as of November
            2025; self-reported by company; individual names not disclosed except for 6 named health system accounts
          type: process
        - id: F4
          label: Active Production Deployments
          detail: >-
            Number of the 50+ partners with active production (vs. pilot or planning) deployments is unknown; based on
            named account evidence, at least 4–5 are in active production: WellSpan (production since Sept 2024), UHS
            (production pilot at 2 hospitals), Cincinnati Children's (AI Front Door April 2026)
          type: process
        - id: F5
          label: Expanded Accounts (Multi-Site / Multi-Use Case)
          detail: >-
            Accounts with confirmed expansion beyond initial deployment: UHS (2 → 29 hospitals planned); WellSpan
            (adding languages, use cases); General Catalyst (re-investment = confidence in commercial expansion
            trajectory)
          type: output
      edges:
        - from: F1
          to: F2
          label: Outbound sales, conference presence, investor referral
