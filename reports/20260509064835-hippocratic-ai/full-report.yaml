          values:
            - Strong — HAP Award, WellSpan press release, CHE article, EIN wire
            - Production — ongoing since Sept 2024
            - Moderate — screening participation improved; no quantified rates
            - Low — no NRR/churn disclosed; HAP award + language expansion as proxy
