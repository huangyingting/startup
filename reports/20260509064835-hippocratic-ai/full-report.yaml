  - id: TV006
    title: Investment Thesis and Anti-Thesis
    columns:
      - Argument
      - Type
      - Evidence Support
      - What Would Change This View
    rows:
      - - >-
          Hippocratic AI is the first scalable AI nursing agent with demonstrated safety record across 115M+ patient
          interactions and 35+ health system customers
        - Thesis (bull)
        - Company-reported; no independent audit
        - Independent audit of patient interactions; confirmed zero-incident safety record by regulatory body
      - - >-
          The nursing shortage creates a $25–56B SAM that a $9/agent-hour product can meaningfully penetrate, justifying
          premium valuation
        - Thesis (bull)
        - Third-party workforce data strong; specific capture rate speculative
        - Disclosed ARR crossing $50M with visible pipeline would strengthen this
      - - >-
          General Catalyst, a16z, and Kleiner Perkins networks provide enterprise sales access and health system
          distribution that de-risks commercial traction
        - Thesis (bull)
        - Investor reputation strong; causal link to customer wins unverified
        - Audited customer win data showing investor-introduced vs. arm's-length contracts
      - - >-
          No audited financial disclosure exists; all revenue estimates are third-party inferences — the $3.5B valuation
          rests on unverified commercial traction
        - Anti-thesis (bear)
        - Strong — absence of Form D and revenue disclosure is well-documented
        - Hippocratic publishes audited ARR or files SEC Form D with terms disclosed
      - - >-
          Investor-customer overlap (WellSpan, Intermountain as both investors and customers) inflates commercial
          adoption signals and limits independent traction evidence
        - Anti-thesis (bear)
        - Medium — documented in press coverage; exact overlap scope unclear
        - Company discloses which customers have no investor relationship
      - - >-
          FDA SaMD reclassification or state nursing board rulings could freeze adoption and impair valuation — this
          risk is not priced into the $3.5B multiple
        - Anti-thesis (bear)
        - Medium — FDA Digital Health COE has increased SaMD scrutiny
        - FDA issues formal guidance classifying AI nursing agents outside SaMD scope
