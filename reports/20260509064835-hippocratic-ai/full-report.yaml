companyProfile:
  summary: >
    Hippocratic AI is a Palo Alto-based clinical AI company founded in May 2023 by Munjal Shah (CEO) and Karandeep
    Anand. The company deploys AI nursing agents — powered by its proprietary Polaris 3.0 model (22 LLMs, 4.2 trillion
    parameters) — that handle post-discharge follow-up, chronic-care management, and medication adherence for 35+ U.S.
    health systems. Backed by $404M+ across four rounds and valued at $3.5B after its November 2025 Series C, it is one
    of the most highly capitalized pure-play clinical AI agent companies globally.
  productSummary: >
    The core product is an AI agent platform priced at $9/agent-hour that allows health systems to scale patient
    communication without adding clinical headcount. Polaris 3.0 orchestrates 22 specialized language models (4.2T
    parameters) with a multi-layer safety stack that the company reports has produced zero adverse patient incidents
    across 115M+ interactions. The platform targets reimbursable chronic-care management (CCM) CPT codes, allowing
    health systems to partially offset deployment cost through Medicare billing.
