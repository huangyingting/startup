    title: Customer proof matrix — evidence quality by customer
    type: matrix
    notes: >-
      Assesses the quality and completeness of public evidence for each named Hippocratic AI customer across five
      dimensions: evidence source, production status, outcome specificity, retention visibility, and investor alignment.
      Higher scores indicate stronger evidence; lower scores indicate greater uncertainty and higher diligence need.
      Ratings reflect only publicly available information as of May 2026.
