  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and Core Product Definition
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI's primary product is the AI Patient Agent — a voice-first generative AI system
              that conducts outbound and inbound patient interactions on behalf of health system, payer, and
              pharmaceutical enterprise customers. The agent uses natural-language voice conversation to execute
              clinical workflows including post-discharge follow-up, chronic disease management, medication
              adherence monitoring, preventive screening outreach, health risk assessments, social determinants
              of health (SDOH) surveys, appointment reminders, and care gap closure. The product supports 1,000+
              distinct clinical use cases across 25+ medical specialties, with a healthcare system "App Store"
              model allowing enterprise customers to configure and deploy specific use case packages.

              The product is explicitly non-diagnostic and non-prescribing by design — agents do not make
              diagnoses, recommend treatments, or prescribe medications. This design choice is both a product
              philosophy (patient safety priority) and a regulatory strategy: by remaining below the threshold
              of clinical decision-making, Hippocratic AI avoids classification as an FDA Software as a Medical
              Device (SaMD), substantially reducing regulatory compliance burden and time-to-market. The company
              asserts this scope covers a vast majority of patient interaction volume that does not require
              diagnostic judgment.

              Multi-lingual capability includes English, Spanish, Haitian Creole, and Nepali, with expanding
              language support as of May 2026. The voice interface uses NVIDIA Avatar Cloud Engine (ACE) for
              speech synthesis with what the company describes as "empathy inference technology" — adjusting
              tone, pacing, and emotional register in response to patient sentiment cues. Outbound calling is
              the primary deployment modality; inbound handling is supported for AI Front Door use cases.

              Two new products launched in April 2026:
              1. **AI Front Door**: An omnichannel patient access agent serving as the entry point for health
              system patient interactions. It routes patients to appropriate care, schedules appointments,
              handles FAQ inquiries, and replaces traditional call center triage. Deployed at Cincinnati
              Children's Hospital and select partners at launch.
              2. **Nurse Co-Pilot**: An AI assistant for bedside nurses handling administrative tasks,
              documentation support, and patient communication workflow management. Unlike the AI Patient
              Agent (which interacts with patients), Nurse Co-Pilot supports nurses directly — a significant
              product expansion from patient-facing to clinician-assisting AI.

              All products operate as HIPAA BAA-compliant hosted services. Integration with electronic health
              record systems (Epic, Cerner) is referenced in the company's clinical capabilities but specific
              integration depth, API access, and Epic App Orchard membership status are not publicly confirmed.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
      - number: '5.2'
        title: Polaris Architecture — Safety Constellation and Technical Design
        blocks:
          - type: paragraph
            body: |
              The Polaris architecture is Hippocratic AI's core technical differentiator and the foundational
              innovation claim supporting the $3.5B valuation. Polaris 3.0 (released March 19, 2025) comprises
              22 specialized large language models with a combined 4.2 trillion parameters — larger in total
              parameter count than any single publicly disclosed model at that time, though parameter count
              alone is not the primary claimed advantage.

              The Safety Constellation Architecture uses a hierarchical multi-agent design:
              - **Primary stateful agent**: A single conversational agent maintains context, manages the patient
                interaction, and coordinates the conversation flow across a full multi-turn patient call.
              - **Specialist subagents**: Multiple parallel specialist LLMs check the primary agent's outputs
                in real time, each specialized for different clinical domains (medications, labs, procedures,
                safety escalation, regulatory compliance, etc.).
              - **Triple verification for critical clinical data**: For medication names, dosages, lab values,
                and other high-stakes clinical data, the architecture requires three independent LLM checks
                before any information is conveyed to the patient.

              This architecture creates fault tolerance against individual LLM hallucination by requiring
              consensus across multiple models — analogous to multi-judge panels in safety-critical systems.
              The research basis is described in a March 2024 arXiv preprint (arXiv:2403.13313) which
              benchmarks Polaris against GPT-4 and LLaMA-70B on healthcare safety evaluations.

              Polaris version history:
              - Polaris 1.0 (2024): 4 LLMs; baseline architecture introduced.
              - Polaris 2.0 (~late 2024): 3.7 trillion parameters; expanded specialist agent set.
              - Polaris 3.0 (March 2025): 22 LLMs, 4.2 trillion parameters; Safety Constellation full deployment.

              Training corpus: Polaris is trained on a combination of proprietary healthcare data from health
              system relationships, clinical protocols, government healthcare regulations, medical procedure
              manuals, and simulated patient-clinician conversation datasets — providing a specialized
              healthcare training distribution not available to general-purpose LLM providers.

              Infrastructure: NVIDIA H100/H200 GPUs, TensorRT-LLM inference optimization, NVIDIA Avatar Cloud
              Engine (ACE) for voice synthesis, and AWS cloud hosting. The system is described as enabling
              ultra-low-latency voice responses required for natural conversational interaction.

              Clinical performance claims (Polaris 3.0, company-reported):
              - 99.38% clinical accuracy rate
              - 6,200+ clinician testers evaluated the system
              - 1.85 million real patient calls used in testing
              - 0.00% severe adverse events in production deployment
              These claims appear in the company's official Polaris 3.0 announcement and research page but
              have not been independently peer-reviewed or validated by an external clinical authority.
            claimRefs:
              - CE008
              - CE009
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
      - number: '5.3'
        title: Clinical Validation, Safety, and Compliance Framework
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI's clinical safety framework is the most consequential and most publicly debated
              aspect of its product. The company operates a multi-phase validation process combining human
              clinical expertise with automated benchmarking.

              **Clinician validator network**: 7,500+ US-licensed healthcare professionals — comprising
              approximately 6,000+ registered nurses, 300+ physicians, and 1,200+ other clinicians — serve
              as a testing and validation workforce. Validators engage the AI agents in simulated patient
              scenarios across the 1,000+ clinical use cases, rating response accuracy, safety, and clinical
              appropriateness. This validator network is the human backbone of the safety certification process.

              **Multi-phase certification**: Each clinical use case undergoes simulation testing (AI-to-AI
              adversarial scenarios), clinical validator review (human expert scoring), accuracy scoring, and
              safety escalation protocol verification before deployment. Use cases failing safety thresholds
              are withheld from deployment.

              **Real-world evidence (RWE) monitoring**: Hippocratic AI has developed a Real-World Evidence
              LLM (RWE-LLM) framework for ongoing monitoring of production interactions, enabling continuous
              quality assessment after deployment.

              **Non-diagnostic scope as regulatory positioning**: By explicitly restricting agents from
              diagnosis or prescribing, Hippocratic AI argues its products fall outside FDA SaMD classification
              under current regulatory guidance. This is a company's legal interpretation, not a regulatory
              determination — the FDA has not formally affirmed or denied this position. The January 2025 FDA
              draft guidance on AI-enabled device software functions (published in the Federal Register)
              introduced new considerations for AI systems involved in patient care workflows, creating
              uncertainty about how the SaMD classification boundary may evolve.

              **HIPAA compliance**: All products are deployed under HIPAA Business Associate Agreements (BAAs)
              with health system customers. Data handling, storage, and transmission meet BAA requirements.

              **IP and competitive moat**: The Polaris architecture appears unique in the patient-facing AI
              field — no direct competitor has disclosed an equivalent multi-LLM safety constellation with
              clinical validation at comparable scale. However, the core IP is partially exposed in the March
              2024 arXiv preprint, and the safety approach is replicable by well-capitalized competitors with
              access to clinical networks. NVIDIA's strategic investment creates a hardware partnership that
              provides some technology access differentiation, but GPU infrastructure itself is not exclusive.

              **Adverse signals**: Independent critics and healthcare scholars have raised concerns about
              AI agents interacting with vulnerable patient populations (elderly, chronically ill, low health
              literacy), the potential for AI hallucination in clinical contexts, and the societal implications
              of replacing human clinical communication with AI. The Advisory Board has noted that some
              clinicians view AI patient agents with skepticism about emotional care quality. PSQH has published
              analysis of AI hallucination risks in healthcare contexts. These adverse signals have not
              demonstrably slowed Hippocratic AI's enterprise deployment to date.
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
      - number: '5.4'
        title: Deployment, Integration, Roadmap, and Differentiation
        blocks:
          - type: paragraph
            body: |
              **Deployment model**: Hippocratic AI operates as a cloud-hosted B2B SaaS with enterprise health
              system, payer, and pharma customers accessing agents via API and voice channel integrations.
              Health systems configure the agents to their specific use cases via the App Store model — selecting
              from the 1,000+ pre-validated use case library without requiring custom model development.
              Outbound calls are initiated from the health system's patient engagement platform. Inbound calls
              (AI Front Door) are routed from the health system's existing phone infrastructure.

              **EHR integration**: The depth of EHR integration is not fully disclosed. Health system customers
              operate Epic and Cerner EHR systems. Some level of integration is required for post-discharge
              follow-up use cases (accessing discharge instructions, medication lists, follow-up care plans).
              The company has not confirmed Epic App Orchard membership (unlike Hyro AI, which publicly
              documents this), which is a material gap in the enterprise deployment claim.

              **International expansion**: As of May 2026, Hippocratic AI operates in 6 countries. Series C
              use-of-funds includes international expansion, suggesting active growth into new markets. Specific
              country names, regulatory status, and clinical validation approach for international clinical
              guidelines are not disclosed.

              **Roadmap signals**: The company has referenced expanding to 1,500+ clinical use cases (from the
              current 1,000+). Pharma use cases (clinical trial patient support, medication adherence) are
              growing. The Nurse Co-Pilot launch represents a pivotal strategic expansion from patient-facing
              to clinician-assisting AI — widening the total addressable market to include nursing workflow
              efficiency budgets. M&A is explicitly signaled in Series C use-of-funds, suggesting potential
              product capability acquisitions (EHR integration deepening, international health system networks,
              or clinical data assets).

              **Technical differentiation summary**: Hippocratic AI's strongest technical differentiators are:
              (1) Polaris Safety Constellation — multi-LLM consensus-based safety verification, (2) 7,500+
              clinical validator network providing the proprietary healthcare training signal, (3) NVIDIA
              strategic partnership for GPU infrastructure and TensorRT-LLM optimization, and (4) the non-
              diagnostic scope that creates regulatory simplicity without sacrificing the vast majority of
              patient interaction volume. The weakest differentiator publicly is EHR integration depth —
              Hyro AI documents deeper Epic integration, creating a material competitive gap at Epic-dominant
              health systems.
            claimRefs:
              - CE024
              - CE025
              - CE026
              - CE027
              - CE028
              - CE029
              - CE030
