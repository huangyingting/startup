          detail: 5T+ parameter constellation of ~30 LLMs; validated by 7,500+ clinicians; 0.00% severe harm rate
        - id: products
          label: Product Suite
          detail: AI healthcare agents (chronic care, post-discharge, screening outreach); AI Front Door; Nurse Co-Pilot
        - id: customers
          label: Enterprise Customers
          detail: 50+ health systems, payers, pharma in 6 countries; Cleveland Clinic, Northwestern, UHS, WellSpan
        - id: data_loop
          label: Interaction Data Loop
          detail: 180M+ patient interactions; real-world safety validation; model improvement cycle
        - id: capital
          label: Capital Stack $404M
          detail: Seed → Series A → NVIDIA → Series B → Series C; $3.5B valuation; General Catalyst, Kleiner Perkins, Avenir
        - id: pricing
          label: $9/Agent-Hour Model
          detail: Usage-based B2B; 4x cheaper than median RN hourly rate; aligns cost with utilization
