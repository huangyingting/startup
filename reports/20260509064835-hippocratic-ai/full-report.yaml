  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Overview and Partner Scale
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI's stated customer base as of May 2026 spans 50+ enterprise partnerships across
              health systems, payers, and pharmaceutical companies in 6 countries. Growing from zero enterprise
              customers at commercial launch (June 2024) to 50+ in under 24 months implies approximately
              2–3 new enterprise accounts per month. The company reports 115M+ clinical patient interactions
              across this partner base — signaling both breadth of customer accounts and meaningful deployment
              depth within individual customers.

              The customer base segments into three primary buyer types:
              1. **Health systems** (hospital networks and integrated delivery networks): Primary and largest
                 segment; confirmed named accounts include WellSpan Health, Universal Health Services, Cincinnati
                 Children's Hospital, University Hospitals, and UNC Health.
              2. **Payers** (health insurance companies and managed care organizations): Secondary segment
                 with HEDIS gap closure and member engagement use cases; no specific payer names are publicly
                 disclosed as of May 2026.
              3. **Pharmaceutical companies**: Growing segment per Series C use-of-funds disclosure; medication
                 adherence, clinical trial patient support, and patient education are primary use cases; no
                 pharma partner names are publicly disclosed.

              At least 4 of the 50+ partners are also strategic investors (WellSpan Health, Uniting Care
              Queensland, Universal Health Services, and Cincinnati Children's), creating a customer-investor
              overlap that requires separate analysis for commercial versus strategic motivations. These
              investor-customers were early adopters by design — their equity investment aligned incentives
              toward deployment — and their continued expansion signals (UHS rolling to all 29 hospitals)
              suggests genuine commercial value beyond investment alignment.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
      - number: '6.2'
        title: Named Customer Accounts and Case Studies
        blocks:
          - type: paragraph
            body: |
              **WellSpan Health** (York, PA — large regional IDN, strategic investor since Nov 2023):
              WellSpan was among the first major health systems globally to deploy Hippocratic AI's agent,
              branded as "Ana," for cancer screening outreach (colorectal/colonoscopy) and colonoscopy prep
              support. The deployment targets health equity — outreach in Spanish with plans to add Haitian
              Creole and Nepali. WellSpan's 2025 HAP Achievement Award (Hospital and Healthsystem Association
              of Pennsylvania) provides third-party recognition. WellSpan noted positive clinical staff impact
              and increased screening participation among language-barrier patients.

              **Universal Health Services (UHS)** (King of Prussia, PA — 29-hospital acute care network,
              strategic investor): UHS deployed Hippocratic AI agents for post-discharge patient engagement,
              initially at Summerlin Hospital Medical Center (Las Vegas, NV) and Texoma Medical Center (TX).
              UHS reported a mean patient satisfaction rating of approximately 9/10 from contacted patients
              and is expanding system-wide to all 29 acute care hospitals.

              **Cincinnati Children's Hospital Medical Center** (Cincinnati, OH — top-3-ranked US pediatric
              health system, Series C investor): Confirmed AI Front Door launch partner (April 2026) handling
              inbound patient triage, scheduling, and FAQ management for a top-ranked pediatric institution.

              **Uniting Care Queensland** (Brisbane, Australia — Series Seed investor): Hippocratic AI's
              primary confirmed international customer; specific use cases not publicly detailed. Operates
              community health, aged care, and hospital services.

              **University Hospitals** (Cleveland, OH): Collaboration announced September 2025 for patient
              engagement and chronic care management — a non-investor named enterprise account.

              **UNC Health** (Chapel Hill, NC): Referenced in April 2026 expansion announcement as an
              additional health system partner.
            claimRefs:
              - CU007
              - CU008
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
              - CU014
              - CU015
      - number: '6.3'
        title: Use Case Deployment and Clinical Coverage
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI's 1,000+ clinical use cases span non-diagnostic, non-prescribing patient
              interaction workflows. Confirmed deployed use cases at named accounts:
              - **Post-discharge follow-up** (UHS): Outbound calls reviewing discharge instructions, screening
                for readmission risk, confirming medication pickup, and scheduling follow-ups. Highest-volume
                confirmed use case — thousands of patients contacted in pilot phase alone.
              - **Preventive screening outreach** (WellSpan): Colorectal cancer and mammography outreach;
                multi-lingual to underserved populations; HAP Award recognized impact.
              - **AI Front Door / Patient Access** (Cincinnati Children's): Inbound triage, scheduling, FAQ.
              - **Chronic disease management, medication adherence, SDOH surveys**: Referenced in company
                materials and Series C communications; not attributed to named customers in public sources.
              - **Pharma patient support**: Medication adherence and clinical trial support referenced for
                the pharma segment; no named pharma partner disclosed.

              The App Store model allows health system customers to configure and deploy from 1,000+
              pre-validated use cases without custom development, enabling fast time-to-deployment and
              standardized quality across the partner base. Use case volume distribution across 50+ partners
              is not disclosed; post-discharge and screening use cases appear highest-volume based on named
              account evidence.
            claimRefs:
              - CU016
              - CU017
              - CU018
              - CU019
              - CU020
      - number: '6.4'
        title: Commercial Model and Revenue Proxy
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI's public pricing is $9 per agent-hour — directly positioning against RN-performed
              patient communication at $39–65/hour all-in. This 14–23% cost ratio is the core commercial
              proposition: healthcare organizations can deploy AI patient communication at a fraction of RN
              all-in labor cost, with travel/agency RN rates ($75–120/hr) offering even greater displacement.

              **Revenue proxy analysis** (diligence estimation — not company-disclosed):
              - 115M interactions × avg 10–15 min = 19–29M agent-hours cumulative since June 2024 launch
              - At $9/agent-hour: cumulative gross billings $171–261M; implied ARR $114–174M at November
                2025 run-rate (assumes no volume discounts or non-billable periods)
              - ACV-based alternative: 50 partners × $500K–$2M ACV = $25M–$100M ARR
              - At $3.5B valuation: 35x ARR (high-end) to 140x ARR (low-end) — vs. healthcare AI private
                market comps at 15–25x ARR (2025 data)

              Hippocratic AI has not disclosed revenue, ARR, NRR, or contract structures. All estimates are
              proxy calculations based only on public pricing and interaction count.
            claimRefs:
              - CU021
              - CU022
              - CU023
              - CU024
              - CU025
              - CU026
      - number: '6.5'
        title: Customer Satisfaction, Retention, and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              **Satisfaction signals:** UHS reports mean patient satisfaction of ~9/10; WellSpan received
              HAP Achievement Award; zero safety incidents claimed across 115M+ interactions (self-reported,
              unaudited); no health system customer has publicly cited a clinical safety complaint or contract
              cancellation. These are positive signals but all are either self-reported or from investor-aligned
              customers, limiting independent verification.

              **Retention and expansion signals:** UHS expanding from 2 pilots to 29 hospitals; General
              Catalyst re-invested in Series C (having led Series B) — the strongest institutional validation;
              50+ partners in 24 months implies a functioning land-and-expand motion.

              **Concentration and dependency risk:** At least 4 of 50+ partners are equity investors. Their
              equity alignment inflates apparent retention metrics. The ~46 unnamed non-investor partners have
              no equity stake and may have lower switching barriers. Departure of any named investor-customer
              would have dual impact: revenue reduction AND reputational damage. Customer NPS, NRR, and
              clinical outcome data (readmission rates, adherence improvement) are entirely absent from public
              sources — the most critical missing metrics for institutional diligence at the $3.5B valuation.
            claimRefs:
