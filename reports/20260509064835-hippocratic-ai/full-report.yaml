  - id: TV007
    title: Thesis-Break Triggers and Kill Signals
    columns:
      - Trigger
      - Threshold
      - Thesis Impact
      - Action
    rows:
      - - FDA SaMD reclassification
        - Any FDA guidance treating patient-facing AI agents as requiring 510(k) clearance
        - Catastrophic — freezes all US deployments pending 18–36 month approval
        - Exit position immediately; capital return to LPs if early-stage
      - - High-profile patient harm event
        - Any media-reported patient harm attributed to Hippocratic AI agent
        - Severe — triggers health system adoption freeze; class action liability risk
        - Suspend further deployment due diligence; await regulatory investigation outcome
      - - Down-round or flat round at Series D
        - Series D priced at or below $3.5B
        - Confirms bull thesis has failed to materialize; investor confidence broken
        - Exit any secondary position; do not follow on
      - - NRR below 90% at first disclosure
        - Any disclosed NRR figure below 90%
        - Material — indicates customer churn or downsell pressure; durability thesis fails
        - Revise ARR growth forecast sharply downward; move to avoid
      - - ARR stagnation below $30M through 2026
        - ARR confirmed below $30M (current estimate) in any public disclosure
        - Moderate — suggests commercial penetration slower than implied by valuation
        - Reassess Series D entry price; require steep discount
    claimRefs:
      - CV014
      - CV015
      - CV016
