          - type: callout
            title: Google CapitalG Investment Creates 2-3 Year Competitive Buffer
            body: |
              CapitalG's participation in Hippocratic AI's Series C creates a conflict-of-interest barrier to
              near-term direct competition from Google Health. While Google possesses Med-PaLM 2 capabilities
              and HCA healthcare relationships, Hippocratic's investor status limits Google's immediate freedom
              to build a competing patient-facing AI agent product. This buffer likely extends 2–3 years while
              the investment relationship is active, after which the competitive risk from Google's capabilities
              becomes material if Hippocratic has not established irreversible scale advantages.
