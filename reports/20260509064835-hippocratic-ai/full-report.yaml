  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI's most acute structural risk is regulatory reclassification. The company's
              deliberate design constraint - non-diagnostic, non-prescribing AI agent interactions - is intended
              to position the product below the FDA's Software as a Medical Device (SaMD) threshold, thereby
              avoiding the 510(k) premarket notification or De Novo pathway requirements. This positioning has
              held through 2024 and into 2026, but FDA's January 7, 2025 draft guidance (FDA-2024-D-4488) on
              AI-Enabled Device Software Functions signals active regulatory attention to AI systems in clinical
              contexts that were previously unregulated. If the FDA interprets Hippocratic AI's products as
              meeting SaMD criteria - for example, because they influence clinical decision-making indirectly
              by shaping patient behavior and adherence - the company would face a mandatory 510(k) clearance
              process. This process typically takes 6 to 18 months, costs $500K-$2M in regulatory consulting
              and clinical testing, and could require product design changes that alter the value proposition.

              HIPAA compliance risk is operational and ongoing. As a Business Associate to all health system
              customers, Hippocratic AI must maintain Business Associate Agreements and comprehensive PHI
              security controls. HIPAA civil monetary penalties range from $100 to $50,000 per violation up
              to $1.9M annually per violation category, with criminal referral possible for willful neglect.
              The company processes high-volume patient interaction data across multiple cloud and AI systems,
              creating a materially broader attack surface than traditional healthcare software. HHS enforcement
              has continued to intensify through 2025, with OCR settlements averaging $1.2M. State-level AI
              legislation creates an additional fragmented compliance layer. California's proposed AI bias audit
              bill and New York's draft AI transparency legislation for healthcare applications would impose
              mandatory algorithmic bias testing, audit documentation, and disclosures to patients about AI
              interaction. If these bills pass in 2025 to 2026, Hippocratic AI would face compliance costs
              estimated at $500K-$3M in engineering, legal, and audit fees per major jurisdiction. Federal
              legislative activity - including House Bill 119 introduced in early 2025 - further signals
              congressional appetite for AI healthcare regulation. The company has no known pending litigation
              or regulatory enforcement actions as of May 2026, but absence of past enforcement is not
              predictive of future risk in a rapidly evolving regulatory landscape. The risk is compounded by
              the absence of any public SOC 2 Type II or HITRUST certification documentation.
            claimRefs:
              - CR001
              - CR002
