  - id: TM004
    title: Growth drivers and constraints table
    type: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Based on BLS labor data, HRSA workforce projections, CMS regulatory framework, Advisory Board research, and FDA
        regulatory announcements. Coverage is partial as enterprise adoption velocity data is not publicly available at
        chapter time.
    columns:
      - label: Driver / Constraint
      - label: Direction
      - label: Timing
      - label: Implication
      - label: Diligence Ask
    rows:
      - - Structural nursing shortage (295,800 RN deficit in 2025; 500K+ by 2030)
        - Growth driver — very strong
        - Now through 2030+
        - >-
          Creates unavoidable demand for AI labor substitution in non-clinical administrative tasks; raises willingness
          to pay
        - >-
          Confirm which workflow categories health system partners are deploying Hippocratic into; is it RN replacement
          or augmentation?
      - - Healthcare labor cost inflation (~5% annually)
        - Growth driver — strong
        - Ongoing
        - At 5% annual RN wage growth, AI agent ROI improves every year; tipping point for more use cases
        - Request cost-per-engagement data from two to three health system partners to validate actual cost savings
      - - Value-based care program expansion (CMS ACO REACH, CMMI, star ratings)
        - Growth driver — strong
        - 2024–2027 peak policy impact
        - >-
          Health systems and Medicare Advantage plans under VBC contracts are incentivized to proactively engage
          patients; AI agents are a scalable tool
        - Confirm which partners are under ACO REACH or MSSP; quantify star rating impact on revenue at stake
      - - Aging US population (10,000 boomers/day reaching 65)
        - Growth driver — structural
        - 2025–2035
        - Medicare volume growth increases demand for patient outreach, care management, and chronic disease monitoring
        - Track Medicare Advantage partner concentration vs commercial insurer exposure
      - - FDA AI/SaMD regulatory uncertainty (draft guidance Jan 2025)
        - Constraint — material
        - 2025–2027
        - >-
          Unclear scope of FDA oversight creates compliance overhead; some workflows may require 510(k) clearance; slows
          enterprise decision-making
        - >-
          Obtain FDA engagement history from Hippocratic legal/regulatory team; confirm which use cases are classified
          as general wellness vs SaMD
      - - Health system IT integration complexity (Epic, Cerner)
        - Constraint — moderate
        - Ongoing
        - >-
          Epic App Orchard certification and EHR integration add 3–6 months to implementation timelines and IT resource
          requirements at each health system
        - Confirm Epic App Orchard status; request list of EHR integrations live in production
      - - Clinician skepticism of AI patient-facing tools
        - Constraint — moderate
        - Now
        - >-
          Nurses and physicians express safety concerns about AI replacing clinical judgment; internal buy-in required
          beyond C-suite; slows rollout
        - >-
          Request clinical governance structure from two to three partner health systems; assess whether CMIO/CNIO are
          champions or resistors
      - - Health system budget pressure (1–2% operating margins)
        - Constraint — moderate
        - Ongoing
        - >-
          At thin margins, CFOs require documented cost savings before expanding; pilot programs may stretch 6–12 months
          before scale decision
        - >-
          Request Hippocratic pilot-to-scale conversion rates and timeline data; validate ROI documentation provided to
          health system partners
