  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: "hippocratic-ai-actual-arr-revenue"
      missingEvidence: "Hippocratic AI has not disclosed actual ARR, agent utilization rates, or average revenue per partner. SOM calculations are estimates based on pricing and assumed deployment scale."
      whyItMatters: "Without actual ARR, the $3.5B valuation cannot be grounded in a revenue multiple; the implied revenue multiple could range from 26× to 155× depending on actual ARR."
      diligencePath: "Request ARR, average agents deployed per partner, and average monthly revenue per partner from Hippocratic AI CFO under NDA."
      relatedQuestionRefs: [QM027]

