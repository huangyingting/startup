callouts:
  - calloutType: strength
    title: "Structural Labor Shortage Creates Durable Demand"
    body: |
      The 295,800 RN deficit in 2025 (HRSA) is not cyclical — it reflects a demographic mismatch between
      aging RN workforce and growing patient volume. At $39/hr median RN wage vs $9/hr Hippocratic agent cost,
      the ROI case for well-bounded administrative workflows does not require a market development argument.
      This is a displacement sale to a budget that already exists and is growing 5% annually.
    claimRefs: [CM021, CM022, CM023]

  - calloutType: risk
    title: "FDA SaMD Uncertainty Could Reclassify Key Workflows"
    body: |
      The FDA's January 2025 draft guidance on AI-enabled SaMD creates material regulatory uncertainty for
      Hippocratic's patient-facing agents. If the FDA determines that AI agents providing health information
      to patients constitute a medical device — even at the general wellness tier — compliance costs would
      increase and enterprise adoption timelines would lengthen. No public FDA communication has clarified
      Hippocratic's current regulatory status.
    claimRefs: [CM026, CM031]

  - calloutType: risk
    title: "Market Sizing Estimates Are Structurally Misaligned with Hippocratic's Sub-Segment"
    body: |
      All public analyst market sizes for healthcare AI significantly overstate the TAM relevant to Hippocratic.
      The most specific public figure — Strategic Market Research's $1.82B AI patient engagement market — still
      includes non-conversational SaaS tools. No analyst has sized the AI patient-facing agent sub-segment
      independently. SOM estimates are diligence constructions, not confirmed revenue figures.
    claimRefs: [CM033, CM034, CM036]

  - calloutType: insight
    title: "Payer Segment May Offer Faster Procurement Than Health Systems"
    body: |
      Medicare Advantage payers under CMS star rating pressure have a direct financial incentive (plan profitability
      tied to star ratings) and shorter procurement cycles (6–12 months vs 12–18 months for health systems).
      AI patient engagement directly addresses HEDIS measures that determine star ratings. This segment may
      offer faster SOM expansion than the health system channel.
    claimRefs: [CM015, CM017, CM020]

