  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Notable Health funding and valuation — incomplete competitor profile"
      missingEvidence: "Notable Health's exact total funding, most recent valuation, and current enterprise client count are not publicly disclosed. The $100M+ estimate is based on round announcements and third-party reporting; no primary source confirms exact amounts."
      whyItMatters: "Without precise funding and scale data for Notable Health, the competitive profile table and funding comparison are estimates rather than confirmed figures. If Notable has raised significantly more (e.g., $200M+), it represents a materially more capable competitor than assessed."
      diligencePath: "Request Notable Health's most recent investor deck, Crunchbase/PitchBook database check for confirmed round amounts; cross-reference with a16z and GV portfolio disclosures."
      relatedQuestionRefs: [QP024]

    - type: missing-source
      severity: material
      topic: "Babylon Health failure pattern — limited case documentation"
      missingEvidence: "Babylon Health's failure details (financial structure, specific regulatory triggers, delisting timeline, asset acquirer) are not fully documented in the retained sources. The failure is known but the specific causal factors most relevant to Hippocratic risk comparison are not analyzed in available source material."
      whyItMatters: "Understanding the specific failure mode (burn rate, regulatory barrier, competitive displacement, or execution failure) determines which failure patterns are most analogous to Hippocratic AI's situation at $3.5B valuation."
      diligencePath: "Review Babylon Health SEC filings, press coverage of delisting, and post-mortem industry analysis to identify specific causal failure chain."
      relatedQuestionRefs: [QP028]

    - type: private-evidence-only
      severity: material
      topic: "Hyro AI pricing — not publicly disclosed"
      missingEvidence: "Hyro AI does not publish pricing. Without Hyro pricing, the head-to-head pricing comparison between Hippocratic ($9/hr) and Hyro is incomplete. Hyro may be pricing at or below $9/hr to compete directly."
      whyItMatters: "If Hyro is pricing at $5-7/hr or offering equivalent functionality at lower cost, Hippocratic's pricing advantage is not as decisive as the $9/hr vs $39/hr RN wage comparison suggests. Pricing competition between Hippocratic and Hyro is a key unresolved competitive dynamic."
      diligencePath: "Request channel checks with health systems evaluating both Hippocratic AI and Hyro AI; seek customer reference calls who have evaluated both platforms; request Hippocratic AI's competitive displacement win/loss data."
      relatedQuestionRefs: [QP004]

    - type: private-evidence-only
      severity: blocking
      topic: "Hippocratic AI safety metrics — no independent peer review"
      missingEvidence: "No peer-reviewed clinical trial publication independently validates Hippocratic AI's 99.38% clinical accuracy or 0.00% severe harm event rate. The arXiv preprint uses company-controlled evaluation design. The 7,500+ clinician validators are compensated by Hippocratic, raising methodology independence questions."
      whyItMatters: "Independent safety validation is a prerequisite for hospital credentialing, payer coverage, and board-level clinical governance approval at large health systems. Without peer review, Hippocratic's safety claims carry company-interest bias that may delay or block enterprise procurement at risk-averse institutions."
      diligencePath: "Request full internal validation dataset and methodology documentation from Hippocratic AI CMO; assess whether any health system partners have published IRB-approved outcome studies; identify whether any peer-reviewed publication is in preparation."
      relatedQuestionRefs: [QP020]
