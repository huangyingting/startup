callouts:
  - calloutType: risk
    title: "Hyro AI Epic Integration Advantage Creates Procurement Risk"
    body: |
      Hyro AI publicly documents deeper Epic App Orchard integration than Hippocratic AI has disclosed
      in public materials. Epic integration depth is a decisive procurement criterion for CMIO and CIO
      buyers at Epic-using health systems — which represent the majority of US academic medical centers
      and large IDNs. If Hyro can demonstrate a materially faster or more complete Epic integration in
      competitive evaluations, Hippocratic could lose health system deals despite superior safety metrics.
      Diligence must assess Hippocratic's Epic integration roadmap and current App Orchard certification
      status directly with product management.
    claimRefs: [CP004, CP015]

  - calloutType: risk
    title: "Safety Metric Independence Gap — Company-Reported Only"
    body: |
      Hippocratic AI's most powerful selling point — clinician-validated 99.38% clinical accuracy with
      7,500+ validators — is company-reported and has not been independently peer-reviewed in a published
      clinical trial as of May 2026. The arXiv preprint (Polaris paper) uses internal evaluation methodology.
      Without independent validation, Hippocratic's safety claims carry company-interest bias that
      sophisticated health system procurement teams will scrutinize. If a competitor achieves a
      peer-reviewed safety publication first, it would significantly undermine Hippocratic's primary
      differentiator. Diligence should request the full internal validation dataset and methodology.
    claimRefs: [CP028, CP023]

  - calloutType: strength
    title: "6x Patient Interaction Density Advantage Creates Data Flywheel"
    body: |
      With 180M+ patient interactions versus Hyro AI's 30M+, Hippocratic AI has a 6x greater patient
      interaction dataset for safety fine-tuning and clinical performance improvement. This data flywheel
      advantage is the hardest-to-replicate competitive moat: it grows with every deployment and cannot
      be purchased or replicated without proportional clinical deployment scale. As Hippocratic's
      interaction volume grows, its model accuracy should improve faster than any competitor at smaller
      scale — assuming the company's safety validation feedback loop is functioning as designed.
    claimRefs: [CP036, CP002, CP003]

  - calloutType: insight
    title: "Google CapitalG Investment Creates 2-3 Year Competitive Buffer"
    body: |
      CapitalG's participation in Hippocratic AI's Series C creates a conflict-of-interest barrier to
      near-term direct competition from Google Health. While Google possesses Med-PaLM 2 capabilities
      and HCA healthcare relationships, Hippocratic's investor status limits Google's immediate freedom
      to build a competing patient-facing AI agent product. This buffer likely extends 2–3 years while
      the investment relationship is active, after which the competitive risk from Google's capabilities
      becomes material if Hippocratic has not established irreversible scale advantages.
    claimRefs: [CP029, CP010]

