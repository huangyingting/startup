  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: "Clinical safety validation — no independent peer review"
      missingEvidence: "Hippocratic AI's 99.38% clinical accuracy claim and 0.00% severe adverse event claim are entirely company-reported. The arXiv preprint (arXiv:2403.13313) uses a company-designed validation framework with compensated validators. No IRB-approved clinical trial, independent peer-reviewed journal publication, or third-party safety audit has been publicly released."
      whyItMatters: "Without independent validation, Hippocratic AI's safety claims cannot be relied upon for hospital credentialing, board-level clinical governance approval, or investor due diligence at the $3.5B valuation. The 0.00% severe adverse event claim is particularly subject to dispute given the lack of independent production monitoring data."
      diligencePath: "Request full internal validation dataset and methodology; assess whether any health system partner has published IRB-approved outcome data; determine whether peer-reviewed journal submission is planned or in review."
      relatedQuestionRefs: [QE018, QE019, QE020]

    - type: private-evidence-only
      severity: material
      topic: "EHR integration depth — Epic App Orchard status not confirmed"
      missingEvidence: "Hippocratic AI has not confirmed Epic App Orchard membership or the technical depth of its Epic and Cerner integrations. For post-discharge, medication, and care gap use cases, EHR data access is required. The integration mechanism (API, FHIR, HL7, Epic App Orchard) is not publicly documented."
      whyItMatters: "Health systems that operate primarily on Epic (approximately 70%+ of large US health system market) require certified Epic integration for high-value clinical use cases. Absence of confirmed Epic App Orchard membership is a competitive gap versus Hyro AI and creates friction in procurement at Epic-dominant institutions."
      diligencePath: "Request EHR integration architecture documentation; confirm Epic App Orchard membership status; review FHIR/HL7 API certification; assess integration roadmap for Epic and Cerner environments."
      relatedQuestionRefs: [QE016, QE017]

    - type: missing-source
      severity: material
      topic: "Production adverse events — no disclosed incident data"
      missingEvidence: "The 0.00% severe adverse event claim is asserted without any disclosed incident log, production monitoring dataset, or adverse event reporting methodology. The Real-World Evidence LLM (RWE-LLM) framework is described but not independently audited."
      whyItMatters: "A single publicly disclosed adverse patient event (AI-caused medication error, inappropriate escalation failure, or privacy breach) could trigger health system contract suspensions and regulatory scrutiny. The absence of any adverse event reporting is either evidence of excellent safety performance or evidence of inadequate incident disclosure."
      diligencePath: "Request production incident log for all enterprise deployments (last 24 months); obtain adverse event classification criteria and escalation rate data; determine whether incidents have been reported to health system patient safety officers."
      relatedQuestionRefs: [QE020]

    - type: missing-source
      severity: material
      topic: "Enterprise SLA, uptime, and support model — not publicly documented"
      missingEvidence: "Hippocratic AI has not disclosed uptime SLAs, system reliability metrics, support tiers, or incident response times for enterprise health system customers. Voice-first AI agents for patient outreach require high availability — downtime during a post-discharge call campaign creates operational disruption."
      whyItMatters: "Enterprise health system IT procurement requires documented SLAs (typically 99.9%+ uptime), defined incident response procedures, and business continuity plans. Without disclosed SLAs, the product's enterprise readiness for mission-critical patient engagement workflows cannot be independently assessed."
