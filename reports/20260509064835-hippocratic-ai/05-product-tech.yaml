figures:
  - id: FE001
    title: "Product architecture map"
    type: flow
    notes: "Illustrates how the Polaris Safety Constellation processes a patient call from initial voice input through multi-LLM specialist checking to clinical response delivery. The parallel checking architecture is the core innovation — multiple specialist agents verify the primary agent's outputs before any clinical information is conveyed to the patient."
    data:
      nodes:
        - id: A
          label: "Patient Voice Input"
          detail: "Patient receives outbound call or initiates inbound contact; voice captured via NVIDIA ACE speech pipeline; audio converted to text for LLM processing"
          type: input
        - id: B
          label: "Primary Stateful Agent"
          detail: "Core conversational LLM maintains full context of multi-turn patient interaction; generates primary response to patient query or outreach prompt; manages conversation flow across 1,000+ clinical use cases"
          type: process
        - id: C
          label: "Specialist Agent — Medication Safety"
          detail: "Specialist LLM checks primary agent's medication-related statements for accuracy, dosage correctness, contraindication awareness, and naming precision; one of 21+ specialist agents"
          type: process
        - id: D
          label: "Specialist Agent — Clinical Protocol"
          detail: "Specialist LLM verifies clinical protocol adherence (post-discharge instructions, screening eligibility, care gap criteria); cross-checks against clinical guidelines and health system-specific protocols"
          type: process
        - id: E
          label: "Specialist Agent — Safety Escalation"
          detail: "Dedicated safety agent monitors for red-flag signals (suicidal ideation, severe symptom descriptions, emergency indicators) requiring immediate escalation to human clinical staff"
          type: process
        - id: F
          label: "Triple-Check — Critical Clinical Data"
          detail: "For medication names, dosages, lab values, and other high-stakes clinical data: three independent LLM checks must agree before information is conveyed; mandatory consensus mechanism"
          type: process
        - id: G
          label: "Consensus / Safety Gate"
          detail: "If any specialist agent flags a safety concern or the triple-check fails consensus, the response is blocked and either revised or escalated to human clinical staff; no patient output until safety gate clears"
          type: process
        - id: H
          label: "NVIDIA TensorRT-LLM Inference"
          detail: "All 22 LLMs run on NVIDIA H100/H200 GPUs with TensorRT-LLM optimization enabling ultra-low-latency parallel inference required for real-time voice conversation"
          type: process
        - id: I
          label: "Voice Response to Patient"
          detail: "Cleared response synthesized by NVIDIA Avatar Cloud Engine (ACE) with empathy inference — emotional tone, pacing, and voice quality optimized for healthcare context; delivered to patient in real time"
          type: output
        - id: J
          label: "RWE-LLM Monitoring"
          detail: "Real-World Evidence LLM framework monitors production interactions for quality drift, safety signals, and continuous improvement feedback; all interactions logged for ongoing validator review sampling"
          type: output
