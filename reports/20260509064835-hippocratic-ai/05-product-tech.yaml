        - id: W7
          label: "Human Escalation (If Needed)"
          detail: "If safety threshold crossed or patient requests human: AI agent transfers to on-call nurse or care manager with warm handoff summary; escalation rate not publicly disclosed"
          type: process
        - id: W8
          label: "Clinical Impact Measurement"
          detail: "Health system measures outcome KPIs: 30-day readmission rate, medication adherence, screening completion, care gap closure, patient satisfaction; ROI reported by health system partners"
          type: output
