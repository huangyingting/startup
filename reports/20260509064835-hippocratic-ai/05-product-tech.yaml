  - id: FE002
    title: "Customer workflow / operating flow"
    type: flow
    notes: "Maps the patient journey through a Hippocratic AI-assisted healthcare interaction, from initial outreach trigger to clinical outcome. Based on the post-discharge follow-up use case — the most documented deployment workflow in public sources. Each node represents a stage in the workflow; edges show the flow of the patient interaction."
    data:
      nodes:
        - id: W1
          label: "Outreach Trigger"
          detail: "Health system identifies patient population (discharged in last 48 hrs, medication cohort, care gap population); Hippocratic AI platform receives patient roster with use case configuration and language preferences"
          type: input
        - id: W2
          label: "AI Agent Initiates Call"
          detail: "AI agent places outbound call; introduces itself as health system's AI healthcare assistant; obtains verbal consent; NVIDIA ACE voice synthesis used for natural-language, empathetic voice delivery"
          type: process
        - id: W3
          label: "Clinical Conversation"
          detail: "AI agent conducts structured clinical conversation (medication review, symptom screening, SDOH survey, appointment confirmation); Polaris Safety Constellation checks all responses in real time; non-diagnostic, non-prescribing throughout"
          type: process
        - id: W4
          label: "Real-Time Safety Check"
          detail: "21+ specialist LLMs check primary agent outputs in parallel; triple-check activates for critical clinical data (medication names, dosages); safety escalation agent monitors for emergency red flags"
          type: process
        - id: W5
          label: "Safety Gate"
          detail: "Consensus gate: all specialist checks must clear before any response is delivered to patient; if safety flag triggered, response is blocked and escalation protocol activates"
          type: process
        - id: W6
          label: "Outcome Documentation"
          detail: "Interaction outcomes documented; patient-reported data (symptoms, medication status, SDOH needs) fed back to health system via API or dashboard; HIPAA BAA compliance maintained"
