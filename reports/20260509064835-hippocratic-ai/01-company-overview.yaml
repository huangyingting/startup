  evidenceGaps:
    - type: private-evidence-only
      severity: high
      topic: Revenue and ARR
      missingEvidence: Hippocratic AI has not publicly disclosed revenue, ARR, or net revenue retention metrics.
      whyItMatters: Without revenue data, assessing the health of the business model, customer expansion, and path to profitability is speculative.
      diligencePath: Request revenue and ARR data in the investment data room; ask for at least three quarters of ARR trend data and net revenue retention by cohort.
      relatedQuestionRefs:
        - QO024

    - type: private-evidence-only
      severity: high
      topic: Headcount and Burn Rate
      missingEvidence: Company has not disclosed headcount, organizational structure, or burn rate.
      whyItMatters: Burn rate and headcount are critical inputs for runway analysis given $404M raised but no revenue disclosure.
      diligencePath: Request headcount by function and monthly/quarterly burn rate; cross-check against LinkedIn employee data.
      relatedQuestionRefs:
        - QO023

    - type: missing-source
      severity: medium
      topic: Independent Safety Certification
      missingEvidence: All safety validation data is company-controlled; no independent peer-reviewed audit of Polaris safety architecture exists in the public domain.
      whyItMatters: The safety story is the primary competitive moat; if safety claims are unverifiable or overstated, the valuation and commercial pipeline are at risk.
      diligencePath: Request independent clinical audit reports; seek FDA correspondence; ask for third-party peer review of safety publications.
      relatedQuestionRefs:
        - QO009
        - QO013

    - type: private-evidence-only
      severity: medium
      topic: Board Composition and Governance
      missingEvidence: Board composition, voting rights, liquidation preferences, and anti-dilution terms are not publicly disclosed.
      whyItMatters: Governance structure affects investor downside protection and control in exit scenarios.
      diligencePath: Review cap table, certificate of incorporation, and board observer rights in data room.
      relatedTableRefs:
        - TO003
      relatedQuestionRefs: []

    - type: private-evidence-only
      severity: low
      topic: Milestone Dates and Internal Metrics
      missingEvidence: Several internal milestones (exact contract counts, patient interaction counts by quarter, clinical trial completion dates) are not publicly disclosed with specificity.
      whyItMatters: Milestone timelines inform execution velocity and whether public-facing metrics can be independently verified.
      diligencePath: Request board decks and internal OKR tracking from 2023–2026; cross-reference publicly announced milestones.
      relatedTableRefs:
        - TO004
      relatedQuestionRefs: []

    - type: missing-source
      severity: medium
      topic: Leadership Team Beyond Munjal Shah
      missingEvidence: Full executive team biography, roles, and tenure are not comprehensively documented publicly beyond three named executives.
      whyItMatters: Key-person risk assessment requires understanding the depth of the leadership bench.
      diligencePath: Request full org chart and leadership team bios; conduct reference checks on senior leaders.
      relatedTableRefs:
        - TO002
      relatedQuestionRefs:
        - QO017

    - type: missing-source
      severity: medium
      topic: Regulatory and Legal Exposure
      missingEvidence: No specific FDA enforcement actions, state AG investigations, or civil litigation publicly targeting Hippocratic AI were found; absence of evidence is not evidence of absence.
      whyItMatters: Healthcare AI is under increasing regulatory scrutiny; emerging FDA guidance on AI/ML-based Software as a Medical Device could affect product classification and deployment.
      diligencePath: Search PACER, FDA warning letters database, and state AG press releases; request legal counsel opinion in data room.
      relatedQuestionRefs:
        - QO014

    - type: missing-source
      severity: low
      topic: EHR Integration Details
      missingEvidence: Specific EHR systems supported (Epic, Cerner, Oracle Health) and integration depth are not publicly documented.
      whyItMatters: EHR integration is a critical buying criterion for health systems; limited integration breadth could constrain TAM.
      diligencePath: Request technical integration documentation and list of certified EHR partners.
      relatedQuestionRefs:
        - QO025
