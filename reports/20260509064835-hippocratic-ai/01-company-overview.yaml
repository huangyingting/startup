company:
  name: Hippocratic AI

chapter:
  number: 1
  title: Company Overview
  summary: |
    Hippocratic AI is a Palo Alto-based generative AI company founded in 2023 that builds safety-first,
    non-diagnostic, patient-facing AI agents for health systems, payers, and pharma. Founded by serial
    entrepreneur Munjal Shah and a multidisciplinary team of clinicians and AI researchers, the company
    has raised $404M across seed, Series A, B, and C rounds, achieving a $3.5B valuation as of November
    2025. Its Polaris safety architecture—validated by 7,500+ US-licensed clinicians—powers 1,000+ clinical
    use cases across 50+ enterprise healthcare partners in 6 countries, with 180M+ patient interactions
    logged to date. The company's usage-based model charges $9/agent-hour and explicitly prohibits its
    agents from diagnosing or prescribing.

sections:
  - id: SO-1
    title: Identity, Headquarters, and Business Model
    body: |
      Hippocratic AI was founded in early 2023 in Palo Alto, California, with the mission to address the
      global healthcare workforce shortage through generative AI. The company positions itself as building
      the "safety layer for healthcare AI"—deploying AI agents that handle non-diagnostic, patient-facing
      clinical tasks such as post-discharge follow-up, chronic care management, appointment scheduling,
      medication adherence, and cancer screening outreach. Critically, the company's agents are explicitly
      prohibited from making diagnoses or prescribing treatments, limiting liability while covering a vast
      swath of healthcare workflow volume. The company operates a B2B usage-based model, charging health
      systems $9 per agent-hour of active patient interaction. Hippocratic AI entered commerce in June
      2024 with its first generative AI healthcare agent product, and has subsequently launched AI Front
      Door (an omnichannel patient access agent) and Nurse Co-Pilot (an AI voice assistant for bedside
      nurses). As of May 2026, the company serves 50+ enterprise healthcare clients across 6 countries
      including health systems, payers, and pharmaceutical companies.
    claimRefs:
      - CO001
      - CO012
      - CO013
      - CO020
      - CO018
      - CO019

  - id: SO-2
    title: Founders, Leadership, and Governance
    body: |
      Munjal Shah is the CEO and co-founder of Hippocratic AI. Shah is a serial entrepreneur with deep AI
      and healthcare credentials: he received a BS in Computer Science from the University of San Diego and
      an MS in Computer Science from Stanford University with a focus on AI. His second venture, Like.com
      (a machine-learning computer vision and visual search startup), was acquired by Google in 2010, after
      which a personal health scare redirected his focus to healthcare. He subsequently founded Health IQ,
      which used AI to analyze health records and offer better insurance rates to health-conscious
      individuals. Hippocratic AI was co-founded alongside a multidisciplinary team that includes physicians,
      hospital administrators, and AI researchers from El Camino Health, Johns Hopkins, Washington
      University in St. Louis, Stanford, Google, and Nvidia. The executive team includes Vishal Parikh
      (Chief Product Officer), Amy McCarthy (Chief Nursing Officer), and other clinical, product, and
      engineering leaders. The company has established a safety governance council, a Physician Advisory
      Council, and a Nurse Advisory Council as part of its clinical oversight structure. No material
      leadership changes have been publicly reported since founding. Key-person dependence on Shah is
      elevated given his public role as the sole named co-founder and primary spokesperson; the broader
      clinical team provides some offset but is not fully documented publicly.
    claimRefs:
      - CO002
      - CO003
      - CO004
      - CO030
      - CO031
      - CO037

  - id: SO-3
    title: Funding History and Investors
    body: |
      Hippocratic AI has raised $404 million in total funding across four rounds since its 2023 founding.
      The seed round of approximately $50 million closed in May 2023 and was led by General Catalyst and
      Andreessen Horowitz (a16z). The $53 million Series A closed on March 18, 2024 at a $500 million
      post-money valuation, co-led by General Catalyst and Premji Invest, with additional participation
      from SV Angel, Memorial Hermann Health System, Cincinnati Children's, WellSpan Health, Universal
      Health Services, HonorHealth, and OhioHealth as strategic health-system investors. Shortly after, in
      approximately August 2024, NVIDIA's NVentures arm made a $17 million strategic investment to support
      GPU-accelerated real-time conversational AI. The $141 million Series B closed in January 2025 at a
      $1.64 billion valuation, led by Kleiner Perkins, with participation from a16z, General Catalyst,
      NVIDIA NVentures, Premji Invest, SV Angel, Universal Health Services, and WellSpan Health. Finally,
      the $126 million Series C closed in November 2025 at a $3.5 billion valuation, led by Avenir Growth,
      with new participation from CapitalG (Google's growth fund) and continued backing from prior
      investors and strategic health-system partners. Series C proceeds are designated for product expansion,
      international growth, and M&A. The rapid valuation trajectory—$500M → $1.64B → $3.5B over 20
      months—reflects exceptional investor confidence in the patient-facing AI agent category.
    claimRefs:
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO033
      - CO034
      - CO039

  - id: SO-4
    title: Scale, Traction, and Key Metrics
    body: |
      As of May 2026, Hippocratic AI has achieved meaningful commercial scale across multiple dimensions.
      The company has 50+ enterprise healthcare partners spanning health systems, payers, and pharma in
      six countries. More than 180 million patient interactions have been completed on the Polaris
      platform with a reported 0.00% severe harm event rate and 99.90% clinical advice accuracy. The
      AI model has been validated by 7,500+ US-licensed clinicians across 725,000+ test calls. The
      company has built over 1,000 clinical use cases across 25+ medical specialties. Customer-reported
      outcomes include a 360% capacity expansion in chronic care management, 30% reduction in
      readmission rates (reported by a UHS deployment), and a 2.6x higher engagement rate with
      Spanish-speaking populations. AI agents operate in 20+ languages with sub-300ms conversation
      latency. Pricing is $9 per agent-hour, compared to a median RN wage of approximately $39/hour,
      representing a roughly 4x cost differential for routine non-diagnostic tasks. Revenue and ARR
      figures are not publicly disclosed. Headcount is undisclosed, but the company is actively hiring
      across engineering, clinical, and sales functions.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO023
      - CO020
      - CO028
      - CO038
      - CO025

  - id: SO-5
    title: Adverse Signals and Key Risks
    body: |
      Despite strong growth metrics and investor confidence, several adverse signals warrant scrutiny. The
      Advisory Board has noted that AI cannot comprehensively fulfill a nurse's full scope of practice, and
      that AI systems can perpetuate biases based on training data, potentially increasing missed care or
      oversight of patient deterioration. Research published in PSQH and peer-reviewed journals documents
      that AI hallucinations in healthcare—where AI generates incorrect or misleading medical
      information—represent a systemic risk, with some studies finding unsafe AI responses in medical
      contexts at rates of up to 13%. MSN coverage from April 2026 noted Hippocratic AI's product launches
      occurred amid ongoing safety concerns about healthcare AI at scale. Hippocratic AI's own validation
      framework relies on internal clinician networks and company-controlled testing, raising questions
      about the independence of safety certifications. The absence of publicly disclosed revenue figures,
      customer churn rates, or independent clinical trial data is a transparency gap. Healthcare AI
      regulation is evolving rapidly under FDA and HIPAA frameworks, creating potential compliance and
      liability exposure. Key-person dependence on Munjal Shah is notable given his central public role.
    claimRefs:
      - CO035
      - CO036
      - CO013

