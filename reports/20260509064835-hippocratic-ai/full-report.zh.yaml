  - id: FV001
    title: 投资建议逻辑
    type: flow
    notes: 从关键投资逻辑支柱，经风险闸门，走到最终投资建议的决策树。红色节点代表会压过正向建议、直接打破投资逻辑的条件。
    data:
      nodes:
        - id: safety
          label: 临床安全护城河
          detail: 7,500+ 名临床验证人员；22-LLM Safety Constellation；Polaris 3.0 准确率 99.38%（公司自报）
        - id: market
          label: 劳动力替代经济性
          detail: $9/hr 对比 $39-65/hr RN 成本；节省 78-86%；180M+ 次患者交互；50+ 家企业伙伴
        - id: nvidia
          label: NVIDIA 战略合作
          detail: NVentures 投资 $17M；获得 H100/H200 GPU；TensorRT-LLM 为实时语音 AI 优化
        - id: traction
          label: 企业牵引力
          detail: 50+ 个医疗系统；6 个国家；23 周签下 23 份合同；UHS 已部署 29 家医院
        - id: fda_gate
          label: FDA 分类闸门
          detail: 能否维持 Non-SaMD？如果 FDA 将产品重新分类为需要 510(k) 的 SaMD，投资逻辑破裂
        - id: rev_gate
          label: 收入验证闸门
          detail: ARR 是否 > $50M 且 YoY 增长 80%+？这是 $3.5B 估值站得住的必要条件
        - id: ehr_gate
          label: EHR 竞争闸门
          detail: Epic/Cerner 捆绑是否威胁 > 3 个具名客户？如果是，护城河已经开裂
        - id: conditional_pos
          label: 有条件看好
          detail: 在确认 ARR、NRR > 110% 且拿到 FDA 意见后，可在 Series D 或 $3-4B 估值的新股中投资；目标是在 5-7 年取得 3-5x 回报
        - id: research_more
          label: 继续研究
          detail: 没有数据室访问，或收入未确认；尽调完成前暂缓决策；不要在 $4B 以上估值参与 Series C 老股
        - id: avoid
          label: 回避 / 退出
          detail: 打破投资逻辑的触发项已发生：FDA 重新分类、具名客户因安全问题流失，或 Series D 降价轮；90 天内退出
      edges:
        - from: safety
          to: fda_gate
          label: 监管风险叠加
        - from: market
          to: rev_gate
          label: 需要确认收入
        - from: nvidia
          to: ehr_gate
          label: 竞争护城河检查
        - from: traction
          to: rev_gate
          label: 牵引力转化为收入
        - from: fda_gate
          to: conditional_pos
          label: FDA 维持 non-SaMD
        - from: fda_gate
          to: avoid
          label: FDA 重新分类为 SaMD
        - from: rev_gate
          to: conditional_pos
          label: ARR > $50M 已确认
        - from: rev_gate
          to: research_more
          label: ARR 未确认或 < $50M
        - from: ehr_gate
          to: conditional_pos
          label: EHR 护城河完好
        - from: ehr_gate
          to: avoid
          label: EHR 替代 3+ 个客户
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV005
      - CV006
      - CV031
      - CV032
  - id: FV002
    title: 估值敏感性
    type: matrix
    notes: 每个单元格展示 $3.5B Series C 估值下的隐含 ARR 倍数和估值判断。色调：正向 = 按品类龙头标准合理；警示 = 偏高但仍可辩护；负向 = 对照公开市场锚点站不住。长期维持该倍数需要增长率支撑。
