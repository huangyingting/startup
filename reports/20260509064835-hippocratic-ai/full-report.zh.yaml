      - - 价值医疗项目扩张（CMS ACO REACH、CMMI、星级评级）
        - 增长驱动 — 强
        - 2024–2027 年政策影响达到高峰
        - 签有 VBC 合同的医疗系统和 Medicare Advantage 计划有动力主动触达患者；AI Agent 是可规模化工具
        - 确认哪些合作伙伴参与 ACO REACH 或 MSSP；量化星级评级对潜在收入的影响
      - - 美国人口老龄化（每天 10,000 名婴儿潮一代满 65 岁）
        - 增长驱动 — 结构性
        - 2025–2035
        - Medicare 人群增长推高患者触达、照护管理和慢病监测需求
        - 跟踪 Medicare Advantage 合作伙伴集中度与商业保险敞口
      - - FDA AI/SaMD 监管不确定性（2025 年 1 月指南草案）
        - 约束 — 重大
        - 2025–2027
        - FDA 监管边界不清，带来合规成本；部分工作流可能需要 510(k) 许可；企业决策放慢
        - 向 Hippocratic 法务 / 监管团队索取 FDA 沟通记录；确认哪些用例归为一般健康，哪些归为 SaMD
      - - 医疗系统 IT 集成复杂度（Epic、Cerner）
        - 约束 — 中等
        - 持续
        - Epic App Orchard 认证和 EHR 集成会让每家医疗系统的实施周期增加 3–6 个月，也吃掉 IT 资源
        - 确认 Epic App Orchard 状态；索取已在生产环境上线的 EHR 集成清单
      - - 临床人员对面向患者 AI 工具的怀疑
        - 约束 — 中等
        - 当前
        - 护士和医生担心 AI 替代临床判断；除高管层外，还需内部买入，推广因此放慢
        - 向两到三家合作医疗系统索取临床治理结构；评估 CMIO/CNIO 是推动者还是阻力
      - - 医疗系统预算压力（经营利润率 1–2%）
        - 约束 — 中等
        - 持续
        - 利润率很薄时，CFO 在扩张前需要看到有记录的成本节省；试点到规模化决策可能拉长 6–12 个月
        - 索取 Hippocratic 试点转规模化的转化率和周期数据；验证提供给医疗系统合作伙伴的 ROI 材料
