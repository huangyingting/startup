      - number: '3.3'
        title: 相邻竞争者——面向医生的 AI 文档
        blocks:
          - type: paragraph
            body: >
              几家知名且资金充足的 AI 公司也在医疗 AI 竞争，但目标用户是医生而非患者。它们今天不直接争夺 Hippocratic 面向患者的 AI
              智能体预算，但代表：（a）潜在资本和人才竞争；（b）潜在并购方或进入面向患者 AI 的竞争者；（c）医疗 AI 融资强劲、投资者论点已被验证的证据。


              **Abridge** 于 2025 年以 $6B 估值融资 $550M，背后有 NVIDIA、Google 和 Highmark Health。Abridge 为医患会诊提供环境式 AI
              文档：捕捉对话并生成结构化临床记录。这与 Hippocratic 所在细分不同：Abridge 替代的是文档劳动，而不是患者触达呼叫中心。Abridge 获得 NVIDIA 和 Google 支持，与
              Hippocratic 自身的 NVIDIA NVentures 投资相呼应，说明 GPU 基础设施访问对两个平台都是关键使能因素。Abridge 不是短期竞争威胁，但可能成为平台型收购方或相邻进入者。


              **Suki AI** 已融资 $95M+（包括 $70M D 轮），投资方包括 Google 和 Flare Capital，服务 150+ 家医疗系统客户，提供语音转病历的医生文档产品。和 Abridge
              一样，Suki 面向医生。其按席位订阅模式瞄准医生文档预算，而不是患者呼叫中心人力预算。Suki 对 Hippocratic 当前定位的战略相关性不高，但可作为医疗 AI 公司估值倍数和人才竞争的可比对象。


              **Nuance / Microsoft DAX Copilot** 是面向医生的既有环境式 AI 文档平台，已与 Epic 集成，并通过 Azure 提供服务。Microsoft 于 2021 年以
              $19.7B 收购 Nuance Communications。DAX Copilot 服务 550+ 家医疗系统，规模 Hippocratic 尚未接近。虽然 DAX 面向医生，今天不争夺
              Hippocratic 面向患者的 AI 预算，但 Microsoft 的 Epic 集成和医疗系统关系，构成任何面向患者 AI 供应商最终都必须面对的分发护城河。Microsoft 理论上可以利用同一套
              Epic 集成，把类 DAX 能力延伸到患者互动；但截至 2026 年 5 月，尚无此类产品发布。
            claimRefs:
              - CP007
              - CP008
              - CP009
              - CP021
              - CP030
      - number: '3.4'
        title: 大型科技公司威胁与潜在进入者
        blocks:
          - type: paragraph
            body: >
              从长周期看，大型科技公司是 Hippocratic AI 最重要的生存级竞争威胁。原因不是这些公司已经发布了竞争性的面向患者 AI 智能体产品，而是它们拥有基础设施、医疗系统关系和 LLM
              能力，可以大规模做成这件事。


              **Google Health** 同时是投资者和潜在未来竞争者。Google 旗下 CapitalG 参与了 Hippocratic 的 C 轮（$126M，2025 年 11
              月），降低了短期直接竞争概率。Google 的 Med-PaLM 2（大型医学语言模型）展现了强医疗问答能力，并已与 HCA Healthcare 合作部署于临床笔记。Google 尚未大规模发布企业级面向患者
              AI 智能体。不过，Google 对 Hippocratic 的投资是一把双刃剑：它提供资本和合法性，同时如果 Google 日后选择竞争，也会制造潜在利益冲突。只要投资关系仍然有效，CapitalG 投资大约为
              Hippocratic 提供 2–3 年的直接 Google 竞争缓冲。


              **Amazon** 通过 Alexa for Healthcare（符合 HIPAA 条件的 Alexa Skills）和 AWS HealthLake 平台推进医疗 AI。Amazon 在数家医疗系统的病房
              Alexa 部署证明了市场机会，但与 Hippocratic 多智能体 Polaris 架构相比，对话复杂度有限。Amazon 通过投资 Anthropic 获得 Claude 访问，具备 LLM
              基础。风险在于，Amazon 可能把 AWS + Alexa + Anthropic Claude 组合起来，借助既有医疗系统关系，构建医疗规模的竞争性面向患者 AI 智能体。


              **Microsoft** 是最可信的 Big Tech 潜在进入者，抓手是 Nuance DAX 在 550+ 家医疗系统的分发和 Epic 集成。若从医生 DAX 延伸到面向患者智能体，可复用既有 IT
              基础设施、合同关系和 HIPAA 合规框架。Microsoft 尚未发布此类产品，但战略逻辑清晰。Microsoft 缺少的竞争护城河是 Hippocratic
              的临床医生验证基础设施和医疗专用安全架构，要复制这两点需要重大投入。
            claimRefs:
              - CP010
              - CP029
              - CP030
              - CP032
              - CP009
      - number: '3.5'
        title: 现状替代品与切换成本分析
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 最重要的竞争框架是替代现状方案，而不是软件对软件竞争。主要替代品是人力、传统电话系统和患者门户消息系统。


              **人工护士呼叫中心和护理管理人员** 是当前患者触达、出院后随访、慢病管理和用药依从性的主流做法。Bureau of Labor Statistics 报告 2024 年 RN 工资中位数为
              $39.05/hour。计入雇主开销、福利和管理成本后，RN 呼叫中心人力全成本达到 $50–65/hour。Hippocratic AI 按 $9/智能体小时计费，对合适的非诊断任务相当于约 78%
              折扣。这是核心经济替代逻辑。不过，RN 呼叫中心提供完整执业范围能力（临床判断、情绪智能、体格评估转诊能力），Hippocratic 的非诊断智能体无法匹配。


              **传统 IVR 和电话系统** 目前服务大多数医疗系统，用于预约提醒和基础患者分流。这些系统 OPEX 约为每通
              $0.05–0.25，但没有自然语言理解，患者体验差（通话完成率低、患者挫败感高）。对需要对话和信息交换的用例，Hippocratic AI 替代 IVR。IVR
              系统切换成本很低——它们常与呼叫中心平台打包——这意味着 Hippocratic 必须证明结果显著更好，才能支撑全量替换。


              **患者门户**（Epic MyChart、Cerner
              HealtheLife）提供异步安全消息，可替代外呼语音电话。这些门户在部分患者群体中采用率较高（尤其是技术熟练的城市医疗系统），但在老年和农村人群中的采用率很低，留下持续缺口，Hippocratic
              的语音优先智能体正好填补。患者门户切换到 AI 智能体不是全量替换；两者是互补渠道。


              从 Hippocratic 切换到竞争者的成本中等。医疗系统部署任何 AI 患者智能体，都必须投入临床验证、工作流集成、EHR 连接和员工培训。Hippocratic 的临床验证数据集（725,000+
              次测试电话、7,500+ 名验证者）构成嵌入信任和工作流配置中的切换成本，而不是技术锁定。多家并用（在不同用例中同时部署 Hippocratic 和竞争者）在运营上可行，因此锁定压力较低。
