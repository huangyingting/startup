  - id: TV005
    title: 投资假设破裂与止损触发器表
    notes: 止损触发器是分析师定义的阈值；监测频率建议反映各类风险对成长阶段投资人的紧迫性和流动性影响。
    columns:
      - 触发事件
      - 早期信号
      - 理由
      - 止损动作
    rows:
      - - FDA SaMD 重新分类命令
        - FDA 发布正式指南或执法函，将 AI 患者代理归类为 SaMD，并要求 510(k) 许可
        - 会冻结商业部署，触发产品重构，并带来 6-18 个月审批流程和 $500K-$2M 监管成本；收入增长停摆
        - 立即退出仓位，或降至最低跟踪仓位；公开消息爆出前寻找二级买家
      - - NVIDIA 合作终止
        - NVIDIA 公开撤回战略投资，或停止给予 Hippocratic AI GPU 分配优先权
        - H100/H200 GPU 供给对实时语音 AI 推理至关重要；失去 NVIDIA 关系会抬高算力 COGS，并摧毁合作可信度信号
        - 90 天内退出；没有这层战略关系，GPU 依赖会让规模化商业模式不经济
      - - 伴随安全披露的点名客户流失
        - 某家被点名卫生系统（UHS、WellSpan、Cincinnati Children's）公开以 AI 安全或质量担忧为由终止合同
        - 带安全理由的合同终止会触发监管审查、媒体关注，并让其他卫生系统迅速复核合同
        - 立即退出；一次以安全为由的流失，会在 50+ 合作伙伴中引发连锁复核风险
      - - Epic 或 Cerner 替换 3+ 家点名客户
        - 12 个月内，三家或更多被点名的 Hippocratic AI 卫生系统客户转向 Epic Cosmos AI 或 Cerner AI 患者互动
        - 表明 EHR 捆绑策略正在替代 Hippocratic 的集成壁垒；竞争壁垒开始开裂
        - 6 个月内退出；在下一轮融资暴露流失前降低敞口
      - - Series D 平轮或降价轮估值
        - 下一轮融资定价等于或低于 $3.5B 投后估值
        - 降价轮融资显示 ARR 增长停滞、市场担忧竞争动态，或投资人疲劳；未来回报倍数会被明显压缩
        - 不参与 Series D；开始有序降低仓位；在融资关闭前，目标以高于 $3.5B 的价格完成二级出售
      - - ARR 同比增长跌破 50%
        - 公司披露或数据室显示 ARR 连续两个季度同比增长低于 50%
        - 在 93x+ ARR 倍数下，增长减速到 50% 以下，会让 $3.5B 估值相对可比公司倍数在数学上站不住
        - 数据可得后 30 天内重估仓位；若确认，启动退出流程
