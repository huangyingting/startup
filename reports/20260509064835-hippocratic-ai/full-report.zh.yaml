      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Munjal Shah 是 Hippocratic AI 的 CEO 和联合创始人。Shah 是连续创业者，AI 和医疗履历很深：他获 University of San Diego 计算机科学学士学位，并在
              Stanford University 取得计算机科学硕士，研究方向为 AI。他的第二家公司 Like.com 是一家机器学习计算机视觉和视觉搜索创业公司，2010 年被 Google
              收购；此后一次个人健康危机把他的注意力转向医疗。他随后创办 Health IQ，用 AI 分析健康记录，并为重视健康的人群提供更优保险费率。Hippocratic AI 由一支多学科团队共同创办，成员包括来自
              El Camino Health、Johns Hopkins、Washington University in St. Louis、Stanford、Google 和 Nvidia 的医生、医院管理者和 AI
              研究人员。管理团队包括 Vishal Parikh（首席产品官）、Amy
              McCarthy（首席护理官）以及其他临床、产品和工程负责人。公司设立了安全治理委员会、医生顾问委员会和护士顾问委员会，作为临床监督结构的一部分。成立以来，公开信息中没有重大管理层变动。Shah
              是唯一被点名的联合创始人和主要公开发言人，因此关键人依赖偏高；更广泛的临床团队能部分对冲，但公开资料披露不完整。
