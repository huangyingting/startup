  - id: TE004
    title: 信任 / 质量 / 合规表
    columns:
      - 领域
      - 控制 / 机制
      - 主张
      - 验证状态
      - 缺口
    rows:
      - - 临床准确性
        - 多 LLM 安全星座，关键数据三重校验
        - 99.38% 临床准确率（Polaris 3.0）
        - 公司披露；6,200+ 名临床医生测试者；1.85M 次测试通话评估 — 并未经过独立同行评审
        - 没有独立临床试验；没有 IRB 批准的结局研究；仅有 arXiv 预印本（方法论由公司控制）
      - - 不良事件安全性
        - 多阶段认证；安全升级流程；真实世界证据监测
        - 生产部署中严重不良事件为 0.00%
        - 公司披露；没有第三方审计生产交互数据；没有独立安全委员会背书
        - 主张很强，但公开来源无法核验；风险厌恶型医疗系统会把它列为卡住尽调的事项
      - - HIPAA 合规
        - 与所有企业客户签署业务伙伴协议；与 AWS 签署云基础设施 BAA
        - 所有企业部署的数据处理均符合 HIPAA BAA
        - 医疗 SaaS 的标准要求；BAA 结构符合行业惯例；未见已知违规
        - 未公开披露 HIPAA 审计结果；仅有 BAA 不能覆盖数据泄露风险
      - - FDA 监管范围
        - 公司解读认为，非诊断、非处方设计避开 SaMD 分类
        - 在当前设计约束下，AI 智能体不受 FDA SaMD 监管
        - 公司法律解读；FDA 未正式确认或否认；January 2025 FDA 指导草案带来不确定性
        - FDA AI 指导（Jan 2025）仍在演进，可能扩大 SaMD 定义；公司的非诊断定位是风险缓释策略，不是监管认定
      - - 临床医生验证者独立性
        - Hippocratic AI 付费聘请 7,500+ 名执业临床医生验证交互
        - 独立临床专家验证确认安全性
        - 验证者由 Hippocratic AI 聘请并付费——独立性有限；方法论没有外部审计
        - 受薪验证者与正向结果存在财务激励一致性；需要独立第三方验证
      - - EHR 数据安全
        - AWS 符合 HIPAA 资格的基础设施；与医疗系统客户签署 BAA
        - 为具体用例访问的患者 EHR 数据，在符合 HIPAA 的环境中处理
        - 未经独立审计；EHR 集成深度和 API 访问控制没有公开文档
        - 公开信息无法验证集成安全态势
      - - 语音数据处理
        - NVIDIA ACE 处理语音合成；AWS 存储交互数据
        - 语音交互遵守包括 HIPAA 在内的适用隐私法规
        - 标准基础设施 BAA；录音同意要求因州而异（需双方同意的州）
        - 未公开说明跨州同意法复杂度；录音同意方法未披露
      - - 责任 / 不良事件流程
        - AI 检测到超过阈值的风险信号时，升级给人类临床人员
        - AI 智能体会把超过安全阈值的病例升级给人类临床医生
        - 升级逻辑没有公开文档；阈值、升级率和人工响应流程均未披露
        - 没有披露升级率和阈值定义时，不良事件中的责任分配并不清楚
    notes: |
      验证状态评级基于截至 May 2026 可获得的公开证据。“公司披露”
      表示 Hippocratic AI 提出但没有独立第三方佐证的主张。
      “公司披露”和“独立验证”的差别，是 $3.5B 估值阶段的重大尽调考量。
      所有缺口项都应作为资料室请求处理。
