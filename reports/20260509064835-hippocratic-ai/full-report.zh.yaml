    type: quadrant
    notes: >-
      象限位置基于尽调对两个轴的序数评分。X 轴：当前企业卫生系统部署规模（已确认企业客户数量和患者互动）。Y 轴：临床安全验证基础设施深度（临床验证者、测试通话量、安全架构投入）。分数为 -1 到 1
