  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与细分定义
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的可服务市场是医疗 AI 中的 **AI 面向患者智能体** 细分：这类产品用对话式 AI
              为医疗系统、支付方和制药客户处理患者触达、就医导航、出院后随访、权益教育、用药依从性和临床试验招募。它不同于临床 AI（诊断影像、病理、放射）和行政 AI（事前授权处理、收入周期自动化）；Hippocratic
              都不做这些方向。


              **纳入支出：** 患者参与软件、护理管理平台、护士分诊热线、健康教练项目、患者教育、触达呼叫中心运营，以及由支付方和医疗系统出资的会员参与项目。按 $9/智能体小时计算，Hippocratic
              直接与这些职能的人力预算竞争，尤其是 RN 分诊呼叫中心和护理管理人员预算。


              **排除支出：** 临床决策支持（CDS）、AI 辅助影像 / 病理、收入周期 AI（RCM）、EHR 平台功能、没有医疗专用安全层的通用 LLM、远程患者监测硬件，以及面向消费者的远程医疗。


              **相邻市场：** 远程患者监测（RPM）、人群健康管理（PHM）平台和数字疗法（DTx）。Hippocratic 的智能体可以补充 RPM 工作流（监测后的触达），但不提供监测硬件或传感器集成。


              Hippocratic AI 智能体的竞争替代品主要是人力，具体是注册护士（BLS 工资中位数 $39/hr）、医疗助理，以及呼叫中心和护理管理岗位中的患者服务代表。软件替代品包括 Salesforce
              Health Cloud、Relatient、Phreesia 等患者参与平台；这些平台不提供实时对话 AI。把 Hippocratic 视为创造一个新预算类别、而不是挤占 EHR
              支出的说法有合理性，因为叙事锚定在呼叫中心人力上；但这一点仍需通过企业合同结构验证。
