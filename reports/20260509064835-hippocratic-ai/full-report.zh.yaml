      - number: '2.5'
        title: 反向证据与市场规模不确定性
        blocks:
          - type: paragraph
            body: >
              **临床医生和安全怀疑：** Advisory Board（2023）记录了临床医生对 AI 替代护理岗位的显著担忧，护士尤其担心 AI 介入互动中的患者安全。PSQH 报道过医疗场景中的 AI
              幻觉风险，指出面向患者的 AI 错误比消费者 AI 错误后果更重，因为患者可能按错误医疗建议行动。即使行政和临床领导层支持，这些担忧也会让 Hippocratic 部署在临床团队买账时遇到真实摩擦。


              **市场规模口径模糊：** 没有分析师报告把「面向患者的 AI 智能体收入」干净地单列为一个细分。Strategic Market Research 对患者参与 AI 给出的 $1.82B 数字包含 SaaS
              平台、远程医疗工具和非对话式 AI。自下而上的 SOM 测算高度依赖平均智能体使用量（小时 / 月）假设，而这些数据未披露。Grand View Research 和 MarketsandMarkets
              对广义医疗 AI 的估算包含放射、基因组和药物发现，会把与 Hippocratic 相关的 TAM 高估 10–50 倍。


              **医疗系统预算压力：** 2024 年美国医院运营利润率平均约 1–2%（Kaufman Hall 数据）。技术采购要与设施、医疗设备和 EHR 升级等资本投资竞争。即便 ROI 有吸引力，利润率承压的医院
              CFO 也会谨慎对待多年期 AI 服务承诺。支付方组织面临医疗成本率压力，也可能推迟非强制性技术投资。


              **监管和隐私风险：** 每个医疗系统部署都必须签署 HIPAA Business Associate Agreement（BAA），增加法律负担。AI
              智能体处理患者数据，还会在州隐私法律（CCPA、SHIELD Act）下受到额外审查。如果 FDA 将 Hippocratic 智能体归类为医疗器械——即便只是一般健康（general
              wellness）层级——也会带来显著额外合规要求。
            claimRefs:
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
              - CM034
