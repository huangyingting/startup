      - number: '7.2'
        title: 运营、质量和安全风险
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的临床安全声明，是公司商业叙事中最重要的未验证主张。公司报告 Polaris 3.0 的临床准确率为 99.38%，通过 6,200 名临床测试者和 1.85 million
              次真实患者通话测试验证。该声明由公司自报，尚未经过独立审计、同行评议或发表在临床期刊上。没有独立医院 IRB 研究、第三方临床评估公司或监管机构审核或验证这些指标。NEJM Catalyst
              曾专门记录面向患者医疗场景中大语言模型幻觉带来的临床风险，并指出，在高体量环境里，即便错误率很低，也会造成有意义的患者伤害潜力。截至 2026 年 4 月，公司报告 180M+ 次患者互动；1%
              错误率——远低于公司声称的 0.62%——也意味着超过 1.8 million 次潜在不准确患者互动。临床后果从漏掉用药提醒，到对严重症状给出不恰当安抚不等。


              AI 介导的患者伤害责任框架在美国法律中尚未解决。如果患者遵循 Hippocratic AI agent 的指引、出现不良结果并起诉医疗系统，医疗系统可能会把 Hippocratic AI
              作为技术供应商寻求赔偿。多家律所的法律分析显示，如果法院认定 AI 产品是近因，标准医疗 IT 供应商责任上限和责任限制条款未必能让 Hippocratic AI 完全隔离损害赔偿。截至 2026 年 5
              月，尚无针对 AI patient agent 责任的公开判例法。


              语音 AI 特有风险与 Hippocratic AI
              的部署画像尤其相关。公司的主要客户细分——服务老年、慢性病和多语言患者人群的医疗系统——恰好是最容易受到语音界面失效模式影响的人群。家庭环境背景噪声、训练数据之外的口音差异、听力障碍和压力下的认知负荷，都会降低语音
              AI 准确率。在 29 家 UHS 医院和 50+ 个合作机构规模化、24/7 运行时，患者安全事件累积速度可能超过内部监测和响应能力。PHI
              处理要求会放大安全风险：语音通话录音、患者标识符和实时跨云基础设施处理的临床数据，都是对抗性攻击的高价值目标。截至 2026 年 5 月，未发现公开的 SOC 2 Type II、HITRUST
              或同等安全认证文档。
