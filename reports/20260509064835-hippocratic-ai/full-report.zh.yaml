      - number: '8.5'
        title: 退出准备度与尽调框架
        blocks:
          - type: paragraph
            body: |
              相对 $3.5B 估值标记，Hippocratic AI 的退出准备度仍不成熟。公司尚未披露 ARR、毛利率、NRR 或烧钱速度——
              这是面向公开市场的四个标准指标。没有这些数据，考虑 pre-IPO 或跨市场仓位的机构投资者缺少投资级估值的
              财务基础。公司 Series C 新闻稿（BusinessWire，November 2025）强调并购意图，说明按当前轨迹看，最可能的退出
              路径不是 IPO，而是出售给更大的医疗 IT、医疗系统或科技买方。潜在战略买方包括 Microsoft（Azure Health、Nuance
              先例）、Google（Google Health、CapitalG 投资方）、UnitedHealth Group（Optum 临床自动化）和 CVS Health
              （Aetna 临床服务规模）。

              上市可比公司意味着，要在当前估值下 IPO，公司还需要显著补收入。Phreesia 在 $107M ARR 基础上 IPO，
              市值约 $1.4B（2019），对应 13x 倍数。Hippocratic AI 若要以 $3.5B+ IPO，需要 IPO 规模 ARR 达到
              $270M+，NRR 稳定高于 110%，毛利率为正并向盈利靠近。按当前 ARR 估计，最早合理 IPO 窗口是 2028-2030。

              现阶段任何出资承诺，都应锚定十项必须满足的具体尽调要求。最卡脖子的三项是：（1）过去 8 个季度 ARR 和 MRR
              趋势，并按客户层队列归因；（2）FDA 监管律师对 SaMD 分类风险的意见，包括迄今任何非正式 FDA 沟通；
              （3）按客户队列拆分的 NRR，用来判断留存质量。缺少这三项，无论定性投资逻辑多强，投资都仍属于“继续研究”。
              剩余七项尽调要求（烧钱速度、股权结构表、客户集中度、EHR 集成文档、安全审计、并购管线和清算优先权）也很重要，
              但单项不构成阻断；它们是签署投资意向书前完整尽调包的必要内容。
