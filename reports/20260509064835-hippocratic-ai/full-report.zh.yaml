  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用例类别
      - 工作流步骤
      - 参与者
      - 结果指标
      - 医疗系统示例
    rows:
      - - 出院后随访
        - 1. AI 智能体在出院后 24–72 hrs 发起外呼；2. 与患者复核出院医嘱；3. 筛查再入院风险症状； 4. 确认是否取药；5. 安排随访预约；6. 如发现危险信号，升级给护士
        - 患者（医疗系统外呼）
        - 30 天再入院率下降；用药依从率；随访预约完成率
        - WellSpan Health、University Hospitals
      - - 用药依从性触达
        - 1. AI 智能体在处方配药后致电患者；2. 确认患者已开始用药；3. 评估副作用；4. 提供剂量提醒； 5. 回答用药相关 FAQ（不处方）；6. 如有临床问题，转给药剂师或护士
        - 患者（慢病、处方后）
        - 用药依从率；续配率；捕捉患者报告的副作用
        - Memorial Hermann Health System 与 HonorHealth 等医疗系统
      - - 预防性筛查触达
        - 1. AI 从医疗系统登记库识别护理缺口人群；2. 向符合条件的患者外呼；3. 解释筛查重要性； 4. 安排结肠镜、乳腺 X 光或其他筛查；5. 提供准备说明；6. 预约前 24 hrs 确认
        - 患者（符合人群健康条件的队列）
        - 筛查完成率；护理缺口闭环率；预约到诊率
        - Cincinnati Children's（儿科筛查）、OhioHealth
      - - SDOH 调查 / 健康风险评估
        - 1. 向患者人群外呼；2. 结构化 SDOH 调查（食物不安全、住房、交通、社会隔离）； 3. 健康风险分层评分；4. 若识别出 SDOH 需求，转给社区健康工作者或社会服务； 5. 数据记录到 HRA 工作流
        - 患者（人群健康项目）
        - SDOH 需求识别率；社会服务转介率；项目完成率
        - Universal Health Services、支付方 HEDIS 项目
      - - AI Front Door — 患者接入
        - >-
          1. 患者拨打医疗系统总机；2. AI Front Door 接听并完成接入问询；3. 识别患者需求 （预约、续药、检查结果、一般问题）；4. 路由到合适科室或直接排期；5. 无需转人工即可处理常规 FAQ； 6.
          将复杂来电升级给人工员工
        - 患者（打入医疗系统）
        - 首次联系解决率；呼叫放弃率；人工坐席分流率；患者满意度得分
        - Cincinnati Children's Hospital（April 2026 发布）
      - - Nurse Co-Pilot
        - >-
          1. 护士为行政任务启用 Nurse Co-Pilot；2. Nurse Co-Pilot 处理患者沟通任务（预约提醒、状态更新）； 3. 协助文档支持（结构化输入）；4. 标记需要护士关注的患者发起的请求； 5.
          降低每班行政负担
        - 床旁护士（面向临床人员）
        - 每班节省时间；行政任务完成率；护士满意度得分
        - 发布时尚未公开点名；April 2026 新闻稿称已有初始部署
    notes: |
      工作流步骤根据产品描述、新闻稿和客户案例研究重构。大多数用例未披露具体结果指标数值——
