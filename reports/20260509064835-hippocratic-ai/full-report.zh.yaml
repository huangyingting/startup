      - number: '2.2'
        title: 市场规模测算：TAM、SAM 与 SOM 构建
        blocks:
          - type: paragraph
            body: >
              **广义 TAM——全球医疗 AI：** MarketsandMarkets（2025）估计，全球医疗 AI 市场到 2030 年将达到 $110.6B，较 2025 年约 $22B 的基数 CAGR 为
              38.6%。Precedence Research 预计 2034 年达到 $613.8B、CAGR 为 37%；这个数字口径最宽，包含制药 AI。Grand View Research 估计 2032 年为
              $45.2B、CAGR 为 37.5%。市场共识区间是到 2030 年 $36.9B–$110.6B，CAGR 为 36–47%。这个 TAM 对 Hippocratic 来说过宽：其中包括诊断影像
              AI（$8B+）、药物发现 AI（$4B+）和临床基因组 AI，而 Hippocratic 不参与这些市场。


              **狭义 TAM——患者参与 AI：** Strategic Market Research 将患者参与 AI 市场规模估为 2024 年 $1.82B，并以约 25% CAGR 增至 2030 年
              $23.1B。Grand View Research 也报告了类似细分。Dataintelo 估计 CAGR 为 21–25%。这是最相关的市场层，因为它覆盖护理导航、患者触达、教育和会员参与 AI，直接对应
              Hippocratic 的产品用例。


              **SAM——Hippocratic 的三类买方：** Hippocratic 瞄准三类付费买方：（1）美国医疗系统（约 6,000 家医院、约 170M 次门诊就诊 /
              年——患者导航和出院后随访是最高优先级用例）；（2）健康保险公司 / MCO（约 900 个计划，覆盖 320M 参保人——护理管理和会员参与）；（3）制药公司（约 5,000 家美国制药 /
              生物科技公司——患者依从性、临床试验触达）。三类客户在患者沟通、呼叫中心和护理管理人手上的年度运营支出合计估计为每年 $40–80B。


              **SOM——自下而上的当前渗透率估算：** 以 50+ 家企业合作伙伴和 $9/智能体小时定价测算： - 如果每个合作伙伴部署 100 个智能体，平均每次患者通话 10 分钟，500 次通话/月 = 83
              个智能体小时/月 = 每个智能体 $750/月 = 每个合作伙伴 $37,500/月（100 个智能体） - 50 个合作伙伴 × $37,500/月 = $1.875M/月 = 最低部署口径约 $22.5M
              ARR

              - 200 个智能体 / 合作伙伴：约 $45M ARR；500 个智能体 / 合作伙伴：约 $112.5M ARR

              - 这只是渗透率代理指标；实际 ARR 未公开披露


              护士短缺构成结构性驱动：HRSA 预计 2025 年 RN 缺口为 295,800 人，2030 年将超过 500,000 人。RN 工资中位数为 $39/hr，而 Hippocratic 智能体成本为
              $9/hr；对于边界清晰、非临床行政工作流，经济替代逻辑很明确。
