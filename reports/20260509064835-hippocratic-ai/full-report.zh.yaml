              2025 年 295,800 名 RN 缺口（HRSA）不是周期性问题，而是老龄化 RN 队伍与不断增长的患者量之间的人口结构错配。RN 工资中位数 $39/hr，而 Hippocratic 智能体成本为
              $9/hr；对边界清晰的行政工作流来说，ROI 论证不需要额外市场教育。这是一笔替代销售，指向一个已经存在且每年增长 5% 的预算。
