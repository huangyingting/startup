  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式、定价与 GTM 经济性
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 采用 B2B 按用量计费模式，向医疗系统、支付方和制药公司按活跃患者互动的 agent-hour 收取 $9。这个定价本质上是劳动力替代产品：BLS 注册护士（RN）工资中位数为
              $39.05/hour (2024)，也就是说，在符合条件的非诊断外联任务中，Hippocratic 的 AI agent 成本约为被替代 RN 人力成本的 23%。按 RN 全口径成本（工资 + 福利 +
              雇主税费 + 管理开销，通常为基本工资的 1.3–1.6x）计，相对人工劳动的实际折扣达到 80–85%。


              GTM 动作是企业级 B2B，销售周期由临床工作流牵引。Hippocratic AI 把 Cincinnati Children's、WellSpan Health、Universal Health
              Services、HonorHealth、OhioHealth 和 Memorial Hermann Health System
              等战略医疗系统投资方，同时绑定成财务支持者和部署标杆客户。这种「投资者即客户」模式降低了冷启动销售风险，但也带来收入集中风险：与战略投资方签下的交易可能采用更有利、低于市场的经济条款，从而夸大部署速度。


              销售周期未披露，但可以从医疗企业采购环境倒推：典型 EHR 或人口健康技术合同，从初步评估到签约通常需要 12–18 个月。单个企业医疗系统的平均合同价值未披露。参照可比医疗 SaaS 基准——企业医疗系统平台
              ACV 为 $500K–$2M——50+ 家企业合作伙伴意味着年化合同价值约 $25M–$100M。这些是尽调构建的代理估计，不是已确认数字。


              定价模型给买方提供了清晰的 ROI 叙事：一个医疗系统每月运行 10,000 个 AI-agent-hours，需要支付 $90,000/month（$1.08M/year）；若用等量 RN 工时，按 BLS
              中位数且不含雇主开销，约需 $390,000/month。4.3x 的成本比让医疗系统规模化部署时的单位经济模型很有说服力，前提是临床范围（非诊断）足以覆盖目标用例。


              公司没有消费者收入，全部收入来自 B2B 企业客户。医疗系统、支付方和药企之间的收入结构未披露；Series C 材料将药企用例（临床试验患者支持、用药依从性）列为增长中的板块。公司提到国际收入（截至 2026
              年 5 月覆盖 6 个国家），但未披露其在总收入中的占比。
