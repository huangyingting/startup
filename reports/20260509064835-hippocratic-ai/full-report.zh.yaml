      - number: '5.2'
        title: Polaris 架构——安全星座和技术设计
        blocks:
          - type: paragraph
            body: >
              Polaris 架构是 Hippocratic AI 的核心技术差异化，也是支撑 $3.5B 估值的基础创新主张。Polaris 3.0（2025 年 3 月 19 日发布）由 22 个专用大语言模型组成，合计
              4.2 万亿参数——总参数量高于当时任何单个公开披露模型，不过参数量本身并不是公司主张的主要优势。


              Safety Constellation Architecture（安全星座架构）采用分层多 agent 设计：

              - **主状态化 agent**：单个对话 agent 维护上下文、管理患者互动，并在完整多轮患者通话中协调对话流。

              - **专家子 agent**：多个并行专家 LLM 实时检查主 agent 的输出，每个都针对不同临床领域（用药、化验、程序、安全升级、监管合规等）做专门化。

              - **关键临床数据三重验证**：对药物名称、剂量、实验室数值和其他高风险临床数据，架构要求三次独立 LLM 检查后，才能把任何信息传达给患者。


              这种架构通过要求多个模型达成共识，抵御单个 LLM 幻觉造成的故障，类似安全关键系统中的多法官小组。研究基础来自 2024 年 3 月 arXiv
              预印本（arXiv:2403.13313），该论文在医疗安全评估上将 Polaris 与 GPT-4 和 LLaMA-70B 对标。


              Polaris 版本历史：

              - Polaris 1.0（2024）：4 个 LLM；引入基线架构。

              - Polaris 2.0（约 2024 年末）：3.7 万亿参数；扩展专家 agent 集合。

              - Polaris 3.0（2025 年 3 月）：22 个 LLM、4.2 万亿参数；Safety Constellation 全面部署。


              训练语料：Polaris 结合了来自医疗系统关系的自有医疗数据、临床协议、政府医疗监管规定、医疗程序手册和模拟患者—临床人员对话数据集——提供了通用 LLM 提供商拿不到的专门医疗训练分布。


              基础设施：NVIDIA H100/H200 GPU、TensorRT-LLM 推理优化、NVIDIA Avatar Cloud Engine（ACE）语音合成，以及 AWS
              云托管。公司称该系统能够提供自然对话互动所需的超低延迟语音响应。


              临床表现声明（Polaris 3.0，公司报告）：

              - 99.38% 临床准确率

              - 6,200+ 名临床测试者评估该系统

              - 测试使用 1.85 million 次真实患者通话

              - 生产部署中严重不良事件为 0.00%

              这些声明出现在公司的官方 Polaris 3.0 公告和研究页面中，但尚未经过独立同行评议，也未获外部临床权威验证。
