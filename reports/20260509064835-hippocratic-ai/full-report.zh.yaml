      - number: '2.3'
        title: 买方地图与细分动态
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 以 B2B 方式销售给三类企业买方，它们的采购路径、预算所有者和采用触发点各不相同。理解这些差异，是测算 SOM 和建模增长的关键。


              **医疗系统（最大细分）：** 综合交付网络（IDN）、学术医学中心和社区医院。采购委员会包括首席医学信息官（CMIO）、首席护理信息官（CNIO）、CIO 和临床科室负责人。预算由 CFO /
              高管层掌握，并需临床领导批准。采用触发点包括护士短缺程度、与 CMS 报销挂钩的 HCAHPS 患者体验分，以及 COVID 后护理导航积压。WellSpan
              Health（Pennsylvania）是公开确认的生产部署客户。首个合同采购周期为 12–18 个月；在既有系统内扩张会更快。


              **支付方和 MCO（第二细分）：** 商业保险公司、Medicare Advantage 计划和 Medicaid 管理式医疗组织。买方通常是会员体验 SVP
              或首席数字官；预算来自护理管理和医疗成本降低项目。采用触发点是 CMS 星级评分压力——低星级评分会直接压低 Medicare Advantage 计划盈利能力。一个 AI 智能体每天拨打 1,000
              通触达电话，按 $9/智能体小时计算，远低于呼叫中心运营成本。价值主张是通过主动会员参与和慢病管理降低医疗成本。


              **Pharma 和 biotech（第三细分）：** 患者服务团队负责依从性支持、专科药入组和临床试验患者沟通。预算来自患者服务或医学事务部门。采用触发点是 FDA
              对患者报告结局（PRO）的压力，以及临床试验患者退出成本（每流失一名患者 $25,000–$50,000）。Hippocratic 智能体提供合规、可记录的触点，而人工患者联络员无法把这类触点规模化。


              **政府和 VA（早期）：** 不是当前公开表述的重点，但 TRICARE 和 VA Community Care 面临类似的呼叫中心人力挑战。这是一个潜在长期细分。
