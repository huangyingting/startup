  - id: FV003
    title: 估值 / 回报区间
    type: range
    notes: 估值情景以十亿美元计价。低 = 悲观情景下的 2028 退出；基准 = 基准情景下的 2028 退出；高 = 乐观情景下的 2028 退出。回报倍数相对于 $3.5B Series C 入场价计算。
    data:
      items:
        - label: 悲观情景 2028 退出
          low: 0.75
          base: 1
          high: 1.1
          unit: $B
          detail: ARR $50-75M，10-15x ARR 倍数；Series D 以 $2-3B 降价轮融资；通过困境 M&A 退出；相对 $3.5B Series C 入场亏损 -70%
        - label: 基准情景 2028 退出
          low: 4.5
          base: 6
          high: 7.5
          unit: $B
          detail: ARR $150-250M，20-30x ARR 倍数；Series D 估值 $5-7B；IPO 或战略 M&A；相对 $3.5B Series C 取得 1.3-2.1x 回报
        - label: 乐观情景 2028 退出
          low: 10
          base: 12.5
          high: 15
          unit: $B
          detail: ARR $400-600M，20-25x ARR 倍数；Microsoft、Google 或 Epic 以 $10-15B 战略收购；相对 $3.5B Series C 取得 2.9-4.3x 回报
    claimRefs:
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
  - id: FV004
    title: 投资 KPI
    type: kpi
    notes: 投资委员会评估所需的关键指标。ARR 和倍数数字是基于公开数据代理方法得出的尽调估计，尚未由公司披露确认。
    data:
      items:
        - label: 当前估值（Series C，Nov 2025）
          value: $3.5B
          unit: post-money
          detail: Avenir Growth 领投；NVIDIA 和 CapitalG 参与；20 个月内较 $500M Series A 估值提升 7x
        - label: 隐含 ARR 倍数（基准）
          value: 93x
          unit: ARR
          detail: 按基准情景 ARR 估计 $37.5M；区间从 35x（乐观，ARR $100M）到 233x（悲观，ARR $15M）；品类龙头区间为 50-80x
        - label: 累计融资
          value: $404M
          unit: cumulative
          detail: Seed $50M + Series A $53M + NVIDIA $17M + Series B $141M + Series C $126M = $387M；另有来自 NVIDIA 的 $17M 单独计入
        - label: 患者交互（Apr 2026）
          value: 180M+
          unit: interactions
          detail: 公司自报截至 April 2026；按 $9/hr 计，若全部足额计费，最高对应 $270M 总账单——可能混合了试点和合同用量
        - label: 企业伙伴
          value: 50+
          unit: partners
          detail: 覆盖 6 个国家的医疗系统、支付方和药企；具名账户包括 UHS（29 家医院）、WellSpan、Cincinnati Children's、OhioHealth
        - label: 投资建议
          value: CONDITIONAL POSITIVE
          unit: stance
          detail: 在确认 ARR > $50M、NRR > 110% 且拿到 FDA 意见后，可投 Series D 或 $3-4B 估值的新股；回避 $4B 以上估值的 Series C 老股
    claimRefs:
      - CV001
      - CV009
      - CV010
      - CV011
      - CV015
      - CV025
