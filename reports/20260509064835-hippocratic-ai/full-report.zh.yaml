  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构和核心产品定义
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的主产品是 AI Patient Agent——一个语音优先的生成式 AI 系统，代表医疗系统、支付方和制药企业客户执行出站和入站患者互动。该 agent
              用自然语言语音对话执行临床工作流，包括出院后随访、慢性病管理、用药依从性监测、预防性筛查外联、健康风险评估、健康社会决定因素（SDOH）调查、预约提醒和护理缺口闭环。产品支持跨 25+ 个医学专科的 1,000+
              个不同临床用例，采用医疗系统 “App Store” 模式，让企业客户配置并部署特定用例包。


              产品在设计上明确非诊断、非开方——agent 不做诊断、不推荐治疗，也不开药。这个选择既是产品理念（患者安全优先），也是监管策略：留在临床决策阈值之下，Hippocratic AI 就能避免被归类为 FDA
              Software as a Medical Device（SaMD），显著降低监管合规负担和上市时间。公司主张，这一范围覆盖了绝大多数不需要诊断判断的患者互动量。


              多语言能力包括英语、西班牙语、海地克里奥尔语和尼泊尔语；截至 2026 年 5 月，语言支持仍在扩展。语音界面使用 NVIDIA Avatar Cloud
              Engine（ACE）做语音合成，并采用公司所称的「同理心推理技术」——根据患者情绪线索调整语气、节奏和情绪表达。出站呼叫是主要部署形态；入站处理则支持 AI Front Door 用例。


              2026 年 4 月推出了两款新产品：

              1. **AI Front Door**：一个全渠道患者入口 agent，作为医疗系统患者互动的入口点。它将患者路由到合适护理、安排预约、处理 FAQ，并替代传统呼叫中心分诊。发布时已部署在 Cincinnati
              Children's Hospital 和部分合作伙伴处。

              2. **Nurse Co-Pilot**：面向床旁护士的 AI 助手，处理行政任务、文档支持和患者沟通工作流管理。不同于 AI Patient Agent（直接与患者互动），Nurse Co-Pilot
              直接支持护士——这是从面向患者 AI 扩展到辅助临床人员 AI 的重要产品跃迁。


              所有产品都作为符合 HIPAA BAA 要求的托管服务运行。公司在临床能力中提到与电子健康记录系统（Epic、Cerner）集成，但具体集成深度、API 访问和 Epic App Orchard
              会员状态尚未被公开确认。
