  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览和合作伙伴规模
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 称，截至 2026 年 5 月，其客户基础横跨 6 个国家的医疗系统、支付方和制药公司，拥有 50+ 个企业合作关系。公司从商业化发布（2024 年 6 月）时的零企业客户，在不到
              24 个月内增长到 50+，意味着每月大约新增 2–3 个企业账户。公司报告在这一合作伙伴基础上完成了 115M+ 次临床患者互动——这同时指向客户账户广度，以及单个客户内部有实质部署深度。


              客户基础分为三类主要买方：

              1. **医疗系统**（医院网络和综合交付网络）：首要且最大的细分；已确认具名账户包括 WellSpan Health、Universal Health Services、Cincinnati
              Children's Hospital、University Hospitals 和 UNC Health。

              2. **支付方**（健康保险公司和管理式医疗组织）：次要细分，用例包括 HEDIS 缺口闭环和会员互动；截至 2026 年 5 月，未公开披露具体支付方名称。

              3. **制药公司**：按 Series C 资金用途披露，这是增长中的细分；主要用例包括用药依从性、临床试验患者支持和患者教育；未披露具名药企合作伙伴。


              在 50+ 个合作伙伴中，至少 4 个也是战略投资者（WellSpan Health、Uniting Care Queensland、Universal Health Services 和 Cincinnati
              Children's），形成客户—投资者重叠，需要单独拆分商业动机和战略动机。这些投资方客户按设计就是早期采用者——股权投资让部署激励保持一致——而它们持续扩张的信号（UHS 推广到全部 29
              家医院）表明，除投资绑定外，也存在真实商业价值。
