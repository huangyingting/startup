chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 于 2023 年初在 California 州 Palo Alto 创立，使命是用生成式 AI 缓解全球医疗人手短缺。公司把自己定位为「医疗 AI 的安全层」：部署 AI
              智能体，处理出院后随访、慢病管理、预约安排、用药依从性、癌症筛查触达等非诊断、面向患者的临床任务。关键在于，公司明确禁止智能体做诊断或开处方，在覆盖大量医疗工作流的同时压低责任风险。公司采用 B2B
              按使用量计费模式，按有效患者互动的每个智能体小时向医疗系统收取 $9。Hippocratic AI 于 2024 年 6 月推出首款生成式 AI 医疗智能体产品并开始商业化，随后又发布 AI Front
              Door（全渠道患者入口智能体）和 Nurse Co-Pilot（面向床旁护士的 AI 语音助手）。截至 2026 年 5 月，公司在 6 个国家服务 50+ 家企业级医疗客户，包括医疗系统、支付方和制药公司。
