      - number: '6.2'
        title: 具名客户账户和案例研究
        blocks:
          - type: paragraph
            body: >
              **WellSpan Health**（York, PA——大型区域 IDN，自 2023 年 11 月起为战略投资者）：

              WellSpan 是全球最早部署 Hippocratic AI agent 的主要医疗系统之一，将其命名为 “Ana”，用于癌症筛查外联（结直肠 /
              结肠镜）和结肠镜检查准备支持。该部署瞄准医疗公平——用西班牙语外联，并计划增加海地克里奥尔语和尼泊尔语。WellSpan 2025 年 HAP Achievement Award（Hospital and
              Healthsystem Association of Pennsylvania）提供了第三方认可。WellSpan 提到，临床员工受到正面影响，存在语言障碍的患者筛查参与度也有所提高。


              **Universal Health Services (UHS)**（King of Prussia, PA——29 家医院的急性护理网络，战略投资者）：UHS 部署 Hippocratic AI agent
              做出院后患者互动，最初落地于 Summerlin Hospital Medical Center（Las Vegas, NV）和 Texoma Medical Center（TX）。UHS
              报告，接触到的患者平均满意度约为 9/10，并正扩展到全部 29 家急性护理医院。


              **Cincinnati Children's Hospital Medical Center**（Cincinnati, OH——美国排名 top-3 的儿科医疗系统，Series C 投资者）：已确认是 AI
              Front Door 发布合作伙伴（2026 年 4 月），为顶级儿科机构处理入站患者分诊、预约和 FAQ 管理。


              **Uniting Care Queensland**（Brisbane, Australia——种子轮投资者）：Hippocratic AI
              已确认的主要国际客户；具体用例未公开详述。其运营社区健康、养老护理和医院服务。


              **University Hospitals**（Cleveland, OH）：2025 年 9 月宣布合作，用于患者互动和慢性病管理——这是一个非投资者具名企业账户。


              **UNC Health**（Chapel Hill, NC）：在 2026 年 4 月扩张公告中被提及，是额外医疗系统合作伙伴。
