      - number: '4.2'
        title: 资本充足性、融资历史和资金用途
        blocks:
          - type: paragraph
            body: >
              自 2023 年 5 月种子轮以来，Hippocratic AI 已通过五次不同融资累计募集 $404 million。种子轮（约 $50M，2023 年 5 月）由 General Catalyst 和
              a16z 领投。Series A（$53M，2024 年 3 月，估值 $500M）由 General Catalyst 和 Premji Invest 共同领投，五家医疗系统战略参投。NVIDIA 约在
              2024 年 8 月通过 NVentures 投入 $17M 战略资金。Series B（$141M，2025 年 1 月，估值 $1.64B）由 Kleiner Perkins 领投，General
              Catalyst 和 NVIDIA 继续参与。Series C（$126M，2025 年 11 月，估值 $3.5B）由 Avenir Growth 领投，CapitalG（Google
              的成长基金）新进参投，战略投资方继续跟进。


              估值抬升轨迹异常陡峭：$500M（2024 年 3 月）→ $1.64B（2025 年 1 月）→ $3.5B（2025 年 11 月），最后一步在 8 个月内估值增加
              3.3x。这个轨迹说明投资者正在为显著的未来收入增长定价——如果 ARR 落在 $25–100M 的估计区间，当前隐含 ARR 倍数为 35–140x，处在医疗 AI 私募市场可比公司高位（行业基准约
              10–30x ARR）。


              Series C 的资金用途已公开：产品扩展、国际增长和 M&A。M&A 信号值得注意——这说明 Hippocratic AI
              可能希望借收购加快产品范围或地域覆盖扩张；在内部收入增长尚未被确认的阶段，这会引入执行风险和资本配置复杂度。


              烧钱速度未披露。公司运行在 NVIDIA H100/H200 GPU 上的 22-LLM 推理架构，还要维持 7,500+ 人的临床验证员网络，运营成本结构高度依赖 GPU 计算。类似规模的 AI
              公司报告推理密集型 SaaS 毛利率为 40–70%（因 GPU COGS，低于纯软件）。在累计融资 $404M、当前现金余额未披露的情况下，可以合理推断现金跑道为 18–36 个月，具体取决于烧钱假设。


              公司未披露盈利路径。按 2025 年融资节奏，公司大约每年融资 $100–140M；这与一家公司每年在基础设施、验证员网络、临床合作和 GTM 投入上烧掉 $80–120M
              相一致——但这只是推断，不是已确认数字。
