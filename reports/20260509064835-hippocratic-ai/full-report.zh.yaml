  - id: TE003
    title: 技术 / 运营架构表
    columns:
      - 层级
      - 组件
      - 技术 / 工具
      - 功能
      - 依赖
      - 成熟度
    rows:
      - - LLM 核心
        - 主有状态智能体
        - Hippocratic AI 自研 LLM（Polaris 3.0）
        - 管理对话上下文，驱动患者互动流程，生成主要回复
        - 基于自有医疗数据 + 临床协议训练
        - 生产环境（GA）— 1.85M+ 次测试通话
      - - LLM 核心
        - 专业安全子智能体（21 个专业 LLM）
        - Hippocratic AI 自研专业 LLM
        - 并行检查主智能体在各临床领域的输出；对关键数据做三重检查
        - 基于共识的错误检测；完整 Safety Constellation 需要 22-LLM 集成
        - 生产环境（GA）— 已部署于所有企业互动
      - - 计算基础设施
        - GPU 推理集群
        - NVIDIA H100 / H200 GPU
        - 为 22-LLM 实时语音对话提供高性能推理；需要超低延迟
        - 关键依赖 — NVIDIA NVentures 战略投资；H100/H200 供应约束是风险
        - 生产环境 — NVIDIA 战略合作伙伴
      - - 计算基础设施
        - 推理优化
        - NVIDIA TensorRT-LLM
        - 提升 NVIDIA GPU 上的 LLM 推理吞吐、降低延迟；支撑实时语音低延迟
        - NVIDIA 专有工具；与 NVIDIA GPU 栈深度绑定
        - 生产环境
      - - 语音 / 话音层
        - 语音合成和语音界面
        - NVIDIA Avatar Cloud Engine（ACE，云引擎）
        - 生成自然语言语音，可推断情绪；提供超低延迟语音
        - NVIDIA ACE 合作；语音质量是患者体验的差异化因素
        - 生产环境
      - - 云基础设施
        - 云托管和编排
        - AWS（Amazon Web Services）
        - 云托管、弹性扩展、故障切换，以及符合 HIPAA 的数据基础设施
        - 托管和 BAA 依赖 AWS；未披露替代云服务商
        - 生产环境
      - - 临床验证层
        - 临床医生验证网络
        - 7,500+ 名美国执业临床医生（人类）
        - 测试、评分并认证 AI 智能体在 1,000+ 个临床用例中的响应
        - 验证者网络需要持续管理；存在薪酬和留存风险
        - 生产环境 — 持续运行
      - - 数据 / 训练层
        - 医疗训练语料
        - 专有临床数据 + 政府医疗法规 + 医疗规程
        - 围绕医疗场景交互做微调和 RLHF；这是相对通用 LLM 的准确率优势来源
        - 专有；靠医疗系统关系积累
        - 成熟 — Polaris 3.0 体现 3 年以上临床数据整理积累
      - - 安全监测
        - 真实世界证据监测
        - Real-World Evidence LLM（RWE-LLM）框架
        - 持续监测生产交互，捕捉安全信号并发现质量漂移
        - Hippocratic AI 专有；方法论未由独立方公开发表
        - 生产环境 — 活跃
      - - EHR 集成
        - 电子健康记录连接
        - Epic、Cerner（推定；细节未披露）
        - 可访问患者出院数据、用药清单和照护计划，支撑高价值用例
        - 关键依赖 — 高价值用例需要接入医疗系统 EHR 数据
        - 部分部署 — 集成深度未公开确认
      - - 合规
        - HIPAA BAA
        - 标准业务伙伴协议
        - 确保所有医疗系统、支付方和药企客户的数据处理符合 HIPAA
        - 所有企业部署都需要；医疗 SaaS 的标准配置
        - 生产环境 — 所有企业客户
    notes: |
      EHR 集成细节来自临床用例描述推断——实际 API 深度、
      Epic App Orchard 会员身份和 Cerner 集成方式未在公开披露中确认。
      NVIDIA H100/H200 GPU 依赖反映 Polaris 3.0 公告；具体服务器数量或
      预留容量未披露。RWE-LLM 框架见公司研究材料，
      但尚未经过独立同行评审。
