      - number: '7.5'
        title: 财务、模型和投资逻辑破裂风险
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 2025 年 11 月 Series C 的 $3.5B 估值，建立在一个无法从公开来源验证的增长轨迹之上。收入未披露。尽调代理得出的隐含 ARR 区间为 $25M 到
              $174M，对应估值倍数 20x 到 140x；中点估计 $50M-$100M ARR 隐含 35x-70x 倍数。剔除异常值后，高增长收入阶段医疗 AI 私募市场可比公司交易倍数为 15-25x
              ARR。因此，除非 Hippocratic AI 的增长率显著超过同行队列，否则当前隐含倍数高于市场；短期收入加速必须发生，估值才能在下一轮融资或退出时被证明成立。


              $9/agent-hour 的按用量收入模型，引入了订阅 SaaS 模式可以避免的收入波动风险。如果医疗系统因预算压力、报销变化或技术替代而减少互动量，Hippocratic AI
              收入会下降，且没有任何合同最低收入保护。规模化后，客户基础使用量下降 20%，就会产生 20% 的收入下降，而不是按季度逐步显现的慢流失信号。CMS 价值医疗框架下，AI
              介导患者互动的支付方报销尚未建立；这意味着医疗系统 ROI 计算完全依赖内部成本节省——这比按服务收费收入更难持续。


              Babylon Health 提供了该行业最突出的警示先例。Babylon 融资超过 $1.2B，2021 年通过 SPAC 获得 $4.2B 估值，随后在 2023 年 8 月申请破产，当时报告 $310M
              收入对应 $214M 净亏损。具体失败模式——单位经济模型无法规模化、临床质量声明遭监管审查、关键医疗系统合同流失——直接映射到 Hippocratic AI 最重要的风险维度。虽然 Hippocratic AI
              尚未披露收入，也没有展现 Babylon 的具体财务画像，但业务模型和估值野心上的结构相似性，足以让 Babylon 成为监控基准。该投资逻辑的否决条件包括：(1) FDA 将产品重新分类为 SaMD，并要求
              510(k) 审查许可；(2) 公开记录的患者伤害事件触发监管或法律行动；(3) Epic 或 Cerner 推出捆绑式 AI 患者外联功能，替代 3+ 个 Hippocratic AI 医疗系统客户；(4)
              Series D 以持平或下调估值融资；(5) Munjal Shah 离开公司。
