      - number: '3.7'
        title: 图表与证据
        blocks:
          - type: callout
            title: Hyro AI 的 Epic 集成优势带来采购风险
            body: >
              Hyro AI 公开记录的 Epic App Orchard 集成深度高于 Hippocratic AI 在公开材料中披露的水平。Epic 集成深度是使用 Epic 的医疗系统中 CMIO 和 CIO
              买方的决定性采购标准，而这些系统覆盖美国多数学术医学中心和大型 IDN。如果 Hyro 能在竞争评估中证明 Epic 集成明显更快或更完整，Hippocratic
              即使安全指标更好，也可能输掉医疗系统交易。尽调必须直接向产品管理层核实 Hippocratic 的 Epic 集成路线图和当前 App Orchard 认证状态。
            calloutType: risk
            claimRefs:
              - CP004
              - CP015
          - type: callout
            title: 安全指标独立性缺口——仅由公司报告
            body: >
              Hippocratic AI 最强卖点——经临床医生验证的 99.38% 临床准确率和 7,500+ 名验证者——由公司报告，截至 2026 年 5 月尚未在已发表临床试验中接受独立同行评审。arXiv
              预印本（Polaris paper）使用内部评估方法。没有独立验证，Hippocratic 的安全主张带有公司利益偏差，成熟的医疗系统采购团队会严格审视。如果竞争者率先拿到同行评审安全论文，将显著削弱
              Hippocratic 的主要差异点。尽调应要求获取完整内部验证数据集和方法。
            calloutType: risk
            claimRefs:
              - CP028
              - CP023
          - type: callout
            title: 6 倍患者互动密度优势形成数据飞轮
            body: >
              Hippocratic AI 拥有 180M+ 次患者互动，而 Hyro AI 为 30M+；前者用于安全微调和临床表现改进的患者互动数据集大 6
              倍。这个数据飞轮优势是最难复制的竞争护城河：它随每次部署增长，无法在没有相应临床部署规模的情况下购买或复制。只要公司的安全验证反馈回路按设计运转，随着 Hippocratic
              互动量增长，其模型准确率提升速度应快于任何规模更小的竞争者。
