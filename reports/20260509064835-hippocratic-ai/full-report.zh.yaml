  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的竞争格局包括五类替代方案：（1）直接的面向患者 AI 智能体同业，瞄准相同的企业医疗系统、支付方和制药买方；（2）面向医生的 AI 文档公司，它们争夺相邻医疗 AI
              预算，但服务不同终端用户；（3）拥有基础设施和分发能力、可大规模进入面向患者 AI 市场的大型科技平台；（4）被 LLM 原生竞争者超越的传统医疗对话 AI
              和聊天机器人供应商；（5）现状替代品，主要是人工护士呼叫中心、患者门户和 IVR 电话系统，它们代表当前标准做法，也是 Hippocratic 真正替代的预算。


              最重要的竞争框架是：Hippocratic AI 主要与人力预算（RN 呼叫中心、护理管理人员）竞争，而不是与软件平台竞争。$9/智能体小时对比 BLS 注册护士工资中位数
              $39/hr，对边界清晰、非诊断的患者触达工作流来说，替代经济性很直接。Epic MyChart 患者门户和 Salesforce Health Cloud
              这类软件替代品竞争强度较低：它们提供点选式参与，但没有实时对话 AI。真正的竞争强度，一方面在 Hippocratic AI 与 Hyro AI 对医疗系统 AI 合同的争夺，另一方面在所有面向患者 AI
              供应商与既有人工呼叫中心运营惯性之间。


              在直接 AI 竞争者中，Hippocratic AI 在三方面领先：临床医生验证基础设施、部署规模（50+ 企业合作伙伴、180M+ 患者互动），以及自研 Polaris 3.0 架构。Hyro AI 在 EHR
              集成深度上领先，Epic 集成文档更详细，并有已确认的 Epic App Orchard 合作。Notable Health 在 RCM 工作流自动化深度上领先。没有任何直接同业公开披露了可与
              Hippocratic 7,500+ 临床医生网络相比的安全验证基础设施。
