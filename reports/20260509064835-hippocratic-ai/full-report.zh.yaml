      - number: '7.3'
        title: 合作伙伴、依赖和竞争风险
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的技术架构带来三类重要外部依赖风险。第一，NVIDIA GPU 依赖是近期最尖锐的运营风险。Hippocratic AI 的实时语音 AI 需要带 TensorRT-LLM 优化的
              H100/H200 GPU 基础设施——这种硬件在 2024 年到 2025 年持续全球供应短缺。GPU 供应正在正常化，但 NVIDIA 仍保有定价权，并优先向超大规模云厂商客户分配供给。GPU 供应中断或
              NVIDIA 提价 20-30%，会直接推高 Hippocratic AI 的单次互动计算成本；在 $9/hour 定价、余量有限的按用量收入模式下，毛利率会被压缩。AWS 云依赖会叠加风险：一个 24/7
              面向患者产品采用单云托管架构，若 AWS 在服务生产部署的数据中心区域宕机，就会产生可用性风险。


              第二类依赖风险来自 EHR 厂商竞争。Epic 和 Cerner 合计占据美国医疗系统 EHR 市场 70%+。两家厂商都已推出 AI 路线图——Epic 的 Cosmos AI 和 Cerner 的
              CommunityWorks AI——直接竞争 Hippocratic AI 的核心用例，包括患者外联、护理缺口闭环和临床文档支持。已经向 Epic 或 Cerner 支付许可费的医疗系统，有强烈财务动机采用现有
              EHR 厂商捆绑提供的 AI 功能，而不是额外向 Hippocratic AI 支付 $9/hour。Epic 的深度集成优势是结构性护城河；Hippocratic AI 如果不投入大量 API
              集成，无法匹配这一优势。Hyro AI 已融资 $95M，拥有 45+ 个医疗系统部署和原生 Epic 集成，是瞄准同一细分的独立竞争对手，并已展示 Epic 集成打法。


              第三类依赖是临床验证员网络。Hippocratic AI 雇用 7,500+ 名持证临床人员审核和验证 AI
              输出——这是人在回路（human-in-the-loop）安全机制，也是一项经常性运营成本。如果临床验证员流失率上升、兼职临床审核岗位的市场工资上涨，或验证员网络无法随互动量增长等比例扩张，安全架构中的人工检查层就会退化。这既是成本风险（COGS
              扩张），也是质量风险（每次互动可分配的验证员更少）。该模型的 COGS 结构未公开披露，但行业估计显示，在当前规模下，审核员劳动力占总运营成本的 15-30%。
