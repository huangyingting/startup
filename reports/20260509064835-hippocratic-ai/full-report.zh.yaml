      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              **主要结构性驱动：**


              护士短缺是最重要的市场驱动。HRSA 预计 2025 年 RN 空缺岗位为 295,800 个，到 2030 年升至 500,000+。Bureau of Labor Statistics 预计到 2032
              年每年有 193,100 个 RN 职位空缺，而供给管道无法填补这些缺口。医疗人力成本每年约上涨 5%。对合适的边界外任务而言，AI 患者智能体 $9/hour 与 RN 工资中位数 $39/hr 相比，成本降低
              77%；这是一条有吸引力、可量化、经得起采购审查的经济激励。


              价值医疗政策是第二驱动，但更持久。CMS 的价值医疗项目（ACO REACH、CMMI models）鼓励医疗系统在就诊间隔主动触达患者，以减少可避免住院和再入院。HCAHPS 患者体验分直接影响
              Medicare 报销率。AI 患者触达通过提高患者参与和护理计划依从性，直接作用于这些指标。医疗消费化也在推高接受度：患者预期 24/7 数字入口，AI 电话互动比 COVID 前更容易被接受。


              **关键采用约束：**


              FDA 监管不确定性仍然重要。FDA 2025 年 1 月 7 日关于 AI-enabled Software as a Medical Device（SaMD）的指南草案，为面向患者临床场景中的 AI
              工具提出新的监管预期。FDA 对 AI「一般健康」（general wellness）与医疗器械功能的监管边界仍不清晰，并带来合规负担。医疗系统 IT 集成复杂度也是现实约束：Epic 和 Cerner
              集成需要大量 IT 投入，并需要 Epic App Orchard 认证。12–18 个月采购周期限制收入爬坡速度。Advisory Board 已记录临床医生对 AI
              替代护士的怀疑，这会在临床工作流部署中形成内部阻力。
