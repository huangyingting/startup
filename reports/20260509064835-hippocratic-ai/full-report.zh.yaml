companyProfile:
  summary: >
    Hippocratic AI 是一家位于 Palo Alto 的临床 AI 公司，2023 年 5 月由 Munjal Shah（CEO）和 Karandeep Anand 创立。公司部署 AI 护理智能体，由自研 Polaris
    3.0 模型驱动（22 个 LLM、4.2 万亿参数），为 35+ 家美国医疗系统处理出院后随访、慢病管理和用药依从性。公司四轮融资超过 $404M，2025 年 11 月 C 轮后估值 $3.5B，是全球资本化程度最高的纯临床
    AI 智能体公司之一。
  productSummary: >
    核心产品是一套 AI 智能体平台，按 $9/智能体小时收费，让医疗系统不用增加临床人手也能扩大患者沟通规模。Polaris 3.0 编排 22 个专用语言模型（4.2T 参数），叠加多层安全栈；公司称，在 115M+
    次互动中没有产生不良患者事件。平台瞄准可报销的慢病管理（CCM）CPT 代码，让医疗系统能通过 Medicare 计费部分抵消部署成本。
