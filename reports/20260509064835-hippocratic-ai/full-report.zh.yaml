              所有公开的医疗 AI 分析师市场规模都显著高估了与 Hippocratic 相关的 TAM。最具体的公开数字——Strategic Market Research 的 $1.82B 患者参与 AI
              市场——仍包含非对话式 SaaS 工具。没有分析师独立测算面向患者的 AI 智能体子细分。SOM 估算是尽调构建值，不是已确认收入数字。
