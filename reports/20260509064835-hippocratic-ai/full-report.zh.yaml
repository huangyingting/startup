          label: 已通过：继续对话
        - from: W5
          to: W7
          label: 已标记：升级给人工
        - from: W3
          to: W6
          label: 对话完成 → 记录结果
        - from: W6
          to: W8
          label: 数据流入人群健康指标
        - from: W7
          to: W8
          label: 升级案例已解决
