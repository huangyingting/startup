      - number: '5.4'
        title: 部署、集成、路线图和差异化
        blocks:
          - type: paragraph
            body: >
              **部署模型**：Hippocratic AI 以云托管 B2B SaaS 运行，企业医疗系统、支付方和药企客户通过 API 和语音渠道集成访问 agent。医疗系统通过 App Store 模式，把 agent
              配置到自身特定用例——从 1,000+ 个预验证用例库中选择，不需要定制模型开发。出站呼叫由医疗系统的患者参与平台发起。入站呼叫（AI Front Door）则从医疗系统现有电话基础设施路由进入。


              **EHR 集成**：EHR 集成深度并未充分披露。医疗系统客户运行 Epic 和 Cerner EHR 系统。出院后随访用例需要某种程度的集成（访问出院说明、药物清单、后续护理计划）。公司尚未确认 Epic
              App Orchard 会员身份（不同于公开记录该身份的 Hyro AI），这是企业部署主张中的一个重要缺口。


              **国际扩张**：截至 2026 年 5 月，Hippocratic AI 在 6 个国家运营。Series C
              资金用途包括国际扩张，说明公司正主动进入新市场。具体国家名称、监管状态，以及针对国际临床指南的临床验证方法均未披露。


              **路线图信号**：公司提到将从当前 1,000+ 个临床用例扩展到 1,500+ 个。药企用例（临床试验患者支持、用药依从性）正在增长。Nurse Co-Pilot 发布意味着公司从面向患者 AI
              扩展到辅助临床人员 AI，这是关键战略扩张——总可用市场被拓宽到护理工作流效率预算。Series C 资金用途明确释放 M&A 信号，暗示可能收购产品能力（深化 EHR 集成、国际医疗系统网络或临床数据资产）。


              **技术差异化总结**：Hippocratic AI 最强的技术差异化包括：(1) Polaris Safety Constellation——基于多 LLM 共识的安全验证；(2) 7,500+
              人临床验证员网络，提供自有医疗训练信号；(3) NVIDIA 战略伙伴关系，支持 GPU 基础设施和 TensorRT-LLM 优化；(4)
              非诊断范围，在不牺牲绝大多数患者互动量的情况下带来监管简化。公开信息中最弱的差异化是 EHR 集成深度——Hyro AI 记录了更深入的 Epic 集成，在 Epic 占主导的医疗系统中形成重要竞争缺口。
