  - id: FE003
    title: 关键依赖地图
    type: dag
    notes: >-
      映射 Hippocratic AI 的关键外部依赖——技术、基础设施、临床和分发。箭头方向代表依赖流：Hippocratic AI
      依靠这些外部实体获得核心能力或市场准入。节点详情注明依赖严重性。任何关键依赖节点一旦丢失或中断，都会实质影响产品交付或竞争差异化。
    data:
      nodes:
        - id: HAI
          label: Hippocratic AI 平台
          detail: 核心产品平台——运营依赖所有外部节点；22-LLM Polaris 系统把所有依赖编排成面向患者的 AI 智能体能力
        - id: NV
          label: NVIDIA (GPU + ACE)
          detail: 关键——战略投资方和主要 GPU 基础设施供应商；H100/H200 GPU 用于推理；TensorRT-LLM 优化；Avatar Cloud Engine 用于语音合成；投资方 / 供应商双重身份带来潜在定价冲突
        - id: AWS
          label: AWS 云
          detail: 关键——云托管、符合 HIPAA 条件的基础设施、BAA 提供方；可扩展性和故障切换；未披露替代云供应商；单一云依赖
        - id: EHR
          label: EHR 厂商（Epic、Cerner）
          detail: 高——高价值用例（出院后、用药复核）需要 EHR 数据访问；集成深度未公开确认；Epic App Orchard 状态未确认；Hyro AI 在 Epic 集成上领先
        - id: CV
          label: 临床验证人员网络
          detail: 高——7,500+ 名美国持证临床人员支撑安全验证和认证；由 Hippocratic AI 付费；存在留存和招聘风险；护城河独特，但可用资本复制
        - id: HS
          label: 医疗系统合作伙伴（50+）
          detail: 关键——收入基础和部署渠道；战略投资方客户形成双重关系；采购周期 12–18 个月；已确认 6 家战略投资方客户
        - id: FDA
          label: FDA 监管环境
          detail: 高——当前非诊断范围避开 SaMD；2025 年 1 月指南草案带来不确定性；FDA 监管演变可能改变分类要求和合规负担
        - id: PAYER
          label: 支付方合作伙伴
          detail: 中——次要收入流；HEDIS 缺口闭合和会员互动用例；支付方采购周期和临床覆盖政策影响部署
        - id: PHARMA
          label: 药企合作伙伴
          detail: 中——Series C 显示这是增长板块；临床试验患者支持和依从性用例；采购周期不同于医疗系统；FDA 药物审批周期造成收入时点依赖
      edges:
        - from: HAI
          to: NV
          label: GPU 推理 + 语音合成
        - from: HAI
          to: AWS
          label: 云托管 + HIPAA 合规
        - from: HAI
          to: EHR
          label: 临床用例的患者数据访问
        - from: HAI
          to: CV
          label: 临床安全验证 + 认证
        - from: HAI
          to: HS
          label: 企业部署 + 收入
        - from: HAI
          to: FDA
          label: 监管分类影响范围
        - from: HS
          to: EHR
          label: 医疗系统要求 EHR 集成
        - from: HAI
          to: PAYER
          label: 支付方部署 + 收入
        - from: HAI
          to: PHARMA
          label: 药企部署 + 收入
