      从五个维度评估每个具名 Hippocratic AI 客户的公开证据质量和完整度：证据来源、生产状态、结果具体度、留存可见度和投资方绑定。分数越高，证据越强；分数越低，不确定性越大，也越需要继续尽调。评级仅反映截至 May
