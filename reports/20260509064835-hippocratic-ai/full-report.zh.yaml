      - number: '7.4'
        title: 人员、执行和关键人物风险
        blocks:
          - type: paragraph
            body: >
              CEO 兼联合创始人 Munjal Shah 是 Hippocratic AI 唯一公开知名度突出的高管。Shah
              创办公司、推动产品愿景、主导三轮融资，并且是所有主要媒体报道、投资者沟通和技术出版物中的主要发言人。公共身份、投资者信任和产品方向都集中在单一个人身上，构成典型关键人物风险。如果 Shah
              离职、失去履职能力或发生声誉事件，公司没有清晰沟通过的继任计划，也没有一位同等地位、其信誉和关系足以维持投资者与客户信心的高管。


              除 Shah 之外，公开可识别的高管团队很薄：公司材料和媒体报道中只出现了 3-4 个具名个人。Chief Medical Officer
              这个角色——对一家全部价值主张都建立在临床安全和监管定位上的公司至关重要——截至 2026 年 5 月未公开具名。对估值 $3.5B 阶段的 Series C 医疗 AI 公司来说，一位具备监管和临床公信力的强
              CMO 是标准配置；未具名 CMO 既是执行缺口，也是值得直接调查的尽调信号。


              增长速度放大了执行风险。据报道，Hippocratic AI 在 2024 年末 23 周内签下 23
              份合同——这一速度意味着销售招聘、实施能力建设和客户成功资源配置必须并行大举推进。企业医疗快速获客常会导致服务质量退化：公司优先增长而非留存，早期客户因此体验到服务恶化。公开信息中没有客户成功团队规模、实施能力或支持基础设施能够匹配这一增长速度的证据。2026
              年 4 月 AI Front Door 和 Nurse Co-Pilot
              同时发布，扩大了产品表面积，也同时提高了工程、临床验证和客户实施需求——执行风险在多个维度同步上升。这些同时发生的战略动作，更像一家为下一轮估值优化的公司，而不是在做运营整合，因此形成了更高的执行风险环境。
            claimRefs:
              - CR023
              - CR024
              - CR025
              - CR026
          - type: table
            tableRef: TR004
