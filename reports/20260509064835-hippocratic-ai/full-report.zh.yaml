      - number: '1.4'
        title: 规模、牵引力与关键指标
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Hippocratic AI 已在多个维度跑出有意义的商业规模。公司拥有 50+ 家企业医疗合作伙伴，覆盖六个国家的医疗系统、支付方和制药公司。Polaris 平台已完成超过 180M
              次患者互动，公司报告严重伤害事件率为 0.00%，临床建议准确率为 99.90%。该 AI 模型已由 7,500+ 名持美国执照的临床医生通过 725,000+ 次测试电话验证。公司已在 25+
              个医学专科构建超过 1,000 个临床用例。客户报告的结果包括慢病管理能力提升 360%、再入院率降低 30%（UHS 部署报告），以及西语人群参与率提高 2.6 倍。AI 智能体支持 20+
              种语言，对话延迟低于 300ms。定价为 $9/智能体小时，而 RN 工资中位数约为 $39/小时，意味着常规非诊断任务成本约相差 4 倍。收入和 ARR
              未公开披露。员工数未披露，但公司正在工程、临床和销售岗位积极招聘。
