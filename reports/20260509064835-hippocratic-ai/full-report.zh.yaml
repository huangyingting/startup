      - number: '6.4'
        title: 商业模式和收入代理指标
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的公开定价是 $9 per agent-hour——直接对标 RN 执行患者沟通的 $39–65/hour 全口径成本。14–23% 的成本比是核心商业主张：医疗机构可以用 RN
              全口径劳动力成本的一小部分部署 AI 患者沟通；若对比旅行护士 / 派遣 RN 费率（$75–120/hr），替代空间更大。


              **收入代理分析**（尽调估计——非公司披露）：

              - 115M 次互动 × 平均 10–15 分钟 = 自 2024 年 6 月发布以来累计 19–29M 个 agent-hours

              - 按 $9/agent-hour：累计总账单额 $171–261M；按 2025 年 11 月运行率隐含 ARR 为 $114–174M（假设无量大折扣或不可计费期间）

              - 基于 ACV 的替代算法：50 个合作伙伴 × $500K–$2M ACV = $25M–$100M ARR

              - 按 $3.5B 估值：35x ARR（高位）到 140x ARR（低位）——对比医疗 AI 私募市场可比公司 15–25x ARR（2025 年数据）


              Hippocratic AI 未披露收入、ARR、NRR 或合同结构。所有估计都只是基于公开定价和互动次数的代理计算。
