      - number: '3.6'
        title: 护城河评估与反向竞争证据
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的竞争护城河真实存在，但面对不同威胁向量时，耐久性并不对称。最强护城河是：（1）临床医生验证网络，Hippocratic 花了 18+
              个月和大量资本才建成；（2）自有患者互动数据集（180M+ 次互动），可持续用于安全微调。最弱护城河是定价：今天 $9/hr 相比 RN 工资有 78% 折扣，很有吸引力；但随着云端 AI
              推理成本下降、竞争者采用按使用量计费，绝对价格优势会被压缩。


              **安全指标的反向证据：** Hippocratic AI 的头部主张（99.38% 临床准确率、7,500+ 名临床医生验证者、0.00% 严重伤害事件率）均由公司报告，截至 2026 年 5
              月尚未在已发表临床试验中接受独立同行评审。Polaris 研究论文（arXiv 2403.13313）展示的是内部评估方法，并非随机对照试验。Advisory Board 已记录临床医生对 AI
              替代护理岗位的持续怀疑；PSQH 分析也把面向患者医疗场景中的 AI 幻觉风险识别为系统性担忧。没有独立同行评审，Hippocratic 的安全主张带有公司利益偏差，尽调必须压力测试。


              **EHR 集成的反向证据：** Hyro AI 公开记录的 Epic App Orchard 集成深度高于 Hippocratic 已披露水平。EHR 集成深度是医疗系统 CIO 和 CMIO
              的关键采购标准。如果 Hyro 或其他竞争者能在竞争评估中交付更快、更深的 EHR 集成，医疗系统买方可能会把这一点置于 Hippocratic 的安全架构之上。


              **护城河商品化风险：** $3.5B 估值意味着投资者已把持续竞争优势计入价格。如果前沿 LLM 提供商（OpenAI、Anthropic、Google）发布医疗专用模型，无需 7,500 名验证者也能匹配
              Polaris 的临床准确率，Hippocratic 的主要技术差异点就会商品化。公司的安全架构同时依赖模型和验证基础设施；后者更难复制，才是真正的护城河。
