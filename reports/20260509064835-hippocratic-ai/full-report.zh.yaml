              **满意度信号：**UHS 报告平均患者满意度约 9/10；WellSpan 获得 HAP Achievement Award；公司称 115M+
              次互动中零安全事故（自报，未经审计）；没有医疗系统客户公开提到临床安全投诉或合同取消。这些是正向信号，但要么来自自报，要么来自与投资者利益一致的客户，独立验证有限。


              **留存和扩张信号：**UHS 从 2 个试点扩张到 29 家医院；General Catalyst 在 Series C 继续投资（此前领投 Series B）——这是最强的机构验证；24 个月内 50+
