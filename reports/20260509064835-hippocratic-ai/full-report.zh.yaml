      - number: '8.2'
        title: 估值背景与融资历史
        blocks:
          - type: paragraph
            body: |
              自 May 2023 以来，Hippocratic AI 通过五轮融资累计拿到 $404 million，估值上行轨迹即便按医疗 AI 标准看也很突出。
              种子轮（约 $50M，May 2023）由 General Catalyst 和 a16z 领投。Series A（$53M，March 2024）
              由 General Catalyst 和 Premji Invest 联合领投，估值 $500M；Cincinnati Children's、WellSpan Health、
              Universal Health Services、HonorHealth、OhioHealth 等五家医疗系统作为战略方参与。NVIDIA 在 August 2024
              通过 NVentures 投了 $17M 战略资金。Series B（$141M，January 2025，估值 $1.64B）由 Kleiner Perkins
              领投，General Catalyst 和 NVIDIA 继续参与。Series C（$126M，November 2025，估值 $3.5B）由 Avenir
              Growth Capital 领投，CapitalG（Google 的成长股权基金）新进，战略支持方继续跟投。

              估值从 $500M（March 2024）到 $1.64B（January 2025），再到 $3.5B（November 2025），意味着
              Series B 到 Series C 的八个月估值跃升为 3.28x。这条轨迹反映医疗 AI 市场整体重估：医疗系统和支付方的
              企业级采用已经有公开记录支撑。Series C 公开披露的资金用途包括产品扩张（AI Front Door、Nurse Co-Pilot
              上线）、覆盖 6 个国家的国际增长，以及收购；对一家尚未披露收入的成长阶段公司来说，专门预留并购资金并不常见，
              也说明公司正寻找非内生加速器来守住品类位置。

              当前 $3.5B 估值对应的隐含 ARR 倍数，关键取决于实际收入。用三种代理口径看：（1）合同价值代理——50+
              个企业合作伙伴，估计 $300K-$2M ACV，对应 $15M-$100M ARR 区间；（2）互动量代理——180M 次年度患者互动，
              按 $9/hr（平均每次互动 $1.50）计算，最高对应 $270M 总互动价值，但实际计费大概率受到试点折扣和用量上限影响；
              （3）可比先例——Series B 到 C 的 2.1x 估值跃升叠加新的企业收入验证，说明 ARR 同比增速很可能远高于 100%。
              尽调中位估计为 $37.5M ARR（基准情景），对应 93x ARR 倍数。行业基准显示，医疗 AI 私募市场头部公司在
              2024-2025 年的交易区间为 10-50x ARR，因此 $3.5B 估值需要确认乐观情景下的 ARR，才完全站得住。

              稀释和优先权动态同样重要。$404M 融资意味着累计稀释显著；假设种子轮到 Series C 投资者合计持有 40-55%，
              创始人和员工仍保留 45-60% 股权。若出现估值下调轮，清算优先权可能损害普通股股东回报。Series C 的优先股堆叠
              未公开披露，这里假设采用标准 1x 非参与式清算优先权；如果存在 2x 优先权，高估值进入的后续投资者在下行情景下会更复杂。
