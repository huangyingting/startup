            title: Google CapitalG 投资创造 2–3 年竞争缓冲
            body: >
              CapitalG 参与 Hippocratic AI C 轮，为 Google Health 的短期直接竞争设置了利益冲突屏障。虽然 Google 拥有 Med-PaLM 2 能力和 HCA 医疗关系，但
              Hippocratic 投资者身份限制了 Google 立即构建竞争性面向患者 AI 智能体产品的自由度。只要投资关系仍然有效，这一缓冲大概率延续 2–3 年；之后，如果 Hippocratic
              尚未建立不可逆的规模优势，Google 能力带来的竞争风险就会变得实质。
