      - number: '1.5'
        title: 反向信号与关键风险
        blocks:
          - type: paragraph
            body: >
              增长指标和投资者信心很强，但仍有几类反向信号需要审视。Advisory Board 指出，AI 无法完整承担护士执业范围内的全部工作；AI
              系统还可能延续训练数据中的偏见，进而增加漏护或忽视患者病情恶化的风险。PSQH 和同行评审期刊发表的研究记录了医疗 AI 幻觉这一系统性风险：AI 会生成错误或误导性的医疗信息，部分研究发现医疗场景中不安全 AI
              回答的比例最高可达 13%。MSN 2026 年 4 月报道指出，Hippocratic AI 发布新产品时，业界对大规模医疗 AI 的安全担忧仍在持续。Hippocratic AI
              自身验证框架依赖内部临床医生网络和公司控制的测试，安全认证的独立性由此受到质疑。公开收入、客户流失率或独立临床试验数据缺失，是透明度缺口。医疗 AI 监管正在 FDA 和 HIPAA
              框架下快速演进，带来潜在合规和责任暴露。Munjal Shah 在公开层面的中心角色很重，关键人依赖明显。
            claimRefs:
              - CO035
              - CO036
              - CO013
