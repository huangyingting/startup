      - number: '5.3'
        title: 临床验证、安全和合规框架
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的临床安全框架，是其产品最关键、也是公开争议最多的部分。公司运行一套多阶段验证流程，把人类临床专业知识与自动化基准测试结合起来。


              **临床验证员网络**：7,500+ 名美国持证医疗专业人员——约 6,000+ 名注册护士、300+ 名医生和 1,200+ 名其他临床人员——担任测试和验证队伍。验证员在 1,000+
              个临床用例的模拟患者场景中与 AI agent 互动，对响应准确性、安全性和临床适当性评分。这个验证员网络是安全认证流程的人类骨架。


              **多阶段认证**：每个临床用例在部署前都要经过模拟测试（AI-to-AI 对抗场景）、临床验证员审核（人类专家评分）、准确率评分和安全升级协议验证。未达到安全阈值的用例会被暂缓部署。


              **真实世界证据（RWE）监测**：Hippocratic AI 已开发 Real-World Evidence LLM（RWE-LLM）框架，用于持续监测生产互动，使部署后的连续质量评估成为可能。


              **以非诊断范围做监管定位**：Hippocratic AI 明确限制 agent 诊断或开方，并据此主张其产品在当前监管指引下不属于 FDA SaMD 分类。这是公司的法律解释，不是监管认定——FDA
              尚未正式确认或否定这一立场。FDA 2025 年 1 月关于 AI-enabled device software functions（AI 赋能器械软件功能）的草案指引（发布于 Federal
              Register）为参与患者护理工作流的 AI 系统引入了新考量，也让 SaMD 分类边界未来如何演化变得不确定。


              **HIPAA 合规**：所有产品都通过与医疗系统客户签署 HIPAA Business Associate Agreements（BAAs）来部署。数据处理、存储和传输满足 BAA 要求。


              **IP 和竞争护城河**：Polaris 架构在面向患者的 AI 领域看起来独特——没有直接竞争对手披露过同等的多 LLM 安全星座，也没有达到可比规模的临床验证。不过，核心 IP 已在 2024 年 3 月
              arXiv 预印本中部分暴露；资金充足且能进入临床网络的竞争对手可以复制这种安全路径。NVIDIA 的战略投资带来硬件伙伴关系，提供了一定技术访问差异化，但 GPU 基础设施本身并不排他。


              **反向信号**：独立批评者和医疗学者对 AI agent 与脆弱患者人群（老年人、慢性病患者、健康素养较低者）互动提出担忧，也担忧临床场景中的 AI 幻觉，以及用 AI 替代人类临床沟通的社会影响。The
              Advisory Board 曾指出，一些临床人员对 AI 患者 agent 的情感照护质量持怀疑态度。PSQH 也发布过医疗场景中 AI 幻觉风险的分析。迄今为止，这些反向信号尚未明显拖慢
              Hippocratic AI 的企业部署。
