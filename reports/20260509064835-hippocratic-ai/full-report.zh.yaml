      - number: '4.3'
        title: 成本结构、单位经济模型和毛利率分析
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的成本结构主要由三类构成：(1) 为 22-LLM、4.2 万亿参数系统推理支付的 GPU 计算 COGS；(2) 临床验证员网络成本（7,500+ 名持证临床人员审核互动）；(3)
              医疗系统采购周期所需的企业销售和客户成功成本。


              GPU 计算 COGS：在 NVIDIA H100/H200 GPU 上为语音对话实时运行 22 个专用 LLM，计算强度显著高于单模型推理。NVIDIA H100 服务器单台成本为
              $30,000–$40,000；云端 H100 预留成本约为 $2.00–$4.00 per GPU-hour。一次患者通话按 $9/agent-hour 计费，消耗多个 LLM 的 30 分钟推理时间，可能对应
              $1.00–$3.00 的计算 COGS；在验证员和 G&A 成本前，单次互动推理毛利率隐含为 67–89%。不过这些都是推断估计——实际 COGS 未披露。


              临床验证员网络 COGS：公司拥有 7,500+ 名验证员（6,000+ 名护士、300+ 名医生、1,200+ 名其他临床人员），持续维护、付费和管理这支队伍的成本很高。如果验证员审核工作的报酬即便只有
              $25–$50/hour，每人每周审核 5 小时，年度验证员劳动力成本也可能达到
              $50M–$100M。这是基于公开验证员数量的尽调估计；实际薪酬结构未披露。如果验证员主要用于安全认证阶段（而非持续生产），经常性成本会明显更低。


              获客成本（CAC）：企业医疗系统销售周期（12–18 个月、重关系投入、临床试点要求）意味着 CAC 很高。企业医疗 SaaS 中，CAC-to-ACV 为 1:1 到 2:1 很常见，对应每个企业账户 CAC
              为 $500K–$4M。LTV 取决于合同期限和扩张；如果患者量增长，多年期合同叠加按用量扩张，会形成有利的 LTV 曲线。


              毛利率：把计算 COGS 和验证员网络成本合在一起，尽调估计 Hippocratic AI 的毛利率为 40–70%——因计算密集度和 human-in-the-loop 验证成本，低于纯
              SaaS（70–80%+）。没有实际 COGS 数据，这一区间存在重大不确定性。


              按用量计费模式下，医疗系统按月或按季度后付，营运资本动态较有利。资本开支很低（多数部署托管在云端，不是本地 GPU 集群）。真正驱动资本强度的是持续 GPU 预留成本和验证员网络维护。
