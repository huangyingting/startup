        - 提供过去 8 个季度的 ARR 和 MRR，并按客户层级归因和队列拆分
        - P0
        - 隐含 ARR 倍数 35-93x 的估值，只有在收入和增长率被确认后才站得住；没有这些数据不投资
        - 经审计或董事会批准的财务摘要，附季度 ARR 明细；CFO 证明
      - - 净收入留存率
        - 按客户队列（卫生系统、支付方、药企）提供过去 4 个季度 NRR
        - P0
        - 用量计费模式下，NRR 决定客户基盘是在扩张还是收缩；要支撑增长溢价，NRR 必须高于 110%
        - 数据室中的队列留存明细；财务控制负责人签署的 NRR 计算
      - - FDA 监管意见
        - 提供 FDA 监管律师对 SaMD 分类风险的意见，以及截至目前收到的任何非正式 FDA 沟通
        - P0
        - FDA 重新分类是阻断性的投资假设破裂触发器；监管立场未明，无法按 $3.5B 入场定价
        - 外部监管律师备忘录（Ropes & Gray、Sidley 或同等律所）；如适用，提交前 Q-Sub 结果
      - - 烧钱率和资金续航
        - 按数据室日期披露月度烧钱率、现金头寸，以及 $126M Series C 对应的资金续航
        - P1
        - 已融资 $404M 但烧钱率未披露，资金续航可能只有 12-36 个月；续航不足会迫使公司以不利条款紧急完成 Series D
        - CFO 签署的过去 6 个月现金流量表；董事会批准的 24 个月预算
      - - 股权结构和优先权
        - 提供完整股权结构表，包含清算优先权、反稀释条款和董事会构成
        - P1
        - 降价轮情景下，清算优先权和按比例跟投权可能严重损害 Series C 普通股持有人回报
        - 法律顾问签署的资本结构表；Series A 至 C 优先股条款的公司章程文件
      - - 客户集中度
        - 披露前 10 大客户占 ARR 的比例，以及按客户队列拆分的流失历史
        - P1
        - 战略投资人客户可能贡献 ARR 的 40-60%；用量计费模式下，一家卫生系统降低用量就会放大集中度风险
        - 客户集中度报告；前 10 大账户合同续签时间表
      - - EHR 集成文档
        - 提供 Epic 和 Cerner API 集成架构，以及任何合作或集成协议
        - P1
        - 对抗 Epic/Cerner 原生 AI 功能时，EHR 集成就是竞争壁垒；集成深度和排他性是关键差异点
        - 技术集成架构文档；任何 Epic App Orchard 注册或 Cerner 集成文档
      - - 安全审计证据
        - 提供安全验证协议的独立审计，以及 Polaris 3.0 准确率声明的佐证
        - P1
        - 99.38% 准确率来自公司自报；未找到独立临床审计；安全声明是商业价值主张的核心
        - IRB 研究结果或同行评议临床研究；独立第三方审计报告
      - - M&A 管线披露
        - 披露 Series C M&A 管线：正在考虑的标的、交易状态和已分配资本
        - P2
        - Series C 资金指定用于 M&A；未披露的收购会引入执行风险，并可能在关键产品扩张阶段稀释焦点
        - 董事会批准的 M&A 框架；NDA 下活跃尽调标的摘要
      - - 国际收入拆分
        - 按地域披露 6 国业务覆盖中的收入或合同价值
        - P2
        - 国际扩张被列为增长驱动；非美国合同的报销、监管和合同价值画像可能不同于美国卫生系统交易
        - 按地域拆分的收入，或包含 ACV 区间的国家级伙伴数量
