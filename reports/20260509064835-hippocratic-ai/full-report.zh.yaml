  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管和法律风险
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 最尖锐的结构性风险是监管重新分类。公司刻意设置的设计约束——非诊断、非开方的 AI agent 互动——旨在把产品放在 FDA Software as a Medical
              Device（SaMD）门槛之下，从而避开 510(k) 上市前通知或 De Novo 路径要求。这个定位从 2024 年延续到 2026 年，但 FDA 2025 年 1 月 7 日关于 AI-Enabled
              Device Software Functions 的草案指引（FDA-2024-D-4488）表明，监管正主动关注此前不受监管的临床场景 AI 系统。如果 FDA 认定 Hippocratic AI 产品满足
              SaMD 标准——例如，因其通过塑造患者行为和依从性间接影响临床决策——公司将面临强制性 510(k) 审查许可流程。该流程通常需要 6 到 18 个月，监管咨询和临床测试成本为
              $500K-$2M，并可能要求产品设计修改，从而改变价值主张。


              HIPAA 合规风险是运营性、持续性的。作为所有医疗系统客户的 Business Associate，Hippocratic AI 必须维持 Business Associate Agreements 和完整的
              PHI 安全控制。HIPAA 民事罚款从每次违规 $100 到 $50,000 不等，每个违规类别每年最高 $1.9M；故意忽视还可能触发刑事移送。公司跨多个云和 AI
              系统处理高体量患者互动数据，攻击面比传统医疗软件明显更宽。HHS 执法在 2025 年持续加强，OCR 和解金额平均为 $1.2M。州级 AI 立法又增加了一层碎片化合规。California 拟议的 AI
              偏见审计法案，以及 New York 面向医疗应用的 AI 透明度立法草案，将强制要求算法偏见测试、审计文档，以及向患者披露 AI 互动。如果这些法案在 2025 到 2026 年通过，Hippocratic
              AI 在每个主要司法辖区将面临估计 $500K-$3M 的工程、法律和审计费用。联邦立法活动——包括 2025 年初提出的 House Bill 119——进一步表明国会有意监管 AI 医疗。截至 2026 年
              5 月，公司没有已知未决诉讼或监管执法行动，但过去没有执法并不能预测快速演化监管环境中的未来风险。公司未公开任何 SOC 2 Type II 或 HITRUST 认证文档，使风险进一步放大。
