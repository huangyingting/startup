              自 2023 年成立以来，Hippocratic AI 已通过四轮融资累计募资 $404M。约 $50M 的种子轮于 2023 年 5 月完成，由 General Catalyst 和 Andreessen
              Horowitz（a16z）领投。$53M A 轮于 2024 年 3 月 18 日完成，投后估值 $500M，由 General Catalyst 和 Premji Invest 共同领投，SV
              Angel、Memorial Hermann Health System、Cincinnati Children's、WellSpan Health、Universal Health
              Services、HonorHealth 和 OhioHealth 等战略医疗系统投资者参投。不久后，约在 2024 年 8 月，NVIDIA 旗下 NVentures 战略投资 $17M，支持 GPU
              加速的实时对话 AI。$141M B 轮于 2025 年 1 月完成，估值 $1.64B，由 Kleiner Perkins 领投，a16z、General Catalyst、NVIDIA
              NVentures、Premji Invest、SV Angel、Universal Health Services 和 WellSpan Health 参投。最后，$126M C 轮于 2025 年 11
              月完成，估值 $3.5B，由 Avenir Growth 领投，CapitalG（Google 的成长基金）新参投，老股东和战略医疗系统伙伴继续支持。C 轮资金将用于产品扩张、国际增长和并购。估值在 20
              个月内从 $500M 跳到 $1.64B 再到 $3.5B，反映投资者对面向患者的 AI 智能体类别信心极强。
