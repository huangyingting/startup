      - number: '3.2'
        title: 直接竞争者——面向患者的 AI 智能体同业
        blocks:
          - type: paragraph
            body: >
              **Hyro AI** 是 Hippocratic AI 最直接、最可信的同业竞争者。Hyro 成立于 2019 年，总部位于 Tel Aviv 和 New York City，累计融资 $95M，其中包括
              2025 年 10 月由 Healthier Capital 领投的 $45M 战略增长轮，Norwest Venture Partners、Define Ventures、Bon Secours Mercy
              Health 和 ServiceNow Ventures 参投。据报道，这轮融资让公司估值翻倍，隐含投后估值约 $200–300M，仅为 Hippocratic $3.5B 的一小部分。Hyro 服务 45+
              家医疗系统客户，并称其负责任 AI 智能体平台已服务 30M+ 名患者。其竞争优势包括深度 Epic EHR 集成（公开文档显示的差异点）、全渠道支持（语音、聊天、SMS、Web），以及 2025 年推出的
              Proactive Px 产品，用于双向患者沟通，直接重叠 Hippocratic 的触达用例。Hyro 官网称可自动化多达 85% 的常规患者互动。Hyro 的限制在规模：45 家医疗系统客户少于
              Hippocratic 的 50+，且没有公开披露与 Hippocratic 同等规模的临床医生验证基础设施。定价未披露；假设为企业合同制。


              **Notable Health** 是第二个直接同业，聚焦端到端医疗自动化，包括患者入口、摄入自动化和收入周期管理（RCM）。Notable 估计已多轮融资 $100M+，投资方包括 Andreessen
              Horowitz（a16z）和 GV（Google Ventures）。Notable 的差异点在 EHR 集成深度，以及超出面向患者沟通的工作流自动化——它自动化表单、就诊前流程和收入周期流程。这让
              Notable 更像医疗工作流自动化平台，而不是纯患者参与 AI 智能体，也降低了它与 Hippocratic 在纯面向患者对话用例上的直接重叠。定价未公开披露。


              **Orbita** 是上一代医疗对话 AI 平台，2021 年融资 $20M。Orbita 服务医疗系统的患者参与场景，但使用较早一代聊天机器人技术，而不是 LLM 原生多智能体架构。它正在被
              Hippocratic AI、Hyro AI 以及潜在大型科技进入者等 LLM 原生竞争者赶超。Orbita 对非 LLM 医疗对话 AI 平台是一个警示：随着 LLM 商品化自然语言理解，基于 NLP
              的聊天机器人的技术护城河已经坍塌。
