  - id: TP004
    title: 护城河耐久性 / 竞争风险登记表
    columns:
      - 护城河主张
      - 竞争威胁
      - 严重性
      - 缓解措施 / 尽调问题
    rows:
      - - Polaris 3.0（22 个 LLM，4.2T 参数）— 最大的专用医疗对话 AI
        - 前沿 LLM 提供商发布更大或能力更强的模型；更小的开源模型微调后以更低成本匹配 Polaris 准确率
        - 高 — 原始模型能力正持续商品化；规模优势折旧很快
        - 评估准确率优势来自架构还是验证者数据；索取消融研究，展示多 LLM 相对单一 LLM 基线的贡献
      - - 7,500+ 名临床验证者网络 — 专有安全验证基础设施
        - 竞争对手（Hyro、Notable 或新进入者）用资本搭建同等验证者网络；大型科技公司大规模招募临床人力
        - 中 — 复制到可比规模至少需要 18–24 个月；还需要临床关系和工作流信任
        - 评估验证者关系是否排他；确认验证者是员工还是承包商；审查验证者流失和激励结构
      - - $9/hr 按用量定价 — 较 RN 工资中位数低 78%
        - 竞争对手因推理成本更低而采用更低价的按用量定价；商品化压低价格底线；Hippocratic 被迫降价守住份额
        - 高 — 云端 AI 推理成本曲线陡降；定价优势可能在 36 个月内压缩 50%
        - 分别按当前 $9/hr 和 $5/hr 建模毛利率；确定 Hippocratic 经济模型失效的底价；评估推理成本趋势
      - - 医疗系统战略投资方（WellSpan、UHS、Cincinnati Children's、OhioHealth、HonorHealth）— 分销与验证
        - 战略投资方可同时使用竞争供应商；投资不保证部署排他或首选供应商地位
        - 中 — 财务投资不妨碍同时评估 Hyro 等替代方案；医疗系统负有受托责任，需要评估替代选择
        - 审查投资协议是否包含首选供应商或排他条款；评估财务参与之外的实际部署承诺
      - - 非诊断范围 — 避开 FDA SaMD 分类
        - FDA 扩大监管边界，把面向患者的 AI 纳入监管，即使没有诊断功能；或者竞争对手游说 FDA 放松 SaMD 定义，让诊断型 Agent 得以纳入，改变竞争格局
        - 中 — FDA AI 监管姿态仍在变化；2025 年 1 月指南草案带来新不确定性
        - 跟踪 FDA AI/ML SaMD 指南演进；评估 Hippocratic 监管事务能力；确认非诊断范围在 FDA 定义演变下是否耐久
      - - NVIDIA NVentures 战略投资与 H100/H200 GPU 合作
        - Google、Microsoft、Amazon 为竞争性面向患者 AI 供应商匹配 GPU 基础设施访问；NVIDIA 把消费级 AI 合作伙伴排在医疗垂直之前
        - 高 — GPU 访问并不排他；NVIDIA 投资了包括 Abridge 在内的多家医疗 AI 公司；推理效率提升削弱 H100/H200 优势
        - 确认 NVIDIA 投资是否带来优惠定价、分配优先级或联合工程支持；向 Hippocratic 管理层索取 NVIDIA 合作条款
    notes: |
      严重性评级（高 / 中 / 低）是基于公开信息和竞争分析形成的尽调判断，不是前瞻性保证。
      所有「尽调问题」均为在 NDA 下向 Hippocratic AI 管理层提出的请求。
    claimRefs:
      - CP012
      - CP022
      - CP038
      - CP011
      - CP014
      - CP031
