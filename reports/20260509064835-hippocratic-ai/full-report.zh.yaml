      - number: '6.3'
        title: 用例部署和临床覆盖
        blocks:
          - type: paragraph
            body: >
              Hippocratic AI 的 1,000+ 个临床用例覆盖非诊断、非开方的患者互动工作流。具名账户中已确认部署的用例包括：

              - **出院后随访**（UHS）：出站电话审核出院说明、筛查再入院风险、确认取药并安排随访。已确认用例中量最大——仅试点阶段就接触了数千名患者。

              - **预防性筛查外联**（WellSpan）：结直肠癌和乳腺 X 线筛查外联；面向服务不足人群提供多语言支持；HAP Award 认可了其影响。

              - **AI Front Door / 患者入口**（Cincinnati Children's）：入站分诊、预约、FAQ。

              - **慢性病管理、用药依从性、SDOH 调查**：公司材料和 Series C 沟通中提及；公开来源未归因到具名客户。

              - **药企患者支持**：药企细分提到用药依从性和临床试验支持；未披露具名药企合作伙伴。


              App Store 模式让医疗系统客户无需定制开发，就能从 1,000+ 个预验证用例中配置和部署，从而缩短部署时间，并在合作伙伴基础上保持标准化质量。公司未披露 50+
              个合作伙伴之间的用例量分布；从具名账户证据看，出院后随访和筛查用例似乎量最大。
