        - 显示早期收入已有牵引；按 $3.5B 估值计算，隐含 ARR 倍数为 140x
      - - 隐含 ARR — 基准情景
        - ~$50M
        - 50 个合作伙伴 × $1M 平均 ACV；可比医疗 SaaS 基准
        - 低（代理估计）
        - 显示收入牵引已经有一定规模；隐含 ARR 倍数为 70x；偏高，但顶级医疗 AI 公司并非没有先例
      - - 隐含 ARR — 高情景
        - ~$100M
        - 50 个合作伙伴 × $2M 平均 ACV + 用量扩张；互动量代理指标
        - 低（代理估计）
        - 隐含 ARR 倍数为 35x；处在代理范围上限；相对医疗 SaaS 中位数仍有溢价
      - - 毛利率（估计）
        - 40–70%
        - 由 GPU 计算 COGS（推理成本）+ 验证者网络人工 + 可比 AI SaaS 毛利率推断
        - 很低（无披露数据）
        - 区间很宽，反映完全不透明；GPU COGS 和验证者网络成本是关键驱动，需进数据室核验
      - - CAC（估计）
        - 每个企业账户 $500K–$4M
        - 医疗 SaaS CAC 基准；假设采购周期 12–18 个月；企业销售团队成本
        - 很低（无披露数据）
        - 采购周期长 = CAC 高；每个账户 LTV 需达到 $5M+，CAC:LTV 比才有吸引力
      - - LTV（估计）
        - 每个企业账户 $3M–$15M
        - 估计 3–7 年合同生命周期 × $500K–$2M ACV + 用量扩张
        - 很低（无披露数据）
        - 如果用量随时间扩张，则表现有利；若医疗系统限制范围或重新谈判，则存在风险
      - - CAC:LTV 比率（估计）
        - 1:3 至 1:10
        - 由上文 CAC 和 LTV 估算推导
        - 很低（衍生估计）
        - 若比率达到 1:3 或更好，单位经济有吸引力；需要用真实队列数据验证
      - - 烧钱速度（估计）
        - $80–120M/year
        - 根据融资节奏（每年融资 $100–140M）和该规模下典型 AI 基础设施 + GTM 成本推断
        - 很低（无披露数据）
        - 与收入前 AI 基础设施建设阶段相符；需进数据室核验
      - - 现金跑道（估计）
        - 自 Jan 2025 B 轮起 18–36 个月
        - 基于累计融资 $404M、估计烧钱速度和未披露现金头寸
        - 很低（无披露数据）
        - C 轮（$126M，Nov 2025）延长了现金跑道；实际现金头寸未知
      - - 每次患者互动收入（示例）
        - $1.50
        - 180M 次互动 × 10 分钟平均时长 = 30M 智能体小时 × $9 = $270M 总账单额（仅示例）
        - 很低（仅示例）
        - 互动计费代理指标；不能反映企业合同收入结构
