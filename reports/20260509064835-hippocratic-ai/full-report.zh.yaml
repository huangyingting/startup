  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    notes: 从初始触达触发到临床结果，映射患者在 Hippocratic AI 辅助医疗互动中的旅程。基于出院后随访用例——这是公开来源中记录最充分的部署工作流。每个节点代表工作流中的一个阶段；边展示患者互动的流向。
    data:
      nodes:
        - id: W1
          label: 触达触发
          detail: 医疗系统识别患者人群（过去 48 小时内出院、用药队列、照护缺口人群）；Hippocratic AI 平台接收患者名单、用例配置和语言偏好
          type: input
        - id: W2
          label: AI 智能体发起通话
          detail: AI 智能体拨出电话；自我介绍为医疗系统的 AI 医疗助手；取得口头同意；使用 NVIDIA ACE 语音合成，以自然语言和同理心语音交付
          type: process
        - id: W3
          label: 临床对话
          detail: AI 智能体进行结构化临床对话（用药复核、症状筛查、SDOH 调查、预约确认）；Polaris Safety Constellation 实时检查所有回复；全程非诊断、不开处方
          type: process
        - id: W4
          label: 实时安全检查
          detail: 21+ 个专家 LLM 并行检查主智能体输出；关键临床数据（药物名称、剂量）会触发三重检查；安全升级智能体监测急诊红旗信号
          type: process
        - id: W5
          label: 安全门
          detail: 共识门：所有专家检查必须通过，回复才会传给患者；如果触发安全标记，回复被阻断，升级规程启动
          type: process
        - id: W6
          label: 结果记录
          detail: 互动结果被记录；患者报告数据（症状、用药状态、SDOH 需求）通过 API 或仪表盘回传给医疗系统；保持 HIPAA BAA 合规
          type: process
        - id: W7
          label: 人工升级（如需要）
          detail: 如果越过安全阈值或患者要求人工，AI 智能体会带着交接摘要转给值班护士或照护经理；升级率未公开披露
          type: process
        - id: W8
          label: 临床影响衡量
          detail: 医疗系统衡量结果 KPI：30 天再入院率、用药依从性、筛查完成率、照护缺口闭合、患者满意度；医疗系统合作伙伴报告 ROI
          type: output
      edges:
        - from: W1
          to: W2
          label: 患者名单已加载
        - from: W2
          to: W3
          label: 取得同意；对话开始
        - from: W3
          to: W4
          label: 智能体回复并行检查
        - from: W4
