      - number: '8.4'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: |
              这笔投资最终落在三种情景上，取决于未来 3-5 年的 ARR 增长、竞争位置和监管结果。

              乐观情景（概率权重：25%）：Hippocratic AI 按既定战略落地，靠 AI Front Door 和 Nurse Co-Pilot 上线、
              覆盖 6+ 个国家的国际扩张，以及 Series C 资金支持的战略并购，到 2026 年底 ARR 达到 $100M-$200M，
              到 2028 达到 $400M-$600M。在这个情景下，公司维持 100%+ ARR 增长，净留存率（NRR）超过 120%，
              反映医疗系统内用量扩张；NVIDIA 合作关系持续提供 GPU 获取优势。以 $500M ARR、20-30x ARR 计，
              2028 年估值为 $10-15B，相当于相对 $3.5B Series C 标记实现 2.9x-4.3x 回报。若 Microsoft（EHR AI 集成）、
              Google（医疗 AI 云）或 Epic（患者互动平台）以 $12-20B 战略收购，则回报为 3.4x-5.7x。这个情景要求 FDA
              到 2028 年仍维持非 SaMD 分类，且 Epic/Cerner 集成继续开放。

              基准情景（概率权重：45%）：公司从尽调估计的 $37.5M 基数出发，靠现有医疗系统伙伴渗透加深和审慎的国际扩张，
              以 60-80% 年增长，到 2028 年 ARR 达到 $150-250M。AI Front Door 和 Nurse Co-Pilot 增加增量收入，
              但要面对 12-18 个月的企业采购周期。NVIDIA 合作关系维持。FDA 分类不变。在这个情景下，公司以 $5-7B
              估值融资 Series D（为当前 $3.5B 标记的 1.4-2x），并在 2029-2031 年以 $300M+ ARR、15-25x 倍数
              IPO 或被收购，对应退出估值 $4.5-7.5B。Series C 进入的回报为 1.3-2.1x。对成长阶段资本来说，这是正回报，
              但不算出色。

              悲观情景（概率权重：30%）：Series C 标记时收入低于 $25M ARR；随着医疗系统采购放缓，Epic/Cerner
              以打包形式推出竞争性 AI 外联功能，FDA 启动 SaMD 重新分类调查，增速降至 30-50% YoY。某个具名医疗系统发生
              患者安全事件，引发合同审查和声誉损害。Series D 以 $2-3B 完成（持平或下行轮），稀释 Series C 投资者。
              以 $75M ARR、10-15x 计算，2028 年估值为 $750M-$1.1B，低于 $3.5B Series C 入场价。结果就是资本损失。
