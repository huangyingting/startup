      - number: '8.3'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: |
              Hippocratic AI 的估值可比集横跨三类：（1）阶段相近的私营医疗 AI 同行；（2）为市场锚定倍数的上市医疗
              SaaS / 分析公司；（3）展示退出估值的并购先例。

              私营同行中，Abridge 是最相关的直接可比。Abridge 在 May 2025 以 $6B 估值融资 $550M，成为临床文档
              品类估值最高的私营医疗 AI 公司。Abridge 服务 500+ 家医疗系统，提供面向医生的 AI 环境式临床文档，投资方包括
              NVIDIA、Google 和 Highmark；按分析师估计，其 ARR 倍数约 50-80x。Abridge 的估值说明，私募市场投资者愿意
              为具备企业规模和机构背书的医疗 AI 品类龙头支付超过 50x ARR 的溢价。Hippocratic AI 估值 $3.5B，
              按估计 35-93x ARR 计，绝对估值低于 Abridge，但隐含倍数区间相近。Hyro AI（累计融资 $95M，估计估值
              $200-300M，已部署 45+ 家医疗系统并原生集成 Epic）是更早阶段的直接竞争者，也为希望看到更成熟单位经济的投资者
              提供了低风险参照。

              上市医疗 SaaS 可比公司为退出倍数提供锚点。Health Catalyst（HCAT，NASDAQ）在 $220M 收入基础上交易于约
              3.2x ARR，May 2026 企业价值约 $700M，反映公开市场对非 AI 原生医疗分析平台的折价。Phreesia（PHR，NYSE）
              在 $375M 收入基础上交易于约 4x ARR，企业价值约 $1.5B；这是患者登记 SaaS 平台，与 Hippocratic 的
              患者沟通功能直接可比。Evolent Health 的交易倍数约为 1.3x revenue，反映其健康计划服务模式，而非纯 AI SaaS。
              上市可比倍数（1.3x-4x revenue）说明，若按当前 $3.5B 估值 IPO，公司需要显著高于当前估计的收入和增速；
              这也确认，当前 $3.5B 标记是后期私募市场溢价，需要 5-7 年退出周期，或由战略并购以溢价倍数承接。

              最相关的并购先例是 Microsoft 以 $19.7B 收购 Nuance Communications（April 2021），价格约为 Nuance
              当时 $1.5-2B ARR 的 10x。该先例说明，Microsoft、Google、Epic 等战略买方已经表现出为规模化医疗 AI
              支付显著溢价的意愿。如果 Hippocratic AI 到 2028-2030 年达到 $250-500M ARR，并守住品类领导地位，
              以 $5-15B 被战略收购，与 Nuance 先例一致。
