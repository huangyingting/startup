  - id: FU001
    title: 客户旅程图——医疗系统采用路径
    type: flow
    notes: >-
      这张图梳理企业级医疗系统客户从初始兴趣，到与 Hippocratic AI 进入生产部署，再到扩张的典型旅程。依据来自 WellSpan、UHS 和 Cincinnati Children's
      部署的已确认材料。每个节点代表采用旅程中的一个阶段。投资方与客户重叠 （4 家战略投资者同时也是客户），意味着这条旅程的早期阶段受到股权绑定推动而提速。
    data:
      nodes:
        - id: J1
          label: 初始接触 / 投资方引介
          detail: >-
            战略投资者（WellSpan、UHS、Uniting Care Queensland）在 Seed 轮（Nov 2023）接触 Hippocratic
            AI；独立医疗系统通常通过销售团队、会议露出或同行推荐进入沟通；April 2026 之后，AI Front Door 和 Nurse Co-Pilot 带来新的转介绍
          type: input
        - id: J2
          label: 用例识别
          detail: 医疗系统先确定优先用例（出院后随访、筛查触达、AI Front Door、慢病管理）；Hippocratic AI 的 App Store 模式提供 1,000+ 个预验证用例，客户无需定制开发即可选择
          type: process
        - id: J3
          label: 安全与合规审查
          detail: >-
            医疗系统的 IT 和法务会审查 HIPAA BAA 合规、NVIDIA ACE 数据流、AWS 托管架构和 EHR 集成要求；SOC 2 / HITRUST
            状态尚未公开确认——这会成为重视安全的医疗系统采购时的摩擦点
          type: process
        - id: J4
          label: 合同与定价谈判
          detail: 签署企业合同；$9/agent-hour 的标价可能按规模打折；多年期还是年度合同结构未披露；参照行业基准，ACV 估计在 $500K–$2M
          type: process
        - id: J5
          label: 上线准备与配置
          detail: 医疗系统配置用例参数，接入患者名册，设置 EHR 数据访问（深度未披露）、多语言选项，并让验证人员对该医疗系统特定临床流程做质量检查
          type: process
        - id: J6
          label: 试点部署
          detail: 初始部署通常落在 1–2 个站点，或明确的患者队列；UHS 模式是先上 2 家医院；WellSpan 模式是特定患者筛查人群；放量前先定义指标并测量基线
          type: process
        - id: J7
          label: 生产规模化
          detail: 试点结果为正后，部署扩到更广的患者人群或更多站点；UHS 计划从 2 家医院扩到 29 家；WellSpan 扩展语言（Haitian Creole、Nepali）——扩张的关键触发点是试点结果数据和临床医生接受度
          type: process
        - id: J8
          label: 落地后扩张 / 续约
          detail: 从 App Store 库新增用例；更多医院站点上线；同一医疗系统网络内，可能扩到支付方和药企项目；合同续约，并可能转为多年期承诺
          type: output
        - id: J9
          label: 标杆背书 / 倡导
          detail: 成功客户会成为标杆账户（WellSpan 获得 HAP Award 认可），出现在新闻稿中；兼具投资方身份的客户因股权利益放大背书，带动其他医疗系统的同行转介绍
          type: output
      edges:
        - from: J1
          to: J2
          label: 兴趣确认；内部支持者确定
        - from: J2
          to: J3
          label: 用例范围确定；安全审查启动
        - from: J3
          to: J4
          label: 合规过关；商业条款敲定
        - from: J4
          to: J5
          label: 合同签署；上线准备开始
        - from: J5
          to: J6
          label: 配置完成；试点启动
        - from: J6
          to: J7
          label: 试点指标为正；扩张获批
        - from: J7
          to: J8
          label: 达到生产规模；进入续约周期
        - from: J8
          to: J9
          label: 具备标杆客户资质
        - from: J9
          to: J1
          label: 同行转介绍带来新客户管线
