  - id: FE001
    title: 产品架构图
    type: flow
    notes: >-
      展示 Polaris Safety Constellation 如何处理一次患者通话：从初始语音输入，经多 LLM
      专家检查，再到临床回复交付。并行检查架构是核心创新——多个专家智能体先验证主智能体输出，随后才向患者传递任何临床信息。
    data:
      nodes:
        - id: A
          label: 患者语音输入
          detail: 患者接到外呼或主动发起入站联系；语音由 NVIDIA ACE 语音流水线捕获；音频转成文本供 LLM 处理
          type: input
        - id: B
          label: 主有状态智能体
          detail: 核心对话 LLM 保留多轮患者互动的完整上下文；针对患者问题或触达提示生成主回复；管理 1,000+ 个临床用例中的对话流
          type: process
        - id: C
          label: 专家智能体 — 用药安全
          detail: 专家 LLM 检查主智能体与用药相关的表述，包括准确性、剂量正确性、禁忌症意识和名称精确度；它是 21+ 个专家智能体之一
          type: process
        - id: D
          label: 专家智能体 — 临床规程
          detail: 专家 LLM 验证临床规程遵循情况（出院后指示、筛查资格、照护缺口标准）；并与临床指南和医疗系统专属规程交叉核对
          type: process
        - id: E
          label: 专家智能体 — 安全升级
          detail: 专用安全智能体监测红旗信号（自杀意念、严重症状描述、急诊指标），一旦出现就需要立即升级给人工临床人员
          type: process
        - id: F
          label: 三重检查 — 关键临床数据
          detail: 药物名称、剂量、实验室数值等高风险临床数据必须通过三个独立 LLM 检查并达成一致，信息才会传出；这是强制共识机制
          type: process
        - id: G
          label: 共识 / 安全门
          detail: 任何专家智能体标记安全问题，或三重检查未达成共识，回复都会被阻断并修改，或升级给人工临床人员；安全门放行前不会输出给患者
          type: process
        - id: H
          label: NVIDIA TensorRT-LLM 推理
          detail: 全部 22 个 LLM 运行在 NVIDIA H100/H200 GPU 上，并经 TensorRT-LLM 优化，支持实时语音对话所需的超低延迟并行推理
          type: process
        - id: I
          label: 给患者的语音回复
          detail: 通过安全门的回复由 NVIDIA Avatar Cloud Engine（ACE）合成，并加入同理心推理——情绪语调、节奏和语音质量面向医疗场景优化；实时传递给患者
          type: output
        - id: J
          label: RWE-LLM 监控
          detail: 真实世界证据 LLM 框架监控生产互动中的质量漂移、安全信号和持续改进反馈；所有互动都会记录，并持续抽样供验证人员复核
          type: output
