figures:
  - id: FU001
    title: Customer journey map — health system adoption path
    type: flow
    notes: >-
      Maps the typical enterprise health system customer journey from initial interest through production deployment and
      expansion with Hippocratic AI. Based on confirmed evidence from WellSpan, UHS, and Cincinnati Children's
      deployments. Each node represents a stage in the adoption journey. The investor-customer overlap (4 strategic
      investors who are also customers) means the early stages of this journey were accelerated by equity alignment.
    data:
      nodes:
        - id: J1
          label: Initial Contact / Investor Introduction
          detail: >-
            Strategic investors (WellSpan, UHS, Uniting Care Queensland) introduced to Hippocratic AI at Series Seed
            (Nov 2023); arm's-length health systems engage via sales team, conference presence, or peer referral; AI
            Front Door and Nurse Co-Pilot drive new referrals post-April 2026
          type: input
        - id: J2
          label: Use Case Identification
          detail: >-
            Health system identifies priority use case (post-discharge, screening outreach, AI Front Door, chronic
            disease management); Hippocratic AI App Store model allows selection from 1,000+ pre-validated use cases
            without custom development
          type: process
        - id: J3
          label: Security & Compliance Review
          detail: >-
            Health system IT and legal review HIPAA BAA compliance, NVIDIA ACE data flows, AWS hosting architecture, EHR
            integration requirements; SOC 2 / HITRUST status not publicly confirmed — a procurement friction point for
            security-focused health systems
          type: process
        - id: J4
          label: Contract & Pricing Negotiation
          detail: >-
            Enterprise contract signed; $9/agent-hour list pricing may be subject to volume discounts; multi-year vs.
            annual contract structure not disclosed; ACV range estimated at $500K–$2M based on industry benchmarks
          type: process
        - id: J5
          label: Onboarding & Configuration
          detail: >-
            Health system configures use case parameters; patient roster integration; EHR data access setup (depth not
            disclosed); multi-lingual settings; validator quality check for health system-specific clinical protocols
          type: process
        - id: J6
          label: Pilot Deployment
          detail: >-
            Initial deployment at 1–2 sites or with defined patient population cohort; UHS model: 2 hospitals first;
            WellSpan model: specific patient screening population; metrics definition and baseline measurement before
            scale
          type: process
        - id: J7
          label: Production Scale-Up
          detail: >-
            Positive pilot outcomes drive expansion to broader patient population or additional sites; UHS expanding
            from 2 to 29 hospitals; WellSpan expanding languages (Haitian Creole, Nepali) — key expansion trigger is
            pilot outcome data and clinician acceptance
          type: process
        - id: J8
          label: Land-and-Expand / Renewal
          detail: >-
            New use cases added from App Store library; additional hospital sites onboarded; potential expansion into
            payer and pharma programs within same health system network; contract renewal and potential multi-year
            commitment
          type: output
        - id: J9
          label: Reference / Advocacy
          detail: >-
            Successful customer becomes reference account (WellSpan HAP Award recognition); named in press releases;
            investor-customers provide amplified advocacy through equity interest; drives peer referrals to other health
            systems
          type: output
      edges:
        - from: J1
          to: J2
          label: Interest confirmed; champion identified
        - from: J2
          to: J3
          label: Use case scoped; security review initiated
        - from: J3
          to: J4
          label: Compliance cleared; commercial terms
        - from: J4
          to: J5
          label: Contract signed; onboarding begins
        - from: J5
          to: J6
          label: Configuration complete; pilot launched
        - from: J6
          to: J7
          label: Pilot metrics positive; expansion approved
        - from: J7
          to: J8
          label: Production scale achieved; renewal cycle
        - from: J8
          to: J9
          label: Reference quality earned
        - from: J9
          to: J1
          label: Peer referral drives new customer pipeline
