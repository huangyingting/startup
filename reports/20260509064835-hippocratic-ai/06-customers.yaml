  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: Customer NPS, NRR, and clinical outcome data — entirely absent from public record
      missingEvidence: >-
        Hippocratic AI has not disclosed NPS, NRR, churn rate, or clinical outcome metrics (readmission rates, adherence
        improvement, care gap closure) for any named customer. UHS's ~9/10 patient satisfaction rating is the only
        quantitative metric — reported by UHS itself without an independent survey methodology or human nurse baseline
        comparison.
      whyItMatters: >-
        Without retention metrics, the 50+ partner count could mask high early-stage churn. Clinical outcome data is
        required for health system clinical governance approval and ROI validation beyond labor cost displacement. No
        peer-reviewed clinical outcome publication has been issued by any Hippocratic AI customer in 30 months of
        operation.
      diligencePath: >-
        Request NPS methodology and data, NRR by cohort, and customer churn by segment; request clinical outcome data
        from WellSpan and UHS; determine whether any health system has submitted IRB outcome studies.
      relatedQuestionRefs:
        - QU017
        - QU027
        - QU028
      relatedTableRefs:
        - TU001
        - TU004
    - type: missing-source
      severity: material
      topic: WellSpan and UHS quantitative clinical outcomes — named but unquantified
      missingEvidence: >-
        Both WellSpan and UHS have confirmed production deployments but have not disclosed quantitative clinical outcome
        metrics: WellSpan has not shared cancer screening completion rates, colonoscopy prep completion, or care gap
        closure rates; UHS has not shared 30-day readmission rates, medication adherence rates, or follow-up appointment
        completion rates.
      whyItMatters: >-
        Named customer deployments without quantitative outcomes are reference accounts, not clinical proof points. For
