  - id: section-3
    title: 'Revenue model and offtake: long-term contracts underpin $5B revenue potential'
    body: >-
      Stegra's revenue model rests on long-term supply contracts with industrial buyers willing to pay
      a green premium for certified fossil-free steel. Disclosed offtake partners include BMW,
      Mercedes-Benz, Scania, Volvo Group, IKEA, and Microsoft, spanning automotive OEMs, heavy-vehicle
      manufacturers, a global retailer, and a technology company. These partners have publicly committed
      to scope 3 emission reductions that require decarbonising their steel supply chains, providing
      structural demand pull for Stegra's product and making the offtake relationship commercially and
      reputationally durable for both parties.


      Green-steel premium pricing is estimated at $200–400 per tonne above conventional hot-rolled coil
      spot prices of approximately $700–800/t, yielding a blended realized price of approximately
      $1,000–1,100/t. At full 5 Mt annual capacity, this implies estimated annual revenue of
      $5–5.5 billion. Contract terms are typically 5–7 years, providing forward revenue visibility that
      also supports project-finance lenders' confidence in debt service coverage ratios. The EU CBAM
      regulation phasing in carbon pricing on imported steel from 2026 further strengthens the structural
      competitive position of low-carbon European production and supports the durability of the premium.


      Revenue quality depends critically on actual offtake volumes per customer, which are not publicly
      disclosed, creating a customer-concentration diligence gap. The offtake base is predominantly
      automotive OEMs, exposing Stegra to cyclical demand risk. Revenue streams and pricing details are
      presented in TI001 and TI002.
