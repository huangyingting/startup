  - id: section-2
    title: 'Project economics and unit economics: capex intensity and H2-sensitive margins'
    body: >-
      Stegra's Phase 1 plant in Boden, northern Sweden uses a direct-reduced iron route powered by
      green hydrogen, followed by electric arc furnace steelmaking to produce approximately 5 million
      tonnes of green steel per year. This configuration eliminates coal-based blast-furnace operations
      and the associated CO2 emissions at the cost of substantially higher energy input. Phase 1 project
      capex is estimated at €4–5 billion, translating to roughly €800–1,000 per tonne of annual capacity,
      materially above conventional BF-BOF greenfield comparables at approximately €300–500/t.


      At the unit-economics level, iron ore DR-grade pellets represent approximately $150–200 per tonne
      of output cost at prevailing pellet prices. Green hydrogen production via electrolysis is the most
      variable and consequential cost component: electrolysis requires approximately 50–55 MWh of
      electricity per tonne of green hydrogen, and at Northern Swedish industrial electricity rates of
      approximately €30–40/MWh, green hydrogen costs approximately €2–3/kg—equivalent to roughly
      $200–330/t of steel. EAF processing, plant overhead, and logistics add approximately $100–150/t,
      yielding a blended opex estimate of approximately $450–680/t.


      Gross margin is therefore highly sensitive to electricity price and green hydrogen cost trajectories.
      BNEF projects European green hydrogen falling below €2/kg only after 2030, meaning early-ramp
      economics will face elevated H2 costs that compress margins unless the green premium fully offsets
      the cost delta. The IEA Iron and Steel Technology Roadmap identifies DRI-EAF as the key near-zero
      pathway for the global steel sector, validating Stegra's configuration, but near-term margins
      require the green premium to cover the cost differential above conventional BF-BOF steel opex of
      approximately $300–400/t. Stegra's Northern Sweden location provides access to fossil-free
      hydropower and wind electricity, which is one structural advantage that partially offsets the H2
      cost headwind. Unit economics detail is presented in TI003 and FI002.
