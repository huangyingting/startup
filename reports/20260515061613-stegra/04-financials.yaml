  - calloutType: insight
    title: >-
      Stegra's January 2024 close is the largest green-steel project-finance transaction in European
      history
    body: >-
      The €6.5B January 2024 package—combining ~€2.1B equity from a strategic investor syndicate and
      ~€4.2B project debt from ~20 commercial banks plus the EIB—sets a new benchmark for European
      cleantech project finance and signals deep institutional conviction in both the technology and
      long-term offtake demand. The participation of EKN and SEK adds Swedish state backing and further
      derisk the debt service obligations.
    claimRefs:
      - CI001
      - CI002
      - CI005
      - CI006
