          - type: callout
            title: CBAM 为欧盟绿色钢铁生产商创造结构性成本护城河
            body: >-
              CBAM 从 2026 年起对钢铁进口适用正式阶段，按当前 ETS 价格给传统进口钢施加 €130-170/tonne 等价成本。Stegra 在瑞典生产近零 CO2 钢材，不承担 CBAM 成本；随着 CBAM
              爬坡，相比传统进口钢获得结构性成本平价或优势。这道监管护城河会强化 Stegra 的地位，而不是依赖其技术优势本身。
            calloutType: insight
