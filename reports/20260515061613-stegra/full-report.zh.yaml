  - id: TV006
    title: 最终尽调问题清单
    columns:
      - 问题
      - 负责人
      - 重要性
      - 询问对象
    rows:
      - - 实际项目 IRR 模型，按基准 / 乐观 / 悲观情景列明资本开支、收入、EBITDA 和 WACC 假设
        - Stegra CFO 和项目融资团队
        - 阻断性——没有 IRR 数据，无法承销股权回报
        - Stegra 管理层；需要数据室访问
      - - 绑定承购协议条款——承诺销量、定价公式、最低提货保证和罚则
        - Stegra 商务和法务团队
        - 阻断性——收入模型能否成立，取决于合同韧性；公开意向书（LOI）披露无法确认
        - Stegra 法务团队；至少三家 OEM 对手方
      - - 完整 EIB 和商业债务契约包——里程碑定义、放款触发、豁免条款和当前契约余量
        - Stegra 财务和法务团队
        - 阻断性——没有契约细节，无法评估进度滑坡容忍度和重组风险
        - EIB 和 Stegra 法务团队；建议独立法律审阅
      - - 经审计或已复核财务报表——截至目前资本开支、现金余额、烧钱速度，以及 April 2026 轮的股权 / 债务构成
        - Stegra 审计机构（财务报表）和 CFO（现金消耗）
        - 重要——验证超支范围和当前股权稀释
        - Stegra CFO 和外部审计师；至少提供已复核中期账目
      - - 完整股权结构表——优先股堆叠、清算瀑布、所有融资批次带来的稀释，以及任何棘轮条款或反稀释条款
        - Stegra 法律顾问和 CFO
        - 重要——决定 Jan 2024 隐含估值在 April 2026 追加融资稀释后，是否反映真实新钱经济性
        - Stegra 法律顾问；与 EIB 融资协议对照
      - - 施工进度认证——独立工程师确认实体完工百分比和修订后投产计划
        - 贷款方银团任命的独立技术顾问（ITA）
        - 重要——客观验证支撑基准情景的投产时间假设
        - 贷款方 ITA；公开建设里程碑公告可作代理
    notes: 尽调问题按重要性排序。第 1–3 项是阻断条件；没有这些，不应承诺新资本。第 4–6 项是重要条件，交割前必须审阅，但可设计为带陈述与保证的交割条件。
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV039
      - CV040
      - CV041
