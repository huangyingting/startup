      - number: '5.2'
        title: DRI 系统与制氢
        blocks:
          - type: paragraph
            body: >-
              DRI 竖炉是工厂的技术核心。Stegra 已获得 Midrex Technologies 成熟竖炉设计许可；同一 Midrex 工艺在使用天然气运行时，如今占全球 DRI 产量的 60%
              以上。把它从重整天然气改为绿色氢，需要调整气体化学和温度曲线，但 Midrex 竖炉在机械结构上适合用氢，因为标准天然气工艺中本来就把氢作为还原剂。Boden 竖炉将使用 LKAB 供应的铁矿石球团；LKAB 的
              Kiruna 和 Malmberget 业务生产适合 DRI 路线的高品质球团，且距离 Boden 场址约 100 km。相较全球多数竞争 DRI 项目，这使物流成本可控、供应链距离更短。


              氢气系统按每年约 100,000 吨 H2 设计，电解产能最高 800 MW。Stegra 已披露 thyssenkrupp Nucera 为主要电解槽供应商。Hitachi Energy
              负责电网接入以及电解槽区域的厂区配套集成。公开披露同时提到 PEM 和碱性电解技术，符合这一规模下采用多元电解槽堆栈的安排。Lule River 水电提供基础负荷可再生电力；Iberdrola 和
              Statkraft 被列为可再生 PPA 对手方。瑞典北部（Elområde SE2）近零碳电网是关键优势：所产氢气的运营碳强度几乎完全由电源电网强度决定，而瑞典北部电网的排放因子长期位居欧洲最低之列。
