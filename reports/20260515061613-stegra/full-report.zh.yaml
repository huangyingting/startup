      - number: '6.2'
        title: 汽车板块——BMW、Mercedes、Scania、Volvo、ZF、Schaeffler 和 Porsche
        blocks:
          - type: paragraph
            body: >-
              汽车 OEM 及其一级供应商是 Stegra 最主要的客户板块，估计占已签包销订单簿的 60-70%。逻辑是结构性的：欧洲主要车企在 Scope-3 企业可持续目标下，已承诺让上游原材料和钢材供应链脱碳。EU
              Corporate Sustainability Reporting Directive 及其车辆车队 CO2 监管，已把绿色供应链义务嵌入车企治理；对拥有 2030 和 2035
              净零里程碑的公司来说，采购绿色钢是战略必要，而非可选项。


              BMW Group 是最早行动者之一，2021 年 10 月宣布与 H2 Green Steel 签署协议，并在 2022 年扩大合作，目标是向欧洲制造工厂供货。BMW Group 的公开可持续报告确认了上游钢材
              Scope-3 目标。Mercedes-Benz Group 于 2021 年 5 月签约、入股，并在 2023
              年随后扩大包销；协议覆盖高端车身面板，这类产品的绿色来源叙事最适合品牌定位。Traton/Volkswagen 旗下 Scania 于 2021 年 8 月加入，覆盖卡车驾驶室和底盘。Volvo Group 和
              Volvo Cars 均在 2022 年签约，分别覆盖卡车和乘用车，并与 Volvo Group 的 Science Based Targets initiative 承诺一致。ZF
              Friedrichshafen 于 2023 年签约，用于传动系统和底盘部件。Schaeffler 也入股，并在 2023 年约定用于精密汽车轴承和传动部件。Porsche 另据报道也是客户。


              汽车客户集中带来风险：如果 EV 需求明显放缓，车企可能把绿色钢溢价支出让位于降本。Bloomberg 和 Financial Times 在 2024-2026 年的报道记录了欧洲 EV 需求疲软如何压迫
              OEM 资本预算；分析师也指出，如果车企利润率被压缩，Scope-3 支出承诺可能被重新谈判或延后。不过，IEA 和 BNEF 指出，EU 车队 CO2 标准的监管执行会让大型 OEM
              全面退出绿色采购在政治上代价高昂，因此至少形成一个监管底线。
