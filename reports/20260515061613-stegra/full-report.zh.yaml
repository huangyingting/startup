      - number: '8.2'
        title: 可比公司分析：以 EV/Mt 产能和 EV/EBITDA 观察上市钢企与清洁技术公司
        blocks:
          - type: paragraph
            body: >-
              最有参考价值的估值可比对象，是披露市值、有运营记录并定期公开财务的上市钢企。SSAB 是瑞典最大的钢铁生产商，也是 HYBRIT 无化石钢试点的运营方，市值约 $8–10B，总产能约 7.5 Mt，对应
              EV/Mt 产能约 $1,200/t。SSAB 是地理和战略上最贴近的上市同业：同处斯堪的纳维亚市场，押注同一条脱碳逻辑，也争夺部分相同的 OEM 客户。按 EV/EBITDA 看，SSAB 约以当前盈利的
              7–9x 交易，既反映大宗商品周期敏感性，也包含绿色钢期权价值。


              ArcelorMittal 是全球第二大钢企，年产能约 70 Mt，市值约 $22B。其 EV/Sales 约 0.4x，EV/EBITDA 约 5x，折算 EV/Mt 产能仅 ~$315/t。低产能倍数来自
              ArcelorMittal 的多元化大宗商品敞口、传统高炉资产基础，以及缺乏纯绿色溢价。Nucor 是美国 EAF 钢铁龙头，市值约 $30B，EV/EBITDA 为 6–7x；相对 ArcelorMittal
              的溢价，与 Nucor 更高利润率的 EAF 配置、更快的资本配置节奏和强劲美国需求相符。POSCO Holdings 是韩国旗舰钢企，年产能 ~38 Mt，市值约 $25B，折算产能约 $660/t。


              最重要的非钢铁可比对象是 Northvolt AB。Northvolt AB 是瑞典电池超级工厂，由同一家 Vargas AB 控股公司支持；Vargas 也主导了 Stegra 的早期股权轮。Northvolt
              在 2024 年 11 月申请破产前，风险投资估值曾达约 $12B；破产原因包括产量爬坡失败、严重成本超支累积，以及质量和客户留存失守。上述模式——Vargas
              赞助下的瑞典首创型清洁技术巨型项目、大型机构资本底座、瑞典北部偏远厂址——与 Stegra 在同等爬坡前阶段具有结构性相似。技术不同，EPC 结构不同，Stegra
              的项目融资契约约束也提供了不同的风险管理框架；但一个新近、直接、几乎同型的失败案例摆在眼前，尽调必须明确审视，不能轻描淡写带过。Seeking Alpha 及其他持批判立场的分析师已把 Northvolt
              平行案例列为 Stegra 投资者最清晰的单一警示信号。
