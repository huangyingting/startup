          - type: callout
            title: SAM 和 SOM 测算内嵌氢成本下降路径
            body: >-
              SAM/SOM 测算假设到 2020 年代后期，绿氢生产成本降至 €2-3/kg，这与 IEA 和 Hydrogen Europe 在政策支持情景下的预测一致。若氢成本仍高于 €4/kg，Stegra
              所需绿色溢价将明显上升，买家基础会收窄，有效 SAM 也会被压缩。该假设应与 Stegra 实际电解槽采购成本进行压力测试。
            calloutType: assumption
