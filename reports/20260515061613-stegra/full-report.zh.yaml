      - number: '3.4'
        title: Stegra 的竞争位置：优势、风险与护城河耐久性
        blocks:
          - type: paragraph
            body: >-
              Stegra 的竞争位置建立在四根支柱上，使其区别于先行者和在位者。第一是资本：截至 2026 年 4 月，Stegra 已锁定超过 €7.9B
              融资，是全球专注绿色钢铁初创公司中已披露项目资本规模最大者，相比仍在融资的同业降低了执行风险。第二是时间表：Stegra 目标 2026–2027 年首批投产，商业规模进度与 HYBRIT 接近或更快，也领先
              GravitHy 和 Blastr。第三是场址：Boden 位置可接入丰富、低成本的瑞典水电、LKAB
              铁矿球团，并拥有寒冷气候，降低电解槽堆冷却需求。第四是客户锚定：已披露客户簿——BMW、Scania、Mercedes-Benz、Volvo Group、IKEA、ZF、Microsoft 和
              thyssenkrupp——混合了汽车 OEM 需求拉力和工业脱碳承诺，在纯玩家先行者中并不常见。结构性风险同样真实。氢经济性仍是核心敏感项：如果到 2020 年代后期绿氢成本不能降向 $2/kg
              阈值，Stegra 产品仍将依赖绿色溢价和监管支持，而不是无补贴成本竞争力。欧盟监管顺风——CBAM 和
              ETS——对传统进口和高排放在位者形成有意义的成本压力，但这些机制可能在政治压力下削弱。在位者追赶是中期风险而非即时风险，但 ArcelorMittal、Baowu 和 POSCO
              的规模优势极大，任何绿氢经济性的结构性变化，都可能比预期更快改写竞争层级。
