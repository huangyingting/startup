      - number: '3.3'
        title: 在位钢铁巨头及其脱碳路径
        blocks:
          - type: paragraph
            body: >-
              全球最大钢铁生产商并没有在脱碳上停步，但它们的转型路径与 Stegra 结构上不同。ArcelorMittal 是全球第二大钢铁生产商，年产约 70 Mt，正在 Hamburg、Sestao、Gent 和
              Eisenhüttenstadt 推进 DRI 项目，同时维持全球最大规模之一的 BF-BOF 资产基础。其 Hamburg 设施已在示范运行中验证 100% 氢进料，但商业化产量需要氢供应链成熟到
              ArcelorMittal 所需规模，而这一点尚未实现。thyssenkrupp 的 tkH2Steel 计划目标是在 Duisburg 建设 2.5 Mt/year DRI，并已获得 €2B EU
              Innovation Fund 补助，但公司同时面临财务重组，带来资本配置不确定性。Salzgitter 的德国时间表最靠前，目标 2026
              年产出第一批热金属，但产能相对欧洲需求仍小。与此同时，亚洲巨头——Baowu（约 131 Mt/year）、拥有 HyREX 的 POSCO、以及拥有 COURSE50 的 Nippon
              Steel——正在投资示范规模绿色钢铁 R&D，但距离在其产量中实现任何有意义比例的商业部署仍需数年。这些在位者对 Stegra 的风险，短期不是替代，而是中期追赶：如果绿氢成本下降快于预期，且在位者获得大规模
              H2 供应，它们的制造规模和客户关系可能压过任何纯玩家先行者的先发优势。不过，钢铁行业长期低利润率限制了在位者可自筹投入的资本开支，使公共补贴成为关键推手——也成为竞争卡点。
