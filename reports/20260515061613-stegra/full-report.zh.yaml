      - number: '4.2'
        title: 项目经济性与单位经济性：资本开支强度高，利润率对 H2 敏感
        blocks:
          - type: paragraph
            body: >-
              Stegra 位于瑞典北部 Boden 的 Phase 1 工厂采用绿氢驱动的直接还原铁路线，随后通过电弧炉炼钢，每年生产约 5 million tonnes 绿色钢铁。该配置取消煤基高炉作业及其相关 CO2
              排放，代价是能源投入显著更高。Phase 1 项目资本开支估计为 €4–5 billion，折合约 €800–1,000 per tonne 年产能，明显高于传统 BF-BOF 绿地同业约 €300–500/t。


              单位经济性层面，DR 级铁矿球团在当前球团价格下约占 $150–200 per tonne 产出成本。电解制绿氢是最可变、也最关键的成本项：电解每 tonne 绿氢约需 50–55 MWh
              电力，按瑞典北部工业电价约 €30–40/MWh 计算，绿氢成本约 €2–3/kg——折合每 tonne 钢约 $200–330。EAF 加工、工厂管理费用和物流再增加约 $100–150/t，得到混合 opex
              估算约 $450–680/t。


              因此，毛利率对电价和绿氢成本路径高度敏感。BNEF 预计欧洲绿氢要到 2030 年后才会降至 €2/kg 以下，意味着早期爬坡经济性会面对较高 H2 成本；除非绿色溢价完全抵消成本差，利润率会被压缩。IEA
              Iron and Steel Technology Roadmap 将 DRI-EAF 识别为全球钢铁行业的关键近零路线，验证了 Stegra 的配置，但短期利润率要求绿色溢价覆盖相对传统 BF-BOF 钢材约
              $300–400/t opex 的成本差。Stegra 瑞典北部场址可接入无化石水电和风电，这是部分抵消 H2 成本逆风的结构性优势。单位经济性细节见 TI003 和 FI002。
