            title: 有约束力的 OEM 包销降低需求风险
            body: >-
              与 BMW、Scania、Mercedes-Benz、Volvo Group、IKEA、ZF、thyssenkrupp Materials Services 和 Microsoft 签订的包销协议，为
              Stegra 产出提供已验证的近期需求。这些承诺由 Scope 3 SBT 和 CSRD 合规义务支撑，相比没有确认包销方的投机性绿地项目，显著降低需求侧市场风险。
