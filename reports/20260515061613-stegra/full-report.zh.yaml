        - 许可条件，以及电解槽排放或用水的任何运营限制，未进入公共领域。
    notes: 绿色 H2 钢的认证和合规体系仍在成熟中。Stegra 面向高端买家的可信度，取决于 ResponsibleSteel 认证和已发布 EPD 能否在首批商业出货到达客户前落地。
