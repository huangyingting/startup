    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与产品
        blocks:
          - type: paragraph
            body: >
              Stegra，前称 H2 Green Steel AB，是一家瑞典工业技术公司，总部位于 Stockholm，业务围绕 Gothenburg 展开，主要制造基地正在瑞典北部 Boden 建设。公司成立于 2021
              年，2024 年 9 月由 H2 Green Steel 更名为
              Stegra，意味着叙事从以氢为核心转向更广泛的绿色钢铁生产商和工业脱碳平台身份。“Stegra”在瑞典语中意为“上升”，对应公司把绿色钢铁生产推向全球规模的野心。

              公司的核心产品是近零排放钢材，生产链条纵向一体化：先利用瑞典北部丰富水电和风电资源供给约 800 MW
              电解槽来制备绿氢，再用绿氢投入直接还原铁（DRI）工艺，替代传统高炉中的焦煤，把铁矿球团还原为固态铁。得到的直接还原铁随后进入电弧炉（EAF）加工为成品钢。整条链路避开煤燃烧，而煤燃烧约占传统钢铁 CO2 排放的
              70–75%。Boden 工厂设计粗钢产能约 5 million tonnes per year，有望成为全球最大的单一场址 EAF 综合体之一。

              商业模式主要由包销驱动：Stegra 已与 BMW、Scania、Mercedes-Benz、Volvo Group（Volvo Cars 和 AB Volvo 卡车）、IKEA、ZF
              Group、thyssenkrupp Materials Services、Microsoft 等标杆工业买家签订有约束力的采购协议或框架协议，其中 Microsoft
              合作还覆盖云和数据基础设施。这些协议降低了收入侧风险，也提供了已锁定需求，支撑 European Investment Bank、瑞典出口信贷机构 EKN 和商业银行银团提供债务融资。Stegra
              的竞争定位建立在工业规模绿色钢铁生产的先发优势上；与此同时，欧盟 Carbon Border Adjustment Mechanism（CBAM）和 Emissions Trading System（EU
              ETS）正逐步抬高传统高碳钢进口欧洲的成本。
