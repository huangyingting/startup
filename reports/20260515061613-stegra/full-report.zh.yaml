      - number: '2.3'
        title: Stegra 的 TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >-
              测算 Stegra 的市场，需要同时看三层嵌套口径：全球钢铁的总可用市场（TAM）、欧洲及高端绿色认证原生钢的可服务市场（SAM），以及 Stegra 的 5 Mt/year Boden
              工厂产出所对应的可获取市场（SOM）。

              全球钢铁 TAM 估计约为每年 $1.4 trillion，依据 World Steel Association 产量数据和 $700-800/tonne
              平均实现价格。这一广义市场涵盖所有钢材等级、地区和生产路线。但传统钢铁大体已商品化，Stegra 并不争夺低利润、高销量的大宗商品订单。分析中更相关的中间
              TAM，是服务汽车、家电和工业制造的全球扁平轧材及高端钢材细分市场，估计每年 $200-400 billion，占全球钢铁收入 25-30%。在此之内，绿色认证原生钢还有额外溢价层。

              SAM 收窄到欧洲绿色认证原生钢——即通过 DRI+EAF 和绿氢生产，并取得 ResponsibleSteel 或同等标准认证的钢材。BloombergNEF 估计，在政策支持情景下，到 2030
              年全球绿色钢铁需求为 50-100 Mt/year；欧洲份额估计为每年 20-50 Mt，这与 IEA 净零转型路径和 EUROFER 欧盟扁平钢需求数据相符。按高端绿色产品 €900-1,200/tonne
              实现价格计算，这意味着到 2030 年欧洲 SAM 约为 €18-60 billion。SP Global Commodity Insights 和 Fastmarkets 均指出，预计到 2027-2028
              年绿色钢铁供应仍将受限，支撑早期生产商的短期定价能力。

              Stegra 的 SOM 由 Boden 设施的 5 Mt/year 产能锚定，约占 2030 年欧洲绿色钢铁 SAM 预测值的 10-25%。与 BMW、Scania、Mercedes-Benz、Volvo
              Group、IKEA、ZF、thyssenkrupp Materials Services 和 Microsoft 的现有包销协议验证了 SOM 逻辑。若相对基准 HRC 价格实现 €100-200/tonne
              绿色溢价，Stegra 的 5 Mt 产量意味着满产后年收入潜力约 €4-5 billion。Stegra 于 2024 年 1 月锁定约 €6.5 billion 融资，并在 2026 年 4 月新增 €1.4
              billion，目标 2026-2027 年首批投产。

              SAM 落地仍有重大不确定性：若 ArcelorMittal、SSAB HYBRIT、Salzgitter SALCOS 和 GravitHy 的竞品供应同时进入市场，绿色钢铁溢价可能被压缩。SAM
              测算还取决于汽车买家能否在欧盟内部获得足够绿色钢铁，以适配 CBAM 调整后的成本结构。IEA 净零情景要求到 2035 年全球绿色钢铁需求扩大到 100-250 Mt/year，为 Stegra
              规划产能提供了可信的长期增长路径。
