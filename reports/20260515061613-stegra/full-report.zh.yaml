      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景、投资逻辑破裂触发点和最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              三个情景区间框定了 Stegra 股权可投范围。


              乐观情景下，Boden 工厂在 2027 年大体按期投产，并在 2028–2029 年达到铭牌产能。欧洲 OEM 供应链锁定长期脱碳合同，绿色溢价向 €400/t 扩张；CBAM 执法把化石钢进口成本抬高
              €150–200/t；EU ETS 免费配额按期退出。2030 年收入达到 €5.5–6B，EBITDA 利润率为 18–22%。按 8–10x 远期 EBITDA 倍数，企业价值达到 €8–10B——相对
              2024 年 1 月隐含入场价，股权 IRR 为 14–18%。乐观情景要求投产、溢价定价和监管执行三条线同时跑通。


              基准情景下，电解槽供应链交期和用工爬坡拖慢进度，投产延迟 6–12 个月，爬坡也慢于计划。绿色溢价稳定在 €250/t，电价维持在约 €35/MWh，绿色氢成本到 2028 年降至约 €2.5/kg。2030
              年收入达到 €4.5–5B，EBITDA 利润率为 12–16%。按 6–7x 倍数，€5–6B 的企业价值大体匹配 2024 年 1 月隐含投后估值；若先不计 2026 年 4
              月追加融资带来的稀释，早期投资者股权回报大致持平。基准情景下项目 IRR 约为 9–12%。


              悲观情景是 Northvolt 平行版本：进一步成本超支把总资本开支推向 €7B；全球绿色钢产能增长快于愿意支付溢价的需求，绿色溢价侵蚀至 €100/t；EU CBAM 遭遇政治延迟或执行缺口。2030 年收入仅
              €3–4B，EBITDA 利润率为 6–10%。在受压 EBITDA 上给 4–5x 倍数，企业价值仅 €2–3B——远低于累计投入资本；2024 年 1 月轮的股权将显著受损，2026 年 4
              月追加批次也面临回收风险。悲观情景下，Northvolt 平行案例会直接指导重组预期。


              TV005 中的五个投资逻辑破裂触发点至少应按季度监控。TV006 中的六项最终尽调要求是投资前条件；没有一项适合豁免。最紧迫的是进入私有数据室，检查实际项目 IRR
              模型和具约束力的承购协议条款；仅靠公开来源无法取得两项信息。
