      - number: '5.5'
        title: 建设路线图与技术成熟度
        blocks:
          - type: paragraph
            body: >-
              Stegra 的建设计划在 2025 年并延续到 2026 年取得实质进展。场地准备于 2023 年 11 月启动。到 2026 年 3 月，DRI 还原塔高度已超过 100 米，这是竖炉 DRI
              工厂最醒目的实体里程碑之一。2026 年 4 月，公司宣布安装最后一个电解槽模块，说明电解区域硬件安装接近完成。综合工厂调试目标为 2026 年下半年，首批商业钢生产指引落在 2026–2027 年。Phase
              1 名义产能约为每年 2.5 million 吨粗钢。


              从技术成熟度看，H2-DRI-EAF 工艺本身不是实验室概念：Midrex 竖炉已以气基 DRI 模式运行数十年，ArcelorMittal 和其他钢铁企业已大规模运营试点和商业 EAF 设施，SMS group
              轧机也已在全球部署。Boden 的新意在于，把 800 MW 规模绿色氢与 DRI、EAF 组合进同一个一体化绿地设施。Luleå 的 HYBRIT 示范厂（SSAB/Vattenfall/LKAB）在 2021
              年产出全球首批无化石钢，验证了技术可行性；Stegra 现在尝试把它复制到商业规模。ResponsibleSteel 和 EU CBAM 验证框架，可能是向买家证明产品碳属性的认证路线。
