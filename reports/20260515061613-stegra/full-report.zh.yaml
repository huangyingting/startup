  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 全球与欧盟钢铁市场概览
        blocks:
          - type: paragraph
            body: >-
              钢铁是全球最基础的工业材料之一，支撑建筑、汽车制造、能源基础设施和机械生产。根据 World Steel Association，2024 年全球粗钢产量约 1.89 billion tonnes，其中中国超过
              1 billion tonnes，约占全球产量 54%。欧盟年产约 126 million tonnes，约占全球供应 7%，德国、意大利和法国是欧盟内最大产钢国。根据 USGS 矿产统计，美国每年增加约 80
              million tonnes 产量。

              钢铁行业也是全球碳强度最高的工业部门之一。International Energy Agency 估计，钢铁生产每年产生约 3.7 billion tonnes CO2，占全球温室气体总排放
              7-9%。主流生产路线是高炉-转炉（BF-BOF），约占全球产量 70%，结构上碳强度很高，每生产 1 tonne 钢约排放 2.0-2.3 tonnes CO2。电弧炉（EAF）路线约占全球产量
              30%，主要依赖废钢，排放随电网碳强度而变，约为 0.4-0.8 tCO2/tonne。绿氢 DRI+EAF 技术可实现约 0.05-0.1 tCO2/tonne 的近零排放，相比 BF-BOF 约降低 95%。

              绿色钢铁的结构性转型由三股力量共同推动：EU Emissions Trading System 和 Carbon Border Adjustment Mechanism
              等监管框架收紧；大型用钢行业作出企业脱碳承诺，尤其是拥有 Science-Based Targets 和 Scope 3 义务的汽车 OEM；绿氢和直接还原铁技术成熟，成为近零排放原生钢生产的可行路径。World
              Steel Association 数据显示，DRI 在全球钢铁生产中的占比已升至约 8%，基于 DRI 的 EAF 路线越来越被视为原生钢低排放生产的主导路径。

              按约 1.89 Bt 产量和每 tonne 约 $700-800 平均实现价格估算，全球钢铁市场年收入约 $1.4
              trillion。欧盟钢材因能源成本更高、环保监管更严格、面向汽车和家电市场的产品等级更高而有小幅溢价，欧盟热轧卷平均价格通常为 €700-900/tonne。EUROFER 估计欧盟汽车行业每年消耗约
              25-35 million tonnes 钢材，欧盟建筑行业吸收约 35-40% 的欧盟钢材需求，是两个最大的终端使用场景。Stegra 瑞典 Boden 工厂目标产量为 5
              Mt/year，代表高端绿色细分市场的有意义扩张，而不是大宗商品式放量。
