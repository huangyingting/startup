        - 约占订单簿 40-45%
        - 高 — 质量规格成熟后，可扩展到更多车型、地区，以及喷漆线或冲压应用
        - 严重 — 若客户退出，约半数订单簿暴露，且可能迫使公司按大宗商品价格在现货市场销售
      - - 汽车 Tier-1（ZF、Schaeffler）
        - 约占订单簿 15-25%
        - 中等 — Stegra 质量规格成熟后，可拓展到更多零部件家族
        - 重大 — Tier-1 流失可能跟随 OEM 流失，并放大集中度风险
      - - 工业与建筑（IKEA、Kingspan）
        - 约占订单簿 10-15%
        - 中等 — IKEA 全球规模可吸收更多产量；Kingspan 可扩大面板产品用钢
        - 中等 — 独立细分，有自身 Scope-3 逻辑；受 EV 周期风险影响较小
      - - 钢铁分销商（thyssenkrupp、Marcegaglia、Klockner）
        - 约占订单簿 10-15%
        - 高 — 分销商可把产品导向多个终端市场；渠道可扩展
        - 低至中等 — 分销承购最灵活但利润率最低；流失会削弱触达，不一定伤害收入质量
