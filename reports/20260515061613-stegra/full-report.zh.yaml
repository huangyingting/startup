      - number: '2.4'
        title: 监管环境与政策顺风
        blocks:
          - type: paragraph
            body: >-
              Stegra 的市场很大程度上由欧洲和全球监管框架塑造：这些框架为绿色钢铁买家提供财务激励，同时不断提高传统钢铁生产商成本。近期最重要的监管驱动是欧盟 Carbon Border Adjustment
              Mechanism（CBAM）。该机制于 2023 年 10 月进入过渡阶段，并从 2026 年 1 月起进入正式阶段。根据 CBAM，向欧盟进口钢铁及其他碳密集产品的进口商必须购买碳证书，证书金额对应在 EU
              ETS 规则下本应支付的碳价。传统钢铁约为 2 tCO2/tonne；按 2024-2025 年区间内 €65-85/tonne 的 EU ETS 碳价计算，CBAM 合规成本相当于每 tonne 进口钢
              €130-170，实质上拉平了欧盟本土生产商与来自中国、乌克兰、土耳其等低成本进口之间的竞争场地。

              EU Emissions Trading System 对注册在欧盟的 BF-BOF 钢铁生产商施加直接且上升的成本。钢铁行业 EU ETS 免费配额正逐步削减至 2034 年；根据修订后的 ETS 指令，预计到
              2034 年全面拍卖。这一路径会让绿色钢铁生产在未来十年相对传统 BF-BOF 生产越来越具备成本竞争力。Stegra 的绿氢 DRI+EAF 路线每 tonne 钢近零 CO2 排放，不产生 ETS
              合规成本，并可能在特定条件下获得 ETS 配额收入。2024 年 EU ETS 碳价在 €60-90/tonne 区间，随着免费配额减少，到 2030 年仍有结构性上行压力。

              EU Innovation Fund 为绿色钢铁等大型脱碳项目提供重要补助，补充私人融资。European Investment Bank
              已承诺为绿色工业转型项目提供融资；瑞典国家能源政策以丰富、低成本的水电和核电为特征，使 Boden 的电解槽经济性具备优势。美国 Inflation Reduction Act
              的氢气生产税收抵免（45V）正在北美创造平行的绿氢经济性，可能让氢供应商受益，并在中期为跨大西洋绿色钢铁贸易带来间接竞争动态。

              EU Corporate Sustainability Reporting Directive（CSRD）要求大型欧洲公司披露并认证可持续供应链，由此创造合规驱动的绿色钢铁认证需求。叠加 EU Taxonomy
              要求和 ResponsibleSteel 认证标准，这些框架形成监管护城河，偏向拥有认证绿色生产能力的在位者。CBAM、EU ETS、CSRD 和 ResponsibleSteel
              认证共同为工业买家创造结构性激励，推动其向 Stegra 这样的欧盟本土生产商采购绿色钢铁，并强化已锁定的包销关系。剩余政治风险在于欧盟工业竞争力压力可能削弱 CBAM 执行，但考虑到欧洲议会和欧盟委员会对
              Green Deal 框架的强承诺，该风险目前评估为低到中等。
