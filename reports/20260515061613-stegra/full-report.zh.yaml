        - 所有路线、等级和地域的全球粗钢总生产收入
        - ~$1.4T/年
        - World Steel Association 1.89 Bt，按 ~$700-800/tonne 混合平均实现价格
        - '2024'
      - - TAM——全球高端和扁平钢材
        - 服务汽车、家电和工业制造的扁平轧制与高端钢材
        - ~$200-400B/年
        - 估计占全球钢铁收入 25-30% 的高端和扁平品级；IEA 与 World Steel 数据
        - '2024'
      - - SAM——2030 年 EU 绿色钢需求
        - 欧洲可由 DRI+EAF 和绿色氢覆盖的绿色认证原生钢
        - 20-50 Mt/年（~€18-60B）
        - BloombergNEF 和 IEA 净零路径估计；EUROFER EU 扁平材需求基础；€900-1,200/tonne
        - 2030 年预测
      - - SAM——EU 高端汽车扁平钢材
        - EU 汽车扁平钢材需求（来自原生生产商的结构和白车身品级）
        - ~25-35 Mt/年
        - EUROFER 汽车钢材消费数据；IEA Iron and Steel Technology Roadmap
        - '2024'
      - - SOM——Stegra Boden 产能
        - Stegra 在 Boden 工厂已签约、且有确认承购协议的 5 Mt/年产能
        - 5 Mt/年（~€4-5B 收入）
        - Stegra 官方沟通；与 BMW、Scania、Mercedes-Benz、Volvo、IKEA 的承购协议
        - 2026-2027 爬坡
      - - SOM 占 EU SAM 的比例
        - Stegra 的 5 Mt 在 2030 年欧洲绿色钢 SAM 预测中的占比
        - EU SAM 的 10-25%
