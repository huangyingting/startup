      - number: '7.3'
        title: 绿色溢价耐久性和潜在产能过剩，是中期市场风险
        blocks:
          - type: paragraph
            body: >-
              Stegra 的投资逻辑要求汽车 OEM 和工业买家为经过认证的绿色钢支付可持续溢价，约为每吨比传统钢价高 €100–300。这一溢价建立在两个政策支柱上：EU ETS 碳价高于约 €60–80/tonne，以及
              CBAM 执行确保进口传统钢支付等价的隐含碳成本。BMW Group、Scania、Mercedes-Benz 和 Volvo Group
              已签署意向书或发布绿色钢可持续采购承诺。但这些不是带有价格底线和数量排期的、有约束力的数量承诺包销合同；它们是意向信号，当 OEM 资本预算收紧时可以重新定价或延后。

              EV 需求在 2024–2025 年明显转弱，压缩 OEM 利润率，并导致几家车企推迟或缩减 Scope-3 供应商投资计划。S&P Global 和 Bloomberg 在 2025
              年追踪了这一动态；分析师指出，正当 Stegra 于 2026–2027 年开始生产爬坡时，买家为绿色钢支付 15–20% 溢价的意愿可能走弱。如果 OEM 利润率持续承压，或 EV
              复苏停滞，按当前溢价水平敲定有约束力的长期绿色钢合同，可能比现有 LOI 信号暗示的更难。

              到 2030 年的产能过剩风险也真实存在，并且有多个来源。HYBRIT（SSAB/LKAB/Vattenfall）目标在 2026–2027 年实现商业体量；ArcelorMittal 的 Hamburg DRI
              工厂、thyssenkrupp Steel 的 Duisburg DRI 扩建以及法国 GravitHy，均目标在 2028–2030 年达到商业规模。如果其中三四个项目与 Stegra Phase 1
              爬坡同时进入商业规模生产，欧洲绿色钢总供给可能超过近期已承诺需求，压缩稀缺性溢价。Stegra 的 5 Mt/year Phase 1 目标相对于 2030
              年绿色钢需求预测相当可观；竞争对手同步爬坡会实质改变定价均衡。

              中国传统钢铁产能过剩，为整个分析增加了结构性底部风险。自 2022 年以来，全球钢价一直受到中国出口压力压制，使绿色溢价计算所依据的基准价格低于历史区间。ZF 等 Tier-1 汽车供应商和 Microsoft
              等间接客户的 Scope-3 承诺，扩大了绿色钢潜在买家基础，但无法完全抵消中国过剩产能对传统钢价施加的宏观压力。
