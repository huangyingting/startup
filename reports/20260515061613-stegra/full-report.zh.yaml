          - type: callout
            title: 绿色溢价能否延续，取决于政策和 OEM 利润率
            body: >-
              €100-300/tonne 的绿色钢铁溢价，依赖持续碳价和企业可持续承诺预算。IISD 分析强调，如果没有持续政策支持，绿氢炼钢经济性仍然艰难。Seeking Alpha 评论指出，如果汽车 OEM 利润率在
              EV 转型中承压，或 CBAM 实施弱于预期，溢价可能只是暂时的。政策耐久性和买方利润率压力这两重暴露，是关键下行情景。
            calloutType: risk
            claimRefs:
              - CM038
              - CM039
