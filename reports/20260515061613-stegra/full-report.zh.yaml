      - number: '7.4'
        title: CBAM 政治风险、投产前烧钱和私有契约敞口，是结构性财务风险
        blocks:
          - type: paragraph
            body: >-
              CBAM（Regulation EU 2023/956）于 2023 年 10 月进入过渡期，并从 2026 年 1 月起对钢材进口转入完整碳价支付义务。基础工业流程的 EU ETS 免费配额也将在 2026 至
              2034 年间同步逐步退出，这会随着时间推移结构性扩大本土绿色钢相对于进口传统钢的经济优势。二者都为 Stegra 经济性带来真实监管顺风。不过，欧洲 CBAM 执行已受到政治辩论影响：European
              Parliament 推动更快取消免费配额，而 EUROFER 等行业组织游说放慢过渡。EU Hydrogen Strategy 下的 RFNBO（Renewable Fuels of
              Non-Biological Origin）Delegated Regulation 决定 Stegra 的氢能否在 CBAM
              核算和可再生指令中认定为绿色；额外性和时间匹配规则仍有模糊性，带来认证风险，可能影响客户绿色主张和绿色钢溢价兑现。

              截至 2026 年中，Stegra 仍处于投产前、调试前阶段，在累计资本承诺已超过 €5 billion 的情况下承受大量现金消耗。EIB、EKN 和 Innovation Fund 设施降低了高级信用风险，但
              EKN 信用担保和 EIB 契约保护贷款人，不保护股权投资者。关键财务风险在于，如果 2026 年 4
              月融资反映的不只是成本超支，也包括进度滑移，那么与调试里程碑挂钩的债务契约可能缓冲有限。这些信息属于私有资料，无法从公开来源验证——对任何承销下行情景的投资者来说，这是阻断性尽调缺口。

              俄罗斯持续入侵乌克兰，使欧洲能源价格高于战前常态，并扰乱铁合金和钢铁投入品供应链。瑞典议会能源政治——尤其是关于重启核电和长期电价政策的辩论——会影响 Stegra 绿色 H2
              经济性所依赖的低成本可再生电力稳定性。EKN 担保包和 Innovation Fund 拨款是在 IPCEI 和 Innovation Fund
              框架下获批的，带有与里程碑挂钩的拨付条件；任何导致里程碑未达成的进度滑移，都可能触发拨付延迟或追回条款。IEA Iron and Steel Technology Roadmap 确认，规模化 H2-DRI 是
              2050 年钢铁净零的必要路径，但路线图也强调，若没有持续碳政策支持，全价值链必须大幅降本才能竞争。
