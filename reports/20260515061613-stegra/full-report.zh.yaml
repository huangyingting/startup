      - number: '8.5'
        title: 证据材料
        blocks:
          - type: callout
            title: Northvolt 倒塌是 Stegra 投资者最直接的警示模板
            body: >-
              Northvolt AB 是瑞典北部的电池超级工厂，由同一家 Vargas AB 控股公司支持；Vargas 也主导了 Stegra 的早期股权轮。Northvolt 在 2024 年 11
              月申请破产，原因包括产量爬坡失败、成本超支累积到压垮资本结构，以及失去最大客户的质量认证。巅峰时期，Northvolt 的风险投资估值约为 $12B；随后在 12 个月内，股权投资者价值归零。Stegra 不是
              Northvolt：技术、行业、EPC 结构和项目融资契约框架都有实质差异。但结构模式足够接近——Vargas
              赞助下的瑞典首创型清洁技术巨型项目，在商业化生产得到验证前就按工业规模融资，并落在瑞典北部偏远工业场址。任何投委会在出资前，都必须明确且充分地记录：为什么 Stegra 的投产风险动态在性质上不同。
            calloutType: risk
            claimRefs:
              - CV014
