  - id: TR001
    title: 监管 / 法律风险登记表
    columns:
      - 规则 / 许可 / 案件
      - 司法辖区
      - 状态
      - 发生可能性
      - 严重性
      - 缓释措施
      - 剩余敞口
      - 尽调路径
    rows:
      - - EU CBAM（Regulation EU 2023/956）政治修订风险
        - 欧盟
        - 2026 年 1 月起生效；免费配额退出存在政治争议
        - 中
        - 高
        - 跟踪 CBAM 下欧盟委员会授权法案和欧洲议会修正案；跟踪 EUROFER 游说动态
        - 中高
        - 获取独立法律意见，评估 CBAM 时间表稳健性，并做 3 年退出延迟的情景分析
      - - EU ETS 免费配额退出（2026–2034）
        - 欧盟
        - 法定分阶段时间表；下一轮 ETS 审查可能作政治修订
        - 中
        - 高
        - 跟踪 ETS 改革讨论和欧盟委员会《能源联盟状态》报告；确认 Stegra 的证书头寸
        - 中
        - 按年映射 Stegra 至 2034 年的 ETS 敞口，并与当前法定退出时间表对照
      - - RFNBO 绿色 H2 认证（Delegated Regulation EU 2023/1184）
        - 欧盟
        - 已生效；额外性和时间匹配要求的解释仍在演变
        - 高
        - 中高
        - 由认可的合格评定机构认证；持续保存可再生能源采购文件
        - 中高
        - 与 Stegra 法务和运营团队确认 RFNBO 合规路径；取得认证审计计划草案
      - - EU Innovation Fund 拨款与里程碑挂钩的发放条件
        - 欧盟 / 瑞典
        - 拨款已获批；放款取决于调试里程碑达成
        - 中
        - 高
        - 财务模型必须能吸收放款延迟；不可抗力条款需仔细审查
        - 中高
        - 审阅拨款协议中的里程碑定义、追回条款和不可抗力救济范围
      - - 瑞典环境、土地使用和取水许可
        - 瑞典（Länsstyrelsen / Mark- och miljödomstol）
        - Phase 1 许可已获批；需要持续合规监测和阶段升级通知
        - 低
        - 中
        - Stegra 环境合规团队，并与 Boden 市政府保持监管联络
        - 低至中
        - 确认许可范围覆盖 Phase 1 全额铭牌产能以及任何 Phase 2 扩张活动
    notes: >-
      各行按剩余严重性排序。CBAM 和 RFNBO 监管栈的剩余风险最高，因为它们驱动收入兑现；瑞典本地许可已获批，剩余风险较低。本登记表覆盖截至 2026 年 5
      月的重大公开监管栈；双边国家援助谈判和未披露拨款条件无法由公开信息验证。
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the five material EU and Swedish regulatory stacks visible in reviewed official and regulatory sources as
        of May 2026; excludes undisclosed bilateral negotiations, unreported national state-aid decisions, and
        forthcoming RFNBO implementing acts not yet published.
