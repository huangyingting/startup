  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: Stegra 最高的剩余风险集中在首套项目建设执行、技术验证失败和球团矿供应集中；监管和市场风险真实存在，但 CBAM 与 ETS 已生效的顺风因素提供了部分缓释。
    data:
      columns:
        - 概率
        - 影响
        - 缓释成熟度
        - 剩余严重性
      rows:
        - label: 建设 / EPC 成本超支
          values:
            - label: 高
              tone: negative
              detail: 2026 年 4 月额外融资 €1.4B，说明超支已在发生；大型项目基准概率 ≥70%。
            - label: 极高
              tone: negative
              detail: 进一步超支会拉紧债务契约、稀释股权，并推迟投产。
            - label: 中
              tone: warning
              detail: SMS Group 里程碑合同和分阶段投产计划已就位，但内容不公开。
            - label: 高
              tone: negative
              detail: 在向投资者提供独立完工成本报告之前，剩余风险仍然很高。
        - label: 技术验证（800 MW 电解槽 + 100% H2-DRI）
          values:
            - label: 中
              tone: warning
              detail: 该规模没有先例；HYBRIT 等可比项目已出现延期。
            - label: 极高
              tone: negative
              detail: 技术失败会推迟投产、触发契约违约，并削弱绿色资质。
            - label: 低
              tone: negative
              detail: 不存在商业规模参考工厂；缓释依赖 MIDREX 顾问支持和分阶段爬坡。
            - label: 高
              tone: negative
              detail: 剩余风险高，因为缓释仍是计划，不是已验证结果。
        - label: CBAM / ETS 政策削弱
          values:
            - label: 中
              tone: warning
              detail: CBAM 自 2026 年 1 月起生效，但在 ETS 复审周期中可能被政治性修订。
            - label: 高
              tone: negative
              detail: 若免费配额退出延后 3 年，绿色溢价回报会下降，Stegra 的 IRR 会被显著压缩。
            - label: 中
              tone: warning
              detail: CBAM 已成为法律；修订需要 EU 共同决策，程序上会拖慢。
            - label: 中高
              tone: warning
              detail: 剩余风险为中高，因为已生效法律比单纯政策意图更持久。
        - label: 铁矿球团供应集中（LKAB）
          values:
            - label: 中
              tone: warning
              detail: LKAB 是可靠供应商，但无法为 Stegra 的 DR 级球团量提供冗余。
            - label: 极高
              tone: negative
              detail: 供应中断会在数日内让 DRI 生产停摆，欧洲没有替代来源。
            - label: 低至中
              tone: warning
              detail: 长期 LKAB 供应协议存在，但条款和不可抗力安排不公开。
            - label: 高
              tone: negative
              detail: 以 5 Mt/年吞吐量计算，短期内欧洲没有可行的 DR 级球团替代方案。
        - label: 收入前现金消耗与契约压力
          values:
            - label: 中高
              tone: warning
              detail: 当前基线之外任何进度滑坡，都可能在没有进一步股权注入时触发契约违约。
            - label: 极高
              tone: negative
              detail: 契约违约或放款冻结会迫使公司以困境条件紧急再融资。
            - label: 低
              tone: negative
              detail: 契约条款和放款时间表不公开；没有可用的公开监测机制。
            - label: 高
              tone: negative
              detail: 剩余风险高，因为关键缓释变量在公开数据中完全不透明。
    approximationNotes: 有序概率和影响评级来自公开来源、行业基准和分析师情景分析；并未用内部模型或私有项目数据校准。缓释成熟度评级只反映公开可得证据。
    claimRefs:
      - CR003
      - CR008
      - CR014
      - CR015
      - CR016
      - CR018
      - CR025
      - CR033
      - CR039
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Stegra 的上游建设、技术和市场风险都会汇入投产延迟这一主要传导通道，随后经由收入不达预期和债务契约压力传导到股权侵蚀——也就是说，在股权层面，风险桶之间的分散度有限。
    data:
      nodes:
        - id: cost-overrun
          label: 建设成本超支
          detail: 2026 年 4 月 €1.4B 融资是主要公开信号；进一步资本开支增加可能引发契约违约。
          tone: negative
        - id: tech-failure
          label: 技术 / H2-DRI 验证失败
          detail: 100% H2-DRI 和 800 MW 电解在 5 Mt/年规模上未经验证；技术失败会推迟投产。
          tone: negative
        - id: cbam-delay
          label: CBAM / ETS 政策削弱
          detail: 任何免费配额延长或 CBAM 覆盖范围缩小，都会压缩绿色钢铁溢价。
          tone: warning
        - id: supply-shock
          label: 球团 / 供应链中断
          detail: LKAB 单一供应商集中；一旦中断，DRI 原料会停供，欧洲没有备用来源。
          tone: warning
        - id: commissioning-delay
          label: 投产与产量爬坡延迟
          detail: 建设、技术和供应风险的下游汇合点；延迟会触发里程碑推迟。
          tone: negative
        - id: revenue-miss
          label: 收入与绿色溢价不达预期
          detail: 生产启动延迟叠加绿色溢价定价偏弱，会让收入低于预估模型。
          tone: negative
        - id: debt-stress
          label: 债务契约压力
          detail: 成本超支、投产延迟和收入不达预期合在一起，会侵蚀 EIB/EKN 契约下的缓冲空间。
          tone: negative
        - id: equity-erosion
          label: 股权价值侵蚀
          detail: 现金消耗期延长叠加收入可见度下降，会压缩剩余股权价值。
          tone: negative
      edges:
        - from: cost-overrun
          to: commissioning-delay
        - from: cost-overrun
          to: debt-stress
        - from: tech-failure
          to: commissioning-delay
        - from: tech-failure
          to: revenue-miss
        - from: cbam-delay
          to: revenue-miss
        - from: supply-shock
          to: commissioning-delay
        - from: supply-shock
          to: revenue-miss
        - from: commissioning-delay
          to: debt-stress
        - from: commissioning-delay
          to: revenue-miss
        - from: revenue-miss
          to: debt-stress
        - from: revenue-miss
          to: equity-erosion
        - from: debt-stress
          to: equity-erosion
    approximationNotes: 传导图是定性图，只展示因果方向；不编码合成概率权重或相关性假设。边权重仅为展示而等同。
    claimRefs:
      - CR003
      - CR005
      - CR006
      - CR014
      - CR018
      - CR025
      - CR027
      - CR039
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: >-
      Stegra 的运营核心依赖五个关键外部节点——SMS Group、LKAB、Lule River 水电、EIB/EKN 融资和电解槽 OEM
      供应商——每个节点的可替代性都很低；任何节点失效，都会直接传导到投产时间表和契约合规。
    data:
      nodes:
        - id: sms-group
          label: SMS Group（EPC 承包商）
          detail: 负责 Boden 绿地项目六个一体化工业流程的主要 EPC 职责。
          tone: warning
        - id: lkab
          label: LKAB / Vale（DR 级球团）
          detail: DR 级铁矿球团（≥66% Fe），LKAB 是主导供应商，Vale 是有限备用。
          tone: negative
        - id: hydropower
          label: Lule River / Vattenfall 水电
          detail: 800 MW 连续可再生电力基荷来自 Norrbotten 水电电网。
          tone: warning
        - id: eib-ekn
          label: EIB / EKN 融资栈
          detail: EIB 长期贷款叠加 EKN 瑞典出口信贷担保，构成优先债骨架。
          tone: warning
        - id: electrolyzer-oem
          label: 电解槽 OEM 供应商
          detail: PEM 和碱性电解槽设备供应商；交付周期长，800 MW 规模没有备用。
          tone: negative
        - id: rfnbo-regulator
          label: EU RFNBO / CBAM 监管方
          detail: EU Commission 认证和 CBAM 执法机构决定绿色资质是否被认可。
          tone: warning
        - id: stegra-core
          label: Stegra 运营核心
          detail: Boden 工厂整合电解、DRI、EAF、连铸和轧制；商业生产目标为 2026 年以后。
          tone: neutral
        - id: oem-customers
          label: OEM 客户（BMW、Scania、Mercedes、Volvo）
          detail: 持有绿色钢铁意向书的汽车和工业 OEM；代表主要收入渠道。
          tone: positive
      edges:
        - from: sms-group
          to: stegra-core
        - from: lkab
          to: stegra-core
        - from: hydropower
          to: stegra-core
        - from: eib-ekn
          to: stegra-core
        - from: electrolyzer-oem
          to: stegra-core
        - from: rfnbo-regulator
          to: stegra-core
        - from: stegra-core
          to: oem-customers
        - from: oem-customers
          to: stegra-core
    approximationNotes: 依赖关系图是方向性、定性的。oem-customers 到 stegra-core 的边代表收入和现金流反馈依赖（不是供应关系）。相对节点关键性未编码到边宽。
    claimRefs:
      - CR002
      - CR009
      - CR010
      - CR016
      - CR017
      - CR024
      - CR042
      - CR045
  - id: FR004
    title: 风险影响情景——估算绿色钢铁利润率压缩
    type: bar
    layout: wide
    summary: 情景分析显示，绿色钢铁利润率对建设延期、绿色 H2 成本停滞和 CBAM 削弱的组合高度敏感；组合压力情景会产生深度负利润率，威胁项目可行性。
    data:
      items:
        - label: 基准情景（按期推进，CBAM 维持，H2 到 2030 年降至 $2/kg）
          value: 85
          detail: 绿色钢铁利润率约 €85/t；对应健康的项目经济性和契约合规。
          tone: positive
        - label: 仅建设延期 18 个月
          value: 52
          detail: 延期增加现金消耗并推迟收入；利润率被压缩，但项目仍可行。
          tone: warning
        - label: H2 成本到 2030 年仍停在 $4/kg
          value: 18
          detail: 绿色 H2 成本偏高会显著侵蚀利润率；在当前绿色溢价水平下，项目接近临界。
          tone: warning
        - label: CBAM 退出延后 3 年
          value: 35
          detail: 碳成本差收窄会压低溢价；单独看，利润率下降但不至于推翻投资逻辑。
          tone: warning
        - label: 资本开支较 2026 年 4 月基线上浮 +30%
          value: 28
          detail: 更高债务服务会压缩股权回报；利润率仍可见，但投资者 IRR 大幅下降。
          tone: warning
        - label: 组合压力（延期 + H2 停滞 + CBAM 削弱）
          value: -38
          detail: 该情景产生深度负利润率；项目需要重组或追加股权注入。
          tone: negative
    approximationNotes: >-
      利润率估算是根据 BNEF 和 IEA 绿色钢铁成本曲线分析，以及 BCG 绿色钢铁经济性框架推导的示意性情景。并非来自 Stegra
      内部模型或私有项目数据。数值代表每组情景假设下每吨绿色钢铁的估算净利润率；其他变量均按基准情景保持不变。
    claimRefs:
      - CR008
      - CR018
      - CR022
      - CR023
      - CR025
      - CR027
      - CR028
      - CR030
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 「跟踪」建议来自强机构背书与偏紧的收入前估值之间的交集；投产执行是基准情景和熊市情景之间的主要摇摆因素。
    data:
      nodes:
        - id: capital
          label: 已锁定 €9B+ 资本
          detail: 2024 年 1 月 €6.5B 交割，加上 2026 年 4 月 €1.4B 追加；EIB、EKN、EU Innovation Fund、20 家银行银团
          tone: positive
        - id: customers
          label: 具名 OEM 承购
          detail: BMW、Mercedes-Benz、Scania、Volvo、IKEA、Microsoft——意向书；公开层面未确认具有约束力的条款
          tone: positive
        - id: regulation
          label: EU CBAM 和 ETS 托底
          detail: CBAM 自 2026 年提供保护；ETS 免费配额退出为化石钢铁创造长期成本惩罚
          tone: positive
        - id: overrun
          label: 2026 年 4 月超支信号
          detail: 首次投产前追加 €1.4B，意味着原 €4–5B 预算已被突破
          tone: warning
        - id: northvolt
          label: Northvolt 警示性参照
          detail: 同由 Vargas 支持、处于相同阶段的瑞典清洁技术公司，估值峰值达 $12B 后破产；可直接对照
          tone: warning
        - id: valuation
          label: 隐含 €5–6B 投后估值
          detail: EV/Mt-capacity 约 $1,100/t，与 Nucor/SSAB 相当——后者是已有完整生产记录的盈利上市同业
          tone: warning
        - id: decision
          label: 跟踪建议
          detail: 保持接触；定义终止触发条件；任何新资本承诺前必须要求私有数据室
          tone: neutral
      edges:
        - from: capital
          to: decision
        - from: customers
          to: decision
        - from: regulation
          to: decision
        - from: overrun
          to: decision
        - from: northvolt
          to: decision
        - from: valuation
          to: decision
    approximationNotes: 流程图是定性的决策逻辑摘要；不代表因素的量化权重。节点色调反映方向性证据，不是二元通过 / 失败门槛。
    claimRefs:
      - CV001
      - CV003
      - CV012
      - CV014
      - CV025
      - CV031
      - CV032
      - CV033
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: 绿色溢价是最主要的估值驱动；€100/t 的变化对隐含 EV 的影响超过任何单一输入。WACC 和资本开支 超支居次，但会叠加放大。
    data:
      items:
        - label: 绿色溢价 +€100/t（相对基准 €250/t）
          value: 1.5
          detail: 按 6–7x EBITDA 倍数计算，EV 约上升 €1.5B；牛市情景要求溢价达到 €400/t
          tone: positive
        - label: 绿色溢价 −€100/t（相对基准 €250/t）
          value: -1.5
          detail: EV 约下降 €1.5B；熊市情景假设溢价侵蚀至 €100/t
          tone: negative
        - label: 电价 +€10/MWh（相对基准 €35/MWh）
          value: -0.7
          detail: 绿色 H2 成本每吨钢上升 $50–70；EBITDA 压缩约 €250–350M
          tone: negative
        - label: 资本开支超支 +€1B（相对基准 €5.5B）
          value: -0.6
          detail: 股权 IRR 降低约 1.5–2 个百分点；隐含股权价值被压缩
          tone: negative
        - label: WACC +200bps（相对基准 10%）
          value: -0.8
          detail: 更高贴现率会在基准情景现金流曲线上压缩 DCF NPV 约 €0.8B
          tone: negative
        - label: CBAM 全额按 €100/t CO2 当量
          value: 0.5
          detail: 为抵御进口竞争提供结构性保护；基准情景下估算 EV 上行 €0.5B
          tone: positive
    approximationNotes: EV 敏感性来自分析师按基准情景假设建模的现金流；不是管理层指引，也不是工程师认证估算。单变量敏感性假设其他输入不变，因此会低估压力情景中的叠加风险。
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV021
      - CV022
      - CV027
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: DCF、EV/EBITDA 可比公司和 EV/Mt-capacity 可比公司共同指向 €5–6B 的基准情景 EV；熊市情景意味着重大减值，牛市情景则产生高于当前隐含入场价的股权价值。
    data:
      items:
        - label: DCF（WACC 8–12% 区间）
          low: 3
          mid: 5
          high: 7
          displayValue: €3–7B
          detail: 8–12% WACC、2.5% 终值增长下的 NPV；基准情景中点约 €5B
          tone: neutral
        - label: EV / Mt-capacity 可比公司（SSAB–Nucor 区间）
          low: 4
          mid: 5.5
          high: 6.5
          displayValue: €4–6.5B
          detail: 按 $1,150–1,200/t 应用于 5 Mt 产能；低端采用类似 ArcelorMittal 的 $315/t
          tone: neutral
        - label: EV / EBITDA 可比公司（基准情景 EBITDA 的 5–9x 区间）
          low: 4
          mid: 6
          high: 8
          displayValue: €4–8B
          detail: 基准 EBITDA 为 €700M–€1B，采用同业 5–9x 倍数区间
          tone: neutral
        - label: 三角验证基准情景
          low: 4
          mid: 5.5
          high: 7
          displayValue: €4–7B (base €5–6B)
          detail: DCF 与可比公司的加权综合；与 2024 年 1 月隐含投后估值一致；牛市情景可延伸至 €10B
          tone: neutral
    approximationNotes: 所有区间都是基于公开可比数据和已披露项目参数的分析师情景输出，不是管理层指引。区间未充分反映 Northvolt 式减值事件的尾部风险；熊市情景下，股权价值可能归零。
    claimRefs:
      - CV018
      - CV028
      - CV029
      - CV030
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: Stegra 在市场逻辑和资本获取上得分很强，但经济可见度和入场价格纪律明显偏弱；综合画像支持跟踪，而非买入。
    data:
      items:
        - label: 市场逻辑强度
          score: 8
          detail: IEA/BNEF/EUROFER 验证绿色钢铁需求；EU 政策托底具有结构性且已确认
          tone: positive
        - label: 资本充足度
          score: 7
          detail: 已从 20+ 家贷款方锁定 €9B+；EIB、EKN 和 EU Innovation Fund 参与验证项目可融资性
          tone: positive
        - label: 客户验证
          score: 6
          detail: BMW、Mercedes、Scania、Volvo、IKEA 已具名；意向书已确认，约束性合同条款未公开
          tone: positive
        - label: 技术去风险
          score: 6
          detail: MIDREX DRI + Tenova EAF 是成熟的单体组件；5 Mt 规模的首套集成仍是剩余风险
          tone: positive
        - label: 经济可见度
          score: 3
          detail: 没有经审计财务；未披露 IRR；2026 年 4 月追加融资确认预算超支；H2 成本高于目标
          tone: negative
        - label: 估值入场纪律
          score: 3
          detail: 隐含 EV/Mt 与盈利上市同业相当；对于收入前、投产阶段项目而言偏紧
          tone: negative
    approximationNotes: KPI 得分是分析师基于截至 2026 年 5 月可得公开证据，在 1–10 分尺度上的判断。并非审计师认证或管理层验证。分数差距反映证据限制，不代表绝对公司质量评估。
    claimRefs:
      - CV001
      - CV004
      - CV005
      - CV006
      - CV012
      - CV031
      - CV032
