  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值概览：隐含 €5–6B，偏高但相对上市可比公司并非无法辩护
        blocks:
          - type: paragraph
            body: >-
              Stegra 已拼出欧洲清洁技术史上规模最大的项目融资包之一。2024 年 1 月交割时，承诺资本合计 €6.5B：约 €2.1B 股权、约 €4.2B 高级项目债务，后者来自约 20 家商业银行组成的银团，并有
              €250M EIB 优惠贷款和 EKN 额外出口信贷担保支持。2026 年 4 月又敲定 €1.4B，已披露资本总额升至逾 €9B。媒体对 2024 年 1 月股权部分的报道推算，投后股权估值约
              €5–6B，按当时汇率约合 $5.5B。Stegra 未正式发布经确认的投后估值，因此上述数字属于推算，不是公司披露估值。


              按上述隐含股权价值，Stegra 的企业价值 / 已装产能约为每吨一期铭牌产量 $1,100——接近已盈利的美国 EAF 龙头 Nucor（~$1,150/t）和瑞典无化石钢先行者
              SSAB（~$1,200/t），但几乎是 ArcelorMittal 隐含产能倍数（70 Mt、约 $22B 市值对应 ~$315/t）的 4 倍。相对 ArcelorMittal 的估值溢价说明，市场给
              Stegra 定价时看的是认证绿色钢先发者，而不是大宗钢企。要把估值溢价兑现，Stegra 必须按期投产，守住绿色钢价格溢价，并把氢气投入成本压在内部经济模型假设的轨迹上。


              投资结论是观察，不是买入。机构银团质量、与 BMW、Mercedes-Benz、Scania、Volvo、IKEA 等具名 OEM 客户的关系，以及 CBAM 和 ETS 提供的 EU
              监管托底，都是实打实的正面信号。但截至报告日，项目仍处于收入前阶段；公开渠道没有经审计财务报表；2026 年 4
              月追加融资是公开记录中最清晰的成本超支信号。信心为中，风险评级为高。以同等投产阶段的传统钢企可比公司衡量，估值立场偏高。
