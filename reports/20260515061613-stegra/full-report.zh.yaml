  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 资本结构与融资历史：€9B 项目融资里程碑
        blocks:
          - type: paragraph
            body: >-
              Stegra（前身为 H2 Green Steel）已搭建欧洲清洁技术史上最大规模之一的项目融资组合。公司于 2024 年 1 月完成 €6.5 billion 融资，其中约 €2.1 billion
              为股权融资，由 Altor 和 GIC 领投；约 €4.2 billion 为项目债务，来自约 20 家商业银行组成的银团，ING、BNP Paribas 和 SEB 牵头。European Investment
              Bank 在债务部分贡献约 €250 million，瑞典出口信贷机构 EKN 还提供额外出口信贷担保，凸显国家支持项目对欧洲工业脱碳的战略重要性。瑞典出口信贷银行 SEK 也与 EKN 共同融资。


              2023 年以前的股权轮次——由 Vargas、Altor 和 AMF 领投，IMAS、Hy24、Mercedes-Benz Group 和 Scania 参与的 Series A 和 Series B——融资约
              €1 billion，建立了锚定投资者基础，并在最终投资决定前验证技术和包销逻辑。2024 年 1 月加入的具名股权投资者包括 Marcegaglia、Schaeffler、Hitachi
              Energy、Kingspan、Andra AP-fonden、Just Climate、Felix Capital，以及个人投资者 Cristina Stenbeck 和 Daniel Ek。


              2026 年 4 月，Stegra 又达成 €1.4 billion 融资，用于覆盖建设成本超支并加速向商业生产爬坡。这笔追加融资释放出一个重要信号：原先对 €4–5 billion Phase 1
              工厂的成本估计需要上修，这一模式在其他大型绿地清洁技术制造项目中也很突出。EU Innovation Fund 另行授予约 €250 million
              非稀释补助，降低全口径资本负担，也反映项目与欧洲工业脱碳政策一致。所有已披露轮次合计资本超过 €9 billion。资本结构和所有已披露轮次见 TI004。
