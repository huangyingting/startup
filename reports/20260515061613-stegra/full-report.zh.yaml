          - type: callout
            title: 绿色钢溢价能撑多久，是回报模型中最关键的单一不确定性
            body: >-
              Stegra 的股权回报模型对绿色钢价格溢价最敏感，敏感度超过资本开支超支和氢气成本路径。溢价若从基准情景 €250/t 跌到 €100/t，满产后年度 EBITDA 约减少
              €750M——相当于抹掉大部分预期现金流。监管并不保证绿色钢溢价；公开披露的承购协议也尚未用具法律约束力的最低价格承诺支撑溢价；到 2030 年前，HYBRIT（SSAB/LKAB）、thyssenkrupp
              Steel、ArcelorMittal DRI 项目以及离岸绿色钢新进入者都会增加认证绿色产能，溢价可能被侵蚀。Seeking Alpha 和 S&P Global Commodity Insights
              分析师指出，一旦供给扩张快过有约束力的需求承诺吸收速度，绿色钢溢价将面临结构性压缩风险。投资者应把绿色溢价视为宽区间情景变量，而不是固定收入假设。
