      - number: '4.3'
        title: 收入模式与包销：长期合同支撑 $5B 收入潜力
        blocks:
          - type: paragraph
            body: >-
              Stegra 的收入模型靠与工业买家的长期供货合同支撑，这些买家愿意为经过认证的无化石钢支付绿色溢价。已披露的包销伙伴包括 BMW、Mercedes-Benz、Scania、Volvo Group、IKEA 和
              Microsoft，覆盖汽车 OEM、重型车辆制造商、全球零售商和科技公司。这些伙伴都已公开承诺削减 Scope 3 排放，而削减目标要求它们推动钢材供应链脱碳，因此给 Stegra
              产品带来结构性需求拉动，也让包销关系在商业和声誉层面对双方都更耐久。


              绿色钢溢价估计比传统热轧卷现货价格每吨高 $200–400，后者约为 $700–800/t，对应混合实现价格约 $1,000–1,100/t。若年产能达到 5 Mt，估计年收入为 $5–5.5
              billion。合同期限通常为 5–7 年，提供前瞻收入可见性，也支撑项目融资贷款人对偿债覆盖率的信心。EU CBAM 监管从 2026
              年起逐步对进口钢材引入碳定价，进一步强化欧洲低碳生产的结构性竞争地位，并支撑溢价的耐久性。


              收入质量关键取决于每个客户的实际包销量，但这些数据未公开披露，形成客户集中度尽调缺口。包销基础主要来自汽车 OEM，使 Stegra 暴露于周期性需求风险。收入来源和定价细节见 TI001 和 TI002。
