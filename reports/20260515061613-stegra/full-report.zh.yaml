      - number: '1.4'
        title: 里程碑与建设进展
        blocks:
          - type: paragraph
            body: >
              Stegra 从创立走到工厂实际建设，融资和建设爬坡速度在欧洲工业史上都属最快一档。公司于 2021 年注册成立，三年内即锁定 €6.5 billion 承诺融资，并在 Boden 设施破土动工。

              瑞典北部是有意选择的建厂地点：Boden 地区可接入瑞典庞大的水电电网，靠近 LKAB 在 Kiruna 和 Gällivare 矿山生产的高品位铁矿球团，地方政府支持度高（Boden municipality
              是值得注意的利益相关方），寒冷气候也有利于电解槽冷却。这些场址因素直接回应了氢 DRI 工厂的关键技术和成本风险。

              实体建设在 2025 年和 2026 年加速推进。2026 年 3 月，Boden 场址的 DRI 塔高度超过 100 meters，这一结构性里程碑标志着工厂从土建转入核心工艺设备安装。2026 年 4
              月，最后一个电解槽模块完成安装，电解槽组装阶段在调试前收尾。这些里程碑与 2026–2027 年首批钢材投产目标一致。

              监管和政策环境也向有利方向演进。欧盟 Carbon Border Adjustment Mechanism 于 2023 年进入过渡阶段，并计划在 2026 年全面实施，直接增加传统钢铁进口成本，也为
              Stegra 这样的绿色钢铁生产商创造结构性顺风。EU ETS 碳价走势进一步支撑脱碳生产的经济性。EU Innovation Fund 补助和 EIB
              贷款代表公共金融系统正在积极支持重工业能源转型，Stegra 正是这一政策一致性的受益者。

              公司已经经历首创工业项目固有的复杂度：多年建设周期、专用电解槽和 DRI
              设备供应链管理，以及在瑞典北部新建工业场址招聘的挑战。反向尽调应重点关注建设是否按计划推进，以及总成本相对原预算的偏离；仅凭公开来源无法完全验证这两点。
