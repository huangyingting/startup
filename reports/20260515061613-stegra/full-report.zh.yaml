      - number: '1.3'
        title: 融资与资本结构
        blocks:
          - type: paragraph
            body: >
              Stegra 已搭建欧洲工业初创公司史上最大规模之一的融资组合。截至 2024 年 1 月，公司已锁定约 €6.5 billion
              总融资，由股权和债务两部分组成。这一资本基础来自多轮股权融资，参与者覆盖多元战略与财务投资者，并叠加由公共开发机构和商业银行银团支持的大型项目融资债务包。

              债务部分规模大，结构上也关键：European Investment Bank（EIB）是贷款方，瑞典出口信贷机构 EKN
              也参与其中，旁边还有商业银行银团。这种公私合营债务结构符合大型工业基础设施常见的项目融资模型：长期承诺包销协议支撑债务契约，项目绿色属性则使其有资格获得 EU Innovation Fund 和 InvestEU
              计划下的欧盟公共金融支持。

              2026 年 4 月，Stegra 宣布新增 €1.4 billion 融资，使公开口径总额约达 €7.9 billion。公司称最新一笔资金用于支持继续建设和运营爬坡。公开材料未完整列出最新一轮股权投资者。

              公司仍为私有企业，未披露正式投后估值，因此每股价格和稀释分析依赖数据室访问。对于现阶段采用项目融资结构的工业初创公司而言，不公开估值是常态。公司总员工数也未在公开材料中精确披露；据报道，公司在 2024 年和
              2025 年持续扩大招聘，为工厂运营做准备。首批钢材投产前，收入仍处于商业化前阶段。
