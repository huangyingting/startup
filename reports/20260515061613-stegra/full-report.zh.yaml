  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局：绿色钢铁先行者、存量改造者与新技术替代路线
        blocks:
          - type: paragraph
            body: >-
              Stegra 所处竞争格局可分为三个清晰板块。第一类是绿色钢铁先行者，包括从一开始就押注绿氢 DRI 的纯玩家初创公司和合资项目——SSAB HYBRIT、Salzgitter
              SALCOS、GravitHy、Blastr Green Steel，以及 Stegra
              本身。第二类是在位者改造板块，全球最大的传统钢铁生产商——ArcelorMittal、thyssenkrupp、Nippon
              Steel、POSCO、Baowu——一边管理庞大的存量资产基础，一边在既有高炉业务上增加 DRI 或氢能力。第三类是新技术板块，Boston Metal 等公司正在推进 Molten Oxide
              Electrolysis，这一路线完全绕开氢，直接用电还原铁矿石。这三类板块重要，因为它们对应不同时间表、成本结构和客户主张。纯玩家先行者可以从零开始围绕绿氢设计，但没有在位者生产现金流，需要承担资本、规模和执行风险。在位者能用运营利润和既有客户关系为脱碳买单，但会被旧资产、改造复杂度以及跨地区资本配置竞争拖住。新技术玩家最具投机性：如果成本下降、规模化被验证，它们最终可能同时挑战
              DRI-H2 路线和 BF-BOF 基准，但到 2026 年大多数仍处于试点规模。
