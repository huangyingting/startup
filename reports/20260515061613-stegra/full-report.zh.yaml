      - number: '5.3'
        title: 电解槽系统与可再生电力集成
        blocks:
          - type: paragraph
            body: >-
              按 800 MW 已装电解产能计算，截至 2026 年中，Stegra 的电解槽场是全球已宣布的最大单一场址制氢部署之一。BNEF 和 BloombergNEF
              的氢市场分析指出，绿色氢生产运营成本高度受电力成本驱动，电力通常占平准化氢成本（LCOH）的 60–70%。这意味着 Stegra
              生产绿色钢的长期竞争力，在很大程度上取决于能否持续获得低成本、高可用率的可再生电力。公司已与 Iberdrola 和 Statkraft 这两家欧洲最大可再生能源发电商签署长期可再生
              PPA，锁定电价和电量确定性。瑞典北部水电资产接近基荷可再生发电，能补足风光间歇性，降低平衡成本。


              电解槽供应商 thyssenkrupp Nucera 是德国上市公司，已将百 MW 级碱性水电解工业化。Hitachi Energy 的职责覆盖电网连接（把场址接入 SE2
              电网区）和电解槽系统的厂区配套工程，包括电力转换、整流和安全系统。2026 年 4 月，Stegra 宣布完成最后一个电解槽模块安装，说明电解区域硬件安装已基本完成。IISD 和 Hydrogen Europe
              的研究强调，多百 MW 规模下电解槽可靠性和衰减率仍是全行业开放问题，商业参考数据有限；这是 Stegra 与所有先行 H2-DRI 项目共同面对的尽调风险。
