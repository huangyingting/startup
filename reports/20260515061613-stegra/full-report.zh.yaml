      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >
              Stegra 由 Henrik Henriksson 领导，他于 2021 年出任 CEO。Henriksson 曾任瑞典重型商用车制造商 Scania 总裁兼 CEO，带领 Scania 完成与
              Volkswagen Group 的整合，并凭借在欧洲汽车和交通行业的深厚关系建立了可信工业运营者声誉。他的加入让 Stegra 迅速获得潜在包销客户和机构投资者信任；考虑到 Scania 是 Stegra
              已具名包销伙伴之一，他在 Scania 的经历也直接相关。

              CFO 为 Thore Lindgren，他的财务管理经验适合管理 Stegra 已搭建的复杂多层融资结构。公司在 Vargas Holding 支持下共同创立；Vargas Holding 是 Cristina
              Stenbeck 的家族办公室，她也是公开可见的重要支持者，并扮演创始领投方角色。Spotify 创始人 Daniel Ek 也是公开支持公司的早期私人投资者，Felix Capital 亦在其中。

              治理通过董事会结构开展，董事会包含主要机构投资者代表。由于公司除关键个人外尚未完整公开董事会构成，董事会治理细节构成重要尽调要求。领导层结构存在集中风险：Henrik Henriksson
              的人脉和工业信誉是客户谈判与贷款人关系的核心。若 CEO 发生变动，公司需要谨慎管理，才能保住他建立的包销协议和融资关系。

              创始投资者组合覆盖欧洲工业资本、影响力基金，以及直接关心绿色钢铁供应的战略投资者。股东包括 Altor、GIC（新加坡主权财富基金）、Hy24（氢基础设施投资平台）、IMAS Foundation（IKEA
              慈善机构）和 Just Climate。战略工业投资者包括 Schaeffler、Marcegaglia、Hitachi Energy 和 Kingspan。瑞典国家相关养老基金 Andra AP-fonden
              也已投资，提供了公共机构信心信号。
