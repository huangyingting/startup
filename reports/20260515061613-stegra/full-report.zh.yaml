        - 轻微至中等 — 最小的单一细分；战略价值超过销量
    notes: 集中度百分比基于首期约 50% 产能覆盖数字和公开客户组合报道估算。实际合同量并未披露。汽车合计份额（约 60-70%）是主要集中度风险； 汽车行业同步回撤将构成项目层面的信用事件。
