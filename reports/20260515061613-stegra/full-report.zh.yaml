      - number: '2.2'
        title: 绿色钢铁需求驱动因素与买家承诺
        blocks:
          - type: paragraph
            body: >-
              绿色钢铁需求——即通过绿氢 DRI+EAF 生产、CO2 排放近零的原生钢——正由三类不同买家动机激活：监管合规义务、Scope 3 供应链脱碳要求，以及可持续资本市场中的声誉定位。汽车 OEM
              是最具体、最接近落地的买家群体；Stegra 已签约客户中有多家公司发布了由 Science-Based Targets 支撑的供应链减排量化目标。

              BMW Group 已公开承诺降低 Scope 3 供应链排放，并将 Stegra 列为战略绿色钢铁供应商。Scania 将无化石钢采购目标纳入与 Paris Agreement
              对齐的科学目标。Mercedes-Benz 发布了供应链脱碳路线图，目标是在供应商体系内降低 CO2；Volvo Group 也承诺覆盖钢材采购等 Scope 3
              排放的科学目标。这些承诺会转化为有预算的采购需求，推动买家为绿色认证钢材支付已记录的溢价。BCG 分析认为，汽车 OEM 因这些有约束力的可持续目标，是绿色钢铁最具信用、承诺最强的早期采用者。

              汽车之外，IKEA 已与 Stegra 签订绿色钢铁包销协议，用于其产品，显示需求正在扩展到消费品制造。Microsoft 承诺到 2030 年实现碳负排放，也是 Stegra
              的已具名客户之一，反映科技行业对绿色供应链资质的需求。thyssenkrupp Materials Services 同意分销 Stegra 产出，为触达直接 OEM
              合同之外的工业制造买家提供关键渠道。全球大型汽车供应商 ZF 已承诺采购 Stegra 产出，说明需求正从 Tier-1 OEM 要求向 Tier-2 供应链传导。

              市场分析师估计，到 2030 年，汽车、建筑和工业制造可推动全球绿色钢铁需求达到每年 50-100 million tonnes。IEA 净零排放情景要求原生炼钢快速脱碳，氢基 DRI 在 2030-2050
              年间扮演核心角色。ResponsibleSteel 认证正越来越多地被汽车 OEM 采购流程用作第三方验证机制，EU CSRD 也在工业供应链中制造合规驱动的认证绿色钢铁采购拉力。SSAB
              HYBRIT、ArcelorMittal Sestao 和 Hamburg 项目、Salzgitter SALCOS 等竞品动作表明，欧盟绿色钢铁细分市场正在成为结构化竞争市场，也支持了 Stegra
              的先发布局和已确认包销协议是差异化资产这一判断。
