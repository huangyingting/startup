          - type: callout
            title: 隐含 €5–6B 估值下保持观察；任何新增出资前必须拿到私有数据室访问权
            body: >-
              建议是观察，不是买入。投资逻辑自洽，也有证据支撑：Stegra 在认证绿色钢中占据先发位置，拿到顶级机构背书，并受益于 CBAM 和 ETS 带来的 EU 监管顺风。但按隐含 €5–6B
              投后估值入场，项目已按盈利上市同业的倍数定价，而不是按一家收入前、尚未首炉投产且已经在投产前追加 €1.4B 融资的绿地工厂定价。公开渠道没有经审计财务数据，实际项目 IRR
              未披露，具约束力的承购条款也未公开确认。任何投资者若按当前隐含价格承销新增资本，必须先拿到项目 IRR 模型、EIB 与商业债务设施的完整契约结构，以及至少三个具名 OEM 客户的具约束力承购协议条款。
            calloutType: recommendation
            claimRefs:
              - CV031
