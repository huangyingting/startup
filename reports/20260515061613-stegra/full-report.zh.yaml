      - number: '3.2'
        title: 直接竞争者：绿氢 DRI 先行者
        blocks:
          - type: paragraph
            body: >-
              在直接绿色钢铁先行者中，SSAB HYBRIT 是 Stegra 最可比的竞争者。HYBRIT 采用同样的 DRI-H2 路线，总部同在瑞典，可接入类似水电和 LKAB 铁矿石，并拥有最深的公开记录——包括
              2021 年向 Volvo Group 交付无化石钢。HYBRIT 目标自 2026 年起在 Oxelösund 和 Luleå 达到商业规模，直接与 Stegra 自身投产窗口重叠。Volvo Group
              同时与 HYBRIT 和 Stegra 合作，说明汽车客户通过接触多个绿色钢铁供应商来对冲，而不是把排他性长期承诺授予单一先行者。Salzgitter SALCOS 是德国最先进的国家级绿色钢铁项目，目标
              2026 年产出第一批绿色热金属。GravitHy 位于 Fos-sur-Mer、Blastr 位于 Inkoo，是两个较后期进入者，均宣布投资超过 €2B，但截至 2026 年 5
              月，公开来源未确认两者的详细融资、FEED 完成情况或建设时间表。Boston Metal 的 MOE 技术阶段更早，但 ArcelorMittal 是其战略投资者，既提供资本，也提供潜在规模化路径。Stegra
              在这一领域的关键差异点，是截至 2026 年 4 月已锁定资本（总额 €7.9B+）、覆盖汽车和工业部门的签约客户簿，以及已经在 Boden 开工建设的场址。
