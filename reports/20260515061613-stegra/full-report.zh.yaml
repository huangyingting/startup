  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 技术概览与工艺流程
        blocks:
          - type: paragraph
            body: >-
              Stegra 的产品是扁平、冷轧和镀锌钢卷，采用氢基直接还原加电弧炉（H2-DRI-EAF）路线生产。这一路线与仍占全球钢产量约 70% 的高炉—转炉（BF-BOF）工艺根本不同。端到端流程从水电解开始：来自
              Luleå 周边水电和长期 PPA 的可再生电力将水分解为氢气和氧气。氢气进入获得 Midrex 许可的竖炉，与约 100 km 外 LKAB 在 Kiruna 和 Malmberget
              矿山供应的铁矿石球团反应，将其还原为海绵铁，也就是直接还原铁（DRI）。随后，海绵铁在 SMS group 供应并集成的电弧炉中熔化和精炼；SMS group
              还交付连铸线、轧制和精整轧机。产出为扁平钢卷，包括热轧、冷轧和镀锌等级，面向汽车、家电和先进制造客户。


              整个流程避开了与炼焦煤相关的 CO2 排放。Stegra 的目标是让生命周期排放低于每吨粗钢 0.1 tCO2；相比之下，传统 BF-BOF 约为 1.8–2.0 tCO2/t，天然气基 DRI 加 EAF 约为
              1.0–1.3 tCO2/t。IEA Iron and Steel Technology Roadmap 确认，只要能源来自可再生电力，H2-DRI 就是目前可商业规模落地的最低排放路线之一。Boden
              绿地选址部分源于瑞典北部条件：Lule River 水电充沛、电网连接稳定、冷空气有利于工艺冷却，并且已有通往 Luleå 港的物流走廊。
