      - number: '8.3'
        title: DCF 与项目经济性：NPV 区间 €3–7B，对 H2 成本和绿色溢价敏感
        blocks:
          - type: paragraph
            body: >-
              Stegra 的项目经济性围绕瑞典 Boden 的 DRI/EAF 生产设施展开，设施每年可生产约 5 Mt 绿色钢。一期资本开支现在估计约 €5–6B；2026 年 4 月追加融资释放信号后，一期预算已从最初的
              €4–5B 上调。EU Innovation Fund 约 €250M 赠款和 EIB 约 €250M 优惠债务降低了实际承担风险的股权资本，但不能消除建设期烧钱敞口。


              满产爬坡后的收入模型约为每年 €4.5–6.0B，假设 5 Mt 销量和 €900–1,200/t 的混合均价。混合价格由大宗基础价格（按当前欧洲价格，热轧卷等价约
              €500–700/t）加上绿色钢溢价构成；OEM 客户为认证近零碳属性支付 €200–400/t。满产 EBITDA 利润率估计为 12–22%，对应绝对 EBITDA 约
              €700M–€1B。区间很宽，因为利润率对电价和绿色氢生产成本高度敏感。瑞典北部能接入水电和风电，构成结构性成本优势；但截至 2026 年初的 BNEF 数据显示，欧洲绿色氢成本为 €3–6/kg，是
              Stegra 内部约 $1.5/kg 目标的两倍以上。IEA Iron and Steel Technology Roadmap 和 BNEF 模型都显示，欧洲绿色氢要到 2030 年之后才会降至 €2/kg
              以下。也就是说，除非绿色溢价完全抵消高于目标的 H2 成本，早期爬坡利润率会被压缩。


              FV002 展示了敏感性分析。最关键的驱动因素有三项：绿色溢价（溢价每变动 €100/t，EBITDA 约变动 €500M；按 6–7x 倍数，EV 变动 €3–4B）；电价（电价每上升 €10/MWh，绿色
              H2 生产成本约增加每吨钢 $50–70，EBITDA 减少 €250–350M）；以及资本开支超支（资本开支每额外增加 €1B，股权 IRR 约下降 1.5–2 个百分点）。按 8–10% 的项目 WACC 和
              10–12% 的股权 WACC，DCF 得出的基准情景 NPV 约为 €4–5B；整组情景区间为 €3–7B。上述数字与 IEA 和 BNEF 对大型 DRI-EAF 绿色钢项目的建模假设大体一致。


              终值按 2.5% 永续增长率建模，与欧洲钢铁需求长期增长和 2030 年后绿色钢 TAM 扩张相符。基准情景下项目层面 IRR 约为 9–12%；基础设施级资本可以接受，但考虑建设风险，股权回报只踩在边缘。
