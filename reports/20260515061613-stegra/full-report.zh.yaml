  - id: TM001
    title: 市场定义——纳入和排除的支出
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - 相关性
    rows:
      - - EU 高端扁平钢材
        - 面向汽车、家电和工业制造的高规格扁平钢（HRC、CRC、镀锌）；绿色认证溢价
        - 低等级建筑钢筋、线材和长材；CBAM 不适用的非 EU 地区
        - 汽车 OEM（BMW、Mercedes-Benz、Scania、Volvo）、家电制造商、工业制造商
        - Stegra 5 Mt 绿色扁平钢产出的核心直接市场
      - - 欧洲绿色认证原生钢
        - DRI+EAF 或熔融氧化物电解钢，按 ResponsibleSteel 或同等标准认证为近零 CO2
        - EAF 废钢路线钢材（CO2 更低但不是原生绿色钢）；带 CCS 的 BF-BOF（尚未商业化验证）
        - 有 Scope-3 承诺的 OEM；符合 CSRD 的工业买方；绿色债券融资的建设项目
        - Stegra 可服务 SAM；SSAB HYBRIT 和 ArcelorMittal 绿色试点也瞄准同一市场
      - - 汽车供应链钢材
        - 乘用车和商用车的白车身、结构件和外覆盖件
        - 售后零部件、非结构子总成、EV 电池壳体（规模较小）
        - BMW、Mercedes-Benz、Scania、Volvo Group、ZF；通过服务中心和直接承购采购
        - 支付绿色溢价意愿最高；最早采用 ResponsibleSteel 认证供应
      - - 工业制造和分销
        - 通过服务中心（如 thyssenkrupp Materials Services）分销至制造供应链的钢材
        - 现货大宗钢材、没有绿色认证的低等级进口
        - 工业制造商、分销商、建筑公司；thyssenkrupp Materials Services 作为渠道
        - Stegra 在直接 OEM 合同之外的重要放量分销渠道
      - - 全球大宗钢材（范围外）
        - 中国、印度和俄罗斯的大规模 BF-BOF 大宗生产
        - 不适用于 Stegra——大宗定价与绿色溢价经济性不兼容
        - 价格驱动的大宗买方；新兴市场建筑和基础设施开发商
        - 范围外；界定 TAM 上限，但不是 Stegra 的竞争场域或买方基础
    notes: Stegra 的可服务市场是 EU 绿色和高端扁平钢材细分，而不是全球大宗钢材。边界逻辑对估值很关键：绿色溢价比基准 HRC 高 €100-300/tonne，其竞争动态与大宗 BF-BOF 产出根本不同。
    claimRefs:
