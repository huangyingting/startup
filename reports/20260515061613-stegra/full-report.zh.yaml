      - number: '6.3'
        title: 工业与商业客户——IKEA、Microsoft、Kingspan、Marcegaglia、thyssenkrupp Materials Services
        blocks:
          - type: paragraph
            body: >-
              汽车之外，Stegra 签下了一组多元化的工业和商业客户，既共同降低集中度风险，也打开更大的新增可服务市场。IKEA 通过 Inter IKEA Group 和 IMAS Foundation 代表签约，并在
              2023 年入股；协议目标是把绿色钢用于家具框架、家电和通过 IKEA 全球门店网络销售的相关产品。IKEA
              对供应链有明确的科学减碳目标，也是全球最大钢材消费家具集团之一，具备有意义的放量潜力。爱尔兰建筑产品集团 Kingspan 也在 2023
              年同时成为股权投资者和包销伙伴；它计划把绿色钢卷用于保温板和建筑材料，而建筑师和开发商对隐含碳规格的压力正在上升。意大利大型钢材加工商和服务中心 Marcegaglia 同样入股，并约定将 Stegra
              的绿色扁平产品分销和加工成成品钢带，面向意大利和欧洲工业买家。


              Microsoft 于 2023 年宣布的协议值得注意，因为它具有跨行业逻辑：多年期绿色钢包销与通过 Microsoft Azure 的云和 AI 伙伴关系绑定在一起。Microsoft
              在数据中心基础设施中使用钢材，并在 2030 年碳负排放承诺下承担激进的 Scope-3 目标。这笔交易把商业钢材供应与 Microsoft Azure 平台合作打包，让 Stegra
              同时获得一个钢材客户和一个技术伙伴。Microsoft 的可持续披露也从双方角度印证了这一战略逻辑。


              分销侧，thyssenkrupp Materials Services 于 2024 年签约，将通过其服务中心和材料分销网络在欧洲分销 Stegra 产出。这是一项具有战略意义的合作：thyssenkrupp
              Materials Services 是欧洲最大的钢材分销集团之一，它的参与意味着 Stegra 拥有一个渠道伙伴，能够凭已有销售关系触达无法直接签订多年期 OEM 式包销协议的 SME
              和中端制造商。股权投资者客户与独立分销中介结合，让商业订单簿既有锁定的战略性销量，也有为未承诺吨位出清市场的能力。
