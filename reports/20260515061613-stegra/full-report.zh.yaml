        - 高（€100-300/tonne）；由 Scope-3 科学碳目标和 CSRD 报告义务驱动
        - 已与 Stegra 签署承购协议；BMW、Scania、Mercedes-Benz、Volvo Group 可持续披露
      - - 汽车 Tier-1 供应商
        - 服务 OEM 供应链的汽车零部件制造商（ZF 及同类企业）
        - 动力总成、制动和底盘总成的结构及精密钢部件
        - 中高；OEM 可持续要求通过采购要求向供应链传导
        - ZF 签署 Stegra 承购；thyssenkrupp Materials Services 与 Stegra 签署分销协议
      - - 消费品和零售
        - 有可持续承诺的零售商（IKEA）和有 ESG 目标的消费品制造商
        - 家具框架、白色家电、包装五金用钢（欧盟约 5-10 Mt/year）
        - 中；品牌 ESG 承诺驱动；IKEA 已与 Stegra 签署绿色钢铁承购协议
        - IKEA 可持续发展承诺；Stegra 承购公告；EUROFER 消费品钢材数据
      - - 技术和数据基础设施
