      - number: '7.5'
        title: 展示材料
        blocks:
          - type: callout
            title: Northvolt 倒下，是 Stegra 投资者最直接的警示模板
            body: >-
              Northvolt 是同样由 Vargas AB 控股公司支持的瑞典北部电池超级工厂，因未能扩大生产、积累成本超支并遭遇质量问题，于 2024 年 11 月申请破产。Stegra 不是
              Northvolt；技术、行业和 EPC 结构都有实质差异。但在 Vargas
              支持下推进首创型瑞典清洁技术大型项目，并在商业生产得到验证前大规模筹资，这一模式如今已有失败先例。投资者应要求具体且可证明的证据，确认 Stegra 的成本控制机制、调试排序和治理监督，与 Northvolt
              在同等项目阶段的表现存在质的差异。
            calloutType: risk
            claimRefs:
              - CR005
              - CR006
              - CR007
          - type: callout
            title: 2026 年 4 月 €1.4B 追加融资，是记录中最清晰的公开成本超支信号
            body: >-
              首次调试前又筹集 €1.4 billion，且没有相应生产爬坡公告，这是预算超支压力的主要公开指标。Stegra 原始 Phase 1 预算约为 €4–5
              billion；如此规模的增量融资意味着总承诺资本现已超过 €5 billion，并可能接近 €6
              billion。这在首创型大型项目历史上并不罕见，但确实意味着，之后每一次融资事件和调试里程碑，都必须放在项目已经高于初始预算的背景下解读；其私有债务契约缓冲无法由外部验证。
            calloutType: risk
            claimRefs:
              - CR003
              - CR038
              - CR039
          - type: callout
            title: 绿色 H2 成本差距是最大单一技术经济风险，不能只靠建设执行化解
            body: >-
              BNEF 和 IEA 截至 2026 年初的数据表明，欧洲绿色氢为 $3–6/kg，是约 $1.5/kg 成本目标的两倍以上；只有达到这一目标，Stegra 钢材才有望在没有碳政策支持下具备成本竞争力。即便
              Stegra 按期、按预算投产，项目经济性仍取决于电解槽成本继续下降、瑞典北部稳定便宜的可再生电力，以及 CBAM 持续执行来弥合剩余差距。这三个变量很大程度上不受 Stegra 管理层控制。投资者不应把 EIB
