        - 数据中心结构钢；采购中嵌入供应商可持续要求
        - 中；直接采购钢材较少，但为行业立下绿色供应链标准
        - Microsoft 2030 年实现碳负排放承诺；Stegra 客户名单；Microsoft 可持续发展报告
      - - 工业分销渠道
        - 钢材服务中心和分销商（thyssenkrupp Materials Services 是 Stegra 主要渠道）
        - 借助服务中心网络，将工业钢材分销覆盖多个制造业领域
        - 随终端客户而变；对已承诺的 OEM 客户，销量可消化绿色溢价
        - thyssenkrupp Materials Services 与 Stegra 的分销协议；服务中心渠道模式
      - - 建筑（未来可触达细分市场）
        - 可持续建筑开发商和绿色债券融资的公共基础设施项目
