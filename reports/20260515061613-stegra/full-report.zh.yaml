      - number: '5.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 绿地设计自由度带来独特集成优势
            body: >-
              Stegra 没有旧厂需要改造。Boden 设施从制氢到成品钢卷，被设计成一个单一集成系统，因此 SMS group 的数字工艺控制、预测性维护和 MES
              可以从第一天就嵌入。这消除了既有钢厂做棕地脱碳时面临的改造成本和运营变通；如果爬坡按计划推进，Stegra 将获得结构性的运营成本和数据质量优势。
            calloutType: strength
            claimRefs:
              - CE003
              - CE018
              - CE019
              - CE020
          - type: callout
            title: Boden 场址叠加三项独立成本与碳优势
            body: >-
              Boden 位置给 Stegra 带来三项彼此强化、很难在其他地方复制的优势：SE2 电网拥有欧洲最低的碳排放因子；Lule River 水电提供接近基荷的可再生发电，相比风电主导电网降低平衡成本；LKAB 的
              Kiruna 和 Malmberget 球团业务距离约 100 km，压低球团供应物流成本。寒冷环境温度也降低电解槽区域电气基础设施的冷却需求。
            calloutType: strength
            claimRefs:
              - CE009
              - CE010
              - CE008
              - CE021
          - type: callout
            title: 绿色氢成本竞争力是核心财务风险
            body: >-
              电力成本约占绿色氢平准化成本的 60–70%，因此是 Stegra 最大单一运营成本变量。BNEF 和 IISD 分析指出，到 2026 年，多数市场的绿色 H2
              生产成本仍高于化石燃料替代品，成本收敛取决于电解槽价格继续下降以及低成本可再生电力接入。Stegra 的长期 PPA
              价格属于商业机密，因此外部无法独立验证工厂能否在所需经济性内运营，并以有竞争力或买家可接受的溢价交付绿色钢。
            calloutType: risk
            claimRefs:
              - CE035
              - CE004
              - CE021
          - type: callout
            title: 800 MW 规模电解槽可靠性尚未得到商业验证
            body: >-
              截至 2026 年中，还没有单一场址 800 MW 碱性电解槽装置以连续商业吞吐运行。Hydrogen Europe 和 IISD 研究显示，多百 MW
              规模下电解槽堆栈衰减率、可用率和维护间隔仍在全行业验证中。电解槽区域若出现意外可用率缺口，将直接传导到 DRI 生产，最终影响炼钢吞吐，威胁 2026–2027 年首批钢材时间线。
            calloutType: risk
            claimRefs:
              - CE004
              - CE036
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 投产前包销模型——超过 12 个具名客户签署长期协议
        blocks:
          - type: paragraph
            body: >-
              Stegra 尚未产生收入：Boden 工厂目标在 2026-2027 年首次商业交付，截至 2026 年中，公开记录中没有现货或重复销售。公司的需求论证因此完全建立在长期包销协议组合上，而这套组合自 2021
              年以来稳步搭建。公开记录识别出超过 12 个具名包销对手方，覆盖汽车 OEM、一级汽车供应商、经销商、工业制造商、建筑材料生产商和科技公司。协议据称期限为 5-to-7 年，但确切数量和价格因 NDA
              未公开披露。


              Stegra 的打法与传统钢材销售截然不同。它不是把现货吨位卖进大宗商品市场，而是在 Boden
              一吨绿色钢都还没出厂前，就把锚定客户锁进多年期远期合同。这一方面是结构性必要条件——贷款人和股权赞助方需要承诺收入来托底项目融资结构；另一方面也是战略信号，说明初级钢材买家愿意提前多年支付绿色溢价。IEA
              Iron and Steel Technology Roadmap 将长期包销协议列为这一市场阶段绿色钢项目的核心商业抓手；截至 2026 年，Stegra 的订单簿是全球氢基 DRI
              生产商中规模最大的组合之一。


              客户组合反映钢铁供应链结构：汽车 OEM 和 Tier-1 供应商占主导（BMW、Mercedes、Scania、Volvo Group、Volvo Cars、ZF
              Friedrichshafen、Schaeffler、Porsche），工业制造商（IKEA、Kingspan、Marcegaglia）、一家科技公司（Microsoft）以及分销中介（thyssenkrupp
              Materials Services、Klockner and Co、Roba Metals、Cargill）补足订单簿。Stegra 已公开表示，计划一期产能约 50%
              由这些长期协议覆盖；在类似资本部署阶段的可比绿地项目中，这一覆盖率更高。
