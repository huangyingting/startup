      - number: '4.4'
        title: 财务风险与公开披露缺口：成本超支、H2 敏感性和不透明报表
        blocks:
          - type: paragraph
            body: >-
              Stegra 的财务风险是复合型的：投产前持续烧钱、建设成本承压、绿色氢成本不确定，再叠加几乎为零的公开披露。2026 年 4 月追加的 €1.4 billion
              融资，是成本超支最清晰的信号；管理层称这笔资金用于弥补超支并加速爬坡，但预算与实际支出的底层数字仍未公开，无法精确判断成本轨迹。建设期投产前烧钱估计每年达数亿欧元；若商业爬坡进一步延后，即便融资缓冲相当厚，也会在几年内被耗尽。


              Northvolt 的对照很有参考价值，也可直接套用。瑞典锂离子电池初创公司 Northvolt 曾获得超过 $15 billion 的资本承诺，但在长期制造爬坡延误和成本超支之后，于 2024 年 11
              月申请破产。Stegra 的项目融资结构比 Northvolt
              早期更偏股权的融资安排带来更多贷款人监督，但更大的教训没有变：北欧斯堪的纳维亚的绿地清洁技术工厂，在达到商业规模前可能耗尽极大的融资缓冲。任何投资者若按固定价格的完工成本假设承销，都必须把这点列为实质风险。


              公开财务披露极少。公司没有审计账目，收入、烧钱速度、现金跑道数据均未公开，隐含公司估值也不透明。€4.2 billion 项目融资债务的财务契约未披露。绿色氢成本轨迹仍是最关键的未解变量：如果欧洲绿色氢在
              2030 年前无法降至 €2/kg 以下，早期爬坡利润率会受到结构性挑战，绿色溢价也必须超过当前估计区间上沿，才能维持足够的偿债覆盖率。这些缺口汇总于 TI005。
