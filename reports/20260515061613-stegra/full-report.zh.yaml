      - number: '6.4'
        title: 商业模式与集中度风险——溢价耐久性、合同结构和 Scope-3 依赖
        blocks:
          - type: paragraph
            body: >-
              Stegra 的商业模式围绕长期双边包销合同搭建，期限通常为 5-7 年，价格中嵌入估计每吨比传统大宗扁平轧钢高 $200-400 的绿色溢价。这一溢价是 Stegra
              财务模型的核心商业假设：它必须在首次交付及之后持续成立，才能证明项目资本成本合理。交易层面的溢价尚未公开验证——没有披露任何已签价格表——其耐久性取决于几个条件同时成立：EU ETS 和 CBAM
              机制得到执行并抬高高碳进口成本；OEM 客户兑现 SBTi 和 CSRD 下的 Scope-3 承诺；以及 Stegra 订单簿滚动续约前，没有显著替代低碳钢供给出现。


              EU Carbon Border Adjustment Mechanism 于 2023 年进入过渡期，并计划从 2026
              年起征收进口税，是支撑绿色溢价最直接的监管机制：它让高碳进口钢相对于欧洲低碳生产结构性变贵。传统钢企承担的 EU ETS 成本也是并行因素。BNEF、Fastmarkets 和 Argus Media
              的第三方分析师报告，可实现溢价为 $150-400/t；在强 EU ETS 碳价和 CBAM 执行下，上沿区间可兑现。


              集中度风险很高。汽车板块估计占已订包销量的 60-70%。若部分汽车客户因 EV 需求疲软或利润率压力援引不可抗力、推迟接收交付或谈判大幅降价，Stegra
              将同时面临需求缺口和多数已签订单簿的重新谈判压力；公司没有留存率历史，也没有等同利润率的现货市场兜底。FT 和 Bloomberg 在 2024-2026 年的报道记录了欧洲汽车市场 EV 需求确实放缓，IISD
              和 Seeking Alpha 分析也将其标记为绿地绿色钢项目的实质风险。Stegra 几个最大客户同时入股，带来一定结构性锁定；但股权不等同于带有明确价格机制的可执行交付义务。
