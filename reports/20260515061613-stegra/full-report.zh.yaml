      - number: '7.2'
        title: 电解槽规模、H2-DRI 工艺风险和球团供应，是容错率最低的技术依赖
        blocks:
          - type: paragraph
            body: >-
              Stegra 计划的 800 MW 电解槽产能，截至 2026 年将大幅超过任何正在运行的工业先例，成为全球最大的单一场址氢电解装置。在这一规模下，PEM
              和碱性电解槽堆栈衰减率、计划维护停机和非计划电网中断，都可能显著降低电解槽可用率，迫使工厂减产，或购买应急化石电网电力，从而稀释绿色认证。没有任何技术供应商类别公布过 800
              MW、连续炼钢负载下的长期可靠性曲线，因为此前没有这类装置运行过。

              DRI 工艺风险同样基础。MIDREX 和 Tenova Energiron 的传统 H2-DRI 工艺使用 30–70% 氢气与天然气混合。Stegra 的目标是约 100% 氢还原，而在 5 Mt/year
              吞吐下尚未商业验证。HYBRIT（SSAB/LKAB/Vattenfall）和 GravitHy 是最接近的参照，但二者都尚未在可比产能下达到商业生产。100% H2
              工艺化学会产生温度曲线更高、金属化特性不同于天然气混合 DRI 的海绵铁；要在规模化条件下稳定管理这一过程，仍是活跃工程挑战，不是已解决的工业问题。

              铁矿石球团质量是刚性供应链约束。H2-DRI 需要直接还原级球团，铁含量至少 66%，且硅石和氧化铝脉石极少；标准高炉球团不能使用。LKAB 的 Kiruna 业务是 Stegra 最近的供应商，也是地缘资产，但
              LKAB 的 DR 级产出要在 SSAB（HYBRIT）、欧洲 EAF 生产商和全球出口市场之间共享。任何 LKAB 供应中断——劳工行动、矿山事故或 Malmbanan 矿石铁路物流故障——都会直接威胁
              Stegra 原料，欧洲没有马上可用的替代来源。

              相比 Stegra 投资逻辑所需的经济性，绿色氢生产成本仍处于结构性高位。BNEF 和 IEA 截至 2026 年初的数据表明，欧洲绿色 H2 为 $3–6/kg，远高于约 $1.5/kg
              的目标；这一目标才足以让 Stegra
              钢材在中性碳价下与传统高炉钢具备成本竞争力。要弥合差距，需要电解槽资本成本持续下降，以及稳定便宜的可再生电力；两者都带有独立执行和宏观风险。电价敏感性分析显示，瑞典电网价格上涨 10%，会在这一规模下使绿色 H2
              生产成本增加约 5–7%。
