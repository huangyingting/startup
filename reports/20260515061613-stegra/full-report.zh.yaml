  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 建设和执行风险是近期最重大的威胁
        blocks:
          - type: paragraph
            body: >-
              Stegra 的 Phase 1 Boden 项目是一个约 €5 billion 的首创型大型项目，在瑞典北极圈附近的单一绿地场址上，整合六个不同工业流程：800 MW
              氢电解、储氢、直接还原炼铁（DRI）、电弧炉（EAF）炼钢、连铸和热轧。全球没有任何可比项目达到这种组合规模，因此成本和进度基准在结构上很难建立。SMS Group 持有主要 EPC
              合同，是可信的全球钢厂建设商，但这组六流程集成范围在绿色钢领域没有先例。

              2026 年 4 月宣布的 €1.4 billion 追加融资，是最重大的公开风险信号。Stegra 原始 Phase 1 预算据报为 €4–5
              billion；在没有相应生产爬坡或调试公告的情况下，筹集如此规模的增量资金，被广泛解读为相对初始指引约 25% 预算超支的证据。这与更广泛的大型项目文献一致：BCG 和 Kearney 研究均发现，70–80%
              的资本密集型首创工业项目初始预算超支 20–40%。2026 年 4 月融资并不意味着项目正在失败——它意味着执行风险高于原预算所暗示的水平，投资者应据此做压力测试。

              Northvolt 的警示对照直接相关。Northvolt 是同样由 Vargas AB 控股公司支持的瑞典北部电池超级工厂，因未能扩大生产、出现质量问题并陷入成本超支，于 2024 年 11
              月申请破产。Stegra 不是 Northvolt：技术、行业和 EPC 结构都不同。但在 Vargas 支持下推进首创型瑞典清洁技术大型项目，其治理和执行风险模式如今已有失败先例。投资者应要求具体证据，证明
              Stegra 的成本控制、调试排序和治理结构，相比 Northvolt 在同等项目阶段表现出的机制有实质差异。

              积极面是，DRI 竖炉塔在 2026 年 3 月超过 100
              米，确认实体建设按计划推进。但达成一个施工里程碑，不等同于调试出一套完全整合的生产系统。从单流程首次出钢到六个集成单元全部达到额定产能的差距，正是多数执行风险所在；公开记录对这部分风险能见度有限。
