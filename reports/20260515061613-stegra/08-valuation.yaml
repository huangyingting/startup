  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - argument
      - direction
      - evidence for
      - what would change the view
    rows:
      - - Green hydrogen DRI eliminates coal/coke input; verified near-zero Scope 1+2 emissions
        - thesis
        - IEA Iron and Steel Technology Roadmap endorses DRI-EAF as the primary near-zero pathway; MIDREX confirms commercial DRI viability
        - H2 cost remains above break-even through 2030; margin depends entirely on premium durability
      - - €9B+ capital committed by 20+ lenders, EIB, and EU Innovation Fund grant signals institutional validation
        - thesis
        - EIB board approval confirmed; EKN and SEK export-credit guarantees disclosed; EU Innovation Fund award public
        - Capital secured before overruns were visible; April 2026 add-on signals budget breach that may require further tranches
      - - Long-term OEM offtake from BMW, Mercedes-Benz, Scania, Volvo, IKEA, Microsoft reduces demand risk
        - thesis
        - Customer relationships and intent letters confirmed via BMW Group, Volvo Group, and Mercedes-Benz public sustainability disclosures
        - Binding volumes, pricing formulae, and break penalties are not publicly confirmed; non-binding LOIs can be withdrawn if OEM budgets tighten
      - - EU CBAM creates structural import protection from 2026 and EU ETS free-allocation phase-out incentivises transition
        - thesis
        - CBAM regulation confirmed by EC; ETS reform with steel phase-out enacted; EUROFER endorses both mechanisms
        - CBAM phase-in is delayed and subject to political risk under trade-partner pressure; free-allocation pace may slow
      - - Implied EV/Mt-capacity on par with Nucor and SSAB despite pre-revenue status
        - anti-thesis
        - SSAB and Nucor are fully operational, cash-generative, and report public financial results; Stegra is pre-revenue with no audited accounts
        - Achieving same multiple requires executing commissioning, premium pricing, and H2 cost reduction simultaneously before comps re-rate downward
    notes: >-
      Arguments are intentionally price-sensitive, not company-quality scores. Each thesis item describes what the
      current implied valuation already assumes; each anti-thesis item describes what must hold for that assumption
      to be justified.
