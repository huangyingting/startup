  - id: section-2
    title: 'Comparable company analysis: EV/Mt-capacity and EV/EBITDA lenses across listed steel and cleantech'
    body: >-
      The most instructive valuation comps are listed steel companies with disclosed market capitalisations,
      operational track records, and public financial reporting. SSAB, Sweden's largest steel producer and the
      operator of the HYBRIT fossil-free steel pilot, carries a market capitalisation of approximately $8–10 billion
      and operates roughly 7.5 million tonnes of total capacity, implying an EV/Mt-capacity of approximately
      $1,200 per tonne. SSAB is the most geographically and strategically relevant listed peer: it operates in
      the same Scandinavian markets, pursues the same decarbonisation thesis, and competes for some of the same
      OEM customers. On an EV/EBITDA basis, SSAB trades at approximately 7–9x current earnings, reflecting both
      its commodity-cycle sensitivity and its green-steel optionality.


      ArcelorMittal, the world's second-largest steelmaker at approximately 70 million tonnes of annual capacity,
      trades at a market cap of approximately $22 billion. Its EV/Sales multiple is approximately 0.4x and
      EV/EBITDA is approximately 5x, implying an EV/Mt-capacity of only ~$315/t. This low capacity multiple
      reflects ArcelorMittal's diversified commodity exposure, legacy blast-furnace asset base, and absence of a
      pure-play green premium. Nucor, the leading US EAF steel producer, commands a ~$30 billion market cap and
      EV/EBITDA multiples of 6–7x—a premium to ArcelorMittal consistent with Nucor's higher-margin EAF
      configuration, faster capital allocation, and strong US demand. POSCO Holdings, Korea's flagship producer
      at ~38 Mt/year, trades at ~$25 billion, implying ~$660/t of capacity.


      The most important non-steel comparable is Northvolt AB, a Swedish battery gigafactory backed by the same
      Vargas AB holding company that led Stegra's early equity rounds. Northvolt reached a peak venture valuation
      of approximately $12 billion before filing for bankruptcy in November 2024 after failing to scale production
      volume, accumulating severe cost overruns, and suffering quality and customer-retention failures. The pattern—
      first-of-kind Swedish cleantech megaproject under Vargas sponsorship, large institutional capital base,
      remote Northern Sweden site—is structurally analogous to Stegra at the equivalent pre-ramp stage. The
      technology differs, the EPC structure differs, and Stegra's project-finance covenant discipline provides
      a different risk-management framework; but the existence of a fresh, direct, near-identical failure demands
      explicit diligence scrutiny, not casual dismissal. Seeking Alpha and other critical-stance analysts have
      highlighted this parallel as the clearest single warning sign for Stegra investors.
