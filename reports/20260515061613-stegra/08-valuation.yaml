  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: irr-audited-financials
      missingEvidence: >-
        Stegra's internal project IRR model, audited or reviewed financial statements, and
        confirmed post-money equity valuation from the January 2024 round or April 2026 add-on.
        No public filing, regulatory disclosure, or management-verified IRR figure exists.
      whyItMatters: >-
        Without the actual project IRR, investors cannot underwrite the equity return case with
        any precision. The publicly implied $5.5 billion valuation could be consistent with a
        broad range of IRR outcomes depending on cost structure, capex phasing, and offtake
        pricing, none of which are publicly verifiable.
      diligencePath: >-
        Request Stegra's full project finance model from the CFO under NDA; require independent
        engineer certification of the base-case IRR assumptions as a pre-investment condition.
        Cross-check against Kearney, BCG, and IEA green-steel project benchmarks.
      relatedQuestionRefs:
        - QV014
        - QV028

    - type: private-evidence-only
      severity: material
      topic: april-2026-equity-dilution
      missingEvidence: >-
        The equity-versus-debt composition, preference terms, dilution impact, and post-April-2026
        cap table structure following the additional €1.4 billion financing agreed in April 2026.
        The public announcement did not disclose the split between equity and debt tranches.
      whyItMatters: >-
        Without knowing whether the April 2026 add-on is equity (dilutive) or debt (covenant
        intensifying), investors cannot calculate the revised post-money valuation, effective
        IRR for existing equity holders, or the preference waterfall for any new capital.
      diligencePath: >-
        Request the April 2026 financing term sheet and updated cap table from Stegra counsel;
        require disclosure of post-close preference stack and any ratchet provisions before
        committing new capital.
      relatedQuestionRefs:
        - QV030

    - type: enumeration-incomplete
      severity: material
      topic: comparable-valuation-table
      missingEvidence: >-
        Full enumeration of private green-steel startups with disclosed financing terms (Boston Metal,
        H2forSteel, SALCOS, GravitHy) and their implied valuation multiples; and listed steel majors
        without English-language public filings or with restricted investor relations access.
      whyItMatters: >-
        The comparable set is anchored on large listed steel companies and one cleantech cautionary
        tale. Private green-steel startup valuations—where the closest apples-to-apples comparisons
        sit—are not publicly confirmed, limiting the precision of the multiples-derived fair-value
        range and potentially understating the valuation dispersion across the peer universe.
      diligencePath: >-
        Obtain private financing data from deal databases (PitchBook, Preqin, Mergermarket) and
        broker research for private green-steel rounds; supplement with IEA and BNEF project
        cost benchmarks for large-scale DRI-EAF greenfield projects globally.
      relatedQuestionRefs:
        - QV022
        - QV031
      relatedTableRefs:
        - TV004

    - type: missing-source
      severity: material
      topic: binding-offtake-pricing-terms
      missingEvidence: >-
        Legally binding offtake contract terms for Stegra's OEM customers, including committed
        volumes, pricing formulae (fixed vs. indexed), minimum-take-or-pay guarantees, green
        premium lock-in provisions, duration, and break-penalty clauses.
      whyItMatters: >-
        The green steel price premium—the most consequential single driver of Stegra's enterprise
        value—is confirmed only by non-binding intent letters in public sources. If the binding
        contracts allow customers to exit or reprice when green steel supply increases, the
        premium durability assumption underlying the base and bull case could be fundamentally
        misspecified.
      diligencePath: >-
        Require Stegra to provide redacted versions of binding offtake agreements as a
        pre-investment condition; include minimum-volume take-or-pay and pricing-indexation
        clauses as key terms for independent legal review.
      relatedQuestionRefs:
        - QV017

    - type: private-evidence-only
      severity: minor
      topic: northvolt-vargas-governance-comparison
      missingEvidence: >-
        A detailed comparison of Vargas AB's governance and oversight framework at Stegra versus
        the oversight structure that failed to prevent the production-scaling and cost-control
        failures at Northvolt. No public post-mortem or Vargas governance disclosure is available.
      whyItMatters: >-
        The Northvolt parallel is the most direct single risk flag in this diligence. Understanding
        whether Stegra's governance, commissioning oversight, and cost-control mechanisms are
        substantively different from Northvolt's at the equivalent project stage would materially
        affect the probability assigned to the bear-case scenario.
      diligencePath: >-
        Request Vargas AB's post-Northvolt board governance review; obtain Stegra's independent
        engineer reports, lender technical committee meeting minutes, and construction progress
        certifications for comparison against the project management framework that failed at
        Northvolt.
      relatedQuestionRefs:
        - QV012
        - QV017
