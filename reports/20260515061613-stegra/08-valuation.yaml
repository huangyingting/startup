        - Stegra CFO and project finance team
        - blocking — without IRR data the equity return cannot be underwritten
        - Stegra management; data-room access required
      - - Binding offtake agreement terms — committed volumes, pricing formulae, minimum-take guarantees, penalty provisions
        - Stegra commercial and legal team
        - blocking — revenue model validity depends on contractual durability not confirmable from public LOI disclosures
        - Stegra legal team; at minimum three OEM counterparties
      - - Full EIB and commercial debt covenant package — milestone definitions, disbursement triggers, waiver provisions, and current covenant headroom
        - Stegra finance and legal team
        - blocking — schedule slippage tolerance and restructuring risk cannot be assessed without covenant detail
        - EIB and Stegra legal team; independent legal review recommended
      - - Audited or reviewed financial statements — capex-to-date, cash balance, burn rate, and April 2026 round equity-vs-debt composition
        - Stegra audit firm (financial statements) and CFO (cash burn)
        - material — validates scope of overrun and current equity dilution
        - Stegra CFO and external auditor; at minimum reviewed interim accounts
      - - Full cap table — preference stack, liquidation waterfall, dilution from all financing tranches, any ratchets or anti-dilution provisions
        - Stegra counsel and CFO
        - material — determines whether the Jan 2024 implied valuation reflects actual new-money economics after April 2026 add-on dilution
        - Stegra counsel; comparison with EIB facility agreement
      - - Construction progress certification — independent engineer confirmation of physical completion percentage and revised commissioning schedule
        - Independent technical adviser (ITA) appointed by lender syndicate
        - material — provides objective verification of commissioning timeline assumptions underlying the base case
        - Lender ITA; public construction milestone announcements as proxy
