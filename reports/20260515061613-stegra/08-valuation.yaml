figures:
  - id: FV001
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The track recommendation emerges from the intersection of strong institutional validation and stretched
      pre-revenue valuation, with commissioning execution as the primary swing factor between base and bear case.
    data:
      nodes:
        - id: capital
          label: '€9B+ capital secured'
          detail: Jan 2024 €6.5B close plus Apr 2026 €1.4B add-on; EIB, EKN, EU Innovation Fund, 20-bank syndicate
          tone: positive
        - id: customers
          label: Named OEM offtake
          detail: BMW, Mercedes-Benz, Scania, Volvo, IKEA, Microsoft — intent letters; binding terms not confirmed publicly
          tone: positive
        - id: regulation
          label: EU CBAM and ETS backstop
          detail: CBAM protection from 2026; ETS free-allocation phase-out creates long-run cost penalty for fossil steel
          tone: positive
        - id: overrun
          label: Apr 2026 overrun signal
          detail: €1.4B add-on before first commissioning implies original €4–5B budget was breached
          tone: warning
        - id: northvolt
          label: Northvolt cautionary parallel
          detail: Vargas-backed Swedish cleantech at same stage peaked at $12B then went bankrupt; direct read-across
          tone: warning
        - id: valuation
          label: Implied €5–6B post-money
          detail: EV/Mt-capacity ~$1,100/t matches Nucor/SSAB — profitable listed peers with full production track records
          tone: warning
        - id: decision
          label: Track recommendation
          detail: Stay engaged; define kill triggers; require private data-room before any new capital commitment
          tone: neutral
      edges:
        - from: capital
          to: decision
        - from: customers
          to: decision
        - from: regulation
          to: decision
        - from: overrun
          to: decision
        - from: northvolt
          to: decision
        - from: valuation
          to: decision
    approximationNotes: >-
      Flow diagram is a qualitative decision-logic summary; it does not represent a quantitative weighting of
      factors. Node tones reflect directional evidence, not binary pass/fail gates.
    claimRefs:
      - CV001
      - CV003
      - CV012
      - CV014
      - CV025
      - CV031
      - CV032
      - CV033

  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: wide
    summary: >-
      Green premium is the dominant valuation driver; a €100/t change moves implied EV by more than any
      other single input. WACC and capex overrun are secondary but compounding.
    data:
      items:
        - label: 'Green premium +€100/t (vs base €250/t)'
          value: 1.5
          detail: EV uplift of approximately €1.5B at 6–7x EBITDA multiple; bull case requires premium at €400/t
          tone: positive
        - label: 'Green premium −€100/t (vs base €250/t)'
          value: -1.5
          detail: EV reduction of approximately €1.5B; bear case assumes premium erodes to €100/t
          tone: negative
        - label: 'Electricity price +€10/MWh (vs base €35/MWh)'
          value: -0.7
          detail: Raises green H2 cost by $50–70/t of steel; compresses EBITDA by ~€250–350M
          tone: negative
        - label: 'Capex overrun +€1B (vs base €5.5B)'
          value: -0.6
          detail: Reduces equity IRR by ~1.5–2 percentage points; compresses implied equity value
          tone: negative
        - label: 'WACC +200bps (vs base 10%)'
          value: -0.8
          detail: Higher discount rate compresses DCF NPV by approximately €0.8B across the base-case cash-flow profile
          tone: negative
        - label: 'Full CBAM at €100/t CO2 equivalent'
          value: 0.5
          detail: Adds structural protection against import competition; estimated €0.5B EV uplift in base case
          tone: positive
    approximationNotes: >-
      EV sensitivities are derived from analyst-modelled cash flows at base-case assumptions; they are not
      management guidance or engineer-certified estimates. Single-variable sensitivities assume all other
      inputs held constant, which understates compounding risk in stress scenarios.
    claimRefs:
      - CV017
      - CV018
      - CV019
      - CV020
      - CV021
      - CV022
      - CV027

  - id: FV003
    title: Valuation / return range
    type: range
    layout: wide
    summary: >-
      DCF, EV/EBITDA comps, and EV/Mt-capacity comps converge on a base-case EV of €5–6B; the bear case
      implies material impairment and the bull case generates equity above the current implied entry price.
    data:
      items:
        - label: DCF (WACC 8–12% range)
          low: 3
          mid: 5
          high: 7
          displayValue: '€3–7B'
          detail: NPV at 8–12% WACC with 2.5% terminal growth; base-case midpoint ~€5B
          tone: neutral
        - label: EV / Mt-capacity comps (SSAB–Nucor range)
          low: 4
          mid: 5.5
          high: 6.5
          displayValue: '€4–6.5B'
          detail: Applying $1,150–1,200/t to 5 Mt capacity; low end uses ArcelorMittal-like $315/t
          tone: neutral
        - label: EV / EBITDA comps (5–9x range on base-case EBITDA)
          low: 4
          mid: 6
          high: 8
          displayValue: '€4–8B'
          detail: At €700M–€1B base EBITDA and 5–9x peer multiple range
          tone: neutral
        - label: Triangulated base case
          low: 4
          mid: 5.5
          high: 7
          displayValue: '€4–7B (base €5–6B)'
          detail: Weighted synthesis of DCF and comps; consistent with Jan 2024 implied post-money; bull stretches to €10B
          tone: neutral
    approximationNotes: >-
      All ranges are analyst scenario outputs based on public comparable data and disclosed project parameters.
      They are not management guidance. Ranges do not reflect the full tail risk of a Northvolt-style impairment
      event that could drive equity value to zero in the bear case.
    claimRefs:
      - CV018
      - CV028
      - CV029
      - CV030

  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      Stegra scores strongly on market thesis and capital access but materially weak on economic visibility and
      entry-price discipline; the composite profile supports track, not buy.
    data:
      items:
        - label: Market thesis strength
          score: 8
          detail: IEA/BNEF/EUROFER validate green steel demand; EU policy backstop is structural and confirmed
          tone: positive
        - label: Capital adequacy
          score: 7
          detail: '€9B+ secured from 20+ lenders; EIB, EKN, and EU Innovation Fund participation validates project bankability'
          tone: positive
        - label: Customer proof
          score: 6
          detail: BMW, Mercedes, Scania, Volvo, IKEA named; intent letters confirmed, binding contract terms not public
          tone: positive
        - label: Technology de-risking
          score: 6
          detail: MIDREX DRI + Tenova EAF are mature individual components; first-of-kind integration at 5 Mt scale is the residual risk
          tone: positive
        - label: Economic visibility
          score: 3
          detail: No audited financials; no disclosed IRR; April 2026 add-on confirms budget overrun; H2 cost above target
          tone: negative
        - label: Valuation entry discipline
          score: 3
          detail: Implied EV/Mt on par with profitable listed peers; stretched for pre-revenue commissioning-stage project
          tone: negative
    approximationNotes: >-
      KPI scores are analyst judgement on a 1–10 scale using available public evidence as of May 2026.
      They are not auditor-certified or management-verified. Score gaps reflect evidence limitations,
      not absolute company-quality assessments.
    claimRefs:
