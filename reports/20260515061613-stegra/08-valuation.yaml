  - id: section-3
    title: 'DCF and project economics: €3–7B NPV range sensitive to H2 cost and green premium'
    body: >-
      Stegra's project economics are structured around a DRI/EAF production facility in Boden, Sweden capable of
      producing approximately 5 million tonnes of green steel per year. Phase 1 capex is now estimated at
      approximately €5–6 billion, revised upward from the original €4–5 billion budget following the April 2026
      additional financing signal. Grant support from the EU Innovation Fund (approximately €250 million) and
      concessional EIB debt (approximately €250 million) reduce the effective equity-capital-at-risk but do not
      eliminate construction-stage burn exposure.


      Revenue at full ramp is modelled at approximately €4.5–6.0 billion per year, based on 5 Mt sold at a blended
      average price of €900–1,200 per tonne. This blended price comprises a commodity base (hot-rolled coil
      equivalent of approximately €500–700/t at prevailing European prices) plus a green steel premium of
      €200–400 per tonne paid by OEM customers for certified near-zero-carbon attributes. EBITDA margin at full
      ramp is estimated at 12–22%, yielding absolute EBITDA of approximately €700 million–€1 billion. The margin
      range is wide because it is acutely sensitive to electricity price and green hydrogen production cost.
      Northern Sweden's access to hydropower and wind provides a structural cost advantage, but BNEF data through
      early 2026 shows European green hydrogen at €3–6/kg, more than double Stegra's internal target of
      approximately $1.5/kg. The IEA Iron and Steel Technology Roadmap and BNEF model European green hydrogen
      falling below €2/kg only after 2030, meaning early-ramp margins will be compressed unless the green premium
      fully offsets above-target H2 costs.


      Sensitivity analysis is presented in FV002. The most consequential drivers are: the green premium
      (a €100/t change in premium moves EBITDA by approximately €500 million and EV by €3–4 billion at a 6–7x
      multiple); electricity price (a €10/MWh increase raises green H2 production cost by approximately $50–70/t
      of steel, reducing EBITDA by €250–350 million); and capex overrun (each additional €1 billion of capex
      reduces equity IRR by approximately 1.5–2 percentage points). Using a project WACC of 8–10% and equity
      WACC of 10–12%, the DCF produces a base-case NPV of approximately €4–5 billion and a range of
      €3–7 billion across the scenario set. These figures are broadly consistent with the IEA and BNEF
      green-steel project modelling assumptions for large-scale DRI-EAF investments.


      Terminal value is modelled using a 2.5% perpetual growth rate consistent with long-run European steel
      demand growth and green steel TAM expansion post-2030. Project-level IRR at the base case is approximately
      9–12%, which is acceptable for infrastructure-grade capital but borderline for equity-return expectations
      given construction risk.
