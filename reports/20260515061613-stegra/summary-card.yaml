summary:
  headline: >-
    Stegra is the most advanced large-scale green-steel project in Europe with strong customer commitments and ~€7.9B in
    disclosed financing, but pre-revenue first-of-kind construction risk, green-hydrogen cost uncertainty, and the
    recent €1.4B 2026 add-on raise keep underwriting confidence in the medium band.
