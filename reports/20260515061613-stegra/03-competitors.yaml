  - id: direct-green-steel-competitors
    title: "Direct Competitors: Green-Hydrogen DRI Pioneers"
    body: >-
      Among direct green-steel pioneers, SSAB HYBRIT is Stegra's most comparable competitor. HYBRIT
      shares the same DRI-H2 pathway, is based in Sweden with access to similar hydropower and LKAB
      iron ore, and has the deepest publicly documented track record — including the 2021 delivery of
      fossil-free steel to Volvo Group. HYBRIT targets commercial scale at Oxelösund and Luleå from
      2026 onward, directly overlapping Stegra's own production start window. Volvo Group's partnership
      with both HYBRIT and Stegra illustrates how automaker customers are hedging by engaging multiple
      green-steel suppliers rather than awarding exclusive long-term commitments to one pioneer.
      Salzgitter SALCOS represents Germany's most advanced national green-steel programme, targeting
      first green hot metal in 2026. GravitHy at Fos-sur-Mer and Blastr at Inkoo are two later-stage
      entrants with announced investments above €2B each, but public sources through May 2026 do not
      confirm detailed financing, FEED completion, or construction timelines for either project. Boston
      Metal's MOE technology is at an earlier stage, but it has ArcelorMittal as a strategic investor,
      which provides both capital and a potential route to scale. The key differentiator for Stegra in
      this field is its combination of secured capital (€7.9B+ total as of April 2026), a signed customer
      book spanning automotive and industrial sectors, and a site already under construction in Boden.
