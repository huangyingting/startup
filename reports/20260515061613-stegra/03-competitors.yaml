  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Realized green-steel contract pricing and net unit economics
      missingEvidence: >-
        No public source discloses actual contracted green-steel prices per tonne, discount structures,
        or gross margin by customer or project.
      whyItMatters: >-
        Without realized pricing data, green-steel premium estimates from analysts cannot be verified
        against actual transactions.
      diligencePath: >-
        Request signed offtake term sheets, realized pricing schedules, and margin bridge from Stegra
        management.
      relatedQuestionRefs:
        - QP015
    - type: stale
      severity: material
      topic: thyssenkrupp financial restructuring impact on DRI timeline
      missingEvidence: >-
        Public sources through May 2026 report restructuring discussions but do not confirm whether the
        tkH2Steel timeline or capex commitment has been formally revised.
      whyItMatters: >-
        If thyssenkrupp scales back its DRI programme, the competitive intensity in Europe changes and
        Stegra's customer pipeline from thyssenkrupp itself may shift.
      diligencePath: >-
        Monitor thyssenkrupp quarterly disclosures and management guidance through H2 2026 for explicit
        DRI capex confirmations.
      relatedQuestionRefs:
        - QP023
        - QP010
    - type: missing-source
      severity: material
      topic: GravitHy and Blastr Green Steel detailed project specifications
      missingEvidence: >-
        Public sources reference announcements by GravitHy and Blastr but do not disclose detailed FEED
        studies, confirmed financing, or construction timelines.
      whyItMatters: >-
        Without confirmed capex, off-take, or construction milestones, these companies cannot be ranked
        confidently as near-term competitive threats.
      diligencePath: >-
        Review GravitHy and Blastr press releases, EU permit filings, and Innovation Fund application
        disclosures.
      relatedQuestionRefs:
        - QP027
    - type: conflicting-data
      severity: minor
      topic: Green hydrogen cost trajectory and timing of cost parity
      missingEvidence: >-
        Analyst estimates for the date and cost level at which green hydrogen achieves cost parity with
        fossil hydrogen vary significantly across BNEF, IEA, and S&P Global.
      whyItMatters: >-
        The timeline for green steel's unsubsidised cost competitiveness depends critically on this
        trajectory.
      diligencePath: >-
        Request Stegra's own hydrogen cost-of-production model and compare against BNEF and IEA 2026
        forecast updates.
      relatedQuestionRefs:
        - QP018
        - QP022
        - QP024
