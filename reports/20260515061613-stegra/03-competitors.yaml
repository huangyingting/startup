  - id: traditional-steel-majors-and-decarb
    title: "Incumbent Steel Majors and Their Decarbonisation Paths"
    body: >-
      The world's largest steel producers are not standing still on decarbonisation, but their
      transition paths are structurally different from Stegra's. ArcelorMittal — the world's
      second-largest producer at approximately 70 Mt/year — is pursuing DRI projects at Hamburg,
      Sestao, Gent, and Eisenhüttenstadt while simultaneously maintaining one of the largest BF-BOF
      asset bases in the world. Its Hamburg facility has demonstrated 100% hydrogen feed in
      demonstration runs, but commercial volumes require hydrogen supply chains that remain immature
      at the scale ArcelorMittal would require. thyssenkrupp's tkH2Steel programme targets 2.5 Mt/year
      of DRI in Duisburg and has secured a €2B EU Innovation Fund grant, yet the company faces
      concurrent financial restructuring that creates capital-allocation uncertainty. Salzgitter has
      the most advanced German timeline with a 2026 first-hot-metal target, but capacity remains small
      relative to European demand. Meanwhile, Asian giants — Baowu (~131 Mt/year), POSCO with HyREX,
      and Nippon Steel with COURSE50 — are investing in demonstration-scale green-steel R&D but are
      years away from commercial deployment at any meaningful fraction of their output. The risk these
      incumbents pose to Stegra is not displacement in the near term but catch-up over the medium term:
      if green hydrogen costs fall faster than projected and incumbents gain access to large-scale H2
      supply, their manufacturing scale and customer relationships could overwhelm any pure-play
      pioneer's first-mover advantage. Historically low steel industry profit margins, however,
      constrain the self-financed capex that incumbents can deploy, making public subsidy a critical
      enabler — and a competition choke point.
