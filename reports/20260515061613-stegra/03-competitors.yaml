callouts:
  - calloutType: strength
    title: "First-mover financing and production timeline de-risk Stegra's market entry"
    body: >-
      With over €7.9B in secured financing and a construction site already active in Boden, Stegra has
      assembled the largest capital base of any dedicated green-steel startup. This puts it ahead of most
      pioneer peers on both production readiness and financial certainty, reducing the execution risk that
      has historically caused capital-intensive industrial projects to slip or be cancelled.
    claimRefs:
      - CP003
      - CP004
      - CP005
      - CP042
  - calloutType: risk
    title: "Incumbent catch-up risk: ArcelorMittal and thyssenkrupp can deploy at scale if hydrogen economics shift"
    body: >-
      The structural risk for Stegra is not from direct green-steel pioneers but from incumbents.
      ArcelorMittal's 70 Mt/year production base, existing customer relationships, and access to public
      grant funding mean it can rapidly scale DRI if green hydrogen costs fall faster than projected.
      thyssenkrupp's €2B Innovation Fund grant gives it similar access. If the hydrogen cost curve bends
      sharply in the late 2020s, large incumbents' manufacturing scale could outweigh Stegra's head start.
    claimRefs:
      - CP012
      - CP016
      - CP044
      - CP045
  - calloutType: insight
    title: CBAM and EU ETS create a structural regulatory floor that favours low-carbon steel in Europe
    body: >-
      The combination of the Carbon Border Adjustment Mechanism (CBAM) and the EU Emissions Trading
      System (ETS) structurally disadvantages high-carbon steel imports and domestic blast-furnace
      producers. CBAM applies a carbon cost to steel imports; ETS raises operating costs for
      high-emission EU producers. Both mechanisms create a pricing floor that should sustain the
      green-steel premium in the EU even if global conventional steel prices remain depressed, providing
      Stegra with a durable regulatory tailwind that competitors without EU market access cannot fully
      exploit.
    claimRefs:
      - CP029
      - CP030
      - CP031
