  - id: competitive-positioning
    title: "Stegra's Competitive Position: Strengths, Risks, and Moat Durability"
    body: >-
      Stegra's competitive position rests on four pillars that distinguish it from both pioneers and
      incumbents. First, capital: with over €7.9B in secured financing as of April 2026, Stegra has
      the largest disclosed project capital of any dedicated green-steel startup globally, reducing
      execution risk relative to peers still in fundraising. Second, timeline: targeting first
      production in 2026–2027, Stegra is on a similar or faster schedule than HYBRIT at commercial
      scale and is ahead of GravitHy and Blastr. Third, site: the Boden location provides access to
      abundant low-cost Swedish hydropower, LKAB iron-ore pellets, and a cold climate that reduces
      cooling demands for the electrolyzer stack. Fourth, customer anchoring: the disclosed book —
      BMW, Scania, Mercedes-Benz, Volvo Group, IKEA, ZF, Microsoft, and thyssenkrupp — represents a
      mix of automotive OEM demand pull and industrial decarbonisation commitments not replicated among
      pure-play pioneers. The structural risks are also real. Hydrogen economics remain the central
      sensitivity: if green-hydrogen costs do not fall toward the $2/kg threshold by the late 2020s,
      Stegra's products will remain dependent on green premiums and regulatory support rather than
      unsubsidised cost competitiveness. EU regulatory tailwinds — CBAM and ETS — provide meaningful
      cost pressure on conventional imports and high-emission incumbents, but these mechanisms could
      weaken under political pressure. Incumbent catch-up is a medium-term rather than an immediate
      risk, but the scale advantages of ArcelorMittal, Baowu, and POSCO are so large that any
      structural shift in green-hydrogen economics could change the competitive hierarchy faster than
      anticipated.
