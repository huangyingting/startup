        - Hardware installation complete as of April 2026; commissioning pending
        - Up to 800 MW installed electrolyzer capacity
        - On-site zero-carbon H2 generation avoids fossil fuel dependency
        - Degradation rates and availability at 800 MW scale are commercially unproven.
      - - DRI shaft furnace
        - Midrex Technologies (licensed process)
        - Under construction; tower exceeded 100 m in March 2026
