      - - Electric arc furnace and steelmaking
        - SMS group
        - Engineering complete; installation ongoing
        - Matched to DRI output to produce ~2.5 Mt/yr crude steel
        - SMS integrates digital process control and condition monitoring
        - Actual heat-to-heat cycle times and yield factors for H2-DRI feedstock are not yet in public disclosure.
      - - Rolling and finishing mill
        - SMS group
        - Greenfield design; commissioning sequence tied to EAF
        - Cold-rolled, hot-rolled, and galvanized flat steel coil
        - Greenfield layout optimised for H2-DRI metallurgical properties
