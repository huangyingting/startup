  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: electrolyzer-reliability-risk
      missingEvidence: >-
        Electrolyzer vendor guarantees and stack availability specifications for 800 MW continuous
        alkaline electrolysis operation; factory acceptance test data from thyssenkrupp Nucera.
      whyItMatters: >-
        Electrolyzer availability determines DRI and steel output throughput. An undisclosed degradation
        rate or warranty carve-out could materially impair Stegra's production schedule and operating
        economics, affecting its ability to meet offtake commitments.
      diligencePath: >-
        Request electrolyzer performance specification, availability guarantee, and factory acceptance
        test data from Stegra management or via direct engagement with thyssenkrupp Nucera. Review
        O&M contractual terms in the EPC agreement with Hitachi Energy.
      relatedQuestionRefs:
        - QE015
    - type: missing-source
      severity: material
      topic: CBAM
      missingEvidence: >-
        EU Commission or CBAM authority guidance on the precise carbon-accounting methodology applicable
        to green-H2-DRI steel produced within the EU and how embedded carbon is calculated under CBAM
        for steel certificates.
      whyItMatters: >-
        OEM procurement decisions and Stegra's premium pricing are partly contingent on CBAM-compatible
        carbon documentation. If the accounting methodology is unfavourable or delayed, it could reduce
        the regulatory differentiation value of Stegra's product in key export markets.
      diligencePath: >-
        Monitor European Commission delegated regulation on CBAM carbon-price accounting for steel;
        engage with EUROFER's regulatory affairs team to track timing of implementing guidance for
        H2-DRI routes.
      relatedQuestionRefs:
        - QE020
    - type: private-evidence-only
      severity: material
      topic: renewable-PPA
      missingEvidence: >-
        Contracted electricity price (€/MWh), volume commitment, and duration of PPAs with Iberdrola
        and Statkraft; hedging strategy for periods of grid stress or curtailment.
      whyItMatters: >-
        Electricity is the largest operating cost driver (60–70% of LCOH for green hydrogen). Without
        disclosed PPA terms, it is not possible to independently verify whether Stegra's economics
        support the envisaged steel cost and premium to conventional supply.
      diligencePath: >-
        Request PPA summaries from Stegra management during due diligence; model sensitivity of LCOH
        and steel production cost to PPA prices of €30, €40, and €50/MWh using BNEF and IEA
        benchmarks.
      relatedQuestionRefs:
        - QE025
    - type: enumeration-incomplete
      severity: minor
      topic: product-grades
      missingEvidence: >-
        Public product catalogue with specific steel grades, dimensional tolerances, surface-quality
        grades, coating-weight ranges, and application certifications for the full Stegra product range.
      whyItMatters: >-
        Buyers in automotive and appliance sectors require precise dimensional and surface-quality
        specifications before qualifying a new steel supplier. Without a published product data sheet
        or mill certificate format, Stegra's commercial readiness for premium automotive qualification
        processes cannot be independently assessed.
      diligencePath: >-
        Request draft product specifications, mill certificate templates, and planned automotive
        qualification timelines (VDA, IATF) from Stegra's commercial team during due diligence.
      relatedQuestionRefs:
        - QE009
    - type: private-evidence-only
      severity: material
      topic: OEM-partnerships
      missingEvidence: >-
        Binding off-take agreement terms with BMW, Volvo, Mercedes-Benz, or other OEM customers,
        including committed volumes, pricing mechanism, and delivery schedule tied to production
        commissioning at Boden.
      whyItMatters: >-
        Sustainability partnership disclosures do not confirm committed revenue. Without binding
        volumes and delivery dates, the demand risk for Stegra's first commercial tonnes is not
        independently verifiable and the premium pricing assumption cannot be stress-tested.
      diligencePath: >-
        Request anonymised off-take agreement summaries from Stegra management; verify OEM
        counterparty credit quality and commitment conditionality relative to commissioning timeline.
      relatedQuestionRefs:
        - QE010
