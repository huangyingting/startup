    rows:
      - - Renewable electricity supply
        - Long-term PPA with hydro and wind/solar blend; SE2 grid zone
        - Iberdrola; Statkraft
        - SE2 has lowest grid emission factor in Europe; hydro provides near-baseload
        - Electricity cost is the largest single operating cost driver; PPA terms are undisclosed.
      - - Electrolysis (H2 production)
        - Alkaline and/or PEM water electrolysis; up to 800 MW installed
        - thyssenkrupp Nucera (electrolyzers); Hitachi Energy (grid / BoP)
        - Proven alkaline technology industrialised to hundred-MW scale; Nucera listed on Frankfurt Stock Exchange
        - Stack degradation and availability at 800 MW continuous operation not yet demonstrated commercially.
      - - DRI shaft furnace (iron reduction)
        - Midrex licensed shaft-furnace technology; H2-adapted gas chemistry
        - Midrex Technologies (a Kobe Steel subsidiary)
        - Midrex process accounts for >60% of global DRI by volume in gas mode; shaft design adaptable to H2
        - No full-scale 100%-H2 Midrex reference plant is yet commercially operating; Boden will be first.
      - - Electric arc furnace and secondary metallurgy
        - High-power AC EAF with ladle metallurgy station
        - SMS group
        - SMS is a globally leading steelmaking technology supplier with EAF and rolling-mill references
        - EAF performance on cold DRI / HBI feedstock mix is chemistry-sensitive; public performance data are limited.
      - - Rolling, finishing, and product inspection
        - Hot strip mill, cold rolling mill, galvanising line
        - SMS group
        - Greenfield layout allows optimised product routing; no legacy line constraints
        - Specific product grades, dimensional tolerances, and surface-quality certifications are not yet public.
    notes: >-
      The architecture is technically coherent and all five layers draw on established technology
      partners. The primary novelty is the 800 MW scale of the electrolyzer layer and its integration
      with H2-DRI at commercial throughput.
