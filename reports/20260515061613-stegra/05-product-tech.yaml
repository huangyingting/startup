callouts:
  - calloutType: strength
    title: Greenfield design freedom delivers a unique integration advantage
    body: >-
      Stegra has no legacy plant to retrofit. The Boden facility is designed as a single integrated
      system from hydrogen production through to finished coil, allowing SMS group's digital process
      controls, predictive maintenance, and MES to be embedded from day one. This eliminates the
      conversion costs and operational workarounds that complicate brownfield decarbonisation at
      incumbent steelmakers and gives Stegra a structural operating-cost and data-quality advantage
      if the ramp-up proceeds as planned.
    claimRefs:
      - CE003
      - CE018
      - CE019
      - CE020
  - calloutType: strength
    title: Boden site compounds three independent cost and carbon advantages
    body: >-
      The Boden location gives Stegra three reinforcing advantages that are difficult to replicate
      elsewhere: the SE2 electricity grid has the lowest carbon emission factor in Europe; hydropower
      from the Lule River provides near-baseload renewable generation that reduces balancing costs
      relative to wind-dominated grids; and LKAB's Kiruna and Malmberget pellet operations are
      roughly 100 km away, minimising pellet-supply logistics costs. Cold ambient temperatures also
      reduce cooling requirements for electrical infrastructure at the electrolyzer field.
    claimRefs:
      - CE009
      - CE010
      - CE008
      - CE021
  - calloutType: risk
    title: Green hydrogen cost competitiveness is the central financial risk
    body: >-
      Electricity costs represent roughly 60–70 percent of the levelised cost of green hydrogen
      and therefore the single largest operating-cost variable for Stegra. BNEF and IISD analyses
      note that green-H2 production costs remain above fossil-fuel alternatives in most markets in
      2026, with cost convergence dependent on further electrolyzer price declines and low-cost
      renewable electricity access. Stegra's long-term PPA prices are commercially confidential,
      making it impossible to independently verify whether the plant will operate within the
      economics required to deliver green steel at a competitive or acceptable premium to buyers.
    claimRefs:
      - CE035
      - CE004
      - CE021
  - calloutType: risk
    title: Electrolyzer reliability at 800 MW scale is commercially unproven
    body: >-
      No single-site alkaline electrolyzer installation of 800 MW has been operated at continuous
      commercial throughput as of mid-2026. Hydrogen Europe and IISD research indicate that
      electrolyzer stack degradation rates, availability factors, and maintenance intervals at
      multi-hundred-MW scale are still being established across the industry. An unexpected
      availability shortfall at the electrolyzer field would propagate directly to DRI production
      and ultimately to steelmaking throughput, threatening the 2026–2027 first-steel timeline.
    claimRefs:
      - CE004
      - CE036

