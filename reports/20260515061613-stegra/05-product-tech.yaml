  - id: FE004
    title: Product maturity and capability map
    type: matrix
    layout: wide
    summary: >-
      The electrolyzer and DRI systems carry the highest technology risk given their unprecedented
      combined scale; the EAF/rolling line and renewable electricity supply are the most mature
      components. Carbon certification remains the key commercial readiness gap.
    data:
      columns:
        - Technology maturity
        - Construction progress
        - Commercial readiness
        - Certification status
        - Diligence risk
      rows:
        - label: Electrolyzer field (800 MW)
          values:
            - label: medium
              tone: neutral
              detail: Alkaline electrolysis proven; 800 MW single-site scale is a step change with limited reference data.
            - label: high
              tone: positive
              detail: Final module installed April 2026; hardware commissioning under way.
            - label: medium
              tone: neutral
              detail: H2 cost per tonne dependent on electricity price; commercial threshold not yet publicly confirmed.
            - label: low
              tone: warning
              detail: No published stack degradation or availability guarantee at this scale.
            - label: high
              tone: negative
              detail: Electrolyzer reliability at 800 MW is the single largest unproven technical element.
        - label: DRI shaft furnace
          values:
            - label: medium
              tone: neutral
              detail: Midrex process proven at large scale on natural gas; 100%-H2 operation has no direct commercial precedent.
            - label: high
              tone: positive
              detail: Tower above 100 m as of March 2026; structural completion advanced.
            - label: medium
              tone: neutral
              detail: DRI product grades and metallurgical quality targets for H2-only operation not yet publicly verified.
            - label: low
              tone: warning
              detail: ResponsibleSteel and EPD audits require operating data; pre-production certification not possible.
            - label: high
              tone: negative
              detail: First full-scale 100%-H2 Midrex operation; start-up performance is uncertain.
        - label: EAF and rolling mill
          values:
            - label: high
              tone: positive
              detail: SMS group EAF and rolling-mill technology is globally proven at comparable scale.
            - label: medium
              tone: neutral
              detail: Installation ongoing as of May 2026; commissioning dependent on DRI shaft readiness.
            - label: medium
              tone: neutral
              detail: Product-grade capabilities and surface-quality specifications not yet publicly confirmed.
            - label: medium
              tone: neutral
              detail: EAF-route carbon certification paths are established; Stegra process-specific EPD pending.
            - label: medium
              tone: neutral
              detail: Standard technology risk; main dependency is feedstock quality from DRI shaft.
        - label: Renewable electricity and PPAs
          values:
            - label: high
              tone: positive
              detail: Long-term hydropower and PPA from Iberdrola/Statkraft; SE2 is Europe's cleanest grid zone.
            - label: high
              tone: positive
              detail: Grid connection and PPA agreements are in place; Hitachi Energy managing BoP.
            - label: medium
              tone: neutral
              detail: PPA pricing is commercially confidential; operational electricity cost not publicly disclosed.
            - label: high
              tone: positive
              detail: SE2 grid emission factor is among the lowest globally; renewable provenance certifiable.
            - label: low
              tone: positive
              detail: Renewable electricity supply is the strongest-evidenced element in Stegra's technology stack.
        - label: Carbon certification (RS / EPD)
          values:
            - label: medium
              tone: neutral
              detail: ResponsibleSteel and EPD frameworks exist and cover H2-DRI route; auditor methodology is evolving.
            - label: low
              tone: warning
              detail: Certification requires production operating data; cannot be completed pre-commissioning.
            - label: low
              tone: warning
              detail: OEM off-take commitment is conditional on certification delivery; premium pricing at risk without it.
            - label: low
              tone: warning
              detail: No Stegra-specific EPD or ResponsibleSteel certificate published as of May 2026.
            - label: high
              tone: negative
              detail: Certification delay would block premium off-take revenue and CBAM compliance claims.
    approximationNotes: >-
      Maturity and readiness ratings are based on public construction disclosures, partner capability
      assessments, and comparison with comparable DRI and EAF projects globally. Internal test data
      and vendor acceptance documentation are not in the public domain.
