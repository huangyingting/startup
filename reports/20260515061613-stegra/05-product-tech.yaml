  - id: section-2
    title: DRI system and hydrogen production
    body: >-
      The DRI shaft furnace is the technical centrepiece of the plant. Stegra has licensed Midrex
      Technologies' proven shaft-furnace design — the same Midrex process that today accounts for more
      than 60 percent of global DRI production when run on natural gas. Adapting it to use green hydrogen
      instead of reformed natural gas requires modifications to gas chemistry and temperature profiles,
      but the Midrex shaft is mechanically well-suited to hydrogen because hydrogen is already used as
      a reducing agent in the standard natural-gas process. The shaft furnace at Boden will be fed with
      iron-ore pellets supplied by LKAB, whose Kiruna and Malmberget operations produce high-quality
      pellets optimised for the DRI route and located approximately 100 km from the Boden site, keeping
      logistics costs contained and supply-chain distance short relative to most competing DRI projects
      globally.


      The hydrogen system is sized to produce roughly 100,000 tonnes of H2 per year from up to 800 MW
      of electrolysis capacity. Stegra has disclosed thyssenkrupp Nucera as its primary electrolyzer
      supplier. Hitachi Energy is responsible for the grid connection and the balance-of-plant integration
      for the electrolyzer field. Both PEM and alkaline electrolysis technologies are referenced in
      public disclosures, consistent with a diversified electrolyzer stack at this scale. Hydropower
      from the Lule River provides the base load renewable electricity; Iberdrola and Statkraft are
      cited as renewable PPA counterparties. The near-zero-carbon electricity grid in northern Sweden
      (Elområde SE2) is a critical advantage: the operational carbon intensity of the produced hydrogen
      is determined almost entirely by the source electricity grid intensity, and the Swedish North
      grid consistently records among the lowest emission factors in Europe.
