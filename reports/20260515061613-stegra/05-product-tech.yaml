  - id: section-5
    title: Construction roadmap and technology maturity
    body: >-
      Stegra's construction programme has advanced materially through 2025 and into 2026. Site
      preparation began in November 2023. By March 2026, the DRI reduction tower had surpassed
      100 metres in height — one of the most visible physical milestones for a shaft-furnace DRI
      plant. In April 2026, the company announced the installation of the final electrolyzer module,
      signalling that the electrolysis field hardware installation is nearing completion. Commissioning
      of the integrated plant is targeted for the second half of 2026, with first commercial steel
      production guided for the 2026–2027 period. Phase 1 nameplate capacity is approximately
      2.5 million tonnes of crude steel per year.


      From a technology-maturity perspective, the H2-DRI-EAF process itself is not a laboratory
      concept: Midrex shaft furnaces have been running in gas-based DRI mode for decades, ArcelorMittal
      and other steelmakers have operated pilot and commercial EAF facilities at large scale, and
      SMS group's rolling mills are deployed globally. What is novel at Boden is the combination
      of green hydrogen at 800 MW scale with DRI and EAF in a single integrated greenfield facility.
      The HYBRIT demonstration plant (SSAB/Vattenfall/LKAB) in Luleå produced the world's first
      fossil-free steel in 2021 and demonstrated technical feasibility; Stegra is now attempting
      commercial-scale replication. ResponsibleSteel and EU CBAM verification frameworks are the
      likely certification routes for demonstrating the carbon credentials of the output to buyers.
