  - id: FE003
    title: Critical dependency map
    type: dag
    layout: wide
    summary: >-
      Stegra's production depends on six major external dependency clusters: renewable electricity,
      electrolyzer technology, iron-ore pellets, EPC engineering, project finance, and carbon
      certification. Each cluster carries specific concentration and reliability risks.
    data:
      nodes:
        - id: grid
          label: SE2 renewable electricity grid
          detail: Lule River hydropower; Iberdrola/Statkraft PPAs. Lowest grid emission factor in Europe.
          tone: positive
        - id: electrolyzers
          label: Electrolyzers (thyssenkrupp Nucera)
          detail: 800 MW electrolyzer field. Largest single-site deployment; limited reference data at scale.
          tone: neutral
        - id: h2
          label: Green hydrogen supply
          detail: On-site H2 production from electrolysis. Cost-critical variable for operating margin.
          tone: neutral
        - id: pellets
          label: LKAB iron-ore pellets
          detail: DR-grade pellets from Kiruna/Malmberget ~100 km. Single major supplier concentration risk.
          tone: neutral
        - id: dri
          label: DRI shaft furnace (Midrex)
          detail: Midrex licensed shaft; H2-adapted. No commercial 100% H2 reference yet.
          tone: neutral
        - id: eaf
          label: EAF and rolling mill (SMS group)
          detail: SMS supplies EAF, caster, hot strip mill, cold mill, galvanising line, and digital control.
          tone: positive
        - id: finance
          label: Project finance (EIB + Innovation Fund)
          detail: EU public finance anchor; EIB loan + Innovation Fund grant underpin capital structure.
          tone: positive
        - id: certification
          label: Carbon certification (ResponsibleSteel / EPD)
          detail: Third-party verification required for OEM and CBAM buyer acceptance.
          tone: warning
