  - id: TE002
    title: Workflow and use-case table
    columns:
      - user job
      - current workflow pain
      - Stegra solution
      - measurable benefit
      - deployment evidence
      - limitation
    rows:
      - - Automotive OEM sourcing low-carbon flat steel
        - BF-BOF supply chain locks in ~1.8 tCO2/t; Scope 3 exposure growing under EU CSRD and OEM commitments
        - Long-term off-take agreements for green-steel coil with verified <0.1 tCO2/t
        - OEMs can cut Scope 3 steel emissions by >95% versus BF-BOF baseline
        - BMW Group, Volvo Group, Mercedes-Benz, ZF sustainability partnerships disclosed
        - Offtake price premium and volume commitment terms remain undisclosed; first-steel delivery not yet started.
      - - Steel buyer seeking CBAM compliance
        - Conventional imported steel will carry increasing CBAM costs from 2026 onwards
        - Green steel with third-party verified near-zero carbon certificates (EPD, ResponsibleSteel)
        - Avoids growing CBAM levy on carbon-intensive steel; supports corporate net-zero pledges
        - EU CBAM regulation live from 2026; Stegra targeting ResponsibleSteel certification
        - Final CBAM carbon-certificate methodology and audit trail for H2-DRI not yet finalised by EU authorities.
      - - Steelmaking with low scrap availability
        - Scrap-based EAF route requires high-quality scrap; supply is constrained and prices volatile
        - Virgin-iron-equivalent DRI/HBI feedstock from green H2 route at scale
        - Eliminates scrap dependency; enables high-grade product metallurgy for demanding applications
        - Industry consensus from worldsteel and IEA that DRI enables scrap-free EAF for quality-critical grades
        - DRI production volumes not yet online; pellet supply logistics from LKAB not yet at commercial steady-state.
      - - Appliance and advanced manufacturing buyers
        - Decarbonisation pressure from B2B customers and regulatory disclosure requirements
        - Cold-rolled and galvanised coil with third-party carbon certification
        - Certified carbon footprint product data for Scope 3 reporting and EPD documentation
        - Worldsteel and ResponsibleSteel publish EPD framework applicable to Stegra's product route
        - Product specifications beyond flat coil (e.g. dimensions, surface finish, coating weights) not publicly disclosed.
      - - National industrial policy (Sweden / EU)
        - De-industrialisation risk as carbon costs rise for conventional steelmakers
        - Anchor green-industry investment in northern Sweden creating industrial jobs and supply chain
        - Regional employment, tax revenue, and EU Green Deal alignment
        - EU Innovation Fund grant, EIB loan, Swedish EKN support disclosed
        - Actual job count, local procurement spend, and community benefit commitments are not in public domain.
    notes: >-
      The clearest near-term demand signal is from premium automotive OEMs with Scope 3 commitments.
      Regulatory tailwinds from CBAM and CSRD create structural demand pull but add execution risk
      tied to certification timeline.
