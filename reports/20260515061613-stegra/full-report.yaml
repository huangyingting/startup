      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Northvolt collapse is the most direct cautionary template for Stegra investors
            body: >-
              Northvolt AB—a battery gigafactory in northern Sweden backed by the same Vargas AB holding company that
              led Stegra's early equity rounds—filed for bankruptcy in November 2024 after failing to scale production
              volume, accumulating cost overruns that overwhelmed its capital structure, and losing quality
              certification from its largest customer. At its peak, Northvolt carried a venture valuation of
              approximately $12 billion; it then collapsed to zero for equity investors within twelve months. Stegra is
              not Northvolt: the technology, sector, EPC structure, and project-finance covenant framework differ in
              material ways. But the structural pattern— first-of-kind Swedish cleantech megaproject under Vargas
              sponsorship, raising capital at industrial scale before commercial production is validated, in a remote
              Northern Sweden industrial site—is close enough that any investment committee must explicitly and
              thoroughly document why the commissioning-risk dynamics are qualitatively different before committing
              capital.
            calloutType: risk
            claimRefs:
              - CV014
              - CV015
              - CV034
              - CV035
          - type: callout
            title: Green premium durability is the most consequential single uncertainty in the return model
            body: >-
              Stegra's equity return model is more sensitive to the green steel price premium than to any other
              variable, including capex overrun and hydrogen cost trajectory. A collapse of the premium from the
              base-case €250/t to €100/t reduces annual EBITDA by approximately €750 million at full ramp—equivalent to
              erasing the majority of expected cash flow. The premium is not guaranteed by regulation, is not yet
              underpinned by legally binding minimum-price commitments in publicly disclosed offtake agreements, and is
              subject to erosion as European competitors including HYBRIT (SSAB/LKAB), thyssenkrupp Steel, ArcelorMittal
              DRI projects, and offshore green steel entrants add certified-green capacity to the market by 2030.
              Analysts at Seeking Alpha and S&P Global Commodity Insights have noted that the green steel premium faces
              structural compression risk as supply scales faster than binding demand commitments can absorb. Investors
              should treat the green premium as a scenario variable with a wide range, not as a fixed revenue
              assumption.
            calloutType: risk
            claimRefs:
              - CV021
              - CV022
              - CV036
              - CV037
          - type: callout
            title: Track at implied €5–6B; require private data-room access before any new capital commitment
            body: >-
              The recommendation is track rather than buy. The investment thesis is coherent and evidence-supported:
              Stegra occupies a first-mover position in certified green steel, has secured elite institutional backing,
              and benefits from structural EU regulatory tailwinds via CBAM and ETS. But the entry price at the implied
              €5–6 billion post-money values the project at multiples consistent with profitable listed peers—not with a
              pre-revenue greenfield plant that has already required €1.4 billion in additional financing before first
              commissioning. No audited financials are publicly available, the actual project IRR has not been
              disclosed, and the binding offtake terms are not publicly confirmed. Any investor underwriting new capital
              at the current implied price must first secure access to the project's IRR model, the complete covenant
              structure of the EIB and commercial debt facilities, and the binding offtake agreement terms for at least
              three of the six named OEM customers.
            calloutType: recommendation
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV039
              - CV040
