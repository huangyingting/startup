      - number: '5.3'
        title: Electrolyzer system and renewables integration
        blocks:
          - type: paragraph
            body: >-
              At 800 MW of installed electrolysis, Stegra's electrolyzer field is one of the largest single-site
              hydrogen production deployments announced globally as of mid-2026. BNEF and BloombergNEF hydrogen market
              analyses note that operating costs for green hydrogen production are heavily weighted toward electricity
              costs, typically representing 60–70 percent of the levelised cost of hydrogen (LCOH). This means Stegra's
              long-term competitiveness in producing green steel depends materially on sustaining low-cost,
              high-availability renewable electricity. The company has secured long-term renewable PPAs with Iberdrola
              and Statkraft, two of Europe's largest renewable generators, to lock in electricity pricing and volume
              certainty. Northern Sweden's hydropower fleet provides near-baseload renewable generation that complements
              the intermittency of wind and solar, reducing balancing costs.


              The electrolyzer supplier thyssenkrupp Nucera is a German-listed company that has industrialised alkaline
              water electrolysis at the hundred-MW scale. Hitachi Energy's role covers both the grid connection
              (connecting the site to the SE2 grid zone) and the balance-of-plant engineering for the electrolyzer
              system, including power conversion, rectification, and safety systems. In April 2026 Stegra announced the
              installation of the final electrolyzer module, indicating that the electrolysis field hardware
              installation is substantially complete. IISD and Hydrogen Europe research highlight that electrolyzer
              reliability and degradation rates at multi-hundred-MW scale remain an industry-wide open question with
              limited commercial reference data, representing a diligence risk that Stegra shares with all first-mover
              H2-DRI projects.
