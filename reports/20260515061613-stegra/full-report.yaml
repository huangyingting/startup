      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >
              Stegra is led by Henrik Henriksson, who became CEO in 2021. Henriksson previously served as President and
              CEO of Scania, the Swedish heavy commercial vehicle manufacturer, where he led the company through its
              integration with the Volkswagen Group and built a reputation as a credible industrial operator with deep
              relationships across the European automotive and transportation sectors. His appointment gave Stegra
              immediate credibility with potential offtake customers and institutional investors, and his background at
              Scania is directly relevant given that Scania is one of Stegra's named offtake partners.

              The CFO position is held by Thore Lindgren, who brings financial leadership experience relevant to
              managing the complex multi-tranche financing structure that Stegra has assembled. The company was
              co-founded with the backing of Vargas Holding, the family office of Cristina Stenbeck — who is also a
              notable public backer and plays the role of lead founding investor. Daniel Ek, the founder of Spotify, is
              among the early private investors who have publicly backed the company, alongside Felix Capital.

              Governance is conducted through a board structure that includes representatives from major institutional
              investors. Given that the company has not publicly disclosed a complete board composition beyond key
              individuals, board governance details represent a material diligence ask. The leadership structure carries
              concentration risk: Henrik Henriksson's network and industrial credibility are central to customer
              negotiations and lender relationships. Any change in CEO would require careful management to preserve the
              offtake agreements and financing relationships he has built.

              The founding investor group reflects a mix of European industrial capital, impact-focused funds, and
              strategic investors with direct interests in green steel supply. Altor, GIC (Singapore's sovereign wealth
              fund), Hy24 (a hydrogen infrastructure investment platform), the IMAS Foundation (IKEA's philanthropic
              arm), and Just Climate are among the equity holders. Strategic industrial investors include Schaeffler,
              Marcegaglia, Hitachi Energy, and Kingspan. The Swedish state-linked pension fund Andra AP-fonden has also
              invested, providing a public institutional signal of confidence.
