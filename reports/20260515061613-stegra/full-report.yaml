  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Technology overview and process flow
        blocks:
          - type: paragraph
            body: >-
              Stegra's product is flat, cold-rolled, and galvanized steel coil produced via a hydrogen-based direct
              reduction and electric arc furnace (H2-DRI-EAF) route — a fundamentally different process from the
              blast-furnace and basic-oxygen furnace (BF-BOF) pathway that still accounts for roughly 70 percent of
              global steel output. The end-to-end process starts with water electrolysis: renewable electricity from
              Luleå-area hydropower and long-term PPAs splits water into hydrogen and oxygen. The hydrogen feeds a
              Midrex-licensed shaft furnace where it reacts with iron-ore pellets sourced from LKAB's mines at Kiruna
              and Malmberget, roughly 100 km away, reducing them to sponge iron (also called direct reduced iron or
              DRI). The sponge iron is then melted and refined in an electric arc furnace supplied and integrated by SMS
              group, which also delivers the continuous-casting line and the rolling and finishing mill. The output is
              flat steel coil including hot-rolled, cold-rolled, and galvanized grades suited to automotive, appliance,
              and advanced manufacturing customers.


              The entire process avoids the CO2 emissions associated with coking coal. Stegra targets lifecycle
              emissions below 0.1 tCO2 per tonne of crude steel, compared with approximately 1.8–2.0 tCO2/t for
              conventional BF-BOF and roughly 1.0–1.3 tCO2/t for natural-gas-based DRI with EAF. The IEA Iron and Steel
              Technology Roadmap confirms that H2-DRI is among the lowest-emission pathways available at commercial
              scale today, provided renewable electricity is the energy source. The greenfield site at Boden was
              selected partly because the Swedish north has abundant hydropower from the Lule River, a stable grid
              connection, cold ambient air for process cooling, and an established logistics corridor to Luleå port.
