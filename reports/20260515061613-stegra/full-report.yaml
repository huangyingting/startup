  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Construction and execution risks are the most material near-term threat
        blocks:
          - type: paragraph
            body: >-
              Stegra's Phase 1 Boden project is a ~€5 billion first-of-kind megaproject that integrates six distinct
              industrial processes—800 MW hydrogen electrolysis, hydrogen storage, direct reduction ironmaking (DRI),
              electric arc furnace (EAF) steelmaking, continuous casting, and hot rolling—on a single greenfield site in
              arctic Sweden. No comparable project exists anywhere in the world at this combined scale, making cost and
              schedule benchmarking structurally difficult. SMS Group holds the primary EPC contract and is a credible
              global steelplant builder, but the six-process integrated scope has no prior precedent in the green steel
              sector.

              The April 2026 announcement of €1.4 billion in additional financing is the most material public risk
              signal. Stegra's original Phase 1 budget was reported at €4–5 billion; incremental fundraising of this
              magnitude—without a corresponding production ramp or commissioning announcement—is widely interpreted as
              evidence of a roughly 25% budget overrun versus initial guidance. This is consistent with the broader
              megaproject literature: BCG and Kearney research both find that 70–80% of capital-intensive first-of-kind
              industrial projects exceed their initial budgets by 20–40%. The April 2026 raise does not mean the project
              is failing—it means execution risk is higher than the original budget implied, and investors should
              stress-test assumptions accordingly.

              The Northvolt cautionary parallel is directly relevant. Northvolt—a battery gigafactory in northern Sweden
              backed by the same Vargas AB holding company—filed for bankruptcy in November 2024 after failing to scale
              production, experiencing quality failures, and running into cost overruns. Stegra is not Northvolt: the
              technology, sector, and EPC structure differ. But the governance and execution risk pattern of a
              first-of-kind Swedish cleantech megaproject under Vargas sponsorship now carries a failed precedent.
              Investors should demand specific evidence that Stegra's cost control, commissioning sequencing, and
              governance structures are materially better differentiated from what Northvolt exhibited at the same
              project stage.

              On the positive side, the DRI shaft furnace tower passed 100 meters in March 2026, confirming physical
              construction is progressing as planned. But passing a construction milestone is not the same as
              commissioning a fully integrated production system. The gap between a single-process first heat and
              rated-capacity commercial production across all six integrated units is where most execution risk resides,
              and it is a risk for which the public record provides limited visibility.
