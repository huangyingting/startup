        - EIB and Stegra legal team; independent legal review recommended
      - - >-
          Audited or reviewed financial statements — capex-to-date, cash balance, burn rate, and April 2026 round
          equity-vs-debt composition
        - Stegra audit firm (financial statements) and CFO (cash burn)
        - material — validates scope of overrun and current equity dilution
