      - number: '6.2'
        title: Automotive segment — BMW, Mercedes, Scania, Volvo, ZF, Schaeffler, and Porsche
        blocks:
          - type: paragraph
            body: >-
              Automotive OEMs and their first-tier suppliers are the dominant customer segment for Stegra, accounting
              for an estimated 60-70% of the contracted offtake book. The logic is structural: major European automakers
              have committed under their Scope-3 corporate sustainability targets to decarbonize upstream raw-material
              and steel supply chains. The EU Corporate Sustainability Reporting Directive and its vehicle fleet CO2
              regulations have embedded green-supply-chain obligations into automaker governance in ways that make
              green-steel procurement strategically necessary rather than optional for companies with 2030 and 2035
              net-zero milestones.


              BMW Group was among the first to act, announcing an agreement with H2 Green Steel in October 2021 and
              expanding it in 2022, targeting supply to European manufacturing plants. BMW Group's public sustainability
              reports confirm Scope-3 ambitions for upstream steel. Mercedes-Benz Group signed in May 2021, took an
              equity stake, and subsequently expanded the offtake in 2023; the agreement covers premium vehicle body
              panels where green-provenance story is most relevant for brand positioning. Scania, owned by
              Traton/Volkswagen, joined in August 2021, covering truck cabs and chassis. Volvo Group and Volvo Cars both
              signed in 2022, covering trucks and passenger vehicles respectively, aligned with Volvo Group's Science
              Based Targets initiative commitments. ZF Friedrichshafen signed in 2023 for driveline and chassis
              components. Schaeffler, which also took an equity stake, agreed in 2023 for precision automotive bearings
              and drivetrain components. Porsche is additionally reported as a customer.


              The auto-customer concentration creates a risk: if EV demand slows materially, automakers may deprioritize
              green-steel premium outlays in favor of cost reduction. Bloomberg and Financial Times coverage through
              2024-2026 documents how EV demand softness across Europe has pressured OEM capital budgets, and analysts
              note that Scope-3 spending commitments could be renegotiated or delayed if automaker margins compress.
              However, IEA and BNEF note that regulatory enforcement of EU fleet CO2 standards makes wholesale retreat
              from green procurement politically costly for large OEMs, providing at least a regulatory floor.
            claimRefs:
              - CU008
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
