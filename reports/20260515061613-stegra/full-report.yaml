      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Greenfield design freedom delivers a unique integration advantage
            body: >-
              Stegra has no legacy plant to retrofit. The Boden facility is designed as a single integrated system from
              hydrogen production through to finished coil, allowing SMS group's digital process controls, predictive
              maintenance, and MES to be embedded from day one. This eliminates the conversion costs and operational
              workarounds that complicate brownfield decarbonisation at incumbent steelmakers and gives Stegra a
              structural operating-cost and data-quality advantage if the ramp-up proceeds as planned.
            calloutType: strength
            claimRefs:
              - CE003
              - CE018
              - CE019
              - CE020
          - type: callout
            title: Boden site compounds three independent cost and carbon advantages
            body: >-
              The Boden location gives Stegra three reinforcing advantages that are difficult to replicate elsewhere:
              the SE2 electricity grid has the lowest carbon emission factor in Europe; hydropower from the Lule River
              provides near-baseload renewable generation that reduces balancing costs relative to wind-dominated grids;
              and LKAB's Kiruna and Malmberget pellet operations are roughly 100 km away, minimising pellet-supply
              logistics costs. Cold ambient temperatures also reduce cooling requirements for electrical infrastructure
              at the electrolyzer field.
            calloutType: strength
            claimRefs:
              - CE009
              - CE010
              - CE008
              - CE021
          - type: callout
            title: Green hydrogen cost competitiveness is the central financial risk
            body: >-
              Electricity costs represent roughly 60–70 percent of the levelised cost of green hydrogen and therefore
              the single largest operating-cost variable for Stegra. BNEF and IISD analyses note that green-H2
              production costs remain above fossil-fuel alternatives in most markets in 2026, with cost convergence
              dependent on further electrolyzer price declines and low-cost renewable electricity access. Stegra's
              long-term PPA prices are commercially confidential, making it impossible to independently verify whether
              the plant will operate within the economics required to deliver green steel at a competitive or acceptable
              premium to buyers.
            calloutType: risk
            claimRefs:
              - CE035
              - CE004
              - CE021
          - type: callout
            title: Electrolyzer reliability at 800 MW scale is commercially unproven
            body: >-
              No single-site alkaline electrolyzer installation of 800 MW has been operated at continuous commercial
              throughput as of mid-2026. Hydrogen Europe and IISD research indicate that electrolyzer stack degradation
              rates, availability factors, and maintenance intervals at multi-hundred-MW scale are still being
              established across the industry. An unexpected availability shortfall at the electrolyzer field would
              propagate directly to DRI production and ultimately to steelmaking throughput, threatening the 2026–2027
              first-steel timeline.
            calloutType: risk
            claimRefs:
              - CE004
              - CE036
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Pre-revenue offtake model — more than 12 named customers with long-term agreements
        blocks:
          - type: paragraph
            body: >-
              Stegra is pre-revenue: the Boden plant is targeting first commercial deliveries in 2026-2027, and no spot
              or repeat sales exist in the public record as of mid-2026. The company's demand case therefore rests
              entirely on its portfolio of long-term offtake agreements, which it has built steadily since 2021. The
              public record identifies more than 12 named offtake counterparties spanning automotive OEMs, Tier-1
              automotive suppliers, distributors, industrial manufacturers, construction material producers, and
              technology companies. Agreements are reported to carry 5-to-7-year terms, though exact volumes and prices
              are not publicly disclosed under NDA.


              Stegra's approach differs sharply from conventional steel sales. Rather than selling spot tonnes into
              commodity markets, it has locked anchor customers into multi-year forward contracts before a single tonne
              of green steel has left Boden. This is partly structural necessity — lenders and equity sponsors need
              committed revenue to backstop a project finance structure — and partly a strategic statement that primary
              steel buyers are willing to pay a green premium years in advance. The IEA Iron and Steel Technology
              Roadmap identifies long-term offtake agreements as the core commercial enabler for green steel projects at
              this stage of the market, and Stegra's book is among the largest assembled by any hydrogen-based DRI
              producer globally as of 2026.


              The customer mix reflects the steel supply chain: automotive OEMs and Tier-1 suppliers dominate (BMW,
              Mercedes, Scania, Volvo Group, Volvo Cars, ZF Friedrichshafen, Schaeffler, Porsche), with industrial
              manufacturers (IKEA, Kingspan, Marcegaglia), a technology firm (Microsoft), and distribution
              intermediaries (thyssenkrupp Materials Services, Klockner and Co, Roba Metals, Cargill) rounding out the
              book. Stegra has stated publicly that approximately 50% of planned first-phase capacity is covered by
              these long-term agreements, a higher coverage ratio than comparable greenfield projects at a similar
              capital-deployment stage.
