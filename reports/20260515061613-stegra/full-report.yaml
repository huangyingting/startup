chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Product
        blocks:
          - type: paragraph
            body: >
              Stegra, formerly known as H2 Green Steel AB, is a Swedish industrial technology company headquartered in
              Stockholm with operations centered on Gothenburg and a primary manufacturing site under construction in
              Boden, northern Sweden. The company was founded in 2021 and rebranded from H2 Green Steel to Stegra in
              September 2024, signaling a strategic evolution from a hydrogen-focused narrative to a broader identity as
              a green steel producer and industrial decarbonization platform. The name "Stegra" means "to rise" in
              Swedish, reflecting the company's ambition to scale green steel production globally.

              The company's core product is near-zero-emission steel produced through a vertically integrated process
              that begins with green hydrogen generation via an approximately 800 MW electrolyzer powered by renewable
              electricity from northern Sweden's abundant hydropower and wind resources. This green hydrogen is used in
              Direct Reduced Iron (DRI) technology — replacing the coking coal used in conventional blast furnaces — to
              convert iron ore pellets into solid iron. The resulting direct reduced iron is then processed in an
              Electric Arc Furnace (EAF) to produce finished steel. The entire chain avoids the coal combustion that
              accounts for roughly 70–75% of conventional steel's CO2 emissions. The Boden plant is designed for
              approximately 5 million tonnes per year of crude steel capacity, which would make it one of the world's
              largest single-site EAF complexes.

              The business model is primarily offtake-driven: Stegra has signed binding or framework purchase agreements
              with marquee industrial buyers including BMW, Scania, Mercedes-Benz, Volvo Group (both Volvo Cars and AB
              Volvo trucks), IKEA, ZF Group, thyssenkrupp Materials Services, and Microsoft, whose partnership also
              covers cloud and data infrastructure. These agreements de-risk the revenue side and provide the committed
              demand that underpins the debt financing from the European Investment Bank, Sweden's export credit agency
              EKN, and a commercial bank syndicate. Stegra's competitive positioning rests on being the first mover at
              industrial scale in green steel production, at a time when the EU's Carbon Border Adjustment Mechanism
              (CBAM) and Emissions Trading System (EU ETS) are progressively raising the cost of conventional brown
              steel imports into Europe.
