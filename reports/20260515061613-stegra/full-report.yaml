        - Green-steel product and process verification; key for OEM procurement
        - Stegra pursuing certification; framework supports H2-DRI route
        - ResponsibleSteel standard covers site-level social and environmental performance including emissions
        - Certification audit has not been completed; timeline relative to first commercial shipment is unclear.
      - - EU Carbon Border Adjustment Mechanism (CBAM)
        - All steel exported from outside the EU or produced with embedded carbon faces CBAM levy from 2026
        - CBAM reporting period started; Stegra as EU producer is subject to EU ETS, not the import CBAM levy
        - EU Taxation and Customs regulation; EC climate policy portal confirmed full CBAM scope
        - Exact carbon-accounting methodology for H2-produced steel under CBAM is still being interpreted.
      - - ISO 14001 / Environmental Management
        - Standard site environmental management for construction and operations
        - Not publicly confirmed as achieved; consistent with greenfield construction permit requirements
        - Expected as part of Swedish environmental permit; status not separately disclosed by Stegra
        - Public confirmation of ISO 14001 or equivalent is absent from available sources.
      - - Environmental Product Declaration (EPD)
        - Cradle-to-gate product carbon footprint used in procurement by OEMs and public procurers
        - Worldsteel EPD programme applicable; Stegra product EPDs not yet published
