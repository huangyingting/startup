      - number: '6.4'
        title: Commercial model and concentration risk — premium durability, contract structure, and Scope-3 dependency
        blocks:
          - type: paragraph
            body: >-
              Stegra's commercial model is built around long-term bilateral offtake contracts, typically 5-7 years in
              duration, at pricing that embeds an estimated green premium of $200-400 per tonne over conventional
              commodity flat-rolled steel. This premium is the central commercial assumption in Stegra's financial case:
              it needs to hold through first delivery and beyond to justify the project's capital cost. The premium is
              not publicly verified at a transaction level — no signed price schedule has been disclosed — and its
              durability depends on several simultaneous conditions: regulatory enforcement of EU ETS and CBAM
              mechanisms that raise the cost of high-carbon imports, OEM customers following through on Scope-3
              commitments under SBTi and CSRD, and no significant alternative low-carbon steel supply emerging before
              Stegra's book rolls over.


              The EU Carbon Border Adjustment Mechanism, which entered its transitional phase in 2023 and is due to
              apply import levies from 2026, is the most direct regulatory mechanism supporting the green premium: it
              makes high-carbon imported steel structurally more expensive relative to European low-carbon production.
              The EU ETS cost for conventional steelmakers is a parallel factor. Third-party analysts at BNEF,
              Fastmarkets, and Argus Media report achievable premiums of $150-400/t, with the upper range realizable
              under strong EU ETS carbon pricing and CBAM enforcement.


              Concentration risk is substantial. The automotive segment represents an estimated 60-70% of the booked
              offtake volume. If a subset of automotive customers were to invoke force majeure, delay delivery
              acceptance, or negotiate material price reductions due to EV demand softness or margin pressure, Stegra
              would face simultaneous demand shortfalls and potential renegotiation pressure on the majority of its
              contracted book, with no retention-rate history and no spot-market fallback at equivalent margins.
              Coverage from FT and Bloomberg through 2024-2026 documents real EV-demand deceleration across European
              auto markets, and IISD and Seeking Alpha analysis flag this as a material risk for greenfield green-steel
              projects. The fact that several of Stegra's largest customers also made equity investments provides some
              structural lock-in, but equity stakes do not substitute for contracted delivery obligations with defined
              price mechanisms.
