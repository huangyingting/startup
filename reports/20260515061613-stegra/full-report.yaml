      - number: '2.4'
        title: Regulatory Environment and Policy Tailwinds
        blocks:
          - type: paragraph
            body: >-
              Stegra's market is substantially shaped by European and global regulatory frameworks that create financial
              incentives for green steel buyers and impose rising costs on conventional steel producers. The most
              significant near-term regulatory driver is the EU Carbon Border Adjustment Mechanism (CBAM), which entered
              its transitional phase in October 2023 and moves to the definitive phase from January 2026. Under CBAM,
              importers of steel and other carbon-intensive products into the EU must purchase carbon certificates
              corresponding to the carbon price that would have been paid under EU ETS rules. For conventional steel
              with approximately 2 tCO2/tonne, at an EU ETS carbon price of €65-85/tonne—the 2024-2025 range—this
              translates to a CBAM compliance cost of €130-170 per tonne of imported steel, materially leveling the
              competitive playing field between EU domestic producers and lower-cost imports from China, Ukraine, and
              Turkey.

              The EU Emissions Trading System imposes a direct and rising cost on EU-domiciled BF-BOF steel producers.
              EU ETS free allowances for steel are being phased down through 2034, with full auctioning expected by 2034
              under the revised ETS directive. This trajectory makes green steel production progressively more
              cost-competitive relative to conventional BF-BOF production over the decade. Stegra's green hydrogen
              DRI+EAF route, which emits near-zero CO2 per tonne of steel, generates no ETS compliance cost and may
              qualify for ETS allowance revenues under certain conditions. EU ETS carbon prices ranged between
              €60-90/tonne in 2024, with structural upward pressure through 2030 as free allowances diminish.

              The EU Innovation Fund provides significant grant funding for large-scale decarbonization projects
              including green steel, supplementing private financing. The European Investment Bank has committed to
              financing green industry transition projects, and Sweden's national energy policy—characterized by
              abundant and low-cost hydroelectric and nuclear electricity—enables advantaged electrolyzer economics in
              Boden. The US Inflation Reduction Act's hydrogen production tax credit (45V) is creating parallel green
              hydrogen economics in North America, potentially benefiting hydrogen suppliers and creating indirect
              competitive dynamics for trans-Atlantic green steel trade in the medium term.

              The EU Corporate Sustainability Reporting Directive (CSRD) requires large European companies to disclose
              and certify sustainable supply chains, creating compliance-driven demand for green steel certification.
              Together with EU Taxonomy requirements and ResponsibleSteel certification standards, these frameworks
              create a regulatory moat that favors incumbents with certified green production. The combination of CBAM,
              EU ETS, CSRD, and ResponsibleSteel certification creates structural incentives for industrial buyers to
              commit to green steel procurement from EU-based producers like Stegra, reinforcing the offtake
              relationships already secured. A residual political risk exists that EU industrial competitiveness
              pressures could weaken CBAM enforcement, but this risk is currently assessed as low-to-medium given strong
              Parliamentary and Commission commitment to the Green Deal framework.
