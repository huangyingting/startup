      - number: '5.4'
        title: Digital integration and greenfield advantages
        blocks:
          - type: paragraph
            body: >-
              A key differentiator of Stegra's Boden plant is that it is a greenfield facility designed from the ground
              up with Industry 4.0 digital architecture. Unlike brownfield steelmaking retrofits, Stegra can embed
              advanced manufacturing execution systems (MES), enterprise resource planning (ERP) integrations, digital
              twins, and AI-driven process optimization without the legacy constraints of older plant control systems.
              SMS group, the EAF and rolling-mill engineering partner, integrates its own digital process-control and
              condition-monitoring platforms across the steelmaking and finishing lines. Digital twin technology allows
              operators to simulate production scenarios, optimise hydrogen flow rates, and anticipate equipment wear
              before physical failure occurs. Predictive maintenance powered by sensor fusion and machine-learning
              algorithms is expected to maximise uptime at the electrolysis field and DRI shaft, where unplanned
              downtime would be especially costly. The cold climate of northern Sweden also reduces cooling energy
              requirements for electrical equipment and computing infrastructure, adding a hidden efficiency advantage
              relative to sites in warmer climates.
