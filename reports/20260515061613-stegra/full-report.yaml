      - number: '7.4'
        title: CBAM political risk, pre-revenue cash burn, and private covenant exposure are the structural financial risks
        blocks:
          - type: paragraph
            body: >-
              CBAM (Regulation EU 2023/956) entered its transitional phase in October 2023 and moved to full
              carbon-price payment obligations for steel imports from January 2026. EU ETS free allocation for basic
              industrial processes is simultaneously being phased out between 2026 and 2034, which structurally widens
              the economic advantage of domestically produced green steel versus imported conventional steel over time.
              Both represent real regulatory tailwinds for Stegra's economics. However, European CBAM implementation has
              already been subject to political debate: the European Parliament has pushed for faster phase-out of free
              allocation, while industry groups including EUROFER have lobbied for slower transition. The RFNBO
              (Renewable Fuels of Non-Biological Origin) Delegated Regulation under the EU Hydrogen Strategy determines
              whether Stegra's hydrogen qualifies as green for CBAM accounting and renewable directive purposes; ongoing
              ambiguity in additionality and temporality rules creates certification risk that could affect customer
              green claims and green-steel premium realization.

              Stegra is pre-revenue and pre-commissioning as of mid-2026, sustaining substantial cash burn against a
              cumulative capital commitment now north of €5 billion. The EIB, EKN, and Innovation Fund facilities reduce
              senior credit risk, but EKN credit guarantees and EIB covenants protect lenders, not equity investors. The
              key financial risk is that debt covenants tied to commissioning milestones may have limited headroom if
              the April 2026 raise reflects schedule slip as well as cost overrun. This information is private and
              cannot be verified from public sources—it is a blocking diligence gap for any investor underwriting
              downside.

              Russia's ongoing invasion of Ukraine has elevated European energy prices above pre-war norms and disrupted
              supply chains for ferro-alloys and steel inputs. Swedish parliamentary energy politics—particularly
              debates on nuclear power restart and long-run electricity pricing policy—affect the stability of the
              low-cost renewable electricity Stegra's green H2 economics depend on. The EKN guarantee package and
              Innovation Fund grant were approved under IPCEI and Innovation Fund frameworks that carry milestone-linked
              disbursement conditions; any schedule slip that causes a milestone miss could trigger disbursement delays
              or claw-back provisions. The IEA Iron and Steel Technology Roadmap confirms that H2-DRI at scale is
              essential for net-zero steel by 2050, but the roadmap also emphasizes that it requires dramatic cost
              reduction across the full value chain to compete without sustained carbon policy support.
