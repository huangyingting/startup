          - type: callout
            title: Automotive concentration and EV-demand softness create a material premium-durability risk
            body: >-
              Approximately 60-70% of the booked offtake volume is linked to automotive OEMs and Tier-1 suppliers, whose
              Scope-3 steel budgets are sensitive to EV demand trajectories, OEM margin pressure, and regulatory
              timelines. Bloomberg, FT, and Seeking Alpha coverage through 2025-2026 documents real deceleration in
              European EV demand and OEM cost-cutting. If automotive customers defer acceptance or renegotiate premium
              pricing, Stegra faces simultaneous revenue and pricing pressure on the majority of its contracted book,
              with no retention-rate history and no spot-market fallback at equivalent margins.
