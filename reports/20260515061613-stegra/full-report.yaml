  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold
      - observable-by
      - monitoring-source
    rows:
      - - Green premium collapses below €100/t above HRC base
        - EBITDA margin falls to single digits; DCF EV drops below €3B
        - Quarterly steel pricing reports showing green vs. conventional HRC spread
        - FastMarkets, Argus Media, Platts daily steel price feeds
      - - Total construction capex exceeds €7B (original budget plus overruns)
        - Project IRR falls below equity cost of capital; dilutive financing required
        - Stegra press releases or EIB/EKN public disbursement notices signalling further capital need
        - Stegra investor updates, EIB project disclosures
      - - Credit event or covenant breach (lender standstill or waiver request)
        - Debt covenant triggers restructuring; equity junior to lender recovery
        - Formal announcement of waiver negotiations or restructuring proceedings
        - EIB, EKN public statements; financial press (FT, Bloomberg)
      - - Named OEM offtake commitment cancelled or not renewed
        - Revenue base insufficient for debt service coverage at current capital structure
        - Customer press releases; BMW/Volvo/Scania/Mercedes annual supply strategy updates
        - OEM sustainability reports, investor days, press releases
      - - EU CBAM policy rollback, long delay, or material scope reduction
        - Import protection advantage disappears; green steel cost-competitiveness reverts to subsidy-free basis
        - EC legislative tracker, Official Journal amendments, trade-partner consultation outcomes
        - EC Official Journal, Politico EU energy coverage, EUROFER regulatory updates
    notes: >-
      Kill triggers are price-sensitive and thesis-specific. Each trigger would impair the specific assumption that
      justifies the current implied EV/Mt-capacity multiple relative to conventional steel comparables. Quarterly
      monitoring is recommended minimum; commissioning period (2026–2027) warrants monthly review.
