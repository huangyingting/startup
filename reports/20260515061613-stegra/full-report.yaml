  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: 'Capital structure and funding history: a €9B project-finance landmark'
        blocks:
          - type: paragraph
            body: >-
              Stegra (formerly H2 Green Steel) has assembled one of the largest project-finance packages in European
              cleantech history. The company closed a €6.5 billion financing in January 2024, comprising approximately
              €2.1 billion in equity led by Altor and GIC, and approximately €4.2 billion in project debt from a
              syndicate of roughly 20 commercial banks led by ING, BNP Paribas, and SEB. The European Investment Bank
              contributed approximately €250 million within the debt tranche, and Sweden's export credit agency EKN
              provided additional export-credit guarantees, underlining state-backed support for the project's strategic
              importance to European industrial decarbonisation. SEK, Sweden's export credit bank, co-financed alongside
              EKN.


              Earlier equity rounds through 2023—Series A and Series B led by Vargas, Altor, and AMF with participation
              from IMAS, Hy24, Mercedes-Benz Group, and Scania—raised approximately €1 billion, establishing the
              anchor-investor base and validating the technology and offtake thesis ahead of Final Investment Decision.
              Named equity investors joining in January 2024 include Marcegaglia, Schaeffler, Hitachi Energy, Kingspan,
              Andra AP-fonden, Just Climate, Felix Capital, and individual investors Cristina Stenbeck and Daniel Ek.


              In April 2026, Stegra agreed to a further €1.4 billion in financing to bridge construction cost overruns
              and accelerate ramp to commercial production. This add-on round is a material signal that original cost
              estimates for the €4–5 billion Phase 1 plant required upward revision, a pattern observed prominently in
              other large-scale greenfield cleantech manufacturing projects. The EU Innovation Fund separately awarded
              approximately €250 million in non-dilutive grant funding, reducing the all-in capital burden and
              reflecting the project's alignment with European industrial decarbonisation policy. Total disclosed
              capital across all tranches exceeds €9 billion. The capital structure and all disclosed tranches are
              presented in TI004.
