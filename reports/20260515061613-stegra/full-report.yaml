      - number: '2.2'
        title: Green Steel Demand Drivers and Buyer Commitments
        blocks:
          - type: paragraph
            body: >-
              Demand for green steel—primary steel produced with near-zero CO2 emissions via green hydrogen DRI+EAF—is
              being activated by three distinct buyer motivations: regulatory compliance obligations, Scope-3 supply
              chain decarbonization mandates, and reputational positioning in sustainability-linked capital markets.
              Automotive OEMs represent the most concrete and near-term buyer segment, with several of Stegra's signed
              customers having published quantitative targets for supply chain emissions reductions backed by
              Science-Based Targets.

              BMW Group has publicly committed to reducing Scope-3 supply chain emissions and has named Stegra as a
              strategic green steel supplier. Scania has set targets for fossil-free steel procurement as part of its
              science-based targets aligned with the Paris Agreement. Mercedes-Benz has published a supply chain
              decarbonization roadmap targeting CO2 reduction across its supplier base, and Volvo Group has committed to
              science-based targets covering Scope-3 emissions including steel procurement. These commitments translate
              into budgeted procurement needs that drive documented premium willingness-to-pay for green-certified
              steel. BCG analysis identifies automotive OEMs as the most credit-worthy and committed early adopters of
              green steel due to these binding sustainability targets.

              Beyond automotive, IKEA has signed an offtake agreement with Stegra for green steel to be used in its
              products, signaling demand expansion into consumer goods manufacturing. Microsoft, committed to becoming
              carbon negative by 2030, is among Stegra's named customers, reflecting technology sector demand for green
              supply chain credentials. thyssenkrupp Materials Services has agreed to distribute Stegra's output,
              providing a critical channel into industrial manufacturing buyers beyond direct OEM contracts. ZF, a major
              global automotive supplier, has committed to Stegra's output, evidencing demand cascading from Tier-1 OEM
              mandates into Tier-2 supply chains.

              Market analysts estimate green steel demand could reach 50-100 million tonnes per year globally by 2030,
              driven by automotive, construction, and industrial manufacturing. The IEA net-zero emissions scenario
              requires rapid decarbonization of primary steelmaking, with hydrogen-based DRI playing a central role by
              2030-2050. ResponsibleSteel certification is increasingly required by automotive OEM procurement processes
              as a third-party verification mechanism, and the EU CSRD creates compliance-driven pull for certified
              green steel procurement across industrial supply chains. Competitor activity from SSAB HYBRIT,
              ArcelorMittal Sestao and Hamburg projects, and Salzgitter SALCOS confirms that the EU green steel segment
              is becoming a structured competitive market, supporting the view that Stegra's early-mover position and
              confirmed offtake agreements are a differentiated asset.
