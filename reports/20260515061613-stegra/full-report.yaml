      - number: '8.4'
        title: Bull / base / bear scenarios, thesis-break triggers, and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              Three scenario brackets define the investable range for Stegra equity.


              In the bull case, the Boden plant commissions broadly on schedule in 2027 and achieves nameplate capacity
              by 2028–2029. Green premium expands toward €400/t as European OEM supply chains lock in long-duration
              decarbonisation contracts, CBAM enforcement raises the import cost for fossil steel by €150–200/t, and EU
              ETS free allocation phases out on schedule. Revenue in 2030 reaches €5.5–6 billion at an 18–22% EBITDA
              margin. At an 8–10x forward EBITDA multiple, enterprise value reaches €8–10 billion—generating a 14–18%
              equity IRR against the January 2024 implied entry price. The bull case requires simultaneous execution
              across commissioning, premium pricing, and regulatory implementation.


              In the base case, commissioning slips 6–12 months and ramp is slower than planned due to electrolyzer
              supply-chain lead times and workforce ramp-up. Green premium stabilises at €250/t, electricity cost
              remains at approximately €35/MWh, and green hydrogen costs fall to approximately €2.5/kg by 2028. Revenue
              in 2030 reaches €4.5–5 billion at a 12–16% EBITDA margin. At a 6–7x multiple, enterprise value of €5–6
              billion is broadly consistent with the January 2024 implied post-money, implying a roughly flat equity
              return for early investors before accounting for dilution from the April 2026 add-on tranche. Project IRR
              in the base case is approximately 9–12%.


              The bear case is a Northvolt-parallel scenario: further cost overruns push total capex toward €7 billion,
              green premium erodes to €100/t as global green steel capacity grows faster than premium-paying demand, and
              EU CBAM faces political delays or implementation gaps. Revenue in 2030 reaches only €3–4 billion at a
              6–10% EBITDA margin. A 4–5x multiple on depressed EBITDA implies an enterprise value of €2–3 billion— well
              below total capital invested—meaning equity from the January 2024 round is materially impaired and the
              April 2026 additional tranche faces recovery risk. In this scenario, the Northvolt parallel becomes
              directly instructive for restructuring expectations.


              The five thesis-break triggers in TV005 should be monitored at minimum quarterly. The six final diligence
              asks in TV006 are pre-investment conditions; none is advisable to waive. The most urgent is a private
              data-room inspection of the actual project IRR model and the binding offtake agreement terms, both of
              which are inaccessible from public sources alone.
