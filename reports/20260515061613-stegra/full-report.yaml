      - number: '4.4'
        title: 'Financial risks and public disclosure gaps: cost overrun, H2 sensitivity, and opaque statements'
        blocks:
          - type: paragraph
            body: >-
              Stegra faces a compound financial risk profile combining pre-revenue cash burn, construction cost
              pressure, green hydrogen cost uncertainty, and near-zero public disclosure. The April 2026 €1.4 billion
              add-on financing is the most visible signal of cost overrun: while management described the tranche as
              bridging overruns and accelerating ramp, the underlying budget-versus-actual figures remain private,
              precluding precise assessment of the cost trajectory. Pre-revenue cash burn during construction is
              estimated at hundreds of millions of euros annually, a level that would exhaust even the substantial
              financing cushion within a few years if commercial ramp is further delayed.


              The Northvolt parallel is instructive and directly applicable. The Swedish lithium-ion battery startup
              secured over $15 billion in capital commitments but filed for bankruptcy in November 2024 after persistent
              manufacturing ramp delays and cost overruns. Although Stegra's project-finance structure imposes more
              lender oversight than Northvolt's more equity-heavy early capital raises, the broader lesson—that
              greenfield cleantech plants in Northern Scandinavia can exhaust very large financing cushions before
              reaching commercial scale—is a material risk for any investor underwriting a fixed-price
              cost-to-completion assumption.


              Public financial disclosure is minimal. No audited accounts exist, no revenue, burn, or runway data is
              public, and implied company valuation remains opaque. The financial covenants governing the €4.2 billion
              project-finance debt tranche are not disclosed. Green hydrogen cost trajectory remains the most
              consequential unresolved variable: if European green hydrogen does not fall below €2/kg before 2030,
              early-ramp margins will be structurally challenged and the green premium will need to exceed the top of
              current estimates to maintain adequate debt service coverage. These gaps are catalogued in TI005.
