  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Stegra's highest residual risks cluster around first-of-kind construction execution, technology validation
      failure, and pellet supply concentration; regulatory and market risks are real but partially mitigated by CBAM and
      ETS tailwinds already in force.
    data:
      columns:
        - Probability
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: Construction / EPC cost overrun
          values:
            - label: high
              tone: negative
              detail: April 2026 €1.4B additional raise signals overrun already materialising; megaproject base rate ≥70%.
            - label: critical
              tone: negative
              detail: Further overrun stretches debt covenants, dilutes equity, and delays commissioning.
            - label: medium
              tone: warning
              detail: SMS Group milestone contract and phased commissioning plan are in place but private.
            - label: high
              tone: negative
              detail: Residual risk remains high until independent cost-to-complete report is provided to investors.
        - label: Technology validation (800 MW electrolyzer + 100% H2-DRI)
          values:
            - label: medium
              tone: warning
              detail: Precedent-free at scale; comparable project delays have materialised at HYBRIT and others.
            - label: critical
              tone: negative
              detail: Technology failure delays commissioning, triggers covenant breach, and erodes green credential.
            - label: low
              tone: negative
              detail: No commercial-scale reference plant exists; mitigation relies on MIDREX advisory and phased ramp.
            - label: high
              tone: negative
              detail: Residual risk is high because the mitigation is a plan, not a demonstrated outcome.
        - label: CBAM / ETS policy weakening
          values:
            - label: medium
              tone: warning
              detail: CBAM in force from Jan 2026 but subject to political revision in ETS review cycle.
            - label: high
              tone: negative
              detail: A 3-year phase-out delay reduces green-premium payoff and compresses Stegra's IRR materially.
            - label: medium
              tone: warning
              detail: CBAM is enacted law; revision requires EU co-decision which creates procedural drag.
            - label: medium-high
              tone: warning
              detail: Residual risk is medium-high because enacted law is more durable than policy intent alone.
        - label: Iron ore pellet supply concentration (LKAB)
          values:
            - label: medium
              tone: warning
              detail: LKAB is a reliable supplier but provides no redundancy for Stegra's DR-grade pellet volume.
            - label: critical
              tone: negative
              detail: Supply disruption halts DRI production within days with no European substitute available.
            - label: low-medium
              tone: warning
              detail: Long-term LKAB supply agreement exists but terms and force-majeure provisions are private.
            - label: high
              tone: negative
              detail: No viable short-term European alternative for DR-grade pellets at 5 Mt/year throughput.
        - label: Pre-revenue cash burn and covenant stress
          values:
            - label: medium-high
              tone: warning
              detail: Any schedule slip beyond current baseline risks covenant breach without further equity injection.
            - label: critical
              tone: negative
              detail: Covenant breach or disbursement freeze would force emergency refinancing at distressed terms.
            - label: low
              tone: negative
              detail: Covenant terms and disbursement schedule are private; no public monitoring mechanism available.
            - label: high
              tone: negative
              detail: Residual risk is high because the key mitigation variables are completely opaque from public data.
    approximationNotes: >-
      Ordinal probability and impact ratings are derived from public sources, industry benchmarks, and analyst scenario
      analysis; they are not calibrated to internal models or private project data. Mitigation maturity ratings reflect
      publicly available evidence only.
    claimRefs:
      - CR003
      - CR008
      - CR014
      - CR015
      - CR016
      - CR018
      - CR025
      - CR033
      - CR039
  - id: FR002
    title: Risk transmission map
    type: dag
    layout: wide
    summary: >-
      Stegra's upstream construction, technology, and market risks all converge into commissioning delay as the primary
      transmission channel, which then flows through revenue miss and debt-covenant stress into equity erosion — meaning
      there is limited diversification across risk buckets at the equity level.
    data:
      nodes:
        - id: cost-overrun
          label: Construction cost overrun
          detail: April 2026 €1.4B raise is the primary public signal; further capex increase risks covenant breach.
          tone: negative
        - id: tech-failure
          label: Technology / H2-DRI validation failure
          detail: 100% H2-DRI and 800 MW electrolysis are unproven at 5 Mt/year; technical failure delays commissioning.
          tone: negative
        - id: cbam-delay
          label: CBAM / ETS policy weakening
          detail: Any extension of free-allocation or reduction of CBAM scope compresses the green-steel premium.
          tone: warning
        - id: supply-shock
          label: Pellet / supply chain disruption
          detail: LKAB single-supplier concentration; disruption halts DRI feedstock with no European backup.
          tone: warning
        - id: commissioning-delay
          label: Commissioning and production ramp delay
          detail: Downstream convergence point for construction, technology, and supply risks; delays milestone triggers.
          tone: negative
        - id: revenue-miss
          label: Revenue and green-premium miss
          detail: Delayed production start plus weak green premium pricing reduces revenue versus proforma.
          tone: negative
        - id: debt-stress
          label: Debt covenant stress
          detail: Cost overrun, commissioning delay, and revenue miss together erode headroom under EIB/EKN covenants.
          tone: negative
        - id: equity-erosion
          label: Equity value erosion
          detail: Combined cash burn extension and reduced revenue visibility compress residual equity value.
          tone: negative
      edges:
        - from: cost-overrun
          to: commissioning-delay
        - from: cost-overrun
          to: debt-stress
        - from: tech-failure
          to: commissioning-delay
        - from: tech-failure
          to: revenue-miss
        - from: cbam-delay
          to: revenue-miss
        - from: supply-shock
          to: commissioning-delay
        - from: supply-shock
          to: revenue-miss
        - from: commissioning-delay
          to: debt-stress
        - from: commissioning-delay
          to: revenue-miss
        - from: revenue-miss
          to: debt-stress
        - from: revenue-miss
          to: equity-erosion
        - from: debt-stress
          to: equity-erosion
    approximationNotes: >-
      The transmission map is qualitative and shows causal direction; it does not encode synthetic probability weights
      or correlation assumptions. Edge weights are equal for display purposes.
    claimRefs:
      - CR003
      - CR005
      - CR006
      - CR014
      - CR018
      - CR025
      - CR027
      - CR039
  - id: FR003
    title: Dependency map
    type: dag
    layout: wide
    summary: >-
      Stegra's operating core depends on five critical external nodes—SMS Group, LKAB, Lule River hydropower, EIB/EKN
      financing, and electrolyzer OEM suppliers—with little substitutability in any one of them; failure of any node
      transmits directly into commissioning timeline and covenant compliance.
    data:
      nodes:
        - id: sms-group
          label: SMS Group (EPC contractor)
          detail: Primary EPC responsibility for all six integrated industrial processes on the Boden greenfield site.
          tone: warning
        - id: lkab
          label: LKAB / Vale (DR-grade pellets)
          detail: DR-grade iron ore pellets (≥66% Fe) with LKAB as dominant supplier; Vale as limited backup.
          tone: negative
        - id: hydropower
          label: Lule River / Vattenfall hydropower
          detail: 800 MW continuous renewable electricity baseload sourced from Norrbotten hydropower grid.
          tone: warning
        - id: eib-ekn
          label: EIB / EKN financing stack
          detail: EIB long-term loans plus EKN Swedish export credit guarantees form the senior debt backbone.
          tone: warning
        - id: electrolyzer-oem
          label: Electrolyzer OEM suppliers
          detail: PEM and alkaline electrolyzer equipment suppliers; long lead times and no backup at 800 MW scale.
          tone: negative
        - id: rfnbo-regulator
          label: EU RFNBO / CBAM regulator
          detail: EU Commission certification and CBAM enforcement bodies determine green-credential recognition.
          tone: warning
        - id: stegra-core
          label: Stegra operations core
          detail: Boden plant integrating electrolysis, DRI, EAF, caster, and rolling; commercial production target 2026+.
          tone: neutral
        - id: oem-customers
          label: OEM customers (BMW, Scania, Mercedes, Volvo)
          detail: Automotive and industrial OEMs holding green steel letters of intent; represent primary revenue channel.
          tone: positive
      edges:
        - from: sms-group
          to: stegra-core
        - from: lkab
          to: stegra-core
        - from: hydropower
          to: stegra-core
        - from: eib-ekn
          to: stegra-core
        - from: electrolyzer-oem
          to: stegra-core
        - from: rfnbo-regulator
          to: stegra-core
        - from: stegra-core
          to: oem-customers
        - from: oem-customers
          to: stegra-core
    approximationNotes: >-
      The dependency map is directional and qualitative. The oem-customers to stegra-core edge represents revenue and
      cashflow feedback dependency (not a supply relationship). Relative node criticality is not encoded in edge width.
    claimRefs:
      - CR002
      - CR009
      - CR010
      - CR016
      - CR017
      - CR024
      - CR042
      - CR045
  - id: FR004
    title: Risk impact scenarios — estimated green steel margin compression
    type: bar
    layout: wide
    summary: >-
      Scenario analysis shows green steel margin is highly sensitive to the combination of construction delay, green H2
      cost stagnation, and CBAM weakening; the combined stress scenario produces deeply negative margins that would
      threaten project viability.
    data:
      items:
        - label: Base case (on schedule, CBAM holds, H2 at $2/kg by 2030)
          value: 85
          detail: Green steel margin ~€85/t; corresponds to healthy project economics and covenant compliance.
          tone: positive
        - label: 18-month construction delay only
          value: 52
          detail: Delay increases cash burn and defers revenue; margin compresses but project remains viable.
          tone: warning
        - label: H2 cost stranded at $4/kg by 2030
          value: 18
          detail: Elevated green H2 cost erodes margin significantly; project borderline at current green premium levels.
          tone: warning
        - label: CBAM phase-out delayed 3 years
          value: 35
          detail: Reduced carbon-cost differential narrows premium; margin lower but not thesis-breaking on its own.
          tone: warning
        - label: Capex overrun +30% above April 2026 baseline
          value: 28
          detail: Higher debt service compresses equity return; margin visible but investor IRR falls substantially.
          tone: warning
        - label: Combined stress (delay + H2 stagnation + CBAM weak)
          value: -38
          detail: Scenario produces deeply negative margin; project requires restructuring or additional equity injection.
          tone: negative
    approximationNotes: >-
      Margin estimates are illustrative scenarios derived from BNEF and IEA green steel cost-curve analysis and BCG
      green steel economics frameworks. They are not drawn from Stegra internal models or private project data. Values
      represent estimated net margin per tonne of green steel under each scenario assumption set; all other variables
      held at base case.
    claimRefs:
      - CR008
      - CR018
      - CR022
      - CR023
      - CR025
      - CR027
      - CR028
      - CR030
  - id: FV001
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The track recommendation emerges from the intersection of strong institutional validation and stretched
      pre-revenue valuation, with commissioning execution as the primary swing factor between base and bear case.
    data:
      nodes:
        - id: capital
          label: €9B+ capital secured
          detail: Jan 2024 €6.5B close plus Apr 2026 €1.4B add-on; EIB, EKN, EU Innovation Fund, 20-bank syndicate
          tone: positive
        - id: customers
          label: Named OEM offtake
          detail: BMW, Mercedes-Benz, Scania, Volvo, IKEA, Microsoft — intent letters; binding terms not confirmed publicly
          tone: positive
        - id: regulation
          label: EU CBAM and ETS backstop
          detail: CBAM protection from 2026; ETS free-allocation phase-out creates long-run cost penalty for fossil steel
          tone: positive
        - id: overrun
          label: Apr 2026 overrun signal
          detail: €1.4B add-on before first commissioning implies original €4–5B budget was breached
          tone: warning
        - id: northvolt
          label: Northvolt cautionary parallel
          detail: Vargas-backed Swedish cleantech at same stage peaked at $12B then went bankrupt; direct read-across
          tone: warning
        - id: valuation
          label: Implied €5–6B post-money
          detail: EV/Mt-capacity ~$1,100/t matches Nucor/SSAB — profitable listed peers with full production track records
          tone: warning
        - id: decision
          label: Track recommendation
          detail: Stay engaged; define kill triggers; require private data-room before any new capital commitment
          tone: neutral
      edges:
        - from: capital
          to: decision
        - from: customers
          to: decision
        - from: regulation
          to: decision
        - from: overrun
          to: decision
        - from: northvolt
          to: decision
        - from: valuation
          to: decision
    approximationNotes: >-
      Flow diagram is a qualitative decision-logic summary; it does not represent a quantitative weighting of factors.
      Node tones reflect directional evidence, not binary pass/fail gates.
    claimRefs:
