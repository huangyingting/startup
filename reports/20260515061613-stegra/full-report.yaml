              shows greenfield cleantech plants can exhaust large capital cushions
            body: >-
              The €1.4B April 2026 bridge round, framed as covering cost overruns and accelerating ramp, directly
              parallels the pattern seen at Northvolt, which secured over $15B in capital before filing for bankruptcy
              in November 2024 after ramp delays and cost overruns. Stegra's project-finance structure provides more
              lender oversight, but the underlying risk—that actual construction and commissioning costs for large
              greenfield cleantech plants routinely exceed initial estimates—remains live. The hydrogen cost trajectory
              adds a second dimension of margin risk that is not resolved by securing additional capital.
            calloutType: risk
            claimRefs:
              - CI009
              - CI028
              - CI029
              - CI038
              - CI039
              - CI043
          - type: callout
            title: >-
              Green hydrogen cost trajectory and construction cost-to-completion are the two variables that most
              determine whether Stegra can service its debt at planned production levels
            body: >-
              The €4.2B project-finance debt package requires reliable debt service coverage at scale. Any investor or
              lender updating their underwriting should obtain: (1) Stegra's internal green hydrogen cost model and PPA
              terms for the Boden plant; (2) the revised construction budget versus the original FID case; (3)
              contracted offtake volumes and floor pricing per customer; and (4) the current covenant package. Without
              these, the wide range in unit economics ($480–720/t opex) prevents a reliable margin estimate.
