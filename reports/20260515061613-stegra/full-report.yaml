            title: April 2026 €1.4B additional financing is the clearest public cost-overrun signal in the record
            body: >-
              Raising €1.4 billion in additional financing before first commissioning—without a corresponding production
              ramp announcement—is the primary public indicator of budget overrun pressure. Stegra's original Phase 1
              budget was approximately €4–5 billion; incremental fundraising of this scale implies total committed
              capital now exceeds €5 billion and possibly approaches €6 billion. This is not unusual in first-of-kind
