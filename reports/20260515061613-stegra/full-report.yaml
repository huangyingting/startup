  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive Landscape: Green Steel Pioneer, Incumbent Retrofitters, and Novel-Tech Alternatives'
        blocks:
          - type: paragraph
            body: >-
              Stegra operates in a competitive landscape that splits into three distinct segments. The first is the
              green-steel pioneer segment, comprising pure-play startups and joint ventures that have committed to
              green-hydrogen DRI from inception — SSAB HYBRIT, Salzgitter SALCOS, GravitHy, and Blastr Green Steel sit
              here alongside Stegra itself. The second is the incumbent retrofit segment, where the world's largest
              conventional steel producers — ArcelorMittal, thyssenkrupp, Nippon Steel, POSCO, Baowu — are adding DRI or
              hydrogen capability to existing blast-furnace operations while managing vast legacy asset bases. The third
              is the novel-technology segment, where companies such as Boston Metal are pursuing Molten Oxide
              Electrolysis, a pathway that bypasses hydrogen entirely and reduces iron ore directly using electricity.
              These three segments matter because they create different timelines, cost structures, and customer
              propositions. Pure-play pioneers can design for green-hydrogen from the ground up, but they face capital,
              scale, and execution risk without the production cash flow of an incumbent. Incumbents can fund
              decarbonisation from operating profits and existing customer relationships, but they carry the drag of
              legacy assets, retrofit complexity, and capital-allocation competition across geographies.
              Novel-technology players are the most speculative: if costs fall and scale proves out, they could
              eventually challenge both the DRI-H2 pathway and the BF-BOF baseline, but most remain at pilot scale
              through 2026.
            claimRefs:
