              BNEF and IEA data through early 2026 show European green hydrogen at $3–6/kg, more than double the roughly
              $1.5/kg cost target that makes Stegra's steel cost-competitive without carbon policy support. Even if
              Stegra commissions on schedule and at budget, the project's economics depend on continued electrolyzer
              cost reductions, stable cheap renewable power in northern Sweden, and sustained CBAM enforcement to bridge
              the remaining gap. These three variables are substantially outside Stegra management's control. Investors
              should not treat the green H2 cost risk as solved by the EIB financing or Innovation Fund grant—it is an
