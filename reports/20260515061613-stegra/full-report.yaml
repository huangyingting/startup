  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: 'Valuation overview: €5–6B implied, stretched but not indefensible against listed comparables'
        blocks:
          - type: paragraph
            body: >-
              Stegra has assembled one of the largest project-finance packages in European cleantech history. The
              January 2024 close brought €6.5 billion in total committed capital—approximately €2.1 billion in equity
              and €4.2 billion in senior project debt from a syndicate of roughly twenty commercial banks, supported by
              a €250 million EIB concessional loan and additional EKN export-credit guarantees. A further €1.4 billion
              was agreed in April 2026, bringing total disclosed capital to more than €9 billion. Press reporting on the
              January 2024 equity component implies a post-money equity valuation of approximately €5–6 billion,
              equivalent to roughly $5.5 billion at prevailing exchange rates. Stegra has not officially published a
              confirmed post-money figure, making this an inferred estimate rather than a disclosed valuation.


              At this implied equity value, Stegra's enterprise-value-to-installed-capacity ratio approximates $1,100
              per tonne of nameplate Phase 1 output—comparable to profitable US EAF leader Nucor (~$1,150/t) and Swedish
              fossil-free pioneer SSAB (~$1,200/t), but nearly four times the implied capacity multiple of ArcelorMittal
              (~$315/t at 70 Mt and ~$22 billion market cap). The valuation premium over ArcelorMittal reflects the
              market pricing Stegra as a first-mover in certified green steel rather than as a commodity steel producer.
              For that premium to be realised, Stegra must commission on schedule, sustain the green steel price
              premium, and manage hydrogen input costs on a trajectory consistent with its internal economics model.


              The investment call is track rather than buy. The quality of the institutional syndicate, the named OEM
              customer relationships with BMW, Mercedes-Benz, Scania, Volvo, and IKEA, and the EU regulatory backstop
              via CBAM and ETS are genuine positive signals. However, the project is pre-revenue as of the report date,
              no audited financial statements are publicly available, and the April 2026 add-on financing is the
              clearest public cost-overrun signal in the record. Confidence is medium. Risk rating is high. Valuation
              stance is stretched relative to conventional steel comparables at equivalent commissioning stage.
