figures:
  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Stegra's highest residual risks cluster around first-of-kind construction execution, technology validation
      failure, and pellet supply concentration; regulatory and market risks are real but partially mitigated by CBAM
      and ETS tailwinds already in force.
    data:
      columns:
        - Probability
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: Construction / EPC cost overrun
          values:
            - label: high
              tone: negative
              detail: April 2026 €1.4B additional raise signals overrun already materialising; megaproject base rate ≥70%.
            - label: critical
              tone: negative
              detail: Further overrun stretches debt covenants, dilutes equity, and delays commissioning.
            - label: medium
              tone: warning
              detail: SMS Group milestone contract and phased commissioning plan are in place but private.
            - label: high
              tone: negative
              detail: Residual risk remains high until independent cost-to-complete report is provided to investors.
        - label: Technology validation (800 MW electrolyzer + 100% H2-DRI)
          values:
            - label: medium
              tone: warning
              detail: Precedent-free at scale; comparable project delays have materialised at HYBRIT and others.
            - label: critical
              tone: negative
              detail: Technology failure delays commissioning, triggers covenant breach, and erodes green credential.
            - label: low
              tone: negative
              detail: No commercial-scale reference plant exists; mitigation relies on MIDREX advisory and phased ramp.
            - label: high
              tone: negative
              detail: Residual risk is high because the mitigation is a plan, not a demonstrated outcome.
        - label: CBAM / ETS policy weakening
          values:
            - label: medium
              tone: warning
              detail: CBAM in force from Jan 2026 but subject to political revision in ETS review cycle.
            - label: high
              tone: negative
              detail: A 3-year phase-out delay reduces green-premium payoff and compresses Stegra's IRR materially.
            - label: medium
              tone: warning
              detail: CBAM is enacted law; revision requires EU co-decision which creates procedural drag.
            - label: medium-high
              tone: warning
              detail: Residual risk is medium-high because enacted law is more durable than policy intent alone.
        - label: Iron ore pellet supply concentration (LKAB)
          values:
            - label: medium
              tone: warning
              detail: LKAB is a reliable supplier but provides no redundancy for Stegra's DR-grade pellet volume.
            - label: critical
              tone: negative
              detail: Supply disruption halts DRI production within days with no European substitute available.
            - label: low-medium
              tone: warning
              detail: Long-term LKAB supply agreement exists but terms and force-majeure provisions are private.
            - label: high
              tone: negative
              detail: No viable short-term European alternative for DR-grade pellets at 5 Mt/year throughput.
        - label: Pre-revenue cash burn and covenant stress
          values:
            - label: medium-high
              tone: warning
              detail: Any schedule slip beyond current baseline risks covenant breach without further equity injection.
            - label: critical
              tone: negative
              detail: Covenant breach or disbursement freeze would force emergency refinancing at distressed terms.
            - label: low
              tone: negative
              detail: Covenant terms and disbursement schedule are private; no public monitoring mechanism available.
            - label: high
              tone: negative
              detail: Residual risk is high because the key mitigation variables are completely opaque from public data.
    approximationNotes: >-
      Ordinal probability and impact ratings are derived from public sources, industry benchmarks, and analyst
      scenario analysis; they are not calibrated to internal models or private project data. Mitigation maturity
      ratings reflect publicly available evidence only.
