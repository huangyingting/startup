  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: covenant-risk
      missingEvidence: >-
        EIB and EKN financing agreement covenant terms, commissioning milestone triggers, disbursement
        schedule, waiver provisions, and current covenant headroom.
      whyItMatters: >-
        Without covenant details, external investors cannot assess how much schedule slippage Stegra can
        absorb before triggering a default event or requiring emergency equity injection, which is the
        most material near-term equity risk.
      diligencePath: >-
        Request the full EIB loan agreement, EKN guarantee term sheet, and any waiver correspondence from
        Stegra's legal and finance team as a pre-investment condition; obtain independent legal review of
        milestone definitions and force-majeure provisions.
      relatedQuestionRefs:
        - QR012
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: capex-comparison
      missingEvidence: >-
        Stegra's internal capex-per-tonne-of-annual-capacity figure compared to conventional integrated
        blast-furnace steel plants and other H2-DRI projects globally, on a like-for-like basis.
      whyItMatters: >-
        Without a capex intensity benchmark, investors cannot quantify whether Stegra's cost overrun
        reflects systemic technology premium, site-specific issues, or EPC execution failure, which
        materially affects return modelling.
      diligencePath: >-
        Request Stegra's internal capital cost breakdown per tonne of annual capacity and compare to
        published greenfield integrated steel plant benchmarks from IEA, BCG, and Kearney.
      relatedQuestionRefs:
        - QR024
        - QR030

    - type: private-evidence-only
      severity: material
      topic: offtake-binding
      missingEvidence: >-
        Legally binding offtake agreement terms including committed volumes, pricing formulae, duration,
        penalty provisions, and force-majeure clauses for Stegra's OEM customers.
      whyItMatters: >-
        The revenue and cash-flow model is only as durable as its committed revenue base. Non-binding
        LOIs can be withdrawn when OEM budgets tighten, leaving Stegra with completed capacity but no
        secured revenue stream at the green premium required for debt service.
      diligencePath: >-
        Require Stegra to provide redacted versions of its OEM offtake agreements including minimum
        volume take-or-pay commitments, pricing indexation, and break provisions before closing.
      relatedQuestionRefs:
        - QR014

    - type: missing-source
      severity: material
      topic: electricity-supply
      missingEvidence: >-
        Stegra's power purchase agreement structure for the 800 MW load, including pricing basis (fixed vs.
        indexed), duration, counterparty, and provisions for supply interruption or grid-price spikes.
      whyItMatters: >-
        Electricity is the dominant input cost in green H2 production; undisclosed electricity pricing
        terms make it impossible to verify whether Stegra's green H2 cost trajectory to $1.5/kg is
        achievable under the actual contracted electricity economics.
      diligencePath: >-
        Request the full electricity supply and PPA documentation including pricing schedules, duration,
        and grid-backup provisions; commission an independent electricity cost sensitivity model.
      relatedQuestionRefs:
        - QR011
        - QR017
