  - id: technology-and-supply-chain-risks
    title: Electrolyzer scale, H2-DRI process risk, and pellet supply are the least-forgiving technical dependencies
    body: >-
      Stegra's planned 800 MW electrolyzer capacity would represent the largest single-site hydrogen electrolyzer
      installation globally as of 2026 by a substantial margin above any operating industrial precedent. At this
      scale, PEM and alkaline electrolyzer stack degradation rates, planned maintenance downtime, and unplanned grid
      interruptions could materially reduce electrolyzer availability, forcing the plant to either reduce production
      or purchase emergency fossil-grid electricity that dilutes its green certification. Neither technology supplier
      category has published long-run reliability curves at 800 MW under continuous steelmaking loads, because no such
      installation has operated before.

      The DRI process risk is equally fundamental. Conventional H2-DRI processes from MIDREX and Tenova Energiron
      operate using 30–70% hydrogen blends with natural gas. Stegra targets approximately 100% hydrogen reduction,
      which is commercially unproven at 5 Mt/year throughput. HYBRIT (SSAB/LKAB/Vattenfall) and GravitHy are the
      closest parallels, but neither has reached commercial production at comparable capacity. The process chemistry
      at 100% H2 produces sponge iron with higher temperature profiles and different metallisation characteristics
      than NG-blend DRI; managing this consistently at scale is an active engineering challenge, not a solved
      industrial problem.

      Iron ore pellet quality is a hard supply-chain constraint. H2-DRI requires direct-reduction-grade pellets with
      iron content of at least 66% and minimal silica and alumina gangue; standard blast-furnace pellets are unusable.
      LKAB's Kiruna operation is Stegra's most proximate supplier and a geopolitical asset, but LKAB's DR-grade output
      is shared across SSAB (HYBRIT), European EAF producers, and global export markets. Any LKAB supply disruption—
      labor action, mine accident, or logistics failure on the Malmbanan ore railway—directly threatens Stegra's
      feedstock with no immediately available European substitute.

      Green hydrogen production costs remain structurally elevated relative to the economics Stegra's thesis requires.
      BNEF and IEA data through early 2026 show European green H2 at $3–6/kg, well above the roughly $1.5/kg target
      that makes Stegra's steel cost-competitive with conventional blast-furnace steel at neutral carbon prices.
      Closing that gap requires sustained electrolyzer capital cost reductions and stable cheap renewable power, both
      of which carry independent execution and macro risk. Electricity price sensitivity analysis shows that a 10%
      rise in the Swedish grid price adds approximately 5–7% to green H2 production cost at this scale.
