    type: dag
    layout: wide
    summary: >-
      Stegra's operating core depends on five critical external nodes—SMS Group, LKAB, Lule River hydropower, EIB/EKN
      financing, and electrolyzer OEM suppliers—with little substitutability in any one of them; failure of any node
      transmits directly into commissioning timeline and covenant compliance.
    data:
      nodes:
        - id: sms-group
          label: SMS Group (EPC contractor)
          detail: Primary EPC responsibility for all six integrated industrial processes on the Boden greenfield site.
          tone: warning
        - id: lkab
          label: LKAB / Vale (DR-grade pellets)
          detail: DR-grade iron ore pellets (≥66% Fe) with LKAB as dominant supplier; Vale as limited backup.
          tone: negative
        - id: hydropower
          label: Lule River / Vattenfall hydropower
          detail: 800 MW continuous renewable electricity baseload sourced from Norrbotten hydropower grid.
          tone: warning
        - id: eib-ekn
          label: EIB / EKN financing stack
          detail: EIB long-term loans plus EKN Swedish export credit guarantees form the senior debt backbone.
          tone: warning
        - id: electrolyzer-oem
          label: Electrolyzer OEM suppliers
          detail: PEM and alkaline electrolyzer equipment suppliers; long lead times and no backup at 800 MW scale.
          tone: negative
        - id: rfnbo-regulator
          label: EU RFNBO / CBAM regulator
          detail: EU Commission certification and CBAM enforcement bodies determine green-credential recognition.
          tone: warning
        - id: stegra-core
          label: Stegra operations core
          detail: Boden plant integrating electrolysis, DRI, EAF, caster, and rolling; commercial production target 2026+.
          tone: neutral
        - id: oem-customers
          label: OEM customers (BMW, Scania, Mercedes, Volvo)
          detail: Automotive and industrial OEMs holding green steel letters of intent; represent primary revenue channel.
          tone: positive
      edges:
        - from: sms-group
          to: stegra-core
        - from: lkab
          to: stegra-core
        - from: hydropower
          to: stegra-core
        - from: eib-ekn
          to: stegra-core
        - from: electrolyzer-oem
          to: stegra-core
        - from: rfnbo-regulator
          to: stegra-core
        - from: stegra-core
          to: oem-customers
        - from: oem-customers
          to: stegra-core
    approximationNotes: >-
      The dependency map is directional and qualitative. The oem-customers to stegra-core edge represents revenue
      and cashflow feedback dependency (not a supply relationship). Relative node criticality is not encoded in edge
      width.
    claimRefs:
      - CR002
      - CR009
      - CR010
      - CR016
      - CR017
      - CR024
      - CR042
      - CR045

  - id: FR004
    title: Risk impact scenarios — estimated green steel margin compression
    type: bar
    layout: wide
    summary: >-
      Scenario analysis shows green steel margin is highly sensitive to the combination of construction delay,
      green H2 cost stagnation, and CBAM weakening; the combined stress scenario produces deeply negative margins
      that would threaten project viability.
    data:
      items:
        - label: Base case (on schedule, CBAM holds, H2 at $2/kg by 2030)
          value: 85
          detail: Green steel margin ~€85/t; corresponds to healthy project economics and covenant compliance.
          tone: positive
        - label: 18-month construction delay only
          value: 52
          detail: Delay increases cash burn and defers revenue; margin compresses but project remains viable.
          tone: warning
        - label: H2 cost stranded at $4/kg by 2030
          value: 18
          detail: Elevated green H2 cost erodes margin significantly; project borderline at current green premium levels.
          tone: warning
        - label: CBAM phase-out delayed 3 years
          value: 35
          detail: Reduced carbon-cost differential narrows premium; margin lower but not thesis-breaking on its own.
          tone: warning
        - label: Capex overrun +30% above April 2026 baseline
          value: 28
          detail: Higher debt service compresses equity return; margin visible but investor IRR falls substantially.
          tone: warning
        - label: Combined stress (delay + H2 stagnation + CBAM weak)
          value: -38
          detail: Scenario produces deeply negative margin; project requires restructuring or additional equity injection.
          tone: negative
    approximationNotes: >-
      Margin estimates are illustrative scenarios derived from BNEF and IEA green steel cost-curve analysis and BCG
      green steel economics frameworks. They are not drawn from Stegra internal models or private project data.
      Values represent estimated net margin per tonne of green steel under each scenario assumption set; all other
      variables held at base case.
    claimRefs:
      - CR008
      - CR018
      - CR022
      - CR023
      - CR025
      - CR027
      - CR028
      - CR030

callouts:
  - calloutType: risk
    title: Northvolt's collapse is the most direct cautionary template for Stegra investors
    body: >-
      Northvolt—a battery gigafactory in northern Sweden backed by the same Vargas AB holding company—filed for
      bankruptcy in November 2024 after failing to scale production, accumulating cost overruns, and suffering
      quality failures. Stegra is not Northvolt; the technology, sector, and EPC structure differ materially. But
      the pattern of a first-of-kind Swedish cleantech megaproject under Vargas sponsorship, seeking capital at
      scale before commercial production is validated, now carries a failed precedent. Investors should require
      specific and demonstrable evidence that Stegra's cost-control mechanisms, commissioning sequencing, and
      governance oversight are qualitatively different from what Northvolt exhibited at the equivalent project stage.
    claimRefs:
      - CR005
      - CR006
      - CR007

  - calloutType: risk
    title: April 2026 €1.4B additional financing is the clearest public cost-overrun signal in the record
    body: >-
      Raising €1.4 billion in additional financing before first commissioning—without a corresponding production
      ramp announcement—is the primary public indicator of budget overrun pressure. Stegra's original Phase 1 budget
      was approximately €4–5 billion; incremental fundraising of this scale implies total committed capital now
      exceeds €5 billion and possibly approaches €6 billion. This is not unusual in first-of-kind megaproject
      history, but it does mean that every subsequent financing event and commissioning milestone must be interpreted
      in the context of a project that is already running above initial budget, with private debt-covenant headroom
      that cannot be externally verified.
    claimRefs:
      - CR003
      - CR038
      - CR039

  - calloutType: insight
    title: Green H2 cost gap is the largest single technical-economic risk and cannot be mitigated by construction execution alone
    body: >-
      BNEF and IEA data through early 2026 show European green hydrogen at $3–6/kg, more than double the roughly
      $1.5/kg cost target that makes Stegra's steel cost-competitive without carbon policy support. Even if Stegra
      commissions on schedule and at budget, the project's economics depend on continued electrolyzer cost
      reductions, stable cheap renewable power in northern Sweden, and sustained CBAM enforcement to bridge the
      remaining gap. These three variables are substantially outside Stegra management's control. Investors should
      not treat the green H2 cost risk as solved by the EIB financing or Innovation Fund grant—it is an ongoing
      structural exposure that tracks across the full operating life of the asset.
    claimRefs:
      - CR018
      - CR022
      - CR025
      - CR043

