  - id: TR003
    title: Partner / dependency risk register
    columns:
      - dependency
      - criticality
      - alternative
      - kill-criteria
    rows:
      - - SMS Group (primary EPC contractor)
        - critical
        - Danieli or Primetals for partial scope substitution at significant additional cost and delay
        - SMS Group declares force majeure, becomes insolvent, or misses first DRI tapping milestone by >6 months
      - - LKAB (DR-grade iron ore pellets, ≥66% Fe)
        - critical
        - Vale limited European DR-grade volumes; no other supplier can supply at Stegra's planned throughput
        - LKAB pellet delivery falls below committed volume for >3 consecutive months or Fe-grade falls below 66% spec
      - - Lule River hydropower grid (800 MW continuous baseload)
        - critical
        - Swedish national grid at significantly higher average price; renewable fraction uncertain outside hydro
        - Renewable electricity fraction falls below 90% for >6 months or average grid price exceeds €60/MWh structurally
      - - EIB and EKN financing package
        - high
        - Refinancing in commercial markets at substantially higher cost; equity issuance at dilutive valuation
        - Material covenant breach declared or disbursement schedule delayed more than 12 months from contractual schedule
      - - PEM and alkaline electrolyzer OEM suppliers
        - high
        - Competing OEM suppliers (Nel Hydrogen, ITM Power, thyssenkrupp Nucera) with 24+ month lead times
        - Electrolyzer stack availability falls more than 20% below rated capacity for more than 6 consecutive months
    notes: >-
      Criticality ratings are based on substitutability analysis using public supplier data as of May 2026. Kill-
      criteria thresholds are illustrative diligence benchmarks, not contractual or internally confirmed triggers.
      Private supply agreements with LKAB and electrolyzer OEMs may contain different force-majeure and tolerance
      provisions than those described here.
