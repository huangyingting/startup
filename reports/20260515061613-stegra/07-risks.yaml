  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - risk-bucket
      - kill-criterion
      - current-status
    rows:
      - - Construction and EPC execution
        - Cumulative capex increase >€500M above April 2026 financing baseline without corresponding schedule pull-forward or confirmed capacity expansion
        - Monitoring required — April 2026 €1.4B raise has occurred; next signal is commissioning date announcement
      - - Technology validation (H2-DRI and electrolyzer)
        - Electrolyzer availability below 75% of rated 800 MW capacity for more than 3 consecutive months post-commissioning
        - Not yet triggered — pre-commissioning stage; monitor at first production ramp
      - - Market and customer (green premium durability)
        - Two or more major OEM customers withdraw, materially downgrade, or defer green steel sustainability procurement commitments
        - Not triggered — LOIs in place with BMW, Scania, Mercedes, Volvo; monitor OEM Scope-3 budget cycles
      - - Regulatory and CBAM
        - EU political decision to extend ETS free-allocation phase-out by more than 3 years or explicitly exclude Stegra-grade flat products from CBAM scope
        - Not triggered — CBAM mandatory from Jan 2026; monitor European Parliament ETS reform debates
      - - Financial and covenant
        - EIB or EKN declares covenant breach or Stegra requests debt waiver without a committed refinancing path
        - Cannot verify from public sources — this is a blocking private diligence item
    notes: >-
      Kill criteria are defined as monitorable from public news, regulator publications, and management diligence
      materials rather than from intuition. The financial covenant row cannot be monitored publicly and requires
      specific investor diligence against the private financing documentation.
