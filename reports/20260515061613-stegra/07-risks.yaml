  - id: market-and-customer-risks
    title: Green-premium durability and a potential capacity glut are the medium-term market risks
    body: >-
      Stegra's investment thesis requires automotive OEMs and industrial buyers to pay a sustainable premium of
      roughly €100–300 per tonne above conventional steel prices for certified green steel. That premium rests on two
      policy props: EU ETS carbon prices above approximately €60–80/tonne and CBAM enforcement that ensures imported
      conventional steel pays the equivalent implicit carbon cost. BMW Group, Scania, Mercedes-Benz, and Volvo Group
      have signed letters of intent or published sustainability procurement commitments for green steel. But these
      are not binding volume-committed offtake contracts with price floors and volume schedules; they are intent
      signals that can be repriced or delayed when OEM capital budgets tighten.

      EV demand softened materially in 2024–2025, compressing OEM margins and leading several automakers to defer or
      scale back Scope-3 supplier investment programs. S&P Global and Bloomberg tracked this dynamic through 2025 and
      analysts noted that the willingness to pay a 15–20% premium for green steel could weaken precisely when Stegra
      begins its production ramp in 2026–2027. If OEM margins remain compressed or the EV recovery stalls, binding
      long-term green steel contracts at current premium levels may prove harder to close than current LOI signals
      suggest.

      Capacity glut risk by 2030 is also real and has multiple contributors. HYBRIT (SSAB/LKAB/Vattenfall) targets
      commercial volumes by 2026–2027; ArcelorMittal's Hamburg DRI plant, thyssenkrupp Steel's Duisburg DRI
      expansion, and GravitHy in France all target commercial scale by 2028–2030. If three or four of these
      projects reach commercial-scale production simultaneously with Stegra's Phase 1 ramp, aggregate European green
      steel supply could exceed near-term committed demand, compressing the scarcity premium. Stegra's 5 Mt/year
      Phase 1 target is substantial relative to projected 2030 green steel demand; simultaneous competitor ramp-ups
      change the pricing equilibrium materially.

      Chinese conventional steel overcapacity adds a structural floor risk to the entire analysis. Global steel
      prices have remained depressed by Chinese export pressure since 2022, keeping the base price against which the
      green premium is calculated lower than historical ranges. Scope-3 commitments from Tier-1 automotive suppliers
      such as ZF and indirect customers such as Microsoft have broadened the potential buyer base for green steel,
      but cannot fully offset the macro pressure from Chinese overcapacity on conventional steel pricing.
