  - id: TR004
    title: People / execution risk register
    columns:
      - risk
      - role / team
      - exposure
      - mitigation
    rows:
      - - Loss of founding CEO or core management team continuity during construction ramp
        - C-suite / executive leadership
        - critical — intimate knowledge of EPC milestones, customer relationships, and financing covenants
        - Succession plan not publicly disclosed; key-person provisions in financing documents are private
      - - Vargas AB governance concentration and Northvolt-failure institutional lessons not yet demonstrated
        - Board / sponsor-level governance
        - high — Vargas controls majority vote; Northvolt precedent shows latency of sponsor intervention
        - EIB and Innovation Fund governance covenants require independent board representation as a disbursement condition
      - - EPC project management depth under cost pressure during simultaneous multi-process commissioning
        - Engineering and project management team
        - high — first-of-kind complexity requires rare integrated DRI and EAF project management talent
        - SMS Group formal EPC responsibility; milestone-linked payment structure creates aligned incentives
      - - Operations ramp technical talent pool for H2-DRI and 800 MW electrolyzer systems
        - Production and commissioning engineers
        - high — skilled green-H2 DRI operators do not yet exist at commercial scale in Europe
        - Early hiring pipeline with MIDREX advisory support; academic partnerships for training development
      - - Labor and industrial relations management in Boden during multi-year construction
        - Workforce and HR
        - medium — Swedish union environment requires proactive and structured engagement from project inception
        - Long-term employment commitments to Boden municipality; community benefit agreements and local hiring programs
    notes: >-
      People and governance risk is assessed from public sources; private succession plans, covenant terms, and board
      composition details are not publicly verified. The Northvolt precedent is the most directly relevant benchmark
      for assessing Vargas governance risk at this project stage.
