  - id: section-funding-capital-stack
    title: Funding and Capital Stack
    body: >
      Stegra has assembled one of the largest financing packages ever secured by a European industrial startup. As of
      January 2024, the company had secured approximately €6.5 billion in total financing, comprising both equity and
      debt tranches. This capital base was constructed through a series of equity rounds joined by a diverse set of
      strategic and financial investors, combined with a major project finance debt package backed by public development
      institutions and a commercial bank syndicate.

      The debt component is significant and structurally important: the European Investment Bank (EIB) is a lender,
      as is Sweden's export credit agency EKN, alongside a syndicate of commercial banks. This public-private debt
      structure is consistent with the project finance model typical for large industrial infrastructure: the
      long-duration committed offtake agreements underpin the debt covenants, and the project's green credentials
      make it eligible for EU public finance support under the Innovation Fund and InvestEU programs.

      In April 2026, Stegra announced an additional €1.4 billion in financing, bringing the publicly stated total to
      approximately €7.9 billion. This latest tranche was described as supporting continued construction and
      operations ramp. The equity investors in the latest round were not fully enumerated in public materials
      available for this review.

      The company is private and has not disclosed a formal post-money valuation, making equity price-per-share and
      dilution analysis dependent on data room access. The absence of a public valuation is standard for project-
      finance-structured industrial startups at this stage. Total headcount is not precisely disclosed in public
      materials; the company was reported to be scaling hiring through 2024 and 2025 in preparation for plant
      operations. Revenue remains pre-commercial pending first steel production.
