  - id: section-milestones-construction
    title: Milestones and Construction Progress
    body: >
      Stegra's development trajectory from founding to active plant construction represents one of the fastest
      financing and construction ramp-ups in European industrial history. The company was incorporated in 2021 and
      within three years had secured €6.5 billion in committed financing and broken ground on the Boden facility.

      Northern Sweden was deliberately selected for the plant site: the Boden region offers access to Sweden's
      extensive hydropower grid, proximity to high-grade iron ore pellets from LKAB's mines in Kiruna and Gällivare,
      a supportive municipal government (Boden municipality is a noted stakeholder), and cold climate advantages for
      electrolyzer cooling. These site factors directly address key technical and cost risks for a hydrogen-DRI plant.

      Physical construction has accelerated through 2025 and 2026. In March 2026, the DRI tower at the Boden site
      surpassed 100 meters in height — a structural milestone that marks the plant progressing from civil works to
      the installation of core process equipment. In April 2026, the final electrolyzer module was installed,
      completing the electrolyzer assembly phase ahead of commissioning. These milestones are consistent with a
      targeted first steel production date of 2026–2027.

      The regulatory and policy environment has also developed favorably. The EU's Carbon Border Adjustment Mechanism
      entered its transitional phase in 2023 and is scheduled for full implementation in 2026, creating a direct
      cost headwind for conventional steel imports and a structural tailwind for green steel producers like Stegra.
      The EU ETS carbon price trajectory further supports the economics of decarbonized production. EU Innovation
      Fund grants and EIB lending represent the public finance system actively supporting the energy transition in
      heavy industry, and Stegra is a beneficiary of that policy alignment.

      The company has experienced the complexity inherent to first-of-a-kind industrial projects: multi-year
      construction timelines, supply chain management for specialized electrolyzer and DRI equipment, and the
      challenge of hiring for a greenfield industrial site in northern Sweden. Adverse diligence attention should
      focus on whether construction is tracking to schedule and on total cost versus original budget, neither of
      which is fully verifiable from public sources alone.
