  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Stegra valuation and cap table
      missingEvidence: >-
        Post-money valuation per equity round, exact ownership percentages per investor, and full cap table
        are not publicly disclosed.
      whyItMatters: >-
        Without valuation data, return analysis, dilution modeling, and governance control mapping are
        impossible; this is the central gap for any investment diligence.
      diligencePath: >-
        Request full cap table, most recent 409A or independent valuation, and shareholder agreement from
        data room; review all investor rights agreements and liquidation preferences.
      relatedQuestionRefs:
        - QO015
        - QO012
    - type: private-evidence-only
      severity: material
      topic: Offtake agreement binding terms and volumes
      missingEvidence: >-
        The volume, price formula, take-or-pay versus framework structure, and exact legal binding nature
        of each named offtake agreement are not disclosed in public materials.
      whyItMatters: >-
        The revenue and debt coverage model depends critically on whether agreements are binding take-or-pay
        contracts or softer framework letters of intent; the distinction materially affects project finance
        covenant analysis.
      diligencePath: >-
        Request all executed offtake agreements, volume schedules, pricing mechanisms, and termination
        provisions from data room; legal review by project finance counsel.
      relatedQuestionRefs:
        - QO016
        - QO028
      relatedTableRefs:
        - TO003
    - type: missing-source
      severity: material
      topic: Electrolyzer and DRI equipment supplier identity and contract status
      missingEvidence: >-
        The specific equipment suppliers for the ~800 MW electrolyzer and DRI plant, contract values,
        delivery schedule, and equipment performance guarantees are not identified in public sources.
      whyItMatters: >-
        Equipment supplier identity and contractual delivery commitments are key determinants of whether
        the 2026–2027 first-steel timeline is achievable; supplier delays are the most common cause of
        first-of-a-kind industrial project schedule slippage.
      diligencePath: >-
        Request EPC contracts, equipment supply agreements, and project schedule from data room; conduct
        reference checks with electrolyzer and DRI equipment suppliers.
      relatedQuestionRefs:
        - QO006
        - QO026
    - type: private-evidence-only
      severity: material
      topic: Full board composition and governance documents
      missingEvidence: >-
        Complete board member list, investor board seat assignments, veto rights, reserved matters,
        and shareholder agreement terms are not disclosed.
      whyItMatters: >-
        Governance rights and board composition are essential for understanding control structure,
        investor alignment, and decision-making on major strategic changes including CEO succession.
      diligencePath: >-
        Request board composition, articles of association, shareholder agreement, and any side letters
        from data room.
      relatedQuestionRefs:
        - QO010
    - type: missing-source
      severity: minor
      topic: Stegra headcount and hiring trajectory
      missingEvidence: >-
        Precise headcount figures and hiring plans for the Boden facility are not disclosed in
        available public sources.
      whyItMatters: >-
        Operational hiring pace affects commissioning readiness; a remote greenfield facility in
        northern Sweden faces genuine labor market challenges.
      diligencePath: >-
        Review job postings on company website and LinkedIn; request headcount breakdown from management.
      relatedQuestionRefs:
        - QO024
    - type: private-evidence-only
      severity: material
      topic: Leadership and founder table completeness
      missingEvidence: >-
        Full board member list, complete executive team, and exact equity ownership per founder and early
        investor are not publicly disclosed; table covers only publicly identified leaders and investors.
      whyItMatters: >-
        Incomplete leadership and governance picture limits assessment of key-person risk, succession planning,
        and investor board influence on strategic decisions.
      diligencePath: >-
        Request organizational chart, full board roster, and shareholder agreement from data room;
        request management biographies for all C-level executives.
      relatedQuestionRefs:
        - QO010
      relatedTableRefs:
        - TO002
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone table completeness
      missingEvidence: >-
        Internal project milestones, vendor contract signing dates, regulatory permit approvals,
        and construction progress events that were not publicly announced are not captured.
      whyItMatters: >-
        A fuller construction and regulatory chronology would enable better schedule-adherence and
        adverse-event assessment.
      diligencePath: >-
        Request project schedule, EPC milestone tracker, and permit register from data room; compare
        against company announcements to identify any omissions or delays.
      relatedQuestionRefs:
        - QO022
      relatedTableRefs:
        - TO004
