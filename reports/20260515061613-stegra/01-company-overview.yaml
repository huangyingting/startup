callouts:
  - calloutType: strength
    title: Largest green steel financing package globally
    body: >-
      Stegra's approximately €7.9B total financing (including April 2026 addition) is not matched by any competing
      green steel project. The combination of committed equity from strategic industrial investors who are also
      offtake customers, and project finance debt backed by public institutions (EIB, EKN), creates a structurally
      de-risked capital stack for a first-of-a-kind industrial plant.
    claimRefs:
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
  - calloutType: strength
    title: Offtake customer roster is a who's-who of European industrial decarbonization
    body: >-
      BMW, Scania, Mercedes-Benz, Volvo Group, and IKEA are not generic customers — they are facing their own
      Scope 3 emissions reduction obligations and regulatory pressure. Their binding or framework offtake agreements
      with Stegra serve both supply security and corporate sustainability reporting needs, making churn risk
      significantly lower than in a typical B2B startup.
    claimRefs:
      - CO008
      - CO009
      - CO010
  - calloutType: risk
    title: Key-person risk concentrated in CEO Henriksson
    body: >-
      Henrik Henriksson's specific background at Scania and his personal relationships with European automotive
      CEOs are material to both the offtake agreements and the lender confidence in management. Any CEO transition
      before first steel production would create meaningful disruption risk to both the customer and financing
      relationships.
    claimRefs:
      - CO011
      - CO012
  - calloutType: risk
    title: First-of-a-kind construction and commissioning risk
    body: >-
      Stegra is building the world's first large-scale green-hydrogen-DRI-EAF integrated steel plant. While DRI
      and EAF technologies are individually proven, their integration with a green hydrogen supply chain at 800 MW
      electrolyzer scale has not been demonstrated at commercial scale. Construction delays, cost overruns, and
      commissioning complexity are material risks that public sources cannot fully assess.
    claimRefs:
      - CO005
      - CO006
      - CO030
      - CO035
  - calloutType: insight
    title: EU carbon pricing and CBAM create structural tailwinds for Stegra's economics
    body: >-
      The EU ETS carbon price and the Carbon Border Adjustment Mechanism directly penalize conventional coal-based
      steel production and imports. As CBAM moves from transitional to full implementation in 2026, the competitive
      economics of green steel versus brown steel improve automatically — providing Stegra with a strengthening
      structural position even before any premium green pricing by customers.
    claimRefs:
      - CO028
      - CO029
      - CO030
  - calloutType: assumption
    title: Production timeline of 2026–2027 assumed to be realistic based on construction milestones
    body: >-
      The April 2026 electrolyzer installation and March 2026 DRI tower milestone are consistent with a 2026–2027
      first steel production target, but no independent third-party verification of the project schedule is available
      in public sources. This chapter treats the company-stated timeline as a reasonable working assumption, subject
      to commissioning verification.
    claimRefs:
      - CO031
      - CO032
      - CO034
