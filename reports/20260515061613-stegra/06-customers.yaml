company:
  name: Stegra
chapter:
  number: 6
  title: Customers
  summary: >-
    Stegra (formerly H2 Green Steel) has assembled an unusually broad pre-revenue offtake book, with more than 12
    named customers spanning automotive OEMs, Tier-1 suppliers, industrial manufacturers, distributors, and commercial
    purchasers. Roughly 50% of planned first-phase output of 5 Mt/year is covered by long-term agreements, including
    landmark deals with BMW, Mercedes-Benz, Scania, Volvo, IKEA, Microsoft, Kingspan, and Schaeffler. The book is
    heavily concentrated in automotive (~60-70%), tying durability directly to customers' Scope-3 commitments and
    EV-transition trajectories. Green-steel premium pricing ($200-400/t over conventional steel) is unproven at
    commercial scale, and first deliveries are not expected until 2026-2027.
sections:
  - id: section-1
    title: Pre-revenue offtake model — more than 12 named customers with long-term agreements
    body: >-
      Stegra is pre-revenue: the Boden plant is targeting first commercial deliveries in 2026-2027, and no spot or
      repeat sales exist in the public record as of mid-2026. The company's demand case therefore rests entirely on
      its portfolio of long-term offtake agreements, which it has built steadily since 2021. The public record
      identifies more than 12 named offtake counterparties spanning automotive OEMs, Tier-1 automotive suppliers,
      distributors, industrial manufacturers, construction material producers, and technology companies. Agreements
      are reported to carry 5-to-7-year terms, though exact volumes and prices are not publicly disclosed under NDA.


      Stegra's approach differs sharply from conventional steel sales. Rather than selling spot tonnes into commodity
      markets, it has locked anchor customers into multi-year forward contracts before a single tonne of green steel
      has left Boden. This is partly structural necessity — lenders and equity sponsors need committed revenue to
      backstop a project finance structure — and partly a strategic statement that primary steel buyers are willing
      to pay a green premium years in advance. The IEA Iron and Steel Technology Roadmap identifies long-term offtake
      agreements as the core commercial enabler for green steel projects at this stage of the market, and Stegra's
      book is among the largest assembled by any hydrogen-based DRI producer globally as of 2026.


      The customer mix reflects the steel supply chain: automotive OEMs and Tier-1 suppliers dominate (BMW, Mercedes,
      Scania, Volvo Group, Volvo Cars, ZF Friedrichshafen, Schaeffler, Porsche), with industrial manufacturers (IKEA,
      Kingspan, Marcegaglia), a technology firm (Microsoft), and distribution intermediaries (thyssenkrupp Materials
      Services, Klockner and Co, Roba Metals, Cargill) rounding out the book. Stegra has stated publicly that
      approximately 50% of planned first-phase capacity is covered by these long-term agreements, a higher coverage
      ratio than comparable greenfield projects at a similar capital-deployment stage.
