callouts:
  - calloutType: strength
    title: Stegra has signed more named automotive offtake partners than any comparable greenfield green-steel project
    body: >-
      BMW, Mercedes, Scania, Volvo Group, Volvo Cars, ZF, Schaeffler, and Porsche represent an automotive customer
      cluster unmatched in depth and prestige among hydrogen-based DRI steel projects globally. Multiple agreements
      were signed in 2021 before the Boden plant had reached financial close, reflecting extraordinary credibility
      for a pre-revenue startup competing for Tier-1 OEM procurement commitments against established steel majors.
    claimRefs:
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
  - calloutType: insight
    title: Equity co-investment by six customers creates structural lock-in not available to conventional rivals
    body: >-
      Mercedes, Schaeffler, Kingspan, Marcegaglia, and IKEA/IMAS have all taken equity stakes alongside their
      offtake agreements, creating a dual financial incentive: they need Stegra to succeed as a project as well as
      deliver contracted tonnes. This structure is unusual in steel procurement and provides a deeper form of
      customer commitment than a standard take-or-pay contract alone — though equity stakes do not legally
      substitute for enforceable delivery obligations.
    claimRefs:
      - CU009
      - CU019
      - CU022
      - CU023
      - CU025
  - calloutType: risk
    title: Automotive concentration and EV-demand softness create a material premium-durability risk
    body: >-
      Approximately 60-70% of the booked offtake volume is linked to automotive OEMs and Tier-1 suppliers, whose
      Scope-3 steel budgets are sensitive to EV demand trajectories, OEM margin pressure, and regulatory timelines.
      Bloomberg, FT, and Seeking Alpha coverage through 2025-2026 documents real deceleration in European EV
      demand and OEM cost-cutting. If automotive customers defer acceptance or renegotiate premium pricing, Stegra
      faces simultaneous revenue and pricing pressure on the majority of its contracted book, with no
      retention-rate history and no spot-market fallback at equivalent margins.
    claimRefs:
      - CU026
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
      - CU033
      - CU034
      - CU035
acknowledgedWarnings:
  - dimension: figureType
    reason: >-
      FU004 uses bar type instead of cohort because Stegra is pre-revenue with no commercial deliveries as of
      May 2026; there is therefore no time-series retention data that could populate a cohort figure with
      meaningful time-bucket retention percentages. The bar chart shows estimated book distribution by segment as
      the closest available proxy for the concentration pattern the cohort figure is intended to illustrate.
