        EU SBTi, CSRD, and fleet CO2 regulation create a regulatory pull; CBAM and EU ETS make conventional steel
        more expensive; OEM brand and ESG reporting pressure reinforce demand.
    - id: QU007
      question: >-
        How concentrated is Stegra's customer book across segments, and what percentage does automotive represent
        in aggregate?
      type: quantification
      status: answered
      targets:
        - contentRequirements/4
        - plannedTables/expansion-and-concentration-risk-table
      sourceRefs:
        - SU001
        - SU015
        - SU023
      answerSummary: >-
        Automotive estimated at ~60-70% of booked capacity. Exact per-customer volume splits not disclosed.
        Estimated from segment mix and the ~50% coverage claim.
    - id: QU008
      question: >-
        Which automotive OEMs have signed offtake agreements with Stegra and in what year were agreements announced?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU002
        - SU003
        - SU004
        - SU006
        - SU007
      answerSummary: >-
        BMW (Oct 2021, expanded 2022), Mercedes (May 2021, expanded 2023), Scania (Aug 2021), Volvo Group
        and Volvo Cars (2022). All confirmed via press releases and sustainability disclosures.
    - id: QU009
      question: >-
        Which customers have made equity co-investments alongside their offtake agreements, and what does this
        imply for commitment durability?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU006
        - SU001
        - SU036
      answerSummary: >-
        Mercedes-Benz, Schaeffler, Kingspan, Marcegaglia, and IKEA/IMAS Foundation have all made equity
        co-investments alongside their offtake agreements.
    - id: QU010
      question: >-
        Which Tier-1 automotive suppliers and additional automotive customers beyond the OEM tier have signed
        agreements with Stegra?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU008
        - SU001
        - SU039
      answerSummary: >-
        ZF Friedrichshafen (2023, driveline), Schaeffler (2023, bearings / drivetrain), Porsche and Bilstein
        Group reported but less formally confirmed.
    - id: QU011
      question: >-
        Is the automotive concentration in Stegra's offtake book a material adverse risk, given the estimated
        60-70% exposure to a single end-market?
      type: adverse
      status: answered
      targets:
        - contentRequirements/4
        - plannedTables/expansion-and-concentration-risk-table
      sourceRefs:
        - SU023
        - SU028
        - SU013
        - SU014
      answerSummary: >-
        Substantial risk. Approximately 60-70% automotive concentration means EV-cycle or OEM margin pressure
        could hit the majority of the booked offtake simultaneously. IISD and Seeking Alpha both flag this.
    - id: QU012
      question: >-
        Is customer willingness to pay a green-steel premium well-evidenced beyond contractual intent, and how
        durable is that willingness under adverse conditions?
      type: verification
      status: answered
      targets:
        - contentRequirements/3
        - contentRequirements/4
      sourceRefs:
        - SU021
        - SU022
        - SU019
      answerSummary: >-
        BCG and Kearney surveys indicate strong willingness to pay; CBAM and EU ETS support premium floor.
        However, no price has been tested at commercial delivery scale, and adverse macro scenarios may erode it.
    - id: QU013
      question: >-
        How does Stegra's offtake book compare with those of SSAB HYBRIT and ArcelorMittal XCarb for automotive
        and industrial customers?
      type: comparison
      status: answered
      targets:
        - contentRequirements/2
        - contentRequirements/4
      sourceRefs:
        - SU033
        - SU034
      answerSummary: >-
        Stegra's named OEM customer base is broader than HYBRIT's publicly disclosed book. ArcelorMittal XCarb
        has established OEM relationships but is a brownfield retrofit. Volvo Cars has pilot agreements with
        both HYBRIT and Stegra.
    - id: QU014
      question: >-
        Which industrial, appliance, and construction customers has Stegra signed, and what is their strategic logic
        for purchasing green steel?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU001
        - SU036
      answerSummary: >-
        IKEA (furniture and appliances, 2023, equity co-investor); Kingspan (construction panels, 2023, equity
        co-investor). Both driven by Scope-3 and embodied-carbon reporting requirements independent of autos.
    - id: QU015
      question: >-
        Which distribution and processing partners has Stegra signed, and how does the distribution channel
        expand its market reach beyond direct OEM customers?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/0
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU010
        - SU027
        - SU001
      answerSummary: >-
        thyssenkrupp Materials Services (2024, European distribution), Marcegaglia (2023, Italian processing and
        distribution), Klockner and Co and Roba Metals and Cargill reported as additional distributors.
    - id: QU016
      question: >-
        What is the mechanism behind the Microsoft agreement and why does the bundled Azure cloud partnership
        make this deal strategically significant for Stegra?
      type: mechanism
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU009
        - SU001
      answerSummary: >-
        Multi-year steel offtake bundled with Microsoft Azure cloud and AI partnership. Microsoft needs green steel
        for data centers to meet 2030 carbon-negative pledge. Dual strategic logic: steel supply and tech partnership.
    - id: QU017
      question: >-
        Does equity co-investment by five of Stegra's customers provide meaningful protection against offtake
        contract termination or renegotiation?
      type: adverse
      status: partial
      targets:
        - contentRequirements/3
        - contentRequirements/4
      sourceRefs:
        - SU023
        - SU001
      answerSummary: >-
        Equity co-investment creates dual financial incentive but does not legally substitute for take-or-pay
        contract provisions. Actual enforceability of termination clauses not verifiable from public sources.
    - id: QU018
      question: >-
        Is EV demand softness documented in 2025-2026 a near-term adverse threat to Stegra's automotive customer
        commitments and the green-steel premium?
      type: adverse
      status: answered
      targets:
        - contentRequirements/4
        - plannedTables/expansion-and-concentration-risk-table
      sourceRefs:
        - SU013
        - SU014
        - SU028
      answerSummary: >-
        Yes. Bloomberg and FT document real EV adoption deceleration in Europe through 2025-2026; OEM cost
        pressure could lead to deferral or renegotiation of green-steel premiums.
    - id: QU019
      question: >-
        Could automotive customers renegotiate or cancel their Stegra offtake agreements if OEM margins compress,
        and is there evidence of contract termination risk?
      type: adverse
      status: partial
      targets:
        - contentRequirements/4
        - plannedTables/expansion-and-concentration-risk-table
      sourceRefs:
        - SU014
        - SU028
        - SU023
      answerSummary: >-
        Plausible risk but not confirmed. No public information on force majeure, price-renegotiation clauses, or
        termination provisions in any Stegra offtake agreement.
    - id: QU020
      question: >-
        Are there any publicly reported cases of customer hesitancy, contract delays, or offtake renegotiations
        with Stegra?
      type: adverse
      status: answered
      targets:
        - contentRequirements/4
        - plannedTables/expansion-and-concentration-risk-table
      sourceRefs:
        - SU013
        - SU014
        - SU028
      answerSummary: >-
        No specific renegotiations or cancellations have been publicly reported as of May 2026. The adverse risk
        is forward-looking and documented via EV-slowdown and OEM cost-cutting coverage, not concrete defaults.
    - id: QU021
      question: >-
        What is the quantified range for the green-steel price premium and which independent data providers
        corroborate Stegra's stated $200-400 per tonne estimate?
      type: quantification
      status: answered
      targets:
        - contentRequirements/3
        - contentRequirements/4
      sourceRefs:
        - SU017
        - SU030
        - SU032
        - SU033
      answerSummary: >-
        BNEF, Fastmarkets, and Argus Media all report $150-400/t range. Stegra cites $200-400/t internally.
        Durability depends on EU ETS carbon price and CBAM enforcement.
    - id: QU022
      question: >-
        How do CBAM and EU ETS mechanically support the green-steel pricing premium for Stegra's customers and
        what is the regulatory timetable?
      type: mechanism
      status: answered
      targets:
        - contentRequirements/4
        - contentRequirements/0
      sourceRefs:
        - SU019
        - SU020
        - SU037
      answerSummary: >-
        CBAM applies carbon-import levies from 2026 on high-carbon steel; EU ETS prices conventional producers'
        carbon costs. Both raise the cost of conventional alternatives, supporting Stegra's pricing floor.
    - id: QU023
      question: >-
        What is the addressable market size for certified green steel in Europe through 2028, and how does
        Stegra's contracted capacity relate to total demand?
      type: quantification
      status: answered
      targets:
        - contentRequirements/1
        - contentRequirements/0
      sourceRefs:
        - SU031
        - SU015
      answerSummary: >-
        S&P Global estimates 5-8 Mt European certified green steel demand by 2028; Eurofer identifies automotive
        as ~17% of European flat-rolled consumption. Market is large relative to Stegra's 5 Mt/year capacity.
    - id: QU024
      question: >-
        Have any Stegra customers expanded or deepened their agreements after initial signing, providing evidence
        of relationship strengthening before first delivery?
      type: verification
      status: answered
      targets:
        - contentRequirements/3
        - plannedTables/retention-repeat-usage-satisfaction-table
      sourceRefs:
        - SU002
        - SU006
      answerSummary: >-
        BMW expanded in 2022 (originally signed Oct 2021); Mercedes expanded in 2023 (originally signed May 2021).
        These are the only confirmed agreement expansions in the public record.
    - id: QU025
      question: >-
        Is there any retention, NRR, GRR, or repeat-purchase data available for Stegra's customer relationships?
      type: verification
      status: answered
      targets:
        - contentRequirements/3
        - plannedTables/retention-repeat-usage-satisfaction-table
      sourceRefs:
        - SU001
        - SU002
      answerSummary: >-
        None. Stegra is pre-revenue with no commercial deliveries as of May 2026. Retention metrics are
        structurally unavailable and cannot be estimated from public sources.
    - id: QU026
      question: >-
        What third-party certification requirements do Stegra's customers impose for green-steel provenance, and
        has any body independently certified Stegra's claims?
      type: verification
      status: partial
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU024
        - SU012
      answerSummary: >-
        ResponsibleSteel certification and ISO-aligned certification are increasingly required by OEMs. Stegra
        is pursuing certification but pre-production commercial certification not publicly confirmed.
    - id: QU027
      question: >-
        How does the depth of Stegra's offtake book compare with competing green-steel projects such as HYBRIT
        and H2 Magnum in terms of named OEM commitments?
      type: comparison
      status: answered
      targets:
        - contentRequirements/2
        - contentRequirements/4
      sourceRefs:
        - SU034
        - SU033
        - SU016
      answerSummary: >-
        Stegra's named OEM customer base is broader than HYBRIT's publicly disclosed book. ArcelorMittal XCarb
        has established OEM relationships but is a brownfield retrofit. Full quantitative comparison not possible.
    - id: QU028
      question: >-
        Are there undisclosed offtake agreements beyond the publicly named set, and could the ~50% coverage claim
        include agreements not yet publicly announced?
      type: verification
      status: partial
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU001
        - SU029
      answerSummary: >-
        Stegra states ~50% coverage; named agreements appear to account for the bulk of this. Additional
        undisclosed agreements may exist but cannot be verified from public sources.
    - id: QU029
      question: >-
        What is the estimated volume distribution between direct OEM and industrial offtake versus distributor-
        channel offtake in Stegra's book?
      type: quantification
      status: answered
      targets:
        - contentRequirements/0
        - contentRequirements/4
      sourceRefs:
        - SU010
        - SU027
        - SU001
      answerSummary: >-
        Direct OEM and industrial offtake dominates the named book. thyssenkrupp Materials Services and Marcegaglia
        provide distribution-channel coverage estimated at 10-15%. Exact direct vs. channel split not disclosed.
    - id: QU030
      question: >-
        Has ResponsibleSteel or any equivalent certification body independently verified Stegra's green-steel
        claims prior to first commercial delivery?
      type: verification
      status: partial
      targets:
        - contentRequirements/2
        - plannedTables/named-customer-proof-table
      sourceRefs:
        - SU024
        - SU001
      answerSummary: >-
        Stegra is pursuing ResponsibleSteel certification (referenced in public disclosures). Pre-production
        commercial certification of green steel has not been publicly confirmed as of May 2026.
  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Offtake contract terms — volumes and price schedules
      missingEvidence: >-
        Per-customer contracted volumes, price schedules, green-premium amounts, take-or-pay provisions, force
        majeure clauses, and termination rights for all Stegra offtake agreements. These are commercially
        confidential and not publicly disclosed.
      whyItMatters: >-
        Without contract terms, it is impossible to independently verify the premium durability, concentration
        exposure, or enforceability of the offtake book. The entire financial model depends on these terms.
      diligencePath: >-
        Request full contract data room access during due diligence; request redlines of original and expanded
        agreements for BMW and Mercedes; confirm take-or-pay provisions, price-adjustment mechanisms, and
        termination triggers for top-3 customers by volume.
      relatedQuestionRefs:
        - QU005
        - QU019
        - QU026
        - QU028
        - QU030
    - type: missing-source
      severity: material
      topic: Customer retention and repeat-purchase data post first delivery
      missingEvidence: >-
        No NRR, GRR, churn, repeat-order, or customer-satisfaction data exists for Stegra because no commercial
        deliveries have been made. This is a structural gap for a pre-revenue company.
      whyItMatters: >-
        Pre-revenue offtake concentration and the absence of any delivered-volume track record means there is zero
        empirical evidence of customer satisfaction or willingness to pay the premium at actual delivery.
      diligencePath: >-
        Request first-delivery milestone schedule; obtain reference calls with procurement leads at BMW and Volvo;
        monitor post-2026 delivery announcements and customer acceptance statements.
      relatedQuestionRefs:
        - QU025
        - QU017
    - type: enumeration-incomplete
      severity: material
      topic: Full offtake counterparty list including TU003 partial coverage
      missingEvidence: >-
        Stegra states ~50% of 5 Mt/year is covered but has not published a complete list of all counterparties
        with their contracted volumes. Cargill, Roba Metals, Klockner and Co, Porsche, and Bilstein Group have
        less formal public confirmation than the core 12 named customers in TU003.
      whyItMatters: >-
        The gap between the ~50% coverage claim and the named customer list leaves uncertainty about the composition
        of the remaining contracted volume and whether any unnamed agreements carry weaker terms.
      diligencePath: >-
        Request complete counterparty schedule in data room; independently verify each named agreement via
        customer sustainability disclosures; request confirmation from Cargill, Porsche, and Bilstein Group.
      relatedQuestionRefs:
        - QU028
        - QU029
      relatedTableRefs:
        - TU003
