figures:
  - id: FU001
    title: Customer journey map — from commitment to first delivery and repeat offtake
    type: journey-map
    layout: wide
    summary: >-
      Stegra's customer journey runs from equity co-investment and pre-production offtake signing through first
      commercial delivery, certification, and eventual repeat-order renewal — all still ahead as of mid-2026.
    data:
      nodes:
        - id: commitment
          label: Strategic commitment
          detail: >-
            OEM sustainability targets and CSRD/SBTi obligations create the pull; Stegra initiates dialogue with
            steel procurement teams at automotive and industrial customers.
          tone: positive
        - id: signing
          label: Offtake signing
          detail: >-
            Customer and Stegra execute a long-term bilateral offtake agreement (5-7 years), often alongside an
            equity co-investment. BMW and Mercedes signed 2021; IKEA, Microsoft, ZF, Schaeffler signed 2023.
          tone: positive
        - id: expansion
          label: Agreement expansion
          detail: >-
            Several customers have already expanded: BMW expanded in 2022, Mercedes in 2023, indicating growing
            volume or term commitments even pre-delivery.
          tone: positive
        - id: delivery
          label: First commercial delivery
          detail: >-
            Targeted for 2026-2027 from the Boden plant. No deliveries have occurred as of May 2026. This is
            the critical inflection where contracts convert from forward commitments to delivery obligations.
          tone: warning
        - id: renewal
          label: Renewal and repeat
          detail: >-
            Post-delivery renewal risk: customers must accept delivery volumes, confirm green-steel premium value,
            and extend or renew contracts. No public renewal data exists yet.
          tone: warning
    approximationNotes: >-
      Journey stages are reconstructed from press releases and public company statements. The delivery and renewal
      stages are forward-looking and have not yet occurred as of the report date.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU008
      - CU009
      - CU010
      - CU038
