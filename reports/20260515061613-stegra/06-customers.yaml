  - id: section-3
    title: Industrial and commercial customers — IKEA, Microsoft, Kingspan, Marcegaglia, thyssenkrupp Materials Services
    body: >-
      Beyond automotive, Stegra has signed a diversified set of industrial and commercial customers that collectively
      reduce concentration risk while opening large additional addressable markets. IKEA, represented through Inter
      IKEA Group and the IMAS Foundation, signed in 2023 and also took an equity stake; the agreement targets green
      steel for furniture frames, appliances, and related products sold across IKEA's global store network. IKEA
      has explicit science-based decarbonization targets for its supply chain and is one of the largest steel-consuming
      furniture groups globally, providing meaningful volume potential. Kingspan, the Irish building-products group,
      also became both an equity investor and an offtake partner in 2023; it intends to use green-steel coils in
      insulated panels and construction materials, where embodied-carbon specification pressure from architects and
      developers is increasing. Marcegaglia, the large Italian steel processor and service center, similarly took
      equity and agreed to distribute and process Stegra's green flat products into finished steel strips for
      Italian and European industrial buyers.


      Microsoft's agreement, announced in 2023, is notable for its cross-sector logic: it combines a multi-year
      green-steel offtake with a cloud and AI partnership via Microsoft Azure. Microsoft uses steel in its
      data-center infrastructure and has aggressive Scope-3 commitments under its 2030 carbon-negative pledge.
      The deal bundles commercial steel supply with a Microsoft Azure platform partnership, giving Stegra both a
      steel customer and a technology partner. Microsoft's sustainability disclosure corroborates the strategic
      logic from both sides.


      On the distribution side, thyssenkrupp Materials Services signed a deal in 2024 to distribute Stegra's
      output across Europe via its service-center and materials-distribution network. This is a strategically
      important partnership: thyssenkrupp Materials Services is one of the largest steel-distribution groups in
      Europe, and its involvement means Stegra has a channel partner with established sales relationships that
      can reach SME and mid-market manufacturers who cannot enter into direct multi-year OEM-style offtake
      agreements. The combination of equity-investor customers and independent distribution intermediaries
      provides the commercial book with both locked-in strategic volume and market-clearing capability for
      uncommitted tonnes.
    claimRefs:
