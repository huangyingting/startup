summary:
  headline: Stegra 是欧洲进度最靠前的大规模绿钢项目，客户承购承诺强、已披露融资约 €7.9B；但公司仍未产生收入，首个同类项目建设风险、绿氢成本不确定性，以及近期 2026 年追加 €1.4B 融资，把承销信心压在中等区间。
