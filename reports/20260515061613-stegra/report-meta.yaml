companyProfile:
  summary: >-
    Stegra (formerly H2 Green Steel) is a Swedish green-steel pioneer building Europe's first large-scale
    green-hydrogen DRI + Electric Arc Furnace plant in Boden, northern Sweden. Founded in 2021 and rebranded
    from H2 Green Steel in September 2024, the company combines an ~800 MW electrolyzer with a 5 Mt/year
    steel mill targeting near-zero-emission output for premium automotive, industrial, and consumer-goods
    customers. Production is targeted for 2026–2027.
  foundedDate: '2021-02-01'
  founders:
    - name: Henrik Henriksson
      role: CEO
      background: Former President and CEO of Scania; appointed Stegra CEO in 2021.
      claimRefs: [CO011]
    - name: Vargas Holding (Cristina Stenbeck)
      role: Co-founder and lead initial investor
      background: Stockholm-based industrial investment platform; lead backer since inception and architect of the original H2 Green Steel concept.
      claimRefs: [CO015]
  foundingLocation: Stockholm, Sweden
  headquarters: Stockholm, Sweden
  productSummary: >-
    Near-zero-emission flat steel produced via green-hydrogen-based Direct Reduced Iron (DRI) feeding an
    Electric Arc Furnace, integrated with on-site renewable hydrogen production using ~800 MW of
    electrolyzers powered by Swedish hydropower.
  customerFocus: >-
    Premium automotive OEMs, industrial manufacturers, consumer-goods brands, and steel distributors
    requiring Scope-3 decarbonization at scale across Europe.
  businessModel: >-
    Long-term offtake contracts at a green premium over conventional steel pricing, with vertically
    integrated production from on-site green hydrogen through to finished cold-rolled and galvanized coil.
  stage: late-stage private (construction)
  fundingStatus: >-
    Approximately €6.5B in total financing secured by January 2024 (equity, debt, and grants); an
    additional €1.4B agreed in April 2026, taking total publicly disclosed financing to approximately
    €7.9B.
  claimRefs: [CO001, CO002, CO003, CO007, CO023, CO024]
summary:
  headline: >-
    Stegra is the most advanced large-scale green-steel project in Europe with strong customer commitments
    and ~€7.9B in disclosed financing, but pre-revenue first-of-kind construction risk, green-hydrogen cost
    uncertainty, and the recent €1.4B 2026 add-on raise keep underwriting confidence in the medium band.
