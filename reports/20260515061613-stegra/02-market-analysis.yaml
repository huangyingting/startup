chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The global steel market (~1.89 Bt/year, ~$1.4T revenue) is entering a structural decarbonization phase driven
    by EU CBAM entering its definitive phase in 2026, rising EU ETS carbon prices, and binding Scope-3 commitments
    from major automotive OEMs and retailers. Green hydrogen DRI+EAF technology is the leading pathway for
    near-zero primary steel production. Stegra's 5 Mt/year Boden plant addresses approximately 10-25% of the
    projected 2030 European green steel SAM, anchored by offtake agreements with BMW, Scania, Mercedes-Benz,
    Volvo Group, IKEA, ZF, thyssenkrupp Materials Services, and Microsoft. Premium willingness-to-pay is
    confirmed across automotive OEMs and leading retailers, but cost convergence with conventional steel remains
    a risk dependent on green hydrogen cost trajectories and long-term carbon pricing policy durability.

sections:
  - id: steel-market-overview
    title: Global and EU Steel Market Overview
    body: >-
      Steel is one of the world's most fundamental industrial materials, underpinning construction, automotive
      manufacturing, energy infrastructure, and machinery production. Global crude steel output reached
      approximately 1.89 billion tonnes in 2024, according to the World Steel Association, with China accounting
      for over one billion tonnes (approximately 54% of global production). The European Union produces
      approximately 126 million tonnes annually, representing roughly 7% of global supply, with Germany, Italy,
      and France as the largest producing nations within the bloc. The United States adds approximately 80 million
      tonnes per year according to USGS mineral statistics.

      The steel industry is one of the most carbon-intensive industrial sectors globally. The International Energy
      Agency estimates that iron and steel production generates approximately 3.7 billion tonnes of CO2 per year,
      representing 7-9% of total global greenhouse gas emissions. The dominant production route—blast furnace
      basic oxygen furnace (BF-BOF), accounting for roughly 70% of global output—is structurally carbon-intensive,
      emitting approximately 2.0-2.3 tonnes of CO2 per tonne of steel produced. Electric arc furnace (EAF) routes,
      which account for roughly 30% of global output and rely primarily on scrap, produce 0.4-0.8 tCO2/tonne
      depending on grid carbon intensity. Green hydrogen DRI+EAF technology can achieve near-zero emissions of
      approximately 0.05-0.1 tCO2/tonne, a roughly 95% reduction relative to BF-BOF.

      The structural transition toward green steel is being driven by three converging forces: tightening regulatory
      frameworks such as the EU Emissions Trading System and the Carbon Border Adjustment Mechanism; corporate
      decarbonization commitments by large steel-consuming sectors, particularly automotive OEMs with Science-Based
      Targets and Scope-3 obligations; and the maturation of green hydrogen and direct reduced iron technology as
      viable pathways to near-zero primary steel production. World Steel Association data shows that the DRI share
      of global steel production has grown to approximately 8%, with DRI-based EAF routes increasingly recognized
      as the leading low-emission pathway for primary steel production.

      Global steel market revenues are estimated at approximately $1.4 trillion annually, based on ~1.89 Bt
      production at average realized prices of approximately $700-800 per tonne. EU steel carries a modest premium
      due to higher energy costs, stringent environmental regulations, and higher-quality product grades serving
      automotive and appliance markets, with average EU hot-rolled coil prices typically running €700-900/tonne.
      EUROFER estimates EU automotive sector steel consumption at approximately 25-35 million tonnes per year,
      while the EU construction sector absorbs approximately 35-40% of EU steel demand—the two largest end-use
      segments. Stegra's targeted 5 Mt/year output from its Boden, Sweden plant represents a meaningful
      scale-up in the premium green segment rather than a commodity volume play.
