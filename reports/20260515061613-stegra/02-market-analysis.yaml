  - id: tam-sam-som-stegra
    title: TAM, SAM, and SOM for Stegra
    body: >-
      Sizing Stegra's market requires navigating three nested lenses: the total addressable market (TAM) for
      global steel, the serviceable addressable market (SAM) for European and premium green-certified primary
      steel, and the serviceable obtainable market (SOM) for Stegra's 5 Mt/year Boden plant output.

      The TAM for global steel is estimated at approximately $1.4 trillion annually, based on World Steel
      Association production data and average realized prices of $700-800/tonne. This broad market encompasses
      all steel grades, geographies, and production routes. However, conventional steel is largely commoditized,
      and Stegra does not compete for low-margin, high-volume commodity orders. The relevant intermediate TAM
      for analysis purposes is the global flat-rolled and premium steel segment serving automotive, appliance,
      and industrial manufacturing, estimated at $200-400 billion annually, representing 25-30% of global steel
      revenue. Within this, green-certified primary steel commands an additional premium layer.

      The SAM narrows to European green-certified primary steel—steel produced via DRI+EAF with green hydrogen,
      certified under ResponsibleSteel or equivalent standards. BloombergNEF estimates global green steel demand
      at 50-100 Mt/year by 2030 under policy-supportive scenarios, with the European share estimated at 20-50 Mt
      per year consistent with IEA net-zero transition pathways and EUROFER EU flat steel demand data. At realized
      prices of €900-1,200/tonne for premium green product, this implies a European SAM of approximately
      €18-60 billion by 2030. SP Global Commodity Insights and Fastmarkets both note that green steel supply is
      projected to remain constrained through 2027-2028, supporting near-term pricing power for early producers.

      Stegra's SOM is anchored by its 5 Mt/year production capacity at the Boden facility, representing
      approximately 10-25% of the projected 2030 European green steel SAM. Existing offtake agreements with BMW,
      Scania, Mercedes-Benz, Volvo Group, IKEA, ZF, thyssenkrupp Materials Services, and Microsoft validate the
      SOM thesis. At a realized green premium of €100-200/tonne over benchmark HRC prices, Stegra's 5 Mt output
      implies potential revenues of approximately €4-5 billion annually at full production. Stegra secured
      approximately €6.5 billion in financing in January 2024 and an additional €1.4 billion in April 2026, with
      first production targeted for 2026-2027.

      Material uncertainty remains around SAM realization: the green steel premium could compress if competing
      supply from ArcelorMittal, SSAB HYBRIT, Salzgitter SALCOS, and GravitHy enters the market simultaneously.
      SAM sizing also depends on whether automotive buyers can source sufficient green steel domestically within
      the EU to meet CBAM-adjusted cost structures. The IEA's net-zero scenario requires global green steel
      demand to scale to 100-250 Mt/year by 2035, providing a plausible long-term growth trajectory for
      Stegra's planned capacity.
