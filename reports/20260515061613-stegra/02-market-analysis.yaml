  - id: FM003
    title: Buyer segment map — green premium readiness vs regulatory pressure
    type: matrix
    layout: wide
    summary: >-
      Automotive OEMs show the highest green premium willingness and regulatory pressure, making them
      Stegra's strongest near-term segment. Construction offers large future volume but currently low premium
      readiness. Industrial distribution has volume but depends on end-customer pull.
    data:
      columns:
        - Green premium willingness-to-pay
        - Volume potential (EU Mt/year)
        - Regulatory pressure (CBAM/ETS/CSRD)
        - Certification requirement
      rows:
        - label: Premium Automotive OEMs
          values:
            - label: High
              tone: positive
              detail: Scope-3 SBT obligations; CSRD disclosure; offtake signed with Stegra; BCG confirms credit-worthiness
            - label: High
              tone: positive
              detail: EU automotive steel ~25-35 Mt/year total; Stegra targets up to 5 Mt of this
            - label: High
              tone: positive
              detail: CBAM, EU ETS, CSRD all apply directly to automotive supply chains
            - label: High
              tone: positive
              detail: ResponsibleSteel required; BMW and Scania procurement standards already reference it
        - label: Automotive Tier-1 Suppliers
          values:
            - label: Medium-High
