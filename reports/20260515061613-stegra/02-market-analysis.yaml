              detail: OEM mandates cascade through supply chain; ZF signed offtake with Stegra
            - label: Medium
              tone: neutral
              detail: Subsets of auto OEM steel volumes; important for component-level green certification
            - label: Medium
              tone: neutral
              detail: Inherits OEM Scope-3 pressure but limited direct CBAM exposure as domestic processor
            - label: Medium
              tone: neutral
              detail: Increasingly required by OEM sustainability sourcing policies cascading downward
        - label: Consumer Goods and Retail
          values:
            - label: Medium
              tone: neutral
              detail: IKEA committed to Stegra; brand-driven ESG; lower direct carbon cost exposure than OEMs
            - label: Medium
              tone: neutral
              detail: EU consumer goods steel ~5-10 Mt/year; meaningful but smaller than automotive
            - label: Low-Medium
              tone: neutral
              detail: Limited direct CBAM exposure; CSRD applies to large retailers by 2025-2026 reporting
            - label: Medium
              tone: neutral
              detail: ResponsibleSteel and equivalent certifications increasingly adopted for brand claims
        - label: Industrial Distribution
          values:
            - label: Low-Medium
              tone: warning
              detail: Distributor margins thin; green premium primarily passed through to end-customers
            - label: High
              tone: positive
              detail: Service centers distribute large volumes; thyssenkrupp Materials Services is a key channel
            - label: Low
              tone: warning
              detail: Distributors not directly regulated; end-customer obligation creates the pull
            - label: Low
