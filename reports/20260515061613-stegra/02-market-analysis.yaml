callouts:
  - calloutType: strength
    title: Binding OEM Offtake De-risks Demand
    body: >-
      Signed offtake agreements with BMW, Scania, Mercedes-Benz, Volvo Group, IKEA, ZF, thyssenkrupp Materials
      Services, and Microsoft provide validated near-term demand for Stegra's output. These commitments, backed
      by Scope-3 SBTs and CSRD compliance obligations, significantly reduce demand-side market risk relative to
      speculative greenfield projects without confirmed off-takers.
    claimRefs:
      - CM011
      - CM012
      - CM013
      - CM014
      - CM015

  - calloutType: risk
    title: Green Premium Durability Depends on Policy and OEM Margins
    body: >-
      The green steel premium of €100-300/tonne is dependent on sustained carbon pricing and corporate
      sustainability commitment budgets. IISD analysis highlights that green hydrogen-based steelmaking economics
      remain challenging without sustained policy support. Seeking Alpha commentary notes that premiums may prove
      transient if auto OEM margins face pressure in the EV transition or if CBAM implementation is weaker than
      expected. This dual exposure to policy durability and buyer margin pressure is the key downside scenario.
    claimRefs:
      - CM038
      - CM039
      - CM040

  - calloutType: insight
    title: CBAM Creates a Structural Cost Moat for EU Green Steel Producers
    body: >-
      CBAM's definitive phase application to steel imports from 2026 imposes a €130-170/tonne equivalent cost on
      conventional imported steel at current ETS prices. Stegra, producing near-zero CO2 steel in Sweden, faces
      no CBAM cost and achieves structural cost parity with or advantage over conventional imports as the CBAM
      ramp proceeds. This regulatory moat strengthens rather than depends on Stegra's technology advantage.
    claimRefs:
      - CM033
      - CM034
      - CM035
      - CM036

  - calloutType: assumption
    title: Hydrogen Cost Trajectory Embedded in SAM and SOM Sizing
    body: >-
      The SAM/SOM sizing assumes green hydrogen production costs decline to €2-3/kg by the late 2020s, consistent
      with IEA and Hydrogen Europe forecasts under policy-support scenarios. If hydrogen costs remain above €4/kg,
      Stegra's green premium requirement rises materially, narrowing the buyer base and compressing the effective
      SAM. This assumption should be stress-tested against Stegra's actual electrolyzer procurement costs.
    claimRefs:
      - CM025
      - CM026
      - CM029
      - CM040

