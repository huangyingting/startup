  evidenceGaps:
    - id: EGI001
      type: private-evidence-only
      severity: material
      topic: financial-performance-opacity
      missingEvidence: >
        Overhaul's gross margin, net income or loss, cash flow from operations, and net revenue
        retention rate are not publicly disclosed. The GSOC service layer's impact on gross margin
        cannot be quantified without internal financial statements.
      whyItMatters: >
        Gross margin and NRR are primary inputs to SaaS valuation models and capital efficiency
        assessment; without these, the profitability path and revenue compounding potential
        cannot be evaluated with reasonable confidence.
      diligenceAsk: >
        Request audited or reviewed financial statements from the management data room, including
        a gross margin bridge separating software and services COGS. Obtain cohort-level NRR and
        gross churn analysis covering at least three annual vintages.
      relatedQuestionRefs: [QI015, QI017, QI018]
      relatedTableRefs: [TI003, TI005]

    - id: EGI002
      type: private-evidence-only
      severity: material
      topic: capital-runway-uncertainty
      missingEvidence: >
        Overhaul's current cash balance, monthly operating burn, and remaining runway are entirely
        unknown. No public financial filing or investor disclosure exists to anchor these estimates
        beyond headcount-based proxies. No post-Series C financing has been publicly announced.
      whyItMatters: >
        Burn rate and runway determine whether Overhaul is approaching a financing event, which
        would dilute existing investors or impose new capital structure terms. Runway uncertainty
        is the single largest near-term financial risk for a private company at this stage.
      diligenceAsk: >
        Request bank statements, monthly P&L, and 18-month cash flow forecast from management.
        Check SEC EDGAR for any Form D filings under Overhaul's legal entity names. Conduct
        reference checks with existing investors on latest financial health signaling.
      relatedQuestionRefs: [QI005]
      relatedTableRefs: [TI004]

    - id: EGI003
      type: enumeration-incomplete
      severity: moderate
      topic: revenue-pricing-opacity
      missingEvidence: >
        Overhaul's list pricing, enterprise discount practices, actual ACVs, revenue concentration
        by customer, and insurance product economics are not publicly available. The 2022 Series C
        unicorn valuation may not reflect 2026 market conditions given post-peak SaaS multiple
        compression; no current-year valuation data is publicly available to confirm or refute.
      whyItMatters: >
        Without pricing and ACV data, the revenue model cannot be stress-tested for customer
        concentration risk, competitive displacement scenarios, or IRR sensitivity. Valuation
        currency uncertainty affects both buyer and seller negotiating position.
      diligenceAsk: >
        Request pricing schedule, top-25 customer ACV breakdown, renewal rate by cohort, and
        any recent secondary transaction data or third-party valuation analysis from the data room.
        Cross-reference with insurance industry contacts for validation of premium reduction claims.
      relatedQuestionRefs: [QI024]
      relatedTableRefs: [TI001, TI002]

