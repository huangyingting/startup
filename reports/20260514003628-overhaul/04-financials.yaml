slug: overhaul
runDate: "2026-05-14"
company:
  name: Overhaul

chapter:
  number: 4
  title: "Financial Analysis"
  summary: >
    Overhaul is a private company with no publicly disclosed revenue, margins, or burn rate.
    Its revenue model is built primarily on recurring SaaS platform subscriptions priced per asset
    or per shipment, augmented by an insurance cost-reduction product and premium AI modules such
    as RiskGPT and Risk Monitor. The company raised $145 million in a July 2022 Series C at a $1B+
    valuation, bringing estimated total disclosed capital to approximately $192–$215 million. No
    subsequent equity financing has been disclosed as of May 2026. Compared to the closest public
    market analog, Samsara ($1.6B FY2026 revenue, 98% subscription, near-breakeven), Overhaul
    appears to operate at an earlier stage of scale with higher reliance on professional services
    and GSOC staffing overhead. Customer-reported ROI metrics — including 3,200% program ROI,
    60% insurance rate reductions, and $5M in savings in six months — are company-claimed and
    require independent verification. The primary diligence blockers are ARR, gross margin, burn
    rate, and runway, all of which are unknown without data room access.

sections:
  - id: revenue-model
    title: "Revenue Model and Streams"
    body: |
      Overhaul monetizes through a multi-stream SaaS model anchored by recurring platform
      subscriptions. According to the company's FAQ and partnerships pages, Overhaul is a supply
      chain platform that combines visibility, risk intelligence, compliance, and insurance into
      a single subscription. The primary revenue stream is the platform subscription itself,
      priced on a per-asset or per-shipment basis and structured as annual or multi-year enterprise
      contracts. This model is consistent with other supply chain SaaS vendors: Samsara, the closest
      publicly traded comparable, reports approximately 98% subscription revenue from 3-to-5-year
      enterprise contracts.

      A second, differentiated revenue stream is Overhaul's insurance cost-reduction product.
      The company markets measurable insurance premium savings to enterprise customers — claiming
      up to 60% reductions in cargo insurance rates — and earns revenue either through platform
      subscription fees tied to documented controls or through a performance-based fee on insurance
      savings. This creates a value-based monetization layer that pure-play visibility vendors
      lack and that expands Overhaul's addressable wallet per customer.

      Premium AI modules, including RiskGPT (AI-guided risk response) and Risk Monitor (real-time
      cargo security with 700+ risk signal streams), represent add-on revenue streams that expand
      the platform's ACV within existing accounts. Professional services — onboarding, integration,
      and support — and IoT device sales or rentals round out the revenue mix. Together, these
      streams create a land-and-expand architecture consistent with Overhaul's Fortune 500 customer
      focus.
    claimRefs: [CI001, CI002, CI003, CI004, CI022, CI025, CI031, CI033]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: pricing-model
    title: "Pricing Architecture and Unit Economics"
    body: |
      Overhaul's pricing architecture is not publicly disclosed but can be inferred from the
      company's stated value propositions and comparable public market data. The platform is
      sold to large enterprises on multi-year contracts, which is consistent with Samsara's
      publicly disclosed 3-to-5-year contract structure. Enterprise pricing for cargo security
      SaaS typically includes a platform subscription base fee plus per-asset or per-shipment
      variable component, making Overhaul's ACV highly sensitive to the volume and value of
      cargo being monitored.

      The company-claimed ROI metrics — 3,200% program ROI, $5M saved in six months, and 60%
      reduction in cargo insurance rates — imply substantial economic value delivered to customers.
      If cargo insurance savings alone average $2–$5 million per large enterprise customer, a
      platform subscription at 10–20% of savings value would yield annual contract values of
      $200,000–$1,000,000+ per enterprise account. Overhaul's stated 14-day time to value suggests
      a streamlined deployment model that reduces customer hesitation and supports shorter sales
      cycles relative to legacy risk management software deployments.

      The insurance product creates a second monetization lever orthogonal to platform subscription.
      If Overhaul earns a percentage of insurance premium savings, the economics scale with
      demonstrated performance, creating a performance-aligned revenue mechanism that is rare in
      pure-play visibility SaaS. This dual-lever pricing approach — subscription plus insurance
      performance economics — positions Overhaul for higher ACV than single-module competitors.
    claimRefs: [CI005, CI006, CI007, CI008, CI011, CI015, CI028, CI031, CI045]
    tableRefs: [TI002, TI003]
    figureRefs: []

  - id: financial-estimates
    title: "Financial Performance Estimates and Public Market Comparables"
    body: |
      Overhaul discloses no financial metrics, making ARR, revenue growth, gross margin, and
      net income entirely opaque. However, the available signals permit triangulated estimates.
      The July 2022 Series C at a $1B+ valuation implies that at typical SaaS revenue multiples
      prevailing in mid-2022 (10–20x ARR), Overhaul's ARR at that time would have been in the
      range of $50–$100 million. Samsara's IPO in December 2021 priced at approximately
      10–12x trailing ARR, providing a comparable multiple anchor. Given three-plus years of
      post-Series C operation, and assuming 20–30% annual growth consistent with the broader
      SCV market expansion (15–20% CAGR), Overhaul's current ARR is estimated in the range
      of $75–$200 million.

      Samsara's fiscal year 2026 results provide the clearest available public benchmark.
      Samsara generated $1,618.6 million in revenue with approximately 98% subscription
      revenue, 12,000+ Core Customers (greater than $25K ARR), and a net loss of just $9.1
      million — near breakeven. This scale implies a revenue per Core Customer of approximately
      $135,000 annually. Overhaul's focus on fewer, larger enterprise customers in high-stakes
      verticals likely yields higher per-customer ACVs but a smaller total customer count.

      Valuation compression in the supply chain SaaS sector since 2022 — driven by rising interest
      rates and slower tech growth multiples — creates a material risk that the $1B+ Series C
      valuation would not be reproduced in a 2026 equity raise or secondary transaction without
      materially stronger ARR. This does not signal distress but creates a relevant caution for
      investors modeling exit value or secondary liquidity.
    claimRefs: [CI020, CI021, CI022, CI023, CI024, CI025, CI026, CI030, CI036, CI040, CI046]
    tableRefs: []
    figureRefs: [FI002, FI003]

  - id: capital-structure
    title: "Capital Structure and Funding History"
    body: |
      Overhaul has raised an estimated total of $192–$215 million in disclosed equity financing
      across four known rounds. The most recent and largest event was a $145 million Series C
      in July 2022 led by 8VC, with participation from Greenbriar Equity Group and American
      Securities — all of which are sophisticated institutional investors with logistics sector
      expertise. In-Q-Tel, the U.S. government-affiliated strategic investment fund associated
      with CIA and NSA requirements, is also a confirmed investor, signaling national security
      relevance for Overhaul's cargo intelligence data.

      Earlier rounds (Seed, Series A, Series B) are not publicly itemized. Industry research
      databases and news reports corroborate cumulative funding in the $190–$215 million range
      prior to any post-Series C activity. As of May 2026, no equity financing round, convertible
      note, debt facility, or secondary transaction has been publicly disclosed after July 2022.
      This creates an open question about remaining runway: with an estimated $145 million raised
      in the Series C and estimated annual operating costs of $30–$70 million (based on comparable
      headcount and SaaS cost benchmarks), the available runway post-Series C is estimated at
      two to four years, depending on actual spend pace. This puts potential runway exhaustion
      or refinancing at approximately 2025–2026.

      The absence of public capital activity since mid-2022 may indicate: (a) sufficient
      organic cash flow or cash balance to continue operations, (b) active fundraising not yet
      closed, (c) a strategic sale process, or (d) disciplined capital management to extend
      runway. No evidence supports any of these interpretations over the others.
    claimRefs: [CI009, CI010, CI011, CI012, CI013, CI014, CI029, CI037, CI038, CI039]
    tableRefs: [TI004]
    figureRefs: [FI004]

  - id: cost-structure
    title: "Cost Structure and Margin Drivers"
    body: |
      Overhaul's cost structure is dominated by three primary categories: (1) engineering and
      platform development personnel costs; (2) global security operations center (GSOC) staffing
      — 24/7 human monitoring and response teams that differentiate Overhaul from pure software
      competitors; and (3) IoT hardware, telco connectivity, and device logistics costs associated
      with the physical tracking sensors deployed in customer shipments. The GSOC staffing layer
      is Overhaul's most distinctive cost element: it provides real intervention capability during
      theft and tampering events but creates a structurally higher cost-of-goods-sold relative
      to software-only peers.

      SaaS companies in supply chain and fleet management typically operate at 65–75% gross
      margins at scale, though managed security service layers can compress margins to 50–60%
      before economies of scale are reached. Overhaul's combination of software and security
      services likely places it in the 55–70% gross margin range, with margin expansion expected
      as the software layer scales without proportional GSOC headcount growth. Overhaul's Climate
      Pledge signatory status and ENSO platform partnership for scope 3 emissions measurement
      indicate a governance maturity that adds modest overhead consistent with enterprise customer
      expectations.

      The insurance product creates a relatively high-margin revenue stream if structured as a
      pure fee arrangement, since insurance placement and performance documentation require
      primarily software infrastructure rather than physical services delivery.
    claimRefs: [CI020, CI029, CI034, CI035, CI042, CI043, CI044]
    tableRefs: []
    figureRefs: []

  - id: financial-gaps
    title: "Financial Data Gaps and Diligence Framework"
    body: |
      As a private company that has not filed public securities disclosures and has no known
      intention to go public in the near term, Overhaul maintains strict confidentiality around
      all core financial metrics. None of the following are publicly available: annual recurring
      revenue, revenue growth rate, gross margin, sales and marketing expense, engineering
      headcount or cost, EBITDA, net loss or income, cash balance, burn rate, runway, or customer
      count by cohort.

      The financial diligence framework for Overhaul must therefore rely on: (a) management
      data room access for audited or reviewed financial statements, (b) customer reference calls
      to cross-check renewal rates and ACV expansion, (c) third-party data providers (Pitchbook,
      CB Insights) for estimated ARR ranges and cap table data, (d) insurance industry contacts
      to validate the insurance premium reduction claims, and (e) comparable public company
      analysis to derive reasonable financial model scaffolding.

      Five key financial data gaps materially affect the investment thesis: (1) unknown ARR and
      growth rate limit revenue quality assessment; (2) unknown gross margin limits sustainability
      of the profitability path; (3) unknown burn rate and runway create refinancing risk assessment
      uncertainty; (4) unknown net revenue retention rate limits LTV and expansion potential
      modeling; and (5) whether the $1B+ Series C valuation is reflective of 2026 market conditions
      cannot be determined without current ARR and comparable transaction data.
    claimRefs: [CI027, CI032, CI041]
    tableRefs: [TI005]
    figureRefs: []

