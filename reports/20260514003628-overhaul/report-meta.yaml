companyProfile:
  summary: >
    Overhaul is a supply chain visibility and cargo security SaaS company founded in 2016 by CEO Barry
    Conlon (former GardaWorld) and CTO Mark Harvey. The platform integrates IoT sensor data, a 24/7
    Global Security Operations Center (GSOC), and the proprietary RiskGPT AI model to deliver cargo
    theft prevention, fraud detection, cold chain compliance, and end-to-end shipment visibility for
    enterprise shippers. Customers include Microsoft, Bristol Myers Squibb, CEVA Logistics, and Dyson,
    with reported coverage across Fortune-100 pharmaceutical, automotive, and consumer goods shippers.
    Overhaul achieved unicorn status with its July 2022 $145M Series C led by 8VC at a $1B+ post-money
    valuation, and has since raised an additional ~$233M across three rounds (2024–2025), bringing total
    disclosed funding to approximately $350M+. The August 2025 round omitted a valuation disclosure,
    consistent with sector multiple compression from 2021–2022 peaks.
  foundedDate: "2016-01-01"
  founders:
    - name: "Barry Conlon"
      role: "Co-Founder & CEO"
      background: "Former senior executive at GardaWorld, a global security services company; brings deep cargo security and law enforcement network expertise."
      claimRefs: [CO004]
    - name: "Mark Harvey"
      role: "Co-Founder"
      background: "Co-founded Overhaul alongside Barry Conlon; technical and operational background in logistics and supply chain security."
      claimRefs: [CO003]
  foundingLocation: "Austin, Texas, USA"
  headquarters: "Austin, Texas, USA"
  productSummary: >
    The Overhaul platform delivers five core solutions: (1) cargo theft prevention with real-time route
    deviation alerts and law enforcement integration; (2) fraud and double-brokering elimination via
    carrier risk scoring; (3) cold chain compliance with automated temperature breach alerts; (4)
    end-to-end SKU-level shipment visibility with intelligent ETAs; and (5) insurance cost reduction
    via documented risk mitigation. The RiskGPT AI engine underlies predictive risk scoring across
    all products. The GSOC provides 24/7 human-in-the-loop cargo security operations that software-only
    competitors do not replicate.
  customerFocus: >
    Enterprise shippers in pharmaceutical, automotive, life sciences, electronics, consumer goods, and
    food and beverage verticals. Primary ICP: Fortune-500 companies with complex global supply chains
    and regulatory compliance obligations (DSCSA, CTPAT, EU AI Act).
  businessModel: >
    B2B SaaS with recurring platform subscription fees; GSOC managed services component adds
    human-intensive operational revenue. No publicly disclosed pricing or revenue figures.
    IoT device integration (device-agnostic) reduces switching costs for new deployments.
  stage: "Series C"
  fundingStatus: >
    Total raised approximately $350M+: $145M Series C (Jul 2022) led by 8VC at $1B+ valuation;
    $73M round (2024); $55M round (Jan 2025); $105M Series C (Aug 2025) led by Springcoast Capital
    with Edison Partners and MidCap Financial debt facility. The 2025 valuation was not disclosed.
