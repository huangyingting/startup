acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >
      Chapter 2 includes 8 sources with broken or paywall access status out of 30 total sources
      (approximately 27%). This exceeds the 25% warning threshold. The paywalled sources are
      primarily analyst market reports (Mordor Intelligence, Grand View Research,
      MarketsandMarkets) and press releases (BusinessWire, PR Newswire, TechCrunch) that were
      cited to document evidence paths for TAM/SAM sizing. Their specific figures are not
      relied upon for high-confidence claims; all market size claims in this chapter are
      explicitly marked as low or medium confidence, and EGM001-EGM004 document the evidence
      gaps. Accessible primary regulatory and technical sources (FDA, CISA, BTS, Oracle, Inbound
      Logistics, FourKites, TAPA EMEA, NCSC) provide the foundation for structural claims.
