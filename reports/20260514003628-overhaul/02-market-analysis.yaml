company:
  name: Overhaul

chapter:
  number: 2
  title: "Market Analysis"
  summary: >
    Overhaul competes in the supply chain visibility (SCV) and cargo security market, a segment
    spanning real-time transportation visibility (RTTV), cargo theft prevention, cold chain
    monitoring, and compliance-driven traceability. Accessible secondary estimates for the broader
    SCV software market range from approximately $5–10B in 2023 depending on boundary definition,
    with CAGR estimates of 14–22% through 2028. Overhaul's true addressable market sits within a
    narrower security-plus-visibility segment serving high-consequence cargo shippers: pharmaceutical,
    high-tech, automotive, food and beverage, and retail. Major demand drivers include FDA DSCSA
    pharmaceutical traceability mandates, persistent and rising cargo theft losses, cold chain
    compliance obligations, and enterprise digital transformation of logistics. Adoption constraints
    include high integration complexity, long enterprise sales cycles, incumbent ERP/TMS vendor
    inertia, and difficulty demonstrating ROI to procurement committees. Market size from independent
    analyst sources is largely paywalled; sizing estimates in this chapter rely on accessible
    company-claimed figures, competitor disclosures, and analyst headlines.

sections:
  - id: market-boundary
    title: "Market Boundary and Definition"
    body: |
      Overhaul's market sits at the intersection of three adjacent software and services categories:
      supply chain visibility (SCV), cargo security and theft prevention, and compliance-driven
      traceability (particularly for pharmaceutical and cold chain). Understanding the boundary
      between these categories is essential for sizing and for defining who Overhaul's primary
      buyer is versus who falls outside its addressable market.

      Supply chain visibility — also called real-time transportation visibility (RTTV) — is the
      foundational layer. As Oracle and FourKites define it, SCV gives companies a detailed view
      of products and services moving from supplier to consumer by collecting, analyzing, and
      displaying data from IoT sensors, GPS telematics, carrier EDI feeds, ELD devices, and
      AIS/maritime systems. The Oracle definition emphasizes connecting internal data (ERP,
      WMS, TMS) with external data (weather, traffic, carrier) to allow supply chain teams to
      detect disruptions, reduce inventory cost, and improve on-time delivery.

      Overhaul's differentiation is that it layers cargo security, fraud prevention, and
      active risk response on top of this visibility foundation. This makes its primary addressable
      market not the full SCV category, but specifically the security-critical visibility segment:
      shippers of high-value, high-risk, or regulated cargo who need proactive intervention
      capability, not just passive tracking. These include pharmaceutical distributors subject
      to DSCSA mandates, electronics and semiconductor shippers facing organized cargo theft,
      and cold chain operators managing temperature-sensitive goods.

      Excluded from Overhaul's TAM: pure enterprise resource planning (ERP) supply chain modules
      from SAP, Oracle, or Microsoft that provide visibility as a byproduct of order management;
      consumer parcel tracking platforms (FedEx Informed Delivery, UPS My Choice); domestic
      last-mile delivery tracking; purely ocean container tracking (where Maersk, MSC, and
      direct carrier platforms dominate); and warehouse management systems (WMS) without
      in-transit security scope. Also excluded is the broader physical security industry
      (guards, locks, facility monitoring) where Overhaul does not compete.

      Adjacencies that overlap with Overhaul's market include: fleet telematics (Samsara,
      Geotab) where IoT sensor data creates a competitive surface; freight broker risk scoring
      (where fraud and double-brokering prevention is a feature of freight matching platforms);
      and insurtech platforms that use cargo data to dynamically price coverage (a capability
      Overhaul now bundles as part of its insurance cost reduction offering).
    claimRefs: [CM001, CM002, CM003, CM004, CM005, CM006, CM007, CM008]
    tableRefs: [TM001]
    figureRefs: []

  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and SOM"
    body: |
      Sizing Overhaul's total addressable market requires triangulating across several imperfect
      lenses because no single analyst report precisely delineates the security-plus-visibility
      segment Overhaul occupies. The following estimates are drawn from accessible public sources,
      company-claimed figures, competitor disclosures, and analyst report headlines.

      The broadest available estimate is for the global supply chain visibility (SCV) software
      market. Multiple analyst reports — Mordor Intelligence, Grand View Research, and
      MarketsandMarkets — have published estimates placing the SCV market at approximately $5–10B
      in 2023, with compound annual growth rates of 14–22% through 2028. These reports are
      paywalled and their methodology is not verifiable through accessible content, so the
      specific figures should be treated as directional only and with low confidence.

      A tighter sizing lens is the real-time transportation visibility (RTTV) platform segment, a
      subset of SCV focused specifically on in-transit shipment tracking. Gartner has published a
      Magic Quadrant for RTTV, acknowledging FourKites, project44, and a handful of other vendors,
      which suggests Gartner sizes this as a distinct, sufficiently large market. Gartner's actual
      market estimates are paywalled. FourKites self-describes as tracking shipments across more
      than 200 countries, and project44 claims to be the autonomous supply chain platform — both
      are indications of a market large enough to support multi-hundred-million-dollar fundraises
      and $1B+ valuations.

      A third sizing approach is bottom-up from cargo theft loss. The US cargo theft market alone
      generates an estimated $15–35B in annual losses globally, with US-specific losses estimated
      at $1B+ per year. Overhaul's security offerings address the theft prevention and recovery
      subset of this loss pool. Even at a 5–10% addressable fraction of global loss (i.e., the
      portion where an actively managed SaaS platform can create measurable ROI for shippers),
      this implies a $750M–$3.5B security-specific SAM.

      The cold chain monitoring sub-market adds a further $1–3B+ of adjacent SAM in pharmaceutical,
      food and beverage, and biotech, driven by regulatory requirements including FDA's DSCSA
      mandate for prescription drug traceability. DSCSA became fully effective for prescription
      drugs as of November 2023, creating an addressable compliance budget line for pharmaceutical
      distributors and manufacturers.

      Overhaul's realistic SOM, given its current scale and competitive positioning, is a fraction
      of the SAM. With total raised of ~$215M+ and a private company status, and in a market
      where project44 ($704M raised) and FourKites ($200M+ raised, 2,500+ carrier integrations)
      have substantially more capital and network effects, Overhaul's practical share is likely
      in the tens to low hundreds of millions of ARR if they achieve dominant market position in
      the security-critical niche.
    claimRefs: [CM009, CM010, CM011, CM012, CM013, CM014, CM015, CM016, CM017, CM018]
    tableRefs: [TM002]
    figureRefs: [FM001, FM002]

  - id: buyer-segmentation
    title: "Buyer Segmentation and Purchase Dynamics"
    body: |
      Overhaul's product sells to enterprise logistics and supply chain organizations whose
      cargo shipments are high-value, regulated, or theft-prone. Overhaul's own industry page
      explicitly lists eight verticals: life sciences, electronics, manufacturing, retail, food
      and beverages, logistics service providers (LSPs), AI hardware, and automotive. Each
      vertical has a distinct buyer profile, risk driver, and adoption trigger.

      In life sciences and pharmaceutical, the primary buyer is the Director or VP of Logistics,
      Supply Chain Compliance Officer, or Chief Supply Chain Officer at pharmaceutical
      manufacturers, distributors, and specialty pharmacies. The adoption trigger is predominantly
      regulatory: FDA's DSCSA (fully effective November 2023) mandates electronic, interoperable
      track-and-trace for prescription drugs. This creates a compliance-driven pull rather than
      a purely ROI-driven sale — a significant purchasing dynamic because it shortens the ROI
      justification cycle and involves legal and compliance teams alongside logistics buyers.

      In the electronics and AI hardware verticals, the buyer is typically a VP of Logistics or
      Security Director at a large manufacturer or OEM. The adoption trigger is cargo theft
      prevention — electronic components and finished devices (and, increasingly, AI accelerator
      hardware) are among the highest-theft categories. Overhaul's cargo theft intelligence
      hub documenting dozens of individual recoveries suggests an active market for its
      response-plus-tracking capabilities in this segment.

      In automotive, the buyer is an OEM supply chain director managing inbound VIN (vehicle
      identification number) and parts tracking to ensure production line continuity. The
      adoption trigger is disruption risk: an automotive plant idle for a day due to a missing
      shipment can cost millions. Overhaul's automotive solution emphasizes predictive ETAs
      and proactive exception alerts specifically for this use case.

      In food and beverage, the buyer is a quality assurance or supply chain director for
      refrigerated or temperature-sensitive goods. The trigger is temperature excursion risk
      and regulatory compliance (FDA food safety, Good Distribution Practice standards).
      The buyer type here overlaps with cold chain monitoring platform buyers.

      Logistics service providers (LSPs) — 3PLs, freight forwarders, and carriers — are a
      distinct channel segment. LSPs may buy on behalf of shipper clients, making them
      potential resellers or channel partners rather than end-buyers. Overhaul's platform
      value proposition for LSPs centers on helping them win and retain high-consequence
      shipper accounts, with analytics and reporting to demonstrate performance.
    claimRefs: [CM019, CM020, CM021, CM022, CM023, CM024, CM025, CM026, CM027]
    tableRefs: [TM003]
    figureRefs: [FM003]

  - id: growth-drivers
    title: "Growth Drivers and Regulatory Catalysts"
    body: |
      The supply chain visibility and cargo security market is driven by several converging
      structural forces that are likely to sustain above-average growth rates through 2028.

      Regulatory mandates constitute the most powerful and durable driver. The FDA's Drug Supply
      Chain Security Act (DSCSA), signed into law in 2013 and fully effective for prescription
      drugs by November 2023, is the most consequential single regulation for Overhaul's
      pharmaceutical vertical. It requires interoperable electronic identification and tracing
      of prescription drug packages through the supply chain, creating a compliance-driven
      software purchasing requirement for thousands of US pharmaceutical companies and their
      distribution partners. This converts previously discretionary supply chain visibility
      software spending into near-mandatory spend for pharma supply chain operators.

      Rising cargo theft losses are a second structural driver. While specific annual statistics
      from credible independent sources are not fully accessible in this research run, TAPA EMEA
      (Transported Asset Protection Association) — the leading international supply chain security
      standard-setting body — actively tracks hundreds of cargo theft incidents per year across
      its member network. The ongoing frequency and scale of incidents documented on Overhaul's
      own cargo theft intelligence hub (including multi-hundred-thousand to multi-million dollar
      recoveries per quarter) validate the persistent and material nature of the theft risk.
      CISA and NCSC UK have both identified supply chain disruption and physical asset security
      as national infrastructure risks, indicating government-level acknowledgment of the problem
      scale.

      Enterprise digital transformation of logistics is a third driver. IDC's 2022 Supply Chain
      Survey (cited by Oracle) found that 80% of enterprise respondents had projects underway
      to improve supply chain visibility, reflecting the acceleration of digital logistics
      investment following COVID-19 supply chain disruptions. This creates a strong underlying
      spend impulse that benefits all SCV platforms, including Overhaul.

      The expansion of high-value, theft-targeted cargo categories — particularly AI accelerator
      hardware (GPUs, specialized chips), consumer electronics, and pharmaceutical products — is
      a fourth driver specific to Overhaul's security-critical positioning. As AI hardware
      values per shipment increase and global demand for these components intensifies, the
      financial incentive for sophisticated cargo theft increases proportionally, expanding the
      addressable problem.

      Finally, insurance pricing sensitivity creates a flywheel: as cargo insurers increasingly
      use real-time risk data to price coverage, shippers using Overhaul's platform may obtain
      lower premiums, creating a financial incentive for adoption beyond the direct theft
      prevention ROI.
    claimRefs: [CM028, CM029, CM030, CM031, CM032, CM033, CM034, CM035]
    tableRefs: [TM004]
    figureRefs: []

  - id: constraints-gaps
    title: "Adoption Constraints and Diligence Gaps"
    body: |
      Despite strong structural tailwinds, several adoption constraints and diligence gaps
      temper the near-term market opportunity for Overhaul specifically.

      Enterprise sales cycle length is the primary structural constraint. Supply chain visibility
      platforms require multi-stakeholder consensus (IT, logistics, finance, legal, security) and
      integration work with existing TMS, ERP, and carrier systems. For large enterprises, this
      can mean 6–18 month sales cycles. This limits Overhaul's ability to rapidly convert the
      large wave of post-2022 compliance buyers, particularly in pharmaceutical, where procurement
      cycles tend to be rigid.

      Incumbent ERP and TMS vendor inertia is a second constraint. SAP, Oracle, and Microsoft all
      offer supply chain visibility features embedded within their broader ERP platforms. Customers
      who have made large investments in SAP S/4HANA or Oracle SCM Cloud may resist adding a
      separate point solution like Overhaul, even if Overhaul's security capabilities are superior
      for high-consequence cargo. This creates a "good enough" inertia risk for Overhaul in
      segments where the incumbent ERP vendor's visibility module partially satisfies the buyer.

      Market fragmentation among competitors is a third constraint: Overhaul must differentiate
      from project44 (visibility depth, $704M raised), FourKites (carrier network breadth,
      2.5M+ shipments/day), Samsara (IoT hardware + software bundle, $10B+ market cap), and a
      long tail of regional or niche security providers. In a fragmented market, differentiation
      on "security + visibility" resonates strongly with security buyers but may not be
      sufficient for logistics buyers who primarily evaluate on carrier coverage and ETA accuracy.

      Data quality and completeness risk is a fourth constraint. Real-time visibility platforms
      are only as good as the data feeds they ingest. Carrier and broker compliance rates with
      tracking data sharing vary widely, and gaps in visibility coverage undermine platform
      value. Overhaul's device-agnostic approach helps address this but does not eliminate it.

      Finally, several major diligence questions remain unresolved due to data access limitations:
      independent market size for the security-critical SCV segment is paywalled; independent
      assessment of Overhaul's carrier/device integration breadth vs. competitors is unavailable;
      no public customer count, churn rate, or NPS data exists for Overhaul; and the financial
      health of the company since its July 2022 fundraise is not publicly verifiable.
    claimRefs: [CM036, CM037, CM038, CM039, CM040, CM041, CM042, CM043]
    tableRefs: []
    figureRefs: [FM004]

