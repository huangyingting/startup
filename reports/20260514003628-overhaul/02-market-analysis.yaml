  evidenceGaps:
    - id: EGM001
      type: access-blocked
      severity: material
      title: "Analyst market size reports paywalled — TAM/SAM estimates unverifiable"
      description: >
        Mordor Intelligence, Grand View Research, and MarketsandMarkets supply chain visibility
        market reports are behind paywalls. Specific TAM estimates, CAGR methodology, and
        segment boundary definitions are not accessible. This is the primary evidence gap for
        Chapter 2; all market size figures in TM002 should be replaced with verified data
        from institutional access to at least two of these reports.
      relatedQuestionRefs: [QM001, QM002, QM004, QM005, QM015, QM016, QM022]
      relatedTableRefs: [TM002]
      diligenceAsk: >
        Obtain full-access institutional subscriptions to Mordor Intelligence, Grand View Research,
        or MarketsandMarkets SCV/RTTV market reports. Cross-reference with Gartner RTTV Magic
        Quadrant report (also paywalled) for methodology validation.

    - id: EGM002
      type: missing-source
      severity: material
      title: "Independent cargo theft statistics — CargoNet, TAPA annual reports not accessible"
      description: >
        CargoNet's annual cargo theft statistical report (the primary US industry source for
        authoritative cargo theft data) returned 404. TAPA EMEA's global statistics beyond
        their homepage incident tracker are not freely accessible. No authoritative independent
        figure for annual US or global cargo theft losses was verified in this run.
      relatedQuestionRefs: [QM003, QM021]
      relatedTableRefs: [TM002]
      diligenceAsk: >
        Obtain CargoNet's annual cargo theft statistical report (BSI or Verisk subsidiary). Access
        TAPA EMEA's annual Incident Report. Cross-reference with FBI Uniform Crime Report for US
        cargo theft data. Use independently sourced figures to replace the $15–35B global estimate
        in TM002.

    - id: EGM003
      type: private-evidence-only
      severity: material
      title: "Overhaul customer count, ARR, churn, and segment win rates not public"
      description: >
        As a private company, Overhaul has not disclosed customer count, annual recurring revenue,
        customer churn rate, net revenue retention, or segment-specific win rates. This limits
        the ability to validate the buyer segmentation in TM003 with actual traction data or to
        calculate a reliable SOM from first principles.
      relatedQuestionRefs: [QM024]
      relatedTableRefs: [TM003]
      diligenceAsk: >
        Request from Overhaul: total customer count by vertical, ARR, net revenue retention,
        top-10 customer concentration, and win rates by vertical and by competitive scenario.
        Cross-reference with company references (Microsoft logistics principal cited in company
        materials) and request additional named customer references.

    - id: EGM004
      type: enumeration-incomplete
      severity: minor
      title: "TAM/SAM/SOM sizing lens table — partial coverage due to paywalled analyst data"
      description: >
        TM002 is marked as partial coverage. Most analyst market size estimates are paywalled
        or redirected to wrong content. Bottom-up and competitor-implied estimates are
        approximate and cannot substitute for verified analyst methodology.
      relatedQuestionRefs: [QM001, QM015, QM016]
      relatedTableRefs: [TM002]
      diligenceAsk: >
        Supplement with verified analyst data from Gartner, IDC, or Forrester once accessible.

    - id: EGM005
      type: enumeration-incomplete
      severity: minor
      title: "Segment / buyer map — partial coverage; buyer personas inferred not survey-validated"
      description: >
        TM003 is marked as partial coverage. Buyer personas, budget ownership, and adoption
        triggers are inferred from Overhaul's industry page, regulatory context, and industry
        best practices — not from an independent buyer survey, win-loss analysis, or customer
        advisory board data.
      relatedQuestionRefs: [QM007, QM024, QM006]
      relatedTableRefs: [TM003]
      diligenceAsk: >
        Conduct or obtain an independent buyer survey across pharmaceutical, electronics, and
        automotive verticals. Request Overhaul's internal win-loss data to validate adoption
        triggers and budget owner characterizations.

    - id: EGM006
      type: access-blocked
      severity: minor
      title: "Adverse market adoption data — no accessible independent slowdown or failure evidence"
      description: >
        Adverse evidence for market adoption slowdowns, pilot failures, or market contraction
