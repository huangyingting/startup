summary:
  headline: >-
    Overhaul 是有条件通过：它是一套纵向差异化、已在 Fortune 100 验证的货运安全平台，需求逻辑可信；但财务不透明、行业估值倍数压缩，意味着任何高于 $500M 的入场价格，都必须先在 data room
    里确认关键数据。
