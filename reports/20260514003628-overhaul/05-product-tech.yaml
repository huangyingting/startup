company:
  name: Overhaul

chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Overhaul is a software-based, device-agnostic supply chain visibility, risk, compliance, and
    insurance platform that combines real-time IoT-driven shipment monitoring with active cargo
    security intervention. The platform's core capabilities span five modules: end-to-end visibility,
    cargo theft prevention, fraud and double-brokering detection, cold chain and compliance monitoring,
    and insurance cost reduction. Differentiating technology layers include RiskGPT — an AI-guided
    risk response tool built on Microsoft Azure OpenAI — the Risk Monitor product streaming 700+
    risk signal sources, a proprietary IoT Assess and Deploy service, and a 24/7 Global Security
    Operations Center (GSOC). The FreightVerify acquisition (2023) extended the platform to
    item-level inventory visibility, while SensiGuard (2022) added EMEA security operations.

    Key technology metrics claimed by the company include: a 98%+ cargo theft prevention rate,
    a 96% FTL cargo theft recovery rate, a loss ratio of approximately 7% (vs. typical industry
    benchmarks), and $1.4 trillion in cargo value monitored simultaneously. RiskGPT, launched May
    2023 using Azure OpenAI Service Studio, enables real-time AI-guided incident response with
    step-by-step escalation protocols and photo-based verification (RiskGPT Vision). The
    Intelligence as a Service offering (July 2023) added three tiers of cargo intelligence from
    global threat pattern analysis down to shipment-specific tactical alerts. The IoT Assess and
    Deploy service achieved 99.9% device performance for a Fortune 50 customer and reduced lost
    device fees by 17% industry-wide.

    Technology limitations include the platform's high GSOC staffing overhead (constraining gross
    margins relative to pure-software peers), a historically narrow focus on high-consequence cargo
    (partially addressed by the FreightVerify acquisition), opaque API and developer documentation,
    and the absence of publicly disclosed patents. No post-Series C public fundraise was announced
    until January 2025, when a $55 million growth round led by Springcoast Partners affirmed
    continued investor confidence.

sections:
  - id: platform-overview
    title: "Platform Architecture and Core Capabilities"
    body: |
      Overhaul describes itself as a "software-based supply-chain visibility, risk, compliance, and
      insurance solution for the world's leading brands." The platform is deliberately device-agnostic,
      meaning it ingests telemetry from any compatible IoT hardware rather than requiring proprietary
      sensors — an architectural choice the company compares to a Big 5 professional services firm that
      audits and recommends best-fit devices for each customer's logistics profile.

      The platform stack operates across five interlocking product modules. The Visibility module
      delivers real-time, SKU-level shipment location and status across road, air, rail, and ocean
      modes. The Cargo Theft Prevention module combines route deviation and unauthorized stop detection
      with AI-backed intervention and active law enforcement coordination via a proprietary "smartlink"
      that pushes location, cargo manifest, and driver details directly to responding officers in real
      time. The Fraud and Double-Brokering module assigns real-time risk scores to carriers based on
      multiple risk factors, with pre-booking and on-site verification before cargo handoff. The Cold
      Chain and Compliance module monitors temperature, humidity, and other condition parameters with
      automated alerts for threshold breaches and audit-ready logs for pharmaceutical GDP and DSCSA
      requirements. The Insurance module connects customers with risk-informed underwriters and can
      support up to 60% reduction in cargo insurance premiums.

      The FreightVerify acquisition (2023) extended the platform's item-level inventory view to goods
      below the high-consequence cargo threshold — materials that previously fell outside Overhaul's
      core target. The combined platform now offers what the company describes as "warehouse-level
      control over goods in motion," covering approximately 80% of the supply chain previously
      inaccessible to Overhaul's risk treatment. SensiGuard (acquired February 2022) added global
      security operations infrastructure in EMEA, expanding the GSOC's geographic reach and
      establishing direct law enforcement partnerships in additional regions.

      As of January 2025, Overhaul serves approximately 350 customers globally — including Microsoft,
      Dyson, and Bristol Myers Squibb — with a 600-person workforce and approximately $1.4 trillion in
      cargo value in the platform at any given time. The company claims a loss ratio of approximately
      7%, far below typical insurance industry benchmarks, and $226 million in cargo theft prevented
      through platform interventions.
    tableRefs: [TE001]
    figureRefs: [FE001, FE002]

  - id: ai-risk-analytics
    title: "AI Risk Analytics: RiskGPT and Risk Intelligence"
    body: |
      Overhaul's AI layer is anchored by RiskGPT, launched on May 2, 2023, as an AI-powered solution
      for real-time in-transit risk mitigation. RiskGPT is built on Microsoft Azure OpenAI Service
      Studio, fine-tuned on Overhaul's proprietary supply chain intelligence and shipment history
      data. The system provides GSOC operators and customer logistics teams with step-by-step
      incident guidance, escalation protocols, targeted communications templates, and contextual
      next-step recommendations — all tailored to the specific shipment, risk type, location,
      timing, photos, and historical context associated with an event. Prior to RiskGPT, Overhaul
      reported cargo theft prevention rates above 98%; the company expects the AI guidance to
      further increase response consistency across shifts and geographies.

      The Azure OpenAI partnership delivers enterprise-grade security, privacy, and scalability
      for the AI layer. RiskGPT Vision, an extension, adds photo-based verification and image
      analysis to support upstream data quality and early carrier fraud detection, such as
      identifying signage tampering or identity misrepresentation. The AI model is continuously
      fine-tuned using Overhaul's growing dataset of in-transit events, making the model's
      accuracy a function of platform scale — a compounding data moat that newer entrants without
      comparable event history cannot easily replicate.

      The Risk Monitor product extends AI-driven intelligence beyond individual shipment events
      to a macro risk signal layer. The product monitors 700+ risk signal streams, enabling
      identification of emerging geographic threats, crime pattern shifts, regulatory changes,
      and extreme weather events before they affect in-transit cargo. In July 2023, Overhaul
      launched its Intelligence as a Service (IaaS) offering, formalizing three tiers of cargo
      intelligence: (1) strategic global pattern analysis via weekly bulletins and trend reports,
      (2) operational local risk assessments covering route-specific crime hot spots, and
      (3) tactical shipment-specific real-time alerts for individual loads at risk. The IaaS
      offering draws from 300+ Overhaul customers, direct law enforcement partnerships, and
      proprietary exclusive industry connections to build a continuously updated intelligence
      network that individual shippers cannot replicate independently.

      The AI platform is also central to Overhaul's FraudWatch tool — a carrier identity
      verification product extended to lower-value cargo via the FreightVerify integration.
      Strategic cargo theft involving fraudulent carrier identity has increased over 1,000%
      in one year according to Overhaul's internal analysis, making AI-based fraud scoring
      a critical and expanding product capability.
    tableRefs: [TE002]
    figureRefs: [FE003]

  - id: iot-device-ecosystem
    title: "IoT Device Ecosystem and Technology Integrations"
    body: |
      Overhaul's IoT Assess and Deploy service provides device-agnostic IoT lifecycle management
      as a core platform capability, not simply a hardware resale business. The service audits,
      recommends, deploys, and manages IoT devices across customers' logistics networks using a
      rigorous scoring system and regular reviews for device manufacturers — positioning Overhaul
      similarly to a professional services firm that independently recommends technology rather
      than being tied to a proprietary hardware vendor. The company describes this independence
      as a cornerstone of its "Different on Purpose" market positioning.

      In December 2023, Overhaul announced significant enhancements to IoT Assess and Deploy,
      citing three quantitative performance outcomes: (1) a Fortune 50 customer achieved an average
      device performance of 99.9% with the refined service, (2) a pharma Fortune 500 customer
      experienced an 18% increase in device tracking compliance, and (3) a global consumer
      electronics company reduced costs associated with lost device fees by $300,000. Across all
      lanes, the enhanced service reduced lost device fees by 17% — a direct cost saving with
      insurance cost implications for customers.

      On the integration side, Overhaul's platform connects to Transportation Management Systems
      (TMS), Warehouse Management Systems (WMS), and Enterprise Resource Planning (ERP) platforms.
      The company's Microsoft relationship includes deep integration with Microsoft's supply chain
      and enterprise platforms, and the Azure OpenAI implementation for RiskGPT reflects a
      technology partnership that extends beyond a simple API vendor relationship. The FreightVerify
      acquisition added item-level inventory data API connectivity across supply chain partners —
      a capability that required API-level integration at the SKU/attribute level with manufacturers,
      distributors, and logistics providers simultaneously.

      Overhaul's platform supports multi-modal transport coverage: road, air, rail, and ocean.
      The device-agnostic architecture means customers are not locked into a single sensor vendor;
      instead, Overhaul's platform layer normalizes telemetry from diverse device manufacturers
      across tried and tested ranges appropriate to specific use cases. This approach reduces
      customer onboarding friction and allows the platform to accommodate rapidly evolving IoT
      hardware without core software rewrites.
    tableRefs: [TE003]
    figureRefs: [FE004]

  - id: cold-chain-compliance
    title: "Cold Chain and Compliance Monitoring"
    body: |
      Overhaul's cold chain and compliance module serves pharmaceutical, food and beverage, and
      life sciences customers who face stringent regulatory requirements for in-transit product
      condition monitoring. The platform provides continuous temperature and condition monitoring
      with configurable threshold alerts — supporting multiple distinct temperature profiles for
      different product categories on the same platform (e.g., frozen biologics at -80°C alongside
      refrigerated vaccines at 2–8°C). Automated alerts for threshold breaches support proactive
      intervention before product integrity is compromised, with audit-ready data logs for
      post-incident reporting and regulatory inspection.

      On the regulatory compliance side, Overhaul's platform addresses the US Drug Supply Chain
      Security Act (DSCSA) requirements that mandate serialized track-and-trace for prescription
      drugs, as well as Good Distribution Practice (GDP) standards applied in pharmaceutical
      distribution. The platform's compliance monitoring module generates the custody and
      condition documentation required by these frameworks without manual data entry — a
      significant efficiency gain for pharmaceutical logistics teams managing hundreds or thousands
      of in-transit shipments.

      The company's 14-day time-to-value claim for the platform overall (cited in industry coverage)
      suggests a rapid deployment architecture that minimizes the integration burden for compliance-
      sensitive customers who cannot afford extended implementation timelines before achieving
      monitored status. Overhaul's cold chain quality solution is explicitly named as a product
      developed for pharma and food and beverage customers in the company's own TechCrunch coverage
      from January 2025, confirming that the cold chain capability is an active product area rather
      than a legacy feature.

      The compliance module also supports C-TPAT (Customs-Trade Partnership Against Terrorism) and
      AEO (Authorised Economic Operator) compliance frameworks, extending the product's relevance
      to customs and trade security requirements beyond pharmaceutical-specific mandates. For
      enterprise customers operating across multiple jurisdictions, the ability to monitor cargo
      condition and chain-of-custody across international movements within a single platform is
      a key value proposition relative to jurisdiction-specific point solutions.
    tableRefs: [TE004]

  - id: gsoc-security
    title: "Global Security Operations Center (GSOC)"
    body: |
      The Global Security Operations Center (GSOC) is one of Overhaul's core differentiating
      technology-plus-operations capabilities. Operating 24/7, the GSOC monitors cargo events
      flagged by the platform's AI and risk models, coordinates intervention, and facilitates
      real-time communication with law enforcement and recovery services. Unlike pure-software
      supply chain visibility platforms, Overhaul's GSOC means the platform's alerts trigger
      active human response — not just customer notifications.

      The GSOC's law enforcement coordination capability is operationalized via the "smartlink"
      feature: when a cargo event is escalated, the GSOC can push a real-time data package
      including shipment location, driver/vehicle details, cargo manifest, and photo evidence
      directly to responding local law enforcement officers. This moves the response timeline
      from hours (when a customer receives an alert and manually contacts authorities) to minutes
      (when the GSOC provides pre-formatted, actionable intelligence to officers already in the
      field). Overhaul claims a 96% recovery rate for FTL cargo theft and a total of $226
      million in cargo theft prevented through combined AI and GSOC intervention.

      The three tiers of IaaS intelligence (strategic, operational, tactical) are operationally
      supported by the GSOC infrastructure. GSOC analysts aggregate intelligence from Overhaul's
      customer network, law enforcement liaison relationships, and external risk signal streams
      to produce weekly bulletins and real-time threat assessments for specific routes and
      regions. This makes the GSOC simultaneously a customer service delivery mechanism and a
      data collection layer that feeds back into the AI models, creating a closed-loop intelligence
      improvement cycle.

      The SensiGuard acquisition (February 2022) expanded the GSOC's geographic reach and added
      EMEA-specific law enforcement partnerships and operational expertise, reinforcing Overhaul's
      claim of global coverage for high-value cargo security. This physical operations layer —
      staffed human analysts, law enforcement relationships, regional intelligence networks —
      creates a structural moat that is difficult for software-only competitors to replicate
      quickly and represents the primary reason for Overhaul's higher-than-typical operating cost
      structure relative to pure-SaaS supply chain visibility peers.
    tableRefs: []
    figureRefs: [FE005]

  - id: tech-limitations
    title: "Technology Limitations, Gaps, and Competitive Risks"
    body: |
      Overhaul's technology stack has several limitations that create risk for investors. First,
      the platform's website and product pages are entirely JavaScript-rendered, making external
      technical due diligence difficult. No developer API documentation, publicly disclosed
      technical architecture, or software patents are identifiable through open-source research.
      This opacity complicates third-party assessment of scalability, security posture, or
      intellectual property depth, and means that analyst and investor confidence in technical
      claims rests primarily on company-provided narratives.

      Second, the GSOC model, while differentiated, creates structural gross margin pressure that
      pure-software competitors (FourKites, project44) do not face. Staffing a 24/7 operations
      center across multiple time zones and geographies introduces labor cost variability, key-
      person dependency risks, and scaling challenges that do not apply to automated software
      pipelines. As a result, Overhaul's path to SaaS-comparable gross margins (typically 70–80%)
      may require either automation of GSOC functions (reducing human involvement in routine
      interventions) or price premium justification that customers must consistently validate.

      Third, although RiskGPT is built on Azure OpenAI, Overhaul's AI capability is positioned
      as a differentiator but may face competitive erosion as general-purpose AI tools become
      embedded in competing platforms. FourKites and project44 have each invested in AI-driven
      automation and predictive analytics; their larger shipment networks provide comparable or
      superior training data volumes for general ETA prediction and disruption detection
      capabilities. Overhaul's moat in AI is most defensible in the cargo security and fraud
      detection domain specifically, where its proprietary event database of theft, recovery, and
      fraud patterns is likely unmatched.

      Fourth, the FreightVerify and SensiGuard integrations represent significant technical
      integration debt. Merging platform architectures, data schemas, and customer-facing
      experiences from two acquired companies with different technology stacks is a common source
      of multi-year engineering drag. No public roadmap or integration timeline has been disclosed,
      creating uncertainty about when the combined platform's full capabilities will be uniformly
      available to all customers. Finally, Overhaul's 14-day time-to-value claim implies fast
      onboarding, but high-value pharmaceutical customers with regulated IT environments
      frequently face multi-month integration cycles when connecting to external platforms.
    tableRefs: [TE005]

