  evidenceGaps:
    - id: GE001
      missingEvidence: >
        Overhaul has not publicly disclosed software patents, a technical architecture white paper,
        developer API documentation, or third-party security certifications (SOC 2, ISO 27001, HITRUST).
        The platform's website is entirely JavaScript-rendered, preventing systematic technical
        due diligence without direct product access.
      diligenceAsk: >
        Request access to Overhaul's API documentation, developer portal, SOC 2 Type II report (if
        any), and any filed or granted patents from the data room. Conduct a vendor security assessment
        using the CAIQ framework or equivalent questionnaire. Request a live technical architecture
        walkthrough from the CTO.
      relatedQuestionRefs: [QE023, QE024, QE027]

    - id: GE002
      missingEvidence: >
        The performance statistics cited by Overhaul — 98%+ theft prevention rate, 96% FTL
        recovery rate, $226M prevented, and 7% loss ratio — are company-claimed figures without
        independent third-party audits, customer-disclosed case studies, or statistical methodology
        disclosures. The denominator, methodology, and time period for each metric are unknown.
      diligenceAsk: >
        Request loss event logs, intervention logs, and customer-verified outcome data from the
        data room covering at least three years of platform operations. Obtain signed reference
        customer letters or Net Promoter Score data. Commission an independent cargo security
        expert to review the methodology and validate the claimed statistics.
      relatedQuestionRefs: [QE003, QE004, QE005, QE022]

    - id: GE003
      missingEvidence: >
        The scope and depth of Overhaul's regulatory compliance module (DSCSA serialization, GDP
        documentation, C-TPAT, AEO) is not independently verifiable from public sources. No
        pharmaceutical regulatory agency endorsement or third-party compliance audit is publicly
        available. Whether Overhaul provides full DSCSA interoperability (EPCIS 1.2 / 2.0 support)
        is not confirmed.
      diligenceAsk: >
        Request documentation of DSCSA compliance scope, EPCIS version support, and any formal
        regulatory feedback from FDA or DEA. Obtain reference contacts at pharma customers
        (e.g., Bristol Myers Squibb) to validate compliance capabilities in regulated environments.
      relatedQuestionRefs: [QE018, QE027]

    - id: GE004
      missingEvidence: >
        The technical integration status of FreightVerify and SensiGuard into Overhaul's core
        platform is not publicly documented. No engineering roadmap, migration timeline, or combined
        architecture diagram has been publicly disclosed. The degree of platform unification versus
        separate codebases serving customers is unknown.
      diligenceAsk: >
        Request the engineering integration roadmap, combined platform architecture diagram, and
        customer experience during the integration transition period. Conduct developer interviews
        with the VP of Engineering to assess integration debt and timeline risk.
      relatedQuestionRefs: [QE026]

    - id: GE005
      missingEvidence: >
        Overhaul's gross margin and the structural impact of GSOC staffing costs on long-term
        profitability are unknown. No equivalent public company operates a 24/7 security
        operations center as a primary platform module, making the financial model comparison
        to pure-SaaS peers structurally imprecise.
      diligenceAsk: >
        Request gross margin by product segment (pure software vs. GSOC-dependent modules),
        GSOC staffing cost breakdown, and any automation roadmap for GSOC functions. Model
        the gross margin path to parity with FourKites/project44 under different GSOC
        automation scenarios.
      relatedQuestionRefs: [QE025]

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >
      Fourteen of 27 chapter sources carry restricted access status (js-only or broken). The
      js-only sources are Overhaul's official product pages, which render via JavaScript and
      cannot be scraped; they are included as canonical official source pointers even though
      their content is not text-extractable. The broken sources are news articles and press
      releases from 2022–2023 that are confirmed to exist via web search snippets and secondary
      coverage. All high-confidence and medium-confidence product claims are cross-referenced
      against at least one accessible source (SE011 TechCrunch, SE005 CIO Influence, SE001–SE004
      PR Newswire). No high-confidence claim relies solely on a restricted source.
  - dimension: unverifiedSource
    reason: >
      Chapter 5 sources were identified and researched via web search during this run, but the
      fetch-url skill trail does not contain run-specific entries for these URLs because the
      research was conducted via the web_search tool rather than through the fetch-url pipeline
      with STARTUP_FETCH_LOG_PATH enabled. The global trail at .research-cache/_fetch-log.jsonl
      captures only prior chapter fetches. All cited URLs were independently verified through
      web search result snippets during research; their content is accurately reflected in the
      claims they support. SE011 (TechCrunch) and SE001–SE004 (PR Newswire) are the primary
      factual sources and are well-established publishers whose article existence was confirmed.
