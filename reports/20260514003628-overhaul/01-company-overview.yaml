company:
  name: Overhaul

chapter:
  number: 1
  title: "Company Overview"
  summary: >
    Overhaul, founded in 2016 in Austin, Texas by Barry Conlon and Mark Harvey, is a unicorn-status
    SaaS platform combining supply chain visibility, predictive risk intelligence, and cargo security.
    The company raised $145M in a July 2022 Series C at a $1B+ valuation led by 8VC, bringing total
    funding to approximately $215M+. Overhaul serves Fortune 500 customers in pharmaceutical, automotive,
    life sciences, and high-tech sectors, and monitors billions of dollars of cargo daily.

sections:
  - id: company-identity
    title: "Company Identity and Mission"
    body: |
      Overhaul is a supply chain visibility and risk management platform headquartered in Austin,
      Texas. Founded in 2016, the company has grown into a unicorn-status enterprise SaaS business
      with global offices in Dublin (Ireland), London (UK), São Paulo (Brazil), and Mexico City.
      The company's mission, as stated on its official website, is to "protect the world's most
      critical supply chains with data-driven intelligence that keeps our customers in control."

      Overhaul's differentiated positioning lies in combining visibility (knowing where cargo is)
      with risk intelligence (knowing what threats it faces) and active security response. The
      platform integrates SKU-level tracking, AI-powered risk scoring, compliance monitoring, and
      insurance optimization into a single unified platform. This positions Overhaul distinctly from
      pure-play visibility providers like FourKites or project44, which focus primarily on shipment
      tracking without the cargo security and fraud prevention layers.

      The company targets high-consequence cargo shippers — companies for whom in-transit theft,
      spoilage, counterfeiting, or regulatory breach would cause material financial or reputational
      harm. Target verticals include pharmaceutical (where DSCSA regulations mandate supply chain
      security), automotive, life sciences, consumer electronics, and food and beverage. The company
      operates a business-to-business SaaS model, selling to logistics and supply chain teams at
      large enterprises, including Fortune 500 companies. Microsoft is a publicly cited customer,
      with a Principal of Logistics reporting a 4x return on investment in Overhaul's first peak
      shipping season.
    claimRefs: [CO001, CO002, CO003, CO006, CO007, CO008, CO015, CO033, CO034, CO035, CO038, CO039]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: founders-leadership
    title: "Founders, Leadership, and Governance"
    body: |
      Overhaul was co-founded in 2016 by Barry Conlon and Mark Harvey. Barry Conlon serves as CEO
      and brings deep domain expertise from the private security sector — most notably as a senior
      executive at GardaWorld, one of the world's largest security services companies. This
      background gives Conlon a distinctive founder-market fit for a company that addresses cargo
      security and supply chain risk: he understands both the security threat landscape and the
      operational protocols of large enterprises managing physical asset protection.

      The company's About page confirms that Overhaul's leadership team is composed of experts
      dedicated to securing global supply chains, though detailed biographies of individual
      executives beyond the founders are not publicly itemized in crawlable website content as of
      May 2026. The board and advisory structure includes representation from institutional
      investors including 8VC, Greenbriar Equity Group, and American Securities, all of whom
      participated in the Series C financing. In-Q-Tel, the strategic investment arm of the US
      intelligence community, also reportedly invested in Overhaul around 2021-2022, which signals
      national security-relevant applications of the platform.

      Key-person dependency risk is concentrated in Barry Conlon, who is the public face of the
      company and the primary architect of its security-focused differentiation strategy. No
      material leadership departures or governance controversies were identified in available public
      sources as of 2026. As a private company, Overhaul does not disclose its cap table, board
      seat allocation, or investor rights agreements publicly.
    claimRefs: [CO003, CO004, CO005, CO009, CO010, CO011, CO012, CO040]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-capital
    title: "Funding History, Valuation, and Investors"
    body: |
      Overhaul reached unicorn status in July 2022 when it closed a $145 million Series C round led
      by 8VC, a technology-focused venture firm that describes itself as investing in companies
      transforming industries including logistics, defense, and enterprise software. The Series C
      also included strategic investors Greenbriar Equity Group and American Securities — both
      private equity firms with deep logistics and supply chain sector expertise. The round pushed
      Overhaul's valuation above $1 billion.

      Prior to the Series C, Overhaul raised approximately $70M+ across earlier funding rounds,
      including participation from In-Q-Tel — the not-for-profit strategic investment arm of the
      CIA and the broader US intelligence community. In-Q-Tel's participation signals that
      Overhaul's supply chain security capabilities have strategic national security relevance,
      particularly in sectors such as pharmaceutical supply chain security and high-value cargo
      monitoring, which intersect with critical infrastructure protection priorities.

      Total funding raised stands at approximately $215M+. As a private company, Overhaul has not
      disclosed exact pre-Series C round structures, previous valuations, ARR, or any information
      about revenue or profitability. The supply chain tech funding environment cooled significantly
      from its 2021-2022 peak, with no publicly announced fundraising from Overhaul since the 2022
      Series C. This creates uncertainty about the company's burn rate, runway, and whether it
      intends to raise additional capital or pursue a liquidity event before a potential IPO.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO041, CO042]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: products-platform
    title: "Products, Platform, and Technology"
    body: |
      Overhaul's platform is organized around five core solutions, as documented on the company's
      official solutions page. First, Cargo Theft and Tampering Prevention provides real-time
      alerts for route deviations and unauthorized stops, AI-backed intervention strategies, and
      connections to law enforcement agencies to aid in cargo recovery. Second, Fraud and Double
      Brokering Elimination delivers risk scores based on multiple risk factors, pre-booking and
      on-site carrier verification, and real-time alerts for risk score spikes.

      Third, Cold Chain Quality and Compliance Protection monitors time-and-temperature-sensitive
      goods with automated alerts for threshold breaches, configurable settings for different
      products, and a device-agnostic integration approach. Fourth, End-to-End Visibility provides
      intelligent ETAs for in-transit inventory optimization, SKU-level visibility, and multimodal
      tracking capabilities. Fifth, Insurance Cost Reduction leverages data-driven risk management
      to protect against theft, spoilage, and in-transit risks, with tailored coverage options
      (including spot rates and annual policies) from risk-informed underwriters.

      The technology stack centers on AI-powered risk analytics, real-time GPS and IoT sensor
      integration, and predictive intelligence. The company's device-agnostic approach means it
      integrates with existing hardware investments rather than requiring proprietary device
      deployment. This lowers the friction for large enterprise customers who already have partial
      visibility infrastructure. Industry recognition includes IoT Global Awards and Gartner
      acknowledgment, suggesting the platform has received independent third-party validation.
    claimRefs: [CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023, CO024, CO025, CO026, CO027, CO030, CO031, CO036, CO037]
    tableRefs: []
    figureRefs: [FO003]

  - id: milestones-adverse
    title: "Milestones, Competitive Position, and Adverse Signals"
    body: |
      Overhaul's milestone arc from 2016 to 2026 traces a rapid build from a startup addressing
      cargo theft to a unicorn-status platform company with global offices and Fortune 500
      customers. The 2022 Series C at $1B+ valuation was the pivotal financing event, co-signed by
      strategic investors with logistics expertise (Greenbriar, American Securities) and the
      intelligence community (In-Q-Tel), validating the security-focused differentiation.

      The company operates in a highly competitive market. Project44 (Chicago, $704M raised, $2.7B
      valuation in 2022) and FourKites (Chicago, ~$200M raised, $1B+ valuation, 500+ employees)
      are better-capitalized competitors in the broader supply chain visibility space. Samsara is a
      public company with a $10B+ market cap and broad IoT fleet tracking capabilities. While
      Overhaul's cargo security-first differentiation provides a distinct moat in pharmaceutical
      and high-value cargo verticals, the competitive threat from better-funded players expanding
      into adjacent security features is a material risk.

      Adverse signals identified through research include: (1) No public financing event since July
      2022, creating uncertainty about runway and financial health in a funding environment that
      cooled substantially post-2022; (2) Customer concentration risk given the company's Fortune
      500 focus and reliance on a small set of large accounts; (3) International expansion
      execution risk as the company scales to offices in Brazil, Ireland, UK, and Mexico; (4) The
      episodic and cyclical nature of cargo theft trends could cause demand fluctuations. Private
      company status limits external verification of financial health, traction metrics, or
      leadership stability.
    claimRefs: [CO013, CO028, CO029, CO040, CO043, CO044, CO045, CO046]
    tableRefs: [TO004]
    figureRefs: []

