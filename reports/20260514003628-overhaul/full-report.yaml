      differentiation and switching cost evidence. Customer proof reflects confirmed logos and partial retention
      signals. Financial transparency reflects the absence of public ARR, NRR, and margin data. Risk profile reflects
      the composite of Chapter 7 risks. Valuation entry reflects the relationship between estimated current value and
      entry price discipline. Evidence quality reflects the coverage and freshness of research sources.
