      - number: '4.5'
        title: Cost Structure and Margin Drivers
        blocks:
          - type: paragraph
            body: |
              Overhaul's cost structure is dominated by three primary categories: (1) engineering and
              platform development personnel costs; (2) global security operations center (GSOC) staffing
              — 24/7 human monitoring and response teams that differentiate Overhaul from pure software
              competitors; and (3) IoT hardware, telco connectivity, and device logistics costs associated
              with the physical tracking sensors deployed in customer shipments. The GSOC staffing layer
              is Overhaul's most distinctive cost element: it provides real intervention capability during
              theft and tampering events but creates a structurally higher cost-of-goods-sold relative
              to software-only peers.

              SaaS companies in supply chain and fleet management typically operate at 65–75% gross
              margins at scale, though managed security service layers can compress margins to 50–60%
              before economies of scale are reached. Overhaul's combination of software and security
              services likely places it in the 55–70% gross margin range, with margin expansion expected
              as the software layer scales without proportional GSOC headcount growth. Overhaul's Climate
              Pledge signatory status and ENSO platform partnership for scope 3 emissions measurement
              indicate a governance maturity that adds modest overhead consistent with enterprise customer
              expectations.

              The insurance product creates a relatively high-margin revenue stream if structured as a
              pure fee arrangement, since insurance placement and performance documentation require
              primarily software infrastructure rather than physical services delivery.
