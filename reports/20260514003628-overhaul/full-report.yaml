      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: |
              Sizing Overhaul's total addressable market requires triangulating across several imperfect
              lenses because no single analyst report precisely delineates the security-plus-visibility
              segment Overhaul occupies. The following estimates are drawn from accessible public sources,
              company-claimed figures, competitor disclosures, and analyst report headlines.

              The broadest available estimate is for the global supply chain visibility (SCV) software
              market. Multiple analyst reports — Mordor Intelligence, Grand View Research, and
              MarketsandMarkets — have published estimates placing the SCV market at approximately $5–10B
              in 2023, with compound annual growth rates of 14–22% through 2028. These reports are
              paywalled and their methodology is not verifiable through accessible content, so the
              specific figures should be treated as directional only and with low confidence.

              A tighter sizing lens is the real-time transportation visibility (RTTV) platform segment, a
              subset of SCV focused specifically on in-transit shipment tracking. Gartner has published a
              Magic Quadrant for RTTV, acknowledging FourKites, project44, and a handful of other vendors,
              which suggests Gartner sizes this as a distinct, sufficiently large market. Gartner's actual
              market estimates are paywalled. FourKites self-describes as tracking shipments across more
              than 200 countries, and project44 claims to be the autonomous supply chain platform — both
              are indications of a market large enough to support multi-hundred-million-dollar fundraises
              and $1B+ valuations.

              A third sizing approach is bottom-up from cargo theft loss. The US cargo theft market alone
              generates an estimated $15–35B in annual losses globally, with US-specific losses estimated
              at $1B+ per year. Overhaul's security offerings address the theft prevention and recovery
              subset of this loss pool. Even at a 5–10% addressable fraction of global loss (i.e., the
              portion where an actively managed SaaS platform can create measurable ROI for shippers),
              this implies a $750M–$3.5B security-specific SAM.

              The cold chain monitoring sub-market adds a further $1–3B+ of adjacent SAM in pharmaceutical,
              food and beverage, and biotech, driven by regulatory requirements including FDA's DSCSA
              mandate for prescription drug traceability. DSCSA became fully effective for prescription
              drugs as of November 2023, creating an addressable compliance budget line for pharmaceutical
              distributors and manufacturers.

              Overhaul's realistic SOM, given its current scale and competitive positioning, is a fraction
              of the SAM. With total raised of ~$215M+ and a private company status, and in a market
              where project44 ($704M raised) and FourKites ($200M+ raised, 2,500+ carrier integrations)
              have substantially more capital and network effects, Overhaul's practical share is likely
              in the tens to low hundreds of millions of ARR if they achieve dominant market position in
              the security-critical niche.
