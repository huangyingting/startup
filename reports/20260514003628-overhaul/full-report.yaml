            body: |
              Overhaul's pricing architecture is not publicly disclosed but can be inferred from the
              company's stated value propositions and comparable public market data. The platform is
              sold to large enterprises on multi-year contracts, which is consistent with Samsara's
              publicly disclosed 3-to-5-year contract structure. Enterprise pricing for cargo security
              SaaS typically includes a platform subscription base fee plus per-asset or per-shipment
              variable component, making Overhaul's ACV highly sensitive to the volume and value of
              cargo being monitored.

              The company-claimed ROI metrics — 3,200% program ROI, $5M saved in six months, and 60%
              reduction in cargo insurance rates — imply substantial economic value delivered to customers.
              If cargo insurance savings alone average $2–$5 million per large enterprise customer, a
              platform subscription at 10–20% of savings value would yield annual contract values of
              $200,000–$1,000,000+ per enterprise account. Overhaul's stated 14-day time to value suggests
              a streamlined deployment model that reduces customer hesitation and supports shorter sales
              cycles relative to legacy risk management software deployments.

              The insurance product creates a second monetization lever orthogonal to platform subscription.
              If Overhaul earns a percentage of insurance premium savings, the economics scale with
              demonstrated performance, creating a performance-aligned revenue mechanism that is rare in
              pure-play visibility SaaS. This dual-lever pricing approach — subscription plus insurance
              performance economics — positions Overhaul for higher ACV than single-module competitors.
