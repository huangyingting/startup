          value: 190
          note: Bear case, below preference stack
        - label: ARR $65M × 4.5× (private median)
          value: 293
          note: Conservative scenario
        - label: ARR $80M × 6× (base growth premium)
          value: 480
          note: Base case, above preference stack
        - label: ARR $100M × 7× (upside premium)
          value: 700
          note: Upside scenario, credible with ARR confirmation
        - label: ARR $125M × 8× (bull case)
          value: 1000
          note: Bull case, matches 2022 peak valuation
        - label: 'FourKites comp: $120M ARR × 8×'
          value: 960
          note: Acquisition comp basis for strategic buyer pricing
  - id: FV003
    title: Valuation / return range
    type: range
    notes: >
      Low/mid/high bounds reflect the inner quartile of probability-weighted outcomes within each scenario. All values
      in USD millions. Preference overhang of $350M+ (total invested capital including all disclosed rounds) represents
      the return floor below which equity holders receive zero. Strategic acquisition range is based on SAP/FourKites
      comp ($600M) adjusted for Overhaul's smaller confirmed ARR base and higher cargo security premium.
    approximationNotes: >
      All valuations are constructed estimates from publicly confirmed multiples applied to estimated ARR ranges. No
      confirmed ARR data from Overhaul is available. Low/mid/high bounds within each scenario reflect sensitivity to ARR
      uncertainty (±25%) and multiple uncertainty (±1×). All values in USD millions.
