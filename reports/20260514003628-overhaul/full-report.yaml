      - number: '7.4'
        title: Regulatory and Compliance Risk
        blocks:
          - type: paragraph
            body: >
              Overhaul's operations in the EU and its pharmaceutical and food vertical customer base create a complex
              multi-jurisdictional regulatory environment. GDPR fines can reach the higher of €20M or 4% of global
              annual revenue, representing material financial exposure for a company managing sensitive pharmaceutical
              supply chain data across EU member states. The FDA's Drug Supply Chain Security Act mandates serialized
              end-to-end electronic traceability for pharmaceutical products; pharma shippers using Overhaul must verify
              that the platform's data handling satisfies DSCSA lot-level and item-level traceability requirements. The
              EU AI Act, with phased enforcement beginning from August 2024, may classify RiskGPT and Overhaul's
              anomaly-detection algorithms as high-risk AI given their role in pharmaceutical and critical logistics
              chains. California's Consumer Privacy Rights Act extends broad consumer data rights to supply chain
              visibility data involving employee tracking and logistics provider contacts. DOT and FMCSA regulations on
              electronic logging devices constrain how Overhaul can ingest and store carrier telematics data. Overhaul
              has not publicly disclosed its GDPR compliance posture, EU representative, or Data Processing Agreement
              documentation as of May 2026 — a material diligence gap.
            claimRefs:
