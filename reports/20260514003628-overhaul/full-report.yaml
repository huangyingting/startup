      - number: '8.4'
        title: Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              Three scenarios are constructed from ARR × multiple logic anchored to publicly confirmed sector multiples.
              The bear case assumes Overhaul's true ARR is at the low end of estimates (~$50M), sector multiple
              compression to 3× (in line with the public median less a private illiquidity discount), and no near-term
              exit catalyst. Implied valuation: $150M — below the cumulative preference stack of $350M+, generating
              near-zero returns for common equity holders. The base case assumes $80M ARR with a 6× multiple reflecting
              a growth premium above the public median. Implied valuation: $480M. At $350M preference stack, equity
              holders receive residual proceeds of ~$130M — a thin but positive return for common stockholders at a 1.4×
              total value to invested capital. The bull case assumes ARR growth to $125M driven by DSCSA regulatory
              mandates, Microsoft partnership expansion, and continued freight volume growth, with a multiple of 8×
              reflecting AI platform premium and competitive moat strength. Implied valuation: $1B, matching the 2022
              peak — achievable but requiring execution across multiple uncertain variables. The probability
              distribution across scenarios is approximately 20/55/25 (bear/base/bull) based on available public
              evidence, weighting toward base given the company's fundraising trajectory, Fortune-100 customer base, and
              sector trends.
            claimRefs:
              - CV012
              - CV013
              - CV022
              - CV023
              - CV024
              - CV032
