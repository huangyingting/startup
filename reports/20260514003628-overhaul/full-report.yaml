      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Overhaul was co-founded in 2016 by Barry Conlon and Mark Harvey. Barry Conlon serves as CEO
              and brings deep domain expertise from the private security sector — most notably as a senior
              executive at GardaWorld, one of the world's largest security services companies. This
              background gives Conlon a distinctive founder-market fit for a company that addresses cargo
              security and supply chain risk: he understands both the security threat landscape and the
              operational protocols of large enterprises managing physical asset protection.

              The company's About page confirms that Overhaul's leadership team is composed of experts
              dedicated to securing global supply chains, though detailed biographies of individual
              executives beyond the founders are not publicly itemized in crawlable website content as of
              May 2026. The board and advisory structure includes representation from institutional
              investors including 8VC, Greenbriar Equity Group, and American Securities, all of whom
              participated in the Series C financing. In-Q-Tel, the strategic investment arm of the US
              intelligence community, also reportedly invested in Overhaul around 2021-2022, which signals
              national security-relevant applications of the platform.

              Key-person dependency risk is concentrated in Barry Conlon, who is the public face of the
              company and the primary architect of its security-focused differentiation strategy. No
              material leadership departures or governance controversies were identified in available public
              sources as of 2026. As a private company, Overhaul does not disclose its cap table, board
              seat allocation, or investor rights agreements publicly.
