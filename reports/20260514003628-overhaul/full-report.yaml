      - number: '7.3'
        title: Technology and Cybersecurity Risk
        blocks:
          - type: paragraph
            body: >
              Overhaul's platform processes sensitive freight movement data for hundreds of Fortune-1000 customers
              across regulated industries, creating a high-value target for cyberattackers and a broad regulatory
              compliance obligation. NIST released Cybersecurity Framework 2.0 in February 2024, adding a Govern
              function that supply chain technology providers must now address; Overhaul's current alignment with CSF
              2.0 has not been publicly disclosed. The FTC has issued clear guidance that IoT data aggregators bear
              legal responsibility for securing connected device data, and CISA designated transportation and logistics
              as one of 16 critical infrastructure sectors subject to heightened reporting and resilience requirements.
              RiskGPT, Overhaul's AI prediction engine built on Azure OpenAI, introduces AI hallucination risk: false
              positive alerts could trigger costly unnecessary cargo holds, while false negatives could miss genuine
              threats, both outcomes creating liability and eroding customer trust. Overhaul's multi-region deployment
              across US, EU, Latin America, and EMEA expands the regulatory attack surface, as each jurisdiction imposes
              distinct data residency and breach notification requirements. A successful intrusion into Overhaul's cargo
              manifest systems could expose shipment schedules of hundreds of pharmaceutical and technology customers to
              adversarial exploitation.
