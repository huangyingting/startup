      - number: '2.3'
        title: Buyer Segmentation and Purchase Dynamics
        blocks:
          - type: paragraph
            body: |
              Overhaul's product sells to enterprise logistics and supply chain organizations whose
              cargo shipments are high-value, regulated, or theft-prone. Overhaul's own industry page
              explicitly lists eight verticals: life sciences, electronics, manufacturing, retail, food
              and beverages, logistics service providers (LSPs), AI hardware, and automotive. Each
              vertical has a distinct buyer profile, risk driver, and adoption trigger.

              In life sciences and pharmaceutical, the primary buyer is the Director or VP of Logistics,
              Supply Chain Compliance Officer, or Chief Supply Chain Officer at pharmaceutical
              manufacturers, distributors, and specialty pharmacies. The adoption trigger is predominantly
              regulatory: FDA's DSCSA (fully effective November 2023) mandates electronic, interoperable
              track-and-trace for prescription drugs. This creates a compliance-driven pull rather than
              a purely ROI-driven sale — a significant purchasing dynamic because it shortens the ROI
              justification cycle and involves legal and compliance teams alongside logistics buyers.

              In the electronics and AI hardware verticals, the buyer is typically a VP of Logistics or
              Security Director at a large manufacturer or OEM. The adoption trigger is cargo theft
              prevention — electronic components and finished devices (and, increasingly, AI accelerator
              hardware) are among the highest-theft categories. Overhaul's cargo theft intelligence
              hub documenting dozens of individual recoveries suggests an active market for its
              response-plus-tracking capabilities in this segment.

              In automotive, the buyer is an OEM supply chain director managing inbound VIN (vehicle
              identification number) and parts tracking to ensure production line continuity. The
              adoption trigger is disruption risk: an automotive plant idle for a day due to a missing
              shipment can cost millions. Overhaul's automotive solution emphasizes predictive ETAs
              and proactive exception alerts specifically for this use case.

              In food and beverage, the buyer is a quality assurance or supply chain director for
              refrigerated or temperature-sensitive goods. The trigger is temperature excursion risk
              and regulatory compliance (FDA food safety, Good Distribution Practice standards).
              The buyer type here overlaps with cold chain monitoring platform buyers.

              Logistics service providers (LSPs) — 3PLs, freight forwarders, and carriers — are a
              distinct channel segment. LSPs may buy on behalf of shipper clients, making them
              potential resellers or channel partners rather than end-buyers. Overhaul's platform
              value proposition for LSPs centers on helping them win and retain high-consequence
              shipper accounts, with analytics and reporting to demonstrate performance.
