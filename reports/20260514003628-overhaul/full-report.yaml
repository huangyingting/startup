  - id: FV002
    title: Valuation sensitivity
    type: bar
    notes: >
      Each bar shows an implied enterprise value in USD millions at a specific ARR assumption and revenue multiple. The
      "public median" bar applies the multiples.vc May 2026 public SCM median of 3.8× EV/Revenue. The "private median"
      applies the Livmo/Aventis consensus of 4.5× ARR for private SaaS. "Growth premium" applies 7–8× for high-growth
      pre-profitability platforms. FourKites comp uses the estimated FourKites multiple (8×) applied to Overhaul's
      estimated ARR. All values in USD millions.
