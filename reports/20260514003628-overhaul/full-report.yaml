      - number: '4.4'
        title: Capital Structure and Funding History
        blocks:
          - type: paragraph
            body: |
              Overhaul has raised an estimated total of $192–$215 million in disclosed equity financing
              across four known rounds. The most recent and largest event was a $145 million Series C
              in July 2022 led by 8VC, with participation from Greenbriar Equity Group and American
              Securities — all of which are sophisticated institutional investors with logistics sector
              expertise. In-Q-Tel, the U.S. government-affiliated strategic investment fund associated
              with CIA and NSA requirements, is also a confirmed investor, signaling national security
              relevance for Overhaul's cargo intelligence data.

              Earlier rounds (Seed, Series A, Series B) are not publicly itemized. Industry research
              databases and news reports corroborate cumulative funding in the $190–$215 million range
              prior to any post-Series C activity. As of May 2026, no equity financing round, convertible
              note, debt facility, or secondary transaction has been publicly disclosed after July 2022.
              This creates an open question about remaining runway: with an estimated $145 million raised
              in the Series C and estimated annual operating costs of $30–$70 million (based on comparable
              headcount and SaaS cost benchmarks), the available runway post-Series C is estimated at
              two to four years, depending on actual spend pace. This puts potential runway exhaustion
              or refinancing at approximately 2025–2026.

              The absence of public capital activity since mid-2022 may indicate: (a) sufficient
              organic cash flow or cash balance to continue operations, (b) active fundraising not yet
              closed, (c) a strategic sale process, or (d) disciplined capital management to extend
              runway. No evidence supports any of these interpretations over the others.
