      - number: '1.4'
        title: Products, Platform, and Technology
        blocks:
          - type: paragraph
            body: |
              Overhaul's platform is organized around five core solutions, as documented on the company's
              official solutions page. First, Cargo Theft and Tampering Prevention provides real-time
              alerts for route deviations and unauthorized stops, AI-backed intervention strategies, and
              connections to law enforcement agencies to aid in cargo recovery. Second, Fraud and Double
              Brokering Elimination delivers risk scores based on multiple risk factors, pre-booking and
              on-site carrier verification, and real-time alerts for risk score spikes.

              Third, Cold Chain Quality and Compliance Protection monitors time-and-temperature-sensitive
              goods with automated alerts for threshold breaches, configurable settings for different
              products, and a device-agnostic integration approach. Fourth, End-to-End Visibility provides
              intelligent ETAs for in-transit inventory optimization, SKU-level visibility, and multimodal
              tracking capabilities. Fifth, Insurance Cost Reduction leverages data-driven risk management
              to protect against theft, spoilage, and in-transit risks, with tailored coverage options
              (including spot rates and annual policies) from risk-informed underwriters.

              The technology stack centers on AI-powered risk analytics, real-time GPS and IoT sensor
              integration, and predictive intelligence. The company's device-agnostic approach means it
              integrates with existing hardware investments rather than requiring proprietary device
              deployment. This lowers the friction for large enterprise customers who already have partial
              visibility infrastructure. Industry recognition includes IoT Global Awards and Gartner
              acknowledgment, suggesting the platform has received independent third-party validation.
