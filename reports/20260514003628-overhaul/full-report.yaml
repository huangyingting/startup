      - number: '4.6'
        title: Financial Data Gaps and Diligence Framework
        blocks:
          - type: paragraph
            body: |
              As a private company that has not filed public securities disclosures and has no known
              intention to go public in the near term, Overhaul maintains strict confidentiality around
              all core financial metrics. None of the following are publicly available: annual recurring
              revenue, revenue growth rate, gross margin, sales and marketing expense, engineering
              headcount or cost, EBITDA, net loss or income, cash balance, burn rate, runway, or customer
              count by cohort.

              The financial diligence framework for Overhaul must therefore rely on: (a) management
              data room access for audited or reviewed financial statements, (b) customer reference calls
              to cross-check renewal rates and ACV expansion, (c) third-party data providers (Pitchbook,
              CB Insights) for estimated ARR ranges and cap table data, (d) insurance industry contacts
              to validate the insurance premium reduction claims, and (e) comparable public company
              analysis to derive reasonable financial model scaffolding.

              Five key financial data gaps materially affect the investment thesis: (1) unknown ARR and
              growth rate limit revenue quality assessment; (2) unknown gross margin limits sustainability
              of the profitability path; (3) unknown burn rate and runway create refinancing risk assessment
              uncertainty; (4) unknown net revenue retention rate limits LTV and expansion potential
              modeling; and (5) whether the $1B+ Series C valuation is reflective of 2026 market conditions
              cannot be determined without current ARR and comparable transaction data.
