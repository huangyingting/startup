      - number: '7.5'
        title: Financial and Execution Risk
        blocks:
          - type: paragraph
            body: >
              Overhaul has raised over $350M in total disclosed funding since founding, with its most recent $105M
              Series C in August 2025 closing without a disclosed valuation — a notable omission relative to the $1B+
              peak disclosed in 2022. The inclusion of a MidCap Financial debt facility in the August 2025 round
              indicates use of leverage, adding interest expense and covenant risk to the balance sheet. Supply chain VC
              funding contracted from $63.7B in 2021 to $7.1B in 2024, compressing sector multiples and increasing the
              cost and difficulty of follow-on capital. Springcoast Partners participated in both the January 2025 and
              August 2025 rounds, suggesting concentrated investor reliance on a single lead that creates vulnerability
              if Springcoast's thesis or appetite changes. G2 reviews highlight interface complexity and integration
              setup friction as recurring themes, representing NPS and retention risk in Overhaul's enterprise install
              base. Barry Conlon's central role as Overhaul's founder, CEO, and sole external spokesperson constitutes a
              meaningful key-person risk; his departure or incapacitation would disrupt customer relationships,
              fundraising, and strategy. PitchBook's Q1 2025 VC Monitor documents compressed multiples across enterprise
              SaaS with elevated risk premiums in logistics, reducing prospective exit valuations.
