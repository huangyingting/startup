      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - ARR, NRR, and gross margin
        - No public disclosure of ARR, NRR, or gross margin; Overhaul does not release financial KPIs
        - >-
          ARR range of $50–125M drives ±$600M swing in base-case valuation; NRR determines platform stickiness; margin
          determines exit multiple applicability
        - CEO and CFO; data room financial statements with quarterly ARR history and customer cohort retention
      - - MidCap Financial facility terms
        - Debt facility amount, interest rate, maturity, covenants, and prepayment provisions not publicly disclosed
        - >-
          Covenants could restrict dividends, acquisitions, or growth spending; interest expense directly reduces equity
          value
        - Legal data room; MidCap facility agreement with covenant schedule and drawdown history
      - - GDPR compliance posture and DPA documentation
        - No public GDPR posture, EU representative, DPO appointment, or DPA templates disclosed as of May 2026
        - >-
          GDPR fine exposure up to €20M or 4% global revenue; EU pharma customers require DPA confirmation before audit
          or renewal
        - >-
          VP/EVP Legal; GDPR compliance program documentation, DPO appointment letter, model DPA, and supervisory
          authority correspondence
      - - SOC 2 Type II or ISO 27001 certification
        - >-
          No public confirmation of SOC 2 or ISO 27001; G2 reviews do not reference security certifications; strict
          privacy certification not verified
        - >-
          Fortune-100 customers in pharma and tech require SOC 2 or equivalent; absence is a churn risk at contract
          renewal; acquisition buyers require cyber hygiene confirmation
        - CISO; most recent SOC 2 Type II report with scope definition and exception summary
      - - Preference stack and investor rights
        - >-
          Post-money valuation for August 2025 round undisclosed; liquidation preference waterfall, anti-dilution terms,
          and investor board seats not public
        - >-
          Preference overhang of $350M+ determines common equity residual in all exit scenarios; anti-dilution
          provisions affect new investor returns
        - >-
          General Counsel; cap table with preference stack waterfall, all investor rights agreements, and board
          composition
      - - RiskGPT accuracy benchmarks and SLA performance
        - False-positive and false-negative rates, GSOC escalation rate, and SLA breach frequency not publicly reported
        - >-
          AI hallucination risk scales with deployment volume; any public RiskGPT failure event triggers customer churn
          and liability; benchmark confirms or invalidates 99.9% protection rate claim
        - VP Product / VP Engineering; RiskGPT evaluation report, SLA performance log, and incident disclosure history
