      - number: '8.2'
        title: Valuation Context and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Overhaul has raised over $350M since founding across a well-documented funding sequence: a $145M Series C
              at $1B+ valuation in July 2022 led by 8VC with Greenbriar Equity Group and American Securities as
              strategic co-investors; a $73M round in 2024 focused on law enforcement integration expansion; a $55M
              round in January 2025 co-led by Springcoast Partners; and a $105M Series C in August 2025 co-led by
              Springcoast and Edison Partners, which included a MidCap Financial debt facility. The debt component
              introduces interest expense and covenant risk absent from pure-equity comps. Springcoast's participation
              in both 2025 rounds signals concentrated investor conviction but also reliance on a single institutional
              champion — a risk if Springcoast's mandate or appetite changes. At the public supply chain management
              software median of 3.8× EV/Revenue and a base-case ARR estimate of $80M, Overhaul's implied value is
              approximately $304M — well below the 2022 peak. At the private SaaS median of 4.5× ARR the implied value
              is $360M; at a growth premium of 7× it is $560M. The $1B+ 2022 multiple (approximately 12–25× ARR at
              estimated $40–80M ARR) was set in a markedly different VC environment and reflects peak sector euphoria
              that has since unwound. For entry discipline, any investor pricing Overhaul above $600M assumes ARR
              confirmation above $80M and retention above 100% — evidence that must come from the data room.
            claimRefs:
