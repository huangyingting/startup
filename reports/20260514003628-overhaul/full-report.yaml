  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              The core thesis for Overhaul rests on four pillars: (1) a demand environment in which cargo theft is
              structurally rising — a 14% year-over-year increase in Q3 2024, with over $39M stolen in that single
              quarter per CargoNet — creating durable platform demand; (2) a vertically integrated differentiation that
              combines IoT-sensor coverage, a 24/7 GSOC, RiskGPT AI, and law enforcement partnerships into a unified
              offering that competitors replicate only partially; (3) a Fortune-100 customer base including Microsoft,
              Bristol Myers Squibb, CEVA, and Dyson, confirming enterprise product-market fit; and (4) a regulatory
              tailwind from DSCSA, CTPAT, and EU AI Act compliance obligations that drive platform adoption across
              pharmaceuticals and logistics. The anti-thesis focuses on financial opacity — no disclosed ARR, NRR, or
              gross margin — combined with a sector valuation environment that has reset significantly below 2021–2022
              peaks. Supply chain VC funding has contracted 89% from $63.7B in 2021 to $7.1B in 2024, compressing exit
              valuations for all players. Overhaul's GSOC model is human-intensive, limiting operating leverage relative
              to software-only competitors. Project44 and FourKites have 5–10× more total capital and larger geographic
              footprints. The absence of a valuation disclosure in the August 2025 round is the single largest near-term
              concern: it raises a reasonable down-round inference vs the 2022 $1B+ peak.
            claimRefs:
              - CV001
