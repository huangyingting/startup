      - number: '8.3'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >
              The most directly comparable private company is FourKites, which competes head-to-head in real-time supply
              chain visibility: tracxn data places its valuation at approximately $1B with $243M raised and an estimated
              $120M ARR, implying a ~8× ARR multiple. SAP's February 2026 offer of ~$600M for FourKites — which
              FourKites declined — establishes a relevant acquisition comps floor. At a 5× ARR multiple for $120M ARR
              the SAP bid implies a ~5× multiple, consistent with the public SCM median of 3.8× plus a private control
              premium. Project44 last raised at $2.7B in a 2021 peak-market round with $912M total raised; secondary
              market data from Compworth in 2026 shows transactions occurring at approximately 36–38% of the headline
              valuation (~$980M–$1B), implying a 63% secondary discount to the 2021 round price. Motive (formerly
              KeepTruckin) reached $2.85B in its 2021 round, though it operates primarily in fleet management rather
              than cargo security — a less comparable model. Samsara (NYSE: IOT) is the public market anchor: it trades
              at approximately $24B market cap on ~$1.15B ARR (~21× ARR), but its premium reflects public market
              liquidity, network effects, and near-break-even financials not replicable by Overhaul in the near term.
              Public SCM software as a category trades at a median 3.8× EV/Revenue per multiples.vc May 2026 data.
