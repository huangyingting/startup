      - number: '8.5'
        title: Exit Readiness and Final Diligence
        blocks:
          - type: paragraph
            body: >
              Overhaul has three plausible exit paths. Strategic acquisition is the most likely near-term route: SAP's
              pursuit of FourKites and Microsoft's status as both a named customer and cloud partner of Overhaul suggest
              active buyer appetite. Oracle SCM Cloud's absence of integrated cargo theft prevention creates acquisition
              rationale. Salesforce, which lacks any supply chain security offering, represents a long-shot but
              strategically motivated acquirer. DHL and Maersk have both historically internalized supply chain software
              capabilities and could acquire Overhaul to deepen carrier-side visibility offerings. An IPO path requires
              at minimum $150–200M ARR and a credible profitability trajectory; at current fundraising cadence and GSOC
              cost structure, this is likely 3–5 years away. PE secondary buyout at a structured multiple in the
              $350–500M range is a third option. The final diligence asks — ARR confirmation, NRR, gross margin,
              preference stack, MidCap facility terms, RiskGPT accuracy benchmarks, and GDPR/DSCSA compliance posture —
              are non-negotiable gating items before proceeding. Thesis-break triggers center on three events: a
              confirmed down round (Series D below $500M), loss of two or more top-10 customers, or a material
              regulatory enforcement action in the EU or FDA pharmaceutical compliance domain.
            claimRefs:
