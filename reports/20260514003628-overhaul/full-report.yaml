      - number: '7.2'
        title: Cargo Theft and Operational Risk
        blocks:
          - type: paragraph
            body: >
              Cargo theft represents both a demand tailwind and an operational performance risk for Overhaul. CargoNet
              reported a 14% year-over-year increase in cargo theft incidents in Q3 2024, with over $39M stolen in that
              single quarter; prior data shows a 57% surge in 2022. While elevated theft validates market demand for
              Overhaul's GSOC-backed platform, it places continuous operational pressure on the company's promise of a
              99.9% protection rate across the $1.4T in cargo it monitors at any moment. Overhaul's platform depends on
              continuous real-time IoT data streams from third-party hardware providers including Tive and Impinj; any
              supply disruption, firmware incompatibility, or device failure creates a monitoring blind spot that could
              result in undetected theft events. Middle East supply route disruptions in 2024 further strained global
              cargo insurance coverage, compounding shipper exposure when platform gaps coincide with elevated loss
              events in high-risk corridors. GSOC operator staffing is a persistent scaling constraint: each new
              customer requires incremental 24/7 human coverage that cannot be instantly augmented.
