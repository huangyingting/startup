      - number: '4.3'
        title: Financial Performance Estimates and Public Market Comparables
        blocks:
          - type: paragraph
            body: |
              Overhaul discloses no financial metrics, making ARR, revenue growth, gross margin, and
              net income entirely opaque. However, the available signals permit triangulated estimates.
              The July 2022 Series C at a $1B+ valuation implies that at typical SaaS revenue multiples
              prevailing in mid-2022 (10–20x ARR), Overhaul's ARR at that time would have been in the
              range of $50–$100 million. Samsara's IPO in December 2021 priced at approximately
              10–12x trailing ARR, providing a comparable multiple anchor. Given three-plus years of
              post-Series C operation, and assuming 20–30% annual growth consistent with the broader
              SCV market expansion (15–20% CAGR), Overhaul's current ARR is estimated in the range
              of $75–$200 million.

              Samsara's fiscal year 2026 results provide the clearest available public benchmark.
              Samsara generated $1,618.6 million in revenue with approximately 98% subscription
              revenue, 12,000+ Core Customers (greater than $25K ARR), and a net loss of just $9.1
              million — near breakeven. This scale implies a revenue per Core Customer of approximately
              $135,000 annually. Overhaul's focus on fewer, larger enterprise customers in high-stakes
              verticals likely yields higher per-customer ACVs but a smaller total customer count.

              Valuation compression in the supply chain SaaS sector since 2022 — driven by rising interest
              rates and slower tech growth multiples — creates a material risk that the $1B+ Series C
              valuation would not be reproduced in a 2026 equity raise or secondary transaction without
              materially stronger ARR. This does not signal distress but creates a relevant caution for
              investors modeling exit value or secondary liquidity.
