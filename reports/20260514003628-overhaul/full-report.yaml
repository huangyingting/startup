      - number: '3.3'
        title: Incumbents and Adjacent Players
        blocks:
          - type: paragraph
            body: |
              Samsara (NYSE: IOT) is the largest adjacent competitor by market capitalization and revenue,
              operating primarily as a fleet telematics and driver safety platform. Samsara offers GPS fleet
              tracking, AI dashcam systems, ELD compliance, reefer monitoring, trailer tracking, and asset
              management through its Connected Operations Cloud. Its 4.5-star G2 rating from 3,200+
              verified reviews and #1 ranked driver application status reflect dominant fleet management
              market position. Samsara's cargo monitoring (via reefer and asset tracking) is adjacent to
              Overhaul's market, but its primary buyer is fleet operators focused on compliance and driver
              safety rather than cargo security and intelligence. Its public company status and scale
              provide a capital advantage for potential platform expansion into active security.

              Descartes MacroPoint, part of Descartes Systems Group (TSX/NASDAQ: DSG), offers a freight
              visibility platform with FraudGuard carrier fraud detection that directly overlaps with
              Overhaul's identity verification capabilities. MacroPoint is embedded within Descartes'
              broader logistics suite including customs compliance, WMS, and ocean visibility modules,
              positioning it as a bundled module for large enterprise logistics platforms rather than a
              standalone cargo security solution. This integration model is both a competitive advantage
              (broad distribution) and a limitation (less specialized than Overhaul for high-consequence
              cargo verticals).

              Sensitech, a subsidiary of Carrier Global (NYSE: CARR), brings over 30 years of cold chain
              monitoring history and operates a SensiWatch platform with validated pharmaceutical and food
              supply chain monitoring workflows. Sensitech competes with Overhaul's life sciences and food
              verticals but does not address general cargo theft, ground transportation security, or active
              recovery operations. Legacy ERP and TMS vendors including SAP, Oracle Supply Chain Management,
              and Manhattan Associates offer supply chain visibility modules as part of integrated enterprise
              suites, typically relying on carrier API integrations rather than IoT hardware, creating a
              "good enough" tracking baseline that slows adoption of specialized platforms.
