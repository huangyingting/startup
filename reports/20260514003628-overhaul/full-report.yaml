  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Competitive and Market Risk
        blocks:
          - type: paragraph
            body: >
              Overhaul competes in a crowded and well-capitalized real-time transportation visibility market. Project44
              and FourKites represent the primary enterprise competitors; FourKites is deploying Loft AI automation
              agents to automate supply chain exception management, a direct capability challenge in Overhaul's core
              product area. Shippeo secured $30M in early 2025 from Toyota's Woven Capital to accelerate North American
              expansion, directly targeting Overhaul's shipper relationships in automotive supply chains. Tive raised a
              $40M Series C in January 2025 and has deployed over 2M+ IoT devices globally, competing in cold chain and
              high-value freight. Supply chain VC funding contracted from $63.7B in 2021 to $7.1B in 2024 — an 89%
              decline — compressing sector valuations and limiting exit optionality. Overhaul's August 2025 $105M Series
              C omitted a valuation disclosure, a notable contrast to the $1B+ valuation in the 2022 Series C, raising a
              potential down-round signal. Descartes MacroPoint's FraudGuard 2.0 launch in July 2025 signals that large
              incumbents are encroaching on Overhaul's fraud detection domain. Samsara, while primarily fleet-management
              focused, deepens carrier-side data assets that could enable lateral expansion into cargo visibility.
