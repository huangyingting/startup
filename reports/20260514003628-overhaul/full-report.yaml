  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Profile and Target Market
        blocks:
          - type: paragraph
            body: |
              Overhaul's target customer is a Fortune 100 or Fortune 500 enterprise shipper whose cargo has
              high monetary value, regulatory sensitivity, or both — making cargo loss or transit failure a
              material financial or reputational event. The company's official industries page identifies eight
              served verticals: life sciences, consumer electronics, manufacturing, retail, food and beverage,
              logistics service providers, AI hardware, and automotive. This vertical focus is not coincidental:
              pharmaceutical and life sciences shipments are subject to Good Distribution Practice (GDP) and
              DSCSA track-and-trace regulations; high-tech electronics are among the most frequently stolen
              cargo categories; automotive supply chains operate on just-in-time delivery with near-zero
              tolerance for delays; and food and beverage requires unbroken cold chain compliance.

              The company describes its ideal customer profile as organizations shipping "high-value,
              time-sensitive, and temperature-controlled" goods who need "warehouse-level control over goods in
              motion." As of January 2025, Overhaul serves approximately 350 customers globally, up from 300+
              customers at the time of the Intelligence as a Service launch in July 2023. The company is
              explicitly "trusted by Fortune 100 companies" according to its Series C press releases. With the
              January 2025 $55 million growth round and the acquisition of FreightVerify — which added six of
              the world's top ten automotive manufacturers — Overhaul is actively expanding its addressable
              customer universe beyond its original core of pharmaceutical and electronics shippers into
              automotive and healthcare facility management. The combined FreightVerify and Overhaul platform
              covers approximately 280,000 distinct shipping locations and engages 70,000 monthly active users
              across industry segments, validating both breadth and depth of enterprise adoption.
