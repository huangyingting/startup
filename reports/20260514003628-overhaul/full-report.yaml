      - number: '1.3'
        title: Funding History, Valuation, and Investors
        blocks:
          - type: paragraph
            body: |
              Overhaul reached unicorn status in July 2022 when it closed a $145 million Series C round led
              by 8VC, a technology-focused venture firm that describes itself as investing in companies
              transforming industries including logistics, defense, and enterprise software. The Series C
              also included strategic investors Greenbriar Equity Group and American Securities — both
              private equity firms with deep logistics and supply chain sector expertise. The round pushed
              Overhaul's valuation above $1 billion.

              Prior to the Series C, Overhaul raised approximately $70M+ across earlier funding rounds,
              including participation from In-Q-Tel — the not-for-profit strategic investment arm of the
              CIA and the broader US intelligence community. In-Q-Tel's participation signals that
              Overhaul's supply chain security capabilities have strategic national security relevance,
              particularly in sectors such as pharmaceutical supply chain security and high-value cargo
              monitoring, which intersect with critical infrastructure protection priorities.

              Total funding raised stands at approximately $215M+. As a private company, Overhaul has not
              disclosed exact pre-Series C round structures, previous valuations, ARR, or any information
              about revenue or profitability. The supply chain tech funding environment cooled significantly
              from its 2021-2022 peak, with no publicly announced fundraising from Overhaul since the 2022
              Series C. This creates uncertainty about the company's burn rate, runway, and whether it
              intends to raise additional capital or pursue a liquidity event before a potential IPO.
