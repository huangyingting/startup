      - number: '6.5'
        title: 客户挑战、满意度缺口与竞争风险
        blocks:
          - type: paragraph
            body: >
              尽管客户满意度总分较高，独立评论分析仍暴露出反复出现的摩擦点。SelectHub
              对多个评论平台的精选分析识别出三项结构性弱点：不同地区支持质量不一致（较新的区域团队可能缺少美国和欧洲核心运营团队的专长与响应速度）、发货后设备追踪挑战（客户报告交付完成后难以定位 IoT
              设备，造成运营负担和潜在丢失设备费用），以及 AI 和机器学习能力研发进度慢于预期（一些用户认为，相较早先期待，预测分析推进落后于竞争基准）。价格不透明又放大了这些问题：Overhaul
              不公布标价，需要定制报价，这会拖慢评估周期，尤其影响期待 SaaS 式价格透明的中端市场买家。


              实施复杂度是整个供应链可视化市场的结构性挑战。FreightVerify 收购公告引用的一项 GuidePoint 研究发现，在 100
              家受访制造、零售和航运公司中，超过一半在采用传统可视化解决方案时经历了实质性实施延误和成本超支。Overhaul
              的典型实施周期约四个月，需要积极协作；这一水平具备竞争力，但对企业买家而言，形成生产力仍需要投入显著时间。公司的 14-day time-to-value 主张适用于初始设置，而不是完整企业部署。


              竞争风险不可忽视：资本更充足的竞争对手 FourKites 和 project44 正从纯可视化扩张到风险功能，可能削弱 Overhaul 在核心垂直中的差异化。Samsara 的上市公司规模和 IoT
              车队覆盖，给相邻运输细分市场带来压力。一些用户还指出，未披露移动应用是一个缺口，因为现场运营团队需要移动中的监控能力。
