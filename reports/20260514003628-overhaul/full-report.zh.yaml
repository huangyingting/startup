  - id: TV001
    title: 投资建议摘要表
    notes: >
      投资建议反映八章证据的总体结论。确信度受 Overhaul 财务指标（ARR、NRR、毛利率）的重大信息缺口影响，而非对产品市场匹配或客户质量存疑。风险评级整合第 7 章列出的监管、竞争、财务和执行风险。估值立场反映行业倍数相对
      2022 年峰值的压缩，不是对业务基本面的负面判断。
    claimRefs:
      - CV001
      - CV002
      - CV012
      - CV021
      - CV030
      - CV031
      - CV041
    columns:
      - 维度
      - 评估
      - 依据
      - 上调所需证据
    rows:
      - - 投资建议
        - 有条件通过 — 进入完整尽调
        - 需求逻辑强、Fortune-100 客户、GSOC 护城河；财务不透明压低确信度
        - 数据室确认 ARR ≥$60M、NRR ≥100%、毛利率 ≥60%
      - - 确信度
        - 中 — 结构性逻辑已确认，财务不透明
        - 定性信号全部正向；没有公开 ARR、NRR 或利润率数据
        - 经审计或管理层审核的财务报表，并附季度 ARR 历史
      - - 风险评级
        - 高 — 监管、竞争、财务、关键人
        - GDPR 姿态未披露；无 SOC 2；依赖 CEO 关键人；板块倍数压缩
        - GDPR DPA、SOC 2 报告、继任计划，以及确认的 MidCap 财务约束条款
      - - 估值立场
        - 谨慎 — 基准区间 $350–640M，乐观 $1B+，悲观 $150–300M
        - 板块可比公司为 3.8–8× ARR；优先股堆叠底线 $350M+；2022 峰值处在板块顶部
        - 入场估值不高于 $500M，且确认 ARR ≥$80M；披露优先股清算优先权
      - - 入场纪律
        - 入场价格低于 $600M；承诺前必须完成数据室
        - SAP 对 FourKites 的 $600M 可比交易（8 单位可比）；公开 SCM 中位数 3.8× EV/Rev
        - 投资条款书前完成数据室，并解决财务门槛事项
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    notes: |
      投资逻辑列出公开证据中最强的已确认信号。反向逻辑列出重大担忧；若尽调确认，这些担忧会降低确信度或要求调价。每行都给出会改变判断的具体证据或反证。
    claimRefs:
      - CV002
      - CV003
      - CV007
      - CV009
      - CV020
      - CV021
      - CV030
      - CV031
      - CV038
      - CV041
    columns:
      - 维度
      - 投资逻辑
      - 反向逻辑
      - 改变判断的条件
    rows:
      - - 市场需求
        - 货物盗窃 YoY 上升 14%；年损失 $725M；医药监管复杂度推动可视化强制要求
        - 需求已验证，但市场也吸引了资本多 5–10× 的 FourKites/project44；Overhaul 可能拿不下最大客户
        - 证明 NRR ≥110%，并在医药和科技垂直行业拿出竞争胜率 ≥50% 的证据
      - - 竞争护城河
        - GSOC + IoT + AI + 执法集成具备独特性；暂无竞争对手复刻完整栈
        - FourKites 的 Loft AI 智能体和 project44 的多式联运集成覆盖多数软件表层，且没有 GSOC 成本拖累
        - 流失数据证明总收入流失 <5%；客户访谈中未出现竞争替代事件
      - - 客户证明
        - Fortune-100 logo（Microsoft、BMS、CEVA、Dyson）；通过 FreightVerify 覆盖 top-10 汽车 OEM 中的 6 家
        - 未披露 NRR 或留存数据；G2 评价提到设置摩擦和 UI 复杂度阻碍采用
        - NRR ≥100%，净新增 logo 年增 ≥10%，且 top-10 客户访谈提供多年扩张数据
      - - 财务前景
        - 2024–2025 三轮融资合计 $215M+，显示投资方认可增长轨迹
        - August 2025 轮未披露估值，引发下调估值融资担忧；MidCap 债务增加财务约束和利息风险
        - 披露 August 2025 轮投后估值高于 $600M，且确认毛利率 ≥60%
      - - 退出价值
        - SAP 对 FourKites 的兴趣给出 $600M 可比；Microsoft 合作关系带来天然收购方选项
        - 供应链 SaaS 老股市场折价 63%（project44），说明买方给这类资产的定价明显低于高峰轮次
        - 战略意向书，或与具名买方确认的 $500M+ 收购讨论
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    notes: >
      所有估值估计均由分析师根据行业倍数数据和 ARR 区间估计搭建。没有来自 Overhaul 的已确认内部财务数据。概率信号只是用于说明的指示性区间，不应视为点概率。入场价格和回报结果假设以隐含情景估值投资
      $100M，且已投资本上方有 1.5× 清算优先权堆叠。
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV032
      - CV033
      - CV037
    columns:
      - 情景
      - 关键假设
      - 隐含估值
      - $100M 持股下的回报逻辑
      - 关键下行触发因素
      - 概率信号
    rows:
      - - 悲观
        - ARR ~$50M；倍数 3–4×（公开中位数扣除流动性折扣）；板块逆风；近期无退出；GSOC 毛利拖累得到确认
        - $150–200M
        - 低于 $350M+ 优先股堆叠；普通股回报接近零；债权人部分收回
        - 确认 ARR 低于 $60M；NRR 低于 95%；GDPR 监管行动；2+ 个 top-10 客户被竞争对手替代
        - ~20%
      - - 基准
        - ARR ~$80M；倍数 6×（高于公开 SCM 中位数的增长溢价）；3–5 年内以 $500–600M 战略收购退出；MidCap 授信可控
        - $450–560M
        - 总企业价值 ~$500M，减 $350M+ 优先股 = ~$150M 剩余价值；按 20% 股权 = ~$30M；普通股回报 1.3×
        - 下调估值融资轮中发现估值下修；无战略收购方兴趣；板块倍数压缩
        - ~55%
      - - 乐观
        - ARR ~$125M；倍数 8×（AI 平台溢价 + 监管护城河）；SAP/Oracle/Microsoft 以 $900M–$1.2B 战略收购；MidCap 偿还
        - $950M–1.1B
        - 总企业价值 ~$1B，减 $350M+ 优先股 = ~$650M 剩余价值；按 20% 股权 = ~$130M；回报 2–3×
        - AI 热度退去后倍数下修；关键人流失；医药客户流失
        - ~25%
  - id: TV004
    title: 可比估值表
    notes: >
      可比数据来自公开披露、新闻稿和老股市场数据聚合商。私营公司 ARR 估计来自分析师来源的共识推断，实际数字未披露；这类数字都应按 ±30% 不确定性区间看待。Samsara
      是唯一公开可比公司，也提供最可靠的倍数锚。FourKites ARR 估计来自 Tracxn/Sacra 研究。Project44 ARR 来自 Tracxn/Compworth 数据。倍数按最近披露估值 ÷ 估计 ARR
      计算。
    enumerationScope:
      coverage: partial
      basis: >
        Reviewed all publicly disclosed supply chain visibility and cargo security platforms that have disclosed funding
        rounds and valuation data: project44, FourKites, Motive (adjacent), Samsara (public anchor). Exhaustive global
        coverage of all comparable SaaS companies was not achievable due to private data limitations; ARR for all
        private peers is estimated from secondary sources.
    claimRefs:
      - CV004
      - CV005
      - CV006
      - CV007
      - CV009
      - CV010
      - CV011
      - CV018
      - CV019
      - CV034
      - CV035
      - CV036
    columns:
      - 公司
      - 阶段 / 状态
      - 最近估值
      - 累计融资
      - 估计 ARR
      - 隐含倍数
      - 与 Overhaul 的相关性
      - 局限
    rows:
      - - project44
        - 私营（2021 轮）
        - $2.7B 标称；~$980M–1.0B 老股（2026）
        - $912M
        - ~$211M（Tracxn 估计）
        - ~13× 标称；~4.7× 老股
        - 实时运输可视化直接竞争对手；按 ARR 计最大的私营可比公司
        - 2021 高峰市场轮次；老股市场 ~63% 折价显示实质性重定价；多式联运覆盖面比 Overhaul 更广
      - - FourKites
        - 私营（~$1B 估计）
        - ~$1B（Tracxn 估计）
        - $243M
        - ~$120M（Tracxn 估计）
        - ~8×
        - 供应链可视化和风险领域最接近的正面竞争对手；SAP 收购可比
        - ARR 为估计而非确认；估值并非来自披露轮次，而是分析师推断
      - - Motive (KeepTruckin)
        - 私营（$2.85B，2021）
        - $2.85B（2021 轮）
        - $450M+
        - ~$250M+（估计）
        - ~11×（2021 高峰）
        - 相邻领域 — 车队安全和运营管理；重要 IoT 设备基础可与 Overhaul 传感器网络类比
        - 2021 年峰值倍数；产品重心不同（驾驶员安全 vs 货运风险）；不是纯粹的供应链可视化可比公司
      - - 'Samsara (NYSE: IOT)'
        - 上市公司（~$24B）
        - ~$24B（May 2026 市值）
        - 首次公开募股（IPO）
        - ~$1.15B（最近披露）
        - ~21×
        - 公开市场锚点；供应链和车队 IoT 平台；证明规模化 IoT-SaaS 可以拿到溢价倍数
        - 上市公司流动性溢价不适用于私有公司 Overhaul；Samsara 体量大得多且接近盈利
      - - 供应链 SaaS 中位数
        - 上市可比公司（multiples.vc）
        - 3.8× EV/Revenue（中位数，May 2026）
        - N/A
        - N/A
        - 3.8×（私有公司：4.5× ARR 中位数）
        - 行业级基准用于约束入场价格；为 Overhaul 的保守情景提供底部参考
        - 行业中位数混合了盈利和亏损公司；Overhaul 的具体利润率画像未知
  - id: TV005
    title: 投资逻辑破裂与叫停触发因素表
    notes: |
      投资逻辑破裂事件指可观察的条件；一经确认，会实质削弱投资逻辑，并触发重新评估或撤回。每个触发因素都对应可度量阈值和明确动作含义。除非另有说明，监控节奏为季度。
    claimRefs:
      - CV002
      - CV024
      - CV029
      - CV037
      - CV041
    columns:
      - 触发因素
      - 可度量阈值
      - 投资逻辑传导
      - 动作含义
    rows:
      - - 确认降估值融资
        - 披露 Series D 或老股交易估值低于 $400M
        - 确认 ARR 悲观情景轨迹；排除乐观情景；退出可选性被优先股堆叠压低
        - 重建回报模型；评估清算优先权顺位；考虑二级市场退出
      - - 大客户转投具名竞争对手
        - 任意 12 个月内流失 2+ 个前 10 大客户（Microsoft、BMS、CEVA、Dyson 或汽车 OEM）
        - 削弱 NRR 投资逻辑和产品护城河；释放竞争替代信号；降低战略买家兴趣
        - 索取赢单 / 输单报告；独立访谈客户推荐人；评估产品差距严重程度
      - - 重大监管执法行动（GDPR/FDA）
        - GDPR 监管机构正式启动调查，或 FDA 警告信点名 Overhaul 平台可追溯性缺口
        - 带来财务责任（最高 €20M 或全球收入的 4%）和声誉损害；触发客户合规审查
        - 立即聘请监管律师；暂停新 EU 客户上线；量化罚款敞口相对收入的影响
      - - CEO Barry Conlon 离任且无继任计划
        - CEO 变更公告后 30 天内未公布具名接任者或交接时间表
        - 关键人风险落地；同时冲击客户关系、融资和产品战略
        - 立即接触董事会；评估临时方案；继任安排清晰前暂停最终出资承诺
      - - RiskGPT 大规模准确性失灵
        - 公开记录中出现 3 起或以上漏报告警，每起导致未发现货物盗窃 ≥$1M，或发生货运舱单数据泄露
        - 侵蚀核心产品价值主张；带来责任敞口；触发企业客户安全审查和流失风险
        - 索取根因分析和事件响应计划；评估赔偿敞口；暂停新的 RiskGPT 部署
  - id: TV006
    title: 最终尽调要求表
    notes: |
      尽调要求按对估值和投资决策的重要性排序。前三项是门槛要求——没有这些材料，不应推进承诺。第 4–6 项重要，但可在投资条款清单后通过适当陈述与保证解决。所有项目均假设 4–6 周资料室流程并可接触管理层。
    claimRefs:
      - CV030
      - CV031
      - CV033
      - CV040
      - CV041
      - CV042
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - ARR、NRR 和毛利率
        - 未公开披露 ARR、NRR 或毛利率；Overhaul 不发布财务 KPI
        - ARR 在 $50–125M 区间会带动基准情景估值 ±$600M 波动；NRR 决定平台粘性；毛利率决定退出倍数是否适用
        - CEO 和 CFO；资料室财务报表，包含季度 ARR 历史和客户队列留存
      - - MidCap Financial 融资额度条款
        - 债务额度金额、利率、期限、契约和提前还款条款未公开披露
        - 契约可能限制分红、收购或增长投入；利息费用会直接压低股权价值
        - 法律资料室；MidCap 融资协议，附契约清单和提款历史
      - - GDPR 合规状态和 DPA 文件
        - 截至 May 2026，未披露 GDPR 状态、EU 代表、DPO 任命或 DPA 模板
        - GDPR 罚款敞口最高 €20M 或全球收入的 4%；EU 药企客户在审计或续约前需要确认 DPA
        - 法律 VP/EVP；GDPR 合规项目文件、DPO 任命函、DPA 模板和监管机构往来函件
      - - SOC 2 Type II 或 ISO 27001 认证
        - 未公开确认 SOC 2 或 ISO 27001；G2 评论未提及安全认证；严格隐私认证未验证
        - 药企和科技领域的 Fortune-100 客户要求 SOC 2 或同等认证；缺失认证会在合同续约时带来流失风险；收购方也需要确认网络安全基本盘
        - CISO；最新 SOC 2 Type II 报告，包含范围定义和例外摘要
      - - 优先股堆叠和投资人权利
        - August 2025 轮次的投后估值未披露；清算优先权瀑布、反稀释条款和投资人董事席位未公开
        - 超过 $350M 的优先权负担决定所有退出情景下普通股剩余价值；反稀释条款影响新投资人回报
        - 总法律顾问；包含优先股堆叠瀑布的股权结构表、全部投资人权利协议和董事会构成
      - - RiskGPT 准确性基准和 SLA 表现
        - 假阳性和假阴性率、GSOC 升级率及 SLA 违约频率未公开报告
        - AI 幻觉风险会随部署量放大；任何公开 RiskGPT 失效事件都会触发客户流失和责任风险；基准可证实或推翻 99.9% 保护率主张
        - 产品 VP / 工程 VP；RiskGPT 评估报告、SLA 表现日志和事故披露历史
