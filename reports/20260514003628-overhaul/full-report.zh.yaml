      - number: '1.4'
        title: 产品、平台与技术
        blocks:
          - type: paragraph
            body: >
              根据公司官方解决方案页面，Overhaul 平台围绕五个核心方案组织。第一，货物盗窃与篡改预防，提供路线偏离和未经授权停靠的实时警报、AI
              支持的干预策略，并连接执法机构以协助追回货物。第二，欺诈与双重经纪清除，基于多重风险因素给出风险评分，提供预订前和现场承运商验证，并在风险评分飙升时实时告警。


              第三，冷链质量与合规保护，通过自动阈值越界警报、针对不同产品的可配置设置，以及设备无关的集成方式，监控对时间和温度敏感的货物。第四，端到端可视化，为在途库存优化提供智能 ETA、SKU
              级可见性和多式联运追踪能力。第五，保险成本降低，借助数据驱动的风险管理防范盗窃、腐坏和在途风险，并由掌握风险数据的承保方提供定制化保障选项（包括即期费率和年度保单）。


              技术栈以 AI 驱动的风险分析、实时 GPS 与 IoT
              传感器集成、预测性情报为核心。公司的设备无关策略意味着它接入客户现有硬件投资，而不是要求部署专有设备。这降低了大型企业客户的采用摩擦，因为他们往往已经拥有部分可视化基础设施。行业认可包括 IoT Global
              Awards 和 Gartner 认可，说明平台已获得独立第三方验证。
