            body: >
              Overhaul 的核心论点建立在四根支柱上：（1）货物盗窃在结构性上升的需求环境——按 CargoNet 数据，Q3 2024 同比增加 14%，单季被盗金额超过
              $39M——创造了持久平台需求；（2）垂直整合的差异化，把 IoT 传感器覆盖、24/7 GSOC、RiskGPT AI 和执法合作关系合成一套统一产品，竞争者只能部分复制；（3）包括
              Microsoft、Bristol Myers Squibb、CEVA 和 Dyson 在内的 Fortune-100 客户基础，证明企业级产品市场匹配；（4）来自 DSCSA、CTPAT 和 EU AI Act
              合规义务的监管顺风，推动药品和物流行业采用平台。反论点聚焦财务不透明——ARR、NRR 和毛利率均未披露——同时行业估值环境已显著低于 2021–2022 峰值。供应链 VC 融资从 2021 年的 $63.7B
              收缩 89% 至 2024 年的 $7.1B，压低所有玩家的退出估值。Overhaul 的 GSOC 模式依赖大量人工，相比纯软件竞争者限制经营杠杆。Project44 和 FourKites 的总融资额高出
