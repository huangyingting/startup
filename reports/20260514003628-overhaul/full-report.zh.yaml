  - id: TR001
    title: 监管 / 法律风险登记表
    notes: |
      覆盖关键美国和欧盟框架，直接适用于 Overhaul 在制药、科技和物流垂直行业的数据处理与 AI 运营。拉丁美洲、EMEA 和 APAC 的其他司法辖区特定要求未穷尽列出。行按评估严重性排序。
    enumerationScope:
      coverage: partial
      basis: >
        Reviewed key US and EU regulatory frameworks applicable to Overhaul's pharmaceutical, technology, and logistics
        verticals — specifically GDPR, FDA DSCSA, EU AI Act, DOT ELD mandates, and CPRA. Exhaustive global coverage was
        not achievable; additional jurisdiction-specific rules in LATAM, EMEA, and APAC may also apply to Overhaul's
        cross-border data flows and carrier telematics integrations.
    claimRefs:
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
      - CR034
      - CR035
    columns:
      - 法规 / 法律
      - 司法辖区
      - Overhaul 义务
      - 执法可能性
      - 严重性
      - 当前缓释措施
      - 剩余风险敞口
      - 尽调路径
    rows:
      - - GDPR（General Data Protection Regulation，通用数据保护条例）
        - EU / EEA
        - EU 代表、数据处理协议、72 小时内泄露通知、数据主体权利管理
        - 可能
        - 严重
        - 未知 — 未公开披露 GDPR 姿态或 DPA
        - 高：最高 €20M 或全球收入 4%
        - 索取 GDPR 合规文件、DPO 任命信息和 DPA 模板
      - - FDA 药品供应链安全法（DSCSA）
        - 美国
        - 平台必须为药企客户支持药品在批次和单件层面的序列化电子追溯
        - 可能
        - 高
        - Overhaul 面向医药行业销售供应链监控；具体 DSCSA 集成细节未披露
        - 中：FDA 执法风险主要落在药企客户身上，但 Overhaul 的数据缺口会带来敞口
        - 核实符合 DSCSA 的数据模式和 API 输出，并用医药客户访谈验证
      - - EU AI Act（Regulation 2024/1689）
        - EU / EEA
        - RiskGPT 在医药物流中的用途可能被划入高风险 AI；需完成合规性评估、透明度和人工监督要求
        - 可能
        - 高
        - EU AI Act Service Desk 于 April 2025 启动；Overhaul 尚未公开确认合规计划
        - 中-高：不合规可能导致 RiskGPT 无法用于 EU 医药供应链
        - 核实 RiskGPT 在 AI Act 下的分类、合规性评估状态和 EU 市场推出计划
      - - DOT / FMCSA 电子记录设备（ELD）强制令
        - 美国
        - Overhaul 接入的承运商车载远程信息数据必须遵守 ELD 数据格式、留存和访问限制
        - 不太可能
        - 中
        - ELD 合规在承运商侧；Overhaul 的数据接入层必须遵守 FMCSA 数据使用限制
        - 低-中：对承运商数据管线构成工程约束
        - 核实 Overhaul 的 ELD 数据处理政策和承运商 DPA 条款
      - - 加州消费者隐私权法案（CPRA）
        - 美国（加州）
        - 涉及加州居民员工或联系人的供应链可视化数据，将触发消费者数据权利（访问、删除、选择退出）
        - 不太可能
        - 中
        - 加州隐私义务对美国 SaaS 很常见；Overhaul 的隐私政策和 CPRA 合规状态未确认
        - 低-中：增量负担；用标准隐私合规计划可管理
        - 审阅 Overhaul 隐私政策、加州披露通知和数据主体请求流程
  - id: TR002
    title: 运营 / 质量 / 安全风险登记表
    notes: |
      按可能性 × 严重性的综合结果，从高到低排列关键运营失效模式。每项风险都配有可观测的先行指标，便于尽调监控。
