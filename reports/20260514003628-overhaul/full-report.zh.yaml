            body: >
              Overhaul 自成立以来已披露融资总额超过 $350M，最近一轮是 August 2025 完成的 $105M Series C，但未披露估值——相较 2022 年披露的 $1B+
              峰值估值，这是值得注意的缺失。August 2025 轮融资纳入 MidCap Financial 债务额度，显示公司使用杠杆，并给资产负债表增加利息支出和契约风险。供应链 VC 融资从 2021 年的
              $63.7B 收缩到 2024 年的 $7.1B，压缩行业倍数，并提高后续融资的成本和难度。Springcoast Partners 同时参与 January 2025 和 August 2025
              两轮融资，表明公司集中依赖单一领投方；如果 Springcoast 的投资论点或胃口变化，Overhaul 会变得脆弱。G2 评论反复提到界面复杂和集成设置摩擦，代表 Overhaul 企业安装基盘中的 NPS
              与留存风险。Barry Conlon 同时是 Overhaul 创始人、CEO 和唯一外部发言人，构成有意义的关键人风险；若他离任或失去履职能力，客户关系、融资和战略都会受扰动。PitchBook 的 Q1
