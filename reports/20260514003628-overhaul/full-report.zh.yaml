      - number: '4.6'
        title: 财务数据缺口与尽调框架
        blocks:
          - type: paragraph
            body: >
              Overhaul
              是一家未提交公开证券披露、且短期内没有已知上市计划的私营公司，因此对所有核心财务指标保持严格保密。以下数据均未公开：年度经常性收入、收入增长率、毛利率、销售与营销费用、工程团队规模或成本、EBITDA、净亏损或净利润、现金余额、烧钱速度、现金续航，以及按
              cohort 划分的客户数量。


              因此，对 Overhaul 的财务尽调必须依赖：（a）管理层 data room 中经审计或审阅的财务报表；（b）客户访谈，用来交叉核验续约率和 ACV 扩张；（c）第三方数据提供商（Pitchbook、CB
              Insights）给出的估算 ARR 区间和 cap table 数据；（d）保险行业联系人，用来验证保费下降主张；（e）可比上市公司分析，用来搭建合理的财务模型框架。


              五个关键财务数据缺口会实质影响投资论点：（1）ARR
              和增长率未知，限制收入质量判断；（2）毛利率未知，限制盈利路径可持续性判断；（3）烧钱速度和现金续航未知，导致再融资风险评估存在不确定性；（4）净收入留存率未知，限制 LTV 与扩张潜力建模；（5）如果没有当前
              ARR 和可比交易数据，就无法判断 $1B+ Series C 估值是否还能反映 2026 市场条件。
