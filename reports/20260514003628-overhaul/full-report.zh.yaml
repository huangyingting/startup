      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: SAP 对 FourKites 提出 $600M 收购报价
            body: >
              SAP 在 2026 年 2 月提出以约 $600M 收购 FourKites，但据 Axios Pro 报道遭拒。这是与 Overhaul 最相关的战略收购可比案例：FourKites 估计有 $120M
              ARR、估值 $1B，按 SAP 报价对应 5× ARR 收购倍数。把 5× 倍数套到 Overhaul 的 $80M ARR，意味着 $400M——低于优先股堆叠下限。 若 ARR 达
              $100M，同样倍数意味着 $500M——刚刚高于优先股堆叠。这个可比交易构成投资人应承销的收购定价下限。
            calloutType: insight
            claimRefs:
              - CV008
              - CV037
              - CV039
          - type: callout
            title: 财务不透明是首要尽调风险
            body: >
              Overhaul 的 2025 年 8 月 Series C 未披露投后估值。截至 2026 年 5 月，公司没有公开披露 ARR、NRR 或毛利率。若按估计 $40–80M ARR，合理企业价值区间从
              $150M（低于优先股堆叠）到 $640M。投资决策不应面对这么宽的估值区间——data room 必须在任何承诺前把区间收窄。
            calloutType: insight
            claimRefs:
              - CV002
              - CV031
              - CV013
          - type: callout
            title: 优先股堆叠下限很关键
            body: >
              将所有已披露轮次和 MidCap 债务授信计算在内，累计投入资本超过 $350M，任何低于 $350M 的退出都不会给普通股股东留下回报。 Overhaul 2025 年 8 月 Series C
              参与方很可能持有带 1× 或更高清算优先权的优先股。任何新投资都必须搭完整瀑布分配模型—— 不只是看企业价值——才能看清真实回报潜力。
            calloutType: insight
            claimRefs:
              - CV003
              - CV017
              - CV037
              - CV040
