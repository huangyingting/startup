      - number: '6.4'
        title: 客户获取与扩张策略
        blocks:
          - type: paragraph
            body: >
              Overhaul
              的市场进入策略把直接企业销售、多边合作伙伴生态和由收购驱动的客户扩张打法结合起来。合作伙伴计划包括五类：供应链和物流技术伙伴、保险科技伙伴、设备制造商、集成市场，以及物流服务提供商。具名技术伙伴包括
              Chain.io（数据集成）、Transimpact（包裹支出分析）、BlueBox Systems（可视化）和 Truckstop（货运经纪）。保险伙伴 Loadsure
              支持风险管理加保险的组合产品；该产品把风险数据直接连接到保费节省，是强有力的客户留存机制。LE Connect 执法网络既是差异化工具，也是销售赋能器：当企业买家问「周日凌晨 2
              点你们会怎么做？」时，Overhaul 可以用真实案例展示经验证的执法响应，直接把风险经理转化为支持者。


              收购一直是加速客户数量增长的主要工具。SensiGuard（February 2022）增加了 EMEA 办公室和安全运营专长，带来 Brazil、Mexico 和 Czech Republic
              客户关系。FreightVerify（2024）带来全球前十大汽车制造商中的六家，以及覆盖 280,000 个发货地点的 70,000 月活用户——通过打入汽车和医疗健康行业，实际上将 Overhaul
              的可服务客户基础扩大近一倍。January 2025 来自 Springcoast Partners 和 Edison Partners 的 $105 million Series C
              明确用于资助更多战略收购，释放出持续以外延增长作为主要客户获取渠道的信号。July 2023 推出的 Intelligence as a Service
              产品为尚未使用完整平台的公司提供独立情报订阅，可能成为面向中端市场买家的免费增值入口，用来先落地再扩张。
