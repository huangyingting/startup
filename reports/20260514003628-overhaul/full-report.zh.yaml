      - number: '7.2'
        title: 货物盗窃与运营风险
        blocks:
          - type: paragraph
            body: >
              对 Overhaul 而言，货物盗窃既是需求顺风，也是运营表现风险。CargoNet 报告 Q3 2024 货物盗窃事件同比增加 14%，单季被盗金额超过 $39M；此前数据则显示 2022 年激增
              57%。盗窃高发验证了市场对 GSOC 支撑平台的需求，但也持续压迫公司对任一时点监控的 $1.4T 货物给出 99.9% 保护率的承诺。Overhaul 平台依赖来自 Tive、Impinj
              等第三方硬件提供商的连续实时 IoT 数据流；任何供应中断、固件不兼容或设备故障，都会形成监控盲点，可能导致盗窃事件未被发现。Middle East 供应路线在 2024
              年受到扰动，进一步拉紧全球货物保险保障；当平台缺口与高风险走廊损失事件上升同时出现时，托运人暴露会被放大。GSOC 操作员配置是持续扩张约束：每个新客户都需要新增 24/7 人工覆盖，无法瞬时补齐。
