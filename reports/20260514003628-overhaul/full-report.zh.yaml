      - number: '3.3'
        title: 既有厂商与相邻玩家
        blocks:
          - type: paragraph
            body: >
              Samsara (NYSE: IOT) 是按市值和收入计算最大的相邻竞争者，主要运营车队车载终端和驾驶员安全平台。Samsara 通过 Connected Operations Cloud 提供 GPS
              车队追踪、AI 行车记录仪系统、ELD 合规、冷藏车监控、挂车追踪和资产管理。其 G2 评分 4.5 星、来自 3,200+ 条已验证评论，以及司机应用排名 #1，反映其在车队管理市场的主导地位。Samsara
              的货物监控（通过冷藏车和资产追踪）与 Overhaul 市场相邻，但其主要买方是关注合规和驾驶员安全的车队运营商，而不是货物安全与情报团队。上市公司身份和规模给 Samsara 未来向主动安全扩张提供资本优势。


              Descartes MacroPoint 隶属于 Descartes Systems Group (TSX/NASDAQ: DSG)，提供货运可视化平台，并带有 FraudGuard 承运商欺诈检测，直接重叠
              Overhaul 的身份验证能力。MacroPoint 嵌在 Descartes 更广泛的物流套件中，包括海关合规、WMS
              和海运可视化模块，因此更像大型企业物流平台的打包模块，而不是独立货物安全解决方案。这种集成模式既是竞争优势（分销面广），也是限制（在高后果货物垂直领域不如 Overhaul 专精）。


              Sensitech 是 Carrier Global (NYSE: CARR) 的子公司，拥有 30 多年冷链监控历史，并运营 SensiWatch
              平台，具备经过验证的制药和食品供应链监控工作流。Sensitech 与 Overhaul 的生命科学和食品垂直业务竞争，但不覆盖一般货物盗窃、地面运输安全或主动追回运营。SAP、Oracle Supply
              Chain Management 和 Manhattan Associates 等传统 ERP 与 TMS 供应商，在集成企业套件中提供供应链可视化模块，通常依靠承运商 API 集成而非 IoT
              硬件，形成“够用就好”的追踪基线，从而减缓专门平台的采用。
