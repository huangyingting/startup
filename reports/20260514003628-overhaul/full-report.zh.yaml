              债务额度。债务部分带来纯股权可比公司没有的利息支出和契约风险。Springcoast 参与 2025 年两轮融资，显示投资人信念集中，但也意味着依赖单一机构支持者——如果 Springcoast
              的投资授权或胃口变化，就会成为风险。按上市供应链管理软件 3.8× EV/Revenue 中位数和 $80M 基准情景 ARR 估算，Overhaul 隐含价值约 $304M——远低于 2022 年峰值。按私营
              SaaS 4.5× ARR 中位数，隐含价值为 $360M；按 7× 成长溢价，则为 $560M。2022 年 $1B+ 倍数（按估算 $40–80M ARR 约 12–25× ARR）是在截然不同的 VC
              环境中形成的，反映当时行业狂热峰值，而这一环境已回撤。就进场纪律而言，任何给 Overhaul 高于 $600M 定价的投资者，都假设 ARR 确认高于 $80M 且留存高于 100%——这些证据必须来自
