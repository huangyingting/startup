      - number: '2.3'
        title: 买方分层与采购动态
        blocks:
          - type: paragraph
            body: >
              Overhaul 的产品卖给企业物流和供应链组织，这些组织的货运价值高、受监管或易被盗。Overhaul 自己的行业页面明确列出八个垂直行业：生命科学、电子、制造、零售、食品饮料、物流服务商（LSPs）、AI
              硬件和汽车。每个垂直行业都有不同的买方画像、风险驱动因素和采用触发点。


              在生命科学和制药领域，主要买方是制药制造商、分销商和专科药房的物流总监或 VP、供应链合规官或首席供应链官。采用触发点主要来自监管：FDA 的 DSCSA（November 2023
              全面生效）要求处方药电子化、可互操作的追踪和追溯。这形成合规驱动的拉力，而不是纯 ROI 驱动的销售；这一采购动态很重要，因为它缩短 ROI 论证周期，并让法务和合规团队与物流买方一起参与。


              在电子和 AI 硬件垂直行业，买方通常是大型制造商或 OEM 的物流 VP 或安全总监。采用触发点是预防货物盗窃——电子元件、成品设备以及越来越多的 AI 加速器硬件，都是盗窃率最高的品类。Overhaul
              的货物盗窃情报中心记录了数十起单次追回案例，说明该细分市场对“响应 + 追踪”能力有活跃需求。


              在汽车领域，买方是管理入厂 VIN（车辆识别号码）和零部件追踪的 OEM 供应链总监，目标是保证产线连续性。采用触发点是中断风险：汽车工厂如果因缺少一票货而停产一天，损失可能达到数百万美元。Overhaul
              的汽车解决方案专门强调面向这一用例的预测性 ETA 和主动异常警报。


              在食品饮料领域，买方是负责冷藏或温敏货物的质量保障总监或供应链总监。触发点是温度偏离风险和监管合规（FDA 食品安全、Good Distribution Practice
              标准）。这一买方类型与冷链监控平台买方重叠。


              物流服务商（LSPs）——3PLs、货代和承运商——是独立的渠道细分。LSP 可能代表货主客户采购，因此更可能是转售商或渠道伙伴，而不是终端买方。Overhaul 面向 LSP
              的平台价值主张，是帮助它们赢得并留住高后果货主账户，并用分析和报告证明履约表现。
