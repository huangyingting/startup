      - number: '5.2'
        title: AI 风险分析：RiskGPT 与风险情报
        blocks:
          - type: paragraph
            body: >
              Overhaul 的 AI 层以 RiskGPT 为锚。RiskGPT 于 May 2, 2023 推出，是一套由 AI 驱动、用于实时在途风险缓释的解决方案。RiskGPT 构建在 Microsoft
              Azure OpenAI Service Studio 之上，并用 Overhaul 专有供应链情报和货运历史数据微调。系统为 GSOC
              操作员和客户物流团队提供逐步事故处置指引、升级协议、定向沟通模板和结合上下文的下一步建议——所有内容都会针对具体货运、风险类型、地点、时间、照片和事件历史背景定制。RiskGPT 之前，Overhaul
              报告的货物盗窃预防率已超过 98%；公司预期 AI 指引会进一步提升不同班次和地区的响应一致性。


              Azure OpenAI 合作关系为 AI 层提供企业级安全、隐私和可扩展性。扩展产品 RiskGPT Vision
              增加了基于照片的核验和图像分析，用来支撑上游数据质量和早期承运商欺诈检测，例如识别标识篡改或身份冒用。AI 模型会持续使用 Overhaul
              不断增长的在途事件数据集微调，因此模型准确度取决于平台规模——这是一个会复利的数据护城河，缺少可比事件历史的新进入者很难复制。


              Risk Monitor 产品把 AI 驱动的情报从单票货运事件延伸到宏观风险信号层。该产品监控 700+ 条风险信号流，可在风险影响在途货物之前，识别新兴地域威胁、犯罪模式变化、监管变化和极端天气事件。在
              July 2023，Overhaul 推出 Intelligence as a Service
              (IaaS)，正式划分三层货运情报：（1）通过周报和趋势报告进行战略性全球模式分析；（2）覆盖特定路线犯罪热点的运营性本地风险评估；（3）面向单票高风险货物的战术性实时告警。IaaS 产品从 300+ 家
              Overhaul 客户、直接执法合作关系和专有独家行业连接中取数，构建一个持续更新、单个托运人无法独立复制的情报网络。


              AI 平台也是 Overhaul 的 FraudWatch 工具核心——这是一款承运商身份核验产品，并通过 FreightVerify 集成扩展到较低价值货物。按 Overhaul
              内部分析，涉及欺诈性承运商身份的战略货物盗窃一年内增加超过 1,000%，因此基于 AI 的欺诈评分成为关键且还在扩大的产品能力。
