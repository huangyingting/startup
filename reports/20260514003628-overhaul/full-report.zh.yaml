      - number: '4.4'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >
              Overhaul 估计已在四轮已知融资中累计获得 $192–$215 million 已披露股权融资。最近且最大的一次事件是 July 2022 由 8VC 领投的 $145 million Series
              C，Greenbriar Equity Group 和 American Securities 参投；这些机构都是在物流领域具备专业能力的成熟机构投资者。与 CIA 和 NSA 需求相关的美国政府关联战略投资基金
              In-Q-Tel 也是已确认投资方，说明 Overhaul 的货物情报数据具有国家安全相关性。


              更早的 Seed、Series A、Series B 未公开逐项列出。行业研究数据库和新闻报道印证，在任何 Series C 后活动之前，公司累计融资在 $190–$215 million 区间。截至 May
              2026，July 2022 之后没有公开披露任何股权融资轮、可转债、债务额度或老股交易。这给剩余现金跑道留下开放问题：公司在 Series C 中估计获得 $145 million，按可比员工数和 SaaS
              成本基准估计，年度运营成本为 $30–$70 million；Series C 后可用现金跑道估计为两到四年，具体取决于实际支出速度。这意味着潜在现金跑道耗尽或再融资时间大约落在 2025–2026。


              自 2022
              年中以来没有公开资本活动，可能意味着：（a）有足够的有机现金流或现金余额继续运营，（b）正在融资但尚未关闭，（c）正在推进战略出售，或（d）通过纪律化资本管理延长现金跑道。没有证据支持其中任一解释优于其他解释。
