      - number: '7.3'
        title: 技术与网络安全风险
        blocks:
          - type: paragraph
            body: >
              Overhaul 平台为数百家 Fortune-1000 客户处理受监管行业中的敏感货物流动数据，因此既是网络攻击者眼中的高价值目标，也承担广泛监管合规义务。NIST 于 February 2024 发布
              Cybersecurity Framework 2.0，新增 Govern 功能，供应链技术提供商现在必须覆盖；Overhaul 目前与 CSF 2.0 的对齐情况尚未公开披露。FTC 已明确提示，IoT
              数据聚合方对连接设备数据安全承担法律责任；CISA 将运输与物流列为 16 个关键基础设施行业之一，适用更高报告和韧性要求。RiskGPT 是 Overhaul 构建在 Azure OpenAI 上的 AI
              预测引擎，会引入 AI hallucination 风险：误报可能触发代价高昂的不必要货物滞留，漏报可能错过真实威胁，两种结果都会带来责任并侵蚀客户信任。Overhaul 跨 US、EU、Latin
              America 和 EMEA 的多区域部署扩大了监管攻击面，因为每个司法辖区都有不同的数据驻留和泄露通知要求。若 Overhaul 的货物清单系统被成功入侵，数百家药品和科技客户的货运时间表可能暴露给对手利用。
