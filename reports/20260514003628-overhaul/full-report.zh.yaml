      - number: '6.3'
        title: 客户 ROI 与价值指标
        blocks:
          - type: paragraph
            body: >
              Overhaul 通过合作伙伴计划材料和保险计划公告，发布了一组有辨识度的客户 ROI 主张。旗舰主张是 3,200% 项目 ROI——即客户每投入 $1，可获得 $32
              回报。支撑这一核心主张的是具体节省项：货运保险费率下降 60%、六个月内因盗窃减少和运营优化节省 $5 million、盗窃尝试减少 80%，以及 14 天价值实现中位时间。设备返还率声称达到 99%，反映
              IoT 硬件生命周期管理效率较高。


              运营指标支撑了核心主张。Overhaul 报告整车（FTL）货物盗窃事件追回率为 96%——相比之下，通常执法追回率远低于 50%。平台声称相较保险行业基准可实现损失率下降 80%，并通过平台介入避免了 $226
              million 货物盗窃。July 2023 推出的保险计划把某客户货运保险费率从每 $100 15 cents 降至每 $100 7.5 cents——下降 50%——同时 Overhaul
              声称相较标准市场定价可实现超过 50% 折扣。合并平台现在任一时点守护约 $1.4 trillion 货物贸易，声称货运保护率为 99.9%。


              CEVA Logistics 案例研究提供了第三方佐证指标：年初至今监控 11,287 票货运，起点合规率 93.7%，在途合规率 82%。FeaturedCustomers 汇总了 422 条 Overhaul
              客户引用，综合评分 4.8/5.0。Microsoft 的 Erin Duffy 提到第一个航运旺季获得 4× 投资回报，与包含保险成本节省的项目 3,200% ROI 总体主张相互呼应。
