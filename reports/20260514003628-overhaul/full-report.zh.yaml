      - number: '8.4'
        title: 情景分析
        blocks:
          - type: paragraph
            body: >
              三个情景基于 ARR × 倍数逻辑构建，并锚定公开确认的行业倍数。熊市情景假设 Overhaul 真实 ARR 处在估算低端（约 $50M），行业倍数压缩至
              3×（与上市中位数一致，再扣除私有非流动性折价），且近期没有退出催化。隐含估值：$150M——低于 $350M+ 累计优先权堆栈，普通股持有人回报接近零。基准情景假设 ARR 为 $80M，倍数
              6×，反映高于上市中位数的成长溢价。隐含估值：$480M。在 $350M 优先权堆栈下，股权持有人获得约 $130M 剩余收益——对普通股股东而言，回报很薄但为正，总价值/投入资本为 1.4×。牛市情景假设在
              DSCSA 监管强制、Microsoft 合作扩张和货运量持续增长推动下，ARR 增至 $125M，倍数为 8×，反映 AI 平台溢价和竞争护城河强度。隐含估值：$1B，与 2022
              年峰值相当——可以实现，但需要多个不确定变量同时执行到位。基于可得公开证据，各情景概率分布约为 20/55/25（熊/基准/牛）；考虑公司融资轨迹、Fortune-100 客户基础和行业趋势，权重偏向基准情景。
            claimRefs:
              - CV012
              - CV013
