      - number: '5.6'
        title: 技术限制、缺口与竞争风险
        blocks:
          - type: paragraph
            body: >
              Overhaul 的技术栈存在几项限制，会给投资者带来风险。第一，平台网站和产品页面完全由 JavaScript 渲染，外部技术尽调难度较高。通过公开来源研究，找不到开发者 API
              文档、公开披露的技术架构或软件专利。这种不透明性让第三方难以评估可扩展性、安全态势或知识产权深度，也意味着分析师和投资者对技术主张的信心主要依赖公司叙事。


              第二，GSOC 模式虽有差异化，但会造成纯软件竞争者（FourKites、project44）无需承受的结构性毛利率压力。跨多个时区和地区为 24/7
              运营中心配人，会引入劳动力成本波动、关键人员依赖风险和扩张挑战；这些问题不适用于自动化软件流水线。因此，Overhaul 要走向 SaaS 可比毛利率（通常 70–80%），可能需要自动化 GSOC
              职能（减少常规介入中的人工参与），或持续证明客户愿意为价格溢价买单。


              第三，尽管 RiskGPT 构建在 Azure OpenAI 之上，Overhaul 把 AI 能力定位为差异点，但随着通用 AI 工具嵌入竞争平台，这一差异可能被侵蚀。FourKites 和 project44
              都已投入 AI 驱动自动化和预测分析；它们更大的货运网络，可为一般 ETA 预测和中断检测能力提供可比甚至更大的训练数据量。Overhaul 在 AI
              上最可防守的护城河，具体在货物安保和欺诈检测领域，因为其关于盗窃、追回和欺诈模式的专有事件数据库大概率无人匹敌。


              第四，FreightVerify 和 SensiGuard 集成代表显著技术整合债。把两家被收购公司不同技术栈下的平台架构、数据 schema
              和客户体验合并起来，常常会拖累工程多年。公司没有披露公开路线图或整合时间表，导致外界无法判断合并平台的完整能力何时能统一提供给所有客户。最后，Overhaul 的 14-day time-to-value
              主张意味着上线较快，但高价值药品客户的受监管 IT 环境，在连接外部平台时经常需要数月集成周期。
