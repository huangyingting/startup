      - number: '3.4'
        title: 替代方案与维持现状选择
        blocks:
          - type: paragraph
            body: >
              专门货物安全平台最常见的维持现状替代方案，是司机人工签到电话（通常每 2–4 小时一次）与货主自有 GPS 追踪的组合；后者通过 HOS 合规已经要求的嵌入式 ELD
              或车队车载终端系统实现。这种做法能提供位置数据，但缺少状态监控、风险情报、盗窃检测或主动追回能力。价格敏感细分市场的货主，尤其是 LTL、国内短途和中小企业，常把这种模式作为几乎零增量成本的替代方案。


              对愿意把盗窃损失作为运营成本吸收、而不是靠主动监控预防的货主来说，货物保险是有意义的财务替代。保险在损失事件之后赔付，而不是在事件之前或过程中介入，也不提供实时警报、追回协调或合规文档。DC Velocity
              2024 年报道称，中东扰动推高保险成本，正在挤压供应链风险预算；这一动态强化了主动监控平台相对被动保险策略的经济理由。GlobeNewswire（January 2023）的货物盗窃数据显示，2022
              年美国货物盗窃事件同比增加 57%，进一步验证了向主动预防转移的趋势。


              对拥有自有 IT 团队的大型物流服务商和承运商来说，内部自建仍是理论上的替代方案；但所需资本开支——采购传感器硬件、配置 SOC 人员、建设并维护承运商情报网络——形成了很高门槛，更有利于采用第三方平台。维持
              24/7 追回能力的运营复杂度尤其难以在内部复制，除非拥有与 Overhaul 安全导向创始团队相当的领域经验。
            claimRefs:
              - CP025
              - CP026
              - CP027
              - CP028
              - CP029
      - number: '3.5'
        title: 差异化、护城河耐久度与替代风险
        blocks:
          - type: paragraph
            body: >
              Overhaul 最主要的可防御优势，是多年主动事件数据沉淀出的自有货物风险情报网络——包括盗窃事件、追回模式、承运商声誉评分和欺诈类型学——这些无法仅凭原始 GPS 追踪数据重建。24/7
              安全运营中心进一步强化这一优势，提供竞争者需要大量时间和投入才能复制的人类响应层。单次事件 $200,000 至 $1.75 million 的公开追回案例，提供了纯软件竞争者难以从自身产品套件中拿出的可验证
              ROI 证据。


              Overhaul 在制药、食品和政府物流中的监管与合规认证，为受监管行业客户创造切换成本，因为这些认证转移到新供应商时需要耗时的验证和审计流程。公司的投资者网络——8VC、American Securities
              和 In-Q-Tel——在政府物流、国防货运和国家安全敏感供应链中提供分销优势，这是风投支持的软件竞争者难以快速复制的。


              主要替代风险来自功能收敛和平台扩张。FourKites 和 project44 都在投资 AI 驱动能力，随着时间推移可能缩小可视化分析上的功能差距。Samsara
              的上市公司资本优势，使其可能收购或自行扩张进入主动货物安全。Descartes MacroPoint 的 FraudGuard 功能已经侵入 Overhaul 的承运商筛查地盘。IoT
              硬件商品化——由传感器成本下降和设备制造商 5G 追踪器可得性提高驱动——可能在中期侵蚀单台硬件经济性，并削弱 Overhaul 的传感器差异化。
