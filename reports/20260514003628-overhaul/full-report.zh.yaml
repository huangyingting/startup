      - number: '4.2'
        title: 定价架构与单位经济
        blocks:
          - type: paragraph
            body: >
              Overhaul 的定价架构未公开披露，但可以从公司的价值主张和可比上市市场数据推断。平台面向大型企业以多年期合同销售，这与 Samsara 公开披露的 3–5 年合同结构一致。货物安全 SaaS
              的企业定价通常包括平台订阅基础费，外加按资产或按货运单元收取的变量部分，因此 Overhaul 的 ACV 对被监控货物的数量和价值高度敏感。


              公司声称的 ROI 指标——3,200% 项目 ROI、六个月节省 $5M，以及货物保险费率降低 60%——意味着它为客户交付了可观经济价值。如果仅货物保险节省就能让每个大型企业客户平均节省 $2–$5
              million，那么按节省价值 10–20% 定价的平台订阅，年合同价值可达到 $200,000–$1,000,000+。Overhaul 声称 14
              天见效，说明部署模式较流畅，能降低客户犹豫，并相对传统风险管理软件部署支持更短销售周期。


              保险产品创造了与平台订阅相互独立的第二个变现杠杆。如果 Overhaul 按保险费节省抽成，其经济性就会随已证明的效果扩展，形成纯可视化 SaaS
              中少见的绩效对齐收入机制。这种双杠杆定价方式——订阅加保险绩效经济性——让 Overhaul 的 ACV 有机会高于单模块竞争者。
