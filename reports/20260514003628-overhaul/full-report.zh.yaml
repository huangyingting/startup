            body: >
              最直接可比的私营公司是 FourKites，它在实时供应链可视化上与 Overhaul 正面竞争：tracxn 数据显示其估值约 $1B，已融资 $243M，估算 ARR 为 $120M，对应约 8× ARR
              倍数。SAP 在 February 2026 对 FourKites 提出约 $600M 收购要约——FourKites 已拒绝——为相关收购可比交易设定了地板。按 $120M ARR 和 5× ARR
              倍数，SAP 出价隐含约 5× 倍数，与上市 SCM 3.8× 中位数加私有控制权溢价一致。Project44 上一次融资是在 2021 峰值市场，以 $2.7B 估值完成，累计融资
              $912M；Compworth 2026 二级市场数据显示交易价格约为名义估值的 36–38%（约 $980M–$1B），意味着相对 2021 轮价格有 63% 二级折价。Motive（原
              KeepTruckin）在 2021 轮达到 $2.85B，尽管其主要经营车队管理，而非货物安保——可比性较弱。Samsara (NYSE: IOT) 是公开市场锚点：其市值约 $24B，ARR 约
              $1.15B（约 21× ARR），但溢价反映公开市场流动性、网络效应和接近盈亏平衡的财务状况，Overhaul 短期内难以复制。按 multiples.vc May 2026 数据，上市 SCM 软件类别的
              EV/Revenue 中位数为 3.8×。
