            body: >
              Overhaul 自成立以来融资超过 $350M，融资序列记录较完整：July 2022 完成 $145M Series C，估值 $1B+，由 8VC 领投，Greenbriar Equity Group 和
              American Securities 作为战略共同投资人；2024 年一轮 $73M 融资，重点用于扩展执法集成；January 2025 完成由 Springcoast Partners 共同领投的 $55M
