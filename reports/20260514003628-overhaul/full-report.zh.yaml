  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              Overhaul 通过多流 SaaS 模式变现，经常性平台订阅是核心。根据公司的 FAQ 和合作伙伴页面，Overhaul
              是一个把可视化、风险情报、合规和保险整合进单一订阅的供应链平台。主要收入流是平台订阅本身，按资产或按货运单元定价，并设计为年度或多年期企业合同。这一模式与其他供应链 SaaS 供应商一致：最接近的上市可比公司
              Samsara 报告称，约 98% 收入来自 3–5 年企业合同的订阅收入。


              第二个差异化收入流是 Overhaul 的保险成本降低产品。公司向企业客户营销可衡量的保险费节省——声称货物保险费率最高可降低
              60%——并通过与有记录控制措施绑定的平台订阅费，或基于保险节省的绩效费用获得收入。这创造了纯可视化供应商缺少的价值定价变现层，也扩大了 Overhaul 在单个客户处可服务的钱包份额。


              高级 AI 模块，包括 RiskGPT（AI 引导的风险响应）和 Risk Monitor（带有 700+ 风险信号流的实时货物安全），构成附加收入流，可扩大既有账户内的平台
              ACV。专业服务——上线、集成和支持——以及 IoT 设备销售或租赁补足收入组合。合在一起，这些收入流形成“先落地、再扩张”的架构，符合 Overhaul 聚焦 Fortune 500 客户的定位。
