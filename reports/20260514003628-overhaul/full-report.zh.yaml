      - number: '7.4'
        title: 监管与合规风险
        blocks:
          - type: paragraph
            body: >
              Overhaul 在 EU 运营，同时客户基础覆盖药品和食品垂直，形成复杂的多司法辖区监管环境。GDPR 罚款最高可达 €20M 或全球年收入 4% 中较高者；对一家跨 EU
              成员国管理敏感药品供应链数据的公司而言，这是实质财务暴露。FDA 的 Drug Supply Chain Security Act 要求药品产品实现序列化端到端电子可追溯；使用 Overhaul
              的药品托运人必须验证平台数据处理能满足 DSCSA 批次级和单品级追溯要求。EU AI Act 从 August 2024 起分阶段执行，鉴于 RiskGPT 和 Overhaul
              异常检测算法在药品和关键物流链中的作用，它们可能被归类为高风险 AI。California Consumer Privacy Rights Act
              把广泛消费者数据权利延伸到涉及员工追踪和物流提供商联系人的供应链可视化数据。DOT 和 FMCSA 关于电子记录设备的规定限制 Overhaul 如何接入和存储承运商车联网数据。截至 May
              2026，Overhaul 尚未公开披露其 GDPR 合规态势、EU 代表或 Data Processing Agreement 文档——这是实质尽调缺口。
