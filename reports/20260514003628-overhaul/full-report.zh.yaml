      - number: '5.4'
        title: 冷链与合规监控
        blocks:
          - type: paragraph
            body: >
              Overhaul 的冷链与合规模块服务于药品、食品饮料和生命科学客户。这些客户对在途产品状态监控面临严格监管要求。平台提供连续温度和状态监控，并支持可配置阈值告警——同一平台可支持不同产品类别的多种温度画像（例如
              -80°C 冷冻生物制剂与 2–8°C 冷藏疫苗并行）。阈值突破后的自动告警支持在产品完整性受损前主动介入；可审计数据日志则用于事后报告和监管检查。


              监管合规方面，Overhaul 平台覆盖 US Drug Supply Chain Security Act (DSCSA) 对处方药序列化追踪溯源的要求，也覆盖药品分销中适用的 Good
              Distribution Practice (GDP) 标准。平台合规监控模块无需手工录入数据，就能生成这些框架要求的保管链和状态文档——对于管理数百甚至数千票在途货物的药品物流团队，这是显著效率提升。


              公司对整个平台提出 14-day time-to-value 主张（见行业报道），意味着其快速部署架构可降低集成负担；这对合规敏感客户尤其重要，因为他们不能在达到受监控状态前承受漫长实施周期。Overhaul
              的冷链质量解决方案在公司 January 2025 的 TechCrunch 报道中被明确称为面向药品和食品饮料客户开发的产品，确认冷链能力是活跃产品线，而不是遗留功能。


              合规模块还支持 C-TPAT (Customs-Trade Partnership Against Terrorism) 和 AEO (Authorised Economic Operator)
              合规框架，把产品适用性从药品特定要求延伸到海关和贸易安全要求。对跨多司法辖区运营的企业客户而言，在单一平台内监控国际运输中的货物状态和保管链，相比各辖区点状解决方案，是关键价值主张。
