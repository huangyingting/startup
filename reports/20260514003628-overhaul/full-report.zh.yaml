        - 高
        - 中：GSOC 跨多个时区 24/7 运转；已接入执法部门
        - 中：GSOC 人员配置是线性成本约束；盗窃事件快速上升可能压垮处理能力
        - 未披露 GSOC 吞吐指标或 SLA 违约历史
      - - RiskGPT 发生 AI 幻觉，产生错误预警或遗漏威胁
        - 可能
        - 高
        - 低：LLM 幻觉是行业未解问题；Overhaul 未披露错误率基准或人工改判率
        - 中：RiskGPT 部署面越大，客户信任和责任风险越高
        - RiskGPT 准确率基准、误报 / 漏报率未披露
      - - IoT 硬件故障或供应中断（Tive、Impinj 设备停摆）
        - 可能
        - 高
        - 中：多供应商 IoT 策略部分缓释单一供应商依赖；备份监控未确认
        - 中：高价值药品运输中任何覆盖缺口都会留下未被发现的风险窗口
        - 供应商集中度和故障切换协议细节未披露
      - - 平台或 API 中断，扰乱实时货物监控
        - 不太可能
        - 高
        - 中：AWS/Azure 多云部署提供地理冗余；正常运行时间 SLA 未公开披露
        - 低-中：Overhaul 将实时可视化作为核心价值销售；任何中断都会直接削弱产品承诺
        - 平台正常运行时间 SLA、事故历史和 RTO/RPO 目标未披露
  - id: TR003
    title: 合作伙伴 / 依赖风险登记表
    notes: |
      覆盖关键基础设施和数据依赖。Overhaul 的平台是数据聚合层——价值创造完全依赖各依赖方持续、准确的数据流。各行按故障影响严重性排序。
    claimRefs:
      - CR017
      - CR024
      - CR027
    columns:
      - 依赖项
      - 对手方
      - 作用
      - 集中度
      - 失效场景
      - 严重性
      - 当前缓释
      - 剩余敞口
    rows:
      - - 云基础设施
        - AWS / Microsoft Azure
        - 承载核心平台、RiskGPT 推理和数据存储
        - 高：虽为多云，但两家超大规模云厂商曾出现相关性宕机
        - 重大区域云故障会同时中断所有客户的实时监控
        - 严重
        - 多云部署将风险分散到不同提供商
        - 中：AWS + Azure 同时故障有可能发生（罕见但非零）；未公开披露 RTO/RPO
      - - 车载远程信息数据提供商
        - Samsara / Geotab / 承运商 ELD
        - 为在途货物提供实时 GPS 和车辆状态数据
        - 高：Overhaul 接入多个承运商，但每个承运商可能只用一家车载远程信息提供商
        - API 废弃、限流变化或提供商被收购，扰乱承运商定位数据流
        - 高
        - 多承运商数据接入降低单一提供商依赖
        - 中：任何主要承运商更换车载远程信息提供商，都会传导到 Overhaul 对该承运商线路的可视化
      - - IoT 硬件 / 传感器
        - Tive / Impinj
        - 为高价值药品和冷链货物提供附着在资产上的传感器
        - 中-高：专业 IoT 细分市场主要依赖两家供应商
        - 全球半导体短缺或供应商被收购，迫使合同期内切换硬件
        - 高
        - 采用 Tive 和 Impinj 双供应商策略；备份协议细节未披露
        - 中：运输途中切换硬件操作复杂，可能要求客户重新配发设备
      - - 承运商网络数据
        - FreightVerify（2025 年收购）
        - 提供承运商连接网络，支撑汽车制造商可视化
        - 收购后高：FreightVerify 现已完全并入 Overhaul 平台
        - 收购后整合失败或数据模式不匹配，会扰乱汽车客户的可视化层
        - 高
        - 收购整合仍在推进；Overhaul 对外沟通显示产品整合持续进行
        - 中：整合风险有时间边界，但过渡期客户 SLA 是流失风险
      - - 货物盗窃情报
        - CargoNet / 执法数据库
        - 向 RiskGPT 和 GSOC 操作员输入货物盗窃模式的实时威胁情报
        - 中：CargoNet 是主导性的第三方货物盗窃数据库
        - CargoNet 数据访问被撤销、API 变化或数据质量恶化，会让威胁情报层失明
        - 中
        - 执法部门集成提供并行数据通道；Overhaul 未确认冗余来源
        - 低-中：存在替代盗窃数据库（例如 NCIS），但 CargoNet 是市场标准
      - - 地图 / 路由引擎
        - Google Maps Platform / HERE Technologies 地图服务
        - 支撑可视化平台中的路线风险评分和地理围栏逻辑
        - 中：行业标准地图 API，定价稳定
        - 定价变化、API 废弃，或高盗窃新兴市场通道出现数据缺口
        - 低-中
        - 标准商业 API 合同；切换路由引擎摩擦相对较低
        - 低：可替代路由 API 很多，迁移风险可控
