  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图与市场结构
        blocks:
          - type: paragraph
            body: >
              Overhaul
              参与的是一个碎片化的供应链技术市场，历史上分为纯运输可视化平台和专门货物安全服务两类。还没有单一供应商能同时在这两个维度建立主导市场份额。按产品侧重和目标客户划分，竞争集合可分为四层：直接供应链可视化与货物安全平台、拥有相邻模块的既有物流技术套件供应商、冷链与状态监控专家，以及包括人工追踪和货物保险在内的维持现状替代方案。


              FourKites 和 project44 是按已披露网络规模计算最大的两家风投支持的纯 SCV 平台。FourKites 通过 Intelligent Control Tower
              平台每天追踪超过三百万票货运，目标客户是 Fortune 2000 企业货主。project44 已搭建超过 5,000 个 API 集成，把承运商、码头和车载终端供应商连接进 Decision
              Intelligence Platform。两家公司都强调 AI 驱动的预测分析和运营自动化，且均未公开披露把货物盗窃检测或实体安全运营中心能力作为产品功能。


              Overhaul 在 July 2022 Series C 中确立的超过 $1 billion 独角兽估值，使其成为资金最充足的纯货物安全平台。最接近的硬件型同行 Tive 提供 IoT
              状态监控传感器，但缺少安全运营中心和主动追回基础设施。Samsara (NYSE: IOT)、Descartes MacroPoint 和 Sensitech (Carrier Global)
              等既有相邻竞争者，在数据收集和特定垂直覆盖上与 Overhaul 竞争，但并不是主要货物安全供应商。
