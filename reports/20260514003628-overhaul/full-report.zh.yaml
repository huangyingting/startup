  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户画像与目标市场
        blocks:
          - type: paragraph
            body: >
              Overhaul 的目标客户是 Fortune 100 或 Fortune 500
              企业托运人，其货物具备高货值、监管敏感性，或二者兼有——因此货物丢失或运输失败都会造成重大财务或声誉事件。公司官方行业页面列出八个服务垂直：生命科学、消费电子、制造、零售、食品饮料、物流服务提供商、AI
              硬件和汽车。这样的垂直聚焦并非偶然：药品和生命科学货运受 Good Distribution Practice (GDP) 与 DSCSA
              追踪溯源监管约束；高科技电子产品属于最常被盗的货物类别；汽车供应链依赖准时制交付，对延误几乎零容忍；食品饮料则要求冷链合规不断链。


              公司把理想客户画像描述为运输「高价值、时间敏感、温控」货物，并需要「对流动货物实现仓库级控制」的组织。截至 January 2025，Overhaul 在全球服务约 350 家客户，高于 July 2023
              Intelligence as a Service 推出时的 300+ 家客户。按其 Series C 新闻稿，公司明确「受到 Fortune 100 公司信任」。January 2025 $55 million
              成长轮融资和 FreightVerify 收购完成后——后者带来全球前十大汽车制造商中的六家——Overhaul
              正在把可服务客户范围从最初的药品和电子产品托运人核心，主动扩展到汽车和医疗健康设施管理。FreightVerify 与 Overhaul 合并平台覆盖约 280,000 个不同发货地点，跨行业分部拥有
              70,000 月活用户，验证了企业采用的广度和深度。
