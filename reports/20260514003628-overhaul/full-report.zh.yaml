      - number: '5.3'
        title: IoT 设备生态与技术集成
        blocks:
          - type: paragraph
            body: >
              Overhaul 的 IoT Assess and Deploy 服务提供设备无关的 IoT
              生命周期管理，这是核心平台能力，而不只是硬件转售业务。该服务通过严格评分体系和对设备制造商的定期评审，在客户物流网络中审计、推荐、部署和管理 IoT 设备；Overhaul
              因而更像一家独立推荐技术的专业服务公司，而不是绑定某个专有硬件供应商。公司把这种独立性称为其 "Different on Purpose" 市场定位的基石。


              在 December 2023，Overhaul 宣布大幅增强 IoT Assess and Deploy，并列出三项量化绩效结果：（1）一家 Fortune 50 客户使用优化后的服务后，平均设备性能达到
              99.9%；（2）一家药品 Fortune 500 客户的设备追踪合规率提高 18%；（3）一家全球消费电子公司把丢失设备费用相关成本降低 $300,000。所有线路合计，增强服务把丢失设备费用降低
              17%——这是一项直接成本节省，也影响客户保险成本。


              集成方面，Overhaul 平台连接 Transportation Management Systems (TMS)、Warehouse Management Systems (WMS) 和 Enterprise
              Resource Planning (ERP) 平台。公司与 Microsoft 的关系包括对 Microsoft 供应链和企业平台的深度集成；RiskGPT 的 Azure OpenAI
              实施也显示双方技术合作不只是简单 API 供应商关系。FreightVerify 收购增加了供应链伙伴之间的单品级库存数据 API 连接能力——这要求在制造商、分销商和物流提供商之间同时做到 SKU/属性级
              API 集成。


              Overhaul 平台覆盖多式联运：道路、航空、铁路和海运。设备无关架构意味着客户不会被锁定在单一传感器供应商；相反，Overhaul
              的平台层会把不同设备制造商、并经验证适合特定用例的遥测数据标准化。该路径降低客户上线摩擦，也让平台能容纳快速演进的 IoT 硬件，而无需重写核心软件。
