      - number: '4.5'
        title: 成本结构与利润率驱动因素
        blocks:
          - type: paragraph
            body: >
              Overhaul 的成本结构主要由三类支出拉动：（1）工程与平台开发人员成本；（2）全球安全运营中心（GSOC）人员配置——24/7 人工监控与响应团队，把 Overhaul
              和纯软件竞争者区分开来；（3）围绕客户货运中部署的实体追踪传感器产生的 IoT 硬件、电信连接和设备物流成本。GSOC 人员层是 Overhaul
              最有辨识度的成本项：盗窃和篡改事件发生时，它带来真正的介入能力，但相较纯软件同行，也让销货成本在结构上更高。


              供应链和车队管理 SaaS 公司成熟后通常能做到 65–75% 毛利率；但托管安全服务层在规模经济形成前可能把毛利率压到 50–60%。Overhaul 由软件和安全服务组合而成，毛利率大概率落在 55–70%
              区间；软件层扩张而 GSOC 人力无需同比例增加后，毛利率有望抬升。Overhaul 是 Climate Pledge 签署方，并与 ENSO 平台合作测量 scope 3
              排放，显示其治理成熟度已符合企业客户预期，同时带来小幅额外开销。


              如果保险产品按纯费用安排设计，它会形成相对高毛利的收入流，因为保险安排和绩效文档主要需要软件基础设施，而不是实体服务交付。
