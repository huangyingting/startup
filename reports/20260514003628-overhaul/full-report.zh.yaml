      - number: '1.5'
        title: 里程碑、竞争位置与反向信号
        blocks:
          - type: paragraph
            body: >
              从 2016 年到 2026 年，Overhaul 的里程碑轨迹显示，公司从解决货物盗窃的初创企业，快速搭建为拥有全球办公室和 Fortune 500 客户的独角兽级平台公司。2022 年以 $1B+ 估值完成的
              Series C 是关键融资事件，得到具备物流经验的战略投资者（Greenbriar、American Securities）和情报界（In-Q-Tel）共同背书，也验证了以安全为核心的差异化。


              公司所处市场竞争激烈。project44（Chicago，累计融资 $704M，2022 年估值 $2.7B）和 FourKites（Chicago，累计融资约 $200M，估值 $1B+，500+
              员工）在更广义的供应链可视化领域资本更充足。Samsara 是上市公司，市值 $10B+，拥有广泛的 IoT 车队追踪能力。虽然 Overhaul
              的货物安全优先定位在制药和高价值货物垂直领域形成了清晰护城河，但资金更雄厚的玩家向相邻安全功能扩张，仍是重大竞争风险。


              研究发现的反向信号包括：（1）July 2022 以来没有公开融资事件，在 2022 年后明显降温的融资环境中，现金跑道和财务健康存在不确定性；（2）公司聚焦 Fortune 500
              并依赖少数大客户，存在客户集中风险；（3）公司扩展至 Brazil、Ireland、UK 和 Mexico
              办公室，带来国际化执行风险；（4）货物盗窃趋势具有事件性和周期性，可能造成需求波动。私营公司身份限制了外部对财务健康、增长牵引指标或管理层稳定性的验证。
