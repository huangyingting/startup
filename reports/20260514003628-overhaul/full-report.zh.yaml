      - number: '3.2'
        title: 直接竞争者：供应链可视化平台
        blocks:
          - type: paragraph
            body: >
              FourKites 将 Intelligent Control Tower 定位为实时追踪、AI “Digital Workers”
              和持续更新的订单、货运、库存、资产与设施数字孪生的组合。平台每天处理超过三百万票货运网络的数据，为 ETA 预测质量形成复利式数据网络效应。FourKites 通过 Golden Kite
              客户奖项计划面向企业货主，并已证明其在 Fortune 2000 账户中的深度渗透。平台公开强调的差异化集中在 AI 驱动的中断预防和运营自动化，而不是货物盗窃或主动实体安全响应。


              project44 将自己定位为 Decision Intelligence Platform，强调自主供应链执行：AI 驱动的承运商预订、改道和采购自动化。凭借超过 5,000 个 API 集成和 1,400+
              车载终端供应商连接，project44 在数据广度和多式联运覆盖上竞争，覆盖公路、海运、港口拥堵、关税影响和 Scope 3 排放追踪。其平台服务于希望降低滞留费、滞箱费和采购摩擦的企业物流团队。公开资料中没有
              project44 平台具备货物盗窃检测或安全运营能力的记录。


              Tive 在 IoT 硬件层面与 Overhaul 竞争，部署 Solo 5G 追踪器，监控温度、冲击、湿度和光照，并在 400+ 网络上提供 95% 全球蜂窝覆盖。Solo 5G
              支持公路、航空、海运和铁路模式，电池续航超过 100 天。Tive 平台面向冷链、制药、高价值货物和易腐货主。但 Tive 是硬件优先公司，没有 Overhaul
              差异化核心中的安全运营中心、承运商筛查或主动盗窃追回能力。
