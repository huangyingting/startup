      - number: '8.5'
        title: 退出准备度与最终尽调
        blocks:
          - type: paragraph
            body: >
              Overhaul 有三条可能退出路径。短期最可能走战略收购：SAP 追逐 FourKites，Microsoft 既是 Overhaul 的具名客户，也是云合作伙伴，说明买方兴趣已经活跃。Oracle SCM
              Cloud 缺少集成的货物盗抢预防能力， 给收购提供了理由。Salesforce 没有任何供应链安全产品，虽是长线选项，但战略动机成立。DHL 和 Maersk 过去都曾内化供应链软件能力，也可能收购
              Overhaul，以加深承运侧可视化产品。IPO 至少需要 $150–200M ARR 和可信盈利路径；按当前融资节奏与 GSOC 成本结构，可能还要 3–5 年。第三条路是 PE 二级买断，结构化倍数对应
              $350–500M 区间。最终尽调问题——ARR 确认、NRR、毛利率、优先股堆叠、 MidCap 授信条款、RiskGPT 准确率基准，以及 GDPR/DSCSA 合规姿态——都是推进前不可让步的门槛。
              打破投资逻辑的触发点集中在三件事：确认降轮（Series D 低于 $500M）、流失两个或更多 top-10 客户， 或在 EU 或 FDA 药品合规领域遭遇重大监管执法行动。
