      - number: '4.3'
        title: 财务表现估计与公开市场可比公司
        blocks:
          - type: paragraph
            body: >
              Overhaul 不披露任何财务指标，ARR、收入增长、毛利率和净利润完全不透明。不过，现有信号允许做三角估计。July 2022 Series C 的 $1B+ 估值意味着，按 2022 年中期常见 SaaS
              收入倍数（10–20x ARR）推算，Overhaul 当时 ARR 大概在 $50–$100 million。Samsara 在 December 2021 IPO 时定价约为追踪 ARR 的
              10–12x，提供了可比倍数锚。考虑到 Series C 后已经运营三年多，并假设公司以符合更广泛 SCV 市场扩张（15–20% CAGR）的 20–30% 年增长率增长，Overhaul 当前 ARR 估计在
              $75–$200 million 区间。


              Samsara 2026 财年结果提供了最清晰的公开基准。Samsara 实现 $1,618.6 million 收入，其中约 98% 为订阅收入，拥有 12,000+ Core Customers（ARR 大于
              $25K），净亏损仅 $9.1 million，接近盈亏平衡。这一规模意味着每个 Core Customer 年收入约 $135,000。Overhaul 聚焦少数更大的高风险垂直行业企业客户，单客户 ACV
              可能更高，但总客户数更小。


              2022 年以来供应链 SaaS 板块估值压缩，背后是利率上升和科技成长倍数放缓。这带来实质风险：如果没有明显更强的 ARR，$1B+ Series C 估值未必能在 2026
              年股权融资或老股交易中重现。这不等于公司陷入困境，但对投资者建模退出价值或二级流动性是相关警示。
