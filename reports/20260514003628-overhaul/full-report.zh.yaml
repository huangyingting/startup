      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              测算 Overhaul 的总可用市场需要在几个并不完美的视角之间三角验证，因为没有单一分析师报告能精确划出 Overhaul 所处的“安全 +
              可视化”细分市场。以下估计来自可访问的公开资料、公司自称数据、竞争对手披露和分析师报告标题。


              最宽口径的可用估计来自全球供应链可视化（SCV）软件市场。Mordor Intelligence、Grand View Research 和 MarketsandMarkets 等多家分析机构发布过估计，认为
              2023 年 SCV 市场约为 $5–10B，到 2028 年复合年增长率为 14–22%。这些报告在付费墙之后，方法论无法通过可访问内容验证，因此具体数字只能作为方向性参考，置信度低。


              更窄的测算口径是实时运输可视化（RTTV）平台细分市场，即 SCV 中专注在途货运追踪的子集。Gartner 发布过 RTTV Magic Quadrant，并认可 FourKites、project44
              和少数其他供应商，说明 Gartner 将其视为一个独立且足够大的市场。Gartner 的实际市场估计在付费墙之后。FourKites 自称在 200 多个国家追踪货运，project44
              声称自己是自主供应链平台——两者都说明该市场足以支撑数亿美元融资和 $1B+ 估值。


              第三种测算方法是从货物盗窃损失自下而上推算。仅美国货物盗窃市场每年就在全球造成估计 $15–35B 损失，美国本土损失估计每年 $1B+。Overhaul
              的安全方案覆盖这一损失池中的盗窃预防和追回子集。即便只把全球损失中的 5–10% 视为可服务部分，也就是主动管理的 SaaS 平台能为货主创造可衡量 ROI 的部分，也意味着安全专项 SAM 为
              $750M–$3.5B。


              冷链监控子市场在制药、食品饮料和生物科技领域进一步增加 $1–3B+ 的相邻 SAM，驱动力包括 FDA 的 DSCSA 处方药可追溯要求。DSCSA 已于 November 2023
              对处方药全面生效，为制药分销商和制造商创造了可服务的合规预算线。


              考虑到 Overhaul 当前规模和竞争位置，其现实 SOM 只是 SAM 的一部分。公司累计融资约 ~$215M+，仍是私营公司；而 project44（累计融资 $704M）和 FourKites（累计融资
              $200M+、2,500+ 承运商集成）拥有明显更多资本和网络效应。在这种市场里，若 Overhaul 能在安全关键型细分市场占据主导位置，实际份额可能落在数千万到一亿出头美元 ARR。
