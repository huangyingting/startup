chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Overhaul 是一家总部位于 Austin, Texas 的供应链可视化与风险管理平台。公司成立于 2016 年，已经成长为独角兽级企业 SaaS 公司，并在 Dublin (Ireland)、London
              (UK)、São Paulo (Brazil) 和 Mexico City 设有全球办公室。公司官网表述的使命是：「用数据驱动的情报保护世界最关键的供应链，让客户始终掌握主动权。」


              Overhaul 的差异化在于把可视化（知道货物在哪里）、风险情报（知道货物面临什么威胁）和主动安全响应合在一起。平台将 SKU 级追踪、AI 驱动的风险评分、合规监控和保险优化整合到单一平台。这让
              Overhaul 与 FourKites 或 project44 等纯可视化提供商明显区分开来；后者主要聚焦货运追踪，不覆盖货物安全和欺诈预防层。


              Overhaul 面向一旦出问题代价很高的货主——运输途中被盗、腐坏、假冒或监管违规都会造成重大财务或声誉损失的公司。目标垂直行业包括制药（DSCSA
              法规要求供应链安全）、汽车、生命科学、消费电子和食品饮料。公司采用 B2B SaaS 模式，销售对象是大型企业的物流和供应链团队，包括 Fortune 500 公司。Microsoft
              是公开提及的客户；其物流负责人称，Overhaul 在第一个运输旺季带来 4x 投资回报。
