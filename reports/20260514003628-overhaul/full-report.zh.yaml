      - number: '2.5'
        title: 采用约束与尽调缺口
        blocks:
          - type: paragraph
            body: >
              尽管结构性顺风强劲，若干采用约束和尽调缺口仍会压低 Overhaul 近期市场机会。


              企业销售周期长度是首要结构性约束。供应链可视化平台需要多方达成一致（IT、物流、财务、法务、安全），并与现有 TMS、ERP 和承运商系统做集成。对大型企业而言，这可能意味着 6–18 个月销售周期。这限制了
              Overhaul 快速转化 2022 年后大量合规买方的能力，尤其是在采购周期往往刚性的制药行业。


              既有 ERP 和 TMS 供应商惯性是第二个约束。SAP、Oracle 和 Microsoft 都在更广泛的 ERP 平台内嵌入供应链可视化功能。已经在 SAP S/4HANA 或 Oracle SCM
              Cloud 上做出大量投资的客户，即便认可 Overhaul 在高后果货物安全上更强，也可能抵触再增加一个 Overhaul 这样的单点解决方案。在既有 ERP
              供应商的可视化模块部分满足买方需求的细分市场里，这给 Overhaul 带来“够用就好”的惯性风险。


              竞争者之间的市场碎片化是第三个约束：Overhaul 必须与 project44（可视化深度，累计融资 $704M）、FourKites（承运商网络广度，每天 2.5M+ 票货运）、Samsara（IoT 硬件
              + 软件套装，市值 $10B+）以及一长尾区域性或垂直型安全供应商区分开来。在碎片化市场中，“安全 + 可视化”的差异化对安全买方很有共鸣，但对主要按承运商覆盖和 ETA 准确度评估的物流买方可能不够。


              数据质量和完整性风险是第四个约束。实时可视化平台的价值取决于摄入数据的质量。承运商和经纪商共享追踪数据的合规率差异很大，可视化覆盖中的缺口会削弱平台价值。Overhaul
              的设备无关策略有助于缓解这一点，但不能消除问题。


              最后，由于数据访问受限，几个重大尽调问题仍未解决：安全关键型 SCV 细分市场的独立市场规模在付费墙之后；Overhaul 的承运商 / 设备集成广度相对竞争对手缺乏独立评估；Overhaul
              没有公开客户数、流失率或 NPS 数据；公司自 July 2022 融资以来的财务健康也无法从公开资料验证。
