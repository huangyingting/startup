      - number: '1.3'
        title: 融资历史、估值与投资方
        blocks:
          - type: paragraph
            body: >
              Overhaul 在 July 2022 完成 $145 million Series C 轮后成为独角兽，该轮由 8VC 领投。8VC
              是一家技术导向的风险投资机构，自称投资于改造物流、国防和企业软件等行业的公司。Series C 轮还包括战略投资者 Greenbriar Equity Group 和 American
              Securities，二者都是在物流和供应链领域积累深厚的私募股权机构。该轮融资把 Overhaul 估值推至 $1 billion 以上。


              在 Series C 之前，Overhaul 已在早期融资中累计获得约 $70M+，参与方包括 In-Q-Tel——CIA 及更广泛美国情报界的非营利战略投资机构。In-Q-Tel 的参与说明 Overhaul
              的供应链安全能力具有战略国家安全价值，尤其是在制药供应链安全和高价值货物监控等与关键基础设施保护优先事项交叉的领域。


              累计融资约为 $215M+。作为私营公司，Overhaul 没有披露 Series C 之前各轮的精确结构、历史估值、ARR，或任何收入与盈利能力信息。2021-2022
              年峰值之后，供应链科技融资环境显著降温；自 2022 年 Series C 以来，Overhaul 未公开宣布新的融资。这给公司的烧钱速度、现金跑道，以及是否打算在潜在 IPO
              前再次融资或寻求流动性事件带来不确定性。
