  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Overhaul 所在市场位于三个相邻软件和服务品类的交叉点：供应链可视化（SCV）、货物安全与盗窃预防、合规驱动的可追溯性（尤其是制药和冷链）。要做市场测算并界定 Overhaul
              的核心买方，需要先厘清这些品类之间的边界，以及哪些客户不属于其可服务市场。


              供应链可视化，也称实时运输可视化（RTTV），是基础层。按照 Oracle 和 FourKites 的定义，SCV 通过收集、分析和展示来自 IoT 传感器、GPS 车载终端、承运商 EDI 数据、ELD 设备和
              AIS / 海事系统的数据，让企业细致掌握从供应商到消费者的产品和服务流动。Oracle
              的定义强调把内部数据（ERP、WMS、TMS）与外部数据（天气、交通、承运商）连接起来，让供应链团队能发现中断、降低库存成本并改善准时交付。


              Overhaul 的差异化在于，它在可视化基础层之上叠加货物安全、欺诈预防和主动风险响应。因此，公司的主要可服务市场不是完整 SCV
              品类，而是安全关键型可视化细分市场：高价值、高风险或受监管货物的货主需要主动干预能力，而不只是被动追踪。这包括受 DSCSA
              要求约束的制药分销商、面对有组织货物盗窃的电子和半导体货主，以及管理温敏货物的冷链运营商。


              不计入 Overhaul TAM 的包括：SAP、Oracle 或 Microsoft 的企业资源规划（ERP）供应链模块，这类模块把可视化作为订单管理副产物；消费包裹追踪平台（FedEx Informed
              Delivery、UPS My Choice）；国内末端配送追踪；纯海运集装箱追踪（由 Maersk、MSC
              和直接承运商平台主导）；以及不覆盖在途安全的仓储管理系统（WMS）。更广泛的实体安防行业（安保人员、锁具、设施监控）也不在范围内，因为 Overhaul 不参与该领域竞争。


              与 Overhaul 市场重叠的相邻领域包括：车队车载终端（Samsara、Geotab），其中 IoT
              传感器数据形成竞争面；货运经纪风险评分，其中欺诈和双重经纪预防是货运匹配平台的一个功能；以及用货物数据动态定价保险的 insurtech 平台，Overhaul 现在已把这项能力打包进保险成本降低方案。
