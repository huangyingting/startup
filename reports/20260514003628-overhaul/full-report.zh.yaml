          high: 600
        - label: 牛市情景（ARR $110–140M × 7–9×）
          low: 770
          mid: 1000
          high: 1260
        - label: 战略收购区间（SAP/Oracle/Microsoft 可比）
          low: 400
          mid: 600
          high: 850
        - label: 清算优先权覆盖底线（总投入资本）
          low: 320
          mid: 355
          high: 380
  - id: FV004
    title: 投资 KPI
    type: kpi
    notes: >
      基于第 1–8 章尽调结论，按七个维度给出可提交 IC 的评分。分数为 1–10，10 最强。市场机会反映已确认 TAM 和增长率。竞争护城河反映产品差异化和切换成本证据。客户证明反映已确认 logo
      和部分留存信号。财务透明度反映公开 ARR、NRR 和利润率数据缺失。风险画像反映第 7 章风险组合。估值入场反映估算当前价值与入场价格纪律之间的关系。证据质量反映研究来源覆盖度和新鲜度。
    claimRefs:
      - CV001
      - CV004
      - CV020
      - CV030
      - CV038
      - CV041
    data:
      items:
        - label: 市场机会（TAM 规模、增长、紧迫性）
          value: 8 / 10
        - label: 竞争护城河（独特性、GSOC 防御性）
          value: 7 / 10
        - label: 客户证明（logo、部分留存信号）
          value: 7 / 10
        - label: 财务透明度（ARR、NRR、利润率披露）
          value: 3 / 10
        - label: 风险画像（监管、竞争、关键人）
          value: 5 / 10
        - label: 估值入场纪律（可比交易支撑的价格区间）
          value: 5 / 10
        - label: 证据质量（来源覆盖度和新鲜度）
          value: 6 / 10
