      - number: '6.2'
        title: 具名客户证据与案例研究
        blocks:
          - type: paragraph
            body: >
              对一家私营 SaaS 公司而言，Overhaul 的客户证据异常具体：它有多项具名 Fortune 500 背书和有文档记录的案例结果。Microsoft 是知名度最高的客户，同时也是技术伙伴：Microsoft
              物流与可持续发展负责人 Erin Duffy 公开表示，公司「在与 Overhaul 合作的第一个航运旺季，看到了对 Overhaul 投资的 4x 回报」。Overhaul 的 RiskGPT 产品构建在
              Microsoft Azure OpenAI Service Studio 之上，使双方关系同时具备商业客户属性、战略技术合作属性，并可通过 Microsoft Supply Chain Center
              获得联合销售收益。


              英国消费电子巨头 Dyson 出现在多份 Overhaul 新闻稿中。Dyson 全球供应链总监 Kok Ee Lian 评论 RiskGPT 时表示：「Overhaul
              在产品套件中持续展现真正创新，RiskGPT 可能改变格局，有潜力通过实时响应和纠正行动显著提升我们管理风险的能力。」Bristol Myers Squibb
              是一家对货运要求高度监管的大型药企，也在多份官方沟通中被列为具名客户。这些药企代表了 Overhaul 的核心论点——高价值、受监管货物，一旦被盗或变质，就会同时带来财务损失和监管暴露。


              大型第三方物流（3PL）提供商 CEVA Logistics 于 March 2023 签约 Overhaul。CEVA 北美安全副总裁 Jim McDonald 表示：「Overhaul
              提供的实时透明度和洞察，对进一步强化我们供应链运营完整性至关重要。」公开的 CEVA 案例研究记录了年初至今监控 11,287 票货运，起点合规率 93.7%，在途合规率 82%。服务高科技和医疗健康品牌的国际
              3PL Arvato Supply Chain Solutions 于 spring 2022 与 Overhaul 合作，Overhaul 在合作早期追回了一整车高价值电子产品。全国性多式联运 3PL
              Jarrett 称 Overhaul 是「世界级产品」。通过 FreightVerify，Overhaul 现在还服务全球前十大汽车制造商中的六家以及加州汽车经销商 Lehmer's GMC。
