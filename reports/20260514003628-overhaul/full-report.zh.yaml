  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与核心能力
        blocks:
          - type: paragraph
            body: >
              Overhaul 将自己描述为面向全球领先品牌的「基于软件的供应链可视化、风险、合规与保险解决方案」。平台有意保持设备无关：它接入任何兼容 IoT
              硬件的遥测数据，而不是要求客户使用专有传感器。公司把这种架构类比为 Big 5 专业服务公司，会为每个客户的物流画像审计并推荐最合适的设备。


              平台栈由五个相互咬合的产品模块构成。Visibility 模块提供道路、航空、铁路和海运等模式下的实时 SKU 级货运位置与状态。Cargo Theft Prevention 模块把路线偏离、未经授权停车检测，与
              AI 支持的介入和主动执法协调结合起来；其专有 "smartlink" 会把位置、货物清单和司机详情实时推送给响应警员。Fraud and Double-Brokering
              模块基于多项风险因素给承运商打实时风险分，并在交货前完成预订前和现场核验。Cold Chain and Compliance 模块监控温度、湿度和其他状态参数，在阈值突破时自动告警，并为药品 GDP 和
              DSCSA 要求生成可审计日志。Insurance 模块把客户连接到基于风险定价的承保人，并可支持货运保险保费最高下降 60%。


              FreightVerify 收购（2023）把平台的单品级库存视图扩展到高后果货物门槛以下的商品——这些材料此前不在 Overhaul
              的核心目标范围内。合并后的平台现在提供公司所称的「对流动货物实现仓库级控制」，覆盖过去无法由 Overhaul 风险处置触达的约 80% 供应链。SensiGuard（February 2022 收购）增加了
              EMEA 的全球安全运营基础设施，扩大 GSOC 的地理覆盖，并在更多地区建立直接执法合作关系。


              截至 January 2025，Overhaul 在全球服务约 350 家客户——包括 Microsoft、Dyson 和 Bristol Myers Squibb——员工 600 人，平台任一时点覆盖约
              $1.4 trillion 货物价值。公司声称损失率约 7%，远低于保险行业通常基准，并通过平台介入避免了 $226 million 货物盗窃损失。
