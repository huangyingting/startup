      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Overhaul 由 Barry Conlon 和 Mark Harvey 于 2016 年共同创立。Barry Conlon 担任 CEO，拥有来自私人安保行业的深厚领域经验，尤其曾在全球最大安保服务公司之一
              GardaWorld 担任高管。这一背景让 Conlon 与公司要解决的货物安全和供应链风险问题高度匹配：他既理解安全威胁版图，也熟悉大型企业保护实物资产时遵循的运营协议。


              公司 About 页面确认，Overhaul 管理团队由致力于保护全球供应链的专家组成；但截至 May 2026，除创始人外，公开可抓取的网站内容没有逐一列出其他高管的详细履历。董事会和顾问结构包含
              8VC、Greenbriar Equity Group、American Securities 等机构投资者代表，这些投资者均参与 Series C 融资。据报道，美国情报界的战略投资机构 In-Q-Tel 也在
              2021-2022 年前后投资了 Overhaul，说明该平台存在与国家安全相关的应用场景。


              关键人物依赖风险集中在 Barry Conlon 身上。他是公司的公开代表，也是安全导向差异化战略的主要设计者。截至 2026 年，公开资料中未发现重大管理层离职或治理争议。作为私营公司，Overhaul
              不公开披露股权结构表、董事会席位分配或投资者权利协议。
