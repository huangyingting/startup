  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              Overhaul 所处的实时运输可视化市场拥挤且资本充足。Project44 和 FourKites 是主要企业级竞争对手；FourKites 正在部署 Loft AI
              自动化代理，用来自动化供应链异常管理，直接挑战 Overhaul 核心产品领域的能力。Shippeo 于 early 2025 从 Toyota 的 Woven Capital 获得
              $30M，用于加速北美扩张，直接瞄准 Overhaul 在汽车供应链中的托运人关系。Tive 于 January 2025 完成 $40M Series C，并已在全球部署超过 2M+ 台 IoT
              设备，在冷链和高价值货运领域竞争。供应链 VC 融资从 2021 年的 $63.7B 收缩到 2024 年的 $7.1B——下降 89%——压低行业估值并限制退出选择。Overhaul 在 August 2025
              的 $105M Series C 未披露估值，与 2022 Series C 的 $1B+ 估值形成显著反差，释放出潜在降价轮信号。Descartes MacroPoint 于 July 2025 推出
              FraudGuard 2.0，表明大型既有玩家正在侵入 Overhaul 的欺诈检测领域。Samsara 虽主要聚焦车队管理，但正在加深承运商侧数据资产，可能支持其横向扩张到货物可视化。
