  evidenceGaps:
    - id: EGU001
      type: private-evidence-only
      severity: material
      description: >
        Customer churn rate, net revenue retention (NRR), and average contract value (ACV) are not
        publicly disclosed. As a private company, Overhaul does not file public financial statements.
        These metrics are essential for assessing customer health and revenue predictability.
      relatedQuestionRefs: [QU017, QU018, QU020]

    - id: EGU002
      type: missing-source
      severity: material
      description: >
        The 3,200% ROI, 60% insurance reduction, and $5M savings claims on the partner program page
        lack named customer citations or independent audit trails. No third-party analyst report
        independently validates these headline metrics. These claims can be verified only through
        direct customer interviews or audited financial disclosures during due diligence.
      relatedQuestionRefs: [QU017]

    - id: EGU003
      type: enumeration-incomplete
      severity: minor
      description: >
        The six automotive OEMs added via FreightVerify are not named individually in public sources.
        Total customer count by vertical is not publicly disclosed. The named customer list in TU001
        is partial — Overhaul has approximately 350 customers but publicly names only about a dozen.
      relatedQuestionRefs: [QU024, QU020]
      relatedTableRefs: [TU001]

    - id: EGU004
      type: missing-source
      severity: minor
      description: >
        No public evidence of customer churn events, contract non-renewals, or major account losses
        for Overhaul. While Overhaul's review ratings are high, the absence of churn data is expected
        for a private company and requires direct diligence to validate retention health.
      relatedQuestionRefs: [QU018]
