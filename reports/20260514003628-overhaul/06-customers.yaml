company:
  name: Overhaul

chapter:
  number: 6
  title: "Customers"
  summary: >
    Overhaul serves approximately 350 customers as of January 2025, concentrated in Fortune 100 and Fortune 500
    enterprises across seven high-consequence cargo verticals: life sciences and pharmaceuticals, consumer
    electronics and technology, logistics service providers (3PLs), automotive OEMs, retail and consumer goods,
    food and beverage, and AI hardware. Named customers confirmed in public sources include Microsoft, Dyson,
    Bristol Myers Squibb, CEVA Logistics, and Arvato Supply Chain Solutions. The FreightVerify acquisition
    (2024) added six of the world's top ten automotive manufacturers to the customer roster and expanded the
    platform to 280,000+ distinct shipping locations with 70,000 monthly active users.

    Customer value claims are anchored by documented case studies and named executive testimonials. Overhaul's
    partnership materials cite a 3,200% program ROI, 60% reduction in cargo insurance rates, and $5 million
    saved in six months through reduced theft and operational optimization. Microsoft's Principal of Logistics
    and Sustainability reported a 4× return on investment in the first peak shipping season. The CEVA Logistics
    case study shows 11,287 shipments monitored with 93.7% origin compliance and 82% in-transit compliance.
    The platform protects approximately $1.4 trillion in cargo value simultaneously at a claimed 99.9%
    shipment protection rate. Third-party review aggregators rate the platform at 4.8/5.0 based on 422
    references; adverse reviews cite inconsistent regional support quality, post-shipment device tracking
    gaps, and implementation timelines of approximately four months.

sections:
  - id: customer-profile
    title: "Customer Profile and Target Market"
    body: |
      Overhaul's target customer is a Fortune 100 or Fortune 500 enterprise shipper whose cargo has
      high monetary value, regulatory sensitivity, or both — making cargo loss or transit failure a
      material financial or reputational event. The company's official industries page identifies eight
      served verticals: life sciences, consumer electronics, manufacturing, retail, food and beverage,
      logistics service providers, AI hardware, and automotive. This vertical focus is not coincidental:
      pharmaceutical and life sciences shipments are subject to Good Distribution Practice (GDP) and
      DSCSA track-and-trace regulations; high-tech electronics are among the most frequently stolen
      cargo categories; automotive supply chains operate on just-in-time delivery with near-zero
      tolerance for delays; and food and beverage requires unbroken cold chain compliance.

      The company describes its ideal customer profile as organizations shipping "high-value,
      time-sensitive, and temperature-controlled" goods who need "warehouse-level control over goods in
      motion." As of January 2025, Overhaul serves approximately 350 customers globally, up from 300+
      customers at the time of the Intelligence as a Service launch in July 2023. The company is
      explicitly "trusted by Fortune 100 companies" according to its Series C press releases. With the
      January 2025 $55 million growth round and the acquisition of FreightVerify — which added six of
      the world's top ten automotive manufacturers — Overhaul is actively expanding its addressable
      customer universe beyond its original core of pharmaceutical and electronics shippers into
      automotive and healthcare facility management. The combined FreightVerify and Overhaul platform
      covers approximately 280,000 distinct shipping locations and engages 70,000 monthly active users
      across industry segments, validating both breadth and depth of enterprise adoption.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008, CU027, CU028, CU029]
    tableRefs: [TU002]
    figureRefs: [FU001]

  - id: named-customers
    title: "Named Customer Evidence and Case Studies"
    body: |
      Overhaul's customer evidence is unusually explicit for a private SaaS company, with multiple named
      Fortune 500 references and documented case study outcomes. Microsoft is the highest-profile customer
      and is also a technology partner: Erin Duffy, Principal of Logistics and Sustainability at Microsoft,
      stated publicly that the company "saw a 4x return on our investment in Overhaul in our first peak
      shipping season with them." Overhaul's RiskGPT product is built on Microsoft Azure OpenAI Service
      Studio, making the relationship both a commercial customer and a strategic technology partnership
      with co-selling benefits via the Microsoft Supply Chain Center.

      Dyson, the British consumer electronics giant, is cited across multiple Overhaul press releases. Kok
      Ee Lian, Dyson's Global Supply Chain Director, commented on RiskGPT: "Overhaul continues to show
      true innovation in its product suite and RiskGPT could be a game-changer with the potential to
      significantly improve our ability to manage risk with real-time response and corrective action."
      Bristol Myers Squibb, a major pharmaceutical company with highly regulated shipment requirements,
      is listed as a named customer across several official communications. These pharmaceutical companies
      represent Overhaul's core thesis — high-value, regulated cargo where theft or spoilage creates both
      financial loss and regulatory exposure.

      CEVA Logistics, a major third-party logistics (3PL) provider, signed with Overhaul in March 2023.
      CEVA's VP of Security for North America, Jim McDonald, said: "The real-time transparency and insight
      Overhaul provides is critical to further strengthening the integrity of our supply chain operations."
      The published CEVA case study documents 11,287 year-to-date shipments monitored, with 93.7% origin
      compliance and 82% in-transit compliance. Arvato Supply Chain Solutions, an international 3PL serving
      high-tech and healthcare brands, partnered with Overhaul in spring 2022 and Overhaul recovered a full
      truckload of high-value electronics early in the engagement. Jarrett, a national multimodal 3PL,
      called Overhaul "a world-class product." With FreightVerify, Overhaul now also serves six of the
      world's top ten automotive manufacturers and Lehmer's GMC, a California auto dealership.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016, CU017, CU018, CU019, CU020, CU021, CU022, CU030, CU031, CU032, CU033, CU034]
    tableRefs: [TU001]
    figureRefs: []

  - id: roi-metrics
    title: "Customer ROI and Value Metrics"
    body: |
      Overhaul publishes a distinctive set of customer ROI claims through its partner program materials
      and insurance program announcements. The flagship claim is 3,200% program ROI — meaning customers
      see $32 returned for every $1 invested. Supporting this headline are specific savings components:
      a 60% reduction in cargo insurance rates, $5 million saved in six months from reduced theft and
      operational optimization, 80% reduction in theft attempts, and a 14-day median time to value. The
      device return rate is claimed at 99%, reflecting efficient IoT hardware lifecycle management.

      Operating metrics substantiate the headline claims. Overhaul reports a 96% recovery rate for full
      truckload (FTL) cargo theft events — compared to typical law enforcement recovery rates well below
      50%. The platform is claimed to achieve an 80% reduction in loss ratio compared to insurance industry
      benchmarks, and $226 million in cargo theft has been prevented through platform interventions. An
      insurance program launched in July 2023 reduced one customer's cargo insurance rate from 15 cents
      per $100 to 7.5 cents per $100 — a 50% reduction — while Overhaul claims it can exceed 50%
      discounts versus standard market pricing. The combined platform now safeguards approximately $1.4
      trillion in cargo trade at any given moment, with a claimed 99.9% shipment protection rate.

      The CEVA Logistics case study provides third-party-corroborated metrics: 11,287 year-to-date
      shipments monitored with 93.7% origin compliance and 82% in-transit compliance rates. FeaturedCustomers
      aggregates 422 customer references for Overhaul with a composite 4.8/5.0 rating. Microsoft's Erin
      Duffy cited a 4× investment return in the first peak shipping season, aligning with the broader
      3,200% ROI claim for programs that include insurance cost savings.
    claimRefs: [CU035, CU036, CU037, CU038, CU039, CU040, CU041, CU042, CU043, CU044, CU045, CU046, CU047, CU048, CU016, CU017]
    tableRefs: [TU003]
    figureRefs: [FU002, FU004]

  - id: acquisition-expansion
    title: "Customer Acquisition and Expansion Strategy"
    body: |
      Overhaul's go-to-market strategy combines direct enterprise sales with a multi-sided partner
      ecosystem and an acquisition-driven customer expansion playbook. The partner program includes five
      categories: supply chain and logistics technology partners, insurtech partners, device manufacturers,
      integration marketplaces, and logistics service providers. Named technology partners include Chain.io
      (data integration), Transimpact (parcel spend analytics), BlueBox Systems (visibility), and Truckstop
      (freight brokerage). Insurance partner Loadsure enables the combined risk-management-plus-insurance
      product, which functions as a powerful customer retention mechanism by linking risk data directly to
      premium savings. The LE Connect law enforcement network acts as both a differentiation tool and a
      sales enabler: when enterprise buyers ask "What do you do at 2 a.m. on Sunday morning?", Overhaul
      can demonstrate verified law enforcement response with real examples, converting risk managers
      directly into champions.

      Acquisitions have been a primary vehicle for accelerating customer count. SensiGuard (February 2022)
      added EMEA offices and security operations expertise, bringing in Brazil, Mexico, and Czech Republic
      customer relationships. FreightVerify (2024) added six of the world's top ten automotive manufacturers
      and 70,000 monthly active users across 280,000 shipping locations — effectively doubling Overhaul's
      addressable customer base by penetrating the automotive and healthcare sectors. The January 2025
      $105 million Series C from Springcoast Partners and Edison Partners explicitly funds additional
      strategic acquisitions, signaling continued inorganic growth as a primary customer acquisition
      channel. The Intelligence as a Service product, launched July 2023, offers standalone intelligence
      subscriptions for companies not yet using the full platform, potentially serving as a freemium
      entry point to land-and-expand with mid-market buyers.
    claimRefs: [CU049, CU050, CU051, CU052, CU053, CU054, CU055, CU056, CU057]
    tableRefs: [TU004]
    figureRefs: [FU003]

  - id: customer-challenges
    title: "Customer Challenges, Satisfaction Gaps, and Competitive Risk"
    body: |
      While aggregate customer satisfaction scores are high, independent review analysis surfaces
      recurring friction points. SelectHub's curated analysis from multiple review platforms identifies
      three structural weaknesses: inconsistent support quality across geographic regions (newer regional
      teams may lack the expertise and responsiveness of core US and Europe operations), post-shipment
      device tracking challenges (customers report difficulty locating IoT devices after delivery
      completion, creating operational overhead and potential lost device fees), and slower-than-expected
      R&D progress on AI and machine learning capabilities (some users feel predictive analytics
      advancement has lagged competitive benchmarks relative to earlier expectations). These are
      compounded by pricing opacity: Overhaul does not publish list prices and requires custom quotes,
      which creates friction in the evaluation cycle, particularly for mid-market buyers who expect
      SaaS-style pricing transparency.

      Implementation complexity is a structural challenge across the supply chain visibility market.
      A GuidePoint study cited in the FreightVerify acquisition announcement found that over half of 100
      surveyed manufacturing, retail, and shipping companies experienced material implementation delays
      and cost overruns when adopting legacy visibility solutions. Overhaul's typical implementation
      runs approximately four months with active collaboration required, which is competitive but still
      a significant time-to-productivity commitment for enterprise buyers. The company's 14-day time-to-value
      claim applies to initial setup, not full enterprise deployment.

      Competitive risk is material: FourKites and project44, better-capitalized rivals, are expanding
      from pure visibility toward risk features that could reduce Overhaul's differentiation in core
      verticals. Samsara's public-company scale and IoT fleet coverage create pressure in the
      transportation-adjacent segment. The lack of a disclosed mobile application is noted by some
      users as a gap for field operations teams who need on-the-go monitoring capabilities.
    claimRefs: [CU058, CU059, CU060, CU061, CU062, CU063, CU064, CU065]
    tableRefs: [TU005]
    figureRefs: [FU005]

