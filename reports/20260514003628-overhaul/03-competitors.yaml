  claims:
    - id: CP001
      statement: >
        Overhaul competes in a fragmented supply chain visibility and cargo security market with
        four distinct competitive tiers: direct cargo security platforms, broad SCV enterprise
        platforms, IoT and sensor hardware vendors, and large incumbent suite providers — no single
        vendor has established dominant share across all dimensions.
      type: observed
      topic: competitive-landscape
      sourceRefs: [SP009, SP013, SP014, SP015]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP002
      statement: >
        Direct supply chain visibility competitors include FourKites (real-time transportation
        visibility), project44 (Decision Intelligence Platform), and Tive (IoT cargo monitoring
        hardware), each with distinct positioning but overlapping customer bases in high-value
        freight logistics.
      type: observed
      topic: competitive-landscape
      sourceRefs: [SP001, SP002, SP004, SP013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP003
      statement: >
        Incumbent adjacent competitors include Descartes MacroPoint (freight visibility within the
        Descartes Systems enterprise suite), Sensitech (cold chain monitoring owned by Carrier
        Global), and Samsara (fleet telematics with cargo monitoring adjacency).
      type: observed
      topic: competitive-landscape
      sourceRefs: [SP003, SP005, SP006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP004
      statement: >
        Overhaul differentiates from all direct SCV peers by combining active cargo recovery
        operations, a dedicated 24/7 security operations center, and a proprietary risk intelligence
        network — features absent from the public platform documentation of FourKites, project44,
        Tive, and Descartes MacroPoint.
      type: observed
      topic: differentiation
      sourceRefs: [SP011, SP012, SP009, SP001, SP002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP007]

    - id: CP005
      statement: >
        The supply chain visibility market lacks a dominant single-vendor solution; enterprise
        customers typically operate multiple point solutions, creating fragmentation that both
        sustains specialist platforms like Overhaul and limits consolidated platform lock-in.
      type: inferred
      topic: market-structure
      sourceRefs: [SP020, SP023, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP017]

    - id: CP006
      statement: >
        Overhaul's unicorn valuation (over $1 billion) established in its July 2022 Series C
        positions it as the best-funded pure-play cargo security platform in its competitive tier,
        ahead of Tive and MacroPoint in funding stage; this valuation was corroborated by Bloomberg
        and the Wall Street Journal.
      type: observed
      topic: funding-competitive-positioning
      sourceRefs: [SP025, SP026, SP017]
      confidence: high
      freshness: historical
      answersQuestionRefs: [QP006]

    - id: CP007
      statement: >
        FourKites tracks over three million daily shipments through its real-time supply chain
        network, representing a significantly larger network scale than Overhaul's publicly
        disclosed shipment footprint.
      type: observed
      topic: competitor-scale
      sourceRefs: [SP001, SP013, SP020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP008]

    - id: CP008
      statement: >
        project44 has assembled a 5,000+ API integration network connecting carriers, port
        terminals, and telematic providers, and connects to over 1,400 telematics integrations,
        enabling broader multi-modal data coverage than Overhaul's more cargo-security-focused
        architecture.
      type: observed
      topic: competitor-capabilities
      sourceRefs: [SP002, SP014]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP020]

    - id: CP009
      statement: >
        FourKites' Intelligent Control Tower platform combines real-time shipment tracking,
        AI-powered Digital Workers, and continuous digital twins for orders, shipments, inventory,
        assets, and facilities; the platform is designed to prevent supply chain disruptions before
        they occur rather than respond to security events.
      type: observed
      topic: competitor-capabilities
      sourceRefs: [SP001, SP007]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP002]

    - id: CP010
      statement: >
        FourKites targets Fortune 2000 shippers and enterprise logistics teams, as evidenced by
        its Golden Kite Awards program; its customer success documentation does not showcase cargo
        theft response or physical security use cases.
      type: observed
      topic: competitor-gtm
      sourceRefs: [SP007, SP013]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP002]

    - id: CP011
      statement: >
        project44's Decision Intelligence platform focuses on automated carrier bookings, reroutes,
        and AI-driven procurement automation, with less emphasis on physical cargo security and
        greater emphasis on operational efficiency, cost reduction, and multi-modal data integration.
      type: observed
      topic: competitor-capabilities
      sourceRefs: [SP002, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003]

    - id: CP012
      statement: >
        project44 differentiates from FourKites on integration breadth (5,000+ API integrations,
        1,400+ telematics connections) and multi-modal scope including ocean port congestion,
        Scope 3 emissions tracking, and tariff impact analysis, signaling a broad enterprise
        intelligence platform strategy.
      type: observed
      topic: competitor-differentiation
      sourceRefs: [SP002, SP014]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003]

    - id: CP013
      statement: >
        Tive deploys IoT Solo 5G trackers with temperature, humidity, shock, and light monitoring
        supporting air, road, ocean, and rail modes with 95% global coverage across 400+
        cellular networks; its hardware-first model creates recurring sensor revenue but lacks a
        security operations center or active cargo recovery capability.
      type: observed
      topic: competitor-capabilities
      sourceRefs: [SP004, SP016]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP014
      statement: >
        Tive's Solo 5G tracker supports battery life exceeding 100 days and offers three
        commercial platform tiers (Essential, Plus, Premium) with both single-use and multi-use
        device options; the hardware subscription model ties revenue to shipment volume rather
        than seat count.
      type: observed
      topic: competitor-pricing
      sourceRefs: [SP004]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP004]

    - id: CP015
      statement: >
        Neither FourKites nor project44 discloses a dedicated cargo theft recovery team or 24/7
        security operations center in their publicly available platform documentation as of May 2026,
        confirming Overhaul's differentiation on active security response.
      type: observed
      topic: differentiation
      sourceRefs: [SP001, SP002, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP007]

    - id: CP016
      statement: >
        FourKites and project44 both invest heavily in AI and machine learning for predictive ETA
        and disruption management, a capability area where the three platforms are converging and
        where Overhaul's public differentiation is less clear than on active security.
      type: inferred
      topic: convergence-risk
      sourceRefs: [SP001, SP002, SP020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP013]

    - id: CP017
      statement: >
        Descartes MacroPoint offers a FraudGuard carrier fraud detection layer that evaluates
        billions of location and event data points to flag carrier fraud — a capability that
        directly overlaps with Overhaul's carrier identity verification and vetting functions;
        MacroPoint is backed by Descartes Systems Group (TSX/NASDAQ: DSGX), a large public company.
      type: observed
      topic: incumbent-capabilities
      sourceRefs: [SP005]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP005, QP018]

    - id: CP018
      statement: >
        Sensitech, a Carrier Global subsidiary (NYSE: CARR) with over 30 years of cold chain
        experience, operates a SensiWatch platform with validated pharmaceutical and food supply
        chain monitoring workflows, competing with Overhaul's life sciences vertical but lacking
        cargo security and theft response capability.
      type: observed
      topic: incumbent-capabilities
      sourceRefs: [SP006]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP021]

    - id: CP019
      statement: >
        Samsara (NYSE: IOT) operates primarily as a fleet telematics and driver safety platform,
        offering GPS fleet tracking, AI dashcam systems, ELD compliance, reefer monitoring, and
        trailer tracking; its cargo monitoring functionality is adjacent to Overhaul's market but
        targets fleet operators rather than cargo security teams.
      type: observed
      topic: adjacent-competitors
      sourceRefs: [SP003, SP015]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP010]

    - id: CP020
      statement: >
        Samsara's 4.5-star G2 rating from 3,200+ reviews and #1 ranked driver application status
        reflect dominant market position in fleet management, creating brand equity and distribution
        footprint that could support expansion into adjacent cargo security capabilities.
      type: observed
      topic: adjacent-competitors
      sourceRefs: [SP003]
      confidence: medium
      freshness: current

    - id: CP021
      statement: >
        Descartes Systems Group's comprehensive logistics suite — including customs compliance,
        freight brokerage, WMS, ocean visibility, and dock scheduling — positions MacroPoint as a
        bundled module within a broader enterprise logistics platform, enabling incumbency-driven
        distribution advantages over standalone cargo security vendors.
      type: inferred
      topic: incumbent-bundling
      sourceRefs: [SP005]
