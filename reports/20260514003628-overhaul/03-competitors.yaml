  evidenceGaps:
    - id: EGP001
      type: private-evidence-only
      severity: material
      title: "Competitor funding and ARR data undisclosed — profile table relies on estimates"
      description: >
        FourKites, project44, and Tive are all private companies that do not disclose revenue,
        ARR, or employee count in publicly available sources. Funding estimates in TP001 are
        derived from press releases and Crunchbase data, which may be incomplete. The absence
        of verified scale data limits the reliability of comparative size assessments.
      relatedQuestionRefs: [QP006, QP020, QP025]
      relatedTableRefs: [TP001]
      diligenceAsk: >
        Request management presentations, Pitchbook data room access, or reference checks
        with FourKites and project44 investors to obtain verified ARR, headcount, and customer
        count for competitive positioning benchmarking.

    - id: EGP002
      type: private-evidence-only
      severity: minor
      title: "Competitor pricing structures are not publicly disclosed"
      description: >
        All SCV and cargo security vendors in this chapter use enterprise-negotiated pricing
        with no public rate cards or per-shipment pricing. TP003 relies on inferred pricing
        structures from product packaging language; actual contract terms and discounting
        practices are unknown without diligence access.
      relatedQuestionRefs: [QP011]
      relatedTableRefs: [TP003]
      diligenceAsk: >
        Obtain customer reference interviews or procurement teams familiar with vendor pricing
        to validate Overhaul's pricing premium or discount structure relative to FourKites,
        project44, and Samsara for equivalent cargo monitoring scope.

    - id: EGP003
      type: missing-source
      severity: minor
      title: "Adverse feedback and Overhaul platform limitation evidence is absent from public record"
      description: >
        No publicly available analyst reviews, customer testimonials, or press articles were
        identified that specifically criticize Overhaul's platform scalability, coverage gaps,
        or competitive limitations as of May 2026. This absence may reflect the company's
        private status and limited press coverage rather than an absence of legitimate concerns.
      relatedQuestionRefs: [QP022, QP028]
      diligenceAsk: >
        Commission reference customer interviews with current and former Overhaul customers
        to surface platform limitations, coverage gaps, churn reasons, and competitive
        displacement instances not visible in public documentation.

