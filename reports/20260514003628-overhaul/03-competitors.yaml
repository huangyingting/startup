artifact: competitors
slug: overhaul
runDate: "2026-05-14"
company:
  name: Overhaul

chapter:
  number: 3
  title: "Competitors"
  summary: >
    Overhaul competes in a fragmented supply chain visibility and cargo security market with four
    distinct competitive tiers: (1) direct SCV-plus-security platforms (FourKites, project44, Tive),
    (2) adjacent fleet and IoT incumbents (Samsara, Descartes MacroPoint), (3) cold chain specialists
    (Sensitech), and (4) status-quo substitutes (manual check-ins, ELD telematics, cargo insurance).
    Overhaul's core differentiation — a 24/7 security operations center, active cargo recovery, and
    a proprietary cargo risk intelligence network — is absent from all pure-software SCV competitors.
    FourKites and project44 lead on network scale and API integrations; Samsara holds a capital
    advantage as a public company. Key moat risks include SCV feature parity convergence, Samsara
    platform expansion, and IoT hardware commoditization.

sections:
  - id: competitive-landscape
    title: "Competitive Landscape and Market Structure"
    body: |
      Overhaul competes in a fragmented supply chain technology market that has historically been
      divided between pure transportation visibility platforms and dedicated cargo security services.
      No single vendor has established dominant market share across both dimensions simultaneously.
      The competitive set can be organized into four tiers based on product emphasis and target
      customer: direct supply chain visibility and cargo security platforms, incumbent logistics
      technology suite providers with adjacent modules, cold-chain and condition monitoring
      specialists, and status-quo alternatives including manual tracking and cargo insurance.

      FourKites and project44 are the two largest venture-backed pure-play SCV platforms by
      disclosed network scale. FourKites tracks over three million daily shipments through its
      Intelligent Control Tower platform and targets Fortune 2000 enterprise shippers. project44
      has assembled over 5,000 API integrations connecting carriers, terminals, and telematics
      providers into a Decision Intelligence Platform. Both companies emphasize AI-driven predictive
      analytics and operational automation, and neither publicly discloses cargo theft detection or
      physical security operations center capabilities as a product feature.

      Overhaul's unicorn valuation of over $1 billion established in its July 2022 Series C
      positions it as the best-funded pure-play cargo security platform. Its closest hardware-based
      peer, Tive, offers IoT condition monitoring sensors but lacks the security operations center
      and active recovery infrastructure. Incumbent adjacent competitors — Samsara (NYSE: IOT),
      Descartes MacroPoint, and Sensitech (Carrier Global) — compete with Overhaul on data
      collection and specific vertical coverage but are not primary cargo security vendors.
    claimRefs: [CP001, CP002, CP003, CP004, CP005, CP006, CP007, CP008]
    tableRefs: [TP001]
    figureRefs: [FP001]

  - id: direct-competitors
    title: "Direct Competitors: Supply Chain Visibility Platforms"
    body: |
      FourKites markets its Intelligent Control Tower as a combination of real-time tracking, AI
      "Digital Workers," and continuously updated digital twins for orders, shipments, inventory,
      assets, and facilities. The platform processes data across a network exceeding three million
      daily shipments, which creates compounding data network effects for ETA prediction quality.
      FourKites targets enterprise shippers via its Golden Kite customer awards program and has
      demonstrated deep penetration with Fortune 2000 accounts. The platform's published
      differentiation centers on AI-driven disruption prevention and operational automation, not
      cargo theft or active physical security response.

      project44 positions as a Decision Intelligence Platform, emphasizing autonomous supply chain
      execution: AI-driven carrier bookings, reroutes, and procurement automation. With over 5,000
      API integrations and 1,400+ telematic provider connections, project44 competes on data breadth
      and multi-modal coverage — spanning road, ocean, port congestion, tariff impact, and Scope 3
      emissions tracking. Its platform serves enterprise logistics teams seeking to reduce detention,
      demurrage, and procurement friction. There is no public documentation of cargo theft detection
      or security operations capabilities in project44's platform.

      Tive competes with Overhaul at the IoT hardware level, deploying Solo 5G trackers that monitor
      temperature, shock, humidity, and light with 95% global cellular coverage across 400+ networks.
      The Solo 5G supports road, air, ocean, and rail modes with a battery life exceeding 100 days.
      Tive's platform targets cold chain, pharmaceutical, high-value goods, and perishable shippers.
      However, Tive is a hardware-first company without the security operations center, carrier
      vetting, or active theft recovery capabilities that form the core of Overhaul's differentiation.
    claimRefs: [CP009, CP010, CP011, CP012, CP013, CP014, CP015, CP016]
    tableRefs: [TP002]
    figureRefs: [FP002]

  - id: incumbents-adjacents
    title: "Incumbents and Adjacent Players"
    body: |
      Samsara (NYSE: IOT) is the largest adjacent competitor by market capitalization and revenue,
      operating primarily as a fleet telematics and driver safety platform. Samsara offers GPS fleet
      tracking, AI dashcam systems, ELD compliance, reefer monitoring, trailer tracking, and asset
      management through its Connected Operations Cloud. Its 4.5-star G2 rating from 3,200+
      verified reviews and #1 ranked driver application status reflect dominant fleet management
      market position. Samsara's cargo monitoring (via reefer and asset tracking) is adjacent to
      Overhaul's market, but its primary buyer is fleet operators focused on compliance and driver
      safety rather than cargo security and intelligence. Its public company status and scale
      provide a capital advantage for potential platform expansion into active security.

      Descartes MacroPoint, part of Descartes Systems Group (TSX/NASDAQ: DSG), offers a freight
      visibility platform with FraudGuard carrier fraud detection that directly overlaps with
      Overhaul's identity verification capabilities. MacroPoint is embedded within Descartes'
      broader logistics suite including customs compliance, WMS, and ocean visibility modules,
      positioning it as a bundled module for large enterprise logistics platforms rather than a
      standalone cargo security solution. This integration model is both a competitive advantage
      (broad distribution) and a limitation (less specialized than Overhaul for high-consequence
      cargo verticals).

      Sensitech, a subsidiary of Carrier Global (NYSE: CARR), brings over 30 years of cold chain
      monitoring history and operates a SensiWatch platform with validated pharmaceutical and food
      supply chain monitoring workflows. Sensitech competes with Overhaul's life sciences and food
      verticals but does not address general cargo theft, ground transportation security, or active
      recovery operations. Legacy ERP and TMS vendors including SAP, Oracle Supply Chain Management,
      and Manhattan Associates offer supply chain visibility modules as part of integrated enterprise
      suites, typically relying on carrier API integrations rather than IoT hardware, creating a
      "good enough" tracking baseline that slows adoption of specialized platforms.
    claimRefs: [CP017, CP018, CP019, CP020, CP021, CP022, CP023, CP024]
    tableRefs: [TP003]
    figureRefs: []

  - id: substitutes-status-quo
    title: "Substitutes and Status-Quo Alternatives"
    body: |
      The most common status-quo alternative to a dedicated cargo security platform is a combination
      of manual driver check-in calls (typically every two to four hours) and shipper-owned GPS
      tracking through embedded ELD or fleet telematics systems already required for HOS compliance.
      This approach provides location data but lacks condition monitoring, risk intelligence, theft
      detection, or active recovery capability. Shippers in price-sensitive segments — particularly
      LTL, domestic short-haul, and small-to-mid-size businesses — frequently defer to this model
      as a near-zero incremental cost alternative.

      Cargo insurance represents a meaningful financial substitute for shippers willing to absorb
      theft losses as an operating cost rather than prevent them through active monitoring. Insurance
      pays after a loss event, not before or during, and does not provide real-time alerts, recovery
      coordination, or compliance documentation. DC Velocity reported in 2024 that rising insurance
      costs from Middle East disruptions were straining supply chain risk budgets, a dynamic that
      strengthens the economic case for proactive monitoring platforms over reactive insurance-only
      strategies. Cargo theft data from GlobeNewswire (January 2023) reported a 57% year-over-year
      increase in U.S. cargo theft incidents in 2022, further validating the shift toward active
      prevention.

      Internal build remains a theoretical alternative for large logistics service providers and
      carriers with captive IT teams, but the capital expenditure required — sensor hardware
      procurement, SOC staffing, carrier intelligence network development, and maintenance — creates
      substantial barriers that favor third-party platform adoption. The operational complexity
      of maintaining a 24/7 recovery capability is particularly difficult to replicate in-house
      without domain expertise equivalent to Overhaul's security-focused founding team.
    claimRefs: [CP025, CP026, CP027, CP028, CP029]
    tableRefs: []
    figureRefs: []

  - id: differentiation-moat
    title: "Differentiation, Moat Durability, and Displacement Risk"
    body: |
      Overhaul's primary defensible advantage is a proprietary cargo risk intelligence network
      accumulated through years of active incident data — theft events, recovery patterns, carrier
      reputation scores, and fraud typologies — that cannot be reconstructed from raw GPS tracking
      data alone. This is reinforced by a 24/7 security operations center that provides a human
      response layer competitors would need significant time and investment to replicate. Documented
      recovery case studies ranging from $200,000 to $1.75 million per incident provide verifiable
      ROI evidence that pure-software competitors cannot produce from their product suites.

      Overhaul's regulatory and compliance certifications in pharmaceutical, food, and government
      logistics create switching costs for regulated-industry customers, as these certifications
      require time-intensive validation and audit processes to transfer to new vendors. The company's
      investor network — 8VC, American Securities, and In-Q-Tel — provides distribution advantages
      in government logistics, defense freight, and national security-sensitive supply chains that
      venture-backed software competitors cannot readily replicate.

      The primary displacement risks are convergence and platform expansion. FourKites and project44
      are both investing in AI-driven capabilities that may narrow the feature gap on visibility
      analytics over time. Samsara's public company capital advantage positions it as a potential
      acquirer or organic expander into active cargo security. Descartes MacroPoint's FraudGuard
      feature already encroaches on Overhaul's carrier vetting territory. IoT hardware
      commoditization — driven by falling sensor costs and increasing availability of 5G trackers
      from device manufacturers — could erode per-unit hardware economics and reduce Overhaul's
      sensor differentiation over the medium term.
    claimRefs: [CP030, CP031, CP032, CP033, CP034, CP035, CP036, CP037, CP038, CP039, CP040]
    tableRefs: [TP004]
    figureRefs: [FP003]

