  evidenceGaps:
  - description: >-
      No public SOC 2 Type II, ISO 27001, or equivalent third-party cybersecurity certification has
      been found for Overhaul's platform as of Q2 2026. Enterprise logistics SaaS platforms in
      regulated verticals routinely publish annual security attestations. The absence prevents
      assessment of Overhaul's actual security controls, incident response processes, and vendor
      assessment programme. This is a material gap requiring direct management disclosure.
    severity: material
    relatedQuestionRefs: [QR025]

  - description: >-
      Overhaul has not publicly confirmed DSCSA compliance certification for its pharmaceutical
      cold-chain monitoring modules. The November 27, 2026 enforcement deadline creates a time-
      sensitive diligence gap: if Overhaul's platform cannot produce DSCSA-compliant EPCIS event
      data, pharma customers risk losing their own compliance standing and would have cause to
      terminate contracts. Direct management confirmation and FDA filing evidence are required.
    severity: material
    relatedQuestionRefs: [QR011]

  - description: >-
      No documentation has been found confirming a board-approved leadership succession plan for CEO
      Barry Conlon. The absence of a publicly disclosed succession plan constitutes a governance gap
      for a founder-centric company with a law-enforcement-relationship-driven value proposition.
      Board-level confirmation is required during diligence.
    severity: moderate
    relatedQuestionRefs: [QR018]

  - description: >-
      No public information confirms which international markets Overhaul may be contractually
      restricted from serving due to the In-Q-Tel intelligence-community investment relationship.
      This gap is directly relevant for EMEA and APAC expansion plans and requires explicit legal
      disclosure from Overhaul management and in-house counsel during the due diligence process.
    severity: moderate
    relatedQuestionRefs: [QR031]
