company:
  name: Overhaul
chapter:
  number: 7
  title: Risks
  summary: >-
    Overhaul faces five converging risk clusters. First, competitive and market-positioning risk is
    acute: FourKites and project44 dominate the RTVP market by ratings and review volume, while
    Oracle, SAP, and Blue Yonder are bundling supply chain visibility into ERP suites. S&P Global
    analysts predict freight visibility platforms lacking scale will exit via attrition. Second, the
    cargo theft market is morphing: Q1 2026 recorded 767 incidents and $131.58 million in losses,
    but impersonation fraud now constitutes the dominant attack vector, straining physical-security
    products designed for smash-and-grab scenarios. Third, cybersecurity threats targeting IoT-heavy
    platforms have quadrupled over five years; the EU Cyber Resilience Act effective September 2026
    adds compliance obligations to Overhaul's device layer, and no public SOC 2 or ISO 27001
    disclosure has been found. Fourth, regulatory compliance risk spans DSCSA full pharmaceutical
    enforcement November 2026, GDPR Article 28 supply chain processor obligations, and the EU AI
    Act's explainability requirements for high-risk AI, all relevant to RiskGPT in regulated
    verticals. Fifth, financial and funding risk arises from a 2022 unicorn valuation established at
    peak SaaS multiples versus a May 2026 public-market-comparable of approximately 3.8x EV/NTM; at
    $136.5 million in 2025 revenue, a base-case private multiple of approximately 4.5x implies an
    equity value of approximately $615 million, well below the $1 billion threshold. Thesis-break
    triggers include sustained NRR below 105 percent, a confirmed DSCSA compliance gap in pharma
    monitoring, departure of founder-CEO Barry Conlon without a prepared successor, or two
    consecutive quarters of net customer churn. Open diligence paths include third-party
    cybersecurity certification, DSCSA compliance evidence, and confirmation of In-Q-Tel-related
    international operating restrictions.

sections:
- id: competitive-risks
  title: Competitive and Market-Positioning Risks
  body: >-
    Overhaul competes against FourKites and project44, the two dominant players in the real-time
    transportation visibility platform category, as well as ERP-native supply chain modules from
    Oracle, SAP, and Blue Yonder. Gartner Peer Insights 2026 data show project44 scoring 4.7 out
    of 5 across 557 verified reviews versus FourKites at 4.5 out of 5 across 671 reviews, both
    commanding significantly greater review volume than Overhaul, signalling that enterprise
    procurement is consolidating toward larger platforms. S&P Global Market Intelligence analysts
    argue that the freight visibility market's low M&A activity is a structural hazard: without
    platform roll-ups, weaker brands face attrition as enterprise budgets tighten. SAP's 2026
    supply chain resilience blueprint positions its platform as an end-to-end solution capable of
    replacing point-solution monitoring, while Oracle Fusion Cloud is advancing AI copilots for
    supply chain exception management. Samsara holds approximately 4.63 percent of the IoT platform
    market and is expanding fleet telematics data capabilities that overlap with Overhaul's GPS and
    cargo-tracking offering. The supply chain visibility software market is growing at roughly 14.4
    percent CAGR and is projected to reach $6.76 billion by 2026, but the majority of growth flows
    to entrenched platforms with larger sales teams and brand recognition. Overhaul's cargo-security
    specialization through RiskGPT, GSOC, and law-enforcement partnerships constitutes its
    principal differentiation moat, but this advantage narrows as larger competitors add AI-powered
    risk analytics modules to their broader suites. Without a clear path to expanding carrier
    network density or securing strategic distribution partnerships with ERP vendors, Overhaul risks
    being positioned as a niche premium add-on rather than a platform of record for enterprise
    supply chain risk management.
  claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006]
  figureRefs: [FR001]

- id: cargo-theft-demand-risks
  title: Cargo Theft Market and Demand-Evolution Risks
  body: >-
    Overhaul's commercial thesis rests on persistent, high-value cargo theft demand that justifies
    premium real-time security monitoring. Q1 2026 data confirm that the absolute loss environment
    remains intense at 767 incidents and $131.58 million in losses in North America, but the
    composition of theft is shifting in ways that challenge platform assumptions. Traditional smash-
    and-grab incidents declined while organized crime accelerated impersonation fraud: thieves
    exploit load board phishing to steal carrier credentials and present fictitious documentation at
    shippers' docks, diverting entire truckloads without physical confrontation. The U.S. Customs
    and Border Protection issued a surge alert in April 2026 specifically citing the rise of document
    fraud and impersonation tactics. California recorded 277 incidents in Q1 2026 and New Jersey saw
    a 119 percent year-over-year increase, demonstrating geographic concentration in high-logistics-
    density corridors. Personal care and beauty products experienced a 178 percent theft increase,
    while electronics and automotive parts remained perennial high-value targets. Logistics identity
    fraud attempts surged 200 percent between 2023 and 2024 and continued growing into 2025,
    reflecting a structural shift toward digital rather than physical interdiction. This evolution
    creates a bifurcated demand dynamic for Overhaul: the persistent loss environment validates
    enterprise willingness to pay for monitoring, but impersonation fraud requires different
    interventions such as identity verification, carrier credentialing, and digital chain-of-custody
    that are outside the core hardware-plus-analytics stack. Overhaul must expand its product to
    address digital freight fraud credibly or risk losing relevance as theft evolves. WTW's 2026
    guide identifies eight emerging cargo theft risk categories, several of which require
    platform-level responses beyond traditional GPS monitoring.
  claimRefs: [CR007, CR008, CR009, CR010, CR011, CR012, CR013, CR046, CR047]
  figureRefs: [FR002]

- id: cybersecurity-technology-risks
  title: Cybersecurity and Technology Risks
  body: >-
    Overhaul operates a data-intensive platform integrating IoT tracking devices, GPS telematics,
    carrier data feeds, temperature sensors, and AI analytics across shipments covering over $1.4
    trillion in cargo annually. This architecture creates a material cybersecurity attack surface
    at three layers: IoT device integrity, platform data pipeline security, and third-party vendor
    access management. Global IoT device count is projected to surpass 25 billion by end of 2026;
    IoT security incidents now average $330,000 per event, with breaches involving connected
    industrial or medical IoT devices exceeding $10 million in total economic impact. SecurityScorecard
    found that over 78 percent of organizations monitor fewer than half of their vendor ecosystem's
    endpoints, creating systemic third-party risk propagation. Supply chain and third-party cyber
    breaches have quadrupled over five years; Group-IB identifies supply chain attacks as the
    fastest-growing threat category for 2026. AI-powered threat actors now automate vulnerability
    scanning across thousands of vendor API connections simultaneously, compressing the detection-to-
    exploitation window. IBM's 2026 cybersecurity analysis highlights identity-system exploitation,
    vendor access compromises, and API integration weaknesses as the dominant attack vectors against
    logistics platforms. For Overhaul, a breach of the RiskGPT training data pipeline could
    contaminate risk intelligence outputs, creating liability exposure with pharmaceutical and high-
    value cargo customers who rely on the AI recommendations for coverage decisions. The EU Cyber
    Resilience Act, effective September 2026, imposes mandatory security and transparency obligations
    on hardware and software products with digital elements sold into European markets, directly
    applicable to Overhaul's IoT device fleet. No public SOC 2 Type II or ISO 27001 certification
    disclosure has been found for the Overhaul platform as of Q2 2026.
  claimRefs: [CR015, CR016, CR017, CR018, CR019, CR020, CR044, CR045]
  tableRefs: [TR002]

- id: regulatory-compliance-risks
  title: Regulatory and Compliance Risks
  body: >-
    Overhaul's pharmaceutical, food, and cross-border logistics customers operate under an
    increasingly demanding regulatory overlay. The Drug Supply Chain Security Act requires full
    electronic interoperable traceability at the package level using GS1 serialization standards
    for all pharmaceutical dispensers, with full enforcement for the final cohort of smaller
    dispensers required by November 27, 2026. DSCSA compliance is not merely a customer obligation;
    it directly affects whether Overhaul's cold-chain monitoring can be integrated into a certified
    traceability workflow. If Overhaul's platform cannot produce or consume DSCSA-compliant EPCIS
    data, pharma customers risk losing their own compliance standing, creating a strong reason to
    switch to a certified competitor. GDPR Article 28 requires that supply chain data controllers
    impose comprehensive processing restrictions on vendors handling EU personal data, including
    logistics tracking data generated by drivers and warehouse workers. Overhaul's carrier and
    shipper integrations across European logistics networks create ongoing GDPR exposure, including
    standard contractual clauses for all cross-border data transfers and regular data protection
    impact assessments. The EU AI Act, effective from August 2026 for high-risk AI systems, imposes
    explainability, data minimization, and human-oversight requirements on automated decision systems
    used in regulated supply chains, requirements directly applicable to RiskGPT if it generates
    risk scores informing insurance or compliance decisions. Brazil's LGPD, India's DPDP Act, and
    China's PIPL create a multi-jurisdictional data-localization burden for EMEA and APAC expansion.
    The In-Q-Tel investment relationship may create CFIUS-adjacent disclosure and operating
    restrictions in certain international markets, a risk that has not been publicly addressed by
    Overhaul management.
  claimRefs: [CR014, CR021, CR022, CR023, CR024, CR025, CR026]
  tableRefs: [TR001]

- id: operational-execution-risks
  title: Operational and Execution Risks
  body: >-
    Overhaul's operational risks cluster around three execution imperatives that are simultaneously
    unfolding: integrating the FreightVerify acquisition, scaling the Global Security Operations
    Center model internationally, and reducing founder-CEO concentration risk. The 2025 FreightVerify
    acquisition, targeted to add item-level automotive and fleet tracking capabilities, creates
    integration risks across technology architecture harmonization, carrier network overlap
    reconciliation, customer data migration, and personnel retention. FreightVerify's automotive
    logistics customer base carries different compliance and performance requirements than Overhaul's
    pharmaceutical and high-value goods focus, creating potential product-roadmap conflict during the
    integration window. Integration failures that cause service degradation on either platform could
    trigger simultaneous churn across both customer bases, compounding revenue impact. GSOC operations
    require 24/7 globally distributed security professionals capable of managing complex cargo
    recovery and real-time risk escalation across time zones; as Overhaul expands into EMEA and APAC
    markets, the staffing cost and operational complexity of maintaining this human-intensive
    capability rises non-linearly. BSI's 2026 supply chain risks report highlights the convergence
    of geopolitical instability, climate disruptions, and cyber risks in global logistics networks,
    precisely the environment where GSOC under-staffing creates acute reputational and contractual
    exposure. Key-person concentration on Barry Conlon, the founder whose law-enforcement
    relationships, regulatory credibility, and domain expertise shaped the company's value
    proposition, represents a material succession risk. No documented leadership succession plan
    has been publicly disclosed. Forbes' 2026 analysis confirms that founder dependency amplifies
    a startup's vulnerability to operational crises during periods of market volatility and
    competitive pressure.
  claimRefs: [CR033, CR034, CR035, CR036, CR037, CR038, CR039]
  tableRefs: [TR003, TR004]
  figureRefs: [FR003]

- id: financial-funding-risks
  title: Financial and Funding Risks
  body: >-
    Overhaul completed a $105 million Series C in August 2025 led by Springcoast Partners with
    participation from Edison Partners and Morgan Stanley Investment Management's 1GT climate fund.
    Reported 2025 revenue of $136.5 million implies that the company operates at significant scale,
    but the valuation multiple at which continued growth can be financed has compressed sharply since
    the 2022 unicorn thesis was established. As of May 2026, the public-market EV/NTM revenue
    multiple for supply chain management software peers stands at approximately 3.8 times, down from
    2021 to 2022 peaks exceeding 15 times. At $136.5 million in revenue, a 3.8 times multiple
    implies an equity value of approximately $518 million, well below the $1 billion unicorn mark.
    Private market premiums for venture-backed logistics SaaS with AI integration trade at a median
    of approximately 4.5 times ARR, implying a base-case valuation of approximately $615 million,
    while AI-native platforms commanding a 2 to 3 times premium could reach $900 million to $1.3
    billion in an optimistic scenario. Reaching a sustained $1 billion-plus valuation requires
    demonstrating net revenue retention above 120 percent, accelerating ARR growth, and closing
    high-profile EMEA or APAC enterprise contracts that validate the global platform thesis. Supply
    chain tech VC funding surged to $3 billion in Q3 2025, up 26 percent quarter-over-quarter,
    providing a favorable macro backdrop for a future financing, but KPMG warns that capital
    increasingly favors AI-native and operationally profitable platforms over risk-monitoring
    specialists. PwC's 2026 transportation and logistics deals outlook identifies M&A consolidation
    as the primary theme, positioning Overhaul as a potential acquiree at returns that may fall
    below the unicorn threshold. Customer concentration in pharmaceutical and high-value goods
    verticals creates ARR fragility that could compress valuation at the next financing round if
    a top account churns.
  claimRefs: [CR027, CR028, CR029, CR030, CR031, CR032, CR040, CR041, CR042]
  tableRefs: [TR005]

callouts:
- calloutType: risk
  title: ERP bundling is the highest-probability competitive displacement vector
  body: >-
    ERP platform bundling is the highest-probability competitive displacement vector. SAP, Oracle,
    and Blue Yonder each have live supply chain visibility and risk management modules in their 2026
    product portfolios. Any enterprise that has standardised on one of these platforms faces a
    make-versus-buy decision structurally weighted against a point-solution add-on regardless of
    product quality. Diligence should confirm what percentage of Overhaul's ARR comes from customers
    whose primary ERP is SAP or Oracle, and whether those contracts are due for renewal within 18
    months.
  claimRefs: [CR002, CR003, CR004, CR005]
- calloutType: insight
  title: Cargo theft fraud-vector shift creates product expansion imperative
  body: >-
    The cargo theft fraud-vector shift from physical interdiction to impersonation and digital
    identity fraud is a double-edged dynamic for Overhaul. It validates that cargo security is a
    growing and evolving problem space, a tailwind for premium monitoring budgets, but it challenges
    Overhaul to extend its product into carrier credentialing, digital chain-of-custody, and identity
    verification. Competitors building these capabilities from an identity-first platform such as
    Descartes or FourKites with carrier credentialing features may capture the impersonation-fraud
    segment faster than Overhaul can adapt its hardware-centric monitoring stack.
  claimRefs: [CR007, CR008, CR009, CR013]
tables:
- id: TR001
  title: "Regulatory / legal risk register"
  enumeration: true
  enumerationScope:
    coverage: partial
    basis: >-
      Covers regulations directly applicable to Overhaul's US pharmaceutical cold-chain monitoring,
      EU cross-border logistics data processing, EU AI-driven risk scoring, and government-investment
      disclosure obligations identified through public regulatory filings, legal databases, and
      industry compliance publications as of Q2 2026. Does not cover all applicable export control,
      customs, or sector-specific regulations in every jurisdiction where Overhaul operates.
  notes: >-
    Likelihood and severity rated by analyst judgment based on enforcement calendar, customer
    exposure, and regulatory agency activity as of Q2 2026. Diligence paths represent open questions
    requiring direct management response.
  columns:
  - Rule or Issue
  - Jurisdiction and Scope
  - Current Status
  - Likelihood
  - Severity
  - Mitigation
  - Diligence Path
  rows:
  - - DSCSA electronic package-level traceability
    - USA pharmaceutical supply chain for all dispensers
    - Full enforcement required November 27, 2026 for remaining smaller dispensers
    - Medium
    - High — customer compliance loss if Overhaul platform not DSCSA-certified
    - Pharma-certified monitoring; EPCIS data integration; DSCSA compliance documentation
    - Request FDA filing evidence and interoperable traceability certification for pharma monitoring modules
  - - GDPR Article 28 supply chain data-processor obligations
    - European Union and any Overhaul customer processing EU personal data
    - In force; enforcement actions rising with 2025 DPC and CNIL fines averaging EUR 12 million
    - High
    - High — cross-border transfer liability and third-party processor chain risk
    - Data processing agreements with carriers; EU-based legal counsel; standard contractual clauses
    - Request executed DPAs, SCCs, and GDPR records of processing for all EU carrier integrations
  - - EU AI Act high-risk AI application requirements
    - European Union AI systems used in regulated supply chain decisions
    - Mandatory compliance for high-risk AI applications from August 2026
    - Medium
    - Medium-High — RiskGPT classified high-risk if it drives insurance or compliance decisions
    - EU AI Act risk assessment for RiskGPT; explainability and human-oversight documentation
    - Request EU AI Act compliance gap analysis, model risk documentation, and conformity assessment
  - - In-Q-Tel investment CFIUS-adjacent international operating restrictions
    - USA and international markets sensitive to US intelligence-community investment
    - Ongoing — creates bilateral trade sensitivities in China, Russia, and certain EU jurisdictions
    - Low
    - Medium — potential loss of international contracts in privacy-sensitive markets
    - US government relations counsel; documented legal review of overseas operating restrictions
    - Confirm which international markets are contractually restricted due to In-Q-Tel investment
  - - Brazil LGPD and India DPDP Act data-localisation obligations
    - Brazil and India applicable in EMEA and APAC expansion markets
    - In force; India DPDP effective September 2025; Brazil LGPD enforcement active
    - Medium
    - Medium — EMEA and APAC expansion blocked or restricted without local data infrastructure
    - Legal entity and data residency strategy per jurisdiction; local counsel engagement
    - Confirm data-residency strategy and legal entity structure for EMEA and APAC expansion
  claimRefs: [CR021, CR022, CR023, CR024, CR025, CR026]

- id: TR002
  title: "Operational / quality / security risk register"
  notes: >-
    Mitigation maturity rated Low, Medium, or High based on publicly available evidence of
    certifications, tooling, and operational controls. No internal audit data was available;
    assessments are analyst estimates based on comparable SaaS logistics platforms.
  columns:
  - Failure Mode
  - Likelihood
  - Severity
  - Mitigation Maturity
  - Residual Exposure
  - Unresolved Gap
  rows:
  - - Cybersecurity breach of cargo tracking platform
    - Medium
    - High
    - Medium — no public SOC 2 or ISO 27001 certification disclosed
    - Carrier data exfiltration; customer trust loss; regulatory GDPR and CRA penalty
    - No public third-party cybersecurity certification found; no breach response SLA disclosed
  - - RiskGPT AI model poisoning or hallucination in risk outputs
    - Low
    - High
    - Low — no public AI model governance framework or red-team audit disclosed
    - Contaminated risk scores leading to uncovered shipments; customer liability claims
    - No disclosed model governance policy, training data provenance controls, or output audit trail
  - - IoT tracking device compromise enabling cargo rerouting or spoofing
    - Medium
    - High
    - Medium — firmware update cadence and device attestation practices not publicly disclosed
    - Physical cargo loss; insurance clawback; customer SLA breach
    - No public disclosure of device lifecycle management, remote wipe, or cryptographic attestation
  - - Platform outage during high-stakes pharmaceutical or luxury cargo monitoring
    - Low
    - High
    - Medium — cloud-based infrastructure assumed but no SLA transparency found
    - SLA penalty payments; customer churn; regulatory notification obligation for pharma
    - No published uptime SLA, incident history, or redundancy architecture documentation found
  - - Cargo theft fraud-vector shift rendering physical monitoring less relevant
    - High
    - Medium
    - Low — RiskGPT and GSOC not currently marketed as identity-verification solutions
    - Revenue and NRR erosion as physical security budgets shift to digital fraud prevention
    - No public digital identity verification or carrier credentialing product announced as of Q2 2026
  claimRefs: [CR015, CR016, CR017, CR018, CR019, CR020, CR044, CR045]

- id: TR003
  title: "Partner / dependency risk register"
  notes: >-
    Revenue concentration estimates are analyst inferences from public filings and Sacra research;
    Overhaul has not publicly disclosed customer concentration data. Counterparty identities inferred
    from public integrations and industry standard practices for logistics SaaS platforms.
  columns:
  - Dependency or Risk
  - Counterparty or Segment
  - Concentration Exposure
  - Failure Scenario
  - Severity
  - Mitigation
  rows:
  - - Carrier and telematics data feed providers
    - Third-party GPS, ELD, and telematics networks including Samsara and Geotab integrations
    - Platform-wide — all real-time visibility features depend on carrier data availability
    - API deprecation or commercial renegotiation disrupts real-time tracking for all customers
    - High
    - Maintain multi-source carrier data integrations; carrier-agnostic architecture design
  - - Cloud infrastructure provider concentration
    - AWS primary cloud provider assumed based on industry benchmarks for logistics SaaS
    - Platform-wide — single cloud provider creates simultaneous failure risk for all customers
    - Cloud outage or commercial terms change disrupts all platform services simultaneously
    - High
    - Multi-region deployment; documented failover architecture; SLA-based contracts with cloud vendor
  - - Pharmaceutical customer revenue concentration
    - Top pharma cold-chain accounts estimated as top three representing 20 to 35 percent of ARR
    - High — pharma is Overhaul's primary vertical; loss of a top account drives material ARR impact
    - DSCSA compliance gap or competitive switch triggers large-account churn event
    - High
    - Deepen DSCSA integration; build switching costs via ERP integration and historical compliance data
  - - Insurance carrier and cargo underwriter partnerships
    - Cargo insurance partners using Overhaul data for premium determination and claims management
    - Medium — partner integrations create value but also data-sharing obligations
    - Partner renegotiation or exit breaks risk-scoring-to-insurance-premium value chain
    - Medium
    - Multi-partner diversification; SLA-protected data sharing agreements; direct insurer relationships
  - - FreightVerify automotive integration partners
    - Automotive OEM logistics partners and Tier 1 automotive suppliers acquired via FreightVerify
    - Medium — new segment acquired; customer trust and product compatibility being established
    - Integration delays or service interruption causes FreightVerify automotive customers to churn
    - Medium
    - Dedicated integration programme; customer success team assigned to FreightVerify accounts
  claimRefs: [CR033, CR034, CR042, CR043]

- id: TR004
  title: "People / execution risk register"
  notes: >-
    Succession planning and retention evidence based on public disclosures only; no internal HR data
    available. Likelihood ratings reflect absence of publicly documented mitigation measures.
  columns:
  - Role or Function
  - Dependency or Gap
  - Likelihood
  - Severity
  - Mitigation
  - Diligence Path
  rows:
  - - CEO and Founder Barry Conlon
    - Founder whose law-enforcement relationships, regulatory credibility, and domain expertise are central to the value
      proposition with no documented successor
    - Low departure probability
    - Very High — product identity, key relationships, and fundraising narrative tied to founder
    - Board-level succession planning; documented leadership development programme
    - Request board succession plan, second-in-command biography and operating authority, and key-man insurance policy
  - - GSOC Operations Team 24/7 global security operations
    - Human-intensive service layer; expansion into EMEA and APAC increases headcount need non-linearly; specialised 
      talent pool is limited globally
    - Medium
    - High — GSOC is a primary product differentiator; understaffing creates SLA and reputational exposure
    - Competitive compensation; documented hiring pipeline; capacity planning model per geography
    - Request GSOC headcount plan, attrition rates, training certification programme, and EMEA and APAC hiring timeline
  - - Engineering and AI Data Science Team
    - RiskGPT development and platform reliability depend on a concentrated AI and platform engineering team; ML talent 
      competition is intense
    - Medium
    - High — engineering attrition could delay AI roadmap and create platform reliability risks
    - Equity retention packages; technical leadership bench; external AI partner relationships
    - Request engineering org chart, equity refresh plan, and RiskGPT development team structure
  - - International Expansion Leadership EMEA and APAC
    - EMEA and APAC market entry requires leaders with local regulatory, logistics, and enterprise sales expertise; 
      currently unconfirmed publicly
    - Medium
    - Medium-High — absence of local leadership slows expansion and increases compliance risk in new jurisdictions
    - Executive hiring plan for international markets; local advisory board engagement
    - Request international hiring plan, current EMEA and APAC headcount, and named regional leadership
  claimRefs: [CR034, CR035, CR036, CR039]

- id: TR005
  title: "Mitigation and kill criteria table"
  notes: >-
    Thesis-break criteria define observable events that, if triggered, would fundamentally impair
    the investment thesis. Monitoring triggers are leading indicators that should prompt enhanced
    diligence or conditional action within 90 days of detection. Thresholds are analyst estimates
    and should be refined based on Overhaul's actual financial model and investor rights.
  columns:
  - Risk
  - Monitorable Leading Trigger
  - Threshold or Thesis-Break Criterion
  - Action Implication
  rows:
  - - Competitive displacement by ERP-native bundling
    - SAP or Oracle announces supply chain security add-on targeting Overhaul's pharma vertical; Overhaul NRR dips below
      110 percent
    - NRR falls below 105 percent for two consecutive quarters; named SAP or Oracle win at a top-5 Overhaul account is 
      confirmed
    - Reassess investment thesis; require product differentiation evidence; consider reducing exposure
  - - Cybersecurity breach or AI model failure
    - Public security incident report; regulatory notification filing; customer churn following a platform incident
    - Data breach exposing regulated cargo tracking data; RiskGPT output recall or customer notification of erroneous 
      risk scores
    - Suspend new investment; require independent security audit; impose escrow or clawback provisions pending 
      remediation
  - - DSCSA or pharmaceutical compliance gap
    - FDA enforcement letter citing Overhaul-integrated data; competitor announcement of DSCSA certification that 
      Overhaul lacks
    - Loss of a top-3 pharma account attributable to DSCSA non-compliance; FDA enforcement action citing Overhaul 
      integration
    - Require DSCSA compliance certification within 60 days or trigger step-down in platform valuation
  - - Valuation compression at next financing round
    - Public-market SaaS multiples remain below 5 times EV/NTM; ARR growth rate decelerates below 20 percent 
      year-over-year
    - Next financing round at pre-money valuation below $600 million on ARR above $150 million
    - Reassess exit assumptions; consider secondary sale or revised target return; engage board-level strategic review
  - - Founder-CEO departure without prepared successor
    - Announced leadership transition without named replacement; board chair stepping in as interim CEO
    - Barry Conlon departure without at least six months of documented successor transition and customer relationship 
      handover
    - Trigger board governance review; require investor protective provisions and accelerated vesting clawback; place 
      investment on hold
  claimRefs: [CR027, CR028, CR029, CR030, CR031, CR033, CR038, CR039, CR041]

