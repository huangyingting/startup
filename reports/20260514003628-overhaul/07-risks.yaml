artifact: risks
slug: overhaul
runDate: "2026-05-14"
company:
  name: Overhaul
chapter:
  number: 7
  title: "Risks"
  summary: >
    Overhaul operates in a high-threat environment where escalating cargo theft, intensifying
    competition from well-funded peers (project44, FourKites, Shippeo), expanding regulatory
    obligations (GDPR, DSCSA, EU AI Act), and a compressed VC market collectively shape its
    risk profile. The company's $105M Series C in August 2025 omitted a valuation disclosure,
    raising potential down-round concerns vs the 2022 $1B+ peak. Key-person risk (CEO Barry
    Conlon), IoT hardware dependency, and AI hallucination exposure in RiskGPT are material
    operational risks. Mitigation maturity is moderate: GSOC coverage, law enforcement
    partnerships, and multi-cloud architecture partially address these risks, but GDPR
    compliance posture and SOC 2 certifications remain unverified diligence gaps.

sections:
  - id: competitive-market-risk
    title: "Competitive and Market Risk"
    body: >
      Overhaul competes in a crowded and well-capitalized real-time transportation visibility
      market. Project44 and FourKites represent the primary enterprise competitors; FourKites
      is deploying Loft AI automation agents to automate supply chain exception management,
      a direct capability challenge in Overhaul's core product area. Shippeo secured $30M in
      early 2025 from Toyota's Woven Capital to accelerate North American expansion, directly
      targeting Overhaul's shipper relationships in automotive supply chains. Tive raised a
      $40M Series C in January 2025 and has deployed over 2M+ IoT devices globally, competing
      in cold chain and high-value freight. Supply chain VC funding contracted from $63.7B in
      2021 to $7.1B in 2024 — an 89% decline — compressing sector valuations and limiting exit
      optionality. Overhaul's August 2025 $105M Series C omitted a valuation disclosure, a
      notable contrast to the $1B+ valuation in the 2022 Series C, raising a potential
      down-round signal. Descartes MacroPoint's FraudGuard 2.0 launch in July 2025 signals
      that large incumbents are encroaching on Overhaul's fraud detection domain. Samsara,
      while primarily fleet-management focused, deepens carrier-side data assets that could
      enable lateral expansion into cargo visibility.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007, CR008, CR009]
    tableRefs: [TR003]
    figureRefs: [FR001]

  - id: cargo-theft-operational-risk
    title: "Cargo Theft and Operational Risk"
    body: >
      Cargo theft represents both a demand tailwind and an operational performance risk for
      Overhaul. CargoNet reported a 14% year-over-year increase in cargo theft incidents in
      Q3 2024, with over $39M stolen in that single quarter; prior data shows a 57% surge in
      2022. While elevated theft validates market demand for Overhaul's GSOC-backed platform,
      it places continuous operational pressure on the company's promise of a 99.9% protection
      rate across the $1.4T in cargo it monitors at any moment. Overhaul's platform depends on
      continuous real-time IoT data streams from third-party hardware providers including Tive
      and Impinj; any supply disruption, firmware incompatibility, or device failure creates a
      monitoring blind spot that could result in undetected theft events. Middle East supply
      route disruptions in 2024 further strained global cargo insurance coverage, compounding
      shipper exposure when platform gaps coincide with elevated loss events in high-risk
      corridors. GSOC operator staffing is a persistent scaling constraint: each new customer
      requires incremental 24/7 human coverage that cannot be instantly augmented.
    claimRefs: [CR010, CR011, CR012, CR013, CR014, CR015, CR016, CR017, CR018]
    tableRefs: [TR002]
    figureRefs: []

  - id: technology-cybersecurity-risk
    title: "Technology and Cybersecurity Risk"
    body: >
      Overhaul's platform processes sensitive freight movement data for hundreds of Fortune-1000
      customers across regulated industries, creating a high-value target for cyberattackers and
      a broad regulatory compliance obligation. NIST released Cybersecurity Framework 2.0 in
      February 2024, adding a Govern function that supply chain technology providers must now
      address; Overhaul's current alignment with CSF 2.0 has not been publicly disclosed. The
      FTC has issued clear guidance that IoT data aggregators bear legal responsibility for
      securing connected device data, and CISA designated transportation and logistics as one of
      16 critical infrastructure sectors subject to heightened reporting and resilience requirements.
      RiskGPT, Overhaul's AI prediction engine built on Azure OpenAI, introduces AI hallucination
      risk: false positive alerts could trigger costly unnecessary cargo holds, while false
      negatives could miss genuine threats, both outcomes creating liability and eroding customer
      trust. Overhaul's multi-region deployment across US, EU, Latin America, and EMEA expands
      the regulatory attack surface, as each jurisdiction imposes distinct data residency and
      breach notification requirements. A successful intrusion into Overhaul's cargo manifest
      systems could expose shipment schedules of hundreds of pharmaceutical and technology
      customers to adversarial exploitation.
    claimRefs: [CR019, CR020, CR021, CR022, CR023, CR024, CR025, CR026, CR027]
    tableRefs: []
    figureRefs: [FR002]

  - id: regulatory-compliance-risk
    title: "Regulatory and Compliance Risk"
    body: >
      Overhaul's operations in the EU and its pharmaceutical and food vertical customer base
      create a complex multi-jurisdictional regulatory environment. GDPR fines can reach the
      higher of €20M or 4% of global annual revenue, representing material financial exposure
      for a company managing sensitive pharmaceutical supply chain data across EU member states.
      The FDA's Drug Supply Chain Security Act mandates serialized end-to-end electronic
      traceability for pharmaceutical products; pharma shippers using Overhaul must verify that
      the platform's data handling satisfies DSCSA lot-level and item-level traceability
      requirements. The EU AI Act, with phased enforcement beginning from August 2024, may
      classify RiskGPT and Overhaul's anomaly-detection algorithms as high-risk AI given their
      role in pharmaceutical and critical logistics chains. California's Consumer Privacy Rights
      Act extends broad consumer data rights to supply chain visibility data involving employee
      tracking and logistics provider contacts. DOT and FMCSA regulations on electronic logging
      devices constrain how Overhaul can ingest and store carrier telematics data. Overhaul has
      not publicly disclosed its GDPR compliance posture, EU representative, or Data Processing
      Agreement documentation as of May 2026 — a material diligence gap.
    claimRefs: [CR028, CR029, CR030, CR031, CR032, CR033, CR034, CR035, CR036]
    tableRefs: [TR001]
    figureRefs: []

  - id: financial-execution-risk
    title: "Financial and Execution Risk"
    body: >
      Overhaul has raised over $350M in total disclosed funding since founding, with its
      most recent $105M Series C in August 2025 closing without a disclosed valuation — a
      notable omission relative to the $1B+ peak disclosed in 2022. The inclusion of a
      MidCap Financial debt facility in the August 2025 round indicates use of leverage,
      adding interest expense and covenant risk to the balance sheet. Supply chain VC
      funding contracted from $63.7B in 2021 to $7.1B in 2024, compressing sector multiples
      and increasing the cost and difficulty of follow-on capital. Springcoast Partners
      participated in both the January 2025 and August 2025 rounds, suggesting concentrated
      investor reliance on a single lead that creates vulnerability if Springcoast's thesis
      or appetite changes. G2 reviews highlight interface complexity and integration setup
      friction as recurring themes, representing NPS and retention risk in Overhaul's
      enterprise install base. Barry Conlon's central role as Overhaul's founder, CEO, and
      sole external spokesperson constitutes a meaningful key-person risk; his departure
      or incapacitation would disrupt customer relationships, fundraising, and strategy.
      PitchBook's Q1 2025 VC Monitor documents compressed multiples across enterprise SaaS
      with elevated risk premiums in logistics, reducing prospective exit valuations.
    claimRefs: [CR037, CR038, CR039, CR040, CR041, CR042, CR043, CR044, CR045]
    tableRefs: [TR004, TR005]
    figureRefs: [FR003]

tables:
  - id: TR001
    title: "Regulatory / legal risk register"
    notes: >
      Covers key US and EU frameworks with direct applicability to Overhaul's data handling
      and AI operations across pharmaceutical, technology, and logistics verticals. Additional
      jurisdiction-specific requirements in Latin America, EMEA, and APAC are not exhaustively
      enumerated. Rows ordered by assessed severity.
    enumerationScope:
      coverage: partial
      basis: >
        Reviewed key US and EU regulatory frameworks applicable to Overhaul's pharmaceutical,
        technology, and logistics verticals — specifically GDPR, FDA DSCSA, EU AI Act, DOT ELD
        mandates, and CPRA. Exhaustive global coverage was not achievable; additional
        jurisdiction-specific rules in LATAM, EMEA, and APAC may also apply to Overhaul's
        cross-border data flows and carrier telematics integrations.
    claimRefs: [CR028, CR029, CR030, CR031, CR032, CR033, CR034, CR035]
    columns:
      - "Regulation / Law"
      - "Jurisdiction"
      - "Overhaul Obligation"
      - "Likelihood of Action"
      - "Severity"
      - "Current Mitigation"
      - "Residual Exposure"
      - "Diligence Path"
    rows:
      - ["GDPR (General Data Protection Regulation)", "EU / EEA", "Data processing agreements, EU representative, breach notification within 72 hours, data subject rights management", "Possible", "Critical", "Unknown — no public GDPR posture or DPA disclosure", "High: up to €20M or 4% global revenue", "Request GDPR compliance documentation, DPO appointment, and DPA templates"]
      - ["FDA Drug Supply Chain Security Act (DSCSA)", "United States", "Platform must support serialized electronic traceability of pharmaceutical products at lot and item level for pharma customers", "Possible", "High", "Overhaul markets pharma-specific supply chain monitoring; specific DSCSA integration details undisclosed", "Medium: FDA enforcement risk passes primarily to pharma customers but Overhaul data gaps create exposure", "Confirm DSCSA-compliant data schemas and API outputs with pharma customer references"]
      - ["EU AI Act (Regulation 2024/1689)", "EU / EEA", "High-risk AI classification likely for RiskGPT in pharmaceutical logistics; requires conformity assessment, transparency, human oversight", "Possible", "High", "EU AI Act Service Desk launched April 2025; Overhaul has not publicly confirmed compliance programme", "Medium-High: non-compliance could bar RiskGPT use in EU pharmaceutical supply chains", "Confirm RiskGPT AI Act classification, conformity assessment status, and EU market roll-out plan"]
      - ["DOT / FMCSA Electronic Logging Device (ELD) Mandate", "United States", "Carrier telematics data ingested by Overhaul must comply with ELD data format, retention, and access restrictions", "Unlikely", "Medium", "ELD compliance is carrier-side; Overhaul's data ingestion layer must respect FMCSA data use restrictions", "Low-Medium: engineering constraint on carrier data pipeline", "Confirm Overhaul's ELD data processing policy and carrier DPA terms"]
      - ["California Consumer Privacy Rights Act (CPRA)", "United States (California)", "Supply chain visibility data involving California-resident employees or contacts triggers consumer data rights (access, deletion, opt-out)", "Unlikely", "Medium", "California privacy obligations are common for US SaaS; Overhaul's privacy policy and CPRA compliance status unconfirmed", "Low-Medium: incremental overhead; manageable with standard privacy programme", "Review Overhaul privacy policy, California disclosure notices, and data subject request process"]

  - id: TR002
    title: "Operational / quality / security risk register"
    notes: >
      Ranks key operational failure modes from highest to lowest combined likelihood × severity.
      Each risk has observable leading indicators suitable for diligence monitoring.
    claimRefs: [CR010, CR014, CR015, CR016, CR017, CR023, CR024, CR025]
    columns:
      - "Failure Mode"
      - "Likelihood"
      - "Severity"
      - "Mitigation Maturity"
      - "Residual Exposure"
      - "Unresolved Gap"
    rows:
      - ["Major supply chain data breach (cargo manifests, shipment schedules)", "Possible", "Critical", "Low-Medium: cloud security relies on AWS/Azure shared-responsibility model; no confirmed SOC 2 Type II or ISO 27001", "Very high: hundreds of Fortune-1000 customer shipment schedules exposed", "SOC 2 / ISO 27001 certification status unconfirmed"]
      - ["Cargo theft surge beyond platform response capacity (GSOC overload)", "Likely", "High", "Medium: GSOC operates 24/7 in multiple time zones; law enforcement integrations in place", "Medium: GSOC staffing is a linear cost constraint; rapid theft escalation could overwhelm capacity", "No disclosed GSOC throughput metrics or SLA breach history"]
      - ["AI hallucination in RiskGPT generating false alerts or missed threats", "Possible", "High", "Low: LLM hallucination is an industry-wide open problem; Overhaul has not disclosed error-rate benchmarks or human override rates", "Medium: customer trust and liability risk scale with RiskGPT deployment footprint", "RiskGPT accuracy benchmarks, false-positive/negative rates undisclosed"]
      - ["IoT hardware failure or supply disruption (Tive, Impinj device outage)", "Possible", "High", "Medium: multi-vendor IoT strategy partially mitigates single-vendor dependency; fallback monitoring not confirmed", "Medium: any coverage gap during high-value pharmaceutical shipment creates undetected risk window", "Vendor concentration and failover protocol details undisclosed"]
      - ["Platform or API outage disrupting real-time cargo monitoring", "Unlikely", "High", "Medium: multi-cloud AWS/Azure deployment provides geographic redundancy; uptime SLA not publicly disclosed", "Low-Medium: Overhaul markets real-time visibility as core value; any outage directly undermines the product promise", "Platform uptime SLA, incident history, and RTO/RPO targets undisclosed"]

  - id: TR003
    title: "Partner / dependency risk register"
    notes: >
      Covers critical infrastructure and data dependencies. Overhaul's platform is a data
      aggregation layer — value creation depends entirely on continuous, accurate data flows
      from each dependency. Rows ordered by severity of failure impact.
    claimRefs: [CR017, CR024, CR027]
    columns:
      - "Dependency"
      - "Counterparty"
      - "Role"
      - "Concentration"
      - "Failure Scenario"
      - "Severity"
      - "Current Mitigation"
      - "Residual Exposure"
    rows:
      - ["Cloud Infrastructure", "AWS / Microsoft Azure", "Hosts core platform, RiskGPT inference, and data storage", "High: multi-cloud but both hyperscalers have had correlated outages", "Major regional cloud outage halts real-time monitoring across all customers simultaneously", "Critical", "Multi-cloud deployment distributes risk across providers", "Medium: simultaneous AWS + Azure outage possible (rare but non-zero); no public RTO/RPO disclosure"]
      - ["Telematics Data Provider", "Samsara / Geotab / Carrier ELDs", "Provides real-time GPS and vehicle status data for in-transit cargo", "High: Overhaul ingests from multiple carriers but each carrier may use a single telematics provider", "API deprecation, rate-limit change, or provider acquisition disrupts carrier location feeds", "High", "Multi-carrier data ingestion reduces single-provider dependency", "Medium: any major carrier's telematics provider change ripples through Overhaul's visibility for that carrier's lanes"]
      - ["IoT Hardware / Sensors", "Tive / Impinj", "Provides asset-attached sensors for high-value pharmaceutical and cold-chain cargo", "Medium-High: two primary vendors in specialty IoT segment", "Global semiconductor shortage or vendor acquisition forces hardware transition mid-contract", "High", "Dual vendor strategy with Tive and Impinj; details of fallback protocol undisclosed", "Medium: hardware transition mid-shipment is operationally complex and may require customer re-provisioning"]
      - ["Carrier Network Data", "FreightVerify (acquired 2025)", "Provides carrier-connected network enabling automotive manufacturer visibility", "High post-acquisition: FreightVerify is now fully absorbed into Overhaul platform", "Integration failure or data schema mismatch post-acquisition disrupts automotive customer visibility layer", "High", "Acquisition integration underway; Overhaul communications indicate ongoing product consolidation", "Medium: integration risk is time-bounded but customer SLAs during transition are a churn risk"]
      - ["Cargo Theft Intelligence", "CargoNet / Law Enforcement Databases", "Feeds real-time threat intelligence on cargo theft patterns to RiskGPT and GSOC operators", "Medium: CargoNet is the dominant third-party cargo theft database", "CargoNet data access revoked, API changes, or data quality degradation blinds threat intelligence layer", "Medium", "Law enforcement integrations provide parallel data channel; Overhaul does not confirm redundant sources", "Low-Medium: alternative theft databases exist (e.g., NCIS) but CargoNet is the market standard"]
      - ["Mapping / Routing Engine", "Google Maps Platform / HERE Technologies", "Powers route risk scoring and geofencing logic in visibility platform", "Medium: industry-standard map APIs with stable pricing", "Pricing change, API deprecation, or data gap in a high-theft emerging market corridor", "Low-Medium", "Standard commercial API contract; routing engine switching is relatively low friction", "Low: routing API alternatives are numerous and migration risk is manageable"]

  - id: TR004
    title: "People / execution risk register"
    notes: >
      Key personnel and organizational execution risks. Overhaul has not disclosed its
      full leadership org chart publicly; gaps below reflect absence of public information.
      Rows ordered by severity.
    claimRefs: [CR016, CR040, CR042, CR043]
    columns:
      - "Role / Function"
      - "Dependency or Gap"
      - "Likelihood"
      - "Severity"
      - "Current Mitigation"
      - "Diligence Path"
    rows:
      - ["CEO / Founder (Barry Conlon)", "Sole public-facing executive and brand identity; no disclosed deputy CEO or succession plan", "Unlikely", "Critical", "Overhaul's board includes experienced investors (8VC, American Securities, Edison, Springcoast); board-led interim governance is possible", "Request succession plan, executive bench depth, and board governance documentation"]
      - ["GSOC Operations Staffing", "GSOC must scale linearly with customer and shipment count; staffing in multiple time zones is expensive", "Possible", "High", "Multiple GSOC centers across US, EMEA, and LATAM distribute coverage; specific headcount and attrition rates undisclosed", "Confirm GSOC headcount, attrition rate, and capacity utilization metrics"]
      - ["Engineering / AI Talent", "RiskGPT and AI roadmap require specialized ML/AI engineers in a competitive talent market", "Possible", "High", "Overhaul's Austin HQ has access to Texas tech talent; fundraising provides compensation runway", "Request engineering org size, ML team size, and voluntary turnover rate"]
      - ["Investor Concentration", "Springcoast Partners led or co-led both 2025 funding rounds, creating reliance on a single institutional champion", "Unlikely", "Medium", "Edison Partners and American Securities provide investor diversity; MidCap Financial adds debt market access", "Confirm investor rights, pro-rata agreements, and whether Springcoast board seat creates governance constraints"]
      - ["Sales and Enterprise Execution", "No disclosed revenue run-rate or ARR; sales team size and pipeline conversion not publicly reported", "Possible", "Medium", "Fortune-100 customer wins (Microsoft, Bristol Myers Squibb, CEVA) demonstrate enterprise credibility", "Request sales team headcount, ACV, quota attainment, and pipeline data in due diligence"]

  - id: TR005
    title: "Mitigation and kill criteria table"
    notes: >
      Thesis-break triggers are defined as observable events that would materially undermine
      the investment thesis absent remediation. Each trigger is paired with the leading
      indicators and diligence asks that allow pre-emptive monitoring.
    claimRefs: [CR006, CR037, CR039, CR043, CR045]
    columns:
      - "Risk"
      - "Monitorable Trigger / Leading Indicator"
      - "Kill Threshold / Thesis-Break Event"
      - "Action Implication"
    rows:
      - ["Cargo theft escalation outpacing platform protection", "CargoNet quarterly theft incidence rate; GSOC SLA breach reports; customer NPS decline", "More than 3 publicly disclosed Overhaul-monitored cargo theft events in a 12-month period, or any single event >$10M", "Conduct root-cause audit; evaluate GSOC capacity and IoT hardware failure rates; consider indemnity exposure"]
      - ["Competitive displacement (project44 / FourKites / Shippeo)", "Enterprise RFP win rates; customer logo losses; competitor product release cadence vs Overhaul roadmap", "Loss of 2+ top-10 customers to a named competitor in 12 months, or NRR below 100%", "Investigate product gap; assess pricing pressure; model revenue concentration risk"]
      - ["GDPR or DSCSA regulatory enforcement action", "Regulatory inquiry or data subject complaint filing; DPA audit notification; FDA warning letter to pharma customer citing Overhaul data gap", "Any formal GDPR investigation initiated by a supervisory authority, or FDA warning letter referencing Overhaul platform", "Halt new EU customer onboarding; retain regulatory counsel; quantify fine exposure relative to revenue"]
      - ["CEO Barry Conlon departure or incapacitation", "Executive change disclosure; departure announcement; extended absence from investor or customer communications", "CEO departure without disclosed succession plan or named replacement", "Engage board immediately; assess interim leadership options; pause or extend diligence timeline"]
      - ["Valuation mark-down or down-round financing", "Disclosed Series D valuation below $500M; secondary market pricing; investor rights exercise; major investor exit", "Series D or secondary transaction at valuation below the undisclosed August 2025 Series C price", "Model dilution and return impact; assess bridge risk and runway; review liquidation preference stack"]

