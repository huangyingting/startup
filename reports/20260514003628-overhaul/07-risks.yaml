  evidenceGaps:
    - id: ER001
      type: private-evidence-only
      severity: material
      description: >
        No public data on specific enterprise contract losses or customer defections from
        Overhaul to a named competitor has been found. Win/loss data is commercially sensitive
        and withheld from public filings. Diligence must request win/loss analysis and
        customer NRR from management.
      relatedQuestionRefs: [QR003]

    - id: ER002
      type: missing-source
      severity: material
      description: >
        No public data source quantifies the dollar value of cargo theft events that occurred
        on Overhaul-monitored shipments specifically. The 99.9% protection rate is company-
        claimed and unaudited; no third-party audit of actual SLA breach frequency has been
        found. Diligence must request SLA performance data and incident log from management.
      relatedQuestionRefs: [QR007, QR012]

    - id: ER003
      type: missing-source
      severity: material
      description: >
        No confirmed public records of Overhaul data breaches, cybersecurity incidents, or
        SOC 2 Type II certification were found in accessible public sources. G2 reviews
        include complaints about UI complexity but no security incident disclosures. Diligence
        must request penetration test results, SOC 2 report, and incident disclosure history.
      relatedQuestionRefs: [QR013, QR014]

    - id: ER004
      type: missing-source
      severity: material
      description: >
        Overhaul's ARR, net burn rate, and cash runway as of May 2026 are not publicly
        disclosed. Estimates of $40–60M ARR are speculative inferences from headcount and
        customer count, not confirmed financial data. Diligence must request audited or
        management-reviewed financial statements.
      relatedQuestionRefs: [QR025]

    - id: ER005
      type: enumeration-incomplete
      severity: minor
      description: >
        The regulatory/legal risk register covers key US and EU frameworks but does not
        exhaustively enumerate all jurisdictions in which Overhaul operates (LATAM, APAC,
        EMEA). Additionally, Overhaul's precise market share and competitive positioning
        relative to project44 and FourKites cannot be verified from public sources alone;
        win/loss and ARR share data requires management disclosure.
      relatedQuestionRefs: [QR001]
      relatedTableRefs: [TR001]
