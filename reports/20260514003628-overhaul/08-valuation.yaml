  - id: FV004
    title: "Investment KPIs"
    type: kpi
    notes: >
      IC-ready scoring across seven dimensions from the diligence findings in
      chapters 1–8. Scores are 1–10 where 10 is strongest. Market opportunity
      reflects confirmed TAM and growth rates. Competitive moat reflects product
      differentiation and switching cost evidence. Customer proof reflects confirmed
      logos and partial retention signals. Financial transparency reflects the
      absence of public ARR, NRR, and margin data. Risk profile reflects the
      composite of Chapter 7 risks. Valuation entry reflects the relationship between
      estimated current value and entry price discipline. Evidence quality reflects
      the coverage and freshness of research sources.
