schemaVersion: "report-v2"
artifact: valuation
slug: overhaul
runDate: "2026-05-14"
company:
  name: Overhaul
chapter:
  number: 8
  title: "Valuation"
  summary: >
    Overhaul's last disclosed post-money valuation is $1B+, anchored to the July 2022
    $145M Series C led by 8VC. The August 2025 $105M Series C omitted a valuation
    disclosure — a notable contrast that implies compression from the 2022 peak in a
    sector where VC funding has contracted 89% since 2021. Public supply chain SaaS
    peers trade at 3.8× EV/Revenue; private peers trade at a median 4.5× ARR. At an
    estimated $65–80M ARR (unconfirmed publicly), Overhaul's implied current value is
    $350–640M in a base scenario — a 35–65% discount to 2022. The bull case ($125M
    ARR × 8×) returns to $1B. Strategic buyer interest is credible: SAP offered ~$600M
    for comparator FourKites in February 2026 (declined). Recommendation is a
    conditional pass, contingent on data-room confirmation of ARR, NRR, gross margin,
    and entry price below $600M.

sections:
  - id: investment-thesis-and-antithesis
    title: "Investment Thesis and Anti-Thesis"
    body: >
      The core thesis for Overhaul rests on four pillars: (1) a demand environment in which
      cargo theft is structurally rising — a 14% year-over-year increase in Q3 2024, with
      over $39M stolen in that single quarter per CargoNet — creating durable platform
      demand; (2) a vertically integrated differentiation that combines IoT-sensor coverage,
      a 24/7 GSOC, RiskGPT AI, and law enforcement partnerships into a unified offering
      that competitors replicate only partially; (3) a Fortune-100 customer base including
      Microsoft, Bristol Myers Squibb, CEVA, and Dyson, confirming enterprise product-market
      fit; and (4) a regulatory tailwind from DSCSA, CTPAT, and EU AI Act compliance
      obligations that drive platform adoption across pharmaceuticals and logistics. The
      anti-thesis focuses on financial opacity — no disclosed ARR, NRR, or gross margin —
      combined with a sector valuation environment that has reset significantly below 2021–2022
      peaks. Supply chain VC funding has contracted 89% from $63.7B in 2021 to $7.1B in
      2024, compressing exit valuations for all players. Overhaul's GSOC model is
      human-intensive, limiting operating leverage relative to software-only competitors.
      Project44 and FourKites have 5–10× more total capital and larger geographic footprints.
      The absence of a valuation disclosure in the August 2025 round is the single largest
      near-term concern: it raises a reasonable down-round inference vs the 2022 $1B+ peak.
    claimRefs: [CV001, CV002, CV003, CV014, CV015, CV020, CV021, CV030, CV038, CV041]
    tableRefs: [TV001, TV002]
    figureRefs: [FV001, FV004]

  - id: valuation-context-and-capital-structure
    title: "Valuation Context and Capital Structure"
    body: >
      Overhaul has raised over $350M since founding across a well-documented funding
      sequence: a $145M Series C at $1B+ valuation in July 2022 led by 8VC with Greenbriar
      Equity Group and American Securities as strategic co-investors; a $73M round in 2024
      focused on law enforcement integration expansion; a $55M round in January 2025
      co-led by Springcoast Partners; and a $105M Series C in August 2025 co-led by
      Springcoast and Edison Partners, which included a MidCap Financial debt facility.
      The debt component introduces interest expense and covenant risk absent from
      pure-equity comps. Springcoast's participation in both 2025 rounds signals concentrated
      investor conviction but also reliance on a single institutional champion — a risk if
      Springcoast's mandate or appetite changes. At the public supply chain management
      software median of 3.8× EV/Revenue and a base-case ARR estimate of $80M, Overhaul's
      implied value is approximately $304M — well below the 2022 peak. At the private SaaS
      median of 4.5× ARR the implied value is $360M; at a growth premium of 7× it is $560M.
      The $1B+ 2022 multiple (approximately 12–25× ARR at estimated $40–80M ARR) was set
      in a markedly different VC environment and reflects peak sector euphoria that has
      since unwound. For entry discipline, any investor pricing Overhaul above $600M
      assumes ARR confirmation above $80M and retention above 100% — evidence that must
      come from the data room.
    claimRefs: [CV001, CV002, CV003, CV012, CV013, CV016, CV017, CV031, CV034, CV037, CV040, CV042]
    tableRefs: []
    figureRefs: [FV003]

  - id: comparable-company-analysis
    title: "Comparable Company Analysis"
    body: >
      The most directly comparable private company is FourKites, which competes head-to-head
      in real-time supply chain visibility: tracxn data places its valuation at approximately
      $1B with $243M raised and an estimated $120M ARR, implying a ~8× ARR multiple. SAP's
      February 2026 offer of ~$600M for FourKites — which FourKites declined — establishes
      a relevant acquisition comps floor. At a 5× ARR multiple for $120M ARR the SAP bid
      implies a ~5× multiple, consistent with the public SCM median of 3.8× plus a private
      control premium. Project44 last raised at $2.7B in a 2021 peak-market round with
      $912M total raised; secondary market data from Compworth in 2026 shows transactions
      occurring at approximately 36–38% of the headline valuation (~$980M–$1B), implying a
      63% secondary discount to the 2021 round price. Motive (formerly KeepTruckin) reached
      $2.85B in its 2021 round, though it operates primarily in fleet management rather than
      cargo security — a less comparable model. Samsara (NYSE: IOT) is the public market
      anchor: it trades at approximately $24B market cap on ~$1.15B ARR (~21× ARR), but its
      premium reflects public market liquidity, network effects, and near-break-even financials
      not replicable by Overhaul in the near term. Public SCM software as a category trades
      at a median 3.8× EV/Revenue per multiples.vc May 2026 data.
    claimRefs: [CV004, CV005, CV006, CV007, CV008, CV009, CV010, CV011, CV018, CV019, CV034, CV035, CV036, CV039]
    tableRefs: [TV004]
    figureRefs: [FV002]

  - id: scenario-analysis
    title: "Scenario Analysis"
    body: >
      Three scenarios are constructed from ARR × multiple logic anchored to publicly
      confirmed sector multiples. The bear case assumes Overhaul's true ARR is at the low
      end of estimates (~$50M), sector multiple compression to 3× (in line with the
      public median less a private illiquidity discount), and no near-term exit catalyst.
      Implied valuation: $150M — below the cumulative preference stack of $350M+,
      generating near-zero returns for common equity holders. The base case assumes
      $80M ARR with a 6× multiple reflecting a growth premium above the public median.
      Implied valuation: $480M. At $350M preference stack, equity holders receive
      residual proceeds of ~$130M — a thin but positive return for common stockholders
      at a 1.4× total value to invested capital. The bull case assumes ARR growth to
      $125M driven by DSCSA regulatory mandates, Microsoft partnership expansion, and
      continued freight volume growth, with a multiple of 8× reflecting AI platform
      premium and competitive moat strength. Implied valuation: $1B, matching the 2022
      peak — achievable but requiring execution across multiple uncertain variables.
      The probability distribution across scenarios is approximately 20/55/25
      (bear/base/bull) based on available public evidence, weighting toward base given
      the company's fundraising trajectory, Fortune-100 customer base, and sector trends.
    claimRefs: [CV012, CV013, CV022, CV023, CV024, CV032, CV033, CV037]
    tableRefs: [TV003]
    figureRefs: []

  - id: exit-readiness-and-final-diligence
    title: "Exit Readiness and Final Diligence"
    body: >
      Overhaul has three plausible exit paths. Strategic acquisition is the most likely
      near-term route: SAP's pursuit of FourKites and Microsoft's status as both a
      named customer and cloud partner of Overhaul suggest active buyer appetite.
      Oracle SCM Cloud's absence of integrated cargo theft prevention creates acquisition
      rationale. Salesforce, which lacks any supply chain security offering, represents
      a long-shot but strategically motivated acquirer. DHL and Maersk have both
      historically internalized supply chain software capabilities and could acquire
      Overhaul to deepen carrier-side visibility offerings. An IPO path requires at
      minimum $150–200M ARR and a credible profitability trajectory; at current
      fundraising cadence and GSOC cost structure, this is likely 3–5 years away.
      PE secondary buyout at a structured multiple in the $350–500M range is a third
      option. The final diligence asks — ARR confirmation, NRR, gross margin,
      preference stack, MidCap facility terms, RiskGPT accuracy benchmarks, and
      GDPR/DSCSA compliance posture — are non-negotiable gating items before
      proceeding. Thesis-break triggers center on three events: a confirmed down round
      (Series D below $500M), loss of two or more top-10 customers, or a material
      regulatory enforcement action in the EU or FDA pharmaceutical compliance domain.
    claimRefs: [CV025, CV026, CV027, CV028, CV029, CV037, CV040, CV041, CV042]
    tableRefs: [TV005, TV006]
    figureRefs: []

