      level reflects the material information gap around Overhaul's financial metrics
      (ARR, NRR, gross margin) rather than any doubt about product-market fit or customer
      quality. Risk rating integrates regulatory, competitive, financial, and execution
      risks enumerated in Chapter 7. The valuation stance reflects sector multiple
      compression vs the 2022 peak, not a negative view of the business fundamentals.
