  evidenceGaps:
    - id: EV001
      type: private-evidence-only
      severity: material
      description: >
        No public source discloses Overhaul's confirmed ARR, trailing NRR, or gross margin.
        The August 2025 Series C press release confirms $105M raised and names investors but
        provides no financial KPIs. Any ARR estimate in the $50–125M range is derived from
        headcount proxy and customer count inference, not confirmed financial data. All
        valuation scenarios carry ±30–40% uncertainty until data room access.
      relatedQuestionRefs: [QV003]

    - id: EV002
      type: missing-source
      severity: material
      description: >
        No public source discloses Overhaul's gross margin, COGS breakdown, or GSOC cost
        structure. The company's IoT hardware integration and human-staffed GSOC suggest
        gross margins below the 70–80% software-only benchmark, but no confirmation of
        55–65% estimate was found. Diligence must request audited P&L with COGS detail,
        gross margin by product line, and GSOC headcount cost.
      relatedQuestionRefs: [QV009]

    - id: EV003
      type: missing-source
      severity: material
      description: >
        No public source confirms whether Overhaul's August 2025 Series C was priced above
        or below the implied 2022 $1B+ valuation. The omission of valuation disclosure is
        consistent with either a structured anti-dilution step-up at a lower price or a
        deliberate confidentiality decision. Secondary market pricing for Overhaul equity
        is not publicly available from Compworth, Wellfound, or any other accessible
        secondary marketplace as of May 2026.
      relatedQuestionRefs: [QV022]

    - id: EV004
      type: missing-source
      severity: moderate
      description: >
        Overhaul's 2026 ARR run rate is not confirmed from any public or secondary-market
        source. The most recent data points are headcount signals (~600 employees disclosed
        in TechCrunch January 2025 coverage) and customer count signals (Fortune-100
        logos). Sacra research does not disclose an ARR figure for Overhaul as of May 2026.
        Diligence must request quarterly ARR history and NRR cohort analysis.
      relatedQuestionRefs: [QV028]

    - id: EV005
      type: enumeration-incomplete
      severity: moderate
      description: >
        The comparable valuation table (TV004) covers the four most accessible private and
        public comps but cannot include complete ARR, NRR, or margin data for any private
        comparable (project44, FourKites, Motive) due to the absence of public financial
        disclosures. All private comp ARR figures are Tracxn/Compworth analyst estimates
        with ±30% uncertainty. A complete comparable analysis requires data room financial
        statements from Overhaul and potentially desk research on secondary market
        transactions for FourKites and project44 not accessible from public sources.
      relatedTableRefs: [TV004]
