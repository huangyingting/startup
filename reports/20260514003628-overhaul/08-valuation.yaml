callouts:
  - type: highlight
    title: "SAP's $600M Acquisition Offer for FourKites"
    body: >
      SAP offered approximately $600M to acquire FourKites in February 2026 and was
      declined, per Axios Pro reporting. This is the most relevant strategic acquisition
      comparable for Overhaul: FourKites is estimated at $120M ARR and $1B valuation,
      implying a 5× ARR acquisition multiple at the SAP offer price. Applied to
      Overhaul at $80M ARR, a 5× acquisition multiple implies $400M — below the
      preference stack floor. At $100M ARR, the same multiple implies $500M — just
      above preference. This comp establishes the acquisition pricing floor investors
      should underwrite.
    claimRefs: [CV008, CV037, CV039]

  - type: warning
    title: "Financial Opacity Is the Primary Diligence Risk"
    body: >
      Overhaul's August 2025 Series C omitted a post-money valuation disclosure. No
      ARR, NRR, or gross margin has been publicly disclosed as of May 2026. At an
      estimated $40–80M ARR, the range of plausible enterprise values spans $150M
      (below preference stack) to $640M. This is not a normal valuation range for
      an investment decision — the data room must narrow it before any commitment.
    claimRefs: [CV002, CV031, CV013]

  - type: highlight
    title: "Preference Stack Floor Matters"
    body: >
      With over $350M in total invested capital including all disclosed rounds and
      the MidCap debt facility, any exit below $350M returns zero to common equity
      holders. Overhaul's August 2025 Series C participants likely hold preferred
      shares with 1× or greater liquidation preferences. Any new investment must
      model the full waterfall — not just enterprise value — to understand actual
      return potential.
    claimRefs: [CV003, CV017, CV037, CV040]

