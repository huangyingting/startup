  evidenceGaps:
  - type: enumeration-incomplete
    severity: moderate
    topic: likely-new-entrants-intra-city-LCV
    missingEvidence: >-
      No public signals confirming or denying plans by Amazon Logistics India, Flipkart
      Commerce, or large global logistics players (DHL, XPO) to enter India's intra-city
      LCV market; Delhivery's internal strategic roadmap on intra-city is also not
      publicly disclosed.
    whyItMatters: >-
      Identifying well-funded new entrants is critical to assessing Porter's 3–5 year
      competitive durability; unknown entrants are the most dangerous competitive threat
      to any market leader.
    diligencePath: >-
      Review Delhivery's investor day presentations and analyst call transcripts for
      intra-city LCV signals; conduct expert interviews with logistics sector investors
      and industry analysts on new entrant pipeline.
    relatedQuestionRefs:
    - QP006
    relatedTableRefs:
    - TP001
  - type: missing-source
    severity: moderate
    topic: Lalamove-India-financials-and-operational-scale
    missingEvidence: >-
      Lalamove's India-specific revenue, driver count, booking volume, and city-level
      market share are not publicly disclosed; the company only reports APAC-consolidated
      financials in its HKEx filings.
    whyItMatters: >-
      Without India-specific Lalamove data, the competitive gap between Porter and its
      most direct organized rival cannot be precisely quantified; assessments rely on
      inferred proxy data from geography and funding size.
    diligencePath: >-
      Request Lalamove India operational data through investment bank relationships or
      industry databases; review HKEx annual report geographic disclosures for any India
      revenue segment.
    relatedQuestionRefs:
    - QP007
  - type: stale
    severity: minor
    topic: MSME-multi-homing-behavioral-data
    missingEvidence: >-
      No recent primary consumer or MSME survey data (2024–2026) quantifies the share of
      Porter's MSME customers who also actively use Lalamove or Blowhorn for comparable
      trips; available evidence is analyst commentary and inference from product positioning,
      not behavioral measurement.
    whyItMatters: >-
      Multi-homing rate is a key input for assessing the stickiness of Porter's MSME
      customer base and the durability of its switching cost moat; underestimating
      multi-homing would overstate the lock-in advantage.
    diligencePath: >-
      Commission an MSME logistics survey in Porter's top 5 cities to measure platform
      usage frequency, multi-homing rate, and primary platform preference; request Porter's
      internal cohort retention data by customer segment.
    relatedQuestionRefs:
    - QP022
    relatedTableRefs:
    - TP002
