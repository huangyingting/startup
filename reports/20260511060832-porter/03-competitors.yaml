- id: switching-costs-lock-in-distribution
  title: Switching Costs, Lock-in, and Distribution Power
  body: >-
    Porter's competitive position is reinforced by multiple switching cost and lock-in mechanisms
    that compound with platform scale. For MSME customers, integrated GST invoicing, digital
    payment history, and trip records create administrative switching costs: migrating to a
    competitor means losing the convenience of a single compliant invoicing system across all
    transactions. Porter's driver-side network — 1.2 million cumulative onboarded driver-partners
    — creates supply density advantages in covered cities that translate directly to faster pickup
    times, higher order acceptance rates, and lower surge events. A well-funded competitor
    attempting to replicate this supply density would require years of driver acquisition,
    onboarding, and retention investment. Multi-homing is a meaningful risk primarily at the
    individual consumer segment, where users may compare Porter and Lalamove prices before
    booking, and among large enterprise accounts that maintain multiple logistics vendor
    relationships for risk management. MSME customers tend to be stickier once integrated
    into a platform's invoicing and account history system. Porter's distribution power —
    22 or more cities with deep driver density — substantially exceeds Lalamove's four-city
    India presence and Blowhorn's limited South and West India footprint, making it the
    only viable national-scale LCV partner for MSMEs operating across multiple Indian cities.
    Enterprise customers using Porter's API integration face the highest switching costs,
    as reintegration requires engineering effort, testing, and a parallel-run period with
    a new dispatch system, particularly for clients with multi-stop, multi-city, or
    high-volume fleet requirements. Switching from Porter to an unorganized broker means
    forfeiting GST compliance, real-time tracking, digital trip history, and dispute
    resolution — meaningful costs for registered MSMEs that depend on input tax credit.
