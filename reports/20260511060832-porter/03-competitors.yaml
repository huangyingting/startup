- id: competitor-profiles
  title: Competitor Profiles
  body: >-
    Porter (₹4,339 crore FY25 revenue, ₹55 crore net profit, $1.2 billion valuation at Series F
    in May 2025) is the market-leading organized player with 22+ cities, 1.2 million cumulative
    driver-partners, and an MSME-first positioning spanning LCV, two-wheeler, mini-truck, and
    household move services. Lalamove (Hong Kong Stock Exchange: 2082) is an APAC-listed,
    institutionally backed direct analog operating in four Indian metros — Mumbai, Delhi,
    Bangalore, and Chennai — with a comparable on-demand LCV and van model; its India-specific
    financials are not publicly disclosed. Blowhorn is a Series B intra-city LCV platform
    focused on South and West India with approximately $15 million or more in total funding —
    a fraction of Porter's $1.2 billion valuation — limiting its competitive reach and
    geographic ambition. Shadowfax (approximately ₹1,750 crore FY25 revenue; IPO DRHP filed
    with SEBI in April 2025 targeting ₹2,000 crore) is primarily a last-mile e-commerce
    courier platform with 300,000 or more delivery partners across 500 or more cities; its
    operational model — per-package courier at speed — is structurally non-overlapping with
    Porter's LCV model today. Delhivery (₹8,931 crore FY25 revenue; listed on BSE at
    approximately $4–5 billion market cap) is India's largest pure-play logistics company,
    dominant in B2B express freight and surface logistics with 18,000 or more pin codes and
    24 million or more square feet of warehousing; its Delhivery Direct service touches
    intra-city capabilities at the margin but is not a strategic priority. Shiprocket
    ($1.2 billion valuation, approximately ₹1,670 crore FY25 revenue) is an SME courier
    aggregation platform that unlike Porter does not dispatch its own driver-partners but
    routes parcels through third-party carriers. The unorganized broker ecosystem — while
    not a technology competitor — retains approximately 70% of intra-city logistics volume
    through informal networks and remains the primary substitution alternative for MSMEs.
