- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - Moat or Risk Dimension
  - Current Strength Assessment
  - Key Threat
  - Threat Severity
  - Time Horizon
  - Mitigation
  - Diligence Ask
  rows:
  - - Supply density (1.2M driver-partners)
    - Very strong — 10 years of driver acquisition; unmatched city depth among LCV platforms
    - Lalamove or well-funded new entrant subsidizing driver acquisition
    - Moderate — expensive and slow to replicate
    - 3–5 years to meaningfully close gap
    - Porter's expansion to 39+ cities extends density moat into new markets
    - Request monthly active driver count and 12-month retention cohort by city
  - - MSME trust and brand recognition
    - Strong — 10-year MSME track record; GST compliance widely cited as driver of adoption
    - Adverse gig worker press damaging driver-side trust; MSME switching if reliability drops
    - Moderate — brand takes years to build but can erode faster
    - Near-term if TGPWU/BHRRC allegations escalate
    - Proactive compliance investment; driver welfare programs
    - Review driver churn rates, MSME NPS, and public sentiment tracking
  - - GST compliance and invoice infrastructure
    - Strong — automated GST billing is a structural advantage vs unorganized brokers
    - GST enforcement pushes unorganized to digitize via competing platforms
    - Low-moderate — Porter benefits from formalization pressure
    - Medium-term (3+ years for full formalization)
    - Porter is well-positioned to capture formalization-driven MSME adoption
    - Track GST enforcement actions against unorganized logistics; Porter market share trend
  - - Network effects (supply-demand flywheel)
    - Moderate — supply density improves ETA and booking rate which attracts more demand
    - Multi-homing by drivers and customers dilutes network lock-in
    - Moderate — multi-homing more common at individual consumer level
    - Ongoing; intensifies with Lalamove metro growth
    - MSME account tools and enterprise API integration deepen platform stickiness
    - Measure booking-rate correlation with driver density by city; track churn
  - - Technology platform and product depth
    - Strong — mature dispatch algorithms, multi-stop optimization, driver app, customer app
    - Lalamove's global tech investment; Delhivery's engineering scale
    - Low-moderate — Porter has product head start but not insurmountable tech moat
    - 2–3 years for a well-funded competitor to close feature gap
    - Continued R&D investment; differentiate on MSME-specific features
    - Review Porter's engineering headcount and R&D spend trend
  - - Geographic expansion pace (39+ cities 2026; 50 by 2030)
    - Strong — no direct competitor matches Porter's expansion roadmap in India
    - Blowhorn or Lalamove accelerating expansion; Delhivery entering new markets
    - Low — competitors' current expansion pace is slower
    - 3–5 years for competitor to match city footprint
    - Rapid Tier-2/3 city entry creates first-mover supply density advantage
    - Track Lalamove and Blowhorn city-entry announcements quarterly
  - - Regulatory risk — gig worker Code on Social Security 2025
    - Elevated — TGPWU/BHRRC allegations and pending regulatory implementation
    - PF and insurance mandates increasing per-driver costs by 10–25% (estimated)
    - Material — could compress margin structure significantly
    - Near-term if implementation proceeds in 2025–2026
    - Margin modeling with compliance cost scenario; driver welfare investment
    - Model PF and insurance cost impact on FY26 unit economics; request management view
  - - Capital adequacy vs peers post-Series F
    - Favorable — $200M Series F (May 2025) provides 18–24+ months runway at current burn
    - Lalamove capital injections enabling India subsidy; Delhivery capital for pivot
    - Low-moderate — Porter is well-capitalized; profitable FY25
    - Near-term; Lalamove subsidy campaigns possible
    - Porter's profitability reduces capital dependency; pricing flexibility
    - Track Lalamove India marketing spend and driver incentive program signals
  - - Commoditization risk — margin pressure from price competition
    - Low-moderate — Porter profitable at current commission; no evidence of margin erosion
    - Lalamove price subsidies in metros; Blowhorn competing on price in South India
    - Low for now — Porter's scale enables profitable pricing; competitors are smaller
    - Ongoing; intensifies if well-funded entrant subsidizes demand
    - Profitable unit economics provide pricing headroom; MSME stickiness limits churn
    - Track commission rate trend by city; check Lalamove pricing in overlapping markets
  - - Adverse evidence — TGPWU union allegations and BHRRC report (July 2025)
    - Adverse — public allegations of exploitative conditions; unfair driver suspensions
    - Driver attrition; regulatory action; brand damage among MSMEs and enterprises
    - Material — ESG and regulatory dimension; could affect funding, partnerships
    - Active — unresolved as of runDate
    - Transparent driver policy publication; union engagement; welfare investment
    - Obtain Porter's response to TGPWU allegations; review driver welfare policy
  notes: >-
    Threat severity ratings (low/moderate/material) are qualitative assessments based on
    available evidence. The gig worker regulatory risk (Code on Social Security 2025) severity
    is elevated to material given the TGPWU/BHRRC adverse reporting and pending regulatory
    timeline. Capital adequacy assessment is based on publicly reported Series F terms and
    FY25 profitability; actual cash on hand is not publicly disclosed. All time horizons are
    the research team's estimates and not company guidance.
