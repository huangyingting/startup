  - id: unit-economics-and-public-traction
    title: Unit Economics and Public Traction
    body: >-
      Porter's disclosed public traction metrics are strong by Indian logistics standards but limited in
      granularity. FY25 consolidated revenue of ₹4,339 crore implies a three-year CAGR of approximately 57%
      from FY23's ₹1,753.8 crore — sustained compound growth that few Indian logistics platforms have matched.
      The company operates in 22+ Indian cities as of mid-2025 and has onboarded a cumulative 1.2 million
      driver-partners. Net profit turned positive at ₹55 crore (consolidated) and ₹131 crore (standalone
      SmartShift Logistics) in FY25, ending three consecutive years of net losses. FY24 loss was ₹95.7 crore
      (down 45% from FY23's ~₹267 crore), showing steady loss reduction before the profit inflection.

      The implied gross margin of 17–20% is below marketplace-median for high-GMV platforms but reflects the
      higher fleet operator share inherent in LCV logistics versus last-mile parcel delivery. The key
      structural advantage is that every fleet operator payment is a variable cost tied to a completed revenue
      transaction — there are no idle-fleet costs, no depreciation drag, and no lease obligations from vehicle
      ownership. Porter's net revenue per trip is estimated at ₹84–₹750 across vehicle types at the published
      commission rate range. FY25 EBITDA reached approximately ₹48 crore versus FY24 EBITDA of approximately
      -₹112 crore — a ₹160 crore swing on ~₹1,605 crore of incremental revenue, implying meaningful marginal
      operating leverage on the fixed and semi-fixed cost base.

      Key private metrics not publicly disclosed include: GMV (total booking value), CAC for MSME customers
      and individual consumers, contribution margin by city tier and vehicle type, NRR (customer repeat booking
      rates by cohort), active versus cumulative driver-partner counts, and revenue breakdown by vehicle
      category. The MSME business — Porter's highest-value segment — drives outsize economics through
      predictable booking volumes, multi-vehicle trips, and multi-city contracts yielding higher average trip
      values. No MSME-specific revenue or retention metrics have been publicly disclosed, limiting independent
      assessment of this segment's contribution to the profitability inflection.
