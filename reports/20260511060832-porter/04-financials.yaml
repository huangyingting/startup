  - id: cost-structure-and-working-capital
    title: Cost Structure, Gross Margin, and Working Capital
    body: >-
      Porter's cost structure is dominated by fleet operator payments — the amounts remitted to driver-partners for
      completed trips — which represented 82.8% of total FY25 expenses, approximately ₹3,660–3,679 crore on total
      expenses of ~₹4,284 crore. This concentration is structurally advantageous: fleet operator costs are fully
      variable (paid only when a trip is completed), so Porter has no fixed fleet costs to cover during demand
      downturns. This variable cost architecture is the foundation of Porter's operating leverage and explains how
      modest revenue growth translates disproportionately into profit improvement at scale.

      Employee costs of approximately ₹285 crore (~6.5% of total expenses) span technology, operations, sales,
      and account management headcount. Technology and platform infrastructure costs are estimated at ~₹150 crore,
      covering cloud infrastructure, dispatch algorithm development, mobile app engineering, and GPS telemetry.
      Sales, general, and administrative costs — including marketing — are estimated at ~₹100–150 crore. These
      fixed and semi-fixed cost layers (estimated total: ~₹535–585 crore) represent the overhead load that must be
      covered from gross margin. As volumes scale, these costs dilute as a proportion of revenue, driving the
      margin expansion trajectory evident from FY24's ₹95.7 crore net loss to FY25's ₹55 crore net profit.

      Gross margin — revenue less fleet operator payments divided by revenue — is estimated at 17–20% for FY25.
      This is modest but expected for a marketplace in the early stages of operating leverage; the primary gross
      margin expansion driver is mix shift toward higher-value MSME trips and premium vehicle categories where the
      absolute commission per trip is larger relative to fleet operator share. Working capital dynamics are
      favorable: Porter collects payment from customers via app or digital wallet at or near trip completion and
      pays fleet operators via scheduled settlement cycles, creating a short positive working capital float.
      There is no inventory and no disclosed accounts receivable aging concern. Capital expenditure is negligible:
      Porter owns no vehicles (driver-partners finance their own fleet), so zero fleet capex burden exists.
      Platform and tech infrastructure capex is embedded in the technology cost estimates above.
