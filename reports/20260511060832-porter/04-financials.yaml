  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: MSME-CAC-and-consumer-CAC
      missingEvidence: >-
        Customer acquisition cost (CAC) for MSME customers and individual consumers, payback period
        by cohort vintage, and LTV estimates by customer segment
      whyItMatters: >-
        Without CAC and payback data, the unit economics thesis for both demand-side segments cannot
        be independently underwritten; the profitability inflection may mask adverse CAC trends in new
        geographies or vehicle categories.
      diligencePath: >-
        Request cohort-level CAC and payback analysis from CFO data room; require channel attribution
        between account management, organic app, and API/B2B channels for MSME vs consumer splits.
      relatedQuestionRefs:
        - QI007
        - QI008
      relatedTableRefs:
        - TI003
    - type: enumeration-incomplete
      severity: material
      topic: unit-economics-table-partial-coverage
      missingEvidence: >-
        Per-trip contribution margin by vehicle category and city tier, driver-partner acquisition cost
        and monthly attrition rate, MSME active account count and repeat booking rate
      whyItMatters: >-
        TI003 (unit economics table) covers only metrics derivable from aggregate public FY25 financials;
        the most decision-relevant unit economics (CAC, NRR, contribution by segment) are entirely absent
        from any public disclosure and cannot be derived or proxied from available data.
      diligencePath: >-
        Require Porter management to provide a unit economics summary model covering per-trip economics
        by vehicle and city, driver CAC, and MSME cohort retention in any pre-investment data room.
      relatedQuestionRefs:
        - QI007
        - QI008
      relatedTableRefs:
        - TI003
    - type: private-evidence-only
      severity: material
      topic: GMV-not-disclosed
      missingEvidence: >-
        Gross merchandise value (GMV) — total booking value of all trips processed through the platform
        in FY24 and FY25 — has never been publicly disclosed by Porter in any investor communication
        or financial filing
      whyItMatters: >-
        Without GMV, the true blended commission take-rate cannot be independently verified; a lower
        realized take-rate would imply the company is not fully recognizing its addressable commission,
        while a higher take-rate would signal pricing power not reflected in headline revenue figures.
      diligencePath: >-
        Request audited GMV figures from CFO data room; cross-reference against fleet operator payment
        totals and completed trip counts to validate implied take-rate.
      relatedQuestionRefs:
        - QI012
        - QI026
      relatedTableRefs:
        - TI005
    - type: private-evidence-only
      severity: moderate
      topic: cash-on-hand-post-series-f
      missingEvidence: >-
        Exact cash and cash equivalent balance post-Series F close (May 2025); post-investment balance
        sheet has not been published in any public filing or investor press release
      whyItMatters: >-
        Runway estimates and capital adequacy assessment depend on actual cash position; without it,
        analysts can only estimate based on implied prior-period cash plus series F proceeds, which
        may differ significantly from actual deployed and remaining balance.
      diligencePath: >-
        Request post-close audited balance sheet from CFO or Kedaara investor communication; validate
        against MCA annual return filings when FY26 data becomes available.
      relatedQuestionRefs:
        - QI018
      relatedTableRefs:
        - TI004
    - type: enumeration-incomplete
      severity: material
      topic: public-financial-gaps-table-partial-coverage
      missingEvidence: >-
        TI005 enumerates known financial disclosure gaps based on public sources as of May 2026; additional
        proprietary financial metrics (e.g., inter-segment transfer pricing, related-party transactions,
        international segment economics) are not in scope of public disclosure and may represent further
        gaps beyond those listed
      whyItMatters: >-
        The table captures identifiable gaps from public sources only; the full extent of financial
        information asymmetry between Porter management and external investors is larger than the
        eight gaps documented, particularly for international operations and MSME segment P&L.
      diligencePath: >-
        Conduct a comprehensive data room review prior to any investment; use the TI005 gap list as the
        minimum set of diligence requests, and supplement with international segment P&L, related-party
        disclosure, and inter-company loan schedule review.
      relatedQuestionRefs:
        - QI012
        - QI018
      relatedTableRefs:
        - TI005
    - type: missing-source
      severity: moderate
      topic: css-2025-platform-cost-liability-quantum
      missingEvidence: >-
        No public source quantifies the specific financial liability Porter would incur under India's
        Code on Social Security 2025 if mandatory platform PF contributions are enforced for all
        1.2 million cumulative driver-partners; the legislation is not yet fully notified as of May 2026
      whyItMatters: >-
        If CSS 2025 mandates platform-level PF contributions equivalent to 12% of driver-partner earnings,
        and applying this to ~₹3,669 crore of fleet operator payments would imply ~₹440 crore of
        additional cost — converting the FY25 ₹55 crore net profit into a material net loss and
        fundamentally altering the profitability narrative.
      diligencePath: >-
        Engage legal counsel to model CSS 2025 applicability to Porter's model; request Porter's own
        legal opinion and provisioning assumptions; monitor MoLE notification timeline for gig-platform
        provisions.
      relatedQuestionRefs:
        - QI022
        - QI028
