  - id: buyer-segment-analysis
    title: Buyer Segments, User Profiles, and Adoption Triggers
    body: >
      Porter's market is organized around three primary buyer segments with distinct workflows, budget structures,
      and adoption triggers:

      Segment 1 — MSMEs: India's 63+ million MSMEs are the primary growth driver. MSMEs use Porter for raw material
      procurement runs, inter-factory transfers, finished goods delivery to distributors and retailers, and e-commerce
      fulfilment. The adoption trigger is cost savings vs. unorganized brokers (typically 15–25% savings on
      transparency-driven pricing), plus digital GST invoicing which satisfies tax compliance needs. Budget owner is
      the business owner or logistics head. MSME ARPU (average revenue per user/booking) is higher than individual
      users due to multi-stop trips and heavier loads. According to Redseer, only ~20% of MSMEs currently use online
      logistics platforms, implying a large unconverted base.

      Segment 2 — Individual/Residential Users: Urban households using Porter for home moves (household goods,
      furniture, appliances) and personal deliveries. Adoption trigger is price transparency and real-time tracking
      vs. informal packers-and-movers. Budget owner is the individual consumer. This segment is more price-sensitive
      and has lower repeat frequency than MSMEs.

      Segment 3 — Enterprise/E-commerce: Larger companies and D2C brands with regular intra-city delivery
      requirements. Adoption trigger is SLA reliability, API integration, and centralized billing. Budget owner is
      the supply chain or logistics manager. Porter serves this segment via its business API and scheduled fleet
      contracts.

      The MSME segment is strategically the most important for Porter: it delivers higher trip values, higher
      frequency, and better unit economics. India's MSME digitalization wave — accelerated by GST implementation,
      UPI adoption, and PM GatiShakti policy — is converting manual logistics procurement to platform-based
      booking, directly expanding Porter's addressable MSME base.
    claimRefs:
      - CM011
      - CM012
      - CM013
      - CM014
      - CM015
