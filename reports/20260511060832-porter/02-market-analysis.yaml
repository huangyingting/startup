chapter:
  number: 2
  title: Market Analysis
  summary: >
    Porter operates in India's intra-city logistics market, estimated at ~$33.5 billion in 2025 and projected to
    grow to $43 billion by 2031 at ~4.2–5% CAGR. The market is structurally fragmented — over 70% unorganized —
    and serves MSMEs, enterprises, and individuals needing same-day LCV, mini-truck, and two-wheeler delivery
    within cities. Key growth drivers include India's e-commerce boom, urbanization, PM GatiShakti infrastructure
    policy, and MSME digitalization. Porter's addressable base is deepening as only ~20% of MSMEs currently use
    online logistics platforms, leaving significant headroom for organized digital adoption.
sections:
  - id: market-definition-boundaries
    title: Market Definition and Boundaries
    body: >
      India's intra-city logistics market encompasses all movement of goods within a single city's boundaries —
      including same-day delivery, point-to-point commercial cargo, household moves, and scheduled multi-stop
      business deliveries — using light commercial vehicles (LCVs, capacity ≤ 3.5 tonnes), mini trucks, and
      two-wheelers. This segment is distinct from inter-city road freight (long-haul trucking), first/last-mile
      e-commerce fulfilment from warehouses, or international air/sea cargo. The relevant vehicle category for
      Porter's core market is LCVs in the sub-3.5-tonne segment, dominated by models such as the Tata Ace, Mahindra
      Supro, and Ashok Leyland Dost.

      The primary demand driver is the MSME economy: India's 63+ million registered MSMEs require frequent, reliable,
      intra-city goods movement for manufacturing inputs, finished goods, inter-business B2B transfers, and e-commerce
      order fulfilment. Individual and residential users (household moves, single-item deliveries) form a secondary
      segment. Enterprises needing managed or contracted intra-city fleets represent a third category.

      The geographic boundary for Porter's current TAM is Indian urban agglomerations with population exceeding 1
      million, where commercial vehicle utilization rates justify a marketplace business model. Porter operates in
      22+ such cities (as of May 2025) with expansion underway. The UAE represents Porter's first international
      market. For sizing purposes this chapter primarily focuses on the India intra-city market given data availability.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
    tableRefs:
      - TM001
  - id: market-sizing
    title: Market Sizing — TAM, SAM, and SOM
    body: >
      The India intra-city logistics market TAM is estimated at approximately $33.5 billion in 2025 by Mordor
      Intelligence, projected to reach $43 billion by 2031 at a 4.2–5% CAGR. This estimate covers all intra-city
      goods movement across vehicles, organized and unorganized. The Shadowfax 3PL industry report (2025) estimates
      the broader India third-party logistics (3PL) market at approximately $25–30 billion, of which intra-city is
      the dominant sub-segment.

      Sizing layers: At the TAM level, $33.5 billion encompasses all commercial vehicle-based intra-city cargo
      movements. A conservative SAM (Serviceable Addressable Market) for organized tech-enabled platforms would
      adjust for the share of trips that are digitizable (currently ~30% of the market is organized) and
      commercially accessible to app-based booking — yielding an estimated SAM of $8–10 billion at current
      penetration rates. Porter's SOM (Serviceable Obtainable Market) at its current 22-city presence is a further
      subset; using Porter's FY25 revenue of ₹4,339 crore (~$515M) as a current run-rate, Porter commands roughly
      5–6% of its SAM, with significant headroom to grow both in depth (penetration in existing cities) and breadth
      (new cities).

      Important sizing caveats: Mordor Intelligence's $33.5 billion figure uses a broad market definition including
      all commercial LCV movement regardless of platform-enablement. The Redseer report (2024) characterizes the
      organized portion as ~30% of the total, with 70% still unorganized. Since Porter only monetizes the organized/
      platform-enabled segment, its true TAM is considerably smaller than headline figures suggest. The CAGR of
      4.2–5% appears conservative given the structural shift from unorganized to organized logistics that India's
      MSME digitalization is accelerating.
    claimRefs:
