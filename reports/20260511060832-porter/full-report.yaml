      - number: '5.5'
        title: Product Roadmap and Platform Maturity
        blocks:
          - type: paragraph
            body: >
              Porter's product roadmap, as inferred from public announcements (no official published roadmap exists), is
              focused on three themes: geographic expansion, MSME deepening, and driver economics improvement.

              Geographic expansion: Porter is actively entering secondary and tertiary Indian cities with high MSME
              density — Calicut, Tiruppur, Rajkot (launched 2025–26), and 8 additional MSME-focused cities announced for
              2026. The UAE market represents a live international pilot for model portability. Target of 50 cities by
              2030 implies ~28 net new city launches over four years — approximately 7 per year.

              MSME deepening: Porter's December 2024 announcement of partnerships with MSME clusters (textile hubs,
              engineering clusters, manufacturing centers) indicates a B2B sales motion layered on top of the consumer
              marketplace. API integration for business accounts is a published feature, but depth of enterprise product
              maturity is unverified.

              Driver economics: The gig worker regulatory pressure and union allegations are likely accelerating
              internal product work on driver earnings transparency, grievance tools, and social security compliance
              features. No public announcements of specific driver welfare product features have been made as of
              mid-2026.

              Maturity assessment: Porter's core booking-dispatch-payment loop is production-grade with demonstrated
              scalability to ₹4,339 crore in FY25 revenue. The analytics/ML layer (dynamic pricing, ETA prediction) is
              operational but not independently validated. The enterprise/API product and international expansion (UAE)
              are early-stage. Gig worker compliance tooling is a product gap that is increasingly material.
            claimRefs:
              - CE024
              - CE025
              - CE026
              - CE027
