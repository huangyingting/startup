  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model, Pricing, and Revenue Quality
        blocks:
          - type: paragraph
            body: >-
              Porter operates a single-mechanism revenue model: a commission charged on every completed
              goods-transportation trip booked through its platform. This commission — ranging from 14% to 30% of the
              total booking value depending on vehicle type, distance, and city tier — is recognized immediately upon
              trip completion under Ind AS 115, creating zero deferred revenue and a clean, per-transaction revenue
              stream. FY25 consolidated revenue reached ₹4,339 crore, up 57% from FY24's ₹2,734 crore, which itself was
              up 56% from FY23's ₹1,753.8 crore. Goods transportation revenue constituted approximately 99% of FY25
              revenue; other operating revenue (ancillary platform technology fees and value-added services) comprised
              the remaining ~1%. There is no disclosed SaaS, subscription, or asset-based revenue stream.

              Revenue quality is high by marketplace standards. Recognition is point-in-time (per completed trip), not
              deferred, minimizing revenue reversal risk. The absence of contract lock-in means revenue is fully driven
              by volume and mix — a transparency advantage versus platforms with complex bundled contracts. Porter's
              commission rate of 14–30% compares favorably to global on-demand logistics benchmarks (Lalamove: 15–25% in
              comparable Asian markets). The two-wheeler segment commands lower absolute commission per trip (₹11–₹50)
              while medium LCV and large truck bookings yield ₹270–₹2,400, so the strategic emphasis on MSME clients
              booking larger vehicles is the primary margin lever within the commission model.

              Porter has not disaggregated B2B enterprise versus consumer booking volumes, nor disclosed GMV — the total
              value of all bookings flowing through the platform. Implied GMV at a blended 20% commission rate on ₹4,339
              crore revenue would be approximately ₹21,700 crore; at 30% blended rate it would be ~₹14,500 crore. This
              wide range underscores the sensitivity of the GMV estimate to the true blended take-rate, which Porter has
              not formally disclosed by vehicle category or city tier.

              The GTM motion for revenue growth centers on MSME account managers, organic digital discovery through the
              Porter app, and B2B API integrations that embed Porter booking into enterprise ERP and dispatch systems.
              Porter does not publicly disclose customer acquisition cost (CAC) or payback period — a gap that limits
              independent underwriting of sales efficiency. The company's volume-driven, repeat-purchase model implies
              structurally lower effective CAC than single-purchase marketplaces, but cohort-level retention data is
              required to substantiate this thesis.
