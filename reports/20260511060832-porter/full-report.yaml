      - number: '4.4'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >-
              Porter's $200 million Series F in May 2025 — led by Kedaara Capital and Wellington Management at a $1.2
              billion post-money valuation — provides substantial capital headroom for its expansion agenda. The round
              was accompanied by secondary exits for Peak XV Partners (formerly Sequoia India) and Kae Capital,
              indicating partial early-investor liquidity rather than a distressed exit. CCI approved Kedaara Capital's
              stake acquisition on 8 July 2025, confirming regulatory completion of the share transfer. Total historical
              capital raised spans approximately $400+ million across approximately seven rounds from Seed through
              Series F, with prior investors including Tiger Global, Lightrock (formerly LGT Impact), and Vitruvian
              Partners. The full round-by-round chronology with investor names and dates is documented in Chapter 1
              (Company Overview); Financials mints its own claims below for facts material to capital adequacy analysis.

              Cash on hand post-Series F is not publicly disclosed; however, given that Porter reached consolidated
              profitability in FY25 (net profit ₹55 crore), the company is no longer burning cash on an operating basis.
              Prior to profitability, FY24 net loss was ₹95.7 crore — an annual run-rate that would have implied
              multi-year runway even before the Series F capital injection. With operating profitability achieved, the
              $200M primarily funds growth initiatives rather than sustaining operations. No long-term debt has been
              publicly disclosed; Porter's asset-light marketplace model (driver-partners own vehicles) generates no
              fleet-financing debt obligations.

              Planned use of Series F proceeds centers on: (1) geographic expansion to 50 cities by 2030 from 22+ in
              mid-2025; (2) technology platform investment including AI-driven dispatch and route optimization; (3)
              driver-partner welfare programs and safety infrastructure ahead of Code on Social Security 2025
              compliance; and (4) international expansion, with UAE operations already launched as a beachhead market
              with further geographies signaled. The company's capital adequacy is strong: profitable operations, no
              fleet capex burden, no disclosed debt, and $200M in fresh capital create a well-funded balance sheet for a
              3–5 year expansion cycle. The primary financing dependency risk is the CSS 2025 legislation, which could
              impose platform-level gig-worker social security contributions that partially convert the fully variable
              fleet operator cost base into a statutory fixed obligation.
