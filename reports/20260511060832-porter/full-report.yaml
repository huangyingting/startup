            body: >-
              MoRTH's MV Aggregator Guidelines 2025 propose a commission/take-rate cap of 10-15%. Porter's current
              blended take rate is approximately 14-16%. Full enforcement at a 10-12% cap could reduce annual revenue by
              Rs 400-600 crore at FY25 GMV scale, turning the Rs 55 crore FY25 profit into a substantial loss. No
