  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Porter faces a materially elevated regulatory risk stack for FY25-26. The highest-severity item is the
              Motor Vehicle Aggregator Guidelines 2025 (MV Aggregator Guidelines), notified by the Ministry of Road
              Transport and Highways (MoRTH). These guidelines propose a commission or take-rate cap of 10-15% for
              vehicle aggregators. Porter's current blended take rate is approximately 14-16% of GMV, meaning even a 15%
              cap would constrain upside pricing, while a 10-12% cap would require fundamental revenue model
              restructuring. At FY25 revenue of Rs 4,339 crore, a forced take-rate reduction from 15% to 12% would
              translate to an estimated annual revenue shortfall of Rs 400-600 crore if costs remain unchanged. The
              enforcement timeline is uncertain — MoRTH has not published a firm enforcement commencement date —
              creating a regulatory overhang without a clear resolution window. Porter has not publicly disclosed its
              compliance strategy, and no industry carve-out for cargo or goods-transport aggregators has been
              announced. Industry bodies including IAMAI and CII have lobbied for amendments, but their effectiveness is
              unproven.

              The Code on Social Security 2020, with gig worker provisions effective November 2025, imposes a mandatory
              contribution of 1-2% of annual turnover to a national gig worker welfare fund. At FY25 revenue of Rs 4,339
              crore, this represents an annual cost of Rs 43-87 crore, confirmed as a material and unavoidable expense
              from FY26. Unlike MV Aggregator Guidelines — which remain subject to enforcement timing uncertainty — the
              Code on Social Security is legally notified law and Porter's driver-partners as platform workers fall
              squarely within its scope. The cost is partly industry-wide, potentially allowing partial pass-through to
              fleet operators or customers over time, but the near-term earnings impact is real and non-avoidable.

              Active labor litigation by the Telangana Gig and Platform Workers Union (TGPWU) in Hyderabad alleges that
              Porter suspends driver-partners without due process and fails to guarantee per-kilometre rate floors.
              Porter has denied these allegations, and as of May 2026 no formal labor court ruling has been issued.
              However, the case establishes a regulatory precedent: if the TGPWU succeeds in securing a formal labor
              tribunal ruling, it could trigger classification scrutiny of Porter's gig workers as employees across
              other states, expanding financial and operational liability significantly. On the competition law side,
              the Competition Commission of India (CCI) approved Kedaara Capital's stake acquisition in Porter on July
              8, 2025. This CCI clearance is positive for the capital raise, but Porter will face renewed CCI oversight
              if it pursues further acquisitions or if its market share crosses concentration thresholds. India's MV
              Aggregator Guidelines were first proposed in 2020 and have undergone multiple revisions, indicating an
              iterative and uncertain regulatory path for Porter and sector peers alike.
            claimRefs:
