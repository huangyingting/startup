      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: >
              Porter's asset-light platform model creates deep dependencies on a small set of external counterparties,
              each of which represents a potential single point of failure with no fully disclosed fallback. The most
              critical technology dependency is MapMyIndia (Mappls). Porter's dispatch engine relies on Mappls for
              real-time road mapping, routing, and navigation across its 22-city footprint. MapMyIndia markets its API
              as covering 6 million-plus kilometres of Indian roads and claims superior coverage of Indian lane-level
              detail. No backup mapping provider has been publicly disclosed by Porter, creating a single-vendor
              concentration risk for the most operationally critical function. No SLA between Porter and MapMyIndia has
              been disclosed publicly; any MapMyIndia outage, API deprecation, or pricing renegotiation could cause
              immediate dispatch failure with no disclosed alternative.

              Payment processing relies on Razorpay and UPI. RBI policy changes to UPI incentive structures — such as
              modifications to the zero-MDR framework or changes to transaction fee caps — could affect Porter's payment
              cost structure. Razorpay itself has no disclosed backup payment processor arrangement with Porter. India's
              UPI ecosystem is robust with 13+ billion monthly transactions, reducing outage probability, but regulatory
              policy risk from ongoing RBI deliberations on payment economics is non-trivial for a platform of Porter's
              scale.

              The fleet operator dependency is Porter's largest cost exposure. Fleet payouts of Rs 3,660- 3,679 crore in
              FY25 represent 82.8% of revenue. Porter does not own vehicles; it depends entirely on independent fleet
              operators and driver-partners. If a significant portion of the driver base migrates to a competitor
              (Shadowfax, Lalamove, or a new entrant offering better commission rates), Porter's supply-side capacity
              would deteriorate rapidly. No fleet operator retention contract terms are disclosed publicly. Porter's
              capital-provider concentration also warrants attention: Kedaara Capital and Wellington Management jointly
              led the Series F at $200 million, creating a scenario where deterioration in either investor's portfolio
              strategy could complicate follow-on support. Porter has not disclosed its cloud provider or any disaster
              recovery arrangement, creating a further hidden dependency.
