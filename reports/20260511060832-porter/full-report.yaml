      - number: '6.4'
        title: Retention, Repeat Usage, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              No net revenue retention (NRR), gross revenue retention (GRR), cohort-level churn, or renewal-rate data
              has been disclosed by Porter in any public filing, press interview, or investor communication as of May
              2026. This absence is the most critical unverifiable dimension of Porter's customer story. Several
              indirect indicators suggest structurally high repeat usage, however. First, MSME logistics needs are
              inherently recurring: a small manufacturer or trader that uses Porter to move goods daily or weekly has no
              obvious substitute combining on-demand booking, real-time tracking, and intra-city LCV coverage at
              Porter's geographic and vehicle-type breadth. Second, revenue grew 57% year-on-year in FY25 on a large
              FY24 base, implying that customer retention is at least sufficient to sustain net expansion at this rate
              when combined with new customer acquisition. Third, the Google Play rating of 4.1/5 has remained stable,
              indicating no mass churn event driven by product deterioration or systemic service failure. Fourth,
              driver-partner gross payouts closely approximate the revenue figure, confirming that growth reflects
              genuine transaction volume. Against these positive signals, the TGPWU complaint (2025) about unfair driver
              suspensions in Hyderabad introduces potential supply-side instability that could manifest as
              service-quality degradation for customers. MSME price sensitivity—estimated switching trigger at 5–10%
              cost differential—means customer loyalty is primarily tied to operational reliability and price
              competitiveness rather than strong switching-cost lock-in. Without NPS, CSAT, or cohort retention data
              from a due-diligence data room, the durability of Porter's customer relationships cannot be independently
              confirmed.
