      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              The India intra-city logistics market TAM is estimated at approximately $33.5 billion in 2025 by Mordor
              Intelligence, projected to reach $43 billion by 2031 at a 4.2–5% CAGR. This estimate covers all intra-city
              goods movement across vehicles, organized and unorganized. The Shadowfax 3PL industry report (2025)
              estimates the broader India third-party logistics (3PL) market at approximately $25–30 billion, of which
              intra-city is the dominant sub-segment.

              Sizing layers: At the TAM level, $33.5 billion encompasses all commercial vehicle-based intra-city cargo
              movements. A conservative SAM (Serviceable Addressable Market) for organized tech-enabled platforms would
              adjust for the share of trips that are digitizable (currently ~30% of the market is organized) and
              commercially accessible to app-based booking — yielding an estimated SAM of $8–10 billion at current
              penetration rates. Porter's SOM (Serviceable Obtainable Market) at its current 22-city presence is a
              further subset; using Porter's FY25 revenue of ₹4,339 crore (~$515M) as a current run-rate, Porter
              commands roughly 5–6% of its SAM, with significant headroom to grow both in depth (penetration in existing
              cities) and breadth (new cities).

              Important sizing caveats: Mordor Intelligence's $33.5 billion figure uses a broad market definition
              including all commercial LCV movement regardless of platform-enablement. The Redseer report (2024)
              characterizes the organized portion as ~30% of the total, with 70% still unorganized. Since Porter only
              monetizes the organized/ platform-enabled segment, its true TAM is considerably smaller than headline
              figures suggest. The CAGR of 4.2–5% appears conservative given the structural shift from unorganized to
              organized logistics that India's MSME digitalization is accelerating.
            claimRefs:
