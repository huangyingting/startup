      - number: '3.5'
        title: Moat Durability, Commoditization Risk, and Adverse Evidence
        blocks:
          - type: paragraph
            body: >-
              Porter's core moats — supply density, MSME trust, GST compliance infrastructure, and a ten-year
              operational head start — appear durable over a three-year horizon but face identifiable risks that warrant
              ongoing monitoring. Supply density is the hardest moat to replicate quickly: 1.2 million cumulative
              driver-partners represents a decade of acquisition and retention investment that would cost hundreds of
              millions and multiple years to replicate. The MSME trust moat is reinforced by GST compliance capabilities
              that unorganized competitors structurally cannot match and that Lalamove and Blowhorn have not fully
              replicated at scale in India. Porter achieved ₹55 crore net profit in FY25 — a milestone no named direct
              intra-city LCV competitor has publicly reached — which enhances its capital efficiency and ability to
              sustain a price discipline that loss-making competitors cannot indefinitely match. The most significant
              commoditization risk is formalization pressure on the unorganized market: if GST enforcement forces broker
              networks to digitize, they could partner with technology platforms or create competitive supply-side
              pressure on driver recruitment. Adverse evidence centers on the TGPWU gig worker union allegations and
              BHRRC report (July 2025) documenting exploitative working conditions, unsafe loads, and unfair driver
              suspensions against Porter. If India's Code on Social Security 2025 is implemented to impose platform PF
              contributions and accident insurance obligations, Porter's driver cost structure could increase
              materially, compressing margins and potentially creating cost parity with less compliant competitors. The
              Competition Commission of India approved Porter's Series F investment structure in July 2025 without
              remedies, signaling no immediate antitrust competition concern, but ongoing gig worker policy developments
              and the TGPWU allegations warrant diligence-stage monitoring. Delhivery's capital depth and technology
              maturity represent the most credible long-term platform-level threat if it were to pivot aggressively into
              intra-city LCV — a move not currently signaled but technically feasible given its existing city network
              and driver/fleet relationships. Porter's targeted expansion to 39 or more cities by 2026 and 50 cities by
              2030 is intended to extend the supply density moat into new Tier-2 and Tier-3 MSME markets before
              well-funded competitors can establish footholds.
