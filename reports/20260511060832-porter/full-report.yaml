      - number: '2.5'
        title: Market Structure, Competitive Dynamics, and Outlook
        blocks:
          - type: paragraph
            body: >
              India's intra-city logistics market is approaching an organizational inflection — analogous to the
              ride-sharing consolidation that occurred in India's cab market between 2015 and 2020. Three market
              dynamics are reshaping the competitive landscape:

              First, digital adoption acceleration: The percentage of MSMEs using online logistics is growing from ~20%
              in 2025. Platforms that build MSME trust through price transparency, GST compliance, and reliability have
              a compounding advantage as each MSME that converts brings multi-year booking frequency.

              Second, supply-side commoditization risk: As driver-partner networks scale (Porter: 1.2M, others growing),
              the moat from supply density weakens unless differentiated by driver earnings, tech tools, and retention
              programs. The gig worker regulatory environment — with India's Social Security Code 2020 mandating
              contributions — will structurally increase driver costs across the industry, narrowing margin
              differentiation.

              Third, geographic expansion optionality: India has 53 cities with populations over 1 million, and 500+
              cities with populations over 100,000. Porter at 22+ cities (expanding to 39+ by 2026, targeting 50 by
              2030) is still in mid-expansion mode. Tier-2 cities have lower average trip values but also lower supply
              acquisition costs and less competition from unorganized players, creating favorable unit economics for
              early movers.

              Market outlook: The India intra-city logistics market is expected to grow to $43 billion by 2031, driven
              by MSME digitalization, e-commerce growth, and urbanization. The organized share is expected to rise from
              ~30% to 40–45% over this period. Porter, as the market leader in the LCV intra-city segment with a head
              start of 10+ years, is well positioned to capture disproportionate share of this shift.
            claimRefs:
              - CM023
              - CM024
              - CM025
              - CM026
