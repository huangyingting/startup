  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >
              India's intra-city logistics market encompasses all movement of goods within a single city's boundaries —
              including same-day delivery, point-to-point commercial cargo, household moves, and scheduled multi-stop
              business deliveries — using light commercial vehicles (LCVs, capacity ≤ 3.5 tonnes), mini trucks, and
              two-wheelers. This segment is distinct from inter-city road freight (long-haul trucking), first/last-mile
              e-commerce fulfilment from warehouses, or international air/sea cargo. The relevant vehicle category for
              Porter's core market is LCVs in the sub-3.5-tonne segment, dominated by models such as the Tata Ace,
              Mahindra Supro, and Ashok Leyland Dost.

              The primary demand driver is the MSME economy: India's 63+ million registered MSMEs require frequent,
              reliable, intra-city goods movement for manufacturing inputs, finished goods, inter-business B2B
              transfers, and e-commerce order fulfilment. Individual and residential users (household moves, single-item
              deliveries) form a secondary segment. Enterprises needing managed or contracted intra-city fleets
              represent a third category.

              The geographic boundary for Porter's current TAM is Indian urban agglomerations with population exceeding
              1 million, where commercial vehicle utilization rates justify a marketplace business model. Porter
              operates in 22+ such cities (as of May 2025) with expansion underway. The UAE represents Porter's first
              international market. For sizing purposes this chapter primarily focuses on the India intra-city market
              given data availability.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
