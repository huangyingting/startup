    rows:
      - - Revenue Growth Durability
        - >-
          57% YoY sustained for two consecutive years on large base; structural MSME logistics demand supports
          continuation
        - >-
          Growth rate may decelerate as cities mature and competitive intensity increases; no cohort data to confirm
          durability
        - High weight — largest value driver
        - Whether 40%+ growth can be sustained in years 3–5 without capital-intensive subsidies
      - - Operating Leverage
        - >-
          82.8% variable cost base; each incremental revenue rupee flows at high incremental margin; no fixed fleet
          costs
        - >-
          MV Aggregator Guidelines and Code on Social Security could convert variable costs to semi-fixed statutory
          obligations
        - High weight — core return driver
        - Whether regulatory framework restructures variable cost base before profitability scales sufficiently
      - - Regulatory Environment
        - No adverse regulatory notification as of May 2026; India logistics sector traditionally lightly regulated
        - MV Aggregator Guidelines (MoRTH) and Code on Social Security 2020 both on 12–24 month notification timeline
        - Critical — binary risk
        - Whether both instruments are notified in their current form before FY28
      - - Market Position and Moat
        - >-
          #1 by GMV in Indian intra-city logistics per Redseer 2025; 1.2M driver-partners create supply-side coverage
          moat
        - >-
          Lalamove re-investment or post-IPO Shadowfax price competition could erode market share without structural
          lock-in
        - Medium weight — supportive but not sufficient alone
        - Whether market leadership at platform level translates to pricing power as MSME market matures
      - - IPO and Exit Pathway
        - >-
          First profitable year in FY25 establishes IPO readiness; Delhivery and Shadowfax provide exit comparable
          precedent
        - IPO market conditions in FY27–28 uncertain; preference stack and liquidation provisions not publicly modelled
        - Medium weight — time-bound
        - Whether IPO markets can absorb a logistics unicorn IPO at $2B+ in FY27–FY28 India conditions
      - - Geographic Concentration
        - 22+ cities already reduces concentration; 50-city plan by 2030 further distributes revenue risk
        - Bengaluru estimated 25–30% of revenue; city-specific shock would have outsized P&L impact
        - Low-to-medium weight — manageable but non-trivial
        - Whether new city unit economics match Bengaluru-era metrics or deteriorate with smaller city penetration
    notes: >-
      Bull and bear arguments reflect the state of public evidence as of May 2026. Regulatory risk assessments are based
      on publicly available policy consultation documents; no formal regulatory notification has been issued. All weight
      assessments are qualitative and intended to guide diligence prioritisation rather than formal probabilistic
      modelling.
