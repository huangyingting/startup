      - number: '7.4'
        title: Financial and Business Model Risk
        blocks:
          - type: paragraph
            body: >
              Porter's financial risk profile is shaped by take-rate compression, high variable cost concentration, thin
              margin buffers, and valuation assumptions that depend on sustained revenue growth without regulatory
              headwinds. Take-rate compression is the most material near-term financial risk. Porter's blended take rate
              of approximately 14-16% sits at the upper boundary of the MV Aggregator Guideline's proposed 15% cap and
              well above its 10-12% floor scenarios. At FY25 scale, each 100-basis-point reduction in take rate reduces
              revenue by approximately Rs 290 crore at constant GMV. A forced reduction from 15% to 12% would cost
              approximately Rs 860 crore in annual revenue — wiping out the Rs 55 crore FY25 profit and creating
              significant losses unless cost structures adjust proportionally.

              Fleet payouts (82.8% of revenue) create limited flexibility: reducing driver commissions risks supply-side
              attrition, while passing higher costs to MSME customers risks demand destruction in a price-sensitive
              segment. The gig worker welfare fund adds a further Rs 43-87 crore annually at 1-2% of turnover — a cost
              that grows proportionally with revenue, reducing operating leverage benefits as the company scales. These
              two regulatory costs together represent a potentially Rs 130-160 crore annual headwind for FY26 under a
              combined enforcement scenario.

              Porter's $1.2 billion valuation at approximately 2.3x FY25 revenue is achievable under base-case growth
              assumptions (30-40% annual revenue growth) but breaks under regulatory stress scenarios combining
              take-rate compression and increased operating costs. Working capital risk exists because MSME customers
              may have delayed payment cycles relative to the near-instant payouts required by fleet operators.
              Shadowfax's IPO risk factors — directly comparable to Porter's as an Indian intra-city logistics platform
              — cite working capital volatility, driver advance payment obligations, and credit risk from SME customers
              as meaningful financial risks. Porter's asset-light model, while capital-efficient in growth mode, means
              the company bears full regulatory risk without asset backing that would enable rapid cost-structure
              adjustment in an enforcement scenario.
