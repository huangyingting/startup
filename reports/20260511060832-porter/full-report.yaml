      - number: '8.5'
        title: Thesis-Break Triggers and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Five thesis-break triggers — each with a defined threshold, P&L impact, and monitoring mechanism —
              constitute the kill criteria for ongoing portfolio monitoring. First, MV Aggregator Guidelines
              notification: if MoRTH notifies take-rate cap rules requiring an 80% gross payout floor, Porter's
              commission income on affected vehicle categories would decline by an estimated 25–40% on those bookings,
              reducing blended take rates by 5–7 percentage points and eliminating FY25 EBITDA in a single year. This is
              the highest-severity trigger. Second, gig worker reclassification: formal implementation of the Code on
              Social Security 2020 with mandatory social security contributions for platform workers would convert 2–3%
              of gross payouts from fully variable to semi-fixed costs, reducing operating leverage and increasing unit
              cost per completed trip. Third, city expansion economics deterioration: if early-stage cities (launched
              post FY24) fail to reach contribution break-even within 18 months, capital deployment from Series F
              proceeds would be consumed faster than modelled, requiring additional capital raises at potentially
              dilutive terms. Fourth, Bengaluru revenue shock: a regulatory, competitive, or demand-side shock
              specifically in Bengaluru (estimated 25–30% of total revenue) would produce a P&L impact disproportionate
              to its geography. Fifth, competitive price war: Lalamove's India re-investment or Shadowfax's potential
              post-IPO market share push could initiate a take-rate compression cycle that, combined with any regulatory
              floor, could simultaneously squeeze both revenue and costs.

              No single trigger has materialized as of the report date. The MV Aggregator Guidelines remain under
              consultation, and the Code on Social Security implementation timeline extends to at least FY27 per current
              government statements.
