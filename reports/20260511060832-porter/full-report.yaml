  - id: FU001
    title: Porter Customer Journey Map
    type: journey-map
    layout: standard
    summary: >
      End-to-end customer journey from MSME or consumer awareness of Porter through repeat booking and potential account
      expansion to Porter Business API, highlighting key touchpoints, friction points, and differentiation moments at
      each stage.
    claimRefs:
      - CU001
      - CU006
      - CU023
      - CU029
      - CU030
    data:
      items:
        - label: Awareness
          value: >-
            Google search for intra-city truck or LCV rental | MSME peer referral within trade networks | Porter app or
            web portal discovery | Social media advertising
          note: >-
            Primary discovery channels are Google search and MSME peer referral. Urban MSMEs in manufacturing and
            trading rely heavily on word-of-mouth within industry networks.
        - label: Consideration
          value: >-
            App download from Google Play or App Store | Price estimate via app by vehicle type and route | Comparison
            with unorganised local truck operators | Coverage check by pin code
          note: >-
            Low friction: app download to first price estimate takes under 2 minutes. Price transparency is a key
            differentiator versus unorganised alternatives.
        - label: First Booking
          value: >-
            Vehicle selection (mini-truck, LCV, tempo) | Driver dispatch with real-time GPS tracking | Digital payment
            via UPI, card, or wallet | GST-compliant digital invoice generation
          note: >-
            GST-compliant invoicing is a significant MSME differentiator; unorganised operators typically cannot provide
            tax-compliant expense records required for MSME accounting.
        - label: Repeat Use
          value: >-
            MSME bookings on daily or weekly cadence | App saves frequent routes and addresses | Customer support via
            in-app chat | Driver rating and feedback system
          note: >-
            Repeat use driven by reliability, coverage, and billing convenience rather than an explicit loyalty
            programme; no published points or rewards scheme as of 2025.
        - label: Account Expansion
          value: >-
            Migration to Porter Business portal for multi-vehicle fleet booking | API integration with supply-chain ERP
            | Monthly invoicing and credit terms | Dedicated account manager
          note: >-
            Enterprise expansion via Porter Business API creates contractual stickiness and significantly higher GMV per
            account versus spot-booking MSME relationships.
        - label: Advocacy
          value: >-
            MSME peer referral within trade associations and industry networks | Google Play and App Store reviews |
            Anonymous testimonials on Porter website
          note: >-
            Organic referral is estimated to be the primary MSME acquisition channel. No formal referral programme has
            been publicly disclosed by Porter as of May 2026.
