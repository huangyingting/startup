  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Porter serves five identifiable customer segments distinguished by buyer type, use case, booking
              frequency, and strategic value to the platform. The primary and largest segment is MSMEs—small
              manufacturers, traders, retailers, and distributors that book light commercial vehicles (LCVs) or
              mini-trucks on a daily or weekly basis to move goods between warehouses, suppliers, and end-customers
              within a city. This segment exhibits the highest repeat-usage frequency and is estimated, through
              market-structure analysis, to account for 60–70% of Porter's ₹4,339 crore FY25 revenue, though the company
              has disclosed no segment-level breakdown. Individual consumers form the second segment, using Porter for
              home shifting, large-appliance delivery, and one-off moves; booking frequency is low and competition from
              the unorganised sector (independent truck operators) is intense. Enterprise and B2B accounts represent a
              growing third segment: larger companies integrate with the Porter Business API for contracted fleet
              services, supply-chain logistics, and multi-stop routing. The fourth segment comprises e-commerce
              fulfilment operators—small online sellers and marketplace partners that use Porter for last-mile delivery
              of bulky or fragile items unsuited to standard courier networks. The fifth and emerging segment is 3PL and
              white-label logistics partners embedding Porter fleet capacity within their own platforms. Geographically,
              Bengaluru (Porter's home city) is the largest market, followed by Mumbai, Delhi-NCR, Hyderabad, Chennai,
              Kolkata, and Pune; fourteen additional tier-2 cities round out the 22-city Indian footprint. UAE was
              launched in 2024 as a distinct international deployment. No formal geographic revenue breakdown has been
              published by the company.
