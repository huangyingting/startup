      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Entry Discipline: $1.2B Valuation is Reasonable but MV Aggregator Risk Requires Conviction'
            body: >-
              The $1.2 billion Series F valuation is defensible on financial metrics: 2.8× EV/Revenue on a 57%-growth
              profitable business is not aggressive by Indian growth-market standards, and the Delhivery and Lalamove
              comparables bracket the entry price appropriately. However, the binary nature of the MV Aggregator
              Guidelines regulatory risk means investors must underwrite a 20–25% probability of a 40–50% downside
              scenario. Entry at this valuation requires explicit conviction that the regulatory environment will remain
              stable or that Porter's operating leverage is sufficient to absorb a take-rate compression of up to 7
              percentage points without falling below breakeven. Conditional entry — with ratchet protections or a price
              adjustment clause if MV Aggregator Guidelines are notified within 12 months — would materially improve the
              risk-adjusted return profile.
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV003
              - CV014
              - CV029
              - CV030
          - type: callout
            title: 'Valuation Anti-Thesis: 82.8% Fleet Payout Ratio Leaves Little Room for Regulatory Shock'
            body: >-
              Porter's most celebrated financial characteristic — its 82.8% variable cost base — is also its greatest
              vulnerability to regulatory intervention. The MV Aggregator Guidelines and the Code on Social Security
              2020 are designed precisely to restructure the economics of platform-aggregated gig work. If both
              instruments are operationalized simultaneously within a 24-month window, the combined effect is not
              additive but multiplicative: a take-rate cap reduces revenue while a payout floor increases costs,
              compressing EBITDA from both sides. Porter's ₹55 crore FY25 net profit — approximately 1.3% of revenue —
              provides virtually no buffer against a dual shock. In this scenario, the $1.2 billion entry becomes a
              loss-making position. This risk should be stress-tested in every version of the financial model before
              investment committee approval.
            calloutType: risk
            claimRefs:
              - CV005
              - CV008
              - CV014
              - CV031
              - CV042
