      Dependency flows are directional; arrow direction indicates which party provides to which. Regulatory edges
      indicate governing authority rather than service provision.
  - id: FV001
    title: Porter Funding Round History and Capital Structure Flow
    type: flow
    layout: standard
    summary: >-
      Porter's equity funding journey from 2017 seed through the May 2025 Series F unicorn round, showing investor entry
      by round and the transition from venture capital (Sequoia, Tiger Global) to growth equity (LightSpeed India) to PE
      and institutional capital (Kedaara and Wellington) as Porter scaled toward profitability and unicorn status.
    claimRefs:
      - CV001
      - CV002
      - CV024
      - CV026
      - CV027
    data:
      nodes:
        - id: seed
          label: Seed (2017)
          type: start
        - id: seriesA
          label: Series A — $20M (2019)
          type: process
        - id: seriesBC
          label: Series B/C — ~$70M (2020–2021)
          type: process
        - id: seriesDE
          label: Series D/E — ~$160M (2022–2023)
          type: process
        - id: seriesF
          label: Series F — $200M @ $1.2B (2025)
          type: end
      edges:
        - from: seed
          to: seriesA
          label: Sequoia Capital India, Kalaari Capital
        - from: seriesA
          to: seriesBC
          label: Tiger Global, Vitruvian Partners
        - from: seriesBC
          to: seriesDE
          label: Tiger Global led; LightSpeed India Series E
        - from: seriesDE
          to: seriesF
          label: Kedaara Capital + Wellington Management
  - id: FV002
    title: Porter Valuation Scenario Scoring Matrix
    type: matrix
    layout: standard
    summary: >-
      Scoring matrix assessing Porter across five investment dimensions under bull, base, and bear scenarios. Scores are
      qualitative and reflect the direction and magnitude of each dimension's contribution to the overall thesis. The
      matrix highlights that regulatory risk is the single dimension that can shift the overall thesis from Strong to
      Impaired irrespective of all others.
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV018
      - CV019
      - CV043
      - CV041
    data:
      columns:
        - Revenue Growth
        - Operating Leverage
        - Regulatory Risk
        - Exit Pathway
        - Overall Thesis
      rows:
        - label: Bull Case
          values:
            - High — 50% CAGR sustained
            - High — variable cost base intact
            - Low risk — no notification
            - High — IPO FY27–28 at $2B+
            - Strong — 1.6–2.1× return
          note: >-
            All five dimensions align positively. Requires regulatory non-intervention and successful 50-city execution
            simultaneously. Probability: 25–30%.
        - label: Base Case
          values:
            - Medium — 40% CAGR
            - Medium — partial regulatory pressure
            - Medium — one instrument notified
            - Medium — IPO or PE secondary
            - Acceptable — 1.2–1.5× return
          note: >-
            Most probable outcome. Revenue growth moderates but EBITDA margin expands modestly. One regulatory
            instrument notified but not both simultaneously. Probability: 50–55%.
        - label: Bear Case
          values:
            - Low — 25% CAGR; demand disruption
            - Negative — dual shock compresses margin
            - Critical — both instruments notified
            - Constrained — IPO delayed or trade sale below entry
            - Impaired — below $1.2B entry price
          note: >-
            Dual regulatory shock materialises within 24 months. EBITDA turns negative in Year 1 of shock. Capital
            impairment risk at $1.2B entry. Probability: 20–25%.
  - id: FV003
    title: Porter Implied Valuation Sensitivity Range
    type: range
    layout: standard
    summary: >-
      Enterprise value range across bear, base, and bull scenarios expressed in USD million. Ranges reflect the
      interaction of revenue CAGR, EBITDA margin outcome, and EV/Revenue multiple compression or expansion relative to
      the $1.2B Series F entry point. The bear case range ($700–1,000M) sits below the Series F entry, indicating
      capital impairment risk under the dual regulatory shock scenario assessed at 20–25% probability.
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV043
    data:
      items:
        - label: Bear Case (Dual Regulatory Shock)
          low: 700
          high: 1000
          note: >-
            MV Aggregator take-rate cap plus Code on Social Security gig worker costs; 25% revenue CAGR to FY28;
            1.5–2.0× EV/Revenue; below $1.2B Series F entry. Capital impairment risk.
        - label: Base Case ($1.2B Entry Point)
          low: 1400
          high: 1800
          note: >-
            40% revenue CAGR to FY28; stable regulatory environment; 2.5–3.0× EV/Revenue; consistent with Delhivery
            comparable multiple. Series F entry delivers 1.2–1.5× return.
        - label: Bull Case (IPO Premium)
          low: 1900
          high: 2500
          note: >-
            50% revenue CAGR to FY28; IPO re-rating; enterprise mix shift drives EBITDA to 8–10%; 3.5–4.0× EV/Revenue;
            $1.2B entry delivers 1.6–2.1× return within 3 years.
  - id: FV004
    title: Porter Funding and Valuation Milestone Timeline
    type: timeline
    layout: standard
    summary: >-
      Chronological funding milestones from Porter's 2014 founding through the May 2025 Series F unicorn round,
      illustrating the pace of capital deployment, valuation step-ups, and the transition from venture to institutional
      capital as Porter approached profitability and achieved its first profitable year milestone.
    claimRefs:
      - CV001
      - CV002
      - CV006
      - CV026
      - CV027
    data:
      items:
        - label: Founded in Bengaluru
          value: '2014'
          note: >-
            Porter founded 2014 in Bengaluru; initially focused on tech-enabled intra-city logistics for MSMEs and
            individual consumers using a commission-based marketplace model.
        - label: Series A — $20M
          value: '2019'
          note: >-
            Sequoia Capital India and Kalaari Capital lead Series A; Porter expands to Mumbai and Delhi-NCR; begins
            MSME-focused commercial fleet platform positioning.
        - label: Series B/C — ~$70M (2020–2021)
          value: '2021'
          note: >-
            Tiger Global and Vitruvian Partners join; rapid city expansion funded; COVID accelerates MSME adoption of
            organised intra-city logistics vs unorganised alternatives.
        - label: Series D/E — ~$160M (2022–2023)
          value: '2023'
          note: >-
            LightSpeed India leads Series E; Porter focuses on unit economics improvement and profitability path;
            revenue grows from ₹1,754 Cr (FY23) to ₹2,734 Cr (FY24) at 56% YoY.
        - label: Series F — $200M @ $1.2B (Unicorn)
          value: '2025'
          note: >-
            Kedaara Capital and Wellington Management co-lead; post-money valuation $1.2 billion; Porter's first
            consolidated profitable year (FY25 net profit ₹55 Cr); CCI cleared January 2025; unicorn status conferred.
