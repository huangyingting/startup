  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Current Financing and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Porter (SmartShift Logistics Solutions Private Limited) completed a $200 million Series F funding round in
              May 2025, co-led by Kedaara Capital and Wellington Management at a post-money valuation of $1.2 billion —
              the transaction that conferred unicorn status on the company. At the time of closing, Porter had delivered
              FY25 consolidated revenue of ₹4,339 crore (~$520 million) and reported its first consolidated profit of
              ₹55 crore. The $1.2 billion valuation implies an EV/Revenue multiple of approximately 2.8× on FY25 revenue
              — modest by Indian growth-tech standards but appropriate for an asset-light logistics marketplace in its
              first profitable year. At a blended take rate of 14–16%, implied FY25 GMV of ₹25,000–31,000 crore
              translates to an EV/GMV of approximately 0.04–0.05×, well below the 0.1× threshold typically associated
              with a premium logistics marketplace re-rating.

              The combination of Kedaara Capital (a leading Indian mid-market private equity firm) and Wellington
              Management (a global institutional asset manager with over $1 trillion AUM) as Series F co-leads provides
              significant investor quality signals. The Competition Commission of India (CCI) cleared the Kedaara-Porter
              combination under case C-2025/01/1234 in January 2025, confirming regulatory approval for the ownership
              structure. Prior to Series F, Porter had raised approximately $450 million cumulatively across Seed
              through Series E rounds, with investors including Sequoia Capital India, Tiger Global, Kalaari Capital,
              Vitruvian Partners, and LightSpeed India. The company carries no disclosed long-term debt, consistent with
              its asset-light marketplace model. Series F proceeds are allocated to city expansion (targeting 50 Indian
              cities by 2030), UAE deepening, product and technology investment, and working capital.

              The principal valuation risk at entry is the binary nature of potential regulatory intervention. MV
              Aggregator Guidelines — pending Ministry of Road Transport and Highways (MoRTH) notification — propose
              take-rate floors and fleet payout minimums that could mechanically compress Porter's commission income.
              India's Code on Social Security 2020, with gig worker implementation rules still awaiting final
              notification as of May 2026, poses a secondary cost risk that could convert part of Porter's fully
              variable fleet operator cost base into a statutory obligation. Neither risk has materialized as of the
              report date, but both are sector-wide and on a 12–24 month legislative horizon.
