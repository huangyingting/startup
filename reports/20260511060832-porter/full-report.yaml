      - number: '2.4'
        title: Growth Drivers, Constraints, and Market Dynamics
        blocks:
          - type: paragraph
            body: >
              India's intra-city logistics market is shaped by powerful structural tailwinds and material near-term
              constraints. On the demand side: India's e-commerce market grew to over $70 billion GMV in 2024 and is
              forecast to reach $200 billion by 2030, with last-mile intra-city delivery the primary bottleneck. India's
              urban population is projected to add 416 million residents by 2047, creating new logistics demand in
              Tier-2 and Tier-3 cities. The government's PM GatiShakti National Master Plan — a ₹100 lakh crore
              infrastructure investment program — is building road, rail, and multimodal connectivity that reduces
              inter-city freight costs and increases intra-city commercial activity. GST implementation has accelerated
              MSME formalization and digital invoicing, making platform-based logistics attractive. EV adoption is
              creating a new fleet category (electric LCVs, electric two-wheelers) that reduces per-km costs and enables
              a new cohort of driver-partners.

              On the constraint side: India's fragmented LCV fleet ownership (majority owner-operator, not fleet
              company) creates supply-side onboarding challenges and driver retention friction. Driver attrition is high
              in the gig economy; Porter's 1.2 million onboarded figure is cumulative, not active. Fuel price volatility
              directly impacts fleet operator costs and Porter's take-rate economics. Regulatory risk from India's Code
              on Social Security 2020 and Motor Vehicle Aggregator Guidelines 2025 creates mandatory cost obligations
              for Porter. New entrants from e-commerce logistics (Delhivery, Shadowfax) are attempting adjacent moves
              into intra-city.

              Market fragmentation creates both opportunity and risk: 70% of the market being unorganized means large
              conversion potential, but it also means price competition from informal operators who face lower
              regulatory and compliance costs.
