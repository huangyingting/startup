            - Not applicable
            - Fair — independent scale corroboration; not customer-quality proof
          note: >-
            Analyst designations confirm Porter's market leadership by GMV but do not provide customer-level proof of
            retention, satisfaction, or contract durability.
  - id: FU004
    title: Porter Estimated Customer Retention Cohort
    type: cohort
    layout: standard
    summary: >
      Estimated retention rate by cohort based on revenue trajectory modelling. All values are model-derived estimates;
      Porter has not disclosed any cohort retention data. Year-2 retention estimated at 72–74% and year-3 at 55–57%,
      consistent with high-frequency transactional platforms in emerging markets. All figures are illustrative.
    claimRefs:
      - CU022
      - CU023
      - CU024
    data:
      columns:
        - Year 1 (%)
        - Year 2 (%)
        - Year 3 (%)
      rows:
        - label: FY23 Cohort (Estimated)
          values:
            - 100
            - 72
            - 55
          note: >-
            FY23 cohort estimated at 72% year-2 and 55% year-3 retention, consistent with observed revenue growth
            pattern and MSME logistics platform benchmarks. All values estimated.
        - label: FY24 Cohort (Estimated)
          values:
            - 100
            - 74
            - 57
          note: >-
            FY24 cohort estimated at 74% year-2 (marginal improvement reflecting product maturity) and 57% year-3
            (projected). Year-3 is forward-projected from FY23 trend.
        - label: FY25 Cohort (Estimated)
          values:
            - 100
            - 73
            - 56
          note: >-
            FY25 cohort is in year 1 as of May 2026; year-2 and year-3 values are fully model- projected. All values
            illustrative; Porter has not disclosed any cohort retention figures.
  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: standard
    summary: >
      Likelihood-by-risk-category heatmap mapping Porter's primary risk exposures as of May 2026. High-likelihood cells
      contain risks that are already materializing or are highly probable within a 12-month window; medium-likelihood
      cells require monitoring; low-likelihood cells are tail risks with material consequences if realized.
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR013
      - CR021
      - CR036
    data:
      columns:
        - Regulatory/Legal
        - Operational
        - Partner/Dependency
        - Financial/Model
        - People/Execution
      rows:
        - label: High Likelihood
          values:
            - MV Aggregator Guidelines 2025 enforcement
            - Driver supply disruption (strike/boycott)
            - MapMyIndia single-vendor dependency
            - Take rate compression (regulatory cap)
            - CEO transition risk (Uttam Digga)
          note: High likelihood in 12-month window; each represents a plausible near-term event.
        - label: Medium Likelihood
          values:
            - Code on Social Security 2020 cost enforcement
            - Platform outage at peak demand
            - Razorpay/UPI policy change
            - EBITDA margin compression
            - CPTO departure risk
          note: Medium likelihood; monitoring thresholds should be established for each.
        - label: Low Likelihood
          values:
            - Gig worker reclassification as employees
            - Multi-day platform outage
            - Cloud provider failure
            - Investor pull-out (Series F fresh)
            - Board governance dispute
          note: Tail risk; material if realized; unlikely in base case.
    approximationNotes: >-
      Likelihood assessments are qualitative and based on public regulatory, operational, and financial evidence as of
      May 2026. They are not actuarial probabilities.
  - id: FR002
    title: Risk transmission map
    type: dag
    layout: standard
    summary: >
      Directed acyclic graph showing how Porter's primary risk sources cascade through operational and financial
      intermediaries to ultimate investor-relevant impacts on revenue, EBITDA, investor confidence, and exit/IPO path.
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR013
      - CR029
      - CR033
      - CR040
    data:
      nodes:
        - id: mv-guidelines
          label: MV Aggregator Guidelines 2025
          type: input
        - id: social-security
          label: Code on Social Security 2020
          type: input
        - id: tgpwu-action
          label: TGPWU Labor Action
          type: input
        - id: competitor-discounting
          label: Competitor Discounting
          type: input
        - id: driver-disruption
          label: Driver Supply Disruption
          type: process
        - id: take-rate-compression
          label: Take Rate Compression
          type: process
        - id: cost-increase
          label: Operating Cost Increase
          type: process
        - id: revenue-loss
          label: Revenue Loss
          type: output
        - id: ebitda-deterioration
          label: EBITDA Deterioration
          type: output
        - id: investor-confidence
          label: Investor Confidence
          type: output
        - id: ipo-exit-path
          label: IPO / Exit Path
          type: output
      edges:
        - from: mv-guidelines
          to: take-rate-compression
          label: mandates cap
        - from: social-security
          to: cost-increase
          label: 1-2% turnover levy
        - from: tgpwu-action
          to: driver-disruption
          label: organizes driver strike
        - from: competitor-discounting
          to: take-rate-compression
          label: market pressure
        - from: take-rate-compression
          to: revenue-loss
          label: lower GMV yield
        - from: driver-disruption
          to: revenue-loss
          label: fulfillment failure
        - from: cost-increase
          to: ebitda-deterioration
          label: margin erosion
        - from: revenue-loss
          to: ebitda-deterioration
          label: direct P&L impact
        - from: ebitda-deterioration
          to: investor-confidence
          label: deteriorates thesis
        - from: ebitda-deterioration
          to: ipo-exit-path
          label: delays readiness
        - from: investor-confidence
          to: ipo-exit-path
          label: affects valuation multiple
    approximationNotes: >-
      This graph is qualitative and source-backed; it shows causal direction, not synthetic probability weights. All
      shown edges are supported by the referenced claims.
  - id: FR003
    title: Dependency map
    type: dag
    layout: standard
    summary: >
      Critical dependency map showing the counterparties and infrastructure components that Porter relies on for
      platform operation, service delivery, regulatory compliance, and capital access. Edges show the dependency
      relationship and its nature.
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
    data:
      nodes:
        - id: porter-platform
          label: Porter Platform
          type: process
        - id: mapmyindia
          label: MapMyIndia (Mappls)
          type: input
        - id: razorpay-upi
          label: Razorpay / UPI
          type: input
        - id: cloud-provider
          label: AWS / Cloud Provider
          type: input
        - id: fleet-operators
          label: Fleet Operators (1.2M)
          type: input
        - id: rbi
          label: RBI (UPI Policy)
          type: input
        - id: morth
          label: MoRTH (Regulations)
          type: input
