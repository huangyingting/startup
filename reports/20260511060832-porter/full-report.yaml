  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              India's intra-city logistics sector is a fragmented market where roughly 70% of volumes remain coordinated
              through informal brokers, phone-based truck aggregators, and roadside middlemen who cannot offer digital
              booking, real-time tracking, or GST-compliant invoicing. The organized technology-enabled segment is led
              by Porter, with Lalamove and Blowhorn as the only other pure-play intra-city LCV platforms of meaningful
              scale. Adjacent competitors operate in structurally distinct segments: Shadowfax and Delhivery operate in
              last-mile e-commerce courier and B2B surface freight respectively, with limited direct overlap with
              Porter's LCV model today but possessing network and capital resources that could theoretically enable an
              intra-city LCV pivot. Shiprocket occupies a distinct niche as an SME courier aggregator that routes
              parcels through third-party carriers rather than dispatching driver-partners for goods movement, making
              its model non-overlapping. Dunzo, once a hyperlocal delivery adjacent that briefly operated in the same
              geography, shut down operations in early 2024, eliminating one substitution threat. The unorganized broker
              ecosystem remains the primary volume competitor: lower perceived cost, deeply entrenched trust
              relationships, and zero digital overhead. New entrant risk is moderate over a 36-month horizon;
              Delhivery's scale and tech maturity is the most credible well-funded platform threat, while no credible
              signals of a major global player entering intra-city LCV logistics in India exist as of mid-2026.
