        - Re-assess unit economics and competitive moat; review differentiation adequacy in affected cities
    notes: >-
      Kill triggers are defined at thresholds representing a fundamental change in the investment thesis rather than
      ordinary business volatility. Monitoring should be continuous via industry news feeds, regulatory gazette
      notifications, and quarterly financial updates.
