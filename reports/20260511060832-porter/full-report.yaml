      - number: '5.4'
        title: Trust, Safety, Security, and Regulatory Compliance
        blocks:
          - type: paragraph
            body: >
              Porter's compliance and trust framework is under active pressure from regulatory changes and gig worker
              allegations. On safety, Porter mandates driver-partner onboarding with vehicle verification, licence
              checks, and insurance validation before activation. The driver app provides GPS trip tracking, which
              serves as a passive safety mechanism for both drivers and customers. Porter supports digital payment
              (cashless) to reduce robbery risk on trips.

              Regulatory compliance: Porter's primary regulatory exposure is as a "platform aggregator" under India's
              Motor Vehicle (Amendment) Act 2019 and the Motor Vehicle Aggregator Guidelines 2025. These guidelines
              (issued by the Ministry of Road Transport and Highways) impose minimum earnings guarantees for drivers,
              capped commission rates (proposed 10–15% cap), mandatory insurance, and grievance redressal requirements.
              If the commission cap is enforced at 10–15%, it would directly compress Porter's 14–16% (up to 30% in some
              cities) take rate.

              India's Code on Social Security 2020 (effective November 2025) requires platform companies to contribute
              1–2% of annual turnover to a gig worker social security fund. At Porter's FY25 revenue of ~₹4,339 crore,
              this translates to ₹43–87 crore in annual compliance costs — approximately 79–158% of its ₹55 crore
              consolidated net profit. This is a material threat to the profitability achieved in FY25.

              Worker conditions: The Telangana Gig and Platform Workers Union (TGPWU) filed public complaints in 2025
              alleging exploitative conditions, unfair driver suspensions, and absence of adequate grievance mechanisms
              for Porter's Hyderabad driver-partners. These allegations were corroborated by Times of India, The Hans
              India, and Business and Human Rights Resource Centre coverage. The union demanded per-km rate standards
              and formal dispute resolution processes.

              Data security: Porter's app handles payment data (Razorpay/Paytm integration), location data, and customer
              identity. No third-party security audit reports are publicly available. India's Digital Personal Data
              Protection Act 2023 (implementation ongoing) will impose additional data-handling obligations.
            claimRefs:
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
