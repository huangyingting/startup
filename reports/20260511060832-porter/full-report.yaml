      - number: '1.5'
        title: Scale, Milestones, and Adverse Events
        blocks:
          - type: paragraph
            body: >
              Porter's journey from a Bengaluru-centric logistics startup in 2014 to a pan-India unicorn reflects a
              decade of compounding scale. Key scale metrics as of May 2025: 22+ Indian cities plus UAE operations; 1.2
              million driver-partners onboarded to date; approximately 2,715 full-time employees (February 2025); FY25
              consolidated revenue of ₹4,306–4,339 crore. The company has announced aggressive expansion plans: entry
              into Calicut, Tiruppur, and Rajkot (2025–26); launch across 8 additional MSME-focused cities (Mysore,
              Madurai, Jabalpur, Gwalior, Meerut, Agra, Aurangabad, Thrissur) projected to create 64,000 new job
              opportunities for driver- partners; and a target of 50 cities by 2030.

              Financial milestone: Porter turned consolidated profitable in FY25 with ₹55 crore net profit (standalone
              ₹131 crore) and positive EBITDA of ~₹48 crore (vs. -₹112 crore in FY24), following years of operating
              losses. Revenue grew from ₹1,753.8 crore (FY23) to ₹2,734 crore (FY24, +56%) to ₹4,306–4,339 crore (FY25,
              +57%).

              Adverse events and ESG risks: In 2025, gig worker unions — particularly the Telangana Gig and Platform
              Workers Union (TGPWU) — publicly alleged exploitative working conditions, unfair suspensions, and
              inadequate grievance mechanisms for Porter driver-partners on the Hyderabad platform. These allegations
              were covered by Times of India, The Hans India, and Business and Human Rights Resource Centre. The union
              demanded per-km rate standards, cancellation charge protections, and formal grievance processes. These
              concerns are material given India's forthcoming Code on Social Security 2020 (effective November 2025)
              requiring platform companies to contribute 1–2% of annual turnover to a gig worker social security fund,
              and Motor Vehicle Aggregator Guidelines 2025 mandating minimum earnings guarantees, capped commissions,
              and insurance mandates.
