      - number: '3.3'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: >-
              On capability dimensions, Porter leads all direct competitors on India geographic breadth, MSME account
              management tools, GST-compliant invoicing at scale, enterprise API integration, and multi-service breadth
              (LCV, two-wheeler, household moves, mini-truck). Lalamove matches Porter on core on-demand LCV dispatch
              and real-time tracking in the four metros it operates, but lacks Porter's MSME-specific features, broader
              city footprint, and depth of driver supply outside major metros. Blowhorn's feature set is more limited:
              fewer enterprise-grade capabilities, lower brand recognition outside South India, and a narrower city
              footprint. On pricing, Porter's commission model of 14–30% per trip is within the competitive range for
              on-demand logistics platforms in India; Lalamove operates a broadly comparable per-booking commission
              model. Unorganized brokers operate on opaque margins that can appear lower upfront but exclude the value
              of compliance, tracking, and dispute resolution. Delhivery and Shadowfax operate on entirely different
              pricing constructs — per-shipment courier rates and B2B freight contracts — because their product and
              customer base differs fundamentally from Porter's. Porter's GTM strategy is differentiated by deliberate
              MSME focus: approximately 60–65% of revenues derive from SME accounts that value GST invoicing, trip
              history, account management, and multi-trip scheduling over pure price. Lalamove's India GTM is
              metro-first and targets a mixed small-business and individual consumer audience with less explicit MSME
              compliance positioning. On trust and regulatory posture, Porter has faced adverse allegations from the
              TGPWU gig worker union and the Business and Human Rights Resource Centre (July 2025), creating a material
              ESG and compliance risk that Lalamove has not yet faced publicly in India. No direct evidence of Porter
