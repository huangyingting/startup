      - number: '7.2'
        title: Operational and Platform Risk
        blocks:
          - type: paragraph
            body: >
              Porter's operational risk profile reflects both the inherent complexity of a two-sided marketplace
              platform and the execution demands of aggressive geographic expansion. The most acute near-term
              operational risk is driver supply disruption. With 1.2 million cumulative onboarded driver-partners and no
              disclosed count of simultaneously active drivers, any coordinated work stoppage, city-wide boycott, or
              mass driver deactivation could materially impair booking fulfillment rates in affected cities. The TGPWU
              precedent in Hyderabad demonstrates that such organizing is credible, not merely hypothetical. Porter has
              not publicly disclosed a driver grievance mechanism, an ombudsman function, or a structured welfare
              program that would reduce the probability of organized disruption.

              City expansion execution risk is substantial. Porter targets 50 cities by 2030 from its current 22-city
              footprint — adding 28 cities in approximately five years. Each new city requires simultaneous driver
              supply onboarding, local operations infrastructure, customer acquisition, and demand aggregation
              sufficient to achieve critical mass within a viable payback window. Porter has not disclosed per-city unit
              economics, average time-to- profitability for new city launches, or the capital requirement per city. The
              22 current cities include a mix of Tier-1 metros (where competitive intensity is high from Shadowfax,
              Lalamove, and Loadshare) and Tier-2 markets (where unorganized operators dominate and price sensitivity is
              extreme).

              Platform reliability risk is structurally elevated because Porter operates real-time dispatch matching for
              time-sensitive MSME deliveries. No published service level agreement (SLA) exists for platform uptime,
              dispatch latency, or order fulfillment rate. Porter has not disclosed a disaster recovery (DR) or business
              continuity plan (BCP). A major dispatch engine outage during peak morning or afternoon delivery windows
              would directly translate to booking failures for MSME customers who rely on Porter as a primary logistics
              provider. Secondary operational risks include GPS spoofing by fraudulent drivers, fake bookings, driver
              cancellations after booking, and customer no-shows. Porter's Google Play app has a 4.1/5 rating with 1M+
              downloads, with some user reviews flagging driver cancellations and ETA inaccuracy — indicating these
              fraud and reliability issues are not purely hypothetical.

              Porter's UAE expansion (launched 2024) introduces cross-border regulatory and operational risk. UAE
              transport regulations are materially different from India's; the UAE market requires separate platform
              licensing, driver onboarding under different labor frameworks, and payment infrastructure. No UAE-specific
              traction data (booking volume, revenue, driver count) has been disclosed as of May 2026.
            claimRefs:
