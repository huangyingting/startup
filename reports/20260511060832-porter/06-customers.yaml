    notes: >-
      No formal retention metrics (NRR, GRR, cohort data, or NPS/CSAT scores) have been publicly
      disclosed by Porter. All retention signals in this table are indirect proxies inferred from
      structural business-model characteristics or financial growth trends. Diligence teams should
      request cohort analysis by booking vintage, churn rate by segment, and NPS scores from the data room.

  - id: TU005
    title: Porter Expansion Dynamics and Concentration Risk Assessment
    subtitle: Key expansion drivers, concentration risks, impact severity, and diligence paths
    columns:
      - Dimension
      - Current State / Risk Level
      - Impact Severity
      - Expansion or Mitigation Path
      - Diligence Action
    claimRefs:
      - CU002
      - CU012
      - CU014
      - CU020
      - CU021
      - CU026
      - CU027
      - CU028
      - CU029
    rows:
      - - Geographic Concentration (Bengaluru)
        - Bengaluru estimated 25–30% of revenue; top-4 cities likely 60–70% of total
        - High — city-level regulatory or competitive shock has outsized P&L impact
        - Add 3–5 new cities per year; UAE launch establishes international template
        - Request city-wise revenue breakdown from financial data room; validate Bengaluru share
      - - Customer Concentration (Top Customer)
        - No single customer estimated to exceed 5% of revenue given fragmented MSME and consumer base
        - Low-to-medium — fragmented base structurally limits single-customer risk
        - Maintain MSME breadth; avoid over-indexing on large enterprise accounts
        - Request top-20 customer revenue concentration from data room to confirm fragmentation estimate
      - - Enterprise API Land-and-Expand
        - Porter Business API enables contract-based enterprise relationships; adoption growing but unquantified
        - Low (opportunity risk) — failure to convert enterprises limits ACV growth and stickiness
        - Invest in enterprise sales and customer success to migrate spot-bookers to API contracts
        - Request B2B API customer count, ACV distribution, and year-1 to year-2 contract renewal rate
      - - Competitor Price Competition
        - Shadowfax (₹1,750 Cr FY25 revenue) and Lalamove competing for same MSME customer pool
        - High — MSMEs estimated to switch for 5–10% cost savings; limited structural lock-in
        - Differentiate via reliability, city coverage breadth, app experience, and driver quality
        - Monitor Shadowfax IPO disclosures for customer overlap and market share data
      - - Single-Channel GTM Dependence (App)
        - Porter app is the primary GTM and fulfilment channel; no significant third-party distribution
        - Medium — app-store policy changes or outages create single-point risk
        - Develop direct enterprise sales channel and API distribution to reduce app-only dependence
        - Assess enterprise sales headcount and channel mix in management interview

    notes: >-
      Geographic concentration estimates (Bengaluru ~25-30%, top-4 cities ~60-70% of revenue)
      are directional approximations based on city-market structure analysis and order of entry.
      No official city-wise revenue breakdown has been disclosed by Porter. Competitor revenue
      figures are sourced from public filings and press coverage and may reflect different reporting periods.

figures:
  - id: FU001
    title: Porter Customer Journey Map
    type: journey-map
    layout: standard
    summary: >
      End-to-end customer journey from MSME or consumer awareness of Porter through repeat booking
      and potential account expansion to Porter Business API, highlighting key touchpoints, friction
      points, and differentiation moments at each stage.
    claimRefs:
      - CU001
      - CU006
      - CU023
      - CU029
      - CU030
    data:
      items:
        - label: Awareness
          value: >-
            Google search for intra-city truck or LCV rental | MSME peer referral within trade
            networks | Porter app or web portal discovery | Social media advertising
          note: >-
            Primary discovery channels are Google search and MSME peer referral. Urban MSMEs in
            manufacturing and trading rely heavily on word-of-mouth within industry networks.
        - label: Consideration
          value: >-
            App download from Google Play or App Store | Price estimate via app by vehicle type and
            route | Comparison with unorganised local truck operators | Coverage check by pin code
          note: >-
            Low friction: app download to first price estimate takes under 2 minutes. Price
            transparency is a key differentiator versus unorganised alternatives.
        - label: First Booking
          value: >-
            Vehicle selection (mini-truck, LCV, tempo) | Driver dispatch with real-time GPS tracking |
            Digital payment via UPI, card, or wallet | GST-compliant digital invoice generation
          note: >-
            GST-compliant invoicing is a significant MSME differentiator; unorganised operators
            typically cannot provide tax-compliant expense records required for MSME accounting.
        - label: Repeat Use
          value: >-
            MSME bookings on daily or weekly cadence | App saves frequent routes and addresses |
            Customer support via in-app chat | Driver rating and feedback system
          note: >-
            Repeat use driven by reliability, coverage, and billing convenience rather than an
            explicit loyalty programme; no published points or rewards scheme as of 2025.
        - label: Account Expansion
          value: >-
            Migration to Porter Business portal for multi-vehicle fleet booking | API integration
            with supply-chain ERP | Monthly invoicing and credit terms | Dedicated account manager
          note: >-
            Enterprise expansion via Porter Business API creates contractual stickiness and
            significantly higher GMV per account versus spot-booking MSME relationships.
        - label: Advocacy
          value: >-
            MSME peer referral within trade associations and industry networks | Google Play and
            App Store reviews | Anonymous testimonials on Porter website
          note: >-
            Organic referral is estimated to be the primary MSME acquisition channel. No formal
            referral programme has been publicly disclosed by Porter as of May 2026.

