  - id: adoption-trajectory
    title: Adoption and Growth Trajectory
    body: >
      Porter's headline adoption indicator is revenue: ₹1,754 crore in FY23, ₹2,734 crore in
      FY24 (+56% year-on-year), and ₹4,339 crore in FY25 (+57% year-on-year). Sustained ~57%
      annual revenue growth over two consecutive years on an increasingly large base provides
      strong evidence of genuine volume expansion rather than purely pricing-driven growth,
      particularly given that take rates have remained relatively stable in the 14–16% range.
      At a blended take rate of approximately 15%, FY25 GMV would approximate ₹29,000 crore,
      implying tens of millions of annual bookings across a broad MSME and consumer base. The
      cumulative driver-partner count of 1.2 million as of 2025 reflects the supply-side scale
      required to service this demand, though this is a lifetime onboarding figure rather than
      a count of simultaneously active drivers. The Porter customer app on Google Play records
      1M+ downloads and a 4.1/5 rating; the iOS app is available on the Apple App Store. These
      metrics indicate genuine consumer adoption at scale but do not reveal active monthly user
      counts or booking frequency. Porter's driver-partner gross payouts of approximately
      ₹3,660–3,679 crore in FY25 serve as an independent transaction-volume proxy corroborating
      the revenue figure and confirming that growth is genuine. Geographic footprint expanded
      from approximately 8 cities in 2020 to 22+ cities plus UAE by 2025, a more than 175%
      increase over five years. No company-disclosed figures for active monthly customers,
      monthly bookings, or average booking value have been published.
    claimRefs:
      - CU003
      - CU004
      - CU005
      - CU009
      - CU010
      - CU011
      - CU017
      - CU024
      - CU031
      - CU038
      - CU039
