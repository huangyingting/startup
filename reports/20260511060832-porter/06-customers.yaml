company:
  name: Porter
chapter:
  number: 6
  title: Customers
  summary: >
    Porter's customer base is anchored by MSMEs requiring reliable intra-city goods transport,
    supplemented by individual consumers, enterprise/B2B accounts, e-commerce fulfilment operators,
    and 3PL white-label partners. Revenue grew 57% year-on-year to ₹4,339 crore in FY25—Porter's
    first profitable year—implying strong booking-volume growth across all segments, though no
    segment-level revenue disclosure exists publicly. Named customer proof is a material diligence
    gap: Porter has disclosed no enterprise customer names, case studies, or cohort retention data,
    making NRR and churn entirely unverifiable from public sources. Google Play's 4.1/5 rating with
    1M+ downloads serves as the primary consumer-satisfaction proxy. The TGPWU driver-exploitation
    complaint in Hyderabad (2025) introduces indirect reputational risk to customer trust. City
    concentration in Bengaluru (estimated 25–30% of revenue) is the primary geographic risk,
    partially offset by a 22-city Indian footprint and UAE expansion launched in 2024.

sections:
  - id: customer-segmentation
    title: Customer Base Segmentation
    body: >
      Porter serves five identifiable customer segments distinguished by buyer type, use case,
      booking frequency, and strategic value to the platform. The primary and largest segment
      is MSMEs—small manufacturers, traders, retailers, and distributors that book light commercial
      vehicles (LCVs) or mini-trucks on a daily or weekly basis to move goods between warehouses,
      suppliers, and end-customers within a city. This segment exhibits the highest repeat-usage
      frequency and is estimated, through market-structure analysis, to account for 60–70% of
      Porter's ₹4,339 crore FY25 revenue, though the company has disclosed no segment-level
      breakdown. Individual consumers form the second segment, using Porter for home shifting,
      large-appliance delivery, and one-off moves; booking frequency is low and competition from
      the unorganised sector (independent truck operators) is intense. Enterprise and B2B accounts
      represent a growing third segment: larger companies integrate with the Porter Business API
      for contracted fleet services, supply-chain logistics, and multi-stop routing. The fourth
      segment comprises e-commerce fulfilment operators—small online sellers and marketplace
      partners that use Porter for last-mile delivery of bulky or fragile items unsuited to
      standard courier networks. The fifth and emerging segment is 3PL and white-label logistics
      partners embedding Porter fleet capacity within their own platforms. Geographically,
      Bengaluru (Porter's home city) is the largest market, followed by Mumbai, Delhi-NCR,
      Hyderabad, Chennai, Kolkata, and Pune; fourteen additional tier-2 cities round out the
      22-city Indian footprint. UAE was launched in 2024 as a distinct international deployment.
      No formal geographic revenue breakdown has been published by the company.
    claimRefs:
      - CU001
      - CU002
      - CU006
      - CU007
      - CU008
      - CU025
