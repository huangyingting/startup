        - FY2025
        - High — corroborated by multiple independent news sources
        - Market-leading scale; implies GMV ~₹29,000 crore at 15% blended take rate
        - No booking count or active customer count disclosed
      - - FY24 Revenue
        - ₹2,734 crore
        - FY2024
        - High — corroborated by Entrackr and Livemint
        - Year-on-year growth of 56.4%; confirms sustained multi-year trajectory
        - Prior-year comparator only; no MSME/consumer or geographic split
