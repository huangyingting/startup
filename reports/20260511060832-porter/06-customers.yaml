    notes: >-
      Revenue, GMV, and booking-volume metrics are derived from press-reported financials
      (Entrackr, Livemint) and market-structure analysis. GMV estimate is an approximation
      based on assumed blended take rates (14–16%); no audited financial statements are publicly
      available. Download and rating data from app stores are aggregate consumer signals only.

  - id: TU003
    title: Named customer proof table
    subtitle: Evidence quality review across available customer proof types as of May 2026
    enumerationScope:
      coverage: sample
      basis: >
        Three representative customer proof types assessed from public sources accessed May 2026.
        Named individual customers cannot be enumerated as Porter has not disclosed any publicly.
        This table documents the evidence types available, not a roster of customers. Coverage is
        sample because the universe of Porter customers is entirely undisclosed.
    columns:
      - Customer / Evidence Type
      - Source
      - Nature of Evidence
      - Production vs Pilot
      - Outcome / Signal
      - Limitation / Diligence Ask
    claimRefs:
      - CU009
      - CU013
      - CU015
      - CU016
      - CU019
      - CU036
      - CU037
      - CU038
    rows:
      - - MSME Category — Anonymous Testimonials
        - Porter.in official website and Porter for Business page
        - Anonymous first names and city only; no company name, industry, booking volume, or duration
        - Production use implied by testimonial language describing ongoing logistics services
        - Qualitative satisfaction signal; no quantitative outcome metrics available
        - No company identity; no verifiable outcome; no contract duration; cannot independently validate
      - - Consumer Segment — App Store Ratings and Reviews
        - Google Play (4.1/5, 1M+ downloads) and Apple App Store (available, India market)
        - Aggregate consumer rating and download count; individual reviews reference booking experience
        - Production use confirmed by review recency and in-review booking frequency references
        - 4.1/5 satisfaction proxy; no systemic failure visible in aggregate rating across platforms
        - Aggregate metric only; no enterprise-use reviews identifiable; no cohort segmentation possible
      - - Industry Analyst Designation — Market Leader
        - Redseer 2025 Intra-City Logistics Report; Shadowfax IPO-era industry report
        - Third-party analyst designation as number-one platform aggregator in India by GMV
        - Production use at market-leading scale inferred from GMV-based ranking methodology
        - Independent market-position corroboration not reliant on Porter's own disclosures
        - Analyst methodology not fully public; GMV-based ranking, not a customer quality or retention metric
    notes: >
      Named individual or enterprise customers cannot be enumerated because Porter has not publicly
      disclosed any. Diligence teams should request a named customer reference list, top-20 revenue
      concentration data, and enterprise pilot-to-production conversion rates from the CFO/CRO data room.

