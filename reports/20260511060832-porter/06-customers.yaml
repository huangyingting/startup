      - - Driver Payout / Revenue Ratio
        - ~84–85% in FY25 (payouts ÷ revenue)
        - All segments
        - Medium (structural indicator)
        - Stable ratio implies consistent business model economics; not a direct customer-retention metric
      - - MSME Repeat Booking Frequency
