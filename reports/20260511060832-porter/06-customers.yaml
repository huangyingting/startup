    figureRefs:
      - FU002

  - id: named-customer-proof
    title: Named Customer Evidence and Reference Quality
    body: >
      Named customer proof represents the most significant diligence gap in Porter's public
      disclosure profile. Unlike enterprise SaaS or large-scale B2B logistics companies, Porter
      has not publicly disclosed any named enterprise accounts, customer case studies with
      measurable outcomes, or reference customers in press materials, investor presentations,
      or regulatory filings as of May 2026. Porter's website features MSME testimonials that
      are entirely anonymous—typically a first name and city only, with no company name,
      industry, booking volume, or verifiable outcome metric. This practice is common among
      consumer-facing logistics platforms but severely limits independent verification of
      enterprise adoption depth. The strongest available customer-proof proxies come from two
      sources: Google Play and Apple App Store ratings, which indicate 4.1/5 consumer
      satisfaction with over one million app downloads—evidence of genuine consumer-scale
      adoption; and the Redseer 2025 intra-city logistics report, which designates Porter as
      the number-one platform aggregator in India by GMV, providing analyst-generated
      market-position corroboration independent of company disclosure. Shadowfax's IPO-era
      industry report references Porter as a major participant in the intra-city logistics
      market, offering third-party corroboration of scale. G2 and Trustpilot profiles for
      Porter exist but have very few reviews, reflecting the platform's orientation toward
      MSME and consumer users rather than software buyers. No customer logos, named
      deployments, or outcome data with defined ROI are publicly available. This evidence
      quality profile is consistent with a high-volume transactional consumer and MSME
      platform but represents a material gap for investors seeking to validate contract
      durability and customer concentration.
    claimRefs:
      - CU009
      - CU013
      - CU014
      - CU015
      - CU016
      - CU019
      - CU026
      - CU027
      - CU036
      - CU037
