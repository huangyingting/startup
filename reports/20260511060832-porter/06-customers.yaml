  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Named customer proof and enterprise deployment evidence
      missingEvidence: >-
        Porter has not disclosed any named enterprise or MSME customers, customer case studies,
        outcome-based references, or production deployment evidence in any public filing, press
        release, investor presentation, or regulatory document as of May 2026.
      whyItMatters: >-
        Without named customer deployments or verified production outcomes, it is impossible to
        independently validate the quality, stickiness, and durability of Porter's enterprise and
        MSME customer relationships. Customer concentration risk and enterprise adoption depth
        cannot be assessed from public sources.
      diligencePath: >-
        Request top-20 customer revenue concentration, named enterprise reference list (with
        permission to contact), pilot-to-production conversion rate for B2B accounts, and any
        customer-facing case studies from the CFO and CRO data room.
      relatedQuestionRefs:
        - QU005
      relatedTableRefs:
        - TU003

    - type: private-evidence-only
      severity: critical
      topic: Retention metrics — NRR, GRR, and cohort retention data
      missingEvidence: >-
        No net revenue retention (NRR), gross revenue retention (GRR), or cohort-level booking
        retention data has been disclosed by Porter in any public source. No DRHP or regulatory
        filing containing retention metrics has been identified as of May 2026.
      whyItMatters: >-
        Retention metrics are the primary determinant of customer lifetime value and the
        sustainability of Porter's revenue growth rate. Without cohort data, the growth trajectory
        could reflect customer acquisition masking high churn rather than durable revenue expansion.
      diligencePath: >-
        Request cohort retention analysis by vintage (FY22–FY25), NPS and CSAT scores by segment,
        GRR and NRR by customer segment, and annual bookings per customer cohort from the data room.
      relatedQuestionRefs:
        - QU010
        - QU024
      relatedTableRefs:
        - TU004

    - type: private-evidence-only
      severity: moderate
      topic: B2B API integration customer count and enterprise ACV
      missingEvidence: >-
        Porter has not disclosed the number of B2B API integration customers using Porter Business,
        the average contract value (ACV) for enterprise accounts, or the revenue contribution of
        the enterprise segment relative to MSME transactional demand.
      whyItMatters: >-
        Enterprise API customers represent the highest-stickiness, highest-ACV segment. Without
        quantification, it is impossible to assess whether Porter's growth is driven by durable
        enterprise contracts or fragmented MSME transactional demand without contractual lock-in.
      diligencePath: >-
        Request B2B API customer count, ACV distribution, year-1 to year-2 contract renewal rate,
        and enterprise segment revenue as a percentage of total from the sales data room.
      relatedQuestionRefs:
        - QU015

