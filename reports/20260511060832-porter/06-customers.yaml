        - Transaction volume proxy; genuine revenue corroboration; confirms booking activity
        - Includes Porter's take; not equivalent to customer-paid GMV without netting take rate
      - - Cities Served (India + UAE)
        - 22+ cities in India plus UAE
        - 2025
        - High — Porter official website
        - Geographic reach expanding rapidly; broad MSME addressable market coverage
        - City-wise revenue or customer split not disclosed
      - - Google Play App Downloads
        - 1M+ downloads
        - 2025
        - Medium — Google Play listing
        - Consumer adoption at scale; 1M+ threshold confirms mass-market reach
        - No monthly active user count; download count does not equal active customers
      - - Google Play App Rating
        - 4.1 / 5.0
        - 2025
        - Medium — Google Play listing
        - Satisfaction proxy; stable rating implies no systemic service failure
        - Rating can lag structural degradation; sample self-selects active users
      - - Cumulative Driver-Partners Onboarded
