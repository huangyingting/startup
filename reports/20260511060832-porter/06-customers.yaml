  - id: retention-and-durability
    title: Retention, Repeat Usage, and Satisfaction
    body: >
      No net revenue retention (NRR), gross revenue retention (GRR), cohort-level churn, or
      renewal-rate data has been disclosed by Porter in any public filing, press interview, or
      investor communication as of May 2026. This absence is the most critical unverifiable
      dimension of Porter's customer story. Several indirect indicators suggest structurally
      high repeat usage, however. First, MSME logistics needs are inherently recurring: a small
      manufacturer or trader that uses Porter to move goods daily or weekly has no obvious
      substitute combining on-demand booking, real-time tracking, and intra-city LCV coverage
      at Porter's geographic and vehicle-type breadth. Second, revenue grew 57% year-on-year
      in FY25 on a large FY24 base, implying that customer retention is at least sufficient to
      sustain net expansion at this rate when combined with new customer acquisition. Third, the
      Google Play rating of 4.1/5 has remained stable, indicating no mass churn event driven
      by product deterioration or systemic service failure. Fourth, driver-partner gross payouts
      closely approximate the revenue figure, confirming that growth reflects genuine transaction
      volume. Against these positive signals, the TGPWU complaint (2025) about unfair driver
      suspensions in Hyderabad introduces potential supply-side instability that could manifest
      as service-quality degradation for customers. MSME price sensitivity—estimated switching
      trigger at 5–10% cost differential—means customer loyalty is primarily tied to operational
      reliability and price competitiveness rather than strong switching-cost lock-in. Without
      NPS, CSAT, or cohort retention data from a due-diligence data room, the durability of
      Porter's customer relationships cannot be independently confirmed.
    claimRefs:
      - CU018
      - CU019
      - CU020
      - CU022
      - CU023
      - CU024
      - CU028
      - CU029
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: expansion-and-concentration
    title: Expansion Dynamics and Concentration Risks
    body: >
      Porter's primary expansion vectors are geographic (new cities and UAE), segment depth
      (migrating MSMEs from occasional to habitual users and upselling to Porter Business API
      contracts), and vehicle-type diversification (two-wheelers for quick-commerce adjacency,
      flatbeds for industrial logistics). The land-and-expand dynamic is clearest in the
      enterprise segment: companies that begin with spot bookings via the Porter Business
      portal can migrate to API integration with monthly or annual contracts, enabling higher
      GMV per account and reduced booking friction. Revenue concentration at the customer level
      is estimated to be low—no single customer is likely to represent more than 5% of total
      revenue, given the highly fragmented MSME and consumer base—but this is an inference from
      market structure, not a company-disclosed figure. Geographic concentration is more
      material: Bengaluru is estimated to account for 25–30% of revenue as Porter's home
      market, and the top-4 cities (Bengaluru, Mumbai, Delhi-NCR, Hyderabad) likely represent
      60–70% of total revenue. Competitor intensity is rising: Shadowfax (approximately
      ₹1,750 crore FY25 revenue, IPO-stage) competes directly for MSME logistics customers;
      Lalamove is active in metropolitan markets with well-capitalised international backing;
      and quick-commerce platforms are expanding their own logistics networks, potentially
      cannibalising Porter's small-package and consumer segment. Channel dependence on the
      Porter app as the primary GTM vehicle creates single-channel concentration risk. The
      Series F at $1.2 billion post-money valuation provides capital for expansion but raises
      the bar for the customer growth trajectory required to justify the implied multiple.
    claimRefs:
      - CU002
      - CU012
      - CU014
      - CU020
      - CU021
      - CU023
      - CU026
      - CU027
      - CU028
      - CU029
    tableRefs:
      - TU005

callouts:
  - calloutType: risk
    title: "No Named Customer Disclosure: A Material Diligence Gap"
    body: >
      Porter has not disclosed any named enterprise or MSME customers, customer case studies,
      or outcome-based references in any public-facing material as of May 2026. While consistent
      with a consumer-facing transactional logistics model, this means that contract durability,
      enterprise adoption depth, customer concentration, and cohort retention are entirely
      unverifiable from public sources. Any investor or acquirer must request a customer-level
      data room including top-20 customer revenue concentration, cohort retention data by
      vintage (FY22–FY25), NPS or CSAT scores, and B2B API integration customer counts before
      forming a view on customer quality and relationship durability.
    claimRefs:
      - CU015
      - CU016
      - CU022

tables:
  - id: TU001
    title: Porter Customer Segmentation Matrix
    subtitle: Five customer segments by buyer type, use case, scale, and revenue value
    columns:
      - Segment
      - Buyer / User / Payer
      - Primary Use Case
      - Scale / Booking Frequency
      - Revenue / Strategic Value
      - Key Diligence Gap
    claimRefs:
      - CU001
      - CU006
      - CU007
      - CU008
      - CU020
      - CU023
      - CU025
      - CU026
      - CU030
      - CU033
      - CU034
      - CU035
    rows:
      - - MSME Goods Transport
        - Small businesses — manufacturers, traders, retailers, distributors
        - Daily or weekly intra-city LCV booking for goods movement between warehouse, supplier, and customer
        - High frequency; estimated 60–70% of Porter revenue; large base of ~63M Indian MSMEs
        - Core revenue driver; highest repeat rate; price-sensitive but generates large booking volume
        - No segment revenue disclosed; churn rate unknown; no cohort data available
      - - Individual Consumer
        - Individuals — home shifting, large-appliance transport, one-off moves
        - Occasional LCV or mini-truck hire for residential or personal use
        - Low frequency; estimated 15–20% of revenue; seasonal demand spikes
        - Lower LTV; high price sensitivity; intense competition from unorganised sector
        - No repeat-booking rate; app-to-paying-user conversion ratio not publicly disclosed
      - - Enterprise / B2B
        - Larger companies — supply-chain logistics, contracted fleet services, API integration
        - Multi-stop routing, scheduled deliveries, fleet management via Porter Business API
        - Medium frequency; recurring contract basis; growing but unquantified segment
        - API integration creates contractual stickiness; potential for higher ACV per account
        - No B2B customer count, average ACV, or enterprise revenue share disclosed publicly
      - - E-commerce Fulfilment
        - E-commerce sellers, marketplace partners, D2C brands
        - Last-mile delivery of bulky, fragile, or oversized items not served by standard couriers
        - Medium frequency; order-volume-driven demand; grows with e-commerce penetration
        - Captures tail of e-commerce logistics; strategic hedge against courier-only competition
        - Market share vs Shadowfax and Delhivery in this segment unclear; unit economics unverified
      - - 3PL / White-Label Partners
        - Logistics aggregators and platforms embedding Porter fleet capacity
        - White-label LCV fleet provision in partner platforms — B2B2C logistics fulfilment
        - Low frequency at Porter level; aggregated demand via partner platform
        - Strategic optionality; extends Porter reach without direct customer acquisition cost
        - Number of 3PL partners, volume handled, and revenue contribution not disclosed
    notes: >
      Segment sizes are estimates derived from market-structure analysis and Porter's public
      positioning; no company-disclosed segment revenue breakdown is publicly available.
      Segment boundaries are porous — a small e-commerce seller may also qualify as an MSME.

