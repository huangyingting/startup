      - number: '7.5'
        title: 风险缓释、监控指标与论断打破触发条件
        blocks:
          - type: paragraph
            body: >
              Porter 核心风险的缓释措施真实存在，但部分仍属推测性或无法从公开资料核实。最清晰的近期缓释是 Series F 资本注入（Kedaara 和 Wellington 合计 2
              亿美元），即便在任何收入增长实现之前，也能提供以 FY25 运营成本计至少 12 个月的资金储备。此缓冲降低了近期融资风险，为监管调整提供余地，无需立即削减成本或调整定价而损及增长。

              针对 MV 聚合平台指导方针风险，Porter 最可能的缓释路径包括：(1) 对收入流进行重新分类，使其落在指导方针技术范围之外——例如将部分费收重定位为物流管理费而非车辆聚合佣金；(2) 通过
              IAMAI、CII 等行业协会向 MoRTH 争取货运或货物运输豁免条款或延迟执行；(3) 逐步将 MSME 企业客户的定价模式向订阅制或类 SaaS
              结构迁移。上述缓释措施均无法律保障，加之执行时间表的不确定性，截至 2026 年 5 月尚无法确认其有效性。

              针对灵活工人基金义务，主要杠杆是部分转嫁——向客户微幅提高预订费，或向车队运营商降低基础佣金。该成本属行业普遍性，竞争对手同等承受，竞争劣势相对有限，但 Rs 43–87 crore 的年度绝对成本在
              Porter 目前利润率下属于重大。针对司机供给风险，120 万名已注册伙伴的规模提供了一定的局部组织行动缓冲；然而，投诉机制的缺失仍是结构性缺口。

              论断打破触发条件包括：MV 聚合平台指导方针执行低于 12% 的抽佣上限；多城市司机罢工导致履约率下降超过 20%；丧失 MapMyIndia 地图服务商且无可行替代；关键高管（CEO 或
              CPTO）离职且无接班人到位；或出现由平台质量恶化驱动的客户端持续流失证据。投资者应针对上述每项维度设立监控阈值，作为持续承销的条件，并优先在数据室流程中跟进尽调问询（见 TR005）。
