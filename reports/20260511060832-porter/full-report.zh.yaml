      - number: '6.2'
        title: 用户规模与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Porter 最核心的规模指标是收入：FY23 为 ₹1,754 crore，FY24 为 ₹2,734 crore（同比增长 56%），FY25 为 ₹4,339 crore（同比增长
              57%）。连续两年在较大基数上维持约 57% 的年收入增速，有力说明增长来自真实交易量扩张，而非纯粹的价格驱动——尤其是考虑到抽佣比率始终维持在 14–16% 区间。以约 15% 的混合抽佣比率估算，FY25
              GMV 约为 ₹29,000 crore，意味着每年数以千万计的订单分布于大量 MSME 和消费者群体。截至 2025 年累计注册司机伙伴 120
              万，反映了匹配此需求所需的供给侧规模，但该数字为终身注册量而非同期活跃司机数。Porter 消费者 App 在 Google Play 的下载量超过 100 万次，评分 4.1/5；iOS 版本已在 Apple
              App Store 上线。这些指标印证了规模化消费者采用，但未揭示月活跃用户数或下单频率。Porter 司机伙伴 FY25 总付款约 ₹3,660–3,679
              crore，可作为独立交易量代理指标，印证收入数字的真实性。城市覆盖从 2020 年的约 8 个城市扩展至 2025 年的 22 个以上城市加 UAE，五年间增幅逾
              175%。公司未披露月活跃客户数、月订单量或平均订单价值。
