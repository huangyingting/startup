        title: 附录
        blocks:
          - type: callout
            title: 无具名客户披露：重大尽调缺口
            body: >
              截至 2026 年 5 月，Porter 在任何公开材料中均未披露任何具名企业或 MSME
              客户、客户案例研究或基于结果的参考信息。尽管这与面向消费者的交易型物流模式相符，但合同持久性、企业采用深度、客户集中度和分队列留存均无法从公开资料独立核实。任何投资者或收购方在就客户质量和关系持久性形成判断前，须请求提供以下数据室内容：前
              20 大客户收入集中度、各年份（FY22–FY25）分队列留存数据、NPS 或 CSAT 评分，以及 B2B API 集成客户数量。
