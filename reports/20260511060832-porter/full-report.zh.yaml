      - number: '1.4'
        title: 商业模式、产品与技术
        blocks:
          - type: paragraph
            body: >
              Porter 的商业模式是佣金制物流市场。需求侧，客户（中小微企业、商户、个人）通过 Porter 应用或网页门户预订车辆。供给侧，自有或经营轻型商用车、微型卡车或两轮车的独立司机合作伙伴接单，并在扣除
              Porter 平台佣金（14–16%，部分城市最高 30%）后赚取每单收益。

              技术平台涵盖：实时 GPS 车辆追踪；根据距离、车型和可用性匹配供需的动态调度算法；多站点行程规划与路线优化；ETA 预测；应用内 UPI/Razorpay 支付集成；面向中小微企业客户的数字 GST
              发票；交货证明（POD）文档；及客户评分/评价系统。

              Porter 的技术栈采用微服务架构，结合 MapMyIndia 和 Google Maps 的地图集成驱动定位服务，支持 iOS 和 Android 移动端及网页预订门户。FY25 年，Porter
              的科技驱动模式实现营收 43.06 亿至 43.39 亿卢比，同比增长 57%，其中货运收入占总营收 99%。

              Porter 的竞争优势在于：（1）供给侧密度——120 万名注册司机合作伙伴带来充裕运力和可靠 ETA；（2）以中小微企业为核心的产品功能（GST 账单、多站点、企业账户 API
              集成）；（3）一线城市的品牌认知度；（4）需求侧订单密度与供给侧司机收益之间的网络效应。阿联酋扩张（F 轮前已启动）是 Porter 首个国际市场，验证了其模式在较高收入物流市场的可复制性。
