      - number: '2.2'
        title: 市场规模——总可用市场、可服务市场与可获取市场
        blocks:
          - type: paragraph
            body: >
              据 Mordor Intelligence 估算，2025 年印度城内物流市场总可用市场（TAM）约为 335 亿美元，预计到 2031 年以 4.2–5% 的复合年增长率增长至 430
              亿美元。该估算涵盖所有车辆类型的城内货物运输，包括有组织和无组织市场。Shadowfax 2025 年第三方物流（3PL）行业报告估计，印度更广泛的 3PL 市场规模约为 250 亿至 300
              亿美元，城内物流是其中最主要的子细分市场。

              规模分层：在 TAM 层面，335 亿美元涵盖所有以商用车为基础的城内货运。对于有组织的科技驱动平台，保守的可服务市场（SAM）应根据可数字化的行程比例（目前有组织市场约占
              30%）及应用预订的商业可及性进行调整，按当前渗透率估算 SAM 约为 80 亿至 100 亿美元。Porter 在其当前 22 个城市覆盖范围内的可获取市场（SOM）是更小的子集；以 Porter FY25
              营收 43.39 亿卢比（约 5.15 亿美元）为当前运行率，Porter 约占其 SAM 的 5–6%，无论在现有城市的渗透深度还是新城市的拓展广度上均存在显著增长空间。

              重要规模注意事项：Mordor Intelligence 的 335 亿美元数字采用宽泛的市场定义，涵盖所有商用 LCV 运输，不区分是否平台化运营。Redseer 2024 年报告显示，有组织市场约占总量的
              30%，70% 仍属无组织市场。由于 Porter 只从有组织/平台化细分市场中获取收益，其真实 TAM 远小于表面数字所示。鉴于印度中小微企业数字化正在加速推动从无组织到有组织物流的结构性转变，4.2–5%
              的复合年增长率显得偏保守。
