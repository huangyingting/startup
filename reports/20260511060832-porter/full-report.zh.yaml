      - number: '4.2'
        title: 成本结构、毛利率与营运资金
        blocks:
          - type: paragraph
            body: >-
              Porter 的成本结构由车队运营商付款主导——即向司机合作伙伴支付的已完成行程费用——占 FY25 总支出的 82.8%，约为 36.60 亿至 36.79 亿卢比（总支出约 42.84
              亿卢比）。这一集中度在结构上有利：车队运营商成本完全可变（仅在行程完成时付款），因此 Porter 在需求低迷期无需承担固定车队成本。这种可变成本架构是 Porter
              运营杠杆的基础，解释了为何适度的营收增长能以不成比例的方式转化为规模盈利改善。

              员工成本约 2.85 亿卢比（约占总支出 6.5%），涵盖技术、运营、销售和客户管理人员。技术和平台基础设施成本估计约 1.50 亿卢比，覆盖云基础设施、调度算法开发、移动端应用工程及 GPS
              遥测。销售、一般及行政费用（含营销）估计约 1.00 亿至 1.50 亿卢比。这些固定和半固定成本层（估计合计约 5.35 亿至 5.85
              亿卢比）代表须从毛利率中覆盖的管理费用负担。随着交易量扩大，这些成本占营收比重持续稀释，推动利润率改善——从 FY24 净亏损 9,570 万卢比到 FY25 净利润 5,500 万卢比的轨迹可以印证这一趋势。

              FY25 毛利率（营收减去车队运营商付款后除以营收）估计为
              17–20%。对于处于运营杠杆早期阶段的市场平台而言，这一水平属适中，可以预期；毛利率扩张的主要驱动力是向更高价值中小微企业行程和高端车辆类别的产品组合迁移——这些类别每次行程的绝对佣金相对于车队运营商份额更大。营运资金动态有利：Porter
              通过应用或数字钱包在行程完成时或完成后即刻向客户收款，并按计划结算周期向车队运营商付款，形成短暂正向营运资金浮动。无库存，且无已披露的应收账款账龄问题。资本支出可忽略不计：Porter
              不持有任何车辆（司机合作伙伴自行融资购车），因此无车队资本支出负担。平台和技术基础设施资本支出已含于上述技术成本估算中。
