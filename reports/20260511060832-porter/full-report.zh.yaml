          note: 据印度中小企业部数据（2023–24 年），印度注册中小企业约 6,300 万家。并非所有企业都有城内 LCV 物流需求。
        - label: 有城内物流需求的城市中小企业
          value: 15000000
          note: 估计有 1,500 万城市中小企业从事制造、贸易或分销，在一线和二线城市有实质性城内货物运输需求。
        - label: Porter 服务地区的中小企业（22 城）
          value: 5000000
          note: 估计 Porter 当前印度 22 城覆盖范围内有 500 万家中小企业，主要集中于一线大都市区（班加罗尔、孟买、德里-国家首都辖区、海得拉巴、钦奈、加尔各答）。
        - label: Porter 应用或网站用户（估算）
          value: 2000000
          note: 据 Google Play 下载量超 100 万次及 iOS 应用渗透率估算，独立用户约 200 万（中小企业与消费者合计）。活跃用户与下载量之比未知。
        - label: Porter 活跃客户（估算）
          value: 750000
          note: 据 FY25 隐含 GMV 约 ₹29,000 crore 除以每中小企业账户估计年支出 ₹30,000–60,000，推算活跃预订客户约 50 万至 100 万。Porter 未公开披露活跃客户数量。
  - id: FU003
    title: Porter 客户证明质量矩阵
    type: matrix
    layout: standard
    summary: |
      跨客户细分与证明维度的证据质量评估，重点呈现可独立核实的方面及尽调层面存在实质性缺口的方面。
    claimRefs:
      - CU009
      - CU013
      - CU015
      - CU016
      - CU019
      - CU022
      - CU036
      - CU037
    data:
      columns:
        - 生产验证
        - 具名披露
        - 结果指标
        - 留存数据
        - 整体证据质量
      rows:
        - label: 中小企业细分
          values:
            - 间接——仅有匿名证言
            - 无披露
            - 无披露
            - 无披露
            - 差——无可核实的具名证明
          note: 最大营收细分市场零具名客户证据。porter.in 上的匿名证言可确认服务使用情况，但不提供任何可核实或可归因的数据。
        - label: 消费者细分
          values:
            - 是——超 100 万次下载，Google Play 评分 4.1/5
            - 无披露
            - 无披露
            - 无披露
            - 一般——整体满意度已确认；个体结果未知
          note: 消费者证明是现有最强的，但仅限于总体评分；无队列留存、客户终身价值或重复预订频率数据可查。
        - label: 企业 / B2B 客户
          values:
            - 无公开可查信息
            - 无披露
            - 无披露
            - 无披露
            - 无——零公开企业部署证据
          note: Porter Business API 已对外推广并销售；然而，无具名企业部署或结果的公开证据。尽调优先级最高的待查事项。
        - label: 分析师 / 第三方认定
          values:
            - 是——Redseer GMV 排名第一；Shadowfax 报告提及
            - 不适用
            - 仅市场地位
            - 不适用
            - 一般——独立规模佐证；非客户质量证明
          note: 分析师认定确认了 Porter 的 GMV 市场领导地位，但未提供客户层面的留存、满意度或合同持久性证明。
  - id: FU004
    title: Porter 估算客户留存队列
    type: cohort
    layout: standard
    summary: |
      基于收入轨迹建模估算的各队列留存率。所有数值均为模型推算估计值；Porter 未披露任何队列留存数据。第2年留存率估计为 72–74%，第3年为 55–57%，与新兴市场高频交易平台的基准水平一致。所有数据仅供参考。
    claimRefs:
      - CU022
      - CU023
      - CU024
    data:
      columns:
        - 第1年 (%)
        - 第2年 (%)
        - 第3年 (%)
      rows:
        - label: FY23 队列（估算）
          values:
            - 100
            - 72
            - 55
          note: FY23 队列第2年留存率估计为 72%，第3年为 55%，与观测到的收入增长模式及中小微企业物流平台基准值一致。所有数值均为估算。
        - label: FY24 队列（估算）
          values:
            - 100
            - 74
            - 57
          note: FY24 队列第2年留存率估计为 74%（小幅改善，反映产品成熟度提升），第3年估计为 57%（预测值）。第3年数据由 FY23 趋势外推得出。
        - label: FY25 队列（估算）
          values:
            - 100
            - 73
            - 56
          note: 截至2026年5月，FY25 队列尚处于第1年；第2年和第3年数值均为模型预测。所有数据仅供参考；Porter 未披露任何队列留存数据。
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: standard
    summary: |
      按风险类别划分的可能性热力图，标注 Porter 截至2026年5月的主要风险敞口。高可能性单元格包含已在发生或在12个月内高度概率发生的风险；中等可能性单元格需持续监测；低可能性单元格属于尾部风险，一旦发生将产生重大后果。
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR013
      - CR021
      - CR036
    data:
      columns:
        - 监管/法律
        - 运营
        - 合作方/依赖关系
        - 财务/模型
        - 人员/执行
      rows:
        - label: 高可能性
          values:
            - MV 聚合商指导方针2025年执行
            - 司机供给中断（罢工/抵制）
            - MapMyIndia 单一供应商依赖
            - 抽佣率压缩（监管上限）
            - CEO 更替风险（Uttam Digga）
          note: 12个月内高可能性；每项均代表近期可能发生的事件。
        - label: 中等可能性
          values:
            - 2020年社会保障法规成本执行
            - 高峰需求期平台宕机
            - Razorpay/UPI 政策变更
            - EBITDA 利润率压缩
            - CPTO 离职风险
          note: 中等可能性；应为每项建立监测阈值。
        - label: 低可能性
          values:
            - 零工工人重新归类为雇员
            - 多日平台宕机
            - 云服务提供商故障
            - 投资方撤资（F 轮新股）
            - 董事会治理纠纷
          note: 尾部风险；一旦发生影响重大；基准情景下发生概率低。
    approximationNotes: 可能性评估为定性判断，基于截至2026年5月的公开监管、运营和财务证据。这些评估并非精算概率。
  - id: FR002
    title: 风险传导图
    type: dag
    layout: standard
    summary: |
      有向无环图，展示 Porter 主要风险来源如何经由运营与财务中间环节逐级传导，最终对收入、EBITDA、投资者信心及退出/IPO 路径产生投资相关影响。
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR013
      - CR029
      - CR033
      - CR040
    data:
      nodes:
        - id: mv-guidelines
          label: MV 聚合商指导方针2025
          type: input
        - id: social-security
          label: 2020年社会保障法规
          type: input
        - id: tgpwu-action
          label: TGPWU 劳工行动
          type: input
        - id: competitor-discounting
          label: 竞争对手折扣竞争
          type: input
        - id: driver-disruption
          label: 司机供给中断
          type: process
        - id: take-rate-compression
          label: 抽佣率压缩
          type: process
        - id: cost-increase
          label: 运营成本上升
          type: process
        - id: revenue-loss
          label: 收入损失
          type: output
        - id: ebitda-deterioration
          label: EBITDA 恶化
          type: output
        - id: investor-confidence
          label: 投资者信心
          type: output
        - id: ipo-exit-path
          label: IPO / 退出路径
          type: output
      edges:
        - from: mv-guidelines
          to: take-rate-compression
          label: 强制设定上限
        - from: social-security
          to: cost-increase
          label: 1-2% 营业额征税
        - from: tgpwu-action
          to: driver-disruption
          label: 组织司机罢工
        - from: competitor-discounting
          to: take-rate-compression
          label: 市场压力
        - from: take-rate-compression
          to: revenue-loss
          label: 降低 GMV 收益率
        - from: driver-disruption
          to: revenue-loss
          label: 履约失败
        - from: cost-increase
          to: ebitda-deterioration
          label: 利润率侵蚀
        - from: revenue-loss
          to: ebitda-deterioration
          label: 直接影响损益
        - from: ebitda-deterioration
          to: investor-confidence
          label: 削弱投资逻辑
        - from: ebitda-deterioration
          to: ipo-exit-path
          label: 延迟准备就绪
        - from: investor-confidence
          to: ipo-exit-path
          label: 影响估值倍数
    approximationNotes: 本图为定性分析，有来源支撑；展示因果方向，而非综合概率权重。所有显示的边均有所引用声明的支持。
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: standard
    summary: |
      关键依赖关系图，展示 Porter 在平台运营、服务交付、监管合规及资本获取方面所依赖的交易对手与基础设施组件。边表示依赖关系及其性质。
    claimRefs:
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
    data:
      nodes:
        - id: porter-platform
          label: Porter 平台
          type: process
        - id: mapmyindia
          label: MapMyIndia (Mappls)
          type: input
        - id: razorpay-upi
          label: Razorpay / UPI
          type: input
        - id: cloud-provider
          label: AWS / 云服务提供商
          type: input
        - id: fleet-operators
          label: 车队运营商（1.2M）
          type: input
        - id: rbi
          label: RBI（UPI 政策）
          type: input
        - id: morth
          label: MoRTH（监管）
          type: input
        - id: kedaara-wellington
          label: Kedaara / Wellington（资本）
          type: input
        - id: customers-msmes
          label: 客户 / 中小微企业（MSME）
          type: output
      edges:
        - from: mapmyindia
          to: porter-platform
          label: 路线规划与导航
        - from: razorpay-upi
          to: porter-platform
          label: 支付处理
        - from: cloud-provider
          to: porter-platform
          label: 托管与算力
        - from: fleet-operators
          to: porter-platform
          label: 车辆供给与调度
        - from: rbi
          to: razorpay-upi
          label: UPI 政策与监管
        - from: morth
          to: porter-platform
          label: 聚合商牌照与抽佣率规则
        - from: kedaara-wellington
          to: porter-platform
          label: 股权资本与董事会监督
        - from: porter-platform
          to: customers-msmes
          label: 城市内物流服务
    approximationNotes: 依赖流向具有方向性；箭头方向表示哪一方向哪一方提供服务。监管边表示监管权力，而非服务提供关系。
  - id: FV001
    title: Porter 融资历程与资本结构流向
    type: flow
    layout: standard
    summary: >-
      Porter 的股权融资历程，从2017年种子轮到2025年5月 F 轮独角兽融资，展示各轮次投资方的进入情况，以及随着 Porter 向盈利和独角兽地位迈进，资本构成从风险投资（Sequoia、Tiger
      Global）向成长期股权（LightSpeed India）再向私募股权和机构资本（Kedaara 与 Wellington）的演变。
    claimRefs:
      - CV001
      - CV002
      - CV024
      - CV026
      - CV027
    data:
      nodes:
        - id: seed
          label: 种子轮（2017年）
          type: start
        - id: seriesA
          label: A 轮 — $20M（2019年）
          type: process
        - id: seriesBC
          label: B/C 轮 — 约 $70M（2020–2021年）
          type: process
        - id: seriesDE
          label: D/E 轮 — 约 $160M（2022–2023年）
          type: process
        - id: seriesF
          label: F 轮 — $200M @ $1.2B（2025年）
          type: end
      edges:
        - from: seed
          to: seriesA
          label: Sequoia Capital India、Kalaari Capital（投资方）
        - from: seriesA
          to: seriesBC
          label: Tiger Global、Vitruvian Partners（投资方）
        - from: seriesBC
          to: seriesDE
          label: Tiger Global 领投；LightSpeed India E 轮
        - from: seriesDE
          to: seriesF
          label: Kedaara Capital + Wellington Management
  - id: FV002
    title: Porter 估值情景评分矩阵
    type: matrix
    layout: standard
    summary: 在乐观、基准和悲观情景下，对 Porter 五个投资维度进行评分的矩阵。评分为定性评估，反映各维度对整体投资逻辑贡献的方向和幅度。矩阵突出显示，监管风险是唯一能够使整体投资逻辑从"强劲"转为"受损"的维度，不受其他维度影响。
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV018
      - CV019
      - CV043
      - CV041
    data:
      columns:
        - 收入增长
        - 运营杠杆
        - 监管风险
        - 退出路径
        - 整体投资逻辑
      rows:
        - label: 乐观情景
          values:
            - 高 — 50% 复合年增长率持续
            - 高 — 可变成本结构保持稳定
            - 低风险 — 无监管通知
            - 高 — IPO FY27–28，估值 $2B 以上
            - 强劲 — 1.6–2.1× 回报
          note: 五个维度全部正向一致。需同时满足监管不干预与成功拓展至50个城市。概率：25–30%。
        - label: 基准情景
          values:
            - 中 — 40% 复合年增长率
            - 中 — 局部监管压力
            - 中 — 一项监管文件通知
            - 中 — IPO 或私募老股交易
            - 可接受 — 1.2–1.5× 回报
          note: 最可能的结果。收入增长放缓，但 EBITDA 利润率有所扩张。一项监管文件通知，但非两项同时触发。概率：50–55%。
        - label: 悲观情景
          values:
            - 低 — 25% 复合年增长率；需求中断
            - 负面 — 双重冲击压缩利润率
            - 关键 — 两项监管文件均通知
            - 受限 — IPO 延迟或低于入场价格的并购出售
            - 受损 — 低于 $1.2B 入场价格
          note: 双重监管冲击在24个月内发生。冲击第1年 EBITDA 转负。$1.2B 入场价格面临资本减损风险。概率：20–25%。
  - id: FV003
    title: Porter 隐含估值敏感性区间
    type: range
    layout: standard
    summary: >-
      以百万美元计，在悲观、基准和乐观情景下的企业价值区间。区间反映收入复合年增长率、EBITDA 利润率结果以及相对于 $1.2B F 轮入场价格的 EV/收入倍数压缩或扩张的综合影响。悲观情景区间（$700–1,000M）低于 F
      轮入场价，表明在概率估计为 20–25% 的双重监管冲击情景下存在资本减损风险。
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV043
    data:
      items:
        - label: 悲观情景（双重监管冲击）
          low: 700
          high: 1000
          note: MV 聚合商抽佣率上限加上社会保障法规零工成本；收入复合年增长率至 FY28 为 25%；1.5–2.0× EV/收入；低于 $1.2B F 轮入场价。资本减损风险。
        - label: 基准情景（$1.2B 入场价格）
          low: 1400
          high: 1800
          note: 收入复合年增长率至 FY28 为 40%；监管环境稳定；2.5–3.0× EV/收入；与 Delhivery 可比倍数一致。F 轮入场可带来 1.2–1.5× 回报。
        - label: 乐观情景（IPO 溢价）
          low: 1900
          high: 2500
          note: 收入复合年增长率至 FY28 为 50%；IPO 重新估值；企业客户结构转变推动 EBITDA 达到 8–10%；3.5–4.0× EV/收入；$1.2B 入场可在3年内带来 1.6–2.1× 回报。
  - id: FV004
    title: Porter 融资与估值里程碑时间线
    type: timeline
    layout: standard
    summary: Porter 从2014年创立到2025年5月 F 轮独角兽融资的融资里程碑时间线，展示资本部署节奏、估值跃升，以及随着 Porter 逼近盈利并实现首个盈利年里程碑，资本构成从风险投资向机构资本的过渡。
    claimRefs:
      - CV001
      - CV002
      - CV006
      - CV026
      - CV027
    data:
      items:
        - label: 在班加罗尔创立
          value: '2014'
          note: Porter 于2014年在班加罗尔创立；最初专注于以技术赋能的城市内物流，服务中小微企业（MSME）和个人消费者，采用基于佣金的市场模式。
        - label: A 轮 — $20M
          value: '2019'
          note: Sequoia Capital India 与 Kalaari Capital 领投 A 轮；Porter 扩展至孟买和德里-NCR；开始以中小微企业为核心的商业车队平台定位。
        - label: B/C 轮 — 约 $70M（2020–2021年）
          value: '2021'
          note: Tiger Global 与 Vitruvian Partners 加入；资金支持快速城市扩张；新冠疫情加速了中小微企业从非正规替代方案转向有组织城市内物流的采纳步伐。
        - label: D/E 轮 — 约 $160M（2022–2023年）
          value: '2023'
          note: LightSpeed India 领投 E 轮；Porter 聚焦单位经济效益改善与盈利路径；收入从 ₹1,754 Cr（FY23）增长至 ₹2,734 Cr（FY24），同比增长 56%。
        - label: F 轮 — $200M @ $1.2B（独角兽）
          value: '2025'
          note: >-
            Kedaara Capital 与 Wellington Management 联合领投；投后估值12亿美元；Porter 首个合并报表盈利年（FY25 净利润 ₹55 Cr）；CCI
            于2025年1月批准；独角兽地位授予。
