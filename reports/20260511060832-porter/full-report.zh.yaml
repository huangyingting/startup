      - number: '4.5'
        title: 财务结论：收入质量、利润路径与尽调障碍
        blocks:
          - type: paragraph
            body: >-
              Porter FY25 合并盈利是商业模式的真实拐点：99% 佣金收入按完成行程时点确认、82.8% 可变车队运营商成本结构，加上 57%
              收入复合年增速，构成一个机械上自洽、已获实证验证的利润扩张逻辑。收入质量高——Ind AS 115
              时点确认、无递延收入风险、终端客户零应收款集中度、不受单一客户依赖拖累的交易量模型。平台撮合架构彻底免除车队资本支出，资本密集度低于任何自持资产的货运竞争者。

              利润率扩张路径可信，但依赖四个杠杆同时奏效：(1) MSME 结构向高票值行程迁移，每单绝对佣金随之扩大；(2) 地域规模扩张，固定开销摊薄于更大行程量；(3) 规模增长带来技术与平台成本的经营杠杆；(4)
              对车队运营商付款率维持持续定价纪律。最后一项监管风险最大：印度《2025 年社会保障法典》拟强制要求平台向灵活工人社会保障基金缴款，可能将部分可变车队运营商成本转为法定义务。TGPWU 和 BHRRC 于
              2025 年 7 月就海德拉巴剥削性劳动条件提出的公开指控，也可能推高司机招募成本与司机福利合规支出——两项数字目前均未公开。

              三项尽调障碍至今悬而未决，制约机构承销。第一，GMV 未披露——缺乏 GMV，无法跨车型或城市层级独立核实真实抽佣比率与定价权。第二，MSME 客户和司机伙伴的 CAC
              均未披露——无法独立对单位经济模型和回收周期作出判断。第三，各城市层级与车辆品类的边际贡献率未披露——盈利基础可能集中于少数高密度核心城市。这些缺口对印度 IPO 前私有企业属惯常状态，但对任何希望独立建模
              FY26–FY27 利润率轨迹的投资者而言均属重大。总体财务结论：收入质量高，利润率路径可信且持续推进，资本充足，但三项单位经济缺口在确立仓位前仍是重大尽调待办项。
