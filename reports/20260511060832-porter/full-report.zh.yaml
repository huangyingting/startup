      - number: '1.5'
        title: 规模、里程碑与负面事件
        blocks:
          - type: paragraph
            body: >
              Porter 从 2014 年一家以班加罗尔为中心的物流初创，成长为全印独角兽，十年间规模持续复利扩张。截至 2025 年 5 月的关键规模指标：覆盖印度 22 个以上城市及阿联酋；累计注册司机合作伙伴 120
              万名；约 2,715 名全职员工（2025 年 2 月）；FY25 合并营收 43.06 亿至 43.39 亿卢比。公司已宣布激进扩张计划：进入卡利卡特、蒂鲁普尔和拉杰果特（2025–26 年）；在另外 8
              个中小微企业重点城市（迈索尔、马杜赖、贾巴尔普尔、瓜廖尔、密鲁特、阿格拉、奥兰加巴德、特里苏尔）启动运营，预计为司机合作伙伴创造 6.4 万个新就业机会；目标 2030 年覆盖 50 个城市。

              财务里程碑：经历多年运营亏损后，Porter 于 FY25 实现合并净利润 5,500 万卢比（独立实体净利润 1.31 亿卢比），EBITDA 约 4,800 万卢比（FY24 为 -1.12
              亿卢比）。营收轨迹：FY23 17.538 亿卢比 → FY24 27.34 亿卢比（+56%）→ FY25 43.06 亿至 43.39 亿卢比（+57%）。

              负面事件与 ESG 风险：2025 年，零工工人工会——尤其是泰伦加纳零工与平台工人联合会（TGPWU）——公开指控 Porter
              在海得拉巴平台对司机合作伙伴存在剥削性工作条件、不公平停权及申诉机制不足。相关指控被 Times of India、The Hans India
              及商业与人权资源中心报道。工会要求制定按公里计费标准、取消费用保护机制及正式申诉程序。鉴于印度即将生效的《2020 年社会保障法典》（2025 年 11 月生效）要求平台企业将年营业额的 1–2%
              缴入零工工人社会保障基金，以及《2025 年机动车聚合平台指南》规定最低收入保障、佣金上限和强制保险，上述问题具有重要的实质性影响。
