      - number: '8.2'
        title: 投资逻辑与反论
        blocks:
          - type: paragraph
            body: >-
              Porter 12 亿美元估值的多头逻辑建立在四根结构性支柱之上。第一，收入动能：连续两年在日益扩大的基数上维持 57%
              的同比增速，在印度物流领域这一规模下实属罕见，意味着真实交易量扩张而非价格通胀。第二，经营杠杆：82.8%
              的费用为可变成本（车队运营商付款仅在行程完成后支付），每一卢比增量收入以远高于比例的速度流向边际贡献。第三，网络效应：Porter 120 万名累计注册司机伙伴和 22
              个以上城市的覆盖，构建了供给侧护城河，任何新进入者在单个核心城市复制这一壁垒至少需要 12–24 个月时间和大量资本，全国层面更是如此。第四，市场时机：印度同城有组织货运市场预计到 2030 年达到 80–120
              亿美元，年复合增速约 15–20%；Porter 凭借 Redseer 认定的 GMV 第一市场地位，有望超比例获取市场扩张份额。

              空头逻辑同样结构清晰。第一项也是最迫切的风险是监管层面：MV 聚合平台指导方针若按草案发布，可能对订单总值设定 80% 最低付款下限，机械性地将 Porter 佣金上限限定在
              20%，并将靠近下限车辆的混合抽佣比率从当前 14–30% 区间压缩 5–10 个百分点。第二项风险是灵活工人成本重新分类：《2020
              年社会保障法典》灵活工人条款一旦实施，可能将部分车队运营商付款从完全可变成本转化为固定法定缴款（估计为司机收入的 2–5%），削弱 Porter
              最具吸引力的财务特征——经营杠杆。第三项风险是集中度：班加罗尔估计占收入的 25–30%；该城市若遭受特定监管冲击、竞争反应或需求扰动，将对损益表产生超比例影响。2025 年 TGPWU
              海德拉巴司机剥削投诉是司机侧摩擦的早期不利信号，可能升级为更广泛的监管审查。
