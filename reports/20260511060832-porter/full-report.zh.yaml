      - number: '6.4'
        title: 留存、复购与满意度
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Porter 在任何公开文件、媒体采访或投资者沟通中均未披露净收入留存率（NRR）、毛收入留存率（GRR）、分队列流失率或续约率。这一缺失是 Porter
              客户故事中最关键的不可验证维度。不过，多项间接指标表明结构性高复购的存在。第一，MSME 物流需求本质上是高频重复的：每日或每周使用 Porter 移动货物的小型制造商或贸易商，找不到能在按需预订、实时追踪和
              Porter 覆盖地域与车型广度上的同城 LCV 服务中媲美的替代品。第二，FY25 在 FY24 较大基数上实现 57%
              的同比收入增长，意味着客户留存至少足以在叠加新客户获取的情况下维持净扩张。第三，Google Play 4.1/5
              评分保持稳定，表明未出现因产品质量下降或系统性服务失效引发的大规模流失。第四，司机伙伴总付款额与收入数字高度吻合，印证增长来自真实交易量。不利方面，2025 年 TGPWU
              投诉中提及海德拉巴司机不公平停权，引入供给侧不稳定性，可能演化为客户端服务质量下滑。MSME 的价格敏感度——估计切换触发点为 5–10%
              的成本差异——意味着客户忠诚度主要绑定于运营可靠性和价格竞争力，而非强迫性转换成本。若无来自尽调数据室的 NPS、CSAT 或分队列留存数据，Porter 客户关系的持久性无法得到独立验证。
