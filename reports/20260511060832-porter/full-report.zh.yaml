      - number: '8.6'
        title: 退出准备情况与最终尽调诉求
        blocks:
          - type: paragraph
            body: >-
              Porter 最可能的退出路径是在 NSE 或 BSE 完成国内 IPO，预计上市窗口为 FY27–FY28，依据是首个盈利年里程碑（FY25）、F 轮稳定期以及印度物流行业可比 IPO
              时间线（Shadowfax、Delhivery）。次要路径包括：向全球物流平台（DHL、Maersk 或 Yamato、SG Holdings 等日系整合商）进行战略性出售，或在 IPO 市场转弱时于
              FY26–FY27 完成私募二级市场出售。Wellington Management 以金融回报投资人（而非战略投资人）身份参与 F 轮，强化了 IPO 路径信号：Wellington
              通常选择通过公开市场上市退出，而非战略出售。

              四项重大尽调缺口使得投资确信度无法无条件成立。其一，Kedaara-Wellington
              条款清单中的棘轮条款——特别是任何保底回报、反摊薄或价格保护条款——尚未公开披露，在基准或悲观情景下可能影响回报分配。其二，FY24 后启动城市的城市级单位经济模型尚未公开；50
              城扩张的资本部署效率无法独立建模。其三，F 轮之上的优先股堆叠——早期轮次是否保留剩余清算优先权——未公开披露，可能影响低于 12 亿美元退出场景下的普通股回报。其四，F 轮清算优先权条款（1× 非参与式 vs
              参与式；赎回权）未披露，影响下行情景的回收测算。

              尽调团队应从数据室索取：FY25 合并审计财务报表（Ind AS 准则）、前 10 大城市的城市级损益贡献报告、含优先股堆叠的完整股权结构表、F 轮条款清单（棘轮、赎回、反摊薄条款）以及管理层编制的
              FY26–FY28 财务预测。印度可比物流公司的 IPO 记录提供有益先例：Delhivery 的 NSE 上市及 Shadowfax 待完成的 IPO，均为定价、锁定期及机构需求提供了直接参考。
