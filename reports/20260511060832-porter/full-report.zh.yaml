            title: 首个盈利年度——结构性拐点
            body: >-
              Porter FY25 合并净利润达 5,500 万卢比、EBITDA 约 4,800 万卢比（FY24 EBITDA 为 -1.12 亿卢比），这一转变具有结构性意义。车队运营商成本虽占总支出约
              82.8%，但属完全可变成本，随营收同步变动。随着每个城市的收入密度提升，固定成本被摊薄至更大基数，推动利润率扩张。这一盈利里程碑叠加 2 亿美元 F 轮融资，为 Porter 未来 IPO 奠定有利基础。
            calloutType: insight
