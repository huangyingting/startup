      - number: '2.4'
        title: 增长驱动、约束因素与市场动态
        blocks:
          - type: paragraph
            body: >
              印度城内物流市场既受强劲结构性顺风驱动，也面临近期实质性约束。需求侧：印度电商市场 2024 年 GMV 已超 700 亿美元，预计 2030 年达 2,000 亿美元，城内末端配送是主要瓶颈。印度城市人口预计到
              2047 年新增 4.16 亿，在二三线城市创造新的物流需求。政府推行的 PM GatiShakti 国家总体规划——1,000
              兆卢比基础设施投资计划——正在建设公路、铁路和多式联运连接，降低城际货运成本并提振城内商业活动。GST 落地加速了中小微企业正规化和数字发票化，使平台物流更具吸引力。电动车普及正在催生新车队类别（电动
              LCV、电动两轮车），降低每公里成本，吸引新一批司机合作伙伴加入。

              约束侧：印度 LCV 车队所有权高度分散（多为个人车主，非车队公司），导致供给侧接入挑战和司机留存摩擦。零工经济的司机流失率较高；Porter 的 120
              万注册数为累计值，非活跃值。燃油价格波动直接影响车队运营商成本及 Porter 的抽佣经济模型。《2020 年社会保障法典》和《2025 年机动车聚合平台指南》带来监管风险，给 Porter
              创造强制性成本义务。来自电商物流领域的新进入者（Delhivery、Shadowfax）正在向城内市场进行相邻扩张。

              市场分散化既是机遇也是风险：70% 的市场仍属无组织意味着巨大转化潜力，但也意味着来自面临较低监管和合规成本的非正规运营商的价格竞争。
