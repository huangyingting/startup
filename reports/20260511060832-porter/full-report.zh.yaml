  - id: TV002
    title: Porter 投资论点与反向论点评估
    subtitle: Structured bull and bear arguments by dimension with assessed probability weight as of May 2026
    columns:
      - 维度
      - 多头逻辑
      - 空头逻辑
      - 权重
      - 核心不确定性
    claimRefs:
