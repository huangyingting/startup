      - number: '3.3'
        title: 能力、定价与市场进入策略比较
        blocks:
          - type: paragraph
            body: >-
              在能力维度上，Porter 在印度地理覆盖广度、中小微企业账户管理工具、规模化 GST 合规开票、企业 API 集成以及多元服务广度（LCV、两轮车、家庭搬迁、微型卡车）方面领先所有直接竞争对手。Lalamove
              在其运营的四个主要城市，核心按需 LCV 调度和实时追踪方面与 Porter 相当，但缺乏 Porter 的中小微企业特定功能、更广泛的城市覆盖以及主要城市以外的深度司机供给。Blowhorn
              的功能集更为有限：企业级能力较少，在印度南部以外的品牌认知度较低，城市覆盖范围也更窄。在定价方面，Porter 每次行程 14–30% 的佣金模式在印度按需物流平台中属于竞争性范围；Lalamove
              采用与之大致相当的按预订佣金模式。无组织经纪人的利润不透明，表面上看可能更低，但不包含合规、追踪和争议解决的价值。Delhivery 和 Shadowfax 的定价结构完全不同——分别为按件快递费率和 B2B
              货运合同——因为其产品和客户群与 Porter 存在根本差异。Porter 的市场进入策略以刻意的中小微企业聚焦为差异化特色：约 60–65% 的营收来自重视 GST
              开票、行程记录、账户管理和多次行程排班（而非纯价格）的中小企业账户。Lalamove
              在印度以主要城市优先为策略，目标受众混合了小型企业和个人消费者，对中小微企业合规定位的明确性不足。在信任与监管立场方面，Porter 面临来自 TGPWU 零工工人工会和商业与人权资源中心（2025 年 7
              月）的不利指控，形成实质性 ESG 和合规风险，而 Lalamove 在印度尚未公开面临此类情况。在公开可获取的信息来源中，尚无 Porter 向具名竞争对手流失实质性市场份额的直接证据。
