      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Porter 的技术栈围绕四个功能层构建：(1) 面向客户的前端层（iOS/Android App、网页预订门户）；(2) 核心平台服务层（预订引擎、调度算法、支付、通知）；(3)
              数据与智能层（GPS/定位、路线优化、动态定价、ETA 预测）；(4) 基础设施层（云托管、地图 API、第三方集成）。

              预订引擎处理行程请求，按城市分区校验车辆可用性，实时确认订单。调度算法（Porter 产品文档称其为"智能车队分配"）利用司机伙伴实时 GPS
              位置、车型过滤器及接驾预计时间完成供需匹配。多站行程逻辑允许客户添加中途站并实时重新计算费用。ETA 预测模型结合历史行驶速度与实时路况数据。地图方面，Porter 集成
              MapMyIndia（提供印度本地高精度路网数据）和 Google Maps（提供更广泛覆盖与消费者端用户体验）。支付处理依托 Razorpay 和 Paytm/UPI
              接口。平台采用微服务架构，预订、调度、追踪与账单组件可独立扩展。GST 开票和 POD 模块作为附加服务叠加于核心行程工作流之上。

              UAE 市场方面，Porter 将平台适配为英语界面、AED 支付处理和 UAE 路网地图，需要并行部署而非全球单一多租户系统，带来一定运营开销。CPTO Shruti Ranjan Satpathy（2023
              年上任）负责技术平台。Porter 未发布技术博客、开源代码仓库或正式 API 文档，外部对其架构主张的独立技术验证因此十分有限。司机伙伴端 App 的功能（接单、导航、数字 POD
              采集、收入追踪）与消费者端大体对等。
