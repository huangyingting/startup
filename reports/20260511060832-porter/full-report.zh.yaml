  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式、定价与收入质量
        blocks:
          - type: paragraph
            body: >-
              Porter 采用单一机制收入模式：对通过平台预订的每笔已完成货运行程收取佣金。该佣金依据车型、距离和城市层级，占预订总价的 14–30%，按印度会计准则（Ind AS）115
              在行程完成时即时确认，没有递延收入，形成清晰的逐笔交易收入流。FY25 合并营收达 43.39 亿卢比，同比 FY24 的 27.34 亿卢比增长 57%，后者较 FY23 的 17.538 亿卢比增长
              56%。货运收入约占 FY25 营收的 99%；其他运营收入（附属平台技术费和增值服务）约占剩余 1%。目前无任何已披露的 SaaS、订阅或资产性收入流。

              按市场平台标准衡量，收入质量较高。确认为即时（每次完成行程），非递延，最大程度降低收入冲销风险。无合同锁定意味着收入完全由交易量和产品结构驱动——相对于有复杂捆绑合同的平台，这是一种透明度优势。Porter
              14–30% 的佣金率与全球按需物流基准相比有利（Lalamove 在可比亚洲市场为 15–25%）。两轮车细分每次行程绝对佣金较低（11–50 卢比），而中型 LCV 和大型卡车预订可带来 270–2,400
              卢比，因此引导中小微企业客户预订更大车辆是佣金模式内的主要利润率杠杆。

              Porter 尚未拆分 B2B 企业与消费者预订量，也未披露 GMV（流经平台的所有预订总价值）。以 20% 综合佣金率反推，43.39 亿卢比营收对应 GMV 约为 217 亿卢比；以 30%
              综合佣金率计算约为 145 亿卢比。这一宽泛区间凸显了 GMV 估算对真实综合抽佣率的高度敏感性——Porter 尚未按车辆类别或城市层级正式披露这一数据。

              营收增长的市场进入动作以中小微企业客户经理、通过 Porter 应用的自然数字发现以及将 Porter 预订嵌入企业 ERP 和调度系统的 B2B API 集成为核心。Porter
              未公开披露获客成本（CAC）或回本周期——这一数据缺口限制了对销售效率的独立评估。公司以交易量驱动的复购模式在结构上意味着有效 CAC 低于单次购买市场，但需要队列级留存数据来支撑这一判断。
