      - number: '7.2'
        title: 运营与平台风险
        blocks:
          - type: paragraph
            body: >
              Porter 的运营风险既源于双边撮合平台本身的内在复杂性，也源于激进地域扩张的执行压力。最迫切的近期运营风险是司机供给中断。在 120
              万名累计注册司机伙伴、同期活跃司机数未披露的情况下，任何有组织的停工、城市范围罢工或大规模司机停权，均可能实质性损害受影响城市的订单履约率。海德拉巴的 TGPWU
              先例表明，此类组织行动是真实而非假设的风险。Porter 未公开披露司机投诉机制、申诉专员职能或可降低有组织中断概率的结构性福利计划。

              城市扩张执行风险不容小觑。Porter 的目标是从 22 个城市扩张至 2030 年的 50 个城市，约五年内新增 28
              个城市。每个新城市均需同时推进司机供给招募、本地运营基础设施建设、客户获取和需求聚合，以在合理回收周期内实现临界规模。Porter 未披露各城市单位经济、新城市平均盈亏平衡时间或单城市资本需求。现有 22
              个城市包括一线城市（Shadowfax、Lalamove、Loadshare 竞争激烈）和二线市场（非组织化运营商主导，价格敏感度极高）。

              平台可靠性风险结构性偏高，因为 Porter 需为时间敏感的 MSME 配送提供实时调度撮合。目前无已发布的平台正常运行时间、派单延迟或订单履约率 SLA。Porter
              未披露灾难恢复（DR）或业务连续性计划（BCP）。高峰期（早晨或下午配送窗口）一旦发生重大派单引擎故障，将直接导致以 Porter 为主要物流服务商的 MSME 客户订单失败。次要运营风险包括欺诈司机的 GPS
              欺骗、虚假订单、下单后司机取消及客户爽约。Porter 的 Google Play App 4.1/5 评分中有用户反馈提及司机取消和 ETA 不准——表明欺诈和可靠性问题并非纯属假设。

              Porter UAE 扩张（2024 年启动）带来跨境监管与运营风险。UAE 交通法规与印度存在实质性差异；UAE 市场需要独立的平台许可、不同劳工框架下的司机入网，以及支付基础设施。截至 2026 年 5
              月，UAE 的牵引力数据（订单量、收入、司机数量）均未披露。
