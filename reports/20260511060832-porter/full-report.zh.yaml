  - id: FP003
    title: 护城河 / 就绪度关键指标
    type: kpi
    layout: standard
    summary: 五项核心 KPI，展示 Porter 在 FY25 的竞争护城河就绪状态，并在数据可得时与具名竞争对手进行基准对比。Porter 在城内 LCV 同业中所有可量化维度均领先；零工劳动者风险指数是主要负面信号。
