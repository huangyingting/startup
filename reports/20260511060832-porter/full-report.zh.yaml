  - id: TP004
    title: 护城河持久性 / 竞争风险登记
    columns:
      - 护城河或风险维度
      - 当前强度评估
      - 主要威胁
      - 威胁严重性
      - 时间跨度
      - 缓解措施
      - 尽调要求
    rows:
      - - 供给密度（120 万司机合作伙伴）
        - 极强——10 年司机积累；在轻型商用车平台中城市深度无可匹敌
        - Lalamove 或资金充裕的新进入者补贴司机招募
        - 中等——复制成本高且耗时
        - 3–5 年方可实质性缩小差距
        - Porter 扩张至 39+ 个城市，将密度护城河延伸至新市场
        - 要求披露月活司机数量及按城市分组的 12 个月留存队列
      - - MSME 信任度与品牌认知
        - 强——10 年 MSME 服务记录；GST 合规被广泛视为用户采纳的驱动因素
        - 零工工人负面报道损害司机侧信任；可靠性下降时 MSME 可能流失
        - 中等——品牌积累需数年，但侵蚀速度可能更快
        - 若 TGPWU/BHRRC 指控升级则属近期风险
        - 主动合规投入；司机福利计划
        - 审查司机流失率、MSME 净推荐值（NPS）及公众舆情追踪
      - - GST 合规与发票基础设施
        - 强——自动化 GST 计费相比非正规中间商具有结构性优势
        - GST 执法推动非正规从业者通过竞争平台数字化
        - 低至中等——Porter 受益于正规化压力
        - 中期（全面正规化需 3 年以上）
        - Porter 具备良好条件承接正规化驱动的 MSME 增量
        - 追踪针对非正规物流的 GST 执法行动；Porter 市场份额趋势
      - - 网络效应（供需飞轮）
        - 中等——供给密度提升预计到达时间和接单率，从而吸引更多需求
        - 司机和客户的多平台使用稀释了网络锁定效应
        - 中等——多平台使用在个人消费者层面更为普遍
        - 持续存在；随 Lalamove 在主要都市扩张而加剧
        - MSME 账户工具与企业 API 集成加深平台黏性
        - 衡量各城市接单率与司机密度的相关性；追踪流失率
      - - 技术平台与产品深度
        - 强——成熟的调度算法、多点优化、司机端应用、客户端应用
        - Lalamove 的全球技术投入；Delhivery 的工程规模
        - 低至中等——Porter 在产品上有先发优势，但技术护城河并非不可逾越
        - 资金充裕的竞争者需 2–3 年方可缩小功能差距
        - 持续研发投入；在 MSME 专属功能上形成差异化
        - 审查 Porter 的工程人员规模及研发支出趋势
      - - 地理扩张速度（2026 年 39+ 个城市；2030 年达 50 个）
        - 强——印度暂无竞争对手能与 Porter 的扩张路线图相匹敌
        - Blowhorn 或 Lalamove 加速扩张；Delhivery 进入新市场
        - 低——竞争对手当前扩张速度较慢
        - 竞争对手需 3–5 年方可追平城市覆盖规模
        - 快速进入二三线城市可建立先发的供给密度优势
        - 每季度追踪 Lalamove 和 Blowhorn 的城市进入公告
      - - 监管风险——2025 年零工工人《社会保障法典》
        - 较高——TGPWU/BHRRC 指控尚悬，法规实施在即
        - 公积金及保险强制要求预计使每位司机成本上升 10–25%（估计）
        - 重大——可能大幅压缩利润结构
        - 若 2025–2026 年推进实施则属近期风险
        - 含合规成本情景的利润模型；司机福利投入
        - 建模公积金和保险成本对 FY26 单位经济模型的影响；要求管理层提供视角
      - - Series F 后资本充足性与同业对比
        - 有利——$200M Series F（2025 年 5 月）按当前烧钱速度可提供 18–24 个月以上现金跑道
        - Lalamove 资本注入支持印度补贴策略；Delhivery 资本用于转型
        - 低至中等——Porter 资本充裕；FY25 实现盈利
        - 近期；Lalamove 可能发起补贴活动
        - Porter 的盈利能力降低对资本的依赖；定价具有灵活性
        - 追踪 Lalamove 印度营销支出及司机激励计划信号
      - - 商品化风险——价格竞争带来的利润压力
        - 低至中等——Porter 在当前佣金水平下盈利；暂无利润侵蚀迹象
        - Lalamove 在主要都市进行价格补贴；Blowhorn 在印度南部价格竞争
        - 目前较低——Porter 的规模支撑盈利定价；竞争对手体量较小
        - 持续存在；若资金充裕的新进入者补贴需求则会加剧
        - 盈利的单位经济提供定价空间；MSME 黏性限制流失
        - 追踪各城市佣金率趋势；核查 Lalamove 在重叠市场的定价
      - - 反向证据——TGPWU 工会指控与 BHRRC 报告（2025 年 7 月）
        - 负面——公开指控存在剥削性条件；不公平暂停司机账号
        - 司机流失；监管行动；在 MSME 和企业客户中的品牌受损
        - 重大——涉及 ESG 和监管维度；可能影响融资及合作关系
        - 持续——截至报告日尚未解决
        - 透明发布司机政策；积极与工会沟通；加大福利投入
        - 获取 Porter 对 TGPWU 指控的回应；审阅司机福利政策
    notes: >-
      威胁严重性评级（低/中等/重大）为基于现有证据的定性评估。鉴于 TGPWU/BHRRC 负面报道及待定监管时间表，零工工人监管风险（2025 年《社会保障法典》） 严重性已提升至重大级别。资本充足性评估基于公开披露的
      Series F 条款及 FY25 盈利状况；实际现金余额未公开披露。所有时间跨度均为研究团队估计，非公司指引。
