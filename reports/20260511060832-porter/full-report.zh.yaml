          - type: callout
            title: 技术验证缺口：无公开 API 文档，无工程基准数据
            body: >-
              Porter 的产品主张——微服务架构、智能派单、AI 驱动的 ETA 预测、MapMyIndia 集成——主要通过公司营销材料和媒体报道加以佐证，缺乏独立技术验证。不同于
              Delhivery（已发布详细技术架构文档），Porter 没有公开技术博客、无开源贡献、无 API 参考文档，也无已发布的 SLA 或正常运行时间指标。这是一项尽调缺口：Porter
              核心调度和预测算法的复杂程度与可防御性，无法从公开信息独立核实。
