      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Porter 的管理层以三位 IIT Kharagpur 联合创始人为核心，他们自创立之初便塑造着公司的走向。2023 年 8 月发生了一次重要的治理转变：Uttam Digga 正式出任 CEO，Pranav
              Goel 转任执行副董事长。两人均深度参与运营，并与 Vikas Choudhary 一同荣获 EY 安永 2025 年度企业家奖初创企业类别，彰显外界对创始团队成就的认可。

              Uttam Digga（自 2023 年 8 月起担任 CEO）是 IIT Kharagpur 校友，从联合创始人转型为首席执行官，推动公司走向盈利并推进地理扩张。Pranav
              Goel（执行副董事长）是公司最初的 CEO 兼联合创始人，已退出日常运营但保留战略影响力。Vikas Choudhary（联合创始人）负责公司产品与战略方向。Shruti Ranjan Satpathy 于
              2023 年获任首席产品与技术官，负责技术栈，涵盖预订引擎、调度算法及车队智能系统。

              2023 年的管理层重组——正式确立 Digga 为 CEO、Goel 为执行副董事长——见于多家物流行业媒体报道，标志着公司治理趋于成熟，也为 F 轮融资及潜在 IPO
              规划奠定基础。关键人物风险仍值得关注：创始三人组的运营能力和行业人脉对司机合作伙伴的信任、中小微企业客户关系及投资方信心均具实质性影响。

              Porter 董事会成员包括来自 Kedaara Capital（F 轮领投方）、Wellington Management 及 Vitruvian Partners（现有投资方）的机构投资者代表。Peak XV
              Partners（前 Sequoia India）和 Kae Capital 在 F 轮中进行了老股退出——表明早期投资者部分套现，同时也意味着两个早期投资者的董事席位被撤销。
