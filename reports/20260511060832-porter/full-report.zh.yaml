  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              印度城内物流市场涵盖单一城市边界内所有货物运输活动，包括当日配送、点对点商业货运、家庭搬迁及定期多站点商业配送，使用车辆为轻型商用车（LCV，载重 ≤3.5
              吨）、微型卡车及两轮车。该细分市场有别于城际公路货运（长途卡车运输）、仓库出发的电商首末端配送或国际航空/海运货物。Porter 核心市场的相关车辆类别为 3.5 吨以下的 LCV，主要车型包括 Tata
              Ace、Mahindra Supro 和 Ashok Leyland Dost。

              主要需求驱动力是中小微企业经济：印度 6,300 万以上注册中小微企业在制造业原料采购、成品配送、企业间 B2B
              转运及电商订单履约等方面均需要频繁、可靠的城内货运服务。个人及住宅用户（家庭搬迁、单件快递）构成第二细分群体，需要托管或合同制城内车队的企业客户为第三类别。

              Porter 当前总可用市场（TAM）的地理边界为人口超过 100 万的印度城市群——商业车辆利用率足以支撑市场平台模式在这些地区运营。截至 2025 年 5 月，Porter 已进入 22
              个以上此类城市，扩张仍在推进。阿联酋是 Porter 的首个国际市场。考虑到数据可用性，本章主要聚焦印度城内市场的规模测算。
