  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流程
        blocks:
          - type: paragraph
            body: >
              Porter 通过移动优先的撮合平台，提供同城货物的即时与预约运输服务。客户（MSME、企业或个人）打开 Porter App
              或网页门户，选择车型（轻型商用车小货车、货运三轮、两轮或三轮车），设定起止位置（支持多站），确认预估价格后下单。系统随即通过调度算法实时分配可用司机伙伴，算法综合考量位置距离、车辆类型和司机空闲状态。派单完成后，客户可通过实时
              GPS 追踪车辆、获取预计到达时间，并通过 UPI/Razorpay/Paytm 完成数字支付。面向 MSME 客户，Porter 自动生成符合 GST 要求的发票及电子交货证明。

              Porter 提供五大车型：(1) 两轮车（摩托车），适用于包裹/小件快递；(2) 三轮车（机动三轮/货运三轮），适用于中等货量；(3) 小型轻型商用车（塔塔 Ace 级别，载重约 750 公斤）；(4)
              中型轻型商用车（马恒达 Supro/Bolero 皮卡，载重约 1.5 吨）；(5) 大型轻型商用车（载重 2–4 吨）。这些车型与 MSME 货物移动的实际体量层级高度匹配。Porter
              还为有重复或批量物流需求的企业客户提供预约/合约车队服务。

              客户工作流程专为 MSME 需求设计：GST 合规开票、多站行程（一次运输覆盖多个收发货点）、面向业务平台的 API 集成，以及用于应收账款对账的数字 POD。个人消费者主要将 Porter
              用于搬家和大件物品运输。Porter 99% 的收入来自货物运输（而非服务或 SaaS），印证了产品设计与运输用例之间的深度契合。
