      - number: '4.4'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >-
              Porter 2025 年 5 月完成的 2 亿美元 F 轮融资——由 Kedaara Capital 和 Wellington Management 以 12
              亿美元投后估值领投——为其扩张议程提供了充裕的资本空间。本轮伴随 Peak XV Partners（前 Sequoia India）和 Kae Capital
              的老股退出，属部分早期投资者套现，而非困境退出。CCI 于 2025 年 7 月 8 日批准 Kedaara Capital 的股权收购，确认股权转让的监管程序已完成。历史融资总额横跨种子轮至 F
              轮约七轮，合计约 4 亿美元以上，此前投资者包括 Tiger Global、Lightrock（前 LGT Impact）和 Vitruvian
              Partners。各轮次融资的详细时间线（含投资方名称和日期）已记录于第一章（公司概况）；财务章节仅在资本充足性分析中单独提及相关关键数据。

              F 轮后的现金储备未公开披露；然而，鉴于 Porter 于 FY25 实现合并盈利（净利润 5,500 万卢比），公司在运营层面已不再消耗现金。盈利前，FY24 净亏损 9,570 万卢比——以年化率计算，即便在
              F 轮资金注入前也意味着多年现金跑道。实现运营盈利后，2 亿美元资金主要用于驱动增长，而非维持运营。目前无任何长期债务披露；Porter 轻资产市场平台模式（司机合作伙伴自持车辆）不产生车队融资债务义务。

              F 轮资金用途规划：（1）地理扩张，从 2025 年中的 22 个以上城市扩展至 2030 年的 50 个城市；（2）技术平台投资，包括 AI 驱动的调度和路线优化；（3）在《2025
              年社会保障法典》合规要求到来前推进司机合作伙伴福利计划和安全基础设施；（4）国际扩张，阿联酋业务已作为桥头堡市场启动，更多地区已有信号。公司资本充足性强劲：盈利运营、无车队资本支出负担、无已披露债务，加之 2
              亿美元新资金，构建了支撑 3–5 年扩张周期的充裕资产负债表。主要融资依赖风险在于《2025
              年社会保障法典》，该法规可能要求平台承担零工工人社会保障缴纳义务，将部分完全可变的车队运营商成本基础转化为法定固定义务。
