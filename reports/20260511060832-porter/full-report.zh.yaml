      - number: '7.4'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Porter 的财务风险轮廓由抽佣率压缩、高度可变成本集中、薄利润缓冲，以及依赖无监管逆风情形下持续收入增长的估值假设共同塑造。抽佣率压缩是最重大的近期财务风险。Porter 约 14–16% 的混合抽佣比率处于
              MV 聚合平台指导方针拟议 15% 上限的边界，远高于 10–12% 的底线情景。以 FY25 规模计算，在 GMV 不变的情况下，每降低 100 个基点，收入减少约 Rs 290 crore。从 15%
              强制降至 12% 将损失约 Rs 860 crore 年收入——抹去 FY25 的 Rs 55 crore 利润并造成重大亏损，除非成本结构相应调整。

              车队付款（占收入 82.8%）回旋空间有限：降低司机佣金有供给侧流失风险，向 MSME 客户转嫁成本上涨则有在价格敏感市场引发需求萎缩的风险。灵活工人福利基金以营业额的 1–2% 计算，每年新增约 Rs
              43–87 crore——该成本随收入同比例增长，随着公司规模扩大，经营杠杆收益随之减弱。在合并执行情景下，这两项监管成本合计可能为 FY26 带来约 Rs 130–160 crore 的年度逆风。

              Porter 12 亿美元估值约合 FY25 收入的 2.3 倍，在基准增长假设（年收入增长 30–40%）下具有可实现性，但在抽佣压缩与运营成本上升合并的监管压力情景下则难以支撑。营运资金风险源于 MSME
              客户可能存在账期滞后，而车队运营商的付款需求则近乎即时。Shadowfax 的 IPO 风险因素——与 Porter
              作为印度同城物流平台高度可比——提及营运资金波动、司机预付款义务和中小企业客户信用风险是重大财务风险。Porter
              的轻资产模式在增长阶段资本效率高，但公司在无资产背书下承担全部监管风险，一旦进入执法情景，难以快速调整成本结构。
