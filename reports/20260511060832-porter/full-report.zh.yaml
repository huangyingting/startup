  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争全景概述
        blocks:
          - type: paragraph
            body: >-
              印度城内物流行业是高度分散的市场，约 70% 的运量仍通过非正规经纪人、电话卡车聚合商和路边中间商协调，这些参与者无法提供数字预订、实时追踪或符合 GST 合规的发票。有组织的科技驱动细分市场由 Porter
              领跑，Lalamove 和 Blowhorn 是仅有的另外两家具有一定规模的纯城内 LCV 平台。相邻竞争者分别在结构性不同的细分市场运营：Shadowfax 专注于电商末端快递，Delhivery 专注于
              B2B 陆运货运，目前与 Porter 的 LCV 模式直接重叠有限，但其网络和资本资源理论上可支撑向城内 LCV 进行战略转型。Shiprocket
              占据独特生态位，作为中小企业快递聚合平台通过第三方承运商配送包裹，而非派遣司机合作伙伴进行货物运输，商业模式与 Porter 不重叠。Dunzo 曾是一家超本地配送相邻竞争者，短暂在同一地区运营，但于 2024
              年初关闭运营，消除了一个替代性威胁。无组织经纪人生态系统仍是主要的体量竞争者：感知成本更低、信任关系根深蒂固、数字化开销为零。未来 36 个月内新进入者风险属中等水平；Delhivery
              的规模和技术成熟度是最具可信度的有实力平台威胁，而截至 2026 年中，尚无主要全球参与者进入印度城内 LCV 物流市场的可信信号。
