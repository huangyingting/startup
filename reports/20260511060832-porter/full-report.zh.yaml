  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              Porter 服务五类可辨别的客户群，各群体在买家类型、使用场景、下单频率和平台战略价值上均有差异。第一大主体是
              MSME——小型制造商、贸易商、零售商和分销商，以日为单位或以周为单位预订轻型商用车或小货车，在城内仓库、供应商和终端客户之间移动货物。该群体复购频率最高，通过市场结构分析估计占 Porter FY25
              ₹4,339 crore 收入的 60–70%，但公司未披露分部数据。个人消费者构成第二大群体，使用场景集中于搬家、大家电配送和偶发性搬运；下单频率低，来自非组织化市场（独立卡车运营商）的竞争激烈。企业和 B2B
              账户是第三个增长型群体：大型公司通过 Porter Business API 对接，用于合约车队服务、供应链物流和多站路由。第四类是电商履约运营商——使用 Porter
              完成不适合标准快递网络的大件或易碎商品最后一公里配送的小型卖家和平台合作伙伴。第五类是正在涌现的第三方物流和白标物流合作伙伴，将 Porter 车队产能嵌入自有平台。地域上，班加罗尔（Porter
              的大本营）是最大市场，其次是孟买、德里/NCR、海德拉巴、钦奈、加尔各答和浦那；另有 14 个二线城市构成 22 城印度版图。UAE 于 2024 年作为独立的国际部署上线。公司未发布正式的地域收入分拆数据。
