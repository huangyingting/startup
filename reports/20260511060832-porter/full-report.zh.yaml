      - CV008
      - CV016
      - CV017
      - CV018
      - CV019
      - CV020
      - CV023
      - CV028
      - CV034
      - CV035
    rows:
      - - 收入增长持续性
        - 57% 同比增速已连续两年保持，且基数已相当可观；MSME 物流需求的结构性支撑为增长延续提供依据
        - 随城市市场趋于成熟、竞争加剧，增速或将回落；目前无分批数据可印证增长的可持续性
        - 权重高——最大价值驱动项
        - 在无大规模补贴的情况下，3–5 年能否维持 40%+ 增速
      - - 经营杠杆
        - 变动成本占比 82.8%；每增加一卢比收入均以较高增量利润流入；无固定车队资产成本
        - 《机动车聚合平台指引》与《社会保障法》一旦落地，可能将变动成本转化为半固定法定义务
        - 权重高——核心回报驱动项
        - 监管框架重构变动成本结构的时间，是否早于盈利规模充分形成之前
      - - 监管环境
        - 截至 2026 年 5 月，无不利监管通告；印度物流行业历来监管宽松
        - MV Aggregator Guidelines（MoRTH）和 Code on Social Security 2020 均处 12–24 个月通知时间线
        - 关键——二元风险
        - 两项政策是否将以现有形式在 FY28 前正式生效
      - - 市场地位与护城河
        - 据 Redseer 2025 年报告，Porter 在印度城内物流领域 GMV 排名第一；120 万司机合作伙伴构筑供给侧覆盖护城河
        - 若 Lalamove 加大投入或 Shadowfax IPO 后发动价格战，缺乏结构性锁定的市场份额或将承压
        - 权重中——支撑作用明显，但不足以单独成立
        - 随 MSME 市场趋于成熟，平台层面的市场领先地位能否转化为定价权
      - - IPO 与退出路径
        - FY25 首次实现盈利，IPO 条件基本具备；Delhivery 与 Shadowfax 提供可参考的退出先例
        - IPO 市场能见度不足（FY27–28）；优先股叠加结构及清算条款尚无公开建模
        - 权重中——受时间窗口约束
        - FY27–28 印度 IPO 市场能否消化一笔 $2B+ 估值的物流独角兽上市
      - - 地理集中度
        - 目前已覆盖逾 22 个城市，集中度已有所分散；2030 年 50 城计划将进一步分摊收入风险
        - 班加罗尔估计贡献收入的 25–30%；任何城市级别的冲击都将对损益表产生不成比例的影响
        - 权重低至中——尚可管理，但不容忽视
        - 新城市单经济体指标能否与班加罗尔时期持平，还是会随渗透规模较小城市而恶化
    notes: 多空论点反映截至 2026 年 5 月的公开证据现状。监管风险评估以公开政策磋商文件为依据；目前尚未发出任何正式监管通告。 所有权重评估均为定性判断，旨在引导尽调优先排序，而非正式概率建模。
