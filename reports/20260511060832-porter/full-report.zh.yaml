      - number: '7.3'
        title: 合作方与依赖风险
        blocks:
          - type: paragraph
            body: >
              Porter 轻资产平台模式造就了对少数外部交易对手的深度依赖，每一方都可能成为无充分披露后备方案的单点故障。最关键的技术依赖是 MapMyIndia（Mappls）。Porter 的派单引擎依赖 Mappls
              提供 22 城覆盖范围内的实时路网地图、路线规划和导航。MapMyIndia 宣称 API 覆盖印度逾 600 万公里路网，具备印度车道级细节的领先覆盖率。Porter
              未公开披露任何备用地图服务商，形成最关键运营功能的单一供应商集中风险。Porter 与 MapMyIndia 之间的 SLA 未公开披露；任何 MapMyIndia 服务中断、API
              弃用或重新定价，均可能在无已披露替代方案的情况下立即导致派单失效。

              支付处理依赖 Razorpay 和 UPI。印度央行对 UPI 激励结构的政策调整——如零 MDR 框架修改或交易手续费上限变更——可能影响 Porter 的支付成本结构。Porter 与 Razorpay
              之间无已披露的备用支付处理商安排。印度 UPI 生态系统规模庞大（月交易量超 130 亿笔），服务中断概率低，但央行在支付经济学上持续审议带来的监管政策风险，对 Porter 这一量级的平台而言并非微不足道。

              车队运营商依赖是 Porter 最大的成本敞口。FY25 车队付款约 Rs 3,660–3,679 crore，占收入的 82.8%。Porter
              不拥有车辆，完全依赖独立车队运营商和司机伙伴。若相当规模的司机转投竞争对手（Shadowfax、Lalamove 或提供更高佣金的新进入者），Porter
              的供给侧产能将迅速恶化。车队运营商留存合同条款未公开披露。Porter 资本提供方集中度也值得关注：Kedaara Capital 和 Wellington Management 联合领投了 2 亿美元
              Series F，若任一投资方的组合策略发生变化，后续支持可能趋于复杂。Porter 未披露云服务提供商或任何灾难恢复安排，构成进一步的隐性依赖。
