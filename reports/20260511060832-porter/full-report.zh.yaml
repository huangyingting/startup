      - 可监测触发因素
      - 门槛 / 事件
      - 行动含义
    rows:
      - - 机动车聚合平台指引执行
        - 交通部发布执行启动日期，或各省政府开始对平台处罚
        - 抽成率被强制降至 12% 以下；无货运聚合平台豁免
        - 投资逻辑破裂；收入模式需根本性重构；投资含义为负
      - - 2020 年《社会保障法典》零工基金
        - 政府零工工人福利门户上线；向平台发出缴款通知
        - 年度成本超过 Rs 100 crore（超 FY25 营收 2%）
        - 实质性盈利修正；下调 FY26 EBITDA 估算；每季度监控合规状态
      - - 司机供给中断
        - 主要城市出现活跃罢工或全城司机抵制的新闻报道
        - 两座或以上城市供给下降超 20%，且持续超 48 小时
        - 运营连续性风险；升级司机申诉机制尽调；需制定应急预案
      - - MapMyIndia 中断或合同终止
        - Porter 平台出现调度失败、路线错误或超时激增
        - 任一城市路线故障超 30 分钟，影响超 10% 的预约单量
        - 确认备用地图供应商存在；从数据室获取 MapMyIndia 合同 SLA
      - - 竞争驱动的抽成率压缩
        - 竞争对手折扣活动或司机激励战导致综合抽成率下降
        - 非监管强制情况下，综合抽成率连续两季度低于 12%
        - 重新评估单元经济模型与竞争护城河；审查受影响城市差异化充分性
    notes: 止损触发条件设定在代表投资逻辑根本性变化的门槛，而非普通业务波动。应通过行业新闻订阅、监管公报通知及季度财务更新持续监控。
