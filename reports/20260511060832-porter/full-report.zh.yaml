  - id: TP001
    title: 竞争对手概况表
    enumeration: true
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the seven most significant competitive entities in India's intra-city logistics market — the three
        organized LCV tech platforms (Porter, Lalamove, Blowhorn), two adjacent platforms (Shadowfax, Delhivery), one
        SME aggregator (Shiprocket), and the unorganized broker segment. Regional micro-logistics startups with
        negligible GMV and no public funding records are excluded; their omission does not materially affect the
        competitive assessment.
    columns:
      - 竞争对手
      - 类别
      - FY25 收入／规模
      - 估值／融资
      - 目标细分市场
      - 主要服务
      - 印度城市覆盖
      - 相较 Porter 的差异化
      - 主要局限
    rows:
      - - Porter（研究标的）
        - 有组织城内 LCV 平台——市场领导者
        - FY25 收入 ₹4,339 crore；净利润 ₹55 crore
        - $1.2B（Series F，2025 年 5 月）；累计融资 ~$350M+
        - MSME 约 60–65%，个人用户约 20–25%，企业客户约 10–15%
        - 按需 LCV、两轮车、小型货车、居家搬迁、企业运力
        - 印度 22+ 城市 + UAE
        - 标杆——GST 合规、供给密度、MSME 信任度及 10 年先发优势
        - 零工人员负面指控（TGPWU、BHRRC，2025 年 7 月）；监管合规成本风险
      - - Lalamove
        - 有组织城内 LCV 平台——直接竞争对手
        - 未披露（印度市场单独数据）；全球收入可观（港交所上市）
        - 港交所上市（代码 2082）；机构背书；印度融资未披露
        - 一线城市的中小企业与个人混合客群
        - 按需 LCV、厢式货车、摩托车配送——优先布局一线城市
        - 4 个一线城市（Mumbai、Delhi、Bangalore、Chennai）
        - 全球运营经验、机构资本、核心 LCV 调度技术能力对等
        - 印度市场规模较小；缺乏 MSME 专项合规工具；司机密度偏低
      - - Blowhorn
        - 有组织城内 LCV 平台——直接竞争对手（规模较小）
        - 未披露；GMV 估计不足 ₹500 crore
        - 累计约 1,500 万美元以上（B 轮）；规模远小于 Porter
        - 聚焦 MSME；主要布局印度南部及西部
        - 按需 LCV、小型货车——区域性布局
        - 不足 10 个城市（主要在印度南部及西部）
        - MSME 定位与 Porter 高度重叠；具备区域品牌认知度
        - 与 Porter 相比融资差距明显；规模有限；企业级服务能力不足
      - - Shadowfax
        - 邻近赛道——最后一公里电商快递
        - FY25 约 ₹1,750 crore；300K+ 配送伙伴；500+ 城市
        - 估值约 $750–860M；2025 年 4 月递交 IPO DRHP（目标 ₹2,000 crore）
        - D2C 品牌及电商平台；最后一公里包裹配送
        - 最后一公里快递（包裹，非 LCV 货物运输）
        - 500 个以上城市（最后一公里包裹网络）
        - 包裹配送规模优势；强电商平台整合能力；IPO 级别的治理水平
        - 业务结构不同（快递 vs LCV）；MSME 货物运输布局有限
      - - Delhivery
        - 邻近赛道——B2B 快运及陆路干线物流
        - FY25 收入 ₹8,931 crore；18,000+ pin codes；24M+ sq ft 仓储
        - 市值约 $4–5B（BSE 上市）；累计融资 ~$1.5B+
        - 企业客户及 B2B 货主；电商履约
        - B2B 快运、陆路干线及仓配一体；Delhivery Direct（轻量城内服务）
        - 18,000+ 个邮编（城际）；城内 LCV 覆盖极为有限
        - 超大体量、雄厚资本与技术基础设施；最具可信度的战略转型威胁
        - 城内 LCV 目前非战略优先方向；买家画像与 Porter MSME 客群存在明显差异
      - - Shiprocket
        - 邻近赛道——中小企业快递聚合平台
        - FY25 约 ₹1,670 crore；估值 $1.2B（Series E，2021 年 $185M）
        - 估值 $1.2B；Series E 融资 $185M
        - 中小企业货主（包裹与电商）；非货物运输 MSME
        - 中小企业快递聚合——通过第三方承运商分发包裹
        - 200 个以上城市（通过聚合承运商网络）
        - 在中小企业中品牌认知度强；承运商网络覆盖广
        - 商业模式不同（聚合而非调度）；聚焦包裹而非 LCV 货物
      - - 非正规中介
        - 现状——存量替代
        - 约占印度城内物流总量的 70%（估算 GMV 约 ₹1.5–2L crore）
        - 无正式融资；个体运营商高度分散
        - 价格敏感型 MSME 及个人用户；非正规 B2B 物流
        - 电话／人脉型货车聚合——无数字化平台
        - 全国性布局（碎片化、超本地化）
        - 深度盘根的关系网络；零平台佣金；感知成本更低
        - 无 GST 合规；无追踪；可靠性差；无法随正规化趋势实现规模扩张
    notes: >-
      Lalamove 印度业务与 Blowhorn 的收入／估值数据未公开披露，估算来源于分析师报告及已知融资轮次。 Delhivery 与 Shadowfax 数据来自已发布的财务报告及 SEBI 监管文件。
      非正规中介市场规模为分析师估算（Redseer、Mordor Intelligence），非经审计数字。Porter 数据仅作横向对比锚点。
