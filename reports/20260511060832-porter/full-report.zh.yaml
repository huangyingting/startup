        - FY25 首次合并盈利 ₹55 Cr；单体利润 ₹131 Cr；收入 ₹4,339 Cr
        - SEBI 规定主板 IPO 须具备 3 年连续经营利润；FY25 为第一年
        - 索取 FY23–FY25 经审计 Ind AS 合并财务报表；确认 SEBI 申报时间表
        - 关键
      - - 股权结构表与优先股叠加
        - 未公开披露；Series F 前估计已在 6 轮融资中累计募集约 $450M
        - 任何情景下建模退出瀑布流及普通股回报均需完整股权结构表
        - 向 CFO 索取最新股权结构表，需涵盖 ESOP 池及全部在外期权
        - 关键
      - - Series F 条款清单（棘轮与清算）
        - 未公开披露；Kedaara 与 Wellington 的条款未知
        - 清算优先权类型直接影响悲观情景的回收建模
        - 索取已签署的 Series F 条款清单；标注任何棘轮、反稀释或赎回条款
        - 关键
      - - 城市级单经济体
        - 未公开；FY24 后各城市表现在外部完全无从建模
        - 2030 年扩展至 50 城为主要资金用途；单经济体指标是资本效率的门控
        - 索取前 15 大城市的城市级贡献利润率瀑布图；以及新城市回收期
        - 高
      - - FY26–FY28 财务模型
        - 未公开；缺少管理层输入，外部投资人自建模型仅属推测
        - 情景分析与 Series F 回报承保均需三年期财务模型
        - 索取管理层准备的基准、乐观及悲观三套财务模型；并与公开数据点交叉验证
        - 高
      - - 退出路径（IPO 对比协议转让）
        - IPO 为首选退出路径（FY27–FY28）；Wellington 作为财务投资人倾向公开上市退出
        - IPO 估值取决于市场环境；协议转让需先锁定战略买家
        - 识别潜在战略收购方（DHL、Maersk、Yamato）；确认 Wellington 的锁定期安排
        - 中
      - - 监管风险监测
        - 《MV 聚合平台指引》与《社会保障法》截至 2026 年 5 月均处于征询意见阶段
        - 投资前承诺主动监测；作为任何提款批次的先决条件
        - 建立 MoRTH 及劳动部政府公报监测机制，用于组合管理
        - 高
    notes: 优先级评估反映投委会无条件批准的要求。关键事项为承诺的前置阻断项；高优先级事项应在最终交割前解决；中优先级事项服务于持续组合管理。 所有数据诉求均涉及私有数据室访问权限，须通过 CFO 及法律顾问的正式尽调渠道提出。
