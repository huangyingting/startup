    rows:
      - - 地理集中度（班加罗尔）
        - 班加罗尔估计占营收 25–30%；前 4 大城市合计约占 60–70%
        - 高——城市层面的监管或竞争冲击对损益表影响过大
        - 每年新增 3–5 个城市；UAE 业务拓展确立国际化模板
        - 向财务数据室索取城市收入分布；验证班加罗尔占比
      - - 客户集中度（最大客户）
        - 中小微企业与消费者客群分散，预计无单一客户收入占比超 5%
        - 低至中——客群分散在结构上限制了单一客户风险
        - 保持中小微企业广度；避免过度依赖大型企业客户
        - 向数据室索取前 20 大客户收入集中度，以验证分散程度估算
      - - 企业 API 拓展模式
        - Porter Business API 支持合同制企业关系；使用率增长但尚未量化
        - 低（机会风险）——企业转化失败将限制年合同价值（ACV）增长与黏性
        - 加大企业销售与客户成功投入，推动即时预约用户向 API 合同迁移
        - 索取 B2B API 客户数、ACV 分布及第 1 年至第 2 年合同续签率
      - - 竞争对手价格竞争
        - Shadowfax（FY25 营收 ₹1,750 Cr）与 Lalamove 争夺相同中小微企业客群
        - 高——中小微企业估计为节省 5–10% 成本即会切换；结构性锁定有限
        - 通过可靠性、城市覆盖广度、应用体验和司机质量形成差异化
        - 关注 Shadowfax IPO 披露文件，追踪客户重叠度与市占率数据
      - - 单渠道市场进入依赖（应用）
        - Porter 应用是主要的市场进入与履约渠道，无显著第三方分发渠道
        - 中——应用商店政策变化或宕机造成单点风险
        - 发展企业直销渠道和 API 分发，降低对单一应用的依赖
        - 在管理层访谈中评估企业销售团队规模及渠道组合
    notes: >-
      地理集中度估算（班加罗尔约 25–30%，前 4 大城市约占营收 60–70%）为方向性近似值，基于城市市场结构分析及进入顺序。Porter
      未公开披露官方城市收入分布。竞争对手营收数据来源于公开监管文件及媒体报道，可能反映不同报告期。
