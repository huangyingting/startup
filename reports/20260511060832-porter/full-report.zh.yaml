      - number: '6.5'
        title: 扩张动态与集中度风险
        blocks:
          - type: paragraph
            body: >
              Porter 主要扩张向量包括地域（新城市和 UAE）、细分深耕（将 MSME 从偶发用户迁移为习惯用户，并追加销售 Porter Business API
              合约），以及车型多元化（两轮车切入即时电商周边、平板车用于工业物流）。"落地扩张"动态在企业客户群体中最为清晰：起初通过 Porter Business 门户下散单的企业，可迁移至 API
              集成配以月度或年度合约，提升单客户 GMV 并降低下单摩擦。客户层面的收入集中度估计较低——考虑到 MSME 和消费者基础高度分散，单一客户占总收入超过 5%
              的可能性不大——但这是基于市场结构的推断，而非公司披露数据。地域集中度则更为重要：班加罗尔估计占收入的 25–30%，前四大城市（班加罗尔、孟买、德里/NCR、海德拉巴）可能占总收入的
              60–70%。竞争强度正在上升：Shadowfax（FY25 收入约 ₹1,750 crore，处于 IPO 阶段）直接竞争 MSME 物流客户；Lalamove
              以充裕的国际资本背书活跃于一线城市；即时电商平台也在扩建自有物流网络，可能蚕食 Porter 的小件和消费者业务。对 Porter App 作为主要触达渠道的依赖，形成单一渠道集中度风险。Series F 12
              亿美元投后估值提供了扩张资金，但也为实现隐含倍数所需的客户增长轨迹设定了更高门槛。
