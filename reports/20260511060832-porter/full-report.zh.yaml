      - number: '5.4'
        title: 信任、安全与监管合规
        blocks:
          - type: paragraph
            body: >
              Porter 的合规与信任体系正面临监管变化和灵活用工投诉的双重压力。安全方面，Porter 强制要求司机伙伴入网时完成车辆核验、驾照审查和保险认证，方可激活账户。司机端 App 提供 GPS
              行程追踪，为司机和客户提供被动安全保障。Porter 支持数字支付（无现金），以降低行程中的抢劫风险。

              监管合规方面，Porter 的主要监管敞口是印度《2019 年机动车（修正）法》和《2025
              年机动车聚合平台指导方针》下的"平台聚合商"身份。上述指导方针（由道路交通和公路部发布）规定司机最低收入保障、佣金率上限（拟议 10–15%）、强制保险和投诉处理要求。若 10–15%
              的佣金上限得以执行，将直接压缩 Porter 目前 14–16%（部分城市高达 30%）的抽佣比率。

              印度《2020 年社会保障法典》（2025 年 11 月生效）要求平台企业将年营业额的 1–2% 缴入灵活工人社会保障基金。以 Porter FY25 约 ₹4,339 crore 的收入计算，年合规成本为
              ₹43–87 crore——约占其 ₹55 crore 合并净利润的 79–158%。这对 FY25 已实现盈利构成重大威胁。

              劳工方面，泰兰加纳灵活用工与平台工人联合会（TGPWU）于 2025 年就 Porter
              海德拉巴司机伙伴的剥削性劳动条件、不公平停权及投诉机制缺失提出公开投诉，《印度时报》、《汉斯印度》和商业与人权资源中心均对此进行了报道。该联合会要求制定按公里费率标准及正式争议解决流程。数据安全方面，Porter
              App 处理支付数据（Razorpay/Paytm 集成）、定位数据和客户身份信息，目前无第三方安全审计报告公开。印度《2023 年数字个人数据保护法》（实施仍在推进中）将施加额外数据处理义务。
