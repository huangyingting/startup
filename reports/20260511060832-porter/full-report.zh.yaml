      - number: '8.4'
        title: 估值可比公司基准分析
        blocks:
          - type: paragraph
            body: >-
              三家可比公司构成外部估值参照系。Delhivery（NSE: DELHIVERY）是首选印度上市可比标的：这是一家 B2B 快运物流平台，FY25 营收约为 ₹8,931 crore，截至 2026 年 5
              月市值约为 ₹29,000–31,000 crore，对应上市 EV/Revenue 约 3.0–3.5 倍。Delhivery 的乘数高于 Porter 2.8
              倍的入场估值，反映的是上市流动性溢价与更大规模优势，但 Delhivery 仍处于 EBITDA 亏损状态——从逻辑上讲，亏损应压缩而非抬升其相对乘数。Porter 首个盈利年以及更高的营收增速（57% 对比
              Delhivery 的约 15–20%），足以支撑与 Delhivery 相当甚至更高的估值乘数，进而支持 12 亿美元的估值。

              Shadowfax Technologies 是次要的印度私有可比标的：专注快速最后一公里物流，FY25 营收约为 ₹1,750 crore，约为 Porter 规模的 40%，IPO 前后隐含估值为 4–5
              亿美元，对应约 1.6–2.0 倍 EV/Revenue。Shadowfax 所处细分赛道有所不同（最后一公里消费配送 vs Porter 的城市内 B2B
              中小微企业物流），因此乘数折价部分具有结构性原因。尽管如此，这仍构成估值下限参考：一家营收 ₹1,750 crore 但尚未盈利的印度私有物流平台估值约为 EV/Revenue 2 倍，而 Porter 以 12
              亿美元估值对应 ₹4,339 crore 营收（已盈利），按规模调整后乘数大体相当——属合理锚点。

              Lalamove（HKEX: 2348）是跨市场 GMV 可比标的。Lalamove FY2023 年收入约为港币 56 亿元（约合 7.2 亿美元），在其覆盖的 10 余个亚洲市场中 EV/GMV 约为
              0.03–0.05 倍，与 Porter 的 EV/GMV 0.04–0.05 倍高度吻合。这一对应关系印证了 Porter 12 亿美元估值与高频城市内物流聚合平台的市场定价标准相符。
