      - number: '2.5'
        title: 市场结构、竞争动态与前景展望
        blocks:
          - type: paragraph
            body: >
              印度城内物流市场正接近组织化拐点，类似于 2015 年至 2020 年间印度出租车市场出现的网约车整合。三大市场动态正在重塑竞争格局：

              其一，数字化采纳加速：使用线上物流的中小微企业比例正从 2025 年的约 20% 持续攀升。通过价格透明度、GST 合规和可靠性赢得中小微企业信任的平台具有复利优势——每转化一家中小微企业即带来多年预订频次。

              其二，供给侧商品化风险：随着司机合作伙伴网络规模扩大（Porter：120
              万，其他竞争者持续增长），若不通过司机收益、技术工具和留存计划形成差异化，供给密度带来的护城河将趋于弱化。零工工人监管环境——印度《2020
              年社会保障法典》要求缴纳社保——将在全行业范围内系统性推高司机成本，收窄利润差异空间。

              其三，地理扩张期权：印度有 53 个人口超过 100 万的城市，以及 500 个以上人口超过 10 万的城市。Porter 目前覆盖 22 个以上城市（计划 2026 年前扩展至 39 个以上，目标 2030
              年达 50 个），仍处于扩张中期。二线城市单次行程价值较低，但供给获取成本也更低，且来自无组织运营商的竞争较少，为先发者创造了有利的单位经济效益。

              市场展望：受中小微企业数字化、电商增长和城镇化驱动，印度城内物流市场预计 2031 年增至 430 亿美元。有组织市场份额预计在此期间从约 30% 升至 40–45%。Porter 作为 LCV
              城内细分市场的领导者，拥有 10 年以上先发优势，有望在这一趋势中获取不成比例的超额份额。
