      - number: '6.3'
        title: 具名客户证据与参考质量
        blocks:
          - type: paragraph
            body: >
              Porter 公开披露中最显著的尽调缺口是具名客户证明。与企业 SaaS 或大型 B2B 物流公司不同，截至 2026 年 5 月，Porter
              在任何公开材料、投资者介绍材料或监管文件中均未披露任何具名企业客户、含可量化结果的客户案例研究或参考客户。Porter 官网的 MSME
              客户推荐完全匿名——通常仅显示名字和城市，无公司名称、行业、下单量或可验证结果指标。这在面向消费者的物流平台中属惯常做法，但严重制约了对企业采用深度的独立核实。现有最有说服力的客户证明来自两个来源：Google
              Play 和 Apple App Store 评分——超过百万次下载、4.1/5 满意度，印证了规模化消费者采用；以及 Redseer 2025 年同城物流报告——将 Porter 评为印度 GMV
              第一的平台聚合商，提供独立于公司披露的市场地位佐证。Shadowfax IPO 时期的行业报告将 Porter 列为同城物流市场的主要参与者，提供第三方规模佐证。Porter 在 G2 和 Trustpilot
              上有主页，但评论极少，反映平台更面向 MSME 和消费者用户而非软件采购方。客户 Logo、具名部署案例或带明确 ROI 的结果数据均未公开。这一证据质量与高频次交易型消费者和 MSME
              平台相符，但对于希望验证合同持久性和客户集中度的投资者而言属重大缺口。
