      - number: '4.3'
        title: 单位经济效益与公开牵引力指标
        blocks:
          - type: paragraph
            body: >-
              按印度物流标准衡量，Porter 公开披露的牵引力指标较为亮眼，但细粒度有限。FY25 合并营收 43.39 亿卢比，意味着自 FY23 的 17.538 亿卢比起三年复合年增长率约为
              57%——鲜有印度物流平台能维持如此持续的复合增长。截至 2025 年中，公司已进入印度 22 个以上城市，累计注册司机合作伙伴 120 万名。FY25 净利润转正，合并口径 5,500
              万卢比，独立实体（SmartShift Logistics）1.31 亿卢比，结束了连续三年净亏损。FY24 亏损 9,570 万卢比（较 FY23 约 2.67 亿卢比下降
              45%），显示出利润拐点前稳步收窄的亏损轨迹。

              17–20% 的隐含毛利率低于高 GMV 平台的市场中位数，但反映了 LCV
              物流相对于末端包裹配送本就较高的车队运营商份额。关键结构性优势在于每笔车队运营商付款均为与已完成收入交易挂钩的可变成本——无闲置车队成本、无折旧拖累、无车辆持有的租赁义务。按已公布的佣金率区间，Porter
              各车型每次行程净收入估计为 84–750 卢比。FY25 EBITDA 约为 4,800 万卢比，FY24 EBITDA 约为 -1.12 亿卢比——约 1.605 亿卢比增量营收带来 1.60 亿卢比的
              EBITDA 摆幅，意味着固定和半固定成本基础上存在显著的边际运营杠杆。

              未公开披露的关键私密指标包括：GMV（预订总价值）、中小微企业客户和个人消费者的获客成本（CAC）、按城市层级和车型划分的贡献利润率、净留存率（NRR，按队列计算的客户复购率）、活跃与累计司机合作伙伴数量，以及按车型划分的收入构成。中小微企业业务——Porter
              价值最高的细分——通过可预期的预订量、多车辆行程和带来更高平均行程价值的多城市合同驱动超额经济效益。目前没有任何中小微企业专项营收或留存指标的公开披露，限制了对该细分对盈利拐点贡献的独立评估。
