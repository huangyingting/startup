      - number: '5.5'
        title: 产品路线图与平台成熟度
        blocks:
          - type: paragraph
            body: >
              Porter 的产品路线图（根据公开公告推断，无官方发布版本）聚焦三大主题：地域扩张、MSME 深耕和司机收入改善。

              地域扩张：Porter 正积极进入 MSME 密度高的印度二三线城市——卡利卡特、蒂鲁普尔、拉杰果德（2025–26 年已启动），另有 8 个以 MSME 为重点的城市宣布于 2026 年进入。UAE
              市场是模式可移植性的活体国际试点。2030 年 50 城目标意味着四年内净新增约 28 个城市，约每年 7 个。

              MSME 深耕：Porter 于 2024 年 12 月宣布与 MSME 产业集群（纺织中心、机械制造集群、制造业园区）建立合作，显示出叠加于消费者撮合平台之上的 B2B 销售动作。面向企业账户的 API
              集成已作为公开功能推出，但企业产品成熟度尚未得到验证。

              司机收入：灵活用工监管压力和工会投诉可能正在加速内部围绕司机收入透明度、投诉工具和社保合规功能的产品工作。截至 2026 年年中，尚无具体司机福利产品功能的公开声明。

              成熟度评估：Porter 核心的预订-派单-支付闭环已具备生产级可靠性，FY25 收入 ₹4,339 crore 印证了可扩展性。分析/机器学习层（动态定价、ETA 预测）已投入运营，但未经独立验证。企业/API
              产品和国际扩张（UAE）仍处于早期阶段。灵活用工合规工具是日益重要的产品缺口。
            claimRefs:
              - CE024
              - CE025
              - CE026
              - CE027
      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: 灵活用工合规成本可能抵消 FY25 利润
            body: >-
              Porter FY25 合并净利润 ₹55 crore 面临两股监管逆风的双重夹击：(1) 印度《2020 年社会保障法典》（2025 年 11 月生效）要求将年营业额的 1–2% 缴入灵活工人基金——以
              FY25 收入水平计为 ₹43–87 crore；(2)《2025 年机动车聚合平台指导方针》可能将佣金上限设定在 10–15%，压缩 Porter 目前 14–16%（最高
              30%）的抽佣比率。与此同时，TGPWU 的公开指控使 Porter 在核心市场（海德拉巴/泰兰加纳）面临声誉与运营风险。合规成本测算表明，若无显著收入增长来吸收新增义务，盈利能力可能脆弱而非持久。
            calloutType: insight
