      - number: '3.5'
        title: 护城河持久性、商品化风险与反向证据
        blocks:
          - type: paragraph
            body: >-
              Porter 的核心护城河——供给密度、中小微企业信任、GST 合规基础设施及十年运营先发优势——在三年视野内看来仍具韧性，但面临可识别风险，值得持续监测。供给密度是最难快速复制的护城河：120
              万累计司机合作伙伴代表了十年的获取和留存投入，复制这一规模需要数亿美元和多年时间。中小微企业信任护城河因 GST 合规能力而进一步巩固——无组织竞争者在结构上无法匹敌，而 Lalamove 和 Blowhorn
              也尚未在印度全面实现规模化复制。Porter 于 FY25 实现 5,500 万卢比净利润——没有一家具名的直接城内 LCV
              竞争对手公开达到这一里程碑——这增强了其资本效率以及维持价格纪律的能力，而亏损竞争者无法无限期匹配这一纪律。最显著的商品化风险来自无组织市场的正规化压力：若 GST
              执法迫使经纪网络数字化，它们可能与科技平台合作，或在司机招募上制造竞争性供给侧压力。反向证据集中于 TGPWU 零工工人工会指控和 BHRRC 报告（2025 年 7 月），记录了 Porter
              涉嫌剥削性工作条件、超载及不公平停权的问题。若印度《2025 年社会保障法典》落地推行平台公积金缴纳和工伤保险义务，Porter
              的司机成本结构可能大幅上升，压缩利润率，并有可能与合规意识较弱的竞争者形成成本平价。印度竞争委员会于 2025 年 7 月批准了 Porter F
              轮投资架构，未附加任何救济措施，表明暂无直接反垄断关切，但持续演变的零工工人政策走向及 TGPWU 指控仍需在尽调阶段保持关注。若 Delhivery 大力转向城内
              LCV——目前尚无此信号，但鉴于其现有城市网络和司机/车队关系，技术上可行——其资本深度和技术成熟度将构成最可信的长期平台级威胁。Porter 计划在 2026 年前扩展至 39 个以上城市，2030 年前扩展至
              50 个城市，旨在有实力的竞争对手建立据点之前，将供给密度护城河延伸至新兴二三线中小微企业市场。
