    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司背景与创始故事
        blocks:
          - type: paragraph
            body: >
              Porter 是一家按需城内物流科技平台，注册实体为 SmartShift Logistics Solutions Private
              Limited，总部位于印度卡纳塔克邦班加罗尔（企业身份号：U63090KA2014PTC075462）。公司以 Porter 品牌在 porter.in 面向消费者运营。Porter 由 Pranav
              Goel、Uttam Digga 和 Vikas Choudhary 三位 IIT Kharagpur 校友于 2014
              年创立，他们敏锐察觉到印度城内货运市场存在重大效率缺口——彼时市场由无组织的卡车经纪人和非正规中间商把持，无法提供实时预订、价格透明度或可靠的服务保障。

              Porter 的核心产品是面向 iOS 和 Android 的移动端与网页平台，允许企业和个人预订轻型商用车（LCV）、微型卡车（Tata Ace/Mahindra Supro
              级别）、两轮车及微型客货两用车，完成当日城内配送。平台集成实时 GPS 追踪、动态路线规划、预计到达时间（ETA）预测和算法化车队调度。Porter
              服务三类主要客群：（1）有常态货运需求的中小微企业（MSME）；（2）有个人/家庭搬迁需求的个人用户；（3）需要定期或合同制城内运力的企业客户。

              Porter 以佣金制市场模式运营。司机合作伙伴是自有或自行融资购车的独立经营者；Porter 从每笔交易中抽取约 14–16% 的佣金，部分市场最高达 30%。平台支持通过 UPI 和 Razorpay
              进行应用内支付、电子 GST 账单、交货证明（POD）文档及多站点行程优化。截至 2025 年 5 月 F 轮融资，Porter 已覆盖印度 22 个以上城市及阿联酋，累计接入 120
              万名司机合作伙伴。货运收入占总营收的 99%。
