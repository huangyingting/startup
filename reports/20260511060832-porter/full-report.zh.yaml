      - number: '3.2'
        title: 竞争对手概况
        blocks:
          - type: paragraph
            body: >-
              Porter（FY25 营收 43.39 亿卢比，净利润 5,500 万卢比，2025 年 5 月 F 轮估值 12 亿美元）是有组织市场的领先者，覆盖 22 个以上城市，累计注册司机合作伙伴 120
              万名，以中小微企业优先定位提供
              LCV、两轮车、微型卡车和家庭搬迁服务。Lalamove（香港联交所：2082）是一家在亚太区上市、机构背景雄厚的直接竞争对手，在孟买、德里、班加罗尔和金奈四个印度主要城市运营，提供可比的按需 LCV
              和厢式货车服务；其印度区具体财务数据未公开披露。Blowhorn 是专注于印度南部和西部的 B 轮城内 LCV 平台，累计融资约 1,500 万美元以上——仅为 Porter 12
              亿美元估值的一小部分——限制了其竞争触达范围和地理扩张野心。Shadowfax（FY25 营收约 17.50 亿卢比；已于 2025 年 4 月向 SEBI 提交 IPO 招股书（DRHP），目标募资 20
              亿卢比）主要是一家电商末端快递平台，拥有 30 万以上配送员，覆盖 500 个以上城市；其运营模式——按包裹极速配送——在结构上与 Porter 当前的 LCV 模式不重叠。Delhivery（FY25 营收
              89.31 亿卢比；在孟买交易所上市，市值约 40 亿至 50 亿美元）是印度最大的纯物流公司，在 B2B 快运和陆运物流领域占主导地位，覆盖 1.8 万以上邮政编码，仓储面积达 2,400 万平方英尺以上；其
              Delhivery Direct 服务在边际层面触及城内能力，但非战略重点。Shiprocket（估值 12 亿美元，FY25 营收约 16.70 亿卢比）是一家中小企业快递聚合平台，与 Porter
              不同，它不派遣自有司机合作伙伴，而是通过第三方承运商配送包裹。无组织经纪人生态系统——虽非技术竞争者——通过非正规网络掌握约 70% 的城内物流运量，仍是中小微企业的首要替代选择。
