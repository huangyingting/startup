      - number: '8.5'
        title: 投资逻辑破坏触发因素与退出标准
        blocks:
          - type: paragraph
            body: >-
              五项投资逻辑破坏触发因素——每项均设有明确阈值、损益影响及监控机制——构成持续组合监控的退出标准。其一，MV Aggregator Guidelines 落地通知：若 MoRTH
              通知执行抽佣上限规则，要求最低总支付比例达 80%，则受影响车辆类别的佣金收入预计下降 25–40%，综合抽佣率下降 5–7 个百分点，FY25 EBITDA
              可能在单一财年内归零。这是严重程度最高的触发因素。其二，零工工人重新分类：若《2020 年社会保障法典》正式落地并强制要求为平台工人缴纳社会保障费用，则 2–3%
              的总支付将从完全可变成本转为半固定成本，降低运营杠杆并提高每次完成订单的单位成本。其三，城市扩张经济性恶化：若 FY24 后启动的城市在 18 个月内未能实现贡献利润盈亏平衡，F
              轮资本消耗速度将超出模型预期，届时可能需要以摊薄性条款追加融资。其四，班加罗尔营收冲击：若班加罗尔（估计占总营收
              25–30%）遭受监管、竞争或需求侧冲击，对损益的影响将与其地理占比不成比例。其五，竞争性价格战：Lalamove 加码印度投入或 Shadowfax IPO
              后的市场份额争夺，可能引发抽佣率压缩周期，叠加监管底线限制，同时从收入和成本两侧压缩 EBITDA。

              截至报告日，上述触发因素均未实际发生。MV Aggregator Guidelines 仍处于征求意见阶段，《社会保障法典》的落地时间表依据政府最新表态至少延续至 FY27。
