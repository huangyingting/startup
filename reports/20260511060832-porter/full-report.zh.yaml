  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Porter 面临 FY25–26 年实质性上升的监管风险叠加。最高严重性项目是《2025 年机动车聚合平台指导方针》（MV 聚合平台指导方针），由道路交通和公路部（MoRTH）发布，拟对车辆聚合平台设定
              10–15% 的佣金/抽佣上限。Porter 目前混合抽佣比率约为 GMV 的 14–16%，意味着即便 15% 的上限也会制约上行定价空间，而 10–12% 的上限则需对收入模式进行根本性重构。以 FY25
              收入 Rs 4,339 crore 计算，若成本不变而抽佣比率被迫从 15% 降至 12%，估计年收入缺口约为 Rs 400–600 crore。执行时间表尚不确定——MoRTH
              未公布明确执行起始日期——形成无明确解决窗口的监管悬顶。Porter 未公开披露合规策略，也未宣布任何货运或货物运输聚合平台的豁免条款。IAMAI 和 CII 等行业协会已游说修订，但成效未经证实。

              《2020 年社会保障法典》中涉及灵活工人的条款于 2025 年 11 月生效，要求向国家灵活工人福利基金缴纳年营业额的 1–2%。以 FY25 收入 Rs 4,339 crore 计算，这代表每年 Rs
              43–87 crore 的成本，从 FY26 起确认为重大且不可回避的支出。不同于 MV 聚合平台指导方针（仍受执行时间不确定性影响），《社会保障法典》是已生效的法律，Porter
              的司机伙伴作为平台工人完全落入其适用范围。该成本在行业内具有普遍性，长期来看或可部分转嫁至车队运营商或客户，但近期对盈利的影响真实且不可规避。

              泰兰加纳灵活用工与平台工人联合会（TGPWU）在海德拉巴提起的劳工诉讼称，Porter 未经正当程序停权司机伙伴，且未保障按公里费率下限。Porter 否认上述指控，截至 2026 年 5
              月尚无正式劳动法庭裁决。然而，该案设定了监管先例：若 TGPWU 获得正式劳动仲裁裁决，可能在其他邦触发对 Porter 灵活工人员工身份认定的审查，显著扩大财务和运营责任。竞争法方面，印度竞争委员会（CCI）于
              2025 年 7 月 8 日批准 Kedaara Capital 入股 Porter 的股权收购。此次 CCI 清关对融资而言属正面信号，但若 Porter 推进进一步收购或市场份额突破集中度门槛，将面临 CCI
              的重新审查。MV 聚合平台指导方针最初于 2020 年提出，经历多次修订，表明 Porter 及同业所处的监管路径仍属迭代性且充满不确定性。
