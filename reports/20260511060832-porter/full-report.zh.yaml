      - number: '1.3'
        title: 融资历史、估值与投资方
        blocks:
          - type: paragraph
            body: >
              2014 年至 2025 年间，Porter 累计完成约 3.5 亿美元以上的六轮机构融资。2025 年 5 月宣布的 F 轮融资使公司估值达到 12 亿美元，正式跻身独角兽行列。

              早期轮次：种子轮（约 100 万美元，2014 年）支持平台开发；A 轮（150 万美元，2016 年）提供验证资金；B 轮（1,200 万美元，2018 年）资助地理扩张；C 轮（3,000 万美元，2020
              年）继续扩大规模；D 轮（1,500 万美元，2021 年）作为桥接轮。

              E 轮（2022 年）：1.5 亿美元为 F 轮前最大一笔融资，支撑大规模扩张。Vitruvian Partners 作为核心机构投资方参与，并持续投资至 F 轮。

              F 轮（2025 年 5 月）：Porter 融资 2 亿美元，由 Kedaara Capital 和 Wellington Management 领投，投后估值 12 亿美元，自此获得独角兽地位。Kedaara
              Capital 是一家专注于印度中型市场企业的成长型股权投资机构，Wellington Management（管理资产逾 1 万亿美元的全球资产管理公司）担任联合领投方。现有投资者 Vitruvian
              Partners 参与本轮。值得注意的是，Peak XV Partners（前 Sequoia India）和 Kae Capital
              借此轮进行老股退出，显示部分早期投资者存在流动性偏好。印度竞争委员会（CCI）于 2025 年 7 月 8 日正式批准 Kedaara Capital 收购 SmartShift Logistics
              Solutions 股权。

              F 轮资金主要用于：地理扩张（目标 2030 年前覆盖 50 个城市）、深耕中小微企业市场、技术投入及司机合作伙伴生态建设。
