      - number: '8.3'
        title: 情景分析与估值区间
        blocks:
          - type: paragraph
            body: >-
              乐观情景下，FY25 至 FY28 年收入复合增速达到 50%，合并营收约为 ₹14,700 crore（约合 17.6 亿美元），约为 FY25 营收的 3.4 倍。以 3.5–4.0 倍 EV/Revenue
              乘数计算（有利润的规模化增长、临近 IPO 窗口以及 Delhivery 重新定价先例均支持这一区间），隐含企业价值为 19–25 亿美元，对应 12 亿美元 F 轮入场价实现 1.6–2.1
              倍回报，时间窗口在三年以内。乐观情景的实现前提是：50 城扩张执行无误、无不利监管通知，以及企业端与 B2B 订单占比持续提升（此类订单单均收入更高，驱动结构性 EBITDA 改善）。

              基准情景假设 FY28 年收入复合增速 40%，营收约为 ₹11,900 crore（约合 14.3 亿美元）。以 2.5–3.0 倍 EV/Revenue 估值，隐含企业价值为 14–18 亿美元，回报倍数
              1.2–1.5 倍——对于持有期 4–5 年的私募或成长型投资者而言属可接受水平。基准情景假设监管环境保持稳定，FY28 年城市覆盖部分扩展至 35–40 个城市，EBITDA 利润率温和改善至 5–7%。

              悲观情景模拟双重监管冲击：MV Aggregator Guidelines 落地并对抽佣比例设置上限，导致综合佣金率下降 5–7 个百分点；《2020 年社会保障法典》零工工人条款落地，为车队运营商增加约
              2–3% 的成本。两项冲击叠加，FY28 EBITDA 利润率较基准情景下降 500–700 个基点，收入增速放缓至约 25% 复合增速（反映价格转嫁导致的需求萎缩），FY28 营收约为 ₹8,500
              crore（约合 10.2 亿美元）。以 1.5–2.0 倍（接近盈亏平衡的物流运营商对应的估值区间）计算，隐含企业价值为 7–10 亿美元，低于 12 亿美元的 F
              轮入场价，存在资本损失风险。鉴于当前立法时间表，悲观情景概率判断为 20–25%。
