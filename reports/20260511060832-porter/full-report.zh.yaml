      - number: '8.7'
        title: 展示图表
        blocks:
          - type: callout
            title: 入场纪律：12 亿美元估值合理，但需对 MV Aggregator 监管风险有明确研判
            body: >-
              12 亿美元的 F 轮估值在财务指标层面具有合理性：以 57% 增速、已盈利业务对应 2.8 倍 EV/Revenue，在印度成长市场标准下并不激进，Delhivery 和 Lalamove
              两个可比标的也从两侧对入场价格形成合理约束。然而，MV Aggregator Guidelines 监管风险的二元特征意味着投资人必须承担 20–25% 概率下出现 40–50%
              下行的风险。在此估值入场，需要对监管环境保持稳定有明确信念，或确信 Porter 的运营杠杆足以吸收最高 7 个百分点的抽佣率压缩而不跌破盈亏平衡。若附加条件入场——设置棘轮保护条款或价格调整条款，以 MV
              Aggregator Guidelines 在 12 个月内落地为触发条件——将显著改善风险调整后的回报预期。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV003
              - CV014
              - CV029
              - CV030
          - type: callout
            title: 估值反向逻辑：82.8% 的车队支付比率在监管冲击面前几乎没有缓冲空间
            body: >-
              Porter 最为人称道的财务特征——82.8% 的可变成本基础——同时也是其面临监管干预时最大的脆弱性所在。MV Aggregator Guidelines 与《2020
              年社会保障法典》，恰恰是专为重构平台聚合零工经济结构而设计的。若两项法规在 24 个月内同步落地，其叠加效应并非简单相加，而是相互放大：抽佣上限压低收入，同时支付底线抬高成本，EBITDA
              遭受双向挤压。Porter FY25 净利润仅 ₹55 crore——约为营收的 1.3%——对双重冲击几乎没有任何缓冲能力。在此情景下，12
              亿美元的入场价将变为亏损头寸。在提交投资委员会审批前，每一版财务模型都应对这一风险进行压力测试。
            calloutType: risk
            claimRefs:
              - CV005
              - CV008
              - CV014
              - CV031
              - CV042
