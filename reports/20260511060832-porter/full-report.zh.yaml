      - number: '2.3'
        title: 买家细分、用户画像与采纳触发因素
        blocks:
          - type: paragraph
            body: >
              Porter 的市场围绕三类主要买家细分，各有其不同的业务流程、预算结构和采纳触发因素：

              细分一——中小微企业：印度 6,300 万以上中小微企业是核心增长驱动力。中小微企业使用 Porter
              进行原材料采购运输、工厂间转运、成品向经销商和零售商配送及电商履约。采纳触发因素为相对于无组织经纪人的成本节省（价格透明化通常带来 15–25% 的节省），以及满足税务合规需求的数字 GST
              发票。预算负责人为企业主或物流负责人。由于多站点行程和较重货物，中小微企业的每用户/每单平均收入（ARPU）高于个人用户。据 Redseer 统计，目前仅约 20%
              的中小微企业使用线上物流平台，潜在未转化群体庞大。

              细分二——个人/住宅用户：城市家庭使用 Porter
              进行家庭搬迁（家具家电等）和个人快递。采纳触发因素为相对于非正规搬家公司的价格透明度和实时追踪。预算负责人为个人消费者。该细分价格敏感性更高，复购频率低于中小微企业。

              细分三——企业/电商：有定期城内配送需求的大型企业及 D2C 品牌。采纳触发因素为服务等级协议（SLA）可靠性、API 集成和集中账单管理。预算负责人为供应链或物流经理。Porter 通过企业 API
              和定期车队合同服务这一细分。

              中小微企业细分对 Porter 战略意义最为重大：它带来更高的单次行程价值、更高的频次和更好的单位经济效益。印度中小微企业数字化浪潮——因 GST 推行、UPI 普及和 PM GatiShakti
              政策而加速——正在将人工物流采购转变为平台预订，直接扩大 Porter 的中小微企业可触达基数。
