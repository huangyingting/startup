              TGPWU 对 Porter 海得拉巴业务提出的公开指控——不公平停权、申诉机制不足、无按公里计费保障——已获商业与人权资源中心报道佐证。《2020 年社会保障法典》（2025 年 11 月生效）和《2025
              年机动车聚合平台指南》带来合规义务（营业额的 1–2% 缴入零工基金；最低收入保障；强制保险），按当前营收规模估算，每年新增社会保障成本约 4,300 万至 8,700
              万卢比——对一家刚刚扭亏为盈的公司而言，这是实质性的损益影响。
