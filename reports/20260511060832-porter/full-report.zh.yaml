      - number: '3.4'
        title: 切换成本、锁定效应与配送覆盖能力
        blocks:
          - type: paragraph
            body: >-
              Porter 的竞争地位受到多重切换成本和锁定机制的强化，这些机制随平台规模持续叠加。对于中小微企业客户，GST
              发票集成、数字支付记录和行程历史创造了行政切换成本：迁移至竞争对手意味着失去覆盖所有交易的单一合规开票系统的便利性。Porter 的司机侧网络——累计 120
              万名注册司机合作伙伴——在覆盖城市中创造了供给密度优势，直接体现为更快的接单时间、更高的订单接受率和更低的高峰溢价事件。有实力的竞争者若要复制这一供给密度，需要数年的司机获取、接入和留存投入。多平台使用风险主要存在于个人消费者细分，用户可能在预订前比较
              Porter 和 Lalamove 的价格，以及在维持多家物流供应商关系以管理风险的大型企业账户中。中小微企业客户一旦融入平台的开票和账户历史系统，粘性往往更强。Porter 的配送覆盖能力——22
              个以上城市的深度司机密度——大幅超越 Lalamove 四城印度布局和 Blowhorn 有限的南部和西部印度覆盖，使其成为在多个印度城市运营的中小微企业唯一可行的全国规模 LCV 合作伙伴。使用 Porter
              API 集成的企业客户面临最高切换成本，因为重新集成需要工程投入、测试以及与新调度系统的并行运行期，尤其对于有多站点、多城市或大批量车队需求的客户而言更为复杂。从 Porter 切换至无组织经纪人意味着放弃
              GST 合规、实时追踪、数字行程历史和争议解决——这对依赖进项税抵扣的注册中小微企业而言是实质性成本。
