companyProfile:
  summary: "Porter is India's leading on-demand intra-city logistics platform, founded in 2014 in Bengaluru by Pranav Goel, Uttam Digga, and Vikas Choudhary (all IIT Kharagpur alumni). The company operates as a commission-based two-sided marketplace connecting MSMEs, urban businesses, and individual consumers to a network of 1.2 million driver-partners operating light commercial vehicles, mini trucks, and two-wheelers. Having achieved unicorn status in May 2025 with a $200M Series F at a $1.2B valuation co-led by Kedaara Capital and Wellington Management, Porter turned profitable in FY25 with ₹4,306–4,339 crore in revenue (+57% YoY). The platform serves 22+ Indian cities plus UAE and is targeting 50 cities by 2030."
