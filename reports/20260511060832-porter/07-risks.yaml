  evidenceGaps:
    - type: missing-source
      severity: material
      topic: MV Aggregator Guidelines enforcement timeline and cargo-aggregator applicability
      missingEvidence: >-
        MoRTH has not published a firm enforcement commencement date for the MV Aggregator
        Guidelines 2025 in publicly accessible gazette notifications as of May 2026. No legal
        opinion specifically addressing whether goods/cargo aggregators are within scope has been
        published by Porter or any industry body.
      whyItMatters: >-
        The enforcement timeline and scope determination are the primary inputs for quantifying
        revenue compression risk. Without a confirmed enforcement date or cargo-aggregator carve-
        out, the risk remains an overhang with no resolution window, preventing investors from
        pricing the risk with precision or building reliable FY26 earnings models.
      diligencePath: >-
        Engage a regulatory counsel with MoRTH expertise to obtain: (1) confirmed enforcement
        commencement date, (2) legal opinion on goods-aggregator applicability, and (3) a review
        of Porter's internal compliance strategy and any correspondence with MoRTH.
      relatedQuestionRefs:
        - QR001
        - QR002
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: TGPWU labor litigation outcome and driver welfare policy changes
      missingEvidence: >-
        No formal labor court judgment, settlement agreement, or written policy change by Porter
        in response to TGPWU allegations in Hyderabad has been identified in public sources as
        of May 2026. Porter's internal driver management policies and grievance mechanisms are
        not publicly documented.
      whyItMatters: >-
        A formal tribunal ruling in favor of TGPWU could create precedent for gig worker
        reclassification, expand financial liability, and trigger parallel actions in other states.
        Without visibility into Porter's legal position, the tail risk of employee reclassification
        cannot be assessed or priced.
      diligencePath: >-
        Request Porter's legal team's written assessment of the TGPWU case, any correspondence
        with Hyderabad labor authorities, and documentation of Porter's driver grievance mechanism
        and welfare policies.
      relatedQuestionRefs:
        - QR003
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: Platform disaster recovery and business continuity plan
      missingEvidence: >-
        Porter has not published any disaster recovery plan, business continuity plan, uptime SLA,
        recovery time objective (RTO), or recovery point objective (RPO) for its dispatch engine
        or broader platform as of May 2026.
      whyItMatters: >-
        For MSME customers relying on Porter for time-sensitive deliveries, an extended platform
        outage is an operational crisis. Without DR/BCP evidence, investors cannot assess the
        probability or duration of a worst-case service disruption and its impact on customer
        retention and booking volumes.
      diligencePath: >-
        Request Porter's technology team's disaster recovery documentation, incident response
        runbooks, and historical uptime data for the past 12 months from the data room.
      relatedQuestionRefs:
        - QR007
      relatedTableRefs:
        - TR002

    - type: private-evidence-only
      severity: material
      topic: MapMyIndia contractual terms and switching costs
      missingEvidence: >-
        No contractual SLA, exclusivity clause, pricing terms, or termination notice period
        between Porter and MapMyIndia has been disclosed publicly. The existence or adequacy of
        a backup mapping vendor is unknown.
      whyItMatters: >-
        MapMyIndia is a single-vendor dependency for routing and navigation across all 22 cities.
        If MapMyIndia terminates, significantly reprices, or experiences an extended outage
        without a contractual remedy, Porter's dispatch engine fails immediately. This is the
        highest-severity unmitigated single-vendor risk in Porter's technology stack.
      diligencePath: >-
        Obtain the Porter-MapMyIndia API agreement from the data room; review SLA, pricing,
        exclusivity, and termination terms; confirm whether a secondary mapping vendor has been
        contracted or evaluated.
      relatedQuestionRefs:
        - QR009
      relatedTableRefs:
        - TR003

    - type: private-evidence-only
      severity: material
      topic: Fleet operator attrition rate and driver retention
      missingEvidence: >-
        Porter has disclosed 1.2 million cumulative onboarded driver-partners but has not disclosed
        the number of currently active drivers, annual attrition rate, or driver lifetime on the
        platform. No cohort retention data exists in public sources.
      whyItMatters: >-
        Driver attrition is the primary supply-side risk metric. A high attrition rate — even with
        continuous new onboarding — suggests structural dissatisfaction and raises the probability
        of organized disruption. Without attrition data, the supply-side risk cannot be quantified
        or compared to industry benchmarks.
      diligencePath: >-
        Request monthly active driver count, annual onboarding-versus-deactivation ratio, and
        driver lifetime value from the Porter operations data room.
      relatedQuestionRefs:
        - QR012
      relatedTableRefs:
        - TR003

    - type: missing-source
      severity: minor
      topic: Platform fraud rate and anti-fraud controls
      missingEvidence: >-
        No platform-level fraud rate (GPS spoofing, fake bookings, unauthorized cancellations) has
        been disclosed by Porter. User reviews indicate incidents exist but provide no systematic
        rate or frequency data.
      whyItMatters: >-
        Uncontrolled fraud degrades customer trust and driver-partner economics. For MSME customers
        with repeated booking needs, a high fraud rate would accelerate churn and undermine Porter's
        value proposition relative to direct fleet contracts or competing platforms.
      diligencePath: >-
        Request Porter's internal fraud rate dashboard, anti-fraud mechanisms (GPS validation,
        booking confirmation protocols), and the percentage of bookings flagged as fraudulent or
        cancelled by drivers post-acceptance.
      relatedQuestionRefs:
        - QR013

