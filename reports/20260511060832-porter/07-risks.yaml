    title: Risk heatmap
    type: matrix
    layout: standard
    summary: >
      Likelihood-by-risk-category heatmap mapping Porter's primary risk exposures as of May 2026.
      High-likelihood cells contain risks that are already materializing or are highly probable
      within a 12-month window; medium-likelihood cells require monitoring; low-likelihood cells
      are tail risks with material consequences if realized.
