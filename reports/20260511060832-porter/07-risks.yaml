  - id: mitigations-kill-criteria
    title: Mitigations, Monitoring, and Thesis-Break Triggers
    body: >
      Porter's mitigations for its core risk stack are genuine but partially speculative or
      unverifiable from public sources. The clearest near-term mitigation is the Series F capital
      injection ($200M from Kedaara and Wellington), which provides an estimated 12+ months of
      runway at FY25 operating costs even before any revenue growth materializes. This runway
      reduces near-term financing risk and provides a buffer for regulatory adjustments without
      forcing immediate cost cuts or pricing changes that could impair growth.

      For MV Aggregator Guidelines risk, Porter's most likely mitigation pathways are: (1)
      reclassifying revenue streams to fall outside the guideline's technical scope — for example,
      repositioning certain fee income as logistics management fees rather than vehicle aggregation
      commissions; (2) engaging industry bodies (IAMAI, CII) to lobby MoRTH for a cargo or goods-
      transport exemption or enforcement delay; and (3) gradually shifting pricing models toward
      subscription or SaaS-like structures for MSME enterprise customers. None of these mitigations
      is legally guaranteed, and the enforcement timeline's uncertainty makes it impossible to
      confirm their effectiveness as of May 2026.

      For gig worker fund obligations, partial pass-through to customers (via slightly higher
      booking fees) or to fleet operators (via reduced base commission rates) is the primary lever.
      This is an industry-wide cost that competitors face equally, reducing competitive
      disadvantage, but the absolute annual cost of Rs 43-87 crore is material at Porter's current
      margin. For driver supply risk, Porter's scale of 1.2 million onboarded partners provides
      some buffer against localized organizing; however, the absence of a disclosed grievance
      mechanism remains a structural gap.

      Thesis-break triggers include: MV Aggregator Guidelines enforcing a take-rate cap below 12%;
      a multi-city driver strike reducing fulfillment by more than 20%; loss of MapMyIndia as a
      mapping provider without a viable alternative; loss of key executive leadership (CEO or CPTO)
      without a successor in place; or evidence of sustained customer-side churn driven by platform
      quality deterioration. Investors should establish monitoring thresholds across each of these
      dimensions as conditions to continued underwriting, and diligence asks (see TR005) should be
      prioritized accordingly in the data-room process.
