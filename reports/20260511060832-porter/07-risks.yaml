callouts:
  - calloutType: risk
    title: "Take Rate Kill Scenario: MV Aggregator Guidelines Could Compress Revenue by Rs 400-600 Cr"
    body: >-
      MoRTH's MV Aggregator Guidelines 2025 propose a commission/take-rate cap of 10-15%.
      Porter's current blended take rate is approximately 14-16%. Full enforcement at a 10-12%
      cap could reduce annual revenue by Rs 400-600 crore at FY25 GMV scale, turning the Rs 55
      crore FY25 profit into a substantial loss. No enforcement date is confirmed and no cargo-
      aggregator carve-out has been announced as of May 2026.
    claimRefs:
      - CR003
      - CR004
      - CR005
      - CR011
      - CR029
  - calloutType: risk
    title: "Gig Worker Regulation: Rs 43-87 Crore Annual Cost Hit Confirmed for FY26"
    body: >-
      India's Code on Social Security 2020 gig worker welfare fund contribution (1-2% of annual
      turnover) is now legally operative as of November 2025. At Porter's FY25 revenue of
      Rs 4,339 crore, this translates to a confirmed annual cost of Rs 43-87 crore from FY26
      onward — the first non-discretionary cost increase to emerge from the regulatory pipeline
      with a defined legal basis and no available exemption mechanism.
    claimRefs:
      - CR001
      - CR009
      - CR010
      - CR040

