  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold/event
      - action implication
    rows:
      - - MV Aggregator Guidelines enforcement
        - MoRTH publishes enforcement commencement date or state governments begin penalizing platforms
        - Take rate mandated below 12%; no cargo-aggregator exemption granted
        - Thesis break; revenue model requires fundamental restructuring; investment implication negative
      - - Code on Social Security 2020 gig fund
        - Government gig worker welfare portal goes live; contribution notices issued to platforms
        - Annual cost exceeds Rs 100 crore (more than 2% of FY25 revenue)
        - Material earnings revision; reduce FY26 EBITDA estimate; monitor compliance status quarterly
      - - Driver supply disruption
        - News reports of active strike or city-wide driver boycott in any major city
        - More than 20% supply drop in two or more cities for more than 48 hours
        - Operational continuity risk; escalate driver grievance mechanism diligence; contingency plan required
      - - MapMyIndia outage or contract termination
        - Porter platform shows dispatch failures, routing errors, or timeout spikes
        - More than 30-minute routing failure affecting more than 10% of bookings in any city
        - Confirm backup mapping vendor exists; obtain MapMyIndia contractual SLA from data room
      - - Take-rate compression driven by competition
        - Competitor discount campaigns or driver incentive wars reduce blended take rate
        - Blended take rate falls below 12% for two consecutive quarters without regulatory mandate
        - Re-assess unit economics and competitive moat; review differentiation adequacy in affected cities
    notes: >-
      Kill triggers are defined at thresholds representing a fundamental change in the investment
      thesis rather than ordinary business volatility. Monitoring should be continuous via
      industry news feeds, regulatory gazette notifications, and quarterly financial updates.
