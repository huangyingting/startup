      - TE005
    figureRefs: []

  - id: roadmap-and-maturity
    title: Product Roadmap and Platform Maturity
    body: >
      Porter's product roadmap, as inferred from public announcements (no official published roadmap exists), is
      focused on three themes: geographic expansion, MSME deepening, and driver economics improvement.

      Geographic expansion: Porter is actively entering secondary and tertiary Indian cities with high MSME
      density — Calicut, Tiruppur, Rajkot (launched 2025–26), and 8 additional MSME-focused cities announced
      for 2026. The UAE market represents a live international pilot for model portability. Target of 50 cities
      by 2030 implies ~28 net new city launches over four years — approximately 7 per year.

      MSME deepening: Porter's December 2024 announcement of partnerships with MSME clusters (textile hubs,
      engineering clusters, manufacturing centers) indicates a B2B sales motion layered on top of the consumer
      marketplace. API integration for business accounts is a published feature, but depth of enterprise product
      maturity is unverified.

      Driver economics: The gig worker regulatory pressure and union allegations are likely accelerating internal
      product work on driver earnings transparency, grievance tools, and social security compliance features.
      No public announcements of specific driver welfare product features have been made as of mid-2026.

      Maturity assessment: Porter's core booking-dispatch-payment loop is production-grade with demonstrated
      scalability to ₹4,339 crore in FY25 revenue. The analytics/ML layer (dynamic pricing, ETA prediction)
      is operational but not independently validated. The enterprise/API product and international expansion
      (UAE) are early-stage. Gig worker compliance tooling is a product gap that is increasingly material.
    claimRefs:
      - CE024
      - CE025
      - CE026
      - CE027
    tableRefs: []

callouts:
  - id: callout-gig-compliance-cost
    title: Gig Worker Compliance Cost Could Erase FY25 Profit
    body: >-
      Porter's FY25 ₹55 crore consolidated net profit is at risk from two converging regulatory headwinds:
      (1) India's Code on Social Security 2020 (effective November 2025) requires 1–2% of annual turnover
      contribution to a gig worker fund — ₹43–87 crore at FY25 revenue levels; and (2) Motor Vehicle Aggregator
      Guidelines 2025 may cap commissions at 10–15%, compressing Porter's 14–16% (up to 30%) take rate.
      Simultaneously, TGPWU's public allegations expose Porter to reputational and operational risk in a key
      market (Hyderabad/Telangana). The compliance cost math suggests profitability could be fragile rather
      than durable without significant revenue growth to absorb the new obligations.
    claimRefs:
      - CE020
      - CE021
      - CE022
      - CE023
  - id: callout-tech-gap
    title: "Technology Validation Gap: No Public API Docs, No Engineering Benchmarks"
    body: >-
      Porter's product claims — microservices architecture, smart dispatch, AI-powered ETA prediction,
      MapMyIndia integration — are substantiated primarily through company marketing materials and press
      coverage rather than independent technical validation. Unlike Delhivery (which has published detailed
      tech architecture documentation), Porter has no public engineering blog, no open-source contributions,
      no API reference documentation, and no published SLA or uptime metrics. This represents a diligence
      gap: the sophistication and defensibility of Porter's core dispatch and prediction algorithms cannot
      be independently verified from public information.
    claimRefs:
      - CE006
      - CE007
      - CE012
      - CE013

