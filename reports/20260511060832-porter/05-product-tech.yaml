company:
  name: Porter
chapter:
  number: 5
  title: Product & Technology
  summary: >
    Porter's product is an on-demand intra-city logistics marketplace connecting MSMEs, businesses, and individuals
    with light commercial vehicles (LCVs), mini trucks, two-wheelers, and three-wheelers via iOS and Android apps
    and a web portal. The platform's core technology stack encompasses a real-time dispatch engine, GPS tracking,
    multi-stop route optimization, in-app UPI/Razorpay payments, digital GST billing, and proof-of-delivery (POD)
    documentation. With 1.2 million driver-partners onboarded and 22+ cities served (plus UAE), Porter's platform
    maturity is high for its core intra-city LCV booking flow, but significant gaps exist around published API
    documentation, app architecture specifications, SLA/uptime commitments, proprietary AI/ML details, and an
    independent developer ecosystem. The regulatory compliance stack is under active construction following India's
    Motor Vehicle Aggregator Guidelines 2025 and Code on Social Security 2020 (gig worker fund, effective November
    2025), creating material cost and operational risk.
sections:
  - id: product-definition
    title: Product Definition and Customer Workflow
    body: >
      Porter delivers on-demand and scheduled intra-city goods transportation via a mobile-first marketplace. The
      product lifecycle begins with a customer (MSME, business, or individual) opening the Porter app or web portal,
      selecting a vehicle type (LCV mini truck, tempo, 2-wheeler, or 3-wheeler), specifying pick-up and drop-off
      locations (with multi-stop support), and receiving a price estimate before confirming the booking. The system
      then assigns an available driver-partner in real time using a dispatch algorithm that weights proximity,
      vehicle type, and driver availability. After assignment, the customer tracks the vehicle via live GPS, receives
      an ETA, and completes payment digitally (UPI/Razorpay/Paytm). For MSME customers, Porter auto-generates a
      GST-compliant invoice and proof-of-delivery document.

      Porter offers five main vehicle categories: (1) 2-wheelers (bikes) for parcels/small packages; (2) 3-wheelers
      (auto/tempo) for medium loads; (3) mini LCVs (Tata Ace class, payload ~750 kg); (4) medium LCVs (Mahindra
      Supro/Bolero pickup, payload ~1.5 t); and (5) large LCVs (payload 2–4 t). These map directly to the volume
      tiers prevalent in MSME goods movement. Porter also offers scheduled/contracted fleet services to enterprise
      customers requiring repeat or bulk logistics capacity.

      The customer workflow is explicitly designed around MSME needs: GST billing, multi-stop trips (to serve
      multiple delivery/pick-up points in one trip), API integration for business platforms, and digital POD for
      accounts-receivable reconciliation. Individual consumers use Porter primarily for home shifting and large-item
      transport. Porter's 99% revenue from goods transportation (vs. services or SaaS) reflects the depth of
      alignment between product design and the transportation use case.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
    tableRefs:
      - TE001
      - TE002

  - id: technology-architecture
    title: Technology Architecture and Operating Model
    body: >
      Porter's technology stack is structured around four functional layers: (1) the customer-facing client layer
      (iOS/Android apps, web booking portal); (2) the core platform services layer (booking engine, dispatch
      algorithm, payments, notifications); (3) the data and intelligence layer (GPS/location, route optimization,
      dynamic pricing, ETA prediction); and (4) the infrastructure layer (cloud hosting, mapping APIs, third-party
      integrations).

      The booking engine processes trip requests, validates vehicle availability by city zone, and commits bookings
      in real time. The dispatch algorithm (described as "smart fleet allocation" in Porter's product literature)
      matches demand to supply using real-time GPS positions of driver-partners, vehicle type filters, and estimated
      transit time to pick-up. Multi-stop trip logic allows customers to add intermediate stops with fare
      recalculation. The ETA prediction model uses historical speed profiles and current traffic data.

      For mapping, Porter integrates MapMyIndia (for India-specific high-fidelity road data) and Google Maps (for
      broader coverage and consumer UX). Payment processing relies on Razorpay and Paytm/UPI rail integrations.
      The platform uses a microservices architecture, allowing independent scaling of booking, dispatch, tracking,
      and billing components. GST billing and POD modules are additive services layered on top of the core trip
      workflow.

      For the UAE market, Porter adapted its platform to English-language UI, AED payment processing, and UAE road
      data mapping. This required a parallel deployment rather than a single global multi-tenant system, implying
      some operational overhead.

      CPTO Shruti Ranjan Satpathy (appointed 2023) oversees the technology platform. Porter has not published
      detailed engineering blogs, open-source repositories, or formal API documentation, making independent
      technical validation of architecture claims limited. Driver-partner app functionality (accepting trips,
      navigation, digital POD capture, earnings tracking) mirrors consumer-side features.
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
      - CE011
      - CE012
