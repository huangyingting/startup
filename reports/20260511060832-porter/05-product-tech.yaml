  - id: TE002
    title: Porter Customer Workflow Use-Case Table
    subtitle: Four primary use cases with current workflow, Porter solution, and known limitations
    enumerationScope:
      coverage: partial
      basis: Porter website, press announcements, and logistics industry research
    columns:
      - User Job
      - Current (Pre-Porter) Workflow
      - Porter Solution
      - Measurable Benefit
      - Known Limitation
    rows:
      - - MSME intra-city goods movement (regular)
        - Informal truck broker call, negotiate price, wait hours, paper receipt
        - App booking, real-time GPS, transparent pricing, GST invoice in minutes
        - Eliminates broker margin; TAT from hours to minutes for routine trips
        - Pricing not always transparent for custom/heavy loads; surge pricing risk during peak
      - - Individual home shifting (large items)
        - Local packers & movers, no GPS, opaque pricing, cash only
        - LCV booking with live tracking, cashless payment, digital POD
        - Price certainty; accountability via GPS tracking
        - Not a full-service move (no packing/loading service included in base product)
      - - Enterprise scheduled fleet (B2B contracted)
        - Fleet ownership or fleet rental via unorganized aggregators
        - Scheduled booking API; contracted rates for recurring volumes
        - Reduces fleet ownership capex for enterprise logistics
        - API integration depth and SLA commitments unverified for enterprise segment
      - - E-commerce / quick commerce last-mile (2W)
        - Shadowfax, Dunzo, Delhivery for express last-mile
        - 2-wheeler booking with competitive TAT and digital tracking
        - Single platform for LCV + 2W needs
        - Shadowfax/Delhivery have larger 2W/express networks; Porter is challenger in this sub-segment
    notes: "Use cases derived from Porter marketing materials and press coverage; quantitative benefit estimates are directional approximations."

