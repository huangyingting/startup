  - id: founders-leadership-governance
    title: Founders, Leadership, and Governance
    body: >
      Porter's leadership team is built around three IIT Kharagpur co-founders who have shaped the company from
      inception. A key governance transition occurred in August 2023 when Uttam Digga formally assumed the CEO role,
      while Pranav Goel shifted to Executive Vice Chairman. Both are deeply involved operationally, and both —
      alongside Vikas Choudhary — won the EY Entrepreneur of the Year 2025 award in the Start-up category,
      underscoring external validation of the founding team's accomplishment.

      Uttam Digga (CEO since August 2023) is an IIT Kharagpur alumnus who transitioned from co-founder to chief
      executive, driving the company's shift toward profitability and geographic expansion. Pranav Goel (Executive
      Vice Chairman), the original CEO and co-founder, stepped back from day-to-day operations while retaining
      strategic influence. Vikas Choudhary (co-founder) holds a product and strategic role within the company.
      Shruti Ranjan Satpathy serves as Chief Product and Technology Officer, appointed in 2023, and leads the
      technology stack including the booking engine, dispatch algorithms, and fleet intelligence systems.

      The leadership restructuring in 2023 — formalizing Digga as CEO and Goel as Executive Vice Chairman — was
      reported across logistics trade media and signals a maturation of governance ahead of the Series F round and
      potential future IPO planning. Key-person risk remains relevant: the founding trio's operational and network
      credibility is material to driver-partner trust, MSME client relationships, and investor confidence.

      Porter's board includes institutional investor representatives from Kedaara Capital (lead Series F investor),
      Wellington Management, and Vitruvian Partners (existing investor). Peak XV Partners (formerly Sequoia India)
      and Kae Capital conducted secondary exits at the Series F — indicating partial investor liquidity but also
      removing two early-stage investor board seats.
