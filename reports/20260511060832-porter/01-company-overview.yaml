  - id: funding-valuation
    title: Funding History, Valuation, and Investor Base
    body: >
      Porter has raised approximately $350+ million in total capital across six institutional rounds from 2014 to 2025.
      The company achieved unicorn status — valuation of $1.2 billion — with its Series F round announced in May 2025.

      Early rounds: Seed (~$1 million, 2014) supported platform development; Series A ($1.5 million, 2016) provided
      validation capital; Series B ($12 million, 2018) funded geographic expansion; Series C ($30 million, 2020)
      continued scale-up; Series D ($15 million, 2021) served as a bridge round.

      Series E (2022): $150 million was the company's largest pre-Series F round, supporting a major expansion push.
      Vitruvian Partners participated as a key institutional backer and remains a continuing investor through Series F.

      Series F (May 2025): Porter raised $200 million led by Kedaara Capital and Wellington Management at a $1.2
      billion post-money valuation — the round that conferred unicorn status. Kedaara Capital, a growth-equity firm
      focused on India mid-market companies, led the round with Wellington Management (a global asset management
      firm with $1 trillion+ AUM) as co-lead. Existing investor Vitruvian Partners participated. Notably, Peak XV
      Partners (formerly Sequoia India) and Kae Capital used this round to execute secondary exits, suggesting some
      early-stage investor liquidity preference. The Competition Commission of India (CCI) formally approved Kedaara
      Capital's stake acquisition in SmartShift Logistics Solutions on July 8, 2025.

      The Series F proceeds are earmarked for geographic expansion (targeting 50 cities by 2030), MSME segment
      deepening, technology investment, and driver-partner ecosystem development.
