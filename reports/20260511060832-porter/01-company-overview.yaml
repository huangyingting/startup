  - id: business-model-products
    title: Business Model, Product, and Technology
    body: >
      Porter's business model is a commission-based logistics marketplace. On the demand side, customers (MSMEs,
      businesses, individuals) book vehicles via the Porter app or web portal. On the supply side, independent
      driver-partners who own or operate LCVs, mini trucks, or two-wheelers accept trips and earn per-trip revenue
      net of Porter's platform commission of 14–16% (up to 30% in some cities).

      The technology platform includes: real-time GPS vehicle tracking; dynamic dispatch algorithms that match
      demand and supply based on proximity, vehicle type, and availability; multi-stop trip planning and route
      optimization; ETA prediction; in-app UPI/Razorpay payment integration; digital GST invoicing for MSME
      customers; proof-of-delivery (POD) documentation; and customer rating/review systems.

      Porter's technology stack uses a microservices architecture. Mapping integrations with MapMyIndia and Google
      Maps power location services. The platform supports both iOS and Android mobile apps and a web booking portal.
      In FY25, Porter's tech-enabled model delivered 57% year-on-year revenue growth to ₹4,306–4,339 crore with
      99% of revenue from goods transportation.

      Porter's competitive advantage rests on: (1) supply-side density — 1.2 million onboarded driver-partners
      creating liquidity and ETA reliability; (2) MSME-centric product features (GST billing, multi-stop, API
      integration for business accounts); (3) brand recognition in Tier-1 cities; and (4) network effects between
      demand-side order density and supply-side driver earnings. The UAE expansion (launched prior to Series F)
      marks Porter's first international market, testing portability of the model in a higher-income logistics
      market.
