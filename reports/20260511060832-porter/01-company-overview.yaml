callouts:
  - id: callout-profitability
    title: First Profitable Year — A Structural Inflection
    body: >-
      Porter's FY25 swing to ₹55 crore consolidated net profit and ~₹48 crore EBITDA (from -₹112 crore EBITDA in
      FY24) is structurally significant. Fleet operator costs, though large in absolute terms (~82.8% of expenses),
      are variable and scale with revenue. As revenue density per city improves, fixed costs are absorbed across a
      larger base, driving margin expansion. This profitability milestone — alongside the $200M Series F — positions
      Porter favourably for an eventual IPO.
    claimRefs:
      - CO027
      - CO028
      - CO029
  - id: callout-gig-worker-risk
    title: Gig Worker ESG Risk Is Escalating
    body: >-
      TGPWU's public allegations of exploitative conditions — unfair suspensions, inadequate grievance mechanisms,
      no per-km rate guarantees — against Porter's Hyderabad operations are backed by Business and Human Rights
      Resource Centre coverage. India's Code on Social Security 2020 (effective November 2025) and Motor Vehicle
      Aggregator Guidelines 2025 create compliance obligations (1–2% of turnover to gig worker fund; minimum
      earnings guarantees; insurance mandates) that could add ₹43–87 crore in annual social security costs at
      current revenue levels — a material P&L impact for a company that just turned profitable.
    claimRefs:
      - CO033
      - CO034
      - CO035
