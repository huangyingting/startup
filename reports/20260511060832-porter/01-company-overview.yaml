  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: active-driver-count
      missingEvidence: Monthly active driver-partner count vs. cumulative onboarded 1.2M figure for Porter platform
      whyItMatters: Active driver count determines actual supply-side liquidity and ETA reliability; cumulative onboarded overstates current supply
      diligencePath: Request monthly active driver data and 12-month cohort retention rates from Porter management
      relatedQuestionRefs:
        - QO010
    - type: missing-source
      severity: minor
      topic: employee-breakdown
      missingEvidence: Functional breakdown of Porter's ~2,715 employees by engineering, operations, sales, and management headcount
      whyItMatters: Unit economics of employee costs (₹285 crore) needs function-level analysis to assess scalability
