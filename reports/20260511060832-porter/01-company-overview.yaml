company:
  name: Porter
chapter:
  number: 1
  title: Company Overview
  summary: >
    Porter (legal entity: SmartShift Logistics Solutions Private Limited) is India's leading on-demand intra-city
    logistics platform, founded in 2014 in Bengaluru. The company connects MSMEs, businesses, and individuals with
    light commercial vehicles (LCVs), mini trucks, and two-wheelers via a mobile-first marketplace. Porter achieved
    unicorn status in May 2025 after closing a $200 million Series F round led by Kedaara Capital and Wellington
    Management at a $1.2 billion valuation. In FY25 Porter reported ₹4,306–4,339 crore in revenue (+57% YoY) and
    turned consolidated profitable with ₹55 crore net profit — a major milestone after years of losses.
sections:
  - id: company-identity
    title: Company Identity and Founding Story
    body: >
      Porter is an on-demand intra-city logistics technology platform incorporated as SmartShift Logistics Solutions
      Private Limited, headquartered in Bengaluru, Karnataka, India (CIN: U63090KA2014PTC075462). The company operates
      its consumer-facing product under the Porter brand at porter.in. Porter was founded in 2014 by Pranav Goel,
      Uttam Digga, and Vikas Choudhary — three IIT Kharagpur alumni who identified a major inefficiency in India's
      intra-city goods movement market, which was dominated by unorganized truck brokers and informal aggregators
      incapable of providing real-time booking, price transparency, or reliable service guarantees.

      Porter's core product is a mobile and web platform (iOS and Android) that allows businesses and individuals to
      book light commercial vehicles (LCVs), mini trucks (Tata Ace/Mahindra Supro class), two-wheelers, and tempos
      for same-day intra-city deliveries. The platform uses real-time GPS tracking, dynamic route planning, ETA
      prediction, and algorithmic fleet allocation. Porter serves three primary customer segments: (1) micro, small
      and medium enterprises (MSMEs) requiring regular goods movement; (2) individual consumers for personal/household
      moves; and (3) enterprises needing scheduled or contracted logistics capacity.

      Porter operates as a commission-based marketplace. Driver-partners are independent operators who own or finance
      their vehicles; Porter earns a commission of approximately 14–16% on each transaction, reaching up to 30% in
      certain markets. The platform supports in-app payments via UPI and Razorpay, digital GST billing, proof-of-
      delivery documentation, and multi-stop trip optimization. As of the Series F fundraise in May 2025, Porter
      operated in 22+ Indian cities plus the UAE, with an active driver-partner network of 1.2 million onboarded
      operators. Revenue from goods transportation constitutes 99% of total revenue.
