  - id: TV002
    title: Porter Investment Thesis and Anti-Thesis Assessment
    subtitle: >-
      Structured bull and bear arguments by dimension with assessed probability weight as of May 2026
    columns:
      - Dimension
      - Bull Case Argument
      - Bear Case Argument
      - Weight
