  - id: comparable-benchmarking
    title: Comparable Valuation Benchmarking
    body: >-
      Three comparable companies anchor the external valuation frame. Delhivery (NSE: DELHIVERY)
      is the primary Indian public comparable: a B2B express logistics platform with FY25 revenue
      of approximately ₹8,931 crore and a market capitalisation of approximately ₹29,000–31,000
      crore as of May 2026, implying a listed EV/Revenue of approximately 3.0–3.5×. Delhivery's
      higher multiple versus Porter's 2.8× entry reflects public-market liquidity premium and greater
      scale, though Delhivery remains EBITDA-negative — which should logically compress rather than
      expand its relative multiple. Porter's first-profitable-year status and higher revenue growth
      rate (57% vs Delhivery's ~15–20%) arguably justify a comparable or superior multiple,
      supporting the $1.2 billion valuation.

      Shadowfax Technologies is the secondary Indian private comparable: an express last-mile
      logistics operator with FY25 revenue of approximately ₹1,750 crore — roughly 40% of Porter's
      scale — with an implied IPO-era valuation of $400–500 million, equating to approximately
      1.6–2.0× EV/Revenue. Shadowfax operates in a different sub-segment (last-mile consumer
      delivery vs Porter's intra-city B2B MSME logistics), so the multiple discount is partially
      structural. Nonetheless, it establishes a lower bound: a private Indian logistics platform at
      ₹1,750 crore revenue with no profit is valued at ~2× EV/Revenue, implying Porter at $1.2
      billion and ₹4,339 crore revenue (profitable) is priced at roughly the same multiple adjusted
      for scale — a reasonable anchor.

      Lalamove (HKEX: 2348) is the cross-market GMV comparable. Lalamove's FY2023 annual revenue
      of approximately HK$5.6 billion (~$720 million) and an EV/GMV of approximately 0.03–0.05×
      across its 10+ Asian market footprint provides a direct cross-market benchmark for Porter's
      EV/GMV of 0.04–0.05×. The alignment confirms that Porter's $1.2 billion valuation is
      consistent with established market pricing for high-volume intra-city logistics aggregators
      on a GMV basis.
