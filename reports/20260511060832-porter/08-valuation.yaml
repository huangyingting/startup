  - id: scenario-analysis
    title: "Scenario Analysis and Valuation Ranges"
    body: >-
      Three scenarios span the plausible outcome distribution at entry. The bull case assumes a 50%
      revenue CAGR from FY25 through FY28, producing consolidated revenue of approximately ₹14,700
      crore (~$1.76 billion) — roughly 3.4× FY25 revenue. At a 3.5–4.0× EV/Revenue multiple
      (justified by profitable growth at scale, imminent IPO, and Delhivery re-rating precedent),
      the implied EV of $1.9–2.5 billion represents a 1.6–2.1× return on the $1.2 billion Series F
      entry within three years. The bull case requires flawless 50-city execution, no adverse
      regulatory notifications, and a continued shift toward enterprise and B2B bookings that carry
      higher average revenue per booking and drive mix-shift EBITDA expansion.

      The base case assumes a 40% revenue CAGR to FY28, producing approximately ₹11,900 crore
      (~$1.43 billion) in revenue. At a 2.5–3.0× EV/Revenue multiple, the implied EV of
      $1.4–1.8 billion delivers a 1.2–1.5× return — acceptable for a PE or growth investor with a
      4–5 year hold. The base case assumes a stable regulatory environment, partial city expansion
      to 35–40 cities by FY28, and modest EBITDA margin improvement to 5–7%.

      The bear case models a dual regulatory shock: MV Aggregator Guidelines notified with take-rate
      caps reducing blended commission by 5–7 percentage points, and Code on Social Security gig
      worker provisions adding approximately 2–3% to fleet operator costs. Combined, these shocks
      reduce FY28 EBITDA margin by 500–700 basis points versus base, slow revenue growth to
      approximately 25% CAGR (reflecting demand destruction from pass-through price increases), and
      produce FY28 revenue of approximately ₹8,500 crore (~$1.02 billion). At a compressed 1.5–2.0×
      EV/Revenue multiple (consistent with a near-breakeven logistics operator), the implied EV of
      $0.7–1.0 billion falls below the $1.2 billion Series F entry price, indicating potential
      capital impairment. The bear case probability is assessed at 20–25% given the current
      legislative timeline.
