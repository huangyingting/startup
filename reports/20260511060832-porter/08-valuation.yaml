    summary: >-
      Enterprise value range across bear, base, and bull scenarios expressed in USD million.
      Ranges reflect the interaction of revenue CAGR, EBITDA margin outcome, and EV/Revenue
      multiple compression or expansion relative to the $1.2B Series F entry point. The bear
