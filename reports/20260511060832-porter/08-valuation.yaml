  - id: exit-readiness-diligence
    title: Exit Readiness and Final Diligence Asks
    body: >-
      Porter's most likely exit pathway is a domestic IPO on NSE or BSE, with FY27–FY28 as the
      estimated listing window based on the first-profitable-year milestone (FY25), Series F
      stabilisation period, and comparable IPO timelines in Indian logistics (Shadowfax, Delhivery).
      Secondary pathways include a strategic trade sale to a global logistics platform (DHL, Maersk,
      or a Japanese integrator such as Yamato or SG Holdings) or a PE secondary sale in FY26–FY27
      if IPO markets deteriorate. Wellington Management's participation at Series F as a financial
      return investor (not strategic) strengthens the IPO pathway signal: Wellington typically exits
      via public market listing rather than trade sale.

      Four material diligence gaps prevent unconditional investment conviction. First, ratchet
      provisions in the Kedaara-Wellington term sheet — specifically any guaranteed return,
      anti-dilution, or price protection clauses — are not publicly available and could affect return
      distribution in a base or bear case scenario. Second, city-level unit economics for post-FY24
      cities are not publicly available; capital deployment efficiency for the 50-city expansion
      cannot be independently modelled. Third, the preference stack above Series F — whether earlier
      rounds carry residual liquidation preferences — is not publicly disclosed and could affect
      common equity returns in a sub-$1.2B exit. Fourth, Series F liquidation preference terms
      (1× non-participating vs participating; redemption rights) are not disclosed, affecting
      downside scenario recoveries.

      Diligence teams should request from the data room: audited FY25 consolidated financial
      statements (Ind AS), city-level P&L contribution for the top 10 cities, full capitalisation
      table with preference stack, Series F term sheet (ratchet, redemption, anti-dilution), and
      management-prepared FY26–FY28 financial model. The IPO track record of comparable Indian
      logistics companies provides useful precedent: Delhivery's NSE listing and Shadowfax's pending
      IPO offer direct benchmarks for pricing, lockup, and institutional demand.
