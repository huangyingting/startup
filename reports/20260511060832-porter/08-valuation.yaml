  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: Series F ratchet provisions and investor protection clauses
      missingEvidence: >-
        The Kedaara Capital and Wellington Management Series F term sheets — including any ratchet
        provisions, guaranteed return clauses, anti-dilution mechanisms, or price adjustment clauses
        — are not publicly available. No public filing discloses the specific economic terms beyond
        the headline $200M raise and $1.2B post-money valuation.
      whyItMatters: >-
        Ratchet provisions that guarantee a minimum return to Series F investors could materially
        affect common equity and earlier-round investor returns in a base or bear case exit.
        Without this information, the investment return waterfall cannot be modelled with accuracy.
      diligencePath: >-
        Request signed Series F term sheet from CFO data room. Flag any guaranteed return, downside
        protection, anti-dilution, or redemption clause for legal review. Model impact on exit
        waterfall under bear case ($0.7–1.0B EV) scenario.
      relatedQuestionRefs:
        - QV003
      relatedTableRefs:
        - TV006

    - type: private-evidence-only
      severity: material
      topic: City-level unit economics for post-FY24 expansion cities
      missingEvidence: >-
        Porter has not publicly disclosed contribution margins, payback periods, or time-to-break-even
        for any individual city — legacy or newly launched. The 50-city-by-2030 expansion plan's
        capital efficiency cannot be modelled without city-level P&L data.
      whyItMatters: >-
        The primary use of the $200M Series F proceeds is city expansion. If post-FY24 cities fail
        to reach contribution break-even within 18 months, capital will be consumed faster than
        modelled, requiring additional dilutive financing that impairs returns.
      diligencePath: >-
        Request city-level contribution margin waterfall for top-15 cities by revenue from the data
        room. Ask management for payback period and time-to-break-even for the last 5 city launches.
      relatedQuestionRefs:
        - QV010
      relatedTableRefs:
        - TV006

    - type: private-evidence-only
      severity: material
      topic: Preference stack and Series F liquidation preference terms
      missingEvidence: >-
        The complete capitalisation table — including liquidation preferences for all rounds from
        Series A through Series F — is not publicly available. Series F liquidation preference terms
        (participating vs non-participating, cap, redemption right) are not disclosed publicly.
      whyItMatters: >-
        In a bear case exit below $1.2 billion, the preference stack determines whether any value
        flows to common equity or earlier series holders. In a base case exit at $1.4–1.8 billion,
        participating preferences materially reduce common equity proceeds.
      diligencePath: >-
        Request fully-diluted capitalisation table from the CFO. Review Series A through E term
        sheets for residual liquidation preferences. Confirm Series F preference type and cap.
      relatedQuestionRefs:
        - QV020
        - QV027
      relatedTableRefs:
        - TV006

