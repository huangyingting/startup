  - id: FV002
    title: Porter Valuation Scenario Scoring Matrix
    type: matrix
    layout: standard
    summary: >-
      Scoring matrix assessing Porter across five investment dimensions under bull, base, and bear
      scenarios. Scores are qualitative and reflect the direction and magnitude of each dimension's
      contribution to the overall thesis. The matrix highlights that regulatory risk is the single
      dimension that can shift the overall thesis from Strong to Impaired irrespective of all others.
    claimRefs:
      - CV029
      - CV030
      - CV031
      - CV018
      - CV019
      - CV043
      - CV041
    data:
      columns:
        - Revenue Growth
        - Operating Leverage
        - Regulatory Risk
        - Exit Pathway
        - Overall Thesis
      rows:
        - label: Bull Case
          values:
            - "High — 50% CAGR sustained"
            - "High — variable cost base intact"
            - "Low risk — no notification"
            - "High — IPO FY27–28 at $2B+"
            - "Strong — 1.6–2.1× return"
          note: >-
            All five dimensions align positively. Requires regulatory non-intervention and
            successful 50-city execution simultaneously. Probability: 25–30%.
        - label: Base Case
          values:
            - "Medium — 40% CAGR"
            - "Medium — partial regulatory pressure"
            - "Medium — one instrument notified"
            - "Medium — IPO or PE secondary"
            - "Acceptable — 1.2–1.5× return"
          note: >-
            Most probable outcome. Revenue growth moderates but EBITDA margin expands modestly.
            One regulatory instrument notified but not both simultaneously. Probability: 50–55%.
        - label: Bear Case
          values:
            - "Low — 25% CAGR; demand disruption"
            - "Negative — dual shock compresses margin"
            - "Critical — both instruments notified"
            - "Constrained — IPO delayed or trade sale below entry"
            - "Impaired — below $1.2B entry price"
          note: >-
            Dual regulatory shock materialises within 24 months. EBITDA turns negative in Year 1
            of shock. Capital impairment risk at $1.2B entry. Probability: 20–25%.

