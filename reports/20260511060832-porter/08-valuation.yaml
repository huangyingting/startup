        - "Severe — blended take rate compressed 5–7 pp; FY25 EBITDA eliminated in Year 1 of shock"
        - MoRTH gazette notifications; logistics industry association press releases
        - "12–24 months (current consultation phase; no draft gazette as of May 2026)"
      - - Code on Social Security Gig Worker Notification
        - Government notifies social security contribution rules for platform workers
        - "Material — 2–3% additional cost on fleet payouts reduces operating leverage structurally"
        - Labour Ministry gazette; ESIC and EPFO notifications; industry roundtable coverage
        - "18–36 months (pending final rules; implementation rules not yet drafted)"
      - - "Bengaluru Revenue Shock (>15% YoY Decline)"
        - "Bengaluru revenue falls >15% YoY from any city-specific cause"
        - "High — 25–30% of total revenue affected; group-level revenue misses by 5–8%"
        - "Monthly city-level booking volumes; MCA filings; regional press; competitor announcements"
        - Ongoing — monitor quarterly
      - - City Expansion Unit Economics Failure
        - "≥3 post-FY24 cities fail to reach contribution break-even within 18 months of launch"
        - "Material — Series F capital depleted faster; additional raise at potentially dilutive terms"
        - "Internal data room: city-level contribution margin by cohort; management commentary"
        - "12–18 months from first post-FY24 city launch (FY26 monitoring window)"
      - - Competitive Take-Rate War
        - "Lalamove or Shadowfax initiates >10% commission discount in Porter's top-5 cities simultaneously"
        - "Moderate-to-severe — combined with any regulatory cap, squeezes revenue and costs together"
        - Competitor price discovery via booking-app monitoring; logistics industry press; driver forums
        - "Ongoing — monitor quarterly; Shadowfax post-IPO strategy is most acute near-term trigger"
    notes: >-
      Threshold conditions are based on desk-based analysis of public financial and regulatory data.
      No trigger has materialized as of May 2026. Probability assignments are qualitative only.
      Diligence teams should establish a monitoring dashboard for MoRTH and Labour Ministry gazette
      feeds as a condition of ongoing portfolio management.

  - id: TV006
    title: Porter Exit Readiness and Final Diligence Asks
    subtitle: >-
      Exit pathway assessment, gate requirements, outstanding data asks, and diligence priority
    columns:
      - Dimension
      - Current Status
      - Gate Requirement
      - Diligence Ask
      - Priority
    claimRefs:
      - CV025
      - CV033
      - CV040
      - CV042
      - CV044
      - CV045
      - CV027
    rows:
      - - IPO Readiness (Financial)
        - "FY25 first consolidated profit ₹55 Cr; standalone profit ₹131 Cr; revenue ₹4,339 Cr"
        - SEBI mandates 3 years of operating profit for mainboard IPO; FY25 is year one
        - Request FY23–FY25 audited Ind AS consolidated financials; confirm SEBI filing timeline
        - Critical
      - - Capitalisation Table and Preference Stack
        - "Not publicly disclosed; estimated $450M pre-Series F raised across 6 rounds"
        - Full cap table required to model exit waterfall and common equity return in any scenario
        - Request updated cap table from CFO; include ESOP pool and all outstanding options
        - Critical
      - - Series F Term Sheet (Ratchet and Liquidation)
        - Not publicly disclosed; Kedaara and Wellington terms unknown
        - Liquidation preference type directly impacts bear case recovery modelling
        - Request signed Series F term sheet; flag any ratchet, anti-dilution, or redemption clauses
        - Critical
      - - City-Level Unit Economics
        - Not publicly available; post-FY24 city performance entirely unmodelled externally
        - Expansion to 50 cities by 2030 is primary use-of-proceeds; unit economics gate capital efficiency
        - Request city-level contribution margin waterfall for top-15 cities; new city payback period
        - High
      - - FY26–FY28 Financial Model
        - Not publicly available; investor-prepared models are speculative without management inputs
        - Three-year model required for scenario analysis and Series F return underwriting
        - Request management-prepared base and bull and bear financial model; validate vs public data points
        - High
      - - Exit Pathway (IPO vs Trade Sale)
        - "IPO primary pathway (FY27–FY28); Wellington as financial investor supports public exit"
        - IPO valuation dependent on market conditions; trade sale requires strategic buyer identification
        - "Identify potential strategic acquirers (DHL, Maersk, Yamato); confirm Wellington lock-up period"
        - Medium
      - - Regulatory Risk Monitoring
        - MV Aggregator Guidelines and Code on Social Security both in consultation as of May 2026
        - Pre-investment commitment to active monitoring; condition precedent for any draw-down tranches
        - Establish MoRTH and Labour Ministry gazette monitoring protocol for portfolio management
        - High
    notes: >-
      Priority assessments reflect investment committee requirements for unconditional approval.
      Critical items are blockers for commitment; High items should be resolved before final close;
      Medium items inform ongoing portfolio management. All data asks are for private data room access
      and should be requested through formal due diligence channels via the CFO and legal counsel.

