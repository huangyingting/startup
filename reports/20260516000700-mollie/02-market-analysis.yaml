  - id: TM003
    title: Segment / buyer map
    columns:
      - segment
      - representative buyers
      - payment needs
      - budget owner
      - adoption path
      - Mollie product fit
    rows:
      - - SME e-commerce merchants
        - WooCommerce, Shopify, PrestaShop, Magento, Lightspeed stores below €5M annual volume
        - Plug-and-play plugin, 35+ local methods, transparent per-transaction pricing, no lock-in
        - Founder or operations lead; no dedicated payments team
        - Self-serve sign-up → plugin install → go live in days
        - High; core segment; standard pricing without monthly fee
      - - Fast-growing scale-ups
        - Merchants growing from €100K to €5M+ annual volume; expanding cross-border
        - Volume pricing, account management, IC++ rails, cross-border method coverage
        - CFO or Head of Finance alongside founder
        - Graduate from self-serve to account-managed volume tier
        - High; transitional; risk of churn to Adyen or Stripe at enterprise threshold
      - - Established mid-market merchants
        - Merchants with €5M–€50M annual e-commerce revenue; may have dedicated payments teams
        - IC++ pricing, custom settlement, dedicated support, omnichannel POS integration
        - Head of Payments or CFO; procurement involved
        - RFP process; integration testing; migration from incumbent PSP
        - Medium; Mollie competes with Adyen and Stripe; less differentiated on price at this tier
      - - SaaS platforms (Connect for Platforms)
        - Vertical SaaS providers embedding payment acceptance in their own product
        - Sub-merchant onboarding API, split settlement, platform-fee collection, compliance delegation
        - CTO or founder; platform product roadmap decision
        - API integration → sandbox testing → live; many downstream merchants per integration
        - High; high-leverage growth channel; each integration can bring hundreds of sub-merchants
      - - Marketplace operators
        - Multi-seller online marketplaces needing split payments and escrow-style fund management
        - Payment splitting, fund holding, seller KYC delegation, payout management
        - CPO, CTO, or Head of Finance at marketplace operator
        - Custom integration; regulatory review of marketplace payment model
        - Medium-high; dedicated product exists; more complex regulatory requirements
      - - Franchise networks
        - Multi-location franchise groups needing centralized payment oversight with per-location settlement
        - Centralized reporting, per-location settlement, harmonized payment method set
        - Group CFO or franchise management company
        - Structured rollout across franchise locations; centralized contract
        - Medium; niche product; smaller addressable base than core SME segment
    notes: >-
      Segments are ordered by current revenue materiality. The SME e-commerce segment accounts for the bulk of
      Mollie's 250,000+ merchant base. SaaS platforms are the highest-growth category by strategic leverage.
      Mid-market is a stretch segment where Mollie competes against larger PSPs.
    enumerationScope:
      coverage: partial
      basis: >-
        Six segments documented based on Mollie's public product surface and go-to-market materials;
        additional niche verticals such as non-profit and public sector may exist but are not prominently
        featured in public communications and represent a small fraction of total merchant volume.
