  - id: section-2
    title: Market sizing—TAM, SAM, and Mollie's current position
    body: >-
      No single authoritative public study sizes the European SMB PSP market as a standalone segment, requiring
      multiple complementary lenses. The broadest available anchor is the European e-commerce payments market overall.
      Ecommerce Europe's 2025 European E-commerce Report references continued growth in European consumer e-commerce;
      total European e-commerce spending is estimated in the range of €800 billion to €1 trillion or more annually
      when including the United Kingdom. The Statista Payments Market Forecast describes a global digital payments
      market experiencing robust growth driven by digital wallet adoption, mobile POS expansion, and ongoing
      digitalization of merchant acceptance. The Bank for International Settlements' CPMI payment statistics confirm
      that electronic payment values across BIS member jurisdictions—including major eurozone economies—are in the
      tens of trillions of euros annually.


      A narrower SAM lens focuses on the portion of European e-commerce payment volume that flows through PSP
      aggregators and gateways rather than direct bank acquirer relationships. SMBs typically access payment
      acceptance via third-party PSPs. Based on Mollie's own positioning—250,000 merchants, standard pricing up to
      €100,000 per month—the SAM plausibly spans merchants processing between a few thousand euros and several million
      euros annually. Applying publicly cited SMB PSP share assumptions of 15 to 25 percent of European e-commerce
      volume yields a SAM of approximately €120 billion to €250 billion in annual payment volume. This range is
      analyst-constructed rather than sourced from a primary study; actual market boundaries are uncertain.


      Mollie's current SOM can be inferred from disclosed financials. With 2024 revenue of €214 million and a
      blended take rate typical for PSPs (approximately 0.7 to 1.0 percent of TPV), the implied processed volume
      is roughly €20 billion to €30 billion annually. At the midpoint of the SAM range, this implies a low-single-
      digit percentage market share in the SMB PSP segment. The estimate is highly sensitive to undisclosed take-rate
      assumptions and should be treated as an order-of-magnitude indication only.
    claimRefs:
      - CM008
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
      - CM014
      - CM015
