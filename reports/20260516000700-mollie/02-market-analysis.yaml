company:
  name: Mollie
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Mollie operates at the intersection of a large European digital payments market and the underserved SMB segment.
    The total addressable market spans hundreds of billions in European digital payment flows, but the serviceable
    segment—online SMBs and SaaS platforms seeking local-method coverage, fast onboarding, and transparent pricing—is
    substantially narrower. Growth drivers including rising e-commerce penetration, open-banking regulation, cross-border
    expansion, and embedded finance demand are strong. Switching costs, payment method fragmentation, margin compression,
    and expanding incumbent competition constrain market share capture. Independent primary studies sizing the European
    SMB PSP segment are not publicly available; all TAM/SAM figures in this chapter are analyst-constructed.
sections:
  - id: section-1
    title: Market boundary and definition
    body: >-
      Mollie's relevant market is European digital payment processing for small and medium-sized businesses operating
      online and across omnichannel surfaces. The company's product surface covers four primary monetization lanes:
      e-commerce checkout payments processed at point of sale on merchant websites, in-person POS payments via Tap to
      Pay and card terminal devices, recurring and subscription payment collection via SEPA Direct Debit and stored
      payment methods, and standalone payment links and invoicing for service businesses. Each lane targets business-side
      buyers—merchants, SaaS platforms, and marketplace operators—rather than consumers, placing Mollie in the
      business-to-business payments infrastructure category.


      Several categories sit outside the practical market boundary despite surface similarity. Large enterprise
      acquiring—where Adyen's and Stripe's enterprise divisions compete on custom interchange-plus rails, global
      treasury, and dedicated relationship management—is not Mollie's primary arena: the company's public pricing page
      shows a clear self-serve threshold before volume discussions begin. Cross-border foreign-exchange treasury and
      wholesale FX are also excluded; Mollie facilitates multi-currency settlement but does not compete as a standalone
      FX provider. Cash-on-delivery and manual bank-invoice payment terms are the incumbent status-quo substitutes
      that Mollie's digital offering must displace; in markets such as Germany and the Netherlands, a substantial share
      of SMB invoicing still flows through manual bank transfers rather than integrated PSP rails.


      Adjacent opportunities that could expand the boundary include B2B embedded payments through the Connect for
      Platforms product, buy-now-pay-later co-origination with Klarna, and open-banking account-to-account flows as
      PSD2 infrastructure matures. Regulatory tailwinds from the EU Instant Payments Regulation may progressively move
      invoice-based commerce into real-time payment flows that a licensed EMI like Mollie can intermediate.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
    tableRefs:
