  evidenceGaps:
    - type: missing-data
      severity: major
      topic: European SMB PSP market size
      missingEvidence: >-
        No primary analyst study publicly sizes the European SMB PSP segment as a standalone market. All SAM
        figures in this chapter are analyst-constructed by applying share assumptions to top-down European
        e-commerce GMV estimates. The range of €60B–€250B spans 4× and is not suitable for precise underwriting.
      whyItMatters: >-
        Without a primary study, the SAM cannot be verified, making it impossible to assess whether Mollie's
        single-digit market share implies a large or limited remaining runway.
      diligencePath: >-
        Commission or access Gartner, Forrester, or Nilson Report primary study specifically on the European
        SMB PSP and payment gateway market; cross-reference with Oliver Wyman or CapGemini financial services
        market data for acquiring volume by merchant tier.
      relatedTableRefs:
        - TM002
      relatedQuestionRefs:
        - QM022
        - QM024

    - type: missing-data
      severity: major
      topic: Mollie TPV and blended take rate
      missingEvidence: >-
        Mollie does not publicly disclose its total payment volume (TPV) or blended take rate. The SOM estimate
        is inferred from 2024 revenue of €214M with an assumed 0.7–1.5% take rate, producing a wide range of
        €14B–€30B. Actual TPV could be materially different if the take-rate assumption is wrong.
      whyItMatters: >-
        TPV and take rate are the core building blocks of payment company unit economics and competitive
        positioning. Without them, it is impossible to validate revenue quality or benchmark against peers.
      diligencePath: >-
        Request Mollie management accounts, board presentations, or investor materials that disclose TPV by
        quarter and method mix; Dutch Central Bank EMI reports may publish volume data in aggregate.
      relatedTableRefs:
        - TM002
      relatedQuestionRefs:
        - QM023
        - QM024

    - type: missing-data
      severity: minor
      topic: Independent market growth rate for European SMB PSP segment
      missingEvidence: >-
        No independent analyst growth rate estimate was found for the European SMB PSP segment specifically.
        Broader European digital payments growth rates exist from Statista, BIS, and ECB but are not segmented
        by PSP tier or merchant size.
      whyItMatters: >-
        Growth rate benchmarking is needed to assess whether Mollie's 28% revenue growth in 2024 represents
        share gain or market-driven expansion.
      diligencePath: >-
        Access full Ecommerce Europe report (paywall); obtain Forrester European payments forecast; review
        Nilson Report PSP market share data; compare to Adyen and Stripe reported SMB volume growth rates.
      relatedTableRefs:
        - TM002
      relatedQuestionRefs:
        - QM025
