  claims:
    - id: CM001
      statement: >-
        Mollie serves more than 250,000 businesses across Europe with an all-in-one solution for payments and
        money management, positioning itself as a pan-European SMB payment infrastructure provider.
      type: company-claimed
      topic: market definition
      sourceRefs:
        - SM001
        - SM004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM001
      contradictsClaimRefs: []

    - id: CM002
      statement: >-
        Mollie's four primary monetization lanes are e-commerce checkout, in-person POS payments, recurring and
        subscription collection, and payment links and invoicing—all targeting business buyers rather than consumers.
      type: company-claimed
      topic: market definition
      sourceRefs:
        - SM004
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM001
      contradictsClaimRefs: []

    - id: CM003
      statement: >-
        Mollie's About page frames its origin as providing a more direct and affordable alternative to the
        frustrating, overpriced payment solutions that banks offered, explicitly positioning against legacy
        bank-owned gateways and manual bank transfers as status-quo substitutes.
      type: company-claimed
      topic: market definition
      sourceRefs:
        - SM001
      confidence: medium
      freshness: historical
      answersQuestionRefs:
        - QM013
      contradictsClaimRefs: []

    - id: CM004
      statement: >-
        Mollie's volume pricing tier begins at merchants processing more than €100,000 per month, marking the
        practical threshold between its self-serve SMB segment and the enterprise market where Adyen and Stripe
        are primary competitors.
      type: company-claimed
      topic: pricing model
      sourceRefs:
        - SM002
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM005
        - QM012
      contradictsClaimRefs: []

    - id: CM005
      statement: >-
        Mollie's Connect for Platforms is an embedded payment product enabling SaaS providers to become payment
        facilitators and offer sub-merchant accounts to their own clients.
      type: company-claimed
      topic: market definition
      sourceRefs:
        - SM007
        - SM022
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM009
        - QM021
      contradictsClaimRefs: []

    - id: CM006
      statement: >-
        Mollie's marketplace payment product supports payment splitting, fund holding, and seller onboarding—key
        capabilities for marketplace operators requiring escrow-style payment flows.
      type: company-claimed
      topic: market definition
      sourceRefs:
        - SM022
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QM009
      contradictsClaimRefs: []

    - id: CM007
      statement: >-
        The EU Instant Payments Regulation expands real-time SEPA payment infrastructure which licensed EMIs like
        Mollie can leverage for account-to-account payment flows, potentially displacing manual bank-transfer
        invoice workflows.
