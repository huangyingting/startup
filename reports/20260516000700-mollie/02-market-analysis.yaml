  - id: section-4
    title: Growth drivers and adoption constraints
    body: >-
      European digital payments market growth is underpinned by structural demand tailwinds. E-commerce penetration
      continues to increase across European markets as more consumer spending shifts online. The ECB's 2024 SPACE
      consumer survey, based on 50,000 euro-area consumer interviews, confirms that the share of digital payments
      has grown across all euro-area countries, with cards as the most popular digital method and mobile app
      payments gaining share. Cross-border e-commerce further expands the addressable base because merchants selling
      internationally need multi-currency support and acceptance of locally preferred payment methods—iDEAL in the
      Netherlands, Bancontact in Belgium, EPS in Austria, Przelewy24 in Poland, BANCOMAT Pay in Italy, and Wero
      across France, Germany, and Belgium.


      Regulatory catalysts reinforce organic growth. The PSD2 framework mandated strong customer authentication,
      accelerating migration away from informal payment flows toward licensed PSP infrastructure. The EU Instant
      Payments Regulation passed in 2024 requires banks to offer SEPA instant credit transfers, which the EBA's
      2026 supervisory opinion confirms is reshaping the competitive landscape between traditional banks and fintech
      PSPs. PSD3 and the Payments Services Regulation are in the European legislative pipeline to further harmonize
      open-banking standards. Mollie's ECB digital euro preparedness is a longer-term consideration; the ECB
      describes the digital euro as a complement to existing electronic payments, suggesting limited near-term
      PSP displacement risk.


      Adoption constraints are equally real. PSP integrations create technical switching costs once embedded in a
      merchant's checkout flow; plugin replacement requires developer time, re-testing, and downtime risk, creating
      structural inertia. European payment method fragmentation means a PSP entering a new country must secure local
      scheme membership and maintain dedicated support. Commodity card processing faces margin compression as
      interchange regulation and competition erode take rates. The World Bank notes that trust and financial
      inclusion barriers slow fintech adoption. Large incumbents including Adyen and Stripe have expanded SMB
      products, increasing competitive pressure on Mollie's differentiation in the mid-market.
    claimRefs:
