    title: Adoption funnel or value-chain map
    type: flow
    layout: wide
    summary: >-
      The European e-commerce payment value chain connects merchant checkout infrastructure through a licensed PSP
      to local and global payment networks, with regulatory compliance required at each layer and switching costs
      embedded at the PSP integration point.
    data:
      nodes:
        - id: n1
          label: Merchant e-commerce platform
