  - id: section-4
    title: Roadmap, expansion, and competitive differentiation
    body: >-
      Mollie's near-term product roadmap concentrates on four strategic vectors. First, EPI/Wero
      principal membership, confirmed in January 2026, adds pan-European real-time account-to-account
      payment directly to the Mollie API, reducing structural dependence on card networks for European
      domestic transactions and expanding the addressable payment method set. Second, the GoCardless
      acquisition—anticipated to close mid-2026—will bring bank debit, direct debit, and open-banking
      recurring payment capabilities into the Mollie stack, substantially strengthening the
      recurring-payment product suite and adding UK Bacs direct debit capabilities unavailable in
      Mollie's prior product. Third, the Mollie MCP Server positions the company for AI-native
      commerce: by making its API callable by LLM agents, Mollie creates a new developer acquisition
      channel and a potential early-mover competitive moat in AI-first payment flows. Fourth,
      geographic expansion continues systematically: five new markets—Norway, Finland, Denmark,
      Hungary, and Slovenia—launched in 2024, consistent with a long-run thirty-plus country
      coverage strategy.

      Competitive differentiation centers on three reinforcing strengths: the broadest European local
      payment method coverage in a single API, a developer-first integration model with 100+ platform
      partners generating distribution leverage, and a growing suite of embedded financial products
      that deepen merchant relationships beyond commodity transaction processing. The WooCommerce
      plugin's 100,000+ active installs are a tangible organic distribution metric that reinforces
      the depth of Mollie's ecosystem moat versus enterprise-first rivals such as Adyen and global
      generalists such as Stripe. The MCP Server, Wero membership, and GoCardless integration
      collectively represent the clearest evidence that Mollie is executing a deliberate strategy to
      reduce card-network dependency and expand wallet share within its existing merchant base.
