  - id: section-2
    title: Technical architecture and developer ecosystem
    body: >-
      Mollie's technical stack is built on an API-first, cloud-native architecture hosted in EU-based
      datacenters with the Netherlands as its primary region. The REST API exposes full payment
      functionality over HTTPS with an OpenAPI 3.0 specification, supporting JSON request/response
      payloads, OAuth2 authorization for Connect platform partners, and API-key-based authentication for
      direct merchants. Webhooks provide real-time event notifications enabling automated merchant
      fulfillment workflows. A full-featured sandbox environment with test mode allows developers to test
      integrations without live transactions, accelerating time-to-production for new integrations.

      The developer ecosystem is extensive: Mollie maintains official SDKs for PHP, Node.js, Python,
      Ruby, Java, .NET, and Go, with the PHP and Node.js SDKs actively maintained on GitHub with public
      commits and community pull requests. The WooCommerce plugin alone reports 100,000+ active installs,
      and the broader integration footprint exceeds 100 platform partners spanning CMS platforms (Magento,
      PrestaShop), ERP systems, and e-commerce marketplaces including Shopify. Third-party developer
      engagement is visible through npm package download metrics and Stack Overflow activity tagged with
      the Mollie integration. This distribution network creates a structural moat: each platform partner
      expands merchant reach without requiring direct Mollie sales effort.

      The platform's payment routing depends on external infrastructure: card transactions are processed
      through Visa, Mastercard, and Amex networks, while local payment methods rely on national scheme
      operators (iDEAL via Currence, Bancontact via Worldline/Payconiq) and ECB-governed SEPA rails.
      These dependencies represent a structural constraint on Mollie's pricing authority and uptime
      guarantees that is external to its control. The GoCardless acquisition, expected to close mid-2026,
      adds bank debit and open-banking recurring payment capabilities but introduces significant technical
      integration complexity requiring careful API and data-layer reconciliation.
