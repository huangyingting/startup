chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Mollie's product portfolio is built around a single REST API enabling acceptance of 35+ European
    payment methods, extended by higher-value modules including Mollie Connect (platform split-payment),
    Mollie Checkout (hosted checkout), Mollie Capital (SME lending), Mollie POS (tap-to-pay), and the
    AI-ready Mollie MCP Server launched in 2025. The technical architecture is cloud-native and EU-hosted,
    underpinned by PCI-DSS Level 1 and ISO 27001 certifications and full PSD2/3DS2 compliance. A developer
    ecosystem comprising 7 official SDKs, 100+ platform integrations, and a WooCommerce plugin with
    100,000+ active installs provides meaningful distribution leverage for SMB merchant acquisition.
    Near-term roadmap priorities—EPI/Wero membership, GoCardless integration, and geographic expansion—
    position Mollie to reduce card-network dependency and broaden its recurring-payment capabilities.
sections:
  - id: section-1
    title: Product portfolio and platform capabilities
    body: >-
      Mollie offers a comprehensive payments platform built around a single REST API that enables merchants
      to accept more than 35 European payment methods through a unified integration. The core product—Mollie
      Payments—serves as the foundation, accepting card schemes (Visa, Mastercard, American Express), digital
      wallets (Apple Pay, Google Pay), and hyperlocal European methods (iDEAL, Bancontact, SEPA Direct Debit,
      Klarna, PayPal, Sofort) through a single API contract. This single-integration approach reduces
      complexity for merchants compared with managing multiple PSP connections and lowers onboarding
      friction significantly for tech-forward SMBs who prefer self-service integration.

      Built on the payments core, Mollie has assembled a suite of higher-value product modules. Mollie
      Connect is a mature split-payment API serving marketplaces and SaaS platforms that need to route
      sub-merchant funds and retain platform fees. Mollie Checkout is a hosted, mobile-optimized payment
      page that is conversion-tuned and reduces merchant PCI compliance scope to SAQ-A level, materially
      lowering the security burden for non-technical merchants. Mollie Capital, launched in 2022, provides
      revenue-based SME merchant financing embedded directly in the dashboard, removing the need for
      external lenders. Mollie POS (launched 2024) enables card-present payments via Tap to Pay on iPhone
      without dedicated hardware, with American Express added as a scheme in late 2024. The newest
      module—Mollie MCP Server, launched 2025—provides an AI-agent-ready API layer enabling LLM agents
      to trigger and manage payment flows, positioning Mollie at the frontier of AI-native commerce
      infrastructure. Together these modules create a layered product strategy that deepens merchant
      relationships beyond commodity transaction processing and supports multi-product cross-sell economics.
