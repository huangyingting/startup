  evidenceGaps:
    - topic: Technical dependency map completeness
      type: missing-data
      severity: minor
      missingEvidence: >-
        Mollie does not publicly disclose the specific cloud provider(s) underlying its EU-hosted
        infrastructure, nor the detailed SLA or uptime commitments for its card-network and
        national-scheme dependencies. Incident history on status.mollie.com provides partial
        reliability data but does not quantify dependency-driven outage frequency or scheme-level
        SLA terms.
      whyItMatters: >-
        Understanding the specific cloud infrastructure provider and contractual SLA terms with card
        networks and national scheme operators is necessary to fully assess platform resilience and
        single-provider concentration risk. Without this, the critical dependency map remains
        qualitatively described rather than quantitatively risk-weighted.
      diligencePath: >-
        Request technical due diligence disclosure of cloud provider, infrastructure architecture,
        and SLA documentation for card network and national scheme integrations. Review status page
        historical data and incident post-mortems. Confirm whether any diversity or redundancy
        mechanisms exist across cloud regions or scheme connections.
      relatedTableRefs:
        - TE003
      relatedQuestionRefs:
        - QE013
    - topic: Competitive product differentiation depth
      type: missing-source
      severity: minor
      missingEvidence: >-
        Independent third-party benchmark comparisons of Mollie versus Adyen and Stripe on specific
        product dimensions (checkout conversion rates, API latency, error rates, feature parity) are
        not publicly available. The product maturity matrix relies on observable product breadth
        rather than independently measured performance metrics.
      whyItMatters: >-
        Quantified product performance benchmarks would allow investors to assess whether Mollie's
        developer-first positioning translates into measurable conversion or cost advantages for
        merchants, or whether it is primarily a positioning claim. Without benchmarks, competitive
        differentiation analysis is qualitative.
      diligencePath: >-
        Commission or source independent payment processing benchmark studies covering checkout
        conversion rates, API reliability, and merchant total cost of ownership across Mollie, Adyen,
        and Stripe. Review G2 and Trustpilot comparative reviews for merchant-level performance
        signals. Request internal conversion analytics from Mollie management.
      relatedTableRefs:
        - TE001
      relatedQuestionRefs:
        - QE019
        - QE024
    - topic: Developer documentation quality metrics
      type: missing-data
      severity: minor
      missingEvidence: >-
        Quantitative metrics for Mollie's developer documentation—such as Stack Overflow answer
        rates, documentation satisfaction scores, time-to-first-successful-integration, or
        developer NPS—are not publicly available. GitHub stars and npm downloads provide proxy
        signals for adoption but not documentation quality.
      whyItMatters: >-
        Documentation quality is a primary driver of self-serve integration success for SMB
        merchants who do not receive dedicated technical account management. Poor documentation
        increases support costs and reduces conversion from trial to active merchant. Without
        quality metrics, the documentation assessment is based on qualitative review only.
      diligencePath: >-
        Review Mollie developer documentation directly at docs.mollie.com for depth, accuracy,
        and coverage. Analyze Stack Overflow response rates for the mollie tag. Request developer
        NPS or CSAT data from Mollie's developer relations team. Review GitHub issues on official
        SDK repositories for documentation gap signals.
      relatedTableRefs:
        - TE002
      relatedQuestionRefs:
        - QE025
