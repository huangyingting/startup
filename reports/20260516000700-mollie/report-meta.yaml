companyProfile:
  summary: >-
    Mollie is a Dutch payment service provider and e-money institution (EMI) founded in 2004 and
    headquartered near Amsterdam. It operates a unified payments API used by 250,000+ European SME
    and mid-market merchants to accept card payments, local European methods (iDEAL, Bancontact,
    SOFORT, Klarna), and bank transfers. Mollie raised €665M at a €5.4B valuation in June 2021
    and reached its first positive EBITDA in 2024 on €214M revenue (+28% YoY). In December 2025
    it acquired UK open-banking leader GoCardless for approximately £1.6B, adding direct debit
    and open-banking payment initiation to its product portfolio.
  foundedDate: '2004-01-01'
  founders:
    - name: Adriaan Mol
      role: Founder
      background: Serial Dutch entrepreneur; founded Mollie as a payment gateway for Dutch developers.
      claimRefs: [CO003]
  foundingLocation: Amsterdam, Netherlands
  headquarters: Amsterdam, Netherlands
  productSummary: >-
    Mollie provides a developer-friendly payments API covering Visa/Mastercard card acquiring,
    local European payment methods (iDEAL, Bancontact, SOFORT, EPS, Klarna BNPL), SEPA bank
    transfers, and post-GoCardless acquisition, direct debit and open-banking payment initiation
    via Variable Recurring Payments (VRPs). Merchant clients integrate via REST API, hosted
    checkout, or a wide ecosystem of platform plugins (WooCommerce, Shopify, Magento, PrestaShop).
  customerFocus: >-
    SME and mid-market e-commerce and subscription merchants primarily in the Netherlands, Belgium,
    Germany, UK, and France; expanding into Scandinavia and Southern Europe.
  businessModel: >-
    Transaction-fee revenue: percentage + fixed fee per completed payment; volume discounts for
    larger merchants. Platform subscriptions for advanced features. No interchange revenue —
    Mollie acts as acquirer and e-money issuer earning the spread.
  stage: late-stage private
  fundingStatus: >-
    Series C: €665M at €5.4B post-money valuation, June 2021 (Blackstone Growth, BlackRock,
    EQT); no public primary round since 2021. GoCardless acquired December 2025 for ~£1.6B,
    funded from existing balance sheet and debt facilities.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008, CO009, CO010, CI001, CI002, CI003, CI005, CV001, CV002]
summary:
  headline: >-
    Mollie is a profitable, fast-growing European payments platform with a credible SME leadership
    position, but its €5.4B Series C mark faces post-2021 multiple compression and a meaningful
    GoCardless integration execution risk.
