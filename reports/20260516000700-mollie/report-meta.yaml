  topStrengths:
    - First positive EBITDA in 2024 on €214M revenue (+28% YoY) confirms the unit economics inflection
      and reduces the financing risk inherent in the Series C vintage.
    - 250,000+ merchant base with documented low churn and strong NPS in core Benelux and DACH markets
      provides durable recurring payment volume.
    - GoCardless acquisition adds open-banking direct debit infrastructure to Mollie's card/local-methods
      stack, positioning the combined entity as a rare full-spectrum European payments platform.
    - "Regulatory moat: EMI licence from DNB and FCA authorisation create high switching costs for
      merchants and material barriers to new entrants."
  topRisks:
    - Post-acquisition consolidated financials are not yet public; GoCardless EBITDA drag and synergy
      timeline remain unconfirmed, leaving true combined economics opaque.
    - Series C was priced at €5.4B in the 2021 bull market; comparable private-round write-downs
      (Checkout.com ~-65%, GoCardless itself -25%) suggest current fair-value is materially lower,
      creating re-mark risk for existing investors.
    - Integration execution risk is high — GoCardless is UK-headquartered, uses different payment
      rails, and targets different customer segments, requiring substantial technology and go-to-market
      alignment.
    - "Regulatory cost stack is rising: DORA (effective Jan 2025), PSD3 (expected 2026), and dual FCA/DNB compliance post-Brexit each require dedicated spend that pressures near-term margins."
  unresolvedGaps:
    - Audited consolidated 2025 accounts including GoCardless post-acquisition integration have not
      been filed or made public as of the report date.
    - Merchant cohort-level churn rate and LTV/CAC ratios are not publicly disclosed; base-case
      retention assumptions are inferred from NPS data and qualitative management commentary.
    - Revenue breakdown by geography and payment method remains undisclosed, making concentration
      risk assessment approximate rather than precise.
    - GoCardless's UK FCA authorisation review post-Mollie-acquisition and its impact on UK product
      continuity remain outstanding regulatory items.
