  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: audited-accounts
      missingEvidence: >-
        Audited FY2024 consolidated statutory accounts for Mollie BV (and the combined group post-GoCardless
        acquisition) are not publicly available; net income, free cash flow, balance sheet, and regulatory
        capital adequacy cannot be assessed without them.
      whyItMatters: >-
        Capital adequacy under the combined DNB/FCA regulatory regime and the sustainability of the GoCardless
        acquisition financing cannot be judged without audited statements; this is a blocking gap for full
        investment underwriting.
      diligencePath: >-
        Request audited accounts directly from management via a formal data room process; also check KvK
        statutory filing timeline and Companies House annual return for GoCardless Ltd.
      relatedQuestionRefs:
        - QV030
      relatedTableRefs:
        - TV006
    - type: missing-source
      severity: material
      topic: churn
      missingEvidence: >-
        Merchant churn rate, cohort LTV curves, and net revenue retention metrics for both the Mollie and
        GoCardless legacy merchant books are not publicly disclosed in any source reviewed.
      whyItMatters: >-
        Without retention data, the quality of the 250,000+ merchant revenue base cannot be underwritten;
        high churn would materially reduce the NPV of the merchant book and impair the base-case revenue
        trajectory.
      diligencePath: >-
        Request merchant cohort analysis and churn data from management; benchmark against disclosed retention
        metrics from Adyen (>98% NRR) and Stripe (reportedly >100% NRR) to calibrate expectations.
      relatedQuestionRefs:
        - QV031
      relatedTableRefs:
        - TV006
    - type: private-evidence-only
      severity: material
      topic: ebitda
      missingEvidence: >-
        While Mollie has announced positive EBITDA for FY2024, the EBITDA amount, EBITDA margin, and the
