company:
  name: Mollie
chapter:
  number: 8
  title: Valuation and Investment Recommendation
  summary: >-
    Mollie entered 2026 as a profitable, high-growth European payments platform: €214M revenue (+28% YoY),
    €115M gross profit, first-ever positive EBITDA in FY2024, and 250,000+ active merchants — all achieved
    without a new equity round since the €5.4B Series C in June 2021. The December 2025 GoCardless acquisition
    at ~£1.6B materially expands the open-banking and bank-transfer opportunity but introduces integration
    execution risk and capital deployment uncertainty. Applying a comparable-company analysis against Adyen,
    Stripe, Checkout.com, and Nuvei, and discounting for private-company illiquidity and integration risk,
    we estimate a base-case fair value of €4.0–5.0B, a bear case of €2.5–3.0B, and a bull case of €7.0–9.0B.
    Our recommendation is a conditional buy with active monitoring of integration execution, post-acquisition
    EBITDA trajectory, and regulatory capital adequacy.
sections:
  - id: section-1
    title: Investment Thesis and Recommendation
    body: >-
      Mollie's investment thesis rests on four interlocking propositions: (1) it is the leading SME-focused
      payments platform in Europe by merchant count, with a 35+ payment-method breadth that creates switching
      costs and network effects; (2) it achieved operational profitability — positive EBITDA — in FY2024 for
      the first time, demonstrating that the unit-economic model works at scale; (3) the GoCardless acquisition
      provides a credible path to open-banking and bank-transfer dominance across the UK and continental Europe
      as PSD3 expands open-banking mandates; and (4) fintech valuation multiples, while compressed from 2021
      peaks, have stabilised, creating a more rational entry-point environment for late-stage investors.

      Against these positives, the bear case is real. The €5.4B Series C valuation set at peak-2021 fintech
      euphoria implies that even a fully successful exit may generate only modest IRR for 2021-vintage investors
      unless revenue re-accelerates materially. GoCardless integration risk is the single largest near-term
      execution overhang: the acquisition cost of ~£1.6B (~€1.85B) is more than 16x Mollie's 2024 gross profit,
      an ambitious multiple demanding disciplined synergy realisation. Adyen's sustained expansion into the SME
      segment and Stripe's accelerating European push constrain the competitive moat. Our base case assigns a
      fair value of €4.0–5.0B (7–8x estimated 2026 NTM revenue of ~€260M), with a recommendation to acquire
      at valuations below €4.0B and monitor quarterly against the kill triggers defined in Section 5.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV008
    tableRefs:
      - TV001
      - TV002
    figureRefs:
      - FV001
  - id: section-2
    title: Comparable Company Analysis
    body: >-
      The most relevant listed peer for Mollie is Adyen N.V. (AMS: ADYEN), the only large-cap European pure-play
      payments company. Adyen trades at approximately 18x NTM revenue on FY2025 consensus estimates of ~€2.0B
      revenue and a market cap of ~€36B as of Q1 2026. This multiple reflects Adyen's superior EBITDA margin
      (~47%), global enterprise client base, and direct acquiring scale — attributes that justify a structural
      premium over Mollie. Applying Adyen's multiple to Mollie mechanically yields an implausible €4.7B+ at 18x
      2026 NTM revenue of €260M; in practice, a 50–65% discount is warranted for private-company illiquidity,
      smaller scale, higher SME client concentration, and integration execution risk, producing a
      comparable-derived range of €1.6–2.4B on a pure discount basis or €3.5–5.0B blending discount and synergy
      value.

      Among private peers, Stripe's $65B→$95B secondary valuation trajectory and Checkout.com's ~$40B→$10–12B
      write-down cycle bracket the range of outcomes for late-stage fintech unicorns. Checkout.com's
      de-rating — from a peak $40B down to an estimated $10–12B by 2024 on reported write-downs by its investors
      — is the most relevant cautionary comparable: a company with comparable European payments exposure that
      raised at euphoric multiples, missed growth targets, and saw investors mark down their positions by
      75–80%. Nuvei, taken private at $6.3B in November 2023 at ~5–7x NTM revenue, provides a live
      market-clearing precedent for a profitable European payments business in a normalised rate environment.
      SumUp, last valued at €8B in 2022, has not repriced publicly but faces similar SME-focused competitive
      dynamics. A blended peer median of ~7–9x NTM revenue for a profitable, growing European payments platform
      justifies our €4.0–5.0B base case.
    claimRefs:
      - CV009
