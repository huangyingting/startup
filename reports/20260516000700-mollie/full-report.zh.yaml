  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与建议
        blocks:
          - type: paragraph
            body: >-
              Mollie 的投资逻辑建立在四个相互咬合的命题上：（1）按商户数衡量，它是欧洲领先的 SME 支付平台，提供 35+ 种支付方式，形成切换成本和网络效应；（2）FY2024 首次实现运营盈利——EBITDA
              转正，证明单位经济模型在规模化后跑得通；（3）GoCardless 收购为其在 UK 和欧洲大陆建立开放银行与银行转账主导地位提供可信路径，尤其是在 PSD3 扩大开放银行要求之后；（4）金融科技估值倍数虽较
              2021 高点压缩，但已趋于稳定，为后期投资者创造了更理性的入场环境。

              但反向逻辑同样真实。2021 金融科技情绪高点定下的 €5.4B Series C 估值意味着，即便完全成功退出，除非收入显著重新加速，2021 年批次投资者可能也只能获得温和 IRR。GoCardless
              集成风险是近期最大的执行悬顶：~£1.6B（~€1.85B）收购成本超过 Mollie 2024 毛利的 16x，是一个雄心很高的倍数，要求严格兑现协同。Adyen 持续扩张 SME 细分、Stripe
              加速欧洲推进，都约束了竞争护城河。我们的基准情景给出 €4.0–5.0B 公允价值（按估计 2026 NTM 收入 ~€260M 的 7–8x），建议在低于 €4.0B 的估值买入，并按第 5
              节定义的否决触发器逐季监控。
