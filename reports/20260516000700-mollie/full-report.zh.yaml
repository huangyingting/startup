      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Mollie 的运营风险主要来自对第三方支付基础设施和云服务的依赖。Visa 和 Mastercard 轨道上的卡支付占交易量最大份额；任何轨道中断或访问限制，都会立即传导到平台上的所有商户。SEPA 和
              SWIFT 依赖同样让 Mollie 暴露在其无法控制的结算延迟或系统性中断之下。公司运行在 AWS 云基础设施上，形成单一云供应商集中风险：AWS 区域故障可能导致平台级宕机，同时影响全部 250,000+
              商户，引发商户流失、合同风险和声誉损害。

              地域集中会放大运营波动：荷兰约占 Mollie 估计收入的 40-50%，Benelux 和德国合计超过
              75%。荷兰电商活动若显著下滑，或该市场发生监管事件，会对业务造成不成比例的冲击。任何支付处理商都面临较高网络安全风险：Mollie 持有的持卡人数据是攻击者的高价值目标，PCI DSS
              合规只是最低标准，不是上限。数据泄露可能触发监管罚款、PCI DSS 整改成本和商户出走。欺诈和拒付风险是持续运营成本，但 Mollie 尚未公开披露其规模；缺少公开损失率数据，使该风险难以与同业对标。DORA
              的事件报告要求意味着未来运营故障会对监管方更透明，任何宕机事件的声誉赌注都会提高。
