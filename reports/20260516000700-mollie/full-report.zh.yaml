      - number: '6.2'
        title: 采用轨迹与生态分发
        blocks:
          - type: paragraph
            body: >-
              Mollie 的商户基础从 2020 年估计 100,000 家，增长到 2024 年底超过 250,000 家，对应期内复合年增长率约 25%。2020–2021 年 COVID-19
              推动电商采用，最初加快了增长；实体零售转向线上渠道，Mollie 的自助式数字入驻模式直接受益。2022–2023 年，欧洲金融科技板块整体遭遇估值压缩和利率上行，增长放缓；到 2024
              年，随着五个新地域市场上线，增长重新提速。GoCardless 收购于 December 2025 宣布，整合后预计将约 75,000 家 GoCardless 商户并入 Mollie
              的合并客户池，使总可触达客户规模出现阶跃式提升。

              自然商户获客主要靠插件和集成生态，而不是直销。仅 WooCommerce 插件就在 WordPress 插件目录报告 100,000 个或以上活跃安装量，是欧洲 WooCommerce 商户采用最广的 PSP
              集成之一。这个单一渠道构成结构性护城河：每个安装该插件的 WooCommerce 商户，若要换成竞争 PSP 插件，都要重新测试结账流程并重配支付方式设置，切换成本并不低。Shopify App Store
              覆盖和 Magento 扩展可用性，把这种分发杠杆延伸到欧洲三大主流 SMB 电商平台。

              欧洲电商行业每年 10–15% 的增长，为 Mollie 现有商户基础提供自然交易量顺风：即使不新增商户，活跃商户交易量上升也会直接转化为更高支付处理费。Shopify 博客对欧洲支付网关的报道将 Mollie
              列为欧洲市场商户的领先选择，提高了其在高增长 Shopify 商户群中的品牌能见度。TechRadar 和 Wired 对 SMB 金融科技工具的报道，也支撑了 Mollie
              在欧洲技术导向型企业经营者中的品牌认知。来自 MediaMarkt 的企业账户验证支撑了潜在上探策略，说明 Mollie 的产品并不只局限于 SMB 层级。
