      - number: '1.2'
        title: 领导层、治理与关键人物评估
        blocks:
          - type: paragraph
            body: >-
              Mollie 由 CEO Koen Köppen 掌舵；公司在 2025 年 6 月发布 2024 年业绩时确认了这一任命。Köppen 接替 Shane Happach，后者在 2021 年 6 月
              Series C 融资时加入并担任 CEO，约在 2023 年初前后离任。金融科技媒体当时以负面口径报道这次更替，使其成为公司近年历史中一项重要关键人物事件。截至 2024 年业绩公告，Köppen 对
              Mollie 的增长轨迹和产品路线图表示信心；在 GoCardless 收购公告和 Wero 合作中，他也一直是公司公开代表。

              董事会构成和治理细节没有完整公开。Mollie 是私有公司，不发布完整董事会名单或股权结构表。很可能拥有治理权的投资方包括 Blackstone Growth、EQT Growth、General
              Atlantic、HMI Capital、Alkeon Capital 和 TCV（2020 年 9 月领投上一轮 Series B）。创始人 Adriaan Mol
              持有未披露股权；公开材料没有说明他当前的运营角色，2021 年之后也没有公开确认他拥有董事席位或高管职务。

              鉴于 2021–2023 年领导层更替史，关键人物风险集中在 CEO 层面。现任 CEO
              是公司推进重大收购和整合过程中的公共面孔。成熟机构投资者大概率持有董事席位、且投入资本规模大，这部分缓解了治理风险。但缺少公开财务报表、经审计年报和披露的股权结构，仅靠公开证据无法充分评估治理监督。
