    title: 估值 / 回报区间
    type: range
    layout: wide
    description: Mollie 企业价值（€B）的乐观、基准和悲观情景估值区间
    claimRefs:
      - CV018
      - CV020
      - CV022
      - CV024
      - CV025
    data:
      items:
        - label: 悲观情景
          low: 2.5
          mid: 2.75
          high: 3
          displayValue: €2.5–3.0B
          detail: 整合失败、竞争侵蚀；4–5x NTM 收入；0–5% IRR
          tone: negative
        - label: 基准情景
          low: 4
          mid: 4.5
          high: 5
          displayValue: €4.0–5.0B
          detail: 按计划执行、战略收购；7–9x NTM 收入；12–18% IRR
          tone: neutral
        - label: 乐观情景
          low: 7
          mid: 8
          high: 9
          displayValue: €7.0–9.0B
          detail: 开放银行占优、Euronext IPO；12–15x NTM 收入；25–35% IRR
          tone: positive
        - label: 概率加权 EV
          low: 3.9
          mid: 4.4
          high: 4.9
          displayValue: ~€4.4B
          detail: 25% 乐观 + 50% 基准 + 25% 悲观；支持在 ≤€4.0B 入场时有条件买入
          tone: neutral
