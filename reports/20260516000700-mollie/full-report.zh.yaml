      - number: '8.3'
        title: 情景分析与回报框架
        blocks:
          - type: paragraph
            body: >-
              我们建模三个估值情景，锚定三条收入轨迹和两种退出路径假设：在 Euronext Amsterdam IPO，或由战略 / 财务买方收购。乐观情景（概率 25%）下，随着 PSD3 生效，Mollie 借助
              GoCardless 建立泛欧洲开放银行主导地位；收入到 2028 年达到 €600M+，毛利率扩张至 60%+，支撑以 12–15x NTM 收入 IPO，对应企业价值 €7–9B。以约 €2.5B 的隐含
              Series C 基础（估计当前二级公允价值基础）计算，投资者在 3–4 年周期内年化 IRR 可达 25–35%。

              基准情景（概率 50%）下，整合按计划执行并产生温和协同；收入到 2028 年达到 €400–450M；合并实体以 €4–5B 被战略买方或 PE 收购，对应投资者 IRR 12–18%。悲观情景（概率
              25%）下，GoCardless 集成消耗管理层注意力；Adyen 和 Stripe 侵蚀 SME 核心；收入停滞在 €250–300M；IPO 推迟到 2029+；估值压缩至 €2.5–3.0B，Series
              C 基础投资者获得接近持平或负实际回报。三个情景的概率加权期望值约为 €4.4B，与我们的基准公允价值区间大体一致，并支持在入场估值不高于 €4.0B 时的有条件买入逻辑。
            claimRefs:
