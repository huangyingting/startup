      - CV042
    data:
      items:
        - label: Mollie 悲观情景（4x NTM €260M）
          value: 1
          detail: 困境情景；整合失败倍数
          tone: negative
        - label: Mollie 悲观-中位情景（5x NTM）
          value: 1.3
          detail: GoCardless 减记可比
          tone: negative
        - label: Mollie 基准情景（7x NTM）
          value: 1.8
