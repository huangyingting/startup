  - id: FE001
    title: 产品架构图
    type: stack
    layout: wide
    summary: Mollie 的技术架构由五层组成，从面向商户的触点向下延伸到银行轨道和支付方案基础设施。每一层都依赖下一层，合规和安全层横贯所有层。银行和支付方案轨道层是主要外部依赖，也是系统性风险最集中的地方。
    data:
      items:
        - id: layer1
          label: 商户触点层
          detail: Mollie Dashboard（分析、退款、报表）、Mollie Checkout（托管支付页）、Mollie POS app（iPhone tap-to-pay）和 API 控制台（开发者测试与管理）
          tone: neutral
        - id: layer2
          label: 集成层
          detail: >-
            REST API（OpenAPI 3.0）、7 个官方 SDK（PHP、Node.js、Python、Ruby、Java、.NET、Go）、100+ 个电商插件（WooCommerce 100k+
            安装量、Shopify、Magento、PrestaShop），以及面向 LLM 智能体集成的 Mollie MCP Server
          tone: positive
        - id: layer3
          label: 支付编排层
          detail: 支付路由和方式抽象引擎、授权处理、欺诈评分、webhook 事件引擎、Connect 拆分支付路由和 Capital 放款模块
          tone: neutral
        - id: layer4
          label: 银行和支付方案轨道层
          detail: >-
            卡网络（Visa、Mastercard、Amex）、国家级方案（通过 Currence 的 iDEAL、通过 Worldline/Payconiq 的 Bancontact）、SEPA 网关（ECB
            治理）和开放银行层（收购 GoCardless 后，2026 年中）
          tone: warning
        - id: layer5
          label: 合规和安全层
          detail: PCI-DSS Level 1 认证环境、3DS2 强客户认证、ISO 27001 信息安全管理、GDPR 欧盟数据驻留，以及 DNB/FCA 监管边界
          tone: positive
    claimRefs:
      - CE001
      - CE002
      - CE010
      - CE011
      - CE016
      - CE018
      - CE025
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: wide
    summary: Mollie 支付生命周期从买家选择结账方式开始，到商户收到银行账户结算结束。Mollie 编排授权、认证、实时通知和结算，商户无需为每种支付方式单独连接 PSP。第四步的 webhook 通知是商户订单管理系统的关键集成触点。
    data:
      nodes:
        - id: n1
          label: 买家发起结账
          detail: 买家在商户结账页选择支付方式（iDEAL、银行卡、Apple Pay 等）；Mollie Checkout 渲染托管或嵌入式支付表单
          tone: neutral
        - id: n2
          label: Mollie 执行欺诈评分和支付方式路由
          detail: Mollie 给交易评分，在适用场景应用 SCA 豁免逻辑，并路由到正确支付方案（卡网络、iDEAL、SEPA 等）
          tone: neutral
        - id: n3
          label: 授权与 3DS2 认证
          detail: 支付方案处理授权；欧盟超过 30 EUR 的银行卡交易适用 3DS2 强客户认证；支付方案返回批准或拒绝
          tone: neutral
        - id: n4
          label: Mollie Webhook 触发给商户
          detail: Mollie 收到授权结果，并向商户系统触发实时 webhook；支付状态（paid、failed、pending）立即送达
          tone: positive
        - id: n5
          label: 商户履约并收到结算
          detail: 商户订单管理系统处理 webhook 确认并履约；Mollie 按标准结算排期批量结算到商户银行账户
          tone: positive
    claimRefs:
      - CE001
      - CE012
      - CE017
      - CE019
  - id: FE003
    title: 关键依赖地图
    type: dag
    layout: wide
    summary: >-
      Mollie 平台交付依赖六个相互连接的节点：核心 Mollie SaaS 平台、卡网络授权基础设施、支持欧洲本地方式的国家级支付方案运营方、DNB 和 FCA
      监管牌照、欧盟云托管基础设施，以及商户集成层。卡网络和国家级方案依赖属于 Mollie 无法直接控制的外部系统性风险，带来转嫁定价和可用性暴露。
    data:
      nodes:
        - id: n1
          label: Mollie 平台（核心 SaaS）
          detail: 托管在欧盟数据中心的核心支付处理 SaaS；编排全部支付流、路由、欺诈评分、webhook 交付和结算
          tone: neutral
        - id: n2
          label: 卡网络（Visa / Mastercard / Amex）
          detail: 所有银行卡交易的授权和结算基础设施；方案费是外部成本驱动；可用性不受 Mollie 控制
          tone: warning
        - id: n3
          label: 国家级支付方案运营方（iDEAL / Bancontact / SEPA）
          detail: iDEAL 由 Currence 运营（荷兰），Bancontact 由 Worldline/Payconiq 运营（比利时），SEPA 由 ECB 治理；本地方式可用性取决于方案运营方正常运行
          tone: warning
        - id: n4
          label: DNB 和 FCA 监管牌照
          detail: 荷兰 DNB 支付机构牌照和英国 FCA EMI 授权使合法支付运营成为可能；牌照丧失或暂停将使相应市场运营停摆
          tone: neutral
        - id: n5
          label: 欧盟云基础设施
          detail: 云原生计算和数据存储托管在欧盟数据中心，荷兰为主要区域；平台可用性依赖云提供商
          tone: neutral
        - id: n6
          label: 商户集成层
          detail: WooCommerce、Shopify、Magento、PrestaShop 插件和直接 API 集成；100+ 平台合作伙伴；商户侧可用性和插件兼容性是外部变量
          tone: neutral
      edges:
        - from: n1
          to: n2
          label: 路由银行卡交易至
        - from: n1
          to: n3
          label: 经其处理本地付款
        - from: n1
          to: n4
          label: 在其牌照下运营
        - from: n1
          to: n5
          label: 托管于
        - from: n6
          to: n1
          label: 调用其 API
    claimRefs:
      - CE018
      - CE025
      - CE032
      - CE010
      - CE016
