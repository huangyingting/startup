      - number: '8.5'
        title: 投资逻辑破裂触发器与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              我们识别出五个投资逻辑破裂触发器——一旦出现，就需要把基准情景建议下调为持有或退出。第一，如果 GoCardless 收购交割后十二个月内，任一存量网络的合并商户流失率超过
              15%，整合创造价值的速度就赶不上价值流失。第二，如果 FY2025 或 FY2026 任一年收入增长（合并口径）降至 15% 以下，说明竞争动态已经转向不利于 Mollie。第三，任何 DNB 或 FCA
              监管行动若对 Mollie 或 GoCardless 的经营牌照附加条件，都会威胁核心业务模型。第四，如果 FY2025 因整合成本超过我们估计而导致 EBITDA 转负，盈利里程碑将被逆转。第五，如果
              GoCardless 的 FCA 支付机构授权因其开放银行模型遭遇重大限制或执法行动，乐观情景中的开放银行逻辑即告失效。

              投资承诺前的最终尽调要求包括：（1）经审计的 2024 合并账目，并纳入收购后 GoCardless 过渡期；（2）Mollie 和 GoCardless 存量账本的商户流失率和队列 LTV
              数据；（3）带时间表和置信区间的详细协同计划；（4）DORA 以及合并集团 FCA/DNB 要求下的监管资本充足率分析；（5）GoCardless FCA
              状态，包括任何正在进行的监管往来；（6）合并实体按地域和支付方式拆分的收入；以及（7）整合技术路线图和统一平台交付时间表。
            claimRefs:
