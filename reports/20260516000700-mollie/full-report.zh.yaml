        - 升级 PMI；考虑部分产品回滚；重新评估收购价值
      - - DNB 监管行动（EMI 牌照）
        - DNB 监管函件；公开执法登记
        - 监管方对 EMI 牌照附加任何条件，或发出正式警告
        - 立即升级合规事项；启动法律保全；可能限制运营
      - - DORA 合规失败
        - ICT 风险框架审计结果；重大事件报告提交情况
        - 审计发现重大 ICT 控制缺口，或 12 个月内发生 ≥3 起重大事件
        - 紧急投入 ICT；启动 DORA 整改项目
      - - 地域收入集中
        - 荷兰收入占集团总收入比例
        - 荷兰连续两个季度收入占比超过 60%
        - 加速地域扩张投入；推动定价 / 产品多元化
      - - CEO 离任
        - CEO 意外离任公告
        - CEO 离任后 30 天内未指定永久继任者
        - 立即启动董事会继任流程；需要与投资人沟通
      - - 收购后财务可持续性
        - 集团 EBITDA 走势；现金状况；整合成本超支
        - 交割后集团 EBITDA 连续 3 个季度为负
        - 重新评估收购协同假设；可能启动剥离审查
    notes: 否决标准代表会打破投资逻辑的事件，需要投资人升级处理或刷新尽调；触发项是监测指标，不是合同约束。
