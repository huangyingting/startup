  - id: FP003
    title: 护城河 / 准备度 KPI
    type: kpi
    layout: wide
    summary: >-
      Mollie 的关键竞争准备度指标显示，本地市场覆盖与 SMB 定位强。收购 GoCardless 将显著拓宽能力。核心护城河风险在于：Adyen 和 Stripe
