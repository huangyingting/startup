  - id: TR005
    title: 缓释措施与否决标准表
    columns:
      - 风险
      - 可监测触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - GoCardless 整合失败
        - 合并后商户流失率；统一技术栈交付日期
