      - number: '7.4'
        title: 人员、执行与财务风险
        blocks:
          - type: paragraph
            body: >-
              Mollie 的关键人风险集中在 CEO 层面。Koen Köppen 在 June 2025 的 2024 财务结果新闻稿中被确认担任 CEO，接替 early 2023 离任的 Shane
              Happach。上一任 CEO 交接曾被金融科技媒体报道为反向事件，构成重要历史关键人插曲。GoCardless CEO Hiroki Takeuchi
              在收购交割后合并实体中的角色尚未公开定义；合并实体领导架构未解，可能释放文化或治理摩擦信号。Blackstone、EQT、General Atlantic 和 TCV 等机构投资者提供治理监督，部分缓解了 CEO
              集中风险。

              财务风险画像由收购成本与毛利之间的缺口定义。Mollie 2024 毛利为 €115M；GoCardless 收购价约
              £1.6B（~€1.85B），按当前利润率、在协同效应前，意味着以十年以上计的毛利回本周期。June 2021 金融科技牛市顶点给出的 €5.4B Series C
              估值，至今未公开更新；当前二级市场或公允价值标记未知。公开披露缺少经审计法定账目、净利润和现金头寸，使交割后资本充足性难以评估。鉴于 GoCardless 的收入基础主要以英镑计价，EUR/GBP
              汇率敞口具有实质性。2024 年欧洲电商增长较疫情高峰放缓，削弱了曾支撑 Mollie 28% 收入增长的宏观顺风，也为重新加速提供了不那么有利的背景。
