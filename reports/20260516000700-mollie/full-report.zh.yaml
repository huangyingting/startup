      - number: '4.2'
        title: 单位经济性与利润率画像
        blocks:
          - type: paragraph
            body: >-
              Mollie 2024 年公开财务披露，比以往任何年份都更清楚地呈现单位经济性。净收入达到 €214M，较 2023 年隐含 €167M 同比增长 28%；2023 年又较 2022 年增长 36%。毛利润为
              €115M，对应约 54% 毛利率，同比增长 30%。这些数字由 Mollie newsroom 披露，并得到独立金融科技报道印证。约 54% 的毛利率略低于 Adyen 57–60% 区间；差距来自
              Mollie 更集中于 iDEAL、SEPA 等低利润率本地支付方式，而 Adyen 的组合更偏企业卡。

              毛利率从 2022 年估计约 50% 扩至 2024 年 54%，背后是有利的收入结构迁移：卡和 Connect 收入利润率高于固定费用的 iDEAL、SEPA 交易，且增长更快。收入成本的主要项目是支付给
              Visa、Mastercard 和本地网络的交换费与卡组织费用；Mollie 的混合定价会部分但不完全传导给商户。2024 年 EBITDA 里程碑——2018
              年以来首次转正——说明固定运营开支（技术、人员、合规）首次降到毛利润以下。EBITDA 金额没有公开披露。按约 850 名员工计算，隐含人均收入约
              €252,000，对这一阶段的支付平台而言处于合理水平。净利润和自由现金流仍未披露，构成 EBITDA 以下最重要的财务尽调缺口。
