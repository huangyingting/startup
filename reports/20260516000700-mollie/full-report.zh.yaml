      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Mollie 最重要的一次融资，是 2021 年 6 月 17 日宣布的 Series C：€665M（US$800M），由 Blackstone Growth（BXG）管理的基金领投，EQT
              Growth、General Atlantic、HMI Capital、Alkeon Capital 和 TCV 跟投（TCV 曾在 2020 年 9 月领投上一轮 Series B）。交易完成时，本轮给予
              Mollie US$6.5B / 约 €5.4B 估值；按公司新闻稿引用的 CBInsights 数据，Mollie 当时跻身欧洲估值最高的五家私有金融科技公司。Series C 公告时累计融资超过
              US$940M / €780M；此后没有公开宣布后续融资轮或二级交易，当前累计融资估计约 €850M，包含此前所有轮次。

              Series C 时，Mollie 约有 480 名员工、120,000 家月活商户，2020 年处理交易额超过 10B 欧元，2021 年目标超过 20B
              欧元。公告披露的资金用途是国际扩张、团队扩张，以及产品和工程投入。随后进入西班牙、挪威、丹麦、芬兰、匈牙利、斯洛文尼亚、瑞典、波兰、葡萄牙和意大利，证明这笔资本已实质用于进入新市场。公司自 2021 年
              Series C 以来没有公开宣布 Series D 或新的外部融资，不过不能排除私下交易或债务融资额度。

              GoCardless 待完成收购于 2025 年 12 月 11 日宣布，预计 2026 年中在监管批准后交割。GoCardless 交易的财务条款没有公开披露。交割后，合并实体将服务欧洲 350,000+
              家企业，商户数量提升明显。2026 年 1 月 8 日宣布的 EPI/Wero Principal Membership 需要持续投入和整合，但不是单独融资轮。
