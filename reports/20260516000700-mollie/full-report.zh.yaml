      - number: '2.3'
        title: 买方与客群分层图
        blocks:
          - type: paragraph
            body: >-
              Mollie 的买方范围围绕商户规模和商业模式展开，不同分层的采用路径和产品需求差异明显。核心锚点客群是中小企业电商商户：使用
              WooCommerce、Shopify、Magento、PrestaShop、Lightspeed 或 Shopware 等平台的企业，需要即插即用的支付集成、本地支付方式覆盖和开发者友好的
              API，同时不想承担最低月度承诺。这些商户价格敏感，看重没有锁定合同和月费。预算由创始人或运营负责人掌握，而不是专职支付团队。


              第二个增长客群是 SaaS 和软件平台，它们借助 Mollie Connect for Platforms 把支付嵌入自有产品。决策者通常是希望在平台内嵌入支付促成能力的 SaaS 创始人或
              CTO。经济性较好，因为一次 SaaS 集成可以把支付能力分发给许多下游商户，在有限增量销售成本下撬动高交易量。


              市场运营方构成第三类客群，需要分账、资金留存和卖家入驻。特许经营网络是第四个垂直领域，需要集中化支付监督，同时按门店结算。快速增长的成长型企业形成过渡客群，后续可能升级到按量 IC++ 定价，或流失到
              Adyen、Stripe 等企业级替代方案。Mollie 持有荷兰央行 EMI 许可和 FCA 支付机构许可，因此可在欧洲和英国合法服务这些客群。
