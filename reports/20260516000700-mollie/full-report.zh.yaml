      - 关键假设或缺口
    rows:
      - - 欧洲数字支付 GMV 总量（TAM）
        - €800B–€1T+ 每年（2024）
        - EU+UK 范围内电商和数字支付总支出；参考 Ecommerce Europe 2025 与 Statista payments outlook
        - 低
        - 没有单一权威的全 EU 数字；汇总了消费者电商、卡、银行转账和钱包
      - - 欧洲 SMB 经 PSP 中介的交易量（SAM–上限）
        - €120B–€250B 每年
        - 分析师构建估计：将 15–25% 的 SMB PSP 份额假设套用到数字 GMV 总量；无一手研究
        - 低
        - SMB PSP 份额假设仅为指示性；取决于不同商户层级和国家的采用率
      - - 欧洲线上 SMB 专门 PSP 交易量（SAM–下限）
        - €60B–€120B 每年
        - 更窄口径，聚焦专业 PSP 轨道上交易量低于 €5M 的纯线上 SMB 商户
        - 低
        - 高度不确定；商户交易量分布未公开披露
      - - Mollie 隐含 TPV（SOM–基准情景）
        - ~€20B–€30B 每年
        - 根据 2024 收入 €214M 和假设 0.7–1.0% 综合抽成率推断；Mollie 未披露 TPV
        - 低
        - 综合抽成率是关键未知数；实际费率可能因支付方式组合而有实质差异
      - - Mollie 隐含 TPV（SOM–悲观情景）
        - ~€14B–€20B 每年
        - 采用更高的 1.0–1.5% 抽成率假设，反映更高端的支付方式组合
        - 低
        - 收入和支付方式组合假设若无私有数据，无法验证
    notes: 所有规模估计均由分析师构建。独立分析机构针对欧洲 SMB PSP 细分市场开展的一手数据市场研究， 是本次尽调的重要证据缺口。规模估计只提供数量级方向，不能作为精确市场边界。
