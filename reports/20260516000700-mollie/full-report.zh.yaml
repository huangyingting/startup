  - id: TV001
    title: 投资建议摘要
    description: One-line investment recommendation with key supporting metrics
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV006
    enumerationScope:
      coverage: exhaustive
      basis: Investment recommendation dimensions covering financials, valuation, thesis, and risk as of May 2026
    columns:
      - 维度
      - 评估
      - 证据锚点
    rows:
      - - 投资建议
        - 有条件买入——跟踪整合执行
        - FY2024 首次 EBITDA 转正、收入增长 28%、GoCardless 协同带来可选性
      - - 入场估值目标
        - 企业价值 ≤ €4.0B
        - 以 2026 年收入估计 €260M 计，NTM 收入倍数 7–8x
      - - 基准情景公允价值
        - €4.0–5.0B
        - 同业 NTM 收入中位数 7–9x，因私有资产流动性折价
      - - 乐观情景公允价值
        - €7.0–9.0B
        - 开放银行领先地位，按 12–15x NTM IPO；IRR 25–35%
      - - 悲观情景公允价值
        - €2.5–3.0B
        - 整合失败，Adyen/Stripe 蚕食市场份额
      - - 期望价值（概率加权）
        - ~€4.4B
        - 乐观 / 基准 / 悲观情景权重分别为 25% / 50% / 25%
      - - 关键风险
        - GoCardless 整合执行和资本回本周期
        - 以 >16x 2024 年毛利收购，价格 £1.6B
      - - 时间周期
        - 距流动性事件（IPO 或战略收购）3–4 年
        - 为 2027–2028 年 Euronext Amsterdam IPO 或 PE / 战略买方收购做准备
    notes: 公允价值估计基于截至 2026 年 5 月的可比公司分析和情景建模；不是经审计的财务预测。
  - id: TV002
    title: 投资逻辑与反向逻辑
    description: Bull and bear arguments for the investment case
    claimRefs:
      - CV004
      - CV005
      - CV007
      - CV008
      - CV013
      - CV015
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Exhaustive enumeration of the primary bull and bear arguments based on publicly available evidence as of May
        2026
    columns:
      - 维度
      - 乐观论点
      - 悲观论点
    rows:
      - - 市场地位
        - '荷兰 / Benelux #1 中小企业支付平台；250,000+ 商户；35+ 种支付方式带来切换成本'
        - 地域集中（荷兰约占收入 45%）；Adyen 和 Stripe 在中小企业市场激进扩张
      - - 财务表现
        - 收入 €214M，同比增长 28%；FY2024 首次 EBITDA 转正；毛利率 54% 且仍在提升
        - 净利润和 FCF 未披露；收购 GoCardless 后的合并审计账目尚不可得
      - - GoCardless 收购
        - 英国开放银行领先地位；覆盖泛欧洲银行转账；£1.6B 收购价显示 Mollie 资产负债表有实力
        - £1.6B = >16x 2024 年毛利；整合风险高；GoCardless 2022 年融资估值 £2.1B——收购价约折价 25%
      - - 估值入场点
        - 二级市场估值显示当前价值 €2.0–3.5B；较 Series C 峰值低 50–65%；€4B 以下重新入场更现实
        - 2021 年 Series C 估值 €5.4B 形成压顶；除非恢复超高速增长，2021 年入场投资人的回报会被摊薄
      - - 监管顺风
        - PSD3 要求开放银行扩展；EPI/Wero 成员身份增加下一代支付方式
        - DORA 合规成本上升；PSD3 落地不确定；收购 GoCardless 后承受欧盟 / 英国双重监管
      - - 竞争护城河
        - 开发者优先 API、35+ 种支付方式、250K 商户基础形成网络效应
        - Stripe 和 Adyen 都在欧洲投入开发者体验和本地支付方式覆盖
    notes: 上述论点基于公开证据；经审计财务和 GoCardless 整合数据尚未公开。
  - id: TV003
    title: 乐观 / 基准 / 悲观情景分析
    description: Three-scenario revenue and valuation model for Mollie 2026–2028
    claimRefs:
