      - number: '8.4'
        title: 关键绩效指标与财务里程碑
        blocks:
          - type: paragraph
            body: >-
              投资逻辑依赖 Mollie 在 2025–2028 周期内，于基准情景下维持 ≥20% 年收入增长。公司 FY2024 增长 28%、FY2023 增长 36%，体现出持续收入动能。FY2024 毛利
              €115M、毛利率 54%，是 Mollie 支付方式经济性在规模化后跑得通的最清晰信号；随着 GoCardless 银行转账交易量（抽成率更低）并入合并 P&L，维持或扩张这一利润率是关键监控变量。FY2024
              首次 EBITDA 转正是关键里程碑：即使 EBITDA 金额尚未公开披露，它也证明模型中存在经营杠杆。

              GoCardless 收购引入了一次离散资本消耗事件。按 ~£1.6B 计算，收购价超过 Mollie 总毛利 16x
              以上，若没有协同、按当前独立利润率，意味着以数十年计的回本周期。因此，逻辑明确依赖协同兑现：合并开放银行和银行转账交易量、向 GoCardless 的经常性支付商户交叉销售 Mollie
              的支付方式广度，以及潜在成本理顺。我们会按季度监控的 KPI 包括：（a）合并集团收入增长率，（b）毛利率轨迹，（c）EBITDA 利润率及集团 EBITDA 转正路径，（d）Mollie 和
              GoCardless 存量网络的商户流失率，（e）整合里程碑达成情况，以及（f）DNB 和 FCA 监管下的监管资本充足率。
            claimRefs:
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
