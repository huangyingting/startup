      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              欧洲数字支付市场增长由结构性需求顺风支撑。更多消费支出转向线上后，欧洲各市场电商渗透率继续提升。ECB 2024 SPACE consumer survey 基于 50,000
              名欧元区消费者访谈，确认所有欧元区国家的数字支付占比都在上升；卡仍是最受欢迎的数字方式，移动应用支付份额也在提升。跨境电商进一步扩大可服务基数，因为做国际销售的商户需要多币种支持，也需要接入本地偏好的支付方式——荷兰
              iDEAL、比利时 Bancontact、奥地利 EPS、波兰 Przelewy24、意大利 BANCOMAT Pay，以及覆盖法国、德国、比利时的 Wero。


              监管催化剂强化了内生增长。PSD2 框架强制实施强客户认证，推动支付流从非正规方式迁往持牌 PSP 基础设施。2024 年通过的 EU Instant Payments Regulation 要求银行提供
              SEPA 即时贷记转账；EBA 2026 监管意见确认，传统银行与金融科技 PSP 之间的竞争格局已经开始变化。PSD3 和 Payments Services Regulation
              已进入欧洲立法管线，将进一步统一开放银行标准。Mollie 对 ECB 数字欧元的准备是更长期变量；ECB 将数字欧元描述为既有电子支付的补充，意味着近期 PSP 被替代的风险有限。


              采用约束同样真实。PSP 一旦嵌入商户结账流，集成就会带来技术切换成本；替换插件需要开发时间、重新测试，并承担停机风险，形成结构性惯性。欧洲支付方式碎片化，意味着 PSP
              进入新国家必须拿到本地支付网络会员资格并维持专门支持。商品化卡处理在交换费监管和竞争侵蚀 take rate 后面临利润率压缩。World Bank
              指出，信任和金融包容障碍会拖慢金融科技采用。Adyen、Stripe 等大型既有玩家已扩张中小企业产品，正在加大 Mollie 中端市场差异化的竞争压力。
