      - number: '5.4'
        title: 路线图、扩张与竞争差异化
        blocks:
          - type: paragraph
            body: >-
              Mollie 近期产品路线图集中在四个战略向量。第一，EPI/Wero principal membership 已于 2026 年 1 月确认，把泛欧洲实时账户到账户支付直接加入 Mollie
              API，降低欧洲本土交易对卡网络的结构性依赖，并扩大可服务支付方式集合。第二，GoCardless 收购预计 2026 年中交割，将把银行借记、直接借记和开放银行经常性付款能力带入 Mollie
              技术栈，大幅强化经常性付款产品套件，并补上此前 Mollie 不具备的英国 Bacs 直接借记能力。第三，Mollie MCP Server 让公司面向 AI 原生商业布局：一旦 API 可被 LLM
              代理调用，Mollie 就拿到新的开发者获客渠道，也可能在 AI 优先支付流中抢到早动护城河。第四，地理扩张继续系统推进：2024
              年上线五个新市场——挪威、芬兰、丹麦、匈牙利和斯洛文尼亚——与长期覆盖三十多个国家的策略一致。

              竞争差异化集中在三项相互强化的优势：单一 API 中最广的欧洲本地支付方式覆盖、以开发者优先集成模型连接 100+
              平台伙伴并产生分发杠杆，以及不断扩展的嵌入式金融产品套件，能把商户关系带出商品化交易处理。WooCommerce 插件的 100,000+ 活跃安装量是可量化的自然分发指标，强化了 Mollie 生态护城河相对
              Adyen 等企业优先对手和 Stripe 等全球通用玩家的深度。MCP Server、Wero 会员资格和 GoCardless 整合合在一起，是 Mollie
              明确执行这条战略的最清晰证据：降低对卡网络依赖，并在既有商户基数内扩大钱包份额。
