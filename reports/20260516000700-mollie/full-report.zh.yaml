      - number: '5.3'
        title: 信任、安全、合规与质量
        blocks:
          - type: paragraph
            body: >-
              Mollie 持有 PCI-DSS Level 1 认证，这是 Payment Card Industry Data Security Standard
              的最高级别，覆盖其完整持卡人数据环境，并每年由独立审计续证。商户使用 Mollie 托管结账页时，该认证会把自身合规范围降至 SAQ-A 级别，也就是最轻的合规类别，从而显著减轻非技术商户的安全负担。Mollie
              还通过 ISO 27001 信息安全管理认证，满足围绕人员、流程和技术的系统性安全控制全球标准。PSD2 下的 Strong Customer Authentication 通过 3D Secure
              2.0（3DS2）落地；它适用于超过三十欧元的欧盟卡交易，并支持低风险和低金额交易的 SCA 豁免，在满足监管要求的同时减少支付摩擦。

              Mollie 在荷兰 DNB 支付机构许可和英国 FCA Electronic Money Institution 授权下运营，并主动管理各运营市场的监管边界。2026 年 1 月，Mollie 被接纳为
              EPI（European Payments Initiative）principal member，获得 Wero 即时支付网络直接会员资格；这是其监管和网络地位的重要补强。GDPR
              下的数据隐私合规依托欧盟数据驻留和公开 Data Processing Agreements 维持。

              第三方质量信号整体正面：G2 和 GetApp 商户评论给出 3.8 到 4.0 星或以上满意度，集成便利性和客户支持被列为主要差异点。Mollie 通过 status.mollie.com
              透明披露运营事件，说明服务沟通已经较成熟。Mollie WooCommerce 插件的 100,000+ 活跃安装量，以及 2024 年加入 Amex POS
              受理，也进一步展示了软件和合作伙伴两个维度的产品执行质量。
