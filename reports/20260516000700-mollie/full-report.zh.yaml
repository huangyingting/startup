      - number: '3.4'
        title: 竞争护城河与耐久性评估
        blocks:
          - type: paragraph
            body: >-
              Mollie 的主要竞争护城河，是欧洲本地支付方式覆盖深度——35+ 种方式，包括 iDEAL（荷兰）、Bancontact（比利时）、EPS（奥地利）、Przelewy24（波兰）、BANCOMAT
              Pay（意大利）等。没有单一竞争者能在相近广度下复制相近的中小企业入驻简易度。本地支付方式深度带来商户黏性，因为切换 PSP 需要重新集成所有本地方式、测试跨国结账流，并重新谈判合同。Mollie 与
              Shopify、WooCommerce、Magento 和 PrestaShop 的深度插件集成进一步放大切换成本；替换时还要与电商平台提供方协调。

              Adyen 的护城河建立在统一商务基础设施上——一个平台覆盖线上、门店和嵌入式金融——从而对企业客户形成深度锁定。企业一旦在 POS 和电商资产中部署 Adyen，切换成本会很高。Adyen
              的嵌入式金融产品（Capital、Accounts、Issuing）又增加交叉销售收入，进一步抬高切换成本。

              Stripe 的护城河来自开发者心智和生态：100+ 种支付方式、金融产品和第三方应用。Stripe App Marketplace 加上 Stripe Capital 等金融产品，让 Stripe
              远不只是支付处理商。这种广度会提高科技公司切换成本，尤其是已经深度接入 Stripe 套件的公司。

              Mollie 护城河的关键风险，是 Adyen 向下进入市场带来的压力——Adyen 2024 年与 BILL 合作布局中小企业金融服务——以及 Stripe
              功能集越来越广、持续覆盖欧洲本地支付方式。如果任一玩家有效放大中小企业获客动作，Mollie 可触达商户基数可能流失。Checkout.com 的企业重心和 SumUp 的微商户重心，对 Mollie
              核心业务威胁较不紧迫。
