  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型与收入来源
        blocks:
          - type: paragraph
            body: >-
              Mollie 的收入模型是按交易付费架构，标准层没有强制月度订阅；也就是说，商户处理支付时公司才赚钱。这一设计降低了中小企业采用门槛，但也让收入增长直接绑定商户交易量和欧洲电商活跃度。最主要收入驱动是 Visa
              和 Mastercard 轨道上的卡处理，Mollie 每笔收取 1.8% 加 €0.25；这是一项混合费率，在产品组合中贡献最高单笔收入。本地支付方式主要包括 iDEAL（€0.29
              固定费率，荷兰主导方式）、Bancontact（0.7% 加 €0.10，比利时标准方式）和 SEPA Direct Debit（€0.35 固定费率），合计估计贡献收入的
              20–25%，交易量高，但利润率低于卡。

              支付方式经济性之外，Mollie 还在更多场景变现：借助 Klarna 促成 BNPL（约 2.99% 加 €0.35）、Connect 做平台子商户路由，以及 Mollie Capital
              提供商户现金垫款。卡处理估计占总收入 50–60%。本地方式和 SEPA 占 20–25%，BNPL、Connect 和 Capital 占剩余 15–30%。管理层把 Connect 和 Capital
              都定位为战略增长向量，但没有公开披露细分收入贡献。250,000+ 商户基数意味着每商户年收入约 €856；按 0.7–1.0% 混合 take rate 估计，总支付量约 €20–30B。
