      - number: '7.3'
        title: 合作伙伴、依赖与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Mollie 的产品组合编织出一张第三方依赖网络，每个依赖都有不同的集中度和失效风险。通过 Klarna 促进 BNPL，会把结账体验绑定到第三方合同；若 Klarna
              调整条款、退出合作关系，或自身遭遇监管行动，Mollie 的 BNPL 功能就会受损。January 2026 宣布加入 EPI/Wero 后，Mollie 新增了对 EPI Consortium 的依赖，以获取
              Wero 支付方式；这在部分欧洲大陆市场至关重要。收购后 GoCardless 集成带来最高的近期合作伙伴依赖风险：合并实体必须在共同产品路线图下整合不同技术栈、合规框架和 UK/EU
              运营模式，而路线图时间表尚未公开定义。

              竞争风险主要是结构性的，不是生存性的。Adyen 通过 Adyen for Platforms 向 SME 细分扩张——这在历史上是 Mollie 的核心领地——构成最可信的现有巨头威胁。Stripe
              加速推进欧洲，包括整合本地支付方式，压缩了 Mollie 的开发者体验差异化。Checkout.com 和 GoCardless（交割后已成内部实体）带来的竞争风险没那么紧迫，但合并后的
              Mollie-GoCardless 实体必须在更多细分市场守住份额。SumUp 和 Square 继续侵蚀微型商户长尾。Mollie 在荷兰数字支付中受 ACM
              监督的市场位置，也叠加了额外监管层：荷兰竞争主管机构会监测金融科技基础设施中的潜在集中风险。
