            SMB 自助简洁性下匹配这一广度。
          tone: positive
        - label: SMB 商户基础
          value: 250,000+ merchants
          detail: 截至 2024 年，Mollie 服务 250,000+ 商户，集中在 Benelux，并在德国、法国和英国扩张。客群主要是 SMB 和中端市场电商商户。
          tone: positive
        - label: GoCardless 客户（收购后）
          value: 100,000+ businesses
          detail: 待完成的 GoCardless 收购将增加 100,000+ 企业客户和覆盖 30+ 国家/地区的银行支付网络，立即把 Mollie 的 TAM 扩到循环和订阅付款。
          tone: positive
