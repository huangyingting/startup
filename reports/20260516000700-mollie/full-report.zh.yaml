  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Mollie 所在市场，是面向在线和全渠道经营中小企业的欧洲数字支付处理。公司产品覆盖四条主要变现路径：商户网站销售点的电商结账支付、借助 Tap to Pay 和卡终端完成的线下 POS 支付、借助 SEPA
              Direct Debit 和存储支付方式收取经常性与订阅款项，以及面向服务型企业的独立支付链接和开票。每条路径都面向企业侧买方——商户、SaaS 平台和市场运营方——而不是消费者，因此 Mollie 属于 B2B
              支付基础设施范畴。


              几类表面相似的业务不在实际市场边界内。大型企业收单并非 Mollie 主战场；Adyen 和 Stripe 的企业部门在这一市场围绕定制 interchange-plus 轨道、全球资金管理和专属客户经理竞争，而
              Mollie 公开定价页显示，进入按量议价前存在清晰的自助服务门槛。跨境外汇资金管理和批发外汇也排除在外；Mollie 支持多币种结算，但不作为独立外汇服务商竞争。货到付款和手工银行发票付款条款，是 Mollie
              数字产品必须替代的既有做法；在德国、荷兰等市场，中小企业开票仍有相当比例流经手工银行转账，而不是集成式 PSP 轨道。


              可能外推市场边界的相邻机会包括：借助 Connect for Platforms 做 B2B 嵌入式支付、与 Klarna 共同发起先买后付，以及 PSD2 基础设施成熟后形成的开放银行账户到账户资金流。EU
              Instant Payments Regulation 带来的监管顺风，可能逐步把基于发票的商业活动迁移到实时支付流；像 Mollie 这样持牌 EMI 可以居中承接。
