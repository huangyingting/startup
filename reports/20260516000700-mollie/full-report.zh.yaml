  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局与直接同业
        blocks:
          - type: paragraph
            body: >-
              Mollie 身处欧洲支付处理的分层竞争格局。顶层是 Adyen（2006 年创立，阿姆斯特丹）和 Stripe（2010 年创立，美国 / 爱尔兰双总部），二者都是全球领导者，在欧洲也有重要存在。Adyen 是
              Euronext Amsterdam 上市公司，约有 4,345 名员工（2024），年化净收入超过 €2.4 billion（基于 2025 年 Q3 净收入 €598.4 million、20% YoY
              增长）。Adyen 的定价模型以 Interchange-plus 结构为中心，起价为每笔 $0.13 加卡组织费用，面向高交易量企业和中端商户优化。Adyen 近年处理支付量超过 $1
              trillion，客户包括 eBay、McDonald's 和 Airbnb，并提供覆盖线上、门店和嵌入式金融的统一商务解决方案。

              Stripe 由爱尔兰裔美国兄弟 Patrick 和 John Collison 创立，2025 年处理支付 $1.9 trillion，同比增长 34%，服务全球五百万家企业。Stripe 2026 年 2
              月估值 $159 billion，是全球估值最高的私有金融科技公司。Stripe 拥有 8,500 名员工，支持 135+ 种货币和支付方式；开发者优先的方法和 100+
              种支付方式组成的广泛生态，使其同时成为全球科技初创公司和大型企业的默认选择。Stripe 英国定价为欧盟发行卡 2.5% 加 20p，标准卡交易层面与 Mollie 大体可比，但欧洲本地支付方式深度较弱。

              中层竞争者中，Checkout.com（2009 年创立，伦敦，CEO Guillaume Pousaz）在 2022 年 1 月 Series D 融资中估值约 $40
              billion，是当时欧洲估值第二高的私有初创公司。Checkout.com 面向需要定制定价和专属客户管理的高交易量、高增长企业及中端商户；这一客群与 Mollie 的中小企业核心重叠不强。
