      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              对 Mollie 最相关的上市可比公司是 Adyen N.V. (AMS: ADYEN)，也是唯一的大盘欧洲纯支付公司。截至 Q1 2026，按 FY2025 一致预期 ~€2.0B 收入和 ~€36B
              市值计算，Adyen 交易在约 18x NTM 收入。这个倍数反映了 Adyen 更高 EBITDA 利润率（~47%）、全球企业客户基础和直接收单规模——这些属性支撑其相对 Mollie 的结构性溢价。机械套用
              Adyen 倍数会得到 Mollie 2026 NTM 收入 €260M 对应 18x、即 €4.7B+ 的不现实结果；实际应因私有公司流动性不足、规模更小、SME 客户更集中以及集成执行风险，给予 50–65%
              折价，得到纯折价口径下 €1.6–2.4B 的范围，或在折价与协同价值混合后得到 €3.5–5.0B。

              私有同业中，Stripe 的 $65B→$95B 二级估值轨迹，以及 Checkout.com 的 ~$40B→$10–12B 减记周期，框出了后期金融科技独角兽可能结果的区间。Checkout.com
              的降级最具警示意义：这家公司同样有欧洲支付敞口，曾以狂热倍数融资，之后未达增长目标，投资者据报道将持仓减记 75–80%，其估值从峰值 $40B 降至 2024 年估计 $10–12B。Nuvei 于
              November 2023 以 $6.3B 私有化、约 5–7x NTM 收入成交，为正常化利率环境下盈利欧洲支付业务提供了实时市场出清先例。SumUp 在 2022 最后估值为
              €8B，尚未公开重估，但面对类似的 SME 导向竞争动态。对于一家盈利且增长的欧洲支付平台，~7–9x NTM 收入的混合同业中位数支撑我们 €4.0–5.0B 的基准情景。
            claimRefs:
