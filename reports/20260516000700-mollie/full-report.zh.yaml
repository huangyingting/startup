  - id: TV005
    title: 投资逻辑破裂与否决触发项
    description: Observable events that would require a hold or exit recommendation
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Exhaustive enumeration of material thesis-break conditions based on identified risks and investment case
        dependencies
    columns:
      - 触发项
      - 阈值
      - 监测频率
      - 影响
    rows:
      - - 合并商户流失率（Mollie + GoCardless）
        - 交割后前 12 个月 >15%
        - 每季度
        - 整合毁损价值；重新评估持有 / 退出
      - - 收入增长减速
        - FY2025 或 FY2026 合并增长 <15%
        - 每季度
        - 竞争格局已变；降低仓位
      - - EBITDA 反转
        - 整合成本导致集团 FY2025 EBITDA 为负
        - 每半年
        - 盈利里程碑反转；重新评估投资逻辑
      - - DNB 或 FCA 监管行动
        - 任何牌照条件、限制，或 >€10M 的执法罚款
        - 持续
        - 核心商业模式承压；立即复核
      - - GoCardless FCA 开放银行限制
        - GoCardless 开放银行活动受到重大限制
        - 持续
        - 乐观情景投资逻辑失效；转向悲观情景估值
      - - 整合技术延迟
        - 24 个月内未交付统一技术平台
        - 每半年
        - 复杂度被低估；协同时间线后移
      - - 竞争性市场份额流失
        - Mollie 荷兰中小企业市场份额流失 >5 个百分点
        - 每年
        - 核心护城河被侵蚀；基准情景收入轨迹承压
    notes: 否决触发项是监测阈值，不是硬性退出规则；背景和幅度同样重要。每次触发时都应对照完整投资逻辑复核。
  - id: TV006
    title: 最终尽调要求
    description: Outstanding data requests before commitment to a position
    claimRefs:
      - CV038
      - CV039
      - CV040
    enumerationScope:
      coverage: exhaustive
      basis: Exhaustive enumeration of outstanding diligence items based on identified information gaps as of May 2026
    columns:
      - 优先级
      - 尽调问题
      - 重要性
      - 预期来源
    rows:
      - - P1（阻断项）
        - FY2024 经审计合并账目，包括收购 GoCardless 后的短期并表期间
        - 没有审计报表，无法评估净利润、FCF 和资本充足性
        - 公司 / 通过 Companies House 获取的法定申报文件
      - - P1（阻断项）
        - Mollie 和 GoCardless 存量账本的商户流失率与队列 LTV 数据
        - 留存质量是判断单位经济模型最关键的承保变量
        - 管理层披露 / 数据室
      - - P1（阻断项）
        - 完整协同计划，包括时间线、置信区间和假设
        - £1.6B 收购能否回本完全取决于协同兑现
        - 管理层披露 / 投资委员会材料
      - - P2（重大项）
        - 合并后 DORA / DNB / FCA 要求下的监管资本充足性分析
        - 收购 GoCardless 后的双辖区资本要求可能限制运营灵活性
        - 公司 / DNB 与 FCA 函件
      - - P2（重大项）
        - GoCardless FCA 状态，包括任何持续监管函件或未结审查
        - FCA 授权质量影响开放银行乐观情景投资逻辑是否成立
        - FCA 注册信息 / 公司披露
      - - P2（重大项）
        - 合并实体按地域和支付方式拆分的收入
        - 地域和产品集中度决定各情景风险
        - 管理层披露 / 数据室
      - - P3（重要项）
        - 整合技术路线图和统一平台交付时间线
        - 技术复杂度决定整合成本和时间线风险
        - CTO 简报 / 技术尽调
      - - P3（重要项）
        - 三年备考 P&L，覆盖整合成本、汇率敏感性和协同时间线
        - EUR/GBP 敞口重大；GoCardless 收入主要以 GBP 计价
        - CFO 简报 / 财务数据室
    notes: 优先级：P1=阻断项（承诺投资前必须拿到），P2=重大项（签署投资条款清单后 30 天内必须拿到），P3=重要项（交割前必须拿到）。
