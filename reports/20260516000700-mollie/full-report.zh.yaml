      - number: '6.3'
        title: 留存、满意度与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Mollie
              未公开披露净留存率（NRR）和总留存率（GRR），这符合后期私有金融科技公司的常态，但也是投资者尽调中的重大缺口。缺少队列级留存数据，意味着无法独立验证各历史商户队列的扩张收入，估计客户终身价值也只能依赖结构推断，而非披露指标。作为参照，Adyen
              公开披露的 NRR 持续高于 100%，应在资料室场景下用作评估 Mollie 未披露 NRR 的基准。

              第三方满意度数据呈现混合信号。G2 评价约为 3.8–4.0 / 5 星，易集成、定价透明是主要正面属性；客服响应慢、实时支持有限是主要负面主题。Mollie 在 Trustpilot 上截至 mid-2026
              的评分约为 1.7 / 5，绝对值偏低，但符合大规模 SMB PSP 的常见模式：自助式模型放到大规模后，遇到交易争议、账户限制或支持摩擦的商户会贡献大量投诉评价，而满意商户发帖动力较弱。荷兰科技媒体
              Tweakers 佐证了支持摩擦叙事，反映 SMB 商户在规模化支持获取上的不满。这些信号代表声誉风险，但并不是可靠的流失预测指标。

              结构性留存机制部分抵消了满意度评分的混合表现。通过 WooCommerce、Shopify 或 Magento 插件集成的商户面临实质切换成本，因为迁移到替代 PSP
              需要更换插件并重新测试结账流程。Connect 平台客户——为子商户路由支付的市场平台和 SaaS 运营商——切换成本更高，因为 Connect 架构要求深度 API 集成。将 Mollie Capital
              与核心支付一起使用的商户，还会通过融资关系获得额外产品黏性。Bancontact 支持则为需要这一主导本地支付方式的比利时商户带来结构性锁定。

              收入集中度风险估计为前 20% 商户贡献总支付量的 60–80%，长尾微型商户单体收入贡献很小。荷兰占商户基础 35–45%，是最显著的单一国家风险。WooCommerce 插件 100,000+
              安装量代表单一渠道分发依赖，若 WooCommerce 市占率发生实质变化，Mollie 可能受到影响。GoCardless 并入后，随着英国和爱尔兰商户加入合并基础，商户多样性会提高，地域集中度应会被稀释。
