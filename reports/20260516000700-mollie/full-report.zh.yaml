      - number: '2.2'
        title: 市场规模：TAM、SAM 与 Mollie 当前位置
        blocks:
          - type: paragraph
            body: >-
              公开资料中没有单一权威研究把欧洲中小企业 PSP 市场作为独立分部测算，因此需要多组互补视角。最宽的可用锚点是整体欧洲电商支付市场。Ecommerce Europe's 2025 European
              E-commerce Report 提到欧洲消费电商持续增长；若纳入英国，欧洲电商年消费总额估计在 €800 billion 到 €1 trillion 以上区间。Statista Payments Market
              Forecast 描述的全球数字支付市场，也在数字钱包采用、移动 POS 扩张和商户受理持续数字化推动下保持强劲增长。Bank for International Settlements 的 CPMI
              payment statistics 证实，BIS 成员司法辖区——包括主要欧元区经济体——电子支付金额每年达到数十万亿欧元。


              更窄的 SAM 视角，聚焦欧洲电商支付量中经由 PSP 聚合商和网关流转、而非直接银行收单关系的部分。中小企业通常借助第三方 PSP 接入支付受理。按照 Mollie 自身定位——250,000
              家商户，标准定价覆盖每月最高 €100,000——SAM 合理覆盖年处理额从数千欧元到数百万欧元的商户。若套用公开引用的中小企业 PSP 占欧洲电商交易量 15% 到 25% 的假设，SAM 约为每年 €120
              billion 到 €250 billion 支付量。这个区间由分析师构建，并非来自一手研究；实际市场边界仍不确定。


              Mollie 当前 SOM 可由披露财务反推。2024 年收入 €214 million，按 PSP 典型混合 take rate（约 TPV 的 0.7% 到 1.0%）计算，隐含年处理量约 €20
              billion 到 €30 billion。以 SAM 区间中点计算，Mollie 在中小企业 PSP 分部的市场份额为低个位数百分比。该估计高度依赖未披露的 take-rate 假设，只能视为数量级指示。
