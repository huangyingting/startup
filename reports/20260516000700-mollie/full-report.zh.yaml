      - number: '3.2'
        title: 专业型与相邻竞争者
        blocks:
          - type: paragraph
            body: >-
              多家专业型竞争者覆盖相邻分部。GoCardless（2011 年创立，伦敦）搭建了面向经常性付款的全球银行支付网络，服务 30+ 个国家的 100,000+
              家企业。它的核心优势是借助开放银行和直接借记网络自动收取银行借记款项，为 SaaS、公用事业和专业服务公司处理经常性订阅和发票付款。Mollie 于 2025 年 12 月宣布以 £1.6 billion 收购
              GoCardless，这是一项转型级战略动作；它会把 Mollie 的卡和本地支付方式深度，与 GoCardless 的银行支付和开放银行能力结合起来，形成覆盖欧洲全谱支付类型的统一平台。

              SumUp（2012 年创立，伦敦）用销售点硬件和 1.69% 简单固定费率卡处理模型，面向 37 个国家的微商户和小企业。SumUp 的市场打法围绕实体硬件分发、应用简洁性，以及餐饮和零售垂直集成；在
              Mollie 最强的在线结账或平台嵌入式支付领域，它并不构成实质竞争。

              Worldline（上市公司，1972 年创立，法国）、Ingenico
              等欧洲传统处理商主导企业收单和银行基础设施领域，但不是中小企业数字商业入驻的直接竞争者。PayPal（上市公司，美国）拥有大型消费者品牌和商户支付解决方案，但复杂度更高、定价更高、品牌定位也偏消费者优先，使它不太受
              API-first 中小企业商户青睐；这类商户要搭建数字商业工作流。
