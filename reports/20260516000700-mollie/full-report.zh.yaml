  - id: FM001
    title: 市场规模测算口径
    type: pyramid
    layout: wide
    summary: 欧洲数字支付市场很大，但 Mollie 真正可服务的部分——由 PSP 中介的 SMB 电商支付量——远窄于头部 TAM 数字。即便缺少权威的欧洲 SMB 口径，Statista 确认的全球支付市场增长仍支持趋势方向。
    data:
      nodes:
        - label: 欧洲数字支付总 GMV：€800B–€1T+（TAM）
          detail: EU+UK 范围内的电商和数字支付总支出；Ecommerce Europe 2025 与 Statista 支付展望引用。宽口径外沿，包含企业和银行直连流量。
          tone: positive
        - label: SMB 经 PSP 中介的交易量：€120B–€250B（SAM 上沿）
          detail: 分析师搭建的估计，将 15–25% 的 SMB PSP 份额套用到欧洲数字 GMV 总量；没有一手研究专门确认该细分。
          tone: neutral
        - label: 线上 SMB 专业 PSP 交易量：€60B–€120B（SAM 下沿）
          detail: 更窄口径，聚焦年交易量低于约 €5M、跑在专业 PSP 轨道上的商户；该估计由商户数和交易量分布假设搭建。
          tone: neutral
        - label: Mollie 隐含 TPV：€20B–€30B（SOM）
          detail: 由 2024 年 €214M 收入和假设的 0.7–1.0% 混合抽成率推出；Mollie 未公开披露 TPV。意味着在 SAM 上沿区间中占低个位数份额。
          tone: positive
    approximationNotes: 各层级均由分析师搭建。没有独立一手研究公开测算欧洲 SMB PSP 细分。Mollie 的隐含 TPV 由收入和假设抽成率推导；真实数字为私有信息。
