  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 因素
      - 类型
      - 机制
      - 强度
      - 时间窗口
    rows:
      - - 欧洲电商渗透率上升
        - 驱动因素
        - 消费者支出继续线上迁移，带来新的商户需求；ECB SPACE 2024 证实，欧元区所有国家的数字支付占比都在提高
        - 高
        - 持续（3–5 年）
      - - 跨境电商扩张
        - 驱动因素
        - 商户做国际销售，需要多币种、多支付方式的 PSP 覆盖；Mollie 的 35+ 支付方式库正好承接这一需求
        - 高
        - 持续（3–5 年）
      - - 开放银行、PSD2 与 PSD3 监管
        - 驱动因素
        - 强客户认证的监管要求，加速商户从旧式银行流程迁移到持牌 PSP 通道；PSD3/PSR 管线会进一步标准化接入
        - 中
        - 中期（2–4 年）
      - - 欧盟即时支付条例
        - 驱动因素
        - 要求银行无额外成本提供 SEPA 即时转账；实时支付基础设施扩容后，Mollie 这类持牌 EMI 可用于账户到账户支付流
        - 中
        - 中期（2–4 年）
      - - BNPL 与嵌入式金融增长
        - 驱动因素
        - 年轻欧洲消费者更多采用先买后付；Mollie 与 Klarna 的合作把 BNPL 带给商户基础，同时不让 Mollie 承担信用风险
        - 中
        - 持续（2–5 年）
      - - SaaS 平台与嵌入式支付增长
        - 驱动因素
        - 垂直 SaaS 增长带来高杠杆分发；每个通过 Connect for Platforms 完成的 SaaS 平台集成，都会带来许多下游商户
        - 高
        - 持续（3–5 年）
      - - PSP 集成后的高切换成本
        - 约束
        - 技术切换成本——更换插件、重新测试、停机风险——让商户形成惯性；结账集成比标准 SaaS 订阅更黏
        - 高
        - 结构性
      - - 欧洲支付方式碎片化
        - 约束
        - 每进入一个新国家，都需要接入本地清算方案、支持本地支付方式、配置本地化支持人员；任何 PSP 的地理扩张都会被拖慢
        - 中
        - 结构性
      - - 大宗银行卡处理的利润率压缩
        - 约束
        - 交换费监管和竞争加剧，侵蚀 PSP 在标准 Mastercard/Visa 交易上的抽成率；必须靠高端支付方式交易量和增值服务抵消
        - 中
        - 中期（2–3 年）
      - - 大型既有玩家下沉
        - 约束
        - Adyen 和 Stripe 已扩张 SMB 产品；Stripe 的按交易付费模式与 Mollie 核心客群直接重叠；竞争对手加大投入，可能削弱 Mollie 的差异化
        - 高
        - 持续
    notes: 强度评级（高/中/低）反映对市场影响幅度的定性判断，不代表概率。驱动因素与约束并不互斥； 切换成本在商户获取后有利于 Mollie，但也会保护 Adyen/Stripe，阻挡 Mollie 进入中端市场。
