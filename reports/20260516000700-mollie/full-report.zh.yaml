      - number: '4.4'
        title: 财务缺口与披露约束
        blocks:
          - type: paragraph
            body: >-
              尽管收入端透明度提高，Mollie 公开财务披露仍留下几项尽调关键缺口。EBITDA 以下的净利润和亏损没有公开，因此外部无法评估利息支出、税项、折旧、股权激励费用，以及收购无形资产摊销。GoCardless
              交易后，这一点尤其重要，因为 £1.6B 收购会产生大量商誉摊销和整合成本。自由现金流和当前现金余额同样未披露，导致外部无法判断现金续航、债务容量，或是否需要额外融资来支持收购和整合。

              荷兰和比利时是 Mollie 的主要市场，德国是第三个重要地区，但公司没有公开正式的按国家或支付方式拆分收入。总支付量（TPV）也未正式披露，限制了对 take rate 和处理经济性的核验。2022 到
              2024 年 28% 收入 CAGR 高于欧洲 PSP 行业约 15–20% 的平均水平，暗示执行强于市场；但缺少 KvK
              经审计法定账目，外部难以独立印证这些数字。投资决策前，财务尽调需要经审计利润表、GoCardless 交易后的现金头寸桥，以及产品层利润率披露。
