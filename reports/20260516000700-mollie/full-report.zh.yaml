      - number: '1.4'
        title: 规模、地理覆盖与里程碑
        blocks:
          - type: paragraph
            body: >-
              截至 2024 年年度业绩公告（2025 年 6 月 3 日），Mollie 服务 250,000+ 家客户，包括 Gymshark、Maison du
              Monde、KoRo、Veloretti、HEMA、Rituals、O'Neill 和 Q-Park 等知名品牌，也覆盖欧洲大量本地中小与中端商户。850
              人团队分布在欧洲各地，在阿姆斯特丹（总部）、德国、比利时、英国、法国和 Lisbon/Portugal 设有办公室。Mollie 自称是欧洲增长最快的金融科技公司之一；2024–2025
              年的地理扩张节奏支撑这一表述，新进入市场包括 2024 年的意大利，以及 2025 年的瑞典、波兰、葡萄牙、挪威、丹麦、芬兰、匈牙利和斯洛文尼亚。

              Mollie 公开时间线中的关键节点包括：2004 年在阿姆斯特丹创立；2020 年 9 月完成 TCV 领投的 Series B；2021 年 6 月完成 €665M Series C；2022–2023 年
              CEO 由 Shane Happach 更替为 Koen Köppen；2023 年推出 MollieGPT 和 Mollie Terminal；2024 年推出 Tap to Pay 和 Mollie
              Invoicing，并录得 2018 年以来首次 EBITDA 转正；2025 年 12 月宣布收购 GoCardless；2026 年 1 月宣布成为 EPI Principal Member，从而支持
              Wero 分发。这条时间线表明，Mollie 扛过重大领导层更替，在十多个新市场扩张的同时维持增长，并重新回到 EBITDA 盈利。

              公司公开财务轨迹显示，净收入从 2023 年 €99M（+36% YoY）增长到 2024 年 €214M（+28% YoY），毛利润升至 €115M（+30%），EBITDA 自 2018
              年以来首次转正。近年总支付量（TPV）没有公开披露，只有 Series C 时提出过 2021 年 20B EUR 的目标。这些指标显示运营进展强劲，但未经审计，且只通过新闻稿披露。
