    type: flow
    layout: wide
    description: 从核心证据到有条件买入建议的决策路径
    claimRefs:
      - CV001
      - CV003
      - CV006
      - CV008
    data:
      nodes:
        - id: N1
          label: 盈利增长
          detail: €214M 收入，同比 +28%；2024 财年首次 EBITDA+；毛利率 54%
          tone: positive
        - id: N2
          label: 市场领先
          detail: 250,000+ 商户；35+ 支付方式；Benelux SME PSP 第一
          tone: positive
        - id: N3
          label: GoCardless 收购
          detail: 开放银行 + 银行转账覆盖；约 £1.6B，较 2022 年峰值折价约 25%
          tone: neutral
        - id: N4
          label: 估值重置
          detail: 金融科技倍数较 2021 年峰值下降 50-70%；二级市场约 €2.0–3.5B，意味着理性入场价
          tone: neutral
        - id: N5
          label: 整合风险
          detail: £1.6B = >16x 2024 毛利；执行压力是核心投资逻辑风险
          tone: warning
        - id: N6
          label: 竞争压力
          detail: Adyen 和 Stripe 向 SME 扩张；护城河需要持续产品投入
          tone: warning
        - id: N7
          label: 有条件买入
          detail: 入场价 ≤€4.0B；基准情景公允价值 €4.0–5.0B；按季度跟踪整合 KPI
          tone: positive
      edges:
