        - 2027–2028 年战略收购或 PE 收购
        - IPO 延至 2029+ 或困境出售
      - - 投资人 IRR（以约 €2.5B 成本为基础）
        - 25–35%
        - 12–18%
        - 0–5%
      - - 关键驱动因素
        - GoCardless 开放银行协同 + PSD3 顺风
        - 整合按计划推进，竞争地位稳定
        - 整合失败，竞争优势被侵蚀
    notes: IRR 估算基于约 €2.5B 的当前二级市场成本；实际 IRR 取决于具体入场估值。
  - id: TV004
    title: 可比估值表
