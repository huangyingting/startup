  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与平台能力
        blocks:
          - type: paragraph
            body: >-
              Mollie 提供一套围绕单一 REST API 构建的综合支付平台，让商户借助一次统一集成接受 35+ 种欧洲支付方式。核心产品 Mollie Payments 是底座，通过单一 API
              合同接入卡组织（Visa、Mastercard、American Express）、数字钱包（Apple Pay、Google Pay）和高度本地化的欧洲方式（iDEAL、Bancontact、SEPA
              Direct Debit、Klarna、PayPal、Sofort）。与管理多个 PSP 连接相比，单一集成降低了商户复杂度，也显著降低了偏好自助集成的技术型中小企业入驻摩擦。

              基于支付核心，Mollie 组装了一套更高价值的产品模块。Mollie Connect 是成熟的分账 API，服务需要路由子商户资金并保留平台费用的市场和 SaaS 平台。Mollie Checkout
              是托管、移动优化的支付页，围绕转化率调优，并把商户 PCI 合规范围降到 SAQ-A 级别，大幅减轻非技术商户的安全负担。Mollie Capital 于 2022
              年推出，在控制台内嵌收入分成式中小企业商户融资，商户不必再找外部贷款方。Mollie POS（2024 年推出）支持借助 iPhone 上的 Tap to Pay 完成有卡支付，无需专用硬件；American
              Express 于 2024 年底加入该支付网络。最新模块 Mollie MCP Server 于 2025 年推出，提供面向 AI agent 的 API 层，让 LLM 代理能触发和管理支付流，把
              Mollie 放到 AI 原生商业基础设施前沿。这些模块共同形成分层产品策略，把商户关系从商品化交易处理向更深处延伸，并支撑多产品交叉销售经济性。
