          trend: up
        - label: EBITDA 状态
          value: Positive
          detail: 2024 财年首次 EBITDA+；金额未披露
          trend: up
        - label: 活跃商户
          value: 250,000+
          detail: 欧洲 SME 基础；每商户年收入约 €856
          trend: up
        - label: Series C 估值
          value: €5.4B
          detail: 2021 年 6 月峰值；二级市场到 2025 年隐含约 €2.0–3.5B
          trend: down
        - label: GoCardless 价格
          value: ~£1.6B
