companyProfile:
  summary: >-
    Mollie 是荷兰支付服务商和电子货币机构（EMI），2004 年成立，总部位于阿姆斯特丹附近。它运营一套统一支付 API，供 250,000+
    家欧洲中小企业和中端商户接入卡支付、本地欧洲支付方式（iDEAL、Bancontact、SOFORT、Klarna）和银行转账。Mollie 2021 年 6 月以 €5.4B 估值融资 €665M；2024 年收入
    €214M（+28% YoY），首次让 EBITDA 转正。2025 年 12 月，它以约 £1.6B 收购英国开放银行龙头 GoCardless，把直接借记和开放银行支付发起能力纳入产品组合。
