      - number: '5.2'
        title: 技术架构与开发者生态
        blocks:
          - type: paragraph
            body: >-
              Mollie 技术栈建立在 API 优先、云原生架构之上，托管于欧盟数据中心，主要区域在荷兰。REST API 通过 HTTPS 暴露完整支付功能，配有 OpenAPI 3.0 规范，支持 JSON 请求 /
              响应载荷、面向 Connect 平台合作伙伴的 OAuth2 授权，以及面向直接商户的 API key 认证。Webhooks
              提供实时事件通知，支持商户自动化履约工作流。完整的沙盒环境和测试模式让开发者无需真实交易即可测试集成，加速新集成上线。

              开发者生态很广：Mollie 维护 PHP、Node.js、Python、Ruby、Java、.NET 和 Go 官方 SDK，其中 PHP 与 Node.js SDK 在 GitHub
              上保持活跃维护，有公开提交和社区 pull requests。单是 WooCommerce 插件就报告 100,000+ 活跃安装量；更广的集成足迹超过 100 家平台伙伴，覆盖 CMS
              平台（Magento、PrestaShop）、ERP 系统，以及 Shopify 等电商市场。第三方开发者参与度可从 npm 包下载量和带有 Mollie integration 标签的 Stack
              Overflow 活动中看见。这一分发网络形成结构性护城河：每一个平台伙伴都会扩大商户触达，而无需 Mollie 直接投入销售。

              平台支付路由依赖外部基础设施：卡交易经由 Visa、Mastercard 和 Amex 网络处理，本地支付方式则依赖国家支付网络运营方（iDEAL 经由 Currence、Bancontact 经由
              Worldline/Payconiq）和 ECB 管辖的 SEPA 轨道。这些依赖对 Mollie 的定价权和可用性保证形成结构性约束，且不在公司控制范围内。GoCardless 收购预计 2026
              年中交割，将补入银行借记和开放银行经常性付款能力，但也引入显著技术整合复杂度，需要谨慎对齐 API 与数据层。
