      - number: '3.3'
        title: 定价与包装对比
        blocks:
          - type: paragraph
            body: >-
              定价结构是竞争集合中的关键差异点。Mollie 采用透明的按交易付费模型，标准层没有月费，公开费率可在定价页查看——这是有意降低自助注册摩擦、获取中小企业客户的策略。标准欧洲卡定价约为交易额 1.2% 到
              1.5% 加固定费用。Adyen 的 Interchange-plus 模型在极高交易量（每月超过 €1 million）时更具成本效率，因为原始交换费传导会优于聚合 PSP
              费率；但它需要企业级谈判，不太适合自助服务的中小企业市场。Stripe 英国对欧盟卡收取 2.5% 加 20p，高于 Mollie 的标准欧洲交易费率；不过 Stripe
              的全球覆盖和生态广度，足以让国际商户接受溢价。

              GoCardless 银行支付的收费显著低于卡处理，通常低于 1%，因为银行到账户支付完全避开卡交换费。这一定价优势对订阅和经常性付款场景尤其有价值。计划收购完成后，Mollie 加 GoCardless
              将覆盖完整定价谱系：有竞争力费率的卡处理、无交换费的银行支付，以及透明固定单笔费用的欧洲本地支付方式。

              Checkout.com 不公开定价，而是与企业客户谈判定制安排，因此难以直接比较。SumUp 的 1.69% 固定费率简单，但对高交易量商户而言高于按卡种拆分的交换费，使其明确处在微商户层。PayPal
              公布的商户费率随产品和国家变化，但卡处理通常高于专业 PSP；消费者信任和结账转化收益会部分抵消这一劣势。
