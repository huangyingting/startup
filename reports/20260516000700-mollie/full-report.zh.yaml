      - number: '7.5'
        title: 缓释框架与否决标准
        blocks:
          - type: paragraph
            body: >-
              Mollie 的风险缓释姿态体现了其监管成熟度，但受限于运营韧性细节披露不足。公司 DNB 牌照记录和多年监管关系构成可信的监管风险缓释；Brexit 后取得 FCA 授权，证明其具备双制度合规能力。DORA
              合规投入虽然昂贵，却是运营韧性维度的系统性风险缓释。面对竞争风险，Mollie 35-40+ 支付方式广度和开发者优先定位，对 Adyen 和 Stripe 在 SME 细分中的纯价格竞争构成较持久的护城河。

              最重要的否决标准围绕 GoCardless 集成。如果交割后十二个月内合并商户流失率超过 15%，整合逻辑就受损。统一技术栈若延迟超过二十四个月，说明集成复杂度被低估。在监管层面，任何 DNB 监管行动若对
              EMI 牌照附加条件，或成功执法导致重大罚款，都会威胁 Mollie 运营模式的核心。财务监控上，如果合并实体无法在交割后三年内实现集团层面 EBITDA
              转正，收购资本部署逻辑需要重新评估。投资者应要求季度整合计分卡、DORA 审计结果、DNB 监管往来函件，以及覆盖整合成本、汇率敏感性和协同时间表的三年备考 P&L，作为主要尽调交付物。
