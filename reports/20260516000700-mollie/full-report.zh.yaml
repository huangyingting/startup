    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >-
              Mollie 是一家金融科技集团，总部位于荷兰阿姆斯特丹，以 Mollie B.V. 注册，使命是让欧洲和英国每一家企业都能轻松处理支付和资金管理。公司由 Adriaan Mol 于 2004
              年创立；他当时想拆掉金融官僚流程，因为这些流程让中小企业接受数字支付变得没必要地复杂又昂贵。二十多年里，Mollie 从荷兰本土的支付简化工具，长成服务十多个市场、超过 250,000
              家商户的欧洲全服务支付平台。

              商业模式主要由交易驱动：Mollie 每处理一笔支付，就收取单笔处理费，价格随支付方式和交易量层级变化。核心支付层之外，公司提供高阶金融产品，包括 Mollie Capital（24
              小时内发放的收入分成式融资）、Mollie Subscriptions（经常性计费）、Mollie Terminal（线下支付）、Mollie Invoicing（自动开票）和 Mollie
              Connect（面向平台、市场平台、金融科技公司和银行的嵌入式支付）。截至 2025 年中，采用这些附加产品的商户增速比基础支付客户快 60%，说明交叉销售经济性强，客户关系也更黏。

              Mollie 的单一集成结账页支持 35–40+ 种支付方式，覆盖全球标准（Visa、Mastercard、Apple Pay、Google Pay、PayPal、American Express、Klarna
              BNPL）和高度本地化的欧洲方式（iDEAL、Bancontact、SEPA Bank Transfer、Giropay、EPS、Wero、MobilePay、Vipps）。把如此广度放进一个 API，是它相对
              Adyen 这类企业导向竞争者、以及 Stripe 这类通用全球玩家的核心差异；后两者开箱即用的本地支付深度较弱。Mollie 明确用开发者优先、无锁定合同和透明定价，对标传统支付服务商的不透明和复杂度。
