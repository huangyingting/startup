          tone: negative
        - label: Stripe 支付额 vs. Mollie
          value: $1.9T vs. ~€20–30B est.
          detail: >-
            2025 年 Stripe 处理 $1.9T 支付，而 Mollie 隐含 TPV 估计为 €20–30B。约 80× 的规模差距凸显：当 Stripe 扩大本地支付方式覆盖时，Mollie
