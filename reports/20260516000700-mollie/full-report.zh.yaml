  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层与具名案例
        blocks:
          - type: paragraph
            body: >-
              截至 2024，Mollie 的商户基础覆盖超过 250,000 家活跃欧洲企业，主要分为五类：长尾 SMB 电商（估计占商户数 70–75%，但只贡献收入 30–40%）、中型市场电商（估计占商户数
              15–20%、收入 35–45%）、企业与大型零售账户（占数量 2–5%、收入 15–25%）、通过 Mollie Connect 接入的平台和市场平台运营方（占数量 3–5%，增长中但收入占比未披露），以及采用
              Mollie POS 能力的酒店餐饮和食品服务运营方（占数量 5–10%、收入 5–10%）。这种分布体现典型长尾支付经济：绝大多数商户单体对总支付量贡献较小，少数高交易量商户贡献了不成比例的交易收入。

              三个具名商户案例证明 Mollie 已在多个垂直行业跑到生产级部署。MediaMarkt Netherlands 是欧洲最大消费电子零售商之一，在荷兰数字商务业务中使用 Mollie Payments
              接受多种支付方式，验证了其超出 SMB 核心客群的企业级产品能力。Scott Sports 是跨多个欧洲国家经营的国际运动装备品牌，使用 Mollie 处理跨境支付，证明其具备多国配置能力。ACE
              Catering 是荷兰酒店餐饮公司，将 Mollie Payments 与 POS 集成配合使用，展示了线下和食品服务垂直场景。上述案例来自 Mollie
              公开的客户成功故事库，反映的是生产部署，而非试点或试用。

              商户基础的地域分布明显偏向荷兰。鉴于 Mollie 的创始市场位置，以及 iDEAL 作为本地支付方式的主导地位带来的天然本土锁定，荷兰估计占活跃商户
              35–45%。比利时、德国、英国和法国构成下一层市场渗透。Mollie 在 2024 新进入五个市场（挪威、芬兰、丹麦、匈牙利和
              斯洛文尼亚），进一步分散地域基础、扩大可触达商户池。尽管如此，荷兰集中度仍是实质风险：荷兰市场若出现不利监管或经济条件，Mollie 的整体总支付量会受到不成比例的冲击。
