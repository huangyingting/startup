      - number: '6.4'
        title: 客户质量结论与尽调优先级
        blocks:
          - type: paragraph
            body: >-
              从商户数量规模、生态分发和结构性留存机制看，Mollie 的客户质量画像大体正面；但未披露留存和队列分析，显著限制了结论强度。250,000+ 商户基础、25% CAGR
              增长轨迹，以及高质量具名企业案例（MediaMarkt、Scott Sports），共同构成可信基础。WooCommerce 插件 100,000+
              活跃安装量，是经过第三方验证的量化分发指标，锚定了自然获客叙事。PaymentsCardsAndMobile 和 Wired 报道将 Mollie 识别为欧洲 SMB 数字商务的领先
              PSP，提供了超出荷兰本土的行业认可验证。

              最重要的尽调优先级，是按商户队列年份披露 NRR 和 GRR、按分层披露商户流失率，以及按国家披露地域收入分布。没有队列级留存数据，就无法独立判断 Mollie
              的商户基础增长主要来自获客，还是来自现有商户的扩张收入——这是投资者评估已披露收入增长质量的基础区别。Trustpilot 和 G2 的混合支持反馈，应结合 Mollie 披露的客户服务投资优先级来评估，并与相似
              SMB 规模的同业 PSP 对比。Connect 平台客户和 Mollie Capital 采用者，是商户基础中质量最高、最可防守的部分，管理层深度访谈应重点覆盖。
            claimRefs:
              - CU031
              - CU033
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Mollie 作为持牌电子货币机构，在密集且持续演进的监管框架下运营。公司持有 De Nederlandsche Bank (DNB) 根据 PSD2 发放的 EMI 牌照，并在英国另持 FCA
              支付机构授权。每张牌照都附带资本充足、客户资金保护、AML/KYC 义务和持续监管报告要求；任何一项失守，都可能带来牌照暂停或吊销风险。最直接的监管变化是 DORA（EU Regulation
              2022/2554），该法规已于 January 17, 2025 生效，要求 Mollie 建立正式 ICT 风险管理框架，在四小时内向 DNB 报告重大事件，并每年进行运营韧性测试。达到 DORA
              标准需要不小的工程和合规投入，公司尚未公开量化成本。

              PSD3——European Commission 于 November 2023 发布的支付服务法规重构提案——在 2025 仍处于 EU Parliament 和 Council 三方谈判阶段，预计 2026
              通过。PSD3 将扩大开放银行访问义务，并改变 Mollie Connect 产品依赖的 API / 接口标准，迫使产品和集成做出调整。与此同时，UK GDPR 与 EU GDPR
              框架分化，带来双重合规成本：Mollie 必须在不同监管制度下同时满足 Autoriteit Persoonsgegevens（Dutch DPA）和 UK Information Commissioner's
              Office（ICO）。AMLD6 AML 义务要求 Mollie 对全部 250,000+ 已入驻商户执行 KYC/CDD，构成持续合规负担。截至 May 2026，公开来源未发现 DNB、FCA
              或任何数据保护机构针对 Mollie 采取监管执法行动，这是牌照记录的正面信号。
