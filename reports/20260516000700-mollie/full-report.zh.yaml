      - number: '4.3'
        title: 资本结构与融资
        blocks:
          - type: paragraph
            body: >-
              Mollie 的资本结构体现为 2021 年中一次大型机构股权融资：公司完成 €665M Series C，投后估值约 €5.4B。本轮由 Blackstone Growth 领投，EQT
              Growth、General Atlantic、TCV 和 HMI Capital 参投；这组一线机构成长投资者，释放了对欧洲支付机会的高信心。此后三年，这笔资本投入产品、人员和欧洲市场扩张；公司在此期间承受
              EBITDA 亏损，直到 2024 年转向盈利。Series C 之后，公司没有公开宣布新的股权或债务融资。

              Series C 之后的转型级资本事件，是 2025 年 12 月宣布以约 £1.6B 收购 GoCardless。该收购补入直接借记和开放银行经常性付款能力，把合并商户基数扩大到约 325,000+，并强化
              Mollie 在英国和欧洲大陆市场的位置。按 GoCardless 2024 年估计 £70–80M 收入计算，隐含收购倍数约
              20–23x，即便按金融科技标准也偏高，并带来整合执行风险和资本充足性不确定性。Mollie 持有 De Nederlandsche Bank 支付机构许可和英国 FCA
              电子货币机构授权，为跨境扩张提供监管基础。截至 2026 年 5 月，公司没有宣布 IPO；GoCardless 整合是主要资本市场焦点。
