    figureRefs:
      - FO003
  - id: section-2
    title: Leadership, governance, and key-person assessment
    body: >-
      Mollie is led by CEO Koen Köppen, who was confirmed in that role in the June 2025 press release announcing
      2024 financial results. Köppen succeeded Shane Happach, who joined as CEO in June 2021 at the time of the
      Series C funding and departed in or around early 2023. The leadership transition was reported adversely at
      the time by fintech media, representing a material key-person event in the company's recent history. As
      of the 2024 results announcement, Köppen expressed confidence in Mollie's growth trajectory and product
      roadmap and has been publicly the face of the company through the GoCardless acquisition announcement and
      Wero partnership.

      Board composition and governance details are not fully disclosed in public materials. Mollie is a
      private company and does not publish a full board or cap-table. Investors with likely governance rights
      include Blackstone Growth, EQT Growth, General Atlantic, HMI Capital, Alkeon Capital, and TCV (which
      led the prior Series B in September 2020). Adriaan Mol, the founder, holds an undisclosed ownership
      position; his current operational role is not stated in public materials, and no board seat or
      executive role has been publicly confirmed for the post-2021 period.

      Key-person risk is concentrated at the CEO level given the 2021–2023 leadership transition history.
      The current CEO is the public face of a company undergoing a material acquisition and integration
      process. Governance risk is partially mitigated by the presence of established institutional investors
      with likely board seats and significant capital at stake. The absence of public financial statements,
      an audited annual report, or a disclosed cap-table means governance oversight cannot be fully assessed
      from public evidence alone.
    claimRefs:
      - CO004
      - CO019
      - CO034
      - CO035
      - CO037
    tableRefs:
      - TO002
  - id: section-3
    title: Funding history and capital structure
    body: >-
      Mollie's most significant financing event was the Series C announced on June 17, 2021: €665M (US$800M),
      led by funds managed by Blackstone Growth (BXG), with co-investors EQT Growth, General Atlantic, HMI
      Capital, Alkeon Capital, and TCV (which had led the prior Series B in September 2020). At closing, the
      round valued Mollie at US$6.5B / approximately €5.4B, making it one of the top five most valuable
      privately held fintechs in Europe at the time according to CBInsights data cited in the company's own
      press release. Total capital raised at the time of the Series C announcement was stated as over
      US$940M / €780M; subsequent rounds or secondary transactions have not been publicly announced, and
      current total capital raised is estimated at approximately €850M including all prior rounds.

      At the time of the Series C, Mollie had approximately 480 employees, 120,000 monthly active merchants,
      and had processed more than 10 billion euros in transactions in 2020, with a target of more than 20
      billion euros in 2021. The announced use of proceeds was international expansion, team growth, and
      product and engineering investment. Subsequent geographic expansion into Spain, Norway, Denmark, Finland,
      Hungary, Slovenia, Sweden, Poland, Portugal, and Italy confirms material deployment of that capital into
      new market entry. The company has not publicly announced a Series D or any new external financing since
      the 2021 Series C, though private transactions or debt facilities cannot be ruled out.

      The pending acquisition of GoCardless (announced December 11, 2025) is expected to close mid-2026
      subject to regulatory approvals. Financial terms of the GoCardless transaction were not publicly
      disclosed. Upon close, the combined entity would serve 350,000+ businesses across Europe, representing
      a meaningful merchant-count uplift. The EPI/Wero Principal Membership announced January 8, 2026
      requires ongoing investment and integration but is not a separate financing round.
    claimRefs:
