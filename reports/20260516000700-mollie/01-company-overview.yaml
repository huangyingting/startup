  evidenceGaps:
    - type: missing-data
      severity: major
      topic: current valuation
      missingEvidence: >-
        No public revaluation of Mollie since the June 2021 Series C (€5.4B). European fintech multiples
        compressed significantly 2022–2024. True current implied valuation is unknown.
      whyItMatters: Valuation is the single most important diligence variable for any new investor.
      diligencePath: Request current 409A or board-approved valuation; review cap-table and liquidation preferences.
      relatedTableRefs:
        - TO001
      relatedQuestionRefs:
        - QO019
    - type: missing-data
      severity: major
      topic: GoCardless financial terms
      missingEvidence: >-
        Financial terms of the GoCardless acquisition were not publicly disclosed. No purchase price, earn-out
        structure, or post-close integration budget has been made public.
      whyItMatters: Material M&A risk and integration cost are central to 2026 financial modeling.
      diligencePath: Request full acquisition agreement, regulatory filing submissions, and integration budget.
      relatedTableRefs:
        - TO004
      relatedQuestionRefs:
        - QO011
        - QO018
    - type: missing-data
      severity: moderate
      topic: total payment volume (TPV)
      missingEvidence: >-
        Mollie has not disclosed TPV for 2022, 2023, or 2024. The last public TPV references were the 2020
        (10B EUR) and 2021 target (20B EUR) from the Series C press release.
      whyItMatters: TPV is the key volume metric for a payments company and determines take-rate and competitive scale.
      diligencePath: Request TPV by market and payment method for 2022–2025.
      relatedTableRefs:
        - TO001
      relatedQuestionRefs:
        - QO022
    - type: missing-data
      severity: moderate
      topic: board composition and executive team
      missingEvidence: >-
        No public information on board composition, investor governance rights, voting arrangements, or
        founder-control provisions exists for Mollie. Only the CEO is publicly named; CFO, CTO, and other
        C-suite members are not disclosed in retained public sources.
      whyItMatters: Governance structure affects decision-making, acquisition approvals, and future financing.
      diligencePath: Request board charter, investor-rights agreements, current cap-table, and org chart.
      relatedTableRefs:
        - TO002
        - TO003
      relatedQuestionRefs:
        - QO003
        - QO016
    - type: missing-data
      severity: minor
      topic: Mollie Capital pricing and eligibility
      missingEvidence: >-
        Mollie Capital's exact interest rate, fee structure, and eligibility thresholds are not publicly
        disclosed. The product page states "within 24 hours" and revenue-based eligibility but no pricing detail.
      whyItMatters: Capital pricing affects merchant economics and product competitiveness versus bank alternatives.
      diligencePath: Request Mollie Capital product terms, pricing schedule, and default/loss statistics.
      relatedTableRefs:
        - TO001
      relatedQuestionRefs:
        - QO013
    - type: enumeration-incomplete
      severity: minor
      topic: CEO transition detail
      missingEvidence: >-
        Exact circumstances of Shane Happach's departure as CEO in 2022-2023 are not publicly documented
        beyond media reporting that he departed.
      whyItMatters: Understanding the nature of the leadership change matters for assessing governance quality.
      diligencePath: Request board minutes or management commentary on the CEO transition.
      relatedTableRefs:
        - TO002
      relatedQuestionRefs:
        - QO010
        - QO020
