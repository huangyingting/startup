callouts:
  - type: insight
    title: First EBITDA profitability in 6 years
    body: >-
      Mollie's first positive EBITDA since 2018, achieved in 2024, represents a meaningful turning point
      after a period of heavy investment-driven losses. This milestone occurred alongside +28% revenue growth,
      validating that the efficiency gains are not purely cost-driven. It strengthens the investment case but
      should be verified against audited financials when available.
    claimRefs:
      - CO009
      - CO010
      - CO011
  - type: risk
    title: Stale valuation and private-company opacity
    body: >-
      Mollie's last public valuation of €5.4B dates from June 2021, more than four years before the run date.
      European fintech multiples have compressed significantly since 2021. The true current mark-to-market
      value is unknown. No IPO or secondary transaction has been publicly reported. Financial disclosures are
      limited to press releases with no audited P&L, balance sheet, or cash-flow statement available publicly.
    claimRefs:
      - CO001
      - CO027
  - type: risk
    title: Leadership transition history creates governance uncertainty
    body: >-
      The departure of Shane Happach as CEO in 2022–2023 after less than two years in role represents a
      material adverse event in governance continuity. The circumstances of his departure were not publicly
      explained in detail. Current CEO Koen Köppen appears stable as of 2026, but the short tenure of the
      prior external hire is a diligence flag for any new investor.
    claimRefs:
      - CO004
      - CO019
      - CO034
