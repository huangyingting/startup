      - number: '7.3'
        title: Partner, Dependency, and Competitive Risk
        blocks:
          - type: paragraph
            body: >-
              Mollie's product portfolio creates a web of third-party dependencies, each carrying distinct concentration
              and failure risk. BNPL facilitation through Klarna binds the checkout experience to a third-party
              contract; if Klarna adjusts terms, withdraws the relationship, or faces its own regulatory action,
              Mollie's BNPL feature is impaired. The EPI/Wero membership announced in January 2026 adds a new dependency
              on the EPI Consortium for access to the Wero payment method, which is critical in certain continental
              European markets. GoCardless integration post-acquisition creates the highest near-term partner-dependency
              risk: the combined entity must merge divergent technology stacks, compliance frameworks, and UK/EU
              operating models under a shared product roadmap whose timeline is not publicly defined.

              Competitive risk is primarily structural rather than existential. Adyen's expansion into the SME segment —
              historically Mollie's core territory — via Adyen for Platforms represents the most credible incumbent
              threat. Stripe's accelerating European push, including local-payment-method integration, narrows Mollie's
              developer experience differentiation. Checkout.com and GoCardless (now an internal entity post-close)
              represent less immediate competitive risks, but the combined Mollie-GoCardless entity must defend market
              share across more segments. SumUp and Square continue to erode the micro-merchant tail. Mollie's
              ACM-supervised market position in Dutch digital payments adds an additional regulatory overlay: the Dutch
              competition authority monitors potential concentration risks in fintech infrastructure.
