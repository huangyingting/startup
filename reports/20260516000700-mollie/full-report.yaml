  foundingLocation: Amsterdam, Netherlands
  headquarters: Amsterdam, Netherlands
  productSummary: >-
    Mollie provides a developer-friendly payments API covering Visa/Mastercard card acquiring, local European payment
    methods (iDEAL, Bancontact, SOFORT, EPS, Klarna BNPL), SEPA bank transfers, and post-GoCardless acquisition, direct
    debit and open-banking payment initiation via Variable Recurring Payments (VRPs). Merchant clients integrate via
    REST API, hosted checkout, or a wide ecosystem of platform plugins (WooCommerce, Shopify, Magento, PrestaShop).
  customerFocus: >-
    SME and mid-market e-commerce and subscription merchants primarily in the Netherlands, Belgium, Germany, UK, and
    France; expanding into Scandinavia and Southern Europe.
