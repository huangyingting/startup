  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - factor
      - type
      - mechanism
      - strength
      - horizon
    rows:
      - - Rising European e-commerce penetration
        - driver
        - >-
          More consumer spending migrating online creates new merchant demand; ECB SPACE 2024 confirms growing digital
          payment share across all euro-area countries
        - high
        - ongoing (3–5 years)
      - - Cross-border e-commerce expansion
        - driver
        - >-
          Merchants selling internationally need multi-currency and multi-method PSP coverage; Mollie's 35+ method
          library directly addresses this
        - high
        - ongoing (3–5 years)
      - - Open banking, PSD2, and PSD3 regulation
        - driver
        - >-
          Regulatory mandate for strong customer authentication accelerates migration from legacy bank flows to licensed
          PSP rails; PSD3/PSR pipeline will further standardize access
        - medium
        - medium-term (2–4 years)
      - - EU Instant Payments Regulation
        - driver
        - >-
          Requires banks to offer SEPA instant transfers at no extra cost; expands real-time payment infrastructure that
          licensed EMIs like Mollie can leverage for account-to-account flows
        - medium
        - medium-term (2–4 years)
      - - BNPL and embedded finance growth
        - driver
        - >-
          Buy-now-pay-later adoption growing among younger European consumers; Mollie's Klarna partnership brings BNPL
          to merchant base without Mollie assuming credit risk
        - medium
        - ongoing (2–5 years)
      - - SaaS platform and embedded payments growth
        - driver
        - >-
          Vertical SaaS growth creates high-leverage distribution; each SaaS platform integration via Connect for
          Platforms brings many downstream merchants
        - high
        - ongoing (3–5 years)
      - - High PSP switching costs once integrated
        - constraint
        - >-
          Technical switching costs—plugin replacement, re-testing, downtime risk—create merchant inertia; checkout
          integrations are stickier than standard SaaS subscriptions
        - high
        - structural
      - - European payment method fragmentation
        - constraint
        - >-
          Each new country requires local scheme membership, method support, and localized support staff; slows
          geographic expansion for any PSP
        - medium
        - structural
      - - Margin compression on commodity card processing
        - constraint
        - >-
          Interchange regulation and intensifying competition erode PSP take rates on standard Mastercard/Visa
          transactions; must be offset through premium method volumes and value-added services
        - medium
        - medium-term (2–3 years)
      - - Large incumbent expansion down-market
        - constraint
        - >-
          Adyen and Stripe have expanded SMB products; Stripe's pay-per-transaction model directly overlaps Mollie's
          core segment; increasing competitor investment may erode Mollie's differentiation
        - high
        - ongoing
    notes: >-
      Strength ratings (high/medium/low) reflect qualitative assessment of market impact magnitude, not probability.
      Drivers and constraints are not mutually exclusive; switching costs benefit Mollie after merchant acquisition but
      also protect Adyen/Stripe from Mollie's encroachment at mid-market.
