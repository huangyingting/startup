      - number: '3.4'
        title: Competitive moats and durability assessment
        blocks:
          - type: paragraph
            body: >-
              Mollie's primary competitive moat is its depth of European local payment method coverage—35+ methods
              including iDEAL (Netherlands), Bancontact (Belgium), EPS (Austria), Przelewy24 (Poland), BANCOMAT Pay
              (Italy), and others—that no single competitor replicates at comparable breadth with comparable SMB
              onboarding simplicity. This local method depth creates merchant stickiness because switching PSPs requires
              re-integrating all local methods, testing checkout flows across countries, and renegotiating contracts.
              Switching costs are further amplified by Mollie's deep plugin integrations with Shopify, WooCommerce,
              Magento, and PrestaShop, where replacement requires coordination with e-commerce platform providers.

              Adyen's moat is built on unified commerce infrastructure—a single platform spanning online, in-store, and
              embedded finance—that creates deep lock-in for enterprise clients. Once an enterprise deploys Adyen across
              its POS and e-commerce estate, switching costs are very high. Adyen's embedded finance products (Capital,
              Accounts, Issuing) add additional cross-sell revenue that increases switching costs further.

              Stripe's moat stems from developer mindshare and its ecosystem of 100+ payment methods, financial
              products, and third-party apps. The Stripe App Marketplace, along with financial products like Stripe
              Capital, creates a platform ecosystem that makes Stripe significantly more than a payment processor. This
              breadth raises switching costs for technology companies that have integrated deeply with Stripe's suite.

              The key risk to Mollie's moat is downmarket pressure from Adyen's growing SMB push—Adyen partnered with
              BILL for SMB financial services in 2024—and Stripe's broad feature set that increasingly covers local
              European payment methods. If either scales their SMB acquisition motion effectively, Mollie's addressable
              merchant base could face attrition. Checkout.com's enterprise focus and SumUp's micro-merchant focus
              represent less immediate threats to Mollie's core.
