      - number: '8.3'
        title: Scenario Analysis and Return Framework
        blocks:
          - type: paragraph
            body: >-
              We model three valuation scenarios anchored to three revenue trajectories and two exit route assumptions:
              IPO on Euronext Amsterdam or strategic/financial acquisition. In the bull case (probability 25%), Mollie
              leverages GoCardless to establish pan-European open-banking dominance as PSD3 comes into force; revenue
              reaches €600M+ by 2028 with GP margins expanding to 60%+, supporting an IPO at 12–15x NTM revenue and an
              enterprise value of €7–9B. Investor IRR from the implied Series C basis of approximately €2.5B (estimated
              current secondary fair-value basis) would reach 25–35% annually over a 3–4 year horizon.

              In the base case (probability 50%), integration executes on plan with modest synergies; revenue reaches
              €400–450M by 2028; the combined entity is acquired by a strategic buyer or PE at €4–5B, implying investor
              IRR of 12–18%. In the bear case (probability 25%), GoCardless integration drains management attention;
              Adyen and Stripe erode the SME core; revenue stalls at €250–300M; IPO is delayed to 2029+; valuation
              compresses to €2.5–3.0B, and investors at the Series C basis earn near-flat or negative real returns. The
              probability-weighted expected value across the three scenarios is approximately €4.4B, which is broadly
              consistent with our base-case fair value range and supports a conditional buy thesis at entry valuations
              at or below €4.0B.
