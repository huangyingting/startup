  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Recommendation
        blocks:
          - type: paragraph
            body: >-
              Mollie's investment thesis rests on four interlocking propositions: (1) it is the leading SME-focused
              payments platform in Europe by merchant count, with a 35+ payment-method breadth that creates switching
              costs and network effects; (2) it achieved operational profitability — positive EBITDA — in FY2024 for the
              first time, demonstrating that the unit-economic model works at scale; (3) the GoCardless acquisition
              provides a credible path to open-banking and bank-transfer dominance across the UK and continental Europe
              as PSD3 expands open-banking mandates; and (4) fintech valuation multiples, while compressed from 2021
              peaks, have stabilised, creating a more rational entry-point environment for late-stage investors.

              Against these positives, the bear case is real. The €5.4B Series C valuation set at peak-2021 fintech
              euphoria implies that even a fully successful exit may generate only modest IRR for 2021-vintage investors
              unless revenue re-accelerates materially. GoCardless integration risk is the single largest near-term
              execution overhang: the acquisition cost of ~£1.6B (~€1.85B) is more than 16x Mollie's 2024 gross profit,
              an ambitious multiple demanding disciplined synergy realisation. Adyen's sustained expansion into the SME
              segment and Stripe's accelerating European push constrain the competitive moat. Our base case assigns a
              fair value of €4.0–5.0B (7–8x estimated 2026 NTM revenue of ~€260M), with a recommendation to acquire at
              valuations below €4.0B and monitor quarterly against the kill triggers defined in Section 5.
