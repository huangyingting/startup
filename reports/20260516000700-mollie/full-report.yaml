  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model and streams
        blocks:
          - type: paragraph
            body: >-
              Mollie's revenue model is a pay-per-transaction architecture with no mandatory monthly subscription at the
              standard tier, meaning the company earns only when merchants process payments. This design lowers the
              adoption barrier for SMEs but ties top-line growth directly to merchant volume and European e-commerce
              activity. The primary revenue driver is card processing on Visa and Mastercard rails, where Mollie charges
              1.8% plus €0.25 per transaction — a blended rate that generates the highest revenue per transaction of any
              method in the portfolio. Local payment methods, principally iDEAL (€0.29 flat, dominant in the
              Netherlands), Bancontact (0.7% plus €0.10, standard in Belgium), and SEPA Direct Debit (€0.35 flat),
              collectively represent an estimated 20–25% of revenue and are high-volume but lower-margin than card.

              Beyond payment method economics, Mollie monetizes additional surfaces: BNPL via a Klarna facilitation
              arrangement (~2.99% plus €0.35), Connect for platform sub-merchant routing, and Mollie Capital for
              merchant cash advances. Card processing is estimated to represent 50–60% of gross revenue. Local methods
              and SEPA account for 20–25%, and BNPL, Connect, and Capital represent the remaining 15–30%. Both Connect
              and Capital are positioned as strategic growth vectors by management, but their revenue contributions are
              not publicly disclosed in granular form. The 250,000+ merchant base implies revenue per merchant of
              approximately €856 annually, with estimated total payment volume of €20–30B based on a 0.7–1.0% blended
              take rate.
