      - number: '8.4'
        title: Key Performance Indicators and Financial Milestones
        blocks:
          - type: paragraph
            body: >-
              The investment thesis depends on Mollie sustaining ≥20% annual revenue growth in the base case over the
              2025–2028 horizon. The company achieved 28% in FY2024 and 36% in FY2023, demonstrating consistent top-line
              momentum. Gross profit of €115M in FY2024 at a 54% gross margin is the clearest unit-economic signal that
              Mollie's payment-method economics work at scale; maintaining or expanding this margin as GoCardless
              bank-transfer volumes (lower take-rate) are absorbed into the consolidated P&L is a key monitoring
              variable. First positive EBITDA in FY2024 is a critical milestone: it demonstrates that operating leverage
              exists in the model, even if the EBITDA dollar amount has not been publicly disclosed.

              The GoCardless acquisition introduces a discrete capital consumption event. At ~£1.6B, the acquisition
              price exceeds Mollie's total gross profit by more than 16x, implying a payback horizon measured in decades
              at current standalone margins without synergies. The thesis therefore depends explicitly on synergy
              realisation: combined open-banking and bank-transfer volume, cross-sell of Mollie's payment method breadth
              to GoCardless's recurring-payment merchants, and potential cost rationalisation. KPIs we would monitor
              quarterly include: (a) combined group revenue growth rate, (b) GP margin trajectory, (c) EBITDA margin and
              path to Group EBITDA positivity, (d) merchant churn rate at both Mollie and GoCardless legacy networks,
              (e) integration milestone achievement, and (f) regulatory capital adequacy ratios under DNB and FCA
              oversight.
