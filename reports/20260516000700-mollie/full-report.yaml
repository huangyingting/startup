  - id: FU004
    title: Retention / repeat cohort
    type: cohort
    layout: wide
    summary: >-
      This cohort table presents estimated merchant retention rates by cohort group and year, constructed from
      structural inference and available proxy signals rather than disclosed Mollie retention data. Connect platform
      customers show the highest estimated retention given deep API integration switching costs; micro-merchants show
      the lowest given minimal switching costs and high competitor alternatives at the low end of the market. All
      figures are analyst estimates pending data room disclosure of actual NRR and GRR metrics.
    data:
      columns:
        - '2022'
        - '2023'
        - '2024'
