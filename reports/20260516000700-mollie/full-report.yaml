      - number: '7.2'
        title: Operational and Technology Risk
        blocks:
          - type: paragraph
            body: >-
              Mollie's operational risk profile is dominated by its dependence on third-party payment infrastructure and
              cloud services. Card payments on Visa and Mastercard rails account for the largest share of transaction
              volume; any rail outage or access restriction cascades immediately to all merchants on the platform. SEPA
              and SWIFT dependencies similarly expose Mollie to settlement delays or systemic disruption beyond its
              control. The company operates on AWS cloud infrastructure, creating a single-cloud-provider concentration
              risk: an AWS regional failure could produce a platform-wide outage affecting all 250,000+ merchants
              simultaneously, generating merchant churn, contractual exposure, and reputational damage.

              Geographic concentration amplifies operational volatility: the Netherlands represents approximately 40-50%
              of Mollie's estimated revenue, with Benelux and Germany together comprising 75%+ of the total. A
              significant decline in Dutch e-commerce activity or a regulatory incident in that market would
              disproportionately impact the business. Cybersecurity risk is elevated for any payments processor:
              Mollie's cardholder data creates a high-value target for adversaries, and PCI DSS compliance is a minimum
              standard rather than a ceiling. A data breach could trigger regulatory fines, PCI DSS remediation costs,
              and merchant exodus. Fraud and chargeback exposure is an ongoing operating cost whose magnitude Mollie has
              not publicly disclosed; the lack of public loss-rate data makes this risk difficult to benchmark against
              peers. DORA's incident reporting requirements mean that future operational failures will become more
              transparent to regulators, increasing the reputational stakes of any outage event.
