      - number: '6.3'
        title: Retention, satisfaction, and concentration risk
        blocks:
          - type: paragraph
            body: >-
              Net Revenue Retention and Gross Revenue Retention figures are not publicly disclosed by Mollie, consistent
              with the norms for late-stage private fintech companies but representing a significant gap for investor
              diligence. The absence of cohort-level retention data means that historical expansion revenue per merchant
              cohort cannot be independently verified and estimated lifetime values rely on structural inference rather
              than disclosed metrics. For reference, Adyen's publicly reported NRR consistently exceeds 100%, providing
              a benchmark against which Mollie's undisclosed NRR should be assessed in a data room context.

              Third-party satisfaction data presents a mixed picture. G2 reviews rate Mollie at approximately 3.8–4.0
              out of 5 stars, with ease of integration and transparent pricing as the leading positive attributes and
              slow customer support response time and limited live support availability as the leading negative themes.
              Mollie's Trustpilot rating is approximately 1.7 out of 5 as of mid-2026, which appears low in absolute
              terms but is consistent with the pattern for high-volume SMB PSPs: the self-serve model at scale generates
              a high volume of complaint reviews from merchants experiencing transaction disputes, account limitations,
              or support friction, while satisfied merchants are less motivated to post reviews. Dutch technology
              publication Tweakers corroborates the support friction narrative, reflecting SMB merchant frustration with
              support access at scale. These signals represent reputational risk but are not reliable churn predictors.

              Structural retention mechanisms partially compensate for the mixed satisfaction scores. Merchants
              integrated via WooCommerce, Shopify, or Magento plugins face meaningful switching costs because migrating
              to an alternative PSP requires plugin replacement and checkout re-testing. Connect platform
              customers—marketplaces and SaaS operators routing sub-merchant payments—have even higher switching costs
              given the deep API integration required by the Connect architecture. Merchants using Mollie Capital
              alongside core payments have additional product stickiness through the financing relationship. Bancontact
              support creates structural lock-in for Belgian merchants who require this dominant local payment method.

              Revenue concentration risk is estimated at 60–80% of total payment volume from the top 20% of merchants,
              with the long tail of micro-merchants contributing minimal individual revenue. Netherlands concentration
              at 35–45% of merchant base is the most significant single-country risk. The WooCommerce plugin's
              100,000-plus installs represent a single-channel distribution dependency that could be impacted if
              WooCommerce's market share shifts materially. Post-GoCardless, merchant diversity increases and geographic
              concentration should dilute as UK and Irish merchants join the combined base.
