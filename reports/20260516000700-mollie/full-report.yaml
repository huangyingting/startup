  - id: FE004
    title: Product maturity / capability map
    type: matrix
    layout: wide
    summary: >-
      Mollie is mature in online checkout, recurring payments (SEPA DD), and platform/Connect but still growing in
      in-person POS and early-stage in lending and AI-native capabilities. Adyen leads in in-person POS and overall
      enterprise maturity; Stripe matches Mollie in online and recurring but lags in direct BNPL and AI-native.
      GoCardless dominates recurring/direct debit but is limited in online checkout and absent from POS, lending, and
      AI. SumUp leads in POS but is limited across all other dimensions. The matrix confirms Mollie's differentiated
      position as the broadest European SMB multi-channel payments platform.
    data:
      columns:
        - Online checkout
        - Recurring
        - In-person POS
        - Platform / Connect
        - BNPL
        - Lending
        - AI-native
      rows:
        - label: Mollie
          values:
            - Mature
            - Mature
            - Growing
            - Mature
            - Via Klarna
            - Early
            - Early
        - label: Adyen
          values:
            - Mature
            - Mature
            - Mature
            - Mature
            - Via partners
