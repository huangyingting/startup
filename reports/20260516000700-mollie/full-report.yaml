      - number: '8.5'
        title: Thesis-Break Triggers and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              We identify five thesis-break triggers — observable events that, if they materialise, would require us to
              revise our base-case recommendation to a hold or exit. First, if combined merchant churn in the twelve
              months following the GoCardless acquisition close exceeds 15% at either legacy network, the integration is
              destroying value faster than the synergy case can absorb. Second, if revenue growth decelerates below 15%
              in either FY2025 or FY2026 (on a combined basis), the competitive dynamics have shifted against Mollie.
              Third, any DNB or FCA supervisory action placing conditions on Mollie's or GoCardless's operating licenses
              would threaten the core business model. Fourth, if EBITDA turns negative in FY2025 due to integration
              costs exceeding our estimates, the profitability milestone would be reversed. Fifth, if GoCardless's FCA
              payment institution authorisation faces a material restriction or enforcement action related to its
              open-banking model, the bull-case open-banking thesis is invalidated.

              Final diligence asks before commitment include: (1) audited 2024 consolidated accounts including
              post-acquisition GoCardless stub period; (2) merchant churn rate and cohort LTV data for both Mollie and
              GoCardless legacy books; (3) detailed synergy plan with timelines and confidence intervals; (4) regulatory
              capital adequacy analysis under DORA and combined-group FCA/DNB requirements; (5) GoCardless FCA status
              including any ongoing regulatory correspondence; (6) revenue breakdown by geography and payment method for
              the combined entity; and (7) integration technology roadmap and unified-platform delivery timeline.
