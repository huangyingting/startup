      - number: '3.2'
        title: Specialist and adjacent competitors
        blocks:
          - type: paragraph
            body: >-
              Several specialist competitors address adjacent segments. GoCardless (founded 2011, London) built the
              world's bank payment network for recurring payments, used by over 100,000 businesses across 30+ countries.
              Its core strength is automated bank debit collection via open banking and direct debit schemes, processing
              recurring subscriptions and invoice payments for SaaS, utilities, and professional services companies.
              Mollie's December 2025 announcement of a £1.6 billion acquisition of GoCardless represents a
              transformative strategic move that would combine Mollie's card and local-method depth with GoCardless's
              bank payment and open-banking capabilities, creating a unified platform competing across the full spectrum
              of European payment types.

              SumUp (founded 2012, London) targets micro-merchants and small businesses with point-of-sale hardware and
              a simple 1.69% flat-rate card processing model across 37 countries. SumUp's go-to-market centers on
              physical hardware distribution, app simplicity, and vertical integrations for food service and retail; it
              does not compete meaningfully in online checkout or platform-embedded payments where Mollie is strongest.

              Legacy European processors including Worldline (public, founded 1972, France) and Ingenico dominate the
              enterprise acquiring and banking infrastructure space but are not direct competitors for SMB digital
              commerce onboarding. PayPal (public, US) maintains a large consumer brand and merchant payment solutions
              offering but its complexity, higher pricing, and consumer-first brand positioning make it a less preferred
              PSP for API-first SMB merchants building digital commerce workflows.
