  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape and direct peers
        blocks:
          - type: paragraph
            body: >-
              Mollie operates in a tiered competitive landscape within European payment processing. At the top tier,
              Adyen (founded 2006, Amsterdam) and Stripe (founded 2010, US/Ireland dual-HQ) are global leaders with
              substantial European presences. Adyen is a publicly listed company on Euronext Amsterdam with
              approximately 4,345 employees (2024) and net revenue exceeding €2.4 billion on an annualized basis (based
              on Q3 2025 net revenue of €598.4 million at 20% YoY growth). Adyen's pricing model centers on an
              Interchange-plus structure starting at $0.13 per transaction plus scheme fees, optimized for enterprise
              and mid-market merchants transacting at high volumes. Adyen processed over $1 trillion in payment volume
              in recent years, serves clients including eBay, McDonald's, and Airbnb, and provides a unified commerce
              solution spanning online, in-store, and embedded finance.

              Stripe, founded by Irish-American brothers Patrick and John Collison, processed $1.9 trillion in payments
              in 2025—a 34% year-on-year increase—for five million businesses worldwide. Stripe's February 2026
              valuation of $159 billion makes it the largest privately held fintech globally. With 8,500 employees and
              support for 135+ currencies and payment methods, Stripe's developer-first approach and broad ecosystem of
              100+ payment methods have made it the default choice for global technology startups and large enterprises
              alike. Stripe's UK pricing is 2.5% plus 20p for EU-issued cards, making it broadly comparable to Mollie
              for standard card transactions but with less depth in European local payment methods.

              In the mid-tier, Checkout.com (founded 2009, London, CEO Guillaume Pousaz) was valued at approximately $40
              billion in its January 2022 Series D funding round, making it Europe's second most valuable private
              startup at the time. Checkout.com targets high-volume, high-growth enterprise and mid-market merchants
              requiring custom pricing and dedicated account management—a segment that does not overlap strongly with
              Mollie's SMB core.
