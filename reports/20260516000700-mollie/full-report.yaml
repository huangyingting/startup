      - number: '1.2'
        title: Leadership, governance, and key-person assessment
        blocks:
          - type: paragraph
            body: >-
              Mollie is led by CEO Koen Köppen, who was confirmed in that role in the June 2025 press release announcing
              2024 financial results. Köppen succeeded Shane Happach, who joined as CEO in June 2021 at the time of the
              Series C funding and departed in or around early 2023. The leadership transition was reported adversely at
              the time by fintech media, representing a material key-person event in the company's recent history. As of
              the 2024 results announcement, Köppen expressed confidence in Mollie's growth trajectory and product
              roadmap and has been publicly the face of the company through the GoCardless acquisition announcement and
              Wero partnership.

              Board composition and governance details are not fully disclosed in public materials. Mollie is a private
              company and does not publish a full board or cap-table. Investors with likely governance rights include
              Blackstone Growth, EQT Growth, General Atlantic, HMI Capital, Alkeon Capital, and TCV (which led the prior
              Series B in September 2020). Adriaan Mol, the founder, holds an undisclosed ownership position; his
              current operational role is not stated in public materials, and no board seat or executive role has been
              publicly confirmed for the post-2021 period.

              Key-person risk is concentrated at the CEO level given the 2021–2023 leadership transition history. The
              current CEO is the public face of a company undergoing a material acquisition and integration process.
              Governance risk is partially mitigated by the presence of established institutional investors with likely
              board seats and significant capital at stake. The absence of public financial statements, an audited
              annual report, or a disclosed cap-table means governance oversight cannot be fully assessed from public
              evidence alone.
