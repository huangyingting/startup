      - number: '1.4'
        title: Scale, geographic footprint, and milestones
        blocks:
          - type: paragraph
            body: >-
              As of the 2024 annual results announcement (June 3, 2025), Mollie serves 250,000+ customers including
              well-known brands such as Gymshark, Maison du Monde, KoRo, Veloretti, HEMA, Rituals, O'Neill, and Q-Park,
              as well as a large base of local small and mid-market merchants across Europe. The 850-person team is
              distributed across Europe with offices in Amsterdam (HQ), Germany, Belgium, UK, France, and
              Lisbon/Portugal. Mollie describes itself as one of Europe's fastest-growing fintech companies, and its
              geographic expansion cadence in 2024–2025 supports that characterization: new market entries include Italy
              in 2024 and Sweden, Poland, Portugal, Norway, Denmark, Finland, Hungary, and Slovenia in 2025.

              Key milestones from Mollie's public chronology include: founding in 2004 in Amsterdam; a Series B led by
              TCV in September 2020; the €665M Series C in June 2021; the 2022–2023 CEO transition from Shane Happach to
              Koen Köppen; the 2023 launch of MollieGPT and Mollie Terminal; the 2024 launch of Tap to Pay and Mollie
              Invoicing and the first positive EBITDA since 2018; the December 2025 announcement of the GoCardless
              acquisition; and the January 2026 EPI Principal Member announcement enabling Wero distribution. This
              chronology establishes Mollie as a company that has survived a major leadership transition, maintained
              growth, and returned to EBITDA profitability while executing geographic expansion across a dozen new
              markets.

              The company's public financial trajectory shows net revenue growing from €99M in 2023 (+36% YoY) to €214M
              in 2024 (+28% YoY), with gross profit rising to €115M (+30%) and EBITDA turning positive for the first
              time since 2018. Total payment volume (TPV) has not been publicly disclosed for recent years, though the
              2021 target of 20B EUR was stated at time of the Series C. These metrics represent strong operational
              progress but are not audited and were disclosed only via press releases.
