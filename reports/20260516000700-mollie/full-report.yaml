companyProfile:
  summary: >-
    Mollie is a Dutch payment service provider and e-money institution (EMI) founded in 2004 and headquartered near
    Amsterdam. It operates a unified payments API used by 250,000+ European SME and mid-market merchants to accept card
    payments, local European methods (iDEAL, Bancontact, SOFORT, Klarna), and bank transfers. Mollie raised €665M at a
    €5.4B valuation in June 2021 and reached its first positive EBITDA in 2024 on €214M revenue (+28% YoY). In December
    2025 it acquired UK open-banking leader GoCardless for approximately £1.6B, adding direct debit and open-banking
    payment initiation to its product portfolio.
  foundedDate: '2004-01-01'
  founders:
    - name: Adriaan Mol
      role: Founder
      background: Serial Dutch entrepreneur; founded Mollie as a payment gateway for Dutch developers.
      claimRefs:
