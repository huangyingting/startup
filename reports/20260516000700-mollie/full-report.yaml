      - number: '1.3'
        title: Funding history and capital structure
        blocks:
          - type: paragraph
            body: >-
              Mollie's most significant financing event was the Series C announced on June 17, 2021: €665M (US$800M),
              led by funds managed by Blackstone Growth (BXG), with co-investors EQT Growth, General Atlantic, HMI
              Capital, Alkeon Capital, and TCV (which had led the prior Series B in September 2020). At closing, the
              round valued Mollie at US$6.5B / approximately €5.4B, making it one of the top five most valuable
              privately held fintechs in Europe at the time according to CBInsights data cited in the company's own
              press release. Total capital raised at the time of the Series C announcement was stated as over US$940M /
              €780M; subsequent rounds or secondary transactions have not been publicly announced, and current total
              capital raised is estimated at approximately €850M including all prior rounds.

              At the time of the Series C, Mollie had approximately 480 employees, 120,000 monthly active merchants, and
              had processed more than 10 billion euros in transactions in 2020, with a target of more than 20 billion
              euros in 2021. The announced use of proceeds was international expansion, team growth, and product and
              engineering investment. Subsequent geographic expansion into Spain, Norway, Denmark, Finland, Hungary,
              Slovenia, Sweden, Poland, Portugal, and Italy confirms material deployment of that capital into new market
              entry. The company has not publicly announced a Series D or any new external financing since the 2021
              Series C, though private transactions or debt facilities cannot be ruled out.

              The pending acquisition of GoCardless (announced December 11, 2025) is expected to close mid-2026 subject
              to regulatory approvals. Financial terms of the GoCardless transaction were not publicly disclosed. Upon
              close, the combined entity would serve 350,000+ businesses across Europe, representing a meaningful
              merchant-count uplift. The EPI/Wero Principal Membership announced January 8, 2026 requires ongoing
              investment and integration but is not a separate financing round.
