      - number: '5.3'
        title: Trust, security, compliance, and quality
        blocks:
          - type: paragraph
            body: >-
              Mollie holds PCI-DSS Level 1 certification—the highest tier of the Payment Card Industry Data Security
              Standard—covering its full cardholder data environment and renewed annually through independent auditing.
              This certification reduces merchant compliance scope when using Mollie's hosted checkout to SAQ-A level,
              the lightest compliance class, materially lowering the security burden for non-technical merchants. Mollie
              is also ISO 27001 certified for information security management, meeting the global standard for
              systematic security controls across people, processes, and technology. Strong Customer Authentication
              under PSD2 is implemented via 3D Secure 2.0 (3DS2), which applies to EU card transactions above thirty
              euros and supports SCA exemptions for low-risk and low-value transactions, minimizing payment friction
              while meeting regulatory requirements.

              Mollie operates under a Dutch DNB payment institution license and an FCA Electronic Money Institution
              authorization in the UK, with actively managed regulatory perimeters across its operating markets. In
              January 2026, Mollie gained acceptance as a principal member of EPI (European Payments Initiative),
              securing direct membership in the Wero instant payment scheme—a material addition to its regulatory and
              network standing. Data privacy compliance under GDPR is maintained through EU-based data residency and
              publicly available Data Processing Agreements.

              Third-party quality signals are broadly positive: G2 and GetApp merchant reviews report satisfaction
              ratings of 3.8 to 4.0 stars or above, with integration ease and customer support cited as leading
              differentiators. Operational incidents are transparently disclosed through status.mollie.com, evidencing a
              mature approach to service communication. The Mollie WooCommerce plugin's 100,000+ active installs and
              Amex POS acceptance added in 2024 further demonstrate product execution quality across both software and
              partnership dimensions.
