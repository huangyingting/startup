      - number: '4.2'
        title: Unit economics and margin profile
        blocks:
          - type: paragraph
            body: >-
              Mollie's public financial disclosures for 2024 provide a cleaner unit-economics picture than any prior
              year. Net revenue reached €214M, a 28% year-over-year increase from an implied €167M in 2023, which itself
              grew 36% from 2022. Gross profit came in at €115M, representing a gross margin of approximately 54% and a
              30% increase year-over-year. These figures are company-disclosed via the Mollie newsroom and corroborated
              by independent fintech coverage. The gross margin of ~54% compares modestly unfavorably to Adyen's 57–60%
              range, a gap explained by Mollie's higher concentration of lower-margin local payment methods such as
              iDEAL and SEPA versus Adyen's enterprise-weighted card mix.

              Gross margin has expanded from an estimated ~50% in 2022 to 54% in 2024, a trajectory driven by favorable
              revenue mix shift: card and Connect revenue, which carry higher margins than flat-fee iDEAL and SEPA
              transactions, grew proportionally faster. The primary cost-of-revenue item is interchange and card scheme
              fees passed to Visa, Mastercard, and local networks, which are partially but not fully passed through to
              merchants in Mollie's blended pricing. The 2024 EBITDA milestone — first positive since 2018 — signals
              that fixed operating expenses (technology, headcount, compliance) have been brought below gross profit for
              the first time. The EBITDA amount is not publicly disclosed. With ~850 employees, implied revenue per FTE
              is approximately €252,000, a reasonable level for a payments platform at this stage. Net profit and free
              cash flow remain undisclosed, constituting the most significant financial diligence gap below the EBITDA
              line.
