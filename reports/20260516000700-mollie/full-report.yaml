chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and business model
        blocks:
          - type: paragraph
            body: >-
              Mollie is a financial technology group headquartered in Amsterdam, Netherlands, incorporated as Mollie
              B.V. and operating under the mission to make payments and money management effortless for every business
              in Europe and the UK. The company was founded in 2004 by Adriaan Mol, who sought to eliminate the
              financial bureaucracy that made accepting digital payments unnecessarily complex and expensive for small
              and mid-market businesses. Over more than two decades, Mollie has grown from a Dutch payment
              simplification tool into a full-service European payments platform serving more than 250,000 merchants
              across more than a dozen markets.

              The business model is primarily transaction-driven: Mollie earns a per-transaction processing fee on each
              payment it processes, with pricing varying by payment method and volume tier. Beyond the core payments
              layer, the company offers premium financial products including Mollie Capital (revenue-based financing
              disbursed within 24 hours), Mollie Subscriptions (recurring billing), Mollie Terminal (in-person
              payments), Mollie Invoicing (automated invoicing), and Mollie Connect (embedded payments for platforms,
              marketplaces, fintechs, and banks). Merchants adopting these additional products were growing 60% faster
              than base-payment customers as of mid-2025, indicating strong cross-sell economics and sticky customer
              relationships.

              Mollie's single-integration checkout supports 35–40+ payment methods, spanning global standards (Visa,
              Mastercard, Apple Pay, Google Pay, PayPal, American Express, Klarna BNPL) and hyperlocal European methods
              (iDEAL, Bancontact, SEPA Bank Transfer, Giropay, EPS, Wero, MobilePay, Vipps). This breadth in a single
              API is a core differentiation versus enterprise-oriented rivals like Adyen and general-purpose global
              players like Stripe, which offer less local-method depth out of the box. Mollie's developer-first design
              ethos, no-lock-in contracts, and transparent pricing are explicitly positioned against the opacity and
              complexity of legacy payment providers.
