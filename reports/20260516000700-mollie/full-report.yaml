      - number: '4.3'
        title: Capital structure and funding
        blocks:
          - type: paragraph
            body: >-
              Mollie's capital structure reflects a single large institutional equity raise in mid-2021, when the
              company closed a €665M Series C at a post-money valuation of approximately €5.4B. The round was led by
              Blackstone Growth and included EQT Growth, General Atlantic, TCV, and HMI Capital — a consortium of
              blue-chip institutional growth investors that signals high conviction in the European payments
              opportunity. That capital was deployed over three years of investment in product, headcount, and European
              market expansion, during which the company sustained EBITDA losses before achieving profitability in 2024.
              No subsequent public equity or debt raise has been announced since the Series C.

              The transformative capital event since the Series C is the announced GoCardless acquisition in December
              2025 at approximately £1.6B. This acquisition adds direct debit and open-banking recurring payment
              capabilities, expands the combined merchant base to approximately 325,000+, and strengthens Mollie's
              position in the UK and Continental European markets. The implied acquisition multiple is approximately
              20–23x GoCardless's estimated £70–80M in 2024 revenues, which is rich even by fintech standards and
              introduces both integration execution risk and capital adequacy uncertainty. Mollie holds a Payment
              Institution license from De Nederlandsche Bank and FCA e-money institution authorization in the UK,
              providing the regulatory foundation for cross-border expansion. As of May 2026, no IPO has been announced;
              the GoCardless integration is the primary capital market focus.
