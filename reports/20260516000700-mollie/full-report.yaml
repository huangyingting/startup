  - id: TM001
    title: Market definition table
    columns:
      - dimension
      - definition
      - included
      - excluded
      - adjacency or note
    rows:
      - - E-commerce checkout payments
        - Online payment acceptance at merchant checkout via API or plugin integration
        - Card, bank-transfer, digital wallet, BNPL, and local-method transactions at checkout
        - Enterprise direct-acquiring contracts; pure card-scheme relationships
        - Core monetization lane; 35+ payment methods available
      - - In-person POS payments
        - Physical point-of-sale via Tap to Pay on iPhone and card terminals
        - Contactless and card-present transactions at physical merchant locations
        - Traditional bank POS terminals; standalone EFTPOS networks
        - Growing omnichannel complement to e-commerce offering
      - - Recurring and subscription payments
        - Automated collection via SEPA Direct Debit or stored payment method
        - Subscription billing, SaaS renewals, membership fees
        - One-time manual bank transfers; paper direct debit mandates
        - Relevant for SaaS and subscription-commerce merchants
      - - Payment links and invoicing
        - Standalone payment request sent via link or email
        - One-off B2B invoice payments; freelancer billing
        - Fully integrated checkout; bank wire outside the platform
        - Addresses service-sector merchants without e-commerce storefront
      - - Embedded payments (Connect for Platforms)
        - Payment facilitation embedded inside third-party SaaS or marketplace products
        - Sub-merchant accounts, split settlements, platform fee collection
        - Enterprise treasury and FX; direct acquiring contracts
        - Fast-growing adjacent segment; higher unit economics per platform
      - - Status-quo substitutes (excluded from TAM)
        - Legacy bank gateways, cash-on-delivery, manual SEPA bank transfers
        - Incumbent flows displaced when merchants migrate to Mollie
        - Not part of Mollie's direct revenue; represent displacement opportunity
        - Common in Germany and Netherlands; significant remaining share of SMB invoicing
    notes: >-
      The practical underwriting boundary covers the four active monetization lanes plus the embedded platforms channel.
      Legacy substitutes represent the displacement opportunity rather than direct PSP competition.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
