      - number: '8.2'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >-
              The most relevant listed peer for Mollie is Adyen N.V. (AMS: ADYEN), the only large-cap European pure-play
              payments company. Adyen trades at approximately 18x NTM revenue on FY2025 consensus estimates of ~€2.0B
              revenue and a market cap of ~€36B as of Q1 2026. This multiple reflects Adyen's superior EBITDA margin
              (~47%), global enterprise client base, and direct acquiring scale — attributes that justify a structural
              premium over Mollie. Applying Adyen's multiple to Mollie mechanically yields an implausible €4.7B+ at 18x
              2026 NTM revenue of €260M; in practice, a 50–65% discount is warranted for private-company illiquidity,
              smaller scale, higher SME client concentration, and integration execution risk, producing a
              comparable-derived range of €1.6–2.4B on a pure discount basis or €3.5–5.0B blending discount and synergy
              value.

              Among private peers, Stripe's $65B→$95B secondary valuation trajectory and Checkout.com's ~$40B→$10–12B
              write-down cycle bracket the range of outcomes for late-stage fintech unicorns. Checkout.com's de-rating —
              from a peak $40B down to an estimated $10–12B by 2024 on reported write-downs by its investors — is the
              most relevant cautionary comparable: a company with comparable European payments exposure that raised at
              euphoric multiples, missed growth targets, and saw investors mark down their positions by 75–80%. Nuvei,
              taken private at $6.3B in November 2023 at ~5–7x NTM revenue, provides a live market-clearing precedent
              for a profitable European payments business in a normalised rate environment. SumUp, last valued at €8B in
              2022, has not repriced publicly but faces similar SME-focused competitive dynamics. A blended peer median
              of ~7–9x NTM revenue for a profitable, growing European payments platform justifies our €4.0–5.0B base
              case.
