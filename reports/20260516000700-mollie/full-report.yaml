  - id: FE001
    title: Product architecture map
    type: stack
    layout: wide
    summary: >-
      Mollie's technology architecture comprises five layers, from merchant-facing touchpoints down to banking rails and
      scheme infrastructure. Each layer depends on the one below it, with the compliance and security layer cutting
      across all layers as a cross-cutting concern. The banking and scheme rail layer represents the primary external
      dependency and systemic risk concentration.
    data:
      items:
        - id: layer1
          label: Merchant Touchpoint Layer
          detail: >-
            Mollie Dashboard (analytics, refunds, reporting), Mollie Checkout (hosted payment page), Mollie POS app
            (iPhone tap-to-pay), and API console (developer testing and management)
          tone: neutral
        - id: layer2
          label: Integration Layer
          detail: >-
            REST API (OpenAPI 3.0), 7 official SDKs (PHP, Node.js, Python, Ruby, Java, .NET, Go), 100+ e-commerce
            plugins (WooCommerce 100k+ installs, Shopify, Magento, PrestaShop), and Mollie MCP Server for LLM agent
            integration
          tone: positive
        - id: layer3
          label: Payment Orchestration Layer
          detail: >-
            Payment routing and method abstraction engine, authorization handling, fraud scoring, webhook event engine,
            Connect split-payment routing, and Capital disbursement module
          tone: neutral
        - id: layer4
          label: Banking and Scheme Rail Layer
          detail: >-
            Card networks (Visa, Mastercard, Amex), national schemes (iDEAL via Currence, Bancontact via
            Worldline/Payconiq), SEPA gateway (ECB-governed), and open banking layer (GoCardless post-acquisition
            mid-2026)
          tone: warning
        - id: layer5
          label: Compliance and Security Layer
          detail: >-
            PCI-DSS Level 1 certified environment, 3DS2 strong customer authentication, ISO 27001 information security
            management, GDPR EU data residency, and DNB/FCA regulatory perimeter
          tone: positive
    claimRefs:
      - CE001
      - CE002
      - CE010
      - CE011
      - CE016
      - CE018
      - CE025
  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: wide
    summary: >-
      The Mollie payment lifecycle begins with the buyer's checkout selection and ends with the merchant receiving a
      settlement to their bank account. Mollie orchestrates authorization, authentication, real-time notification, and
      settlement without the merchant needing separate PSP connections for each payment method. The webhook notification
      at step four is the critical integration touchpoint for merchant order management systems.
    data:
      nodes:
        - id: n1
          label: Buyer Initiates Checkout
          detail: >-
            Buyer selects payment method (iDEAL, card, Apple Pay, etc.) on merchant checkout page; Mollie Checkout
            renders hosted or embedded payment form
          tone: neutral
        - id: n2
          label: Mollie Applies Fraud Scoring and Method Routing
          detail: >-
            Mollie scores the transaction, applies SCA exemption logic where applicable, and routes to the correct
            payment scheme (card network, iDEAL, SEPA, etc.)
          tone: neutral
        - id: n3
          label: Authorization and 3DS2 Authentication
          detail: >-
            Payment scheme processes authorization; 3DS2 strong customer authentication applied for EU card transactions
            above 30 EUR; scheme responds with approve or decline
          tone: neutral
        - id: n4
          label: Mollie Webhook Fires to Merchant
          detail: >-
            Mollie receives authorization result and fires real-time webhook to merchant system; payment status (paid,
            failed, pending) delivered immediately
          tone: positive
        - id: n5
          label: Merchant Fulfills Order and Receives Settlement
          detail: >-
            Merchant order management system processes webhook confirmation and fulfills order; Mollie batches
            settlement to merchant bank account on standard settlement schedule
          tone: positive
    claimRefs:
      - CE001
      - CE012
      - CE017
      - CE019
  - id: FE003
    title: Critical dependency map
    type: dag
    layout: wide
    summary: >-
      Mollie's platform delivery depends on six interconnected nodes: the core Mollie SaaS platform itself, card network
      authorization infrastructure, national payment scheme operators for local European methods, regulatory licenses
      from DNB and the FCA, EU cloud hosting infrastructure, and the merchant integration layer. Card network and
      national scheme dependencies represent external systemic risks outside Mollie's direct control, creating
      pass-through pricing and uptime exposure.
    data:
      nodes:
        - id: n1
          label: Mollie Platform (Core SaaS)
          detail: >-
            Core payment processing SaaS hosted in EU datacenters; orchestrates all payment flows, routing, fraud
            scoring, webhook delivery, and settlement
          tone: neutral
        - id: n2
          label: Card Networks (Visa / Mastercard / Amex)
          detail: >-
            Authorization and settlement infrastructure for all card transactions; scheme fees are external cost driver;
            uptime is outside Mollie's control
          tone: warning
        - id: n3
          label: National Scheme Operators (iDEAL / Bancontact / SEPA)
          detail: >-
            iDEAL operated by Currence (Netherlands), Bancontact by Worldline/Payconiq (Belgium), SEPA governed by ECB;
            local method availability depends on scheme operator uptime
          tone: warning
        - id: n4
          label: DNB and FCA Regulatory Licenses
          detail: >-
            Dutch DNB payment institution license and UK FCA EMI authorization enable legal payment operations; license
            loss or suspension would halt operations in respective markets
          tone: neutral
        - id: n5
          label: EU Cloud Infrastructure
          detail: >-
            Cloud-native compute and data storage hosted in EU-based datacenters with Netherlands as primary region;
            cloud provider dependency for platform availability
          tone: neutral
        - id: n6
          label: Merchant Integration Layer
          detail: >-
            WooCommerce, Shopify, Magento, PrestaShop plugins and direct API integrations; 100+ platform partners;
            merchant-side uptime and plugin compatibility are external variables
          tone: neutral
      edges:
        - from: n1
          to: n2
          label: routes card transactions to
        - from: n1
          to: n3
          label: processes local payments via
        - from: n1
          to: n4
