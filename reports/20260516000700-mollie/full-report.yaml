      - number: '4.4'
        title: Financial gaps and disclosure constraints
        blocks:
          - type: paragraph
            body: >-
              Despite progress in topline transparency, Mollie's public financial disclosure leaves several
              diligence-critical gaps. Net profit and loss below the EBITDA line are not publicly available, meaning
              interest expense, tax, depreciation, stock-based compensation, and amortization of acquired intangibles
              cannot be assessed externally. This is particularly material post-GoCardless, where a £1.6B acquisition
              will generate substantial goodwill amortization and integration costs. Free cash flow and the current cash
              balance are similarly undisclosed, making it impossible to assess runway, debt capacity, or whether
              additional financing will be required to fund the acquisition and integration.

              The Netherlands and Belgium are Mollie's primary markets, with Germany as a third significant geography,
              but no formal revenue breakdown by country or payment method is available publicly. Total payment volume
              (TPV) is not officially disclosed, constraining verification of the take rate and processing economics.
              The 28% revenue CAGR from 2022 to 2024 outpaces the broader European PSP sector average of approximately
              15–20%, suggesting above-market execution, but the absence of audited statutory accounts from the KvK
              limits independent corroboration of these figures. Financial diligence for an investment decision requires
              audited income statements, a cash position bridge post-GoCardless, and product-level margin disclosure.
