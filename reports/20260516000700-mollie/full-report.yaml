      - number: '7.5'
        title: Mitigation Framework and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Mollie's risk mitigation posture reflects its regulatory maturity but is constrained by limited public
              disclosure on operational resilience specifics. The company's DNB license track record and multi-year
              supervisory relationship represent credible regulatory risk mitigation, while FCA authorisation
              post-Brexit demonstrates dual-regime compliance capability. DORA compliance investment, though costly, is
              a systematic risk mitigant for the operational resilience dimension. For competitive risks, Mollie's
              35-40+ payment-method breadth and developer-first positioning provide durable moats against pure-price
              competition from Adyen and Stripe in the SME segment.

              The most material kill criteria center on the GoCardless integration. If combined merchant churn exceeds
              15% in the twelve months following close, the integration thesis is impaired. A unified technology stack
              delayed beyond twenty-four months signals underestimated integration complexity. At the regulatory level,
              any DNB supervisory action placing conditions on the EMI license, or a successful enforcement action
              resulting in material fines, would threaten Mollie's operating model at its core. For financial
              monitoring, if the combined entity fails to reach EBITDA positivity at group level within three years
              post-close, the acquisition capital deployment thesis requires re-evaluation. Investors should request
              quarterly integration scorecards, DORA audit results, DNB regulatory correspondence, and a three-year
              pro-forma P&L covering integration costs, FX sensitivities, and synergy timelines as primary diligence
              deliverables.
