      - number: '2.3'
        title: Buyer and segment map
        blocks:
          - type: paragraph
            body: >-
              Mollie's buyer universe is organized around merchant size and business model, with meaningfully different
              adoption paths and product needs across segments. The core anchor segment is the SME e-commerce merchant:
              businesses using platforms such as WooCommerce, Shopify, Magento, PrestaShop, Lightspeed, or Shopware that
              need plug-and-play payment integration, local-method coverage, and a developer-friendly API without a
              minimum monthly commitment. These merchants are price-sensitive and value the absence of lock-in contracts
              and monthly fees. Budget ownership sits with the founder or operations lead rather than a dedicated
              payments team.


              The second growth segment is SaaS and software platforms embedding payments into their own product via
              Mollie Connect for Platforms. The decision-maker is a SaaS founder or CTO who wants to embed payment
              facilitation inside their platform. The economics are favorable because a single SaaS integration can
              distribute payment access to many downstream merchants, creating high volume leverage with limited
              incremental sales cost.


              Marketplace operators form a third segment requiring payment splitting, fund holding, and seller
              onboarding. Franchise networks represent a fourth vertical requiring centralized payment oversight with
              per-location settlement. Fast-growing scale-ups form a transitional segment that may graduate to volume
              IC++ pricing or churn to enterprise alternatives such as Adyen or Stripe. Mollie's licensing as an EMI
              with the Dutch Central Bank and as a payment institution with the FCA enables it to legally serve all
              these segments across Europe and the United Kingdom.
