  evidenceGaps:
    - topic: Fraud, chargeback, and credit risk loss rates
      type: missing-source
      severity: material
      missingEvidence: >-
        Mollie does not publicly disclose fraud loss rates, chargeback write-off ratios, or credit
        exposure from Mollie Capital merchant advances. Without these figures, the magnitude of the
        company's credit and fraud risk cannot be independently benchmarked against peer e-money
        institutions.
      whyItMatters: >-
        Undisclosed loss rates mean that apparent margin stability could mask elevated fraud or credit
        exposure. As Mollie scales Mollie Capital and processes higher card volumes, the risk grows.
        Investors cannot properly diligence financial risk without these disclosures.
      diligencePath: >-
        Request annual fraud and chargeback loss figures as a percentage of TPV. Request Mollie Capital
        loan book size, average advance size, and net write-off rate. Compare against disclosed Adyen
        and Stripe loss metrics.
      relatedQuestionRefs:
        - QR021
        - QR028
    - topic: UK GDPR and ICO enforcement posture divergence
      type: private-evidence-only
      severity: material
      missingEvidence: >-
        Mollie's internal UK GDPR gap analysis relative to EU GDPR, and the ICO's current registration
        and enforcement posture for UK-based operations of Dutch payment institutions, are not available
        in public sources. The degree of operational divergence required post-Brexit is not externally
        quantifiable.
      whyItMatters: >-
        Dual-regime GDPR compliance requires distinct data processing agreements, separate DPO/legal
        advisory, and potentially divergent data transfer mechanisms (UK adequacy decisions differ from
        EU SCCs). If the UK diverges further from EU GDPR, compliance costs increase non-linearly.
      diligencePath: >-
        Request ICO registration number and confirmation of UK privacy programme. Request legal opinion
        on data transfer mechanisms used for UK-EU data flows. Review ICO guidance on post-Brexit
        adequacy decisions applicable to Mollie's operating model.
      relatedQuestionRefs:
        - QR025
    - topic: GoCardless acquisition regulatory clearance timeline
      type: missing-source
      severity: material
      missingEvidence: >-
        The regulatory approval status for the GoCardless acquisition — including any CMA phase 1/2
        review, EC merger filing requirement, and DNB/FCA change-in-control notification — is not
        publicly documented in sources available as of May 2026. Completion is expected mid-2026 but
        no specific clearance timeline has been disclosed.
      whyItMatters: >-
        Regulatory delay or conditional clearance could impose structural remedies (e.g., market
        divestiture, conduct commitments) that limit the strategic rationale for the acquisition.
        Uncertainty about close timing creates execution planning risk for the integration programme.
      diligencePath: >-
        Monitor CMA merger inquiry register and EC merger filings for Mollie/GoCardless proceedings.
        Request management confirmation of all regulatory filings made and expected clearance timeline.
        Review DNB change-in-control notification requirements for EMI licence holders.
