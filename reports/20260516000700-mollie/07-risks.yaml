company:
  name: Mollie
chapter:
  number: 7
  title: Risk Assessment
  summary: >-
    Mollie faces a multi-layered risk profile as a licensed European e-money institution undergoing its largest-ever
    acquisition while navigating a shifting regulatory landscape. Regulatory exposure is acute: DORA became effective
    January 2025 demanding ICT resilience investment, PSD3 is in final trilogue, and dual EU/UK GDPR supervision
    creates divergent compliance obligations. The £1.6B GoCardless acquisition introduces material integration
    execution risk given contrasting UK/EU footprints and technology stacks, compounded by the gap between Mollie's
    €115M 2024 gross profit and the acquisition price. Geographic concentration (Netherlands ~40-50% of revenue)
    and payment-rail dependencies on Visa/Mastercard and SEPA amplify operational fragility. Competitive pressure
    from Adyen's SME push and Stripe's European expansion requires sustained product investment while margins are
    compressed by compliance costs. Key-person risk at the CEO level is moderated by institutional governance.
    No public regulatory enforcement actions have been found; the primary residual risks are GoCardless integration
    execution and the long payback horizon on the acquisition capital.
sections:
  - id: section-1
    title: Regulatory and Legal Risk
    body: >-
      Mollie operates under a dense and evolving regulatory framework as a licensed e-money institution. The company
      holds an EMI license granted by De Nederlandsche Bank (DNB) under PSD2 and a separate FCA payment institution
      authorisation in the United Kingdom. Each license carries capital adequacy requirements, safeguarding
      obligations, AML/KYC duties, and ongoing supervisory reporting — failure in any dimension risks license
      suspension or revocation. The most immediate regulatory development is DORA (EU Regulation 2022/2554), which
      became effective January 17, 2025 and requires Mollie to implement a formal ICT risk management framework,
      major incident reporting to DNB within four hours, and annual operational resilience testing. Meeting DORA
      standards requires non-trivial engineering and compliance investment whose cost has not been publicly
      quantified by the company.

      PSD3 — the European Commission's proposed overhaul of payment-services legislation, published in November 2023
      — remained in EU Parliament and Council trilogue through 2025 with adoption expected in 2026. PSD3 will expand
      open-banking access obligations and alter the API/interface standards Mollie's Connect product relies upon,
      necessitating product and integration changes. In parallel, UK GDPR divergence from the EU GDPR framework
      creates dual-compliance costs: Mollie must satisfy both the Autoriteit Persoonsgegevens (Dutch DPA) and the
      UK Information Commissioner's Office (ICO) under distinct regulatory regimes. AMLD6 AML obligations require
      Mollie to conduct KYC/CDD on all 250,000+ onboarded merchants, representing an ongoing compliance burden.
      No regulatory enforcement actions by DNB, FCA, or any data protection authority against Mollie have been
      found in public sources as of May 2026, which is a positive indicator of licensing track record.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
