  - id: section-4
    title: People, Execution, and Financial Risk
    body: >-
      Mollie's key-person risk is concentrated at the CEO level. Koen Köppen was confirmed in the CEO role in
      the June 2025 press announcement for 2024 financial results, succeeding Shane Happach who departed in early
      2023. The prior CEO transition was reported as an adverse event in the fintech press and represents a
      material historical key-person episode. GoCardless CEO Hiroki Takeuchi's role in the combined entity
      post-acquisition close has not been publicly defined; unresolved leadership structure at the merged entity
      could signal cultural or governance friction. Institutional investors including Blackstone, EQT, General
      Atlantic, and TCV provide governance oversight that partially mitigates CEO concentration risk.

      The financial risk profile is defined by the acquisition cost-to-gross-profit gap. Mollie's 2024 gross profit
      was €115M; GoCardless was acquired for approximately £1.6B (~€1.85B), implying a gross-profit payback
      horizon measured in over a decade at current margins before synergies. The €5.4B Series C valuation set in
      June 2021 during peak fintech bull market conditions has not been updated publicly; current secondary
      market or fair-value marks are unknown. The absence of audited statutory accounts, net income, and cash
      position in public disclosures makes capital adequacy post-close difficult to assess. EUR/GBP FX exposure
      is material given GoCardless's predominantly UK-denominated revenue base. European e-commerce growth
      moderated in 2024 relative to the pandemic surge, reducing the macro tailwind that supported Mollie's
      28% revenue growth and providing a less favorable backdrop for re-acceleration.
    claimRefs:
