  evidenceGaps:
    - type: missing-data
      severity: major
      topic: Checkout.com post-2022 valuation and financial health
      missingEvidence: >-
        No public disclosure of Checkout.com's 2023–2026 revenue, profitability, or updated valuation after
        the 2022 fintech market correction reduced private company valuations significantly. The last known
        $40 billion figure may be materially stale.
      whyItMatters: >-
        Checkout.com's financial health determines whether it remains a credible long-term competitive threat
        or is in managed decline. If it is pursuing revenue over growth, its competitive intensity in Mollie's
        market may be lower than feared.
      diligencePath: >-
        Review any Checkout.com press releases, UK Companies House filings, or credible secondary reporting on
        its profitability. Commission independent market intelligence from a payments analyst firm.
      relatedQuestionRefs:
        - QP023

    - type: missing-data
      severity: minor
      topic: Adyen European SMB market share trends
      missingEvidence: >-
        Adyen does not disclose regional or segment-specific market share data. The size of Adyen's SMB
        European segment versus its enterprise business cannot be independently verified from public filings.
      whyItMatters: >-
        If Adyen is aggressively expanding SMB market share in Europe, it represents a more immediate threat
        to Mollie's core merchant base than currently assessed.
      diligencePath: >-
        Analyze Adyen's investor day materials, H1/H2 earnings commentaries mentioning SMB or mid-market
        segment trends, and partner reports from Dutch and Belgian payment ecosystem stakeholders.
      relatedQuestionRefs:
        - QP024
        - QP010

    - type: missing-source
      severity: major
      topic: Independent analyst comparison of Mollie vs. Adyen vs. Stripe for European SMBs
      missingEvidence: >-
        No independent primary analyst report specifically benchmarks Mollie against Adyen and Stripe for the
        European SMB payment processing segment across the four key dimensions: local method coverage, pricing,
        developer experience, and onboarding simplicity.
      whyItMatters: >-
        Without a primary benchmark, all competitive assessments rely on company-published materials and
        secondary observations. An independent benchmark would validate Mollie's claimed advantages and surface
        any capability gaps not visible from public documentation.
      diligencePath: >-
        Commission a comparison study from Forrester, Gartner, or a boutique payments analyst. Review G2,
        GetApp, and Capterra structured comparison data; analyze developer community sentiment on Reddit and
        HackerNews.
      relatedTableRefs:
        - TP002
      relatedQuestionRefs:
        - QP025
