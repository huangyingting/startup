  - id: FP003
    title: Moat / readiness KPIs
    type: kpi
    layout: wide
    summary: >-
      Mollie's key competitive readiness indicators show strong local market coverage and SMB positioning. The
      GoCardless acquisition substantially broadens capabilities. Core moat risks relate to long-term method
      parity erosion as Adyen and Stripe expand European local coverage and potential integration execution
      risk in the GoCardless deal.
    data:
      items:
        - label: Local payment method coverage
          value: 35+ methods
          detail: >-
            Mollie supports 35+ European local payment methods as of 2026 including iDEAL, Bancontact, EPS,
            Przelewy24, BANCOMAT Pay, Klarna BNPL, and others. No direct competitor matches this breadth
            with comparable SMB self-serve simplicity.
          tone: positive
        - label: SMB merchant base
          value: 250,000+ merchants
          detail: >-
            Mollie serves over 250,000 merchants as of 2024, concentrated in Benelux with expanding presence
            in Germany, France, and the UK. The base is primarily SMB and mid-market e-commerce merchants.
          tone: positive
        - label: GoCardless customers (post-acquisition)
          value: 100,000+ businesses
          detail: >-
            The pending GoCardless acquisition adds 100,000+ business customers and a bank payment network
            covering 30+ countries, immediately expanding Mollie's TAM into recurring and subscription payments.
          tone: positive
        - label: Adyen annualized net revenue
          value: '~€2.4B (Q3 2025 run-rate)'
          detail: >-
            Adyen's annualized net revenue of approximately €2.4B reflects a 20% year-on-year growth rate
            (Q3 2025 actual net revenue €598.4M). This gap vs. Mollie's €214M (2024) indicates Adyen's
            substantially greater scale and financial firepower.
          tone: negative
        - label: Stripe payment volume vs Mollie
          value: '$1.9T vs. ~€20–30B est.'
          detail: >-
            Stripe processed $1.9 trillion in payments in 2025 versus Mollie's estimated €20–30B implied TPV.
            The roughly 80× scale difference underscores Mollie's need to protect its European local method
            moat as Stripe expands its local payment method coverage.
          tone: negative
        - label: Competitive moat durability (qualitative)
          value: Medium-high (3–5 year horizon)
          detail: >-
            Local method depth, plugin ecosystem lock-in, and SMB brand trust create a durable moat for
            3–5 years. Long-term risk from Adyen SMB push and Stripe local method expansion is real but
            execution-dependent and unlikely to meaningfully erode Mollie's position before 2028.
          tone: neutral
    claimRefs:
      - CP038
      - CP039
      - CP040
      - CP041
