  - id: section-3
    title: Pricing and packaging comparison
    body: >-
      Pricing structure is a key differentiator across the competitive set. Mollie operates a transparent
      pay-per-transaction model with no monthly fee at the standard tier and published rates available on its
      pricing page—an intentional SMB-acquisition strategy that reduces friction for self-serve sign-ups. Standard
      European card pricing approximates 1.2% to 1.5% of transaction value plus a fixed fee. Adyen's
      Interchange-plus model is more cost-effective at very high volumes (above €1 million per month) where the
      raw interchange pass-through beats aggregated PSP rates, but it requires enterprise negotiation and is
      less suited to the self-serve SMB market. Stripe's UK pricing of 2.5% plus 20p for EU cards is higher than
      Mollie's for standard European transactions, though Stripe's global reach and ecosystem breadth justify
      premium pricing for international merchants.

      GoCardless charges for bank payments at significantly lower effective rates than card processing—typically
      below 1%—because bank-to-bank payments avoid card interchange entirely. This pricing advantage is especially
      valuable for subscription and recurring payment use cases. After the planned acquisition, Mollie-plus-GoCardless
      would offer the full pricing spectrum: card processing at competitive rates, bank payments at interchange-free
      rates, and local European methods at transparent fixed per-transaction fees.

      Checkout.com does not publish pricing and negotiates custom arrangements with enterprise clients, making
      direct comparison difficult. SumUp's 1.69% flat rate is simple but higher than card-specific interchange for
      high-volume merchants, positioning it firmly in the micro-merchant tier. PayPal's published merchant rates
      vary by product and country but are generally higher than specialist PSPs for card processing, partially offset
      by consumer trust and checkout conversion benefits.
