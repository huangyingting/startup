figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      This journey map traces the full merchant lifecycle from initial discovery of Mollie through
      ecosystem channels (WooCommerce, Shopify) to onboarding, first transaction, product activation,
      expansion via multi-product adoption, and long-term retention anchored by deep platform integration.
      Each stage reflects observable Mollie product behavior and self-serve model mechanics, from same-day
      API key issuance to embedded Mollie Checkout creating structural switching costs over time.
    data:
      nodes:
        - id: n1
          label: Discovery
          detail: Merchant finds Mollie via WooCommerce plugin directory, Shopify App Store, or peer
            recommendation among European e-commerce operators
          tone: neutral
        - id: n2
          label: Sign-up and onboarding
          detail: Self-serve registration with bank account verification (KYC); API key issued typically
            same-day for qualifying merchants with no sales interaction required
          tone: positive
        - id: n3
          label: First payment
          detail: Merchant integrates Mollie API or plugin and processes first live transaction; test
            mode validates integration before go-live with minimal technical friction
          tone: positive
        - id: n4
          label: Activation and adoption
          detail: Merchant enables additional payment methods (iDEAL, Bancontact, Klarna); accesses
            dashboard analytics and reporting tools to monitor transaction performance
          tone: positive
        - id: n5
          label: Expansion
          detail: Merchant adopts Mollie Capital or Connect API; transaction volume grows; revenue per
            merchant increases above initial ARPU as multi-product adoption deepens
          tone: positive
        - id: n6
          label: Retention anchor
          detail: Deep integration with CMS or ERP creates structural stickiness; Mollie Checkout
            embedded in merchant storefront raises switching costs materially above initial levels
          tone: neutral
    claimRefs:
      - CU010
      - CU014
      - CU015
      - CU026
      - CU029
  - id: FU002
    title: Adoption / deployment funnel
    type: funnel
    layout: wide
    summary: >-
      This funnel visualizes the conversion from the total European addressable SMB merchant universe
      down to Mollie's active and high-value merchant tiers. The primary drop-off points are the gap
      between reachable and onboarded merchants (competitive and awareness constraints) and the gap
      between signed-up and activated merchants (integration friction and merchant readiness factors).
      The funnel illustrates both Mollie's impressive conversion at the onboarding stage and the
      structural challenge of activating the full signed-up base.
    data:
      items:
        - id: f1
          label: Total addressable European SMB merchants
          value: 6000000
          detail: Approximately 5–7 million e-commerce-active businesses across Europe representing
            the full theoretical addressable universe for a pan-European PSP
          tone: neutral
        - id: f2
          label: Reachable via Mollie integration channels
          value: 2500000
          detail: Approximately 2–3 million businesses with WooCommerce, Shopify, or Magento presence
            where Mollie plugins are available for self-serve discovery and installation
          tone: neutral
        - id: f3
          label: Signed up and onboarded merchants
          value: 250000
          detail: 250,000+ active merchants onboarded as of 2024 representing the deployed commercial
            base; same-day onboarding for qualifying merchants accelerates conversion
          tone: positive
        - id: f4
          label: Activated merchants
          value: 175000
          detail: Estimated 60–70% of signed-up merchants processing 5 or more transactions per month
            representing consistent revenue contributors to Mollie's total payment volume
          tone: positive
        - id: f5
          label: High-value merchants
          value: 75000
          detail: Estimated top 30% of activated merchants generating more than €10K per year in
            payment fees to Mollie; mid-market and enterprise cohort driving disproportionate TPV
          tone: positive
    claimRefs:
      - CU001
      - CU009
      - CU011
      - CU012
      - CU013
