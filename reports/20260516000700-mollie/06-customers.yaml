      - FU004
  - id: section-4
    title: Customer quality verdict and diligence priorities
    body: >-
      Mollie's customer quality profile is broadly positive at the level of merchant count scale,
      ecosystem distribution, and structural retention mechanisms, but is significantly constrained by
      the absence of disclosed retention and cohort analytics. The 250,000-plus merchant base, 25% CAGR
      growth trajectory, and high-quality named enterprise references (MediaMarkt, Scott Sports)
      establish a credible foundation. The WooCommerce plugin's 100,000-plus active installs represent
      a quantified, third-party-verified distribution metric that anchors the organic acquisition story.
      PaymentsCardsAndMobile and Wired coverage identify Mollie as a leading European PSP for SMB
      digital commerce, providing industry-recognition validation extending beyond the Netherlands.

      The most significant diligence priorities are disclosure of NRR and GRR by merchant cohort year,
      merchant churn rates by segment, and geographic revenue distribution at the country level. Without
      cohort-level retention data, it is not possible to independently assess whether Mollie's merchant
      base is growing primarily through acquisition or through expansion revenue from existing merchants—
      a fundamental distinction for investors assessing the quality of reported revenue growth. The
      mixed Trustpilot and G2 support feedback should be evaluated in the context of Mollie's stated
      customer service investment priorities and compared with peer PSPs at similar SMB scale. Connect
      platform customers and Mollie Capital adopters represent the highest-quality and most defensible
      portion of the merchant base and warrant particular focus in a management deep-dive session.
    claimRefs:
      - CU031
      - CU033
