  - id: section-2
    title: Adoption trajectory and ecosystem distribution
    body: >-
      Mollie's merchant base has grown from an estimated 100,000 merchants in 2020 to more than 250,000 by
      end of 2024, implying a compound annual growth rate of approximately 25% over the period. This growth
      was accelerated initially by COVID-19-driven e-commerce adoption in 2020–2021, when Mollie's self-serve
      digital onboarding model benefited directly from the shift of physical retail to online channels.
      Growth moderated in 2022–2023 as the broader European fintech sector faced valuation compression and
      rising interest rates, before re-accelerating in 2024 alongside five new geographic market launches.
      The GoCardless acquisition, announced in December 2025, is expected to add approximately 75,000
      GoCardless merchants to Mollie's combined customer pool post-integration, representing a step-change
      in total addressable customer scale.

      Organic merchant acquisition is primarily driven by the plugin and integration ecosystem rather than
      direct sales. The WooCommerce plugin alone reports 100,000 or more active installs in the WordPress
      plugin directory, making it one of the most widely adopted European PSP integrations for WooCommerce
      merchants. This single-channel distribution creates a structural moat: each WooCommerce merchant who
      installs the plugin faces a non-trivial switching cost to replace it with a competing PSP plugin, as
      migration requires re-testing the checkout flow and reconfiguring payment method settings. Shopify App
      Store presence and Magento extension availability extend this distribution leverage across the three
      dominant European SMB e-commerce platforms.

      European e-commerce sector growth of 10–15% per year provides an organic volume tailwind for Mollie's
      existing merchant base: even without adding new merchants, rising transaction volumes from active
      merchants translate directly into higher payment processing fees. Shopify's blog coverage of European
      payment gateways highlights Mollie as a leading option for European-market merchants, increasing brand
      visibility with the high-growth Shopify merchant segment. TechRadar and Wired coverage of SMB fintech
      tools supports Mollie's brand recognition among technology-forward business operators across Europe.
      Enterprise account validation from MediaMarkt supports a potential upmarket strategy, demonstrating
      that Mollie's product is not constrained to the SMB tier alone.
    claimRefs:
