  evidenceGaps:
    - topic: Missing NRR and GRR retention metrics
      type: missing-data
      severity: major
      missingEvidence: >-
        Mollie does not publicly disclose Net Revenue Retention or Gross Revenue Retention for any
        merchant cohort or segment. Without these metrics, the fundamental revenue quality and expansion
        economics of the customer base cannot be independently assessed. Comparable public benchmarks
        (Adyen NRR 100%+) exist but cannot be directly applied to Mollie's undisclosed figures.
      whyItMatters: >-
        NRR and GRR are the primary investor metrics for assessing whether revenue growth is driven by
        new merchant acquisition, expansion revenue from existing merchants, or both. Their absence
        prevents differentiation between high-quality expansion-led growth and acquisition-dependent
        growth with potential churn masking, which is a critical distinction at a 25% CAGR growth rate.
      diligencePath: >-
        Request NRR and GRR by merchant cohort year in the data room. Request merchant count and revenue
        by cohort vintage for the 2020–2024 period. Benchmark against Adyen's disclosed NRR figures.
        Request management commentary on expansion revenue versus new merchant revenue split.
      relatedQuestionRefs:
        - QU012
        - QU013
      relatedTableRefs:
        - TU004
    - topic: Missing cohort retention and analytics data
      type: missing-data
      severity: major
      missingEvidence: >-
        Mollie does not provide cohort-level retention analytics, merchant lifetime value data, or
        segment-level churn rates in any public disclosure. The retention cohort figure in this chapter
        is constructed from structural inference rather than disclosed company data, and all retention
        estimates carry significant uncertainty.
      whyItMatters: >-
        Without cohort-level data, investors cannot assess whether the merchant base exhibits improving
        or deteriorating retention over time, whether specific geographic cohorts or segments churn at
        above-average rates, or whether Mollie's product expansion is effectively increasing merchant
        lifetime value. This is a critical gap for a company growing at 25% CAGR.
      diligencePath: >-
        Request cohort retention data organized by merchant acquisition year, segment, and geography.
        Request detailed analytics on merchant activation rates, monthly active rate, and repeat
        transaction frequency. Review internal management reporting on customer health metrics.
      relatedQuestionRefs:
        - QU020
      relatedTableRefs:
        - TU004
    - topic: Geographic revenue distribution detail
      type: missing-data
      severity: minor
      missingEvidence: >-
        Detailed revenue or merchant count breakdown by individual country is not publicly available for
        Mollie. The Netherlands dominance is inferred from founding market history and iDEAL market share
        data, but precise country-level revenue allocation cannot be confirmed from publicly available
        sources.
      whyItMatters: >-
        Country-level revenue concentration matters for assessing regulatory and economic concentration
        risk. If the Netherlands contributes more than 50% of revenue and faces a material regulatory
        change (such as iDEAL fee structure changes), the impact on Mollie's financials would be
        significantly larger than the geographic diversification narrative suggests.
      diligencePath: >-
        Request country-level revenue and merchant count breakdown for the five largest markets. Confirm
        Netherlands share of total payment volume. Review regulatory filings with DNB for any
        jurisdictional revenue disclosures. Compare with publicly available iDEAL market share data.
      relatedQuestionRefs:
        - QU024
      relatedTableRefs:
        - TU001
    - topic: Named customer proof completeness and Connect platform reference gap
      type: missing-data
      severity: minor
      missingEvidence: >-
        Named customer references for Mollie are limited to three published case studies (MediaMarkt,
        Scott Sports, ACE Catering) and one aggregated plugin-install cohort; the Connect platform
        segment has no publicly named customers despite being described as a growing high-value tier.
        No independent third-party confirmation of production deployments exists for most named accounts.
      whyItMatters: >-
        The absence of named Connect platform customers limits the ability to independently verify
        the claimed high switching-cost retention dynamic for the highest-value merchant tier. Named
        proof quality directly influences investor confidence in the stickiness narrative for the
        platform segment.
      diligencePath: >-
        Request a list of top-20 Connect platform customers by TPV with permission for reference calls.
        Obtain independent verification of MediaMarkt, Scott Sports, and ACE Catering production
        deployments through procurement records or customer reference interviews.
      relatedQuestionRefs:
        - QU003
        - QU017
      relatedTableRefs:
        - TU003
