company:
  name: Mollie
chapter:
  number: 6
  title: Customers
  summary: >-
    Mollie serves more than 250,000 active merchants across Europe as of 2024, growing at an estimated
    25% CAGR from approximately 100,000 merchants in 2020. The merchant base is predominantly SMB-focused,
    distributed across the Netherlands (dominant home market), Belgium, Germany, the UK, and France, with
    organic acquisition driven by WooCommerce, Shopify, and Magento plugin ecosystems. Named enterprise
    references including MediaMarkt Netherlands, Scott Sports, and ACE Catering demonstrate product maturity
    beyond the long-tail SMB core, while the Connect platform serves a higher-value, lower-churn tier of
    marketplace and SaaS platform operators. Customer retention metrics including NRR, GRR, and cohort data
    are not publicly disclosed, representing a significant diligence gap for investor assessment.
sections:
  - id: section-1
    title: Customer base segmentation and named proof
    body: >-
      Mollie's merchant base encompasses more than 250,000 active European businesses as of 2024, spanning
      five primary segments: long-tail SMB e-commerce (estimated 70–75% of merchant count but only 30–40%
      of revenue), mid-market e-commerce (estimated 15–20% of merchants and 35–45% of revenue), enterprise
      and large retail accounts (2–5% of count and 15–25% of revenue), platform and marketplace operators
      via Mollie Connect (3–5% of count, growing but undisclosed revenue share), and hospitality and food
      service operators adopting Mollie's POS capabilities (5–10% of count and 5–10% of revenue). This
      distribution reflects classic long-tail payments economics: the overwhelming majority of merchants
      contribute relatively little to total payment volume individually, while a small cohort of high-volume
      merchants drives a disproportionate share of transaction revenue.

      Three named merchant references provide evidence of Mollie's production-grade deployment across
      multiple verticals. MediaMarkt Netherlands, one of Europe's largest consumer electronics retailers,
      uses Mollie Payments for multi-method acceptance in its Dutch digital commerce operation, validating
      enterprise-tier product capability above the SMB core. Scott Sports, an international sports equipment
      brand operating across multiple European countries, deploys Mollie for cross-border payment processing,
      evidencing multi-country configuration capability. ACE Catering, a Dutch hospitality company, uses
      Mollie Payments combined with POS integration, demonstrating the in-person and food service vertical
      use case. These references are drawn from Mollie's published customer success story library and reflect
      production deployments rather than pilot or trial usage.

      Geographic distribution within the merchant base skews heavily toward the Netherlands, which accounts
      for an estimated 35–45% of active merchants given Mollie's founding market position and the dominance
      of iDEAL as a local payment method that creates a natural home-market lock-in. Belgium, Germany, the
      UK, and France represent the next tier of market penetration. Mollie launched in five additional
      markets in 2024 (Norway, Finland, Denmark, Hungary, and Slovenia), further diversifying the geographic
      base and expanding the addressable merchant universe. Despite this expansion, Netherlands concentration
      remains a meaningful risk: adverse regulatory or economic conditions in the Dutch market would have
      disproportionate impact on Mollie's aggregate total payment volume.
