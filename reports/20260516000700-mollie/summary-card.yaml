summary:
  headline: >-
    Mollie is a profitable, fast-growing European payments platform with a credible SME leadership position, but its
    €5.4B Series C mark faces post-2021 multiple compression and a meaningful GoCardless integration execution risk.
  overallScore: 7.1
  recommendation: track
