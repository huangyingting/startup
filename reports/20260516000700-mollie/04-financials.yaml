    layout: wide
    summary: >-
      Mollie converts merchant transaction activity into revenue through a blended take rate across payment methods,
      then nets out interchange and scheme costs to arrive at gross profit. Card processing dominates the revenue
      bridge while local methods contribute volume at lower per-transaction margins.
    data:
      nodes:
        - id: n1
          label: Total Payment Volume (TPV)
          detail: '~€20–30B estimated annually; processed across 250,000+ European merchants'
          tone: neutral
        - id: n2
