          detail: '~0.7–1.0% of TPV blended across all payment methods and markets'
          tone: neutral
        - id: n3
          label: Gross Revenue (before payment costs)
          detail: 'Estimated €150–250M range before netting interchange and scheme fees'
          tone: neutral
        - id: n4
          label: 'Cost of Revenue (interchange, scheme fees, processing)'
          detail: '~46% of net revenue (~€99M); partially passed through to merchants via blended pricing'
          tone: warning
        - id: n5
          label: Gross Profit 2024
          detail: '€115M reported (54% GP margin); first year of sustained margin expansion'
          tone: positive
    claimRefs:
