      - FI003
  - id: section-3
    title: Capital structure and funding
    body: >-
      Mollie's capital structure reflects a single large institutional equity raise in mid-2021, when the company
      closed a €665M Series C at a post-money valuation of approximately €5.4B. The round was led by Blackstone
      Growth and included EQT Growth, General Atlantic, TCV, and HMI Capital — a consortium of blue-chip institutional
      growth investors that signals high conviction in the European payments opportunity. That capital was deployed
      over three years of investment in product, headcount, and European market expansion, during which the company
      sustained EBITDA losses before achieving profitability in 2024. No subsequent public equity or debt raise has
      been announced since the Series C.

      The transformative capital event since the Series C is the announced GoCardless acquisition in December 2025 at
      approximately £1.6B. This acquisition adds direct debit and open-banking recurring payment capabilities, expands
      the combined merchant base to approximately 325,000+, and strengthens Mollie's position in the UK and Continental
      European markets. The implied acquisition multiple is approximately 20–23x GoCardless's estimated £70–80M in
      2024 revenues, which is rich even by fintech standards and introduces both integration execution risk and capital
      adequacy uncertainty. Mollie holds a Payment Institution license from De Nederlandsche Bank and FCA e-money
      institution authorization in the UK, providing the regulatory foundation for cross-border expansion. As of
      May 2026, no IPO has been announced; the GoCardless integration is the primary capital market focus.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027
      - CI028
      - CI035
      - CI036
      - CI037
    tableRefs:
      - TI004
    figureRefs:
      - FI004
  - id: section-4
    title: Financial gaps and disclosure constraints
    body: >-
      Despite progress in topline transparency, Mollie's public financial disclosure leaves several diligence-critical
      gaps. Net profit and loss below the EBITDA line are not publicly available, meaning interest expense, tax,
      depreciation, stock-based compensation, and amortization of acquired intangibles cannot be assessed externally.
      This is particularly material post-GoCardless, where a £1.6B acquisition will generate substantial goodwill
      amortization and integration costs. Free cash flow and the current cash balance are similarly undisclosed,
      making it impossible to assess runway, debt capacity, or whether additional financing will be required to fund
      the acquisition and integration.

      The Netherlands and Belgium are Mollie's primary markets, with Germany as a third significant geography, but no
      formal revenue breakdown by country or payment method is available publicly. Total payment volume (TPV) is not
      officially disclosed, constraining verification of the take rate and processing economics. The 28% revenue CAGR
      from 2022 to 2024 outpaces the broader European PSP sector average of approximately 15–20%, suggesting
      above-market execution, but the absence of audited statutory accounts from the KvK limits independent
      corroboration of these figures. Financial diligence for an investment decision requires audited income
      statements, a cash position bridge post-GoCardless, and product-level margin disclosure.
    claimRefs:
      - CI032
      - CI033
      - CI034
      - CI038
    tableRefs:
      - TI005
