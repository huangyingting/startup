company:
  name: Mollie
chapter:
  number: 4
  title: Financials
  summary: >-
    Mollie delivered €214M net revenue in 2024, up 28% year-over-year, and crossed into positive EBITDA for the first
    time since its founding, validating a decade-long investment in European payment infrastructure. The revenue model
    is transaction-driven: per-transaction fees on card, iDEAL, Bancontact, SEPA Direct Debit, and BNPL facilitation,
    with Mollie Capital and Connect adding nascent higher-margin revenue layers. The December 2025 GoCardless
    acquisition at ~£1.6B materially expands product scope and addressable volume but introduces significant
    integration execution risk and capital deployment uncertainty. Public disclosure gaps on net income below EBITDA,
    cash position, TPV, and geographic revenue mix constrain full underwriting confidence.
sections:
  - id: section-1
    title: Revenue model and streams
    body: >-
      Mollie's revenue model is a pay-per-transaction architecture with no mandatory monthly subscription at the
      standard tier, meaning the company earns only when merchants process payments. This design lowers the adoption
      barrier for SMEs but ties top-line growth directly to merchant volume and European e-commerce activity. The
      primary revenue driver is card processing on Visa and Mastercard rails, where Mollie charges 1.8% plus €0.25
      per transaction — a blended rate that generates the highest revenue per transaction of any method in the portfolio.
      Local payment methods, principally iDEAL (€0.29 flat, dominant in the Netherlands), Bancontact (0.7% plus €0.10,
      standard in Belgium), and SEPA Direct Debit (€0.35 flat), collectively represent an estimated 20–25% of revenue
      and are high-volume but lower-margin than card.

      Beyond payment method economics, Mollie monetizes additional surfaces: BNPL via a Klarna facilitation
      arrangement (~2.99% plus €0.35), Connect for platform sub-merchant routing, and Mollie Capital for merchant
      cash advances. Card processing is estimated to represent 50–60% of gross revenue. Local methods and SEPA
      account for 20–25%, and BNPL, Connect, and Capital represent the remaining 15–30%. Both Connect and Capital
      are positioned as strategic growth vectors by management, but their revenue contributions are not publicly
      disclosed in granular form. The 250,000+ merchant base implies revenue per merchant of approximately €856
      annually, with estimated total payment volume of €20–30B based on a 0.7–1.0% blended take rate.
    claimRefs:
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
