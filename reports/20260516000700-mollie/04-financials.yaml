  evidenceGaps:
    - topic: Total payment volume and implied take rate
      type: missing-data
      severity: major
      missingEvidence: >-
        Mollie does not publicly disclose total payment volume (TPV) processed annually. Without TPV, the blended
        take rate cannot be directly verified, and processing economics cannot be independently assessed. Current
        estimates of €20–30B TPV and 0.7–1.0% take rate are analyst-derived and unconfirmed.
      whyItMatters: >-
        TPV and take rate are the fundamental inputs to revenue quality assessment for a payments processor. Inability
        to verify these figures means revenue sustainability, competitive pricing dynamics, and sensitivity to volume
        changes cannot be properly diligenced. Unverified valuation comparisons to Adyen and Checkout.com also depend
        on take-rate normalization.
      diligencePath: >-
        Request direct management disclosure of annual TPV by payment method and market, or access third-party
        payment data providers such as CMSPI or FXC Intelligence. Regulatory filings with DNB may contain processed
        volume disclosures under PSD2 reporting requirements.
      relatedTableRefs:
        - TI003
        - TI005
      relatedQuestionRefs:
        - QI013
        - QI014
        - QI015
    - topic: Cash flow and profitability depth below EBITDA
      type: missing-data
      severity: major
      missingEvidence: >-
        Net profit/loss, cash on hand, monthly burn rate, and free cash flow are not publicly disclosed by Mollie.
        The company achieved first positive EBITDA in 2024 but the exact EBITDA amount is unknown. Post-GoCardless
        acquisition, the combined entity cash position and integration cost profile are also undisclosed.
      whyItMatters: >-
        Investors cannot assess actual earnings power, capital sufficiency, or runway without below-EBITDA financials.
        Given the £1.6B GoCardless acquisition, cash adequacy post-close is a critical risk factor. If debt financing
        is required, covenant terms and interest burden would materially affect FCF projections.
      diligencePath: >-
        Request audited statutory accounts filed with KvK Amsterdam for fiscal years 2022–2024. Request CFO-level
        cash bridge showing starting cash, GoCardless acquisition payment, integration costs, and 12-month forward
        burn. Confirm any debt facilities, revolving credit, or vendor financing arrangements.
      relatedTableRefs:
        - TI005
      relatedQuestionRefs:
        - QI018
    - topic: Geographic revenue distribution across European markets
      type: missing-data
      severity: minor
      missingEvidence: >-
        Mollie does not formally disclose revenue by country or market segment. The Netherlands, Belgium, and Germany
        are identified as primary markets, but relative revenue weighting, growth rates by geography, and contribution
        margins by market are not available in public sources.
      whyItMatters: >-
        Geographic concentration affects revenue quality and risk assessment. Heavy Netherlands dependency would make
        iDEAL volume a larger driver than diversified European operations suggest. Revenue distribution also affects
        regulatory capital allocation and currency exposure.
      diligencePath: >-
        Request management disclosure of revenue by geography as part of financial due diligence. Review DNB and FCA
        supervisory disclosures that may reference payment volumes by jurisdiction.
      relatedTableRefs:
        - TI003
      relatedQuestionRefs:
        - QI019
