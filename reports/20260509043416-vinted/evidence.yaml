evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Board composition and leadership and founder table completeness
    missingEvidence: Full board composition with formal seat allocations and voting rights for each investor class
    whyItMatters: Board control determines strategic direction, exit timing, and ability to hire/fire CEO
    diligencePath: Request cap table and shareholder agreement from Vinted; review board meeting minutes
    relatedQuestionRefs:
      - QO014
    relatedTableRefs:
      - TO002
  - type: private-evidence-only
    severity: material
    topic: Stakeholder or investor map — ownership percentages incomplete
    missingEvidence: Exact ownership stakes of each institutional investor post-2024 and post-2026 secondary
    whyItMatters: Required to assess control and exit dynamics
    diligencePath: Obtain capitalization table directly from company or via data room
    relatedQuestionRefs:
      - QO015
    relatedTableRefs:
      - TO003
  - type: missing-source
    severity: minor
    topic: Milestone table — early-year internal milestones not publicly documented
    missingEvidence: Internal product and operational milestones from 2008–2013 not publicly reported
    whyItMatters: Early trajectory is important for understanding product-market fit evolution
    diligencePath: Review founder interviews, early press releases, and company blog archives
    relatedQuestionRefs:
      - QO010
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: minor
    topic: Comparable ARPU benchmarks
    missingEvidence: Published ARPU comparison between Vinted and Depop/Poshmark in the same markets
    whyItMatters: Would clarify relative monetization efficiency
    diligencePath: Seek analyst market data from CBRE/Euromonitor/McKinsey or secondary research
    relatedQuestionRefs:
      - QO020
  - type: private-evidence-only
    severity: material
    topic: TAM/SAM/SOM or sizing lens table — online-only European market size not independently verified
    missingEvidence: >-
      No analyst source isolates European online-only C2C fashion resale (excluding offline charity shops and flea
      markets) with consistent methodology. Vinted GMV suggests published SAM estimates are understated.
    whyItMatters: >-
      Without a verified online-only SAM, assessing Vinted's true market penetration and remaining growth runway is
      imprecise.
    diligencePath: >-
      Commission bespoke market sizing from Euromonitor or GlobalData with explicit online/offline split and C2C/B2C
      split.
    relatedQuestionRefs:
      - QM001
      - QM002
      - QM003
    relatedTableRefs:
      - TM002
  - type: enumeration-incomplete
    severity: minor
    topic: Segment / buyer map — segment size quantification incomplete
    missingEvidence: >-
      Published sources do not quantify the exact proportion of Vinted's user base in each segment (casual declutterers
      vs frequent resellers vs Vinted Pro merchants). Consumer Edge and PwC provide partial behavioral data but no
      user-count splits.
    whyItMatters: Segment mix affects Vinted's LTV distribution and revenue concentration risk.
    diligencePath: Request Vinted user segmentation data (bucket by transaction frequency) from data room.
    relatedQuestionRefs:
      - QM009
      - QM013
      - QM014
    relatedTableRefs:
      - TM003
  - type: enumeration-incomplete
    severity: minor
    topic: Growth drivers and constraints table — competitive landscape in new markets not fully mapped
    missingEvidence: >-
      Detailed competitive positions in Vinted's newer markets (Croatia, Greece, Ireland, Latvia, Estonia, Slovenia) not
      yet covered by analyst data. Impact of brand recommerce entry (Zara, Zalando) on Vinted's growth rate not yet
      measurable.
    whyItMatters: >-
      New market competitive dynamics will determine whether Vinted's geographic expansion strategy delivers the
      projected GMV contribution.
    diligencePath: >-
      Monitor traffic data from Similarweb for Vinted vs local competitors in each new market; request internal GMV by
      market from data room.
    relatedQuestionRefs:
      - QM022
      - QM012
    relatedTableRefs:
      - TM004
  - type: missing-source
    severity: minor
