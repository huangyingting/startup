chapter:
  number: 5
  title: Product & Technology
  summary: >
    Vinted operates a sophisticated in-house technology stack anchored by a
    custom Vespa search engine with two-tower ML for dense retrieval, in-house
    Vilnius data centers, and a Kubernetes/Vitess microservices architecture.
    Product scope expanded into electronics (2024) with luxury authentication
    and US market entry as 2025–2026 priorities. A July 2024 Lithuanian DPA fine
    of €2.385M for GDPR shadow-banning and right-to-erasure failures represents
    a material trust and compliance risk, with the CJEU referral ongoing in 2026.

