figures:
  - id: FE001
    title: Product architecture map
    type: stack
    description: "Layered architecture of the Vinted product stack, from user interface through application logic, ML infrastructure, data, and infrastructure layers."
    sourceRefs: [SE001, SE002, SE006, SE007, SE019]
    claimRefs: [CE001, CE005, CE006, CE007]
    notes: "Layer ordering: top = user-facing; bottom = infrastructure. Internal architecture not fully public; based on engineering blog and community presentation disclosures."
    data:
      layers:
        - id: user-interface
          label: "User Interface Layer"
          detail: "iOS/Android apps, web PWA; mobile-first design; buy/sell flows, messaging, Vinted Go label generation"
        - id: product-services
          label: "Product & Services Layer"
          detail: "Marketplace service, Vinted Go logistics APIs, Vinted Pay payment service, Promoted Listings service"
        - id: search-ml
          label: "Search & ML Layer"
          detail: "Vespa search engine; two-tower neural network (dense retrieval); LightGBM LTR; multilingual CLIP embeddings; ANN <100ms"
        - id: data-platform
          label: "Data & Analytics Layer"
          detail: "Event streaming (domain-driven microservices); analytics pipelines; ML training data; user behaviour signals"
        - id: infrastructure
          label: "Infrastructure Layer"
          detail: "In-house Vilnius data centers; custom Clos network; Kubernetes/GitOps orchestration; Vitess MySQL sharding (1.3M QPS)"

  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    description: "End-to-end flow of a C2C fashion transaction on Vinted, from seller listing through buyer purchase, shipping, and payment settlement."
    sourceRefs: [SE001, SE019, SE022]
    claimRefs: [CE022, CE023, CE004, CE009]
    notes: "Illustrative user flow; steps are based on publicly documented product features. Exact UI steps may vary by market and device."
    data:
      nodes:
        - id: seller-lists
          label: "Seller Takes Photos & Lists Item (Free)"
          description: "No seller fee; AI-assisted category tagging; item indexed in Vespa in ~5 seconds post-migration"
        - id: buyer-discovers
          label: "Buyer Discovers Item via Search or Feed"
          description: "Vespa two-tower ML surfaces relevant results; personalised ranking by user signals; <100ms latency"
        - id: buyer-purchases
          label: "Buyer Pays (Item + Buyer Protection Fee)"
          description: "Vinted Pay holds funds in escrow; buyer protection fee (~5% + fixed) applied mandatorily"
        - id: seller-ships
          label: "Seller Ships via Vinted Go"
          description: "Pre-generated Vinted Go label; drop-off at PUDO point; tracked via carrier integration"
        - id: delivery-confirmed
          label: "Buyer Confirms Delivery"
          description: "Buyer confirms item as described; funds released from escrow to seller via Vinted Pay"
        - id: seller-paid
          label: "Seller Receives Payment"
          description: "Payout via Vinted Pay wallet; zero seller fee deducted; funds available for withdrawal or reinvestment"

