  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Scope, Differentiation, and Roadmap
        blocks:
          - type: paragraph
            body: >
              Vinted's core product is a C2C fashion and secondhand goods marketplace across 26+ European markets. The
              buyer-facing product includes mobile-first apps (iOS/Android), a web interface, and embedded Vinted Go
              shipping label generation with carrier tracking. The seller-facing product enables free item listing with
              AI-powered categorisation, promoted listing tools (Wardrobe Spotlight, item bump), and integrated payments
              via Vinted Pay.


              Product differentiation rests on three pillars: (1) zero seller fees creating superior economics for
              sellers versus rivals; (2) ML-powered search and recommendation (Vespa + two-tower model) producing higher
              relevance at scale; and (3) Vinted Go logistics integrated into the transaction flow, eliminating the need
              for sellers to arrange separate shipping. These pillars collectively reduce friction at every step of the
              C2C transaction loop.


              In 2024, Vinted expanded into electronics — a meaningful category move signalling ambition to become a
              broader secondhand marketplace rather than fashion-only. Plans for books, toys, and video games in 2025
              extend this trajectory. Luxury authentication capabilities are expanding to serve demand in authenticated
              pre-loved luxury fashion. The 'New Again' brand campaign (2025) is Vinted's first major global brand
              investment, designed to broaden the platform's appeal beyond its fashion-first origins. US market entry is
              the most significant strategic product challenge of 2026, requiring adaptation of sizing conventions,
              building brand awareness from zero, and competing with established Poshmark and eBay incumbents.
            claimRefs:
              - CE014
              - CE015
              - CE016
              - CE017
              - CE018
              - CE022
              - CE023
              - CE028
              - CE032
      - number: '5.2'
        title: Core Technology Stack and Scalability
        blocks:
          - type: paragraph
            body: >
              Vinted's technology stack is among the most advanced of any European C2C marketplace. The search
              infrastructure was migrated from Elasticsearch to **Vespa** in 2023–2024, enabling the platform to handle
              one billion searchable items with integrated vector search and ML inference. Post-migration performance
              gains were substantial: 2.5x search latency improvement, 3x indexing latency improvement, and search
              visibility delay compressed from five minutes to five seconds. Vespa's architecture enables tight
              integration of lexical and neural search — critical for multilingual queries across 26 markets.


              The recommendation system is powered by a **two-tower neural network** (query tower + item tower),
              encoding both user searches and item features into a shared 256-dimensional vector space using
              multilingual CLIP embeddings. Approximate Nearest Neighbor (ANN) search retrieves top candidates in under
              100ms from a billion-item corpus. This architecture, combined with LightGBM learning-to-rank (LTR) for
              final ranking, delivers superior search relevance compared to rivals using simpler keyword-based or
              standard collaborative-filtering systems.


              The database layer uses **Vitess** for MySQL sharding, handling over 1.3 million queries per second.
              Container orchestration uses **Kubernetes with GitOps**, presented at Cloud Native Lithuania 2023. The
              company operates in-house **data centers in Vilnius** with a custom Clos network topology, prioritising
              cost efficiency at scale over hyperscaler convenience. The event-driven microservices architecture
              (transitioned from a monolith) supports independent team deployment and fault isolation.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
              - CE036
              - CE037
              - CE038
              - CE039
      - number: '5.3'
        title: Tech Debt, Security, and Compliance Evidence
        blocks:
          - type: paragraph
            body: >
              Vinted's migration from a monolithic architecture to event-driven microservices (domain-driven design) is
              substantially complete based on engineering blog disclosures, reducing systematic tech debt in the core
              backend. However, the GDPR compliance record introduces material concerns about governance processes that
              intersect with product and data engineering.


              The July 2024 **Lithuanian DPA fine of €2,385,276** is the most significant adverse product/compliance
              event in Vinted's history. Three violations were cited: (1) shadow banning users without a lawful data
              processing basis; (2) unlawfully requiring users to specify a legal ground for erasure requests; and (3)
              inadequate transparency to users about data processing. Lithuanian courts upheld these findings in 2025,
              and in January 2026, the Supreme Administrative Court referred GDPR interpretation questions to the CJEU,
              extending legal uncertainty.


              Importantly, no security breach (hacking, data leak) has been publicly documented. The GDPR violations are
              procedural — they relate to trust-and-safety system design (shadow banning) and rights-management
              workflows, not data exfiltration. However, the systematic nature of the violations — affecting users
              across France, Poland, and Lithuania — suggests that the compliance controls around personal data
              processing in trust-and-safety systems were inadequate at the time, representing an engineering governance
              gap. No ISO 27001 or SOC 2 certification for Vinted is publicly disclosed.
            claimRefs:
              - CE008
              - CE009
              - CE010
              - CE011
              - CE012
              - CE013
              - CE026
              - CE027
              - CE035
      - number: '5.4'
        title: Developer Culture, Talent, and Team Quality
        blocks:
          - type: paragraph
            body: >
              Vinted's engineering organisation is centred in Vilnius and Kaunas, Lithuania — a deliberate bet on Baltic
              tech talent that has proven effective. The company employs 2,200+ people overall, with a large proportion
              in engineering and product. Vinted's engineering blog publishes detailed technical content on Vespa
              search, ML models, SRE practices, and infrastructure, indicating a high-transparency engineering culture
              comfortable with knowledge sharing.


              The company's presentation at Cloud Native Lithuania (June 2023) — covering Kubernetes/GitOps
              infrastructure and data center network evolution — demonstrates active participation in the broader
              engineering community. This is a positive signal: companies that contribute publicly to technical
              communities typically have higher internal engineering standards, attract better talent, and retain
              engineers longer (since external recognition amplifies career value).


              The Vilnius and Kaunas talent pools are growing; COO Mantas Mikuckas co-funded the €100M Tech Zity campus
              project, Europe's planned largest tech hub, signalling long-term institutional commitment to building
              local engineering talent. Vinted's ability to hire for specialist ML, infrastructure, and payments roles
              at scale — without London/Berlin/Paris relocation premiums — gives a structural cost advantage in
              engineering relative to Western European tech companies.
            claimRefs:
              - CE019
              - CE020
              - CE025
              - CE029
              - CE034
      - number: '5.5'
        title: Product Diligence Gaps and Open Questions
        blocks:
          - type: paragraph
            body: >
              Several product and technology questions remain open for a complete diligence assessment. First, **DSA
              compliance**: Vinted likely qualifies as a large online platform under the EU Digital Services Act given
              its 100M+ EU user base. Whether it has been designated a Very Large Online Platform (VLOP) — triggering
              the most onerous DSA obligations — and what its compliance readiness is, is not publicly documented.
              Second, **trust and safety at scale**: as Vinted expands into electronics (a higher-fraud category than
              fashion) and the US, the robustness of its fraud detection, item verification, and seller vetting systems
              becomes more critical. No transparency report or audit result is publicly available. Third, **security
              certification**: no ISO 27001 or SOC 2 Type II report has been publicly disclosed, which is a gap for any
              institutional investor doing cyber due diligence. Fourth, **cloud versus self-hosted mix**: the data
              center strategy is partially opaque; the extent to which any production workloads depend on hyperscaler
              cloud services is unknown.


              The CJEU referral creates a multi-year legal overhang: if the CJEU rules that Vinted's GDPR obligations
              are broader than the DPA's initial interpretation, the company may face retrospective penalties and
              mandated product changes in its trust-and-safety stack. Investors should ensure that legal counsel tracks
              the CJEU referral closely, as it could set a precedent for all European C2C platforms operating
              trust-and-safety algorithms.
            claimRefs:
