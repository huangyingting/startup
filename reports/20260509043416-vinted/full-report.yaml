      - number: '1.2'
        title: Leadership, Governance, and Capital
        blocks:
          - type: paragraph
            body: >
              Thomas Plantenga (Dutch, biophysics background, former OLX head of emerging markets, co-founder of
              Bookaboat and Sell It) has served as CEO since approximately 2017. He is known for data-driven
              decision-making, radical transparency with investors, and his philosophy of treating user behavior as
              fluid dynamics. The executive team includes COO Mantas Mikuckas, CFO Maurizio D'Arrigo (joined 2024),
              Marketplace CEO Adam Jay (joined 2022), and VP Vinted Go Vytautas Atkočaitis. Co-founder Justas Janauskas
              remains actively involved. Milda Mitkutė is listed as co-founder but is not in a reported operational
              role. The board includes representatives from major investors: Deven Parekh and AJ Malhotra from Insight
              Partners are noted as long-term board members; EQT Growth is represented following the 2021 Series F; and
              Carolina Brochado serves as Director. Vinted has raised approximately €480M in primary equity capital
              across its funding history: a ~$27M Series C (2015), €50M Series D (September 2018), €128M Series E led by
              Lightspeed (November 2019, €1B valuation), and €250M Series F led by EQT Growth (May 2021, €3.5B
              valuation). In October 2024, a secondary share sale of €340M led by TPG (via TPG Tech Adjacencies) at a
              €5B valuation provided employee liquidity while bringing in Hedosophia, Baillie Gifford, Invus
              Opportunities, FJ Labs, Manhattan Venture Partners, and Moore Strategic Ventures as new investors. All
              existing institutional investors retained their positions. In Q4 2023, Vinted secured a €50M revolving
              credit facility from BNP Paribas and ING Bank. In April 2026, an €880M secondary share transaction led by
              EQT raised Vinted's valuation to €8B.
