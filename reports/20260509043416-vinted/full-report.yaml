      - number: '3.3'
        title: Capability, Pricing, and Distribution Comparison
        blocks:
          - type: paragraph
            body: >
              Vinted's zero-seller-fee model is its single most structurally differentiating pricing feature. Depop
              charges sellers approximately 10% plus payment processing, Wallapop charges 5–10%, Vestiaire charges 15%+,
              and eBay charges approximately 12% on fashion. ThredUp's B2C model passes no seller control to individual
              users. Vinted's buyer protection fee (~5% + fixed per item) generates over 50% of total revenue while
              ensuring sellers see maximum returns on each listing.


              On capability, Vinted's proprietary logistics network (Vinted Go: 500K+ PUDO points, 60+ carriers) and
              embedded Vinted Pay (EMI licensed) are capabilities no pure-play C2C rival matches. Depop and Poshmark
              rely on third-party carriers. Wallapop has built logistics revenue (€74M in 2024) but its PUDO coverage is
              Spain-centric. Vestiaire uses specialist courier partners for authenticated luxury shipping but does not
              operate a branded carrier network.


              On distribution, eBay's global scale and seller trust are unmatched, but eBay's fashion traffic share is
              diluted across electronics, motors, and collectibles. Depop's Gen Z community and social-commerce features
              are strong GTM advantages in the 18–25 age bracket. Vestiaire's luxury brand partnerships (Kering, LVMH
              pilot programmes) create authenticated distribution channels Vinted cannot access. Vinted's GTM strength
              lies in TV advertising spend, zero-friction onboarding, and referral dynamics within the zero-seller-fee
              model.
            claimRefs:
