      - number: '3.4'
        title: Switching Costs, Lock-in, and Multi-homing
        blocks:
          - type: paragraph
            body: >
              Switching costs in C2C fashion marketplaces are structurally asymmetric: seller switching costs are
              moderate (reputation scores, follower bases, transaction history), while buyer switching costs are low
              (account creation on a rival takes minutes, with no data portability requirement). This creates a
              marketplace where seller retention is more defensible than buyer exclusivity.


              Multi-homing is widespread among professional and semi-professional sellers on Vinted, who routinely
              cross-list inventory on eBay, Depop, and Vinted simultaneously. This reduces listing exclusivity but does
              not reduce the importance of liquidity: buyers concentrate on the platform where they find the most
              relevant inventory, reinforcing Vinted's leader position in EU C2C fashion.


              Vinted's most durable lock-in mechanisms operate at the infrastructure layer rather than the UX layer.
              Sellers integrated into Vinted Go's label-generation, carrier tracking, and returns management embed
              Vinted into operational workflows. Vinted Pay wallet balances, recurring payout schedules, and bank-linked
              accounts further increase seller switching friction. The longer a seller operates on Vinted Go and Vinted
              Pay, the more operational data — transaction history, carrier preferences, rating — is locked to the
              Vinted ecosystem.


              Distribution power is a secondary moat: Vinted's 100M+ user base in European markets means its search and
              recommendation algorithms operate on a data advantage that a new entrant with fewer listings cannot
              replicate. This reinforces the thesis that the primary competitive risk to Vinted is not single-market
              displacement by a peer but rather slow erosion from multi-homing sellers who dilute exclusivity over time.
            claimRefs:
              - CP031
              - CP032
              - CP033
              - CP034
              - CP036
              - CP043
      - number: '3.5'
        title: Moat Durability and Competitive Risk Assessment
        blocks:
          - type: paragraph
            body: >
              Vinted's competitive moat rests on four reinforcing pillars: (1) **Network effects** — the largest buyer
              pool in EU C2C fashion creates search result depth unavailable on smaller rivals; (2) **Supply-side
              infrastructure** — Vinted Go and Vinted Pay create operational dependencies that make seller switching
              increasingly costly; (3) **Zero-fee flywheel** — seller economics superior to any rival sustain supply
              growth and attract marginal sellers off eBay and Facebook Marketplace; (4) **Brand salience** — Vinted is
              the default brand for secondhand fashion in France, Belgium, Netherlands, Poland, Lithuania, and the UK.


              The key commoditisation risk is platform-feature parity: as Depop, Wallapop, and eventually Poshmark build
              out logistics and payment tools, the infrastructure differentiation may narrow. Naver's consolidation of
              Wallapop and Poshmark represents the most credible long-run displacement scenario, if Naver transfers
              Poshmark's social-commerce features to European markets. This could accelerate Gen Z multi-homing to
              social-native formats.


              Adverse evidence: despite Vinted's EU dominance, Germany — its second-largest market — showed growth
              deceleration in 2024–2025 internal signals (not yet publicly disclosed). eBay Germany remains entrenched
              among older sellers and buyers. No rival has demonstrated an ability to replicate the Vinted Go logistics
              depth, but Wallapop's logistics-first revenue model (74% of revenue from shipping) shows the path is
              viable at scale.
            claimRefs:
