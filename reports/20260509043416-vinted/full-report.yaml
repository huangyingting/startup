  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and User Base Overview
        blocks:
          - type: paragraph
            body: >
              Vinted serves two primary user roles within a single marketplace: **sellers** (supply side) and **buyers**
              (demand side), with significant overlap — many users both buy and sell. The platform had 75 million+
              registered members across 26+ European markets as of early 2024, growing from 65 million in mid-2023.


              **Seller segments** range from casual individual sellers (the modal user — decluttering 5–20 personal
              wardrobe items per year) to power sellers (individuals running secondhand micro-businesses listing 50+
              items annually). Children's items account for approximately one-third of all listings, reflecting strong
              appeal among parents; women represent over 50% of sellers. Power sellers drive a disproportionate share of
              transaction volume, though no GMV breakdown by seller tier is publicly disclosed.


              **Buyer segments** are dominated by budget- and sustainability-conscious 25–34-year-old women (63% female
              overall). The 18–24 cohort represents about 13% of French users. The demographic has broadened over time:
              men (37% of users) and older cohorts (35–44) have grown as Vinted expanded categories and markets.
              Compared to rivals like Depop and StockX, Vinted's audience is more female and slightly older, suggesting
              stronger household-budget decision-maker penetration. Over 80% of transactions are below £20, positioning
              Vinted in the high-frequency, low-AOV shopping behaviour common to fast fashion — but with a
              sustainability and savings frame that proves durable across economic cycles.
            claimRefs:
              - CU001
              - CU002
              - CU020
              - CU022
              - CU023
              - CU034
      - number: '6.2'
        title: Market Share, Growth, and Geographic Position
        blocks:
          - type: paragraph
            body: >
              Vinted is the dominant C2C recommerce platform across Europe with an estimated **90%+ market share in
              pure-play C2C fashion recommerce** in both the UK and continental Europe. In the UK, Vinted has grown
              approximately 200x since 2020 and is the third-largest pure-play fashion retailer by customer reach,
              behind only Primark and Next — an extraordinary achievement for a non-inventory marketplace.


              **Geographic concentration is significant**: France (Vinted's original core market) accounts for
              approximately 35% of GMV; the UK and Germany contribute approximately 25% and 15% respectively, meaning
              the top three markets represent around 75% of total GMV. This is both a strength (deep market penetration
              enabling high liquidity) and a risk (economic or competitive shocks in any of these three markets would
              have outsized impact).


              Growth trajectory remains strong: GMV grew from €7.3B (2023) to an estimated €10.8B (2025), with Germany's
              growth reaccelerating in 2025 and UK/Portugal showing double-digit growth. Newer markets (Spain, Portugal,
              Croatia, Greece, Ireland) are early-stage and contribute minimally to GMV currently. The US market entry
              is at a testing phase in 2026 — a high-risk move into a market where Poshmark and eBay are entrenched,
              brand awareness is zero, and sizing/cultural differences add product friction.
            claimRefs:
              - CU003
              - CU004
              - CU005
              - CU017
              - CU018
              - CU026
              - CU027
              - CU028
      - number: '6.3'
        title: Retention, Engagement, and Satisfaction Evidence
        blocks:
          - type: paragraph
            body: >
              The most reliable retention signal available is Consumer Edge's transaction data showing **over 50% of UK
              buyers are repeat customers** — a strong retention metric for a marketplace. Vinted's **NPS of 25**
              (Comparably, 2024) with 81% self-reported loyalty rate and 3.4/5 overall satisfaction places it in a
              satisfactory but not exceptional position versus leading e-commerce platforms (Amazon NPS ~70, typical
              fashion e-commerce ~30–40).


              The engagement depth picture is positive: GMV growth significantly outpacing member growth (€10.8B GMV on
              75M+ members in 2025 vs €5.5B GMV on fewer members in 2022) implies transactions per active member are
              increasing. At 80% of purchases below £20, Vinted is a high-frequency, low-ticket platform — the retention
              pattern resembles subscription or habitual shopping rather than episodic luxury purchasing.


              Buyers' qualitative satisfaction is notably high for the core product proposition: 84% rate secondhand
              item quality as good or better than new, and 65% of buyers cite Vinted as their primary secondhand fashion
              platform. 73% prefer PUDO delivery — precisely the model Vinted Go provides — signalling strong
              product-market fit in logistics.


              Critical public disclosure gaps: no cohort retention curves (month-1, month-3, month-6), no DAU/MAU ratio,
              and no time-on-platform metrics are publicly available. The repeat-buyer proxy is insufficient for full
              LTV modelling.
            claimRefs:
              - CU006
              - CU007
              - CU008
              - CU009
              - CU015
              - CU016
              - CU024
              - CU029
              - CU030
              - CU031
      - number: '6.4'
        title: Adverse Customer Signals and Experience Failures
        blocks:
          - type: paragraph
            body: >
              Vinted's **Trustpilot rating of approximately 1.1/5** is a persistent and material adverse signal.
              Negative reviews converge on three systemic failures: (1) **customer support unresponsiveness** — tickets
              closed with generic replies, no escalation paths; (2) **weak buyer protection execution** — refunds denied
              or delayed, return shipping costs imposed on buyers; and (3) **inconsistent account moderation** — seller
              accounts suspended without clear explanation. These issues are well-documented across Trustpilot,
              ComplaintsBoard, Reviews.io, and national media outlets.


              In August 2024, Vinted reversed controversial **delivery option changes** after significant seller
              backlash — a sign that the company's product change management process outpaced user tolerance, creating
              acute churn risk even among loyal sellers. A **payment glitch** in mid-2024 delayed seller fund
              withdrawals with delayed company communication, further eroding trust in the payments system at a critical
              time when Vinted Pay was expanding.


              The interpersonal safety dimension is also adverse: reports of buyer/seller **harassment and aggressive
              bargaining** are frequent, with limited platform-side dispute support. This is structurally common in C2C
              marketplaces but Vinted's reputation for inadequate dispute resolution amplifies the negative signal.


              The bifurcation of satisfaction signals — 84% of buyers pleased with product quality vs 1.1/5 on
              Trustpilot — reflects that the **core marketplace mechanics work** (items, discovery, pricing) but the
              **post-transaction support layer is structurally weak**, a pattern that tends to become more visible as
              the user base matures and dispute volumes scale.
            claimRefs:
              - CU010
              - CU011
              - CU012
              - CU013
              - CU014
              - CU021
              - CU033
      - number: '6.5'
        title: Expansion and Concentration Risks
        blocks:
          - type: paragraph
            body: >
              Vinted's growth optionality is compelling: 26+ markets with dominant shares in three; category expansion
              into electronics, luxury, and books; and US market entry testing in 2026. However, the expansion path
              carries distinct risks.


              **Geographic concentration**: France, UK, and Germany drive approximately 75% of GMV. While Vinted is
              actively expanding into Southern Europe and CEE, these new markets are early-stage and do not yet
              meaningfully dilute concentration. A structural disruption in France alone would affect approximately 35%
              of GMV.


              **US market customer acquisition**: The US resale market is structurally different — Poshmark's community
              features, eBay's scale, and ThredUp's managed resale model are established. Vinted enters with zero brand
              awareness, different sizing conventions (creating product friction as UK-US cross-border functionality has
              already received adverse user feedback), and different payment and logistics rails. Customer acquisition
              will require material investment not yet visible in the financial model.


              **DAC7 seller concentration risk**: EU DAC7 regulations require platforms to report seller income above
              €2,000/year to tax authorities, effective 2024. Power sellers who drive a disproportionate share of GMV
              may reduce their listing volume or migrate platforms if reporting triggers tax liability they previously
              ignored. No public data on Vinted's power-seller DAC7 exposure is available.
            claimRefs:
              - CU004
              - CU026
              - CU027
              - CU028
