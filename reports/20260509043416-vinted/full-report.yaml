  productSummary: >
    Vinted's core product is a C2C marketplace where private sellers list secondhand clothing and lifestyle items at
    zero commission. Buyers pay a buyer protection fee (approximately 3–8% of item price plus fixed fee) that funds
    Vinted's revenue. Vinted Go provides integrated shipping (60+ carriers, 500K+ PUDO lockers and drop-off points in 15
    markets) eliminating individual carrier negotiation. Vinted Pay (EMI-licensed) internalises payment processing
