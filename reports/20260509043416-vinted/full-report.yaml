companyProfile:
  summary: >
    Vinted is a Vilnius-based C2C recommerce platform founded in 2008 by Milda Mitkutė and Justas Janauskas. Originally
    a Lithuanian student clothes-swap community, it has grown into Europe's largest pure-play secondhand marketplace
    with 75M+ registered members across 20+ markets. Vinted operates an integrated flywheel — marketplace (buyer
    protection fee), logistics (Vinted Go: 500K+ PUDO points, 60+ carriers), and payments (Vinted Pay: EMI-licensed) —
    that creates a structural moat competitors cannot replicate without multi-year platform investment. The platform
    achieved its first statutory profit in 2023 (€17.8M), followed by €76.7M net profit in 2024 and €62M in 2025
    (moderated by US and Vinted Go investment). France (35% GMV), UK (25%), and Germany (15%) are the three largest
    markets. In April 2026, Vinted completed an oversubscribed €880M secondary transaction at €8B equity valuation, led
    by EQT with new investors BlackRock, Ontario Teachers', Schroders Capital, and Lombard Odier — with no new primary
    capital issued.
