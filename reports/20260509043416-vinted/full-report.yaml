          - type: callout
            title: GDPR Regulatory Exposure
            body: >
              The Lithuanian DPA fined Vinted €2,385,276 in July 2024 for GDPR violations (right-to-erasure failures and
              shadow-banning practices). Litigation is also pending in Poland, Italy, and France. A French class action
              (UFC-Que Choisir, filed 2021) over buyer protection fees is unresolved. Maximum GDPR exposure could
              theoretically reach 4% of global annual turnover.
            calloutType: risk
