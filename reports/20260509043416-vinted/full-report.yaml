      - number: '3.2'
        title: Competitor Profiles and Strategic Directions
        blocks:
          - type: paragraph
            body: >
              **Depop** (Etsy, acq. June 2021 at $1.6B) targets Gen Z buyers and sellers of curated vintage and
              streetwear. It generated $788.9M GMS in 2024 (+31.6% YoY), with approximately $85M revenue and 43.5M
              registered users. Despite rapid GMS growth, Depop posted an operating loss of £42M, narrowed 14% from the
              prior year. Depop's strong community and social-commerce features differentiate it, but its US-UK focus
              and continued losses contrast with Vinted's European profitability.


              **Wallapop** (Naver, acquired 2025 at ~€650M) is Spain's dominant C2C marketplace with 19–21M monthly
              active users. Revenue was €101M (+13%) in 2024, still running a €25M operating loss. Naver's simultaneous
              ownership of Wallapop (Southern Europe) and Poshmark (US) positions it as the only global C2C recommerce
              consolidator, though cross-border feature leverage is unproven.


              **Vestiaire Collective** targets mid-to-luxury resale globally, generating ~€200M revenue in 2024 from
              ~€1B GMV. Its €1.1–1.2B 2024 valuation is below its 2021 €1.4B peak. The platform targets its first
              full-year profit in 2026. Its luxury authentication capabilities position it outside Vinted's core
              mass-market lane.


              **ThredUp** (Nasdaq: TDUP) is a US B2C recommerce platform — not a true C2C peer — that generated $260M
              revenue (+1%) in 2024 with a 79.7% gross margin but a $40M net loss. Critically, ThredUp divested 91% of
              its European operations in Q4 2024, materially reducing any direct competitive overlap with Vinted in
              Europe.


              **eBay** is the largest incumbent, with pre-owned clothing comprising 39% of fashion category sales and
              pre-loved goods representing 40% of global GMV. eBay's C2C fashion strengths are seller trust built over
              two decades and global reach, but its multi-category UX is diluted relative to Vinted's fashion-focused
              experience.
