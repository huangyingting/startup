      - number: '1.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Zero-Seller-Fee Flywheel
            body: >
              Vinted's buyer-pays model (zero seller fees, mandatory buyer protection fee) is the defining competitive
              moat. By removing friction for sellers, the platform achieves supply density that makes it the default
              destination for buyers, creating a self-reinforcing flywheel. This model has proven profitable at scale,
              generating €813.4M revenue in 2024 and €76.7M net profit.
            calloutType: strength
