  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Vinted operates in the global secondhand fashion marketplace sector, which reached approximately $300
              billion in GMV in 2024 and is projected to grow at roughly 20% CAGR through 2030. The competitive
              landscape spans five distinct competitor categories. **Direct C2C peers** include Depop (Gen Z fashion,
              Etsy-owned), Wallapop (general C2C, Spain-dominant, Naver-acquired), and Poshmark (social fashion,
              US-focused, Naver-owned). **Luxury resale specialists** are represented by Vestiaire Collective and The
              RealReal. **B2C recommerce** is anchored by ThredUp (US) and Rebag. **General incumbents** — primarily
              eBay — compete across all categories with pre-owned items constituting 39% of eBay's
              clothing/shoes/accessories volume and 40% of total global GMV. **Likely entrants** include tech-enabled
              fast fashion players (Shein, Zalando) who could add resale features, and social platforms (Instagram,
              TikTok Shop) that enable peer-to-peer commerce natively.


              Vinted's 90%+ EU C2C panel share reflects the winner-take-most dynamics of liquidity-driven marketplaces:
              once a platform achieves sufficient buyer density, sellers follow, creating a self-reinforcing cycle that
              makes displacement structurally difficult. General resale platforms (eBay, Vinted, Wallapop, Mercari)
              collectively command approximately 80% of global resale web traffic, with fashion-focused platforms
              (Depop, Poshmark, Vestiaire) accounting for most of the remainder.
            claimRefs:
              - CP019
              - CP020
              - CP044
              - CP023
              - CP017
