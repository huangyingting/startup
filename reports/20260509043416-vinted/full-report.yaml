  - id: TV005
    title: Thesis-break and kill triggers table
    description: >-
      Specific conditions that would break the Vinted investment thesis, with monitoring metrics and recommended
      response.
    enumerationCoverage: exhaustive
    enumerationScope:
      coverage: exhaustive
      basis: Covers the primary thesis-break scenarios identified across all eight research chapters.
    notes: Trigger thresholds are illustrative; investors should calibrate to their specific return requirements.
    claimRefs:
      - CV026
      - CV027
      - CV028
    columns:
      - Thesis Break
      - Trigger Metric
      - Monitoring Cadence
      - Recommended Response
    rows:
      - - Revenue growth deceleration below 15%
        - YoY revenue growth <15% for 2 consecutive quarters
        - Quarterly (newsroom / annual reports)
        - Re-evaluate valuation; seek secondary market exit if available
      - - Adverse CJEU ruling (mandatory product redesign)
        - CJEU rules that shadow-ban requires redesign; EU-wide deadline <24 months
        - Monitor CJEU docket annually; expect 2027–2028 ruling
        - Quantify engineering impact; model 12–24 month product slowdown in bear case
      - - EU regulatory reclassification of buyer protection fee
        - EU Commission investigation into fee structure initiated
        - Monitor EU Commission platform investigations quarterly
        - Immediate model update; consult legal counsel on reclassification probability
      - - France GMV deceleration below 10% for 2 quarters
        - France-specific GMV proxy metrics (search traffic, Consumer Edge data)
        - Quarterly
        - Competitive and regulatory root-cause analysis; pause EU expansion capital
      - - US market failure (GMV <1% of total by end-2027)
        - US GMV percentage of total reported GMV
        - Annual (requires management disclosure)
        - Request management pivot plan; monitor if capital is reallocated to EU core
      - - Vinted Pay EMI capital adequacy breach
        - Lithuanian National Bank supervisory action; public disclosure of capital call
        - Annual monitoring of EMI regulatory filings
        - Assess balance-sheet impact; determine if primary capital injection is required
  - id: TV006
    title: Final diligence asks table
    description: >-
      Outstanding information requests critical to underwriting a co-investment in Vinted at the April 2026 €8B
      secondary valuation.
    enumerationCoverage: exhaustive
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six highest-priority diligence asks identified across all research chapters; covers financial, legal,
        operational, and product dimensions.
    notes: >-
      Priority: P1 = non-negotiable pre-investment; P2 = required before final commitment; P3 = management meeting
      agenda item.
    claimRefs:
      - CV033
      - CV039
      - CV034
    columns:
      - Diligence Ask
      - Priority
      - Rationale
      - Acceptable Response
    rows:
      - - Audited IFRS financial accounts for 2023 and 2024
        - P1
        - >-
          Press-release financials are insufficient at €8B scale; IFRS treatment of Vinted Pay, Vinted Go, and deferred
          revenue may materially differ from statutory filings
        - Receipt of KPMG/PWC/Deloitte/EY signed IFRS accounts
      - - Cohort buyer retention curves (month-1/3/6/12 by market)
        - P1
        - >-
          LTV cannot be reliably modelled without cohort retention; the >50% repeat-buyer UK figure is insufficient for
          €8B underwriting
        - Management presentation with 2022–2025 cohort retention data by core market
      - - CJEU case status and legal counsel brief on scenarios
        - P1
        - >-
          CJEU referral creates multi-year legal uncertainty; mandatory product redesign is a material engineering and
          cost risk
        - Legal counsel scenario memo; estimated ruling timeline; risk-adjusted compliance cost
      - - US market GMV, listings, and user acquisition data since testing began
        - P2
        - US is a key bull-case driver but zero data has been disclosed; the thesis cannot be underwritten without KPIs
        - Management KPI dashboard for US market including listing count, GMV, sign-ups (as of May 2026)
      - - DAC7 reportable seller volume and any observed activity reduction
        - P2
        - >-
          Power-seller supply-side risk is unquantified; if 30%+ of GMV is from DAC7-reportable sellers, the downside
          scenario is more severe
        - Number of DAC7-reportable sellers by market; observed listing rate change vs. pre-2024 baseline
      - - Vinted Pay take-rate roadmap and 2026–2028 EBITDA contribution model
        - P2
        - >-
          Take-rate expansion is the primary EBITDA improvement lever; investor model depends on its timeline and
          magnitude
        - Management financial model with Vinted Pay revenue, margin, and timeline by market
