      - number: '1.4'
        title: Ecosystem and Strategic Initiatives
        blocks:
          - type: paragraph
            body: >
              Vinted Group now operates a vertically-integrated ecosystem beyond the core marketplace. Vinted Go,
              launched as a brand in 2022, manages over 500,000 pick-up and drop-off points through partnerships with
              60+ carriers, and in 2025 expanded into Spain and Portugal with its own in-house carrier (Vinted Go
              Carrier now operating in Belgium, France, Netherlands, Portugal, and Spain). Vinted Go acquired Dutch
              delivery company Homerr in October 2023. Vinted Pay secured an Electronic Money Institution (EMI) license
              from the Bank of Lithuania in 2022 and launched wallet services in Lithuania in 2024 to reduce third-party
              payment costs. Vinted Ventures launched in April 2025 as a corporate venture capital arm to invest in
              Series A-C re-commerce startups. The company has also expanded beyond fashion into electronics (2024),
              books, sports and collectables (2025), and home categories, supporting its ambition to serve as the
              universal secondhand marketplace. The Item Verification Service for luxury and designer items, developed
              using Rebelle's authentication expertise, is now live in 10 countries. Brand campaigns (such as "New Eras
              Again" in September 2025 and partnerships with celebrities like Paul Mescal and organizations like Oxfam)
              reinforce Vinted's positioning as a mainstream, sustainability-aligned platform.
