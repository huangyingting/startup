summary:
  headline: >-
    Vinted 是一家能复利的欧洲互联网公司——已经盈利，收入增长 38%，护城河也一体化——但 2026 年 4 月 €8B 老股入场价（过去 12 个月收入 7.3x、EBITDA
    53x）只给出有限基准情景上行，监管和执行风险则带来实质悲观情景下行。
  overallScore: 7
  recommendation: track
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 8800
    revenueRunRateUsdM: 1210
    arrUsdM: 1210
    revenueGrowthYoYPct: 38
    grossMarginPct: null
