    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与起源
        blocks:
          - type: paragraph
            body: >
              Vinted Group UAB 总部位于立陶宛维尔纽斯，是一家私营科技公司。公司由 Milda Mitkutė（当时 22 岁）和 Justas Janauskas 于 2008 年共同创立。最初的想法来自
              Mitkutė：搬进更小的学生宿舍前，她需要卖掉多余衣物；程序员 Janauskas 帮她搭了一个网站，让用户彼此交易物品。几周内，平台就从个人解决方案变成一个受欢迎的社区交易平台。公司先在立陶宛上线，随后
              2009 年进入德国，2011 年进入捷克，2013 年进入法国和波兰，2014 年进入英国。到 2016 年，Vinted
              已扩展到九个市场，但各地区商业模式不一致，卖家费用赶走用户，广告收入也几乎只能覆盖服务器成本。公司距离破产大约只剩九到十二个月时，Insight Partners 引入了荷兰创业者 Thomas
              Plantenga。Plantenga 于 2016 年以五周咨询项目加入，此后再也没有回纽约，最终出任 CEO。他大刀阔斧重组：关闭除维尔纽斯总部外的所有区域办公室，裁员超过三分之一，取消 20%
              卖家费，引入买家保护费，并投放大规模电视广告。收入大幅反弹。2019 年 11 月，Vinted 以 €1B+ 估值完成由 Lightspeed Venture Partners 领投的 €128M E
              轮融资，成为立陶宛首家科技独角兽。如今，Vinted 在维尔纽斯、考纳斯、阿姆斯特丹、柏林、汉堡和巴黎设有办公室，员工超过 2,200 人。
