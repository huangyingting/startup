      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              **乐观情景（概率：25%）**：Vinted 美国市场进入获得牵引（到 2028 年占 GMV 10%），欧洲增长维持 25% CAGR，Vinted Pay take-rate 扩至 12%+，CJEU
              裁决温和。2028E 收入达到 €2.2–2.5B；调整后 EBITDA 接近 €350–400M。按 5–6x 远期收入 IPO 倍数（Allegro 风格），Vinted 以 €11–16B 上市，相对
              €8B 入场价带来 38–100% 总回报。该情景要求欧洲留存和美国执行同时成功。


              **基准情景（概率：50%）**：欧洲收入以 20% CAGR 增长；到 2028 年美国贡献 <5% GMV；Vinted Pay take-rate 达到 11%。2028E 收入为
              €1.6–1.9B；EBITDA 为 €240–280M。按 5x 远期收入，IPO 估值达到 €8–10B——相对 €8B 老股入场价，在 3 年维度只有 0–25%
              的温和总上行。老股投资者能赚到资本成本，但拿不到超额回报。


              **悲观情景（概率：25%）**：不利 CJEU 裁决要求重做信任与安全系统，拖走 18–24 个月工程资源；法国 GMV 增速降至 10% 以下；美国进入失败并发生投资减记；take-rate 停滞在
              10%。到 2028 年收入平台化在 €1.2–1.4B；EBITDA 被压缩。按 3–4x 收入，Vinted 被标记为 €3.6–5.6B——相对 €8B 老股入场价亏损 30–55%。


              三种情景的期望值（权重 25/50/25）得到约 €8.5–10B 的概率加权估值——略高于入场价，说明预期回报为正，但分布很宽。悲观情景 30–55% 的回撤很大；结构化下行保护会显著改善风险调整后回报。
