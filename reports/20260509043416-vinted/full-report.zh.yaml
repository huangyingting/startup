  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              本章分析的市场是**面向二手时尚的 C2C（消费者对消费者）在线转售市场**——包括私人个体通过数字平台买卖的服装、鞋履和配饰。这是 Vinted 的核心经营板块，区别于 B2C 转售（Zara
              Pre-Owned 或 Zalando Pre-Owned 等品牌自营二手店）、线下慈善 / 旧货零售、时尚租赁 / 订阅和新品服装。


              全球二手时尚市场（包括全部渠道和形态）2024 年估计为 **USD 190 billion**，预计以 10.7% CAGR 增长，到 2034 年达到 **USD 521.5
              billion**（GMInsights，2025 年 4 月）。这些总量数字覆盖线下旧货店、寄售店和线上平台。Vinted 真正面对的是**欧洲在线 C2C 时尚转售**子市场，2024 年估计约
              **€15–20 billion**，并以每年 7.7–8.5% 增长，到 2030 年达到 **€26 billion**（Faume、Future Market Insights）。


              市场边界分为四类：（a）纯 C2C 转售（Vinted、Depop、Wallapop），其中 Vinted 掌握约 90% 的欧洲面板消费；（b）奢侈品鉴定平台（Vestiaire Collective、The
              RealReal），销售更高客单价的精选 / 鉴定商品；（c）通用分类信息平台（Facebook Marketplace、eBay Kleinanzeigen），品类不止时尚；以及（d）既有品牌的 B2C
              二手电商。替代关系是真实存在的——Shein 和 Temu 的超低价新衣，在单件价格上与 Vinted 列表相近。
