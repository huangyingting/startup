      - number: '6.4'
        title: 反向客户信号与体验失效
        blocks:
          - type: paragraph
            body: >
              Vinted 的 **Trustpilot 评分约 1.1/5**
              是持续且重大的反向信号。负面评价集中在三类系统性失效：（1）**客服响应不足**——工单用模板回复关闭，没有升级路径；（2）**买家保护执行弱**——退款被拒或拖延，退货运费转嫁给买家；（3）**账户管理不一致**——卖家账户被暂停却没有清晰解释。这些问题在
              Trustpilot、ComplaintsBoard、Reviews.io 和各国媒体中都有充分记录。


              2024 年 8 月，Vinted 在卖家强烈反弹后撤回有争议的**配送选项变更**——说明公司的产品变更管理跑在用户容忍度之前，即便忠诚卖家也可能出现急性流失。2024
              年中一次**支付故障**拖延了卖家提款，公司沟通也滞后，在 Vinted Pay 扩张的关键阶段进一步削弱了对支付系统的信任。


              人际安全维度同样偏负面：关于买卖双方**骚扰和强势砍价**的报告很多，而平台侧争议支持有限。这在 C2C marketplace 中结构性常见，但 Vinted 争议解决不足的声誉放大了负面信号。


              满意度信号的分裂——84% 买家认可商品质量，而 Trustpilot 只有 1.1/5——说明**核心 marketplace
              机制有效**（商品、发现、定价），但**交易后支持层结构性偏弱**。用户基础成熟、争议量放大后，这类模式往往会更显眼。
