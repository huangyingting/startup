      - number: '4.2'
        title: 财务表现轨迹
        blocks:
          - type: paragraph
            body: >
              Vinted 的收入轨迹显示出持续高增长：2023 年 €596.3M（+61%）、2024 年 €813.4M（+36%）、2025 年 €1.1B（+38%）。经历 15 年投资驱动增长后，公司在 2022
              年亏损 €20.4M，2023 年首次盈利（净利润 €17.8M）。2024 年盈利能力快速放大：净利润增长 330% 至 €76.7M，调整后 EBITDA 翻倍以上至 €158.9M（+108%）。


              2025 年业绩代表一次有意的再投资：净利润下降 19% 至 €62M，调整后 EBITDA 下降 5% 至 €151M，而收入和 GMV 分别增长 38% 和 47%。调整后 EBITDA 利润率从约
              19.5%（2024 年）压缩至 13.7%（2025 年）。不过，自由现金流增长 36% 至 €137M，说明 Vinted Go
              物流扩张和新市场进入的投入正在被吸收，并未消耗现金储备。净利润下降（会计口径）与 FCF 上升（现金口径）背离，表明非现金费用和时点差异解释了利润下降中的重要部分。


              公司一直处于高增长复利模式：收入从 2019 年约 €40M（估计）增长到 2025 年 €1.1B，六年约 28 倍，验证了飞轮逻辑。
