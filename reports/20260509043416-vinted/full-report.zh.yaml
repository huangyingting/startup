companyProfile:
  summary: >
    Vinted 是一家总部位于维尔纽斯的 C2C 二手交易平台，2008 年由 Milda Mitkutė 和 Justas Janauskas 创立。它最初是面向立陶宛学生的服装交换社区，如今已长成欧洲最大的纯二手交易平台，在
    20+ 个市场拥有 75M+ 注册会员。Vinted 经营一套整合飞轮——交易平台（买家保护费）、物流（Vinted Go：500K+ 个 PUDO 点、60+ 家承运商）和支付（Vinted Pay：持 EMI
    牌照）——竞争对手若没有多年平台投入，很难复制这道结构性护城河。平台 2023 年首次实现法定盈利（€17.8M），2024 年净利润 €76.7M，2025 年净利润 €62M（受美国和 Vinted Go
    投资压低）。法国（GMV 占 35%）、英国（25%）和德国（15%）是前三大市场。2026 年 4 月，Vinted 完成一笔超额认购的 €880M 老股交易，股权估值 €8B，由 EQT 领投，新进投资者包括
    BlackRock、Ontario Teachers'、Schroders Capital 和 Lombard Odier——没有发行任何新股。
