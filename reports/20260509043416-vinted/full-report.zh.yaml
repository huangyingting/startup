      - number: '6.3'
        title: 留存、参与度与满意度证据
        blocks:
          - type: paragraph
            body: >
              目前最可靠的留存信号来自 Consumer Edge 的交易数据：**英国买家超过 50% 为复购客户**——对 marketplace 来说是很强的留存指标。Vinted 的 **NPS 为
              25**（Comparably，2024），自报忠诚度 81%，整体满意度 3.4/5；相对领先电商平台（Amazon NPS 约 70，典型时尚电商约 30–40），它处在合格但不突出的区间。


              参与深度指标偏正面：GMV 增长显著快于会员增长（2025 年 75M+ 会员贡献 €10.8B GMV，而 2022 年会员更少、GMV 为 €5.5B），说明每名活跃会员交易次数在增加。80% 购买低于
              £20，Vinted 是高频、低客单平台——其留存模式更像订阅或习惯性购物，而非偶发奢侈品购买。


              买家对核心产品主张的定性满意度明显较高：84% 认为二手商品质量好于或不低于新品，65% 的买家把 Vinted 列为自己的主要二手时尚平台。73% 偏好 PUDO 配送——这正是 Vinted Go
              提供的模式——显示物流上的产品市场匹配很强。


              关键公开披露缺口：没有队列留存曲线（第 1、3、6 个月），没有 DAU/MAU 比率，也没有平台停留时长指标。复购买家代理指标不足以支撑完整 LTV 建模。
