  productSummary: >
    Vinted 的核心产品是 C2C 交易平台，私人卖家可以零佣金发布二手服装和生活方式商品。买家支付买家保护费（约为商品价格的 3–8%，另加固定费用），构成 Vinted 的收入来源。Vinted Go 提供整合配送（15
    个市场内 60+ 家承运商、500K+ 个 PUDO 柜和投递点），省去卖家逐一谈承运商。Vinted Pay（持 EMI 牌照）把支付处理利润留在内部，并支持跨境交易。产品已扩展到电子产品（2024 年）、可持续品牌线「New
    Again」（2025 年），并在测试美国市场（2026 年）。平台用双塔 ML 和 256 维 CLIP 嵌入支撑 AI 搜索。
  customerFocus: >
    核心人群是 25–34 岁女性（女性用户占 63%）；80% 的购买低于 £20；买家重视性价比且会复购（英国复购买家率 50%+）。卖家供给来自个人私人卖家，其中大卖家（DAC7 申报门槛：每年 €2,000/30
    件）贡献了有意义但未量化的 GMV 份额。公司没有企业级或 B2B 产品。
  businessModel: >
    零卖家费模型：Vinted 对每笔交易向买家收取买家保护费（约 3–8% + 固定费用），收入约等于 GMV 的 10%。Vinted Go 通过物流撮合赚取单包裹利润。Vinted Pay
    将支付处理利润内部化。收入：€1.1B（2025 年）。调整后 EBITDA：€151M（利润率 13.7%）。FCF：€137M。
  stage: late-stage private
