  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Vinted 的收入完全来自买家和可选卖家服务——卖家发布或销售都零付费。主要收入来源是**买家保护费**，每笔交易收取约 €0.70 固定费用加商品价格
              5%（随市场和地区变化）。公司披露显示，这一项占总收入超过 50%。一件 €20 商品的买家保护费约 €1.70——相当于该商品交易额 7.5% 的变现率。这笔费用覆盖支付安全、买家争议解决和平台访问。


              三个次要收入流的重要性正在上升。**Vinted Go 配送利润**来自与 60+
              家承运商谈判批量价格，并向用户收取高于边际成本的混合费用；物流收入规模可观，但未单独披露。**推广列表**允许卖家付费提升商品在搜索结果中的可见度；规模化后，这是无需增加可变成本的高毛利增量收入。**Vinted
              Pay** 从持 EMI 牌照支付机构处理的交易中赚取利润，随着采用加深，这条未披露收入线仍在增长。


              2025 年有效抽佣率约为 GMV 的 10.2%（€1.1B / €10.8B），在 C2C
              平台中偏高，反映了买家付费模型相较卖家佣金方案具备更强变现能力。收入质量在结构上较高：买家保护费在多数场景下不可退，并自动适用于每笔交易，形成与交易量挂钩的重复性基础，没有集中度风险。
