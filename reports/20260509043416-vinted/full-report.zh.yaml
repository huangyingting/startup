      - number: '6.2'
        title: 市场份额、增长与地理位置
        blocks:
          - type: paragraph
            body: >
              Vinted 是欧洲主导性的 C2C 二手电商平台，在英国和欧洲大陆的**纯 C2C 时尚二手交易**中估计拥有 **90%+ 市场份额**。在英国，Vinted 自 2020 年以来大约增长 200
              倍，按客户触达已成为第三大纯时尚零售商，仅次于 Primark 和 Next——对一个不持库存的 marketplace 来说，这是极罕见的成绩。


              **地理集中度很高**：法国（Vinted 最初的核心市场）约占 GMV 35%；英国和德国分别约贡献 25% 和 15%，意味着前三大市场合计约占总 GMV
              75%。这既是优势（深度渗透带来高流动性），也是风险（任一市场的经济或竞争冲击都会产生放大影响）。


              增长轨迹仍然强劲：GMV 从 €7.3B（2023）增至估计 €10.8B（2025），德国增长在 2025 年重新加速，英国 /
              葡萄牙呈两位数增长。新市场（西班牙、葡萄牙、克罗地亚、希腊、爱尔兰）仍处早期，目前对 GMV 贡献很小。2026 年美国市场进入仍处测试阶段——这一步风险高：Poshmark 和 eBay
              已经站稳，品牌认知为零，尺码和文化差异也会增加产品摩擦。
