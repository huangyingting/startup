      - number: '7.5'
        title: 风险缓释与叫停标准
        blocks:
          - type: paragraph
            body: >
              Vinted 披露的风险缓释证据有限：2024 年 6 月在监管压力后修复 DSA 费用披露；GDPR 隐性封禁政策在立陶宛 DPA 罚款后调整。两项修复都是反应式而非前置式，说明 Vinted
              的合规姿态历史上更多由响应驱动，而不是提前预判。


              **关键风险的建议叫停标准**：

              - *美国市场进入*：如果经过两年投入后，到 2027 年底美国 GMV 低于总 GMV 的某个明确定义比例，应把资本重新配置回 EU 核心市场。

              - *CJEU GDPR 裁决*：如果 CJEU 要求结构性产品重做，且合规期限 <24 个月，必须评估对其他计划的工程产能影响。

              - *法国 / 德国 GMV 减速*：任一市场若连续两个季度 GMV 下滑，应在投入更多扩张资本前触发竞争和监管根因复盘。

              - *Vinted Pay 资本充足性*：如果 Lithuanian National Bank 要求 EMI 牌照追加资本，需评估这是否改变稀释和资本结构。


              GDPR、DSA、GPSR、DAC7、EMI 叠加形成结构性合规投资负担，未来 3–5 年都会持续。任何尽调投资者都应在基准投资逻辑中建模 €30–50M 的年度合规成本增量。
