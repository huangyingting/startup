  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Vinted 最重大的风险簇是监管。2024–2026 年，四套不同监管框架同时给公司施加义务。


              **DSA（Digital Services Act）**：DSA 自 2024 年 2 月 17 日全面适用，要求 Vinted 核验卖家身份（第 30 条）、为非法商品运行通知与行动机制（第 16
              条）、处理重复违规者（第 23 条），并保持算法和广告实践透明。2024 年 6 月，EU Commission 和立陶宛当局要求 Vinted 停止在结账时添加未披露的自动费用，并改善退款透明度——说明
              Vinted 在法案启动时并未完全符合 DSA。持续监测仍在进行，价格清晰度仍有缺口。DSA 违规罚款最高可达全球年收入 6%——按 2025 年收入水平约为 €66M——严重或重复违规还可能被运营禁令。


              **GDPR CJEU 转介**：Vinted 的 €2,385,276 罚款（2024 年 7 月）在 2025 年被立陶宛法院维持。该案于 2026 年 1 月转介至 CJEU，形成多年法律不确定性。如果
              CJEU 作出不利裁决，Vinted 可能被要求同时在全部 26 个市场重做隐性封禁和用户可见性算法——这是重大的工程和产品风险。该案也会为整个 C2C 平台行业确立先例。


              **GPSR（General Product Safety Regulation）**：GPSR 于 2024 年 12 月生效，将 Vinted
              归为二手商品的“distributor”，施加安全核验、市场监管协作和召回义务。Vinted 扩张到电子产品——该品类的产品安全风险显著高于时尚——会放大这项敞口。公开资料中没有 Vinted 针对电子产品的
              GPSR 合规流程证据。


              **DAC7**：自 2024 年 1 月 31 日起，Vinted 必须向 EU 成员国税务机关报告年收入 >€2,000 或年交易 >30 次的卖家。这带来双重风险：平台合规义务（如果 Vinted
              未报告，每个国家罚款 €50,000+），以及供给侧需求风险（高频卖家为避免税务审查而减少活动）。
