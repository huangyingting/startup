      - number: '5.5'
        title: 产品尽调缺口与开放问题
        blocks:
          - type: paragraph
            body: >
              完整尽调还剩若干产品与技术问题。第一，**DSA 合规**：Vinted 的 EU 用户超过 100M+，很可能符合 EU Digital Services Act 下大型在线平台的定义。它是否已被指定为
              Very Large Online Platform（VLOP）——从而触发最重的 DSA 义务——以及合规准备度如何，公开资料没有记录。第二，**规模化信任与安全**：Vinted
              扩入电子产品（欺诈风险高于时尚）和美国后，欺诈检测、商品验证、卖家审核系统的韧性更关键。目前没有公开透明度报告或审计结果。第三，**安全认证**：公司未公开披露 ISO 27001 或 SOC 2 Type II
              报告，这对任何做网络安全尽调的机构投资者都是缺口。第四，**云与自建部署组合**：数据中心策略部分不透明；任何生产工作负载依赖超大规模云厂商服务的程度仍未知。


              CJEU 转介形成多年法律悬顶：如果 CJEU 认定 Vinted 的 GDPR 义务比 DPA 最初解释更宽，公司可能面对追溯性罚款，并被要求改造信任与安全技术栈里的产品功能。投资者应确保法律顾问密切跟踪
              CJEU 转介，因为该案可能为所有运行信任与安全算法的欧洲 C2C 平台确立先例。
