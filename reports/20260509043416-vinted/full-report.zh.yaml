      - number: '4.5'
        title: 财务尽调缺口与风险信号
        blocks:
          - type: paragraph
            body: >
              Vinted 的财务披露受私营身份限制。最重要缺口包括：（1）**分收入流拆分**——买家保护费、Vinted Go 配送利润、推广列表和 Vinted Pay
              收入的拆分未披露，无法评估哪些收入流在增长、收缩或拖累利润率；（2）**资产负债表和现金头寸**——集团层面现金、总资产和债务未公开；只有立陶宛单体账户在 Rekvizitai 公开申报；（3）**国家级 GMV
              / 收入**——没有分市场数据就无法评估地域集中风险；（4）**单位经济性**——CAC、LTV 以及按队列和市场拆分的回本周期未披露。


              反向财务信号：2025 年净利润率从 9.4% 降至 5.6%，但 FCF 增长——这条背离需要跟踪。如果 EBITDA 利润率在 2026 年继续压缩到 10%
              以下，却没有收入同步加速，可能意味着结构性成本爬升（Vinted Go 经营亏损、管理费用扩张）或核心市场需求侧放缓。此外，Vinted 的「调整后
              EBITDA」定义没有公开说明——公司是否排除股权激励尚不清楚。在 IPO 前股权授予加速的背景下，这可能显著高估经营盈利能力。
