      - number: '2.4'
        title: 增长驱动、约束与竞争动态
        blocks:
          - type: paragraph
            body: >
              欧洲 C2C 转售品类的**主要增长驱动**：

              1. **可负担性压力**：2022–2024 年通胀推高生活成本，把新队列带入二手消费，将其作为实用预算策略。

              2. **代际常态化**：Gen Z 把二手视为默认选择，而非妥协；这代表结构性需求变化，PwC 2024 年数据显示 18–43 岁人群采用率达 70%。

              3. **平台技术成熟**：AI 驱动搜索和推荐（Vinted 的 Vespa 引擎）、移动优先 UX 和整合物流（Vinted Go）把摩擦降到采用门槛以下。

              4. **EU 循环经济政策**：EU 循环纺织战略、CSRD 报告要求和生产者责任延伸法规，为转售提供结构性顺风，也带来更有利于规模玩家的合规成本。

              5. **「混合」趋势**：越来越多人接受新品和二手混买，使总买家池超出只买二手的拥护者。


              **关键约束**：

              1. **信任壁垒**：假货风险、描述不实和卫生担忧限制转化——尤其影响较高价格商品和新用户群体（年长、男性买家）。

              2. **EU 监管复杂度**：DAC7（收入申报）、CSRD、GDPR 和消费者保护指令都带来合规成本。DAC7 尤其可能要求平台向税务机关披露收入，从而压低休闲卖家参与度。

              3. **德国市场饱和 / 抵触**：eBay Kleinanzeigen 在德国 C2C 分类信息中的根深蒂固地位，以及德国人较少把二手时尚作为主要衣物来源（「混合型」仅 7%），拖慢了 Vinted
              在德国的势头。

              4. **品牌二手电商入场**：既有时尚品牌推出自有转售渠道（Zara、Zalando、H&M），可能截走本会流向 C2C 平台的品牌忠诚消费者。

              5. **超低价新时尚的价格竞争**：Shein 和 Temu 的价格点接近二手水平，可能削弱价格敏感群体购买二手的经济动机。
