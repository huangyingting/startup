      - number: '7.4'
        title: 人才、执行与财务风险
        blocks:
          - type: paragraph
            body: >
              **人才风险**：Vinted 工程团队集中在 Vilnius 和 Kaunas，形成高级人才集中风险。波罗的海地区的中级资深工程人才池较深，但 principal 和 staff engineer
              更稀缺——这些岗位既需要技术深度，也需要系统规模经验。如果一批高级工程师流向薪酬更高的西欧公司或 remote-first 美国公司，关键基础设施开发可能被扰动。


              **执行风险——美国与品类扩张**：公司同时推进五件事：美国市场进入（从零搭建流动性）、电子产品 GPSR 合规（新义务）、Vinted Pay 在 EU 推广（支付监管）、Vinted Go
              扩张（物流基础设施）、奢侈品鉴定规模化（信任与安全）。五项高风险计划并行且不让任何一项被忽视，需要极强项目管理能力，而公开资料无法独立证明这一点。


              **财务风险**：Vinted 2025 年净利润下降 19% 至 €62M，尽管收入增长 38% 至 €1.1B。FCF 为 €137M、调整后 EBITDA 为
              €151M，确认其具备运营现金生成能力；但如果美国和基础设施投资继续压缩利润率，而增长计划到 2027 年仍未跑出正向单位经济，公司可能需要外部资本。2026 年 4 月按 €8B
              估值完成的老股交易没有为投资提供新的新股资本。
