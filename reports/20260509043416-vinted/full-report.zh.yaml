      - number: '3.3'
        title: 能力、定价与分发对比
        blocks:
          - type: paragraph
            body: >
              Vinted 的零卖家费模型，是其定价上最具结构性差异的单一特征。Depop 向卖家收取约 10% 及支付处理费，Wallapop 收取 5–10%，Vestiaire 收取 15%+，eBay 对时尚品类收取约
              12%。ThredUp 的 B2C 模型不给个人用户卖家控制权。Vinted 的买家保护费（约 5% + 每件固定费用）贡献总收入超过 50%，同时确保卖家在每个上架商品上获得最大回报。


              能力层面，Vinted 的自有物流网络（Vinted Go：500K+ 个 PUDO 点、60+ 家承运商）和嵌入式 Vinted Pay（持 EMI 牌照），是纯 C2C 对手都没有匹配的能力。Depop 和
              Poshmark 依赖第三方承运商。Wallapop 已做出物流收入（2024 年 €74M），但 PUDO 覆盖以西班牙为中心。Vestiaire 使用专业快递伙伴配送已鉴定奢侈品，但不运营品牌化承运网络。


              分发层面，eBay 的全球规模和卖家信任无可匹敌，但其时尚流量份额分散在电子产品、汽车和收藏品之间。Depop 的 Gen Z 社区和社交电商功能，是 18–25 岁年龄段的强市场拓展优势。Vestiaire
              的奢侈品牌合作（Kering、LVMH 试点项目）创造了 Vinted 无法进入的鉴定型分发渠道。Vinted 的市场拓展强项在于电视广告投入、零摩擦入驻，以及零卖家费模型内的推荐动态。
