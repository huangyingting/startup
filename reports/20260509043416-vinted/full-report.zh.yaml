      - number: '5.2'
        title: 核心技术栈与可扩展性
        blocks:
          - type: paragraph
            body: >
              Vinted 的技术栈在欧洲 C2C 交易平台中处于最先进的一档。搜索基础设施在 2023–2024 年从 Elasticsearch 迁移到 **Vespa**，使平台能够处理十亿个可搜索商品，并集成向量搜索和
              ML 推理。迁移后的性能提升显著：搜索延迟改善 2.5 倍，索引延迟改善 3 倍，搜索可见延迟从五分钟压缩到五秒。Vespa 架构支持词法搜索和神经搜索紧密结合——这对横跨 26 个市场的多语言查询至关重要。


              推荐系统由**双塔神经网络**（查询塔 + 商品塔）驱动，使用多语言 CLIP 嵌入，把用户搜索和商品特征编码到共享的 256 维向量空间。近似最近邻（ANN）搜索可在 100ms
              内从十亿商品语料中取回候选。该架构再结合 LightGBM 学习排序（LTR）做最终排序，相比仍使用更简单关键词或标准协同过滤系统的竞争对手，搜索相关性更强。


              数据库层使用 **Vitess** 做 MySQL 分片，每秒处理超过 1.3 million 次查询。容器编排使用 **Kubernetes 与 GitOps**，曾在 Cloud Native
              Lithuania 2023 展示。公司在维尔纽斯运营自建**数据中心**，采用定制 Clos
              网络拓扑，相比超大规模云厂商的便利性，更优先考虑规模化后的成本效率。事件驱动微服务架构（从单体迁移而来）支持独立团队部署和故障隔离。
