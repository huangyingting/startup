  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Vinted 所处的是全球二手时尚交易平台赛道，2024 年 GMV 约 $300 billion，预计到 2030 年以约 20% CAGR 增长。竞争格局横跨五类对手。**直接 C2C 同业**包括
              Depop（Gen Z 时尚，Etsy 持有）、Wallapop（通用 C2C，西班牙占优，Naver 收购）和 Poshmark（社交时尚，聚焦美国，Naver 持有）。**奢侈品转售专家**以
              Vestiaire Collective 和 The RealReal 为代表。**B2C 二手电商**以 ThredUp（美国）和 Rebag 为核心。**通用既有平台**——主要是
              eBay——跨全部品类竞争，其中二手商品占 eBay 服装 / 鞋履 / 配饰交易量的 39%，占全球总 GMV 的
              40%。**潜在进入者**包括可能增加转售功能的技术化快时尚玩家（Shein、Zalando），以及原生支持点对点交易的社交平台（Instagram、TikTok Shop）。


              Vinted 在 EU C2C 面板中 90%+
              的份额，体现了流动性驱动交易平台的赢家通吃大半逻辑：一旦平台达到足够买家密度，卖家会跟进，形成自我强化循环，使替代在结构上变得困难。通用转售平台（eBay、Vinted、Wallapop、Mercari）合计掌握全球转售网站流量约
              80%，聚焦时尚的平台（Depop、Poshmark、Vestiaire）占其余大部分。
