      - number: '5.4'
        title: 开发者文化、人才与团队质量
        blocks:
          - type: paragraph
            body: >
              Vinted 的工程组织集中在立陶宛维尔纽斯和考纳斯——这是对波罗的海技术人才的有意押注，且已被证明有效。公司总体雇用 2,200+ 人，其中工程和产品占很大比例。Vinted 工程博客发布 Vespa
              搜索、ML 模型、SRE 实践和基础设施等详细技术内容，显示工程文化高度透明，并乐于分享知识。


              公司在 Cloud Native Lithuania（2023 年 6 月）的演讲——覆盖 Kubernetes/GitOps
              基础设施和数据中心网络演进——显示其积极参与更广泛的工程社区。这是正向信号：愿意公开贡献技术社区的公司，通常内部工程标准更高，更能吸引优秀人才，也能更久留住工程师（因为外部认可会放大职业价值）。


              维尔纽斯和考纳斯的人才池正在增长；COO Mantas Mikuckas 共同资助了 €100M Tech Zity 园区项目，这是欧洲规划中最大的科技中心，显示出建设本地工程人才的长期机构承诺。Vinted
              能在规模化后招聘专业 ML、基础设施和支付岗位，而无需支付伦敦 / 柏林 / 巴黎搬迁溢价，这相较西欧科技公司形成结构性工程成本优势。
