      - number: '6.5'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              Vinted 的增长可选项很有吸引力：26+ 个市场，其中三个市场占据主导份额；品类扩张到电子产品、奢侈品和图书；2026 年测试进入美国市场。但这条扩张路径风险清晰。


              **地理集中**：法国、英国和德国贡献约 75% GMV。Vinted 正在积极扩张南欧和 CEE，但这些新市场仍处早期，还不能实质性稀释集中度。仅法国出现结构性扰动，就会影响约 35% GMV。


              **美国市场获客**：美国转售市场结构不同——Poshmark 的社区功能、eBay 的规模与信任、ThredUp 的托管转售模式都已成熟。Vinted 入场时品牌认知为零，尺码习惯不同（英国 -
              美国跨境功能已经收到负面用户反馈，说明产品摩擦存在），支付和物流轨道也不同。获客需要大量投入，而财务模型中尚未体现。


              **DAC7 卖家集中风险**：EU DAC7 规定平台必须向税务机关报告年收入超过 €2,000 的卖家，2024 年起生效。贡献不成比例 GMV
              的高频卖家若因申报触发此前忽略的税务责任，可能减少上架量或迁移平台。目前没有公开数据说明 Vinted 高频卖家的 DAC7 敞口。
