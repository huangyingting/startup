    title: 投资逻辑破裂与止损触发条件表
    description: >-
      Specific conditions that would break the Vinted investment thesis, with monitoring metrics and recommended
      response.
    enumerationCoverage: exhaustive
    enumerationScope:
      coverage: exhaustive
      basis: Covers the primary thesis-break scenarios identified across all eight research chapters.
    notes: 触发阈值仅作示例；投资者应按自身回报要求校准。
    claimRefs:
      - CV026
      - CV027
      - CV028
    columns:
      - 投资逻辑破裂
      - 触发指标
      - 监测频率
      - 建议应对
    rows:
      - - 收入增速降至 15% 以下
        - 收入同比增速连续 2 个季度 <15%
        - 季度（新闻室 / 年报）
        - 重估估值；若有窗口，寻求老股市场退出
      - - CJEU 不利裁决（强制产品重构）
        - CJEU 裁定影子封禁需要重构；欧盟范围截止期限 <24 个月
        - 每年跟踪 CJEU 案件进展；预计 2027–2028 年裁决
        - 量化工程影响；在悲观情景中建模 12–24 个月产品放缓
      - - 欧盟监管重新定性买家保护费
        - 欧盟委员会启动费用结构调查
        - 每季度跟踪欧盟委员会平台调查
        - 立即更新模型；就重新定性概率咨询法律顾问
      - - 法国 GMV 增速连续 2 个季度低于 10%
        - 法国 GMV 代理指标（搜索流量、Consumer Edge 数据）
        - 季度
        - 分析竞争与监管根因；暂停欧盟扩张资本
      - - 美国市场失败（到 2027 年底 GMV 占比 <1%）
        - 美国 GMV 在已报告总 GMV 中的占比
        - 年度（需要管理层披露）
        - 要求管理层提交转向计划；跟踪资本是否重新配置到欧盟核心市场
      - - Vinted Pay EMI 资本充足性违规
        - 立陶宛央行监管行动；公开披露资本补充要求
        - 每年监测 EMI 监管申报
        - 评估资产负债表影响；判断是否需要新股融资注资
  - id: TV006
    title: 最终尽调问题表
    description: >-
      Outstanding information requests critical to underwriting a co-investment in Vinted at the April 2026 €8B
      secondary valuation.
    enumerationCoverage: exhaustive
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six highest-priority diligence asks identified across all research chapters; covers financial, legal,
        operational, and product dimensions.
    notes: 优先级：P1 = 投资前不可协商；P2 = 最终承诺前必须拿到；P3 = 管理层会议议题。
    claimRefs:
      - CV033
      - CV039
      - CV034
    columns:
      - 尽调问题
      - 优先级
      - 理由
      - 可接受答复
    rows:
      - - 2023 和 2024 年经审计 IFRS 财务账目
        - P1
        - 在 €8B 规模下，新闻稿财务数据不足；Vinted Pay、Vinted Go 和递延收入的 IFRS 处理，可能与法定申报有实质差异
        - 收到 KPMG / PWC / Deloitte / EY 签署的 IFRS 账目
      - - 买家队列留存曲线（按市场拆分第 1/3/6/12 个月）
        - P1
        - 没有队列留存，LTV 无法可靠建模；英国 >50% 重复买家数据不足以支撑 €8B 投资测算
        - 管理层展示按核心市场拆分的 2022–2025 年队列留存数据
      - - CJEU 案件状态和法律顾问情景简报
        - P1
        - CJEU 转介带来多年法律不确定性；强制产品重构会形成实质工程和成本风险
        - 法律顾问情景备忘录；预计裁决时间表；风险调整后合规成本
      - - 美国市场自测试以来的 GMV、商品量和获客数据
        - P2
        - 美国是乐观情景关键驱动，但目前披露数据为零；没有 KPI，投资逻辑无法落地测算
        - 管理层提供美国市场 KPI 看板，包括商品数、GMV、注册数（截至 2026 年 5 月）
      - - DAC7 应申报卖家规模及已观察到的活跃度下降
        - P2
        - 大卖家供给侧风险尚未量化；如果 30%+ GMV 来自 DAC7 应申报卖家，下行情景会更严峻
        - 按市场拆分 DAC7 应申报卖家数量；相较 2024 年前基线的上架率变化
      - - Vinted Pay 抽佣率路线图和 2026–2028 年 EBITDA 贡献模型
        - P2
        - 抽佣率扩张是 EBITDA 改善的主要杠杆；投资者模型取决于推进时间和幅度
        - 管理层财务模型，按市场拆分 Vinted Pay 收入、利润率和时间表
