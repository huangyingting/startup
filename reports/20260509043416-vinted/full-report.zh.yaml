  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品范围、差异化与路线图
        blocks:
          - type: paragraph
            body: >
              Vinted 的核心产品是覆盖 26+ 个欧洲市场的 C2C 时尚与二手商品交易平台。买家侧产品包括移动优先应用（iOS/Android）、网页界面，以及内嵌 Vinted Go
              配送面单生成和承运商追踪。卖家侧产品支持免费发布商品，并提供 AI 分类、推广工具（Wardrobe Spotlight、商品置顶）以及通过 Vinted Pay 的整合支付。


              产品差异化建立在三根支柱上：（1）零卖家费，相比竞争对手为卖家创造更优经济性；（2）ML 驱动搜索和推荐（Vespa + 双塔模型），在规模化后提供更高相关性；（3）Vinted Go
              物流嵌入交易流，卖家无需另行安排配送。这三根支柱共同降低 C2C 交易循环中每一步的摩擦。


              2024 年，Vinted 扩展到电子产品——这是一次有意义的品类迁移，显示其目标是成为更广义的二手交易平台，而非只做时尚。2025
              年的图书、玩具和电子游戏计划延续了这条轨迹。奢侈品鉴定能力正在扩大，以服务已鉴定二手奢侈时尚的需求。「New Again」品牌活动（2025 年）是 Vinted
              首次重大全球品牌投入，旨在让平台吸引力超出时尚起点。美国市场进入是 2026 年最重要的战略产品挑战，需要适配尺码惯例、从零建立品牌认知，并与既有 Poshmark 和 eBay 竞争。
