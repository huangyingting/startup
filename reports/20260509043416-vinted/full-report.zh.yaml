      - number: '3.5'
        title: 护城河耐久度与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Vinted 的竞争护城河建立在四个相互强化的支柱上：（1）**网络效应**——EU C2C 时尚中最大的买家池，创造小型对手没有的搜索结果深度；（2）**供给侧基础设施**——Vinted Go 和
              Vinted Pay 创造运营依赖，使卖家切换成本不断抬升；（3）**零费用飞轮**——优于任何对手的卖家经济性，持续支撑供给增长，并把边际卖家从 eBay 和 Facebook Marketplace
              吸引出来；（4）**品牌心智**——在法国、比利时、荷兰、波兰、立陶宛和英国，Vinted 是二手时尚的默认品牌。


              关键商品化风险是平台功能趋同：随着 Depop、Wallapop 以及最终 Poshmark 补齐物流和支付工具，基础设施差异可能收窄。Naver 整合 Wallapop 和
              Poshmark，是长期取代场景中最可信的一条路径，前提是 Naver 把 Poshmark 的社交电商功能迁移到欧洲市场。这可能加速 Gen Z 向社交原生形态多平台经营。


              反向证据：尽管 Vinted 在 EU 占优，德国——其第二大市场——在 2024–2025 年内部信号中出现增长放缓（尚未公开披露）。eBay Germany 仍在年长卖家和买家中根基深厚。尚无对手证明能复制
              Vinted Go 的物流深度，但 Wallapop 物流优先的收入模型（74% 收入来自配送）表明这条路在规模化后可行。
