      - number: '2.3'
        title: 买家与卖家分层
        blocks:
          - type: paragraph
            body: >
              Vinted 的双边交易平台服务动机和行为不同的买家与卖家群体。


              **买家分层**：价格敏感型买家（主要受可负担性驱动，占受访欧洲购物者 72%）构成核心大众市场群体，并推动交易量。寻宝型买家——Gen Z 占比更高——为了独特、复古或已停产款式而购物（40% 的 Gen Z
              因此使用转售）。可持续购物者（主要动机约占 14%）在法国、德国和年轻女性中增长。混合型消费者——同时购买新品和二手的人群——占法国购物者 28%、英国购物者 24%，但德国只有 7%，显示明显地域差异。


              **卖家分层**：休闲清理者是发布商品的大多数——他们是在清空衣橱空间，而不是经营生意。高频转售者把 Vinted 当作收入来源，尤其是 Gen Z（56% 为赚外快而卖）。复古卖家和小型时尚商家在商户框架下使用
              Vinted Pro 做 B2C 销售。卖家和买家高度重叠：多数 Vinted 用户既卖也买，形成库存生成和需求的双重飞轮。


              **信任壁垒**限制转化：约 25% 的欧洲消费者对二手服装有卫生担忧；假货 / 描述不实风险削弱高价值商品的购买信心；平台信任（托管可靠性、争议解决质量）决定留存。Vinted
              的买家保护机制——托管资金直到买家确认收货——直接处理支付安全这一最关键的结构性信任壁垒。


              Vinted 英国买家画像（Consumer Edge，2024 年）：女性占比更高，年龄略高于 Depop；80% 的购买低于
              £20；复购率（>50%）高于竞争对手。这表明它拥有忠诚的大众市场核心，而不是小众前卫时尚用户群。
