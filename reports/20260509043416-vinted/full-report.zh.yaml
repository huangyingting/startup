      - number: '8.2'
        title: 估值框架与倍数分析
        blocks:
          - type: paragraph
            body: >
              以 €8B 股权价值对照 2025 年财务数据，Vinted 的隐含倍数为：

              - **EV/Revenue（2025）**：€8B / €1.1B = **7.3x**——对比 Etsy 2.4–2.9x、eBay 2.4–3.0x、ThredUp 1.0x

              - **EV/Adj. EBITDA（2025）**：€8B / €151M = **53x**——对比上市 marketplace 板块中位数 8.7–12.6x

              - **EV/FCF（2025）**：€8B / €137M = **58x**——FCF 收益率 1.7%

              - **EV/GMV（2025）**：€8B / €10.8B = **0.74x**——与约 10% take rate 一致


              Vinted 的倍数溢价很高：收入倍数是 Etsy 或 eBay 的 2.5–3 倍，EBITDA 倍数是 4–6 倍。该溢价部分可由 Vinted 明显更强的增长画像支撑（收入增长 38%，而 Etsy 约
              0–5%），也包含私募市场流动性溢价。Allegro（Warsaw IPO 2020）提供了有用先例：这家波兰 C2C marketplace 上市时按 7–9x 远期收入定价；Vinted 的 7.3x
              历史收入处在同一区间。


              对高增长私营 marketplace 来说，最可信的估值方法，是对远期（2026E）收入套用收入倍数，并用增长作折价调整：如果 Vinted 2026 年增长 30%（收入约 €1.43B），当前 €8B 意味着
              5.6x 2026E 收入——接近 Allegro IPO 区间。按收入 CAGR 20%、2028E EBITDA 利润率 15%、终端 EV/EBITDA 15x 做 DCF，可得到约 €8.5–10B
              企业价值——基准情景下与当前标记一致。


              53x 的 EBITDA 倍数是最令人担心的指标：要把当前 EV 压到 15x，Vinted 的 EBITDA 需从 €151M（2025）增长到约 €500–600M。若 2028E 收入基数为
              €2B、EBITDA 利润率 15%，EBITDA 将为 €300M——意味着当前 €8B 约为 27x 2028E EBITDA。对一家高增长、盈利、欧洲平台领导者来说可以辩护，但容错空间有限。
