            - 部分（已记录可持续动机；无 LTV 数据）
        - id: production-maturity
          label: 生产成熟度
          values:
            - 强（数千万用户已在生产环境使用）
            - 强（最大买家群体）
            - 强（欧盟二手买家中的多数）
  - id: FU004
    title: 留存 / 复购队列
    type: cohort
    description: 使用可得代理指标估算的 Vinted 英国买家留存曲线；实际队列数据未公开披露。
    sourceRefs:
      - SU001
      - SU007
    claimRefs:
      - CU006
      - CU029
      - CU030
    notes: 重要：这些是根据复购买家比例和 NPS 推算的估计值；Vinted 未公布实际队列留存数据。尽调时只能把这些数值视为方向性代理指标。必须向管理层索取实际队列数据。
    data:
      columns:
        - 第 1 个月
        - 第 3 个月
        - 第 6 个月
        - 第 12 个月
      rows:
        - id: uk-buyers-est
          label: 英国买家（估计）
          values:
            - '70'
            - '60'
            - '55'
            - 50+
        - id: eu-buyers-est
          label: 欧盟买家（估计）
          values:
            - '65'
            - '55'
            - '50'
            - '45'
  - id: FR001
    title: 风险热力图
    type: matrix
    description: 按概率和影响（高 / 中 / 低）评估 Vinted 四类风险域的主要风险热力图。
    sourceRefs:
      - SR001
      - SR004
      - SR007
      - SR010
      - SR016
      - SR023
    claimRefs:
      - CR001
      - CR005
      - CR007
      - CR010
      - CR020
      - CR022
    notes: 评级为基于研究证据的定性判断。高 = 重大影响（收入影响 >10% 或重大监管行动）；中 = 中等影响；低 = 影响有限。
    data:
      columns:
        - 监管 / 法律
        - 竞争
        - 运营 / 技术
        - 人才 / 执行
      rows:
        - id: high-impact
          label: 高影响
          values:
            - CJEU 裁决（不利时需重设计产品）；DSA 6% 罚款
            - 美国市场失败（资本损失）
            - Vilnius 数据中心故障（全站中断）
            - 高级工程师大规模流失
        - id: medium-impact
          label: 中影响
          values:
            - DAC7 导致大卖家流失；GPSR 电子产品召回
            - Vestiaire 侵蚀奢侈品市场；Depop 重新投入欧盟
            - 承运商故障（法国 / 德国）；支付故障
            - 美国执行缺口（无本地领导）
        - id: low-impact
          label: 低影响
          values:
            - DMA 守门人认定（近期可能性低）
            - eBay 重新投入欧盟时尚品类
            - App 中断（<48 小时）；客服失效
            - CEO 接班；CLIP 模型扰动
  - id: FR002
    title: 风险传导图
    type: dag
    description: 有向图展示 Vinted 的监管和运营风险如何向下传导，演变为财务、竞争和用户信任后果。
    sourceRefs:
      - SR001
      - SR010
      - SR011
      - SR016
      - SR023
    claimRefs:
      - CR003
      - CR011
      - CR019
      - CR020
      - CR023
    notes: 边表示风险传播方向；级联为定性判断，不是概率预测。
    data:
      nodes:
        - id: cjeu-ruling
          label: 不利的 CJEU GDPR 裁决
          description: 要求在欧盟重设计信任与安全算法
        - id: shadow-ban-redesign
          label: 影子封禁系统重设计
          description: 重大工程投入；存在 12–24 个月交付风险
        - id: engineering-capacity
          label: 工程产能被抽走
          description: 合规工程挤占产品路线图
        - id: dsa-enforcement
          label: DSA 执法行动
          description: 持续监测；若缺口仍在，可能罚款
        - id: revenue-impact
          label: 收入和利润率承压
          description: 合规成本叠加工程速度下降，削弱产品竞争力
        - id: vilnius-outage
          label: Vilnius 数据中心中断
          description: 服务全部或部分中断
        - id: user-trust-loss
          label: 用户信任流失
          description: 放弃交易、用户流失、负面媒体报道
        - id: gmv-decline
          label: GMV 下滑
          description: 交易减少，并传导至收入和盈利能力
        - id: dac7-seller-churn
          label: DAC7 下大卖家活跃度下降
          description: 大卖家为避开税务申报门槛而减少上架
        - id: supply-liquidity-drop
          label: 市场流动性下降
          description: 上架减少削弱买家互动，网络效应变弱
      edges:
        - id: e1
          source: cjeu-ruling
          target: shadow-ban-redesign
          label: 要求重设计
        - id: e2
          source: shadow-ban-redesign
          target: engineering-capacity
          label: 抽走工程资源
        - id: e3
          source: dsa-enforcement
          target: engineering-capacity
          label: 需要额外合规工程投入
        - id: e4
          source: engineering-capacity
          target: revenue-impact
          label: 产品路线图放慢 → 竞争劣势
        - id: e5
          source: vilnius-outage
          target: user-trust-loss
          label: 服务中断 → 用户受挫
        - id: e6
          source: user-trust-loss
          target: gmv-decline
          label: 流失减少交易
        - id: e7
          source: dac7-seller-churn
          target: supply-liquidity-drop
          label: 单个卖家上架减少
        - id: e8
          source: supply-liquidity-drop
          target: gmv-decline
          label: 供给减少压低买家需求
  - id: FR003
    title: 依赖关系图
    type: dag
    description: Vinted 关键外部依赖关系图，显示风险集中或单点故障。
    sourceRefs:
      - SR004
      - SR010
      - SR016
      - SR019
      - SR023
      - SR030
    claimRefs:
      - CR020
      - CR022
      - CR029
      - CR034
    notes: 依赖按类型标注：监管、技术、运营或金融。关键程度在节点描述中说明。
    data:
      nodes:
        - id: vinted-core
          label: Vinted 平台（核心）
          description: 市场、支付、物流——全系统
        - id: vilnius-dc
          label: Vilnius 自托管数据中心
          description: 100% 生产计算；未披露故障切换——关键单点
        - id: carrier-partners
          label: 60+ 承运商合作伙伴（Vinted Go）
          description: 外部物流 API；前三大承运商若故障，将损伤核心市场
        - id: emi-license
          label: 立陶宛央行（EMI 牌照）
          description: Vinted Pay 的监管牌照；接受资本充足率监管
        - id: vespa-oss
          label: Vespa 开源搜索
          description: 核心搜索和推荐引擎；Vinted 为 OSS 贡献代码
        - id: edpb-dpa
          label: EDPB / 立陶宛 DPA（GDPR）
          description: 监管 GDPR 合规；CJEU 转介待决
        - id: eu-commission-dsa
          label: 欧盟委员会（DSA 监测）
          description: 持续监测 DSA 合规；具备执法权
        - id: clip-model
          label: CLIP 预训练模型
          description: 用于双塔搜索的多语言视觉-语言向量嵌入
        - id: vitess-mysql
          label: Vitess / MySQL
          description: 支撑每秒 1.3M 次查询的数据库分片；开源依赖
      edges:
        - id: e1
          source: vinted-core
          target: vilnius-dc
          label: 全部计算和存储
        - id: e2
          source: vinted-core
          target: carrier-partners
          label: Vinted Go 发货履约
        - id: e3
          source: vinted-core
          target: emi-license
          label: Vinted Pay 监管机构
        - id: e4
          source: vinted-core
          target: vespa-oss
          label: 搜索和推荐引擎
        - id: e5
          source: vinted-core
          target: edpb-dpa
          label: GDPR 合规监管机构
        - id: e6
          source: vinted-core
          target: eu-commission-dsa
          label: DSA 合规监管机构
        - id: e7
          source: vespa-oss
          target: clip-model
          label: 向量搜索的 CLIP 嵌入
        - id: e8
          source: vinted-core
          target: vitess-mysql
          label: 核心交易数据库
  - id: FV001
    title: 投资建议逻辑
    type: flow
    description: 投资建议的决策流，从业务质量评估到估值和风险调整后回报。
    sourceRefs:
      - SV001
      - SV006
      - SV013
      - SV029
    claimRefs:
      - CV034
      - CV018
      - CV036
    notes: 流程展示从业务质量评估到最终建议的逻辑步骤。
    data:
      nodes:
        - id: business-quality
          label: 业务质量：卓越
          description: 欧盟 C2C 近乎垄断地位、收入增长 38%、护城河一体化，2023 年起盈利
        - id: valuation-anchor
          label: 估值：€8B（7.3x 收入，53x EBITDA）
          description: 2026 年 4 月老股交易；超额认购；BlackRock、OTPP、EQT、Schroders 背书
        - id: return-assessment
          label: 回报评估：基准情景温和（0–25%）
          description: 基准情景：2028 年 €8–10B → 0–25% 总上行；乐观：38–100%；悲观：-30% 至 -55%
        - id: regulatory-overlay
          label: 监管风险叠加：重大
          description: CJEU GDPR 转介、DSA 监测、GPSR 电子产品缺口——€8B 估值未充分计入
        - id: preferred-structure
          label: 优先结构：€6–7B 进入或下行保护
          description: 下行保护机制（清算优先权、反稀释）或更低进入估值，可改善风险调整后回报
        - id: recommendation
          label: 建议：谨慎关注
          description: 值得尽调；拿不到经审计账目、队列留存、CJEU 简报和美国市场数据前，不应承诺投资
  - id: FV002
    title: 估值敏感性
    type: bar
    description: 不同收入增长率和 EV/收入倍数组合下隐含的 Vinted 企业价值。
    sourceRefs:
      - SV008
      - SV009
      - SV013
      - SV024
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV031
    notes: 基于 2025 年 €1.1B 收入，并预测至 2028E。EV/收入倍数套用于 2028E 收入。进入估值：€8B。
    data:
      series:
        - id: bear-3x
          label: 悲观：3x 2028E 收入
          points:
            - label: 10% 收入 CAGR（€1.46B）
              value: 4380000000
            - label: 15% 收入 CAGR（€1.67B）
              value: 5010000000
            - label: 20% 收入 CAGR（€1.90B）
              value: 5700000000
            - label: 25% 收入 CAGR（€2.15B）
              value: 6450000000
        - id: base-5x
          label: 基准：5x 2028E 收入
          points:
            - label: 10% 收入 CAGR（€1.46B）
              value: 7300000000
            - label: 15% 收入 CAGR（€1.67B）
              value: 8350000000
            - label: 20% 收入 CAGR（€1.90B）
              value: 9500000000
            - label: 25% 收入 CAGR（€2.15B）
              value: 10750000000
        - id: bull-7x
          label: 乐观：7x 2028E 收入
          points:
            - label: 10% 收入 CAGR（€1.46B）
              value: 10220000000
            - label: 15% 收入 CAGR（€1.67B）
              value: 11690000000
            - label: 20% 收入 CAGR（€1.90B）
              value: 13300000000
            - label: 25% 收入 CAGR（€2.15B）
              value: 15050000000
  - id: FV003
    title: 估值 / 回报区间
    type: range
    description: 老股共同投资者以 €8B 进入时，各情景下的估值和总回报区间。
    sourceRefs:
      - SV006
      - SV013
      - SV014
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV018
    notes: 区间代表各情景内的低–高边界。进入估值为 €8B。回报为扣除基金成本前的总回报。
    data:
      items:
        - label: 乐观情景（25% 概率）– 2028E 退出
          low: 11000000000
          high: 16000000000
          value: 12500000000
        - label: 基准情景（50% 概率）– 2028E 退出
          low: 8000000000
          high: 10000000000
          value: 9000000000
        - label: 悲观情景（25% 概率）– 2028E 退出
          low: 3600000000
          high: 5600000000
          value: 4500000000
        - label: 概率加权期望值
          low: 7700000000
          high: 10750000000
          value: 8750000000
  - id: FV004
    title: 投资 KPI
    type: kpi
    description: Vinted 在 2026 年 4 月 €8B 老股估值下的关键投资表现指标。
    sourceRefs:
      - SV001
      - SV013
      - SV014
      - SV007
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV006
      - CV019
      - CV020
    notes: 所有数字截至或基于最新披露财务数据（2026 年 4 月）。倍数按 €8B 股权价值计算。
    data:
      items:
        - label: 进入估值
          value: €8.0B
          delta: +60% from Oct 2024 secondary (€5B)
        - label: EV / 2025 年收入
          value: 7.3x
          delta: +2.9x vs Etsy (2.4x)
        - label: EV / 2025 年调整后 EBITDA
          value: 53x
          delta: +40x vs public marketplace median (13x)
        - label: EV / 2025 年 GMV
          value: 0.74x
          delta: Implied take rate ~10%
        - label: 2025 年收入增长
          value: +38%
          delta: vs Etsy +0–5%
        - label: 2025 年 FCF
          value: €137M
          delta: FCF yield 1.7% at €8B
        - label: 2025 年调整后 EBITDA
          value: €151M
          delta: Margin 13.7% on revenue
        - label: 基准情景总回报（3 年）
          value: 0–25%
          delta: 'Bull: 38–100%; Bear: -30 to -55%'
