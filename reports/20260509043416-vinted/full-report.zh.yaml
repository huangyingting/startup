      - number: '3.2'
        title: 竞争对手画像与战略方向
        blocks:
          - type: paragraph
            body: >
              **Depop**（Etsy，2021 年 6 月以 $1.6B 收购）瞄准精选复古和街头服饰的 Gen Z 买家与卖家。2024 年 GMS 为 $788.9M（同比 +31.6%），收入约 $85M，注册用户
              43.5M。尽管 GMS 快速增长，Depop 仍录得 £42M 经营亏损，较上年收窄 14%。Depop 的强社区和社交电商功能构成差异化，但其美英重心和持续亏损，与 Vinted 的欧洲盈利形成对比。


              **Wallapop**（Naver，2025 年以约 €650M 收购）是西班牙主导 C2C 交易平台，月活 19–21M。2024 年收入 €101M（+13%），仍有 €25M 经营亏损。Naver
              同时持有 Wallapop（南欧）和 Poshmark（美国），使其成为唯一全球 C2C 二手电商整合者，但跨境功能复用尚未验证。


              **Vestiaire Collective** 面向全球中高端至奢侈品转售，2024 年从约 €1B GMV 中产生约 €200M 收入。其 2024 年估值 €1.1–1.2B，低于 2021 年 €1.4B
              峰值。平台目标是在 2026 年实现首个全年盈利。其奢侈品鉴定能力使其位于 Vinted 核心大众市场赛道之外。


              **ThredUp**（Nasdaq: TDUP）是美国 B2C 二手电商平台——并非真正的 C2C 同业——2024 年收入 $260M（+1%），毛利率 79.7%，但净亏损 $40M。关键是，ThredUp
              在 2024 年 Q4 剥离了 91% 的欧洲业务，显著降低了与 Vinted 在欧洲的直接竞争重叠。


              **eBay** 是最大的既有平台，二手服装占时尚品类销售的 39%，二手商品占全球 GMV 的 40%。eBay 的 C2C 时尚优势在于二十年沉淀的卖家信任和全球覆盖，但多品类 UX 稀释了体验，弱于
              Vinted 聚焦时尚的产品。
