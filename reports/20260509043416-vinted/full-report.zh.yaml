      - number: '1.4'
        title: 生态系统与战略举措
        blocks:
          - type: paragraph
            body: >
              Vinted Group 已在核心交易平台之外，运营一套纵向整合生态。Vinted Go 作为品牌于 2022 年推出，通过与 60+ 家承运商合作管理超过 500,000 个自提和投递点；2025
              年，它以自有内部承运商进入西班牙和葡萄牙（Vinted Go Carrier 现已在比利时、法国、荷兰、葡萄牙和西班牙运营）。Vinted Go 于 2023 年 10 月收购荷兰配送公司
              Homerr。Vinted Pay 于 2022 年从 Bank of Lithuania 获得电子货币机构（EMI）牌照，并于 2024 年在立陶宛推出钱包服务，以降低第三方支付成本。Vinted
              Ventures 于 2025 年 4 月成立，作为公司风险投资部门，投资 A-C 轮阶段的二手电商初创公司。公司还从时尚扩展到电子产品（2024 年）、书籍、运动和收藏品（2025
              年）以及家居品类，支撑其成为通用二手交易平台的野心。面向奢侈和设计师商品的 Item Verification Service 借助 Rebelle 的鉴定能力开发，目前已在 10 个国家上线。品牌活动（如
              2025 年 9 月「New Eras Again」，以及与 Paul Mescal 等名人和 Oxfam 等组织的合作）强化了 Vinted 作为主流且贴近可持续理念平台的定位。
