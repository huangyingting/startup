  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分与用户基础概览
        blocks:
          - type: paragraph
            body: >
              Vinted 在同一个市场里服务两类核心用户：**卖家**（供给侧）和**买家**（需求侧），两者高度重叠——很多用户既买也卖。截至 2024 年初，平台在 26+ 个欧洲市场拥有 75 million+
              注册会员，高于 2023 年中的 65 million。


              **卖家细分**从普通个人卖家（最常见用户——每年清理 5–20 件个人衣橱物品）到高频卖家（个人经营二手微型生意，每年上架 50+
              件商品）。儿童用品约占全部上架量的三分之一，说明平台在父母群体中吸引力强；女性占卖家超过 50%。高频卖家贡献了不成比例的交易量，但公司未公开按卖家层级拆分的 GMV。


              **买家细分**以注重预算和可持续的 25–34 岁女性为主（整体女性占 63%）。18–24 岁队列约占法国用户 13%。用户结构随时间变宽：Vinted 扩张品类和市场后，男性（占用户
              37%）和较年长队列（35–44 岁）都有增长。相比 Depop、StockX 等对手，Vinted 受众女性占比更高、年龄略大，说明它更深入触达家庭预算决策者。超过 80% 的交易低于 £20，使 Vinted
              处在快时尚常见的高频、低 AOV 购物行为里——但可持续与省钱框架让这种需求能穿越经济周期。
