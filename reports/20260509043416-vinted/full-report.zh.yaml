      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多家分析机构从不同角度估算全球和欧洲市场，但口径和方法差异很大：


              **全球 TAM**：最宽口径的市场——全球全部渠道的所有二手时尚——2024 年估计为 $190–300B，取决于方法。GMInsights（$190B）、Plott Data（$300B+）和
              Innovius Research（$230–300B 区间）采用不同边界假设。GMInsights 的数字（$190B）最保守，并明确区分线上与线下；Plott Data
              的较高数字很可能纳入更多线下渠道。共识区间是 2024–2025 年 $190–208B，并到 2030–2034 年增长至 $400–520B。


              **欧洲 SAM**：Vinted 的可服务市场是欧洲在线 C2C 转售。欧洲二手服装市场（全渠道）2024 年约为 €15.9B（Decision Market
              Insights）。线上渠道只占其中少数（多数仍在线下——慈善商店、跳蚤市场），意味着仅线上 SAM 在 2024 年约为 €5–8B。不过，Vinted 2025 年 GMV 为
              €10.8B，已看似超过这些估计，说明：（a）估算偏低；（b）Vinted 的 GMV 包含部分 B2C Vinted Pro 交易量；或（c）Vinted 加速线下转线上，实际上做出了新市场。


              **SOM**：Vinted 2025 年 €10.8B GMV 既是公司实际表现，也近似其 SOM——它已掌握欧洲在线 C2C 时尚转售的主导份额。未来 SOM
              扩张来自：新地域市场（克罗地亚、希腊、拉脱维亚等）、品类延伸（电子产品、家居用品）以及既有市场更深渗透（尤其是德国）。
