      - number: '1.3'
        title: 商业模式、财务表现与战略位置
        blocks:
          - type: paragraph
            body: >
              Vinted 的核心差异点，是零卖家费模型叠加每笔交易强制收取买家保护费（约为商品价格的 5%，另加固定 €0.70–€0.90，随市场而变）。这笔费用覆盖安全托管支付、客服和争议解决。Vinted
              向买家而非卖家收费，最大化卖家侧供给，并由此形成支撑其主导地位的网络效应飞轮。其他收入包括配送利润（买家以 Vinted 谈判的批量价格购买预付面单）、可选的推广列表 / Bump、Wardrobe
              Spotlight 订阅以及 Vinted Pay 处理利润。买家保护费贡献总收入的一半以上；配送利润是第二大组成。财务表现突出：2022 年净亏损 €20.4M 后，公司 2023 年首次盈利，收入
              €596.3M（同比 +61%），净利润 €17.8M。2024 年，收入达到 €813.4M（+36%），净利润 €76.7M（+330%），调整后 EBITDA €158.9M。2024 年员工平均数为
              2,200 人（+19%），覆盖 26+ 个市场。2025 年 GMV 达 €10.8bn（+47%），收入 €1.1bn（+38%），但随着公司重投德国、新品类和物流，净利润下降 19% 至
              €62M。战略上，Vinted 做了多笔增值型 M&A：United Wardrobe（荷兰，2020 年）、Chicfy（西班牙，2019 年）、Rebelle（德国奢侈品，2022 年，随后于 2024 年
              3 月并入 Vinted）、Homerr（荷兰物流，2023 年）和 Trendsales（丹麦，2024 年初）。公司正面临监管审查：立陶宛 DPA 2024 年 7 月因 GDPR 违规对其罚款
              €2,385,276，涉及未能履行删除权和影子封禁。Vinted 已上诉。波兰、意大利和法国仍有诉讼在进行。
