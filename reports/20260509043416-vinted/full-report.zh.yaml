      - number: '4.3'
        title: 单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >
              Vinted 的单位经济性因私营身份而部分不透明。公司披露收入、GMV、EBITDA、净利润和 FCF，但不披露 CAC、LTV、队列留存、毛利率或国家级盈利能力。分析师估计和行业基准显示毛利率为
              70–85%（与轻资产交易平台模型、极低 COGS 一致）。主要成本驱动包括：（1）**营销和电视广告**——欧洲新市场的主要获客渠道；（2）**技术和工程**——包括定制基础设施（Vespa
              搜索引擎、维尔纽斯自建数据中心）；（3）**支付处理**——在 Vinted Pay 完全内部化技术栈之前支付给外部支付提供商的费用；（4）**物流基础设施**——Vinted Go 承运商合同、PUDO 点安装
              / 维护；以及（5）**G&A 和员工数**——2,200+ 名员工。


              轻资产模型意味着 Vinted 不持有库存，也没有制造资本开支。不过，相比纯软件交易平台，Vinted Go 带来不可忽视的资本开支：承运商集成、PUDO 硬件铺设和面单打印基础设施，在规模化后都需要资本。收购
              Homerr（荷兰物流，2023 年）和 Trendsales（丹麦，2024 年）体现的是战略 M&A 中的资本投入，而非纯运营支出。


              新市场（如克罗地亚、希腊、爱沙尼亚）的 CAC 预计显著高于品牌认知已高的成熟市场（法国、英国、德国）。公司没有可用的回本周期数据，但盈利轨迹意味着成熟市场队列的单位经济性很强。
