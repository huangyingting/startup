      - number: '1.2'
        title: 领导层、治理与资本
        blocks:
          - type: paragraph
            body: >
              Thomas Plantenga（荷兰人，生物物理学背景，曾任 OLX 新兴市场负责人，也是 Bookaboat 和 Sell It 联合创始人）自约 2017 年起担任
              CEO。他以数据驱动决策、对投资者高度透明，以及把用户行为视为流体动力学的管理哲学而知名。高管团队包括 COO Mantas Mikuckas、CFO Maurizio D'Arrigo（2024
              年加入）、交易平台业务 CEO Adam Jay（2022 年加入）和 Vinted Go VP Vytautas Atkočaitis。联合创始人 Justas Janauskas 仍深度参与。Milda
              Mitkutė 被列为联合创始人，但没有公开报道的运营职务。董事会包括主要投资者代表：Insight Partners 的 Deven Parekh 和 AJ Malhotra 是长期董事会成员；2021 年 F
              轮后 EQT Growth 获得代表席位；Carolina Brochado 担任董事。Vinted 历史上累计募集约 €480M 一级股权资本：C 轮约 $27M（2015 年）、D 轮 €50M（2018 年
              9 月）、Lightspeed 领投的 E 轮 €128M（2019 年 11 月，估值 €1B）以及 EQT Growth 领投的 F 轮 €250M（2021 年 5 月，估值 €3.5B）。2024 年
              10 月，TPG（通过 TPG Tech Adjacencies）领投 €340M 老股出售，估值 €5B，为员工提供流动性，并引入 Hedosophia、Baillie Gifford、Invus
              Opportunities、FJ Labs、Manhattan Venture Partners 和 Moore Strategic Ventures 等新投资者。所有既有机构投资者都保留了持仓。2023 年
              Q4，Vinted 从 BNP Paribas 和 ING Bank 获得 €50M 循环信贷额度。2026 年 4 月，EQT 领投 €880M 老股交易，将 Vinted 估值推高至 €8B。
