      - number: '3.4'
        title: 切换成本、锁定效应与多平台经营
        blocks:
          - type: paragraph
            body: >
              C2C 时尚交易平台的切换成本在结构上不对称：卖家切换成本中等（声誉评分、粉丝基础、交易历史），买家切换成本低（在竞争平台创建账户只需几分钟，也没有数据可携带要求）。因此，平台上卖家留存比买家独占更可防守。


              专业和半专业卖家在 Vinted 上普遍多平台经营，他们经常同时把库存发布到 eBay、Depop 和 Vinted。这会降低上架独占性，但不会削弱流动性的重要性：买家会集中到最能找到匹配库存的平台，从而强化
              Vinted 在 EU C2C 时尚中的领先位置。


              Vinted 最持久的锁定机制发生在基础设施层，而不是 UX 层。卖家一旦接入 Vinted Go 的面单生成、承运商追踪和退货管理，Vinted 就嵌入运营工作流。Vinted Pay
              钱包余额、固定打款节奏和绑定银行账户进一步增加卖家切换摩擦。卖家在 Vinted Go 和 Vinted Pay 上运营越久，越多运营数据——交易历史、承运商偏好、评分——被锁进 Vinted 生态。


              分发能力是第二层护城河：Vinted 在欧洲市场拥有 100M+ 用户，其搜索和推荐算法建立在数据优势上，较少上架量的新进入者无法复制。这强化了一个判断：Vinted
              面临的首要竞争风险，不是被某个同业在单一市场取代，而是多平台卖家持续稀释独占性，带来缓慢侵蚀。
