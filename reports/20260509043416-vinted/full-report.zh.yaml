      - number: '8.4'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >
              要找到 Vinted 最接近的上市可比公司，需要同时匹配 marketplace 结构、增长率和地理范围。没有一家上市公司是完美可比。


              **Etsy**（NASDAQ: ETSY）在 marketplace 结构（C2C、手工 / 复古 / 二手）、盈利能力和规模（约 $2.8–2.9B 收入）上最接近。Etsy 交易在 2.4–2.9x
              EV/Revenue 和 8.7–11x EV/EBITDA。关键差异在于 Etsy 增速为 0–5%，而 Vinted 为 38%；这可以解释 Vinted 更高的收入倍数，但不足以解释高出 3 倍。


              **eBay**（NASDAQ: EBAY）：C2C 和 B2C marketplace；收入 $9B+；EV/Revenue 2.4–3.0x；增长慢。鉴于 Vinted 纯 C2C
              聚焦和增长画像不同，eBay 不能直接可比。


              **ThredUp**（NASDAQ: TDUP）：美国托管转售；收入 $260M；市值约 $300M → 1.0x EV/Revenue。不可比：模式重库存、仅限美国、仍在亏损。


              **Allegro**（Warsaw Stock Exchange: ALE）：波兰综合 marketplace；中东欧最大电商平台；2020 年上市时按 7–9x
              远期收入定价。就欧洲市场主导地位、地理集中度和平台规模逻辑而言最可比。Allegro 为 Vinted 提供了最接近的 IPO 退出参照。


              **Poshmark**（2023 年被 Naver 收购后私有）：收购前按 $330M 收入估值 $1.6B → 4.8x EV/Revenue。主题上接近（C2C
              时尚转售、聚焦美国），但仅限美国、规模小得多。


              **可比公司隐含的 Vinted 估值区间**：套用同业收入倍数，Vinted 相对上市同业偏贵（7.3x vs 可比中位数 2.5x）；但如果 Vinted 的 30%+ CAGR 能再维持 2+
              年，按增长调整后也可能算合理。
            claimRefs:
              - CV003
              - CV013
              - CV019
              - CV024
              - CV037
              - CV040
      - number: '8.5'
        title: 建议、投资逻辑破裂点与最终尽调要求
        blocks:
          - type: paragraph
            body: >
              **建议**：**谨慎关注。** Vinted 是一家出色的欧洲互联网公司——盈利、增长 38%，拥有 marketplace - 物流 - 支付一体化护城河和接近 EU 垄断的地位。2026 年 4 月按
              €8B 完成的老股交易获得了一线机构买家的背书，这些买家拥有完整财务访问权。但 EBITDA 倍数（53x）要求很高，悲观情景存在 30–55% 回撤潜力，结构性监管风险（CJEU GDPR 转介、GPSR
              电子产品、DSA 监测）在当前水平上未被充分定价。


              按 €8B 做老股共同投资有正期望值，但需要耐心（持有 3–5 年至 IPO）以及三项信念：（1）美国市场进入成功，或在大额烧钱前迅速放弃；（2）CJEU 裁决中性或可管理；（3）Vinted Pay 带来的
              take-rate 扩张按计划推进。


              **投资逻辑破裂点**（任一发生都应触发重新评估）：

              1. 收入增速连续两年降至 <15% → 估值修正到 €4–5B

              2. CJEU 不利裁决并要求 12 个月内强制重做产品 → 工程拖累路线图

              3. EU 监管将买家保护费重新定性为卖家费用 → 核心价值主张坍塌


              **偏好的入场结构**：争取相对 €8B 标记的估值折扣（例如 €7B 入场），或下行保护机制（清算优先权、反稀释）。若以 €6–7B 入场并带 1.25–1.5x 清算优先权，风险调整后回报画像会明显改善。


              **最终尽调要求（投资前）**：

              1. 2023 和 2024 年经审计 IFRS 报表——€8B 承销不可谈判

              2. 买家队列留存曲线（第 1/3/6/12 个月），验证 LTV 假设

              3. DAC7 高频卖家可申报交易量，以及 2024 年 1 月以来任何已测量的活动下降

              4. CJEU 案件状态，以及 Vinted 法律顾问对可能裁决时间线和结果的简报

              5. 美国市场自测试开始以来的 GMV、上架量和获客数据

              6. Vinted Pay 按市场拆分的 take-rate 路线图，以及 2026–2028 年管理层预测
