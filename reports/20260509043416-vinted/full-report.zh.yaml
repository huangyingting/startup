  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 交易事实与估值锚
        blocks:
          - type: paragraph
            body: >
              2026 年 4 月，Vinted 完成一笔超额认购的 €880M 老股交易，**股权估值为 €8B**。交易由 EQT 领投——EQT 自 2021 年 Series F 起就是 Vinted
              的长期股东——新投资者包括 BlackRock funds、Ontario Teachers' Pension Plan（via TVG）、Schroders Capital、Lombard Odier 和
              Pinegrove。Baillie Gifford 增持了既有股份。公司没有发行新股；该交易完全是老股交易，为早期投资者和员工提供流动性。


              这笔老股交易之前，是 2024 年 10 月由 TPG 领投、按 €5B 估值完成的老股交易——18 个月估值提升 60%，大体符合 Vinted 同期 38% 的收入增长轨迹。Caplight
              的二级市场数据显示，Vinted 股权在正式公告前已经按隐含 €7.5–8B 交易，确认市场确实完成了价格发现。


              交易投资者质量——BlackRock、OTPP、EQT、Schroders、Lombard Odier——代表一线机构背书，说明能接触管理层、财务数据和可比交易经验的成熟买家认为 €8B
              标记站得住。在这个规模上，Vinted 已跻身欧洲估值最高的五家私营科技公司之一。
