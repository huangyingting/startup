      - number: '5.3'
        title: 技术债、安全与合规证据
        blocks:
          - type: paragraph
            body: >
              根据工程博客披露，Vinted 从单体架构迁移到事件驱动微服务（领域驱动设计）已基本完成，降低了核心后端的系统性技术债。不过，GDPR 合规记录引入了重大担忧：治理流程与产品和数据工程发生交叉。


              2024 年 7 月**立陶宛 DPA €2,385,276 罚款**是 Vinted 历史上最重大的负面产品 /
              合规事件。监管列出三项违规：（1）在没有合法数据处理依据的情况下影子封禁用户；（2）违法要求用户为删除请求说明法律依据；（3）未向用户充分透明披露数据处理。立陶宛法院在 2025 年维持这些认定；2026 年 1
              月，最高行政法院将 GDPR 解释问题提交 CJEU，延长了法律不确定性。


              重要的是，公开资料没有记录任何安全事件（黑客攻击、数据泄露）。GDPR
              违规属于流程性问题——它们涉及信任与安全系统设计（影子封禁）和权利管理工作流，而不是数据外泄。不过，违规具有系统性——影响法国、波兰和立陶宛用户——说明当时信任与安全系统围绕个人数据处理的合规控制不足，构成工程治理缺口。Vinted
              未公开披露 ISO 27001 或 SOC 2 认证。
