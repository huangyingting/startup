      - number: '4.4'
        title: 资本充足性、融资与资本结构
        blocks:
          - type: paragraph
            body: >
              Vinted 通过四轮风险融资募集约 €455M 一级股权：C 轮约 $27M（2015 年）、D 轮 €50M（2018 年）、E 轮 €128M（2019 年）和 F 轮 €250M（2021 年）。自
              2021 年 5 月以来，公司未募集任何一级资本；之后的全部融资都是纯老股交易，为员工和早期投资者提供流动性。


              两笔重要老股交易确立了 Vinted 股权的市场出清价格：2024 年 10 月交易估值 €5B（€340M，TPG 领投）和 2026 年 4 月交易估值 €8B（€880M，EQT、Ontario
              Teachers、Schroders、BlackRock 和 Lombard Odier 参与）。2026 年 4 月交易引入蓝筹机构长线投资者——这是 IPO 前准备度的信号——并使 Vinted
              估值在此前老股交易后的 18 个月内上涨 60%。Ontario Teachers' Pension Plan 是一家大型加拿大机构投资者，在 IPO 前欧洲科技投资上有过往记录；它表示
              Vinted「仍保持现金流为正，资产负债表稳健」。


              资产负债表上唯一债务工具是 BNP Paribas 和 ING Bank 提供的 €50M 循环信贷额度（2023 年 Q4），提供流动性后盾。以 2025 年 €137M FCF
              计，公司年度自由现金流约为总信贷额度的 2.7 倍。短期内似乎不需要一级融资来维持运营或增长。
