      - number: '7.2'
        title: 竞争风险
        blocks:
          - type: paragraph
            body: >
              Vinted 在欧洲的主导地位（纯 C2C 二手电商份额 >90%）为核心市场提供了强竞争防线。但仍有三条竞争风险线值得监控。


              **Vestiaire Collective 融合风险**：2024 年，Vestiaire 在法国的用户中 81% 也活跃于 Vinted（较 2022 年上升 8 个百分点），说明 Vinted
              扩张奢侈品鉴定能力后，平台重叠在上升。Vestiaire Collective 正有意远离快时尚，以维持细分差异；Vinted 进入奢侈品鉴定威胁了这条防线。如果 Vinted
              能规模化做出可信的奢侈品鉴定，Vestiaire 的法国用户基础——也是 Vestiaire 最大市场——可能进一步转向 Vinted。


              **美国市场竞争**：Poshmark（社区功能）、eBay（规模和信任）与 ThredUp（托管转售）都是美国成熟的 C2C 和二手电商平台。Vinted
              入场时美国品牌认知为零，尺码体系不同并立即制造产品摩擦（英国 - 美国跨境联动已经收到负面用户反馈），还需要在偏好本土玩家的市场里从零搭建 marketplace 流动性。零卖家费用模式确实有颠覆性，但前提是
              Vinted 能拿到足够上架流动性并投入足够营销。


              **eBay 和 Depop 产品投入**：eBay 持续投资 EU 时尚品类，Depop 背靠 Etsy 所有权获得资本和跨平台功能，这些仍是潜在风险。不过两者都还没有证明有意愿或执行力去挑战 Vinted
              在法国、德国或英国的流动性深度。
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
              - CR033
      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Vinted 的运营风险画像来自公司同时在多个维度高速扩张。三起 2024 年事件揭示了主要运营风险线。


              **支付故障（2024 年中）**：卖家提款被延迟，公司沟通不足——在 Vinted Pay 扩张关键阶段侵蚀信任。Vinted Pay 扩展到所有 EU
              市场后，底层支付系统可靠性和事故沟通质量的重要性只会继续上升。


              **配送选项撤回（2024 年 8 月）**：卖家取消交易后，Vinted 撤回物流政策变更。这说明 Vinted 针对产品变更的变更管理和用户测试流程，与其用户基础规模并不匹配。


              **多次 app 宕机（2024）**：多次宕机持续数小时到数天，期间商品无法上架或交易无法完成。公司沟通滞后放大了声誉损害。


              **基础设施集中**：Vinted 将全部生产工作负载放在 Vilnius 自建数据中心。未披露异地故障切换或超大规模云厂商备援，意味着 Vilnius
              的任何物理基础设施故障——停电、硬件故障或极端天气——都会变成服务中断，且没有快速恢复路径。考虑区域安全环境，波罗的海国家的地缘风险低但非零。


              **承运商依赖**：Vinted Go 依赖 60+ 个第三方承运商 API 集成。法国或德国的主导承运商若发生合同争议或技术故障，会立即削弱该市场的 Vinted Go 可用性——进而扰动相当份额的 GMV。
