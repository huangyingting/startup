chapter:
  number: 8
  title: Valuation
  summary: >
    Vinted's April 2026 secondary transaction at €8B implies 7.3x 2025 revenue, 53x adj. EBITDA, and 0.74x GMV — a
    significant premium to public C2C and e-commerce marketplace peers (Etsy ~2.5x revenue, eBay ~2.7x). The premium is
    partially justified by Vinted's 38% revenue growth, near-monopoly EU position, integrated logistics and payment
    moat, and sustained profitability. However, the CJEU GDPR referral, US market execution risk, and €8B secondary-
    only transaction (no new primary capital) create meaningful downside risks. Base-case returns from a secondary
    co-investment are moderate; bull case returns require successful US market entry and continued 25%+ revenue growth
    through 2028. Recommendation: cautious interest — merit due diligence but seek downside protection on regulatory
    risk materialisation.
