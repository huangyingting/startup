        Vinted has not disclosed any US-specific GMV, user acquisition, or listing-count metrics since the testing phase
        began; the US investment thesis cannot be assessed without this data.
      whyItMatters: >-
        The bull case and much of the €8B premium are predicated on US market optionality; without US KPI visibility,
        the premium is speculative.
      diligencePath: >-
        Request US market GMV, sign-up rate, and listing-count data from Vinted management; benchmark against Poshmark's
        first-year US traction as a reference.
      relatedQuestionRefs:
        - QV016
    - type: missing-source
      severity: minor
      topic: Forward take-rate trajectory and Vinted Pay margin contribution
      missingEvidence: >-
        No public management guidance on expected take-rate evolution exists; Sacra's 12–14% estimate is an independent
        projection without company confirmation.
      whyItMatters: >-
        Take-rate expansion is the primary near-term earnings-improvement lever; if Vinted Pay delays rollout or
        contributes lower margin than expected, the EBITDA multiple improvement path is impaired.
      diligencePath: Request 2026–2028 management financial model showing Vinted Pay revenue and margin contribution by market.
      relatedQuestionRefs:
        - QV016
sections:
  - id: SV_SEC001
    title: Transaction Facts and Valuation Anchors
    body: >
      In April 2026, Vinted completed an oversubscribed €880M secondary share transaction at an **€8B equity
      valuation**. The deal was led by EQT — already a long-standing Vinted shareholder since the 2021 Series F — with
      new investors including BlackRock funds, Ontario Teachers' Pension Plan (via TVG), Schroders Capital, Lombard
      Odier, and Pinegrove. Baillie Gifford increased its existing stake. No new primary shares were issued; the
      transaction was purely secondary, providing liquidity for early investors and employees.


      The secondary was preceded by the October 2024 TPG-led secondary at €5B — a 60% valuation uplift in 18 months,
      broadly consistent with Vinted's 38% revenue growth trajectory over the same period. Secondary market data from
      Caplight indicates Vinted equity was already trading at implied €7.5–8B before the formal announcement, confirming
      genuine market price discovery.


      The transaction's investor quality — BlackRock, OTPP, EQT, Schroders, Lombard Odier — represents blue-chip
      institutional endorsement signalling that sophisticated buyers with access to management, financial data, and
      comparable transaction experience believe the €8B mark is defensible. At this scale, Vinted ranks among the top
      five most valuable private tech companies in Europe.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV006
      - CV011
      - CV012
      - CV030
      - CV038
    callouts:
      - type: insight
        title: Oversubscription at €8B Validates Price Discovery
        body: >-
          An oversubscribed secondary at this scale means institutional buyers with full access to Vinted's financials
          competed for allocation — a meaningful quality signal that the €8B mark is not forced or strategic.
        tone: positive
      - type: risk
        title: Secondary-Only Structure Means No Capital for Growth
        body: >-
          Co-investors buying into this secondary are purchasing from existing shareholders, not funding Vinted's
          growth. Returns depend entirely on appreciation in Vinted's equity value over the holding period, not any
          preferential capital allocation.
        tone: risk
  - id: SV_SEC002
    title: Valuation Framework and Multiples Analysis
    body: >
      At €8B equity value against 2025 financials, Vinted's implied multiples are:

      - **EV/Revenue (2025)**: €8B / €1.1B = **7.3x** — vs Etsy 2.4–2.9x, eBay 2.4–3.0x, ThredUp 1.0x

      - **EV/Adj. EBITDA (2025)**: €8B / €151M = **53x** — vs public marketplace sector median 8.7–12.6x

      - **EV/FCF (2025)**: €8B / €137M = **58x** — FCF yield 1.7%

      - **EV/GMV (2025)**: €8B / €10.8B = **0.74x** — consistent with approximately 10% take rate


      Vinted's multiple premium is substantial: 2.5–3x the revenue multiple of Etsy or eBay, and 4–6x the EBITDA
      multiple. This premium is partially justified by Vinted's materially superior growth profile (38% revenue growth
      vs Etsy's ~0–5%) and private market illiquidity premium. Allegro (Warsaw IPO 2020) provides a useful precedent:
      the Polish C2C marketplace listed at 7–9x forward revenue; Vinted's 7.3x trailing revenue is in the same range.


      The most credible valuation approach for a high-growth private marketplace is a revenue multiple on forward
      (2026E) revenue with a growth-adjusted discount: if Vinted grows 30% in 2026 (revenue ~€1.43B), the current €8B
      implies 5.6x 2026E revenue — approaching Allegro's IPO range. A DCF at 20% revenue CAGR, 15% EBITDA margin at
      2028E, and 15x terminal EV/EBITDA yields approximately €8.5–10B enterprise value — in line with the current mark
      in the base case.


      The EBITDA multiple of 53x is the most concerning metric: it requires Vinted's EBITDA to grow from €151M (2025) to
      approximately €500–600M to reach a 15x multiple at current EV. At 15% EBITDA margin on a 2028E revenue base of
      €2B, EBITDA would be €300M — implying the current €8B is roughly 27x 2028E EBITDA. That is defensible for a
      high-growth, profitable European platform leader, but leaves limited margin for error.
    claimRefs:
      - CV003
      - CV004
      - CV005
      - CV007
      - CV008
      - CV015
      - CV024
      - CV031
      - CV032
    callouts:
      - type: insight
        title: Take-Rate Expansion Is the Most Powerful Valuation Lever
        body: >-
          If Vinted Pay rollout raises the effective take rate from 10% to 12% at the current GMV, revenue would reach
          €1.3B with no additional GMV growth — reducing the EV/Revenue multiple to 6.2x and meaningfully improving the
          base case.
        tone: positive
      - type: risk
        title: 53x EV/EBITDA Requires Significant Earnings Growth to Justify
        body: >-
          At the current adj. EBITDA of €151M, the 53x multiple is extremely demanding. A 2025 profit decline (-19%) and
          multiple compression risk from IPO re-rating mean EBITDA growth must accelerate meaningfully before an IPO
          reprices the equity.
        tone: risk
    tableRefs:
      - TV002
      - TV004
    figureRefs:
      - FV004
  - id: SV_SEC003
    title: Bull, Base, and Bear Scenarios
    body: >
      **Bull Case (probability: 25%)**: Vinted's US market entry gains traction (10% of GMV by 2028), European growth
      sustains at 25% CAGR, Vinted Pay take-rate expands to 12%+, and the CJEU ruling is benign. 2028E revenue reaches
      €2.2–2.5B; adj. EBITDA approaches €350–400M. At a 5–6x forward revenue IPO multiple (Allegro-style), Vinted lists
      at €11–16B, delivering 38–100% gross return from the €8B entry. This scenario requires both European retention and
      US execution succeeding simultaneously.


      **Base Case (probability: 50%)**: European revenue grows at 20% CAGR; US contributes <5% of GMV by 2028; Vinted
      Pay take-rate reaches 11%. 2028E revenue: €1.6–1.9B; EBITDA €240–280M. At 5x forward revenue, IPO valuation
      reaches €8–10B — modest 0–25% gross upside from the €8B secondary entry over a 3-year horizon. Secondary investors
      earn their cost of capital but not an outsized return.


      **Bear Case (probability: 25%)**: Adverse CJEU ruling requiring trust-and-safety redesign drains engineering 18–24
      months; France GMV decelerates below 10% growth; US entry fails and investment is written down; take-rate
      stagnates at 10%. Revenue plateaus at €1.2–1.4B by 2028; EBITDA compresses. At 3–4x revenue, Vinted is marked at
      €3.6–5.6B — a 30–55% loss from the €8B secondary entry.


      The expected value from these three scenarios (weighting 25/50/25) yields a probability-weighted valuation of
      approximately €8.5–10B — modestly above the entry price, suggesting a positive expected return but with a wide
      distribution. The bear case drawdown of 30–55% is material; structured downside protection would significantly
      improve risk-adjusted returns.
    claimRefs:
      - CV014
      - CV015
      - CV016
      - CV017
      - CV018
      - CV023
      - CV025
    callouts:
      - type: insight
        title: Expected Value is Modestly Positive; Downside Tail is Wide
        body: >-
          Probability-weighted EV of ~€8.5–10B from the three scenarios suggests entering at €8B is not overpriced in
          expectation, but the bear case (€3.6–5.6B) would be a material loss requiring strong conviction in the base
          case or downside structuring.
        tone: neutral
    tableRefs:
      - TV003
    figureRefs:
      - FV002
      - FV003
  - id: SV_SEC004
    title: Comparable Company Analysis
    body: >
      Identifying close public comparables to Vinted requires combining marketplace structure, growth rate, and
      geography. No single public company is a perfect comparable.


      **Etsy** (NASDAQ: ETSY) is the closest peer in marketplace structure (C2C, handmade/vintage/secondhand),
      profitability, and scale (~$2.8–2.9B revenue). Etsy trades at 2.4–2.9x EV/Revenue and 8.7–11x EV/EBITDA. The key
      difference: Etsy grows at 0–5% vs Vinted's 38%, justifying Vinted's higher revenue multiple, but not 3x higher.


      **eBay** (NASDAQ: EBAY): C2C and B2C marketplace; $9B+ revenue; EV/Revenue 2.4–3.0x; slow growth. Not directly
      comparable given Vinted's pure C2C focus and growth profile.


      **ThredUp** (NASDAQ: TDUP): US managed resale; $260M revenue; market cap ~$300M → 1.0x EV/Revenue. Not comparable:
      inventory-heavy model, US-only, losing money.


      **Allegro** (Warsaw Stock Exchange: ALE): Polish general marketplace; largest e-commerce platform in CEE; listed
      at 7–9x forward revenue in 2020. Most comparable in terms of European market dominance, geographic concentration,
      and platform scale thesis. Allegro provides the closest IPO-exit reference for Vinted.


      **Poshmark** (private since Naver acquisition 2023): was valued at $1.6B on $330M revenue → 4.8x EV/Revenue
      pre-acquisition. Thematically close (C2C fashion resale, US-focused) but US-only, much smaller scale.


      **Implied Vinted valuation range from comps**: applying peer revenue multiples suggests Vinted is overvalued vs
      public peers (7.3x vs 2.5x comparable median) but potentially fairly valued on a growth-adjusted basis if Vinted's
      30%+ CAGR is sustained for 2+ more years.
    claimRefs:
      - CV003
      - CV013
      - CV019
      - CV024
      - CV037
      - CV040
    callouts:
      - type: insight
        title: Allegro's IPO Is the Best Vinted Precedent
        body: >-
          Allegro listed on the Warsaw Stock Exchange in 2020 at 7–9x forward revenue and has since re-rated lower as
          growth moderated — a warning for Vinted: high IPO multiples require sustained high growth to avoid post-IPO
          re-rating.
        tone: neutral
  - id: SV_SEC005
    title: Recommendation, Thesis Breaks, and Final Diligence Asks
    body: >
      **Recommendation**: **Cautious interest.** Vinted is an exceptional European internet company — profitable,
      growing at 38%, with an integrated marketplace-logistics-payments moat and near-monopoly EU position. The April
      2026 secondary at €8B is endorsed by blue-chip institutional buyers with full financial access. However, the
      EBITDA multiple (53x) is demanding, the bear case has 30–55% drawdown potential, and structural regulatory risks
      (CJEU GDPR referral, GPSR electronics, DSA monitoring) are imperfectly priced at this level.


      A secondary co-investment at €8B offers positive expected value but requires patience (3–5 year hold to IPO) and
      conviction that: (1) US market entry succeeds or is quickly abandoned without major capital burn; (2) the CJEU
      ruling is neutral or manageable; (3) take-rate expansion from Vinted Pay proceeds on schedule.


      **Thesis breaks** (any would trigger re-evaluation):

      1. Revenue growth deceleration to <15% for two consecutive years → valuation correction to €4–5B

      2. Adverse CJEU ruling with 12-month mandatory product redesign → engineering drag on roadmap

      3. EU regulatory reclassification of buyer protection fee as seller fee → core value proposition collapse


      **Preferred entry structure**: seek a valuation discount to the €8B mark (e.g., €7B entry) or downside protection
      mechanics (liquidation preference, anti-dilution). At €6–7B with 1.25–1.5x liquidation preference, the
      risk-adjusted return profile improves materially.


      **Final diligence asks (pre-investment)**:

      1. Audited IFRS accounts for 2023 and 2024 — non-negotiable for €8B underwriting

      2. Cohort buyer retention curves (month-1/3/6/12) to validate LTV assumptions

      3. DAC7 power-seller reportable volume and any measured activity reduction since January 2024

      4. CJEU case status and Vinted's legal counsel brief on likely ruling timeline and outcomes

      5. US market GMV, listings, and user acquisition data since testing began

      6. Vinted Pay take-rate roadmap by market with 2026–2028 management projections
    claimRefs:
      - CV026
      - CV027
      - CV028
      - CV033
      - CV034
      - CV036
      - CV039
    callouts:
      - type: insight
        title: 'Preferred Structure: €6–7B Entry with Downside Protection'
        body: >-
          At €8B, the risk-adjusted return is marginal. Negotiating entry at €6–7B with a 1.25–1.5x liquidation
          preference would provide attractive downside protection while maintaining full bull-case upside participation.
        tone: positive
      - type: risk
        title: No Audited IFRS Accounts Is a Hard Diligence Gate
        body: >-
          The 2024 and 2025 financial disclosures are press-release figures only. Committing capital at €8B without
          independently audited IFRS accounts would be inconsistent with institutional-grade due diligence standards.
        tone: adverse
    tableRefs:
      - TV001
      - TV005
      - TV006
    figureRefs:
      - FV001
