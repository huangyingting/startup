        GPSR creates direct liability for platforms; electronics have much higher recall rates than fashion; a product
        safety incident in electronics could trigger regulatory action and reputational damage.
      diligencePath: >-
        Request Vinted's GPSR compliance roadmap for electronics; check whether Vinted has joined relevant EU market
        surveillance cooperation frameworks.
      relatedQuestionRefs:
        - QR026
    - type: missing-source
      severity: minor
      topic: Antitrust and competition-law risk from dominant EU market position
      missingEvidence: >-
        No EU Commission or national competition authority has initiated proceedings against Vinted despite its >90%
        pure-play C2C recommerce market share; the risk is currently latent.
      whyItMatters: >-
        Dominant platforms (>50% market share) in the EU can attract competition-law scrutiny under Article 102 TFEU; if
        the DMA designates Vinted a 'gatekeeper', significant interoperability and data access obligations would apply.
      diligencePath: >-
        Monitor EU Digital Markets Act gatekeeper designation criteria for secondhand platforms; assess Vinted's share
        in defined market segments.
      relatedQuestionRefs:
        - QR027
    - type: missing-source
      severity: minor
      topic: Specific DAC7 reportable seller volume at Vinted
      missingEvidence: >-
        Vinted has not disclosed the number of sellers who exceed DAC7 thresholds (>€2,000/year or >30 transactions) or
        the share of GMV attributable to DAC7-reportable sellers.
      whyItMatters: >-
        If the majority of Vinted's GMV is generated by DAC7-reportable sellers who may reduce activity following tax
        scrutiny, GMV growth could decelerate more than projected.
      diligencePath: >-
        Request DAC7 reporting volumes from Vinted; ask whether any markets have shown measurable seller activity
        reduction since January 2024 reporting.
      relatedQuestionRefs:
        - QR028
sections:
  - id: SR_SEC001
    title: Regulatory and Legal Risk
    body: >
      Vinted's most material risk cluster is regulatory. Four distinct regulatory frameworks imposed simultaneous
      obligations on the company in 2024–2026.


      **DSA (Digital Services Act)**: Fully applicable from February 17, 2024, the DSA requires Vinted to verify seller
      identities (Article 30), operate notice-and-action mechanisms for illegal products (Article 16), take action
      against repeat offenders (Article 23), and maintain transparency in algorithm and advertising practices. In June
      2024, EU Commission and Lithuanian authorities required Vinted to stop adding undisclosed automatic fees at
      checkout and to improve refund transparency — indicating that Vinted was not fully DSA-compliant at launch.
      Ongoing monitoring continues, with gaps remaining in price clarity. DSA non-compliance fines can reach 6% of
      global annual revenue — approximately €66M at 2025 revenue levels — with operational bans possible for severe or
      repeated violations.


      **GDPR CJEU Referral**: Vinted's €2,385,276 fine (July 2024) was upheld by Lithuanian courts in 2025. The case was
      referred to the CJEU in January 2026, creating multi-year legal uncertainty. If the CJEU rules adversely, Vinted
      may be required to redesign its shadow-banning and user-visibility algorithms across all 26 markets simultaneously
      — a significant engineering and product risk. This case also sets precedent for the entire C2C platform industry.


      **GPSR (General Product Safety Regulation)**: Effective December 2024, GPSR classifies Vinted as a 'distributor'
      for secondhand goods, imposing safety verification, market surveillance cooperation, and recall obligations.
      Vinted's expansion into electronics — a category with materially higher product safety risks than fashion —
      amplifies this exposure. No public evidence of electronics-specific GPSR compliance processes at Vinted exists.


      **DAC7**: Since January 31, 2024, Vinted must report sellers with >€2,000/year revenue or >30 annual transactions
      to EU member-state tax authorities. This creates a dual risk: a platform compliance obligation (fines of €50,000+
      per state if Vinted fails to report), and a supply-side demand risk (power sellers reducing activity to avoid tax
      scrutiny).
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR038
    callouts:
      - type: risk
        title: CJEU Referral Is the Highest Regulatory Uncertainty
        body: >-
          A CJEU ruling adverse to Vinted on shadow-banning practices could require redesigning trust-and-safety
          algorithms across all EU markets, impose retrospective penalties beyond the initial €2.385M, and force
          industry-wide changes affecting all C2C platforms.
        tone: adverse
      - type: risk
        title: GPSR Electronics Compliance Gap is Undisclosed
        body: >-
          Vinted expanded into electronics in 2024 before the GPSR took effect in December 2024. No public evidence
          exists that Vinted's GPSR compliance process covers electronics-specific safety obligations — a material gap
          with regulatory and reputational consequences.
        tone: risk
    tableRefs:
      - TR001
    figureRefs:
      - FR001
  - id: SR_SEC002
    title: Competitive Risks
    body: >
      Vinted's dominant European position (>90% pure-play C2C recommerce share) provides strong competitive insulation
      in its core markets. However, three competitive risk vectors deserve monitoring.


      **Vestiaire Collective convergence**: 81% of Vestiaire's French users were also active on Vinted in 2024 (up 8pp
      since 2022), indicating rising platform-overlap as Vinted's luxury authentication capabilities expand. Vestiaire
      Collective is deliberately distancing from fast fashion to maintain a segment distinction; Vinted's entry into
      luxury authentication threatens this defensive positioning. If Vinted achieves credible luxury authentication at
      scale, Vestiaire's French user-base — Vestiaire's largest — could further shift toward Vinted.


      **US market competition**: Poshmark (community features), eBay (scale and trust), and ThredUp (managed resale) are
      entrenched US C2C and recommerce platforms. Vinted enters with zero US brand awareness, a different sizing
      convention creating immediate product friction (UK-US cross-border linkage has already received adverse user
      feedback), and a need to build marketplace liquidity from zero in a market that favours local players. The
      zero-seller-fee model is genuinely disruptive, but only if Vinted can achieve sufficient listing liquidity and
      marketing investment.


      **eBay and Depop product investment**: eBay's continued investment in EU fashion categories and Depop's Etsy
      ownership providing capital and cross-platform features remain latent risks, though neither has demonstrated the
      intent or execution capability to challenge Vinted's liquidity depth in France, Germany, or the UK.
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
      - CR033
    callouts:
      - type: risk
        title: US Entry Is a High-Stakes Capital Deployment
        body: >-
          The US market requires Vinted to invest in brand building, seller acquisition, and logistics integration from
          zero — with no guaranteed payoff timeline. If US traction fails to materialise by 2027, the capital deployed
          will have had a negative return with no competitive moat to show.
        tone: risk
  - id: SR_SEC003
    title: Operational and Technology Risks
    body: >
      Vinted's operational risk profile reflects a company scaling at pace across multiple dimensions simultaneously.
      Three 2024 incidents reveal the principal operational risk vectors.


      **Payment glitch (mid-2024)**: Seller fund withdrawals were delayed with inadequate company communications —
      eroding trust in Vinted Pay at a critical expansion phase. As Vinted Pay scales across all EU markets, the
      underlying payment system's reliability and the quality of incident communications become more, not less,
      critical.


      **Delivery option reversal (August 2024)**: Vinted reversed logistics policy changes after sellers cancelled
      transactions. This signals that Vinted's change-management and user-testing processes for product changes are not
      commensurate with the scale of its user base.


      **Multiple app outages (2024)**: Items could not be listed or transactions completed during outages lasting hours
      to days. The delayed company communications amplified reputational damage.


      **Infrastructure concentration**: Vinted operates all production workloads in self-hosted Vilnius data centers. No
      disclosed geographic failover or hyperscaler fallback means any physical infrastructure failure in Vilnius — power
      outage, hardware failure, or extreme weather — becomes a service outage with no fast recovery path. Geopolitical
      risk in the Baltic states is low but non-zero given the regional security context.


      **Carrier dependency**: Vinted Go depends on 60+ third-party carrier API integrations. A contract dispute or
      technical failure with a dominant carrier in France or Germany would immediately impair Vinted Go availability in
      that market — disrupting a material share of GMV.
    claimRefs:
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
      - CR022
      - CR023
      - CR034
    callouts:
      - type: risk
        title: No Public Disaster Recovery Plan for Vilnius Data Centers
        body: >-
          The absence of a disclosed failover site or RPO/RTO specification for Vinted's Vilnius infrastructure is a
          material diligence gap. A sustained infrastructure outage in a geography hosting 100% of production workloads
          would be catastrophic.
        tone: adverse
    tableRefs:
      - TR002
      - TR003
    figureRefs:
      - FR002
      - FR003
  - id: SR_SEC004
    title: People, Execution, and Financial Risks
    body: >
      **People risk**: Vinted's engineering concentration in Vilnius and Kaunas creates senior talent concentration
      risk. The Baltic senior engineering talent pool is deep at mid-level but shallower for principal and staff
      engineers — roles requiring both technical depth and system-scale experience. A wave of senior engineer departures
      to higher-compensation Western European or remote-first US firms could disrupt critical infrastructure
      development.


      **Execution risk — US and category expansion**: Running simultaneously: US market entry (building liquidity from
      zero), electronics GPSR compliance (new obligations), Vinted Pay EU rollout (payment regulation), Vinted Go
      expansion (logistics infrastructure), and luxury authentication scaling (trust-and-safety). Executing five
      high-risk initiatives in parallel without one being neglected requires exceptional program management capacity
      that is not independently evidenced.


      **Financial risk**: Vinted's 2025 net profit declined 19% to €62M despite 38% revenue growth to €1.1B. While FCF
      of €137M and adj. EBITDA of €151M confirm operational cash generation capacity, continued margin compression
      driven by US and infrastructure investment could require external capital if growth initiatives do not deliver
      positive unit economics by 2027. The April 2026 secondary at €8B valuation provides no new primary capital to fund
      investment.
    claimRefs:
      - CR024
      - CR025
      - CR028
      - CR039
      - CR040
      - CR041
    callouts:
      - type: insight
        title: Financial Headroom is Adequate Near-Term; US ROI is the Key Watch Point
        body: >-
          With €137M FCF and €151M adj. EBITDA in 2025, Vinted can absorb regulatory fines and compliance investments
          without distress. The risk is whether US investment delivers visible traction before 2028 — an event horizon
          that determines whether the current investment thesis holds.
        tone: neutral
    tableRefs:
      - TR004
  - id: SR_SEC005
    title: Risk Mitigation and Kill Criteria
    body: >
      Vinted's disclosed risk mitigation evidence is limited: DSA fee disclosure was remediated in June 2024 following
      regulator pressure; GDPR shadow-ban policy was changed following the Lithuanian DPA fine. These are reactive
      rather than proactive mitigations, indicating Vinted's compliance posture has historically been response-driven
      rather than anticipatory.


      **Recommended kill criteria for key risks**:

      - *US market entry*: if US GMV falls below a defined percentage of total GMV by end-2027 after two years of
      investment, capital reallocation to core EU markets is warranted.

      - *CJEU GDPR ruling*: if the CJEU mandates structural product redesign with a compliance deadline of <24 months,
      engineering capacity impact on other initiatives must be assessed.

      - *France/Germany GMV deceleration*: a consecutive two-quarter GMV decline in either market should trigger a
      competitive and regulatory root-cause review before additional expansion capital is deployed.

      - *Vinted Pay capital adequacy*: if the Lithuanian National Bank requires additional EMI license capital, assess
      whether this changes the dilution and capital structure.


      The aggregate regulatory exposure (GDPR, DSA, GPSR, DAC7, EMI) represents a structural compliance investment
      burden that will persist for 3–5 years. Any due-diligence investor should model a €30–50M annual compliance cost
      uplift as part of their base-case investment thesis.
    claimRefs:
      - CR003
      - CR016
      - CR024
      - CR035
      - CR039
      - CR040
    callouts:
      - type: risk
        title: Reactive Compliance Posture Is a Governance Concern
        body: >-
          Both the DSA and GDPR violations were identified by regulators before Vinted remediated them — suggesting a
          reactive rather than anticipatory compliance culture. As the regulatory environment becomes more complex, this
          posture increases the probability of further enforcement actions.
        tone: adverse
    tableRefs:
      - TR005
