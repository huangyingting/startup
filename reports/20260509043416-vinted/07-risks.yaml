chapter:
  number: 7
  title: Risks
  summary: >
    Vinted faces a layered risk profile across four domains. Regulatory risks are the most material: an ongoing CJEU
    GDPR referral (Jan 2026), DSA compliance adjustments mandated by the EU Commission in 2024, GPSR obligations for
    secondhand goods effective December 2024, and DAC7 power- seller supply-side risk. Competitive risks are real but
    manageable given Vinted's >90% share; the US entry is the highest-stakes test. Operational risks include Vilnius
    data-center concentration, a structurally weak customer support model, and Vinted Go carrier-dependency. People and
    execution risks are moderate given Lithuania's shallow senior talent pool. The 2025 profit decline of 19% reflects
    investment-driven margin compression rather than structural deterioration.
