sections:
  - id: SP_SEC001
    title: Competitive Landscape Overview
    body: >
      Vinted operates in the global secondhand fashion marketplace sector, which reached approximately $300 billion in
      GMV in 2024 and is projected to grow at roughly 20% CAGR through 2030. The competitive landscape spans five
      distinct competitor categories. **Direct C2C peers** include Depop (Gen Z fashion, Etsy-owned), Wallapop (general
      C2C, Spain-dominant, Naver-acquired), and Poshmark (social fashion, US-focused, Naver-owned). **Luxury resale
      specialists** are represented by Vestiaire Collective and The RealReal. **B2C recommerce** is anchored by ThredUp
      (US) and Rebag. **General incumbents** — primarily eBay — compete across all categories with pre-owned items
      constituting 39% of eBay's clothing/shoes/accessories volume and 40% of total global GMV. **Likely entrants**
      include tech-enabled fast fashion players (Shein, Zalando) who could add resale features, and social platforms
      (Instagram, TikTok Shop) that enable peer-to-peer commerce natively.


      Vinted's 90%+ EU C2C panel share reflects the winner-take-most dynamics of liquidity-driven marketplaces: once a
      platform achieves sufficient buyer density, sellers follow, creating a self-reinforcing cycle that makes
      displacement structurally difficult. General resale platforms (eBay, Vinted, Wallapop, Mercari) collectively
      command approximately 80% of global resale web traffic, with fashion-focused platforms (Depop, Poshmark,
      Vestiaire) accounting for most of the remainder.
    claimRefs:
      - CP019
      - CP020
      - CP044
      - CP023
      - CP017
      - CP018
    callouts:
      - type: insight
        title: Winner-Take-Most in EU C2C
        body: >-
          Vinted's buyer density advantage in France, Germany, and the UK creates a structural moat that requires any
          challenger to simultaneously overcome liquidity gaps, brand recognition deficits, and logistics matching — a
          combination no current rival has achieved.
        tone: positive
    figureRefs:
      - FP001
  - id: SP_SEC002
    title: Competitor Profiles and Strategic Directions
    body: >
      **Depop** (Etsy, acq. June 2021 at $1.6B) targets Gen Z buyers and sellers of curated vintage and streetwear. It
      generated $788.9M GMS in 2024 (+31.6% YoY), with approximately $85M revenue and 43.5M registered users. Despite
      rapid GMS growth, Depop posted an operating loss of £42M, narrowed 14% from the prior year. Depop's strong
      community and social-commerce features differentiate it, but its US-UK focus and continued losses contrast with
      Vinted's European profitability.


      **Wallapop** (Naver, acquired 2025 at ~€650M) is Spain's dominant C2C marketplace with 19–21M monthly active
      users. Revenue was €101M (+13%) in 2024, still running a €25M operating loss. Naver's simultaneous ownership of
      Wallapop (Southern Europe) and Poshmark (US) positions it as the only global C2C recommerce consolidator, though
      cross-border feature leverage is unproven.


      **Vestiaire Collective** targets mid-to-luxury resale globally, generating ~€200M revenue in 2024 from ~€1B GMV.
      Its €1.1–1.2B 2024 valuation is below its 2021 €1.4B peak. The platform targets its first full-year profit in
      2026. Its luxury authentication capabilities position it outside Vinted's core mass-market lane.


      **ThredUp** (Nasdaq: TDUP) is a US B2C recommerce platform — not a true C2C peer — that generated $260M revenue
      (+1%) in 2024 with a 79.7% gross margin but a $40M net loss. Critically, ThredUp divested 91% of its European
      operations in Q4 2024, materially reducing any direct competitive overlap with Vinted in Europe.


      **eBay** is the largest incumbent, with pre-owned clothing comprising 39% of fashion category sales and pre-loved
      goods representing 40% of global GMV. eBay's C2C fashion strengths are seller trust built over two decades and
      global reach, but its multi-category UX is diluted relative to Vinted's fashion-focused experience.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
      - CP006
      - CP007
      - CP008
      - CP009
      - CP010
      - CP011
      - CP012
      - CP013
      - CP014
      - CP015
      - CP016
      - CP017
      - CP018
    callouts:
      - type: insight
        title: ThredUp's European Exit Strengthens Vinted
        body: >-
          ThredUp's divestiture of 91% of European operations reduces institutional recommerce competition in Vinted's
          core geography, validating that US B2C models struggle to transfer to EU C2C markets.
        tone: positive
    tableRefs:
      - TP001
  - id: SP_SEC003
    title: Capability, Pricing, and Distribution Comparison
    body: >
      Vinted's zero-seller-fee model is its single most structurally differentiating pricing feature. Depop charges
      sellers approximately 10% plus payment processing, Wallapop charges 5–10%, Vestiaire charges 15%+, and eBay
      charges approximately 12% on fashion. ThredUp's B2C model passes no seller control to individual users. Vinted's
      buyer protection fee (~5% + fixed per item) generates over 50% of total revenue while ensuring sellers see maximum
      returns on each listing.


      On capability, Vinted's proprietary logistics network (Vinted Go: 500K+ PUDO points, 60+ carriers) and embedded
      Vinted Pay (EMI licensed) are capabilities no pure-play C2C rival matches. Depop and Poshmark rely on third-party
      carriers. Wallapop has built logistics revenue (€74M in 2024) but its PUDO coverage is Spain-centric. Vestiaire
      uses specialist courier partners for authenticated luxury shipping but does not operate a branded carrier network.


      On distribution, eBay's global scale and seller trust are unmatched, but eBay's fashion traffic share is diluted
      across electronics, motors, and collectibles. Depop's Gen Z community and social-commerce features are strong GTM
      advantages in the 18–25 age bracket. Vestiaire's luxury brand partnerships (Kering, LVMH pilot programmes) create
      authenticated distribution channels Vinted cannot access. Vinted's GTM strength lies in TV advertising spend,
      zero-friction onboarding, and referral dynamics within the zero-seller-fee model.
    claimRefs:
      - CP024
      - CP025
      - CP026
      - CP027
      - CP029
      - CP030
      - CP035
      - CP041
      - CP045
    callouts:
      - type: strength
        title: Zero Seller Fee + Proprietary Logistics = Differentiated Stack
        body: >-
          No C2C rival combines zero seller fees with a proprietary PUDO logistics network and a regulated payment
          institution under one platform. This stack depth is a multi-year competitive advantage.
        tone: positive
      - type: risk
        title: Luxury Gap Widening
        body: >-
          Vestiaire's partnerships with luxury brands and authentication capabilities widen the gap in premium-to-luxury
          resale, a high-AOV segment Vinted does not serve and may find difficult to enter.
        tone: warning
    tableRefs:
      - TP002
      - TP003
    figureRefs:
      - FP002
      - FP003
  - id: SP_SEC004
    title: Switching Costs, Lock-in, and Multi-homing
    body: >
      Switching costs in C2C fashion marketplaces are structurally asymmetric: seller switching costs are moderate
      (reputation scores, follower bases, transaction history), while buyer switching costs are low (account creation on
      a rival takes minutes, with no data portability requirement). This creates a marketplace where seller retention is
      more defensible than buyer exclusivity.


      Multi-homing is widespread among professional and semi-professional sellers on Vinted, who routinely cross-list
      inventory on eBay, Depop, and Vinted simultaneously. This reduces listing exclusivity but does not reduce the
      importance of liquidity: buyers concentrate on the platform where they find the most relevant inventory,
      reinforcing Vinted's leader position in EU C2C fashion.


      Vinted's most durable lock-in mechanisms operate at the infrastructure layer rather than the UX layer. Sellers
      integrated into Vinted Go's label-generation, carrier tracking, and returns management embed Vinted into
      operational workflows. Vinted Pay wallet balances, recurring payout schedules, and bank-linked accounts further
      increase seller switching friction. The longer a seller operates on Vinted Go and Vinted Pay, the more operational
      data — transaction history, carrier preferences, rating — is locked to the Vinted ecosystem.


      Distribution power is a secondary moat: Vinted's 100M+ user base in European markets means its search and
      recommendation algorithms operate on a data advantage that a new entrant with fewer listings cannot replicate.
      This reinforces the thesis that the primary competitive risk to Vinted is not single-market displacement by a peer
      but rather slow erosion from multi-homing sellers who dilute exclusivity over time.
    claimRefs:
      - CP031
      - CP032
      - CP033
      - CP034
      - CP036
      - CP043
    callouts:
      - type: risk
        title: Multi-homing Is the Primary Structural Vulnerability
        body: >-
          Widespread seller multi-homing across Vinted, eBay, and Depop means listing exclusivity is not guaranteed.
          Vinted's moat depends on buyer-side liquidity superiority, not seller-side exclusivity.
        tone: negative
  - id: SP_SEC005
    title: Moat Durability and Competitive Risk Assessment
    body: >
      Vinted's competitive moat rests on four reinforcing pillars: (1) **Network effects** — the largest buyer pool in
      EU C2C fashion creates search result depth unavailable on smaller rivals; (2) **Supply-side infrastructure** —
      Vinted Go and Vinted Pay create operational dependencies that make seller switching increasingly costly; (3)
      **Zero-fee flywheel** — seller economics superior to any rival sustain supply growth and attract marginal sellers
      off eBay and Facebook Marketplace; (4) **Brand salience** — Vinted is the default brand for secondhand fashion in
      France, Belgium, Netherlands, Poland, Lithuania, and the UK.


      The key commoditisation risk is platform-feature parity: as Depop, Wallapop, and eventually Poshmark build out
      logistics and payment tools, the infrastructure differentiation may narrow. Naver's consolidation of Wallapop and
      Poshmark represents the most credible long-run displacement scenario, if Naver transfers Poshmark's
      social-commerce features to European markets. This could accelerate Gen Z multi-homing to social-native formats.


      Adverse evidence: despite Vinted's EU dominance, Germany — its second-largest market — showed growth deceleration
      in 2024–2025 internal signals (not yet publicly disclosed). eBay Germany remains entrenched among older sellers
      and buyers. No rival has demonstrated an ability to replicate the Vinted Go logistics depth, but Wallapop's
      logistics-first revenue model (74% of revenue from shipping) shows the path is viable at scale.
    claimRefs:
      - CP034
      - CP036
      - CP038
      - CP039
      - CP040
      - CP041
      - CP042
    callouts:
      - type: risk
        title: Naver Consolidation Risk
        body: >-
          Naver's control of Wallapop (Southern Europe) and Poshmark (social commerce) creates a strategic option to
          build an integrated social-first C2C competitor to Vinted with pre-existing user bases across multiple
          regions.
        tone: risk
    tableRefs:
      - TP004
