chapter:
  number: 3
  title: Competitors
  summary: >
    Vinted holds approximately 90% panel share of EU C2C pure-play recommerce, facing credible competition from Depop
    (Etsy-owned, Gen-Z focused), Wallapop (Naver-acquired, Spain-dominant), Vestiaire Collective (luxury resale),
    ThredUp (US B2C resale), and eBay (global incumbent). Vinted's zero-seller-fee flywheel, proprietary Vinted Go
    logistics, and Vinted Pay payments create durable supply-side lock-in that peers cannot easily replicate.
    Multi-homing by sellers and low buyer switching costs remain the primary structural vulnerability.
