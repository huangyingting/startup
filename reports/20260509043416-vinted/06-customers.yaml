chapter:
  number: 6
  title: Customers
  summary: >
    Vinted's marketplace serves 75M+ registered members across 26+ markets,
    dominated by 25–34-year-old female buyers and sellers in France (largest
    market), the UK (95% pure C2C recommerce share), and Germany. Over 50% of
    UK buyers repeat-purchase, with an NPS of 25 and 81% self-reported loyalty.
    However, Trustpilot reviews average ~1.1/5, driven by customer support,
    buyer-protection, and dispute-resolution failures — a persistent adverse
    signal and structural retention risk. Concentration in three EU markets
    (France, UK, Germany) contributes an estimated 70%+ of GMV.

