figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    description: "End-to-end journey of a typical Vinted casual seller across five stages: awareness, first listing, first sale, repeat use, and loyalty expansion."
    sourceRefs: [SU001, SU004, SU021]
    claimRefs: [CU015, CU019, CU022, CU025]
    notes: "Journey mapped for the modal user archetype (casual European individual seller, female, 25–34). Touchpoints and emotions are inferred from consumer surveys and user reports."
    data:
      items:
        - id: awareness
          label: "Awareness"
          description: "Hears about Vinted via friend referral or social media; downloads app; sees zero-seller-fee value proposition"
        - id: first-listing
          label: "First Listing"
          description: "Takes photos; AI-assisted categorisation; sets price; item indexed in Vespa in ~5 seconds and searchable immediately"
        - id: first-sale
          label: "First Sale"
          description: "Receives offer or buy-now; selects Vinted Go carrier; drops off at PUDO point; buyer protection fee paid by buyer"
        - id: repeat-use
          label: "Repeat Use"
          description: "Positive experience drives repeat listings; starts buying secondhand items from other sellers; dual role emerges"
        - id: loyalty-expansion
          label: "Loyalty & Expansion"
          description: "Recommends Vinted to friends; becomes word-of-mouth acquisition channel; may upgrade to Wardrobe Spotlight for visibility"

  - id: FU002
    title: Adoption / deployment funnel
    type: funnel
    description: "Discovery-to-loyal-buyer funnel for Vinted, showing estimated conversion rates at each stage."
    sourceRefs: [SU001, SU003, SU007]
