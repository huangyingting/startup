  - id: S-BUSINESSMODEL
    title: Business Model, Financial Performance, and Strategic Position
    body: >
      Vinted's core differentiator is a zero-seller-fee model paired with a mandatory buyer protection fee on every
      transaction (approximately 5% of item price plus a fixed €0.70–€0.90, varying by market). This fee covers secure
      escrow payments, customer support, and dispute resolution. By charging the buyer rather than the seller, Vinted
      maximizes seller-side supply, creating the network-effect flywheel that underpins its dominance. Additional
      revenue streams include shipping margins (buyer purchases prepaid labels at Vinted-negotiated bulk rates),
      optional promoted listings/Bump, Wardrobe Spotlight subscriptions, and Vinted Pay processing margins. The buyer
      protection fee accounts for more than half of total revenue; shipping margins form the second-largest component.
      Financial performance has been remarkable: after a €20.4M net loss in 2022, the company reached its first
      profitability in 2023 with €596.3M revenue (+61% YoY) and €17.8M net profit. In 2024, revenue reached €813.4M
      (+36%), net profit €76.7M (+330%), and Adjusted EBITDA €158.9M. The 2024 employee base averaged 2,200 (+19%)
      across 26+ markets. In 2025 GMV reached €10.8bn (+47%) and revenue €1.1bn (+38%), though net profit fell 19% to
      €62M as the company invested heavily in Germany, new categories, and logistics. Strategically, Vinted has executed
      accretive M&A: United Wardrobe (Netherlands, 2020), Chicfy (Spain, 2019), Rebelle (Germany luxury, 2022,
      subsequently merged into Vinted in March 2024), Homerr (Netherlands logistics, 2023), and Trendsales (Denmark,
      early 2024). The company faces active regulatory scrutiny: the Lithuanian DPA fined it €2,385,276 in July 2024 for
      GDPR violations related to right-to-erasure failures and shadow-banning. Vinted has appealed. Further litigation
      is ongoing in Poland, Italy, and France.
