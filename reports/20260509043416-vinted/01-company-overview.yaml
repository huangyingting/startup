company:
  name: Vinted
chapter:
  number: 1
  title: Company Overview
  summary: >
    Vinted Group UAB is Europe's leading peer-to-peer secondhand fashion marketplace, founded in 2008 in Vilnius,
    Lithuania by Milda Mitkutė and Justas Janauskas. Under CEO Thomas Plantenga (joined 2016, CEO ~2017), the company
    executed a dramatic turnaround from near-bankruptcy to unicorn status in 2019 (€1B valuation), then grew to €5B in
    October 2024 and €8B in April 2026. Its buyer-pays-only model—zero seller fees, mandatory buyer protection
    fee—drives network effects across 26+ European markets. 2024 revenue hit €813.4M (+36% YoY) with net profit of
    €76.7M (+330%). The group now encompasses Vinted Marketplace, Vinted Go (logistics), Vinted Pay (payments), and
    Vinted Ventures (CVC).
sections:
  - id: S-IDENTITY
    title: Company Identity and Origins
    body: >
      Vinted Group UAB is headquartered in Vilnius, Lithuania and operates as a private technology company. The company
      was co-founded in 2008 by Milda Mitkutė (then 22 years old) and Justas Janauskas. The founding idea arose when
      Mitkutė needed to sell surplus clothing before moving into smaller student accommodation and Janauskas, a
      programmer, helped her build a website to trade items with others. Within weeks the platform grew from a personal
      solution into a popular community marketplace. The company launched first in Lithuania and expanded to Germany in
      2009, the Czech Republic in 2011, France and Poland in 2013, and the UK in 2014. By 2016, Vinted had expanded into
      nine markets but suffered from inconsistent business models across regions, seller fees that drove users away, and
      advertising revenues barely covering server costs. The company was approximately nine to twelve months from
      insolvency when Insight Partners introduced Dutch entrepreneur Thomas Plantenga. Plantenga joined as a five-week
      consulting engagement in 2016 and never returned to New York, ultimately becoming CEO. He executed a radical
      restructuring: closed all regional offices except Vilnius headquarters, reduced headcount by more than a third,
      scrapped the 20% seller fee, introduced a buyer protection fee, and launched major TV advertising campaigns.
      Revenue rebounded dramatically and in November 2019 Vinted raised €128M in a Series E round led by Lightspeed
      Venture Partners at a €1B+ valuation, becoming Lithuania's first tech unicorn. Today Vinted has offices in
      Vilnius, Kaunas, Amsterdam, Berlin, Hamburg, and Paris and employs over 2,200 people.
