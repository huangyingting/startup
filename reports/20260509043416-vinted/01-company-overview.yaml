callouts:
  - calloutType: strength
    title: Zero-Seller-Fee Flywheel
    body: >
      Vinted's buyer-pays model (zero seller fees, mandatory buyer protection fee) is the defining competitive moat. By
      removing friction for sellers, the platform achieves supply density that makes it the default destination for
      buyers, creating a self-reinforcing flywheel. This model has proven profitable at scale, generating €813.4M
      revenue in 2024 and €76.7M net profit.
    claimRefs:
      - CO008
      - CO009
      - CO017
      - CO018
  - calloutType: risk
    title: GDPR Regulatory Exposure
    body: >
      The Lithuanian DPA fined Vinted €2,385,276 in July 2024 for GDPR violations (right-to-erasure failures and
      shadow-banning practices). Litigation is also pending in Poland, Italy, and France. A French class action (UFC-Que
      Choisir, filed 2021) over buyer protection fees is unresolved. Maximum GDPR exposure could theoretically reach 4%
      of global annual turnover.
    claimRefs:
      - CO023
  - calloutType: insight
    title: Secondary-Transaction Valuation Acceleration
    body: >
      Vinted has achieved two major valuation step-ups via secondary share transactions rather than primary fundraises:
      €5B (Oct 2024, +43% from 2021 €3.5B) and €8B (Apr 2026, +60% from Oct 2024). This signals strong investor demand
      but means there is no corresponding primary capital injection. The use of secondaries suggests management is not
      IPO-ready yet but is managing cap-table tensions by providing employee and investor liquidity.
    claimRefs:
      - CO005
      - CO006
      - CO007
