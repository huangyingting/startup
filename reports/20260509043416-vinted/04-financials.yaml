chapter:
  number: 4
  title: Financials
  summary: >
    Vinted generated €1.1 billion in revenue in 2025 (+38% YoY) and €10.8 billion
    in GMV (+47%), becoming a self-funding platform with €137M in free cash flow.
    Net profit declined 19% to €62M as the company reinvested heavily in logistics
    and new markets. Buyer protection fees drive over 50% of revenue; shipping margins
    (Vinted Go), promoted listings, and Vinted Pay are growing secondary streams.
    No primary fundraise since 2021; all subsequent transactions were secondaries
    providing employee and investor liquidity only.

