figures:
  - id: FI001
    title: Revenue model bridge
    type: waterfall
    description: "Waterfall showing how Vinted's €10.8B GMV (2025) converts to €1.1B revenue through the buyer protection fee model, with secondary revenue streams stacked on top."
    sourceRefs: [SI001, SI019, SI020, SI021]
    claimRefs: [CI002, CI009, CI010, CI011, CI012]
    notes: "Revenue stream contributions are estimated; buyer protection fee >50% is company-disclosed. Other stream estimates are derived from analyst research and industry benchmarks."
    data:
      items:
        - label: "GMV (€10.8B)"
          value: 10800
          description: "Total gross merchandise value transacted on Vinted in 2025"
        - label: "Non-Captured GMV"
          value: -9700
          description: "Portion of GMV not monetised (item value passes to seller); Vinted only captures the fee layer"
        - label: "Buyer Protection Fees"
          value: 550
          description: "Est. >50% of revenue; ~5% + €0.70 per transaction applied to all purchases"
        - label: "Vinted Go Shipping Margin"
          value: 230
          description: "Estimated shipping margin retained after carrier cost pass-through"
        - label: "Promoted Listings"
          value: 180
          description: "High-margin seller-paid visibility products"
        - label: "Vinted Pay + Other"
          value: 140
          description: "Payment service margins and emerging revenue lines"

  - id: FI002
    title: Unit economics bridge
    type: flow
    description: "Illustrative flow of how a C2C transaction converts into Vinted revenue and platform economics, from user acquisition through to FCF contribution."
    sourceRefs: [SI015, SI017, SI019, SI021]
    claimRefs: [CI009, CI014, CI015, CI030, CI036]
    notes: "Qualitative nodes with approximation notes; exact cost percentages are not publicly disclosed. Flow illustrates the structural economics of the buyer-pays model."
    data:
      nodes:
        - id: user-acquisition
          label: "User Acquisition (TV + App Store)"
          description: "CAC undisclosed; TV advertising is primary channel in new markets; word-of-mouth dominant in mature markets"
        - id: listing
          label: "Seller Lists Item (Free)"
          description: "Zero seller fee drives listing volume flywheel; estimated 100M+ users contributing to listing supply"
        - id: purchase
          label: "Buyer Purchases Item"
          description: "Buyer pays item price + buyer protection fee (~5% + €0.70); estimated 10.2% take rate on GMV"
        - id: revenue-capture
          label: "Vinted Captures Buyer Protection Fee"
          description: "Fee non-refundable in most scenarios; recognised as service revenue at transaction; est. >50% of total revenue"
        - id: gross-profit
          label: "Gross Profit (est. 70–85% margin)"
          description: "Asset-light model; primary variable costs are payment processing and logistics; no inventory COGS"
        - id: fcf
          label: "Free Cash Flow (€137M, 2025)"
          description: "FCF of 12.5% of revenue; EBITDA-to-cash conversion high despite profit decline due to non-cash charges"

