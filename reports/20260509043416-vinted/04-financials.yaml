sections:
  - id: SI_SEC001
    title: Revenue Streams and Pricing Model
    body: |
      Vinted generates revenue exclusively from buyers and optional seller services — sellers pay zero fees to list or sell. The primary revenue stream is the **buyer protection fee**, charged on every transaction as approximately €0.70 fixed plus 5% of item price (varying by market and region), which company disclosures indicate accounts for more than 50% of total revenue. For a €20 item, the buyer protection fee is approximately €1.70 — representing a 7.5% monetisation yield on that item's transaction value. The fee covers payment security, buyer dispute resolution, and platform access.

      Three secondary streams are growing in materiality. **Vinted Go shipping margins** are earned by negotiating bulk rates with 60+ carriers and charging users a blended fee above marginal cost; logistics revenue is significant but not separately disclosed. **Promoted listings** allow sellers to pay for increased item visibility within search results; these are high-margin incremental revenue with no associated variable cost at scale. **Vinted Pay** margins on transactions processed through the EMI-licensed payment institution represent a growing but undisclosed revenue line as adoption deepens.

      The effective take rate in 2025 was approximately 10.2% of GMV (€1.1B / €10.8B), elevated for a C2C platform and reflective of the buyer-pays model generating superior monetisation versus seller-commission alternatives. Revenue is structurally high-quality: buyer protection fees are non-refundable in most scenarios and are automatically applied to every transaction, creating a volume-linked recurring base with no concentration risk.
    claimRefs: [CI001, CI002, CI009, CI010, CI011, CI012, CI013, CI014, CI036]
    callouts:
      - type: strength
        title: "Buyer-Pays Model Creates Durable Recurring Revenue"
        body: "100% transaction attachment of the buyer protection fee, with no seller-side fee offset, yields structurally higher GMV monetisation than dual-sided fee models."
        tone: positive

  - id: SI_SEC002
    title: Financial Performance Trajectory
    body: |
      Vinted's revenue trajectory shows consistent high-growth: €596.3M in 2023 (+61%), €813.4M in 2024 (+36%), and €1.1B in 2025 (+38%). The company first achieved profitability in 2023 (€17.8M net profit) after a €20.4M loss in 2022, having operated through 15 years of investment-led growth. In 2024, profitability accelerated sharply: net profit grew 330% to €76.7M and adjusted EBITDA more than doubled to €158.9M (+108%).

      The 2025 results represent a deliberate reinvestment year: net profit declined 19% to €62M and adjusted EBITDA fell 5% to €151M, while revenue and GMV grew 38% and 47% respectively. The adjusted EBITDA margin compressed from approximately 19.5% (2024) to 13.7% (2025). However, free cash flow grew 36% to €137M, suggesting that investment in Vinted Go logistics expansion and new market entry is being absorbed without depleting cash reserves. The divergence between declining net profit (accounting-based) and rising FCF (cash-based) indicates that non-cash charges and timing differences explain a material portion of the stated profit decline.

      The company has operated in a high-growth compounding mode: taking revenue from ~€40M in 2019 (estimated) to €1.1B in 2025 is a ~28x growth in six years, validating the flywheel thesis.
    claimRefs: [CI006, CI007, CI016, CI017, CI025, CI026, CI032, CI039, CI040]
    callouts:
      - type: risk
        title: "2025 Margin Compression Needs Monitoring"
        body: "Adjusted EBITDA margin falling from 19.5% to 13.7% in one year while FCF grew 36% suggests a timing-driven investment cycle rather than structural deterioration, but investors should track 2026 EBITDA margin recovery as the key validation metric."
        tone: warning

  - id: SI_SEC003
    title: Unit Economics and Cost Structure
    body: |
      Vinted's unit economics are partially obscured by its private status. The company discloses top-line revenue, GMV, EBITDA, net profit, and FCF, but does not report CAC, LTV, cohort retention, gross margin, or country-level profitability. Analyst estimates and industry benchmarks suggest gross margin of 70–85% (consistent with asset-light marketplace models with minimal COGS). The primary cost drivers are: (1) **marketing and TV advertising** — the main acquisition channel in new European markets; (2) **technology and engineering** — including custom infrastructure (Vespa search engine, in-house data centres in Vilnius); (3) **payment processing** — fees to external payment providers before Vinted Pay fully internalises the stack; (4) **logistics infrastructure** — Vinted Go carrier contracts, PUDO point installation/maintenance; and (5) **G&A and headcount** — 2,200+ employees.

      The asset-light model means Vinted carries no inventory and no manufacturing capex. However, Vinted Go creates non-trivial capex relative to pure software marketplaces: carrier integrations, PUDO hardware deployment, and label-printing infrastructure are capital-consuming at scale. Acquisitions of Homerr (Netherlands logistics, 2023) and Trendsales (Denmark, 2024) reflect capital deployed in strategic M&A rather than pure operating spend.

      The CAC in new markets (e.g., Croatia, Greece, Estonia) is expected to be significantly higher than in established markets (France, UK, Germany) where brand awareness is already high. No payback period data is available, but the company's profitability trajectory implies that mature market cohorts are highly unit-economic.
    claimRefs: [CI015, CI024, CI029, CI030, CI031, CI037, CI038]
    callouts:
      - type: assumption
        title: "Gross Margin Estimate Is Inferred, Not Confirmed"
        body: "The 70–85% gross margin estimate is based on marketplace benchmarks, not disclosed financials. Actual gross margin after payment processing, logistics cost-sharing, and carrier fees may be materially lower."
        tone: neutral

  - id: SI_SEC004
    title: Capital Adequacy, Funding, and Capital Structure
    body: |
      Vinted raised approximately €455M in primary equity across four venture rounds: Series C ~$27M (2015), Series D €50M (2018), Series E €128M (2019), and Series F €250M (2021). Since May 2021, the company has not raised any primary capital; all subsequent financing has been pure secondary share transactions providing liquidity to employees and early investors.

      Two significant secondaries have established the market-clearing price for Vinted equity: an October 2024 transaction at €5B (€340M, led by TPG) and an April 2026 transaction at €8B (€880M, led by EQT, Ontario Teachers, Schroders, BlackRock, and Lombard Odier). The April 2026 transaction introduced blue-chip institutional long-only investors — a signal of pre-IPO readiness — and raised Vinted's valuation 60% in 18 months from the prior secondary. Ontario Teachers' Pension Plan, a large Canadian institutional investor with a track record in pre-IPO European technology, made its statement that Vinted "remains cash flow positive with a strong balance sheet."

      The only debt instrument on the balance sheet is a €50M revolving credit facility from BNP Paribas and ING Bank (Q4 2023), providing liquidity backstop. With €137M FCF in 2025, the company's annual free cash flow is approximately 2.7x the total credit facility. No near-term primary fundraising appears necessary to sustain operations or growth.
    claimRefs: [CI018, CI019, CI020, CI021, CI022, CI028, CI035]
    callouts:
      - type: strength
        title: "Self-Funding Since 2021 Is a Tier-1 Capital Quality Signal"
        body: "Five consecutive years without a primary raise demonstrates Vinted's ability to fund operations and growth organically, meaningfully reducing dilution risk and dependency on external capital."
        tone: positive

  - id: SI_SEC005
    title: Financial Diligence Gaps and Risk Flags
    body: |
      Vinted's financial disclosure is limited by its private status. The most material gaps are: (1) **Per-stream revenue split** — the breakdown of buyer protection fees, Vinted Go shipping margins, promoted listings, and Vinted Pay revenue is not disclosed, preventing assessment of which streams are growing, contracting, or contributing to margin compression; (2) **Balance sheet and cash position** — group-level cash, total assets, and debt are not publicly available; only standalone Lithuanian entity accounts are publicly filed at Rekvizitai; (3) **Country-level GMV/revenue** — geographic concentration risk cannot be assessed without per-market data; (4) **Unit economics** — CAC, LTV, and payback by cohort and market are not disclosed.

      Adverse financial signals: the 2025 net profit margin declined from 9.4% to 5.6% while FCF grew — this divergence should be tracked. If the EBITDA margin continues to compress below 10% through 2026 without corresponding revenue acceleration, it would suggest either structural cost creep (Vinted Go operating losses, overhead expansion) or demand-side slowdown in core markets. Additionally, Vinted's "adjusted EBITDA" definition is not publicly specified — it is unknown whether share-based compensation is excluded, which could materially overstate operating profitability in a pre-IPO context where equity grants are accelerating.
    claimRefs: [CI023, CI033, CI040, CI026, CI034]
    callouts:
      - type: risk
        title: "Adjusted EBITDA Definition Is a Key Diligence Question"
        body: "If Vinted excludes stock-based compensation from adjusted EBITDA (as most growth-stage companies do), reported EBITDA is upward-biased relative to true cash operating profit. Clarification is required before using EBITDA as a valuation anchor."
        tone: risk

