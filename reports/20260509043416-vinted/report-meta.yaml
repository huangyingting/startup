companyProfile:
  summary: >
    Vinted is a Vilnius-based C2C recommerce platform founded in 2008 by Milda Mitkutė and Justas Janauskas.
    Originally a Lithuanian student clothes-swap community, it has grown into Europe's largest pure-play secondhand
    marketplace with 75M+ registered members across 20+ markets. Vinted operates an integrated flywheel —
    marketplace (buyer protection fee), logistics (Vinted Go: 500K+ PUDO points, 60+ carriers), and payments
    (Vinted Pay: EMI-licensed) — that creates a structural moat competitors cannot replicate without multi-year
    platform investment. The platform achieved its first statutory profit in 2023 (€17.8M), followed by €76.7M
    net profit in 2024 and €62M in 2025 (moderated by US and Vinted Go investment). France (35% GMV), UK (25%),
    and Germany (15%) are the three largest markets. In April 2026, Vinted completed an oversubscribed €880M
    secondary transaction at €8B equity valuation, led by EQT with new investors BlackRock, Ontario Teachers',
    Schroders Capital, and Lombard Odier — with no new primary capital issued.
  foundedDate: "2008-01-01"
  founders:
    - name: Milda Mitkutė
      role: Co-Founder
      background: Lithuanian co-founder; originally created Vinted as a peer-to-peer clothes-swap platform for Lithuanian students in 2008; instrumental in building the early community and supply-side acquisition model.
      claimRefs: [CO001]
    - name: Justas Janauskas
      role: Co-Founder
      background: Co-built the original Vinted platform; drove early product and technical direction before transitioning to a long-term advisory/board role as the professional management team scaled operations.
      claimRefs: [CO001]
    - name: Thomas Plantenga
      role: CEO (since 2019)
      background: Former Bain & Company partner; joined Vinted as CEO in 2019 after its near-failure and pivoted to the buyer protection fee monetisation model that drove profitability; led the European expansion and logistics integration strategy.
      claimRefs: [CO002]
  foundingLocation: Vilnius, Lithuania
  headquarters: Vilnius, Lithuania
  productSummary: >
    Vinted's core product is a C2C marketplace where private sellers list secondhand clothing and lifestyle
    items at zero commission. Buyers pay a buyer protection fee (approximately 3–8% of item price plus fixed fee)
    that funds Vinted's revenue. Vinted Go provides integrated shipping (60+ carriers, 500K+ PUDO lockers and
    drop-off points in 15 markets) eliminating individual carrier negotiation. Vinted Pay (EMI-licensed)
    internalises payment processing margin and enables cross-border transactions. The product has expanded to
    electronics (2024), a branded sustainability line 'New Again' (2025), and is testing the US market (2026).
    The platform uses AI-powered search with two-tower ML and 256-dimensional CLIP embeddings.
  customerFocus: >
    Primary demographic is 25–34 year old women (63% female users); 80% of purchases are under £20; buyers are
    value-oriented and repeat-purchasing (50%+ repeat-buyer rate in UK). Seller supply is individual private
    sellers, with power sellers (DAC7-reportable threshold: €2,000/30 items annually) representing a meaningful
    but unquantified GMV share. No enterprise or B2B product exists.
  businessModel: >
    Zero-seller-fee model: Vinted charges buyers a buyer protection fee per transaction (approx. 3–8% + fixed),
    generating revenue of approximately 10% of GMV. Vinted Go provides logistics facilitation with a per-parcel
    margin. Vinted Pay internalises payment processing margin. Revenue: €1.1B (2025). Adj. EBITDA: €151M
    (13.7% margin). FCF: €137M.
  stage: late-stage private
  fundingStatus: >
    Total disclosed equity raised approximately €600M across all rounds. Key rounds — 2016 €27M (Accel),
    2019 €128M, 2021 €250M Series F at ~€3.5B (EQT Growth, Lightspeed). Post-Series F: October 2024 €340M
    secondary at €5B (TPG); April 2026 €880M secondary at €8B (EQT, BlackRock, OTPP, Schroders, Lombard Odier).
    No primary equity raised since 2021 Series F; company states it does not need new capital.
  disclosureProfile: private-disclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CV001, CV003, CV005]

summary:
  headline: "Vinted is a compounding European internet business — profitable, growing at 38%, with an integrated moat — but the April 2026 €8B secondary entry price (7.3x trailing revenue, 53x EBITDA) offers only modest base-case upside and material bear-case downside from regulatory and execution risks."
  overallScore: 7.0
  recommendation: track
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 8800
    revenueRunRateUsdM: 1210
    arrUsdM: 1210
    revenueGrowthYoYPct: 38
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 660
    customerCount: 75000000
    headcount: 3000
  topStrengths:
    - "Near-monopoly EU C2C position: >90% pure-play C2C recommerce share; France, UK, Germany combined 75% GMV represents a durable structural advantage"
    - "Integrated flywheel (marketplace + Vinted Go logistics + Vinted Pay) creates a switching cost moat that requires 3–5 years and €300M+ to replicate"
    - "Profitable since 2023 and FCF-positive (€137M FCF in 2025): rare combination of high growth (38% revenue) and cash generation at marketplace scale"
    - "38% revenue CAGR (2025) at €1.1B revenue is exceptional for a profitable European platform — materially above any public marketplace comparable"
    - "April 2026 secondary oversubscribed at €8B by blue-chip institutional investors (BlackRock, OTPP, EQT, Schroders) with full financial access — a strong price validation signal"
  topRisks:
    - "CJEU GDPR referral (January 2026): adverse ruling could mandate trust-and-safety system redesign; 18–24 month engineering drain would slow the product roadmap and compress EBITDA"
    - "Valuation demands sustained high growth: at 7.3x trailing revenue and 53x adj. EBITDA, any deceleration below 15% revenue growth for two quarters would trigger a significant valuation correction"
    - "US market execution risk: US entry is both the primary bull-case driver and the primary capital risk; Vinted has zero publicly disclosed US KPIs to date"
    - "Buyer protection fee regulatory exposure: EU reclassification of the fee as a seller fee would destroy Vinted's zero-seller-fee value proposition and supply-side moat"
    - "Financial disclosure gap: 2024 and 2025 figures are unaudited press-release numbers; no IFRS accounts are publicly available; material accounting differences cannot be excluded"
  unresolvedGaps:
    - "Audited IFRS financial accounts for 2023 and 2024 — non-negotiable for €8B investment underwriting"
    - "Cohort buyer retention curves (month-1/3/6/12 by market) — LTV assumptions cannot be modelled without cohort data"
    - "CJEU case procedural status and legal counsel brief on ruling scenarios and timeline"
    - "US market GMV, listing count, and user acquisition data since testing began in 2026"
    - "DAC7 power-seller volume and observed listing-rate change since January 2024 reporting requirement"
    - "Vinted Pay take-rate roadmap and 2026–2028 EBITDA contribution model with management projections"
