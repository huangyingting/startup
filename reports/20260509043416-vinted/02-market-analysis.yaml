company:
  name: Vinted
chapter:
  number: 2
  title: Market Analysis
  summary: The European C2C online fashion resale market is large, fast-growing, and dominated by Vinted. The global secondhand fashion TAM is USD 190B (2024), growing at 10.7% CAGR to USD 521B by 2034.
    The European market is approximately EUR 15-20B online in 2024. Vinted holds approximately 90% of pure-play C2C recommerce in EU panel markets and approximately 95% in the UK. France is the most mature
    market (17.8% secondhand share in 2023); Vinted is the number 1 clothing retailer in France by volume. Primary consumer motivations are price (72%) and hedonic treasure-hunting; sustainability is a
    secondary driver. Gen Z normalization of secondhand is the structural tailwind; trust barriers, DAC7 compliance, and competition from brand recommerce are the main constraints.
