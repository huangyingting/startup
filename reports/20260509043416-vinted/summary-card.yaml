  topStrengths:
    - >-
      Near-monopoly EU C2C position: >90% pure-play C2C recommerce share; France, UK, Germany combined 75% GMV
      represents a durable structural advantage
    - >-
      Integrated flywheel (marketplace + Vinted Go logistics + Vinted Pay) creates a switching cost moat that requires
      3–5 years and €300M+ to replicate
    - >-
      Profitable since 2023 and FCF-positive (€137M FCF in 2025): rare combination of high growth (38% revenue) and cash
      generation at marketplace scale
    - >-
      38% revenue CAGR (2025) at €1.1B revenue is exceptional for a profitable European platform — materially above any
      public marketplace comparable
    - >-
      April 2026 secondary oversubscribed at €8B by blue-chip institutional investors (BlackRock, OTPP, EQT, Schroders)
      with full financial access — a strong price validation signal
  topRisks:
    - >-
      CJEU GDPR referral (January 2026): adverse ruling could mandate trust-and-safety system redesign; 18–24 month
      engineering drain would slow the product roadmap and compress EBITDA
    - >-
      Valuation demands sustained high growth: at 7.3x trailing revenue and 53x adj. EBITDA, any deceleration below 15%
      revenue growth for two quarters would trigger a significant valuation correction
    - >-
      US market execution risk: US entry is both the primary bull-case driver and the primary capital risk; Vinted has
      zero publicly disclosed US KPIs to date
    - >-
      Buyer protection fee regulatory exposure: EU reclassification of the fee as a seller fee would destroy Vinted's
      zero-seller-fee value proposition and supply-side moat
    - >-
      Financial disclosure gap: 2024 and 2025 figures are unaudited press-release numbers; no IFRS accounts are publicly
      available; material accounting differences cannot be excluded
  unresolvedGaps:
    - Audited IFRS financial accounts for 2023 and 2024 — non-negotiable for €8B investment underwriting
    - Cohort buyer retention curves (month-1/3/6/12 by market) — LTV assumptions cannot be modelled without cohort data
    - CJEU case procedural status and legal counsel brief on ruling scenarios and timeline
    - US market GMV, listing count, and user acquisition data since testing began in 2026
    - DAC7 power-seller volume and observed listing-rate change since January 2024 reporting requirement
    - Vinted Pay take-rate roadmap and 2026–2028 EBITDA contribution model with management projections
