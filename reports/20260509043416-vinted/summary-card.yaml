summary:
  headline: >-
    Vinted is a compounding European internet business — profitable, growing at 38%, with an integrated moat — but the
    April 2026 €8B secondary entry price (7.3x trailing revenue, 53x EBITDA) offers only modest base-case upside and
    material bear-case downside from regulatory and execution risks.
