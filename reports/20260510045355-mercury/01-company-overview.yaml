  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: "Audited financial statements and GAAP income statement detail"
      missingEvidence: "Mercury has not publicly filed audited financial statements. Revenue ($500M), profitability, and margin details are company-disclosed, unaudited figures shared in fundraise context."
      whyItMatters: "Without audited financials, investors cannot verify revenue recognition methodology, cost structure, actual GAAP margins, or intercompany accounting with partner banks."
      diligencePath: "Request audited annual financial statements (2022-2024) and trailing quarterly P&L from Mercury as part of formal data room diligence."
      relatedQuestionRefs: [QO022]

    - type: missing-source
      severity: material
      topic: "Direct regulatory enforcement against Mercury (not partner banks)"
      missingEvidence: "No public evidence of formal regulatory enforcement against Mercury itself, distinct from its partner banks Evolve and Choice. Absence of evidence is not evidence of absence."
      whyItMatters: "If regulators determine Mercury was a direct cause of partner bank compliance failures, Mercury could face its own enforcement actions affecting operations."
      diligencePath: "Request confirmation from Mercury's General Counsel of any pending regulatory investigations or supervisory letters directed at Mercury."
      relatedQuestionRefs: [QO024, QO026]

    - type: missing-source
      severity: material
      topic: "Revenue breakdown by stream (interest vs. interchange vs. SaaS vs. FX)"
      missingEvidence: "Mercury has not disclosed the breakdown of its $500M 2024 revenue by source. Sacra estimates interest income is the primary driver but exact percentages are unavailable."
      whyItMatters: "Revenue mix determines sensitivity to interest rate changes, card volume, and SaaS churn. A rate-cut cycle could materially compress revenue if interest income dominates."
      diligencePath: "Request revenue segmentation by stream from Mercury's CFO or the data room financial model."
      relatedQuestionRefs: [QO023]

    - type: private-evidence-only
      severity: material
      topic: "Series C primary vs. secondary split, founder liquidity, and full investor ownership"
      missingEvidence: "Mercury declined to disclose how much of the $300M Series C was primary vs. secondary, or how much founders/employees liquidated. Exact ownership percentages, voting rights, and secondary transactions for all investors are not publicly disclosed."
      whyItMatters: "High secondary component may signal insider selling conviction, reduce available growth capital, and affect cap table dynamics for new investors. Full stakeholder ownership is needed for governance analysis."
      diligencePath: "Review the Series C term sheet, cap table, and liquidity schedule as part of formal investor diligence."
      relatedQuestionRefs: [QO028]
      relatedTableRefs: [TO003]

    - type: missing-source
      severity: minor
      topic: "Conflict of interest documentation for Akhund venture fund"
      missingEvidence: "No public documentation of any formal conflict-of-interest review or governance policy regarding CEO Akhund's $26M venture fund launched alongside his Mercury CEO role."
      whyItMatters: "Without a formal policy, the venture fund could create undisclosed conflicts in Mercury's M&A or investment strategy, especially given Series C M&A mandate."
      diligencePath: "Request Mercury's board-level conflict-of-interest policy and any recusal procedures related to Akhund's personal fund."
      relatedQuestionRefs: [QO025]

    - type: missing-source
      severity: material
      topic: "Full leadership team composition below named executives"
