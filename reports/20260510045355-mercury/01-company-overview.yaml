company:
  name: Mercury

chapter:
  number: 1
  title: Company Overview
  summary: |
    Mercury is a San Francisco-based fintech company founded in 2017 (launched 2019) by Immad Akhund
    (CEO), Max Tagher (CTO), and Jason Zhang (COO) that provides business banking software and
    financial services to startups and SMBs via FDIC-insured partner banks. In March 2025, Mercury
    raised a $300M Series C led by Sequoia Capital at a $3.5B valuation, having achieved $500M in
    2024 revenue, 10 consecutive quarters of profitability, 200,000+ business customers, and $156B
    in annual transaction volume (+64% YoY). The company faces material risks around its BaaS
    partner-bank model, documented compliance lapses, and interest-rate sensitivity of its
    deposit-driven revenue model.

sections:
  - id: SO001
    title: Identity and Business Model
    body: |
      Mercury is a financial technology company headquartered in San Francisco, California that
      delivers business banking services through a partnership model with FDIC-insured chartered
      banks rather than holding its own banking charter. Founded in 2017 and publicly launched in
      April 2019, Mercury targets startups, venture-backed companies, e-commerce businesses, and
      small-to-medium enterprises (SMBs) that have historically been underserved by incumbent
      commercial banks. The company's flagship product is a modern digital business bank account
      that aggregates checking, savings, credit cards, treasury management, bill pay, invoicing,
      expense management, and accounting integrations into a single platform.

      Mercury operates a multi-revenue-stream model. The primary revenue source is interest income
      shared with partner banks on approximately $20 billion in customer deposits. Secondary streams
      include interchange fees on the IO corporate card (issued by Patriot Bank), wire and FX fees
      (40+ currencies), and SaaS-style subscriptions ranging from $35-$350/month for premium
      financial software features. This deposit-driven model is materially rate-sensitive and
      VC-liquidity-sensitive. Mercury's deposit base grew rapidly after SVB's March 2023 collapse
      as startups sought alternatives, but deposit growth and retention are tied to venture
      ecosystem fundraising conditions.

      Mercury's strategic thesis is that the bank account should function as the "financial
      operating system" for a business. The 2024 annual letter from CEO Immad Akhund described
      four major product launches in 2024 (bill pay, invoicing, accounting automations, and expense
      management) as steps toward this vision, alongside Mercury Personal for consumers. As of
      March 2025, Mercury serves 200,000+ business customers and claims roughly one in three US
      startups receiving early-stage VC funding opens a Mercury account. Partner banks as of 2025
      include Choice Financial Group, Column N.A., and Patriot Bank (for card issuance), with a
      network of 20+ banks holding excess deposits via sweep to provide up to $5M in FDIC coverage
      per startup.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]

  - id: SO002
    title: Founders, Leadership, and Governance
    body: |
      Mercury was co-founded by three former colleagues from Heyzap, a mobile developer tools and
      ad-tech startup acquired by Fyber in 2016. Immad Akhund (CEO) earned an MA in Computer
      Science from the University of Cambridge, co-founded Heyzap through Y Combinator, and spent
      time as a part-time YC partner and prolific angel investor (300+ investments including
      Airtable, Rippling, Substack, and Rappi) before launching Mercury in 2017. Max Tagher (CTO)
      and Jason Zhang (COO) were Heyzap co-founders. The founding team spent 18+ months meeting
      with 60+ banks and 100+ entrepreneurs before the 2019 product launch, building the BaaS
      partner bank relationships that power Mercury today.

      The current executive team includes Daniel Kang (CFO), Jon Auxier (Chief Banking Officer),
      Robert Gonzalez (General Counsel), Nick Dellis (VP Revenue), and Juliana Vislova (VP Design).
      The company employs 1,000+ people as of 2025. In 2025, Akhund also launched a personal $26M
      early-stage venture fund alongside his CEO role, raising potential conflict-of-interest
      considerations.

      The board expanded significantly with the Series C. New board members include Sonya Huang
      (Sequoia Capital partner who led the investment), Tim Mayopoulos (former CEO of Fannie Mae
      and of Silicon Valley Bridge Bank during the SVB crisis), and Tom Brown (fintech regulatory
      attorney with advisory history at PayPal, Chime, and Upstart). Existing board members include
      Saar Gur of CRV and board observers Alex Rampell (Andreessen Horowitz) and Dan Rose (Coatue).
      Jason Zhang was also added to the board as co-founder representative. Key-person risk is
      elevated given Akhund's central public role, investor anchor function, and product vision
      leadership, partially mitigated by the three-founder structure and experienced board.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012, CO013]

  - id: SO003
    title: Funding History and Capital Structure
    body: |
      Mercury has raised over $500M in total primary and secondary capital since founding. The
      funding history progresses from a 2017 seed round to fund initial product development,
      through a Series A to fund the 2019 launch, to a $120M Series B in July 2021 at a $1.62B
      post-money valuation (led by CRV and joined by a16z, Coatue, and others), and a $300M
      Series C in March 2025 at a $3.5B post-money valuation — more than double the Series B
      valuation. The Series C was led by Sequoia Capital (its first investment in Mercury), with
      new investors Spark Capital and Marathon and returning investors Coatue, CRV, and Andreessen
      Horowitz.

      CEO Akhund stated that the "majority" of the $300M Series C was primary capital, with a
      secondary component allowing existing shareholders to sell. A broader employee tender offer
      was announced for a later date. Mercury declined to disclose the primary-vs-secondary split
      or exact founder liquidity taken. The company has been profitable for 10 consecutive quarters
      on both EBITDA and GAAP net income as of early 2025, suggesting the Series C is primarily
      opportunistic and strategic rather than a survival raise.

      Use of proceeds includes product innovation, acquisitions in complementary fintech segments,
      hiring, and long-term financial flexibility. No official IPO timeline has been stated, though
      the addition of Tim Mayopoulos (public-company veteran) and Sonya Huang to the board signals
      preparation for a potential IPO. Mercury has also obtained credit facilities to support its
      venture debt product offering for customers, though terms are not publicly disclosed.
    claimRefs: [CO014, CO015, CO016, CO017, CO018, CO019, CO035, CO036]

  - id: SO004
    title: Scale, Traction, and Key Milestones
    body: |
      Mercury's traction data as of early 2025 is compelling. The company reports $500M in 2024
      annual revenue, representing approximately 97% YoY growth (Sacra estimate), driven primarily
      by interest income on $20B in customer deposits. The customer base grew to 200,000+ business
      accounts (40% YoY) with annual transaction volume of $156B (+64% YoY from an estimated $95B+
      in 2023). The company reports an industry-leading NPS score of 80+ (vs. banking industry
      average of ~34) and an iOS App Store rating of 4.9 with 7,200+ reviews. Mercury's website
      attracts approximately 2.5M monthly visits per SimilarWeb.

      Product expansion in 2024 was substantial: bill pay, invoicing, accounting automations,
      employee expense management, and Mercury Personal for consumers. The IO corporate card
      (launched September 2022) is the most used corporate card among Mercury customers.
      International capabilities expanded to 40+ currencies. Mercury integrated Column N.A.
      as a new partner bank in 2024 as part of its multi-bank strategy.

      Mercury's SVB Moment: The March 2023 Silicon Valley Bank collapse was a major customer
      acquisition catalyst. Mercury was not directly exposed to SVB and quickly published
      reassurances about its FDIC-insured status. Thousands of startups that had banked with SVB
      or were looking for alternatives onboarded with Mercury, materially accelerating deposit
      and customer growth. This SVB windfall benefited Mercury disproportionately given its
      existing startup focus and digital-first model.
    claimRefs: [CO020, CO021, CO022, CO023, CO024, CO025, CO033, CO040]

  - id: SO005
    title: Adverse Events and Regulatory Risk
    body: |
      Mercury has faced material adverse events that require diligence. The most significant
      involve its partner bank relationships and documented compliance lapses.

      Evolve Bank & Trust, a key Mercury partner bank, received a Federal Reserve enforcement
      action in June 2024 citing deficiencies in AML, risk management, and consumer compliance
      related to its fintech partnerships. Investigative reporting by Alex Johnson (Fintech Takes)
      documented that Mercury was allegedly an active participant in compliance lapses at Evolve,
      including: (1) whitelisting high-risk users in sanctioned or FATF-greylisted jurisdictions
      at Mercury's request; (2) alleged absence of transaction monitoring at Mercury for a period;
      and (3) shutting off a transaction monitoring vendor system after it generated too many
      alerts. Mercury has disputed aspects of these characterizations but has not provided a
      comprehensive public rebuttal. Mercury severed its Evolve relationship in March 2025 and
      migrated customers to Choice Financial Group, Column N.A., and Patriot Bank.

      In July 2024, Mercury announced account closures for businesses with associated addresses
      in 37 countries, including 13 African nations (Nigeria, Cameroon, DR Congo, etc.), driven
      by FATF greylisting and partner bank compliance pressure. This sparked significant criticism
      from the African startup ecosystem, which had come to rely on Mercury after SVB's collapse.
      Critics alleged geographic discrimination and failure to implement individualized risk
      assessments. Separately, Mercury was also indirectly exposed to the Synapse Financial
      Technologies bankruptcy in April 2024.

      No direct Federal Reserve or OCC enforcement action against Mercury itself (as distinct from
      its partner banks) has been publicly reported as of this report date. However, the compliance
      culture issues documented in Fintech Takes and Mercury's own 2024 annual letter acknowledging
      it doubled its compliance team represent material diligence factors.
    claimRefs: [CO026, CO027, CO028, CO029, CO030, CO031, CO039]

