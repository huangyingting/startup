  shortDescription: "Banking and financial services platform designed for startups and technology-forward businesses, offering business checking, savings, treasury, venture debt, and cards."
companyProfile:
  summary: "Mercury is a San Francisco-based fintech company founded in 2019 by Immad Akhund and Jason Zhang that provides digital business banking and financial services purpose-built for startups and growth-stage businesses. The company offers FDIC-insured checking and savings accounts (via partner banks), treasury management, venture debt, corporate cards, and an API platform. Mercury reached approximately $500M in revenue in 2024 with over 200,000 business customers and $156B in annual transaction volume, achieving 10+ consecutive quarters of profitability on the strength of net interest income and interchange fees."
  foundedDate: "2019-01-01"
  founders:
    - name: "Immad Akhund"
      role: "CEO & Co-founder"
      background: "Serial entrepreneur; previously co-founded Heyzap (acquired by Fyber)"
    - name: "Jason Zhang"
      role: "CTO & Co-founder"
      background: "Prior engineering leadership at Y Combinator-backed startups"
  headquarters: "San Francisco, CA"
  productSummary: "Mercury offers FDIC-insured business checking and savings accounts (via Evolve Bank & Trust and Choice Financial Group), a high-yield Mercury Treasury product, Mercury IO corporate cards, Mercury Venture Debt, international wire transfers, and a developer API. Accounts can be opened fully online without minimum balances."
  customerFocus: "Startups, venture-backed businesses, SMBs, e-commerce companies, and technology-forward organizations"
  businessModel: "Net interest income (NIM) on deposits (~60-75% of revenue), interchange fees on debit/credit card spend (~15-25%), and fee-based premium services including venture debt and treasury management (~10-20%)"
  stage: "Series C"
  fundingStatus: "$300M Series C at $3.5B valuation (March 2025); total raised ~$380M+"
