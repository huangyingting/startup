chapter:
  key: customers
  order: 6
  number: 6
  letter: U
  title: Customers
  mission: >-
    Identify who pays and uses Mercury's platform, the proof of real adoption, durability of retention, expansion dynamics,
    and concentration risks relevant to diligence.

sections:
  - id: S1
    title: Customer Base Segmentation
    body: >-
      Mercury serves primarily digital-native businesses — startups, e-commerce companies, scale-ups, and SMBs —
      with a secondary segment of individual investors using Mercury for Investors and consumers via Mercury Personal.
      At launch in 2019, Mercury targeted venture-backed startups in the YC/accelerator ecosystem. The company expanded
      into e-commerce (approximately 21% of the customer mix by 2025), professional services, nonprofits, and creator
      economy businesses. By March 2025, Mercury served over 300,000 businesses across 200+ countries. The $240/year
      Mercury Personal product launched publicly in December 2024 extends the platform to founders and employees
      alongside their business accounts. The YC and accelerator referral network remains the highest-value
      acquisition channel, producing high-NPS, low-churn cohorts. Word of mouth is disclosed as the primary growth
      driver, reflecting strong viral adoption within tech startup communities.

      Within the startup segment, Mercury has particularly strong penetration in the YC ecosystem — Sacra and Contrary
      Research both identify YC-referral as the primary distribution moat that competitors cannot easily replicate.
      The Mercury Perks program (with bundles for Startup Launch, Customer Growth, E-commerce, and Professional
      Services) ties partner software discounts to Mercury account ownership, creating ecosystem stickiness beyond
      core banking. Mercury for Investors provides portfolio-level visibility for venture capitalists, reinforcing the
      VC → portfolio company referral loop. The named customers from Series B — Lunchclub, Mighty, and Linear —
      represent the high-profile startup tier. By 2025, the base had diversified sufficiently that no disclosed segment
      represents more than roughly one-quarter of total accounts, though e-commerce at 21% is the only publicly
      quantified sub-segment.

  - id: S2
    title: Adoption Trajectory and Growth Evidence
    body: >-
      Mercury's customer account growth follows a steep compounding trajectory: 40K+ businesses at Series B
      (June 2021), 200K+ by early 2024 (disclosed in 2024 Annual Letter), and 300K+ by early 2025 as shown on
      the Mercury homepage. Deposit growth mirrors this trajectory: $4B+ in 2021, reaching $17.9B in total
      deposits by mid-2024 ($12.7B excluding FBO deposits). Payment volume grew from $95B in 2023 to $156B in
      2024 — a 64% year-over-year increase. Revenue grew from ~$500M ARR in 2024 to ~$650M by mid-2025.
      Mercury disclosed an industry-leading NPS above 80 (vs. a banking industry average of 34) and stated
      that word of mouth is the primary driver of new signups. The Trustpilot rating of 4.1/5 from 1,620+
      reviews (as of March 2025) confirms broad customer satisfaction, though isolated account freeze complaints
      represent an adverse signal in 1-star reviews.

      Contrary Research and Sacra both note that Mercury's growth trajectory implies significant organic adoption
      velocity. With 200K accounts in early 2024 growing to 300K+ by March 2025, Mercury added approximately
      100K accounts in 14 months — roughly 7,000 new accounts per month — without disclosed paid acquisition
      spending. The deposit trajectory from $4B to $17.9B over four years at a 45% CAGR far outpaces the
      account count growth rate (approximately 70% CAGR), indicating that existing customers are deepening
      their banking relationship over time. This combination of account growth and deposit expansion per account
      provides indirect evidence of strong retention, even absent publicly disclosed churn metrics.

  - id: S3
    title: Retention, Expansion, and Concentration
    body: >-
      Mercury does not publicly disclose churn rates or net revenue retention (NRR). However, deposit growth
      significantly outpacing account growth implies meaningful deposit per account expansion over time — from
      roughly $100K per account in 2021 to ~$60K per account in mid-2024 (reflecting rapid account count growth
      diluting average). The multi-product adoption trajectory — from checking-only to Mercury IO card, Treasury,
      bill pay, and accounting integrations — suggests natural land-and-expand dynamics. Named customers at
      Series B included Lunchclub, Mighty, and Linear; by 2025 the customer base had grown too broadly to rely
      on any single named enterprise customer, reducing concentration risk materially. Mercury ended its
      relationship with Evolve Bank in March 2024 amid the Synapse/Evolve regulatory crisis, proactively
      migrating customers to Column N.A. and Choice Financial Group — a successful retention effort demonstrating
      operational resilience. The Mercury Personal consumer product and Mercury for Investors further diversify
      revenue streams and customer lifetime.

