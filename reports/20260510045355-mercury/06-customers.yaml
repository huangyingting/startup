figures:
  - id: FU001
    title: Mercury Customer Journey Map
    type: journey-map
    layout: standard
    summary: >-
      Six-stage journey mapping how a typical startup founder discovers, signs up for, activates, expands,
      and advocates for Mercury — driving the viral referral loop that powers Mercury's primary acquisition channel.
    data:
      items:
        - label: Discovery
          detail: >-
            Founder encounters Mercury via YC batch network, accelerator recommendation, VC portfolio guidance,
            or word-of-mouth from fellow founders. Mercury's 80+ NPS drives organic referral. Primary channel:
            founder network (company-disclosed as #1 acquisition driver).
        - label: Sign-Up and Onboarding
          detail: >-
            Digital-first account opening in ~10 minutes; no branch visit required. KYC/KYB completed online.
            Mercury's clean UI and fast approval differentiates from legacy bank multi-week onboarding. FDIC
            insurance up to $5M from day one through sweep network partners.
        - label: Core Activation
          detail: >-
            Founder funds checking account, orders debit card, sets up direct deposit and wire instructions.
            Mercury accounting integrations (QuickBooks, Xero) connect automatically. First transactions
            processed within 1–2 business days.
        - label: Product Expansion
          detail: >-
            As company scales, founder adds Mercury Treasury (yield on idle cash), Mercury IO credit card
            (1.5% cashback, no personal guarantee), bill pay automations, invoicing, and expense management.
            Each product adds switching cost and ARPU.
        - label: Employee and Investor Network
          detail: >-
            Finance team joins; multiple user roles configured with RBAC. Mercury for Investors added for VC/board
            visibility. Mercury Personal cross-sold to founders and key employees. Perks bundles activated
            for team tools.
        - label: Advocacy and Referral
          detail: >-
            Satisfied founder recommends Mercury to portfolio companies, YC batchmates, and LinkedIn network.
            Mercury's word-of-mouth engine compounds; 300K+ businesses reached without disclosed paid CAC
            spending at scale.
    approximationNotes: >-
      Journey stages estimated from Mercury product documentation, annual letters, and Sacra analysis.
      Actual conversion rates between stages not publicly disclosed.
    claimRefs: [CU001, CU002, CU004, CU009, CU013]

  - id: FU002
    title: Mercury Adoption Funnel
    type: funnel
    layout: standard
    summary: >-
      Mercury's adoption funnel from total addressable US digital-native businesses through 300K active accounts,
      multi-product adoption, and Mercury Personal expansion.
    data:
      items:
        - label: "US digital-native SMBs (addressable)"
          value: 8000000
          description: >-
            Estimated US SMBs eligible for Mercury based on incorporation type (LLC/C-Corp), digital-first
            operations, and access to business banking. Includes startups, e-commerce, and tech SMBs.
          claimRefs: [CU030]
        - label: "Mercury-aware (startup ecosystem)"
          value: 1500000
          description: >-
            Businesses aware of Mercury via YC/accelerator networks, tech press, VC referrals, and founder communities.
            Estimated based on YC batch sizes, accelerator populations, and tech SMB universe.
          claimRefs: [CU030]
        - label: "Active Mercury business accounts"
          value: 300000
          description: >-
            300,000+ business accounts per Mercury homepage (March 2025). Includes all plan tiers and account ages.
            No active vs. dormant breakdown disclosed.
          claimRefs: [CU001]
        - label: "Multi-product users (est.)"
          value: 90000
          description: >-
            Estimated 30% of accounts use 2+ Mercury products (IO card, Treasury, bill pay, accounting). Based on
            Sacra analysis of revenue expansion and Mercury 2024 Annual Letter product launch emphasis.
          claimRefs: [CU003, CU013]
        - label: "Mercury Personal (early access)"
          value: 15000
          description: >-
            Mercury Personal launched December 2024 for public; waitlist-based prior. Estimated early adopters
            based on $240/year pricing and disclosure of slow rollout.
          claimRefs: [CU005, CU031]
    approximationNotes: >-
      Funnel values estimated from Mercury public disclosures and analyst estimates. No official conversion
      rate or cohort data provided. Multi-product and Personal counts are estimates.
    claimRefs: [CU001, CU003, CU005, CU030]

