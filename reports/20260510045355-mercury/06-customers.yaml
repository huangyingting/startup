  evidenceGaps:
    - type: missing-source
      severity: critical
      topic: retention-metrics
      missingEvidence: "Mercury does not disclose churn rate, NRR, GRR, or cohort-level retention by vintage or product. Without these metrics, account growth claims cannot be assessed for quality — rapid new account openings could be masking elevated churn."
      whyItMatters: "Retention data is the primary quality signal for a banking platform's value proposition; opacity prevents diligence conclusion."
      diligencePath: "Request from data room: monthly account churn by cohort (2020–2025), NRR/GRR by segment, median account tenure, and deposit retention by vintage."
      relatedQuestionRefs: [QU015, QU016]

    - type: missing-source
      severity: critical
      topic: named-customer-proof
      relatedTableRefs: [TU003]
      missingEvidence: "Mercury has no published customer case study library with quantified outcomes. The only named customers are three startups cited in the 2021 Series B blog (Lunchclub, Mighty, Linear) with no outcome metrics."
      whyItMatters: "Without named production customers with measurable outcomes, the quality of Mercury's customer relationships relative to Brex/Ramp cannot be independently assessed."
      diligencePath: "Request customer reference list with willingness to participate in calls; request at least 5 named customer case studies with outcome metrics."
      relatedQuestionRefs: [QU006, QU007]

    - type: missing-source
      severity: major
      topic: NPS-verification
      missingEvidence: "Mercury's 80+ NPS claim is company-disclosed without independent audit, sampling methodology, or trend data by quarter. Banking NPS can be gamed by sampling from recent account openers."
      whyItMatters: "NPS is a key differentiator claim; unverified NPS is weak diligence evidence."
      diligencePath: "Request NPS methodology, sample size, timing, and quarterly trend from data room; consider commissioning independent customer survey."
      relatedQuestionRefs: [QU011]

    - type: missing-source
      severity: major
      topic: CAC-payback
      missingEvidence: "Mercury's customer acquisition cost (CAC) and payback period are not disclosed. Word-of-mouth claim suggests low CAC, but no metric substantiates this."
      whyItMatters: "CAC/LTV ratio is fundamental to business model quality; cannot be assessed without disclosure."
      diligencePath: "Request CAC by channel, payback period, and LTV/CAC ratio from data room."
      relatedQuestionRefs: [QU026]

    - type: missing-source
      severity: major
      topic: active-account-rate
      missingEvidence: "Mercury reports 300K+ total accounts but does not disclose what % are actively transacting (e.g., >$1K/month in transactions). Dormant accounts would inflate headline count."
      whyItMatters: "Active account rate determines whether the 300K headline is economically meaningful."
      diligencePath: "Request active account definition, active account count, and monthly active transaction threshold from data room."
      relatedQuestionRefs: [QU027]

    - type: missing-source
      severity: minor
      topic: revenue-mix
      missingEvidence: "Mercury does not disclose the breakdown of revenue between NIM, interchange, and subscription products, making it difficult to assess the sustainability and scalability of each revenue stream."
      whyItMatters: "Revenue mix determines exposure to interest rate risk vs. payment volume risk."
      diligencePath: "Request revenue breakdown by type (NIM, interchange, subscription) from data room; cross-check with deposit and payment volume growth rates."
      relatedQuestionRefs: [QU029]

    - type: missing-source
      severity: minor
      topic: outage-history
      missingEvidence: "No public record of Mercury system outages, downtime events, or customer-facing service disruptions is available."
      whyItMatters: "Service reliability is critical for a banking platform; undisclosed outages could represent reputational and retention risk."
      diligencePath: "Review Mercury status page history; request SLA and incident report history from data room."
      relatedQuestionRefs: [QU030]
