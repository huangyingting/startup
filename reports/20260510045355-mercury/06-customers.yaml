callouts:
  - id: KU001
    type: highlight
    title: 300K+ Businesses Served with 80+ NPS
    body: >-
      Mercury has scaled to 300,000+ business accounts by March 2025, processing $156B in payments annually,
      while maintaining an industry-leading NPS above 80. This combination — scale and satisfaction — is rare
      in business banking and represents a formidable organic growth flywheel.
    claimRefs: [CU001, CU007, CU008]

  - id: KU002
    type: risk
    title: Retention Data Opacity Is a Diligence Gap
    body: >-
      Mercury discloses no churn rate, NRR, GRR, or cohort-level retention data. Startup customer base
      creates a natural ~10% annual churn floor from company failures. Without retention verification,
      growth claims cannot be disentangled from new account openings masking elevated churn.
    claimRefs: [CU016, CU021, CU022]

  - id: KU003
    type: risk
    title: "Adverse: Evolve Bank Exit Disrupted Customer Trust"
    body: >-
      Mercury's March 2024 exit from Evolve Bank — driven by Evolve's FDIC consent order and the Synapse
      bankruptcy crisis — exposed customers to short-term uncertainty. While Mercury successfully migrated
      accounts to Column N.A. and Choice Financial Group, the event demonstrated the systemic risk of
      reliance on partner banks for underlying banking infrastructure.
    claimRefs: [CU017, CU018, CU025]

