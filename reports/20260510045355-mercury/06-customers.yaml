      and industry benchmarks for digital neobanks. Actual cohort data not publicly disclosed. Startup failure
      rate (~10% per year) establishes a natural churn floor for the startup-heavy customer base. Multi-product
      users estimated to retain at significantly higher rates than single-product users.
