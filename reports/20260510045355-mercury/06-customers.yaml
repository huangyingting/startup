    approximationNotes: >-
      Scores on 1–5 scale: 1=no evidence, 2=weak/anecdotal, 3=adequate, 4=strong, 5=excellent.
      Production maturity is high for business accounts given 300K+ active customers and $156B annual volume.
      Named reference quality is low across all segments — Mercury has no published case study library.
      Retention visibility is universally low — churn, NRR, and GRR not publicly disclosed.
    claimRefs: [CU001, CU006, CU008, CU009, CU012]

