      sourceRefs: [SP011]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP007]

    - id: CP008
      statement: "Brex requires VC or institutional backing for most of its accounts and corporate card products, explicitly targeting Series A+ funded companies. This eligibility requirement creates a structural segmentation where pre-seed, bootstrapped, and non-VC-backed businesses are directed to Mercury or other competitors."
      type: observed
      topic: competitor-brex-positioning
      sourceRefs: [SP007, SP008, SP020]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP010]

    - id: CP009
      statement: "Ramp is a spend-management-first platform, not a primary deposit bank. Many startup founders use Ramp alongside Mercury—Mercury for FDIC-insured deposits and wire transfers, Ramp for expense automation and corporate card spend controls—making the two platforms largely complementary rather than directly substitutive."
      type: third-party-reported
      topic: competitor-ramp-positioning
      sourceRefs: [SP003, SP004, SP021]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP003, QP011, QP020]

    - id: CP010
      statement: "JPMorgan Chase ranked #1 in digital channels and treasury management for small and midsize businesses in the 2025 Coalition Greenwich Digital Transformation Study, reflecting major incumbent investment in digital SMB banking capabilities including Chase Connect, AI analytics, and integrated payroll via Gusto."
      type: observed
      topic: incumbent-competitive-response
      sourceRefs: [SP010, SP018]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP012]

    - id: CP011
      statement: "Mercury's core pricing is fully fee-free: no monthly maintenance fees, no minimum balance, no overdraft fees, free domestic and international USD wire transfers, unlimited domestic ATM fee refunds, and a 1.5% cashback IO charge card with no annual fee. A 1% FX fee applies to non-USD international wires. Cash deposits are not supported."
      type: observed
      topic: mercury-pricing
      sourceRefs: [SP006, SP022, SP023]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP008, QP023]

    - id: CP012
      statement: "Brex offers an Essentials plan ($0/user/month) with basic card, expense management, bill pay, and API access; and a Premium plan ($12/user/month) adding custom expense policies, multi-entity support, and advanced ERP integrations. Brex's corporate card rewards reach up to 7x on rideshare, 4x on travel, and 3x on restaurants."
      type: observed
      topic: competitor-brex-pricing
      sourceRefs: [SP020, SP012, SP008]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP008]

    - id: CP013
      statement: "Mercury's NPS score is 75, compared to a banking industry average of 34, indicating significantly above-average customer loyalty. Third-party review scores: 4.5/5 on G2 (121 reviews), 4.5/5 on NerdWallet, and 4.0/5 on Trustpilot (2,487 reviews as of March 2026)."
      type: third-party-reported
      topic: mercury-customer-satisfaction
      sourceRefs: [SP006, SP016, SP009]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP009]

    - id: CP014
      statement: "Mercury's switching costs are described as low-to-moderate for customers using only core banking (checking, wires); switching costs increase materially for customers embedded in Mercury's bill pay, treasury vault, corporate card integrations, and accounting software connections (QuickBooks, Stripe, etc.)."
