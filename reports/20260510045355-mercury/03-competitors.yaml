      statement: "Bluevine has served 500,000+ business owners since inception, with 210,000+ active business checking accounts as of 2025, approximately $268 million in estimated 2025 revenue, $14 billion in cumulative SMB loans funded, and $288 million in total equity raised."
      type: third-party-reported
