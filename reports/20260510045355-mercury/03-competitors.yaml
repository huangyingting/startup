      statement: "Brex has intentionally shifted its product strategy toward mid-market and enterprise customers since approximately 2022, reducing focus on early-stage startups. This strategic pivot vacated significant early-stage market share that Mercury has captured, and is reflected in Brex's account eligibility requirements and Premium pricing tier."
