  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Mercury formal SAM estimate and segment-level market sizing"
      missingEvidence: "No independent research firm has published a formal SAM estimate for digitally-native US SMBs willing to switch to neobanks. All published estimates span US neobanking broadly (including consumer accounts) or global neobanking, making precise Mercury-specific SAM estimation impossible from public sources."
      whyItMatters: "Without a formal SAM, valuation models depend on bottom-up proxies from Mercury's growth trajectory, which may understate or overstate the addressable opportunity depending on digital adoption rate."
      diligencePath: "Commission a primary market sizing study or obtain Mercury's internal TAM/SAM estimates during investor diligence. Cross-reference with FDIC small business banking deposit statistics."
      relatedQuestionRefs: [QM020]

    - type: missing-source
      severity: material
      topic: "Mercury revenue mix diversification (NIM vs. SaaS fees vs. interchange)"
      missingEvidence: "Mercury has not publicly disclosed the precise breakdown between NIM on deposits, interchange income, venture debt interest, and SaaS/subscription fees from workflow tools. Sacra notes diversification is underway but does not provide specific percentages."
      whyItMatters: "Revenue mix determines valuation multiple: if >90% NIM-dependent, a banking multiple (1-2x revenue) applies; if SaaS fees grow to 20-30%, a higher software multiple may be justified, materially changing the investment thesis."
      diligencePath: "Request revenue segmentation (NIM, interchange, SaaS fees, venture debt interest) in investor diligence; model rate-cut sensitivity scenarios."
      relatedQuestionRefs: [QM021]

    - type: missing-source
      severity: material
      topic: "Mercury customer acquisition cost (CAC) and channel mix"
      missingEvidence: "Mercury has not disclosed CAC, customer acquisition channel attribution, or the relative contribution of organic word-of-mouth, YC/accelerator partnerships, paid marketing, and referral programs to new customer growth."
      whyItMatters: "CAC and the LTV/CAC ratio determine unit economics health. If Mercury begins spending on paid acquisition as it moves beyond the startup cohort, margins may compress significantly."
      diligencePath: "Request cohort-level CAC and LTV data; break down customer acquisition channels by segment (startup vs. e-commerce vs. SMB)."
      relatedQuestionRefs: [QM022]

    - type: missing-source
      severity: material
      topic: "Multi-homing rate and primary bank exclusivity among Mercury customers"
      missingEvidence: "No public source discloses the percentage of Mercury's 200,000+ customers using Mercury as their sole primary bank vs. maintaining accounts at a legacy bank simultaneously."
