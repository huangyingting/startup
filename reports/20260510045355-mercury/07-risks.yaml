  evidenceGaps:
    - type: missing-source
      severity: material
      topic: OCC-charter-denial-scenario
      missingEvidence: >-
        Mercury has not disclosed what alternative business model or regulatory strategy it would pursue if the OCC
        charter application is denied. No public contingency plan exists for an indefinite BaaS dependency.
      whyItMatters: >-
        Charter denial is the primary tail risk; without a contingency plan investors cannot assess BaaS sustainability
        or underwrite the thesis in a denial scenario.
      diligencePath: >-
        Request from management: contingency plan for OCC denial including alternative charter paths (state charter,
        industrial bank), BaaS model enhancements, and capital implications.
      relatedQuestionRefs:
        - QR010
      relatedTableRefs:
        - TR001
    - type: missing-source
      severity: material
      topic: OCC-charter-timeline
      missingEvidence: >-
        The specific timeline and interim milestones for Mercury's OCC charter review are not publicly available; OCC
        does not provide public progress updates on pending applications.
      whyItMatters: >-
        The 18-36 month typical approval window creates multi-year uncertainty; investors need milestone markers to
        assess application progress and manage exposure.
      diligencePath: >-
        Request from management: OCC submission confirmation, preliminary approval milestones, and estimated review
        schedule from OCC correspondence.
      relatedQuestionRefs:
        - QR031
      relatedTableRefs:
        - TR001
    - type: private-evidence-only
      severity: material
      topic: Choice-Financial-consent-terms
      missingEvidence: >-
        Choice Financial's FDIC consent order full terms, required remediation steps, and resolution timeline are not
        publicly available as the FDIC has not published the full consent order text.
      whyItMatters: >-
        Without the consent order terms, investors cannot assess probability of escalation to license revocation or the
        expected resolution timeline and Mercury's exposure window.
      diligencePath: >-
        Submit FDIC FOIA request for Choice Financial consent order terms; confirm Mercury's exit plan and timeline from
        Choice Financial dependency.
      relatedQuestionRefs:
        - QR003
      relatedTableRefs:
        - TR001
        - TR003
    - type: missing-source
      severity: material
      topic: NIM-rate-sensitivity
      missingEvidence: >-
        Mercury has not disclosed its actual NIM margins, deposit repricing schedules, or precise sensitivity to rate
        changes. Analyst estimates of 60-75% NIM share are modeled from external data, not disclosed.
      whyItMatters: >-
        NIM sensitivity is the primary financial risk category; without disclosed margin data investors cannot precisely
        model revenue impact of a sustained rate cut cycle.
      diligencePath: >-
        Request from data room: NIM by deposit category, deposit repricing schedule, and revenue sensitivity analysis
        for 50, 100, and 150 basis point rate cut scenarios.
      relatedQuestionRefs:
        - QR028
      relatedTableRefs: []
    - type: missing-source
      severity: minor
      topic: BSA-AML-program-metrics
      missingEvidence: >-
        Mercury has not publicly disclosed BSA/AML program metrics including SAR filing rates, compliance staffing
        levels relative to transaction volume, or AML model performance statistics.
      whyItMatters: >-
        Inadequate AML controls at Mercury's $248B transaction volume could result in FinCEN enforcement action; program
        quality cannot be assessed externally without metrics.
      diligencePath: >-
        Request from management: BSA officer credentials and tenure, annual AML program review findings, SAR filing
        statistics, and compliance team headcount relative to transaction volume growth.
      relatedQuestionRefs:
        - QR011
      relatedTableRefs:
        - TR004
