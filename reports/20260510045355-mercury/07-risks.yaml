  letter: R
  title: Risks
  mission: >-
    Rank legal, regulatory, operational, technical, financial, partner, customer, and execution risks with mitigations
    and kill criteria relevant to Mercury's bank charter transition and BaaS-dependent model.
  summary: >-
    Mercury's risk profile is dominated by four interlocking categories: regulatory dependency on partner banks (Choice
    Financial Group's active FDIC consent order; Column N.A. as secondary partner), the multi-year uncertainty of OCC
    national bank charter approval (filed December 2024), net interest margin compression from Fed rate cycles (60-75%
    of ~$650M annualized revenue is rate-sensitive), and operational fragility from BaaS-model account freeze disputes.
    The Synapse bankruptcy (2024) set a precedent for BaaS instability that heightens regulator and counterparty
    scrutiny. Mercury's $300M Series C (March 2025) provides capital runway, and its multi-partner strategy (Choice +
    Column N.A.) reduces single-point-of-failure risk, but no owned bank charter means the core dependency risk remains.
    Kill triggers include: Choice Financial license revocation, OCC charter denial, or a Fed rate cut cycle exceeding
    150bps cumulative.
