  - id: TR005
    title: Mitigation and Kill Criteria
    description: Monitorable triggers and threshold events that should prompt investor action or thesis reassessment.
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold or Event
      - Action Implication
    rows:
      - - OCC charter denial
        - OCC application status communications; FDIC application decisions
        - Formal denial letter or voluntary withdrawal of charter application
        - Reassess BaaS model long-term sustainability; model NIM and regulatory risk without charter path
      - - Choice Financial license revocation
        - FDIC enforcement docket updates; Choice Financial public disclosures
        - License suspension or revocation by FDIC regulatory action
        - Immediate customer communication required; emergency migration to Column N.A.; assess Mercury capacity
      - - Fed funds rate cut cycle
        - FOMC rate decisions and Federal Reserve dot plot projections
        - Cumulative rate cuts exceeding 150 basis points from 2024 peak levels
        - Model NIM compression impact on $650M revenue base; assess fee revenue diversification progress
      - - Major data breach or security incident
        - SOC 2 audit findings; state and SEC breach notification filings; security press coverage
        - Any Tier 1 breach involving customer personally identifiable or financial data
        - >-
          Regulatory notification obligations triggered; customer remediation program required; assess reputational
          damage
      - - Deposit run — startup sector downturn
        - Monthly AUM growth rate; venture capital funding data from PitchBook or Crunchbase
        - Three consecutive months of net deposit outflow exceeding 5 percent of total deposits
        - Assess deposit concentration risk; evaluate geographic and sector diversification strategy
      - - Fraud loss spike
        - Monthly fraud loss rate relative to transaction volume; AML escalation reports
        - Fraud losses exceeding 0.5 percent of monthly transaction volume for two consecutive months
        - Trigger review of AML and fraud detection models; consider product restrictions for elevated-risk segments
    enumerationScope:
      coverage: partial
