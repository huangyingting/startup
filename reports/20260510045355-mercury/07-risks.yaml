callouts:
  - id: CA001
    calloutType: risk
    title: Choice Financial FDIC Consent Order Is the Highest-Priority Active Risk
    body: >-
      Choice Financial Group — Mercury's primary banking partner — received an FDIC consent order in 2024. An escalation
      to license suspension or revocation would require Mercury to execute an emergency migration of its primary deposit
      base to Column N.A., a bank untested at Mercury's ~$17.9B scale. This is the single most consequential near-term
      risk and warrants a dedicated diligence inquiry into Mercury's migration readiness and the consent order
      resolution timeline.
    claimRefs:
      - CR005
      - CR027
      - CR031
      - CR032
  - id: CA002
    calloutType: risk
    title: OCC Charter Denial Would Permanently Lock In BaaS Dependency
    body: >-
      Mercury's OCC national bank charter application filed in December 2024 is the primary mechanism for escaping
      BaaS-model regulatory dependency. If denied, Mercury would have no clear alternative path to becoming a fully
      licensed bank, and the Synapse-era regulatory climate makes BaaS operations increasingly scrutinized. A denial
      event should be treated as a thesis-break trigger requiring immediate re-underwriting of the business model
      sustainability and competitive positioning.
    claimRefs:
      - CR001
      - CR003
      - CR013
      - CR023
  - id: CA003
    calloutType: insight
    title: NIM Sensitivity Requires Rate-Cut Scenario Modeling Before Underwriting
    body: >-
      With an estimated 60 to 75 percent of Mercury's approximately $650M annualized revenue driven by net interest
      margin, a sustained Fed rate cut cycle would directly compress the largest revenue line. Mercury's 2025 revenue
      deceleration from 97% to 41% YoY growth already demonstrates this sensitivity in real terms. Investors should
      model a 150bps cumulative rate cut scenario and assess whether interchange, SaaS subscription, and Venture Debt
      revenue can offset NIM compression before underwriting at the current $3.5B valuation.
    claimRefs:
      - CR007
      - CR009
      - CR022
      - CR028
      - CR029
