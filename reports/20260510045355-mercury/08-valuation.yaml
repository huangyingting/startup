        - >-
          Management data room: OCC correspondence, submission confirmation, regulatory affairs team contacts; OCC
          public application search portal for confirmation of filing
        - Pre-closing critical
      - - Actual NIM margins and deposit rate sensitivity
        - >-
          Mercury's disclosed NIM by deposit category, deposit repricing schedule, and revenue sensitivity to 50, 100,
          and 150 basis point rate cut scenarios. Analyst estimates (60–75% NIM) are modeled externally, not disclosed.
        - >-
          NIM concentration is the primary financial risk; without disclosed sensitivity data investors cannot precisely
          model downside scenarios or assess whether Mercury's profitability threshold is above or below key rate levels
        - >-
          Management data room: NIM decomposition by product, deposit repricing schedule, and rate sensitivity analysis;
          request board-approved financial model
        - Pre-closing critical
      - - Choice Financial FDIC consent order full terms
        - >-
          Full consent order text, required remediation milestones, and expected resolution timeline for Choice
          Financial. FDIC has not published the complete consent order publicly; partial terms only disclosed in press
          reports.
        - >-
          Investors cannot assess escalation probability (license suspension/revocation) without understanding the
          specific violations and remediation requirements; this is the single most acute near-term tail risk
        - >-
          FDIC FOIA request for Choice Financial consent order; direct management inquiry about Mercury's exit timeline
          from Choice dependency; request Mercury's contingency migration plan documentation
        - Pre-closing critical
      - - Cap table, preference overhang, and liquidation waterfall
        - >-
          Full cap table showing Sequoia, a16z, and Coatue preference stack from Series C plus all prior rounds;
          liquidation waterfall analysis showing common equity value at various exit prices.
        - >-
          At $3.5B Series C entry, preference overhang from $500M total raised could reduce common equity value in a
          below-valuation exit scenario; investors need to understand their position in the waterfall
        - Standard due diligence data room request; legal counsel review of investment documents and preference terms
        - Pre-closing important
      - - Mercury Personal traction and consumer banking metrics
        - >-
          User acquisition rate, deposit volume, and engagement metrics for Mercury Personal since its launch. Mercury
          announced the consumer banking product in 2025 but has not disclosed performance metrics.
        - >-
          Consumer banking expansion is a key driver of the bull case ($9–12B); without traction data investors cannot
          assign probability to the bull case or assess whether Mercury Personal cannibalizes startup account
          acquisition
        - >-
          Management data room: Mercury Personal account count, deposits, and retention metrics; request 90-day cohort
          data to assess early traction signal
        - Post-closing monitoring
      - - Regulatory capital requirement for bank charter
        - >-
          The capital Mercury would be required to hold under OCC/FDIC requirements as a de novo national bank. OCC de
          novo bank capital requirements are publicly documented but the specific amount for Mercury's business plan is
          not publicly known.
        - >-
          Capital requirements could consume a substantial portion of Mercury's $300M Series C proceeds; if additional
          capital is needed for charter compliance, dilution risk increases for existing investors
        - >-
          OCC de novo bank charter guidelines; request Mercury's regulatory capital projections from management; assess
          remaining Series C runway after capital allocation
        - Post-closing monitoring
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks derived from Mercury public disclosures, OCC charter application process, FDIC regulatory
        framework, Sacra financial analysis, and comparable digital bank diligence frameworks as of May 2026.
