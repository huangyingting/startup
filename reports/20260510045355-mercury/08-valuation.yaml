  - id: S3
    title: Scenario Analysis — Bull, Base, and Bear Cases
    body: |-
      The bull case requires three conditions to converge: OCC charter approval by mid-2026, sustained revenue growth
      above 40 percent annually, and successful expansion into consumer banking through Mercury Personal. If Mercury
      obtains its charter and transitions to a licensed bank model, the NIM capture rate improves by approximately
      100–150 basis points as partner bank fees are eliminated. Revenue could reach $1.0–1.2 billion by end of 2026,
      and a 10–12x ARR multiple would be defensible relative to Nubank at 17x and Chime at 17x peak. Bull case
      valuation range is $9–12 billion. The key driver is charter approval speed: every six months of delay reduces
      the bull case upside by approximately 20 percent as competitors like Brex and Ramp continue to scale.

      The base case assumes the OCC charter remains pending through 2026 with approval in 2027, revenue grows at 30
      percent annually from $650 million (reaching approximately $845 million by end of 2025), and NIM is supported
      by a stable Fed funds rate. In this scenario, Mercury maintains its BaaS model, continues to generate profit,
      and trades at a 5–6x forward ARR multiple. Fair value range is $3.0–4.0 billion. The current $3.5 billion
      Series C entry price sits in the middle of this range, confirming a fair but not cheap entry. Base case
      probability is estimated at 55 percent, reflecting the likelihood that the charter takes longer than expected
      but is ultimately approved without triggering a denial or major partner bank disruption.

      The bear case assumes one of three adverse outcomes: OCC charter denial or indefinite delay, a 150+ basis point
      Fed rate cut cycle compressing NIM by 25–30 percent, or escalation of Choice Financial's FDIC consent order
      requiring a forced deposit migration. In any of these scenarios, revenue growth decelerates to 10–15 percent
      and the ARR multiple compresses to 2–3x. Bear case valuation range is $1.3–2.0 billion, representing a 43–63
      percent downside from the Series C entry price. Bear case probability is estimated at 20 percent, reflecting
      that charter denial, severe NIM compression, and partner bank failure are individually unlikely but have
      non-trivial tail probabilities that must be explicitly priced. The remaining 25 percent probability weight
      sits in an upside-skewed middle scenario between the base and bull cases.
