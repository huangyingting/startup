        - >-
          Regulatory notification obligations triggered; customer remediation costs; churn risk in startup community
          where reputation is primary growth driver; potential FDIC/OCC scrutiny of Mercury's application viability
        - Assess breach scope; request SOC 2 audit findings; monitor regulatory response before making position decision
        - SEC breach notifications; state AG announcements; Mercury disclosures
