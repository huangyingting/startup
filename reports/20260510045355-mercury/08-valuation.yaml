          Eliminates the 2–3x multiple re-rating upside; forces permanent BaaS dependency; reduces IPO valuation to
          fintech rather than licensed-bank comp set; probability-weighted valuation drops from $3.0–4.0B to $1.8–2.5B
        - >-
          Downgrade to track; model BaaS-only steady-state valuation; reassess if Mercury secures alternative charter
          path
        - OCC public dockets; OCC application search portal; Mercury press releases
      - - Fed funds rate cut cycle exceeding 150bps cumulative
        - Federal Reserve reduces target rate by cumulative 150+ basis points from 2024 peak levels
        - >-
          NIM revenue compressed by estimated 25–35% on $17.9B deposit base; revenue could fall to $420–490M;
          profitability at risk; multiple compresses further on lower revenue base; downside scenario probability
          increases to 35–40%
        - >-
          Reassess revenue model; verify Mercury's NIM hedging; downgrade to track if no disclosed fee revenue
          diversification
        - FOMC meeting statements; Federal Reserve dot plot; Mercury quarterly disclosures
      - - Choice Financial license revocation or suspension
        - FDIC enforcement action escalating Choice Financial consent order to license suspension or revocation
        - >-
          Forces emergency deposit migration from Mercury's primary partner; disrupts $17.9B in customer deposits;
          creates regulatory scrutiny of Mercury itself; customer trust damage in tight-knit startup community
        - Move to avoid until migration completed and customer impact assessed; emergency due diligence required
        - FDIC enforcement dockets; Banking Dive; Reuters fintech reporting
      - - Mercury profitability loss
        - Two consecutive quarters of GAAP operating losses after achieving profitability in early 2024
        - >-
          Undermines the core thesis that Mercury can be profitable at scale without a bank charter; reduces IPO
          viability; may require additional capital raise at dilutive valuation; downward pressure on ARR multiple
        - Downgrade to track; request management explanation of cost drivers; assess path back to profitability
        - Mercury annual letter; Sacra quarterly estimates; Bloomberg fintech coverage
      - - Major data breach or security incident
