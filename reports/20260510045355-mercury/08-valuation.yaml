        - label: Competitive Moat
          value: 3 / 5
          unit: null
          note: Strong NPS and switching cost moat; BaaS model creates product parity risk vs chartered competitors
        - label: Unit Economics
          value: 3 / 5
          unit: null
          note: Profitable at $650M ARR; NIM concentration and undisclosed margins limit precision; 5.4x ARR entry fair
        - label: Risk Profile
          value: 2 / 5
          unit: null
          note: >-
