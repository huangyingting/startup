        - label: Composite Score
          value: 3.1 / 5
          unit: null
          note: Weighted average across seven dimensions; supports buy with high-risk sizing discipline
    approximationNotes: >-
      Scores are analyst estimates on a 1–5 scale based on public evidence as of May 2026. Not Mercury-disclosed or
