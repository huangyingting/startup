      missingEvidence: >-
        Mercury has not publicly disclosed its actual NIM margins by deposit category, deposit repricing schedules, or
        revenue sensitivity to specific rate change scenarios. The 60–75% NIM revenue share is an analyst estimate from
        Sacra, not a Mercury-disclosed figure.
      whyItMatters: >-
        NIM concentration is the primary financial risk and bear case driver; without disclosed margins investors cannot
        model the revenue impact of Fed rate cuts or assess whether Mercury's profitability survives a 150bps+ rate cut
        cycle.
      diligencePath: >-
        Request board-approved financial model from Mercury data room including NIM decomposition, deposit repricing
        schedule, and rate sensitivity analysis for 50, 100, and 150bps scenarios.
      relatedQuestionRefs:
        - QV038
        - QV033
      relatedTableRefs:
        - TV003
    - type: private-evidence-only
      severity: material
      topic: Choice-Financial-consent-order-terms
      missingEvidence: >-
        The full terms of Choice Financial Group's FDIC consent order, specific violations cited, required remediation
        steps, and expected resolution timeline are not publicly available.
      whyItMatters: >-
        Without the consent order terms, investors cannot assess the probability that the consent order escalates to
        license suspension or revocation, which is the most acute near-term tail risk for Mercury's $17.9B deposit base.
      diligencePath: >-
        Submit FDIC FOIA request for Choice Financial consent order full text; request Mercury's exit timeline and
        contingency migration plan from management; confirm Column N.A. capacity to absorb Mercury's deposit volume.
      relatedQuestionRefs:
        - QV039
      relatedTableRefs:
        - TV005
    - type: missing-source
      severity: material
      topic: cap-table-preference-stack
      missingEvidence: >-
        Mercury's full cap table showing the Sequoia, a16z, and Coatue preference stack from the Series C and all prior
        rounds is not publicly available. The liquidation waterfall analysis showing common equity value at various exit
        prices has not been disclosed.
      whyItMatters: >-
        At a $3.5B Series C entry, preference overhang from $500M+ total raised could materially reduce common equity
        value in a below-valuation exit scenario; investors need to understand their position in the waterfall.
      diligencePath: >-
        Standard due diligence data room request for cap table and investment documents; legal counsel review of
        liquidation preference terms and anti-dilution provisions.
      relatedQuestionRefs:
        - QV043
      relatedTableRefs:
        - TV006
    - type: missing-source
      severity: minor
      topic: mercury-personal-traction
      missingEvidence: >-
        Mercury Personal (consumer banking product launched 2024) has not disclosed user counts, deposit volumes, or
        revenue contribution publicly. No third-party analysis quantifies its market penetration or competitive traction
        against Chime, SoFi, and established consumer banking players.
      whyItMatters: >-
        Mercury Personal's success or failure is material to the licensed-bank optionality scenario; if it gains
        traction it supports a higher charter probability and expands the TAM; if it stalls it confirms the SMB-only
        thesis and reduces the valuation ceiling.
      diligencePath: >-
        Request Mercury management update on Mercury Personal KPIs including MAU, deposit volume, and revenue
        contribution; request product roadmap and charter-readiness milestones specifically for consumer segment.
      relatedQuestionRefs:
        - QV044
      relatedTableRefs:
        - TV006
    - type: enumeration-incomplete
      severity: minor
      topic: comparable-set-coverage
      missingEvidence: >-
        The TV004 comparable valuation table covers the most relevant public and private comps but excludes smaller BaaS
        fintech platforms, international digital bank comps, and M&A transaction multiples that could inform the
        acquisition exit scenario.
      whyItMatters: >-
        A more complete comparable set could shift the valuation range modestly in either direction; the current set is
        sufficient for base and bull case analysis but leaves the M&A acquisition scenario less precisely benchmarked.
      diligencePath: >-
        PitchBook or CB Insights BaaS and digital bank M&A transaction database; Dealogic fintech M&A multiples for
        2022–2025 transactions involving non-bank fintechs with bank charter applications.
      relatedQuestionRefs:
        - QV046
      relatedTableRefs:
        - TV004
