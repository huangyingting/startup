    title: Recommendation Summary
    description: >-
      One-line summary of the investment recommendation, confidence level, risk rating, valuation stance, and decision
      implication for Mercury at the March 2025 Series C entry price.
    columns:
      - Dimension
      - Assessment
      - Supporting Rationale
      - Key Condition
      - Decision Implication
    rows:
      - - Recommendation
        - Buy
        - 5.4x ARR multiple is fair for a profitable digital bank with 30–40% growth; charter optionality is unpriced
        - OCC charter timeline 18–36 months; profitable operations maintained
        - >-
          Enter at current $3.5B valuation with a 12–24 month hold minimum; size position appropriately for high risk
          rating
      - - Confidence
        - Medium
        - Profitability and customer metrics are well-documented; charter outcome and NIM trajectory remain unresolved
        - OCC charter approval/denial creates binary valuation outcome
        - Do not over-allocate; reserve capital for follow-on if charter approved
      - - Risk Rating
        - High
        - BaaS dependency, NIM concentration, partner bank consent order, charter uncertainty all active simultaneously
        - No single risk is certain, but combination creates high-severity tail exposure
        - Require board representation or information rights; monitor FDIC enforcement docket monthly
      - - Valuation Stance
        - Fair
        - 5.4x ARR is below fintech-SaaS (22–24x) and in-line with licensed digital bank comps (5–7x)
        - Charter approval would re-rate toward 10–15x; denial would compress to 2–3x
        - Do not pay above $4.0B without OCC charter approval; strong-buy threshold is $2.5B or below
      - - Decision Implication
        - Buy / High-Risk
        - Base case IRR of 15–25% over 3–4 years; bull case IRR of 40–60% if charter approved by 2026
        - Bear case implies 43–63% capital loss from current entry; position sizing must reflect this
        - Invest with explicit bear case awareness; set thesis-break triggers per TV005
