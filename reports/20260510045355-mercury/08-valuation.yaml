      Urgency classifications reflect impact on pre-closing investment decision. Post-closing items should be
      incorporated into monitoring agreements and board reporting requirements.
figures:
  - id: FV001
    title: Mercury Recommendation Logic Flow
    type: flow
    layout: standard
    summary: >-
      Chain from Mercury's scale, profitability proof, risk factors, and valuation to the final buy recommendation with
      medium confidence and high risk rating. Each node represents an evidentiary pillar or risk gate; edges show how
      the investment logic flows from inputs to recommendation.
    data:
      nodes:
        - id: n1
          label: Scale Proof
          detail: 300K business accounts, $17.9B deposits, $650M ARR, $156B payment volume; all growing at 30–64% annually
        - id: n2
          label: Profitability Proof
          detail: Profitable since early 2024; 10+ consecutive profitable quarters; NPS 80+ vs 34 industry average
        - id: n3
          label: OCC Charter Catalyst
          detail: Application filed December 2024; approval creates licensed-bank multiple re-rating from 5x to 10–15x ARR
        - id: n4
          label: NIM Risk
          detail: 60–75% revenue is NIM-dependent; 150bps+ Fed rate cut cycle compresses revenue by 25–35%
        - id: n5
          label: Partner Bank Risk
          detail: Choice Financial FDIC consent order active; forced migration risk for $17.9B deposits; Column N.A. untested
        - id: n6
          label: Valuation Check
          detail: 5.4x ARR multiple vs 22–24x fintech-SaaS; in-line with licensed digital bank comps at 5–7x; fair not cheap
        - id: n7
          label: Recommendation
          detail: >-
            BUY — Medium Confidence — High Risk — Fair Valuation; entry at $3.5B with charter optionality; size for high
            risk and reserve capital for follow-on
      edges:
        - from: n1
          to: n6
          label: Supports fair value
        - from: n2
          to: n6
          label: Validates business model
        - from: n3
          to: n7
