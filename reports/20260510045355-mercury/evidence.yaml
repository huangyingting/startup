evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: Audited financial statements and GAAP income statement detail
    missingEvidence: >-
      Mercury has not publicly filed audited financial statements. Revenue ($500M), profitability, and margin details
      are company-disclosed, unaudited figures shared in fundraise context.
    whyItMatters: >-
      Without audited financials, investors cannot verify revenue recognition methodology, cost structure, actual GAAP
      margins, or intercompany accounting with partner banks.
    diligencePath: >-
      Request audited annual financial statements (2022-2024) and trailing quarterly P&L from Mercury as part of formal
      data room diligence.
    relatedQuestionRefs:
      - QO022
  - type: missing-source
    severity: material
    topic: Direct regulatory enforcement against Mercury (not partner banks)
    missingEvidence: >-
      No public evidence of formal regulatory enforcement against Mercury itself, distinct from its partner banks Evolve
      and Choice. Absence of evidence is not evidence of absence.
    whyItMatters: >-
      If regulators determine Mercury was a direct cause of partner bank compliance failures, Mercury could face its own
      enforcement actions affecting operations.
    diligencePath: >-
      Request confirmation from Mercury's General Counsel of any pending regulatory investigations or supervisory
      letters directed at Mercury.
    relatedQuestionRefs:
      - QO024
      - QO026
  - type: missing-source
    severity: material
    topic: Revenue breakdown by stream (interest vs. interchange vs. SaaS vs. FX)
    missingEvidence: >-
      Mercury has not disclosed the breakdown of its $500M 2024 revenue by source. Sacra estimates interest income is
      the primary driver but exact percentages are unavailable.
    whyItMatters: >-
      Revenue mix determines sensitivity to interest rate changes, card volume, and SaaS churn. A rate-cut cycle could
      materially compress revenue if interest income dominates.
    diligencePath: Request revenue segmentation by stream from Mercury's CFO or the data room financial model.
    relatedQuestionRefs:
      - QO023
  - type: private-evidence-only
    severity: material
    topic: Series C primary vs. secondary split, founder liquidity, and full investor ownership
    missingEvidence: >-
      Mercury declined to disclose how much of the $300M Series C was primary vs. secondary, or how much
      founders/employees liquidated. Exact ownership percentages, voting rights, and secondary transactions for all
      investors are not publicly disclosed.
    whyItMatters: >-
      High secondary component may signal insider selling conviction, reduce available growth capital, and affect cap
      table dynamics for new investors. Full stakeholder ownership is needed for governance analysis.
    diligencePath: Review the Series C term sheet, cap table, and liquidity schedule as part of formal investor diligence.
    relatedQuestionRefs:
      - QO028
    relatedTableRefs:
      - TO003
  - type: missing-source
    severity: minor
    topic: Conflict of interest documentation for Akhund venture fund
    missingEvidence: >-
      No public documentation of any formal conflict-of-interest review or governance policy regarding CEO Akhund's $26M
      venture fund launched alongside his Mercury CEO role.
    whyItMatters: >-
      Without a formal policy, the venture fund could create undisclosed conflicts in Mercury's M&A or investment
      strategy, especially given Series C M&A mandate.
    diligencePath: >-
      Request Mercury's board-level conflict-of-interest policy and any recusal procedures related to Akhund's personal
      fund.
    relatedQuestionRefs:
      - QO025
  - type: missing-source
    severity: material
    topic: Full leadership team composition below named executives
    missingEvidence: >-
      Full executive org chart and VP-level team below the named executives are not publicly confirmed. CFO background
      details are limited.
    whyItMatters: Full leadership team depth is needed to assess organizational maturity for potential IPO or continued scale.
    diligencePath: Request org chart and named C-suite from Mercury directly.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs: []
  - type: missing-source
    severity: material
    topic: Mercury formal SAM estimate and segment-level market sizing
    missingEvidence: >-
      No independent research firm has published a formal SAM estimate for digitally-native US SMBs willing to switch to
      neobanks. All published estimates span US neobanking broadly (including consumer accounts) or global neobanking,
      making precise Mercury-specific SAM estimation impossible from public sources.
    whyItMatters: >-
      Without a formal SAM, valuation models depend on bottom-up proxies from Mercury's growth trajectory, which may
      understate or overstate the addressable opportunity depending on digital adoption rate.
    diligencePath: >-
      Commission a primary market sizing study or obtain Mercury's internal TAM/SAM estimates during investor diligence.
      Cross-reference with FDIC small business banking deposit statistics.
    relatedQuestionRefs:
      - QM020
  - type: missing-source
    severity: material
    topic: Mercury revenue mix diversification (NIM vs. SaaS fees vs. interchange)
    missingEvidence: >-
      Mercury has not publicly disclosed the precise breakdown between NIM on deposits, interchange income, venture debt
      interest, and SaaS/subscription fees from workflow tools. Sacra notes diversification is underway but does not
      provide specific percentages.
    whyItMatters: >-
      Revenue mix determines valuation multiple: if >90% NIM-dependent, a banking multiple (1-2x revenue) applies; if
      SaaS fees grow to 20-30%, a higher software multiple may be justified, materially changing the investment thesis.
    diligencePath: >-
      Request revenue segmentation (NIM, interchange, SaaS fees, venture debt interest) in investor diligence; model
      rate-cut sensitivity scenarios.
    relatedQuestionRefs:
      - QM021
  - type: missing-source
    severity: material
    topic: Mercury customer acquisition cost (CAC) and channel mix
    missingEvidence: >-
      Mercury has not disclosed CAC, customer acquisition channel attribution, or the relative contribution of organic
      word-of-mouth, YC/accelerator partnerships, paid marketing, and referral programs to new customer growth.
    whyItMatters: >-
      CAC and the LTV/CAC ratio determine unit economics health. If Mercury begins spending on paid acquisition as it
      moves beyond the startup cohort, margins may compress significantly.
    diligencePath: >-
      Request cohort-level CAC and LTV data; break down customer acquisition channels by segment (startup vs. e-commerce
      vs. SMB).
    relatedQuestionRefs:
      - QM022
  - type: missing-source
    severity: material
    topic: Multi-homing rate and primary bank exclusivity among Mercury customers
    missingEvidence: >-
      No public source discloses the percentage of Mercury's 200,000+ customers using Mercury as their sole primary bank
      vs. maintaining accounts at a legacy bank simultaneously.
    whyItMatters: >-
      If a substantial fraction of Mercury customers multi-home, effective revenue concentration per customer is lower
      than the total customer count implies, and deposit stickiness is reduced.
    diligencePath: >-
      Request internal data on customer primary bank status; analyze deposit concentration vs. average balance per
      customer as a proxy for primary banking status.
    relatedQuestionRefs:
      - QM027
  - type: conflicting-data
    severity: minor
    topic: Global neobanking market size estimates—wide methodological variance across analyst sources
    missingEvidence: >-
      Published 2025 global neobanking market estimates range from $210B to $383B, and long-range 2030-2034 projections
      range from $263B (US-only, Markets and Data) to $9,385B (global, Grand View Research). No single authoritative
      methodology exists.
    whyItMatters: >-
      Wide estimate variance can create overconfidence in Mercury's market opportunity. TAM figures should be treated as
      directional context only, not as precise valuation inputs.
    diligencePath: >-
      Triangulate using top-down (US commercial banking) and bottom-up (Mercury customer count growth rate × estimated
      wallet size) methodologies; avoid single-source TAM.
    relatedQuestionRefs:
      - QM025
      - QM026
  - type: missing-source
    severity: material
    topic: Brex/Capital One acquisition—unconfirmed M&A rumor
    missingEvidence: >-
      Public sources as of January 2026 describe a potential Brex acquisition by Capital One as a speculative future
      scenario, but no confirmed M&A announcement or press release was found. If Capital One acquires Brex, it would
      materially change the competitive dynamic—adding incumbents with massive balance sheets to the direct competitive
      set.
    whyItMatters: >-
      A Capital One acquisition of Brex would dramatically raise the competitive threat to Mercury from a
      well-capitalized incumbent with existing SMB relationships, deep lending capability, and brand trust. Without
      confirmation, this cannot be priced into Mercury's competitive assessment.
    diligencePath: >-
      Monitor SEC filings, Bloomberg M&A news, and Brex investor communications for any confirmed transaction. If a deal
      is announced, reassess Mercury's competitive moat with Capital One as a direct competitor.
    relatedQuestionRefs:
      - QP024
  - type: private-evidence-only
    severity: material
    topic: Mercury's YC-cohort capture rate and specific market share among YC-backed companies
    missingEvidence: >-
      Mercury claims to serve approximately 1 in 3 US startups, but no public source discloses the specific share of Y
      Combinator-backed companies banking with Mercury, nor whether this share has grown or declined in 2024-2025 as
