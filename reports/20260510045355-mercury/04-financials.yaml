  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: gross-margin
      missingEvidence: >-
        Gross margin (COGS), EBITDA margin percentage, and operating expense breakdown by function (S&M, R&D, G&A) are
        not publicly disclosed and cannot be derived from available public data.
      whyItMatters: >-
        Without gross margin and OpEx allocation, the sustainability and scalability of Mercury's profitability cannot
        be underwritten; a 10-point gross margin difference changes the investment thesis materially.
      diligencePath: >-
        Request audited financial statements or management P&L presentation with revenue by stream and cost by category;
        cross-check against public neobank benchmarks from Chime, Monzo, or Revolut annual reports.
      relatedQuestionRefs:
        - QI005
        - QI013
        - QI028
      relatedTableRefs:
        - TI001
        - TI005
    - type: private-evidence-only
      severity: material
      topic: CAC
      missingEvidence: >-
        Customer acquisition cost by channel (paid vs. organic vs. referral), payback period by customer cohort, and S&M
        expense as a percentage of revenue are not publicly disclosed.
      whyItMatters: >-
        Mercury's growth story relies on organic acquisition; if CAC is rising as it expands beyond the tech cohort into
        broader SMB, the margin profile and growth sustainability deteriorate without the investor knowing.
      diligencePath: >-
        Request marketing channel attribution data, customer cohort LTV analysis, and S&M expense breakdown from the
        data room.
      relatedQuestionRefs:
        - QI006
      relatedTableRefs:
        - TI003
        - TI005
    - type: missing-source
      severity: minor
      topic: OCC-charter
      missingEvidence: >-
        The specific regulatory capital requirements the OCC will impose on Mercury under its national bank charter
        application are not yet published; the OCC has not announced approval or conditions.
      whyItMatters: >-
        If OCC capital requirements are at the high end ($100M+), a significant portion of the Series C is consumed by
        regulatory capital before product investment, changing the financial picture of the $300M raise.
      diligencePath: >-
        Monitor OCC application filings and Federal Register notices for Mercury's charter; consult an OCC regulatory
        advisor for de novo charter precedents at Mercury's scale.
      relatedQuestionRefs:
        - QI012
      relatedTableRefs:
        - TI004
    - type: private-evidence-only
      severity: material
      topic: cash-position
      missingEvidence: >-
        Mercury's exact cash position post-Series C close and current runway are not publicly disclosed; the
        primary-versus-secondary split in the Series C is also not quantified.
      whyItMatters: >-
        The cash position affects whether Mercury can self-fund OCC charter capital plus continued R&D investment
        simultaneously, or whether it requires additional external capital sooner than the growth narrative suggests.
      diligencePath: >-
        Request the balance sheet as of Q4 2025 close, including primary proceeds received, secondary liquidity taken,
        and current operating cash versus regulatory capital reserve.
      relatedQuestionRefs:
        - QI019
      relatedTableRefs:
        - TI004
    - type: missing-source
      severity: material
      topic: lending
      missingEvidence: >-
        Mercury Spark lending book size, origination volumes, pricing, charge-off rates, and provision reserves are not
        publicly accessible; NMLS filing confirms the entity exists but provides no loan portfolio data.
      whyItMatters: >-
        Undisclosed credit exposure in a lending product could materially affect capital adequacy ratios, especially if
        Mercury's OCC charter application requires consolidated credit risk disclosures.
      diligencePath: >-
        Request loan book vintage analysis, origination volume by quarter, charge-off and delinquency rates, and credit
        policy documentation as part of financial due diligence.
      relatedQuestionRefs:
        - QI024
      relatedTableRefs:
        - TI005
    - type: private-evidence-only
      severity: minor
      topic: rate-sensitivity
      missingEvidence: >-
        Mercury's proprietary NIM rate sensitivity model — including the exact spread earned per basis point of Fed
        funds rate, deposit repricing mechanics, and hedging strategy — is not publicly disclosed.
      whyItMatters: >-
        Without the sensitivity model, analysts cannot accurately project revenue under rate cut or rate hike scenarios,
        making financial forecasting rely entirely on the observable deceleration signal from 2025.
      diligencePath: >-
        Request the treasury management investment policy, deposit repricing model, and hedging instruments from the CFO
        or Chief Banking Officer in due diligence.
      relatedQuestionRefs:
        - QI027
      relatedTableRefs:
        - TI001
