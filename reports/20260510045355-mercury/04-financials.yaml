company:
  name: Mercury
chapter:
  number: 4
  title: Financials
  summary: |
    Mercury's financial profile is that of a profitable, high-growth fintech operating a
    NIM-heavy revenue model. FY2024 revenue reached approximately $500M (97% YoY growth),
    with an annualized run rate of ~$650M by Q3 2025 (41% growth, decelerated by Fed rate
    cuts). Mercury has been GAAP and EBITDA profitable for 10 consecutive quarters, holds
    ~$20B in customer deposits, and processed $248B in transaction volume in 2025. The March
    2025 Series C ($300M at $3.5B) was primarily a strategic raise for OCC charter pursuit,
    product expansion, and acquisitions. Key financial risks include NIM cyclicality (estimated
    60–75% of revenue is rate-sensitive), undisclosed gross margin and CAC, and the capital
    demands of obtaining a national bank charter. Mercury's revenue quality is high in structure
    but susceptible to benchmark rate cycles; the unit economics are compelling in shape but
    cannot be fully underwritten without management disclosure.
sections:
  - id: SI001
    title: Revenue Model and Revenue Mix
    body: |
      Mercury generates revenue through three primary streams: net interest margin (NIM) on
      customer deposits, interchange fees on its IO Corporate Card and debit products, and
      SaaS-style subscription fees on premium product tiers. A fourth minor stream includes
      wire and FX transaction fees and fees on Mercury Spark revenue-based lending. Mercury
      does not publicly disclose its revenue mix by stream, making the exact share of each
      component an analytical estimate derived from third-party research and industry benchmarks.

      Based on Sacra analyst estimates and banking industry comparables, NIM is estimated to
      account for approximately 60–75% of Mercury's total revenue. This is consistent with
      the revenue deceleration pattern observed in 2025: as the Federal Reserve cut benchmark
      rates in late 2024 and into 2025, Mercury's revenue growth slowed from 97% YoY (2024)
      to approximately 41% YoY (Q3 2025 annualized), a deceleration directly attributable to
      NIM compression. Interchange fees are estimated at 15–25% of revenue, consistent with
      the card spend volumes of 300K+ business customers processing $248B in annual transaction
      volume. SaaS fees from Teams plans ($35–$350/month) and Treasury management account
      for an estimated 10–20% and represent the highest-quality, most rate-insensitive revenue.

      Mercury's FY2024 revenue reached approximately $500M, growing 97% from approximately
      $254M in FY2023. By Q3 2025, the annualized run rate had reached approximately $650M.
      The 2024 annual letter confirmed that 2025 represented the third consecutive year of
      profitability and 10 consecutive quarters of GAAP and EBITDA positive results, which
      the CEO characterized as a deliberate decision to not sacrifice margins for growth at
      any cost. OCC charter applications filed in December 2025 introduce long-term revenue
      model optionality: a national bank charter would allow Mercury to earn the full NIM
      spread rather than sharing it with BaaS partner banks, potentially expanding margins
      materially if the charter is granted.
