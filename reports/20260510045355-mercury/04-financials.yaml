    slug: revenue-streams-table
    title: Revenue Streams Table
    summary: >
      Breakdown of Mercury's estimated revenue streams, showing mechanism, estimated share of total revenue, revenue
      quality, and key diligence asks per stream. Revenue mix is not publicly disclosed; estimates derived from analyst
      models, banking benchmarks, and observable growth deceleration data.
    columns:
