  - id: TI002
    slug: pricing-monetization-table
    title: Pricing / Monetization Table
    summary: >
      Mercury's published and inferred pricing across major product lines, distinguishing between list pricing (publicly
      disclosed) and revenue realization (partially inferred). Core banking is free; Mercury earns revenue through
      spread and transaction economics.
    columns:
      - Product
      - List Price / Unit
      - Revenue Mechanism
      - Notes
    rows:
      - - Mercury Business Checking
        - $0/month; no minimum balance; no transaction limits
        - NIM on deposited balances; no direct fee revenue
        - FDIC-insured up to $250K standard; up to $5M via sweep network; primary acquisition funnel
      - - Mercury Treasury
        - No explicit fee; basis-point management spread on invested balances
        - NIM shared with Mercury after partner bank expenses; Mercury earns the spread
        - Customers earn yield; Mercury earns spread; exact split undisclosed
      - - Mercury Teams
        - $35–$350/month depending on tier (exact tier structure not fully public)
        - SaaS subscription fee; rate-insensitive; grows with customer business size
        - Multi-user access, expense management, bill pay automations, accounting integrations
      - - Mercury IO Corporate Card
        - No annual fee; 1.5% cashback on all purchases
        - Interchange revenue (Visa/network fees) paid to Mercury; cashback cost to Mercury
        - 'Debit card: interchange is key revenue; credit card adds credit-line economics (undisclosed)'
      - - Mercury Spark (Lending)
        - Not publicly disclosed; revenue-based financing model
        - Origination fees and interest on loans to startup clients; credit risk borne by Mercury
        - 'Book size, rates, and default exposure not disclosed; regulated via NMLS #2606284'
