      - Est. % of Revenue
      - Revenue Quality
      - Diligence Ask
    rows:
      - - Net Interest Margin (NIM)
        - >-
          Spread on ~$20B customer deposits invested in US Treasuries and money market funds; shared with BaaS partner
          banks
        - 60–75% (est.)
        - Medium — high in stable rate environments; cyclical with Fed policy
        - Exact deposit portfolio allocation; NIM rate; interest expense paid to partners
      - - Interchange Fees
        - Per-transaction fee on IO Corporate Card (Visa/debit) and Mercury credit card purchases
        - 15–25% (est.)
        - Medium-High — volume-driven; resilient to rate cycles; grows with customer card spend
        - Interchange rate by card type; network cost share; card program terms with Patriot Bank
      - - SaaS / Subscription Fees
        - Mercury Teams plans ($35–$350/month), Treasury management basis-point fees, premium automations
        - 10–20% (est.)
        - High — most rate-insensitive stream; recurring; expands with product depth
        - Subscriber count by tier; ARR from subscriptions; attach rate from free tier
      - - Wire / FX / Lending (Other)
        - ~$15–$25 per wire; FX markups on 40+ currency conversions; Mercury Spark lending fees
        - <5% (est.)
        - Low (undisclosed) — limited public data; lending book size and default rates unknown
        - Wire volume; FX spread; Mercury Spark loan book size, pricing, and charge-offs
