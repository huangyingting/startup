  - id: SI004
    title: Financial Verdict and Diligence Gaps
    body: |
      Mercury's financial profile presents a strong revenue quality story with meaningful
      underwriting gaps. On the positive side: $500M FY2024 revenue with 97% YoY growth,
      10 quarters of GAAP profitability, $20B in customer deposits, $248B in transaction
      volume, and a $3.5B valuation supported by Sequoia and established fintech investors
      represent a compelling track record. The business model is structurally sound — NIM-driven
      banking models are resilient in high-rate environments and Mercury has demonstrated it
      can grow through multiple macro regimes.

      On the adverse side: the revenue deceleration from 97% to 41% YoY in 2025 due to NIM
      compression from Fed rate cuts illustrates the rate sensitivity of the current model.
      Mercury's 60–75% estimated NIM share creates structural revenue cyclicality that any
      long-term investor must model across rate scenarios. The Evolve Bank & Trust enforcement
      action by the FDIC and Federal Reserve in June 2024 — targeting Mercury's former primary
      banking partner for consumer compliance failures — demonstrates that BaaS dependency
      creates regulatory cascade risk that Mercury cannot fully control. Mercury's pivot away
      from Evolve and the subsequent OCC charter application are the correct strategic responses,
      but the transition period increases execution risk.

      Critical diligence gaps that cannot be resolved from public data include: gross margin
      and COGS breakdown, customer acquisition cost and payback period by channel, EBITDA
      margin depth and operating expense allocation, credit quality metrics for Mercury Spark
      lending, and the exact cash position post-Series C given OCC charter capital draws.
      The public financial information supports the broad narrative of a profitable, growing
      business, but a full underwriting would require audited financials or a detailed
      management information package.
    claimRefs:
