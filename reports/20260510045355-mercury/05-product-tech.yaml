  - id: TE004
    title: Mercury Trust, Security, and Compliance Controls
    description: Security controls, certifications, and compliance status with diligence gaps
    columns:
      - Control
      - Status
      - Scope
      - Diligence Gap
    rows:
      - - SOC 2 Type II
        - Certified (report not publicly available)
        - Security, availability, processing integrity, confidentiality, privacy
        - Report only available under NDA; scope and exceptions unknown
      - - FDIC Insurance
        - Up to $5M per customer via sweep network
        - All checking and savings deposits; 97%+ of deposits covered
        - Full sweep network partner list not disclosed; concentration unknown
      - - Multi-Factor Authentication
        - Enforced via TOTP and Touch ID; SMS 2FA prohibited
        - All customer accounts including admin and co-founder access
        - Recovery flow security and backup authentication methods not documented
      - - Dark Web Monitoring
        - Active
        - Phishing domains, infostealers, malware, customer account sales
        - Monitoring vendor identity and incident response SLA not disclosed
      - - Device Verification
        - Active on new device logins
        - All account logins from unrecognized devices
        - No public data on blocked attack frequency or false positive rate
      - - ACH Debit Authorization Controls
        - Customer-configurable
        - Vendor whitelist and unauthorized payment notifications
        - Adoption rate depends on customer setup; not automatically enforced
      - - HIBP Credential Checking
        - Active at login
        - Known leaked credential databases checked at authentication
        - Supplementary to MFA; does not prevent all credential stuffing
      - - Choice Financial Group Consent Order
        - ADVERSE Active since 2023
        - One of Mercury two active partner banks
        - Consent order terms and remediation timeline not fully public
