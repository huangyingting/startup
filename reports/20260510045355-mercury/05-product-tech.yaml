  - id: TE003
    title: Mercury Technology Architecture Layers
    description: Key technology layers, external dependencies, and associated risks
    columns:
      - Layer
      - Role
      - Key Dependency
      - Risk
    rows:
      - - Customer Interface Web and Mobile
        - Account management, payments, card controls, reporting dashboard
        - Mercury proprietary frontend
        - UI-only differentiation is replicable; advantage erodes over time
      - - REST API api.mercury.com
        - Programmatic access for automation, integrations, third-party apps
        - Mercury hosted; bearer tokens and OAuth2 authentication
        - API downtime impacts business-critical financial automation workflows
      - - Choice Financial Group Partner Bank
        - Primary banking ledger, DDA accounts, ACH processing, wire transfers
        - Critical; Mercury cannot operate core banking without this partner
        - 2023 federal consent order is active compliance risk for Mercury
      - - Column N.A. Partner Bank
        - Secondary banking ledger, additional DDA and payment infrastructure
        - Critical; diversifies away from Choice Financial concentration
        - Regulatory action on Column N.A. would compound partner bank risk
      - - FDIC Sweep Network
        - Up to $5M deposit protection distributed across member banks
        - Third-party sweep network operators and member institutions
        - Sweep disruption could limit FDIC coverage; network transparency limited
      - - JP Morgan and Morgan Stanley Treasury Funds
        - Yield-generating mutual funds for Mercury Treasury product
        - JTCXX same-day and MULSX 1-2 day fund managers; daily NAV
        - NAV fluctuation; fund availability changes; manager relationship risk
      - - Patriot Bank and Mastercard IO Card
        - Corporate credit card issuance and payment network processing
        - Patriot Bank as card issuer; Mastercard processing network
        - Patriot Bank regulatory risk; Mastercard scheme changes
      - - Accounting APIs Intuit Xero Oracle
        - Automated GL sync, categorization, ERP workflows
        - Third-party API availability and schema stability
        - API changes by partners could disrupt accounting integrations
