callouts:
  - calloutType: strength
    title: API-First Architecture Creates Technical Switching Costs
    body: >-
      Mercury REST API with OAuth2, webhook support, and sandbox environment enables businesses to embed banking
      directly into financial workflows. Third-party developers have built Python SDKs and CLI tools on top of the API,
      demonstrating a maturing ecosystem. This API-first approach creates technical integration depth that meaningfully
      exceeds what traditional bank relationships provide, raising switching costs for sophisticated business customers.
    claimRefs:
      - CE009
      - CE010
      - CE024
      - CE025
  - calloutType: strength
    title: Multi-Product Expansion Compounding Revenue and Retention
    body: >-
      Mercury evolution from a single bank account to a financial operating system is reflected in $248B transaction
      volume (up 59% YoY) and $650M ARR by September 2025. IO is already the most-used corporate card among Mercury
      customers, demonstrating strong cross-sell conversion. Each additional product adopted increases switching costs
      and deepens the relationship, creating a compounding retention flywheel.
    claimRefs:
      - CE001
      - CE022
      - CE026
  - calloutType: risk
    title: Partner Bank Dependency is Mercury Primary Structural Vulnerability
    body: >-
      Mercury is entirely dependent on Choice Financial Group and Column N.A. for its banking license. Choice Financial
      Group is under a 2023 federal consent order. Mercury prior partner Evolve Bank received a 2024 Federal Reserve
      enforcement action requiring customer migration. This pattern of partner bank regulatory issues is the largest
      structural risk in Mercury operating model and will persist until OCC charter is obtained.
    claimRefs:
      - CE003
      - CE028
      - CE029
  - calloutType: insight
    title: OCC Charter Would Transform Risk Profile and Unit Economics
    body: >-
      Mercury December 2025 OCC national bank charter application, if approved, would eliminate partner bank dependency,
      enable direct FDIC deposit insurance, unlock full net interest margin without cost-sharing, and expand the product
      surface for credit products. Jon Auxier appointment (ex-SoFi Bank CFO who led SoFi successful charter) signals
      serious regulatory capability, but charter approval typically takes 2 to 4 years and is not guaranteed.
    claimRefs:
      - CE015
  - calloutType: recommendation
    title: Obtain SOC 2 Report, Infrastructure Architecture, and Venture Debt Portfolio
    body: >-
      Priority diligence items: (1) latest SOC 2 Type II report with bridge letter and identified exceptions; (2) cloud
      infrastructure architecture, vendor dependencies, and disaster recovery documentation; (3) venture debt portfolio
      metrics including loan book size, default rates, and loss reserves; (4) platform uptime history and SLA
      commitments; (5) full FDIC sweep network partner list with concentration data.
    claimRefs:
      - CE032
      - CE033
      - CE006
