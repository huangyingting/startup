  - id: SEC-E3
    title: Security, Compliance, and Trust Infrastructure
    body: >
      Mercury security architecture combines technical controls with FDIC deposit protection. Every Mercury account is
      structured as an individual DDA (demand deposit account) with deposits spread across a network of FDIC-insured
      banks via sweep networks, providing up to $5M per customer with 97%+ of deposits covered. Mercury Vault provides
      automated visibility into each customer fund protection status in real time. Mercury holds SOC 2 Type II
      compliance referenced by partner firms and product reviewers, though the full report is not publicly available
      without NDA. Authentication security is stringent: MFA is enforced via TOTP and Touch ID, with SMS 2FA explicitly
      prohibited due to SIM-swap vulnerabilities. Additional controls include dark web monitoring for phishing domains,
      infostealers, and malware; HIBP credential checking against known leaked databases; ACH debit authorization
      controls allowing businesses to whitelist authorized vendors; receive-only sub-accounts so clients can receive
      payments without exposing primary account numbers; and device verification against phishing. Tiered user
      permissions support view-only bookkeeper access, card-only employee access, and full admin controls. Critically,
      Choice Financial Group (one of two active partner banks) received a federal consent order in 2023, representing
      ongoing regulatory risk for Mercury customers. Mercury 2024 severance of Evolve Bank following a Fed enforcement
      action demonstrates responsiveness, but the pattern of partner bank regulatory issues creates structural risk that
      will persist until the OCC charter is obtained.
