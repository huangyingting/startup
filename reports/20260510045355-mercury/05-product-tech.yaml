  - id: SEC-E2
    title: 'Technology Architecture: API-First Platform on Regulated Partner Bank Infrastructure'
    body: >
      Mercury technical model is that of a software company layered on regulated banking infrastructure rather than a
      direct bank. Core banking ledger services flow through Choice Financial Group and Column N.A. (both FDIC members),
      with Mercury providing the software interface, workflow automation, and customer experience layer. The Mercury
      REST API (api.mercury.com/api/v1/) provides programmatic access to accounts, balances, transactions, ACH payments,
      wire transfers, recipient management, and webhooks for real-time event notifications. Authentication uses bearer
      tokens with three permission levels: read-only (no IP whitelist required), read-write (IP whitelist mandatory),
      and custom-scoped tokens for principle-of-least-privilege access control. A dedicated sandbox environment enables
      safe integration testing without moving real money; OAuth2 supports multi-tenant SaaS scenarios. Third-party
      developers have built Python SDKs (mercury-bank-api on PyPI) and CLI tools on GitHub on top of the API,
      demonstrating ecosystem activity. Mercury specific cloud infrastructure provider and backend language are not
      publicly disclosed, though engineering context suggests AWS. Mercury applied for an OCC national bank charter in
      December 2025, which would eventually allow direct deposit-holding without partner bank dependency. Jon Auxier
      (ex-SoFi Bank CFO who led SoFi successful charter) was appointed as proposed CEO of Mercury Bank N.A., signaling
      serious regulatory commitment. Charter approval typically takes 2 to 4 years and is not guaranteed.
