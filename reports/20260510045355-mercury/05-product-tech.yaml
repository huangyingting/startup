  evidenceGaps:
    - type: missing-source
      severity: material
      topic: tech-stack
      missingEvidence: >-
        Mercury cloud infrastructure provider, backend language/framework, database technology, and CI/CD tooling are
        not publicly disclosed in any official source.
      whyItMatters: >-
        Cloud provider concentration risk and infrastructure resilience are material for a company processing $248B in
        annual transaction volume.
      diligencePath: Request infrastructure architecture documentation and vendor dependency disclosure under NDA during diligence.
      relatedQuestionRefs:
        - QE002
    - type: missing-source
      severity: material
      topic: soc2-report
      missingEvidence: >-
        SOC 2 Type II report and bridge letter are not publicly available; only existence of certification is referenced
        by third parties.
      whyItMatters: >-
        Without reviewing the actual SOC 2 report, security control effectiveness and identified exceptions cannot be
        independently verified.
      diligencePath: Request latest SOC 2 Type II report with bridge letter from Mercury under NDA.
      relatedQuestionRefs:
        - QE010
    - type: private-evidence-only
      severity: material
      topic: venture-debt-terms
      missingEvidence: >-
        Mercury Venture Debt loan book size, interest rate range, average loan size, default and loss rates, and
        underwriting criteria are not publicly disclosed.
      whyItMatters: >-
        Venture debt carries credit risk; without loss rates and underwriting rigor, this product line represents
        unquantified risk on Mercury books.
      diligencePath: Request venture debt portfolio metrics, underwriting policy, and loss reserve methodology.
      relatedQuestionRefs:
        - QE024
        - QE025
    - type: missing-source
      severity: minor
      topic: platform-uptime
      missingEvidence: Mercury does not publish uptime or SLA data publicly; the status page was inaccessible during research.
      whyItMatters: >-
        For businesses running critical financial operations through Mercury, platform uptime and incident frequency are
        material operational risk factors.
      diligencePath: Request historical uptime data, SLA commitments, and post-mortems for major incidents.
      relatedQuestionRefs:
        - QE019
    - type: missing-source
      severity: minor
      topic: ip-patent-portfolio
      missingEvidence: >-
        Mercury has not publicly disclosed any patent filings or proprietary technology IP. USPTO records and patent
        databases do not show prominent Mercury banking software patents.
      whyItMatters: >-
        Understanding whether Mercury has defensible IP beyond trade secrets affects long-term competitive moat
        assessment.
      diligencePath: Review USPTO and international patent databases; request IP schedule from data room.
      relatedQuestionRefs:
        - QE017
    - type: missing-source
      severity: minor
      topic: io-card-comparison
      missingEvidence: >-
        Detailed feature and term comparisons between Mercury IO, Brex corporate card, and Ramp card are not available
        from neutral primary sources. Mercury claims 1.5% cashback with no personal guarantee but Brex and Ramp
        comparative terms require independent analysis.
      whyItMatters: >-
        Corporate card differentiation is a key acquisition driver; understanding relative terms matters for competitive
        positioning.
      diligencePath: Review Brex and Ramp card terms directly and obtain Mercury IO credit facility terms from data room.
      relatedQuestionRefs:
        - QE013
