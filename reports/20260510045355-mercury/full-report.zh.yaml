      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: |
              Mercury 由三位 Heyzap 前同事共同创立。Heyzap 是一家移动开发者工具和广告技术初创公司，2016 年被
              Fyber 收购。Immad Akhund（CEO）拥有 University of Cambridge 计算机科学硕士学位，通过 Y Combinator
              联合创办 Heyzap；在 2017 年创办 Mercury 之前，他曾担任兼职 YC 合伙人，并且是活跃的天使投资人，投资超过
              300 笔，包括 Airtable、Rippling、Substack 和 Rappi。Max Tagher（CTO）和 Jason Zhang（COO）也是
              Heyzap 联合创始人。2019 年产品上线前，创始团队用 18+ 个月会见了 60+ 家银行和 100+ 位创业者，搭建出支撑
              今日 Mercury 的 BaaS 合作银行关系。

              现任高管团队包括 Daniel Kang（CFO）、Jon Auxier（首席银行业务官）、Robert Gonzalez
              （总法律顾问）、Nick Dellis（收入副总裁）和 Juliana Vislova（设计副总裁）。截至 2025 年，
              公司员工超过 1,000 人。2025 年，Akhund 在担任 CEO 的同时又推出一只个人 $26M 早期风投基金，带来潜在
              利益冲突问题。

              Series C 后，董事会明显扩容。新董事包括 Sonya Huang（主导本轮投资的 Sequoia Capital 合伙人）、
              Tim Mayopoulos（Fannie Mae 前 CEO，SVB 危机期间担任 Silicon Valley Bridge Bank CEO）和 Tom Brown
              （曾为 PayPal、Chime 和 Upstart 提供咨询的金融科技监管律师）。现有董事包括 CRV 的 Saar Gur，董事会观察员
              Alex Rampell（Andreessen Horowitz）和 Dan Rose（Coatue）。Jason Zhang 也以联合创始人代表身份加入董事会。
              考虑到 Akhund 的核心公众角色、投资人锚定作用和产品愿景领导力，公司关键人风险偏高；三位联合创始人的结构和
              经验丰富的董事会只能部分缓释该风险。
