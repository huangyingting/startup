      - number: '7.3'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >-
              Mercury 的收入模型对利率变化高度敏感。分析师估算净息差约占总收入的 60% 到 75%，这与 Federal Reserve 2024 年末开始降息后观察到的收入减速一致：收入增速从 FY2024 的同比
              97% 放缓到 Q3 2025 年化约 41%。截至 2025 年初，Mercury 约有 $17.9 billion 存款、约 $650 million 年化收入；若累计降息 150 个基点，由 NIM
              驱动的收入会被实质压缩。Mercury 未公开披露实际 NIM 水平，也未披露存款账簿的精确利率敏感度；没有管理层披露的外部投资者很难精确建模这一风险。

              Mercury 的存款基础集中在美国科技和初创公司板块，制造相关经济风险。风险投资融资下行会同时减少新客户获取（获资助初创公司变少）、提高客户流失（企业倒闭增加），并在现有客户消耗 runway
              时压低平均存款余额。除利率敏感度外，这是 Mercury 主要的财务模型风险。Mercury IO 信用卡敞口增加了增量财务风险：该卡不要求个人担保，因此对运营历史有限的初创公司形成无担保信用敞口。Mercury
              Venture Debt 向 pre-revenue 初创公司放贷，进一步把信用风险集中在风投生态。两个产品都能贡献收入，但也放大 Mercury 对初创融资下行情景的暴露。

              Mercury 2025 年 3 月完成的 $300 million Series C 提供了有意义的资本缓冲，也为 OCC 牌照流程提供
              runway。但拿到全国性银行牌照需要大量监管资本，可能迫使公司追加稀释性融资。收入高度集中于 NIM，意味着若 interchange、SaaS
              订阅或贷款费用成功分散收入，将同时提升收入质量和投资者风险感知。Mercury 连续 10 个季度实现 GAAP 和 EBITDA
              盈利，证明财务纪律，但当前收入结构仍容易受到利率周期和初创板块下行冲击；更分散的银行机构不会面临同等程度的脆弱性。
