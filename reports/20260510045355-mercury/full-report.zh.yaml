      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              Mercury 和更广义数字 SMB 银行最强的结构性顺风，是 Silicon Valley Bank 在 2023 年 3 月倒闭。该事件迫使数千家 初创企业迅速重新评估集中银行风险，Mercury
              是主要受益者之一，吸收了大批从 SVB 流出的客户。第二个顺风是数字原生企业设立的 长期迁移：千禧一代和 Gen Z 创始人更偏好 app 优先、API
              连接的财务工具，而不是依赖网点的关系。嵌入式金融会放大这一趋势： 随着 Mercury 增加账单支付、开票和费用管理，切换成本上升，单客户收入也增加。AI 辅助功能——欺诈检测、自动账单匹配、
              现金流分析——代表正在形成的产品护城河。主要约束是利率周期性：Mercury 收入高度偏向存款净利息收入（NIM），使增长对 Federal Reserve 利率政策敏感。2025 年秋季两次 Fed 降息，把
              Mercury 收入增长从 2024 年的 97% 同比压缩到 2025 年约 41% 同比。来自银行—金融科技合作结构的监管风险是第二个约束：Evolve Bank 监管同意令，以及 Mercury 随后在
              2025 年夏季 迁移至 Choice Financial Group 和 Column N.A.，给客户带来高摩擦运营中断。传统银行的数字化投入——JPMorgan Chase、 Bank of
              America、Wells Fargo——是在 3-5 年维度上的第三个逆风。OCC 全国性银行牌照审批（2025 年 12 月申请） 可能移除合作银行中介，但监管时间线存在不确定性。
