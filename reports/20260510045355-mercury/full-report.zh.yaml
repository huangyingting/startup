      - number: '4.3'
        title: 资本结构与成本效率
        blocks:
          - type: paragraph
            body: |
              Mercury 于 2025 年 3 月以 $3.5B 投后估值完成 $300M Series C，由 Sequoia Capital 领投，Spark Capital、Marathon、
              Coatue、CRV 和 Andreessen Horowitz 参与。公司未披露一级与二级资本拆分，但 CEO Akhund 表示募资「大部分」为一级资本。
              $3.5B 估值较 2021 年 $1.62B 的 Series B 估值翻倍有余，反映出公司的收入增长和持续盈利。

              Mercury 披露的 Series C 资金用途包括产品扩张（CFO 套件、Mercury Finance）、潜在收购、人才扩张，以及追求 OCC
              全国性银行牌照相关成本。OCC 牌照申请已于 2025 年 12 月提交；若获批，将需要大量监管资本——de novo 全国性银行牌照
              通常要求 $20M–$100M 初始资本，取决于商业计划复杂度；以 Mercury 的规模，需求很可能接近高端甚至更高。

              Mercury 以 Mercury Lending LLC 名义在 Nationwide Multistate Licensing System（NMLS）注册，编号 NMLS #2606284；
              NMLS 是面向金融服务公司的联邦 / 州监管数据库。该注册反映 Mercury 的贷款业务，也是确认其受监管状态的公开文件。Mercury
              核心产品定价透明（免费支票账户、无月费、无最低余额），但 Treasury 管理和卡项目等创收功能的定价透明度较低。

              公司连续 10 个季度盈利的说法，以及没有任何 down-round 融资，说明 Mercury 成本基础管理良好。2025 年初约 850 名员工支撑
              $500M 收入，意味着较强员工杠杆。不过，2025 年员工增长到 1,520 人，加上 OCC 牌照流程，将在 2026 年及之后显著提高合规和
              基础设施成本。
