            body: |
              2021 至 2024 年间，Mercury 收入从不足 $100M 快速增长到 $500M，很大程度上受到 2023 年 3 月 SVB 倒闭的加速。
              尽调应评估 Mercury 存款增长中有多少来自结构性因素、有多少来自周期性因素，以及如果 VC 融资环境正常化，存款能否
              保持稳定。
