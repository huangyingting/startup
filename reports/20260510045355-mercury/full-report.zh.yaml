      - number: '1.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 规模化阶段仍有罕见财务表现
            body: |
              Mercury 2024 年收入 $500M（同比增长 97%）、连续 10 个季度 GAAP 盈利、200,000+ 客户和 $156B 交易量，
              在金融科技公司中形成了真正少见的高增长与盈利组合。按 200,000 名客户计算，ARPU 约 $2,500，说明 Mercury
              服务的是比典型 SMB neobank 更大、更黏的企业。连续 10 个季度盈利也证明，Mercury 不是靠牺牲单位经济来买增长。
            calloutType: strength
