  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              Mercury 主要服务数字原生企业——初创公司、电商公司、成长型公司和 SMB；第二层客群是使用 Mercury for Investors 的个人投资者，以及通过 Mercury Personal
              进入的消费者。2019 年上线时，Mercury 瞄准 YC / 加速器生态里的风投支持初创公司。随后公司扩展到电商（到 2025 年约占客户组合 21%）、专业服务、非营利组织和创作者经济企业。到 2025 年
              3 月，Mercury 服务 200+ 个国家的 300,000+ 家企业。$240/year 的 Mercury Personal 产品于 2024 年 12
              月公开发布，把平台从企业账户延伸到创始人和员工。YC 与加速器推荐网络仍是价值最高的获客渠道，带来高 NPS、低流失客群。公司披露口碑是主要增长引擎，反映出科技创业社群里的强病毒式采用。

              在初创公司客群中，Mercury 在 YC 生态的渗透尤其强——Sacra 和 Contrary Research 都把 YC 推荐视为竞争对手难以复制的核心分发护城河。Mercury Perks 计划（为
              Startup Launch、Customer Growth、E-commerce、Professional Services 提供组合包）把合作伙伴软件折扣和持有 Mercury
              账户绑定，制造核心银行之外的生态黏性。Mercury for Investors 为 VC 提供组合层面的可见性，强化 VC → 被投公司推荐循环。Series B 时披露的客户
              Lunchclub、Mighty、Linear 代表明星创业公司层。到 2025 年，客户基础已经足够多元，没有已披露细分占总账户的大约四分之一以上；电商 21% 是唯一公开量化的子细分。
