      - number: '4.2'
        title: 单位经济与 GTM 效率
        blocks:
          - type: paragraph
            body: |
              Mercury 的单位经济由有机、推荐驱动的获客模式塑造，相比多数金融科技同行，付费 CAC 被压到更低。公司未公开披露 CAC、回本期
              或按 cohort 划分的 LTV。不过，NPS 73–75（银行业平均约 34），以及美国每三家获得早期 VC 融资的初创企业中有一家开设
              Mercury 账户的说法，都是口碑驱动获客和早期 cohort 高留存的强替代指标。

              可用公开指标估算单客户收入：按约 $650M 年化收入和 300,000+ 客户计算，隐含单客户年收入约 $2,000–$2,200。该数字混合了
              高存款企业客户和处于免费层的精简阶段初创公司，因此分布可能呈双峰。单客户交易量（按 $248B 分摊至 300K+ 客户，约 $827K/年）
              显示出有意义的银行活动深度，而不是沉睡账户。

              2025 年，Mercury 处理 $248B 交易量，高于 2024 年 $156B——增长 59%，超过客户数增速（同比 50%），并与钱包份额加深一致。
              单员工收入可估计约 $428K/年（$650M / 1,520 名员工），这一比例优于传统银行，但低于顶级 SaaS 倍数，反映出银行式成本结构。
              员工数从 2025 年初约 850 人增长 79% 至 2026 年初约 1,520 人，且员工扩张速度超过收入增速（41%），说明公司继续投入 R&D、
              合规和 OCC 牌照准备。

              2025 年客户结构变化——73% 净新增客户来自科技 / 初创行业之外——可能影响单位经济：科技之外的企业 SMB 相比 Mercury 最初围绕
              其建模的初创 cohort，CAC 可能更高，存款流速也不同，因此需要持续做 cohort 层面的监控。
