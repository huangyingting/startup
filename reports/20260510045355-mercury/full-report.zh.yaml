              Mercury 在 Evolve Bank 合规失败中的已记录角色——包括据称为高风险用户加入白名单、便利受制裁辖区交易，以及据称
              缺乏交易监控——构成重大监管风险。尽管 Mercury 尚未收到 Fed 直接执法行动，其合规文化与合作银行行为深度交织。
              2024 年 7 月关闭 37 个国家的大量账户，也带来声誉风险和潜在法律敞口。
            calloutType: risk
