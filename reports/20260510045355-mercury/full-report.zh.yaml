      - number: '4.4'
        title: 财务结论与尽调缺口
        blocks:
          - type: paragraph
            body: |
              Mercury 的财务画像讲出了一个强收入质量故事，但也留下了重要承销缺口。积极面包括：FY2024 收入 $500M、同比增长 97%，
              连续 10 个季度 GAAP 盈利，客户存款 $20B，交易量 $248B，以及由 Sequoia 和成熟金融科技投资人支持的 $3.5B 估值，
              共同构成有说服力的历史记录。商业模式结构上稳健——由 NIM 驱动的银行模式在高利率环境中韧性较强，Mercury 也证明自己能在
              多个宏观周期中增长。

              负面面包括：2025 年收入增速因 Fed 降息导致 NIM 压缩，从 97% 同比降至 41%，展示出现有模式的利率敏感性。Mercury 估计
              60–75% 的收入来自 NIM，形成结构性收入周期性，任何长期投资人都必须在不同利率情景下建模。FDIC 和 Federal Reserve 于
              2024 年 6 月对 Evolve Bank & Trust 采取执法行动——对象是 Mercury 前主要合作银行，原因是消费者合规失败——说明 BaaS
              依赖会制造 Mercury 无法完全控制的监管级联风险。Mercury 远离 Evolve 并随后申请 OCC 牌照，是正确的战略回应，但过渡期会
              提高执行风险。

              公开数据无法解决的关键尽调缺口包括：毛利率和 COGS 拆分、按渠道划分的客户获客成本和回本期、EBITDA 利润率深度和运营费用
              分配、Mercury Spark 贷款的信用质量指标，以及考虑 OCC 牌照资本消耗后 Series C 之后的确切现金头寸。公开财务信息支持
              「一家正在盈利且增长的公司」这一大叙事，但完整承销仍需要经审计财务报表或详细管理层信息包。
