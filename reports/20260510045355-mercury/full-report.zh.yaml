              Mercury 的客户账户增长呈陡峭复合曲线：Series B（2021 年 6 月）时为 40K+ 家企业，2024 年初达到 200K+（2024 Annual Letter 披露），Mercury
              官网显示到 2025 年初达到 300K+。存款增长同步爬升：2021 年为 $4B+，到 2024 年中总存款达到 $17.9B（剔除 FBO 存款为 $12.7B）。支付量从 2023 年的 $95B 增至
              2024 年的 $156B，同比增长 64%。收入从 2024 年约 $500M ARR 增至 2025 年中约 $650M。Mercury 披露 NPS 超过 80（银行业平均
              34），并称口碑是新注册的主要驱动因素。Trustpilot 在 2025 年 3 月基于 1,620+ 条评论给出 4.1/5 评分，确认客户满意度广泛存在；但个别账户冻结投诉在 1 星评论中构成负面信号。

              Contrary Research 和 Sacra 都指出，Mercury 的增长轨迹意味着显著的自然采用速度。账户数从 2024 年初的 200K 增至 2025 年 3 月的 300K+，Mercury 在
              14 个月里新增约 100K 个账户——约每月 7,000 个新账户——且未披露付费获客支出。四年内存款从 $4B 增至 $17.9B，CAGR 为 45%，大幅跑赢账户数增长率（约 70%
              CAGR），说明现有客户随时间加深了银行关系。即便缺少公开披露的流失指标，账户增长与单账户存款扩张的组合也间接证明留存强劲。
