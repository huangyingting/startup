chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Mercury 是一家总部位于 California 州 San Francisco 的金融科技公司。公司不持有自有银行牌照，
              而是通过与具备 FDIC 保险的持牌银行合作来交付企业银行服务。Mercury 创立于 2017 年，并于
              2019 年 4 月公开上线，面向初创企业、风险投资支持的公司、电商企业和中小企业（SMB）。这些客户过去
              长期得不到传统商业银行的充分服务。公司的旗舰产品是一套现代数字企业银行账户，把支票、储蓄、信用卡、
              资金管理、账单支付、开票、费用管理和会计集成汇入同一个平台。

              Mercury 采用多收入流模式。主要收入来自与合作银行共享、基于约 $20 billion 客户存款产生的利息收入。
              次级收入包括 IO 公司卡（由 Patriot Bank 发行）的交换费、电汇和外汇费用（40+ 种货币），以及高级
              金融软件功能的 SaaS 式订阅费，价格为 $35-$350/月。这个由存款驱动的模式对利率和 VC 流动性都高度敏感。
              SVB 在 2023 年 3 月倒闭后，初创企业寻找替代银行，Mercury 的存款基础快速增长；但存款增长和留存仍然
              绑定风险投资生态的融资环境。

              Mercury 的战略判断是，银行账户应该成为企业的「财务操作系统」。CEO Immad Akhund 在 2024 年年度信中
              将 2024 年四项重大产品发布（账单支付、开票、会计自动化和费用管理）描述为通向这一愿景的步骤，同时还推出了
              面向消费者的 Mercury Personal。截至 2025 年 3 月，Mercury 服务 200,000+ 家企业客户，并声称美国每三家
              获得早期 VC 融资的初创企业中，约有一家会开设 Mercury 账户。2025 年的合作银行包括 Choice Financial
              Group、Column N.A. 和 Patriot Bank（用于发卡），另有 20+ 家银行组成的网络通过 sweep 承接超额存款，
              为每家初创企业提供最高 $5M 的 FDIC 覆盖。
