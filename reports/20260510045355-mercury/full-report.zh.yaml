      - number: '1.4'
        title: 规模、牵引力与关键里程碑
        blocks:
          - type: paragraph
            body: |
              截至 2025 年初，Mercury 的牵引力数据很强。公司披露 2024 年年收入 $500M，约同比增长 97%（Sacra 估算），
              主要由 $20B 客户存款产生的利息收入驱动。客户基础增长至 200,000+ 个企业账户（同比 40%），年交易量 $156B
              （较 2023 年估算 $95B+ 同比增长 64%）。公司披露 NPS 得分 80+，处于行业领先水平（银行业平均约 34），iOS
              App Store 评分 4.9，评价数 7,200+。按 SimilarWeb 估计，Mercury 网站每月访问量约 2.5M。

              2024 年产品扩张显著：账单支付、开票、会计自动化、员工费用管理，以及面向消费者的 Mercury Personal。IO 公司卡
              （2022 年 9 月推出）是 Mercury 客户中使用最多的公司卡。国际能力扩展到 40+ 种货币。作为多银行策略的一部分，
              Mercury 在 2024 年接入 Column N.A. 作为新合作银行。

              Mercury 的 SVB 时刻：2023 年 3 月 Silicon Valley Bank 倒闭是一次重大获客催化剂。Mercury 对 SVB 没有直接敞口，
              并迅速发布关于其 FDIC 保险状态的安抚信息。数千家曾使用 SVB 或正在寻找替代方案的初创企业转入 Mercury，
              显著加速了存款和客户增长。考虑到 Mercury 原本就聚焦初创企业且采用数字优先模式，这次 SVB 意外红利让公司受益
              尤其明显。
