  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Mercury 位于数字企业银行与财务工作流软件的交叉点，服务对象是美国 SMB 和初创企业。核心可服务市场是美国小企业银行： 存款账户、支付、借记卡和信用卡、电汇，以及面向员工少于 500
              人企业的现金管理服务。该细分市场不同于消费者银行 （个人账户），也不同于机构或企业银行（大型企业资金管理）。Mercury 已把产品范围扩展到相邻支出类别：账单支付、 应付账款自动化、开票、员工费用报销，以及通过
              Vault 产品进行的资金收益管理。最主要的现状替代方案，是 JPMorgan Chase、Bank of America 或 Wells Fargo 等美国大型传统银行的关系型账户；这些银行合计服务了 30
              million 美国 SMB 中的绝大多数。次级替代方案包括专业支出管理金融科技公司（Brex、Ramp）以及传统社区或区域银行。Mercury 近期核心市场不包括消费者银行、抵押贷款、SBA
              loans、机构资产管理和跨国企业跨境资金管理。Mercury 最初的滩头阵地是 获 VC 支持的初创企业群体，但到 2024 年，初创企业在其 200,000+ 客户基础中占比已低于
              40%，电商企业则成为第二大客群。
