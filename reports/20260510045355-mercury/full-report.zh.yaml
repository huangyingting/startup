      - number: '8.3'
        title: 情景分析——乐观、基准、悲观
        blocks:
          - type: paragraph
            body: >-
              乐观情景需要三项条件同时成立：OCC 牌照在 2026 年中前获批，收入维持年增 40% 以上，并通过 Mercury Personal 成功扩张到消费者银行。若 Mercury
              拿到牌照并转向持牌银行模型，合作银行费用消除后，NIM 捕获率将提高约 100–150 个基点。到 2026 年末，收入可能达到 $1.0–1.2 billion；相对 Nubank 17x 和 Chime 峰值
              17x，10–12x ARR 倍数可以成立。乐观情景估值区间为 $9–12 billion。关键驱动是牌照获批速度：每延迟 6 个月，乐观情景上行会减少约 20%，因为 Brex、Ramp
              等竞争对手仍在继续扩张。

              基准情景假设 OCC 牌照在 2026 年全年仍待决，并于 2027 年获批；收入从 $650 million 起按年增 30% 增长（到 2025 年末约 $845 million）；NIM 由稳定的 Fed
              funds rate 支撑。在这一情景下，Mercury 维持 BaaS 模式，继续盈利，并按 5–6x forward ARR 倍数交易。公允价值区间为 $3.0–4.0 billion。当前 $3.5
              billion Series C 入场价位于区间中部，确认这是公允但不便宜的入场。基准情景概率估计为 55%，反映牌照耗时可能长于预期，但最终获批，且不会触发被拒或重大合作银行扰动。

              悲观情景假设三种不利结果之一发生：OCC 牌照被拒或无限期延迟；Fed 累计降息 150+ 个基点并压缩 NIM 25–30%；或 Choice Financial 的 FDIC
              同意令升级，迫使存款迁移。任何一种情景下，收入增速都会放缓至 10–15%，ARR 倍数压缩到 2–3x。悲观情景估值区间为 $1.3–2.0 billion，较 Series C 入场价下行
              43–63%。悲观情景概率估计为 20%，因为牌照被拒、严重 NIM 压缩和合作银行失败单独看概率都不高，但尾部概率不低，必须明确定价。剩余 25% 概率权重落在基准与乐观之间、偏上行的中间情景。
            claimRefs:
