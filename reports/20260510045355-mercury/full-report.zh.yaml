      - number: '5.2'
        title: 技术架构：API 优先平台叠加受监管合作银行基础设施
        blocks:
          - type: paragraph
            body: >
              Mercury 的技术模式不是直接银行，而是在受监管银行基础设施之上叠加软件公司。核心银行账本服务流经 Choice Financial Group 和 Column N.A.（二者均为 FDIC
              成员），Mercury 提供软件界面、工作流自动化和客户体验层。Mercury REST API （api.mercury.com/api/v1/）提供对账户、余额、交易、ACH
              支付、电汇、收款人管理和实时事件通知 webhook 的程序化访问。 认证使用 bearer tokens，并设三层权限：只读（无需 IP 白名单）、读写（必须 IP 白名单），以及用于最小权限访问控制的自定义
              scoped tokens。专用 sandbox 环境支持安全集成测试，无需移动真实资金；OAuth2 支持多租户 SaaS 场景。第三方开发者已基于该 API 构建 Python SDK（PyPI 上的
              mercury-bank-api）和 GitHub 上的 CLI 工具，显示出生态活跃度。Mercury 具体云基础设施 供应商和后端语言未公开披露，但工程语境暗示可能是 AWS。Mercury 于 2025 年
              12 月申请 OCC 全国性银行牌照，最终 可在不依赖合作银行的情况下直接持有存款。Jon Auxier（前 SoFi Bank CFO，曾主导 SoFi 成功获牌）被任命为拟议 Mercury Bank
              N.A. CEO，显示出严肃的监管承诺。牌照审批通常需要 2 到 4 年，且不能保证获批。
