      - number: '8.2'
        title: 估值分析与可比公司组
        blocks:
          - type: paragraph
            body: >-
              Mercury 的 $3.5 billion Series C 估值（2025 年 3 月）可从三条线评估：收入倍数、存款倍数和可比公司基准。按约 $650 million 年化收入（Sacra 2025
              年中估算）计算，隐含 ARR 倍数为 5.4x。按 $17.9 billion 存款计算，市值 / 存款比约 0.20x——显著低于历史上与 Mercury 增长画像相近的持牌数字银行在存款调整后获得的
              0.5–1.0x 区间。

              可比公司组横跨 fintech-SaaS 公司、持牌 neobank 和支付公司。Brex 在 Series D（$12.3B，2022）时约 24x ARR，Ramp 在 2024 年末达到 $13.4B
              估值、约 22x ARR——二者都反映 SaaS 式收入质量，且 NIM 敞口极低。考虑到 Mercury 更高的 NIM 集中度和 BaaS 依赖，相对这组可比公司的折价是合理的；但鉴于 Mercury
              已盈利且有存款飞轮，5.4x 的折价可能过度。

              对持牌银行情景，公开市场数字银行可比对象更有参考价值。Nubank（NYSE: NU）截至 2024 年市值约 $50 billion，按 trailing revenue 约 17x
              交易，受益于巴西完整银行牌照。SoFi（NASDAQ: SOFI）市值 $8 billion，收入倍数约 5x，反映持牌银行但增速较慢。Wise（LSE: WISE）市值 £8
              billion，支付导向模型收入倍数约 7x。Chime 作为寻求银行牌照的消费者 neobank，在 2021 年峰值估值达到 $25 billion，约 17x ARR。Mercury 的 5.4x
              倍数处在持牌数字银行区间低端，也显著低于 fintech-SaaS 可比公司，说明市场正在以大幅折价定价牌照风险。

              关键估值结论：按当前入场价，Mercury 被定价为受监管银行，而不是高增长 fintech。若 OCC 牌照获批，倍数应向 10–15x 区间重估，相对当前水平隐含 2–3x 回报。若牌照被拒且 NIM
              被压缩，倍数可能压至 2–3x ARR，对应 $1.3–2.0B 估值。当前价格提供非对称上行，但对 risk-off 投资者并非有吸引力的折价。基准情景假设公司在牌照待决但稳定的状态下为 5–6x
              ARR，公允价值 $3.0–4.0B。
