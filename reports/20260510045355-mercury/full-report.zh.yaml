  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险图谱
        blocks:
          - type: paragraph
            body: >-
              Mercury 作为非银行 fintech，以 Banking-as-a-Service（BaaS）模式运营，客户存款不是直接由 Mercury
              持有，而是放在合作银行。这一结构制造了层层监管依赖，是本报告最重要的单一风险类别。Mercury 本身不是 FDIC 保险存款机构；它依赖 Choice Financial Group 和 Column N.A.
              持有客户存款，并通过 sweep 网络为每名客户提供最高 $5 million 的 FDIC 保险穿透保障。

              2024 年 12 月，Mercury 同时提交 OCC 全国性银行牌照和 FDIC 存款保险申请。若获批，这是一次结构性转折，将使 Mercury 成为完全独立的银行。但全国性银行牌照申请历史上通常需要 18
              到 36 个月处理，OCC 会评估资本充足率、管理层质量、商业计划可行性和社区再投资承诺。若被拒，Mercury 将被迫无限期延续 BaaS 模式。2024 年 Synapse 破产之后，BaaS
              监管环境也更不友好，这可能拉长 Mercury 的审批时间，并提高所有依赖 BaaS 的 fintech 的合规负担。

              近期最尖锐的监管风险是 Choice Financial Group 的 FDIC 同意令，该同意令截至 2024 年仍有效。Choice 是 Mercury
              的主要银行合作方。如果同意令升级为牌照暂停或执法行动，Mercury 需要紧急把客户存款迁至 Column N.A.。Mercury 之前在 2024 年 3 月执行过类似迁移，当时 Federal
              Reserve 对 Evolve 发出 cease-and-desist 同意令后，Mercury 退出 Evolve Bank and Trust。那次迁移证明了运营能力，但也扰动了客户。鉴于涉及存款规模，若
              Mercury 的主要合作方再次被迫迁移，扰动会大得多。

              除合作银行风险外，Mercury 还持续承担 Bank Secrecy Act 和 AML 要求下的合规义务。2025 年年度支付量达到 $248 billion，Mercury 必须运营强健的 SAR
              申报体系，并在大规模下维持 AML 控制。Gramm-Leach-Bliley Act 信息安全义务要求完整的客户数据保护计划。部分 Mercury 服务可能需要州级 money transmitter
              牌照，取决于产品结构和州级监管解释。CFPB 对 Mercury 存款、支付和信贷产品的监督带来额外检查与执法风险，尤其是 CFPB 已加大对规模化非银行 fintech
              的关注。上述每项监管义务都需要持续合规投入，也制造潜在执法敞口。
