        - 产品更强或有社区背书的新进入者（例如大型 VC 支持的 AI 原生银行）
        - 高
        - 索取 cohort 数据：Mercury 账户中，自然转介绍与付费渠道各占多少？跟踪 YC cohort 捕获率随时间变化。
      - - 零费用模式是获客抓手
        - 降息压缩 NIM，迫使公司引入收费，进而可能引发流失
        - 高
        - 索取 NIM 敏感性模型；确认利率降至零时 Mercury 是否会引入收费。
      - - API 优先、开发者友好的银行基础设施
        - 传统银行或 AWS/Stripe 推出全面的开发者银行 API
        - 中
        - 评估 Mercury API 的采用深度；客户是否在 Mercury API 上搭建内部工作流，从而形成锁定？
      - - OCC 牌照申请作为相对 BaaS 同业的监管护城河
        - 牌照被拒或拖延多年；过渡期内，现有合作银行重新出现 Evolve/Synapse 式风险
        - 中
