  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合：从银行账户到财务操作系统
        blocks:
          - type: paragraph
            body: >
              Mercury 最初是面向初创企业的数字优先企业银行账户，2019 年推出支票和储蓄账户。此后，产品已演进为多模块财务平台。 截至 2026 年，核心套件包括：无月费的企业支票和储蓄账户；Mercury
              IO，一张由 Patriot Bank 根据 Mastercard 许可发行的 企业信用卡，无个人担保，提供无限 1.5% 返现；Mercury Treasury，通过 J.P. Morgan 和 Morgan
              Stanley 管理的共同基金提供 最高 3.66% 收益的现金管理产品（最低余额 $250K，当日流动性）；Mercury Venture Debt，面向 VC 支持初创企业、用于延长现金跑道的 融资；以及
              2024 年推出的消费者银行 Mercury Personal。在银行核心之上，Mercury 于 2024 年增加财务软件：带发票 OCR 和 Slack 审批的 AI 驱动账单支付；与 QuickBooks
              Online、Xero 和 NetSuite 同步的会计自动化；开票和员工费用报销； 以及直接 1099 申报。到 2025 年 3 月，IO 已成为 Mercury 客户中使用最多的公司卡。到 2025
              年底，Mercury 服务 300K+ 客户（同比增长 50%），年交易量 $248B（较 2024 年 $156B 增长 59%）。客户多元化正在加速：2025 年新客户中 73% 来自 AI /
              科技初创企业之外，电商（21%）和专业服务是增长最快的垂直领域。NPS 达到 73.8，而银行业平均约 34，反映出跨细分的 强产品市场匹配。
