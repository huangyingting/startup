            title: BaaS 模式依赖与利率敏感性
            body: |
              Mercury 的主要收入来自 $20B 存款产生的利息收入——这一模式天然对利率敏感，也依赖风险投资生态。持续降息或 VC
              融资放缓都可能显著压缩收入。Mercury 通往银行牌照、降低 BaaS 依赖的路径仍不确定，也未公开承诺。
            calloutType: risk
