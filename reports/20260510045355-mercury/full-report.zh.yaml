  - id: TV005
    title: 投资论点破裂与否决触发器
    description: >-
      Monitorable events that would prompt a downgrade of the Mercury investment thesis from buy to track or avoid, with
      transmission mechanism and required investor action.
    columns:
      - 触发项
      - 阈值或事件
      - 对投资论点的传导
      - 行动含义
      - 监测来源
    rows:
      - - OCC 银行牌照被否
        - OCC 发出正式否决函，或主动撤回全国性银行牌照申请
        - 抹去 2–3x 倍数重估上行；迫使 Mercury 长期依赖 BaaS；IPO 估值转向金融科技而非持牌银行可比组； 概率加权估值从 $3.0–4.0B 降至 $1.8–2.5B
        - 下调至跟踪；建模仅 BaaS 的稳态估值；若 Mercury 拿到替代牌照路径，再重新评估
        - OCC 公共档案；OCC 申请搜索门户；Mercury 新闻稿
      - - 联邦基金利率降息周期累计超过 150bps
        - Federal Reserve 从 2024 年峰值水平累计下调目标利率 150+ 个基点
        - 在 $17.9B 存款基础上，NIM 收入估计压缩 25–35%；收入可能降至 $420–490M； 盈利能力承压；收入基数降低后倍数进一步压缩；下行情景概率升至 35–40%
        - 重新评估收入模型；核验 Mercury 的 NIM 对冲；若未披露手续费收入多元化，则下调至跟踪
        - FOMC 会议声明；Federal Reserve 点阵图；Mercury 季度披露
      - - Choice Financial 牌照吊销或暂停
        - FDIC 执法行动将 Choice Financial 同意令升级为牌照暂停或吊销
        - 迫使 Mercury 从主要伙伴紧急迁移存款；扰动 $17.9B 客户存款；引发监管对 Mercury 本身的审查； 在紧密的创业社区损害客户信任
        - 转为回避，直到迁移完成且客户影响评估完毕；需要紧急尽调
        - FDIC 执法档案；Banking Dive；Reuters 金融科技报道
      - - Mercury 盈利能力丧失
        - 2024 年初实现盈利后，连续两个季度出现 GAAP 经营亏损
        - 削弱 Mercury 无需银行牌照也能规模化盈利的核心论点；降低 IPO 可行性；可能需要以稀释性估值再融资； ARR 倍数承压下行
        - 下调至跟踪；要求管理层解释成本驱动因素；评估恢复盈利的路径
        - Mercury 年度信；Sacra 季度估计；Bloomberg 金融科技报道
      - - 重大数据泄露或安全事件
        - 涉及客户 PII 或财务数据披露的 Tier-1 网络安全泄露
        - 触发监管通知义务；产生客户补救成本；在声誉是主要增长驱动的创业社区带来流失风险； FDIC/OCC 可能审查 Mercury 申请的可行性
        - 评估泄露范围；要求提供 SOC 2 审计发现；在决定建仓前监测监管回应
        - SEC 泄露通知；州 AG 公告；Mercury 披露
    enumerationScope:
      coverage: partial
      basis: >-
        Kill triggers derived from Mercury's disclosed risk profile, OCC charter process, Fed rate cycle analysis, and
        BaaS sector precedents as of May 2026. Thresholds are analyst estimates for investor monitoring purposes.
    claimRefs:
      - CV005
      - CV007
      - CV025
      - CV026
      - CV028
    notes: 触发器不是预测，而是结构化监测条件。Mercury 尚未公开披露内部触发阈值或压力测试情景。
  - id: TV006
    title: 最终尽调问题
    description: >-
      The most critical open questions and missing evidence that investors must resolve before or after closing to
      validate the buy thesis and establish ongoing monitoring.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
      - 紧迫性
    rows:
      - - OCC 银行牌照状态与里程碑时间表
        - 2024 年 12 月提交的全国性银行牌照申请，需要具体提交确认、OCC 初步反馈和里程碑时间表。 OCC 不公开提供申请进展更新。
        - 牌照批准 / 否决是主要估值驱动因素，也是 IPO 闸门；缺少里程碑可见度，投资者无法建模概率加权估值区间或投资论点兑现时间
        - 管理层资料室：OCC 往来函件、提交确认、监管事务团队联系人；用 OCC 公开申请搜索门户确认提交
        - 交割前关键
      - - 实际 NIM 利差与存款利率敏感性
        - Mercury 按存款类别披露的 NIM、存款重定价时间表，以及在降息 50、100、150 个基点情景下的收入敏感性。 分析师估计（60–75% NIM）来自外部模型，并非公司披露。
        - NIM 集中度是主要财务风险；缺少披露的敏感性数据，投资者无法精确建模下行情景，也无法判断 Mercury 盈利阈值高于还是低于关键利率水平
        - 管理层资料室：按产品拆分的 NIM、存款重定价时间表、利率敏感性分析； 要求提供董事会批准的财务模型
        - 交割前关键
      - - Choice Financial FDIC 同意令完整条款
        - Choice Financial 同意令全文、所需整改里程碑和预期解决时间表。FDIC 尚未公开完整同意令； 媒体报道只披露了部分条款。
        - 若不了解具体违规事项和整改要求，投资者无法评估升级概率（牌照暂停 / 吊销）； 这是近期最尖锐的单一尾部风险
        - 向 FDIC 提交 FOIA 请求获取 Choice Financial 同意令；直接询问管理层 Mercury 摆脱 Choice 依赖的时间表； 要求提供 Mercury 应急迁移计划文件
        - 交割前关键
      - - 股权结构、优先权负担与清算瀑布
        - 完整股权结构表，列出 Sequoia、a16z、Coatue 在 Series C 轮及此前各轮的优先权叠层； 清算瀑布分析，展示不同退出价格下的普通股价值。
        - 以 $3.5B Series C 轮进入时，累计融资 $500M 带来的优先权负担，可能在低于估值的退出情景中压低普通股价值； 投资者需要理解自己在瀑布中的位置
        - 标准尽调资料室请求；法律顾问审阅投资文件和优先权条款
        - 交割前重要
      - - Mercury Personal 进展与消费者银行指标
        - Mercury Personal 上线以来的获客速度、存款规模和参与度指标。Mercury 于 2025 年宣布消费者银行产品，但尚未披露表现指标。
        - 消费者银行扩张是牛市情景（$9–12B）的关键驱动；缺少进展数据，投资者无法给牛市情景赋予概率， 也无法评估 Mercury Personal 是否蚕食创业公司账户获取
        - 管理层资料室：Mercury Personal 账户数、存款和留存指标；要求提供 90 天留存队列数据， 评估早期进展信号
        - 交割后监测
      - - 银行牌照监管资本要求
        - 作为 de novo 全国性银行，Mercury 需按 OCC/FDIC 要求持有的资本。OCC 对 de novo 银行的资本要求有公开文件，但 Mercury 商业计划对应的具体金额并不公开。
        - 资本要求可能吃掉 Mercury $300M Series C 融资的相当一部分；如果为满足牌照合规还需要额外资本， 现有投资者稀释风险会上升
        - OCC de novo 银行牌照指引；要求管理层提供 Mercury 监管资本预测；评估资本分配后 Series C 剩余资金续航
        - 交割后监测
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks derived from Mercury public disclosures, OCC charter application process, FDIC regulatory
        framework, Sacra financial analysis, and comparable digital bank diligence frameworks as of May 2026.
    claimRefs:
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
    notes: 紧迫性分类反映对交割前投资决策的影响。交割后事项应纳入监测协议和董事会报告要求。
