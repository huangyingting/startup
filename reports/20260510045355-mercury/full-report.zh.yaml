      - number: '3.3'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: >
              Mercury 核心银行业务完全免手续费：无月维护费、无最低余额、无国内电汇费，并无限报销 ATM 手续费。IO 公司签账卡 对所有购买返现 1.5%，且无年费。Mercury Treasury（适用于余额超过
              $500K）提供货币市场基金通道，最高年化净收益 4.39%。 Mercury 不支持现金存款，这对处理现金的企业是实质限制。

              Brex 的 Essentials 计划同样免费（$0/user/month），Premium 计划为 $12/user/month，增加高级费用政策、多实体支持和 ERP 集成。Brex 相对 Mercury
              的竞争护城河具体在卡产品：更高信用额度、更丰富奖励、50+ 个国家的全球发卡和差旅管理。 Ramp 免费提供核心支出管理，通过交换费变现；它不以独立银行产品形式提供带 FDIC
              保险的存款，设计上是与银行服务商搭配使用。 Relay 基础层免费并接入 Allpoint ATM 网络；付费层增加无限账户和会计席位。Bluevine 对最高 $250K 支票余额提供 2.00% APY，
              对现金较多的企业是有意义的差异点；但其国内电汇收费 $15，而 Mercury 为零。JPMorgan Chase Business Complete Banking 起价 $15/月（保持 $2,000
              余额可免），收取国内电汇费，也没有适合初创企业的快速开户体验。

              用户满意度上，Mercury 领先其竞争组：NPS 75，而行业平均 34；G2（121 条评价）和 NerdWallet 均为 4.5/5 星；Trustpilot 为 4.0/5（2,487
              条评价）。Trustpilot 上的负面客户投诉集中在电汇延迟、无法解释的账户关闭和支持响应速度上——这是合规驱动型 银行平台的常见模式，并非 Mercury 独有。
