      - number: '5.3'
        title: 安全、合规与信任基础设施
        blocks:
          - type: paragraph
            body: >
              Mercury 安全架构把技术控制与 FDIC 存款保护结合起来。每个 Mercury 账户都作为独立 DDA（活期存款账户）搭建， 存款通过 sweep 网络分散至一组 FDIC 保险银行，每名客户最高覆盖
              $5M，97%+ 存款受覆盖。Mercury Vault 提供对每个客户 资金保护状态的实时自动可见性。Mercury 持有合作方和产品评测方提及的 SOC 2 Type II 合规，但完整报告需要
              NDA，未公开可得。 认证安全严格：强制使用 TOTP 和 Touch ID 进行 MFA，并因 SIM-swap 漏洞明确禁止 SMS 2FA。其他控制包括：针对钓鱼域名、 信息窃取程序和恶意软件的暗网监控；用
              HIBP 对已知泄露数据库做凭证检查；ACH 借记授权控制，允许企业将授权供应商 加入白名单；只收款子账户，使客户可在不暴露主账户号码的情况下收款；以及设备反钓鱼验证。分层用户权限支持只读记账员访问、
              仅卡员工访问和完整管理员控制。关键在于，Choice Financial Group（两家活跃合作银行之一）在 2023 年收到联邦监管同意令， 代表 Mercury 客户仍面临持续监管风险。Mercury 在
              Fed 执法行动后于 2024 年切断 Evolve Bank 关系，显示出响应力； 但合作银行监管问题反复出现，会构成结构性风险，直到 OCC 牌照取得前都会持续。
