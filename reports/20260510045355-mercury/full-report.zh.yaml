      - number: '8.4'
        title: 退出准备度、论点风险与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              Mercury 近期最可信的退出路径是 IPO，这与 CEO Immad Akhund 2025 年 3 月在 Bloomberg 上的公开表述一致：Mercury“预计未来上市”。OCC 牌照结果是 IPO
              时点的核心闸门：投行和公开市场投资者在承销银行板块 IPO 前，需要看清 Mercury 的监管状态。若牌照在 2026–2027 年获批，IPO 可能在 2027 年末或 2028
              年具备可行性，发行时目标估值为 $6–10 billion。若牌照被拒，Mercury 可能需要以 fintech 而非银行定位自身，对应不同可比公司组，公开市场估值也可能更低。

              被大型银行或金融机构战略收购，是第二退出情景。Mercury 的 300,000 个企业账户、$17.9 billion 存款和 80+
              NPS，对希望在初创公司银行细分获得数字能力的现有机构具有显著战略价值。JPMorgan Chase、Bank of America 和 Goldman Sachs Marcus
              都曾投资或收购数字银行能力。若战略收购价格较上一轮私募溢价 20–30%，对应 $4.2–4.6 billion 退出——相对当前 Series C 价格上行有限，但比 IPO 路径风险更低。

              最重要的最终尽调问题集中在三个会决定投资论点的未知数。第一，投资者需要了解当前 OCC 申请状态，包括 OCC 的任何初步往来函件和预期里程碑排期。第二，应从 data room 调取实际 NIM
              水平和存款重定价时间表，以精确建模利率敏感性。第三，Choice Financial 的 FDIC 同意令完整条款和解决时间表，需要直接 FDIC FOIA
              申请或管理层披露；公开记录不足以评估升级概率。没有这三个数据点，买入建议只能建立在有利但未验证的监管路径假设之上。若投资者无法拿到令人满意的答案，应在监管图景清晰前把评级下调为跟踪。
