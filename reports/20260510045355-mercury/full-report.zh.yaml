  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入结构
        blocks:
          - type: paragraph
            body: |
              Mercury 通过三条主要收入流变现：客户存款的净息差（NIM）、IO Corporate Card 和借记产品的交换费，以及高级产品层的
              SaaS 式订阅费。第四条较小收入流包括电汇和外汇交易费，以及 Mercury Spark 收入型贷款费用。Mercury 未公开按收入流披露
              收入结构，因此各部分确切占比只能基于第三方研究和行业基准进行分析估算。

              基于 Sacra 分析师估计和银行业可比公司，NIM 预计约占 Mercury 总收入 60–75%。这一点与 2025 年观察到的收入减速一致：
              随着 Federal Reserve 在 2024 年末和 2025 年降基准利率，Mercury 收入增速从 97% 同比（2024）放缓至约 41% 同比
              （2025 年 Q3 年化），减速可直接归因于 NIM 压缩。交换费预计占收入 15–25%，与 300K+ 企业客户处理 $248B 年交易量的
              卡消费规模一致。来自 Teams 计划（$35–$350/月）和 Treasury 管理的 SaaS 费用估计占 10–20%，也是质量最高、最不受利率
              影响的收入。

              Mercury FY2024 收入约 $500M，较 FY2023 约 $254M 增长 97%。到 2025 年 Q3，年化 run rate 已达到约 $650M。
              2024 年年度信确认，2025 年是公司连续第三年盈利，并连续 10 个季度实现 GAAP 和 EBITDA 正值；CEO 将其描述为有意不以任何代价
              牺牲利润率换增长的决定。2025 年 12 月提交的 OCC 牌照申请引入长期收入模式可选性：全国性银行牌照将允许 Mercury
              赚取完整 NIM 利差，而不再与 BaaS 合作银行分享；若牌照获批，利润率可能显著扩大。
