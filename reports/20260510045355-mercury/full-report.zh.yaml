      - number: '7.2'
        title: 运营、合作方与技术风险
        blocks:
          - type: paragraph
            body: >-
              Mercury 的运营风险主要由其 BaaS 架构决定。客户存款由合作银行持有，而不是 Mercury 直接持有；任何合作银行遭遇监管行动，都会直接传导至 Mercury 客户。Mercury 当前合作银行策略以
              Choice Financial Group 为主要存款持有人，Column N.A. 为第二合作方。Choice 仍处于 FDIC 同意令之下，制造了系统性情景：Mercury
              的主要银行关系可能在没有提前通知的情况下被打断。Column N.A. 是相对新的银行，尚未在 Mercury 约 $17.9 billion 的完整存款规模下被验证。2024 年 BaaS 中间件提供商
              Synapse 破产，引发全行业对 BaaS 存款安排韧性的担忧，也提高了包括 Mercury 在内所有依赖 BaaS 的 fintech 的监管审查强度。

              网络安全风险被 Mercury 的 SOC 2 Type II 认证部分缓释；该认证说明基线信息安全控制已由独立方审计并验证。但 SOC 2 认证不覆盖完整第三方供应商链，Mercury
              的云原生架构也依赖云基础设施可用性。Mercury 的安全页面显示其采用多层数据保护方法，但公司尚未公开确认云提供商冗余策略或多云架构细节。重大数据泄露或支付系统中断，会让 Mercury
              面临监管罚款、客户补偿成本，以及在其核心客户群——紧密连接的初创社群——中的声誉损害。

              账户冻结争议是公开评论数据里最可见的运营风险。Mercury 的 Trustpilot 评论，以及 Finder、NerdWallet
              的独立银行评论，都记录了一个稳定模式：账户在合规审查中被冻结，而客户可用的自助争议解决能力有限。对把 Mercury 当作主要运营账户的初创公司来说，突发账户冻结可能造成运营灾难。Mercury
              的国际客户基础覆盖 200+ 个国家的企业，这一风险进一步升高，因为欺诈敞口和 AML 合规复杂度都随之增加。关键人风险集中在 CEO Immad Akhund
              身上，他是公司的主要公开面孔、投资者关系负责人和产品愿景持有人。公司未公开披露继任计划，这是治理缺口，机构投资者应在与 Mercury 董事会的尽调沟通中处理。
