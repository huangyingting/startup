      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              Mercury 自创立以来，累计完成超过 $500M 的一级和二级资本融资。融资历程从 2017 年用于早期产品开发的
              种子轮开始，经由支持 2019 年上线的 Series A，到 2021 年 7 月以 $1.62B 投后估值完成 $120M Series B
              （由 CRV 领投，a16z、Coatue 等参与），再到 2025 年 3 月以 $3.5B 投后估值完成 $300M Series C——较
              Series B 估值翻倍有余。Series C 由 Sequoia Capital 领投（这是其首次投资 Mercury），新投资方 Spark
              Capital 和 Marathon 参与，Coatue、CRV、Andreessen Horowitz 等老股东跟投。

              CEO Akhund 表示，$300M Series C 的「大部分」为一级资本，并包含允许现有股东出售股份的二级部分。公司宣布
              之后还会推出更广泛的员工股权要约收购。Mercury 拒绝披露一级 / 二级资本拆分，或创始人取得流动性的确切规模。
              截至 2025 年初，公司已连续 10 个季度在 EBITDA 和 GAAP 净利润口径盈利，说明 Series C 更像机会型和战略型融资，
              而不是生存性融资。

              募资用途包括产品创新、收购互补金融科技细分领域公司、招聘，以及长期财务灵活性。公司尚未公布正式 IPO 时间表，
              但 Tim Mayopoulos（上市公司老兵）和 Sonya Huang 加入董事会，释放了为潜在 IPO 做准备的信号。Mercury 还取得了
              授信额度，用于支持面向客户的创业债产品；但条款未公开披露。
