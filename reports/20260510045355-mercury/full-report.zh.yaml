              时披露的客户包括 Lunchclub、Mighty、Linear；到 2025 年，客户基础已扩得足够宽，不再依赖任何单一具名企业客户，集中度风险显著下降。Mercury 在 Synapse / Evolve
              监管危机中于 2024 年 3 月结束与 Evolve Bank 的关系，主动将客户迁移至 Column N.A. 和 Choice Financial
              Group——这次成功留存行动证明了运营韧性。Mercury Personal 消费者产品和 Mercury for Investors 进一步分散了收入来源和客户生命周期。
