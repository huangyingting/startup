              Mercury 的 $500M 2024 年收入、10 个季度盈利和 $20B 存款基础，都是公司在融资公告语境中披露的数据。
              这些数据尚未通过独立审计或 SEC 文件验证。投资人应将其视为指示性信息，并把经审计财务报表列为尽调前置条件。
