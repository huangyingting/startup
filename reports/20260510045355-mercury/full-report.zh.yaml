  - id: FV001
    title: Mercury 推荐逻辑流
    type: flow
    layout: standard
    summary: 这条链把 Mercury 的规模、盈利证明、风险因素和估值连接到最终买入建议，并给出中等信心和高风险评级。每个节点代表一个证据支柱或风险关口；边展示投资逻辑如何从输入流向推荐结论。
    data:
      nodes:
        - id: n1
          label: 规模证明
          detail: 300K 企业账户、$17.9B 存款、$650M ARR、$156B 支付量；全部以 30–64% 年增速增长
        - id: n2
          label: 盈利证明
          detail: 自 early 2024 起盈利；连续 10+ 个季度盈利；NPS 80+，行业平均 34
        - id: n3
          label: OCC 牌照催化
          detail: December 2024 提交申请；若获批，持牌银行倍数重估可从 5x ARR 抬升到 10–15x ARR
        - id: n4
          label: NIM 风险
          detail: 60–75% 收入依赖 NIM；Fed 150bps+ 降息周期会把收入压缩 25–35%
        - id: n5
          label: 合作银行风险
          detail: Choice Financial 的 FDIC 同意令已生效；$17.9B 存款存在被迫迁移风险；Column N.A. 尚未验证
        - id: n6
          label: 估值校验
          detail: 5.4x ARR 倍数低于金融科技 SaaS 的 22–24x；与持牌数字银行 5–7x 可比公司相符；合理但不便宜
        - id: n7
          label: 推荐结论
          detail: 买入 — 中等信心 — 高风险 — 估值合理；以 $3.5B 入场，保留牌照期权；按高风险控制仓位，并为后续融资预留资本
      edges:
        - from: n1
          to: n6
          label: 支持公允价值
        - from: n2
          to: n6
          label: 验证商业模式
        - from: n3
          to: n7
          label: 牛市情景催化
        - from: n4
          to: n7
          label: 熊市情景触发
        - from: n5
          to: n7
          label: 近期尾部风险
        - from: n6
          to: n7
          label: 入场价格纪律
    approximationNotes: null
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV007
      - CV011
      - CV024
  - id: FV002
    title: 估值对收入倍数的敏感性
    type: bar
    layout: standard
    summary: >-
      将不同 ARR 倍数套用到 $650M ARR 基准估计，得到 Mercury 的隐含股权估值，并展示倍数扩张（牌照获批）或压缩（牌照被拒 / NIM 逆风）如何驱动估值区间。当前 $3.5B Series C 价格约对应
      5.4x ARR。
    data:
      items:
        - label: 熊市情景（2x ARR）
          value: 1.3
        - label: SVB 类比（4x ARR）
          value: 2.6
        - label: 当前入场（5.4x ARR）
          value: 3.5
        - label: 基准上限（6x ARR）
          value: 3.9
        - label: Wise / SoFi 类比（7x ARR）
          value: 4.6
        - label: 中性偏牛（10x ARR）
          value: 6.5
        - label: 牌照重估（12x ARR）
          value: 7.8
        - label: Nubank 类比（17x ARR）
          value: 11.1
    approximationNotes: >-
      估值单位为 USD billions。ARR 基准 $650M 来自 Sacra mid-2025 估计。倍数区间来自可比公司分析。熊市情景（2x）反映牌照被拒和 NIM 压缩。持牌银行重估目标（10–17x）假设 OCC
      牌照获批，并完成运营模式切换。
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV016
  - id: FV003
    title: 分情景估值与回报区间
    type: range
    layout: wide
    summary: 在熊市、基准和牛市情景下，给出 Mercury 的低、中、高估值估计，以及相对 $3.5B Series C 入场价的隐含回报。基准情景确认入场价合理；牛市情景需要牌照获批；熊市情景意味着明显下行。
    data:
      items:
        - label: 熊市情景
          low: 1300
          mid: 1650
          high: 2000
          unit: USD M
        - label: 基准情景
          low: 3000
          mid: 3500
          high: 4000
          unit: USD M
        - label: 牛市情景
          low: 6000
          mid: 9000
          high: 12000
          unit: USD M
    approximationNotes: >-
      所有数值单位为 USD millions。熊市情景（20% 概率）：牌照被拒，或 Fed 降息超过 150bps 导致 NIM 压缩 25–35%。基准情景（55% 概率）：牌照待批延续到 2026，ARR 增长 30%，NIM
      稳定。牛市情景（25% 概率）：牌照在 mid-2026 前获批，ARR 增长 45%+，持牌银行倍数重估。概率信号是分析师用于投资者监测的估计，不是 Mercury 披露的预测。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
      - CV027
      - CV028
      - CV029
  - id: FV004
    title: Mercury 投资 KPI — IC 评分卡
    type: kpi
    layout: standard
    summary: 围绕七个投资维度给出可供 IC 使用的评分——市场、产品证明、护城河、经济性、风险、估值和证据质量——采用 1–5 分制，5 代表同类最佳，1 代表应淘汰。综合得分 3.3/5 支持买入建议，但仓位需要匹配高风险。
    data:
      items:
        - label: 市场机会
          value: 4 / 5
          unit: null
          note: $625B+ 美国 SMB 银行 TAM；新银行细分市场年增长 15–20%；Mercury 渗透率 <1%
        - label: 产品证明
          value: 4 / 5
          unit: null
          note: 300K 账户、80+ NPS、$17.9B 存款、$156B 支付量，盈利运营已确认
        - label: 竞争护城河
          value: 3 / 5
          unit: null
          note: NPS 和转换成本护城河较强；BaaS 模式相对持牌竞争者存在产品同质化风险
        - label: 单位经济性
          value: 3 / 5
          unit: null
          note: 在 $650M ARR 下盈利；NIM 集中度和未披露利润率限制估计精度；5.4x ARR 入场价合理
        - label: 风险画像
          value: 2 / 5
          unit: null
          note: 高 — OCC 牌照不确定性、Choice Financial 同意令、NIM 压缩同时未解决
        - label: 估值吸引力
          value: 3 / 5
          unit: null
          note: 5.4x ARR 估值合理；不便宜；牌照期权未计价；若牌照前估值高于 $4.0B，评级下调为回避
        - label: 证据质量
          value: 3 / 5
          unit: null
          note: 收入 / 存款 / 增长证据强；NIM 利差、股权结构、同意令条款、OCC 往来函件证据弱
        - label: 综合得分
          value: 3.1 / 5
          unit: null
          note: 七个维度加权平均；支持买入，但需遵守高风险仓位纪律
    approximationNotes: 评分是分析师基于截至 May 2026 的公开证据，在 1–5 分制下给出的估计。并非 Mercury 披露或经审计。风险画像得分 2/5，反映监管、合作银行和利率风险同时存在，且仅靠公开尽调无法逐一化解。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV011
      - CV024
      - CV030
