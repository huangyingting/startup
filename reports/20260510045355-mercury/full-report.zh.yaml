  - id: FU001
    title: Mercury 客户旅程图
    type: journey-map
    layout: standard
    summary: 六阶段旅程，展示典型初创公司创始人如何发现、注册、激活、扩展并主动推荐 Mercury——这条病毒式推荐回路支撑 Mercury 的主要获客渠道。
    data:
      items:
        - label: 发现
          detail: '创始人通过 YC 批次网络、加速器推荐、VC 被投组合指导，或其他创始人的口碑接触 Mercury。Mercury 的 80+ NPS 推动自然推荐。主要渠道：创始人网络（公司披露为 #1 获客驱动）。'
        - label: 注册与入驻
          detail: 数字优先开户约 ~10 分钟完成；无需到网点。KYC/KYB 在线完成。Mercury 干净的 UI 和快速审批，使其区别于传统银行按周计算的入驻流程。 第一天起通过扫存网络合作伙伴获得最高 $5M FDIC 保险。
        - label: 核心激活
          detail: 创始人为支票账户入金、订购借记卡、设置直接存款和电汇指令。Mercury 会计集成（QuickBooks、Xero）自动连接。 首批交易在 1–2 个工作日内处理。
        - label: 产品扩展
          detail: 公司扩张后，创始人加入 Mercury Treasury（闲置现金收益）、Mercury IO 信用卡（1.5% 返现、无个人担保）、账单支付自动化、开票和费用管理。每个产品都会增加切换成本和 ARPU。
        - label: 员工和投资人网络
          detail: 财务团队加入；用 RBAC 配置多个用户角色。加入 Mercury for Investors，方便 VC/董事会查看。Mercury Personal 交叉销售给创始人和关键员工。团队工具权益包启用。
        - label: 推荐与转介绍
          detail: 满意的创始人把 Mercury 推荐给被投公司、YC 同批成员和 LinkedIn 网络。Mercury 的口碑引擎复利式放大； 在未披露大规模付费 CAC 支出的情况下触达 300K+ 企业。
    approximationNotes: 旅程阶段由 Mercury 产品文档、年度信和 Sacra 分析估算。各阶段之间的实际转化率未公开披露。
    claimRefs:
      - CU001
      - CU002
      - CU004
      - CU009
      - CU013
