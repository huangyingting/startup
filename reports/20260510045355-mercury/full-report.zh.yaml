      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              Mercury 的 GTM 锚定五类买方细分，差异来自公司阶段、收入模式和财务运营成熟度。获 VC 支持的初创企业是最初客群； 它们重视快速开户、带 FDIC
              保险的合作银行覆盖、与创业债供应商集成，以及来自投资人和加速器网络的推荐。 到 2024 年，初创企业在客户中占比低于 40%。电商企业是第二大客群，驱动因素包括高频支付需求、多渠道入账和付款对账需求。
              扩张期公司（Series A 至 C）越来越需要账单支付自动化、公司费用卡和基于角色的审批流——这些功能 Mercury 已在 2024 年推出。 专业服务 SMB 使用 Mercury 做开票和会计集成。VC
              基金实体是规模较小但存款余额较高的子细分。所有细分中， 预算负责人通常是 CEO 或 CFO，主要采用触发点包括公司设立、银行关系中断（SVB 倒闭、Evolve Bank 迁移），或需要与软件
              集成的财务工作流。Mercury 平均客户每年产生约 $750,000 支付量，客群更偏向收入较高的 SMB，而非微型企业。
