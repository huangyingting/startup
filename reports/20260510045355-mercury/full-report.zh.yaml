      - number: '1.5'
        title: 负面事件与监管风险
        blocks:
          - type: paragraph
            body: |
              Mercury 面临若干需要尽调的重大负面事件。其中最重要的是合作银行关系和已记录的合规失误。

              Mercury 的关键合作银行 Evolve Bank & Trust 于 2024 年 6 月收到 Federal Reserve 执法行动，原因是其金融科技
              合作关系中的 AML、风险管理和消费者合规存在缺陷。Alex Johnson（Fintech Takes）的调查报道记录称，Mercury
              据称积极参与了 Evolve 的合规失误，包括：（1）应 Mercury 要求，为受制裁或 FATF 灰名单辖区的高风险用户加入白名单；
              （2）据称 Mercury 曾有一段时间缺乏交易监控；（3）某交易监控供应商系统产生过多警报后被关闭。Mercury 对部分
              表述提出异议，但尚未提供全面的公开反驳。Mercury 于 2025 年 3 月切断与 Evolve 的关系，并将客户迁移至
              Choice Financial Group、Column N.A. 和 Patriot Bank。

              2024 年 7 月，Mercury 宣布关闭在 37 个国家有相关地址的企业账户，其中包括 13 个非洲国家（Nigeria、Cameroon、
              DR Congo 等）；驱动因素是 FATF 灰名单和合作银行合规压力。此举在非洲初创生态引发强烈批评。SVB 倒闭后，该生态
              已经开始依赖 Mercury。批评者指称公司存在地域歧视，并未落实个体化风险评估。另外，Mercury 也间接暴露于 2024 年
              4 月 Synapse Financial Technologies 破产事件。

              截至本报告日期，公开信息尚未显示 Federal Reserve 或 OCC 对 Mercury 本身（区别于其合作银行）采取直接执法行动。
              但 Fintech Takes 记录的合规文化问题，以及 Mercury 自身 2024 年年度信承认合规团队规模翻倍，都是重大尽调因素。
            claimRefs:
