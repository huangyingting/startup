  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与建议
        blocks:
          - type: paragraph
            body: >-
              Mercury 已为美国初创公司和小企业搭建起最受信任的数字银行平台，到 2025 年 3 月达到 300,000 个企业账户，存款 $17.9 billion，年化收入约 $650 million。公司在
              2024 年初实现盈利，并至少连续三个季度维持盈利；对 Mercury 所处阶段的 fintech 来说，这是罕见里程碑。NPS 80+，高于行业平均 34，证明客户关系稳固，并转化为低流失和高自然推荐增长。

              投资论点有四根支柱。第一，Mercury 已证明，BaaS 模式数字银行即便没有自有牌照，也能做到规模、盈利和客户忠诚度；商业模式本身成立。第二，2024 年 12 月提交的 OCC
              全国性银行牌照申请，是中期催化剂；若获批，将消除合作银行费用、提高直接 NIM 捕获率，从结构上改善单位经济模型。第三，FY2024 $156 billion 支付量同比增长
              64%，说明支付处理飞轮越来越不依赖存款型收入。第四，300,000+ 企业账户和 80+ NPS 形成防御性护城河；现有银行或竞争 fintech 若要复制，需要大量时间和资本。

              反向论点集中在三项风险。Mercury 收入的 60–75% 依赖 NIM，在降息环境中利率敏感度很高。OCC 牌照申请时间表为 18–36 个月，获批没有保证；若被拒，公司将无限期依赖 BaaS。Choice
              Financial Group 仍处于 FDIC 同意令之下，带来近期合作银行风险，并可能迫使公司进行成本高昂的存款迁移。合在一起，投资论点是非对称的：牌照获批和持续增长带来的上行很大，但监管失败或 NIM
              压缩造成的下行同样实质。

              建议是在当前入场价买入，置信度中等。$3.5 billion Series C 估值对应 5.4x forward ARR 倍数；考虑 Mercury
              的增长率、盈利能力和客户忠诚度，这一倍数合理。估值态度应为公允：价格既没有便宜到显而易见，也没有贵到应当回避。风险评级为高，因为监管、利率和合作银行风险叠加，且在 OCC 牌照结果落地前无法完全缓释。
