      - - 多产品深度（资金管理、风险债务、账单支付、开票）
        - Ramp 扩展到资金管理和银行存款；Mercury 的工作流产品被行动更快的竞争对手复制
        - 中
        - 索取产品渗透率：200K 客户中，有多少比例使用 2+ 产品？跟踪 NIM 之外的收入结构。
      - - 低切换成本是一把双刃剑：加入 Mercury 容易，离开也容易
