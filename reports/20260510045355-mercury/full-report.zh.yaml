      - number: '3.4'
        title: 护城河耐久度与竞争风险
        blocks:
          - type: paragraph
            body: >
              Mercury 最耐久的竞争护城河，是其在创始人生态中的信任型分发。Y Combinator、加速器、VC 投资人和初创社区会自然推荐
              Mercury，原因是其产品可靠且零费用。这种社区网络效应沉淀为品牌资产，新进入者很难复制：一家新初创企业注册成立时，Mercury 往往就是创始人网络给出的默认推荐。仅 YC /
              加速器管道就代表持续、高价值的新开户注册来源，而且不需要付费获客。

              OCC 全国性银行牌照申请（2025 年 12 月）是加深战略护城河的一步。如果获批，Mercury 将拥有自有银行基础设施， 不再依赖 Choice Financial Group 和 Column N.A.
              作为合作银行。这会降低监管传导风险，并开启直接贷款能力，使 Mercury 有可能在创业债和 SMB 信贷产品上竞争；目前这些产品仍通过第三方合作伙伴提供。牌照还会把 Mercury 与纯 BaaS 依赖型
              金融科技公司区分开，提高其监管可信度。

              主要竞争风险包括：（1）利率压缩——Mercury 偏 NIM 的收入模式周期性暴露于 Fed 降息，已使其同比增速从 97%（2024）降至 41%（2025）；（2）Ramp
              生态扩张至银行相邻产品，可能让其成为部分客户的银行替代品；（3）传统银行数字化改善——Chase Business Complete Banking 在 2025 年小企业数字渠道排名第 1；（4）Evolve
              Bank & Trust 2024 年监管同意令 给 Mercury 带来标题风险，尽管 Mercury 随后已转向 Column N.A. 作为主要合作方；（5）零费用数字银行普及带来的商品化风险。
              Trustpilot 负面数据说明，账户关闭投诉损害了一部分客户的信任；不过 Mercury 总体 NPS 75 表明，这还不是多数人的体验。
