      - number: '2.2'
        title: 市场规模测算——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多个独立市场规模估算覆盖 neobanking 和 SMB 数字银行，但地理颗粒度不同。美国商业银行市场是包含 Mercury TAM 的 最宽口径，2024 年规模为 $231.9 billion，预计到
              2033 年达到 $351.8 billion（BAI）。美国 neobanking 市场本身 2024 年估计为 $34.56 billion，并将以 27.31% CAGR 增至 2032 年的
              $263.67 billion（Markets and Data）。 全球 neobank 市场提供了额外参照：Grand View Research 估计 2025 年全球 neobanking 市场为
              $211.2 billion， 至 2033 年 CAGR 为 61.9%；Fortune Business Insights 估计其为 $210.2 billion，至 2034 年 CAGR 为 49.3%。
              Awisee 的第三个估算将 2025 年市场规模置于 $382.8 billion——接近 2 倍的差距反映出方法论差异。美国整体 Fintech 市场 2025 年估计为 $58.01 billion，预计到
              2031 年达到 $135.42 billion，CAGR 为 15.18%（Mordor Intelligence）。 针对 Mercury 具体可服务细分市场——数字原生、主动愿意切换到 neobank
              的美国 SMB——没有任何单一权威来源发布正式 SAM。将企业账户收入占比（64-67%）套用到 $35 billion 的美国 neobanking 市场估算，可得到粗略 SAM 为 $22-24
              billion。Mercury 的 SOM 由其实际运营证明：截至 2025 年 Q3，年化收入 $650 million，存款 $20 billion。企业账户在 全球 neobank 收入中占
              64.71-67%，确认面向企业的细分市场是 neobank 最大收入驱动因素。
