      - number: '8.2'
        title: Valuation Analysis and Comparable Set
        blocks:
          - type: paragraph
            body: >-
              Mercury's $3.5 billion Series C valuation (March 2025) can be assessed through three lenses: revenue
              multiple,

              deposits multiple, and comparable company benchmarks. At approximately $650 million in annualized revenue
              (Sacra

              mid-2025 estimate), the implied ARR multiple is 5.4x. At $17.9 billion in deposits, the price-to-deposits
              ratio

              is approximately 0.20x — materially below the 0.5–1.0x range that licensed digital banks with growth
              profiles

              similar to Mercury have historically commanded on a deposit-adjusted basis.


              The comparable set spans fintech-SaaS companies, licensed neobanks, and payments companies. Brex traded at

              approximately 24x ARR at its Series D ($12.3B, 2022) and Ramp reached $13.4B valuation in late 2024 at

              approximately 22x ARR — both reflecting SaaS-like revenue quality with minimal NIM exposure. Mercury's
              discount

              to these comps is appropriate given its higher NIM concentration and BaaS dependency, but the discount is
              arguably

              excessive at 5.4x given Mercury's profitability and deposit flywheel.


              Public digital bank comps are more instructive for a licensed-bank scenario. Nubank (NYSE: NU) trades at

              approximately 17x trailing revenue with a $50 billion market cap as of 2024, benefiting from a full
              banking

              license in Brazil. SoFi (NASDAQ: SOFI) trades at approximately 5x revenue with an $8 billion market cap,

              reflecting a licensed bank with slower growth. Wise (LSE: WISE) trades at approximately 7x revenue at £8
              billion

              market cap for its payments-focused model. Chime reached a $25 billion peak valuation in 2021 at
              approximately

              17x ARR as a consumer neobank pursuing a bank charter. Mercury's 5.4x multiple is at the low end of the
              licensed

              digital bank range and well below fintech-SaaS comps, suggesting the market is pricing charter risk at a
              significant

              discount.


              Key valuation takeaways: at current entry, Mercury is priced as a regulated bank, not a high-growth
              fintech. If

              the OCC charter is approved, the multiple should re-rate toward the 10–15x range, implying a 2–3x return
              from

              current levels. If the charter is denied and NIM compresses, the multiple could compress toward 2–3x ARR,
              implying

              a $1.3–2.0B valuation. The current price offers asymmetric upside but is not a compelling discount for a
              risk-off

              investor. The base case assumes a 5–6x ARR at $3.0–4.0B fair value for a stable-charter-pending scenario.
