            title: Revenue Figures Are Unaudited Company Disclosures
            body: |
              Mercury's $500M 2024 revenue, 10 quarters of profitability, and $20B deposit base are
              company-disclosed figures shared in the context of a fundraise announcement. They have not
              been verified through independent audit or SEC filing. Investors should treat these as
              indicative and request audited financials as a diligence prerequisite.
