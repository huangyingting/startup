  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >-
              Mercury operates as a non-bank fintech under a Banking-as-a-Service (BaaS) model, holding customer
              deposits

              through partner banks rather than directly. This structure creates a layered regulatory dependency that is
              the

              single most important risk category in this report. Mercury is not itself an FDIC-insured depository
              institution;

              it relies on Choice Financial Group and Column N.A. to hold customer deposits and provide FDIC insurance

              pass-through coverage up to $5 million per customer via sweep networks.


              In December 2024, Mercury filed applications for both an OCC National Bank Charter and FDIC deposit
              insurance,

              a transformational step that, if approved, would make Mercury a fully independent bank. However, national
              bank

              charter applications historically take 18 to 36 months to process, and the OCC evaluates applicants on
              capital

              adequacy, management quality, business plan viability, and community reinvestment commitments. A denial
              would

              force Mercury to continue its BaaS model indefinitely. The BaaS regulatory environment has also become
              more

              hostile following the Synapse bankruptcy in 2024, which may extend Mercury's approval timeline and
              increase

              compliance burdens on all BaaS-dependent fintechs.


              The most acute near-term regulatory risk is Choice Financial Group's FDIC consent order, active as of
              2024.

              Choice is Mercury's primary banking partner. If the consent order escalates to license suspension or
              enforcement

              action, Mercury would need to execute an emergency migration of customer deposits to Column N.A. Mercury

              previously executed a similar migration in March 2024, when it exited Evolve Bank and Trust after the
              Federal

              Reserve issued a cease-and-desist consent order against Evolve. That migration demonstrated operational

              competence but also caused customer disruption. A second forced migration from Mercury's primary partner
              would

              be materially more disruptive given the volume of deposits involved.


              Beyond partner bank risk, Mercury faces ongoing compliance obligations under the Bank Secrecy Act and

              Anti-Money Laundering requirements. With $248 billion in annual payment volume in 2025, Mercury must
              operate

              a robust SAR filing program and maintain AML controls at significant scale. Gramm-Leach-Bliley Act
              information

              security obligations require a comprehensive customer data protection program. State money transmitter
              licensing

              may apply to certain Mercury services depending on product structure and state-level regulatory
              interpretation.

              CFPB oversight of Mercury's deposit, payment, and credit products creates additional examination and
              enforcement

              risk, particularly as the CFPB has increased its focus on non-bank fintechs operating at scale. Each of
              these

              regulatory obligations requires ongoing compliance investment and creates potential enforcement exposure.
