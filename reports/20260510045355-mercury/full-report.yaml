  - id: FV004
    title: Mercury Investment KPIs — IC Scorecard
    type: kpi
    layout: standard
    summary: >-
      IC-ready scoring across seven investment dimensions — market, product proof, moat, economics, risk, valuation, and
      evidence quality — rated on a 1–5 scale where 5 is best-in-class and 1 is disqualifying. Overall composite score
      of 3.3/5 supports a buy recommendation with appropriate position sizing for high risk.
    data:
      items:
        - label: Market Opportunity
          value: 4 / 5
          unit: null
          note: $625B+ U.S. SMB banking TAM; neobank segment growing 15–20% annually; Mercury has <1% market penetration
        - label: Product Proof
          value: 4 / 5
          unit: null
          note: 300K accounts, 80+ NPS, $17.9B deposits, $156B payment volume, profitable operations confirmed
        - label: Competitive Moat
          value: 3 / 5
          unit: null
          note: Strong NPS and switching cost moat; BaaS model creates product parity risk vs chartered competitors
        - label: Unit Economics
          value: 3 / 5
          unit: null
          note: Profitable at $650M ARR; NIM concentration and undisclosed margins limit precision; 5.4x ARR entry fair
        - label: Risk Profile
          value: 2 / 5
          unit: null
          note: >-
            High — OCC charter uncertainty, Choice Financial consent order, NIM compression all unresolved
            simultaneously
        - label: Valuation Attractiveness
          value: 3 / 5
          unit: null
          note: Fair at 5.4x ARR; not cheap; charter optionality not priced; downgrade to avoid above $4.0B pre-charter
        - label: Evidence Quality
          value: 3 / 5
          unit: null
          note: Strong on revenue/deposits/growth; weak on NIM margins, cap table, consent order terms, OCC correspondence
        - label: Composite Score
          value: 3.1 / 5
          unit: null
          note: Weighted average across seven dimensions; supports buy with high-risk sizing discipline
    approximationNotes: >-
      Scores are analyst estimates on a 1–5 scale based on public evidence as of May 2026. Not Mercury-disclosed or
      audited. Risk profile score of 2/5 reflects the simultaneous presence of regulatory, partner bank, and interest
      rate risks that cannot be individually resolved through public due diligence alone.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV011
      - CV024
      - CV030
