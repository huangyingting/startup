      - number: '7.2'
        title: Operational, Partner, and Technology Risk
        blocks:
          - type: paragraph
            body: >-
              Mercury's operational risk profile is shaped primarily by its BaaS architecture. Customer deposits are
              held

              by partner banks, not Mercury directly, meaning that regulatory action against any partner bank propagates

              directly to Mercury customers. Mercury's current partner bank strategy relies on Choice Financial Group

              as the primary deposit holder and Column N.A. as a secondary partner. Choice's active FDIC consent order

              creates a systemic risk scenario in which Mercury's primary banking relationship could be disrupted
              without

              advance notice. Column N.A. is a relatively new bank that has not been tested at Mercury's full deposit

              scale of approximately $17.9 billion. The Synapse bankruptcy in 2024, involving a BaaS middleware
              provider,

              created sector-wide concerns about the resilience of BaaS deposit arrangements and increased regulatory

              scrutiny of all BaaS-dependent fintechs including Mercury.


              Cybersecurity risk is partially mitigated by Mercury's SOC 2 Type II certification, which indicates that

              baseline information security controls have been independently audited and validated. However, SOC 2

              certification does not cover the full third-party vendor chain, and Mercury's cloud-native architecture

              creates dependency on cloud infrastructure availability. Mercury's security page indicates a multi-layer

              approach to data protection, but the company has not publicly confirmed its cloud provider redundancy

              strategy or multi-cloud architecture details. A significant data breach or payment system outage would

              expose Mercury to regulatory fines, customer remediation costs, and reputational damage in the tight-knit

              startup community that represents its core customer base.


              Account freeze disputes represent the most visible operational risk in public review data. Mercury's
              Trustpilot

              reviews and independent banking reviews from Finder and NerdWallet document a consistent pattern of
              accounts

              being frozen during compliance reviews, with limited self-service dispute resolution available to
              customers.

              For startup businesses that rely on Mercury as their primary operating account, an unexpected account
              freeze

              can be operationally catastrophic. This risk is elevated by Mercury's international customer base spanning

              businesses from more than 200 countries, which increases fraud exposure and AML compliance complexity. Key

              person risk centers on CEO Immad Akhund, who is the company's primary public face, investor relations
              lead,

              and product vision holder. No succession plan has been publicly disclosed, representing a governance gap

              that institutional investors should address in diligence conversations with Mercury's board.
