  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Mercury serves primarily digital-native businesses — startups, e-commerce companies, scale-ups, and SMBs —
              with a secondary segment of individual investors using Mercury for Investors and consumers via Mercury
              Personal. At launch in 2019, Mercury targeted venture-backed startups in the YC/accelerator ecosystem. The
              company expanded into e-commerce (approximately 21% of the customer mix by 2025), professional services,
              nonprofits, and creator economy businesses. By March 2025, Mercury served over 300,000 businesses across
              200+ countries. The $240/year Mercury Personal product launched publicly in December 2024 extends the
              platform to founders and employees alongside their business accounts. The YC and accelerator referral
              network remains the highest-value acquisition channel, producing high-NPS, low-churn cohorts. Word of
              mouth is disclosed as the primary growth driver, reflecting strong viral adoption within tech startup
              communities.

              Within the startup segment, Mercury has particularly strong penetration in the YC ecosystem — Sacra and
              Contrary Research both identify YC-referral as the primary distribution moat that competitors cannot
              easily replicate. The Mercury Perks program (with bundles for Startup Launch, Customer Growth, E-commerce,
              and Professional Services) ties partner software discounts to Mercury account ownership, creating
              ecosystem stickiness beyond core banking. Mercury for Investors provides portfolio-level visibility for
              venture capitalists, reinforcing the VC → portfolio company referral loop. The named customers from Series
              B — Lunchclub, Mighty, and Linear — represent the high-profile startup tier. By 2025, the base had
              diversified sufficiently that no disclosed segment represents more than roughly one-quarter of total
              accounts, though e-commerce at 21% is the only publicly quantified sub-segment.
