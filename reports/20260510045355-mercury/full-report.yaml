      - number: '4.3'
        title: Capital Structure and Cost Efficiency
        blocks:
          - type: paragraph
            body: |
              Mercury raised $300M in a Series C in March 2025 at a $3.5B post-money valuation, led
              by Sequoia Capital with participation from Spark Capital, Marathon, Coatue, CRV, and
              Andreessen Horowitz. The company did not disclose the primary-versus-secondary split,
              though CEO Akhund stated the "majority" of proceeds were primary. The $3.5B valuation
              represented more than a doubling of the $1.62B Series B valuation from 2021, reflecting
              the company's revenue growth and sustained profitability.

              Mercury's stated use of Series C proceeds includes product expansion (CFO suite, Mercury
              Finance), potential acquisitions, talent scaling, and costs associated with pursuing an
              OCC national bank charter. The OCC charter application was filed in December 2025 and
              would require significant regulatory capital if approved — de novo national bank charters
              typically require $20M–$100M in initial capital depending on business plan complexity,
              and Mercury's scale would likely require toward the high end or beyond.

              Mercury is registered as Mercury Lending LLC under NMLS #2606284 with the Nationwide
              Multistate Licensing System (NMLS), the federal/state regulatory database for financial
              service companies. This registration reflects Mercury's lending operations and is a
              public filing confirming its regulated status. Mercury's pricing model for core products
              is transparent (free checking, no monthly fee, no minimum balance) while revenue-generating
              features like Treasury management and card programs are less transparently priced.

              The company's profitability claim across 10 consecutive quarters and the absence of any
              down-round financing signal that Mercury's cost base is well-managed. Revenue of $500M
              on a headcount of roughly 850 in early 2025 implies strong employee leverage. However,
              the 2025 growth to 1,520 employees and the OCC charter process will increase compliance
              and infrastructure costs meaningfully in 2026 and beyond.
