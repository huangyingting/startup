    title: Valuation Sensitivity to Revenue Multiple
    type: bar
    layout: standard
    summary: >-
      Mercury's implied equity valuation at various ARR multiples applied to the $650M ARR base estimate, illustrating
      how multiple expansion (charter approval) or compression (charter denial / NIM headwind) drives the valuation
      range. The current $3.5B Series C price corresponds to approximately 5.4x ARR.
