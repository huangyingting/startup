      - number: '8.4'
        title: Exit Readiness, Thesis Risks, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Mercury's most credible near-term exit path is an IPO, consistent with CEO Immad Akhund's public statement

              on Bloomberg in March 2025 that Mercury "expects to go public in the future." The OCC charter outcome is
              the

              primary gating factor for IPO timing: investment banks and public investors will need visibility into
              Mercury's

              regulatory status before underwriting a banking-sector IPO. If the charter is approved in 2026–2027, an
              IPO

              could be feasible by late 2027 or 2028, with a target valuation of $6–10 billion at the time of offering.

              A charter denial would likely require Mercury to position as a fintech rather than a bank, with a
              different

              comparables set and potentially lower public market valuation.


              Strategic acquisition by a large bank or financial institution represents a secondary exit scenario.
              Mercury's

              300,000 business accounts, $17.9 billion in deposits, and 80-plus NPS score represent significant
              strategic

              value for an incumbent seeking digital capabilities in the startup banking segment. JPMorgan Chase, Bank
              of

              America, and Goldman Sachs Marcus have all invested in or acquired digital banking capabilities. A
              strategic

              acquisition at a 20–30 percent premium to the last private round would imply a $4.2–4.6 billion exit —
              modest

              upside from the current Series C price but de-risked relative to the IPO path.


              The most important final diligence asks center on the three thesis-critical unknowns. First, investors
              need

              to understand the current OCC application status, including any preliminary correspondence from the OCC
              and

              the expected milestone schedule. Second, the actual NIM margins and deposit repricing schedule should be

              requested from the data room to model interest rate sensitivity precisely. Third, the full terms and
              resolution

              timeline of Choice Financial's FDIC consent order require a direct FDIC FOIA request or management
              disclosure,

              as the public record is insufficient to assess escalation probability. Without these three data points,
              the

              buy recommendation is conditioned on a favorable-but-unverified assumption about the regulatory
