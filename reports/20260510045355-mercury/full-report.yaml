  - id: FU001
    title: Mercury Customer Journey Map
    type: journey-map
    layout: standard
    summary: >-
      Six-stage journey mapping how a typical startup founder discovers, signs up for, activates, expands, and advocates
      for Mercury — driving the viral referral loop that powers Mercury's primary acquisition channel.
    data:
      items:
        - label: Discovery
          detail: >-
            Founder encounters Mercury via YC batch network, accelerator recommendation, VC portfolio guidance, or
            word-of-mouth from fellow founders. Mercury's 80+ NPS drives organic referral. Primary channel: founder
            network (company-disclosed as #1 acquisition driver).
        - label: Sign-Up and Onboarding
          detail: >-
            Digital-first account opening in ~10 minutes; no branch visit required. KYC/KYB completed online. Mercury's
            clean UI and fast approval differentiates from legacy bank multi-week onboarding. FDIC insurance up to $5M
            from day one through sweep network partners.
        - label: Core Activation
          detail: >-
            Founder funds checking account, orders debit card, sets up direct deposit and wire instructions. Mercury
            accounting integrations (QuickBooks, Xero) connect automatically. First transactions processed within 1–2
            business days.
        - label: Product Expansion
          detail: >-
            As company scales, founder adds Mercury Treasury (yield on idle cash), Mercury IO credit card (1.5%
            cashback, no personal guarantee), bill pay automations, invoicing, and expense management. Each product adds
            switching cost and ARPU.
        - label: Employee and Investor Network
          detail: >-
            Finance team joins; multiple user roles configured with RBAC. Mercury for Investors added for VC/board
            visibility. Mercury Personal cross-sold to founders and key employees. Perks bundles activated for team
            tools.
        - label: Advocacy and Referral
          detail: >-
            Satisfied founder recommends Mercury to portfolio companies, YC batchmates, and LinkedIn network. Mercury's
            word-of-mouth engine compounds; 300K+ businesses reached without disclosed paid CAC spending at scale.
