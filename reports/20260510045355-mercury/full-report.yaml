  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Recommendation
        blocks:
          - type: paragraph
            body: >-
              Mercury has built the most trusted digital banking platform for U.S. startups and small businesses,
              reaching 300,000

              business accounts by March 2025 with $17.9 billion in deposits and approximately $650 million in
              annualized revenue.

              The company achieved profitability in early 2024 and maintained it through at least three consecutive
              quarters, a rare

              milestone for a fintech at Mercury's stage. Net Promoter Score of 80-plus versus an industry average of 34
              confirms

              durable customer relationships that translate into low churn and high organic referral growth.


              The investment thesis rests on four pillars. First, Mercury has demonstrated that a BaaS-model digital
              bank can achieve

              scale, profitability, and customer loyalty without an owned charter, validating the business model on its
              own terms.

              Second, the OCC national bank charter application, filed December 2024, creates a medium-term catalyst
              that would

              structurally improve Mercury's unit economics by eliminating partner bank fees and increasing direct NIM
              capture.

              Third, the $156 billion in FY2024 payment volume growing at 64 percent year-over-year demonstrates a
              payment processing

              flywheel that is increasingly independent of deposit-based revenue. Fourth, the 300,000+ business account
              base

              with 80-plus NPS creates a defensible moat that is difficult for incumbent banks or competing fintechs to
              replicate

              without significant time and capital.


              The anti-thesis centers on three risks. Mercury's revenue is 60–75 percent NIM-dependent, creating
              significant

              interest rate sensitivity in a declining-rate environment. The OCC charter application timeline is 18–36
              months

              with no guaranteed approval, and a denial would force indefinite BaaS dependency. Choice Financial Group's
              active

              FDIC consent order creates a near-term partner bank risk that could force a costly deposit migration.
              Taken together,

              the thesis is asymmetric: the upside from charter approval and continued growth is substantial, but the
              downside

              from regulatory failure or NIM compression is equally material.


              The recommendation is buy at current entry price with medium confidence. The $3.5 billion Series C
              valuation implies

              a 5.4x forward ARR multiple that is reasonable given Mercury's growth rate, profitability, and customer
              loyalty.

              Fair valuation stance is appropriate: the price is neither cheap enough to be obvious nor expensive enough
              to be

              discouraging. Risk rating is high due to the combination of regulatory, interest rate, and partner bank
              risks that

              cannot be fully mitigated until the OCC charter is resolved.
