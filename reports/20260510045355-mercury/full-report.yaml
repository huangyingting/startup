  - id: TV005
    title: Thesis-Break and Kill Triggers
    description: >-
      Monitorable events that would prompt a downgrade of the Mercury investment thesis from buy to track or avoid, with
      transmission mechanism and required investor action.
    columns:
      - Trigger
      - Threshold or Event
      - Transmission to Thesis
      - Action Implication
      - Monitoring Source
    rows:
      - - OCC charter denial
        - Formal denial letter from OCC or voluntary withdrawal of the national bank charter application
        - >-
          Eliminates the 2–3x multiple re-rating upside; forces permanent BaaS dependency; reduces IPO valuation to
          fintech rather than licensed-bank comp set; probability-weighted valuation drops from $3.0–4.0B to $1.8–2.5B
        - >-
          Downgrade to track; model BaaS-only steady-state valuation; reassess if Mercury secures alternative charter
          path
        - OCC public dockets; OCC application search portal; Mercury press releases
      - - Fed funds rate cut cycle exceeding 150bps cumulative
        - Federal Reserve reduces target rate by cumulative 150+ basis points from 2024 peak levels
        - >-
          NIM revenue compressed by estimated 25–35% on $17.9B deposit base; revenue could fall to $420–490M;
          profitability at risk; multiple compresses further on lower revenue base; downside scenario probability
          increases to 35–40%
        - >-
          Reassess revenue model; verify Mercury's NIM hedging; downgrade to track if no disclosed fee revenue
          diversification
        - FOMC meeting statements; Federal Reserve dot plot; Mercury quarterly disclosures
      - - Choice Financial license revocation or suspension
        - FDIC enforcement action escalating Choice Financial consent order to license suspension or revocation
        - >-
          Forces emergency deposit migration from Mercury's primary partner; disrupts $17.9B in customer deposits;
          creates regulatory scrutiny of Mercury itself; customer trust damage in tight-knit startup community
        - Move to avoid until migration completed and customer impact assessed; emergency due diligence required
        - FDIC enforcement dockets; Banking Dive; Reuters fintech reporting
      - - Mercury profitability loss
        - Two consecutive quarters of GAAP operating losses after achieving profitability in early 2024
        - >-
          Undermines the core thesis that Mercury can be profitable at scale without a bank charter; reduces IPO
          viability; may require additional capital raise at dilutive valuation; downward pressure on ARR multiple
        - Downgrade to track; request management explanation of cost drivers; assess path back to profitability
        - Mercury annual letter; Sacra quarterly estimates; Bloomberg fintech coverage
      - - Major data breach or security incident
        - Tier-1 cybersecurity breach involving customer PII or financial data disclosure
        - >-
          Regulatory notification obligations triggered; customer remediation costs; churn risk in startup community
          where reputation is primary growth driver; potential FDIC/OCC scrutiny of Mercury's application viability
        - Assess breach scope; request SOC 2 audit findings; monitor regulatory response before making position decision
        - SEC breach notifications; state AG announcements; Mercury disclosures
    enumerationScope:
      coverage: partial
      basis: >-
        Kill triggers derived from Mercury's disclosed risk profile, OCC charter process, Fed rate cycle analysis, and
        BaaS sector precedents as of May 2026. Thresholds are analyst estimates for investor monitoring purposes.
    claimRefs:
      - CV005
      - CV007
      - CV025
      - CV026
      - CV028
    notes: >-
      Triggers are not predictions but structured monitoring conditions. Mercury has not disclosed internal trigger
      thresholds or stress test scenarios publicly.
  - id: TV006
    title: Final Diligence Asks
    description: >-
      The most critical open questions and missing evidence that investors must resolve before or after closing to
      validate the buy thesis and establish ongoing monitoring.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
      - Urgency
    rows:
      - - OCC charter status and milestone schedule
        - >-
          Specific submission confirmation, OCC preliminary feedback, and milestone timeline for the national bank
          charter application filed December 2024. OCC does not provide public application progress updates.
        - >-
          Charter approval/denial is the primary valuation driver and IPO gating factor; without milestone visibility
          investors cannot model the probability-weighted valuation range or thesis timing
        - >-
          Management data room: OCC correspondence, submission confirmation, regulatory affairs team contacts; OCC
          public application search portal for confirmation of filing
        - Pre-closing critical
      - - Actual NIM margins and deposit rate sensitivity
        - >-
          Mercury's disclosed NIM by deposit category, deposit repricing schedule, and revenue sensitivity to 50, 100,
          and 150 basis point rate cut scenarios. Analyst estimates (60–75% NIM) are modeled externally, not disclosed.
        - >-
          NIM concentration is the primary financial risk; without disclosed sensitivity data investors cannot precisely
          model downside scenarios or assess whether Mercury's profitability threshold is above or below key rate levels
        - >-
          Management data room: NIM decomposition by product, deposit repricing schedule, and rate sensitivity analysis;
          request board-approved financial model
        - Pre-closing critical
      - - Choice Financial FDIC consent order full terms
        - >-
          Full consent order text, required remediation milestones, and expected resolution timeline for Choice
          Financial. FDIC has not published the complete consent order publicly; partial terms only disclosed in press
          reports.
        - >-
          Investors cannot assess escalation probability (license suspension/revocation) without understanding the
          specific violations and remediation requirements; this is the single most acute near-term tail risk
        - >-
          FDIC FOIA request for Choice Financial consent order; direct management inquiry about Mercury's exit timeline
          from Choice dependency; request Mercury's contingency migration plan documentation
        - Pre-closing critical
      - - Cap table, preference overhang, and liquidation waterfall
        - >-
          Full cap table showing Sequoia, a16z, and Coatue preference stack from Series C plus all prior rounds;
          liquidation waterfall analysis showing common equity value at various exit prices.
        - >-
          At $3.5B Series C entry, preference overhang from $500M total raised could reduce common equity value in a
          below-valuation exit scenario; investors need to understand their position in the waterfall
        - Standard due diligence data room request; legal counsel review of investment documents and preference terms
        - Pre-closing important
      - - Mercury Personal traction and consumer banking metrics
        - >-
          User acquisition rate, deposit volume, and engagement metrics for Mercury Personal since its launch. Mercury
          announced the consumer banking product in 2025 but has not disclosed performance metrics.
        - >-
          Consumer banking expansion is a key driver of the bull case ($9–12B); without traction data investors cannot
          assign probability to the bull case or assess whether Mercury Personal cannibalizes startup account
          acquisition
        - >-
          Management data room: Mercury Personal account count, deposits, and retention metrics; request 90-day cohort
          data to assess early traction signal
        - Post-closing monitoring
      - - Regulatory capital requirement for bank charter
        - >-
          The capital Mercury would be required to hold under OCC/FDIC requirements as a de novo national bank. OCC de
          novo bank capital requirements are publicly documented but the specific amount for Mercury's business plan is
          not publicly known.
        - >-
          Capital requirements could consume a substantial portion of Mercury's $300M Series C proceeds; if additional
          capital is needed for charter compliance, dilution risk increases for existing investors
        - >-
          OCC de novo bank charter guidelines; request Mercury's regulatory capital projections from management; assess
          remaining Series C runway after capital allocation
        - Post-closing monitoring
    enumerationScope:
      coverage: partial
      basis: >-
        Diligence asks derived from Mercury public disclosures, OCC charter application process, FDIC regulatory
        framework, Sacra financial analysis, and comparable digital bank diligence frameworks as of May 2026.
    claimRefs:
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
    notes: >-
      Urgency classifications reflect impact on pre-closing investment decision. Post-closing items should be
      incorporated into monitoring agreements and board reporting requirements.
