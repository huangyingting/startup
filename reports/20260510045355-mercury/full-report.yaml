      - number: '1.4'
        title: Scale, Traction, and Key Milestones
        blocks:
          - type: paragraph
            body: |
              Mercury's traction data as of early 2025 is compelling. The company reports $500M in 2024
              annual revenue, representing approximately 97% YoY growth (Sacra estimate), driven primarily
              by interest income on $20B in customer deposits. The customer base grew to 200,000+ business
              accounts (40% YoY) with annual transaction volume of $156B (+64% YoY from an estimated $95B+
              in 2023). The company reports an industry-leading NPS score of 80+ (vs. banking industry
              average of ~34) and an iOS App Store rating of 4.9 with 7,200+ reviews. Mercury's website
              attracts approximately 2.5M monthly visits per SimilarWeb.

              Product expansion in 2024 was substantial: bill pay, invoicing, accounting automations,
              employee expense management, and Mercury Personal for consumers. The IO corporate card
              (launched September 2022) is the most used corporate card among Mercury customers.
              International capabilities expanded to 40+ currencies. Mercury integrated Column N.A.
              as a new partner bank in 2024 as part of its multi-bank strategy.

              Mercury's SVB Moment: The March 2023 Silicon Valley Bank collapse was a major customer
              acquisition catalyst. Mercury was not directly exposed to SVB and quickly published
              reassurances about its FDIC-insured status. Thousands of startups that had banked with SVB
              or were looking for alternatives onboarded with Mercury, materially accelerating deposit
              and customer growth. This SVB windfall benefited Mercury disproportionately given its
              existing startup focus and digital-first model.
