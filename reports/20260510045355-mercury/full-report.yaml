      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Mercury was co-founded by three former colleagues from Heyzap, a mobile developer tools and
              ad-tech startup acquired by Fyber in 2016. Immad Akhund (CEO) earned an MA in Computer
              Science from the University of Cambridge, co-founded Heyzap through Y Combinator, and spent
              time as a part-time YC partner and prolific angel investor (300+ investments including
              Airtable, Rippling, Substack, and Rappi) before launching Mercury in 2017. Max Tagher (CTO)
              and Jason Zhang (COO) were Heyzap co-founders. The founding team spent 18+ months meeting
              with 60+ banks and 100+ entrepreneurs before the 2019 product launch, building the BaaS
              partner bank relationships that power Mercury today.

              The current executive team includes Daniel Kang (CFO), Jon Auxier (Chief Banking Officer),
              Robert Gonzalez (General Counsel), Nick Dellis (VP Revenue), and Juliana Vislova (VP Design).
              The company employs 1,000+ people as of 2025. In 2025, Akhund also launched a personal $26M
              early-stage venture fund alongside his CEO role, raising potential conflict-of-interest
              considerations.

              The board expanded significantly with the Series C. New board members include Sonya Huang
              (Sequoia Capital partner who led the investment), Tim Mayopoulos (former CEO of Fannie Mae
              and of Silicon Valley Bridge Bank during the SVB crisis), and Tom Brown (fintech regulatory
              attorney with advisory history at PayPal, Chime, and Upstart). Existing board members include
              Saar Gur of CRV and board observers Alex Rampell (Andreessen Horowitz) and Dan Rose (Coatue).
              Jason Zhang was also added to the board as co-founder representative. Key-person risk is
              elevated given Akhund's central public role, investor anchor function, and product vision
              leadership, partially mitigated by the three-founder structure and experienced board.
