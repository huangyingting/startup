  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Mercury is a financial technology company headquartered in San Francisco, California that
              delivers business banking services through a partnership model with FDIC-insured chartered
              banks rather than holding its own banking charter. Founded in 2017 and publicly launched in
              April 2019, Mercury targets startups, venture-backed companies, e-commerce businesses, and
              small-to-medium enterprises (SMBs) that have historically been underserved by incumbent
              commercial banks. The company's flagship product is a modern digital business bank account
              that aggregates checking, savings, credit cards, treasury management, bill pay, invoicing,
              expense management, and accounting integrations into a single platform.

              Mercury operates a multi-revenue-stream model. The primary revenue source is interest income
              shared with partner banks on approximately $20 billion in customer deposits. Secondary streams
              include interchange fees on the IO corporate card (issued by Patriot Bank), wire and FX fees
              (40+ currencies), and SaaS-style subscriptions ranging from $35-$350/month for premium
              financial software features. This deposit-driven model is materially rate-sensitive and
              VC-liquidity-sensitive. Mercury's deposit base grew rapidly after SVB's March 2023 collapse
              as startups sought alternatives, but deposit growth and retention are tied to venture
              ecosystem fundraising conditions.

              Mercury's strategic thesis is that the bank account should function as the "financial
              operating system" for a business. The 2024 annual letter from CEO Immad Akhund described
              four major product launches in 2024 (bill pay, invoicing, accounting automations, and expense
              management) as steps toward this vision, alongside Mercury Personal for consumers. As of
              March 2025, Mercury serves 200,000+ business customers and claims roughly one in three US
              startups receiving early-stage VC funding opens a Mercury account. Partner banks as of 2025
              include Choice Financial Group, Column N.A., and Patriot Bank (for card issuance), with a
              network of 20+ banks holding excess deposits via sweep to provide up to $5M in FDIC coverage
              per startup.
