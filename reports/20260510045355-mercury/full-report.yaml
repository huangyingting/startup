      - number: '3.3'
        title: Capability and Pricing Comparison
        blocks:
          - type: paragraph
            body: >
              Mercury's pricing is fully fee-free for core banking: no monthly maintenance fees, no minimum balance, no
              domestic wire fees, and unlimited ATM fee refunds. The IO corporate charge card earns 1.5% cashback on all
              purchases with no annual fee. Mercury Treasury (for balances over $500K) offers access to money-market
              funds earning up to 4.39% net annually. Cash deposits are not supported, which is a genuine limitation for
              businesses that handle cash.

              Brex's Essentials plan is also free ($0/user/month), while its Premium plan costs $12/user/month adding
              advanced expense policies, multi-entity support, and ERP integrations. Brex's competitive moat versus
              Mercury is specifically the card product: higher credit limits, richer rewards, global card issuance in
              50+ countries, and travel management. Ramp offers its core spend management at no cost, monetizing through
              interchange; it does not offer FDIC-insured deposits as a stand-alone bank product and is designed to pair
              with a banking provider. Relay's base tier is free with an Allpoint ATM network; its paid tiers add
              unlimited accounts and accountant seats. Bluevine offers 2.00% APY on checking balances up to $250K—a
              meaningful differentiator for cash-heavy businesses—but charges $15 for domestic wires vs. Mercury's zero.
              JPMorgan Chase Business Complete Banking starts at $15/month (waivable with a $2,000 balance), has
              domestic wire fees, and offers no startup-friendly onboarding speed.

              On user satisfaction, Mercury leads its competitive cohort: NPS of 75 vs. industry average of 34; 4.5/5
              stars on G2 (121 reviews) and NerdWallet; 4.0/5 on Trustpilot (2,487 reviews). Adverse customer complaints
              on Trustpilot focus on wire transfer delays, unexplained account closures, and support responsiveness—a
              pattern common to compliance-driven banking platforms and not unique to Mercury.
