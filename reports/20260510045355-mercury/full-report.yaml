              - CM002
              - CM003
      - number: '2.2'
        title: Market Sizing—TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Multiple independent market sizing estimates cover neobanking and SMB digital banking at different levels
              of geographic granularity. The US commercial banking market—the broadest envelope containing Mercury's
              TAM—was valued at $231.9 billion in 2024 and is projected to reach $351.8 billion by 2033 (BAI). The US
              neobanking market specifically was estimated at $34.56 billion in 2024, growing to $263.67 billion by 2032
              at a 27.31% CAGR (Markets and Data). The global neobank market provides additional context: Grand View
              Research estimated the global neobanking market at $211.2 billion in 2025 at a 61.9% CAGR through 2033,
              while Fortune Business Insights estimated it at $210.2 billion at 49.3% CAGR through 2034. A third
              estimate from Awisee placed it at $382.8 billion in 2025—a near-2x spread reflecting differing
              methodologies. The US Fintech market overall was estimated at $58.01 billion in 2025, projected to reach
              $135.42 billion by 2031 at 15.18% CAGR (Mordor Intelligence). A formally published SAM for Mercury's
              specific addressable segment—digitally-native US SMBs actively willing to switch to neobanks—does not
              exist from any single authoritative source. Applying the business account revenue share (64-67%) to the US
              neobanking market estimate of $35 billion yields a rough SAM of $22-24 billion. Mercury's SOM is evidenced
              by its actual operations: $650 million in annualized revenue as of Q3 2025 and $20 billion in deposits.
              Business accounts dominate neobank revenue at 64.71-67% globally, confirming that the enterprise-oriented
              segment is the largest neobank revenue driver.
