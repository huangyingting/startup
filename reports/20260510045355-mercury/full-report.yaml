            body: >-
              Mercury's customer account growth follows a steep compounding trajectory: 40K+ businesses at Series B
              (June 2021), 200K+ by early 2024 (disclosed in 2024 Annual Letter), and 300K+ by early 2025 as shown on
              the Mercury homepage. Deposit growth mirrors this trajectory: $4B+ in 2021, reaching $17.9B in total
              deposits by mid-2024 ($12.7B excluding FBO deposits). Payment volume grew from $95B in 2023 to $156B in
              2024 — a 64% year-over-year increase. Revenue grew from ~$500M ARR in 2024 to ~$650M by mid-2025. Mercury
              disclosed an industry-leading NPS above 80 (vs. a banking industry average of 34) and stated that word of
              mouth is the primary driver of new signups. The Trustpilot rating of 4.1/5 from 1,620+ reviews (as of
              March 2025) confirms broad customer satisfaction, though isolated account freeze complaints represent an
              adverse signal in 1-star reviews.

              Contrary Research and Sacra both note that Mercury's growth trajectory implies significant organic
              adoption velocity. With 200K accounts in early 2024 growing to 300K+ by March 2025, Mercury added
              approximately 100K accounts in 14 months — roughly 7,000 new accounts per month — without disclosed paid
              acquisition spending. The deposit trajectory from $4B to $17.9B over four years at a 45% CAGR far outpaces
              the account count growth rate (approximately 70% CAGR), indicating that existing customers are deepening
              their banking relationship over time. This combination of account growth and deposit expansion per account
              provides indirect evidence of strong retention, even absent publicly disclosed churn metrics.
