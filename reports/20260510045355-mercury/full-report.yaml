      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Mercury has raised over $500M in total primary and secondary capital since founding. The
              funding history progresses from a 2017 seed round to fund initial product development,
              through a Series A to fund the 2019 launch, to a $120M Series B in July 2021 at a $1.62B
              post-money valuation (led by CRV and joined by a16z, Coatue, and others), and a $300M
              Series C in March 2025 at a $3.5B post-money valuation — more than double the Series B
              valuation. The Series C was led by Sequoia Capital (its first investment in Mercury), with
              new investors Spark Capital and Marathon and returning investors Coatue, CRV, and Andreessen
              Horowitz.

              CEO Akhund stated that the "majority" of the $300M Series C was primary capital, with a
              secondary component allowing existing shareholders to sell. A broader employee tender offer
              was announced for a later date. Mercury declined to disclose the primary-vs-secondary split
              or exact founder liquidity taken. The company has been profitable for 10 consecutive quarters
              on both EBITDA and GAAP net income as of early 2025, suggesting the Series C is primarily
              opportunistic and strategic rather than a survival raise.

              Use of proceeds includes product innovation, acquisitions in complementary fintech segments,
              hiring, and long-term financial flexibility. No official IPO timeline has been stated, though
              the addition of Tim Mayopoulos (public-company veteran) and Sonya Huang to the board signals
              preparation for a potential IPO. Mercury has also obtained credit facilities to support its
              venture debt product offering for customers, though terms are not publicly disclosed.
