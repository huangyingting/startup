  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Product Portfolio: From Bank Account to Financial Operating System'
        blocks:
          - type: paragraph
            body: >
              Mercury began as a digital-first business bank account targeting startups, launching checking and savings
              accounts in 2019. The product has since evolved into a multi-module financial platform. As of 2026, the
              core suite includes: business checking and savings accounts with no monthly fees; Mercury IO, a corporate
              credit card earning unlimited 1.5% cashback with no personal guarantee, issued by Patriot Bank under
              Mastercard license; Mercury Treasury, a cash management product offering up to 3.66% yield via J.P. Morgan
              and Morgan Stanley managed mutual funds (minimum $250K balance, same-day liquidity); Mercury Venture Debt,
              runway-extension financing for VC-backed startups; and Mercury Personal, consumer banking launched in
              2024. Layered atop the banking core, Mercury added financial software in 2024: AI-powered bill pay with
              invoice OCR and Slack-based approvals; accounting automations syncing with QuickBooks Online, Xero, and
              NetSuite; invoicing and employee expense reimbursement; and direct 1099 filing. By March 2025, IO had
              become the most-used corporate card among Mercury customers. By end-2025, Mercury served 300K+ customers
              (50% YoY growth), with annual transaction volume of $248B (up 59% from $156B in 2024). Customer
              diversification is accelerating: 73% of 2025 new customers came from outside AI/tech startups, with
              ecommerce (21%) and professional services as fastest-growing verticals. NPS reached 73.8 versus a banking
              industry average of approximately 34, reflecting strong product-market fit across segments.
