      - number: '4.2'
        title: Unit Economics and GTM Efficiency
        blocks:
          - type: paragraph
            body: |
              Mercury's unit economics are shaped by an organic, referral-driven acquisition model
              that minimizes paid CAC relative to most fintech peers. The company does not publicly
              disclose CAC, payback period, or LTV by cohort. However, NPS scores of 73–75 (vs. a
              banking industry average of approximately 34) and the claim that one in three US startups
              receiving early-stage VC funding opens a Mercury account are strong proxy indicators of
              word-of-mouth-driven acquisition and high early-cohort retention.

              Revenue per customer can be estimated from public metrics: with approximately $650M in
              annualized revenue and 300,000+ customers, implied revenue per customer is approximately
              $2,000–$2,200 per year. This figure blends high-deposit enterprise customers with
              lean-stage startups on the free tier, so distribution is likely bimodal. The transaction
              volume per customer (approximately $827K annually based on $248B across 300K+ customers)
              suggests meaningful banking activity depth rather than dormant accounts.

              Mercury processed $248B in transaction volume in 2025, up from $156B in 2024 — a 59%
              increase that outpaced customer count growth (50% YoY) and is consistent with wallet
              share deepening. Revenue per employee can be estimated at approximately $428K annually
              ($650M / 1,520 employees), a ratio that compares favorably to traditional banks but is
              below top-tier SaaS multiples, reflecting the banking-style cost structure. Headcount
              grew 79% from roughly 850 in early 2025 to approximately 1,520 in early 2026, and the
              rate of headcount expansion exceeding revenue growth rate (41%) suggests continued
              investment in R&D, compliance, and OCC charter readiness.

              The shift in 2025 customer mix — 73% of net new customers came from outside the
              tech/startup sector — has potential unit economics implications: enterprise SMBs outside
              tech may have higher CAC and different deposit velocity than the startup cohort Mercury
              built its model around, creating a need for ongoing cohort-level monitoring.
