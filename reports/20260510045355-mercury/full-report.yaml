      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              Mercury's go-to-market anchors on five distinct buyer segments differentiated by company stage, revenue
              model, and financial operations sophistication. Venture-backed startups were the original segment; they
              value fast account opening, FDIC-insured partner bank coverage, integrations with venture debt providers,
              and referrals from the investor and accelerator network. By 2024, startups represent less than 40% of
              customers. E-commerce businesses are the second-largest segment, driven by high-volume payment needs,
              multi-channel deposit streams, and demand for payment reconciliation. Scale-ups (Series A through C)
              increasingly demand bill pay automation, corporate expense cards, and role-based approval workflows—
              features Mercury launched in 2024. Professional services SMBs use Mercury for invoicing and accounting
              integrations. VC fund entities represent a smaller but high-deposit-balance sub-segment. Across all
              segments, the budget owner is typically the CEO or CFO, and the primary adoption triggers are company
              formation, a banking relationship disruption (SVB collapse, Evolve Bank migration), or the need for
              software-integrated financial workflows. Mercury's average customer generates approximately $750,000 in
              annual payment volume, skewing toward higher-revenue SMBs rather than micro-businesses.
