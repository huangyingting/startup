  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >
              Mercury operates at the intersection of digital business banking and financial workflow software for
              US-based SMBs and startups. The core addressable market is US small business banking: deposit accounts,
              payments, debit and credit cards, wire transfers, and cash management services provided to businesses with
              fewer than 500 employees. This segment is distinct from consumer banking (individual accounts) and
              institutional or corporate banking (large enterprise treasury). Mercury has expanded its product scope to
              include adjacent spend categories: bill pay, accounts payable automation, invoicing, employee expense
              reimbursement, and treasury yield management through its Vault product. The primary status-quo substitute
              is a relationship account at a major US incumbent bank such as JPMorgan Chase, Bank of America, or Wells
              Fargo, which collectively serve the overwhelming majority of the 30 million US SMBs. Secondary substitutes
              include specialized spend-management fintechs (Brex, Ramp) and traditional community or regional banks.
              Excluded from Mercury's near-term core market are consumer banking, mortgage lending, SBA loans,
              institutional asset management, and cross-border treasury for multinational enterprises. Mercury's
              original beachhead was the venture-backed startup cohort, but by 2024 startups represent less than 40% of
              its 200,000+ customer base, with e-commerce businesses emerging as the second-largest segment.
            claimRefs:
              - CM001
              - CM002
              - CM003
          - type: table
            tableRef: TM001
            claimRefs:
