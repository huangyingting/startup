      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Exceptional Financial Performance at Scale
            body: |
              Mercury's $500M in 2024 revenue (97% YoY growth), 10 consecutive quarters of GAAP
              profitability, 200,000+ customers, and $156B in transaction volume represent a genuinely
              rare combination of hypergrowth and profitability in fintech. At roughly $2,500 ARPU
              across 200,000 customers, Mercury is serving larger, stickier businesses than typical
              SMB neobanks. The 10-quarter profitability record also confirms Mercury is not buying
              growth at the expense of unit economics.
            calloutType: strength
            claimRefs:
