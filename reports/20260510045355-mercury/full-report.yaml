          - type: callout
            title: Material Compliance and Regulatory Risk
            body: |
              Mercury's documented role in Evolve Bank's compliance failures — including alleged
              whitelisting of high-risk users, facilitating transactions in sanctioned jurisdictions, and
              alleged absence of transaction monitoring — creates material regulatory risk. While Mercury
              has not received a direct Fed enforcement action, its compliance culture and partner bank
              actions are deeply intertwined. The mass account closure of 37 countries in July 2024
              also creates reputational and potential legal exposure.
            calloutType: risk
            claimRefs:
              - CO026
              - CO027
              - CO028
              - CO029
              - CO030
          - type: callout
            title: BaaS Model Dependency and Interest Rate Sensitivity
            body: |
              Mercury's primary revenue is interest income on $20B in deposits — a model that is
              inherently rate-sensitive and venture-ecosystem-dependent. A sustained interest rate
              reduction or VC funding slowdown could significantly compress revenue. Mercury's path
              to a bank charter and reduced BaaS dependency is uncertain and not publicly committed.
            calloutType: risk
            claimRefs:
              - CO005
              - CO037
              - CO022
          - type: callout
            title: SVB Collapse as Accidental Accelerant
            body: |
              Mercury's rapid growth from sub-$100M to $500M in revenue between 2021 and 2024 was
              materially accelerated by SVB's March 2023 collapse. Diligence should assess how much of
              Mercury's deposit growth is structurally versus cyclically driven, and whether deposits
              would remain stable if VC funding conditions normalize.
            calloutType: insight
            claimRefs:
              - CO040
              - CO022
              - CO020
          - type: callout
            title: 'Diligence Priority: Compliance Remediation Evidence'
            body: |
              Given Mercury's documented involvement in Evolve's compliance failures, diligence should
              request: (1) internal AML/KYC audit results since 2023, (2) regulatory correspondence from
              any banking supervisor regarding Mercury's own compliance practices, (3) documented
              transaction monitoring systems and escalation procedures, and (4) specific remediation
              steps for the compliance issues cited in Fintech Takes reporting.
            calloutType: recommendation
            claimRefs:
              - CO026
              - CO027
              - CO028
              - CO029
