summary:
  headline: >
    Grammarly 拥有难以复制的分发护城河（30M+ DAU、96% F500 覆盖）和真实的 AI 写作 IP，但 $13B 估值对应约 18–20× ARR、增长仅 12%，价格明显偏高；当前不进入，维持观察，等品牌重塑后
    KPI 和 GC 契约条款确认后，再在 $5–7B 重新评估。
