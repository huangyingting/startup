  - - Chrome Extension Installs
    - 44M+
    - '2024'
    - Chrome Web Store
    - High
    - Largest single distribution channel; standalone installs drive viral free adoption
    - Monthly active install base vs. total installs; install-to-DAU conversion
  - - Higher Ed Institutions
    - 3,000+
    - '2024'
    - Electroiq / official statements
    - Medium
