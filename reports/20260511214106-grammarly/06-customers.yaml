schemaVersion: report-v2
artifact: customers
slug: grammarly
runDate: '2026-05-11'
company:
  name: Grammarly
chapter:
  number: 6
  title: Customers
  summary: 'Grammarly/Superhuman has built an unusually broad customer base—30M+ daily active users (DAU) at the free tier,
    40M+ total registered users, and 50,000+ organizations as of 2025. Enterprise penetration reaches 96% of the Fortune 500
    (by user presence, not formal contracts), underscoring remarkable bottom-up viral adoption. Named enterprise customers
    include Databricks, Zapier, HackerOne, ModMed, Lucid, DocuSign, Waystar, ConnectWise, Eventbrite, BlackRock, and the State
    of California, demonstrating strong cross-vertical breadth. Published case studies report 75–93% communication quality
    improvement, 1.8–30 min/user/day time savings, and 95%+ Style Guide engagement. However, formal retention metrics (NRR,
    GRR, churn cohorts) are not publicly disclosed, limiting independent verification of durability. The free-to-paid conversion
    path is a structural risk: with ~30M DAUs but estimated 7–13% conversion rates, a large share of users never become paying
    customers. Concentration risk is low by customer count but unquantifiable at the revenue level given private financials.'
sections:
- key: customer-base-segmentation
  title: Customer Base Segmentation
  body: 'Grammarly serves three distinct customer layers: (1) Individual consumers on free and Pro plans—the largest by count,
    dominated by students, non-native English speakers, and knowledge workers—who drive brand awareness and feed the B2B funnel;
    (2) SMB/team buyers on the Business tier (teams up to ~149 seats at $15/user/month billed annually); and (3) Enterprise
    clients with custom contracts, SSO, admin dashboards, and compliance requirements. Geographically, the U.S. accounts for
    roughly 42% of web traffic (~25M users), with India (~10M) and the UK (~6M) as the next largest markets. The user base
    skews female (56%) and ages 25–34 (28%), with heavy concentration in Education, Business, and English/Literature disciplines.
    Enterprise verticals span tech, financial services, healthcare, government, and professional services.'
  tableRefs:
  - TU001
  figureRefs:
  - FU001
- key: adoption-trajectory
  title: Adoption Trajectory
  body: 'Grammarly reached 30M+ DAUs by 2020—maintained through 2024—after growing from 1M in 2015 at roughly 7% CAGR. Total
    registered users now exceed 40M. Organization adoption surpassed 50,000 by official count (Grammarly About page), though
    some third-party sources cite up to 70,000 organizations (less current). The Chrome extension alone has 44M+ installs,
    functioning as a standalone acquisition channel with low marginal cost per new user. Monthly web traffic exceeds 60M visits.
    The education segment now covers 3,000+ higher education institutions, with Grammarly''s Authorship tool deployed for
    academic integrity. Product-led growth (PLG) is central: individual employees often adopt Grammarly personally before
    their organization formalizes a Business/Enterprise agreement, creating a self-reinforcing enterprise flywheel.'
  tableRefs:
  - TU002
  figureRefs:
  - FU002
- key: named-customer-proof
  title: Named Customer Proof
  body: 'Grammarly''s customer stories page lists named testimonials from executives at Databricks, Zapier, HackerOne, ModMed
    (CEO Dan Cane), and Lucid (Assoc. Director Jimmy Snyder). Published case studies provide quantified outcomes: Iterable
    (customer communications platform) reported 93% of communications improved and 1.8 hours saved per user per week after
    Grammarly Enterprise deployment. ConnectWise (IT management SaaS) reported 75% improvement in communication quality, 30
    minutes saved per user per day, and 95% Style Guide engagement across marketing, education, and sales teams. The State
    of California is listed as a named customer—a notable government anchor deployment. Customers span financial services
    (BlackRock, Investec, Waystar), technology (Databricks, Zapier, HackerOne, ConnectWise, Prezi, Supermetrics), and healthcare
    (ModMed). The breadth of verticals and named executive testimonials exceeds what most enterprise SaaS companies present
    publicly at Grammarly''s ARR scale, suggesting genuine production deployment rather than early-pilot logos.'
  tableRefs:
  - TU003
  figureRefs:
  - FU003
- key: retention-durability
  title: Retention and Durability
  body: 'Grammarly does not publish NRR, GRR, cohort retention, or annual churn rates. The freemium model structurally depresses
    paid conversion: with ~30M DAUs and an estimated 7–13% conversion rate, roughly 87–93% of daily users remain on the free
    tier indefinitely. Sacra (2024) characterizes consumer revenue as driven by "a growing share of lower-priced seats," implying
    heavy reliance on high-volume, lower-ARPU individual plans. Enterprise stickiness is implied by the suite expansion (Coda
    Docs, Superhuman Mail, Agent Store) and the brand re-architecture, which raises switching costs. However, the AI writing
    market has intensified competition from Microsoft Copilot (bundled at zero marginal cost with M365) and native LLM-based
    writers, creating substitution pressure. Customer satisfaction signals are positive: the Chrome extension maintains 4.6/5
    stars from 26,000+ reviews in the Chrome Web Store, and Grammarly has won G2''s Writing Assistant category consistently.
    The Expert Review lawsuit (class action, 2026) is an adverse retention signal for trust-sensitive customers who prioritize
    accuracy guarantees.'
  tableRefs:
  - TU004
  figureRefs:
  - FU004
- key: expansion-concentration
  title: Expansion and Concentration Risk
  body: 'Grammarly''s expansion model depends on four levers: (1) seat expansion within enterprise accounts (from departmental
    to org-wide); (2) product upsell from Business to Enterprise; (3) suite cross-sell (Coda Docs, Superhuman Mail, Agent
    Store) once the Superhuman rebrand is operationalized; and (4) vertical expansion into new functions (sales, HR, legal)
    via dedicated team-function pages. The 96% Fortune 500 user presence (by individual employee adoption) indicates significant
    whitespace to formalize into structured contracts. Concentration risk is mitigated by the 50,000+ organization count—no
    single customer is likely to represent >5% of revenue. However, the freemium mass-market base means many "customers" are
    zero-revenue users who generate infrastructure cost without corresponding revenue. The U.S. represents ~42% of traffic,
    creating geographic concentration; multi-language support (launched Sep 2025 with 6 languages) is the key lever to reduce
    this.'
  tableRefs:
  - TU005
  figureRefs: []
tables:
- id: TU001
  title: Customer Segmentation by Tier, Buyer/User, Use Case, and Scale
  notes: Pricing from grammarly.com/plans (current); organization counts from official About page and third-party estimates.
  columns:
  - Segment
  - Buyer / User / Payer
  - Primary Use Case
  - Scale (2025)
  - Revenue / Strategic Value
  - Key Gap
  rows:
  - - Free / Individual
    - User = Payer (free); no payer
    - Grammar, spelling, tone correction in browser and apps
    - 30M+ DAU; 40M+ registered
    - Zero direct revenue; feeds PLG funnel and brand awareness
    - Conversion rate 7–13% (est.); no published cohort data
  - - Pro / Individual
    - Individual payer ($12–30/mo)
    - Advanced style, plagiarism check, generative AI features
    - Several million est. (private)
    - Primary consumer revenue driver; ARPU ~$144–360/yr
    - Exact Pro subscriber count not disclosed; churn rate unknown
  - - Business / Teams
    - Manager/IT buyer; employees as users
    - Brand consistency, team analytics, style guide enforcement
    - SMBs to mid-market; ~149-seat plans
    - $15/user/month (annual); growing mid-market segment
    - Revenue split between Business and Enterprise tiers not disclosed
  - - Enterprise
    - IT/Procurement buyer; org-wide users
    - SAML SSO, compliance, custom style guides, enterprise analytics
    - 50,000+ orgs; 96% Fortune 500 user presence
    - Custom pricing; highest ARPU tier; multi-year contracts typical
    - Enterprise contract count and revenue concentration not public
  - - Education / Institutions
    - Institution buyer; student/faculty users
    - Writing assistance, plagiarism detection, Authorship (AI integrity)
    - 3,000+ higher education institutions
    - Institutional licensing; lower per-seat pricing but high volume
    - Education revenue as % of total not disclosed; NPS unknown
