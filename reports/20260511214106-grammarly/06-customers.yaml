- id: TU004
  title: Retention, Satisfaction, and Durability Metrics
  notes: Most enterprise retention metrics are not publicly disclosed; table shows available signals and explicit diligence
    asks.
  columns:
  - Metric
  - Value / Indicator
  - Segment
  - Confidence
  - Diligence Ask
  rows:
  - - Net Revenue Retention (NRR)
    - null
    - Enterprise
    - None
    - Request trailing 4-quarter NRR; expect >100% if land-and-expand is working
  - - Gross Revenue Retention (GRR) / Gross Churn
    - null
    - Enterprise
    - None
    - Request by cohort year; compare to Writer (~90% GRR per public filings) as benchmark
  - - Chrome Extension Rating
    - 4.6/5 (26,000+ reviews)
    - Consumer / free
    - High
    - Verify as of most recent data; check trend; look for recent review drop driven by AI feature complaints
  - - G2 Category Leadership
    - Winner, Writing Assistant category (multiple years)
    - Business / Enterprise
    - Medium
    - G2 reviews are self-selected; request Gartner Peer Insights or TrustRadius scores for enterprise buyers
  - - Paid Conversion Rate (Free→Pro)
    - 7–13% (estimated)
    - Consumer
    - Low
    - Request actual cohort-level conversion funnel data by acquisition channel
  - - Enterprise Contract Renewal Rate
    - null
    - Enterprise
    - None
    - Request trailing renewal rate; typical SaaS benchmark is 85–90% for the segment
  - - Net Promoter Score (NPS)
    - null
    - All segments
    - None
    - Request last 12 months NPS by segment; important for organic referral and viral growth sustainability
  - - Expert Review Lawsuit Impact
    - Class action filed 2026; potential trust erosion
    - Enterprise / Premium
    - Low
    - Monitor settlement; evaluate whether enterprise renewals reference accuracy guarantees in contracts
- id: TU005
  title: Expansion Drivers and Concentration Risk
  notes: Concentration metrics are unavailable for a private company; table uses observable signals and structural analysis.
  columns:
  - Expansion Driver / Risk Factor
  - Type
  - Current Signal
  - Impact Assessment
  - Diligence Path
  rows:
  - - Seat expansion within F500 orgs
    - Expansion driver
    - 96% F500 user presence; departmental → org-wide upsell pathway
    - 'High upside: even 30% formal contract penetration of current F500 presence would materially increase ARR'
    - Request avg seats/org for Enterprise cohort; YoY seat expansion rates
  - - Superhuman Suite cross-sell (Coda + Mail)
    - Expansion driver
    - Suite launched Oct 2025; Coda acquired Dec 2024; Superhuman Mail 2025
    - 'Medium upside: multi-product bundling increases ARPU and switching cost but requires new buying motion'
    - Track attach rate of Coda and Mail to existing Grammarly Enterprise accounts after 6 months
  - - Education → Enterprise pathway
    - Expansion driver
    - 3,000+ institutions; students graduate into enterprise workforce
    - Long-term brand-building; near-term revenue contribution from institutions modest
    - Track institutional contract value vs. consumer revenue from education segment
  - - Multi-language expansion
    - Expansion driver
    - 6-language support as of Sep 2025; large non-English enterprise markets
    - 'Medium: unlocks EU/LATAM/Asia-Pacific enterprise accounts previously blocked by English-only limitation'
    - Track non-English user DAU growth and enterprise pipeline from new language markets
  - - Geographic concentration (U.S. = 42% traffic)
    - Concentration risk
    - 'U.S. overweight; India #2 (~17%); UK #3 (~11%)'
    - 'Moderate risk: U.S. economic slowdown or M365 Copilot adoption spike could compress consumer revenue'
    - Monitor U.S. vs. non-U.S. revenue split over time; track Copilot enterprise seat growth
  - - Microsoft Copilot bundled displacement
    - Concentration risk
    - Copilot included in M365 E3/E5 at zero marginal cost for existing M365 customers
    - 'High risk for SMB/mid-market: free substitute in existing workflow; Grammarly must differentiate on quality and context'
    - Track enterprise win/loss rate against Microsoft Copilot; request competitive displacement stats
  - - Single-product dependency (writing assistance)
    - Concentration risk
    - Still primarily grammar/writing before Superhuman Suite is operationalized
    - 'Medium: if LLMs commoditize basic grammar correction, value migrates to advanced features and workflow integration'
    - Track Superhuman Suite adoption; measure revenue from non-writing-assistance products by mid-2026
