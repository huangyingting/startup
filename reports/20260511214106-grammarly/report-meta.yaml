        Ukrainian entrepreneur and technologist; co-founded Grammarly with Lytvyn and Lider;
        board-level involvement.
      claimRefs:
      - CO001
    - name: Dmytro Lider
      role: Co-founder (board member)
      background: >
        Third co-founder of Grammarly; background in engineering and product; board-level
        involvement.
      claimRefs:
      - CO001
  foundingLocation: Kyiv, Ukraine
  headquarters: San Francisco, CA (offices in New York, Vancouver, Berlin, Kyiv, Lviv)
  productSummary: >
    Grammarly offers AI-powered writing assistance (grammar, style, tone, and clarity suggestions)
    via a Chrome extension, desktop app, mobile app, and Microsoft Office integration. The
    Superhuman Suite adds Coda Docs (collaborative workspace) and Superhuman Mail (AI email
    assistant). Enterprise products include Grammarly Business for brand voice, style guides,
    analytics, and admin controls. All tiers operate on a freemium model with paid upgrade paths.
  customerFocus: >
    Primary: enterprise employees and organizations requiring brand-consistent, error-free business
    communication (50,000+ orgs, 96% F500 presence). Secondary: individual professionals and
    students via Consumer Pro subscriptions. Free tier: 30M+ DAUs who use the product daily but
    have not converted to paid.
  businessModel: >
    Freemium SaaS: free tier (ad-free, limited features), Consumer Pro subscription ($12/month
    billed annually), Grammarly Business/Enterprise (per-seat annual contracts), and Grammarly
    for Education (institutional licensing). Revenue from Chrome extension, desktop, and API
    integrations. Primary growth driver is enterprise seat expansion.
  stage: Late-stage private, pre-IPO (targeting 2027 IPO via GC facility bridge)
  fundingStatus: >
    Series A: $110M (2017); Series B: $90M (2019); Series C: $200M at $13B valuation (November
    2021). Non-dilutive: $1B General Catalyst HorizonNext facility (May 2025). Total equity raised
    ~$400M; total capital including non-dilutive: ~$1.4B. No equity round since November 2021.
  disclosureProfile: private-undisclosed
  claimRefs:
