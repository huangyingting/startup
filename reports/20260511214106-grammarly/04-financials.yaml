company:
  name: Grammarly
chapter:
  number: 4
  title: Financials
  summary: 'Grammarly (rebranded as Superhuman in October 2025) has built a recurring-revenue engine that reached

    approximately $700M ARR by May 2025, growing from an estimated $350M in FY2021. The freemium-to-paid

    funnel across consumer and enterprise segments drives the majority of revenue, with Pro subscriptions at

    $12/month (annual) and Business/Enterprise contracts at custom pricing for large deployments. However,

    year-over-year ARR growth has decelerated sharply—from roughly 43% in FY2022 to approximately 12% in

    FY2024—a meaningful adverse signal for a company still carrying a $13B equity valuation from its 2021

    Series C with no subsequent equity re-mark.


    Capital adequacy improved materially in May 2025 when Grammarly secured $1 billion in non-dilutive

    growth financing from General Catalyst''s Customer Value Fund, a revenue-backed structure that preserves

    dilution but also signals that a traditional equity round at the $13B mark was not viable. Seven

    Regulation D exempt-offering filings with the SEC from 2024 through 2026 confirm ongoing securities

    activity. With 1,500+ employees, an estimated gross margin of 70–75%, and ~$467K revenue per employee,

    the underlying unit economics are strong for a scaled SaaS, though rising AI inference costs and the

    integration complexity of the Coda and Superhuman Mail acquisitions introduce near-term margin pressure.

    '
sections:
- id: revenue-model
  title: Revenue Model and Streams
  body: 'Grammarly operates a multi-tier freemium SaaS model across three primary distribution channels:

    consumer (B2C), business teams (B2B mid-market), and enterprise (large accounts with custom contracts).

    A fourth revenue stream—education site licensing—serves universities and K-12 institutions through

    annual institutional agreements. A fifth nascent stream operates via the Grammarly developer API,

    through which third-party SaaS products embed Grammarly''s writing assistance natively.


    The consumer free tier (an estimated 30M+ monthly active users) functions as the top of a funnel that

    converts to Pro subscriptions at $12/month billed annually ($144/yr). Business Teams plans layer on

    collaboration features and admin controls at higher per-seat pricing. Enterprise agreements—now branded

    Superhuman Go—carry custom pricing with volume discounts, dedicated support, and compliance SLAs that

    justify premium contract values. Grammarly has disclosed a 17× ROI claim for its Business product,

    implying that enterprise and mid-market accounts see measurable productivity gains that support renewal

    and upsell.


    The 2025 acquisitions of Coda (document collaboration) and Superhuman Mail (email AI) have expanded

    the revenue envelope beyond pure writing assistance into a broader AI productivity suite. These

    additions introduce new paid SKUs and cross-sell opportunities, but also raise integration risk and

    short-term revenue dilution during the transition period.

    '
