- id: pricing-and-monetization
  title: Pricing Tiers and Monetization Structure
  body: 'Grammarly''s pricing architecture reflects a deliberate land-and-expand strategy: the free tier

    removes friction for individual adoption, while paid tiers extract progressively higher value from

    power users and organizations. The Pro tier at $12/month (annual) or $30/month (monthly) targets

    individual professionals needing advanced grammar, clarity, plagiarism detection, and AI generation.

    The Business plan targets small and mid-sized teams, adding admin dashboards, style guides, and

    usage analytics—features that increase switching costs and drive seat-level expansion.


    Enterprise and Education channels command the highest contract values but require longer sales

    cycles. Enterprise agreements under the Superhuman Go brand include custom API integrations,

    dedicated CSMs, and compliance certifications (SOC 2, HIPAA-compatible configurations). Education

    licensing provides site-wide access to academic institutions at institutional per-seat pricing

    discounted from consumer rates, but creates a pipeline of future professional users.


    The developer API program allows third-party products to embed Grammarly''s NLP capabilities,

    creating a B2B2C monetization layer. API pricing is usage-based (tokens or API calls), which

    differs structurally from the subscription recurring revenue of other tiers and introduces

    volume-dependent margin variability.

    '
