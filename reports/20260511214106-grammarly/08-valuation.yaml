- id: TV002
  title: Thesis / Anti-Thesis Table
  notes: 'Key arguments for and against the investment thesis as of May 2026.'
  columns:
  - Thesis Argument
  - Supporting Evidence
  - Anti-Thesis Argument
  - What Would Change the View
  rows:
  - - Distribution moat (30M+ DAU, 44M+ Chrome installs)
    - Verified via About page, Expanded Ramblings, electroiq aggregation
    - Free tier moat does not translate to paid revenue; 87–93% of DAUs convert at $0
    - Evidence of materially improved paid conversion rate (above 15%)
  - - Enterprise depth (50K+ orgs, 96% F500)
    - Official About page; enterprise case studies (ConnectWise, State of CA)
    - Enterprise presence is by user adoption, not formal contracts; NRR unknown
    - Confirmed enterprise NRR above 110% and expanding contract values
  - - NLP/AI differentiation (decade of writing-context training data)
    - 5B+ corrections/day; proprietary model described in Engineering Blog
    - LLMs (GPT-4, Claude) have closed the grammar/style gap; commoditization risk
    - Clear technical benchmark showing Grammarly outperforms LLM-native tools at specific enterprise use cases
  - - Suite expansion (Coda Docs + Superhuman Mail + Grammarly AI)
    - Superhuman Suite launched Oct 2025; integration underway
    - Three-way integration not complete; CEO new to domain; rebrand reception unquantified
    - Post-rebrand enterprise expansion revenue visible in cohort data
  - - IPO optionality (GC facility as bridge)
    - GC $1B non-dilutive facility; IPO framing by multiple sources
    - GC covenants unknown; $13B equity raise improbable at current multiples
    - GC covenant terms confirmed reasonable; filed S-1 draft circulated
