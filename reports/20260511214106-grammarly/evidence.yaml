      AI writing assistant market. The ~40% estimate is derived from dividing company ARR by Mordor's market size—a
      methodology with significant limitations.
    whyItMatters: >-
      Actual competitive dynamics could be materially different if Grammarly's SAM is narrower than Mordor's definition,
      or if Microsoft Copilot and Google Gemini have already captured meaningful enterprise wallet share.
    diligencePath: >-
