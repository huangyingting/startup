    severity: material
    topic: Microsoft Copilot enterprise displacement evidence
    missingEvidence: >-
      No independent study or Grammarly-published data confirms a measurable Copilot-driven churn rate in Grammarly
      enterprise accounts. Win/loss data for Grammarly Enterprise deals where Microsoft Copilot was also evaluated is
      not publicly available.
    whyItMatters: >-
      If Microsoft Copilot is systematically winning enterprise budget evaluations that Grammarly previously won, the
      enterprise growth trajectory is impaired. Without win/loss data, severity cannot be assessed.
