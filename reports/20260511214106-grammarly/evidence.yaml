  - type: missing-source
    severity: minor
    topic: Microsoft and Google bundling impact
    missingEvidence: >-
      No independent study has quantified how much of Grammarly's slower consumer growth rate is attributable to
      Microsoft Copilot and Google Gemini bundling vs. generalized free-LLM substitution vs. market saturation in core
      English-language segments.
    whyItMatters: >-
      Attribution matters for strategy: if the primary driver is bundling, the competitive response requires
      differentiation on integration and multi-product breadth; if free substitution dominates, the response requires
      feature expansion and pricing adjustments.
    diligencePath: >-
      Request NPS data segmented by Microsoft 365 vs. non-Microsoft 365 users; analyze churn rate correlation with
      Copilot launch dates.
    relatedQuestionRefs:
      - QM024
  - type: private-evidence-only
    severity: minor
    topic: valuation-to-SAM multiple
    missingEvidence: >-
      Grammarly's implied revenue multiple at a current fair-market valuation cannot be calculated without a current
      valuation figure. The $13B 2021 valuation implies a ~19x ARR multiple on $700M ARR—a multiple that is difficult to
      justify in the post-ZIRP rate environment for a company growing at 7-8%.
    whyItMatters: >-
      SAM penetration and growth rate together determine the sustainable revenue multiple; market sizing alone cannot
      support a valuation thesis without growth rate and competitive durability assumptions.
    diligencePath: >-
      Request current 409A valuation; model SAM penetration scenarios at different competitive-loss-rate assumptions for
      Microsoft bundling.
    relatedQuestionRefs:
