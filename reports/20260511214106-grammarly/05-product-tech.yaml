  title: Trust, Compliance, and Quality Controls
  columns:
  - Control / Certification
  - Status
  - Scope
  - Open Gap
  rows:
  - - SOC 2 Type 2
    - Certified
    - Security, privacy, availability, confidentiality
    - Report available on request; not public-facing
  - - SOC 3
    - Certified
    - Summary of SOC 2 controls (publicly available)
    - None (public report published)
  - - ISO 27001:2022
    - Certified
    - Information security management system
    - Specific audit scope details not public
  - - ISO 27018:2019
    - Certified
    - PII protection in cloud environments
    - Applies to cloud; on-premise data handling not covered
  - - ISO 27017:2015
    - Certified
    - Cloud service provider security controls
    - None identified from public disclosures
  - - ISO 42001:2023
    - Certified
    - AI management system — responsible AI development
    - Relatively new standard; auditor scope still evolving
  - - HIPAA-Compatible Configurations
    - Available (not full HIPAA covered entity)
    - Enterprise/Business Associate Agreements available
    - Not a covered entity; BAA terms must be reviewed per deal
  - - GDPR Compliance
    - Claimed in Trust Center
    - EU user data handling and privacy rights
    - No independent certification; self-attestation only
  - - AI Detection Accuracy
    - Deployed feature
    - Identifies AI-generated text in documents
    - False positive rate not publicly disclosed; academic debate on accuracy
  - - Privacy Toggle (per-app disable)
    - Product feature
    - User can disable Grammarly in specific apps
    - Opt-out reliance places burden on user awareness
  notes: Certification status based on Grammarly's public Security page and Trust Center. Independent verification of scope
    and findings requires direct engagement with Grammarly's compliance team.
