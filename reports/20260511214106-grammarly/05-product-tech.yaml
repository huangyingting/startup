- id: TE002
  title: Customer Workflow and Use-Case Analysis
  columns:
  - User Job-to-Be-Done
  - Prior Workflow
  - Grammarly/Superhuman Solution
  - Measurable Benefit
  - Key Limitation
  rows:
  - - Polish business email before sending
    - Manual review or peer editing
    - Real-time inline suggestions via browser/desktop extension
    - Reduce errors, improve clarity in seconds
    - Context window limited; deep domain jargon may still miss
  - - Generate first draft of document
    - Blank-page writer's block; manual drafting
    - AI-assisted draft generation in Grammarly Docs or Go
    - Speed up first draft by 50–70% (claimed ROI)
    - Output quality dependent on user prompt and LLM capability
  - - Maintain brand voice across large team
    - Style guides + manager review
    - Shared style guide + real-time custom suggestions
    - Brand-consistent output without reviewer bottleneck
    - Custom guide requires admin setup; rule conflicts with LLM suggestions
  - - Onboard cross-functional team to new documents (Coda)
    - Email chains + Google Docs + spreadsheets
    - Coda hub with linked tables, AI chat, and automation buttons
    - Reduces tool-switching; single source of truth
    - Migration from existing tools has high friction
  - - Academic writing and plagiarism checking
    - Manual proofreading + Turnitin
    - Grammarly for Education with plagiarism detection + AI detection
    - Instant feedback + academic integrity checks
    - AI detection accuracy debated; false positive risk
  - - Enterprise email management (Superhuman Mail)
    - Standard email clients (Gmail, Outlook)
    - AI-prioritized inbox, snooze, AI drafts, analytics
    - Speed and triage efficiency for high-volume email users
    - Premium price ($30+/mo); integration with other tools limited
  notes: Benefit estimates are based on Grammarly's claimed 17x ROI for business teams and general SaaS productivity research.
    Individual results may vary significantly.
- id: TE003
  title: Technology Architecture — Layer, Component, and Risk Analysis
  columns:
  - Layer / Component
  - Role
  - External Dependency
  - Key Risk
  rows:
  - - GECToR NLP Engine
    - Grammar error correction (tag-not-rewrite model)
    - Internal / Proprietary
    - Model staleness vs. improving LLM baselines
  - - Generative AI Layer (LLM)
    - Paraphrasing, drafting, rewriting, Reader Reactions
    - Third-party LLM APIs (likely OpenAI / Anthropic)
    - API pricing, rate limits, provider terms changes
  - - Browser Extension Runtime
    - Cross-web text injection and UI overlay
    - Chrome/Firefox/Safari/Edge extension APIs
    - Security exposure; browser API deprecation risk
  - - Desktop App (Electron / Native)
    - OS-level integration with 1M+ apps
    - OS APIs (Windows, macOS); app-specific integrations
    - OS API breakage; app update compatibility
  - - Mobile SDK (iOS / Android)
    - Keyboard-level and app-level writing assistance
    - iOS/Android keyboard APIs; App Store/Play Store policies
    - Policy changes by Apple/Google could restrict access
  - - Microsoft Office Add-in
    - Word, Outlook, PowerPoint, Teams integration
    - Microsoft Office JavaScript API
    - API versioning; current Mac Word degradation issue
  - - Google Docs Integration
    - In-document writing overlay
    - Google Workspace Add-on API
    - Google Workspace policy or API changes
  - - Grammarly API / Text Editor SDK
    - B2B2C embedded NLP for partner SaaS
    - Internal API layer
    - SDK versioning; limited partner oversight of usage
  - - Cloud Infrastructure
    - Real-time text processing, ML inference
    - Cloud provider (undisclosed; likely AWS or GCP)
    - Provider outage, cost escalation, vendor lock-in
  - - Plagiarism Detection Engine
    - Academic and professional integrity checking
    - Third-party corpus / web crawl data
    - Corpus coverage gaps; AI-generated text detection accuracy
  notes: Architecture based on public product documentation, GitHub, status page, and research publications. Internal cloud
    provider and LLM vendor are not publicly disclosed.
