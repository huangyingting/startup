company:
  name: Grammarly
chapter:
  number: 5
  title: Product & Technology
  summary: 'Grammarly—now rebranded as Superhuman—has evolved from a grammar-correction browser extension into a

    multi-surface AI writing and productivity platform spanning browser, desktop, mobile, Microsoft Office,

    and 1 million+ integrations. Its core technical moat rests on three pillars: proprietary NLP models

    (including the published GECToR grammatical error correction model), a uniquely large proprietary dataset

    generated by 30M+ active users over 15+ years, and deep native integration across every major writing

    surface. The product has expanded its architecture to include a generative AI agent layer (Paraphraser,

    Reader Reactions, Humanizer, Proofreader Agent, Superhuman Go), a collaborative documents surface (via

    the 2024 Coda acquisition), and an AI email application (Superhuman Mail).


    Enterprise trust credentials are strong: Grammarly holds SOC 2 Type 2, ISO 27001, ISO 27018, ISO 27017,

    ISO 42001 (AI management), and SOC 3 certifications—a compliance portfolio that exceeds most AI writing

    competitors. The principal technical risks are third-party LLM API dependency for generative AI features,

    browser extension security exposure across 44M+ Chrome installs, and the integration complexity of

    maintaining real-time writing assistance across 1M+ apps and websites while absorbing two acquired

    platforms (Coda, Superhuman Mail) into a coherent product suite.

    '
sections:
- id: product-modules
  title: Product Modules and the Superhuman Suite
  body: 'Following the October 2025 corporate rebrand, Grammarly''s product portfolio is now organized under

    the "Superhuman Suite" umbrella with four distinct product lines. The original Grammarly writing

    assistance product—the company''s core revenue driver—provides real-time grammar, spelling, clarity,

    tone, and AI generation capabilities across browser extensions, desktop apps, mobile keyboards, and

    enterprise integrations. Superhuman Go is a context-aware AI assistant launched alongside the rebrand

    that operates across all apps, tabs, and workflows without requiring users to navigate to a separate

    product surface.


    Coda, acquired in December 2024, is a collaborative document editor that replaces the Google

    Docs/Airtable/Notion combination for structured team work—with tables that sync, views that

    personalize, and automation capabilities. Superhuman Mail (acquired in 2025) is a premium AI email

    client originally targeting executives and knowledge workers. Together, these four products represent

    a horizontal expansion of the product surface from "writing assistance" to "AI productivity suite."


    The Agent Store, launched in late 2025, allows third-party developers to publish specialized agents

    (Box document management, Gamma presentation, Wayground research) that integrate into the Superhuman

    Go layer. The Authorship Attribution feature (launched late 2025) enables teams to track AI vs.

    human writing contributions within shared documents.

    '
