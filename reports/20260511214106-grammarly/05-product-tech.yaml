- id: technical-architecture
  title: Technical Architecture and AI Stack
  body: 'Grammarly''s product architecture operates in three distinct technical layers. The base layer is

    a real-time NLP pipeline that performs grammatical error correction, punctuation checking, word

    choice analysis, and clarity scoring. This layer is anchored by GECToR (Grammatical Error

    Correction: Tag, Not Rewrite), a proprietary model published in 2020 at BEA-20 that treats GEC

    as a sequence-tagging task rather than seq2seq generation—yielding faster inference and improved

    accuracy. Grammarly''s applied research team has been publishing NLP research for 10+ years,

    including models for text revision (IteraTeR, CoEdIT), privacy-preserving NLP, and grammatical

    error detection in 5+ languages.


    The middle layer is a generative AI platform that powers Paraphraser, Reader Reactions, Humanizer,

    and draft generation. This layer relies on large language models—likely a combination of

    proprietary fine-tuned models and third-party LLM API calls (OpenAI or similar providers). The

    company has not disclosed the exact composition of its LLM stack. The top layer is Superhuman Go,

    an OS-level assistant with context awareness across all open applications and browser tabs, built

    on the generative AI layer with workflow-aware prompting.


    Grammarly''s GitHub organization (github.com/grammarly) hosts 23 public repositories including

    GECToR (966 stars), CoEdIT (TypeScript/Python), and the GCDC corpus. The applied research team

    has published over 10 peer-reviewed papers and maintains a PhD internship pipeline. Google Patents

    records patents assigned to Grammarly in NLP and text editing domains, confirming ongoing IP

    development.

    '
  claimRefs:
