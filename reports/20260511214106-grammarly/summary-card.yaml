  shortDescription: >
    Grammarly (operating as Superhuman Platform Inc. since October 2025) is an AI-powered writing and productivity
    platform used by 30M+ daily active users and 50,000+ organizations. The company operates a freemium model anchored
    by a Chrome extension with 44M+ installs and is expanding toward an AI productivity suite (Grammarly + Coda
    workspace + Superhuman Mail) under CEO Shishir Mehrotra. Last equity-valued at $13B in November 2021; raised $1B in
    non-dilutive capital from General Catalyst in May 2025 on the path to a potential 2027 IPO.
