summary:
  headline: >
    Grammarly has an unmatched distribution moat (30M+ DAU, 96% F500) and genuine AI writing IP, but is overvalued at
    $13B (~18–20× ARR) with 12% growth; do not enter at current price — TRACK and re-evaluate at $5–7B when post-rebrand
    KPIs and GC covenant terms are confirmed.
