  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >-
              Grammarly 服务三层客户：（1）使用免费和 Pro 计划的个人消费者，数量最大，主要由学生、非母语英语使用者和知识工作者构成，负责拉动品牌认知并向 B2B 漏斗输送线索；（2）Business 层级的
              SMB / 团队买家（最高约 149 个席位，年付 $15/user/month）；（3）有定制合同、SSO、管理员仪表盘和合规需求的企业客户。地域上，美国贡献约 42% 的网站流量（约 25M 用户），印度（约
              10M）和英国（约 6M）是其后两大市场。用户群体女性占比偏高（56%），年龄集中在 25–34 岁（28%），教育、商业、英语 / 文学学科高度集中。企业垂直领域覆盖科技、金融服务、医疗、政府和专业服务。
            claimRefs: []
