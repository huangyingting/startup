  - id: FV001
    title: 推荐逻辑
    type: flow
    summary: 从规模、产品、客户、财务、风险和估值等证据输入一路推导，最终给出“观察”的投资建议。
    data:
      nodes:
        - id: market-scale
          label: 市场：TAM $7–11B，CAGR 21% — 强
        - id: product-moat
          label: 产品：安装量 44M、组织 50K+、NLP IP — 中等偏强
        - id: customer-proof
          label: 客户：F500 覆盖率 96%、具名企业、量化 ROI — 中等
        - id: financials
          label: 财务：$700M ARR，增长 12–13%（放缓）— 弱
        - id: risk-profile
          label: 风险：诉讼、CEO 交接、M365 Copilot、$13B 估值包袱 — 高
        - id: valuation-check
          label: 估值：18–20× ARR，相比可比公司 5–9×；合理价值 $4–7B — 负面
        - id: diligence-gaps
          label: 尽调缺口：NRR、GC 契约条款、品牌重塑后 KPI — 未解决
        - id: recommendation
          label: 推荐：观察 — $5–7B 入场价再跟踪；$13B 不进入
      edges:
        - from: market-scale
          to: recommendation
          label: 支撑
        - from: product-moat
          to: recommendation
          label: 支撑
        - from: customer-proof
          to: recommendation
          label: 部分支撑
        - from: financials
          to: recommendation
          label: 约束 — 增长放缓
        - from: risk-profile
          to: recommendation
          label: 约束 — 复合风险堆叠偏高
        - from: valuation-check
          to: recommendation
          label: 阻断 — 相对可比公司估值过高
        - from: diligence-gaps
          to: recommendation
          label: 阻断 — 6 项重大缺口未解决
  - id: FV002
    title: 估值敏感性
    type: bar
    summary: >-
      将不同 ARR 倍数套用到当前约 $700M ARR 基础上，得到隐含企业价值。所有数值单位均为 $M。当前 $13B 估值标记需要约 18–19× 倍数；可比 SaaS 公司提示 5–9×
      更站得住脚。更高倍数需要重新加速证据。
    data:
      items:
        - label: 4× ARR（悲观 — Asana 低迷倍数）
          value: 2800
        - label: 6× ARR（基准偏悲观 — HubSpot 对等）
          value: 4200
        - label: 9× ARR（基准 — Monday.com 对等）
          value: 6300
        - label: 12× ARR（基准偏乐观 — 套件溢价）
          value: 8400
        - label: 15× ARR（乐观 — 重新加速情景）
          value: 10500
        - label: 19× ARR（当前隐含 — GC 交易参照）
          value: 13300
  - id: FV003
    title: 估值 / 回报区间
    type: range
    summary: 以 2027 年退出窗口计，悲观、基准和乐观情景下的低 / 中 / 高估值结果。数值单位均为 $M。以 $5–7B 入场，在基准 / 乐观情景可产生足够回报；以 $13B 入场，即便乐观情景也偏弱。
    data:
      items:
        - label: 悲观情景（ARR 增长低于 10%，Copilot 替代，降价轮）
          low: 2600
          high: 4200
        - label: 基准情景（ARR 约 $820M，CAGR 10–12%，按 HubSpot-Monday 可比公司 IPO）
          low: 5600
          high: 7700
        - label: 乐观情景（ARR $1.1–1.2B，18–20% 重新加速，Superhuman Suite 成功）
          low: 13000
          high: 18000
  - id: FV004
    title: 投资 KPI
    type: kpi
    summary: 面向投委会的七维评分。财务、风险和估值分数偏低，进一步支持“观察 / 不按现价进入”的建议。
    data:
      items:
        - label: 市场机会 — 8/10
          note: $7–11B TAM，CAGR 21%；AI 生产力市场扩张；国际市场仍有空白
        - label: 产品与技术 — 7/10
          note: 十年 NLP IP、44M Chrome 安装、50K+ 组织；Coda/Mail 整合带来短期执行风险
        - label: 客户证明 — 7/10
          note: F500 用户覆盖率 96%，具名企业有量化 ROI；NRR 未披露；免费转付费仍是包袱
        - label: 财务健康度 — 5/10
          note: $700M ARR 有支撑；12–13% 增长已从 43% 峰值放缓；毛利率未知；GC 契约条款未披露
        - label: 风险画像 — 3/10
          note: Expert Review 诉讼、乌克兰集中度、CEO 交接、M365 Copilot 捆绑 — 复合风险堆叠
        - label: 估值支撑 — 2/10
          note: $13B 隐含 18–20× ARR，而可比 SaaS 为 5–9×；证据不支持以 $13B 入场
        - label: 证据质量 — 7/10
          note: 8 章、200+ 来源、7 轮研究；关键缺口：NRR、GC 契约条款、品牌重塑后 KPI
