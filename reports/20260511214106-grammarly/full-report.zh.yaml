      - - Microsoft Copilot 替代风险
        - Grammarly 企业续约率；赢单 / 输单报告；M365 Copilot 渗透率数据
        - 企业 NRR 连续两个季度低于 100%，或 M365 Copilot 在 >30% 流失账户中被提及
        - 需要防守式重新定位；护城河假设削弱
      - - 乌克兰人才中断
        - 冲突升级；Kyiv/Lviv 被迫撤离；工程师移民潮
        - 超过 25% 的乌克兰工程师无法工作超过 60 天
        - 启动应急招聘；评估对 NLP 路线图的影响；暂停新功能承诺
      - - General Catalyst 契约违约
        - 季度 ARR 报告；GC 公开评论；再融资公告
        - ARR 增长低于契约阈值（未披露），或 GC 退出持仓
        - 复核资本结构；评估替代融资；评估摊薄风险
      - - 监管执法（EU AI Act / GDPR）
        - EU AI Office 执法通知；DPA 监管调查；GDPR 罚款
        - 监管罚款 >€5M，或禁令要求 EU/UK 产品改动
        - 计提法律成本；需要改造产品；EU 收入承压
  - id: TV001
    title: 建议摘要表
    notes: 综合 Chapters 1–7 的证据。估值立场基于可比 SaaS 倍数分析和情景 建模。
    columns:
      - 维度
      - 评估
      - 证据依据
      - 信心
    rows:
      - - 投资建议
        - 观察 — 不要以 $13B 隐含估值入场
        - 可比 SaaS 倍数为 5–9×，对比隐含 18–20×；增长放缓
        - 中
      - - 信心水平
        - 中（仍有重大尽调缺口）
        - NRR、GC 契约、更名后 KPI 均未验证
        - N/A
      - - 风险评级
        - 高
        - 诉讼在审、CEO 交接、M365 Copilot 威胁、$13B 估值悬顶
        - 高
      - - 估值立场
        - $13B 估值偏高；按当前增长曲线，合理价值为 $4.2–7B（6–10× ARR）
        - 可比公司：HubSpot 6×、Monday 8–9×、Asana 3–4×；Grammarly 增长曲线落在 Asana–HubSpot 区间
        - 中
      - - 入场纪律
        - 只有在确认 NRR >110%、拿到 GC 契约条款、诉讼解决后，$5–7B 入场才站得住
        - TV003 为情景分析；TV004 为可比公司分析
        - 中
      - - 决策含义
        - 跟踪 Q2 2026 更名后指标；要求管理层开放尽调；在 $5–7B 老股交易时重新评估
        - TV005 为投资逻辑破坏触发点；TV006 为尽调问题
        - 中
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    notes: 截至 May 2026，支持和反对投资逻辑的关键论据。
    columns:
      - 投资逻辑论据
      - 支撑证据
      - 反向逻辑论据
      - 改变判断的证据
    rows:
      - - 分发护城河（30M+ DAU、44M+ Chrome 安装量）
        - 由 About 页面、Expanded Ramblings、electroiq 汇总验证
        - 免费层护城河没有转化为付费收入；87–93% 的 DAU 转化收入为 $0
        - 付费转化率显著提升的证据（高于 15%）
      - - 企业渗透深度（50K+ 组织、96% F500）
        - 官方 About 页面；企业案例（ConnectWise、State of CA）
        - 企业存在感来自用户采用，而非正式合同；NRR 未知
        - 企业 NRR 确认高于 110%，且合同金额扩张
      - - NLP/AI 差异化（十年写作上下文训练数据）
        - 每日 5B+ 次纠错；Engineering Blog 描述了自研模型
        - LLM（GPT-4、Claude）已补上语法 / 风格差距；存在商品化风险
        - 明确技术基准显示 Grammarly 在特定企业用例上优于 LLM 原生工具
      - - 套件扩张（Coda Docs + Superhuman Mail + Grammarly AI）
        - Superhuman Suite 于 Oct 2025 推出；整合正在推进
        - 三方整合尚未完成；CEO 新进入该领域；更名接受度未量化
        - 队列数据中可见更名后的企业扩张收入
      - - IPO 可选性（GC 融资工具作为过桥）
        - GC $1B 非摊薄融资工具；多方将其解读为 IPO 铺垫
        - GC 契约未知；按当前倍数，$13B 股权融资难以实现
        - GC 契约条款确认合理；已提交的 S-1 草稿开始流转
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    notes: 三种情景基于 Ch4 ARR 与增长数据建模；可比倍数来自 TV004。
    columns:
      - 情景
      - 2027 ARR（估计）
      - 增长率
      - 隐含估值（倍数）
      - 关键风险
      - 概率信号
    rows:
      - - 乐观情景
        - $1.1–1.2B ARR
        - 18–20% YoY 再加速
        - $13–18B（12–15× ARR）
        - 需要 Superhuman Suite 无瑕整合，且 Copilot 替代失败
        - 25% — 取决于更名后再加速证据
      - - 基准情景
        - $800–850M ARR
        - 10–12% CAGR
        - $5.6–7.7B（7–9× ARR）
        - 企业扩张温和；Copilot 吃下低端 SMB 层；GC 融资工具维持
        - 50% — 与当前 ARR 增长轨迹一致
      - - 悲观情景
        - $650–700M ARR
        - 低于 10%（停滞或收缩）
        - $2.6–4.2B（4–6× ARR）
        - Copilot 替代企业层；GC 契约违约；Expert Review 和解金额超过 $100M
        - 25% — 取决于 Copilot 份额增长兑现
  - id: TV004
    title: 可比估值表
    notes: >-
      上市可比公司的 ARR 和市值数据来自 stockanalysis.com（2024 报告值）；私有可比公司数据来自 TechCrunch 融资报道和 Sacra 估计。HubSpot/Asana/Monday
      是最干净的上市可比公司。
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the most directly comparable public SaaS productivity tools (HubSpot, Asana, Monday.com) and
        highest-profile private AI writing/productivity rounds (Notion, Writer, Jasper). Does not cover all possible
        comparables — omits niche AI tools with limited public data and public companies with substantially different
        business models.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
    columns:
      - 可比公司
      - 指标 / ARR
      - 估值 / 倍数
      - 与 Grammarly 的相关性
      - 主要局限
    rows:
      - - HubSpot（HUBS）
        - $2.5B ARR（2024）；15% YoY 增长
        - $15B 市值（~6× ARR）
        - 最接近的上市可比公司 — 增速放缓的 SaaS、大规模装机基数、企业销售动作
        - HubSpot 已盈利（non-GAAP）；Grammarly 盈利能力未知；多产品套件更成熟
      - - Asana（ASAN）
        - $720M ARR（2024）；10% YoY 增长
        - $2.5B 市值（~3.5× ARR）
        - 与 Grammarly 增长曲线非常接近；生产力工具；B2B
        - Asana 未盈利且经历大幅重组；品牌认知较低；纯工作管理工具
      - - Monday.com（MNDY）
        - $950M ARR（2024）；22% YoY 增长
        - $8B 市值（~8.4× ARR）
        - 具备 B2B DNA 的 Work OS；套件扩张（CRM、Dev）；享有显著增长溢价
        - Monday 增速约为 Grammarly 的 ~2×；产品扩张新鲜度高，而 Grammarly 核心产品已成熟
      - - Notion（私有）
        - $300M ARR 估计值（2021）；融资时 50–80% YoY 增长
        - $10B 估值（33× ARR — 2021 峰值倍数）
        - 私有 AI 生产力独角兽；同属 2021 泡沫年份
        - 2021 峰值倍数；Notion 增速可能高于 Grammarly；老股折价可能为 40–60%
      - - Writer（私有）
        - $75M ARR 估计值（2024）；80%+ YoY 增长
        - $1.9B 估值（~25× ARR）；Series C 2024
        - 企业 AI 写作；直接竞争对手；近期融资验证 AI 写作类别溢价
        - 高增长早期公司；ARR 基数较低；买方画像不同（AI-first 企业）；没有消费者护城河
      - - Jasper（私有）
        - 收入未披露；Series C 融资 $125M，估值 $1.5B（2023）
        - $1.5B（2023）；之后可能受损 — 有增长挑战报道
        - AI 营销写作；Grammarly 竞争对手；倍数压缩警示案例
        - 据报道 Jasper 2023 后面临增长逆风；$1.5B 相比当前市场可能偏高
  - id: TV005
    title: 投资逻辑破坏与叫停触发点表
    notes: 会导致投资逻辑根本性重估的触发点。
    columns:
      - 触发点
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - ARR 增长停滞
        - ARR 增长连续两个季度低于 8%
        - 增速放缓意味着 Microsoft Copilot 正在核心细分市场替代；基准情景转为悲观情景
        - 退出持仓 / 不入场；竞争护城河上的投资逻辑被破坏
      - - GC 契约违约
        - 公开披露 GC 融资工具修订，或发生加速事件
        - 资本结构受损；股权面临风险；可能出现下轮融资降估值
        - 立即叫停；重新评估整体资本结构和摊薄风险
      - - Expert Review 集体认证
        - 法院批准集体认证，或和解金额超过 $100M
        - 重大负债确认；S-1 准备受阻；企业端信任受损且难以修复
        - 重大负面；重新评估诉讼风险溢价；可能需要专项法律准备金
      - - 企业 NRR 低于 100%
        - 任何披露数据确认企业队列 NRR 低于 100%
        - 扩张逻辑失效；既有企业账户净收入在萎缩
        - 企业护城河上的投资逻辑破坏；重估全部企业 ARR 假设
      - - Superhuman 更名失败
        - 更名后 DAU 下降超过 10%，或企业流失率上升超过 200 bps
        - 品牌切换成本超过收益；品牌资产受损抵消套件价值
        - 谨慎跟踪；任何入场前重新评估更名执行
      - - CEO 12 个月内离任
        - 在 CEO 任满一年之前（Dec 2025 前）宣布 Mehrotra 离任
        - 14 个月内第二次领导层更替，显示治理不稳
        - 持有观望；等待新 CEO 明朗和领导层稳定
  - id: TV006
    title: 最终尽调问题表
    notes: 按对投资逻辑的重要性排序。1–3 项为阻断项；4–6 项重要但非阻断， 可通过适当模型调整处理。
    columns:
