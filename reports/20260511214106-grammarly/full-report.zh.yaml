      - number: '6.4'
        title: 留存与韧性
        blocks:
          - type: paragraph
            body: >-
              Grammarly 不公布 NRR、GRR、队列留存或年度流失率。免费增值模式会结构性压低付费转化：在约 30M DAU、估计 7–13% 转化率下，约 87–93%
              的日活用户会长期停留在免费层。Sacra（2024）将消费者收入描述为由「低价席位占比扩大」驱动，意味着公司高度依赖高体量、低 ARPU 的个人计划。套件扩张（Coda Docs、Superhuman
              Mail、Agent Store）和品牌架构重做提高了切换成本，暗示企业粘性存在。不过，AI 写作市场竞争已加剧：Microsoft Copilot 与 M365 捆绑，对既有 M365 用户的边际成本为零；原生
              LLM 写作工具也带来替代压力。客户满意度信号积极：Chrome 扩展在 Chrome Web Store 的 26,000+ 条评价中保持 4.6/5 星，Grammarly 也持续赢得 G2 Writing
              Assistant 类别。Expert Review 诉讼（2026 年集体诉讼）则是反向留存信号，尤其会影响重视准确性保证、对信任敏感的客户。
            claimRefs: []
          - type: table
            tableRef: TU004
            claimRefs: []
          - type: figure
            figureRef: FU004
            claimRefs:
              - CU018
              - CU020
      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Grammarly 的扩张模型依赖四个杠杆：（1）企业账户内席位扩张，从部门级走向全组织；（2）产品从 Business 向 Enterprise 增购；（3）Superhuman
              品牌重塑落地后，推动套件交叉销售（Coda Docs、Superhuman Mail、Agent Store）；（4）通过专门团队职能页面，纵向扩展到新职能（销售、HR、法律）。96% 的 Fortune 500
              用户触达（按单个员工采用计）说明仍有大量空白可转化为结构化合同。50,000+ 组织数量缓解了集中度风险，单一客户不太可能贡献 >5%
              收入。但免费增值的大众市场基座意味着，许多「客户」是零收入用户，只产生成本，没有对应收入。美国贡献约 42% 流量，形成地域集中；多语言支持（2025 年 9 月上线，覆盖 6 种语言）是降低这一风险的关键杠杆。
            claimRefs: []
          - type: table
            tableRef: TU005
            claimRefs: []
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与诉讼风险
        blocks:
          - type: paragraph
            body: >-
              近期最主要的法律风险，是 2026 年 3 月 11 日提交的 Expert Review 集体诉讼。首席原告 Julia Angwin 是知名调查记者；她指控 Grammarly 的「Expert
              Review」功能在专业作家和学者不知情、未同意的情况下，使用其姓名、身份和声誉作为 AI 生成编辑，违反公开权法规，并可能违反 FTC Act 第 5 条。诉讼提交后，Grammarly 迅速下线 Expert
              Review 工具，CEO Shishir Mehrotra 表示公司会「迅速而谨慎地」调查。工具撤回说明 Grammarly
              内部评估存在实质法律敞口，但集体诉讼本身仍在进行。目前最高赔偿额没有上限；在加利福尼亚州、纽约州和伊利诺伊州，面向整个集体的公开权索赔可能金额可观。三家原告方律所——prf-law.com、Burns
              Charest 和 Herrera Kennedy——被列为律师，说明原告集体资源充足。学术界反应（据 Times Higher
              Education）在商业敞口之外，又增加了机构声誉风险。另一个独立风险是，如果用户提交文本未经充分同意就被纳入模型训练，Grammarly 的 AI 训练数据实践可能引发版权侵权索赔。隐私政策授予
              Grammarly 处理文本以改进产品的广泛许可，这符合常见 SaaS 做法；但在 GDPR 下，当公司主张的依据是合法利益时，仍可能遭到挑战。
            claimRefs: []
