companyProfile:
  summary: >
    Grammarly 由 Max Lytvyn、Alex Shevchenko 和 Dmytro Lider 于 2009 年在乌克兰 Kyiv 创立。产品最初是浏览器语法工具， 后来按用户规模发展为全球最大的 AI 写作助手，服务
    30M+ 日活跃用户、44M+ Chrome 安装量和 50,000+ 个组织， 其中包括 96% 的 Fortune 500。2024 年 12 月，Grammarly 收购工作空间创业公司 Coda，并任命其 CEO
    Shishir Mehrotra 出任 Grammarly 新 CEO，接替任职 14 年的 Brad Hoover。2025 年 10 月，公司将母公司更名为 Superhuman Platform Inc.，并推出
    Superhuman Suite，把 Grammarly AI、Coda Docs 和 Superhuman Mail 合并为一体化 生产力平台。公司于 2021 年 11 月以 $13B 估值完成 $200M C 轮融资，并于
    2025 年 5 月从 General Catalyst 获得 $1B 非稀释性融资额度，目标在 2027 年 IPO。
