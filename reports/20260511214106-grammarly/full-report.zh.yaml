      - number: '5.2'
        title: 技术架构与 AI 栈
        blocks:
          - type: paragraph
            body: >
              Grammarly 的产品架构分三层运行。底层是实时 NLP 管线，负责语法纠错、标点检查、用词分析和清晰度评分。这一层由 GECToR（Grammatical Error Correction: Tag,
              Not Rewrite）支撑；这是 Grammarly 在 2020 年 BEA-20 发布的自研模型，把语法纠错（GEC）视为序列标注任务，而不是 seq2seq
              生成，因此推理更快、准确率更高。Grammarly 应用研究团队发布 NLP 研究已超过 10 年，方向包括文本修订模型（IteraTeR、CoEdIT）、隐私保护 NLP，以及 5+ 种语言的语法错误检测。


              中间层是生成式 AI 平台，驱动 Paraphraser、Reader Reactions、Humanizer 和草稿生成。这一层依赖大语言模型，可能由自研微调模型和第三方 LLM API 调用（OpenAI
              或类似供应商）共同组成。公司没有披露 LLM 栈的精确构成。顶层是 Superhuman Go，一个具备跨所有已打开应用和浏览器标签页上下文感知能力的 OS 级助手，基于生成式 AI 层，并加入工作流感知提示。


              Grammarly 的 GitHub 组织（github.com/grammarly）托管 23 个公开仓库，包括 GECToR（966 个星标）、CoEdIT（TypeScript/Python）和 GCDC
              语料库。应用研究团队已发表 10 多篇同行评审论文，并维持 PhD 实习管线。Google Patents 记录了归属 Grammarly 的 NLP 和文本编辑领域专利，确认公司仍在推进 IP 开发。
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
