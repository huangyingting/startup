    rows:
      - - LLM 能力提升（GPT-4o+、Claude、Gemini）
        - 驱动
        - 当前 / 持续
        - 将用例从语法扩至完整初稿生成；推高用户预期；Grammarly 必须接入前沿模型才能保持竞争力
        - GrammarlyGO 由哪些模型驱动？公司多快能切换或升级底层 LLM？
      - - 非母语英语人群扩张（1B+ 人）
        - 驱动
        - 中期（2025–2028）
        - 多语言发布（2025 年 9 月）打开欧洲和拉美市场；覆盖过去服务不足的多数人群，扩大总可用市场（TAM）
        - 多语言用户的付费转化率是多少？增长由企业端还是消费者端驱动？
      - - 企业数字化转型和远程工作
        - 驱动
        - 当前 / 持续
        - 写作辅助从可选支出进入基础设施预算；降低流失风险；BFSI 行业（占 AI 生产力市场 21.6%）与 Grammarly 的合规定位契合
        - 确认各细分市场的 ARR 续约率和净美元留存率；索取企业客户队列数据
      - - Grammarly 平台扩张（Coda、Superhuman）
        - 驱动
        - 中期
        - 多产品打包拉高 ARPU；总可用市场（TAM）从 $1.77B 的窄口径转向 $9.89B 的 AI 生产力口径；General Catalyst CVF 的 $1B 支撑激进 GTM
        - Grammarly、Coda、Superhuman 用户之间的交叉销售附着率是多少？
      - - Microsoft 365 Copilot 捆绑（约 380M M365 订阅用户）
        - 约束
        - 当前 / 持续
        - 最严重的独立产品威胁；如果 Copilot 覆盖基础写作辅助，企业买方可能不再为 Grammarly 支付增量费用；定价权承压
        - 在同时评估 Copilot 和 Grammarly 的客户中，Grammarly 的赢单率是多少？
      - - LLM 商品化和免费替代品（ChatGPT Free、Gemini Free）
        - 约束
        - 当前 / 持续
        - 消费者细分市场转化率下滑；增速从 43% CAGR（2022）降至约 7-8%（2026 估计），部分原因是免费替代
        - 索取消费者流失率、各队列免费转付费转化率以及月环比免费用户增长
      - - EU AI Act 分阶段执行（2025–2027）
        - 约束
        - 中期
        - 欧洲合规成本上升；受监管行业销售周期拉长；高风险用例存在欧盟专属功能限制风险
        - Grammarly 是否在主动申请 EU AI Act 认证？ARR 中来自欧盟的比例是多少？
      - - 企业数据隐私和云端顾虑（BFSI、法律、医疗）
        - 约束
        - 当前 / 持续
        - 拖慢向最高价值受监管企业细分市场扩张；需要本地部署或私有云替代方案
        - Grammarly 是否提供私有云或本地部署企业选项？已有哪些数据处理协议？
