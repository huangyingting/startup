      - number: '4.2'
        title: 定价层级和商业化结构
        blocks:
          - type: paragraph
            body: >
              Grammarly 的定价架构体现了明确的「先落地、再扩张」策略：免费层降低个人采用门槛，付费层则从高频用户和组织身上逐级提取更高价值。Pro 层年付 $12/month、月付
              $30/month，面向需要高级语法、清晰度、剽窃检测和 AI 生成能力的个人专业用户。Business 计划面向中小团队，增加管理员仪表盘、风格指南和使用分析，这些功能会抬高切换成本，并推动按席位扩张。


              企业和教育渠道合同金额最高，但销售周期更长。Superhuman Go 品牌下的企业协议包括定制 API 集成、专属 CSM，以及合规认证（SOC 2、兼容 HIPAA
              的配置）。教育授权以机构级按席位定价，给学术机构提供全站访问，价格低于消费者费率；但它也为未来专业用户铺出管道。


              开发者 API 计划让第三方产品嵌入 Grammarly 的 NLP 能力，形成一层 B2B2C 变现。API 定价按使用量计费（tokens 或 API
              calls），结构上不同于其他层级的订阅经常性收入，也引入了随用量波动的毛利率不确定性。
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
