  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界和范围
        blocks:
          - type: paragraph
            body: >
              Grammarly 及其母公司 Superhuman Platform Inc. 横跨多个嵌套市场；在做任何市场规模测算前，必须先把边界划清。最窄口径下， Grammarly 竞争的是专业 AI
              写作助手软件市场——这类工具专门用语法纠错、风格指导、语气调整和生成式建议来提升人类撰写的文本。 Mordor Intelligence 将市场定义为 2025 年 $1.77 billion，并以 22.49%
              CAGR 增长，到 2030 年达到 $4.88 billion。 窄口径总可用市场（TAM）最适合用来评估 Grammarly 当前核心业务与 Writer.com、ProWritingAid、Jasper
              AI 和 QuillBot 等直接竞争对手的对位。


              更宽的市场定义覆盖所有 AI 写作和内容生成平台，包括 ChatGPT 的写作场景、Google Gemini 的 Workspace 集成，以及面向营销的生成式工具。 Dataintelo 和
              Technavio 估计，更宽市场在 2025 年约为 $6.2 billion，并将以 20.3% CAGR 增长，到 2034 年达到 $32.8 billion。宽口径定义更贴近 Grammarly
              的战略野心：收购 Coda 和 Superhuman 表明，公司想争夺更宽的 AI 生产力工作流预算， 而不只是语法纠错支出。


              最宽且仍相关的视角是 AI 生产力工具市场，覆盖虚拟助手、文档管理、写作辅助、代码生成和工作流自动化；该市场 2024 年规模为 $9.89 billion，预计以 27.9% CAGR 增长，到 2034
              年达到 $115.85 billion。Grammarly 的平台化转型使其可以在多年维度上争夺更宽 TAM 的份额。支撑所有写作工具的底层 NLP 技术基础设施在 2025 年规模为 $34.4–36.8
              billion，到 2034 年约以 19.7–20% CAGR 增长，为写作类工具所在的整体基础设施投资给出上限。


              Grammarly 的可服务市场（SAM）不包括纯代码生成工具（GitHub Copilot、Tabnine）、图像和音频生成，以及独立翻译服务（DeepL、单独使用的 Google
              Translate）。现状替代品包括人工校对、人类编辑、Microsoft Word 原生拼写检查和通用浏览器拼写检查；Grammarly 的数据表明， 现状替代品在专业工作流中正被 Grammarly
              替代。Grammarly 正在进入的邻近市场包括邮件生产力（2025 年 7 月收购 Superhuman）、协作文档工作流 （2025 年 1 月收购
              Coda）和生成式起草（GrammarlyGO，2023）。
