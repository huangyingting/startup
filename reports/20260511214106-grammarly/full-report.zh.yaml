        - 未公开披露；连代理指标也没有
        - 决定企业扩张逻辑是否成立；NRR 低于 100% 将彻底打破投资逻辑
        - 向 Grammarly 管理层索取；与行业基准（Bessemer Cloud Index）对比
      - - General Catalyst 契约条款
        - 契约结构、触发条件、利率重置、转换权均未披露
        - 决定下行资本结构风险；契约违约可能让股权处于次级
        - 索取融资协议；直接接触 GC 获取投资人级披露
      - - 更名后用户和企业 KPI
        - 从 October 2025 更名到 May 2026，未披露 DAU、NPS 或企业流失数据
        - 更名对投资逻辑至关重要；没有数据就无法量化执行风险
        - 索取覆盖 Q4 2025 和 Q1 2026 的季度指标包
      - - Expert Review 诉讼状态
        - 集体认证状态、和解区间、保险覆盖均未知
        - 决定诉讼悬顶对 S-1 准备时间表和企业信任损伤的影响
        - 审阅 PACER 案卷；聘请外部诉讼律师评估
      - - 乌克兰员工数与应急计划
        - Kyiv/Lviv 工程师具体占比未披露；地域冗余计划未确认
        - 乌克兰集中风险是最重大的未量化运营风险
        - 索取按地域划分的组织架构图；确认 EU/North America 影子工程能力
      - - Coda 与 Superhuman Mail 整合里程碑
        - 整合路线图、时间表、合并平台 ETA 未公开披露
        - 三方整合是核心产品押注；没有里程碑，执行风险就是黑箱
        - 索取产品路线图；评估 Coda 收购后工程团队结构
