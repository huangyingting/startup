      - number: '1.3'
        title: 融资历史和投资方基础
        blocks:
          - type: paragraph
            body: >-
              Grammarly 在生命周期早期没有依靠外部资本就实现盈利，直到 2017 年才完成第一轮风险投资；当时公司已有 700 万日活跃用户， 免费增值飞轮也已经得到验证。$110 million A 轮由
              General Catalyst 领投，IVP、Spark Capital、Breyer Capital 和 SignalFire 参投。2019 年公司又完成 $90 million B 轮，General
              Catalyst 再次参与，公司估值首次超过 $1 billion。 2021 年 11 月，Grammarly 以 $13 billion 估值完成 Baillie Gifford 和 BlackRock
              领投的 $200 million+ 融资——这是公司在 ZIRP 时代的股权估值峰值。Crunchbase 口径下，2025 年前累计股权融资约 $400 million；PitchBook 口径超过 $550
              million， 差异可能来自对可转换工具的定义。2025 年 5 月，Grammarly 从 General Catalyst 的 Customer Value Fund（CVF）获得 $1 billion
              非稀释性增长融资。交易不会重置股权估值，也不会给 General Catalyst 增量股权；Grammarly 需要偿还本金， 再支付一部分由资金使用带来收入的封顶比例。CEO Mehrotra
              公开表态称公司最终目标是 IPO，但近期没有时间表。TechCrunch 引述一名匿名投资者称， 当前真实股权估值比 2021 年 $13 billion 峰值「显著更低」。
