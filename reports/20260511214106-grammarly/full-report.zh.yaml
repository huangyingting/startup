chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品和商业模式
        blocks:
          - type: paragraph
            body: >-
              Grammarly 是 AI 驱动的写作辅助平台，帮助个人和组织写出更清晰、更有效的文字沟通。产品以浏览器扩展、桌面应用、移动键盘和 API 集成形态运行，覆盖 100 多万个应用和网站。Grammarly
              提供三个层级：带基础语法和拼写检查的免费版、按年计费 $12/月的 Pro 订阅，以及面向组织的 Enterprise 定价。公司 2009 年在乌克兰 Kyiv 以学生语法检查器起步，后来将总部迁至 San
              Francisco，并在 2015 年转向免费增值 SaaS 模式，带来病毒式采用。Grammarly 的收入模式混合消费者订阅和企业软件合约， 受益于产品驱动增长：免费用户逐步转为付费计划，企业 IT
              部门再把团队级授权正式化。公司每天处理约 25 万亿个 token 和 2000 亿个单词，巩固了其作为部署最广泛 AI 写作助手的地位。截至 2025 年 10 月，母公司已从 Grammarly Inc.
              更名为 Superhuman Platform Inc.，以反映扩展后的产品套件；套件现在包括 Coda 协作工作空间、Superhuman Mail 和 AI 智能体平台 Superhuman Go。核心
              Grammarly 写作产品保留自身品牌身份，并充当 Superhuman Suite 的锚点。
