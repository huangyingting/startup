      - number: '5.3'
        title: 部署界面与集成模型
        blocks:
          - type: paragraph
            body: >
              Grammarly 的部署架构通过五个主要界面做宽覆盖。浏览器扩展（Chrome：44M+ 安装，也覆盖 Firefox、Safari、Edge）把写作辅助注入任何基于网页的文本输入。桌面应用（Windows 和
              Mac）提供 OS 级集成，可在 Word、Pages、邮件客户端、Scrivener 等原生应用内工作，不依赖浏览器上下文。移动应用 / 键盘（iOS 和 Android）借助 iOS/Android 键盘
              API 和原生应用上下文，在所有移动应用内提供写作辅助。


              企业侧，Microsoft Office 加载项在 Word、Outlook、PowerPoint 和 Teams 内提供原生集成。Google Docs 有专门集成。Grammarly Docs
              界面则服务于深度工作的原生写作环境，直接竞争 Notion、Google Docs 和 Coda（现在也在 Superhuman Suite 内）。这些界面合计宣称可兼容 1 million+ 个应用和网站。


              开发者 API（developer.grammarly.com）让第三方 SaaS 公司通过 SDK 原生嵌入 Grammarly 的 NLP 能力。该 API 使用 Text Editor
              SDK，并提供文档化认证和集成模式。Salesforce、Zendesk 等多家 SaaS 公司已通过这一渠道集成 Grammarly，形成一条不要求终端用户安装的 B2B2C 分发路径。
            claimRefs:
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
