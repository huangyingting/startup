      - number: '3.4'
        title: 切换成本、多栖使用和锁定效应
        blocks:
          - type: paragraph
            body: >
              理解 AI 写作辅助中的切换成本动态，对评估 Grammarly 的留存风险和企业合约扩张能力都很关键。


              消费者切换成本低。由于所有竞争对手都有免费层，大多数个人用户可以零边际成本试用替代写作工具（QuillBot、ChatGPT、Claude）。主要切换阻力不是合同或财务锁定，
              而是工作流惯性——对已经习惯的用户而言，Grammarly 浏览器扩展变成了看不见的基础设施。消费者流失率未公开，但 Grammarly 净收入增长放缓 （进入 2026 年 TTM 估计
              7–8%）说明消费者免费转付费持续承压。消费者细分中多栖使用很普遍：很多用户同时启用 Grammarly 免费版和 ChatGPT 免费版，用 Grammarly 做行内纠错，用 ChatGPT
              做生成式写作任务。


              企业切换成本高得多。主要机制包括：（1）合规重新认证，SOC 2 和 GDPR 审查通常需要 2–4 个月；（2）与企业 IdP（Okta、Azure AD）的 SSO/SCIM 集成，需要 IT
              拆除并重建；（3）企业管理员定制（自定义写作目标、语气词典、品牌语气设置）归 Grammarly 所有且不可迁移； （4）部署复杂度（浏览器扩展、桌面应用、与 CRM 和内容工具的 API 集成）需要 IT
              协调才能撤回。合在一起，中端市场企业的切换时间线为 6–12 个月；即使竞争对手产品质量提高，也能提供有意义的流失保护。


              企业层面的多栖使用受 IT 采购政策限制。多数企业 IT 部门倾向减少供应商数量（供应商整合趋势），因此 Grammarly 必须赢下写作工具品类选择； 它很少与直接竞争对手共享预算。不过，与 Microsoft
              Copilot 多产品共存很常见：Grammarly 和 M365 Copilot 可以同时部署，且没有明显集成冲突， 企业可以在 M365 应用内使用 Copilot，在其他所有界面使用
              Grammarly。共存动态既是近期生存机制（Grammarly 不会马上被 Copilot 替代）， 也是长期脆弱点（一旦企业买方看到 Copilot 在跨应用场景中改善，Grammarly
              的边际购买理由就会被侵蚀）。


              供应和分发锁定主要由浏览器和操作系统厂商主导。Apple 决定在 iOS 18/macOS 15 内嵌 Writing Tools，直接与 Grammarly 面向消费者的 Chrome
              扩展和移动键盘竞争，而且不需要用户采取任何行动——新设备更新默认就有写作工具功能。Google 随时可能在 Chrome（Grammarly 扩展运行的浏览器）中内嵌 Gemini 语法辅助，会立刻给
              Grammarly 扩展制造访问和安装摩擦。平台级风险是 Grammarly 消费者分发模式面对的最严重长期供应链威胁。
            claimRefs:
              - CP027
              - CP029
              - CP030
              - CP031
              - CP037
              - CP038
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式和收入流
        blocks:
          - type: paragraph
            body: |
              Grammarly 运行多层级免费增值 SaaS 模式，覆盖三条主要分发渠道：
              消费者（B2C）、企业团队（B2B 中端市场）和企业级客户（采用定制合约的大账户）。
              第四条收入流是教育站点授权，通过年度机构协议服务大学和 K-12 机构。
              第五条仍处萌芽期的收入流来自 Grammarly developer API，第三方 SaaS 产品可借此原生嵌入 Grammarly 写作辅助。

              消费者免费层（估计 30M+ 月活跃用户）处在漏斗顶部，向按年计费 $12/月（$144/yr）的 Pro 订阅转化。
              Business Teams 计划在更高按席位定价上叠加协作功能和管理员控制。
              企业协议现以 Superhuman Go 为品牌，采用定制定价，包含量级折扣、专属支持和合规 SLA，以支撑更高合约价值。
              Grammarly 披露其 Business 产品有 17× ROI 主张，暗示企业和中端市场账户看到可衡量的生产力提升，从而支撑续约和增购。

              2025 年收购 Coda（文档协作）和 Superhuman Mail（邮件 AI），把收入边界从纯写作辅助扩展到更宽的 AI 生产力套件。
              新增产品带来新的付费 SKU 和交叉销售机会，但也提高了整合风险，并在过渡期内带来短期收入稀释。
            claimRefs:
