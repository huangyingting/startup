        - Microsoft（市值 $3T+）；Copilot 面向约 380M M365 订阅用户，采用内含 / 加购模式
        - 全球企业和商业 M365 用户；不单独面向消费者或 SMB
        - 深度接入 M365 全套产品（Word、Outlook、Teams、PowerPoint）；Microsoft Trust Center 合规；Azure 数据驻留
        - 写作功能质量在跨应用场景落后于 Grammarly；脱离 Microsoft 生态后不可用
      - - Google Workspace Gemini
        - 平台既有厂商（捆绑式 AI 写作）
        - Google（市值 $2T+）；Gemini 已纳入 Google Workspace Business 和 Enterprise 层级
        - Google Workspace 用户（企业、教育、政府）；全球数亿用户
        - 标准 Workspace 层级免费；深度接入 Gmail / Docs；用 Google 搜索做事实校验支撑
        - 仅限 Google Workspace 应用；没有跨应用写作辅助；部分行业的企业信任感弱于 Microsoft
      - - ChatGPT (OpenAI)
        - 通用 AI 助手（写作用例）
        - 估值 $157B+（2024 年要约交易）；每周用户 200M+；ChatGPT Enterprise 于 2023 年推出
        - 寻求通用 AI 生产力的个人、开发者、企业；不是写作专用工具
        - 前沿模型质量；免费层提供 GPT-4o；企业数据隐私选项；API 生态
        - 不是为写作辅助专门打造；没有内联跨应用集成；用户需要自行设置上下文
      - - Claude (Anthropic)
        - 通用 AI 助手（写作用例）
        - 估值 $60B+（2025 年）；已部署 Claude 3.5+ / 3.7；企业层级经 AWS Bedrock 和 Azure 分发
        - 企业工程、法务、知识工作；偏研究级；不是消费者写作工具
        - LLM 基准里写作质量评分最高；200K token 上下文窗口；Anthropic 企业隐私标准
        - 没有面向消费者的 Grammarly 式跨应用入口；分发以 API / 平台为主
      - - Apple Intelligence
        - 操作系统级 AI 写作（设备捆绑）
        - Apple（市值 $3T+）；Writing Tools 覆盖 iOS 18、iPadOS 18、macOS Sequoia；符合条件设备免费
        - Apple 设备用户（iPhone / iPad / Mac）；消费者和专业消费者；初期为美国英语
        - 零增量成本；设备级隐私（基础功能在端侧处理）；新设备上无摩擦触达
        - 发布时仅支持英语；功能集比 Grammarly 基础；未接入 Windows / Android；没有企业治理
