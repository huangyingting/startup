    rows:
      - - F500 组织内席位扩张
        - 扩张驱动因素
        - F500 用户覆盖率 96%；部门级 → 全组织增购路径
        - 上行空间高：即使当前 F500 覆盖中只有 30% 转为正式合同，也会显著推高 ARR
        - 索取企业队列平均每组织席位数；同比席位扩张率
      - - Superhuman Suite 交叉销售（Coda + Mail）
        - 扩张驱动因素
        - 套件于 2025 年 10 月推出；2024 年 12 月收购 Coda；Superhuman Mail 2025
        - 中等上行空间：多产品捆绑提高 ARPU 和切换成本，但需要新的购买动作
        - 跟踪 6 个月后 Coda 和 Mail 在现有 Grammarly Enterprise 账户中的附加率
      - - 教育 → 企业路径
        - 扩张驱动因素
        - 3,000+ 所机构；学生毕业后进入企业劳动力
        - 长期建设品牌；机构带来的短期收入贡献有限
        - 跟踪机构合同价值与教育细分市场消费者收入
      - - 多语言扩张
        - 扩张驱动因素
        - 截至 2025 年 9 月支持 6 种语言；非英语企业市场很大
        - 中等：打开此前被仅支持英语卡住的欧盟 / 拉美 / 亚太企业账户
        - 跟踪非英语用户 DAU 增长，以及新语言市场带来的企业管线
      - - 地理集中度（美国 = 42% 流量）
        - 集中度风险
        - 美国占比偏高；印度第 2（~17%）；英国第 3（~11%）
        - 中等风险：美国经济放缓或 M365 Copilot 采用激增，可能挤压消费者收入
        - 持续监测美国与非美国收入拆分；跟踪 Copilot 企业席位增长
      - - Microsoft Copilot 捆绑替代
        - 集中度风险
        - 对现有 M365 客户，Copilot 已包含在 M365 E3/E5 中，边际成本为零
        - SMB / 中端市场风险高：现有工作流里有免费替代品；Grammarly 必须靠质量和上下文能力拉开差异
        - 跟踪对阵 Microsoft Copilot 的企业赢 / 输率；索取竞争替代统计
      - - 单一产品依赖（写作辅助）
        - 集中度风险
        - 在 Superhuman Suite 跑通前，业务仍主要是语法 / 写作
        - 中等：如果 LLM 将基础语法纠错商品化，价值会迁移到高级功能和工作流集成
        - 跟踪 Superhuman Suite 采用；到 2026 年中衡量非写作辅助产品收入
