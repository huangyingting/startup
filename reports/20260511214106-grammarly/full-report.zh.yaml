      - number: '1.4'
        title: 规模、牵引力和地域分布
        blocks:
          - type: paragraph
            body: >-
              截至 2025 年中，Grammarly 的规模指标在后期 AI 原生公司中处于最亮眼的一档。平台日活跃用户超过 4000 万，72% 的活跃账户每周至少使用一次。 超过 50,000 个组织已将
              Grammarly 部署为企业工具，包括 Atlassian、Databricks、Zoom、Ford、Chevron 和 Salesforce。 全球还有 3,000 多所高等教育机构是授权用户。仅
              Grammarly 的 Chrome 扩展安装量就约 4400 万。平台每年处理 25 万亿个 token， 每天分析 2000 亿个单词，是实时写作辅助中处理量最高的部署。年经常性收入（ARR）截至 2025
              年 5 月超过 $700 million， 管理层评论也确认公司盈利。收入在 2021–2022 年同比增长约 43%，2023–2024 年放缓至约 12%，进入 2026 年的过去十二个月估计为
              7–8%。Grammarly 用户基础偏向美国（73%），在 India、United Kingdom、Philippines 和 Canada 也有显著渗透。根据 LinkedIn 估计，截至 2025
              年末员工数约 1,400–1,600。公司在 San Francisco（总部）、Kyiv、New York、Vancouver 和 Berlin 设有办公室。 在持续地区冲突背景下，联合创始人的乌克兰背景和
              Grammarly 的 Kyiv 工程办公室带来残余地域风险。
