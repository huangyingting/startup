      - number: '6.2'
        title: 采用轨迹
        blocks:
          - type: paragraph
            body: >-
              Grammarly 从 2015 年 1M 用户起步，以约 7% CAGR 增长，到 2020 年达到 30M+ DAU，并一直维持到 2024 年。注册用户总数现已超过 40M。按官方口径（Grammarly
              About 页面），组织采用数超过 50,000；部分第三方来源提到最高 70,000 家组织，但时效性较弱。仅 Chrome 扩展就有 44M+
              安装量，作为独立获客渠道，每新增用户的边际成本低。月度网站流量超过 60M 访问。教育板块现覆盖 3,000+ 所高等教育机构，Grammarly 的 Authorship
              工具用于学术诚信。产品驱动增长（PLG）是核心：员工往往先以个人身份采用 Grammarly，之后组织才正式签 Business/Enterprise 协议，形成自我强化的企业飞轮。
            claimRefs: []
