      - number: '6.3'
        title: 具名客户证明
        blocks:
          - type: paragraph
            body: >-
              Grammarly 的客户故事页面列出了 Databricks、Zapier、HackerOne、ModMed（CEO Dan Cane）和 Lucid（副总监 Jimmy
              Snyder）高管的具名证言。已发布案例给出了量化结果：Iterable（客户沟通平台）部署 Grammarly Enterprise 后，报告 93% 的沟通得到改善，每位用户每周节省 1.8
              小时。ConnectWise（IT 管理 SaaS）报告沟通质量提升 75%，每位用户每天节省 30 分钟，营销、教育和销售团队的 Style Guide 参与度达到
              95%。加利福尼亚州政府被列为具名客户，是一个值得注意的政府锚定部署。客户横跨金融服务（BlackRock、Investec、Waystar）、科技（Databricks、Zapier、HackerOne、ConnectWise、Prezi、Supermetrics）和医疗（ModMed）。在
              Grammarly 这一 ARR 规模下，公开呈现的垂直覆盖广度和具名高管证言，超过多数企业 SaaS 公司，更像是真实生产部署，而不是早期试点客户标识。
            claimRefs: []
