  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品模块与 Superhuman Suite
        blocks:
          - type: paragraph
            body: >
              2025 年 10 月公司重塑品牌后，Grammarly 的产品组合被归入「Superhuman Suite」旗下，分成四条清晰产品线。原有 Grammarly
              写作辅助产品仍是公司的核心收入引擎，覆盖浏览器扩展、桌面应用、移动键盘和企业集成，提供实时语法、拼写、清晰度、语气和 AI 生成能力。Superhuman Go 是随品牌重塑推出的上下文感知 AI
              助手，可跨所有应用、标签页和工作流运行，用户不必跳转到单独产品界面。


              2024 年 12 月收购的 Coda，是一款协作文档编辑器，面向结构化团队工作，替代 Google Docs/Airtable/Notion 组合，提供可同步表格、个性化视图和自动化能力。2025 年收购的
              Superhuman Mail 是高端 AI 邮件客户端，最初面向高管和知识工作者。四款产品合在一起，意味着产品界面从「写作辅助」横向扩展到「AI 生产力套件」。


              2025 年末推出的 Agent Store，让第三方开发者发布专业化 agent（Box 文档管理、Gamma 演示、Wayground 研究），并接入 Superhuman Go 层。Authorship
              Attribution 功能同样在 2025 年末推出，可让团队在共享文档中追踪 AI 与人工写作贡献。
