      - number: '1.5'
        title: 关键里程碑和负面事件
        blocks:
          - type: paragraph
            body: >-
              Grammarly 的公司历史由稳定出现的产品、融资和治理里程碑构成，其间夹杂声誉事件。公司 2009 年至 2017 年自举发展， 在获得任何风险投资前已达到 700
              万日活跃用户，增长路径异常资本高效。2015 年免费浏览器扩展上线是关键拐点：它打开病毒式分发， 并形成延续至今的产品驱动增长。2021 年以 $13 billion 估值融资，巩固了 Grammarly 作为
              ChatGPT 出现前最有价值 AI 公司之一的地位； 不过，今天看，估值反映的是 ZIRP 市场周期峰值，而不是当前基本面。2024 年 12 月收购 Coda、2025 年 1 月 CEO 交棒给
              Shishir Mehrotra，是公司历史上最重要的公司治理变化。2025 年 10 月更名为 Superhuman 并推出 Superhuman Go，最清楚地表明公司正从单一用途写作工具， 转向更宽的 AI
              生产力平台。但这段时间内最重要的负面进展出现在 2026 年 3 月：Grammarly 于 2025 年 8 月推出的「Expert Review」功能， 未经同意就使用 AI
              模拟数百名具名作家、记者和学者的反馈。集体诉讼 Angwin v. Superhuman Platform Inc. 于 2026 年 3 月 11 日在 New York
              南区法院提交，功能同日下线。诉讼称其违反 California 和 New York 隐私权与公开权，寻求超过 $5 million 的损害赔偿。 CEO Mehrotra
              公开道歉，同时坚持法律主张「没有依据」。截至报告日，诉讼仍在审理中。
