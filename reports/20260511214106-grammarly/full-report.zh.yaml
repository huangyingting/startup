  - id: TE002
    title: 客户工作流与用例分析
    columns:
      - 用户待完成任务
      - 原有工作流
      - Grammarly/Superhuman 解决方案
      - 可衡量收益
      - 关键限制
    rows:
      - - 发送前润色商务邮件
        - 手工审阅或同事编辑
        - 浏览器 / 桌面扩展实时给出行内建议
        - 数秒内减少错误、提高清晰度
        - 上下文窗口有限；深度行业术语仍可能漏判
      - - 生成文档初稿
        - 空白页卡住；手工起草
        - 在 Grammarly Docs 或 Go 中用 AI 辅助生成初稿
        - 初稿速度提升 50–70%（声称 ROI）
        - 输出质量取决于用户提示词和 LLM 能力
      - - 在大型团队中保持品牌语气
        - 风格指南 + 经理审阅
        - 共享风格指南 + 实时自定义建议
        - 产出保持品牌一致性，不再卡在审阅人
        - 自定义指南需要管理员配置；规则可能与 LLM 建议冲突
      - - 让跨职能团队快速理解新文档（Coda）
        - 邮件链 + Google Docs + 电子表格
        - Coda 中心连接表格、AI 聊天和自动化按钮
        - 减少工具切换；形成单一事实来源
        - 从现有工具迁移摩擦很高
      - - 学术写作与查重
        - 手工校对 + Turnitin
        - Grammarly for Education 提供查重 + AI 检测
        - 即时反馈 + 学术诚信检查
        - AI 检测准确性存在争议；有误报风险
      - - 企业邮件管理（Superhuman Mail）
        - 标准邮件客户端（Gmail、Outlook）
        - AI 优先级收件箱、稍后提醒、AI 草稿、分析
        - 提升高邮件量用户的处理速度和分流效率
        - 高价（$30+/mo）；与其他工具集成有限
    notes: 收益估计基于 Grammarly 声称商务团队 ROI 达 17x，以及一般 SaaS 生产力 研究。个人结果可能差异很大。
