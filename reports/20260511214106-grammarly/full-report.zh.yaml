    notes: 严重性评级基于截至 2026 年 5 月的公开竞争情报和分析师共识。“高”严重性威胁代表若不处理，18–24 个月内有实质 ARR 受冲击风险。尽调问题仅作示例；具体数据请求应按实际数据室结构调整。
