      - number: '2.2'
        title: 市场规模：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              已发布的 AI 写作助手市场估计差异很大：2025 年从 $1.77 billion（Mordor Intelligence）到 $6.2 billion（Dataintelo）不等。
              差异反映的是范围选择根本不同，而不是方法论错误。Mordor 将范围限制在专门构建、基于订阅的写作助手软件；Dataintelo 和 Technavio 则纳入为写作用途调用的 AI 模型
              API、内嵌写作功能的营销自动化工具，以及完整内容生成平台。保留两组估计，并明确口径差异，是尽调基本功。


              Grammarly 的可服务市场（SAM）落在窄口径和中口径的交集：知识工作者和组织使用的专业级 AI 写作辅助工具，买方重视信任、合规和工作流集成， 高于纯生成能力。2025 年保守 SAM 估计为 $2–3
              billion，方法是在 Mordor 的 $1.77B 基准上加入企业生产力邻近细分。由此看， Grammarly 截至 2025 年 5 月的 $700 million ARR 对应 SAM 渗透率
              23–35%；渗透率处于领先位置，但在 Microsoft Copilot 和 Google Gemini 捆绑分发面前并非不可撼动。


              在 $1.77 billion 的窄口径市场（仅专用写作软件）中，Grammarly 的 $700M ARR 约等于 40% 收入份额，市场领导地位清晰。不过， 份额计算对定义非常敏感。Getlatka 报告的
              2024 年净收入为 $251.8 million（相比 2025 年 5 月 ARR $700M），说明净收入和 ARR 定义存在显著差异，可能反映了递延收入、地域以及消费者与企业组合处理方式的不同。


              2025 年，North America 占全球 AI 写作助手市场的 35.9%（Mordor）到 38.5%（Dataintelo），与 Grammarly 约 73% 用户集中在美国相吻合。
              Asia-Pacific 是增长最快地区，到 2030 年 CAGR 为 23.5%（Mordor），由 India 内容经济、Japan 和 South Korea 企业采用， 以及 Southeast
              Asia 不断增长的英语专业劳动力推动。仅美国 AI 生产力工具市场 2024 年就达到 $4.28 billion，预计 CAGR 为 25.2%（Market.us）。Grammarly 2025 年 9
              月扩展到 Spanish、French、Portuguese、German 和 Italian，直接瞄准 Europe 和 Latin America 增长向量，覆盖每 5 名美国居民中就有 1
              名会多种语言的人群，以及数亿用非英语进行专业沟通的国际知识工作者。
