  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局和品类结构
        blocks:
          - type: paragraph
            body: >
              Grammarly 面对三个结构上不同的竞争层级，每一层都需要不同的战略回应。


              第一层是专用 AI 写作辅助工具，也是 Grammarly 最接近的正面竞争对手所在。Writer.com 是近期最危险的企业竞争对手；它在 2024 年 9 月以 $1.9 billion 估值完成 $200
              million C 轮。Writer 明确只做企业（没有免费层），聚焦整个组织的品牌语气一致性， 提供名为 Palmyra 的自研微调基础设施，并通过 SOC 2 Type II 和 GDPR
              合规认证。Writer 的产品架构避免把客户数据发送给 OpenAI 或其他第三方 LLM，在受监管企业采购中构成决定性差异点。QuillBot 于 2022 年 7 月被 Course Hero
              收购，交易对业务估值为 $4.7 billion；按用户数看， 它是第二大专用写作工具，用户数 5000 万+。QuillBot 聚焦改写、总结和语法纠错，与 Grammarly
              免费层用例高度重叠。QuillBot 的 $19.95/月高级计划（对比 Grammarly 的 $12/月）和激进的学术市场聚焦，使其成为学生和教育工作者的直接替代品。ProWritingAid（200 万+
              用户） 是桌面原生的风格和一致性工具，面向小说写作者、小说家和作者；它不争夺企业市场，但对专业创作者细分构成有意义的替代。Wordtune 基于 AI21 Labs 的 NLP
              研究构建，通过改写和语气调整功能服务 1200 万+ 用户，主要面向个人专业人士。


              第二层是捆绑 AI 写作的平台既有玩家，带来的竞争风险不同：不是直接替代，而是预算分流。Microsoft 365 Copilot 面向 Microsoft 365 订阅者嵌入
              Word、Outlook、Teams 和 PowerPoint，作为附加项收费 $30/用户/月（某些企业层级降至 $20–$30/用户/月）。 全球约 3.8 亿 Microsoft 365 订阅者让
              Copilot 拥有无可匹敌的分发杠杆。Google Workspace Gemini 嵌入 Gmail、Google Docs 和 Google Slides，并对大多数用户包含在标准 Google
              Workspace 订阅中，不额外收费。两个平台都在积极投入数十亿美元提升 AI 能力， 也都拥有信任、数据驻留和合规基础设施，可以在不依赖 Grammarly 的情况下赢下企业安全审查。


              第三层是用于临时写作任务的通用 LLM，正在形成一类增长中的免费替代品。OpenAI ChatGPT（每周 2 亿+ 用户、免费 GPT-4o 层）、 Anthropic Claude
              3.5/3.7（通过企业协议集成在 Microsoft Azure 和 Amazon Bedrock 中），以及 Google Gemini（免费层），
              都能在无订阅情况下提供可用的语法纠错和文本改写。对主要想要「够用」语法检查的轻度消费者用户而言，这些免费替代品越来越能满足场景， 不再需要 Grammarly 的特定增量价值。Apple Intelligence
              于 2024 年随 iOS 18 和 macOS 15 推出，引入操作系统级写作工具（Apple Writing Tools 套件中的 Rewrite、Proofread 和 Compose 功能），所有受支持
              Apple 设备都可免费使用；其结构类似 Microsoft Copilot 的捆绑风险， 但目标是消费者细分而不是企业。


              Jasper AI 曾是令人忌惮的营销内容竞争对手，2023 年 4 月以 $1.5 billion 估值融资 $125 million；但在 ChatGPT 和通用生成式 AI 工具扩散后，
              它的市场份额明显被侵蚀。Jasper 的差异化（品牌语气遵循、面向营销人员的模板）已被证明不足以支撑相对免费或低成本替代品的价格溢价 （每席位 $49–$99/月）。2025–2026 年行业报道将 Jasper
              描述为难以维持增长，ARR 面临显著逆风。
