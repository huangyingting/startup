      - number: '4.3'
        title: 单位经济模型与毛利结构
        blocks:
          - type: paragraph
            body: >
              Grammarly 未公开披露毛利率、净留存率（NRR）、获客成本（CAC）或客户终身价值（LTV）指标。第三方估计和行业基准显示，SaaS 订阅业务毛利率约为 70–75%，略低于纯基础设施 SaaS 常见的
              80%+。原因在于，公司要为 40M+ 活跃用户大规模运行大语言模型，AI 推理算力成本并不轻。Grammarly 把更多生成式 AI 功能嵌入产品栈后，算力成本压力还会结构性上升。


              人均收入是关键替代指标：按约 $700M 年经常性收入（ARR）和约 1,500 名员工计算，隐含人均收入约 $467K，这一水平健康，能与规模化 SaaS 同行竞争（Notion 约 $320K，Figma
              被收购前约 $600K）。这说明经营杠杆不错，但并购后整合 Coda 和 Superhuman Mail 团队，可能短期稀释该比例。Getlatka 数据显示，截至 2024 年 12 月，Grammarly
              约有 199 个企业客户贡献了有意义的 ARR，不过各层级付费用户总数估计在几百万低位。


              免费转付费漏斗是关键单位经济模型杠杆：在 30M+ 免费用户、估计 2–4M 付费订阅用户的基础上，转化率估计约为 7–13%。免费层用户已经在产品内，因此转化率每提升 1 个百分点，ARR 都会直接复利增长，而
              CAC 不会同比例上升。
