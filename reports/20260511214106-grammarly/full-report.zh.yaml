  - id: TP004
    title: 护城河耐久性 / 竞争风险登记表
    columns:
      - 护城河主张
      - 威胁
      - 严重性（高 / 中 / 低）
      - 缓解措施 / 尽调问题
    rows:
      - - 品牌认知 + 用户习惯（40M+ DAU，96% Fortune 500 员工用户）
        - Apple Intelligence 和免费 ChatGPT 削弱轻度使用场景差异化；用户转向“够用就行”的替代品
        - 高
        - 衡量 2025–2026 年消费者细分月活用户增长；要求按用户年限拆解的流失队列分析
      - - 跨平台集成深度（500K+ 应用，Chrome 插件）
        - Chrome 浏览器政策变化（Google 可能把 Gemini 原生嵌入 Chrome）；Apple Safari Writing Tools 在端侧竞争
        - 高
        - Grammarly DAU 中 Chrome 与其他浏览器各占多少？Chrome Gemini 集成会如何影响会话数？
      - - 企业合规认证（SOC 2 Type II、GDPR、HIPAA）
        - Writer.com 也拥有相同认证；Microsoft / Google 合规水平相当或更强；新进入者可在 12–18 个月内拿证
        - 中
        - 单靠合规只是入场券，不是持久护城河；确认 Grammarly 的信任优势是否叠加了切换成本，而不只是认证
      - - 免费增值 PLG 飞轮（消费者 → 企业）
        - 消费者转化率放缓（2022 年 43% CAGR → 2026 年 TTM 7–8%）说明飞轮在变弱；Apple Intelligence 的消费者替代会加速这一趋势
        - 高
        - 要求 2023–2026 年免费转付费转化率季度趋势；识别企业线索中来自 PLG 与直销的比例
      - - 多产品平台扩张（Coda + Superhuman + GrammarlyGO）
        - 执行风险：在文档（Coda）、电子邮件、办公套件这些核心品类里分别对抗 Notion、Superhuman / Hey、Microsoft / Google，需要大量资本，且尚未验证
        - 中
        - Grammarly Premium 用户与 Coda / Superhuman Mail 用户 3 个月后的交叉销售附着率是多少？
      - - 数据网络效应（每天处理 200B+ 单词用于模型改进）
        - OpenAI / Anthropic / Google 的 LLM 质量提升由模型驱动（并非以同样方式依赖数据）；写作语料规模优势不一定转化为模型质量领先
        - 中
        - 确认 Grammarly 是训练写作专用自研模型，还是主要微调第三方 LLM；数据护城河完全取决于答案
      - - Microsoft 365 Copilot 预算替代（企业）
        - 企业如果为 Copilot 承诺约 $20–30/用户/月，留给独立写作工具的剩余预算会减少；Grammarly 必须证明超出 Copilot 覆盖范围的增量 ROI
        - 高
        - 要求在同样评估 Microsoft Copilot 的企业账户中提供赢 / 输数据；衡量 2024–2026 年每名销售代表每季度新增企业 ACV
