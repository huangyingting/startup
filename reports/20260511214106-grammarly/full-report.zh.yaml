      - number: '1.2'
        title: 创始人、领导层和治理
        blocks:
          - type: paragraph
            body: >-
              Grammarly 由 Max Lytvyn、Alex Shevchenko 和 Dmytro Lider 于 2009 年在乌克兰 Kyiv 创立。三人都是软件工程师， 此前共同做过面向大学的查重服务
              MyDropBox。创始团队熬过了早期财务压力——据报道直到 2011 年都没有领薪水——随后在大学客户中跑通产品市场匹配。 如今，Max Lytvyn 担任收入负责人，Alex Shevchenko 和
              Dmytro Lider 仍以技术和产品身份参与。2024 年 12 月， Grammarly 收购生产力平台 Coda，并任命其联合创始人兼 CEO Shishir Mehrotra 为 Grammarly 新
              CEO，2025 年 1 月生效。 Mehrotra 有 25 年科技行业经验；创办 Coda 前，他曾任 YouTube 首席产品官和首席技术官。前 CEO Rahul Roy-Chowdhury
              转任顾问。Mehrotra 上任后快速扩张公司版图，第一年内主导两笔收购和一次公司更名。2026 年 1 月，Mehrotra 被任命为 Walmart 董事会成员，释放出较强的外部信用信号。Noam
              Lovinsky 担任首席产品官。董事会构成、投资方董事席位等治理细节未公开， 构成关键尽调缺口。公司仍为私营企业，不发布经审计财务报表。
