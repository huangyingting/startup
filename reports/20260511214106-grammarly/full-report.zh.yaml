      - number: '5.4'
        title: 信任、安全与合规架构
        blocks:
          - type: paragraph
            body: >
              Grammarly 的企业信任架构围绕完整合规组合和明确隐私控制搭建。公司持有 SOC 2 Type 2（安全、隐私、可用性、保密性）、SOC 3（公开报告）、ISO 27001:2022（信息安全管理）、ISO
              27018:2019（云端 PII 保护）、ISO 27017:2015（云安全控制）和 ISO 42001:2023（AI 管理体系）。ISO 42001 尤其值得注意，因为它专门覆盖负责任 AI
              开发与使用；该标准直到 2023 年 12 月正式发布后才可执行，而 Grammarly 是首批持有该标准的 AI 消费产品之一。


              Grammarly 的隐私承诺包括：不出售用户数据；用户可在任何特定应用中停用 Grammarly；员工执行最小权限访问政策；每年强制安全培训；并设有专门的内部 Security Champions
              计划。公司配备专门内部安全团队，向高管层汇报。


              服务可靠性通过公开状态页（status.grammarly.com）监控，覆盖约 15 个服务组件，包括浏览器扩展、桌面应用、移动端、Microsoft Office 加载项、Writing
              Suggestions、Generative AI assistance、Plagiarism Detection、AI detection、Snippets/Knowledge Share
              和计费。截至研究日，除 Grammarly for Microsoft Word on Mac 外，所有组件均显示正常运行状态；该组件显示性能下降，是影响 Office 集成子组件的持续已知问题。
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
              - CE020
          - type: table
            tableRef: TE004
            claimRefs: []
      - number: '5.5'
        title: 路线图、差异化与技术风险
        blocks:
          - type: paragraph
            body: >
              Grammarly 在产品技术维度的竞争差异化，建立在三项相互强化的优势上。第一，30M+ 活跃用户沉淀出独特且庞大的纠错数据集，用它训练的自研 NLP 模型形成准确率飞轮，通用 LLM
              竞争者很难复制。第二，原生集成深度构成分发护城河：同一产品通过浏览器扩展、桌面端、移动端和 Office 加载项，在 1M+ 应用内运行；要追平这种覆盖，需要多年集成维护投入。第三，企业合规资质（SOC
              2、ISO 套件）降低受监管行业的采购摩擦，尤其是医疗、金融和法律。


              2025 年路线图已经交付多语言扩展（2025 年 9 月新增 5 种语言）、Superhuman Go 跨应用 AI 助手、带合作伙伴集成的 Agent Store，以及 Authorship
              Attribution 功能。近期规划方向包括继续扩展 Agent Store，加深 Coda-Grammarly 和 Superhuman Mail-Grammarly 集成，并可能推出面向特定领域的 AI
              模型（法律、医学写作）。


              关键技术风险包括：（1）LLM API 依赖——若第三方供应商涨价、限制访问或修改条款，生成式 AI
              功能成本和可靠性都可能受到实质影响；（2）浏览器扩展安全——扩展运行在高权限浏览器上下文中，本就是已知攻击面；（3）大规模集成维护——支持 1M+ 集成，要求在第三方平台 API
              变化时持续做兼容工作；（4）并购整合复杂度——把 Coda 和 Superhuman Mail 的代码库、用户数据与 Grammarly 基础设施合并，会在未来 12-24 个月带来工程执行风险。
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE024
              - CE025
