      - number: '3.2'
        title: 能力、定价和分发对比
        blocks:
          - type: paragraph
            body: >
              Grammarly 的竞争差异化落在几个不同维度，需要分别评估：功能覆盖、定价架构、分发 / 集成深度，以及企业信任姿态。


              在功能覆盖上，Grammarly 在专用写作助手品类中领先：其浏览器扩展、桌面应用和移动键盘可在 500,000+ 个应用和网站原生工作；
              同时，它把实时纠错与生成式改写（GrammarlyGO）结合起来。Writer.com 在企业品牌语气治理上领先；Grammarly 正在建设品牌语气治理能力， 但在大型组织部署中尚未匹配。QuillBot
              的改写引擎专门为改写场景训练，在独立学术用户评测中表现优于 Grammarly 的改写建议。Microsoft Copilot 在 Microsoft 365
              套件内的上下文感知上领先，但在套件外表现不稳定。Grammarly 的独特优势是跨平台一致性：用户在 Gmail、Word、 Slack、Chrome 和移动应用中获得同一种体验；平台原生 AI
              则被限制在各自生态中。


              在定价上，Grammarly 处于中端市场位置。消费者 Premium 计划（按年计费 $12/月）和 Business 计划（3+ 用户按年计费 $15/用户/月）低于 Microsoft
              Copilot（$20–$30/用户/月）和 Writer.com（仅企业，估计约 $18–$25/用户/月）。不过， Grammarly 高于 QuillBot Premium（按年计费 $8/月）和
              Wordtune Plus（$10/月）。企业组织比较 Grammarly Business（$15/用户/月） 和作为 M365 附加项的 Microsoft Copilot
              时，总拥有成本问题很复杂：Copilot 以相近价格在整个 M365 套件内提供跨应用生产力 AI， Grammarly 则提供专业化、跨平台写作辅助。评估「买 Grammarly 还是为 Copilot
              付费？」的预算负责人必须在 AI 能力的宽度与深度之间权衡。


              在分发上，Microsoft 和 Google 在企业市场拥有难以逾越的结构性优势：它们掌握了大多数专业写作发生的生产力应用（Word、Outlook、 Gmail、Google Docs）。Grammarly
              的分发策略过去依赖浏览器扩展的病毒式传播（44M Chrome 安装量）；但在 IT 部门控制软件采购的企业环境中， 浏览器扩展机制的重要性下降。Grammarly 的回应是与
              Salesforce、Atlassian、Slack 等企业工具深度集成，并向开发者提供 API，从而建立第二条分发渠道， 降低对浏览器扩展采用的依赖。收购 Superhuman（邮件）、收购 Coda（文档）和
              Superhuman Platform 重构，代表公司试图拥有企业写作工作流基础设施， 而不是接入别人的平台。


              在企业信任和合规上，Grammarly 的 SOC 2 Type II、GDPR 和 HIPAA 认证（适用于符合条件的计划），叠加数据处理协议和 Grammarly for Enterprise
              安全门户，使其在大多数企业安全评估中可与 Microsoft 和 Google 对标。Writer.com 专门用「不把数据发送给第三方
              LLM」的信息参与竞争，相关信息对高度受监管行业很有说服力。Grammarly 的定制 AI 产品允许企业指定哪些数据可用于模型训练、哪些不可用， 但 Writer 的第一方 Palmyra
              模型架构给信息安全团队讲了一个更简单的故事。
