      - number: '4.4'
        title: 资本结构与资金充足性
        blocks:
          - type: paragraph
            body: >
              Grammarly 通过三轮传统风险股权融资累计募资约 $400M：2017 年 10 月 $110M Series A，2019 年 10 月 $90M Series B，以及 2021 年 11 月
              $200M Series C（投后估值 $13B）。Series C 由 Baillie Gifford 领投，IVP、Spark Capital、General Catalyst
              等老股东参投，把公司最后一次公开股权估值定在 $13B。截至 2026 年 5 月，公司之后没有再进行股权融资，间隔超过四年；对于一家处在活跃 AI 投资环境里的高增长软件公司，这并不寻常。


              2025 年 5 月，Grammarly 通过 General Catalyst 的 Customer Value Fund 获得 $1 billion
              非稀释性增长融资。该结构化工具以未来收入承诺换取资本，而不是发行新股。它保住了现有股东的稀释空间，但也等于承认：在当前市场条件下，公司无法以 $13B
              或更高估值完成新一轮股权融资——这是估值轨迹上的反向信号。公司在新闻页面和同期媒体报道中确认了这项公告。


              2024 年 12 月至 2026 年 4 月期间，公司向 SEC 提交了七份 Regulation D Form D 豁免发行文件，实体名称既包括「Grammarly,
              Inc.」，也包括改名后的「Superhuman Platform Inc.」，确认仍有豁免证券活动。2024 年 12 月的初始文件和 2025
              年后续修订显示，公司用了数月时间来设计非稀释性融资工具及相关工具。按当前约 $700M ARR、可动用资本 $1B+ 计算，公司名义现金跑道很强；但非稀释性结构也意味着存在尚未公开的债务服务或收入分成义务。
