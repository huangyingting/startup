      - number: '2.3'
        title: 买方和用户分层
        blocks:
          - type: paragraph
            body: >
              Grammarly 的买方范围横跨四个清晰细分，在购买流程、预算所有者、用户画像和付费意愿上差异很大。评估收入质量和增长可持续性，必须逐一理解这些细分。


              消费者和个人细分按用户数最大，占 Grammarly 4000 万+ 日活跃用户的大多数，包括学生、自由职业者、求职者，以及日常邮件和文档用户。
              在消费者和个人细分里，买方和用户是同一个人。免费层承担获客漏斗；$12/月（按年计费）的高级版转化，主要由专业邮件、学术写作和商务沟通等高频场景驱动。 消费者和个人细分面临免费 ChatGPT
              和操作系统内置写作功能的最高替代风险，也可能是已观察到收入增长放缓的原因之一。


              专业人士和 SMB 细分包括部署 Grammarly Business 计划、用来统一团队沟通质量的中小企业。预算所有者通常是团队负责人、运营经理或 IT 管理员。规模化后价格区间为每用户每月
              $15–30。专业人士和 SMB 细分受益于消费者采用的病毒式路径：员工个人使用产品后，常把它带进组织。 相比之下，大企业是 Grammarly 最高 ARPU 细分。超过 50,000 个组织使用
              Grammarly，其中包括 96% 的 Fortune 500 公司中的用户。 企业采购由 IT、安全或采购团队管理，他们会评估 SSO、SAML、SCIM、SOC 2 合规、GDPR 准备度和 API
              访问。销售周期更长， 但流失更低。Superhuman Platform 的收购把企业价值主张从单一用途写作辅助，扩展到多产品 AI 工作流。


              教育细分呈现清晰的买方 / 用户分离：付费方是机构 IT 主管或学术管理员，用户是学生和教职员工。超过 3,000 所高等教育机构使用 Grammarly。预算来自 IT、学业成功或图书馆项目，ROI
              用学生写作结果衡量，而不是生产力指标。教育细分能在未来转向消费者高级版或企业计划的用户群中建立品牌熟悉度， 是一条长期获客渠道。
