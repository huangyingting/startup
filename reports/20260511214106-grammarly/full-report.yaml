      - number: '3.3'
        title: Moat Durability and Displacement Risk
        blocks:
          - type: paragraph
            body: >
              Grammarly's competitive moat is a portfolio of overlapping advantages, each of which faces distinct
              erosion trajectories.


              Brand recognition and user habituation are Grammarly's most durable near-term moats. The company's 16-year
              history as the dominant standalone writing assistant has produced extraordinary brand awareness in
              knowledge worker segments, with 96% Fortune 500 employee-level penetration and 40 million+ daily users who
              have deeply habituated workflows around Grammarly's Chrome extension. These users face real switching
              friction: Grammarly works everywhere (across every app, browser, and OS), while alternatives generally
              work within one ecosystem. The cost of switching is primarily cognitive retraining rather than contractual
              lock-in, which means the moat is meaningful but not permanent.


              Enterprise compliance and data governance is the second moat, and in some ways the deepest. For regulated
              industries—legal, healthcare, financial services, and government—procurement of AI writing tools requires
              completing a formal security assessment. Grammarly's existing certifications (SOC 2 Type II, GDPR, CCPA,
              FERPA) and enterprise data processing agreements make it easy for IT teams to approve. Re-doing this
              process with a new vendor requires months of effort. This creates stickiness that is decoupled from
              product quality: even if a competitor's features improve, enterprise accounts may stay with Grammarly
              simply because switching involves regulatory re-certification.


              Cross-platform integration is the third moat. Grammarly's 500,000+ app integrations—built over a
              decade—create a network effect that no new entrant can replicate quickly. Microsoft Copilot works within
              M365; Google Gemini works within Google Workspace. Both are platform-bound. Grammarly's value in
              cross-platform professional workflows—where a user switches between Gmail, Notion, Salesforce, Slack, and
              Word in a single workday—is not matched by any bundled alternative. This integration depth creates
              meaningful switching friction.


              Against these strengths, three displacement threats are real and measurable. First, Microsoft Copilot's
              aggressive enterprise rollout directly threatens Grammarly's ability to convert its Fortune 500 employee
              users into formal enterprise contracts. If a company commits to M365 Copilot ($20–$30/user/month for all
              Microsoft 365 users) and covers writing assistance needs through Word/Outlook integration, the incremental
              case for Grammarly Enterprise becomes harder to make. Second, Apple Intelligence's bundled writing tools
              eliminate Grammarly's differentiation for basic corrections on iPhone/iPad/Mac for the 60%+ of the U.S.
              consumer market that uses Apple devices. Third, LLM commoditization continues to narrow the capability gap
              between Grammarly's paid tier and free alternatives, making the consumer free-to-paid conversion rate
              structurally challenging to improve.


              The Superhuman Platform's multi-product strategy is the most credible response to these threats. By
              acquiring Coda (document collaboration), Superhuman Mail (email), and building Superhuman Go (AI agent
              platform), Grammarly is attempting to become the hub of enterprise writing workflows rather than a plugin
              to others' platforms. If successful, this increases switching cost from "browser extension habit" to
              "primary productivity suite dependency"—a fundamentally stronger lock-in mechanism. However, this strategy
              requires competing against Notion, Slack, and Microsoft in categories where they have significant
              incumbency advantages.
