      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              Grammarly's buyer universe spans four distinct segments that differ materially in buying process, budget
              owner, user profile, and willingness to pay. Understanding each segment is essential for assessing revenue
              quality and growth sustainability.


              The consumer and individual segment represents the largest by user count—the majority of Grammarly's 40
              million+ daily active users—and includes students, freelancers, job seekers, and everyday email and
              document users. In this segment, buyer and user are the same person. The free tier serves as the
              acquisition funnel; premium conversion at $12 per month (billed annually) is driven by professional email,
              academic writing, and business communication power use cases. This segment faces the highest substitution
              risk from free ChatGPT and built-in operating system writing features, and likely contributes to the
              observed revenue growth deceleration.


              The professional and SMB segment includes small and medium businesses that deploy Grammarly Business plans
              to standardize communication quality across teams. The budget owner is typically a team lead, operations
              manager, or IT administrator. Pricing ranges from $15–30 per user per month at scale. This segment
              benefits from the viral pathway of consumer adoption: employees who use the product personally often
              introduce it to their organizations. Large enterprises, by contrast, represent Grammarly's highest-ARPU
              segment. More than 50,000 organizations use Grammarly, including users at 96% of Fortune 500 companies.
              Enterprise procurement is managed by IT, security, or procurement teams who evaluate tools for SSO, SAML,
              SCIM, SOC 2 compliance, GDPR readiness, and API access. Sales cycles are longer but churn is lower. The
              Superhuman Platform acquisitions expand the enterprise value proposition from single-use writing
              assistance to a multi-product AI workflow.


              The education segment presents a distinct buyer-user split: the payer is an institutional IT director or
              academic administrator, while users are students and faculty. Over 3,000 higher education institutions use
              Grammarly. Budget comes from IT, academic success, or library programs, and ROI is measured through
              student writing outcomes rather than productivity metrics. This segment establishes brand familiarity in a
              user cohort that later transitions to consumer premium or enterprise plans—a long-term customer
              acquisition channel.
