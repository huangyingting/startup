chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Product, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Grammarly is an AI-powered writing assistance platform that helps individuals and organizations produce
              clearer, more effective written communication. The product operates as a browser extension, desktop
              application, mobile keyboard, and API integration, working across more than one million apps and websites.
              Grammarly offers three tiers: a free version with basic grammar and spell-check, a Pro subscription at $12
              per month (billed annually), and Enterprise pricing for organizations. Launched in 2009 as a grammar
              checker for students in Kyiv, Ukraine, the company relocated its headquarters to San Francisco and pivoted
              to a freemium SaaS model in 2015, triggering viral adoption. Grammarly's revenue model blends consumer
              subscriptions with enterprise software contracts, benefiting from a product-led growth engine where free
              users gradually convert to paid plans and enterprise IT departments formalize team-wide licenses. The
              company processes approximately 25 trillion tokens and 200 billion words per day, cementing its position
              as the most widely deployed AI writing assistant. As of October 2025, the parent company rebranded from
              Grammarly Inc. to Superhuman Platform Inc. to reflect its expanded product suite, which now includes Coda
              collaborative workspaces, Superhuman Mail, and the AI agent platform Superhuman Go. The core Grammarly
              writing product retains its brand identity and serves as the anchor of the Superhuman Suite.
