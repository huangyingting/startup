  - id: TE002
    title: Customer Workflow and Use-Case Analysis
    columns:
      - User Job-to-Be-Done
      - Prior Workflow
      - Grammarly/Superhuman Solution
      - Measurable Benefit
      - Key Limitation
    rows:
      - - Polish business email before sending
        - Manual review or peer editing
        - Real-time inline suggestions via browser/desktop extension
        - Reduce errors, improve clarity in seconds
        - Context window limited; deep domain jargon may still miss
      - - Generate first draft of document
        - Blank-page writer's block; manual drafting
        - AI-assisted draft generation in Grammarly Docs or Go
        - Speed up first draft by 50–70% (claimed ROI)
        - Output quality dependent on user prompt and LLM capability
      - - Maintain brand voice across large team
        - Style guides + manager review
        - Shared style guide + real-time custom suggestions
        - Brand-consistent output without reviewer bottleneck
        - Custom guide requires admin setup; rule conflicts with LLM suggestions
      - - Onboard cross-functional team to new documents (Coda)
        - Email chains + Google Docs + spreadsheets
        - Coda hub with linked tables, AI chat, and automation buttons
        - Reduces tool-switching; single source of truth
        - Migration from existing tools has high friction
      - - Academic writing and plagiarism checking
        - Manual proofreading + Turnitin
        - Grammarly for Education with plagiarism detection + AI detection
        - Instant feedback + academic integrity checks
        - AI detection accuracy debated; false positive risk
      - - Enterprise email management (Superhuman Mail)
        - Standard email clients (Gmail, Outlook)
        - AI-prioritized inbox, snooze, AI drafts, analytics
        - Speed and triage efficiency for high-volume email users
        - Premium price ($30+/mo); integration with other tools limited
    notes: >-
      Benefit estimates are based on Grammarly's claimed 17x ROI for business teams and general SaaS productivity
      research. Individual results may vary significantly.
