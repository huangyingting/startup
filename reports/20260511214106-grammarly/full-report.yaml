      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              The wide divergence in published AI writing assistant market estimates—from $1.77 billion (Mordor
              Intelligence) to $6.2 billion (Dataintelo) for 2025—reflects fundamentally different scoping choices
              rather than methodological errors. Mordor restricts its scope to purpose-built subscription-based writing
              assistant software; Dataintelo and Technavio include AI model APIs accessed for writing purposes,
              marketing automation tools with embedded writing features, and full content-generation platforms.
              Preserving both estimates—and noting the definitional gap—is essential diligence hygiene.


              Grammarly's Serviceable Addressable Market (SAM) sits at the intersection of the narrow and medium
              definitions: professional-grade AI writing assistance tools used by knowledge workers and organizations
              that value trust, compliance, and workflow integration above pure generation capability. A conservative
              SAM estimate in 2025 is $2–3 billion, derived by applying the Mordor $1.77B baseline and adding enterprise
              productivity-adjacent segments. Grammarly's $700 million ARR as of May 2025 therefore represents a 23–35%
              penetration rate of the SAM—a leading but not unassailable position given Microsoft Copilot and Google
              Gemini's bundled distribution.


              Within the narrow $1.77 billion market (dedicated writing software only), Grammarly's $700M ARR represents
              approximately 40% revenue share—clear market leadership. However, this share calculation is sensitive to
              definitions, and the Getlatka-reported net revenue of $251.8 million in 2024 (vs. ARR $700M as of May
              2025) suggests that net revenue and ARR definitions diverge significantly, likely reflecting different
              treatment of deferred revenue, geography, and the consumer vs. enterprise mix.


              North America accounted for 35.9% (Mordor) to 38.5% (Dataintelo) of the global AI writing assistant market
              in 2025, aligning with Grammarly's concentration of approximately 73% of users in the United States.
              Asia-Pacific is the fastest-growing region at 23.5% CAGR (Mordor) through 2030, driven by India's content
              economy, Japan and South Korea enterprise adoption, and Southeast Asia's growing English-language
              professional workforce. The U.S. AI productivity tools market alone reached $4.28 billion in 2024 with a
              25.2% projected CAGR (Market.us). Grammarly's September 2025 multilingual expansion into Spanish, French,
              Portuguese, German, and Italian directly targets European and Latin American growth vectors, addressing
              the 1-in-5 U.S. residents who speak multiple languages and hundreds of millions of international knowledge
              workers who communicate professionally in non-English languages.
            claimRefs:
              - CM005
              - CM006
              - CM010
              - CM013
              - CM032
              - CM028
              - CM031
