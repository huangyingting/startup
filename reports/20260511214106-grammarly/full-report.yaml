      - number: '3.4'
        title: Switching Costs, Multi-Homing, and Lock-In
        blocks:
          - type: paragraph
            body: >
              Understanding the switching cost dynamics in AI writing assistance is critical for evaluating both
              Grammarly's retention risk and its ability to expand enterprise contracts.


              Consumer switching costs are low. Most individual users can trial alternative writing tools (QuillBot,
              ChatGPT, Claude) at zero marginal cost given free tier availability across all competitors. The primary
              switching inhibitor is workflow inertia—Grammarly's browser extension becomes invisible infrastructure for
              users who have habituated to it—rather than contractual or financial lock-in. Consumer churn rates are not
              publicly disclosed but Grammarly's decelerating net revenue growth (estimated 7–8% TTM into 2026) suggests
              that consumer free-to-paid conversion is under sustained pressure. Multi-homing in the consumer segment is
              widespread: many users have both Grammarly free and ChatGPT free active simultaneously, using Grammarly
              for inline corrections and ChatGPT for generative writing tasks.


              Enterprise switching costs are substantially higher. The primary mechanisms are: (1) compliance
              re-certification, typically 2–4 months for SOC 2 and GDPR review; (2) SSO/SCIM integration with the
              enterprise IdP (Okta, Azure AD), which requires IT effort to dismantle and rebuild; (3) enterprise admin
              customization (custom writing goals, tone dictionaries, brand voice settings) that are proprietary to
              Grammarly and not portable; (4) deployment complexity (browser extension, desktop app, API integrations
              with CRM and content tools) that requires IT coordination to undo. Collectively, these create a 6–12 month
              switching timeline for a mid-market enterprise, providing meaningful churn protection even if a
              competitor's product quality improves.


              Multi-homing at the enterprise level is limited by IT procurement policy. Most enterprise IT departments
              prefer to reduce vendor count (vendor consolidation trend), which means Grammarly must win the
              writing-tool category selection; it rarely shares budget with a direct competitor. However, multi-product
              co-existence with Microsoft Copilot is common: Grammarly and M365 Copilot can be deployed simultaneously
              without obvious integration conflict, allowing enterprises to use Copilot within M365 apps and Grammarly
              across all other surfaces. This co-existence dynamic is both a near-term survival mechanism (Grammarly is
              not immediately displaced by Copilot) and a long-term vulnerability (once enterprise buyers see Copilot
              improving in cross-app contexts, the marginal case for Grammarly erodes).


              Supply and distribution lock-in is dominated by browser and OS vendors. Apple's decision to embed Writing
              Tools in iOS 18/macOS 15 directly competes with Grammarly's consumer Chrome extension and mobile keyboard
              in a way that does not require any user action—the feature is present by default on new device updates.
              Google could embed Gemini grammar assistance in Chrome (the browser Grammarly's extension runs on) at any
              point, which would create an immediate access and installation friction for Grammarly's extension. These
              platform-level risks represent the most severe long-term supply-chain threats to Grammarly's consumer
              distribution model.
            claimRefs:
              - CP027
              - CP029
              - CP030
              - CP031
              - CP037
