  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Modules and the Superhuman Suite
        blocks:
          - type: paragraph
            body: |
              Following the October 2025 corporate rebrand, Grammarly's product portfolio is now organized under
              the "Superhuman Suite" umbrella with four distinct product lines. The original Grammarly writing
              assistance product—the company's core revenue driver—provides real-time grammar, spelling, clarity,
              tone, and AI generation capabilities across browser extensions, desktop apps, mobile keyboards, and
              enterprise integrations. Superhuman Go is a context-aware AI assistant launched alongside the rebrand
              that operates across all apps, tabs, and workflows without requiring users to navigate to a separate
              product surface.

              Coda, acquired in December 2024, is a collaborative document editor that replaces the Google
              Docs/Airtable/Notion combination for structured team work—with tables that sync, views that
              personalize, and automation capabilities. Superhuman Mail (acquired in 2025) is a premium AI email
              client originally targeting executives and knowledge workers. Together, these four products represent
              a horizontal expansion of the product surface from "writing assistance" to "AI productivity suite."

              The Agent Store, launched in late 2025, allows third-party developers to publish specialized agents
              (Box document management, Gamma presentation, Wayground research) that integrate into the Superhuman
              Go layer. The Authorship Attribution feature (launched late 2025) enables teams to track AI vs.
              human writing contributions within shared documents.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
