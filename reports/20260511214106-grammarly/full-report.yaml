      - number: '4.3'
        title: Unit Economics and Margin Structure
        blocks:
          - type: paragraph
            body: |
              Grammarly does not publicly disclose gross margin, net revenue retention (NRR), customer acquisition
              cost (CAC), or lifetime value (LTV) metrics. Third-party estimates and industry benchmarks suggest
              gross margins in the 70–75% range for the SaaS subscription business—somewhat below the 80%+ typical
              for pure infrastructure SaaS, reflecting the meaningful AI inference compute costs associated with
              running large language models at scale for 40M+ active users. This compute cost pressure is
              structurally growing as Grammarly embeds more generative AI features into its product stack.

              Revenue-per-employee is a key proxy metric: at ~$700M ARR and approximately 1,500 employees, the
              implied revenue per employee is roughly $467K—a healthy figure competitive with scaled SaaS peers
              (Notion ~$320K, Figma ~$600K pre-acquisition). This suggests operational leverage is good, though
              the post-acquisition integration of Coda and Superhuman Mail workforces may temporarily dilute the
              ratio. Getlatka data indicates that as of December 2024, Grammarly had approximately 199 enterprise
              customers generating meaningful ARR, though the total paid user count across all tiers is estimated
              in the low millions.

              The free-to-paid conversion funnel is a critical unit economics lever: with 30M+ free users and
              estimated paid subscribers in the 2–4M range, the conversion rate is estimated at roughly 7–13%.
              Each incremental percent improvement in conversion directly compounds ARR without proportional
              increases in CAC, since the free-tier users are already in-product.
