      - number: '1.3'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >-
              Grammarly reached profitability early in its lifecycle without external capital, and did not raise its
              first venture round until 2017, by which time it already had seven million daily active users and a
              demonstrated freemium flywheel. The $110 million Series A was led by General Catalyst, with IVP, Spark
              Capital, Breyer Capital, and SignalFire participating. A $90 million Series B followed in 2019, again with
              General Catalyst involvement, valuing the company above $1 billion for the first time. In November 2021,
              Grammarly closed a $200 million+ round led by Baillie Gifford and BlackRock at a $13 billion valuation—the
              company's peak equity mark during the ZIRP era. Total equity raised prior to 2025 was approximately $400
              million according to Crunchbase, or over $550 million according to PitchBook, reflecting some definitional
              differences around convertible instruments. In May 2025, Grammarly secured $1 billion in non-dilutive
              growth financing from General Catalyst's Customer Value Fund (CVF). This transaction does not reset the
              equity valuation and does not give General Catalyst an incremental equity stake; instead, Grammarly repays
              the capital plus a capped percentage of revenue generated through use of those funds. The company has an
              eventual IPO goal per CEO Mehrotra's public statements, but no near-term timeline. An anonymous investor
              quoted by TechCrunch described the current true equity valuation as 'significantly lower' than the 2021
              $13 billion peak.
