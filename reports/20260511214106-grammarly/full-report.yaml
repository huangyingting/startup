      - number: '4.4'
        title: Capital Structure and Funding Adequacy
        blocks:
          - type: paragraph
            body: |
              Grammarly has raised approximately $400M in traditional venture equity across three rounds:
              $110M Series A (October 2017), $90M Series B (October 2019), and $200M Series C (November 2021,
              $13B post-money valuation). The Series C, led by Baillie Gifford with participation from existing
              investors including IVP, Spark Capital, and General Catalyst, established the company's last
              public equity mark at $13B. No subsequent equity round has occurred as of May 2026—a period of
              over four years—which is anomalous for a high-growth software company in an active AI investment
              environment.

              In May 2025, Grammarly secured $1 billion in non-dilutive growth financing through General
              Catalyst's Customer Value Fund, a structured vehicle that provides capital against future revenue
              commitments rather than issuing new equity. This structure preserves existing shareholder dilution
              but effectively concedes that a new equity round at or above $13B was not achievable in current
              market conditions—an adverse signal on valuation trajectory. The company confirmed this
              announcement on its press page and in contemporaneous news coverage.

              Seven Regulation D Form D exempt-offering filings with the SEC between December 2024 and April 2026
              (under both "Grammarly, Inc." and post-rebrand "Superhuman Platform Inc." entity names) confirm
              ongoing exempt securities activity. The December 2024 initial filings and subsequent 2025
              amendments indicate the company was structuring the non-dilutive facility and related instruments
              over a multi-month period. At current ARR of ~$700M and with $1B+ in accessible capital, the
              company has strong nominal runway, though the non-dilutive structure implies debt-service or
              revenue-sharing obligations that are not publicly disclosed.
