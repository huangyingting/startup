      - number: '6.4'
        title: Retention and Durability
        blocks:
          - type: paragraph
            body: >-
              Grammarly does not publish NRR, GRR, cohort retention, or annual churn rates. The freemium model
              structurally depresses paid conversion: with ~30M DAUs and an estimated 7–13% conversion rate, roughly
              87–93% of daily users remain on the free tier indefinitely. Sacra (2024) characterizes consumer revenue as
              driven by "a growing share of lower-priced seats," implying heavy reliance on high-volume, lower-ARPU
              individual plans. Enterprise stickiness is implied by the suite expansion (Coda Docs, Superhuman Mail,
              Agent Store) and the brand re-architecture, which raises switching costs. However, the AI writing market
              has intensified competition from Microsoft Copilot (bundled at zero marginal cost with M365) and native
              LLM-based writers, creating substitution pressure. Customer satisfaction signals are positive: the Chrome
              extension maintains 4.6/5 stars from 26,000+ reviews in the Chrome Web Store, and Grammarly has won G2's
              Writing Assistant category consistently. The Expert Review lawsuit (class action, 2026) is an adverse
              retention signal for trust-sensitive customers who prioritize accuracy guarantees.
            claimRefs: []
          - type: table
            tableRef: TU004
            claimRefs: []
          - type: figure
            figureRef: FU004
            claimRefs:
              - CU018
              - CU020
      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Grammarly's expansion model depends on four levers: (1) seat expansion within enterprise accounts (from
              departmental to org-wide); (2) product upsell from Business to Enterprise; (3) suite cross-sell (Coda
              Docs, Superhuman Mail, Agent Store) once the Superhuman rebrand is operationalized; and (4) vertical
              expansion into new functions (sales, HR, legal) via dedicated team-function pages. The 96% Fortune 500
              user presence (by individual employee adoption) indicates significant whitespace to formalize into
              structured contracts. Concentration risk is mitigated by the 50,000+ organization count—no single customer
              is likely to represent >5% of revenue. However, the freemium mass-market base means many "customers" are
              zero-revenue users who generate infrastructure cost without corresponding revenue. The U.S. represents
              ~42% of traffic, creating geographic concentration; multi-language support (launched Sep 2025 with 6
              languages) is the key lever to reduce this.
            claimRefs: []
