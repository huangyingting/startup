        - $1.1–1.2B ARR
        - 18–20% YoY re-acceleration
        - $13–18B (12–15× ARR)
        - Requires flawless Superhuman Suite integration + Copilot displacement fails
        - 25% — conditional on post-rebrand re-acceleration evidence
      - - Base case
        - $800–850M ARR
        - 10–12% CAGR
        - $5.6–7.7B (7–9× ARR)
        - Moderate enterprise expansion; Copilot captures lower SMB tier; GC facility intact
        - 50% — consistent with current ARR growth trajectory
      - - Bear case
        - $650–700M ARR
        - Less than 10% (stagnation or contraction)
        - $2.6–4.2B (4–6× ARR)
        - Copilot displaces enterprise tier; GC covenant breach; Expert Review settlement above $100M
        - 25% — conditional on Copilot share gain materializing
  - id: TV004
    title: Comparable Valuation Table
    notes: >-
      Public comp ARR and market cap data from stockanalysis.com (2024 reported); private comp data from TechCrunch
      funding reports and Sacra estimates. HubSpot/Asana/Monday are the cleanest public comps.
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the most directly comparable public SaaS productivity tools (HubSpot, Asana, Monday.com) and
        highest-profile private AI writing/productivity rounds (Notion, Writer, Jasper). Does not cover all possible
        comparables — omits niche AI tools with limited public data and public companies with substantially different
        business models.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
    columns:
      - Comparable
      - Metric / ARR
      - Valuation / Multiple
      - Relevance to Grammarly
      - Key Limitation
    rows:
      - - HubSpot (HUBS)
        - $2.5B ARR (2024); 15% YoY growth
        - $15B market cap (~6× ARR)
        - Closest public analog — decelerating SaaS, large installed base, enterprise motion
        - HubSpot is profitable (non-GAAP); Grammarly profitability unknown; multi-product suite more mature
      - - Asana (ASAN)
        - $720M ARR (2024); 10% YoY growth
        - $2.5B market cap (~3.5× ARR)
        - Very similar growth profile to Grammarly; productivity tool; B2B
        - Asana is non-profitable with significant restructuring; lower brand recognition; pure-play work management
      - - Monday.com (MNDY)
        - $950M ARR (2024); 22% YoY growth
        - $8B market cap (~8.4× ARR)
        - Work OS with B2B DNA; suite expansion (CRM, Dev); meaningful growth premium
        - Monday growing ~2× faster than Grammarly; fresh product expansion vs Grammarly at mature core
      - - Notion (private)
        - $300M ARR est. (2021); 50–80% YoY growth at time of raise
        - $10B valuation (33× ARR — 2021 peak multiple)
        - Private AI productivity unicorn; same 2021 bubble vintage
        - 2021 peak multiple; Notion growth rate likely higher than Grammarly; secondary discount likely 40–60%
      - - Writer (private)
        - $75M ARR est. (2024); 80%+ YoY growth
        - $1.9B valuation (~25× ARR); Series C 2024
        - Enterprise AI writing; direct competitor; recent round validates AI writing category premium
        - High-growth early stage; lower ARR base; different buyer profile (AI-first enterprises); no consumer moat
      - - Jasper (private)
        - Revenue undisclosed; Series C $125M at $1.5B (2023)
        - $1.5B (2023); likely impaired since — reports of growth challenges
        - AI marketing writing; Grammarly competitor; cautionary tale for multiple compression
        - Jasper reportedly facing growth headwinds post-2023; $1.5B may be inflated vs current market
  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    notes: Triggers that would cause a fundamental reassessment of the investment thesis.
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - ARR growth stagnation
        - ARR growth below 8% for two consecutive quarters
        - Deceleration implies Microsoft Copilot displacement in core segments; base case becomes bear case
        - Exit position / do not enter; thesis broken on competitive moat
      - - GC covenant breach
        - Public disclosure of GC facility amendment OR acceleration event
        - Capital structure impaired; equity at risk; down-round likely
        - Immediate stop; reassess entire capital structure and dilution risk
      - - Expert Review class certification
        - Court certifies class OR settlement above $100M
        - Material liability confirmed; S-1 preparation blocked; trust damage beyond repair with enterprise
        - Material negative; revisit litigation risk premium; may require specific legal reserve provisioning
      - - Enterprise NRR below 100%
        - Enterprise cohort NRR confirmed below 100% in any disclosed data
        - Expansion thesis invalidated; revenue is shrinking on a net basis from existing enterprise accounts
        - Thesis break on enterprise moat; reassess all enterprise ARR assumptions
      - - Superhuman rebrand failure
        - Post-rebrand DAU down more than 10% or enterprise churn rate up more than 200 bps
        - Brand transition cost exceeds benefit; brand equity destruction offsets suite value
        - Track with caution; re-evaluate rebrand execution before any entry
      - - CEO departure within 12 months
        - Mehrotra departure announcement before full-year CEO anniversary (before Dec 2025)
        - Second leadership transition within 14 months signals governance instability
        - Hold; wait for new CEO clarity and leadership stabilization
  - id: TV006
    title: Final Diligence Asks Table
    notes: >-
      Ordered by materiality to the investment thesis. Items 1–3 are blocking; items 4–6 are material but non-blocking
      with appropriate modeling adjustments.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Enterprise NRR and GRR by cohort
        - No public disclosure; even proxy metrics unavailable
        - Determines whether enterprise expansion thesis holds; NRR below 100% would break the thesis entirely
        - Request from Grammarly management; compare with industry benchmarks (Bessemer Cloud Index)
      - - General Catalyst covenant terms
        - Covenant structure, triggers, rate reset, conversion rights all undisclosed
        - Determines downside capital structure risk; covenant breach could create equity subordination
        - Request facility agreement; engage GC directly for investor-level disclosure
      - - Post-rebrand user and enterprise KPIs
        - No DAU, NPS, or enterprise churn data from October 2025 rebrand through May 2026
        - Rebrand is thesis-critical; without this data the execution risk is unquantifiable
        - Request quarterly metrics package covering Q4 2025 and Q1 2026
      - - Expert Review lawsuit status
        - Class certification status, settlement range, insurance coverage all unknown
        - Determines litigation overhang on S-1 preparation timeline and enterprise trust damage
        - Review PACER docket; engage outside litigation counsel for assessment
      - - Ukraine headcount and contingency plan
        - Exact % of engineers in Kyiv/Lviv undisclosed; geo-redundancy plan unconfirmed
        - Ukraine concentration risk is the most material unquantified operational risk
        - Request org chart by geography; confirm EU/North America shadow engineering capacity
      - - Coda and Superhuman Mail integration milestones
        - Integration roadmap, timeline, and combined platform ETA not publicly disclosed
        - Three-way integration is the core product bet; without milestones, execution risk is a black box
        - Request product roadmap; assess engineering team structure post-Coda acquisition
