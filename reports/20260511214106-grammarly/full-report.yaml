          note: $700M ARR real; 12–13% growth is decelerating from 43% peak; gross margin unknown; GC covenants undisclosed
        - label: Risk Profile — 3/10
          note: Expert Review lawsuit, Ukraine concentration, CEO transition, M365 Copilot bundles — compound risk stack
        - label: Valuation Support — 2/10
          note: $13B implied = 18–20× ARR vs 5–9× for comparable SaaS; entry at $13B unsupported by evidence
        - label: Evidence Quality — 7/10
          note: '8 chapters, 200+ sources, 7 research rounds; key gaps: NRR, GC covenants, post-rebrand KPIs'
