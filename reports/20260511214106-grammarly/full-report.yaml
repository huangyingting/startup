companyProfile:
  summary: >
    Grammarly was founded in 2009 in Kyiv, Ukraine, by Max Lytvyn, Alex Shevchenko, and Dmytro Lider. Originally a
    browser grammar tool, it evolved into the world's largest AI writing assistant by user base—serving 30M+ DAUs, 44M+
    Chrome installs, and 50,000+ organizations including 96% of the Fortune 500. In December 2024, Grammarly acquired
    Coda (a workspace startup) and appointed its CEO, Shishir Mehrotra, as the new Grammarly CEO, replacing Brad Hoover
    after 14 years. In October 2025, the company rebranded its parent entity to Superhuman Platform Inc. and launched
    the Superhuman Suite—combining Grammarly AI, Coda Docs, and Superhuman Mail into an integrated productivity
    platform. The company raised a $200M Series C at a $13B valuation in November 2021 and a $1B non-dilutive facility
    from General Catalyst in May 2025, with an IPO targeted for 2027.
