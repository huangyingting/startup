      - number: '6.2'
        title: Adoption Trajectory
        blocks:
          - type: paragraph
            body: >-
              Grammarly reached 30M+ DAUs by 2020—maintained through 2024—after growing from 1M in 2015 at roughly 7%
              CAGR. Total registered users now exceed 40M. Organization adoption surpassed 50,000 by official count
              (Grammarly About page), though some third-party sources cite up to 70,000 organizations (less current).
              The Chrome extension alone has 44M+ installs, functioning as a standalone acquisition channel with low
              marginal cost per new user. Monthly web traffic exceeds 60M visits. The education segment now covers
              3,000+ higher education institutions, with Grammarly's Authorship tool deployed for academic integrity.
              Product-led growth (PLG) is central: individual employees often adopt Grammarly personally before their
              organization formalizes a Business/Enterprise agreement, creating a self-reinforcing enterprise flywheel.
            claimRefs: []
