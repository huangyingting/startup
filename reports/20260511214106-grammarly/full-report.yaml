  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - Moat Claim
      - Threat
      - Severity (High/Medium/Low)
      - Mitigation / Diligence Ask
    rows:
      - - Brand recognition + user habituation (40M+ DAU, 96% Fortune 500 employee users)
        - >-
          Apple Intelligence and ChatGPT free erode casual-use differentiation; users shift to 'good enough'
          alternatives
        - High
        - Measure monthly active user growth in consumer segment 2025–2026; request churn cohort analysis by user tenure
      - - Cross-platform integration depth (500K+ apps, Chrome extension)
        - >-
          Chrome browser policy changes (Google could embed Gemini in Chrome natively); Apple Safari Writing Tools
          compete on-device
        - High
        - >-
          What percentage of Grammarly DAU is on Chrome vs. other browsers? How would a Chrome Gemini integration affect
          session count?
      - - Enterprise compliance certifications (SOC 2 Type II, GDPR, HIPAA)
        - >-
          Writer.com also holds identical certifications; Microsoft/Google compliance is equal or better; new entrants
          can certify within 12–18 months
        - Medium
        - >-
          Compliance alone is table stakes, not a durable moat; confirm that Grammarly's trust advantage is combined
          with switching cost, not just certification
      - - Freemium product-led growth flywheel (consumer → enterprise)
        - >-
          Deceleration in consumer conversion rate (43% CAGR 2022 → 7–8% TTM 2026) suggests the flywheel is weakening;
          Apple Intelligence consumer substitution accelerates trend
        - High
        - >-
          Request free-to-paid conversion rate trends quarterly 2023–2026; identify what percentage of enterprise leads
          originate from PLG vs. direct sales
      - - Multi-product platform expansion (Coda + Superhuman + GrammarlyGO)
        - >-
          Execution risk: competing against Notion (Coda), Superhuman/Hey (email), Microsoft/Google (suites) in their
          core categories is capital-intensive and unproven
        - Medium
        - >-
          What is the cross-sell attach rate between Grammarly Premium users and Coda/Superhuman Mail users after 3
          months?
      - - Data network effects (processing 200B+ words/day for model improvement)
        - >-
          LLM quality improvements at OpenAI/Anthropic/Google are model-driven (not data-dependent in the same way);
          scale advantage in writing corpora does not necessarily translate to model quality leadership
        - Medium
        - >-
          Confirm whether Grammarly trains proprietary writing-specific models or primarily fine-tunes third-party LLMs;
          data moat depends entirely on the answer
      - - Microsoft 365 Copilot budget displacement (enterprise)
        - >-
          If enterprises commit ~$20–30/user/month for Copilot, residual budget for standalone writing tools decreases;
          Grammarly must demonstrate incremental ROI beyond Copilot's coverage
        - High
        - >-
          Request win/loss data in enterprise accounts where Microsoft Copilot was also evaluated; measure new
          enterprise ACV per rep per quarter 2024–2026
    claimRefs:
