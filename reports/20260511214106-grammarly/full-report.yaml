      - number: '1.4'
        title: Scale, Traction, and Geographic Presence
        blocks:
          - type: paragraph
            body: >-
              Grammarly's scale metrics as of mid-2025 are among the most impressive of any late-stage AI-native
              company. The platform counts more than 40 million daily active users, with 72 percent of active accounts
              using the product at least once per week. Over 50,000 organizations have deployed Grammarly as an
              enterprise tool, including Atlassian, Databricks, Zoom, Ford, Chevron, and Salesforce. Additionally, more
              than 3,000 higher education institutions worldwide are licensed users. Grammarly's Chrome extension alone
              has approximately 44 million installs. The platform processes 25 trillion tokens per year and analyzes 200
              billion words daily, making it the highest-volume deployment in real-time writing assistance. Annual
              recurring revenue exceeded $700 million as of May 2025, with profitability confirmed by management
              commentary. Revenue grew at approximately 43 percent year-over-year in 2021–2022, decelerating to roughly
              12 percent in 2023–2024 and an estimated 7–8 percent in the trailing twelve months into 2026. Grammarly's
              user base skews toward the United States (73 percent), with significant penetration in India, the United
              Kingdom, the Philippines, and Canada. Employee headcount is approximately 1,400–1,600 based on LinkedIn
              estimates as of late 2025. The company has offices in San Francisco (HQ), Kyiv, New York, Vancouver, and
              Berlin. Geography presents a residual risk given the co-founders' Ukrainian roots and Grammarly's Kyiv
              engineering office in the context of the ongoing regional conflict.
            claimRefs:
              - CO028
              - CO029
              - CO030
              - CO031
              - CO032
