  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >
              Grammarly and its parent Superhuman Platform Inc. operate across nested markets that must be clearly
              bounded before any sizing exercise can be meaningful. At the narrowest level, Grammarly competes in the
              specialized AI writing assistant software market—tools purpose-built to improve human-written text through
              grammar correction, style coaching, tone adjustment, and generative suggestions. Mordor Intelligence
              defines this market at $1.77 billion in 2025, growing at a 22.49% CAGR to $4.88 billion by 2030. This
              narrow TAM is the most relevant for evaluating Grammarly's current core business against direct
              competitors such as Writer.com, ProWritingAid, Jasper AI, and QuillBot.


              A broader market definition encompasses all AI writing and content generation platforms—including
              ChatGPT's writing use cases, Google Gemini's Workspace integrations, and marketing-focused generative
              tools. Dataintelo and Technavio place this wider market at approximately $6.2 billion in 2025, projected
              to reach $32.8 billion by 2034 at a 20.3% CAGR. This definition is more relevant to Grammarly's strategic
              ambition: the Coda and Superhuman acquisitions signal intent to compete for the broader AI productivity
              workflow budget rather than purely grammar-correction spend.


              The widest relevant lens is the AI productivity tools market—encompassing virtual assistants, document
              management, writing assistance, code generation, and workflow automation—valued at $9.89 billion in 2024
              and projected to grow to $115.85 billion by 2034 at a 27.9% CAGR. Grammarly's platform pivot positions it
              to pursue share across this broader TAM over a multi-year horizon. The underlying NLP technology
              infrastructure that powers all writing tools was valued at $34.4–36.8 billion in 2025, growing at roughly
              19.7–20% CAGR through 2034, providing a ceiling for the total infrastructure investment that
              writing-focused tools sit within.


              Excluded from Grammarly's SAM are pure code-generation tools (GitHub Copilot, Tabnine), image and audio
              generation, and standalone translation services (DeepL, Google Translate used alone). Status-quo
              substitutes include manual proofreading, human editors, Microsoft Word's native spellcheck, and generic
              browser spell-check—all of which Grammarly's data indicates it displaces in professional workflows.
              Included adjacencies that Grammarly is entering include email productivity (Superhuman acquisition, July
              2025), collaborative document workflows (Coda acquisition, January 2025), and generative drafting
              (GrammarlyGO, 2023).
            claimRefs:
