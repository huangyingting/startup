      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Grammarly's corporate history features a steady cadence of product, financing, and governance milestones
              interspersed with reputational events. The company bootstrapped from 2009 to 2017, achieving 7 million
              daily users before raising any venture capital—an unusually capital-efficient growth trajectory. The 2015
              launch of the free browser extension was the pivotal inflection: it enabled viral distribution and created
              the product-led growth dynamic that persists today. The 2021 raise at $13 billion cemented Grammarly as
              one of the most valuable AI companies of the pre-ChatGPT era, though that valuation now reflects the peak
              of a ZIRP market cycle rather than current fundamentals. The December 2024 acquisition of Coda and January
              2025 CEO transition to Shishir Mehrotra were the most consequential corporate governance changes in
              company history. The October 2025 rebrand to Superhuman and the launch of Superhuman Go marked the
              clearest signal of the company's pivot from a single-purpose writing tool toward a broader AI productivity
              platform. However, the most significant adverse development during this window emerged in March 2026:
              Grammarly's 'Expert Review' feature, launched in August 2025, used AI to simulate feedback from hundreds
              of named authors, journalists, and academics without their consent. The class action lawsuit Angwin v.
              Superhuman Platform Inc. was filed March 11, 2026 in the Southern District of New York, and the feature
              was disabled the same day. The lawsuit seeks damages exceeding $5 million for violation of California and
              New York privacy and publicity rights. CEO Mehrotra apologized publicly while maintaining the legal claims
              are 'without merit.' The lawsuit is pending as of the report date.
