      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Grammarly was founded in 2009 in Kyiv, Ukraine by Max Lytvyn, Alex Shevchenko, and Dmytro Lider, three
              software engineers who had previously co-built MyDropBox, a plagiarism-detection service for universities.
              The founders persevered through early financial hardship—reportedly drawing no salaries until 2011—before
              achieving product-market fit with university customers. Today, Max Lytvyn serves as Head of Revenue, and
              Alex Shevchenko and Dmytro Lider remain involved in technical and product capacities. In December 2024,
              Grammarly acquired productivity platform Coda and appointed its co-founder and CEO, Shishir Mehrotra, as
              Grammarly's new CEO, effective January 2025. Mehrotra is a 25-year technology veteran who previously
              served as YouTube's Chief Product Officer and Chief Technology Officer before founding Coda. Prior CEO
              Rahul Roy-Chowdhury transitioned to an advisory role. Mehrotra has moved aggressively to broaden the
              company's footprint, overseeing two acquisitions and a company rebrand within his first year. In January
              2026, Mehrotra was named to Walmart's Board of Directors, signaling significant external credibility. Noam
              Lovinsky serves as Chief Product Officer. Governance details including board composition and investor
              board seats are not publicly disclosed, creating a key diligence gap. The company is private and does not
              publish audited financials.
