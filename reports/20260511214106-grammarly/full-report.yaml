      - number: '5.2'
        title: Technical Architecture and AI Stack
        blocks:
          - type: paragraph
            body: |
              Grammarly's product architecture operates in three distinct technical layers. The base layer is
              a real-time NLP pipeline that performs grammatical error correction, punctuation checking, word
              choice analysis, and clarity scoring. This layer is anchored by GECToR (Grammatical Error
              Correction: Tag, Not Rewrite), a proprietary model published in 2020 at BEA-20 that treats GEC
              as a sequence-tagging task rather than seq2seq generation—yielding faster inference and improved
              accuracy. Grammarly's applied research team has been publishing NLP research for 10+ years,
              including models for text revision (IteraTeR, CoEdIT), privacy-preserving NLP, and grammatical
              error detection in 5+ languages.

              The middle layer is a generative AI platform that powers Paraphraser, Reader Reactions, Humanizer,
              and draft generation. This layer relies on large language models—likely a combination of
              proprietary fine-tuned models and third-party LLM API calls (OpenAI or similar providers). The
              company has not disclosed the exact composition of its LLM stack. The top layer is Superhuman Go,
              an OS-level assistant with context awareness across all open applications and browser tabs, built
              on the generative AI layer with workflow-aware prompting.

              Grammarly's GitHub organization (github.com/grammarly) hosts 23 public repositories including
              GECToR (966 stars), CoEdIT (TypeScript/Python), and the GCDC corpus. The applied research team
              has published over 10 peer-reviewed papers and maintains a PhD internship pipeline. Google Patents
              records patents assigned to Grammarly in NLP and text editing domains, confirming ongoing IP
              development.
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
          - type: table
            tableRef: TE003
            claimRefs: []
          - type: figure
            figureRef: FE003
            claimRefs: []
      - number: '5.3'
        title: Deployment Surfaces and Integration Model
        blocks:
          - type: paragraph
            body: |
              Grammarly's deployment architecture achieves breadth through five primary surfaces. The browser
              extension (Chrome: 44M+ installs; also Firefox, Safari, Edge) injects writing assistance into any
              web-based text input. The desktop app (Windows and Mac) provides OS-level integration, working
              within native applications—Word, Pages, email clients, Scrivener—without requiring browser context.
              The mobile app/keyboard (iOS and Android) provides writing assistance within all mobile applications
              via the iOS/Android keyboard API and native app contexts.

              For enterprise, the Microsoft Office add-in provides native integration within Word, Outlook,
              PowerPoint, and Teams. Google Docs receives a dedicated integration. The Grammarly Docs surface
              serves as a native writing environment for deep work—a direct competitor to Notion, Google Docs,
              and Coda (now also within the Superhuman Suite). Together, these surfaces claim compatibility with
              1 million+ apps and websites.

              The developer API (developer.grammarly.com) enables third-party SaaS companies to embed Grammarly's
              NLP capabilities natively via SDK. The API uses a Text Editor SDK with documented authentication
              and integration patterns. Multiple SaaS companies—including Salesforce, Zendesk, and others—have
              integrated Grammarly via this channel, creating a B2B2C distribution path that does not require
              end-user installation.
            claimRefs:
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
          - type: table
            tableRef: TE002
            claimRefs: []
          - type: figure
            figureRef: FE002
            claimRefs: []
      - number: '5.4'
        title: Trust, Security, and Compliance Architecture
        blocks:
          - type: paragraph
            body: |
              Grammarly's enterprise trust architecture is built around a comprehensive compliance portfolio
              and explicit privacy controls. The company holds SOC 2 Type 2 (security, privacy, availability,
              confidentiality), SOC 3 (public report), ISO 27001:2022 (information security management),
              ISO 27018:2019 (PII protection in cloud), ISO 27017:2015 (cloud security controls), and ISO
              42001:2023 (AI management system). The ISO 42001 certification is particularly notable as it
              specifically addresses responsible AI development and use—one of the first AI consumer products
              to hold this standard, which became enforceable only after the standard's formal publication
              in December 2023.

              Grammarly's privacy commitments include: no sale of user data; user ability to disable Grammarly
              in any specific application; least-privilege access policies for employees; mandatory annual
              security training; and a dedicated internal Security Champions program. The company employs a
              dedicated in-house security team that reports to executive leadership.

              Service reliability is monitored via a public status page (status.grammarly.com) covering
              approximately 15 distinct service components including browser extension, desktop app, mobile,
              Microsoft Office add-in, Writing Suggestions, Generative AI assistance, Plagiarism Detection,
              AI detection, Snippets/Knowledge Share, and billing. As of the research date, all components
              showed Operational status with the exception of Grammarly for Microsoft Word on Mac (Degraded
              Performance—an ongoing known issue affecting a sub-component of the Office integration).
            claimRefs:
              - CE016
              - CE017
              - CE018
              - CE019
              - CE020
          - type: table
            tableRef: TE004
            claimRefs: []
      - number: '5.5'
        title: Roadmap, Differentiation, and Technical Risks
        blocks:
          - type: paragraph
            body: |
              Grammarly's competitive differentiation in the product-technology dimension rests on three
              reinforcing advantages. First, proprietary NLP models trained on uniquely large correction
              datasets from 30M+ active users create an accuracy flywheel that generic LLM-based competitors
              cannot easily replicate. Second, native integration depth—a single product that works in 1M+
              apps via browser extension, desktop, mobile, and Office add-in—creates distribution moat that
              requires years of integration maintenance investment to match. Third, enterprise compliance
              credentials (SOC 2, ISO suite) reduce procurement friction in regulated industries, particularly
              healthcare, finance, and legal.

              The 2025 roadmap has delivered multi-language expansion (5 new languages added September 2025),
              the Superhuman Go cross-app AI assistant, the Agent Store with partner integrations, and the
              Authorship Attribution feature. Planned near-term directions include further Agent Store expansion,
              deeper Coda-Grammarly and Superhuman Mail-Grammarly integrations, and potential domain-specific
              AI models (legal, medical writing).

              Key technical risks: (1) LLM API dependency—if third-party providers raise pricing, restrict
              access, or change terms, generative AI feature costs and reliability could be materially impacted;
              (2) browser extension security—extensions run in privileged browser contexts and are a known attack
              surface; (3) integration maintenance at scale—supporting 1M+ integrations requires continuous
              API compatibility work as third-party platforms change; (4) acquisition integration complexity—
              merging Coda's and Superhuman Mail's codebases and user data with Grammarly's infrastructure
              creates engineering execution risk over the next 12-24 months.
            claimRefs:
              - CE021
              - CE022
              - CE023
              - CE024
              - CE025
          - type: table
            tableRef: TE005
            claimRefs: []
          - type: figure
            figureRef: FE004
