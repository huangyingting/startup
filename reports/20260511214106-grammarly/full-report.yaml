      - number: '6.3'
        title: Named Customer Proof
        blocks:
          - type: paragraph
            body: >-
              Grammarly's customer stories page lists named testimonials from executives at Databricks, Zapier,
              HackerOne, ModMed (CEO Dan Cane), and Lucid (Assoc. Director Jimmy Snyder). Published case studies provide
              quantified outcomes: Iterable (customer communications platform) reported 93% of communications improved
              and 1.8 hours saved per user per week after Grammarly Enterprise deployment. ConnectWise (IT management
              SaaS) reported 75% improvement in communication quality, 30 minutes saved per user per day, and 95% Style
              Guide engagement across marketing, education, and sales teams. The State of California is listed as a
              named customer—a notable government anchor deployment. Customers span financial services (BlackRock,
              Investec, Waystar), technology (Databricks, Zapier, HackerOne, ConnectWise, Prezi, Supermetrics), and
              healthcare (ModMed). The breadth of verticals and named executive testimonials exceeds what most
              enterprise SaaS companies present publicly at Grammarly's ARR scale, suggesting genuine production
              deployment rather than early-pilot logos.
