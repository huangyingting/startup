  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Grammarly serves three distinct customer layers: (1) Individual consumers on free and Pro plans—the
              largest by count, dominated by students, non-native English speakers, and knowledge workers—who drive
              brand awareness and feed the B2B funnel; (2) SMB/team buyers on the Business tier (teams up to ~149 seats
              at $15/user/month billed annually); and (3) Enterprise clients with custom contracts, SSO, admin
              dashboards, and compliance requirements. Geographically, the U.S. accounts for roughly 42% of web traffic
              (~25M users), with India (~10M) and the UK (~6M) as the next largest markets. The user base skews female
              (56%) and ages 25–34 (28%), with heavy concentration in Education, Business, and English/Literature
              disciplines. Enterprise verticals span tech, financial services, healthcare, government, and professional
              services.
            claimRefs: []
