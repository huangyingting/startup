artifact: risks
slug: grammarly
runDate: '2026-05-11'
company:
  name: Grammarly
chapter:
  number: 7
  title: Risks
  summary: 'Grammarly/Superhuman faces a compound risk stack in 2026. The most urgent is the Expert Review class action (filed
    March 11, 2026 by lead plaintiff Julia Angwin), which alleges misappropriation of authors'' and journalists'' identities
    as AI editors without consent; Grammarly pulled the tool promptly but the lawsuit carries potential class-wide damages
    and reputational overhang with trust-sensitive enterprise buyers. Regulatory exposure is broadening: EU AI Act GPAI obligations,
    UK ICO AI guidance, and CCPA/CPRA all impose data-use transparency and lawful-basis requirements on Grammarly''s text-processing
    model. Operationally, the company concentrates significant engineering talent in Ukraine (Kyiv, Lviv), creating a geopolitical
    single point of failure; the 44M-install Chrome extension is a high-value supply chain attack surface; and LLM API dependency
    (OpenAI, Anthropic) introduces margin and continuity risk. Financially, the $13B Series C valuation (Nov 2021) at roughly
    18–20× current ARR (~$700M, growing ~12–13% YoY) creates severe overhang pressure, amplified by $1B in non-dilutive financing
    from General Catalyst (May 2025) whose performance covenants are undisclosed. Microsoft M365 Copilot (bundled at zero
    marginal cost) is the most structurally threatening competitive risk. Execution risk is elevated by a CEO transition to
    Shishir Mehrotra (former Coda founder, December 2024), the simultaneous integration of three product architectures (Grammarly
    AI, Coda Docs, Superhuman Mail), and an October 2025 brand transition that has not yet published post-rebrand user or
    enterprise metrics.'
sections:
- key: legal-litigation-risks
  title: Legal and Litigation Risks
  body: The dominant near-term legal risk is the Expert Review class action filed March 11, 2026. Lead plaintiff Julia Angwin—a
    prominent investigative journalist—alleges that Grammarly's "Expert Review" feature used the names, identities, and reputations
    of professional writers and academics as AI-generated editors without their knowledge or consent, violating right-of-publicity
    statutes and potentially Section 5 of the FTC Act. Grammarly pulled the Expert Review tool promptly after the lawsuit
    was filed, and CEO Shishir Mehrotra stated the company would "promptly and carefully" investigate. The withdrawal of the
    tool signals Grammarly internally assessed meaningful legal exposure, but the class action itself remains active. Maximum
    damages are uncapped at this stage; class-wide right-of-publicity claims can be substantial in California, New York, and
    Illinois. Three plaintiffs-side law firms—prf-law.com, Burns Charest, and Herrera Kennedy—are listed as counsel, indicating
    a well-resourced plaintiff class. The academic community reaction (per Times Higher Education) adds institutional reputational
    risk to the commercial exposure. Separately, Grammarly's AI training data practices could attract copyright infringement
    claims if text submitted by users was incorporated into model training without adequate consent. The privacy policy grants
    Grammarly a broad license to process text for product improvement, which is consistent with common SaaS practice but may
    face challenge under GDPR where legitimate interest is the asserted basis.
  tableRefs:
  - TR001
  figureRefs:
  - FR001
- key: regulatory-compliance-risks
  title: Regulatory and Compliance Risks
  body: Grammarly faces a tightening multi-jurisdictional regulatory environment. The EU AI Act (effective August 2024; GPAI
    obligations phased from August 2025) classifies general-purpose AI writing assistants as GPAI models requiring conformity
    assessments, transparency disclosures to deployers, and summary-of-training-data documentation. Non-compliance penalties
    reach €15M or 3% of global annual turnover. The UK ICO's AI guidance requires any organization deploying AI that processes
    personal data to establish lawful basis, conduct a DPIA for high-risk AI use, and implement explainability where automated
    decisions affect individuals. Grammarly's text-processing pipeline (5B+ corrections/day) almost certainly triggers DPIA
    requirements across its EU and UK user base. CCPA/CPRA grant California residents the right to opt out of sale or sharing
    of personal information—including writing samples—and to request deletion; Grammarly's privacy policy allows broad text
    use for model improvement, which requires verified opt-out mechanisms. FTC enforcement actions against "deceptive" AI
    product claims are accelerating; the Expert Review feature (claiming professional writer identities) may attract FTC scrutiny
    independent of the private class action. Grammarly holds ISO 42001 (AI Management System) certification, demonstrating
    governance intent, but certification does not eliminate regulatory liability for product-level AI outputs. The primary
    mitigation is Grammarly's trust/security posture (SOC 2 Type 2, ISO 27001, ISO 27018), but these address information security,
    not AI transparency obligations.
  tableRefs: []
  figureRefs:
  - FR002
- key: operational-security-risks
  title: Operational and Security Risks
  body: 'Grammarly''s Ukraine engineering concentration is the most geopolitically acute operational risk. Kyiv and Lviv offices
    house a substantial share of engineering and R&D talent; while Ukrainian engineers have continued working remotely since
    Russia''s February 2022 invasion, ongoing conflict creates risk of sudden talent displacement, infrastructure disruption,
    or emigration waves. Grammarly has not disclosed the exact headcount in Ukraine or the existence of formal contingency
    plans (e.g., shadow teams in EU offices). The Chrome extension (44M+ installs) presents a supply chain attack surface:
    a compromised extension update would silently capture keystrokes and text typed across all websites for millions of users,
    potentially in enterprise and government environments. Grammarly''s SDK is embedded in thousands of enterprise applications
    via its developer platform, amplifying the blast radius of any security incident. status.grammarly.com shows a history
    of service incidents including API degradations and editor outages, though Grammarly maintains standard SLA expectations.
    LLM API dependency (OpenAI, Anthropic) introduces continuity risk: if either partner changes terms, raises pricing materially,
    or experiences its own outage, Grammarly''s generative AI features would degrade. Grammarly integrates with Microsoft
    Office/Teams, Google Workspace, iOS, and Android— each integration is a breakage point when those platforms update their
    APIs. Chrome''s Manifest V3 transition was completed, but future browser policy changes remain an uncontrollable dependency.'
  tableRefs:
  - TR002
  figureRefs:
  - FR003
- key: financial-competitive-risks
  title: Financial and Competitive Risks
  body: Grammarly's $13B Series C valuation (November 2021) was set at a ~22× ARR multiple when software multiples were at
    peak; current ARR of ~$700M growing at ~12–13% YoY implies a 18–20× current-ARR multiple. Comparable SaaS companies decelerating
    to mid-teens growth traded at 6–12× ARR in 2024–2025 markets. The gap between implied valuation and market-supportable
    range creates significant down-round risk if Grammarly seeks equity financing. The $1B non-dilutive financing from General
    Catalyst (May 2025) is characterized as "growth capital"—terms and covenants are undisclosed, but underperformance could
    trigger cost-of-capital increases or covenant breaches. Microsoft M365 Copilot is bundled at zero marginal cost for existing
    M365 subscribers and directly substitutes Grammarly's grammar, style, and now generative writing features. Microsoft's
    345M M365 seats represent a massive installed base that Copilot can activate without incremental purchase decisions, commoditizing
    the lower tiers of Grammarly's value proposition. Google Workspace AI features (Gemini integration) create similar substitution
    risk at the free end. LLM-native writing (ChatGPT, Claude) has made "write for me" capabilities freely accessible, compressing
    willingness to pay for AI writing assistance. The 30M+ DAU free tier—while valuable for brand awareness—represents 87–93%
    of daily users who generate no revenue, creating structural conversion overhang. ARR growth decelerated from ~43% YoY
    (2021→2022) to ~12–13% (2023→2024), and the rebrand execution risk could further suppress conversion and enterprise renewal
    rates in 2025–2026.
  tableRefs:
  - TR003
  figureRefs: []
- key: execution-people-risks
  title: Execution and People Risks
  body: 'The December 2024 Coda acquisition brought Shishir Mehrotra as CEO, replacing Brad Hoover who had led Grammarly for
    14 years and was the architect of its enterprise go-to-market motion. Mehrotra''s background is document-centric productivity
    (Coda) and media/video (YouTube). His operating model and go-to-market instincts differ meaningfully from Grammarly''s
    language-AI heritage. The concurrent integrations of Coda Docs and Superhuman Mail into a unified Superhuman Suite introduce
    execution risk across three distinct product architectures, each with their own technical debt, customer bases, and pricing
    models. The October 2025 rebrand from "Grammarly" (globally recognized) to "Superhuman" created immediate brand confusion:
    a pre-existing "Superhuman" email client (Superhuman Inc.) operates in the same productivity category, and early user
    reactions documented by Fast Company and Betakit flagged disorientation among the existing user base. No post-rebrand
    DAU, churn, or NPS data has been publicly disclosed as of May 2026, making it impossible to assess net retention impact.
    Key person risk is concentrated at the CEO level; Mehrotra has no track record managing a product at Grammarly''s scale
    (~1,500 employees, ~$700M ARR) and is simultaneously leading a three-way product integration. Ukraine-based engineering
    leadership—if senior engineers emigrate or are displaced—could disrupt the NLP/AI core development roadmap.'
  tableRefs:
  - TR004
  - TR005
  figureRefs: []
