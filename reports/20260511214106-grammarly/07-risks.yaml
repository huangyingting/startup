- id: TR005
  title: Mitigation and Kill Criteria Table
  notes: Thesis-break triggers and monitoring indicators for each major risk category.
  columns:
  - Risk
  - Monitorable Trigger
  - Threshold / Event
  - Action Implication
  rows:
  - - Expert Review class action
    - Court docket filings; class certification ruling
    - Class certified OR settlement >$50M OR injunction affecting core product
    - Material reduction in thesis confidence; re-evaluate trust and enterprise TAM assumptions
  - - Valuation overhang / down-round
    - Any new equity raise; secondary transaction pricing; comparable SaaS multiples
    - Equity raised at <$7B valuation OR comparable ARR multiples compress to <6× for growth-stage
    - Thesis break — reassess entry price and return profile
  - - Microsoft Copilot substitution
    - Grammarly enterprise renewal rates; win/loss reports; M365 Copilot penetration stats
    - Enterprise NRR below 100% for two consecutive quarters OR M365 Copilot cited in >30% of churned accounts
    - Defensive repositioning required; moat hypothesis weakened
  - - Ukraine talent disruption
    - Escalation in conflict; forced evacuation of Kyiv/Lviv; engineer emigration wave
    - More than 25% of Ukraine-based engineers unavailable for more than 60 days
    - Activate contingency hiring; evaluate impact on NLP roadmap; pause new feature commitments
  - - General Catalyst covenant breach
    - Quarterly ARR reports; GC public commentary; refinancing announcements
    - ARR growth below covenant threshold (undisclosed) OR GC exits position
    - Capital structure review; assess alternative financing; dilution risk assessment
  - - Regulatory enforcement (EU AI Act / GDPR)
    - EU AI Office enforcement notices; DPA regulatory investigations; GDPR fines
    - Regulatory fine >€5M OR injunction requiring product change in EU/UK
    - Legal cost provisioning; product modification required; EU revenue at risk
