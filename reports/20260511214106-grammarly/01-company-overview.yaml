callouts:
  - calloutType: "strength"
    title: "Profitable AI leader at scale"
    body: "Grammarly reaches 40 million daily active users and $700 million+ ARR with confirmed profitability, a combination rare among late-stage AI companies. The freemium model creates a self-reinforcing acquisition engine that requires minimal paid marketing per consumer seat."
    claimRefs: [CO028, CO029, CO033]

  - calloutType: "strength"
    title: "Non-dilutive $1B capital is a structural advantage"
    body: "The General Catalyst CVF arrangement provides $1 billion for customer acquisition without resetting Grammarly's equity valuation or diluting founder and investor stakes. This preserves optionality for an eventual IPO while enabling aggressive market expansion."
    claimRefs: [CO023, CO024, CO025]

  - calloutType: "risk"
    title: "Expert Review lawsuit signals ethical governance gap"
    body: "The March 2026 class action (Angwin v. Superhuman Platform Inc., SDNY) alleges that the Expert Review feature violated California and New York privacy and publicity laws by commercially exploiting hundreds of writers' identities without consent. The incident caused immediate reputational damage and the feature was disabled the same day the lawsuit was filed."
    claimRefs: [CO044, CO045]

  - calloutType: "risk"
    title: "2021 valuation is not a reliable anchor"
    body: "At least one current investor has stated to TechCrunch that Grammarly's true equity valuation today is 'significantly lower' than the $13 billion 2021 peak. The ZIRP-era round was led by public-market crossover funds (Baillie Gifford, BlackRock), and comparable SaaS multiples have contracted sharply since 2021."
    claimRefs: [CO026, CO027]

  - calloutType: "assumption"
    title: "Ukraine office operational status assumed stable"
    body: "Grammarly operates an engineering office in Kyiv, Ukraine. The ongoing conflict creates business-continuity risk that cannot be fully assessed from public sources. We assume continued operations based on absence of adverse public reporting, but investors should conduct specific diligence."
    claimRefs: [CO002]

