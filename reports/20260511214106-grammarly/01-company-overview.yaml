company:
  name: "Grammarly"
chapter:
  number: 1
  title: "Company Overview"
  summary: "Grammarly, founded in 2009 by three Ukrainian engineers, grew from a student grammar checker into a profitable AI writing and productivity platform with 40 million daily users and $700 million+ ARR. In 2025, the company accelerated a strategic pivot—acquiring Coda and Superhuman Mail, rebranding its parent entity as Superhuman in October 2025, and securing $1 billion in non-dilutive financing from General Catalyst. As of May 2026, the core Grammarly product continues under its original name while the parent Superhuman Platform Inc. faces a March 2026 class action lawsuit over its Expert Review AI feature."

sections:
  - id: "identity-and-product"
    title: "Identity, Product, and Business Model"
    body: "Grammarly is an AI-powered writing assistance platform that helps individuals and organizations produce clearer, more effective written communication. The product operates as a browser extension, desktop application, mobile keyboard, and API integration, working across more than one million apps and websites. Grammarly offers three tiers: a free version with basic grammar and spell-check, a Pro subscription at $12 per month (billed annually), and Enterprise pricing for organizations. Launched in 2009 as a grammar checker for students in Kyiv, Ukraine, the company relocated its headquarters to San Francisco and pivoted to a freemium SaaS model in 2015, triggering viral adoption. Grammarly's revenue model blends consumer subscriptions with enterprise software contracts, benefiting from a product-led growth engine where free users gradually convert to paid plans and enterprise IT departments formalize team-wide licenses. The company processes approximately 25 trillion tokens and 200 billion words per day, cementing its position as the most widely deployed AI writing assistant. As of October 2025, the parent company rebranded from Grammarly Inc. to Superhuman Platform Inc. to reflect its expanded product suite, which now includes Coda collaborative workspaces, Superhuman Mail, and the AI agent platform Superhuman Go. The core Grammarly writing product retains its brand identity and serves as the anchor of the Superhuman Suite."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: "founders-and-leadership"
    title: "Founders, Leadership, and Governance"
    body: "Grammarly was founded in 2009 in Kyiv, Ukraine by Max Lytvyn, Alex Shevchenko, and Dmytro Lider, three software engineers who had previously co-built MyDropBox, a plagiarism-detection service for universities. The founders persevered through early financial hardship—reportedly drawing no salaries until 2011—before achieving product-market fit with university customers. Today, Max Lytvyn serves as Head of Revenue, and Alex Shevchenko and Dmytro Lider remain involved in technical and product capacities. In December 2024, Grammarly acquired productivity platform Coda and appointed its co-founder and CEO, Shishir Mehrotra, as Grammarly's new CEO, effective January 2025. Mehrotra is a 25-year technology veteran who previously served as YouTube's Chief Product Officer and Chief Technology Officer before founding Coda. Prior CEO Rahul Roy-Chowdhury transitioned to an advisory role. Mehrotra has moved aggressively to broaden the company's footprint, overseeing two acquisitions and a company rebrand within his first year. In January 2026, Mehrotra was named to Walmart's Board of Directors, signaling significant external credibility. Noam Lovinsky serves as Chief Product Officer. Governance details including board composition and investor board seats are not publicly disclosed, creating a key diligence gap. The company is private and does not publish audited financials."
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO016, CO017]
    tableRefs: [TO002]

  - id: "funding-and-investors"
    title: "Funding History and Investor Base"
    body: "Grammarly reached profitability early in its lifecycle without external capital, and did not raise its first venture round until 2017, by which time it already had seven million daily active users and a demonstrated freemium flywheel. The $110 million Series A was led by General Catalyst, with IVP, Spark Capital, Breyer Capital, and SignalFire participating. A $90 million Series B followed in 2019, again with General Catalyst involvement, valuing the company above $1 billion for the first time. In November 2021, Grammarly closed a $200 million+ round led by Baillie Gifford and BlackRock at a $13 billion valuation—the company's peak equity mark during the ZIRP era. Total equity raised prior to 2025 was approximately $400 million according to Crunchbase, or over $550 million according to PitchBook, reflecting some definitional differences around convertible instruments. In May 2025, Grammarly secured $1 billion in non-dilutive growth financing from General Catalyst's Customer Value Fund (CVF). This transaction does not reset the equity valuation and does not give General Catalyst an incremental equity stake; instead, Grammarly repays the capital plus a capped percentage of revenue generated through use of those funds. The company has an eventual IPO goal per CEO Mehrotra's public statements, but no near-term timeline. An anonymous investor quoted by TechCrunch described the current true equity valuation as 'significantly lower' than the 2021 $13 billion peak."
    claimRefs: [CO018, CO019, CO020, CO021, CO022, CO023, CO024, CO025, CO026, CO027]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: "scale-and-traction"
    title: "Scale, Traction, and Geographic Presence"
    body: "Grammarly's scale metrics as of mid-2025 are among the most impressive of any late-stage AI-native company. The platform counts more than 40 million daily active users, with 72 percent of active accounts using the product at least once per week. Over 50,000 organizations have deployed Grammarly as an enterprise tool, including Atlassian, Databricks, Zoom, Ford, Chevron, and Salesforce. Additionally, more than 3,000 higher education institutions worldwide are licensed users. Grammarly's Chrome extension alone has approximately 44 million installs. The platform processes 25 trillion tokens per year and analyzes 200 billion words daily, making it the highest-volume deployment in real-time writing assistance. Annual recurring revenue exceeded $700 million as of May 2025, with profitability confirmed by management commentary. Revenue grew at approximately 43 percent year-over-year in 2021–2022, decelerating to roughly 12 percent in 2023–2024 and an estimated 7–8 percent in the trailing twelve months into 2026. Grammarly's user base skews toward the United States (73 percent), with significant penetration in India, the United Kingdom, the Philippines, and Canada. Employee headcount is approximately 1,400–1,600 based on LinkedIn estimates as of late 2025. The company has offices in San Francisco (HQ), Kyiv, New York, Vancouver, and Berlin. Geography presents a residual risk given the co-founders' Ukrainian roots and Grammarly's Kyiv engineering office in the context of the ongoing regional conflict."
    claimRefs: [CO028, CO029, CO030, CO031, CO032, CO033, CO034, CO035]

  - id: "milestones-and-adverse"
    title: "Key Milestones and Adverse Events"
    body: "Grammarly's corporate history features a steady cadence of product, financing, and governance milestones interspersed with reputational events. The company bootstrapped from 2009 to 2017, achieving 7 million daily users before raising any venture capital—an unusually capital-efficient growth trajectory. The 2015 launch of the free browser extension was the pivotal inflection: it enabled viral distribution and created the product-led growth dynamic that persists today. The 2021 raise at $13 billion cemented Grammarly as one of the most valuable AI companies of the pre-ChatGPT era, though that valuation now reflects the peak of a ZIRP market cycle rather than current fundamentals. The December 2024 acquisition of Coda and January 2025 CEO transition to Shishir Mehrotra were the most consequential corporate governance changes in company history. The October 2025 rebrand to Superhuman and the launch of Superhuman Go marked the clearest signal of the company's pivot from a single-purpose writing tool toward a broader AI productivity platform. However, the most significant adverse development during this window emerged in March 2026: Grammarly's 'Expert Review' feature, launched in August 2025, used AI to simulate feedback from hundreds of named authors, journalists, and academics without their consent. The class action lawsuit Angwin v. Superhuman Platform Inc. was filed March 11, 2026 in the Southern District of New York, and the feature was disabled the same day. The lawsuit seeks damages exceeding $5 million for violation of California and New York privacy and publicity rights. CEO Mehrotra apologized publicly while maintaining the legal claims are 'without merit.' The lawsuit is pending as of the report date."
    claimRefs: [CO036, CO037, CO038, CO039, CO040, CO041, CO042, CO043, CO044, CO045]
    tableRefs: [TO004]
    figureRefs: [FO002]

