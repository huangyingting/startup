  evidenceGaps:
    - type: "private-evidence-only"
      severity: "material"
      topic: "financials"
      missingEvidence: "Audited income statement and balance sheet; gross margin, operating margin, and burn rate are unavailable for a private company."
      whyItMatters: "Without audited financials, revenue and profitability claims cannot be independently verified and investors cannot assess the quality of ARR."
      diligencePath: "Request management accounts, audited financials, and board-approved financial plan during due diligence."
      relatedQuestionRefs: [QO015]

    - type: "private-evidence-only"
      severity: "material"
      topic: "valuation"
      missingEvidence: "Current equity valuation: no post-2021 equity round has established a new market price. The $13B figure is stale by ~5 years."
      whyItMatters: "Investors cannot determine whether the $1B CVF financing implies a specific valuation or whether the company is positioned below, at, or above the 2021 mark."
      diligencePath: "Request most recent 409A or third-party valuation report; review secondary market transaction prices if any."
      relatedQuestionRefs: [QO012]

    - type: "private-evidence-only"
      severity: "material"
      topic: "cap table"
      missingEvidence: "Full cap table, investor share classes, preference stack, anti-dilution provisions, and CVF repayment covenants."
      whyItMatters: "Unknown preference stack could create waterfall dynamics that disadvantage common equity holders; CVF covenants may restrict strategic optionality."
      diligencePath: "Request full cap table and CVF loan agreement as part of formal data room."
      relatedQuestionRefs: [QO003]

    - type: "missing-source"
      severity: "minor"
      topic: "leadership"
      missingEvidence: "Full executive team roster below C-suite; board composition including number of seats, director identities, and committee structure."
      whyItMatters: "Board governance and alignment between investors, founders, and management cannot be assessed from public sources for this private company."
      diligencePath: "Request board composition and executive organizational chart from management during due diligence."
      relatedQuestionRefs: [QO002]
      relatedTableRefs: [TO002]

    - type: "missing-source"
      severity: "minor"
      topic: "headcount"
      missingEvidence: "Official headcount breakdown by function, geography, and acquired company; LinkedIn-derived estimates are only proxies."
      whyItMatters: "Headcount drives opex and burn projections and signals the integration progress of three combined companies."
      diligencePath: "Request HR data during diligence; use LinkedIn signal cross-checked against job posting volume."
      relatedQuestionRefs: [QO011]

    - type: "missing-source"
      severity: "minor"
      topic: "geopolitical risk"
      missingEvidence: "Status of Grammarly's Kyiv engineering office and contingency plans for continued regional conflict in Ukraine."
      whyItMatters: "Material personnel and IP risk if Kyiv engineering operations are disrupted."
      diligencePath: "Directly ask management for BCP for Ukraine operations; review employee distribution by region."
      relatedQuestionRefs: [QO020]

    - type: "missing-source"
      severity: "minor"
      topic: "adverse"
      missingEvidence: "Prior privacy enforcement actions, data breach history, or GDPR/CCPA regulatory correspondence regarding Grammarly's data practices."
      whyItMatters: "The Expert Review lawsuit raises the question of whether this represents a pattern of insufficient pre-launch ethics review."
      diligencePath: "Search FTC, ICO, and CNIL enforcement databases; review any disclosed regulatory correspondence."
      relatedQuestionRefs: [QO022]

    - type: "missing-source"
      severity: "minor"
      topic: "competitive benchmarks"
      missingEvidence: "Direct revenue, ARR, user count, and valuation comparisons between Grammarly and Notion AI, Microsoft Copilot, and Jasper.ai are not available in public databases."
      whyItMatters: "Without direct competitor benchmarks, relative market positioning and competitive moat strength are difficult to quantify at the company-overview stage."
      diligencePath: "Use industry reports from IDC, Gartner, or CB Insights; request competitive analysis memo from management."
      relatedQuestionRefs: [QO026, QO027]

    - type: "private-evidence-only"
      severity: "material"
