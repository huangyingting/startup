summary:
  headline: |
    Whatnot has built the US live collectibles commerce market — $3B GMV, authentic seller
    community, unique break room product, and pre-sale authentication moat — but its $11.5B
    Series F valuation at 33× estimated revenue leaves minimal margin of safety for new investors.
    The base-case exit scenario (25–35% GMV CAGR through 2027, exit at 3–7× revenue) implies
    negative returns from Series F entry. TRACK until valuation reset, profitability timeline
    visibility, or TikTok Shop US regulatory resolution changes the risk/reward.
