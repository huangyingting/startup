  shortDescription: |
    Whatnot is the leading US live commerce marketplace for collectibles, built on a
    mobile-native iOS/Android platform. Sellers broadcast live auction streams; buyers
    bid in real time. Founded 2019 by Grant LaFontaine (CEO) and Bobby Owner (COO).
    Raised $260M Series F (February 2024) at $11.5B valuation. GMV reached $3B in 2024
    at ~40%+ growth. Core categories: sports cards, Pokémon, anime, sneakers, fashion.
    Live in US, Germany, UK. Total raised ~$1.3B. Headcount ~400–500.
