      - number: '3.4'
        title: 竞争护城河评估
        blocks:
          - type: paragraph
            body: >
              Whatnot 的护城河由三部分构成：


              **1. 供给侧网络效应（卖家社区）：** 头部卖家在各自社区里就是名人。在 Whatnot 上建立 10,000–200,000 粉丝受众需要多年。迁移到 TikTok Shop 意味着从零重建观众。这是
              Whatnot 留住专业卖家（60–70% GMV）最深的护城河。不过，TikTok 的算法可以比 Whatnot 的关注模型更快启动卖家发现；该优势可能随时间被侵蚀。


              **2. 买家社区深度：** 活跃收藏品买家不能与普通直播电商买家互换。Whatnot 的买家社区包括评级师、鉴定师和品类专家，他们推动价格发现。这种社区文化在 TikTok Shop 或 Amazon Live
              上不存在。eBay 可以复制，但其直播形态尚未做到。


              **3. 鉴定品牌信任：** 在收藏品中，真伪就是一切。Whatnot 的鉴定计划和卖家验证是品牌资产。FTC 对 TikTok Shop 和其他平台的审查强化了 Whatnot
              的相对定位。这条护城河有价值，但需要持续投入维护。


              护城河耐久性风险：（1）TikTok Shop 费率常态化后佣金趋同；（2）TikTok 触达新买家的算法发现优势；（3）eBay
              有财力打造真正的直播电商产品；（4）若交易卡市场从小众爱好者社区走向成熟，品类可能商品化；（5）Whatnot 能否在不稀释品牌身份的情况下扩展到收藏品之外。
            claimRefs:
              - CP017
              - CP018
              - CP019
              - CP020
