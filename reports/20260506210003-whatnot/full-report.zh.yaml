      - number: '5.2'
        title: 技术架构与技术栈
        blocks:
          - type: paragraph
            body: >
              Whatnot 的技术栈来自工程博客、招聘信息和开发者会议演示的推断（无完整披露）：


              **移动应用：** iOS（Swift）和 Android（Kotlin）原生应用。没有主要网页市场产品；买卖全部是移动端原生。这是刻意的产品选择，用于优化移动端实时视频参与。


              **视频流基础设施：** Whatnot 采用混合方案，把云视频流服务与自研低延迟协议结合，达到直播出价所需的 <2 秒流延迟。招聘信息提到 AWS IVS（Interactive Video
              Service）是组件之一。全球分发通过 Cloudflare 或类似 CDN 完成。


              **实时出价系统：** 自研出价引擎使用 WebSocket 连接实时更新出价。系统必须在数千名观众并发提交出价时完成毫秒级冲突解决。Whatnot 的工程博客提到自研拍卖状态机。


              **支付：** Stripe 是主要支付处理商。Whatnot 存储支付方式（银行卡、Apple Pay、Google Pay），并在买家中标后异步扣款。支付重试逻辑和欺诈检测由 Whatnot
              内部构建，并叠加在 Stripe 之上。


              **后端基础设施：** AWS 托管的微服务架构。Whatnot 工程团队提到 PostgreSQL（主数据库）、Redis（缓存、实时状态）和 Kafka（出价、观看、分析的事件流）。Kubernetes
              用于容器编排。


              **数据与分析：** Whatnot 收集出价行为、观看时长、购买转化和卖家表现指标。卖家分析仪表盘是产品功能。机器学习用于欺诈检测和推荐（向用户展示哪些直播）。
            claimRefs:
              - CE006
