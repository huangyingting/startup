      - number: '4.4'
        title: 收入质量、缺口与财务结论
        blocks:
          - type: paragraph
            body: |
              收入质量评估：对市场平台而言，Whatnot 的收入质量较高——收入来自交易，单笔交易层面非经常性，但由高度复购的买家和卖家行为驱动。
              年收入 $100K–$2M+ 的头部 1,000 名卖家，从 GMV 角度看接近年金式资产。不过，Whatnot 缺少：

              （1）经常性订阅收入：没有卖家订阅费；所有收入都是按交易量收取佣金。若收藏品市场下行，收入会随 GMV 同比例下滑。 （2）企业 / B2B 收入多元化：全部收入来自消费市场平台。
              （3）广告收入：Whatnot 看起来尚未形成规模化卖家广告 / 赞助产品；相比 eBay（Promoted Listings）和 Amazon，这是明显错失的变现机会。
              反向财务指标：2023 年围绕未经授权经常性收费的集体诉讼最终达成和解（条款未披露）。该事件引发对账单实践完整性的质疑，并要求 Whatnot 修改订阅计费系统，可能影响收入确认节奏。

              财务尽调缺口：公司未公开经审计财务报表。所有收入、GMV 和利润率数字都是分析师估计。尽调投资者需要获得：
              — 按季度列示的实际 GMV 和收入（2022–2026）
              — 毛利率和 COGS 拆分
              — 按职能列示的运营费用明细
              — 按市场列示的国际 P&L（美国、德国、英国）
              — 最新季度现金跑道和烧钱速度
              — 优先股堆叠和反稀释条款明细
            claimRefs:
              - CI017
