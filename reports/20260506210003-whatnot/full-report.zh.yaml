  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: >
              Whatnot 的收入主要来自两项：


              **1. 卖家佣金（主项）：** 卖家为每笔成交价支付 8%。这是 Whatnot 的主导收入流。一张 $100 的交易卡通过直播拍卖售出，Whatnot 赚 $8。该佣金率自 2021
              年以来保持稳定，部分卖家品类或地区有选择性促销期（0% 佣金）。


              **2. 买家处理费和运费（次项）：** Whatnot 向买家收取支付处理费（估计约 2–3%）外加运费。一些品类采用固定运费，其他品类由卖家设定费率。买家侧费用估计把总抽佣率提高到 GMV 约 12%。


              收入模式细节：（a）部分品类在促销期执行 0% 佣金，用于吸引新卖家品类（古着服饰上线、新国际市场）。（b）Whatnot 不买库存，而是运营纯市场平台，没有库存风险。（c）在固定佣金率下，收入随 GMV
              线性增长，没有按交易量分层的折扣。


              8% 佣金与 eBay（总计 12–15%）和 StockX（8–10% + 费用）形成差异，大体接近 TikTok Shop 促销后的 6–8%。Whatnot
              佣金显著低于服务不同买家的高端鉴定市场平台（GOAT、StockX）。


              分析师收入估计：2024E 约 $359M（Sacra/Pitchbook）；2025E 约 $720M+（按 $6B GMV 和 12% 抽佣率推算）。这些是分析师推算，不是公司披露。
