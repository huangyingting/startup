  - id: FE001
    title: Whatnot 产品架构栈
    type: stack
    layout: standard
    summary: |
      分层架构图展示 Whatnot 的产品架构，从面向用户的移动应用，到实时基础设施，再到数据和合规层。
    data:
      layers:
        - label: 用户层：iOS + Android 原生应用（Swift / Kotlin）
          detail: 面向买家和卖家的移动原生应用；没有主力网页版交易市场产品
        - label: 产品层：直播拍卖、Break Room、卖家工具、社群功能
          detail: 核心产品模块：直播拍卖引擎、Break Room 槽位管理、卖家分析、买家社群功能和关注者 / 通知系统
        - label: 交易层：实时出价引擎 + Stripe 支付 + 发货
          detail: 基于自研 WebSocket 的拍卖状态机、Stripe 支付处理、Apple Pay / Google Pay、合并发货（买家合箱）
        - label: 流媒体层：AWS IVS + 自研低延迟协议 + CDN
          detail: AWS Interactive Video Service 叠加自研低延迟协议，把直播延迟压到 2 秒以内；CDN 负责全球视频交付
        - label: 数据层：PostgreSQL + Redis + Kafka + 欺诈检测 ML
          detail: PostgreSQL 主数据库、Redis 负责缓存和实时拍卖状态、Kafka 负责事件流，ML 模型用于欺诈检测和推荐
        - label: 基础设施层：AWS 微服务 + Kubernetes + Cloudflare
          detail: 托管在 AWS 上的微服务，配合 Kubernetes 容器编排；Cloudflare 或同等服务负责 CDN 和 DDoS 防护
        - label: 信任层：鉴定项目 + 内容审核 + 合规（GDPR, CCPA）
          detail: 已评级卡牌鉴定徽章、卖家身份验证、自动化 + 人工内容审核，以及 GDPR/UK GDPR/CCPA 合规控制
    approximationNotes: 架构栈根据工程博客、职位描述和媒体报道推断。Whatnot 尚未发布官方架构图。
    claimRefs:
      - CE022
      - CE023
      - CE024
