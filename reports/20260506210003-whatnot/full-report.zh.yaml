  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与核心流程
        blocks:
          - type: paragraph
            body: >
              Whatnot 的产品是一个移动端市场平台：卖家开直播视频拍卖，买家实时出价。核心用户流程如下：


              **卖家流程：** 创建直播排期 → 在 iOS/Android 上开播 → 直播中上架商品（价格 + 拍卖计时器）→ 观众出价 → 最高出价者中标 → Whatnot 处理付款 →
              卖家发货。卖家也可做「一口价」（固定价、限量）和「拆卡」（在密封卡包开拆场次中售卖席位）。


              **拆卡机制：** 卖家在镜头前直播拆封交易卡包。买家购买「席位」（绑定具体球队、位置或随机分配），并收到与席位对应的卡牌。该机制在体育卡品类贡献显著 GMV，是直播电商独有形式，静态上架无法复制。


              **买家流程：** 按品类 / 卖家浏览 → 关注喜欢的卖家 → 卖家开播时收到推送 → 观看直播 → 单次点击出价 → 卡牌进入合并发货。买家可以把同一场次多次中标的商品放入「合并箱」，一起发货以降低运费。


              **社区功能：** 卖家通过仅订阅者可享的优惠、卖家「组合包」（精选多商品批次）和直接聊天维护粉丝基础。社区功能是 Whatnot 区分 eBay 和 TikTok Shop 的核心。


              **规模基准：** 据称平台高峰可承载 10,000+ 并发直播；单个头部卖家每场可吸引 50,000–200,000 名并发观众。这些数字意味着实时基础设施要求很高。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
