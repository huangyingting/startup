      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              **FTC 假货与消费者保护执法：**

              FTC 在 2023 年向直播电商平台发出警告信，问题涉及假货和欺骗性做法。Whatnot 随后扩大了鉴定计划，但如果直播间里的假货比例被认定为系统性欺骗，正式 FTC 执法行动的风险仍在（每项违规最高
              $50,000 民事罚款）。Consumer Review Fairness Act（CRFA）和 Restore Online Shoppers' Confidence Act（ROSCA）都是适用法规。


              **California AG 消费者保护——订阅计费：**

              2023 年围绕 Whatnot 订阅计费做法（未经授权的循环扣费）的集体诉讼，已在 2024 年和解。不过，California Automatic Renewal Law（ARL, Bus. & Prof.
              Code §17600）下的底层法律暴露仍是结构性风险；任何带订阅机制的平台，即使和解后也无法完全消除。


              **GDPR 与欧盟数字市场监管：**

              Whatnot 的德国和英国业务受 GDPR、EU Digital Services Act（DSA）和 UK Online Safety Act（OSA）约束。DSA
              要求大型市场平台履行透明度报告、系统性风险评估和内容审核义务。OSA 适用于英国的用户生成内容服务。Whatnot 的欧盟 / 英国用户基数扩大后，合规成本也会放大。


              **销售税 / 市场促进者合规：**

              Whatnot 作为 45 个以上美国州的 marketplace facilitator，必须为平台销售代收并缴纳销售税。不合规或州级申报不完整，会带来补缴税负。国际 GMV 增长后，国际 VAT 合规（EU
              VAT OSS、UK VAT）也会增加复杂度。


              **IP 风险——假货责任：**

              如果 Whatnot 通过平台销售假货，又未落实足够的通知与下架机制，可能面临共同商标侵权责任。球星卡鉴定问题（假 PSA 评级、篡改卡牌）是持续风险，可能让 Whatnot 暴露在商标权利人行动之下。
