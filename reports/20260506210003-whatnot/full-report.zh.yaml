      - number: '8.3'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              从上市公司、私募轮次和 M&A 基准看可比市场平台：


              **上市市场平台可比公司（当前交易倍数）：**

              - eBay：约 4× 收入，约 14× EBITDA（成熟、增长下滑）

              - Etsy：约 5× 收入，约 20× EBITDA（垂直市场平台，增长表现混合）

              - StockX（私营）：上一轮隐含估值约 $3.8B，2023 年 GMV 约 $3B+（约 1.3× GMV）

              - Poshmark：2022 年被 Naver（韩国）以 $1.2B 收购，约为收入的 1.5×


              **中国直播电商可比公司：**

              - TaoBao Live（Alibaba）：作为 $450B Alibaba 内部板块的隐含估值——GMV $600B+

              - Pinduoduo（TEMU 母公司）：$260B 市值，对应 $60B+ GMV（约 4.3× GMV）


              **近期可比私募轮次：**

              - NTWRK（时尚直播电商）：融资估值约 $600M（约 2022 年）

              - Popshop Live：融资估值约 $100M（2023 年被收购 / 重组）


              **Whatnot 相对可比公司的隐含倍数：**

              Whatnot $11.5B 估值相对所有上市可比公司都有溢价。最接近的辩护是 Pinduoduo 的 4.3× GMV 倍数，但 Pinduoduo 已盈利，且规模巨大。Whatnot
              的估值只有在高增长延续情形下才说得通（GMV 未来 3 年以上 CAGR 为 40%+），并且需要一条清晰路径，走向市场平台经济模型下的盈利能力（规模化后 EBITDA 利润率约 20–25%）。


              如果退出时收入倍数为 10×（增长溢价保持到 IPO），Whatnot 需要 $1B+ 收入才能支撑 $10B+ 股权价值——若 GMV 继续以约 30–40% CAGR 增长，按当前轨迹到 2027–2028
              年可实现。风险在于增长放缓和倍数压缩同时发生（双重压缩）。
