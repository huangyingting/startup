      - number: '2.3'
        title: 买家与卖家分层
        blocks:
          - type: paragraph
            body: >
              卖家分层：（1）专业转售商（卖家 25–35%，GMV 60–70%）：全职，每周 3–7 场直播，收入 $100K–$2M+，粘性极强；（2）小型商家卖家（卖家 40–50%，GMV
              25–30%）：兼职，同时在 eBay 上架，粘性中等；（3）偶发卖家（<20%，<10% GMV）：留存较低。


              买家分层：（1）活跃收藏者（买家 15–20%，约 60% GMV）：至少每月购买，复购高；（2）捡漏型买家（买家 30–40%，约 25% GMV）：价格敏感，有流向 TikTok Shop
              的风险；（3）社区观看者（注册用户 40–50%，<15% GMV）：经常观看，付费转化低。


              地域：美国占 GMV 70–75%；德国 15–18%（最大非美国市场，桌游 + Pokémon）；英国 5–10%（球鞋、古着）；加拿大 + 澳大利亚合计约 5%。国际扩张始于 2022–2023 年。
