            title: 美国直播电商结构性低渗透 — SAM 捕获率低于 5%
            body: |
              美国直播电商约占电商 4%，中国为 14–18%。Whatnot 在变现能力最高的细分市场（爱好者收藏品）排名第一，但 SAM 渗透率低于 5%。中国先例意味着，在市场饱和前，GMV 具备数倍增长的结构性空间。
            calloutType: insight
            claimRefs:
              - CM001
              - CM002
              - CM005
          - type: callout
            title: TikTok Shop 零佣金切入威胁卖家供给侧
            body: >
              TikTok Shop 2023 年在美国上线时对卖家收取 0% 佣金（促销），这是近期最大的单一市场风险。贡献 Whatnot GMV 60–70%
              的专业卖家是理性经济主体；只要佣金节省超过重建受众的成本，他们就会测试 TikTok。
            calloutType: insight
            claimRefs:
              - CM020
              - CM021
              - CM013
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图概览
        blocks:
          - type: paragraph
            body: >
              Whatnot 同时在三个竞争维度上作战：


              **维度 1 — 收藏品直播拍卖形式（直接）：** 竞争者为同类品类提供实时视频拍卖体验，包括 eBay Live（2023 年上线）、NTWRK（球鞋 / 街头服饰，2018 年起做直播电商）和 Popshop
              Live（通用直播电商）。这些平台当前都没有达到 Whatnot 在收藏品中的规模，但 eBay 拥有 150M+ 活跃买家的在位优势，这是 Whatnot 无法忽视的结构性优势。


              **维度 2 — 直播电商平台（相邻）：** TikTok Shop（通过直播销售通用商品，2024 年美国 GMV 约 $20B）、Amazon Live（创作者带货）、Instagram Live
              Shopping 和 YouTube Shopping。这些平台不专攻收藏品，但靠规模和可发现性吸引卖家注意。TikTok Shop 2024 年进入交易卡和球鞋，使其从相邻竞争升级为直接竞争。


              **维度 3 — 静态收藏品市场平台（替代）：** eBay（异步拍卖、一口价购买）、StockX（球鞋 / 卡牌市场指数 + 即时出售）、GOAT（鉴定球鞋和服饰）、TCGplayer（交易卡）和
              MySlabs（评级卡市场平台）。这些是 Whatnot 直播拍卖的形式替代品，适合不想承受时间压力、偏好浏览的买家，或偏好异步上架而不是实时表演的卖家。


              最危险的竞争者是 TikTok Shop，因为它同时具备海量分发、视频原生形式和算法发现能力；这些优势，Whatnot 的社区优先打法在收藏品爱好者社区之外尚未能规模化匹配。
