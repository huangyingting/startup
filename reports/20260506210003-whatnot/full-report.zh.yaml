      - number: '6.3'
        title: 上市策略与客户获取
        blocks:
          - type: paragraph
            body: >
              **按品类扩张：** Whatnot 进入新的收藏品品类时，会先招募 3–10 个在该品类已有社区影响力的锚定卖家，先把供给密度做起来，再打开买家获取。这套供给先行的方法不同于 DTC
              式买量，已经在球星卡（2019 年）、Pokémon（2020 年）、动漫（2021 年）、运动鞋（2022 年）和时尚（2023 年）等品类跑通。品类扩张让 Whatnot 不靠付费获客，也能自然拉大 TAM。


              **卖家带动买家获取：** Whatnot 的买家主要来自：

              (1) 卖家在 YouTube、Instagram、Twitter/X 和 TikTok 上推广自己的 Whatnot 直播；

              (2) 卖家通知把已有粉丝推向新直播间；

              (3) 收藏玩家社区里的口碑传播（Discord、Reddit、球星卡论坛）。

              这是一套低 CAC 获客模型——卖家本质上就是 Whatnot 的营销队伍。


              **病毒传播机制：** 卡拆包里的「你看到那张卡开出来了吗？」天然适合在社交媒体传播。头部卖家会剪辑并分享直播拆包反应，带动新买家好奇心。这是有机传播，TikTok Shop 的算法能放大它，也可能把流量截走。


              **国际扩张：** Whatnot 已在德国（2022 年）和英国（2023 年）上线，并按当地收藏偏好调整品类重点（德国市场：足球卡、Lego；英国：英超卡）。国际 GMV
              在增长，但美国仍占主导。每进入一个新市场，都要按品类招募卖家、接入本地支付方式，并搭建客服。


              **付费获客：** Whatnot 有选择地用过付费社交渠道（Instagram、YouTube）做买家获取，但核心 GTM 仍由社区和卖家驱动。付费获客相对 LTV 的效率没有公开披露。
            claimRefs:
