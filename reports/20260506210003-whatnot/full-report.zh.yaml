      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Whatnot 的融资轨迹极不寻常：五年内从 $3.7M 种子轮涨到 $11.5B 估值：


              - 种子轮：$3.7M（2020），领投：Y Combinator + Initialized Capital

              - Series A：$4M（YC W21 演示日，2021）

              - Series B：$50M，估值 $300M（2021 年 7 月），领投：Andreessen Horowitz

              - Series C：$150M，估值 $1.5B（2021 年 9 月），领投：CapitalG + a16z

              - Series D：$260M，估值 $3.7B（2022 年 7 月），领投：a16z

              - Series E：$265M，估值 $5B（2025 年 1 月）——本报告的独角兽资格证据

              - Series F：$225M，估值 $11.5B（2025 年 10 月）

              - 截至 2025 年 10 月累计融资：约 $995M


              $265M Series E（2025 年 1 月）是本报告采用的合格独角兽融资，且有 2024 年 5 月之后的证据支持。该轮由 Andreessen Horowitz 和 CapitalG
              共同领投，既有投资者参与。Series F（2025 年 10 月，$225M，估值 $11.5B）较 Series E 估值上调 130%，背后是 GMV 从约 $3B（2024）翻倍到 >$6B（2025
              年估计），以及国际扩张继续推进。
