companyProfile:
  summary: >
    Whatnot 是一家总部位于 Los Angeles 的直播电商市场平台，2019 年由 Grant LaFontaine 和 Bobby Owner 创立。卖家可在 iOS 和 Android
    上开直播拍卖，买家则用移动端原生界面实时出价。Whatnot 的核心产品创新有三项：（1）「拆卡房」机制，即平台独有的密封卡包直播开拆形式；（2）售前评级卡鉴定徽章计划；（3）卖家分析和社区工具，把头部卖家推成了年收入
    $1M–$5M+ 的全职创业者。Whatnot 从体育卡和 Pokémon 起步，按品类扩展到动漫、球鞋、时尚和漫画，并在地域上进入德国（2022）和英国（2023）。投资方包括 Andreessen
    Horowitz（领投多轮）、CapitalG（Alphabet）和 YC Continuity。截至 2024 年，平台年 GMV 约 $3B，同比增长约 40%+，是美国排名第一的直播收藏品电商平台。Whatnot
    尚未盈利，估计年烧钱 $50M–$90M。
