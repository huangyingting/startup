  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买家画像
        blocks:
          - type: paragraph
            body: >
              Whatnot 的买家基础集中在热情高、支付意愿强的收藏者社区：


              **主要买家群体：** 18–35 岁成年收藏者（以男性为主），主要在美国。核心兴趣品类包括体育卡（NFL、NBA、MLB、UFC）、Pokémon
              卡、动漫周边、古着漫画、球鞋和时尚配饰。相对年龄，这一人群可支配收入较高，社区身份强，并具备快速鉴定商品的品类知识。


              **次要买家群体：** 被特定卖家或品类吸引进来的礼品买家和休闲收藏者。平均交易金额较低，复购率较低。对 Whatnot GMV 的贡献没那么核心，但拓宽了人群覆盖。


              **地域集中度：** 约 80%+ GMV 来自美国，德国和英国买家基础正在扩张。日本和其他亚太市场代表上行空间，但尚未服务。


              **估计规模：** Whatnot 未公开披露活跃买家数。基于 2024 年披露的 $3B GMV 和估计 $50–100 的平均交易额，可推算年交易量约 30–60M、月活买家
              800K–2M+（假设每名买家每月 3–5 笔交易）。这是分析师估计，不确定性显著。


              **购买行为：** 直播拍卖买家参与度指标高：平均每场直播观看 30–60 分钟，买家常在同一场次观看多个卖家。关注特定卖家的核心收藏买家复购率很高。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
