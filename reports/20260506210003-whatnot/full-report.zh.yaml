      - number: '3.3'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: >
              竞争者之间的关键差异化因素：


              **鉴定：** Whatnot 为评级卡和球鞋提供卖家验证 + 鉴定计划。eBay 有 Authenticity Guarantee（卡牌 >$750+ 需要第三方评级）。TikTok Shop
              没有品类专属鉴定，这是 Whatnot 最强的品牌护城河。StockX 和 GOAT 有球鞋实物鉴定中心，在鉴定球鞋上优于 Whatnot，但缺少直播形式。


              **佣金结构：** Whatnot 向卖家收取 8% + 买家处理费。TikTok Shop 6–8%（促销后）。eBay 12–15%（计入支付处理后的总成本更高）。StockX 8–10% + $5
              交易费。GOAT 9.5%+ 提现费。Whatnot 的 8% 有竞争力，但并非独特低价。


              **发现：** TikTok Shop 的算法发现能把直播推给未订阅用户，理论上零关注关系也可触达数百万人。Whatnot 依赖订阅通知和品类浏览。这是结构性可发现性劣势，Whatnot 必须靠付费获客或 SEO
              / 社交分发来补足。


              **买家信任 / 品牌：** Whatnot 在收藏品社区积累了 5+ 年品牌信任。eBay 有 25+ 年品牌资产。TikTok Shop 在美国市场与假货风险相关联。Whatnot
              的信任优势真实存在，但也脆弱；一次重大鉴定失败就可能迅速侵蚀该优势。
