      - number: '4.3'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >
              累计融资：从种子轮（2020）到 Series F（2025 年 10 月）约 $995M。关键轮次：


              - 种子轮（2020）：$3.7M，投后估值估计约 $15M（YC + Initialized Capital）

              - Series A（2021 年 4 月）：$4M，估值估计约 $30M（YC 演示日）

              - Series B（2021 年 7 月）：$50M，估值 $300M（Andreessen Horowitz）

              - Series C（2021 年 9 月）：$150M，估值 $1.5B（CapitalG + a16z）

              - Series D（2022 年 7 月）：$260M，估值 $3.7B（a16z）

              - Series E（2025 年 1 月）：$265M，估值 $5B（a16z + CapitalG 共同领投）——合格独角兽事件

              - Series F（2025 年 10 月）：$225M，估值 $11.5B（领投方未披露；a16z 和 CapitalG 参与）


              优先股堆叠：$995M 累计融资对应清算优先权堆叠。在 $11.5B 估值下，现有投资者账面收益可观；但优先权结构（很可能是 1× 非参与优先股）意味着，如果退出估值低于
              $2–3B，普通股（创始人、员工）可分得的回报会很少。若估值守不住，员工激励一致性会面临实质风险。


              SEC Form D 文件：Whatnot 已按要求为美国境内融资提交 Form D 通知。Series E 和 Series F 的 Form D 文件可通过 EDGAR
              公开获取；这些文件确认融资存在，但不确认估值（估值写在投资协议中，不在 Form D 中）。


              现金充足性：累计融资 $995M，分析师估计截至 2024 年累计花费 $300–400M，因此 Whatnot 在 Series E 交割（2025 年 1 月）时可能持有 $400–600M 现金 /
              等价物。Series F（2025 年 10 月，$225M）进一步延长现金跑道。分析师估计，在当前烧钱速度下现金跑道为 18–24 个月，但烧钱速度未披露。
