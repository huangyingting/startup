            body: >
              在 Whatnot 的 $11.5B Series F 估值下，最可能的情形（55% 概率基准情形）意味着，即使公司执行良好、但按市场平台可比倍数（3–7× 收入）退出，回报仍为 -30% 至
              -70%。只有牛情形（15% 概率）能从这个进入价格产生正回报。对 Series F 投资人来说，风险 / 回报结构并不有利。
