      - number: '5.4'
        title: 信任、安全、合规与路线图
        blocks:
          - type: paragraph
            body: >
              **鉴定与信任计划：** Whatnot 要求卖家在销售前验证身份。高交易量卖家需要更强验证。评级卡鉴定徽章授予那些卖家提供 PSA/BGS/CGC 评级证据的商品。FTC 就直播电商假货发出警告函后，该计划在
              2023 年扩张。


              **安全：** Whatnot 通过自动内容审核和人工复核结合来管理直播。卖家若被发现虚假描述商品或采取欺骗性拍卖手法（串通抬价、假出价），会被暂停。2023
              年关于未经授权经常性收费的集体诉讼促使公司修改订阅计费系统。


              **隐私与合规：** Whatnot 是美国注册公司，业务覆盖欧盟（德国）和英国，因此受 GDPR、UK GDPR 以及 California CCPA/CPRA
              约束。覆盖这些司法辖区的隐私政策已公开。国际扩张后，合规开销同步放大。


              **技术可靠性：** 公开资料没有记录重大宕机，但个别卖家直播偶尔会出现缓冲或断连。平台依赖 AWS，形成集中风险；AWS 重大宕机会影响全球直播可靠性。


              **路线图信号：** 根据 2024–2025 年工程招聘信息，Whatnot 正在投入：（1）AI
              驱动的直播推荐；（2）面向新买家的卖家发现改进；（3）增强现实商品查看；（4）扩展拆卡房工具；（5）国际支付方式（德国 SEPA 直接借记、英国 Open Banking）。
