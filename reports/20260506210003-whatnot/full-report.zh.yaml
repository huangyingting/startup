              Whatnot 依赖 AWS 提供基础设施，依赖 iOS/Android 应用商店分发，因此有两类集中风险：（1）AWS 宕机会直接影响直播可靠性；（2）应用商店政策变化（Apple 15–30% IAP
              抽成、潜在下架）可能打断买家和卖家获取。两项风险并非 Whatnot 独有，但都关系到技术韧性。
