      - number: '2.4'
        title: 采用约束与竞争动态
        blocks:
          - type: paragraph
            body: >
              美国直播电商采用的关键结构性约束：（1）美国消费者在心理上把娱乐和交易电商分开，直播电商习惯养成明显慢于中国；中国早期就通过 WeChat 和 Alibaba 生态把两者融合；（2）TikTok Shop
              2024 年美国 GMV 约 $20B，并在 2024 年进入收藏品品类，直接竞争 Whatnot 的核心市场；（3）eBay 2023 年推出 eBay Live，瞄准 Whatnot 的收藏品卖家基础，且拥有
              150M+ 活跃买家的在位优势；（4）Amazon 2024 年扩张 Amazon Live 联盟计划，主要切入通用品类相邻市场。


              收藏品周期性反复出现：交易卡市场在 2021 年 COVID 驱动的爱好通胀中见顶，2022 年急剧回调（Pokémon 卡价格较峰值下跌 40–70%），并在 2023–2024 年修复。Whatnot 的
              GMV 增速在 2022 年回调期放缓，说明敞口真实存在。Pokémon 和体育卡约占 Whatnot GMV 的 40–50%，这种集中度带来宏观敏感性，单纯的直播电商市场增长数字无法完全反映。


              国际摩擦包括 EU GDPR、UK Consumer Rights Act、本地支付基础设施要求、跨司法辖区 VAT
              合规，以及本地化卖家支持团队成本。分析师估计，国际单位经济性低于美国。主流（非收藏品）受众的买家 CAC 偏高；迄今大部分获客来自有机社区，如果不投入付费营销，可触达买家基数的增长会受限。
