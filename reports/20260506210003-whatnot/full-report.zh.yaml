      - number: '6.2'
        title: 卖家分层与证明点
        blocks:
          - type: paragraph
            body: >
              Whatnot 的供给侧（卖家）是市场平台的关键资产：


              **专业卖家：** Whatnot 顶层卖家把平台当作主业，年收入 $1M–$5M+。这些卖家每天或每周多次直播，雇佣专职员工，并配置专门直播间。多个公开案例研究确认，有卖家在 Whatnot 上产生 $1M+
              年 GMV。这种成功给长尾新卖家提供了可向往的证明点。


              **半专业卖家：** 中腰部卖家在 Whatnot 年收入 $50K–$500K，把它作为主收入或补充收入来源。随着 Whatnot 强化创作者经济定位（卖家工具、分析、专属卖家成功团队），该分层增长显著。


              **爱好者卖家：** 出售闲置库存的休闲收藏者。单卖家 GMV 较低，但对品类宽度和发现很重要。这些卖家也常成为相邻品类的高频买家。


              **卖家集中度风险：** Whatnot 前 1,000–2,000 名卖家可能贡献 40–60% 总 GMV；这是创作者经济平台常见的集中模式（YouTube：前 1% 创作者贡献 90% 观看量）。若前 10
              名卖家迁移到 TikTok Shop 或开独立渠道，Whatnot 会失去有意义的 GMV。


              **卖家获取渠道：** Whatnot 的卖家获取结合了主动商务拓展（瞄准成熟卡商、收藏品店主、卡牌评级提交服务商）和收藏者社区的主动申请。专属卖家成功团队为高潜新卖家提供入驻支持。
