      - number: '7.3'
        title: 运营、财务与执行风险
        blocks:
          - type: paragraph
            body: >
              **AWS 基础设施依赖：**

              Whatnot 平台托管在 AWS 上。重大 AWS 宕机（如 2021 年 12 月发生、影响 Netflix、Disney+ 和数千项服务的事件）会直接损害直播和拍卖可靠性。相比异步市场，Whatnot
              的业务模式——实时竞价直播视频——对延迟和可用性故障尤其敏感。高峰直播时段（周末晚间）发生 2 小时宕机，可能造成显著 GMV 损失。


              **移动应用商店平台风险：**

              Whatnot 的移动端优先产品依赖 Apple App Store 和 Google Play 做分发。Apple 对虚拟商品收取 15–30% 应用内购买费用；如果政策变化要求卖家订阅或高级功能使用
              IAP，单位经济可能受到实质影响。下架风险（因内容政策违规）概率低，但一旦发生就是生存级风险。


              **实时竞价大规模可靠性：**

              数千名竞拍者同时参与直播拍卖，需要毫秒级冲突解决。高价值拍卖期间发生系统故障（例如一张 1990 年新秀卡卖到 $5,000），可能引发争议、拒付，以及卖家 /
              买家信任受损。随着并发直播增长，扩展拍卖基础设施是不小的工程挑战。


              **烧钱速度与盈利路径：**

              Whatnot 最近一次披露融资（2024 年 2 月 Series F，$260M）意味着公司仍在大规模烧钱。按估算 $350M+ 收入、以及该规模消费市场平台常见 EBITDA 利润率（-15% 至
              -25%）推算，Whatnot 隐含年烧钱约 $50M–$90M+。按这个速度，2024 年 2 月融资大约提供 3–5 年资金续航（假设没有重大资本事件），但在没有财务披露的情况下，盈利时间点仍不确定。


              **卖家关键人和供给集中度风险：**

              Whatnot 前 100 名卖家可能贡献平台总 GMV 约 15%。即使只有其中 5–10 名卖家迁往 TikTok Shop（据称后者提供保底和更低佣金率），Whatnot 也可能在短期内损失不成比例的
              GMV。长期独家合约缺位（未见公开文件）让这一风险在结构上真实存在。
            claimRefs:
