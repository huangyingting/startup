            body: |
              **牛情形（15% 概率）：**
              - GMV 以 50%+ CAGR 增长，2027 年达到 $15B；美国直播电商 TAM 扩张快于预期
              - TikTok 监管行动（被迫剥离美国业务）移除主要竞争威胁
              - Whatnot 以 8–12× 收入倍数 IPO；2027 年收入达到 $1.7B+
              - 退出时隐含估值：$14B–$20B（Series F 的 1.2–1.7×）
              - Series F 回报：20–70%（考虑进入价格，上行有限）

              **基准情形（55% 概率）：**
              - GMV 以 25–35% CAGR 增长，2027 年达到 $8–10B；收入达到 $900M–$1.15B
              - TikTok Shop 形成实质竞争，但没有拿走头部卖家
              - Whatnot 到 2027 年接近 EBITDA 盈亏平衡；2028–2029 年 IPO 或战略出售
              - IPO 按 5–7× 收入，或 M&A 按 3–5× 收入；退出估值 $4.5B–$8B
              - Series F 回报：-30% 至 -70%（降估值融资情形或重大价值损失）

              **熊情形（30% 概率）：**
              - GMV 增长放缓至 <15% CAGR；TikTok Shop 成功招募关键卖家
              - 收藏品市场下行压低 GMV；烧钱不可持续
              - 降估值融资，或以 1–2× 收入困境出售（$350M–$700M）
              - Series F 回报：-93% 至 -85%（接近全损）

              **建议：跟踪**
              Whatnot 已经证明商业模式，GMV 增长强劲，供给侧社区真实。收藏品直播电商品类确实存在并在增长。不过：
              - 当前 $11.5B 估值偏贵，安全边际有限
              - 基准情形意味着按 Series F 进入价格会出现负回报
              - TikTok Shop 竞争风险和收藏品周期性仍未解决
              - 没有披露盈利时间表

              跟踪公司 6–12 个月，重点监测：GMV 增长放缓、卖家留存指标、TikTok Shop 美国监管结果，以及 Series G 条款 / 估值。等估值重置，或盈利时间表可见后再重新评估。

              **风险评级：高**——商业模式风险（收藏品周期性、TikTok 竞争）叠加财务风险（尚未盈利、估值昂贵），使其落入高风险类别。
            claimRefs:
