  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              Whatnot 所处的是「直播电商」：卖家通过实时视频流向现场观众拍卖或限时售卖商品。该形式把娱乐和交易揉在一起，参与度和转化率高于静态电商。


              主市场：直播拍卖收藏品——交易卡（Pokémon、体育卡、MTG）、球鞋、古着服饰、漫画、硬币。对于需要实时定价成色、真伪和社交背书的品类，直播拍卖在结构上优于异步 eBay。全球市场规模估计 $40–60B。


              相邻市场：广义直播电商（TikTok Shop、Amazon Live）。Whatnot 2024 年扩展到古着服饰，但尚未在该市场全面竞争。按 Coresight 估计，美国广义直播电商 TAM（所有品类）到
              2026 年达到 $68B+。


              全球语境：中国的 Taobao Live、Douyin 和 Pinduoduo 在 2023 年推动了 $600B+ GMV。美国直播电商约占电商 4%，中国为 14–18%；美国仍存在深层结构性低渗透。


              排除项：传统拍卖行（价格带不同）、同步点对点市场平台（StockX、GOAT）和批发 B2B。
