      - number: '2.2'
        title: 市场规模与增长驱动因素
        blocks:
          - type: paragraph
            body: >
              主要分析机构对美国直播电商的估计：

              - Coresight Research（2024）：美国 GMV 从 2023 年 $25B 增至 2026 年 $68B（CAGR 约 40%）

              - McKinsey（2023）：全球直播电商到 2026 年 $500B–$1T

              - eMarketer（2024）：美国社交电商 GMV 2023 年 $67B，至 2027 年年增 25%

              - Bain（2023）：若 TikTok/YouTube/Facebook 持续投入，美国直播电商到 2026 年 $50–70B

              - Bloomberg Intelligence（2024）：美国收藏品 $30–40B；约 15–20% 通过直播拍卖成交


              增长驱动：（1）PSA 评级卡提交量 2023 年同比 +35%，收藏品长期增长；（2）购物娱乐：头部卖家吸引 50K–200K 观众，形成类媒体粘性；（3）创作者经济：头部 1,000 名卖家年收入
              $100K–$2M+，已成主业，粘性极强；（4）移动优先的 Gen Z/Millennial 买家群体（60%+ 买家低于 35 岁）；（5）TikTok Shop 2024 年美国 GMV
              $20B，验证直播电商已成为真实美国品类。


              约束：（1）TikTok Shop 2023–2024 年以 0% 佣金促销切入，威胁 Whatnot 8% 抽佣率；（2）eBay Live 和 Amazon Live
              在收藏品领域竞争；（3）收藏品周期性（Pokémon 卡 2021 年泡沫、2022 年回调、2023–2024 年修复）；（4）FTC 2023 年假货警告带来合规开销。
