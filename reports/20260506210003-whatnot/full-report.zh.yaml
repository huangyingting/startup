  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 融资背景与当前估值
        blocks:
          - type: paragraph
            body: >
              Whatnot 于 2024 年 2 月完成 $260M Series F 融资，投后估值 $11.5B。此前五轮融资合计约 $1.025B+：

              - Seed / Series A（2020 年）：$4M + $50M（a16z 领投）

              - Series B（2021 年）：$150M，估值 $1.5B

              - Series C（2021 年）：$314M，估值 $3.7B（后调整至 $4B+）

              - Series D（2022 年）：$260M，估值 $3.7B（与上一轮持平——COVID 后修正期）

              - Series E（2023 年）：规模未确认，但 CapitalG 已确认参与

              - Series F（2024 年）：$260M，估值 $11.5B


              Series F 对 Whatnot 的估值是 2022 年 7 月 Series D 估值的 3.1×，意味着公司从 COVID 后收藏品市场修正中恢复并继续增长。投资人包括：

              a16z（多轮领投）、CapitalG（Alphabet）、YC Continuity 等。


              按 $11.5B 估值，Whatnot 的交易水平约为：

              - 2024 年估算 GMV（$3B）的 3.8×

              - 2024 年估算收入（$350M，11.5% 综合抽佣率）的约 33×

              - 在更保守 7% 抽佣率下为收入的 52×


              对一个尚未盈利的市场平台来说，这个倍数偏贵。可比上市市场平台的收入倍数为 4–5×（eBay、Etsy）；Poshmark 被收购时约为收入的 1.5×。相对上市可比公司的隐含溢价，反映了 Whatnot
              的高增长率和私募市场流动性折价，但也让按当前估值进入的投资人安全边际有限。
