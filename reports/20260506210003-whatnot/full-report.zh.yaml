      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              **Stripe 支付处理依赖：**

              Whatnot 使用 Stripe 作为主要支付处理商。Stripe 服务中断、账户被终止（因 ToS 违规）或价格变化，会直接影响买家支付流程和卖家打款。Stripe
              虽然极其可靠，但支付处理商单点集中仍是依赖风险，成熟市场平台通常会用支付冗余来处理（备用处理商、备用收单方）。


              **PSA / BGS 评级服务依赖：**

              Whatnot 的鉴定计划依赖第三方评级服务（PSA、BGS、CGC）认证卡牌评级。评级服务丑闻（PSA 曾有假评级争议）、产能约束或价格变化，都会削弱 Whatnot 的鉴定护城河。2021 年，PSA
              因积压暂停新提交数月——造成全市场鉴定危机，并直接影响 Whatnot。


              **视频流技术：**

              Whatnot 的直播技术栈（AWS IVS + 自研）依赖 AWS 提供核心视频基础设施。除了 AWS 一般可靠性之外，AWS IVS 价格变化或服务停用（AWS 经常弃用服务）也可能迫使公司紧急迁移基础设施。


              **国际扩张伙伴风险：**

              德国和英国上线需要本地支付、法律和运营搭建。Whatnot 的国际增长取决于能否维持合规的本地运营，并适配当地监管要求。欧盟 P2B
              Regulation（Platform-to-Business）要求市场平台对商家卖家保持透明，增加了合规负担。


              **关键人风险——创始人与领导层：**

              Whatnot 联合创始人 Grant LaFontaine 和 Bobby Owner 仍活跃在管理层。对一家尚未盈利、仍在扩张阶段的公司来说，失去创始人领导层是中等执行风险，尤其影响文化、卖家关系和产品方向。
