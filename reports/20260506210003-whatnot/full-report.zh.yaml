    approximationNotes: 地理 GMV 百分比为分析师估计，基于德国 / 英国上线时间和相对市场规模的媒体报道。Whatnot 未披露地理收入拆分。
    claimRefs:
      - CU003
      - CU012
      - CU013
      - CU023
  - id: FU004
    title: 品类 GMV 份额——Whatnot 头部品类
    type: bar
    layout: standard
    summary: |
      Whatnot 2024 年按收藏品品类估计的 GMV 份额，反映体育球星卡和 Pokémon 作为平台锚定品类的主导地位。
    data:
      items:
        - label: 体育球星卡（NFL/NBA/MLB/UFC）
