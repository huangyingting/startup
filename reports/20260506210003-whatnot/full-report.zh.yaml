      - number: '3.2'
        title: 竞争者画像
        blocks:
          - type: paragraph
            body: >
              **TikTok Shop（ByteDance）：** 2023 年 9 月在美国上线。2024 年美国 GMV $20B+（Bloomberg）。卖家佣金先 0%，后为
              6–8%。算法发现引擎把直播推给未订阅受众；Whatnot 则需要用户主动关注。全球用户 1B+。关键弱点：假货和信任问题（2024 年美国参议院审查；FTC 假货警告）；没有收藏品专属鉴定计划。Whatnot
              的差异化：品牌信任、验证、社区深度。风险：TikTok 已开始直接招募 Whatnot 的头部交易卡卖家。


              **eBay（NASDAQ: EBAY）：** 2023 年 GMV $73B。2023 年推出 eBay Live。活跃买家 150M+。在收藏品（交易卡、硬币、古着服饰）异步形式中占主导地位。eBay
              Authenticity Guarantee 计划（2020）覆盖球鞋和卡牌。关键弱点：直播形式是嫁接在旧用户体验上的功能，没有原生直播社区文化。Whatnot
              的差异化：为直播打造的用户体验、卖家社区身份、娱乐电商融合。


              **Amazon Live：** Amazon 的创作者直播购物功能。主要是通用商品。Amazon 未公开披露 Amazon Live GMV。与 Prime 生态整合（美国 Prime 订阅用户
              150M+）。关键弱点：不专注收藏品；偏交易而非社区。Whatnot 的差异化：品类深度、鉴定、社区。


              **NTWRK：** 面向球鞋、街头服饰和收藏品的直播电商。2018 年创立。私营；估计 GMV $200–400M（远小于 Whatnot）。投资方包括 Goldman Sachs、Foot
              Locker。关键弱点：品类更窄、受众更小、规模不足。对 Whatnot 整体地位不是一线威胁，但会争夺球鞋卖家。


              **Popshop Live：** 通用直播电商市场平台。规模较小。卖家留存和买家增长吃力。2023 年后竞争威胁相关性下降。


              **StockX：** 私营。估值 $2B（最后披露于 2021）。交易卡 + 球鞋的指数化交易和鉴定。不是直播，是异步形式。关键弱点：没有社区，没有娱乐元素。偏好互动观众而非 StockX
              即时出售模式的卖家，会用 Whatnot 替代 StockX。
