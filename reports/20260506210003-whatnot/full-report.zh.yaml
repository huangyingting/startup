chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Whatnot 是一家专为收藏者和爱好者打造的直播拍卖与购物市场平台。卖家（「主播」）直接向买家直播拍卖球星卡（Pokémon、体育卡）、球鞋、古着、漫画书和其他收藏品，买家通过移动 App
              实时出价。平台把直播的娱乐性和现场拍卖的价格发现结合起来，形成了不同于 eBay（异步）和 TikTok Shop（算法信息流）的社交电商品类。Whatnot 向卖家收取 8%
              佣金外加支付处理费，买家支付发货处理费。公司是双边市场模式：不持有库存、不处理履约、不提供卖家融资，却从每笔交易赚取毛利。Whatnot 2019 年创立于 California 州 Los
              Angeles，总部位于 3440 Cahuenga Blvd West, Los Angeles（West Hollywood）, CA 90068。公司业务覆盖美国（主市场）、德国、英国、加拿大和澳大利亚。


              Whatnot 的商业模式类似 eBay
              的市场平台模式，但聚焦「娱乐电商」细分市场：参与直播拍卖本身就是产品，不只是交易工具。卖家培养忠诚的复购买家社区，买家每周观看数小时内容，并与主播建立准社交关系。参与感推高复购率，也通过共享直播自然带来传播。
