            title: 纯市场平台模式 — 无库存风险，毛利率潜力高
            body: >
              Whatnot 的纯市场平台模式（不自持库存）带来结构性毛利率优势：没有库存减值风险，没有仓储成本，收入随 GMV 线性扩张。45–50%
              毛利率下，单位经济性按市场平台标准很强。盈利路径主要取决于运营费用纪律，而不是商业模式结构调整。
