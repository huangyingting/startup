    claimRefs:
      - CU001
      - CU003
      - CU013
      - CU024
  - id: FR001
    title: 风险热力图——Whatnot 主要风险按影响与概率
    type: matrix
    layout: standard
    summary: |
      矩阵按影响（1–4，从低到严重）和发生概率（1–4，从低到高）为 Whatnot 主要风险打分，并给出色带含义。
    data:
      columns:
        - 低影响（1）
        - 中等影响（2）
        - 高影响（3）
        - 严重影响（4）
      rows:
        - label: 高概率（4）
          values:
            - 0
            - 1
            - 2
            - 0
        - label: 中等概率（3）
          values:
            - 0
            - 2
            - 3
            - 1
        - label: 低概率（2）
          values:
            - 1
            - 1
            - 2
            - 1
        - label: 极低概率（1）
          values:
            - 0
            - 0
            - 1
            - 1
    approximationNotes: 风险评分为分析师定性评估。0=单元格内无风险，数字表示该严重程度单元格中的大致风险数量。
    claimRefs:
      - CR004
      - CR005
      - CR014
      - CR026
      - CR028
  - id: FR002
    title: 风险传导图——主要风险如何流向收入和估值
    type: dag
    layout: standard
    summary: |
      有向图展示 Whatnot 的主要风险如何沿业务系统传导，影响收入、利润率、融资，并最终影响估值。
    data:
      nodes:
        - id: tiktok_risk
          label: TikTok Shop 竞争（卖家迁移）
        - id: cyclicality
          label: 收藏品市场周期性
        - id: ftc_risk
          label: FTC 执法 / 监管行动
        - id: aws_risk
          label: AWS 基础设施宕机
        - id: billing_risk
          label: 消费者账单 / 订阅风险
        - id: seller_conc
          label: 卖家 GMV 集中
        - id: gmv_impact
          label: GMV 下滑
        - id: revenue_impact
          label: 收入压缩
        - id: trust_damage
          label: 品牌 / 信任受损
        - id: fundraise_risk
          label: 融资受损
        - id: valuation_risk
          label: 估值下降
      edges:
        - from: tiktok_risk
          to: seller_conc
          label: 加速卖家流失
        - from: cyclicality
          to: gmv_impact
          label: 需求收缩
        - from: seller_conc
          to: gmv_impact
          label: 供给减少
        - from: ftc_risk
          to: trust_damage
          label: 执法 → 品牌
        - from: aws_risk
          to: gmv_impact
          label: 直播停摆
        - from: billing_risk
          to: trust_damage
          label: 买家流失
        - from: gmv_impact
          to: revenue_impact
          label: 抽佣率 × GMV
        - from: trust_damage
          to: gmv_impact
          label: 买家 / 卖家流失
        - from: revenue_impact
          to: fundraise_risk
          label: 增长叙事
        - from: revenue_impact
          to: valuation_risk
          label: 收入倍数压缩
        - from: fundraise_risk
          to: valuation_risk
          label: 降价融资风险
    approximationNotes: 风险传导由分析师基于公开信息建模。未量化传导概率。
    claimRefs:
      - CR001
      - CR011
      - CR014
      - CR028
  - id: FR003
    title: 依赖图——关键运营依赖
    type: dag
    layout: standard
    summary: |
      Whatnot 关键运营依赖的有向图，展示单点故障及其与平台可用性的关系。
    data:
      nodes:
        - id: aws
          label: AWS（核心托管 + IVS）
        - id: stripe
          label: Stripe（支付）
        - id: apple
          label: Apple App Store（iOS 应用商店）
        - id: google
          label: Google Play（Android）
        - id: psa
          label: PSA / BGS / CGC（卡牌评级）
        - id: cdn
          label: CDN（视频交付）
        - id: streaming
          label: 直播能力
        - id: payments
          label: 支付流程
        - id: distribution
          label: 用户获取 / 访问
        - id: authentication
          label: 鉴定项目
        - id: platform
          label: Whatnot 平台
      edges:
        - from: aws
          to: streaming
          label: 托管 IVS
        - from: cdn
          to: streaming
          label: 交付视频
        - from: stripe
          to: payments
          label: 处理扣款
        - from: apple
          to: distribution
          label: iOS 分发
        - from: google
          to: distribution
          label: Android 分发
        - from: psa
          to: authentication
          label: 评级认证
        - from: streaming
          to: platform
          label: 核心功能
        - from: payments
          to: platform
          label: 变现
        - from: distribution
          to: platform
          label: 用户访问
        - from: authentication
          to: platform
          label: 信任层
    approximationNotes: 依赖关系由分析师根据公开信息搭建。Whatnot 尚未发布官方依赖图。
    claimRefs:
      - CR020
      - CR025
      - CR030
      - CR033
      - CR038
  - id: FV001
    title: 推荐逻辑流——从证据到观察建议
    type: flow
    layout: standard
    summary: |
      流程图展示从 Whatnot 的规模证明、护城河评估、竞争风险、估值和财务位置，到观察建议的逻辑链条。
    data:
      nodes:
        - id: scale
          label: '$3B GMV（2024）；增长 40%+；直播收藏品 #1'
        - id: moat
          label: 卖家护城河：$1M–$5M+ 收入卖家；拆盒直播间独特性；认证徽章
        - id: market
          label: TAM：美国 SAM $40–60B；国际扩张；品类增长
        - id: competition
          label: TikTok Shop 威胁：算法优势 + 抽佣率补贴
        - id: cyclicality
          label: 收藏品周期性：2022 年回调先例
        - id: valuation
          label: $11.5B = 收入 33×；相对所有上市可比公司偏贵
        - id: profitability
          label: 尚未盈利；隐含烧钱 $50–90M；没有时间表
        - id: recommendation
          label: 观察 — 等待估值重置或增速放缓数据
      edges:
        - from: scale
          to: moat
          label: 验证模式
        - from: moat
          to: market
          label: 支撑 TAM 逻辑
        - from: market
          to: competition
          label: 受……抵消
        - from: competition
          to: valuation
          label: 抬高风险溢价
        - from: cyclicality
          to: valuation
          label: 抬高风险溢价
        - from: valuation
          to: profitability
          label: 叠加
        - from: profitability
          to: recommendation
          label: 共同指向
        - from: competition
          to: recommendation
          label: 主要风险驱动
    approximationNotes: 逻辑流由分析师搭建，用来呈现估值判断。并非 Whatnot 官方文件。
    claimRefs:
      - CV002
      - CV009
      - CV023
      - CV034
  - id: FV002
    title: 估值敏感性 — 收入倍数与 2027 年 GMV 增速
    type: bar
    layout: standard
    summary: |
      该敏感性分析展示不同 GMV 增速假设和退出时收入倍数下的隐含退出估值区间，并以 Whatnot 的 Series F 入场价作对照。
    data:
      items:
        - label: 悲观：<15% GMV CAGR × 2× 收入倍数退出
          value: 700
        - label: 悲观-基准：20% GMV CAGR × 3× 收入倍数退出
          value: 2600
        - label: 基准：30% GMV CAGR × 5× 收入倍数退出
          value: 5200
        - label: 基准-乐观：35% GMV CAGR × 7× 收入倍数退出
          value: 8100
        - label: 乐观：45% GMV CAGR × 10× 收入倍数退出
          value: 16000
        - label: Series F 入场价
          value: 11500
    approximationNotes: 退出估值单位为 $M。GMV 增速为以 2024 年 $3B 为基数计算的 3 年 CAGR。收入按 11.5% 抽佣率估计。 数值为分析师情景示意。
    claimRefs:
      - CV022
      - CV026
      - CV029
      - CV033
  - id: FV003
    title: 估值 / 回报区间 — 低 / 基准 / 高情景
    type: range
    layout: standard
    summary: |
      区间图展示 Whatnot 在 2027–2029 年潜在退出时的低、基准、高估值估计，并以 Series F 入场价作为回报评估参照。
    data:
      items:
        - label: 困境出售（悲观）
          low: 350
          mid: 525
          high: 700
        - label: M&A 退出（基准）
          low: 4500
          mid: 6000
          high: 8000
        - label: IPO（基准-乐观）
          low: 7500
          mid: 10500
          high: 14000
        - label: IPO（乐观）
          low: 13000
          mid: 16500
          high: 20000
        - label: Series F 入场价（参照）
          low: 11500
          mid: 11500
          high: 11500
    approximationNotes: 所有数值单位为 $M。区间反映 GMV 轨迹、倍数压缩 / 扩张和退出时点的不确定性。 并非预测。
    claimRefs:
      - CV025
      - CV027
      - CV035
      - CV036
  - id: FV004
    title: 投资 KPI — Whatnot 投委会评审评分
    type: kpi
    layout: standard
    summary: |
      基于投委会常用维度，对 Whatnot 的关键指标打分。
    data:
      items:
        - label: 市场机会
          value: 8/10
          note: 美国可服务市场（SAM）$40–60B；总可用市场（TAM）大且渗透不足；国际市场有上行空间
        - label: 产品 / 护城河强度
          value: 7/10
          note: 拆盒直播间有独特性；认证徽章；卖家社区；但 TikTok 威胁仍在
        - label: 客户验证
          value: 7/10
          note: $3B GMV；头部卖家 $1M–$5M+；高参与度；有集中度风险
        - label: 财务画像
          value: 5/10
          note: 尚未盈利；收入 $350M+；仅与 GMV 绑定；未披露烧钱速度
        - label: 风险 / 竞争
          value: 4/10
          note: TikTok Shop 结构性威胁；收藏品周期性；监管逆风
        - label: 估值
          value: 3/10
          note: 收入 33×；相对所有可比公司偏贵；按 Series F 价格，基准情景回报为负
        - label: 证据质量
          value: 6/10
          note: GMV 和卖家验证有强公开证据；财务证据弱
        - label: 总体评分
          value: 6/10
          note: 业务强，价格不对；观察，不是买入
    approximationNotes: KPI 分数是分析师定性评估。10 = 极强；1 = 重大隐忧。
    claimRefs:
      - CV001
      - CV005
      - CV010
      - CV014
      - CV023
