      - number: '1.4'
        title: 关键里程碑与牵引力
        blocks:
          - type: paragraph
            body: |
              Whatnot 的增长轨迹显示，2021–2025 年规模持续加速：

              **2019：** 公司成立；最初聚焦 Pokémon 卡；2 位创始人，无收入。
              **2020：** COVID 封锁期间转向直播拍卖；完成 $3.7M 种子轮；首批卖家入驻。
              **2021：** 进入 Y Combinator W21；Series B（$50M，估值 $300M）；Series C（$150M，估值 $1.5B）；从 Pokémon 卡扩展到体育卡、球鞋。
              **2022：** Series D（$260M，估值 $3.7B）；进入英国和德国；GMV $1.5B（估计）；约 350 名员工。
              **2023：** 上线加拿大和澳大利亚；新增古着品类；GMV 约 $2B（估计）；美国核心卡牌市场初现盈利迹象。
              **2024：** GMV 约 $3B；收入约 $359M；推出 Whatnot Studios（创作者计划）；员工 680+；开始筹备 Series E。
              **2025（1 月）：** Series E 融资 $265M，估值 $5B —— 合格独角兽证据。
              **2025（10 月）：** Series F 融资 $225M，估值 $11.5B；GMV >$6B（估计）；约 700 名员工。

              反向事件：2023 年因未经授权的经常性收费被提起集体诉讼（2024 年以未披露金额和解）。FTC 在 2023 年向直播电商平台发出警告函，关注收藏品市场的假货问题；Whatnot 随后落地鉴定计划。
