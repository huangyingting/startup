        blocks:
          - type: callout
            title: 卖家验证点——年入百万美元卖家带动供给侧向往飞轮
            body: >
              已有公开案例显示，Whatnot 卖家年收入可达 $1M–$5M+，这为招募新卖家提供了强有力的向往型验证。不同于 eBay 的匿名市场模式，Whatnot
              的实名卖家聚光灯计划为头部卖家塑造创作者经济身份——既提升卖家忠诚度，也加固供给侧防御。
            calloutType: insight
            claimRefs:
              - CU005
              - CU006
              - CU019
          - type: callout
            title: 卖家集中度——前 500 名卖家存在竞争迁移风险
            body: >
              卖家 GMV 呈幂律分布，意味着 Whatnot 前 500 名卖家是关键商业关系。TikTok Shop 和 eBay Live 都有文件记录显示曾用更低抽佣方案招募头部 Whatnot 卖家。即使只有
              10–20 个头部卖家迁移，买家跟着偏好卖家离开平台，Whatnot 也可能损失有意义的 GMV。
            calloutType: insight
            claimRefs:
              - CU007
              - CU008
              - CU009
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              **TikTok Shop——主要竞争威胁：**

              TikTok Shop 的算法发现引擎能把每个新直播间或中腰部直播间推给潜在数百万非粉丝观众；Whatnot 的关注关系模型则要求卖家手动沉淀自己的观众。TikTok 愿意补贴卖家佣金率（据称 0–2%，相对
              Whatnot 约 8%），给卖家迁移制造了经济动机。风险是不对称的：如果 TikTok 建出球星卡鉴定能力，Whatnot 的护城河会明显变窄。不过，TikTok
              自身也面临美国监管风险（被迫剥离威胁），可能被移出竞争格局，或削弱其美国业务。


              **eBay Live 与 Amazon Live：**

              两个平台都有庞大的既有买家群体，也有现成的鉴定计划。eBay 的 Authenticity Guarantee 和成熟支付链路，让它成为可信的直播电商替代选项。不过，这两个平台都尝试过直播电商功能，却没能做到
              Whatnot 级别的社区参与度，说明护城河来自社区深度，而不是功能对齐。


              **收藏品市场周期性：**

              COVID 期间投机泡沫退潮后，球星卡和 Pokémon 市场在 2021–2022 年经历了明显价格回调。Whatnot 的 GMV
              与收藏品市场情绪直接相关。新一轮下行中，卖家供给（卡牌价值下跌，出售动力降低）和买家需求（感知价值下降）会同时收缩。对一家依赖 GMV 抽佣收入的公司来说，这种双重周期暴露是结构性风险。


              **新进入者风险：**

              资金充足的新进入者如果专门做收藏品直播电商（例如面向出口的中国直播电商产品，或 YouTube 直播电商集成），可能在 12–18 个月内复制 Whatnot 的产品。主要门槛是社区，不是技术。
