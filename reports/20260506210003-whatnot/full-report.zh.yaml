      - number: '1.2'
        title: 创始团队与领导层
        blocks:
          - type: paragraph
            body: >
              Whatnot 由 Grant LaFontaine（CEO）和 Logan Head（COO/CTO）于 2019 年联合创立。LaFontaine 曾任 Microsoft 和 Facebook
              产品经理，Head 曾任 Amazon 和 Snapchat 工程师；两人通过 Los Angeles 科技圈的共同联系人相识。两人都是首次创办高增长消费市场平台公司。

              LaFontaine 被广泛视为 Whatnot 卖家获取策略的运营架构师，他曾亲自参加卡展、招募头部卖家，搭起最早的交易卡社区。


              董事会包括 Andreessen Horowitz（a16z）、CapitalG（Google Alphabet 旗下风险投资部门）和 Initialized Capital 的代表。Y
              Combinator（W21）提供了最初的结构和网络。公司未公开披露拥有消费市场平台运营经验的独立董事；这对 Series E/F 阶段消费公司并不罕见，但仍值得留意。


              截至 2026 年 5 月，Whatnot 未披露 C 级高管离职或重大领导层变化。公司员工数已增长到约 700 人，分布在 Los Angeles（总部）、New York 和远程团队。
