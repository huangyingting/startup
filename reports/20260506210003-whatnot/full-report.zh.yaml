      - number: '6.4'
        title: 客户留存、LTV 与满意度信号
        blocks:
          - type: paragraph
            body: >
              **留存信号：** Whatnot 的关注关系模型（买家关注特定卖家，并在卖家开播时收到推送）是一套高留存架构。关注 3
              个以上卖家的买家，复购率明显高于一次性买家。平台的社区深度——卖家与买家的关系、拆包房间里的社交纽带、聊天社区——制造了社交切换成本。不过，这些社交纽带连着卖家，而不是
              Whatnot；头部卖家迁到新平台时，可能把自己的买家社区也带走。


              **NPS 与满意度信号：** Whatnot 没有发布 NPS 数据。App Store 评价好坏参半——买家总体认可发现体验，但关于发货延迟、商品成色争议和订阅计费风波（2023
              年集体诉讼）的投诉反复出现。iOS 端 App Store 评分约为 4.3–4.5/5，高于市场平台类应用平均水平。


              **反向信号——客户投诉：** 2023 年集体诉讼称，Whatnot 在没有充分同意的情况下，让买家承担循环订阅费用。这是一次客户信任事件，损害了该时期的买家满意度。和解后的计费调整似乎已经让局面稳定下来。


              **反向信号——物流问题：** App Store 和消费者论坛反复出现关于发货延迟、包裹丢失、商品成色描述不实的投诉，说明卖家自行发货体验质量不稳定。Whatnot 的 90 天争议解决窗口，也长于
              Amazon 退货政策带来的用户预期。


              **LTV 驱动因素：** 核心收藏品类（球星卡、Pokémon）的买家 LTV 高：热情收藏者会持续花钱，新卡发布不断制造复购场景。季节性事件（Panini 发售日、National Sports
              Collectors Convention）会拉动 GMV 峰值。休闲买家的 LTV 低得多。
