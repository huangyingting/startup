company:
  name: Whatnot
chapter:
  number: 3
  title: Competitive Analysis
  summary: |
    Whatnot operates in the live commerce marketplace segment with primary competition from TikTok Shop
    (general merchandise live commerce), eBay (asynchronous collectibles marketplace), Amazon Live
    (general merchandise livestream), NTWRK (sneakers/streetwear live commerce), and Popshop Live
    (general goods). TikTok Shop's scale ($20B+ US GMV in 2024) is the single most significant competitive
    threat; however, Whatnot's collectibles authentication brand, community depth, and seller-celebrity
    network effects create a differentiated moat. The competitive risk is highest in Whatnot's non-
    collectibles adjacencies (general vintage, apparel) where TikTok Shop and Instagram Live Shopping
    have structural distribution advantages. Whatnot's moat is strongest in enthusiast collectibles —
    trading cards, sneakers, comics — where format-specific trust and community create switching costs
    that pure GMV scale cannot easily overcome.
sections:
  - id: s1
    title: Competitive Landscape Overview
    body: |
      Whatnot competes across three competitive dimensions simultaneously:

      **Dimension 1 — Live auction format for collectibles (direct):** Competitors offering real-time
      video auction experiences for the same categories Whatnot serves. Includes eBay Live (launched
      2023), NTWRK (sneakers/streetwear, live commerce since 2018), and Popshop Live (general live
      commerce). None of these currently match Whatnot's scale in collectibles, but eBay's incumbent
      position with 150M+ active buyers is a structural advantage that Whatnot cannot ignore.

      **Dimension 2 — Live commerce platforms (adjacent):** TikTok Shop (general merchandise via
      livestream, ~$20B US GMV in 2024), Amazon Live (creator-led shopping), Instagram Live Shopping,
      and YouTube Shopping. These platforms do not specialize in collectibles but attract seller
      attention through scale and discoverability. TikTok Shop entering trading cards and sneakers
      in 2024 elevates this from adjacent to direct competition.

      **Dimension 3 — Static collectibles marketplaces (substitute):** eBay (asynchronous auctions,
      buy-it-now), StockX (sneaker/card market index + instant sell), GOAT (authenticated sneakers
      and apparel), TCGplayer (trading cards), and MySlabs (graded card marketplace). These are format
      substitutes for Whatnot's live auction — buyers who prefer to browse without time pressure, or
      sellers who prefer asynchronous listing over real-time performance.

      The most dangerous competitor is TikTok Shop because it combines massive distribution, video-
      native format, and algorithmic discovery — all strengths that Whatnot's community-first approach
      does not yet match at scale outside the collectibles enthusiast community.
    claimRefs:
      - C076
      - C077
      - C078
      - C079
  - id: s2
    title: Competitor Profiles
    body: |
      **TikTok Shop (ByteDance):** Launched US in September 2023. $20B+ US GMV in 2024 (Bloomberg).
      Operates 0% then 6–8% seller commission. Algorithmic discovery engine surfaces live streams to
      non-subscribed audiences — Whatnot requires active follow. 1B+ global users. Key weakness:
      counterfeit and trust issues (US Senate scrutiny 2024; FTC counterfeit warnings); no dedicated
      authentication program for collectibles. Whatnot's differentiation: brand trust, verification,
      community depth. Risk: TikTok has begun direct recruitment of top Whatnot trading card sellers.

      **eBay (NASDAQ: EBAY):** $73B GMV (2023). Launched eBay Live in 2023. 150M+ active buyers.
      Dominant in collectibles (trading cards, coins, vintage apparel) asynchronous format. eBay
      Authenticity Guarantee program (2020) for sneakers and cards. Key weakness: live format is
      bolted-on to legacy UX; no native live community culture. Whatnot's differentiation: purpose-
      built live UX; seller community identity; entertainment-commerce fusion.

      **Amazon Live:** Amazon's creator-led live shopping feature. Primarily general merchandise.
      Amazon does not publicly report Amazon Live GMV. Integrated with Prime ecosystem (150M+ US
      Prime subscribers). Key weakness: not collectibles-specific; transactional rather than community-
      oriented. Whatnot's differentiation: category depth, authentication, community.

      **NTWRK:** Live commerce for sneakers, streetwear, and collectibles. Founded 2018. Private;
      estimated $200–400M GMV (much smaller than Whatnot). Backed by Goldman Sachs, Foot Locker.
      Key weakness: narrower category focus, smaller audience, less scale. Not a top-tier threat to
      Whatnot's overall position but competes for sneaker sellers.

      **Popshop Live:** General live commerce marketplace. Smaller scale. Struggled with seller
      retention and buyer growth. Less relevant competitive threat post-2023.

      **StockX:** Private. $2B valuation (last reported 2021). Trading cards + sneakers index-based
      trading and authentication. Not live; asynchronous. Key weakness: no community; no entertainment
      element. Substituted by Whatnot for sellers who prefer interactive audience over StockX's
      instant-sell model.
    claimRefs:
      - C080
      - C081
      - C082
      - C083
      - C084
      - C085
      - C086
  - id: s3
    title: Capability and Pricing Comparison
    body: |
      Key differentiation factors across competitors:

      **Authentication:** Whatnot has a seller verification + authentication program for graded cards
      and sneakers. eBay has Authenticity Guarantee (third-party grading required for cards >$750+).
      TikTok Shop has no category-specific authentication — this is Whatnot's strongest brand moat.
      StockX and GOAT have physical authentication centers for sneakers; superior to Whatnot in
      authenticated sneakers but lack live format.

      **Commission structure:** Whatnot charges sellers 8% + buyer processing fee. TikTok Shop 6–8%
      (post-promotional). eBay 12–15% (higher all-in with payment processing). StockX 8–10% + $5
      transaction fee. GOAT 9.5%+ cash out fee. Whatnot's 8% is competitive but not uniquely low.

      **Discovery:** TikTok Shop's algorithmic discovery exposes streams to non-subscribed users —
      potentially reaching millions with zero follow relationship. Whatnot relies on subscription
      notifications and category browsing. This is a structural discoverability disadvantage that
      Whatnot must address through paid acquisition or SEO/social distribution.

      **Buyer trust/brand:** Whatnot has built brand trust in the collectibles community over 5+
      years. eBay has 25+ years of brand equity. TikTok Shop is associated with counterfeit risk
      in the US market. This trust advantage is real but fragile — a major authentication failure
      on Whatnot could rapidly erode it.
    claimRefs:
      - C087
      - C088
      - C089
      - C090
      - C091
  - id: s4
    title: Competitive Moat Assessment
    body: |
      Whatnot's moat has three components:

      **1. Supply-side network effects (seller community):** Top sellers are celebrities within their
      communities. Building an audience of 10,000–200,000 followers on Whatnot takes years. Migrating
      to TikTok Shop means starting from scratch on audience. This is Whatnot's deepest moat for
      retaining professional sellers (60–70% of GMV). However, TikTok's algorithm can bootstrap
      seller discovery faster than Whatnot's follow-based model — this advantage may erode over time.

      **2. Buyer community depth:** Active collector buyers are not interchangeable with general
      live commerce buyers. Whatnot's buyer community includes graders, authenticators, and category
      experts who drive price discovery. This community culture is not present on TikTok Shop or
      Amazon Live. It can be replicated by eBay but hasn't been in its live format.

      **3. Authentication brand trust:** In collectibles, authenticity is everything. Whatnot's
      authentication program and seller verification are brand assets. FTC scrutiny of TikTok Shop
      and other platforms reinforces Whatnot's relative positioning. This moat is valuable but
      requires continuous investment to maintain.

      Moat durability concerns: (1) Commission parity as TikTok Shop normalizes rates; (2) TikTok's
      algorithmic discovery advantage in reaching new buyers; (3) eBay's financial resources to
      build a real live commerce product; (4) Category commoditization if trading card market
      matures beyond niche enthusiast community; (5) Whatnot's ability to expand beyond collectibles
      without diluting its brand identity.
    claimRefs:
      - C092
      - C093
      - C094
      - C095
