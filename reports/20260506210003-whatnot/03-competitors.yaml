callouts:
  - id: CL301
    type: risk
    severity: high
    title: TikTok Shop — Critical Competitive Threat with Category Overlap and Commission Parity
    body: >
      TikTok Shop's 2024 entry into trading cards and sneakers — Whatnot's top GMV categories — combined with commission
      normalization at 6–8% eliminates two prior differentiators. TikTok's algorithmic discovery reaches non-follower
      audiences at scale. Whatnot's only durable advantages are authentication brand trust and professional seller
      community stickiness. If TikTok builds an authentication program, Whatnot's moat narrows significantly.
    claimRefs:
      - C080
      - C086
      - C092
  - id: CL302
    type: strength
    severity: high
    title: Authentication Brand Trust — Whatnot's Deepest Structural Moat
    body: >
      In collectibles where authenticity defines value, Whatnot's authentication program and seller verification create
      a brand trust moat that TikTok Shop and Amazon Live do not have. This is reinforced by FTC scrutiny of counterfeit
      goods on TikTok, which drives buyers concerned about fakes back to Whatnot. The moat requires ongoing investment
      but is real and measurable in community behavior.
    claimRefs:
      - C078
      - C087
      - C093
      - C094
