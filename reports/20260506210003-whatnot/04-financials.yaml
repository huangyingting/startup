callouts:
  - id: CL401
    type: strength
    severity: high
    title: Pure Marketplace Model — No Inventory Risk, High Gross Margin Potential
    body: >
      Whatnot's pure marketplace model (no owned inventory) provides structural gross margin advantages: no inventory
      write-down risk, no warehousing costs, and revenue scales linearly with GMV. At 45–50% gross margin, the unit
      economics are strong by marketplace standards. The path to profitability requires primarily OpEx discipline, not
      structural business model changes.
    claimRefs:
      - CI001
      - CI006
      - CI007
  - id: CL402
    type: risk
    severity: high
    title: No Audited Financials — Revenue and Margin Figures Are Analyst Estimates
    body: >
      All Whatnot financial figures in this chapter are analyst estimates derived from take-rate back-calculation on GMV
      estimates. The company has not publicly disclosed revenue, gross margin, operating expenses, or cash position. A
      formal diligence process requires access to audited financials as a gating condition. Any investment decision
      based on analyst estimates carries material downside risk from estimate inaccuracy.
    claimRefs:
      - CI017
      - CI018
      - CI019
