company:
  name: Whatnot
chapter:
  number: 4
  title: Financials
  summary: |
    Whatnot's revenue model centers on an 8% seller commission plus buyer processing and shipping fees,
    generating an estimated gross take rate of approximately 12% on GMV. Analyst estimates place 2024 GMV
    at approximately $3B and revenue at approximately $359M. The company's 2025 GMV is estimated at $6B+
    (100% growth year-over-year), implying 2025 revenue of approximately $720M+. Whatnot raised $995M total
    across Seed through Series F, with the Series F ($225M at $11.5B, October 2025) representing the most
    recent capital infusion. The company is not yet operating-income profitable on a consolidated basis, with
    international markets (Germany, UK) estimated to be materially negative on a unit-economic basis. Gross
    margin is estimated at 45–50% (strong for a marketplace) but operating expense intensity is significant
    given headcount of ~700 and ongoing international expansion costs. Capital adequacy appears adequate for
    12–18 months at current burn rates, but the path to profitability is not publicly disclosed.
sections:
  - id: s1
    title: Revenue Model and Monetization
    body: |
      Whatnot generates revenue from two primary sources:

      **1. Seller commission (primary):** 8% of every sale price paid by sellers. This is Whatnot's dominant
      revenue stream. For a $100 trading card sold via live auction, Whatnot earns $8. The commission rate
      has been consistent since 2021 with selective promotional periods (0% commission in certain seller
      categories or regions).

      **2. Buyer processing and shipping fees (secondary):** Whatnot charges buyers a payment processing fee
      (estimated ~2–3%) plus shipping. Some categories have flat shipping fees; others use seller-set rates.
      Total buyer-side fees are estimated to bring total take rate to approximately 12% of GMV.

      Revenue model nuances: (a) Some categories carry 0% commission during promotional periods used to
      attract new seller categories (vintage apparel launch, new international markets). (b) Whatnot is not
      a buyer of inventory — it operates a pure marketplace with no inventory risk. (c) Revenue grows
      linearly with GMV given fixed commission rate — there is no volume-based tier discount.

      The 8% commission is differentiated from eBay (12–15% total) and StockX (8–10% + fees), and roughly
      in line with TikTok Shop post-promotional at 6–8%. Whatnot's commission is significantly below the
      premium authentication marketplaces (GOAT, StockX) which serve different buyers.

      Analyst estimates for revenue: 2024E ~$359M (Sacra/Pitchbook); 2025E ~$720M+ (GMV-implied at 12%
      take rate on $6B GMV). These are analyst-derived, not company-disclosed.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
  - id: s2
    title: Unit Economics and Gross Margin
    body: |
      Whatnot's unit economics are characteristic of a marketplace business: high gross margin potential
      but significant operating expense investment required to sustain community and compete.

      **Gross margin:** Sacra estimates Whatnot's 2024 gross margin at approximately 45–50%. In a pure
      marketplace model, COGS includes payment processing costs (Stripe ~2.9% + $0.30 per transaction),
      fraud and chargeback costs, customer support, and hosting infrastructure. At ~$359M revenue and
      45–50% gross margin, gross profit is approximately $161–$180M in 2024.

      **Operating expenses:** Major expense categories include engineering (product development for iOS/
      Android apps, auction infrastructure, authentication systems), marketing (seller and buyer acquisition),
      operations (seller support, authentication review, customer service), and G&A. With ~700 employees,
      assuming an average all-in cost of ~$200K/employee, annual labor cost is approximately $140M —
      representing roughly 78% of gross profit. This leaves limited room for operating leverage without
      significant GMV scale-up.

      **International unit economics:** Germany and UK markets are estimated by analysts to be operating
      at significant per-market losses due to lower GMV density, higher local customer support costs, and
      EU VAT compliance overhead. These markets dilute consolidated unit economics.

      **CAC and payback:** Buyer CAC is not publicly disclosed. Analyst inference: strong organic
      community-driven buyer growth historically kept CAC low in the US collectibles market; expanding
      beyond the enthusiast community requires paid acquisition with materially higher CAC.

      **Path to profitability:** No public guidance. With GMV expected at $6B+ in 2025 and 45–50% gross
      margin, operating profitability requires operating expense discipline. The main variable is marketing
      spend — whether Whatnot accelerates buyer growth (cost) or harvests existing community (profit).
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
  - id: s3
    title: Capital Structure and Funding History
    body: |
      Total raised: approximately $995M across Seed (2020) through Series F (October 2025). Key rounds:

      - Seed (2020): $3.7M at ~$15M est. post-money (YC + Initialized Capital)
      - Series A (Apr 2021): $4M at ~$30M est. (YC Demo Day)
      - Series B (Jul 2021): $50M at $300M (Andreessen Horowitz)
      - Series C (Sep 2021): $150M at $1.5B (CapitalG + a16z)
      - Series D (Jul 2022): $260M at $3.7B (a16z)
      - Series E (Jan 2025): $265M at $5B (a16z + CapitalG co-led) — QUALIFYING UNICORN EVENT
      - Series F (Oct 2025): $225M at $11.5B (lead undisclosed; a16z and CapitalG participated)

      Preference stack: The $995M total raised represents the liquidation preference stack. At a $11.5B
      valuation, existing investors hold substantial paper gains, but the preference structure (likely
      1× non-participating preferred) means at an exit below $2–3B, common equity (founders, employees)
      would receive minimal proceeds. This creates material employee incentive alignment risk if the
      valuation does not hold.

      SEC Form D filings: Whatnot has filed Form D notifications for US-based fundraising as required.
      Series E and Series F Form D filings are publicly available through EDGAR — these confirm the
      existence of the raises but not valuation (which is in the investor agreements, not the Form D).

      Cash adequacy: At $995M total raised and estimated $300–400M cumulative spend (analyst estimate
      through 2024), Whatnot likely held $400–600M in cash/equivalents at Series E close (January 2025).
      The Series F ($225M, October 2025) extended this runway. Analyst estimates suggest 18–24 months of
      runway at current burn rates, though burn rate is not disclosed.
    claimRefs:
      - CI012
      - CI013
      - CI014
      - CI015
      - CI016
  - id: s4
    title: Revenue Quality, Gaps, and Financial Verdict
    body: |
      Revenue quality assessment: Whatnot's revenue is high quality for a marketplace — it is transactional,
      non-recurring at the individual transaction level but driven by highly recurring buyer and seller behavior.
      The top 1,000 sellers generating $100K–$2M+ annually are effectively annuity-like from a GMV
      standpoint. However, Whatnot lacks:

      (1) Recurring subscription revenue: No seller subscription fee; all revenue is volume-commission.
          Revenue would drop proportionally with GMV decline in a collectibles market downturn.
      (2) Enterprise/B2B revenue diversification: All revenue is consumer marketplace.
      (3) Advertising revenue: Whatnot does not appear to have a seller advertising/sponsorship product
          at scale — a significant missed monetization opportunity vs. eBay (Promoted Listings) and Amazon.

      Adverse financial indicators: The 2023 class-action lawsuit regarding unauthorized recurring charges
      resulted in a settlement (terms undisclosed). This raised questions about billing practice integrity
      and required Whatnot to revise its subscription billing system, potentially impacting revenue timing.

      Financial diligence gaps: No audited financial statements are publicly available. All revenue, GMV,
      and margin figures are analyst estimates. A diligence investor would require access to:
      — Actual GMV and revenue by quarter (2022–2026)
      — Gross margin and COGS breakdown
      — Operating expense detail by function
      — International P&L by market (US, Germany, UK)
      — Cash runway and burn rate as of latest quarter
      — Preference stack and anti-dilution provisions detail
    claimRefs:
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021
