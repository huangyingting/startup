summary:
  headline: >
    Whatnot 基本搭起了美国收藏品直播电商市场：$3B GMV、真实卖家社区、独特的 break room 产品、售前鉴定护城河都已经成形。但 Series F 估值 $11.5B、约为估算收入
    33×，新投资人几乎没有安全边际。基准退出情景（到 2027 年 GMV CAGR 25–35%，按收入 3–7× 退出）意味着 Series F 入场回报为负。估值重置、盈利时间表清晰，或 TikTok Shop
    美国监管结局改变风险收益前，维持观察。
