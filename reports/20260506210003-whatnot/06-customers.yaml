callouts:
  - id: CL601
    type: strength
    severity: high
    title: Seller Proof Points — Million-Dollar Annual Earners Create Aspirational Supply-Side Flywheel
    body: >
      Publicly documented cases of Whatnot sellers earning $1M–$5M+ annually serve as powerful aspirational proof points
      for new seller recruitment. Unlike eBay's anonymous marketplace model, Whatnot's named seller spotlight program
      creates a creator economy identity for top sellers — building seller loyalty and supply-side defensibility.
    claimRefs:
      - CU005
      - CU006
      - CU019
  - id: CL602
    type: risk
    severity: high
    title: Seller Concentration — Top 500 Sellers at Risk of Competitive Migration
    body: >
      The power-law distribution of GMV across sellers means Whatnot's top 500 sellers are critical commercial
      relationships. TikTok Shop and eBay Live have both made documented efforts to recruit top Whatnot sellers with
      lower take-rate deals. If even 10–20 top sellers migrate, Whatnot could lose meaningful GMV with buyers following
      their preferred sellers off platform.
    claimRefs:
      - CU007
      - CU008
      - CU009
