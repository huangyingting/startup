company:
  name: Whatnot
chapter:
  number: 7
  title: Risks
  summary: |
    Whatnot's principal risks are: (1) competitive — TikTok Shop's algorithmic distribution advantage and
    willingness to subsidize sellers with lower take rates could erode Whatnot's supply-side moat; (2)
    regulatory — FTC counterfeit enforcement, consumer protection actions, and California AG scrutiny of
    billing practices create meaningful compliance overhead; (3) operational — AWS infrastructure
    dependency, real-time streaming reliability at scale, and mobile app store platform risk represent
    technical single points of failure; (4) financial — Whatnot remains pre-profitability with significant
    burn; (5) market — collectibles market cyclicality directly impacts GMV, as demonstrated in the 2022
    post-bubble correction. The risk register is materially weighted toward execution risks (seller
    retention, competitive market) over regulatory or legal risks, reflecting the consumer marketplace
    rather than regulated financial services or healthcare model. The class-action billing lawsuit
    (settled 2024) and ongoing FTC attention to live commerce counterfeit are the most significant legal
    risks in the near term.
sections:
  - id: s1
    title: Competitive and Market Risks
    body: |
      **TikTok Shop — primary competitive threat:**
      TikTok Shop's algorithmic discovery engine exposes every new or mid-tier livestream to potentially
      millions of non-follower viewers, while Whatnot's follow-based model requires sellers to build
      their audience manually. TikTok's willingness to subsidize seller commission rates (reports of 0–2%
      vs Whatnot's ~8%) creates an economic incentive for seller migration. The risk is asymmetric: if
      TikTok builds sports card authentication capabilities, Whatnot's moat narrows significantly.
      However, TikTok faces its own US regulatory risk (forced divestiture threat) which could remove it
      from the competitive landscape or impair its US operations.

      **eBay Live and Amazon Live:**
      Both platforms have large existing buyer audiences and existing authentication programs. eBay's
      Authenticity Guarantee and established payment rails make it a credible live commerce alternative.
      However, both platforms have attempted live commerce features and failed to achieve Whatnot-level
      community engagement, suggesting that community depth — not feature parity — is the moat.

      **Collectibles market cyclicality:**
      The sports cards and Pokémon markets experienced significant price corrections in 2021–2022 following
      the COVID-era speculative bubble. Whatnot's GMV is directly correlated to collectibles market
      sentiment. In a renewed downturn, both seller supply (less reason to sell falling-value cards) and
      buyer demand (falling perceived value) would contract simultaneously. This double-exposure to
      cyclicality is a structural risk for a company dependent on GMV-tied take rate revenue.

      **New entrant risk:**
      A well-capitalized new entrant building specifically for live collectibles commerce (e.g., a
      purpose-built Chinese live commerce export, or a YouTube live commerce integration) could replicate
      Whatnot's product in 12–18 months. The primary barrier is community, not technology.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
  - id: s2
    title: Regulatory and Legal Risks
    body: |
      **FTC counterfeit and consumer protection enforcement:**
      The FTC issued warning letters to live commerce platforms in 2023 regarding counterfeit goods and
      deceptive practices. Whatnot expanded its authentication program in response, but the risk of a
      formal FTC enforcement action (civil penalty of up to $50,000 per violation) remains if counterfeit
      rates in live streams are deemed systematically deceptive. The Consumer Review Fairness Act (CRFA)
      and Restore Online Shoppers' Confidence Act (ROSCA) are applicable statutes.

      **California AG consumer protection — subscription billing:**
      The 2023 class-action lawsuit over Whatnot's subscription billing practices (unauthorized recurring
      charges) settled in 2024. However, the underlying legal exposure under California's Automatic
      Renewal Law (ARL, Bus. & Prof. Code §17600) remains a structural risk for any platform with
      subscription mechanics, even after settlement.

      **GDPR and EU digital marketplace regulation:**
      Whatnot's Germany and UK operations are subject to GDPR, the EU Digital Services Act (DSA), and
      UK Online Safety Act (OSA). DSA requires large marketplace compliance with transparency reporting,
      risk assessments for systemic risks, and content moderation obligations. The OSA applies to user-
      generated content services in the UK. As Whatnot's EU/UK user base grows, compliance costs scale.

      **Sales tax / marketplace facilitator compliance:**
      As a marketplace facilitator in 45+ US states, Whatnot is required to collect and remit sales tax
      on marketplace sales. Non-compliance or incomplete state-level filings create back-tax liability.
      International VAT compliance (EU VAT OSS, UK VAT) adds complexity as international GMV grows.

      **IP risk — counterfeit goods liability:**
      If Whatnot sells counterfeit goods through its platform and fails to implement adequate notice-and-
      takedown mechanisms, it could face contributory trademark infringement liability. The sports card
      authentication problem (fake PSA grades, doctored cards) is an ongoing risk that could expose
      Whatnot to trademark holder actions.
    claimRefs:
      - CR006
      - CR007
      - CR008
      - CR009
      - CR010
  - id: s3
    title: Operational, Financial, and Execution Risks
    body: |
      **AWS infrastructure dependency:**
      Whatnot's platform is hosted on AWS. A major AWS outage (as occurred in December 2021, impacting
      Netflix, Disney+, and thousands of services) would directly impair live streaming and auction
      reliability. Whatnot's business model — live video with real-time bidding — is particularly
      sensitive to latency and availability failures compared to asynchronous marketplaces. A 2-hour
      outage during peak stream time (weekend evening) could result in significant GMV loss.

      **Mobile app store platform risk:**
      Whatnot's mobile-only product makes it dependent on Apple App Store and Google Play for distribution.
      Apple's 15–30% in-app purchase fee applies to virtual goods; a policy change requiring IAP for
      seller subscriptions or premium features could meaningfully impact unit economics. De-listing risk
      (for content policy violations) is low probability but existential if it occurred.

      **Real-time bidding reliability at scale:**
      Live auction with thousands of concurrent bidders requires millisecond-level conflict resolution.
      System failures during high-value auctions (e.g., a 1990 rookie card selling for $5,000) could
      result in disputes, chargebacks, and seller/buyer trust damage. Scaling auction infrastructure
      as simultaneous streams grow is a non-trivial engineering challenge.

      **Burn rate and path to profitability:**
      Whatnot's last disclosed fundraise (Series F, February 2024, $260M) implies continued cash burn
      at scale. Based on estimated $350M+ revenue and typical consumer marketplace EBITDA margins at
      this scale (-15% to -25%), Whatnot's implied annual burn is $50M–$90M+. At this pace, the
      February 2024 raise provides approximately 3–5 years of runway (assuming no major capital events),
      but profitability timing remains uncertain without disclosed financials.

      **Seller key-person and supply concentration risk:**
      Whatnot's top 100 sellers likely drive ~15% of total platform GMV. If even 5–10 of these
      sellers migrate to TikTok Shop (which has reportedly offered guaranteed minimums and lower
      commission rates), Whatnot could lose disproportionate GMV in a short period. The absence
      of long-term exclusivity contracts (not publicly documented) makes this risk structurally real.
    claimRefs:
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
  - id: s4
    title: Partner and Dependency Risks
    body: |
      **Stripe payment processing dependency:**
      Whatnot uses Stripe as its primary payment processor. A Stripe service disruption, account
      termination (for ToS violations), or pricing change would directly impair the buyer payment
      flow and seller disbursements. While Stripe is extremely reliable, concentration in a single
      payment processor is a dependency risk that most mature marketplaces address through payment
      redundancy (fallback processor, backup acquirer).

      **PSA / BGS grading service dependency:**
      Whatnot's authentication program relies on third-party grading services (PSA, BGS, CGC) to
      certify card grades. A grading service scandal (PSA has had controversies about fake grades),
      capacity constraints, or pricing changes would undermine Whatnot's authentication moat. In 2021,
      PSA suspended new submissions for months due to backlogs — creating a market-wide authentication
      crisis that affected Whatnot directly.

      **Video streaming technology:**
      Whatnot's streaming stack (AWS IVS + proprietary) depends on AWS for core video infrastructure.
      Beyond general AWS reliability, AWS IVS pricing changes or service discontinuation (AWS regularly
      deprecates services) could require emergency infrastructure migration.

      **International expansion partner risk:**
      Germany and UK launches required local payment, legal, and operational setup. Whatnot's international
      growth is dependent on maintaining compliant local operations and adapting to local regulatory
      requirements. The EU's P2B Regulation (Platform-to-Business) requires marketplace transparency
      to business sellers, adding compliance overhead.

      **Key person risk — founder and leadership:**
      Whatnot's co-founders (Grant LaFontaine, Bobby Owner) remain active in leadership. The loss
      of founder leadership in a pre-profitability company at this stage of scaling is a moderate
      execution risk, particularly for culture, seller relationships, and product direction.
    claimRefs:
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
