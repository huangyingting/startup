callouts:
  - id: CL701
    type: risk
    severity: high
    title: TikTok Shop — Asymmetric Competitive Threat to Seller Supply
    body: >
      TikTok Shop represents the highest-probability competitive threat because its algorithmic discovery gives sellers
      access to a much larger non-follower audience, and its willingness to subsidize commission rates could trigger
      rational seller migration. If 50+ top Whatnot sellers migrate, the buyer communities they've built will follow
      them — creating a non-linear GMV decline risk.
    claimRefs:
      - CR001
      - CR002
      - CR003
  - id: CL702
    type: risk
    severity: medium
    title: FTC Enforcement Risk — Live Commerce Counterfeit Could Trigger Formal Action
    body: >
      The FTC's 2023 warning letters were a regulatory shot across the bow for live commerce platforms. If counterfeit
      goods continue to appear in live streams at scale and Whatnot's authentication program is deemed insufficient, a
      formal enforcement action could result in civil penalties, mandatory platform changes, and reputational damage
      that undermines buyer trust.
    claimRefs:
      - CR006
      - CR007
