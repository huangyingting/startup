callouts:
  - id: CL501
    type: strength
    severity: high
    title: Break Room Mechanics — Unique Platform Feature Driving Significant GMV
    body: >
      Whatnot's live card breaking mechanic (sealed pack opening with pre-sold slots) is a product innovation with no
      equivalent on any competitor platform. It drives a significant portion of trading card GMV and creates a
      category-specific stickiness that cannot be easily replicated by general-purpose live commerce platforms without
      dedicated product investment.
    claimRefs:
      - CE002
      - CE011
      - CE012
  - id: CL502
    type: risk
    severity: medium
    title: AWS and iOS/Android Dependency — Infrastructure and Distribution Concentration Risk
    body: >
      Whatnot's reliance on AWS for infrastructure and iOS/Android app stores for distribution creates two concentration
      risks: (1) AWS outages directly impact stream reliability; (2) App store policy changes (Apple 15–30% IAP cut,
      potential de-listing) could disrupt buyer and seller acquisition. Neither risk is unique to Whatnot, but both are
      relevant to technology resilience.
    claimRefs:
      - CE007
      - CE017
      - CE025
