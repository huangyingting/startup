callouts:
  - id: CL201
    type: strength
    severity: high
    title: Structural US Live Commerce Underpenetration — Sub-5% SAM Capture
    body: >
      US live commerce represents ~4% of e-commerce vs. 14–18% in China. Whatnot holds the #1 position in the
      highest-monetizable segment (enthusiast collectibles) with under 5% SAM penetration. China's precedent implies
      multi-fold GMV growth is structurally possible before market saturation.
    claimRefs:
      - CM001
      - CM002
      - CM005
  - id: CL202
    type: risk
    severity: high
    title: TikTok Shop Zero-Commission Entry Threatens Seller Supply Side
    body: >
      TikTok Shop's 2023 US launch with 0% seller commission (promotional) is the single biggest near-term market risk.
      Professional sellers driving 60–70% of Whatnot GMV are rational economic actors who will test TikTok if commission
      savings outweigh the audience rebuild cost.
    claimRefs:
      - CM020
      - CM021
      - CM013
