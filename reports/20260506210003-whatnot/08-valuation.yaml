callouts:
  - id: CL801
    type: risk
    severity: high
    title: Base Case Implies Negative Returns at Series F Valuation
    body: >
      At Whatnot's $11.5B Series F valuation, the most likely scenario (55% probability base case) implies negative
      returns of -30% to -70% if the company executes well but exits at marketplace comparables (3–7× revenue). Only the
      bull scenario (15% probability) generates positive returns from this entry price. This is an unfavorable
      risk/reward skew for Series F investors.
    claimRefs:
      - C269
      - C270
      - C271
  - id: CL802
    type: strength
    severity: medium
    title: Business Model is Proven — Wait for the Right Entry Price
    body: >
      Whatnot's $3B GMV, seller community proof points, and category expansion track record demonstrate a working
      business model. The TRACK recommendation is not a rejection of the business but a judgment that the current
      valuation is too high relative to risk-adjusted returns. A valuation reset below $7B or demonstrated profitability
      path would change the recommendation.
    claimRefs:
      - C260
      - C261
      - C262
