            title: Structural US Live Commerce Underpenetration — Sub-5% SAM Capture
            body: >
              US live commerce represents ~4% of e-commerce vs. 14–18% in China. Whatnot holds the #1 position in the
              highest-monetizable segment (enthusiast collectibles) with under 5% SAM penetration. China's precedent
              implies multi-fold GMV growth is structurally possible before market saturation.
