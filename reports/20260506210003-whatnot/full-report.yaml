  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: |
              Whatnot operates in "live commerce" — real-time video streams where sellers auction or flash-sell goods
              to a live audience. This format fuses entertainment with transaction, yielding higher engagement and
              conversion than static e-commerce.

              Primary: Live auction collectibles — trading cards (Pokémon, sports, MTG), sneakers, vintage apparel,
              comics, coins. Live auction is structurally superior to asynchronous eBay for categories where
              condition, authenticity, and social proof are priced in real-time. Estimated at $40–60B globally.

              Adjacent: General live commerce (TikTok Shop, Amazon Live). Whatnot expanded into vintage apparel in
              2024 but has not fully competed here. The broader US live commerce TAM (all categories) reaches
              $68B+ by 2026 per Coresight.

              Global context: China's Taobao Live, Douyin, and Pinduoduo drove $600B+ GMV in 2023. US live
              commerce is ~4% of e-commerce vs. 14–18% in China — deep structural underpenetration.

              Exclusions: Traditional auction houses (different price point), synchronous peer-to-peer marketplaces
              (StockX, GOAT), and wholesale B2B.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
      - number: '2.2'
        title: Market Sizing and Growth Drivers
        blocks:
          - type: paragraph
            body: |
              US live commerce estimates across major analyst firms:
              - Coresight Research (2024): US GMV $25B in 2023 → $68B by 2026 (CAGR ~40%)
              - McKinsey (2023): Global live commerce $500B–$1T by 2026
              - eMarketer (2024): US social commerce GMV $67B in 2023, +25% annually through 2027
              - Bain (2023): US live commerce $50–70B by 2026 if TikTok/YouTube/Facebook sustain investment
              - Bloomberg Intelligence (2024): US collectibles $30–40B; ~15–20% transacted via live auction

              Growth drivers: (1) PSA graded card submissions +35% YoY 2023 — collectibles secular growth;
              (2) shoppertainment: top sellers attract 50K–200K viewers, creating media-like stickiness;
              (3) creator economy: top 1,000 sellers earn $100K–$2M+ annually, primary income, very sticky;
              (4) mobile-first Gen Z/Millennial buyer cohort (60%+ of buyers under 35); (5) TikTok Shop's
              $20B US GMV in 2024 validates live commerce as real US category.

              Constraints: (1) TikTok Shop 0% commission promotional entry (2023–2024) threatens Whatnot's 8%
              take rate; (2) eBay Live and Amazon Live competing in collectibles; (3) collectibles cyclicality
              (Pokémon card bubble 2021, correction 2022, recovery 2023–2024); (4) FTC counterfeit warnings
              2023 create compliance overhead.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
              - CM011
              - CM012
      - number: '2.3'
        title: Buyer and Seller Segmentation
        blocks:
          - type: paragraph
            body: |
              Seller segments: (1) Professional resellers (25–35% of sellers, 60–70% of GMV): full-time, 3–7
              streams/week, $100K–$2M+ income — extremely sticky; (2) Small business sellers (40–50% of sellers,
              25–30% of GMV): part-time, cross-listed on eBay, medium stickiness; (3) Occasional sellers (<20%,
              <10% GMV): low retention.

              Buyer segments: (1) Active collectors (15–20% of buyers, ~60% of GMV): monthly-plus, high repeat;
              (2) Value hunters (30–40% of buyers, ~25% of GMV): price-sensitive, defection risk to TikTok Shop;
              (3) Community viewers (40–50% of registrants, <15% GMV): watch regularly, low monetary conversion.

              Geography: US 70–75% of GMV; Germany 15–18% (top non-US market, board games + Pokémon); UK 5–10%
              (sneakers, vintage); Canada + Australia ~5% combined. International expansion launched 2022–2023.
            claimRefs:
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
      - number: '2.4'
        title: Adoption Constraints and Competitive Dynamics
        blocks:
          - type: paragraph
            body: |
              Key structural constraints on US live commerce adoption: (1) US consumers psychologically separate
              entertainment from transactional commerce — live commerce habit formation is materially slower than
              in China where the two merged early via WeChat and Alibaba ecosystems; (2) TikTok Shop generated
              ~$20B US GMV in 2024 and entered collectibles categories in 2024, competing directly with Whatnot's
              core market; (3) eBay launched eBay Live in 2023 targeting Whatnot's collectibles seller base, with
              the incumbent advantage of 150M+ active buyers; (4) Amazon expanded Amazon Live affiliate programs
              in 2024, primarily in general merchandise adjacencies.

              Collectibles cyclicality is a recurring theme: the trading card market peaked in 2021 during COVID-
              driven hobby inflation, corrected sharply in 2022 (Pokémon card prices fell 40–70% from peak), and
              recovered through 2023–2024. Whatnot's GMV growth decelerated during the 2022 correction, demonstrating
              real exposure. Concentration in Pokémon and sports cards (~40–50% of Whatnot GMV) creates macro
              sensitivity that pure live commerce market growth numbers do not fully capture.

              International friction includes EU GDPR, UK Consumer Rights Act, local payment infrastructure
              requirements, VAT compliance across jurisdictions, and the cost of localized seller support teams.
              International unit economics are estimated sub-par versus the US. Buyer CAC for mainstream (non-
              collectibles) audiences is elevated; organic community has driven most acquisition to date, limiting
              total addressable buyer base growth without paid marketing investment.
            claimRefs:
              - CM020
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
