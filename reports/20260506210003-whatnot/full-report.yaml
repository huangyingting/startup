              All Whatnot financial figures in this chapter are analyst estimates derived from take-rate
              back-calculation on GMV estimates. The company has not publicly disclosed revenue, gross margin, operating
              expenses, or cash position. A formal diligence process requires access to audited financials as a gating
              condition. Any investment decision based on analyst estimates carries material downside risk from estimate
              inaccuracy.
