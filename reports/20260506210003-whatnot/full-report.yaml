            title: AWS and iOS/Android Dependency — Infrastructure and Distribution Concentration Risk
            body: >
              Whatnot's reliance on AWS for infrastructure and iOS/Android app stores for distribution creates two
              concentration risks: (1) AWS outages directly impact stream reliability; (2) App store policy changes
              (Apple 15–30% IAP cut, potential de-listing) could disrupt buyer and seller acquisition. Neither risk is
              unique to Whatnot, but both are relevant to technology resilience.
            calloutType: insight
