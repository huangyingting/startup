  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Buyer Profile
        blocks:
          - type: paragraph
            body: |
              Whatnot's buyer base is concentrated in passionate collector communities with high willingness to pay:

              **Primary buyer segment:** Adult collectors aged 18–35 (predominantly male), primarily in the
              United States. Key passion categories: sports cards (NFL, NBA, MLB, UFC), Pokémon cards, anime
              merchandise, vintage comics, sneakers, and fashion accessories. This demographic has high
              disposable income relative to age, strong community identity, and category expertise that enables
              rapid authentication of items.

              **Secondary buyer segment:** Gift buyers and casual collectors drawn in by specific sellers or
              categories. Lower average transaction value; lower repeat purchase rate. Less central to Whatnot's
              GMV but broader demographic breadth.

              **Geographic concentration:** Approximately 80%+ of GMV is US-based, with expanding German and
              UK buyer bases. Japan and other Asia-Pacific markets represent upside but are not yet served.

              **Estimated scale:** Whatnot has not disclosed active buyer count publicly. Based on reported $3B
              GMV in 2024 and estimated average transaction value of $50–100, this implies approximately 30–60M
              annual transactions and 800K–2M+ monthly active buyers (assuming 3–5 transactions per buyer per month).
              This is an analyst estimate with significant uncertainty.

              **Purchase behavior:** Live auction buyers exhibit high engagement metrics — average session watch
              time of 30–60 minutes per stream, with buyers often watching multiple sellers per session. Repeat
              purchase rates are high for core collector buyers who follow specific sellers.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: Seller Segmentation and Proof Points
        blocks:
          - type: paragraph
            body: |
              Whatnot's supply side (sellers) is the critical asset of the marketplace:

              **Professional sellers:** The top tier of Whatnot sellers treat it as a primary business, earning
              $1M–$5M+ annually on the platform. These sellers run daily or multiple-weekly streams, employ
              dedicated staff, and have purpose-built studio setups. Multiple public case studies confirm sellers
              generating $1M+ annual GMV on Whatnot. This success creates an aspirational proof point for the
              long tail of new sellers.

              **Semi-professional sellers:** Mid-tier sellers earning $50K–$500K annually on Whatnot as a
              primary or supplementary income source. This segment has grown significantly with Whatnot's creator
              economy positioning (seller tools, analytics, dedicated seller success team).

              **Hobbyist sellers:** Casual collectors selling surplus inventory. Lower GMV per seller, but
              important for category breadth and discovery. These sellers often become power buyers on adjacent
              categories.

              **Seller concentration risk:** The top 1,000–2,000 sellers on Whatnot likely drive 40–60% of
              total GMV — a concentration pattern common in creator economy platforms (YouTube: top 1% creators
              drive 90% of views). If a top-10 seller migrates to TikTok Shop or starts an independent channel,
              Whatnot loses meaningful GMV.

              **Seller acquisition channels:** Whatnot's seller acquisition combines outbound business development
              (targeting established card dealers, collectibles shop owners, and card grading submission services)
              with inbound seller applications from the collector community. A dedicated seller success team
              provides onboarding support for new high-potential sellers.
            claimRefs:
              - CU005
              - CU006
              - CU007
              - CU008
              - CU009
      - number: '6.3'
        title: Go-to-Market Strategy and Customer Acquisition
        blocks:
          - type: paragraph
            body: |
              **Category-by-category expansion:** Whatnot enters new collectibles categories by recruiting
              3–10 anchor sellers with existing community following in that category, building supply density
              before opening buyer acquisition. This supply-first approach — contrasting with DTC-style buyer
              acquisition — has been successfully used across sports cards (2019), Pokémon (2020), anime (2021),
              sneakers (2022), and fashion (2023). Category expansion is how Whatnot grows TAM organically
              without paid acquisition.

              **Seller-driven buyer acquisition:** Whatnot buyers are predominantly acquired through:
              (1) Sellers promoting their Whatnot streams on YouTube, Instagram, Twitter/X, and TikTok;
              (2) Seller notifications pushing existing followers to new streams;
              (3) Word-of-mouth within collector communities (Discord, Reddit, sports card forums).
              This is a low-CAC acquisition model — sellers are effectively Whatnot's marketing team.

              **Virality mechanics:** The "did you see that card pull?" viral moment from card breaks naturally
              propagates on social media. Top sellers clip and share live break reactions, which drive new buyer
              curiosity. This is organic virality that TikTok Shop's algorithm can amplify but also capture.

              **International expansion:** Whatnot launched in Germany (2022) and UK (2023), adapting its
              category focus to local collector preferences (German market: soccer cards, Lego; UK: Premier
              League cards). International GMV is growing but US remains dominant. Each new market requires
              category-specific seller recruitment, local payment methods, and customer support.

              **Paid acquisition:** Whatnot has selectively used paid social (Instagram, YouTube) for buyer
              acquisition campaigns, but the core GTM is community-led and seller-led. Paid acquisition
              efficiency relative to LTV is not publicly disclosed.
            claimRefs:
              - CU010
              - CU011
              - CU012
              - CU013
      - number: '6.4'
        title: Customer Retention, LTV, and Satisfaction Signals
        blocks:
          - type: paragraph
            body: |
              **Retention signals:** Whatnot's follow-based model (buyers follow specific sellers and receive
              push notifications when live) is a high-retention architecture. Buyers who follow 3+ sellers
              show significantly higher repeat purchase rates than one-time buyers. The platform's community
              depth — seller-buyer relationships, break room social bonds, chat community — creates social
              switching costs. However, these social bonds are to the seller, not to Whatnot; a top seller
              migrating to a new platform could take their buyer community.

              **NPS and satisfaction signals:** Whatnot has not published NPS data. App Store reviews
              are mixed — buyers generally rate the discovery experience positively, but there are recurring
              complaints about shipping delays, item condition disputes, and the subscription billing controversy
              (2023 class action). App Store rating is approximately 4.3–4.5/5 on iOS, which is above average
              for marketplace apps.

              **Adverse signal — customer complaints:** The 2023 class-action lawsuit alleged that Whatnot
              enrolled buyers in recurring subscription charges without adequate consent. This is a customer
              trust incident that damaged buyer satisfaction scores in that period. Post-settlement billing
              changes appear to have stabilized the situation.

              **Adverse signal — shipping issues:** Recurring App Store and consumer forum complaints about
              shipping delays, lost packages, and item condition misrepresentation suggest that the quality of
              the seller-shipped experience is inconsistent. Whatnot's 90-day dispute resolution window is
              longer than Amazon's return policy expectations.

              **LTV drivers:** Buyers in core collector categories (sports cards, Pokémon) exhibit high LTV:
              passionate collectors spend continuously as new card releases drive repeated purchase occasions.
              Seasonal events (Panini release dates, National Sports Collectors Convention) drive GMV spikes.
              LTV of casual buyers is much lower.
            claimRefs:
              - CU014
              - CU015
              - CU016
              - CU017
              - CU018
      - number: '6.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Seller Proof Points — Million-Dollar Annual Earners Create Aspirational Supply-Side Flywheel
            body: >
              Publicly documented cases of Whatnot sellers earning $1M–$5M+ annually serve as powerful aspirational
              proof points for new seller recruitment. Unlike eBay's anonymous marketplace model, Whatnot's named seller
              spotlight program creates a creator economy identity for top sellers — building seller loyalty and
              supply-side defensibility.
            calloutType: insight
            claimRefs:
              - CU005
              - CU006
              - CU019
          - type: callout
            title: Seller Concentration — Top 500 Sellers at Risk of Competitive Migration
            body: >
              The power-law distribution of GMV across sellers means Whatnot's top 500 sellers are critical commercial
              relationships. TikTok Shop and eBay Live have both made documented efforts to recruit top Whatnot sellers
              with lower take-rate deals. If even 10–20 top sellers migrate, Whatnot could lose meaningful GMV with
              buyers following their preferred sellers off platform.
            calloutType: insight
            claimRefs:
              - CU007
              - CU008
              - CU009
          - type: table
            tableRef: TU001
            claimRefs:
