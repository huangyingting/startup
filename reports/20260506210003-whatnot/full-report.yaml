    title: Whatnot Product Architecture Stack
    type: stack
    layout: standard
    summary: >
      Layered stack diagram showing Whatnot's product architecture from user-facing mobile apps through real-time
      infrastructure to data and compliance layers.
    data:
      layers:
        - label: 'User Layer: iOS + Android Native Apps (Swift / Kotlin)'
          detail: Mobile-native applications for buyers and sellers; no primary web marketplace product
        - label: 'Product Layer: Live Auction, Break Room, Seller Tools, Community Features'
          detail: >-
            Core product modules: live auction engine, break room slot management, seller analytics, buyer community
            features and follower/notification system
        - label: 'Transaction Layer: Real-time Bidding Engine + Stripe Payments + Shipping'
          detail: >-
            Custom WebSocket-based auction state machine, Stripe payment processing, Apple Pay / Google Pay, shipping
            consolidation (buyer bin)
        - label: 'Streaming Layer: AWS IVS + Proprietary Low-Latency Protocol + CDN'
          detail: >-
            Sub-2-second stream latency combining AWS Interactive Video Service with proprietary low-latency protocols;
            CDN for global video delivery
        - label: 'Data Layer: PostgreSQL + Redis + Kafka + Fraud Detection ML'
          detail: >-
            PostgreSQL primary database, Redis for caching and real-time auction state, Kafka for event streaming, ML
            models for fraud detection and recommendations
        - label: 'Infrastructure Layer: AWS Microservices + Kubernetes + Cloudflare'
          detail: >-
            AWS-hosted microservices with Kubernetes container orchestration; Cloudflare or equivalent for CDN and DDoS
            protection
        - label: 'Trust Layer: Authentication Program + Content Moderation + Compliance (GDPR, CCPA)'
          detail: >-
            Graded card authentication badges, seller identity verification, automated + human content moderation,
            GDPR/UK GDPR/CCPA compliance controls
    approximationNotes: >-
      Stack inferred from engineering blog posts, job descriptions, and press reports. Whatnot has not published an
      official architecture diagram.
