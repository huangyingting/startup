              - CO010
      - number: '1.4'
        title: Key Milestones and Traction
        blocks:
          - type: paragraph
            body: >
              Whatnot's growth trajectory shows accelerating scale from 2021 through 2025:


              **2019:** Founded; initial focus on Pokémon cards; 2 founders, no revenue.

              **2020:** Pivoted to livestream auctions during COVID lockdowns; $3.7M seed; first sellers onboarded.

              **2021:** Y Combinator W21; Series B ($50M, $300M val); Series C ($150M, $1.5B val); expanded beyond
              Pokémon cards to sports cards, sneakers.

              **2022:** Series D ($260M, $3.7B val); expanded to UK and Germany; GMV $1.5B (est.); ~350 employees.

              **2023:** Launched Canada and Australia; added vintage clothing category; GMV ~$2B (est.); first signs of
              profitability in core US card market.

              **2024:** GMV ~$3B; revenue ~$359M; launched Whatnot Studios (creator program); 680+ employees; Series E
              planning begins.

              **2025 (Jan):** Series E $265M at $5B valuation — qualifying unicorn evidence.

              **2025 (Oct):** Series F $225M at $11.5B valuation; GMV >$6B (est.); ~700 employees.


              Adverse events: Class-action lawsuit filed 2023 regarding unauthorized recurring charges (settled

              2024 for undisclosed amount). FTC warning letters sent to live commerce platforms in 2023 regarding

              counterfeit goods in collectibles marketplaces — Whatnot implemented authentication programs

              in response.
