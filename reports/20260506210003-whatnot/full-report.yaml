        - Exit position or decline further investment
      - - Top seller migration
        - '>5 top-50 sellers depart to TikTok Shop / eBay per quarter'
        - Supply-side moat erosion; buyer follows seller
        - Immediate thesis re-evaluation; monitor seller count weekly
      - - FTC formal enforcement action
        - CID or complaint filed against Whatnot for counterfeit/deception
        - Trust damage; remediation costs; GMV impairment
        - Legal risk budget revision; exit if penalty material
      - - Down round financing
        - Series G at valuation below $8B
        - Confirms base/bear case; major dilution to Series F
        - Portfolio mark-down; reconsider position
      - - Collectibles market crash (>30% price decline)
        - PSA/sports card index declines >30% YoY
        - GMV correlated decline; buyer demand falls
        - GMV modeling revision; contingency planning
      - - Profitability timeline >5 years
        - No path to EBITDA break-even before 2029 visible
        - Cash runway risk; raises required; dilution
        - Revisit financing assumptions
    notes: Kill triggers are analyst-suggested monitoring thresholds, not Whatnot internal policy.
    claimRefs:
      - CV015
      - CV016
      - CV017
      - CV020
  - id: TV006
