  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Core Workflow
        blocks:
          - type: paragraph
            body: |
              Whatnot's product is a mobile marketplace where sellers conduct live video auction streams and buyers
              bid in real time. The core user workflows:

              **Seller workflow:** Create a stream schedule → go live on iOS/Android → list items during stream
              (price + auction timer) → viewers bid → highest bidder wins → Whatnot processes payment → seller ships
              item. Sellers can also do "buy it now" (fixed price with limited quantity) and "breaks" (selling
              slots in sealed pack-opening sessions).

              **Break mechanics:** Sellers open sealed trading card packs live on camera. Buyers purchase "slots"
              (tied to specific teams, positions, or random allocation) and receive cards corresponding to their
              slot. This mechanic drives significant GMV in the sports card category — a format unique to live
              commerce that cannot be replicated in static listings.

              **Buyer workflow:** Browse by category/seller → follow favorite sellers → receive push notifications
              when sellers go live → watch stream → bid with single tap → card stored for shipping consolidation.
              Buyers can "bin" multiple wins from a session and ship together to reduce shipping cost.

              **Community features:** Sellers maintain follower bases with subscriber-only deals, seller "stacks"
              (curated multi-item lots), and direct chat. Community features are central to Whatnot's differentiation
              from eBay and TikTok Shop.

              **Scale benchmarks:** Platform reportedly handles 10,000+ concurrent live streams at peak; individual
              top sellers draw 50,000–200,000 concurrent viewers per session. These numbers reflect significant
              real-time infrastructure requirements.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
      - number: '5.2'
        title: Technology Architecture and Stack
        blocks:
          - type: paragraph
            body: |
              Whatnot's technology stack is inferred from engineering blog posts, job descriptions, and developer
              conference presentations (no full disclosure):

              **Mobile applications:** iOS (Swift) and Android (Kotlin) native applications. No primary web
              marketplace product — all buying and selling is mobile-native. This is a deliberate product
              decision to optimize for real-time video engagement on mobile.

              **Video streaming infrastructure:** Whatnot uses a hybrid approach combining cloud video streaming
              services with proprietary low-latency protocols to achieve the <2-second stream delay required for
              live bidding. Job postings reference AWS IVS (Interactive Video Service) as a component. CDN
              delivery via Cloudflare or similar for global distribution.

              **Real-time bidding system:** Custom-built bidding engine using WebSocket connections for real-time
              bid updates. The system must handle concurrent bid submissions across thousands of viewers with
              millisecond conflict resolution. Whatnot's engineering blog references custom auction state machines.

              **Payments:** Stripe as primary payment processor. Whatnot stores payment methods (cards, Apple Pay,
              Google Pay) and charges buyers asynchronously post-win. Payment retry logic and fraud detection
              are internal Whatnot builds layered on Stripe.

              **Backend infrastructure:** AWS-hosted microservices architecture. Whatnot's engineering team
              references PostgreSQL (primary database), Redis (caching, real-time state), and Kafka (event
              streaming for bids, views, analytics). Kubernetes for container orchestration.

              **Data and analytics:** Whatnot collects bidding behavior, watch time, purchase conversion, and
              seller performance metrics. Seller analytics dashboard is a product feature. Machine learning
              for fraud detection and recommendation (which streams to show users).
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
      - number: '5.3'
        title: Differentiation, IP, and Technical Moat
        blocks:
          - type: paragraph
            body: |
              Whatnot's technical differentiation is primarily in operational know-how rather than formal IP:

              **Break mechanic platform:** The live card break workflow — slot management, team/position allocation,
              automated card scanning and attribution, and break room community tools — is a purpose-built product
              that took years to develop. No public patents; trade-secret operational IP. TikTok Shop cannot easily
              replicate this feature without significant platform investment.

              **Authentication integration:** The graded card verification workflow (seller submits PSA/BGS grade,
              Whatnot verifies, card receives authenticated badge) is integrated into the listing and auction flow.
              eBay's Authenticity Guarantee requires submission after sale; Whatnot's is pre-sale listing verified,
              which is a superior buyer trust UX.

              **Seller tools:** Stream scheduling, multi-item auction queues, seller analytics (views, conversion,
              earnings), and inventory management are differentiating tools that make Whatnot a seller business
              platform, not just a sales channel.

              **Fraud detection:** Whatnot's fraud ML models for detecting shill bidding, counterfeit submissions,
              and payment fraud are an operational asset that has been developed over the platform's 5-year
              operational history.

              **Network data:** Bidding behavior, price discovery patterns, and community engagement data constitute
              a proprietary dataset for market intelligence and personalization that competitors would need years
              to replicate.
            claimRefs:
              - CE011
              - CE012
              - CE013
              - CE014
      - number: '5.4'
        title: Trust, Safety, Compliance, and Roadmap
        blocks:
          - type: paragraph
            body: |
              **Authentication and trust program:** Whatnot requires sellers to verify identity before selling.
              High-volume sellers undergo enhanced verification. The graded card authentication badge is awarded
              to listings where the seller provides evidence of PSA/BGS/CGC grading. This program was expanded
              in 2023 following FTC warning letters on live commerce counterfeit goods.

              **Safety:** Whatnot moderates live streams using a combination of automated content moderation and
              human review. Sellers found to be misrepresenting items or engaging in deceptive auction tactics
              (shill bidding, fake bids) face suspension. The 2023 class-action regarding unauthorized recurring
              charges resulted in revisions to the subscription billing system.

              **Privacy and compliance:** As a US-incorporated company with operations in the EU (Germany) and UK,
              Whatnot is subject to GDPR, UK GDPR, and California CCPA/CPRA. A privacy policy covering these
              jurisdictions is publicly available. Compliance overhead has scaled with international expansion.

              **Technical reliability:** No major outages are publicly documented, though individual seller streams
              occasionally experience buffering or connection drops. The platform's dependency on AWS creates
              concentration risk; major AWS outages would impact stream reliability globally.

              **Roadmap signals:** Based on engineering job postings (2024–2025), Whatnot is investing in:
              (1) AI-powered stream recommendations; (2) improved seller discovery for new buyers; (3) augmented
              reality product viewing; (4) expanded break room tooling; and (5) international payment methods
              (SEPA direct debit for Germany, Open Banking for UK).
            claimRefs:
              - CE015
              - CE016
              - CE017
              - CE018
              - CE019
      - number: '5.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Break Room Mechanics — Unique Platform Feature Driving Significant GMV
            body: >
              Whatnot's live card breaking mechanic (sealed pack opening with pre-sold slots) is a product innovation
              with no equivalent on any competitor platform. It drives a significant portion of trading card GMV and
              creates a category-specific stickiness that cannot be easily replicated by general-purpose live commerce
              platforms without dedicated product investment.
            calloutType: insight
