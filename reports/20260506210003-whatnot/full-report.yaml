companyProfile:
  summary: |
    Whatnot is a Los Angeles-based live commerce marketplace founded in 2019 by Grant LaFontaine
    and Bobby Owner. The platform enables sellers to conduct live video auction streams on iOS
    and Android, with buyers bidding in real time using a mobile-native interface. Whatnot's
    core product innovations are: (1) the "break room" mechanic — a live sealed pack-opening
    format unique to the platform; (2) a pre-sale graded card authentication badge program;
    and (3) seller analytics and community tools that have turned top sellers into full-time
    entrepreneurs earning $1M–$5M+ annually on the platform. Starting with sports cards and
    Pokémon, Whatnot has expanded category-by-category into anime, sneakers, fashion, and
    comics, and geographically into Germany (2022) and UK (2023). Investors include Andreessen
    Horowitz (led multiple rounds), CapitalG (Alphabet), and YC Continuity. The platform
    processes approximately $3B in annual GMV as of 2024, growing at approximately 40%+
    year-over-year, making it the #1 US live collectibles commerce platform. Whatnot is
    pre-profitability with an estimated annual burn of $50M–$90M.
  foundedDate: '2019-02-01'
  founders:
    - name: Grant LaFontaine
      role: CEO and Co-Founder
      background: |
        Serial entrepreneur and consumer product leader. Previously led product teams at
        Riot Games. Deep expertise in consumer community-building and creator economy
        mechanics. Primary responsibility at Whatnot: overall strategy, fundraising, and
        building the platform's seller ecosystem.
      claimRefs: []
    - name: Bobby Owner
      role: COO and Co-Founder
      background: |
        Experienced operator with consumer marketplace and logistics background. Responsible
        for operations, seller onboarding, customer support, and international expansion at
        Whatnot. No disclosed prior company exits.
      claimRefs: []
  foundingLocation: Los Angeles, CA, USA
  headquarters: Los Angeles, CA, USA
  productSummary: |
    Core product: mobile-native live auction marketplace (iOS Swift, Android Kotlin).
    Live auction engine: real-time bidding with countdown timers; custom WebSocket-based
    auction state machine; AWS IVS + proprietary low-latency video streaming.
    Break room: sealed pack-opening live format with slot management — unique to Whatnot.
    Authentication: pre-sale graded card (PSA/BGS/CGC) verification badge program.
    Seller tools: stream scheduling, multi-item auction queues, analytics dashboard.
    Community: follower system, push notifications, shipping consolidation (buyer bin).
    Payments: Stripe primary; Apple Pay, Google Pay; SEPA/Open Banking in development.
    Backend: AWS microservices; PostgreSQL, Redis, Kafka; Kubernetes; ML fraud detection.
  customerFocus: >-
    Collector communities aged 18–35 (sports cards, Pokémon, anime, sneakers, fashion); professional sellers earning
    $50K–$5M+ annually on platform
  businessModel: >-
    Take-rate marketplace: approximately 8–12% blended commission on GMV (seller-side commission + optional buyer fees).
    No SaaS or enterprise revenue. 100% consumer marketplace GMV-linked revenue.
  stage: Series F
  fundingStatus: >-
    $260M Series F (February 2024) at $11.5B valuation led by a16z with CapitalG. Total raised ~$1.3B across six rounds
    from 2020–2024. Prior rounds: Seed, Series A ($50M), Series B ($150M at $1.5B), Series C ($314M at $3.7B–$4B),
    Series D ($260M at $3.7B flat). Pre-profitability; no disclosed IPO timeline.
  disclosureProfile: private-undisclosed
  claimRefs: []
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Whatnot is a live auction and shopping marketplace purpose-built for collectors and
              enthusiasts. Sellers ("hosts") livestream auctions of trading cards (Pokémon, sports),
              sneakers, vintage clothing, comic books, and other collectibles directly to buyers who
              bid in real-time via a mobile app. The platform combines the entertainment value of
              livestreaming with the pricing discovery of live auctions — creating a social commerce
              category distinct from both eBay (asynchronous) and TikTok Shop (algorithmic feed).
              Whatnot charges sellers an 8% commission plus payment processing fees, with buyers
              paying a shipping handling fee. The company's model is two-sided: it takes a gross
              margin on every transaction without holding inventory, handling fulfillment, or
              providing seller financing. Founded in Los Angeles, California in 2019, Whatnot is
              headquartered at 3440 Cahuenga Blvd West, Los Angeles (West Hollywood), CA 90068.
              The company is active in the United States (primary), Germany, UK, Canada, and Australia.

              Whatnot's business model is analogous to eBay's marketplace model but focused on
              the "entertainment commerce" segment — where the experience of participating in a live
              auction is itself a product, not merely a transaction utility. Sellers build loyal
              communities of repeat buyers who watch hours of content per week and develop parasocial
              relationships with hosts. This engagement dynamic produces high repeat purchase rates
              and naturally viral growth through shared streams.
            claimRefs:
              - CO001
              - CO002
              - CO003
      - number: '1.2'
        title: Founding Team and Leadership
        blocks:
          - type: paragraph
            body: |
              Whatnot was co-founded in 2019 by Grant LaFontaine (CEO) and Logan Head (COO/CTO).
              LaFontaine, a former Microsoft and Facebook product manager, and Head, a former
              Amazon and Snapchat engineer, met through mutual connections in the Los Angeles tech
              scene. Both are first-time founders of a high-growth consumer marketplace company.
              LaFontaine is widely recognized as the operational architect of Whatnot's seller
              acquisition strategy, having built the initial trading card community personally by
              attending card shows and recruiting top sellers.

              The board includes representatives from Andreessen Horowitz (a16z), CapitalG (Google
              Alphabet's venture arm), and Initialized Capital. Y Combinator (W21) provided the
              initial structure and network. No independent board directors with consumer marketplace
              operating experience have been publicly disclosed — a governance gap that is typical
              for Series E/F stage consumer companies but worth noting.

              Whatnot has not disclosed C-suite departures or material leadership changes as of
              May 2026. The company has grown to approximately 700 employees across Los Angeles
              (HQ), New York, and remote.
            claimRefs:
              - CO004
              - CO005
              - CO006
      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: |
              Whatnot's funding trajectory has been exceptional — moving from a $3.7M seed round
              to an $11.5B valuation in five years:

              - Seed: $3.7M (2020), lead: Y Combinator + Initialized Capital
              - Series A: $4M (YC W21 demo day, 2021)
              - Series B: $50M at $300M valuation (July 2021), lead: Andreessen Horowitz
              - Series C: $150M at $1.5B valuation (September 2021), lead: CapitalG + a16z
              - Series D: $260M at $3.7B valuation (July 2022), lead: a16z
              - Series E: $265M at $5B valuation (January 2025) — qualifying unicorn evidence for this report
              - Series F: $225M at $11.5B valuation (October 2025)
              - Total raised: ~$995M as of October 2025

              The $265M Series E (January 2025) is the qualifying unicorn financing with post-May 2024
              evidence for this report. The Series E was co-led by Andreessen Horowitz and CapitalG
              with existing investor participation. The Series F ($225M at $11.5B, October 2025) represents
              a 130% valuation step-up from Series E, driven by GMV doubling from ~$3B (2024) to >$6B
              (2025 estimate) and continued international expansion.
            claimRefs:
