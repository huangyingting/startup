  title: Disclosure gaps create a concentration shadow
  body: Customer count, retention, NPS and top-10 concentration are all undisclosed. In the European mid-market norm, prudent
    diligence assumes top-10 customers contribute >40% of revenue. This concentration shadow is the largest customer-side
    diligence ask.
