chapter:
  number: 6
  title: Customers
  summary: 'Forto''s customer base is mid-market European shippers across automotive, retail, industrial and consumer-goods
    verticals, with publicly anchored named customers including Home24, Develey, Berner SE and Westwing. Vertical mix leans
    retail/consumer goods, geographic mix leans DACH. The journey runs from online quote through repeat booking to module
    attach (customs, CO2) and embedded financial services on roadmap. Public review footprint is thin, retention/NPS/customer-count
    are undisclosed and concentration risk should be assumed material in absence of disclosure. Adverse employee-review and
    2024 restructuring signals make service-team capacity a watchpoint. Highest-priority customer-diligence asks: top-10 revenue
    concentration, gross/net retention, NPS, win/loss and churn cohorts.'
sections:
- id: s1
  title: Customer segmentation and named proof
  body: 'Forto''s customer base is mid-market European shippers across automotive, retail, industrial and consumer-goods verticals.
    Forto publishes a curated set of named case studies on its customers and case-studies pages, anchoring named-customer
    proof for diligence. Named customers visible in public materials include Home24, Develey, Berner SE and Westwing alongside
    additional retail and industrial brands. Customer success blog posts highlight workflow integration, customs depth and
    CO2 reporting as the primary value-realisation themes. Vertical concentration leans toward retail/e-commerce and consumer
    goods, with growing automotive and industrial penetration. Geographic concentration is DACH-heavy with selective expansion
    into rest of Europe and Asia trade lanes. Industry pages (automotive, retail, industrial, consumer goods) double as buyer
    education and customer-proof anchoring. The breadth claim is partly consistent with the named set: cases span retail (Westwing,
    Home24), industrial (Berner SE) and food/consumer goods (Develey), but heaviest density remains in retail/consumer goods.'
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU010
  - CU011
  - CU021
  - CU027
  - CU028
  tableRefs:
  - TU001
  - TU003
  figureRefs: []
- id: s2
  title: Adoption journey and growth trajectory
  body: The customer journey runs from awareness via search/content through online quote to first booking, repeat booking,
    expansion across modes/lanes and finally embedded customs and CSRD-ready emissions reporting. The funnel from quote-request
    to first booking and to repeat user is not publicly disclosed; modeled funnel uses industry benchmarks. Customer growth
    post-2024 restructuring shifted toward existing-customer expansion versus aggressive new-logo acquisition. LinkedIn follower
    count and post engagement remain the primary public proxies for customer-base scale and growth in the absence of disclosed
    customer counts. Public customer count is not disclosed; press estimates have ranged historically from the low thousands
    of shippers to a few thousand active accounts. Sales motion is mixed inbound (online quote) plus outbound enterprise sales
    for larger accounts; pure self-serve is not the dominant motion for material accounts. Onboarding is guided for material
    accounts (ERP/EDI integration); self-serve onboarding is offered but not documented in detail publicly.
  claimRefs:
  - CU008
  - CU009
  - CU012
  - CU013
  - CU014
  - CU022
  - CU023
  - CU031
  tableRefs:
  - TU002
  figureRefs:
  - FU001
  - FU002
- id: s3
  title: Retention, satisfaction and review footprint
  body: 'G2/Capterra public review counts for Forto are thin (single-digit reviews), reflecting B2B procurement reality more
    than dissatisfaction; Trustpilot coverage is limited and skewed toward inbound consumer-style queries rather than enterprise
    shipper sentiment. Public review platforms underweight enterprise B2B sentiment in general; review counts here should
    not be read as quality signals on their own. NPS is not publicly disclosed by Forto; competitive benchmarks (Flexport,
    traditional forwarders) sit in the 20-40 range industry-wide. Retention/repeat-usage benchmarks for digital forwarders
    sit at roughly 60-80% annual gross retention by shipper count for mid-market accounts; Forto-specific numbers are not
    disclosed. Adverse: Kununu and Glassdoor employee reviews flag pace of change and restructuring, an indirect signal on
    customer-facing service stability. Employee-review concerns about service-team workload may translate into elongated response
    times for shipper queries during peak. The customer-success blog repeatedly references the same logos across multiple
    posts, a weak signal for retained accounts.'
  claimRefs:
  - CU005
  - CU006
  - CU007
  - CU016
  - CU017
  - CU020
  - CU025
  - CU034
  tableRefs:
  - TU004
  figureRefs:
  - FU004
- id: s4
  title: Concentration risk and expansion vectors
  body: 'Customer concentration risk is high in the absence of disclosure: top customers are not publicly named in revenue
    terms and the absence of disclosure is itself a diligence gap. Prudent diligence assumes top-10 customers contribute >40%
    of revenue, the European mid-market norm. Expansion vectors per existing customer are: additional trade lanes, additional
    modes (ocean→air, air→road), additional modules (customs, sustainability) and embedded financial services. Verticalization
    plays into customer LTV: industrial/automotive shippers carry larger and more recurring volumes than e-commerce. Sustainability/CO2
    reporting is increasingly cited as a procurement gating requirement by mid-market shippers, advantaging Forto''s CSRD-ready
    stack. The customer base benefits from German Mittelstand exporter density — a structural moat for the DACH-anchored business.
    Customer growth and adoption trajectory is not publicly broken out in user counts or shipment counts on a periodic basis.
    Highest-priority customer-diligence asks: top-10 customer revenue concentration, gross/net retention, NPS, win/loss, churn
    cohort. Each of these data-room items would meaningfully tighten the implied valuation range and shift posture toward
    deal-stage engagement if the disclosed numbers prove healthier than the prudent baseline assumed in this report.'
  claimRefs:
