  title: Multi-vertical claim is partly evidenced
  body: Public case studies span retail, consumer goods and industrial verticals, supporting the multi-vertical applicability
    claim. However, density remains heaviest in retail/consumer goods; the breadth claim is partly consistent with the named-customer
    set rather than fully evidenced.
