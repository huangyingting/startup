callouts:
- calloutType: risk
  title: Asset-light status removes the margin floor
  body: In a sustained low-rate environment, asset-light forwarders compete on commodity service to thin margins. Forto's
    structural defense rests on cross-sell attach and data flywheel — neither is yet publicly demonstrated.
  claimRefs:
  - CP019
  - CP028
- calloutType: insight
  title: DSV integration distraction is a window, not a moat
  body: The 2025-2027 DSV+DB Schenker integration creates an 18-24 month execution window for digital natives. Capturing displaced
    mid-market accounts is the highest-conviction near-term offensive play.
  claimRefs:
  - CP035
- calloutType: risk
  title: Convoy is the relevant cautionary tale, not Flexport
  body: Convoy's failure mode (low-margin spot-broker collapse on rate normalization) is structurally closer to Forto's risk
    profile than Flexport's leadership turbulence. Underwriting must address Convoy-pattern outcomes.
  claimRefs:
  - CP004
  - CP034
