summary:
  headline: |
    2026 年放弃但保持观察：2024 年重组阴影、未披露的留存 /
    集中度指标，以及 FortoLabs 生产落地范围不确定，压过了
    多垂直行业覆盖和 CSRD/CBAM 顺风；只有下一轮披露或增值融资事件，
    才能触发交易阶段推进。
