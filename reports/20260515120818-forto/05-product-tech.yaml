chapter:
  number: 5
  title: Product & Technology
  summary: Forto's product is an integrated digital freight forwarder platform — quote, book, customs (ATLAS), visibility,
    sustainability and emerging FortoLabs AI overlay — sold to mid-market European shippers. Architecture is a TMS-pattern
    web SaaS hosted on AWS EKS with PostgreSQL, Kafka and a TypeScript/Node.js stack reported through community profiles.
    Critical dependencies include AWS, ATLAS, partner visibility platforms (project44/Shippeo/CargoSnap class) and carrier
    EDI/API endpoints. Differentiation is the integrated UX rather than an algorithmic moat. Trust artifacts (ISO 27001 listing,
    status page, DPA wording, security white paper) are publicly thin and FortoLabs production scope is not separately disclosed;
    these are the highest-priority technical-diligence asks.
sections:
- id: s1
  title: Product definition and module map
  body: Forto's product is a digital freight forwarder platform that delivers ocean, air and road forwarding alongside customs
    declarations and shipment visibility through one integrated workflow targeted at mid-market European shippers. The Forto
    Logistics Platform exposes per-shipment quote, book, document and tracking modules under a single web-first interface;
    the modules are bundled rather than sold a la carte and the buyer experience is oriented around the supply-chain manager
    rather than a procurement RFP. Customs is delivered through ATLAS-integrated declarations for German imports and exports,
    with CBAM reporting positioned as a 2026 add-on. Shipment visibility is embedded rather than standalone, sourced from
    a mix of carrier EDI feeds and partner platforms in the project44/Shippeo class. Sustainability/CO2 reporting is offered
    as a per-shipment emissions calculation tied into the booking flow and is the headline FortoLabs growth lever for 2026.
    The integrated bundling means individual module unbundling is not currently a customer-facing pricing lever, with implications
    for upsell motion and embedded-finance attach.
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE004
  - CE005
  - CE021
  - CE027
  tableRefs:
  - TE001
  figureRefs: []
- id: s2
  title: Operating architecture and stack
  body: 'Architecturally the platform follows a transportation-management-system pattern: a quote engine, booking workflow,
    document repository, tracking/visibility surface and reporting layer sit on top of a relational core, with integration
    adapters reaching into carrier EDI/API endpoints and the German customs ATLAS system. AWS case-study material cites Forto
    as an AWS-hosted customer using EKS and managed services. StackShare and LinkedIn job-post signals are consistent with
    a TypeScript/Node.js + React front-end, PostgreSQL data tier, Kafka eventing and Kubernetes orchestration — typical of
    a Berlin-grown B2B SaaS — though depth claims should be treated as third-party-reported rather than primary. Forto exposes
    a public API and integration documentation aimed at shipper ERP/TMS integration; rate limits, latency SLAs and webhook
    delivery guarantees are not in the public product documentation. The internal data model centers on Shipment, Booking,
    Document, Quote, Customer and Carrier entities, the standard TMS schema.'
  claimRefs:
  - CE006
  - CE008
  - CE009
  - CE010
  - CE012
  - CE022
  - CE026
  - CE028
  tableRefs:
  - TE003
  figureRefs:
  - FE001
- id: s3
  title: Trust, compliance and dependencies
  body: Reliability/uptime SLA targets and historical incident data are not publicly disclosed and the status page is not
    publicly indexed; this is one of the more material technical-diligence gaps. ISO 27001 certification scope and current
    status for Forto Logistics is not publicly listed in the ISO catalogue search, so the certification claim requires direct
    evidence. GDPR compliance is mandatory for EU-resident data and Forto operates fully within that perimeter, but the specific
    shipper-facing DPA wording is not publicly published. Critical external dependencies include AWS for cloud, ATLAS for
    German customs, partner visibility platforms (project44 / Shippeo / CargoSnap class) for milestone data, and ocean / air
    / road carrier EDI/API endpoints for capacity. Trust/security posture is not separately indexed on forto.com and a security
    white paper is not publicly downloadable.
  claimRefs:
  - CE011
  - CE015
  - CE016
  - CE017
  - CE018
  - CE019
  - CE025
  - CE029
  tableRefs:
  - TE004
  figureRefs:
  - FE003
- id: s4
  title: Roadmap, FortoLabs maturity and diligence asks
  body: 'FortoLabs is the company-claimed AI overlay across the platform — pricing assistance, document classification and
    predictive ETA — but production-grade features are not separately disclosed and conflicting signals exist between marketing
    pages claiming ''AI-powered'' modules and third-party signals that do not confirm depth at that level. Public roadmap
    items include CBAM reporting (regulatory-driven 2026 launch) and embedded trade finance. Internal release cadence is not
    publicly disclosed (no public changelog), and observability tooling is not documented. The 2024 Sifted/Handelsblatt restructuring
    coverage suggests engineering hiring slowed, implying potential roadmap velocity drag. Highest-priority technical-diligence
    asks: (1) audit log and status page evidence, (2) ISO 27001 certificate, (3) FortoLabs feature production scope, (4) API
    SLA detail, (5) carrier-integration depth list. Forto''s technical differentiation versus traditional forwarders is the
    integrated quote-to-track UX and embedded customs/visibility, not a unique algorithmic moat. Diligence on any of these
    asks should be treated as gating for enterprise procurement and as material input for the 2026 valuation thesis given
    the magnitude of the disclosure-shadow on observable trust artifacts and the FortoLabs production-scope uncertainty that
    anchors the bull-case option in the technical-platform narrative.'
  claimRefs:
