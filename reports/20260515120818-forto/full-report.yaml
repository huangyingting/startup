  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Mode Mix
        blocks:
          - type: paragraph
            body: >-
              The relevant market for Forto is global freight forwarding, with a primary geographic focus on Europe and
              a service mix spanning ocean, air, road, rail and customs services. The market boundary explicitly
              includes brokered multi-modal shipments and value-added services such as visibility and customs
              declaration, but excludes pure asset-heavy ocean or air carrier capacity (Maersk, Lufthansa Cargo) and
              excludes contract logistics warehousing. Status-quo substitutes that Forto's digital model displaces
              include traditional NVOCC brokers, EDI-driven incumbent portals at DHL/Kuehne+Nagel/DSV, and in-house
              shipper TMS deployments. The buyer segment most exposed to substitution is the European Mittelstand
              mid-market exporter/importer, whose annual freight spend sits in the €0.5-5M range and who lacks the
              procurement scale to negotiate enterprise-grade incumbent contracts. Adjacent categories that Forto could
              expand into include trade finance, freight insurance, and supply-chain analytics, all of which sit outside
              the core forwarding TAM but are common upsell paths for digital forwarders.
            claimRefs:
              - CM001
              - CM002
              - CM005
              - CM017
              - CM018
          - type: table
            tableRef: TM001
            claimRefs:
