      - number: '7.2'
        title: Operational, quality and security risk register
        blocks:
          - type: paragraph
            body: >-
              Cybersecurity exposure is a category-level risk for any logistics SaaS; CISA advisories repeatedly flag
              logistics-platform compromises as a sector concern. Maritime / freight macro events (Suez closures, Red
              Sea diversions, port congestion) are external risk events that propagate to Forto via carrier outages and
              rate volatility. Allianz and sector reports flag freight-rate volatility as the most material 2026 macro
              risk for forwarders. Forto does not publicly publish a security white paper or status page; operational
              incident transparency is a diligence gap. Macro freight-rate downturn compresses revenue per shipment and
              pressures gross margin, while rate upturn from Suez/Red Sea events drives volatility in cost-of-revenue if
              hedging is imperfect. Cyber-insurance coverage and breach-response plans are not publicly disclosed;
              standard for B2B SaaS but a diligence ask. Reputation/PR risk is also material: a visible service outage
              during peak season would erode shipper trust quickly. Insurance and professional-indemnity coverage is
              industry-standard for forwarders; Forto's specific coverage is not publicly disclosed.
            claimRefs:
              - CR008
              - CR009
              - CR010
