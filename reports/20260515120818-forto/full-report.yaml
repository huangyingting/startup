      - number: '4.2'
        title: Unit economics and cost structure
        blocks:
          - type: paragraph
            body: >-
              Industry forwarder gross margin benchmark in 2024-2026 is 12-16%, compressed from 18-22% during the
              2021-2022 pandemic peak; Forto's gross margin is not separately disclosed but is presumed to sit in this
              band. Forwarder unit economics are dominated by carrier procurement, with 80-90% of revenue typically
              passing to carriers as cost of revenue, producing thin contribution margin per shipment. Working capital
              is meaningful — receivables from shippers versus payables to carriers swing significantly with cycle,
              particularly through the 2022-2024 rate collapse. Cost structure for digital forwarders typically splits
              80-90% carrier cost, 5-8% personnel, 2-5% technology and 2-5% other operating cost. The 2023 headcount
              reduction (200+ FTEs per trade-press coverage) implies €20-30M annualized cost savings at typical Berlin
              tech salaries — material in the context of an estimated €70-120M post-restructuring annual operating cost
              base. Public forwarder EBITDA margins in 2024-2026 range from 4-8% at scale (Expeditors, Kuehne+Nagel)
              down to <4% at stressed peers; Forto is presumed below this band given its pre-scale state.
