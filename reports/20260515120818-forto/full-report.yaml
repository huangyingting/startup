      - number: '3.4'
        title: Cautionary peer events and conflicting framings
        blocks:
          - type: paragraph
            body: >-
              Convoy (US digital freight broker) ceased operations in 2023 after raising more than $900M. Convoy's
              failure mode — low-margin spot-broker model collapse on rate normalization — is the most directly relevant
              cautionary tale for digital forwarder valuation discipline in 2026. Flexport's 2023 leadership turbulence
              (CEO succession back to Petersen, layoffs) demonstrates execution risk inherent to digital forwarder
              scale-ups and is the most relevant governance comparable for Forto. Conflicting market reports place Forto
              in the 'digital native' cohort with Flexport and Zencargo, while others place it in the 'European
              mid-market forwarder' cohort with traditional regional players — peer-set framing materially affects
              valuation comparables (digital-native multiples typically 4-8× revenue versus traditional forwarder
              multiples of 0.5-1.5× revenue). Investors must select the peer set explicitly before selecting a multiple.
              Underwriting discipline therefore turns on three explicit choices: (1) which peer cohort defines the
              multiple band; (2) how the Convoy spot-broker collapse pattern is weighted against Flexport's recovery
              narrative; and (3) whether a 2026 down-round at $1.0-1.5B (vs $2.1B prior mark) is the base case or a
              stressed scenario. Each choice independently moves the implied common-stock value by a wide margin and
              should be documented in the investment-committee memo before any deal terms are negotiated.
            claimRefs:
              - CP004
              - CP020
              - CP033
              - CP034
      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Asset-light status removes the margin floor
            body: >-
              In a sustained low-rate environment, asset-light forwarders compete on commodity service to thin margins.
              Forto's structural defense rests on cross-sell attach and data flywheel — neither is yet publicly
              demonstrated.
