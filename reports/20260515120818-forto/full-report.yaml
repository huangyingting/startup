  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk register
        blocks:
          - type: paragraph
            body: >-
              Forto operates inside the EU customs/regulatory perimeter (Union Customs Code, ATLAS in Germany), making
              customs compliance a permanent gating regulatory exposure. CBAM (EU Carbon Border Adjustment Mechanism)
              introduces declaration obligations for EU importers from 2026, materially expanding scope for
              forwarder-supported reporting. ATLAS protocol changes by German customs periodically force forwarder
              integration updates; missed updates are a customs-clearance risk. BaFin oversight is not directly engaged
              today but would apply if Forto launches embedded trade finance/insurance, broadening regulatory perimeter.
              GDPR is a permanent compliance regime for any EU-resident shipper data and platform telemetry, with
              material fine exposure. Public openjur search does not surface significant publicized adverse litigation
              against Forto; absence is conservative-to-favourable but not exhaustive. Bundesanzeiger filings indicate
              standard German GmbH disclosure obligations; specific liability filings against Forto have not been
