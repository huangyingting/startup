  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation summary and scenario range
        blocks:
          - type: paragraph
            body: >-
              The headline recommendation is pass-with-watch given disclosure gaps, restructuring overhang and uncertain
              FortoLabs production scope; revisit on next-round disclosures. Forto's last publicly reported funding
              round was a 2022-vintage Series-D priced near a US$2.1bn post-money valuation. Implied 2026 valuation
              range using sector multiples: US$0.6bn (bear) to US$1.5bn (base) to US$2.4bn (bull) assuming US$300-400m
              current revenue and 1.0-3.0x multiple. Bear scenario: rate downturn, top-customer churn and regulatory
              enforcement event drive multiple compression and 30-50% valuation reset versus 2022 round. Base scenario:
              stable mid-single-digit growth, CBAM module attach and modest margin recovery sustain current trough
              valuation through 2027. Bull scenario: FortoLabs production maturity, embedded trade finance attach,
              retention/concentration disclosure lifts multiple back toward 2.5-3.0x by 2027-28.
            claimRefs:
              - CV001
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV039
