              with the CTO function) and the Heilemann brothers (Ferry and Fabian), all of whom were active in the
              European startup ecosystem prior to founding FreightHub in 2016. Michael Wax has remained CEO continuously
              through the 2021 unicorn round, the 2022 SoftBank-led round and the 2023 restructuring, making him the
              dominant key-person within the company. The corporate vehicle is a German SE & Co. KG limited partnership
              with a corporate general partner — a governance form widely used in German growth-stage businesses that
              limits public disclosure relative to a stock corporation but still provides Handelsregister-level
              transparency on shareholders and managing directors. Subsequent leadership succession in operating roles
              (CTO, CFO, COO) has occurred but is not consistently dated in public sources; current full executive
