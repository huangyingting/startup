      - number: '8.3'
        title: Comparable valuation, market sizing and sensitivity
        blocks:
          - type: paragraph
            body: >-
              Sector comparables (Flexport, Project44, Convoy historical, Sennder) cluster the digital-freight-forwarder
              revenue multiple in 1.0-3.0x current revenue at 2026 spot. Public-comp incumbents (DSV, Kuehne+Nagel, DHL)
              trade at roughly 0.5-1.0x revenue with much higher absolute scale, anchoring the 'asset-heavy' multiple.
              CB Insights / sector reports place global digital-freight-forwarding TAM in the high single-digit-percent
              of the broader freight-forwarding market by 2030, while Statista/Gartner figures place global
              freight-forwarding revenue in the US$200-300bn range with mid-single-digit growth through 2030. McKinsey
              insights repeatedly cite digital forwarding as a meaningful penetration story over the next 5-10 years.
              Forto's stated revenue scale was reported at >US$300m in 2022; 2025 revenue is not publicly disclosed but
              assumed conservatively in the US$300-400m range given the freight cycle. Multiple compression sensitivity:
              a 1.0x→2.0x multiple swing on US$350m revenue is US$350m of valuation; sensitivity dominates
              point-estimate uncertainty. Revenue scale sensitivity: ±US$100m revenue at a 2.0x multiple is ±US$200m of
              valuation. Public Forto financial filings via Bundesanzeiger / Handelsregister provide standard German
              GmbH disclosure but no audited consolidated revenue or EBITDA. PitchBook / Crunchbase / Dealroom profiles
              aggregate publicly known funding events and rumored revenue; treat all derived multiples as
              analyst-estimated.
            claimRefs:
