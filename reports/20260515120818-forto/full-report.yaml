      - number: '2.4'
        title: Growth Drivers, Constraints and Cycle Risk
        blocks:
          - type: paragraph
            body: >-
              Three structural drivers favor digital forwarders into 2026: (1) EU regulatory pressure (CSRD, CBAM) is
              creating measurable demand for embedded emissions reporting; (2) supply-chain reshoring and
              trade-friction-driven re-routing favor flexible forwarder platforms over fixed long-term carrier
              contracts; (3) generational handover at Mittelstand procurement teams favors API-first vendors. Three
              constraints offset: (1) gross margins industry-wide compressed from 18-22% in 2021-2022 to 12-16% in
              2024-2026 per public-company disclosures, dampening the digital forwarder thesis; (2) Drewry's WCI is
              still ~50% below the 2022 peak in 2026, suppressing revenue per shipment; (3) DSV's acquisition of DB
              Schenker creates a >$50B revenue incumbent that intensifies competitive intensity. The principal cycle
              risk is that pandemic-era TAM expansion was a one-off; ex-pandemic the digital forwarder TAM growth rate
              may settle into low single digits, not the double-digit growth narrative in 2021. Investors should be
              explicit which growth scenario they are underwriting.
            claimRefs:
