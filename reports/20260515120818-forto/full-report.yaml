  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Headquarters and Stage
        blocks:
          - type: paragraph
            body: >-
              Forto is a privately held German digital freight forwarder headquartered in Berlin, registered as Forto
              Logistics SE & Co. KG and active in global ocean, air, road, rail and customs services. The company was
              founded in 2016 in Berlin as FreightHub by Michael Wax and co-founders, and rebranded to Forto in 2020 to
              signal its evolution from a freight brokerage marketplace into an end-to-end digital forwarder operating
              its own logistics cloud. Across its public marketing surfaces the company advertises offices in Berlin,
              Hamburg, Frankfurt, Amsterdam, Zurich, Singapore, Shanghai, Hong Kong and Shenzhen, although the precise
              number of currently staffed locations after the 2023 restructuring is not consistently corroborated by
              independent sources. The product is positioned as a single online platform on which European Mittelstand
              exporters and importers can quote, book, document and track multi-modal shipments with carbon-emissions
              reporting; the customer-facing brand explicitly emphasises real-time visibility and a simplified user
              experience versus traditional incumbent forwarders.
