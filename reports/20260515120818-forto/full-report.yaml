      - number: '3.2'
        title: Capability and pricing benchmarking
        blocks:
          - type: paragraph
            body: >-
              Capability matrix benchmarking shows incumbents lead on global capacity contracts, customs depth and
              contract-logistics warehousing, while digital natives lead on UI, API-first integration, pricing
              transparency and emissions reporting. Pricing models range from spot-rate transactional (Flexport, Forto)
              through contracted forecast-based (KN, DHL Forwarding) to integrated carrier (Maersk, CMA CGM/CEVA).
              Pricing transparency at digital forwarders is materially higher than incumbents' bilateral negotiated
              rates — a customer-facing differentiator that compresses margin. Industry-wide forwarder gross margins
              compressed from 18-22% in 2021-2022 to 12-16% in 2024-2026, affecting both digital natives and incumbents;
              the cycle effect is symmetric and Forto cannot solve cycle margin problems through model design alone.
              Incumbent scale advantage on contract ocean pricing is estimated at 20-30% better contracted rates per
              industry analyst commentary, a structural cost handicap for mid-scale digital natives that requires either
              rapid scale or a value-add (CO2, visibility, data) revenue lever to offset.
            claimRefs:
              - CP011
              - CP016
              - CP017
              - CP021
              - CP025
              - CP029
