  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Peer set and market structure
        blocks:
          - type: paragraph
            body: >-
              Forto's competitive landscape spans three concentric rings. The inner ring is direct digital-forwarder
              peers — Flexport (US-headquartered, multi-modal, ~$2-3B run-rate, peak $8B valuation in 2022), Zencargo
              (UK), and Sennder (Berlin road specialist). The middle ring is global incumbent forwarders — DSV post-DB
              Schenker (~$45B revenue), Kuehne+Nagel (~$25B), DHL Forwarding (~$25B), CEVA Logistics (CMA CGM-owned),
              Expeditors — that compete on contract depth, global capacity and integrated trade compliance. The outer
              ring is vertically integrated carriers — Maersk and CMA CGM — whose acquisitions of forwarders and
              warehousing assets create dual-front competition. Across the three rings the post-2023 picture is
              intensifying: well-funded peers consolidated revenue while challenger funding dried up, and the DSV+DB
              Schenker deal created a new top-of-market dominant.
            claimRefs:
              - CP001
