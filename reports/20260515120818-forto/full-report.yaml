companyProfile:
  summary: |
    Forto is a Berlin-based digital freight forwarder (formerly FreightHub, founded
    2016) that delivers ocean, air and road forwarding alongside customs declarations
    (via German ATLAS) and shipment visibility through one integrated platform aimed
    at mid-market European shippers. The company raised through Series D in 2022 at
    a ~US$2.1bn post-money valuation but went through a material 2024 cost-base
    restructuring covered by Sifted and Handelsblatt. Public 2025 revenue is not
    disclosed; analyst estimates anchor current scale in the US$300-400m range. The
    bull case rests on FortoLabs AI-overlay maturity, CBAM module attach and embedded
    trade finance; the bear case rests on freight-rate cycle compression and unresolved
    disclosure gaps on retention, top-customer concentration and trust artifacts.
  foundedDate: '2016-01-01'
  founders:
    - name: Michael Wax
      role: CEO and Co-Founder
      background: Co-founded FreightHub (rebranded Forto) in Berlin
      claimRefs:
        - CO005
    - name: Erik Muttersbach
      role: CTO and Co-Founder
      background: Engineering co-founder of FreightHub / Forto
      claimRefs:
        - CO005
    - name: Ferry Heilemann
      role: Co-Founder
      background: Repeat European tech founder; involved in FreightHub formation
      claimRefs:
        - CO005
  foundingLocation: Berlin, Germany
  headquarters: Berlin, Germany
  productSummary: |
    Forto Logistics Platform: a web-first transportation-management-style application
    delivering quote, book, document, customs (ATLAS), visibility and CO2 reporting
    in one workflow. AWS-hosted (EKS) with a TypeScript/Node.js + React + PostgreSQL
    stack reported via StackShare and LinkedIn job-post signals. FortoLabs is the
    company-claimed AI overlay covering pricing, document classification and ETA.
  customerFocus: >
    Mid-market European shippers across automotive, retail, industrial and consumer-goods verticals; DACH-anchored with
    selective expansion into rest of Europe and Asia trade lanes.
  businessModel: >
    Digital freight forwarder: revenue per shipment booked across ocean, air and road plus attached customs, visibility
    and sustainability modules; embedded trade finance and insurance on roadmap.
  stage: Late-stage private (Series D vintage 2022; restructured 2024)
  fundingStatus: >
    Last publicly reported round was a 2022-vintage Series D priced at ~US$2.1bn post-money. 2024 restructuring coverage
    flagged a valuation reset across the digital-freight-forwarder cohort; no publicly disclosed round has cleared
    since. Investors include SoftBank Vision Fund, Citi Ventures and others.
