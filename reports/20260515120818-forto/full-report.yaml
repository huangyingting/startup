            figureRef: FV004
            claimRefs:
              - CV026
              - CV032
              - CV033
      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Pass-with-watch is the disciplined posture
            body: >-
              Disclosure gaps, restructuring overhang and uncertain FortoLabs production scope outweigh the
              multi-vertical breadth and CSRD/CBAM tailwind today. The disciplined posture is pass-with-watch with a
              deal-stage trigger on next-round disclosure or accretive financing event.
            calloutType: insight
            claimRefs:
              - CV013
              - CV030
              - CV039
          - type: callout
            title: Sector multiple reset is the dominant valuation overhang
            body: >-
              Bloomberg coverage of Flexport's down round and Sennder's 2023 reset frame the digital-forwarder cohort at
              1.0-3.0x revenue, materially below 2022 vintages. Forto's 2022 Series-D at ~US$2.1bn implied a much higher
              multiple; reset is the base case until proven otherwise.
            calloutType: risk
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV021
          - type: callout
            title: Sensitivity dominates point-estimate uncertainty
            body: >-
              A 1.0x→2.0x multiple swing on US$350m revenue is US$350m of valuation; ±US$100m revenue at 2.0x is
              ±US$200m. Disclosure that narrows either input is the highest-impact diligence ask.
            calloutType: insight
            claimRefs:
              - CV024
              - CV025
