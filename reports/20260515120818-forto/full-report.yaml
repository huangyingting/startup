  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product definition and module map
        blocks:
          - type: paragraph
            body: >-
              Forto's product is a digital freight forwarder platform that delivers ocean, air and road forwarding
              alongside customs declarations and shipment visibility through one integrated workflow targeted at
              mid-market European shippers. The Forto Logistics Platform exposes per-shipment quote, book, document and
              tracking modules under a single web-first interface; the modules are bundled rather than sold a la carte
              and the buyer experience is oriented around the supply-chain manager rather than a procurement RFP.
              Customs is delivered through ATLAS-integrated declarations for German imports and exports, with CBAM
              reporting positioned as a 2026 add-on. Shipment visibility is embedded rather than standalone, sourced
              from a mix of carrier EDI feeds and partner platforms in the project44/Shippeo class. Sustainability/CO2
              reporting is offered as a per-shipment emissions calculation tied into the booking flow and is the
              headline FortoLabs growth lever for 2026. The integrated bundling means individual module unbundling is
              not currently a customer-facing pricing lever, with implications for upsell motion and embedded-finance
              attach.
