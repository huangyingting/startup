      - number: '7.3'
        title: Partner / dependency risk register
        blocks:
          - type: paragraph
            body: >-
              Carrier-dependency risk: Forto sources capacity from a finite carrier set; concentration on a few ocean
              carriers is a contractual risk. Visibility-partner dependency: project44/Shippeo/CargoSnap class platforms
              feed tracking quality and a partner outage or pricing change is a service risk. AWS dependency adds
              single-cloud lock-in risk; AWS region failures would disrupt Forto's platform. ATLAS dependency means
              customs platform availability is a hard external dependency; Zoll regression or planned downtime impacts
              customers. Mitigations include CBAM regulatory readiness signaled in Forto's sustainability roadmap
              (execution scope is the open question), AWS multi-region failover (not publicly confirmed),
              visibility-partner redundancy across project44/Shippeo/CargoSnap (not publicly disclosed) and people
              retention via equity refresh and management continuity (not publicly detailed). The partner-dependency map
              is not unusual for a digital forwarder, but the absence of disclosed redundancy and SLA evidence is the
              substantive diligence gap.
