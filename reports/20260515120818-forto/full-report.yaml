      - number: '8.4'
        title: Investment KPIs, kill-triggers and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              Investment KPIs to track: gross margin, net retention, top-10 concentration, FortoLabs feature production
              scope, CBAM module ramp, cash burn. Thesis-break triggers: regulatory enforcement event, material breach,
              top-customer departure, capital event without growth, CBAM execution miss. Final diligence asks
              (deal-stage): audited revenue + EBITDA, top-10 customer share, gross/net retention, NPS, CBAM module spec,
              FortoLabs production scope, cash position. Digital-forwarder net-revenue gross margin sits in 15-25%
              industry-wide; Forto-specific number is not disclosed. Cash burn / runway is the primary near-term
              valuation lever; 2024 restructuring suggests management pivoted to cash-flow break-even targeting.
              FortoLabs production maturity is the upside option in the bull case; without it the multiple stays in the
              1.0-2.0x band. Embedded financial-services attach (trade finance/insurance) is the second upside option;
              not yet productized at scale per public signals. Public exit benchmarks for European logistics-software at
              scale are limited; precedent transactions provide directional comparable. Strategic vs financial buyer
              view: strategic acquirers (DSV, K+N, DHL) value distribution + customer-base; financial buyers value
              cash-flow and growth. Discount rate / WACC for late-stage European logistics-tech sits in 12-18% range.
              The recommendation logic combines multiple-band, scenario range, disclosure-gap shadow and restructuring
              overhang into a pass-with-watch with deal-stage trigger construct. Conflict-of-interest reminder: this
              report uses publicly available analyst sources only.
            claimRefs:
