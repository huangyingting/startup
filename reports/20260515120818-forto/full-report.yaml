  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Disclosure regime and revenue model
        blocks:
          - type: paragraph
            body: >-
              Forto Logistics SE & Co. KG does not file publicly available audited consolidated financial statements;
              the operating entity is a German limited partnership whose disclosure obligations under the Bundesanzeiger
              regime are limited to size-class-specific summaries of revenue, profit/loss and balance sheet, with depth
              depending on the entity's classification (Kleinst, Klein, Mittel or Groß). For investors the practical
              implication is that all detailed financials must be obtained directly under NDA, while Bundesanzeiger and
              Handelsregister filings remain the only authoritative primary-source public anchor for ownership, managing
              directors and limited financial summaries. The revenue model itself combines per-shipment forwarding
              margin (spread between contracted/spot carrier rate and the shipper price) and value-added services
              (customs, visibility, insurance attach), with the FortoLabs AI initiative positioned as a 2026 growth
              lever whose contribution to revenue is not publicly disclosed.
