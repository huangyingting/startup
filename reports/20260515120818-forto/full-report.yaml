      - number: '2.2'
        title: TAM, SAM and SOM Triangulation
        blocks:
          - type: paragraph
            body: >-
              Sizing the addressable market for Forto requires triangulating across three lenses to avoid the
              single-number TAM trap. The top-down lens places global freight forwarding revenue in the $300-360 billion
              range in 2026 per Statista, McKinsey and Transport Intelligence; the European subset is approximately
              €350-400 billion. A digitally-addressable SAM lens — restricting to mid-market shippers in Europe and Asia
              accessible via digital channels — sizes at roughly €60-90 billion, of which a defensible bottom-up SOM in
              a 5-year horizon is €15-25 billion. A peer-revenue lens triangulates from public-company forwarder revenue
              (DSV ~$25B, Kuehne+Nagel ~$20B, DHL Forwarding ~$25B) and digital-native peers (Flexport reported run-rate
              ~$2-3B at peak); this gives upper-bound implied digital share of <5%. The three lenses converge on the
              conclusion that digital forwarder penetration of European mid-market spend is below 25% in 2026, leaving
              substantial residual penetration runway, but that ex-pandemic growth rates are likely settled in the
              low-to-mid single digits rather than the double-digit narrative in 2021 pitch decks.
            claimRefs:
              - CM001
