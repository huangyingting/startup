      - number: '7.4'
        title: People-execution risk and mitigation register
        blocks:
          - type: paragraph
            body: >-
              Adverse 2024 Sifted/Handelsblatt restructuring coverage flagged execution risk and concentrated layoffs in
              non-engineering functions, while Kununu and Glassdoor employee reviews note pace-of-change and management
              turnover signal. Founder/CEO transition risk and senior-executive retention remain watchpoints for any
              restructured scaleup. Capital-runway risk: the 2024 valuation reset implies sensitivity to next financing
              round timing and dilution. Concentration risk on top-10 customers is undisclosed but prudently assumed at
              >40% of revenue (European mid-market norm). Kill criteria for the investment thesis include: regulatory
              enforcement event, material breach with extended downtime, loss of a top customer, or capital event
              without accompanying growth. Strategic risk from Flexport / DSV / DHL pressure compresses pricing and
              accelerates feature parity in customs/visibility. Adverse-bias headline diligence asks: independent audit
              of CO2 methodology, public status page, ISO 27001 certificate, top-customer concentration, capital runway
              and management continuity plan. These asks frame the deal-stage data-room request and are individually
              tractable for a mid-market diligence cycle.
