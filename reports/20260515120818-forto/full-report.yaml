      - number: '3.3'
        title: Moat durability and competitive risk
        blocks:
          - type: paragraph
            body: >-
              Moat durability for Forto rests on three pillars: ATLAS-grade customer integrations, a repeat-shipment
              data flywheel, and EU regulatory-reporting depth. None of these are uniquely defensible in isolation; the
              combination provides defensibility but only if cross-sell attaches measurably and the data flywheel
              translates to predictive pricing or operational advantage. Adverse view: asset-light status removes any
              structural margin floor in a sustained low-rate environment, where asset-light forwarders compete on
              commodity service to thin margins. The 2026 competitive-risk register is led by (a) DSV-DB Schenker price
              war, (b) Maersk vertical integration, (c) project44/Shippeo unbundling visibility, (d) Flexport regaining
              global scale, (e) regional rivals (Sennder, Zencargo) consolidating European share. The DSV+DB Schenker
              integration timeline (2025-2027) creates an 18-24 month window during which the combined entity is
              integration-distracted — a possible offensive window for digital natives including Forto if they can land
              mid-market accounts displaced by integration friction.
            claimRefs:
              - CP009
              - CP010
              - CP018
              - CP019
              - CP022
              - CP027
              - CP028
              - CP035
          - type: table
            tableRef: TP004
