      - number: '2.3'
        title: Buyer Segmentation and Adoption Funnel
        blocks:
          - type: paragraph
            body: >-
              The primary buyer of Forto's services is the supply-chain or logistics VP at a European mid-market shipper
              with €0.5-5M of annual freight spend; at larger enterprise customers the budget owner shifts to
              procurement. The user is the freight ops team that places bookings and tracks shipments daily; the payer
              is the CFO who approves the contract. Across modes, road dominates by ton-km in Europe (where peers like
              Sennder focus), ocean dominates by spend per shipper, and air freight is the fastest-growing mode in
              2025-2026 due to e-commerce and pharma cold-chain demand. Customer wins typically follow a five-stage
              funnel — awareness, evaluation, pilot lane, multi-lane rollout, contractual lock-in — over a 12-24 month
              sales cycle, with the pilot-to-scale conversion as the principal funnel-completion bottleneck. Switching
              cost from incumbents is non-trivial: customs ATLAS/AEO integration, contracted carrier rates, and embedded
              SAP/Oracle workflows act as a structural adoption brake that digital forwarders must overcome with
              measurable carbon, cost-per-shipment, or visibility gains.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM017
              - CM020
