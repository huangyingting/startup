      - number: '2.3'
        title: 买方分层与采用漏斗
        blocks:
          - type: paragraph
            body: >-
              Forto 服务的主要买方是欧洲中型货主的供应链或物流 VP，年货运支出 €0.5-5M；在更大企业客户中，预算所有者会转向采购部门。使用者是每天下单和追踪货件的货运运营团队；付款审批者是
              CFO。按运输模式看，欧洲以吨公里计由公路主导（Sennder 等同业聚焦此处），按单个货主支出看由海运主导，2025-2026
              年增速最快的是空运，受电商和医药冷链需求推动。客户赢单通常走五阶段漏斗——认知、评估、试点航线、多航线铺开、合同锁定——销售周期 12-24
              个月，其中从试点到规模化转化是漏斗完成的主要瓶颈。从头部供应商切换并不轻松：海关 ATLAS/AEO 集成、已签承运费率、嵌入式 SAP/Oracle
              工作流，都会形成结构性采用刹车；数字货代必须用可衡量的碳、单票成本或可视化收益来突破。
