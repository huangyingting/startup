      - number: '8.3'
        title: 可比估值、市场规模与敏感性
        blocks:
          - type: paragraph
            body: >-
              行业可比公司（Flexport、Project44、Convoy 历史案例、Sennder）把数字货代在 2026 年即期的收入倍数聚在当前收入的
              1.0-3.0x。上市传统巨头（DSV、Kuehne+Nagel、DHL）以约 0.5-1.0x 收入交易，绝对规模大得多，为“资产重”倍数定锚。CB Insights / 行业报告认为，到 2030
              年，全球数字货代 TAM 占更大货代市场的高个位数百分比；Statista/Gartner 数据把全球货代收入放在 US$200-300bn 区间，并预计到 2030 年保持中个位数增长。McKinsey
              洞察反复把数字货代称为未来 5-10 年有意义的渗透故事。Forto 披露的收入规模在 2022 年已被报道为 >US$300m；2025 年收入未公开披露，但考虑货运周期，保守假设在 US$300-400m
              区间。倍数压缩敏感性：US$350m 收入上，1.0x→2.0x 的倍数摆动对应 US$350m 估值；敏感性压过点估不确定性。收入规模敏感性：在 2.0x 倍数下，收入 ±US$100m 对应估值
              ±US$200m。Forto 通过 Bundesanzeiger / Handelsregister 提交的公开财务文件提供德国 GmbH 标准披露，但没有经审计的合并收入或 EBITDA。PitchBook /
              Crunchbase / Dealroom 档案聚合公开已知融资事件和传闻收入；所有推导倍数都应视为分析师估算。
