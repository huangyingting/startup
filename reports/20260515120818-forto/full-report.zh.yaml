  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与运输模式组合
        blocks:
          - type: paragraph
            body: >-
              Forto 所在市场是全球货运代理，地理重心在欧洲，服务组合覆盖海运、空运、公路、铁路和报关。市场边界明确包括经纪式多式联运货件，以及可视化、报关等增值服务，但排除 Maersk、Lufthansa Cargo
              这类重资产纯海运或空运承运能力，也排除合同物流仓储。Forto 的数字化模式替代的现状方案包括传统 NVOCC 经纪商、DHL/Kuehne+Nagel/DSV 的 EDI 驱动头部门户，以及货主自建
              TMS。最容易被替代的买方群体是欧洲 Mittelstand 中型出口商 / 进口商，年货运支出在 €0.5-5M，采购规模不足以谈下企业级头部供应商合同。Forto
              可扩张的邻近品类包括贸易金融、货运保险和供应链分析；它们都在核心货代 TAM 之外，但常见于数字货代的增购路径。
            claimRefs:
              - CM001
              - CM002
              - CM005
              - CM017
              - CM018
