      - number: '2.4'
        title: 增长驱动、约束与周期风险
        blocks:
          - type: paragraph
            body: >-
              到 2026 年，三项结构性驱动利好数字货代：（1）EU
              监管压力（CSRD、CBAM）催生对嵌入式排放报告的可衡量需求；（2）供应链回流和贸易摩擦驱动的改道，让灵活货代平台相较固定长期承运合同更有吸引力；（3）Mittelstand 采购团队代际交接，偏向 API
              优先供应商。三项约束抵消上述利好：（1）上市公司披露显示，全行业毛利率从 2021-2022 年的 18-22% 压缩到 2024-2026 年的 12-16%，削弱数字货代投资逻辑；（2）2026 年
              Drewry WCI 仍较 2022 年峰值低约 50%，压低每票收入；（3）DSV 收购 DB Schenker 后形成收入 >$50B 的头部玩家，竞争强度上升。核心周期风险在于，疫情期 TAM
