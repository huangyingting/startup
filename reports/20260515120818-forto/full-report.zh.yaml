            body: >-
              Forto Logistics SE & Co. KG 不提交公开可得的经审计合并财务报表；运营主体是德国有限合伙，在 Bundesanzeiger
              制度下的披露义务仅限于按规模分类提供收入、盈亏和资产负债表摘要，披露深度取决于主体分类（Kleinst、Klein、Mittel 或 Groß）。对投资者而言，实际含义是所有详细财务都必须在 NDA
              下直接取得，而 Bundesanzeiger 和 Handelsregister 文件仍是唯一权威的一手公开锚点，可确认所有权、董事总经理和有限财务摘要。收入模型本身结合每票货代利润（承运商合同 /
              现货费率与货主价格之间的价差）和增值服务（报关、可视化、保险绑定）；FortoLabs AI 计划被定位为 2026 年增长杠杆，但其收入贡献未公开披露。
