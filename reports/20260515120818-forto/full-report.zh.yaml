      - number: '8.2'
        title: 投资逻辑、反向逻辑与反向偏置视角
        blocks:
          - type: paragraph
            body: >-
              反向论点（反向逻辑）：德国 Mittelstand 出口商密度和 CSRD/CBAM 顺风，支持在交易阶段尽调时重新接触。冲突点在于：公司沟通仍延续增长叙事，但 Bloomberg / Sifted
              等同业报道指向整个队列的倍数重置。反向：2024 年 Bloomberg 对 Flexport 降估值融资的报道，显示数字货代同业出现实质性估值重置。反向：Sifted/Handelsblatt
              的重组报道说明成本基数承压，这会限制基准情景中的毛利上行。可比公司 Sennder（德国数字公路货代）披露 2023 年降估值融资，收窄了德国数字货代在 2026 年的隐含倍数区间。Project44
              最新披露估值把可视化软件倍数锚定在收入的 5-10x，进一步说明纯可视化与全链路货代不是同一个倍数桶。Convoy（美国数字卡车运输）2023 年关闭，为轻资产货代投资逻辑提供了尾部风险锚。
