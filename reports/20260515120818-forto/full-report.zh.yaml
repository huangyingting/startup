      - number: '2.2'
        title: TAM、SAM 与 SOM 三角测算
        blocks:
          - type: paragraph
            body: >-
              测算 Forto 的可服务市场，需要用三重视角交叉验证，避免掉进单一 TAM 数字陷阱。自上而下视角显示，根据 Statista、McKinsey 和 Transport Intelligence，2026
              年全球货代收入约 $300-360 billion；欧洲子集约 €350-400 billion。数字化可触达 SAM 视角——限定在可经数字渠道触达的欧洲和亚洲中型货主——规模约 €60-90
              billion，其中 5 年视角下可辩护的自下而上 SOM 为 €15-25 billion。同业收入视角从上市货代收入（DSV 约 $25B、Kuehne+Nagel 约 $20B、DHL Forwarding
              约 $25B）和数字原生同业（Flexport 报道峰值运行率约 $2-3B）反推；由此得到的数字化份额隐含上限 <5%。三种视角共同指向一个结论：2026 年欧洲中型市场支出中的数字货代渗透率低于
              25%，剩余渗透空间可观；但疫情后的增长率很可能已回落到低个位数至中个位数，而非 2021 年融资材料里的双位数叙事。
