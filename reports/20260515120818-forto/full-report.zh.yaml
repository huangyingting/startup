  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与模块地图
        blocks:
          - type: paragraph
            body: >-
              Forto 的产品是一套数字货运代理平台，通过一条集成工作流，为欧洲中型货主提供海运、空运、公路货代，以及报关和货运可视化。Forto Logistics Platform
              在单一网页优先界面下提供逐票询价、订舱、单证和追踪模块；模块是打包而非按项出售，买方体验围绕供应链经理，而不是采购 RFP。报关通过接入 ATLAS 的德国进出口申报完成，CBAM 报告被定位为 2026
              年附加模块。货运可视化是内嵌能力，而非独立产品，数据来自承运商 EDI 数据流与 project44/Shippeo 同类伙伴平台的组合。可持续 / CO2 报告按每票货件计算排放，并嵌入订舱流程，是 2026
              年 FortoLabs 增长杠杆的头号叙事。一体化打包意味着，单个模块拆分目前不是面向客户的定价杠杆，这会影响增购动作和嵌入式金融绑定。
