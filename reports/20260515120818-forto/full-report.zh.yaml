companyProfile:
  summary: >
    Forto 是一家总部在柏林的数字货运代理商（前身 FreightHub，2016 年成立），通过一个面向欧洲中型货主的集成平台，提供海运、空运、公路货代、报关（借助德国 ATLAS）和货运可视化。公司 2022 年完成 D
    轮，投后估值约 US$2.1bn，但 2024 年经历了 Sifted 和 Handelsblatt 报道的重大成本基础重组。2025 年公开收入未披露；分析师估计当前规模落在 US$300-400m。乐观情景押注
    FortoLabs AI 层成熟、CBAM 模块绑定和嵌入式贸易金融；悲观情景则来自货运费率周期挤压，以及留存、头部客户集中度和信任材料披露缺口仍未解决。
