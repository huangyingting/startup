        title: 同业警示事件与冲突框架
        blocks:
          - type: paragraph
            body: >-
              Convoy（美国数字货运经纪商）在融资超过 $900M 后于 2023 年停止运营。Convoy 的失败模式——低利润率现货经纪模式在费率正常化后崩塌——是 2026
              年数字货代估值纪律最直接的警示案例。Flexport 2023 年领导层动荡（CEO 继任后 Petersen 回归、裁员）展示了数字货代规模化公司固有的执行风险，是 Forto
              最贴近的治理可比对象。市场报告存在冲突：有的把 Forto 放在 Flexport、Zencargo
              一类“数字原生”队列，有的把它归入与传统区域玩家同组的“欧洲中型市场货代”队列——同业集合框架会显著影响估值可比（数字原生倍数通常为收入 4-8×，传统货代为收入
              0.5-1.5×）。投资者选择倍数前，必须先明确选择同业集合。因此，承销纪律落在三项明确选择上：（1）哪个同业队列定义倍数区间；（2）如何在 Convoy 现货经纪崩塌模式与 Flexport
              复苏叙事之间加权；（3）2026 年以 $1.0-1.5B 完成估值下调轮（相较此前 $2.1B 标记）应是基准情景还是压力情景。每一项选择都会独立大幅移动隐含普通股价值，任何交易条款谈判前都应写入投委会备忘录。
