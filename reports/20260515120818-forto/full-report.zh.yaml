    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与阶段
        blocks:
          - type: paragraph
            body: >-
              Forto 是一家私营德国数字货运代理商，总部在柏林，注册为 Forto Logistics SE & Co. KG，业务覆盖全球海运、空运、公路、铁路和报关服务。公司 2016 年由 Michael Wax
              及联合创始人在柏林以 FreightHub 名义创立，2020 年改名
              Forto，意在表明自己从货运经纪撮合平台升级为运营自有物流云的端到端数字货代。公司在公开营销页面宣称设有柏林、汉堡、法兰克福、阿姆斯特丹、苏黎世、新加坡、上海、香港和深圳办公室，但 2023
              年重组后实际有人驻扎的地点数量，独立来源并未一致佐证。产品定位是一套在线平台，让欧洲 Mittelstand
              出口商和进口商可对多式联运货件询价、订舱、制单并追踪，同时输出碳排放报告；面向客户的品牌明确强调实时可视化，以及相较传统头部货代更简化的用户体验。
