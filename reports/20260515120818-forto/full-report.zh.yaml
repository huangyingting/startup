  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议摘要与情景区间
        blocks:
          - type: paragraph
            body: >-
              鉴于披露缺口、重组阴影和 FortoLabs 生产范围不确定，核心建议是暂不投资、继续观察；等下一轮披露后再回看。Forto 最近一轮公开报道的融资是 2022 年 Series D，投后估值接近
              US$2.1bn。按行业倍数推算的 2026 年估值区间为：US$0.6bn（悲观）、US$1.5bn（基准）、US$2.4bn（乐观），假设当前收入 US$300-400m、倍数
              1.0-3.0x。悲观情景：费率下行、头部客户流失和监管执法事件一起压缩倍数，相比 2022 年融资轮估值重置 30-50%。基准情景：中个位数稳定增长、CBAM 模块挂载和温和毛利修复，支撑当前低谷估值延续到
              2027 年。乐观情景：FortoLabs 生产成熟、嵌入式贸易融资挂载，叠加留存 / 集中度披露，把倍数在 2027-28 年拉回 2.5-3.0x。
