              收入，这是欧洲中型市场常态。单个现有客户的扩张向量包括更多贸易航线、更多运输模式（海运→空运、空运→公路）、更多模块（报关、可持续）和嵌入式金融服务。垂直化会影响客户 LTV：工业 /
              汽车货主的货量更大、更重复。中型货主越来越把可持续 / CO2 报告列为采购门槛，这利好 Forto 的 CSRD-ready 栈。客户基础受益于德国 Mittelstand 出口商密度，这是 DACH
              锚定业务的结构性护城河。客户增长和采用轨迹没有按周期拆出用户数或货件数。优先级最高的客户尽调问题包括：前 10 大客户收入集中度、总 / 净留存、NPS、赢单 /
