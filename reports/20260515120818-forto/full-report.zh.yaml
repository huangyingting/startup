      - number: '3.2'
        title: 能力与定价基准
        blocks:
          - type: paragraph
            body: >-
              能力矩阵基准显示，头部货代在全球运力合同、报关深度和合同物流仓储上领先；数字原生玩家在 UI、API-first
              集成、定价透明度和排放报告上领先。定价模式从现货费率交易型（Flexport、Forto），到基于预测的合同型（KN、DHL Forwarding），再到一体化承运商（Maersk、CMA
              CGM/CEVA）。数字货代的定价透明度显著高于头部玩家双边谈判费率——这是面向客户的差异点，也会压缩利润率。全行业货代毛利率从 2021-2022 年的 18-22% 压缩到 2024-2026 年的
              12-16%，同时影响数字原生玩家和头部玩家；周期效应是对称的，Forto 不能只靠模式设计解决周期利润率问题。行业分析师评论估计，头部玩家在合同海运价格上可拿到好 20-30%
              的合同费率，这是中等规模数字原生玩家的结构性成本劣势，必须靠快速规模化，或靠 CO2、可视化、数据等增值收入杠杆来抵消。
