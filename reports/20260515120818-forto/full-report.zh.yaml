      - number: '8.4'
        title: 投资 KPI、终止触发器与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              需要跟踪的投资 KPI：毛利率、净留存、Top-10 集中度、FortoLabs 功能生产范围、CBAM
              模块爬坡、烧钱速度。投资逻辑失效触发器：监管执法事件、重大安全事件、头部客户流失、没有增长伴随的资本事件、CBAM 执行失误。最终尽调问题（交易阶段）：经审计收入 + EBITDA、Top-10 客户占比、总 /
              净留存、NPS、CBAM 模块规格、FortoLabs 生产范围、现金头寸。全行业数字货代净收入毛利率处于 15-25%；Forto 具体数字未披露。烧钱速度 / 现金跑道是近期最主要的估值杠杆；2024
              年重组说明管理层转向以现金流盈亏平衡为目标。FortoLabs 生产成熟度是乐观情景中的上行期权；没有这一点，倍数会留在 1.0-2.0x 区间。嵌入式金融服务挂载（贸易融资 /
              保险）是第二个上行期权；公开信号显示尚未规模化产品化。欧洲物流软件规模化后的公开退出基准有限；先例交易只能提供方向性可比。战略买方与财务买方视角：战略收购方（DSV、K+N、DHL）看重分销 +
              客户基础；财务买方看重现金流和增长。后期欧洲物流科技的折现率 / WACC 处于 12-18%
              区间。建议逻辑把倍数区间、情景范围、披露缺口阴影和重组阴影合并起来，形成“暂不投资、继续观察”，并设置交易阶段触发条件。利益冲突提醒：本报告只使用公开可得的分析师来源。
