      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >-
              2024-2026 年行业货代毛利率基准为 12-16%，低于 2021-2022 年疫情峰值期的 18-22%；Forto 的毛利率没有单独披露，但推定落在该区间。货代单位经济主要由承运商采购决定，通常
              80-90% 收入会作为收入成本流向承运商，因此每票贡献利润很薄。营运资本很重要——来自货主的应收款与付给承运商的应付款会随周期大幅摆动，2022-2024 年费率崩落期间尤其明显。数字货代成本结构通常为
              80-90% 承运商成本、5-8% 人员、2-5% 技术和 2-5% 其他运营成本。2023 年裁员（贸易媒体报道 200+ FTE）按柏林科技行业典型薪资推算，意味着年化节省 €20-30M；放在估计
              €70-120M 的重组后年度运营成本基础上，这一数字很重要。2024-2026 年上市货代 EBITDA 利润率在规模化玩家（Expeditors、Kuehne+Nagel）处为 4-8%，压力同业降至
