        title: 同业集合与市场结构
        blocks:
          - type: paragraph
            body: >-
              Forto 的竞争格局分三层同心圆。内圈是直接数字货代同业——Flexport（总部美国，多式联运，运行率约 $2-3B，2022 年峰值估值 $8B）、Zencargo（英国）和
              Sennder（柏林公路专精）。中圈是全球头部货代——并入 DB Schenker 后的 DSV（收入约 $45B）、Kuehne+Nagel（约 $25B）、DHL Forwarding（约
              $25B）、CEVA Logistics（CMA CGM 旗下）、Expeditors——它们靠合同深度、全球运力和一体化贸易合规竞争。外圈是垂直整合承运商——Maersk 和 CMA
              CGM——它们收购货代与仓储资产后，形成双线竞争。三层合起来看，2023 年后的竞争正在加剧：资金充足的同业整合收入，挑战者融资枯竭，DSV+DB Schenker 交易又造出一个新的市场顶端主导者。
