      - number: '7.3'
        title: 合作伙伴 / 依赖风险清单
        blocks:
          - type: paragraph
            body: >-
              承运人依赖风险：Forto 从有限承运人集合中采购运力；少数海运承运人集中度过高会带来合同风险。可视化合作伙伴依赖：project44/Shippeo/CargoSnap
              这类平台决定跟踪质量，合作伙伴宕机或调价都会变成服务风险。AWS 依赖带来单一云锁定效应；AWS 区域故障会扰乱 Forto 平台。ATLAS 依赖意味着海关平台可用性是硬性外部依赖；Zoll
              回归问题或计划停机会影响客户。缓释手段包括 Forto 可持续发展路线图里释放的 CBAM 法规就绪信号（执行范围仍是开放问题）、AWS
              多区域故障切换（未公开确认）、project44/Shippeo/CargoSnap
              之间的可视化合作伙伴冗余（未公开披露），以及靠股权刷新和管理层连续性留住人员（未公开详细说明）。这张合作伙伴依赖图对数字货代并不反常，但缺少已披露的冗余和 SLA 证据，才是实质性尽调缺口。
