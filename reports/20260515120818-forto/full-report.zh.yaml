  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险清单
        blocks:
          - type: paragraph
            body: >-
              Forto 在 EU 海关 / 监管边界内运营（Union Customs Code、德国 ATLAS），因此海关合规是长期门槛型监管暴露。CBAM（EU Carbon Border Adjustment
              Mechanism）从 2026 年起为 EU 进口商引入申报义务，显著扩大货代支持报告的范围。德国海关的 ATLAS 协议变更会定期迫使货代更新集成；若错过更新，就会带来清关风险。BaFin
              监管今天尚未直接介入，但若 Forto 推出嵌入式贸易金融 / 保险，监管边界会扩大。GDPR 是任何 EU 居民货主数据和平台遥测的长期合规制度，并带来重大罚款暴露。公开 openjur 搜索未发现针对
              Forto 的重大公开反向诉讼；这个缺席偏保守利好，但并不穷尽。Bundesanzeiger 文件显示标准德国 GmbH 披露义务；针对 Forto 的具体责任文件尚未被公开索引。制裁 /
              军民两用贸易合规，以及路线图金融模块上的 AML/KYC 义务，与 EU Whistleblower Directive 雇佣法义务和标准德国转让定价风险一起，构成监管风险面。
