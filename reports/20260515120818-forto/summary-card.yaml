summary:
  headline: |
    Pass-with-watch in 2026: 2024 restructuring overhang, undisclosed retention /
    concentration metrics and uncertain FortoLabs production scope outweigh the
    multi-vertical breadth and CSRD/CBAM tailwind; deal-stage trigger on next-round
    disclosure or accretive financing event.
