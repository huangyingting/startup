  topStrengths:
    - >-
      Integrated quote-to-track UX with embedded customs (ATLAS) and CO2 reporting differentiates Forto from incumbent
      forwarders in the mid-market shipper segment
    - >-
      DACH-anchored Mittelstand exporter density gives Forto a structural distribution moat that pure-play digital peers
      (Flexport, Sennder) lack in Germany
    - >-
      Publicly anchored named-customer set (Home24, Develey, Berner SE, Westwing) supports the multi-vertical
      applicability claim across retail, industrial and consumer goods
    - >-
      CBAM 2026 reporting module positions Forto to capture a regulatory tailwind from EU importer compliance
      obligations
    - >-
      AWS-hosted cloud architecture with project44/Shippeo-class visibility partner ecosystem provides standard
      digital-forwarder operating leverage
    - Series D investor base (SoftBank Vision Fund and others) provides capital depth even after the 2024 reset
  topRisks:
    - >-
      Disclosure-gap shadow on top-10 customer concentration, gross/net retention, NPS and cash position dominates the
      standalone risk surface and frames the data-room ask list
    - >-
      2024 restructuring overhang concentrates execution risk in pace-of-change, senior-executive retention and
      capital-runway sensitivity to next financing round
    - >-
      Sector multiple reset (Bloomberg Flexport down round, Sennder 2023, Convoy 2023 shutdown) clusters
      digital-forwarder multiples at 1.0-3.0x revenue versus the 2022 Series-D vintage at materially higher multiples
    - >-
      FortoLabs AI-overlay production scope is not separately disclosed; conflicting signals between marketing claims
      and developer-signal proxies make the bull-case lever uncertain
    - >-
      Trust artifacts are publicly thin (no indexed status page, ISO 27001 not in catalogue, no shipper-side DPA
      wording, no CO2 methodology audit), gating enterprise procurement
    - >-
      Macro freight-rate volatility is the most material 2026 operating risk per Allianz / sector reports; rate downturn
      compresses revenue per shipment, rate upturn drives cost-of-revenue volatility
  unresolvedGaps:
    - >-
      Audited 2024-2025 revenue and EBITDA are not publicly disclosed; the US$300-400m revenue band used in valuation
      scenarios is analyst-estimated
    - >-
      Top-10 customer revenue concentration is not disclosed; prudent diligence assumes >40% per the European mid-market
      norm but actual share is unknown
    - Gross / net retention, NPS and customer count are not disclosed; quality-of-revenue input is missing
    - FortoLabs feature production scope is not separately disclosed; bull-case lever evidence is unavailable
    - >-
      ISO 27001 certificate, public status page, security white paper and shipper-facing DPA wording are not publicly
      available; trust artifacts are inferred rather than verified
    - >-
      CBAM module GA spec and CO2 methodology audit letter are not publicly disclosed; regulatory-tailwind capture
      evidence is pending
    - Cash position and runway are not publicly disclosed; round-timing risk is unbounded today
