callouts:
- calloutType: strength
  title: Founder-CEO continuity through both growth and restructuring
  body: Michael Wax has remained CEO from the 2016 founding through both the 2021 unicorn round and the 2022 SoftBank-led
    follow-on, and stayed through the 2023 restructuring. This continuity is unusual for a SoftBank-backed scale-up that experienced
    a material cost reset.
  claimRefs:
  - CO004
  - CO026
- calloutType: risk
  title: Operating metrics are entirely undisclosed
  body: There is no public revenue, ARR, gross margin or runway figure for Forto. Investors must rely on private diligence;
    third-party database estimates are not primary sources and should not be treated as audited.
  claimRefs:
  - CO013
  - CO016
  - CO040
- calloutType: risk
  title: Valuation mark is stale and from a peak-cycle round
  body: The $2.1B March 2022 valuation predates the >75% collapse in container spot rates and the 2023 restructuring. Treat
    the headline mark as historical, not current.
  claimRefs:
  - CO007
  - CO024
- calloutType: insight
  title: FortoLabs AI is the forward differentiator narrative
  body: Forto explicitly positions FortoLabs as a 2025-2026 strategic theme. Independent verification of revenue contribution
    is not yet available — confirm in diligence whether this is product-led growth or marketing.
  claimRefs:
  - CO019
  - CO038
