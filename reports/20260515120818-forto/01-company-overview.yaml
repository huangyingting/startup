chapter:
  number: 1
  title: Company Overview
  summary: Forto is a Berlin-based digital freight forwarder founded in 2016 as FreightHub, rebranded to Forto in 2020, and
    operating today as Forto Logistics SE & Co. KG. The company raised approximately $240M in 2021 at a $1.1B valuation and
    a follow-on of approximately $250M in 2022 at a $2.1B valuation, both led by SoftBank Vision Fund 2, with cumulative disclosed
    equity in the $590-620M range. In 2023 Forto announced a material restructuring affecting an estimated 200+ staff, against
    the backdrop of a >75% collapse in container spot rates from the 2022 peak. As of the May 2026 report runDate the company
    continues to operate independently with no publicly confirmed new primary equity round since 2022 and a forward narrative
    anchored in the FortoLabs AI initiative; operating metrics (revenue, ARR, gross margin, runway, headcount) are not publicly
    disclosed and require direct private diligence.
sections:
- id: s1
  title: Identity, Headquarters and Stage
  body: Forto is a privately held German digital freight forwarder headquartered in Berlin, registered as Forto Logistics
    SE & Co. KG and active in global ocean, air, road, rail and customs services. The company was founded in 2016 in Berlin
    as FreightHub by Michael Wax and co-founders, and rebranded to Forto in 2020 to signal its evolution from a freight brokerage
    marketplace into an end-to-end digital forwarder operating its own logistics cloud. Across its public marketing surfaces
    the company advertises offices in Berlin, Hamburg, Frankfurt, Amsterdam, Zurich, Singapore, Shanghai, Hong Kong and Shenzhen,
    although the precise number of currently staffed locations after the 2023 restructuring is not consistently corroborated
    by independent sources. The product is positioned as a single online platform on which European Mittelstand exporters
    and importers can quote, book, document and track multi-modal shipments with carbon-emissions reporting; the customer-facing
    brand explicitly emphasises real-time visibility and a simplified user experience versus traditional incumbent forwarders.
  claimRefs:
  - CO001
  - CO002
  - CO005
  - CO017
  tableRefs:
  - TO001
- id: s2
  title: Founders, Leadership and Governance
  body: Forto was co-founded by Michael Wax (current CEO), Erik Muttersbach (co-founder, historically associated with the
    CTO function) and the Heilemann brothers (Ferry and Fabian), all of whom were active in the European startup ecosystem
    prior to founding FreightHub in 2016. Michael Wax has remained CEO continuously through the 2021 unicorn round, the 2022
    SoftBank-led round and the 2023 restructuring, making him the dominant key-person within the company. The corporate vehicle
    is a German SE & Co. KG limited partnership with a corporate general partner — a governance form widely used in German
    growth-stage businesses that limits public disclosure relative to a stock corporation but still provides Handelsregister-level
    transparency on shareholders and managing directors. Subsequent leadership succession in operating roles (CTO, CFO, COO)
    has occurred but is not consistently dated in public sources; current full executive composition is best confirmed via
    direct company disclosure rather than third-party databases.
  claimRefs:
  - CO003
  - CO004
  - CO018
  - CO026
  - CO027
  tableRefs:
  - TO002
- id: s3
  title: Funding History, Valuation and Capital Structure
  body: 'Forto''s disclosed capital trajectory is concentrated in two large rounds: a $240 million Series C in June 2021 at
    a reported $1.1 billion valuation that conferred unicorn status, and a follow-on round in March 2022 of approximately
    $250 million at a reported $2.1 billion valuation. Both rounds were led by SoftBank Vision Fund 2, with participation
    from a syndicate that across earlier rounds included Northzone, Cherry Ventures, Citi Ventures, G Squared and others;
    cumulative disclosed equity raised is in the range of approximately $590-620 million per third-party databases. There
    is no publicly disclosed evidence of a material new primary equity round in 2024 or 2025; any subsequent secondary, bridge,
    debt or convertible activity is not on the public record and would have to be sourced directly from the company. Because
    Forto is a German limited partnership with no listed securities, investors must rely on Handelsregister filings for ownership
    disclosure and on PitchBook / CB Insights estimates for indicative valuation marks rather than audited public statements.'
  claimRefs:
  - CO006
  - CO007
  - CO008
  - CO009
  - CO022
  - CO025
  tableRefs:
  - TO003
- id: s4
  title: Cover Metrics, Public Gaps and Restructuring
  body: Headline cover metrics for Forto are bifurcated between corroborated capital-structure facts (rounds, valuation, lead
    investor) and undisclosed operating metrics (revenue, ARR, gross margin, cash runway, headcount). There is no audited
    financial filing in the public domain, and revenue and unit-economics estimates from data brokers are not primary sources
    and should be flagged as low confidence. On the adverse side, Forto announced a significant restructuring in 2023 that
    was reported across both English-language tech press and German trade outlets such as DVZ and Tagesspiegel; trade-press
    coverage at the time placed staff impact at 200+ but the company has not formally confirmed the figure. The 2022 round
    closed at the peak of the pandemic-era container freight rate cycle — Drewry's WCI and Maersk reporting both show the
    spot rate index falling more than 75% between mid-2022 and mid-2023, which is the principal external driver behind the
    2023 cost-base reset and an important consideration for valuation diligence. Forward strategy explicitly cites an AI initiative
    branded FortoLabs as a 2025-2026 differentiator, but no third-party revenue or pipeline confirmation exists for this initiative
    as of the report runDate.
  claimRefs:
  - CO011
  - CO012
  - CO013
  - CO016
  - CO019
  - CO024
  - CO028
  - CO036
  - CO038
  - CO040
  tableRefs: []
  figureRefs:
  - FO003
- id: s5
  title: Milestone Chronology
  body: 'Forto''s milestone arc spans from 2016 founding to 2026-current independent operations. Major dated checkpoints are:
    2016 founding as FreightHub in Berlin; 2018-2020 successive Series A/B rounds with Northzone, Cherry Ventures and other
    European VCs; 2020 rebrand from FreightHub to Forto; June 2021 Series C of $240M at $1.1B valuation (unicorn status, SoftBank
    lead); March 2022 follow-on of $250M at $2.1B valuation; 2023 multi-tranche restructuring and material headcount reductions;
    2024 reported tuck-in product/asset acquisitions to consolidate visibility and customs offering; 2025 launch of FortoLabs
    AI initiative; 2026 ongoing operations with no publicly confirmed new primary round. The 2023 layoff event is the most
    material adverse milestone, set against a backdrop of industry-wide forwarder margin compression as ocean spot rates collapsed
    from 2022 highs. Investor-tracking databases continue to monitor Forto in late-stage venture pipelines, but the company
    is not flagged as a near-term IPO candidate in available 2026 pipeline reports.'
