  - TI002
  - TI003
  figureRefs:
  - FI001
  - FI002
- id: s3
  title: Capital adequacy and runway
  body: 'Cumulative disclosed equity raised by Forto across all rounds is approximately $590-620 million per third-party databases
    — the binding capital-structure constraint until any new round is publicly disclosed. SoftBank Vision Fund 2 is the largest
    equity holder and lead of both the 2021 ($240M) and 2022 ($250M at $2.1B post-money) rounds. The 2022 round closed at
    peak freight rates, meaning the equity was raised against unit economics that have not been replicated since. Capital
    adequacy estimate: at $590-620M cumulative raise with a multi-year burn through 2023-2025, residual cash runway as of
    2026 is materially diminished and a precise figure requires data-room access. Bridge financing or convertible note activity
    in 2024-2025, if any, is not on the public record; non-disclosure is itself a yellow flag for diligence. Cap-table dilution
    risk: any 2026 down-round at $1.0-1.5B versus the $2.1B prior mark would materially reset the preferred-stack waterfall
    — relevant to common-stock valuation in chapter 8.'
  claimRefs:
  - CI005
  - CI006
  - CI011
  - CI017
  - CI019
  - CI022
  - CI023
  - CI027
  tableRefs:
  - TI004
  figureRefs:
  - FI003
  - FI004
- id: s4
  title: Financial gaps and diligence asks
  body: Public financial gaps include revenue, ARR, gross margin, EBITDA, cash balance, runway, ARR per FTE, customer count,
    average revenue per customer, churn and dilution-adjusted ownership table — none are publicly disclosed in 2026. Conflicting
    third-party revenue estimates from PitchBook, CB Insights, Tracxn and Dealroom each give a different mid-€100M revenue
    range with poor convergence; figures should be treated as low-confidence triangulation. The Rule-of-40 framework cannot
    be computed for Forto without revenue disclosure. A defensible bridge-to-profitability scenario assuming €120-180M revenue
    at 14% gross margin (€17-25M GP) and €70-100M opex implies Forto would need >50% revenue growth or material opex cuts
    to reach break-even. Investor narrative around digital freight in 2026 has shifted from growth-at-all-cost to capital
    efficiency; Forto's communication emphasizes restructuring effects and AI productivity. The three highest-priority financial
    diligence asks are (1) Bundesanzeiger filings for the operating entity, (2) audited management accounts under NDA, (3)
    ownership/dilution table including any post-2022 secondary or convertible activity.
  claimRefs:
  - CI007
  - CI018
  - CI024
  - CI025
