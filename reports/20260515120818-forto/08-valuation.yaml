- id: s2
  title: Thesis, anti-thesis and adverse-bias view
  body: 'Counter-argument (anti-thesis): German Mittelstand exporter density and CSRD/CBAM tailwind argue for re-engagement
    at deal-stage diligence. Conflicting: company communications imply continued growth narrative while peer Bloomberg / Sifted
    coverage points to broader multiple reset across the cohort. Adverse: 2024 Bloomberg coverage of the Flexport down round
    signaled material valuation reset across digital-freight-forwarder peer set. Adverse: Sifted/Handelsblatt restructuring
    coverage suggests structural cost-base pressure that limits margin upside in base case. Comparable Sennder (German digital
    road forwarder) reported a 2023 down round, narrowing the implied 2026 multiple band for German digital forwarders. Project44
    latest reported valuation centers visibility-software multiples at 5-10x revenue, reinforcing that visibility-only is
    a different multiple bucket than full forwarding. Convoy (US digital trucking) shutdown in 2023 is a tail-risk anchor
    for asset-light forwarding investment thesis.'
  claimRefs:
