chapter:
  number: 7
  title: Risks
  summary: 'Forto''s risk surface is dominated by EU regulatory regimes (UCC, ATLAS, CBAM, GDPR), carrier and visibility-partner
    concentration, AWS single-cloud lock-in, and execution overhang from the 2024 restructuring (pace-of-change, senior-exec
    retention, capital runway). Cybersecurity exposure is sector-level. Macro freight-rate volatility is the most material
    2026 operating risk. Public adverse-bias references (openjur, CISA, Kununu/Glassdoor, Sifted/Handelsblatt) confirm the
    diligence picture but do not surface concrete adverse litigation. Disclosure gaps (status page, CO2 audit, top-customer
    concentration, cyber insurance) dominate the standalone risk surface and frame the data-room ask list. Kill criteria for
    the thesis: regulatory enforcement event, material breach with extended downtime, top-customer churn, or capital event
    without growth.'
sections:
- id: s1
  title: Regulatory and legal risk register
  body: Forto operates inside the EU customs/regulatory perimeter (Union Customs Code, ATLAS in Germany), making customs compliance
    a permanent gating regulatory exposure. CBAM (EU Carbon Border Adjustment Mechanism) introduces declaration obligations
    for EU importers from 2026, materially expanding scope for forwarder-supported reporting. ATLAS protocol changes by German
    customs periodically force forwarder integration updates; missed updates are a customs-clearance risk. BaFin oversight
    is not directly engaged today but would apply if Forto launches embedded trade finance/insurance, broadening regulatory
    perimeter. GDPR is a permanent compliance regime for any EU-resident shipper data and platform telemetry, with material
    fine exposure. Public openjur search does not surface significant publicized adverse litigation against Forto; absence
    is conservative-to-favourable but not exhaustive. Bundesanzeiger filings indicate standard German GmbH disclosure obligations;
    specific liability filings against Forto have not been publicly indexed. Sanctions/dual-use trade compliance and AML/KYC
    obligations on roadmap finance modules sit on the regulatory risk surface alongside EU Whistleblower Directive employment-law
    obligations and standard German transfer-pricing risk.
  claimRefs:
  - CR001
  - CR002
  - CR003
  - CR004
  - CR005
  - CR006
  - CR007
  - CR018
  - CR024
  - CR025
  - CR036
  - CR037
  tableRefs:
  - TR001
  figureRefs: []
- id: s2
  title: Operational, quality and security risk register
  body: 'Cybersecurity exposure is a category-level risk for any logistics SaaS; CISA advisories repeatedly flag logistics-platform
    compromises as a sector concern. Maritime / freight macro events (Suez closures, Red Sea diversions, port congestion)
    are external risk events that propagate to Forto via carrier outages and rate volatility. Allianz and sector reports flag
    freight-rate volatility as the most material 2026 macro risk for forwarders. Forto does not publicly publish a security
    white paper or status page; operational incident transparency is a diligence gap. Macro freight-rate downturn compresses
    revenue per shipment and pressures gross margin, while rate upturn from Suez/Red Sea events drives volatility in cost-of-revenue
    if hedging is imperfect. Cyber-insurance coverage and breach-response plans are not publicly disclosed; standard for B2B
    SaaS but a diligence ask. Reputation/PR risk is also material: a visible service outage during peak season would erode
    shipper trust quickly. Insurance and professional-indemnity coverage is industry-standard for forwarders; Forto''s specific
    coverage is not publicly disclosed.'
  claimRefs:
  - CR008
  - CR009
  - CR010
  - CR011
  - CR019
  - CR020
  - CR026
  - CR031
  - CR038
  - CR039
  tableRefs:
  - TR002
  figureRefs:
  - FR001
- id: s3
  title: Partner / dependency risk register
  body: 'Carrier-dependency risk: Forto sources capacity from a finite carrier set; concentration on a few ocean carriers
    is a contractual risk. Visibility-partner dependency: project44/Shippeo/CargoSnap class platforms feed tracking quality
    and a partner outage or pricing change is a service risk. AWS dependency adds single-cloud lock-in risk; AWS region failures
    would disrupt Forto''s platform. ATLAS dependency means customs platform availability is a hard external dependency; Zoll
    regression or planned downtime impacts customers. Mitigations include CBAM regulatory readiness signaled in Forto''s sustainability
    roadmap (execution scope is the open question), AWS multi-region failover (not publicly confirmed), visibility-partner
    redundancy across project44/Shippeo/CargoSnap (not publicly disclosed) and people retention via equity refresh and management
    continuity (not publicly detailed). The partner-dependency map is not unusual for a digital forwarder, but the absence
    of disclosed redundancy and SLA evidence is the substantive diligence gap.'
  claimRefs:
  - CR014
  - CR015
  - CR016
  - CR017
  - CR027
  - CR028
  - CR029
  tableRefs:
  - TR003
  figureRefs:
  - FR002
  - FR003
- id: s4
  title: People-execution risk and mitigation register
  body: 'Adverse 2024 Sifted/Handelsblatt restructuring coverage flagged execution risk and concentrated layoffs in non-engineering
    functions, while Kununu and Glassdoor employee reviews note pace-of-change and management turnover signal. Founder/CEO
    transition risk and senior-executive retention remain watchpoints for any restructured scaleup. Capital-runway risk: the
    2024 valuation reset implies sensitivity to next financing round timing and dilution. Concentration risk on top-10 customers
    is undisclosed but prudently assumed at >40% of revenue (European mid-market norm). Kill criteria for the investment thesis
    include: regulatory enforcement event, material breach with extended downtime, loss of a top customer, or capital event
    without accompanying growth. Strategic risk from Flexport / DSV / DHL pressure compresses pricing and accelerates feature
    parity in customs/visibility. Adverse-bias headline diligence asks: independent audit of CO2 methodology, public status
    page, ISO 27001 certificate, top-customer concentration, capital runway and management continuity plan. These asks frame
    the deal-stage data-room request and are individually tractable for a mid-market diligence cycle.'
  claimRefs:
