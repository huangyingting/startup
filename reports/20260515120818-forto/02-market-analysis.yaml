chapter:
  number: 2
  title: Market Analysis
  summary: European freight forwarding TAM is approximately €370B in 2026 with a digital-addressable SAM of roughly €60-90B
    and a defensible 5-year SOM in the €15-25B range; the digital forwarder sub-segment is <5% of total spend and grows mid-single-digits
    ex-pandemic, against a backdrop of ~50% depressed Drewry WCI vs the 2022 peak. EU CSRD/CBAM regulation creates structural
    demand for embedded emissions reporting (a Forto strength) while DSV-DB Schenker consolidation and 12-16% industry gross
    margins constrain economics. Multi-lens sizing is required and conflicting analyst CAGR forecasts (15-20% bullish vs <8%
    normalized) must be reconciled before underwriting.
sections:
- id: s1
  title: Market Definition and Mode Mix
  body: The relevant market for Forto is global freight forwarding, with a primary geographic focus on Europe and a service
    mix spanning ocean, air, road, rail and customs services. The market boundary explicitly includes brokered multi-modal
    shipments and value-added services such as visibility and customs declaration, but excludes pure asset-heavy ocean or
    air carrier capacity (Maersk, Lufthansa Cargo) and excludes contract logistics warehousing. Status-quo substitutes that
    Forto's digital model displaces include traditional NVOCC brokers, EDI-driven incumbent portals at DHL/Kuehne+Nagel/DSV,
    and in-house shipper TMS deployments. The buyer segment most exposed to substitution is the European Mittelstand mid-market
    exporter/importer, whose annual freight spend sits in the €0.5-5M range and who lacks the procurement scale to negotiate
    enterprise-grade incumbent contracts. Adjacent categories that Forto could expand into include trade finance, freight
    insurance, and supply-chain analytics, all of which sit outside the core forwarding TAM but are common upsell paths for
    digital forwarders.
  claimRefs:
  - CM001
  - CM002
  - CM005
  - CM017
  - CM018
  tableRefs:
  - TM001
  figureRefs: []
- id: s2
  title: TAM, SAM and SOM Triangulation
  body: Sizing the addressable market for Forto requires triangulating across three lenses to avoid the single-number TAM
    trap. The top-down lens places global freight forwarding revenue in the $300-360 billion range in 2026 per Statista, McKinsey
    and Transport Intelligence; the European subset is approximately €350-400 billion. A digitally-addressable SAM lens —
    restricting to mid-market shippers in Europe and Asia accessible via digital channels — sizes at roughly €60-90 billion,
    of which a defensible bottom-up SOM in a 5-year horizon is €15-25 billion. A peer-revenue lens triangulates from public-company
    forwarder revenue (DSV ~$25B, Kuehne+Nagel ~$20B, DHL Forwarding ~$25B) and digital-native peers (Flexport reported run-rate
    ~$2-3B at peak); this gives upper-bound implied digital share of <5%. The three lenses converge on the conclusion that
    digital forwarder penetration of European mid-market spend is below 25% in 2026, leaving substantial residual penetration
    runway, but that ex-pandemic growth rates are likely settled in the low-to-mid single digits rather than the double-digit
    narrative in 2021 pitch decks.
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM009
  - CM014
  - CM015
  - CM023
  - CM024
  - CM029
  - CM034
