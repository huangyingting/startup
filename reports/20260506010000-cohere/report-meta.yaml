companyProfile:
  summary: "Cohere is a Canadian AI company founded in 2019 by Aidan Gomez, Nick Frosst, and Ivan Zhang — three researchers whose pedigree traces to the landmark 'Attention Is All You Need' Transformer paper (Google Brain, 2017). Cohere builds and commercializes enterprise-grade large language models with a distinctive emphasis on sovereign private deployment: customers run Cohere models entirely within their own infrastructure, satisfying data residency, GDPR, and sector-specific compliance requirements that public cloud AI APIs cannot meet. The company reached $240M ARR by end of 2025 across an estimated 400–600 enterprise accounts, raised $975M+ across Series A–D, and completed the acquisition of Aleph Alpha to anchor its EU sovereign AI position."
  foundedDate: "2019-01-01"
  founders:
    - name: "Aidan Gomez"
      role: "CEO and Co-founder"
      background: "Co-author of 'Attention Is All You Need'; former Google Brain researcher"
      claimRefs: []
    - name: "Nick Frosst"
      role: "Co-founder"
      background: "Former Google Brain researcher; machine learning researcher"
      claimRefs: []
    - name: "Ivan Zhang"
      role: "CTO and Co-founder"
      background: "University of Toronto; led Cohere's technical architecture"
      claimRefs: []
  foundingLocation: "Toronto, Ontario, Canada"
  headquarters: "Toronto, Ontario, Canada (with offices in London, San Francisco, New York)"
  productSummary: "Command A (111B MoE model, 256k token context, multilingual), Embed v3 (multilingual retrieval), Rerank (search result relevance), and North (enterprise AI platform with RAG orchestration, access controls, agent workflows, and 100+ connector integrations). All products support private on-premises deployment."
  customerFocus: "Enterprise accounts (Global 2000) in financial services, healthcare, government, legal, manufacturing, and technology sectors; APAC distribution via Fujitsu (Japan) and LG CNS (Korea); EU expansion via Aleph Alpha."
  businessModel: "SaaS subscription (platform ACV $500K–$5M+); per-token API pricing for Command/Embed/Rerank; professional services for private deployment. Revenue mix shifting toward North platform subscriptions with higher gross margin."
  stage: "Series D — $500M at $7B valuation (November 2024)"
  fundingStatus: "Series D closed at $7B valuation (November 2024). Investors include: PSP Investments, Inovia Capital, Index Ventures, Radical Ventures, Oracle (strategic), Salesforce Ventures, NVIDIA (strategic). Total raised: ~$975M."
  disclosureProfile: private-disclosed
