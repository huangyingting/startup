          - type: callout
            title: High-Margin ACV Model With Strategic Co-Selling Partners Is Rare at Series E Stage
            body: >
              The combination of (1) 85% enterprise ACV revenue (high-predictability, high-margin), (2) strategic
              investors who are simultaneously distribution partners (Oracle Cloud, NVIDIA DGX, Salesforce CRM, Cisco
              networking), and (3) a differentiated private-deploy product that incumbents cannot trivially replicate is
              unusual for a company at Cohere's stage. This combination suggests a path to profitable unit economics at
              scale that is more credible than pure API consumption models. The co-selling partnership structure
              effectively subsidises Cohere's enterprise GTM, allowing the company to punch above its weight in
              large-enterprise accounts relative to its direct sales headcount.
