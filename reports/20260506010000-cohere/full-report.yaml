companyProfile:
  summary: >-
    Cohere is a Canadian AI company founded in 2019 by Aidan Gomez, Nick Frosst, and Ivan Zhang — three researchers
    whose pedigree traces to the landmark 'Attention Is All You Need' Transformer paper (Google Brain, 2017). Cohere
    builds and commercializes enterprise-grade large language models with a distinctive emphasis on sovereign private
    deployment: customers run Cohere models entirely within their own infrastructure, satisfying data residency, GDPR,
    and sector-specific compliance requirements that public cloud AI APIs cannot meet. The company reached $240M ARR by
    end of 2025 across an estimated 400–600 enterprise accounts, raised $975M+ across Series A–D, and completed the
    acquisition of Aleph Alpha to anchor its EU sovereign AI position.
