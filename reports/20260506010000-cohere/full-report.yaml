  - id: F804
    title: Investment KPIs — IC-Ready Scoring
    type: kpi
    layout: standard
    summary: >-
      Eight key investment dimensions scored 0–10. Cohere scores strongly on market opportunity (9), management (8), and
      product differentiation (8), but is constrained by risk profile (5) and valuation margin of safety (5). Composite
      score of 6.9/10 supports a conditional invest recommendation.
    data:
      items:
        - label: Market Opportunity
          value: 9
          detail: $130–150B enterprise LLM TAM by 2030; sovereign AI a $30B+ segment; Cohere well-positioned
        - label: Product Differentiation
          value: 8
          detail: North platform + private deploy moat; 256k context; multilingual; genuinely enterprise-grade
        - label: Commercial Proof
          value: 7
          detail: $240M ARR at ~400–600 enterprises; 8+ Fortune 500 named accounts; but NRR undisclosed
        - label: Management Team
          value: 8
          detail: Aidan Gomez (Attention Is All You Need co-author); strong co-founders; key-person risk identified
        - label: Financial Efficiency
          value: 6
          detail: 80%+ gross margin on platform; high compute burn; profitable path unclear before $500M ARR
        - label: Risk Profile
          value: 5
          detail: >-
            Copyright litigation (material); key-person; open-source substitution; Azure OAI parity — 4 concurrent risk
            vectors
        - label: Valuation / Entry
          value: 5
          detail: >-
            29x ARR — within comp set but thin margin of safety; 1.67x probability-weighted return is below median VC
            target
        - label: Evidence Quality
          value: 7
          detail: >-
            Strong for product and fundraising; weak for financials (NRR, CAC, burn undisclosed); legal exposure
            partially quantifiable
    claimRefs:
      - C309
      - C310
      - C311
