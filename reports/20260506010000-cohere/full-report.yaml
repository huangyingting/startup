      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Cohere has raised approximately $1.7 billion in total venture and strategic financing since its 2019
              founding. The company has completed six primary funding events. It began with a $2 million seed from
              Radical Ventures in 2020. A $40 million Series A followed in 2021, co-led by Index Ventures and Tiger
              Global with participation from Google, OMERS, and others. A $125 million Series B closed in 2022. In June
              2023, Inovia Capital led a $270 million Series C at a $2.2 billion post-money valuation; by August 2023, a
              further secondary transaction lifted the implied valuation to approximately $3 billion. In 2024, PSP
              Investments — a major Canadian pension manager — led a $500 million Series D at a $5.5 billion valuation,
              with strategic participation from Cisco, Fujitsu, AMD Ventures, Oracle, Salesforce Ventures, NVIDIA, and
              Export Development Canada. In August 2025, Radical Ventures and Inovia Capital co-led a $500 million
              Series E at $6.8 billion, also backed by AMD, NVIDIA, PSP, and Salesforce. A $100 million extension round
              in September 2025 from BDC and Nexxus Capital brought the valuation to $7 billion. Cohere has not
              announced debt financing or credit facilities as of May 2026. Secondary transactions have occurred but
              exact amounts and sellers are undisclosed. The investor roster is notably strategic: NVIDIA, AMD, Oracle,
              Salesforce, and Cisco collectively represent Cohere's go-to-market ecosystem, and their repeat
              participation signals high confidence in Cohere's enterprise positioning.
            claimRefs:
              - C013
              - C021
              - C022
              - C011
              - C012
              - C041
      - number: '1.4'
        title: Growth Milestones and Trajectory
        blocks:
          - type: paragraph
            body: >
              Cohere's trajectory can be divided into three phases. Phase 1 (2019–2022): founding, early model
              development, and the launch of a public API with text generation, embedding, and classification endpoints.
              Cohere's multilingual Embed model covering 100+ languages differentiated it from OpenAI's English-centric
              offering. Phase 2 (2023–2024): pivot to enterprise-first private deployments. As ChatGPT and Claude scaled
              consumer/developer attention, Cohere repositioned around regulated-sector enterprise clients unwilling to
              route sensitive data through public clouds, securing multi-year contracts with Oracle, RBC, Fujitsu, LG
              CNS, Dell, SAP, and others. ARR grew from $13 million at end-2023 to $100 million by May 2025 — a ~7×
              increase in 17 months. Phase 3 (2025–present): platform expansion and international growth. The North
              agentic AI platform launched in January 2025, moving Cohere up the stack from foundation models to
              enterprise workflow automation. International revenue share grew from ~15% to ~45% in under a year, led by
              Fujitsu in Japan and LG CNS in Korea. In May 2025, Cohere acquired Ottogrid (Vancouver, enterprise market
              research automation). The company signed government AI partnerships with Canada and the UK in June 2025.
              In April 2026, Cohere announced discussions to acquire Aleph Alpha of Germany, which would extend its
              European sovereign-cloud footprint significantly. A copyright infringement lawsuit filed by a coalition of
              major news publishers in February 2024 (including Condé Nast, Forbes, The Guardian, and the LA Times)
              survived Cohere's motion to dismiss in November 2025 and represents a material ongoing legal risk.
