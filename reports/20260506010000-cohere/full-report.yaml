    title: Valuation Sensitivity — ARR Multiple Scenarios
    type: bar
    layout: standard
    summary: >-
      Sensitivity of Cohere's implied enterprise value to different NTM ARR multiples, anchored at $240M ARR (2025) and
      projected $380M ARR (2026E). Current $7B valuation implies 29x on FY2025 ARR or approximately 18x on 2026E ARR.
    data:
      items:
