  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Segmentation
        blocks:
          - type: paragraph
            body: >
              Cohere's enterprise customer base is organised into three primary verticals: financial services (banking,
              insurance, asset management), technology and professional services, and government and defence (sovereign
              AI deployments). Within these verticals, Cohere targets accounts where data sovereignty, multilingual
              capability, or regulatory compliance make public cloud LLM APIs unacceptable — effectively the most
              stringent enterprise AI buyers, who also tend to be the highest-ACV accounts.


              Publicly named customers include: Oracle (which has also made a strategic investment and provides OCI
              infrastructure for Cohere deployments), Fujitsu (enterprise IT services, Japan), LG CNS (Korean enterprise
              IT services), RBC Royal Bank of Canada (financial services), Dell Technologies, SAP (enterprise software
              integration), Ensemble Health Partners (US healthcare revenue cycle management), and Bosch (German
              industrial and automotive). These accounts span North America, Europe, and Asia-Pacific, reflecting
              Cohere's early international enterprise footprint.


              The financial services vertical appears to be Cohere's primary revenue driver: regulated financial
              institutions (banks, insurance companies, asset managers) face strict data residency requirements that
              prevent them from using public cloud LLM APIs from OpenAI or Anthropic, making Cohere's private-deployment
              model the only viable commercial LLM alternative to building and fine-tuning their own models. This
              vertical is also the highest-ACV segment, with large banks spending $1M+ annually on enterprise AI
              platforms.
            claimRefs: []
      - number: '6.2'
        title: Customer Adoption, Expansion, and Retention
        blocks:
          - type: paragraph
            body: >
              Cohere's go-to-market motion is predominantly direct enterprise sales, augmented by strategic channel
              partners (Oracle, Salesforce, Cisco, AMD, NVIDIA). The typical customer journey begins with a
              proof-of-concept deployment of Cohere Command or Embed for a specific use case (document search, customer
              service, compliance reporting), followed by a production ACV contract, and then expansion to additional
              use cases, product lines (Embed + Rerank + Command combined), or additional business units within the same
              enterprise. This land-and-expand pattern is consistent with best-in-class enterprise SaaS GTM.


              Multi-product adoption is the primary evidence of customer health: customers who deploy Embed + Rerank for
              RAG alongside Command for generation, and then add North for workflow orchestration, have high switching
              costs and are unlikely to churn — they have integrated Cohere's product stack into their production AI
              infrastructure. Fujitsu, for example, is cited as having deployed multiple Cohere products for enterprise
              customers in Japan, suggesting both multi-product use and reseller/system integrator leverage.


              DAU/MAU ratios for Cohere's enterprise platform are reportedly approximately 40%, which is high for
              enterprise software (typical for SaaS tools used daily rather than occasionally) and suggests active,
              production-grade deployment rather than evaluation or pilot usage. This metric, while not officially
              disclosed, has been cited in analyst reports as evidence of genuine customer engagement.
            claimRefs: []
      - number: '6.3'
        title: Customer Risks, Concentration, and Diligence Gaps
        blocks:
          - type: paragraph
            body: >
              Cohere's primary customer risk is revenue concentration: at $240M ARR with an estimated 400–600 enterprise
              accounts, the average account is generating approximately $400K–$600K per year, but the distribution is
              almost certainly skewed with the top 10–20 accounts representing a disproportionate share of ARR. If even
              2–3 large accounts representing $10M+ in combined ARR fail to renew (due to budget cuts, regulatory
              changes, competitive switching, or the copyright lawsuit's procurement chilling effect), ARR growth could
              reverse or stall.


              The pending copyright lawsuit (Condé Nast, Forbes, Guardian, and others, SDNY) has emerged as a customer
              procurement concern for some regulated-industry buyers, particularly those with legal counsel advising
              caution on AI vendors facing unresolved copyright litigation. The motion to dismiss was denied in November
              2025, meaning the case will proceed to discovery, prolonging the uncertainty. This is a competitive risk
              that Cohere's sales team must address in enterprise procurement processes.


              Key evidence gaps for customer diligence: (1) NRR by cohort is undisclosed; (2) actual customer count and
              revenue concentration data are not available; (3) no public win/loss analysis comparing Cohere's success
              rate against Azure OpenAI, Anthropic, and open-source alternatives in enterprise RFPs; (4) customer
              satisfaction scores (CSAT/NPS) are not publicly reported. These gaps must be addressed through management
              presentations and NDA data sharing in Series E due diligence.
            claimRefs: []
      - number: '6.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Named Enterprise Anchors Provide Credible Reference Coverage for Sales
            body: >
              Cohere's public customer list spans three continents and multiple verticals: Oracle (technology, US),
              Fujitsu (IT services, Japan), LG CNS (Korea), RBC Royal Bank (financial services, Canada), Ensemble Health
              (healthcare, US), Bosch (industrial, Germany), SAP (enterprise software, EU), and Dell (hardware, US).
              This geographic and vertical diversity provides Cohere's enterprise sales team with a credible reference
              set for cross-vertical and cross-regional sales conversations. Oracle's and SAP's presence as both
              customers and distribution partners is particularly valuable — Oracle's OCI customer base and SAP's 400K+
              enterprise customer base represent enormous potential Cohere distribution leverage that is not reflected
              in the current ARR run rate.
            calloutType: strength
            claimRefs:
              - C201
              - C205
              - C206
              - C220
          - type: callout
            title: Revenue Concentration in Top Accounts and Copyright Litigation Are the Two Material Customer Risks
            body: >
              The combination of (1) estimated 40–60% of ARR concentrated in the top 10 enterprise accounts, and (2) the
              ongoing Condé Nast copyright lawsuit proceeding to discovery (motion to dismiss denied November 2025)
              creates two material customer risks. Revenue concentration is structural at Cohere's stage and ACV model —
              the company needs 3–5 years of customer base diversification to reduce this risk. The copyright litigation
              risk is more acute: enterprise legal counsel at regulated financial institutions, healthcare companies,
              and government entities are notoriously risk-averse about AI vendors with unresolved copyright claims, and
              the case's progression to discovery phase means the uncertainty will persist through at least 2026–2027.
            calloutType: risk
