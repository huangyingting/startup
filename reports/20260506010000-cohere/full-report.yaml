            title: Best-in-Class Retrieval Models Create a Sticky Technical Moat
            body: >
              Cohere's Embed and Rerank models are independently recognised as among the best enterprise retrieval
              models available — a capability distinct from generative model benchmarks. RAG (retrieval-augmented
              generation) architecture is the dominant enterprise LLM deployment pattern, meaning Cohere's retrieval
              models can be embedded in enterprise AI pipelines regardless of which generative model the enterprise uses
              for generation. This creates a second penetration vector into enterprise accounts that competitors cannot
              easily replicate, because retrieval model quality is separate from generative model benchmarks and
