  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Unit Economics
        blocks:
          - type: paragraph
            body: >
              Cohere operates a hybrid revenue model with two primary streams: (1) private and on-premises deployment
              licensing under annually contracted value (ACV) enterprise agreements, and (2) a consumption-based API
              tier (Cohere API and Coral platform) billed per million tokens. The private deployment model represented
              approximately 85% of Cohere's reported revenue as of 2025, reflecting the company's deliberate
              go-to-market focus on regulated enterprise customers (financial services, healthcare, government, defence)
              who require data sovereignty and air-gapped or VPC deployment. The API tier, though growing, remained a
              smaller portion of revenue.


              Enterprise ACV contracts are multi-year agreements (typically one to three years) for access to Cohere
              models deployed on customer infrastructure or dedicated VPC environments, along with enterprise support,
              SLA guarantees, and access to fine-tuning services. The average contract size is estimated in the range of
              $500,000 to $5 million+ annually for large regulated-industry customers, though Cohere does not disclose
              contract specifics. Revenue growth from $100M estimated ARR (mid-2024) to approximately $240M (February
              2026) implies roughly 2.4x annual growth — consistent with a company scaling through enterprise contract
              expansion and new logo acquisition.


              Gross margins in the enterprise AI LLM space for model-as-a-service providers are estimated at 70–85%,
              driven by the significant difference between GPU inference cost (approximately $0.30–$1.50 per million
              tokens at scale using H100s) and customer billing rates ($2–$25 per million tokens for API tier, or much
              higher ACV rates for private deployment). For private deployment, Cohere's marginal cost per customer is
              primarily customer success, deployment support, and fine-tuning labour — a lower variable cost profile
              than API inference. Cohere is widely cited by industry analysts as targeting positive gross margins above
              70%, though profitability at the operating level is not expected before 2027 at earliest given ongoing
              model R&D and GTM investment.
            claimRefs: []
      - number: '4.2'
        title: Capital Structure and Funding History
        blocks:
          - type: paragraph
            body: >
              Cohere has raised approximately $1.7 billion in disclosed financing since its founding in 2019, across
              five primary rounds. The funding trajectory reflects a company that rapidly grew from research spin-out to
              enterprise-scale AI vendor, backed by a strategic investor syndicate that doubles as a commercial
              distribution network: NVIDIA (chip supply), Oracle (cloud infrastructure), AMD (hardware alternative to
              NVIDIA), Salesforce (CRM channel), and Cisco (enterprise networking and security). Each strategic investor
              provides commercial co-selling, distribution, and infrastructure value that supplements the financial
              capital.


              Total capital raised positions Cohere with an estimated two to three years of runway at current burn rates
              (speculative, as actual burn is not disclosed). The September 2025 $500M round at $6.8–7B valuation was
              the largest to date and brought in institutional investors including Inovia Capital and PSP Investments
              alongside strategic partners. Cohere's capital requirement is driven by: (1) GPU cluster costs for model
              training (estimated at $100–300M per large-model training run for frontier-class models), (2) enterprise
              sales team scaling (estimated 200–400 enterprise sales staff globally), and (3) infrastructure for serving
              private-cloud deployments.


              At $7 billion valuation and approximately $240M ARR, the ARR revenue multiple is approximately 29x. This
              compares to a 46.7x multiple reported by Sacra in October 2025 (calculated on $150M ARR at $7B valuation —
              implying Sacra's ARR estimate was lower than the February 2026 figure). Comparable private AI peers trade
              at 36–50x ARR multiples, suggesting Cohere is modestly undervalued relative to direct comparables, or
              reflects investor pricing of open-source commoditisation risk. Public SaaS comps with 70%+ gross margins
              and 100%+ growth trade at 15–25x ARR, confirming Cohere carries a significant private-AI premium over
              public SaaS valuations.
            claimRefs: []
      - number: '4.3'
        title: Financial Verdict and Diligence Gaps
        blocks:
          - type: paragraph
            body: >
              Cohere's financial profile presents a compelling growth story with significant execution risk. The company
              has achieved meaningful ARR scale ($240M) in a short time, with a high-margin revenue model (85% private
              deployment ACV) that is inherently more valuable than pure API consumption. Strategic investor alignment
              reduces commercial risk: NVIDIA, Oracle, AMD, Salesforce, and Cisco collectively provide co-selling
              channels to enterprise accounts that Cohere could not access independently.


              The primary financial risks are: (1) Revenue concentration — top 10 customers likely represent 40–60% of
              ARR (industry norm for enterprise software companies at this stage), creating churn risk if one or two
              large contracts are lost; (2) Capital intensity for model training — Cohere must continue investing in
              frontier model quality to maintain competitive parity, requiring either ongoing capital raises or eventual
              profitability; (3) Commoditisation pressure — if enterprise customers migrate to open-source alternatives
              (Llama 4, Mistral) or Azure OpenAI sovereign cloud, revenue growth could slow materially; (4) The absence
              of public financial data makes it impossible to independently verify gross margins, net dollar retention,
              CAC payback period, or operational leverage.


              For a VC at Series E or secondary/growth stage, the key financial diligence asks are: (1) Board-approved
              ARR, NRR, and gross margin data under NDA; (2) Customer contract schedule (top 20 customers by ACV,
              renewal dates, and retention history); (3) Fully loaded compute cost per dollar of revenue (GPU cluster
              CapEx + OpEx allocation); (4) Burn rate and runway to next financing or profitability event; (5) Revenue
              recognition policy for multi-year ACV contracts (upfront vs ratable).
            claimRefs: []
      - number: '4.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Revenue Concentration in Large Private-Deploy Contracts Creates Churn Exposure
            body: >
              Cohere's 85% revenue concentration in private deployment ACV contracts, while positive for margin profile,
              creates risk from contract concentration. Enterprise software companies at ARR scale of $100–300M
              typically have top-10 customers representing 30–60% of total ARR. If Cohere's private-deploy customer base
              is concentrated in a small number of very large contracts (as suggested by the regulated-industry focus),
              non-renewal of even two or three large accounts could materially impact ARR growth. Cohere has not
              disclosed NRR or retention metrics, which is the single most important unknown for underwriting the
              revenue quality.
            calloutType: risk
            claimRefs:
