  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitor Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Cohere competes across three tiers: (1) frontier model vendors with substantial enterprise sales
              capabilities — OpenAI (via Microsoft Azure and direct), Anthropic (via AWS Bedrock and direct), and Google
              (Vertex AI); (2) enterprise platform vendors that sit above the model layer — Microsoft Copilot,
              Salesforce Einstein AI, ServiceNow AI Platform, and IBM Watson; (3) open-source and self-hostable model
              providers — Meta (Llama family), Mistral AI, and the open-source community. A fourth emerging competitor
              is vertically focused enterprise AI platforms such as Writer (enterprise AI for content workflows) and
              Glean (enterprise AI search), which serve adjacent use cases but increasingly compete for the same AI
              platform budget.


              The competitive landscape is moving rapidly. In mid-2025, Anthropic overtook OpenAI as the top LLM
              provider for enterprises by usage share, holding approximately 32% of enterprise LLM usage vs OpenAI's
              ~25%, according to TechCrunch analysis. Google and Microsoft/Azure collectively hold the remaining share.
              Cohere, Writer, and other specialists are small in absolute market share but growing within
              regulated-industry niches.


              Cohere's stated positioning is "enterprise AI for regulated and sovereign deployments," which creates a
              semi-protected niche where OpenAI and Anthropic's primary public-cloud deployment model is a structural
              disadvantage. However, Azure OpenAI Service (Microsoft hosting OpenAI models in enterprise Azure
              environments, including sovereign cloud) is the clearest threat to this positioning, as it offers OpenAI
              model quality within the Microsoft enterprise ecosystem and compliant cloud infrastructure.
            claimRefs:
              - C088
              - C089
              - C090
              - C091
              - C092
      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              OpenAI is the market-shaping incumbent. Its GPT-4o model delivers state-of-the-art performance across
              text, code, vision, and audio modalities. Enterprise offerings include ChatGPT Enterprise
              ($30/user/month), the OpenAI API, and Azure OpenAI Service (Microsoft partnership providing enterprise
              deployment with SOC2, HIPAA eligibility, and FedRAMP compliance). OpenAI's context window is 128k–200k
              tokens depending on the model. It leads in developer ecosystem breadth, third-party integrations, and
              model capability benchmarks. Key limitation for Cohere: OpenAI models on shared cloud APIs create data
              privacy concerns that Cohere's private deployment solves. However, Azure OpenAI partially neutralises this
              by hosting OpenAI models in enterprise-owned Azure environments.


              Anthropic is the highest-threat direct competitor to Cohere in regulated industries. Its Claude Opus model
              leads in long-context (1M tokens), safety benchmarks, and is increasingly favoured by enterprise
              compliance teams. In mid-2025, Anthropic held 32% of enterprise LLM usage vs OpenAI's 25% per TechCrunch.
              Anthropic is available via AWS Bedrock and Google Cloud Vertex AI in addition to direct API access.
              Pricing (Claude Opus at $5/$25 per million tokens input/output) is premium. Anthropic lacks a true
              private/sovereign-cloud deployment option at the scale of Cohere's on-prem offering, but AWS GovCloud and
              Bedrock can serve regulated industries.


              Google (Vertex AI / Gemini) is the strongest competitor in cloud-native enterprise AI. Gemini 1.5 Pro
              supports 1M-token context windows, is deeply integrated into Google Workspace and Google Cloud, and is
              priced competitively ($2.50/$10 per million tokens). Google's enterprise AI platform (Vertex AI Agent
              Builder) covers agentic workflows. Weakness: Google is perceived as primarily a hyperscaler extension of
              its public cloud, not a sovereign/private-deployment vendor, though Google has launched sovereign cloud
              offerings.


              Microsoft (Azure OpenAI Service) is the most significant indirect competitor: it combines OpenAI model
              quality with Microsoft's enterprise relationships, Azure sovereign cloud offerings, and Copilot
              integration across Microsoft 365. Enterprise adoption of Azure OpenAI is accelerating, and Microsoft's
              enterprise sales force has far more reach than Cohere's direct sales team.


              Mistral AI is a European open-weight model vendor that explicitly targets the sovereign AI market with
              privacy-first, deployable models. Mistral's models (Mistral 7B, Mixtral 8x7B, Mistral Large) can be
              self-hosted with no licensing fees and are competitive with GPT-3.5-class performance. Mistral's European
              regulatory alignment (GDPR, EU AI Act) makes it a direct alternative to Cohere in European
              regulated-enterprise accounts.


              Meta (Llama family) distributes open-source LLMs (Llama 3.1, 3.2, 4 Scout/Maverick) under a license
              permitting commercial use for most enterprises. Llama models can be self-hosted on private GPU
              infrastructure, eliminating Cohere's licensing fees. However, enterprises adopting Llama must build their
              own fine-tuning, deployment, security, and operations infrastructure — a barrier that is Cohere's current
              advantage.
