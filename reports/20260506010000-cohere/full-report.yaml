        - label: 30x on 2026E ARR ($380M)
          value: 11400
          detail: Base case 2026 valuation — on-track growth with multiple compression
        - label: 35x on 2026E ARR ($380M)
          value: 13300
          detail: Base+ scenario — North platform premium maintained
        - label: 40x on 2027E ARR ($550M)
