  - id: TV003
    title: Bull / Base / Bear Scenario Table
    columns:
      - Scenario
      - ARR Assumptions
      - Exit Valuation
      - Gross Return (entry at $7B)
      - Key Risks
      - Probability Signal
    rows:
      - - Bull (25% probability)
        - $240M→$450M ARR by end 2026; $700M by 2028; 35x ARR multiple sustained by North platform premium
        - $18.7B in 2026; $24.5B by 2028 IPO
        - 3.5x gross / ~50% IRR (3-year hold)
        - Multiple expansion assumes no copyright adverse verdict; open-source fails to match Command A
        - ARR growth >75% in 2026 Q1–Q2; Fortune 500 new logo wins accelerating; North platform >60% of ARR
      - - Base (55% probability)
        - $240M→$380M ARR by end 2026; $550M by 2027; 30x ARR multiple
        - $16.5B in 2027; ~$11.4B net of 30% dilution
        - 1.6x gross / ~20% IRR (3-year hold)
        - ARR growth decelerates to 55–60% in 2026; copyright settlement $15–35M; NRR ~105%
        - Steady new logo adds 40–60 accounts per quarter; North platform expanding but not dominant
      - - Bear (20% probability)
        - ARR stalls at $200–250M in 2026–2027 due to copyright verdict + Azure OAI parity; 15x ARR multiple
        - $3.7B in 2026; ~$2.6B net of dilution
        - 0.37x gross / -30% loss (3-year hold)
        - Copyright damages >$50M; 3+ Fortune 500 customer losses to Azure OAI; NRR <95%
        - Zero new Fortune 500 wins in 2026 Q1; copyright case goes to trial with punitive damages exposure
    notes: >-
