        - ~20x ARR ($61.5B valuation)
        - Most direct private AI comp; enterprise and consumer; Claude models vs Command
        - Anthropic has broader consumer usage; higher safety spending reduces comparability
      - - Databricks (private, 2024)
        - $1.6B ARR
        - ~27x ARR ($43B valuation)
        - Data+AI platform; enterprise-only; strong NRR; comparable enterprise sales motion
        - Databricks is revenue-positive and has a broader data platform moat; Cohere is earlier-stage
      - - Glean (private, Jun 2025)
        - ~$200M ARR
        - ~36x ARR ($7.2B valuation)
        - Same valuation, similar ARR; enterprise AI search is adjacent to Cohere's RAG/North use cases
        - Single-product vs Cohere's multi-product; narrower TAM; no sovereign/private deployment moat
      - - Scale AI (private, 2024)
        - ~$750M ARR
        - ~19x ARR ($14B valuation)
        - AI data/infrastructure; enterprise-focused; not LLM provider but data services
        - Lower multiple reflects data services commoditization risk; different business model
      - - 'Palantir (public, NYSE: PLTR)'
        - $2.7B ARR (2025)
        - ~26x NTM revenue ($72B market cap)
        - Enterprise AI platform; government + commercial; public market pricing provides valuation floor
        - Palantir is profitable (GAAP); Cohere is not; government TAM focus differs from Cohere's commercial emphasis
      - - 'Snowflake (public, NYSE: SNOW)'
        - $3.5B product revenue (2025)
        - ~16x NTM revenue ($55B market cap)
        - Benchmark for enterprise data/AI platform at maturity; Cohere's potential public comp at $500M+ ARR
        - Snowflake's revenue growth has slowed to 25% YoY; earlier-stage Cohere trades at a premium
      - - Harvey AI (private, 2025)
        - ~$100M ARR
        - ~30x ARR ($3B valuation)
        - Vertical enterprise AI (legal); comparable ACV and growth stage; similar sovereign requirements
        - Narrow vertical (legal only) vs Cohere's horizontal enterprise; smaller TAM limits comparability
    notes: >-
      All ARR/revenue figures are estimates based on public sources; private company valuations are from disclosed
      fundraising rounds.
