  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Copyright adverse verdict
        - Trial damages >$50M or injunction on web-scraped training data
        - Gross margin permanently impaired; training data licensing adds $15–30M/year opex; enterprise trust eroded
        - Exit position; if pre-commitment, do not close until litigation resolved
      - - NRR below 100%
        - NRR disclosed below 100% in any annual cohort
        - Land-and-expand thesis broken; ARR growth dependent on new logos only; thesis reverts to growth-at-all-costs
        - Renegotiate entry price; add ratchet provision; require NRR improvement covenant
      - - Azure OAI sovereign parity
        - Azure launches FedRAMP High + private sovereign deployment matching Cohere North in UX and price
        - Primary moat eliminated for US market; European moat partially mitigated by EU AI Act
        - Increase scrutiny on APAC and EU revenue; re-weight exit to M&A (Oracle acquisition) rather than IPO
      - - Aidan Gomez departure
        - CEO resignation, health event, or material role change
        - Automatic thesis-break; institutional investors require CEO stability for IPO readiness
        - Exit position within 90 days of departure announcement unless board appoints credible CEO within 30 days
      - - ARR growth below 30% YoY for two consecutive quarters
        - Publicly disclosed or inferred from financing activity stall
        - Down-round risk becomes acute; multiple compression inevitable; $7B becomes ceiling not floor
        - Request Series E re-pricing; convert to secondary at discount before next financing
    notes: Kill triggers represent investment committee thresholds, not operational management guidance.
    claimRefs:
      - CV011
      - CV013
      - CV031
      - CV032
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Net Dollar Retention by cohort (2022–2025)
        - NRR is the single most important undisclosed metric; not available in public sources
        - NRR below 100% destroys the land-and-expand thesis; NRR above 120% would materially increase confidence
        - Cohere CFO; request NDA data room access before IC commitment
      - - Copyright litigation exposure assessment
        - Estimated settlement range, trial probability, and IP insurance coverage are not publicly disclosed
        - If exposure is $50–100M and uninsured, IRR analysis changes materially; may require reserve against investment
        - Outside IP litigation counsel; request indemnification structure and D&O insurance coverage
      - - FedRAMP authorization timeline
        - No public milestone disclosed; only 'in assessment' status available
        - FedRAMP is the gate to $8–10B federal TAM; if 24+ months away, ARR growth projection needs revision
        - Cohere VP Public Sector; request formal FedRAMP project plan with agency ATO partner
      - - Series E preference stack and anti-dilution terms
        - Series E term sheet not public; liquidation preference overhang from Series A–D unknown
        - Preference overhang can eliminate common equity value in down-round exit; must model dilution scenarios
        - Legal counsel review of capitalization table and Series E term sheet before commitment
      - - Aleph Alpha integration milestone plan
        - No public integration timeline or milestone disclosure post-acquisition
        - Integration failure would disrupt EU customer relationships and add $20–40M in one-time integration costs
        - Cohere COO; request integration plan with quarterly milestones and EU customer retention data
      - - Path to profitability model
        - No financial model or breakeven ARR target publicly disclosed
        - If breakeven ARR is $600M+ with current cost structure, Cohere needs 2+ additional financing rounds before IPO
        - Cohere CFO; request 3-year financial model with headcount, compute, and gross margin build
    notes: >-
      Diligence asks are ordered by materiality. Items 1 and 2 are threshold conditions; items 3–6 inform final sizing
      decision.
    claimRefs:
      - CV036
      - CV037
      - CV038
      - CV039
