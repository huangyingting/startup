callouts:
  - title: 'Recommendation: CONDITIONAL INVEST at $7B'
    body: >-
      Cohere merits investment for investors with 5+ year horizons and tolerance for copyright litigation risk. The
      probability-weighted 1.67x gross return is thin by VC standards but supported by strong market positioning. The
      two pre-conditions for commitment are: (1) copyright litigation external counsel assessment below $20M expected
      liability, and (2) NRR by cohort disclosed above 100%. Without these, the bear case probability rises to 35–40%
      and the expected return turns negative.
    calloutType: recommendation
    claimRefs:
      - CV001
      - CV009
      - CV036
  - title: Oracle as the Hidden Exit Option
    body: >-
      The most underappreciated valuation element is Oracle's equity stake and strategic alignment. If Azure OAI
      achieves sovereign parity by 2026, Oracle's rational response is to fully acquire Cohere at $10–18B to protect its
      OCI enterprise AI strategy. This acquisition scenario provides a floor above the $7B entry in all but the most
      severe bear case — making Oracle effectively an implicit put option embedded in the investment.
    calloutType: insight
    claimRefs:
      - CV031
      - CV032
