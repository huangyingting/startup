  - id: TV002
    title: Thesis / Anti-Thesis Table
    columns:
      - Argument
      - What Would Change the View
    rows:
      - - >-
          THESIS: Cohere is the only enterprise-grade, truly sovereign, multi-jurisdiction LLM provider at commercial
          scale with $240M ARR and regulatory approval in APAC/EU
        - >-
          VIEW CHANGES if Azure OAI sovereign achieves FedRAMP High and EU AI Act compliance within 12 months,
          eliminating Cohere's regulatory moat
      - - >-
          THESIS: The North enterprise platform creates durable switching costs beyond base API access, enabling high
          NRR and multi-product expansion across 400–600 accounts
        - VIEW CHANGES if NRR is disclosed below 100% or if churn in top-10 accounts exceeds 15%
      - - >-
          THESIS: Aleph Alpha acquisition expands EU TAM and sovereign AI credibility, creating a $500M+ ARR pathway
          with diversified geographic risk
        - VIEW CHANGES if Aleph Alpha integration takes >18 months or EU customers defect during transition
      - - >-
          THESIS: 29x ARR entry multiple is at a relative discount to OpenAI/Anthropic, offering risk-adjusted upside if
          Cohere executes to $500M+ ARR by 2028
        - VIEW CHANGES if enterprise LLM market multiple contracts to <20x broadly, making the 29x entry unrecoverable
      - - >-
          ANTI-THESIS: Copyright adverse verdict requiring training data licensing could add $15–30M in annual licensing
          costs, permanently compressing gross margins
        - >-
          VIEW CHANGES if Cohere wins dismissal or reaches settlement under $20M that preserves current training data
          practices
      - - >-
          ANTI-THESIS: Open-source models (Llama 4, Mistral) capturing the $50–150K ACV tier will erode 30% of Cohere's
          customer base by 2027
        - VIEW CHANGES if North platform adoption demonstrates >80% of revenue from platform ACV (not base API)
    notes: >-
      Thesis/anti-thesis represents analytical positions based on public data. IC should stress-test with management on
      anti-thesis scenarios.
