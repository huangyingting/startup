  title: Valuation
sections:
  - id: SEC001
    title: Investment Thesis and Current Valuation Context
    body: >
      Cohere's $7 billion Series D valuation (November 2024) at approximately $240 million ARR implies a 29x trailing
      ARR multiple. This is meaningfully below the 38–42x multiples ascribed to OpenAI and Anthropic in comparable
      fundraising rounds, reflecting Cohere's smaller scale and more concentrated enterprise-only positioning, but also
      representing a relative discount that creates potential investor upside if the enterprise LLM market continues to
      grow as projected. [CV001] [CV002]

      The core investment thesis rests on six pillars: (1) an expanding enterprise LLM market projected at $130–150B by
      2030; (2) a proven enterprise sales motion with $240M ARR and ~400–600 named accounts; (3) a differentiated
      product moat via the North enterprise platform and sovereign private deployment; (4) a regulatory and compliance
      posture enabling sales into financial services, healthcare, and government verticals that proprietary cloud AI
      cannot serve; (5) APAC distribution via Fujitsu and LG CNS creating a non-US revenue beachhead; and (6) the Aleph
      Alpha acquisition expanding EU sovereign AI presence. [CV003] [CV004] [CV005]

      The anti-thesis centers on four risk vectors: copyright litigation overhang; Aidan Gomez key-person dependency;
      open-source model parity at the low-ACV tier; and Azure OpenAI's sovereign cloud expansion narrowing Cohere's
      private-deployment moat. The $7B entry point provides limited margin of safety against a down-round scenario if
      ARR growth decelerates materially. The copyright case is the single highest-probability material adverse event in
      the 12–24 month horizon. [CV006] [CV007] [CV008]
    tableRefs:
      - TV001
      - TV004
    figureRefs:
      - FV001
      - FV004
  - id: SEC002
    title: Comparable Valuation and Scenario Analysis
    body: >
      Cohere's 29x ARR multiple sits within the range of established private AI/SaaS benchmarks. Direct comparables
      include Anthropic at approximately 20x ARR ($61.5B at ~$3B ARR), Databricks at approximately 27x ARR ($43B at
      $1.6B ARR), Glean at approximately 36x ARR ($7.2B at ~$200M ARR), and Scale AI at approximately 19x ARR ($14B at
      ~$750M ARR). Public market comparables (Palantir, Snowflake) trade at 15–26x NTM revenue, providing a floor for
      terminal multiple assumptions. Cohere's 29x represents a reasonable middle of the comp set — neither a bargain nor
      an outlier. [CV015] [CV016] [CV017] [CV018]

      The base case models Cohere growing ARR from $240M (2025) to $380M (2026E) at ~58% YoY growth — a meaningful
      deceleration from the $140–240M growth (71%) seen in 2024–2025. At a 30x ARR multiple in 2027 (when ARR could
      reach $550M), implied enterprise value of $16.5B represents a 2.4x gross return from the $7B entry, or
      approximately 35–40% IRR on a 3-year hold with 20% dilution from future rounds. The bull case assumes $450M ARR by
      end 2026 and a sustained 35x multiple driven by North platform premium, implying a $18.7B valuation and 2.7x
      return. The bear case assumes ARR growth stalls to 25% following a copyright settlement and 15x multiple
      compression, yielding a $4.5B terminal value at end 2026 — a 36% loss on entry. [CV019] [CV020] [CV021]

      The probability-weighted valuation across scenarios (bull 25%, base 55%, bear 20%) yields an expected exit value
      of approximately $11.7B, implying a 1.67x gross multiple on the $7B entry — a positive but thin expected return
      for a late-stage venture position. The return profile is asymmetric: the downside is greater than the upside in
      probability-weighted terms at current entry multiples. [CV022] [CV023]
    tableRefs:
      - TV002
      - TV005
    figureRefs:
      - FV002
  - id: SEC003
    title: Exit Readiness, Final Diligence Asks, and Recommendation
    body: >
      Cohere's most plausible exit pathways are: (1) a 2027–2028 IPO after reaching $500M+ ARR and demonstrating
      improving unit economics; (2) a strategic acquisition by a major enterprise software company (SAP, Salesforce,
      Oracle, or a hyperscaler) seeking to acquire enterprise AI capabilities; or (3) an extended private trajectory via
      secondary transactions and late-stage rounds. The Oracle equity stake creates both a preferential acquirer (Oracle
      is incentivized to fully acquire Cohere to protect its enterprise AI strategy) and a potential conflict
      (Oracle-led exit might occur at a sub-optimal valuation for minority investors). [CV031] [CV032] [CV033]

      A Cohere IPO in 2027–2028 would face a market likely still in recovery from 2024–2025 high-multiple compression.
      Public AI SaaS companies are expected to trade at 15–25x NTM revenue at IPO, implying Cohere would need $600M+ ARR
      to justify a $12B+ public market valuation. This is achievable in the bull case but requires sustained growth
      above 50% YoY with improving gross margin. The key uncertainties for IPO readiness are: copyright litigation
      resolution, NRR trajectory (undisclosed), and whether the North platform creates durable gross margin expansion
      above 75%. [CV034] [CV035]

      Recommendation: CONDITIONAL INVEST. Cohere merits investment at $7B for investors with 5+ year horizon and
      tolerance for copyright litigation risk. The base case return (1.67x probability- weighted) is acceptable for a
      growth-stage enterprise AI position. Key pre-commitment diligence asks: (1) NRR by cohort (2022–2025); (2)
      copyright litigation counsel assessment and insurance coverage; (3) FedRAMP authorization timeline; (4) Series E
      terms (preference stack, anti-dilution); (5) 3-year financial model with path-to-profitability assumptions. Entry
      should include a 10–15% pricing discount from headline to account for litigation overhang and multiple compression
      risk. [CV036] [CV037] [CV038] [CV039] [CV040]
    tableRefs:
      - TV003
      - TV006
    figureRefs:
      - FV003
