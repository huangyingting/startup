          - type: callout
            title: 开源替代风险真实存在，但平台层可缓冲
            body: >
              Meta Llama 4 和 Mistral Large 模型已经实质性缩小与商业前沿模型的能力差距，两者都能零许可费自托管，因此是 Cohere 模型层的可信替代品。不过，自托管开源 LLM
              的企业必须自行搭建微调流水线、部署基础设施、安全监控、合规工具和企业支持关系。Cohere 的 North
              平台和企业支持主张，就是专门在商品化模型之上的运营层竞争；即便底层基础模型商品化侵蚀加深，它仍可收取平台溢价。
