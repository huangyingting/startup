      - number: '5.3'
        title: 信任、合规、路线图和技术风险
        blocks:
          - type: paragraph
            body: >
              Cohere 的托管云服务持有 SOC 2 Type II 认证，并在扩展合规组合，目标包括 ISO 27001 和面向美国政府账户的 FedRAMP
              Moderate。私有部署架构把数据留在客户基础设施上，天然覆盖不少合规要求，但也带来一个依赖：Cohere 的合规姿态只和客户自身基础设施合规计划一样强。需要 FedRAMP High
              的客户（美国国防部、情报界）目前无法由 Cohere 的认证覆盖；相对 Microsoft Azure OpenAI（已获 FedRAMP High 授权），这仍是产品缺口。


              产品路线图（基于公开表态、博客和投资人报告）显示：(1) 通过收购 Aleph Alpha 扩大欧盟主权部署，目标是德国和欧盟政府账户；(2) 将下一代 Command A 的上下文窗口扩展到 500k–1M
              tokens；(3) 发布 Compass GA，支持自助式 RAG 流程创建；(4) 将 Aya 多语言支持扩展到 100+ 种语言；(5) 为医疗企业客户提供 HIPAA BAA。


              主要技术风险包括：(1) 上下文窗口差距——Cohere 的 256k 与竞争对手的 1M 相比，对大文档工作流是有实质影响的劣势；(2) 基准可见度——Command A
              尚未提交所有主流公开基准（MMLU、HumanEval、LMSYS arena），独立质量验证受限；(3) 模型训练算力依赖——Cohere 完全依赖第三方 GPU 供应（通过 Oracle、AWS
              以及自建集群投资获取 NVIDIA H100 集群）；(4) 开源替代——Llama 4 和 Mistral 的模型能以可比能力私有部署且许可成本为零，威胁商用模型层溢价；(5) MoE
              架构取舍——Command A 的 MoE 路线推理成本效率高，但相比稠密模型替代方案，输出可能更不稳定。
