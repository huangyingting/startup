  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与单位经济
        blocks:
          - type: paragraph
            body: >
              Cohere 采用混合收入模型，主要有两条收入流：（1）按年度合同价值（ACV）签订企业协议的私有和本地部署许可；（2）按每百万 token 计费的用量型 API 层（Cohere API 和 Coral
              平台）。截至 2025 年，私有部署模式约占 Cohere 披露收入的 85%，反映公司有意把商业化重心放在需要数据主权、隔离环境或 VPC 部署的受监管企业客户（金融服务、医疗健康、政府、国防）身上。API
              层虽在增长，但收入占比仍较小。


              企业 ACV 合同通常是一到三年的多年期协议，客户可在自有基础设施或专用 VPC 环境中访问 Cohere 模型，并获得企业支持、SLA 保证和微调服务。大型受监管行业客户的平均合同规模估计为每年
              $500,000 到 $5 million+，但 Cohere 不披露具体合同。ARR 从估计 $100M（2024 年中）增长到约 $240M（2026 年 2 月），意味着年增长约
              2.4x；这符合一家通过企业合同扩张和新客户获取来扩张的公司轨迹。


              企业 AI LLM 领域中，模型即服务提供商的毛利率估计为 70–85%，由 GPU 推理成本（规模化使用 H100 时约每百万 token $0.30–$1.50）与客户计费价格（API 层每百万 token
              $2–$25，私有部署 ACV 价格更高）之间的显著差额驱动。对私有部署而言，Cohere 的单客户边际成本主要是客户成功、部署支持和微调人力，变量成本低于 API 推理。行业分析师普遍称 Cohere
              目标是实现 70% 以上正毛利率；但考虑持续模型 R&D 和商业化投入，经营层面盈利预计最早也要到 2027 年之后。
