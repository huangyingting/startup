      - number: '7.3'
        title: 战略风险、财务敞口和缓释措施
        blocks:
          - type: paragraph
            body: >
              开源模型能力追平，是 Cohere 商业模式的存在性战略风险。Meta 的 Llama 4、Mistral Large 2 和 Alibaba 的 Qwen2.5-72B
              已证明，开放权重模型能在许多基准上匹配甚至超过闭源中端企业模型表现。若开源模型达到企业级可靠性——包括微调流程、检索增强生成和私有部署支持——Cohere 的按 token
              定价溢价会更难维持。真正差异化的护城河仍是 North 企业平台和合规姿态，而不是基础 LLM 本身。 [CR033] [CR034] [CR035]

              伙伴集中风险偏高。Oracle 持有股权，也是关键分销伙伴；Microsoft Azure 一边提供 Azure OpenAI Service（Cohere 的直接竞争对手），一边又是部分 Cohere
              工作负载的云基础设施提供方。这造成结构性张力：Cohere 最重要的分销伙伴，也在推进竞争产品。AWS Bedrock marketplace 上架带来分销，但也以一种压缩 Cohere 定价权的方式，把 LLM
              访问商品化。 [CR036] [CR037] [CR038]

              根据披露的研发员工数和算力成本、以及 $500M+ 的资产负债表，Cohere 年现金消耗估计为 $80–120 million。在 $240M ARR、平台订阅毛利率约 80% 的水平下，Cohere
              尚未盈利；企业销售周期 6–18 个月，获客成本很高。主要投资逻辑破裂场景包括：(a) 版权不利判决，责任 >$50M；(b) 两个或更多 Fortune 500 客户流失给 Azure OpenAI
              的主权能力追平；(c) 开源模型消灭中端市场定价层；(d) Aidan Gomez 在 Series E+ 退出事件之前离开。 [CR039] [CR040] [CR041] [CR042]

              已有缓释措施包括：私有部署架构降低数据主权敞口；SOC 2 和 ISO 27001 认证支持受监管行业销售；多司法辖区总部结构（Toronto + London + San
              Francisco）提供监管套利；North 企业平台在基础模型访问之外制造切换成本。足以触发提前退出的标准：版权赔偿超过保险覆盖、NRR 跌破 90%，或 Command API 定价跌破 $0.50/1M
              tokens（开源替代信号）。
