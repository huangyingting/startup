  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件与能力
        blocks:
          - type: paragraph
            body: >
              Cohere 产品线分为两块：AI 模型（生成、检索和分类模型层）与 AI 平台（North 和 Compass，即编排与部署层）。模型层包括：Command A（256k 上下文、1110
              亿参数，针对企业智能体任务和私有部署优化）、Command R+（128k 上下文，专注检索增强生成）、Embed v3（面向语义搜索和文档检索的最先进文本向量嵌入模型）、Rerank（用于提升 RAG
              流水线检索精度的交叉编码器模型）、Aya（覆盖 70+ 语言的多语言生成模型）和 Transcribe（面向企业语音和呼叫中心用例的语音转文本模型）。


              平台层包括 North 和 Compass。North 是 2025 年 1 月推出的企业智能体 AI 工作流平台，提供到 100+ 企业应用的预置连接器（Salesforce、ServiceNow、Google
              Workspace、Microsoft 365、SAP、Confluence）。Compass 是 AI 搜索和发现工具，让企业无需编写自定义检索流水线，就能在内部文档库上构建 RAG 应用。合在一起，平台层是
              Cohere 应对基础模型 API 商品化的主要答案——通过搭建具备企业工作流集成的平台层，Cohere 想在模型本身之上创造切换成本。


              Command A 于 2025 年 3 月发布，是 Cohere 最新一代基础模型。它值得注意之处在于优先考虑部署效率，而非单纯追求原始基准表现：模型采用 111B
              参数的混合专家（MoE）架构，设计目标是在共享 GPU 集群上服务多个企业租户，并把每 token 推理成本压到低于同等能力稠密模型。256k
              上下文窗口支持长文档企业工作流（法律合同审查、监管合规文档、财务报告分析），但仍落后于 Anthropic 的 1M 上下文 Claude 和 Google 的 Gemini 1.5 Pro。
