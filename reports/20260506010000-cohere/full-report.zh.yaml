  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 哪些情况会改变观点
    rows:
      - - 投资逻辑：Cohere 是唯一达到商业化规模、真正具备主权和多法域能力的企业级 LLM 提供商，ARR 为 $240M，并已在 APAC / 欧盟获得监管认可
        - 观点改变：如果 Azure OAI 主权方案在 12 个月内取得 FedRAMP High 和欧盟 AI 法案合规，抹平 Cohere 的监管护城河
      - - 投资逻辑：North 企业平台把切换成本做得比基础 API 访问更深，可在 400–600 个账户中支撑高 NRR 和多产品扩张
        - 观点改变：如果披露的 NRR 低于 100%，或前 10 大账户流失率超过 15%
      - - 投资逻辑：收购 Aleph Alpha 扩大欧盟 TAM，并强化主权 AI 可信度，打开 $500M+ ARR 路径，同时分散地域风险
        - 观点改变：如果 Aleph Alpha 整合超过 18 个月，或欧盟客户在过渡期流失
      - - 投资逻辑：29x ARR 入场倍数相对 OpenAI / Anthropic 有折价；若 Cohere 到 2028 年做到 $500M+ ARR，风险调整后仍有上行
        - 观点改变：如果企业 LLM 市场倍数整体收缩到 <20x，29x 入场价无法收回
      - - 反向逻辑：若版权案判决不利并要求为训练数据付费，每年可能增加 $15–30M 授权成本，永久压缩毛利率
        - 观点改变：如果 Cohere 赢得驳回，或以低于 $20M 达成和解并保住现有训练数据做法
      - - 反向逻辑：开源模型（Llama 4、Mistral）拿下 $50–150K ACV 档位，到 2027 年将侵蚀 Cohere 30% 客户基础
        - 观点改变：如果 North 平台采用情况证明 >80% 收入来自平台 ACV（而非基础 API）
    notes: 投资逻辑 / 反向逻辑代表基于公开数据形成的分析立场。投委会应与管理层压力测试反向逻辑情景。
    claimRefs:
