  - id: TV001
    title: 建议摘要表
    columns:
      - 维度
      - 评估
      - 置信度
      - 决策含义
    rows:
      - - 建议
        - 有条件投资——需完成诉讼律师评估并披露 NRR
        - 中
        - 满足 5 项尽调条件后再承诺；若无 10–15% 折价，不按 $7B 名义估值承诺
      - - 风险评级
        - 中高——版权诉讼和关键人物风险具有实质影响
        - 中
        - 保守配置仓位（基金 2–3%）；若诉讼判决不利，要求棘轮条款
      - - 估值立场
        - 合理偏高——29x ARR 位于可比公司区间内，但安全边际薄
        - 中
        - 谈低价格或争取更好的按比例跟投权；避免在更高估值下共同投资
      - - 预期回报（概率加权）
        - 3 年约 1.67x 毛回报；计入 20% 稀释后 IRR 约 20–25%
        - 低
        - 对后期成长投资可接受；低于 VC 3x 毛回报中位目标——仓位应相应控制
      - - 持有期
        - IPO 或战略退出需 3–5 年；2 年后可能通过老股交易退出
        - 中
        - 按 5 年资本占用规划；在投资条款清单中加入流动性事件里程碑
    notes: 置信度为分析师基于公开资料的判断；投委会应以管理层数据室资料验证。
