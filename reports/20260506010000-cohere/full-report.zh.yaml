      - number: '5.4'
        title: 图表
        blocks:
          - type: callout
            title: Embed + Rerank 的检索护城河是最耐久的技术差异化
            body: >
              Cohere 的 Embed v3 和 Rerank 模型在 MTEB（Massive Text Embedding Benchmark）上持续位居前列；MTEB
              是文本检索和语义相似度的行业标准基准。检索领先与生成模型质量不是一回事：它需要在检索专用监督数据（例如 query-document 相关性配对）上做大规模专门训练，竞争性 LLM
              提供商不能只靠放大生成模型来复制。RAG 是企业 LLM 部署的主流模式，因此 Cohere 的检索优势给了它进入企业账户的路径，不必完全依赖 Command A 的生成基准表现。
            calloutType: strength
            claimRefs:
              - CE008
              - CE009
              - CE025
          - type: callout
            title: 上下文窗口差距（256k vs 1M）限制大文档用例
            body: >
              Command A 的 256k token 上下文窗口虽比上一代大得多，但仍只有 Anthropic Claude（Opus 和 Sonnet 为 1M tokens）以及 Google Gemini 1.5
              Pro（1M tokens）的四分之一。企业客户若要在单一上下文窗口处理完整法律合同（>500 页）、综合财务申报、大型代码库分析或长篇研究文档，这个差距会直接卡住用例。Cohere 在交付 1M+
              上下文模型之前（尚未确认；非正式说法指向 2026–2027），仍会在部分大文档企业 RFP 中输给 Anthropic 和 Google。
