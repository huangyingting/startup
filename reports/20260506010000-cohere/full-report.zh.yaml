      - number: '4.2'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >
              自 2019 年创立以来，Cohere 已披露融资约 $1.7 billion，跨五轮主要融资。融资轨迹显示，公司快速从研究衍生项目成长为企业级 AI
              供应商，背后是一组既投钱、又能充当商业分销网络的战略投资者：NVIDIA（芯片供应）、Oracle（云基础设施）、AMD（NVIDIA 之外的硬件替代）、Salesforce（CRM 渠道）和
              Cisco（企业网络与安全）。每个战略投资者都提供商业联合销售、分销和基础设施价值，补充财务资本。


              按当前烧钱速度估算，Cohere 累计资本让公司拥有约两到三年现金跑道（推测，因为实际烧钱速度未披露）。2025 年 9 月以 $6.8–7B 估值完成的 $500M 轮是迄今最大一轮，引入 Inovia
              Capital 和 PSP Investments 等机构投资者，也有战略伙伴参与。Cohere 的资本需求来自：（1）模型训练 GPU 集群成本（前沿级大模型单次训练估计
              $100–300M）；（2）企业销售团队扩张（全球估计 200–400 名企业销售人员）；（3）服务私有云部署的基础设施。


              按 $7 billion 估值和约 $240M ARR 计算，ARR 收入倍数约 29x。这低于 Sacra 2025 年 10 月报道的 46.7x 倍数（按 $150M ARR 和 $7B 估值计算，意味着
              Sacra 的 ARR 估计低于 2026 年 2 月数字）。可比私营 AI 同行以 36–50x ARR 倍数交易，说明 Cohere 相对直接可比公司略显低估，或者反映投资者在定价开源商品化风险。毛利率
              70%+、增长 100%+ 的上市 SaaS 可比公司按 15–25x ARR 交易，确认 Cohere 相比上市 SaaS 估值带有显著私营 AI 溢价。
