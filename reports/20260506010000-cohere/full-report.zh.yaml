      - number: '6.3'
        title: 客户风险、集中度和尽调缺口
        blocks:
          - type: paragraph
            body: >
              Cohere 最主要的客户风险是收入集中度：在 $240M ARR、估计 400–600 个企业账户的基础上，平均账户每年贡献约 $400K–$600K，但分布几乎肯定偏斜，前 10–20 个账户贡献了不成比例的
              ARR。只要 2–3 个合计代表 $10M+ ARR 的大账户未续约（原因可能是预算削减、监管变化、竞争切换，或版权诉讼对采购形成寒蝉效应），ARR 增长就可能反转或停滞。


              待决版权诉讼（Condé Nast、Forbes、Guardian 等，SDNY）已成为部分受监管行业买家的采购顾虑，尤其是法务建议对面临未决版权诉讼的 AI 供应商保持谨慎的客户。驳回动议在 November
              2025 被否决，意味着案件将进入证据开示，延长不确定性。Cohere 销售团队必须在企业采购流程中处理这一竞争风险。


              客户尽调的关键证据缺口：(1) 按队列的 NRR 未披露；(2) 实际客户数和收入集中度数据不可得；(3) 没有公开赢单 / 输单分析，无法比较 Cohere 在企业 RFP 中相对 Azure
              OpenAI、Anthropic 和开源替代方案的胜率；(4) 客户满意度分数（CSAT/NPS）未公开报告。这些缺口必须通过管理层材料和 NDA 数据共享，在 Series E 尽调中补上。
