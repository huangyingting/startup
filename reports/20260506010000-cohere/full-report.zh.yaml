      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Cohere 由三位曾在 University of Toronto 相识、并在 Google Brain 工作过的研究员共同创立。Aidan Gomez 现任 CEO，他是 2017
              年里程碑论文《Attention Is All You Need》最年轻的共同作者（时年 20 岁）；该论文提出了 Transformer 架构，几乎支撑了所有现代 LLM。联合创始人兼研究副总裁 Nick
              Frosst 也曾是 Google Brain 研究员，同时是音乐人，以机器学习研究闻名。联合创始人兼 CTO Ivan Zhang 在加入 Cohere 前曾与 Gomez 在 FOR.ai 合作。三人都曾在
              University of Toronto 学习。


              2025 年，公司显著补强高管层。Martin Kon 2022 年 12 月从 YouTube 加入，任总裁兼 COO，此前担任 YouTube CFO。2025 年 8 月，Cohere 聘请 Joëlle
              Pineau 担任首席 AI 官；她此前是 Meta AI Research 副总裁，也是蒙特利尔知名 AI 研究员。公司还聘请前 Uber CFO、KPMG US 合伙人 Francois Chadwick
              担任首任 CFO。Phil Blunsom 此前任职 Google DeepMind，现为首席科学家。董事会和治理结构未公开披露，但 Radical Ventures、Inovia Capital、PSP
              Investments、NVIDIA 和 Salesforce Ventures 等投资方因投资条款持有董事会代表权。Cohere Labs 是非营利开源研究部门，2022 年 6 月启动；Sara Hooker
              于 2025 年 9 月离任后，现由 Marzieh Fadaee 领导。三位创始人仍保持强影响力，公司没有 CEO 接班压力迹象。
