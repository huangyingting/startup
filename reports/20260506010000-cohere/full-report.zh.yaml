            title: 建议：以 $7B 估值有条件投资
            body: >-
              对投资期 5+ 年、且能承受版权诉讼风险的投资人来说，Cohere 值得投资。概率加权 1.67x 总回报按 VC 标准偏薄，但有强市场位置支撑。承诺投资的两个前提是：(1) 外部版权诉讼律师评估的预期责任低于
              $20M；(2) 按队列披露的 NRR 高于 100%。如果没有这两项，悲观情景概率会升至 35–40%，预期回报转负。
            calloutType: recommendation
            claimRefs:
