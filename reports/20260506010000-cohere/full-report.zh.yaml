    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与业务概览
        blocks:
          - type: paragraph
            body: >
              Cohere Inc. 是一家私营人工智能公司，注册并总部位于加拿大安大略省多伦多。公司成立于 2019 年，为金融服务、医疗健康、制造、能源和公共部门等受监管行业开发大语言模型（LLM）和企业 AI
              软件。它的核心价值主张是让组织把生成式 AI 部署在自有基础设施内——本地、私有云或主权云——而不是把敏感数据送进共享公共云 API。这套架构给企业买家补上数据驻留、合规和安全保证，让受监管行业真正能采用 AI。


              Cohere 主要靠私有部署工作负载的多年期软件许可变现。约 85% 收入来自这些私有部署；由于 Cohere 不需要承担运行共享推理基础设施带来的资本开支和负单位经济，毛利率类似 SaaS，可达
              70–80%。其余收入来自 Cohere 托管云上的 API 使用，客户按 token 付费。Cohere 产品组合覆盖生成模型（Command A
              系列）、检索模型（Embed、Rerank）、语音识别（Transcribe）、多语言研究模型（Aya，覆盖 70+ 种语言），以及面向企业工作流自动化的 North 智能体 AI 平台。截至 2026 年 2
              月，公司年化收入约 $240 million，高于 2023 年底的 $13 million，26 个月复合增长约 10×。
