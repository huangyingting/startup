            title: 已点名企业锚定客户为销售提供可信背书
            body: >
              Cohere 的公开客户名单跨越三大洲和多个垂直行业：Oracle（技术，美国）、Fujitsu（IT 服务，日本）、LG CNS（韩国）、RBC Royal Bank（金融服务，加拿大）、Ensemble
              Health（医疗，美国）、Bosch（工业，德国）、SAP（企业软件，欧盟）和 Dell（硬件，美国）。这种地域和垂直多样性，为 Cohere
              企业销售团队提供了可信的背书客户集，可用于跨行业、跨区域销售对话。Oracle 和 SAP 既是客户又是分销伙伴，尤其有价值——Oracle 的 OCI 客户基础和 SAP 的 400K+
              企业客户基础，代表了巨大的 Cohere 分销杠杆，但当前 ARR 运行率尚未反映出来。
