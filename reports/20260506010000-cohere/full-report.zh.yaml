      - number: '1.4'
        title: 增长里程碑与轨迹
        blocks:
          - type: paragraph
            body: >
              Cohere 的发展轨迹可分三阶段。第一阶段（2019–2022）：创立、早期模型开发，并推出公共 API，提供文本生成、向量嵌入和分类端点。Cohere 覆盖 100+ 语言的多语言 Embed
              模型，使其区别于 OpenAI 以英语为中心的产品。第二阶段（2023–2024）：转向企业优先的私有部署。ChatGPT 和 Claude 扩大消费者 / 开发者注意力后，Cohere
              重新围绕受监管行业企业客户定位；这些客户不愿把敏感数据送入公共云，因此 Cohere 拿下 Oracle、RBC、Fujitsu、LG CNS、Dell、SAP 等多年期合同。ARR 从 2023 年底的 $13
              million 增长到 2025 年 5 月的 $100 million，17 个月约 7×。第三阶段（2025 年至今）：平台扩张与国际增长。North 智能体 AI 平台于 2025 年 1
              月推出，Cohere 从基础模型上移到企业工作流自动化。国际收入占比在不到一年内从约 15% 增至约 45%，主要由日本 Fujitsu 和韩国 LG CNS 带动。2025 年 5 月，Cohere 收购
              Ottogrid（温哥华，企业市场研究自动化）。公司于 2025 年 6 月与加拿大和英国签署政府 AI 合作。2026 年 4 月，Cohere 宣布正洽谈收购德国 Aleph
              Alpha；若落地，将显著扩大其欧洲主权云版图。2024 年 2 月，由 Condé Nast、Forbes、The Guardian、LA Times 等主要新闻出版商组成的联盟提起版权侵权诉讼；2025 年
              11 月，法院驳回 Cohere 的撤诉动议。该案构成实质性的持续法律风险。
