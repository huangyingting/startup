      - number: '6.2'
        title: 客户采用、扩张和留存
        blocks:
          - type: paragraph
            body: >
              Cohere 的商业化路径以企业直销为主，并由战略渠道伙伴补强（Oracle、Salesforce、Cisco、AMD、NVIDIA）。典型客户路径先从特定用例的 Cohere Command 或 Embed
              概念验证部署开始（文档搜索、客服、合规报告），随后签下生产级 ACV 合同，再扩展到更多用例、更多产品线（Embed + Rerank + Command
              组合），或同一企业内更多业务单元。这种先落地再扩张的模式符合一流企业 SaaS GTM 的打法。


              多产品采用是客户健康度的主要证据：同时部署 Embed + Rerank 做 RAG、用 Command 做生成，再叠加 North 做工作流编排的客户，切换成本高，也不太可能流失——Cohere
              的产品栈已经接入其生产 AI 基础设施。比如 Fujitsu 被提到已为日本企业客户部署多款 Cohere 产品，说明既有多产品使用，也有转售商 / 系统集成商杠杆。


              据报道，Cohere 企业平台的 DAU/MAU 约为 40%，这个水平对企业软件来说偏高（更像每日使用的 SaaS
              工具，而不是偶尔使用的工具），也说明部署更接近生产级，而不是评估或试点。该指标虽未由公司正式披露，但已被分析师报告引用，用来证明客户参与是真实的。
