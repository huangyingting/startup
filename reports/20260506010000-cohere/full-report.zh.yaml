      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >
              OpenAI 是塑造市场的在位者。其 GPT-4o 模型在文本、代码、视觉和音频模态上提供最先进性能。企业产品包括 ChatGPT Enterprise（$30/user/month）、OpenAI API 和
              Azure OpenAI Service（Microsoft 合作，提供具备 SOC2、HIPAA 资格和 FedRAMP 合规的企业部署）。OpenAI 上下文窗口因模型而异，为 128k–200k
              token。它在开发者生态广度、第三方集成和模型能力基准上领先。对 Cohere 而言，OpenAI 的关键限制是：共享云 API 上的 OpenAI 模型会带来数据隐私担忧，而 Cohere
              私有部署能解决这个问题。不过，Azure OpenAI 把 OpenAI 模型托管在企业拥有的 Azure 环境中，部分中和了这一限制。


              Anthropic 是 Cohere 在受监管行业中威胁最高的直接竞争对手。其 Claude Opus 模型在长上下文（1M token）和安全基准上领先，并越来越受企业合规团队青睐。TechCrunch
              数据显示，2025 年中 Anthropic 占企业 LLM 使用量 32%，OpenAI 为 25%。除直接 API 访问外，Anthropic 也可通过 AWS Bedrock 和 Google Cloud
              Vertex AI 使用。价格（Claude Opus 输入 / 输出每百万 token $5/$25）偏高。Anthropic 缺少 Cohere 本地部署同等规模的真正私有 / 主权云部署选项，但 AWS
              GovCloud 和 Bedrock 能服务受监管行业。


              Google（Vertex AI / Gemini）是云原生企业 AI 中最强竞争对手。Gemini 1.5 Pro 支持 1M-token 上下文窗口，深度集成 Google Workspace 和
              Google Cloud，且定价有竞争力（每百万 token $2.50/$10）。Google 的企业 AI 平台（Vertex AI Agent Builder）覆盖智能体工作流。弱点是：市场把 Google
              主要视为其公共云的超大规模云延伸，而不是主权 / 私有部署供应商，尽管 Google 已推出主权云产品。


              Microsoft（Azure OpenAI Service）是最重要的间接竞争对手：它把 OpenAI 模型质量、Microsoft 企业关系、Azure 主权云产品，以及 Microsoft 365 全线
              Copilot 集成组合在一起。Azure OpenAI 的企业采用正在加速，Microsoft 企业销售队伍的触达远超 Cohere 直销团队。


              Mistral AI 是欧洲开放权重模型厂商，明确以隐私优先、可部署模型瞄准主权 AI 市场。Mistral 模型（Mistral 7B、Mixtral 8x7B、Mistral
              Large）可自托管，无许可费，并具备与 GPT-3.5 级别相当的竞争力。Mistral 与欧洲监管（GDPR、EU AI Act）对齐，使其成为 Cohere 在欧洲受监管企业账户中的直接替代方案。


              Meta（Llama 系列）按许可分发开源 LLM（Llama 3.1、3.2、4 Scout/Maverick），多数企业可商用。Llama 模型可在私有 GPU 基础设施上自托管，从而消除 Cohere
              的许可费。不过，采用 Llama 的企业必须自己搭建微调、部署、安全和运维基础设施——这道门槛正是 Cohere 当前优势。
