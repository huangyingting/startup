          - type: callout
            title: 市场时机有利：AI 预算扩张正在让企业支出翻倍
            body: >
              据 Gartner，企业 AI 应用软件支出从 2024 年的 $83.7 billion 几乎翻倍到 2025 年的 $172 billion，并预计 2026 年达到 $270
              billion。这轮预算扩张具有结构性：大型组织已承诺多年 AI 转型项目，即便市场条件变化，也会支撑采购周期。Cohere
              有望直接受益于这轮支出浪潮中的受监管企业细分；由于合规要求，该细分增长最快，也最具防御性。
