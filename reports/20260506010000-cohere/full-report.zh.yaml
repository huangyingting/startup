      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              自 2019 年成立以来，Cohere 累计获得约 $1.7 billion 风险和战略融资。公司完成了六次主要融资事件。2020 年，Radical Ventures 投入 $2 million
              种子轮。2021 年，公司完成 $40 million Series A，由 Index Ventures 和 Tiger Global 共同领投，Google、OMERS 等参与。2022 年，公司完成
              $125 million Series B。2023 年 6 月，Inovia Capital 领投 $270 million Series C，投后估值 $2.2 billion；到 2023 年 8
              月，进一步的老股交易把隐含估值推高到约 $3 billion。2024 年，加拿大大型养老金管理机构 PSP Investments 领投 $500 million Series D，估值 $5.5
              billion，Cisco、Fujitsu、AMD Ventures、Oracle、Salesforce Ventures、NVIDIA 和 Export Development Canada
              等战略方参与。2025 年 8 月，Radical Ventures 和 Inovia Capital 共同领投 $500 million Series E，估值 $6.8
              billion，AMD、NVIDIA、PSP 和 Salesforce 也参与。2025 年 9 月，BDC 和 Nexxus Capital 又投入 $100 million 延展轮，估值达到 $7
              billion。截至 2026 年 5 月，Cohere 未宣布债务融资或授信安排。公司发生过老股交易，但具体金额和卖方未披露。投资方名单带有明显战略属性：NVIDIA、AMD、Oracle、Salesforce
              和 Cisco 共同构成 Cohere 的商业化生态，且多轮跟投显示它们高度认可 Cohere 的企业定位。
