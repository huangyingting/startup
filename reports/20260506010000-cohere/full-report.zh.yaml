            title: 活跃版权诉讼带来实质法律敞口
            body: >
              Condé Nast、Forbes、The Guardian、LA Times 等主要出版商在 2024 年 2 月提起诉讼，指控 Cohere
              未经许可使用受版权保护的文章训练模型，并称其模型会逐字复现内容。法院于 2025 年 11 月驳回 Cohere 的撤诉动议，案件将进入证据开示。潜在赔偿最高可达每件侵权作品
              $150,000。若败诉或达成大额和解，Cohere 的财务可能受损，还可能被迫承担昂贵的训练数据调整，并为 LLM 版权责任树立行业先例。
