      - number: '7.2'
        title: 运营和技术风险
        blocks:
          - type: paragraph
            body: >
              Cohere 的模型训练流程高度依赖 NVIDIA H100 和 H200 GPU 硬件，而当前 GPU 配额约束和价格压力仍处高位。考虑到维持接近前沿的模型质量所需研发投入，算力 OpEx 估计占 Cohere
              运营成本基础的 30–45%。任何持续数月的 GPU 采购延迟，都会直接威胁 Cohere 的模型发布节奏，以及其相对 OpenAI 和 Anthropic 的竞争位置；后两者拥有更优先的 NVIDIA
              供给关系。 [CR017] [CR018] [CR019]

              Aleph Alpha 收购在 early 2026 完成，带来整合风险：两个工程组织的技术栈、招聘文化和客户基础不同，却必须在维持欧洲活跃企业部署的同时合并。Aleph Alpha 的德国 /
              欧盟客户有严格数据主权要求，可能与 Cohere 标准部署架构冲突，需要定制工程投入。 [CR020] [CR021]

              关键人物依赖是 Cohere 最尖锐的组织风险。CEO 兼联合创始人 Aidan Gomez
              是企业销售关系、投资者关系和技术可信度的中心人物。若他离开——无论去竞争对手、创办新公司还是回到学术界——都会在公司关键增长阶段造成实质不稳定。联合创始人 Nick Frosst 和 Ivan Zhang
              能降低但不能消除该风险。公开来源没有披露接班计划。安全认证（SOC 2 Type II、ISO 27001）已经到位，但与 NIST AI RMF 对齐的 AI 专项安全认证仍未完成。 [CR022]
              [CR023] [CR024]
