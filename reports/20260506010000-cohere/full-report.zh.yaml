          - type: callout
            title: 平台扩张显示公司从模型供应商转向企业 OS
            body: >
              2025 年 1 月推出 North 智能体平台，以及 2026 年 4 月宣布 Aleph Alpha 收购洽谈，都表明 Cohere 正从基础模型 API 供应商演进为更广义的企业 AI
              操作系统。这条路径类似 Salesforce 从 CRM 扩展到平台，或 Databricks 从 Spark 扩展到湖仓。若执行顺利，平台宽度会制造切换成本，并在模型许可之外打开新收入来源。待定的 Aleph
