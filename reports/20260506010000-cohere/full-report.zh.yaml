  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Cohere 所处市场可以按三层颗粒度定义。最宽的框架是企业 AI 应用软件：所有嵌入 AI、或使用基础模型来自动化、增强、辅助企业工作流的软件应用。Gartner 估计该细分在 2024 年为 $83.7
              billion，2025 年为 $172 billion，一年内接近翻倍，反映 AI 正加速嵌入企业软件栈。这个框架涵盖 CRM、ERP、生产力、HR 以及由 AI 增强的行业软件，但范围太宽，不能作为
              Cohere 的主要市场。


              更精确的市场是企业 LLM 软件：为企业买家提供平台、API 和模型，用于部署、微调或运行大语言模型，服务知识工作、文档处理、决策支持和工作流自动化。按分析师口径不同，该市场 2025 年估计为
              $5.9B–$8.8B。它明确排除消费者 AI 应用（ChatGPT 免费层、面向消费者的 Gemini）、云 AI 基础设施 / IaaS 和 AI 硬件。Cohere 直接竞争的正是这个细分。


              在企业 LLM 软件内部，Cohere 的具体子市场是私有部署企业 LLM：企业因无法把敏感数据传输到共享公共云 API，明确要求把 LLM 托管在本地、VPC 或主权云中。监管因素——欧洲
              GDPR、美国医疗健康 HIPAA、银行和国防的行业规则，以及 EU AI Act——使这一子细分明显区别于一般企业 LLM 市场。该子细分估计占更广义企业 LLM 市场约 25–35%，也就是 Cohere 在
              2025 年约 $1.5–$3.0B 的可服务可触达市场。
