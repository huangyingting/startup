            title: 头部账户收入集中和版权诉讼是两大实质客户风险
            body: >
              两个因素叠加，构成两项实质客户风险：(1) 估计 40–60% 的 ARR 集中在前 10 个企业账户；(2) 正在进行的 Condé Nast 版权诉讼进入证据开示（驳回动议在 November 2025
              被否决）。收入集中是 Cohere 当前阶段和 ACV 模型带来的结构性问题，公司需要 3–5 年客户基础多元化来降低该风险。版权诉讼风险更急迫：受监管金融机构、医疗公司和政府实体的企业法务，对存在未决版权索赔的
