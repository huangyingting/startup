            title: Transformer 发明者履历与企业定位
            body: >
              Cohere 创始团队包括 Aidan Gomez，他是提出 Transformer 架构的论文最年轻共同作者；Transformer 是几乎所有现代 AI
              系统的基础。这段履历带来很强的模型研发可信度。同样关键的是企业优先的商业模式：Cohere 聚焦受监管行业的私有和主权部署，瞄准一批不能、也不愿使用公共云 AI 服务的客户。这让它相对 OpenAI 和
              Anthropic 形成持久差异化；后两者主要是消费者 / 开发者云业务。多年期合同可实现 70–80% 毛利率，说明 Cohere 的商业位置确实与众不同。
