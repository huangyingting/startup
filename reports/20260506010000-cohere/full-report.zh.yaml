  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础和分层
        blocks:
          - type: paragraph
            body: >
              Cohere 的企业客户主要分三类垂直行业：金融服务（银行、保险、资产管理）、技术与专业服务、政府与国防（主权 AI 部署）。在这些行业里，Cohere 瞄准的是数据主权、多语言能力或监管合规让公有云 LLM
              API 无法被接受的账户——本质上是要求最严的企业 AI 买家，也往往是 ACV 最高的账户。


              公开点名客户包括：Oracle（同时是战略投资方，并为 Cohere 部署提供 OCI 基础设施）、Fujitsu（日本企业 IT 服务）、LG CNS（韩国企业 IT 服务）、RBC Royal Bank of
              Canada（金融服务）、Dell Technologies、SAP（企业软件集成）、Ensemble Health Partners（美国医疗收入周期管理）以及
              Bosch（德国工业和汽车）。这些账户覆盖北美、欧洲和亚太，说明 Cohere 已经形成早期国际企业客户足迹。


              金融服务垂直看起来是 Cohere 的主要收入驱动：受监管金融机构（银行、保险公司、资产管理公司）受严格数据驻留要求约束，无法使用 OpenAI 或 Anthropic 的公有云 LLM
              API；因此，Cohere 的私有部署模式几乎是它们在自研并微调模型之外唯一可行的商用 LLM 替代方案。这个垂直也是 ACV 最高的板块，大型银行每年在企业 AI 平台上投入 $1M+。
