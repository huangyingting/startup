companyProfile:
  summary: >-
    Cohere 是一家加拿大 AI 公司，由 Aidan Gomez、Nick Frosst 和 Ivan Zhang 于 2019 年创立。三位创始人的履历都可追溯到奠定 Transformer 架构的论文《Attention Is
    All You Need》（Google Brain，2017）。Cohere 构建并商业化企业级大语言模型，最鲜明的重点是主权式私有部署：客户可以把 Cohere 模型完整跑在自有基础设施中，满足数据驻留、GDPR
    和行业合规要求，而这些要求是公共云 AI API 难以覆盖的。到 2025 年底，公司 ARR 达到 $240M，估计服务 400–600 个企业账户，Series A–D 累计融资超过 $975M，并完成收购 Aleph
    Alpha，以巩固其在欧盟主权 AI 市场的位置。
