      - number: '8.2'
        title: 可比估值和情景分析
        blocks:
          - type: paragraph
            body: >
              Cohere 的 29x ARR 倍数，落在成熟私有 AI/SaaS 基准区间内。直接可比公司包括 Anthropic 约 20x ARR（$61.5B 估值、约 $3B ARR）、Databricks 约
              27x ARR（$43B 估值、$1.6B ARR）、Glean 约 36x ARR（$7.2B 估值、约 $200M ARR），以及 Scale AI 约 19x ARR（$14B 估值、约 $750M
              ARR）。公开市场可比公司（Palantir、Snowflake）交易在 15–26x NTM revenue，为终局倍数假设提供底线。Cohere 的 29x 处在可比集合中间——既不便宜，也不离群。
              [CV015] [CV016] [CV017] [CV018]

              基准情景假设 Cohere ARR 从 $240M（2025）增长到 $380M（2026E），同比约 58%——相较 2024–2025 年 $140–240M 的增长（71%）明显放缓。若 2027 年采用
              30x ARR 倍数（届时 ARR 可能达到 $550M），隐含企业价值 $16.5B，对 $7B 进入价格的总回报为 2.4x；在 3 年持有、未来轮次稀释 20% 后，IRR 约 35–40%。乐观情景假设
              2026 年底 ARR 达到 $450M，并因 North 平台溢价维持 35x 倍数，隐含 $18.7B 估值和 2.7x 回报。悲观情景假设版权和解后 ARR 增速降至 25%、倍数压缩到 15x，2026
              年底终局价值 $4.5B——进入价格亏损 36%。 [CV019] [CV020] [CV021]

              按概率加权的情景估值（乐观 25%、基准 55%、悲观 20%）得到约 $11.7B 的预期退出价值，意味着 $7B 进入价对应 1.67x 总倍数——对后期 VC
              仓位来说，回报为正但很薄。当前进入倍数下，回报曲线是不对称的：按概率加权看，下行大于上行。 [CV022] [CV023]
