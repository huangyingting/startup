      - number: '2.3'
        title: 买方细分与采用动态
        blocks:
          - type: paragraph
            body: >
              企业 LLM 买家集中在五个受监管垂直行业：金融服务（银行、保险、财富管理）、医疗健康和生命科学、政府和公共部门、制造和工业，以及零售和消费品。其中金融服务拥有最大的企业 AI
              预算，也对数据主权要求最严；医疗健康排第二，但受 HIPAA 和患者数据隐私限制，必须采用本地或私有部署。联邦和国家层级政府买家常受主权云要求约束，分类或敏感工作负载可能完全排除美国超大规模云厂商的公共云。


              企业 LLM 采购预算主要由首席信息官（CIO）或首席技术官（CTO）掌握，他们负责基础设施和软件预算。AI 部署必须满足安全和合规政策后，CISO
              越来越拥有否决权。首席数据官（CDO）和首席数字官也会从业务侧发起很多 AI 项目。实践中，企业 AI 采购通常由多方委员会推进（IT、安全、法务、业务部门），大型合同销售周期因此拉长到 6–18 个月。


              企业 AI 采用正处拐点：78% 组织已在至少一个职能中部署 AI（高于 2023 年的 55%），但只有 6% 可算作带来转型影响的“AI 高绩效者”。缺口说明从试点走到生产很难：70–85% 企业 AI
              项目未达到预期，主因是数据质量、集成复杂度、治理缺口和变革管理不足。这个失败率为 Cohere 的 North 平台层和 Compass 产品创造了持久市场，因为两者的定位就是提高部署成功率。2024
              年单个组织平均企业 AI 支出为 $1.9 million；按已披露客户画像推断，Cohere 多年期合同大概率在每年 $500K–$5M 区间。
