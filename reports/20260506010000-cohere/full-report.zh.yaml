              Condé Nast 驳回动议在 November 2025 被否决，拿掉了主要法律出口。证据开示已经开始，2026–2027
              审判或协商和解是最可能路径。法定赔偿理论敞口很大，但和解远更可能。更大的风险在于，若法院要求 Cohere 停止使用网页抓取训练数据，未来模型训练将背上结构性成本。
