  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Cohere 的竞争横跨三层：（1）拥有强大企业销售能力的前沿模型厂商——OpenAI（通过 Microsoft Azure 和直销）、Anthropic（通过 AWS Bedrock 和直销）以及
              Google（Vertex AI）；（2）位于模型层之上的企业平台厂商——Microsoft Copilot、Salesforce Einstein AI、ServiceNow AI Platform 和 IBM
              Watson；（3）开源和可自托管模型提供商——Meta（Llama 系列）、Mistral AI 和开源社区。第四类新兴竞争对手是垂直聚焦的企业 AI 平台，如 Writer（面向内容工作流的企业 AI）和
              Glean（企业 AI 搜索）；它们服务相邻用例，但越来越争夺同一笔 AI 平台预算。


              竞争格局变化很快。TechCrunch 分析显示，到 2025 年中，Anthropic 按企业使用份额超过 OpenAI，成为企业第一大 LLM 提供商，约占 32%，OpenAI 约为 25%。Google
              和 Microsoft/Azure 合计持有剩余份额。Cohere、Writer 和其他专业厂商绝对市场份额较小，但在受监管行业利基中增长。


              Cohere 的公开定位是“面向受监管和主权部署的企业 AI”，这创造了一个半保护利基：OpenAI 和 Anthropic 以公共云为主的部署模式在这里构成结构性劣势。不过，Azure OpenAI
              Service（Microsoft 在企业 Azure 环境中托管 OpenAI 模型，包括主权云）是对这一定位最清晰的威胁，因为它把 OpenAI 模型质量放进 Microsoft
              企业生态和合规云基础设施之中。
