              三件事同时出现并不常见：（1）85% 企业 ACV 收入（可预测性高、毛利率高）；（2）战略投资者同时也是分销伙伴（Oracle Cloud、NVIDIA DGX、Salesforce CRM、Cisco
              网络）；（3）差异化私有部署产品，现有巨头不能轻易复制。对 Cohere 所处阶段而言，这一组合意味着其达到规模化盈利单位经济的路径，比纯 API 用量模型更可信。联合销售伙伴结构实际上补贴了 Cohere
