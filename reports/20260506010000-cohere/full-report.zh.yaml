    summary: 八个关键投资维度按 0–10 评分。Cohere 在市场机会（9）、管理层（8）和产品差异化（8）上得分较高，但受风险画像（5）和估值安全边际（5）约束。综合得分 6.9/10，支持有条件投资建议。
    data:
      items:
        - label: 市场机会
          value: 9
          detail: 到 2030 年企业 LLM TAM 达 $130–150B；主权 AI 是 $30B+ 细分市场；Cohere 位置有利
        - label: 产品差异化
          value: 8
          detail: North 平台 + 私有部署护城河；256k 上下文；多语言；真正企业级
        - label: 商业化验证
          value: 7
          detail: $240M ARR，约 400–600 家企业；点名 8+ 家 Fortune 500 客户；但 NRR 未披露
        - label: 管理团队
          value: 8
          detail: Aidan Gomez（Attention Is All You Need 共同作者）；联合创始人实力强；关键人物风险已经明确
        - label: 财务效率
          value: 6
          detail: 平台毛利率 80%+；算力烧钱高；ARR 达 $500M 前盈利路径不清晰
        - label: 风险画像
          value: 5
          detail: 版权诉讼（重大）；关键人物；开源替代；Azure OAI 追平——4 条并行风险向量
        - label: 估值 / 入场
          value: 5
          detail: 29x ARR——处于可比公司区间内，但安全边际偏薄；1.67x 概率加权回报低于 VC 目标中位数
        - label: 证据质量
          value: 7
          detail: 产品和融资证据强；财务证据弱（NRR、CAC、烧钱速度未披露）；法律风险部分可量化
