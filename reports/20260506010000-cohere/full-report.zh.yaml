      - number: '2.2'
        title: 市场规模——TAM、SAM 与可获取份额
        blocks:
          - type: paragraph
            body: >
              企业 LLM 软件的市场规模估算存在明显分析师分歧。2025 年企业 LLM 市场估计从 $5.9 billion（Future Market Insights）到 $8.8 billion（Global
              Market Insights）不等；Fortune Business Insights 预测 2026 年为 $5.91 billion，意味着 2025 年市场略小。区间差异来自口径不同：有些纳入 AI
              基础设施和托管服务，另一些只算模型层和平台软件。


              展望 2034 年，分析师共识集中在 $48–$91 billion，CAGR 为 26–30%。下限（$48B，Fortune BI）假设基础模型部分商品化，开源替代力度较强；上限（$91B，Future
              Market Insights）假设自研模型领导力持续，并向垂直行业扩张。


              Gartner 口径更宽：广义 AI 应用软件支出从 2024 年的 $83.7 billion 增至 2025 年的 $172 billion；不过它包含 AI 嵌入式企业软件（Salesforce
              AI、SAP Joule、Microsoft Copilot），并非 Cohere 直接市场。这个 TAM 仍有用，因为它给出了可被纯 AI 产品替代的企业 AI 预算上限。


              对 Cohere 而言，真正相关的 SAM 是私有部署企业 LLM 子集。基于分析师估计，即 Cohere 约 85% 收入来自私有部署，并按当前 ARR（$240M）推算 Cohere 约拿下其 SAM 的
              8–10%，2025 年 SAM 约为 $2.4–$3.0 billion，增速与更广义企业 LLM 市场相近。主权云市场可作为私有 AI 基础设施层的代理，另估计 2025 年为 $117–$154
              billion 且仍在增长，反映政府和企业围绕数据主权的大规模投入，这正支撑 Cohere 的部署模式。Cohere 的可获取市场（SOM）只是 SAM
              的一部分，即以当前分销、团队规模和竞争位置可现实赢下的份额；按当前 ARR 轨迹，到 2026 年底估计为 $300–$600 million。
