      - number: '5.2'
        title: 架构、基础设施与技术差异化
        blocks:
          - type: paragraph
            body: >
              Cohere 的技术架构围绕“优先私有部署”搭起来：所有产品都用 Docker 和 Kubernetes 容器化，设计成可部署在客户可控的基础设施上（本地 GPU 集群、AWS、Azure、Google
              Cloud 或 Oracle Cloud Infrastructure 的 VPC），无需把数据发送到 Cohere 服务器。受监管行业最看重的核心技术差异化，正是这套架构：它能满足数据驻留和主权要求，而公有云
              API 部署做不到。


              模型训练在 NVIDIA H100 GPU 集群上大规模完成（Command A 这类规模的模型，训练运行估计需要数万 GPU 小时）。后训练完成后，模型被打包成容器化服务，通过 Cohere
              的私有部署计划交付给客户。推理优化采用标准 LLM 服务技术，包括 KV 缓存管理、推测解码和连续批处理（兼容 vLLM 的服务基础设施）。私有部署模式把推理基础设施成本转移给客户，这是 Cohere
              高毛利率的重要驱动。


              Cohere 最主要的技术护城河在检索：Embed v3 和 Rerank 在 MTEB（Massive Text Embedding
              Benchmark）排行榜上，检索、语义相似度和分类任务长期处于第一梯队。这一优势更耐久，因为高质量向量嵌入模型需要在检索专用监督数据上做大规模训练，训练目标和数据集都不同于生成式模型；竞争对手不能只靠放大生成式模型就轻易复制。


              North 平台接入企业身份体系（SAML、SSO）、企业数据连接器（通过 REST API 和官方连接器 SDK 覆盖 100+
              个集成）以及企业安全控制（基于角色的访问控制、审计日志、数据丢失防护集成）。平台后端采用 Python/FastAPI，前端基于 React；云环境部署走 Kubernetes 原生路径，自托管企业部署则提供
              Helm chart。
