      - number: '2.5'
        title: 图表
        blocks:
          - type: callout
            title: 监管顺风把数据隐私合规变成市场硬要求
            body: >
              EU AI Act、GDPR 和行业规则（HIPAA、FINRA、MAS）不只是保护消费者；它们正在结构性迫使受监管企业放弃公共云 AI API，转向私有部署架构。这是 Cohere
              的长期顺风：最初为通用云计算写下的监管规则，如今开始套用到 LLM API 上，而很多垂直行业的合规答案就是 Cohere 式私有部署。等执法成熟、更多司法辖区出台 AI 专项数据驻留规则后，Cohere
              的可触达市场会扩大，不需要公司额外投入客户教育。
            calloutType: insight
            claimRefs:
              - CM026
              - CM027
              - CM028
          - type: callout
            title: 开源 LLM 商品化威胁商业模型收费
            body: >
              Meta 的 Llama 3 和 Mistral 的开源模型能力已经可用、免费，并能本地部署——这讲的是 Cohere 同一套架构故事，但基础模型许可成本为零。拥有 ML 工程团队的企业，已经可以用低于
              Cohere 平台许可的 TCO 自托管有竞争力的模型。若开源质量补齐与商业前沿模型的剩余差距（很可能在 2026–2027 年），Cohere 模型费用的主要正当性会变弱。因此，Cohere
              的平台层（North）、智能体能力、微调工具和企业支持，正越来越成为商品化模型层之上的差异化来源。
            calloutType: risk
            claimRefs:
