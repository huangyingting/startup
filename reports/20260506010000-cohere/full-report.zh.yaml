          - type: callout
            title: 一流检索模型形成高黏性技术护城河
            body: >
              Cohere 的 Embed 和 Rerank 模型被独立认可为市面上最强的企业检索模型之一；这项能力不同于生成模型基准。RAG（检索增强生成）架构是企业 LLM
              部署的主导模式，意味着无论企业使用哪种生成模型，Cohere 的检索模型都能嵌入企业 AI 流水线。这为 Cohere
              打开了进入企业账户的第二条路径，竞争对手不容易复制，因为检索模型质量独立于生成模型基准，需要不同训练数据和优化目标。
            calloutType: strength
            claimRefs:
              - CP016
