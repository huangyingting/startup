  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律和监管风险
        blocks:
          - type: paragraph
            body: >
              Cohere 近期最尖锐的法律敞口，来自 Condé Nast、Raw Story 及其他出版商在 December 2023 于纽约南区（SDNY）提起的版权侵权诉讼。驳回动议在 November 2025
              被否决，案件进入证据开示，并可能在 2026–2027 走向审判。若出现不利判决，美国 Copyright Act 下的法定赔偿可能按每件侵权作品达到数千万美元。更实质的风险是，诉讼可能迫使 Cohere
              修改训练数据做法，带来持续许可成本，或限制其使用支撑企业 LLM 的网页抓取语料。 [CR001] [CR002] [CR003]

              监管层面，EU AI Act 针对训练阈值高于 10^25 FLOPs 的基础模型提供商设置的 GPAI 系统性风险条款，已于 August 2025 生效。Cohere 的 Command A
              模型几乎肯定会落入范围。义务包括模型能力评估、对抗性测试、向 EU AI Office 提交透明度报告，以及网络安全事件通知。不合规罚款最高可达全球年营业额 3% 或 €15 million，以较高者为准。
              [CR004] [CR005] [CR006]

              Cohere 虽有初步列名，但尚未出现在 FedRAMP Authorized marketplace；这是一项战略风险，会限制其进入美国联邦民事机构合同市场，该 TAM 估计每年 $8–10
              billion。GDPR 敞口因 Cohere 的私有部署架构而部分缓解，因为客户数据留在本地；但欧盟客户仍面临 AI Act 下的透明度和人工监督要求。加拿大 AIDA（Artificial
              Intelligence and Data Act）在 2022 提交，截至 early 2026 仍在推进，可能给 Cohere 加拿大业务增加额外合规负担。 [CR007] [CR008] [CR009]
