      - number: '8.3'
        title: 退出准备度、最终尽调问题和建议
        blocks:
          - type: paragraph
            body: >
              Cohere 最可能的退出路径包括：(1) 在达到 $500M+ ARR、并证明单位经济改善后，于 2027–2028 IPO；(2) 被大型企业软件公司（SAP、Salesforce、Oracle
              或超大规模云厂商）战略收购，以获取企业 AI 能力；(3) 通过老股交易和后期轮次继续保持私有状态。Oracle 的股权带来双重含义：一方面它是优先收购方（Oracle 有动机完全收购 Cohere，以保护其企业
              AI 战略），另一方面也可能形成冲突（Oracle 主导退出时，对少数股东而言估值可能低于最优）。 [CV031] [CV032] [CV033]

              Cohere 若在 2027–2028 IPO，会面对一个很可能仍在从 2024–2025 高倍数压缩中恢复的市场。公开 AI SaaS 公司预计在 IPO 时按 15–25x NTM revenue
              交易，这意味着 Cohere 需要 $600M+ ARR，才能支撑 $12B+ 的公开市场估值。乐观情景下可以做到，但需要同比增速持续高于 50%，同时毛利率改善。IPO
              准备度的关键不确定性包括：版权诉讼解决、NRR 轨迹（未披露），以及 North 平台能否把毛利率扩张稳定推到 75% 以上。 [CV034] [CV035]

              建议：有条件投资。对投资期 5+ 年、且能承受版权诉讼风险的投资人来说，Cohere 在 $7B 估值下值得投资。基准情景回报（概率加权 1.67x）对成长阶段企业 AI
              仓位来说可以接受。投资前关键尽调问题包括：(1) 按队列的 NRR（2022–2025）；(2) 版权诉讼外部律师评估和保险覆盖；(3) FedRAMP 授权时间表；(4) Series E
              条款（优先股堆叠、反稀释）；(5) 3 年财务模型及盈利路径假设。进入价格应较名义估值折让 10–15%，以补偿诉讼悬而未决和倍数压缩风险。 [CV036] [CV037] [CV038] [CV039]
