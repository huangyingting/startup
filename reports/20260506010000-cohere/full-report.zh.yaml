      - CV007
      - CV010
      - CV011
      - CV012
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    columns:
      - 情景
      - ARR 假设
      - 退出估值
      - 毛回报（按 $7B 入场）
      - 关键风险
      - 概率信号
    rows:
      - - 乐观（25% 概率）
        - $240M→2026 年底 $450M ARR；2028 年达 $700M；North 平台溢价支撑 35x ARR 倍数
        - 2026 年 $18.7B；2028 年 IPO 时 $24.5B
        - 3.5x 毛回报 / IRR 约 50%（持有 3 年）
        - 倍数扩张假设版权案无不利判决；开源模型未能追上 Command A
        - 2026 年 Q1–Q2 ARR 增长 >75%；Fortune 500 新客户赢单加速；North 平台占 ARR >60%
      - - 基准（55% 概率）
        - $240M→2026 年底 $380M ARR；2027 年 $550M；30x ARR 倍数
        - 2027 年 $16.5B；计入 30% 稀释后净值约 $11.4B
        - 1.6x 毛回报 / IRR 约 20%（持有 3 年）
        - 2026 年 ARR 增速降至 55–60%；版权案以 $15–35M 和解；NRR 约 105%
        - 新客户稳定增加，每季度 40–60 个账户；North 平台扩张但未占主导
      - - 悲观（20% 概率）
        - 受版权判决 + Azure OAI 能力追平影响，2026–2027 年 ARR 停在 $200–250M；ARR 倍数 15x
        - 2026 年 $3.7B；扣除稀释后约 $2.6B
        - 0.37x 毛回报 / -30% 亏损（持有 3 年）
        - 版权赔偿 >$50M；3 家以上 Fortune 500 客户流向 Azure OAI；NRR <95%
        - 2026 年 Q1 Fortune 500 新赢单为零；版权案进入审判且面临惩罚性赔偿
    notes: 概率估计是分析师基于公开信息的判断。所有估值数字均为稀释前企业价值估计。
    claimRefs:
      - CV013
      - CV014
      - CV015
  - id: TV004
    title: 可比公司估值表
    columns:
      - 可比对象
      - ARR / 收入
      - 倍数
      - 与 Cohere 的相关性
      - 局限
    rows:
      - - Anthropic（私有，2025）
        - $3.0B ARR（估计）
        - 约 20x ARR（估值 $61.5B）
        - 最直接的私有 AI 可比公司；企业和消费端均覆盖；Claude 模型对比 Command
        - Anthropic 消费端使用更广；更高安全支出削弱可比性
      - - Databricks（私有，2024）
        - $1.6B ARR
        - 约 27x ARR（估值 $43B）
        - 数据 + AI 平台；纯企业客户；NRR 强；企业销售动作可比
        - Databricks 已实现收入为正，且数据平台护城河更宽；Cohere 阶段更早
      - - Glean（私有，2025 年 6 月）
        - ~$200M ARR
        - 约 36x ARR（估值 $7.2B）
        - 同一估值、ARR 相近；企业 AI 搜索邻近 Cohere 的 RAG / North 用例
        - 单产品，而 Cohere 多产品；TAM 更窄；没有主权 / 私有部署护城河
      - - Scale AI（私有，2024）
        - ~$750M ARR
        - 约 19x ARR（估值 $14B）
        - AI 数据 / 基础设施；聚焦企业；不是 LLM 提供商，而是数据服务
        - 较低倍数反映数据服务商品化风险；商业模式不同
      - - 'Palantir（上市，NYSE: PLTR）'
        - $2.7B ARR（2025）
        - 约 26x NTM 收入（市值 $72B）
        - 企业 AI 平台；政府 + 商业；公开市场定价提供估值底线
        - Palantir 已盈利（GAAP）；Cohere 尚未盈利；政府 TAM 重点不同于 Cohere 的商业侧重点
      - - 'Snowflake（上市，NYSE: SNOW）'
        - $3.5B 产品收入（2025）
        - 约 16x NTM 收入（市值 $55B）
        - 成熟期企业数据 / AI 平台基准；Cohere 达到 $500M+ ARR 后的潜在公开可比公司
        - Snowflake 收入增速已放缓至 25% YoY；阶段更早的 Cohere 享受溢价
      - - Harvey AI（私有，2025）
        - ~$100M ARR
        - 约 30x ARR（估值 $3B）
        - 垂直企业 AI（法律）；ACV 和成长阶段可比；主权要求相近
        - 垂直领域窄（仅法律） vs Cohere 横向企业市场；TAM 更小限制可比性
    notes: 所有 ARR / 收入数字均为基于公开来源的估计；私有公司估值来自已披露融资轮。
    claimRefs:
      - CV015
      - CV016
      - CV017
      - CV018
      - CV023
      - CV024
      - CV025
    enumerationScope:
      coverage: partial
      basis: >-
        Comparable set includes the most publicly relevant private and public AI/data platform companies.
        Less-comparable private AI companies (Mistral, Together AI, Perplexity) are excluded for insufficient ARR
        comparability.
  - id: TV005
    title: 打破投资逻辑与否决触发项表
    columns:
      - 触发项
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 版权案不利判决
        - 审判赔偿 >$50M，或禁止使用网页抓取训练数据的禁令
        - 毛利率永久受损；训练数据授权每年增加 $15–30M 运营支出；企业信任被削弱
        - 退出仓位；若尚未承诺，等诉讼解决后再交割
      - - NRR 低于 100%
        - 任何年度队列披露 NRR 低于 100%
        - “先落地再扩张”逻辑破裂；ARR 增长只能依赖新客户；投资逻辑退回烧钱换增长
        - 重新谈入场价；加入棘轮条款；要求 NRR 改善承诺
      - - Azure OAI 主权能力追平
        - Azure 推出 FedRAMP High + 私有主权部署，在 UX 和价格上追平 Cohere North
        - 美国市场主要护城河消失；欧盟 AI 法案部分缓解欧洲护城河压力
        - 加大 APAC 和欧盟收入审查；退出路径权重从 IPO 转向 M&A（Oracle 收购）
      - - Aidan Gomez 离职
        - CEO 辞任、健康事件或实质角色变化
        - 投资逻辑自动失效；机构投资人要求 CEO 稳定才具备 IPO 就绪度
        - 公告离职后 90 天内退出仓位，除非董事会 30 天内任命可信 CEO
      - - ARR 连续两个季度同比增长低于 30%
        - 公开披露，或可从融资活动停滞推断
        - 下轮降价风险急剧上升；倍数压缩不可避免；$7B 变成上限而不是底线
        - 要求 Series E 轮重新定价；在下一轮融资前以折价转为老股交易
    notes: 否决触发项代表投委会门槛，不是运营管理建议。
    claimRefs:
      - CV011
      - CV013
      - CV031
      - CV032
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 为何重要
      - 负责人 / 尽调路径
    rows:
      - - 按队列划分的净美元留存（2022–2025）
        - NRR 是最重要的未披露指标；公开资料不可得
        - NRR 低于 100% 会摧毁先落地再扩张逻辑；NRR 高于 120% 将显著提高置信度
        - Cohere CFO；投委会承诺前要求 NDA 数据室访问权限
      - - 版权诉讼风险评估
        - 预计和解区间、审判概率和 IP 保险覆盖均未公开披露
        - 若风险敞口为 $50–100M 且未投保，IRR 分析会实质改变；可能需要为投资计提准备
        - 外部 IP 诉讼律师；要求赔偿结构和 D&O 保险覆盖
      - - FedRAMP 授权时间表
        - 未披露公开里程碑；仅有“评估中”状态
        - FedRAMP 是打开 $8–10B 联邦 TAM 的闸门；若还需 24 个月以上，ARR 增长预测需修订
        - Cohere 公共部门 VP；要求正式 FedRAMP 项目计划及机构 ATO 合作方
      - - Series E 轮优先股堆叠和反稀释条款
        - Series E 轮投资条款清单未公开；Series A–D 轮清算优先权包袱不明
        - 清算优先权包袱可能在降价退出时吞掉普通股价值；承诺前必须建模稀释情景
        - 承诺前由法律顾问审阅股权结构表和 Series E 轮投资条款清单
      - - Aleph Alpha 整合里程碑计划
        - 收购后未披露公开整合时间表或里程碑
        - 整合失败会冲击欧盟客户关系，并增加 $20–40M 一次性整合成本
        - Cohere COO；要求包含季度里程碑和欧盟客户留存数据的整合计划
      - - 盈利路径模型
        - 未公开披露财务模型或盈亏平衡 ARR 目标
        - 如果当前成本结构下盈亏平衡 ARR 需 $600M+，Cohere 在 IPO 前还需要 2 轮以上融资
        - Cohere CFO；要求 3 年财务模型，拆分员工数、算力和毛利率爬坡
    notes: 尽调要求按重要性排序。第 1 和第 2 项是门槛条件；第 3–6 项用于最终仓位决策。
    claimRefs:
      - CV036
      - CV037
      - CV038
      - CV039
