      - number: '4.3'
        title: 财务结论与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Cohere 的财务画像讲出了一个有吸引力的增长故事，但执行风险也很高。公司在短时间内取得了有意义的 ARR 规模（$240M），收入模型毛利率高（85% 为私有部署 ACV），内在价值高于纯 API
              用量收入。战略投资者对齐降低了商业风险：NVIDIA、Oracle、AMD、Salesforce 和 Cisco 合计能把 Cohere 带入它独自难以触达的企业账户，并提供联合销售渠道。


              主要财务风险包括：（1）收入集中度——前 10 大客户很可能贡献 40–60% ARR（同阶段企业软件公司的行业常态），若一两个大合同流失，会带来客户流失风险；（2）模型训练资本强度——Cohere
              必须持续投入前沿模型质量，维持竞争平价，因此要么继续融资，要么最终实现盈利；（3）商品化压力——若企业客户迁移到开源替代品（Llama 4、Mistral）或 Azure OpenAI
              主权云，收入增长可能实质放缓；（4）公开财务数据缺失，使外部无法独立核验毛利率、净美元留存、CAC 回本周期或经营杠杆。


              对 Series E 或老股 / 成长期 VC 而言，关键财务尽调问题是：（1）在 NDA 下获取董事会批准的 ARR、NRR 和毛利率数据；（2）客户合同明细（按 ACV 排名前 20
              的客户、续约日期和留存历史）；（3）每 $1 收入的全口径计算成本（GPU 集群 CapEx + OpEx 分摊）；（4）烧钱速度，以及到下一轮融资或盈利事件的现金跑道；（5）多年期 ACV
              合同的收入确认政策（预收确认 vs 按期摊销）。
            claimRefs: []
      - number: '4.4'
        title: 图表
        blocks:
          - type: callout
            title: 大型私有部署合同收入集中，带来流失敞口
            body: >
              Cohere 85% 收入集中在私有部署 ACV 合同中，这有利于毛利率画像，但也带来合同集中风险。ARR 规模在 $100–300M 的企业软件公司，前 10 大客户通常贡献总 ARR 的 30–60%。如果
              Cohere 的私有部署客户群集中在少数超大合同中（受监管行业聚焦暗示了这一点），即便两三个大账户不续约，也可能实质影响 ARR 增长。Cohere 未披露 NRR 或留存指标，这是判断收入质量时最重要的未知数。
