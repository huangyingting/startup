              - CV009
              - CV036
          - type: callout
            title: Oracle 是隐藏退出选项
            body: >-
              最被低估的估值因素，是 Oracle 的股权和战略一致性。若 Azure OAI 到 2026 达到主权能力追平，Oracle 的理性反应是以 $10–18B 完全收购 Cohere，保护其 OCI 企业 AI
              战略。这个收购场景为 $7B 进入价提供了底线，除非出现最严重的悲观情景——等于让 Oracle 成为投资中嵌入的一份隐含看跌期权。
            calloutType: insight
            claimRefs:
