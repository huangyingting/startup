chapter:
  number: 1
  title: Company Overview
  summary: >
    Cohere is a Canadian enterprise AI company founded in 2019 by Aidan Gomez, Nick Frosst, and Ivan Zhang — all Google
    Brain alumni and co-authors (or close collaborators) of the seminal "Attention Is All You Need" transformer paper.
    Headquartered in Toronto with global offices, Cohere builds large language models (LLMs) and an enterprise AI
    platform optimised for private, on-premises, and sovereign-cloud deployments in regulated industries. As of early
    2026 the company reports approximately $240 million in annual recurring revenue, has raised roughly $1.7 billion in
    venture capital at a $7 billion valuation, and is transitioning from a pure-model API provider to a full enterprise
    AI platform, including the North agent platform and a pending acquisition of Germany's Aleph Alpha.
sections:
  - id: s1
    title: Company Identity and Business Overview
    body: >
      Cohere Inc. is a privately held artificial intelligence company incorporated and headquartered in Toronto,
      Ontario, Canada. Founded in 2019, the company develops large language models (LLMs) and enterprise AI software for
      regulated industries including financial services, healthcare, manufacturing, energy, and the public sector. Its
      core value proposition is enabling organisations to deploy generative AI within their own infrastructure —
      on-premises, in a private cloud, or in a sovereign cloud — rather than routing sensitive data through shared
      public-cloud APIs. This architecture gives enterprise buyers the data residency, compliance, and security
      guarantees that make AI adoption viable in regulated sectors.


      Cohere monetises primarily through multi-year software licences for private-deployment workloads. Approximately 85
      percent of revenue comes from these private deployments, which carry SaaS-like gross margins of 70–80 percent
      because Cohere avoids the capital expenditure and negative unit economics associated with running shared inference
      infrastructure. The remainder of revenue comes from API usage on Cohere's managed cloud, where customers pay per
      token. Cohere's product portfolio spans generative models (Command A family), retrieval models (Embed, Rerank),
      speech recognition (Transcribe), multilingual research models (Aya, covering 70+ languages), and the North agentic
      AI platform for enterprise workflow automation. The company reached approximately $240 million in annualised
      revenue as of February 2026, up from $13 million at the end of 2023, reflecting compound growth of roughly 10× in
      26 months.
    claimRefs:
      - C001
      - C004
      - C008
      - C017
      - C018
      - C033
      - C034
      - C035
      - C015
  - id: s2
    title: Founders, Leadership, and Governance
    body: >
      Cohere was co-founded by three researchers who met at the University of Toronto and worked at Google Brain. Aidan
      Gomez, who serves as CEO, was the youngest co-author (age 20) on the 2017 landmark "Attention Is All You Need"
      paper that introduced the transformer architecture underpinning virtually all modern LLMs. Nick Frosst, co-founder
      and VP of Research, was also a Google Brain researcher and musician known for his machine-learning work. Ivan
      Zhang, co-founder and CTO, collaborated with Gomez at FOR.ai before joining Cohere. All three completed studies at
      the University of Toronto.


      The company has significantly strengthened its executive bench in 2025. Martin Kon joined as President and COO in
      December 2022 from YouTube (where he was CFO). In August 2025, Cohere hired Joëlle Pineau — formerly VP of AI
      Research at Meta and a prominent Montreal-based AI researcher — as Chief AI Officer, and Francois Chadwick
      (ex-Uber CFO, KPMG US partner) as its first Chief Financial Officer. Phil Blunsom, previously at Google DeepMind,
      serves as Chief Scientist. The board and governance structure are not publicly disclosed, but investors including
      Radical Ventures, Inovia Capital, PSP Investments, NVIDIA, and Salesforce Ventures hold board representation
      rights as a condition of their investment. Cohere Labs, a nonprofit open-source research arm, was launched in June
      2022 and is now led by Marzieh Fadaee following Sara Hooker's departure in September 2025. The founder trio
      retains strong influence and the company shows no signs of CEO succession pressure.
    claimRefs:
