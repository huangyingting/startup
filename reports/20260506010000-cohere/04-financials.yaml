callouts:
  - calloutType: risk
    title: Revenue Concentration in Large Private-Deploy Contracts Creates Churn Exposure
    body: >
      Cohere's 85% revenue concentration in private deployment ACV contracts, while positive for margin profile, creates
      risk from contract concentration. Enterprise software companies at ARR scale of $100–300M typically have top-10
      customers representing 30–60% of total ARR. If Cohere's private-deploy customer base is concentrated in a small
      number of very large contracts (as suggested by the regulated-industry focus), non-renewal of even two or three
      large accounts could materially impact ARR growth. Cohere has not disclosed NRR or retention metrics, which is the
      single most important unknown for underwriting the revenue quality.
    claimRefs:
      - CI018
      - CI019
      - CI027
  - calloutType: strength
    title: High-Margin ACV Model With Strategic Co-Selling Partners Is Rare at Series E Stage
    body: >
      The combination of (1) 85% enterprise ACV revenue (high-predictability, high-margin), (2) strategic investors who
      are simultaneously distribution partners (Oracle Cloud, NVIDIA DGX, Salesforce CRM, Cisco networking), and (3) a
      differentiated private-deploy product that incumbents cannot trivially replicate is unusual for a company at
      Cohere's stage. This combination suggests a path to profitable unit economics at scale that is more credible than
      pure API consumption models. The co-selling partnership structure effectively subsidises Cohere's enterprise GTM,
      allowing the company to punch above its weight in large-enterprise accounts relative to its direct sales
      headcount.
    claimRefs:
      - CI004
      - CI013
      - CI024
