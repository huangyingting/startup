      topic: Cohere gross margin, NRR, and burn rate — no public financial disclosure
      missingEvidence: >-
        Cohere has not published gross margins, net dollar retention, burn rate, or profitability timeline data. All
        estimates are based on comparable enterprise AI companies.
      whyItMatters: >-
        Without gross margin confirmation, the financial thesis rests on industry comparable assumptions; actual margin
        could be materially different if GPU cost or customer support costs are higher than modelled.
      diligencePath: >-
