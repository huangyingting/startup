callouts:
  - title: 'Copyright Litigation: The Highest-Probability Adverse Event'
    body: >-
      The Condé Nast motion-to-dismiss denial in November 2025 removed the primary legal exit ramp. With discovery now
      underway, a 2026–2027 trial or negotiated settlement is the most likely path. Statutory damages exposure is
      theoretically large but settlement is far more probable. The greater risk is if a court orders Cohere to stop
      using web-scraped training data, which would impose structural costs on future model training.
    calloutType: risk
    claimRefs:
      - CR001
      - CR002
      - CR003
  - title: 'Open-Source Parity: Real Threat for Mid-Market, Not for Enterprise Platform'
    body: >-
      Meta Llama 4 and Mistral Large 2 have narrowed the performance gap on benchmarks. But benchmark parity ≠
      deployment parity. Cohere's North platform, private deployment, compliance posture, and enterprise SLAs represent
      genuine switching costs that open-source self-hosting cannot easily replicate. The real risk is losing the bottom
      of the ACV distribution — companies paying $50K–$150K ARR who have engineering resources to self-host.
    calloutType: insight
    claimRefs:
      - CR033
      - CR034
      - CR035
