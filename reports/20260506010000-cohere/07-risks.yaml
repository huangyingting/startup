  - id: TR005
    title: Mitigation and Kill Criteria Table
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - Copyright lawsuit
        - Trial verdict or settlement amount disclosed
        - Damages > $50M or required training data modification
        - Re-assess ARR growth TAM; discount valuation by 15–25%; trigger Series E re-pricing discussion
      - - Open-source parity
        - Open-weight model achieves >90% score on MMLU/enterprise benchmark vs Cohere Command A
        - Free open-source model matches Command A on ≥3 of 5 standard enterprise benchmarks
        - Downgrade platform pricing power thesis; re-weight moat to North platform stickiness over base model value
      - - Azure OAI sovereign convergence
        - Azure announces FedRAMP-authorized private deployment matching Cohere North
        - Azure private sovereign deployment generally available at comparable price-performance
        - Accelerate US federal Cohere differentiation; thesis weakened if Azure parity within 12 months
      - - Aidan Gomez departure
        - CEO change announcement
        - Aidan Gomez resignation or role change
        - Automatic thesis-break trigger; exit if successor lacks comparable enterprise credibility and board confidence
      - - NRR decline
        - Customer cohort data available in Series E data room
        - NRR below 90% in any annual cohort
        - Suspend investment until NRR improvement demonstrated across ≥2 consecutive quarters
      - - Burn rate escalation
        - Quarterly cash flow statements (Series E data room)
        - Cash burn exceeds $40M per quarter without commensurate ARR acceleration
        - Request revised runway analysis and path-to-profitability plan before commitment
    notes: >-
      Kill criteria are investment thresholds, not operational management triggers. Action implication is specific to a
      prospective investor at Series E stage.
