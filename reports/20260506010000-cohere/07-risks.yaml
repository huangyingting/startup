  title: Risks
sections:
  - id: SEC001
    title: Legal and Regulatory Risks
    body: >
      Cohere faces its most acute near-term legal exposure from the copyright infringement lawsuit filed by Condé Nast,
      Raw Story, and other publishers in the Southern District of New York (SDNY) in December 2023. A motion to dismiss
      was denied in November 2025, advancing the case toward discovery and potential trial in 2026–2027. If an adverse
      verdict is reached, statutory damages under the U.S. Copyright Act could reach tens of millions of dollars per
      work infringed. More materially, the lawsuit could require Cohere to modify its training data practices, imposing
      ongoing licensing costs or limiting access to web-scraped corpora that underpin its enterprise LLMs. [CR001]
      [CR002] [CR003]

      On the regulatory front, the EU AI Act's General-Purpose AI (GPAI) systemic risk provisions took effect in August
      2025 for providers of foundation models above the 10^25 FLOPs training threshold. Cohere's Command A model almost
      certainly qualifies. Obligations include model capability assessments, adversarial testing, transparency reporting
      to the EU AI Office, and cybersecurity incident notification. Non-compliance carries fines of up to 3% of global
      annual turnover or €15 million, whichever is higher. [CR004] [CR005] [CR006]

      Cohere's absence from the FedRAMP Authorized marketplace — despite a preliminary listing — is a strategic risk
      limiting access to U.S. federal civilian agency contracts, a TAM estimated at $8–10 billion annually. GDPR
      exposure is partially mitigated by Cohere's private-deployment architecture, which keeps customer data
      on-premises; however, EU customers still face AI Act transparency and human oversight requirements. Canada's AIDA
      (Artificial Intelligence and Data Act), tabled in 2022 and still progressing as of early 2026, could impose
      additional compliance overhead on Cohere's Canadian operations. [CR007] [CR008] [CR009]
    tableRefs:
      - TR001
      - TR004
    figureRefs:
      - FR001
  - id: SEC002
    title: Operational and Technology Risks
    body: >
      Cohere's model training pipeline is heavily dependent on NVIDIA H100 and H200 GPU hardware at a time when
      allocation constraints and pricing pressures remain elevated. Compute OpEx is estimated to represent 30–45% of
      Cohere's operating cost base given the scale of R&D spend required to maintain frontier-adjacent model quality.
      Any multi-month delay in GPU procurement directly threatens Cohere's model release cadence and competitive
      positioning relative to OpenAI and Anthropic, which have preferential NVIDIA supply relationships. [CR017] [CR018]
      [CR019]

      The Aleph Alpha acquisition completed in early 2026 introduces integration risk: two engineering organizations
      with different technical stacks, hiring cultures, and customer bases must be merged while maintaining active
      enterprise deployments across Europe. Aleph Alpha's German/EU customers have strict data sovereignty requirements
      that may conflict with Cohere's standard deployment architecture, requiring custom engineering. [CR020] [CR021]

      Key-person dependency is Cohere's most acute organizational risk. Aidan Gomez, CEO and co-founder, is the central
      figure in enterprise sales relationships, investor relations, and technical credibility. His departure — whether
      to a competitor, his own venture, or academia — would materially destabilize the company at a critical growth
      phase. Co-founders Nick Frosst and Ivan Zhang reduce but do not eliminate this risk. There are no succession plan
      disclosures in public sources. Security certifications (SOC 2 Type II, ISO 27001) are in place but AI-specific
      safety certifications aligned with NIST AI RMF remain incomplete. [CR022] [CR023] [CR024]
    tableRefs:
      - TR002
      - TR005
    figureRefs:
      - FR002
  - id: SEC003
    title: Strategic Risks, Financial Exposure, and Mitigations
    body: >
      Open-source model parity is the existential strategic risk for Cohere's business model. Meta's Llama 4, Mistral
      Large 2, and Alibaba's Qwen2.5-72B have demonstrated that open-weight models can match or exceed closed mid-tier
      enterprise model performance on many benchmarks. If open-source models achieve enterprise-grade reliability —
      including fine-tuning pipelines, retrieval-augmented generation, and private deployment support — Cohere's
      per-token pricing premium becomes harder to sustain. The differentiated moat remains the North enterprise platform
      and compliance posture, not the base LLM itself. [CR033] [CR034] [CR035]

      Partner concentration risk is elevated. Oracle holds an equity stake and is a key distribution partner; Microsoft
      Azure simultaneously offers Azure OpenAI Service (a direct Cohere competitor) while being a cloud infrastructure
      provider for some Cohere workloads. This creates a structural tension where Cohere's most important distribution
      partners are also advancing competing products. AWS Bedrock marketplace listings provide distribution but also
      commoditize LLM access in ways that compress Cohere's pricing power. [CR036] [CR037] [CR038]

      Cohere's cash burn is estimated at $80–120 million annually based on disclosed R&D headcount and compute costs
      against a $500M+ balance sheet. At $240M ARR with ~80% gross margins on platform subscriptions, Cohere is not yet
      profitable; customer acquisition costs in enterprise sales cycles of 6–18 months are substantial. The primary
      thesis-break scenarios are: (a) copyright adverse verdict with >$50M liability, (b) loss of two or more Fortune
      500 customers to Azure OpenAI sovereign parity, (c) open-source models eliminating the mid-market pricing tier,
      and (d) Aidan Gomez departure before Series E+ exit event. [CR039] [CR040] [CR041] [CR042]

      Mitigations in place include: private-deployment architecture reducing data sovereignty exposure; SOC 2 and ISO
      27001 certifications enabling regulated-industry sales; multi-jurisdictional HQ structure (Toronto + London + San
      Francisco) providing regulatory arbitrage; and the North enterprise platform creating switching costs beyond base
      model access. Kill criteria that would justify early exit: copyright damages exceeding insurance coverage, NRR
      falling below 90%, or command API pricing falling below $0.50/1M tokens (open-source substitution signal).
    tableRefs:
      - TR003
    figureRefs:
      - FR003
