  evidenceGaps:
    - type: data-not-public
      severity: material
      topic: Enterprise AI market share by vendor (Cohere specifically) — no audited market share data available
      missingEvidence: >-
        Cohere's enterprise market share is not independently quantified; the 32% Anthropic and ~25% OpenAI figures from
        TechCrunch are from one survey. Cohere's specific share is not disclosed.
      whyItMatters: >-
        Without accurate market share, it is impossible to verify whether Cohere is gaining or losing share vs.
        Anthropic and Azure in regulated enterprise accounts.
      diligencePath: >-
        Obtain third-party analyst report (Gartner Magic Quadrant for Cloud AI Infrastructure, Forrester Wave) that may
        rank enterprise AI vendors with share data.
      relatedQuestionRefs:
        - RQ016
    - type: data-not-public
      severity: material
      topic: Cohere customer churn and retention rates — no public disclosure
      missingEvidence: >-
        Cohere does not disclose net revenue retention, gross revenue retention, or churn rates for enterprise
        contracts.
      whyItMatters: High churn would indicate competitive moat is not holding; high NRR would confirm platform stickiness thesis.
      diligencePath: Request NRR, GRR, and logo retention data in the investor data room.
      relatedQuestionRefs:
        - RQ026
    - type: data-not-public
      severity: minor
      topic: Enterprise switching costs from OpenAI to Cohere — no independent cost study available
      missingEvidence: >-
        No published independent study quantifies the cost or complexity of switching from OpenAI API to Cohere private
        deployment in regulated-industry contexts.
      whyItMatters: >-
        Switching cost magnitude determines how defensible Cohere's installed base is; high switching cost strengthens
        moat, low cost weakens it.
      diligencePath: >-
        Request customer case studies from Cohere documenting migration timelines and costs; interview 2-3 Cohere
        enterprise customers.
      relatedQuestionRefs:
        - RQ014
    - type: data-not-public
      severity: minor
      topic: Independent benchmark ranking of Cohere Command A vs GPT-4o vs Claude Opus on enterprise task benchmarks
      missingEvidence: >-
        Cohere has not published Command A results on all leading benchmark suites (MMLU, HumanEval, MATH). Third-party
        independent benchmarks including Cohere are incomplete.
      whyItMatters: >-
        Without benchmark data, enterprise buyers cannot independently verify Cohere model quality relative to frontier
        models — which risks Cohere being downgraded on capability perceptions.
      diligencePath: >-
        Review HELM, LMSYS Chatbot Arena, and AlpacaEval for any Cohere model results; request Cohere's internal
        benchmark documentation.
      relatedQuestionRefs:
        - RQ017
