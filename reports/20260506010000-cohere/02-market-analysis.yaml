  evidenceGaps:
    - type: data-not-public
      severity: material
      topic: No published breakdown of enterprise LLM market by private-deploy vs public-cloud share
      missingEvidence: >-
        No analyst has separately quantified the private/sovereign-deploy sub-segment of enterprise LLM independently of
        the broader market. The $2–3B SAM estimate is Cohere-ARR-derived.
      whyItMatters: SAM estimate precision directly affects Cohere's implied market share and growth story.
      diligencePath: >-
        Identify and procure specialist market research (Gartner Magic Quadrant for Cloud AI Services; Forrester
        enterprise AI security wave) that may subdivide the market by deployment model.
      relatedQuestionRefs:
        - RQ013
    - type: stale
      severity: minor
      topic: Analyst estimates for enterprise LLM TAM dispersion — no consensus methodology
      missingEvidence: >-
        The 50%+ range in 2025 estimates ($5.9B vs $8.8B) reflects definitional inconsistency. No independent
        reconciliation of analyst methodologies is publicly available.
      whyItMatters: Valuation comps and market-share calculations are sensitive to whether $6B or $9B is the correct 2025 baseline.
      diligencePath: >-
        Cross-reference Gartner's AI application software breakdown with LLM-specific estimates to validate sub-segment
        sizing.
      relatedQuestionRefs:
        - RQ026
    - type: data-not-public
      severity: minor
      topic: 'Total cost of ownership comparison: private LLM deployment vs public cloud API at enterprise scale'
      missingEvidence: >-
        No published independent TCO comparison study quantifies the full cost differential between on-premises private
        LLM deployment and shared public-cloud API usage across different enterprise scales.
      whyItMatters: >-
        TCO is a key decision criterion for enterprise buyers evaluating Cohere's private-deployment model vs
        OpenAI/Anthropic API alternatives.
      diligencePath: >-
        Request TCO case studies from Cohere and independently compare compute, licensing, and operations costs using
        public cloud pricing calculators.
      relatedQuestionRefs:
        - RQ020
    - type: enumeration-incomplete
      severity: minor
      topic: 'Segment / Buyer Map T203: regulatory details vary by jurisdiction and are not exhaustively captured'
      missingEvidence: >-
        Buyer constraints for specific geographies (Singapore, UAE, India, Brazil) not captured. T203 shows 6 verticals;
        actual regulated enterprise market has more nuanced segmentation.
      whyItMatters: >-
        Geographic gaps in buyer segmentation could cause Cohere to undersize certain markets or overestimate
        penetration in others.
      diligencePath: >-
        Obtain vertical-specific analyst reports (e.g., Gartner on AI in banking 2025; IDC on healthcare AI) for
        targeted segmentation data.
      relatedTableRefs:
