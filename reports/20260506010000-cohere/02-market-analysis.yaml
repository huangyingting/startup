callouts:
  - calloutType: insight
    title: Regulatory Tailwind Converts Data Privacy Compliance into a Market Mandate
    body: >
      The EU AI Act, GDPR, and sector-specific rules (HIPAA, FINRA, MAS) are doing more than protecting consumers — they
      are structurally forcing regulated enterprises to abandon public-cloud AI APIs and adopt private deployment
      architectures. This is Cohere's secular tailwind: regulations that were originally written for generic cloud
      computing are now being applied to LLM APIs, and the compliance answer in many verticals is Cohere-style private
      deployment. As enforcement matures and more jurisdictions enact AI-specific data-residency rules, the addressable
      market for Cohere's model grows without requiring any additional Cohere-side investment in customer education.
    claimRefs:
      - C070
      - C071
      - C072
  - calloutType: risk
    title: Open-Source LLM Commoditisation Threatens Commercial Model Fees
    body: >
      Meta's Llama 3 and Mistral's open-source models are capable, freely available, and deployable on-premises — the
      same architectural story Cohere tells, but at zero licensing cost for the foundation model. Enterprises with ML
      engineering teams can already self-host competitive models at lower TCO than a Cohere platform licence. If
      open-source quality closes the remaining gap with frontier commercial models (likely by 2026–2027), the primary
      justification for Cohere's model fees weakens. Cohere's platform layer (North), agentic capabilities, fine-tuning
      tooling, and enterprise support are therefore increasingly important as differentiation above the commoditised
      model layer.
    claimRefs:
      - C073
      - C074
  - calloutType: strength
    title: 'Market Timing Is Favourable: AI Budget Expansion Is Doubling Enterprise Spend'
    body: >
      Enterprise AI application software spending nearly doubled from $83.7 billion in 2024 to $172 billion in 2025 per
      Gartner — and is forecast to reach $270 billion in 2026. This budget expansion is structural: large organisations
      have committed multi-year AI transformation programmes that will sustain procurement cycles regardless of market
      conditions. Cohere is positioned to benefit directly from the regulated-enterprise segment of this spending surge,
      which is the fastest-growing and most defensible sub-segment due to its compliance requirements.
    claimRefs:
      - C045
      - C046
      - C069
