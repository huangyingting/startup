chapter:
  number: 2
  title: Market Analysis
  summary: >
    The addressable market for enterprise LLM software is large and growing rapidly, driven by regulatory pressure for
    private deployment, expanding enterprise AI budgets, and growing evidence of productivity ROI. The global enterprise
    LLM market is estimated at $5.9B–$8.8B in 2025, growing at 26–30% CAGR to $48–$91B by 2034, depending on analyst
    methodology. Cohere addresses a sub-segment of this market focused on private, on-premises, and sovereign-cloud
    deployments in regulated industries — a TAM/SAM layer estimated at $2–3B in 2025 and expanding as GDPR, the EU AI
    Act, and sector-specific data residency mandates push enterprises away from public cloud AI. Buyer authority sits
    primarily with CIOs, CISOs, and CDOs in verticals such as financial services, healthcare, government, and
    manufacturing. Key growth drivers include sovereign AI mandates, enterprise productivity demands, and strategic AI
    investments by infrastructure partners; key constraints include adoption failure rates (~70–85% of AI projects fail
    to meet expectations), open-source alternatives, integration complexity, and evolving copyright/regulatory risk.
sections:
  - id: s1
    title: Market Definition and Boundaries
    body: >
      The market Cohere operates in can be defined at three levels of granularity. The broadest frame is enterprise AI
      application software: all software applications that embed AI or use foundation models to automate, augment, or
      assist enterprise workflows. Gartner estimates this segment at $83.7 billion in 2024 and $172 billion in 2025 — a
      near-doubling in a single year — reflecting the accelerating embedment of AI across enterprise software stacks.
      This frame includes CRM, ERP, productivity, HR, and industry-specific software augmented by AI and is too broad to
      be Cohere's primary market.


      The more precise market is enterprise LLM software: platforms, APIs, and models that serve enterprise buyers who
      want to deploy, fine-tune, or run large language models for knowledge work, document processing, decision support,
      and workflow automation. This market is estimated at $5.9B–$8.8B in 2025, depending on the analyst's scope. It
      explicitly excludes consumer AI applications (ChatGPT free tier, Gemini for consumers), cloud AI
      infrastructure/IaaS, and AI hardware. Cohere competes directly in this segment.


      Within enterprise LLM software, Cohere's specific sub-market is private-deployment enterprise LLMs: enterprises
      that specifically require on-premises, VPC, or sovereign-cloud hosting of their LLMs because they cannot transmit
      sensitive data to shared public cloud APIs. Regulatory drivers — GDPR in Europe, HIPAA in US healthcare,
      sector-specific rules in banking and defense, and the EU AI Act — make this sub-segment meaningfully distinct from
      the general enterprise LLM market. This sub-segment is estimated to represent approximately 25–35% of the broader
      enterprise LLM market, or roughly $1.5–$3.0B of serviceable addressable market for Cohere in 2025.
    claimRefs:
      - C045
      - C046
      - C047
      - C048
      - C049
      - C050
  - id: s2
    title: Market Sizing — TAM, SAM, and Capturable Share
    body: >
      Market sizing for enterprise LLM software carries significant analyst dispersion. Estimates for the 2025
      enterprise LLM market range from $5.9 billion (Future Market Insights) to $8.8 billion (Global Market Insights),
      with Fortune Business Insights projecting $5.91 billion for 2026, implying the market was slightly smaller in
      2025. The range reflects differing scope definitions: some include AI infrastructure and managed services, while
      others restrict to model-layer and platform software.


      Looking out to 2034, analyst consensus centres on $48–$91 billion with 26–30% CAGR. The lower bound ($48B, Fortune
      BI) assumes some commoditisation of foundation models and aggressive open-source substitution; the upper bound
      ($91B, Future Market Insights) assumes sustained proprietary model leadership and vertical-specific expansion.


      Gartner takes a broader view: AI application software spending broadly defined rose from $83.7 billion in 2024 to
      $172 billion in 2025 — though this includes AI-embedded enterprise software (Salesforce AI, SAP Joule, Microsoft
      Copilot) that is not directly Cohere's market. This TAM is nonetheless useful as a ceiling on enterprise AI budget
      available to displace with pure-play AI offerings.


      For Cohere specifically, the relevant SAM is the private-deployment enterprise LLM subset. Based on analyst
      estimates that approximately 85% of Cohere's revenue derives from private deployments, and extrapolating the
      market to reflect that Cohere captures approximately 8–10% of its SAM at current ARR ($240M), the SAM is
      approximately $2.4–$3.0 billion in 2025 and growing at CAGR comparable to the broader enterprise LLM market. The
      sovereign cloud market (a proxy for the private-AI infrastructure layer) is separately estimated at $117–$154
      billion in 2025 and growing, reflecting the massive government and enterprise investment in data sovereignty that
      underpins Cohere's deployment model. Cohere's serviceable obtainable market (SOM) is a fraction of its SAM — the
      share it can realistically win given current distribution, team size, and competitive position — estimated at
      $300–$600 million at current ARR trajectory by end-2026.
    claimRefs:
      - C051
      - C052
      - C053
      - C054
      - C055
      - C056
      - C057
      - C058
      - C059
  - id: s3
    title: Buyer Segmentation and Adoption Dynamics
    body: >
      Enterprise LLM buyers are concentrated in five regulated verticals: financial services (banking, insurance, wealth
      management), healthcare and life sciences, government and public sector, manufacturing and industrial, and retail
      and consumer products. Of these, financial services is the largest by enterprise AI budget and the most
      restrictive in data sovereignty requirements; healthcare is the second-largest but faces HIPAA and patient data
      privacy constraints that mandate local or private deployment. Government buyers at federal and national levels are
      often subject to sovereign cloud mandates that disqualify US hyperscaler public clouds entirely for classified or
      sensitive workloads.


      Budget authority for enterprise LLM purchases sits primarily with the Chief Information Officer (CIO) or Chief
      Technology Officer (CTO), who own infrastructure and software budgets. The CISO increasingly holds veto authority
      as AI deployments must satisfy security and compliance policies. Chief Data Officers (CDOs) and Chief Digital
      Officers initiate many AI projects from the business side. In practice, enterprise AI procurement involves a
      multi-stakeholder committee (IT, security, legal, business unit), which extends sales cycles to 6–18 months for
      large contracts.


      Enterprise AI adoption is at an inflection: 78% of organisations now deploy AI in at least one function (up from
      55% in 2023), but only 6% qualify as "AI high performers" with transformational impact. The gap reflects the
      difficulty of moving from pilot to production: 70–85% of enterprise AI projects fail to meet expectations,
      primarily due to data quality issues, integration complexity, governance gaps, and lack of change management. This
      failure rate creates a durable market for Cohere's North platform layer and Compass product, which are positioned
      to improve deployment success rates. The average enterprise AI spend per organisation was $1.9 million in 2024;
      Cohere's multi-year contracts are likely in the $500K–$5M per year range based on named customer profile.
    claimRefs:
      - C060
      - C061
      - C062
      - C063
      - C064
      - C065
      - C066
      - C067
      - C068
  - id: s4
    title: Growth Drivers and Adoption Constraints
    body: >
      The primary growth driver for Cohere's market is regulatory pressure toward private and sovereign AI deployment.
      The EU AI Act (enforcement began 2025–2026) classifies many enterprise AI applications as "high-risk," requiring
      transparency, explainability, and audit trails that are easier to satisfy in private-deployment architectures.
      GDPR fines for data breaches involving third-party cloud AI providers create direct financial risk that private
      deployment mitigates. HIPAA-covered entities in the US face similar constraints. These regulatory frameworks turn
      Cohere's private-deployment model from a niche option into a compliance-mandated architecture for a large subset
      of the market.


      Secondary growth drivers include the accelerating enterprise AI budget cycle — AI application software spending
      doubled from $83.7B (2024) to $172B (2025) per Gartner — and demonstrated ROI for enterprises that successfully
      implement AI, with average returns of $3.70 per $1 invested cited in industry surveys. Geopolitical factors also
      drive sovereign cloud investment: European governments (notably Germany, France, UK) and Asia-Pacific governments
      (Japan, Korea, Singapore) are mandating local AI infrastructure rather than dependence on US hyperscalers,
      benefiting Cohere's Fujitsu (Japan), LG CNS (Korea), and UK government partnerships.


      Key adoption constraints include: open-source LLM competition (Meta's Llama, Mistral) which allows enterprises to
      self-host capable models without paying proprietary model fees; the high AI project failure rate reducing budget
      holder confidence; the total cost of ownership of private deployment versus shared-cloud API calls (compute,
      maintenance, upgrade costs borne by the enterprise); and the high switching costs of integrating LLMs into
      existing enterprise workflows, which cut both ways (benefit for Cohere once deployed; barrier to initial
      adoption). Talent scarcity — fewer than 30% of organisations have enough ML engineers to successfully deploy
      enterprise AI in-house — creates demand for turnkey solutions like Cohere's North platform but also limits market
      growth velocity.
    claimRefs:
      - C069
      - C070
      - C071
      - C072
      - C073
      - C074
      - C075
