callouts:
  - calloutType: strength
    title: Named Enterprise Anchors Provide Credible Reference Coverage for Sales
    body: >
      Cohere's public customer list spans three continents and multiple verticals: Oracle (technology, US), Fujitsu (IT
      services, Japan), LG CNS (Korea), RBC Royal Bank (financial services, Canada), Ensemble Health (healthcare, US),
      Bosch (industrial, Germany), SAP (enterprise software, EU), and Dell (hardware, US). This geographic and vertical
      diversity provides Cohere's enterprise sales team with a credible reference set for cross-vertical and
      cross-regional sales conversations. Oracle's and SAP's presence as both customers and distribution partners is
      particularly valuable — Oracle's OCI customer base and SAP's 400K+ enterprise customer base represent enormous
      potential Cohere distribution leverage that is not reflected in the current ARR run rate.
    claimRefs:
      - C201
      - C205
      - C206
      - C220
  - calloutType: risk
    title: Revenue Concentration in Top Accounts and Copyright Litigation Are the Two Material Customer Risks
    body: >
      The combination of (1) estimated 40–60% of ARR concentrated in the top 10 enterprise accounts, and (2) the ongoing
      Condé Nast copyright lawsuit proceeding to discovery (motion to dismiss denied November 2025) creates two material
      customer risks. Revenue concentration is structural at Cohere's stage and ACV model — the company needs 3–5 years
      of customer base diversification to reduce this risk. The copyright litigation risk is more acute: enterprise
      legal counsel at regulated financial institutions, healthcare companies, and government entities are notoriously
      risk-averse about AI vendors with unresolved copyright claims, and the case's progression to discovery phase means
      the uncertainty will persist through at least 2026–2027.
    claimRefs:
      - C211
      - C212
      - C213
      - C221
