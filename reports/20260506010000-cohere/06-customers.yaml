  evidenceGaps:
    - type: enumeration-incomplete
      severity: minor
      topic: >-
        Named customer proof table (T603) — only publicly disclosed customers included; majority of 400–600 enterprise
        accounts are confidential
      missingEvidence: >-
        Cohere does not publish a full enterprise customer list. T603 reflects only the ~10 publicly named customers.
        Actual named account count is undisclosed.
      whyItMatters: >-
        Coverage is biased toward high-profile reference customers. True geographic/vertical spread and total enterprise
        footprint cannot be verified externally.
      diligencePath: Request a full anonymized customer list by vertical, geography, and ACV band under NDA.
      relatedTableRefs:
        - T603
      relatedQuestionRefs:
        - RQ013
    - type: private-evidence-only
      severity: major
      topic: NRR and gross logo retention data — Cohere enterprise customer cohort health
      missingEvidence: >-
        Cohere has not disclosed net dollar retention (NRR), gross logo retention, or cohort-level expansion data.
        Without NRR, the quality and durability of the $240M ARR base cannot be independently assessed.
      whyItMatters: >-
        NRR below 100% would indicate net churn from enterprise accounts, fundamentally undermining the ARR growth
        thesis. NRR above 120% would confirm a healthy land-and-expand motion.
      diligencePath: >-
        Request NRR by cohort (2022, 2023, 2024) and gross logo retention rate by vertical under NDA from Cohere
        management.
      relatedQuestionRefs:
        - RQ009
        - RQ025
    - type: private-evidence-only
      severity: major
      topic: Revenue concentration — top-10 customer share of ARR
      missingEvidence: >-
        Customer revenue concentration is not disclosed. Top-10 customer share of ARR, contract renewal schedule, and
        dependency on any single account are all unavailable externally.
      whyItMatters: >-
        If 3 top-10 accounts representing $30M+ in ARR do not renew, ARR growth stalls; this is the single largest
        underwriting risk for a Series E investor.
      diligencePath: Request customer contract schedule (top 20 customers by ACV, renewal dates, multi-year vs annual) under NDA.
      relatedQuestionRefs:
        - RQ025
        - RQ023
    - type: data-not-public
      severity: minor
      topic: Time-to-value for Cohere enterprise deployments — no published case study data
      missingEvidence: >-
        No published case study data quantifies time from Cohere contract signing to first production workload or
        measured ROI for private deployment customers.
      whyItMatters: >-
        Long time-to-value increases CAC payback period and reduces net dollar retention if customers fail to reach ROI
        before renewal decision point.
      diligencePath: >-
        Request 3–5 enterprise customer case studies with deployment timeline and measured ROI data from Cohere under
        NDA or for public publication.
      relatedQuestionRefs:
        - RQ017
    - type: data-not-public
      severity: minor
      topic: Geographic revenue split — APAC vs North America vs Europe breakdown
      missingEvidence: >-
        Cohere does not disclose geographic revenue breakdown; only named customer distribution provides clues about
        international revenue mix.
      whyItMatters: >-
        Geographic concentration risk (e.g., majority North America) creates FX and economic cycle exposure; APAC
        revenue heavily dependent on Fujitsu and LG CNS reseller relationships.
      diligencePath: Request geographic revenue breakdown by region and by direct vs reseller channel under NDA.
      relatedQuestionRefs:
        - RQ019
        - RQ023
