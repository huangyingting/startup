callouts:
  - calloutType: strength
    title: Embed + Rerank Retrieval Moat Is the Most Durable Technical Differentiator
    body: >
      Cohere's Embed v3 and Rerank models consistently rank among the top performers on the MTEB (Massive Text Embedding
      Benchmark), the industry-standard benchmark for text retrieval and semantic similarity. This retrieval leadership
      is technically distinct from generative model quality: it requires specialised training on retrieval-specific
      supervised data (e.g., query-document relevance pairs) at scale, which competing LLM providers cannot replicate
      simply by scaling their generative models. Since RAG is the dominant enterprise LLM deployment pattern, Cohere's
      retrieval advantage gives it a penetration pathway into enterprise accounts that does not depend on Command A's
      generative benchmark performance.
    claimRefs:
      - CE008
      - CE009
      - CE025
  - calloutType: risk
    title: Context Window Gap (256k vs 1M) Limits Large-Document Use Cases
    body: >
      Command A's 256k token context window, while substantially larger than its predecessor, trails Anthropic's Claude
      (1M tokens for Opus and Sonnet) and Google's Gemini 1.5 Pro (1M tokens) by a factor of four. This gap is
      practically significant for enterprise customers who need to process full-length legal contracts (>500 pages),
      comprehensive financial filings, large codebase analysis, or extended research documents in a single context
      window. Until Cohere ships a 1M+ context model (unconfirmed; informally referenced for 2026–2027), it will
      continue to lose some large-document enterprise RFPs to Anthropic and Google.
    claimRefs:
      - CE026
      - CE027
      - CE028
