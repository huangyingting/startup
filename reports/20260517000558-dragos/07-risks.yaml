company:
  name: "Dragos, Inc."
chapter:
  number: 7
  title: "Risks"
  summary: |
    Dragos's most material risk is financial opacity combined with the failed 2023 fundraising attempt:
    the company has not disclosed its valuation, ARR, or burn rate since the $1.7B Series D in October
    2021, and the June 2023 layoff of approximately 9% of staff signals that growth decelerated sharply.
    Competitive risk is elevated -- Claroty ($635M total raised), Nozomi Networks (IPO-track), Microsoft
    Defender for IoT (free tier, massive distribution advantage), and Armis ($4.3B valuation) all compete
    in the OT security platform market with growing resources. Regulatory tailwinds from NERC CIP, CISA
    Volt Typhoon, and TSA Pipeline Security Directives create non-discretionary budget urgency for
    Dragos's customers, but also create buyer paralysis during standard-update cycles. Key-person
    concentration on CEO and co-founder Robert M. Lee is the single largest governance risk: his
    departure would remove the company's primary thought-leadership platform and investor credibility
    anchor. The thesis-break trigger is failure to raise a Series E at a defensible valuation before cash
    reserves deplete, or the entry of a major IT security platform with OT bundling at below-ACV pricing.

sections:
  - id: R01
    title: "Regulatory and Legal Risk"
    body: |
      Dragos operates in a regulatory environment that is simultaneously a tailwind and a source of risk.
      NERC CIP (Critical Infrastructure Protection) standards CIP-002 through CIP-014 mandate that bulk
      electric system operators implement security controls for industrial control systems, and the failure
      to comply carries fines of up to $1M per violation per day. This mandate creates non-discretionary
      budget obligations for Dragos's primary customer segment. The CISA Volt Typhoon Advisory
      (AA24-057A, February 2024) and the PIPEDREAM joint advisory (AA22-103A) explicitly recommend
      OT-specific monitoring and detection capabilities. TSA Pipeline Security Directives (SD-02C,
      extended through 2025) similarly mandate OT security architecture changes for pipeline operators.

      The regulatory risk is not that requirements will disappear but that the pace of regulatory change
      creates buyer paralysis. When NERC CIP standards are updated (as CIP-013 was in 2022 for supply
      chain security), utilities may defer discretionary spending while compliance teams assess new
      requirements. Additionally, Dragos's threat intelligence publications carry liability exposure if
      any attribution or technical claim proves incorrect and a regulated entity relies on it during an
      incident response.

      Dragos has no material disclosed litigation as of May 2026. In May 2023, a cybercrime group gained
      access to a newly hired employee's account through social engineering and attempted to extort Dragos
      using downloaded sales intelligence reports. CEO Robert Lee disclosed the incident publicly on
      social media. NERC CIP-013 supply chain risk management requirements may require Dragos customers
      to conduct formal vendor security assessments at contract renewal.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006, CR007]
    tableRefs: [TR001]
    figureRefs: []

  - id: R02
    title: "Competitive and Market Risk"
    body: |
      The OT cybersecurity platform market is intensifying rapidly. Dragos competes across three tiers:
      (1) dedicated OT security pure-plays -- Claroty ($635M total raised; Schneider Electric and
      Rockwell Automation as strategic investors), Nozomi Networks (Series D funded; IPO-track), and
      Armis ($4.3B valuation, 2023); (2) IT security vendors expanding to OT -- Microsoft Defender for
      IoT (free to Azure/Sentinel customers), Palo Alto Networks Industrial OT Security, and Fortinet OT
      capabilities; and (3) industrial automation vendors building native OT security -- Honeywell Forge,
      Siemens Eos.ii. Notably, Rockwell Automation is both a Dragos investor and a Claroty strategic
      investor -- a direct conflict of interest that could influence Rockwell's platform purchasing
      decisions.

      Dragos's primary competitive moat is ICS threat intelligence depth: the WorldView threat
      intelligence platform, named ICS threat groups only Dragos tracks (CHERNOVITE, ELECTRUM, VOLTZITE),
      and a 250+ ICS threat indicator catalog represent barriers that IT-native competitors cannot quickly
      replicate. However, the free tier of Microsoft Defender for IoT provides basic OT asset inventory
      at near-zero marginal cost for Azure/Sentinel customers, compressing the market for Dragos's
      entry-level product tier.

      The market education risk is material: a substantial share of industrial asset owners do not yet
      have dedicated OT security budgets. Converting these prospects requires 12-18 month sales cycles,
      in-person proof-of-value deployments, and sustained executive relationship building. This elongated
      sales cycle, combined with Dragos's dependency on a 100+ channel partner network, creates
      pipeline-to-revenue dynamics that are highly sensitive to macro headwinds. The 2022-2023 industrial
      software spending slowdown culminated in Dragos's failed fundraising attempt and June 2023 layoffs.
    claimRefs: [CR008, CR009, CR010, CR011, CR012, CR013, CR014, CR015]
    tableRefs: [TR002]
    figureRefs: [FR001]

  - id: R03
    title: "Operational and Technical Risk"
    body: |
      Dragos's platform delivery model is cloud-managed with on-premise sensor deployment, creating a
      dual operational dependency: cloud availability for the SaaS management layer and WorldView
      intelligence updates, and on-premise hardware uptime for Dragos Network Sensors at customer sites.
      A sustained cloud infrastructure outage would prevent customers from receiving updated threat
      intelligence, creating potential detection gaps during active OT threat campaigns.

      Dragos's incident response capacity represents a structural operational risk. The company is one of
      a very small number of vendors globally capable of credibly responding to complex ICS incidents.
      The simultaneous occurrence of two or more major ICS incidents could exhaust Dragos's IR team
      capacity and create service level failures. The WorldView threat intelligence flywheel creates a
      reinforcing dependency: its accuracy depends on active sensor telemetry from the deployed customer
      base, meaning that a stall in new deployments directly degrades the intelligence quality that is
      Dragos's primary differentiation.

      Dragos's distributed and remote-first workforce model covers 40+ US states and multiple
      international offices. While this reduces facilities concentration risk, it increases communication
      overhead. The company's technical workforce competes for senior OT security engineers with Booz
      Allen Hamilton, Accenture, and Deloitte, creating talent attrition risk compounded by the relative
      illiquidity of Dragos's pre-IPO equity compensation.
    claimRefs: [CR016, CR017, CR018, CR019, CR020, CR021, CR022]
    tableRefs: [TR003]
    figureRefs: [FR002]

  - id: R04
    title: "Financial and Capital Risk"
    body: |
      Dragos's most significant financial risk is the combination of funding opacity and the failed 2023
      fundraising attempt. The company's last publicly confirmed financing event was the $200M Series D
      at a $1.7B post-money valuation in October 2021. Since then -- over 4.5 years -- no additional
      equity raise has been publicly disclosed. The June 2023 layoff of approximately 9% of the workforce
      was reported by The Register and Bloomberg to be a direct consequence of a fundraising attempt that
      did not achieve its target. This implies that either growth had decelerated sufficiently that
      investors declined to fund at the Series D valuation, or Dragos sought capital at a price investors
      considered unsupported.

      Without public financial disclosure, burn rate assessment is impossible from external sources.
      Cybersecurity companies at Dragos's estimated ARR range ($50-$150M, based on stage, team size, and
      market benchmarks) typically carry annual operating costs of $100-$200M+ including R&D, sales
      force, IR services, and intelligence operations. At an $80-$120M/year burn rate -- a reasonable
      assumption given disclosed team size -- the $200M Series D would have provided approximately 20-30
      months of runway from October 2021, implying cash pressure began in mid-2023.

      Customer concentration amplifies financial risk. Three of Dragos's most visible named customers --
      Koch/Georgia-Pacific, National Grid Partners, and Rockwell Automation -- are also Series D
      investors. If any of these anchor relationships weakened through contract non-renewal or platform
      consolidation to a competitor, the revenue impact would be disproportionate. The Rockwell
      conflict-of-interest adds a specific concentration risk vector that does not appear in public
      disclosures.
    claimRefs: [CR023, CR024, CR025, CR026, CR027, CR028, CR029]
    tableRefs: []
    figureRefs: []

  - id: R05
    title: "Key-Person and Governance Risk"
    body: |
      CEO and co-founder Robert M. Lee is the single most important non-financial asset at Dragos. Lee
      founded Dragos in 2016 after serving in US Air Force Cyber Command and NSA as an ICS/SCADA
      specialist, co-discovered the Industroyer/CRASHER malware that attacked Ukraine's power grid in
      2016, and has become the primary thought leader in ICS cybersecurity globally. His public profile
      -- hosting the Control Loop podcast with CyberWire, speaking at S4, RSA, and Black Hat annually --
      creates brand equity that cannot easily transfer to a successor.

      Dragos's board composition beyond investor representatives (Koch Disruptive Technologies,
      BlackRock, National Grid Partners, Rockwell Automation) is not publicly disclosed. The 2023 board
      expansion with Bill Fehrman and Ekta Singh Bushell added independent directors, but no audit
      committee structure, compensation committee details, or formal governance documents are publicly
      available. This opacity limits assessment of whether appropriate independent oversight exists for
      CEO compensation decisions, financial controls, and related-party transactions with
      investor-customers.

      The May 2023 social engineering incident adds a governance signal: a company that markets OT
      threat detection was itself successfully social-engineered. The transparent disclosure was a
      positive governance indicator, but the incident demonstrated operational security vulnerabilities
      in non-technical administrative functions. Competitors may leverage this in sales situations.
    claimRefs: [CR030, CR031, CR032, CR033, CR034, CR035]
    tableRefs: [TR004]
    figureRefs: [FR003]

  - id: R06
    title: "Thesis-Break Triggers and Termination Criteria"
    body: |
      The investment thesis for Dragos rests on three pillars: (1) the regulatory and geopolitical
      tailwind creates non-discretionary OT security budget for critical infrastructure operators; (2)
      threat intelligence depth (21+ named ICS threat groups, PIPEDREAM/Volt Typhoon expertise,
      WorldView platform) creates a defensible moat against IT-native competitors; and (3) the community
      funnel (OT-CERT, Neighborhood Keeper, CDP) creates a pipeline of future commercial customers that
      reduces CAC over time. Each pillar has a distinct termination criterion.

      For the regulatory tailwind: a reversal of NERC CIP enforcement posture or a CISA policy shift
      toward technology-neutral frameworks would reduce the urgency premium that drives Dragos's
      pipeline. This is low-probability given the geopolitical threat environment but structurally
      possible under significant political shifts. For the intelligence moat: if Microsoft, Palo Alto, or
      a government intelligence agency published equivalent OT threat intelligence in a freely accessible
      format, the WorldView subscription model would face severe pressure. For the community funnel: if
      OT-CERT, CDP, and Neighborhood Keeper fail to convert at commercially meaningful rates within
      24-36 months, the community program costs become a drag without ARR benefit.

      The most actionable thesis-break criterion is financial: Dragos must raise a Series E at a
      valuation of at least $1.5B before its post-restructuring cash runway depletes. A down-round at
      less than $1.0B would represent a greater than 40% decline from the Series D entry point and would
      constitute a thesis-break for all existing investors. A secondary thesis-break criterion is a
      Volt Typhoon-attributed destructive ICS attack that simultaneously overwhelms Dragos's IR capacity
      and damages the company's reputation for preparedness.
    claimRefs: [CR036, CR037, CR038, CR039, CR040]
    tableRefs: [TR005]
    figureRefs: []

