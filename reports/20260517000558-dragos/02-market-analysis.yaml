localEvidence:
  evidenceGaps:
    - id: EGM001
      title: "Dragos revenue and ARR not publicly disclosed"
      description: "Dragos does not publicly report revenue, ARR, customer count, or financial metrics. The most recent financial signal is the October 2021 Series D disclosure of >100% YoY platform recurring revenue growth. All SOM estimates in this chapter are analyst triangulations from the $1.7B valuation anchor and are highly uncertain."
      relatedQuestionRefs: [QM019]

    - id: EGM002
      title: "Gartner CPS Protection Platforms TAM not publicly available"
      description: "Gartner does not publish a dollar TAM estimate for the CPS Protection Platforms Magic Quadrant category. The market sizing for this narrower segment—which is most relevant for peer-to-peer valuation comparisons—is unavailable without Gartner subscription access."
      relatedQuestionRefs: [QM020]

    - id: EGM003
      title: "Dragos commercial customer count not disclosed"
      description: "Dragos has not disclosed total commercial platform customer count as of any date after the Series D. The 84 utilities figure (Neighborhood Keeper) dates to October 2021 and represents a subset of likely total customers. Any bottom-up SAM penetration analysis requires undisclosed data."
      relatedQuestionRefs: [QM021]

    - id: EGM004
      title: "MarketsandMarkets OT security TAM scope definition not verifiable"
      description: "MarketsandMarkets $23.5B estimate is widely cited but the detailed scope methodology, included/excluded subcategories, and geographic assumptions are behind a paywall. Scope differences between MarketsandMarkets (OT security broadly) and Gartner CPS Protection Platforms (software-only) cannot be reconciled without full report access."
      relatedQuestionRefs: [QM022]

    - id: EGM005
      title: "IT/OT convergence impact on market boundary not quantified"
      description: "As OT and IT networks converge (Industry 4.0, IIoT), the boundary between OT-specific security tools and IT security platform extensions is blurring. No public data quantifies what share of the OT security market will consolidate into IT platform vendors versus remain as standalone OT security."
      relatedQuestionRefs: [QM023]

