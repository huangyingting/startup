localEvidence:
  evidenceGaps:
    - id: EGI001
      title: "Dragos has no public financial disclosure since October 2021 Series D"
      description: "The last disclosed financial metric is >100% YoY platform recurring revenue growth for the period ending September 30, 2021. No ARR, revenue, gross margin, net retention, customer count, burn rate, or cash runway has been disclosed since. This is the most material evidence gap in the entire Dragos diligence report."
      relatedQuestionRefs: [QI019, QI020]

    - id: EGI002
      title: "Series D extension (January 2024) mechanism and valuation not disclosed"
      description: "The January 2024 $74M extension of the Series D is described in press reports but without disclosure of whether new investors participated, whether the valuation changed from $1.7B, or whether the extension represents primary equity issuance or exercise of previously committed capital. This ambiguity affects capitalization table and dilution analysis."
      relatedQuestionRefs: [QI022]

    - id: EGI003
      title: "Professional services gross margin and revenue mix not disclosed"
      description: "The blended gross margin analysis is highly sensitive to the professional services revenue mix and margin. If professional services represent 35%+ of total revenue at 40% gross margin, Dragos's blended gross margin would be below 65%, materially affecting exit valuation multiples relative to pure-SaaS peers."
      relatedQuestionRefs: [QI011]

    - id: EGI004
      title: "No public debt, credit facility, or convertible note disclosure"
      description: "No credit facility, term loan, revenue-based financing, or convertible note has been publicly disclosed for Dragos. The absence of public debt instruments is either a sign of equity-funded operations or undisclosed non-equity financing that would affect capitalization and exit proceeds analysis."
      relatedQuestionRefs: [QI022]

    - id: EGI005
      title: "Customer concentration and largest customer revenue share not disclosed"
      description: "Dragos's customer concentration—whether 10–20 large utility customers represent more than 50% of ARR—is unknown. In an enterprise OT security model with long 12-24 month sales cycles, customer concentration is a material risk factor that cannot be assessed from public information."
      relatedQuestionRefs: [QI025]

