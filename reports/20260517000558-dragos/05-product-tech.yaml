callouts:
  - calloutType: strength
    title: "OT-Native Architecture and 26-Group Threat Intelligence Are Durable Moats"
    claimRefs: [CE001, CE002, CE014, CE015, CE016]
    body: >
      Dragos's 600+ protocol parser library and passive-first, no-agent OT monitoring architecture
      were built specifically for industrial environments — not adapted from IT security tools.
      This technical foundation, combined with nearly a decade of OT-specific threat intelligence
      covering 26 named adversary groups (including the only commercial team that investigated
      CRASHOVERRIDE, TRISIS, and PIPEDREAM), creates a moat that IT security vendors cannot
      easily replicate by simply entering the OT market. The Intelligence Fabric — built from
      frontline OT incident response data — is a proprietary knowledge base that improves with
      every engagement, creating compounding advantage over competitors without equivalent OT
      service depth. Gartner Peer Insights reviews consistently note that practitioners choose
      Dragos because competitors are "IT with an OT sticker on them" — reflecting a genuine
      technical and intelligence differentiation rather than a marketing positioning gap.

  - calloutType: risk
    title: "FedRAMP Gap Limits U.S. Federal and Highly Regulated Sector TAM"
    claimRefs: [CE021, CE034, CE035]
    body: >
      Dragos has not confirmed FedRAMP authorization as of May 2026, blocking access to U.S.
      federal agency OT security procurement — a significant and growing budget category as
      agencies respond to CISA mandates and critical infrastructure executive orders. Without
      FedRAMP, agencies such as DOE, DOD, and EPA cannot procure Dragos for federally operated
      OT environments through standard channels. Dragos has not disclosed a FedRAMP roadmap or
      timeline, and achieving authorization typically requires 12-24 months of preparation. This
      gap creates a ceiling on the federal-facing portion of the OT security TAM and may allow
      competitors with existing FedRAMP authorization to entrench before Dragos can compete.

  - calloutType: risk
    title: "AI Analyst Workflow Features Are Early-Stage and Accuracy at Scale Is Unproven"
    claimRefs: [CE020, CE029, CE033]
    body: >
      The AI-enhanced vulnerability analysis and plain-English OT environment querying features
      introduced in Platform 3.0 and extended in 2026 represent Dragos's response to the
      industry-wide push for AI-assisted security operations. However, these capabilities launched
      in 2025-2026 and enterprise adoption data and accuracy benchmarks at scale are not publicly
      available. OT environments are highly specific — inaccurate AI responses to OT queries
      could lead to incorrect prioritization decisions with safety consequences. Microsoft and
      other IT-native vendors have substantially larger AI infrastructure and engineering teams
      and may close the OT AI gap faster than Dragos can expand its AI capabilities. The
      Intelligence Fabric moat provides some protection, but Dragos must demonstrate quantifiable
      AI workflow accuracy improvements to sustain this positioning.

