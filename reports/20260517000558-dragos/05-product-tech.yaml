    title: "Dragos OT Security Operations Workflow — Discovery to Hardening Loop"
    type: flow
    layout: wide
    summary: "The Dragos Platform supports a closed-loop OT security operations cycle from passive asset discovery through threat response and continuous hardening, with community intelligence feeding back into detections."
    data:
      nodes:
        - {id: "discover", label: "1. Asset Discovery: Passive monitoring + Active Collection for air-gapped sites"}
        - {id: "inventory", label: "2. Asset Inventory: OT/IT/IoT/IIoT classification with 600+ protocol context"}
        - {id: "detect", label: "3. Threat Detection: Behavioral analytics + Knowledge Pack IOCs + config monitoring + anomaly detection"}
        - {id: "triage", label: "4. Insights Hub Triage: Risk-weighted alert prioritization + expert playbooks"}
