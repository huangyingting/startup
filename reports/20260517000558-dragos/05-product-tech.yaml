company:
  name: "Dragos, Inc."
chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Dragos has built a purpose-built OT cybersecurity platform that is architecturally distinct from
    IT-adapted alternatives, grounded in passive-first network monitoring, 600+ industrial protocol
    parsers, and OT-exclusive threat intelligence covering 26 tracked adversary groups. Platform 3.0
    (Sept 2025) added AI-enhanced vulnerability prioritization, the Insights Hub, and the STS-50
    sensor, while a February 2026 Microsoft partnership opened Azure SaaS deployment and Sentinel
    integration. The community moat — Neighborhood Keeper (84+ utilities), OT-CERT (2,400+ members),
    and the Community Defense Program — creates non-replicable network effects that supplement the
    technical platform. Key risks include the absence of confirmed FedRAMP authorization and the
    early-stage maturity of AI analyst workflow features.

sections:
  - id: platform-overview
    title: "Dragos Platform 3.0 — Product Portfolio and Module Architecture"
    body: >
      Dragos Platform 3.0, launched September 23, 2025, is the company's flagship OT cybersecurity
      software suite. It delivers four integrated capabilities — asset visibility, OT network
      monitoring and threat detection, vulnerability management, and incident response — from a
      unified interface purpose-built for industrial control system (ICS) and operational technology
      (OT) environments. The platform is sold to asset owners across electric, oil and gas,
      manufacturing, water, transportation, and chemical sectors, and is deployed by security teams
      responsible for protecting SCADA systems, PLCs, HMIs, and the engineering workstations that
      control physical processes.

      The centerpiece of the 3.0 release is the Insights Hub, which consolidates risk-weighted
      vulnerability, asset, and threat alerts into a single prioritized view, replacing the need to
      manually correlate disparate tool outputs. Expert-authored playbooks accompany every alert,
      so analysts at any experience level receive clear guidance on what to investigate and how to
      respond. Dragos's stated goal is to compress mean-time-to-triage by eliminating alert fatigue
      from uncontextualized notifications.

      Hardware innovation in Platform 3.0 includes the STS-50 sensor — a smaller footprint appliance
      enabling deployment at distributed and remote OT sites that previously lacked the rack space or
      power budget for full-size sensors. Alongside the STS-50, Dragos introduced a combined
      Sensor/SiteStore form factor for smaller environments and expanded Active Collection mode,
      which uses polling-based queries to extend asset discovery to air-gapped and intermittently
      connected sites where passive-only monitoring would leave coverage gaps.

      Beyond the platform software, Dragos offers OT Watch managed services in two tiers. OT Watch
      provides 24/7 expert threat hunting and high-confidence alert escalations. OT Watch Complete
      adds proactive security hardening, platform tuning, and expert management of the full
      detection-to-investigation lifecycle. Both tiers are staffed by OT-trained analysts rather
      than repurposed IT SOC personnel, which Dragos cites as a material differentiator from IT
      security vendors entering the OT space.
    claimRefs: [CE001, CE002, CE003, CE006, CE007, CE008]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: threat-intelligence
    title: "Dragos WorldView Threat Intelligence and Adversary Tracking"
    body: >
      Dragos WorldView is the company's OT-exclusive threat intelligence product, delivering
      adversary research, ICS malware analysis, vulnerability insights, and strategic intelligence
      to security analysts and executive stakeholders. WorldView is the only commercial threat
      intelligence service focused exclusively on operational technology; IT threat intelligence
      vendors such as CrowdStrike and Mandiant cover ICS tangentially but do not maintain dedicated
      OT adversary tracking teams of comparable scale or depth.

      As of the February 2026 annual report release, Dragos tracks 26 named OT threat groups
      worldwide, 11 of which were active during 2025. Three new groups were identified during the
      year: SYLVANITE, which acts as an initial access broker handing off footholds to VOLTZITE for
      deeper OT intrusions; AZURITE, which conducts long-term OT data exfiltration targeting
      engineering workstations and shares technical overlaps with Flax Typhoon; and PYROXENE, which
      conducts supply chain compromises in the aviation, aerospace, defense, and maritime sectors
      with IRGC-CEC overlaps. KAMACITE systematically scanned U.S. infrastructure control loops
      throughout 2025, while ELECTRUM deployed wiper malware against Polish energy systems,
      demonstrating adversary progression from reconnaissance to attempted operational effects.

      Intelligence is operationalized through weekly Knowledge Packs pushed automatically to the
      Dragos Platform, containing updated detections, OT-specific vulnerability scoring, and
      playbooks aligned to current adversary tactics. This intelligence-to-platform feedback loop
      means customers continuously receive updated threat coverage without manual analyst
      intervention. WorldView is available as a standalone portal subscription and is embedded in
      platform-tier customers' deployments.

      The 2026 annual report found that ransomware groups targeting industrial organizations
      increased 64% year-over-year, with 119 groups active against 3,300 organizations globally.
      Dragos also identified that 25% of ICS-CERT and NVD vulnerability advisories carried incorrect
      CVSS scores in 2025, and 26% had no patch or mitigation guidance — illustrating the value of
      Dragos's OT-corrected vulnerability intelligence beyond generic public advisories.
    claimRefs: [CE004, CE011, CE012, CE013, CE014, CE016, CE032]
    tableRefs: [TE005]
    figureRefs: [FE004]

  - id: technology-architecture
    title: "Technology Architecture — OT-Native, Passive-First, Intelligence-Powered"
    body: >
      Dragos Platform's core architectural principle is OT-nativeness: it was built for industrial
      environments from the ground up, not adapted from IT security tools. The platform uses passive
      network monitoring as its primary data collection mode, deploying sensors that perform deep
      packet inspection of network traffic using proprietary parsers for 600+ industrial protocols
      including MODBUS, DNP3, EtherNet/IP, IEC 61850, OPC-UA, Profinet, and dozens of vendor-
      specific protocols. This passive approach requires no agents installed on OT devices — a
      critical design choice because many ICS devices run on proprietary firmware that cannot support
      agent software, and unplanned software changes on PLC or HMI systems can trigger safety
      shutdowns.

      The Dragos Intelligence Fabric sits at the center of the platform's AI and knowledge
      architecture. It integrates adversary tracking data, OT telemetry from customer environments,
      asset and protocol expertise, vulnerability research, and frontline incident response
      observations into a continuous feedback loop. This proprietary dataset, built over nearly a
      decade of OT incident response and threat hunting, powers both the platform's AI-enhanced
      vulnerability analysis and new natural-language querying capabilities introduced in 2025-2026.
      Analysts can query their OT environment in plain English and receive answers grounded in the
      Intelligence Fabric rather than general-purpose AI models.

      Cloud and integration architecture expanded significantly with the February 2026 Microsoft
      partnership. Beginning Q1 2026, the Dragos Platform supports SaaS deployment on Microsoft
      Azure in addition to the existing on-premises and hybrid models. OT-specific telemetry,
      threat intelligence, and asset context now flow directly into Microsoft Sentinel, enabling
      unified IT/OT detection, investigation, and response for organizations that already operate
      Sentinel as their SIEM. Customers can procure Dragos through Microsoft Marketplace and apply
      Azure consumption commitments, lowering procurement friction for enterprise buyers.

      AWS integration predates the Microsoft partnership. Dragos achieved the AWS Manufacturing
      and Industrial Competency as the first partner with an OT Security designation in January
      2023. Koch Industries deployed the platform on AWS and reported previously unachievable
      visibility into ICS/OT assets as a result.
    claimRefs: [CE002, CE015, CE016, CE017, CE018, CE019, CE030, CE031, CE032, CE035]
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: professional-services
    title: "Professional Services — Incident Response, Assessment, and Managed Monitoring"
    body: >
      Dragos's professional services portfolio complements the platform and represents a separate
      revenue stream that also feeds intelligence back into product development. The services
      organization is staffed by OT security practitioners with government and military cyber
      backgrounds — the same profile as the founders — providing credibility that IT-trained
      consultants cannot match in ICS incident response engagements.

      The Rapid Response Retainer provides organizations with pre-cleared contracts, reducing
      the mobilization time during an active OT incident. Retainer customers receive onboarding
      workshops to evaluate their existing IR plans and tabletop exercises to identify gaps before
      a real incident occurs. Burndown options allow organizations to draw down retainer hours
      for training and exercises rather than waiting for an incident. This model is analogous to
      legal retainers in crisis management and creates recurring services revenue alongside
      platform subscriptions.

      Assessment services include OT Cybersecurity Assessments (evaluating network design and
      security controls), Network Vulnerability Assessments, Penetration Testing of OT environments,
      and Purple Team exercises that test both defensive detection and offensive simulation
      simultaneously. Architecture Reviews are particularly relevant for NERC CIP compliance,
      as they evaluate whether segmentation and monitoring configurations meet regulatory
      requirements.

      OT Watch and OT Watch Complete extend managed services to organizations that lack internal
      OT security staff. OT Watch delivers 24/7 expert monitoring and escalation; OT Watch
      Complete manages the full detection-to-investigation lifecycle including proactive security
      hardening. Both tiers integrate with the platform's Insights Hub and benefit from weekly
      Knowledge Pack updates. The managed services model also creates stickiness: customers that
      adopt OT Watch are less likely to churn from the underlying platform subscription because
      the service team is embedded in their operations.
    claimRefs: [CE007, CE008, CE009, CE022, CE023]
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: community-defense
    title: "Community Defense — Neighborhood Keeper, CDP, OT-CERT, and ISAC Partnerships"
    body: >
      Dragos's community defense strategy differentiates it from any IT security vendor and most
      OT security competitors. The company has built three distinct community programs that create
      network effects — each participant makes all participants more secure — and serve as a
      long-term customer acquisition funnel for smaller utilities that may upgrade to paid platform
      subscriptions as they mature.

      Neighborhood Keeper is a free opt-in anonymized threat intelligence sharing network available
      to all Dragos Platform customers. It uses double anonymization: no organization ID is mapped
      to the connection certificate, so participants share threat telemetry without revealing which
      organization generated the data. Knowledge Packs are automatically distributed to all
      participants, ensuring that a threat indicator observed at one utility can be blocked at all
      84+ participating utilities within hours. Neighborhood Keeper partners include the North
      American Electric Reliability Corporation's E-ISAC for the electric sector, the ONG-ISAC for
      oil and natural gas, and the DNG-ISAC for downstream natural gas.

      OT-CERT (OT Cyber Emergency Readiness Team) is Dragos's free community for under-resourced
      ICS/OT operators. As of March 2025, OT-CERT had over 2,400 members in 64 countries,
      receiving free how-to guides, tabletop exercise templates, training materials, and interactive
      working sessions. OT-CERT is free to join and represents Dragos's broadest top-of-funnel
      community engagement.

      The Community Defense Program (CDP) is the most targeted of the three. It provides
      perpetually free access to the Dragos Platform software, Neighborhood Keeper, and OT-CERT
      membership to qualifying US and Canada-based water, electric, and natural gas utilities
      with under $100M USD in annual revenue. Launched in the US in December 2023 and expanded
      to Canada in March 2025, the CDP is enabled by a partnership with Elastic, which provides
      Elasticsearch at no charge to support the platform deployment. These small utilities are
      often the softest targets for ransomware and nation-state reconnaissance; the CDP serves
      the mission while building brand loyalty with operators who may become decision-makers or
      references as their organizations grow.
    claimRefs: [CE025, CE026, CE027, CE028]

  - id: ecosystem-integrations
    title: "Ecosystem, Partner Program, Compliance Support, and Platform Gaps"
    body: >
      Dragos's go-to-market ecosystem includes over 100 channel partners spanning managed security
      service providers, system integrators, and technology resellers. The Dragos Global Partner
      Program, launched June 2023, is the only OT channel program offering technology, threat
      intelligence, professional services, and training under a single program. It earned a
      5-Star CRN Partner Program rating in 2024 and named Dragos's VP of Channel as a 2024 CRN
      Channel Chief. Partners include global firms such as Booz Allen Hamilton, Optiv, and
      CyberCX as well as specialized OT firms such as 1898 & Co. and ABS Group.

      Strategic technology integrations extend beyond Microsoft and AWS. The platform includes
      SIEM connectors for major platforms and integrates with security orchestration tools. The
      Dragos Platform MCP Server, introduced in 2025-2026, enables enterprise AI tools to connect
      directly to platform data, allowing organizations to use their existing AI environments for
      OT queries without requiring users to learn a new interface.

      NERC CIP compliance is a material use case for electric utility customers. The Dragos
      Platform's passive monitoring approach aligns with NERC CIP-015 internal network security
      monitoring requirements, and the platform generates event logs and alerts compatible with
      CIP audit documentation. Architecture Reviews by the Dragos services team help customers
      map their deployments to CIP control requirements, reducing compliance overhead.

      Key platform gaps include the absence of confirmed FedRAMP authorization as of May 2026,
      which prevents Dragos from competing for US federal agency OT security contracts without
      additional procurement workarounds. The company has not published a FedRAMP roadmap or
      timeline. Additionally, while AI-enhanced vulnerability analysis and natural-language
      querying are available in Platform 3.0, the accuracy and enterprise adoption of these
      AI features at scale remain unproven. Finally, no public SOC 2 Type II or ISO 27001
      certification for Dragos platform operations has been confirmed, which may be a
      procurement gate for some enterprise security buyers.
    claimRefs: [CE019, CE020, CE021, CE024, CE029, CE033, CE034, CE035]
    tableRefs: [TE004]

