  - title: "Adverse: No Financial Disclosure in 4.5+ Years -- Valuation Precision Blocked"
    body: "Dragos has not disclosed ARR, burn rate, revenue growth, or cash balance since the October 2021 Series D. This is structurally unusual for a company at this stage and scale. Without this data, the entire valuation analysis rests on estimated ARR (0-100M range) and market multiples. A new investor cannot responsibly initiate a position above .7B without financial disclosure. The failed 2023 fundraising makes this opacity more, not less, concerning."
    claimRefs: [CV016, CV031, CV032, CV033, CV034]

