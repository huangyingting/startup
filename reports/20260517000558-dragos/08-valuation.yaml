company:
  name: "Dragos, Inc."
chapter:
  number: 8
  title: "Valuation"
  summary: |
    Recommendation: Research More / Conditional Track. Dragos presents a compelling market
    thesis -- NERC CIP regulatory tailwind, widest ICS threat intelligence moat globally (21+
    named threat groups), and a community flywheel with 2,400+ OT-CERT members and 84+ utility
    participants in Neighborhood Keeper -- but the investment case is blocked by fundamental
    financial opacity. The company has disclosed no financial metrics since the October 2021 Series D
    (00M at .7B post-money), and the June 2023 layoff of approximately 9% of staff after a
    failed fundraising attempt implies growth decelerated materially from the over 100% YoY rate
    previously reported. Without confirmed ARR, burn rate, or cash runway, a precise valuation
    cannot be supported. Using the OT cybersecurity market revenue-multiple framework, our base case
    estimates a defensible valuation range of .0-2.5B (if ARR is approximately 0M and growing
    30-40%), our bear case is .5-1.7B (flat to modest decline from Series D, implying ARR of
    approximately 0M or growth below 25%), and our bull case is .5-3.5B (if ARR exceeds 00M
    with 40%+ growth). The single most critical diligence action is financial disclosure: ARR bridge
    from 2021 to 2026, burn rate, cash balance, and Series E readiness. Without that data,
    initiating a new position at or above the .7B Series D reference price cannot be supported.

