sections:
  - id: V01
    title: "Recommendation and Investment Thesis"
    body: |
      Dragos presents a high-conviction market thesis in one of the fastest-growing, regulatory-driven
      segments of the enterprise security market. The investment thesis has four evidence-supported
      pillars: (1) Non-discretionary regulatory tailwind -- NERC CIP enforcement (fines up to M/day),
      CISA Volt Typhoon advisory (AA24-057A), and TSA Pipeline Security Directives create mandatory
      OT security budget obligations for Dragos electric utility, pipeline, and manufacturing customers.
      (2) Widest ICS threat intelligence moat -- 21+ named ICS threat groups (CHERNOVITE, ELECTRUM,
      VOLTZITE), the WorldView intelligence platform, and the proprietary sensor telemetry flywheel
      that feeds detection quality represent barriers that IT-native competitors cannot quickly replicate.
      (3) Community flywheel creating durable pipeline -- OT-CERT (2,400+ members), Neighborhood Keeper
      (84+ utilities), and CDP (launched December 2023) are reducing CAC for a segment of the market
      that typically has 12-18 month sales cycles. (4) OT-native specialization advantage -- Dragos
      Platform was built from the ground up for ICS environments; IT security vendors (Microsoft, Palo
      Alto, Fortinet) adding OT modules are adapting IT-native architectures to a fundamentally
      different operational technology environment.

      The anti-thesis is equally evidence-supported: (1) Financial opacity blocks valuation precision
      -- no ARR, burn rate, or growth rate disclosure in 4.5+ years; failed 2023 fundraising implies
      growth deceleration. (2) Microsoft Defender for IoT free tier compresses the entry-level TAM
      and forces Dragos to justify premium pricing entirely on intelligence depth. (3) Key-person
      concentration on Robert M. Lee -- the company's brand, investor relationships, and thought
      leadership equity are uniquely anchored to one individual with no disclosed succession plan.
      (4) Customer concentration among investor-customers -- Koch/Georgia-Pacific, National Grid
      Partners, and Rockwell Automation are simultaneously investors and customers, creating
      undisclosed related-party transaction risk.

      Recommendation is Research More / Conditional Track rather than Buy or Sell. The market position
      justifies continued attention and a defined entry discipline. But absent financial disclosure,
      a new position at or above the .7B reference price cannot be analytically supported. The
      diligence path is clear: require full financial disclosure as a condition of entry. If ARR is
      confirmed above 0M with 30%+ growth, the .0-2.5B base case valuation supports a reasonable
      entry at or slightly above the Series D price.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007, CV008]
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]

  - id: V02
    title: "Financing Context and Valuation Anchors"
    body: |
      Dragos's last confirmed valuation anchor is the October 2021 Series D: 00M raised at a .7B
      post-money valuation from Koch Disruptive Technologies, BlackRock, National Grid Partners,
      Rockwell Automation, and others. No subsequent equity raise has been publicly disclosed as of
      May 2026 -- a 4.5-year gap that is unusual for a venture-backed cybersecurity company at this
      stage. The June 2023 layoffs and failed fundraising attempt represent the only disclosed
      financial signal in this period.

      Using the OT cybersecurity market revenue-multiple framework: at the 2021 Series D moment,
      Dragos was valued at approximately .7B with reported growth over 100% YoY and a team of
      800+ employees. The implied ARR at that valuation, using the 20-30x ARR multiples prevalent
      for high-growth cybersecurity SaaS in late 2021, would have been approximately 5-85M.
      Private market multiples for cybersecurity SaaS companies in the 30-50% growth cohort compressed
      by approximately 40-60% from 2021 peak to 2023 trough. This compression, combined with the
      likely growth deceleration implied by the 2023 events, suggests the .7B valuation may have
      been structurally challenged in 2023 -- consistent with the reported fundraising failure.

      Comparable private OT security transactions provide additional anchoring: Claroty raised 00M at
      an implied post-money of approximately .8-2.2B in November 2021 (similar timing to Dragos).
      Armis achieved a .3B valuation in 2023, but Armis addresses a broader IT/OT asset management
      TAM with a different revenue model. Nozomi Networks remains pre-IPO with an estimated private
      valuation of 00M-.2B based on Series D comparables. Tenable Holdings (TENB), which
      acquired Indegy (OT security) in 2019, trades at approximately 5-6x trailing revenue on a
      combined platform that includes OT capabilities -- suggesting that pure-play OT premiums
      erode upon platform integration with IT security.

      Our valuation range is anchored to an estimated ARR of 0-100M (no disclosure available) and
      applies a 20-25x forward ARR multiple (justified by regulatory tailwind durability and
      intelligence moat, discounted 30-40% from 2021 peak for multiple compression and growth
      deceleration risk). This yields a base case of .0-2.5B at 0M ARR growing 35%, bear case
      of .5-1.7B at 0M ARR growing 20%, and bull case of .5-3.5B at 00M ARR growing 40%+.
    claimRefs: [CV009, CV010, CV011, CV012, CV013, CV014, CV015, CV016]
    tableRefs: [TV003]
    figureRefs: [FV002, FV003]

  - id: V03
    title: "Comparable Valuation Analysis"
    body: |
      The comparable set for Dragos spans four groups: (1) private pure-play OT security companies
      (Claroty, Nozomi); (2) private IT/OT convergence platforms (Armis); (3) public cybersecurity
      companies with OT components (Tenable TENB, CrowdStrike CRWD emerging OT module); and
      (4) OT security M&A transactions (Tenable/Indegy 2019 at 8M, Armis/Aperio 2021, Rockwell
      investment in Claroty).

      The most relevant comparables are Claroty and Nozomi as direct pure-play OT security peers.
      Claroty's Series D (00M, November 2021) implied a post-money of approximately .8-2.2B
      -- comparable to Dragos's Series D at .7B two weeks earlier. Both companies have not
      disclosed post-2021 financials, making growth-adjusted comparable analysis difficult. Armis
      at .3B (2023) is a useful ceiling comparable, but Armis's TAM (IT and OT asset management
      for ITAM/CAASM use cases) is substantially larger than Dragos's more focused OT threat
      detection and IR market.

      For public company multiples: Tenable Holdings (TENB) trades at approximately 4.5-5.5x NTM
      ARR on a combined VM and OT security platform of approximately .0B ARR. CrowdStrike's OT
      security module is nascent (sub-0M ARR estimated) and not yet publicly broken out; CRWD
      trades at over 20x ARR but this multiple reflects the core Falcon EDR dominance, not the OT
      component. Using Tenable as the most relevant public proxy for an OT-capable platform at scale
      and applying a 15-25x multiple to Dragos's estimated ARR range of 0-100M yields a valuation
      range of bash.75B-.5B -- consistent with our bear to base scenario modeling.

      The comparable set confirms that the .7B Series D valuation is defensible under a base-case
      scenario (ARR approximately 0M, growth 30-40%, 20-22x forward multiple) but not obviously
      cheap. A new investor entering at the .7B reference price would need confidence in 25%+
      ARR growth and a clear Series E or exit path within 24-36 months.
    claimRefs: [CV017, CV018, CV019, CV020, CV021, CV022, CV023]
    tableRefs: [TV004]
    figureRefs: []

  - id: V04
    title: "Thesis-Break and Monitoring"
    body: |
      The primary thesis-break for a Dragos investment is a Series E fundraise at below .0B
      valuation -- representing a greater than 40% decline from the Series D reference price and
      implying a fundamental revaluation of the business. Secondary thesis-break triggers include:
      a major IT security platform (Microsoft or Palo Alto Networks) launching an OT security bundle
      priced below Dragos's average contract value for enterprise customers; a Dragos headcount
      reduction without an announced new equity raise; or the departure of Robert M. Lee without a
      pre-announced transition plan.

      Monitoring indicators that would positively update the investment case: (1) A confirmed Series E
      at a valuation of .0B+ would validate the base case and justify position entry; (2) Any ARR
      disclosure (voluntary or via regulatory filing if Dragos pursues an IPO or direct listing)
      confirming growth above 30%; (3) A Dragos IPO announcement, which would require financial
      disclosure sufficient to resolve most evidence gaps; (4) A major enterprise OT security contract
      announcement at a Fortune 100 critical infrastructure operator not yet in the disclosed customer
      list. Monitoring indicators that would negatively update the case: (1) A second headcount
      reduction; (2) Departure of key executives (SVP Research, SVP Sales, CTO); (3) Claroty or
      Nozomi winning a named Dragos customer account.

      Conviction threshold for position entry: Require (a) confirmed ARR above 0M with trailing
      12-month growth above 25%, (b) confirmed cash runway above 18 months or announced new financing,
      and (c) valuation at or below the base case of .0-2.5B before entering a half position.
      A full position requires resolution of the board governance opacity and the Rockwell
      investor-customer conflict of interest.
    claimRefs: [CV024, CV025, CV026, CV027, CV028, CV029, CV030]
    tableRefs: [TV005]
    figureRefs: [FV004]

  - id: V05
    title: "Final Diligence Asks"
    body: |
      The most critical unresolved diligence items for Dragos -- all of which would materially shift
      the recommendation from Research More to Buy or Pass -- relate to financial transparency and
      governance. First, financial disclosure: the company must provide its 2021-2026 ARR bridge,
      current annualized ARR, trailing 12-month growth rate, gross margin, burn rate by cost
      category, current cash balance, and any credit facilities or bridge financing. Second,
      valuation context: the specific terms of the 2023 failed fundraising attempt -- including
      the targeted valuation, which investors passed, and the reason given -- would provide critical
      triangulation for current enterprise value assessment. Third, capital structure: a full cap
      table showing preference stack, liquidation preferences, anti-dilution provisions, and investor
      rights agreements is essential for return modeling. Fourth, governance: a complete board member
      list, committee charters, and any existing recusal or conflict-of-interest policies for
      investor-board members with customer relationships (specifically Rockwell Automation).

      If financial disclosure confirms the bear case scenario (ARR approximately 0M, growth below
      25%), the appropriate action is Pass or Monitor at below .5B entry. If disclosure confirms
      the base case (ARR approximately 0M, growth 30-40%), the appropriate action is Half Position
      at or below .0B. If disclosure confirms the bull case (ARR above 00M, growth above 40%),
      the appropriate action is Full Position at or below .5B. The recommendation framework is
      price-sensitive and evidence-sensitive: the quality of the Dragos market position does not
      independently support entry without financial validation.
    claimRefs: [CV031, CV032, CV033, CV034, CV035, CV036, CV037, CV038, CV039, CV040]
    tableRefs: [TV006]
    figureRefs: []

