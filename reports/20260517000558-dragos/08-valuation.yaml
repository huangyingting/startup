    - id: EGV001
      title: "Financial Opacity -- No ARR, Burn, or Revenue Disclosure Since 2021"
      description: "Dragos has not disclosed any financial metrics since the October 2021 Series D. The entire valuation analysis rests on analyst ARR estimates with a range of 50 to 100 million USD. This gap prevents a Buy recommendation."
      severity: critical
      relatedQuestionRefs: [QV003, QV006, QV016]

    - id: EGV002
      title: "Comparable Set Limitations -- Private Peer Financials Unavailable"
      description: "The two closest private OT security comparables (Claroty and Nozomi) have not disclosed post-2021 financials. Armis is a broader company with a different buyer profile. The comparable set carries high estimation uncertainty."
      severity: high
      relatedTableRefs: [TV004]
      relatedQuestionRefs: [QV021]

    - id: EGV003
      title: "Exit Readiness -- No IPO Timeline, Acquirer List, or Secondary Market Data"
      description: "Dragos has not indicated any IPO timeline, confirmed M&A discussions, or disclosed secondary market transactions since 2021. Exit readiness is based entirely on analyst inference given the failed 2023 fundraising."
      severity: high
      relatedQuestionRefs: [QV024, QV027]
