    body: "Rockwell Automation is simultaneously a Dragos investor (Series D), a named customer, and a strategic investor in Claroty (Dragos's primary OT security competitor). This undisclosed conflict creates related-party transaction risk in both the Dragos customer relationship and the board governance structure. Investors should require a formal recusal policy and disclosure of any Dragos-Rockwell contractual arrangements before initiating a position."
    claimRefs: [CV006, CV022, CV036]

