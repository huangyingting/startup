evidenceGaps:
  - type: enumeration-incomplete
    severity: minor
    topic: investors
    missingEvidence: >-
      Complete post-Series D ownership percentages, board seat assignments for all investors, exact cap table structure,
      and whether any Series D extension investors differ from the original round participants
    whyItMatters: >-
      Without a complete cap table, it is impossible to assess dilution history, preferred stock terms, liquidation
      preferences, and investor control rights—all critical inputs for any secondary purchase or follow-on investment
      analysis
    diligencePath: >-
      Request the Dragos capitalization table and investor rights agreement directly in a formal due diligence process;
      cross-reference any SEC Form D filings for private placement disclosures
    relatedTableRefs:
      - TO003
  - type: private-evidence-only
    severity: material
    topic: financials
    missingEvidence: Current revenue, ARR, gross margin, burn rate, customer count, and headcount for Dragos as of 2025–2026
    whyItMatters: >-
      Without current financial metrics, valuation assessment is anchored to the October 2021 Series D price; actual
      growth trajectory and unit economics are unverifiable, making investment conviction difficult
    diligencePath: >-
      Request audited financial statements, ARR waterfall, and customer count metrics directly from Dragos in a formal
      due diligence process; cross-check with reference customers
    relatedQuestionRefs:
      - QO024
    relatedTableRefs:
      - TO001
  - type: enumeration-incomplete
    severity: minor
    topic: leadership
    missingEvidence: >-
      Full VP-level and below roster, complete career backgrounds for non-founder C-suite, and exact governance
      structure including board committee assignments and voting rights
    whyItMatters: >-
      Depth of management bench and succession planning below CEO level are material for governance assessment and
      investment risk
    diligencePath: >-
      Review Dragos careers page, LinkedIn profiles of executives, and request a management team org chart with
      backgrounds in the due diligence process
    relatedTableRefs:
      - TO002
  - type: stale
    severity: material
    topic: valuation
    missingEvidence: >-
      A current (post-2021) external valuation of Dragos; the $1.7B Series D price is from October 2021 and market
      conditions have changed significantly
    whyItMatters: >-
      Public cybersecurity company multiples compressed 40–60% from 2021 peaks; private market corrections may have
      affected Dragos's implied valuation meaningfully, but no secondary transactions or updated rounds have been
      publicly reported
    diligencePath: >-
      Request a 409A appraisal or comparable company analysis from Dragos; examine any secondary market transactions for
      Dragos employee shares through platforms like Forge Global or Nasdaq Private Market
    relatedQuestionRefs:
      - QO022
    relatedTableRefs:
      - TO001
  - id: EGM001
    title: Dragos revenue and ARR not publicly disclosed
    description: >-
      Dragos does not publicly report revenue, ARR, customer count, or financial metrics. The most recent financial
      signal is the October 2021 Series D disclosure of >100% YoY platform recurring revenue growth. All SOM estimates
      in this chapter are analyst triangulations from the $1.7B valuation anchor and are highly uncertain.
    relatedQuestionRefs:
      - QM019
  - id: EGM002
    title: Gartner CPS Protection Platforms TAM not publicly available
    description: >-
      Gartner does not publish a dollar TAM estimate for the CPS Protection Platforms Magic Quadrant category. The
      market sizing for this narrower segment—which is most relevant for peer-to-peer valuation comparisons—is
      unavailable without Gartner subscription access.
    relatedQuestionRefs:
      - QM020
  - id: EGM003
    title: Dragos commercial customer count not disclosed
    description: >-
      Dragos has not disclosed total commercial platform customer count as of any date after the Series D. The 84
      utilities figure (Neighborhood Keeper) dates to October 2021 and represents a subset of likely total customers.
      Any bottom-up SAM penetration analysis requires undisclosed data.
    relatedQuestionRefs:
      - QM021
  - id: EGM004
    title: MarketsandMarkets OT security TAM scope definition not verifiable
    description: >-
      MarketsandMarkets $23.5B estimate is widely cited but the detailed scope methodology, included/excluded
      subcategories, and geographic assumptions are behind a paywall. Scope differences between MarketsandMarkets (OT
      security broadly) and Gartner CPS Protection Platforms (software-only) cannot be reconciled without full report
      access.
    relatedQuestionRefs:
      - QM022
  - id: EGM005
    title: IT/OT convergence impact on market boundary not quantified
    description: >-
      As OT and IT networks converge (Industry 4.0, IIoT), the boundary between OT-specific security tools and IT
      security platform extensions is blurring. No public data quantifies what share of the OT security market will
      consolidate into IT platform vendors versus remain as standalone OT security.
    relatedQuestionRefs:
      - QM023
  - id: EGP001
    title: Dragos competitive win rates and deal displacement data not disclosed
    description: >-
      Dragos does not publicly disclose win rates against Claroty, Nozomi Networks, or Microsoft Defender for IoT in
      head-to-head competitive evaluations. Competitive positioning assessments in this chapter are based on public
      product documentation, Gartner Magic Quadrant positioning, and analyst triangulation rather than disclosed
      win/loss data.
    relatedQuestionRefs:
      - QP019
  - id: EGP002
    title: Competitor revenue and market share not publicly available for private vendors
    description: >-
      Claroty, Nozomi Networks (now private under Hg), and Dragos do not disclose revenue, ARR, or customer counts.
      Market share estimates across these vendors rely on funding history, valuation inference, and Gartner Magic
      Quadrant positioning signals rather than financial disclosure.
    relatedQuestionRefs:
      - QP020
  - id: EGP003
    title: Microsoft Defender for IoT OT customer count and adoption rate not disclosed
    description: >-
      Microsoft does not separately disclose Defender for IoT OT (operational technology) customer count, distinguishing
      from Enterprise IoT customers. The actual penetration of Microsoft's OT monitoring capability within enterprise IT
      buyers is unknown, making it difficult to quantify the bundling displacement risk precisely.
    relatedQuestionRefs:
      - QP021
  - id: EGP004
    title: Neighborhood Keeper current utility count is 2021 data
    description: >-
      The 84 utilities / >70% U.S. electric customer figure for Neighborhood Keeper dates to the October 2021 Series D
      announcement. Dragos has not published an updated participation count. Growth or attrition in the network
      post-2021 is unknown.
    relatedQuestionRefs:
      - QP022
  - id: EGI001
    title: Dragos has no public financial disclosure since October 2021 Series D
    description: >-
      The last disclosed financial metric is >100% YoY platform recurring revenue growth for the period ending September
      30, 2021. No ARR, revenue, gross margin, net retention, customer count, burn rate, or cash runway has been
      disclosed since. This is the most material evidence gap in the entire Dragos diligence report.
    relatedQuestionRefs:
      - QI019
      - QI020
  - id: EGI002
    title: Series D extension (January 2024) mechanism and valuation not disclosed
    description: >-
      The January 2024 $74M extension of the Series D is described in press reports but without disclosure of whether
      new investors participated, whether the valuation changed from $1.7B, or whether the extension represents primary
      equity issuance or exercise of previously committed capital. This ambiguity affects capitalization table and
      dilution analysis.
    relatedQuestionRefs:
      - QI022
  - id: EGI003
    title: Professional services gross margin and revenue mix not disclosed
    description: >-
      The blended gross margin analysis is highly sensitive to the professional services revenue mix and margin. If
      professional services represent 35%+ of total revenue at 40% gross margin, Dragos's blended gross margin would be
      below 65%, materially affecting exit valuation multiples relative to pure-SaaS peers.
    relatedQuestionRefs:
      - QI011
  - id: EGI004
    title: No public debt, credit facility, or convertible note disclosure
    description: >-
      No credit facility, term loan, revenue-based financing, or convertible note has been publicly disclosed for
      Dragos. The absence of public debt instruments is either a sign of equity-funded operations or undisclosed
      non-equity financing that would affect capitalization and exit proceeds analysis.
    relatedQuestionRefs:
      - QI022
  - id: EGI005
    title: Customer concentration and largest customer revenue share not disclosed
    description: >-
      Dragos's customer concentration—whether 10–20 large utility customers represent more than 50% of ARR—is unknown.
      In an enterprise OT security model with long 12-24 month sales cycles, customer concentration is a material risk
      factor that cannot be assessed from public information.
    relatedQuestionRefs:
      - QI025
  - type: private-evidence-only
    severity: material
    topic: platform-reliability
    missingEvidence: >-
      No public SLA commitments, platform uptime history, false positive rate benchmarks, or independent head-to-head
      comparison of Dragos detection accuracy vs. Claroty or Nozomi Networks
    whyItMatters: >-
      Without reliability and accuracy data, assessment of detection quality advantage is based on analyst opinion and
      customer testimonials rather than empirical benchmarks; this is a critical diligence gap for a platform investment
      thesis
    diligencePath: >-
      Request SOC 2 Type II report or equivalent platform audit; request customer references willing to discuss
      detection precision/recall; review Gartner Peer Insights reviews for negative sentiment patterns
    relatedQuestionRefs:
      - QE023
  - type: missing-source
    severity: material
    topic: fedRAMP
    missingEvidence: FedRAMP Marketplace listing status and Dragos's internal FedRAMP roadmap and timeline
    whyItMatters: >-
      Without FedRAMP, Dragos cannot access U.S. federal agency OT security contracts, which represent a growing budget
      category driven by CISA mandates and critical infrastructure executive orders; this is a TAM ceiling until
      resolved
    diligencePath: >-
      Check FedRAMP Marketplace (fedramp.gov) for Dragos listing; request direct disclosure from Dragos in formal due
      diligence; compare to competitors' FedRAMP status
