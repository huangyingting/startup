company:
  name: "Dragos, Inc."
chapter:
  number: 1
  title: "Company Overview"
  summary: "Dragos, Inc. is a privately held, Hanover, Maryland-headquartered cybersecurity company singularly focused on operational technology (OT) and industrial control systems (ICS). Founded in 2016 by former U.S. intelligence and military cyber operators—led by CEO and co-founder Robert M. Lee—Dragos has become the category-defining platform for OT cybersecurity, earning a Leader designation in the 2026 Gartner Magic Quadrant for CPS Protection Platforms for the second consecutive year. The company raised $200 million in Series D funding at a $1.7 billion valuation in October 2021 (later extended to $274 million total) from strategic investors including Koch Disruptive Technologies, BlackRock, Rockwell Automation, and Emerson, bringing total capital raised to approximately $440 million."

sections:
  - id: identity-and-market-position
    title: "Company Identity and Market Position"
    body: "Dragos, Inc. is a privately held cybersecurity company headquartered in Hanover, Maryland (Washington, DC area), operating with a singular mission: to safeguard civilization from those trying to disrupt the industrial infrastructure we depend on every day. Founded in 2016 by practitioners who had spent careers in government and military cyber operations, Dragos has built the most widely recognized purpose-built platform for operational technology (OT) and industrial control systems (ICS) cybersecurity. The Dragos Platform provides industrial organizations with asset visibility, OT network monitoring, vulnerability management, threat detection, and incident response capabilities—all powered by the Dragos Intelligence Fabric, which integrates over a decade of OT-specific threat intelligence directly into the software. Dragos serves customers across electric utilities, oil and gas, manufacturing, water, transportation, mining, pharmaceutical, food and beverage, and government sectors globally. In March 2026, Gartner named Dragos a Leader in the 2026 Magic Quadrant for CPS Protection Platforms for the second consecutive year, recognizing the company for both its Ability to Execute and Completeness of Vision. Dragos also earned the #1 Innovation ranking in Frost & Sullivan's FrostRadar: OT Cybersecurity Solutions, 2025, and appeared on the Deloitte Technology Fast 500 for the fifth consecutive year. The OT security market that Dragos addresses is large and growing rapidly: MarketsandMarkets projects the global OT security market will expand from $23.5 billion in 2025 to $50.3 billion by 2030, representing a compound annual growth rate of 16.5%. Primary competitors include Claroty—which focuses on cyber-physical systems across industrial, healthcare, and commercial environments—and Nozomi Networks, which emphasizes OT and IoT security with AI-powered threat detection. Dragos differentiates on its depth of OT threat intelligence, practitioner heritage, and the breadth of its threat group research, tracking 26 named OT threat groups globally as of the 2026 OT/ICS Cybersecurity Year in Review."
    claimRefs: [CO001, CO002, CO003, CO004, CO016, CO017, CO018, CO024, CO025, CO026, CO027, CO033]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: founders-leadership-governance
    title: "Founders, Leadership, and Governance"
    body: "Dragos was founded in 2016 by a team of cybersecurity practitioners with deep government and military backgrounds. CEO and co-founder Robert M. Lee served as a U.S. Air Force Cyber Warfare Operations officer and worked for the National Security Agency (NSA) before founding Dragos. Lee and his co-founders were drawn to industrial cybersecurity through direct operational experience investigating major ICS attacks—including the 2015 and 2016 Ukraine power grid attacks, and the TRISIS and CRASHOVERRIDE malware campaigns—that most of the industry had no framework to address. Lee has testified before Congress multiple times on the security of critical energy and water infrastructure, establishing Dragos as a trusted voice with policymakers. The executive leadership team as of mid-2026 includes Jodi Schatz (Chief Product Officer), Eric Cross (Chief Revenue Officer, appointed August 19, 2025), and Dawn Mitchell (Chief People Officer). Cross brought more than 20 years of enterprise GTM experience from Reltio, Appian, Google Cloud, and Salesforce, with a track record of scaling revenue organizations through IPO and acquisition events. On January 31, 2024, Dragos expanded its board of directors with the appointments of William J. 'Bill' Fehrman and Ekta Singh-Bushell. Fehrman previously served as President and CEO of Berkshire Hathaway Energy (BHE) and remains involved in critical infrastructure cybersecurity policy. Singh-Bushell held executive roles at the Federal Reserve Bank of New York and Ernst & Young (EY), and brings board-level experience with audit, risk, compliance, and security. Key-person risk is elevated given Robert M. Lee's singular prominence as the face of Dragos and the industrial cybersecurity practice he built—his departure or diminished role would materially affect brand equity, customer relationships, and the company's ability to attract talent in a mission-driven culture. Dragos is privately held, and its governance structure is not subject to public disclosure requirements."
    claimRefs: [CO001, CO002, CO005, CO006, CO007, CO008, CO009, CO010, CO011, CO012, CO028, CO029]
    tableRefs: [TO002]

  - id: funding-history-capital-structure
    title: "Funding History and Capital Structure"
    body: "Dragos has raised approximately $440 million in total capital across multiple private rounds. The marquee event was the October 28, 2021 Series D: a $200 million raise at a $1.7 billion valuation, the largest round and highest valuation achieved by any OT cybersecurity company at the time. The Series D was co-led by Koch Disruptive Technologies (an investment arm of Koch Industries) and funds and accounts managed by BlackRock. The investor syndicate for the Series D included Emerson, Hewlett Packard Enterprise (HPE), Allegis Cyber, Canaan, DataTribe, Energy Impact Partners, National Grid Partners, Schweitzer Engineering Labs, Rockwell Automation, and Global Reserve Group—a strategically curated group of industrial operators and infrastructure-focused investors who are also customers or potential customers of Dragos. This strategic investor alignment is a structural advantage: it provides Dragos with distribution leverage, co-marketing opportunities, and credibility signals when selling to other industrial enterprises. The Series D was subsequently extended by $74 million, bringing the total Series D round to $274 million and total funds raised across all rounds to approximately $440 million. This extension was announced alongside Dragos's January 2024 board appointments, signaling continued investor confidence. Dragos remains privately held as of May 2026, with no IPO or M&A transaction announced. The lack of public filings means key financial metrics—including revenue, ARR, burn rate, and gross margin—are not independently verifiable. Earlier funding rounds established the foundation: DataTribe, a startup studio focused on national security technologies in the Baltimore-Washington corridor, was an early backer and co-location partner. Canaan Partners participated in earlier institutional rounds. The progression of investors from national-security-focused early backers to major strategic industrial conglomerates reflects Dragos's evolution from a government-adjacent startup to a commercial enterprise platform."
    claimRefs: [CO013, CO014, CO015, CO016, CO030, CO031, CO032, CO034]
    tableRefs: [TO003, TO004]
    figureRefs: [FO001]

  - id: financial-scale-customer-traction
    title: "Financial Scale and Customer Traction"
    body: "As a private company, Dragos does not publicly report revenue, ARR, customer count, headcount, or profitability metrics. The most reliable proxy for financial scale comes from the Series D announcement (October 2021), which disclosed over 100% year-over-year growth in platform recurring revenue for the period ending September 30, 2021—a signal of strong commercial momentum at the time of fundraising. Since then, Dragos has disclosed several qualitative and operational scale metrics. The Neighborhood Keeper program—an anonymized information-sharing network offered free to all Dragos Platform customers—had been adopted by 84 utilities representing over 70% of electric utility customers in the United States through a joint initiative with NERC's Electricity Information Sharing and Analysis Center (E-ISAC), a remarkable community penetration metric cited at the Series D. Through partnerships with the Oil and Natural Gas Information Sharing and Analysis Center (ONG-ISAC) and the Downstream Natural Gas Information Sharing and Analysis Center (DNG-ISAC), Dragos extends collective defense to energy sector stakeholders beyond the electric grid. Globally, Dragos has established offices across North America, EMEA (including Europe, UK, and Middle East), and APAC (including Japan through a partnership with Macnica and Singapore through an MOU with Singapore's Digital and Intelligence Service). The company established an OT Cybersecurity Center of Excellence in the UAE. Dragos's global customer base includes many of the world's largest industrial organizations across electric, oil and gas, manufacturing, water, transportation, and mining sectors. The company's 2026 OT/ICS Cybersecurity Year in Review—its 9th annual report—tracked 119 ransomware groups impacting 3,300 industrial organizations in 2025, a 49% increase from the prior year, underscoring growing market urgency that supports Dragos's commercial positioning. The Dragos 2025 OT Security Financial Risk Report (published with Marsh McLennan's Cyber Risk Intelligence Center) estimated worst-case global OT cyber losses of up to $329.5 billion annually, another compelling market-development asset."
    claimRefs: [CO019, CO020, CO021, CO022, CO023, CO025, CO026, CO035, CO036]
    figureRefs: [FO003]

  - id: risks-and-adverse-considerations
    title: "Risks and Adverse Considerations"
    body: "Dragos faces several material risks that diligence must assess carefully. First, the 2023 staff reduction: in June 2023, Dragos laid off approximately 9% of its workforce amid a cooling of the cybersecurity market and slower-than-anticipated enterprise budget growth in the OT sector. SiliconAngle and Axios reported the reduction, with Robert M. Lee acknowledging the difficulty of the decision. This adverse event demonstrates that Dragos is not immune to macroeconomic headwinds and raises questions about revenue predictability and budget cycle vulnerability. Second, as a private company Dragos provides no publicly verifiable financial data—current revenue, ARR, churn, and burn rate are unknown, making valuation assessment dependent on the $1.7 billion Series D price established in October 2021. Market conditions have changed materially since then, including rising interest rates, multiple public cybersecurity company devaluations, and a cooling of private-market multiples. The actual current valuation could be materially different from the 2021 anchor. Third, key-person risk: Robert M. Lee's personal brand is tightly intertwined with Dragos's corporate identity, thought leadership, and policy relationships. His departure would represent a significant disruption. Fourth, competition from well-funded peers: Claroty—backed by prominent investors and serving broader cyber-physical markets—and Nozomi Networks—with AI-powered OT/IoT analytics and deep ecosystem integrations—both compete directly and are expanding their platform capabilities and global footprints. Fifth, customer concentration and market maturity: the OT cybersecurity market, while growing, is still nascent in many segments. Smaller critical infrastructure operators (water utilities, rural electric co-ops) have limited cybersecurity budgets, and the free Community Defense Program—while mission-aligned—limits commercial monetization in that segment. The reliance on large industrial enterprises for revenue creates customer concentration risk."
    claimRefs: [CO037, CO028, CO029, CO030, CO033, CO034]

callouts:
  - calloutType: strength
    title: "Back-to-Back Gartner Magic Quadrant Leader Designation"
    body: "Dragos was named a Leader in the 2026 Gartner Magic Quadrant for CPS Protection Platforms for the second consecutive year (March 9, 2026), recognized for Ability to Execute and Completeness of Vision. This designation, combined with a 4.5/5.0 Gartner Peer Insights score, provides third-party validation of platform maturity and customer satisfaction."
    claimRefs: [CO016, CO017]

  - calloutType: risk
    title: "2023 Layoffs Reveal Cyclical Revenue Vulnerability"
    body: "Dragos reduced its workforce by approximately 9% in June 2023 amid slowing enterprise cybersecurity spend. This adverse event—confirmed by multiple independent sources—demonstrates that Dragos's growth is not fully insulated from macroeconomic cycles, and raises questions about revenue predictability in a market where enterprise OT budgets remain discretionary at many organizations."
    claimRefs: [CO037]

  - calloutType: insight
    title: "Strategic Investor Base Doubles as Customer Reference Network"
    body: "Dragos's Series D investor roster—including Koch Industries, Rockwell Automation, Emerson, HPE, and National Grid Partners—represents a deliberate strategy to convert industrial operators into both capital providers and customer references. This structural alignment reduces sales friction and provides distribution leverage not available to competitors funded by generalist VC firms."
    claimRefs: [CO014, CO015, CO016]

  - calloutType: risk
    title: "Private-Company Opacity Limits Quantitative Diligence"
    body: "Dragos discloses no current revenue, ARR, gross margin, burn rate, customer count, or headcount. The most recent verifiable financial signal is the October 2021 Series D, which cited over 100% YoY platform revenue growth for the period ending September 30, 2021. Current financial health is opaque, and the $1.7B valuation anchor is now nearly five years old."
    claimRefs: [CO034, CO035]

