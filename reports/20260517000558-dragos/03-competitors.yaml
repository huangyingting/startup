chapter:
  number: 3
  title: "Competitors"
  summary: >
    Dragos competes in the OT/ICS cybersecurity platform market against a field of pure-play OT security
    vendors (Claroty, Nozomi Networks), IT security platform giants extending into OT (Microsoft Defender
    for IoT, Palo Alto Networks OT Security, CrowdStrike Falcon for OT), OEM-native security tools
    (Honeywell Forge Cybersecurity, GE Vernova, Siemens), and specialist adjacents (Tenable.ot, Armis,
    Forescout, TXOne Networks). Dragos's primary differentiators are its pure-play OT focus, the
    industry's deepest ICS threat intelligence library (26 named adversary groups), the practitioner
    credibility of a founding team from the NSA TAILORED ACCESS OPERATIONS and the ICS-CERT, purpose-built
    ICS detection content aligned to MITRE ATT&CK for ICS, the Neighborhood Keeper community threat
    sharing network, and OT-CERT. The greatest competitive risks are Microsoft Defender for IoT's
    aggressive bundling within Azure/Defender for Cloud/Sentinel (potentially pricing OT monitoring out
    of stand-alone budget allocation), Claroty's aggressive expansion from OT into healthcare and
    commercial building systems, and Nozomi Networks' Hg-private-equity-backed consolidation play.
    Dragos's deliberate refusal to pursue healthcare and IT adjacencies maintains category focus but
    cedes the broader cyber-physical systems market to Claroty. The 2026 Gartner Magic Quadrant for
    CPS Protection Platforms—in which Dragos retained Leader status—provides an authoritative third-party
    competitive position benchmark, though Gartner does not disclose relative market share among Leaders.

sections:
  - id: competitive-landscape
    title: "Competitive Landscape Overview"
    body: >
      The OT/ICS cybersecurity platform market in 2026 is a three-tier competitive structure.
      Tier 1 (pure-play OT specialists): Dragos, Claroty, and Nozomi Networks collectively dominate the
      Gartner Magic Quadrant CPS Protection Platforms Leader quadrant and compete in the same enterprise
      utility and energy prospect pool. All three were founded between 2012 and 2016 by practitioners
      from government or OT engineering backgrounds, and all three compete primarily on platform breadth,
      threat intelligence quality, professional services, and integration ecosystem. Claroty (founded 2015,
      team of over 100 researchers in Team82, approximately $635M raised) has the broadest cyber-physical
      systems scope, explicitly including healthcare (medical device security) and commercial building OT
      alongside industrial OT. Nozomi Networks (founded 2013, acquired by Hg Capital for approximately
      €600M+ in 2023) differentiates on AI-native passive OT/IoT monitoring depth and real-time anomaly
      detection without the threat intelligence overlay that Dragos emphasizes.


      Tier 2 (IT platform extensions): Microsoft Defender for IoT represents the most disruptive
      competitive force because it is bundled into Microsoft Defender for Cloud and integrated with
      Azure Sentinel, creating a compelling IT-OT cost consolidation argument for existing Microsoft
      enterprise customers. Microsoft acquired CyberX in June 2020 for approximately $165M and rebuilt
      the product as Defender for IoT, which now covers both Enterprise IoT (IT-adjacent devices) and
      Operational Technology (industrial SCADA, DCS, PLC) environments. The integration with Microsoft
      Sentinel's SIEM/SOAR capabilities, Purview, and Azure Arc creates a platform adjacency that
      pure-play OT vendors cannot replicate. Palo Alto Networks Strata OT Security and CrowdStrike
      Falcon for OT represent similar extension plays from the endpoint and network security stacks.
      These vendors trade OT depth for IT integration breadth and consolidated licensing.


      Tier 3 (OEM-native and specialist vendors): Honeywell Forge Cybersecurity, Siemens OT Security,
      and GE Vernova cybersecurity offer OT security tooling deeply integrated with their own automation
      hardware installed base—relevant in captive customer situations but rarely competitive in
      open-market evaluations. Tenable.ot (Indegy acquisition, 2019) competes on vulnerability management
      depth. Armis (generalist IT/OT/IoT/medical asset management, $4.3B valuation 2023, $547M raised)
      and Forescout compete on broader asset visibility and NAC integration rather than OT threat detection.
      TXOne Networks (Trend Micro OT security spinout) and Otorio focus on segmentation and OT security
      assessment respectively.

    claimRefs: [CP001, CP002, CP003, CP004, CP005, CP006, CP007]
    tableRefs: [TP001]

  - id: feature-comparison
    title: "Feature and Capability Comparison"
    body: >
      Dragos Platform 3.0 is the core competitive product, emphasizing three capabilities that Dragos
      claims no competitor matches at equivalent OT depth: (1) Detection content with 2,900+ behavioral
      analytics mapped to MITRE ATT&CK for ICS techniques, developed from active incident response
      casework in industrial environments; (2) OT-native threat intelligence tracking 26 named adversary
      groups with tactical-level TTP mapping, campaign correlation, and early warning reporting; and
      (3) Neighborhood Keeper — an anonymized threat sharing overlay network covering 84+ utilities
      representing over 70% of U.S. electric customers. The MITRE ATT&CK Evaluations for ICS
      (Dragos demonstrated detection of simulated XENOTIME/TRITON and related ICS-targeted attacks)
      provide a third-party validation of detection efficacy that competitors have not replicated at the
      same depth.


      Claroty's primary platform (Claroty Platform / xDome for OT, Medigate for healthcare) has a
      broader cyber-physical asset scope: OT, healthcare (medical devices), and commercial building OT
      systems. Team82 researchers have published over 50 CVEs and their research spans OT, medical, and
      commercial building protocols—giving Claroty a broader vulnerability research footprint than Dragos
      (OT-only). Claroty's integration with healthcare-specific workflows (Medigate for clinical asset
      management) creates a differentiator that Dragos explicitly does not compete in.


      Nozomi Networks' Vantage platform differentiates on real-time AI/ML anomaly detection in passive
      monitoring mode, claiming lower false-positive rates through machine learning baseline modeling.
      Nozomi also integrates with Azure Sentinel, Splunk, and IBM QRadar for SIEM convergence—
      an integration set similar to Dragos. Hg Capital's acquisition provides balance sheet strength for
      additional M&A (Nozomi has not disclosed the enterprise or growth post-acquisition).


      Microsoft Defender for IoT uniquely integrates OT device discovery and monitoring directly into
      the Microsoft 365 Defender portal and Azure Sentinel, enabling unified IT+OT alerting within the
      same SIEM workflow for enterprises that are already Microsoft shops. This workflow integration is
      the feature that most threatens Dragos's position with IT-centric enterprise buyers who want to
      consolidate security tooling. However, Microsoft Defender for IoT has shallower OT detection
      content and no equivalent to Dragos's threat group intelligence or Neighborhood Keeper community.


      The key feature gap Dragos maintains over all competitors: industrial incident response brand
      credibility. When VOLTZITE, CHERNOVITE, or ELECTRUM attack a utility, Dragos is the response
      vendor of record in major disclosed incidents. This brand association reinforces platform retention
      and generates inbound deal flow from utilities that have read Dragos advisories.

    claimRefs: [CP008, CP009, CP010, CP011, CP012, CP013, CP014, CP015]
    tableRefs: [TP002]
    figureRefs: [FP001, FP002]

  - id: competitive-positioning
    title: "Pricing, Packaging, and Go-to-Market Positioning"
    body: >
      Dragos competes exclusively in the enterprise segment with no self-serve, freemium, or SMB
      offering. Pricing is asset-count-based (per-device/per-node), and deals are structured as
      multi-year subscriptions with professional services attached for deployment, tuning, and ongoing
      IR retainers. This creates high average contract values and low initial churn (multi-year lock-in)
      but limits market velocity and makes competitive displacement difficult mid-contract.


      Claroty also competes enterprise-only with asset-count-based platform licensing. Team82 research
      is provided free publicly to build brand, while the platform licenses at enterprise deal sizes
      comparable to Dragos. Claroty has invested aggressively in channel partnerships—VAR/MSSP—and
      integration with Cisco, Rockwell Automation, and Schneider Electric partnerships for embedded
      OEM sales motions. Claroty's healthcare expansion (Medigate) creates a separate Magnet for
      hospital system CISOs who need unified medical device and OT security, a buyer segment Dragos
      does not address.


      Nozomi Networks uses a similar asset-count licensing model and has built channel partnerships
      with integrators (Accenture, Deloitte, IBM). Post-Hg acquisition, Nozomi appears to be investing
      in geographic expansion (EMEA, APAC) and potential M&A adjacency rather than competing on
      product differentiation against Dragos.


      Microsoft Defender for IoT is bundled within Microsoft Defender for Cloud Plans 2 and integrated
      with Azure Arc for on-premises deployment, effectively making OT monitoring a feature of existing
      Microsoft enterprise licensing rather than a standalone budget item. For large enterprises that
      are 100% Microsoft shops, this bundling creates a very difficult competitive dynamic for Dragos
      because the OT monitoring cost may appear zero against existing Microsoft licensing. Microsoft's
      GTM is an account-led motion through enterprise account teams rather than a specialist OT channel.


      Dragos's primary competitive moats: (1) NSA/ICS-CERT founding credibility that translates to
      government and defense-critical infrastructure customer trust; (2) OT-CERT and Community Defense
      Program as market development and goodwill assets that create inbound pipeline from first-time
      OT security buyers; (3) 26 named adversary group intelligence producing uniquely actionable
      threat alerts that alternatives cannot replicate; (4) MITRE ATT&CK for ICS evaluation performance
      records providing third-party validation; (5) Microsoft partnership (February 2026) for
      Microsoft Sentinel integration that partially co-opts the Microsoft bundling threat by making
      Dragos available within the Microsoft security ecosystem.

    claimRefs: [CP015, CP016, CP017, CP018, CP019, CP020, CP021]
    tableRefs: [TP003]

  - id: moat-durability
    title: "Moat Durability and Competitive Risk"
    body: >
      Dragos's competitive moats are durable but face increasing structural pressure on two fronts:
      platform bundling by IT security giants and scope expansion by Claroty into adjacent verticals.


      The Microsoft competitive threat is the most strategically significant. The February 2026
      Microsoft-Dragos partnership—which integrates Dragos threat intelligence into Microsoft Sentinel
      and Dragos Platform into Azure Marketplace—represents Dragos's bet that co-opetition (Dragos as
      an OT depth layer within the Microsoft stack) is better than head-to-head competition with
      Microsoft's bundled OT monitoring. This is a reasonable strategic response to the bundling threat,
      but it reduces Dragos's pricing power with Microsoft enterprise customers who may expect Dragos
      pricing concessions in exchange for Azure marketplace delivery.


      Claroty's vertical expansion represents a scope risk rather than a direct OT threat. By pursuing
      healthcare (medical device security) and commercial buildings, Claroty addresses a broader
      cyber-physical systems TAM. If hospital system CISOs adopt xDome/Medigate for healthcare and
      default-extend Claroty to their industrial OT environments, Dragos loses the primary OT security
      evaluation at those accounts. This cross-sell risk is real in verticals like pharmaceutical
      manufacturing (both OT and healthcare device environments) and integrated health systems with
      utility plant operations.


      Dragos's ICS threat intelligence library—the most comprehensive public OT adversary taxonomy
      in the industry at 26 named groups—creates a replication barrier because it is built from years
      of active incident response engagements and cannot be purchased or reverse-engineered. Competitors
      can build threat research capabilities (Claroty's Team82, Nozomi's research team) but cannot
      retroactively match Dragos's depth of OT-specific adversary TTPs without the same incident
      response footprint. The practitioner founding team's government background (NSA, ICS-CERT) further
      validates the intelligence credibility with U.S. government and defense-critical infrastructure
      buyers.


      The AWS Manufacturing and Industrial Competency designation (first achieved by Dragos) and the
      AWS-Dragos partner relationship create a cloud-native deployment pathway that extends the
      platform's addressable base to organizations deploying OT systems on AWS infrastructure.
      Similar relationships with CrowdStrike (Falcon integration) and Palo Alto Networks extend the
      ecosystem footprint and reduce the risk that those vendors displace Dragos at existing customers.


      Identified competitive risks in order of assessed severity: (1) Microsoft bundled OT monitoring
      pricing displacement; (2) Claroty healthcare-led account expansion into OT; (3) Nozomi PE-backed
      consolidation M&A; (4) Commoditization of basic OT asset visibility as features of broader
      IT security platforms; (5) Talent competition for OT-qualified practitioners limiting Dragos's
      IR services scale.

    claimRefs: [CP022, CP023, CP024, CP025, CP026, CP027, CP028, CP029]
    tableRefs: [TP004]
    figureRefs: [FP003]

callouts:
  - calloutType: strength
    title: "26-Group OT Threat Intelligence Library Is a Non-Replicable Moat"
    body: >
      Dragos's adversary group intelligence taxonomy—26 named OT threat groups including VOLTZITE,
      CHERNOVITE (PIPEDREAM/INCONTROLLER), and ELECTRUM, built from active incident response
      engagements—cannot be replicated by competitors without equivalent IR footprint and government
      backgrounds. This intelligence library creates detection content (2,900+ behavioral analytics)
      that is qualitatively different from rule-based OT anomaly detection at Nozomi Networks or
      Microsoft Defender for IoT.
    claimRefs: [CP009, CP011, CP025]

  - calloutType: risk
    title: "Microsoft Bundling Threatens Standalone OT Security Budget Allocation"
    body: >
      Microsoft Defender for IoT bundled within Azure Defender for Cloud and Microsoft Sentinel
      creates a zero-incremental-cost OT monitoring option for existing Microsoft enterprise customers.
      While shallower than Dragos's detection capabilities, adequate-for-compliance OT monitoring
      as a bundled feature could prevent OT security from being allocated as a standalone budget item,
      compressing Dragos's addressable market at Microsoft-standardized enterprises.
    claimRefs: [CP007, CP017, CP023]

  - calloutType: insight
    title: "Microsoft Partnership Partially Co-Opts the Bundling Threat"
    body: >
      The February 2026 Microsoft-Dragos partnership integrating Dragos threat intelligence into
      Microsoft Sentinel and listing Dragos Platform on Azure Marketplace converts the Microsoft
      competitive dynamic from pure-threat to co-opetition. This is Dragos's most strategically
      significant market positioning move since the Series D: by becoming a first-party-endorsed
      OT depth layer within the Microsoft security ecosystem, Dragos may capture Microsoft enterprise
      OT security budget that would otherwise default to bundled Defender for IoT.
    claimRefs: [CP019, CP021, CP023]

  - calloutType: risk
    title: "Claroty Healthcare Expansion Creates Cross-Sell Account Displacement Risk"
    body: >
      Claroty's aggressive expansion into healthcare (Medigate for medical device security) and
      commercial building OT through xDome positions Claroty as a broader cyber-physical systems
      platform. In verticals where both OT and healthcare device security are relevant (pharmaceutical
      manufacturing, integrated health systems), Claroty may win accounts on the healthcare use case
      and extend into OT environments—displacing Dragos without a head-to-head OT competition.
    claimRefs: [CP022, CP024, CP028]

