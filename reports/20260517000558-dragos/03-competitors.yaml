localEvidence:
  evidenceGaps:
    - id: EGP001
      title: "Dragos competitive win rates and deal displacement data not disclosed"
      description: "Dragos does not publicly disclose win rates against Claroty, Nozomi Networks, or Microsoft Defender for IoT in head-to-head competitive evaluations. Competitive positioning assessments in this chapter are based on public product documentation, Gartner Magic Quadrant positioning, and analyst triangulation rather than disclosed win/loss data."
      relatedQuestionRefs: [QP019]

    - id: EGP002
      title: "Competitor revenue and market share not publicly available for private vendors"
      description: "Claroty, Nozomi Networks (now private under Hg), and Dragos do not disclose revenue, ARR, or customer counts. Market share estimates across these vendors rely on funding history, valuation inference, and Gartner Magic Quadrant positioning signals rather than financial disclosure."
      relatedQuestionRefs: [QP020]

    - id: EGP003
      title: "Microsoft Defender for IoT OT customer count and adoption rate not disclosed"
      description: "Microsoft does not separately disclose Defender for IoT OT (operational technology) customer count, distinguishing from Enterprise IoT customers. The actual penetration of Microsoft's OT monitoring capability within enterprise IT buyers is unknown, making it difficult to quantify the bundling displacement risk precisely."
      relatedQuestionRefs: [QP021]

    - id: EGP004
      title: "Neighborhood Keeper current utility count is 2021 data"
      description: "The 84 utilities / >70% U.S. electric customer figure for Neighborhood Keeper dates to the October 2021 Series D announcement. Dragos has not published an updated participation count. Growth or attrition in the network post-2021 is unknown."
      relatedQuestionRefs: [QP022]

