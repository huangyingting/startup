companyProfile:
  summary: >
    Dragos is the world's leading purpose-built OT/ICS cybersecurity platform, founded in 2016
    by Robert M. Lee (ex-NSA/US Air Force). The platform combines asset discovery, threat
    detection, vulnerability management, and industrial threat intelligence to protect critical
    infrastructure. Dragos raised $200M Series D at $1.7B valuation in Oct 2021 led by Koch
    Disruptive Technologies and BlackRock. Named Gartner Magic Quadrant Leader for CPS Protection
    Platforms 2025-2026. Neighborhood Keeper info-sharing network deployed to 84+ utilities
    representing 70% of US electric customers.
  foundedDate: "2016-01-01"
  founders:
    - name: "Robert M. Lee"
      role: "CEO and Co-Founder"
      background: "Ex-NSA/US Air Force cyber operator; ICS threat intelligence pioneer"
  foundingLocation: "Hanover, MD"
  headquarters: "Hanover, MD"
  productSummary: >
    Dragos Platform 3.0 (Sept 2025): asset visibility, network monitoring, threat detection,
    vulnerability management (Insights Hub AI prioritization), STS-50 sensor, Active Collection
    mode. Dragos WorldView Threat Intelligence: 21+ named OT-specific threat groups.
    Professional Services: Incident Response, OT Watch threat hunting, assessments. Neighborhood
    Keeper: anonymized info-sharing network for utilities. OT-CERT: free CVE coordination and
    public advisories with 2,400+ registered members.
  customerFocus: >
    Electric utilities, oil & gas, manufacturing, water/wastewater, chemicals, pharmaceuticals,
    and critical infrastructure operators. Primary buyers: CISO, VP Operations, Director of OT
    Security at large enterprises and industrial asset owners.
  businessModel: >
    Enterprise SaaS with annual/multi-year platform subscriptions + threat intelligence
    subscriptions + professional services (IR, assessments, training). No SMB/freemium tier.
    Land-and-expand via platform adoption, intel upsell, and services attachment.
  stage: "Private (Series D)"
  fundingStatus: >
    $335M+ raised across Series A-D; last round $200M at $1.7B valuation (Oct 2021). No IPO
    timeline disclosed. June 2023 layoffs (~9–11% of staff) following failed fundraising attempt
    suggest cost discipline and possible growth deceleration.
  disclosureProfile: private-undisclosed
  claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007, CV008]

