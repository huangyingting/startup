summary:
  headline: |
    Dragos 是定义 OT 网络安全品类的平台，威胁情报护城河有说服力；但财务不透明、2023 年裁员后的轨迹不确定，当前投资被卡住。若确认 ARR >$70M 且估值 <$2B，可继续跟踪未来切入机会。
