  topStrengths:
    - >-
      Purpose-built OT platform with deepest ICS threat intelligence (21+ named threat groups vs competitors' IT-centric
      models)
    - >-
      Gartner Magic Quadrant Leader 2025-2026 for CPS Protection Platforms — category validation and enterprise buyer
      credibility
    - >-
      Neighborhood Keeper network effect: 84+ utilities = ~70% US electric grid creates defensible community moat and
      reduces CAC
    - >-
      High-consequence market tailwinds: NERC CIP fines up to $1M/day, CISA Volt Typhoon advisories, TSA Pipeline
      Directives create non-discretionary OT security spend
    - >-
      Blue-chip investor syndicate (Koch, BlackRock, Emerson, HPE, Rockwell) and strategic partnerships (Microsoft, NERC
      E-ISAC, ONG-ISAC) validate enterprise positioning
  topRisks:
    - >-
      Financial opacity: no revenue/ARR/burn disclosed since Oct 2021 (4.5+ years); June 2023 layoffs (~9–11% of staff)
      signal possible growth deceleration or cash preservation
    - >-
      Valuation stale-dated: Oct 2021 mark at $1.7B predates 2022-2024 private market correction; real 2026 mark may be
      materially below $1.7B
    - >-
      Microsoft OT expansion via Defender for IoT free tier compresses entry-level TAM and forces Dragos to justify
      premium pricing on intelligence depth alone
    - >-
      Competitive fundraising: Claroty raised $635M+, Nozomi Networks acquired at premium, Armis at $4.3B valuation —
      well-capitalized rivals can outspend Dragos on R&D and sales
    - >-
      CEO key-person risk: Robert M. Lee is founder-visionary-operator; brand, investor relationships, and thought
      leadership uniquely anchored to one individual with no disclosed succession plan
  unresolvedGaps:
    - >-
      Current ARR, revenue growth rate, gross margin, burn rate, cash runway — full financial disclosure required before
      any investment decision
    - >-
      Customer count, logo churn, net dollar retention, average contract value — unit economics entirely unknown without
      financial deck
    - Product roadmap and R&D budget allocation — AI/ML competitive parity vs Claroty and Nozomi unclear
    - >-
      Board composition and cap table — liquidation preferences, down-round protections, founder/employee equity stakes
      undisclosed
    - >-
      Next financing timeline, target raise size, and use of proceeds — unclear whether company seeks growth capital or
      bridge to profitability
