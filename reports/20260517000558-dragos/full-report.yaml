  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Substitutes
        blocks:
          - type: paragraph
            body: >
              Dragos addresses the operational technology (OT) and industrial control systems (ICS) cybersecurity
              market—a category distinct from IT security in its protocols, risk profile, deployment constraints, and
              procurement dynamics. The included spend encompasses: asset visibility and inventory management for SCADA,
              DCS, PLC, historian, and HMI systems; OT network monitoring and anomaly detection; ICS-specific threat
              detection and behavioral analytics; OT vulnerability management and risk scoring; industrial incident
              response services; and threat intelligence purpose-built for OT adversary groups and ICS attack tactics.
              The market operates on industrial protocols (Modbus, DNP3, EtherNet/IP, Profinet, OPC-UA, BACnet) that IT
              security tools cannot parse without specialized decoders, creating a natural product differentiation
              boundary.


              Excluded from Dragos's primary market are IT-domain security categories (endpoint detection and response,
              identity and access management, cloud workload protection, web application firewalls), consumer IoT
              security, building management systems absent critical infrastructure designation, and medical device
              cybersecurity unless operated within an industrial OT environment. The critical distinction between OT
              security and IT security is that OT risk is fundamentally operational and safety-driven—a successful OT
              attack can cause physical damage, production outages, environmental incidents, or loss of life—whereas IT
              security risk centers on data confidentiality and availability. This different risk profile justifies
              purpose-built tooling rather than extension of IT security platforms.


              Status-quo substitutes and incumbents vary by segment. Electric utilities historically relied on manual
              air-gap maintenance and NERC CIP compliance checklists; oil and gas operators used proprietary OEM
              security monitoring from Honeywell Forge, GE Predix Security, and Siemens OT security tools; manufacturers
              deployed IT security vendors extending capabilities to OT (Claroty, Nozomi Networks, Microsoft Defender
              for IoT); smaller water utilities and rural electric co-operatives often had no OT security tooling at
              all. The transition from status-quo substitutes to purpose-built OT security platforms represents Dragos's
              primary TAM expansion opportunity.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
