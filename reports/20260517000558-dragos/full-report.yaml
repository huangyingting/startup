      - number: '5.5'
        title: Community Defense — Neighborhood Keeper, CDP, OT-CERT, and ISAC Partnerships
        blocks:
          - type: paragraph
            body: >
              Dragos's community defense strategy differentiates it from any IT security vendor and most OT security
              competitors. The company has built three distinct community programs that create network effects — each
              participant makes all participants more secure — and serve as a long-term customer acquisition funnel for
              smaller utilities that may upgrade to paid platform subscriptions as they mature.

              Neighborhood Keeper is a free opt-in anonymized threat intelligence sharing network available to all
              Dragos Platform customers. It uses double anonymization: no organization ID is mapped to the connection
              certificate, so participants share threat telemetry without revealing which organization generated the
              data. Knowledge Packs are automatically distributed to all participants, ensuring that a threat indicator
              observed at one utility can be blocked at all 84+ participating utilities within hours. Neighborhood
              Keeper partners include the North American Electric Reliability Corporation's E-ISAC for the electric
              sector, the ONG-ISAC for oil and natural gas, and the DNG-ISAC for downstream natural gas.

              OT-CERT (OT Cyber Emergency Readiness Team) is Dragos's free community for under-resourced ICS/OT
              operators. As of March 2025, OT-CERT had over 2,400 members in 64 countries, receiving free how-to guides,
              tabletop exercise templates, training materials, and interactive working sessions. OT-CERT is free to join
              and represents Dragos's broadest top-of-funnel community engagement.

              The Community Defense Program (CDP) is the most targeted of the three. It provides perpetually free access
              to the Dragos Platform software, Neighborhood Keeper, and OT-CERT membership to qualifying US and
              Canada-based water, electric, and natural gas utilities with under $100M USD in annual revenue. Launched
              in the US in December 2023 and expanded to Canada in March 2025, the CDP is enabled by a partnership with
              Elastic, which provides Elasticsearch at no charge to support the platform deployment. These small
              utilities are often the softest targets for ransomware and nation-state reconnaissance; the CDP serves the
              mission while building brand loyalty with operators who may become decision-makers or references as their
              organizations grow.
            claimRefs:
              - CE025
              - CE026
              - CE027
              - CE028
      - number: '5.6'
        title: Ecosystem, Partner Program, Compliance Support, and Platform Gaps
        blocks:
          - type: paragraph
            body: >
              Dragos's go-to-market ecosystem includes over 100 channel partners spanning managed security service
              providers, system integrators, and technology resellers. The Dragos Global Partner Program, launched June
              2023, is the only OT channel program offering technology, threat intelligence, professional services, and
              training under a single program. It earned a 5-Star CRN Partner Program rating in 2024 and named Dragos's
              VP of Channel as a 2024 CRN Channel Chief. Partners include global firms such as Booz Allen Hamilton,
              Optiv, and CyberCX as well as specialized OT firms such as 1898 & Co. and ABS Group.

              Strategic technology integrations extend beyond Microsoft and AWS. The platform includes SIEM connectors
              for major platforms and integrates with security orchestration tools. The Dragos Platform MCP Server,
              introduced in 2025-2026, enables enterprise AI tools to connect directly to platform data, allowing
              organizations to use their existing AI environments for OT queries without requiring users to learn a new
              interface.

              NERC CIP compliance is a material use case for electric utility customers. The Dragos Platform's passive
              monitoring approach aligns with NERC CIP-015 internal network security monitoring requirements, and the
              platform generates event logs and alerts compatible with CIP audit documentation. Architecture Reviews by
              the Dragos services team help customers map their deployments to CIP control requirements, reducing
              compliance overhead.

              Key platform gaps include the absence of confirmed FedRAMP authorization as of May 2026, which prevents
              Dragos from competing for US federal agency OT security contracts without additional procurement
              workarounds. The company has not published a FedRAMP roadmap or timeline. Additionally, while AI-enhanced
              vulnerability analysis and natural-language querying are available in Platform 3.0, the accuracy and
              enterprise adoption of these AI features at scale remain unproven. Finally, no public SOC 2 Type II or ISO
              27001 certification for Dragos platform operations has been confirmed, which may be a procurement gate for
              some enterprise security buyers.
