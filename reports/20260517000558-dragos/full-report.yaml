      - number: '6.4'
        title: Geographic Customer Presence and International Expansion
        blocks:
          - type: paragraph
            body: >
              Dragos's geographic expansion strategy follows a hub-and-spoke model: establish direct presence in
              high-value markets, partner for coverage in adjacent markets, and leverage community programs to seed
              brand awareness ahead of direct commercial sales.


              North America remains the primary commercial market. The UK office, established October 2021, had grown to
              25 full-time employees across Europe by July 2023, led by AVP Tony Atkins (UK/Europe), Chief of Staff Phil
              Tonkin (23 years in energy sector), IR Director Kai Thomsen (ex-Audi, steel industry), and Technical
              Director Magpie Graham (ex-Microsoft intelligence). The inaugural Dragos European Forum in London (June
              2022) drew approximately 150 OT asset owners and operators from 16 countries — confirming practitioner
              demand in the region but reflecting an early community stage rather than a mature commercial footprint.


              The UAE OT Cybersecurity Centre of Excellence (CoE), established in partnership with the UAE Cyber
              Security Council under the "Make it in Emirates" forum (announced March 2026), gives Dragos a physical
              presence in the GCC region. The CoE provides real-world OT attack and defense scenarios for practitioners,
              serving as both a training venue and a customer acquisition asset for regional critical infrastructure
              operators in energy, petrochemicals, and utilities.


              Japan expansion accelerated in April 2026 with the appointment of Kaori Nieda as Dragos's first Japan
              Country Manager, building on the existing Macnica distribution partnership (which covers Japan's critical
              infrastructure and manufacturing sectors). Dragos also maintains commercial presence in Australia and New
              Zealand, referenced in the Series D announcement and organizational materials.


              Key geographic diligence gaps: Dragos does not publicly disclose revenue or customer count by region.
              European operations are 25+ employees by 2023 but the commercial customer base size is undisclosed. The
              Middle East presence is referenced in the Series D announcement but no specific customer names or
              commercial metrics are public.
