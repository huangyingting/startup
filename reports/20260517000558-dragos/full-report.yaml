chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Market Position
        blocks:
          - type: paragraph
            body: >-
              Dragos, Inc. is a privately held cybersecurity company headquartered in Hanover, Maryland (Washington, DC
              area), operating with a singular mission: to safeguard civilization from those trying to disrupt the
              industrial infrastructure we depend on every day. Founded in 2016 by practitioners who had spent careers
              in government and military cyber operations, Dragos has built the most widely recognized purpose-built
              platform for operational technology (OT) and industrial control systems (ICS) cybersecurity. The Dragos
              Platform provides industrial organizations with asset visibility, OT network monitoring, vulnerability
              management, threat detection, and incident response capabilities—all powered by the Dragos Intelligence
              Fabric, which integrates over a decade of OT-specific threat intelligence directly into the software.
              Dragos serves customers across electric utilities, oil and gas, manufacturing, water, transportation,
              mining, pharmaceutical, food and beverage, and government sectors globally. In March 2026, Gartner named
              Dragos a Leader in the 2026 Magic Quadrant for CPS Protection Platforms for the second consecutive year,
              recognizing the company for both its Ability to Execute and Completeness of Vision. Dragos also earned the
              #1 Innovation ranking in Frost & Sullivan's FrostRadar: OT Cybersecurity Solutions, 2025, and appeared on
              the Deloitte Technology Fast 500 for the fifth consecutive year. The OT security market that Dragos
              addresses is large and growing rapidly: MarketsandMarkets projects the global OT security market will
              expand from $23.5 billion in 2025 to $50.3 billion by 2030, representing a compound annual growth rate of
              16.5%. Primary competitors include Claroty—which focuses on cyber-physical systems across industrial,
              healthcare, and commercial environments—and Nozomi Networks, which emphasizes OT and IoT security with
              AI-powered threat detection. Dragos differentiates on its depth of OT threat intelligence, practitioner
              heritage, and the breadth of its threat group research, tracking 26 named OT threat groups globally as of
              the 2026 OT/ICS Cybersecurity Year in Review.
