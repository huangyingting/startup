      - number: '3.4'
        title: Moat Durability and Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Dragos's competitive moats are durable but face increasing structural pressure on two fronts: platform
              bundling by IT security giants and scope expansion by Claroty into adjacent verticals.


              The Microsoft competitive threat is the most strategically significant. The February 2026 Microsoft-Dragos
              partnership—which integrates Dragos threat intelligence into Microsoft Sentinel and Dragos Platform into
              Azure Marketplace—represents Dragos's bet that co-opetition (Dragos as an OT depth layer within the
              Microsoft stack) is better than head-to-head competition with Microsoft's bundled OT monitoring. This is a
              reasonable strategic response to the bundling threat, but it reduces Dragos's pricing power with Microsoft
              enterprise customers who may expect Dragos pricing concessions in exchange for Azure marketplace delivery.


              Claroty's vertical expansion represents a scope risk rather than a direct OT threat. By pursuing
              healthcare (medical device security) and commercial buildings, Claroty addresses a broader cyber-physical
              systems TAM. If hospital system CISOs adopt xDome/Medigate for healthcare and default-extend Claroty to
              their industrial OT environments, Dragos loses the primary OT security evaluation at those accounts. This
              cross-sell risk is real in verticals like pharmaceutical manufacturing (both OT and healthcare device
              environments) and integrated health systems with utility plant operations.


              Dragos's ICS threat intelligence library—the most comprehensive public OT adversary taxonomy in the
              industry at 26 named groups—creates a replication barrier because it is built from years of active
              incident response engagements and cannot be purchased or reverse-engineered. Competitors can build threat
              research capabilities (Claroty's Team82, Nozomi's research team) but cannot retroactively match Dragos's
              depth of OT-specific adversary TTPs without the same incident response footprint. The practitioner
              founding team's government background (NSA, ICS-CERT) further validates the intelligence credibility with
              U.S. government and defense-critical infrastructure buyers.


              The AWS Manufacturing and Industrial Competency designation (first achieved by Dragos) and the AWS-Dragos
              partner relationship create a cloud-native deployment pathway that extends the platform's addressable base
              to organizations deploying OT systems on AWS infrastructure. Similar relationships with CrowdStrike
              (Falcon integration) and Palo Alto Networks extend the ecosystem footprint and reduce the risk that those
              vendors displace Dragos at existing customers.


              Identified competitive risks in order of assessed severity: (1) Microsoft bundled OT monitoring pricing
              displacement; (2) Claroty healthcare-led account expansion into OT; (3) Nozomi PE-backed consolidation
              M&A; (4) Commoditization of basic OT asset visibility as features of broader IT security platforms; (5)
              Talent competition for OT-qualified practitioners limiting Dragos's IR services scale.
