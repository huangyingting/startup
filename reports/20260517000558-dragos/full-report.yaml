      - number: '8.2'
        title: Financing Context and Valuation Anchors
        blocks:
          - type: paragraph
            body: |
              Dragos's last confirmed valuation anchor is the October 2021 Series D: 00M raised at a .7B
              post-money valuation from Koch Disruptive Technologies, BlackRock, National Grid Partners,
              Rockwell Automation, and others. No subsequent equity raise has been publicly disclosed as of
              May 2026 -- a 4.5-year gap that is unusual for a venture-backed cybersecurity company at this
              stage. The June 2023 layoffs and failed fundraising attempt represent the only disclosed
              financial signal in this period.

              Using the OT cybersecurity market revenue-multiple framework: at the 2021 Series D moment,
              Dragos was valued at approximately .7B with reported growth over 100% YoY and a team of
              800+ employees. The implied ARR at that valuation, using the 20-30x ARR multiples prevalent
              for high-growth cybersecurity SaaS in late 2021, would have been approximately 5-85M.
              Private market multiples for cybersecurity SaaS companies in the 30-50% growth cohort compressed
              by approximately 40-60% from 2021 peak to 2023 trough. This compression, combined with the
              likely growth deceleration implied by the 2023 events, suggests the .7B valuation may have
              been structurally challenged in 2023 -- consistent with the reported fundraising failure.

              Comparable private OT security transactions provide additional anchoring: Claroty raised 00M at
              an implied post-money of approximately .8-2.2B in November 2021 (similar timing to Dragos).
              Armis achieved a .3B valuation in 2023, but Armis addresses a broader IT/OT asset management
              TAM with a different revenue model. Nozomi Networks remains pre-IPO with an estimated private
              valuation of 00M-.2B based on Series D comparables. Tenable Holdings (TENB), which
              acquired Indegy (OT security) in 2019, trades at approximately 5-6x trailing revenue on a
              combined platform that includes OT capabilities -- suggesting that pure-play OT premiums
              erode upon platform integration with IT security.

              Our valuation range is anchored to an estimated ARR of 0-100M (no disclosure available) and
              applies a 20-25x forward ARR multiple (justified by regulatory tailwind durability and
              intelligence moat, discounted 30-40% from 2021 peak for multiple compression and growth
              deceleration risk). This yields a base case of .0-2.5B at 0M ARR growing 35%, bear case
              of .5-1.7B at 0M ARR growing 20%, and bull case of .5-3.5B at 00M ARR growing 40%+.
