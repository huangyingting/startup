      - number: '3.2'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Dragos Platform 3.0 is the core competitive product, emphasizing three capabilities that Dragos claims no
              competitor matches at equivalent OT depth: (1) Detection content with 2,900+ behavioral analytics mapped
              to MITRE ATT&CK for ICS techniques, developed from active incident response casework in industrial
              environments; (2) OT-native threat intelligence tracking 26 named adversary groups with tactical-level TTP
              mapping, campaign correlation, and early warning reporting; and (3) Neighborhood Keeper — an anonymized
              threat sharing overlay network covering 84+ utilities representing over 70% of U.S. electric customers.
              The MITRE ATT&CK Evaluations for ICS (Dragos demonstrated detection of simulated XENOTIME/TRITON and
              related ICS-targeted attacks) provide a third-party validation of detection efficacy that competitors have
              not replicated at the same depth.


              Claroty's primary platform (Claroty Platform / xDome for OT, Medigate for healthcare) has a broader
              cyber-physical asset scope: OT, healthcare (medical devices), and commercial building OT systems. Team82
              researchers have published over 50 CVEs and their research spans OT, medical, and commercial building
              protocols—giving Claroty a broader vulnerability research footprint than Dragos (OT-only). Claroty's
              integration with healthcare-specific workflows (Medigate for clinical asset management) creates a
              differentiator that Dragos explicitly does not compete in.


              Nozomi Networks' Vantage platform differentiates on real-time AI/ML anomaly detection in passive
              monitoring mode, claiming lower false-positive rates through machine learning baseline modeling. Nozomi
              also integrates with Azure Sentinel, Splunk, and IBM QRadar for SIEM convergence— an integration set
              similar to Dragos. Hg Capital's acquisition provides balance sheet strength for additional M&A (Nozomi has
              not disclosed the enterprise or growth post-acquisition).


              Microsoft Defender for IoT uniquely integrates OT device discovery and monitoring directly into the
              Microsoft 365 Defender portal and Azure Sentinel, enabling unified IT+OT alerting within the same SIEM
              workflow for enterprises that are already Microsoft shops. This workflow integration is the feature that
              most threatens Dragos's position with IT-centric enterprise buyers who want to consolidate security
              tooling. However, Microsoft Defender for IoT has shallower OT detection content and no equivalent to
              Dragos's threat group intelligence or Neighborhood Keeper community.


              The key feature gap Dragos maintains over all competitors: industrial incident response brand credibility.
              When VOLTZITE, CHERNOVITE, or ELECTRUM attack a utility, Dragos is the response vendor of record in major
              disclosed incidents. This brand association reinforces platform retention and generates inbound deal flow
              from utilities that have read Dragos advisories.
