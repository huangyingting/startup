      - number: '1.5'
        title: Risks and Adverse Considerations
        blocks:
          - type: paragraph
            body: >-
              Dragos faces several material risks that diligence must assess carefully. First, the 2023 staff reduction:
              in June 2023, Dragos laid off approximately 9% of its workforce amid a cooling of the cybersecurity market
              and slower-than-anticipated enterprise budget growth in the OT sector. SiliconAngle and Axios reported the
              reduction, with Robert M. Lee acknowledging the difficulty of the decision. This adverse event
              demonstrates that Dragos is not immune to macroeconomic headwinds and raises questions about revenue
              predictability and budget cycle vulnerability. Second, as a private company Dragos provides no publicly
              verifiable financial data—current revenue, ARR, churn, and burn rate are unknown, making valuation
              assessment dependent on the $1.7 billion Series D price established in October 2021. Market conditions
              have changed materially since then, including rising interest rates, multiple public cybersecurity company
              devaluations, and a cooling of private-market multiples. The actual current valuation could be materially
              different from the 2021 anchor. Third, key-person risk: Robert M. Lee's personal brand is tightly
              intertwined with Dragos's corporate identity, thought leadership, and policy relationships. His departure
              would represent a significant disruption. Fourth, competition from well-funded peers: Claroty—backed by
              prominent investors and serving broader cyber-physical markets—and Nozomi Networks—with AI-powered OT/IoT
              analytics and deep ecosystem integrations—both compete directly and are expanding their platform
              capabilities and global footprints. Fifth, customer concentration and market maturity: the OT
              cybersecurity market, while growing, is still nascent in many segments. Smaller critical infrastructure
              operators (water utilities, rural electric co-ops) have limited cybersecurity budgets, and the free
              Community Defense Program—while mission-aligned—limits commercial monetization in that segment. The
              reliance on large industrial enterprises for revenue creates customer concentration risk.
            claimRefs:
              - CO037
              - CO028
              - CO029
              - CO030
              - CO033
