        - Reduce base case to bear scenario; investigate win-loss data before further position
    notes: >-
      Trigger thresholds are analyst-derived monitoring criteria, not Dragos-disclosed guidance. Each trigger
      transmission estimate is based on comparable cybersecurity company precedents (e.g., CrowdStrike Q3 FY2022
      guidance miss, Ping Identity down-round). Action implications assume a fully-diligenced position was established
      after confirming the base case scenario.
    claimRefs:
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - ARR and Revenue Growth
        - 2021-2026 ARR bridge; trailing 12-month growth rate; quarterly ARR cadence since 2021
        - >-
          Cannot confirm base vs bear vs bull scenario without ARR; entire valuation range (.5-3.5B) is contingent on
          this
        - Request from management as condition of term sheet
      - - Burn Rate and Cash Runway
        - Monthly burn rate by cost category (R&D, S&M, G&A, services); current cash balance; credit facilities
        - Without burn data, cannot assess urgency of Series E requirement or probability of distressed financing
        - Request audited financial statements (or management accounts) for FY2022, FY2023, FY2024, FY2025
      - - 2023 Fundraising Failure Detail
        - Which investors passed; what valuation was targeted; what growth rate was presented to prospective investors
        - Understanding the 2023 narrative is essential for valuing recovery vs continued deceleration
        - Direct management inquiry; founder/investor interviews (reference checks)
      - - Cap Table and Preference Stack
        - >-
          Full cap table with economic ownership; liquidation preference structure and anti-dilution provisions; any
          secondary sales
        - Return modeling for a new investor entering at .7-2.5B depends critically on preference overhang
        - Request cap table as part of data room
      - - Governance and Board Composition
        - Complete board member list; committee charters; Rockwell recusal policy; related-party transaction register
        - >-
          Rockwell investor-customer conflict of interest is undisclosed and unmitigated; related-party transactions
          affect valuation
        - Request governance documents and any existing conflict-of-interest policies
      - - Series E Timeline and Terms
        - Is Dragos actively pursuing Series E? What is the target valuation and timeline? Any bridge financing?
        - Series E status determines cash runway and probability of forced vs voluntary financing event
        - Management interview; track regulatory disclosures and press releases for any financing signals
    notes: >-
      All diligence asks are standard for a late-stage private company investment at this scale. None require non-public
      insider information. The financial disclosure asks are the minimum required to validate the base case scenario and
      move the recommendation from Research More to Conditional Buy.
