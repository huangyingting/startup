      - number: '1.4'
        title: Financial Scale and Customer Traction
        blocks:
          - type: paragraph
            body: >-
              As a private company, Dragos does not publicly report revenue, ARR, customer count, headcount, or
              profitability metrics. The most reliable proxy for financial scale comes from the Series D announcement
              (October 2021), which disclosed over 100% year-over-year growth in platform recurring revenue for the
              period ending September 30, 2021—a signal of strong commercial momentum at the time of fundraising. Since
              then, Dragos has disclosed several qualitative and operational scale metrics. The Neighborhood Keeper
              program—an anonymized information-sharing network offered free to all Dragos Platform customers—had been
              adopted by 84 utilities representing over 70% of electric utility customers in the United States through a
              joint initiative with NERC's Electricity Information Sharing and Analysis Center (E-ISAC), a remarkable
              community penetration metric cited at the Series D. Through partnerships with the Oil and Natural Gas
              Information Sharing and Analysis Center (ONG-ISAC) and the Downstream Natural Gas Information Sharing and
              Analysis Center (DNG-ISAC), Dragos extends collective defense to energy sector stakeholders beyond the
              electric grid. Globally, Dragos has established offices across North America, EMEA (including Europe, UK,
              and Middle East), and APAC (including Japan through a partnership with Macnica and Singapore through an
              MOU with Singapore's Digital and Intelligence Service). The company established an OT Cybersecurity Center
              of Excellence in the UAE. Dragos's global customer base includes many of the world's largest industrial
              organizations across electric, oil and gas, manufacturing, water, transportation, and mining sectors. The
              company's 2026 OT/ICS Cybersecurity Year in Review—its 9th annual report—tracked 119 ransomware groups
              impacting 3,300 industrial organizations in 2025, a 49% increase from the prior year, underscoring growing
              market urgency that supports Dragos's commercial positioning. The Dragos 2025 OT Security Financial Risk
              Report (published with Marsh McLennan's Cyber Risk Intelligence Center) estimated worst-case global OT
              cyber losses of up to $329.5 billion annually, another compelling market-development asset.
