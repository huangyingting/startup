      - number: '7.3'
        title: Operational and Technical Risk
        blocks:
          - type: paragraph
            body: |
              Dragos's platform delivery model is cloud-managed with on-premise sensor deployment, creating a
              dual operational dependency: cloud availability for the SaaS management layer and WorldView
              intelligence updates, and on-premise hardware uptime for Dragos Network Sensors at customer sites.
              A sustained cloud infrastructure outage would prevent customers from receiving updated threat
              intelligence, creating potential detection gaps during active OT threat campaigns.

              Dragos's incident response capacity represents a structural operational risk. The company is one of
              a very small number of vendors globally capable of credibly responding to complex ICS incidents.
              The simultaneous occurrence of two or more major ICS incidents could exhaust Dragos's IR team
              capacity and create service level failures. The WorldView threat intelligence flywheel creates a
              reinforcing dependency: its accuracy depends on active sensor telemetry from the deployed customer
              base, meaning that a stall in new deployments directly degrades the intelligence quality that is
              Dragos's primary differentiation.

              Dragos's distributed and remote-first workforce model covers 40+ US states and multiple
              international offices. While this reduces facilities concentration risk, it increases communication
              overhead. The company's technical workforce competes for senior OT security engineers with Booz
              Allen Hamilton, Accenture, and Deloitte, creating talent attrition risk compounded by the relative
              illiquidity of Dragos's pre-IPO equity compensation.
