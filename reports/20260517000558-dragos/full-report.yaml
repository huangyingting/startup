companyProfile:
  summary: >
    Dragos is the world's leading purpose-built OT/ICS cybersecurity platform, founded in 2016 by Robert M. Lee
    (ex-NSA/US Air Force). The platform combines asset discovery, threat detection, vulnerability management, and
    industrial threat intelligence to protect critical infrastructure. Dragos raised $200M Series D at $1.7B valuation
    in Oct 2021 led by Koch Disruptive Technologies and BlackRock. Named Gartner Magic Quadrant Leader for CPS
    Protection Platforms 2025-2026. Neighborhood Keeper info-sharing network deployed to 84+ utilities representing 70%
    of US electric customers.
