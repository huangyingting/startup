      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Adverse: No Financial Disclosure in 4.5+ Years -- Valuation Precision Blocked'
            body: >-
              Dragos has not disclosed ARR, burn rate, revenue growth, or cash balance since the October 2021 Series D.
              This is structurally unusual for a company at this stage and scale. Without this data, the entire
              valuation analysis rests on estimated ARR (0-100M range) and market multiples. A new investor cannot
              responsibly initiate a position above .7B without financial disclosure. The failed 2023 fundraising makes
              this opacity more, not less, concerning.
            calloutType: insight
            claimRefs:
              - CV016
              - CV031
              - CV032
              - CV033
              - CV034
          - type: callout
            title: 'Adverse: Rockwell Automation Investor-Customer Conflict of Interest'
            body: >-
              Rockwell Automation is simultaneously a Dragos investor (Series D), a named customer, and a strategic
              investor in Claroty (Dragos's primary OT security competitor). This undisclosed conflict creates
              related-party transaction risk in both the Dragos customer relationship and the board governance
              structure. Investors should require a formal recusal policy and disclosure of any Dragos-Rockwell
              contractual arrangements before initiating a position.
            calloutType: insight
            claimRefs:
              - CV006
              - CV022
              - CV036
