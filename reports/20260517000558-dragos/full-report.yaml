      - number: '3.3'
        title: Pricing, Packaging, and Go-to-Market Positioning
        blocks:
          - type: paragraph
            body: >
              Dragos competes exclusively in the enterprise segment with no self-serve, freemium, or SMB offering.
              Pricing is asset-count-based (per-device/per-node), and deals are structured as multi-year subscriptions
              with professional services attached for deployment, tuning, and ongoing IR retainers. This creates high
              average contract values and low initial churn (multi-year lock-in) but limits market velocity and makes
              competitive displacement difficult mid-contract.


              Claroty also competes enterprise-only with asset-count-based platform licensing. Team82 research is
              provided free publicly to build brand, while the platform licenses at enterprise deal sizes comparable to
              Dragos. Claroty has invested aggressively in channel partnerships—VAR/MSSP—and integration with Cisco,
              Rockwell Automation, and Schneider Electric partnerships for embedded OEM sales motions. Claroty's
              healthcare expansion (Medigate) creates a separate Magnet for hospital system CISOs who need unified
              medical device and OT security, a buyer segment Dragos does not address.


              Nozomi Networks uses a similar asset-count licensing model and has built channel partnerships with
              integrators (Accenture, Deloitte, IBM). Post-Hg acquisition, Nozomi appears to be investing in geographic
              expansion (EMEA, APAC) and potential M&A adjacency rather than competing on product differentiation
              against Dragos.


              Microsoft Defender for IoT is bundled within Microsoft Defender for Cloud Plans 2 and integrated with
              Azure Arc for on-premises deployment, effectively making OT monitoring a feature of existing Microsoft
              enterprise licensing rather than a standalone budget item. For large enterprises that are 100% Microsoft
              shops, this bundling creates a very difficult competitive dynamic for Dragos because the OT monitoring
              cost may appear zero against existing Microsoft licensing. Microsoft's GTM is an account-led motion
              through enterprise account teams rather than a specialist OT channel.


              Dragos's primary competitive moats: (1) NSA/ICS-CERT founding credibility that translates to government
              and defense-critical infrastructure customer trust; (2) OT-CERT and Community Defense Program as market
              development and goodwill assets that create inbound pipeline from first-time OT security buyers; (3) 26
              named adversary group intelligence producing uniquely actionable threat alerts that alternatives cannot
              replicate; (4) MITRE ATT&CK for ICS evaluation performance records providing third-party validation; (5)
              Microsoft partnership (February 2026) for Microsoft Sentinel integration that partially co-opts the
              Microsoft bundling threat by making Dragos available within the Microsoft security ecosystem.
