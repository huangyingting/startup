      - number: '5.4'
        title: Professional Services — Incident Response, Assessment, and Managed Monitoring
        blocks:
          - type: paragraph
            body: >
              Dragos's professional services portfolio complements the platform and represents a separate revenue stream
              that also feeds intelligence back into product development. The services organization is staffed by OT
              security practitioners with government and military cyber backgrounds — the same profile as the founders —
              providing credibility that IT-trained consultants cannot match in ICS incident response engagements.

              The Rapid Response Retainer provides organizations with pre-cleared contracts, reducing the mobilization
              time during an active OT incident. Retainer customers receive onboarding workshops to evaluate their
              existing IR plans and tabletop exercises to identify gaps before a real incident occurs. Burndown options
              allow organizations to draw down retainer hours for training and exercises rather than waiting for an
              incident. This model is analogous to legal retainers in crisis management and creates recurring services
              revenue alongside platform subscriptions.

              Assessment services include OT Cybersecurity Assessments (evaluating network design and security
              controls), Network Vulnerability Assessments, Penetration Testing of OT environments, and Purple Team
              exercises that test both defensive detection and offensive simulation simultaneously. Architecture Reviews
              are particularly relevant for NERC CIP compliance, as they evaluate whether segmentation and monitoring
              configurations meet regulatory requirements.

              OT Watch and OT Watch Complete extend managed services to organizations that lack internal OT security
              staff. OT Watch delivers 24/7 expert monitoring and escalation; OT Watch Complete manages the full
              detection-to-investigation lifecycle including proactive security hardening. Both tiers integrate with the
              platform's Insights Hub and benefit from weekly Knowledge Pack updates. The managed services model also
              creates stickiness: customers that adopt OT Watch are less likely to churn from the underlying platform
              subscription because the service team is embedded in their operations.
