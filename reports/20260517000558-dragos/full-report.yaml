  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Industrial Vertical Segmentation
        blocks:
          - type: paragraph
            body: >
              Dragos serves industrial asset owners and operators in nine publicly confirmed verticals: electric
              utilities, oil & gas, manufacturing, water and wastewater, chemical, pharmaceutical, food & beverage,
              transportation, and mining. Buyer personas cluster into three segments. The enterprise commercial tier
              consists of large industrial organizations with dedicated OT security budgets (e.g., national utilities,
              global manufacturers, Fortune 500 energy companies) that purchase the full Dragos Platform plus WorldView
              intelligence and professional services. The mid-market and specialist tier includes mid-size industrials
              and public-sector operators who procure through channel partners, managed service providers, or national
              cybersecurity programs. The community tier — comprising Community Defense Program (CDP) members, OT-CERT
              members, and Neighborhood Keeper participants — receives free or heavily subsidized access as part of
              Dragos's collective defense mission.


              The electric sector is Dragos's most publicly documented vertical. The company holds a joint collective
              defense initiative with the North American Electric Reliability Corporation's E-ISAC covering 84+
              utilities representing more than 70% of US electric utility customers. Oil & gas buyers benefit from the
              ONG-ISAC Neighborhood Keeper partnership, extending sector-wide threat visibility to all member companies
              in the North American petroleum sector. Manufacturing is also confirmed: Koch Industries' Georgia-Pacific
              subsidiary (160+ locations) and Boston Beer Company are named production customers. Water sector coverage
              is addressed through the CDP, which prioritizes under-resourced water utilities that cannot afford
              commercial pricing.


              Geographic coverage spans North America (primary), the United Kingdom (25 FTEs by July 2023), continental
              Europe (16-country engagement at the inaugural European Forum), the UAE (OT Cybersecurity Centre of
              Excellence established March 2026), Japan (Country Manager appointed April 2026), and Australia/New
              Zealand. The Middle East (GCC, Saudi Arabia) is covered through direct engagement referenced in the Series
              D funding announcement. Channel partners — 100+ firms including Booz Allen Hamilton, Optiv, and CyberCX —
              extend reach beyond direct Dragos headcount in all regions.
