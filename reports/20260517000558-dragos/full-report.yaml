      - number: '4.3'
        title: Capital Structure and Funding History
        blocks:
          - type: paragraph
            body: >
              Dragos has raised approximately $440M in venture and growth equity across multiple rounds, with strategic
              investors including Koch Disruptive Technologies, BlackRock Alternative Capital, Rockwell Automation,
              Emerson Electric, and Hewlett Packard Enterprise alongside lead financial investors including National
              Grid Partners, AllegisCyber Capital, DataTribe, and 1011 Ventures. The October 2021 Series D of $200M at a
              $1.7B post-money valuation was the company's largest single round; the January 2024 extension brought the
              total Series D tranche to $274M, suggesting Dragos drew on committed-but-undeployed capital rather than
              completing a separate round—a common mechanism to extend runway without triggering a new valuation mark.


              Strategic investor profile reflects Dragos's dual commercial and national security positioning. Koch
              Industries (Koch Disruptive Technologies) brings energy and industrial operator customer introductions.
              BlackRock provides access to critical infrastructure asset owners through its real assets platform.
              Rockwell Automation is a top-tier industrial automation vendor with an installed base of PLCs and control
              systems that are natural Dragos Platform deployment contexts. Emerson Electric similarly provides OT
              environment access across process industries. HPE provides edge computing and infrastructure integration
              context. These strategic investors are not passive: the Rockwell Automation partnership and the Macnica
              Japan distribution partnership are both products of investor relationships.


              Total capital raised ($440M) at $1.7B peak valuation implies a post-Series D ownership dilution structure
              that, at typical SaaS exit valuations of 5–15× ARR for private equity or strategic acquirer exits, would
              require an ARR in the $300M–$700M range for investor returns to exceed the $1.7B valuation mark. If
              Dragos's ARR is in the $200–350M analyst-estimated range (unverified), the current operating ARR may not
              yet support Series D investors breaking even at 2021 valuation. This creates a financial dynamic that may
              favor a strategic acquisition at a premium to public market comps (where Dragos's government credibility
              and OT threat intelligence have premium strategic value to a defense contractor, national security
              acquirer, or IT security platform seeking OT depth) over an IPO at current SaaS multiples.


              No outstanding debt facilities, convertible notes, or credit lines are publicly disclosed. Dragos's
              Deloitte Technology Fast 500 recognition for five consecutive years (through 2024) and consistent analyst
              recognition (Gartner Leader, Frost & Sullivan FrostRadar #1 Innovation) suggest healthy revenue growth
              momentum, but without financial disclosure the burn rate and runway implications of the $440M raised are
              unquantifiable.
