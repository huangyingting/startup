      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Dragos was founded in 2016 by a team of cybersecurity practitioners with deep government and military
              backgrounds. CEO and co-founder Robert M. Lee served as a U.S. Air Force Cyber Warfare Operations officer
              and worked for the National Security Agency (NSA) before founding Dragos. Lee and his co-founders were
              drawn to industrial cybersecurity through direct operational experience investigating major ICS
              attacks—including the 2015 and 2016 Ukraine power grid attacks, and the TRISIS and CRASHOVERRIDE malware
              campaigns—that most of the industry had no framework to address. Lee has testified before Congress
              multiple times on the security of critical energy and water infrastructure, establishing Dragos as a
              trusted voice with policymakers. The executive leadership team as of mid-2026 includes Jodi Schatz (Chief
              Product Officer), Eric Cross (Chief Revenue Officer, appointed August 19, 2025), and Dawn Mitchell (Chief
              People Officer). Cross brought more than 20 years of enterprise GTM experience from Reltio, Appian, Google
              Cloud, and Salesforce, with a track record of scaling revenue organizations through IPO and acquisition
              events. On January 31, 2024, Dragos expanded its board of directors with the appointments of William J.
              'Bill' Fehrman and Ekta Singh-Bushell. Fehrman previously served as President and CEO of Berkshire
              Hathaway Energy (BHE) and remains involved in critical infrastructure cybersecurity policy. Singh-Bushell
              held executive roles at the Federal Reserve Bank of New York and Ernst & Young (EY), and brings
              board-level experience with audit, risk, compliance, and security. Key-person risk is elevated given
              Robert M. Lee's singular prominence as the face of Dragos and the industrial cybersecurity practice he
              built—his departure or diminished role would materially affect brand equity, customer relationships, and
              the company's ability to attract talent in a mission-driven culture. Dragos is privately held, and its
              governance structure is not subject to public disclosure requirements.
