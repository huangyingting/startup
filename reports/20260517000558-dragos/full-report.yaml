      - number: '5.2'
        title: Dragos WorldView Threat Intelligence and Adversary Tracking
        blocks:
          - type: paragraph
            body: >
              Dragos WorldView is the company's OT-exclusive threat intelligence product, delivering adversary research,
              ICS malware analysis, vulnerability insights, and strategic intelligence to security analysts and
              executive stakeholders. WorldView is the only commercial threat intelligence service focused exclusively
              on operational technology; IT threat intelligence vendors such as CrowdStrike and Mandiant cover ICS
              tangentially but do not maintain dedicated OT adversary tracking teams of comparable scale or depth.

              As of the February 2026 annual report release, Dragos tracks 26 named OT threat groups worldwide, 11 of
              which were active during 2025. Three new groups were identified during the year: SYLVANITE, which acts as
              an initial access broker handing off footholds to VOLTZITE for deeper OT intrusions; AZURITE, which
              conducts long-term OT data exfiltration targeting engineering workstations and shares technical overlaps
              with Flax Typhoon; and PYROXENE, which conducts supply chain compromises in the aviation, aerospace,
              defense, and maritime sectors with IRGC-CEC overlaps. KAMACITE systematically scanned U.S. infrastructure
              control loops throughout 2025, while ELECTRUM deployed wiper malware against Polish energy systems,
              demonstrating adversary progression from reconnaissance to attempted operational effects.

              Intelligence is operationalized through weekly Knowledge Packs pushed automatically to the Dragos
              Platform, containing updated detections, OT-specific vulnerability scoring, and playbooks aligned to
              current adversary tactics. This intelligence-to-platform feedback loop means customers continuously
              receive updated threat coverage without manual analyst intervention. WorldView is available as a
              standalone portal subscription and is embedded in platform-tier customers' deployments.

              The 2026 annual report found that ransomware groups targeting industrial organizations increased 64%
              year-over-year, with 119 groups active against 3,300 organizations globally. Dragos also identified that
              25% of ICS-CERT and NVD vulnerability advisories carried incorrect CVSS scores in 2025, and 26% had no
              patch or mitigation guidance — illustrating the value of Dragos's OT-corrected vulnerability intelligence
              beyond generic public advisories.
