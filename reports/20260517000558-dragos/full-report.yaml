  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The OT/ICS cybersecurity platform market in 2026 is a three-tier competitive structure. Tier 1 (pure-play
              OT specialists): Dragos, Claroty, and Nozomi Networks collectively dominate the Gartner Magic Quadrant CPS
              Protection Platforms Leader quadrant and compete in the same enterprise utility and energy prospect pool.
              All three were founded between 2012 and 2016 by practitioners from government or OT engineering
              backgrounds, and all three compete primarily on platform breadth, threat intelligence quality,
              professional services, and integration ecosystem. Claroty (founded 2015, team of over 100 researchers in
              Team82, approximately $635M raised) has the broadest cyber-physical systems scope, explicitly including
              healthcare (medical device security) and commercial building OT alongside industrial OT. Nozomi Networks
              (founded 2013, acquired by Hg Capital for approximately €600M+ in 2023) differentiates on AI-native
              passive OT/IoT monitoring depth and real-time anomaly detection without the threat intelligence overlay
              that Dragos emphasizes.


              Tier 2 (IT platform extensions): Microsoft Defender for IoT represents the most disruptive competitive
              force because it is bundled into Microsoft Defender for Cloud and integrated with Azure Sentinel, creating
              a compelling IT-OT cost consolidation argument for existing Microsoft enterprise customers. Microsoft
              acquired CyberX in June 2020 for approximately $165M and rebuilt the product as Defender for IoT, which
              now covers both Enterprise IoT (IT-adjacent devices) and Operational Technology (industrial SCADA, DCS,
              PLC) environments. The integration with Microsoft Sentinel's SIEM/SOAR capabilities, Purview, and Azure
              Arc creates a platform adjacency that pure-play OT vendors cannot replicate. Palo Alto Networks Strata OT
              Security and CrowdStrike Falcon for OT represent similar extension plays from the endpoint and network
              security stacks. These vendors trade OT depth for IT integration breadth and consolidated licensing.


              Tier 3 (OEM-native and specialist vendors): Honeywell Forge Cybersecurity, Siemens OT Security, and GE
              Vernova cybersecurity offer OT security tooling deeply integrated with their own automation hardware
              installed base—relevant in captive customer situations but rarely competitive in open-market evaluations.
              Tenable.ot (Indegy acquisition, 2019) competes on vulnerability management depth. Armis (generalist
              IT/OT/IoT/medical asset management, $4.3B valuation 2023, $547M raised) and Forescout compete on broader
              asset visibility and NAC integration rather than OT threat detection. TXOne Networks (Trend Micro OT
              security spinout) and Otorio focus on segmentation and OT security assessment respectively.
