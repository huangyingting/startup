      - number: '6.2'
        title: Named Customer Proof — Enterprise Deployments and Public Testimonials
        blocks:
          - type: paragraph
            body: >
              Dragos's most substantive named customer evidence comes from the October 2021 Series D funding
              announcement, which included direct testimonials from four customers who are also strategic investors:
              Georgia-Pacific, Koch Industries, Rockwell Automation, and National Grid. This investor-customer overlap
              provides corroborated deployment proof but requires careful interpretation — the commercial relationship
              may be influenced by the investment relationship.


              Georgia-Pacific LLC, a Koch Industries subsidiary with 160+ global locations and brands including Dixie,
              Angel Soft, and Brawny, deployed the Dragos Platform for OT visibility, threat detection, and incident
              response across its manufacturing and chemical operations. CISO Francis Cioffi stated the platform
              provides "visibility, detection, and response capabilities we need to secure our operations and protect
              the business." This is a high-quality reference: a named CISO from a large, identifiable company with a
              specific operational outcome statement.


              Koch Industries deployed the Dragos Platform on AWS at its 500+ global manufacturing and processing
              facilities, achieving "previously unachievable visibility into ICS/OT assets," per the AWS Industrial
              Competency announcement. Byron Knight, Managing Director and COO of Koch Disruptive Technologies (the
              investment arm), stated that Koch has "quickly proven to be a key partner" and that the platform "plays a
              key part in managing risk across our enterprise." Koch's repeated investment in Dragos (multiple rounds)
              further corroborates sustained platform adoption.


              National Grid plc — one of the world's largest investor-owned utilities — invested in Dragos in 2018
              following its initial subscription to Dragos's OT threat intelligence service. CTIO Lisa Lambert confirmed
              that Dragos's "visibility into ICS threats brought value for both our UK and US businesses" as of the 2021
              UK expansion announcement. This provides multi-year deployment proof with a named executive at a critical
              infrastructure operator.


              Rockwell Automation, a leading industrial automation vendor, invested in Dragos as a strategic partner and
              customer. VP and GM of Global Services Rachael Conrad confirmed that "Dragos's industrial cybersecurity
              platform helps our customers protect their operational environments and maximize the value of their
              digital transformation." Boston Beer Company is listed as a named manufacturing customer on Dragos's
              industry page without a published case study or executive quote; this is logo-level proof.
