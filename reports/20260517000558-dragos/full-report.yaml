      - number: '8.3'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: |
              The comparable set for Dragos spans four groups: (1) private pure-play OT security companies
              (Claroty, Nozomi); (2) private IT/OT convergence platforms (Armis); (3) public cybersecurity
              companies with OT components (Tenable TENB, CrowdStrike CRWD emerging OT module); and
              (4) OT security M&A transactions (Tenable/Indegy 2019 at 8M, Armis/Aperio 2021, Rockwell
              investment in Claroty).

              The most relevant comparables are Claroty and Nozomi as direct pure-play OT security peers.
              Claroty's Series D (00M, November 2021) implied a post-money of approximately .8-2.2B
              -- comparable to Dragos's Series D at .7B two weeks earlier. Both companies have not
              disclosed post-2021 financials, making growth-adjusted comparable analysis difficult. Armis
              at .3B (2023) is a useful ceiling comparable, but Armis's TAM (IT and OT asset management
              for ITAM/CAASM use cases) is substantially larger than Dragos's more focused OT threat
              detection and IR market.

              For public company multiples: Tenable Holdings (TENB) trades at approximately 4.5-5.5x NTM
              ARR on a combined VM and OT security platform of approximately .0B ARR. CrowdStrike's OT
              security module is nascent (sub-0M ARR estimated) and not yet publicly broken out; CRWD
              trades at over 20x ARR but this multiple reflects the core Falcon EDR dominance, not the OT
              component. Using Tenable as the most relevant public proxy for an OT-capable platform at scale
              and applying a 15-25x multiple to Dragos's estimated ARR range of 0-100M yields a valuation
              range of bash.75B-.5B -- consistent with our bear to base scenario modeling.

              The comparable set confirms that the .7B Series D valuation is defensible under a base-case
              scenario (ARR approximately 0M, growth 30-40%, 20-22x forward multiple) but not obviously
              cheap. A new investor entering at the .7B reference price would need confidence in 25%+
              ARR growth and a clear Series E or exit path within 24-36 months.
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
          - type: table
            tableRef: TV004
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
      - number: '8.4'
        title: Thesis-Break and Monitoring
        blocks:
          - type: paragraph
            body: |
              The primary thesis-break for a Dragos investment is a Series E fundraise at below .0B
              valuation -- representing a greater than 40% decline from the Series D reference price and
              implying a fundamental revaluation of the business. Secondary thesis-break triggers include:
              a major IT security platform (Microsoft or Palo Alto Networks) launching an OT security bundle
              priced below Dragos's average contract value for enterprise customers; a Dragos headcount
              reduction without an announced new equity raise; or the departure of Robert M. Lee without a
              pre-announced transition plan.

              Monitoring indicators that would positively update the investment case: (1) A confirmed Series E
              at a valuation of .0B+ would validate the base case and justify position entry; (2) Any ARR
              disclosure (voluntary or via regulatory filing if Dragos pursues an IPO or direct listing)
              confirming growth above 30%; (3) A Dragos IPO announcement, which would require financial
              disclosure sufficient to resolve most evidence gaps; (4) A major enterprise OT security contract
              announcement at a Fortune 100 critical infrastructure operator not yet in the disclosed customer
              list. Monitoring indicators that would negatively update the case: (1) A second headcount
              reduction; (2) Departure of key executives (SVP Research, SVP Sales, CTO); (3) Claroty or
              Nozomi winning a named Dragos customer account.

              Conviction threshold for position entry: Require (a) confirmed ARR above 0M with trailing
              12-month growth above 25%, (b) confirmed cash runway above 18 months or announced new financing,
              and (c) valuation at or below the base case of .0-2.5B before entering a half position.
              A full position requires resolution of the board governance opacity and the Rockwell
              investor-customer conflict of interest.
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
