      - number: '4.2'
        title: Unit Economics and Monetization
        blocks:
          - type: paragraph
            body: >
              Dragos's unit economics cannot be precisely quantified without disclosed CAC, LTV, gross margin, or net
              revenue retention figures. However, the structural characteristics of the business allow for analytical
              frameworks that bound the possible range. The platform subscription model with per-device pricing and
              multi-year contracts creates structurally high LTV: a utility customer with 500+ monitored OT assets under
              a $300K/year platform subscription and a 3-year initial term represents approximately $900K in contract
              value before expansion, renewal, or professional services attach. Industrial OT security has high
              deployment stickiness—switching costs include sensor reconfiguration, protocol decoder retraining, SOC
              workflow reconfiguration, and OT staff re-training—suggesting that net revenue retention (NRR) is likely
              above 100% for mature platform customers, driven by asset count expansion as OT environments grow.


              Professional services attach rate is a critical determinant of blended gross margin. Pure SaaS
              subscription gross margins are typically 75–85%; professional services margins run 30–50%. If Dragos's
              professional services represent 25–35% of total revenue (a likely range given the deployment-heavy
              enterprise OT market and the company's stated commitment to practitioner-driven IR), blended gross margin
              would be in the 55–70% range—below pure SaaS benchmarks but sustainable for an enterprise security
              company. This has implications for terminal value multiples at exit.


              Customer acquisition cost structure is dominated by an enterprise direct sales motion with long evaluation
              cycles (12–24 months) and high technical evaluation requirements (proof of concept deployments, site
              surveys, protocol analysis). This implies high CAC per customer relative to SMB SaaS, but average contract
              value that justifies the CAC at scale. Dragos's community programs (OT-CERT, Community Defense Program,
              Year in Review reports) function as content-led demand generation that reduces inbound CAC for customers
              who self-identify through community engagement before entering a commercial evaluation.


              The June 2023 layoffs (approximately 9% of workforce) signal that Dragos was burning capital faster than
              revenue growth justified in the post-2021 rate environment. The Series D was raised at peak growth-capital
              valuations (2021), and the 2023 market correction forced a headcount adjustment. No subsequent round of
              financing has been publicly announced since the January 2024 extension of the Series D to $274M total. The
              absence of a Series E announcement through May 2026 (approximately 30 months post-extension) raises
              questions about whether Dragos is approaching profitability, actively pursuing strategic alternatives, or
              considering a delayed IPO or M&A exit.
