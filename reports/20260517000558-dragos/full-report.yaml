      - number: '8.5'
        title: Final Diligence Asks
        blocks:
          - type: paragraph
            body: |
              The most critical unresolved diligence items for Dragos -- all of which would materially shift
              the recommendation from Research More to Buy or Pass -- relate to financial transparency and
              governance. First, financial disclosure: the company must provide its 2021-2026 ARR bridge,
              current annualized ARR, trailing 12-month growth rate, gross margin, burn rate by cost
              category, current cash balance, and any credit facilities or bridge financing. Second,
              valuation context: the specific terms of the 2023 failed fundraising attempt -- including
              the targeted valuation, which investors passed, and the reason given -- would provide critical
              triangulation for current enterprise value assessment. Third, capital structure: a full cap
              table showing preference stack, liquidation preferences, anti-dilution provisions, and investor
              rights agreements is essential for return modeling. Fourth, governance: a complete board member
              list, committee charters, and any existing recusal or conflict-of-interest policies for
              investor-board members with customer relationships (specifically Rockwell Automation).

              If financial disclosure confirms the bear case scenario (ARR approximately 0M, growth below
              25%), the appropriate action is Pass or Monitor at below .5B entry. If disclosure confirms
              the base case (ARR approximately 0M, growth 30-40%), the appropriate action is Half Position
              at or below .0B. If disclosure confirms the bull case (ARR above 00M, growth above 40%),
              the appropriate action is Full Position at or below .5B. The recommendation framework is
              price-sensitive and evidence-sensitive: the quality of the Dragos market position does not
              independently support entry without financial validation.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
