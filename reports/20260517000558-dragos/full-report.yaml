      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Dragos has raised approximately $440 million in total capital across multiple private rounds. The marquee
              event was the October 28, 2021 Series D: a $200 million raise at a $1.7 billion valuation, the largest
              round and highest valuation achieved by any OT cybersecurity company at the time. The Series D was co-led
              by Koch Disruptive Technologies (an investment arm of Koch Industries) and funds and accounts managed by
              BlackRock. The investor syndicate for the Series D included Emerson, Hewlett Packard Enterprise (HPE),
              Allegis Cyber, Canaan, DataTribe, Energy Impact Partners, National Grid Partners, Schweitzer Engineering
              Labs, Rockwell Automation, and Global Reserve Group—a strategically curated group of industrial operators
              and infrastructure-focused investors who are also customers or potential customers of Dragos. This
              strategic investor alignment is a structural advantage: it provides Dragos with distribution leverage,
              co-marketing opportunities, and credibility signals when selling to other industrial enterprises. The
              Series D was subsequently extended by $74 million, bringing the total Series D round to $274 million and
              total funds raised across all rounds to approximately $440 million. This extension was announced alongside
              Dragos's January 2024 board appointments, signaling continued investor confidence. Dragos remains
              privately held as of May 2026, with no IPO or M&A transaction announced. The lack of public filings means
              key financial metrics—including revenue, ARR, burn rate, and gross margin—are not independently
              verifiable. Earlier funding rounds established the foundation: DataTribe, a startup studio focused on
              national security technologies in the Baltimore-Washington corridor, was an early backer and co-location
              partner. Canaan Partners participated in earlier institutional rounds. The progression of investors from
              national-security-focused early backers to major strategic industrial conglomerates reflects Dragos's
              evolution from a government-adjacent startup to a commercial enterprise platform.
