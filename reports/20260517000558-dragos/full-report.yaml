  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Dragos Platform 3.0 — Product Portfolio and Module Architecture
        blocks:
          - type: paragraph
            body: >
              Dragos Platform 3.0, launched September 23, 2025, is the company's flagship OT cybersecurity software
              suite. It delivers four integrated capabilities — asset visibility, OT network monitoring and threat
              detection, vulnerability management, and incident response — from a unified interface purpose-built for
              industrial control system (ICS) and operational technology (OT) environments. The platform is sold to
              asset owners across electric, oil and gas, manufacturing, water, transportation, and chemical sectors, and
              is deployed by security teams responsible for protecting SCADA systems, PLCs, HMIs, and the engineering
              workstations that control physical processes.

              The centerpiece of the 3.0 release is the Insights Hub, which consolidates risk-weighted vulnerability,
              asset, and threat alerts into a single prioritized view, replacing the need to manually correlate
              disparate tool outputs. Expert-authored playbooks accompany every alert, so analysts at any experience
              level receive clear guidance on what to investigate and how to respond. Dragos's stated goal is to
              compress mean-time-to-triage by eliminating alert fatigue from uncontextualized notifications.

              Hardware innovation in Platform 3.0 includes the STS-50 sensor — a smaller footprint appliance enabling
              deployment at distributed and remote OT sites that previously lacked the rack space or power budget for
              full-size sensors. Alongside the STS-50, Dragos introduced a combined Sensor/SiteStore form factor for
              smaller environments and expanded Active Collection mode, which uses polling-based queries to extend asset
              discovery to air-gapped and intermittently connected sites where passive-only monitoring would leave
              coverage gaps.

              Beyond the platform software, Dragos offers OT Watch managed services in two tiers. OT Watch provides 24/7
              expert threat hunting and high-confidence alert escalations. OT Watch Complete adds proactive security
              hardening, platform tuning, and expert management of the full detection-to-investigation lifecycle. Both
              tiers are staffed by OT-trained analysts rather than repurposed IT SOC personnel, which Dragos cites as a
              material differentiator from IT security vendors entering the OT space.
            claimRefs:
              - CE001
