      - number: '5.3'
        title: Technology Architecture — OT-Native, Passive-First, Intelligence-Powered
        blocks:
          - type: paragraph
            body: >
              Dragos Platform's core architectural principle is OT-nativeness: it was built for industrial environments
              from the ground up, not adapted from IT security tools. The platform uses passive network monitoring as
              its primary data collection mode, deploying sensors that perform deep packet inspection of network traffic
              using proprietary parsers for 600+ industrial protocols including MODBUS, DNP3, EtherNet/IP, IEC 61850,
              OPC-UA, Profinet, and dozens of vendor- specific protocols. This passive approach requires no agents
              installed on OT devices — a critical design choice because many ICS devices run on proprietary firmware
              that cannot support agent software, and unplanned software changes on PLC or HMI systems can trigger
              safety shutdowns.

              The Dragos Intelligence Fabric sits at the center of the platform's AI and knowledge architecture. It
              integrates adversary tracking data, OT telemetry from customer environments, asset and protocol expertise,
              vulnerability research, and frontline incident response observations into a continuous feedback loop. This
              proprietary dataset, built over nearly a decade of OT incident response and threat hunting, powers both
              the platform's AI-enhanced vulnerability analysis and new natural-language querying capabilities
              introduced in 2025-2026. Analysts can query their OT environment in plain English and receive answers
              grounded in the Intelligence Fabric rather than general-purpose AI models.

              Cloud and integration architecture expanded significantly with the February 2026 Microsoft partnership.
              Beginning Q1 2026, the Dragos Platform supports SaaS deployment on Microsoft Azure in addition to the
              existing on-premises and hybrid models. OT-specific telemetry, threat intelligence, and asset context now
              flow directly into Microsoft Sentinel, enabling unified IT/OT detection, investigation, and response for
              organizations that already operate Sentinel as their SIEM. Customers can procure Dragos through Microsoft
              Marketplace and apply Azure consumption commitments, lowering procurement friction for enterprise buyers.

              AWS integration predates the Microsoft partnership. Dragos achieved the AWS Manufacturing and Industrial
              Competency as the first partner with an OT Security designation in January 2023. Koch Industries deployed
              the platform on AWS and reported previously unachievable visibility into ICS/OT assets as a result.
