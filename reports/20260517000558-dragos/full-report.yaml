      - number: '6.3'
        title: Community Defense Tier — Neighborhood Keeper, OT-CERT, and CDP
        blocks:
          - type: paragraph
            body: >
              Dragos operates three community programs that together serve a large non-commercial customer base and
              create a long-term acquisition funnel for the commercial platform. These programs are operationally
              significant: they provide real OT threat telemetry that improves the Intelligence Fabric for all Dragos
              customers (network effect), establish Dragos's brand in the under-resourced utility segment, and seed
              future commercial relationships as small utilities grow or consolidate.


              Neighborhood Keeper is the foundational collective defense network. Available as a free opt-in to all
              Dragos Platform customers, it uses double anonymization to aggregate and distribute threat indicators at
              machine speed. As of October 2021, 84+ utilities participated in the E-ISAC joint initiative —
              representing more than 70% of electric utility customers in the US — and the ONG-ISAC integrated
              Neighborhood Keeper for the North American oil and natural gas industry. The DNG-ISAC participates for
              downstream natural gas operators. These ISAC partnerships mean that Neighborhood Keeper's collective
              visibility extends to entire industry sectors, not just Dragos platform customers.


              OT-CERT (OT Cyber Emergency Readiness Team) is Dragos's free community for under-resourced ICS/OT
              operators, providing how-to guides, tabletop exercise templates, vulnerability disclosures, and
              interactive working sessions. As of March 2025, OT-CERT has over 2,400 members in 64 countries. OT-CERT
              functions as a brand engagement layer for organizations that cannot afford commercial Dragos products but
              benefit from the company's threat intelligence and practitioner community.


              The Community Defense Program (CDP) provides perpetually free access to the Dragos Platform software,
              Neighborhood Keeper, and OT-CERT membership to qualifying US (since December 2023) and Canada-based (since
              March 2025) water, electric, and natural gas utilities with under $100M USD (~$140M CAD) in annual
              revenue. The CDP is enabled by an Elastic partnership providing Elasticsearch at no charge to support
              platform deployments at scale. Canadian channel partner VARS Corporation (Montreal) is delivering the CDP
              to qualifying utilities in that country. CDP customers do not generate platform revenue but contribute
              threat telemetry and represent potential future paid customers.
