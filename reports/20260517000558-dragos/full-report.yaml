      - number: '6.6'
        title: Retention Durability, Adverse Signals, and Concentration Risks
        blocks:
          - type: paragraph
            body: >
              Dragos is a private company and does not disclose customer count, ARR, NRR, GRR, or cohort retention
              metrics. The only publicly disclosed growth metric is "over 100% year-over-year growth in platform
              recurring revenue for the period ending September 30, 2021" — now over four years old. Without more recent
              or disclosed metrics, retention and growth trajectory must be inferred from structural factors and
              qualitative evidence.


              Structural factors supporting high retention: OT security platform deployment requires significant
              engineering effort — sensor placement, protocol tuning, network integration, and team training — creating
              substantial switching costs. OT environments change slowly relative to IT environments, and once a
              platform is validated in a complex ICS environment, operators are reluctant to disrupt it. Multi-year
              contracts are standard for OT security given the deployment complexity and operational continuity
              requirements. Gartner Peer Insights reviews from OT practitioners consistently report high satisfaction
              with Dragos's threat intelligence depth and OT expertise.


              Adverse signals: In June 2023, Dragos laid off approximately 9% of its workforce following a failed
              fundraising attempt. The company had sought additional capital but did not achieve its target on favorable
              terms, suggesting that the 2021 valuation and growth assumptions did not hold through 2022-2023 market
              conditions. This does not definitively indicate customer churn, but it suggests that platform revenue
              growth slowed from the >100% rate reported in 2021 to a rate insufficient to support the company's burn
              rate and hiring plan without additional capital.


              Long OT sales cycles (typically 6-18 months due to engineering reviews, operational risk assessments, and
              multi-stakeholder approval) create revenue predictability but also extend the pipeline-to-revenue lag.
              Budget competition from IT security priorities, which consume the majority of most organizations' security
              budgets, is a persistent headwind: many OT asset owners lack dedicated OT security budget lines and must
              fund Dragos from IT budgets that IT teams would prefer to spend on IT-native tools.


              Concentration risk is difficult to assess given the absence of disclosed customer count or revenue
              distribution data. Named customer proof is concentrated in the energy/utilities sector and a small set of
              large industrial conglomerates with investor relationships. Customer proof across water utilities,
              pharmaceuticals, transportation, and food & beverage is limited to webpage references without published
              outcomes.
            claimRefs:
              - CU031
              - CU032
              - CU033
              - CU034
              - CU035
              - CU036
