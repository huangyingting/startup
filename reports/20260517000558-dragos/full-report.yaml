      - number: '6.5'
        title: Channel Partners, ISAC Ecosystems, and Investor-Customer Overlap
        blocks:
          - type: paragraph
            body: >
              Dragos's 100+ channel partners — including Booz Allen Hamilton, Optiv, CyberCX, 1898 & Co., and ABS Group
              — extend sales and delivery reach for OT security assessments, platform deployment, and managed services
              in regions and sectors where Dragos's direct team is limited. The Dragos Global Partner Program (launched
              June 2023) is the only OT channel program spanning technology, threat intelligence, professional services,
              and training under a single structure, and it earned a 5-Star CRN Partner Program rating in 2024.


              ISAC partnerships create sector-wide channel relationships. The E-ISAC (electric), ONG-ISAC (oil and gas),
              and DNG-ISAC (downstream natural gas) collectively cover the largest OT buyer segments in North America.
              These partnerships make Neighborhood Keeper the de facto collective defense layer for US critical
              infrastructure ISACs, positioning Dragos as an embedded industry infrastructure layer rather than a
              transactional vendor.


              The Dragos-Axio OT cyber risk quantification partnership (announced 2024) expands the buyer contact from
              OT security teams to CFOs and risk committees, who can now quantify potential OT cyber losses in financial
              terms. The February 2026 Microsoft Azure marketplace integration enables enterprise buyers to procure
              Dragos through existing Microsoft EA agreements, lowering procurement friction significantly for the
              enterprise segment that is already Microsoft-aligned.


              Investor-customer overlap (Koch Disruptive Technologies, National Grid Partners, Emerson, Rockwell
              Automation, HPE, Schweitzer Engineering) creates a unique reference base but introduces a diligence
              ambiguity: are these deployments driven by commercial merit or investment alignment? The quality of
              individual testimonials (named CISOs, specific operational outcomes) suggests genuine commercial adoption,
