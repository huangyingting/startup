      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              OT cybersecurity procurement is driven by sector-specific regulatory requirements, threat exposure, and
              operational risk tolerance rather than by generic enterprise IT buying patterns. Electric utilities
              represent Dragos's deepest-penetrated segment: NERC CIP compliance is mandatory for bulk electric system
              assets, creating a regulatory forcing function for OT security investment. Dragos's Neighborhood Keeper
              program had been adopted by 84 utilities representing more than 70% of U.S. electric utility customers
              through the E-ISAC partnership at the time of the Series D—a remarkable penetration metric in a market
              that is itself highly concentrated. The TSA Pipeline Security Directives (for oil and gas pipeline
              operators) and API RP 780 cybersecurity guidelines drive OT security investment in the midstream segment;
              upstream exploration and downstream refining have historically lower regulatory pressure but elevated
              nation-state targeting risk.


              Manufacturing customers (discrete, process, and hybrid) represent a large segment by organization count
              with more heterogeneous regulatory pressure—ISA/IEC 62443 is the primary standard but adoption is
              voluntary. Water and wastewater utilities are mandated by AWIA 2018 to conduct cybersecurity risk
              assessments every five years and develop emergency response plans, but budget capacity is highly limited
              in smaller systems serving fewer than 10,000 customers. Dragos addresses this through the Community
              Defense Program (free OT security resources for under-resourced organizations) and OT-CERT, allowing
              community presence without commercial monetization. Mining, pharmaceutical, food and beverage, and
              transportation (maritime, rail) represent emerging segments with growing OT security awareness but less
              mature procurement.


              The primary buyer persona is the OT Security Engineer or CISO at a large utility or industrial enterprise,
              with budget authority resting at the VP of Operations or VP of Engineering level in operational contexts
              and at the CISO or CTO in security-forward organizations. The user persona is typically a small OT
              security team (2–10 analysts) at a large operator, or a managed security service provider (MSSP) operating
              on behalf of multiple smaller operators. Enterprise deal size is estimated at $100K–$500K+ annually
              depending on asset count, with multi-year contracts common in the utility sector.
