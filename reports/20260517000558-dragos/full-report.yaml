  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Business Model
        blocks:
          - type: paragraph
            body: >
              Dragos operates a multi-component revenue model anchored by platform subscription software, with threat
              intelligence and professional services as significant adjacent revenue streams. The platform subscription
              revenue (recurring ARR) is the primary value driver for investors: at the Series D, Dragos reported >100%
              year-over-year platform recurring revenue growth for the fiscal year ending September 30, 2021. This
              figure is the only verified revenue growth metric available. The platform is priced per device or per node
              (ICS asset) under annual subscription contracts that include software license, content updates (behavioral
              analytics), and cloud-based threat intelligence integration for subscribed customers.


              Threat Intelligence subscriptions are sold separately or bundled with platform licenses, covering Dragos's
              proprietary adversary group reporting (Activity Group reports, Year in Review), Watch Notifications for
              early warning of adversary campaigns targeting specific sectors, and access to the Threat Intelligence
              Management portal. This intelligence product has no direct competitor equivalent—no other OT security
              vendor maintains a comparable named-group taxonomy— creating pricing power separate from platform
              competition.


              Professional Services revenues encompass: (1) incident response retainers (annual retainer contracts,
              on-call IR for OT environments); (2) OT/ICS security assessments (architecture review, vulnerability
              assessment, NERC CIP compliance gap assessments); (3) workforce development and ICS training (Dragos
              Academy partnerships); and (4) managed OT security services through MSSP channel partners (managed
              detection, managed IR). Professional services revenues are likely episodic rather than fully recurring,
              subject to the lumpy nature of IR engagements and assessment project timing.


              The Community tier—OT-CERT (free ICS/OT security resources), Community Defense Program (free tools and
              threat intelligence for under-resourced critical infrastructure operators), and Neighborhood Keeper (free
              community threat-sharing for eligible electric utilities via NERC E-ISAC)—generates no direct revenue but
              creates pipeline for commercial platform adoption among operators who mature their security programs, and
              builds brand credibility with government and regulatory stakeholders. The AWIA-mandated water utility
              assessments, CISA community engagement, and NERC E-ISAC partnership all flow through this community tier.


              Revenue geography: North America (primarily United States) is the core market. International expansion is
              evidenced by the UAE OT Cybersecurity Center of Excellence, the Macnica Japan partnership, the Singapore
              Digital and Intelligence Service MOU, and the 16-country European operator forum—suggesting meaningful
              international revenue growth investment, though no international revenue breakout is publicly available.
