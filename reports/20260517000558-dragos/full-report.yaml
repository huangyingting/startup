        - Legacy OT environments lack central asset registries; IT tools cannot parse OT protocols
        - Passive network discovery with 600+ protocol parsers + Active Collection for air-gapped sites
        - Complete OT/IT/IoT inventory without agent installation or production downtime
        - Accuracy depends on sensor placement; some proprietary vendor protocols may require custom parsers
      - - Detect OT-specific threats before they cause operational disruption
        - Alert fatigue from IT SIEM tools not tuned for ICS; analysts lack OT context to triage
        - Behavioral analytics, configuration monitoring, and Knowledge Pack detections tuned for ICS TTPs
        - Organizations with OT visibility contained OT ransomware in avg. 5 days vs. industry avg. 42 days
        - >-
          No independent third-party benchmark of detection precision/recall rates published; dwell time comparison is
          self-reported
      - - Prioritize and remediate vulnerabilities without risking production uptime
        - Thousands of CVEs with no OT context; CVSS scores don't reflect operational or safety risk
        - Now/Next/Never framework with OT-corrected CVSS; expert-developed OT-safe remediation alternatives
        - Only ~2-6% of CVEs flagged as immediate action, dramatically reducing analyst noise
        - Coverage depends on Dragos analyst capacity; newly disclosed ICS CVEs may lag NVD by days to weeks
      - - Respond to OT cyber incidents with OT-specific expertise
        - No OT-specific IR playbooks; IT IR teams lack ICS process knowledge for safe recovery
        - Rapid Response Retainer with OT-expert responders; pre-cleared contracts; tabletop exercises
        - Pre-cleared retainer reduces mobilization time; OT forensics preserve evidence without disrupting processes
        - >-
