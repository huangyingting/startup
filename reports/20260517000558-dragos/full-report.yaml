      - number: '2.2'
        title: TAM, SAM, and SOM Sizing
        blocks:
          - type: paragraph
            body: >
              Market sizing for OT/ICS cybersecurity varies by analyst scope definition, creating a range of estimates
              that must be triangulated rather than accepted at face value. MarketsandMarkets projects the global OT
              security market at $23.5B in 2025, growing to $50.3B by 2030 at a 16.5% CAGR—the most-cited figure in
              Dragos's own market positioning materials and cited in the Microsoft-Dragos partnership announcement of
              February 2026. This estimate likely encompasses the broadest definition including network security
              hardware, services, and cloud OT security adjacencies. Gartner's CPS (Cyber-Physical Systems) Protection
              Platforms market is a narrower analyst lens focused specifically on the platform software category where
              Dragos, Claroty, and Nozomi Networks compete—this market is substantially smaller in dollar terms but is
              the relevant benchmark for platform valuation multiples. Frost and Sullivan's FrostRadar: OT Cybersecurity
              Solutions 2025 ranked Dragos #1 in Innovation among OT security vendors, providing qualitative market
              leadership validation.


              The 2025 OT Security Financial Risk Report (jointly produced by Dragos and Marsh McLennan's Cyber Risk
              Intelligence Center) provides an important demand-side sizing lens: worst-case global OT cyber losses are
              estimated at $329.5B annually, with $172.4B from business interruption alone. This financial risk
              magnitude—more than 14× the $23.5B platform market—indicates that the OT security market is dramatically
              under-capitalized relative to the financial exposure it protects against, suggesting substantial long-term
              growth runway. The SANS 2025 ICS/OT Cybersecurity survey identifies the top three SANS Five Critical
              Controls by adoption: Incident Response Planning (18.5%), Defensible Architecture (17.09%), and ICS
              Network Visibility (16.47%)—all core capabilities in the Dragos Platform, indicating product-market
              alignment with practitioner priorities.


              A serviceable addressable market (SAM) for OT platform software and services is estimated at $7–10B
              globally in 2025 after excluding security hardware, OEM-bundled tools, and IT-only security spend from the
              broader MarketsandMarkets total. Dragos's serviceable obtainable market (SOM) cannot be precisely
              quantified without disclosed revenue, but at the $1.7B Series D valuation (October 2021) and typical
              growth-stage SaaS multiples of 10–15× ARR, Dragos's ARR at the time of fundraising was implicitly
              approximately $113–170M. If that growth has continued at even 30% annually, current ARR (unverified) could
              be in the $200–350M range—representing roughly 2–5% of the estimated $7–10B SAM and indicating substantial
              headroom.
