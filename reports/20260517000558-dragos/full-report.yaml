      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The primary demand driver for OT cybersecurity is escalating threat activity. Dragos's 2026 OT/ICS
              Cybersecurity Year in Review tracked 119 active ransomware groups affecting industrial organizations in
              2025, a 49% increase from the prior year, with 3,300 industrial organizations impacted globally.
              Nation-state-linked threat groups represent the most sophisticated demand driver: Dragos tracks 26 named
              OT adversary groups—including VOLTZITE (China-nexus, targeting electric and telecommunications
              infrastructure), CHERNOVITE (created PIPEDREAM/INCONTROLLER malware capable of attacking multiple
              industrial safety systems), and ELECTRUM (Ukraine grid attacks)—with 11 groups assessed as actively
              targeting operational technology environments in 2025. This threat landscape is materially different from
              IT-domain threats and creates strong demand for ICS-specific detection and threat intelligence.


              Regulatory tailwinds are accelerating adoption across multiple sectors. CISA's Cross-Sector Cybersecurity
              Performance Goals provide a voluntary but increasingly cited framework for critical infrastructure
              protection. NERC CIP-015-2 Internal Network Security Monitoring (INSM) requirements specifically mandate
              network visibility and monitoring capabilities for bulk electric system assets that are core to the Dragos
              Platform. The Transportation Security Administration (TSA) Pipeline Security Directives require pipeline
              operators to implement OT security programs. The EU's NIS2 Directive creates compliance urgency across
              European critical infrastructure operators. AWIA 2018 mandates water utility cybersecurity assessments.
              This multi-sector, multi-jurisdiction regulatory accumulation is a structural demand driver that reduces
              the sales cycle by converting discretionary OT security spending into compliance-required procurement.


              Digital transformation of OT environments—Industry 4.0 connectivity, IIoT sensor deployment, cloud
              historian integration, remote access expansion—continuously expands the OT attack surface and creates new
              monitoring requirements that incumbents cannot address without purpose-built OT tooling. This structural
              driver benefits Dragos disproportionately because the new connectivity patterns require ICS-specific
              behavioral baselines.


              Adoption constraints are material. OT security budget immaturity remains the largest constraint: many
              industrial organizations are still in early stages of OT security awareness, and OT security budgets
              compete with capital infrastructure projects for the same operational budget. The IT/OT skills gap—very
              few practitioners understand both OT environments and cybersecurity—limits self-service adoption and makes
              Dragos's professional services component critical for initial deployments. Brownfield OT environments with
              legacy PLCs, proprietary protocols, and no change management tolerance make deployment complex and
              time-consuming. Enterprise sales cycles of 12–24 months at large utility and energy companies limit
              revenue velocity. Smaller operators (water utilities, rural electric co-operatives) often have annual
              cybersecurity budgets below $50K—too small for commercial Dragos Platform deployment—limiting the
              commercial TAM.
