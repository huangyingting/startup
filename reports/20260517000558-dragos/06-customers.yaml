company:
  name: "Dragos, Inc."
chapter:
  number: 6
  title: "Customers"
  summary: >
    Dragos serves OT/ICS security buyers across nine named industrial verticals — electric, oil & gas, manufacturing,
    water, chemical, pharmaceutical, food & beverage, transportation, and mining — with a direct-plus-channel
    go-to-market model spanning North America, Europe, the Middle East, and APAC. Named customers with public
    proof include Georgia-Pacific (160+ locations), Koch Industries (500+ global facilities, AWS deployment),
    National Grid plc (investor+customer since 2018), Rockwell Automation (investor+customer), and Boston Beer
    Company. Community tier engagement is substantial: 84+ utilities participate in the E-ISAC Neighborhood Keeper
    initiative (>70% of US electric utility customers), and OT-CERT has 2,400+ members in 64 countries. The
    Community Defense Program (CDP) provides free access to qualifying small utilities in the US (since December
    2023) and Canada (since March 2025). Key diligence gaps: no public customer count, ARR, NRR, or churn data
    (private company); named proof concentrated in energy and large industrials; investor-customer overlap makes it
    difficult to isolate commercial merit from strategic investment obligations.

sections:
  - id: customer-segments
    title: "Customer Base and Industrial Vertical Segmentation"
    body: >
      Dragos serves industrial asset owners and operators in nine publicly confirmed verticals: electric utilities,
      oil & gas, manufacturing, water and wastewater, chemical, pharmaceutical, food & beverage, transportation,
      and mining. Buyer personas cluster into three segments. The enterprise commercial tier consists of large
      industrial organizations with dedicated OT security budgets (e.g., national utilities, global manufacturers,
      Fortune 500 energy companies) that purchase the full Dragos Platform plus WorldView intelligence and
      professional services. The mid-market and specialist tier includes mid-size industrials and public-sector
      operators who procure through channel partners, managed service providers, or national cybersecurity programs.
      The community tier — comprising Community Defense Program (CDP) members, OT-CERT members, and Neighborhood
      Keeper participants — receives free or heavily subsidized access as part of Dragos's collective defense
      mission.


      The electric sector is Dragos's most publicly documented vertical. The company holds a joint collective
      defense initiative with the North American Electric Reliability Corporation's E-ISAC covering 84+ utilities
      representing more than 70% of US electric utility customers. Oil & gas buyers benefit from the ONG-ISAC
      Neighborhood Keeper partnership, extending sector-wide threat visibility to all member companies in the North
      American petroleum sector. Manufacturing is also confirmed: Koch Industries' Georgia-Pacific subsidiary
      (160+ locations) and Boston Beer Company are named production customers. Water sector coverage is addressed
      through the CDP, which prioritizes under-resourced water utilities that cannot afford commercial pricing.


      Geographic coverage spans North America (primary), the United Kingdom (25 FTEs by July 2023), continental
      Europe (16-country engagement at the inaugural European Forum), the UAE (OT Cybersecurity Centre of
      Excellence established March 2026), Japan (Country Manager appointed April 2026), and Australia/New Zealand.
      The Middle East (GCC, Saudi Arabia) is covered through direct engagement referenced in the Series D funding
      announcement. Channel partners — 100+ firms including Booz Allen Hamilton, Optiv, and CyberCX — extend reach
      beyond direct Dragos headcount in all regions.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: named-customers
    title: "Named Customer Proof — Enterprise Deployments and Public Testimonials"
    body: >
      Dragos's most substantive named customer evidence comes from the October 2021 Series D funding announcement,
      which included direct testimonials from four customers who are also strategic investors: Georgia-Pacific,
      Koch Industries, Rockwell Automation, and National Grid. This investor-customer overlap provides corroborated
      deployment proof but requires careful interpretation — the commercial relationship may be influenced by the
      investment relationship.


      Georgia-Pacific LLC, a Koch Industries subsidiary with 160+ global locations and brands including Dixie,
      Angel Soft, and Brawny, deployed the Dragos Platform for OT visibility, threat detection, and incident
      response across its manufacturing and chemical operations. CISO Francis Cioffi stated the platform provides
      "visibility, detection, and response capabilities we need to secure our operations and protect the business."
      This is a high-quality reference: a named CISO from a large, identifiable company with a specific operational
      outcome statement.


      Koch Industries deployed the Dragos Platform on AWS at its 500+ global manufacturing and processing
      facilities, achieving "previously unachievable visibility into ICS/OT assets," per the AWS Industrial
      Competency announcement. Byron Knight, Managing Director and COO of Koch Disruptive Technologies (the
      investment arm), stated that Koch has "quickly proven to be a key partner" and that the platform "plays a key
      part in managing risk across our enterprise." Koch's repeated investment in Dragos (multiple rounds) further
      corroborates sustained platform adoption.


      National Grid plc — one of the world's largest investor-owned utilities — invested in Dragos in 2018
      following its initial subscription to Dragos's OT threat intelligence service. CTIO Lisa Lambert confirmed
      that Dragos's "visibility into ICS threats brought value for both our UK and US businesses" as of the 2021
      UK expansion announcement. This provides multi-year deployment proof with a named executive at a critical
      infrastructure operator.


      Rockwell Automation, a leading industrial automation vendor, invested in Dragos as a strategic partner and
      customer. VP and GM of Global Services Rachael Conrad confirmed that "Dragos's industrial cybersecurity
      platform helps our customers protect their operational environments and maximize the value of their digital
      transformation." Boston Beer Company is listed as a named manufacturing customer on Dragos's industry page
      without a published case study or executive quote; this is logo-level proof.
    claimRefs: [CU008, CU009, CU010, CU011, CU012, CU013, CU014]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: community-customers
    title: "Community Defense Tier — Neighborhood Keeper, OT-CERT, and CDP"
    body: >
      Dragos operates three community programs that together serve a large non-commercial customer base and create
      a long-term acquisition funnel for the commercial platform. These programs are operationally significant:
      they provide real OT threat telemetry that improves the Intelligence Fabric for all Dragos customers (network
      effect), establish Dragos's brand in the under-resourced utility segment, and seed future commercial
      relationships as small utilities grow or consolidate.


      Neighborhood Keeper is the foundational collective defense network. Available as a free opt-in to all Dragos
      Platform customers, it uses double anonymization to aggregate and distribute threat indicators at machine
      speed. As of October 2021, 84+ utilities participated in the E-ISAC joint initiative — representing more
      than 70% of electric utility customers in the US — and the ONG-ISAC integrated Neighborhood Keeper for the
      North American oil and natural gas industry. The DNG-ISAC participates for downstream natural gas operators.
      These ISAC partnerships mean that Neighborhood Keeper's collective visibility extends to entire industry
      sectors, not just Dragos platform customers.


      OT-CERT (OT Cyber Emergency Readiness Team) is Dragos's free community for under-resourced ICS/OT operators,
      providing how-to guides, tabletop exercise templates, vulnerability disclosures, and interactive working
      sessions. As of March 2025, OT-CERT has over 2,400 members in 64 countries. OT-CERT functions as a brand
      engagement layer for organizations that cannot afford commercial Dragos products but benefit from the
      company's threat intelligence and practitioner community.


      The Community Defense Program (CDP) provides perpetually free access to the Dragos Platform software,
      Neighborhood Keeper, and OT-CERT membership to qualifying US (since December 2023) and Canada-based (since
      March 2025) water, electric, and natural gas utilities with under $100M USD (~$140M CAD) in annual revenue.
      The CDP is enabled by an Elastic partnership providing Elasticsearch at no charge to support platform
      deployments at scale. Canadian channel partner VARS Corporation (Montreal) is delivering the CDP to qualifying
      utilities in that country. CDP customers do not generate platform revenue but contribute threat telemetry and
      represent potential future paid customers.
    claimRefs: [CU015, CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: geographic-expansion
    title: "Geographic Customer Presence and International Expansion"
    body: >
      Dragos's geographic expansion strategy follows a hub-and-spoke model: establish direct presence in high-value
      markets, partner for coverage in adjacent markets, and leverage community programs to seed brand awareness
      ahead of direct commercial sales.


      North America remains the primary commercial market. The UK office, established October 2021, had grown to
      25 full-time employees across Europe by July 2023, led by AVP Tony Atkins (UK/Europe), Chief of Staff Phil
      Tonkin (23 years in energy sector), IR Director Kai Thomsen (ex-Audi, steel industry), and Technical Director
      Magpie Graham (ex-Microsoft intelligence). The inaugural Dragos European Forum in London (June 2022) drew
      approximately 150 OT asset owners and operators from 16 countries — confirming practitioner demand in the
      region but reflecting an early community stage rather than a mature commercial footprint.


      The UAE OT Cybersecurity Centre of Excellence (CoE), established in partnership with the UAE Cyber Security
      Council under the "Make it in Emirates" forum (announced March 2026), gives Dragos a physical presence in the
      GCC region. The CoE provides real-world OT attack and defense scenarios for practitioners, serving as both a
      training venue and a customer acquisition asset for regional critical infrastructure operators in energy,
      petrochemicals, and utilities.


      Japan expansion accelerated in April 2026 with the appointment of Kaori Nieda as Dragos's first Japan Country
      Manager, building on the existing Macnica distribution partnership (which covers Japan's critical
      infrastructure and manufacturing sectors). Dragos also maintains commercial presence in Australia and New
      Zealand, referenced in the Series D announcement and organizational materials.


      Key geographic diligence gaps: Dragos does not publicly disclose revenue or customer count by region.
      European operations are 25+ employees by 2023 but the commercial customer base size is undisclosed. The
      Middle East presence is referenced in the Series D announcement but no specific customer names or commercial
      metrics are public.
    claimRefs: [CU021, CU022, CU023, CU024, CU025]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: channel-and-isac-reach
    title: "Channel Partners, ISAC Ecosystems, and Investor-Customer Overlap"
    body: >
      Dragos's 100+ channel partners — including Booz Allen Hamilton, Optiv, CyberCX, 1898 & Co., and ABS Group
      — extend sales and delivery reach for OT security assessments, platform deployment, and managed services
      in regions and sectors where Dragos's direct team is limited. The Dragos Global Partner Program (launched
      June 2023) is the only OT channel program spanning technology, threat intelligence, professional services,
      and training under a single structure, and it earned a 5-Star CRN Partner Program rating in 2024.


      ISAC partnerships create sector-wide channel relationships. The E-ISAC (electric), ONG-ISAC (oil and gas),
      and DNG-ISAC (downstream natural gas) collectively cover the largest OT buyer segments in North America.
      These partnerships make Neighborhood Keeper the de facto collective defense layer for US critical
      infrastructure ISACs, positioning Dragos as an embedded industry infrastructure layer rather than a
      transactional vendor.


      The Dragos-Axio OT cyber risk quantification partnership (announced 2024) expands the buyer contact from
      OT security teams to CFOs and risk committees, who can now quantify potential OT cyber losses in financial
      terms. The February 2026 Microsoft Azure marketplace integration enables enterprise buyers to procure Dragos
      through existing Microsoft EA agreements, lowering procurement friction significantly for the enterprise
      segment that is already Microsoft-aligned.


      Investor-customer overlap (Koch Disruptive Technologies, National Grid Partners, Emerson, Rockwell
      Automation, HPE, Schweitzer Engineering) creates a unique reference base but introduces a diligence
      ambiguity: are these deployments driven by commercial merit or investment alignment? The quality of
      individual testimonials (named CISOs, specific operational outcomes) suggests genuine commercial adoption,
      but independent corroboration from non-investor customers would strengthen the evidence.
    claimRefs: [CU026, CU027, CU028, CU029, CU030]
    tableRefs: [TU005]
    figureRefs: []

  - id: retention-and-concentration-risks
    title: "Retention Durability, Adverse Signals, and Concentration Risks"
    body: >
      Dragos is a private company and does not disclose customer count, ARR, NRR, GRR, or cohort retention
      metrics. The only publicly disclosed growth metric is "over 100% year-over-year growth in platform
      recurring revenue for the period ending September 30, 2021" — now over four years old. Without more recent
      or disclosed metrics, retention and growth trajectory must be inferred from structural factors and
      qualitative evidence.


      Structural factors supporting high retention: OT security platform deployment requires significant
      engineering effort — sensor placement, protocol tuning, network integration, and team training — creating
      substantial switching costs. OT environments change slowly relative to IT environments, and once a platform
      is validated in a complex ICS environment, operators are reluctant to disrupt it. Multi-year contracts are
      standard for OT security given the deployment complexity and operational continuity requirements. Gartner
      Peer Insights reviews from OT practitioners consistently report high satisfaction with Dragos's threat
      intelligence depth and OT expertise.


      Adverse signals: In June 2023, Dragos laid off approximately 9% of its workforce following a failed
      fundraising attempt. The company had sought additional capital but did not achieve its target on favorable
      terms, suggesting that the 2021 valuation and growth assumptions did not hold through 2022-2023 market
      conditions. This does not definitively indicate customer churn, but it suggests that platform revenue growth
      slowed from the >100% rate reported in 2021 to a rate insufficient to support the company's burn rate and
      hiring plan without additional capital.


      Long OT sales cycles (typically 6-18 months due to engineering reviews, operational risk assessments, and
      multi-stakeholder approval) create revenue predictability but also extend the pipeline-to-revenue lag. Budget
      competition from IT security priorities, which consume the majority of most organizations' security budgets,
      is a persistent headwind: many OT asset owners lack dedicated OT security budget lines and must fund Dragos
      from IT budgets that IT teams would prefer to spend on IT-native tools.


      Concentration risk is difficult to assess given the absence of disclosed customer count or revenue
      distribution data. Named customer proof is concentrated in the energy/utilities sector and a small set of
      large industrial conglomerates with investor relationships. Customer proof across water utilities,
      pharmaceuticals, transportation, and food & beverage is limited to webpage references without published
      outcomes.
    claimRefs: [CU031, CU032, CU033, CU034, CU035, CU036, CU037, CU038]
    tableRefs: []
    figureRefs: []

