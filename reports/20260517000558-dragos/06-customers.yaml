callouts:
  - calloutType: strength
    title: "Investor-Customer Reference Quality Exceeds Typical Early-Stage Proof"
    claimRefs: [CU008, CU009, CU010, CU011]
    body: >
      Dragos's named customer proof — Georgia-Pacific CISO testimonial, Koch Industries COO deployment statement,
      National Grid CTIO multi-year engagement, and Rockwell Automation VP confirmation — represents higher-
      quality reference evidence than typical early-stage security companies that cite anonymous case studies or
      logo walls. Named CISOs from identifiable large industrials with specific operational context (160+ locations,
      500+ global facilities, UK+US operations) are defensible reference points for prospective buyers and
      investors, even accounting for the investor-customer overlap that introduces a potential conflict of interest.

  - calloutType: risk
    title: "Private Company Opacity Prevents Verification of Customer Growth and Retention"
    claimRefs: [CU031, CU032, CU033, CU034]
    body: >
      Dragos has disclosed no customer count, ARR, NRR, GRR, or churn data, and the only disclosed growth metric
      (>100% YoY, period ending September 30, 2021) is more than four years old. The 2023 layoffs and failed
      fundraising attempt are the only indirect evidence of the growth trajectory after 2021, and they suggest
      significant deceleration. Without primary diligence into customer metrics, retention assumptions for any
      investment thesis are entirely unverifiable. This is not an unusual risk for private companies, but it is
      particularly acute because the valuation (last set at $1.7B in 2021) was established at peak growth and
      market conditions that did not persist.

