figures:
  - id: FU001
    title: "Customer Journey Map"
    type: "journey-map"
    layout: "wide"
    summary: "Six-stage Dragos customer journey from initial OT incident or threat awareness through full platform deployment and community embedding, illustrating the direct sales and community acquisition motions."
    data:
      nodes:
        - id: "awareness"
          label: "Awareness / Trigger"
          detail: "OT incident (ransomware on ICS, nation-state scan detected), regulatory mandate (NERC CIP, CISA advisory), or industry peer reference creates urgency. Often catalyzed by a Dragos threat intelligence report or OT-CERT alert."
        - id: "evaluation"
          label: "Evaluation"
          detail: "Dragos Platform proof-of-concept or architecture review. Competitor evaluation (Claroty, Nozomi, Microsoft Defender for IoT). Gartner Magic Quadrant Leader position cited by procurement teams. Channel partner (e.g., Booz Allen, Optiv) engaged."
        - id: "pilot"
          label: "Pilot / Assessment"
          detail: "OT Cybersecurity Assessment, Architecture Review, or limited platform deployment in one facility or network segment. WorldView threat intelligence trial. 3–9 months typical pilot duration in complex OT environments."
        - id: "deploy"
          label: "Platform Deployment"
          detail: "Sensor placement across OT network segments. Protocol parser tuning for site-specific ICS devices. Integration with SIEM (Sentinel or others). Training of OT security team. AWS or Azure SaaS deployment option available (2023+/2026+)."
        - id: "expand"
          label: "Expand and Integrate"
          detail: "Add WorldView intelligence subscription. Enroll in Neighborhood Keeper. Upgrade to OT Watch or OT Watch Complete managed services. Add Incident Response Retainer. Extend to additional plant sites or geographies. Integrate with Axio for risk quantification."
        - id: "embed"
          label: "Community and Strategic Embed"
          detail: "Participate in ISAC collective defense via Neighborhood Keeper. Reference customer for Dragos sales. CDP sponsorship of smaller utility supply chain partners. Multi-year platform contract renewal. Board-level reporting via Insights Hub risk visibility."
    approximationNotes: "Journey stages are qualitative and derived from Dragos platform documentation, service descriptions, partner program materials, and named customer testimonials. Specific conversion rates between stages are not publicly disclosed by Dragos."
    claimRefs: [CU002, CU027, CU028]

