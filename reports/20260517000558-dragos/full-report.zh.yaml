      - number: '8.2'
        title: 融资背景与估值锚
        blocks:
          - type: paragraph
            body: >
              Dragos 最后一个确认估值锚，是 2021 年 10 月 Series D：从 Koch Disruptive Technologies、BlackRock、National Grid
              Partners、Rockwell Automation 等处融资 00M，投后估值 .7B。截至 2026 年 5 月，之后没有公开披露任何股权融资；对这一阶段的风投支持网络安全公司来说，4.5
              年间隔并不寻常。2023 年 6 月裁员和融资尝试失败，是这段期间唯一披露的财务信号。


              用 OT 网络安全市场收入倍数框架看：2021 年 Series D 时，Dragos 估值约 .7B，披露增长超过 100% YoY，团队 800+ 人。在 2021 年末高增长网络安全 SaaS 常见的
              20-30x ARR 倍数下，该估值隐含 ARR 约 5-85M。面向 30-50% 增长队列的网络安全 SaaS 私募市场倍数，从 2021 年峰值到 2023 年低谷压缩约 40-60%。这种压缩叠加
              2023 年事件暗示的增长放缓，说明 .7B 估值在 2023 年可能已经受到结构性挑战——这与报道中的融资失败一致。


              可比私有 OT 安全交易提供额外锚点：Claroty 于 2021 年 11 月融资 00M，隐含投后估值约 .8-2.2B（与 Dragos 时点相近）。Armis 在 2023 年达到 .3B 估值，但
              Armis 面向更广的 IT/OT 资产管理 TAM，收入模型也不同。Nozomi Networks 仍处于 IPO 前阶段，基于 Series D 可比项估计私有估值为 00M-.2B。Tenable
              Holdings（TENB）在 2019 年收购 Indegy（OT 安全），其包含 OT 能力的综合平台目前按约 5-6x 过去收入交易——说明纯 OT 溢价在与 IT 安全平台整合后会被侵蚀。


              我们的估值区间锚定在估计 ARR 0-100M（无披露）之上，并采用 20-25x 远期 ARR 倍数（监管顺风耐久性和情报护城河支持该倍数，但因倍数压缩和增长放缓风险，较 2021 年峰值折让
              30-40%）。由此得到：基准情景为 ARR 0M、增长 35% 时 .0-2.5B；悲观情景为 ARR 0M、增长 20% 时 .5-1.7B；乐观情景为 ARR 00M、增长 40%+ 时 .5-3.5B。
