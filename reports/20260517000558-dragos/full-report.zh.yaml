        - 新的或厂商专有协议需要持续 R&D 投入；可能存在覆盖缺口
      - - 检测引擎
        - 行为分析 + 威胁指标匹配（IOC）+ 异常检测 + 配置监控；四机制设计
        - Dragos WorldView 威胁情报团队产出；Knowledge Pack
        - 情报团队人员流失或产能受限，可能拖慢新检测覆盖
      - - 情报底座
        - 自有 OT 知识库：对手跟踪、OT 遥测、资产 / 协议专长、IR 数据；积累 10+ 年数据
        - 仅内部使用；未披露该底座本身依赖第三方 AI 模型
        - 数据集质量取决于 Dragos 服务项目量；无法独立审计
      - - AI / 分析师工作流
        - AI 增强漏洞分析；用自然英语查询 OT 环境；Dragos Platform MCP Server 用于企业 AI 集成
        - 基于云的 AI 推理（具体提供商未完全披露）；Microsoft Azure 合作关系
        - 新型 OT 边缘场景存在准确性风险；截至 2026 年，大规模企业采用尚未验证
      - - 云 / SaaS 部署
        - SaaS 运行在 Microsoft Azure 上（Q1 2026）；也支持混合部署和本地部署
        - Microsoft Azure 基础设施
        - SaaS 客户面临 Azure 中断风险；非美国市场有数据主权要求
      - - SIEM 集成
        - Microsoft Sentinel OT 连接器；OT 遥测、威胁情报和资产上下文写入 Sentinel
        - Microsoft Sentinel API 和 schema 版本
        - 集成质量取决于 Sentinel API 稳定性；非 Sentinel SIEM 集成功能较少
      - - Knowledge Pack 分发
        - 通过 Neighborhood Keeper 网络每周自动更新；包括新 CVE、检测和处置手册
        - 互联网连接；Neighborhood Keeper 网络可用性
        - 隔离站点必须手动应用 Knowledge Pack；隔离环境存在更新滞后风险
    notes: 架构来自 Dragos Platform 3.0 新闻稿、Microsoft 合作公告、AI for OT security 页面和 Gartner 同行评论。Dragos 未发布详细技术架构规格。
