      - number: '3.4'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Dragos 的竞争护城河具备耐久性，但在两条战线上承受越来越大的结构性压力：IT 安全巨头的平台捆绑，以及 Claroty 向相邻垂直行业扩张。


              Microsoft 竞争威胁在战略上最重要。February 2026 的 Microsoft-Dragos 合作，把 Dragos 威胁情报集成进 Microsoft Sentinel，并把 Dragos
              Platform 接入 Azure Marketplace；这代表 Dragos 押注竞合（Dragos 作为 Microsoft 栈内的 OT 深度层）优于与 Microsoft 捆绑 OT
              监控正面竞争。面对捆绑威胁，这一战略回应是合理的，但也会削弱 Dragos 面向 Microsoft 企业客户的定价权，因为客户可能会期待 Dragos 为 Azure Marketplace 交付让价。


              Claroty 的垂直扩张是范围风险，而不是直接 OT 威胁。Claroty 进入医疗（医疗设备安全）和商业楼宇后，覆盖更广的网络物理系统 TAM。如果医院系统 CISO 先为医疗采用
              xDome/Medigate，并默认把 Claroty 延伸到其工业 OT 环境，Dragos 会失去这些账户的主要 OT 安全评估机会。这种交叉销售风险在制药制造（同时有 OT
              和医疗设备环境）以及拥有公用事业厂房运营的一体化医疗系统等垂直行业真实存在。


              Dragos 的 ICS 威胁情报库是行业内最全面的公开 OT 对手分类体系，覆盖 26
              个具名组织。它来自多年活跃事件响应项目，无法购买，也难以逆向工程，因此形成复制壁垒。竞争者可以建设威胁研究能力（Claroty 的 Team82、Nozomi
              的研究团队），但如果没有同样的事件响应足迹，就无法追溯性匹配 Dragos 在 OT 专属对手 TTP
              上的深度。创始团队的政府背景（NSA、ICS-CERT）进一步强化了美国政府和国防关键基础设施买家对其情报可信度的认可。


              AWS Manufacturing and Industrial Competency 认定（Dragos 首个获得）以及 AWS-Dragos 伙伴关系，形成一条云原生部署路径，把平台可触达基础扩展到在 AWS
              基础设施上部署 OT 系统的组织。与 CrowdStrike（Falcon 集成）和 Palo Alto Networks 的类似关系扩大了生态足迹，也降低这些厂商在现有客户处替代 Dragos 的风险。


              按评估严重性排序的竞争风险包括：（1）Microsoft 捆绑 OT 监控带来的价格替代；（2）Claroty 以医疗为入口向账户 OT 扩张；（3）Nozomi 在 PE 支持下整合 M&A；（4）基础 OT
              资产可视性作为更广 IT 安全平台功能而商品化；（5）OT 合格从业者人才竞争限制 Dragos 的事件响应服务规模。
