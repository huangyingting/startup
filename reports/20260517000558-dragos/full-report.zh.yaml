chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与市场定位
        blocks:
          - type: paragraph
            body: >-
              Dragos, Inc. 是一家私营网络安全公司，总部位于 Hanover, Maryland（Washington, DC 区域）。
              公司的使命很聚焦：守住日常社会依赖的工业基础设施，防止攻击者扰乱文明运行。Dragos 由一批长期在政府和军方网络行动一线工作的从业者于 2016
              年创办，已经做成运营技术（OT）和工业控制系统（ICS）网络安全领域最被认可的专用平台。Dragos Platform 为工业组织提供资产可视性、OT 网络监控、漏洞管理、威胁检测和事件响应能力；这些能力由
              Dragos Intelligence Fabric 驱动，把十多年 OT 专属威胁情报直接嵌入软件。Dragos 的客户覆盖全球电力公用事业、油气、制造、水务、交通、采矿、制药、食品饮料和政府部门。March
              2026，Gartner 连续第二年将 Dragos 评为 2026 Magic Quadrant for CPS Protection Platforms 的
              Leader，并认可其执行能力和愿景完整性。Dragos 还在 Frost & Sullivan 的 FrostRadar: OT Cybersecurity Solutions, 2025 中拿到 #1
              Innovation 排名，并连续第五年进入 Deloitte Technology Fast 500。Dragos 所处的 OT 安全市场规模大且增长快：MarketsandMarkets 预计全球 OT
              安全市场将从 2025 年的 $23.5 billion 扩大到 2030 年的 $50.3 billion，复合年增长率 16.5%。主要竞争者包括
              Claroty——其重点是工业、医疗和商业环境中的网络物理系统——以及 Nozomi Networks，后者强调以 AI 驱动的威胁检测来覆盖 OT 和 IoT 安全。Dragos 的差异化来自 OT
              威胁情报深度、从业者基因，以及威胁组织研究的广度；截至 2026 OT/ICS Cybersecurity Year in Review，公司在全球跟踪 26 个具名 OT 威胁组织。
