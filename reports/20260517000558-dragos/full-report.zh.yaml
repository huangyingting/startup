  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流与商业模式
        blocks:
          - type: paragraph
            body: >
              Dragos 的收入模型由多组件构成，核心是平台订阅软件，威胁情报和专业服务是重要的相邻收入流。投资人看重的主要价值驱动，是平台订阅收入（经常性 ARR）：Series D 时，Dragos 披露截至 2021
              年 9 月 30 日的财年平台经常性收入同比增长 >100%。这是唯一经过验证的收入增长指标。平台按设备或节点（ICS
              资产）计价，采用年度订阅合同，面向订阅客户提供软件许可、内容更新（行为分析）和基于云的威胁情报集成。

              威胁情报订阅可单独销售，也可与平台许可打包，覆盖 Dragos 自有的攻击者组织报告（Activity Group reports、Year in Review）、面向特定行业攻击活动的早期预警 Watch
              Notifications，以及 Threat Intelligence Management 门户访问。该情报产品没有直接对标竞品——没有其他 OT
              安全厂商维护同等的命名组织分类体系——因此形成了独立于平台竞争的定价权。

              专业服务收入包括：（1）事件响应预留服务（年度预留合同、面向 OT 环境的值守 IR）；（2）OT/ICS 安全评估（架构审查、漏洞评估、NERC CIP 合规差距评估）；（3）人才培养和 ICS
              培训（Dragos Academy 合作）；（4）通过 MSSP 渠道合作伙伴交付的托管 OT 安全服务（托管检测、托管 IR）。专业服务收入更可能是项目性而非完全经常性，会受 IR
              项目和评估项目节奏不均的影响。

              社区层级——OT-CERT（免费 ICS/OT 安全资源）、Community Defense Program（面向资源不足关键基础设施运营方的免费工具和威胁情报），以及 Neighborhood
              Keeper（通过 NERC E-ISAC
              向符合条件的电力公用事业提供的免费社区威胁共享）——不产生直接收入，但能为商业平台采用沉淀销售线索：运营方安全项目成熟后，可能转向付费平台；同时也在政府和监管相关方中建立品牌可信度。AWIA
              要求的水务公用事业评估、CISA 社区参与和 NERC E-ISAC 伙伴关系，都通过这个社区层级承接。

              收入地域：北美（主要是美国）是核心市场。UAE OT Cybersecurity Center of Excellence、Macnica 日本合作、Singapore Digital and
              Intelligence Service MOU，以及覆盖 16 国的欧洲运营方论坛，都显示公司正在投入国际收入增长；但国际收入拆分没有公开披露。
