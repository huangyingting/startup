      - number: '1.5'
        title: 风险与反向因素
        blocks:
          - type: paragraph
            body: >-
              Dragos 面临数项需要尽调认真评估的重大风险。第一，2023 年裁员：June 2023，网络安全市场降温、OT 行业企业预算增长慢于预期，Dragos 裁掉约 9% 员工。SiliconAngle 和
              Axios 报道了这次裁员，Robert M. Lee 也承认该决定艰难。这一反向事件说明 Dragos 并不能免疫宏观逆风，也提出了收入可预测性和预算周期脆弱性问题。第二，作为私营公司，Dragos
              没有可公开核验的财务数据——当前收入、ARR、流失率和烧钱速度都未知，估值判断只能依赖 October 2021 确定的 $1.7 billion Series D
              价格。此后市场条件已实质变化，包括利率上行、多家上市网络安全公司估值下调，以及私募市场倍数降温。当前真实估值可能与 2021 年锚点有实质差异。第三，关键人风险：Robert M. Lee 的个人品牌与
              Dragos 的公司身份、思想领导力和政策关系高度绑定。他离开会构成重大扰动。第四，资金充足的同业竞争：Claroty 获得知名投资者支持，服务更广的网络物理市场；Nozomi Networks 拥有 AI
              驱动的 OT/IoT 分析和深度生态集成。两家公司都与 Dragos 直接竞争，并在扩展平台能力和全球覆盖。第五，客户集中和市场成熟度：OT
              网络安全市场虽然在增长，但很多细分领域仍处早期。较小的关键基础设施运营方（水务公司、农村电力合作社）网络安全预算有限，而免费的 Community Defense Program
              虽然契合使命，却限制了该细分市场的商业变现。收入依赖大型工业企业，带来客户集中风险。
