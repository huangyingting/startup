      - number: '4.2'
        title: 单位经济模型与变现
        blocks:
          - type: paragraph
            body: >
              Dragos 的单位经济模型无法精确量化，因为 CAC、LTV、毛利率和净收入留存均未披露。但业务结构本身可以支撑分析框架，给可能区间划出边界。平台订阅按设备计价并采用多年合同，结构上抬高
              LTV：若一家公用事业客户监控 500+ 个 OT 资产，签下 $300K/年的平台订阅和 3 年首期合同，不计扩容、续约或专业服务附加，合同价值约 $900K。工业 OT
              安全部署黏性高——切换成本包括传感器重新配置、协议解码器重新训练、SOC 工作流重配和 OT 员工再培训——说明成熟平台客户的净收入留存（NRR）可能高于 100%，由 OT 环境扩张带来的资产数量增长驱动。

              专业服务附加率是混合毛利率的关键变量。纯 SaaS 订阅毛利率通常为 75–85%；专业服务毛利率为 30–50%。如果 Dragos 的专业服务占总收入 25–35%（考虑到部署较重的企业 OT
              市场，以及公司强调由实战人员驱动 IR，这一区间较可能），混合毛利率会落在 55–70%——低于纯 SaaS 标杆，但对一家企业安全公司仍可持续。这会影响退出时的终局价值倍数。

              客户获取成本结构由企业直销驱动，评估周期长（12–24 个月），技术评估要求高（概念验证部署、现场勘查、协议分析）。这意味着单客户 CAC 高于 SMB SaaS，但平均合同价值在规模化后可以支撑这类
              CAC。Dragos 的社区项目（OT-CERT、Community Defense Program、Year in Review
              报告）充当内容驱动的需求生成机制：客户先通过社区参与自我识别，再进入商业评估，从而降低入站 CAC。

              2023 年 6 月裁员（约 9% 员工）释放出一个信号：2021 年后利率环境变化后，Dragos 的资本消耗快于收入增长可支撑的水平。Series D 在增长资本估值高点（2021 年）完成，2023
              年市场回调迫使公司调整员工规模。自 2024 年 1 月 Series D 延展至总额 $274M 后，公司没有公开宣布后续融资。截至 2026 年 5 月仍未宣布 Series E（距延展约 30
              个月），引出几个问题：Dragos 是否接近盈利、是否在主动寻求战略选项，或是在考虑推迟 IPO 或通过 M&A 退出。
