      - number: '5.4'
        title: 专业服务——事件响应、评估与托管监控
        blocks:
          - type: paragraph
            body: >
              Dragos 的专业服务组合补充平台能力，也构成单独收入流，并把情报反哺产品开发。服务组织由具备政府和军方网络背景的 OT 安全实战人员组成，和创始团队画像一致；在 ICS 事件响应项目中，这种可信度是 IT
              背景顾问难以匹配的。

              Rapid Response Retainer 为组织提供预先审批的合同，缩短活跃 OT 事件发生时的动员时间。预留服务客户会获得入门工作坊，用来评估现有 IR
              计划，并通过桌面演练在真实事件发生前识别缺口。Burndown 选项允许组织把预留小时数用于培训和演练，而不是等待事件发生。该模式类似危机管理中的法律顾问预留服务，在平台订阅之外创造经常性服务收入。

              评估服务包括 OT Cybersecurity Assessments（评估网络设计和安全控制）、Network Vulnerability Assessments、OT
              环境渗透测试，以及同时测试防御检测和进攻模拟的 Purple Team 演练。Architecture Reviews 对 NERC CIP 合规尤其相关，因为它们会评估分段和监控配置是否满足监管要求。

              OT Watch 和 OT Watch Complete 把托管服务延伸给缺少内部 OT 安全人员的组织。OT Watch 提供 24/7 专家监控和升级；OT Watch Complete
              管理完整的检测到调查生命周期，并包括主动安全加固。两档服务都与平台的 Insights Hub 集成，并受益于每周 Knowledge Pack 更新。托管服务模式也提高黏性：采用 OT Watch
              的客户更不容易从底层平台订阅流失，因为服务团队已经嵌入其运营。
