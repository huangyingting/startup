      - number: '7.4'
        title: 财务与资本风险
        blocks:
          - type: paragraph
            body: >
              Dragos 最大的财务风险，是融资不透明与 2023 年融资尝试失败叠加。公司最后一次公开确认的融资事件，是 2021 年 10 月以 $1.7B 投后估值完成 $200M Series D，距今已经超过
              4.5 年；此后没有公开披露任何新增股权融资。The Register 和 Bloomberg 报道，2023 年 6 月约 9%
              员工裁撤，直接源于一次未达目标的融资尝试。这意味着两种情况之一：增长已经放缓到足以让投资人拒绝按 Series D 估值继续出资，或者 Dragos 寻求的融资价格被投资人认为缺乏支撑。


              没有公开财务披露，外部无法评估烧钱速度。按阶段、团队规模和市场基准估计，Dragos 的 ARR 区间可能在 $50-$150M；这一档网络安全公司通常每年运营成本为
              $100-$200M+，包括研发、销售团队、IR 服务和情报运营。若烧钱速度为每年 $80-$120M——考虑已披露团队规模，这是合理假设——2021 年 10 月的 $200M Series D 大约可提供
              20-30 个月现金跑道，意味着现金压力从 2023 年中开始出现。


              客户集中度放大财务风险。Dragos 最可见的三个具名客户——Koch/Georgia-Pacific、National Grid Partners、Rockwell Automation——也都是 Series
              D 投资人。如果任何锚定关系因合同不续约或整合到竞争对手平台而弱化，收入冲击会不成比例。Rockwell 利益冲突又增加了一个公开披露中看不到的特定集中度风险向量。
            claimRefs:
              - CR023
              - CR024
              - CR025
              - CR026
              - CR027
