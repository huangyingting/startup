      - number: '1.4'
        title: 财务规模与客户牵引
        blocks:
          - type: paragraph
            body: >-
              作为私营公司，Dragos 不公开披露收入、ARR、客户数、员工数或盈利能力指标。最可靠的财务规模代理来自 Series D 公告（October 2021）：公司披露截至 September 30, 2021
              的平台经常性收入同比增长超过 100%，说明募资时商业势头很强。之后，Dragos 披露了一些定性和运营规模指标。Neighborhood Keeper 是面向所有 Dragos Platform
              客户免费提供的匿名信息共享网络；在 Series D 时，借助与 NERC Electricity Information Sharing and Analysis
              Center（E-ISAC）的联合项目，该计划已被 84 家公用事业公司采用，覆盖美国超过 70% 的电力公用事业客户。对于一个本身高度集中的市场，这是很强的社区渗透指标。通过与 Oil and Natural
              Gas Information Sharing and Analysis Center（ONG-ISAC）以及 Downstream Natural Gas Information Sharing and
              Analysis Center（DNG-ISAC）合作，Dragos 把集体防御延伸到电网之外的能源行业利益相关方。全球层面，Dragos 已在 North America、EMEA（包括 Europe、UK 和
              Middle East）以及 APAC（包括通过 Macnica 进入 Japan、通过与 Singapore 的 Digital and Intelligence Service 签署 MOU 进入
              Singapore）设立办公室。公司在 UAE 建立了 OT Cybersecurity Center of Excellence。Dragos
              的全球客户包括电力、油气、制造、水务、交通和采矿等行业中许多最大的工业组织。公司 2026 OT/ICS Cybersecurity Year in Review 是其第 9 份年度报告，跟踪到 2025 年有
              119 个勒索软件组织影响 3,300 家工业组织，较上一年增长 49%；这一市场紧迫性支撑了 Dragos 的商业定位。Dragos 2025 OT Security Financial Risk
              Report（与 Marsh McLennan 的 Cyber Risk Intelligence Center 联合发布）估计，全球最坏情形 OT 网络损失每年最高可达 $329.5
              billion，这也是一个有说服力的市场开发资产。
