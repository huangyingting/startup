          detail: Dragos 员工数削减约 9%；显示收入增速相对招聘扩张放缓
          tone: warning
        - date: 2024-01
          label: 董事会扩容；Series D 延长轮 $74M，总额达 $274M（累计 $440M）
          detail: Fehrman（BHE CEO）和 Singh-Bushell（Federal Reserve NY）加入董事会；总资本达到约 $440M
          tone: positive
        - date: 2025-08
          label: Eric Cross 出任 CRO；GTM 专业化
