      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Dragos 多轮私募融资合计约 $440 million。最关键的事件是 October 28, 2021 的 Series D：融资 $200 million，估值 $1.7 billion，是当时任何 OT
              网络安全公司拿到的最大轮次和最高估值。Series D 由 Koch Industries 的投资部门 Koch Disruptive Technologies，以及 BlackRock
              管理的基金和账户共同领投。Series D 投资者包括 Emerson、Hewlett Packard Enterprise（HPE）、Allegis Cyber、Canaan、DataTribe、Energy
              Impact Partners、National Grid Partners、Schweitzer Engineering Labs、Rockwell Automation 和 Global Reserve
              Group——这是一组经过战略筛选的工业运营方和基础设施投资者，其中不少本身就是 Dragos 的客户或潜在客户。战略投资者对齐是一项结构性优势：Dragos
              在向其他工业企业销售时，可以借到分销杠杆、联合营销机会和可信度信号。Series D 后续又延长融资 $74 million，使 Series D 总额达到 $274 million，所有轮次累计融资约 $440
              million。这一延长轮与 Dragos January 2024 董事会任命同时宣布，释放出投资者持续支持的信号。截至 May 2026，Dragos 仍为私营公司，尚未宣布 IPO 或 M&A
              交易。缺少公开文件意味着关键财务指标——包括收入、ARR、烧钱速度和毛利率——无法独立核验。早期融资奠定了基础：DataTribe 是专注 Baltimore-Washington
              走廊国家安全技术的创业工作室，也是早期支持者和共址伙伴。Canaan Partners 参与了更早的机构轮。投资者从国家安全导向的早期支持者，演进到大型战略工业集团，反映了 Dragos
              从政府相邻创业公司成长为商业企业平台的过程。
