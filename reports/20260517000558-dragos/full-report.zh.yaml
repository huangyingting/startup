      - number: '6.5'
        title: 渠道伙伴、ISAC 生态与投资者—客户重叠
        blocks:
          - type: paragraph
            body: >
              Dragos 的 100+ 家渠道合作伙伴——包括 Booz Allen Hamilton、Optiv、CyberCX、1898 & Co. 和 ABS Group——在 Dragos
              直接团队有限的地区和行业中，延伸 OT 安全评估、平台部署和托管服务的销售与交付覆盖。Dragos Global Partner Program 于 2023 年 6
              月推出，是唯一把技术、威胁情报、专业服务和培训置于同一结构下的 OT 渠道项目，并在 2024 年获得 5-Star CRN Partner Program 评级。

              ISAC 合作建立了行业级渠道关系。E-ISAC（电力）、ONG-ISAC（油气）和 DNG-ISAC（下游天然气）共同覆盖北美最大的 OT 买家细分。这些合作让 Neighborhood Keeper
              成为美国关键基础设施 ISAC 实际上的集体防御层，使 Dragos 更像嵌入式行业基础设施层，而不是一次性交易型供应商。

              Dragos-Axio OT 网络风险量化合作（2024 年宣布）把买方接触面从 OT 安全团队扩展到 CFO 和风险委员会，后者现在可以用财务语言量化潜在 OT 网络损失。2026 年 2 月的
              Microsoft Azure Marketplace 集成，使企业买家能通过既有 Microsoft EA 协议采购 Dragos，显著降低已与 Microsoft 对齐的企业细分采购摩擦。

              投资者—客户重叠（Koch Disruptive Technologies、National Grid Partners、Emerson、Rockwell Automation、HPE、Schweitzer
              Engineering）创造了独特的背书基础，但也带来尽调模糊性：这些部署是由商业价值驱动，还是由投资关系牵引？单个背书的质量（具名
              CISO、具体运营结果）说明存在真实商业采用，但如果能获得非投资者客户的独立印证，证据会更强。
