companyProfile:
  summary: >
    Dragos 是全球最突出的专用 OT/ICS 网络安全平台，2016 年由 Robert M. Lee（前 NSA / 美国空军） 创办。平台把资产发现、威胁检测、漏洞管理和工业威胁情报合在一起，保护关键基础设施。Dragos 在
    Oct 2021 获得由 Koch Disruptive Technologies 和 BlackRock 领投的 $200M Series D 融资，估值 $1.7B。Gartner 将其评为 2025-2026 CPS
    Protection Platforms Magic Quadrant Leader。Neighborhood Keeper 信息共享网络已部署到 84+ 家公用事业公司，覆盖 70% 的美国电力用户。
  foundedDate: '2016-01-01'
  founders:
    - name: Robert M. Lee
      role: CEO 兼联合创始人
      background: 前 NSA / 美国空军网络作战人员；ICS 威胁情报先行者
  foundingLocation: Hanover, MD
  headquarters: Hanover, MD
  productSummary: >
    Dragos Platform 3.0（Sept 2025）：资产可视性、网络监控、威胁检测、漏洞管理（Insights Hub AI 优先级排序）、STS-50 传感器、Active Collection 模式。Dragos
    WorldView Threat Intelligence：21+ 个具名 OT 专属威胁组织。专业服务：事件响应、OT Watch 威胁狩猎、评估。Neighborhood
    Keeper：面向公用事业公司的匿名信息共享网络。OT-CERT：免费 CVE 协调和公开公告，注册成员 2,400+。
  customerFocus: |
    电力公用事业、油气、制造、水务 / 污水处理、化工、制药和关键基础设施运营方。主要买家是大型企业和工业资产所有者中的 CISO、运营副总裁、OT 安全总监。
  businessModel: |
    企业 SaaS，收入来自年度 / 多年期平台订阅 + 威胁情报订阅 + 专业服务（事件响应、评估、培训）。 没有 SMB / 免费增值层级。靠平台采用、情报增购和服务绑定，先落地再扩张。
