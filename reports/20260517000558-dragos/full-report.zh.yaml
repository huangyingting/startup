      - number: '7.5'
        title: 关键人物与治理风险
        blocks:
          - type: paragraph
            body: >
              CEO 兼联合创始人 Robert M. Lee 是 Dragos 最重要的非财务资产。Lee 在美国空军网络司令部和 NSA 担任 ICS/SCADA 专家后，于 2016 年创办 Dragos；他共同发现了
              2016 年攻击乌克兰电网的 Industroyer/CRASHER 恶意软件，并已成为全球 ICS 网络安全最核心的思想领袖。他的公众影响力——主持 CyberWire 的 Control Loop
              播客，每年在 S4、RSA、Black Hat 演讲——形成的品牌资产很难转移给继任者。


              Dragos 除投资人代表（Koch Disruptive Technologies、BlackRock、National Grid Partners、Rockwell
              Automation）之外的董事会构成没有公开披露。2023 年加入 Bill Fehrman 和 Ekta Singh Bushell
              扩充董事会，带来独立董事；但审计委员会结构、薪酬委员会细节和正式治理文件都没有公开。这种不透明限制了外部评估：公司是否对 CEO 薪酬决策、财务控制，以及与投资人兼客户的关联方交易建立了足够独立监督。


              2023 年 5 月的社会工程事件释放了治理信号：一家销售 OT 威胁检测的公司自身也被成功社会工程攻击。透明披露是正面治理指标，但事件暴露了非技术行政职能中的运营安全漏洞。竞争对手可能在销售场景中利用这一点。
