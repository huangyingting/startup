      - number: '5.2'
        title: Dragos WorldView 威胁情报与攻击者跟踪
        blocks:
          - type: paragraph
            body: >
              Dragos WorldView 是公司仅面向 OT 的威胁情报产品，向安全分析师和高管干系人提供攻击者研究、ICS 恶意软件分析、漏洞洞察和战略情报。WorldView
              是唯一专注运营技术的商业威胁情报服务；CrowdStrike、Mandiant 等 IT 威胁情报厂商会顺带覆盖 ICS，但没有同等规模或深度的专门 OT 攻击者跟踪团队。

              截至 2026 年 2 月年度报告发布，Dragos 在全球跟踪 26 个命名 OT 威胁组织，其中 11 个在 2025 年活跃。年内识别出三个新组织：SYLVANITE 担任初始访问经纪人，把立足点移交给
              VOLTZITE 以便后者深入 OT 入侵；AZURITE 针对工程工作站开展长期 OT 数据外传，并与 Flax Typhoon 存在技术重叠；PYROXENE 在航空、航天、防务和海事行业开展供应链入侵，并与
              IRGC-CEC 存在重叠。KAMACITE 在 2025 年系统性扫描美国基础设施控制回路；ELECTRUM 则对波兰能源系统部署 wiper 恶意软件，显示攻击者正从侦察推进到试图影响实际运营。

              情报通过每周 Knowledge Packs 落地，并自动推送到 Dragos Platform，其中包含更新后的检测、OT 专用漏洞评分，以及与当前攻击者战术对齐的
              playbook。这个从情报到平台的反馈回路，意味着客户无需分析师手工介入，也能持续获得更新后的威胁覆盖。WorldView 可作为独立门户订阅，也嵌入到平台层级客户的部署中。

              2026 年年度报告发现，针对工业组织的勒索软件团伙同比增加 64%，共有 119 个团伙攻击全球 3,300 家组织。Dragos 还发现，2025 年 ICS-CERT 和 NVD 漏洞公告中，25% 的
              CVSS 评分错误，26% 没有补丁或缓解指引——这说明 Dragos 经 OT 校正的漏洞情报价值，超出了通用公共公告。
