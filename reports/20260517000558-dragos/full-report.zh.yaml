  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Dragos Platform 3.0——产品组合与模块架构
        blocks:
          - type: paragraph
            body: >
              Dragos Platform 3.0 于 2025 年 9 月 23 日发布，是公司的旗舰 OT
              网络安全软件套件。它通过一个为工业控制系统（ICS）和运营技术（OT）环境专门打造的统一界面，交付四项集成能力：资产可视化、OT
              网络监控与威胁检测、漏洞管理和事件响应。平台面向电力、油气、制造、水务、交通和化工等行业的资产所有者销售，部署对象是负责保护 SCADA 系统、PLC、HMI 以及控制物理流程的工程工作站的安全团队。

              3.0 版本的核心是 Insights Hub。它把风险加权后的漏洞、资产和威胁告警整合成一个按优先级排序的单一视图，替代手工关联分散工具输出的工作。每个告警都配有专家编写的
              playbook，因此任何经验水平的分析师都能获得清晰指引：应该调查什么、如何响应。Dragos 的目标是清除缺乏上下文的通知带来的告警疲劳，从而压缩平均分诊时间。

              Platform 3.0 的硬件创新包括 STS-50 传感器——一种占用空间更小的设备，使过去缺少机架空间或供电预算、无法部署全尺寸传感器的分布式和远程 OT 站点也能接入。除 STS-50 外，Dragos
              还推出了面向小型环境的 Sensor/SiteStore 一体化形态，并扩展 Active Collection
              模式。该模式使用基于轮询的查询，把资产发现延伸到隔离网络和间歇连接站点；如果只靠被动监控，这些站点会留下覆盖缺口。

              平台软件之外，Dragos 提供两档 OT Watch 托管服务。OT Watch 提供 24/7 专家威胁狩猎和高置信度告警升级。OT Watch Complete
              增加主动安全加固、平台调优，以及从检测到调查全生命周期的专家管理。两档服务都由受过 OT 训练的分析师交付，而不是从 IT SOC 转岗来的人员；Dragos 将这一点列为区别于进入 OT 领域的 IT
              安全厂商的重要差异。
