      - - 基准
        - ARR 大约 0M；增长 30-40%；对估计 10M 的 NTM ARR 套用 20-25x 前瞻 ARR 倍数；监管顺风支撑管线
        - 5-90M
        - .0-2.5B
        - 55-60% -- 需要 2023 年重组后的财务恢复
