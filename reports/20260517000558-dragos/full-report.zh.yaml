  - id: FE001
    title: Dragos Platform 架构 — 分层 OT 安全栈
    type: stack
    layout: wide
    summary: Dragos Platform 是一套六层 OT 安全架构，覆盖物理传感器、核心平台模块、威胁情报、AI 工作流、托管服务，以及社区 / 生态项目。
    data:
      layers:
        - label: 社区与生态层
          detail: >-
            Neighborhood Keeper（84+ 家公用事业机构，ISAC 合作）；Community Defense Program（免费面向收入低于 $100M 的公用事业机构）；OT-CERT（2,400+
            名成员，64 个国家）；Global Partner Program（100+ 家合作伙伴）
        - label: 服务与托管检测层
          detail: OT Watch（24/7 威胁狩猎）；OT Watch Complete（托管完整生命周期）；Incident Response Retainer；OT 评估；渗透测试；桌面演练；架构审查
        - label: AI 与分析师工作流层
          detail: Intelligence Fabric（对手跟踪、OT 遥测、10+ 年 IR 数据）；AI 增强漏洞分析；自然语言 OT 查询；面向企业 AI 集成的 Platform MCP Server
        - label: 平台核心模块
          detail: Insights Hub（风险加权汇总视图）；资产可见性；威胁检测（4 机制）；漏洞管理（Now/Next/Never）；事件响应工作流
        - label: 情报层
          detail: >-
            Dragos WorldView 威胁情报（跟踪 26 个 OT 威胁组织）；Weekly Knowledge Packs（检测、CVE、处置手册）；MITRE ATT&CK for ICS 映射；ICS
            恶意软件分析（TRISIS、PIPEDREAM、FrostyGoop）
        - label: 物理传感器与采集层
          detail: STS-50 被动传感器；Combined Sensor/SiteStore；Active Collection（隔离站点）；600+ 个 ICS/OT 协议解析器；深度包检测；无需代理
    claimRefs:
      - CE001
      - CE002
      - CE007
      - CE008
      - CE015
      - CE016
      - CE025
      - CE027
  - id: FE002
    title: Dragos OT 安全运营流程 — 从发现到加固的闭环
    type: flow
    layout: wide
    summary: Dragos Platform 支持闭环 OT 安全运营周期，从被动资产发现到威胁响应和持续加固，社区情报再回流到检测。
    data:
      nodes:
        - id: discover
          label: 1. 资产发现：面向隔离站点的被动监控 + Active Collection
        - id: inventory
          label: 2. 资产清单：带 600+ 协议语境的 OT/IT/IoT/IIoT 分类
        - id: detect
          label: 3. 威胁检测：行为分析 + Knowledge Pack IOC + 配置监控 + 异常检测
        - id: triage
          label: 4. Insights Hub 分诊：风险加权告警优先级 + 专家处置手册
        - id: respond
