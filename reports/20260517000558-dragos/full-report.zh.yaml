      - number: '8.3'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Dragos 的可比公司横跨四组：(1) 私有纯 OT 安全公司（Claroty、Nozomi）；(2) 私有 IT/OT 融合平台（Armis）；(3) 拥有 OT 组件的上市网络安全公司（Tenable
              TENB、CrowdStrike CRWD 新兴 OT 模块）；(4) OT 安全 M&A 交易（Tenable/Indegy 2019 年 8M、Armis/Aperio 2021 年、Rockwell 投资
              Claroty）。


              最相关的可比对象是 Claroty 和 Nozomi，它们都是直接的纯 OT 安全同行。Claroty Series D（00M，2021 年 11 月）隐含投后估值约 .8-2.2B——可比于 Dragos
              两周前的 .7B Series D。两家公司都没有披露 2021 年后的财务数据，增长调整后的可比分析因此困难。Armis 2023 年 .3B 估值可作为有用的天花板可比，但 Armis 的 TAM（面向
              ITAM/CAASM 用例的 IT 与 OT 资产管理）明显大于 Dragos 更聚焦的 OT 威胁检测和 IR 市场。


              上市公司倍数方面：Tenable Holdings（TENB）在约 .0B ARR 的 VM 与 OT 安全综合平台上，以约 4.5-5.5x NTM ARR 交易。CrowdStrike 的 OT
              安全模块仍处早期（估计低于 0M ARR），尚未公开拆分；CRWD 交易倍数超过 20x ARR，但这一倍数反映的是核心 Falcon EDR 优势，不是 OT 组件。把 Tenable 作为规模化、具备 OT
              能力的平台中最相关的上市代理，并对 Dragos 估计 ARR 区间 0-100M 应用 15-25x 倍数，得到 bash.75B-.5B 的估值区间——与我们的悲观到基准情景建模一致。


              可比集合确认：在基准情景下（ARR 约 0M、增长 30-40%、20-22x 远期倍数），.7B Series D 估值可以自洽，但并不显著便宜。新投资人如果以 .7B 参考价进入，需要确信 ARR 增长
              25%+，并且未来 24-36 个月内有清晰 Series E 或退出路径。
