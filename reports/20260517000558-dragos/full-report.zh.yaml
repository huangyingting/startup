      - number: '2.2'
        title: TAM、SAM 与 SOM 测算
        blocks:
          - type: paragraph
            body: >
              OT/ICS 网络安全的市场规模会因分析师定义范围不同而大幅变化，因此必须交叉校准，不能照单全收。MarketsandMarkets 预计全球 OT 安全市场 2025 年为 $23.5B，2030 年增至
              $50.3B，复合年增长率为 16.5%；这是 Dragos 自身市场定位材料中引用最多的数字，也出现在 February 2026 的 Microsoft-Dragos
              合作公告中。该估计很可能采用最宽口径，包含网络安全硬件、服务和云 OT 安全相邻项。Gartner 的 CPS（Cyber-Physical Systems）Protection Platforms
              市场是更窄的分析师视角，专注于 Dragos、Claroty 和 Nozomi Networks 竞争的平台软件类别；按美元计，这个市场要小得多，但它才是平台估值倍数的相关基准。Frost & Sullivan
              的 FrostRadar: OT Cybersecurity Solutions 2025 将 Dragos 评为 OT 安全厂商创新 #1，为市场领导地位提供了定性验证。


              2025 OT Security Financial Risk Report 由 Dragos 和 Marsh McLennan 的 Cyber Risk Intelligence Center
              联合制作，提供了一个重要的需求侧测算视角：全球最坏情形 OT 网络损失估计每年 $329.5B，仅业务中断就有 $172.4B。这一财务风险规模是 $23.5B 平台市场的 14× 以上，说明 OT
              安全市场相对于其保护的财务暴露严重资本不足，也暗示长期增长空间很大。SANS 2025 ICS/OT Cybersecurity 调研显示，采用率最高的三项 SANS Five Critical Controls
              是：Incident Response Planning（18.5%）、Defensible Architecture（17.09%）和 ICS Network Visibility（16.47%）。这些都是
              Dragos Platform 的核心能力，说明产品与从业者优先事项匹配。


              扣除安全硬件、OEM 捆绑工具和纯 IT 安全支出后，2025 年全球 OT 平台软件与服务的可服务市场（SAM）估计为 $7–10B。Dragos 的可获取市场（SOM）在没有披露收入的情况下无法精确量化；但以
              October 2021 的 $1.7B Series D 估值和成长阶段 SaaS 常见的 10–15× ARR 倍数反推，Dragos 募资时的 ARR 隐含约为 $113–170M。如果此后增长即便只有每年
              30%，当前 ARR（未核验）也可能在 $200–350M 区间，相当于估计 $7–10B SAM 的约 2–5%，仍有可观上行空间。
