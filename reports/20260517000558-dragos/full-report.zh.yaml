      - number: '5.3'
        title: 技术架构——OT 原生、被动优先、情报驱动
        blocks:
          - type: paragraph
            body: >
              Dragos Platform 的核心架构原则是 OT 原生：它从底层为工业环境构建，而不是从 IT 安全工具改造而来。平台把被动网络监控作为主要数据采集模式，部署传感器对网络流量做深度包检测，并用专有解析器解析
              600+ 种工业协议，包括 MODBUS、DNP3、EtherNet/IP、IEC 61850、OPC-UA、Profinet 以及数十种厂商专有协议。这种被动方式不需要在 OT
              设备上安装代理——这是关键设计选择，因为许多 ICS 设备运行在专有固件上，无法支持代理软件；PLC 或 HMI 系统上的计划外软件变更还可能触发安全停机。

              Dragos Intelligence Fabric 位于平台 AI 与知识架构中心。它把攻击者跟踪数据、客户环境中的 OT
              遥测、资产与协议专长、漏洞研究，以及一线事件响应观察整合成持续反馈回路。这个专有数据集建立在近十年的 OT 事件响应和威胁狩猎之上，支撑平台的 AI 增强漏洞分析，以及 2025–2026
              年引入的自然语言查询能力。分析师可以用普通英文查询自己的 OT 环境，并获得基于 Intelligence Fabric、而非通用 AI 模型的答案。

              2026 年 2 月与 Microsoft 合作后，云与集成架构显著扩展。自 2026 年 Q1 起，除既有本地部署和混合模式外，Dragos Platform 还支持在 Microsoft Azure 上以
              SaaS 方式部署。OT 专用遥测、威胁情报和资产上下文现在可以直接流入 Microsoft Sentinel，使已经把 Sentinel 作为 SIEM 的组织能够统一开展 IT/OT
              检测、调查和响应。客户可通过 Microsoft Marketplace 采购 Dragos，并使用 Azure 消费承诺，从而降低企业买家的采购摩擦。

              AWS 集成早于 Microsoft 合作。2023 年 1 月，Dragos 获得 AWS Manufacturing and Industrial Competency，成为首个带有 OT Security
              资质标识的合作伙伴。Koch Industries 在 AWS 上部署该平台，并报告称由此获得了过去无法实现的 ICS/OT 资产可视化。
