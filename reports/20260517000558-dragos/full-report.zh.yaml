        - date: 2025-09
          label: Platform 3.0 发布 — Insights Hub、AI 漏洞分析、STS-50
          detail: 重大平台版本整合风险、资产和威胁视图；AI 增强漏洞流程
          tone: positive
        - date: 2026-02
          label: Microsoft 合作扩展；发布 2026 Year in Review
          detail: Azure/Sentinel/Marketplace 集成；第 9 份年度报告跟踪 119 个勒索软件组织、3 个新威胁组织
