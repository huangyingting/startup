        - 废除 NERC CIP 或暂停执法（需要立法行动）
      - - 情报护城河
        - 21+ 个具名 ICS 威胁组织、WorldView 平台和 HUMINT 研究深度，对 IT 原生竞争对手而言结构性难以复制
        - Microsoft 收购 OT 威胁情报公司，或 CISA 免费发布深度等同 WorldView 的 OT 威胁情报
        - Microsoft、Palo Alto 或政府机构以零成本发布同等威胁组织情报
      - - 社区飞轮
        - OT-CERT 2,400+ 名成员和 Neighborhood Keeper 84+ 家公用事业会随时间降低 CAC，并沉淀长期管线
        - 社区项目尚未证明商业转化率；24 个月内成本可能超过 ARR 贡献
        - CDP 或 OT-CERT 宣布首个商业转化队列，并确认 ARR 贡献
      - - 财务轨迹
        - 重组后的效率和市场动能，让公司无需新增股权融资也能回到 30%+ ARR 增长
        - 2023 年融资失败意味着增长低于支撑 .7B+ 估值所需门槛；尚无公开复苏信号
        - ARR 披露确认过去 12 个月增长超过 25%
      - - 关键人
        - Lee 离任会造成重大不利影响，但 ICS 研究团队、平台和客户基础构成了不依赖个人的机构价值
        - 没有继任计划，没有具名二号人物，品牌资产又高度集中在 Lee 身上；一旦离任，客户信心会受到质疑
        - 宣布具名继任者，或可比网络安全 CEO 变更实现公开顺利交接（如 Palo Alto、CrowdStrike 模式）
    notes: 所有投资逻辑和反向逻辑均由第 1-7 章证据支持。没有任何投资逻辑支柱是推测性的。建议为继续研究而非买入，是因为公开信息尚未充分回答财务轨迹和关键人风险上的反向逻辑。
