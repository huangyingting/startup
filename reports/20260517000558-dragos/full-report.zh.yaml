      - number: '8.5'
        title: 最终尽调问题
        blocks:
          - type: paragraph
            body: >
              Dragos 最关键的未解决尽调事项，都与财务透明度和治理有关；每一项都可能把建议从继续研究实质性推向买入或放弃。第一，财务披露：公司必须提供 2021-2026 年 ARR 桥接、当前年化 ARR、过去 12
              个月增长率、毛利率、按成本类别划分的烧钱速度、当前现金余额，以及任何授信额度或过桥融资。第二，估值语境：2023
              年融资失败的具体条款——包括目标估值、哪些投资人放弃、给出的理由——会为当前企业价值评估提供关键三角校验。第三，资本结构：完整股权结构表必须列出优先股堆叠、清算优先权、反稀释条款和投资人权利协议，这是回报建模的基础。第四，治理：完整董事名单、委员会章程，以及与客户有关系的投资人董事（尤其
              Rockwell Automation）是否已有回避或利益冲突政策。


              如果财务披露确认悲观情景（ARR 约 0M，增长低于 25%），合适动作是在低于 .5B 入场价时放弃或观察。如果披露确认基准情景（ARR 约 0M，增长 30-40%），合适动作是在 .0B
              或以下半仓。如果披露确认乐观情景（ARR 高于 00M，增长高于 40%），合适动作是在 .5B 或以下满仓。建议框架对价格和证据都敏感：Dragos 市场位置质量本身不足以在缺少财务验证时支持入场。
            claimRefs:
