      - number: '3.3'
        title: 定价、包装与 GTM 定位
        blocks:
          - type: paragraph
            body: >
              Dragos 只在企业段竞争，没有自助服务、免费增值或 SMB 产品。定价基于资产数量（按设备 /
              按节点），交易通常是多年期订阅，并绑定专业服务，用于部署、调优和持续事件响应保留服务。这带来高平均合同价值和低初始流失（多年锁定），但也限制市场速度，并使合同中期替换竞争者更难。


              Claroty 同样只做企业市场，平台许可也基于资产数量。Team82 研究免费公开，用于建设品牌；平台许可规模则与 Dragos 可比。Claroty 大举投入渠道伙伴——VAR/MSSP——并与
              Cisco、Rockwell Automation 和 Schneider Electric 合作，推进嵌入式 OEM 销售动作。Claroty 的医疗扩张（Medigate）为需要统一医疗设备与 OT
              安全的医院系统 CISO 形成一个独立吸引点，而 Dragos 不覆盖这一买方群体。


              Nozomi Networks 使用类似的资产数量许可模型，并与集成商（Accenture、Deloitte、IBM）建立渠道伙伴关系。Hg 收购后，Nozomi 似乎更投入地理扩张（EMEA、APAC）和潜在
              M&A 相邻项，而不是针对 Dragos 打产品差异化竞争。


              Microsoft Defender for IoT 被捆绑在 Microsoft Defender for Cloud Plans 2 内，并与 Azure Arc 集成以支持本地部署，实际上把 OT
              监控变成现有 Microsoft 企业许可的一项功能，而不是单独预算项。对于 100% Microsoft 标准化的大型企业，这种捆绑给 Dragos 制造了非常困难的竞争动态，因为在既有 Microsoft
              许可下，OT 监控成本可能看起来为零。Microsoft 的商业化动作由企业客户团队牵头，而不是专门 OT 渠道。


              Dragos 的主要竞争护城河包括：（1）NSA / ICS-CERT 创始可信度，转化为政府和国防关键基础设施客户信任；（2）OT-CERT 和 Community Defense Program
              作为市场开发和好感资产，从首次购买 OT 安全的客户处创造入站线索；（3）26 个具名对手组织情报，产出替代方案难以复制的可行动威胁告警；（4）MITRE ATT&CK for ICS
              评估表现记录，提供第三方验证；（5）Microsoft 合作（February 2026）支持 Microsoft Sentinel 集成，且通过让 Dragos 进入 Microsoft 安全生态，部分吸收
              Microsoft 捆绑威胁。
