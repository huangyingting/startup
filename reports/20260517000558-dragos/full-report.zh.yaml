      - number: '6.2'
        title: 具名客户证据——企业部署与公开背书
        blocks:
          - type: paragraph
            body: >
              Dragos 最实质的具名客户证据，来自 2021 年 10 月 Series D 融资公告。公告包含四家客户的直接背书，而它们同时也是战略投资者：Georgia-Pacific、Koch
              Industries、Rockwell Automation 和 National Grid。这种投资者—客户重叠提供了相互印证的部署证据，但需要谨慎解读——商业关系可能受到投资关系影响。

              Georgia-Pacific LLC 是 Koch Industries 旗下子公司，拥有 160+ 个全球地点，品牌包括 Dixie、Angel Soft 和 Brawny。该公司在制造和化工运营中部署
              Dragos Platform，用于 OT 可视化、威胁检测和事件响应。CISO Francis Cioffi
              表示，该平台提供“我们保护运营、守住业务所需的可视化、检测和响应能力”。这是高质量背书：来自一家大型、可识别公司的具名 CISO，并给出了具体运营结果。

              Koch Industries 在其 500+ 个全球制造和加工设施中，于 AWS 上部署 Dragos Platform，并据 AWS Industrial Competency 公告获得了“过去无法实现的
              ICS/OT 资产可视化”。Koch Disruptive Technologies（投资部门）Managing Director and COO Byron Knight 表示，Koch
              已“快速证明自己是关键合作伙伴”，该平台“在管理整个企业风险方面发挥关键作用”。Koch 多轮重复投资 Dragos，也进一步印证了持续平台采用。

              National Grid plc 是全球最大的投资者持有公用事业公司之一。该公司在初次订阅 Dragos 的 OT 威胁情报服务后，于 2018 年投资 Dragos。CTIO Lisa Lambert 在
              2021 年英国扩张公告中确认，Dragos “对 ICS 威胁的可视化为我们的英国和美国业务都带来了价值”。这提供了关键基础设施运营方具名高管确认的多年部署证据。

              Rockwell Automation 是领先工业自动化厂商，作为战略合作伙伴和客户投资 Dragos。VP and GM of Global Services Rachael Conrad 确认，“Dragos
              的工业网络安全平台帮助我们的客户保护运营环境，并最大化其数字化转型价值”。Boston Beer Company 被列为 Dragos 行业页面上的具名制造业客户，但没有发布案例研究或高管引述；这属于 logo
              级证据。
