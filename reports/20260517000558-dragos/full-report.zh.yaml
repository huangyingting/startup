      - number: '6.7'
        title: 附录
        blocks:
          - type: callout
            title: 投资人兼客户背书质量高于典型早期证明
            body: >
              Dragos 的实名客户证明——Georgia-Pacific CISO 评价、Koch Industries COO 部署表述、National Grid CTIO 多年合作、Rockwell
              Automation VP 确认——比典型早期安全公司引用匿名案例或 logo 墙更有参考价值。来自可识别 大型工业企业的具名 CISO，并带有具体运营语境（160+ 个地点、500+ 个全球设施、英国 +
              美国业务），对潜在买家 和投资人都是可靠背书点，尽管投资人兼客户重叠会引入潜在利益冲突。
            calloutType: strength
