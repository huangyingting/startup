      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              OT 网络安全采购由行业特定监管要求、威胁暴露和运营风险容忍度驱动，而不是通用企业 IT 采购模式。电力公用事业是 Dragos 渗透最深的细分市场：NERC CIP 合规对大宗电力系统资产强制适用，形成 OT
              安全投资的监管硬约束。在 Series D 时，借助 E-ISAC 合作，Dragos 的 Neighborhood Keeper 计划已被 84 家公用事业公司采用，覆盖美国超过 70%
              的电力公用事业客户；对于一个本身高度集中的市场，这是很强的渗透指标。TSA Pipeline Security Directives（针对油气管道运营商）和 API RP 780 网络安全指南推动中游环节的 OT
              安全投资；上游勘探和下游炼化的监管压力过去较低，但面临更高的民族国家攻击风险。


              制造客户（离散、流程和混合型）按组织数量看是大市场，但监管压力更分散——ISA/IEC 62443 是主要标准，不过采用是自愿的。AWIA 2018
              要求水务和污水处理公用事业每五年开展网络安全风险评估并制定应急响应计划，但服务少于 10,000 名客户的小系统预算能力高度有限。Dragos 通过 Community Defense
              Program（为资源不足组织提供免费 OT 安全资源）和 OT-CERT 触达这个群体，在不商业变现的情况下建立社区存在感。采矿、制药、食品饮料和交通（海事、铁路）属于新兴细分，OT
              安全意识在增强，但采购还不成熟。


              主要买方画像是大型公用事业或工业企业中的 OT 安全工程师或 CISO；在运营语境下，预算权通常在运营副总裁或工程副总裁层级，在安全更前置的组织中则在 CISO 或 CTO。用户画像通常是大型运营方内部的小型
              OT 安全团队（2–10 名分析师），或代表多个较小运营方工作的托管安全服务提供商（MSSP）。企业交易规模估计每年 $100K–$500K+，具体取决于资产数量；多年期合同在公用事业行业较常见。
