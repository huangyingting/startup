      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              OT 网络安全平台市场竞争迅速升温。Dragos 面临三层竞争：(1) 专注 OT 安全的纯玩家——Claroty（累计融资 $635M；Schneider Electric 和 Rockwell
              Automation 为战略投资者）、Nozomi Networks（Series D 已融资；IPO 路径）、Armis（2023 年估值 $4.3B）；(2) 向 OT 扩展的 IT
              安全厂商——Microsoft Defender for IoT（对 Azure/Sentinel 客户免费）、Palo Alto Networks Industrial OT Security、Fortinet
              OT 能力；(3) 构建原生 OT 安全的工业自动化厂商——Honeywell Forge、Siemens Eos.ii。值得注意的是，Rockwell Automation 同时是 Dragos 投资人和
              Claroty 战略投资者——这是直接利益冲突，可能影响 Rockwell 的平台采购决定。


              Dragos 的主要竞争护城河是 ICS 威胁情报深度：WorldView 威胁情报平台、只有 Dragos 跟踪并命名的 ICS 威胁组织（CHERNOVITE、ELECTRUM、VOLTZITE），以及
              250+ 个 ICS 威胁指标目录，都是 IT 原生竞争对手短期难以复制的壁垒。不过 Microsoft Defender for IoT 的免费层为 Azure/Sentinel 客户以接近零边际成本提供基础
              OT 资产盘点，挤压 Dragos 入门级产品层的市场空间。


              市场教育风险实质性存在：相当一部分工业资产所有者还没有专门 OT 安全预算。转化这些潜在客户需要 12-18 个月销售周期、现场价值验证部署和持续高管关系建设。销售周期被拉长，再叠加 Dragos 对 100+
              渠道合作伙伴网络的依赖，让从管线到收入的转换对宏观逆风高度敏感。2022-2023 年工业软件支出放缓，最终体现为 Dragos 融资尝试失败和 2023 年 6 月裁员。
