      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >-
              Dragos 由一支政府和军方背景深厚的网络安全从业者团队于 2016 年创办。CEO 兼联合创始人 Robert M. Lee 曾任美国空军网络战行动军官，并在创办 Dragos
              前供职于美国国家安全局（NSA）。Lee 和联合创始人进入工业网络安全，是因为他们亲自调查过重大 ICS 攻击，包括 2015 年和 2016 年乌克兰电网攻击，以及 TRISIS 和 CRASHOVERRIDE
              恶意软件行动；当时行业几乎没有框架能处理这些事件。Lee 多次就关键能源和水务基础设施安全在国会作证，使 Dragos 成为政策制定者眼中的可信声音。截至 2026 年中，执行团队包括 Jodi
              Schatz（首席产品官）、Eric Cross（首席营收官，任命于 August 19, 2025）和 Dawn Mitchell（首席人力资源官）。Cross 来自 Reltio、Appian、Google
              Cloud 和 Salesforce，拥有 20 多年企业级商业化经验，也有在 IPO 和并购节点扩张收入组织的记录。January 31, 2024，Dragos 任命 William J. “Bill”
              Fehrman 和 Ekta Singh-Bushell 加入董事会。Fehrman 曾任 Berkshire Hathaway Energy（BHE）总裁兼
              CEO，仍参与关键基础设施网络安全政策。Singh-Bushell 曾在 Federal Reserve Bank of New York 和 Ernst &
              Young（EY）担任高管，并具备审计、风险、合规和安全方面的董事会经验。Robert M. Lee 是 Dragos
              及其工业网络安全实践的核心门面，关键人风险偏高；一旦他离开或角色弱化，品牌资产、客户关系，以及公司在使命驱动文化下吸引人才的能力都会受到实质影响。Dragos 仍为私营公司，治理结构不需要公开披露。
