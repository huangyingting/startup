      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Dragos 的平台交付模式是云端管理 + 本地传感器部署，形成双重运营依赖：SaaS 管理层和 WorldView 情报更新需要云可用性，客户现场的 Dragos Network Sensors
              需要本地硬件持续运行。云基础设施一旦长期中断，客户就无法收到更新后的威胁情报，在活跃 OT 威胁活动期间可能出现检测缺口。


              Dragos 的事件响应能力构成结构性运营风险。全球能够可信应对复杂 ICS 事件的供应商很少，公司是其中之一。如果两个或更多重大 ICS 事件同时发生，Dragos 的 IR
              团队容量可能被耗尽，造成服务级别失守。WorldView 威胁情报飞轮又形成强化依赖：准确性取决于已部署客户群的活跃传感器遥测，也就是说新部署一旦停滞，直接削弱 Dragos 最核心差异化的情报质量。


              Dragos 的分布式、远程优先员工模式覆盖美国 40+ 个州和多个国际办公室。它降低了设施集中度风险，但增加了沟通开销。公司的技术团队需要与 Booz Allen
              Hamilton、Accenture、Deloitte 争夺资深 OT 安全工程师；Dragos 上市前股权薪酬流动性较差，又放大了人才流失风险。
