      - number: '5.5'
        title: 社区防御——Neighborhood Keeper、CDP、OT-CERT 与 ISAC 伙伴关系
        blocks:
          - type: paragraph
            body: >
              Dragos 的社区防御策略，使其区别于任何 IT 安全厂商和大多数 OT
              安全竞争者。公司建立了三个不同的社区项目，产生网络效应——每个参与者都会让所有参与者更安全——同时为较小公用事业构成长线客户获取漏斗；这些组织安全项目成熟后，可能升级为付费平台订阅。

              Neighborhood Keeper 是面向所有 Dragos Platform 客户的免费自愿加入匿名威胁情报共享网络。它采用双重匿名化：组织 ID
              不会映射到连接证书，因此参与者可以共享威胁遥测，而不暴露数据来自哪家组织。Knowledge Packs 会自动分发给所有参与者，确保某家公用事业观察到的威胁指标，可以在数小时内被 84+
              家参与公用事业全部阻断。Neighborhood Keeper 合作伙伴包括面向电力行业的 North American Electric Reliability Corporation
              E-ISAC、面向油气行业的 ONG-ISAC，以及面向下游天然气的 DNG-ISAC。

              OT-CERT（OT Cyber Emergency Readiness Team）是 Dragos 面向资源不足 ICS/OT 运营方的免费社区。截至 2025 年 3 月，OT-CERT 在 64 个国家拥有
              2,400 多名成员，向他们提供免费的操作指南、桌面演练模板、培训材料和互动工作会。OT-CERT 可免费加入，是 Dragos 覆盖面最广的漏斗顶部社区参与机制。

              Community Defense Program（CDP）是三者中最定向的项目。它向符合条件的美国和加拿大水务、电力、天然气公用事业提供永久免费的 Dragos Platform 软件、Neighborhood
              Keeper 和 OT-CERT 会员资格，条件是年收入低于 $100M USD。CDP 于 2023 年 12 月在美国启动，2025 年 3 月扩展到加拿大，由 Elastic 合作支持；Elastic
              免费提供 Elasticsearch，以支撑平台部署。这些小型公用事业往往是勒索软件和民族国家侦察最容易下手的目标；CDP
              服务这一使命，同时在运营方中建立品牌忠诚度。随着这些组织成长，相关人员未来可能成为决策者或客户背书。
            claimRefs:
              - CE025
              - CE026
              - CE027
              - CE028
      - number: '5.6'
        title: 生态、伙伴计划、合规支持与平台缺口
        blocks:
          - type: paragraph
            body: >
              Dragos 的销售生态包括 100 多家渠道合作伙伴，覆盖托管安全服务提供商、系统集成商和技术经销商。Dragos Global Partner Program 于 2023 年 6
              月启动，是唯一把技术、威胁情报、专业服务和培训纳入同一计划的 OT 渠道项目。它在 2024 年获得 5-Star CRN Partner Program 评级，Dragos 渠道副总裁也入选 2024 CRN
              Channel Chief。合作伙伴包括 Booz Allen Hamilton、Optiv、CyberCX 等全球公司，也包括 1898 & Co.、ABS Group 等专业 OT 公司。

              战略技术集成不止 Microsoft 和 AWS。平台包含面向主要 SIEM 平台的连接器，并与安全编排工具集成。Dragos Platform MCP Server 于 2025–2026 年推出，使企业 AI
              工具可以直接连接平台数据，让组织用既有 AI 环境查询 OT，而不要求用户学习新界面。

              NERC CIP 合规是电力公用事业客户的重要使用场景。Dragos Platform 的被动监控方式与 NERC CIP-015 内部网络安全监控要求一致，平台生成的事件日志和告警也兼容 CIP
              审计文档。Dragos 服务团队的 Architecture Reviews 帮助客户把部署映射到 CIP 控制要求，从而降低合规负担。

              关键平台缺口包括：截至 2026 年 5 月，尚无确认的 FedRAMP 授权。这会阻止 Dragos 在没有额外采购绕道的情况下竞争美国联邦机构 OT 安全合同。公司没有发布 FedRAMP
              路线图或时间表。此外，虽然 Platform 3.0 已提供 AI 增强漏洞分析和自然语言查询，但这些 AI 功能在规模化场景下的准确性和企业采用度仍未验证。最后，Dragos 平台运营没有确认公开的 SOC 2
              Type II 或 ISO 27001 认证，这可能成为部分企业安全买家的采购门槛。
