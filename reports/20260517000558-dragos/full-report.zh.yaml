        - id: N2
          label: 情报护城河
          detail: 21+ 个 ICS 威胁组织、WorldView 平台、社区飞轮（OT-CERT、Neighborhood Keeper）
        - id: N3
          label: 财务不透明风险
          detail: 4.5+ 年未披露 ARR/烧钱速度；2023 年融资失败；现金跑道未知
        - id: N4
          label: 估值区间
          detail: 悲观 .5-1.7B；基准 .0-2.5B；乐观 .5-3.5B——全部取决于未披露 ARR
        - id: N5
          label: 入场纪律
          detail: 估值低于 .0B 且确认 ARR 高于 0M、增长 25%+；先半仓；满仓需要治理修复
        - id: N6
          label: 继续研究 / 条件跟踪
          detail: 未披露财务前不启动投资；设置监控触发器；Series E 公告时重新评估
      edges:
        - from: N1
          to: N4
        - from: N2
          to: N4
        - from: N3
          to: N4
        - from: N4
          to: N5
        - from: N5
          to: N6
    approximationNotes: 该流程代表分析师判断框架。决策权重（监管顺风 vs 财务不透明）是定性判断，并非精算。财务不透明风险节点主导推荐结果——这并不常见，反映一家 .7B 私营公司在 Series D 后没有任何财务披露的特殊不透明性。
    claimRefs:
      - CV001
      - CV007
      - CV008
      - CV013
      - CV014
      - CV015
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: Dragos 在不同 ARR 假设和远期收入倍数下的隐含企业价值，展示未披露财务带来的巨大估值不确定性。
    data:
      items:
        - label: 0M ARR x 28x（悲观下限）
          value: 1120
        - label: 0M ARR x 30x（悲观基准）
          value: 1500
        - label: 0M ARR x 22x（基准情景）
          value: 1760
        - label: 0M ARR x 25x（基准高位）
          value: 2250
        - label: 00M ARR x 28x（乐观基准）
          value: 2800
        - label: 30M ARR x 27x（乐观高位）
          value: 3510
    approximationNotes: >-
      所有 ARR 数值均为分析师估计；Dragos 未披露 ARR。倍数假设基于 2023-2026 年私营市场中增长率相当的可比网络安全 SaaS 公司。2021 年峰值倍数（40-60x
      ARR）不适用；倍数压缩之后，带监管顺风的成长型 OT 安全 SaaS 远期 ARR 倍数区间为 20-30x。所示数值单位为百万美元。
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 相对 .7B Series D 参考价，列出乐观、基准、悲观情景的回报区间；情景加权预期区间反映财务不透明折价。
    data:
      items:
        - label: 悲观情景
          low: -12
          high: 0
        - label: 基准情景
          low: 18
          high: 47
        - label: 乐观情景
          low: 47
          high: 106
        - label: 情景加权预期区间
          low: 10
          high: 35
    approximationNotes: >-
      回报按 .7B Series D 参考入场价计算。悲观情景：.5-1.7B 区间意味着 -12% 到持平。基准情景：.0-2.5B 意味着 +18% 到 +47%。乐观情景：.5-3.5B 意味着 +47% 到
      +106%。情景权重：悲观 22%、基准 57%、乐观 21%——较高悲观权重反映财务不透明和 2023 年融资失败信号。回报代表企业价值升值，不是 IRR；退出时间和稀释未建模。
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 投委会评分卡按 1-10 分评价 Dragos 的七个维度：市场机会、产品验证、竞争护城河、财务质量、风险画像、估值入场和证据质量。
    data:
      items:
        - label: 市场机会
          value: 8/10
          detail: OT 安全市场到 2030 年以 16.5% CAGR 从 3.5B 增至 0.3B；监管强制要求带来刚性需求；Dragos 在其中可触达的 TAM 为 -5B
        - label: 产品验证
          value: 7/10
          detail: NERC CIP 专长、21+ 个威胁组织、Gartner 同行评价正面，社区项目证明产品粘性；因不透明，规模化财务证明缺失
        - label: 竞争护城河
          value: 7/10
          detail: ICS 威胁情报深度是真正护城河；WorldView 传感器飞轮继续加固；Microsoft 免费层挤压入门级市场（中等担忧）；OT 原生专精具备耐久性
        - label: 财务质量
          value: 3/10
          detail: ARR、烧钱速度、利润率均未披露；2023 年融资失败是负面信号；估计 ARR 为 0-100M（不透明导致区间很宽）；社区项目成本结构未知
        - label: 风险画像
          value: 4/10
          detail: 高：关键人物（Robert Lee）、财务不透明、融资失败、Rockwell 冲突、投资方-客户集中、Microsoft 竞争威胁
        - label: 估值入场
          value: 5/10
          detail: .7B 参考价在基准情景下可辩护，但不便宜；悲观情景意味着持平到下行；没有财务确认时，参考价缺乏安全边际
        - label: 证据质量
          value: 3/10
          detail: 主要证据缺口：无财务披露、无股权结构表、无董事会构成、无 2021 年后客户名单确认、无 ARR 增长数据
    approximationNotes: >-
      分数是分析师按 1-10 分做出的定性判断。财务质量和证据质量分数反映一家 .7B 私营公司在 Series D 后没有财务披露的根本不透明性。如果财务披露确认基准情景，这些分数会显著改善。市场机会分数反映
      MarketsandMarkets、IDC 和 Mordor Intelligence 的 OT 安全市场规模测算。
    claimRefs:
      - CV001
      - CV008
      - CV013
      - CV014
      - CV016
      - CV037
      - CV038
      - CV039
      - CV040
