      - number: '6.4'
        title: 地域客户存在与国际扩张
        blocks:
          - type: paragraph
            body: >
              Dragos 的地域扩张策略采用枢纽—辐射模式：在高价值市场建立直接存在，在相邻市场依靠合作伙伴覆盖，并借助社区项目在直接商业销售之前提前建立品牌认知。

              北美仍是主要商业市场。英国办公室于 2021 年 10 月建立，截至 2023 年 7 月已在欧洲拥有 25 名全职员工，由 AVP Tony Atkins（英国 / 欧洲）、Chief of Staff
              Phil Tonkin（能源行业 23 年）、IR Director Kai Thomsen（前 Audi、钢铁行业）和 Technical Director Magpie Graham（前 Microsoft
              intelligence）领导。2022 年 6 月在伦敦举办的首届 Dragos European Forum 吸引了来自 16 个国家约 150 名 OT
              资产所有者和运营方——这证明区域内有实战人员需求，但也反映该市场仍处早期社区阶段，而不是成熟商业足迹。

              UAE OT Cybersecurity Centre of Excellence（CoE）与 UAE Cyber Security Council 合作建立，并在 “Make it in Emirates”
              论坛下宣布（2026 年 3 月），让 Dragos 在 GCC 区域拥有实体存在。CoE 为实战人员提供真实世界 OT
              攻防场景，既是培训场地，也是面向区域能源、石化和公用事业等关键基础设施运营方的客户获取资产。

              2026 年 4 月，Dragos 任命 Kaori Nieda 为首任日本 Country Manager，日本扩张随之加速；这建立在既有 Macnica
              分销合作之上，该合作覆盖日本关键基础设施和制造业。Dragos 也在澳大利亚和新西兰保持商业存在，这一点在 Series D 公告和组织材料中均有提及。

              关键地域尽调缺口：Dragos 没有公开披露按地区划分的收入或客户数量。欧洲业务到 2023 年已有 25+ 名员工，但商业客户基础规模未披露。中东业务在 Series D
              公告中被提及，但没有公开具体客户名称或商业指标。
