              - CU011
          - type: callout
            title: 私人公司不透明导致客户增长和留存无法验证
            body: >
              Dragos 未披露客户数、ARR、NRR、GRR 或流失数据；唯一披露的增长指标（截至 2021 年 9 月 30 日期间同比 >100%）已经超过四年。2023 年裁员和融资尝试失败，是 2021
              年之后增长轨迹的唯一间接证据，并指向显著放缓。 如果不对客户指标做一手尽调，任何投资逻辑里的留存假设都完全无法验证。对私人公司来说这不是罕见风险，但在这里 尤其尖锐，因为估值（2021 年最后定在
              $1.7B）建立在峰值增长和已经消失的市场环境上。
