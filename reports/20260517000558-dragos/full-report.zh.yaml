      - number: '2.5'
        title: 附录
        blocks:
          - type: callout
            title: 监管顺风把可选支出转为强制支出
            body: >
              电力公用事业的 NERC CIP-015-2 INSM 要求、TSA Pipeline Security Directives、AWIA 2018 水务公司评估，以及覆盖关键基础设施行业的 CISA
              绩效目标，正在把 OT 安全支出从可选项变成合规必需项。这一结构性变化压缩销售周期，也提供多年预算可见性，支撑 Dragos 的企业销售动作和经常性订阅模式。
            calloutType: strength
            claimRefs:
              - CM027
              - CM028
              - CM029
          - type: callout
            title: 市场规模口径分化使估值对标更难
            body: >
              OT 安全市场 TAM 估计从低于 $10B（仅 CPS 平台软件）到 $23.5B+（包含硬件和服务的宽口径 OT 安全）不等。Dragos 的 $1.7B Series D 估值（2021）隐含一个 ARR
              倍数，但锚定的市场范围并不清晰。没有披露收入时，任何 SAM 渗透率分析都带有推测性；以 $1.7B 锚点（如今已陈旧五年）为基础支付过高价格的风险是实质性的。
            calloutType: risk
