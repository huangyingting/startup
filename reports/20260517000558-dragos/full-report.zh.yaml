      - number: '5.7'
        title: 证据要点
        blocks:
          - type: callout
            title: OT 原生架构和 26 组威胁情报构成持久护城河
            body: >
              Dragos 的 600+ 协议解析器库，以及被动优先、无代理的 OT 监控架构，专门为工业环境构建——不是从 IT 安全工具改造而来。这个技术底座叠加近十年 OT 专用威胁情报，覆盖 26
              个命名攻击者组织（包括唯一调查过 CRASHOVERRIDE、TRISIS 和 PIPEDREAM 的商业团队），形成了 IT 安全厂商无法靠简单进入 OT 市场就复制的护城河。Intelligence
              Fabric 建立在一线 OT 事件响应数据之上，是一个会随每次服务项目而改善的专有知识库；相较缺少同等 OT 服务深度的竞争对手，它带来复利优势。Gartner Peer Insights
              评论持续提到，实战人员选择 Dragos，是因为竞争对手本质上是“贴了 OT 标签的 IT”——这反映的是真实技术和情报差异，而不是营销定位差距。
            calloutType: strength
            claimRefs:
              - CE001
              - CE002
              - CE014
              - CE015
              - CE016
          - type: callout
            title: FedRAMP 缺口限制美国联邦与高监管行业 TAM
            body: >
              截至 2026 年 5 月，Dragos 尚未确认 FedRAMP 授权，因此无法进入美国联邦机构 OT 安全采购——随着机构响应 CISA 强制要求和关键基础设施行政令，这是一类重要且增长中的预算。没有
              FedRAMP，DOE、DOD、EPA 等机构无法通过标准渠道为联邦运营的 OT 环境采购 Dragos。Dragos 没有披露 FedRAMP 路线图或时间表，而取得授权通常需要 12–24
              个月准备。这个缺口给面向联邦的 OT 安全 TAM 设置了天花板，也可能让已有 FedRAMP 授权的竞争者在 Dragos 参赛前先行站稳。
            calloutType: risk
            claimRefs:
              - CE021
              - CE034
              - CE035
          - type: callout
            title: AI 分析师工作流功能尚早，大规模准确性未验证
            body: >
              Platform 3.0 引入、并在 2026 年扩展的 AI 增强漏洞分析和普通英文 OT 环境查询功能，是 Dragos 对全行业 AI 辅助安全运营趋势的回应。但这些能力在 2025–2026
              年才发布，企业采用数据和规模化准确性基准并未公开。OT 环境高度具体；如果 AI 对 OT 查询给出不准确响应，可能导致优先级判断错误，并带来安全后果。Microsoft 和其他 IT 原生厂商拥有大得多的 AI
              基础设施和工程团队，可能比 Dragos 扩展自身 AI 能力更快地缩小 OT AI 差距。Intelligence Fabric 护城河提供了一定保护，但 Dragos 必须证明 AI
              工作流准确性有可量化提升，才能守住这一定位。
            calloutType: risk
            claimRefs:
              - CE020
              - CE029
              - CE033
  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础与工业垂直细分
        blocks:
          - type: paragraph
            body: >
              Dragos 服务于九个公开确认垂直行业中的工业资产所有者和运营方：电力公用事业、油气、制造、水务与污水、化工、制药、食品饮料、交通和采矿。采购画像分三类。企业商业层由拥有专门 OT
              安全预算的大型工业组织构成（例如全国性公用事业、全球制造商、Fortune 500 能源公司），它们购买完整 Dragos Platform，并叠加 WorldView
              情报和专业服务。中端市场和专业层包括中型工业企业与公共部门运营方，采购路径通常是渠道合作伙伴、托管服务提供商或国家网络安全项目。社区层则包括 Community Defense
              Program（CDP）成员、OT-CERT 成员和 Neighborhood Keeper 参与者，作为 Dragos 集体防御使命的一部分，获得免费或高度补贴的访问。

              电力行业是 Dragos 公开材料最充分的垂直。公司与 North American Electric Reliability Corporation 的 E-ISAC 共同推进集体防御计划，覆盖 84+
              家公用事业，代表美国超过 70% 的电力公用事业客户。油气买家受益于 ONG-ISAC Neighborhood Keeper
              合作，该合作把全行业威胁可视化延伸到北美石油行业所有会员公司。制造业也已确认：Koch Industries 旗下 Georgia-Pacific 子公司（160+ 个地点）和 Boston Beer
              Company 都是具名生产客户。水务行业通过 CDP 覆盖，重点服务无力承担商业定价、资源不足的水务公用事业。

              地域覆盖包括北美（主要市场）、英国（截至 2023 年 7 月有 25 名 FTE）、欧洲大陆（首届 European Forum 覆盖 16 国）、阿联酋（2026 年 3 月建立 OT
              Cybersecurity Centre of Excellence）、日本（2026 年 4 月任命 Country Manager），以及澳大利亚 / 新西兰。中东（GCC、沙特阿拉伯）在 Series D
              融资公告中被提及，说明公司已有直接接触。渠道合作伙伴——包括 Booz Allen Hamilton、Optiv、CyberCX 在内的 100+ 家公司——把覆盖范围延伸到 Dragos
              直接人员之外的所有区域。
