  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Dragos 所处监管环境既是顺风，也是风险来源。NERC CIP（Critical Infrastructure Protection）标准 CIP-002 至 CIP-014
              要求大电力系统运营方为工业控制系统落实安全控制，不合规罚款最高可达每项违规每天 $1M。这一强制要求为 Dragos 的核心客户群创造了非可支配预算义务。CISA Volt Typhoon
              咨询通告（AA24-057A，2024 年 2 月）和 PIPEDREAM 联合通告（AA22-103A）都明确建议配置 OT 专用监测和检测能力。TSA Pipeline Security
              Directives（SD-02C，延长至 2025 年）同样要求管道运营方调整 OT 安全架构。


              监管风险不是要求会消失，而是监管变化节奏会让买家陷入停滞。NERC CIP 标准更新时（例如 CIP-013 在 2022
              年针对供应链安全更新），公用事业公司可能会推迟可支配支出，等待合规团队评估新要求。此外，如果 Dragos
              的威胁情报出版物中任何归因或技术主张被证明错误，而受监管实体又在事件响应中依赖它，公司会暴露在责任风险下。


              截至 2026 年 5 月，Dragos 没有披露重大诉讼。2023 年 5 月，一个网络犯罪团伙通过社会工程获得新入职员工账号访问权，并试图用下载的销售情报报告勒索 Dragos。CEO Robert Lee
              在社交媒体上公开披露该事件。NERC CIP-013 供应链风险管理要求可能要求 Dragos 客户在合同续约时开展正式供应商安全评估。
