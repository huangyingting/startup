    title: 公司里程碑时间线
    type: timeline
    summary: Dragos 自 2016 年由政府实务人员创立，到 $1.7B Series D 轮和 2026 年 Gartner Leader 评级的历程，其中包括 2023 年裁员这一负面事件。
    data:
      items:
        - date: '2016'
          label: Dragos 成立 – 平台、威胁情报、专业服务推出
          detail: 由前 NSA/USAF 网络作战人员创立；在巴尔的摩—华盛顿走廊的 DataTribe 孵化
          tone: positive
        - date: '2017'
          label: TRISIS/TRITON 分析 – 确立全球 ICS 威胁权威地位
          detail: Dragos 分析首个专门针对 ICS、旨在造成物理安全故障的恶意软件
          tone: positive
        - date: '2019'
          label: 全球总部在 Hanover, MD 启用；国会作证
          detail: CEO Robert Lee 在国会作证；总部建成专用 ICS 网络靶场
          tone: positive
        - date: '2020'
          label: Neighborhood Keeper 上线；扩展到英国、APAC、中东
