          tone: positive
        - date: 2021-10
          label: Series D 轮 — $200M，估值 $1.7B；史上最大 OT 网络安全融资
          detail: Koch Disruptive Technologies 和 BlackRock 共同领投；战略投资者包括 Rockwell Automation、Emerson、HPE
          tone: positive
        - date: '2022'
          label: 获得 CNA 资格；签署 Aramco MOU；Community Defense Program
          detail: CVE 编号机构资格；借 Aramco MOU 进入沙特市场；CDP 覆盖水务 / 电力 / 燃气
          tone: positive
        - date: 2023-06
