      - number: '8.4'
        title: 投资逻辑破裂与监测
        blocks:
          - type: paragraph
            body: >
              Dragos 投资的主要破裂条件，是以低于 .0B 估值完成 Series E——这意味着较 Series D 参考价下跌超过 40%，也意味着业务被根本重估。次要破裂触发因素包括：大型 IT
              安全平台（Microsoft 或 Palo Alto Networks）推出价格低于 Dragos 企业客户平均合同价值的 OT 安全捆绑包；Dragos 在没有宣布新股权融资的情况下裁员；或 Robert M.
              Lee 离职且没有预先宣布过渡计划。


              会正向更新投资判断的监测指标：(1) 以 .0B+ 估值确认完成 Series E，可验证基准情景并支持建仓；(2) 任何 ARR 披露（自愿披露，或如果 Dragos 推进 IPO /
              直接上市，则来自监管文件）确认增长高于 30%；(3) Dragos 宣布 IPO，这会要求足以解决多数证据缺口的财务披露；(4) 与 Fortune 100 关键基础设施运营方宣布重大企业 OT
              安全合同，且该客户尚未出现在已披露客户名单中。会负向更新判断的指标：(1) 第二次裁员；(2) 关键高管离职（SVP Research、SVP Sales、CTO）；(3) Claroty 或 Nozomi
              赢下一个具名 Dragos 客户账户。


              建仓确信阈值：入场前要求 (a) 确认 ARR 高于 0M，过去 12 个月增长高于 25%；(b) 确认现金跑道超过 18 个月，或宣布新融资；(c) 估值处于或低于 .0-2.5B
              基准情景。满仓还需要解决董事会治理不透明，以及 Rockwell 投资人兼客户利益冲突。
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
