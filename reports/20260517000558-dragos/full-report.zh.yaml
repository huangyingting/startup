          - type: callout
            title: 财务风险报告量化 $329.5B 需求信号
            body: >
              Dragos 与 Marsh McLennan 2025 OT Security Financial Risk Report 估计，全球最坏情形 OT 网络损失每年
              $329.5B。这个数字由一家一线保险和风险咨询机构联合产出，既是市场开发资产，也是支持 OT 安全投资的量化论据。OT 安全市场支出 $23.5B，对应财务风险 $329.5B，保护支出与风险之比约
              7%，说明市场结构性保护不足；随着风险意识提高，市场很可能显著增长。
            calloutType: insight
            claimRefs:
              - CM007
