  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: Dragos 客户从初始 OT 事件或威胁认知，到完整平台部署和社区嵌入，共经历六个阶段；图中展示直销和社区获客动作。
    data:
      nodes:
        - id: awareness
          label: 认知 / 触发
          detail: OT 事件（ICS 遭勒索软件攻击、检测到民族国家扫描）、监管要求（NERC CIP、CISA 通告）或行业同行背书制造紧迫感。Dragos 威胁情报报告或 OT-CERT 警报常会点燃需求。
        - id: evaluation
          label: 评估
          detail: >-
            Dragos Platform 概念验证或架构审查。评估竞争对手（Claroty、Nozomi、Microsoft Defender for IoT）。采购团队常拿 Gartner Magic Quadrant
            领导者位置作背书。渠道合作伙伴（如 Booz Allen、Optiv）介入。
        - id: pilot
          label: 试点 / 评估
          detail: OT 网络安全评估、架构审查，或在一个设施 / 网段小范围部署平台。试用 WorldView 威胁情报。复杂 OT 环境里，典型试点周期为 3–9 个月。
        - id: deploy
          label: 平台部署
          detail: 在 OT 网段布置传感器。针对站点特定 ICS 设备调优协议解析器。与 SIEM（Sentinel 或其他）集成。培训 OT 安全团队。AWS 或 Azure SaaS 部署选项可用（2023+/2026+）。
        - id: expand
          label: 扩展与集成
          detail: >-
            增加 WorldView 情报订阅。加入 Neighborhood Keeper。升级到 OT Watch 或 OT Watch Complete 托管服务。增加 Incident Response
            Retainer。扩展到更多工厂站点或地区。与 Axio 集成以量化风险。
        - id: embed
          label: 社区与战略嵌入
          detail: >-
            通过 Neighborhood Keeper 参与 ISAC 集体防御。作为 Dragos 销售参考客户。为较小公用事业供应链伙伴提供 CDP 赞助。续签多年平台合同。借 Insights Hub
            的风险可视化向董事会报告。
    approximationNotes: 旅程阶段为定性判断，来自 Dragos 平台文档、服务描述、合作伙伴项目材料和具名客户证言。Dragos 未公开披露各阶段之间的具体转化率。
    claimRefs:
      - CU002
      - CU027
      - CU028
