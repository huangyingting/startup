      - number: '7.6'
        title: 投资逻辑破裂触发条件与终止标准
        blocks:
          - type: paragraph
            body: >
              Dragos 的投资逻辑建立在三根支柱上：(1) 监管和地缘政治顺风，为关键基础设施运营方创造非可支配 OT 安全预算；(2) 威胁情报深度（21+ 个命名 ICS 威胁组织、PIPEDREAM/Volt
              Typhoon 专长、WorldView 平台）构成抵御 IT 原生竞争对手的可防守护城河；(3) 社区漏斗（OT-CERT、Neighborhood
              Keeper、CDP）形成未来商业客户管线，并随时间降低获客成本（CAC）。每根支柱都有不同的终止标准。


              监管顺风方面：如果 NERC CIP 执法姿态逆转，或 CISA 政策转向技术中立框架，推动 Dragos
              管线的紧迫性溢价会下降。考虑地缘政治威胁环境，这一概率较低，但在重大政治转向下结构性存在。情报护城河方面：如果 Microsoft、Palo Alto 或政府情报机构以免费可访问格式发布等效 OT
              威胁情报，WorldView 订阅模式会承受严重压力。社区漏斗方面：如果 OT-CERT、CDP 和 Neighborhood Keeper 在 24-36
              个月内无法以商业上有意义的比例转化，社区项目成本就会变成没有 ARR 收益的拖累。


              最可执行的投资逻辑破裂标准是财务：Dragos 必须在重组后现金跑道耗尽前，以至少 $1.5B 估值完成 Series E。若下轮估值低于 $1.0B，将较 Series D 入场点下跌超过
              40%，对所有现有投资人都构成投资逻辑破裂。第二个标准是一次归因于 Volt Typhoon 的破坏性 ICS 攻击，同时压垮 Dragos 的 IR 能力，并损害公司在准备度上的声誉。
