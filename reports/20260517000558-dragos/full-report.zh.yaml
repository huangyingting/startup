  - id: TE002
    title: OT 工作流 / 用例表 — Dragos Platform 的运营实践
    columns:
      - 操作方待完成任务
      - 当前挑战
      - Dragos 解决方案
      - 可衡量收益
      - 已知限制
    rows:
      - - 在不扰动运营的情况下发现并盘点 OT 资产
        - 传统 OT 环境缺少集中资产登记；IT 工具无法解析 OT 协议
        - 用 600+ 协议解析器做被动网络发现 + 面向隔离站点的 Active Collection
        - 无需安装 Agent，也不造成生产停机，即可完成 OT/IT/IoT 资产盘点
        - 准确性取决于传感器部署位置；部分厂商专有协议可能需要定制解析器
      - - 在 OT 专用威胁造成运营中断前发现它们
        - IT SIEM 工具未针对 ICS 调优，告警疲劳严重；分析师缺少 OT 上下文，难以分诊
        - 针对 ICS TTP 调优的行为分析、配置监控和 Knowledge Pack 检测
        - 具备 OT 可视化的组织平均 5 天遏制 OT 勒索软件，行业平均为 42 天
        - 尚无独立第三方发布检测精确率 / 召回率基准；驻留时间对比来自公司自报
      - - 在不危及生产正常运行的情况下确定漏洞优先级并修复
        - 数千个 CVE 缺少 OT 上下文；CVSS 分数不能反映运营或生产安全风险
        - Now/Next/Never 框架结合 OT 校正 CVSS；专家制定 OT 安全的替代修复方案
        - 只有约 2-6% 的 CVE 被标记为需立即处理，大幅减少分析师噪声
        - 覆盖度取决于 Dragos 分析师产能；新披露的 ICS CVE 可能比 NVD 滞后数天到数周
      - - 用 OT 专门能力响应 OT 网络事件
        - 缺少 OT 专用 IR 处置手册；IT IR 团队缺乏 ICS 流程知识，难以安全恢复
        - Rapid Response Retainer 配 OT 专家响应人员；预先审批合同；桌面演练
        - 预先审批的预付服务缩短动员时间；OT 取证在不扰动流程的情况下保全证据
        - 预付服务价格、容量和 SLA 条款未公开披露；多客户事件同时发生时，容量可能受限
      - - 为电力公用事业 OT 环境证明 NERC CIP 合规
        - 不同变电站和发电环境面对复杂 CIP 要求，文档负担重
        - 平台被动监控对齐 CIP-015 INSM；Architecture Reviews 用于评估 CIP 缺口
        - 平台日志生成兼容 CIP 审计的证据；Architecture Reviews 将控制项映射到具体 CIP 要求
        - Dragos 支持 CIP 项目，但不保证通过认证；服务项目会在平台订阅之外增加成本
    notes: 5 天 vs. 42 天的勒索软件驻留时间来自 Dragos 2026 OT/ICS Cybersecurity Report。其他收益是基于 Dragos 官方文档和从业者评论的定性评估。
