      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 反向：4.5+ 年无财务披露——估值精度受阻
            body: >-
              自 2021 年 10 月 Series D 以来，Dragos 没有披露 ARR、烧钱速度、收入增长或现金余额。以公司所处阶段和规模看， 这在结构上并不寻常。缺少这些数据，整套估值分析只能建立在估计
              ARR（0-100M 区间）和市场倍数之上。没有财务披露， 新投资人无法负责任地在 .7B 以上建仓。2023 年融资失败让这种不透明更令人担忧，而不是更不令人担忧。
            calloutType: insight
            claimRefs:
              - CV016
              - CV031
              - CV032
              - CV033
              - CV034
          - type: callout
            title: 反向：Rockwell Automation 投资人兼客户利益冲突
            body: >-
              Rockwell Automation 同时是 Dragos 投资人（Series D）、具名客户，也是 Claroty（Dragos 的主要 OT 安全竞争对手） 的战略投资人。这一未披露冲突在 Dragos
              客户关系和董事会治理结构中都制造了关联方交易风险。投资人在建仓前，应要求 公司提供正式回避政策，并披露任何 Dragos-Rockwell 合同安排。
            calloutType: insight
            claimRefs:
              - CV006
