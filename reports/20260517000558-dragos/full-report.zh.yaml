        - 将其作为投资条款清单条件向管理层索取
      - - 烧钱速度与现金跑道
        - 按成本类别划分的月度烧钱速度（R&D、S&M、G&A、服务）；当前现金余额；信贷额度
        - 缺少烧钱数据，无法评估 Series E 轮紧迫性或困境融资概率
        - 索取 FY2022、FY2023、FY2024、FY2025 经审计财务报表（或管理账）
      - - 2023 年融资失败细节
        - 哪些投资者放弃；目标估值是多少；向潜在投资者呈现的增长率是多少
        - 理解 2023 年叙事，是判断复苏与持续减速价值差异的关键
        - 直接询问管理层；创始人 / 投资者访谈（背景访谈）
      - - 股权结构表与优先股堆叠
        - 完整股权结构表及经济所有权；清算优先权结构和反稀释条款；任何老股交易
        - 新投资者以 .7-2.5B 入场的回报建模，高度取决于优先权包袱
        - 在数据室中索取股权结构表
      - - 治理与董事会构成
        - 完整董事名单；委员会章程；Rockwell 回避政策；关联交易登记册
        - Rockwell 作为投资者兼客户的利益冲突未披露、未缓释；关联交易影响估值
        - 索取治理文件及任何现有利益冲突政策
      - - Series E 轮时间线与条款
        - Dragos 是否在主动推进 Series E？目标估值和时间线是什么？是否有桥接融资？
        - Series E 状态决定现金跑道，以及被迫融资与自愿融资事件的概率
        - 管理层访谈；跟踪监管披露和新闻稿中的融资信号
