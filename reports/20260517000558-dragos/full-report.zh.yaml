      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              Dragos Platform 3.0 是核心竞争产品，强调三项 Dragos 声称竞争者无法在同等 OT 深度匹配的能力：（1）检测内容，包含 2,900+ 条映射到 MITRE ATT&CK for ICS
              技术的行为分析，源自工业环境中活跃事件响应案例；（2）OT 原生威胁情报，跟踪 26 个具名对手组织，支持战术级 TTP 映射、行动关联和早期预警报告；（3）Neighborhood
              Keeper，这是一个匿名威胁共享覆盖网络，覆盖 84+ 家公用事业公司，代表超过 70% 的美国电力客户。MITRE ATT&CK Evaluations for ICS（Dragos 展示了对模拟
              XENOTIME/TRITON 及相关 ICS 定向攻击的检测）提供了第三方检测有效性验证，竞争者尚未在同样深度复制。


              Claroty 的主要平台（Claroty Platform / xDome for OT、Medigate for healthcare）覆盖更广的网络物理资产范围：OT、医疗（医疗设备）和商业楼宇 OT
              系统。Team82 研究人员已发布超过 50 个 CVE，研究覆盖 OT、医疗和商业楼宇协议，使 Claroty 的漏洞研究覆盖面宽于 Dragos（仅 OT）。Claroty
              与医疗专属工作流集成（Medigate 用于临床资产管理），形成 Dragos 明确不参与的差异化。


              Nozomi Networks 的 Vantage 平台以被动监控模式下的实时 AI/ML 异常检测差异化，并声称通过机器学习基线建模降低误报率。Nozomi 还与 Azure Sentinel、Splunk 和
              IBM QRadar 集成以实现 SIEM 汇聚，集成组合与 Dragos 类似。Hg Capital 收购为更多 M&A 提供了资产负债表强度（Nozomi 未披露收购后的企业或增长情况）。


              Microsoft Defender for IoT 的独特之处，是把 OT 设备发现和监控直接集成进 Microsoft 365 Defender 门户和 Azure Sentinel，让已经采用
              Microsoft 标准化的企业在同一 SIEM 工作流中统一 IT+OT 告警。这个工作流集成功能，对想整合安全工具的 IT 中心型企业买家最威胁 Dragos。不过，Microsoft Defender
              for IoT 的 OT 检测内容较浅，也没有与 Dragos 威胁组织情报或 Neighborhood Keeper 社区等同的能力。


              Dragos 相对所有竞争者仍保持的关键功能缺口，是工业事件响应品牌可信度。当 VOLTZITE、CHERNOVITE 或 ELECTRUM 攻击公用事业公司时，Dragos
              是重大已披露事件中的登记响应供应商。这种品牌联想强化平台留存，也让阅读过 Dragos 公告的公用事业公司主动进入销售漏斗。
