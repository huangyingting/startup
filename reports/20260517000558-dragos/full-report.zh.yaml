  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与替代方案
        blocks:
          - type: paragraph
            body: >
              Dragos 面向运营技术（OT）和工业控制系统（ICS）网络安全市场。这个类别在协议、风险画像、部署约束和采购节奏上都不同于 IT 安全。纳入的支出包括：面向 SCADA、DCS、PLC、历史数据库和 HMI
              系统的资产可视性与盘点管理；OT 网络监控和异常检测；ICS 专属威胁检测和行为分析；OT 漏洞管理和风险评分；工业事件响应服务；以及为 OT 对手组织和 ICS
              攻击战术专门打造的威胁情报。市场运行在工业协议之上（Modbus、DNP3、EtherNet/IP、Profinet、OPC-UA、BACnet），IT 安全工具没有专用解码器就无法解析，天然形成产品差异化边界。


              Dragos 的核心市场不包括 IT 域安全品类（端点检测与响应、身份与访问管理、云工作负载保护、Web 应用防火墙）、消费者 IoT 安全、没有关键基础设施属性的楼宇管理系统，以及不在工业 OT
              环境内运行的医疗设备网络安全。OT 安全与 IT 安全的关键区别在于，OT 风险本质上由运营和安全驱动——一次成功的 OT 攻击可能造成物理损坏、停产、环境事故或人员伤亡——而 IT
              安全风险集中在数据机密性和可用性。不同的风险画像支撑了专用工具，而不是简单延伸 IT 安全平台。


              现状替代方案和既有厂商因细分市场而异。电力公用事业过去依赖手工维护气隙隔离和 NERC CIP 合规清单；油气运营商使用 Honeywell Forge、GE Predix Security 和 Siemens
              OT 安全工具提供的专有 OEM 安全监控；制造商部署把能力延伸到 OT 的 IT 安全厂商（Claroty、Nozomi Networks、Microsoft Defender for
              IoT）；较小的水务公司和农村电力合作社往往完全没有 OT 安全工具。从现状替代方案转向专用 OT 安全平台，是 Dragos 最主要的 TAM 扩张机会。
