        - 00-130M
        - .5-3.5B
        - 15-20% -- 需要尚未公开确认的 ARR 恢复证据
        - 溢价倍数需要持续 >40% 增长证明；IPO 窗口时点风险
    notes: 本表所有 ARR 和估值数字均为分析师推断；Dragos 自 2021 年 10 月以来未披露 ARR、烧钱速度或增长率。情景概率是分析师估计，不是精算数据。2023 年融资失败事件是悲观情景概率偏高的主要依据。
