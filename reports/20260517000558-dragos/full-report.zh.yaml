      - number: '6.6'
        title: 留存韧性、负面信号与集中度风险
        blocks:
          - type: paragraph
            body: >
              Dragos 是私人公司，不披露客户数、年经常性收入（ARR）、净留存率（NRR）、总留存率（GRR） 或队列留存指标。唯一公开的增长指标是「截至 2021 年 9 月 30 日期间，平台经常性收入同比增长超过
              100%」——距今已经超过四年。缺少更新或已披露的指标，留存和增长轨迹只能从结构性因素和定性证据推断。


              支撑高留存的结构性因素：OT 安全平台部署需要大量工程投入——传感器布点、协议调优、网络集成、团队培训—— 切换成本很高。OT 环境相对 IT 环境变化更慢；平台一旦在复杂 ICS
              环境中验证通过，运营方不愿打断它。考虑到 部署复杂度和运营连续性要求，OT 安全通常采用多年合同。OT 从业者在 Gartner Peer Insights 的评价持续显示， 他们对 Dragos
              的威胁情报深度和 OT 专业能力满意度高。


              反向信号：2023 年 6 月，Dragos 在一次融资尝试失败后裁员约 9%。公司曾寻求追加资本，但未能以有利条款 达成目标，说明 2021 年的估值和增长假设没有穿越 2022-2023
              年市场环境。这不能直接证明客户流失，但意味着 平台收入增长已从 2021 年披露的 >100% 放缓到一个水平：如果没有额外资本，无法支撑公司的烧钱速度和招聘计划。


              OT 销售周期长（通常 6-18 个月，因为要经过工程审查、运营风险评估和多方审批），带来收入可预测性，也拉长了 从管线到收入的滞后。IT 安全优先事项占据大多数组织的安全预算，是持续逆风：许多 OT
              资产所有者没有专门的 OT 安全预算科目，只能从 IT 预算里为 Dragos 付款，而 IT 团队更愿意把钱花在 IT 原生工具上。


              由于没有披露客户数或收入分布数据，集中度风险难以评估。有名可查的客户证明集中在能源 / 公用事业，以及少数
              与投资人有关系的大型工业集团。水务公司、制药、交通运输、食品饮料领域的客户证明仅限于网页引用，没有公开成果。
