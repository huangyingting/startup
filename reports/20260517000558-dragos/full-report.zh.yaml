          - type: callout
            title: 较小运营方 TAM 结构上难以变现
            body: >
              服务少于 10,000 名客户的水务公司、农村电力合作社和小型制造设施，占 OT 运营方总数的很大一部分，但年度网络安全预算远低于 Dragos 的企业最低交易规模。Dragos 通过 Community
              Defense Program 和 OT-CERT（免费资源）覆盖该群体，积累好感和市场存在感，却不能从该细分市场获得直接收入。这意味着 Dragos 的商业 TAM 实质上窄于整体运营方范围。
