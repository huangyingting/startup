      - number: '6.3'
        title: 社区防御层——Neighborhood Keeper、OT-CERT 与 CDP
        blocks:
          - type: paragraph
            body: >
              Dragos 运营三个社区项目，它们共同服务庞大的非商业客户基础，并为商业平台建立长期获取漏斗。这些项目在运营上很重要：它们提供真实 OT 威胁遥测，为所有 Dragos 客户改善 Intelligence
              Fabric（网络效应），在资源不足的公用事业细分中建立 Dragos 品牌，并在小型公用事业成长或整合时播下未来商业关系的种子。

              Neighborhood Keeper 是基础性的集体防御网络。所有 Dragos Platform 客户都可以免费自愿加入；它使用双重匿名化，以机器速度聚合和分发威胁指标。截至 2021 年 10 月，84+
              家公用事业参与 E-ISAC 联合计划，代表美国超过 70% 的电力公用事业客户；ONG-ISAC 也为北美油气行业集成了 Neighborhood Keeper。DNG-ISAC
              则代表下游天然气运营方参与。这些 ISAC 伙伴关系意味着 Neighborhood Keeper 的集体可视化延伸到整个行业，而不只是 Dragos 平台客户。

              OT-CERT（OT Cyber Emergency Readiness Team）是 Dragos 面向资源不足 ICS/OT 运营方的免费社区，提供操作指南、桌面演练模板、漏洞披露和互动工作会。截至 2025
              年 3 月，OT-CERT 在 64 个国家拥有 2,400 多名成员。对买不起 Dragos 商业产品、但能受益于公司威胁情报和实战社区的组织而言，OT-CERT 是一层品牌互动入口。

              Community Defense Program（CDP）向符合条件的美国（自 2023 年 12 月起）和加拿大（自 2025 年 3 月起）水务、电力和天然气公用事业，提供永久免费的 Dragos
              Platform 软件、Neighborhood Keeper 和 OT-CERT 会员资格，条件是年收入低于 $100M USD（约 $140M CAD）。CDP 由 Elastic 合作支持，Elastic
              免费提供 Elasticsearch，以支撑大规模平台部署。加拿大渠道合作伙伴 VARS Corporation（Montreal）正在向该国符合条件的公用事业交付 CDP。CDP
              客户不产生平台收入，但会贡献威胁遥测，并代表潜在未来付费客户。
