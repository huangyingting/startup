      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              OT 网络安全最主要的需求驱动来自威胁活动升级。Dragos 的 2026 OT/ICS Cybersecurity Year in Review 跟踪到 2025 年有 119
              个活跃勒索软件组织影响工业组织，较上一年增长 49%，全球受影响工业组织达到 3,300 家。与民族国家有关的威胁组织是最复杂的需求驱动：Dragos 跟踪 26 个具名 OT 对手组织，包括
              VOLTZITE（中国关联，瞄准电力和电信基础设施）、CHERNOVITE（创造 PIPEDREAM/INCONTROLLER 恶意软件，可攻击多类工业安全系统）和 ELECTRUM（乌克兰电网攻击）；其中 11
              个组织被评估为 2025 年正主动瞄准运营技术环境。这个威胁版图与 IT 域威胁有实质差异，推动了对 ICS 专属检测和威胁情报的强需求。


              监管顺风正在加速多个行业的采用。CISA 的 Cross-Sector Cybersecurity Performance Goals 为关键基础设施保护提供了自愿但越来越常被引用的框架。NERC
              CIP-015-2 Internal Network Security Monitoring（INSM）要求明确强制大宗电力系统资产具备网络可视性和监控能力，这正是 Dragos Platform
              的核心。Transportation Security Administration（TSA）Pipeline Security Directives 要求管道运营商实施 OT 安全计划。欧盟 NIS2
              Directive 为欧洲关键基础设施运营方制造合规紧迫感。AWIA 2018 强制水务公司开展网络安全评估。多行业、多司法辖区监管叠加，是结构性的需求驱动；它把可选 OT
              安全支出转化为合规必需采购，从而缩短销售周期。


              OT 环境的数字化转型——Industry 4.0 连接、IIoT 传感器部署、云端历史数据库集成、远程访问扩张——持续扩大 OT 攻击面，也带来新的监控要求。既有厂商如果没有专用 OT
              工具，很难覆盖这些需求。这个结构性驱动对 Dragos 尤其有利，因为新的连接模式需要 ICS 专属行为基线。


              采用约束同样实质存在。OT 安全预算不成熟仍是最大约束：许多工业组织对 OT 安全仍处早期认知阶段，OT 安全预算还要与资本基础设施项目争抢同一运营预算。IT/OT 技能缺口——真正同时理解 OT
              环境和网络安全的从业者很少——限制自助式采用，也使 Dragos 的专业服务组件成为初始部署的关键。棕地 OT 环境里有遗留
              PLC、专有协议，且几乎不能容忍变更管理，部署复杂且耗时。大型公用事业和能源公司的企业销售周期长达 12–24 个月，限制收入速度。较小运营方（水务公司、农村电力合作社）的年度网络安全预算往往低于
              $50K，无法支撑商业化 Dragos Platform 部署，从而限制商业 TAM。
