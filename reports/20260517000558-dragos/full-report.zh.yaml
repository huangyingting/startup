  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              2026 年的 OT/ICS 网络安全平台市场呈现三层竞争结构。第一层（纯 OT 专家）：Dragos、Claroty 和 Nozomi Networks 共同占据 Gartner Magic Quadrant
              CPS Protection Platforms 的 Leader 象限，并争夺同一批企业公用事业和能源潜在客户。三家公司都在 2012 到 2016 年间创立，创始团队来自政府或 OT
              工程背景；竞争重点主要是平台广度、威胁情报质量、专业服务和集成生态。Claroty（2015 年创办，Team82 研究人员超过 100 人，累计融资约
              $635M）拥有最宽的网络物理系统范围，明确把医疗（医疗设备安全）和商业楼宇 OT 纳入工业 OT 之外。Nozomi Networks（2013 年创办，2023 年被 Hg Capital 以约 €600M+
              收购）以 AI 原生的被动 OT/IoT 监控深度和实时异常检测差异化，但没有 Dragos 强调的威胁情报覆盖层。


              第二层（IT 平台延伸）：Microsoft Defender for IoT 是最具破坏力的竞争力量，因为它被捆绑进 Microsoft Defender for Cloud，并与 Azure Sentinel
              集成，为现有 Microsoft 企业客户提供了很有吸引力的 IT-OT 成本整合论点。Microsoft 于 June 2020 以约 $165M 收购 CyberX，并将产品重建为 Defender for
              IoT，如今覆盖 Enterprise IoT（IT 相邻设备）和 Operational Technology（工业 SCADA、DCS、PLC）环境。与 Microsoft Sentinel 的
              SIEM/SOAR 能力、Purview 和 Azure Arc 集成，形成了纯 OT 厂商无法复制的平台相邻优势。Palo Alto Networks Strata OT Security 和
              CrowdStrike Falcon for OT 则是端点和网络安全栈向 OT 延伸的类似打法。这些厂商用 OT 深度换取 IT 集成广度和合并许可。


              第三层（OEM 原生和专门厂商）：Honeywell Forge Cybersecurity、Siemens OT Security 和 GE Vernova cybersecurity
              提供与自家自动化硬件装机基础深度集成的 OT 安全工具，在锁定客户场景下相关，但在公开市场评估中很少有竞争力。Tenable.ot（2019 年收购 Indegy）以漏洞管理深度竞争。Armis（通用
              IT/OT/IoT/医疗资产管理，2023 年估值 $4.3B，融资 $547M）和 Forescout 更依赖更广的资产可视性与 NAC 集成，而不是 OT 威胁检测。TXOne Networks（Trend
              Micro OT 安全剥离公司）和 Otorio 分别专注分段和 OT 安全评估。
