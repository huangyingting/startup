  - id: sect-roadmap
    title: "Product Roadmap and Development Trajectory"
    body: |
      Headway's product roadmap is shaped by three intersecting forces: expansion into new payer
      segments (Medicare Advantage and Medicaid), expansion into new provider types (psychiatrists
      and nurse practitioners via the prescriber module), and the maturation of its software
      platform through its first externally-hired CTO and CMO.

      The July 2024 Series D announcement explicitly cited Medicare Advantage and Medicaid expansion
      as primary capital deployment targets—segments that require distinct credentialing pathways,
      different claim formats (Medicare Part B billing), and compliance overlays (Medicare Conditions
      of Participation). The prescriber module expansion signals that Headway is moving from a
      therapy-only network toward a full outpatient behavioral health platform capable of supporting
      the complete care spectrum from talk therapy to medication management. Job postings for a
      Staff Product Designer focused on Group Practices confirm that group practice support—enabling
      multiple clinicians to operate under a single practice umbrella on the Headway platform—is
      an active product investment, which would substantially increase the average revenue per
      practice relationship.

      The AI-assisted EHR launched September 9, 2025 represents the first major product release
      under the new CTO leadership. Chief Medical Officer Dr. Neha Chaudhary, hired August 26,
      2025, adds clinical leadership capacity needed to navigate the evidence-based care
      documentation, quality metrics, and value-based care arrangements that Medicare Advantage
      and Medicaid contracts increasingly require. Looking forward, ONC FHIR interoperability
      requirements (21st Century Cures Act rule) represent a horizon compliance risk for
      Headway's EHR: if Headway's EHR reaches sufficient scale and program participation, it
      may trigger mandatory HL7 FHIR API requirements. The roadmap appears focused on deepening
      the platform's clinical and compliance capabilities rather than horizontal feature sprawl,
      which is strategically coherent given the compliance intensity of the target market.
