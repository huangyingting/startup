chapter:
  number: 5
  title: "Product & Technology"
  letter: E
  summary: >-
    Headway (TherapyMatch, Inc.) operates a five-module software platform—provider portal, AI-assisted
    EHR, patient matching and booking, automated insurance billing, and integrated telehealth video—
    covering the full clinical and administrative workflow for insurance-accepting mental health providers
    across 45+ payer contracts and all 50 states. The engineering organization is organized around
    distinct Provider, Patient, Payer, Benefits, and Growth squads with a first external CTO (Arnaud
    Ferreri) hired January 2025 and an active build-out of data science, security, and GRC functions
    visible through the Greenhouse job board. HIPAA Security and Privacy Rule compliance is required
    and publicly affirmed, but ONC EHR certification status is unconfirmed (Headway not found on
    CHPL as of 2025), third-party security audits are not publicly disclosed, and adverse user
    signals—Trustpilot 3.6/5 from 1,414 reviews and 87 BBB complaints—flag recurring billing and
    payment issues that constitute a material platform quality risk.

sections:
  - id: sect-product-overview
    title: "Product Overview and Module Architecture"
    body: |
      Headway's core product is an integrated platform that collapses the administrative burden of
      insurance-based mental health practice into a single provider-facing interface. At its foundation
      is the Provider Portal—the primary workspace through which therapists manage patient scheduling,
      clinical documentation, insurance billing, and payment tracking. As of September 2025, Headway
      launched a native AI-assisted EHR, making it one of the first mental health networks to offer
      a purpose-built clinical documentation tool embedded directly in the billing workflow rather
      than requiring providers to use a third-party EHR system. This "insurance-native EHR" approach
      is a meaningful structural differentiator: instead of connecting a standalone EHR to a separate
      billing tool, Headway surfaces clinical notes and insurance claim submission in the same
      interface, reducing administrative switching and the risk of billing errors that arise from
      manual data transfer.

      On the patient side, the platform provides an insurance-aware therapist matching and booking
      experience. Patients input their insurance plan and are shown a filtered list of providers who
      both accept that plan and have appointment availability—a workflow that addresses one of the
      primary friction points in mental health access. The automated insurance billing module submits
      claims through group billing arrangements with 45+ payers, handling credentialing, eligibility
      checks, and claim lifecycle management on behalf of the provider.

      Telehealth video sessions are embedded natively, eliminating the need for providers to
      use external video platforms while maintaining HIPAA-compliant session delivery. A prescriber
      module for psychiatrists and nurse practitioners is under active expansion, extending the
      platform beyond therapists to clinicians who prescribe medication as part of a comprehensive
      mental health care plan. Headway's network spans 34,000+ providers across all 50 states and DC,
      with 45+ insurance partnerships and over 600,000 monthly appointments as of the Series D
      announcement in July 2024.
