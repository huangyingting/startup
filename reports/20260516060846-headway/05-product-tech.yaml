  - id: sect-platform-quality
    title: "Platform Quality and User Experience Signals"
    body: |
      Headway's user experience receives mixed signals from independent review platforms, with
      particular tension between the company's own reported metrics and third-party adverse
      evidence. Headway internally reports a patient NPS of 93 and a 90% second-visit retention
      rate—both strong indicators if accurate—but these figures are company-claimed and have not
      been independently verified or audited. On Trustpilot, Headway holds a 3.6 out of 5 rating
      across 1,414 reviews, a score that Trustpilot categorizes as "Average," with a meaningful
      cluster of adverse reviews citing billing overcharges, unexpected balance bills, and
      difficulty reaching customer support by phone. The absence of phone support is a recurring
      complaint from both providers and patients.

      The Better Business Bureau profile for Headway (TherapyMatch, Inc.) shows 87 complaints
      filed over the most recent three-year window, with 39 complaints closed in the trailing
      12 months. The complaint pattern across BBB and Trustpilot converges on billing discrepancies:
      patients report being billed amounts inconsistent with their stated copay, and providers
      report payment delays and inconsistencies between expected reimbursements and actual deposits.
      The DL Method clinician review, a practitioner-facing analysis, specifically documents
      credentialing delays and payment inconsistencies as recurring pain points for providers
      onboarding to the platform.

      These adverse signals do not undermine the platform's strategic value—the core automation
      proposition of eliminating credentialing and billing friction remains intact—but they
      suggest that operational execution quality, particularly in billing accuracy and customer
      support responsiveness, lags behind the product's architectural ambition. For due diligence
      purposes, the billing overcharge pattern warrants direct investigation of claim adjudication
      error rates, chargeback volumes, and the root-cause breakdown of payment discrepancies to
      determine whether these are systematic product defects or isolated edge cases in a high-volume
      billing operation.
