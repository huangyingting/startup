  - id: FE003
    title: "Critical Dependency Map"
    type: dag
    layout: wide
    summary: >-
      Six critical dependencies of the Headway platform core, showing that insurance payer APIs,
      HIPAA compliance infrastructure, state licensing databases, AI/ML engine, and telehealth
      infrastructure must all operate reliably for the core platform to function.
    data:
      nodes:
        - id: D1
          label: "Insurance Payer APIs (45+)"
          description: "Real-time eligibility checks, claim submission, and EOB retrieval from all contracted payers; fragmented API landscape requires continuous maintenance"
        - id: D2
          label: "HIPAA Compliance Infrastructure"
          description: "Encrypted ePHI storage, BAAs with cloud vendors, audit logging, access controls; mandatory for all platform operations"
        - id: D3
          label: "State Licensing Databases"
          description: "License verification for all 50 states + DC; required for provider credentialing and ongoing compliance monitoring"
        - id: D4
          label: "AI / ML Engine"
          description: "Patient-provider matching algorithm; AI note-assist for EHR documentation; Bayesian experimentation platform for A/B testing"
        - id: D5
          label: "Telehealth Video Platform"
          description: "Embedded HIPAA-compliant video session infrastructure; provider not identified publicly"
        - id: D6
          label: "Headway Platform Core"
          description: "Provider Portal, Patient Portal, billing automation, and EHR — the integrated product surface delivered to providers and patients"
      edges:
        - from: D1
          to: D6
          label: "Claims and eligibility data required for billing"
        - from: D2
          to: D6
          label: "Compliance controls required for all PHI operations"
        - from: D3
          to: D6
          label: "License data required for credentialing"
        - from: D4
          to: D6
