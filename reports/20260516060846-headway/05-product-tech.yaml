  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: cloud-infrastructure
      missingEvidence: >-
        Headway's cloud infrastructure provider(s) — including the identity of its primary
        cloud vendor for ePHI storage and compute — are not publicly disclosed. No AWS, Azure,
        GCP, or other infrastructure name appears in any public documentation, job posting, or
        press coverage reviewed for this chapter.
      whyItMatters: >-
        Cloud vendor identity is required to assess infrastructure concentration risk, evaluate
        BAA quality and data residency terms, and understand the SLA guarantees backing the
        provider portal. A single-cloud dependency with no disclosed disaster recovery or
        multi-region setup would be a material operational risk for a platform that processes
        insurance claims for 34,000+ providers.
      diligencePath: >-
        Request cloud infrastructure vendor list and applicable BAAs during data room review;
        confirm multi-region architecture and disaster recovery SLAs; review infrastructure
        vendor contracts for data residency and breach notification terms.
      relatedQuestionRefs:
        - QE001

    - type: missing-source
      severity: material
      topic: claim-denial-rates
      missingEvidence: >-
        Headway's insurance claim denial rates, resubmission SLAs, and average provider
        payment timelines from claim submission to deposit are not publicly disclosed.
        These metrics are standard operational benchmarks for insurance billing platforms
        but are absent from all reviewed public sources.
      whyItMatters: >-
        High claim denial rates would indicate systematic billing quality issues and could
        explain the pattern of provider payment delays documented in adverse reviews. Without
        denial rate data, it is impossible to assess the reliability of the billing automation
        that is Headway's core value proposition for providers.
      diligencePath: >-
        Request claim denial rates by payer, resubmission success rates, and average days
        from session delivery to provider payment as key operational KPIs during due diligence.
      relatedQuestionRefs:
        - QE003
        - QE021

    - type: missing-source
      severity: material
      topic: uptime-sla
      missingEvidence: >-
        Headway does not publish a public status page, uptime SLA, or reliability metrics
        for the provider portal. No incident history, planned maintenance windows, or
        availability percentage is disclosed in any public-facing documentation.
      whyItMatters: >-
        The provider portal is the only interface through which 34,000+ providers submit claims,
        document sessions, and receive payment. Any downtime directly blocks revenue generation
        for providers and claims submission to payers. Lack of SLA disclosure is a diligence
        gap that should be resolved before closing an investment.
      diligencePath: >-
        Request internal SLA documentation, incident post-mortems from the last 12 months,
        and the availability monitoring dashboard during data room review.
      relatedQuestionRefs:
        - QE010

    - type: missing-source
      severity: material
      topic: security-certifications
      missingEvidence: >-
        Headway has not published SOC 2 Type II, ISO 27001, or HITRUST certification letters.
        The GRC Analyst and Security Engineer job postings suggest these certifications are
        being pursued, but no attestation has been publicly announced as of the research date.
      whyItMatters: >-
        Health system and insurance payer partners frequently require SOC 2 Type II attestation
        as a vendor onboarding requirement. Absence of certification may limit Headway's ability
        to enter enterprise health system channels and could affect payer contract renewal terms.
      diligencePath: >-
        Request current security audit reports, penetration test results, and any in-progress
        SOC 2 or HITRUST certification roadmap documentation during data room review.
      relatedQuestionRefs:
        - QE022

    - type: missing-source
      severity: minor
      topic: competitive-technology-comparison
      missingEvidence: >-
        Headway's technology stack depth relative to competitors Alma and Grow Therapy is not
        publicly documented. No independent engineering benchmarks, platform architecture
        comparisons, or technical maturity assessments are available from public sources for
        these companies as of the research date.
      whyItMatters: >-
        Understanding whether Headway's integrated EHR and payer API infrastructure represents
        a durable technical moat versus a catchable lead requires comparative data on
        competitor platform maturity. Without this data, differentiation claims rely solely
        on Headway's marketing materials.
      diligencePath: >-
        Request a technical architecture briefing from Headway's CTO during due diligence;
        conduct parallel engineering reviews of Alma and Grow Therapy's product surfaces
        and job postings to assess comparative platform depth.
      relatedQuestionRefs:
        - QE023

    - type: missing-source
      severity: minor
      topic: onc-certification
      missingEvidence: >-
        Headway's AI-assisted EHR is not listed on the ONC CHPL as of May 2026. Whether
        Headway has applied for certification, is in the certification process, or has
        determined that certification is not required for its current program participation
        is not publicly stated.
      whyItMatters: >-
        ONC certification may become mandatory for EHR systems used in Medicare and Medicaid
        programs under the 21st Century Cures Act, which is directly relevant to Headway's
        stated expansion into those segments. Non-certification could become a blocking
        compliance issue within 12-24 months of government payer program go-live.
      diligencePath: >-
        Confirm with Headway whether an ONC certification application is in progress;
        request legal counsel analysis of certification applicability for their specific
        Medicare Advantage and Medicaid program participation pathways.
      relatedQuestionRefs:
        - QE002
        - QE043

