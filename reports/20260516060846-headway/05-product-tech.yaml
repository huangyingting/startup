  - id: sect-tech-architecture
    title: "Technology Stack and Engineering Organization"
    body: |
      Headway's engineering organization is structured into discrete product squads aligned to key
      platform surfaces: Provider, Patient, Payer, Benefits, and Growth. Evidence from the Greenhouse
      job board as of May 2026 shows active hiring across senior backend, senior fullstack, and staff
      fullstack engineering roles within the Provider squad, as well as a Staff Software Engineer
      on the Payer squad focused on the insurance integration layer. The Payer squad's focus on
      "deep payer API integrations" and carrier-side credentialing signals suggests a dedicated
      engineering team managing the 45+ insurance APIs—a technically complex integration requiring
      continuous maintenance as payer systems update claim formats and eligibility APIs.

      The data science function includes a Staff Data Scientist focused on Bayesian experimentation
      and causal inference, and a Director of Data Science for the Patient team—indicating investment
      in both platform-level A/B testing infrastructure and patient-matching algorithm development.
      Security is being built out with a Senior Security Engineer (Product Security) and a Senior
      GRC Analyst role, confirming that the company is formalizing its compliance and governance
      posture as it scales into more regulated payer segments including Medicare Advantage and
      Medicaid. Design leadership includes a Design Director for Core Insurance and Design Systems
      and a Staff Product Designer specifically focused on Group Practices—indicating that group
      practice support is an active product investment rather than merely a roadmap item.

      The platform is cloud-hosted (specific provider undisclosed) and built on modern web
      technologies, consistent with the web-based provider portal and patient booking surface.
      The first external CTO, Arnaud Ferreri, was hired in January 2025, marking a transition
      from founder-led technical direction to professional engineering leadership at the
      executive level. Prior to this hire, Headway operated without a dedicated CTO role,
      which is a notable governance signal for a company processing insurance claims and
      storing protected health information for over 34,000 providers.
