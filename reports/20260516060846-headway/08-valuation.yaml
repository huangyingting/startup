callouts:
  - calloutType: strength
    title: "Insurance-Native EHR Infrastructure Creates the Highest-Defensibility Category in Behavioral Health Tech"
    body: >-
      Andreessen Horowitz's behavioral health market map explicitly identifies insurance-native
      infrastructure — the category Headway occupies — as the highest-defensibility segment in
      behavioral health technology. Unlike DTC platforms (BetterHelp) that compete on consumer
      marketing spend or EAP platforms (Lyra, Spring Health) that compete on employer sales
      cycles, Headway's moat compounds with each new provider credentialed and each new payer
      contract signed. The two-sided network effect — more providers enable more payer contracts,
      which attract more providers — is self-reinforcing and costly to replicate. At 34,000+
      providers and 45+ payers, Headway is operating at the scale where these effects become
      durable.
    claimRefs:
      - CV001
      - CV002
      - CV003

  - calloutType: risk
    title: "Optum 2024 Rate Cut Confirms Payer-Driven Margin Compression Is Not Hypothetical"
    body: >-
      The late-2024 UnitedHealth/Optum rate-cut episode — in which Optum unilaterally reduced
      pay rates for therapists on digital mental health platforms including Headway — is the
      single most important adverse evidence in this valuation analysis. It demonstrates that
      the payer concentration and reimbursement compression risk is not theoretical: it has
      already occurred once. The fact that Headway continued operating post-Optum rate cut
      suggests the platform is resilient to moderate payer pressure, but the episode raises
      two unresolved questions: (1) what was the revenue impact of the Optum rate cut, and
      (2) is Optum a concentration risk (disproportionate share of GMV)? Neither question
      can be answered from public evidence alone, making this the highest-priority payer
      diligence ask.
    claimRefs:
      - CV006
      - CV007
      - CV028

  - calloutType: insight
    title: "Risk-Weighted Expected Exit of ~$4.0B Implies 1.7x Return at Series D Entry — Positive but Below Typical Venture Target"
    body: >-
      Applying scenario probabilities (Bull 40%, Base 45%, Bear 15%) to midpoint exit
      valuations ($7B bull, $3.75B base, $1.15B bear) yields a risk-weighted expected
      exit value of approximately $4.0B — approximately 1.7x the $2.3B Series D entry
      mark. This is a positive expected return but falls below the 3x+ typically required
      for venture fund mandates. The investment makes more sense as a strategic position
      (late-stage growth, infrastructure bet) than as a classic venture return vehicle.
      The bull scenario (40% probability, $7B+ exit) is the scenario in which venture-level
      returns are achievable; the base scenario (45% probability, ~$3.75B exit) is the
      scenario in which the investment earns a reasonable but not exceptional return.
    claimRefs:
      - CV017
      - CV019
      - CV020
      - CV021

  - calloutType: assumption
    title: "All Revenue Estimates in This Chapter Are Analyst-Derived Proxies; Actual Revenue May Be Higher or Lower"
    body: >-
      The $230M–$460M estimated revenue range is constructed from bottom-up proxy calculations
      (34,000+ providers × estimated session frequency × estimated reimbursement rate × estimated
      take rate). Each input carries uncertainty: session throughput per provider is unconfirmed,
      the blended reimbursement rate across 45+ payers is unknown, and the effective take rate
      after any payer-specific adjustments is private. The compounding of these uncertainties
      produces the wide range. Investors must not use this range as a confirmed revenue figure
      for investment modeling; NDA-level financial disclosure from Headway is required before
      the implied multiple range can be compressed to a defensible point estimate.
    claimRefs:
      - CV009
      - CV011
      - CV012

  - calloutType: recommendation
    title: "Conditional Buy: Six Diligence Asks Must Clear Before Term Sheet — Revenue Confirmation Is the Non-Negotiable"
    body: >-
      The investment stance is conditional buy, not unconditional buy. The six priority
      diligence asks in TV006 must all be addressed. Revenue confirmation is the single
      non-negotiable item: without confirmed annual revenue, the $2.3B mark cannot be
      fully validated and the implied multiple range (5–10x) is too wide for a disciplined
      investment decision. If revenue confirmation yields a figure below $200M, the implied
      multiple exceeds 11x and requires a valuation discount or a pass. If revenue
      confirmation yields a figure above $400M, the 5–6x implied multiple is well within
      the behavioral health infrastructure comparable range and supports entry at the
      current mark. Payer concentration disclosure and HIPAA/SOC 2 audit are the two
      highest-risk items; both should be addressed before final commitment.
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036

