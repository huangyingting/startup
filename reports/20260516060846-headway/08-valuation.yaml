  claims:
    - id: CV001
      statement: >-
        Headway has built a two-sided behavioral health marketplace with 34,000+ credentialed
        providers and 45+ insurance payer contracts, creating network effects where more providers
        attract more payer contracts and more payer contracts attract more providers and patients.
      type: third-party-reported
      topic: investment-thesis
      sourceRefs:
        - SV011
        - SV015
        - SV016
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV001
        - QV004

    - id: CV002
      statement: >-
        Andreessen Horowitz's behavioral health market map identifies insurance-native infrastructure
        — the category Headway occupies — as the highest-defensibility segment in behavioral health
        technology, structurally differentiated from DTC and employer-direct models.
      type: third-party-reported
      topic: investment-thesis
      sourceRefs:
        - SV001
        - SV020
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV004
        - QV016

    - id: CV003
      statement: >-
        U.S. national behavioral health spending exceeds $280B annually per CMS National Health
        Expenditure Data, and 59.3 million Americans experience Any Mental Illness annually per
        NIMH data, of whom only 46.2% receive mental health treatment — establishing a large,
        structurally underserved TAM.
      type: observed
      topic: market-context
      sourceRefs:
        - SV024
        - SV004
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV009
        - QV027

    - id: CV004
      statement: >-
        COVID-19 dramatically accelerated telehealth adoption and mental health demand, as
        documented by KFF analysis of COVID-19 mental health implications and the NBER working
        paper on telehealth access and mental health outcomes.
      type: third-party-reported
      topic: market-context
      sourceRefs:
        - SV006
        - SV002
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV009
        - QV024

    - id: CV005
      statement: >-
        The APA 2023 Work in America Survey documents that 77% of employees prefer employers
        that offer mental health support, and the National Academies behavioral health workforce
        report confirms a structural provider shortage in 200+ mental health professional
        shortage areas — both supporting the demand case for Headway's network model.
      type: observed
      topic: market-context
      sourceRefs:
        - SV007
        - SV008
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV022
        - QV023

    - id: CV006
      statement: >-
        In late 2024, UnitedHealth's Optum unilaterally cut pay rates for therapists on digital
        mental health platforms including Headway, demonstrating that payers can compress per-session
        economics without advance notice and that payer concentration is a demonstrated, not
        hypothetical, risk for Headway's revenue model.
      type: third-party-reported
      topic: adverse-risk
      sourceRefs:
        - SV026
        - SV015
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV005
        - QV008

    - id: CV007
      statement: >-
        Spring Health (employer-direct) acquired Alma (insurance-accepting provider platform)
        in 2025, and Lyra Health operates with a $5.58B last-round valuation, indicating
        that Headway's competitor set is well-capitalized and growing — increasing competitive
        intensity in the provider supply market.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SV022
        - SV023
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV005
        - QV007

    - id: CV008
      statement: >-
        Headway's Trustpilot rating of 3.6 out of 5 and independent provider portal frustration
        reports (payment delays, usability issues) represent adverse signals for provider
        satisfaction that could undermine the referral-driven network growth flywheel if
        unaddressed.
      type: third-party-reported
      topic: adverse-operational
      sourceRefs:
        - SV027
        - SV026
      confidence: low
      freshness: current
      answersQuestionRefs:
        - QV026

    - id: CV009
      statement: >-
        Headway's Series D post-money valuation of $2.3 billion was confirmed in July 2024 by
        multiple independent Tier-1 sources including Fierce Healthcare, MobiHealthNews, Axios,
        STAT News, and the New York Times, representing a doubling from the Series C
        post-money of approximately $1.1 billion.
      type: third-party-reported
      topic: valuation-context
      sourceRefs:
        - SV015
        - SV016
        - SV017
        - SV018
        - SV019
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QV001
        - QV006
        - QV018

    - id: CV010
      statement: >-
        Lyra Health achieved a last-round valuation of $5.58 billion in December 2021 (Series F),
        approximately 2.5x Headway's current $2.3B mark, operating an employer-sponsored EAP
        model that differs structurally from Headway's insurance-native network.
      type: third-party-reported
      topic: comparable-valuation
      sourceRefs:
        - SV023
        - SV001
      confidence: medium
      freshness: historical
      answersQuestionRefs:
        - QV007

    - id: CV011
      statement: >-
        BetterHelp, a Teladoc subsidiary, is part of a public company with a total market cap
        of approximately $4.5B as of February 2025 for all of Teladoc; BetterHelp operates a
        DTC subscription model that does not accept insurance and has faced declining growth
        alongside Teladoc's broader stock decline.
      type: third-party-reported
      topic: comparable-valuation
      sourceRefs:
        - SV030
        - SV016
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QV007

    - id: CV012
      statement: >-
        Cerebral declined from a $4.8 billion unicorn valuation in November 2021 to survival
        mode in 2024 following regulatory scrutiny from the DEA and FTC, restructuring, and
        unit economics deterioration — demonstrating that behavioral health tech platforms
        are not uniformly protected from downside scenarios.
      type: third-party-reported
