  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue-and-margins
      missingEvidence: >-
        Headway's annual revenue, gross margin, and EBITDA are entirely private. No audited
        income statement, CFO-certified ARR, or credible secondary revenue estimate from an
        institutional analyst is publicly available. All revenue figures in this chapter
        ($230M–$460M) are analyst-derived proxies based on provider count × session volume
        × reimbursement rate × take rate assumptions.
      whyItMatters: >-
        Without confirmed revenue, the $2.3B valuation multiple cannot be computed with
        precision. The 5–10x implied range is too wide for a disciplined investment decision.
        Gross margin is required to assess whether the admin fee model is sustainable at
        scale versus being consumed by credentialing and compliance costs.
      diligencePath: >-
        Request audited revenue and gross profit for FY2023 and FY2024 under NDA; request
        CFO-certified MRR/ARR as of Q1 2026; cross-validate against provider-level session
        volume reports from the Headway billing system.
      relatedQuestionRefs:
        - QV002
        - QV006

    - type: private-evidence-only
      severity: blocking
      topic: payer-concentration
      missingEvidence: >-
        Revenue breakdown by payer (top-5 payers as % of total revenue) is not publicly
        disclosed. The Optum 2024 rate-cut episode demonstrated payer leverage without
        quantifying the revenue impact. The actual dependency of Headway's revenue on any
        single large payer cannot be assessed from public evidence.
      whyItMatters: >-
        High concentration in one or two payers creates existential revenue risk. This is the
        primary financial risk identified from public evidence for Headway. If top-3 payers
        represent more than 60% of revenue, the bear scenario probability rises materially
        above the baseline 15%.
      diligencePath: >-
        Request revenue and session volume by top-5 payers as % of total under NDA; request
        contract duration, renewal provisions, and exclusivity or most-favored-nation terms
        for top-3 payers.
      relatedQuestionRefs:
        - QV005
        - QV008

    - type: private-evidence-only
      severity: material
      topic: burn-rate-and-runway
      missingEvidence: >-
        Monthly cash burn rate and current cash position are not publicly disclosed. Series D
        closed July 2024; approximately 10 months have elapsed; no interim financial update
        has been publicly released. Runway cannot be estimated without burn rate data.
      whyItMatters: >-
        If burn rate implies runway below 18 months from the Series D close, a follow-on raise
        is imminent and Series D investors face dilution risk or a potential down-round if
        market conditions have tightened. Medicare/Medicaid expansion adds compliance cost that
        may accelerate burn.
      diligencePath: >-
        Request monthly burn rate for the trailing 3 months, current cash and equivalents,
        and 12-month forward cash projection under NDA; review hiring velocity and headcount
        data as a burn proxy.
      relatedQuestionRefs:
        - QV020
        - QV029

    - type: missing-source
      severity: minor
      topic: comparable-valuation-TV004
      relatedTableRefs:
        - TV004
      missingEvidence: >-
        No public valuation is available for Grow Therapy as of May 2026, the most direct
        business model comparable to Headway (26,000+ clinicians, 125+ insurance partners).
        Spring Health's exact post-acquisition valuation following the Alma acquisition in 2025
        is also not confirmed. BetterHelp revenue is not disclosed separately from Teladoc's
        consolidated financials. These gaps limit the precision of the comparable set.
      whyItMatters: >-
        Without a public Grow Therapy valuation or confirmed Spring Health mark, the comparable
        set relies primarily on less direct comparables (Lyra Health at a different model,
        Oscar Health at a different business). Valuation multiples derived from the table
        should be interpreted with this limitation in mind.
      diligencePath: >-
        Monitor Grow Therapy funding announcements; request comparable transaction data
        from the investment bank running any future process; use Lyra Health and Cerebral
        as the primary reference range until Grow Therapy discloses a round.
      relatedQuestionRefs:
        - QV025
        - QV007

    - type: missing-source
      severity: material
      topic: hipaa-soc2-compliance
      missingEvidence: >-
        No HIPAA compliance audit or SOC 2 Type II report for TherapyMatch Inc. is publicly
        available. ONC behavioral health IT guidance provides a framework but does not confirm
        Headway-specific compliance status.
      whyItMatters: >-
        A HIPAA breach at scale (10,000+ patients) would constitute a thesis-break trigger
        with reputational, regulatory, and financial consequences that could force a distressed
        exit. Payer contracts typically require minimum security certifications; missing SOC 2
        could be a contract compliance issue.
      diligencePath: >-
        Request SOC 2 Type II report (most recent audit), HIPAA risk assessment, and any
        breach notification history under NDA; verify compliance with payer contract data
        security requirements.
      relatedQuestionRefs:
        - QV019

