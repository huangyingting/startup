summary:
  headline: >-
    Headway 在保险原生行为健康技术中结构性位置最强，拥有 34,000+ 服务提供者和 45+ 付款方合同；但 $2.3B Series D 估值已经计入 Medicare/Medicaid
    扩张和报销费率稳定的显著执行成果，而两者都带有实质监管与付款方集中风险。财务披露尽调通过前，只能给有条件正面判断。
