  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue-and-margins
      missingEvidence: >-
        Headway's annual revenue, ARR, gross margin, EBITDA, and any income statement metric
        are entirely private. No audited financial statements, CFO-certified revenue figures, or
        credible secondary estimates are available from public sources. All revenue figures in
        this chapter are analyst-derived proxy estimates with low confidence.
      whyItMatters: >-
        Without confirmed revenue, the $2.3B valuation multiple cannot be computed with
        precision. The wide range of 7x–19x estimated revenue creates material underwriting
        risk. Gross margin is required to assess whether the admin fee model is sustainable
        at scale versus being consumed by credentialing and compliance costs.
      diligencePath: >-
        Request audited revenue and gross profit for FY2023 and FY2024 under NDA; request
        CFO-certified MRR/ARR as of Q1 2026; cross-validate against provider-level session
        volume reports from the Headway billing system.
      relatedQuestionRefs:
        - QI001
        - QI008
        - QI018

    - type: private-evidence-only
      severity: blocking
      topic: cash-burn-and-runway
      missingEvidence: >-
        Monthly cash burn rate and current cash on hand are not publicly disclosed. The Series D
        closed in July 2024; approximately 10 months have elapsed since close as of the run date,
        but no interim financial update or funding announcement has been made. Runway cannot be
        estimated without burn rate data.
      whyItMatters: >-
        If Headway's burn rate is high (consistent with a platform investing in Medicare/Medicaid
        expansion and engineering), the remaining runway from the $321M+ raised may be shorter
        than assumed. An unannounced next-round dependency or bridge financing need could
        indicate distress or forced dilution.
      diligencePath: >-
        Request monthly burn rate for the trailing 3 months, current cash and equivalents,
        and a 12-month forward cash projection under NDA; review hiring velocity as a burn
        proxy.
      relatedQuestionRefs:
        - QI019
        - QI024

    - type: private-evidence-only
      severity: material
      topic: payer-concentration
      missingEvidence: >-
        Revenue breakdown by payer (top-5 payers as % of total) is not publicly disclosed.
        The Optum rate-cut episode in late 2024 demonstrated payer leverage without public
        quantification of the revenue impact. The actual dependency of Headway's revenue
        on any single large payer (e.g., UnitedHealth/Optum, Aetna, Cigna) cannot be
        assessed from public evidence.
      whyItMatters: >-
        High concentration in one or two payers creates existential revenue risk if rate
        renegotiations are unfavorable or contracts are not renewed. This is the primary
        financial risk identified from public evidence for Headway.
      diligencePath: >-
        Request revenue and session volume by top-5 payers as % of total under NDA; request
        contract duration, renewal provisions, and exclusivity terms for the top-3 payers.
      relatedQuestionRefs:
        - QI004
        - QI024

    - type: private-evidence-only
      severity: material
      topic: provider-ltv-and-cac
      missingEvidence: >-
        Provider LTV and blended CAC by acquisition channel are not publicly disclosed. The
        company claims >50% provider referral rate implying below-market CAC, but this figure
        is unaudited. Without LTV/CAC data, the sustainability of the provider growth flywheel
        and the payback period on provider acquisition investment cannot be validated.
      whyItMatters: >-
        If provider CAC is rising as Headway exhausts the referral-friendly early adopter
        pool and moves to outbound acquisition, the cost structure will increase materially.
        Provider retention (panel turnover) is also undisclosed; high churn would undermine
        network adequacy commitments to payers.
      diligencePath: >-
        Request blended CAC by channel (referral vs. outbound vs. payer directory), average
        provider tenure on platform, and LTV model under NDA; cross-validate referral rate
        claim with provider cohort retention data.
      relatedQuestionRefs:
        - QI023
        - QI024

    - type: missing-source
      severity: minor
      topic: take-rate-exact-confirmation
      missingEvidence: >-
        The exact admin fee take rate percentage is not confirmed in any primary Headway
        source. The ~10–15% range is derived from independent therapist reviews and
        secondary press coverage, not from a Headway pricing page or investor disclosure.
        The actual rate may vary by payer contract, provider type, or session CPT code.
      whyItMatters: >-
        A 100bps difference in take rate on $1.5B–$2.0B GMV implies $15M–$20M revenue
        variance. Payer-specific rate structures or volume discounts could compress the
        effective take rate below the publicly estimated range.
      diligencePath: >-
        Request the standard provider agreement template and any payer-specific addenda that
        modify the admin fee percentage; cross-check against confirmed session-level billing
        data from the Headway portal.
      relatedQuestionRefs:
        - QI005
        - QI015

    - type: stale
      severity: minor
