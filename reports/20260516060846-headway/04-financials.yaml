  - id: cost-structure
    title: "Cost Structure & Operating Leverage"
    body: |
      Headway's cost structure is dominated by four categories: platform engineering, insurance
      credentialing and payer contracting, provider acquisition and onboarding, and customer
      support operations. As a marketplace intermediary in a regulated industry, Headway carries
      no physical inventory or manufacturing costs but incurs significant ongoing compliance
      expenses tied to maintaining 45+ insurance payer relationships and ensuring accurate claims
      processing across 34,000+ provider accounts. Credentialing costs are semi-fixed: the
      marginal cost of onboarding a new provider declines as administrative workflows mature,
      but payer-specific credentialing audits and credential-expiry re-verification create ongoing
      per-provider costs.

      Provider acquisition costs are partially subsidized by organic referral dynamics: company
      claims indicate more than 50% of new providers join via referral from existing Headway
      providers, implying a below-market blended CAC for new supply onboarding. However, the
      approximately 34x growth in provider count between 2020 and 2024 (from roughly 1,000 to
      34,000+) required substantial investment in outbound provider marketing and onboarding
      support. The July 2024 Medicare Advantage and Medicaid expansion announcement introduces
      structurally higher compliance costs: government-plan billing requires additional
      credentialing steps, HIPAA-compliant data handling for government beneficiaries, and CMS
      network adequacy documentation—costs unlikely to be offset by incremental session volume
      in the near term. Gross margin structure is not publicly disclosed; for marketplace-style
      businesses with similar infrastructure overhead, gross margins typically range from
      40–70%, though Headway's regulatory compliance intensity and payer-contracting depth may
      compress the structural ceiling. The mental health market's $280B+ annual U.S. spend and
      59M+ adults with mental illness provide structural demand support, but the cost of serving
      government plan populations is materially higher per-claim than commercial insurance.
    claimRefs:
