  - id: capital-structure
    title: "Capital Structure & Adequacy"
    body: |
      Headway (TherapyMatch, Inc.) has raised approximately $321M+ in total equity capital across
      four venture rounds through July 2024. The detailed round-by-round chronology including
      investors and co-investors is documented in the Company Overview chapter; this section
      focuses on capital adequacy implications. The most recent round, Series D, was confirmed by
      SEC Form D filings with an aggregate offering amount of $99,999,939, first sale date of
      July 16, 2024, and nine investors. Form D signatories include Andrew Adams (CEO), Scott
      Kupor (Andreessen Horowitz Director), Amit Kumar, Kareem Zaki, and Will Reed. Spark Capital
      led the Series D. The post-money valuation of $2.3 billion reflects a doubling from
      approximately $1.1B at Series C, consistent with strong market demand for scaled mental
      health infrastructure.

      The Series D Form D discloses intended use of proceeds as "product development and other
      general corporate purposes"—standard boilerplate providing no quantitative allocation. No
      debt obligations, convertible notes, or project-finance arrangements are identified in any
      public filing for TherapyMatch Inc. as of May 2026. Cash position and monthly burn rate are
      not publicly disclosed; runway cannot be directly calculated. As a capital-intensive
      marketplace that funds provider credentialing infrastructure and insurance-contracting
      operations, the Series D proceeds are expected to support Medicare Advantage and Medicaid
      expansion, platform engineering, and provider network growth. The implied valuation multiple
      on estimated revenue ($2.3B on $150M–$300M estimated) ranges from approximately 7x–19x—
      typical for high-growth infrastructure businesses but wide given revenue uncertainty.
      No IPO filing, SPAC transaction, or material debt issuance by Headway has been confirmed as
      of May 2026.
