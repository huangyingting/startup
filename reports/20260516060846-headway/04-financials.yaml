  - id: unit-economics
    title: "Unit Economics Proxies"
    body: |
      Because Headway is a private company, no confirmed revenue, gross margin, or customer-level
      unit economic data has been publicly disclosed. The estimates below are derived entirely from
      analyst inference and publicly available proxies; they represent illustrative ranges rather
      than verified metrics, and should be clearly labeled as such in any investment model.

      As of the Series D announcement in July 2024, Headway reported 34,000+ providers on its
      platform. Applying an industry-average session frequency for insurance-accepting therapists
      of approximately 20–25 sessions per month yields an estimated session volume of 680,000–
      850,000 monthly sessions. At an average insurance reimbursement of $150–200 per outpatient
      therapy session—consistent with aggregated provider directory data and BLS occupational
      wage benchmarks—this implies an estimated annual gross merchandise value (GMV) of
      approximately $1.5B–$2.0B. Applying Headway's stated admin fee take rate of approximately
      10–15% to this GMV estimate yields an implied annualized admin fee revenue of approximately
      $150M–$300M.

      These estimates depend on several unverified assumptions: actual session throughput per
      provider (which may be lower than the industry average if many providers carry thin panels),
      the actual blended reimbursement rate across the payer mix, and the effective take rate
      after any volume-discount arrangements with major payers. Provider LTV, blended CAC, and
      churn are undisclosed. Company-reported patient NPS of 93 and 90% second-visit retention
      are cited as demand-side stickiness indicators but are unaudited and not independently
      verified. Headway's homepage references over 600,000 monthly appointments, which aligns
      directionally with the low end of the analyst-estimated range.
