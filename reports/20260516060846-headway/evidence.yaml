evidenceGaps:
  - type: missing-source
    severity: minor
    topic: Co-founder last names and backgrounds not publicly disclosed
    missingEvidence: >-
      Three of four Headway co-founders (Jake, Dan, Kevin) were identified only by first name in the Series A
      announcement. Their last names, professional backgrounds, current roles at Headway, and equity positions have not
      been publicly disclosed in any accessible source.
    whyItMatters: >-
      Full co-founder profiles are standard diligence inputs for assessing founding team depth, domain expertise, and
      key-person concentration beyond the CEO.
    diligencePath: >-
      Request full founding team profiles and current organizational roles from the company under NDA. LinkedIn search
      for Jake Miller + Headway may yield partial information.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs:
      - QO003
  - type: stale
    severity: minor
    topic: Employee headcount is stale — last confirmed April 2025
    missingEvidence: >-
      The most recent headcount figure (700+ employees) is from a company blog post in April 2025. Current 2026
      headcount has not been publicly updated. The company may have grown materially in the 12+ months since this data
      point.
    whyItMatters: >-
      Employee count is a proxy for burn rate, organizational scaling, and hiring pace — important for assessing
      financial runway and operational capacity.
    diligencePath: >-
      Request current headcount by function and location under NDA. Use LinkedIn employee count as a corroborating
      proxy.
    relatedQuestionRefs:
      - QO010
  - type: private-evidence-only
    severity: major
    topic: No audited financial statements — profitability claim unverifiable
    missingEvidence: >-
      Headway has not disclosed revenue, gross margin, EBITDA, burn rate, or audited financial statements. The CEO's
      statement of a "clear line of sight to company-level profitability" and "revenue more than doubled" are unaudited
      management claims.
    whyItMatters: >-
      Without audited financials, the investment case rests on operational metrics and investor brand signals rather
      than verifiable financial performance. The $2.3B valuation cannot be independently verified against fundamentals.
    diligencePath: >-
      Request audited FY2022–FY2025 financial statements, monthly revenue cohort data, and provider-level unit economics
      under NDA.
    relatedQuestionRefs:
      - QO011
  - type: private-evidence-only
    severity: minor
    topic: Exact Series C valuation not publicly disclosed
    missingEvidence: >-
      The Series C valuation has not been explicitly stated in any identified public source. It is known only that the
      Series C ($125M, October 2023) brought Headway to unicorn status (>$1B valuation), and that the Series D ($2.3B)
      represented a 130% increase — implying a Series C valuation of approximately $1.0B.
    whyItMatters: >-
      Precise Series C valuation is needed for exact step-up calculation and for modeling investor return expectations
      at each round.
    diligencePath: Request cap table and prior round valuation history under NDA.
    relatedQuestionRefs:
      - QO016
