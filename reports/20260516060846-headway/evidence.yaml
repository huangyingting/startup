      No reliable public valuation data for Headway's primary direct competitors (Alma, Grow Therapy) is available from
      accessible sources. Headway's $2.3B valuation cannot be benchmarked against comparable private-company valuations.
    whyItMatters: >-
      Relative valuation position against direct competitors informs pricing power, market leadership narrative, and
