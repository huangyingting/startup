      - number: '4.5'
        title: Private-Company Financial Gaps & Diligence Blockers
        blocks:
          - type: paragraph
            body: |
              Headway is a private company with no public reporting obligations; accordingly, no audited
              income statement, balance sheet, or cash flow statement is publicly available. This
              represents the most material barrier to underwriting Headway's financial performance.
              Key financial metrics that are entirely unavailable through public sources include annual
              revenue or ARR, gross margin and EBITDA, monthly cash burn rate, cash on hand, runway in
              months, provider LTV, blended CAC, and revenue breakdown by payer. Every financial model
              for Headway must rely on either the analyst-derived proxy estimates in Section 2—explicitly
              labeled as illustrative ranges—or undisclosed company-provided data available only under NDA.

              Despite this opacity, the structural financial picture assembled from public evidence is
              coherent: $321M+ raised from major venture investors at increasing valuations, strong
              traction indicators (34,000+ providers, 45+ payer contracts, and approximately 600,000
              monthly appointments referenced on the company homepage), and a market with structural
              tailwinds from insurance parity mandates and post-pandemic mental health demand. The
              financial verdict is qualified positive for diligence continuation: the revenue model
              carries favorable quality characteristics (fee-for-service, aligned incentives, no
              subscription revenue at risk from churn), the capital structure carries no identified
              debt, and the Series D extends runway. However, the diligence file is incomplete without
              audited financials, a confirmed CAC/LTV breakdown, payer revenue concentration data,
              and a burn-to-ARR ratio. Investors must require full financial disclosure under NDA
              before any investment decision. The Optum rate cut episode in late 2024 is an operational
              data point demonstrating that payer leverage can compress margins without public visibility.
            claimRefs:
