              The mental health therapy market is undergoing structural convergence: employer-EAP companies (Spring
              Health, Lyra) are adding insurance-integration capabilities (via Alma acquisition), while
              insurance-network companies (Headway, Grow) are adding EHR and care coordination tools. As this
              convergence progresses, the current basis of competition (insurance network vs. employer EAP) will erode.
              Headway's durable differentiation will depend on moving up the value chain—deeper clinical outcomes data,
              government-plan compliance infrastructure, and predictive patient-provider matching— before Grow Therapy's
