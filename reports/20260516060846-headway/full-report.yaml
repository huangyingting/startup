            title: 'Post-COVID Demand + MHPAEA Enforcement: Structural Market Pull'
            body: >-
              The combination of elevated post-COVID mental health prevalence (59.3M AMI adults; 36.2% in 18–25 cohort)
              and accelerating MHPAEA enforcement pressure on insurers creates structural demand for in-network mental
              health providers that Headway is positioned to supply at scale. This dual tailwind is regulatory and
