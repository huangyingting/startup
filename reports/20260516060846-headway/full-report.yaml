  - id: TI005
    title: Public Financial Gaps Table
    tableType: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the most material financial metrics unavailable for Headway as a private company with no public reporting
        obligations, identified through comparison of standard venture underwriting requirements against publicly
        accessible sources as of May 2026. Additional operational metrics (e.g., provider churn, payer renewal rates,
        claims denial rates) are also undisclosed but are secondary to the items listed here.
    columns:
      - missing_metric
      - impact_on_diligence
      - exact_diligence_path
    rows:
      - - Annual revenue or ARR
        - >-
          Cannot compute valuation multiple, growth rate, or revenue quality; entire financial model rests on proxy
          estimates
        - >-
          Request audited annual revenue figure (or CFO-certified MRR/ARR) for FY2023 and FY2024 under NDA; cross-check
          against provider-level session data
      - - Gross margin and EBITDA
        - Cannot assess unit economics sustainability, infrastructure cost leverage, or path to profitability
        - >-
          Request gross profit by revenue stream and EBITDA bridge (FY2023, FY2024) under NDA; reconcile with provider
          payment economics
      - - Monthly cash burn rate
        - >-
          Cannot calculate runway or assess capital adequacy beyond stated $321M+ raised; timing of next-round
          dependency unknown
        - >-
          Request monthly burn rate (last 3 months), CFO-certified cash position, and projected runway at current
          trajectory under NDA
      - - Customer acquisition cost (CAC) and provider LTV
        - Cannot validate that LTV/CAC ratio is sustainable; referral-driven CAC claim is unquantified
        - >-
          Request blended CAC by acquisition channel (referral vs. outbound), average provider lifetime on platform, and
          LTV computation methodology
      - - Payer revenue concentration
        - Cannot assess dependency on any single payer; Optum rate cut precedent makes concentration a material risk
        - >-
          Request revenue breakdown by top-5 payers as % of total; request contract terms, duration, and renewal
          provisions for top-3 payers
      - - Revenue breakdown by payer segment (commercial vs. Medicare Advantage vs. Medicaid)
        - >-
          Cannot assess impact of government-plan expansion on blended reimbursement and margin; mix shift risk is
          unquantifiable
        - >-
          Request revenue and session volume by payer type (commercial, Medicare Advantage, Medicaid) for most recent
          completed fiscal year
    notes: >-
      All items reflect metrics that are standard in venture-stage financial diligence but are unavailable for Headway
      due to its status as a private company with no SEC reporting obligations. The absence of these metrics does not
      imply negative performance; it reflects structural opacity inherent to private healthcare technology companies.
      Each diligence path assumes a signed NDA and investor data room access.
    claimRefs:
      - CI030
      - CI031
      - CI032
      - CI034
      - CI028
