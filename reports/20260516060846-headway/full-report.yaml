        - $900M+ (analyst estimate; assumes nationwide coverage, government-plan volume, provider network to 60K+)
        - $600M (analyst estimate; assumes steady growth with competitive pressure limiting market share gains)
        - $180M (analyst estimate; assumes continued payer pressure, provider attrition, no recovery)
        - Low — 2028 estimates compound unconfirmed 2024 baseline with multi-year growth assumptions
      - - Exit Valuation Range
        - $6B–$8B (IPO or strategic acquisition at 8–10x 2028 revenue; behavioral health market leader)
        - $3B–$4.5B (strategic M&A by large insurer or EHR platform at 5–7x 2028 revenue)
        - $800M–$1.5B (distressed sale or forced merger at 4–5x compressed revenue)
        - >-
          Medium — comparable exit valuations anchored to Lyra ($5.58B), Spring Health unicorn, Oscar Health ($2.4B
          public)
      - - Key Assumption
        - >-
          Nationwide provider coverage, Medicare/Medicaid margin accretive, payer contracts stable, no major regulatory
          disruption
        - Commercial growth continues, Medicare/Medicaid margin-neutral, one or two payer rate renegotiations contained
        - >-
          Major payer contract loss or sustained rate compression, provider attrition accelerates, capital raise at
          down-round
        - Medium — assumptions are directionally supportable from public evidence but quantitatively unconfirmed
      - - Downside Trigger
        - No specific downside trigger in bull scenario; risk is opportunity cost if growth plateaus
        - Payer concentration above 40% in top-2 payers creates fragility; any non-renewal triggers downgrade to bear
        - >-
          UnitedHealth/BCBS contract non-renewal or FTC enforcement action on provider classification or billing
          practices
        - >-
