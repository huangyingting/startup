  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model & Pricing Architecture
        blocks:
          - type: paragraph
            body: |
              Headway operates a pure intermediary revenue model: it retains an admin fee of approximately
              10–15% of each insurance reimbursement processed through its platform, earning revenue only
              when a billable therapy session is delivered. There is no monthly subscription fee charged to
              providers—providers join the Headway network at no cost, and Headway handles credentialing,
              billing submission, and insurance contracting on their behalf. The patient pays their standard
              insurance copay or deductible directly; Headway collects the difference between the gross
              insurance reimbursement (typically $150–200 per outpatient session) and the net amount
              remitted to the provider. This fee-for-service structure means revenue is recognized when care
              is delivered, not upon provider enrollment or contract signing—a favorable revenue quality
              characteristic that aligns platform incentives with patient access and provider utilization.

              Headway contracts with 45+ insurance payers and submits claims under group billing
              arrangements, pooling provider billing credibility and simplifying the claim submission
              workflow for individual providers. For comparison, SimplePractice charges providers a flat
              subscription of $49–$99 per month regardless of session volume—a structurally different model
              that generates no revenue from care delivery. Headway's percentage-based take creates a
              revenue ceiling tied to session reimbursement rates and payer contractual terms, meaning any
              payer-driven rate compression directly reduces per-session economics. Revenue mix is
              dominated by commercial insurance sessions through the 45+ contracted payers; Medicare
              Advantage and Medicaid expansion announced in July 2024 represent incremental revenue streams
              with different reimbursement rate structures and higher compliance overhead. Platform or
              technology-licensing fees for health plans are referenced in the health-plan-facing marketing
              pages but are not confirmed as a separate revenue stream with published economics.
