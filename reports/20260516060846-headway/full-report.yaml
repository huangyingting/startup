companyProfile:
  summary: >-
    Headway (TherapyMatch, Inc.) is the largest insurance-native mental health network in the United States. Founded in
    2019 in New York City by Andrew Adams and co-founders, Headway removes the administrative barriers that prevent
    therapists from accepting insurance — credentialing, billing, and claims processing — enabling 34,000+ credentialed
    providers to see patients covered by 45+ commercial insurance plans. The company has served over 1 million patients
    and operates across all 50 states and Washington DC. Headway reached a $2.3B valuation at its Series D ($100M, July
    2024), bringing total capital raised to approximately $321M+. With 700+ employees and a recently appointed CTO
    (January 2025) and CMO (August 2025), Headway is scaling its platform toward Medicare Advantage and Medicaid
    expansion.
