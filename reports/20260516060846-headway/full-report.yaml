              Grow Therapy's 125+ insurance partnerships (vs. Headway's 45+) and existing Medicare/Medicaid inclusion
              suggest Grow has achieved broader payer diversification—potentially making it more attractive to health
              plans seeking maximal network breadth. Separately, Spring Health's acquisition of Alma consolidates two
              historically distinct competitive models (employer EAP + insurance network) into a single entity, creating
              the only competitor capable of serving both employer and insurer buyers simultaneously. This dual-channel
