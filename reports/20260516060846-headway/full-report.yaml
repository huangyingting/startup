  - id: TV005
    title: Thesis-Break and Kill Triggers
    tableType: comparison
    columns:
      - trigger
      - condition
      - probabilityEstimate
      - investmentImplication
      - monitoringIndicator
    rows:
      - - HIPAA breach affecting 10,000+ patients
        - >-
          Confirmed breach of patient health information at scale, triggering HHS enforcement, provider exodus, and
          patient trust collapse
        - 'Low (5–10%): no confirmed breach as of May 2026; HIPAA compliance not independently audited publicly'
        - >-
          Immediate investment halt; potential liability to payers, providers, and patients; regulatory fines and
          reputational damage
        - ONC behavioral health IT compliance reports; HHS breach notification portal; SOC 2 audit availability
      - - Major payer exits Headway network (UnitedHealth or BCBS)
        - >-
          One of the top-2 commercial payers by estimated session volume terminates or non-renews its Headway network
          contract
        - 'Low-Medium (10–15%): Optum rate cuts in 2024 demonstrate payer leverage; full network exit has not occurred'
        - >-
          Revision to bear scenario; 15–30% revenue impact depending on payer concentration; potential provider
          attrition cascade
        - >-
          Headway payer directory updates; press coverage of contract disputes; BCBS or UnitedHealth network adequacy
          filings
      - - Provider reclassification as employees
        - >-
          FTC, DOL, or state labor authority determination that Headway's provider relationships constitute employment
          rather than independent contractor status
        - >-
          Low-Medium (8–12%): FTC has reviewed comparable gig platforms; behavioral health contractor classification is
          under scrutiny nationally
        - >-
          Fundamental business model disruption; platform would owe benefits, payroll taxes, and face labor law
          compliance costs that could eliminate margin
        - >-
          FTC enforcement actions in digital health; state labor board rulings on therapist classification; National
          Academies workforce report findings
      - - Sustained provider NPS below 50 or provider attrition rate above 20% annually
        - >-
          Independent survey or press reporting confirms provider dissatisfaction metrics below minimum viable network
          health threshold
        - >-
          Low-Medium (10%): Trustpilot 3.6/5 rating and portal frustration reports are early warning signals; systematic
          NPS not publicly tracked
        - >-
          Network effects flywheel reversal; declining provider count undermines payer contract renewals and patient
          access commitments
        - >-
          Trustpilot and Google reviews (ongoing); therapist community forum sentiment; American Psychological
          Association workforce surveys
      - - Regulatory enforcement action (FTC or DOL)
        - >-
          FTC or DOL enforcement action on billing practices, provider classification, or data privacy affecting
          TherapyMatch Inc. directly
        - >-
          Low (5–8%): no confirmed enforcement action as of May 2026; Cerebral precedent shows sector-wide regulatory
          risk is real
        - >-
          Immediate investor review; potential valuation reset; comparable to Cerebral's 2022–2023 regulatory-driven
          decline from unicorn status
        - >-
          FTC enforcement tracker; DOL independent contractor rulemaking; CMS audit notices for Medicare/Medicaid
          billing
    notes: >-
      All probability estimates are qualitative assessments based on public evidence as of May 2026; they are not
      actuarial estimates. The Optum rate-cut precedent elevates the payer exit trigger probability relative to a naive
      baseline. The Cerebral cautionary tale demonstrates that regulatory risk in behavioral health is sector-wide, not
      company-specific, and should be monitored proactively. Each monitoring indicator specifies a publicly observable
      signal that would trigger a diligence review if activated. Any two or more triggers activating simultaneously
      would constitute a strong sell signal regardless of individual probability.
