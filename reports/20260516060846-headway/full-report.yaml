  - id: FI001
    title: Revenue Model Bridge
    type: flow
    layout: wide
    summary: >-
      Illustrates how Headway's revenue flows from patient copay and insurer reimbursement through the provider network
      to Headway's retained admin fee, and how that fee funds platform reinvestment. Revenue is earned only when a
      session is delivered (fee-for-service).
    data:
      nodes:
        - id: patient
          label: Patient / Member
          value: Pays standard copay
        - id: insurer
          label: Insurance Payer (45+)
          value: Pays $150-200/session
        - id: provider
          label: Headway Provider (34K+)
          value: Receives net reimbursement after admin fee
        - id: headway
          label: Headway Platform
          value: Retains ~10-15% admin fee
        - id: gross_revenue
          label: Gross Revenue
          value: Est. $150-300M/yr (analyst estimate)
        - id: reinvestment
          label: Reinvestment
          value: Platform engineering, credentialing, provider acquisition, compliance
      edges:
        - from: patient
          to: provider
          label: Copay payment (pass-through)
        - from: insurer
          to: provider
          label: Insurance reimbursement (~$150-200)
        - from: provider
          to: headway
          label: Admin fee (~10-15% of reimbursement)
        - from: headway
          to: gross_revenue
          label: Revenue recognition at session delivery
        - from: gross_revenue
          to: reinvestment
          label: Operating expense allocation
    approximationNotes: >-
      Admin fee percentage is an analyst estimate of ~10-15% derived from independent provider reviews and Series D
      press coverage; it is not confirmed by Headway. Revenue figure of $150-300M/yr is a proxy estimate derived from
      provider count × session volume × reimbursement rate × take rate; it is not company-confirmed. Patient copay
      values depend on individual insurance plan design and are not a Headway revenue item.
