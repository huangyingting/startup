        - '2024'
        - U.S.
        - 34,000 Headway providers / 483,500 BLS counselors ≈ 7% of U.S. mental health counselor workforce
        - Headway provider count growing ~35%/yr (implied from coverage growth)
        - Provider count (company-reported) ÷ BLS employment total
