            body: >-
              The Optum/UnitedHealth rate cut episode (late 2024) revealed a structural vulnerability: Headway earns a
              spread between payer reimbursement and provider payment, giving payers direct leverage over Headway's
              economics. As Headway expands into Medicaid — where rates are substantially below commercial levels — rate
