      - number: '3.2'
        title: 'Direct Competitor Profiles: Grow Therapy and Alma / Spring Health'
        blocks:
          - type: paragraph
            body: |
              Grow Therapy is Headway's closest direct competitor. Founded in 2020, Grow Therapy operates an
              insurance-network facilitation model structurally identical to Headway's: providers join for free,
              Grow credentials them into insurance networks, and Grow retains a rate spread on insurance
              reimbursements. As of May 2026, Grow Therapy lists 26,000+ clinicians nationally, compared to
              Headway's 34,000+—a provider network approximately 31% smaller than Headway's. However, Grow
              Therapy exceeds Headway on raw insurance partner count with 125+ partners versus Headway's 45+,
              and Grow already includes Medicare and Medicaid in its 125+ insurance partnerships—a segment
              Headway announced expansion into in July 2024. Grow Therapy also offers providers free continuing
              education (CE) credits, clinical consultation, EHR, and telehealth tools, comparable to Headway's
              platform capabilities. The $21 average patient session cost with insurance on Grow Therapy suggests
              similar pricing dynamics to Headway's insurance copay model.

              Alma was an independent insurance-enabled practice management platform that charged providers a
              monthly membership fee—a differentiated monetization model from Headway's free-to-provider
              approach. Alma's network covered 112+ million Americans eligible for mental health care through
              its insurance partners. In early 2026, Spring Health completed its acquisition of Alma, as
              confirmed by the Alma website's copyright notice reading "Copyright Alma, a part of Spring Health,
              2026." This acquisition creates a unique dual-channel competitor: Spring Health contributes an
              employer-EAP customer base (20+ million covered lives) while Alma contributes insurance-network
              capabilities. The combined entity is the only competitor that simultaneously serves employer buyers
              (through Spring's EAP contracts) and insurance-plan buyers (through Alma's credentialing network),
              representing a structural convergence threat to Headway's insurance-focused positioning.
