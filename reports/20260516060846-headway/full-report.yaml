      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Fee-for-Service Revenue Model Creates Structural Alignment Between Platform Growth and Revenue Recognition
            body: >-
              Headway's admin fee model is structurally superior to subscription revenue from a quality standpoint:
              revenue is earned only when a session is actually delivered, meaning the platform cannot recognize revenue
              from dormant or inactive providers. This alignment creates natural incentives to maximize provider
              utilization and patient access—Headway earns more when more care is delivered. The absence of subscription
              revenue also means there is no deferred revenue or churn risk on the provider side; provider inactivity
              simply reduces GMV rather than creating an obligation to refund pre-paid fees. For payers, this model
              means Headway's economics are fully variable with network utilization—favorable for network adequacy
              contracting where payers pay for access to an active, credentialed provider pool.
            calloutType: strength
            claimRefs:
              - CI003
              - CI008
              - CI039
              - CI043
          - type: callout
            title: 'Payer Concentration and Rate-Cut Risk: The Optum Precedent Demonstrates Unilateral Margin Compression'
            body: >-
              Headway's revenue model depends entirely on insurance payers maintaining favorable reimbursement rates
              under existing contracts. The late-2024 UnitedHealth/Optum episode— in which Optum unilaterally cut pay
              rates for therapists on digital mental health platforms including Headway—demonstrates that payers can
              compress Headway's per-session economics without public disclosure or investor visibility. With 45+ payer
              contracts and no public revenue concentration data, there is no way to assess from the outside whether one
              or two large payers represent a disproportionate share of total GMV. Any rate renegotiation or contract
              non-renewal by a major payer (UnitedHealth, Aetna, or Cigna) could materially reduce revenue without
              warning. This is the primary financial risk identified from public evidence for Headway.
            calloutType: risk
            claimRefs:
              - CI026
              - CI028
              - CI027
              - CI006
          - type: callout
            title: All Revenue and GMV Figures in This Chapter Are Analyst Estimates, Not Company-Confirmed Data
            body: >-
              The revenue range of $150M–$300M and GMV range of $1.5B–$2.0B presented in this chapter are constructed
              from bottom-up proxy calculations (34,000 providers × estimated session frequency × estimated
              reimbursement rate × estimated take rate) and represent scenarios, not forecasts. Each input carries
              significant uncertainty: session throughput per provider is unconfirmed, reimbursement rate blend across
              45+ payers is unknown, and the effective take rate after any payer-specific adjustments is private. The
              compounding of low-confidence inputs produces a wide range. Investors relying on these estimates for
              valuation modeling do so at their own risk; confirmed revenue should be obtained under NDA before any
              investment decision.
            calloutType: assumption
            claimRefs:
              - CI011
              - CI012
              - CI013
              - CI014
          - type: callout
            title: >-
              Series D Valuation at 7x–19x Estimated Revenue Implies Significant Growth Premium; Range Will Compress
              Once Revenue Is Confirmed
            body: >-
              At a $2.3B post-money valuation against an estimated revenue range of $150M–$300M, Headway trades at an
              implied multiple of 7x–19x estimated revenue. This wide range is a direct consequence of private-company
              opacity rather than intrinsic valuation ambiguity. For context, publicly traded behavioral health SaaS and
              marketplace businesses typically trade at 4x–12x confirmed revenue. If Headway's actual revenue is at the
              high end of the range ($300M), the 7x multiple is reasonable for a market-leading, fast-growing insurance
              infrastructure platform. If actual revenue is at the low end ($150M), the 15x+ multiple implies
              significant future growth pricing that must be supported by confirmed unit economics. This is why audited
              financial disclosure is a prerequisite for investment.
            calloutType: insight
            claimRefs:
              - CI021
              - CI022
              - CI012
              - CI013
          - type: callout
            title: 'Require NDA-Level Financial Disclosure Before Advancing Diligence: Five Priority Data Requests'
            body: >-
              Given the pervasive financial opacity, diligence should not advance beyond the public information stage
              without NDA-level data room access. Five priority requests: (1) audited revenue and gross margin for
              FY2023 and FY2024; (2) monthly cash burn rate for the trailing three months and current cash position; (3)
              provider LTV and blended CAC by acquisition channel; (4) revenue concentration by payer — specifically the
              top-5 payers as a percentage of total revenue; and (5) contract duration, renewal provisions, and
              termination clauses for the top-3 payer relationships. The Optum rate-cut episode makes the payer
              concentration and contract terms request particularly urgent.
            calloutType: recommendation
            claimRefs:
              - CI030
              - CI031
              - CI032
              - CI028
