  - id: FR001
    title: Risk Heatmap
    type: matrix
    layout: wide
    summary: >-
      Risk severity and likelihood assessment across six material risk categories for Headway as of Q1 2026. Each row
      represents a distinct risk area; columns describe the risk category and impact profile at low, medium, and high
      likelihood levels. Severity and likelihood designations are analyst judgments based on public evidence; internal
      risk assessments are not publicly available.
    approximationNotes: >-
      All likelihood and severity designations are analyst assessments based on public regulatory filings, enforcement
      precedents, Headway public disclosures, and comparable platform risk factors. No internal risk register or
      management representation has been reviewed. High severity designations reflect potential magnitude of adverse
      outcomes if the risk materializes at the high-likelihood scenario, not a prediction of occurrence probability.
    claimRefs:
      - CR001
      - CR002
      - CR006
      - CR017
      - CR012
    data:
      columns:
        - Risk Category
        - Low Likelihood
        - Medium Likelihood
        - High Likelihood
      rows:
        - label: Regulatory Compliance (MHPAEA 2024)
          values:
            - Regulatory / Compliance
            - Minimal — payers achieve parity without benefit or rate changes; Headway economics unchanged
            - >-
              Moderate — payers restrict mental health benefit frequency to match medical floor; session volume declines
              10–20%
            - >-
              Severe — payer rate renegotiation or benefit restrictions reduce Headway session volume and per-session
              revenue simultaneously
        - label: HIPAA Data Breach
          values:
            - Data Security / Privacy
            - Contained — small breach remediated with OCR fine under $250K; payer contracts unaffected
            - >-
              Material — OCR enforcement action; civil monetary penalties up to $1.9M per violation category; mandatory
              public disclosure
            - >-
              Catastrophic — large-scale breach of 1M+ patient records; OCR Wall of Shame listing; payer confidence and
              provider trust collapse
        - label: Payer Concentration Risk
          values:
            - Partner / Commercial
            - >-
              Minimal — 45+ payer contracts provide volume diversification; no single-payer termination alone is
              survivable
            - >-
              Material — top-3 payer rate cut compresses per-session fee by 10–20%; provider income falls; attrition
              risk rises
            - >-
              Severe — top-3 payer contract termination removes 15–25% of patient volume; network adequacy falls below
              payer-required floor
        - label: Provider Attrition
          values:
            - Operations / Network
            - >-
              Contained — natural churn offset by new provider enrollment; network density maintained above 30K active
              providers
            - >-
              Material — attrition exceeds recruitment; network density falls toward 25K providers; geographic gaps
              emerge in key markets
            - >-
              Severe — sustained attrition below 20K active providers; payer network adequacy requirements not met;
              payer contracts at risk
        - label: AI Documentation Liability
          values:
            - Technology / Clinical
            - Minimal — isolated AI note errors corrected by providers before clinical use; no external adverse event
            - >-
              Moderate — systematic AI bias or factual errors in SOAP notes create provider liability claims and Headway
              indemnification disputes
            - >-
              Severe — class-action litigation or regulatory action against Headway for AI-generated clinical
              documentation errors affecting patient outcomes
        - label: Worker Classification Risk
          values:
            - Legal / Regulatory
            - >-
              Contained — DOL scrutiny results in minor contract term adjustments; IC classification upheld with
              enhanced documentation
            - >-
              Material — DOL investigation requires revised provider agreement terms; legal costs and operational
              disruption without full reclassification
            - >-
              Catastrophic — court-ordered reclassification as employees adds payroll taxes, benefits, and overtime
              obligations for 34,000+ workers
  - id: FR002
    title: Risk Transmission Map
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing how payer rate compression transmits through the Headway business model to create
      cascading revenue, network, and patient access impacts. The transmission chain illustrates the compounding nature
      of the payer dependency risk: a rate cut does not simply reduce margin — it can trigger a provider attrition
      spiral that ultimately reduces the network's value to remaining payers and compresses total session volume.
    approximationNotes: >-
      Transmission relationships are analyst-inferred from the structural dynamics of a three-sided marketplace. Exact
      thresholds (e.g., the rate-cut magnitude that triggers provider attrition) are not known from public data. The
      Optum November 2024 precedent confirms payer rate compression is an active risk; the magnitude and timing of
      transmission are scenario-dependent and not publicly disclosed.
    claimRefs:
      - CR017
      - CR018
      - CR020
      - CR028
      - CR032
    data:
      nodes:
        - id: N1
          label: Payer Rate Compression
          description: >-
            Payer (e.g., Optum/UnitedHealth) reduces per-session reimbursement rate to Headway network; precedent
            documented November 2024 by Clear Health Costs
        - id: N2
          label: Provider Income Decline
          description: >-
            Headway's per-session administrative fee falls as total reimbursement shrinks; providers receive lower net
            payment per session after Headway fee
        - id: N3
          label: Provider Attrition
          description: >-
            Providers whose net income per Headway session falls below their income floor exit the platform; active
            provider count begins declining
        - id: N4
          label: Network Shrinkage
          description: >-
            Active provider count falls; geographic coverage gaps emerge; average patient wait times increase; network
            adequacy at risk with contracting payers
        - id: N5
          label: Patient Access Decline
          description: >-
            Fewer available in-network providers means longer appointment wait times and geographic access gaps for
            patients relying on Headway's network
        - id: N6
          label: Revenue Loss
          description: >-
            Compound effect: lower per-session fee plus fewer total billable sessions reduces Headway's total
            administrative fee revenue simultaneously
      edges:
        - from: N1
          to: N2
          label: Rate cut reduces Headway admin fee per session
        - from: N2
          to: N3
          label: Reduced provider income triggers platform departure
        - from: N3
          to: N4
          label: Provider departures reduce active network density
        - from: N4
          to: N5
          label: Network gaps reduce available appointment slots for patients
        - from: N4
          to: N6
          label: Fewer active providers means fewer billable sessions
        - from: N5
          to: N6
          label: Reduced patient access further compresses total session volume
  - id: FR003
    title: Dependency Map
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing the six critical operational dependencies of the Headway platform core as of Q1
      2026. All five upstream dependencies must operate reliably for the Headway platform to deliver provider portal,
      patient booking, billing automation, and EHR functionality. Cloud infrastructure is the undisclosed common host
      for all platform services, making it the highest-severity single point of failure.
    approximationNotes: >-
      Dependency relationships are inferred from public product documentation, Greenhouse engineering job postings, and
      regulatory compliance requirements. Specific vendor identities for cloud infrastructure, telehealth video, and
      EPCS are not publicly disclosed by Headway. All relationships are verified against public platform documentation;
      internal architecture diagrams and vendor contracts are not available.
    claimRefs:
      - CR021
      - CR022
      - CR023
    data:
      nodes:
        - id: D1
          label: Insurance Payer APIs (45+)
          description: >-
            Real-time eligibility verification, claim submission, and EOB retrieval from all 45+ contracted payers;
            fragmented payer API landscape requires continuous maintenance
        - id: D2
          label: Cloud Infrastructure (Undisclosed)
          description: >-
            Undisclosed cloud hosting provider for HIPAA-compliant ePHI storage and compute; common host for all
            platform services including provider portal, EHR, billing, and patient matching
        - id: D3
          label: HIPAA Compliance Stack
          description: >-
            Encryption controls, business associate agreements with cloud vendors, audit logging, access controls, and
            breach notification procedures required for all ePHI operations
        - id: D4
          label: State Licensing Databases
          description: >-
            License verification integrations for all 50 states and DC; required for provider credentialing, ongoing
            license monitoring, and telehealth compliance verification
        - id: D5
          label: AI / ML Engine
          description: >-
            Patient-provider matching algorithm; AI-assisted SOAP note generation launched September 2025; Bayesian
            experimentation platform supporting product optimization
        - id: D6
          label: Headway Platform Core
          description: >-
            Integrated provider portal, patient booking marketplace, automated insurance billing pipeline, and
            AI-assisted EHR — the operational surface delivered to 34,000+ providers and 1M+ patients
      edges:
        - from: D1
          to: D6
          label: Payer APIs required for claim submission and eligibility verification
        - from: D2
          to: D6
          label: Cloud infrastructure hosts all platform services and HIPAA-compliant ePHI data
        - from: D3
          to: D6
          label: HIPAA compliance controls required for all PHI operations on the platform
        - from: D4
          to: D6
          label: License data required for provider credentialing and ongoing compliance monitoring
        - from: D5
          to: D6
          label: AI matching and note-assist power core provider and patient UX
        - from: D1
          to: D2
          label: Payer claim data processed and stored through cloud infrastructure
  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: wide
    summary: >-
      Decision flow from four evidence inputs — market opportunity, competitive position, financial profile, and risk
      factors — to the conditional buy recommendation for Headway. Each input node is supported by confirmed public
      evidence; the recommendation node captures the conditional element requiring NDA-level diligence confirmation.
    data:
      nodes:
        - id: N1
          label: Market Opportunity
          value: >-
            Large, Underserved TAM: $280B+ behavioral health market; 53.8% AMI treatment gap; COVID-accelerated
            telehealth
        - id: N2
          label: Competitive Position
          value: 'Network Effects + Insurance-Native EHR: 34,000+ providers, 45+ payers, no-subscription moat'
        - id: N3
          label: Financial Profile
          value: '$2.3B Valuation, $321M+ Raised: Series D at $100M; 5–10x implied revenue multiple (unconfirmed revenue)'
        - id: N4
          label: Risk Factors
          value: 'Payer Concentration + Rate Compression + Regulatory: Optum 2024, Cerebral precedent, FTC risk'
        - id: N5
          label: Recommendation
          value: 'Conditional Buy — Pending 6 Diligence Asks: Revenue, Churn, Payer Terms, Burn Rate, Cap Table, HIPAA'
      edges:
        - from: N1
          to: N5
          label: TAM + demand gap supports growth runway
        - from: N2
          to: N5
          label: Network effects moat supports premium multiple
        - from: N3
          to: N5
          label: Capital efficiency and investor quality support entry
        - from: N4
          to: N5
          label: Risk factors elevate diligence requirements
        - from: N1
          to: N2
          label: Market scale drives competitive differentiation of insurance-native model
    approximationNotes: >-
      Flow represents the qualitative decision logic applied to confirmed public evidence. Edge labels are condensed
      descriptions of multi-factor reasoning chains; full analysis is in the section bodies. The recommendation node is
      conditional, not a final investment decision; it reflects the diligence state as of May 2026 based on publicly
      available evidence only.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV033
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    layout: standard
    summary: >-
      Implied valuation at five revenue multiple scenarios applied to the midpoint of the estimated 2024 revenue range
      ($230M). Illustrates the sensitivity of Headway's current $2.3B mark to the assumed revenue multiple. The current
      $2.3B mark corresponds approximately to the 10x scenario, indicating it prices in strong growth expectations
      relative to estimated current revenue.
    data:
      items:
        - label: 3x Revenue Multiple (Bear)
          value: 690
        - label: 5x Revenue Multiple (Low Base)
          value: 1150
        - label: 8x Revenue Multiple (Base)
          value: 1840
        - label: 10x Revenue Multiple (High Base / Current Mark)
          value: 2300
        - label: 15x Revenue Multiple (Bull)
          value: 3450
    approximationNotes: >-
      All valuations are derived by applying the labeled multiple to the midpoint revenue estimate of $230M (low end of
      the $230M–$460M estimated 2024 revenue range). The estimated revenue is analyst-derived and not company-confirmed;
      the actual revenue may be higher or lower, shifting all implied valuations proportionally. The 3x bear multiple
      reflects behavioral health platforms under financial distress; 15x bull multiple reflects peak behavioral health
      infrastructure pricing (Lyra Health 2021 peak). The current $2.3B Series D mark corresponds to the 10x scenario.
    claimRefs:
      - CV009
      - CV010
      - CV017
  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: wide
    summary: >-
      Valuation range estimates across five scenarios: the confirmed current mark (Series D), bear exit, base exit, bull
      exit, and TAM-adjusted ceiling. All exit scenarios are forward-looking estimates with explicit assumption
      dependencies; only the current mark is confirmed from primary sources.
    data:
      items:
        - label: Current Mark (Jul 2024 Series D)
          low: 2300
          high: 2300
          unit: $M
          confidence: confirmed — Fierce Healthcare, STAT News, MobiHealthNews, Axios, NYT
          description: Confirmed $2.3B post-money at Series D; SEC Form D confirms $99,999,939 raised; first sale July 16, 2024
        - label: Bear Exit (2027–2028)
          low: 800
          high: 1500
          unit: $M
          confidence: analyst estimate — low confidence; depends on distressed sale conditions
          description: >-
            Distressed sale or forced merger scenario; triggered by major payer contract loss or regulatory enforcement
            action
        - label: Base Exit (2027–2029 M&A)
          low: 2500
          high: 4000
          unit: $M
          confidence: analyst estimate — medium confidence; anchored to comparable M&A precedents
          description: >-
            Strategic acquisition by large insurer or EHR platform at 5–7x 2028 estimated revenue; comparable to Lyra /
            Spring Health strategic value
        - label: Bull Exit (IPO 2029–2030)
          low: 4000
          high: 7000
          unit: $M
          confidence: analyst estimate — low-medium confidence; depends on IPO market conditions and profitability
          description: >-
            IPO or premium strategic acquisition as behavioral health market leader; analogous to Change Healthcare
            infrastructure value
        - label: TAM-Adjusted Ceiling
          low: 5000
          high: 10000
          unit: $M
          confidence: speculative — scenario ceiling based on market share assumptions; not a price target
          description: >-
            10% of $280B+ behavioral health TAM at ~2x revenue multiple; theoretical ceiling assuming dominant market
            position
    approximationNotes: >-
      All exit scenario ranges are analyst-constructed forward estimates based on comparable M&A and IPO precedents in
      behavioral health and adjacent healthcare technology. They are not investment recommendations or price targets.
      The current mark ($2.3B) is the only confirmed data point in this figure. Bear, base, and bull exit ranges depend
      on future revenue performance, market conditions, and exit dynamics that cannot be predicted from current public
      evidence. The TAM-adjusted ceiling is a theoretical maximum, not a realistic near-term scenario.
    claimRefs:
      - CV009
      - CV017
      - CV018
      - CV019
      - CV020
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      Five key performance indicators summarizing the investment case for Headway as of May 2026, combining confirmed
      primary-source metrics with analyst-derived estimates. Confirmed metrics are backed by SEC filings and Tier-1
      press; estimated metrics are clearly labeled as analyst proxies.
    data:
      items:
        - label: Total Valuation (Jul 2024)
          value: $2.3B
          note: Confirmed Series D post-money mark — Fierce Healthcare, STAT News, Axios, NYT, MobiHealthNews
        - label: Provider Network Size
          value: 34,000+
          note: As of Q4 2024 — confirmed in Series D announcement and press coverage
        - label: Insurance Partners
          value: 45+
          note: Commercial payer network as of May 2026 — confirmed on headway.co
        - label: Total Capital Raised
          value: $321M+
          note: Series A ($26M) + Series B ($70M) + Series C ($125M) + Series D ($100M) — confirmed via SEC Form D and press
        - label: Estimated Revenue Range 2024E
          value: $230M–$460M
          note: >-
            Analyst estimate based on session volume proxy; unconfirmed by company — wide range reflects compounding
            estimation uncertainty
    approximationNotes: >-
      The estimated revenue range is an analyst-derived proxy based on provider count × estimated session frequency ×
      estimated reimbursement rate × estimated take rate. All four inputs carry uncertainty; the compounding of these
      uncertainties produces the wide $230M–$460M range. The confirmed metrics (valuation, provider count, insurance
      partners, total raised) are from primary sources and carry high confidence. The KPIs should be updated when
      NDA-level financial data is obtained from Headway.
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
