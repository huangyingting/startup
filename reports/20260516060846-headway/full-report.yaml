            body: >-
              Approximately 29.3 million U.S. adults with AMI received no mental health treatment in 2022. One in three
              Medicaid beneficiaries and one in four Medicare beneficiaries live with a mental illness — yet government
              plans historically have the lowest in-network mental health provider penetration. Headway's planned
              Medicare Advantage and Medicaid expansion (2024–2025) is structurally targeted at this gap. If
              government-plan reimbursement rates can support provider participation, this expansion represents the
              highest-impact path to closing the treatment gap and converting a massive latent demand pool into
