          Headway
      - - NIMH + SAMHSA (insured outpatient SAM)
        - 2022–2024
        - U.S.
        - 'SAM: ~$32B (~18M insured therapy-seeking adults × $1,800/yr avg 12 sessions × $150/session)'
        - Not available
        - Treatment subset (30M) × ~60% insurance use share × session frequency × avg reimbursement
        - Low
