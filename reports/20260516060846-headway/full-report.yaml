      - number: '6.3'
        title: Named Customer Proof and Payer Partnerships
        blocks:
          - type: paragraph
            body: |
              The two most prominently documented payer partnerships are Blue Cross and Blue Shield of
              North Carolina (BCBS-NC) and Horizon Healthcare Services of New Jersey (Horizon). The
              BCBS-NC partnership was announced in July 2022 via the Headway blog. The Horizon
              Healthcare Services partnership was announced in December 2021, representing one of
              Headway's earliest named payer relationships. Both are large regional commercial health
              plans with multi-million member bases, confirming that Headway has secured institutional
              payer agreements with mainstream commercial insurers — not only with smaller regional or
              specialty plans.

              Beyond these two named partnerships, the Headway provider marketplace lists over 45
              insurance plans including Aetna, Anthem, Cigna, Oxford, UnitedHealthcare, Oscar Health,
              and others, implying contracts with the dominant commercial payer incumbents. These are
              visible in the provider search interface at headway.co/insurance, where patients can
              filter providers by insurance plan. The breadth of plan coverage strongly suggests
              contracts are in place with all major national commercial payers, though the individual
              terms, exclusivity arrangements, and revenue-share structures are not publicly disclosed.

              Provider-side testimonial evidence is mixed. The Philosophie Therapy case study presents
              a positive narrative emphasizing ease of insurance billing and reduced administrative
              burden for therapists joining Headway's network. The DL Method review presents an
              opposing view from a clinician perspective, documenting frustrations including
              credentialing delays, payment timing inconsistencies, and a lack of a direct phone
              support line. The DL Method review constitutes material adverse evidence on the provider
              retention thesis: if payment reliability and support responsiveness are below clinician
              expectations, provider churn could undermine the network's long-term supply-side strength.

              Both testimonials are sourced from independent third-party websites rather than
              Headway's own marketing materials, giving them higher evidentiary weight than company-hosted
              testimonials. However, neither can be treated as statistically representative since no
              provider survey data or aggregate satisfaction metrics are publicly available.
