      - number: '3.4'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: |
              Across the insurance-network facilitation segment, the free-to-provider model is now standard:
              both Headway and Grow Therapy offer providers credentialing, billing, EHR, and scheduling at no
              cost, with revenue generated from the payer rate spread. Alma deviated from this model with a
              provider membership fee, but that structure may change under Spring Health ownership. BetterHelp's
              providers are compensated per session by the platform; Lyra Health and Modern Health pay providers
              under employer contracts. The pricing gap between Headway's insurance copay model (patient pays
              standard copay) and BetterHelp's subscription ($60–90/week) favors Headway for insured patients
              but BetterHelp for uninsured or out-of-network-preferred patients.

              On go-to-market strategy, Headway's B2B health-plan channel (selling network access to insurers
              and using multi-year payer contracts for revenue predictability) is fundamentally different from
              BetterHelp's B2C paid acquisition model. This structural difference is significant: Headway's
              payer contracts create recurring, predictable revenue with meaningful switching costs on the
              payer side, while BetterHelp's direct-to-consumer acquisition depends on marketing efficiency
              and pricing sensitivity. Grow Therapy appears to use a similar health-plan B2B approach given
              its 125+ insurance partnerships, though Grow's specific contract structure is not publicly
              disclosed. On trust and regulatory posture, BetterHelp faced Federal Trade Commission (FTC)
              scrutiny in 2023 for alleged privacy violations and misleading advertising—a material reputational
              event that Headway and Grow Therapy have not faced. Cerebral, a prescribing-focused telehealth
              platform, faced DEA investigation and insurance fraud allegations in 2022, resulting in workforce
              reductions and loss of some insurance contracts—illustrating the regulatory and reputational risk
              profile of the mental health platform sector. Headway's BBB profile and independent provider
              reviews reveal some billing and administrative experience complaints, but no regulatory enforcement
              actions have been publicly reported as of the run date.
