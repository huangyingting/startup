      - number: '5.3'
        title: Compliance, Security, and Data Governance
        blocks:
          - type: paragraph
            body: |
              As a healthcare technology company handling electronic protected health information (ePHI)
              for mental health providers and their patients, Headway is a HIPAA-covered entity or
              business associate subject to both the HIPAA Security Rule (45 CFR Parts 164.302–164.318)
              and the HIPAA Privacy Rule (45 CFR Parts 164.500–164.534). The Security Rule requires
              administrative, physical, and technical safeguards to protect ePHI at rest and in transit;
              the Privacy Rule governs patient rights, notice of privacy practices, and permissible
              disclosures. Headway publishes a Privacy Policy and Terms of Service that reference these
              obligations, and its insurance billing and EHR functions require business associate
              agreements (BAAs) with cloud infrastructure vendors and any third-party processors touching
              PHI.

              A distinct compliance obligation arises from 42 CFR Part 2, administered by SAMHSA, which
              imposes stricter confidentiality requirements on records related to substance use disorder
              (SUD) treatment. Given that Headway's provider network includes therapists who treat
              patients with comorbid SUD conditions, this regulation may apply to a subset of records
              in the platform—a compliance gap not explicitly addressed in any public documentation.

              On ONC EHR certification: Headway's AI-assisted EHR, launched in September 2025, does not
              appear on the ONC Certified Health IT Product List (CHPL) as of the research date. ONC
              certification is not currently required for all EHR deployments (requirements depend on
              whether the product participates in programs that mandate certified technology), but the
              absence from CHPL signals that Headway has not yet pursued this certification pathway,
              which could become a requirement as it expands into Medicare and Medicaid programs that
              tie payment to certified EHR use. Headway's security job postings reference GRC (governance,
              risk, and compliance) functions but no public SOC 2 Type II or ISO 27001 certification
              has been announced.
