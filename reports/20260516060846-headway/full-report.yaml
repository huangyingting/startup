      - number: '8.3'
        title: Scenario Analysis (Bull / Base / Bear)
        blocks:
          - type: paragraph
            body: |
              Three scenarios frame the range of investment outcomes for Headway over a 3–5 year
              horizon, each anchored to specific assumptions about revenue growth, reimbursement
              sustainability, competitive dynamics, and exit market conditions.

              In the bull scenario (probability 40%), Headway executes its nationwide behavioral health
              coverage expansion, successfully integrates Medicare Advantage and Medicaid to add
              incremental volume without catastrophic margin compression, and achieves revenue of
              approximately $500M in 2026 and $900M+ in 2028 driven by provider network growth and
              payer contract expansion. Network effects and the insurance-native EHR create a durable
              moat. Headway becomes the dominant infrastructure layer for behavioral health — analogous
              to Change Healthcare for general medical billing. Exit at 8–10x 2028 revenue via IPO or
              strategic acquisition by a major payer or health system yields a $6–8B valuation. Investors
              at the Series D $2.3B mark achieve a 2.5–3.5x return.

              In the base scenario (probability 45%), Headway grows 20–30% annually, achieves revenue of
              approximately $350M in 2026 and $600M in 2028, but faces ongoing reimbursement pressure
              from the Optum precedent and increasing competitive intensity from employer-direct platforms.
              The Medicare/Medicaid expansion contributes incremental volume at lower margin than
              commercial. Exit at 5–7x 2028 revenue via strategic M&A (large insurer, EHR platform)
              in the 2027–2029 window yields $3–4.5B. Investors at the Series D achieve a 1.3–2.0x
              return.

              In the bear scenario (probability 15%), a major payer contract loss or sustained
              reimbursement rate cuts trigger provider attrition (providers leave for direct contracting
              or competing platforms). Patient volume declines, revenue compresses to $200M by 2026,
              and the company is unable to raise new capital at a favorable valuation. Forced merger with
              a larger health system or distressed sale at 4–5x compressed revenue yields $800M–$1.5B.
              Investors at the Series D sustain a 35–65% loss. The bear trigger most likely to occur
              is the payer concentration scenario — a large payer exit from the network, not a
              market-wide downturn. Regulatory risk (FTC or DOL enforcement action on provider
              classification or billing practices) is a secondary bear trigger.

              The bear probability of 15% is non-trivial and reflects the Optum 2024 precedent as
              a demonstrated structural vulnerability, not a theoretical concern. The key monitoring
              signal is payer contract renewal rates — if any of the top-3 payers by estimated revenue
              does not renew or renegotiates materially downward, the base scenario collapses into bear.
