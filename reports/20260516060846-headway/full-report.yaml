            - Medium — adverse signals corroborated by multiple independent platforms
  - id: FU004
    title: Estimated Provider Retention Cohort
    type: cohort
    layout: standard
    summary: >-
      Analyst-estimated gross provider retention rates by annual acquisition cohort, based on comparable marketplace
      platform benchmarks and structural switching cost analysis. Headway has not disclosed provider churn, NRR, or GRR;
      all values are estimates and should be validated against internal cohort data in diligence.
    approximationNotes: >-
      All values are analyst estimates derived from mental health marketplace structural analysis and comparable B2B2C
      platform benchmarks (typical Year 1 gross retention of 82–88% for platforms with high onboarding investment and
      switching costs). The insurance credentialing lock-in mechanism — where providers are credentialed with 45+ payers
      through Headway — creates above-average switching cost, supporting retention estimates at the high end of the
      benchmark range. Adverse Trustpilot and BBB signals introduce downward pressure on Year 2+ estimates. No
      Headway-disclosed cohort data exists; these estimates require data room validation.
