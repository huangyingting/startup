  - id: TV006
    title: Final Diligence Asks
    tableType: comparison
    columns:
      - ask
      - priority
      - rationale
      - impact
      - status
    rows:
      - - Audited FY2023 and FY2024 revenue and EBITDA
        - Critical
        - >-
          Revenue confirmation is the single highest-priority item: compresses the implied 5–10x multiple range to a
          precise figure and enables full valuation underwriting
        - >-
          Would validate or challenge the $2.3B Series D mark; if revenue is below $200M the implied multiple exceeds
          11x and requires reassessment
        - Outstanding — not publicly disclosed; requires NDA and investor data room access
      - - Provider churn and NPS data (trailing 12 months)
        - High
        - >-
          Network effects flywheel thesis depends on provider retention; Trustpilot 3.6/5 adverse signal and portal
          frustration reports require direct refutation
        - High provider churn (>20% annually) would undermine the network moat thesis and reduce payer contract leverage
        - Outstanding — not publicly disclosed; requires NDA data room access and provider cohort analysis
      - - Payer contract terms and renewal dates for top-5 payers
        - High
        - >-
          Optum 2024 rate cuts demonstrate unilateral payer leverage; payer concentration must be quantified and
          contract protections assessed
        - If top-3 payers represent >60% of revenue, payer concentration risk elevates bear probability to 25%+
        - >-
          Outstanding — contract terms are confidential; requires NDA; payer directory count (45+) is public but revenue
          concentration is private
      - - Burn rate and runway (last 3 months and 12-month forward projection)
        - High
        - >-
          Series D closed July 2024; 10 months have elapsed; burn rate and runway are required to assess capital
          adequacy for the expansion plan
        - >-
          Burn rate above $15M/month would imply runway below 18 months; at that point a follow-on raise or bridge would
          be imminent
        - Outstanding — not publicly disclosed; requires NDA and CFO-certified cash position
      - - Cap table and preference stack
        - Medium
        - >-
          With $321M+ raised and multiple rounds including a16z, Spark Capital, GV, and Accel, the preference stack and
          liquidation waterfall determine effective returns at various exit multiples
        - >-
          Heavy preference overhang (e.g., 2x+ liquidation preferences on early rounds) could compress common returns at
          exit multiples below 3x
        - >-
          Outstanding — private; requires NDA; SEC Form D confirms 9 investors in Series D but preference terms are not
          disclosed
      - - HIPAA compliance audit and SOC 2 Type II report
        - Medium
        - >-
          Handling PHI for 34,000+ providers and 600,000+ monthly patient sessions creates material HIPAA liability; SOC
          2 Type II confirms security controls
        - >-
          Confirmed HIPAA gaps or missing SOC 2 report would elevate the kill-trigger probability for the breach
          scenario and potentially violate payer contract requirements
        - >-
          Outstanding — not publicly available; ONC behavioral health IT guidance provides framework but
          company-specific audit is required
    notes: >-
      Priority levels: Critical (investment cannot proceed without resolution), High (required before term sheet),
      Medium (required before final commitment). All six diligence asks are outstanding as of May 2026 due to Headway's
      private company status. The conditional buy recommendation is explicitly conditioned on all Critical and High
      items clearing their respective thresholds. Medium items should be addressed before final commitment but do not
      independently block a term sheet.
