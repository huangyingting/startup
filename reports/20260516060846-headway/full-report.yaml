  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive Landscape: Direct Peers, Incumbents, Adjacents, Substitutes, and Likely Entrants'
        blocks:
          - type: paragraph
            body: |
              Headway competes across at least five distinct competitive categories in the U.S. outpatient mental
              health therapy market. The direct peer category contains insurance-network facilitators that share
              Headway's core business model—credentialing therapists, contracting with payers, and retaining a
              rate spread. Grow Therapy and Alma (now part of Spring Health) are the two most significant direct
              peers. Adjacent competitors operate employer Employee Assistance Program (EAP) replacement models
              that sell to self-insured employers rather than insurance plans; Spring Health, Lyra Health, and
              Modern Health are the leading EAP platforms. Substitutes include direct-to-consumer (DTC) therapy
              services (BetterHelp, Talkspace) that bypass insurance billing entirely or partially, and traditional
              EHR and practice management software (SimplePractice, TherapyNotes) that serve providers without
              offering insurance integration.

              The incumbent status-quo competitors are the in-house provider directories built into major
              insurance portals (UnitedHealth/Optum, Aetna, Cigna, Blue Cross Blue Shield). These directories
              require providers to manage credentialing independently, offer no EHR or billing automation, and
              represent the friction Headway eliminates. For patients, the status quo is either cash-pay private
              therapy ($150–$300/session) or navigating insurer directories that return limited available
              appointments. Likely future entrants include large technology and healthcare companies with existing
              insurance infrastructure—Amazon (via One Medical), Google (via behavioral health partnerships), and
              Optum (UnitedHealth Group's care services arm) if it accelerates proprietary credentialing
              technology. More than 70% of U.S. therapists historically decline insurance due to administrative
              burden, representing the shared provider recruitment opportunity across both Headway and Grow
              Therapy. No single entrant has replicated Headway's combination of payer depth, provider scale,
              and health-plan B2B go-to-market as of May 2026.
