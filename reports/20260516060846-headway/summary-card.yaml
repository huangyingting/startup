summary:
  headline: >-
    Headway is the structurally strongest position in insurance-native behavioral health tech with 34,000+ providers and
    45+ payer contracts, but the $2.3B Series D valuation prices in significant execution on Medicare/Medicaid expansion
    and reimbursement rate stability — both of which carry material regulatory and payer-concentration risk. Conditional
    positive pending financial disclosure diligence.
