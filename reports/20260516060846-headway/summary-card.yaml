  topStrengths:
    - >-
      Largest insurance-native mental health network in the US with 34,000+ credentialed providers and 45+ payer
      contracts — a multi-sided network effect that creates meaningful switching costs for both providers and payers.
    - >-
      Insurance-native EHR model occupies a structurally defensible position: Headway earns revenue only when a patient
      visits an in-network provider, aligning incentives with payers and reducing abuse/fraud risk.
    - >-
      $280B+ total U.S. behavioral health market, with over 130M Americans living in mental health professional shortage
      areas, providing a long runway for network expansion.
    - >-
      Strong investor syndicate (a16z, Spark Capital, GV, Accel) with $321M+ raised provides capital to execute on
      Medicare Advantage and Medicaid expansion.
    - >-
      AI-assisted EHR documentation (Sept 2025) differentiates the platform and deepens provider stickiness by reducing
      administrative burden.
  topRisks:
    - >-
      Payer concentration risk: A UnitedHealth/Optum or BCBS contract termination or unilateral rate cut (as occurred in
      2024) would directly reduce provider income and trigger attrition, destroying network value.
    - >-
      MHPAEA 2024 Final Rule creates regulatory uncertainty: payers may respond to mandatory parity enforcement by
      reducing mental health coverage rather than increasing reimbursement rates, compressing Headway's revenue base.
    - >-
      Provider worker-classification risk: DOL 2024 independent contractor rule increases risk that Headway providers
      could be reclassified as employees, fundamentally changing the cost structure.
    - >-
      HIPAA data breach exposure at scale (34K+ providers, 1M+ patients): a material breach would trigger mandatory
      reporting, OCR enforcement, and reputational damage threatening payer partnerships.
    - >-
      Cerebral cautionary precedent: unchecked growth in digital mental health without clinical quality controls has led
      to regulatory enforcement and reputational collapse; Headway's clinical infrastructure is still maturing.
  unresolvedGaps:
    - >-
      Audited revenue and EBITDA not publicly disclosed; analyst estimates ($150M–$300M annualized) carry high
      uncertainty.
    - >-
      Payer contract terms, renewal dates, and concentration metrics are not public; unknown whether top-3 payers
      represent >50% of volume.
    - Actual provider churn rate and NPS are undisclosed; adverse reviews cite billing overcharges and payment delays.
    - Burn rate and cash runway not disclosed; at ~700 headcount, annual cash consumption may be $60M–$100M.
    - Cap table detail, preference stack, and liquidation waterfalls from five rounds are not public.
