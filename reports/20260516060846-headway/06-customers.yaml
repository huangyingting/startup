  - id: sect-retention
    title: "Retention Signals and User Satisfaction"
    body: |
      Headway has not publicly disclosed any provider churn rate, net revenue retention (NRR),
      gross revenue retention (GRR), patient return-visit rate, or net promoter score (NPS).
      This is a significant diligence gap for a marketplace business at Series D stage, where
      retention metrics are typically the primary durability indicator. The absence of public
      retention data is common for private mental health platforms but leaves the chapter
      reliant on proxy indicators from third-party review platforms and complaint records.

      The most significant adverse signal is Headway's Trustpilot rating of 3.6 out of 5
      based on 1,414 reviews as of May 2026. For a consumer-facing healthcare platform, 3.6/5
      is meaningfully below what would be expected for a platform with strong retention.
      The recurring negative themes across Trustpilot reviews include billing errors (patients
      charged incorrectly after sessions), slow payment processing to providers, insufficient
      phone support, and difficulties canceling or modifying appointments. These complaints
      cluster around the billing and payment infrastructure — which is the core functional
      differentiator of Headway's value proposition — making them more concerning than
      peripheral service complaints.

      The Better Business Bureau (BBB) profile for Headway (TherapyMatch, Inc.) shows 87
      complaints filed over the last three years, with 39 complaints closed in the most recent
      12-month period, suggesting complaint volume has increased as the platform scaled.
      The most common complaint category is billing and service, consistent with the Trustpilot
      patterns. The BBB complaint rate of 39 per year is not unusually high in absolute terms
      for a platform serving over 1 million patients, but the concentration in core billing
      functionality is an operational signal worth monitoring.

      Provider-side satisfaction evidence is sparse. The DL Method clinician review documented
      specific frustrations with credentialing delays and payment inconsistencies that conflict
      with Headway's marketed 2-day access and consistent payment positioning. No provider
      survey data, aggregate provider NPS, or provider renewal rate is publicly available.
      A balanced assessment requires acknowledging that positive testimonials from providers
      (including the Philosophie Therapy case study) exist alongside these adverse signals,
      and that negative reviews may over-represent edge cases. However, the clustering of
      adverse signals around billing and payment — the core infrastructure — cannot be dismissed.
