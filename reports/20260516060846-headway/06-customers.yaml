chapter:
  number: 6
  title: "Customers"
  letter: U
  summary: >-
    Headway operates a three-sided marketplace serving 34,000+ licensed mental health providers,
    1,000,000+ patients, and 45+ commercial insurance payers across all 50 states as of 2024.
    Named payer partnerships include Blue Cross Blue Shield of North Carolina and Horizon Healthcare
    Services of New Jersey. Provider and patient growth is well-documented and confirmed by
    multiple independent sources; retention metrics (churn, NRR, patient return rate) are not
    publicly disclosed, representing the central durability gap. Adverse signals include
    a Trustpilot rating of 3.6/5 from 1,414 reviews, 87 BBB complaints, and reported payment
    delays from provider testimonials — risks that are material but not unusual for a platform
    that recently scaled 17x from 2,000 to 34,000 providers in three years.

sections:
  - id: sect-customer-segments
    title: "Customer Segmentation and Buyer Types"
    body: |
      Headway operates as a three-sided marketplace in which each customer segment captures
      a distinct role in the mental health care delivery chain. The first and largest segment
      is licensed mental health providers — therapists, psychologists, licensed clinical social
      workers (LCSWs), licensed professional counselors (LPCs), licensed marriage and family
      therapists (LMFTs), psychiatric nurse practitioners, and psychiatrists. These providers
      are the supply side of the marketplace, enrolling on Headway at zero cost to gain
      access to automated insurance credentialing, billing, scheduling, and payment infrastructure.
      The dominant sub-segment is solo or small-group practice therapists who previously avoided
      insurance billing due to administrative complexity. Headway removes that barrier entirely,
      making the value proposition of joining the network highly tangible and the switching cost
      of leaving meaningful once credentialing and patient relationships are established.

      The second segment is individual patients seeking mental health therapy through their
      commercial health insurance. Headway's patient-facing product (headway.co/providers) is
      an insurance-aware therapist search and booking platform. Patients input their insurance
      plan and are matched with in-network providers who have open appointment slots. There is
      no self-pay option on Headway — the platform is insurance-only, making it fundamentally
      different from competitors like Psychology Today that list both in-network and cash-pay
      options. This structural choice narrows the addressable patient population to insured
      individuals but eliminates cost as a barrier for those who do qualify.

      The third segment is commercial health insurance payers. Payers contract with Headway to
      access its behavioral health provider network, enabling them to offer members faster
      access to mental health care than they could build or staff independently. As of 2024,
      Headway has 45+ payer partnerships. The federal Mental Health Parity and Addiction
      Equity Act (MHPAEA) creates regulatory demand for payers to offer mental health benefits
      on par with medical benefits, making Headway's outsourced network increasingly valuable
      to plans seeking compliance without building internal capacity. A fourth nascent segment —
      Medicare Advantage and Medicaid managed care plans — was announced as a Series D
      expansion target but has not yet been confirmed as operational.

      The three-sided model creates interdependencies that compound both growth and risk.
      Provider supply drives patient availability, which drives payer demand. Any deterioration
      in provider satisfaction (as reflected in Trustpilot and BBB complaint data) could reduce
      network density, limiting patient availability and reducing payer value.
