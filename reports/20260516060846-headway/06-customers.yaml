  evidenceGaps:
    - id: EGU001
      type: private-evidence-only
      severity: blocking
      topic: retention-metrics
      missingEvidence: >-
        Provider churn rate, gross revenue retention (GRR), net revenue retention (NRR),
        patient return-visit cohort data, and net promoter score (NPS) are not publicly
        disclosed by Headway. No independent analyst report or filing contains these metrics.
      whyItMatters: >-
        Without retention metrics, the durability of Headway's 34K+ provider network and
        1M+ patient base cannot be assessed. High growth combined with high churn would
        indicate a leaky funnel rather than a compounding marketplace — a fundamental
        difference in quality of the network effect.
      diligencePath: >-
        Request provider cohort retention by acquisition quarter, patient cohort return-visit
        rates at session 2/5/12, NRR/GRR by payer segment, and provider NPS from the Headway
        data room. Cross-check against BBB and Trustpilot complaint rates as adverse signals.
      relatedQuestionRefs:
        - QU003
        - QU004
        - QU015

    - id: EGU002
      type: private-evidence-only
      severity: material
      topic: payer-concentration
      missingEvidence: >-
        Headway has not disclosed revenue by payer, patient volume by insurance plan, or the
        share of total sessions attributable to any single payer. The concentration of patient
        volume among the top 3 payers (estimated: UHC, Aetna, Anthem) is unknown.
      whyItMatters: >-
        If the top 3 payers account for 60–70% of patient sessions (consistent with national
        commercial insurance market concentration), a single payer contract loss or rate cut
        could have an outsized impact on Headway's revenue and margin. This risk is not
        quantifiable from public data.
      diligencePath: >-
        Request payer revenue concentration data, top-10 payer revenue table, and contract
        terms including rate renegotiation provisions and exclusivity clauses. Review Clear
        Health Costs Nov 2024 precedent for payer rate cut mechanisms.
      relatedQuestionRefs:
        - QU011
        - QU017

    - id: EGU003
      type: enumeration-incomplete
      severity: material
      topic: named-payer-partnerships
      missingEvidence: >-
        Only 2 of Headway's 45+ payer partnerships (BCBS-NC, Horizon Healthcare NJ) have
        publicly announced press releases. The remaining 43+ partnerships are visible only as
        plan names in the insurance search filter — not individually documented or dated.
      whyItMatters: >-
        Without documentation of when each payer contract was signed and on what terms,
        it is not possible to assess the durability of the partnership portfolio, the
        contractual protections against rate cuts, or the expected renewal timeline.
      diligencePath: >-
        Request the full payer contract list with execution dates, term lengths, rate schedules,
        and renewal provisions from the Headway data room. Prioritize UHC/Optum given the
        Nov 2024 industry rate cut precedent.
      relatedQuestionRefs:
        - QU006
        - QU023
      relatedTableRefs:
        - TU003

    - id: EGU004
      type: private-evidence-only
      severity: material
      topic: provider-satisfaction
      missingEvidence: >-
        No aggregate provider NPS, provider satisfaction score, or provider survey data is
        publicly available. Individual testimonials (positive: Philosophie Therapy; negative:
        DL Method) cannot be statistically representative of the 34,000+ provider base.
      whyItMatters: >-
        Provider satisfaction is the primary leading indicator of supply-side retention. If
        the adverse signals from Trustpilot and DL Method represent systemic issues rather
        than edge cases, provider network density could decline, reducing patient access
        and payer value.
      diligencePath: >-
        Request provider NPS survey data, provider CSAT by quarter, payment cycle adherence
        metrics, credentialing time metrics, and support ticket resolution rates from the
        Headway data room or operations team.
      relatedQuestionRefs:
        - QU003
        - QU018
        - QU025

    - id: EGU005
      type: private-evidence-only
      severity: minor
      topic: medicare-medicaid-expansion
      missingEvidence: >-
        Headway has not announced an operational Medicare Advantage or Medicaid launch as of
        May 2026, despite the July 2024 Series D press coverage citing these as expansion
        targets. No timeline, payer agreements, or credentialing progress for government
        program markets has been disclosed.
      whyItMatters: >-
        Government program expansion would nearly double Headway's addressable patient
        population. Failure to execute would indicate that the execution and reimbursement
        economics were more challenging than anticipated at Series D time.
      diligencePath: >-
        Request update on Medicare Advantage and Medicaid expansion progress including
        payer contracts signed, credentialing milestones, and expected launch timing. Review
        reimbursement rate models for government versus commercial program margins.
      relatedQuestionRefs:
        - QU010
        - QU020
