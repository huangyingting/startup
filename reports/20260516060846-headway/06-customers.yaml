          touchpoints: "Insurance member portal, explanation of benefits documentation, insurance customer service"
          headwayRole: "MHPAEA compliance requirements ensure commercial payers must cover mental health; Headway benefits from parity-driven demand"
        - label: "N3: Discovers and Searches Headway"
          description: "Patient finds headway.co and enters insurance plan to search for in-network therapists"
          touchpoints: "headway.co/insurance, headway.co/providers insurance-aware search, Google search for in-network therapist"
          headwayRole: "Primary discovery touchpoint; insurance plan filter eliminates out-of-network providers"
        - label: "N4: Matches and Books with Provider"
          description: "Patient reviews provider profiles filtered to their insurance plan, selects a therapist, and books first appointment"
          touchpoints: "Provider profile page (specialty, availability, photo, bio), real-time availability calendar, appointment booking confirmation"
          headwayRole: "Matching engine surfaces in-network providers with open slots; eliminates manual credentialing verification"
        - label: "N5: Completes First Session"
          description: "Patient attends first therapy session (in-person or telehealth); insurance claim is automatically submitted"
          touchpoints: "Telehealth video session (Headway-native) or in-person, session reminder, automated insurance billing"
          headwayRole: "Session delivery infrastructure; automated claim submission to insurer; patient receives EOB, not surprise bill"
        - label: "N6: Continues Care or Changes Provider"
          description: "Patient returns for ongoing sessions or uses the platform to find a new in-network provider"
          touchpoints: "Follow-up appointment booking, provider re-matching if needed, ongoing session delivery"
          headwayRole: "Retention depends on provider availability and satisfaction; patient return rate not publicly disclosed"

