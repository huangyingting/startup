  - id: sect-adoption-trajectory
    title: "Provider and Patient Adoption Trajectory"
    body: |
      Headway's provider network has grown at a compound annual rate of approximately 115%
      between 2021 and 2024, expanding from approximately 2,000 active providers at the time
      of its Series B announcement in late 2021 to 34,000+ as of the 2024 Series D filing.
      This represents one of the fastest documented provider network expansions in the U.S.
      behavioral health sector and reflects the effectiveness of Headway's zero-cost enrollment
      model for therapists who previously found insurance billing prohibitive.

      Geographic coverage expanded from initial markets to all 50 U.S. states and the District
      of Columbia. The network now spans major metropolitan areas as well as suburban and rural
      markets, a geographic footprint that is materially broader than most direct competitors.
      Grow Therapy, Headway's closest comparator, reported approximately 26,000 providers in
      mid-2024, implying Headway leads by roughly 30% in network scale by provider count.
      Alma, another direct competitor, has significantly fewer public-facing active providers.

      On the patient side, Headway reached a milestone of serving 1,000,000 patients as of
      late 2024 — a figure published in the Headway blog and corroborated by Series D press
      coverage. The total patient base is consistent with a network of 34,000 providers each
      seeing an average of fewer than 30 patients, suggesting average utilization has room to
      grow and that the platform is not yet supply-constrained at scale.

      The insurance partnership count grew from fewer than 10 payers at launch to 45+ by 2024,
      an expansion that materially broadened the addressable patient population since each payer
      contract unlocks access for that plan's entire membership. The Series D filing noted
      Medicare Advantage and Medicaid as planned expansion vectors, which together represent
      the largest public insurance markets in the U.S. but also require distinct credentialing
      workflows and reimbursement structures that introduce execution risk.
