  - id: sect-financial-model
    title: "Financial and Model Risk"
    body: |
      Headway's financial risk profile centers on capital adequacy, revenue model
      concentration, and the economics of government program expansion. Total disclosed
      fundraising is $321 million, with the most recent Series D of $100 million closing
      in July 2024 at a $2.3 billion post-money valuation. Monthly burn rate is not publicly
      disclosed, but at 700+ employees and a mid-scale technology-enabled healthcare services
      model, annual operational burn is estimated at $40–80 million. This implies a runway of
      approximately 15–30 months from the Series D close — requiring either a Series E or a
      significant revenue surplus before late 2026 under the conservative scenario.

      Revenue model concentration is a structural vulnerability. Headway's revenue is entirely
      derived from the spread between payer reimbursement rates and provider payment rates for
      insurance-covered sessions. There is no disclosed self-pay revenue, subscription revenue,
      or software licensing revenue to buffer against payer rate volatility. The Optum rate-cut
      precedent from November 2024 confirms that payer-initiated margin compression is an active
      industry risk. Any systematic payer rate reduction directly reduces Headway's per-session
      fee without a corresponding reduction in operating costs.

      Medicare Advantage and Medicaid expansion, announced as a Series D growth target, creates
      a revenue quality tradeoff. Medicaid reimbursement rates for behavioral health are typically
      20–40% below commercial rates. If Headway migrates a material fraction of its session volume
      to Medicaid-covered patients, blended revenue per session declines and margin per session
      compresses even without commercial rate cuts. The financial model impact of this tradeoff
      has not been publicly disclosed, and no operational government program launch has been
      confirmed as of Q1 2026.
