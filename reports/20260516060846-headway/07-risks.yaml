  - id: FR001
    title: "Risk Heatmap"
    type: matrix
    layout: wide
    summary: >-
      Risk severity and likelihood assessment across six material risk categories for Headway
      as of Q1 2026. Each row represents a distinct risk area; columns describe the risk
      category and impact profile at low, medium, and high likelihood levels. Severity and
      likelihood designations are analyst judgments based on public evidence; internal risk
      assessments are not publicly available.
    approximationNotes: >-
      All likelihood and severity designations are analyst assessments based on public
      regulatory filings, enforcement precedents, Headway public disclosures, and comparable
      platform risk factors. No internal risk register or management representation has been
      reviewed. High severity designations reflect potential magnitude of adverse outcomes if
      the risk materializes at the high-likelihood scenario, not a prediction of occurrence
      probability.
    claimRefs:
      - CR001
      - CR002
      - CR006
      - CR017
      - CR012
    data:
      columns:
        - "Risk Category"
        - "Low Likelihood"
        - "Medium Likelihood"
        - "High Likelihood"
      rows:
        - label: "Regulatory Compliance (MHPAEA 2024)"
          values:
            - "Regulatory / Compliance"
            - "Minimal — payers achieve parity without benefit or rate changes; Headway economics unchanged"
            - "Moderate — payers restrict mental health benefit frequency to match medical floor; session volume declines 10–20%"
            - "Severe — payer rate renegotiation or benefit restrictions reduce Headway session volume and per-session revenue simultaneously"
        - label: "HIPAA Data Breach"
          values:
            - "Data Security / Privacy"
            - "Contained — small breach remediated with OCR fine under $250K; payer contracts unaffected"
            - "Material — OCR enforcement action; civil monetary penalties up to $1.9M per violation category; mandatory public disclosure"
            - "Catastrophic — large-scale breach of 1M+ patient records; OCR Wall of Shame listing; payer confidence and provider trust collapse"
        - label: "Payer Concentration Risk"
          values:
            - "Partner / Commercial"
            - "Minimal — 45+ payer contracts provide volume diversification; no single-payer termination alone is survivable"
            - "Material — top-3 payer rate cut compresses per-session fee by 10–20%; provider income falls; attrition risk rises"
            - "Severe — top-3 payer contract termination removes 15–25% of patient volume; network adequacy falls below payer-required floor"
        - label: "Provider Attrition"
          values:
            - "Operations / Network"
            - "Contained — natural churn offset by new provider enrollment; network density maintained above 30K active providers"
            - "Material — attrition exceeds recruitment; network density falls toward 25K providers; geographic gaps emerge in key markets"
            - "Severe — sustained attrition below 20K active providers; payer network adequacy requirements not met; payer contracts at risk"
        - label: "AI Documentation Liability"
          values:
            - "Technology / Clinical"
            - "Minimal — isolated AI note errors corrected by providers before clinical use; no external adverse event"
            - "Moderate — systematic AI bias or factual errors in SOAP notes create provider liability claims and Headway indemnification disputes"
            - "Severe — class-action litigation or regulatory action against Headway for AI-generated clinical documentation errors affecting patient outcomes"
        - label: "Worker Classification Risk"
          values:
            - "Legal / Regulatory"
            - "Contained — DOL scrutiny results in minor contract term adjustments; IC classification upheld with enhanced documentation"
            - "Material — DOL investigation requires revised provider agreement terms; legal costs and operational disruption without full reclassification"
            - "Catastrophic — court-ordered reclassification as employees adds payroll taxes, benefits, and overtime obligations for 34,000+ workers"

  - id: FR002
    title: "Risk Transmission Map"
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing how payer rate compression transmits through the Headway
      business model to create cascading revenue, network, and patient access impacts. The
      transmission chain illustrates the compounding nature of the payer dependency risk: a
      rate cut does not simply reduce margin — it can trigger a provider attrition spiral that
      ultimately reduces the network's value to remaining payers and compresses total session
      volume.
    approximationNotes: >-
      Transmission relationships are analyst-inferred from the structural dynamics of a
      three-sided marketplace. Exact thresholds (e.g., the rate-cut magnitude that triggers
      provider attrition) are not known from public data. The Optum November 2024 precedent
      confirms payer rate compression is an active risk; the magnitude and timing of
      transmission are scenario-dependent and not publicly disclosed.
    claimRefs:
      - CR017
      - CR018
      - CR020
      - CR028
      - CR032
    data:
      nodes:
        - id: N1
          label: "Payer Rate Compression"
          description: "Payer (e.g., Optum/UnitedHealth) reduces per-session reimbursement rate to Headway network; precedent documented November 2024 by Clear Health Costs"
        - id: N2
          label: "Provider Income Decline"
          description: "Headway's per-session administrative fee falls as total reimbursement shrinks; providers receive lower net payment per session after Headway fee"
        - id: N3
          label: "Provider Attrition"
          description: "Providers whose net income per Headway session falls below their income floor exit the platform; active provider count begins declining"
        - id: N4
          label: "Network Shrinkage"
          description: "Active provider count falls; geographic coverage gaps emerge; average patient wait times increase; network adequacy at risk with contracting payers"
        - id: N5
          label: "Patient Access Decline"
          description: "Fewer available in-network providers means longer appointment wait times and geographic access gaps for patients relying on Headway's network"
        - id: N6
          label: "Revenue Loss"
          description: "Compound effect: lower per-session fee plus fewer total billable sessions reduces Headway's total administrative fee revenue simultaneously"
      edges:
        - from: N1
          to: N2
          label: "Rate cut reduces Headway admin fee per session"
        - from: N2
          to: N3
          label: "Reduced provider income triggers platform departure"
        - from: N3
          to: N4
          label: "Provider departures reduce active network density"
        - from: N4
          to: N5
          label: "Network gaps reduce available appointment slots for patients"
        - from: N4
          to: N6
          label: "Fewer active providers means fewer billable sessions"
        - from: N5
          to: N6
          label: "Reduced patient access further compresses total session volume"

  - id: FR003
    title: "Dependency Map"
    type: dag
    layout: wide
    summary: >-
      Directed acyclic graph showing the six critical operational dependencies of the Headway
      platform core as of Q1 2026. All five upstream dependencies must operate reliably for
      the Headway platform to deliver provider portal, patient booking, billing automation,
      and EHR functionality. Cloud infrastructure is the undisclosed common host for all
      platform services, making it the highest-severity single point of failure.
    approximationNotes: >-
      Dependency relationships are inferred from public product documentation, Greenhouse
      engineering job postings, and regulatory compliance requirements. Specific vendor
      identities for cloud infrastructure, telehealth video, and EPCS are not publicly
      disclosed by Headway. All relationships are verified against public platform
      documentation; internal architecture diagrams and vendor contracts are not available.
    claimRefs:
      - CR021
      - CR022
      - CR023
    data:
      nodes:
        - id: D1
          label: "Insurance Payer APIs (45+)"
          description: "Real-time eligibility verification, claim submission, and EOB retrieval from all 45+ contracted payers; fragmented payer API landscape requires continuous maintenance"
        - id: D2
          label: "Cloud Infrastructure (Undisclosed)"
          description: "Undisclosed cloud hosting provider for HIPAA-compliant ePHI storage and compute; common host for all platform services including provider portal, EHR, billing, and patient matching"
        - id: D3
          label: "HIPAA Compliance Stack"
          description: "Encryption controls, business associate agreements with cloud vendors, audit logging, access controls, and breach notification procedures required for all ePHI operations"
        - id: D4
          label: "State Licensing Databases"
          description: "License verification integrations for all 50 states and DC; required for provider credentialing, ongoing license monitoring, and telehealth compliance verification"
        - id: D5
          label: "AI / ML Engine"
          description: "Patient-provider matching algorithm; AI-assisted SOAP note generation launched September 2025; Bayesian experimentation platform supporting product optimization"
        - id: D6
          label: "Headway Platform Core"
          description: "Integrated provider portal, patient booking marketplace, automated insurance billing pipeline, and AI-assisted EHR — the operational surface delivered to 34,000+ providers and 1M+ patients"
      edges:
        - from: D1
          to: D6
          label: "Payer APIs required for claim submission and eligibility verification"
        - from: D2
          to: D6
          label: "Cloud infrastructure hosts all platform services and HIPAA-compliant ePHI data"
        - from: D3
          to: D6
          label: "HIPAA compliance controls required for all PHI operations on the platform"
        - from: D4
          to: D6
          label: "License data required for provider credentialing and ongoing compliance monitoring"
        - from: D5
          to: D6
          label: "AI matching and note-assist power core provider and patient UX"
        - from: D1
          to: D2
          label: "Payer claim data processed and stored through cloud infrastructure"

