  - id: sect-mitigations
    title: "Mitigations, Kill Criteria, and Monitoring Indicators"
    body: |
      Headway's primary structural mitigation against provider attrition is the switching
      cost embedded in the zero-cost credentialing model. Providers credentialed with 45+
      payers through Headway's centralized process face a multi-month administrative
      re-credentialing burden to recreate that coverage independently — a friction cost that
      partially offsets satisfaction-driven attrition impulses. HIPAA compliance is affirmed
      through the privacy policy and terms of service, and the centralized billing
      infrastructure provides a compliance layer individual providers cannot replicate at
      comparable cost.

      Headway's positioning as a network platform intermediary — not a direct clinical treatment
      provider — provides structural separation from direct malpractice liability. The licensed
      provider retains full professional responsibility for care quality and clinical
      documentation accuracy. This separation limits Headway's direct clinical exposure but
      does not eliminate platform liability for billing accuracy, AI tool accuracy, or data
      handling failures.

      Kill criteria are specific, measurable events that would materially impair the investment
      thesis. The primary kill criterion is a HIPAA data breach affecting 10,000 or more
      patients, which triggers OCR mandatory reporting, civil monetary penalties up to $1.9
      million per violation category, public disclosure on the HHS breach portal, and near-
      certain payer confidence collapse. The secondary kill criterion is termination of any
      top-3 payer contract — UnitedHealth, a major BCBS affiliate, or Aetna — which would
      eliminate 15–25% of patient session volume and reduce the network's value proposition
      to remaining payers. A tertiary kill criterion is DOL or court-ordered reclassification
      of Headway's 34,000+ providers as employees, fundamentally restructuring labor costs.
      Monitoring indicators include: Trustpilot rating trend (threshold: sustained below 3.0
      for 12 consecutive months), provider attrition velocity, payer contract renewal dates,
      OCR enforcement actions against comparable platforms, and CTO and CMO retention signals.
