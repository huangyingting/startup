  - id: sect-operational-tech
    title: "Operational and Technology Risk"
    body: |
      Headway's operational risk profile is dominated by cybersecurity, platform reliability,
      and liability from AI-generated clinical documentation. Healthcare platforms are the
      most frequently targeted sector in U.S. ransomware incidents. A successful attack on
      Headway's EHR or billing infrastructure would halt workflows for 34,000+ providers,
      compromise protected health information for over one million patients, and trigger
      mandatory HHS OCR breach notification under 45 CFR 164.400–164.414. Headway has not
      publicly disclosed any cybersecurity certifications such as SOC 2 Type II or ISO 27001,
      nor any audit schedules or penetration testing results. This absence of public disclosure
      is a signal because comparable-scale healthcare platforms typically publish trust
      documentation to satisfy payer due-diligence requirements.

      Platform reliability is a second material operational risk. Headway has not published
      any uptime service level agreement for its provider portal or billing system. Given
      that Headway is many providers' primary or sole billing infrastructure, an unplanned
      outage during business hours would directly interrupt session revenue and amplify
      existing provider dissatisfaction documented in Trustpilot and BBB complaints.

      The September 2025 launch of AI-assisted SOAP note generation introduced a new liability
      vector. Clinical documentation errors in AI-generated notes — factual inaccuracies,
      omitted diagnoses, or biased output — could create liability exposure in clinical audits
      or legal proceedings. While individual providers retain professional responsibility for
      their clinical documentation accuracy, Headway as the platform vendor bears potential
      exposure if the AI tool produces systematically flawed outputs. No public disclosure
      exists of Headway's AI accuracy benchmarking, clinical validation methodology, or
      indemnification provisions in provider contracts. Data residency and 42 CFR Part 2
      controls require platform-specific compliance layers beyond standard HIPAA that are not
      publicly documented for the Headway platform.
