  claims:
    - id: CR001
      statement: >-
        The MHPAEA 2024 Final Rule, finalized by DOL, HHS, and Treasury in September 2024,
        requires health plans to conduct and document comparative analyses demonstrating parity
        in non-quantitative treatment limits (NQTLs) for mental health and substance use
        disorder benefits versus medical and surgical benefits — creating material compliance
        obligations for insurers contracting with Headway's network.
      type: observed
      topic: mhpaea-regulatory-risk
      sourceRefs:
        - SR002
        - SR003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
        - QR005

    - id: CR002
      statement: >-
        The HIPAA Security Rule (45 CFR 164.302–164.318) and Privacy Rule (45 CFR 164.500–164.534)
        require Headway as a covered entity and business associate to implement administrative,
        physical, and technical safeguards protecting ePHI; OCR-enforced civil monetary penalties
        for violations can reach up to $1.9 million per violation category with no annual cap for
        willful neglect.
      type: observed
      topic: hipaa-breach-risk
      sourceRefs:
        - SR012
        - SR013
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR002
        - QR028

    - id: CR003
      statement: >-
        SAMHSA's 42 CFR Part 2 regulation (updated 2024 to align more with HIPAA) imposes
        stricter confidentiality requirements on substance use disorder records than standard
        HIPAA, requiring explicit patient consent for SUD record sharing even for payment
        purposes — a compliance layer beyond baseline HIPAA that applies to any Headway provider
        treating SUD patients.
      type: observed
      topic: cfr-part-2-risk
      sourceRefs:
        - SR014
        - SR001
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR004

    - id: CR004
      statement: >-
        The FTC's 2023 enforcement action against BetterHelp — a $7.8 million settlement for
        sharing sensitive mental health data with Facebook and Snapchat without patient consent
        — establishes direct enforcement precedent applicable to Headway if its data sharing
        practices for payer billing or analytics share similar characteristics.
      type: inferred
      topic: ftc-data-privacy-risk
      sourceRefs:
        - SR011
        - SR013
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QR003

    - id: CR005
      statement: >-
        Fifty U.S. jurisdictions have materially different telehealth prescribing laws, audio-only
        parity requirements, and cross-state licensure rules, creating a continuous compliance
        surface for Headway's nationwide 50-state platform.
      type: observed
      topic: state-telehealth-regulation
      sourceRefs:
        - SR015
        - SR004
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR006

    - id: CR006
      statement: >-
        The DOL's 2024 Independent Contractor Final Rule tightens the economic reality test for
        worker classification under the FLSA, elevating legal risk that Headway's 34,000+
        independent contractor providers could be subject to reclassification as employees in
        a future enforcement action or litigation.
      type: observed
      topic: worker-classification-risk
      sourceRefs:
        - SR001
        - SR017
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR007
        - QR026

    - id: CR007
      statement: >-
        Headway's privacy policy explicitly permits data sharing for treatment, payment, and
        healthcare operations — categories that could include sharing session data with
        insurance payers for claims processing, which mirrors data-flow patterns cited in the
        FTC's BetterHelp enforcement action.
      type: observed
      topic: privacy-policy-data-sharing
      sourceRefs:
        - SR011
        - SR010
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR008

    - id: CR008
      statement: >-
        PSYPACT, the multi-state psychology licensure compact, facilitates cross-state practice
        for licensed psychologists but explicitly excludes therapists (LCSWs, LPCs, LMFTs) who
        constitute the majority of Headway's 34,000+ provider network — requiring individual
        state licensing for most Headway providers conducting telehealth across state lines.
      type: inferred
      topic: psypact-cross-state-limits
      sourceRefs:
        - SR015
        - SR004
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR006

    - id: CR009
      statement: >-
        Healthcare organizations are the most frequently targeted sector in U.S. ransomware
        attacks; Headway's role as a centralized ePHI repository for over 34,000 providers
        and one million patients makes it a high-value target with a large potential breach
        impact under HIPAA's mandatory notification and civil monetary penalty framework.
      type: observed
      topic: cybersecurity-ransomware-risk
      sourceRefs:
        - SR012
        - SR007
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR009
        - QR010

    - id: CR010
      statement: >-
        A successful ransomware attack on Headway's EHR or billing infrastructure would halt
        billing workflows for 34,000+ providers and compromise ePHI for one million patients,
        triggering mandatory HIPAA breach notification to HHS OCR within 60 days and direct
        individual patient notification for all affected records.
      type: inferred
      topic: ransomware-operational-impact
      sourceRefs:
        - SR009
        - SR012
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR010

