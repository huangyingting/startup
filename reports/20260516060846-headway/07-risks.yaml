  - id: sect-partner-dependency
    title: "Partner and Dependency Risk"
    body: |
      Headway's business model is entirely dependent on contracted payer relationships. With
      45+ insurance contracts and an estimated 60–70% of patient session volume concentrated
      in the top 3–5 plans — UnitedHealth/Optum, Aetna/CVS, and major BCBS affiliates — the
      loss or restructuring of any major payer contract would have an outsized impact on total
      session volume and revenue.

      The most direct precedent is the November 2024 Clear Health Costs report documenting
      that UnitedHealth's Optum subsidiary unilaterally cut therapist reimbursement rates on
      digital mental health platforms, triggering widespread provider anger. If Optum applies
      comparable rate cuts to Headway's contracted rates, the per-session administrative fee
      Headway retains compresses and provider income falls, potentially triggering attrition
      at scale. This is not a theoretical risk — the precedent exists in the direct industry
      peer set.

      Cloud infrastructure concentration is an undisclosed dependency. Headway has not
      publicly named its cloud hosting vendor. A single-region cloud outage would
      simultaneously take down the provider portal, patient booking, billing pipeline, and
      EHR. Healthcare-sector cloud outages have caused multi-day operational disruptions at
      comparable platforms. EHR data portability is a regulatory and reputational risk:
      Headway's provider agreement terms do not publicly specify the format or timeline for
      patient record export upon contract termination, creating potential HIPAA patient-rights
      exposure if records cannot be ported cleanly. Prescriber module expansion depends on
      DEA registration infrastructure, state controlled substance licensing databases, and
      electronic prescribing for controlled substances systems — dependencies outside
      Headway's current confirmed operational stack.
