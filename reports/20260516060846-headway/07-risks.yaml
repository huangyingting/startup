chapter:
  number: 7
  title: "Risks"
  letter: R
  summary: >-
    Headway (TherapyMatch, Inc.) carries a layered risk profile spanning regulatory compliance
    (MHPAEA 2024 Final Rule, HIPAA, 42 CFR Part 2, FTC data-privacy precedent), operational
    resilience (cybersecurity, undisclosed uptime SLA, AI note liability), partner and payer
    dependency (Optum/UnitedHealth rate compression documented November 2024, payer concentration
    in 3–5 dominant plans), financial sustainability (insurance-only revenue model, estimated
    15–30 month runway from July 2024 Series D at conservative burn), and execution quality
    (first external CTO hired January 2025, CMO August 2025, provider attrition signals from
    Trustpilot 3.6/5 and 87 BBB complaints). The MHPAEA 2024 Final Rule creates acute payer
    economics risk regardless of direction: if payers restrict benefits to comply from the
    bottom, session volumes decline; if payers raise mental health reimbursements under pressure,
    contractual renegotiation follows. Payer concentration in 3–5 large insurers and the Optum
    rate-cut precedent represent the single greatest near-term revenue threat. Kill criteria
    include a HIPAA breach affecting 10,000+ patients, loss of any top-3 payer contract, DOL
    reclassification of providers as employees, and sustained Trustpilot rating below 3.0 for
    12 consecutive months.

sections:
  - id: sect-regulatory-legal
    title: "Regulatory and Legal Risk Register"
    body: |
      Headway operates at the intersection of several compounding federal regulatory frameworks
      that create layered compliance risk across billing, data privacy, and workforce structure.
      The most significant near-term regulatory event is the MHPAEA 2024 Final Rule, finalized
      by the Departments of Labor, HHS, and Treasury in September 2024. Under this rule, health
      plans must conduct and document rigorous comparative analyses demonstrating parity between
      mental health and substance use disorder benefits and medical and surgical benefits. Two
      plausible adverse outcomes exist for Headway: payers may restrict mental health benefit
      generosity to achieve parity from the bottom, reducing session volume; or payers may pass
      increased compliance cost downstream as reduced reimbursement to network operators.

      HIPAA compliance is a continuous obligation across both the Security Rule (45 CFR
      164.302–164.318) and Privacy Rule (45 CFR 164.500–164.534). As a platform that processes
      electronic protected health information for over 34,000 providers and one million patients,
      Headway is a high-value breach target. OCR enforcement against comparable healthcare
      platforms has reached civil monetary penalties of up to $1.9 million per violation
      category. Following the FTC's 2023 enforcement action against BetterHelp — a $7.8 million
      settlement for sharing sensitive mental health data with Facebook and Snapchat — Headway's
      data sharing provisions in its privacy policy require ongoing legal scrutiny.

      SAMHSA's 42 CFR Part 2 regulation imposes stricter confidentiality requirements on
      substance use disorder records beyond standard HIPAA. If any Headway-hosted providers
      treat SUD patients, the platform requires consent controls beyond the baseline privacy
      infrastructure. The DOL's 2024 independent contractor classification final rule tightens
      the economic reality test, elevating legal risk that Headway's 34,000+ providers could
      be reclassified as employees — an event that would fundamentally restructure the cost
      model. State telehealth laws vary across 50 jurisdictions with differing rules on
      prescribing, audio-only parity requirements, and cross-state licensure. PSYPACT
      facilitates multi-state psychology practice but does not cover therapists, LCSWs, or LPCs.
