  evidenceGaps:
    - id: EGR001
      type: private-evidence-only
      severity: material
      topic: cloud-infrastructure
      missingEvidence: >-
        Headway has not disclosed its cloud hosting provider(s), data center locations,
        multi-region redundancy architecture, or business continuity plan. The identity of
        the cloud vendor(s) hosting Headway's HIPAA-compliant ePHI storage and compute cannot
        be determined from public sources.
      whyItMatters: >-
        Cloud provider identity is critical for assessing single-region outage risk, HIPAA
        Business Associate Agreement coverage by the cloud vendor, and business continuity
        exposure. Without this information, the severity of the cloud dependency risk shown
        in the dependency map (FR003 node D2) cannot be quantified or verified.
      diligencePath: >-
        Request cloud provider name, HIPAA BAA documentation for all cloud services processing
        ePHI, multi-region architecture diagram, failover configuration, and RTO/RPO
        commitments from the Headway data room. Verify HIPAA BAA coverage scope with legal
        counsel review.
      relatedQuestionRefs:
        - QR015

    - id: EGR002
      type: private-evidence-only
      severity: material
      topic: payer-revenue-concentration
      missingEvidence: >-
        Headway has not disclosed revenue by payer, session volume by payer, or the share
        of total billable sessions attributable to any single insurance plan. The concentration
        of patient volume among the top 3 payers — estimated to be UnitedHealth, Aetna, and
        BCBS affiliates — is unknown from any publicly available data source.
      whyItMatters: >-
        If 60–70% of session volume is concentrated in the top 3 payers, consistent with
        national commercial insurance market concentration, a single payer rate cut or contract
        termination could have an outsized and non-linear impact on total Headway revenue that
        cannot be quantified without concentration data.
      diligencePath: >-
        Request payer revenue concentration table showing top-10 payer share of total sessions
        and revenue, contract terms including rate schedules and minimum volume commitments,
        and historical rate change history from the Headway data room. Prioritize UnitedHealth
        given the November 2024 Optum rate cut industry precedent.

    - id: EGR003
      type: private-evidence-only
      severity: material
      topic: cybersecurity-certifications
      missingEvidence: >-
        No SOC 2 Type II attestation report, ISO 27001 certificate, penetration testing
        summary, or independent security audit result is publicly available for Headway.
        The absence of public disclosure cannot be distinguished from non-completion of
        these certifications versus intentional non-disclosure by the company.
      whyItMatters: >-
        Payer due diligence typically requires SOC 2 Type II or equivalent security
        certifications for network operators handling ePHI at Headway's scale. Absence of
        public certification could be a payer contract negotiation obstacle and is a material
        signal about security governance maturity under the first external CTO hired in
        January 2025.
      diligencePath: >-
        Request SOC 2 Type II attestation report, ISO 27001 certificate, most recent
        penetration test executive summary, and cybersecurity incident register for the last
        three years from the Headway data room. Ask the CTO directly about the certification
        roadmap and expected completion timeline.
