chapter:
  number: 1
  title: Company Overview
  letter: O
  summary: |
    Headway (legal entity: Therapymatch, Inc.) is a New York City–based mental health technology
    company founded in 2019 that connects patients with in-network mental health providers by
    handling insurance credentialing, billing, scheduling, and practice management on behalf of
    therapists — free of charge to providers. With 34,000+ therapists across all 50 states and
    DC, partnerships with 45+ insurance companies, and a Series D valuation of $2.3 billion
    (July 2024, total raised $321M+), Headway is the largest insurance-native mental health
    network in the United States and has served over one million patients.

sections:
  - id: company-identity
    title: Identity and Business Model
    body: |
      Headway is a mental health technology company operating under the legal entity Therapymatch, Inc.
      (incorporated in Delaware), headquartered in New York City, NY. The company's public-facing brand
      is "Headway" and its website is headway.co; its provider portal operates at sigmund.headway.co.
      Headway's stated mission is "We're building a new mental healthcare system" — one designed to be
      accessible to every American through insurance coverage rather than out-of-pocket payment.

      The company's core product is an end-to-end practice management platform for licensed mental health
      providers — therapists, psychologists, and psychiatrists — that handles insurance credentialing,
      claims billing, scheduling, EHR, and payer remittance. Headway charges providers nothing: there
      are no membership fees, no commission on session revenue, and no platform subscription. Providers
      receive bi-weekly direct deposit payments for completed sessions. Headway generates revenue by
      negotiating higher reimbursement rates from insurance companies than the rates it pays providers,
      retaining the spread between what payers remit and what providers receive.

      On the patient side, Headway operates a consumer-facing directory at headway.co/providers where
      patients search for in-network therapists by specialty, insurance plan, location, and availability.
      As of the run date, Headway lists more than 45 major insurance carriers including Aetna, Anthem,
      Cigna, Oxford, UnitedHealthcare, and Oscar Health. The company is active in all 50 US states and
      the District of Columbia, making it the broadest-coverage insurance-credentialed mental health
      network in the country.

      The structural market problem Headway addresses is significant: approximately 70% of US therapists
      do not accept insurance because the administrative burden of credentialing and billing outweighs
      the benefit. Headway removes that burden entirely, enabling providers who previously operated
      on a cash-pay basis to join insurance networks and expand access to care. For health plans,
      Headway provides a behavioral health network solution enabling measurably faster access: 2 days
      to care after first patient contact, 3x more available appointments than typical insurer networks,
      and a 90% second-visit retention rate — outcomes that reduce total cost of care.
