  - id: capital-formation
    title: Capital Formation, Valuation, and Investor Base
    body: |
      Headway has raised more than $321 million across five identified rounds since founding, reaching
      a $2.3 billion valuation at its Series D in July 2024. The capital formation trajectory has been
      notable for its pace: Headway achieved unicorn status ($1B+ valuation) at its Series C in October
      2023 and then more than doubled its valuation — to $2.3 billion — within nine months at the Series D.
      This 130% valuation step-up in under a year reflects strong operational momentum: provider network
      growth exceeding 30%, revenue more than doubling in a twelve-month period, and CEO guidance toward
      company-level profitability.

      The funding sequence began with a seed round led by Accel with participation from GFC and IA
      Ventures. The public Series A of $26 million (November 2020, co-led by Thrive Capital and GV)
      announced Headway's public launch and its first significant media attention. The Series B of
      $70 million followed approximately six months later in 2021, with Andreessen Horowitz (a16z)
      announcing its investment in May 2021. The Series C of $125 million (October 2023) pushed Headway
      across the unicorn threshold. The Series D of $100 million was led by new investor Spark Capital,
      with participation from existing investors Thrive Capital, Accel, a16z, and first-time investor
      Forerunner Ventures.

      Headway's investor base is exclusively institutional venture capital — no strategic or corporate
      venture investors have been identified, and no debt or credit facilities have been publicly
      disclosed. The investor mix spans early-stage generalist VC (Accel, GV, IA Ventures), growth-stage
      consumer/health-tech specialists (Thrive Capital, a16z, Forerunner Ventures), and later-stage
      growth equity (Spark Capital). As a private company, Headway's audited financials, board composition,
      and cap table are not public.
