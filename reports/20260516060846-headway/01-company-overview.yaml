callouts:
  - id: CO-CALL-O01
    type: strength
    title: "Structural Market Moat: Provider Network Flywheel"
    body: >-
      Headway's provider network has a classic marketplace flywheel: more credentialed providers
      mean more available appointments, attracting more patients and health plan contracts, which
      attracts more providers. With 34,000+ providers, $321M+ raised, and 45+ payer relationships,
      the network effect is mature enough that over half of new providers join via peer referral —
      a powerful organic growth signal that suggests the flywheel is self-reinforcing without
      requiring sustained paid acquisition spend.
    claimRefs:
      - CO019
      - CO020
      - CO032

  - id: CO-CALL-O02
    type: risk
    title: "Payer Rate Risk: Headway Is a Pass-Through in Payer-Provider Negotiations"
    body: >-
      The Optum/UnitedHealth pay rate cut episode (October 2024) exposed a structural vulnerability:
      Headway's revenue model depends on the spread between what payers reimburse Headway and what
      Headway pays providers. When payers compress rates, Headway must either absorb the compression,
      reduce provider pay (risking network attrition), or exit payer relationships. The episode affected
      less than 1% of providers, but as the network scales into Medicare Advantage and Medicaid —
      government payers with regulated rate schedules — rate risk becomes a first-order financial risk
      rather than an edge case.
    claimRefs:
      - CO036
      - CO037
      - CO028

  - id: CO-CALL-O03
    type: insight
    title: "Profitability Signal at Series D Is Strategically Significant"
    body: >-
      CEO Andrew Adams publicly stated a "clear line of sight to company-level profitability" at the
      Series D in July 2024, with revenue more than doubling year-over-year and a provider referral
      rate exceeding 50%. For a healthcare marketplace that raised $321M+ over five years, signaling
      near-term profitability at $2.3B valuation — without disclosed losses or burn rate — positions
      Headway unusually well among health-tech peers for either an IPO path or continued private
      growth. This signal, if verified by audited financials, would represent a meaningful valuation
      quality indicator.
    claimRefs:
      - CO030
      - CO031
      - CO032
      - CO015

