  - id: founding-and-leadership
    title: Founding Story, Co-Founders, and Executive Leadership
    body: |
      Headway was founded in 2019 by Andrew Adams and at least three other co-founders. Andrew Adams,
      the CEO, moved to New York City in 2015 and found himself unable to locate an affordable
      in-network therapist — a personal experience that motivated him to build the infrastructure that
      would make mental healthcare accessible through insurance coverage. The Series A announcement
      (November 2020) identified the founding team as "Jake, Dan, Kevin, and Andrew" — confirming that
      Jake Miller, Dan (last name not publicly disclosed), and Kevin (last name not publicly disclosed)
      are co-founders alongside Adams. Full professional backgrounds of the three non-Adams co-founders
      have not been publicly disclosed as of the report date.

      As the company has scaled, Headway has recruited a professional executive team. Arnaud Ferreri
      joined as Headway's first Chief Technology Officer in January 2025 — a notable milestone reflecting
      the company's evolution beyond founder-only technical leadership. Dr. Neha Chaudhary joined as
      Chief Medical Officer in August 2025, adding clinical credibility to the executive team. Olivia
      Davis serves as Chief Commercial Officer, having authored company blog content as early as December
      2023. With over 700 employees as of April 2025, Headway has built a meaningful organizational depth
      beyond its founding team.

      Key-person risk is elevated for CEO Andrew Adams, who is the public face of the company, central
      to the founding narrative, and the primary relationship holder for major payer and investor
      partnerships. The absence of a publicly disclosed board composition — standard for private companies
      at this stage — limits independent governance visibility. Board members are expected to include
      representatives from lead investors Spark Capital, Thrive Capital, Accel, and a16z.
