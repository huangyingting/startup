  - id: scale-and-traction
    title: Scale, Traction, and Key Performance Indicators
    body: |
      Headway's operational scale as of mid-2024 through early 2026 is substantial by any measure for
      a five-year-old healthcare technology company. The provider network exceeded 34,000 credentialed
      mental health providers by July 2024, representing more than 30% growth in the twelve months
      following the Series C (from 26,000 providers affiliated with 19 in-network plans at Series C
      time). The company powered over 600,000 therapy appointments per month as of July 2024 and
      served its one-millionth patient in November 2024. Provider growth has been significantly
      organic: more than half of new providers in the 2023–2024 period came through peer referral,
      indicating strong word-of-mouth within the therapist community.

      Patient-side quality metrics are strong on Headway's self-reported data: a 93 Net Promoter Score
      for patients, 90% second-visit retention, and average care delivery within 2 days of first
      patient contact. These metrics are compared favorably by Headway's health plan sales materials
      to outcomes from typical insurance behavioral health networks, which typically have longer care
      access delays and lower retention. Headway also claims 3x more available appointments than typical
      insurer networks, reflecting the density advantage of a 34,000-provider network concentrating
      in areas of high demand.

      Headway's headcount surpassed 700 employees as of April 2025. Revenue more than doubled in the
      12 months prior to the Series D (July 2024), and CEO Andrew Adams publicly stated a "clear line
      of sight to company-level profitability." No audited financial statements are publicly available,
      and exact revenue figures have not been disclosed. Geographic reach spans all 50 states and DC.
      Strategic expansions in 2025 include a nationwide integrated care solution bridging primary care
      and mental health (launched May 2025), Medicare Advantage and Medicaid network expansion
      (announced July 2024, ongoing), and an AI-assisted EHR expansion (announced September 2025).
