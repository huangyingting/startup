  - id: milestones-and-adversities
    title: Key Milestones and Adverse Events
    body: |
      Headway's trajectory from founding through 2026 spans three phases: stealth and founding
      (2019), public launch and Series A/B acceleration (2020–2021), and national scale with
      unicorn status and product expansion (2022–2026). Each funding round was accompanied by
      a significant operational leap: Series A coincided with public product launch, Series B
      with Texas state expansion, Series C with all-50-state coverage and unicorn status, and
      Series D with Medicare Advantage/Medicaid entry and a commitment to profitability.

      Adverse events are limited in materiality but require monitoring. The most significant
      occurred in October 2024 when Headway notified affected therapists that Optum/UnitedHealth
      reimbursement rates would decrease by up to 30% effective January 1, 2025. ClearHealthCosts
      reported that for some New York–area doctoral-level psychologists, the Optum rate via Headway
      dropped from $144.27 to approximately $103 for the 90834 procedure code. Headway stated that
      fewer than 340 providers (less than 1% of its 40,000+ network) were affected, and took a
      protective stance for most of its network. Nonetheless, the episode highlighted the structural
      risk of Headway's position as a pass-through between payer rate decisions and provider earnings.

      Consumer-facing complaints filed with the Better Business Bureau (BBB) relate primarily to
      billing confusion, insurance verification errors, and unexpected out-of-network charges for
      patients. Clinical review sources (DL Method, PhilosophieTherapy) document therapist frustrations
      with the provider portal — including insurance billing ambiguity and slow support response.
      No formal regulatory investigations, HIPAA enforcement actions, or material lawsuits have been
      identified in public sources as of the report date. Product expansion in 2025 — integrated
      primary care, AI-assisted EHR, and Medicare Advantage network build-out — represents strategic
      ambition but also execution risk in adjacent markets where Headway has less established presence.
