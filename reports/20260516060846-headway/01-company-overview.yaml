  evidenceGaps:
    - type: missing-source
      severity: minor
      topic: "Co-founder last names and backgrounds not publicly disclosed"
      missingEvidence: >-
        Three of four Headway co-founders (Jake, Dan, Kevin) were identified only by first name in the
        Series A announcement. Their last names, professional backgrounds, current roles at Headway,
        and equity positions have not been publicly disclosed in any accessible source.
      whyItMatters: >-
        Full co-founder profiles are standard diligence inputs for assessing founding team depth,
        domain expertise, and key-person concentration beyond the CEO.
      diligencePath: >-
        Request full founding team profiles and current organizational roles from the company under NDA.
        LinkedIn search for Jake Miller + Headway may yield partial information.
      relatedTableRefs:
        - TO002
      relatedQuestionRefs:
        - QO003

    - type: stale
      severity: minor
      topic: "Employee headcount is stale — last confirmed April 2025"
      missingEvidence: >-
        The most recent headcount figure (700+ employees) is from a company blog post in April 2025.
        Current 2026 headcount has not been publicly updated. The company may have grown materially
        in the 12+ months since this data point.
      whyItMatters: >-
        Employee count is a proxy for burn rate, organizational scaling, and hiring pace — important
        for assessing financial runway and operational capacity.
      diligencePath: >-
        Request current headcount by function and location under NDA. Use LinkedIn employee count
        as a corroborating proxy.
      relatedQuestionRefs:
        - QO010

    - type: private-evidence-only
      severity: major
      topic: "No audited financial statements — profitability claim unverifiable"
      missingEvidence: >-
        Headway has not disclosed revenue, gross margin, EBITDA, burn rate, or audited financial
        statements. The CEO's statement of a "clear line of sight to company-level profitability"
        and "revenue more than doubled" are unaudited management claims.
      whyItMatters: >-
        Without audited financials, the investment case rests on operational metrics and investor
        brand signals rather than verifiable financial performance. The $2.3B valuation cannot be
        independently verified against fundamentals.
      diligencePath: >-
        Request audited FY2022–FY2025 financial statements, monthly revenue cohort data, and
        provider-level unit economics under NDA.
      relatedQuestionRefs:
        - QO011

    - type: private-evidence-only
      severity: minor
      topic: "Exact Series C valuation not publicly disclosed"
      missingEvidence: >-
        The Series C valuation has not been explicitly stated in any identified public source.
        It is known only that the Series C ($125M, October 2023) brought Headway to unicorn
        status (>$1B valuation), and that the Series D ($2.3B) represented a 130% increase —
        implying a Series C valuation of approximately $1.0B.
      whyItMatters: >-
        Precise Series C valuation is needed for exact step-up calculation and for modeling
        investor return expectations at each round.
      diligencePath: >-
        Request cap table and prior round valuation history under NDA.
      relatedQuestionRefs:
        - QO016

    - type: enumeration-incomplete
      severity: minor
      topic: "Competitor valuation comparison — Alma and Grow Therapy valuations not publicly confirmed"
      missingEvidence: >-
        No reliable public valuation data for Headway's primary direct competitors (Alma, Grow Therapy)
        is available from accessible sources. Headway's $2.3B valuation cannot be benchmarked against
        comparable private-company valuations.
      whyItMatters: >-
        Relative valuation position against direct competitors informs pricing power, market leadership
        narrative, and potential acquirer universe.
      diligencePath: >-
        Use Pitchbook or Crunchbase premium data to identify last-round valuations for Alma and
        Grow Therapy; supplement with analyst reports under NDA.
      relatedTableRefs:
        - TO003
      relatedQuestionRefs:
        - QO019

    - type: private-evidence-only
      severity: major
      topic: "Board composition and governance structure not publicly disclosed"
      missingEvidence: >-
        Headway has not disclosed its board of directors composition, board observer rights,
        or governance structure in any public filing or press release. As a private company
        without SEC reporting obligations, no Form D or S-1 equivalent is available.
      whyItMatters: >-
        Board composition determines governance quality, investor alignment, and the ability
        of the company to navigate strategic decisions — particularly relevant given 5 venture
        investors across multiple rounds.
      diligencePath: >-
        Request board composition, observer rights, and governance documents (stockholder agreement,
        voting agreement) under NDA.
      relatedTableRefs:
        - TO004
      relatedQuestionRefs:
        - QO025

acknowledgedWarnings:
  - dimension: tableNotes
    reason: >-
      TO001 (Snapshot KPI Table) contains metrics that are company-self-reported and unaudited.
      Patient NPS (93), second-visit retention (90%), days to care (2 days), and appointment density
      (3x claim) appear on Headway's health-plan-facing marketing page (SO007) with no independent
      verification or methodology disclosure. Revenue metrics (2x growth) are CEO-stated to press
      with no audited financial backing. These metrics are reproduced faithfully for diligence
      completeness but should be treated as company-claimed, not independently verified, pending
      receipt of audited financials.
  - dimension: unverifiedSource
    reason: >-
      SO018 (DL Method) and SO019 (PhilosophieTherapy) are independent practitioner-authored
      web publications rather than established news organizations. They have been included because
      they represent the primary publicly accessible sources for therapist-perspective reviews of
      the Headway platform. Key factual claims from these sources (credentialing timeline, revenue
      model description) are corroborated by official Headway pages (SO006) and press coverage
      (SO013, SO014). Adverse sentiment claims from these sources are included with medium confidence
      and clearly attributed.
