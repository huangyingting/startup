  evidenceGaps:
    - type: missing-source
      severity: material
      topic: market-size
      missingEvidence: "No publicly accessible, methodology-transparent third-party market sizing report was found specifically for U.S. insurance-covered outpatient mental health therapy. Grand View Research, OPEN MINDS, and IBISWorld reports appear paywalled. All sizing above uses bottom-up estimation from NIMH/BLS data."
      whyItMatters: "Without primary market research, TAM/SAM estimates carry low confidence and cannot be independently benchmarked. Investors and acquirers may question the $32B–$58B SAM range without a third-party reference."
      diligencePath: "Acquire OPEN MINDS market intelligence report on outpatient behavioral health; access IBISWorld NAICS 621330 (Offices of Mental Health Practitioners) revenue data; request Headway's internal market sizing model under NDA."
      relatedQuestionRefs:
