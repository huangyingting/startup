callouts:
  - title: "Post-COVID Demand + MHPAEA Enforcement: Structural Market Pull"
    body: "The combination of elevated post-COVID mental health prevalence (59.3M AMI adults; 36.2% in 18–25 cohort) and accelerating MHPAEA enforcement pressure on insurers creates structural demand for in-network mental health providers that Headway is positioned to supply at scale. This dual tailwind is regulatory and demographic in nature — making it durable regardless of macroeconomic cycles."
    calloutType: strength
    claimRefs:
      - CM001
      - CM022
      - CM023
      - CM026

  - title: "Payer Rate Risk: Headway's Spread Model Is Exposed to Insurer Leverage"
    body: "The Optum/UnitedHealth rate cut episode (late 2024) revealed a structural vulnerability: Headway earns a spread between payer reimbursement and provider payment, giving payers direct leverage over Headway's economics. As Headway expands into Medicaid — where rates are substantially below commercial levels — rate risk becomes a first-order financial question. Provider attrition from rate cuts would simultaneously shrink the network and reduce patient access, potentially creating a negative network effect."
    calloutType: risk
    claimRefs:
      - CM033
      - CM034
      - CM019
      - CM011

  - title: "29.3M Treatment Gap: Medicare Advantage and Medicaid Expansion Is the Highest-Impact Path"
    body: "Approximately 29.3 million U.S. adults with AMI received no mental health treatment in 2022. One in three Medicaid beneficiaries and one in four Medicare beneficiaries live with a mental illness — yet government plans historically have the lowest in-network mental health provider penetration. Headway's planned Medicare Advantage and Medicaid expansion (2024–2025) is structurally targeted at this gap. If government-plan reimbursement rates can support provider participation, this expansion represents the highest-impact path to closing the treatment gap and converting a massive latent demand pool into addressable market."
    calloutType: insight
    claimRefs:
      - CM003
      - CM007
      - CM008
      - CM028
      - CM034

