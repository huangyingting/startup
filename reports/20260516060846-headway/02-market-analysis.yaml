  - id: market-sizing
    title: "Market Sizing — Multiple Lens Approach"
    body: |
      No publicly accessible third-party market sizing report covers "U.S. insurance-covered
      outpatient mental health therapy" as a standalone market category with disclosed methodology.
      This analysis applies three independent sizing lenses and preserves contradictory estimates
      and evidence gaps transparently. All bottom-up estimates carry low confidence due to the
      private nature of therapy spend data.

      Lens 1 — Prevalence-based bottom-up TAM: NIMH reports 59.3 million U.S. adults (23.1%)
      lived with any mental illness (AMI) in 2022, of whom 30.0 million (50.6%) received mental
      health treatment. Applying an estimated $2,000 per treated patient per year — roughly 10–15
      sessions at $100–$200 per session, consistent with outpatient therapy norms — yields a
      theoretical TAM of approximately $60B (treated patients only) to $118B (if all AMI adults
      received care). Confidence is low: the per-patient spend figure is an assumption, not a
      published statistic. This lens conflates fully-treated and minimally-treated patients.

      Lens 2 — Supply-side BLS estimate: BLS reported 483,500 substance abuse, behavioral disorder,
      and mental health counselors employed in the U.S. in 2024. Applying an estimated $200,000
      average annual revenue per counselor (a rough approximation for a full-time practice) yields
      a supply-side TAM of approximately $97 billion. This estimate is very rough and includes
      SUD counselors, school counselors, and practitioners not in Headway's network. Confidence
      is low.

      Lens 3 — Insurance-covered SAM: Of the 30 million AMI adults receiving treatment, an
      estimated ~60% use insurance for outpatient therapy, yielding approximately 18 million
      insured therapy patients annually. At an estimated $1,800 per patient per year (12 sessions
      at $150 average), the SAM is approximately $32 billion. An alternative SAM from the supply
      side — applying 60% insured share to the $97B supply-side TAM — yields approximately
      $58 billion. Both are low-confidence estimates.

      Headway's serviceable obtainable market (SOM) indicator is derived from its 600,000
      monthly appointments: at 12 months, that is approximately 7.2 million annual appointments.
      Applying an estimated $20–$40 platform spread per appointment yields a revenue range of
      $144M–$288M annually. Headway has not disclosed revenue; the spread figure is not public.
      Confidence is very low. Headway's 34,000 providers represent approximately 7% of the total
      483,500 U.S. mental health counselors employed in 2024.

      Total U.S. national health expenditure reached approximately $4.9 trillion in 2023 (CMS).
      Behavioral health represents a significant sub-component, but CMS does not disaggregate
      outpatient mental health therapy from total behavioral health in a publicly accessible format.
