  - id: constraints-and-gaps
    title: "Adoption Constraints, Evidence Gaps, and Disconfirming Evidence"
    body: |
      Several structural constraints limit the pace and economics of Headway's market adoption,
      and material evidence gaps affect the precision of any market sizing estimate.

      Insurance credentialing friction: The 30-day-per-insurer credentialing process is the primary
      structural barrier that Headway aims to remove. However, credentialing timelines remain a
      constraint during initial onboarding, creating an onboarding funnel gap between provider
      sign-up and first billable appointment. Competitor platforms Alma and Grow Therapy have
      similar credentialing-automation products, increasing competitive intensity in the supply-side
      market.

      Payer rate pressure: In late 2024, Optum/UnitedHealth reduced reimbursement rates for some
      Headway therapists. This episode illustrates a structural vulnerability in Headway's spread
      model: when payers compress rates, Headway must absorb compression, reduce provider payments
      (risking therapist exits), or exit payer relationships. The Medicaid segment presents
      heightened rate risk: Medicaid reimbursement for mental health therapy is substantially lower
      than commercial rates, which historically limits provider willingness to participate. Provider
      complaints about billing administration on Headway's platform (documented in BBB and
      provider review sources) represent an additional adoption constraint that could slow provider
      network growth.

      State licensing fragmentation: Therapists are licensed at the state level, and interstate
      therapy practice requires separate state licensure. While Headway operates in all 50 states,
      providers must independently maintain licensure in each state they serve patients from —
      a friction point that constrains the geographic expansion of any individual provider.

      Mental health stigma and rural access: Patient-side demand is constrained by stigma
      (many adults with AMI do not seek care even when coverage is available) and by geography.
      Headway's digital-first model may not reach underserved rural communities that lack broadband
      connectivity or have limited telehealth familiarity.

      Evidence gaps: No publicly accessible market sizing report with disclosed methodology covers
      U.S. insurance-covered outpatient mental health therapy as a standalone category. All TAM/SAM
      estimates in this chapter are constructed bottom-up from NIMH prevalence and BLS workforce
      data. CMS does not disaggregate behavioral health spend by outpatient mental health vs. SUD vs.
      inpatient psychiatric care. Estimates should be treated as order-of-magnitude indicators rather
      than precise market size figures.
