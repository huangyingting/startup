chapter:
  number: 2
  title: "Market Analysis"
  letter: M
  summary: |
    Headway operates in U.S. insurance-covered outpatient mental health therapy, a market with
    59.3 million adults living with any mental illness (NIMH 2022), a $32B–$58B SAM estimated
    from insured therapy demand, and structural tailwinds from MHPAEA enforcement, post-COVID
    demand, and Medicare Advantage/Medicaid expansion. The addressable opportunity is defined
    by the 70% of therapists who historically decline insurance due to administrative burden —
    the friction Headway eliminates. Key constraints include payer rate pressure, Medicaid
    reimbursement economics, state licensing fragmentation, and a material evidence gap in
    publicly accessible market sizing specific to insurance-covered outpatient therapy.

sections:
  - id: market-boundary
    title: "Market Definition and Boundaries"
    body: |
      Headway's market is U.S. outpatient mental health therapy reimbursed through insurance —
      specifically commercial health plans, Medicare Advantage plans, and Medicaid managed care
      organizations. This boundary is defined by Headway's product architecture: the company
      credential providers into insurance networks, manages billing against payer contracts, and
      connects insured patients to therapists within their network. Every transaction involves an
      insurance reimbursement claim.

      Excluded from Headway's addressable market are: (1) inpatient psychiatric care — Headway
      operates entirely in outpatient settings; (2) substance use disorder (SUD) residential and
      intensive outpatient programs — Headway's provider network focuses on mental health, not
      SUD-specific clinical programs; (3) direct-to-consumer teletherapy apps such as Talkspace
      and BetterHelp that operate on a cash-pay or employer-subscription model, bypassing insurance
      billing; (4) psychiatry and prescribing services as a standalone product line (though Headway's
      network does include prescribers, prescribing is not the core offering); and (5) employer
      Employee Assistance Programs funded directly by employers rather than through insurance
      reimbursement.

      The status-quo substitute for Headway's platform is cash-pay private therapy: sessions
      typically priced at $150–$300 per session, paid directly by patients out-of-pocket without
      insurance. This substitute is accessible primarily to higher-income patients and represents
      the arrangement that approximately 70% of U.S. therapists historically offered because
      insurance credentialing was too administratively burdensome to justify. Adjacent markets
      that Headway may enter — but does not currently serve directly — include employer-sponsored
      mental health benefits (EAPs), school-based counseling, and integrated physical-behavioral
      health programs.

      The market's defining characteristic is a structural access gap: approximately 29.3 million
      U.S. adults with any mental illness (AMI) received no treatment in 2022, and of those who
      did receive care, a large share used cash-pay because in-network therapists were unavailable.
      Headway's core market proposition is converting the cash-pay therapy segment and the
      treatment gap into insured, reimbursable care by expanding the supply of insurance-accepting
      providers.
