  - id: buyer-and-segment-map
    title: "Buyer, User, and Payer Segmentation"
    body: |
      Headway serves a multi-sided market with structurally distinct buyer, user, and payer roles.
      Understanding each segment's budget ownership, decision rights, and adoption trigger is
      essential to evaluating commercial momentum and addressable market.

      Commercial health plans are Headway's primary B2B buyers. VP Benefits officers and Chief
      Medical Officers at commercial insurers purchase access to Headway's credentialed provider
      network to meet member demand and regulatory network adequacy requirements. These plans
      pay Headway through negotiated reimbursement rates; Headway retains the spread between payer
      rates and provider payments. Headway reports partnerships with 45+ insurance companies as
      of May 2026. The adoption trigger is network adequacy compliance (state and federal requirements)
      combined with measurably faster care access: Headway reports 2 days to care vs. typical
      wait times, 3x more available appointments, and 93 patient NPS.

      Self-insured employers represent a secondary buyer channel accessed primarily via their
      third-party administrator (TPA) or carrier. HR Directors and Benefits Managers own the
      benefits budget; Headway reaches these buyers indirectly through their insurance partners.

      Mental health providers — therapists, licensed clinical social workers (LCSWs), and
      psychologists — are Headway's supply-side users. Headway is free to providers: it offers
      credentialing, billing automation, scheduling, and EHR functionality with no membership
      fees or commission. The adoption trigger is eliminating the administrative burden that leads
      70% of therapists to decline insurance — specifically the 30-day per-insurer credentialing
      process and billing complexity.

      Individual patients are the demand-side end users. They access Headway's provider directory
      at headway.co to find in-network therapists, paying their standard copay or deductible rather
      than $150–$300 cash-pay per session. Headway's 90% second-visit retention rate and 93 NPS
      indicate strong patient satisfaction. Adoption is triggered by insurance coverage, reduced
      cost, and therapist availability.

      Medicare Advantage (MA) and Medicaid plans are an emerging buyer segment being activated
      through Headway's government plan expansion. One in three Medicaid beneficiaries and one in
      four Medicare beneficiaries live with a mental illness. Headway's expansion into MA in all 50
      states and Medicaid starting in 2025 opens a market covering approximately 100 million
      Americans — a transformative addressable market expansion if reimbursement economics support
      provider participation.
