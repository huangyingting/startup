callouts:
  - calloutType: strength
    title: "Headway's 34,000-Provider Network and 45+ Payer Relationships Create Two-Sided Network Density Advantages"
    body: >-
      Headway's provider network (34,000+ providers) is approximately 31% larger than Grow Therapy's
      (26,000), giving payers broader coverage for network adequacy compliance. With 45+ insurance
      contracts and >50% of new providers arriving via referral from existing providers, Headway's
      two-sided network generates compounding density that has not yet been matched by any single
      competitor—though Grow Therapy's 125+ payer count is a meaningful gap that payers may view as
      more valuable than raw provider count.
    claimRefs:
      - CP002
      - CP003
      - CP020
      - CP025

  - calloutType: risk
    title: "Grow Therapy's 125+ Payer Count vs. Headway's 45+ Is a Structural Competitive Gap; Spring Health + Alma Creates Dual-Channel Convergence Threat"
    body: >-
      Grow Therapy's 125+ insurance partnerships (vs. Headway's 45+) and existing Medicare/Medicaid
      inclusion suggest Grow has achieved broader payer diversification—potentially making it more
      attractive to health plans seeking maximal network breadth. Separately, Spring Health's acquisition
      of Alma consolidates two historically distinct competitive models (employer EAP + insurance network)
      into a single entity, creating the only competitor capable of serving both employer and insurer
      buyers simultaneously. This dual-channel capability is a structural convergence threat that
      Headway's current B2B health-plan model does not address.
    claimRefs:
      - CP003
      - CP004
      - CP010
      - CP030

  - calloutType: insight
    title: "The Insurance-Enabled Therapy Market Is Converging: Headway Must Move Up the Value Chain Before Differentiation Erodes"
    body: >-
      The mental health therapy market is undergoing structural convergence: employer-EAP companies
      (Spring Health, Lyra) are adding insurance-integration capabilities (via Alma acquisition), while
      insurance-network companies (Headway, Grow) are adding EHR and care coordination tools. As this
      convergence progresses, the current basis of competition (insurance network vs. employer EAP) will
      erode. Headway's durable differentiation will depend on moving up the value chain—deeper clinical
      outcomes data, government-plan compliance infrastructure, and predictive patient-provider matching—
      before Grow Therapy's broader payer count and Spring Health's dual-channel model close the gap.
    claimRefs:
      - CP010
      - CP025
      - CP030
      - CP036
      - CP042

