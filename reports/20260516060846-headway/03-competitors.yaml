  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: competitive-financials
      missingEvidence: >-
        No public revenue, gross margin, profitability, or unit economics data is available for Grow
        Therapy, Alma (pre-acquisition), Spring Health, or Modern Health. All are private companies
        without SEC reporting obligations. Grow Therapy's specific revenue model (insurance rate spread
        vs. fee) is not publicly confirmed; it is assumed from free-to-provider marketing.
      whyItMatters: >-
        Without competitor financial data, Headway's relative financial strength, margin sustainability,
        and revenue model defensibility cannot be benchmarked against peers. The competitive spread
        between Headway and Grow Therapy on economics is entirely private.
      diligencePath: >-
        Use Pitchbook, Crunchbase premium, or Bloomberg to identify last-round valuations for Grow
        Therapy and Spring Health; request competitive intelligence under NDA; review any S-1 filings
        if either company files for IPO.
      relatedQuestionRefs:
        - QP016
        - QP021

    - type: missing-source
      severity: minor
      topic: adverse-sector
      missingEvidence: >-
        Cerebral's DEA investigation and insurance fraud allegations (2022) were not verified from a
        current primary source during research. Details on Headway-specific regulatory adverse events
        (other than the Optum rate cut and BBB complaints) were not found in publicly accessible sources.
      whyItMatters: >-
        Sector-level adverse regulatory events signal risks that may affect Headway. Without verified
        detail on Cerebral's outcomes and any Headway-specific regulatory inquiries, the adverse risk
        section relies on secondary references and inference.
      diligencePath: >-
        Search PACER for federal complaints naming Headway; search FTC enforcement actions 2022–2026
        for mental health platforms; review DEA actions against telehealth prescribers for sector context.
      relatedQuestionRefs:
        - QP017
        - QP022

    - type: enumeration-incomplete
      severity: minor
      topic: likely-entrants
      missingEvidence: >-
        Potential tech-giant entrants (Amazon via One Medical, Google via behavioral health investments,
        Optum via proprietary credentialing) are speculative based on general strategic direction.
        No current public announcements of planned entry into insurance-network mental health facilitation
        were found from these companies as of May 2026.
      whyItMatters: >-
        If a well-capitalized entrant (Amazon, Google, or a large insurer) enters the insurance-network
        facilitation space, it would represent an existential threat to Headway's positioning. The
        absence of current announcements does not eliminate the 3–5 year horizon risk.
      diligencePath: >-
        Monitor Amazon One Medical behavioral health expansion announcements; track Google Health
        behavioral health partnership filings; review Optum behavioral health technology acquisition
        announcements quarterly.
      relatedQuestionRefs:
        - QP020

    - type: private-evidence-only
      severity: material
      topic: payer-contract-terms
      missingEvidence: >-
        Headway's specific health plan contract terms, duration, renewal provisions, revenue concentration
        by payer, and lock-in mechanisms are private and not disclosed in any accessible public source.
        Multi-year contract claims are from press coverage generalizations, not specific contract data.
      whyItMatters: >-
        Payer contract terms determine the actual durability of Headway's B2B moat. If contracts are
        short-term, non-exclusive, or terminable at will (as the Optum rate cut episode suggests), the
        switching cost on the payer side may be lower than represented.
      diligencePath: >-
        Request sample payer contract templates and top-5 payer revenue concentration under NDA;
        review contract duration, exclusivity provisions, and termination clauses with legal counsel.
      relatedQuestionRefs:
        - QP024

    - type: enumeration-incomplete
      severity: minor
      topic: feature-capability-matrix
      missingEvidence: >-
        The feature/capability matrix (TP002) is based on public marketing pages as of May 2026 and
        may not reflect unreleased product capabilities, recent feature additions, or capabilities
        marketed only to enterprise buyers. Several cells are marked Unknown reflecting absence of
        public disclosure rather than confirmed capability gaps.
      whyItMatters: >-
        Competitive feature gaps may be overstated or understated if competitors have launched
        capabilities since the last page update. The matrix should be refreshed with each report cycle.
      diligencePath: >-
        Request product roadmaps from Headway and Grow Therapy under NDA; conduct provider interviews
        to verify feature availability in practice vs. on marketing pages.
      relatedTableRefs:
        - TP002
      relatedQuestionRefs:
        - QP003
