  - id: adjacent-and-substitute-competitors
    title: "Adjacent and Substitute Competitors: Employer EAP and Direct-to-Consumer"
    body: |
      The employer EAP segment competes for mental health care budget but targets a different buyer
      than Headway. Lyra Health operates a curated provider network of 30,000+ evidence-based providers
      for large employers, offering AI-powered matching and clinical oversight. Lyra sells exclusively
      to self-insured employers (primarily Fortune 500 companies) under per-employee-per-month (PEPM)
      contracts and does not use insurance network models—providers are paid directly by Lyra under
      employer contracts. This means Lyra competes with Headway for provider talent and patient
      attention, but not for insurance payer contracts. Modern Health similarly targets employers with
      a multi-modal care platform offering coaching, therapy, and psychiatry under an EAP model.
      Neither Lyra nor Modern Health threatens Headway's health-plan B2B channel directly, but the
      Spring Health + Alma convergence creates the first hybrid competitor spanning both channels.

      BetterHelp, a Teladoc Health subsidiary, is the world's largest online therapy service with
      31,000+ licensed therapists and has helped more than 5 million patients. BetterHelp operates
      on a direct-to-consumer subscription model ($60–90/week), with no insurance billing or
      credentialing—making it a substitute for patients who prefer accessible, immediate therapy over
      insurance-covered care. For providers, BetterHelp offers a different value proposition than
      Headway: therapists are paid per session by BetterHelp rather than receiving insurance
      reimbursements. Talkspace occupies a hybrid position: it offers some insurance-covered therapy
      (with "$0 copay" possible for insured members) alongside a direct-to-consumer subscription model.
      Talkspace is publicly traded on Nasdaq (ticker: TALK), giving it a different capital structure
      than private competitors including Headway. Neither BetterHelp nor Talkspace threatens Headway's
      health-plan B2B model directly, but BetterHelp's 31,000+ therapist supply could redirect
      provider recruitment if it entered the insurance-network facilitation space.
