companyProfile:
  summary: >-
    Headway (TherapyMatch, Inc.) is the largest insurance-native mental health network in the United
    States. Founded in 2019 in New York City by Andrew Adams and co-founders, Headway removes the
    administrative barriers that prevent therapists from accepting insurance — credentialing,
    billing, and claims processing — enabling 34,000+ credentialed providers to see patients
    covered by 45+ commercial insurance plans. The company has served over 1 million patients
    and operates across all 50 states and Washington DC. Headway reached a $2.3B valuation at its
    Series D ($100M, July 2024), bringing total capital raised to approximately $321M+. With 700+
    employees and a recently appointed CTO (January 2025) and CMO (August 2025), Headway is
    scaling its platform toward Medicare Advantage and Medicaid expansion.
  foundedDate: "2019-01-01"
  founders:
    - name: Andrew Adams
      role: Co-Founder and CEO
      background: >-
        Personal experience unable to find an affordable in-network therapist in NYC; built Headway
        to solve systemic access barriers.
      claimRefs: [CO003, CO008]
    - name: Jake Miller
      role: Co-Founder
      background: "Early co-founder; operational details limited in public record."
      claimRefs: [CO004]
  foundingLocation: "New York City, NY"
  headquarters: "New York City, NY"
  productSummary: >-
    Headway provides an insurance-native EHR and practice management platform. For providers, it
    handles insurance credentialing, session billing, claims submission, and payment — free of
    charge. For patients, it offers insurance-covered therapy with provider matching. For payers,
    it serves as a delegated credentialing and billing aggregator reducing per-claim overhead. In
    September 2025 Headway launched AI-assisted SOAP note generation to reduce documentation
    burden on providers.
  customerFocus: >-
    Three-sided market: licensed mental health providers (therapists, psychiatrists, psychologists),
    patients seeking in-network behavioral health care, and commercial insurance payers seeking
    network expansion without administrative overhead.
  businessModel: >-
    Commission-based: Headway charges providers approximately 10–15% of each insurance
    reimbursement per session processed through the platform. No subscription fee. Revenue is
    fully dependent on insurance reimbursement volume processed.
  stage: "Series D"
  fundingStatus: >-
    $321M+ total raised across Series A through Series D. Series D: $100M at $2.3B post-money
    valuation (July 2024), led by Spark Capital, with participation from a16z, GV, and Accel.
  claimRefs: [CO001, CO002, CO003, CO005, CO023, CI001, CI002, CI010, CI015]
summary:
  headline: >-
    Headway is the structurally strongest position in insurance-native behavioral health tech
    with 34,000+ providers and 45+ payer contracts, but the $2.3B Series D valuation prices in
    significant execution on Medicare/Medicaid expansion and reimbursement rate stability — both
    of which carry material regulatory and payer-concentration risk. Conditional positive pending
    financial disclosure diligence.
