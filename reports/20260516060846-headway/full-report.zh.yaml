      - number: '6.2'
        title: 服务方与患者采用轨迹
        blocks:
          - type: paragraph
            body: >
              2021–2024 年，Headway 服务方网络以约 115% 的复合年增长率扩张：从 2021 年底 Series B 公告时约 2,000 名活跃服务方，增长到 2024 年 Series D 文件披露时的
              34,000+。这是美国行为健康领域记录在案的最快服务方网络扩张之一，也说明 Headway 的零成本入驻模式，对过去认为保险账单门槛太高的治疗师有效。


              地理覆盖从最初市场扩展到美国 50 个州和 District of Columbia。网络现在覆盖主要都市区，也覆盖郊区和农村市场；地理足迹明显宽于大多数直接竞争对手。最接近的可比公司 Grow Therapy
              在 2024 年中报告约 26,000 名服务方，意味着按服务方数量计，Headway 的网络规模领先约 30%。另一个直接竞争对手 Alma 公开可见的活跃服务方显著更少。


              患者侧，截至 2024 年底，Headway 达到服务 1,000,000 名患者的里程碑——该数字由 Headway 博客发布，并得到 Series D 新闻报道佐证。总患者基数与 34,000
              名服务方每人平均接诊少于 30 名患者的网络相匹配，说明平均利用率仍有增长空间，平台在规模上尚未受供给限制。


              保险合作数量从上线时少于 10 家 payer 增长到 2024 年的 45+ 家；每份 payer 合同都会打开该计划全部会员的访问权限，因此扩张显著扩大了可触达患者人群。Series D 文件提到
              Medicare Advantage 和 Medicaid 是计划扩张方向；二者合计代表美国最大的公共保险市场，但也需要不同资质认证工作流和报销结构，会带来执行风险。
