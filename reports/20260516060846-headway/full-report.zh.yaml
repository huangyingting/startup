      - CU004
      - CU005
      - CU006
    data:
      nodes:
        - label: N1：意识到需要心理健康支持
          description: 患者出现焦虑、抑郁或其他心理健康问题，并决定寻求专业帮助
          touchpoints: Primary care referral, employer EAP, online symptom checker, word of mouth
          headwayRole: Not yet in funnel; general awareness building
        - label: N2：了解保险覆盖
          description: 患者查看健康保险会员门户或致电保险公司，了解心理健康福利
          touchpoints: Insurance member portal, explanation of benefits documentation, insurance customer service
          headwayRole: >-
            MHPAEA compliance requirements ensure commercial payers must cover mental health; Headway benefits from
            parity-driven demand
        - label: N3：发现并搜索 Headway
          description: 患者找到 headway.co，输入保险计划，搜索网内治疗师
          touchpoints: headway.co/insurance, headway.co/providers insurance-aware search, Google search for in-network therapist
          headwayRole: Primary discovery touchpoint; insurance plan filter eliminates out-of-network providers
        - label: N4：匹配并预约服务方
          description: 患者查看按其保险计划筛选后的服务方资料，选择治疗师，并预约首次会诊
          touchpoints: >-
            Provider profile page (specialty, availability, photo, bio), real-time availability calendar, appointment
            booking confirmation
          headwayRole: Matching engine surfaces in-network providers with open slots; eliminates manual credentialing verification
        - label: N5：完成首次会诊
          description: 患者参加首次治疗会诊（线下或远程医疗）；保险理赔自动提交
          touchpoints: Telehealth video session (Headway-native) or in-person, session reminder, automated insurance billing
          headwayRole: >-
            Session delivery infrastructure; automated claim submission to insurer; patient receives EOB, not surprise
            bill
        - label: N6：继续护理或更换服务方
          description: 患者继续复诊，或使用平台寻找新的网内服务方
          touchpoints: Follow-up appointment booking, provider re-matching if needed, ongoing session delivery
          headwayRole: Retention depends on provider availability and satisfaction; patient return rate not publicly disclosed
