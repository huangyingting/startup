  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: 截至 2026 年 Q1，评估 Headway 六类重大风险的严重性和可能性。每行代表一个独立风险领域；列描述低、中、高可能性下的风险类别和影响画像。严重性和可能性标记是分析师基于公开证据作出的判断；内部风险评估不可得。
    approximationNotes: 所有可能性和严重性标记都是分析师基于公开监管文件、执法先例、Headway 公开披露和可比平台风险因素作出的评估。未审阅内部风险登记册或管理层陈述。高严重性标记反映风险在高可能性情景下落地时潜在不利结果的规模，并非预测发生概率。
    claimRefs:
      - CR001
      - CR002
      - CR006
      - CR017
      - CR012
    data:
      columns:
        - 风险类别
        - 低可能性
        - 中可能性
        - 高可能性
      rows:
        - label: 监管合规（MHPAEA 2024）
          values:
            - 监管 / 合规
            - 最小——支付方无需调整福利或费率即可达成平价；Headway 经济性不变
            - 中等——支付方限制心理健康福利频次，使其匹配医疗福利下限；会诊量下降 10–20%
            - 严重——支付方重新谈判费率或限制福利，同时压低 Headway 会诊量和单次会诊收入
        - label: HIPAA 数据泄露
          values:
            - 数据安全 / 隐私
            - 可控——小规模泄露经整改，OCR 罚款低于 $250K；支付方合同不受影响
            - 重大——OCR 执法行动；每个违规类别的民事罚金最高 $1.9M；强制公开披露
            - 灾难性——1M+ 患者记录大规模泄露；登上 OCR Wall of Shame；支付方信心和服务方信任崩塌
        - label: 支付方集中风险
          values:
            - 合作方 / 商业
            - 最小——45+ 支付方合同提供量的分散；单一支付方终止本身仍可承受
            - 重大——前三大支付方降价使单次会诊费用压缩 10–20%；服务方收入下降；流失风险上升
            - 严重——前三大支付方合同终止移除 15–25% 的患者量；网络充足性跌破支付方要求下限
        - label: 服务方流失
          values:
            - 运营 / 网络
            - 可控——自然流失由新服务方入网抵消；网络密度维持在 30K+ 活跃服务方以上
            - 重大——流失超过招募；网络密度向 25K 服务方下滑；关键市场出现地理缺口
            - 严重——持续流失导致活跃服务方低于 20K；无法满足支付方网络充足性要求；支付方合同承压
        - label: AI 文档责任
          values:
            - 技术 / 临床
            - 最小——零星 AI 笔记错误在临床使用前由服务方修正；无外部不良事件
            - 中等——SOAP 笔记中的系统性 AI 偏见或事实错误引发服务方责任索赔和 Headway 赔偿争议
            - 严重——因 AI 生成临床文档错误影响患者结果，Headway 遭遇集体诉讼或监管行动
        - label: 劳工分类风险
          values:
            - 法律 / 监管
            - 可控——DOL 审查导致合同条款小幅调整；在强化文件记录后维持 IC 分类
            - 重大——DOL 调查要求修订服务方协议条款；产生法律成本和运营扰动，但不完全重新分类
            - 灾难性——法院命令重新分类为雇员，为 34,000+ 工作者增加工资税、福利和加班义务
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: >-
      有向无环图展示支付方费率压缩如何沿 Headway
      商业模式传导，造成收入、网络和患者访问的连锁影响。传导链说明支付方依赖风险会复合放大：一次降价不只是压缩利润——它可能触发服务方流失螺旋，最终削弱网络对剩余支付方的价值，并压低总会诊量。
    approximationNotes: 传导关系由分析师根据三边市场的结构动态推断。具体阈值（例如触发服务方流失的降价幅度）无法从公开数据得知。Optum 2024 年 11 月先例确认支付方费率压缩是现实风险；传导幅度和时点取决于情景，未公开披露。
    claimRefs:
      - CR017
      - CR018
      - CR020
      - CR028
      - CR032
    data:
      nodes:
        - id: N1
          label: 支付方费率压缩
          description: 支付方（如 Optum/UnitedHealth）降低向 Headway 网络支付的单次会诊报销费率；Clear Health Costs 于 2024 年 11 月记录过先例
        - id: N2
          label: 服务方收入下降
          description: 总报销额缩水后，Headway 单次会诊管理费下降；服务方扣除 Headway 费用后每次会诊获得的净付款降低
        - id: N3
          label: 服务方流失
          description: 若 Headway 会诊净收入跌破服务方收入底线，服务方退出平台；活跃服务方数量开始下降
        - id: N4
          label: 网络收缩
          description: 活跃服务方数量下降；地理覆盖缺口出现；患者平均等待时间拉长；与签约支付方的网络充足性面临风险
        - id: N5
          label: 患者访问下降
          description: 可用网内服务方减少，依赖 Headway 网络的患者面临更长预约等待和地理访问缺口
        - id: N6
          label: 收入损失
          description: 复合效应：单次会诊费用下降叠加可计费会诊总量减少，同时压低 Headway 总管理费收入
      edges:
        - from: N1
          to: N2
          label: 降价压低 Headway 单次会诊管理费
        - from: N2
          to: N3
          label: 服务方收入下降触发离开平台
        - from: N3
          to: N4
          label: 服务方离开降低活跃网络密度
        - from: N4
          to: N5
          label: 网络缺口减少患者可预约时段
        - from: N4
          to: N6
          label: 活跃服务方减少意味着可计费会诊减少
        - from: N5
          to: N6
          label: 患者访问下降进一步压缩总会诊量
  - id: FR003
    title: 依赖图
    type: dag
    layout: wide
    summary: >-
      有向无环图展示截至 2026 年 Q1，Headway 平台核心的六项关键运营依赖。五项上游依赖都必须稳定运行，Headway 平台才能交付服务方门户、患者预约、计费自动化和 EHR
      功能。云基础设施是所有平台服务的未披露共同宿主，因此是严重性最高的单点故障。
    approximationNotes: 依赖关系依据公开产品文档、Greenhouse 工程岗位招聘和监管合规要求推断。Headway 未公开披露云基础设施、远程医疗视频和 EPCS 的具体供应商身份。所有关系均对照公开平台文档核验；内部架构图和供应商合同不可得。
    claimRefs:
      - CR021
      - CR022
      - CR023
    data:
      nodes:
        - id: D1
          label: 保险支付方 API（45+）
          description: 从所有 45+ 签约支付方实时核验资格、提交理赔并取回 EOB；割裂的支付方 API 格局需要持续维护
        - id: D2
          label: 云基础设施（未披露）
          description: 用于 HIPAA 合规 ePHI 存储和计算的未披露云托管商；服务方门户、EHR、计费和患者匹配等所有平台服务共用同一宿主
        - id: D3
          label: HIPAA 合规栈
          description: 所有 ePHI 操作都需要加密控制、与云供应商签署业务伙伴协议、审计日志、访问控制和泄露通知程序
        - id: D4
          label: 州执照数据库
          description: 覆盖所有 50 个州和 DC 的执照核验集成；服务方资质认证、持续执照监控和远程医疗合规核验都需要
        - id: D5
          label: AI / ML 引擎
          description: 患者—服务方匹配算法；2025 年 9 月上线的 AI 辅助 SOAP 笔记生成；支撑产品优化的贝叶斯实验平台
        - id: D6
          label: Headway 平台核心
          description: 集成的服务方门户、患者预约市场、自动化保险计费管线和 AI 辅助 EHR——交付给 34,000+ 服务方和 1M+ 患者的运营界面
      edges:
        - from: D1
          to: D6
          label: 理赔提交和资格核验需要支付方 API
        - from: D2
          to: D6
          label: 云基础设施托管所有平台服务和 HIPAA 合规 ePHI 数据
        - from: D3
          to: D6
          label: 平台上所有 PHI 操作都需要 HIPAA 合规控制
        - from: D4
          to: D6
          label: 服务方资质认证和持续合规监控需要执照数据
        - from: D5
          to: D6
          label: AI 匹配和笔记辅助驱动核心服务方与患者 UX
        - from: D1
          to: D2
          label: 支付方理赔数据经由云基础设施处理和存储
  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: 从四项证据输入——市场机会、竞争位置、财务画像和风险因素——推导 Headway 的有条件买入建议。每个输入节点都有已确认公开证据支撑；推荐节点捕捉了需要 NDA 级尽调确认的条件要素。
    data:
      nodes:
        - id: N1
          label: 市场机会
          value: >-
            Large, Underserved TAM: $280B+ behavioral health market; 53.8% AMI treatment gap; COVID-accelerated
            telehealth
        - id: N2
          label: 竞争位置
          value: 'Network Effects + Insurance-Native EHR: 34,000+ providers, 45+ payers, no-subscription moat'
        - id: N3
          label: 财务画像
          value: '$2.3B Valuation, $321M+ Raised: Series D at $100M; 5–10x implied revenue multiple (unconfirmed revenue)'
        - id: N4
          label: 风险因素
          value: 'Payer Concentration + Rate Compression + Regulatory: Optum 2024, Cerebral precedent, FTC risk'
        - id: N5
          label: 推荐
          value: 'Conditional Buy — Pending 6 Diligence Asks: Revenue, Churn, Payer Terms, Burn Rate, Cap Table, HIPAA'
      edges:
        - from: N1
          to: N5
          label: TAM + 需求缺口支撑增长跑道
        - from: N2
          to: N5
          label: 网络效应护城河支撑溢价倍数
        - from: N3
          to: N5
          label: 资本效率和投资人质量支撑入场
        - from: N4
          to: N5
          label: 风险因素抬高尽调要求
        - from: N1
          to: N2
          label: 市场规模推动保险原生模式的竞争差异化
    approximationNotes: 流程代表应用于已确认公开证据的定性决策逻辑。边标签是多因素推理链的压缩描述；完整分析见各章节正文。推荐节点是有条件的，不是最终投资决定；它反映截至 2026 年 5 月、仅基于公开可得证据的尽调状态。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV033
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: >-
      将五种收入倍数情景套用于 2024 年估算收入区间中点（$230M）后得到的隐含估值。该图展示 Headway 当前 $2.3B 标记对假设收入倍数的敏感性。当前 $2.3B 标记大致对应 10x
      情景，说明相对于估算当前收入，定价已计入强增长预期。
    data:
      items:
        - label: 3x 收入倍数（熊市）
          value: 690
        - label: 5x 收入倍数（低基准）
          value: 1150
        - label: 8x 收入倍数（基准）
          value: 1840
        - label: 10x 收入倍数（高基准 / 当前标记）
          value: 2300
        - label: 15x 收入倍数（牛市）
          value: 3450
    approximationNotes: >-
      所有估值均以标注倍数乘以 $230M 收入估算中点得出（$230M–$460M 估算 2024 年收入区间的低端）。估算收入由分析师推导，并未经公司确认；实际收入可能更高或更低，从而按比例移动所有隐含估值。3x
      熊市倍数反映财务困境中的行为健康平台；15x 牛市倍数反映行为健康基础设施的峰值定价（Lyra Health 2021 年峰值）。当前 $2.3B Series D 标记对应 10x 情景。
    claimRefs:
      - CV009
      - CV010
      - CV017
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 五种情景下的估值区间估算：已确认的当前标记（Series D）、熊市退出、基准退出、牛市退出和 TAM 调整上限。所有退出情景都是带有明确假设依赖的前瞻估算；只有当前标记来自一手来源确认。
    data:
      items:
        - label: 当前标记（2024 年 7 月 Series D）
          low: 2300
          high: 2300
          unit: $M
          confidence: confirmed — Fierce Healthcare, STAT News, MobiHealthNews, Axios, NYT
          description: 确认 Series D 投后估值 $2.3B；SEC Form D 确认募集 $99,999,939；首次出售日期为 2024 年 7 月 16 日
        - label: 熊市退出（2027–2028）
          low: 800
          high: 1500
          unit: $M
          confidence: analyst estimate — low confidence; depends on distressed sale conditions
          description: 困境出售或被迫合并情景；由重大支付方合同流失或监管执法行动触发
        - label: 基准退出（2027–2029 M&A）
          low: 2500
          high: 4000
          unit: $M
          confidence: analyst estimate — medium confidence; anchored to comparable M&A precedents
          description: 大型保险公司或 EHR 平台以 2028 年估算收入 5–7x 收购；可比 Lyra / Spring Health 战略价值
        - label: 牛市退出（IPO 2029–2030）
          low: 4000
          high: 7000
          unit: $M
          confidence: analyst estimate — low-medium confidence; depends on IPO market conditions and profitability
          description: 作为行为健康市场领导者 IPO 或被战略方溢价收购；类比 Change Healthcare 基础设施价值
        - label: TAM 调整上限
          low: 5000
          high: 10000
          unit: $M
          confidence: speculative — scenario ceiling based on market share assumptions; not a price target
          description: $280B+ 行为健康 TAM 的 10%，约 2x 收入倍数；假设占据主导市场地位的理论上限
    approximationNotes: >-
      所有退出情景区间都是分析师基于行为健康及相邻医疗科技领域可比 M&A 和 IPO
      先例构建的前瞻估算。它们不是投资建议或目标价格。当前标记（$2.3B）是本图唯一确认的数据点。熊市、基准和牛市退出区间取决于未来收入表现、市场条件和退出动态，无法用当前公开证据预测。TAM
      调整上限是理论最大值，并非现实的近期情景。
    claimRefs:
      - CV009
      - CV017
      - CV018
      - CV019
      - CV020
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 汇总截至 2026 年 5 月 Headway 投资案例的五项关键绩效指标，结合经确认的一手来源指标和分析师推导估算。已确认指标由 SEC 文件和一线媒体支撑；估算指标明确标注为分析师代理值。
    data:
      items:
        - label: 总估值（2024 年 7 月）
          value: $2.3B
          note: 确认 Series D 投后标记——Fierce Healthcare、STAT News、Axios、NYT、MobiHealthNews
        - label: 服务方网络规模
          value: 34,000+
          note: 截至 2024 年 Q4——已在 Series D 公告和新闻报道中确认
        - label: 保险合作伙伴
          value: 45+
          note: 截至 2026 年 5 月的商业支付方网络——headway.co 已确认
        - label: 累计融资额
          value: $321M+
          note: Series A（$26M）+ Series B（$70M）+ Series C（$125M）+ Series D（$100M）——经 SEC Form D 和新闻确认
        - label: 估算 2024E 收入区间
          value: $230M–$460M
          note: 分析师基于会诊量代理估算；未经公司确认——宽区间反映估算不确定性的复合放大
    approximationNotes: >-
      估算收入区间是分析师推导的代理值，基于服务方数量 × 估算会诊频次 × 估算报销费率 × 估算抽成率。四个输入都存在不确定性；这些不确定性的复合放大产生了 $230M–$460M
      的宽区间。已确认指标（估值、服务方数量、保险合作伙伴、累计融资）来自一手来源，置信度高。拿到 Headway 的 NDA 级财务数据后，应更新这些 KPI。
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
