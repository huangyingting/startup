  - id: TE004
    title: 信任 / 质量 / 合规表
    notes: >-
      合规状态来自公开监管来源和 Headway 发布的法律文件。研究日（2026 年 5 月）检查 ONC CHPL 时，Headway 未出现在名单中。SOC 2 和 ISO 27001
      认证状态基于未见公开公告；未披露并不等于确认未认证。42 CFR Part 2 适用性是基于服务提供方专业范围作出的推断。
    columns:
      - 监管要求
      - 范围
      - Headway 状态
      - 证据基础
      - 缺口
    rows:
      - - HIPAA Security Rule（45 CFR 164.302–318）
        - Headway 平台所有静态与传输中的 ePHI，都需要行政、物理和技术保障措施
        - 必需且已确认 —— 隐私政策和服务条款提及 HIPAA 义务；已与供应商签署 BAA
        - HHS HIPAA Security Rule 正文；Headway 隐私政策（headway.co/legal/privacy）和服务条款
        - 未公开第三方 HIPAA 审计结果；未发布 BAA 供应商名单；具体保障措施的落地细节不可得
      - - HIPAA Privacy Rule（45 CFR 164.500–534）
        - 患者对 PHI 的权利、隐私实践通知、允许披露范围、最小必要标准
        - 必需且已确认 —— 已发布隐私政策；患者同意流程嵌入平台开户
        - HHS HIPAA Privacy Rule 正文；Headway 隐私政策（headway.co/legal/privacy）
        - 未独立审阅隐私实践通知文本；患者退出流程未公开记录
      - - 42 CFR Part 2（SAMHSA 药物使用障碍）
        - SUD 治疗记录适用更严格保密要求；披露同意要求高于标准 HIPAA
        - 可能适用 —— Headway 的 provider 网络包括治疗 SUD 共病的治疗师；未见明确公开承认
        - SAMHSA FAQ 和 42 CFR Part 2 监管文本；SAMHSA 心理健康服务文档
        - Headway 未公开说明 42 CFR Part 2 的适用性或合规姿态，构成尽调缺口
      - - ONC Health IT Certification（CHPL，健康 IT 认证）
        - 根据 21st Century Cures Act FHIR 互操作规则，参与 Medicare/Medicaid 项目的 EHR 系统需要 ONC 认证
        - 截至研究日（2026 年 5 月），ONC CHPL 未查到 Headway EHR，未获认证
        - 2026 年 5 月检索 ONC Certified Health IT Product List（CHPL）；ONC 认证项目文档
        - Headway 拓展 Medicare Advantage 和 Medicaid 后，ONC 认证可能变成强制要求；未认证是前瞻合规风险
      - - 州执照核验
        - Headway 上的服务提供方必须持有有效的州专业执照；Headway 为入网资质认证核验并监控执照状态
        - 运营中 —— 执照核验已嵌入 45+ 付款方合同下的入网资质认证流程
        - Headway 服务提供方入驻文档；服务提供方门户 for-providers 页面
        - 未公开记录执照到期的核验频率和自动监控；医疗事故保险核验流程没有细节
    claimRefs:
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
