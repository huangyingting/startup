      - number: '2.5'
        title: 采用约束、证据缺口与反向证据
        blocks:
          - type: paragraph
            body: >
              多项结构性约束限制 Headway 市场采用的速度和经济性；重大证据缺口也影响任何市场规模估计的精度。


              保险资质认证摩擦：每家保险公司 30 天的资质认证流程，是 Headway 试图移除的主要结构性障碍。但在初始入驻阶段，资质认证时间线仍是约束，在提供者注册和首次可计费预约之间形成入驻漏斗缺口。竞争平台 Alma
              和 Grow Therapy 拥有相似的资质认证自动化产品，提升了供给侧市场的竞争强度。


              付款方费率压力：2024 年末，Optum/UnitedHealth 下调了部分 Headway 治疗师的报销费率。该事件说明 Headway 价差模式存在结构性脆弱点：付款方压缩费率时，Headway
              必须吸收压缩、下调提供者付款（冒治疗师退出风险），或退出付款方关系。Medicaid 分层带来更高费率风险：Medicaid 对心理健康治疗的报销显著低于商业费率，历史上限制了提供者参与意愿。BBB
              和提供者评论来源记录了提供者对 Headway 平台账单管理的投诉，这构成额外采用约束，可能拖慢提供者网络增长。


              州级执照碎片化：治疗师按州持证，跨州执业需要单独的州执照。虽然 Headway 覆盖 50 个州，但提供者必须为其服务患者所在的每个州独立维持执照——这是限制任何单个提供者地理扩张的摩擦点。


              心理健康污名和农村可及性：患者侧需求受污名制约（即使有保险，许多 AMI 成年人也不寻求护理），也受地理限制。Headway 的数字优先模式可能难以触达宽带连接不足或远程医疗熟悉度有限的农村欠服务社区。


              证据缺口：没有公开可获取、披露方法论的市场规模报告，把美国保险覆盖的门诊心理健康治疗作为独立类别。本章所有 TAM/SAM 估计均由 NIMH 患病率和 BLS 劳动力数据自下而上构建。CMS
              没有按门诊心理健康、SUD 和住院精神科护理拆分行为健康支出。上述估计应视为数量级指标，而非精确市场规模数字。
