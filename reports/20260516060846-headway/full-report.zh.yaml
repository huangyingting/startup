companyProfile:
  summary: >-
    Headway (TherapyMatch, Inc.) 是美国最大的保险原生心理健康网络。公司 2019 年在 New York City 成立，由 Andrew Adams 及联合创始人创办；Headway
    把阻碍治疗师接受保险的行政环节——资质认证、账单和理赔处理——从治疗师身上拿走，让 34,000+ 名完成认证的提供者能够服务 45+ 个商业保险计划覆盖的患者。公司已服务超过 1 million 名患者，覆盖美国 50 个州和
    Washington DC。Headway 在 Series D（$100M，2024 年 7 月）达到 $2.3B 估值，累计融资约 $321M+。公司拥有 700+ 名员工，并在近期任命 CTO（2025 年 1 月）和
    CMO（2025 年 8 月），正把平台推向 Medicare Advantage 和 Medicaid 扩张。
