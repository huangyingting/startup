      - number: '1.4'
        title: 规模、牵引力与关键绩效指标
        blocks:
          - type: paragraph
            body: >
              以一家成立五年的医疗科技公司衡量，Headway 在 2024 年中至 2026 年初的运营规模已经相当可观。到 2024 年 7 月，提供者网络超过 34,000 名完成认证的心理健康提供者；这意味着
              Series C 后十二个月增长超过 30%（Series C 时为 26,000 名提供者，关联 19 个网内计划）。截至 2024 年 7 月，公司每月承载超过 600,000 次治疗预约，并在 2024 年
              11 月服务第 1 million 名患者。提供者增长显著依靠自然扩散：2023–2024 年期间，超过一半的新提供者来自同行转介绍，显示治疗师社群内有强口碑。


              Headway 自报的患者侧质量指标强：患者净推荐值（NPS）为 93，第二次就诊留存率 90%，患者首次联系后平均 2 天内获得护理。Headway
              的健康计划销售材料将这些指标与典型保险行为健康网络的结果对比，后者通常就医等待更长、留存更低。Headway 还声称可预约时段是典型保险公司网络的 3x，反映 34,000
              名提供者网络在高需求地区聚集带来的密度优势。


              截至 2025 年 4 月，Headway 员工数超过 700 人。Series D（2024 年 7 月）前 12 个月收入翻倍以上，CEO Andrew Adams
              公开表示「公司层面盈利已有清晰可见路径」。公司没有公开经审计财务报表，也未披露精确收入。地理覆盖美国 50 个州和 DC。2025 年的战略扩张包括连接初级保健与心理健康的全国一体化护理方案（2025 年 5
              月推出）、Medicare Advantage 和 Medicaid 网络扩张（2024 年 7 月宣布，持续推进），以及 AI 辅助 EHR 扩展（2025 年 9 月宣布）。
