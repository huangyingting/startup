      - number: '4.6'
        title: 附录
        blocks:
          - type: callout
            title: 按服务收费收入模型，让平台增长与收入确认形成结构性一致
            body: >-
              从质量看，Headway 的管理费模型结构上优于订阅收入：只有 session
              真正交付，公司才赚到收入，平台无法从沉睡或不活跃服务方身上确认收入。这种一致性自然激励平台最大化服务方利用率和患者可及性——照护交付越多，Headway
              赚得越多。没有订阅收入也意味着服务方侧没有递延收入或流失风险；服务方不活跃只会降低 GMV，而不会产生退还预付费的义务。对 payer 而言，该模型让 Headway
              的经济性完全随网络利用率变动；在网络充足性合同中，payer 为可访问的活跃、已认证服务方池付费，这一点有利。
            calloutType: strength
            claimRefs:
              - CI003
              - CI008
              - CI039
              - CI043
          - type: callout
            title: Payer 集中度与降费风险：Optum 先例说明利润率可被单方面压缩
            body: >-
              Headway 的收入模型完全依赖保险 payer 在现有合同下维持有利报销率。2024 年底 UnitedHealth/Optum 事件中，Optum 单方面下调包括 Headway
              在内的数字心理健康平台治疗师费率，说明 payer 可以在没有公开披露、投资者也看不到的情况下压缩 Headway 单次 session 经济性。Headway 有 45+ 份 payer
              合同，但没有公开收入集中度数据；外部无法判断一两家大型 payer 是否占总 GMV 的过高比例。任何主要 payer（UnitedHealth、Aetna 或
              Cigna）重新谈判费率或不续约，都可能在没有预警的情况下显著削减收入。这是公开证据中识别出的 Headway 首要财务风险。
            calloutType: risk
            claimRefs:
              - CI026
              - CI028
              - CI027
              - CI006
          - type: callout
            title: 本章所有收入和 GMV 数字均为分析师估算，不是公司确认数据
            body: >-
              本章给出的 $150M–$300M 收入区间和 $1.5B–$2.0B GMV 区间，来自自下而上的代理计算（34,000 名服务方 × 估算 session 频次 × 估算报销率 ×
              估算抽成率），代表情景而非预测。每个输入都高度不确定：每名服务方的 session 吞吐量未确认，45+ 家 payer 的混合报销率未知，任何 payer
              特定调整后的有效抽成率也属私有信息。低置信度输入层层相乘，最终给出很宽的区间。投资者若用这些估算建估值模型，需要自担风险；任何投资决定前，都应在 NDA 下取得经确认的收入。
            calloutType: assumption
            claimRefs:
              - CI011
              - CI012
              - CI013
              - CI014
          - type: callout
            title: Series D 估值为估算收入的 7x–19x，意味着显著增长溢价；收入确认后区间会收窄
            body: >-
              按 $2.3B 投后估值和 $150M–$300M 的估算收入区间，Headway 的隐含估值倍数为估算收入的 7x–19x。这个宽区间直接来自私营公司信息不透明，而不是内在估值含糊。作为参照，公开交易的行为健康
              SaaS 和 marketplace 企业通常按经确认收入的 4x–12x 交易。如果 Headway 实际收入位于区间高端（$300M），7x
              倍数对市场领先、快速增长的保险基础设施平台而言合理。如果实际收入位于低端（$150M），15x+ 倍数意味着市场已经计入显著未来增长，且必须由经确认的单位经济性支撑。这就是为什么经审计财务披露是投资前提。
            calloutType: insight
            claimRefs:
              - CI021
              - CI022
              - CI012
              - CI013
          - type: callout
            title: 推进尽调前要求 NDA 级别财务披露：五项优先数据请求
            body: >-
              鉴于财务信息普遍不透明，如果拿不到 NDA 级别数据室访问权，尽调不应越过公开信息阶段。五项优先请求：（1）FY2023 和 FY2024
              经审计收入与毛利率；（2）过去三个月月度烧钱速度和当前现金余额；（3）按获客渠道拆分的服务方 LTV 与混合 CAC；（4）按 payer 拆分的收入集中度——尤其是前五大 payer 占总收入比例；（5）前三大
              payer 关系的合同期限、续约条款和终止条款。Optum 降费事件让 payer 集中度和合同条款请求尤其紧急。
            calloutType: recommendation
            claimRefs:
              - CI030
              - CI031
              - CI032
              - CI028
              - CI034
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品概览与模块架构
        blocks:
          - type: paragraph
            body: >
              Headway 的核心产品是一体化平台，把基于保险的心理健康执业中的行政负担，压进一个面向服务方的界面。底层是 Provider Portal——治疗师用它管理患者排期、临床文档、保险账单和付款跟踪。到 2025
              年 9 月，Headway 推出原生 AI 辅助 EHR，成为较早一批直接把专门的临床文档工具嵌入账单工作流的心理健康网络之一，而不是要求服务方使用第三方 EHR 系统。这种「保险原生
              EHR」路径是有意义的结构性差异点：Headway 不是把独立 EHR 接到另一套账单工具上，而是在同一界面呈现临床笔记和保险理赔提交，减少行政切换，也降低手工转移数据带来的账单错误风险。


              患者侧，平台提供识别保险的治疗师匹配和预约体验。患者输入保险计划后，会看到经过筛选的服务方列表：这些服务方既接受该计划，也有可预约时段。这个工作流解决了心理健康可及性中的一个主要摩擦点。自动保险账单模块通过与
              45+ 家 payer 的集团账单安排提交理赔，并代表服务方处理资质认证、资格核验和理赔生命周期管理。


              Telehealth 视频 session 原生嵌入，服务方无需使用外部视频平台，同时保持 HIPAA 合规交付。面向精神科医生和执业护士的 prescriber
              模块正在积极扩张，把平台从治疗师延伸到会在综合心理健康照护计划中开具药物的临床人员。截至 2024 年 7 月 Series D 公告，Headway 网络覆盖 50 个州和 DC 的 34,000+
              名服务方，拥有 45+ 份保险合作和每月超过 600,000 次预约。
