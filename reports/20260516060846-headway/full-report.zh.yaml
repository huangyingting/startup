            title: 保险赋能治疗市场正在融合：Headway 必须在差异化被侵蚀前，沿价值链上移
            body: >-
              心理健康治疗市场正在发生结构性收敛：面向雇主 EAP 的公司（Spring Health、Lyra）在补保险整合能力（通过收购 Alma），而保险网络公司（Headway、Grow）在补 EHR
              和照护协调工具。随着收敛推进，当前竞争基础（保险网络 vs. 雇主 EAP）会被削弱。Headway
              能否形成持久差异化，取决于它能否沿价值链上移——沉淀更深的临床结果数据、搭好政府计划合规基础设施、跑通预测式患者-服务方匹配——赶在 Grow Therapy 更广的 payer 数量和 Spring
              Health 双渠道模式追上之前。
