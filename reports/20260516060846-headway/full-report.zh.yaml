  - id: TM004
    title: 增长驱动因素与约束表
    description: >-
      Key forces driving and constraining adoption of insurance-covered mental health therapy and Headway's market
      expansion.
    columns:
      - 驱动因素 / 约束
      - 方向
      - 类别
      - 时间
      - 对 Headway 的影响
      - 尽调问题
    rows:
      - - COVID 后心理健康需求激增
        - 顺风
        - 需求 / 人口结构
        - 2020 年至今；结构性
        - AMI 患病率维持高位（尤其 18–25 岁群体达 36.2%），不用追加营销支出也能支撑治疗需求增长
        - 验证疫情后需求率会回归常态还是继续高位；跟踪 SAMHSA 年度调查趋势
      - - MHPAEA 执法与心理健康平价监管
        - 顺风
        - 监管
        - 2008 年至今；HHS 执法加速
        - 迫使保险公司扩张行为健康服务者网络，为 Headway 的网络解决方案创造结构性需求
        - 跟踪州总检察长的平价执法行动；监测 HHS 年度平价报告合规率
      - - ACA 基本健康福利扩张
        - 顺风
        - 监管
        - 2010 年至今
        - 扩大心理健康的有保险患者池；更多有保险患者寻找网内治疗师
        - 监测 ACA 市场参保人数和心理健康使用率
      - - Medicare Advantage + Medicaid 扩张（100M 美国人）
        - 顺风
        - 监管 / 市场扩张
        - 2024 年（MA 目标）；2025 年（Medicaid 目标）
        - 如果政府计划报销费率足以支撑服务者参与，Headway 的可寻址市场可能翻倍
        - 验证 MA 各州推进时间表；确认 Medicaid 报销费率相对商业险的水平；评估服务者接受 Medicaid 费率的意愿
      - - BLS 预计心理健康咨询师队伍增长 17%（2024–2034）
        - 顺风
        - 供给 / 劳动力
        - 2024–2034
        - 更大的持牌咨询师供给每年扩张 Headway 的潜在服务者基数
        - 监测执照毕业率；评估新毕业生中有多少会选择接保险的执业模式
      - - COVID 后远程医疗常态化
        - 顺风
        - 技术 / 监管
        - 2020 年至今；许多辖区已永久化
        - Headway 的地理覆盖不再受限于城市服务者密集市场；可做全国治疗师匹配
        - 跟踪 2025 年 PHE 豁免之后 CMS 对心理健康远程医疗报销平价政策
      - - 70% 治疗师拒收保险率（结构性摩擦）
        - 逆风 → 机会
        - 市场结构
        - 持续；随着 Headway 扩张而下降
        - 这道结构性障碍正是 Headway 的核心价值主张——把它消除后，现金支付治疗师就能转成接保险的网络成员
        - 验证 70% 数字是否在下降；评估 Headway 资质认证自动化提升后，转化速度有多快
      - - 保险资质认证延迟（每家保险 30 天）
        - 逆风
        - 运营 / 结构性
        - 持续
        - 服务者从注册到首次可计费预约之间存在漏斗缺口；Headway 必须为每名服务者处理 30 天 × 多家保险的资质认证
        - 对标 Headway 从注册到首次预约的平均耗时与 Alma、Grow Therapy、Lyra Health 的差距
      - - 支付方费率压力（Optum 2024 年降费）
        - 逆风
        - 竞争 / 财务
        - 2024 年至今
        - 支付方对费率的议价权会压缩 Headway 的价差模式；Medicaid 费率显著低于商业险
