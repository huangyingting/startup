      - number: '1.3'
        title: 融资形成、估值与投资者基础
        blocks:
          - type: paragraph
            body: >
              Headway 自成立以来已完成五轮可识别融资，累计超过 $321 million，并在 2024 年 7 月的 Series D 达到 $2.3 billion 估值。其融资节奏值得注意：Headway 在
              2023 年 10 月的 Series C 达到独角兽地位（估值 $1B+），随后不到九个月就在 Series D 将估值翻倍以上至 $2.3 billion。不到一年估值跃升
              130%，反映出强劲运营动能：提供者网络增长超过 30%，收入在十二个月内翻倍以上，CEO 也给出公司层面盈利可见性的指引。


              融资序列始于 Accel 领投、GFC 和 IA Ventures 参投的种子轮。公开披露的 $26 million Series A（2020 年 11 月，由 Thrive Capital 和 GV
              共同领投）标志着 Headway 公开发布产品并获得首次重要媒体关注。约六个月后的 2021 年，$70 million Series B 接续而来，Andreessen Horowitz (a16z) 于
              2021 年 5 月宣布投资。$125 million Series C（2023 年 10 月）把 Headway 推过独角兽门槛。$100 million Series D 由新投资方 Spark
              Capital 领投，既有投资方 Thrive Capital、Accel、a16z 以及首次投资方 Forerunner Ventures 参投。


              Headway 的投资者基础完全由机构风险资本构成——未发现战略或企业风险投资方，也未公开披露任何债务或信贷安排。投资者组合覆盖早期通用型 VC（Accel、GV、IA Ventures）、成长阶段消费 /
              健康科技专家（Thrive Capital、a16z、Forerunner Ventures）以及后期成长股权投资方（Spark Capital）。作为私营公司，Headway
              的经审计财务数据、董事会构成和股权结构表均未公开。
