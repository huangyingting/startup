        blocks:
          - type: paragraph
            body: >
              Headway 的成本结构主要由四类构成：平台工程、保险资质认证与 payer 签约、服务方获客与入驻、客户支持运营。作为受监管行业里的 marketplace 中介，Headway
              没有实物库存或制造成本，但维护 45+ 家保险 payer 关系、确保 34,000+
              个服务方账户的理赔处理准确，会带来显著的持续合规费用。资质认证成本具备半固定特征：随着行政工作流成熟，新增服务方入驻的边际成本下降；但特定 payer
              的资质认证审计和资质到期后的重新验证，会持续形成按服务方计的成本。


              服务方获客成本部分由自然推荐机制补贴：公司说法显示，超过 50% 的新服务方来自现有 Headway 服务方推荐，意味着新增供给入驻的混合 CAC 低于市场水平。不过，2020–2024 年服务方数量约 34x
              增长（从约 1,000 到 34,000+），仍需要在主动服务方营销和入驻支持上投入大量资金。2024 年 7 月宣布的 Medicare Advantage 和 Medicaid
              扩张，会引入结构性更高的合规成本：政府计划账单需要额外资质认证步骤、针对政府受益人的 HIPAA 合规数据处理，以及 CMS 网络充足性文件；这些成本短期内不太可能被增量 session
              量抵消。毛利率结构未公开披露；对基础设施开销相近的 marketplace 式业务，毛利率通常在 40–70%，但 Headway 的监管合规强度和 payer 签约深度可能压低结构性上限。美国心理健康市场每年
              $280B+ 支出和 59M+ 患有心理疾病的成年人，为需求提供结构支撑；但服务政府计划人群的单笔理赔成本明显高于商业保险。
            claimRefs:
