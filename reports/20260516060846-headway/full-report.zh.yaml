      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Headway 的运营风险画像主要由网络安全、平台可靠性和 AI 生成临床文档带来的责任构成。医疗平台是美国勒索软件事件中最常被攻击的行业。若 Headway 的 EHR 或账单基础设施被成功攻击，34,000+
              名服务方的工作流会停摆，超过 1 million 名患者的受保护健康信息会被危及，并触发 45 CFR 164.400–164.414 下强制 HHS OCR 泄露通知。Headway 未公开披露 SOC 2
              Type II 或 ISO 27001 等任何网络安全认证，也未披露审计计划或渗透测试结果。缺少公开披露本身就是信号，因为同等规模医疗平台通常会发布信任文档，以满足 payer 尽调要求。


              平台可靠性是第二项重大运营风险。Headway 没有为服务方门户或账单系统发布任何 uptime 服务级别协议。鉴于 Headway 是许多服务方的主要甚至唯一账单基础设施，工作时间内的计划外宕机会直接打断
              session 收入，并放大 Trustpilot 和 BBB 投诉中已经记录的服务方不满。


              2025 年 9 月推出 AI 辅助 SOAP note 生成，引入了新的责任向量。AI
              生成笔记中的临床文档错误——事实不准确、遗漏诊断或输出带偏见——可能在临床审计或法律程序中形成责任敞口。单个服务方仍对自身临床文档准确性承担专业责任，但如果 AI 工具系统性产出有缺陷的结果，Headway
              作为平台供应商也有潜在敞口。公开渠道没有披露 Headway 的 AI 准确性基准、临床验证方法，或服务方合同中的赔偿条款。数据驻留和 42 CFR Part 2 控制要求在标准 HIPAA
              之外增加平台特定合规层；Headway 平台尚未公开记录这些层。
