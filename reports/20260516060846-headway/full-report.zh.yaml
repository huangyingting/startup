  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价架构
        blocks:
          - type: paragraph
            body: >
              Headway 采用纯中介收入模型：平台处理每笔保险报销后，保留大约 10–15% 的管理费；只有可计费治疗 session 真正交付，公司才确认收入。服务方不付月度订阅费——他们免费加入 Headway
              网络，Headway 代为处理资质认证、账单提交和保险合同。患者直接支付标准保险 copay 或 deductible；Headway 收取保险报销总额（门诊单次 session 通常为
              $150–200）与支付给服务方净额之间的差额。这种按服务收费结构意味着收入在照护交付时确认，而不是在服务方入驻或合同签署时确认；从收入质量看，这是有利特征，也让平台激励与患者可及性、服务方利用率对齐。


              Headway 与 45+ 家保险 payer 签约，并通过集团账单安排提交理赔，把服务方账单信用打包起来，也简化了单个服务方的理赔提交流程。作为对照，SimplePractice 不管 session
              量，向服务方收取每月 $49–$99 的固定订阅费；这是结构完全不同的模式，不从照护交付本身获得收入。Headway 按比例抽成，使收入上限绑定 session 报销率和 payer 合同条款；任何 payer
              推动的费率压缩，都会直接压低单次 session 经济性。收入组合主要来自 45+ 家签约 payer 下的商业保险 session；2024 年 7 月宣布的 Medicare Advantage 和
              Medicaid 扩张，是增量收入来源，但报销费率结构不同，合规开销也更高。面向 health plan 的营销页提到平台或技术授权费，但尚未确认其作为单独收入流，也没有披露经济性。
