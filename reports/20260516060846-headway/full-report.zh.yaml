  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买方类型
        blocks:
          - type: paragraph
            body: >
              Headway 是一个三边 marketplace，每个客户分层在心理健康照护交付链条中承担不同角色。第一也是最大的分层，是持证心理健康服务方——治疗师、心理学家、licensed clinical social
              workers（LCSWs）、licensed professional counselors（LPCs）、licensed marriage and family
              therapists（LMFTs）、精神科执业护士和精神科医生。这些服务方是 marketplace 的供给侧，零成本入驻
              Headway，以获得自动保险资质认证、账单、排期和付款基础设施。主导子分层是独立或小型团体执业治疗师，他们过去因为行政复杂度而回避保险账单。Headway
              完全移除这个障碍，让加入网络的价值主张很具体；一旦资质认证和患者关系建立，离开的切换成本也变得有意义。


              第二个分层，是通过商业健康保险寻求心理健康治疗的个人患者。Headway
              面向患者的产品（headway.co/providers）是一个识别保险的治疗师搜索和预约平台。患者输入保险计划后，会匹配到有空档的网络内服务方。Headway 没有自费选项——平台只做保险，这让它与
              Psychology Today 等同时列出网络内和现金支付选项的竞争对手根本不同。这一结构选择把可触达患者人群收窄到已投保个人，但对符合条件者而言，它消除了成本障碍。


              第三个分层，是商业健康保险 payer。Payer 与 Headway 签约，获得其行为健康服务方网络，从而比自行搭建或招聘人员更快地为会员提供心理健康照护。截至 2024 年，Headway 有 45+ 份
              payer 合作。联邦 Mental Health Parity and Addiction Equity Act（MHPAEA）创造了监管需求，要求 payer
              提供与医疗福利同等水平的心理健康福利；对希望合规但不想自建内部能力的计划而言，Headway 的外包网络越来越有价值。第四个早期分层——Medicare Advantage 和 Medicaid managed
              care plans——已作为 Series D 扩张目标宣布，但尚未确认进入运营。


              三边模型形成相互依赖，同时放大增长和风险。服务方供给推动患者可及性，患者可及性推动 payer 需求。任何服务方满意度恶化（Trustpilot 和 BBB
              投诉数据已有反映）都可能降低网络密度，限制患者可及性，并削弱 payer 价值。
