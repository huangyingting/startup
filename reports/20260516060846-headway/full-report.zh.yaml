      - number: '4.2'
        title: 单位经济性代理指标
        blocks:
          - type: paragraph
            body: >
              Headway 是私营公司，尚未公开披露经确认的收入、毛利率或客户层面单位经济性数据。以下估算完全来自分析师推断和公开代理指标；它们是示意性区间，不是已验证指标，在任何投资模型中都应明确标注。


              截至 2024 年 7 月 Series D 公告，Headway 称平台上有 34,000+ 名服务方。按接受保险的治疗师行业平均频次估算，每人每月约 20–25 次 session，对应每月 session
              量约 680,000–850,000 次。门诊治疗单次 session 平均保险报销 $150–200——与汇总服务方目录数据和 BLS 职业工资基准一致——意味着估计年商品交易总额（GMV）约为
              $1.5B–$2.0B。把 Headway 所称约 10–15% 的管理费抽成率套用到该 GMV 估算，可推导出约 $150M–$300M 的年化管理费收入。


              这些估算依赖几项未经验证的假设：每名服务方的实际 session 吞吐量（如果许多服务方只维护很薄的 patient panel，可能低于行业平均）、payer 组合下的实际混合报销率，以及与大型 payer
              存在任何量折扣安排后的有效抽成率。服务方 LTV、混合 CAC 和流失率均未披露。公司报告的患者 NPS 为 93、第二次就诊留存率为 90%，可作为需求侧粘性指标引用，但未经审计，也未获独立验证。Headway
              官网提到每月预约超过 600,000 次，与分析师估算区间低端方向一致。
