      - number: '2.2'
        title: 市场规模测算——多镜头方法
        blocks:
          - type: paragraph
            body: >
              目前没有公开可获取的第三方市场规模报告，将「美国保险覆盖的门诊心理健康治疗」作为独立市场类别并披露方法论。本分析采用三个独立测算镜头，并透明保留相互矛盾的估计和证据缺口。由于治疗支出数据具有私有性，所有自下而上估计的置信度都较低。


              镜头 1——基于患病率的自下而上 TAM：NIMH 报告称，2022 年有 59.3 million 名美国成年人（23.1%）患有任一心理疾病（AMI），其中 30.0 million
              人（50.6%）接受了心理健康治疗。按每名受治患者每年估计 $2,000——大约 10–15 次治疗、每次 $100–$200，符合门诊治疗常态——可得理论 TAM 约 $60B（仅已治疗患者）至
              $118B（若全部 AMI 成年人都接受护理）。置信度低：人均支出数字是假设，不是已发表统计。该镜头也混同了充分治疗和最低限度治疗的患者。


              镜头 2——供给侧 BLS 估计：BLS 报告称，2024 年美国有 483,500 名物质滥用、行为障碍和心理健康咨询师就业。按每名咨询师年均收入估计 $200,000（全职执业的粗略近似）计算，供给侧 TAM
              约为 $97 billion。该估计非常粗糙，包含 SUD 咨询师、学校咨询师以及不在 Headway 网络内的从业者。置信度低。


              镜头 3——保险覆盖 SAM：在接受治疗的 30 million 名 AMI 成年人中，估计约 60% 使用保险支付门诊治疗，对应每年约 18 million 名参保治疗患者。按每名患者每年估计
              $1,800（12 次、平均 $150）计算，SAM 约为 $32 billion。另一个来自供给侧的 SAM——对 $97B 供给侧 TAM 套用 60% 保险占比——约为 $58
              billion。两者均为低置信度估计。


              Headway 的可获取市场（SOM）指标来自其每月 600,000 次预约：按 12 个月计算，即每年约 7.2 million 次预约。每次预约按估计 $20–$40 平台价差计算，年收入区间为
              $144M–$288M。Headway 未披露收入；价差数字也不公开。置信度非常低。Headway 的 34,000 名提供者约占 2024 年美国 483,500 名心理健康咨询师总数的 7%。


              2023 年美国全国医疗卫生支出总额约为 $4.9 trillion（CMS）。行为健康是一个重要子项，但 CMS 没有以公开可获取格式把门诊心理健康治疗从整体行为健康支出中拆分出来。
