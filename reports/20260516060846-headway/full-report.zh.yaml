      - number: '4.5'
        title: 私营公司财务缺口与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              Headway 是私营公司，没有公开报告义务；因此，公开渠道无法获得经审计的利润表、资产负债表或现金流量表。这是承销 Headway
              财务表现时最重要的障碍。公开来源完全拿不到的关键财务指标包括年收入或年经常性收入（ARR）、毛利率和 EBITDA、月度烧钱速度、账上现金、按月计现金跑道、服务方 LTV、混合 CAC，以及按 payer
              拆分的收入。任何 Headway 财务模型都必须依赖第 2 节中分析师推导的代理估算——并明确标注为示意性区间——或只能在 NDA 下获得的未披露公司数据。


              尽管信息不透明，公开证据拼出的结构性财务图景仍然连贯：从主要风险投资方融资 $321M+，估值持续上升；牵引力指标强（34,000+ 名服务方、45+ 份 payer 合同、公司官网提到每月约 600,000
              次预约）；市场也受保险平权要求和疫情后心理健康需求的结构性顺风推动。财务结论是有条件正面，支持继续尽调：收入模型具备较好的质量特征（按服务收费、激励一致、没有受流失影响的订阅收入风险），资本结构未识别债务，Series
              D 延长了现金跑道。但如果没有经审计财务、经确认的 CAC/LTV 拆分、payer 收入集中度数据和 burn-to-ARR 比率，尽调文件仍不完整。投资者在做出任何投资决定前，必须要求在 NDA
              下完整披露财务。2024 年底 Optum 降费事件是一个运营数据点，说明 payer 杠杆可以在缺乏公开可见性的情况下压缩利润率。
            claimRefs:
              - CI028
              - CI030
              - CI031
              - CI032
