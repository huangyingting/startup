  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险清单
        blocks:
          - type: paragraph
            body: >
              Headway 处在多个联邦监管框架交叠的位置，账单、数据隐私和劳动力结构都叠加出多层合规风险。近期最重要的监管事件是 MHPAEA 2024 Final Rule，由 Departments of
              Labor、HHS 和 Treasury 于 2024 年 9 月最终确定。根据该规则，健康计划必须开展并记录严格的比较分析，证明心理健康和物质使用障碍福利与医疗和外科福利之间实现平等。Headway
              面临两种可能的反向结果：payer 可能从底部实现平等，收紧心理健康福利慷慨度，从而减少 session 量；也可能把增加的合规成本向下传导，以降低对网络运营方的报销。


              HIPAA 合规是贯穿 Security Rule（45 CFR 164.302–164.318）和 Privacy Rule（45 CFR 164.500–164.534）的持续义务。Headway 为
              34,000+ 名服务方和 1 million 名患者处理电子受保护健康信息，是高价值数据泄露目标。OCR 对可比医疗平台的执法中，单个违规类别的民事罚款最高已达 $1.9 million。FTC 2023 年对
              BetterHelp 的执法行动——因向 Facebook 和 Snapchat 分享敏感心理健康数据达成 $7.8 million 和解——之后，Headway 隐私政策中的数据分享条款需要持续接受法律审查。


              SAMHSA 的 42 CFR Part 2 规定，对物质使用障碍记录施加高于标准 HIPAA 的保密要求。如果任何 Headway 托管服务方治疗 SUD 患者，平台就需要超出基线隐私基础设施的同意控制。DOL
              2024 年独立承包商分类最终规则收紧了经济现实测试，提高了 Headway 34,000+ 名服务方可能被重新分类为员工的法律风险；一旦发生，成本模型会被根本重构。各州 telehealth 法律在 50
              个司法辖区差异很大，涉及处方、audio-only 平权要求和跨州执照等不同规则。PSYPACT 便利多州心理学执业，但不覆盖治疗师、LCSW 或 LPC。
