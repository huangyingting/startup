      - number: '7.4'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >
              Headway 的财务风险主要落在资本充足性、收入模型集中度，以及政府项目扩张的经济性上。已披露融资总额为 $321 million，最近一轮是 2024 年 7 月完成的 $100 million Series
              D，投后估值 $2.3 billion。月度烧钱速度未公开，但在 700+ 名员工、且采用中等规模技术赋能医疗服务模式的情况下，估计年运营烧钱为 $40–80 million。这意味着从 Series D
              完成时算起，保守情景下现金跑道约 15–30 个月——也就是 2026 年底前需要 Series E，或产生显著收入盈余。


              收入模型集中是结构性脆弱点。Headway 的收入完全来自保险覆盖就诊中，付款方报销费率与服务提供者支付费率之间的价差。公司没有披露自费收入、订阅收入或软件授权收入，无法缓冲付款方费率波动。2024 年 11 月
              Optum 降价先例确认，付款方主动压缩利润率是正在发生的行业风险。任何系统性付款方降价，都会直接压低 Headway 每次就诊收费，而运营成本不会相应下降。


              Series D 增长目标中宣布的 Medicare Advantage 和 Medicaid 扩张，会带来收入质量取舍。Medicaid 行为健康报销费率通常比商业保险低 20–40%。如果 Headway
              把相当一部分就诊量迁移到 Medicaid 覆盖患者，混合每次就诊收入会下降；即使商业费率没有下调，每次就诊利润率也会被压缩。这一取舍对财务模型的影响尚未公开披露，截至 2026 年 Q1
              也没有确认任何政府项目已经运营上线。
