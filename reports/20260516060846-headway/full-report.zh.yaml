  - id: TV005
    title: 打破论点与终止触发因素
    tableType: comparison
    columns:
      - 触发因素
      - 条件
      - 概率估算
      - 投资含义
      - 监测指标
    rows:
      - - 影响 10,000+ 名患者的 HIPAA 泄露
        - 患者健康信息发生已确认的大规模泄露，触发 HHS 执法、服务者出走和患者信任崩塌
        - 低（5–10%）：截至 2026 年 5 月没有已确认泄露；HIPAA 合规未获独立公开审计
        - 立即暂停投资；可能对付款方、服务者和患者承担责任；监管罚款和声誉损害
        - ONC 行为健康 IT 合规报告；HHS 泄露通知门户；SOC 2 审计可获得性
      - - 主要付款方退出 Headway 网络（UnitedHealth 或 BCBS）
        - 按估算咨询量排前二的商业付款方之一终止或不续约 Headway 网络合同
        - 低-中（10–15%）：Optum 2024 年费率下调显示付款方杠杆；完整网络退出尚未发生
        - 修订为熊市情景；收入影响 15–30%，取决于付款方集中度；可能引发服务者流失级联
        - Headway 付款方目录更新；合同争议新闻报道；BCBS 或 UnitedHealth 网络充足性申报
      - - 服务者被重新归类为员工
        - FTC、DOL 或州级劳动主管机关认定 Headway 服务者关系构成雇佣，而非独立承包商关系
        - 中低（8–12%）：FTC 已审查可比零工平台；行为健康承包商分类在全美受到审视
        - 商业模式会被根本性打断；平台将承担福利、工资税和劳动法合规成本，利润率可能被吃掉
        - FTC 对数字健康的执法行动；州劳工委员会关于治疗师分类的裁定；National Academies 劳动力报告结论
      - - 服务提供方 NPS 持续低于 50，或服务提供方年流失率高于 20%
        - 独立调查或媒体报道证实，服务提供方不满指标低于网络健康的最低可行阈值
        - 中低（10%）：Trustpilot 3.6/5 评分和门户体验受挫报告是早期预警信号；系统性 NPS 未公开跟踪
        - 网络效应飞轮反转；服务提供方数量下降会削弱付款方合同续约和患者可及性承诺
        - Trustpilot 和 Google 评论（持续）；治疗师社区论坛情绪；American Psychological Association 劳动力调查
      - - 监管执法行动（FTC 或 DOL）
        - FTC 或 DOL 因账单实践、服务提供方分类或数据隐私对 TherapyMatch Inc. 直接采取执法行动
        - 低（5–8%）：截至 2026 年 5 月未确认执法行动；Cerebral 先例说明行业层面的监管风险真实存在
        - 投资人会立即复核；估值可能重置；可类比 Cerebral 在 2022–2023 年因监管冲击跌出独角兽行列
        - FTC 执法跟踪器；DOL 独立承包商规则制定；CMS 针对 Medicare/Medicaid 账单的审计通知
    notes: >-
      所有概率估计都是基于截至 2026 年 5 月公开证据的定性判断，并非精算估计。Optum 降价先例让付款方退出触发项的概率高于朴素基线。Cerebral
      的警示案例说明，行为健康监管风险覆盖全行业，并非公司特有，应该主动监测。每个监测指标都对应一个公开可观察信号，一旦触发就应启动尽调复核。任意两个或更多触发项同时出现，无论单项概率如何，都构成强烈卖出信号。
    claimRefs:
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
  - id: TV006
    title: 最终尽调问题
    tableType: comparison
    columns:
      - 问题
      - 优先级
      - 理由
      - 影响
      - 状态
    rows:
      - - 经审计的 FY2023 和 FY2024 收入及 EBITDA
        - 关键
        - 收入确认是最高优先级事项：它能把隐含 5–10x 倍数区间压缩成精确数字，并支撑完整估值承销
        - 将验证或挑战 $2.3B Series D 估值；若收入低于 $200M，隐含倍数超过 11x，需要重新评估
        - 待解决——未公开披露；需要 NDA 和投资人数据室访问权限
      - - 服务提供方流失和 NPS 数据（过去 12 个月）
        - 高
        - 网络效应飞轮假设依赖服务提供方留存；Trustpilot 3.6/5 的负面信号和门户体验受挫报告需要直接反证
        - 服务提供方高流失（年化 >20%）会削弱网络护城河假设，并降低付款方合同议价力
        - 待解决——未公开披露；需要 NDA 数据室访问权限和服务提供方 cohort 分析
      - - 前 5 大付款方的合同条款和续约日期
        - 高
        - Optum 2024 年降价显示付款方拥有单边议价力；必须量化付款方集中度，并评估合同保护
        - 如果前 3 大付款方贡献 >60% 收入，付款方集中风险会把熊案概率抬高到 25%+
        - 待解决——合同条款保密；需要 NDA；付款方目录数量（45+）公开，但收入集中度不公开
      - - Burn rate 和 runway（最近 3 个月及未来 12 个月预测）
        - 高
        - Series D 于 2024 年 7 月完成，至今已过 10 个月；评估扩张计划的资本充足性，需要 burn rate 和 runway
        - Burn rate 若高于 $15M/月，将意味着 runway 低于 18 个月；届时后续融资或过桥融资会迫在眉睫
        - 待解决——未公开披露；需要 NDA 和 CFO 认证的现金头寸
      - - 股权结构和优先权堆栈
        - 中
        - 公司已融资 $321M+，多轮投资人包括 a16z、Spark Capital、GV 和 Accel；优先权堆栈和清算瀑布决定不同退出倍数下的实际回报
        - 沉重的优先权包袱（例如早期轮次 2x+ 清算优先权）可能在退出倍数低于 3x 时压缩普通股回报
        - 待解决——私有信息；需要 NDA；SEC Form D 确认 Series D 有 9 名投资人，但未披露优先权条款
      - - HIPAA 合规审计和 SOC 2 Type II 报告
        - 中
        - 处理 34,000+ 名服务提供方和每月 600,000+ 次患者会诊的 PHI，会带来重大 HIPAA 责任；SOC 2 Type II 用于确认安全控制
        - 若确认存在 HIPAA 缺口或缺少 SOC 2 报告，数据泄露情景的否决触发概率会升高，也可能违反付款方合同要求
        - 待解决——未公开可得；ONC 行为健康 IT 指南提供框架，但仍需要公司层面的审计
    notes: >-
      优先级定义：关键（未解决则投资不能推进）、高（term sheet 前必须解决）、中（最终承诺前必须解决）。截至 2026 年 5 月，受 Headway
      私营公司身份限制，六项尽调问题均未解决。有条件买入建议明确以所有关键和高优先级事项达到各自阈值为前提。中优先级事项应在最终承诺前处理，但不会单独阻断 term sheet。
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
