        - $350M（分析师估算；假设增长 20–25%，报销稳定，商业组合占主导）
        - $200M（分析师估算；假设付款方费率下调使单次咨询经济性下降 15–20%）
        - 低 — 所有 2026 年收入估算均为分析师推导代理值；没有已确认 2024 年基线可锚定增长
      - - 2028E 收入
        - $900M+（分析师估算；假设全国覆盖、政府项目量、服务者网络达到 60K+）
        - $600M（分析师估算；假设稳步增长，竞争压力限制市场份额提升）
        - $180M（分析师估算；假设付款方压力持续、服务者流失且无恢复）
        - 低 — 2028 年估算在未确认 2024 年基线基础上叠加多年增长假设
      - - 退出估值区间
        - $6B–$8B（以 2028 年收入 8–10x 进行 IPO 或战略收购；行为健康市场领导者）
        - $3B–$4.5B（大型保险公司或 EHR 平台以 2028 年收入 5–7x 进行战略并购）
        - $800M–$1.5B（以压缩后收入 4–5x 进行困境出售或被迫合并）
        - 中 — 可比退出估值锚定 Lyra（$5.58B）、Spring Health 独角兽、Oscar Health（上市 $2.4B）
      - - 关键假设
        - 全国服务者覆盖、Medicare/Medicaid 利润率增厚、付款方合同稳定、无重大监管冲击
        - 商业增长延续、Medicare/Medicaid 利润率中性，一两次付款方费率重谈被吸收
        - 主要付款方合同流失或持续费率压缩、服务者流失加速、以降价轮融资
        - 中 — 假设可从公开证据获得方向性支持，但未被量化确认
      - - 下行触发因素
        - 牛市情景没有具体下行触发因素；风险是增长停滞导致机会成本
        - 前两大付款方集中度超过 40% 会带来脆弱性；任何不续约都会触发下调至熊市
        - UnitedHealth/BCBS 合同不续约，或 FTC 针对服务者分类或账单实践采取执法行动
        - 高 — Optum 2024 年事件是付款方驱动触发因素的已确认证据；FTC 风险在可比案例中已有记录
    notes: >-
      本表所有收入估算都是分析师根据服务者数量、估算咨询量、报销费率和抽成率假设推导的代理值。没有公开可得的已确认收入基线。情景概率：牛市 40%、基准 45%、熊市 15%，合计 100%。风险加权预期退出估值约 $4.0B，约为
      $2.3B Series D 进入标记估值的 1.7x。退出估值是情景区间，不是点估计；实际结果取决于退出时点、市场条件，以及退出时收购方 / IPO 市场动态。
