      - number: '1.5'
        title: 关键里程碑与不利事件
        blocks:
          - type: paragraph
            body: >
              Headway 从成立到 2026 年的轨迹可分为三个阶段：隐身与创立（2019 年）、公开发布与 Series A/B 加速（2020–2021 年）、全国化规模、独角兽地位与产品扩张（2022–2026
              年）。每轮融资都伴随一次重要运营跃迁：Series A 对应公开产品发布，Series B 对应 Texas 州扩张，Series C 对应覆盖全部 50 州并成为独角兽，Series D 对应进入
              Medicare Advantage/Medicaid 并承诺走向盈利。


              不利事件的重大性有限，但需要持续监测。最重要的一次发生在 2024 年 10 月，当时 Headway 通知受影响治疗师，Optum/UnitedHealth 报销费率将自 2025 年 1 月 1 日起最高下调
              30%。ClearHealthCosts 报道称，对部分 New York 地区博士级心理学家而言，经 Headway 的 Optum 费率在 90834 代码下从 $144.27 降至约
              $103。Headway 表示，受影响提供者少于 340 名（低于其 40,000+ 网络的 1%），并对大多数网络成员采取保护姿态。即便如此，该事件暴露了 Headway
              位于付款方费率决策与提供者收入之间、作为通道方的结构性风险。


              向 Better Business Bureau (BBB) 提交的消费者投诉主要涉及账单混乱、保险核验错误，以及患者意外产生的网外费用。临床评论来源（DL
              Method、PhilosophieTherapy）记录了治疗师对提供者门户的不满——包括保险账单不透明和支持响应慢。截至报告日期，公开来源未发现正式监管调查、HIPAA 执法行动或重大诉讼。2025
              年的产品扩张——一体化初级保健、AI 辅助 EHR、Medicare Advantage 网络建设——体现战略雄心，也带来邻近市场执行风险；Headway 在这些市场的存在感仍不如核心业务稳固。
