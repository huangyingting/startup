            title: Grow Therapy 的 125+ 付款方数量 vs. Headway 的 45+ 是结构性竞争缺口；Spring Health + Alma 创造双渠道融合威胁
            body: >-
              Grow Therapy 的 125+ 个保险合作关系（vs. Headway 的 45+）以及已纳入 Medicare/Medicaid，说明 Grow
              已实现更广付款方多元化——可能更吸引寻求最大网络广度的健康计划。另一方面，Spring Health 收购 Alma，把两个历史上不同的竞争模式（雇主 EAP +
              保险网络）整合为单一实体，创造出唯一能够同时服务雇主买方和保险公司买方的竞争者。这种双渠道能力是一种结构性融合威胁，Headway 当前的 B2B 健康计划模式尚未回应。
