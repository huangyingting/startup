      - number: '5.3'
        title: 合规、安全与数据治理
        blocks:
          - type: paragraph
            body: >
              Headway 是医疗技术公司，为心理健康服务方及其患者处理电子受保护健康信息（ePHI），因此属于 HIPAA 覆盖实体或商业伙伴，受 HIPAA Security Rule（45 CFR Parts
              164.302–164.318）和 HIPAA Privacy Rule（45 CFR Parts 164.500–164.534）约束。Security Rule
              要求通过行政、物理和技术保护措施，保护静态和传输中的 ePHI；Privacy Rule 规范患者权利、隐私实践通知和允许披露。Headway 发布的 Privacy Policy 和 Terms of
              Service 提及这些义务；其保险账单和 EHR 功能，也需要与云基础设施供应商以及任何接触 PHI 的第三方处理方签署 business associate agreements（BAAs）。


              另一项独立合规义务来自 SAMHSA 管理的 42 CFR Part 2，该规定对物质使用障碍（SUD）治疗相关记录施加比标准 HIPAA 更严格的保密要求。鉴于 Headway 的服务方网络包含治疗合并 SUD
              患者的治疗师，该规定可能适用于平台中的一部分记录；公开文档没有明确处理这个合规缺口。


              关于 ONC EHR 认证：截至研究日期，Headway 于 2025 年 9 月推出的 AI 辅助 EHR 未出现在 ONC Certified Health IT Product
              List（CHPL）上。当前并非所有 EHR 部署都必须获得 ONC 认证（要求取决于产品是否参与强制使用认证技术的项目），但缺席 CHPL 表明 Headway 尚未走这条认证路径。随着其扩张到把支付与认证
              EHR 使用挂钩的 Medicare 和 Medicaid 项目，该认证可能成为要求。Headway 的安全岗位提到 GRC（governance、risk、compliance）职能，但尚未公开宣布 SOC 2
              Type II 或 ISO 27001 认证。
            claimRefs:
              - CE019
              - CE020
              - CE021
              - CE022
