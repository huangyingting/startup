      - number: '1.6'
        title: 图表
        blocks:
          - type: callout
            title: 结构性市场护城河：提供者网络飞轮
            body: >-
              Headway 的提供者网络具备典型市场飞轮：完成认证的提供者越多，可预约时段越多，从而吸引更多患者和健康计划合同，再进一步吸引更多提供者。凭借 34,000+ 名提供者、$321M+ 融资和 45+
              个付款方关系，网络效应已经足够成熟；超过一半新提供者来自同行转介绍，这是强有力的自然增长信号，说明飞轮不需要持续付费获客也能自我强化。
            calloutType: insight
            claimRefs:
              - CO019
              - CO020
              - CO032
          - type: callout
            title: 付款方费率风险：Headway 是付款方—提供者谈判中的通道方
            body: >-
              Optum/UnitedHealth 降费率事件（2024 年 10 月）暴露了结构性脆弱点：Headway 的收入模式取决于付款方报销给 Headway 的金额与 Headway
              支付给提供者的金额之间的价差。当付款方压缩费率时，Headway 要么吸收压缩，要么下调提供者报酬（冒网络流失风险），要么退出付款方关系。该事件影响不到 1% 的提供者，但随着网络扩展到 Medicare
              Advantage 和 Medicaid——这些政府付款方采用受监管费率表——费率风险会从边缘案例变成一阶财务风险。
            calloutType: insight
            claimRefs:
              - CO036
              - CO037
              - CO028
          - type: callout
            title: Series D 的盈利信号具有战略意义
            body: >-
              CEO Andrew Adams 在 2024 年 7 月 Series D 时公开表示，公司层面盈利已有「清晰可见路径」；同期收入同比翻倍以上，提供者转介绍率超过 50%。对一家五年融资 $321M+
              的医疗市场平台而言，在 $2.3B 估值下释放近期盈利信号——且未披露亏损或烧钱速度——让 Headway 在健康科技同行中异常适合 IPO
              路径或继续私营增长。如果经审计财务数据能够验证，该信号将构成有意义的估值质量指标。
