      - number: '2.4'
        title: 增长驱动因素与监管顺风
        blocks:
          - type: paragraph
            body: >
              美国心理健康治疗市场受益于强大的结构性顺风，覆盖需求动态、监管要求、劳动力增长和技术赋能。这些驱动因素会复合放大 Headway 的可服务市场和竞争位置。


              COVID 后需求激增：COVID-19 大流行在全人口尺度推高了焦虑、抑郁和社会孤立比例，带来持续的心理健康服务需求，且看不到正常化迹象。18–25 岁年轻成年人是 AMI 患病率最高的人群，2022 年达到
              36.2%；他们正进入劳动力市场，并带着高治疗使用预期，雇主和保险公司必须满足。SAMHSA 的 National Survey on Drug Use and
              Health（2022）记录了构成需求底线的高患病率。


              MHPAEA 和 ACA 监管顺风：Mental Health Parity and Addiction Equity
              Act（MHPAEA，2008）要求保险计划覆盖心理健康和物质使用障碍服务时，不得比身体健康服务更严格。即便最初立法已超过 25 年，执法缺口仍然存在——HHS
              和州总检察长已加快执法行动，给保险公司施压，要求扩大其行为健康提供者网络。Affordable Care Act（ACA，2010）将心理健康确立为基本健康福利，扩大了 Headway 可服务的参保患者池。


              Medicaid 和 Medicare 扩张：过去十年，行为健康是 Medicaid 中扩张最频繁的福利。Headway 计划在 50 个州扩展 Medicare Advantage，并从 2025 年开始进入
              Medicaid，触达覆盖 100 million 美国人的市场——相当于美国人口三分之一——且该保险分层的心理健康负担率位居最高之列。BLS 预计 2024–2034 年心理健康咨询师就业增长
              17%，超过所有职业平均水平的三倍。


              远程医疗常态化和 AI：COVID 后的远程医疗政策变化，在许多州和 CMS 层面确立了永久性心理健康远程医疗报销平价，把 Headway 的地理触达延伸到提供者密集的城市市场之外。AI
              和工作流自动化正在降低资质认证和账单开销，进一步改善 Headway 平台上提供者接受保险的经济性。
