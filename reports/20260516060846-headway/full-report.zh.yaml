      - number: '4.3'
        title: 资本结构与充足性
        blocks:
          - type: paragraph
            body: >
              截至 2024 年 7 月，Headway（TherapyMatch, Inc.）通过四轮风险融资累计募集约 $321M+
              股权资本。逐轮时间线、投资方和共同投资方已在公司概况章节记录；本节聚焦资本充足性含义。最近一轮 Series D 由 SEC Form D 文件确认，发行总额为 $99,999,939，首次销售日期为 2024
              年 7 月 16 日，投资方共九名。Form D 签署人包括 Andrew Adams（CEO）、Scott Kupor（Andreessen Horowitz Director）、Amit
              Kumar、Kareem Zaki 和 Will Reed。Spark Capital 领投 Series D。投后估值 $2.3 billion，较 Series C 约 $1.1B
              翻倍，符合市场对规模化心理健康基础设施的强需求。


              Series D Form D 披露的资金用途为「product development and other general corporate purposes」——标准模板措辞，没有给出量化分配。截至
              2026 年 5 月，TherapyMatch Inc. 的任何公开文件中都没有识别出债务义务、可转债或项目融资安排。现金余额和月度烧钱速度未公开披露，无法直接计算现金跑道。作为资本密集型
              marketplace，Headway 需要为服务方资质认证基础设施和保险签约运营投入资金；Series D 所得预计将支持 Medicare Advantage 和 Medicaid
              扩张、平台工程以及服务方网络增长。按估算收入计算的隐含估值倍数（$2.3B 对 $150M–$300M 估算收入）约为 7x–19x——对高增长基础设施业务而言常见，但在收入不确定背景下区间很宽。截至 2026
              年 5 月，尚未确认 Headway 有 IPO 申报、SPAC 交易或重大债务发行。
