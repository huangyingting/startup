      - number: '5.2'
        title: 技术栈与工程组织
        blocks:
          - type: paragraph
            body: >
              Headway 的工程组织拆成多个产品 squad，对齐关键平台界面：Provider、Patient、Payer、Benefits 和 Growth。截至 2026 年 5 月，Greenhouse 招聘页显示
              Provider squad 正在招聘高级后端、高级全栈和 staff fullstack 工程角色；Payer squad 也在招聘 Staff Software Engineer，聚焦保险整合层。Payer
              squad 对「deep payer API integrations」和保险公司侧资质认证信号的关注，说明有专门工程团队管理 45+ 个保险 API；这类整合技术复杂，payer 系统更新理赔格式和资格 API
              时，需要持续维护。


              数据科学职能包括一名聚焦贝叶斯实验和因果推断的 Staff Data Scientist，以及 Patient 团队的一名 Director of Data Science——说明公司同时投入平台级 A/B
              测试基础设施和患者匹配算法开发。安全团队正在通过 Senior Security Engineer（Product Security）和 Senior GRC Analyst 角色搭建，确认公司在向
              Medicare Advantage 和 Medicaid 等更受监管的 payer 细分扩张时，正在正规化合规与治理姿态。设计领导层包括 Core Insurance 和 Design Systems 的
              Design Director，以及专门聚焦 Group Practices 的 Staff Product Designer——说明 group practice 支持是正在投入的产品方向，不只是路线图条目。


              平台托管在云上（具体供应商未披露），采用现代 Web 技术，与基于 Web 的服务方门户和患者预约界面一致。第一位外部 CTO Arnaud Ferreri 于 2025 年 1
              月加入，标志着公司从创始人主导技术方向，转向执行层面的专业工程领导。在此之前，Headway 没有专职 CTO 角色；对一家处理保险理赔、并为 34,000+
              名服务方存储受保护健康信息的公司而言，这是值得注意的治理信号。
