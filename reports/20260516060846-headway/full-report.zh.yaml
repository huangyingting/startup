      - number: '7.5'
        title: 缓释措施、否决标准与监测指标
        blocks:
          - type: paragraph
            body: >
              Headway 抵御服务提供者流失的主要结构性缓释，是零成本资质认证模式内嵌的切换成本。通过 Headway 集中流程完成 45+
              个付款方资质认证的服务提供者，如果想独立重建同等覆盖，需要承担数月行政重新认证负担；这部分摩擦成本会部分抵消由满意度下降引发的流失冲动。隐私政策和服务条款确认 HIPAA
              合规，集中计费基础设施也提供了一层合规能力，单个服务提供者很难以相近成本复制。


              Headway 的定位是网络平台中介，而非直接临床治疗提供者；这让公司与直接医疗事故责任保持结构性隔离。持证服务提供者对护理质量和临床文档准确性承担全部专业责任。这种隔离限制了 Headway
              的直接临床风险，但不能消除平台在计费准确性、AI 工具准确性或数据处理失败上的责任。


              否决标准是会实质损害投资逻辑的具体、可衡量事件。首要否决标准是影响 10,000 名或更多患者的 HIPAA 数据泄露；这会触发 OCR 强制报告、每个违规类别最高 $1.9 million 的民事罚款、在
              HHS 泄露门户公开披露，并几乎必然导致付款方信心崩塌。第二个否决标准是任何前 3 大付款方合约终止——UnitedHealth、主要 BCBS 附属机构或 Aetna——这会抹去 15–25%
              的患者就诊量，并削弱网络对剩余付款方的价值主张。第三个否决标准是 DOL 或法院命令将 Headway 的 34,000+ 名服务提供者重新分类为员工，从根本上重塑用工成本。监测指标包括：Trustpilot
              评分趋势（阈值：连续 12 个月持续低于 3.0）、服务提供者流失速度、付款方合约续约日期、OCR 对可比平台的执法行动，以及 CTO 和 CMO 留任信号。
