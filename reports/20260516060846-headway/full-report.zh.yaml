chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Headway 是一家心理健康科技公司，法律实体为 Therapymatch, Inc.（注册于 Delaware），总部位于 New York City, NY。公司面向公众的品牌是「Headway」，官网为
              headway.co；其提供者门户运行在 sigmund.headway.co。

              Headway 自述使命是「我们在建设一个新的心理健康护理体系」——这个体系通过保险覆盖而非自费支付，让每个美国人都能获得服务。


              公司的核心产品是一套面向持牌心理健康提供者的端到端诊所管理平台——覆盖治疗师、心理学家和精神科医生——负责保险资质认证、理赔账单、排班、EHR 和付款方汇款。Headway
              不向提供者收费：没有会员费、没有诊疗收入抽佣，也没有平台订阅费。提供者完成诊疗后，每两周通过直接存款收款。Headway
              的收入来自与保险公司谈判取得高于支付给提供者的报销费率，并保留付款方汇款与提供者收入之间的价差。


              患者侧，Headway 在 headway.co/providers 运营面向消费者的目录，患者可按专科、保险计划、地点和可预约时间搜索网内治疗师。截至本报告日期，Headway 列出
              Aetna、Anthem、Cigna、Oxford、UnitedHealthcare、Oscar Health 等 45+ 家主要保险承保方。公司覆盖美国 50 个州和 District of
              Columbia，是美国覆盖最广的保险资质认证心理健康网络。


              Headway 要解决的结构性市场问题很大：约 70% 的美国治疗师不接受保险，因为资质认证和账单的行政负担超过收益。Headway
              把这套负担彻底移除，让过去以现金支付为主的提供者加入保险网络，扩大护理可及性。对健康计划而言，Headway 提供行为健康网络方案，带来可量化的更快就医：患者首次联系后 2
              天获得护理，可预约时段是典型保险公司网络的 3x，第二次就诊留存率达到 90%——这些结果有助于降低总护理成本。
