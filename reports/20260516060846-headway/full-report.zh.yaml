  - id: TV002
    title: 论点 / 反论点
    tableType: comparison
    columns:
      - 类型
      - 主张
      - 证据
      - 权重
      - 结论
    rows:
      - - 论点
        - 网络效应护城河：34,000+ 名服务者 + 45+ 个付款方形成双边市场飞轮，规模越大复利越强
        - 34,000+ 名服务者已在 2024 年 7 月确认（Series D 公告、Fierce Healthcare、STAT News）；45+ 个付款方合同在 headway.co 确认
        - 高 — 核心护城河主张；服务者数量增长和付款方名单公开可观察，方向一致
        - 支持 — 网络规模已确认；护城河耐久性取决于服务者留存，这是一项尽调问题
      - - 论点
        - 保险原生 EHR 差异化：Headway 解决了资质认证和账单复杂度，竞争对手尚未在规模上跑通
        - a16z 行为健康市场地图将保险原生基础设施列为防御性最高类别；Headway for Providers 确认免订阅费模式
        - 高 — 相比 DTC（BetterHelp）、EAP（Lyra）和订阅式 EHR（SimplePractice）模式，结构性差异已有记录
        - 支持 — 独立市场分析和竞争对手模式复盘确认差异化
      - - 论点
        - 行为健康 TAM（$280B+）和未满足需求（53.8% 的 AMI 成年人未治疗）提供长期增长空间
        - CMS National Health Expenditure 数据；NIMH AMI 患病率数据；KFF 心理健康覆盖缺口数据
        - 高 — TAM 和需求数字来自权威政府来源；结构性需求没有争议
        - 支持 — 宏观需求背景稳健；能否转化为 Headway 收入取决于执行
      - - 反论点
        - 付款方集中风险：单个大型付款方退出或下调费率，可在没有提前预警的情况下实质损害收入
        - Clear Health Costs 关于 Optum 2024 年费率下调影响包括 Headway 在内的数字心理健康平台的报道
        - 高 — 2024 年真实事件已证明；没有公开付款方集中度数据可量化暴露
        - 重大风险 — Optum 先例是已确认负面证据；没有 NDA 披露就无法量化集中度
      - - 反论点
        - 报销费率压缩：Medicare/Medicaid 扩张带来结构性更低报销费率，压缩混合利润率
        - >-
          CMS Medicaid behavioral health resources；KFF COVID-19 mental health implications；Headway Series D 公告（提到
          Medicare/Medicaid 扩张）
        - 中 — 政府项目报销结构性低于商业保险；扩张对混合利润率的影响尚未确认
        - 重大风险 — 结构性但局部；商业保险仍是主要收入板块
      - - 反论点
        - 雇主直采竞争：Spring Health（2025 年收购 Alma）和 Lyra Health 通过雇主赞助渠道争夺同一批治疗师供给
        - Spring Health 网站；Lyra Health 网站；a16z 行为健康市场地图（雇主直采 vs. 保险原生分段）
        - 中 — 雇主直采和保险直连渠道争夺同一服务者供给；碎片化风险真实存在
        - 重大风险 — 竞争强度在上升；不过 Headway 的保险原生模式与 EAP 有结构性差异
    notes: >-
      论点来自已确认公开证据和权威市场来源。反论点来自有记录的负面事件（Optum 2024）和结构性竞争动态。净评估是：在当前证据下，论点强于反论点，但仍取决于建议部分指出的条件项。随着尽调问题产生新证据，应更新概率权重（论点强度
      vs. 反论点严重性）。
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
      - CV008
  - id: TV003
    title: 牛市 / 基准 / 熊市情景表
    tableType: comparison
