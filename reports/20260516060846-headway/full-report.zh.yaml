      - number: '3.4'
        title: 能力、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: >
              在保险网络促成分层，对提供者免费的模式已经成为标准：Headway 和 Grow Therapy 都免费向提供者提供资质认证、账单、EHR 和排班，收入来自付款方费率价差。Alma
              以提供者会员费偏离这一模式，但在 Spring Health 持有后，该结构可能变化。BetterHelp 的提供者由平台按诊疗付费；Lyra Health 和 Modern Health
              则在雇主合同下向提供者付款。Headway 保险共付模式（患者支付标准共付额）与 BetterHelp 订阅（$60–90/周）之间的价格差，对参保患者有利于 Headway，但对未参保或偏好网外的患者有利于
              BetterHelp。


              在 go-to-market 策略上，Headway 的 B2B 健康计划渠道（向保险公司销售网络访问，并用多年付款方合同提高收入可预测性）与 BetterHelp 的 B2C
              付费获客模式根本不同。这一结构差异很重要：Headway 的付款方合同创造了经常性、可预测收入，并在付款方侧形成有意义的切换成本；BetterHelp 的直接面向消费者获客则依赖营销效率和价格敏感度。鉴于
              Grow Therapy 拥有 125+ 个保险合作关系，它似乎也采用类似的健康计划 B2B 方法，尽管 Grow 的具体合同结构未公开披露。在信任与监管姿态上，BetterHelp 因涉嫌隐私违规和误导性广告在
              2023 年受到 Federal Trade Commission (FTC) 审查，这是重大声誉事件，而 Headway 和 Grow Therapy 尚未遭遇。Cerebral
              是一家聚焦处方的远程医疗平台，2022 年面临 DEA 调查和保险欺诈指控，随后裁员并失去部分保险合同——这说明心理健康平台赛道的监管和声誉风险画像。Headway 的 BBB
              档案和独立提供者评论显示存在一些账单和行政体验投诉，但截至本报告日期，公开记录未报告监管执法行动。
