  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局：直接同业、既有玩家、邻近者、替代品与潜在进入者
        blocks:
          - type: paragraph
            body: >
              在美国门诊心理健康治疗市场，Headway 至少横跨五类竞争对象。直接同业是与 Headway 核心商业模式相同的保险网络促成方——为治疗师做资质认证、与付款方签约，并保留费率价差。Grow Therapy 和
              Alma（现为 Spring Health 的一部分）是最重要的两个直接同业。邻近竞争者运营雇主员工援助计划（EAP）替代模式，卖给自保雇主而非保险计划；Spring Health、Lyra Health 和
              Modern Health 是领先 EAP 平台。替代品包括完全或部分绕开保险账单的直接面向消费者（DTC）治疗服务（BetterHelp、Talkspace），以及服务提供者但不提供保险集成的传统 EHR
              和诊所管理软件（SimplePractice、TherapyNotes）。


              既有的现状竞争者，是大型保险门户内建的提供者目录（UnitedHealth/Optum、Aetna、Cigna、Blue Cross Blue Shield）。这些目录要求提供者自行管理资质认证，不提供 EHR
              或账单自动化，也正是 Headway
              要消除的摩擦。对患者而言，现状要么是现金支付的私人治疗（$150–$300/次），要么是在保险公司目录中艰难寻找，结果可预约时段有限。未来潜在进入者包括拥有既有保险基础设施的大型科技和医疗公司——Amazon（通过
              One Medical）、Google（通过行为健康合作）以及 Optum（UnitedHealth Group 的护理服务部门），前提是其加速自有资质认证技术。超过 70%
              的美国治疗师历史上因行政负担拒绝保险，这构成 Headway 和 Grow Therapy 共同的提供者招募机会。截至 2026 年 5 月，还没有单一进入者复制 Headway
              在付款方深度、提供者规模和健康计划 B2B go-to-market 上的组合。
