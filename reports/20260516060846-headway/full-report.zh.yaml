        - 寻找网内心理健康服务的计划成员
        - 健康险计划（保费池 + 雇主缴费）
        - 网络充足性合规审查；行为健康供应商评估；支付方与 Headway 谈判合同
        - CMO / VP Benefits
        - 州和联邦网络充足性监管；成员对心理健康服务的需求；相比自建网络更讲成本效率；预约可得性提升 3x
      - - 自保雇主（通过 TPA）
        - HR Director / Benefits Manager
        - 寻求心理健康福利的员工及家属
        - 雇主（自保）通过使用 Headway 关联承保方的第三方管理人支付
        - 与承保方签 ASO 协议；雇主通过承保方合作接入 Headway 网络；HR 跟踪心理健康项目使用情况
        - HR 负责人 / CFO
        - 员工心理健康指标；生产率和缺勤率 ROI；监管和 ESG 压力；福利竞争力
