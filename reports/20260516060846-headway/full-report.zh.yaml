  - id: TV004
    title: 可比估值表
    tableType: enumeration
    enumerationScope:
      coverage: partial
      basis: >-
        Comparable private and public companies in behavioral health tech as of Q1 2026, selected for relevance to
        Headway's insurance-native mental health network model. Includes employer-direct EAP platforms, DTC telehealth,
        practice management infrastructure, and adjacent public health insurance companies. Valuations are from the most
        recent confirmed round or public market cap as of the citation date.
    columns:
      - 公司
      - 最近估值
      - 轮次日期
      - 模式
      - 收入估算
      - 倍数备注
    rows:
      - - Lyra Health
        - $5.58B
        - 2021 年 12 月（Series F）
        - 雇主赞助 EAP；按每名员工每月向雇主收费；直接与 Fortune 500 签约
        - 未公开披露；估算 $200M–$400M ARR（分析师估算）
        - Headway 当前标记估值的 2.5x；雇主直采模式在 2024–2026 年面临企业预算压力；上轮融资在 2021 年，可能反映市场峰值定价
      - - Spring Health
        - 独角兽+（未披露，估算 $3B+）
        - 2025 年收购 Alma；上一轮独立融资在 2022 年
        - 雇主赞助心理健康福利；直接雇主合同；收购 Alma（接受保险的服务者平台）
        - 未公开披露
        - 收购 Alma 暗示整合战略；雇主直采模式捕捉的付款方细分与 Headway 保险原生路径不同
      - - BetterHelp（Teladoc）
        - $4.5B（Teladoc 总公司市值，2025 年 2 月）
        - 上市公司（Teladoc）；2015 年以 $1.1B 收购 BetterHelp
        - DTC 订阅；患者直接支付 $60–$100/周；不接受保险；收入由消费者需求驱动
        - Teladoc 2024 全年收入约 $2.6B（包括所有板块）；BetterHelp 未单独披露
        - DTC 模式表现吃力；Teladoc 股价较 2021 年峰值下跌 >80%；保险原生模式（Headway）具备结构性差异
      - - Grow Therapy
        - 未披露（私营）
        - 上次确认融资为 2023–2024 年（具体轮次未确认）
        - 接受保险的治疗师市场；26,000+ 名临床医生；125+ 个保险合作伙伴；模式与 Headway 类似
        - 未公开披露
        - 与 Headway 最直接的商业模式可比对象；26K 名服务者 vs. Headway 34K；估值未确认
      - - Cerebral
        - 从 $4.8B 独角兽（2021 年）跌至求生模式（2024 年）
        - 上一次独角兽轮在 2021 年 11 月；之后发生降价轮
        - DTC 心理健康和 ADHD 远程医疗；订阅模式；处方和治疗结合
        - 收入较峰值下降；2023–2024 年重组
        - 警示案例：监管审查（DEA、FTC）、单位经济恶化和订阅流失，推动其从独角兽跌入求生状态
      - - Oscar Health
        - '$2.4B 市值（上市，NYSE: OSCR，2025 年 Q1）'
        - 2021 年 IPO；仍为上市公司
        - 健康保险公司；面向消费者的计划；不是行为健康平台，但在保险科技定位上相邻
        - 2024 年收入约 $9.0B（全保险保费，不能与平台收入相比）
        - 健康保险科技的公开市场参照；交易约 0.27x 收入（保险保费，不是平台）；单位经济不同
    notes: >-
      可比公司集合异质性强 — 没有单一上市公司完全映射 Headway 的保险原生行为健康网络模式。Lyra、Spring Health 和 BetterHelp 是模式最接近的可比对象，但付款结构均不同。Grow Therapy
      是最直接的模式可比对象，但没有公开估值。Oscar Health 是保险科技估值的相邻公开参照。所有私营公司估值均来自上一轮已确认融资，可能无法反映截至 2026 年 Q1 的当前市场条件。纳入 Cerebral
      是为了作为反向可比对象，记录下行风险。
