      - number: '3.2'
        title: 直接竞争者画像：Grow Therapy 和 Alma / Spring Health
        blocks:
          - type: paragraph
            body: >
              Grow Therapy 是 Headway 最接近的直接竞争者。Grow Therapy 成立于 2020 年，运营一种与 Headway 结构相同的保险网络促成模式：提供者免费加入，Grow
              将其认证进保险网络，并从保险报销中保留费率价差。截至 2026 年 5 月，Grow Therapy 在全国列出 26,000+ 名临床医生，而 Headway 为 34,000+ 名；其提供者网络比
              Headway 小约 31%。不过，在原始保险合作伙伴数量上，Grow Therapy 以 125+ 家超过 Headway 的 45+ 家；Grow 的 125+ 个保险合作关系已经包含 Medicare 和
              Medicaid，而 Headway 是在 2024 年 7 月宣布进入这一分层。Grow Therapy 还向提供者免费提供继续教育（CE）学分、临床咨询、EHR 和远程医疗工具，与 Headway
              的平台能力相当。Grow Therapy 上患者使用保险后的平均单次费用为 $21，说明其定价动态与 Headway 的保险共付模式相似。


              Alma 曾是一家独立的保险赋能诊所管理平台，向提供者收取月度会员费——这与 Headway 对提供者免费的模式形成差异化变现。Alma 的网络通过保险合作伙伴覆盖 112+ million
              有资格获得心理健康护理的美国人。2026 年初，Spring Health 完成对 Alma 的收购；Alma 网站版权声明写着「Copyright Alma, a part of Spring Health,
              2026」，证实了这一点。该收购创造了一个独特的双渠道竞争者：Spring Health 带来雇主 EAP 客户基础（20+ million 覆盖人群），Alma
              带来保险网络能力。合并后的实体是唯一同时服务雇主买方（通过 Spring 的 EAP 合同）和保险计划买方（通过 Alma 的资质认证网络）的竞争者，对 Headway 聚焦保险的定位构成结构性融合威胁。
