      - number: '1.2'
        title: 创立故事、联合创始人与高管团队
        blocks:
          - type: paragraph
            body: >
              Headway 由 Andrew Adams 和至少三位其他联合创始人于 2019 年创办。CEO Andrew Adams 于 2015 年搬到 New York
              City，却找不到可负担的网内治疗师；这段个人经历推动他搭建基础设施，让心理健康护理能够通过保险覆盖变得可及。Series A 公告（2020 年 11 月）将创始团队列为「Jake、Dan、Kevin 和
              Andrew」——确认 Jake Miller、Dan（姓氏未公开）和 Kevin（姓氏未公开）与 Adams 同为联合创始人。截至报告日期，除 Adams 外三位联合创始人的完整职业背景尚未公开披露。


              公司规模扩大后，Headway 招募了职业化高管团队。Arnaud Ferreri 于 2025 年 1 月加入，担任 Headway
              首任首席技术官——这是一个重要里程碑，说明公司已从仅靠创始人技术领导向更成熟组织演进。Dr. Neha Chaudhary 于 2025 年 8 月加入，担任首席医疗官，为高管团队增加临床可信度。Olivia
              Davis 担任首席商务官，早在 2023 年 12 月就已署名公司博客内容。截至 2025 年 4 月，Headway 员工超过 700 人，已在创始团队之外搭起有分量的组织纵深。


              CEO Andrew Adams
              的关键人风险较高：他是公司的公众面孔、创始叙事核心，也是主要付款方和投资者合作关系的核心持有人。公司未公开董事会构成——这对该阶段私营公司很常见——限制了外部对独立治理的可见度。董事会成员预计包括 Spark
              Capital、Thrive Capital、Accel 和 a16z 等领投投资方代表。
