      - number: '3.3'
        title: 邻近与替代竞争者：雇主 EAP 和直接面向消费者
        blocks:
          - type: paragraph
            body: >
              雇主 EAP 分层争夺心理健康护理预算，但目标买方不同于 Headway。Lyra Health 为大型雇主运营一个 30,000+ 名循证提供者组成的精选网络，提供 AI 驱动匹配和临床监督。Lyra
              只卖给自保雇主（主要是 Fortune 500 公司），采用按员工每月（PEPM）合同，不使用保险网络模式——提供者由 Lyra 在雇主合同下直接支付。这意味着 Lyra 会与 Headway
              争夺提供者人才和患者注意力，但不争夺保险付款方合同。Modern Health 也以雇主为目标，提供包含教练、治疗和精神科的多模态护理平台，采用 EAP 模式。Lyra 和 Modern Health
              都不会直接威胁 Headway 的健康计划 B2B 渠道，但 Spring Health + Alma 的融合创造了第一个横跨两个渠道的混合竞争者。


              BetterHelp 是 Teladoc Health 旗下子公司，也是全球最大的在线治疗服务，拥有 31,000+ 名持牌治疗师，已帮助超过 5 million 名患者。BetterHelp
              采用直接面向消费者的订阅模式（$60–90/周），没有保险账单或资质认证——对偏好可及、即时治疗而非保险覆盖护理的患者而言，它是替代品。对提供者而言，BetterHelp 的价值主张也不同于
              Headway：治疗师按诊疗从 BetterHelp 收款，而非获得保险报销。Talkspace 处于混合位置：它提供部分保险覆盖治疗（参保会员可能 "$0
              copay"），同时也有直接面向消费者订阅模式。Talkspace 在 Nasdaq 上市（股票代码：TALK），资本结构不同于包括 Headway 在内的私营竞争者。BetterHelp 和 Talkspace
              都不直接威胁 Headway 的健康计划 B2B 模式，但如果 BetterHelp 进入保险网络促成领域，其 31,000+ 名治疗师供给可能分流提供者招募。
