      - number: '2.3'
        title: 购买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              Headway 服务的是一个多边市场，购买方、用户和付款方角色在结构上不同。理解每个分层的预算归属、决策权和采用触发因素，是评估商业动能和可服务市场的关键。


              商业健康计划是 Headway 的主要 B2B 购买方。商业保险公司的福利副总裁和首席医疗官购买 Headway 完成认证的提供者网络，以满足会员需求和监管对网络充足性的要求。这些计划通过谈判确定的报销费率向
              Headway 付款；Headway 保留付款方费率与提供者付款之间的价差。截至 2026 年 5 月，Headway 报告与 45+
              家保险公司合作。采用触发因素是网络充足性合规（州和联邦要求），叠加可量化的更快就医：Headway 报告 2 天获得护理，而非典型等待时长；可预约时段多 3x；患者 NPS 为 93。


              自保雇主构成次级购买渠道，主要通过其第三方管理机构（TPA）或承保方触达。HR 总监和福利经理掌握福利预算；Headway 通过保险合作伙伴间接触达这些买方。


              心理健康提供者——治疗师、持牌临床社工（LCSWs）和心理学家——是 Headway 的供给侧用户。Headway 对提供者免费：提供资质认证、账单自动化、排班和 EHR
              功能，不收会员费或佣金。采用触发因素是消除导致 70% 治疗师拒绝保险的行政负担，尤其是每家保险公司 30 天的资质认证流程和复杂账单。


              个人患者是需求侧终端用户。他们通过 headway.co 访问 Headway 的提供者目录，寻找网内治疗师，支付标准共付额或免赔额，而不是每次 $150–$300 的现金费用。Headway 的 90%
              第二次就诊留存率和 93 NPS 表明患者满意度强。采用由保险覆盖、成本降低和治疗师可获得性触发。


              Medicare Advantage (MA) 和 Medicaid 计划是 Headway 通过政府计划扩张激活的新兴购买方分层。三分之一 Medicaid 受益人和四分之一 Medicare
              受益人患有心理疾病。Headway 在 50 个州扩展 MA，并从 2025 年开始进入 Medicaid，打开了覆盖约 100 million
              美国人的市场——如果报销经济性足以支撑提供者参与，这将是一次改变量级的可服务市场扩张。
