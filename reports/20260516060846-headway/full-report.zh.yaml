  - id: FU002
    title: 患者旅程图——通过 Headway 获得保险覆盖的护理
    type: journey-map
    layout: wide
    summary: 从最初意识到心理健康需求到在 Headway 平台持续接受护理的六阶段患者旅程，映射每一阶段的关键触点、决策点和 Headway 角色。
    approximationNotes: 旅程阶段依据 Headway 公开产品页面、保险搜索流程和服务方预约界面推断。没有可用的患者访谈数据或转化漏斗指标。各阶段之间的流失率未知。
