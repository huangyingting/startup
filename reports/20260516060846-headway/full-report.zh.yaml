      - number: '6.4'
        title: 留存信号与用户满意度
        blocks:
          - type: paragraph
            body: >
              Headway 未公开披露任何服务方流失率、净留存率（NRR）、总留存率（GRR）、患者复诊率或净推荐值（NPS）。对 Series D 阶段的 marketplace
              企业而言，这是重大尽调缺口；留存指标通常是首要耐久性指标。私营心理健康平台缺少公开留存数据并不罕见，但本章因此只能依赖第三方评价平台和投诉记录中的代理指标。


              最重要的反向信号是，截至 2026 年 5 月，Headway 在 Trustpilot 上基于 1,414 条评论的评分为 3.6/5。对面向消费者的医疗平台而言，3.6/5
              明显低于一个强留存平台应有水平。Trustpilot 评论中反复出现的负面主题包括账单错误（患者在 session
              后被错误收费）、向服务方付款处理缓慢、电话支持不足，以及取消或修改预约困难。这些投诉集中在账单和付款基础设施上——也就是 Headway 价值主张的核心功能差异点——因此比外围服务投诉更值得担忧。


              Headway（TherapyMatch, Inc.）的 Better Business Bureau（BBB）档案显示，过去三年提交 87 起投诉，最近 12 个月关闭 39
              起，说明随着平台扩张，投诉量有所上升。最常见投诉类别是账单和服务，与 Trustpilot 模式一致。对服务超过 1 million 名患者的平台而言，每年 39 起 BBB
              投诉在绝对值上并不异常高，但投诉集中于核心账单功能，是值得监控的运营信号。


              服务方侧满意度证据稀少。DL Method 临床人员评测记录了资质认证延迟和付款不一致等具体挫折，与 Headway 宣传的 2 天访问和稳定付款定位相冲突。公开渠道没有服务方调研数据、汇总服务方 NPS
              或服务方续约率。平衡评估需要承认，服务方正面证言（包括 Philosophie Therapy
              案例研究）与这些反向信号并存，负面评论也可能过度代表边缘案例。不过，反向信号集中在账单和付款这一核心基础设施上，不能被忽略。
