      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Headway 的商业模式完全绑在已签约的付款方关系上。公司有 45+ 份保险合约，估计 60–70% 的患者就诊量集中在前 3–5 个计划——UnitedHealth/Optum、Aetna/CVS 和主要
              BCBS 附属机构。任何一个主要付款方合约丢失或重组，都会对总就诊量和收入造成超比例冲击。


              最直接的先例来自 2024 年 11 月 Clear Health Costs 的报道：UnitedHealth 旗下 Optum 单方面下调数字心理健康平台上治疗师的报销费率，引发服务提供者广泛不满。如果
              Optum 对 Headway 的签约费率采取类似降价，Headway 每次就诊留存的管理费会被压缩，服务提供者收入也会下降，可能引发大规模流失。这不是理论风险——直接同业中已经出现先例。


              云基础设施集中度是一个未披露的依赖项。Headway 没有公开说明云托管供应商。单一区域云故障会同时打掉服务提供者门户、患者预约、计费流水线和 EHR。医疗行业云故障曾在类似平台造成多日运营中断。EHR
              数据可携性也是监管和声誉风险：Headway 的服务提供者协议条款没有公开说明合约终止后患者记录导出的格式或时间表；如果记录无法干净迁移，可能触发 HIPAA 患者权利风险。处方模块扩张依赖 DEA
              注册基础设施、各州受控物质许可数据库，以及受控物质电子处方系统——这些依赖不在 Headway 当前已确认的运营栈内。
