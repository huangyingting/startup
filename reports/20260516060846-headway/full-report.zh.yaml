  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Headway 所在市场是美国通过保险报销的门诊心理健康治疗——具体包括商业健康计划、Medicare Advantage 计划和 Medicaid 管理式护理组织。这一边界由 Headway
              的产品架构定义：公司把提供者认证进保险网络，管理面向付款方合同的账单，并把参保患者连接到其网络内的治疗师。每笔交易都涉及一项保险报销理赔。


              不属于 Headway 可服务市场的包括：（1）住院精神科护理——Headway 完全在门诊场景运营；（2）物质使用障碍（SUD）住院和强化门诊项目——Headway 的提供者网络聚焦心理健康，而非 SUD
              专门临床项目；（3）Talkspace、BetterHelp 等直接面向消费者的远程治疗应用，它们采用现金支付或雇主订阅模式，绕开保险账单；（4）作为独立产品线的精神科和处方服务（尽管 Headway
              网络包含处方者，但处方不是核心产品）；（5）由雇主直接出资、而非通过保险报销的雇主员工援助计划（EAPs）。


              Headway 平台的现状替代方案是现金支付的私人治疗：每次通常 $150–$300，由患者自费直接支付，不走保险。该替代方案主要面向较高收入患者，也正是约 70%
              美国治疗师历史上采用的安排，因为保险资质认证的行政负担太重，不值得承担。Headway 可能进入但目前尚未直接服务的邻近市场包括雇主赞助的心理健康福利（EAPs）、学校咨询，以及一体化身心健康项目。


              该市场的定义性特征是结构性可及性缺口：2022 年，约 29.3 million 名有任一心理疾病（AMI）的美国成年人未接受治疗；在已接受护理的人群中，很大一部分因网内治疗师不可得而使用现金支付。Headway
              的核心市场主张，是通过扩大接受保险的提供者供给，把现金支付治疗人群和治疗缺口转化为有保险、可报销的护理。
