      - number: '6.3'
        title: 具名客户证明与 payer 合作
        blocks:
          - type: paragraph
            body: >
              记录最清晰的两项 payer 合作，是 Blue Cross and Blue Shield of North Carolina（BCBS-NC）和 New Jersey 的 Horizon Healthcare
              Services（Horizon）。BCBS-NC 合作由 Headway 博客在 2022 年 7 月宣布。Horizon Healthcare Services 合作于 2021 年 12 月宣布，是
              Headway 最早的具名 payer 关系之一。二者都是拥有数百万会员的大型区域商业健康计划，确认 Headway 已经与主流商业保险公司签下机构级 payer 协议，而不只是与较小的区域或专项计划合作。


              除这两项具名合作外，Headway 服务方 marketplace 列出 45+ 个保险计划，包括 Aetna、Anthem、Cigna、Oxford、UnitedHealthcare、Oscar Health
              等，暗示它与主导商业 payer incumbent 签有合同。这些计划可在 headway.co/insurance 的服务方搜索界面看到，患者可以按保险计划筛选服务方。计划覆盖广度强烈暗示 Headway
              已与所有主要全国性商业 payer 签约，尽管单个条款、排他安排和收入分成结构均未公开披露。


              服务方侧证言证据是混合的。Philosophie Therapy 案例研究给出正面叙事，强调加入 Headway 网络后保险账单更容易、治疗师行政负担下降。DL Method
              评测则从临床人员视角给出相反看法，记录的挫折包括资质认证延迟、付款时点不一致，以及缺乏直接电话支持线。DL Method
              评测构成服务方留存论点上的重要反向证据：如果付款可靠性和支持响应速度低于临床人员预期，服务方流失可能削弱网络长期供给侧强度。


              两份证言都来自独立第三方网站，而非 Headway 自有营销材料，因此证据权重高于公司托管证言。不过，二者都不能视为具有统计代表性，因为公开渠道没有服务方调研数据或汇总满意度指标。
