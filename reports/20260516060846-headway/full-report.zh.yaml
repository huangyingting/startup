  - id: TM002
    title: TAM/SAM/SOM 或规模测算视角表
    description: >-
      Multiple sizing lenses for the U.S. mental health therapy market. All estimates use bottom-up construction from
      NIMH prevalence and BLS workforce data; no primary market research with disclosed methodology was accessible.
    columns:
      - 发布方 / 来源
      - 年份
      - 地域
      - 指标 / 数值
      - CAGR / 增长
      - 方法
      - 置信度
      - 关键限制
    rows:
      - - NIMH / SAMHSA（患病率自下而上，低端）
        - '2022'
        - 美国
        - TAM：~$89B（59.3M AMI 成人 × $1,500/年最低治疗支出假设）
        - 不可用
        - 患病率 × 每名 AMI 成人假设最低治疗支出
        - 低
        - 假设每名 AMI 成人都有支出；多数 AMI 成人并不会主动寻求治疗；把已治疗和未治疗人群混在一起
      - - NIMH / SAMHSA（自下而上的患病率测算，基准）
        - '2022'
        - 美国
        - 'TAM: ~$118B（59.3M 名 AMI 成人 × $2,000/年）'
        - 不可得
        - 患病率 × 假设年均治疗支出（10–15 次 × $133–$200/次）
        - 低
        - 平均治疗支出没有公开数据；个体差异很大；许多 AMI 成人没有接受治疗
      - - BLS OOH 2024（供给侧测算）
        - '2024'
        - 美国
        - 'TAM: ~$97B（483,500 名咨询师 × 约 $200K 年均收入）'
        - 预计 2024–2034 年就业增长 17%
        - 从业人数 × 单名咨询师收入假设
        - 低
        - 单名咨询师收入只是粗略近似；BLS 总数包含 SUD 咨询师和学校咨询师，这些人未必在 Headway 上
      - - NIMH + SAMHSA（有保险门诊 SAM）
        - 2022–2024
        - 美国
        - 'SAM: ~$32B（约 18M 名有保险且寻求治疗的成人 × $1,800/年，按 12 次 × $150/次）'
        - 不可得
        - 治疗子集（30M）× 约 60% 保险使用占比 × 就诊频次 × 平均报销额
        - 低
        - 60% 的保险使用占比是估计值；没有一手来源拆分有保险与现金支付的门诊治疗
      - - BLS 供给侧 SAM（上限）
        - '2024'
        - 美国
        - 'SAM: ~$58B（$97B 供给侧 TAM 的 60% × 保险覆盖占比）'
        - 不可得
        - 供给侧 TAM × 估计保险覆盖占比
        - 低
        - 这是上限估计；保险占比是估算而非实测；还包含不在任何保险网络内的咨询师
      - - CMS NHE 2023（背景）
        - '2023'
        - 美国
        - NHE 总额约 $4.9T；行为健康是重要但未单列披露的子项
        - 历史增速约 5–6%/年
        - CMS National Health Expenditure Accounts（公开的联邦统计方法）
        - 中
        - CMS 没有把门诊心理治疗从总体行为健康中拆出，也没有同住院精神科支出分开
      - - Headway 业务量（SOM 指标）
        - '2024'
        - 美国
        - SOM 指标：约 $144M–$288M 收入估计（7.2M 次年预约 × $20–$40 估计平台价差）
        - 2023–2024 年收入约同比翻倍
        - 预约量（600K/月 × 12）× 估计单次预约价差（未披露）
        - 低
        - Headway 未披露收入；单次预约价差未披露；该估计高度推测
      - - Headway 市场渗透（服务者份额）
        - '2024'
        - 美国
        - 34,000 名 Headway 服务者 / 483,500 名 BLS 咨询师 ≈ 美国心理健康咨询师队伍的 7%
        - Headway 服务者数量增长约 35%/年（由覆盖扩张推算）
        - 服务者数量（公司披露）÷ BLS 就业总数
        - 中
        - BLS 总数包含 SUD 咨询师；Headway 数据为自报；并非所有 BLS 咨询师都做私人执业
    notes: >-
      本表所有市场规模估计均为自下而上构建，置信度较低。未找到方法论公开的第三方市场研究，能把美国保险覆盖的门诊心理健康治疗单列为一个可寻址市场。上述估计只能作为数量级指标使用。尽调团队应在 NDA 下向 Headway 索取
      OPEN MINDS 或 IBISWorld 行为健康市场数据，以及 Headway 内部收入数据。
