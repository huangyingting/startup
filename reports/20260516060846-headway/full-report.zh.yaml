  - id: TM001
    title: 市场定义表
    description: >-
      Headway market segment definitions, included and excluded spend, primary buyers, and relevance to Headway's
      addressable market.
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 主要买方 / 付款方
      - 与 Headway 的相关性
    rows:
      - - 保险覆盖的门诊心理健康治疗
        - 通过商业保险、Medicare Advantage 和 Medicaid 保险计费的治疗就诊；资质认证费、计费服务
        - 直接向患者计费、无保险参与的现金支付就诊
        - 商业健康计划、MA 计划、Medicaid 管理式医疗组织
        - 核心市场——Headway 唯一产生收入的细分；所有服务提供者资质认证、计费和网络接入都依赖保险
      - - 现金支付 / 自费私人治疗
        - —
        - 每次 $150–$300 的自付就诊；不涉及保险计费
        - 个人患者（自费、较高收入）
        - 主要现状替代品——70% 治疗师历史上提供的模式；Headway 通过把服务提供者转为接受保险来替代它
      - - 住院精神科护理
        - —
        - 医院内精神科住院、危机稳定单元、部分住院项目
        - 医院系统、CMS、商业计划
        - 范围外——Headway 只做门诊；住院有不同监管和资本要求
      - - 物质使用障碍（SUD）治疗
        - —
        - SUD 住院项目、强化门诊治疗、药物辅助治疗
        - 健康计划、Medicaid、患者
        - 相邻——Headway 聚焦心理健康治疗；SUD 专门护理是不同的监管和临床类别
      - - 直接面向消费者的远程治疗应用（网络外）
        - —
        - Talkspace、BetterHelp 雇主和个人订阅；向雇主计费的健康补贴
        - 个人患者、支付订阅费的雇主
        - 关键替代品——应用型、现金支付远程治疗在便利性上竞争，但不做保险整合；GTM 不同
      - - 雇主 EAP 和健康福利
        - —
        - 雇主资助的 Employee Assistance Programs、咨询补贴、向雇主计费的心理健康平台（Lyra、Modern Health）
        - 雇主（HR Director、CFO、Benefits Manager）
        - 相邻——Headway 通过保险公司整合，而非直接雇主合约；如果 Headway 增加雇主直连产品，可成为未来渠道
      - - 精神科 / 处方服务
        - 通过保险报销的处方就诊（部分在 Headway 网络内）
        - 独立药物管理平台、直接面向消费者的处方服务（Done、Cerebral）
        - 商业计划、Medicare、患者（copay）
        - 部分相邻——处方者参与 Headway 网络，但处方并非 Headway 核心差异化
    notes: >-
      市场边界反映 Headway 的保险网络产品架构。纳入 / 排除区分是根据公司定位推断（for-health-plans 页面、FierceHealthcare Series D
      报道）；没有公开可得的官方市场边界文件。各细分支出估计无法从公开来源获得。
