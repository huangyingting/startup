              2022 年，约 29.3 million 名患有 AMI 的美国成年人没有接受心理健康治疗。三分之一 Medicaid 受益人和四分之一 Medicare
              受益人患有心理疾病——但政府计划历史上的网内心理健康提供者渗透率最低。Headway 计划中的 Medicare Advantage 和 Medicaid 扩张（2024–2025
              年）在结构上正对这一缺口。如果政府计划报销费率能够支撑提供者参与，这次扩张就是缩小治疗缺口、把庞大潜在需求池转化为可服务市场的最高影响路径。
