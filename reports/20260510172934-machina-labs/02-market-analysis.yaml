  evidenceGaps:
  - type: missing-source
    severity: material
    topic: SAM-data-gap
    missingEvidence: A dedicated analyst report quantifying the low-volume (sub-500-unit)
      hard-metal aerospace and defense sheet forming market, separate from broader
      ISF equipment or A&D MRO reports.
    whyItMatters: Without a standalone SAM estimate, all SAM figures in this chapter
      are derived from proxy lenses with compounding assumptions; investors cannot
      independently validate the $5–10B figure.
    diligencePath: Commission a custom market study from a tier-1 analyst (IHS Markit
      / S&P Global Mobility, Teal Group) scoped to low-volume hard-metal forming for
      US defense and aerospace; alternatively, request Machina's internal market sizing
      model from the data room.
    relatedQuestionRefs:
    - QM004
    - QM026
  - type: conflicting-data
    severity: minor
    topic: TAM-estimate-conflict
    missingEvidence: A reconciliation of the 16% discrepancy between The Business
      Research Company ($202B) and Precedence Research (~$174B) global metal forming
      TAM estimates for 2025, explaining whether the difference is product scope,
      geographic coverage, or methodology.
    whyItMatters: The TAM conflict propagates to A&D-share-derived SAM estimates;
      a 16% variance at the TAM level implies the same variance in downstream estimates.
    diligencePath: Request methodology notes and product inclusion/exclusion definitions
      from both publishers; cross-check against IBIS World and Statista for independent
      triangulation.
    relatedQuestionRefs:
    - QM017
  - type: private-evidence-only
    severity: material
    topic: private-revenue-gap
    missingEvidence: Machina Labs' actual annual revenue, gross margin, revenue by
      segment, and RoboCraftsman utilization rate—all of which are private and unavailable
      from public sources.
    whyItMatters: Without revenue data, the 5-year SOM estimate of $100–300M cannot
      be validated bottom-up; it is purely proxy-based and may be optimistic or pessimistic
      by 2–5x.
    diligencePath: Request access to Machina Labs' data room for audited financial
      statements and management accounts; request cell utilization reports and pipeline
      weighted-average contract value from management.
    relatedQuestionRefs:
    - QM026
