- id: buyer-and-segment-map
  title: Buyer, User, and Payer Segmentation
  body: 'Machina Labs serves five distinct buyer/user segments, each with different
    procurement mechanics, budget ownership, and adoption triggers.

    The largest and most strategically validated segment is US defense and government.
    The Air Force Research Laboratory (AFRL) and Air Force Rapid Sustainment Office
    (RSO) are confirmed buyers, having awarded SBIR Phase III contract FA868425CB003
    (worth up to $3.37M) for AI-driven airframe sustainment sheet metal parts. The
    payer is the US DoD; budget authority resides with AFRL program offices and RSO.
    Procurement follows SBIR/government contracting pathways with 18–36 month cycles
    from solicitation to award. The adoption trigger is the inability to source legacy
    sheet metal parts from the existing supply base—obsolescence, supplier exit, or
    emergency sustainment.

    The second confirmed segment is aerospace MRO operators for legacy platforms.
    Aircraft operators managing C-130, C-5, C-17, and F-16 fleets need on-demand parts
    for aircraft that have been in service for 40–60+ years, making many original
    suppliers defunct. Machina''s RoboCraftsman can produce these parts on demand
    without dies, directly from CAD files. Budget ownership sits with maintenance
    and logistics commands; procurement is integrated into the AFRL/RSO contracting
    channel for military operators.

    The third confirmed segment is automotive OEM prototyping. Toyota Motor North
    America is the anchor customer, piloting Machina''s platform for prototype and
    low-volume body panel manufacturing. Budget ownership is with Toyota''s R&D and
    advanced manufacturing departments. Woven Capital (Toyota''s CVC arm) is also
    an investor, reflecting strategic alignment. The adoption trigger is EV platform
    transition: OEMs require rapid iteration on new body panel geometries before committing
    to expensive production dies.

    The fourth confirmed segment is space and advanced programs. NASA has contracted
    Machina for toroidal tank manufacturing using RoboForming—a complex geometry that
    demonstrates the process''s applicability to space hardware. An unnamed defense
    prime in missiles and hypersonics is also a non-public buyer. Budget for this
    segment comes from program-specific R&D allocations.

    The fifth emerging segment is commercial non-aero (theme parks and entertainment).
    This segment has lower strategic weight but demonstrates the platform''s versatility
    and could broaden revenue diversification. Budget ownership is with the entertainment
    company''s capital construction budgets.

    '
