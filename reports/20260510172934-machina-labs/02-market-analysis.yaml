  title: Growth drivers and constraints table
  columns:
  - Driver / Constraint
  - Direction
  - Timing
  - Implication for Machina
  - Diligence Ask
  rows:
  - - US DoD budget expansion ($895B FY2026)
    - Driver
    - Current (ongoing)
    - Larger DoD budget = more sustainment and modernization funding; SBIR awards
      increase
    - Verify AFRL/RSO pipeline contracts; track FY2027 ManTech appropriation
  - - Legacy fleet lifespan extension (C-130, C-5, C-17 in service 40–60+ yrs)
    - Driver
    - Current — durable 10+ yr horizon
    - Structural long-tail demand for obsolete sheet metal parts; hard to substitute
    - Quantify number of obsolete part numbers; estimate annual spend per platform
  - - Geopolitical urgency (Ukraine, Taiwan)
    - Driver
    - Current — acute
    - Defense manufacturing investment accelerating; SBIR awards faster; OTA preferred
    - Track defense industrial base executive orders; watch OTA deal flow
  - - Automotive EV platform transition
    - Driver
    - 2025–2030 (peak iteration period)
    - OEMs need rapid body panel prototyping without die investment; recurring R&D
      spend
    - Get Toyota TMNA pilot commercial terms; expand to other OEMs (GM, Ford, BMW)
  - - US manufacturing reshoring / EO 14017
    - Driver
    - 2022–ongoing, accelerating
    - Agile domestic capacity wins over offshore stamping for defense
    - Confirm Machina is sole-source qualified on US-only requirements
  - - Advanced materials (Ti, Inconel, 7000-Al) for hypersonics / space
    - Driver
    - Current — expanding
    - Machina's hot-forming capability is rare; reduces substitution risk; price premium
      viable
    - Validate materials qualification for hypersonic temperature profiles
  - - 'Throughput limit: ISF slower than stamping'
    - Constraint
    - Structural / permanent
    - Economic ceiling at ~500 units/design; cannot capture high-volume stamping market
    - Understand if Machina has plans for hybrid or parallel-cell approaches at scale
  - - Defense procurement cycles (18–36 months)
    - Constraint
    - Current — structural
    - Long revenue lag after pilot; capital needed to bridge; SaaS-model alternative
      needed
    - Map current pipeline stage of top 5 government prospects; estimate weighted
      backlog
  - - Capital intensity of RoboCraftsman deployment
    - Constraint
    - Ongoing — rate-limited by factory capacity
    - ~30–35 cells/yr capacity limits deployment; Series C funds ~50-cell factory
    - Confirm factory construction timeline and cells-per-year rate at 200k sqft facility
  - - Skilled-labor scarcity (robotics + metallurgy)
    - Constraint
    - Current — tight market
    - Hiring pace may lag deployment ambition; wage inflation risk in LA tech market
    - Review job posting cadence; assess attrition and retention in engineering team
  - - Competing R&D in automated die making
    - Constraint
    - Medium-term (3–7 yrs)
    - Faster/cheaper die production would erode Machina's cost advantage for mid-volume
      runs
    - Monitor die-casting automation startups and incumbent (Schuler, Fagor) R&D spend
  - - Supply chain fragility (legacy parts obsolescence)
    - Driver
    - Current — acute for US Air Force
    - National security risk of single-source obsolete parts creates urgency; government
      motivated to contract
    - Assess how many platform part numbers have no alternative US supplier
