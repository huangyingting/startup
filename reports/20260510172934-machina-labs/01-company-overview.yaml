  body: 'The RoboCraftsman''s design—fitting into two ISO-standard shipping containers
    and becoming operational within days of arrival—directly addresses the DoD''s
    sustainment modernization challenge of producing parts closer to the point of
    need, even in contested logistics environments. The U.S. Air Force''s use of the
    predecessor Deployable System at Warner Robins Air Logistics Complex validates
    this operationally. This portability differentiates Machina from factory-bound
    robotics competitors.

