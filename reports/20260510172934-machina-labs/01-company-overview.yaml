  name: Machina Labs
chapter:
  number: 1
  title: Company Overview
  summary: Machina Labs is a Los Angeles-based advanced manufacturing startup founded
    in 2019 that uses AI-controlled robotic systems (RoboCraftsman) for die-less incremental
    sheet metal forming. The company raised $124M in Series C financing in February
    2026 (total raised ~$209M), operates three facilities in the Chatsworth/LA area,
    and serves U.S. Air Force, Lockheed Martin, and Toyota. Its post-money valuation
    is approximately $333M per secondary market data—below unicorn threshold despite
    media characterizations.
sections:
- id: identity-and-mission
  title: Identity, Mission, and Business Model
  body: 'Machina Labs is a private advanced manufacturing company headquartered in
    Chatsworth, California (Los Angeles area), founded in 2019 by Edward Mehr (CEO)
    and Dr. Babak Raeisinia (Co-Founder and Head of Applications & Partnerships).
    The company''s core mission is to reinvent metal manufacturing by combining artificial
    intelligence and industrial robotics to produce complex metal structures directly
    from digital design files, eliminating the need for geometry-specific dies or
    molds.

    Its flagship platform, RoboCraftsman, integrates forming, trimming, scanning,
    and heat treating into a single containerized robotic cell, underpinned by its
    proprietary RoboForming incremental sheet-forming process. Traditional metal stamping
    relies on custom dies weighing over 20 tons that take months to engineer and cost
    millions of dollars per geometry. Machina''s dual-robotic-arm system replaces
    this entirely with software-defined toolpaths derived from CAD models, achieving
    over 10x reduction in lead time and tooling cost savings that can exceed $1 million
    per unique part design.

    Machina Labs operates under a direct production and manufacturing-as-infrastructure
    model: it builds, operates, and sells capacity from intelligent factories for
    defense, aerospace, and advanced mobility customers. The company''s vision is
    to treat factory capacity like a data center—software-defined, reprogrammable,
    and deployable wherever demand exists. The RoboCraftsman fits into two ISO shipping
    containers and can be operational within days of arrival, enabling forward-deployed
    or field-adjacent manufacturing.

    As of mid-2026, the company is in Series C stage with three facilities in the
    Chatsworth/LA area. It has publicly confirmed contract relationships with the
    U.S. Air Force Research Laboratory, the Air Force Rapid Sustainment Office, Toyota
    Motor North America, and is working with an undisclosed leading defense prime
    on missile and hypersonics structures. Revenue and gross margin remain undisclosed.

    '
