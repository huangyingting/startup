- id: founders-and-leadership
  title: Founders, Leadership, and Governance
  body: 'Machina Labs was co-founded by Edward Mehr and Dr. Babak Raeisinia. Edward
    Mehr serves as CEO and co-founder, with prior professional experience at Relativity
    Space, SpaceX, Google, and Microsoft—spanning advanced manufacturing, software,
    and tech infrastructure. Dr. Babak Raeisinia is Co-Founder and Head of Applications
    & Partnerships; he holds a doctoral degree in materials science and is the company''s
    principal technical author on incremental sheet forming, metallurgy, and forming
    process R&D.

    Together, the founders combine software/AI expertise (Mehr) with deep metallurgy
    and materials science knowledge (Raeisinia)—a pairing central to Machina''s differentiated
    approach. Extended leadership includes John Borrego (SVP Aerospace and Defense),
    Kyle Hickey (VP Engineering), Sarah Ramuta (General Counsel), Matteo Bastreghi
    (Head of Finance), and Ronen Lebi (Chief Business Officer). The board of directors
    includes Edward Mehr, Babak Raeisinia, Sam Smith-Eppsteiner (Innovation Endeavors),
    and Peter Lee.

    Key-person risk is notable: both co-founders hold irreplaceable technical and
    commercial roles, and Edward Mehr is the primary external spokesperson. As of
    December 2024, Machina Labs had approximately 66 employees, growing approximately
    16% from the prior year. By May 2026 the headcount is estimated at 90–100. The
    company''s Intelligent Factory is planned to employ approximately 150 workers
    alongside 50 RoboCraftsman cells.

    No public record of material leadership departures, laysoffs, lawsuits, or adverse
    employment events at Machina Labs was found in publicly available sources as of
    May 2026. The governance structure is consistent with a founder-led Series C company
    with a small board and limited independent oversight. No succession plan has been
    publicly disclosed.

    '
