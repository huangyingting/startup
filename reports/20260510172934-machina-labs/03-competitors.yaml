  rows:
  - - Machina Labs
    - Per-part or per-program (not publicly disclosed); inferred from contract values
    - RoboForming, trimming, scanning, heat treatment in one cell; Architect CAM included;
      first-article qualification support
    - No list pricing; no per-unit cost ranges public; AFRL contract ($3.37M multi-year)
      does not reveal per-part economics
    - Likely premium pricing vs. stamping at equivalent volume; value prop is speed
      and tooling savings, not unit cost; pricing diligence requires data room access
  - - Divergent Technologies
    - Per-program (defense prime contracts); not publicly disclosed
    - DAPS additive nodes plus software; structural assembly; supply chain management
    - No public pricing; no per-part unit cost disclosed; full contract values not
      public
    - Pricing likely structured as development + production contracts with defense
      primes; not comparable to Machina per-part sheet forming
  - - Hadrian
    - Per-part CNC machining quote; automated quoting via software platform
    - CNC machining, inspection, packaging, delivery; online RFQ workflow
    - List pricing not public; general press coverage implies faster quoting than
      incumbents; margin structure unknown
    - CNC unit pricing is generally well-understood in the industry ($/hour of machine
      time + material); Hadrian's advantage is speed and throughput, not unit cost
      innovation
  - - Traditional Stamping Shops
    - Die amortization + per-part variable cost; contract stamping or tooling + production
      split
    - Tooling design, die fabrication, press runs, trimming, inspection; finishing
      typically separate
    - Die cost $200K–$2M; lead time 6–18 months; per-part variable cost well-understood
      at volume; not transparent for low-run quotes
    - At <500 units, die amortization makes per-part cost prohibitive (often $5K–$50K+/part);
      at >500 units, traditional stamping is significantly cheaper than any agile
      alternative
  - - Metal AM (LPBF/WAAM)
    - Per-part ($/kg + machine time); quoted per geometry via online platforms or
      direct RFQ
    - Build, support removal, heat treat, basic inspection; post-machining typically
      separate
    - Per-kg costs for Ti LPBF range from $500–$2,000+/kg depending on geometry; WAAM
      lower but post-processing adds cost; no standardized pricing
    - For thin sheet panels, metal AM is materially more expensive per kg than ISF
      or stamping; for compact high-complexity structures, can be cost-competitive
      with ISF
