callouts:
- calloutType: risk
  title: 'Capital Asymmetry: Divergent''s $2.3B Valuation Is 7x Machina''s'
  body: 'Divergent Technologies'' September 2025 Series E at a $2.3B valuation and
    $450M+ total raised creates a severe capital asymmetry relative to Machina Labs
    ($333M post-money, $209M raised). While Divergent and Machina address structurally
    different forming problems today, Divergent''s capital base would allow it to
    fund an ISF-adjacent R&D program or acquire an ISF competitor as a natural extension
    into sheet-panel manufacturing. Machina''s path to closing this gap requires successful
    scale-up of the Intelligent Factory, demonstrated revenue growth, and a valuation
    re-rating—none of which is guaranteed from current evidence.

    '
  claimRefs:
  - CP001
  - CP013
  - CP032
- calloutType: strength
  title: 'Sole-Source Position in US DoD AI-Robotic ISF: No Domestic Peer Exists'
  body: 'Across all reviewed competitor classes—additive manufacturers, CNC machinists,
    traditional stampers, foreign ISF operators, and metal AM vendors—no US-domestic
    competitor was identified that offers AI-driven robotic incremental sheet forming
    for hard metals with DoD SBIR qualification. Kikukawa is the closest ISF peer
    in process terms but is Japan-only and ineligible for US defense programs. This
    sole-source position is the most powerful competitive asset Machina possesses
    in the near term, supported by AFRL contract evidence and CBInsights competitor
    analysis.

    '
  claimRefs:
  - CP007
  - CP009
  - CP012
  - CP019
- calloutType: insight
  title: Multi-Homing Is Structurally Impossible in Machina's Core Defense Segment
  body: 'Customers seeking large-format, hard-alloy, US-domestic, DoD-qualified sheet
    forming have no viable multi-homing option as of May 2026. Divergent addresses
    different geometries; Hadrian addresses different processes; Kikukawa is geographically
    ineligible; metal AM lacks large-panel scale economics; and traditional stampers
    require tooling investment that makes low-volume runs uneconomical. This absence
    of multi-homing alternatives translates directly into buyer lock-in and reduces
    price competition for Machina''s DoD contracts.

    '
  claimRefs:
  - CP012
  - CP014
  - CP019
  - CP035
