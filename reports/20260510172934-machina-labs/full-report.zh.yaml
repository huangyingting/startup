        - 没有客户承诺，工厂模式尚未验证；资本开支风险重大
        - 阻断
        - 要求提供已签 LOI 或产能协议；施工合同和分阶段预算
      - - AFRL 项目经理背调电话
        - 独立验证已交付零件质量和客户满意度
        - 高
        - 要求提供 2-3 名 Air Force 项目官员推荐人；开展独立背调
      - - AI 材料模型技术深挖
        - 独立验证 AI 模型准确性主张和合金覆盖范围
        - 高
        - 要求与 CTO 开技术会；审查材料模型验证数据集
      - - 工厂施工合作方和时间表
        - 确认施工已签约且按计划推进
        - 高
        - 要求提供施工合同、项目排期和许可状态
      - - IP 自由实施（FTO）分析
        - 确认关键成形权利要求未被竞争对手 IP 卡住
        - 中
