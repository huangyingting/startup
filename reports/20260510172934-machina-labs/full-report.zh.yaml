  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户格局和分层
        blocks:
          - type: paragraph
            body: >
              Machina Labs 的客户基础分为两个主要板块：政府和防务（U.S. Department of Defense 机构、防务主承包商和 MRO
              维修基地），以及商业先进移动和汽车。政府和防务板块是主导收入渠道，由与 AFRL 和 Air Force Rapid Sustainment Office 的直接 SBIR
              合同关系锚定，并有一个已确认但未具名的防务主承包商，覆盖导弹和高超音速部件。商业板块目前仅限于 Toyota TMNA（汽车试点）、 NASA（政府 R&D 案例研究），以及用于定制金属制造的隐含主题公园客户。

              防务板块内，客户关系从直接政府合同（AFRL SBIR Phase III，已确认 $3.37M）延伸到 RSO 在 University of Dayton Research
              Institute（UDRI）部署第二个 RoboCraftsman 单元，支持 C-130、C-5、C-17 和 F-16 平台保障。通过 Toyota TMNA
              进入汽车板块，目前仍处于定制车身面板的结构化试点阶段（定制尾门试点于 2025 年 9 月 UP.Summit 公布），尚未达到生产规模。

              从地域看，Machina Labs 客户位于美国；没有公开披露国际客户，这与防务军民两用技术的 ITAR 合规要求一致。客户获取采用直接企业销售模式， 并由投资人-客户同向关系补充：Woven
              Capital（Toyota 的 CVC）领投 Series C，从而压缩汽车板块客户获取成本。ARM Institute 与 AFRL 在部分项目上共同牵头，为防务制造合作提供额外机构渠道。
            claimRefs:
              - CU001
              - CU004
              - CU009
              - CU012
              - CU015
              - CU019
          - type: table
            tableRef: TU001
            claimRefs: []
