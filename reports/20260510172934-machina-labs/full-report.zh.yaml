      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              由于没有任何单一公开报告单独切出 Machina Labs 专门服务的小批量、硬质金属、机器人渐进式板材成形细分，本报告使用多组分析口径来约束市场边界。

              最宽的 TAM 口径是全球金属成形整体：The Business Research Company 估计 2025 年全球金属成形市场约 $202B，并以约 4% CAGR 增长，到 2034 年达到
              $268.9B（Precedence Research）。这个宽口径涵盖从汽车冲压到建筑钢材的全部内容，其中大部分与 Machina 定位无关。第二个更聚焦的口径是金属成形中的航空航天与国防份额。根据
              Research and Markets 的行业细分，A&D 约占全球金属成形需求的 14%，对应 2025 年 $28–31B 的 A&D
              金属成形市场。第三个、也是最具体的口径是渐进式板材成形（ISF）机器市场：GrowthMarketReports 估计 2024 年 ISF 机器市场约 $412M，并预计以 8.7% CAGR 增长，到
              2033 年达到 $870M。

              航空航天与国防 MRO 市场提供了另一组规模锚点：Grand View Research 估计 2025 年全球 A&D MRO 市场为 $142.7B，并以 3.9% CAGR 增长，到 2033 年达到
              $199.6B。机体 MRO 通常占 MRO 总支出的 15–30%，意味着全球机体专项 MRO 为 $21–43B。其中，军用老旧平台机体保障维护——Machina
              初始政府业务的核心——是板材成形可覆盖的一个有意义子集。

              综合这些口径，Machina 的可服务市场（SAM）估计为 $5–10B：约 $2–5B 来自国防和航空航天生产中的小批量硬质金属成形，约 $3–5B 来自美国及盟友老旧机队的军事保障维护和 MRO
              钣金零件。汽车原型和预生产面板成形还贡献 $500M–$2B，但部分重叠。为国防项目制造技术研发提供资金的 DoD ManTech 项目，在 FY2026 为 AFRL Manufacturing
              Technology Program 编列 $38.9M 预算，是与 Machina SBIR 合同相关的政府资助研发渠道。DoD ManTech 在所有军种和技术领域的年度总义务支出超过 $900M。

              以 5 年为周期，Machina 的可获取市场（SOM）估计为 $100–300M，假设部署 20–50 个 RoboCraftsman 单元，且每个单元每年产生 $2–5M
              成形收入。该估计置信度低，因为它取决于融资节奏、竞争替代和当前国防试点组合之外的客户扩张。
