  - id: TP003
    title: 定价 / 包装对比
    columns:
      - 竞争对手
      - 定价模型
      - 包含的能力
      - 未知项 / 缺口
      - 含义
    rows:
      - - Machina Labs
        - 按零件或按项目（未公开披露）；从合同金额推断
        - RoboForming、修边、扫描、热处理在一个单元内完成；包含 Architect CAM；提供首件鉴定支持
        - 无标价；无公开单件成本区间；AFRL 合同（$3.37M 多年期）不透露单件经济性
        - 与同等批量冲压相比，可能采用溢价定价；价值主张是速度和省模具，不是单件成本；定价尽调需要数据室权限
      - - Divergent Technologies
        - 按项目（国防主承包商合同）；未公开披露
        - DAPS 增材节点 + 软件；结构装配；供应链管理
        - 无公开定价；未披露单件成本；完整合同金额不公开
        - 定价可能按国防主承包商的开发 + 生产合同设计；无法与 Machina 按件板材成形直接比较
      - - Hadrian
        - 按件 CNC 加工报价；通过软件平台自动报价
        - CNC 加工、检测、包装、交付；在线 RFQ 工作流
        - 标价不公开；媒体报道大致显示报价快于传统厂商；利润结构未知
        - CNC 单件定价在行业内通常清楚（机时 $/hour + 材料）；Hadrian 的优势是速度和吞吐，不是单件成本创新
      - - 传统冲压工厂
        - 模具摊销 + 单件可变成本；合同冲压，或工装 + 生产拆分
        - 工装设计、模具制造、冲压、修边、检测；表面处理通常另算
        - 模具成本 $200K–$2M；交期 6–18 个月；批量生产下单件可变成本清楚；低批量报价不透明
        - <500 件时，模具摊销让单件成本过高（通常 $5K–$50K+/件）；>500 件时，传统冲压显著便宜于任何敏捷替代方案
      - - 金属 AM（LPBF/WAAM）
        - 按件（$/kg + 机时）；通过线上平台或直接 RFQ 按几何形状报价
        - 打印、去支撑、热处理、基础检测；后加工通常另算
        - Ti LPBF 每 kg 成本随几何形状在 $500–$2,000+/kg；WAAM 更低，但后处理增加成本；无标准化定价
        - 做薄板面板时，金属 AM 每 kg 成本明显高于 ISF 或冲压；做紧凑高复杂结构时，可与 ISF 在成本上竞争
