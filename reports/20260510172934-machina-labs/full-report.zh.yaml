companyProfile:
  summary: >
    Machina Labs 是一家洛杉矶地区先进制造创业公司，2019 年由 CEO Edward Mehr 与 CTO Dr. Babak Raeisinia 创立。公司的核心产品 RoboCraftsman 平台，用两条 AI
    引导的工业机器人臂和电磁成形头，对金属板材做渐进式成形，不需要传统硬模具，就能加工复杂三维零件。该方法面向小批量、复杂几何金属零件，把交付周期（数天而非数月）和成本大幅压低，目标客户是航空航天、国防和汽车
    OEM。关键客户和投资方包括 Lockheed Martin Ventures、Woven Capital (Toyota)、NVIDIA NVentures 与 UAE Strategic Development
    Fund。Machina Labs 累计融资约 $209M，其中 2024 年 Series C 轮为 $124M；基于二级市场数据，投后估值估计约 $333M。
