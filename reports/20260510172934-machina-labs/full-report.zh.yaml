  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: >
              Machina Labs
              的投资论点建立在五个相互咬合的支柱上。第一，结构性市场需求：航空航天与防务要维护老化机队，催生了大量低批量、高混合度的过时零件成形需求，传统模具经济性在这些场景下不成立。仅美国空军就运营数千架飞机，机队中位年龄超过
              28 年，形成结构性增长的维修保障成形市场。第二，可防御技术：20+ 件成形控制算法授权专利，以及用六年数据训练出的自有 AI
              材料模型数据库，构成有意义的模仿壁垒，竞争者需要数年才能复刻。第三，政府采用已验证：与 AFRL 和 RSO 的 SBIR Phase III 生产合同证明技术达到 TRL
              7-8，并提供受国会保护的单一来源管线。第四，战略投资人背书：Lockheed Martin Ventures、Woven Capital（Toyota）、NVentures（NVIDIA）、Balerion
              Space Ventures 和 SDF（阿联酋主权防务基金）共同释放多垂直客户可选性和严肃机构信心。第五，平台经济性：如果 Intelligent Factory
              模型跑通，一次性项目毛利会转为重复的单元利用率收入，增量利润率高，商业模式结构上更优。

              反论点同样有力。$333M 投后估值已经按尚未验证的商业化结果定价。收入几乎全部来自政府项目合同，且单一客户集中度超过
              50%。商业工厂模式要求公司在建厂前签下锚定客户，把投资人介绍转化成生产合同，并证明成形经济性优于汽车和商业航空航天场景下的增材制造替代方案——这些都尚未被公开验证。资本强度高：工厂 capex 可能吃掉
              $124M Series C 中的 $50-100M，留给失误的空间有限。ITAR、CMMC 和 AS9100 合规缺口构成监管风险，可能阻断主 OEM 资格认证。如果商业转型停滞，Machina Labs
              会变成一家资金充足的防务服务公司，按项目收入倍数估值，远低于 $333M。
            claimRefs:
