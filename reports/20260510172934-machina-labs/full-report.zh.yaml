      - number: '8.3'
        title: 牛市 / 基准 / 熊市情形与最终尽调事项
        blocks:
          - type: paragraph
            body: >
              牛市情形假设：Intelligent Factory 在 2027 年底前投运；到 2027 年中，3 个或更多商业锚定客户（汽车 OEM + 1-2 家航空航天主承包商）签署重复容量协议；到 2028
              年底，工厂利用率达到 60%；到 2029 年，收入在政府项目合同和工厂利用费共同驱动下放大至 $80-120M；并在 2029-2031 年窗口以 4-6x 收入或 10-15x EBITDA
              实现战略退出，退出价值 $600M 至 $1.2B。该情形要求五个投资论点支柱同时兑现，且没有重大竞争替代。

              基准情形假设：工厂在 2027-2028 年开业，利用率部分释放（30-40%）；2-3 个商业试点转为重复合同；防务合同管线到 2028 年增长至 $25-35M；工厂收入增量贡献 $20-30M；2029
              年总收入达到 $45-65M；2030-2032 年以 3-5x 收入实现战略退出，估值 $150-$325M。在这一退出区间，按 $333M 投后估值入场的 Series C
              投资人会面临打平到小幅亏损，具体取决于潜在 Series D 的稀释。

              熊市情形假设：工厂建设延误或利用不足（15-20% 产能）；商业锚定客户未在工厂完工前签署；AM 竞争在汽车原型市场夺走份额；防务合同在 $15-20M 年化收入处停滞；资本压力迫使公司按低于 Series C
              条款发行稀释性过桥轮或 down-round Series D。在该情形下，公司可能以 $100-$200M 被战略收购，Series C 投资人将遭受显著损失。任何投资承诺前的最终尽调事项应包括：（1）确认
              ITAR 注册；（2）CMMC Level 2 评估状态；（3）AS9100 认证或时间表；（4）经审计或审阅的财务报表，显示现金余额、月度烧钱和毛利率；（5）Intelligent Factory 锚定客户
              LOI 或已签容量协议；（6）工厂施工合同和分阶段 capex 预算；（7）与 AFRL 项目经理进行参考访谈，验证已交付零件质量。
