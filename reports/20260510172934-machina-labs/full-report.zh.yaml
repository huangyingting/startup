      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              Machina Labs 服务五类不同的买方 / 用户群体，每一类的采购机制、预算归属和采用触发点都不同。

              最大且战略验证最充分的细分是美国国防和政府。Air Force Research Laboratory (AFRL) 与 Air Force Rapid Sustainment Office (RSO)
              是已确认买方，授予了 SBIR Phase III 合同 FA868425CB003（最高价值 $3.37M），用于 AI 驱动的机体保障维护钣金零件。付款方是美国 DoD；预算权在 AFRL 项目办公室和
              RSO。采购沿 SBIR / 政府合同路径推进，从征询到授标周期为 18–36 个月。采用触发点是现有供应基础无法提供老旧钣金零件——因为停产、供应商退出或紧急保障维护。

              第二个已确认细分是老旧平台航空航天 MRO 运营商。管理 C-130、C-5、C-17 和 F-16 机队的飞机运营方，需要为服役 40–60+ 年的飞机按需获得零件，很多原始供应商已经不存在。Machina 的
              RoboCraftsman 可直接从 CAD 文件按需生产这些零件，无需模具。预算归属在维护和后勤司令部；对于军事运营方，采购整合进 AFRL/RSO 合同渠道。

              第三个已确认细分是汽车 OEM 原型制造。Toyota Motor North America 是锚定客户，正在试点 Machina 平台用于原型和小批量车身面板制造。预算归属于 Toyota
              的研发和先进制造部门。Woven Capital（Toyota 的 CVC 机构）也是投资方，体现出战略一致性。采用触发点是 EV 平台迁移：OEM 在承诺昂贵量产模具之前，需要快速迭代新的车身面板几何。

              第四个已确认细分是航天和先进项目。NASA 已与 Machina 签约，用 RoboForming
              制造环形储箱——这一复杂几何展示了该工艺对航天硬件的适用性。一家未具名的导弹和高超音速国防主承包商也是非公开买方。该细分的预算来自特定项目的研发拨款。

              第五个新兴细分是商业非航空（主题公园和娱乐）。该细分战略权重较低，但证明了平台的多用途性，并可能扩大收入多元化。预算归属于娱乐公司的资本建设预算。
