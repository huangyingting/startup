  - id: FE001
    title: 产品架构图
    type: stack
    caption: Machina Labs 平台的五层架构，从合格原材料，到硬件、控制、智能，再到面向客户的应用。IP 最集中在智能层和控制层；硬件是在通用设备上改造；材料来自通用供应。
    data:
      layers:
        - label: 应用层
          detail: 面向客户的 CAD/CAM 集成；Architect 软件 UI；数字订单接入
        - label: 智能层
          detail: AI 刀路生成；材料变形预测；自适应工艺控制反馈回路
        - label: 控制层
          detail: RoboForming 工艺控制；双臂运动规划；力 / 位置传感器融合
        - label: 硬件层
          detail: RoboCraftsman 单元（双机械臂、板材夹持、传感器套件）；置于 ISO 集装箱内
        - label: 材料层
          detail: 合格金属板材输入：Al 6000/7000 系列、Ti-6Al-4V、不锈钢、Inconel；原材料采购
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    caption: 客户从提交 CAD 到收到合格零件的端到端流程。关键路径经过 Architect AI 刀路生成和数字孪生仿真；之后依次进入物理成形、扫描和精加工。人工终检仍是尚未自动化的流程瓶颈。
    data:
      nodes:
        - id: w1
          label: 客户提交 CAD + 规格
          detail: 通过 Architect 或直接传输上传 CAD 文件 + 材料规格 + 公差要求
        - id: w2
          label: Architect AI 生成刀路
          detail: AI 将 CAD 几何转换为双臂 RoboForming 刀路；新几何形状约需数小时
        - id: w3
          label: 仿真与验证
          detail: 数字孪生仿真验证刀路；变形模型检查材料行为
        - id: w4
          label: RoboCraftsman 单元成形
          detail: 机械臂逐步成形钣金；实时传感器反馈调整力和路径
        - id: w5
          label: 扫描与检验
          detail: 对已成形零件做 3D 扫描；与 CAD 名义值对比；首件检验
        - id: w6
          label: 修边与精加工
          detail: 机器人修边、钻孔、边缘精加工；交付前人工终检
        - id: w7
          label: 零件交付
          detail: 合格零件交付给客户；随附可追溯文档包
      edges:
        - from: w1
          to: w2
          label: 数字接入
        - from: w2
          to: w3
          label: 刀路进入仿真
        - from: w3
          to: w4
          label: 已验证刀路
        - from: w4
          to: w5
          label: 已成形零件
        - from: w5
          to: w6
          label: 通过检验
        - from: w6
          to: w7
          label: 完成精加工零件
