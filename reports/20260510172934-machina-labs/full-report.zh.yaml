      - CP037
    notes: >
      严重程度（低 / 中 / 高）体现基于截至 2026 年 5 月公开信息的尽调判断。「高」严重程度意味着威胁可能在 2–3 年内实质性替代 Machina；考虑到护城河绑定具体工艺，且美国没有获得融资的直接 ISF
