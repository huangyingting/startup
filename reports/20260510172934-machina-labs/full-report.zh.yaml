      - number: '1.5'
        title: 封面指标、单位经济与证据缺口
        blocks:
          - type: paragraph
            body: >
              Machina Labs 是私营公司，未公开披露收入、毛利率、烧钱速度、单位经济或盈利路径数据。对于一家已融资超过 $200M 的公司，这种不透明在 Series C
              私营公司中并不罕见，但它显著阻碍独立财务分析。约 $333M 的投后估值（Forge Global）意味着公司估值更多基于战略潜力和平台能力，而非已经验证的收入倍数。

              从员工单位指标看：约 90–100 名员工管理三处设施，并建设一座 200,000 sq ft 工厂，说明相对于员工数，资本强度很高。类似规模的传统冲压业务会雇用更多工人，但 Machina
              以机器人为核心的模式本就为此设计。以约 100 名员工估算，$333M 估值对应每名员工约 $3.3M 的估值，与高增长深科技公司相当。

              RoboCraftsman 的单位经济未公开披露。公司称每年制造约 30–35 套设备，但未披露每个单元的售价或租赁费率。政府合同数据只显示 AFRL SBIR Phase III 项目金额为
              $3.37M——合同规模不大，说明政府收入目前可能只是总融资的一小部分。

              关键财务证据缺口：没有收入数据，没有毛利率数据，没有烧钱速度或现金跑道信息，没有 RoboCraftsman 单位经济，也没有客户收入集中度数据。填补这些缺口需要在 NDA 下进入数据室。Series C
              投资者掌握这些信息；潜在投资者并不掌握。
