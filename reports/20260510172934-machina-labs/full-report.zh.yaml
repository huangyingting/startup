      - number: '7.4'
        title: 合作方、依赖与财务风险
        blocks:
          - type: paragraph
            body: >
              美国空军（AFRL 和 RSO）是唯一已确认的生产客户群，总合同价值至少 $14M。SBIR Phase III 合同使用单一来源授权，但仍属自由裁量；转入 FAR Part 12/15
              生产合同，需要合同官行动和项目经理推动。即便项目仍在执行，DoD 预算持续决议和自动减支情形也会推迟期权执行。

              Woven Capital 既是 Series C 领投方，又隶属于 Toyota TMNA 母公司，可能带来定价冲突。Innovation Endeavors 从 Series A 到 Series C
              全程参与，意味着董事会影响力集中。UAE Sovereign Development Fund 作为共同投资方带来 CFIUS 敞口，可能迫使股权剥离或运营限制。KUKA
              的中国所有权也给机器人供应链增加地缘政治风险。

              财务上，Machina Labs 已融资约 $172M 股权，二级市场估值约 $333M（Forge Global，2024）。公司未披露债务融资。按员工规模和工厂 capex 推算，年化烧钱约
              $25-40M，意味着 Series C 后跑道为 2-3 年。Intelligent Factory 建设预计需要 $50-100M capex，在商业收入放量前会吃掉 Series C
              募资的相当一部分。收入集中在 SBIR 成本型合同，限制了相对商业生产合同的毛利率杠杆。
