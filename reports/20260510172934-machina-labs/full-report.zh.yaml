      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              Machina Labs 面临的市场背景是：需求端结构性顺风很强，但采用节奏也受实际运营约束。

              需求侧，美国国防预算扩张是最重要驱动：FY2026 DoD 预算约
              $895B，国防工业基础现代化被明确列为立法和行政优先事项。地缘政治进一步放大国防制造紧迫性——乌克兰冲突证明了快速生产航空航天和国防硬件的必要性，台海紧张局势也提升了美国本土先进制造能力的战略优先级。DoD
              Manufacturing Technology 项目明确资助 Machina 的 AFRL SBIR 这类项目，以降低对脆弱供应链的依赖。

              老旧机队延寿是尤其持久的驱动因素：美国空军 C-130、C-5 和 C-17 已服役 40–60+
              年，受预算约束和替换平台长周期影响，预计还将继续运行十年以上。这创造了结构性、反复出现的保障维护钣金零件需求，而原始供应基础已无法满足。每推迟一年更换平台，Machina 可覆盖的保障维护窗口就延长一年。

              汽车 EV 转型为商业细分带来互补需求。OEM 从内燃机平台迁移到电动车架构时，正在加快车身面板设计迭代周期；每次原型迭代都投入 $500K–$2M 模具并不划算。Machina
              的无模成形把原型模具成本压到接近零，交付周期压到数天，因此该用例在结构上有吸引力。

              美国制造业回流是宏观顺风：COVID 后供应链扰动和关于供应链韧性的 Executive Order 14017，加速了美国本土制造投资。Machina 的集装箱化 RoboCraftsman
              可在数天内部署，定位为前沿部署的敏捷产能，服务于回流目标。高超音速和航天硬件对先进材料（钛、Inconel、7000-series 铝）的采用，需要只有少数供应商具备的专门热成形能力；这种专业化降低了替代风险。

              约束侧，渐进式板材成形单件速度天然慢于传统冲压，因此当每个设计产量超过约 500 件时不具备经济性。Machina 无法靠工程优化绕开这一点——这是工艺本身的基本属性。因此，Machina
              的经济模型在结构上被限定在小批量应用；若要进入更高产量应用，就需要一套根本不同的方法。国防采购周期为 18–36 个月，即使试点合同成功授予，收入兑现也有长滞后。资本强度是第二个约束：RoboCraftsman
              单元需要显著前期投入，Machina 的部署速度受融资节奏和制造吞吐限制（Chatsworth 设施每年约 30–35 个单元）。熟练劳动力短缺是第三个约束，尤其是运营和扩张 RoboCraftsman
              机队需要同时具备机器人工程师和材料冶金师。最后，传统 OEM 资本设备供应商正在投资自动化制模和数字化模具验证；若传统模具生产变得更便宜、更快，Machina 的模具成本优势可能随时间被压缩。
