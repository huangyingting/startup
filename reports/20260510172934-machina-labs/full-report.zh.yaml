      - number: '5.4'
        title: 信任、质量、合规和认证
        blocks:
          - type: paragraph
            body: >-
              Machina Labs 已为 AFRL SBIR Phase III 项目（FA868425CB003，$3.37M）取得合同特定的 MIL-SPEC 工艺资质，这意味着为该项目生产的零件已按军事资质标准获得
              U.S. Air Force 接受。该资质针对特定项目，不是全设施资质。AS9100D 认证是 tier-1 主承包供应链参与所需的航空航天质量管理标准；据称正在推进，缺口分析基本完成。覆盖特殊工艺的
              NADCAP 认证截至 2026 年 5 月尚未启动，这对进入主航空航天供应链构成重大缺口。


              DoD ManTech 2025 年年度报告明确强调 AI 驱动制造是国家防务优先事项，验证 Machina 路线的战略契合度。Air Force Rapid Sustainment Office 已在
              University of Dayton Research Institute（UDRI）部署一个 RoboCraftsman 单元，成为重要运营验证点。 公司声称防务项目符合
              ITAR，但公开来源没有独立确认。鉴于技术具备军民两用属性，外国投资人参与（UAE Strategic Development Fund 是 Series C 参与方）带来的 CFIUS 影响需要独立法律审查。


              全部单元队列的工艺重复性数据——Cpk、SPC 指标——尚未公开披露，使任何投资人或主承包商在评估供应链资质时，都无法验证统计质量状态。 如果任何制造工艺发生实质改变，18-36 个月的 DoD
              重新认证窗口会适用；一旦 Intelligent Factory 放大改变了当前 SBIR 项目已认证的工艺参数， 就会产生风险。
            claimRefs:
