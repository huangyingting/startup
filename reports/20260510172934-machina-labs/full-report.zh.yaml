      - number: '6.3'
        title: 采用轨迹和增长
        blocks:
          - type: paragraph
            body: >
              DoD 渠道随时间加深：AFRL 关系从 SBIR Phase II 推进到 Phase III（正式项目资质里程碑），RSO 关系从单个 RoboCraftsman
              部署扩展到第二个单元采购。这两项扩张都在没有新竞争性采购的情况下带来增量合同价值，是防务供应关系中可见质量最高的扩张信号。

              商业汽车进入（Toyota TMNA，2025 年 9 月）代表新增细分市场，由 Woven Capital 领投 Series C 带来的财务投资人重叠促成。
              这是首个公开公布的商业汽车客户，并沿用了投资人主导客户开发的模式；历史上，对服务大型 OEM 的硬件初创公司来说，这是一种成本有效的获客方式。

              根据 The Robot Report 和其他行业来源报道，公开可识别的 Air Force 合同价值至少为 $14M。实际承诺收入积压——包括未披露的合同修改、 RSO
              授予和防务主承包商下级关系——实质上更高，但公开不可得。Machina Labs 没有披露总收入、客户级收入集中度或年度客户获取率； 这些都是评估增长轨迹可持续性的标准尽调要求。

              Series C（$124M，2026 年 2 月）投资人基础包括 Woven Capital（Toyota），与汽车板块客户形成财务同向。ARM Institute 与 AFRL
              共同牵头先进制造项目，为防务客户渠道提供持续机构动能。
            claimRefs:
              - CU013
              - CU014
              - CU016
              - CU020
              - CU022
              - CU023
          - type: table
