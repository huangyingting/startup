      - number: '4.5'
        title: 资本充足性和资金续航分析
        blocks:
          - type: paragraph
            body: >
              Machina Labs 于 2026 年 2 月 4 日完成 $124M Series C。公司表示，融资所得中相当一部分将用于在美国建设大规模 Intelligent Factory——一座 200,000
              sq ft 设施，最多可容纳 50 个 RoboCraftsman 单元。其他披露用途包括向现有和新客户场地部署更多 RoboCraftsman 单元，以及扩大员工规模。公司没有披露具体资本分配拆分。

              依据公开可观察信号估算现金消耗率：公司约有 90-100 名员工，年度运营费用年化水平估计为 $25-40M；假设 Intelligent Factory 建设需要 $50-100M，并在三年内分阶段投入（约每年
              $17-33M 资本开支），高峰建设期总现金消耗估计为每年 $42-73M。低端情形下，$124M Series C 提供约三到五年运营资金续航；如果纳入更高现金消耗和资本开支，资金续航 可能短至 20
              个月。DoD 合同收入（估计到 2026 年每年 $15-25M）可抵消相当一部分运营费用，延长有效资金续航。

              最可能触发下一轮融资的节点，是 Intelligent Factory 达到初始运营能力；按典型工业建设周期判断，预计在 2027-2028 年。届时如果已部署 20-50 个 RoboCraftsman
              单元、工厂利用率爬坡，公司收入画像会明显增强，可能支撑更高估值的 Series D 或战略收购。第二个触发点可能是跨过 $50M
              ARR，或拿下规模化、多年期、独家来源防务生产合同。公司没有公开披露债务融资或项目融资工具。SDF（UAE）投资抬高了 CFIUS 审查风险， 可能对资本部署或技术访问施加条件。
