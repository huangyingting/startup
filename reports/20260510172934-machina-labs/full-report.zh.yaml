  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Machina Labs 所处市场位于三类支出交叉处：（1）面向小批量航空航天和国防应用的定制金属成形，（2）军事保障维护和 MRO
              零件制造，（3）汽车原型和预生产面板成形。公司明确不参与高产量冲压——那是全球金属成形的主导细分，传统模具和压力机技术只有在每个设计产量高于约 500–1,000 件时才达到经济性平价。

              Machina 可服务市场的核心结构特征是模具成本门槛。复杂航空航天或汽车几何的传统冲压模具每个设计成本为 $200,000–$2,000,000，工程交付期需要 6–18 个月。当批量低于约 500
              件时，这笔模具成本无法摊销，相比 Machina 的 RoboForming 等敏捷成形方法，传统冲压失去经济性。Machina
              目标产量的下限实质上是一件（紧急保障维护、原型、首件），实际上限是在传统模具具备成本竞争力之前的数百件。

              纳入的支出类别包括：面向航空航天结构、国防机体零件、高超音速结构和汽车原型面板的无模或低模钛、Inconel、高强铝（7000-series）和不锈钢板材成形。排除类别包括：常规高产量汽车车身冲压（>1,000
              件批量）、铸造、锻造、增材制造（金属 3D 打印）、CNC 方料铣削，以及面向建筑或消费品的大宗钢 / 铝加工。

              与 Machina 定位重叠的相邻市场包括金属增材制造（激光粉床熔融、定向能量沉积）、方料金属 CNC
              加工和旋压成形；这些工艺都能生产复杂的一次性金属结构，但在材料兼容性、产能和几何自由度上不同。这些相邻市场构成竞争背景：Machina 的 ISF
              工艺能加工硬质合金薄板材，复杂度达到增材制造在大幅面零件上还难以经济匹配的水平；而 CNC 加工受限于棱柱形或近净成形坯料。
