      - number: '4.4'
        title: 财务牵引力和私有指标缺口
        blocks:
          - type: paragraph
            body: >
              公开可得的 Machina Labs 财务牵引力证据，仅限于融资、具名合同授予和行业数据库估计。已知事实包括：公司在五轮融资中累计融资约 $209M， 最近一轮为 2026 年 2 月 $124M Series
              C；政府数据库公开识别的 DoD 合同授予至少 $14M；AFRL 合同 FA868425CB003 最高价值 $3.37M；Air Force RSO 至少发出过一项额外具名授予。ZoomInfo 和
              Incfact 估计年收入在 $10M-$100M 区间，中位数和员工数代理指标共同指向 2025 年约 $10-20M。Tracxn 报告截至 2024 年 12 月员工数约为 66 人。

              未知项必须按私有指标缺口处理：确切年度经常性收入或总收入；毛利率百分比；EBITDA 或净利润 / 亏损；客户收入集中度（任一单一客户占比）； 现有设施单元利用率；积压订单或管线金额；Toyota
              试点定价结构；以及来自 RoboCraftsman 单元授权或租赁的任何收入。Forge Global 的 Machina Labs 二级市场数据页列示投后估值约
              $333M，二级市场交易活跃度为有限，且没有撮合价格，确认即便是 IPO 前二级市场价格发现也不可得。

              CB Insights 将 Machina Labs 描述为 Series C 阶段，收入不可得。PitchBook 同样不披露这家私营公司的财务指标。对一家尚未达到收入里程碑的深科技初创公司而言，
              这些缺口很常见，但对无法进入公司数据室的机构投资人或收购方而言，它们构成重大承销挑战。要补齐这些缺口，需要签署 NDA，并获得经审计或管理层编制的财务资料。
