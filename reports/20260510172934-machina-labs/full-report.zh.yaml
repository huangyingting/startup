      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Machina Labs 处在多个高风险监管体系的交界处。ITAR（22 CFR Parts 120-130）由美国国务院 DDTC 执行，适用于 USML 所列防务物项的任何制造或出口。公司为美国空军制造的
              ISF 成形钛和铝航空航天结构件几乎肯定需要 ITAR 注册；机器人、AI 成形模型和数字成形规格可能受 USML Category VI 或 XI 管制。Machina Labs 尚未公开确认其 ITAR
              注册号或 DDTC 登记状态。

              EAR（15 CFR Parts 730-774）由 BIS 执行，监管两用技术。Machina 的 AI 成形软件和工艺数据可能受 ECCN 管制；UAE-SDF 投资者关系会提高任何技术转让在 EAR
              下的审查强度。CFIUS（50 USC 4565）对国防相邻技术公司的外资投资拥有广泛管辖权；UAE-SDF 参与 Series C 构成受管辖投资，可能需要强制 CFIUS
              申报。若未申报，存在被追溯审查的风险。

              处理受控非密信息的 DoD 承包商必须达到 CMMC Level 2（110 项 NIST SP 800-171 控制），Machina 在美国空军项目中几乎肯定会处理这类信息。FAR 52.204-25
              禁止承包商运营中使用特定电信设备。公司未公开披露任何 CMMC 评估、AS9100 认证或 NADCAP 资质。IP 版图包括 Stanford/Jeswiet 的基础 ISF
              专利和不断增加的竞争性申请；Machina 自有 20+ 件专利提供了一定防御覆盖，但新几何形状的 FTO 尚未验证。
            claimRefs:
