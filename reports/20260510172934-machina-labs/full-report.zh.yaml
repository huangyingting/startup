        - 跟踪国防工业基础行政令；关注 OTA 交易流
      - - 汽车 EV 平台换代
        - 驱动
        - 2025–2030（迭代高峰期）
        - OEM 需要不投模具也能快速打样车身面板；R&D 支出会反复出现
        - 获取 Toyota TMNA 试点商业条款；拓展至其他 OEM（GM、Ford、BMW）
      - - 美国制造回流 / EO 14017
        - 驱动
        - 2022 至今，仍在加速
        - 国防场景里，敏捷本土产能胜过离岸冲压
        - 确认 Machina 是否满足美国本土要求下的单一来源资质
      - - 高级材料（Ti、Inconel、7000-Al）用于高超音速 / 航天
        - 驱动
        - 当前 — 扩张中
        - Machina 热成形能力稀缺；替代风险下降；可收取价格溢价
        - 验证材料是否通过高超音速温度剖面的资质
      - - 吞吐量限制：ISF 慢于冲压
        - 制约
        - 结构性 / 永久
        - 单一设计约 500 件就是经济性上限；吃不下高批量冲压市场
        - 了解 Machina 是否有混合方案或并联单元来放大规模
      - - 国防采购周期（18–36 个月）
        - 制约
        - 当前 — 结构性
        - 试点后收入滞后期长；需要资金过桥；还需要 SaaS 模型替代方案
        - 绘制前 5 个政府潜在客户当前管线阶段；估算加权订单储备
      - - RoboCraftsman 部署资本强度
        - 制约
        - 持续 — 受工厂产能限制
        - ~30–35 个单元 / 年的产能限制部署；Series C 为约 50 单元工厂提供资金
        - 确认 200k sqft 设施的工厂建设时间表和年单元产能
      - - 熟练人才稀缺（机器人 + 冶金）
        - 制约
        - 当前 — 市场紧
        - 招聘速度可能跟不上部署目标；LA 科技人才市场有工资通胀风险
        - 查看职位发布节奏；评估工程团队流失率与留存
      - - 自动化制模领域的竞争性 R&D
        - 制约
        - 中期（3–7 年）
        - 模具生产若更快、更便宜，会侵蚀 Machina 在中批量生产中的成本优势
        - 监控制模自动化创业公司和在位厂商（Schuler、Fagor）的 R&D 支出
      - - 供应链脆弱性（存量零件停产）
        - 驱动
        - 当前 — 对美国空军很紧迫
        - 单一来源停产件带来国家安全风险，制造紧迫性；政府有签约动力
        - 评估多少平台件号没有替代美国供应商
