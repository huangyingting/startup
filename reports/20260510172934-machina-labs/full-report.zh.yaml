      - number: '5.5'
        title: 路线图和技术风险
        blocks:
          - type: paragraph
            body: >-
              Intelligent Factory——200,000 sq ft、50+ 个 RoboCraftsman 单元——是 Machina Labs Series C 资金最关键的资本部署里程碑。 该设施将把当前
              8 单元 Machina One 产能跃迁到面向防务和先进移动客户的生产级规模。根据典型工业建设周期和 2026 年 2 月融资完成 后的资本分阶段安排，建设预计发生在 2027-2028
              年。Intelligent Factory 投产前，Machina 的收入容量受当前单元数量的结构性限制。


              AI 路线图分三条线：扩展材料模型，覆盖更广合金族和成形制度；推进到针对新几何体的全自主刀路生成（相对当前 AI 辅助人工审核）；部署闭环质量控制，取消成形后人工检验。 Nvidia 的 NVentures
              投资与成形模型 AI 训练和推理背后的 GPU 计算依赖形成战略匹配。关键技术赌注包括数据飞轮假设（新增单元产生的成形数据会带来复利式 AI
              精度提升）、数字孪生预测精度主张（未公开验证），以及在单元数量扩张时维持工艺资质等效性的能力。


              关键技术风险包括：（1）Intelligent Factory 能否按速度、按预算落地；（2）Architect AI 团队的关键人依赖；（3）ISF
              的结构性产量天花板，使可服务市场相对规模化冲压受限；（4）18-36 个月 DoD 重新认证窗口约束工艺迭代速度；（5）机器人臂和 GPU 计算供应商集中风险。ISF 工艺创新专利提供主要 IP 保护，但 ISF
              学术文献是公开的，有资源的竞争者可能开发类似方法。
            claimRefs:
              - CE007
              - CE008
              - CE009
              - CE029
              - CE030
              - CE031
              - CE034
              - CE037
              - CE038
              - CE040
