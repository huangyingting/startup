      - number: '5.3'
        title: 客户工作流和集成
        blocks:
          - type: paragraph
            body: >-
              面向客户的工作流从提交 CAD 文件、材料规格和公差要求开始，提交方式可以是 Architect 的接收界面，也可以是直接数字传输。Architect AI 随后根据 CAD 几何体生成双臂
              RoboForming 刀路；新几何体需要数小时，已见过的形状只需数分钟。数字孪生仿真会验证刀路，并在任何实物成形开始前， 将预测变形与材料极限进行核对。


              RoboCraftsman 单元随后执行已验证刀路，实时传感器反馈会在成形过程中持续调整力和路径参数。成形完成后，零件接受 3D 扫描，并与 CAD
              名义值对比进行首件检验。之后进行机器人修边、钻孔和边缘精加工，最后做人工检验。从 CAD 提交到首件交付，大多数几何形状需要 24-48 小时；相比硬模具 6-18 个月周期，这是核心价值主张。


              工作流中的人工步骤主要留在最终检验和客户交付环节。公司没有披露面向企业客户系统的 ERP 或 PLM 集成层，也没有公开 API 或开发者 SDK 可把客户工程环境接入
              Architect。对于供应链数字化标准严格的大型主承包客户，集成摩擦是潜在缺口。每次交付都会包含可追溯性文档包，满足防务项目追溯要求； 但这些文档对 AS9100D 或 NADCAP
              合规的深度尚未得到公开验证。
            claimRefs:
              - CE002
              - CE003
              - CE005
              - CE020
              - CE023
              - CE024
              - CE036
