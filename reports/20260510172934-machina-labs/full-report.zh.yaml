      - number: '2.5'
        title: 规模测算证据缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >
              Machina Labs 的市场规模分析仍有多个重要证据缺口，原因包括没有公开报告单独切出小批量硬质金属板材成形细分，分析师估计相互冲突，以及 Machina 财务数据仍属私有。

              最重要的结构性缺口是，没有大型分析师报告专门量化国防和航空航天领域的小批量（低于 500 件）硬质金属板材成形市场，而这正是 Machina 的核心
              SAM。公开市场报告通常覆盖宽泛的渐进式板材成形机器市场（$412M，GrowthMarketReports）、全球金属成形市场（$202B，TBRC）或 A&D MRO
              市场（$142.7B，GVR）；任何一个都无法在没有估算和细分假设的情况下直接映射到 Machina 的可服务利基。

              第二，公开的全球金属成形市场估计差异明显。The Business Research Company 估计 2025 年为 $202B，而 Precedence Research 的 2025 年基线意味着约
              $174B，相差 16%；差异来自产品纳入范围、地理覆盖和计算方法不同。这些冲突会传导到所有基于全球 TAM 推导的 A&D 份额和 SAM 估计。

              第三，公开 ISF 市场规模估计差异很大：GrowthMarketReports 给出 $412M（2024），而纳入手动和 CNC ISF 的更宽口径把估计推向 $1.3B。范围不一致（仅机器人 ISF vs.
              全部 ISF）意味着仅凭这些数字，无法清晰界定 Machina 直接可触达的 ISF 竞争市场。

              第四，Machina Labs 收入私有且未披露，无法自下而上验证 SOM。$100–300M 的 5 年 SOM
              估计完全基于代理变量，并假设单元部署速度、单元收入和客户扩张均能兑现；这些假设没有独立验证。若要实现 $100M+ 年收入，Machina 需要部署 20–50 个单元并满负荷运行——这取决于
              Intelligent Factory 建设和客户管线开发能否成功执行，公开来源无法评估。

              第五，汽车原型面板市场规模尤其不透明。虽然全球汽车金属冲压是 $71–124B 市场，但原型和预生产小批量子细分——Machina 可触达的部分——尚未被任何公开报告独立测算。Machina/Toyota
              试点已确认，但商业条款和产量不公开。
