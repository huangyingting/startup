        - 数十年 ISF 经验；覆盖多种合金；有建筑和航空航天项目组合
        - 仅限日本；无美国 DoD 资质；无 AI 自适应控制；首件周期更慢；受 ITAR 限制
      - - Hadrian
        - 相邻（不同工艺 — CNC 加工）
        - 已融资 $260M；估值 $1.6B（2025 年 7 月 Series C）
        - 面向国防与航天主承包商的精密 CNC 零部件
        - 自动化 CNC 工厂；Founders Fund 领投；棱柱 / 车削零件 CNC 吞吐快
        - 无法成形钣金；仅限可机加工几何；不能替代 Machina 满足曲面面板需求
      - - 传统冲压工厂（如 Shiloh、Tier-1 代工厂）
