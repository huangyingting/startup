      - 依赖或缺口
      - 可能性
      - 严重性
      - 缓解措施
      - 尽调路径
    rows:
      - - CEO Edward Mehr（联合创始人）
        - 主要 DoD 和商业客户关系、融资；未披露继任者
        - 中
        - 高 — 客户关系、DoD 签约可信度、投资者信心均有风险
        - 未披露继任计划、副 CEO，或拥有独立客户关系的 CRO
        - 确认关键人物保险；索取组织架构图；评估副 CEO 准备度
      - - CTO Dr. Babak Raeisinia（联合创始人）
        - 核心 AI 成形模型架构、ISF 工艺 IP；未披露副 CTO
        - 中
        - 高 — 离任可能使模型开发停摆，并削弱技术差异化
        - 未披露副 CTO、VP Engineering 或跨团队记录的模型架构
        - 索取技术组织架构图；评估模型文档；确认留任激励
      - - AI 和机器人工程人才
        - LA 人才市场竞争激烈；大型科技公司争抢同一批工程师
        - 高
        - 中 — 招聘延误可能拖慢 Intelligent Factory 配员和模型开发
