      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >
              Machina Labs 呈现出高资本强度、低透明度的财务画像，符合一家正在建设制造基础设施的深科技 Series C 公司。按机构标准看，当前收入质量处于低到中等水平：
              占主导的项目合同收入模式不平滑，依赖里程碑，且集中在少数政府和战略客户手中。公司没有证明经常性收入，没有规模化 SaaS 或授权收入，也没有披露毛利率。 但 DoD SBIR Phase III
              机制提供受国会保护的多年期生产路径；一旦项目确立，收入可预测性会提高。

              毛利路径有吸引力，但尚未在规模上证明。项目制防务工作通常为专业制造商带来 30-50% 毛利率；软件定义制造在结构上可能跑赢传统合同制造商。 如果 RoboCraftsman FaaS 模式能在
              Intelligent Factory 中成功规模化变现，可能形成类似订阅的经常性经济性，并带来高增量毛利。 但这仍是前瞻场景，取决于工厂完工、客户采用和定价权。

              资本强度是核心财务风险。$50-100M 的 Intelligent Factory 建设叠加每年 $25-40M 运营现金消耗，意味着如果工厂收入没有按计划爬坡， Machina Labs
              很可能需要额外资本。约 $333M 投后估值（Forge Global 二级数据）对应 2025 年估计收入约 16-33x
              倍数；只有工厂规模化潜力才能支撑这样的高倍数。关键尽调阻碍包括：没有毛利率数据；没有客户收入集中度；没有单元利用率或积压订单数据；没有 Series C
              资金分配拆分。任何只依赖公开信息的投资人，都无法在没有数据室访问权的情况下承销这家公司。
