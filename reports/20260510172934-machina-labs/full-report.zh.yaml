      - number: '6.2'
        title: 具名客户证据
        blocks:
          - type: paragraph
            body: >
              最强客户证据来自政府合同记录。Air Force Research Laboratory SBIR Phase III 合同（FA868425CB003，$3.37M）在 HigherGov
              采购记录中得到确认，并由 Machina Labs 于 2025 年 9 月公布，确立 AFRL 是 SBIR 独家来源机制下的 Air Force 认证生产供应商。AFRL 已专门为防务零件生产认证
              RoboCraftsman 工艺，这是公开记录中最深的合同验证。

              Air Force Rapid Sustainment Office（RSO）授予 Machina Labs 一份合同，支持在 UDRI 部署的 AI 驱动飞机保障制造。 RSO 随后购买了第二个
              RoboCraftsman 单元，这是组合中最清晰的复购和客户扩张信号。RSO 部署覆盖 C-130、C-5、C-17 和 F-16 飞机保障零件，针对经典 MRO
              用例：原始工装模具已不存在，传统采购周期会拉长到数月甚至数年。

              Toyota Motor North America 于 2025 年 9 月 / 10 月被公布为合作伙伴，定制车身面板试点（定制尾门）作为首件。
              这段关系作为商业验证具有战略意义，但在公开确认试点后采购承诺之前，不应被表述为生产收入关系。

              NASA 完成了一个环形储罐案例研究（通过 RoboForming 成形的复合几何燃料箱），展示了航天级复合曲率能力，但没有披露合同金额或延续时间线。
              新闻材料中提到一家未具名防务主承包商，涉及导弹和高超音速部件，但采购数据库未独立确认。主题公园客户被暗示用于定制金属制造，但没有具名。
