              典型商业合同会面临竞争性重新招标，而 SBIR Phase III 项目允许机构在 15 USC section 638(r) 下，以独家来源方式把后续生产合同授予 Phase II
              获胜者，绕开标准竞争性采购要求。Machina Labs 的 AFRL SBIR Phase III 合同利用了这一机制，提供了一条受国会保护的收入渠道； 与公开竞争的防务合同相比，可预测性显著更高。如果
