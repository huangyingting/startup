  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式和收入流
        blocks:
          - type: paragraph
            body: >
              Machina Labs 通过三条主要收入流变现，但没有一条公开量化。第一条、也是目前占主导的收入流，是面向防务和航空航天客户的项目制制造合同： Machina
              按项目或订单、以固定价格生产成形金属零件。最显眼的例子是 AFRL 合同（FA868425CB003），它通过 ARM Institute 的 SBIR Phase III 机制支持 AI
              驱动的机体保障，最高价值 $3.37M，2025 年 2 月授予、2025 年 9 月公布。Air Force Rapid Sustainment Office 还授予了第二份合同，金额未披露。合计看，截至
              2025 年 4 月的行业分析，公开可识别的 DoD 合同价值至少为 $14M。

              第二条收入流来自 Small Business Innovation Research（SBIR）拨款和合同收入。根据 15 USC section 638(r)，SBIR Phase III
              项目可以通过独家来源机制延续到批量生产，这是把 Machina 研发工作接到国防运营采购上的主要机制。第三条，也是公司长期最具战略意义的模式，是 RoboCraftsman 单元租赁或工厂即服务（FaaS）。截至
              2026 年 5 月，公司尚未披露单元租赁费率、利用率目标或任何已签租赁安排。 规划中的 Intelligent Factory 最多可容纳 50 个 RoboCraftsman
              单元；这座设施带来的收入仍是未来状态。第四条萌芽中的收入可能性，是向第三方制造商授权软件或 Architect 平台，但公开记录中没有当前授权收入证据。2025 年收入结构估计高度偏向项目 / 合同收入，占比超过
              80%。
