  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Machina Labs 在六类竞争者之间竞争；这些类别共同定义了买方为满足同一底层需求可选择的全部替代方案：无需模具投入，即可快速交付复杂、小批量、硬质金属板材结构。

              第一类是使用同一工艺的直接同业（渐进式板材成形）。日本 Kikukawa Kogyo 是技术上最可比的公司——数十年 ISF 实践、广泛合金覆盖和航空航天参考客户——但它只在日本运营，并依赖传统
              CNC-ISF，而非 AI 自适应机器人控制，因此在美国国防市场不具备竞争力。

              第二类是资金充足、使用相邻技术的航空航天制造颠覆者。Divergent Technologies 在 2025 年 9 月 Series E 轮融资 $290M、估值 $2.3B，使用其 Digital
              Additive Production System (DAPS) 制造基于节点的晶格结构。Divergent 的工艺针对结构节点和空间框架组件优化，无法生产构成 Machina
              核心国防用例的大尺寸、薄壁、曲面板材。通用媒体有时把两家公司放在一起比较，但它们解决的是结构不同的成形问题，并不实质性竞争同一批订单。

              第三类是面向国防和航天的 CNC 精密加工。Hadrian 在 2025 年 7 月以 $1.6B 估值融资 $260M，正在为国防和航天供应链建设自动化 CNC 工厂，用于精密机加工部件。Hadrian
              的工艺处理车削和铣削零件（支架、接头、壳体、紧固件），而非成形板材结构。它是相邻玩家，但不能替代 Machina 的用例。

              第四类是传统冲压在位者和加工车间。传统压力机和模具制造商代表航空航天和国防板材成形的现状。它们的核心限制是模具成本（每种几何 $200K–$2M）和交付周期（6–18 个月），使其对任何低于约 500
              件的批量都在结构上不经济。这些在位者拥有强供应链关系，并曾通过国防主承包商认证，但缺少 Machina 客户需要的敏捷性。

              第五类是金属增材制造（AM），包括激光粉床熔融（LPBF）和电弧增材制造（WAAM）。金属 AM 可在无模具情况下生产高复杂度近净成形结构，但无法经济地生产任何维度超过一米的大幅面薄板面板——而这正是
              Machina 在 AFRL 和汽车面板组合中的主导几何。对板材应用而言，金属 AM 的每公斤材料成本也高于 ISF，吞吐更慢。

              第六类是内部自建（自有成形能力）。DoD 维修厂和大型航空航天主承包商都有一定成形能力，但设备针对高产量生产批次优化，缺少 Machina 的 RoboCraftsman 提供的 AI 自适应闭环过程控制。DoD
              选择通过 SBIR 与 Machina 签约，而不是扩建维修厂产能，本身就是一个隐含的市场创建信号。
