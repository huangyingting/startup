      - number: '3.4'
        title: 切换成本、锁定效应与多归属分析
        blocks:
          - type: paragraph
            body: >
              Machina Labs 短期内最可防守的竞争位置，来自工艺层面的切换成本，分三层发挥作用：监管和认证摩擦、数据和刀路锁定、战略投资方整合。

              在监管和认证层面，政府和国防买方面临最大摩擦。AFRL 对 Machina RoboForming 工艺的 SBIR Phase III 认证（合同
              FA868425CB003），需要多年开发周期、材料试样测试、尺寸验证和 DoD 制造就绪度评审。DoD Manufacturing Technology 项目文件估计，为同类国防应用重新认证一家新制造供应商需要
              18–36 个月，测试和验证成本可超过 $1,000,000。这不是偏好壁垒，而是采购要求：某个工艺一旦在特定 SBIR
              或生产合同下完成认证，项目经理就不能简单切换到未认证供应商，否则会触发完整再认证周期、重新谈判合同条款，并承担供应中断风险。对于由紧迫需求驱动的保障维护订单（老旧飞机零件短缺），24
              个月再认证延误的成本很可能以飞机可用天数衡量——这种强锁定效应独立于 Machina 的商业定价。

              在数据和刀路层面，Machina 的 Architect CAM 软件会生成与其双臂 RoboCraftsman 单元几何和自研力反馈过程模型绑定的机器人刀路。通过 Architect
              转换的客户设计无法迁移到竞争者机器上——无论是传统 CNC-ISF、Divergent 的
              DAPS，还是任何其他商用成形平台。想切换成形供应商的买方，需要重新设计刀路、重跑工艺验证试验，并为每个零件号重新投入首件认证。对于已有多个零件号进入 Machina 系统的客户，这种刀路锁定是温和但真实的摩擦。

              Machina 与同业之间的多归属分析受到结构性限制。Machina 与 Divergent 之间的多归属需要不同零件类型，而不是同一订单分给两家供应商。Machina 与 Kikukawa
              之间的多归属意味着要从一家位于日本、未通过 DoD 认证的供应商采购；对国防硬件而言，ITAR 和 DoD 美国本土制造要求禁止这样做。Machina 与传统冲压商之间的多归属在 500
              件以下批量中因模具成本摊销而不具备经济理性。Machina 与金属 AM 之间的多归属在部分几何上理论可行，但需要重新开发刀路，并可能触发不同的下游认证。实际结果是，在硬合金、大板材、小批量、DoD
              认证美国本土供应这一特定组合下，Machina 客户没有可用的多归属伙伴；在政府细分中，它实际上是单一来源。

              战略投资方整合增加了第四层：Lockheed Martin Ventures 既是投资方也是活跃客户；Woven Capital (Toyota)
              既是投资方也是汽车试点客户。这些双重关系带来优先管线入口，Divergent、Hadrian、Kikukawa 等结构性竞争者缺少同样的投资方—客户对齐，难以复制。
