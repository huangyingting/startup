      - number: '4.2'
        title: 市场进入动作和销售效率
        blocks:
          - type: paragraph
            body: >
              Machina Labs 的市场进入策略围绕两条并行渠道搭建：一条是通过 SBIR/SBIR Phase III 项目和直接 OEM
              接触进入防务采购；另一条是与战略投资人客户推进商业汽车和航空航天试点。防务渠道销售周期长——从最初 SBIR 提案到合同授予通常需要 12-36 个月——但能带来多年期合同，并对前瞻收入提供较高可见度。AFRL
              SBIR Phase III 路径提供受国会保护的独家来源机制，可绕开标准竞争性采购； 一旦项目确立，流失风险随之降低。

              商业汽车侧，Toyota Motor North America 车身面板试点在 2025 年 9 月 UP.Summit 上公布，并与 Woven Capital
              投资同时出现，是典型的“战略投资人即首批客户”模式。Woven Capital 同时担任 Series C 领投方和试点伙伴，把客户验证阶段压缩进投资关系里，从而缩短典型企业销售周期。
              但该试点的财务条款、规模和排他性约定完全未披露，无法计算客户获取成本（CAC）或回本周期。

              对这一阶段的私营公司而言，销售效率代理指标非常有限。公司约有 90-100 名员工；根据公开可见领导层，包括一名 SVP Aerospace and Defense 和一名 Chief Business
              Officer，商务拓展团队估计为 5-7 人，隐含每个合同胜单的 CAC 较高。仅防务项目投标准备就要花费数十万美元。 公开资料没有客户数量、胜率或平均合同价值数据。公司的战略投资人基础——Woven
              Capital、Lockheed Martin Ventures 和 NVentures——实质上是一张高价值转介绍网络， 降低了目标垂直市场里的冷启动获客成本。
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
      - number: '4.3'
        title: 成本结构、资本开支和毛利率
        blocks:
          - type: paragraph
            body: >
              Machina Labs 运营的是资本密集型业务模式，三大成本中心是设施租赁和建设、RoboCraftsman 单元制造资本开支，以及人员。公司没有公开披露毛利率数据。
              作为参照，可比的合同制造和先进机器人服务公司，项目工作毛利率通常为 25-45%；软件定义或经常性服务组件毛利更高，材料转付型合同毛利更低。

              每个 RoboCraftsman 单元估计建设成本为 $500K-$2M，包含双机器人臂、线性导轨、传感和扫描系统，以及 Architect 软件栈。 如果所有单元都内部部署，按公司披露的每年 30-35
              个单元制造能力计算，年度单元生产资本开支对应 $15M-$70M。规划中的 200,000 sq ft Intelligent Factory 是 Series C 资金的主要用途，估计需要 $50-100M
              建设和设备投入，并在两到三年内分阶段完成。

              公司约有 90-100 名员工；按洛杉矶地区航空航天和机器人工程师每年 $200K-$250K 的全成本薪酬估算，工资和福利每年约 $18M-$25M。 加上设施租金、保险、生产原材料、软件工具和 G&A
              开销，工厂收入抵消前的总运营费用估计为每年 $25-40M。钛和高强铝合金在防务合同中通常按成本转嫁给客户， 从而限制材料毛利风险。未发现信用额度、资产支持贷款或项目专项债务融资的公开证据。
