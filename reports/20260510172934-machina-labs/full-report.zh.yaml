      - - AS9100 Rev D 证书及范围
        - 主 OEM 供应商资格要求 AS9100；缺失该认证会卡住商业扩张
        - 阻断
        - 要求提供 SAE/IAQG 认证审核员出具的证书及范围
      - - 经审计或审阅的财务报表（FY2024、FY2025）
        - 评估资本充足性需要烧钱速度、毛利率和现金头寸
        - 阻断
        - 要求提供审计或审阅业务报告；至少可接受经审阅财务报表
