      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              CEO Edward Mehr 和 CTO Dr. Babak Raeisinia 共同创立 Machina Labs，合计掌握主要客户关系、技术架构，以及 AI 成形模型栈的组织知识。公司未公开披露副
              CTO、VP Engineering 或正式接班计划。任一创始人离开，都会对技术开发和政府客户关系造成重大扰动。

              为支撑 50 单元 Intelligent Factory，公司需要从约 90-100 名员工扩至 300+，执行难度很高。Los Angeles 市场的 AI 和机器人工程师竞争激烈，Machina 要与
              Big Tech 和航空航天主承包商抢人。BLS 职业数据确认，专业生产工人供给紧张。招聘必须与 ITAR 合规扩容、质量体系建设和工厂施工同步推进。

              金属成形设备市场以 4-5% CAGR 增长，美国 A&D 市场年规模仍高于 $700B，但市场增长无法缓解工厂时间表上的执行风险。DoD ManTech 2025
              年度报告将劳动力和供应链列为防务制造供应商的最高风险。
            claimRefs:
