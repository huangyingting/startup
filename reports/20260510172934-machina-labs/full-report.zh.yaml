      - number: '7.6'
        title: 缓释措施、监测指标与终止标准
        blocks:
          - type: paragraph
            body: >
              现有主要缓释来自结构性安排：SBIR Phase III 单一来源授权（15 USC 638(r)）保护 AFRL 合同免受竞争性重新采购；Woven
              Capital（Toyota）带来投资人与客户一致性，降低汽车销售周期风险；多机型组合（C-130、C-5、C-17、F-16）在美国空军这一客户内部实现分散；20+ 件已授权专利构成部分 IP 防御边界。

              应触发投资者关注的监测指标包括：SBIR 收入集中度连续两个季度仍高于 70%，且没有商业合同落地；收到关于 SDF 投资的 CFIUS 询问或通知；DoD 因 CMMC 不合规发起审计或发出整改通知；CEO 或
              CTO 离职且未指定继任者；Intelligent Factory 建设成本超支 20%+ 或进度延误 6+ 个月；到 2026 年底仍未把 Toyota TMNA 试点转为生产订单。

              打破投资论点的事件包括：CFIUS 强制 SDF 剥离并扰动股权结构；ITAR 或 CMMC 执法导致 AFRL 单一来源签约权丧失；到 2027 年仍未取得 CMMC Level 2 认证；或到 2027
              年中仍未拿下任何商业生产合同。
            claimRefs:
              - CR041
