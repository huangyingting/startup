      - number: '6.4'
        title: 买方旅程和采购复杂度
        blocks:
          - type: paragraph
            body: >
              防务客户获取遵循 SBIR 路径：项目经理识别制造能力缺口，发布 Phase I/II SBIR 征集，评估首件交付物；如果技术满足资质要求，就推进到 Phase III
              独家来源生产。从首次接触到生产资质，这一流程需要 18 到 36 个月，是防务收入快速增长的主要障碍。回报是结构性受保护的收入： SBIR Phase III 在 15 USC section 638(r)
              下绕开竞争性重新招标。

              汽车客户的买方旅程，要把表面光洁度、尺寸精度和周期时间，与传统模具投资做工程评估。Toyota 试点从定制尾门面板开始——这种几何体复杂度足够展示 ISF
              相对工装的价值，但又没有复杂到超过客户首件风险容忍度。试点结构让 Toyota 在承诺生产量前，可以评估总拥有成本（避免工装 + Machina 单件成本 + 工程时间）。

              NASA 和政府 R&D 客户通常通过项目特定工作说明书合作，并设定固定交付物（例如环形储罐案例研究）。这些关系不一定会转化为生产项目； 环形储罐案例研究发布为能力验证，而不是经常性收入关系。

              RoboCraftsman 单元租赁或前沿部署模式（如 UDRI）增加了一种不同买方旅程：客户在现场接收 RoboCraftsman，减少把 Machina Labs
              认证为传统供应商的需求，并把关系转向资本设备或服务合同模式。从客户视角看，RSO 第二个单元采购表明这一模式能转化为重复资本支出。
            claimRefs:
              - CU013
              - CU017
              - CU018
              - CU024
              - CU025
              - CU026
          - type: table
            tableRef: TU004
            claimRefs: []
      - number: '6.5'
        title: 集中度风险和反向信号
        blocks:
          - type: paragraph
            body: >
              客户集中度实质上很高。AFRL 和 RSO 合计几乎肯定代表 Machina Labs 当前收入的大部分，因为公开确认的唯一合同价值是 $3.37M（AFRL Phase III），外部引用的 Air Force
              授予总额为 $14M+。Toyota 仍处试点阶段，NASA 处于案例研究状态，因此商业收入相对 DoD 很可能并不重要。这意味着任何防务预算再分配、SBIR 项目重组或 AFRL 项目取消，都会对
              Machina Labs 的财务画像产生不成比例的影响。

              截至 2026 年 5 月，没有在任何公开可得来源中发现客户流失、合同终止、投诉或范围缩减事件。缺少公开负面证据，与强客户满意度相符，但不能证明这一点。
              防务合同执行期间很少产生公开负面信号；反向指标最常见会表现为合同工具修改、项目延期或项目取消，目前没有相关报道。

              未具名防务主承包商关系（导弹 / 高超音速）是一项未确认风险：如果这段客户关系仍在试点而非生产阶段，就不能计入经常性收入贡献。没有独立采购记录确认该关系。 此外，Forge Global
              二级市场挂牌暗示，公司尚未达到一个会显示客户基础已推动独角兽级经常性收入的估值；这与早期商业客户画像一致。

              UAE 的 Mubadala/SDF 参与此前融资轮，带来 CFIUS 暴露，并对防务客户留存构成结构性风险：如果 CFIUS 调查导致剥离要求或限制防务合同资格， AFRL 和 RSO
              收入都会面临风险。这一风险应被明确尽调。
            claimRefs:
              - CU027
              - CU028
              - CU029
              - CU030
              - CU031
              - CU032
          - type: table
            tableRef: TU005
            claimRefs: []
          - type: figure
            figureRef: FU004
            claimRefs: []
      - number: '6.6'
        title: 展示材料
        blocks:
          - type: callout
            title: SBIR 独家来源机制创造耐久收入护城河
            body: >
              AFRL SBIR Phase III 合同依据 15 USC 第 638(r) 条提供受法律保护的单一来源收入，在 Phase III
              合同载体整个有效期内绕过竞争性重新招标。该机制叠加已完成的工艺认证，形成了一个结构上更稳固的政府收入通道，比公开竞争型防务合同明显更可预测。
            calloutType: strength
            claimRefs:
              - CU013
              - CU014
          - type: callout
            title: RSO 购买第二个单元，是客户组合中最清晰的扩张信号
            body: >
              Air Force RSO 在 UDRI 采购第二个 RoboCraftsman
              单元，是客户组合里最强的复购信号。它说明客户对首次部署足够满意，愿意继续投入资本采购第二台设备，也把覆盖范围扩展到更多飞机平台。这是资本设备扩张，不只是服务合同续约。
            calloutType: strength
            claimRefs:
              - CU003
              - CU016
          - type: callout
            title: DoD 客户集中度显著，商业收入尚未对冲
            body: >
              AFRL 和 RSO 合计构成唯一已确认的生产阶段客户，而商业客户（Toyota、NASA）仍处于试点或案例研究阶段，DoD 几乎肯定贡献了当前收入的 70% 以上。任何防务预算再分配、SBIR
              重组或项目取消，都可能造成不成比例的冲击。SBIR Phase III 单一来源机制提供部分保护，但不能消除该风险。
            calloutType: risk
            claimRefs:
              - CU027
              - CU028
              - CU029
          - type: callout
            title: CFIUS/SDF 敞口是防务客户资格中被低估的风险
            body: >
              阿联酋主权财富基金参与 Machina Labs 以往融资轮，带来 CFIUS
              敞口；最坏情况下，可能影响公司承接涉密或受限防务合同的资格。这不是已确认的不利事件，但属于结构性风险，任何交易前的尽调都应直接处理，并取得独立 CFIUS 意见。
            calloutType: risk
            claimRefs:
              - CU030
              - CU032
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重性排序
        blocks:
          - type: paragraph
            body: >
              Machina Labs 的风险画像来自双重身份：它既是防务承包商，也是拿了 VC 融资、试图大规模建设工厂的深科技初创公司。最严重的风险集中在监管与法律：ITAR 合规尚未确认，CMMC Level 2
              认证状态未公开，阿联酋 Sovereign Development Fund 参与 Series C 带来尚未公开解决的 CFIUS 审查义务。三项监管事项只要有一项失败，都可能导致 DoD 合同暂停，而 DoD
              是公司的主要收入来源。

              第二层风险是运营与依赖风险：计划中的产能全部集中在 Chatsworth 单一工厂，依赖 KUKA 工业机器人（母公司 Midea Group 为中国企业），且多数收入依赖单一客户类型（美国空军 SBIR
              项目）。财务风险也不小，但 $124M Series C 在一定程度上缓冲了压力；不过工厂建设很吃资本，若拿不到真实财务数据，跑道估算不确定性很高。

              人员与执行风险构成最后一层：CEO Edward Mehr 和 CTO Dr. Babak Raeisinia 掌握深厚组织知识，公司未披露接班安排；在保持 ITAR
              合规和质量标准的同时把员工规模扩大三倍，是重大的执行挑战。目前未发现专利诉讼、产品责任或环境执法事件。GMI 金属成形设备市场数据和 Mordor Intelligence A&D
              市场研究确认了宏观顺风，降低市场风险，但不能缓解执行或监管风险。
            claimRefs:
              - CR001
