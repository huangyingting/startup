      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Machina Labs 由 Edward Mehr 和 Dr. Babak Raeisinia 联合创立。Edward Mehr 担任 CEO 兼联合创始人，曾任职 Relativity
              Space、SpaceX、Google 和 Microsoft，经历横跨先进制造、软件和技术基础设施。Dr. Babak Raeisinia
              是联合创始人兼应用与合作负责人，拥有材料科学博士学位，也是公司在渐进式板材成形、冶金和成形工艺研发方面的主要技术作者。

              两位创始人的组合正是 Machina 差异化路径的核心：Mehr 带来软件 / AI 能力，Raeisinia 拥有深厚冶金与材料科学知识。扩展管理层包括 John Borrego（航空航天与国防
              SVP）、Kyle Hickey（工程 VP）、Sarah Ramuta（总法律顾问）、Matteo Bastreghi（财务负责人）和 Ronen Lebi（首席商务官）。董事会成员包括 Edward
              Mehr、Babak Raeisinia、Sam Smith-Eppsteiner（Innovation Endeavors）和 Peter Lee。

              关键人风险明显：两位联合创始人分别承担难以替代的技术和商业角色，Edward Mehr 也是主要对外发言人。截至 2024 年 12 月，Machina Labs 约有 66 名员工，较上一年增长约 16%。到
              2026 年 5 月，员工数估计为 90–100 人。公司计划让 Intelligent Factory 配备约 50 个 RoboCraftsman 单元，并雇用约 150 名工人。

              截至 2026 年 5 月，公开来源未发现 Machina Labs 有重大领导层离职、裁员、诉讼或不利雇佣事件记录。其治理结构符合创始人主导的 Series C
              公司特征：董事会小，独立监督有限。公司未公开披露继任计划。
