      - number: '3.3'
        title: 相邻竞争者画像：Hadrian、传统冲压与金属 AM
        blocks:
          - type: paragraph
            body: >
              Hadrian 是一家位于洛杉矶的自动化精密加工公司，成立于 2020 年，是国防制造创业生态中融资最多的相邻竞争者。Hadrian 2025 年 7 月 $260M Series C 轮由 Founders
              Fund 领投，Andreessen Horowitz 参与，公司估值约 $1.6B。Hadrian 的策略是建设自动化 CNC
              工厂，以传统加工车间一小部分交付周期，为国防和航天供应链生产精密机加工金属部件（紧固件、支架、壳体、齿轮、涡轮盘）。Hadrian 可服务的几何受方料限制：其 CNC
              工艺针对棱柱形和车削零件优化，不适合成形薄板结构。向 Machina 订购钛合金机体蒙皮的客户，无法从 Hadrian 订购同一个零件；反过来，从 Hadrian 购买精密机加工铝壳体的买方，也不太可能需要
              ISF 成形板材结构。重叠只存在于组合层面——两家公司都瞄准美国国防和航天主承包商供应链——但产品不能互相替代。Hadrian 的 $1.6B 估值和 Founders Fund
              背书，是一个竞争参照点，可能影响投资者对 Machina 低调资本效率叙事的兴趣。

              传统冲压在位者——包括 Shiloh Industries、Tower Automotive 等 Tier-1
              金属成形厂，以及数十家区域航空航天加工车间——代表除了最复杂、小批量、硬质金属成形需求以外的主导现状。其结构性限制是模具经济性：复杂航空航天几何的模具成本为
              $200,000–$2,000,000，工程开发、制造和验证需要 6–18 个月。当每个设计产量高于约 500 件时，传统冲压在单件成本上可与 Machina
              持平甚至占优。在位冲压生态深植于国防主承包商供应链，拥有数十年认证记录、首件测试文件和既有 MRO 关系。不过，在 Machina 所处的按需、小批量、硬合金应用中，传统冲压商基本无法竞争：它们缺少 CAD
              到零件的数字工作流、交付速度，也不愿为小批量承担模具摊销损失。

              金属增材制造（metal AM）涵盖 Velo3D 和 Nikon SLM Solutions 等激光粉床熔融（LPBF）厂商、定向能量沉积（DED）厂商和电弧增材制造（WAAM）提供商。金属 AM
              提供所有竞争工艺中最高的几何复杂度——三维设计自由度几乎不受限制——且无需模具。相对 Machina 的 ISF 工艺，它的限制包括：（1）无法以可承受成本生产任何维度超过约一米的大型薄壁板材；（2）钛和
              Inconel 的每公斤成本显著高于板材成形；（3）面板面积工件的吞吐更慢；（4）表面光洁度和残余应力特征可能需要额外后处理，才能用于疲劳关键的航空航天结构。金属 AM
              在先进制造生态中更互补而非可替代：Machina 处理大幅面、源自板材的几何，金属 AM 处理紧凑、高复杂度且有精细内部特征的结构。许多国防项目两者都会用。
