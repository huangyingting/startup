      - - 竞争位置
        - 有差异化但受威胁 — AM 替代方案在改善
        - 中
        - 传统维保护城河真实；商业业务竞争更激烈
      - - 退出路径
        - 战略并购最可能；IPO 还需 5-7 年
        - 低
        - 退出倍数取决于工厂规模化成功；并购可比公司暗示更低倍数
