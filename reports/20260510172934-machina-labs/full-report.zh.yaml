      - number: '5.6'
        title: 开发者和生态信号
        blocks:
          - type: paragraph
            body: >-
              Machina Labs 的开发者和生态信号很薄，但这与一家把核心技术留在内部的深科技制造初创公司相符。截至研究日期，github.com/machinalabs 上存在 GitHub
              组织，但没有具有显著星标数、贡献者活动或发布历史的公开仓库。对一家主要 IP 是专有硬件 / 软件制造系统，而非软件平台或 API 产品的公司来说，这符合预期。未在 Machina Labs 名下发现 npm
              包、PyPI 库或 HuggingFace 模型发布。


              技术深度体现在 Machina Labs 官方资源出版物中——关于机器人和 AI 渐进板材成形、复合材料工装进展，以及 NASA 环形储罐案例研究的详细技术文章——这些内容显示的是扎实工程知识，
              而非营销抽象。AFRL SBIR 项目交付物虽属保密或合同限制范围，但暗示公司具备能够通过严格政府技术审查的可信工程组织。人才密度锚定在加州 Chatsworth， 靠近洛杉矶航空航天集群和 USC/UCLA
              工程人才管线。


              向 USPTO 提交的 ISF 工艺专利构成主要 IP 工具；Architect 刀路生成算法商业秘密是第二道防线。缺少大型开源贡献，对这一技术类别并不是负面信号；
              更合适的生态类比是工业自动化和航空航天制造软件公司（Siemens NX、Dassault CATIA），它们的核心 IP 全部专有。Machina 的投资人基础——Nvidia、Lockheed Martin
              Ventures、Woven Capital（Toyota）——构成战略生态，为公司提供计算访问、防务采购路径和汽车客户验证， 不需要建设开源社区。
            claimRefs:
              - CE008
              - CE009
              - CE010
              - CE028
              - CE031
              - CE032
      - number: '5.7'
        title: 展示材料
        blocks:
          - type: callout
            title: 双臂 RoboForming 消除低批量航空航天金属零件的硬模具瓶颈
            body: >-
              RoboCraftsman 的双 7 轴机械臂架构能做出单臂 CNC-ISF 无法实现的复杂几何形状——复合曲面、内凹特征、可变壁角——同时把首件交付周期压到 24-48 小时，而冲压模具需要 6-18
              个月。对航空航天 MRO、防务保障和 LRIP 项目来说，这不是增量改进，而是对一个长达十年的供应链问题给出的结构性解法。
            calloutType: strength
            claimRefs:
              - CE001
              - CE002
              - CE013
              - CE017
          - type: callout
            title: NADCAP 缺口和缺失的 Cpk 数据是进入主航空航天供应链的重大障碍
            body: >-
              Machina Labs 尚未启动 NADCAP 认证，也没有公开披露工艺重复性统计数据（Cpk/SPC）。没有 NADCAP，公司就无法成为 Boeing、Lockheed Martin 或 Northrop
              Grumman 飞行关键零件的获批特殊工艺供应商。这个缺口意味着在实现全面参与主承包商供应链前，还需要 2-3 年资质认证周期，从而限制最高价值合同带来的收入增长。
            calloutType: risk
            claimRefs:
              - CE026
              - CE037
          - type: callout
            title: Nvidia NVentures 投资让 AI 计算依赖和资本形成结构性同向
            body: >-
              Machina Labs 的 AI 成形模型训练和推理需要大量 GPU 计算。Nvidia 的 NVentures 作为 Series C 投资人参与，形成一种结构性同向： Machina
              既有财务激励，也有关系渠道，去获取优先 GPU 配额和下一代 AI 硬件早期访问。在计算受限环境中，这种“投资人即供应商”动态是有意义的供应链优势。
            calloutType: insight
            claimRefs:
              - CE009
