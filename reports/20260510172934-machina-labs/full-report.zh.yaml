            title: 低于独角兽的估值和有限的二级市场流动性
            body: >
              Forge Global 二级市场数据将 Machina Labs 在 2026 年 2 月 Series C 后的投后估值列为约 $333M，明显低于部分媒体报道暗示的 $1B
