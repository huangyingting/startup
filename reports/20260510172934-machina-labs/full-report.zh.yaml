      - number: '5.2'
        title: RoboForming 技术深挖
        blocks:
          - type: paragraph
            body: >-
              RoboForming 是双点渐进成形（TPIF）的一个变体，对置机器人臂向夹紧金属板两侧施加同步局部力。双侧接触是相对单点 CNC-ISF 的关键差异：它消除 Z
              轴深度限制，靠平衡受力取得更紧尺寸公差，并能做出传统 ISF 无法生产的几何形状——内凹特征、可变角度壁和复合曲率。 FANUC 或 ABB 级 7 轴工业机器人臂经过 Machina
              专有控制软件和定制成形末端执行器改造；这些机械臂不是现成通用件，而是在专有控制基础上适配过的硬件。


              Architect AI 平台通过物理约束仿真引擎，把 CAD 几何体转成机器人刀路；在任何实物成形前，它先模拟材料变形、回弹和减薄。数字孪生仿真会在第一次实物 成形道次前验证刀路。成形过程中，定制力 /
              位置传感器把实时反馈汇入自适应控制回路；如果变形偏离预测，系统会在作业中途修正刀路。每次成形运行都会扩充 AI 训练语料，形成数据飞轮：更多单元和更多几何体，带来更好的未来预测精度和更少的修正迭代。


              通过 AFRL 合作，Machina Labs 已在 C-130、C-5、C-17 和 F-16 机体上展示生产级零件，也完成了 NASA 环形储罐——一种复合曲率几何体，验证了 ISF
              在航天级材料上的能力。对于复杂航空航天结构，相比传统冲压模具，每一种独特几何形状可节省超过 $1 million 工装成本。ISF 的主要结构限制是产量天花板：每种几何形状每年低于约 1,000
              件时，这一工艺经济性最佳；它不适合高产量大规模生产， 但很适配航空航天 / 防务 LRIP 和 MRO 细分场景。
            claimRefs:
