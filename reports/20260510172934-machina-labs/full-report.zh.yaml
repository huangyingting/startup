        - 中
        - 可通过专利记录和合同授予独立核验
      - - 市场机会
        - 高 — 航空维保和汽车成形 TAM 超过 $20B
        - 中
        - 市场规模测算可信；Machina 能拿到多少份额是关键未知
      - - 客户牵引
        - 中低 — 确认 2 份 DoD 合同、1 个投资方关联试点、0 份商业量产合同
        - 中
        - 防务牵引真实；商业牵引尚未验证
      - - 财务风险
        - 高 — $333M 估值相当于预计收入 17-33x；工厂资本开支不确定
        - 低
        - 所有财务数字均为估算；需要经审计财务报表
      - - 监管合规
        - 重大缺口 — ITAR、CMMC、AS9100 均未确认
        - 中
