      - number: '1.4'
        title: 规模、设施与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Machina Labs 在洛杉矶地区运营三处生产设施。主要 Chatsworth 园区（约 75,000 sq ft）同时容纳 RoboCraftsman 机器装配线和小批量生产。第二处设施 “Machina
              One” 配备 8 个 RoboCraftsman 单元，为国防和航空航天客户按每个设计生产数百件。第三处 200,000 sq ft Intelligent Factory 正在建设，由 Series C
              资金支持，计划容纳最多 50 个 RoboCraftsman 单元，每年生产数千个复杂金属组件。制造设施每年可建造约 30–35 套新 RoboCraftsman 系统。

              关键里程碑横跨创立到 Series C。2025 年 4 月，Machina 向 University of Dayton Research Institute 交付一套 RoboCraftsman，作为与
              AFRL Rapid Sustainment Office 合作的飞机零件认证项目的一部分。2025 年 9 月，Machina 获得一份多年期 AFRL 合同（FA868425CB003），最高价值
              $3.37M，用于 AI 驱动的机体保障维护；该项目以 SBIR Phase III 形式执行，并与 ARM Institute 合作。Air Force Rapid Sustainment Office
              还授予了另一份合同。2025 年 9–10 月，公司在 Arkansas Bentonville 的 UP.Summit 上宣布与 Toyota Motor North America
              启动汽车车身面板试点，同时获得 Woven Capital 的战略投资。2026 年 2 月 Series C 交割，标志着公司从技术公司转向生产基础设施的规模拐点。

              Machina 使用 RoboForming 为 NASA 展示了环形储箱制造，并已为 C-130、C-5、C-17 和 F-16 飞机生产零件。Deployable System（RoboCraftsman
              的前身）已交付给 Georgia 的 Warner Robins Air Logistics Complex。收入、设施利用率和积压订单仍未披露。200,000 sq ft 工厂的完工时间表未公开说明。
