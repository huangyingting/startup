        - id: n1
          label: 技术：高 — 20+ 项专利、AI 材料模型、DoD TRL 7-8
          type: input
          detail: 最强支柱——可通过专利记录和联邦合同独立验证
        - id: n2
          label: 市场：高 — $20B+ 保障维护 + 汽车成形 TAM
          type: input
          detail: 结构性需求真实存在；关键假设是 Machina 能捕获多少份额
        - id: n3
          label: 客户：中低 — 2 个 DoD 合同；1 个投资方试点；0 个商业生产
          type: input
          detail: 国防牵引已确认；截至 2026 年 5 月，商业牵引完全未经验证
        - id: n4
          label: 财务：高风险 — $333M 估值，约为估计收入的 17-33x；工厂资本开支不确定
          type: input
          detail: 私营公司；没有审计财务；所有估计都有高度不确定性
        - id: n5
          label: 合规：实质缺口 — ITAR、CMMC、AS9100 未确认
          type: input
          detail: 监管缺口是进入主流 OEM 资质和 DoD 合同资格的阻断风险
        - id: n6
          label: 综合结论：有条件谨慎
          type: process
          detail: 投资逻辑真实且差异化；在商业阶段尚未验证的情况下，价格偏激进；投资前必须满足条件
        - id: n7
          label: 条件：交割前必须取得 LOI + 合规确认 + 审计财务
          type: output
          detail: 三个阻断条件：（1）锚定客户 LOI，（2）ITAR/CMMC/AS9100 确认，（3）审计财务
      edges:
