chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Machina Labs 是一家私营先进制造公司，总部位于加州 Chatsworth（洛杉矶地区），2019 年由 Edward Mehr（CEO）与 Dr. Babak
              Raeisinia（联合创始人兼应用与合作负责人）创立。公司的核心使命是用人工智能和工业机器人重塑金属制造：直接从数字设计文件生产复杂金属结构，取消针对特定几何的专用冲模或模具。

              旗舰平台 RoboCraftsman 将成形、修边、扫描和热处理整合进一个集装箱化机器人单元，底层工艺是自研的 RoboForming 渐进式板材成形。传统金属冲压依赖超过 20 tons
              的定制模具，每种几何需要数月工程开发，并耗费数百万美元。Machina 的双机器人臂系统改用从 CAD 模型生成的软件定义刀路，交付周期缩短超过 10x，单个独特零件设计的模具成本节省可超过 $1M。

              Machina Labs
              采用直接生产和制造即基础设施模式：公司建设、运营智能工厂，并向国防、航空航天和先进移动出行客户出售产能。公司希望把工厂产能做成数据中心一样——由软件定义、可重新编程，并能部署到需求所在地。RoboCraftsman
              可装入两个 ISO 海运集装箱，到达后数天内投入运行，从而支持前沿部署或靠近现场的制造。

              截至 2026 年中，公司处于 Series C 阶段，在 Chatsworth/LA 地区有三处设施。公司已公开确认与 U.S. Air Force Research Laboratory、Air Force
              Rapid Sustainment Office、Toyota Motor North America 的合同关系，并正与一家未披露的领先国防主承包商合作导弹和高超音速结构。收入和毛利率仍未披露。
