      - number: '1.3'
        title: 融资历程、投资方与估值
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Machina Labs 累计完成约 $209–$223M 风险融资，横跨五轮。融资历程包括：$2.33M 种子轮（2020 年 2 月）；$11–14M Series A
              轮（2021 年 11 月），由 Innovation Endeavors 领投，Congruent Ventures 和 Yamaha Motor Ventures 参投；$32M Series B
              轮（2023 年 10 月），由 Nvidia 的 NVentures 与 Innovation Endeavors 共同领投；以及 $124M Series C 轮（2026 年 2 月），由 Woven
              Capital 领投，Lockheed Martin Ventures、Balerion Space Ventures 与 UAE Strategic Development Fund (SDF)
              参投。Lockheed Martin Ventures 也曾在 2023 年 1 月进行较早的战略投资。

              Forge Global 二级市场数据估计，Machina Labs 在 2026 年 2 月 Series C-1 交割后的投后估值约
              $333M——依据是公司注册证书数据。尽管部分媒体给出类似表述，该估值显著低于 $1B 独角兽门槛。Forge Global 将 Machina Labs 股份的二级市场交易活跃度评为
              “Limited”，且没有可用撮合价格，说明这些未上市股份流动性弱，价格发现有限。

              投资方结构体现出很强的战略一致性：Woven Capital/Toyota 是汽车面板制造试点客户；Lockheed Martin Ventures 既是投资方，也是活跃的国防主承包商客户；Balerion
              Space Ventures 瞄准航天硬件制造；SDF 代表 UAE 主权工业利益。这种战略投资者汇聚验证了该军民两用平台，但也可能带来利益冲突——尤其是 Lockheed Martin——需要尽调 IP
              归属和优先供应商条款。鉴于 Machina 技术具有国防军民两用属性，SDF 投资可能触发 CFIUS 国家安全审查。

              公司未公开披露任何债务融资或授信额度。主公司未报告二级股份交易。
