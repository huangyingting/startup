        - 审查开放职位和招聘周期；确认薪酬与大型科技公司的对标情况
      - - 工厂建设和运营执行领导力
        - 从 90 人扩到 300+ 人需要经验丰富的 COO 或 VP Operations；岗位尚未确认
        - 中
        - 中 — 工厂启动需要同时推进 ITAR、QMS 搭建和产能爬坡
        - Series C 后未宣布已确认 COO 或 VP Operations 入职
        - 确认 COO 或 VP Operations 招聘状态；审查制造规模化履历
  - id: TR005
    title: 缓解与否决标准表
    notes: |
      监测指标和阈值是分析师对打破投资逻辑触发点的判断。行动含义仅供建议。
    columns:
      - 风险
      - 可监测触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - DoD 客户集中（空军 SBIR 依赖）
        - SBIR 收入占总收入比例；商业合同管线状态
        - 到 2027 年 Q3 仍未签署商业量产合同，且 SBIR 集中度连续两个季度 >=70%
        - 要求商业收入多元化计划；标记为投资者保护条款触发项
      - - CFIUS 与 UAE-SDF 投资审查
        - CFIUS 正式问询或通知；SDF 剥离公告；DoD 项目限制
        - CFIUS 在 Series C 交割后 12 个月内启动正式审查或发布缓解协议
        - 暂停追加资本投入；聘请国家安全法律顾问
      - - CMMC Level 2 不合规
        - DoD 审计结果；合同整改通知；DFARS 252.204-7021 认证状态
        - DoD 审计员发出合同暂停、整改通知或 CMMC 缺口发现
        - 立即制定整改计划；评估受风险影响合同；明确 Level 2 认证时间线
      - - 关键人物离职（CEO 或 CTO）
        - 离职公开公告；LinkedIn 消息；董事会沟通
        - CEO 或 CTO 离职公布后 30 天内未指定继任者
        - 启动继任计划；评估对客户和 DoD 合同官关系的影响
      - - Intelligent Factory 超支或进度滑坡
        - 建设进度更新；成本报告；交付承诺变化
        - 成本超支超过预算 20%，或较已公布时间线延迟 >6 个月
        - 评估额外资金需求；测算估值下调融资风险；通知董事会和关键客户
  - id: TV001
    title: 建议摘要表
    type: enumeration
