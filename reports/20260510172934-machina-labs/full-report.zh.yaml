    notes: |
      本对比中的竞争对手都未公开披露相关零件类别定价。所有定价参考来自行业知识、媒体报道以及 学术 / 行业媒体估算。Machina 单件经济性仍是私有信息。
  - id: TP004
    title: 护城河耐久性 / 竞争风险登记
    columns:
      - 护城河主张
      - 威胁
      - 严重程度
      - 缓解措施 / 尽调问题
    rows:
      - - 成形数据飞轮：已记录数十万次成形道次；专有 AI 模型用材料变形数据训练
        - Divergent 或资金充足的新进入者搭建 ISF 机器人单元，从第一天起积累竞品数据集
        - 低
        - 确认专有数据集规模和增长速度；评估 AI 模型能否靠专利或商业秘密守住；核查学术合作伙伴发表模型带来的风险
      - - DoD AFRL SBIR Phase III 对 RoboForming 工艺的资格认定（FA868425CB003）
        - DoD 修改资格要求，或通过 OTA 放行未获资格的供应商；竞争对手借行业联盟（ARM Institute）加速拿到资格
        - 中
        - 核实 SBIR III 资格覆盖范围（零件号、平台、合金）；确认资格按通用工艺授予，还是绑定具体几何形状；评估 OTA 合同风险
      - - 首件交付周期 24–48 小时（比模具冲压快 100–200 倍）；无需模具投入
        - 传统制模自动化（如 Schuler SmartPress）或 AI 驱动的模具设计工具，把既有厂商交付周期从数月压到数周
        - 低
        - 跟踪 Schuler、Fagor 及日本压力机模具自动化研发；测算快速制模技术在多大批量下会抹平 Machina 的成本优势
      - - ITAR/DoD 本土含量规则要求只在美国本土制造；Kikukawa 等海外 ISF 运营商被排除
        - 政策变化；盟国采购豁免；ITAR 改革；外国资本投资美国 ISF 初创公司
        - 低
        - 跟踪 ITAR 本土制造豁免趋势；观察是否有海外 ISF 公司在美国设点，或与 DoD 承包商合作
      - - 投资人与客户利益同向：Lockheed Martin Ventures（投资人 + 客户）、Woven Capital/Toyota（投资人 + 试点客户）带来优先进入订单管线的机会
        - 投资人与客户出现冲突：Lockheed 或 Toyota 自建 ISF 能力并退出投资人角色；投资附函里的优先供应商条款可能不公开披露
        - 中
        - 要求数据室提供投资人—客户关系文件；确认不存在限制 Machina 开拓其他客户的独家安排；评估 UAE SDF 投资带来的 CFIUS 风险
      - - RoboForming 工艺专利和 Architect 软件商业秘密组成的专利组合
        - 关键工艺创新未正式申请专利；竞争对手反向工程刀路策略；员工离职或学术发表暴露 Machina 的商业秘密
        - 中
        - 向数据室索取完整 IP 清单：已授权专利、在审申请、范围、司法辖区；确认所有发明人权利已转让给 Machina；若共同发明人来自高校，评估高校来源 IP
    claimRefs:
