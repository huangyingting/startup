      - number: '3.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 资本不对称：Divergent 的 $2.3B 估值是 Machina 的 7 倍
            body: >
              Divergent Technologies 2025 年 9 月 Series E 轮估值 $2.3B、累计融资 $450M+，相对 Machina Labs（投后估值 $333M、融资
              $209M）形成严重资本不对称。Divergent 和 Machina 今天处理的是结构不同的成形问题，但 Divergent 的资本底座足以支持其投入一条 ISF 邻近研发项目，或收购一家 ISF
              竞争者，作为进入板材面板制造的自然延伸。Machina 要缩小这道差距，必须成功放大 Intelligent Factory、证明收入增长，并推动估值重估；从当前证据看，这些都没有保证。
            calloutType: risk
            claimRefs:
              - CP001
              - CP013
              - CP032
          - type: callout
            title: 美国 DoD AI 机器人 ISF 的独家供给位置：本土没有同类对手
            body: >
              在所有已审视的竞争者类别中——增材制造商、CNC 机加工企业、传统冲压商、海外 ISF 运营商和金属 AM 厂商——没有发现任何美国本土竞争者能提供 DoD SBIR 资质下、面向硬金属的 AI
              驱动机器人渐进板材成形。按工艺看，Kikukawa 是最接近的 ISF 同行，但它只在日本运营，无法参与美国防务项目。 这一独家供给位置是 Machina 近期最强的竞争资产，AFRL 合同证据和
              CBInsights 竞争对手分析都支持这一点。
            calloutType: strength
            claimRefs:
              - CP007
              - CP009
              - CP012
              - CP019
          - type: callout
            title: Machina 核心防务细分市场结构上无法多供应商并用
            body: >
              截至 2026 年 5 月，客户如果需要大尺寸、硬合金、美国本土、DoD 资质的板材成形，没有可行的多供应商并用选择。Divergent 处理不同几何形状；Hadrian 处理不同工艺；Kikukawa
              在地域上不合格；金属 AM 缺乏大面板规模经济；传统冲压又需要模具投入，使低批量生产不经济。 多供应商替代方案缺位，直接转化为买方锁定，并降低 Machina DoD 合同面临的价格竞争。
