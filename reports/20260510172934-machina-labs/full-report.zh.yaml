      - number: '7.3'
        title: 运营风险
        blocks:
          - type: paragraph
            body: >
              计划中的 Intelligent Factory 是位于 Chatsworth, CA 的单一 200,000 sq ft 工厂，会把全部生产集中在一个地点。火灾、停电、自然灾害或 EHS
              停工会同时阻断所有客户交付。公司未披露业务连续性计划或第二工厂。工业机械臂（7 轴、高载荷）从 OEM 交付的报告周期为 12-24 个月；KUKA 自 2016 年起由中国 Midea Group
              持有，给防务项目带来地缘政治供应风险，因为中国企业持有的设备可能面临监管限制。

              基于 C-130 和 F-16 几何形状训练的 AI 成形模型，若不重新训练，可能无法泛化到新合金或复杂双曲率几何形状。VSMPO-AVISMA 制裁扰乱了钛供应；美国航空级钛坯供应商有限。南加州工业电价约
              $0.15-0.25/kWh，在美国处于最高一档，会给多单元机器人工厂带来显著固定成本拖累。网络安全风险更高，因为 DoD 飞机几何形状的数字成形规格是高价值目标；公司未公开披露 SOC 2 Type II 或
              ISO 27001 认证。目前未公开报告质量逃逸、交付失败或安全事故。
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
