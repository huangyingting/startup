      - number: '3.2'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              在航空航天制造创业生态中，Divergent Technologies 是最重要的竞争者，也是 Machina 估值和资本定位最相关的参照点。Divergent 成立于 2014 年，总部位于加州
              Torrance，五轮融资累计超过 $450M，包括 2025 年 9 月 $290M Series E 轮，估值约 $2.3B——约为 Machina $333M 投后估值的 7x。Divergent 的平台
              Digital Additive Production System (DAPS) 将铝晶格增材制造与自研软件结合，为国防和航空航天生产轻量化结构节点和空间框架组件。关键客户包括 Lockheed
              Martin、General Atomics、Raytheon 和 Triumph Group；据报道，2025 年 A&D 收入同比增长 5x，并生产了 600 多种独特 A&D 零件几何。尽管同样是服务国防的
              AI 驱动金属零件创业公司，表面相似，但 Divergent 的工艺根本不同：DAPS
              从粉床或粘结剂喷射生成致密、几何复杂的节点结构，而不是用薄板材成形。大型曲面板材——飞机蒙皮、汽车车身面板和高超音速结构的定义性几何——无法由 DAPS 以 Machina
              的成形尺寸或成本结构生产。两家公司看起来并不争夺同一批订单；同一买方若在 Machina 与 Divergent 之间多归属，也意味着采购不同零件类型，而不是真正的工艺替代。Divergent 7x
              的资本优势，会在人才竞争、研发投入和未来技术相邻扩张上构成有意义的担忧，但目前并不是 Machina 特定市场的近端威胁。

              Kikukawa Kogyo 是东京上市的日本制造公司，拥有专门的渐进成形部门，提供铝、不锈钢、钛和特种合金的单点与双点 ISF。Kikukawa
              的渐进成形页面（kikukawa.com/en/technology/incremental-forming/）确认其在建筑金属、工业部件和部分航空航天应用中有数十年生产经验。从工艺看，Kikukawa
              是最直接可比的 ISF 竞争者——两家公司都在无硬模具情况下渐进成形金属板材——但三点关键差异很大：地理（仅日本运营；没有美国制造或 DoD 认证历史）、自动化水平（传统 CNC-ISF，没有 AI
              自适应过程控制）和交付周期目标（Kikukawa 宣传定制原型，但不是 24–48 小时首件周转）。Kikukawa
              无法供应要求美国本土制造的美国国防项目，也未出现在任何美国政府合同数据库中。公开来源未发现其进入美国、合资或许可安排计划。
