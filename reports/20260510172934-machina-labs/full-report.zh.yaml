figures:
  - id: FO001
    title: Machina Labs 快照逻辑：从 CAD 到客户
    type: flow
    layout: standard
    summary: Machina Labs 的软件定义平台如何把数字设计输入，经由 RoboCraftsman 机器人单元，连接到 防务、航空航天和出行客户。
    data:
      nodes:
        - id: cad
          label: CAD / 数字设计
          detail: 客户或 Machina 工程师上传 3D 设计文件（无需按几何形状定制工装）
        - id: architect
          label: Architect 软件
