  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构和范围
        blocks:
          - type: paragraph
            body: >-
              Machina Labs 在硬件、工艺、软件和设施层面运营五类不同产品资产。RoboCraftsman 是一套双 7 轴机器人臂系统，装在便携式 ISO 集装箱形态中，可从 CAD 文件直接成形复杂 3D
              金属几何体，无需硬模具。每个单元都在一个自包含单元内完成完整流程——成形、修边、激光扫描和可选热处理——并可在数天内部署到客户现场或前沿部署地点。


              RoboForming 工艺是 Machina 专有的 ISF 方法：两只机器人臂从夹紧金属板两侧同时工作，无需模具即可渐进成形复杂 3D 几何体。不同于基于 CNC 的单点 ISF，双臂方案消除了 Z
              轴约束，提升成形极限，并通过 AI 反馈实现实时力控。Architect 软件是一套内部 CAM 平台，吸收 CAD/CAM 输入，并用 AI 驱动的路径规划和自适应工艺控制生成 RoboForming
              刀路。Architect 不对外销售或授权；它是每个 RoboCraftsman 单元的智能骨干。


              Machina One 是公司位于加州 Chatsworth 园区的首座 8 单元生产设施，约自 2023 年投入运营，并已获得 AFRL 防务生产资质。Intelligent Factory 是计划使用
              Series C 资金建设的 200,000 sq ft 设施，将把产能扩到 50 个或更多单元，是公司最核心的资本部署赌注。已认证材料包括 6000 和 7000
              系铝、Ti-6Al-4V、不锈钢、Inconel 625 和 718，以及其他特种合金，合计六个或更多合金族。产品架构从原材料到硬件、控制、智能和应用层，形成清晰分层栈；IP 集中在控制和智能层。
            claimRefs:
              - CE001
              - CE005
              - CE006
              - CE013
              - CE016
              - CE017
              - CE018
