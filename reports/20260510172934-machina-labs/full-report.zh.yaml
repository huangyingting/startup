      - number: '8.2'
        title: 估值背景与可比分析
        blocks:
          - type: paragraph
            body: >
              Series C 的 $333M 投后估值锚定 Forge Global 二级市场数据；对一家私营公司而言，这是目前最可信的独立来源。按 2025 年收入估计 $10-20M（员工规模代理），对应 17x 至
              33x 收入倍数，显著高于可比防务制造服务公司（通常 1-4x 收入），也高于商业化早期的可比 AI 硬件初创公司（通常 5-15x 收入）。溢价反映市场给两个期权定价：Intelligent Factory
              的重复收入模型，以及对防务主承包商或汽车 OEM 的战略收购价值。可比交易包括：Relativity Space 的 Series E，估值 $4.2B（收入前、重 AM 制造论点，2021）——Terran 1
              项目取消后已成警示案例；Velo3D 的 SPAC 估值 $1.7B（2022）——收入不及预期后，当前交易价格远低于 SPAC 价格；Shield AI 约 $2.7B（2023，防务 AI）；以及 Joby
              Aviation $6.6B（2021，深科技防务 / 商业出行）。Velo3D 和 Relativity 的对比尤其有参考价值：二者都带着 AM
              制造论点和政府合同背书进入公开市场，商业爬坡时间拉长后都经历了显著估值压缩。Machina Labs 的 $333M 私营阶段估值比 Velo3D 的 SPAC
              价格更有防御性，但如果工厂模型交付不足，压缩风险真实存在。

              对 M&A 退出估值，可比航空航天制造战略交易包括 Ducommun 以 $60M 收购 Moog 航空航天结构业务（2019）、Kaman Aerospace 以 6-10x EBITDA
              进行收购，以及防务电子资产以 10-15x EBITDA 成交。若 Machina Labs 达到 $50M 收入、30% 毛利率，并具备战略稀缺性，8-12x EBITDA 退出意味着 $120-$180M
              退出价值，低于 Series C 入场价格。牛市情形要求公司先证明工厂规模的重复收入和技术平台授权能力，战略收购方才会支付溢价倍数。IPO 路径只有在 ARR 超过 $100M 后才可信，按当前轨迹可能还需要
              5-7 年。
