  - id: FU001
    title: 客户旅程图
    type: journey-map
    caption: |
      Machina Labs 客户旅程分六个阶段，从最初认知到战略扩张，展示国防和商业客户群的关键资质节点。
    data:
      items:
        - label: 认知
          value: 1
          note: |
            客户通过 SBIR 征集、UP.Summit、AW26 会议、行业媒体或 Woven Capital 投资人转介发现 Machina；参与方：AFRL 项目经理、汽车 R&D 负责人、国防主承包商采购
        - label: 评估
          value: 2
          note: |
            申请技术演示；对比硬模具（$200K–$2M 模具，6–18 个月）与 Machina Labs（24–48 小时，无需模具）；参与方：工程团队、供应链经理
        - label: 试点 / 首件
          value: 3
          note: |
            有限 PO 或 SBIR Phase I/II；24–48 小时完成首件；尺寸检验；Toyota 定制尾门和 AFRL Phase I 是例子；参与方：质量工程师、合同官
        - label: 资质认定
          value: 4
          note: |
            国防：正式工艺资质需 18–36 个月；AFRL 已认定 RoboCraftsman 可用于国防生产；商业：工程团队对精度和表面处理签字放行；参与方：DoD QA 代表、OEM 质量负责人
        - label: 复购 / 扩张
          value: 5
          note: |
            SBIR Phase III 单一来源（AFRL）；RSO 采购第 2 个 RoboCraftsman 单元；Toyota 试点扩展到更多零件；参与方：合同官、生产采购
        - label: 战略客户
          value: 6
          note: |
            多年合作或现场部署单元；AFRL（SBIR III）和 RSO（2 单元 UDRI）代表当前战略客户；Intelligent Factory 的规模化目标就是这一阶段；参与方：项目办公室、供应链总监
