            body: >
              $124M Series C 必须同时支持 $50-100M Intelligent Factory 建设、持续每年 $25-40M 运营现金消耗，以及 RoboCraftsman
              单元部署。在较高资本开支和现金消耗情景下，自 2026 年 2 月交割起，有效资金续航可能压缩到 20-30 个月，要求公司在工厂贡献有意义收入前完成 Series D
