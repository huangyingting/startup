        - AFRL 取消主要 SBIR Phase III 合同且无替代合同
        - Air Force 收入占比 >80%，且管线没有多元化
        - DoD 合同管线数量；非 Air Force 合同授予
      - - 监管合规
        - 受到 CMMC 执法，或主 OEM 因 AS9100 问题拒绝准入
