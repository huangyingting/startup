    - SV029
    - SV030
    confidence: medium
    freshness: current
  - id: CV007
    statement: The Intelligent Factory factory-as-a-service model, if validated, converts project margin revenue into recurring
      utilization revenue with higher incremental margins, making it a structurally superior revenue model.
    type: inferred
    topic: valuation
    sourceRefs:
    - SV004
    - SV025
    confidence: low
    freshness: current
  - id: CV008
    statement: The factory model is the primary valuation premium driver; without anchor customer commitments before factory
      completion, the premium cannot be justified at $333M.
