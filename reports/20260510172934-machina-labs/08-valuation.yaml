  claims:
  - id: CV001
    statement: Machina Labs closed its Series C at $124M in February 2026 with a post-money valuation of approximately $333M
      per Forge Global secondary market data.
    type: third-party-reported
    topic: valuation
    sourceRefs:
    - SV001
    - SV002
    confidence: medium
    freshness: current
  - id: CV002
    statement: The $333M post-money valuation implies a revenue multiple of 17x to 33x on the estimated $10-20M 2025 revenue
      proxy, which is aggressive for a company with no disclosed commercial production contracts.
    type: estimated
    topic: valuation
    sourceRefs:
    - SV001
    - SV003
    confidence: low
    freshness: current
  - id: CV003
    statement: 'The overall investment recommendation is Conditionally Cautious: the technology thesis is differentiated and
      the defense traction is real, but the $333M valuation prices in a commercial outcome that has not been validated.'
    type: inferred
    topic: valuation
    sourceRefs:
    - SV001
    - SV004
    confidence: medium
    freshness: current
  - id: CV004
    statement: 'The five thesis pillars are: (1) structural defense sustainment need, (2) defensible IP and AI moat, (3) proven
      government adoption at TRL 7-8, (4) strategic investor validation, and (5) platform economics at factory scale.'
    type: inferred
    topic: valuation
    sourceRefs:
    - SV004
    - SV025
    confidence: medium
    freshness: current
  - id: CV005
    statement: 'The anti-thesis rests on: (1) commercial pivot unvalidated, (2) single customer concentration above 50%, (3)
      factory capex consuming most of Series C runway, (4) compliance gaps blocking prime OEM qualification, and (5) AM competitive
      displacement.'
    type: inferred
    topic: valuation
    sourceRefs:
    - SV004
    - SV019
    confidence: medium
    freshness: current
  - id: CV006
    statement: Strategic investor quality — including Lockheed Martin Ventures, Woven Capital (Toyota), NVentures (NVIDIA),
      Balerion Space Ventures, and SDF — is a strong positive signal for multi-vertical customer optionality.
    type: observed
    topic: valuation
    sourceRefs:
