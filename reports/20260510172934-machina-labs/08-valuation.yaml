    topic: valuation
    sourceRefs:
    - SV001
    - SV004
    - SV019
    confidence: medium
    freshness: current
  - id: CV009
    statement: Velo3D's $1.7B SPAC valuation in 2022 and subsequent revenue shortfalls leading to significant stock price
