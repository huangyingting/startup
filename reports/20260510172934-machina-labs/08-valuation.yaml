    - Medium
    - Commission independent IP counsel FTO analysis on core algorithm patent claims
  - - Key-person agreements and equity vest schedule
    - Founder retention risk; confirm vesting cliff and good-leaver provisions
    - Medium
    - Request employment agreements and option plan summary
