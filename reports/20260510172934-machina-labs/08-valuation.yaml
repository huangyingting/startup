    - Burn rate, gross margin, and cash position are required for capital adequacy assessment
    - Blocking
    - Request audit or review engagement report; minimum reviewed financials acceptable
  - - Intelligent Factory capex budget and anchor customer LOIs
    - Factory model is unvalidated without customer commitments; capex risk is material
    - Blocking
    - Request signed LOIs or capacity agreements; construction contract and phased budget
  - - AFRL program manager reference calls
    - Independent validation of delivered part quality and customer satisfaction
    - High
    - Request 2-3 Air Force program officer references; conduct independent reference checks
  - - AI material model technical deep-dive
    - Validate AI model accuracy claims and alloy coverage independently
    - High
    - Request technical session with CTO; review material model validation dataset
  - - Factory construction partner and timeline
    - Confirm construction is contracted and on schedule
    - High
    - Request construction contract, project schedule, and permitting status
  - - IP freedom-to-operate (FTO) analysis
