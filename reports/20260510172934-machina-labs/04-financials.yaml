- id: gtm-motion-and-sales-efficiency
  title: GTM Motion and Sales Efficiency
  body: 'Machina Labs'' go-to-market strategy is built around two parallel channels: defense procurement through SBIR/SBIR
    Phase III programs and direct OEM engagement, and commercial automotive and aerospace pilots with strategic-investor customers.
    The defense channel is characterized by long sales cycles—typically 12-36 months from initial SBIR proposal to contract
    award—but yields multi-year contracts with high visibility into forward revenue. The AFRL SBIR Phase III pathway provides
    a congressionally-protected sole-source mechanism that bypasses standard competitive procurement, reducing churn risk
    once a program is established.

    On the commercial automotive side, the Toyota Motor North America body panel pilot, announced at the UP.Summit in September
    2025 alongside a Woven Capital investment, represents a classic strategic-investor-as-first-customer model. Woven Capital''s
    participation as both Series C lead investor and pilot partner compresses the typical enterprise sales cycle by collapsing
    the customer validation stage. However, the financial terms, scale, and exclusivity provisions of this pilot are entirely
    undisclosed, preventing any calculation of customer acquisition cost (CAC) or payback period.

    Sales efficiency proxies are very limited for a private company at this stage. At approximately 90-100 employees with
    an estimated five-to-seven person business development team based on publicly visible leadership including an SVP Aerospace
    and Defense and a Chief Business Officer, the implied CAC per contract win is high. Defense program pursuits cost hundreds
    of thousands of dollars in proposal preparation alone. No customer count, win rate, or average contract value data is
    publicly available. The company''s strategic investor base—Woven Capital, Lockheed Martin Ventures, and NVentures—effectively
    functions as a high-value referral network reducing cold-acquisition costs in targeted verticals.

    '
  claimRefs:
  - CI007
  - CI008
  - CI009
  - CI010
  - CI011
  tableRefs: []
- id: cost-structure-capex-and-gross-margin
  title: Cost Structure, Capex, and Gross Margin
  body: 'Machina Labs operates a capital-intensive business model with three primary cost centers: facility lease and buildout,
    RoboCraftsman cell manufacturing capex, and personnel. No gross margin data has been publicly disclosed. For context,
    comparable contract manufacturing and advanced-robotics services firms typically achieve 25-45% gross margins on project
    work, with higher margins on software-defined or recurring service components and lower margins on materials-pass-through
    contracts.

    Each RoboCraftsman cell is estimated to cost $500K-$2M to build, comprising dual robotic arms, linear rails, sensing and
    scanning systems, and the Architect software stack. At 30-35 cells per year manufacturing capacity (company-stated), this
    represents $15M-$70M in annual cell-production capex if all units are internally deployed. The planned 200,000 sq ft Intelligent
    Factory—the primary use of Series C proceeds—is estimated to require $50-100M in construction and equipment, phased over
    two to three years.

    At approximately 90-100 employees with average fully-loaded compensation of $200K-$250K annually for LA-area aerospace
    and robotics engineers, salary and benefits constitute roughly $18M-$25M per year. Adding facilities rent, insurance,
    raw materials for production, software tooling, and G&A overhead, total operating expense is estimated at $25-40M annually
    before factory revenue offsets. Titanium and high-strength aluminum alloys are typically passed through to customers at
    cost on defense contracts, limiting materials-margin risk. No public evidence of credit facilities, asset-backed loans,
    or project-specific debt financing has been identified.

    '
