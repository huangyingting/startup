- id: financial-traction-and-private-metric-gaps
  title: Financial Traction and Private-Metric Gaps
  body: 'The publicly available evidence of Machina Labs'' financial traction is limited to capital raises, named contract
    awards, and industry database estimates. What is known: the company has raised approximately $209M in five rounds with
    the most recent $124M Series C in February 2026; at least $14M in DoD contract awards are publicly identified in government
    databases; the AFRL contract FA868425CB003 is worth up to $3.37M; and the Air Force RSO issued at least one additional
    named award. ZoomInfo and Incfact estimate annual revenue in the range of $10M-$100M, with the midpoint and headcount
    proxy converging on approximately $10-20M for 2025. Tracxn reports employee count at approximately 66 as of December 2024.

    What is not known and must be treated as private-metric gaps: exact annual recurring revenue or total revenue; gross margin
    percentage; EBITDA or net income/loss; customer revenue concentration (percent from any single customer); cell utilization
    rates at existing facilities; backlog or pipeline dollar value; pricing structure for the Toyota pilot; and any revenue
    from RoboCraftsman cell licensing or leasing. The Forge Global secondary market data page for Machina Labs lists the post-money
    valuation at approximately $333M and secondary market trading activity as Limited with no matched price, confirming that
    even pre-IPO secondary price discovery is unavailable.

    CB Insights describes Machina Labs as being at Series C stage with revenue not available. PitchBook similarly does not
    disclose financial metrics for this private company. These gaps are standard for a pre-revenue-milestone deep-tech startup
    but represent a material underwriting challenge for any institutional investor or acquirer who cannot access the company''s
    data room. Closing these gaps requires a signed NDA and access to audited or management-prepared financials.

    '
