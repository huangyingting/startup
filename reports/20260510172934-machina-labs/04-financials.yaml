callouts:
- calloutType: risk
  title: Sub-Unicorn Valuation and Limited Secondary Market Liquidity
  body: 'Forge Global secondary market data places Machina Labs post-money valuation at approximately $333M following the
    February 2026 Series C—well below the $1B unicorn threshold that some media coverage has implied. Secondary market trading
    activity is rated Limited with no matched price recorded, indicating illiquid pre-IPO shares with minimal price discovery.
    For any investor relying on comparable-company valuation multiples, the $333M figure represents a meaningful constraint:
    at an estimated $10-20M in 2025 revenue, the implied EV/Revenue multiple of 16-33x demands rapid revenue growth and successful
    factory ramp to justify a future financing event at a higher valuation.

    '
  claimRefs:
  - CI022
  - CI031
  - CI032
- calloutType: strength
  title: Strategic Investor Base Validates Revenue Pipeline and Reduces CAC
  body: 'Woven Capital''s dual role as Series C lead investor and automotive pilot customer (via Toyota Motor North America),
    combined with Lockheed Martin Ventures'' position as both investor and defense prime customer, effectively transforms
    the investor base into a revenue pipeline anchor. This structure collapses the typical enterprise sales cycle for Machina''s
    two largest target markets and provides validated proof-of-concept at OEM and prime-contractor scale. It also provides
    a credible path to multi-year, large-volume follow-on contracts that would materially expand the revenue base without
    requiring new customer acquisition from scratch.

    '
  claimRefs:
  - CI007
  - CI008
  - CI011
- calloutType: risk
  title: 'Capital Intensity and Runway Risk: Factory Buildout May Require Series D'
  body: 'The $124M Series C must simultaneously fund a $50-100M Intelligent Factory buildout, ongoing $25-40M annual operating
    burn, and RoboCraftsman cell deployment. At higher capex and burn scenarios, effective runway could compress to 20-30
    months from the February 2026 close, requiring a Series D raise before the factory achieves meaningful revenue contribution.
    This creates a financing dependency common in deep-tech manufacturing but represents a structural risk if capital markets
    tighten, the factory faces delays, or early customer traction falls short of plan. Investors should model a Series D need
    in 2027-2028 as a base-case assumption.

    '
  claimRefs:
  - CI026
  - CI027
  - CI028
  - CI029
- calloutType: insight
  title: SBIR Phase III Provides Sole-Source Path That De-Risks Revenue Predictability
  body: 'Unlike typical commercial contracts subject to competitive recompete, SBIR Phase III programs allow agencies to award
    follow-on production contracts to Phase II winners on a sole-source basis, bypassing standard competitive procurement
    requirements under 15 USC section 638(r). Machina Labs'' AFRL SBIR Phase III contract leverages this mechanism, providing
    a congressionally-protected revenue channel significantly more predictable than open-competition defense contracts. If
    Machina successfully expands its SBIR Phase III footprint across multiple DoD agencies and platforms, this could yield
    $20-50M in annually recurring, predictable government revenue within 3-5 years—materially de-risking the revenue model.

    '
  claimRefs:
  - CI002
  - CI003
  - CI009
