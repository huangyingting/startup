  layout: wide
  summary: How Series C proceeds flow through Intelligent Factory capex, RoboCraftsman cell deployment, and operating costs,
    with contract revenue partially offsetting burn.
  data:
    nodes:
    - id: c1
      label: Series C $124M (Feb 2026)
      detail: Capital raise led by Woven Capital; investors include Lockheed Martin Ventures, Balerion Space Ventures, SDF
        (UAE)
    - id: c2
      label: Intelligent Factory Capex
      detail: 200,000 sq ft facility; estimated $50-100M construction and equipment over 2-3 years; houses up to 50 RoboCraftsman
        cells
    - id: c3
      label: RoboCraftsman Cell Deployment
      detail: 'Each cell: $500K-$2M capex; manufacturing capacity ~30-35 cells per year; target 20+ cells by 2028 in factory'
    - id: c4
      label: Opex / Headcount
      detail: 90-100 employees; estimated burn $25-40M per year pre-factory revenue ramp; salary, facilities, G&A, R&D
    - id: c5
      label: Runway (estimated)
      detail: At $25-40M annual operating burn, $124M provides ~3-5yr runway; factory revenue offsets burn over time; capex
        compresses runway in peak build phase
    - id: c6
      label: Revenue (DoD plus Commercial)
      detail: Estimated $15-25M annually by 2026 from SBIR Phase III, RSO contracts, and automotive pilot; partially offsets
        burn
    edges:
    - from: c1
      to: c2
      label: primary use
    - from: c1
      to: c4
      label: working capital
    - from: c2
      to: c3
      label: enables cell deployment
    - from: c6
      to: c4
      label: partially funds opex
    - from: c3
      to: c6
      label: generates revenue
  approximationNotes: Capex and burn estimates are analyst proxies based on publicly observable headcount, facility count,
    and construction cost benchmarks. Machina Labs has not disclosed capital allocation or burn rate.
