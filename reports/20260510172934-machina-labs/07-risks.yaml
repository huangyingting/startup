      whyItMatters: Unresolved CFIUS exposure on a DoD supplier with an Abu Dhabi sovereign wealth fund investor represents a potentially blocking risk; a CFIUS mitigation agreement imposing operational restrictions could limit the company's ability to pursue DoD programs or force costly restructuring of the investor base.
