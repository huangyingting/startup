  - id: mitigations-and-kill-criteria
    title: Mitigations, Monitoring, and Kill Criteria
    body: >
      The primary mitigations in place are structural: SBIR Phase III sole-source authority (15 USC 638(r))
      protects against competitive re-procurement of AFRL contracts; investor-customer alignment through
      Woven Capital (Toyota) reduces automotive sales cycle risk; the multi-aircraft portfolio (C-130, C-5,
      C-17, F-16) diversifies within the Air Force customer; and 20+ issued patents provide a partial IP
      defensive perimeter.

      Monitoring indicators that should trigger investor attention include: SBIR revenue concentration
      remaining above 70% for two consecutive quarters without commercial contract execution; CFIUS inquiry
      or notice received on the SDF investment; DoD audit or cure notice related to CMMC non-compliance;
      departure of CEO or CTO without named successor; Intelligent Factory construction cost overrun of 20%+
      or schedule slip of 6+ months; and failure to convert the Toyota TMNA pilot to a production order
      by end of 2026.

      Thesis-break events would include: CFIUS-mandated divestiture of SDF that destabilizes the cap table;
      loss of AFRL sole-source contracting authority following ITAR or CMMC enforcement; failure to achieve
      CMMC Level 2 certification by 2027; or failure to secure any commercial production contract by mid-2027.

