  - id: regulatory-and-legal-risk
    title: Regulatory and Legal Risk
    body: >
      Machina Labs operates at the intersection of several high-stakes regulatory regimes. ITAR (22 CFR Parts
      120-130), enforced by the State Department's DDTC, applies to any manufacture or export of defense
      articles listed on the USML. The company's ISF-formed titanium and aluminum aerospace structural parts
      for the Air Force almost certainly require ITAR registration; the robots, AI forming models, and digital
      forming specifications could be USML Category VI or XI controlled. Machina Labs has not publicly
      confirmed its ITAR registration number or DDTC enrollment status.

      The EAR (15 CFR Parts 730-774), enforced by BIS, governs dual-use technology. Machina's AI forming
      software and process data may be ECCN-controlled; the UAE-SDF investor relationship heightens EAR
      scrutiny for any technology transfers. CFIUS (50 USC 4565) has broad jurisdiction over foreign
      investments in defense-adjacent technology companies; UAE-SDF participation in the Series C constitutes
      a covered investment that may require mandatory CFIUS notification, the absence of which creates
      retroactive review risk.

      CMMC Level 2 (110 NIST SP 800-171 practices) is required for DoD contractors handling Controlled
      Unclassified Information, which Machina almost certainly processes under its Air Force programs.
      FAR 52.204-25 prohibits certain telecommunications equipment in contractor operations. No CMMC
      assessment, AS9100 certification, or NADCAP accreditation has been publicly disclosed. The IP
      landscape includes foundational Stanford/Jeswiet ISF patents and growing competitive filings; Machina's
      own 20+ patent portfolio provides some defensive coverage but FTO for new geometries is unverified.

