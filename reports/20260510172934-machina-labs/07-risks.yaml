  - id: people-and-execution-risk
    title: People and Execution Risk
    body: >
      CEO Edward Mehr and CTO Dr. Babak Raeisinia co-founded Machina Labs and together hold the primary
      customer relationships, technical architecture, and institutional knowledge of the AI forming model
      stack. No deputy CTO, VP Engineering, or formal succession plan has been publicly disclosed. Loss of
      either founder would represent a material disruption to both technical development and government
      customer relationships.

      Scaling from approximately 90-100 employees to 300+ required for a 50-cell Intelligent Factory is a
      significant execution challenge. AI and robotics engineers are highly competitive in the Los Angeles
      market, where Machina competes with Big Tech and aerospace primes for talent. BLS occupational data
      for specialized production workers confirms tight labor conditions. Hiring must occur simultaneously
      with ITAR compliance scale-up, quality system buildout, and factory construction.

      The metal forming equipment market is growing at 4-5% CAGR and the US A&D market remains above $700B
      annually, but market growth does not mitigate execution risk on the factory timeline. The DoD ManTech
      2025 annual report identifies workforce and supply chain as top risks for defense manufacturing suppliers.

    claimRefs:
      - CR035
