  - id: operational-risk
    title: Operational Risk
    body: >
      The planned Intelligent Factory -- a single 200,000 sq ft facility in Chatsworth, CA -- concentrates
      all production in one location. A fire, power outage, natural disaster, or EHS shutdown would halt
      delivery of all customer commitments simultaneously. No business continuity plan or secondary facility
      has been disclosed. Industrial robotic arms (7-axis, high-payload) have reported lead times of 12-24
      months from OEMs; KUKA's ownership by China's Midea Group since 2016 creates geopolitical supply risk
      for defense programs where Chinese-owned equipment may face regulatory restrictions.

      AI forming models trained on C-130 and F-16 geometry may fail to generalize to new alloys or complex
      double-curvature geometries without retraining. Titanium supply has been disrupted by VSMPO-AVISMA
      sanctions; US aerospace-grade titanium billet suppliers are limited. Southern California industrial
      electricity rates run approximately $0.15-0.25/kWh -- among the highest in the US -- creating a
      significant fixed-cost drag for a multi-cell robotic factory. Cybersecurity risk is elevated because
      digital forming specs for DoD aircraft geometries are high-value targets; no SOC 2 Type II or ISO
      27001 certification has been publicly disclosed. No quality escapes, delivery failures, or safety
      incidents have been publicly reported.

