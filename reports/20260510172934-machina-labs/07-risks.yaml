    - type: private-evidence-only
      severity: material
      topic: ITAR and CMMC and AS9100 compliance status
      missingEvidence: ITAR registration number (DDTC), CMMC Level 2 self-attestation or C3PAO assessment report, SPRS score, and AS9100 Rev D certification scope are not publicly available; no third-party compliance directory confirms any of these for Machina Labs as of May 2026.
