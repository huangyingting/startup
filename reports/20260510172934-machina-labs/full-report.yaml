      - number: '1.3'
        title: Funding History, Investors, and Valuation
        blocks:
          - type: paragraph
            body: >
              Machina Labs has raised approximately $209–$223M in total venture funding across five rounds as of May
              2026. Its funding history includes: a $2.33M seed (February 2020), a $11–14M Series A (November 2021) led
              by Innovation Endeavors with Congruent Ventures and Yamaha Motor Ventures, a $32M Series B (October 2023)
              co-led by Nvidia's NVentures and Innovation Endeavors, and a $124M Series C (February 2026) led by Woven
              Capital with Lockheed Martin Ventures, Balerion Space Ventures, and UAE's Strategic Development Fund
              (SDF). Lockheed Martin Ventures also made an earlier strategic investment in January 2023.

              Forge Global secondary market data estimates Machina Labs' post-money valuation at approximately $333M
              following the February 2026 Series C-1 close—based on Certificate of Incorporation data. This is
              significantly below the $1 billion unicorn threshold despite some media characterizations. Secondary
              market trading activity for Machina Labs shares is rated "Limited" by Forge Global, and no matched price
              is available, indicating illiquid pre-IPO shares with limited price discovery.

              The investor base reflects strong strategic alignment: Woven Capital/Toyota is a pilot customer for
              automotive panel manufacturing; Lockheed Martin Ventures is both investor and active defense prime
              customer; Balerion Space Ventures targets space hardware manufacturing; and SDF represents UAE sovereign
              industrial interests. This convergence of strategic investors validates the dual-use platform but also
              creates potential conflicts of interest—particularly with Lockheed Martin—that require diligence into IP
              ownership and preferred supplier terms. The SDF investment may trigger CFIUS national security review
              given the defense-dual-use nature of Machina's technology.

              No debt financing or credit facilities have been publicly disclosed. No secondary share transactions have
              been reported from the primary company.
