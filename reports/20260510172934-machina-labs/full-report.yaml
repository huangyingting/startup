  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Machina Labs generates revenue through three primary streams, none of which are publicly quantified. The
              first and currently dominant stream is project-based manufacturing contracts with defense and aerospace
              customers, where Machina produces formed metal parts on a per-project or per-order basis at fixed price.
              The most visible example is the AFRL contract (FA868425CB003) for AI-driven airframe sustainment under an
              SBIR Phase III vehicle with the ARM Institute, worth up to $3.37M, awarded February 2025 and announced
              September 2025. A second contract from the Air Force Rapid Sustainment Office was also awarded with an
              undisclosed value. In aggregate, publicly identified DoD contract value stands at a minimum of $14M as of
              April 2025 industry analysis.

              The second revenue stream is Small Business Innovation Research (SBIR) grant and contract revenue. SBIR
              Phase III programs can continue through production quantities on a sole-source basis under 15 USC section
              638(r), the primary mechanism connecting Machina's research-and-development work with operational defense
              procurement. The third stream, and the company's most strategically important long-term model, is
              RoboCraftsman cell leasing or factory-as-a-service (FaaS). The company has not yet disclosed cell lease
              rates, utilization targets, or any contracted leasing arrangements as of May 2026. The planned Intelligent
              Factory will house up to 50 RoboCraftsman cells; revenue from this facility is a future-state event. A
              nascent fourth revenue possibility is software or Architect-platform licensing to third-party
              manufacturers, but no evidence of current licensing revenue exists in public record. Revenue mix is
              estimated as heavily weighted (more than 80%) to project/contract revenue in 2025.
