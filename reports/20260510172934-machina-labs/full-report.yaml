            figureRef: FU004
            claimRefs: []
      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: SBIR Sole-Source Mechanism Creates Durable Revenue Moats
            body: >
              The AFRL SBIR Phase III contract provides legally protected sole-source revenue under 15 USC section
              638(r), bypassing competitive recompete for the life of the Phase III vehicle. This mechanism, combined
              with the process qualification already achieved, creates a structurally durable government revenue channel
              that is materially more predictable than open-competition defense contracts.
            calloutType: strength
            claimRefs:
              - CU013
              - CU014
          - type: callout
            title: RSO Second-Cell Purchase Is the Portfolio's Clearest Expansion Signal
            body: >
              The Air Force RSO's purchase of a second RoboCraftsman cell at UDRI is the strongest available
              repeat-order signal in the customer portfolio. It demonstrates that the customer was sufficiently
              satisfied with the first deployment to commit capital to a second unit, and it expands coverage to
              additional aircraft platforms. This is a capital equipment expansion, not just a service contract renewal.
            calloutType: strength
            claimRefs:
              - CU003
              - CU016
          - type: callout
            title: Customer Concentration in DoD Is Material and Unmitigated by Commercial Revenue
            body: >
              With AFRL and RSO together representing the only confirmed production-stage customers, and commercial
              accounts (Toyota, NASA) at pilot or case-study stage, DoD almost certainly represents more than 70 percent
              of current revenue. Any defense budget reallocation, SBIR restructuring, or program cancellation could
              have a disproportionate impact. SBIR Phase III sole-source provides partial protection but does not
              eliminate this risk.
            calloutType: risk
            claimRefs:
              - CU027
              - CU028
              - CU029
          - type: callout
            title: CFIUS/SDF Exposure Is an Underappreciated Risk to Defense Customer Eligibility
            body: >
              UAE sovereign wealth fund participation in prior Machina Labs funding rounds creates CFIUS exposure that
              could, in a worst-case scenario, affect the company's eligibility for classified or restricted defense
              contracts. This is not a confirmed adverse event, but it is a structural risk that diligence should
              address directly with an independent CFIUS opinion before any transaction.
            calloutType: risk
            claimRefs:
              - CU030
              - CU032
  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: >
              Machina Labs' risk profile is shaped by its dual identity as both a defense contractor and a
              venture-backed deep-tech startup pursuing an ambitious factory buildout. The highest-severity risks are
              regulatory and legal: ITAR compliance is unconfirmed, CMMC Level 2 certification status is not public, and
              the UAE Sovereign Development Fund's participation in the Series C creates a CFIUS review obligation that
              has not been publicly resolved. Any one of these three regulatory failures could result in suspension of
              DoD contracts, the company's primary revenue source.

              The second tier of risk is operational and dependency-based: concentration of all planned production in a
              single Chatsworth facility, dependence on KUKA industrial robots whose parent company (Midea Group) is
              Chinese-owned, and dependence on a single customer type (U.S. Air Force SBIR programs) for the majority of
              revenue. Financial risk is material but somewhat mitigated by the $124M Series C; however, the factory
              buildout is capital-intensive and runway estimates carry high uncertainty without access to actual
              financials.

              People and execution risks round out the profile: CEO Edward Mehr and CTO Dr. Babak Raeisinia hold deep
              institutional knowledge with no disclosed succession, and scaling the workforce three-fold while
              maintaining ITAR compliance and quality standards is a material execution challenge. No patent litigation,
              product liability, or environmental enforcement events have been identified. The GMI metal forming
              equipment market data and Mordor Intelligence A&D market research confirm macro tailwinds that reduce
              market risk but do not mitigate execution or regulatory risks.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR008
              - CR021
              - CR039
              - CR040
              - CR045
          - type: figure
            figureRef: FR001
