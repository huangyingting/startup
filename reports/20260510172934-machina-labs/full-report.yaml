              - CI010
              - CI011
      - number: '4.3'
        title: Cost Structure, Capex, and Gross Margin
        blocks:
          - type: paragraph
            body: >
              Machina Labs operates a capital-intensive business model with three primary cost centers: facility lease
              and buildout, RoboCraftsman cell manufacturing capex, and personnel. No gross margin data has been
              publicly disclosed. For context, comparable contract manufacturing and advanced-robotics services firms
              typically achieve 25-45% gross margins on project work, with higher margins on software-defined or
              recurring service components and lower margins on materials-pass-through contracts.

              Each RoboCraftsman cell is estimated to cost $500K-$2M to build, comprising dual robotic arms, linear
              rails, sensing and scanning systems, and the Architect software stack. At 30-35 cells per year
              manufacturing capacity (company-stated), this represents $15M-$70M in annual cell-production capex if all
              units are internally deployed. The planned 200,000 sq ft Intelligent Factory—the primary use of Series C
              proceeds—is estimated to require $50-100M in construction and equipment, phased over two to three years.

              At approximately 90-100 employees with average fully-loaded compensation of $200K-$250K annually for
              LA-area aerospace and robotics engineers, salary and benefits constitute roughly $18M-$25M per year.
              Adding facilities rent, insurance, raw materials for production, software tooling, and G&A overhead, total
              operating expense is estimated at $25-40M annually before factory revenue offsets. Titanium and
              high-strength aluminum alloys are typically passed through to customers at cost on defense contracts,
