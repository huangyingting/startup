      - number: '8.3'
        title: Bull / Base / Bear Scenarios and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              The bull case assumes: Intelligent Factory operational by late 2027; 3 or more commercial anchor customers
              (automotive OEM + 1-2 aerospace primes) signed to recurring capacity agreements by mid-2027; factory
              reaches 60% utilization by end of 2028; revenue scales to $80-120M by 2029 driven by a mix of government
              project contracts and factory utilization fees; and a strategic exit at 4-6x revenue or 10-15x EBITDA in
              the 2029-2031 window at $600M to $1.2B exit value. This scenario requires execution on all five thesis
              pillars simultaneously and no material competitive displacement.

              The base case assumes: Factory opens in 2027-2028 with partial utilization (30-40%); 2-3 commercial pilots
              convert to recurring contracts; defense contract pipeline grows to $25-35M by 2028; factory revenue adds
              $20-30M incrementally; total 2029 revenue reaches $45-65M; strategic exit at 3-5x revenue in 2030-2032 at
              $150-$325M. At this exit range, Series C investors at $333M post-money face a break-even to modest-loss
              scenario depending on dilution from a potential Series D.

              The bear case assumes: Factory construction delayed or underutilized (15-20% capacity); commercial anchor
              customers not signed before factory completion; AM competition takes market share in automotive
              prototyping; defense contracts plateau at $15-20M annual run-rate; and capital pressure forces a dilutive
              bridge or down-round Series D at below Series C terms. Under this scenario, the company may be acquired
              strategically at $100-$200M — a significant loss for Series C investors. Final diligence asks before any
              investment commitment should include: (1) ITAR registration confirmation; (2) CMMC Level 2 assessment
              status; (3) AS9100 certification or timeline; (4) audited or reviewed financials showing cash balance,
              monthly burn, and gross margin; (5) Intelligent Factory anchor customer LOIs or signed capacity
              agreements; (6) factory construction contract and phased capex budget; and (7) reference calls with AFRL
              program managers on delivered part quality.
