      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Machina Labs' go-to-market strategy is built around two parallel channels: defense procurement through
              SBIR/SBIR Phase III programs and direct OEM engagement, and commercial automotive and aerospace pilots
              with strategic-investor customers. The defense channel is characterized by long sales cycles—typically
              12-36 months from initial SBIR proposal to contract award—but yields multi-year contracts with high
              visibility into forward revenue. The AFRL SBIR Phase III pathway provides a congressionally-protected
              sole-source mechanism that bypasses standard competitive procurement, reducing churn risk once a program
              is established.

              On the commercial automotive side, the Toyota Motor North America body panel pilot, announced at the
              UP.Summit in September 2025 alongside a Woven Capital investment, represents a classic
              strategic-investor-as-first-customer model. Woven Capital's participation as both Series C lead investor
              and pilot partner compresses the typical enterprise sales cycle by collapsing the customer validation
              stage. However, the financial terms, scale, and exclusivity provisions of this pilot are entirely
              undisclosed, preventing any calculation of customer acquisition cost (CAC) or payback period.

              Sales efficiency proxies are very limited for a private company at this stage. At approximately 90-100
              employees with an estimated five-to-seven person business development team based on publicly visible
              leadership including an SVP Aerospace and Defense and a Chief Business Officer, the implied CAC per
              contract win is high. Defense program pursuits cost hundreds of thousands of dollars in proposal
              preparation alone. No customer count, win rate, or average contract value data is publicly available. The
              company's strategic investor base—Woven Capital, Lockheed Martin Ventures, and NVentures—effectively
              functions as a high-value referral network reducing cold-acquisition costs in targeted verticals.
            claimRefs:
              - CI007
              - CI008
