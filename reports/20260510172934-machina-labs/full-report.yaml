      - number: '7.4'
        title: Partner, Dependency, and Financial Risk
        blocks:
          - type: paragraph
            body: >
              The Air Force (AFRL and RSO) represents the sole confirmed production customer base with at least $14M in
              total contract value. SBIR Phase III contracts use sole-source authority but are discretionary; transition
              to production FAR Part 12/15 contracts requires contracting officer action and program manager advocacy.
              DoD budget continuing resolutions and sequestration scenarios can delay option exercises even on active
              programs.

              Woven Capital's dual role as Series C lead investor and parent of Toyota TMNA creates potential pricing
              conflicts. Innovation Endeavors has participated in all rounds from Series A through Series C, suggesting
              concentrated board influence. The UAE Sovereign Development Fund as a co-investor creates CFIUS exposure
              that could force divestiture or operational restrictions. KUKA's Chinese ownership adds geopolitical risk
              to the robot supply chain.

              Financially, Machina Labs has raised approximately $172M in equity with a ~$333M secondary market
              valuation (Forge Global, 2024). No debt facility has been disclosed. Estimated annual burn of $25-40M
              (inferred from headcount and factory capex) implies 2-3 years of runway post-Series C. The Intelligent
              Factory buildout requires estimated $50-100M in capex, consuming a significant portion of Series C
              proceeds before commercial revenue scales. Revenue concentration in SBIR cost-type contracts limits gross
              margin leverage versus commercial production contracts.
