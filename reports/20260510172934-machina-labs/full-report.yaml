      - number: '1.5'
        title: Cover Metrics, Unit Economics, and Evidence Gaps
        blocks:
          - type: paragraph
            body: >
              Machina Labs is a private company and has not publicly disclosed revenue, gross margin, burn rate, unit
              economics, or path-to-profitability data. For a company that has raised over $200M, this opacity is
              standard for Series C private companies but represents a significant barrier to independent financial
              analysis. The post-money valuation of approximately $333M (Forge Global) implies that the company is
              valued on strategic potential and platform capability rather than demonstrated revenue multiples.

              On employee unit metrics: approximately 90–100 employees managing three facilities and building a 200,000
              sq ft factory suggests high capital intensity relative to headcount. Traditional stamping operations at
              similar scale would employ far more workers, but Machina's robotics-heavy model is designed for this. The
              $333M valuation against an estimated headcount of ~100 implies a valuation-per-employee of approximately
              $3.3M—comparable to high-growth deep-tech companies.

              Unit economics for RoboCraftsman are not publicly disclosed. The company states it manufactures
              approximately 30–35 units per year, but neither selling price nor lease rates per cell have been
              disclosed. Government contract data reveals only $3.37M for the AFRL SBIR Phase III program—a modest
              contract size that suggests government revenue currently represents a small fraction of total funding.

              Key financial evidence gaps: no revenue data, no gross margin data, no burn rate or runway information, no
              unit economics for RoboCraftsman, and no customer revenue concentration figures. Closing these gaps
              requires access to a data room under NDA. Investors in the Series C have this information; prospective
              investors do not.
