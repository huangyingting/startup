  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Landscape and Segmentation
        blocks:
          - type: paragraph
            body: >
              Machina Labs' customer base divides into two primary segments: government and defense (U.S. Department of
              Defense agencies, defense primes, and MRO depots) and commercial advanced mobility plus automotive. The
              government and defense segment is the dominant revenue channel, anchored by direct SBIR contract
              relationships with AFRL and the Air Force Rapid Sustainment Office, with a confirmed unnamed defense prime
              covering missiles and hypersonics components. The commercial segment is currently limited to Toyota TMNA
              (automotive pilot), NASA (government R&D case study), and implied theme park accounts for custom metal
              fabrication.

              Within the defense segment, customer relationships range from direct government contracts (AFRL SBIR Phase
              III, $3.37M confirmed) to the RSO's deployment of a second RoboCraftsman cell at the University of Dayton
              Research Institute (UDRI), supporting sustainment of C-130, C-5, C-17, and F-16 platforms. The automotive
              segment entry, through Toyota TMNA, is in a structured pilot phase for custom body panels (custom tailgate
              pilot announced September 2025 at UP.Summit) — not yet at production scale.

              Geographically, Machina Labs' customers are U.S.-based; no international customers have been publicly
              disclosed, consistent with ITAR compliance requirements for defense-dual-use technology. Customer
              acquisition follows a direct enterprise model supplemented by investor-customer alignment: Woven Capital
              (Toyota's CVC) led the Series C, collapsing customer acquisition cost for the automotive segment. The ARM
              Institute co-leads with AFRL on some programs, providing an additional institutional channel for defense
              manufacturing partnerships.
            claimRefs:
              - CU001
              - CU004
              - CU009
              - CU012
              - CU015
              - CU019
