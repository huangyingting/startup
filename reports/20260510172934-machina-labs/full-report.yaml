      - number: '1.4'
        title: Scale, Facilities, and Key Milestones
        blocks:
          - type: paragraph
            body: >
              Machina Labs operates three production facilities in the Los Angeles area. The primary Chatsworth campus
              (approximately 75,000 sq ft) houses both the RoboCraftsman machine-assembly line and low-volume
              production. A second facility—"Machina One"—has eight RoboCraftsman cells for production of hundreds of
              units per design for defense and aerospace customers. A third, 200,000 sq ft Intelligent Factory is under
              development, funded by the Series C, to house up to 50 RoboCraftsman cells and produce thousands of
              complex metal assemblies annually. The manufacturing facility can build approximately 30–35 new
              RoboCraftsman systems per year.

              Key milestones span founding through Series C. In April 2025, Machina delivered a RoboCraftsman to the
              University of Dayton Research Institute as part of AFRL Rapid Sustainment Office collaboration for
              aircraft part qualification. In September 2025, Machina was awarded a multiyear AFRL contract
              (FA868425CB003) worth up to $3.37M for AI-driven airframe sustainment, executed as an SBIR Phase III
              program with the ARM Institute. The Air Force Rapid Sustainment Office also awarded a separate contract.
              In September–October 2025, the company launched an automotive body panel pilot with Toyota Motor North
              America, announced at UP.Summit in Bentonville, Arkansas, alongside a strategic investment from Woven
              Capital. The February 2026 Series C close marked the scale inflection from technology company to
              production infrastructure.

              Machina demonstrated manufacturing of a toroidal tank for NASA using RoboForming, and has produced parts
              for C-130, C-5, C-17, and F-16 aircraft. The Deployable System (predecessor to RoboCraftsman) was
              delivered to Warner Robins Air Logistics Complex in Georgia. Revenue, facility utilization rates, and
              backlog remain undisclosed. The 200,000 sq ft factory completion timeline has not been publicly specified.
