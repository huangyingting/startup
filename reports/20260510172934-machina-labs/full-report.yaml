          At <500 units, die amortization makes per-part cost prohibitive (often $5K–$50K+/part); at >500 units,
          traditional stamping is significantly cheaper than any agile alternative
      - - Metal AM (LPBF/WAAM)
        - Per-part ($/kg + machine time); quoted per geometry via online platforms or direct RFQ
        - Build, support removal, heat treat, basic inspection; post-machining typically separate
        - >-
          Per-kg costs for Ti LPBF range from $500–$2,000+/kg depending on geometry; WAAM lower but post-processing adds
          cost; no standardized pricing
        - >-
          For thin sheet panels, metal AM is materially more expensive per kg than ISF or stamping; for compact
          high-complexity structures, can be cost-competitive with ISF
