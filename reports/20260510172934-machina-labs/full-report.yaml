            body: >
              The publicly available evidence of Machina Labs' financial traction is limited to capital raises, named
              contract awards, and industry database estimates. What is known: the company has raised approximately
              $209M in five rounds with the most recent $124M Series C in February 2026; at least $14M in DoD contract
