      - number: '5.4'
        title: Trust, Quality, Compliance, and Certifications
        blocks:
          - type: paragraph
            body: >-
              Machina Labs has achieved contract-specific MIL-SPEC process qualification for its AFRL SBIR Phase III
              program (FA868425CB003, $3.37M), meaning parts produced for that program were accepted by the U.S. Air
              Force under military qualification criteria. This qualification is program-specific, not facility-wide.
              AS9100D certification — the aerospace quality management standard required for supply chain participation
              with tier-1 primes — is reported as in progress, with gap analysis substantially complete. NADCAP
              accreditation covering special processes has not been initiated as of May 2026, representing a material
              gap for prime aerospace supply chain entry.


              DoD ManTech's 2025 Annual Report explicitly highlights AI-driven manufacturing as a national defense
              priority, validating the strategic alignment of Machina's approach. The Air Force Rapid Sustainment Office
              has deployed a RoboCraftsman cell at the University of Dayton Research Institute (UDRI), marking an
              important operational validation point. ITAR compliance for defense programs is asserted but not
              independently confirmed in public sources. CFIUS implications of foreign investor participation (UAE
              Strategic Development Fund is a Series C participant) require independent legal review given the dual-use
              nature of the technology.


              Process repeatability data — Cpk, SPC metrics — have not been publicly disclosed across the full cell
              fleet, leaving the statistical quality posture unverified for any investor or prime contractor evaluating
              supply chain qualification. DoD re-qualification windows of 18-36 months apply if any manufacturing
              process is materially changed, creating risk if the Intelligent Factory scale-up alters process parameters
              from those qualified in current SBIR programs.
