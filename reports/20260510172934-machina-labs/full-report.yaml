      - number: '6.2'
        title: Named Customer Evidence
        blocks:
          - type: paragraph
            body: >
              The strongest customer evidence rests on government contract records. The Air Force Research Laboratory
              SBIR Phase III contract (FA868425CB003, $3.37M) is confirmed in HigherGov procurement records and
              announced by Machina Labs in September 2025, establishing AFRL as an Air Force-qualified production
              supplier under the SBIR sole-source mechanism. AFRL qualified the RoboCraftsman process specifically for
              defense parts production, representing the deepest contractual validation available in the public record.

              The Air Force Rapid Sustainment Office (RSO) awarded Machina Labs a contract supporting AI-driven
              manufacturing for aircraft sustainment, deployed at UDRI. The RSO subsequently purchased a second
              RoboCraftsman cell — the clearest repeat-order and customer expansion signal in the portfolio. The RSO
              deployment covers sustainment parts for C-130, C-5, C-17, and F-16 aircraft, addressing the classic MRO
              use case where original tooling dies no longer exist and lead times for traditional procurement extend to
              months or years.

              Toyota Motor North America was announced as a partner in September/October 2025, with a custom body panel
              pilot (custom tailgate) as the first article. This relationship is strategically significant as commercial
              validation, though it should not be characterized as a production revenue relationship pending public
              confirmation of post-pilot purchase commitments.

              NASA completed a toroidal tank case study (compound-geometry fuel tank formed via RoboForming), which
              demonstrates space-grade compound curvature capability without disclosing a contract value or continuation
              timeline. An unnamed defense prime is referenced in press materials for missiles and hypersonics
              components but has not been independently confirmed in procurement databases. Theme park customers are
