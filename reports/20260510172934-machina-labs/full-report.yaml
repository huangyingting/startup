              Customers seeking large-format, hard-alloy, US-domestic, DoD-qualified sheet forming have no viable
              multi-homing option as of May 2026. Divergent addresses different geometries; Hadrian addresses different
              processes; Kikukawa is geographically ineligible; metal AM lacks large-panel scale economics; and
              traditional stampers require tooling investment that makes low-volume runs uneconomical. This absence of
              multi-homing alternatives translates directly into buyer lock-in and reduces price competition for
              Machina's DoD contracts.
