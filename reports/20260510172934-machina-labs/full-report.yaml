      - number: '8.2'
        title: Valuation Context and Comparable Analysis
        blocks:
          - type: paragraph
            body: >
              The $333M post-money Series C valuation is anchored in Forge Global secondary market data, the most
              credible independent source available for a private company. On estimated 2025 revenue of $10-20M
              (headcount proxy), this implies a 17x to 33x revenue multiple — substantially above comparable defense
              manufacturing services companies (typically 1-4x revenue) and above comparable AI-hardware startups at
              early commercial stage (typically 5-15x revenue). The premium reflects the market's pricing of two
              options: the Intelligent Factory recurring revenue model and the strategic acquisition value to a defense
              prime or automotive OEM. Comparable transactions include: Relativity Space's Series E at $4.2B
              (pre-revenue, heavy AM manufacturing thesis, 2021) — now cautionary given Terran 1 program cancellation;
              Velo3D's SPAC at $1.7B (2022) — now trading well below SPAC price following revenue shortfalls; Shield AI
              at approximately $2.7B (2023, defense AI); and Joby Aviation at $6.6B (2021, deep-tech defense/commercial
              mobility). The Velo3D and Relativity comparisons are particularly instructive: both entered public markets
              on AM manufacturing theses with government contract backing, and both experienced significant valuation
              compression when commercial ramp timelines extended. Machina Labs' $333M valuation at a private stage is
              more defensible than Velo3D's SPAC price, but the compression risk is real if the factory model
              underdelivers.

              For M&A exit valuation, comparable strategic transactions in aerospace manufacturing include Ducommun's
              acquisition of Moog's aerospace structures for $60M (2019), Kaman Aerospace's acquisitions at 6-10x
              EBITDA, and defense electronics acquisitions at 10-15x EBITDA. If Machina Labs reaches $50M revenue with
              30% gross margins and strategic scarcity value, an 8-12x EBITDA exit implies a $120-$180M exit — below the
              Series C entry price. The bull case requires the company to demonstrate factory-scale recurring revenue
              and technology platform licensing before a strategic acquirer would pay a premium multiple. An IPO pathway
              is credible only post-$100M ARR, which is likely 5-7 years away at current trajectory.
            claimRefs:
