      - number: '5.5'
        title: Roadmap and Technical Risks
        blocks:
          - type: paragraph
            body: >-
              The Intelligent Factory — 200,000 sq ft, 50+ RoboCraftsman cells — is the defining capital deployment
              milestone for Machina Labs' Series C proceeds. The facility will represent a step-change from the current
              8-cell Machina One capacity to production-grade scale across defense and advanced mobility customers.
              Construction is expected to occur over 2027-2028 based on typical industrial build timelines and capital
              phasing from the February 2026 close. Until the Intelligent Factory is operational, Machina's revenue
              capacity is structurally capped by current cell count.


              The AI roadmap runs on three tracks: expanding material models to cover broader alloy families and forming
              regimes; advancing to fully autonomous toolpath generation for novel geometries (versus current
              AI-assisted human-review); and deploying closed-loop quality control that eliminates post-forming manual
              inspection. Nvidia's NVentures investment aligns strategically with the GPU compute dependency underlying
              AI training and inference for forming models. Key technical bets include the data flywheel hypothesis
              (that forming data from additional cells creates compounding AI accuracy improvements), the digital twin
              predictive accuracy claim (unvalidated publicly), and the ability to maintain process qualification
              equivalence as cell count scales.


              Key technical risks are: (1) execution risk on the Intelligent Factory build at speed and on budget; (2)
              key-person dependency in the Architect AI team; (3) ISF's structural volume ceiling limiting addressable
              market relative to stamping at scale; (4) the 18-36 month DoD re-qualification window constraining process
              iteration speed; and (5) the supplier concentration risk in robot arms and GPU compute. Patents filed on
              ISF process innovations provide primary IP protection, but ISF academic literature is public and
              competitors with resources could develop similar approaches.
