        title: Capital Adequacy and Runway Analysis
        blocks:
          - type: paragraph
            body: >
              Machina Labs raised $124M in its Series C close on February 4, 2026. The company has stated that a
              significant portion of proceeds will be used to build a large-scale Intelligent Factory in the U.S.—a
              200,000 sq ft facility that will house up to 50 RoboCraftsman cells. Additional stated uses include
              deploying more RoboCraftsman cells to existing and new customer sites and expanding headcount. No specific
              capital allocation breakdown has been disclosed.

              Estimating burn rate from publicly observable signals: at approximately 90-100 employees and an estimated
              $25-40M annual operating expense run rate, and assuming the Intelligent Factory buildout requires $50-100M
              phased over three years (approximately $17-33M per year in capex), total cash consumption is estimated at
              $42-73M per year in the peak construction phase. At the lower end, the $124M Series C provides roughly
              three to five years of operating runway; at higher burn including capex, this could be as short as 20
              months. DoD contract revenue (estimated $15-25M annually by 2026) offsets a meaningful share of operating
              expense, extending effective runway.

              The most likely next-round trigger is the Intelligent Factory reaching initial operational capability,
              anticipated in 2027-2028 based on typical industrial construction timelines. At that point, with 20-50
