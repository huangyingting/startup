      - number: '5.2'
        title: RoboForming Technology Deep-Dive
        blocks:
          - type: paragraph
            body: >-
              RoboForming is a two-point incremental forming (TPIF) variant in which opposing robot arms apply
              synchronized localized force to both sides of a clamped metal sheet. This dual-sided engagement is the key
              differentiation over single-point CNC-ISF: it eliminates the Z-axis depth limitation, achieves tighter
              dimensional tolerances through balanced force application, and enables geometries — re-entrant features,
              variable-angle walls, compound curvatures — that conventional ISF cannot produce. FANUC or ABB-class
              7-axis industrial robot arms are modified with Machina's proprietary control software and custom forming
              end-effectors; the arms are not off-the-shelf but are adapted hardware on a proprietary control
              foundation.


              The Architect AI platform converts CAD geometry to robot toolpaths through a physics-informed simulation
              engine that models material deformation, springback, and thinning prior to any physical forming. This
              digital-twin simulation validates the toolpath before the first physical pass. During forming, custom
              force/position sensors fuse real-time feedback into adaptive control loops that correct the toolpath
              mid-operation if deformation deviates from prediction. Each forming run expands the AI training corpus,
              creating a data flywheel: more cells and more geometries produce better future prediction accuracy and
              fewer correction iterations.


              Machina Labs has demonstrated production-grade parts on C-130, C-5, C-17, and F-16 airframes through AFRL
              partnerships, as well as the NASA toroidal tank — a compound-curvature geometry that validates ISF
              capability on space-grade materials. Tooling cost savings versus traditional stamping dies exceed $1
              million per unique geometry for complex aerospace structures. The primary structural limitation of ISF is
              its volume ceiling: the process is economically optimal below approximately 1,000 units per geometry per
              year, making it unsuitable for high-volume mass production but well-matched to the aerospace/defense LRIP
              and MRO segments.
            claimRefs:
              - CE001
              - CE002
              - CE004
              - CE007
              - CE014
              - CE020
              - CE021
              - CE022
              - CE033
              - CE035
