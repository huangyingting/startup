      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple analyst lenses are used to bound the market because no single published report isolates the
              low-volume, hard-metal, robotic incremental sheet forming segment that Machina Labs specifically
              addresses.

              The broadest TAM lens is global metal forming overall: The Business Research Company estimated the global
              metal forming market at approximately $202B in 2025, growing at a ~4% CAGR toward $268.9B by 2034
              (Precedence Research). This broad framing includes everything from automotive stamping to construction
              steel—most of which is irrelevant to Machina's positioning. A more focused second lens is the aerospace
              and defense share of metal forming. A&D accounts for roughly 14% of global metal forming demand based on
              industry segment breakdowns from Research and Markets, implying a $28–31B A&D metal forming market in
              2025. The third and most specific lens is the incremental sheet forming (ISF) machine market:
              GrowthMarketReports estimated the ISF machine market at approximately $412M in 2024, projecting a CAGR of
              8.7% to reach $870M by 2033.

              The aerospace and defense MRO market provides a further sizing anchor: Grand View Research estimated the
              global A&D MRO market at $142.7B in 2025, growing at 3.9% CAGR to $199.6B by 2033. Airframe MRO typically
              represents 15–30% of total MRO spend, implying $21–43B in airframe-specific MRO globally. Of that,
              military legacy-platform airframe sustainment—the core of Machina's initial government business—represents
              a meaningful subset addressable by sheet-metal forming.

              Synthesizing these lenses, Machina's serviceable addressable market (SAM) is estimated at $5–10B:
              approximately $2–5B for low-volume hard-metal forming in defense and aerospace production, and $3–5B for
              military sustainment and MRO sheet metal parts for the US and allied legacy fleets. An additional
              $500M–$2B in automotive prototype and pre-production panel forming is partially overlapping. The DoD
              ManTech program—which funds manufacturing technology R&D for defense programs—had a $38.9M budget for the
              AFRL Manufacturing Technology Program in FY2026, representing the government-funded R&D channel relevant
              to Machina's SBIR contracts. DoD ManTech total obligated spending exceeds $900M annually across all
              branches and technology areas.

              Machina's serviceable obtainable market (SOM) over a 5-year horizon is estimated at $100–300M, based on an
              assumed deployment of 20–50 RoboCraftsman cells each generating $2–5M in annual forming revenue. This
              estimate carries low confidence as it depends on funding pace, competitive displacement, and customer
              expansion beyond the current defense pilot portfolio.
