companyProfile:
  summary: >
    Machina Labs is a Los Angeles–area advanced manufacturing startup founded in 2019 by CEO Edward Mehr and CTO Dr.
    Babak Raeisinia. The company's core product—the RoboCraftsman platform—uses two AI-guided industrial robotic arms
    with electromagnetic forming heads to incrementally shape metal sheets into complex three-dimensional parts without
    traditional hard tooling. This approach dramatically reduces lead times (days vs. months) and costs for low-volume,
    complex-geometry metal parts, targeting aerospace, defense, and automotive OEM customers. Key customers and
    investors include Lockheed Martin Ventures, Woven Capital (Toyota), NVIDIA NVentures, and the UAE Strategic
    Development Fund. Machina Labs has raised approximately $209M in total, with a $124M Series C in 2024, and is
    estimated to be valued at roughly $333M post-money based on secondary market data.
