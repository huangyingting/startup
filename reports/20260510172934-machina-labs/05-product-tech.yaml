chapter:
  number: 5
  title: Product & Technology
  summary: Machina Labs' RoboCraftsman platform pairs dual 7-axis robotic arms with the proprietary RoboForming incremental
    sheet forming (ISF) process, delivering production-grade aerospace and defense metal parts in 24-48 hours without hard
    tooling — versus 6-18 months for die-based stamping. The Architect AI software converts CAD inputs to robot toolpaths
    and adapts in real time through force/position sensor feedback, creating a self-reinforcing data flywheel. Machina One,
    the 8-cell Chatsworth facility, is operationally validated and AFRL SBIR Phase III qualified; the planned 200,000 sq ft
    Intelligent Factory (50+ cells) is the critical scale-up bet dependent on $124M Series C execution. Key open diligence
    gaps are NADCAP accreditation, independent toolpath prediction accuracy validation, and confirmed process-repeatability
    statistics across the full cell fleet.
sections:
- id: product-architecture-and-scope
  title: Product Architecture and Scope
  body: 'Machina Labs operates five distinct product assets across hardware, process, software, and facility layers. The RoboCraftsman
    is a dual 7-axis robotic arm system housed within a portable ISO container format that forms complex 3D metal geometry
    from CAD files without hard tooling. Each cell performs the full workflow — forming, trimming, laser scanning, and optional
    heat treatment — within a single self-contained unit deployable at customer sites or forward-deployed locations within
    days.


    The RoboForming process is Machina''s proprietary ISF method in which two robot arms work simultaneously from opposite
    sides of a clamped metal sheet, incrementally forming complex 3D geometry without dies. Unlike CNC-based single-point
    ISF, the dual-arm approach enables geometries with no Z-axis constraint, higher formability limits, and real-time force
    control via AI feedback. The Architect software is an internal CAM platform that ingests CAD/CAM inputs and generates
    RoboForming toolpaths using AI-driven path planning and adaptive process control. Architect is not sold or licensed externally;
    it is the intelligence backbone of every RoboCraftsman cell.


    Machina One is the company''s first 8-cell production facility at the Chatsworth, California campus, operational since
    approximately 2023 and AFRL-qualified for defense production. The Intelligent Factory — a 200,000 sq ft facility planned
    using Series C proceeds — will scale capacity to 50 or more cells, representing the central capital deployment bet. Materials
    qualified include aluminum 6000 and 7000 series, Ti-6Al-4V, stainless steel, Inconel 625 and 718, and other exotic alloys
    — six or more alloy families in total. The product architecture spans a clear layered stack from raw materials through
    hardware, control, intelligence, and application layers, with IP concentrated at the control and intelligence layers.'
