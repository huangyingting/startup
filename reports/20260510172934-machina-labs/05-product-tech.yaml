- id: customer-workflow-and-integration
  title: Customer Workflow and Integration
  body: 'The customer-facing workflow begins with submission of a CAD file plus material specification and tolerance requirements
    to Machina Labs, delivered either through Architect''s intake interface or direct digital transfer. Architect AI then
    generates a dual-arm RoboForming toolpath from the CAD geometry, a process that takes hours for novel geometry and minutes
    for previously seen shapes. A digital twin simulation validates the toolpath and checks predicted deformation against
    material limits before any physical forming begins.


    The RoboCraftsman cell then executes the validated toolpath with real-time sensor feedback continuously adjusting force
    and path parameters during forming. After forming, the part undergoes 3D scanning and first-article inspection by comparison
    to CAD nominal. Robotic trimming, drilling, and edge finishing follow before final manual inspection. The total cycle
    from CAD submission to first-article delivery is 24-48 hours for most geometries — the core value proposition versus 6-18
    months for hard tooling.


    Manual steps remain in the workflow primarily at final inspection and customer hand-off. There is no disclosed ERP or
    PLM integration layer for enterprise customer systems, and no public API or developer SDK for connecting customer engineering
    environments to Architect. Integration friction is a potential gap for large prime customers with rigid supply chain digitization
    standards. Documentation packages for traceability are included with each delivery, meeting defense-program traceability
    requirements but the depth of that documentation for AS9100D or NADCAP compliance has not been publicly verified.'
