callouts:
- calloutType: strength
  title: Dual-arm RoboForming eliminates the hard-tooling bottleneck for low-volume aerospace metal parts
  body: The RoboCraftsman's dual 7-axis arm architecture enables complex geometries — compound curves, re-entrant features,
    variable wall angles — that single-arm CNC-ISF cannot achieve, while delivering 24-48 hour first-article lead times versus
    6-18 months for stamping dies. For aerospace MRO, defense sustainment, and LRIP programs, this is a structural solution
    to a decade-long supply chain problem, not an incremental improvement.
  claimRefs:
  - CE001
  - CE002
  - CE013
  - CE017
- calloutType: risk
  title: NADCAP gap and missing Cpk data are material barriers to prime aerospace supply chain entry
  body: Machina Labs has not initiated NADCAP accreditation and has not publicly disclosed process repeatability statistics
    (Cpk/SPC). Without NADCAP, the company cannot be an approved special-process supplier to Boeing, Lockheed Martin, or Northrop
    Grumman for flight-critical parts. This gap imposes a 2-3 year qualification timeline before full prime supply chain participation
    is achievable, constraining revenue growth from the highest-value contracts.
  claimRefs:
  - CE026
  - CE037
- calloutType: insight
  title: Nvidia NVentures investment creates structural alignment between AI compute dependency and capital
  body: 'Machina Labs'' AI forming models require substantial GPU compute for training and inference. Nvidia''s NVentures
    participation as a Series C investor creates a structural alignment: Machina has both a financial incentive and a relationship
    channel to access priority GPU allocation and early access to next-generation AI hardware. In a compute-constrained environment,
    this investor-as-supplier dynamic is a meaningful supply chain advantage.'
  claimRefs:
  - CE009
  - CE034
