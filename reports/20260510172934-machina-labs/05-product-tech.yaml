  evidenceGaps:
  - type: missing-source
    severity: material
    topic: compliance
    missingEvidence: No publicly available Cpk, Ppk, or statistical process control data have been identified for Machina
      Labs forming operations across its cell fleet. No AS9100D interim audit report or NADCAP roadmap timeline has been publicly
      disclosed as of May 2026.
    whyItMatters: Aerospace prime contractors require supplier process capability data for supply chain qualification. Without
      this data, Machina Labs cannot be independently evaluated as a qualified supplier for flight-critical parts, limiting
      the diligence completeness on the compliance track.
    diligencePath: Request process capability studies (Cpk, Ppk) for representative geometries and alloys from the Machina
      Labs data room. Request the AS9100D gap analysis report and NADCAP timeline. Verify against prime contractor supplier
      qualification checklists.
    relatedQuestionRefs:
    - QE016
    - QE017
  - type: private-evidence-only
    severity: material
    topic: technology
    missingEvidence: No independent third-party validation of Architect's digital twin predictive accuracy has been identified.
      The data flywheel hypothesis — that additional cells compound AI forming accuracy — has not been independently measured
      or peer-reviewed.
    whyItMatters: If digital twin prediction accuracy or data flywheel benefits are overstated, the number of physical forming
      iterations per novel geometry may be higher than implied, affecting stated speed advantages and the compounding moat
      narrative.
    diligencePath: Request validation datasets comparing digital twin prediction error to measured outcomes across representative
      geometries and materials. Seek independent academic or third-party benchmarking reports. Ask for AI model accuracy metrics
      by alloy family.
    relatedQuestionRefs:
    - QE008
    - QE028
