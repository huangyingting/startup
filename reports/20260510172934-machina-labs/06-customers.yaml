callouts:
- calloutType: strength
  title: SBIR Sole-Source Mechanism Creates Durable Revenue Moats
  body: 'The AFRL SBIR Phase III contract provides legally protected sole-source revenue under 15 USC section 638(r), bypassing
    competitive recompete for the life of the Phase III vehicle. This mechanism, combined with the process qualification already
    achieved, creates a structurally durable government revenue channel that is materially more predictable than open-competition
    defense contracts.

    '
  claimRefs:
  - CU013
  - CU014
- calloutType: strength
  title: RSO Second-Cell Purchase Is the Portfolio's Clearest Expansion Signal
  body: 'The Air Force RSO''s purchase of a second RoboCraftsman cell at UDRI is the strongest available repeat-order signal
    in the customer portfolio. It demonstrates that the customer was sufficiently satisfied with the first deployment to commit
    capital to a second unit, and it expands coverage to additional aircraft platforms. This is a capital equipment expansion,
    not just a service contract renewal.

    '
  claimRefs:
  - CU003
  - CU016
- calloutType: risk
  title: Customer Concentration in DoD Is Material and Unmitigated by Commercial Revenue
  body: 'With AFRL and RSO together representing the only confirmed production-stage customers, and commercial accounts (Toyota,
    NASA) at pilot or case-study stage, DoD almost certainly represents more than 70 percent of current revenue. Any defense
    budget reallocation, SBIR restructuring, or program cancellation could have a disproportionate impact. SBIR Phase III
    sole-source provides partial protection but does not eliminate this risk.

    '
  claimRefs:
  - CU027
  - CU028
  - CU029
- calloutType: risk
  title: CFIUS/SDF Exposure Is an Underappreciated Risk to Defense Customer Eligibility
  body: 'UAE sovereign wealth fund participation in prior Machina Labs funding rounds creates CFIUS exposure that could, in
    a worst-case scenario, affect the company''s eligibility for classified or restricted defense contracts. This is not a
    confirmed adverse event, but it is a structural risk that diligence should address directly with an independent CFIUS
    opinion before any transaction.

    '
  claimRefs:
  - CU030
  - CU032
