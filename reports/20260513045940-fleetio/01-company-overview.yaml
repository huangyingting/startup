  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Annual recurring revenue and financial performance
      missingEvidence: "Fleetio does not publicly disclose ARR, revenue growth rate, gross margins, EBITDA, customer revenue concentration, or net revenue retention."
      whyItMatters: "Without confirmed revenue data, the $1.5B valuation cannot be contextualized against a verified revenue multiple; at the $58M third-party estimate, the implied multiple is approximately 25x."
      diligencePath: "Request audited financial statements or management accounts as part of formal due diligence; seek ARR bridge and cohort retention data."
      relatedQuestionRefs: [QO011]
      relatedTableRefs: [TO001]

    - type: private-evidence-only
      severity: material
      topic: Cap table and ownership structure
      missingEvidence: "No public cap table available; ownership percentages for Elephant, Goldman Sachs Alternatives, Summerville, Meachin, and other stakeholders not disclosed."
      whyItMatters: "Without ownership distribution, it is impossible to assess founder dilution across five rounds, liquidation preferences, anti-dilution provisions, or effective voting control."
      diligencePath: "Request cap table, shareholder agreement, and Series D term sheet in formal due diligence process."
      relatedQuestionRefs: [QO025, QO030]
      relatedTableRefs: [TO003]

    - type: missing-source
      severity: minor
      topic: Founding year discrepancy across sources
      missingEvidence: "Tracxn lists founding year as 2011 while official Fleetio communications and primary press releases consistently state 2012. Legal entity incorporation date unclear."
      whyItMatters: "Consistent founding date is needed for accurate milestone timeline and may affect how early product development is characterized."
      diligencePath: "Verify with Delaware or Alabama corporate records for Rarestep Inc. incorporation filing date."
      relatedQuestionRefs: [QO001]

    - type: stale
      severity: minor
      topic: Official employee headcount as of 2026
      missingEvidence: "Most recent official entity filing (Rarestep, Inc. via Tracxn) shows 283 employees as of December 31, 2024. Third-party estimates of 459 for early 2026 are unverified against official data."
      whyItMatters: "Headcount is a proxy for post-Series D burn rate and organizational scale; gap between official and estimated counts is 62%, material for financial modeling."
      diligencePath: "Request current employee count and organizational chart from Fleetio management team."
      relatedQuestionRefs: [QO012]
      relatedTableRefs: [TO001]

    - type: missing-source
      severity: moderate
      topic: Legal and regulatory exposure as of 2025–2026
      missingEvidence: "No public litigation database or court record search was available. The only identified adverse legal event was a WIPO domain dispute (D2024-4822) resolved in Fleetio's favor. No regulatory actions, EEOC filings, or contract disputes were found in public sources."
      whyItMatters: "Fleet management SaaS platforms handling telematics, GPS, and driver data across 100+ countries face potential data privacy, employment, and vehicle-monitoring regulatory risks that are not fully visible from public sources alone."
      diligencePath: "Commission a legal due diligence search covering US, UK, EU, and Australian jurisdictions; review customer contracts for indemnification language and any outstanding claims."
      relatedQuestionRefs: [QO020]

    - type: private-evidence-only
      severity: moderate
