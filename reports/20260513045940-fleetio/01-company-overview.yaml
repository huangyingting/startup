      missingEvidence: "No public documentation of Fleetio's succession planning, CEO employment contract terms, founder equity vesting completion, or board policies for leadership continuity after the 2023 CEO transition. The full leadership org chart below C-suite level is not publicly available."
      whyItMatters: "The 2023 first-ever non-founder CEO appointment (Jon Meachin) is a material transition risk; departure of Meachin, Summerville, or CFO Mandel could destabilize investor confidence and operational continuity in a critical post-Series D scaling phase."
      diligencePath: "Request CEO and CFO employment agreements, equity vesting schedules, board succession policy, and organizational chart from Fleetio management."
