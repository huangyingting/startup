company:
  name: Fleetio
chapter:
  number: 1
  title: "Company Overview"
  summary: "Fleetio (Rarestep, Inc.) is a Birmingham, Alabama-based fleet optimization SaaS platform founded in 2012 that achieved unicorn status in March 2025 after closing a $454 million Series D co-led by Elephant and Goldman Sachs Alternatives, valuing the combined business at over $1.5 billion. The company simultaneously acquired Auto Integrate to create a maintenance ecosystem serving over 8 million vehicles across 110,000+ repair shops in North America. Fleetio's $624 million in total funding, 8,000+ global fleet customers, and expanding AI capabilities position it as a category leader in fleet maintenance optimization."

sections:
  - id: identity-and-business-model
    title: "Identity and Business Model"
    body: "Fleetio operates under its legal entity name Rarestep, Inc. and was founded in January 2012 by Tony Summerville in Birmingham, Alabama. The company's cloud-based SaaS platform enables organizations worldwide to track, analyze, and optimize every aspect of fleet operations—from vehicle lifecycle management and preventive maintenance to fuel tracking, driver compliance, equipment management, and real-time reporting. Fleetio's core mission is to help organizations manage everything in the life cycle of every asset, from cradle to grave. The platform is delivered as a subscription service priced from approximately $4 per vehicle per month, making it accessible to fleets of all sizes from small operators to enterprises managing more than 10,000 assets. Fleetio's Maintenance Shop Network—expanded through the 2025 acquisition of Auto Integrate—connects fleet operators with over 110,000 repair shops across the United States, Canada, and Mexico, enabling outsourced maintenance workflows, repair order approvals, and real-time vehicle repair status tracking. The platform includes Fleetio Go, a mobile application with over 1.3 million users that supports inspections, work orders, and driver communication. Fleetio operates across more than 100 countries, serving industries including transportation and logistics, construction, utilities, municipal government, emergency services, and rental and sharing fleets."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO029]
    figureRefs: [FO002]

  - id: leadership-and-governance
    title: "Leadership and Governance"
    body: "Fleetio was founded by Tony Summerville, a management information systems graduate of Auburn University who spent two years at Regions Financial Corporation and six years at Birmingham's Daxko before launching the company in 2012. Summerville was inspired by observing fleet management challenges at his father's electrical supply business, Inline Electric Supply. He served as CEO for over a decade before transitioning to Executive Chairman in May 2023 when Jon Meachin—previously the COO—was elevated to CEO. Meachin holds an MBA from The Wharton School and a bachelor's degree from Brown University, with prior executive experience at A Cloud Guru and Campaign Monitor. Alongside the CEO transition, Fleetio subsequently appointed Matt Mandel as CFO and COO in November 2023 to prepare the company for potential capital markets activity including a future IPO. Jorge Valdivia serves as Chief Technology Officer, responsible for the platform's engineering and technical roadmap, which includes 1.3 million active mobile users at 99.9% crash-free session rates. Ben Nachbaur joined as Chief Revenue Officer in 2024, bringing nearly 30 years of fleet industry sales leadership. Fleetio's board has 11 active members, with Jeremiah Daly of Elephant and Brendon Hardin of Growth Equity at Goldman Sachs Alternatives representing the two lead Series D investors. The founder-to-CEO transition creates notable key-person concentration risk, while Tony Summerville's retained board chairmanship maintains strategic continuity."
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011, CO012, CO013]
    tableRefs: [TO002]

  - id: funding-and-capital-history
    title: "Funding and Capital History"
    body: "Fleetio has raised a cumulative total of $624 million across five formal funding rounds since its initial seed financing in September 2016. The company bootstrapped from its 2012 founding before securing a $750,000 seed round, followed by a Series A of $3.5 million in March 2019 that coincided with early international expansion. The Series B of $21.1 million in November 2020, led by Elephant Venture Capital with Endeavor participating, enabled significant hiring and product development. A landmark $145 million Series C in May 2023, led solely by Elephant, funded aggressive R&D and team expansion while coinciding with the CEO transition from Tony Summerville to Jon Meachin. The defining Series D—$454 million closed in March 2025—was co-led by Elephant and Growth Equity at Goldman Sachs Alternatives. This round simultaneously financed the acquisition of Auto Integrate and valued the combined business at over $1.5 billion, conferring unicorn status. Brendon Hardin of Goldman Sachs Alternatives joined Fleetio's board as part of the Series D arrangement. Latham and Watkins LLP advised Fleetio on the financing and acquisition with cross-border teams covering US and UK law, antitrust, IP, employment, and sanctions. The company has not disclosed any convertible notes, secondary transactions, or debt financing in public communications; private financials including ARR and revenue growth rates are not available."
    claimRefs: [CO014, CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: scale-and-operating-metrics
    title: "Scale and Operating Metrics"
    body: "Fleetio's combined post-acquisition platform services over 8 million vehicles, processes more than 13 million repair orders annually, and connects fleet operators with over 110,000 repair shops across the United States, Canada, and Mexico. The company served more than 8,000 fleets globally as of the end of 2025, operating in more than 100 countries across transportation, logistics, construction, utilities, and municipal sectors. Fleetio Go, the platform's mobile application, has accumulated over 1.3 million users with a 99.9% crash-free session rate, reflecting platform reliability at scale. The company's telematics integration portfolio covers over 320,000 connected devices, enabling centralized fleet operations management. Fleetio's headcount reached approximately 459 employees as of early 2026, reflecting strong hiring growth from approximately 300 in early 2025—more than 50% year-over-year. Third-party estimates place Fleetio's annual revenue at approximately $58 million, implying revenue per employee of approximately $193,000. For comparison, competitor Samsara generates approximately $1.4 billion in annual revenue and Motive approximately $2.2 billion, indicating Fleetio remains significantly smaller by revenue despite its unicorn valuation—a gap reflecting market positioning and growth stage. Customer-reported outcomes include an estimated 12% reduction in maintenance spend through the Maintenance Shop Network in H2 2025, and a 2024 third-party survey found that 77% of customers experienced fewer preventable breakdowns and 95% noted operational cost reductions."
    claimRefs: [CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO031, CO032, CO033, CO041, CO042, CO044]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: key-milestones-and-strategic-events
    title: "Key Milestones and Strategic Events"
    body: "Fleetio's history spans thirteen years from a bootstrapped one-person startup to a $1.5 billion unicorn. The company launched in January 2012 in Birmingham, Alabama, securing its first 100 paying customers with no affiliation to the founder—an early signal of genuine product-market fit. The company remained bootstrapped until its September 2016 seed round, progressing through Series A in 2019 and Series B in 2020 as it expanded internationally. A key inflection point came in 2023 when Elephant led a $145 million Series C and Tony Summerville transitioned to Executive Chairman, naming Jon Meachin CEO—the company's first non-founder CEO. In 2024, Fleetio surpassed 1 million vehicles managed on its platform, launched a Customer Advisory Board, introduced AI-powered features including Fleetio Go in Spanish and Service Program Automation, and hired nearly 100 new employees. The company earned Deloitte Technology Fast 500 recognition and AutoTech Breakthrough Fleet Management Company of the Year in 2024. The defining event of 2025 was the $454 million Series D and simultaneous acquisition of Auto Integrate in March, elevating Fleetio to unicorn status and creating a comprehensive fleet maintenance ecosystem. In H2 2025, the company delivered over 60 product enhancements, expanded the Maintenance Shop Network into Canada, appointed Nick Izquierdo as President of Auto Integrate, and reported AI-powered Smart Uploads reducing service entry time by up to 90%. Fleetio also successfully defended its brand through a WIPO domain name dispute in 2024. Looking ahead to 2026, the company is advancing capabilities in fleet utilization analysis and right-sizing."
    claimRefs: [CO034, CO035, CO036, CO037, CO038, CO039, CO040, CO043, CO044, CO045]
    tableRefs: [TO004]

