callouts:
  - calloutType: strength
    title: "Broad Industry Diversification Reduces Cyclicality Risk"
    body: "Fleetio's 8,000+ customers span field services, logistics, construction, municipal government, healthcare, and equipment rental—preventing over-exposure to any single industry cycle. A construction downturn would be buffered by stable municipal and utilities fleet contracts, while field services growth supports organic expansion in the SMB core."
    claimRefs: [CU004, CU005, CU006, CU007, CU008]

  - calloutType: strength
    title: "Strong Third-Party Validation Across Major Review Platforms"
    body: "A 4.6/5 G2 rating and 4.7/5 Capterra rating across 430+ combined reviews—alongside positive coverage from PCMag, Expert Market, and Gartner Peer Insights—provide unusually broad third-party customer validation for a private-stage SaaS company. Consistency across platforms indicates genuine product satisfaction rather than review manipulation."
    claimRefs: [CU011, CU012, CU020]

  - calloutType: risk
    title: "SMB Customer Concentration Creates Retention Risk in Downturns"
    body: "Fleetio's customer base is predominantly SMB fleets (5–100 vehicles), which are more likely to churn during economic contractions, reduce fleet size (cutting per-vehicle subscription value), or switch to lower-cost alternatives. Without NRR and GRR data, it is impossible to quantify this risk—making SMB/enterprise revenue split the highest-priority retention diligence request."
    claimRefs: [CU035, CU036, CU037]

  - calloutType: risk
    title: "No Publicly Disclosed Retention Metrics Limit Valuation Underwriting"
    body: "Fleetio does not disclose NRR, GRR, logo churn, or cohort data. At a $1.5B+ valuation, investors are pricing in a strong retention profile (likely NRR ≥110%), but without verified data, this assumption cannot be confirmed. The absence of retention disclosure is standard for private SaaS but is the single largest underwriting gap in the customer chapter."
    claimRefs: [CU022, CU023, CU024]

  - calloutType: insight
    title: "Maintenance Shop Network Adds Expansion Revenue Beyond Per-Vehicle Subscriptions"
    body: "The Auto Integrate acquisition creates a second revenue stream (per-repair-order or network access fees through the Maintenance Shop Network) that activates when fleet operators outsource maintenance to external shops. For mid-market and enterprise fleets outsourcing 30–50% of maintenance volume, this creates meaningful expansion upside beyond the base per-vehicle contract, potentially increasing NRR in the segments where it matters most."
    claimRefs: [CU031, CU032, CU033]

  - calloutType: recommendation
    title: "Prioritize Retention Data and SMB/Enterprise Revenue Split in Diligence"
