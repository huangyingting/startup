  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Net Revenue Retention and Gross Churn by Customer Segment
      missingEvidence: "Fleetio-reported NRR, GRR, and logo churn by cohort year and customer size band (SMB, mid-market, enterprise). Retention data for at least 2022–2025 cohorts to establish trajectory."
      whyItMatters: "At a $1.5B+ valuation, investors implicitly underwrite NRR ≥110%. Without verified retention data, the valuation premium above revenue multiples cannot be justified. SMB-enterprise churn differential is the most important signal for long-term sustainability of the customer base."
      diligencePath: "Request trailing 4-quarter NRR/GRR from CFO. Require customer cohort analysis (logo retention and net expansion by size band) in the data room. Run at least five customer reference calls across SMB, mid-market, and enterprise segments to validate renewal and expansion behavior."
      relatedQuestionRefs: [QU014]
      relatedTableRefs: [TU004]

    - type: private-evidence-only
      severity: material
      topic: Customer Concentration and SMB/Enterprise Revenue Split
      missingEvidence: "ARR breakdown by customer size segment (SMB vs mid-market vs enterprise), top-10 customer ARR concentration as a percentage of total ARR, and competitive win/loss data by segment."
      whyItMatters: "If SMB customers represent >70% of ARR with 8–10% gross churn, the base compounding math under a growth recession scenario materially changes the valuation case. Enterprise expansion is necessary to de-risk the customer base but its current revenue contribution is unknown."
      diligencePath: "Request customer count and ARR breakdown by fleet size bucket in due diligence data room. Ask for average contract value trend from 2022 to 2025 to confirm ACV expansion. Request top-10 customer ARR concentration disclosure."
      relatedQuestionRefs: [QU004]
      relatedTableRefs: [TU001, TU005]

    - type: private-evidence-only
      severity: moderate
      topic: Named Customer Outcome Metrics and Reference Quality
      missingEvidence: "Customer-specific outcome data (maintenance cost savings, downtime reduction, ROI) for named enterprise customers (County of Los Angeles, Clean Harbors, Terminix). Named customer reference quality (production vs pilot confirmation for all seven named accounts)."
      whyItMatters: "Without quantified outcomes from named enterprise customers, it is impossible to assess whether enterprise adoption converts to deep embedded usage or remains surface-level. High-quality enterprise references with specific ROI data are the most persuasive evidence for the enterprise scaling thesis."
      diligencePath: "Request three to five named enterprise customer reference calls. Ask each reference for specific outcome data: maintenance cost delta, downtime reduction, payback period, and likelihood to renew. Verify production vs pilot status and usage depth for all named accounts."
      relatedQuestionRefs: [QU008, QU007]
      relatedTableRefs: [TU003]

    - type: private-evidence-only
      severity: moderate
      topic: Fleet Size Distribution and Customer Count Progression
      missingEvidence: "Customer count by fleet size bucket over time (2020–2025), geographic ARR breakdown (North America vs international), and SMB/mid-market/enterprise customer count progression."
      whyItMatters: "Understanding whether the 8,000+ customer count is growing at the SMB tier or shifting toward mid-market and enterprise is critical for assessing whether the Series D enterprise scaling thesis is executing. Without this data, it is impossible to confirm the SMB-to-enterprise migration trajectory."
      diligencePath: "Request annual customer count cohort by fleet size band from internal CRM data. Ask for geographic ARR breakdown (US, Canada, rest of world). Compare 2022, 2023, and 2024 cohorts to confirm enterprise growth trajectory."
      relatedQuestionRefs: [QU004, QU005, QU022]
      relatedTableRefs: [TU001, TU002]
