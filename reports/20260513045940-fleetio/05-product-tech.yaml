callouts:
  - calloutType: strength
    title: "Hardware-Agnostic Integration Moat"
    body: "Fleetio's 100+ telematics integrations let fleet operators choose GPS hardware freely, removing lock-in risk and enabling adoption by fleets already committed to Samsara, Geotab, or dozens of other providers. This breadth is a durable competitive advantage that software-only competitors building proprietary hardware ecosystems cannot easily replicate."
    claimRefs: [CE010, CE011]

  - calloutType: strength
    title: "Maintenance Shop Network Creates Supply-Side Moat"
    body: "The 2025 acquisition of Auto Integrate gives Fleetio direct access to 110,000+ repair shops—a supply-side network asset that took Auto Integrate years to build and cannot be easily replicated. This positions Fleetio as the only fleet management SaaS platform with an integrated outsourced maintenance ecosystem at continental scale."
    claimRefs: [CE013, CE014]

  - calloutType: risk
    title: "AI/ML Capabilities Lag Telematics-Native Competitors"
    body: "Fleetio's AI features—Smart Uploads and basic predictive maintenance alerts—are early-stage relative to Samsara's AI-powered safety scoring, computer vision dashcam analysis, and generative AI assistant. No public AI roadmap has been released, creating uncertainty about the pace of AI investment and long-term platform competitiveness as the category matures."
    claimRefs: [CE034, CE035, CE036]

  - calloutType: risk
    title: "Cloud-Only Deployment Limits Regulated-Sector Reach"
    body: "Fleetio's cloud-only SaaS architecture excludes fleet operators in regulated industries requiring on-premise or government-cloud deployment—including certain federal agencies, defense contractors, and utilities with data sovereignty requirements. This is a structural gap that cannot be addressed without significant re-architecture investment."
    claimRefs: [CE026, CE027]

  - calloutType: insight
    title: "SOC 2 Type II Is a Necessary but Not Sufficient Enterprise Credential"
    body: "While SOC 2 Type II certification demonstrates a meaningful control baseline, enterprise fleet procurement often requires additional evidence: FedRAMP for federal customers, GDPR/CCPA attestation for cross-border operators, and published SLA terms. Fleetio does not publicly disclose SLA uptime guarantees, RPO/RTO targets, or GDPR compliance status, creating friction in larger enterprise sales cycles."
    claimRefs: [CE021, CE022, CE024, CE025]

  - calloutType: recommendation
    title: "Validate SOC 2 Scope, SLA Terms, and AI Roadmap in Due Diligence"
    body: "Request the full SOC 2 Type II report and most recent bridge letter, contractual SLA uptime guarantees, DR/BCP test results, and a detailed product roadmap covering AI/ML investment plans for 2026–2027. The absence of a public AI roadmap and formal SLA documentation are the two highest-priority technical due diligence gaps."
    claimRefs: [CE022, CE024, CE036]

