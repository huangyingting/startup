  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: SOC 2 Type II Audit Scope and Controls Detail
      missingEvidence: "Full SOC 2 Type II report including description of controls, scope boundaries, exceptions noted by auditor, and bridge letter covering the period up to due diligence date."
      whyItMatters: "Enterprise fleet operators with regulatory obligations (DOT, FMCSA) and self-insured fleets need to verify the specific controls covered, the testing period, and any exceptions to confirm Fleetio's security posture meets their requirements."
      diligencePath: "Request SOC 2 Type II report and most recent bridge letter. Confirm scope includes availability, confidentiality, and processing integrity trust service criteria. Ask for most recent penetration test results."
      relatedQuestionRefs: [QE024]
      relatedTableRefs: [TE004]

    - type: private-evidence-only
      severity: material
      topic: Contractual SLA, DR, and BCP Documentation
      missingEvidence: "Contractual uptime SLA terms (target uptime %, financial remedies for breach), RPO, RTO, and results of most recent DR testing or BCP activation."
      whyItMatters: "Fleet operators running safety-critical operations (emergency services, logistics) need contractual uptime guarantees. Absence of public SLA data creates uncertainty about Fleetio's enterprise-grade reliability commitments."
      diligencePath: "Request standard customer contract including SLA exhibit. Ask for uptime records over the trailing 12 months from status.fleetio.com. Request DR test report and BCP documentation."
      relatedQuestionRefs: [QE017, QE027]
      relatedTableRefs: [TE004]

    - type: private-evidence-only
      severity: material
      topic: AI/ML Roadmap and Investment Commitment
      missingEvidence: "Detailed internal product roadmap covering AI/ML features planned for 2026–2027, including investment levels, team composition of ML engineering, and competitive benchmarking against Samsara AI capabilities."
      whyItMatters: "Fleetio's early-stage AI capabilities are a material competitive gap. Investors need to assess whether the company has a credible AI investment plan to close the gap with telematics-native competitors before the market consolidates around AI-differentiated platforms."
      diligencePath: "Request product roadmap presentation, ML team headcount and organizational structure, and any internal AI strategy documents. Benchmark against Samsara and Geotab AI feature releases."
      relatedQuestionRefs: [QE019, QE022, QE023, QE029]
      relatedTableRefs: [TE005]

    - type: private-evidence-only
      severity: minor
      topic: Technology Stack Verification and Scaling Architecture
      missingEvidence: "Confirmed current technology stack (language, framework, database), multi-tenancy isolation architecture details, database sharding or read-replica strategy for high-volume telematics data ingestion."
      whyItMatters: "As Fleetio scales from 8 million vehicles to potential 50M+, the Ruby on Rails + PostgreSQL stack may face performance constraints for real-time telematics data at scale. Technical architecture review is needed to assess scaling risk."
      diligencePath: "Request engineering due diligence briefing including tech stack overview, system architecture diagram, peak load metrics, and any planned re-platforming initiatives."
      relatedQuestionRefs: [QE012, QE015, QE025]
      relatedTableRefs: [TE003]

    - type: private-evidence-only
      severity: minor
      topic: Auto Integrate Integration Completeness and Shop Network Quality
      missingEvidence: "Technical integration status between Auto Integrate and core Fleetio platform (API surface, data model unification), shop network NPS, shop quality metrics, and coverage density by geography."
      whyItMatters: "The Maintenance Shop Network is the key strategic differentiator added in 2025. If integration is incomplete or shop quality is inconsistent, the claimed 12% cost reduction benefit may not be repeatable at scale."
      diligencePath: "Request technical architecture review of Auto Integrate integration, shop onboarding metrics, customer NPS data for shop network users, and geographic coverage maps."
      relatedQuestionRefs: [QE015, QE007]
      relatedTableRefs: [TE001]
