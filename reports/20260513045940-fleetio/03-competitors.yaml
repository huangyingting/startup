callouts:
  - calloutType: strength
    title: "Maintenance-First Moat Reinforced by Auto Integrate"
    body: "Fleetio's March 2025 acquisition of Auto Integrate created the fleet management industry's most extensive repair shop connectivity network (110,000+ shops), establishing a moat that telematics-first competitors cannot replicate through software development alone. This positions Fleetio as the infrastructure layer for outsourced fleet maintenance — a category-defining advantage embedded in real-world repair shop relationships and approval workflows."
    claimRefs: [CP014, CP020, CP033]

  - calloutType: risk
    title: "Telematics Giants Adding Maintenance Capabilities"
    body: "Samsara and Geotab are actively investing in preventive maintenance modules and work order management, threatening to bundle these capabilities with their telematics subscriptions. If maintenance features achieve sufficient depth, mid-market fleet operators may consolidate to single-vendor solutions, reducing Fleetio's addressable market among customers who prefer bundled offerings over best-of-breed software."
    claimRefs: [CP018, CP030]

  - calloutType: insight
    title: "Hardware-Agnostic Architecture as Partnership Flywheel"
    body: "Fleetio's decision to integrate rather than compete with GPS and telematics providers creates a structural opportunity to become the standard maintenance management layer across the fleet technology ecosystem. As fleets adopt multiple telematics tools, Fleetio can serve as the neutral aggregation platform — a positioning that has historically led to durable market leadership in adjacent SaaS vertical categories."
    claimRefs: [CP013, CP036]

