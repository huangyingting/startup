callouts:
  - calloutType: risk
    title: "Competitive Bundling Is the Critical Near-Term Threat"
    body: "Samsara, Geotab, Verizon Connect, and GoMotive are all actively expanding maintenance workflow features into their telematics platforms. With $1.25B ARR and 40,000+ customers, Samsara has both the scale and competitive incentive to bundle DVIR inspection and preventive maintenance as a zero-cost add-on to its telematics subscription. Investors should obtain win/loss data segmented by telematics hardware overlap before committing."
    claimRefs: [CR001, CR002, CR003, CR004]

  - calloutType: risk
    title: "Financial Opacity Is a Material Diligence Blocker"
    body: "Fleetio has not disclosed net revenue retention, gross retention, CAC, CAC payback period, or Auto Integrate transaction unit economics. Without NRR, investors cannot determine whether Fleetio's ARR is growing through expansion or new logos alone. The 10–15x implied ARR multiple is only defensible if NRR is above 110% — a threshold that cannot be verified externally."
    claimRefs: [CR033, CR034, CR035, CR040]

  - calloutType: risk
    title: "EV Transition Is the Structural Long-Term Risk"
    body: "Electric vehicle fleets require significantly less preventive maintenance than ICE vehicles — no oil changes, simpler drivetrains, fewer brake events. As commercial EV fleet penetration accelerates toward 2030–2035, Fleetio's per-vehicle workflow engagement and TAM per vehicle will decline unless the platform pivots to new fleet management workflows (charging management, battery health monitoring) that offset the PM reduction. This structural threat is a 5–10 year risk, not an immediate concern, but investors modeling terminal value must stress-test it."
    claimRefs: [CR006, CR007, CR029]

