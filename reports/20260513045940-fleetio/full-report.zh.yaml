  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与核心能力
        blocks:
          - type: paragraph
            body: >-
              Fleetio 是纯云、多租户 SaaS
              平台，用来管理车队资产的完整生命周期。平台围绕七个核心模块搭建：预防性维护排程、工单管理、零部件和库存控制、数字化车辆检查报告（DVIR）、燃油管理、司机和资质管理，以及车联网/GPS 集成。用户通过响应式
              Web 应用和 Fleetio Go 移动应用（iOS 和 Android）访问这些模块；Fleetio Go 已累计超过 1.3 million 名活跃用户。Fleetio Go
              支持实时完成检查、拍照、标记缺陷、合规工作流、符合 FMCSA
              要求的司机车辆检查报告，以及基于推送的工单通知。预防性维护模块是平台的旗舰能力，运营方可以按里程、发动机工时或日历周期安排服务计划，达到阈值时自动生成工单，并在多维修店流程中跟踪完成状态。零部件库存管理包括条码扫描、库存水位提醒、供应商管理，以及将零部件成本归集到工单。燃油管理模块接入
              WEX FleetCard 和其他燃油卡提供商，自动把燃油交易与车队记录核对，标记异常，并生成单车燃油成本报告。车队报告覆盖自定义仪表盘、车队健康评分、维护成本分析，以及可导出到外部 BI
              工具的数据。部署形态仅支持云端，没有本地部署选项；所有客户数据托管在 AWS 基础设施上，并通过多租户隔离保护。
