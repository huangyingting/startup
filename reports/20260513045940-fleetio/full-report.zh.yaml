      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              Fleetio 估值需要在公开可比公司、私人轮次先例和 M&A 交易之间三角定位，并按相关性筛选：纯软件、垂直 SaaS、车队管理平台、ARR 阶段 $100–$150M。主要公开可比是
              Samsara（NASDAQ: IOT），其 FY2025 报告 $1.25B ARR、33% YoY 增长、74% non-GAAP 毛利率和 $22B 市值——约对应 17–18x ARR。Samsara
              的硬件捆绑模式相较 Fleetio 这样的纯软件同行有轻微毛利率折价；调整后，Fleetio 的 10–15x 隐含倍数看起来可以辩护。Verra Mobility（NASDAQ:
              VRRM）是第二个公开数据点：年收入约 $350M，市值 $3B，业务处在车队支付和交通技术交叉处——约对应 ~8.5x 收入，作为车队 /
              出行科技基准有参考性，但受其通行费和支付服务组合限制。Powerfleet（NASDAQ: PWFL）由 2023 年 Powerfleet 与 Mix Telematics 合并而成，提供下限参考：年化收入约
              $200M，市值 $300M，约 1.5x 收入——明显低于 Fleetio，反映 Powerfleet 的硬件依赖、较低增长和新兴市场暴露。私人市场方面，Motive（原 KeepTruckin）在 2022
              年 Series F 估值约 $2.85B，估计 ARR 为 $200–$300M，隐含 ~9.5–14x ARR——虽有硬件捆绑，但仍是接近的私人可比。Fleet Complete 于 2018 年被
              Element Fleet Management 以约 $600M 收购，按行业估计约为 ~12x ARR。这些可比表明，对 ARR 阶段 $100–$150M、双位数增长的车队 SaaS 平台，10–15x
              ARR 是市场出清区间；硬件依赖或增长下滑的同行交易在 5–10x。Fleetio 相对硬件依赖同行的溢价，有其纯软件模式支撑；相对 Samsara 公开市场倍数的折价，则反映了合理的私人公司流动性折扣。
