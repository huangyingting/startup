        - 索取 Fleetio EV 功能路线图，以及客户中拥有 EV 车队的比例
      - - AI 预测性维护
        - 技术驱动
        - 正向
        - 近期（2–3 年）
        - 高阶功能层；可把车队维护成本降低 10–40%；Fleetio 的 AI Smart Uploads 将服务录入时间减少 90%；差异化具备变现空间
        - 确认 AI 功能采用率，以及相较非 AI 客户的 ARPU 提升
      - - 远程信息处理硬件成本下降
        - 成本驱动
        - 正向
        - 近期（持续）
        - 降低 SMB 采用门槛；扩展 TAM 底层；Fleetio 已集成 320K+ 台设备；对 CAGR 贡献 +3.8%（Mordor NA）
        - 询问 2025 年 SMB 新客户增长率和定价层级分布
