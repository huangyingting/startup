      - number: '8.3'
        title: DCF 与内在价值框架
        blocks:
          - type: paragraph
            body: >-
              对一家未披露财务的私人增长阶段 SaaS 公司做 DCF，必须明确承认模型不确定性区间。对 Fleetio 来说，关键驱动因素包括：（1）收入基数（第三方估计：$100–$150M ARR，中点
              $125M）；（2）增长率（由融资轨迹和 Growjo 信号推断为 30–50% YoY）；（3）终端增长率（嵌入车队工作流的平台可取 5–7%，与 Grand View Research 给出的车队管理市场
              11% CAGR 一致）；（4）折现率（30–35%，适合具备流动性不足、信息不对称和阶段性 VC 风险溢价的私人增长阶段 SaaS 公司）；（5）目标退出期限（5 年，在 FY2030 以 15–20x 前瞻
              ARR 通过 IPO 或战略收购退出）。基准情景下——$125M ARR 以 35% 年增速增长，到 FY2030 达到 ~$430M ARR，并以 15x 前瞻 ARR 退出倍数和 32% WACC
              折现——Fleetio 当前现值约为 $1.8–2.2B，高于目前 $1.5B+ 估值，意味着 5 年持有期在基准假设下有温和上行。乐观情景（50% CAGR、20x 退出倍数）给出 $3.5–4.5B
              现值；悲观情景（20% CAGR、10x 退出倍数）给出 $0.9–1.3B，低于入场价，意味着持续低于预期时当前估值存在下行。Auto Integrate 引入收入多元化变量：如果维修店授权网络在 3–5
              年内在 Fleetio 8,000+ 客户中达到 15–25% 附着率，交易收入可额外贡献 $25–50M ARR 等价收入，显著抬高基准 ARR 轨迹。对折现率敏感性很高：WACC 每变化
              5%，基准情景现值约移动 $200–300M，凸显理解实际退出路径和时间线的重要性。
