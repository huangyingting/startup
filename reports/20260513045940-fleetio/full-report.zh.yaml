      - number: '4.2'
        title: 成本结构与毛利率驱动因素
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的纯软件架构——没有专有硬件、没有嵌入式车联网设备——在结构上让其毛利率优于捆绑硬件的车队技术同行。主要收入成本包括云基础设施（AWS / Azure 托管、计算、实时车辆和维护数据存储）、第三方
              API 集成成本（连接 100+ 家 GPS 和车联网服务商），以及客户成功和支持人员。参照产品架构相似的垂直 SaaS 公司，70–80% 毛利率与 Fleetio 画像一致。最接近的公开市场对标
              Samsara 尽管采用硬件捆绑模式，FY2025 非 GAAP 毛利率仍报告为 73–76%；Fleetio 这样的纯软件厂商通常会更高。Auto Integrate
              引入了一层可变成本——交易处理、门店网络运营和支付对账——随着交易收入扩张，会小幅压缩混合毛利率，但在交易收入完全成熟时，影响预计仅为 3–5 个百分点。运营费用结构未公开披露。基于 $454M Series D
              和约 400–500 名员工，月度现金消耗估计为 $8–15M，隐含烧钱倍数约为新增 ARR 的 1.5–2.0x。R&D 投入可能占收入 25–35%（与成长阶段 SaaS 一致），用于支持 Fleetio
              平台、Auto Integrate 集成，以及 2025 年新闻稿中描述的 AI 驱动车队智能路线图计划。
