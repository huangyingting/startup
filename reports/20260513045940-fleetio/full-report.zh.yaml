      - number: '1.3'
        title: 融资与资本历史
        blocks:
          - type: paragraph
            body: >-
              Fleetio 自 2016 年 9 月首次种子融资以来，五轮正式融资累计募集 $624 million。公司 2012 年成立后先靠自举发展，之后拿到 $750,000 种子轮；2019 年 3 月完成
              $3.5 million Series A，并与早期国际扩张同步。2020 年 11 月，Elephant Venture Capital 领投、Endeavor 参投的 $21.1 million Series
              B 支撑了大规模招聘和产品开发。2023 年 5 月，Elephant 独家领投标志性的 $145 million Series C，为激进 R&D 和团队扩张提供资金，也与 Tony Summerville 向
              Jon Meachin 交棒 CEO 同期发生。决定性的一轮是 2025 年 3 月完成的 $454 million Series D，由 Elephant 和 Goldman Sachs
              Alternatives 的 Growth Equity 共同领投。该轮同时为收购 Auto Integrate 提供资金，并将合并后业务估值推高至 $1.5 billion 以上，使公司跻身独角兽。作为
              Series D 安排的一部分，Goldman Sachs Alternatives 的 Brendon Hardin 加入 Fleetio 董事会。Latham and Watkins LLP 为
              Fleetio 的融资和收购提供法律顾问，跨境团队覆盖美国和英国法律、反垄断、IP、雇佣和制裁。公司在公开沟通中未披露任何可转债、老股交易或债务融资；ARR 和收入增长率等私营财务数据也不可得。
