  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价架构
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的收入引擎锚定按车辆计费的 SaaS 订阅模式——结构直接、收入经常性，并让平台价值与车队规模一致。入门级 Essentials 公开标价约 $4–5 per vehicle per
              month，Professional 和 Premium 档位的每车费率更高，但未完全披露。车队运营商按年付费，带来预收现金，并按 ASC 606
              平滑确认收入。车辆数是主要计费单元，意味着收入直接随车队增长和向更大套餐的增购而扩张。2025 年 3 月收购 Auto Integrate 后，公司通过 110,000+
              个维修网络地点的门店授权和发票对账，增加了第二条交易型收入流。每次门店授权都会产生单笔交易费，在固定 SaaS 订阅之上叠加可变收入，并提高每车商业化密度。组合模式——可预测的 SaaS ARR
              加增长中的交易收入——通过分散收款机制、在市场两端把工作流嵌入车队运营商和维修门店，改善整体收入质量并加深切换成本。第三条潜在收入流是数据商业化或 API 伙伴费用；公司尚未公开披露，但在 Fleetio
              这一成熟阶段并不罕见。Growjo 和 Tracxn 估计年收入约 $100–$150M，与一个管理约 1 million 辆车、处于早期独角兽阶段的平台相符。
