      - number: '5.2'
        title: 集成生态与开发者平台
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的硬件无关架构是核心战略差异点：平台不自己生产 GPS 硬件，而是通过标准化 API 接入超过 100 家第三方车联网和 GPS 供应商。认证合作伙伴包括
              Samsara、Geotab、Verizon Connect、Motive（原 KeepTruckin）、Zubie、Teletrac Navarro
              以及数十家区域供应商，使车队运营方无需被供应商锁定，就能集中利用既有硬件投资产生的数据。燃油卡集成覆盖 WEX、FleetCard 和其他提供商，自动将燃油采购核对进车队记录。零部件采购集成接入
              PartsTech 和 NAPA Auto Parts，技师可以直接在工单流程中下单，无需切换应用。2025 年 3 月，Fleetio 收购 Auto Integrate，增加覆盖美国、加拿大和墨西哥的
              110,000+ 家经审核维修店网络。借助 Maintenance Shop
              Network，车队运营方可以向外部维修店提交维修请求、接收维修估价、在线审批工作，并实时跟踪车辆维修状态——把车队维护编排从自有技师延伸到外部维修生态。developer.fleetio.com
              上的开发者平台开放 REST API，包含超过 50 类 webhook 事件，支持与第三方车队管理系统、ERP 平台和车联网提供商集成。开发者门户提供 API 参考文档、认证指引，以及跟踪版本历史的 API
              变更日志。截至 2026 年中，API 变更日志显示版本仍在持续更新，说明第三方开发活跃。H2 2025 推出的 Motive 双向集成，通过自动化双向工作流集中燃油、维护和车联网数据，展示了平台的集成深度。
