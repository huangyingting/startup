            body: >-
              净收入留存率是评估 SaaS 收入质量和扩张健康度最重要的单一指标。Fleetio 未公开披露 NRR、流失率或 cohort
              级留存数据。缺少这些信息时，收入质量评估只能依赖结构类比（工作流集成、高切换成本），而不是经验证据。对高确信度投资决策而言，这是阻断性缺口。
