            title: Maintenance Shop Network 在按车订阅之外增加扩张收入
            body: >-
              Auto Integrate 收购创造了第二条收入流（通过 Maintenance Shop Network 按维修工单收费或收取网络访问费），当车队运营方把维护外包给外部维修店时激活。对外包 30–50%
              维护量的中型市场和企业车队来说，这会在基础按车合同之外带来有意义的扩张上行，并可能提升最关键细分中的 NRR。
            calloutType: insight
            claimRefs:
              - CU031
              - CU032
              - CU033
          - type: callout
            title: 尽调优先索取留存数据和 SMB/企业收入拆分
            body: >-
              索取按队列年份和客户规模分层的 NRR 与 GRR、前 10 大客户 ARR 集中度、按车队规模区间划分的平均合同价值，以及竞争赢单 / 输单数据。SMB/企业收入拆分以及这两个细分之间的流失差，是支撑
              $1.5B+ 估值最重要的未知项。至少要求 3 次企业客户背调电话，以验证具名客户证据。
            calloutType: recommendation
            claimRefs:
