  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户画像与分层
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的客户基础由运营车辆或设备车队的组织构成，它们需要在单一软件平台上管理维护、合规和运营效率。截至 2025 年末，Fleetio 在全球 100+ 个国家服务超过 8,000
              家车队客户，管理车辆超过 8 million 辆。平台主要吸引三类车队规模：小型车队（5–100 辆），构成核心 SMB 市场，也是客户数占比最大的群体；中型市场车队（100–1,000
              辆），维护复杂度和多站点运营推动采用；企业车队（1,000+ 辆），Fleetio 2025 年增长重点集中在这一层。主要购买者画像是车队经理、车队运营总监或设施 / 运营
              VP，他们同时负责合规和成本结果。主要用户画像分为两类：通过 Web 仪表盘管理的车队经理，以及通过 Fleetio Go
              完成检查并接收通知的司机。付款方通常是拥有车队组织的运营或财务职能。行业垂直分布广泛：现场服务（害虫防治、HVAC、管道、草坪护理、园林）是历史核心垂直，同日服务调度会放大维护紧迫性；配送和物流（最后一公里、食品服务、快递）强调路线效率和预防性维护；建筑和公用事业依赖设备和混合车队，检查要求复杂；市政和县政府（如
              County of Los Angeles 和 Fulton County, Georgia）带来合规驱动的采购流程；医疗和医疗转运需要处理接近 HIPAA
              范畴的运营数据；设备租赁车队需要利用率和生命周期跟踪。Fleetio Go 移动应用是司机和现场技师的主要采用界面，1.3 million 名活跃用户反映了司机端参与广度。
