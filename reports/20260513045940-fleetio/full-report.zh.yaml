              - CI015
          - type: callout
            title: 收购 Auto Integrate 增加交易收入并加深护城河
            body: >-
              收购 Auto Integrate 引入交易费收入层，让 Fleetio 的商业化从订阅扩展出去，与 110,000+
              家维修门店形成网络效应，并通过嵌入式财务工作流提高平台粘性。这种收入多元化改善长期收入质量，也降低了对纯订阅增长的依赖。
