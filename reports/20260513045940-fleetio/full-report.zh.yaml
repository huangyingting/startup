      - number: '1.5'
        title: 关键里程碑与战略事件
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的历史跨越十三年，从自举起步的一人创业公司成长为 $1.5 billion 独角兽。公司 2012 年 1 月在 Alabama 州 Birmingham 启动，在没有创始人关系导流的情况下拿下前
              100 个付费客户，较早证明了真实的产品市场契合。公司一直自举到 2016 年 9 月种子轮，随后在 2019 年完成 Series A、2020 年完成 Series B，并推进国际扩张。关键拐点出现在
              2023 年：Elephant 领投 $145 million Series C，Tony Summerville 转任 Executive Chairman，并任命 Jon Meachin 为
              CEO——这是公司首位非创始人 CEO。2024 年，Fleetio 平台管理车辆数突破 1 million，成立 Customer Advisory Board，推出包括西班牙语版 Fleetio Go 和
              Service Program Automation 在内的 AI 功能，并新招近 100 名员工。公司在 2024 年入选 Deloitte Technology Fast 500，并获得 AutoTech
              Breakthrough Fleet Management Company of the Year。2025 年的决定性事件，是 3 月完成 $454 million Series D 并同步收购 Auto
              Integrate，使 Fleetio 跻身独角兽，并搭建出完整的车队维护生态。H2 2025，公司交付 60+ 项产品增强，将 Maintenance Shop Network 扩展到加拿大，任命 Nick
              Izquierdo 为 Auto Integrate President，并报告 AI-powered Smart Uploads 将服务录入时间最多减少 90%。Fleetio 还在 2024 年通过 WIPO
              域名争议成功维护品牌。展望 2026 年，公司正在推进车队利用率分析和 right-sizing 能力。
