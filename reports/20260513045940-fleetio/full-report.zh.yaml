  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与融资历史
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的 $1.5B+ 投后估值由 2025 年 3 月 Series D 确定；该轮 $454M 融资由 Emergence Capital Partners 领投，Bessemer Venture
              Partners、Volvo Financial Services、Guidon Capital 和 BuildGroup 跟投。Latham & Watkins LLP 同时为融资和 Auto
              Integrate 收购提供法律顾问，从法律层面确认交易完成。估值完全由第三方报道支撑——Yahoo Finance、Hypepotamus 和多家新闻媒体——而非 Fleetio
              直接财务披露，这符合私人公司常态。Fleetio 累计融资约 $539M，覆盖 Seed、Series A（$4M，2016）、Series B（$21M，2020）、Series C（$60M，2022）和
              Series D（$454M，2025）。隐含 ARR 倍数为 10–15x，基于 Growjo 的 $127M 估计和 $100–$150M ARR 中点计算，相比可比公开车队 SaaS
              平台是适度溢价。Samsara（NASDAQ: IOT）是最直接公开基准：$1.25B ARR、33% YoY 增长、74% non-GAAP 毛利率，且 2026 年初市值约 $22B——规模化后约对应
              17–18x ARR。Fleetio 的私人阶段溢价，与更早期增长潜力以及 Auto Integrate 交易收入模型中的战略期权价值一致。投资者质量——Emergence Capital（垂直 SaaS
              专家，组合包括 Veeva、ServiceMax、FinancialForce）和 Bessemer Venture Partners（组合包括
              Fleetio、Twilio、DocuSign）——显示机构成熟资本已经认可 $1.5B+ 价格。Volvo Financial Services 的战略参与增加了纯 VC
              之外的车队行业可信度。潜在投资者的入场纪律应考虑完整资本悬置（累计融资 $539M）、公开来源未知的优先权和清算条款，以及大额 Series D 所隐含的 24–36
              个月现金跑道。公开证据是否支撑该价格仍是关键开放问题：估值由多家独立新闻源互相印证，但不是经审计财务。
