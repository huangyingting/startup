      - number: '4.5'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: >-
              Fleetio 具备高质量收入基础：按车辆计费的经常性 SaaS 订阅，天然低流失（运营工作流嵌入），估计毛利率与一线垂直 SaaS 一致（70–80%），并且定价模型可随车队增长扩张。收购 Auto
              Integrate 后，收入分散到交易费，同时加深竞争护城河。$1.5B+ 投后估值隐含 10–15x ARR 倍数，略高于 Samsara
              当前公开市场倍数（~8–10x），对于一家完成重大战略收购的私营成长阶段车队 SaaS 平台来说，定价合理但不极端。主要财务风险包括：（1）资本效率比率偏高——累计融资 $539M，对应估计 $100–150M
              ARR，意味着重投入阶段支出较大，且烧钱倍数缺乏透明度；（2）净收入留存率（NRR）未披露，增购耐久性无法验证；（3）Auto Integrate
              交易收入处于早期，门店网络的挂载率、抽成率和单位经济性未公开；（4）大额 Series D 意味着下一轮纪律事件在 24–36 个月后，削弱了近期 IPO 或 M&A
              压力，而这类压力本可能迫使利润率改善。潜在投资者应要求提供：经审计历史 P&L、按客户 cohort 切分的 NRR 数据、按渠道划分的 CAC 和回本周期、Auto Integrate
              交易收入运行率及利润率贡献，以及 Series D 交割后详细资金用途瀑布。
