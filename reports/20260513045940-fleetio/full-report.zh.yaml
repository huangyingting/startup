      - number: '2.5'
        title: 市场约束与证据缺口
        blocks:
          - type: paragraph
            body: >-
              多项约束会放缓车队管理软件采用，也让市场规模测算更复杂。切换成本是被提及最多的采用障碍：从传统系统迁移数据可能扰乱运营；员工再培训需要数周到数月；硬件锁定（专有车联网设备）增加更换成本；带提前解约费的多年合同造成财务惯性。40%
              车队运营商认为预算约束是采用技术的最大障碍。车队管理软件市场高度碎片化，主流软件市场上列有约 900 款工具，造成买方困惑，也在商品化功能层面形成价格压力。Ford、GM 和 Stellantis 的 OEM
              嵌入式车联网正在形成竞争压力，它们可通过出厂安装硬件提供原生车队数据，进而可能把售后软件商品化——这对包括 Fleetio
              在内的独立车队管理厂商构成结构性风险。分析师对市场的估计差异巨大：MarketsandMarkets 将 2025 年全球市场规模估为 $37.71 billion，而 SNS Insider
              对同一年车队管理软件的估计为 $27–33 billion，反映出根本不同且不可直接比较的范围定义。分析师报告经常把车队维护服务市场（$314 billion）与车队管理软件混在一起；若不拆解范围，TAM
              对比并不可靠。证据缺口包括：行业没有统一标准来定义车队管理软件；Fleetio 具体市场份额的公开数据有限；以及 Fleetio 维护授权细分市场缺少更细的 SOM 估计。
            claimRefs:
              - CM025
              - CM026
              - CM036
              - CM037
