      - - 反向逻辑：Samsara、Verizon 和 Geotab 的车联网捆绑威胁独立车队管理 SaaS
        - Samsara 现在用一个捆绑合同打包车队维修排程、ELD 合规和资产追踪；Verizon Connect 的 RevealField 原生覆盖维修和合规；Geotab 开放平台可直接接入第三方 CMMS
        - 如果尽调显示 Fleetio NRR 高于 120%，说明捆绑产品没有蚕食现有客户基础，判断会增强（反向程度降低）
