      - number: '7.2'
        title: 监管与法律合规风险
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的监管暴露低于硬件或承运商公司，但高于纯横向 SaaS 平台，因为它处理司机位置数据、车辆检查记录和维护历史，触及多个合规框架。FMCSA 在 49 CFR Part 395 下的
              Electronic Logging Device（ELD）强制要求商用机动车运营方使用获批 ELD 记录工时；Fleetio 的 Driver Vehicle Inspection
              Report（DVIR）软件覆盖检查记录义务，但不构成 ELD。这个区分很重要：Fleetio 不是 ELD 强制令下的受监管实体，但其车队运营客户必须在 Fleetio 平台之外维持合规 ELD
              解决方案，任何混淆都可能让客户暴露于合规风险，并间接影响作为车队管理记录系统的 Fleetio。更紧迫的监管暴露是数据隐私。CCPA（Cal. Civ. Code §§
              1798.100–1798.199.100）和 GDPR（Regulation (EU) 2016/679）对收集、存储和处理流经 Fleetio 100+
              项车联网集成的司机位置数据、行为数据和车辆生物识别数据施加重大义务。Fleetio 的 SOC 2 Type II 认证覆盖安全控制，但在数据泄露或未经授权数据处理发生时，并不能预先免除 CCPA 或 GDPR
              责任。JD Supra 对车队联网隐私的法律分析明确指出，司机 GPS 位置数据、生物识别司机行为指标和维护记录交叉引用，都是受州和联邦隐私义务重叠约束的高价值 PII 数据集。Latham & Watkins
              已确认参与 Fleetio 的 Series D 和 Auto Integrate 收购，说明有专业法律顾问；截至本报告运行日期，未有公开披露的诉讼、专利纠纷或执法行动。
