      - number: '4.3'
        title: 增长牵引力与可比基准
        blocks:
          - type: paragraph
            body: >-
              Fleetio 最近可公开验证的运营里程碑，是截至 2024 年末平台管理车队车辆突破 1 million 辆——这是平台规模和客户留存深度的重要信号。Growjo 估计年收入约 $127M，按约 422–500
              名员工计算，人均收入大致为 $250–$300K，低于最佳 SaaS 基准（前四分位：$300–$400K），但符合公司为企业销售扩张提前加速招聘的状态。Fleetio 2024 年和 H2-2025
              业绩新闻稿强调客户增长和平台扩张里程碑，但未披露具体 ARR、NRR 或增长率。Samsara（NASDAQ: IOT）是主要公开可比公司：FY2025 ARR 为 $1.25B，同比增长 33%，毛利率
              73–76%，拥有 $40,000+ 客户。按 Fleetio 估计 $100–$150M ARR 和 $1.5B+ 投后估值计算，隐含 ARR 倍数为 10–15x，高于 Samsara 当前公开市场约
              8–10x ARR 倍数。该溢价符合私营成长阶段 SaaS 交易逻辑：投资者会把 TAM 扩张、收购后协同和潜在流动性事件提前计价。OpenView 的 2025 SaaS 基准显示，在 $50–$150M
              ARR 阶段，前四分位公司年增长率为 40–60%；由于 Fleetio 未披露 ARR，无法独立验证其有机增长率。第三方 SaaS 效率基准显示，最佳实践烧钱倍数低于 1.5x；考虑 Series D
              规模，Fleetio 可能正接近或超过这一水平。
