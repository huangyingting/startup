            body: >-
              2025 年全球车队管理市场估计从 $4.46 billion（纯软件，VMR）到 $37.71 billion（硬件 + 软件 + 服务，MarketsandMarkets）不等，跨度
              8x。差异来自根本不同的范围定义。若计算 Fleetio 市场份额或基于 EV / 倍数的潜在估值时选错估计，结论可能出现重大偏差。
