        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Geotab 是全球最大的商用车联网服务商，在 160 个国家拥有 3 million+ 订阅用户，自 2023 年起由 INRIX 支持。Geotab 的开放 Marketplace 拥有 300+
              项集成，并具备深度 OEM 车联网认证，使其成为企业和政府车队部署中最强的竞争对手。Samsara（NASDAQ: IOT）报告 FY2025 ARR 约 $1.25 billion，同比增
              33%，是公开市场中的车队车联网 SaaS 对标公司。Samsara 通过 AI 行车记录摄像头、驾驶员安全教练算法和实时合规自动化做差异化；这些功能与 Fleetio
              的检查和驾驶员管理工作流竞争，但与其维护深度的直接重叠较少。Verizon Connect 由 Fleetmatics（2016）和 NexTraq（2018）收购整合而来，主要服务企业客户，借助 Verizon
              的网络可靠性、24/7 支持基础设施和广泛资产跟踪能力。其定价（起步约 ~$35/vehicle/month）和长期合同瞄准中大型车队。Motive（原 KeepTruckin）聚焦卡车运输、配送和物流，ELD
              / HOS 合规与 AI 视频安全产品较强，定价约 $25–$45/vehicle/month。Element Fleet Management
              占据不同细分，提供车队融资、车辆采购和车队卡项目，而不是纯软件。AssetWorks 和 Chevin Fleet Solutions 以 GovFleet 合规软件满足政府和公共部门维护需求，与 Fleetio
              争夺市政和公用事业车队合同。RTA Fleet Management 服务 SMB 和中端市场车队，提供成熟的本地部署与云混合方案，历史上在北美市场较强。
