    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的法人实体为 Rarestep, Inc.，由 Tony Summerville 于 2012 年 1 月在 Alabama 州 Birmingham 创立。公司的云端 SaaS
              平台让全球组织能够跟踪、分析并优化车队运营的每个环节，从车辆生命周期管理、预防性维护，到燃油跟踪、驾驶员合规、设备管理和实时报告。Fleetio 的核心使命，是帮助组织从 cradle to grave
              管好每项资产生命周期里的所有事项。平台以订阅服务交付，价格从约 $4 per vehicle per month 起，小型运营商到管理 10,000+ 项资产的企业都能使用。Fleetio 的
              Maintenance Shop Network 通过 2025 年收购 Auto Integrate 得到扩展，连接美国、加拿大和墨西哥 110,000+
              家维修门店，支持外包维护流程、维修订单审批和实时车辆维修状态跟踪。平台还包括 Fleetio Go，这款移动应用拥有 1.3 million+ 用户，支持检查、工单和驾驶员沟通。Fleetio 业务覆盖 100+
              国家，服务交通与物流、建筑、公用事业、市政政府、应急服务以及租赁和共享车队等行业。
