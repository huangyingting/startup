      - number: '6.3'
        title: 客户经济性与留存信号
        blocks:
          - type: paragraph
            body: >-
              Fleetio 采用按车辆计费的 SaaS 订阅模式，价格约从每车每月 $4 起，可按月或按年计费，未披露安装费。这一价格结构形成自然扩张机制：客户增加车辆、地点或模块（如 Maintenance Shop
              Network 访问）时，无需更换平台，合同价值就会增长。公司未公开披露 Net Revenue Retention（NRR）、Gross Revenue
              Retention（GRR）或队列级流失数据，这符合私人阶段 SaaS 公司常态。参考服务 SMB 和中型市场车队运营方的类似垂直 SaaS 公司——包括定位相近、以维护为先的上市同行——NRR 在
              110–120% 区间、年度总流失率在 5–10% 区间，是合理基准估计。公开披露中的留存信号包括 2024 年推出 Customer Advisory Board、基于客户反馈持续产品开发（仅 H2 2025
              就有 60+ 项增强），以及 2025 年 Series D 强调在 SMB 增长之外深化企业关系。客户报告的结果强化留存逻辑：77% 受访客户报告可预防故障减少，95% 表示运营成本下降，Maintenance
              Shop Network 采用者在 H2 2025 报告约 12% 维护成本节省。按车辆计费订阅模式把供应商经济性与客户车队规模对齐，激励自然一致。较大车队规模下年度合同可能占主导，为企业账户提供队列可见性。偏
              SMB 的客户基础相较企业主导 SaaS 公司带来更高流失风险，因为小企业车队运营方价格敏感，经济下行时更可能缩减车队规模，决策人流动也更高。Truck News 和 Fleet Owner
              对车队软件采用的行业报道证实，SMB 车队运营方正在加速采用云端车队管理，支持留存论点，也说明竞争加剧，因为竞争对手正加强 SMB 外展。
