      - - 预算约束（40% 提到成本）
        - 采用约束
        - 负向
        - 近期
        - 40% 的车队运营方把预算列为技术采用的最大障碍；限制 SMB 转化漏斗经济性
        - 询问 Fleetio 的 SMB 与企业收入拆分，以及免费试用到付费的转化率
