companyProfile:
  summary: >-
    Fleetio（Rarestep, Inc.）是一家总部位于 Alabama 州 Birmingham 的车队管理 SaaS 公司，成立于 2012
    年。公司提供云原生软件，面向各类规模车队，覆盖预防性维护排程、数字化检查、工单管理、零部件库存、燃油跟踪和驾驶员管理。2025 年 3 月完成 $454M Series D 并收购 Auto Integrate 后，Fleetio
    以 $1.5B+ 估值跻身独角兽，运营连接 110,000+ 家维修门店的网络，服务全球 8,000+ 客户。
  foundedDate: '2012-01-01'
  founders:
    - name: Tony Summerville
      role: CEO 与联合创始人
      background: 曾为汽车行业开发 Web 应用；把 Fleetio 从副业项目做成独角兽 SaaS 平台。
    - name: Matthew Kominiak
      role: CTO 与联合创始人
      background: 工程负责人；设计了 Fleetio 的云原生多租户架构和 API 平台。
  foundingLocation: Birmingham, Alabama, USA
  headquarters: Birmingham, Alabama, USA
  productSummary: >-
    云端车队管理软件，覆盖预防性维护排程、数字化车辆检查（DVIR）、多维修门店工单管理、带条码扫描的零部件库存、燃油成本跟踪、驾驶员管理和实时车队健康分析。通过开放 REST API 集成 100+ 第三方 GPS /
    车联网服务商。Auto Integrate 增加了覆盖 110,000+ 家门店的实时维修授权能力。
  customerFocus: SMB 和中端市场车队运营商（5–1,000 辆车）；正向企业客户扩展；垂直行业包括现场服务（HVAC、虫害防治、园林绿化）、配送 / 物流、建筑、市政和医疗运输。
  businessModel: 按车辆计费的 SaaS 订阅（入门级 $4–$5/vehicle/month；高级功能对应更高套餐）；Auto Integrate 从维修门店授权流程增加按使用量计费的交易收入；大型部署还有 API / 企业费用。
  stage: Series D (Unicorn)
  fundingStatus: >-
    Series D：$454M（2025 年 3 月）；累计融资：~$538M+；估值：投后 $1.5B+；主要投资方：Emergence Capital、Bessemer Venture Partners、Volvo
    Financial Services。
