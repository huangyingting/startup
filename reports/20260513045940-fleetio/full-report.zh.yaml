  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Fleetio 所在的车队管理软件市场竞争激烈。随着车联网服务商扩展到维护管理、传统维护平台增加 GPS 跟踪，市场越来越拥挤。竞争格局大致分成三类：车联网优先平台（Samsara、Geotab、Verizon
              Connect、Motive），价值主张锚定实时 GPS 跟踪、驾驶员安全摄像头和 ELD 合规；维护优先平台（Fleetio、AssetWorks、RTA Fleet Management、Chevin
              Fleet Solutions），强调资产生命周期管理、工单、零部件库存和检查流程；以及企业 ERP 替代品（Microsoft Dynamics 365、SAP
              S/4HANA），把车队数据纳入更广泛的资产管理模块。Fleetio 的差异化位置在于硬件无关：它不捆绑专有车联网硬件，而是与 100+ 家 GPS 和车联网服务商集成——其中包括直接竞争对手 Samsara 和
              Geotab——让客户可以把最佳硬件与 Fleetio 的维护工作流组合起来。这种竞合动态扩大了 Fleetio 的总可寻址市场，也形成双边集成飞轮。Series D（$454M，2025 年 3 月）和收购
              Auto Integrate 后，Fleetio 通过行业最大的维修门店网络（美国、加拿大和墨西哥 110,000+ 家门店）显著加深竞争护城河；目前没有车联网优先竞争对手能以同等规模提供这项能力。
