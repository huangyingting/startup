  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >-
              车队管理软件包括云端和 SaaS 平台，帮助组织规划、监控、维护并优化商业及非私人所有车辆和资产车队。纳入的支出包括车辆跟踪、预防性和纠正性维护管理、燃油管理、驾驶行为监控、合规报告（ELD /
              HOS）、车队检查、维修订单管理和移动工作流工具的软件订阅。核心软件市场不包括车联网硬件（GPS 设备、OBD
              dongles、传感器）、车辆采购、燃油成本、驾驶员工资、实体维修人工、保险，以及一般车队融资或租赁。车队维护服务市场由外包维修门店、移动维修团队和预防性维护合同构成，是一个独立且大得多的相邻板块，2025
              年全球规模约 $314.32 billion；Fleetio 2025 年收购 Auto Integrate 后，通过 110,000+
              家门店网络启用软件授权的维护流程，把这两个市场连接起来。现状替代方案包括手工流程（电子表格、纸质日志）、传统本地部署车队管理系统、与 OEM
              嵌入式软件捆绑的车联网硬件（Ford、GM、Stellantis），以及通用 ERP 车队模块。Fleetio 主要竞争于云端车队管理软件层，其维护授权能力则把业务延伸到更广泛的外包维护服务板块。
