      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Fleetio 由 Tony Summerville 创立。他毕业于 Auburn University 管理信息系统专业，先后在 Regions Financial Corporation 工作两年、在
              Birmingham 的 Daxko 工作六年，之后于 2012 年创办公司。Summerville 观察到父亲的电气供应公司 Inline Electric Supply
              面临车队管理难题，由此获得创业灵感。他担任 CEO 超过十年，直到 2023 年 5 月转任 Executive Chairman，原 COO Jon Meachin 升任 CEO。Meachin 拥有 The
              Wharton School MBA 和 Brown University 学士学位，此前曾在 A Cloud Guru 和 Campaign Monitor 担任高管。伴随 CEO 交接，Fleetio 随后于
              2023 年 11 月任命 Matt Mandel 为 CFO 兼 COO，为未来 IPO 等资本市场活动做准备。Jorge Valdivia 担任 Chief Technology
              Officer，负责平台工程和技术路线图，其中包括 1.3 million 活跃移动端用户和 99.9% 无崩溃会话率。Ben Nachbaur 于 2024 年加入，担任 Chief Revenue
              Officer，带来近 30 年车队行业销售领导经验。Fleetio 董事会有 11 名在任成员，Elephant 的 Jeremiah Daly 和 Goldman Sachs Alternatives
              Growth Equity 的 Brendon Hardin 代表两家 Series D 主要投资方。创始人到职业 CEO 的交接带来明显的关键人集中风险；Tony Summerville
              继续担任董事会主席，则维持了战略连续性。
