            body: >-
              Fleetio 估计 $58M 收入，对应 2025 年北美 $5.51B 可寻址市场，隐含约 1% 市场份额。北美商用车中的车队管理系统渗透率预计从 53.3%（2023 年）增至 80.6%（2028
              年），意味着至少 40% 商用车队市场仍要从手工或传统系统转化而来。这代表的是不依赖竞争替换的内生扩张机会。
            calloutType: insight
