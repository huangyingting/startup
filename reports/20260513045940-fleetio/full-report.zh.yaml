      - number: '6.4'
        title: 客户基础构成与风险分析
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的客户基础构成呈现明确战略张力：一端是 SMB 细分的深度——平台在这里起家，客户数最高；另一端是 Series D 资金支持的企业账户推进，后者 ACV
              更高、流失更低、扩张模式更可预测。公司公开称要「加码 SMB，并向企业扩展」，意味着双速打法：留住并扩张 SMB 基本盘，同时建设赢下大客户所需的企业商业化能力。具名企业客户包括 County of Los
              Angeles、Clean Harbors 和 Terminix/ServiceMaster，但没有公开的企业层级收入集中度数据。地域构成全球化（100+
              个国家），但集中在北美，尤其是美国；当地车队密度、劳动力成本和监管复杂度（FMCSA、DOT）最强地刺激车队软件采用。垂直多元化降低单一行业周期风险：建筑车队支出下行，会被稳定的市政和公用事业需求部分对冲。Fleetio
              的关键客户集中度风险与典型企业 SaaS 相反：风险不是依赖单一大客户，而是 SMB 集中过高。经济下行时，SMB 车队更容易流失，平均合同期限更短，也比企业账户更难通过先落地再扩张来放大价值。2025 年
              Auto Integrate 收购增加 Maintenance Shop
              Network，带来新的扩张杠杆，尤其适用于外包大量维护工作的中型市场和企业车队；在这个用例里，维修订单的单元经济性在基础按车订阅之外提供额外变现流。Construction
              Equipment、Landscape Management 和 Field Service News 等行业刊物确认，这些垂直的车队运营方正在积极评估云端车队管理平台，支持可服务市场扩张假设，同时也确认
              Samsara、Geotab 和 Motive 在这些垂直的竞争强度。
