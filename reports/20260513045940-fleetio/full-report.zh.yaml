  - id: FR001
    title: Fleetio 风险热力图——可能性与影响
    type: matrix
    summary: 按可能性和影响绘制风险热力图，定位 Fleetio 九类关键风险场景。高可能性 / 高影响风险构成关键区域，需要立即尽调。
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR009
      - CR022
      - CR031
      - CR033
      - CR036
      - CR038
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
      rows:
        - label: 高可能性
          values:
            - label: EV TAM 侵蚀（3–5 年）
              tone: warning
            - label: SaaS 倍数压缩
              tone: warning
            - label: 竞争对手捆绑（Samsara）
              tone: negative
        - label: 中等可能性
          values:
            - label: 宏观下行导致流失
              tone: neutral
            - label: 关键人风险
              tone: warning
            - label: 数据隐私泄露
              tone: negative
        - label: 低可能性
          values:
            - label: Auto Integrate 失败
              tone: neutral
            - label: FMCSA 执法
              tone: neutral
            - label: API 合作方封锁
              tone: warning
  - id: FR002
    title: 风险传导图——从根因到业务影响
    type: dag
    summary: 有向图展示主要风险源如何沿 Fleetio 经营模型传导，最终影响收入、利润率和估值结果。
    claimRefs:
      - CR001
      - CR006
      - CR007
      - CR027
      - CR031
      - CR036
      - CR038
    data:
      nodes:
        - label: 竞争对手捆绑
          note: Samsara/Geotab 在车联网订阅中加入维护功能
        - label: EV 车队采用
          note: 商用 EV 渗透率提高，减少维护事件频率
        - label: 车联网 API 依赖
          note: 100+ 个集成；车联网合作方本身也是直接竞争对手
        - label: API 限制事件
          note: 合作方限制 API 访问或提高价格，让 Fleetio 处于劣势
        - label: 服务中断
          note: 使用受影响车联网硬件的客户失去数据同步
        - label: TAM 侵蚀
          note: 单车维护事件减少，压低核心工作流量
        - label: 客户流失
          note: SMB 客户转向捆绑式或低价替代方案
        - label: 收入压缩
          note: ARR 增长放缓；NRR 降至 100% 以下
        - label: 估值风险
          note: 退出时，倍数压缩会放大 ARR 增速放缓的影响
      edges:
        - from: Competitive Bundling
          to: Customer Churn
          label: 价格 / 功能达到同等水平会推动切换
        - from: Competitive Bundling
          to: Revenue Compression
          label: 定价压力压低 ARPU
        - from: EV Fleet Adoption
          to: TAM Erosion
          label: 每车 PM 事件减少
        - from: TAM Erosion
          to: Revenue Compression
          label: 每车价值主张弱化
        - from: Telematics API Dependency
          to: API Restriction Event
          label: 限制接入的竞争动机
        - from: API Restriction Event
          to: Service Disruption
          label: 客户硬件细分失去集成
        - from: Service Disruption
          to: Customer Churn
          label: 服务失效触发取消
        - from: Customer Churn
          to: Revenue Compression
          label: 客户数和收入流失压低 ARR
        - from: Revenue Compression
          to: Valuation Risk
          label: 退出时 ARR 倍数收缩
  - id: FR003
    title: Fleetio 关键依赖图
    type: dag
    summary: 展示 Fleetio Platform 对关键基础设施、合作伙伴、资本和人才的依赖，以及这些依赖失效后的传导路径。
    claimRefs:
      - CR021
      - CR025
      - CR026
      - CR027
      - CR034
      - CR037
    data:
      nodes:
        - label: Fleetio Platform
          note: 核心 SaaS 车队管理平台，管理车辆超过 1M
        - label: AWS Cloud
          note: 主要云基础设施；多 AZ 部署；单一供应商依赖
        - label: Samsara API
          note: 美国最大车载远程信息处理提供商；也是直接竞争对手
        - label: Geotab API
          note: 全球车载远程信息处理市场领导者；也是直接竞争对手
        - label: GoMotive API
          note: 美国 ELD 与车队管理平台；正向维护业务扩张
        - label: Auto Integrate 维修门店网络
          note: 110,000+ 家维修店；交易收入层的来源
        - label: Birmingham 人才基础
          note: 工程和运营员工；都市圈较小，人才池有限
        - label: Series D 资本（$454M）
          note: 24–36 个月现金跑道；Emergence Capital 与 Bessemer 共同领投
      edges:
        - from: Fleetio Platform
          to: AWS Cloud
          label: 基础设施依赖（关键）
        - from: Fleetio Platform
          to: Samsara API
          label: 车载远程信息处理数据集成（高集中度）
        - from: Fleetio Platform
          to: Geotab API
          label: 车载远程信息处理数据集成（高集中度）
        - from: Fleetio Platform
          to: GoMotive API
          label: 车载远程信息处理数据集成（中等集中度）
        - from: Fleetio Platform
          to: Auto Integrate Shop Network
          label: 交易收入（Series D 投资逻辑的关键）
        - from: Fleetio Platform
          to: Birmingham Talent Base
          label: 工程与运营（关键人员集中）
        - from: Fleetio Platform
          to: Series D Capital ($454M)
          label: 24–36 个月运营现金跑道
  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: standard
    summary: 从市场、产品、估值和风险因素出发，推导 Fleetio 在 $1.5B+ Series D 估值下的整体投资建议。
    notes: 基于公开信息，建议为有条件正向。重大信息缺口（NRR、经审计财务、烧钱倍数）使评估无法形成高置信度正向结论。
    claimRefs:
      - CV001
      - CV003
      - CV028
      - CV040
    data:
      nodes:
        - id: market
          label: 大型车队市场
          detail: 车队管理 SaaS：可触达市场 $5–7B；更广义市场以 11% CAGR 增长（GVR 预计 2030 年达 $34B）
        - id: product
          label: 软件差异化
          detail: 不绑定硬件、以维护为先；100+ 个 GPS 集成；管理车辆 1M+
        - id: valuation
          label: 合理进入价格
          detail: $1.5B+ 估值对应 10–15x ARR；较 Samsara 8–10x 上市可比倍数有温和溢价；私营成长阶段可解释
        - id: risks
          label: 关键风险因素
          detail: 车载远程信息处理捆绑威胁；NRR 和烧钱倍数不透明；累计融资 $539M，而 ARR 为 $100-150M
        - id: investors
          label: 机构信心
          detail: Emergence Capital、Bessemer、Volvo Financial Services 作为 Series D 领投 / 共同投资方
        - id: recommendation
          label: 有条件正向
          detail: 机会型持有 / 参与；形成高置信度前，必须验证 NRR、毛利率、烧钱倍数和 Auto Integrate 经济性
      edges:
        - from: market
          to: recommendation
          label: 大 TAM 支撑规模化
        - from: product
          to: recommendation
          label: 差异化具备防守性
        - from: valuation
          to: recommendation
          label: 基准情景下进入价格合理
        - from: risks
          to: recommendation
          label: 将置信度限制在中等
        - from: investors
          to: recommendation
          label: 机构信号正向
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: 以 $125M ARR 中点估计为基础，展示 Fleetio 隐含企业价值对不同 ARR 倍数的敏感性。覆盖 5x 至 25x ARR 的悲观到乐观区间，用于判断当前 $1.5B+ 估值在哪些倍数下被支撑或受压。
    notes: >-
      所有数字均采用 $125M ARR 中点（Growjo 估计和区间中点）。ARR 倍数区间来自可比分析：Powerfleet 底部（约 1.5x 收入）、Samsara 当前公开市场水平（约 17x
      ARR），以及私营公司溢价乐观情景（约 25x ARR）。实际 ARR 未验证。
    claimRefs:
      - CV006
      - CV008
      - CV010
      - CV017
      - CV021
      - CV022
      - CV023
    data:
      xAxis: 应用于 $125M 估计 ARR 的 ARR 倍数
      yAxis: 隐含企业价值（USD million）
      items:
        - label: 底部 — 5x ARR
          value: 625
          note: 5x ARR × $125M；硬件车载远程信息处理 / 增速下滑底部（相当于 Powerfleet）
        - label: 悲观 — 8x ARR
          value: 1000
          note: 8x × $125M；车载远程信息处理捆绑情景；侵蚀车队 SaaS 独立溢价
        - label: 低位 — 10x ARR
          value: 1250
          note: 10x × $125M；SaaS 倍数压缩至与 Samsara 公开市场同等水平
        - label: 进入价（≈ Series D 隐含）— 12x ARR
          value: 1500
          note: 以 $125M ARR 中点和 $1.5B+ 投后估值计算的近似隐含倍数
        - label: 基准 — 15x ARR
          value: 1875
          note: 15x × $125M；适度私营成长溢价；基准情景目标倍数
        - label: 成长 — 20x ARR
          value: 2500
          note: 20x × $125M；高增长轨迹；Auto Integrate 放大得到验证
        - label: 乐观 — 25x ARR
          value: 3125
          note: 25x × $125M；车队版 Salesforce 情景；NRR 与扩张执行异常出色
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: Fleetio 到 2027 年的乐观、基准、悲观估值区间，并以 Series D 进入价作为参照。区间基于 ARR 预测和可比 ARR 倍数分析。
    notes: 所有估值区间均为分析师估计，来自第三方 ARR 数据和可比公司倍数分析。未使用 Fleetio 经审计财务数据。区间较宽，反映私营公司估值固有的信息不对称。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV033
    data:
      items:
        - label: Series D 进入价（2025）
          low: 1500
          high: 1500
          unit: USD million
          note: Series D 投后估值；Yahoo Finance 和多个来源报道；10–15x ARR
        - label: 悲观情景（2027）
          low: 1000
          high: 1600
          unit: USD million
          note: 基于 $120–150M ARR 的 8–10x ARR；车载远程信息处理捆绑情景；低于或接近 Series D 进入价
        - label: 基准情景（2027）
          low: 2200
          high: 2600
          unit: USD million
          note: 基于 $150–175M ARR 的约 15x ARR；自然增长 + Auto Integrate 贡献；约 1.5x Series D 回报
        - label: 乐观情景（2027）
          low: 2500
          high: 4000
          unit: USD million
          note: 基于 $150–175M ARR 的 20–25x ARR；车队版 Salesforce 轨迹；1.7–2.7x Series D 回报
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 面向投委会的七个维度投资评分：市场机会、产品差异化、竞争护城河、财务画像、估值进入点、证据质量和退出可选性。满分 5 分。
    notes: 所有 KPI 评分都是分析师判断，基于公开数据、可比公司分析和结构性评估。由于缺少经审计披露，财务画像和证据质量被扣分。评分仅作方向性参考。
    claimRefs:
      - CV029
      - CV030
      - CV043
      - CV044
      - CV045
    data:
      items:
        - label: 市场机会
          value: 3 / 5
          note: 车队管理 SaaS TAM $5–7B；更广义车载远程信息处理市场 $28B+；垂直赛道不大但深；相对其他企业 SaaS 类别，TAM 规模对应中等评分
        - label: 产品差异化
          value: 4 / 5
          note: 纯软件、不绑定硬件、以维护为先；100+ 个 GPS 集成；API 生态；工作流嵌入运营，护城河较强；缺少专有数据资产，限制其高分上限
        - label: 竞争护城河
          value: 3 / 5
          note: 嵌入工作流带来高切换成本；Auto Integrate 维修店网络带来的网络效应仍在早期；面临 Samsara / Verizon 捆绑风险；中等评分
        - label: 财务画像
          value: 2 / 5
          note: SaaS 模型在结构上较强；NRR、毛利率、烧钱倍数均未披露；融资额 / ARR 比例偏高；低分惩罚的是不透明，而不是假设经营表现差
        - label: 估值进入点
          value: 3 / 5
          note: $1.5B+ 估值对应 10–15x ARR，相比 Samsara 8–10x 上市可比倍数合理；溢价温和但不极端；评分合格；基准情景下既不便宜，也不算高估
        - label: 证据质量
          value: 2 / 5
          note: 没有经审计财务；所有关键指标均来自第三方估计；结构性投资逻辑成立，但没有数据室无法实证验证；低分提示尽调风险，而非投资逻辑失败
        - label: 退出可选性
          value: 3 / 5
          note: IPO（2028–2030）、战略收购（Geotab/Samsara/Verizon/Fleetcor）、PE 收购均可行；Emergence 与 Bessemer 在退出上保持利益一致；评分合格
