      - - 烧钱倍数高于 3x 新增 ARR
        - 基于经审计财务披露确认烧钱倍数 > 3x
        - 资本投放效率很低；Series D 现金跑道明显缩短；增长放缓时有被迫降轮风险；每投入一美元对应的股权价值降低
        - 将信心下调至低；要求提供含具体里程碑的 24 个月效率提升路径
      - - 收购后 12 个月 Auto Integrate 绑定率低于 5%
        - < 5% 的现有 Fleetio 客户在收购完成后 12 个月内主动使用 Auto Integrate 门店授权
        - 验证反向逻辑：收购协同被高估；交易收入扩张逻辑失效；$454M Series D 对收购部分定价过高
        - 下调重估 $1.5B+ 估值；Auto Integrate 收入可选性在乐观情景中权重不低
      - - Samsara 或 Geotab 推出直接的车队维修 SaaS 产品
        - 产品发布已确认，且功能与 Fleetio 核心维修工作流相当（PM 排程、工单管理、检查合规）
        - 相对车联网捆绑商的溢价被抹掉；客户续约时，Fleetio 作为独立同类最佳方案的定位被直接威胁
        - 只有在 Fleetio 已证明强 NRR 和 Auto Integrate 经济性时才维持持有；否则复盘退出时间线
      - - 披露毛利率低于 65%
        - 财务报表披露经审计毛利率低于 65%
        - 说明 COGS 高于垂直 SaaS 基准暗示的水平；可能包含大量专业服务或硬件转售；侵蚀结构性优势逻辑
        - 将估值模型下调至 8–10x ARR 区间；Fleetio 估值折到硬件捆绑同行倍数
    claimRefs:
      - CV023
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
  - id: TV006
    title: 最终尽调要求表
    type: enumeration
    layout: standard
    summary: >-
      Prioritized list of the five most material diligence data requests required before a high-conviction investment
      decision at the $1.5B+ valuation. Each item includes the missing evidence, rationale for materiality, and specific
      diligence path.
    notes: 截至报告日期，五项均为公开不可得信息。项目按对投资决策的重要性排序。全部五项解决后，中等信心立场可转为高信心。
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five blocking diligence items enumerated based on standard growth equity SaaS diligence practice and the
        specific information gaps identified in Fleetio's public data profile. Items include all financial metrics
        material to the valuation analysis.
    columns:
      - 主题
      - 缺失证据
      - 为何重要
      - 尽调路径
    rows:
      - - ARR / 收入（经审计）
        - Fleetio 未披露任何财年的 ARR、MRR 或经审计收入
        - 所有估值倍数都按第三方估计计算；ARR 估计 ±25% 的偏差会带来隐含倍数 ±25% 的偏差
        - 在 NDA 下向 CFO 索取 FY2023、FY2024 和 FY2025 YTD 的经审计收入明细
      - - 净留存率（NRR）
        - NRR 未披露，无法评估扩张与流失动态
        - NRR 是最重要的 SaaS 质量指标；此阶段 NRR 低于 100%，无论收入增长多快都会推翻估值溢价
        - 按获客年份和客户分层（SMB、中端市场、企业）索取年度队列 NRR 数据
      - - 毛利率（经审计，按分部）
        - 毛利率按基准估计为 70–80%；实际值未披露
        - 毛利率决定内在价值和企业倍数；可比公司分析中，毛利率 ±10 个百分点大约对应 ARR 倍数 ±2–3x
        - 索取带 COGS 拆分的 P&L：云基础设施、客户成功、专业服务、Auto Integrate 处理成本
      - - Auto Integrate 运行率、绑定率和利润率
        - Auto Integrate 门店网络的交易收入未披露；收购后 P&L 未公开
        - Auto Integrate 是 Series D 的核心逻辑；如果绑定率低于 5%，授权费毛利率低于 50%，交易收入可选性将明显受损
        - 索取收购完成以来 Auto Integrate 独立 P&L，包括授权量、抽成率和毛利贡献
      - - 烧钱速度、现金头寸和现金跑道
        - 月度烧钱估计为 $8–15M；实际现金头寸未披露
        - 需要理解烧钱倍数和现金跑道，才能判断 $1.5B+ 估值对应的是资本高效的盈利路径，还是带下一轮风险的长期烧钱
        - 索取董事会批准的 12 个月 P&L、现金流量表，以及基准和下行情景下的 24 个月现金跑道预测
    claimRefs:
      - CV024
      - CV032
      - CV035
      - CV036
      - CV039
      - CV041
      - CV042
