      - number: '2.2'
        title: 市场规模与多重口径
        blocks:
          - type: paragraph
            body: >-
              多家分析机构给出了全球车队管理市场估计，但口径差异拉开了很宽的区间。MarketsandMarkets 通常被视为引用最多的来源之一，它估计 2025 年全球车队管理市场（硬件、软件和服务）规模为 $37.71
              billion，并预测到 2030 年增长至 $70.26 billion，CAGR 为 13.3%。Mordor Intelligence 单独预测 2030 年市场规模约 $67 billion，CAGR 为
              15.32%。只看软件，Verified Market Research 估计 2024 年车队管理软件市场为 $4.46 billion，到 2032 年增长至 $13.89 billion，CAGR 为
              13.55%。SNS Insider 采用更宽口径，估计 2024 年车队管理软件规模为 $27.55 to $33
              billion。估计差异很大，根源在于范围不同：宽口径估计纳入车联网硬件、专业服务和托管服务；窄口径只覆盖纯软件许可和订阅。Fleetio 的主要可服务市场是北美车队管理解决方案市场，Mordor
              Intelligence 估计 2025 年规模为 $5.51 billion，并预测到 2031 年达到 $16.26 billion，CAGR 为 19.77%。以 Fleetio 估计 $58
              million 年收入计算，北美市场份额约 1%，说明增长空间相当大。更广义的车辆车队维护服务市场（2025 年全球 $314.32 billion）构成了 Fleetio 和 Auto Integrate
              通过维护网络连接所服务的宏观需求环境。
            claimRefs:
              - CM001
              - CM002
