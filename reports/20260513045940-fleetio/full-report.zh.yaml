        title: 图表
        blocks:
          - type: callout
            title: 按车辆计费的经常性 SaaS 模型带来高收入可见性
            body: >-
              Fleetio 的按车辆订阅结构让收入天然可预测，并直接随车队增长扩张。年度计费周期带来预收现金、较低确认风险，也在客户扩大车队时形成自然扩张机制。在 Fleetio 服务的 SMB
              和中端市场规模下，这一模式比按使用量计费或纯交易型替代方案更可防守。
            calloutType: strength
            claimRefs:
