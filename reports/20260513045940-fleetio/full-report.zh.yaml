      - number: '2.3'
        title: 买方与细分市场地图
        blocks:
          - type: paragraph
            body: >-
              车队管理软件市场按车队规模分为三档，并横跨多个行业垂直。小型车队（1–50 辆）主要是业主经营的 SMB；采用决策对成本敏感，通常由保险要求或合规压力驱动。中端市场车队（51–500
              辆）是数量最大的细分；Mordor Intelligence 认定，中型车队占 2025 年北美车队管理解决方案市场的 44.02%，且越来越需要分析能力、与 ELD 系统集成以及移动优先工具。企业车队（500+
              辆）是增长最快的细分，预计到 2031 年 CAGR 为 21.42%，需要复杂集成、多站点支持、高级 AI 分析和正式采购流程。按行业垂直看，交通和物流在北美市场占比最高，为
              37.62%；能源和公用事业增长最快，到 2031 年 CAGR 为 22.35%。Fleetio 面向维护密集型运营场景，覆盖 100+
              国家，行业包括交通、建筑、公用事业、市政政府、应急服务和设备租赁。主要预算负责人因细分市场而异：SMB 由业主或总经理集中决策；中端市场买方由车队或运营经理与 CFO 协作；企业则走正式采购或 IT
              委员会流程。典型采用触发点是合规事件（FMCSA 审计、ELD 不合规）、车队故障成本飙升，或收购后整合车队运营的需求。云端部署是主导模式，占 2025 年北美市场的 61.58%。
