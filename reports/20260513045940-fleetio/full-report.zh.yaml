      - number: '1.4'
        title: 规模与运营指标
        blocks:
          - type: paragraph
            body: >-
              Fleetio 收购后的整合平台服务 8 million+ 辆车，每年处理 13 million+ 张维修订单，并把车队运营商连接到美国、加拿大和墨西哥 110,000+ 家维修门店。截至 2025
              年底，公司在全球服务 8,000+ 支车队，业务覆盖 100+ 国家，横跨交通、物流、建筑、公用事业和市政等领域。平台移动应用 Fleetio Go 累计 1.3 million+ 用户，99.9%
              会话无崩溃，体现了大规模运行下的平台可靠性。公司的车联网集成组合覆盖 320,000+ 台联网设备，支持集中化车队运营管理。Fleetio 员工数在 2026 年初达到约 459 人，较 2025 年初约 300
              人强劲增长，年同比超过 50%。第三方估计 Fleetio 年收入约 $58 million，对应人均收入约 $193,000。相比之下，竞争对手 Samsara 年收入约 $1.4 billion，Motive
              约 $2.2 billion，说明尽管 Fleetio 已有独角兽估值，按收入规模仍明显更小——这道差距反映了市场定位和成长阶段。客户报告的结果包括：H2 2025 通过 Maintenance Shop
              Network 估计降低维护支出 12%；一项 2024 年第三方调查发现，77% 客户可预防故障减少，95% 客户表示运营成本下降。
