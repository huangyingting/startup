        - OEM 原生数据管道可能把售后软件商品化；Fleetio 通过 320K+ 个远程信息处理集成和多 OEM 兼容性对冲
        - 确认 Fleetio 的 OEM 集成策略，以及能否通过 API 访问 OEM 内嵌数据
