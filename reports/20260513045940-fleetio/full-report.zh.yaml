  - id: TE002
    title: 车队管理工作流用例表
    columns:
      - 用户任务
      - 当前状态（无 Fleetio）
      - Fleetio 方案
      - 可衡量收益
      - 限制
    rows:
      - - 安排预防性维护
        - 电子表格或手工提醒；漏掉服务周期会导致故障
        - 自动化服务计划在里程 / 工时 / 日历阈值触发工单
        - 可预防故障减少；77% 受访客户报告故障下降
        - 阈值规则需要来自车联网的干净里程表 / 工时表数据
      - - 完成车辆检查（DVIR）
        - 纸质表单；记录丢失；缺陷维修延迟
        - Fleetio Go 移动 DVIR 支持拍照、司机签名和数字化缺陷跟踪
        - 符合 FMCSA 要求的数字记录；缺陷自动升级为工单
        - 需要司机使用智能手机；弱联网路线需要离线同步
      - - 授权外包维修
        - 通过电话 / 邮件与维修店协调；没有实时可见性
        - Maintenance Shop Network：数字化提交 RO、审批估价、跟踪维修状态
        - 协调时间减少；H2 2025 报告维护成本降低约 12%
        - 网络仅覆盖美国 / 加拿大 / 墨西哥；维修店质量不一；仍处早期采用阶段
      - - 对账燃油支出
        - 手工将燃油收据匹配到车辆；潜在欺诈可能漏检
        - WEX / FleetCard 集成自动对账交易；异常支出触发提醒
        - 减少人工工作；提升欺诈检测准确度
        - 需要配置车队卡集成；仅限支持的发卡方
      - - 跟踪零件库存
        - 实物货箱盘点；计划外缺货拖慢维修
        - 条码扫描库存、库存水位提醒，并在工单流程内订购零件
        - 减少缺货延误；按车辆归集零件成本数据，改善总拥有成本分析
        - 条码扫描需要初始配置；复杂多地点库存可能需要 ERP 集成
    notes: 可衡量收益数据来自公司披露的客户结果数据和新闻稿。独立第三方验证仅限于客户评论平台（Capterra、G2）。可预防故障减少 77% 和维护成本降低 12% 分别为公司基于受访客户和 H2 2025 结果披露的指标。
