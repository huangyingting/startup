      - number: '5.3'
        title: 技术基础设施、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Fleetio 的 SaaS 平台全部托管在 Amazon Web Services（AWS）上，利用 AWS 的全球基础设施、托管服务和共享责任模型来处理物理与网络安全。后端基于 Ruby on
              Rails，PostgreSQL 作为主要关系型数据库——这套技术栈适合车队管理这种数据密集、查询重的场景，但实时车联网数据量增长后，可能带来扩展约束。平台已获得 SOC 2 Type II
              认证，证明报告期内安全、可用性和保密性控制的设计与运行有效；企业车队运营方管理敏感车辆、司机和运营数据时，这是重要信任信号。安全控制包括传输中 TLS 加密、静态 AES-256
              加密、基于角色的访问控制（RBAC）、多因素认证（MFA）和审计日志。企业客户支持单点登录（SSO）。Fleetio 维护 status.fleetio.com 状态页和 help.fleetio.com
              帮助文档，向外部展示可用性和支持资源。Fleetio Go 移动应用在 1.3 million 名活跃用户中报告 99.9% 无崩溃会话率，反映移动端规模下的平台可靠性。纯云部署模式把 Fleetio
              的可服务市场限制在允许云托管数据的车队运营方，可能排除要求本地部署的部分政府和受监管行业客户。SOC 2 姿态暗示其对齐 NIST Cybersecurity Framework，但公开披露并未明确声称。
