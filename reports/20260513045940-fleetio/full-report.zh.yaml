      - number: '4.4'
        title: 资本充足性、融资历史与现金跑道
        blocks:
          - type: paragraph
            body: >-
              Fleetio 自 2012 年成立以来，五轮融资合计约 $539M：种子轮、Series A（$4M，2016）、Series B（$21M，2020）、Series C（$60M，2022）和 Series
              D（$454M，2025 年 3 月）。Series D 由 Emergence Capital Partners 领投，Bessemer Venture Partners、Volvo Financial
              Services、Guidon Capital 和 BuildGroup 参投，同时为收购 Auto Integrate 和有机平台扩张提供资金。Latham & Watkins 为 Fleetio
              提供交易顾问，确认了财务和法律交割。Yahoo Finance 和多家报道来源称，投后估值超过 $1.5B，使 Fleetio 成为独角兽级车队管理 SaaS 平台。以 $454M 融资和估计 $8–15M
              月度烧钱速度计算（包括收购整合成本、员工增长和产品投资），自 Q1 2025 交割起，隐含现金跑道约 24–36 个月。Series D 资金指定用于三项用途：（1）完成并整合 Auto Integrate
              收购；（2）加速面向统一 Fleetio Platform 愿景的产品开发；（3）扩充企业 go-to-market 能力。资本结构仍完全基于股权，未披露债务义务。融资额 / ARR 比率偏高（按 ARR
              中点估计约 3.6x），反映 Series D 规模相对当前 ARR 较大、资本密集度较高，但 M&A 成分可解释其中一部分。未来融资触发点未披露；在基准情景下，大额 2025 年融资可能把下一轮推迟到最早
              2027 年。
