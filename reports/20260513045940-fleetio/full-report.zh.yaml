  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Fleetio 处在车队联网数据与维护工作流管理交汇处，这一位置正被具备规模和分销能力的大型车联网平台供应商持续挤压，它们可以用边际成本把维护功能打包进平台。Samsara 的 40,000+ 客户基础和
              $1.25B ARR 让它有经济杠杆，把维护仪表盘和 DVIR 检查工作流作为核心车联网订阅的免费附加项，直接削弱 Fleetio 的独立定价。Geotab 的 MyGeotab
              平台已包含车辆检查、燃油跟踪和预防性维护排程；Verizon Connect 和 GoMotive（原 KeepTruckin）也都在核心 ELD 与车联网产品中增加了维护工作流能力。这种捆绑动态是
              Fleetio 未来 1–3 年最尖锐的竞争风险。5–10 年维度的结构性市场风险，是车队加速转向电动车。EV
              的运动部件显著少于内燃机车辆——不用换油、刹车事件更少、传动系统更简单——这会降低单车预防性维护事件频率，而后者正是 Fleetio 核心工作流参与度的来源。行业分析师预计商用 EV 车队渗透率将在
              2030–2035 年间加速；如果电动化推进导致 Fleetio 的单车 TAM 下降 30–50%，其按车订阅定价模型会承受结构性压力，除非有对应新工作流抵消缩减。Fleetio 偏 SMB
              的客户基础也带来宏观经济敏感性这一周期风险层：2008–2009 和 2020 年衰退期间，车队运营方推迟非关键维护，降低软件使用并提高车队管理 SaaS 供应商流失风险。Fleetio 管理 1M+ 辆车、估计
              ARR 为 $100–150M，其 SMB 核心若遭遇需求收缩，影响会很实质。
