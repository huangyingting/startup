  - id: TV006
    title: Final Diligence Asks Table
    type: enumeration
    layout: standard
    summary: >-
      Prioritized list of the five most material diligence data requests required before a high-conviction investment
      decision at the $1.5B+ valuation. Each item includes the missing evidence, rationale for materiality, and specific
      diligence path.
    notes: >-
      All five items represent publicly unavailable information as of the report date. Items are ranked by materiality
      to the investment decision. Resolution of all five would convert a medium-confidence stance to high-confidence.
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five blocking diligence items enumerated based on standard growth equity SaaS diligence practice and the
        specific information gaps identified in Fleetio's public data profile. Items include all financial metrics
        material to the valuation analysis.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - ARR / Revenue (audited)
        - Fleetio has not disclosed ARR, MRR, or audited revenue for any fiscal year
        - >-
          All valuation multiples are computed on third-party estimates; ±25% variance in ARR estimates translates to
          ±25% variance in implied multiple
        - Request audited revenue schedules for FY2023, FY2024, and FY2025 YTD from CFO under NDA
      - - Net Revenue Retention (NRR)
        - NRR is not disclosed; cannot assess expansion vs. churn dynamics
        - >-
          NRR is the single most important SaaS quality metric; below 100% NRR at this stage invalidates the valuation
          premium regardless of top-line growth
        - Request annual cohort NRR data by customer acquisition year and segment (SMB vs. mid-market vs. enterprise)
      - - Gross Margin (audited, by segment)
        - Gross margin is estimated at 70–80% from benchmarks; actual not disclosed
        - >-
          Gross margin determines intrinsic value and enterprise multiple; ±10pp gross margin difference is worth
          approximately ±2–3x ARR multiple in comparable company analysis
        - >-
          Request P&L with COGS breakdown: cloud infrastructure, customer success, professional services, Auto Integrate
          processing costs
      - - Auto Integrate run rate, attach rate, and margin
        - Transaction revenue from Auto Integrate shop network is undisclosed; post-acquisition P&L not public
        - >-
          Auto Integrate was a core thesis in the Series D; if attach rate is below 5% and gross margin on authorization
          fees is below 50%, the transaction-revenue optionality is materially impaired
        - >-
          Request Auto Integrate standalone P&L since acquisition close, including authorization volume, take rate, and
          gross margin contribution
      - - Burn rate, cash position, and runway
        - Monthly burn rate is estimated at $8–15M; actual cash position not disclosed
        - >-
          Understanding burn multiple and cash runway is required to assess whether the $1.5B+ valuation implies a
          capital-efficient path to profitability or an extended burn with next-round risk
        - >-
          Request board-approved 12-month P&L, cash flow statement, and 24-month runway projection under base and
          downside scenarios
