      - number: '8.2'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >-
              Valuing Fleetio requires triangulation across public comparables, private round precedents, and M&A
              transactions — all filtered for relevance to a software-only, vertical SaaS, fleet management platform at
              the $100–$150M ARR stage. The primary public comparable is Samsara (NASDAQ: IOT), which reported $1.25B
              ARR growing at 33% YoY for FY2025 with 74% non-GAAP gross margins and an $22B market cap — implying
              approximately 17–18x ARR. Samsara's hardware-bundled model provides a slight gross margin discount vs. a
              pure software peer like Fleetio; adjusting for this, Fleetio's 10–15x implied multiple appears defensible.
              Verra Mobility (NASDAQ: VRRM) serves as a second public data point: approximately $350M in annual revenue,
              $3B market cap, operating at the intersection of fleet payments and transportation technology — implying
              ~8.5x revenue, relevant as a fleet/mobility tech benchmark but limited by its toll and payment services
              mix. Powerfleet (NASDAQ: PWFL), formed from the 2023 merger of Powerfleet and Mix Telematics, provides the
              lower-bound reference: approximately $200M in annualized revenue, $300M market cap at roughly 1.5x revenue
              — a meaningful discount to Fleetio, reflecting Powerfleet's hardware dependency, lower growth, and
              emerging market exposure. On the private side, Motive (formerly KeepTruckin) was valued at approximately
              $2.85B in its 2022 Series F at an estimated $200–$300M ARR, implying ~9.5–14x ARR — a close private comp
              though Motive is hardware-bundled. Fleet Complete was acquired by Element Fleet Management for
              approximately $600M in 2018 at an estimated ~12x ARR based on industry estimates. These comps suggest a
              10–15x ARR range is the market-clearing zone for fleet SaaS platforms at the $100–$150M ARR stage with
              double-digit growth, while hardware-dependent or declining-growth peers trade at 5–10x. Fleetio's premium
              to hardware-dependent peers is structurally justified by its software-only model; its discount to
              Samsara's public multiple reflects appropriate private-company illiquidity adjustment.
