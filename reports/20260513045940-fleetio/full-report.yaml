      - number: '5.3'
        title: Technical Infrastructure, Security and Compliance
        blocks:
          - type: paragraph
            body: >-
              Fleetio's SaaS platform is hosted entirely on Amazon Web Services (AWS), leveraging AWS's global
              infrastructure, managed services, and shared responsibility model for physical and network security. The
              backend is built on Ruby on Rails with PostgreSQL as the primary relational database—a technology stack
              well-suited for the data-intensive, query-heavy nature of fleet management, though it may present scaling
              constraints as real-time telematics data volumes grow. The platform achieved SOC 2 Type II certification,
              attesting to the design and operating effectiveness of controls over security, availability, and
              confidentiality across the reporting period—an important trust signal for enterprise fleet operators
              managing sensitive vehicle, driver, and operational data. Security controls include TLS encryption in
              transit, AES-256 encryption at rest, role-based access control (RBAC), multi-factor authentication (MFA),
              and audit logging. Single sign-on (SSO) is supported for enterprise customers. Fleetio maintains a
              public-facing status page at status.fleetio.com and help documentation at help.fleetio.com, providing
              visibility into uptime and support resources. The Fleetio Go mobile application reports a 99.9% crash-free
              session rate across 1.3 million active users, reflecting platform reliability at mobile scale. The
              cloud-only deployment model limits Fleetio's addressable market to fleet operators who permit cloud-hosted
              data, potentially excluding certain government and regulated-industry customers requiring on-premise
              deployment. NIST Cybersecurity Framework alignment is implied by the SOC 2 posture but not explicitly
              claimed in public disclosures.
