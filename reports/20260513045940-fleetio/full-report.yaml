      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              Geotab is the largest commercial telematics provider globally with 3 million+ subscribers across 160
              countries, backed by INRIX since 2023. Geotab's open Marketplace with 300+ integrations and deep OEM
              telematics certifications make it the strongest competitor in enterprise and government fleet deployments.
              Samsara (NASDAQ: IOT) reported approximately $1.25 billion in FY2025 ARR, growing 33% year-over-year,
              positioning it as the public market benchmark for fleet telematics SaaS. Samsara differentiates through AI
              dash cameras, driver safety coaching algorithms, and real-time compliance automation — features that
              compete with Fleetio's inspection and driver management workflows but less directly with its maintenance
              depth. Verizon Connect, formed through the acquisitions of Fleetmatics (2016) and NexTraq (2018), serves
              primarily enterprise customers leveraging Verizon's network reliability, 24/7 support infrastructure, and
              broad asset tracking capabilities. Its pricing (starting ~$35/vehicle/month) and long-term contracts
              target medium-to-large fleets. Motive (formerly KeepTruckin) focuses on trucking, delivery, and logistics
              with strong ELD/HOS compliance and AI video safety products, pricing at approximately
              $25–$45/vehicle/month. Element Fleet Management occupies a distinct niche providing fleet financing,
              vehicle acquisition, and fleet card programs rather than pure software. AssetWorks and Chevin Fleet
              Solutions address government and public sector maintenance needs with GovFleet-compliant software,
              competing with Fleetio for municipal and utility fleet contracts. RTA Fleet Management serves SMB and
              mid-market fleets with an established on-premise and cloud hybrid offering, historically strong in North
              American markets.
