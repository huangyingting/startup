  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >-
              Fleet management software encompasses cloud-based and SaaS platforms that allow organizations to plan,
              monitor, maintain, and optimize commercial and non-privately-owned vehicle and asset fleets. Included
              spend covers software subscriptions for vehicle tracking, preventive and corrective maintenance
              management, fuel management, driver behavior monitoring, compliance reporting (ELD/HOS), fleet
              inspections, repair order management, and mobile workflow tools. Excluded from the core software market
              are telematics hardware (GPS devices, OBD dongles, sensors), vehicle purchases, fuel costs, driver wages,
              physical repair labor, insurance, and general fleet financing or leasing. The fleet maintenance services
              market—comprising outsourced repair shops, mobile repair crews, and preventive maintenance contracts—is a
              distinct and much larger adjacent segment valued at approximately $314.32 billion globally in 2025;
              Fleetio's 2025 acquisition of Auto Integrate connects these markets by enabling software-authorized
              maintenance workflows through its 110,000+ shop network. Status-quo substitutes include manual processes
              (spreadsheets, paper logs), legacy on-premise fleet management systems, telematics hardware bundled with
              OEM-embedded software (Ford, GM, Stellantis), and generalized ERP fleet modules. Fleetio competes
              primarily in the cloud-based fleet management software layer, with its maintenance authorization
              capability creating adjacency into the broader outsourced maintenance services segment.
            claimRefs:
              - CM001
              - CM004
              - CM012
              - CM013
              - CM015
