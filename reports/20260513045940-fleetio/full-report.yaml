      - number: '2.3'
        title: Buyer and Segment Map
        blocks:
          - type: paragraph
            body: >-
              The fleet management software market segments across three fleet-size tiers and multiple industry
              verticals. Small fleets (1–50 vehicles) are primarily owner-operated SMBs; adoption is cost-sensitive and
              driven by insurance requirements or compliance pressure. Mid-market fleets (51–500 vehicles) represent the
              highest-volume segment—Mordor Intelligence identifies medium fleets as 44.02% of the North American fleet
              management solutions market in 2025—and increasingly demand analytics, integration with ELD systems, and
              mobile-first tools. Enterprise fleets (500+ vehicles) are the fastest-growing segment at a projected CAGR
              of 21.42% through 2031 and require complex integrations, multi-site support, advanced AI analytics, and
              formal procurement processes. By industry vertical, transportation and logistics holds the largest share
              at 37.62% of the North American market; energy and utilities is the fastest-growing vertical at a CAGR of
              22.35% through 2031. Fleetio targets maintenance-heavy operations across transportation, construction,
              utilities, municipal government, emergency services, and equipment rental in 100+ countries. The primary
              budget owners differ by segment: SMBs consolidate decision authority with the owner or GM, mid-market
              buyers involve fleet or operations managers working with CFOs, and enterprises run formal procurement or
              IT-committee processes. The typical adoption trigger is a compliance event (FMCSA audit, ELD
              non-compliance), a fleet breakdown cost spike, or a post-acquisition need to consolidate fleet operations.
              Cloud-based deployment is the dominant mode, representing 61.58% of the North American market in 2025.
            claimRefs:
