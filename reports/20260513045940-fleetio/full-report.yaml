  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Profile and Segmentation
        blocks:
          - type: paragraph
            body: >-
              Fleetio's customer base is composed of organizations that operate vehicle or equipment fleets and need to
              manage maintenance, compliance, and operational efficiency from a single software platform. As of the end
              of 2025, Fleetio serves over 8,000 fleet customers globally across more than 100 countries, with vehicles
              under management exceeding 8 million. The platform primarily attracts three fleet-size segments: small
              fleets (5–100 vehicles), which represent the core SMB market and the largest share of Fleetio's customer
              count; mid-market fleets (100–1,000 vehicles) where maintenance complexity and multi-depot operations
              drive adoption; and enterprise fleets (1,000+ vehicles) where Fleetio's 2025 growth emphasis is
              concentrated. The primary buyer persona is a fleet manager, director of fleet operations, or VP of
              facilities/operations who owns both compliance and cost outcomes. The primary user persona splits between
              fleet managers who manage the web dashboard and drivers who complete inspections and receive notifications
              via Fleetio Go. The payer is typically the fleet-owning organization's operations or finance function.
              Industry verticals are broadly diversified: field services (pest control, HVAC, plumbing, lawn care,
              landscaping) represent a historically core vertical where same-day service dispatch drives maintenance
              urgency; delivery and logistics (last-mile, food service, courier) emphasize route efficiency and
              preventive maintenance; construction and utilities rely on equipment and mixed fleets with complex
              inspection requirements; municipalities and county governments (such as County of Los Angeles and Fulton
              County, Georgia) bring compliance-driven procurement processes; healthcare and medical transport require
              HIPAA-adjacent operational data handling; and equipment rental fleets demand utilization and lifecycle
              tracking. Fleetio's Fleetio Go mobile application serves as the primary adoption surface for drivers and
              field technicians, with 1.3 million active users reflecting the breadth of the driver-side engagement.
