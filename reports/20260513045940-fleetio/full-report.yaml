  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >-
              Fleetio's revenue engine is anchored in a per-vehicle SaaS subscription model — a straightforward,
              recurring-revenue structure that aligns platform value with fleet size. Entry-level Essentials pricing is
              publicly listed at approximately $4–5 per vehicle per month, with Professional and Premium tiers carrying
              higher per-vehicle rates that are not fully disclosed. Fleet operators pay annually, creating upfront cash
              collection and smooth revenue recognition under ASC 606. Vehicle count is the primary billing unit,
              meaning revenue scales directly with fleet growth and upsell to larger plans. The March 2025 acquisition
              of Auto Integrate adds a second, transaction-based revenue stream through shop authorization and invoice
              reconciliation across 110,000+ repair network locations. Each shop authorization generates a
              per-transaction fee, layering variable revenue on top of fixed SaaS subscriptions and improving
              monetization density per vehicle. The combined model — predictable SaaS ARR plus growing transaction
              revenue — improves overall revenue quality by diversifying collection mechanisms and deepening switching
              costs through workflow integration at both the fleet operator and repair shop sides of the marketplace. A
              third potential stream, data monetization or API partnership fees, has not been publicly disclosed but is
              typical at Fleetio's maturity stage. Growjo and Tracxn estimate annual revenue at approximately
              $100–$150M, consistent with a platform at the early unicorn stage with roughly 1 million vehicles under
              management.
            claimRefs:
              - CI009
