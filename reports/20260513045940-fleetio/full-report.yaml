      - number: '5.2'
        title: Integration Ecosystem and Developer Platform
        blocks:
          - type: paragraph
            body: >-
              Fleetio's hardware-agnostic architecture is a core strategic differentiator: rather than manufacturing GPS
              hardware, the platform integrates with over 100 third-party telematics and GPS providers via standardized
              APIs. Certified partners include Samsara, Geotab, Verizon Connect, Motive (formerly KeepTruckin), Zubie,
              Teletrac Navarro, and dozens of regional providers, enabling fleet operators to centralize data from
              existing hardware investments without vendor lock-in. Fuel card integrations cover WEX, FleetCard, and
              other providers, automatically reconciling fuel purchases into the fleet record. Parts procurement
              integrations with PartsTech and NAPA Auto Parts allow technicians to order parts from within the work
              order workflow without switching applications. In March 2025, Fleetio acquired Auto Integrate, adding a
              vetted network of over 110,000 repair shops across the United States, Canada, and Mexico. Through the
              Maintenance Shop Network, fleet operators can submit repair requests to external shops, receive repair
              estimates, approve work digitally, and track real-time vehicle repair status—extending fleet maintenance
              orchestration beyond the fleet operator's own technicians. The developer platform at developer.fleetio.com
              exposes a REST API with over 50 webhook event types, enabling integrations with third-party fleet
              management systems, ERP platforms, and telematics providers. The developer portal includes API reference
              documentation, authentication guidance, and an API changelog tracking version history. As of mid-2026, the
              API changelog reflects ongoing versioning activity, supporting active third-party development. A two-way
              integration with Motive introduced in H2 2025 centralizes fuel, maintenance, and telematics data through
