      - number: '2.2'
        title: Market Sizing and Multiple Lenses
        blocks:
          - type: paragraph
            body: >-
              Multiple analyst estimates define the global fleet management market, with scope differences creating a
              wide range of estimates. MarketsandMarkets—considered among the most cited sources—values the global fleet
              management market (hardware, software, and services) at $37.71 billion in 2025, projecting growth to
              $70.26 billion by 2030 at a CAGR of 13.3%. Mordor Intelligence separately projects 2030 market size at
              approximately $67 billion at a CAGR of 15.32%. For software specifically, Verified Market Research values
              the fleet management software market at $4.46 billion in 2024, growing to $13.89 billion by 2032 at a CAGR
              of 13.55%. SNS Insider applies a broader definition and estimates fleet management software at $27.55 to
              $33 billion in 2024. The wide discrepancy across estimates reflects fundamental scope differences: broad
              estimates include telematics hardware, professional services, and managed services, while narrow estimates
              cover software-only licenses and subscriptions. Fleetio's primary serviceable market is the North American
              fleet management solutions market, which Mordor Intelligence values at $5.51 billion in 2025 and projects
              to reach $16.26 billion by 2031 at a CAGR of 19.77%. Against Fleetio's estimated $58 million in annual
              revenue, this implies a North American market share of approximately 1%, indicating substantial headroom
              for growth. The broader vehicle fleet maintenance services market ($314.32 billion globally in 2025)
              represents the macro demand environment that Fleetio and Auto Integrate serve through maintenance network
              connectivity.
