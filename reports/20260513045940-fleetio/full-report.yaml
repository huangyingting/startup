      - number: '6.3'
        title: Customer Economics and Retention Signals
        blocks:
          - type: paragraph
            body: >-
              Fleetio operates a per-vehicle SaaS subscription model priced from approximately $4 per vehicle per month,
              with monthly and annual billing available and no disclosed setup fees. This pricing structure creates a
              natural expansion mechanism as fleet sizes grow: customers who add vehicles, locations, or modules (such
              as Maintenance Shop Network access) increase their contract value without switching platforms. The company
              does not publicly disclose Net Revenue Retention (NRR), Gross Revenue Retention (GRR), or cohort-level
              churn data, which is typical for private-stage SaaS companies. Based on comparable vertical SaaS companies
              serving SMB and mid-market fleet operators—including publicly traded peers with similar maintenance-first
              positioning—NRR in the range of 110–120% and gross annual churn in the range of 5–10% are reasonable
              benchmark estimates. Retention signals in public disclosures include the 2024 launch of a Customer
              Advisory Board, ongoing product development informed by customer feedback (60+ enhancements in H2 2025
              alone), and the 2025 Series D emphasis on deepening enterprise relationships alongside SMB growth.
              Customer-reported outcomes strengthen the retention thesis: 77% of surveyed customers reported fewer
              preventable breakdowns, 95% noted operational cost reductions, and Maintenance Shop Network adopters
              reported approximately 12% maintenance cost savings in H2 2025. The per-vehicle subscription model aligns
              vendor economics with customer fleet scale, creating a natural alignment of incentives. Annual contracts
              likely dominate at larger fleet sizes, providing cohort visibility for enterprise accounts. The SMB-heavy
              customer base introduces higher churn risk relative to enterprise-dominant SaaS companies, as small
              business fleet operators are cost-sensitive, more likely to reduce fleet size during downturns, and have
              higher decision-maker turnover. Truck News and Fleet Owner industry coverage of fleet software adoption
              confirms that SMB fleet operators are adopting cloud-based fleet management at an accelerating pace,
              supporting the retention argument but also the competitive intensity as rivals intensify SMB outreach.
            claimRefs:
