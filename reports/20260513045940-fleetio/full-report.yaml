      - number: '6.4'
        title: Customer Base Composition and Risk Analysis
        blocks:
          - type: paragraph
            body: >-
              Fleetio's customer base composition presents a clear strategic tension between depth in the SMB
              segment—where the platform was built and where customer count is highest—and the Series D-funded push
              toward enterprise accounts, which carry higher ACV, lower churn, and more predictable expansion patterns.
              The company's publicly stated strategy of 'doubling down on SMB and scaling into enterprise' implies a
              two-speed motion: retaining and expanding the SMB base while building the enterprise go-to-market
              capability needed to win larger accounts. Named enterprise customers include County of Los Angeles, Clean
              Harbors, and Terminix/ServiceMaster, but no enterprise-tier revenue concentration data is publicly
              available. Geographic composition is global (100+ countries) but concentrates in North America,
              particularly the United States, where fleet density, labor costs, and regulatory complexity (FMCSA, DOT)
              most strongly incentivize fleet software adoption. Vertical diversification reduces single-industry
              cyclicality risk: a downturn in construction fleet spending would be partially offset by stable municipal
              and utilities demand. The key customer concentration risk for Fleetio is the opposite of typical
              enterprise SaaS: the risk is excessive SMB concentration rather than single large-customer dependence. SMB
              fleets are more likely to churn during economic downturns, have shorter average contract lengths, and are
              harder to expand via land-and-expand motions compared to enterprise accounts. The 2025 Auto Integrate
              acquisition, which adds the Maintenance Shop Network, creates a new expansion lever particularly relevant
              for mid-market and enterprise fleets that outsource significant maintenance volumes—a use case where
              per-unit economics on repair orders provide an additional monetization stream beyond the base per-vehicle
              subscription. Construction Equipment magazine, Landscape Management, and Field Service News industry
              publications confirm that fleet operators in these verticals are actively evaluating cloud fleet
              management platforms, supporting addressable market expansion assumptions but also confirming competitive
              intensity from Samsara, Geotab, and Motive in these verticals.
