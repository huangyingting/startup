chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Fleetio operates under its legal entity name Rarestep, Inc. and was founded in January 2012 by Tony
              Summerville in Birmingham, Alabama. The company's cloud-based SaaS platform enables organizations
              worldwide to track, analyze, and optimize every aspect of fleet operations—from vehicle lifecycle
              management and preventive maintenance to fuel tracking, driver compliance, equipment management, and
              real-time reporting. Fleetio's core mission is to help organizations manage everything in the life cycle
              of every asset, from cradle to grave. The platform is delivered as a subscription service priced from
              approximately $4 per vehicle per month, making it accessible to fleets of all sizes from small operators
              to enterprises managing more than 10,000 assets. Fleetio's Maintenance Shop Network—expanded through the
              2025 acquisition of Auto Integrate—connects fleet operators with over 110,000 repair shops across the
              United States, Canada, and Mexico, enabling outsourced maintenance workflows, repair order approvals, and
              real-time vehicle repair status tracking. The platform includes Fleetio Go, a mobile application with over
              1.3 million users that supports inspections, work orders, and driver communication. Fleetio operates
              across more than 100 countries, serving industries including transportation and logistics, construction,
              utilities, municipal government, emergency services, and rental and sharing fleets.
