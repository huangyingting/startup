      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >-
              Fleetio was founded by Tony Summerville, a management information systems graduate of Auburn University
              who spent two years at Regions Financial Corporation and six years at Birmingham's Daxko before launching
              the company in 2012. Summerville was inspired by observing fleet management challenges at his father's
              electrical supply business, Inline Electric Supply. He served as CEO for over a decade before
              transitioning to Executive Chairman in May 2023 when Jon Meachin—previously the COO—was elevated to CEO.
              Meachin holds an MBA from The Wharton School and a bachelor's degree from Brown University, with prior
              executive experience at A Cloud Guru and Campaign Monitor. Alongside the CEO transition, Fleetio
              subsequently appointed Matt Mandel as CFO and COO in November 2023 to prepare the company for potential
              capital markets activity including a future IPO. Jorge Valdivia serves as Chief Technology Officer,
              responsible for the platform's engineering and technical roadmap, which includes 1.3 million active mobile
              users at 99.9% crash-free session rates. Ben Nachbaur joined as Chief Revenue Officer in 2024, bringing
              nearly 30 years of fleet industry sales leadership. Fleetio's board has 11 active members, with Jeremiah
              Daly of Elephant and Brendon Hardin of Growth Equity at Goldman Sachs Alternatives representing the two
              lead Series D investors. The founder-to-CEO transition creates notable key-person concentration risk,
              while Tony Summerville's retained board chairmanship maintains strategic continuity.
