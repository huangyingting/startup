      - number: '8.3'
        title: DCF and Intrinsic Value Framework
        blocks:
          - type: paragraph
            body: >-
              A discounted cash flow analysis for a private growth-stage SaaS company with no disclosed financials
              requires explicit acknowledgment of the model's uncertainty range. For Fleetio, the key drivers are: (1)
              revenue base (third-party estimate: $100–$150M ARR, midpoint $125M); (2) growth rate (inferred 30–50% YoY
              from funding trajectory and Growjo signals); (3) terminal growth rate (5–7% for a platform with embedded
              fleet workflow; consistent with fleet management market growth of 11% CAGR per Grand View Research); (4)
              discount rate (30–35%, appropriate for a private growth-stage SaaS company with illiquidity, information
              asymmetry, and stage-appropriate venture risk premium); and (5) target exit horizon (5 years, exiting in
              FY2030 at 15–20x forward ARR for an IPO or strategic acquisition). Under the base case — $125M ARR growing
              at 35% annually reaching ~$430M ARR by FY2030, and applying a 15x forward ARR exit multiple at a 32% WACC
              — the present value of Fleetio today is approximately $1.8–2.2B. This is above the current $1.5B+
              valuation, suggesting modest upside on a 5-year hold at base-case assumptions. The bull case (50% CAGR,
              20x exit multiple) yields $3.5–4.5B present value; the bear case (20% CAGR, 10x exit multiple) yields
              $0.9–1.3B — below the entry price, implying downside from current valuation under persistent
              underperformance. Auto Integrate introduces a revenue diversification variable: if the shop authorization
              network achieves 15–25% attach rates across Fleetio's 8,000+ customers within 3–5 years, transaction
              revenues could contribute an incremental $25–50M ARR equivalent, expanding the base-case ARR trajectory
              materially. Sensitivity to discount rate is high: every 5% change in WACC shifts the base-case present
              value by approximately $200–300M, underscoring the importance of understanding the actual exit pathway and
              timeline.
