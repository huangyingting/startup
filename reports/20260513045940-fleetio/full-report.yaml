  - id: TE002
    title: Fleet Management Workflow Use-Case Table
    columns:
      - User Job
      - Current (Without Fleetio)
      - Fleetio Solution
      - Measurable Benefit
      - Limitation
    rows:
      - - Schedule preventive maintenance
        - Spreadsheets or manual reminders; missed service intervals cause breakdowns
        - Automated service programs trigger work orders at mileage/hours/calendar thresholds
        - Fewer preventable breakdowns; 77% of surveyed customers reported reduction
        - Threshold rules require clean odometer/hour meter data from telematics
      - - Complete vehicle inspection (DVIR)
        - Paper forms; lost records; delayed defect repair
        - Fleetio Go mobile DVIR with photo capture, driver signature, digital defect tracking
        - FMCSA-compliant digital record; defects auto-escalate to work orders
        - Requires driver smartphone adoption; offline sync needed for low-connectivity routes
      - - Authorize outsourced repair
        - Phone/email coordination with shops; no real-time visibility
        - 'Maintenance Shop Network: submit RO digitally, approve estimate, track repair status'
        - Reduced coordination time; ~12% maintenance cost reduction reported in H2 2025
        - Network limited to US/Canada/Mexico; shop quality varies; early adoption stage
      - - Reconcile fuel spend
        - Manual matching of fuel receipts to vehicles; potential fraud undetected
        - WEX/FleetCard integration auto-reconciles transactions; anomaly alerts on unusual spend
        - Reduced manual work; improved fraud detection accuracy
        - Requires fleet card integration setup; limited to supported card providers
      - - Track parts inventory
        - Physical bin counts; unplanned stockouts delay repairs
        - Barcode-scanned inventory; stock-level alerts; parts ordered within work order flow
        - Reduced stockout delays; parts cost data per vehicle improves total cost of ownership analysis
        - Barcode scanning requires initial setup; complex multi-location inventory may need ERP integration
    notes: >-
      Measurable benefit figures come from company-reported customer outcome data and press releases. Independent
      third-party validation is limited to customer review platforms (Capterra, G2). The 77% reduction in preventable
      breakdowns and 12% maintenance cost reduction are company-reported metrics from surveyed customers and H2 2025
      results respectively.
    claimRefs:
      - CE003
      - CE004
      - CE005
      - CE006
      - CE007
      - CE012
      - CE033
