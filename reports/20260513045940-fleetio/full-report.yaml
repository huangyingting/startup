companyProfile:
  summary: >-
    Fleetio (Rarestep, Inc.) is a Birmingham, Alabama-based fleet management SaaS company founded in 2012. It provides
    cloud-native software for preventive maintenance scheduling, digital inspections, work order management, parts
    inventory, fuel tracking, and driver management for fleets of all sizes. Following a $454M Series D in March 2025
    and the acquisition of Auto Integrate, Fleetio achieved unicorn status with a $1.5B+ valuation and operates a
    110,000+ repair shop connectivity network serving over 8,000 customers globally.
  foundedDate: '2012-01-01'
  founders:
    - name: Tony Summerville
      role: CEO & Co-Founder
      background: >-
        Previously built web applications for automotive industry; grew Fleetio from side project to unicorn SaaS
        platform.
    - name: Matthew Kominiak
      role: CTO & Co-Founder
      background: Engineering leader; designed Fleetio's cloud-native multi-tenant architecture and API platform.
  foundingLocation: Birmingham, Alabama, USA
  headquarters: Birmingham, Alabama, USA
  productSummary: >-
    Cloud-based fleet management software covering preventive maintenance scheduling, digital vehicle inspections
    (DVIR), multi-shop work order management, parts inventory with barcode scanning, fuel cost tracking, driver
    management, and real-time fleet health analytics. Integrates with 100+ third-party GPS/telematics providers via open
    REST API. Auto Integrate adds real-time repair authorization across 110,000+ shops.
