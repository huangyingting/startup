      - number: '1.3'
        title: Funding and Capital History
        blocks:
          - type: paragraph
            body: >-
              Fleetio has raised a cumulative total of $624 million across five formal funding rounds since its initial
              seed financing in September 2016. The company bootstrapped from its 2012 founding before securing a
              $750,000 seed round, followed by a Series A of $3.5 million in March 2019 that coincided with early
              international expansion. The Series B of $21.1 million in November 2020, led by Elephant Venture Capital
              with Endeavor participating, enabled significant hiring and product development. A landmark $145 million
              Series C in May 2023, led solely by Elephant, funded aggressive R&D and team expansion while coinciding
              with the CEO transition from Tony Summerville to Jon Meachin. The defining Series D—$454 million closed in
              March 2025—was co-led by Elephant and Growth Equity at Goldman Sachs Alternatives. This round
              simultaneously financed the acquisition of Auto Integrate and valued the combined business at over $1.5
              billion, conferring unicorn status. Brendon Hardin of Goldman Sachs Alternatives joined Fleetio's board as
              part of the Series D arrangement. Latham and Watkins LLP advised Fleetio on the financing and acquisition
              with cross-border teams covering US and UK law, antitrust, IP, employment, and sanctions. The company has
              not disclosed any convertible notes, secondary transactions, or debt financing in public communications;
              private financials including ARR and revenue growth rates are not available.
