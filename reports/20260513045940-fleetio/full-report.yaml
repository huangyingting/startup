            body: >-
              Fleetio has raised approximately $539M across five funding rounds since its 2012 founding — a Seed round,
              Series A ($4M, 2016), Series B ($21M, 2020), Series C ($60M, 2022), and Series D ($454M, March 2025). The
              Series D, led by Emergence Capital Partners with participation from Bessemer Venture Partners, Volvo
              Financial Services, Guidon Capital, and BuildGroup, simultaneously funded the acquisition of Auto
              Integrate and organic platform expansion. Latham & Watkins advised Fleetio on the transaction, confirming
              the financial and legal closing. The post-money valuation exceeds $1.5B, according to Yahoo Finance and
              multiple coverage sources, establishing Fleetio as a unicorn-class fleet management SaaS platform. With a
              $454M raise and an estimated burn rate of $8–15M per month (inclusive of acquisition integration costs,
              headcount growth, and product investment), the implied cash runway is approximately 24–36 months from the
              Q1 2025 close. The Series D proceeds are earmarked for three stated uses: (1) completing and integrating
              the Auto Integrate acquisition, (2) accelerating product development toward the unified Fleetio Platform
              vision, and (3) expanding enterprise go-to-market capacity. The capital structure remains entirely
              equity-based with no disclosed debt obligations. The elevated funding-to-ARR ratio (~3.6x by midpoint ARR
              estimate) reflects the capital-intensive Series D size relative to current ARR, but is partially explained
              by the M&A component. Future financing trigger points remain undisclosed, with the large 2025 raise likely
              deferring the next round to 2027 at earliest under base-case assumptions.
