      - number: '1.4'
        title: Scale and Operating Metrics
        blocks:
          - type: paragraph
            body: >-
              Fleetio's combined post-acquisition platform services over 8 million vehicles, processes more than 13
              million repair orders annually, and connects fleet operators with over 110,000 repair shops across the
              United States, Canada, and Mexico. The company served more than 8,000 fleets globally as of the end of
              2025, operating in more than 100 countries across transportation, logistics, construction, utilities, and
              municipal sectors. Fleetio Go, the platform's mobile application, has accumulated over 1.3 million users
              with a 99.9% crash-free session rate, reflecting platform reliability at scale. The company's telematics
              integration portfolio covers over 320,000 connected devices, enabling centralized fleet operations
              management. Fleetio's headcount reached approximately 459 employees as of early 2026, reflecting strong
              hiring growth from approximately 300 in early 2025—more than 50% year-over-year. Third-party estimates
              place Fleetio's annual revenue at approximately $58 million, implying revenue per employee of
              approximately $193,000. For comparison, competitor Samsara generates approximately $1.4 billion in annual
              revenue and Motive approximately $2.2 billion, indicating Fleetio remains significantly smaller by revenue
              despite its unicorn valuation—a gap reflecting market positioning and growth stage. Customer-reported
              outcomes include an estimated 12% reduction in maintenance spend through the Maintenance Shop Network in
              H2 2025, and a 2024 third-party survey found that 77% of customers experienced fewer preventable
              breakdowns and 95% noted operational cost reductions.
