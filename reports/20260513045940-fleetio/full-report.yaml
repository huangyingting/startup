      - number: '7.2'
        title: Regulatory and Legal Compliance Risks
        blocks:
          - type: paragraph
            body: >-
              Fleetio's regulatory exposure is less direct than a hardware or carrier company but more substantial than
              a pure horizontal SaaS platform, given that it processes driver location data, vehicle inspection records,
              and maintenance histories that touch multiple compliance frameworks. The FMCSA's Electronic Logging Device
              (ELD) mandate under 49 CFR Part 395 requires commercial motor vehicle operators to use approved ELDs for
              hours-of-service tracking; Fleetio's Driver Vehicle Inspection Report (DVIR) software addresses the
              inspection-record obligation but does not constitute an ELD. This distinction is important: Fleetio is not
              a regulated entity under the ELD mandate, but its fleet-operator customers must maintain compliant ELD
              solutions separate from Fleetio's platform, and any confusion could expose customers to compliance risk
              that indirectly reflects on Fleetio as the fleet management platform of record. The more pressing
              regulatory exposure is data privacy. The CCPA (Cal. Civ. Code §§ 1798.100–1798.199.100) and GDPR
              (Regulation (EU) 2016/679) impose significant obligations on the collection, storage, and processing of
              driver location data, behavior data, and vehicle biometric data flowing through Fleetio's 100+ telematics
              integrations. Fleetio's SOC 2 Type II certification addresses security controls but does not pre-empt CCPA
              or GDPR liability in the event of a data breach or unauthorized data processing. The JD Supra legal
              analysis of fleet telematics privacy specifically identifies driver GPS location data, biometric
              driver-behavior metrics, and maintenance record cross-referencing as high-value PII datasets subject to
              overlapping state and federal privacy obligations. Latham & Watkins' confirmed legal involvement in
              Fleetio's Series D and Auto Integrate acquisition indicates professional legal counsel; no litigation,
              patent dispute, or enforcement action has been publicly disclosed through the report run date.
            claimRefs:
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
