      - number: '4.2'
        title: Cost Structure and Gross Margin Drivers
        blocks:
          - type: paragraph
            body: >-
              Fleetio's software-only architecture — no proprietary hardware, no embedded telematics devices —
              structurally advantages its gross margin relative to hardware-bundled fleet technology peers. The primary
              cost of revenue components are cloud infrastructure (AWS/Azure hosting, compute, data storage for
              real-time vehicle and maintenance data), third-party API integration costs (connecting to 100+ GPS and
              telematics providers), and customer success and support headcount. Based on comparable vertical SaaS
              companies with similar product architectures, gross margins of 70–80% are consistent with Fleetio's
              profile. Samsara, the nearest public benchmark, reported 73–76% non-GAAP gross margins in FY2025 despite
              its hardware-bundled model; a pure-software vendor like Fleetio would typically exceed this. Auto
              Integrate introduces a variable cost layer — transaction processing, shop network operations, and payment
              reconciliation — that will modestly compress blended gross margins as transaction revenue scales, but the
              impact is expected to be limited to 3–5 percentage points at full transaction-revenue maturity. Operating
              expense structure is not publicly disclosed. Based on the $454M Series D and ~400–500 employees, monthly
              cash burn is estimated at $8–15M, implying a burn multiple of approximately 1.5–2.0x new ARR. R&D
              investment is likely 25–35% of revenue (consistent with growth-stage SaaS), supporting the Fleetio
              platform, Auto Integrate integration, and AI-driven fleet intelligence roadmap initiatives described in
              2025 press releases.
