  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    type: enumeration
    layout: standard
    summary: >-
      Enumeration of thesis-break triggers that would indicate the core investment thesis is broken or materially
      impaired. Each trigger is defined with a threshold, transmission mechanism to the thesis, and recommended action
      implication.
    notes: >-
      Triggers are ordered by severity of thesis impact. 'Confirmed' means the data point is validated in a formal
      management data room or audited financial disclosure. No triggers are intended as hard trading rules; all require
      judgment in context.
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five primary thesis-break scenarios identified through competitive analysis, financial benchmarking, and
        analogous SaaS investment case studies. No additional material thesis-break triggers were identified from
        available public evidence.
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Net Revenue Retention below 100%
        - NRR < 100% confirmed in diligence data room
        - >-
          Implies customer base is contracting in revenue terms despite new logo adds; structural churn erodes the
          recurring SaaS model that justifies the valuation premium
        - Revise to neutral or pass; the $1.5B+ valuation becomes unjustifiable without expansion economics
      - - Burn multiple above 3x new ARR
        - Burn multiple confirmed > 3x based on audited financial disclosure
        - >-
          Capital deployment is highly inefficient; Series D runway shortens materially; forced down-round risk if
          growth slows; reduces equity value per dollar invested
        - Reduce conviction to low; request 24-month path-to-efficiency plan with specific milestones
      - - Auto Integrate attach rate below 5% at 12 months post-acquisition
        - < 5% of existing Fleetio customers actively using Auto Integrate shop authorization within 12 months of close
        - >-
          Validates the anti-thesis that the acquisition synergy was overstated; transaction-revenue expansion thesis
          fails; $454M Series D was over-priced for the acquisition component
        - >-
          Reassess the $1.5B+ valuation downward; Auto Integrate revenue optionality had meaningful weight in the bull
          case
      - - Samsara or Geotab launches direct fleet maintenance SaaS product
        - >-
          Product launch confirmed with feature parity to Fleetio's core maintenance workflow (PM scheduling, work order
          management, inspection compliance)
        - >-
          Removes the premium vs. telematics bundlers; Fleetio's positioning as a standalone best-of-breed solution is
          directly threatened at the customer renewal event
        - >-
          Maintain hold only if Fleetio has demonstrated strong NRR and auto-integrate economics; otherwise review exit
          timeline
      - - Revealed gross margin below 65%
        - Audited gross margin below 65% disclosed in financial statements
        - >-
          Indicates COGS is higher than vertical SaaS benchmarks suggest; may include significant professional services
          or hardware pass-through; erodes the structural advantage thesis
        - Revise valuation model downward to 8–10x ARR range; Fleetio de-rates toward hardware-bundled peer multiples
    claimRefs:
