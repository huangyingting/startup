      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Samsara at $22B Market Cap Is the Valuation Anchor — But Fleetio Is Not Samsara
            body: >-
              Samsara's $22B market cap on $1.25B ARR (17–18x multiple) is the most defensible public anchor for fleet
              SaaS. Fleetio's $1.5B+ at 10–15x implied ARR is a significant discount to Samsara's scale multiple —
              justified by Fleetio's smaller ARR base, private illiquidity, and hardware-bundled mix difference. The
              meaningful valuation question is whether Fleetio's growth rate (estimated 30–50%) and software-only
              architecture justify a multiple closer to 15x (base case) than 8x (bear case). If Fleetio is growing at
              40%+ with NRR above 110%, the current valuation implies material upside.
            calloutType: insight
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV045
          - type: callout
            title: Absent NRR Is the Most Dangerous Unknown
            body: >-
              Net revenue retention is the single most important metric in SaaS valuation, and Fleetio has not disclosed
              it. Every valuation bull-case scenario — including the base-case $2.2–2.6B by 2027 — implicitly assumes
              NRR at or above 100%. If diligence reveals NRR below 100% (net contraction), the thesis collapses
              regardless of top-line growth. Investors must treat NRR disclosure as a gating condition, not a desirable
              item, before committing at $1.5B+ entry.
            calloutType: risk
            claimRefs:
              - CV032
              - CV036
              - CV039
          - type: callout
            title: Top-Tier Investor Participation Validates the Price
            body: >-
              Emergence Capital's specialization in vertical SaaS (portfolio: Veeva, ServiceMax, FinancialForce) and
              Bessemer's broad SaaS track record signal that informed institutional capital has underwritten the $1.5B+
              price after full diligence. Emergence's SaaS expertise is directly applicable to fleet management vertical
              SaaS. This does not eliminate information asymmetry for secondary investors, but it substantially reduces
              the probability that the $1.5B+ valuation was set without regard for financial fundamentals.
            calloutType: strength
            claimRefs:
              - CV003
              - CV027
              - CV028
          - type: callout
            title: SaaS Multiple Compression Reduces the Floor Scenario
            body: >-
              From 2021–2022 peak multiples (many SaaS companies at 20–50x ARR) to 2024–2025 normalized levels (median
              6–12x ARR for high-growth SaaS), the multiple compression cycle means Fleetio's next liquidity event will
              not benefit from multiple expansion. Investors must build return models on stable or contracting
              multiples, meaning ARR growth is the primary return driver. At 10–15x ARR entry and 15x ARR exit, the
              return is driven almost entirely by ARR growth — making the revenue trajectory the highest-conviction item
              in the diligence checklist.
            calloutType: risk
            claimRefs:
              - CV031
              - CV033
              - CV038
          - type: callout
            title: Five Diligence Asks Before High-Conviction Commitment
            body: >-
              The Final Diligence Asks Table identifies five items that would convert a medium-confidence conditional
              positive into a high-confidence investment decision: (1) audited ARR for FY2023–FY2025; (2) cohort-level
              NRR by customer vintage and segment; (3) audited gross margin with COGS breakdown; (4) Auto Integrate
              attach rate, authorization volume, and margin contribution at 6–12 months post-close; and (5)
              board-approved 12-month cash flow projection with burn multiple. None of these should be withheld by a
              management team willing to pursue a next capital event or strategic partnership.
            calloutType: recommendation
            claimRefs:
              - CV035
              - CV036
              - CV039
              - CV040
              - CV041
          - type: callout
            title: Bull Path Requires Fleetio to Execute on Two Simultaneous Growth Vectors
            body: >-
              The bull case valuation of $2.5–4B by 2027 requires Fleetio to simultaneously (a) sustain 40–50% ARR
              growth in the core fleet management platform despite competitive pressure and (b) achieve 15–25% Auto
              Integrate attach rates that generate meaningful transaction revenue. Both are achievable but neither is
              guaranteed — and the combination requires exceptional organizational execution during a period of
              post-acquisition integration. Investors should assign this scenario a lower probability weight (20–30%) in
              their expected return calculation.
            calloutType: insight
            claimRefs:
              - CV021
              - CV022
              - CV044
