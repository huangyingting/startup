      - number: '1.5'
        title: Key Milestones and Strategic Events
        blocks:
          - type: paragraph
            body: >-
              Fleetio's history spans thirteen years from a bootstrapped one-person startup to a $1.5 billion unicorn.
              The company launched in January 2012 in Birmingham, Alabama, securing its first 100 paying customers with
              no affiliation to the founder—an early signal of genuine product-market fit. The company remained
              bootstrapped until its September 2016 seed round, progressing through Series A in 2019 and Series B in
              2020 as it expanded internationally. A key inflection point came in 2023 when Elephant led a $145 million
              Series C and Tony Summerville transitioned to Executive Chairman, naming Jon Meachin CEO—the company's
              first non-founder CEO. In 2024, Fleetio surpassed 1 million vehicles managed on its platform, launched a
              Customer Advisory Board, introduced AI-powered features including Fleetio Go in Spanish and Service
              Program Automation, and hired nearly 100 new employees. The company earned Deloitte Technology Fast 500
              recognition and AutoTech Breakthrough Fleet Management Company of the Year in 2024. The defining event of
              2025 was the $454 million Series D and simultaneous acquisition of Auto Integrate in March, elevating
              Fleetio to unicorn status and creating a comprehensive fleet maintenance ecosystem. In H2 2025, the
              company delivered over 60 product enhancements, expanded the Maintenance Shop Network into Canada,
              appointed Nick Izquierdo as President of Auto Integrate, and reported AI-powered Smart Uploads reducing
              service entry time by up to 90%. Fleetio also successfully defended its brand through a WIPO domain name
              dispute in 2024. Looking ahead to 2026, the company is advancing capabilities in fleet utilization
              analysis and right-sizing.
