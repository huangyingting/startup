      supported or impaired.
    notes: >-
      All figures use $125M ARR midpoint (Growjo estimate and range midpoint). ARR multiple range is derived from
      comparable analysis: Powerfleet floor (~1.5x revenue), Samsara current public (~17x ARR), and private premium bull
      case (~25x ARR). Actual ARR is unverified.
    claimRefs:
      - CV006
      - CV008
      - CV010
      - CV017
      - CV021
      - CV022
      - CV023
    data:
      xAxis: ARR Multiple Applied to $125M Estimated ARR
      yAxis: Implied Enterprise Value (USD million)
      items:
        - label: Floor — 5x ARR
          value: 625
          note: 5x ARR × $125M; hardware telematics / declining growth floor (Powerfleet-equivalent)
        - label: Bear — 8x ARR
          value: 1000
          note: 8x × $125M; telematics bundling scenario; erodes fleet SaaS standalone premium
        - label: Low — 10x ARR
          value: 1250
          note: 10x × $125M; SaaS multiple compression to public-market parity with Samsara
        - label: Entry (≈ Series D implied) — 12x ARR
          value: 1500
          note: Approximate implied multiple at $1.5B+ post-money on $125M ARR midpoint
        - label: Base — 15x ARR
          value: 1875
          note: 15x × $125M; moderate private growth premium; base case target multiple
        - label: Growth — 20x ARR
          value: 2500
          note: 20x × $125M; high-growth trajectory; Auto Integrate scale-up validated
        - label: Bull — 25x ARR
          value: 3125
          note: 25x × $125M; Salesforce-for-fleet scenario; exceptional NRR and expansion execution
  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: standard
    summary: >-
      Bull, base, and bear case valuation ranges for Fleetio by 2027, with the Series D entry point as reference. Ranges
      are based on ARR projections and comparable ARR multiple analysis.
    notes: >-
      All valuation ranges are analyst estimates derived from third-party ARR data and comparable company multiple
      analysis. No audited Fleetio financial data was used. Wide ranges reflect information asymmetry inherent in
      private company valuation.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV033
    data:
      items:
        - label: Series D Entry (2025)
          low: 1500
          high: 1500
          unit: USD million
          note: Series D post-money valuation; reported by Yahoo Finance and multiple sources; 10–15x ARR
        - label: Bear Case (2027)
          low: 1000
          high: 1600
          unit: USD million
          note: 8–10x ARR on $120–150M ARR; telematics bundling scenario; below or near Series D entry
        - label: Base Case (2027)
          low: 2200
          high: 2600
          unit: USD million
          note: ~15x ARR on $150–175M ARR; organic growth + Auto Integrate contribution; ~1.5x Series D return
        - label: Bull Case (2027)
          low: 2500
          high: 4000
          unit: USD million
          note: 20–25x ARR on $150–175M ARR; Salesforce-for-fleet trajectory; 1.7–2.7x Series D return
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      IC-ready investment scoring across seven dimensions: market opportunity, product differentiation, competitive
      moat, financial profile, valuation entry, evidence quality, and exit optionality. Scores are out of 5.
    notes: >-
      All KPI scores are analyst judgments based on publicly available data, comparable company analysis, and structural
      assessment. Financial Profile and Evidence Quality are penalized for lack of audited disclosure. Scores are
      directional only.
    claimRefs:
      - CV029
      - CV030
      - CV043
      - CV044
      - CV045
    data:
      items:
        - label: Market Opportunity
          value: 3 / 5
          note: >-
            Fleet management SaaS TAM $5–7B; broader fleet telematics market $28B+; niche but deep; moderate score for
            TAM size vs. other enterprise SaaS categories
        - label: Product Differentiation
          value: 4 / 5
          note: >-
            Software-only, hardware-agnostic, maintenance-first; 100+ GPS integrations; API ecosystem; strong moat from
            workflow-embedded operations; high score limited by lack of proprietary data asset
        - label: Competitive Moat
          value: 3 / 5
          note: >-
            High switching costs from embedded workflows; network effects nascent via Auto Integrate shop network; at
            risk from Samsara/Verizon bundling; moderate score
        - label: Financial Profile
          value: 2 / 5
          note: >-
            Strong SaaS model structurally; NRR, gross margin, burn multiple all undisclosed; elevated funding-to-ARR
            ratio; low score penalized for opacity, not for assumed poor performance
        - label: Valuation Entry Point
          value: 3 / 5
          note: >-
            10–15x ARR at $1.5B+ is fair vs. Samsara 8–10x public comp; modest but not extreme premium; adequate score;
            not a bargain, not overpriced at base case
        - label: Evidence Quality
          value: 2 / 5
          note: >-
            No audited financials; all key metrics third-party estimated; structural thesis is sound but empirically
            unverifiable without data room; low score flags diligence risk, not thesis failure
        - label: Exit Optionality
          value: 3 / 5
          note: >-
            IPO (2028–2030), strategic acquisition (Geotab/Samsara/Verizon/Fleetcor), PE buyout all viable; Emergence
            and Bessemer provide alignment on exit; adequate score
