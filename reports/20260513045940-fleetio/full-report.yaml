  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Architecture and Core Capabilities
        blocks:
          - type: paragraph
            body: >-
              Fleetio is a cloud-only, multi-tenant SaaS platform built to manage the complete lifecycle of fleet
              assets. The platform is organized around seven principal modules: preventive maintenance scheduling, work
              order management, parts and inventory control, digital vehicle inspection reports (DVIR), fuel management,
              driver and credential management, and telematics/GPS integration. These modules are accessed through a
              responsive web application and the Fleetio Go mobile app (iOS and Android), which has accumulated over 1.3
              million active users. Fleetio Go supports real-time inspection completion with photo capture, defect
              flagging, compliance workflows, driver vehicle inspection reports conforming to FMCSA requirements, and
              push-based work order notifications. The preventive maintenance module is the platform's flagship
              capability, allowing operators to schedule service programs based on mileage, engine hours, or calendar
              intervals, automatically generate work orders when thresholds are met, and track completion status through
              a multi-shop workflow. Parts inventory management includes barcode scanning, stock-level alerts, vendor
              management, and parts cost attribution to work orders. The fuel management module integrates with WEX
              FleetCard and other fuel card providers to automatically reconcile fuel transactions with fleet records,
              flag anomalies, and generate per-vehicle fuel cost reports. Fleet reporting covers custom dashboards,
              fleet health scores, maintenance cost analytics, and exportable data for external BI tools. Deployment is
              cloud-only with no on-premise option; all customer data is hosted on AWS infrastructure with multi-tenancy
              isolation.
            claimRefs:
