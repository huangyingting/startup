  - id: technical-risks
    title: "Technical Risk Assessment and Trust Controls"
    body: |
      Waabi's technical risk profile is dominated by four categories: simulation-to-real gap,
      single-model concentration, sensor suite cost, and regulatory technical standards.

      **Simulation-to-Real Gap.** Waabi World's value depends on simulation fidelity being high
      enough that Waabi Driver behaviors transfer reliably to real-world deployment. No AV company
      has yet demonstrated a simulation-first approach at the full robustness required for
      indefinitely driverless commercial operation at national scale. Waabi has not published
      quantitative sim-to-real transfer metrics, making independent assessment difficult.

      **Single-Model Concentration.** The end-to-end Waabi Driver means a single model failure
      mode affects the entire product line (trucks and robotaxis). Modular architectures allow
      subsystem isolation and targeted fixes; end-to-end models require full retraining and
      re-validation for material failures.

      **Sensor Suite Cost.** LiDAR remains the most expensive component in the sensor suite.
      High-performance spinning LiDARs for long-haul highway operation remain at $3,000-$10,000
      per unit at current volumes. The sensor suite cost per truck directly affects unit economics
      and has not been publicly disclosed by Waabi.

      **Regulatory Technical Standards.** SAE Level 4 driverless commercial trucking operates
      in a fragmented state-by-state regulatory environment with no federal mandate as of mid-2026.
      Waabi's expansion beyond Texas depends on regulatory progress in other states — outside its
      technical control.

      Trust and quality controls include: Volvo factory integration with OEM safety validation,
      Waabi Driver interpretability and verifiability design properties for safety case
      documentation, NHTSA/FMCSA regulatory engagement for federal standards alignment, and
      active safety-driver monitoring during the pre-driverless commercial pilot phase.
