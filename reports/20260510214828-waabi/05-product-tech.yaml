  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: patent-portfolio-composition
      missingEvidence: >-
        Waabi has not disclosed its patent portfolio composition, filing strategy, or the
        breadth of IP protection around Waabi World, the Waabi Driver end-to-end model, and
        its sensor simulation techniques. No patent applications attributable to Waabi have
        been identified through public patent database searches as of May 2026.
      whyItMatters: >-
        Patent protection determines whether Waabi's technical moats (simulation, end-to-end
        models, sensor fusion) can be legally defended against competitors or whether they
        depend entirely on trade-secret protection and first-mover data advantages. Without
        knowing the patent portfolio, it is impossible to assess the legal durability of
        Waabi's primary differentiation claims.
      diligencePath: >-
        Request patent portfolio inventory, filing status, and IP ownership agreements
        (particularly for IP originating from Urtasun's University of Toronto/Vector Institute
        research). Conduct independent patent database search (USPTO, EPO) for Waabi and
        Urtasun filings. Review IP assignment provisions in employment agreements.
      relatedQuestionRefs:
        - QE009

    - type: private-evidence-only
      severity: material
      topic: simulation-fidelity-metrics
      missingEvidence: >-
        Waabi has not published any quantitative metrics comparing Waabi World simulation
        fidelity to real-world sensor data or Waabi Driver performance in simulation versus
        real-world deployments. The sim-to-real transfer gap is entirely unquantified from
        public sources. No disengagement rate data, object detection accuracy comparison,
        or trajectory prediction benchmarks have been disclosed.
      whyItMatters: >-
        If the sim-to-real gap is material, Waabi's capital efficiency advantage (fewer
        real-world miles required) could be illusory or require significant additional real-world
        validation before driverless commercial launch is safe. Quantifying this gap is the most
        important technical due diligence question because it determines whether Waabi World
        is a genuine safety-case moat or a development-efficiency tool with limited regulatory
        value.
      diligencePath: >-
        Request internal benchmarking data comparing Waabi Driver performance metrics (object
        detection accuracy, trajectory prediction error, disengagement rate) in simulation
        versus real-world Texas pilot operations. Review any third-party simulation fidelity
        audits. Compare to published sim-to-real results from academic literature.
      relatedQuestionRefs:
        - QE015

    - type: private-evidence-only
      severity: high
      topic: per-truck-sensor-suite-cost
