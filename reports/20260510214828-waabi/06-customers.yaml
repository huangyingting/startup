  - id: customer-concentration
    title: Customer Concentration Risk
    body: |
      Waabi's customer and partner concentration is extreme. As of May 2026, 100% of commercially
      active autonomous trucking operations flow through Uber Freight. No independent freight carrier
      customer has been publicly named. Uber Freight simultaneously serves as Waabi's exclusive freight
      channel, exclusive robotaxi deployment platform, COO's former employer, and a $250M milestone
      investor. This multi-dimensional interdependence creates compounding concentration risk
      qualitatively different from typical single-customer concentration.

      Aurora Innovation — Waabi's closest autonomous trucking competitor — has publicly confirmed
      freight carrier customers including FedEx, Werner Enterprises, and Schneider National. Aurora
      launched driverless commercial operations in April 2026 on the Dallas-Houston corridor while
      Waabi continues to operate with safety drivers. Aurora's customer diversification reduces its
      platform risk substantially and sets a market expectation Waabi must meet to be commercially
      credible to institutional freight carriers.

      The concentration risk is partially mitigated by structural lock-in: Uber Freight has co-invested
      across multiple rounds, and Waabi's COO chairs Uber Freight, making an adversarial unwind
      structurally difficult. Uber's milestone-based $250M investment creates financial alignment —
      Uber wants Waabi to succeed. Nonetheless, regulatory disruption, Uber corporate strategy shifts,
      or technology failures could sever the relationship in ways that no structural alignment prevents.

      The Volvo manufacturing dependency adds a second concentration dimension. If Volvo delays
      certification of the VNL Autonomous truck, Waabi's driverless launch collapses. Waabi's prior
      Peterbilt relationship demonstrates OEM optionality, but a switch at this stage would likely
      add one to two years of validation delay.
    claimRefs:
      - CU027
