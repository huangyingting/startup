      - CU006
      - CU034

  - calloutType: insight
    title: Surface Street Capability Is the Key Unlock for Direct Carrier Revenue
    body: >-
      The November 2025 surface street milestone enables Waabi to offer origin-to-destination autonomous
      service — the proposition large carriers require for direct fleet integration — without hub
      handoffs. Diligence should assess how quickly Waabi can convert this capability into named carrier
      pilot agreements in 2026, as the window to win early carrier relationships ahead of Aurora's
      incumbent position is narrowing rapidly.
    claimRefs:
      - CU015
      - CU022
      - CU033

