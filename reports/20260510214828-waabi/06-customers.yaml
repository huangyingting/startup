  - id: expansion-potential
    title: Customer Expansion Potential
    body: |
      Waabi's expansion strategy rests on three vectors: geographic expansion of autonomous truck
      routes, direct carrier onboarding enabled by surface street capability, and robotaxi scale-up
      on Uber's platform.

      On autonomous trucking, the Dallas-Houston route is the beachhead. Natural expansion targets
      are the Phoenix-Tucson-El Paso-San Antonio corridor and California inter-city freight lanes
      (pending California AV commercial truck approvals). Both corridors have high freight density
      and improving regulatory clarity under the emerging 2026 federal AV framework.

      The direct carrier channel creates the opportunity to approach Werner Enterprises, Schneider
      National, J.B. Hunt, and similar large US truckload carriers directly. These carriers manage
      fleets of 5,000 to 15,000+ Class-8 trucks and represent billions in potential annual revenue
      at even modest autonomous penetration. However, carrier procurement cycles are long, safety
      certification requirements are stringent, and Aurora's existing confirmed relationships with
      FedEx and Werner represent a first-mover advantage Waabi must overcome. No Waabi carrier
      outreach results have been publicly confirmed as of May 2026.

      In robotaxis, the 25,000+ vehicle target on Uber's platform represents a step-change in
      scale. Uber operates in hundreds of cities globally, providing immediate multi-city presence
      that would take years to replicate independently. However, the robotaxi market is intensely
      competitive: Waymo is already scaling in San Francisco, Phoenix, and Austin; Tesla targets
      mass deployment with its own fleet. Waabi's simulation-first Physical AI, if it enables faster
      city-to-city expansion, would be the key competitive differentiator.
    claimRefs:
      - CU033
      - CU034
      - CU035
      - CU036
