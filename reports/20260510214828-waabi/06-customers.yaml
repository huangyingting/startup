        Customer diversification is a primary concentration risk mitigation lever. If Waabi has zero
        independent carrier relationships, the Uber dependency is even more severe, and any deterioration
        in the Uber relationship would leave Waabi with no commercial fallback across either vertical.
        The exclusivity scope governs whether Waabi can pursue direct carrier contracts at all.
      diligencePath: >-
        Request the complete customer and carrier pipeline from management, including any LOIs, pilot
        agreements, or informal commitments with freight carriers outside the Uber Freight network.
        Review the Uber Freight and Uber robotaxi partnership agreements under NDA for exclusivity scope,
        duration, and termination rights. Seek independent carrier references.
      relatedQuestionRefs:
        - QU011
      relatedTableRefs:
        - TU001

    - type: private-evidence-only
      severity: material
      topic: revenue-model
      missingEvidence: >-
        No revenue figure, per-mile pricing, or unit economics have been disclosed from the Texas pilot
        operations or the Uber Freight commercial partnership. It is unknown whether Waabi generates
        revenue from active pilots, what its per-mile cost and margin profile is, or what freight volume
        has been carried autonomously since 2023. The per-mile or per-load fee charged to Uber Freight
        or prospective direct carriers is also undisclosed.
      whyItMatters: >-
        Without revenue or unit economics, it is impossible to assess whether the DaaS model is
        commercially viable or whether Waabi's per-mile price point is competitive with human driver
        cost (typically $1.80-$2.50 per mile all-in). The $250M Uber milestone structure is also
        uninterpretable without knowing what milestones have been triggered and what remains outstanding.
      diligencePath: >-
        Request per-trip and per-mile P&L, total pilot revenue to date, autonomous load count since 2023,
        and the complete Uber milestone schedule with triggered and outstanding tranches under NDA.
      relatedQuestionRefs:
        - QU005
        - QU006
        - QU007
        - QU008

    - type: private-evidence-only
      severity: blocking
      topic: partnerships
      missingEvidence: >-
        The vehicle count in Waabi's Texas pilot fleet is not publicly disclosed. Waabi has also not
        disclosed autonomous miles driven, safety incident rates, disengagement statistics, or any
        operational performance metrics from the Dallas-Houston corridor since operations began in 2023.
      whyItMatters: >-
        Without operational data, it is impossible to independently verify technology readiness claims
        or assess how close Waabi is to the safety threshold required for driverless commercial launch.
        Operational data is also required to benchmark against Aurora's disclosed metrics and assess
        competitive technology gap.
      diligencePath: >-
        Request operational data room including fleet count, autonomous miles driven, disengagement rates,
        safety incident log, and shipper load metrics from Texas pilots. Seek reference conversations
        with Uber Freight operations team under NDA.
      relatedQuestionRefs: []

