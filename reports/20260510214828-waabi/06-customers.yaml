callouts:
  - calloutType: risk
    title: Single-Partner Concentration Is Extreme and Multi-Dimensional
    body: >-
      100% of Waabi's current autonomous trucking commercial operations flow through Uber Freight.
      The same entity is simultaneously the freight channel, robotaxi partner, $250M milestone investor,
      and the former employer of Waabi's COO. This multi-layered dependency creates concentration risk
      qualitatively more severe than standard single-customer metrics capture. If the Uber relationship
      deteriorates for any reason, Waabi's entire commercial model is impaired across both trucking and
      robotaxi verticals simultaneously.
    claimRefs:
      - CU027
      - CU028
      - CU029

  - calloutType: risk
    title: Aurora's Named Carrier Customers Highlight Waabi's Customer Proof Gap
    body: >-
      Aurora Innovation publicly confirmed FedEx, Werner Enterprises, and Schneider National as
      commercial autonomous trucking customers, and launched driverless operations in April 2026 on the
      same Dallas-Houston corridor where Waabi still operates with safety drivers. In a market where
      safety reputation and carrier trust are built over years of demonstrated operations, Waabi's
      dependence on a single platform partner for all commercial volume, with no named carrier base,
      represents a credibility gap that will take multiple sales cycles and demonstrated driverless
      performance to close.
    claimRefs:
      - CU030
      - CU031
