  - calloutType: strength
    title: Uber Partnership Provides Unmatched Demand Access for Robotaxi Scale
    body: >-
      While exclusivity creates concentration risk, Waabi's access to Uber's rideshare demand network
      across hundreds of cities is a structural advantage competitors without a platform partner cannot
      replicate. Waymo built its own demand app; Tesla requires fleet ownership. Waabi's DaaS model on
      Uber's platform, if commercially validated, could achieve 25,000+ vehicle scale faster than any
      independent demand-generation model, provided the robotaxi technology is ready.
    claimRefs:
