company:
  name: Waabi
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Waabi is a Toronto-based Physical AI company founded in 2021 by Raquel Urtasun, the former
    Chief Scientist at Uber ATG. The company has developed a simulation-first AI platform — the
    Waabi Driver — that powers both autonomous Class-8 trucks and, since January 2026, robotaxis
    exclusively on the Uber platform. Waabi closed a $750M Series C in January 2026 co-led by
    Khosla Ventures and G2 Venture Partners, with an additional $250M milestone-based investment
    from Uber, bringing total capital raised to approximately $1.28 billion. The round was the
    largest fundraise in Canadian startup history. Commercial autonomous truck pilots have been
    operating in Texas since 2023. A fully driverless truck launch, initially planned for end-2025,
    has been delayed to "the next few quarters." Key risks include execution timing, intense
    competition from Aurora and Waymo, and reliance on Uber as a sole robotaxi distribution channel.
sections:
  - id: identity
    title: Company Identity and Mission
    body: |
      Waabi was founded in Toronto, Canada in 2021 by Raquel Urtasun, a world-renowned AI scientist who
      previously served as Chief Scientist at Uber's Advanced Technologies Group (ATG) and remains a full
      professor of computer science at the University of Toronto. The company's name derives from an Ojibwe
      word meaning "she has vision," reflecting its founder's ambition to build the defining Physical AI
      platform of the autonomous transportation era.

      Waabi's mission is to pioneer Physical AI — a category it defines as AI systems that interact with
      and operate in the physical world. Its flagship product, the Waabi Driver, is a single end-to-end AI
      model trained primarily inside a proprietary generative neural simulator called Waabi World. This
      simulation-first approach allows the system to generalize across vehicle form factors (Class-8 trucks
      and passenger-car robotaxis), geographies, and environmental conditions without requiring the massive
      real-world fleets and engineering headcounts characteristic of earlier autonomous vehicle programs.

      The company's headquarters are in Toronto, with US operations anchored in Texas (Dallas and Houston
      routes) and engineering offices in San Francisco, Phoenix, and Pittsburgh. Waabi employs an estimated
      200 people as of early 2026, a deliberately lean headcount relative to the capital raised, consistent
      with its capital-efficient philosophy. The company's long-term ambition extends beyond trucking and
      robotaxis to additional robotics verticals, as hinted by Urtasun in multiple media appearances.
    claimRefs:
      - CO001
      - CO002
      - CO026
      - CO027
      - CO036
      - CO037
    tableRefs:
      - TO001
    figureRefs:
      - FO002

  - id: leadership-governance
    title: Leadership and Governance
    body: |
      Waabi operates under a founder-led structure with Raquel Urtasun serving as CEO and the dominant
      strategic and technical voice. Urtasun's credentials are unusually strong for a deep-tech founder:
      sixteen years of self-driving research, Chief Scientist at Uber ATG, and professor at the University
      of Toronto's Department of Computer Science. Her relationships with major industry players — Uber,
      NVIDIA, Volvo — directly shaped the Series C syndicate and strategic partnership network.

      In August 2025, Waabi made a high-profile COO hire with Lior Ron, who had served as CEO of Uber
      Freight since 2016 and built it into a $5 billion annual revenue business. Ron retains the chairmanship
      of Uber Freight, creating an institutional bridge between Waabi and its most important commercial
      partner. Ron's hire signals the company's shift from an R&D-first posture to active commercialization,
      with a stated aspiration for initial commercial trucking scale in 2026 and broader commercial scale
      in 2027.

      Governance is private-company standard — no public board disclosure is required. Key-person risk is
      material: Urtasun's technical reputation, investor relationships, and partnership network are
      central to Waabi's identity. The COO hire partially mitigates commercial-execution risk, but the
      scientific and partnership leadership remain highly concentrated. Diligence should confirm depth of
      the technical leadership team beyond the CEO.
    claimRefs:
      - CO007
      - CO008
      - CO027
      - CO028
      - CO036
