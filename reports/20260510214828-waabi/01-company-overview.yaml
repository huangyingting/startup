callouts:
  - calloutType: strength
    title: Single AI Model Across Multiple Verticals Is a Structural Differentiation
    body: >-
      Waabi's most defensible claim is that the same Waabi Driver AI model powers both Class-8 autonomous
      trucks and passenger-car robotaxis. Competitors such as Waymo abandoned trucking to focus on robotaxis;
      Aurora is trucking-only. A shared brain that improves from both verticals simultaneously, if validated
      at commercial scale, would represent a step-change in capital efficiency and market optionality.
    claimRefs:
      - CO015
      - CO016
      - CO035

  - calloutType: risk
    title: Driverless Truck Launch Delay Is a Material Red Flag
    body: >-
      The fully driverless commercial truck launch was promised for end-2025 and has slipped to "the next
      few quarters" as of January 2026. In a category where credibility is built on milestone execution,
      a missed go-live date — even if attributed to an OEM (Volvo validation) rather than AI software — raises
      questions about schedule predictability and commercial timing. Diligence must independently confirm
      the Volvo validation status and obtain a revised committed launch date.
    claimRefs:
      - CO019
      - CO021
      - CO034

  - calloutType: risk
    title: Uber Channel Concentration Creates Single-Point-of-Failure Risk for Robotaxis
    body: >-
      The robotaxi partnership is exclusively with Uber. The $250M milestone-based investment from Uber
      creates financial interdependence on top of distribution dependence. Any deterioration in the
      Uber relationship — whether from regulatory, commercial, or competitive causes — would strand the
      robotaxi vertical entirely. Diligence should review exclusivity terms, milestone definitions, and
      termination provisions in the Uber partnership agreement.
    claimRefs:
      - CO010
      - CO020
      - CO029

  - calloutType: insight
    title: Canadian Institutional Capital Bloc Is Strategically Significant
    body: >-
      BDC Capital's Thrive Venture Fund, Export Development Canada, TELUS Global Ventures, and BMO Global
      Asset Management all participated in the Series C. This cluster of Canadian government-linked and
      institutional investors provides reputational validation and may carry preferential conditions.
      The company's status as the largest Canadian startup fundraise in history adds political salience
      that may affect regulatory posture in Canada.
    claimRefs:
      - CO013
      - CO014

