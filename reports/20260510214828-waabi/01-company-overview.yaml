  - id: milestone-chronicle
    title: Milestone Chronicle
    body: |
      Waabi's public milestone record from 2021 to May 2026 traces a rapid arc from research-first startup
      to a dual-vertical (trucking and robotaxi) Physical AI platform with over $1.28 billion raised and
      active commercial pilots. The founding team's prior experience at Uber ATG gave Waabi a head start
      in both technical credibility and partnership formation: Uber and NVIDIA participated in the Series A
      alongside Khosla Ventures in June 2021.

      Key inflection points include the Uber Freight partnership announcement (which launched the DaaS
      commercial model and initiated Dallas-Houston autonomous pilot runs), the August 2025 hiring of Lior
      Ron as COO (signaling the R&D-to-commercialization transition), and the November 2025 surface street
      driving capability unlock. The January 2026 Series C and simultaneous Uber robotaxi partnership
      announcement represent the most consequential dual-event in Waabi's history, positioning it as a
      multi-vertical Physical AI company rather than a single-application autonomous trucking startup.

      Outstanding milestones include: completion of full vehicle validation with Volvo and launch of
      driverless commercial truck operations (delayed from end-2025 to mid-2026), formal initiation of
      robotaxi operations on the Uber platform (vehicle OEM partner and city not yet disclosed), and
      achievement of the target robotaxi fleet of 25,000+ units. The milestone table in this chapter
      provides a timestamped reference to be reused in later diligence chapters covering financial
      performance, product, and risk.
