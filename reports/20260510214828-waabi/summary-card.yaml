summary:
  headline: >-
    Waabi is an exceptionally well-funded, technically differentiated autonomous trucking company with world-class AI
    leadership and a transformative Physical AI platform, but faces significant execution risk in an intensely
    competitive, pre-revenue, and highly regulated market as it attempts the difficult transition from commercial pilots
    with safety drivers to driverless-at-scale operations.
