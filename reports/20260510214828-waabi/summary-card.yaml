  topStrengths:
    - >-
      World-class AI leadership (Raquel Urtasun, former Uber ATG Chief Scientist) with deep academic and research
      credibility
    - >-
      Differentiated Physical AI Platform: single generalizable AI model for trucks and robotaxis, simulation-first
      approach via Waabi World
    - >-
      Largest fundraise in Canadian startup history ($1B Series C) with Tier-1 investors (Khosla, NVIDIA, Uber, Volvo,
      Porsche, BlackRock)
    - >-
      Strategic partnership with Uber (deployment + $250M milestone funding + exclusive robotaxi deal) and Volvo (OEM
      factory integration)
    - First mover in dual-market strategy (autonomous trucking + robotaxis) with a single shared technology stack
  topRisks:
    - >-
      Technology execution risk: fully driverless truck launch already delayed from end-2025; competitor Aurora has
      250,000+ driverless miles and zero at-fault collisions
    - >-
      Regulatory risk: California AB 316 effectively bans driverless heavy-duty trucks in that state; federal AV
      framework still being finalized in 2026
    - >-
      Competitive risk: Aurora Innovation (public, $1.6B cash, 30+ driverless trucks on commercial routes) is 3+ years
      ahead on commercial operations
    - >-
      Key-person risk: Urtasun's departure would fundamentally undermine investor and partner confidence; no disclosed
      second-tier technical leadership
    - >-
      Financial risk: pre-revenue company with ~$1.28B total raised; burn rate and runway not publicly disclosed; $250M
      Uber milestone investment at risk if milestones missed
  unresolvedGaps:
    - >-
      Revenue and unit economics not publicly disclosed; cannot assess commercialization trajectory or path to
      profitability
    - >-
      Exact safety incident record and near-miss data from Texas pilots unavailable; driverless truck not yet on public
      roads
    - Commercial contract terms and per-mile pricing structure with Uber Freight not disclosed
    - Headcount, quarterly burn rate, and cash position not officially confirmed
    - Patent portfolio breadth and defensibility versus Aurora and Kodiak unclear from public sources
    - Uber robotaxi exclusivity terms, milestone definitions, and termination provisions not publicly disclosed
