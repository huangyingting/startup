      whyItMatters: >-
        If the $250M Uber tranche is heavily back-loaded or tied to milestones that require
        additional capital to achieve, the effective runway from the Series C could be materially
        shorter than the headline $1B figure implies. Conversely, if milestones are achievable
        within 12–18 months, the milestone investment could extend runway by 6–12 months without
