company:
  name: Waabi
chapter:
  number: 4
  title: Financials
  summary: >-
    Waabi has raised approximately $1.28 billion in total capital across three rounds: a $83.5M
    Series A (June 2021), a $200M Series B (June 2024), and a landmark Series C comprising
    $750M in equity plus a $250M milestone-based investment from Uber, announced January 28, 2026.
    The Series C — the largest fundraise in Canadian startup history — was co-led by Khosla Ventures
    and G2 Venture Partners, with strategic participation from Volvo Group Venture Capital, NVIDIA
    NVentures, BlackRock, HarbourVest, and Canadian institutional investors including BDC Capital's
    Thrive Venture Fund, Export Development Canada, TELUS Global Ventures, and BMO Global Asset
    Management. Post-Series C valuation is estimated at approximately $3 billion by third parties,
    though Waabi has not confirmed this figure. Waabi generates no publicly disclosed revenue; its
    go-forward revenue model centers on a Driver-as-a-Service (DaaS) per-mile fee with Uber Freight
    (operational since Texas pilots in 2023), a direct-to-customer freight model (unlocked November
    2025), and a planned robotaxi revenue share with Uber. The $250M Uber milestone tranche is tied
    to robotaxi deployment milestones, creating a structured capital release mechanism conditioned on
    commercialization progress. Based on comparable deep-tech AV companies and Waabi's approximate
    headcount and infrastructure, annual burn is estimated at $150–$300M, implying a 24–48 month
    runway. Aurora Innovation's public filings provide the most relevant financial benchmark: Aurora
    holds $1.6B in cash funded into H2 2027, generated $1M in Q3 2025 revenue from driverless
    trucking, and has raised $3.46B in total. Waabi's capital-efficient posture (~200 employees
    versus Aurora's ~1,600) is a core element of its financial narrative, but absence of disclosed
    revenue and a pre-commercial driverless status remain the primary financial risks.

sections:
  - id: revenue-model
    title: Revenue Streams and DaaS Model
    body: |
      Waabi's go-forward revenue architecture combines three distinct monetization streams, none of
      which has been publicly quantified as of May 2026. All three depend on the Waabi Driver being
      deployed at commercial scale, which has not yet occurred on a fully driverless basis.

      **Driver-as-a-Service (DaaS) with Uber Freight.** Waabi's primary announced revenue mechanism
      is a DaaS arrangement with Uber Freight, under which Waabi provides its autonomous trucking
      platform as a service — including AI software, safety oversight, and monitoring — and collects
      a per-mile fee from freight loads routed through Uber Freight's logistics marketplace. This
      structure mirrors the model used by Aurora Innovation, which also operates on a per-mile revenue
      basis with freight carrier partners. Autonomous trucks with safety drivers have operated under
      this partnership on the Dallas-to-Houston corridor since approximately 2023. The partnership was
      extended and deepened as part of the January 2026 Series C announcement; Uber Freight's
      integration of Waabi's platform into its dispatch and carrier-management systems was described
      as an "industry-first autonomous truck deployment solution."

      **Direct-to-Customer Model (November 2025).** In November 2025, Waabi unlocked surface-street
      driving capability, enabling a direct-to-customer freight model that eliminates the hub-to-hub
      constraint of its earlier DaaS operations. This expansion allows Waabi trucks to perform
      end-to-end freight pickup and delivery without requiring terminal handoffs, reducing shipper
      integration friction. The per-unit economics of this model — whether priced per mile, per load,
      or per subscription — have not been disclosed publicly.

      **Robotaxi Revenue Share with Uber (Planned).** As part of the January 2026 funding
      announcement, Waabi confirmed plans to launch robotaxi operations in partnership with Uber,
      using the Uber app as its exclusive distribution channel. The monetization model is structured
      as a revenue share: Uber collects fares and remits a portion to Waabi. Specific revenue share
      ratios, geographic launch markets, and launch timing have not been disclosed. The $250M
      milestone-based investment from Uber is tied to robotaxi deployment milestones, meaning a
      portion of Waabi's remaining capital commitment is contingent on executing commercially in the
      robotaxi segment.

      **No Publicly Disclosed Revenue.** Waabi has not disclosed any revenue figures, ARR, or
      per-route commercial metrics. This is consistent with its pre-commercial driverless stage —
      pilots with safety drivers generate limited revenue relative to the capital required, and the
      company has not confirmed whether those pilots are revenue-generating at all versus
      cost-sharing arrangements with Uber Freight.
