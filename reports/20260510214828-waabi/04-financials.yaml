  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: waabi-revenue-and-unit-economics
      missingEvidence: >-
        Waabi has not disclosed any revenue figures, per-mile pricing, per-truck revenue, or
        unit economics for its DaaS arrangement with Uber Freight. No public data exists on
        load counts, revenue per load, or margin profile for either the Texas pilot operations
        or the November 2025 direct-to-customer model. Aurora's $1M Q3 2025 revenue provides
        the only publicly available comparable, but the structural differences between Aurora's
        direct carrier contracts and Waabi's Uber Freight-mediated DaaS make direct extrapolation
        unreliable.
      whyItMatters: >-
        Unit economics are the foundational input for assessing whether Waabi's $1.28B capital
        base is sufficient to reach positive gross margin before a Series D is required. Without
        any disclosed revenue or per-unit cost data, it is impossible to verify whether the
        DaaS business model is financially viable at current pilot scale, how quickly it can ramp
        post driverless launch, or what revenue level would validate a Series D at a step-up
        valuation. This is the most critical evidence gap for financial underwriting.
      diligencePath: >-
        Request under NDA: current per-mile and per-load pricing for Uber Freight DaaS, gross
        margin per truck per month, cost-of-goods-sold breakdown (AI compute, monitoring, OEM
        amortization, insurance), and forward revenue model for 2026–2028.
      relatedQuestionRefs:
        - QI006
        - QI012

    - type: private-evidence-only
      severity: material
      topic: uber-milestone-definitions
      missingEvidence: >-
        The specific milestones that trigger disbursement of the $250M Uber milestone investment
