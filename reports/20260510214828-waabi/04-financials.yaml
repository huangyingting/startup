  - id: path-to-commercialization
    title: Capital Adequacy, Burn Rate, and Path to Commercialization
    body: |
      Waabi's path to commercialization rests on three interdependent financial pillars: sufficient
      runway from the Series C, a credible near-term commercial launch (driverless trucking followed
      by robotaxi), and a revenue ramp that provides evidence for a Series D or alternative capital
      event before the current runway is exhausted.

      **Capital Position and Runway.** With approximately $1.28B in total capital raised and an
      estimated annual burn rate of $150–$300M, Waabi's post-Series C runway is estimated at 24–48
      months — taking the company through late 2027 to early 2029. The range reflects genuine
      uncertainty about burn: Waabi has not disclosed headcount by team, capex versus opex mix, or
      the pace of fleet expansion capital expenditure. The $250M Uber milestone tranche, tied to
      robotaxi deployment milestones, provides additional non-dilutive capital release that could
      extend this runway if milestones are met.

      **Aurora as a Financial Benchmark.** Aurora Innovation (NASDAQ: AUR) holds $1.6B in cash and
      investments (per its FY2025 and Q1 2026 filings), providing runway into H2 2027. Aurora
      generated $1M in Q3 2025 revenue — its first commercial revenue — from its driverless freight
      service. Aurora's total raised is $3.46B, approximately 2.7× Waabi's total, yet its commercial
      revenue base is still nascent. This benchmark suggests Waabi can operate at a significantly
      lower capital threshold while pursuing similar commercialization objectives, reflecting its
      smaller fleet footprint and leaner organization (~200 vs. Aurora's ~1,600 employees).

      **Critical Commercial Milestones.** Waabi must execute two commercialization milestones within
      the runway window: (1) achieve fully driverless autonomous trucking commercial operations
      (delayed from end-2025 to "the next few quarters" per January 2026 guidance), and (2) launch
      robotaxi service on the Uber platform. Each milestone has associated capital releases from the
      Uber tranche. The first commercial driverless trucking event is the most important near-term
      trigger — it converts Waabi from a pre-revenue stage to a revenue-stage company, changes the
      investor narrative, and provides the commercial evidence base for a Series D.

      **Financial Risks.** Three primary financial risks stand out: (1) Burn overrun — if commercial
      driverless launch is delayed significantly beyond 2026, runway consumption accelerates without
      revenue offset; (2) Uber concentration — Waabi's DaaS and robotaxi revenue models are highly
      dependent on a single commercial partner, creating revenue concentration risk; and (3) AV
      sector sentiment risk — the autonomous trucking VC market has experienced significant failures
      (TuSimple, Embark, Ike), and a sustained downturn could impair Waabi's ability to raise a
      Series D at favorable terms even with operational progress.
