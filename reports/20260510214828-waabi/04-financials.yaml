        - QI019

    - type: private-evidence-only
      severity: high
      topic: waabi-burn-rate-and-cash-position
      missingEvidence: >-
        Waabi has not disclosed its actual burn rate, cash position, or capex schedule. The
        estimated $150–$300M annual burn range is derived entirely from headcount estimates and
        infrastructure analogies to comparable AV companies. The true burn could be higher if
        Waabi is aggressively investing in fleet expansion and OEM partnership capital commitments,
