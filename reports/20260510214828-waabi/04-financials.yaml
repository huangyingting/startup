  - id: unit-economics
    title: Unit Economics Analysis
    body: |
      Waabi has not disclosed per-truck, per-mile, or per-route unit economics. The following
      analysis is therefore based on industry benchmarks, comparable company disclosures, and
      publicly observable structural factors.

      **Revenue per Truck (Estimated).** Industry estimates for autonomous trucking revenue range
      from $1.50–$3.00 per mile, depending on route type, load, and competitive dynamics. A
      commercial-scale autonomous truck operating 500 miles per day, 300 days per year, at $2.00
      per mile would generate approximately $300,000 in annual gross revenue per truck. At scale
      (e.g., 500 trucks), this implies $150M in annual gross revenue before OEM fees, platform
      costs, insurance, and monitoring overhead. These estimates remain highly speculative and
      require validation against Waabi's undisclosed contract terms.

      **Cost Structure (Estimated).** Waabi's capital-intensive cost structure includes AI compute
      (training and inference infrastructure), a fleet of research and commercial vehicles requiring
      OEM-grade maintenance, safety monitoring operations, software and R&D, and the human safety
      drivers required until full driverless deployment. Safety driver costs alone — estimated at
      $50,000–$75,000 per driver per year in the US — represent a significant pre-commercialization
      burden that largely disappears upon driverless launch.

      **Aurora Benchmarks.** Aurora Innovation, the most financially comparable public company,
      generated $1M in Q3 2025 revenue from driverless freight service — its first commercial
      revenue. Aurora's Q4 2025 / FY2025 annual results (filed February 2026) and Q1 2026 results
      (filed May 2026) provide the most relevant benchmark for scaling expectations. Aurora's revenue
      ramp implies a very slow monetization curve in the early driverless phase, consistent with fleet
      expansion constraints (new trucks require OEM lead times of 12–24 months) and contract ramp
      dynamics.

      **Path to Gross Margin.** Waabi's DaaS model, if priced correctly relative to driver wage
      savings ($50,000–$100,000 per displaced position per year), has the structural potential to
      generate positive gross margins at scale. The key question is whether the per-mile fee
      (estimated $1.50–$3.00/mile) exceeds the fully-loaded cost of operating the autonomous stack
      (estimated $0.80–$1.50/mile for AI infrastructure, monitoring, and maintenance, excluding OEM
      amortization). No public data validates these estimates for Waabi specifically.
