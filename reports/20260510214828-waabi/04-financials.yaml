      whyItMatters: >-
        Runway is the most critical near-term financial metric for a pre-revenue deep-tech company.
        A burn rate at the high end of the estimated range ($300M/year) would imply a runway of
        approximately 4 years on the $1.28B total raised — potentially sufficient. But if
