  - id: financial-risk
    title: Financial Risk
    body: |
      Waabi is a pre-revenue company that has raised $1.28 billion in total equity financing with
      no publicly disclosed commercial revenue as of May 2026. The financial risk profile is
      characterised by three interlocking vulnerabilities: burn rate opacity, Uber milestone
      concentration, and the AV sector's historical failure pattern.

      Waabi has not publicly disclosed its burn rate or cash position. Based on sector benchmarks
      for AV trucking companies at comparable scale (250–400 engineers, fleet operations, compute
      infrastructure), annual cash consumption is estimated at $150–300 million. At the midpoint
      ($225M), a $1.28B raise would imply roughly 5–6 years of theoretical runway — but timing
      of tranches, milestone conditions, and accelerating spend in a commercialisation phase mean
      the actual runway is likely shorter and the next capital event is probable within 18–24 months.

      The $250M Uber milestone investment, separated from the base $750M raise in the January 2026
      Series C, creates financial dependency on specific robotaxi deployment milestones. If these
      milestones are delayed — which is plausible given that Waabi has not announced any launch city,
      pilot timeline, or vehicle count for the Uber robotaxi partnership — the conditional capital
      tranche could be deferred or renegotiated, creating a funding cliff. Canadian institutional
      investors (BDC Capital, OMERS Ventures) represent a disproportionate share of the cap table,
      concentrating financial risk in a single national LP base.

      The AV sector track record provides a sobering precedent: TuSimple raised approximately $1.4
      billion before collapsing amid a CEO firing and SEC fraud investigation; Embark raised
      approximately $200 million before shutting down; Ike Robotics was acquired at an undisclosed
      sum. Each failure erodes the credibility of the category with institutional investors and
      raises the bar for Waabi to demonstrate commercial progress.
