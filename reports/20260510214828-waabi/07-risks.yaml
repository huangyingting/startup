  - id: adverse-events
    title: Adverse Events and Key-Person Risk
    body: |
      The most significant adverse event specific to Waabi is the missed Q4 2025 driverless truck
      launch target. This was acknowledged in January 2026 and attributed to Volvo VNL Autonomous
      truck validation as the remaining gate. While management framed the delay as a near-term
      technical milestone, it has structural consequences: Aurora achieved commercial driverless
      launch in April 2026, creating a first-mover gap on the same Dallas–Houston corridor that
      Waabi occupies. Each additional month of safety-driver-only operations widens the driverless
      mileage gap with Aurora and delays revenue onset.

      At the sector level, the TuSimple collapse is the most instructive adverse precedent. The
      company raised approximately $1.4 billion, went public, fired its co-founder CEO, attracted
      an SEC fraud investigation, and ultimately ceased US operations — all within a four-year
      window. TuSimple's arc — well-capitalised, credible technology, partnership-heavy commercial
      model, then catastrophic governance failure — is the canonical risk scenario investors apply
      to all private AV trucking companies, including Waabi. The Embark shutdown (2023) and Ike
      acquisition add weight to the pattern.

      Key-person risk is acute at Waabi. Raquel Urtasun is simultaneously the company's chief
      scientist, CEO, primary fundraiser, and most recognisable public face. Her departure from
      Uber ATG and University of Toronto to found Waabi was the primary catalyst for the company's
      initial funding. No CTO has been publicly announced; technical leadership beyond Urtasun and
      COO Lior Ron (who joined from Uber Freight in August 2025 and has no deep AI research
      background) is not publicly visible. An Urtasun departure — voluntary or otherwise — would
      likely trigger investor notification rights, trigger material-adverse-change provisions in
      key commercial agreements, and create a leadership vacuum with no obvious internal successor.
