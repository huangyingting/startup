  evidenceGaps:
    - type: missing-data
      severity: material
      topic: financial-risk
      missingEvidence: Waabi's actual burn rate, cash position, and remaining runway are not publicly disclosed; sector estimates carry high uncertainty
      whyItMatters: Without burn rate visibility, investors cannot assess the probability of a funding cliff before commercial revenue onset, nor calibrate the size and dilution of the next capital event
      diligencePath: Request burn rate and 12-month cash projection in management diligence; validate against headcount disclosures and compute infrastructure contracts
      relatedQuestionRefs:
        - QR006
        - QR030

    - type: missing-data
      severity: material
      topic: regulatory-risk
      missingEvidence: The full terms of the $250M Uber milestone investment — specific milestone definitions, measurement dates, cure periods, and termination provisions — are not publicly disclosed
      whyItMatters: The structure of the milestone-linked tranche determines how severe the funding cliff would be if Waabi's robotaxi launch is delayed; adverse termination provisions could eliminate a significant portion of the implied $1.28B raise
      diligencePath: Request full Series C term sheet and Uber co-investment agreement; focus on milestone definitions and force-majeure carve-outs
