  - id: incumbent-alternatives
    title: "Incumbent Alternatives: Traditional Carriers and Their AV Partnerships"
    body: |
      The status quo alternative for shippers is the existing human-driven trucking system,
      operated by large carrier networks including Werner Enterprises, Schneider National, and
      J.B. Hunt Transport Services — all multi-billion dollar publicly traded carriers. These
      incumbents represent both the competitive baseline and, paradoxically, the most natural
      early partners for autonomous trucking companies. Driver wages represent 40%+ of operating
      costs for these carriers, making them structurally motivated to partner with AV technology
      rather than compete against it.

      Werner Enterprises is a commercial partner of Aurora, operating autonomous trucks on shared
      freight routes. Schneider National similarly partners with Aurora. J.B. Hunt is a Kodiak
      customer and is actively testing AV integration in its logistics network. None of these
      carriers has indicated plans to build proprietary AV technology in-house — a de facto
      acknowledgment that AV development requires specialized AI expertise that incumbent carriers
      cannot build organically. This dynamic makes incumbent carriers a channel and customer base
      for Waabi rather than a direct technology competitor.

      However, the incumbents do represent competitive inertia. Shippers and carriers have deep
      relationships with existing logistics networks, and their willingness to contract with Waabi
      versus other AV companies is determined by proven safety records, route coverage, and
      pricing. Aurora's earlier commercial launch and its existing partnerships with Werner and
      Schneider create switching costs that Waabi must overcome. Uber Freight's role as Waabi's
      primary go-to-market channel (versus Aurora's direct fleet partnerships) represents a
      differentiated but higher-dependency distribution model. The incumbent carrier landscape
      is therefore best understood as a set of potential customers and channels whose preferences
      will be determined by demonstrated operational performance and cost economics.
    claimRefs:
      - CP014
      - CP015
      - CP016
      - CP017
      - CP018

  - id: adjacent-tech
    title: "Adjacent Technology: Waymo, Tesla Semi, Gatik, and TuSimple Collapse"
    body: |
      Several companies represent adjacent or partially overlapping competitive dynamics that
      are important context for Waabi's positioning, even if they do not directly compete
      on Waabi's primary long-haul highway trucking focus.

      **Waymo** exited the autonomous trucking market in 2023 after years of Waymo Via operations,
      redirecting all resources to robotaxi deployment under the Waymo One brand. Waymo's exit
      from trucking is significant because it removed what was one of the best-capitalized potential
      competitors from Waabi's space. Waabi now overlaps with Waymo only in the robotaxi segment,
      where Waymo has a substantial operational lead. However, in autonomous trucking specifically,
      Waymo is no longer a competitive threat as of 2026.

      **Tesla Semi** is a Class 8 electric truck with Enhanced Autopilot driver-assistance features
      but is not a Level 4 autonomous vehicle and does not compete on driverless operations. Tesla
      Semi uses a camera-only sensor suite (no LiDAR), which is philosophically and technically
      different from Waabi's sensor-fused approach. Tesla Semi's market positioning does not
      represent a direct threat to Waabi's driverless trucking business in 2026.

      **Gatik AI** has achieved what it describes as the first fully driverless operations at
      commercial scale for middle-mile B2B fixed-route delivery as of January 2026. With $600M
      in contracted revenue and customers including Walmart, Loblaw, and Pitney Bowes, Gatik has
      demonstrated commercial viability in urban and suburban fixed routes. However, Gatik's
      core competency and market focus — short-loop, fixed-route middle-mile logistics — is
      architecturally and commercially distinct from Waabi's long-haul highway focus. The two
      companies may compete for investor capital and talent but do not compete for the same
      freight contracts.

      **TuSimple / Hydron** was once among the most prominent autonomous trucking companies,
      having completed a NASDAQ IPO in 2021. By 2026, TuSimple's US operations have effectively
      collapsed following an SEC securities fraud investigation, major leadership departures,
      and an operational pivot to China under the Hydron rebrand. TuSimple cannot be considered
      a current US competitive threat. Its collapse is instructive as a data point on market
      consolidation dynamics — underfunded or governance-compromised AV companies are failing,
      concentrating the opportunity among well-funded survivors.

      **Embark Trucks** shut down in 2023 after failing to secure sufficient capital for continued
      operations. **Ike Robotics** was acquired by Aurora Innovation, with Aurora absorbing
      Ike's engineering talent. These exits further consolidate the competitive landscape
      around Aurora, Kodiak, Torc, and Waabi.
