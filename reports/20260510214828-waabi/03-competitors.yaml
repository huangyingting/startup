  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: waabi-dual-vertical-execution
      missingEvidence: >-
        Whether Waabi's dual-vertical strategy (trucking + robotaxi) creates genuine technology
        synergies or dilutes resources at a critical commercialization window cannot be determined
        from public sources. Waabi has not disclosed allocation of capital or engineering headcount
        between trucking and robotaxi verticals, nor has it quantified what fraction of the $1B
        raise is allocated to each vertical. Internal R&D overlap metrics and timeline dependencies
        between the trucking commercial launch and the robotaxi launch are not disclosed.
      whyItMatters: >-
        The dual-vertical risk is material because Waabi is pre-commercial driverless in trucking
        and simultaneously entering robotaxi against well-established Waymo. If capital and
        engineering resources are divided before trucking achieves commercial scale, both verticals
        may underperform their standalone potential, reducing return on the $1B raise and delaying
        Waabi's critical first-mover window against Aurora in trucking.
      diligencePath: >-
        Request under NDA: capital allocation breakdown between trucking and robotaxi, headcount
        by vertical, shared versus dedicated AI infrastructure, internal commercialization timeline
        gate for trucking driverless launch versus robotaxi launch, and Uber exclusivity terms.
      relatedQuestionRefs:
        - QP015

    - type: private-evidence-only
      severity: material
      topic: waabi-2026-revenue-customers
      missingEvidence: >-
        Waabi has not publicly disclosed any 2026 customer wins, freight revenue, load counts,
        or per-route commercial metrics from its Uber Freight partnership. No public data exists
        on Waabi's revenue trajectory or how it compares to Aurora's $1M Q3 2025 commercial
        revenue baseline. Uber Freight's commercial deployment metrics for Waabi trucks are also
        not in the public domain.
      whyItMatters: >-
        Without any disclosed revenue or customer traction data, investors cannot assess whether
        Waabi's commercialization is on track relative to its $1.28B capital base, nor compare
        its progress to Aurora's (which already has $1M Q3 2025 revenue and 10 commercial
        freight routes). This is a critical diligence gap for investment underwriting.
      diligencePath: >-
        Request management disclosure under NDA of: current Uber Freight commercial deployment
        metrics (loads completed, trucks deployed, driverless miles, revenue per mile), pipeline
        of additional carrier partnerships beyond Uber Freight, and internal revenue ramp forecast
        for the trucking vertical through 2027.
      relatedQuestionRefs:
        - QP028

