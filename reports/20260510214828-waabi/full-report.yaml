            title: Single AI Model Across Multiple Verticals Is a Structural Differentiation
            body: >-
              Waabi's most defensible claim is that the same Waabi Driver AI model powers both Class-8 autonomous trucks
              and passenger-car robotaxis. Competitors such as Waymo abandoned trucking to focus on robotaxis; Aurora is
              trucking-only. A shared brain that improves from both verticals simultaneously, if validated at commercial
              scale, would represent a step-change in capital efficiency and market optionality.
            calloutType: strength
            claimRefs:
