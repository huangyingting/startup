      - number: '5.3'
        title: Technology Maturity and Deployment Readiness
        blocks:
          - type: paragraph
            body: |
              Waabi's technology readiness varies materially by use case. Long-haul highway driving —
              the core trucking product — is the most mature, with commercial pilots operating on the
              Dallas-to-Houston corridor since approximately 2023 with safety drivers present. Waabi
              characterizes this as SAE Level 4 capability on highway environments. On the Technology
              Readiness Level (TRL) scale (1-9), highway driving is assessed at approximately TRL 7-8:
              system prototype has been demonstrated in the operational environment, and commercial
              validation (Volvo vehicle sign-off) is the key remaining gate.

              Surface-street driving capability was unlocked in November 2025, enabling door-to-door
              freight delivery without hub-to-hub handoffs. This is assessed at TRL 6-7. Waabi World
              must generate accurate surface-street scenarios (traffic signals, pedestrian behavior,
              complex intersections) — a harder simulation challenge than controlled highway environments.

              Robotaxi operation, announced in January 2026 under the Uber partnership, represents the
              least mature commercial application, assessed at TRL 5-6. The vehicle OEM partner for
              robotaxi has not been disclosed. Robotaxi environments involve dense urban traffic,
              passenger-handling protocols, and distinct regulatory requirements versus freight trucking.

              The critical near-term maturity gate is full vehicle validation with Volvo for driverless
              commercial trucking. The driverless commercial launch was delayed from end-2025 to 2026
              specifically to complete Volvo's vehicle validation process — distinct from Waabi Driver
              software readiness. CEO Raquel Urtasun stated in January 2026 that the driverless launch
              would occur "within the next few quarters," implying a mid-2026 target.
