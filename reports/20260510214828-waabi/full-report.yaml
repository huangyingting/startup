      - number: '8.5'
        title: Critical Diligence Asks Before Investment Decision
        blocks:
          - type: paragraph
            body: |
              Given Waabi's pre-revenue, pre-driverless status and the opacity of its financial profile,
              a full investment decision requires resolution of eight critical diligence questions. These
              are listed in priority order based on their materiality to the valuation methodology and
              the key thesis assumptions.

              **1. Audited Financial Statements.** Waabi has never disclosed audited financials. Access
              to Series B and Series C audited accounts — or at minimum, management accounts for the
              trailing twelve months — is required to assess burn rate, gross margin trajectory, and
              cash runway with any precision. Without this, the $150–300M annual burn estimate remains
              a sector-benchmarked guess.

              **2. Burn Rate and Runway.** Specifically: what is Waabi's monthly cash outflow, cash on
              hand as of the analysis date, and projected runway through year-end 2027? At $1.28B raised
              and an estimated $150–300M annual burn, runway could range from 24–60 months depending on
              actual figures. This determination is foundational to assessing the next capital event timing.

              **3. Uber Milestone Schedule and Definitions.** The $250M Uber milestone investment has
              private terms. The milestones, payment schedule, and penalty or renegotiation provisions
              are material to whether Waabi's stated $1B raise is firm or conditional. A deferral of the
              Uber tranche would materially alter runway assumptions.

              **4. Per-Mile Unit Economics.** Waabi's DaaS revenue model centers on a per-mile fee.
              The actual contracted per-mile rate with Uber Freight, the fully-loaded operating cost per
              mile at commercial scale, and the resulting gross margin profile are the most material
              financial inputs for any DCF or scenario analysis. These are not publicly available.

              **5. Safety Incident Record.** Waabi has not published a safety report or incident register
              covering its Texas pilot operations. Any safety incidents, near-misses, or FMCSA reporting
              events in the 2023–2026 pilot period are material to regulatory risk and the timeline to
              driverless launch approval.

              **6. Patent Portfolio and IP Assignment.** Waabi's simulation-first platform and the
              Physical AI stack represent the company's core IP moat. The breadth of patent coverage,
              assignment from founders and key researchers, and freedom-to-operate analysis relative to
              Aurora, Waymo, and NVIDIA are required before any investment to assess defensibility.

              **7. Organisational Chart and Succession Planning.** With Raquel Urtasun as sole
              publicly identified technical visionary, the depth of the technical leadership bench is
              a critical diligence input. Key-person risk is rated HIGH based on public information;
              an org chart and succession plan would allow a more calibrated assessment.

              **8. Commercial Launch Date Commitment.** The January 2026 guidance of "next few quarters"
              is ambiguous. A specific driverless commercial launch date commitment — with the specific
              remaining validation gates and their current completion status — is the single most
              important near-term diligence input, as it determines whether the bear or bull case is
              more likely within the 2026 investment window.
