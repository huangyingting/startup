  - id: TV006
    title: Thesis-Break and Kill Triggers
    notes: >-
      Thresholds are analyst-defined trigger levels based on public information through May 2026. They are intended as
      investment monitoring criteria, not company-disclosed targets. Transmission assessments are analyst judgements
      about which aspects of the investment thesis each trigger impairs and how severely. All triggers should be
      monitored quarterly.
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action
    rows:
      - - Driverless commercial launch further delayed
        - No driverless trucks in commercial revenue-generating operation by Q4 2026
        - >-
          Breaks technology execution thesis; widens Aurora lead to potentially irreversible; increases bear-case
          probability from 35% to 55%+; validates sector delay pattern
        - REDUCE conviction; increase TRACK interval from quarterly to monthly; reassess valuation at $1.5–2.0B range
      - - Uber partnership deterioration
        - >-
          Uber publicly reduces robotaxi commitment, renegotiates DaaS terms, or defers $250M milestone tranche beyond
          2027
        - >-
          Breaks distribution moat thesis; eliminates robotaxi market access; reduces effective capital by $250M;
          converts channel strength into channel dependency failure
        - >-
          EXIT or HOLD with major haircut; thesis partially or fully broken depending on severity of Uber commitment
          reduction
      - - Aurora or competitor signs Waabi's target carrier customers
        - >-
          Aurora secures exclusive DaaS contracts with two or more of the top-10 US freight carriers (JB Hunt, BNSF,
          UPS, FedEx Freight, Old Dominion, Werner) before Waabi launch
        - >-
          Breaks market opportunity thesis; TAM capture compressed by Aurora lock-in; Waabi must compete for smaller
          carriers at worse economics
        - REDUCE conviction; model scenario where Waabi captures only 2–3% of TAM rather than 10%; revisit entry price
      - - Regulatory ban expands beyond California
        - >-
          Any state with >$50B annual freight throughput enacts AB 316-equivalent human-operator requirement for
          driverless heavy trucks
        - >-
          Breaks regulatory runway thesis; constrains Waabi to a shrinking permissive geography; complicates scale
          thesis beyond Texas
        - >-
          HOLD and monitor; if three or more major states enact equivalent restrictions, EXIT or REDUCE to minimal
          position
      - - Key-person departure (Urtasun or founding technical team)
        - >-
          Raquel Urtasun departing as CEO or founding technical leadership team experiencing material attrition (2+ of 5
          most senior researchers)
        - >-
          Breaks AI leadership thesis; may trigger Uber and Volvo partnership review; reduces proprietary model
          confidence; potential valuation impairment of 30–50%
        - IMMEDIATE REVIEW; convene investment committee; assess successor leadership calibre before further deployment
      - - Safety incident grounds fleet or triggers regulatory review
        - >-
          A serious safety incident during pilot or early commercial operations resulting in FMCSA investigation or
          voluntary operation suspension
        - >-
          Breaks technology credibility; potential regulatory reaction in permissive states; sector-wide investor
          sentiment negative impact; may delay driverless launch by 12–18 months
        - >-
          HOLD all positions; engage legal and regulatory counsel; reassess bear-case probability; prepare EXIT plan if
          investigation is prolonged
    claimRefs:
