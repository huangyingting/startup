  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Key Customers and Partners
        blocks:
          - type: paragraph
            body: |
              Waabi operates a tightly integrated partner ecosystem rather than a broad customer base. As of May
              2026, three strategic partners define the commercial architecture: Uber Freight (channel and
              investor), Volvo Group (OEM manufacturer and investor), and NVIDIA (compute infrastructure and
              investor). All three participated in the January 2026 Series C, blurring the boundary between
              commercial and financial relationships.

              **Uber Freight** is the most consequential relationship. Managing approximately $18 billion in
              freight under management, Uber Freight is the largest digital freight network in North America.
              The Waabi-Uber Freight partnership — announced in co-branded press materials — deploys Waabi's
              autonomous driver on Uber Freight loads on the Dallas-Houston corridor. The commercial model is
              Driver-as-a-Service (DaaS): Waabi provides the autonomous driver layer while Uber Freight supplies
              the freight brokerage platform, shipper relationships, and operational logistics. Uber Freight CEO
              Lior Ron joined Waabi as COO in August 2025, retaining his Uber Freight chairmanship. The January
              2026 Series C included a separate $250M milestone-based investment from Uber tied to robotaxi
              deployment, and named Uber as Waabi's exclusive robotaxi deployment partner targeting 25,000+
              vehicles on Uber's rideshare platform.

              **Volvo Group** is Waabi's OEM hardware partner. The purpose-built VNL Autonomous truck, factory-
              integrated in Dublin, Virginia, is the gate vehicle for Waabi's driverless commercial launch.
              Volvo Group Venture Capital has participated across all three funding rounds. Waabi previously
              worked with Peterbilt trucks in earlier pilot phases, demonstrating that OEM switching is possible
              though costly. Completing Volvo truck validation is the stated remaining gate for fully driverless
              operations as of January 2026.

              **NVIDIA** provides the compute infrastructure on which the Waabi Driver AI runs. NVentures (NVIDIA's
              venture arm) participated in the Series C. NVIDIA CEO Jensen Huang publicly endorsed Waabi at the
              Series C announcement via an NVIDIA Newsroom release. NVIDIA is a compute infrastructure partner
              rather than a channel or distribution partner, but the relationship provides preferential GPU access
              essential for safe autonomous inference.
