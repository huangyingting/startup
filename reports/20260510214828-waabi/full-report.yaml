      - number: '6.2'
        title: Pilot Deployments and Commercial Operations
        blocks:
          - type: paragraph
            body: |
              Waabi's commercial autonomous truck operations are centred on the Dallas-to-Houston corridor in
              Texas, a roughly 240-mile highway route connecting two of the largest freight markets in the United
              States. Pilot operations with safety drivers have been active since approximately early 2023 on Uber
              Freight loads. Texas was selected for its permissive autonomous vehicle regulatory framework, high
              freight density, and predictable highway environment suited to the early-stage Waabi Driver.

              In November 2025, Waabi announced full surface street driving capability — enabling door-to-door
              freight delivery without handoff to human drivers at terminal hubs. This milestone unlocks a direct-
              to-carrier commercial model where Waabi trucks can originate and terminate at shipper and consignee
              facilities rather than requiring intermediate hub transfer points.

              A fully driverless (no safety driver) commercial launch was originally targeted for end-2025. That
              milestone was not met; as of January 2026 Waabi management cited Volvo VNL Autonomous truck
              validation as the remaining gate and guided to "the next few quarters." Vehicle count in current
              Texas pilot operations has not been publicly disclosed. No revenue from pilot operations has been
              publicly confirmed.

              On the robotaxi side, Waabi announced in January 2026 exclusive deployment on Uber's rideshare
              platform targeting 25,000+ vehicles. No specific launch city, launch date, or pilot timeline has
              been announced. Waabi's Physical AI approach — training a single model for both trucks and robotaxis
              — is intended to enable faster geographic expansion via simulation rather than city-by-city physical
              validation programmes. Aurora Innovation achieved driverless commercial launch on the Dallas-Houston
              corridor in April 2026, establishing a competitive first-mover advantage on the same route where
              Waabi continues to operate with safety drivers.
