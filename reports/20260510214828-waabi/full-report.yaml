      - number: '7.2'
        title: Regulatory Risk
        blocks:
          - type: paragraph
            body: |
              Waabi faces a complex and fragmented regulatory landscape that could materially delay or
              constrain commercialisation. The most consequential near-term risk is California AB 316,
              signed into law and effective in 2025, which requires a human safety operator in any
              driverless heavy-duty vehicle (over 26,001 lbs) operating in California. This effectively
              bans fully driverless Class 8 truck operations in California — the largest freight market
              in the United States by volume — and forecloses a significant addressable revenue pool
              from Waabi's near-term commercial planning.

              At the federal level, FMCSA was finalising its autonomous vehicle framework in 2026 with
              compliance deadlines of January 1, 2026 for certain AV operational requirements. However,
              no comprehensive Level 4 autonomous trucking rule has been finalised. The AMERICA DRIVES
              Act, under consideration in the 119th Congress, would create a national framework for
              autonomous vehicles — but its passage timeline is uncertain and its content could either
              harmonise the current state patchwork or introduce new federal requirements that conflict
              with Waabi's existing Texas operational model.

              The American Association of Motor Vehicle Administrators (AAMVA), which coordinates state
              DMV policy, has been developing autonomous vehicle standards that may diverge from FMCSA
              federal requirements, creating additional jurisdictional complexity. Texas, Arizona, and
              New Mexico remain permissive for autonomous trucking operations, enabling Waabi's current
              Dallas–Houston corridor. But a single adverse regulatory event — a high-profile accident,
              federal rule change, or contagion from California's approach — could rapidly restrict
              Waabi's principal operating geography.

              Federal liability frameworks for Level 4 autonomous trucks remain absent. Without statutory
              clarity on liability assignment — between the AV developer, OEM manufacturer, and motor
              carrier — Waabi and its commercial partners carry uninsured or underinsured tail-risk
              exposure in the event of a serious accident.
