      - number: '4.3'
        title: Funding History and Investor Profile
        blocks:
          - type: paragraph
            body: |
              Waabi has completed three venture funding rounds between 2021 and 2026, raising a total of
              approximately $1.28 billion. Each round marks a distinct phase of the company's development.

              **Series A — $83.5M, June 2021.** Waabi launched publicly with $83.5M in Series A financing
              in June 2021. Lead and co-investors included Khosla Ventures, Uber, NVIDIA, Volvo, OMERS
              Ventures, BDC Capital, and Georgian. The composition of the Series A established the dual
              US-Canadian investor base that would persist into subsequent rounds.

              **Series B — $200M, June 2024.** Waabi raised $200M in Series B financing announced in June
              2024 via BusinessWire. The Series B funded expansion of Texas commercial pilots and deepened
              the Waabi World simulation platform development. The lead investor was not publicly identified
              in available press releases. This round bridged Waabi from a research-and-demonstration stage
              to active commercial pilots.

              **Series C — $750M Equity + $250M Uber Milestone = ~$1B, January 28, 2026.** The Series C
              was co-led by Khosla Ventures and G2 Venture Partners, with legal counsel provided to lead
              investor G2 Venture Partners by Wilson Sonsini Goodrich & Rosati (WSGR). Additional
              participants included Volvo Group Venture Capital, NVIDIA NVentures, Porsche Automobil Holding
              SE, BlackRock, HarbourVest Partners, and an ADIA (Abu Dhabi Investment Authority) subsidiary.
              Canadian institutional investors participating included BDC Capital's Thrive Venture Fund,
              Export Development Canada (EDC), TELUS Global Ventures, and BMO Global Asset Management.
              The $250M from Uber is structured as a milestone-based investment tied to robotaxi deployment
              milestones — a structure that aligns Uber's capital commitment with Waabi's commercial
              execution, reducing up-front dilution while creating a path for additional capital release.

              Post-Series C, Waabi's total raised stands at approximately $1.28 billion. The company and
              investors have not publicly confirmed a post-money valuation; third-party analysts estimate
              approximately $3 billion. The Series C is notable as the largest fundraise in Canadian startup
              history and one of the largest single autonomous vehicle funding rounds globally.
