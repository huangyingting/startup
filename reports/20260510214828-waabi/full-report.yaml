    sections:
      - number: '3.1'
        title: 'Direct Competitors: Autonomous Trucking'
        blocks:
          - type: paragraph
            body: |
              Three companies represent Waabi's most direct competitive threats in Level 4 autonomous
              long-haul trucking: Aurora Innovation, Kodiak Robotics, and Torc Robotics. Each has reached
              a different stage of commercial readiness in 2026, with Aurora the most advanced.

              **Aurora Innovation (NASDAQ: AUR)** is the leading publicly traded autonomous trucking
              company and Waabi's most formidable direct competitor. Aurora has been operating commercially
              driverless since April 2024 — more than two years ahead of Waabi's projected driverless
              launch. As of mid-2026, Aurora operates 200+ trucks in commercial freight with 30+ trucks
              running driverless across 10 commercial freight routes in the Sun Belt corridor. Aurora has
              accumulated 250,000+ driverless miles with zero at-fault collisions, establishing a safety
              record that is becoming a key customer and regulatory trust signal. Aurora's commercial
              partnerships span the freight ecosystem: FedEx, Werner, Schneider, Hirschbach, and Uber
              Freight on the carrier side, and Volvo and PACCAR on the OEM side. Aurora raised $3.46B in
              total capital, holds $1.6B in cash and investments (funded into H2 2027), and generated its
              first revenue of $1M in Q3 2025. Aurora's Aurora Driver is certified at SAE Level 4.
              Aurora's per-route economics and profitability timeline have not been publicly disclosed,
              but the company is investing heavily in scaling its fleet ahead of profitability.

              **Kodiak Robotics** has raised $448M and operates on a Driver-as-a-Service (DaaS)
              subscription model targeting hub-to-hub highway routes. Kodiak's most notable operational
              milestone is achieving driverless operations in the Permian Basin for oil-field logistics,
              serving customers including JB Hunt and the US Army. Kodiak's technology differentiator
              is its proprietary KodiaK Driver with an integrated sensor stack. Unlike Aurora, Kodiak
              is not yet operating commercially driverless at scale on public freight corridors, and
              its Permian Basin expansion details and customer pipeline remain private. Kodiak's niche
              focus on energy-sector and defense-adjacent applications differentiates it from both
              Aurora and Waabi, but its DaaS model could expand aggressively if proven in niche markets.

              **Torc Robotics**, acquired in majority stake by Daimler Truck in 2019, pursues a more
              methodical safety-validation approach and has not rushed commercial deployment. Operating
              primarily in the Blacksburg, Virginia area, Torc benefits from Daimler's OEM integration
              and manufacturing scale but has not achieved commercial driverless scale. Its internal
              technology readiness level versus its stated safety milestones is unclear from public
              sources. The Daimler backing provides capital durability and OEM integration advantage,
              making Torc a potential long-term competitor even if near-term commercial scale lags Aurora
              and Waabi.
