  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology Risk
        blocks:
          - type: paragraph
            body: |
              Waabi's technology risk centres on four principal vulnerabilities: driverless launch delay,
              the simulation-to-real-world gap, single AI model systemic exposure, and hardware cost
              headwinds. The most acute near-term risk is the missed Q4 2025 driverless launch target.
              As of January 2026, Waabi management cited Volvo VNL Autonomous truck validation as the
              remaining gate and guided to "the next few quarters." This delay has enabled Aurora Innovation
              to achieve a commercially driverless milestone on the same Dallas–Houston corridor in April
              2026 while Waabi continues to operate with safety drivers.

              Waabi's simulation-first approach — training the Waabi Driver AI in a closed-loop simulation
              environment (UniSim) rather than accumulating primarily physical miles — is the company's
              core technological differentiation. However, this architecture introduces the sim-to-real gap:
              the simulation cannot exhaustively replicate the long tail of rare real-world edge cases —
              unexpected pedestrian behaviour, sensor occlusion patterns, novel road surface conditions,
              and adversarial scenarios — that only emerge at scale in physical operation. Aurora has now
              logged 250,000+ commercially driverless miles, building an empirical edge case library that
              is difficult to replicate in simulation alone.

              The unified Physical AI model, intended to power both autonomous trucks and robotaxis from a
              single training pipeline, creates systemic risk: a latent bug or distributional failure in the
              core model could affect all product lines simultaneously. This is structurally different from
              a modular architecture where trucking and robotaxi software are decoupled. Surface street
              capability, unlocked only in November 2025, is the least-tested domain within the Waabi
              Driver's operating envelope, increasing the probability of edge-case failures as driverless
              commercial operations approach.

              LiDAR and multi-sensor hardware costs remain a structural headwind for all AV trucking
              programmes. Until commodity pricing reduces sensor suite costs substantially, the unit
              economics of driverless trucking depend heavily on achieving fleet scale that no AV
              company has yet demonstrated.
