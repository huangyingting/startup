      - number: '2.5'
        title: Geographic Market Breakdown
        blocks:
          - type: paragraph
            body: |
              North America dominates the autonomous trucking market globally, accounting for approximately
              38.4% of global market share in 2025 per Mordor Intelligence and Grand View Research data. The
              United States accounts for the substantial majority of that share, driven by the scale of its
              long-haul freight network, the maturity of its technology ecosystem, and the presence of multiple
              commercially active or near-commercial AV trucking operators.

              Within the US, the geographic market is bifurcated by regulatory posture. Texas, Arizona, and
              New Mexico have emerged as permissive jurisdictions where fully driverless heavy-duty truck
              operations are legally permitted, attracting concentrated AV pilot and commercial activity.
              Texas specifically — home to one of the nation's highest-volume freight corridors in the
              Dallas-to-Houston lane — is the current locus of autonomous trucking commercial activity,
              hosting both Aurora's driverless commercial launch and Waabi's operational pilot. California,
              despite being the largest freight state by volume, is effectively excluded from near-term
              driverless truck deployment by AB 316.

              China represents the second-largest global market at approximately 30% of global share, with
              significant state-directed investment in AV technology and infrastructure and commercial
              deployments from players including TuSimple (rebranded), Inceptio Technology, and Baidu's
              Apollo. Europe holds approximately 20% of global market share but faces structural constraints
              from stronger labor regulations and a slower-moving EU AV regulatory framework, resulting in
              more limited commercial deployment timelines. Key European players include Einride, Scania's
              AV division, and Daimler Trucks.

              Waabi's current geographic footprint is limited to Texas commercial operations. Its stated
              expansion roadmap includes additional US states and, following the January 2026 robotaxi
              announcement, urban passenger transport markets served by Uber. International expansion is not
              referenced in current public disclosures, suggesting a multi-year US-first market development
              strategy. The geographic concentration of permissive regulation in the Sun Belt creates both a
              near-term opportunity window and a medium-term constraint until federal AV standards are adopted.
