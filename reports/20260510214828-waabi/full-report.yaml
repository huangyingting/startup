      - number: '1.4'
        title: Operating Metrics and Commercial Status
        blocks:
          - type: paragraph
            body: |
              Waabi's commercial footprint as of May 2026 is anchored in Texas, where autonomous trucks with safety
              drivers have operated on the Dallas-to-Houston corridor since approximately 2023 under the Uber Freight
              partnership. The Driver-as-a-Service (DaaS) model pairs the Waabi Driver with Uber Freight's logistics
              platform and marketplace technology to deliver a turnkey autonomous freight solution, allowing carriers
              to access autonomous capacity without owning the technology stack.

              The company achieved a material technical milestone in November 2025 when it unlocked surface street
              driving capabilities, enabling a direct-to-customer model that eliminates the need for hub-to-hub
              handoffs. However, the transition to fully driverless commercial operations — initially promised for
              the end of 2025 — was delayed, with Urtasun citing January 2026 guidance of "the next few quarters."
              The delay is attributed to the time required for Volvo's purpose-built autonomous trucks to complete
              full vehicle validation, not to shortcomings in the Waabi Driver software itself.

              The US trucking industry generates approximately $900 billion in annual revenue. A structural driver
              shortage, projected to reach 160,000 unfilled positions by 2028, creates durable demand for autonomous
              solutions. Freight-side inefficiencies — with an estimated 20-35% of truck miles driven empty — further
              strengthen the economic case. Safety data from NHTSA and FMCSA indicates that 87% of large truck
              crashes involve human error, providing a safety-mission overlay to the commercial opportunity.
              Waabi's stated employee count is approximately 200, which is lean relative to the capital deployed.
