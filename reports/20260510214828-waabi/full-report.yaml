              announcement represent the most consequential dual-event in Waabi's history, positioning it as a
              multi-vertical Physical AI company rather than a single-application autonomous trucking startup.

              Outstanding milestones include: completion of full vehicle validation with Volvo and launch of
              driverless commercial truck operations (delayed from end-2025 to mid-2026), formal initiation of
