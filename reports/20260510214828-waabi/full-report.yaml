      - number: '2.4'
        title: 'Adoption Barriers: Constraints on Market Development'
        blocks:
          - type: paragraph
            body: |
              Despite strong structural tailwinds, autonomous trucking faces significant adoption barriers that
              limit the speed and scale of market development in the near term. These barriers span regulatory,
              economic, technical, and societal dimensions.

              Regulatory fragmentation is the most immediate constraint. The US lacks a unified federal framework
              for autonomous trucking, with jurisdiction split across FMCSA, NHTSA, and DOT. California's AB 316,
              which bans driverless heavy-duty trucks, directly fragments the addressable market by excluding the
              state with the largest freight volume in the US. Texas, Arizona, and New Mexico have adopted
              permissive postures, but the patchwork of state rules creates operational complexity and limits
              the economic case for national network deployment. The AMERICA DRIVES Act is being considered in
              Congress as a potential unifying framework, and FMCSA/DOT are expected to finalize updated AV
              guidance in 2026, but timelines remain uncertain.

              Insurance and liability present a parallel structural barrier. Underwriters lack actuarial data
              for driverless commercial vehicles operating at scale, and legal frameworks for assigning incident
              liability between the AV software developer, the OEM, and the fleet operator are not yet settled.
              This creates cost and operational uncertainty that slows adoption even in permissive regulatory
              environments.

              High capital expenditure is a barrier for small and medium-sized carriers. Autonomous hardware
              retrofits are estimated at $100,000 to $200,000 per vehicle plus software licensing, which is
              financially prohibitive for operators with fleets of fewer than 100 trucks. This concentrates
              near-term demand among large fleets and 3PLs with sufficient balance sheets to absorb integration
              costs, limiting the market penetration rate even after technology is proven.

              Public trust and social acceptance remain headwinds: surveys consistently show low consumer
              confidence in autonomous vehicles generally, and driverless commercial trucks — due to their size,
              weight, and operation on shared highways — face heightened public scrutiny. These societal factors
              influence both regulatory timelines and shipper willingness to commit publicly to autonomous
              trucking partnerships.
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM019
              - CM024
              - CM026
              - CM032
              - CM037
          - type: figure
            figureRef: FM004
            claimRefs:
