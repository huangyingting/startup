        - Monthly burn disclosure; current cash on hand; projected runway assuming no new revenue
      - - Uber milestone schedule and payment definitions
        - BLOCKING
        - >-
          The $250M Uber tranche is conditional on robotaxi milestones; if milestone definitions are loose or timelines
          are extended, the effective capital raised is less than $1B; materially affects valuation model
        - Term sheet excerpts; milestone payment schedule; renegotiation or deferral provisions
      - - Per-mile DaaS unit economics (contracted rate and operating cost)
        - BLOCKING
        - >-
          Without the contracted per-mile rate and fully-loaded operating cost, the gross margin trajectory and
          path-to-profitability cannot be assessed; no DCF can be constructed
        - Contracted rate range with Uber Freight; indicative operating cost per driverless mile at target scale
      - - Safety incident record (2023–2026 Texas pilot operations)
        - MATERIAL
        - >-
          Any safety incident, near-miss, or FMCSA reporting event in pilot operations is material to regulatory risk
          and driverless launch readiness; absence of disclosure is not confirmation of absence of incidents
        - Voluntary safety report; FMCSA incident register; safety driver intervention rate statistics
      - - Patent portfolio and IP assignment audit
        - MATERIAL
        - >-
          The simulation platform and Physical AI model are Waabi's core IP moat; breadth of patent coverage, academic
          IP licensing from University of Toronto, and freedom-to-operate vs. Aurora and NVIDIA are critical inputs
        - IP audit report; patent filing list with filing dates; freedom-to-operate opinions for key patent families
      - - Organisational chart and succession planning (CTO, VP Engineering)
        - MATERIAL
        - >-
          Raquel Urtasun is the sole publicly identified technical leader; key-person risk rated HIGH; the depth of the
          technical leadership bench determines whether a departure would be terminal or survivable
        - Full org chart; leadership bios for VP-level and above; board succession plan
      - - Commercial launch date commitment and remaining validation gates
        - MATERIAL
        - >-
          January 2026 guidance of 'next few quarters' is insufficiently specific; the specific remaining Volvo VNL
          Autonomous validation gates and their completion status determine whether Q3 2026 is achievable
        - >-
          Milestone roadmap; current validation gate completion status; specific committed launch date (city, route,
          truck count)
