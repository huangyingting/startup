  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Core Technology: Waabi Driver and Physical AI Platform'
        blocks:
          - type: paragraph
            body: |
              The Waabi Driver is a single end-to-end AI model that directly ingests multi-sensor data
              (LiDAR, radar, cameras) and outputs vehicle control commands — not a modular stack of
              hand-engineered rules with separate perception, prediction, and planning subsystems.
              Waabi describes this architecture as Physical AI: a general-purpose AI that reasons about
              and acts in the physical world. The architecture's key claimed advantages are
              interpretability, verifiability, and the ability to generalize across vehicle form factors
              (trucks and robotaxis) from a single model.

              The sensor suite integrates LiDAR, radar, and cameras in a multi-modal fusion configuration.
              LiDAR provides high-precision 3D point clouds for highway geometry and object detection;
              radar enables all-weather operation; cameras supply color and texture data for traffic sign
              reading and object classification. Hardware runs on NVIDIA compute platforms — NVIDIA
              NVentures invested in Waabi's Series A and confirmed a technology partnership. Trucks are
              purpose-built with Volvo, with sensor and compute hardware integrated at Volvo's factory in
              Dublin, Virginia — a quality-control advantage over post-market retrofits used by earlier AV
              programs.

              The end-to-end architecture is explicitly contrasted by Waabi with Aurora's modular First
              Principles stack. Waabi's single-model approach claims lower per-capability engineering
              overhead and faster iteration inside Waabi World. The model is validated at SAE Level 4 for
              long-haul highway driving, extended to surface streets (November 2025), and being adapted
              for robotaxi use cases under the January 2026 Uber partnership. Approximately 200 employees
              work primarily on AI research, simulation engineering, and autonomous systems development.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE010
          - type: table
