chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: |
              Waabi was founded in Toronto, Canada in 2021 by Raquel Urtasun, a world-renowned AI scientist who
              previously served as Chief Scientist at Uber's Advanced Technologies Group (ATG) and remains a full
              professor of computer science at the University of Toronto. The company's name derives from an Ojibwe
              word meaning "she has vision," reflecting its founder's ambition to build the defining Physical AI
              platform of the autonomous transportation era.

              Waabi's mission is to pioneer Physical AI — a category it defines as AI systems that interact with
              and operate in the physical world. Its flagship product, the Waabi Driver, is a single end-to-end AI
              model trained primarily inside a proprietary generative neural simulator called Waabi World. This
              simulation-first approach allows the system to generalize across vehicle form factors (Class-8 trucks
              and passenger-car robotaxis), geographies, and environmental conditions without requiring the massive
              real-world fleets and engineering headcounts characteristic of earlier autonomous vehicle programs.

              The company's headquarters are in Toronto, with US operations anchored in Texas (Dallas and Houston
              routes) and engineering offices in San Francisco, Phoenix, and Pittsburgh. Waabi employs an estimated
              200 people as of early 2026, a deliberately lean headcount relative to the capital raised, consistent
              with its capital-efficient philosophy. The company's long-term ambition extends beyond trucking and
              robotaxis to additional robotics verticals, as hinted by Urtasun in multiple media appearances.
