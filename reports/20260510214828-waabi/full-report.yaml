      - number: '6.3'
        title: Revenue and Commercial Model
        blocks:
          - type: paragraph
            body: |
              Waabi operates a Driver-as-a-Service (DaaS) commercial model. In this structure, Waabi provides
              the autonomous driver — the AI software, sensor stack, and compute — as a service layer above
              the vehicle hardware and below the freight or rideshare network. The OEM partner (Volvo) builds
              the physical truck; the network operator (Uber Freight) owns shipper relationships and load
              matching. Waabi monetises by charging a per-mile or per-trip fee for use of the Waabi Driver,
              analogous to a software licence per vehicle per mile.

              This model is capital-efficient for Waabi — it does not own truck assets or operate freight
              brokerage infrastructure — but concentrates revenue risk in the partner relationship. The surface
              street capability unlocked in November 2025 enables a second commercial model: direct contracts
              with freight carriers for origin-to-destination service on carrier lane networks without Uber
              Freight intermediation. This would reduce channel concentration and improve per-mile economics
              by removing the platform fee layer. No direct carrier contracts have been publicly disclosed as
              of May 2026.

              For robotaxis, the model is structurally similar: Waabi provides the autonomous driver and Uber
              provides rideshare demand. Revenue would likely be a per-mile or per-ride fee from Uber. No
              pricing details or revenue data are public. Per-mile pricing benchmarks in autonomous trucking
              suggest $2.50–$4.00 per mile is the range being explored in industry pilots, but Waabi's specific
              fee structure is undisclosed. No robotaxi revenue is being generated as of May 2026.
            claimRefs:
              - CU021
              - CU022
