      - number: '7.3'
        title: Competitive Risk
        blocks:
          - type: paragraph
            body: |
              Aurora Innovation is the defining competitive benchmark for Waabi's risk assessment. Aurora
              achieved commercially driverless operations on the Dallas–Houston corridor in April 2026
              with confirmed customers including FedEx, Werner Enterprises, and Schneider National. As of
              Q1 2026, Aurora reported $1.6 billion in cash and short-term investments, funded through
              at least H2 2027. Against this, Waabi has zero commercially driverless miles, one confirmed
              channel partner (Uber Freight), and an undisclosed cash position. The competitive gap is not
              merely temporal — it is being compounded daily as Aurora accumulates driverless operational
              experience and carrier customer relationships on the same geographic corridor.

              Kodiak Robotics represents a differentiated competitive risk: driverless operations in the
              Permian Basin with JB Hunt and US Army contracts, and a DaaS subscription model that locks
              in institutional customers ahead of Waabi's commercial launch. Torc Robotics (wholly owned
              by Daimler) has OEM backing and a different commercialisation path — integrated into
              Mercedes-Benz truck manufacturing — that sidesteps the independent capital-raise cycle
              Waabi depends upon.

              Gatik achieved fully driverless commercial scale in the middle-mile segment in January 2026,
              demonstrating that Level 4 commercial viability is achievable. This strengthens investor
              confidence in the sector — but also raises the threshold Waabi must clear to be considered
              commercially relevant. Tesla Semi with FSD-like driver assistance could erode the
              addressable market for supervised autonomy, compressing the runway for Waabi's transitional
              safety-driver phase without generating commercial revenue.

              The broader sector failure pattern — TuSimple, Embark, Ike, and Waymo's trucking exit —
              demonstrates that AV trucking is an extremely capital-intensive and execution-dependent
              market in which even well-funded companies with credible technology have failed to achieve
              commercial scale. New entrants from Chinese AV companies with lower cost structures could
              further intensify competition if US market access regulations permit.
