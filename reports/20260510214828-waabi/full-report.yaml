      - number: '1.3'
        title: Funding and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Waabi has raised approximately $1.28 billion across three rounds since its 2021 founding — a pace
              that significantly exceeds comparably staged competitors when measured against headcount and
              deployment footprint. The Series A ($83.5M, June 2021) established the investor base with Khosla
              Ventures, Uber, NVIDIA, and Volvo participating. The Series B ($200M, June 2024) deepened the
              strategic consortium and funded expansion of Texas commercial pilots. The Series C, announced
              January 28, 2026, is the defining capital event: $750M in equity co-led by Khosla Ventures and
              G2 Venture Partners, plus $250M in milestone-based capital from Uber tied to robotaxi deployment,
              for a total of approximately $1 billion in new commitment.

              The Series C syndicate is notable for its breadth and strategic alignment. OEM partner Volvo Group
              Venture Capital participated, as did NVIDIA's venture arm NVentures and Porsche Automobil Holding SE.
              Financial investors include BlackRock, HarbourVest Partners, and an ADIA subsidiary. Canadian
              institutional support came from BDC Capital's Thrive Venture Fund, Export Development Canada (EDC),
              TELUS Global Ventures, and BMO Global Asset Management. WSGR advised lead investor G2 Venture Partners.

              Valuation remains undisclosed by the company, but third-party estimates place it at approximately
              $3 billion post-Series C. Competitors Aurora Innovation and Kodiak have raised $3.46 billion and
              $448 million respectively, through a mix of venture and public-market proceeds, making Waabi's
              $1.28 billion total notably capital-efficient relative to its scale of operations.
