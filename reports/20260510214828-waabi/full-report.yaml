  - id: TV004
    title: Thesis vs Anti-Thesis
    notes: >-
      Thesis and anti-thesis arguments are drawn from public information through May 2026; balance assessments are
      analyst judgements. Arguments are not exhaustive — additional factors may emerge from company-disclosed diligence
      materials not available externally.
    columns:
      - Investment Thesis Pillar
      - Supporting Evidence
      - Anti-Thesis Counter
      - Balance
    rows:
      - - AI Leadership (Urtasun)
        - >-
          Raquel Urtasun — top-5 global AV researcher by citation; former Uber ATG lead; Vector Institute founding
          member; simulation-first approach is architecturally differentiated
        - >-
          No public benchmark demonstrating superiority over Aurora's deployed model; simulation-first advantage is
          hypothesis, not validated at commercial scale; key-person concentration is HIGH
        - >-
          Tilts thesis: credentials are strong but commercial validation is absent — advantage is speculative until
          driverless launch
      - - Market Opportunity (TAM)
        - >-
          Long-haul AV TAM $2.7B (2024) growing to $42.6B (2034) at 32% CAGR; trucking is $800B+ US market with
          structural driver shortage; robotaxi adds second major market vector
        - >-
          Aurora already commercialised on the primary corridor; TAM projections have historically been too aggressive
          for AV trucking; prior market estimates (2018–2022) missed significantly
        - >-
          Neutral: TAM is real and large but timing is uncertain and Aurora's first-mover advantage in carrier
          relationships may compress Waabi's addressable share
      - - Capital Efficiency
        - >-
          ~200 employees vs Aurora's ~1,600; $1.28B raised vs Aurora's $3.46B; simulation-based training reduces
          physical mileage cost per trained scenario
        - >-
          Capital efficiency only creates value if it translates to faster commercialisation; zero commercial driverless
          miles means the efficiency has not yet yielded output; Aurora's larger team is ahead commercially
        - >-
          Tilts anti-thesis: efficiency advantage is not yet reflected in commercial outcomes; the value driver is
          output per dollar, not input per dollar
      - - Partnership Moat (Uber)
        - >-
          Exclusive Uber robotaxi distribution via Uber app; Uber Freight as primary trucking DaaS channel; $250M
          milestone investment creates Uber financial alignment; Lior Ron (Uber Freight CEO) joined Waabi as COO
        - >-
          Uber concentration is the primary channel risk: if Uber pivots robotaxi strategy, Waabi loses its sole
          distribution channel; no independent carrier customer base for trucking; Uber's robotaxi commitment has not
          been tested commercially
        - >-
          Neutral: the Uber partnership is a structural moat if maintained, but single-channel dependency converts a
          distribution strength into a concentration risk with no fallback
      - - Regulatory Timing
        - >-
          Texas remains permissive; federal framework developing; AMERICA DRIVES Act could harmonise national AV rules;
          2026 is the year of driverless commercial deployment across multiple AV companies
        - >-
          California AB 316 forecloses the largest US freight market; federal rule timeline is uncertain; any adverse
          regulatory event in Texas could halt operations on the only viable commercial corridor
        - >-
          Tilts anti-thesis: regulatory exposure is high because 100% of Waabi's commercial operations are in a single
          permissive state with no backup corridor
      - - Driverless Commercial Launch
        - >-
          January 2026 guidance implies Q3 2026 driverless launch; $1B capital provides runway; Volvo VNL Autonomous
          platform is validated technology
        - >-
          Q4 2025 launch missed; multiple prior AV companies have missed driverless milestones repeatedly; Aurora
          succeeded but took 9 years from founding; Waabi is only 5 years old
        - >-
          Tilts anti-thesis: track record of the sector suggests driverless milestones are consistently delayed; the
          burden of proof is on Waabi to deliver, not on sceptics to disprove
