companyProfile:
  summary: >-
    Waabi is a Toronto-based autonomous driving company founded in 2021 by Raquel Urtasun,
    former Chief Scientist at Uber ATG and Professor at the University of Toronto. The company
    has pioneered a Physical AI Platform — a generalizable end-to-end AI model called the
    Waabi Driver — that powers both autonomous Class-8 trucks and, since January 2026, robotaxis
    exclusively on the Uber platform through its revolutionary Waabi World neural simulator.
    In January 2026, Waabi closed a $750M Series C (plus $250M milestone-based from Uber)
    for a total of approximately $1B, representing the largest fundraise in Canadian startup
    history. Commercial autonomous freight pilots have been running on the Dallas-Houston
    corridor since 2023. A fully driverless truck launch, initially planned for end-2025,
    has been delayed to "the next few quarters" pending Volvo truck validation.
