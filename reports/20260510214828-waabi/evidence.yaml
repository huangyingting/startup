evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: financials
    missingEvidence: >-
      Waabi has not disclosed revenue, per-mile unit economics, burn rate, or runway. No public financial statements
      exist for this private company.
    whyItMatters: >-
      Unit economics are essential for assessing commercialization viability and the milestone structure of the $250M
      Uber investment. Without revenue or cost data, financial valuation is speculative.
    diligencePath: >-
      Request audited financials, per-deployment economics, and the full Uber milestone schedule under NDA from the
      management team.
    relatedQuestionRefs:
      - QO018
      - QO019
  - type: private-evidence-only
    severity: material
    topic: commercial-operations
    missingEvidence: >-
      Number of trucks deployed, freight volume carried, miles driven autonomously, and safety incident record from
      Texas pilots are not publicly disclosed.
    whyItMatters: >-
      Without operational performance data, it is impossible to independently verify technology readiness claims or
      benchmark safety record against regulatory thresholds.
    diligencePath: >-
      Request operational data room including miles driven, disengagement rates, incident log, and shipper references
      from Texas pilot operations.
    relatedQuestionRefs:
      - QO013
      - QO019
  - type: private-evidence-only
    severity: blocking
    topic: partnership
    missingEvidence: >-
      The full terms of the Uber robotaxi exclusivity agreement — including milestone definitions, termination triggers,
      and penalty provisions — are not publicly available.
    whyItMatters: >-
      Uber is simultaneously Waabi's largest investor, its sole robotaxi distribution channel, and a milestone-gated
      capital provider. Channel concentration at this level creates existential risk if terms are unfavorable or
      milestones are missed.
    diligencePath: >-
      Obtain full Uber partnership agreement, milestone schedule, exclusivity scope, and termination provisions under
      NDA. Legal review of change-of-control provisions is essential.
    relatedQuestionRefs:
      - QO017
      - QO018
  - type: private-evidence-only
    severity: material
    topic: leadership
    missingEvidence: >-
      Waabi's full senior leadership team beyond CEO and COO is not publicly disclosed — no public naming of CTO, VP
      Engineering, VP Product, General Counsel, or CFO equivalent.
    whyItMatters: >-
      Leadership depth below the C-suite is a key execution risk factor; the leadership-and-founder-table covers only 2
      of an estimated 10+ senior leaders, understating key-person concentration.
    diligencePath: >-
      Request full organizational chart and senior leadership bios from management under NDA; LinkedIn headcount
      analysis can supplement prior to formal disclosure.
    relatedTableRefs:
      - TO002
    relatedQuestionRefs:
      - QO009
      - QO020
  - type: private-evidence-only
    severity: minor
    topic: investors
    missingEvidence: >-
      Investors from Series A and Series B that did not re-invest in Series C (e.g., OMERS Ventures, Georgian) are not
      confirmed in public Series C disclosures and are excluded from the stakeholder-or-investor-map.
    whyItMatters: >-
      Full investor roster and cap table are needed to understand liquidation preference stack, total dilution, and
      whether earlier investors are aligned with the current growth plan.
    diligencePath: >-
      Obtain full cap table and investor rights agreement under NDA; confirm whether any investors have secondary
      liquidity or preference ratchets.
    relatedTableRefs:
      - TO003
    relatedQuestionRefs:
      - QO017
  - type: no-public-source
    severity: minor
    topic: milestones
    missingEvidence: >-
      Internal R&D milestones, safety validation gate results, specific Volvo production timeline commitments, and Uber
      robotaxi launch city/OEM details are not publicly disclosed and are excluded from the milestone-table.
    whyItMatters: >-
      The milestone table represents the public record only; internal milestone completions and upcoming operational
      milestones may be more informative for commercial-readiness assessment.
    diligencePath: Request internal R&D roadmap, Volvo production milestone schedule, and Uber robotaxi launch timeline under NDA.
    relatedTableRefs:
      - TO004
    relatedQuestionRefs:
      - QO013
      - QO024
  - type: missing-source
    severity: material
    topic: market-sizing
    missingEvidence: >-
      No public SAM or SOM data specific to Waabi's current or planned route geography is available. Waabi has not
      disclosed addressable market sizing for the Dallas-to-Houston corridor or any planned expansion corridors, making
      independent bottom-up sizing of near-term revenue potential infeasible from public sources.
    whyItMatters: >-
      Without route-level SAM/SOM data, investors cannot independently validate Waabi's revenue ramp assumptions or
      assess the adequacy of the $1B raise relative to its addressable market scope and capital requirements to reach
      commercial scale.
    diligencePath: >-
      Request management's internal SAM/SOM model under NDA, including route-level freight volume data, estimated market
      share assumptions, and ramp timeline to commercial scale.
    relatedQuestionRefs:
      - QM003
      - QM005
  - type: conflicting-data
    severity: material
    topic: market-sizing
    missingEvidence: >-
      Published autonomous trucking market size estimates from Mordor Intelligence, Fleet Rabbit, Fortune Business
      Insights, and Grand View Research differ by an order of magnitude for similar time horizons, reflecting unresolved
      scope and methodology inconsistencies that prevent reliable TAM triangulation from public analyst data alone.
    whyItMatters: >-
      Wide estimate variation undermines confidence in any single market size figure used in investment thesis
      construction. The $2.7B to $74B range for 2026-2031 is too wide to support precise opportunity sizing without
      independent validation of scope assumptions.
