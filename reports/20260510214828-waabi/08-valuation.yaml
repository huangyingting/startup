  - id: comparable-analysis
    title: Comparable Company Analysis
    body: |
      Comparable analysis for Waabi is constrained by the scarcity of directly comparable public
      companies and the opacity of private market peers. Four comparables are analysed: Aurora
      Innovation (public, NASDAQ: AUR), Waymo (private, Alphabet subsidiary), Kodiak Robotics
      (private), and Gatik (private). Each is imperfect; only Aurora is a direct comparable across
      technology approach, target market, and commercial stage.

      **Aurora Innovation (AUR).** Aurora is the most instructive comparable. Aurora is publicly
      traded, has disclosed detailed financial results through Q1 2026, and operates on the same
      Dallas–Houston corridor as Waabi. Aurora's market cap has ranged approximately $5–7B in 2026,
      with a mid-period reference of approximately $6B. Aurora has raised $3.46B in total and holds
      $1.6B in cash funded through at least H2 2027. Aurora generated $1M in Q3 2025 revenue — its
      first commercial revenue — from driverless trucking operations with FedEx, Werner Enterprises,
      and Schneider National as paying customers. Aurora has 250,000+ commercially driverless miles.
      Applying Aurora's capital-raised multiple (~1.7x) to Waabi's $1.28B raised yields a $2.2B
      implied valuation. The current $3B estimate therefore embeds a modest premium to Aurora's
      capital-efficiency multiple, justified by Waabi's lower headcount and claimed simulation
      advantage.

      **Waymo (Private).** Waymo's estimated valuation of $45B reflects its dominant robotaxi
      position with revenue-generating operations in San Francisco, Los Angeles, and Phoenix, plus
      Alphabet backing. Waymo is not a trucking comparable and has exited the Class 8 market.
      However, the robotaxi portion of Waabi's announced expansion — via the Uber partnership —
      makes Waymo partially relevant. Waymo's $45B valuation on actual robotaxi revenue provides an
      upper-bound reference for robotaxi optionality value; Waabi's robotaxi programme has no
      disclosed revenue, no launch city, and no vehicle count.

      **Kodiak Robotics (Private).** Kodiak has raised $448M in total with a valuation estimated
      in the $500M–$1B range by third-party analysts. Kodiak operates driverless in the Permian
      Basin with JB Hunt and US Army contracts. Kodiak's DaaS subscription model is comparable to
      Waabi's intended commercial structure. At an estimated $750M midpoint, Kodiak represents the
      lower bound of the AV trucking valuation range for companies with commercial driverless
      operations underway.

      **Gatik (Private).** Gatik has $600M in contracted revenue from its middle-mile autonomous
      delivery network and achieved fully driverless commercial scale in January 2026. Gatik's
      valuation is not publicly disclosed; analyst estimates range from $800M–$1.5B. Gatik's
      comparison is limited by its middle-mile focus — the trucking configuration, route type,
      and vehicle class differ from Waabi's long-haul Class 8 target.

      **Comparative Assessment.** Waabi's $3B estimated valuation is 0.5x Aurora's comparable
      public market cap ($6B), reflecting the private discount appropriate for pre-commercial
      status and illiquidity. Waabi commands a significant premium to Kodiak and Gatik, reflecting
      the incremental value of the Uber robotaxi distribution exclusivity and the breadth of the
      Physical AI platform vision. The premium is defensible if driverless commercial operations
      commence in 2026; it becomes increasingly difficult to justify with each quarter of delay.
