chapter:
  number: 8
  title: Valuation
  summary: >-
    Waabi's post-Series C implied valuation is estimated at approximately $3 billion by third-party
    analysts, based on the January 2026 fundraise of $750M in equity plus a $250M milestone-based
    investment from Uber, for a total round of approximately $1 billion. With cumulative capital
    raised of approximately $1.28 billion, this implies a capital-raised multiple of approximately
    2.3x — slightly higher than Aurora Innovation's comparable ~1.7x (Aurora: ~$6B market cap on
    $3.46B raised). Waabi generates no publicly disclosed revenue and has zero commercially
    driverless miles as of May 2026, making traditional earnings or revenue multiples inapplicable.
    Valuation is therefore driven entirely by optionality: the Physical AI platform's scalability
    across trucking and robotaxi markets, the exclusive Uber distribution channel for robotaxi,
    Raquel Urtasun's world-class AI research leadership, and the long-haul autonomous trucking TAM
    growing from $2.7B (2024) to $42.6B (2034) at a 32% CAGR. Against this, the entry price is
    stretched: at $3B with zero commercial driverless operations, Waabi is priced above its
    commercial milestone delivery curve. Aurora trades at ~$6B with actual driverless operations,
    customer revenue, and $1.6B in disclosed cash. The bull case — 10% market share of the 2034
    $42.6B TAM yielding $4B+ revenue at 5–8x → $20–32B valuation — requires flawless execution
    through driverless commercial launch, robotaxi entry, and scaling to hundreds of trucks without
    a funding gap. The base case yields $1–2.5B valuation by 2030 at $300–500M revenue, roughly
    current entry price. The bear case — further delays, competitor capture, funding pressure —
    implies significant impairment. Recommendation: TRACK. The current $3B valuation is not
    actionable at today's terms; the driverless commercial milestone is the investable trigger.

sections:
  - id: current-valuation
    title: Post-Series C Valuation Context and Methodology
    body: |
      Waabi's post-Series C implied valuation is estimated at approximately $3 billion by
      third-party analysts and financial data providers including Crunchbase and CB Insights.
      Waabi has not publicly confirmed this figure; the company has declined to disclose its
      post-money valuation, consistent with standard private market practice. The estimate derives
      from the January 28, 2026 Series C announcement: $750M in equity financing co-led by Khosla
      Ventures and G2 Venture Partners, plus a $250M milestone-based investment from Uber tied to
      robotaxi deployment milestones — totalling approximately $1 billion in new capital across the
      round. Applied dilution assumptions of 25–30% equity sold in the Series C yield a post-money
      range of approximately $2.5B–$4.0B, with $3B as the midpoint estimate.

      **Methodology and Limitations.** Waabi is a pre-revenue private company with no publicly
      disclosed financial statements, cap table, or preference stack. Traditional valuation
      methodologies — discounted cash flow, earnings multiples, revenue multiples — cannot be
      applied directly without fundamental financial data. The three methodologies available to an
      external analyst are: (1) capital-raised multiple benchmarking against public comparables;
      (2) market-comparable analysis using Aurora Innovation's public market cap; and (3) scenario-
      based scenario analysis keyed to TAM capture and commercialization assumptions.

      **Capital-Raised Multiple.** Waabi's $3B estimated valuation against $1.28B total raised
      implies a capital-raised multiple of approximately 2.3x. This compares to Aurora Innovation's
      approximately 1.7x (market cap ~$6B against $3.46B raised). Waabi's higher capital multiple
      reflects the market's expectation that Waabi's capital-efficient posture — approximately 200
      employees versus Aurora's approximately 1,600 — provides more equity upside per dollar
      deployed. The validity of this premium depends entirely on Waabi delivering commercially
      driverless operations before its next equity raise.

      **Entry Price Assessment.** At $3B with zero commercial driverless miles and no disclosed
      revenue, Waabi is priced for optionality rather than demonstrated commercial progress.
      The entry price is assessed as STRETCHED relative to Aurora's public benchmark. Aurora
      holds $1.6B in cash, has 250,000+ commercially driverless miles, and has disclosed Q3 2025
      revenue of $1M — all ahead of Waabi — yet trades at approximately $6B. A new entrant would
      be paying $3B for a company 3+ years behind its primary comparable on every commercial
      metric. The premium is justified only if Waabi's simulation-first approach and Physical AI
      platform deliver substantially faster scaling once commercial operations begin — a thesis
      that cannot be validated from public information as of May 2026.
