  - id: recommendation
    title: Investment Recommendation and Confidence Assessment
    body: |
      **Recommendation: TRACK.** Waabi is not actionable at current terms ($3B implied valuation
      with zero commercial driverless miles and no disclosed revenue). The investment thesis is
      structurally sound — world-class AI leadership, differentiated simulation platform,
      massive TAM, exclusive Uber robotaxi distribution — but the entry price embeds future
      execution milestones that have not yet been delivered. The risk-adjusted expected value of
      entering at $3B today is approximately at-market (EV ~$2.1B discounted, versus $3B entry),
      with asymmetric downside in the bear case.

      **Investable Trigger.** The correct investment trigger is driverless commercial launch with
      at least 30 trucks in revenue-generating operation, disclosed DaaS revenue metrics, and
      evidence of Aurora-comparable carrier customer diversification. At that point — likely in a
      Series D or structured secondary transaction — the risk profile is materially lower and the
      valuation may be higher but the probability-weighted return is better.

      **Confidence: MEDIUM.** The valuation methodology is constrained by the complete absence of
      financial disclosure from Waabi. The $3B estimate is a third-party inference, not a
      confirmed number. Aurora's public market cap is highly volatile; a significant movement in
      Aurora's market cap would directly shift the comparable-based valuation anchor.

      **Risk Rating: HIGH.** Pre-revenue, pre-driverless, single-channel, key-person concentrated,
      with a 35% bear-case probability of significant impairment. The risk rating is elevated
      relative to typical late-stage venture investing by the binary nature of the driverless
      commercial milestone and the demonstrated sector failure pattern (TuSimple, Embark, Ike,
      Waymo trucking).

      **Valuation Stance: STRETCHED.** At $3B with zero commercially driverless miles, Waabi is
      priced above its demonstrated commercial progress curve. The premium is paid for optionality
      in the Physical AI platform, the Uber robotaxi exclusivity, and the simulation-first scaling
      hypothesis — none of which have been commercially validated. The stance would shift to FAIR
      VALUE upon driverless launch with 50+ trucks and first commercial revenue.

      **Target Return (if invested at current terms).** For a 3x return on a $3B entry by 2030,
      Waabi would need to reach approximately $9B valuation — roughly 1.5x Aurora's current
      comparable market cap with no commercial revenue. This requires a bull-case execution path.
      For a 5x return by 2032, Waabi would need to reach $15B, implying $2–3B in annualised
      revenue and market leadership in at least one vertical. Both scenarios are achievable only
      in the bull case.

      **Hold Period.** Minimum 5–7 years for liquidity, given the pre-IPO stage, the commercial
      milestone dependency, and the AV trucking sector's historically long development-to-revenue
      timelines. No near-term IPO catalyst has been announced as of May 2026.
