  - id: scenario-analysis
    title: Bull, Base, and Bear Scenario Analysis
    body: |
      Waabi's valuation trajectory is driven by three scenario-defining variables: the timing of
      driverless commercial launch, the rate of fleet and revenue scaling, and the robotaxi
      timeline. Each scenario yields materially different valuation outcomes over a 4–6 year
      horizon.

      **Bull Case (probability: ~15–20%).** Waabi achieves driverless commercial operations in
      Q3 2026 as implied by the January 2026 guidance of "next few quarters." The company scales
      to 500+ driverless trucks by end-2027 on the Dallas–Houston corridor and expands to I-10 and
      I-40 corridors by 2028. The Uber robotaxi partnership launches commercially in 2027 in one or
      more US cities with the Uber app as sole distribution channel. The $250M Uber milestone tranche
      is released in full by end-2027. Revenue scales from $50M (2026) to $500M (2028) to $2–4B
      by 2031–2032 via DaaS + robotaxi share. If Waabi captures 10% of the $42.6B 2034 long-haul AV
      TAM and a fraction of the robotaxi market, revenues could reach $4B+ by 2030–2032. At 5–8x
      revenue, implied valuation reaches $20–32B. The bull case requires no major safety incidents,
      no disqualifying regulatory change in Texas, and sustained Uber partnership commitment.

      **Base Case (probability: ~45–50%).** Waabi achieves driverless commercial operations in
      Q4 2026 or Q1 2027, six to nine months behind the January 2026 guidance. Fleet scales to
      200–300 trucks by end-2028 on a limited corridor network. The Uber robotaxi partnership
      launches commercially in 2028 or later. Revenue reaches $150–300M by 2029 and $300–500M by
      2030. The $250M Uber milestone tranche is partially released. Implied valuation at 3–5x
      revenue reaches $1–2.5B by 2030 — roughly at or near today's entry price. The base case
      implies limited IRR for investors entering at $3B today. The return only becomes attractive
      if the robotaxi piece scales faster than the trucking piece or if an acquirer offers a
      strategic premium.

      **Bear Case (probability: ~30–35%).** Waabi's driverless launch is delayed beyond Q2 2027.
      Aurora cements its operational lead, signing all major US carrier customers before Waabi's
      launch. The Uber milestone tranche is deferred or renegotiated. Waabi's runway is insufficient
      for the extended development phase; a down-round or distressed financing occurs. Revenue in
      2030 remains below $100M. Implied valuation at bear-case multiples reaches $0.5–2.0B — a
      significant impairment from the $3B entry. The bear case is most likely if Waabi fails to
      launch driverless trucks in 2026 and continues to miss quarterly guidance milestones.

      **Probability-Weighted Expected Value.** At rough scenario probabilities of 15% bull,
      50% base, 35% bear, and midpoints of $26B bull, $1.75B base, $1.25B bear:
      EV ≈ (0.15 × 26) + (0.50 × 1.75) + (0.35 × 1.25) = 3.9 + 0.875 + 0.4375 ≈ $5.2B
      weighted to 2030. Discounting back at 25% venture discount rate over four years yields a
      present value of approximately $2.1B — approximately in line with the current $3B entry
      price, but with very high variance and downside skew.
