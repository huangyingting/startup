  - id: market-drivers
    title: "Market Drivers: Why Autonomous Trucking Grows"
    body: |
      Autonomous trucking is propelled by four primary structural growth drivers: a chronic driver
      shortage, a compelling safety case, superior unit economics, and improving technology maturity.

      The driver shortage is the most immediate catalyst. American Trucking Associations data indicates
      the shortage is projected to reach 160,000 by 2028, driven by retirements, high attrition due to
      demanding working conditions, and insufficient recruitment of younger drivers. This shortage
      directly constrains freight capacity and inflates wages, creating a strong economic incentive for
      carriers to explore autonomous alternatives regardless of regulatory enthusiasm.

      The safety case is quantitatively compelling: FMCSA data shows that approximately 87% of large
      truck crashes involve human error as a contributing factor, and NHTSA reported over 5,000 lives
      lost in large truck crashes in 2019 alone. Autonomous systems that eliminate driver fatigue,
      distraction, and impairment as risk factors represent a clear safety improvement pathway, which
      also provides regulatory and liability tailwinds for adoption.

      Unit economics favor adoption at scale. McKinsey analysis indicates fully autonomous long-haul
      trucks could reduce per-mile operating costs by 25-30%, driven primarily by elimination of driver
      wages and improved fuel efficiency through optimized driving profiles. Additionally, removing
      hours-of-service restrictions for driverless trucks could increase effective vehicle utilization
      by an estimated 40-60% through 24/7 operations, dramatically improving asset economics for large
      fleets. Approximately 35% of current miles are driven empty (deadhead), representing additional
      optimization potential through better load matching enabled by AV platforms.

      Technology maturity, while not yet uniform, has advanced meaningfully: Aurora's 2025 commercial
      driverless launch in Texas established a proof point that Level 4 autonomous trucking is
      operationally viable on controlled highway routes. Waabi's simulation-first approach to AI
      training is intended to accelerate this maturity curve while maintaining capital efficiency.
