  evidenceGaps:
    - type: missing-source
      severity: material
      topic: market-sizing
      missingEvidence: >-
        No public SAM or SOM data specific to Waabi's current or planned route geography is available.
        Waabi has not disclosed addressable market sizing for the Dallas-to-Houston corridor or any
        planned expansion corridors, making independent bottom-up sizing of near-term revenue potential
        infeasible from public sources.
      whyItMatters: >-
        Without route-level SAM/SOM data, investors cannot independently validate Waabi's revenue ramp
        assumptions or assess the adequacy of the $1B raise relative to its addressable market scope
        and capital requirements to reach commercial scale.
      diligencePath: >-
        Request management's internal SAM/SOM model under NDA, including route-level freight volume
        data, estimated market share assumptions, and ramp timeline to commercial scale.
      relatedQuestionRefs:
        - QM003
        - QM005

    - type: conflicting-data
      severity: material
      topic: market-sizing
      missingEvidence: >-
        Published autonomous trucking market size estimates from Mordor Intelligence, Fleet Rabbit,
        Fortune Business Insights, and Grand View Research differ by an order of magnitude for similar
        time horizons, reflecting unresolved scope and methodology inconsistencies that prevent reliable
        TAM triangulation from public analyst data alone.
      whyItMatters: >-
        Wide estimate variation undermines confidence in any single market size figure used in investment
        thesis construction. The $2.7B to $74B range for 2026-2031 is too wide to support precise
        opportunity sizing without independent validation of scope assumptions.
      diligencePath: >-
        Commission an independent market sizing study using a consistent Level 4 autonomous Class-8
        truck definition, or engage an industry analyst to normalize existing estimates to a common
        scope before using figures in underwriting models.
      relatedQuestionRefs:
        - QM002
        - QM005

    - type: stale
      severity: minor
      topic: regulatory-framework
      missingEvidence: >-
        The regulatory timeline for federal AV framework finalization by FMCSA and DOT, and the
        legislative status of the AMERICA DRIVES Act, are not publicly confirmed as of May 2026.
        Existing news sources indicate regulatory action is expected in 2026 but provide no confirmed
        schedule or legislative calendar with binding dates.
      whyItMatters: >-
        Federal regulatory clarity is the single largest accelerant for Waabi's market expansion
        beyond permissive Sun Belt states. Delay or failure of federal action would maintain market
        fragmentation and limit near-term SAM growth, affecting the investment return profile materially.
      diligencePath: >-
        Monitor FMCSA, NHTSA, and DOT public comment periods and rulemaking notices. Track AMERICA
        DRIVES Act legislative progress through Congressional tracking services and engage regulatory
        counsel familiar with AV policy.
      relatedQuestionRefs:
        - QM017
        - QM020

    - type: private-evidence-only
      severity: material
      topic: robotaxi-market
      missingEvidence: >-
        Waabi's specific robotaxi market entry details announced in January 2026 — including launch
        city, vehicle OEM, fleet size, and operational timeline — are not publicly disclosed.
        Additionally, independent evidence confirming technology synergy between Waabi's truck and
        robotaxi platforms is not available in public sources.
      whyItMatters: >-
        The robotaxi expansion represents a significant portion of the $1B fundraise rationale and a
        strategic bet on dual-market platform leverage. Without detail on the robotaxi go-to-market,
        investors cannot assess whether the dual-market strategy adds or dilutes value versus a
        trucking-only focus during a critical commercialization window.
      diligencePath: >-
        Request Waabi's robotaxi launch plan, Uber exclusivity terms, vehicle OEM identity, and
        internal analysis of technology synergies under NDA. Review Waabi Driver architecture
        documentation to assess platform commonality across form factors.
      relatedQuestionRefs:
        - QM026
        - QM028
