company:
  name: Waabi
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The autonomous trucking market represents a large and rapidly growing opportunity at the
    intersection of a $900B US trucking industry and AI-driven automation. Multiple research
    firms estimate the global autonomous truck market between $42B and $74B by 2031, with
    long-haul Class-8 trucking as the highest-value segment. Key structural drivers include a
    chronic driver shortage projected to reach 160,000 by 2028, an 87% human-error contribution
    to large-truck crashes, and compelling unit economics in fuel efficiency and utilization.
    North America accounts for approximately 38% of global market share, with Texas, Arizona,
    and New Mexico acting as permissive regulatory anchors. Waabi's focus on the Dallas-to-Houston
    highway corridor positions it squarely in the most commercially mature sub-segment. Material
    barriers include immature federal regulation, liability uncertainty, high capital intensity,
    and the California AB 316 ban on driverless heavy-duty trucks, which fragments the addressable
    US market. The competitive landscape is intensifying, with Aurora operating commercially and
    Kodiak, Torc, and Plus competing for fleet partnerships.

sections:
  - id: market-definition
    title: "Market Definition and Boundaries"
    body: |
      Defining the "autonomous trucking market" requires clarity on several dimensions: vehicle class,
      automation level, geographic scope, and use case. For purposes of this analysis, the primary market
      is defined as Level 4 autonomous Class-8 commercial truck operations on US highway routes —
      specifically the long-haul segment exceeding 150 miles, typically dry-van and refrigerated freight
      moving between major distribution hubs on interstate corridors. This corresponds directly to
      Waabi's current commercial focus on the Dallas-to-Houston corridor in Texas.

      Adjacent market segments exist but are treated as distinct: (1) Level 2-3 ADAS-equipped trucks
      with driver assistance features but no driverless capability; (2) medium-duty or regional delivery
      trucks operating on urban routes (Gatik's core segment); (3) robotaxi passenger transport, where
      Waabi is now also a participant but under a separate market dynamic; and (4) port and yard truck
      automation. Research firms including Mordor Intelligence and Fortune Business Insights often
      aggregate these segments in their total addressable market figures, which explains the wide
      variation in published estimates ranging from $2.7 billion to over $74 billion.

      The total US trucking industry generates approximately $900 billion in annual revenue per American
      Trucking Associations data, with long-haul Class-8 operations estimated to represent approximately
      50% of that total. The globally addressable autonomous trucking market as defined by leading
      analysts is $42.63 billion in 2026, growing to $74.23 billion by 2031. Waabi's near-term
      serviceable addressable market is a fraction of this — constrained by its current geographic
      footprint and technology readiness — and is not publicly quantified by the company.

      For competitive benchmarking purposes, the relevant competitive market includes Aurora Innovation,
      Kodiak Robotics, Torc Robotics (Daimler-owned), Plus AI, and Gatik, all operating in overlapping
      segments of the North American autonomous truck market with varying customer bases and technology
      approaches. Clarity on market boundaries is essential for interpreting the wide range of analyst
      estimates and for calibrating Waabi's realistic near-term opportunity.
    claimRefs:
      - CM001
      - CM002
      - CM009
      - CM016
      - CM017
      - CM035
    figureRefs:
      - FM001

  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and Opportunity"
    body: |
      Market sizing for autonomous trucking is complicated by the absence of consensus scope definitions
      across research publishers. The total addressable market (TAM) for global autonomous trucks is most
      commonly cited in the $42-74 billion range by 2031, with Mordor Intelligence as the primary data
      source for the 2026 estimate of $42.63 billion and the 2031 projection of $74.23 billion at an
      11.73% CAGR. Fleet Rabbit takes a more segmented approach, estimating the long-haul-specific
      autonomous trucking market at $2.7 billion in 2024 growing at a 32% CAGR to $42.6 billion by 2034.

      Fortune Business Insights estimates approximately $47 billion by 2030, while Grand View Research
      offers the most conservative projection — around $3.7 billion in 2023 growing to over $20 billion
      by 2030 — reflecting a narrower scope limited to Level 4+ systems only. McKinsey & Company has
      published detailed economic analysis of autonomous trucking unit economics without publishing a
      headline market size figure, focusing instead on the per-mile cost advantage and freight network
      value creation.

      The total US trucking industry, at approximately $900 billion in annual revenue per American
      Trucking Associations data, provides the outer boundary of the opportunity. Long-haul Class-8
      operations are estimated to represent roughly half of that total, or approximately $450 billion.
      North America specifically accounts for approximately 38.4% of the global autonomous truck market
      as of 2025. Waabi has not disclosed its specific SAM or SOM targets, making independent bottom-up
      sizing of Waabi's addressable market infeasible from public sources.

      The most credible sizing framework treats the $42-74 billion range as a theoretical global TAM
      for all autonomous trucking, with Waabi's near-term SAM bounded by route approvals in permissive
      US states and its technology readiness for fully driverless operations — likely in the low
      single-digit billions in the 2026-2028 window.
    claimRefs:
