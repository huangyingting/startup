  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: NRR and GRR — No Disclosed Retention Metrics
    missingEvidence: Guild does not disclose Net Revenue Retention, Gross Revenue Retention, or employer renewal rates. The
      Disney and Macy's exits suggest below-average retention but the precise magnitude is unknown.
    whyItMatters: Investors cannot assess the durability of Guild's revenue base without retention metrics; a deteriorating
      NRR compounds the valuation compression risk.
    diligencePath: Request NRR/GRR cohort data for employer clients by vintage year; cross-check against revenue bridges in
      management presentation.
    relatedQuestionRefs:
    - QU015
  - type: private-evidence-only
    severity: moderate
    topic: Contract Length and Renewal Terms
    missingEvidence: Guild does not disclose average employer contract length or renewal terms. Multi-year contracts are mentioned
      qualitatively but not quantified.
    whyItMatters: Short contract periods would increase visibility risk and could mask an erosion in client retention that
      is masked by signed-but-not-renewed ARR.
    diligencePath: Request average remaining contract life and distribution of contract lengths in data room; review sample
      MSA template.
    relatedQuestionRefs:
    - QU016
  - type: private-evidence-only
    severity: moderate
    topic: Employee NPS and Learner Satisfaction Scores
    missingEvidence: No independent survey data on employee satisfaction with Guild's platform is publicly available. Glassdoor
      covers Guild as an employer, not as a platform.
    whyItMatters: Low learner satisfaction would reduce employer ROI and accelerate client churn; without NPS data, the employee
      experience claim is unverifiable.
    diligencePath: Request learner NPS time series; commission third-party user satisfaction survey during diligence.
    relatedQuestionRefs:
    - QU018
  - type: missing-source
    severity: moderate
    topic: Revenue Impact of Disney and Macy's Terminations
    missingEvidence: The specific ARR contribution of Disney and Macy's programs is not publicly disclosed. Estimates must
      be derived from employee headcount and plausible fee assumptions.
    whyItMatters: Without confirmed revenue impact, investors cannot size the hole left by departing clients or assess how
      quickly new clients (Spectrum) can offset losses.
    diligencePath: Request client-level ARR breakdown or at minimum confirmation of Disney/Macy's revenue contribution as
      a % of total ARR.
    relatedQuestionRefs:
    - QU023
  - type: missing-source
    severity: moderate
    topic: Employee Enrollment Conversion Rate by Funnel Stage
    missingEvidence: Guild does not disclose enrollment conversion rates at any funnel stage — from eligible employee to enrolled,
      enrolled to active learner, or active learner to completer. The 4–5% annual completion rate is derived but not confirmed.
    whyItMatters: Low funnel conversion undermines the utilization argument and reduces both employer ROI and Guild's revenue
      per eligible employee.
    diligencePath: Request funnel conversion rates by stage and by employer vertical in management presentation; benchmark
      against InStride and EdAssist disclosed rates.
    relatedQuestionRefs:
    - QU031
  - type: private-evidence-only
    severity: material
    topic: Evidence Freshness for Hilton, Taco Bell, Lowe's, Sherwin-Williams, PNC
    missingEvidence: The Hilton, Taco Bell, Lowe's, Sherwin-Williams, and PNC partnerships have not been updated with outcome
      metrics since initial 2019–2021 announcements. No evidence that these programs have produced quantified results or remain
      materially active.
    whyItMatters: Stale proof for multiple named clients may mask program reductions or low utilization that has not been
      publicly disclosed.
    diligencePath: Request reference calls with HR executives at Hilton, Taco Bell, and Lowe's; request program utilization
      reports for each named client.
    relatedQuestionRefs:
    - QU014
  - type: missing-source
    severity: moderate
    topic: Employer Cohort Retention Data
    missingEvidence: No public cohort-level data exists for employer client retention. The cohort figure is modeled from public
      signals (Disney, Macy's) and enterprise software benchmarks, not disclosed Guild data.
    whyItMatters: Modeling cohort retention without data risks understating or overstating the churn problem; investors need
      actuals to assess the base case.
    diligencePath: Request vintage cohort analysis showing contract renewals, expansions, and terminations by employer class
      year.
    relatedQuestionRefs:
    - QU028
  - type: missing-source
    severity: minor
    topic: Named Customer Proof Table Completeness
    missingEvidence: Guild's full client list of 500+ employers is not publicly disclosed; the named customer proof table
      captures only the ~11 publicly announced partnerships. The remaining 490+ clients are unknown, making it impossible
      to assess whether the named accounts are representative or outliers.
    whyItMatters: If named accounts are atypical outliers, the aggregate retention and utilization picture may differ materially
      from the visible proof set.
    diligencePath: Request full client roster with industry, employee count, tenure, and ARR in data room; verify sample of
      anonymous clients via reference calls.
    relatedQuestionRefs:
    - QU010
    relatedTableRefs:
    - TU003
  - type: private-evidence-only
    severity: moderate
    topic: Employee Enrollment Conversion Rate per Eligible Employee
    missingEvidence: Guild does not disclose the share of eligible employees who actively enroll in education programs. The
      4-5% annual completion rate is derived from total completions vs enrolled, not from eligible employee penetration data.
    whyItMatters: Without enrollment penetration data, investors cannot assess employer ROI or whether Guild is achieving
      utilization thresholds that drive renewal decisions.
    diligencePath: Request enrollment penetration rate by employer vertical and contract year; benchmark against InStride
      and EdAssist typical utilization rates.
    relatedQuestionRefs:
    - QU007
  - type: private-evidence-only
    severity: material
    topic: Top-5 Client ARR Concentration — Not Disclosed
    missingEvidence: Guild does not disclose revenue by client or client ARR concentration. Estimates rely on disclosed employee
      population and plausible fee rate assumptions; actual per-client pricing is not known.
    whyItMatters: High ARR concentration amplifies single-client termination risk and limits negotiating leverage with anchor
      accounts like Walmart.
    diligencePath: Request top-10 client ARR ranking and share of total ARR in management data room; review client contract
      renewal schedules.
    relatedQuestionRefs:
    - QU020
