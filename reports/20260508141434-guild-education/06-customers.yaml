figures:
- id: FU001
  title: Customer Journey Map
  description: 'The Guild employee education journey from initial awareness through program completion and career mobility,
    showing touchpoints for the employer, Guild platform, and employee.

    '
  type: journey-map
  claimRefs:
  - CU004
  - CU017
  - CU018
  - CU019
  data:
    items:
    - label: Employer launches benefit
      detail: HR configures Guild platform with curated program catalog aligned to workforce strategy and company's most in-demand
        roles
    - label: Employee awareness
      detail: Employer communicates benefit via onboarding, email, manager training; Guild sends personalized outreach to
        eligible employees
    - label: Program exploration
      detail: Employee logs into Guild portal; browses 2,000+ programs; filters by career goal, schedule, employer-paid status
    - label: Career coaching session
      detail: 1:1 advisor call to match employee's goals to programs; advisor addresses academic gap concerns and enrollment
        logistics
    - label: Enrollment and direct-bill setup
      detail: Employee enrolls; Guild pays tuition directly to provider — zero out-of-pocket cost to employee; employer funds
        via pre-authorized pool
    - label: Active learning
      detail: Employee attends class (online or hybrid); Guild advisor checks in at key milestones; employer sees utilization
        dashboard
    - label: Credential completion
      detail: Employee earns certificate, associate, or bachelor's degree; Guild records completion and notifies employer
        HR platform
    - label: Career mobility event
      detail: Employee advances internally (promotion, role change) or gains market-rate wage premium; employer reports reduced
        attrition in cohort
    - label: Program renewal / expansion
      detail: Employer reviews ROI report; renews contract, expands headcount covered, or adds Guild Academy / Talent Advantage
        analytics
