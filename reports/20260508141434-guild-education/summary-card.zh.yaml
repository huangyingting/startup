summary:
  headline: >
    Guild Education 搭建了美国最大的雇主赞助学费福利平台，IRS Section 127 的结构性税收补贴托底，500+ 雇主和 150+ 教育机构组成多边网络。2022 年 6 月 Series F 以 $4.4B
    估值融资，反映的是 COVID 时期劳动力短缺和 edtech 热潮推到高点的估值。此后，公司经历两次大规模重组、Disney 和 Macy's 等标志性客户取消，以及未经证实的 Walmart Workforce Edge
    威胁；同时推出 Navigator，试图成为支撑其相对受压公开可比公司享有溢价的增长催化剂。在当前二级市场隐含 EV $1.5-2B 下，投资结论是有条件买入，价格需不高于
    $2.0B：结构性市场仍在，平台已在规模化场景证明效用，但财务不透明、增长放缓（同比约 6%）和 CEO 交接期执行不确定，让没有 data room 访问权的资金无法高置信下注。
