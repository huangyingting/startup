        - Audited financials or management accounts for 2022-2024 with YoY revenue breakdown
        - Revenue growth trajectory; gross margin; burn rate; path to profitability
        - Yes - cannot size position without confirmed financials
      - - P1
        - Employer contract renewal rate (last 24 months) with NPS by employer cohort
        - Confirms post-layoff service quality and validates thesis on switching costs
        - Yes - renewal rate below 80% resets entry price and confidence
      - - P1
        - Walmart contract details including term, renewal date, Workforce Edge provisions
        - Quantifies single largest client concentration risk and competitive exposure
        - Yes - any Workforce Edge carve-out or upcoming renewal risk is a deal condition
      - - P2
        - SOC 2 Type II report and cybersecurity incident history (last 3 years)
        - Validates platform security for enterprise clients; regulatory compliance
        - No - but required before close; absence extends timeline
      - - P2
        - Legal reps and warranties on material litigation, IP ownership, and employment claims
        - Confirms no hidden legal liability from 2023 and 2024 RIF events
        - No - standard closing condition; absence requires legal hold-back
      - - P2
        - Cap table and preference waterfall model reflecting all liquidation preferences
        - Confirms common equity value at exit scenarios; dilution overhang impact
        - No - but required for return modeling; absence limits return accuracy
      - - P3
        - Navigator revenue attribution (employer expansion from Navigator upsell, 2024)
        - Validates bull case assumption on Navigator-driven growth acceleration
        - No - but affects probability weight assigned to bull scenario
      - - P3
        - Nomadic Learning integration milestones and engineering resource plan
        - Confirms integration risk is managed and timeline is realistic
        - No - integration delays are a risk but not a blocker at entry
    notes: >
      P1 items are deal conditions that must be resolved before commitment. P2 items are required before closing but may
      be addressed in parallel with negotiation. P3 items inform scenario probability weights but do not block
      investment commitment at the right entry price.
