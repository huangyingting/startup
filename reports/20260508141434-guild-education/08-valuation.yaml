  - id: TV005
    title: Thesis-break and kill triggers table
    slug: thesis-break-and-kill-triggers-table
    description: Events or data points that would cause thesis re-evaluation or investment abandonment
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
    columns:
      - Trigger Category
      - Specific Thesis-Break Event
      - Monitoring Signal
      - Response
    rows:
      - - Client churn
        - Net employer logo count falls below 450 or Walmart announces exit
        - Monthly press monitoring; Walmart newsroom; Workforce Edge announcements
        - Full position review; reduce or exit
      - - Revenue contraction
        - Revenue growth falls to zero percent or negative YoY (Sacra/Contrary estimates)
        - Quarterly analyst estimate updates; secondary market pricing shifts
        - Re-evaluate entry price; require deeper data room access
      - - Leadership
        - CEO Shah departure within 12 months of investment
        - Press monitoring; LinkedIn; board disclosure
        - Immediate position review; suspend new capital deployment
      - - Financing
        - New external equity raised at below $1.5B implied valuation
        - Press release; SEC Form D filing; secondary market pricing
        - Down-round protection triggers; renegotiate terms
      - - Legislative
        - IRS Section 127 cap reduced below $3,000 by Congress
        - Congress.gov; SHRM legislative alerts; AON benefits advisory
        - Exit or full write-down; market structure destroyed
      - - Product
        - Navigator fails to generate incremental employer revenue growth by Q4 2025
        - Employer expansion rates; Navigator logo counts; analyst commentary
        - Reduce bull probability; revise to bear scenario base
    notes: >
      Trigger events are monitored quarterly. Any single trigger initiates a formal investment committee review within
      30 days. Two simultaneous triggers result in automatic position reduction pending re-evaluation of the thesis.
  - id: TV006
    title: Final diligence asks table
    slug: final-diligence-asks-table
    description: Priority data room requests for Guild due diligence before investment commitment
    claimRefs:
