chapter:
  number: 1
  title: Company Overview
  summary: |
    Guild (legally Guild PBC) is a Denver-based workforce education platform connecting large employers,
    70+ education providers, and 1.4 million employees. Founded in June 2015 by Rachel Romer and Brittany
    Stich, Guild raised ~$584M through a June 2022 Series F at a $4.4B peak valuation. Co-founder Romer
    suffered a severe stroke in August 2023 and stepped down; Bijal Shah became CEO in April 2024. The
    company reported 1.4M platform employees, 60K completions, and $1B+ in tuition savings in 2024, while
    navigating valuation compression (~$1.5–2B secondary implied), two layoff cycles, CEO change, and
    Macy's partnership termination.
sections:
  - id: s1
    title: Company Identity and Business Model
    body: |
      Guild PBC (operating brand: Guild, formerly Guild Education) is a Denver, Colorado-based workforce
      education technology company incorporated as a Delaware Public Benefit Corporation. Guild operates a
      three-sided marketplace connecting large employers, a curated network of 70+ higher education and
      training providers, and front-line and mid-career employees who receive educational benefits at no
      out-of-pocket cost. The company was founded in June 2015 and is headquartered at Republic Plaza,
      Denver, CO.

      Guild's business model generates revenue from two sides. Employers pay Guild a platform subscription
      fee scaled to employee headcount, and Guild earns a share of tuition that flows from employers to
      education providers through its billing infrastructure. Education providers pay Guild a referral or
      revenue-share fee when enrolled employees complete courses or credentials. The net result is that
      employees access degree programs, certificates, and skill credentials for free while Guild captures
      employer-side and provider-side economics simultaneously. IRS Section 127 permits employers to provide
      up to $5,250 per year per employee in tax-free educational assistance, making the benefit cost-effective
      from an employer tax standpoint and structurally embedded in US compensation law.

      Guild targets employers with 10,000 or more employees where platform revenue potential exceeds $1M
      annually. Major employer clients include Walmart (Live Better U), Target, Chipotle, Lowe's, Taco Bell,
      Discover Financial, Hilton, PepsiCo, Tyson Foods, Providence Health, PNC Bank, and JPMorganChase. In
      October 2024, Guild rebranded its platform as Guild Talent Advantage, adding AI-powered talent
      insights, career pathways, and a cohort-based learning product (Guild Academy) built on the acquisition
      of Nomadic Learning. The company serves 500+ employer clients and offers 2,000+ learning programs
      across 100+ fields as of 2025.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
  - id: s2
    title: Founders and Leadership
    body: |
      Guild was co-founded in June 2015 by Rachel Romer (formerly Rachel Romer Carlson) and Brittany Stich.
      Rachel Romer is the granddaughter of former Colorado Governor Roy Romer and came to Guild from an
      education policy background at the Lumina Foundation and related nonprofits. She served as CEO from
      founding and was the primary public face through the company's high-growth period, leading fundraising
      from Bessemer Venture Partners, Oprah Winfrey, and Wellington Management, among others. Under her
      leadership Guild grew from a Denver startup to a $4.4B-valued unicorn by June 2022.

      In August 2023, Rachel Romer suffered a severe stroke that required extended medical leave; she
      ultimately resigned as CEO while remaining on the Board of Directors. Masters of Scale and multiple news
      outlets reported on Bijal Shah's role in stabilizing the company during this period. Shah, who joined
      Guild in 2018 as Chief Experience Officer and had previously held leadership roles at Teach For America
      and other education-adjacent organizations, was formally appointed CEO on April 2, 2024, after serving
      as acting CEO during the transition.

      Shah's leadership has been controversial internally. Glassdoor data captured in October 2024 showed her
      CEO approval rating at approximately 37%, significantly below industry norms. The Higher Education
      Inquirer and Colorado Sun both reported employee complaints about workplace culture, aggressive
      restructuring, discrimination allegations, and poor communication during the back-to-back layoff cycles
      of 2023 and 2024. The Josh Bersin Company and Brandon Hall Group offered more constructive assessments
      of Shah's strategic direction following the October 2024 Guild Talent Advantage analyst day. Guild's
      Board includes representation from major investors including Wellington Management and Bessemer Venture
      Partners, as well as Oprah Winfrey who invested in the Series F round.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO031
  - id: s3
    title: Funding History and Valuation
    body: |
      Guild has raised approximately $584 million in total venture funding since its founding in 2015. The
      company's funding trajectory followed a classic hypergrowth arc: early institutional rounds from
      Bessemer Venture Partners, rapid Series D and E rounds during the 2020–2021 ZIRP and pandemic-era
      EdTech boom, and a final Series F in June 2022 at a $4.4 billion post-money valuation — one of the
      highest valuations ever reached by a Denver-based startup and a high-water mark for the employer-
      sponsored learning market.

      The landmark funding rounds include the Series E ($150M, June 2021, ~$3.75B valuation) led by
      General Atlantic with participation from Bessemer, Salesforce Ventures, and others; and the Series F
      ($175M, June 2022, $4.4B post-money) led by Wellington Management with participation from Oprah
      Winfrey, Bon Secours Mercy Health, Citi Impact Fund, and Bessemer Venture Partners. Inside Higher Ed
      and CNBC reported extensively on each round's valuation milestones.

      No new primary capital has been raised since June 2022 — approximately four years as of the report
      date. The secondary market implied valuation as of 2024 is estimated at $1.5–2B, representing a
      55–65% decline from the $4.4B peak. Sacra estimates Guild's 2023 revenue at ~$261M and 2024 revenue
      at ~$275M, suggesting single-digit percentage growth — well below what would support a return to
      peak valuation multiples. Guild remains private and has disclosed no public information about
      profitability, EBITDA, or cash runway. The absence of new primary funding raises capital adequacy
      questions explored in Chapter 4.
    claimRefs:
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
      - CO026
      - CO027
      - CO028
      - CO032
  - id: s4
    title: Platform Scale and Key Milestones
    body: |
      Guild's platform has scaled considerably since its 2015 founding. As of the 2024 annual impact review
      published in January 2025 via BusinessWire, Guild reported 1.4 million employees engaged on the
      platform; 465,000 new employees who gained platform access in 2024; 60,000 program completions and
      graduations; and more than $1 billion in total tuition savings for learners. The company's network
      spans 70+ education providers and 2,000+ learning programs across 100+ fields, including programs from
      Purdue Global, SNHU, ASU Online, eCornell, University of Florida Online, Spelman College, and NC A&T.

      Key milestones include the June 2015 founding, early Bessemer capital in 2016, the landmark Walmart
      Live Better U partnership (circa 2019), the $4.4B Series F peak in June 2022, Rachel Romer's stroke
      in August 2023, the first major reduction in force in May 2023 (~172 employees, ~12%), the CEO
      transition to Bijal Shah in April 2024, the second and larger layoff in May 2024 (~300 employees,
      ~25%), the Nomadic Learning acquisition and Guild Talent Advantage launch in October 2024, Macy's
      partnership termination in January 2025, and the Spectrum partnership win in April 2025.

      Enrollment in AI-focused programs on the Guild platform grew 1,200% year-over-year in 2024,
      reflecting demand for AI skills transformation among large employers. Approximately 80% of degree and
      certificate learners are enrolled in business-aligned programs, supporting Guild's employer ROI
      narrative. Guild has also expanded internationally with Guild Grow Global offering programs in Canada,
      Mexico, India, and the UK, though international revenue contribution is not publicly disclosed.
    claimRefs:
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
      - CO025
      - CO033
