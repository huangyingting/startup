  claims:
    - id: CO001
      statement: >-
        Guild PBC (Public Benefit Corporation), operating as Guild (formerly Guild Education),
        is a Denver, Colorado-based workforce education technology company founded in June 2015
        and headquartered at Republic Plaza, Denver, CO.
      type: observed
      topic: company-identity
      sourceRefs: [SO001, SO023, SO024]
      confidence: high
      freshness: current

    - id: CO002
      statement: >-
        Guild operates a three-sided marketplace where employers pay platform fees, employees
        access educational programs at zero out-of-pocket cost, and education providers pay
        Guild a revenue-share on enrollments.
      type: observed
      topic: business-model
      sourceRefs: [SO003, SO007]
      confidence: high
      freshness: current

    - id: CO003
      statement: >-
        IRS Section 127 permits employers to provide up to $5,250 per year per employee in
        tax-free educational assistance, structurally embedding Guild's benefit model in US
        compensation law.
      type: observed
      topic: business-model
      sourceRefs: [SO019, SO007]
      confidence: high
      freshness: current

    - id: CO004
      statement: >-
        Guild targets employers with 10,000 or more employees where platform revenue potential
        exceeds $1 million annually, with major clients including Walmart, Target, Chipotle,
        Lowe's, Hilton, PepsiCo, and JPMorganChase.
      type: company-claimed
