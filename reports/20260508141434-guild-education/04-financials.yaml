  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: "Audited financial statements (revenue, EBITDA, gross margin, cash balance)"
      missingEvidence: "Guild GAAP revenue by segment, gross margin by revenue type, EBITDA, and cash/burn as of Q1 2026"
      whyItMatters: "All quantitative financial claims are analyst estimates; material misstatement risk exists; investment decisions cannot be made on estimated data alone"
      diligencePath: "Request audited financials under NDA; if no audit, request management accounts with board-reviewed accuracy certification; review revenue recognition policy (ASC 606)"
      relatedTableRefs: [TI001, TI003, TI004]
      relatedQuestionRefs: [QI013, QI025]

    - type: missing-source
      severity: blocking
      topic: "Capital adequacy (cash balance, burn rate, runway)"
      missingEvidence: "Current cash and equivalents, monthly EBITDA burn rate, undrawn credit facilities, and projected runway to profitability"
      whyItMatters: "47 months since last equity raise; without cash balance and burn rate, capital adequacy risk cannot be assessed quantitatively"
      diligencePath: "Request treasury report and 12-month cash flow projection; ask for board deck cash slide; confirm any undisclosed venture debt or receivables financing"
      relatedTableRefs: [TI004]
      relatedQuestionRefs: [QI015, QI020]

    - type: conflicting-data
      severity: material
      topic: "Employer churn rate and revenue retention"
      missingEvidence: "Gross and net revenue retention by cohort; list of churned employers and revenue impact (FY2022–FY2025)"
      whyItMatters: "Macy's and Disney departures confirm churn exists; aggregate rate unknown; 6% revenue growth could mask high gross churn offset by upsell at retained clients"
      diligencePath: "Request GRR/NRR by cohort under NDA; request churned employer list with revenue; calculate implied churn from disclosed metrics"
      relatedTableRefs: [TI004, TI005]
      relatedQuestionRefs: [QI016, QI027]

    - type: missing-source
      severity: material
      topic: "Unit economics bridge"
      missingEvidence: "Confirmed cost of revenue breakdown (education provider payments, career coaching, platform engineering); S&M spend; R&D investment"
      whyItMatters: "Gross margin and EBITDA estimates carry high uncertainty; actual unit economics determine whether the business is structurally sound at current scale"
