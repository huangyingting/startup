  claims:
    - id: CI001
      statement: >-
        Guild Education's estimated FY2024 revenue is approximately $275M, based on Sacra analyst
        estimates corroborated by Latka's $261M FY2023 ARR estimate, implying approximately 6%
        year-over-year revenue growth in FY2024.
      type: estimated
      topic: revenue
      sourceRefs: [SI001, SI002]
      confidence: medium
      freshness: current

    - id: CI002
      statement: >-
        Guild's revenue growth decelerated from approximately 70%+ CAGR in the 2020–2022 ZIRP
        era to approximately 6% YoY growth in FY2023–FY2024, reflecting the softening labor
        market and employer headcount reductions that reduced billable activity per contract.
      type: inferred
      topic: revenue-growth
      sourceRefs: [SI001, SI003]
      confidence: medium
      freshness: current

    - id: CI003
      statement: >-
        Guild operates a dual-sided revenue model: employer platform subscription fees (estimated
        60–70% of revenue) and education provider revenue-share on tuition processed through the
        Guild platform (estimated 20–30% of revenue).
      type: inferred
      topic: revenue-model
      sourceRefs: [SI006, SI007]
      confidence: medium
      freshness: current

    - id: CI004
      statement: >-
        Guild is expanding its revenue streams beyond the core employer-sponsored education platform
        through three new initiatives: Guild Grow Global (international markets), Guild Academy
        (cohort-based corporate learning via Nomadic Learning acquisition), and Guild Talent
        Advantage (AI analytics premium tier).
      type: company-claimed
      topic: revenue-model
      sourceRefs: [SI014, SI015]
      confidence: high
      freshness: current

    - id: CI005
      statement: >-
        Sacra's arithmetic calculation implies average revenue per employer client of approximately
        $550,000/year ($275M total revenue / ~500 employer clients); this average likely masks
        significant concentration in large clients (Walmart, Target, Chipotle, Hilton).
      type: estimated
      topic: unit-economics
      sourceRefs: [SI001, SI006]
      confidence: medium
      freshness: current

    - id: CI006
      statement: >-
        Guild's gross margin profile is estimated at 50–70% for the platform subscription component
        and 20–40% for the education provider revenue-share component, yielding a blended gross
        margin likely in the 40–60% range; no public data is available to confirm this estimate.
      type: estimated
      topic: unit-economics
      sourceRefs: [SI007]
      confidence: low
      freshness: current

    - id: CI007
      statement: >-
        Guild underwent two rounds of significant layoffs — an estimated 300 employees in 2022
