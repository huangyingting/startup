  - id: TI004
    title: Capital adequacy table
    columns:
      - Dimension
      - Data Point
      - Source
      - Risk Implication
    rows:
      - - Total equity raised
        - ~$584M across 7 rounds (2015–June 2022)
        - Crunchbase; SEC Form D filings
        - Large historic capital base; no new external capital in 36+ months as of May 2026
      - - Last funding round
        - $264M Series F at $4.4B valuation (June 2022)
        - Crunchbase; press releases; SEC Form D
        - Peak valuation; no primary raise since; significant valuation compression implied by secondary signals
      - - Implied current valuation (secondary)
        - ~$1.5–2B (2024–2025 secondary signals)
        - Sacra; analyst reports; secondary market data
        - ~55–65% below Series F valuation; down-round risk if new primary capital needed
      - - Estimated annual EBITDA burn
        - ~$30–$50M/year (estimate)
        - Analyst estimate based on revenue, headcount, and cost structure; not confirmed
        - If burn is $40M/year and Series F raised $264M in June 2022, runway from Series F alone is ~6.6 years (to ~Dec 2028)
      - - Profitability status
        - Not publicly profitable; no profitability announcement
        - Absence of press releases; continued layoffs as cost reduction signal
        - EBITDA-negative status limits strategic optionality; risk of forced financing at distressed terms
      - - Debt / non-equity financing
        - Not publicly disclosed; no confirmed venture debt
        - Public records; no debt facility announcement
        - Possible undisclosed debt facility; diligence should confirm capital structure completeness
      - - Series G or exit path
        - No public signals of active fundraise or M&A process
        - No press release; no Bloomberg/Reuters M&A report
        - Absence of signal is not confirmation of absence; fundraise or acquisition process may be quiet
    notes: >-
      Capital adequacy assessment is based on publicly available information; actual cash balance,
      burn rate, and remaining runway are private company information and must be confirmed under
      NDA. The burn rate estimate is arithmetic and carries high uncertainty; actual burn may be
      materially higher or lower depending on cost structure post-layoffs.
