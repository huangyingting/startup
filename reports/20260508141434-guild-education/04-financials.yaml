      - CI010
      - CI011
      - CI012
      - CI019

  - id: TI005
    title: Public financial gaps table
    columns:
      - Information Gap
      - Why It Matters
      - Diligence Path
      - Urgency
    rows:
      - - Audited revenue and EBITDA (FY2022–FY2025)
        - All revenue figures are analyst estimates; material misstatement risk
        - Request audited financials under NDA; review GAAP revenue recognition policies
        - Critical
      - - Gross margin by revenue segment
        - Platform vs. provider revenue-share margins differ materially; blended margin masks business quality
        - Request segment P&L with direct cost allocation; understand provider payment pass-through treatment
        - Critical
      - - Cash balance and monthly burn rate as of Q1 2026
        - Core capital adequacy question; ~36 months since last raise creates runway concern
        - Request treasury report; review board deck cash projections; confirm any undrawn credit facilities
        - Critical
      - - Employer voluntary churn rate (FY2023–FY2025)
        - Macy's/Disney departures suggest churn exists; rate needed to assess moat durability
        - Request gross and net revenue retention by cohort; request list of churned employers and revenue impact
        - Critical
      - - Walmart Live Better U contract status
        - Potential loss of largest client; revenue concentration and reference risk
        - Request Guild sales leadership confirmation; review Walmart annual report for benefit program disclosures
        - Critical
      - - Provider revenue-share rates and exclusivity terms
        - Core unit economics driver; rate negotiation risk affects margin trajectory
        - Request sample provider agreements; assess whether rates are declining as providers gain bargaining power
        - Material
      - - Guild Academy and Guild Talent Advantage revenue contribution (FY2024)
        - New business lines launched October 2024; revenue ramp timing affects growth narrative
        - Request segment revenue breakdown; ask for bookings data and ARR by business line
        - Material
      - - Headcount breakdown by function (engineering, sales, coaching, operations)
        - Cost structure post-layoffs; sales productivity and coaching cost per completion needed
        - Request organizational headcount breakdown with cost allocation; verify coaching cost per learner
        - Material
    notes: >-
      All gaps in this table represent material information asymmetries for a prospective investor
      or acquirer; this table should be used to build the financial diligence request list (DRL)
      for the formal Phase 2 diligence process.
