  - id: TI002
    title: Pricing / monetization table
    columns:
      - Pricing Dimension
      - Current Approach
      - Benchmarks
      - Moat / Risk
    rows:
      - - Employer platform fee (per-contract)
        - Multi-year enterprise subscription; fee scales with enrolled workforce size and program scope
        - "Sacra: ~$550K average revenue per employer; $1M+ for large accounts"
        - "Moat: multi-year lock-in + HRIS integration; risk: budget cuts force renegotiation"
      - - Education provider revenue-share rate
        - Revenue-share on tuition processed through platform; exact rate not publicly disclosed
        - Industry comparables suggest 5–15% revenue-share on tuition for marketplace platforms
        - "Moat: exclusive or preferred provider agreements (unconfirmed); risk: providers negotiate lower rates"
      - - IRS Section 127 cap ($5,250/year)
        - Employer tax-free education benefit cap limits per-employee revenue intensity
        - $5,250 cap unchanged since 1986; only temporary extensions have raised it to $5,250 ERC level
        - "Structural constraint: no per-employee revenue can exceed employer's Section 127 budget"
      - - Guild Academy pricing
        - Cohort-based learning program fee; similar to executive education or corporate academy pricing
        - "Executive education cohort programs: $500–$5,000 per participant per program"
        - New business line; pricing model not confirmed; cross-sell to existing employer clients
      - - Guild Talent Advantage premium tier
        - Analytics subscription add-on; premium pricing not publicly confirmed
        - "Comparable analytics platforms (Visier, Eightfold): $50K–$500K/year enterprise analytics"
        - "Strategic upside: data moat monetization; risk: low employer willingness-to-pay initially"
    notes: >-
      All pricing benchmarks except the IRS Section 127 cap are estimates; Sacra revenue-per-employer
      estimate is an arithmetic calculation (total estimated revenue / employer count) and may not
      reflect actual contracted prices, which vary substantially by client size.
    claimRefs:
      - CI001
      - CI002
      - CI005
      - CI006
      - CI018

