      - number: '7.2'
        title: 监管与立法风险
        blocks:
          - type: paragraph
            body: >
              对 IRS Section 127 的结构性依赖，是 Guild 最关键的监管风险。该条款允许员工每年获得最高 $5,250 的雇主付费免税教育福利，自 2001 年以来为 Guild
              的整个市场提供稳定的立法基础。虽然上限没有被下调或取消，但国会若提出重构该福利或引入资产审查，可能会实质性压缩 Guild 整个雇主客户基础的需求。Mercer 和 AON 的分析确认，该条款支撑了约 $26B
              的年度雇主教育支出，其中只有一部分流向 Guild 这类托管平台。除 Section 127 外，Guild 还必须处理若干结构化福利计划安排下的 DOL ERISA 合规、与合作大学数据流相关的 FERPA
              隐私义务，以及包括 CCPA 和州级等效法规在内、不断演进的州数据隐私拼图。州层面的教育项目许可要求也可能因项目类型和交付形式而适用，不过 Guild 很大程度依赖合作大学维持适用的州批准。截至研究日期，通过
              SEC Form D 检索和新闻记录，未发现针对 Guild 的重大诉讼或监管执法行动；但没有披露不等于法律健康证明，仍需正式数据室审查来确认没有重大风险暴露。基于可得公开记录，2023 和 2024
              年裁员事件引发的劳动法风险，截至研究日期尚未产生已知集体诉讼。
