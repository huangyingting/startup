        - 否——但交割前必须提供；缺失会拉长时间线
      - - P2
        - 关于重大诉讼、IP 所有权和雇佣索赔的法律陈述与保证
        - 确认 2023 和 2024 年 RIF 事件没有隐藏法律负债
        - 否——标准交割条件；缺失则需要法律留置款
