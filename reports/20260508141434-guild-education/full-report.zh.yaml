      - number: '8.3'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >
              乐观情景要求 Navigator 采用率在 2026 年前把收入增速重新拉到 15–20%，驱动因素是雇主愿意从学费福利管理扩展到一体化人才情报平台。在该情景下，Guild 2026 年收入约
              $350–400M，EBITDA 利润率改善，支撑 11–12x EV / Revenue 倍数（由类 SaaS 留存和切换成本支撑），企业价值为 $3.5–4.5B，相当于以 $1.5–2B 入场可获得
              2–3x。基准情景假设收入增速稳定在 8–12%，Navigator 给现有客户带来增量增购，但没有大型净新增企业签约，2026 年收入约 $310–330M，以 7–9x 倍数计，对应企业价值
              $2.2–3.0B。悲观情景模拟宏观福利项目继续削减（沿着 Disney / Macy's 路径）、Walmart 向 Workforce Edge 迁移、Navigator 差异化不足，结果是收入持平到下滑至
              $250–275M，倍数压缩到 4–5x（困境私营公司区间），对应企业价值 $1.0–1.4B，并可能出现下调估值融资或重组情景。概率权重：乐观 20%、基准 55%、悲观 25%，得到概率加权 EV 约
              $2.1–2.4B。考虑到已融资 $584M 和优先股堆叠，普通股价值相应更低；老股市场或新一轮投资者应谈判优先权重置或保护性条款。
