      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >
              InStride（2019 年成立，USC 剥离，总部位于 Los Angeles）是 Guild 在雇主赞助教育平台模式中最直接的同业。InStride 经营类似三边市场：

              雇主支付平台费，员工免费获得认证学位和证书项目，教育机构向 InStride 支付收入分成。InStride 已融资约 $90M，客户包括 American Airlines、PwC 和 Uber。

              InStride 的学术网络覆盖全球约 80 所认证大学。InStride 规模小于 Guild（收入未公开披露，但估计显著低于 Guild 约 $275M），雇主客户策略更强调选择性和质量，

              而不是 Guild 的广覆盖打法。InStride 的大学网络国际化成分更强；当 Guild 竞争 Guild Grow Global 产品时，这可能成为优势。


              据报道，Workforce Edge（Walmart 子公司）替代 Guild 承接 Walmart Live Better U 项目后，成为高曝光度竞争威胁。Workforce Edge 是 Walmart
              为内部劳动力发展

              需求搭建的自有平台，为 Walmart 约 1.6M 名美国员工提供免学费学位和证书。作为按照全球最大私营雇主规模搭建的封闭内部平台，Workforce Edge 传统意义上不是 Guild

              的直接市场竞争对手——它并未面向其他雇主商业化——但它的存在代表了大型雇主「内包」风险，这一风险在 Guild 模式的超大规模客户中天然存在。


              Bright Horizons EdAssist 是雇主赞助教育管理领域的传统龙头，与 72 家 Fortune 100 有关系，并深度接入 HR 和薪资基础设施。EdAssist 的模式主要是学费报销管理：

              它管理传统报销流程（员工申请、完成、提交报销），而不是通过精选机构网络做雇主预付。这形成了不同的买方关系，也让雇主进出 EdAssist 的切换摩擦更低；

              但同时也意味着 EdAssist 是 Guild 在新增企业销售中必须替代的现状方案。
