      - number: '6.3'
        title: 留存、耐久性与客户续约
        blocks:
          - type: paragraph
            body: >
              Guild
              不公开披露净收入留存率（NRR）、总收入留存率（GRR）、平均合同期限或雇主客户续约率。考虑到已经披露的客户流失，这些指标缺失是投资尽调的重大证据缺口。基于新闻报道、分析师评论以及从增长率倒推，客户留存信号好坏参半。正面看，Guild
              经 Brandon Hall 背书的 2025 Analyst Day 强调了多年期合同结构和雇主 ROI 案例研究，显示项目参与者相较对照组的流失率下降。Sacra 和 Contrary Research
              都指出，Guild 的直付账单模式会形成切换成本——雇主若没有大量投入，很难在内部复制经过筛选的教育机构网络、账单基础设施和辅导团队。


              反面看，Disney 和 Macy's 离开、Walmart 试验 Workforce Edge，以及 Guild 两轮裁员（2023 年 5 月 172 人、2024 年 5 月约 300
              人），都指向留存图景走弱。WorkLife News 报道称，2024 年裁员部分源于客户侧项目缩减以及新客户获取慢于预期。Gallup 的劳动力研究也有启发：美国只有 31%
              的员工敬业，说明教育项目这类员工参与福利在竞争性劳动力市场中越来越像标配；但雇主也在审视所有福利支出。HBR 关于学费报销的研究显示，雇主 ROI
              逻辑在理论上强，但必须持续推广项目并获得经理支持，才能把使用率推到合资格员工的 10–15% 以上——这个使用率门槛 Guild 自身并不披露。
