      - number: '2.4'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: |
              Guild 的买方不是免费受益的员工，而是雇主——具体是员工数 10,000+、平台投入可用劳动力规模解释的大企业。在雇主内部，采购决策通常涉及两个或更多职能：
              负责福利设计和劳动力发展战略的人力资源（HR）或 People & Culture；以及审批合同、验证 ROI 假设的财务或采购。在部分企业账户中，CEO 或 CHRO 会直接赞助项目，
              将其作为公开劳动力承诺的一部分（例如 Walmart 的「Live Better U」品牌、Chipotle 的「Cultivate Education」）。

              雇主细分可以按行业垂直和战略动机来刻画。零售、餐饮服务和酒店雇主（Walmart、Chipotle、Taco Bell、Hilton）用 Guild 在高流失小时工群体中做出差异化，
              通过教育福利降低自愿流失。医疗雇主（Providence Health、OSF Healthcare、UCHealth）用 Guild 补足临床员工管线，并满足执照 / 证书要求。
              金融服务雇主（Discover、PNC Bank、JPMorganChase）在受快速技术变革影响的岗位上，用 Guild 推动专业发展。物流和能源雇主（Tyson Foods、
              Love's Travel Stops）用 Guild 支持一线员工晋升。

              典型采用路径是：雇主 RFP 或直接接触 → 一个业务单元试点 → 与 Guild 完成完整项目设计 → 配合沟通活动上线 → 持续辅导和分析 → 续约与扩张。
              大型企业客户销售周期估计为 6–12 个月；在大型雇主员工基数（100,000+ 人）中完成全项目激活，可能需要 12–18 个月。销售周期多年、多利益相关方的特性，
              既形成竞争护城河（嵌入后切换成本高），也带来约束（经济不确定时期新客户获取变慢）。
