      - number: '3.3'
        title: 能力与功能对比
        blocks:
          - type: paragraph
            body: >
              横向比较四类主要竞争类别的功能，可以看出 Guild 的相对优势与缺口。Guild 的关键差异化在于：（1）雇主预付模式消除了员工现金垫付门槛，而这一门槛会限制传统报销项目；

              （2）由 70+ 家机构提供 2,000+ 个项目的精选机构网络，比大多数竞争对手更大、筛选更强；（3）职业辅导层提供纯软件平台缺乏的人力支持；

              （4）Guild Talent Advantage 的 AI 驱动人才分析，正在成为面向 CHRO 的新差异化——它服务的不是单纯福利管理，而是劳动力转型洞察。


              Guild 的缺口包括：（1）没有完整 LMS/LXP，无法让雇主在一个平台管理所有学习——Degreed 和 Cornerstone 拥有这种广度，而 Guild 仍聚焦学位 / 证书路径；

              （2）相较 Cornerstone OnDemand 的综合目录，企业培训和合规内容层较薄；（3）缺乏可与 EdAssist 的 Fortune 100 渗透率相比的大型传统雇主基础；

              （4）Walmart Live Better U 合同状态仍未解决，削弱了 Guild 的旗舰客户参考故事。


              收购 Nomadic Learning 补上了一个缺口——基于队列的企业学习（Guild Academy 现已在能力学院领域竞争，客户包括 Microsoft 和 Accenture）——但 Guild
              尚未证明，

              合并后的 Guild Talent Advantage 平台能留住那些原本可能整合到 Workday Learning、SAP SuccessFactors 或 Cornerstone
              这类全栈人才管理套件的雇主客户。
