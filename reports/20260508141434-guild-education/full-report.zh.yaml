companyProfile:
  summary: |
    Guild Education（法律实体为 Guild PBC，一家特拉华州公益公司）是一家总部位于 Denver 的
    劳动力教育和人才发展公司，由 Rachel Romer（原 Rachel Romer Carlson）和 Brittany Stich 于 2015 年 6 月创立。
    Guild 经营一个三边市场，借助雇主赞助的学费福利管理，把企业雇主、教育和技能培训机构、一线及小时工连接起来。
    雇主支付平台费；教育机构按注册学生缴纳收入分成；员工可免费参加学位和证书项目。平台服务 500+ 家雇主客户，
    包括 Walmart（Live Better U）、Chipotle、Lowe's 和 Hilton；教育合作伙伴 150+ 家，包括 Arizona State University
    和 Southern New Hampshire University。Guild 于 2024 年推出 Navigator，这是一个 AI 驱动的劳动力智能平台，
    整合职业路径、技能缺口分析和人才管线管理；公司还收购 Nomadic Learning（专业发展），把业务从学费福利管理向外扩展。
    Rachel Romer 因健康问题离任后，Bijal Shah 于 2024 年 4 月出任 CEO。Guild 连续两次裁员（2023 年 5 月约 12%；
    2024 年 5 月约 25%），员工数降至约 900 人。公司最近一次一级股权融资在 2022 年 6 月（Series F，以 $4.4B
    估值融资 $175M）；累计融资约 $584M。FY2024 收入估计为 $275M，较 FY2023 的 $261M 增长约 6%。二级市场暗示
    当前 EV 为 $1.5-2B，较 Series F 峰值压缩 55-65%。
