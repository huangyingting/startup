      - number: '8.2'
        title: 估值背景与可比分析
        blocks:
          - type: paragraph
            body: >
              Guild 上一次外部融资是 2022 年 6 月 $175M Series F，投后估值 $4.4B（2021 年 6 月 Series E 为 $3.725B），意味着峰值约 16x 远期收入。自 2015
              年以来，公司七轮融资累计股权融资约 $584M，主要机构投资者包括 General Atlantic、Bessemer Venture Partners 和 Oprah Winfrey
              的媒体载体。近三年没有公开股权融资，老股平台暗示交易对应 $1.5–2B 隐含 EV。两次大规模重组期间没有新融资，合理地提出了关于烧钱轨迹、公司是否盈利或是否依赖既有现金储备的问题。Guild
              的上市可比公司并不完美：Coursera 交易在约 4–5x 远期收入；Udemy 为 3–4x；Chegg 因生成式 AI 冲击其辅导模式而崩塌。私有 HR tech 类比包括 Cornerstone
              OnDemand（约 9.6x 收入私有化）和 Degreed（收入规模更小，上一轮估值约 $4B）。M&A 先例包括 Pluralsight（PE 约 6x 收入私有化）和 LinkedIn
              Learning（Microsoft 溢价收购）。对于 Guild 这样收入规模约 $275M、增长放缓至约 6%、且存在结构性不确定性的公司，7–9x EV / Revenue 是合理的基准区间，对应企业价值
              $1.9–2.5B。入场纪律需要假设 $584M 融资带来至少 20–30% 的优先股覆盖压力，这会影响普通股价值。
