      - number: '6.4'
        title: 扩张、集中度与风险
        blocks:
          - type: paragraph
            body: >
              Guild 的收入几乎肯定集中在少数超大型雇主手里。Walmart 有 140 万名合资格美国员工，可能是单一最大收入账户。如果每名参与员工每年让雇主支付约 $3,000–5,000 的平台费加学费，而每年只有
              5–10% 的 LBU 合资格员工报名，那么 Walmart 对 Guild 的隐含收入贡献在 $20–70M 区间，估计占总收入的 7–25%。这种集中度制造了 Guild
              尚未公开回应的系统性风险，Workforce Edge 的故事也说明，大客户转向竞争模式的速度可以很快。


              Guild 存在落地后扩张的动态，但受福利性质限制：雇主会把更多员工（有时还有更多地区）纳入既有项目，扩大报名员工数；但在关系早期，很少叠加多个彼此独立的付费产品。Guild 于 2024 年 10 月推出
              "Talent Advantage" 和 "Guild Academy"，是在尝试向现有客户交叉销售高端分析和 L&D 服务，但采用情况尚未获得公开确认。渠道依赖很低：Guild
              通过企业销售团队直接卖给雇主，没有经销商或福利经纪中介承担主要收入角色。与福利咨询机构（Aon、Mercer）的合作关系存在，但它们更像顾问，而不是产生收入的分销渠道。Lumina Foundation 关于
              4,000 万名缺少高等教育证书的美国在职成年人研究凸显了长期市场机会，但近期增长仍需要赢下新的大型雇主客户——这正是 Guild GTM 中竞争最激烈的部分。
