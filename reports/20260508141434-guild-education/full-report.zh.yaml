            多边网络覆盖 500+ 家雇主和 150+ 家机构；Navigator 增加切换成本；Walmart 共同创办 Workforce Edge，部分削弱护城河论证
          claimRefs:
            - CV008
        - label: 财务健康度
          value: 2 / 5
          detail: |
            收入估计为 $275M，增速仅 6%；未披露财务数据；累计融资 $584M，2022 年以来未再股权融资；烧钱速度和现金续航期未知；二级市场价格较峰值低 55%
          claimRefs:
            - CV004
        - label: 团队和执行
          value: 3 / 5
          detail: |
            Shah 曾任 Guild COO；入选 CNBC 2025 Changemaker；连续两轮 RIF 削弱信心；HBS 案例记录了增长管理挑战
          claimRefs:
            - CV013
        - label: 竞争位置
          value: 3 / 5
          detail: |
            在托管式雇主教育领域有先发优势；直接受 Workforce Edge 威胁；InStride 和 Bright Horizons 是替代供应商选择
          claimRefs:
            - CV014
        - label: 估值吸引力
          value: 3 / 5
          detail: |
            二级市场按 2024 年收入 7-8x 定价，相对 PE 先例算合理；相对上市可比公司折扣不深；优先权悬顶压低普通股上行空间
          claimRefs:
            - CV003
