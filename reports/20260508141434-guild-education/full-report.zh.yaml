      - number: '4.3'
        title: 股本结构与融资历史
        blocks:
          - type: paragraph
            body: >
              2015 年至 2022 年 6 月，Guild 通过七轮股权融资累计募集约 $584M。融资历史反映了 ZIRP 时代 EdTech 热潮：Guild 于 2019 年 12 月完成 $150M Series
              D，

              2021 年 6 月以 $3.7B 估值完成 $175M Series E，2022 年 6 月以 $4.4B 估值完成 $264M Series F。$4.4B 峰值估值未能维持——2024–2025
              年的二级市场指标和

              分析师估计显示，当前隐含估值约 $1.5–2B，较峰值压缩约 55–65%。自 2022 年 6 月以来，公司没有募集新的一级资本，距今已超过三年；考虑到两轮裁员和

              2024 年 4 月 CEO 更替，这一点值得关注。


              从公开记录看，资本结构仅为股权（没有公开的风险债或收入型融资设施记录，尽管这些可能存在）。SEC Form D 文件显示了多轮私募融资，为投资者活动提供了部分审计线索。

              主要投资者包括 Bessemer Venture Partners、General Atlantic、Felicis Ventures 等。三年没有新资本，再叠加仍在 EBITDA
              亏损运营（由未发布任何盈利公告推断），

              引出尽调必须直接回答的资本充足性问题：当前现金余额是多少，月度烧钱速度是多少，距离盈利还有多长现金跑道？这些数据点对私营公司不可公开获得，需要 NDA 访问。
