      - number: '5.2'
        title: 技术与 AI 能力
        blocks:
          - type: paragraph
            body: >
              Guild 的技术基础设施以 B2B SaaS 平台为中心，包括面向雇主的配置工具、面向员工的学习门户和辅导协调层。尽管 Guild 不发布详细架构文档， 平台关键技术组件包括用于使用率和 ROI
              跟踪的雇主分析看板、根据职业目标和雇主定义路径把员工匹配到相关项目的智能项目推荐功能，以及直接账单支付处理， 消除传统学费报销中员工现金垫付的门槛。

              2024 年 10 月，Guild Talent Advantage 随 Nomadic 收购一起推出，引入 AI 驱动的人才智能能力。Guild 与领先劳动力市场数据提供商 Lightcast 合作， 推出
              Talent Resilience Index，这是一个基准工具，允许雇主衡量劳动力流动性和技能组合韧性相对劳动力市场同业的位置。Lightcast 合作支持与认证完成绑定的
              实时技能跟踪，形成从学习投资到可验证技能结果的数据闭环。Guild 学习者中，AI 项目注册人数同比增长 1,200%；过去三年，超过 100,000 名学习者注册 AI 素养 和高级数据技能项目。与
              Wharton Online 的高管教育扩张——提供 AI for Business 和 Digital Leadership 项目——把 Guild 的 AI 技能覆盖延伸到高层管理者。 Guild
              的技术投入信号（Glassdoor 工程评价和招聘模式）指向现代云原生栈，工程团队分布在 Denver 和远程地点。收购 Nomadic 带来经过验证的基于队列的学习技术平台，
              具备强企业内容创作和交付能力，估计让 Guild 的企业 L&D 路线图加速两到三年。
            claimRefs:
