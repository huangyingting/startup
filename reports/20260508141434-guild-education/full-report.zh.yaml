      - number: '7.4'
        title: 财务、执行与人员风险
        blocks:
          - type: paragraph
            body: >
              Guild 的财务风险由有限公开披露和清晰可见的重组信号共同塑造。Sacra 估计 Guild 2024 年收入约 $275M，较 2023 年约 $261M 增长约 6%，相比支撑 2022 年 $4.4B
              Series F 估值的高速增长明显减速。公司累计股权融资约 $584M，自 2022 年 6 月以来没有新的外部融资，意味着要么接近盈利，要么依赖既有现金储备。老股市场定价暗示当前企业价值为
              $1.5–2B，较峰值下降 55–65%。CEO 交接是近期最尖锐的执行风险：Bijal Shah 于 2022 年加入担任 COO，在 Rachel Romer 健康危机后于 2024 年 4 月升任
              CEO，对 Guild 模式约有两年的运营熟悉度。CNBC 2025 年 2 月 changemaker 画像暗示其具备外部可信度，但 Shah
              必须在推进盈利转向的同时维持商业动能。收入集中在头部雇主手里，带来非线性的流失敏感性：失去一个前五大客户就可能不成比例地冲击报告增长率。反周期宏观风险真实存在，因为 Disney 和 Macy's
              的终止发生在企业降本周期，而不是源自产品不满意。需要监控的信号包括雇主 logo 净留存、收入增速、员工数轨迹，以及任何重新融资活动所指向的战略转向或投资者资本重组事件。
