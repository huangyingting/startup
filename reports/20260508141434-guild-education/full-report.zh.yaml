  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重性排序
        blocks:
          - type: paragraph
            body: >
              Guild Education 位于企业 HR 软件、教育科技和雇主福利管理的交界处，这一定位带来横跨监管、运营、合作伙伴集中度、财务和人员维度的多元风险。业务结构上依托 IRS Section
              127：该条款允许雇主每年为员工提供最高 $5,250 的免税教育福利，自 2001 年以来保持稳定，但也是单点立法依赖。与此同时，Disney Aspire 和 Macy's 两个大型雇主客户分别在 2024
              年末和 2025 年初终止项目，说明宏观成本管理压力可以压过战略性福利承诺。Guild 2022 年 $4.4B 的峰值估值尚未通过新一轮股权融资刷新；老股市场估计显示估值可能明显压缩至 $1.5–2B。2023
              和 2024 年连续两轮裁员砍掉了峰值员工数约 37%，反映公司有意以牺牲增长产能为代价转向盈利。在这一背景下，严重性最高的风险是 Walmart 集中度、Workforce Edge 的竞争威胁、收入减速，以及
              Bijal Shah 于 2024 年 4 月接替创始人 Rachel Romer 后引入的 CEO 交接风险。缓释因素包括 Guild 的多年期雇主合同、500+ 客户分散度，以及 IRS Section
              127 跨政府任期的两党政治耐久性。
