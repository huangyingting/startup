              自 2015 年成立以来，Guild 累计融资约 $584M。公司的融资轨迹是一条典型的高速增长曲线：早期机构轮来自

              Bessemer Venture Partners；2020–2021 年 ZIRP 和疫情期间 EdTech 热潮中快速完成 Series D 和 E；最终在 2022 年 6 月以

              $4.4B 投后估值完成 Series F——这是 Denver 初创公司达到过的最高估值之一，也是雇主赞助学习市场的高水位。


              标志性融资包括 Series E（2021 年 6 月，$150M，估值约 $3.75B），由 General Atlantic 领投，Bessemer、Salesforce Ventures 等参与；

              以及 Series F（2022 年 6 月，$175M，投后估值 $4.4B），由 Wellington Management 领投，Oprah Winfrey、Bon Secours Mercy
              Health、

              Citi Impact Fund 和 Bessemer Venture Partners 参与。Inside Higher Ed 和 CNBC 对每轮估值里程碑均有大量报道。


              自 2022 年 6 月以来，公司没有再募集新的一级资本——截至报告日期约四年。2024 年二级市场隐含估值估计为 $1.5–2B，较 $4.4B 峰值下降

              55–65%。Sacra 估计 Guild 2023 年收入约 $261M、2024 年收入约 $275M，意味着个位数百分比增长——远低于支撑估值倍数重回峰值所需的水平。

              Guild 仍为私营公司，未公开披露盈利能力、EBITDA 或现金跑道。没有新的一级融资，也引出第 4 章讨论的资本充足性问题。
