      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: |
              Guild 由 Rachel Romer（原 Rachel Romer Carlson）和 Brittany Stich 于 2015 年 6 月共同创立。
              Rachel Romer 是 Colorado 前州长 Roy Romer 的孙女，创办 Guild 前在 Lumina Foundation 及相关非营利组织从事教育政策工作。
              她自创立起担任 CEO，也是公司高速增长期最主要的公众面孔，带领公司从 Bessemer Venture Partners、Oprah Winfrey、
              Wellington Management 等机构和个人处融资。在她任内，Guild 从 Denver 初创公司成长为 2022 年 6 月估值 $4.4B 的独角兽。

              2023 年 8 月，Rachel Romer 严重中风，需要长期医疗休假；她最终辞任 CEO，但保留董事会席位。Masters of Scale 和多家新闻媒体
              报道了 Bijal Shah 在这一时期稳定公司的角色。Shah 于 2018 年加入 Guild，担任 Chief Experience Officer，此前曾在 Teach For America
              及其他教育相邻组织担任领导职务；过渡期内出任代理 CEO 后，她于 2024 年 4 月 2 日正式获任 CEO。

              Shah 的领导在公司内部存在争议。2024 年 10 月采集的 Glassdoor 数据显示，她的 CEO 支持率约为 37%，显著低于行业常态。
              The Higher Education Inquirer 和 Colorado Sun 均报道了员工对职场文化、激进重组、歧视指控以及 2023 和 2024 年连续裁员周期中
              沟通不佳的投诉。The Josh Bersin Company 和 Brandon Hall Group 则在 2024 年 10 月 Guild Talent Advantage 分析师日之后，
              对 Shah 的战略方向给出更建设性的评价。Guild 董事会包括 Wellington Management、Bessemer Venture Partners 等主要投资方代表，
              以及参与 Series F 的 Oprah Winfrey。
