      - number: '5.3'
        title: 教育机构生态
        blocks:
          - type: paragraph
            body: >
              Guild 的机构生态是核心竞争资产：公司筛选出由 70+ 所认证大学和学习机构组成的网络，覆盖在线学位项目、职业认证、专业凭证和高管教育。 主要教育合作伙伴包括 Southern New Hampshire
              University、Purdue University Global、University of Phoenix、eCornell（Cornell University）、 LSU
              Online、Wilmington University 和 Penn Foster 等。Wharton Online 合作（University of Pennsylvania）加入了包括 AI for
              Business 和 Digital Leadership 在内的高管教育项目，把 Guild 的可触达人群从一线员工延伸到 JPMorganChase 等合作公司中的高层管理者。

              Guild 通过审查流程管理项目质量，筛选维度包括机构认证状态、完成率、与雇主匹配的课程体系和学习者体验。2,000+ 项目目录覆盖 138 个学习领域； 2024 年，80%
              的学位和证书学习者注册在与业务匹配的项目中。医疗项目同比增长 45%，达到 400+ 个，反映 Guild 有意向医疗劳动力短缺市场做垂直扩张。 机构经济模型基于收入分成：员工注册时，Guild
              抽取一定比例学费，使 Guild 的激励与学习者注册对齐，而不是与表层福利使用率对齐。

              收购 Nomadic Learning 增加了企业内容库和能力学院平台，聚焦领导力发展、AI 素养和组织能力建设。Nomadic 基于队列的模式已被 Josh Bersin Academy
              及其他企业客户使用，如今整合进 Guild Academy；Guild Academy 已吸引 Microsoft 和 Accenture 成为客户，标志 Guild 进入传统学费管理之外更广泛的企业 L&D
              市场。 自推出以来，已有超过 300,000 名学习者参与 Guild Academy 项目。
            claimRefs:
              - CE014
