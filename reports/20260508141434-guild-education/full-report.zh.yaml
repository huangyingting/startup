      - number: '1.4'
        title: 平台规模与关键里程碑
        blocks:
          - type: paragraph
            body: |
              自 2015 年创立以来，Guild 平台规模已显著扩大。根据 2025 年 1 月通过 BusinessWire 发布的 2024 年年度影响力回顾，
              Guild 披露平台已触达 1.4M 名员工；2024 年新增获得平台访问权限的员工 465,000 人；项目完成和毕业 60,000 次；为学习者节省的学费总额超过
              $1B。公司网络覆盖 70+ 家教育机构和 100+ 个领域的 2,000+ 个学习项目，包括 Purdue Global、SNHU、ASU Online、eCornell、
              University of Florida Online、Spelman College 和 NC A&T 的项目。

              关键里程碑包括：2015 年 6 月成立；2016 年获得早期 Bessemer 资本；约 2019 年达成标志性的 Walmart Live Better U 合作；
              2022 年 6 月达到 $4.4B 的 Series F 估值峰值；2023 年 8 月 Rachel Romer 中风；2023 年 5 月首次大规模裁员（约 172 人，约 12%）；
              2024 年 4 月 CEO 过渡至 Bijal Shah；2024 年 5 月第二轮更大规模裁员（约 300 人，约 25%）；2024 年 10 月收购 Nomadic Learning 并推出
              Guild Talent Advantage；2025 年 1 月 Macy's 终止合作；2025 年 4 月赢得 Spectrum 合作。

              2024 年，Guild 平台上 AI 相关项目注册人数同比增长 1,200%，反映大型雇主对 AI 技能转型的需求。约 80% 的学位和证书学习者注册在
              与业务匹配的项目中，支撑 Guild 的雇主 ROI 叙事。Guild 也通过 Guild Grow Global 推进国际扩张，在 Canada、Mexico、India 和 UK 提供项目，
              但国际收入贡献未公开披露。
