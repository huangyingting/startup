      - number: '5.4'
        title: 产品路线图与全球扩张
        blocks:
          - type: paragraph
            body: >
              Guild 的产品路线图不是停在学费报销单点工具，而是在有意扩成一套完整的人才发展平台。2024 年 10 月收购 Nomadic Learning 是最关键的战略动作：它让 Guild 更快切入规模超过
              $28B 的企业学习与发展（L&D）市场，补上队列式学习能力、企业内容库，也带来一批把 L&D 和教育福利分开采购的企业客户。收购整合后的 Guild Academy，瞄准的是此前 Guild 触达不到的财富
              500 强企业 L&D 预算。

              Guild Grow Global 代表 Guild 的国际化扩张策略，带着多币种支持把平台推向 Canada、Mexico、India 和 United Kingdom。它回应了跨国雇主的需求，也让 Guild
              能服务现有美国企业客户的全球员工队伍。学费报销产品现在几乎覆盖全球所有国家，跨国公司可以部署一套统一的教育福利策略。

              Guild Navigator 已通过 OSF Healthcare、Children's Nebraska、Good Jobs Birmingham
              等合作伙伴进入早期试用，瞄准的是持证岗位管道这个具体问题：从现有员工群体里搭出通往 CNA、MA、CDL 等持证岗位的结构化路径。产品计划在 2026 年初全面开放。Walgreens PharmStart
              项目为 300 名员工提供全额报销的线上药学院先修课，正好体现 Navigator 的产品策略。战略风险在于产品线蔓延：五条成熟度不同的产品线并行，要求严格取舍和专业化销售，一家约 900
              人的公司未必撑得住。Macy's 终止合作（2025 年 1 月）以及 Walmart 被 Workforce Edge 取代，都是有分量的反向信号：即便 Guild 在搭建新产品，核心 Learning
              Marketplace 产品也必须证明清晰 ROI，才能留住大客户。
