  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: |
              Guild 采用双边收入模式，同时向雇主客户和教育机构收费。雇主端，Guild 按加入 Guild 项目的雇主员工规模和使用服务范围（教育福利管理、职业辅导、人才分析）
              收取平台订阅费。大型雇主支付的平台费显著更高；Sacra 估计每名雇主平均收入约 $550,000，乘以约 500 家雇主客户，得到约 $275M 的 FY2024 收入总额。
              教育机构端，Guild 从合作大学和教育项目收取收入分成——机构按通过 Guild 平台产生的学费收入向 Guild 支付一定比例。这个双重变现结构类似市场模式：
              Guild 为两端创造价值（为机构带来员工学员；为雇主提供福利管理和人才数据），并从两端创造的经济价值中抽取一部分。

              Guild Grow Global 扩张（2023 年推出）把平台延伸到 Canada、Mexico、India 和 UK 的雇主劳动力，为 Guild 历史上的美国单一市场之外提供增量收入增长向量。
              Guild Academy（2024 年 10 月通过收购 Nomadic Learning 推出）增加第三条收入流：面向大型雇主直接销售基于队列的企业学习项目（例如 Microsoft、Accenture），
              作为能力学院，独立于学费福利管理模式。Guild Talent Advantage（2024 年 10 月推出）也可能增加高级分析订阅层，但这一变现策略尚未公开确认。
              2022 年后收入增长显著放缓——从 2020–2022 年约 70%+ CAGR 降至 2023–2024 年估计约 6%——主要反映劳动力市场转弱（这曾推动 Guild 初期采用）
              以及裁员导致雇主员工数下降，从而减少每份合同的可计费活动。
