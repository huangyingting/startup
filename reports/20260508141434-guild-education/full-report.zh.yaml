      - number: '8.4'
        title: 投资建议、尽调要求与退出准备度
        blocks:
          - type: paragraph
            body: >
              研究证据支持有条件投资，前提是隐含 EV 入场价格不超过 $2.0B，并且数据室验证三项证实投资逻辑的事项：（1）经审计财务数据显示 2024 年运营亏损显著收窄；（2）雇主 NPS 高于 40、合同续约率高于
              85%，确认裁员后服务质量没有退化；（3）Walmart 多年期合同续约得到确认，且没有 Workforce Edge 排除条款。鉴于未解决证据缺口较多，正面建议的信心为中等（约
              35%）。风险评级为高，原因是执行风险、客户集中度以及缺乏公开财务披露。按当前轨迹，Guild 的退出准备度：近期 IPO
              为低（市场环境、增长减速和倍数压缩让公开发行难以承销）；被企业学习平台战略并购为中（SAP SuccessFactors、Oracle HCM、Workday Learning 或 LinkedIn
              Learning 扩展雇主福利集成）；通过二级结构化流动性流程让 2022 年入场投资者以低于峰值价格退出，为中高。对普通股持有人最增值的结果，是 Navigator 平台加速叠加雇主合同扩张，并由连续两个季度
              12%+ 收入增长验证。任何低于 $1.5B 隐含 EV 的新融资，都将构成投资逻辑破裂事件，需要全面重新评估。
