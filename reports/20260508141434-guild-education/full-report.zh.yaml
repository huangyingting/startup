  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Guild 所处的竞争格局横跨多类替代方案，每一类都对应大型雇主为员工提供教育和学习福利时不同的「待完成任务」。历史上，这个市场在传统学费报销管理方、

              新一代 EdTech 平台和通用人才管理软件之间高度碎片化；但整合和产品扩张正在加剧所有维度的竞争。


              对 Guild 最相关的竞争类别包括：第一，直接的雇主赞助学习平台同业——同样经营连接雇主、员工和教育机构的市场模式，具体包括 InStride（USC 剥离，2019 年）

              和 Workforce Edge（据报道在 Walmart 替代 Guild 后受到关注）。第二，传统福利管理方——其中最重要的是 Bright Horizons EdAssist，它与 72 家 Fortune
              100

              公司有长期关系，并拥有早于在线学习热潮的广泛福利管理足迹。第三，学习体验平台（LXP）——Degreed 和 Cornerstone OnDemand 均服务企业 L&D 市场，

              并持续加入与 Guild 核心产品部分重叠的学费和学位项目集成。第四，雇主内部自建——对 Amazon、Walmart 等超大型雇主尤其相关，它们已经搭建自有学习福利平台，

              而不是依赖外部供应商。


              竞争强度正在上升：EdAssist 的既有客户基础、Workforce Edge 赢下 Walmart、Degreed 的 LXP 扩张，都构成 Guild 必须防守的实质竞争威胁；

              同时 Guild 还要执行 Guild Talent Advantage 向企业 L&D 的扩张。
