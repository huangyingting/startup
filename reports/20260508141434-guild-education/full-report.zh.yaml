      - number: '2.3'
        title: 市场增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: |
              雇主赞助教育市场由结构性、周期性和监管因素共同推动，这些因素可独立验证，并不只是公司自己给出的说法。

              主要增长驱动因素：第一，技能缺口扩大和 AI 驱动的岗位转型加速。McKinsey 和 Gallup 调查持续显示，大型雇主把技能过时视为前五大战略性劳动力风险。
              Guild 2024 年 AI 相关项目注册人数增长 1,200%，就是这一需求信号的一个数据点。第二，小时工和一线员工劳动力市场竞争。2021–2023 年紧张的劳动力市场
              促使许多大型雇主新增或强化教育福利，把它作为留才差异化工具；Walmart、Chipotle 和 Target 都公开提到，教育福利是其留才策略的一部分。
              第三，IRS Section 127 每年为每名员工创造 $5,250 的免税福利窗口，让雇主教育相对加薪或其他福利更具成本效率。第四，ESG 和 DE&I 承诺让大型雇主
              同时把劳动力教育视为人才策略和社会影响力凭证，提高了高管层支持度。

              关键采用约束：最重要的约束是经济下行时雇主的支付意愿。2024 年 Macy's 终止项目、Disney 缩减福利，都发生在削减成本期间，说明教育福利更像可自由裁量支出，
              而非核心支出。第二，雇主怀疑 ROI。若没有关于留存提升、晋升率或生产率改善可归因于 Guild 项目的硬数据，CFO 在预算收紧时很难支持维持或扩大教育支出。
              第三，竞争替代风险（Walmart 的 Workforce Edge）和内部 HR 系统替代（大型雇主自建 LXP）。第四，IRS Section 127 的 $5,250 上限限制了每名员工收入上行空间；
              除非 Guild 能在学费管线之外，通过职业辅导、技能评估和人才分析变现，否则每席位收入强度存在结构性天花板。
