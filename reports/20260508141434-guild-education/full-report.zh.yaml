  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: |
              Guild 处在两个巨大但不同的市场交界处：雇主赞助教育援助（主要是围绕 IRS Section 127 构建的美国市场）和更广泛的全球在线 /
              企业学习与发展（L&D）市场。尽调时必须分开看，因为两者的买方结构、资金机制和竞争动态都不同。

              雇主赞助学费援助市场，是美国企业福利支出中用于教育的那一部分——主要包括学费报销、免学费学位项目和专业发展福利。
              约 61% 的美国公司提供某种形式的教育财务援助，但多数项目仍采用传统报销制（员工先付款，完成后报销），而不是 Guild 所支持的雇主预付模式。
              IRS Section 127 免税条款允许每名员工每年最高 $5,250 的雇主教育援助不计入员工应税收入，形成锚定在联邦税法中的结构性财政激励。

              全球在线教育市场涵盖学位项目、专业证书、自主节奏 e-learning、企业学习平台（LXP）和培训交付软件。这个市场大得多，也更碎片化；
              Guild 在其中的具体生态位，是由雇主（而非个人）付费并作为买方的雇主中介路径。这个中介角色就是 Guild 的独特价值主张，也使其区别于
              Coursera 或 Udemy 这类纯 DTC EdTech 平台。Guild 明确把传统企业培训、合规电子学习和纯自主节奏微证书市场排除在主要价值主张之外，
              转而聚焦学位路径、证书项目，以及如今通过 Guild Academy 提供的基于队列的能力学院。
