      - - P3
        - Nomadic Learning 整合里程碑和工程资源计划
        - 确认整合风险受控，时间线现实
        - 否——整合延迟是风险，但不阻挡入场
    notes: |
      P1 项是交易条件，必须在承诺投资前解决。P2 项须在交割前完成，但可与谈判并行推进。P3 项用于校准情景概率权重；只要入场价格合适，不会阻挡投资承诺。
