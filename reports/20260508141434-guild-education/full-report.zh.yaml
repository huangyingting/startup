  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品平台概览
        blocks:
          - type: paragraph
            body: >
              Guild 的产品平台已从学费报销管理的单点方案，演进为多层劳动力教育与职业发展生态系统。核心 Learning Marketplace 把 Fortune 500 公司的员工连接到 138
              个学习领域、2,000+ 个认证项目，覆盖高中完成、本科学位、专业证书和高管教育。雇主可配置定制教育福利包， 让项目访问与劳动力战略对齐；Guild
              承担完整行政栈：注册、辅导、直接账单学费支付和成果报告。2024 年，平台服务 1.4M 名员工， 完成 60,000 次项目，并交付超过 $1B 的学费节省。

              Career Coaching 在每名学习者的项目旅程中提供 1:1 个性化学业建议和职业导航。Career Pathways（2024）把学习项目映射到具体的高需求岗位，
              搭出结构化晋升阶梯——例如把零售门店员工连接到供应链分析师路径。截至 2025 年处于早期访问阶段的 Guild Navigator，为 Certified Nursing Assistant、 Medical
              Assistant 和 Commercial Driver's License 等持证岗位搭建管线。Talent Advantage 平台与 Lightcast 合作加入数据驱动的劳动力分析，
              帮助雇主对照劳动力市场同业，评估劳动力韧性和技能缺口。Guild 的收入模式按交易收费：员工注册项目时，公司抽取一定比例学费，使其激励与学习者注册量对齐， 而不是与表层使用率对齐。
