  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础与分层
        blocks:
          - type: paragraph
            body: >
              Guild 的客户主要是大型财富 500 强和准财富 500
              强雇主，员工规模至少数万人，集中在同时具备两个特征的行业：一线和小时工流动率高，同时又有强监管或强竞争压力，必须留住并提升这部分员工。五个核心垂直行业是零售与电商、餐饮与快餐、医疗与医院、酒店与旅行、金融服务 /
              银行。这些行业共享一个结构性顺风：BLS 数据显示，受过部分高等教育的员工收入高出 17–25%，失业率也明显低于只有高中文凭的员工，因此雇主补贴教育有一个可信的 ROI 叙事。


              Guild 的买方是大型雇主的福利 VP / 主管或 Chief People Officer；用户是报名项目的小时工或职业中期员工；经济付款方则是雇主（通常自保），通过 Guild
              的直付账单基础设施支付学费。地域几乎完全集中在美国，不过 Guild Grow Global 已经开始把福利管理扩到 Canada、Mexico、India 和 UK。Guild
              不公开披露各垂直行业收入，也没有系统披露客户名单，所以本章分层来自新闻稿、分析师报告（Sacra、Contrary Research）以及单个合作项目的新闻报道。公司自报的「500+ 雇主客户」和「140
              万名员工参与」是主要规模锚点；所有子细分拆分都是估计值。
