      - number: '6.2'
        title: 具名客户证明与采用轨迹
        blocks:
          - type: paragraph
            body: >
              Guild 最显眼的客户证明来自一组财富 100 强品牌，它们公开宣布了由 Guild 支撑的教育福利项目。Walmart 的 "Live Better U"（LBU）是标杆案例：该项目 2018 年先与
              Guild 启动，2022 年 6 月扩展为覆盖所有攻读大学学位小时工的 100% 学费和费用，适用人群超过 140 万名 Walmart 美国门店和供应链员工。Chipotle 的 "Cultivate
              Education" 项目在 2019 年 4 月上线；到 2021 年 6 月，Chipotle 称项目上线前两年已有 500 名员工完成学位。Target 的 "Dream Big, Dream
              Machine" 项目覆盖 Guild 合作大学的 175+ 个项目，面向门店和供应链员工。Hilton 于 2019 年宣布与 Guild 合作，提供无债务的学士和副学士学位。


              Taco Bell、Lowe's、Sherwin-Williams、PNC Bank 和 Charter Communications（Spectrum）也是已公开披露的雇主合作伙伴。Spectrum 于
              2025 年 4 月成为最新合作伙伴。抵消这些新增客户的是，Disney 于 2024 年 9 月结束由 Guild 支撑的 "Aspire" 项目，Macy's 也在多年合作后于 2025 年 1 月终止与
              Guild 的合作。这些终止事件实质性提示了 Guild 客户基础的耐久性风险，尤其是在企业把成本效益与更低价替代方案和竞争平台比较时。更宽的采用轨迹显示，Guild 在 2018–2022
              年快速增长，之后明显减速。Sacra 估计收入从 2022 年的约 $200M 增至 2023 年约 $261M，再到 2024 年约 $275M，意味着同比增速从约 25% 降至约
              6%——与大型企业目标客户趋于饱和相吻合。
