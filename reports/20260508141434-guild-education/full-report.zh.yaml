  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Guild PBC（运营品牌：Guild，原 Guild Education）是一家总部位于 Colorado 州 Denver 的劳动力教育科技公司，
              注册为 Delaware 公益公司。Guild 经营三边市场，把大型雇主、经筛选的 70+ 家高等教育和培训机构、
              以及无需自掏腰包即可获得教育福利的一线和职场中期员工连接起来。公司成立于 2015 年 6 月，总部位于 Denver, CO 的
              Republic Plaza。

              Guild 的商业模式从两端收费。雇主按员工规模向 Guild 支付平台订阅费；通过 Guild 的计费基础设施，雇主向教育机构支付学费，
              Guild 从中抽取一部分。员工注册完成课程或证书后，教育机构向 Guild 支付推荐费或收入分成。结果是，员工免费获得学位项目、
              证书和技能凭证，Guild 同时拿到雇主端和机构端经济收益。IRS Section 127 允许雇主每年为每名员工提供最高 $5,250 的免税教育援助，
              让雇主从税务角度以较低成本配置这项福利，并把它结构性嵌入美国薪酬法律体系。

              Guild 重点瞄准员工数 10,000+、平台收入潜力每年超过 $1M 的雇主。主要雇主客户包括 Walmart（Live Better U）、Target、
              Chipotle、Lowe's、Taco Bell、Discover Financial、Hilton、PepsiCo、Tyson Foods、Providence Health、PNC Bank 和
              JPMorganChase。2024 年 10 月，Guild 将平台更名为 Guild Talent Advantage，加入 AI 驱动的人才洞察、职业路径和基于队列的学习产品
              （Guild Academy），后者建立在对 Nomadic Learning 的收购之上。截至 2025 年，公司服务 500+ 家雇主客户，并在 100+ 个领域提供
              2,000+ 个学习项目。
