      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: |
              估算 Guild 的可触达市场，需要用三组互补视角交叉验证：自上而下的雇主教育支出、自下而上的雇主数量和合同价值，以及同业公司收入基准。

              自上而下视角：据 Lumina Foundation 和 SHRM 估计，美国雇主每年合计在学费援助和雇主赞助教育上支出约 $26–28B。其中，雇主预付、
              由技术平台中介的细分市场（Guild 模式）只占一部分，因为大多数雇主仍运行传统报销项目。如果像 Guild 这样的平台长期能拿下 $28B 市场的
              20–30%，则意味着技术赋能雇主赞助学习平台在美国的长期 TAM 为 $5.6–8.4B。

              自下而上视角：Guild 瞄准员工数 10,000+ 的大型雇主。按 BLS 数据，美国约有 900 家员工数 10,000+ 的雇主。若一个完全渗透账户的平均年度合同价值为
              $1–2M，则这一客群可触达的 SAM 约为每年 $900M–$1.8B 的平台收入。以 Guild 披露的 500 家活跃客户计，并假设每名雇主平均收入约 $550K
              （由 Sacra 约 $275M 的估计除以 500 家客户得出），当前收入意味着 Guild 大约拿下了整个 $28B 支出市场的 0.03–0.06%。

              SOM：Guild 当前估计收入约 $275M（FY2024），就是已实现的 SOM。短期 SOM 扩张取决于提高现有账户渗透（席位扩张）和新增企业客户。
              如果 Guild 能增长到 700–800 家雇主客户，平均合同价值达到 $600–800K，短期 SOM 可达 $420–640M。$300B+ 的全球 L&D 市场大体不在
              Guild 当前经济模型范围内，但通过 Guild Talent Advantage 和 Guild Academy 进入企业学习，保留了长期可选项。
