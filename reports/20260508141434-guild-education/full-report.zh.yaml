      - number: '4.2'
        title: 单位经济与利润率结构
        blocks:
          - type: paragraph
            body: |
              Guild 的单位经济有几个特征：典型企业销售带来的高获客成本（CAC），平台订阅部分毛利率中等偏高，教育机构收入分成部分毛利率较低（因为机构学费支付属于穿透成本）。
              职业辅导层是一项重要 COGS：Guild 雇用数百名职业教练，每次辅导互动都有边际成本，并随雇主参与率上升而放大。没有公开可得的审计毛利率数据；
              分析师对类平台 EdTech 公司的估计显示，软件 / 订阅部分毛利率约为 50–70%，市场 / 收入分成部分约为 20–40%。

              Sacra 估计的每名雇主平均收入约 $550K；如果留存高，意味着每名客户的客户终身价值（LTV）可观。不过，Macy's 和 Disney 离开（2024–2025），
              以及据报道 Walmart 被替代，都说明即便是主要客户也存在雇主流失。Guild 披露的 2024 年 1.4M+ 名员工学习者旅程，是关键参与度指标；但参与率
              （活跃学习者占已注册员工比例）和完成率（完成学位或证书的员工比例）未公开披露。课程完成会触发教育机构学费支付，形成与学习者成功直接绑定的可变成本结构——
              这带来正向社会外部性，但如果完成率增长快于平台费增长，也会压迫利润率。

              两轮裁员（估计 2022 年 300 人，2024 年 5 月约 300 人）显示 Guild 已采取结构性降本措施，以改善单位经济并延长现金跑道。这些行动把员工数从估计峰值约
              1,100 人（2022）降至约 500–600 人（2025 估计），大幅削减固定成本基础设施；即便收入增长放缓，也很可能改善了 EBITDA 轨迹。
