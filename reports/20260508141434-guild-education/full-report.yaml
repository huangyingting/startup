    rows:
      - - AI and skills transformation urgency
        - Tailwind
        - Current and accelerating
        - AI program enrollment up 1,200% YoY in 2024; employers urgently seeking AI skill pathways
        - Verify AI program revenue share and employer pipeline conversion rates
      - - IRS Section 127 tax advantage ($5,250/year)
        - Tailwind
        - Structural (anchored in federal tax law)
        - Creates recurring annual employer budget window; tax efficiency makes program cost-effective
        - Monitor for legislation changes; Section 127 has been stable since 1978
      - - Labor market tightness and retention competition
        - Tailwind (cyclical)
        - Moderated in 2024–2025 vs. 2021–2022 peak
        - Education benefits were added during tight labor market; risk of cuts as market loosens
        - Track employer voluntary turnover data and benefit plan modification disclosures
      - - ESG / DE&I employer commitments
        - Tailwind
        - Current; uncertain durability
        - Education benefits count toward ESG/DE&I workforce equity commitments for large public employers
        - Monitor corporate ESG disclosure trends; risk of DE&I budget cuts in 2025–2026 environment
      - - Employer cost-cutting during downturns
        - Headwind
        - Episodic; visible in 2024–2025
        - Macy's and Disney terminated or reduced programs; education treated as discretionary
        - Quantify client churn rate; assess contract termination clause terms and notice periods
      - - Workforce Edge / LXP competitive displacement
        - Headwind
        - Current and growing
        - Workforce Edge reportedly displaced Guild at Walmart; LXP incumbents expanding tuition features
        - Verify current Walmart contract status; map LXP competitors adding tuition rails
      - - IRS Section 127 cap of $5,250 per employee
        - Constraint
        - Structural
        - Limits per-employee annual revenue; requires seat volume or ancillary services for growth
        - Assess non-tuition revenue streams (coaching, analytics, Guild Talent Advantage fees)
      - - Long enterprise sales cycles
        - Constraint
        - Structural for large employers
        - 6–12 month sales cycles slow new client revenue; full account activation takes 12–18 months
        - Validate average sales cycle length and activation timeline through reference checks
    notes: >-
      Timing assessments are qualitative; tailwind/headwind balance may shift with macroeconomic conditions; IRS Section
      127 has been stable for decades but is subject to Congressional revision; ESG/DE&I driver is most uncertain given
      shifting corporate governance sentiment in 2025.
