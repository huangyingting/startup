  - id: FR002
    slug: risk-transmission-map
    type: dag
    description: >
      Directed graph showing how individual risk events propagate and amplify through Guild's business model,
      identifying second-order effects and shared failure paths
    claimRefs:
      - CR013
      - CR014
      - CR016
      - CR017
      - CR019
      - CR022
      - CR026
      - CR042
    data:
      nodes:
        - label: Macro cost-reduction cycle
          note: Corporate austerity drives benefit program cuts regardless of product quality
        - label: Employer benefit termination
          note: Disney Aspire September 2024 and Macy's January 2025 as confirmed examples
        - label: Revenue deceleration
          note: Estimated six percent year-over-year growth in 2024 versus rapid pre-2022 trajectory
        - label: Workforce Edge competition
          note: Walmart-backed consortium offering direct tuition benefit alternative to Guild
        - label: Walmart churn risk
          note: Largest disclosed employer; migration to Workforce Edge equals material revenue loss
        - label: Valuation compression
          note: Peak 4.4B in 2022 versus secondary market implied 1.5 to 2B in 2024 to 2025
        - label: IRS Section 127 legislative change
          note: 'Low-probability but catastrophic scenario: eliminates entire market structural subsidy'
      edges:
        - from: Macro cost-reduction cycle
          to: Employer benefit termination
          label: HR cost-cutting overrides strategic benefit rationale at enterprise clients
        - from: Employer benefit termination
          to: Revenue deceleration
          label: Direct logo and enrollment volume loss
        - from: Workforce Edge competition
          to: Walmart churn risk
          label: Competitive displacement at largest disclosed client
        - from: Walmart churn risk
          to: Revenue deceleration
          label: Outsized revenue impact from largest single client loss
        - from: Revenue deceleration
          to: Valuation compression
          label: Growth multiple contraction reduces enterprise value
        - from: IRS Section 127 legislative change
          to: Employer benefit termination
          label: Tax benefit removal eliminates employer financial rationale for program
        - from: IRS Section 127 legislative change
          to: Valuation compression
          label: Structural market destruction across entire addressable market
    title: Risk transmission map
