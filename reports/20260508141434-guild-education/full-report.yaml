      - number: '1.4'
        title: Platform Scale and Key Milestones
        blocks:
          - type: paragraph
            body: |
              Guild's platform has scaled considerably since its 2015 founding. As of the 2024 annual impact review
              published in January 2025 via BusinessWire, Guild reported 1.4 million employees engaged on the
              platform; 465,000 new employees who gained platform access in 2024; 60,000 program completions and
              graduations; and more than $1 billion in total tuition savings for learners. The company's network
              spans 70+ education providers and 2,000+ learning programs across 100+ fields, including programs from
              Purdue Global, SNHU, ASU Online, eCornell, University of Florida Online, Spelman College, and NC A&T.

              Key milestones include the June 2015 founding, early Bessemer capital in 2016, the landmark Walmart
              Live Better U partnership (circa 2019), the $4.4B Series F peak in June 2022, Rachel Romer's stroke
              in August 2023, the first major reduction in force in May 2023 (~172 employees, ~12%), the CEO
              transition to Bijal Shah in April 2024, the second and larger layoff in May 2024 (~300 employees,
              ~25%), the Nomadic Learning acquisition and Guild Talent Advantage launch in October 2024, Macy's
              partnership termination in January 2025, and the Spectrum partnership win in April 2025.

              Enrollment in AI-focused programs on the Guild platform grew 1,200% year-over-year in 2024,
              reflecting demand for AI skills transformation among large employers. Approximately 80% of degree and
              certificate learners are enrolled in business-aligned programs, supporting Guild's employer ROI
              narrative. Guild has also expanded internationally with Guild Grow Global offering programs in Canada,
              Mexico, India, and the UK, though international revenue contribution is not publicly disclosed.
