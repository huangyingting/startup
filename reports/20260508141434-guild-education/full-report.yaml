  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: |
              Guild operates at the intersection of two large but distinct markets: employer-sponsored
              educational assistance (a primarily US-based market structured around IRS Section 127) and the
              broader global online / corporate learning and development (L&D) market. For diligence purposes,
              these must be treated separately because they have different buyer structures, funding mechanisms,
              and competitive dynamics.

              The employer-sponsored tuition assistance market represents the subset of US corporate benefit
              spend dedicated to education — primarily tuition reimbursement, tuition-free degree programs, and
              professional development benefits. Approximately 61% of US companies offer some form of educational
              financial assistance, though most programs are structured as traditional reimbursement (employee
              pays upfront and is reimbursed after completion) rather than the employer-pay-upfront model that
              Guild enables. The IRS Section 127 exemption allows up to $5,250 per employee per year in
              employer-provided educational assistance to be excluded from the employee's taxable income,
              creating a structural fiscal incentive anchored in federal tax law.

              The global online education market encompasses degree programs, professional certificates,
              self-paced e-learning, corporate learning platforms (LXPs), and training delivery software. This
              market is much larger but more fragmented; Guild's specific niche within it is the employer-
              intermediated pathway where the employer (not the individual) is the payer and buyer. This
              intermediary role is Guild's distinctive value proposition and differentiates it from pure
              direct-to-consumer EdTech platforms like Coursera or Udemy. Guild explicitly excludes traditional
              corporate training, compliance e-learning, and purely self-paced micro-credential markets from its
              primary value proposition, focusing instead on degree pathways, certificate programs, and now
              cohort-based capability academies via Guild Academy.
