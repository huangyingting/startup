            body: |
              Guild's most visible customer proof comes from a set of Fortune 100 brands that have made
              public announcements about their education benefit programs powered by Guild. Walmart's
              "Live Better U" (LBU) program is the marquee example: initially launched in 2018 with Guild,
              expanded in June 2022 to cover 100% of tuition and fees for all hourly associates pursuing
              college degrees, and serving more than 1.4 million Walmart US store and supply chain
              associates as the eligible population. Chipotle's "Cultivate Education" program launched in
              April 2019; by June 2021, Chipotle reported that 500 associates had completed degree programs
              in the program's first two years. Target's "Dream Big, Dream Machine" program covers 175+
              programs at Guild's partner universities for its store and supply chain workers. Hilton
              announced its Guild partnership in 2019 for debt-free bachelor's and associate degrees.

              Taco Bell, Lowe's, Sherwin-Williams, PNC Bank, and Charter Communications (Spectrum) are
              additional publicly disclosed employer partners. Spectrum was added in April 2025 as the
              newest partner. Offsetting these additions, Disney ended its "Aspire" Guild-powered program
              in September 2024, and Macy's terminated its Guild partnership in January 2025 after a
              multi-year run. These terminations are material signals of the durability risk in Guild's
              client base, particularly as enterprises evaluate cost-effectiveness relative to lower-cost
              alternatives and competitor platforms. The broader adoption trajectory shows rapid growth from
              2018 through 2022, followed by a marked deceleration. Sacra estimates revenue grew from
              ~$200M in 2022 to ~$261M in 2023 to ~$275M in 2024, implying a growth slowdown from ~25%
