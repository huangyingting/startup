  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: |
              Guild operates a dual-sided revenue model that generates fees from both employer clients and
              education providers. On the employer side, Guild charges platform subscription fees based on
              the size of the employer's workforce enrolled in Guild's program and the scope of services
              used (education benefit administration, career coaching, talent analytics). Larger employers
              pay meaningfully higher platform fees; Sacra estimated an average revenue per employer of
              approximately $550,000, which across ~500 employer clients implies the ~$275M FY2024 revenue
              total. On the education provider side, Guild collects a revenue-share from partner universities
              and education programs — providers pay Guild a percentage of tuition revenue generated through
              the Guild platform. This dual monetization structure is analogous to a marketplace model:
              Guild provides value to both sides (employee access for providers; benefit administration and
              talent data for employers) and captures a portion of the economic value created on each side.

              The Guild Grow Global expansion (launched 2023), which extends the platform to employer workforces
              in Canada, Mexico, India, and the UK, provides an incremental revenue growth vector beyond Guild's
              historically US-only market. The Guild Academy (launched October 2024 via Nomadic Learning
              acquisition) adds a third revenue stream: cohort-based corporate learning programs sold directly
              to large employers (e.g., Microsoft, Accenture) as capability academies, separate from the
              tuition-benefit-administration model. Guild Talent Advantage (launched October 2024) also has
              potential to add a premium analytics subscription tier, though this monetization strategy has not
              been publicly confirmed. Revenue growth decelerated significantly after 2022 — from ~70%+ CAGR
              in 2020–2022 to an estimated ~6% in 2023–2024 — primarily reflecting the softening of the labor
              market (which drove original Guild adoption) and the layoff-driven reduction in employer headcount
              that reduced billable activity per contract.
