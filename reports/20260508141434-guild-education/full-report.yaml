      - number: '8.3'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              The bull case requires Navigator adoption to reaccelerate revenue growth to 15-20% by 2026, driven by
              employer willingness to expand from tuition benefit management to integrated talent intelligence
              platforms. In this scenario, Guild achieves approximately $350-400M in 2026 revenue with improving EBITDA
              margins, supporting an 11-12x EV/Revenue multiple (justified by SaaS-like retention and switching costs)
              and enterprise value of $3.5-4.5B, representing 2-3x on a $1.5-2B entry. The base case assumes revenue
              growth stabilizes at 8-12% with Navigator providing incremental upsell to existing clients but no large
              net-new enterprise signings, reaching approximately $310-330M in 2026 revenue at a 7-9x multiple, implying
              enterprise value of $2.2-3.0B. The bear case models continued macro benefit program cuts (following
              Disney/Macy's), Walmart migration toward Workforce Edge, and Navigator failing to differentiate
              sufficiently, resulting in flat-to-declining revenue of $250-275M with multiple compression to 4-5x
              (distressed private company range), implying enterprise value of $1.0-1.4B and potential down-round or
              restructuring scenario. Probability weights: bull 20%, base 55%, bear 25%, producing a
              probability-weighted EV of approximately $2.1-2.4B. Given the $584M raised and preference stack, common
              equity value is correspondingly lower; investors in secondary markets or a new round should negotiate
              preference resets or protection provisions.
            claimRefs: []
