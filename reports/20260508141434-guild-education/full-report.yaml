      - number: '5.3'
        title: Education Provider Ecosystem
        blocks:
          - type: paragraph
            body: >
              Guild's provider ecosystem is a core competitive asset: the company has curated a network of 70+
              accredited universities and learning providers spanning online degree programs, vocational certifications,
              professional credentials, and executive education. Major education partners include Southern New Hampshire
              University, Purdue University Global, University of Phoenix, eCornell (Cornell University), LSU Online,
              Wilmington University, and Penn Foster, among others. The Wharton Online partnership (University of
              Pennsylvania) added executive education programs including AI for Business and Digital Leadership —
              extending Guild's addressable audience from frontline workers to senior managers at partner companies such
              as JPMorganChase.

              Guild manages program quality through a vetting process that screens providers on accreditation status,
              completion rates, employer-aligned curriculum, and learner experience. The 2,000+ program catalog spans
              138 fields of study, with 80% of degree and certificate learners enrolled in business-aligned programs in
              2024. Healthcare programs grew 45% year-over-year to over 400 programs, reflecting deliberate vertical
              expansion into the healthcare workforce shortage market. Provider economics are revenue-share based: Guild
              takes a percentage of tuition when employees enroll, aligning Guild's incentives with learner enrollment
              rather than superficial benefit utilization.

              The Nomadic Learning acquisition added a corporate content library and capability academy platform focused
              on leadership development, AI fluency, and organizational capability building. Nomadic's cohort-based
              model — used by the Josh Bersin Academy and other enterprise clients — is now integrated into Guild
              Academy, which has attracted Microsoft and Accenture as clients, marking Guild's entry into the broader
              enterprise L&D market beyond traditional tuition administration. Over 300,000 learners have participated
              in Guild Academy programs since launch.
