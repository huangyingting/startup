      - number: '8.4'
        title: Recommendation, Diligence Asks, and Exit Readiness
        blocks:
          - type: paragraph
            body: >
              The research evidence supports a CONDITIONAL INVEST recommendation at an implied EV entry price not
              exceeding $2.0B, contingent on data room validation of three thesis-confirmation items: (1) audited
              financials demonstrating that operating losses narrowed materially in 2024, (2) employer NPS above 40 and
              contract renewal rates above 85% confirming that the post-layoff service quality has not degraded, and (3)
              Walmart multi-year contract renewal confirmation without Workforce Edge carve-out provisions. Confidence
              in the positive recommendation is MEDIUM (approximately 35%) given the volume of unresolved evidence gaps.
              Risk rating is HIGH due to execution risk, client concentration, and the lack of public financial
              disclosure. Exit readiness for Guild at current trajectory is LOW for a near-term IPO (market conditions,
              growth deceleration, and multiple compression make a public offering difficult to underwrite); MEDIUM for
              strategic M&A acquisition by a corporate learning platform (SAP SuccessFactors, Oracle HCM, Workday
              Learning, or LinkedIn Learning expanding employer benefit integration); and MEDIUM-HIGH for a secondary
              structured liquidity process that would enable investors from 2022 vintage to exit at below-peak pricing.
              The most value-accretive outcome for common equity holders is Navigator platform acceleration combined
              with employer contract expansion, validated by two consecutive quarters of 12%+ revenue growth. Any new
              financing at below $1.5B implied EV would constitute a thesis-break event and require full re-evaluation.
