      - number: '7.4'
        title: Financial, Execution, and People Risk
        blocks:
          - type: paragraph
            body: >
              Guild's financial risk profile is shaped by limited public disclosure combined with visible signals of
              restructuring. Sacra estimates Guild's 2024 revenue at approximately $275M, representing roughly 6% growth
              from approximately $261M in 2023, a significant deceleration from the rapid growth that supported the
              $4.4B Series F valuation in 2022. The company has raised approximately $584M in total equity with no new
              external financing since June 2022, suggesting either approaching profitability or reliance on existing
              cash reserves. Secondary market pricing implies a current enterprise value of $1.5-2B, a 55-65% decline
              from peak. The CEO transition represents the most acute near-term execution risk: Bijal Shah joined as COO
              in 2022 and ascended to CEO in April 2024 following Rachel Romer's health crisis, giving him approximately
              two years of operational familiarity with Guild's model. The CNBC changemaker profile from February 2025
              suggests external credibility, but Shah must execute a profitability pivot while maintaining commercial
              momentum. Revenue concentration among top employers creates non-linear churn sensitivity where losing a
              top-five client could disproportionately impact reported growth rates. Countercyclical macro risk is real
              given that Disney and Macy's terminations occurred during corporate cost-reduction cycles rather than from
              product dissatisfaction. Monitoring signals include net employer logo retention, revenue growth rate,
              headcount trajectory, and any renewed financing activity signaling a strategic pivot or investor
              recapitalization event.
            claimRefs: []
