  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Platform Overview
        blocks:
          - type: paragraph
            body: >
              Guild's product platform has evolved from a point solution for tuition reimbursement administration into a
              multi-layer workforce education and career development ecosystem. The core Learning Marketplace connects
              employees at Fortune 500 companies to more than 2,000 accredited programs across 138 fields of study —
              from high school completion through bachelor's degrees, professional certifications, and executive
              education. Employers configure custom education benefit packages that align program access to workforce
              strategy, and Guild handles the full administrative stack: enrollment, coaching, direct-bill tuition
              payment, and outcome reporting. The platform served 1.4 million employees in 2024, with 60,000 completions
              and over $1 billion in tuition savings delivered.

              Career Coaching provides 1:1 personalized academic advising and career navigation throughout each
              learner's program journey. Career Pathways (2024) maps learning programs to specific in-demand roles,
              creating structured progression ladders — connecting, for example, a retail store associate to a supply
              chain analyst path. Guild Navigator, in early access as of 2025, builds licensed-role pipelines for
              credentialed positions such as Certified Nursing Assistant, Medical Assistant, and Commercial Driver's
              License. The Talent Advantage platform and Lightcast partnership add data-driven workforce analytics,
              enabling employers to benchmark workforce resilience and skill gaps against labor market peers. Guild's
              revenue model is transaction-based: it takes a percentage of tuition when employees enroll in programs,
              aligning its incentives with learner enrollment volume rather than superficial utilization.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
