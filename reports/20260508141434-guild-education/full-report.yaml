    data:
      nodes:
        - label: |-
            Market Structure
            ($26B+ TAM; Section 127 anchor)
          note: Bipartisan regulatory durability; structural subsidy creates enterprise demand
        - label: |-
            Product Moat
            (500+ employers; 150+ institutions)
          note: Multi-sided network switching costs; Navigator adds talent intelligence layer
        - label: |-
            Financial Risk
            (6% growth; unknown burn; $584M raised)
          note: Deceleration and opacity create uncertainty; secondary EV at $1.5-2B
        - label: |-
            Execution Risk
            (CEO transition; two RIFs; churn)
          note: Disney/Macy's exits; Walmart concentration; post-layoff quality risk
        - label: |-
            Comparable Valuation
            (7-9x base; $2.3-2.9B base EV)
          note: In-line with PE software precedents; below peak but above distressed floor
        - label: |-
            Data Room Gates
            (P1 conditions unresolved)
          note: Financials, Walmart contract, and NPS must be confirmed before commitment
        - label: |-
            CONDITIONAL INVEST
            (at EV ≤ $2.0B)
          note: Medium confidence (35%); High risk; 1.5-2.5x base return target
