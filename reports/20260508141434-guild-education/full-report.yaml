  - id: FV001
    title: Recommendation logic
    slug: recommendation-logic
    type: flow
    description: >
      Decision flow showing how evidence on market, product, financials, risks, and comparable analysis combines to
      produce a conditional investment recommendation for Guild Education
    claimRefs:
      - CV001
