  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base and Segmentation
        blocks:
          - type: paragraph
            body: |
              Guild's customer base consists of large Fortune 500 and near-Fortune-500 employers with
              minimum employee populations in the tens of thousands, predominantly in industries that
              combine high workforce turnover with strong regulatory or competitive incentives to retain
              and upskill hourly and front-line workers. The five core verticals served are retail and
              e-commerce, food service and quick-service restaurants, healthcare and hospitals,
              hospitality and travel, and financial services/banking. These sectors share a structural
              tailwind: BLS data shows that workers with some postsecondary education earn 17–25%
              higher wages and experience meaningfully lower unemployment than workers with a high school
              diploma only, creating a credible ROI narrative for employers that subsidize education.

              Guild's buyer is the VP/Director of Benefits or Chief People Officer at a large employer;
              the user is the hourly or mid-career employee who enrolls in programs; and the economic
              payer is the employer (often self-insured) who funds tuition through Guild's direct-bill
              infrastructure. The geographic concentration is almost entirely US-based, though Guild
              Grow Global has begun expanding benefits administration to Canada, Mexico, India, and the UK.
              Guild does not publicly disclose revenue by vertical or a systematic client list, so the
              segmentation in this chapter is reconstructed from press releases, analyst reports (Sacra,
              Contrary Research), and news coverage of individual partnerships. The company's self-reported
              "500+ employer clients" and "1.4 million employees engaged" figures are the primary scale
              anchors; all sub-segment breakdowns are estimates.
