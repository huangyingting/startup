      - number: '4.2'
        title: Unit Economics and Margin Structure
        blocks:
          - type: paragraph
            body: |
              Guild's unit economics are characterized by: high customer acquisition costs typical of
              enterprise sales (CAC), moderately high gross margins on the platform subscription component,
              and lower gross margins on the education provider revenue-share component (as provider tuition
              payments are pass-through costs). The career coaching layer is a meaningful COGS item: Guild
              employs hundreds of career coaches, and each coaching interaction has a marginal cost that
              scales with employer engagement rates. No audited gross margin data is publicly available;
              analyst estimates for platform-like EdTech businesses suggest gross margins in the 50–70% range
              for software/subscription components and 20–40% for marketplace/revenue-share components.

              The Sacra-estimated average revenue per employer of ~$550K implies meaningful lifetime value
              (LTV) per customer if retention is high; however, the Macy's and Disney departures (2024–2025)
              and the reported Walmart displacement suggest that employer churn exists even among major clients.
              Guild's stated 1.4M+ employee learner journeys in 2024 represents a key engagement metric;
              however, engagement rate (active learners as a percentage of total enrolled employees) and
              completion rate (employees who complete a degree or certification) are not publicly disclosed.
              Course completion is the event that triggers education provider tuition payments, creating a
              variable cost structure tied directly to learner success — which has a positive social externality
              but creates margin pressure if completion rates rise faster than platform fee growth.

              The two rounds of layoffs (estimated 300 employees in 2022, approximately 300 employees in
              May 2024) suggest Guild has taken structural cost reduction actions to improve unit economics
              and extend runway. These actions reduced headcount from an estimated peak of ~1,100 employees
              (2022) to approximately 500–600 employees (2025 estimate), a significant reduction in fixed
              cost infrastructure that likely improved the EBITDA trajectory even as revenue growth slowed.
