    title: Investment KPIs
    slug: investment-kpis
    type: kpi
    description: >
      Key performance indicators for Guild Education's investment thesis, scored across market, product, financial,
      team, and competitive dimensions
    claimRefs:
      - CV007
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV016
      - CV017
    data:
      items:
        - label: Market Opportunity
          value: 4 / 5
          detail: >
            $26B employer education market; IRS Section 127 regulatory durability; bipartisan support; long-term TAM
            expansion possible via workforce intelligence adjacency
          claimRefs:
            - CV007
        - label: Product and Platform Moat
          value: 3 / 5
          detail: >
            Multi-sided network with 500+ employers and 150+ institutions; Navigator adds switching costs; Workforce
            Edge co-founding by Walmart is a partial moat disconfirmation
          claimRefs:
            - CV008
        - label: Financial Health
          value: 2 / 5
          detail: >
            Revenue estimated at $275M with only 6% growth; no disclosed financials; $584M raised with no equity since
            2022; burn and runway unknown; secondary market at 55% below peak
          claimRefs:
            - CV004
        - label: Team and Execution
          value: 3 / 5
          detail: >
            Shah has Guild COO experience; CNBC changemaker 2025; two sequential RIFs reduce confidence; HBS case
            documented growth management challenges
          claimRefs:
            - CV013
        - label: Competitive Position
          value: 3 / 5
          detail: >
            First-mover advantage in managed employer education; under direct threat from Workforce Edge; InStride and
            Bright Horizons as alternative vendor options
          claimRefs:
            - CV014
        - label: Valuation Attractiveness
          value: 3 / 5
          detail: >
            Secondary market at 7-8x 2024 revenue is reasonable vs. PE precedents; not deeply discounted vs. public
            comps; preference overhang reduces common equity upside
          claimRefs:
            - CV003
