      - number: '8.2'
        title: Valuation Context and Comparable Analysis
        blocks:
          - type: paragraph
            body: >
              Guild's last external financing was a $175M Series F in June 2022 at a $4.4B post-money valuation ($3.725B
              from the Series E in June 2021), implying approximately 16x forward revenue at peak. Total equity raised
              is approximately $584M across seven financing rounds since 2015, with major institutional investors
              including General Atlantic, Bessemer Venture Partners, and Oprah Winfrey's media vehicle. No public equity
              round has occurred in nearly three years, and secondary market platforms suggest trading at $1.5-2B
              implied EV. The absence of new financing amid two large-scale restructurings raises legitimate questions
              about burn trajectory and whether the company is profitable or reliant on existing cash reserves. Public
              comparables for Guild are imperfect: Coursera trades at approximately 4-5x forward revenue; Udemy at 3-4x;
              Chegg has collapsed due to generative AI disruption of its tutoring model. Private HR tech analogues
              include Cornerstone OnDemand (taken private at approximately 9.6x revenue) and Degreed (last valued at
              approximately $4B on smaller revenue). M&A precedents include Pluralsight (PE take-private at
              approximately 6x revenue) and LinkedIn Learning (Microsoft acquisition at implied premium). For a company
              with Guild's revenue scale (~$275M), decelerated growth (~6%), and structural uncertainty, a 7-9x
              EV/Revenue multiple represents a reasonable base case range, implying enterprise value of $1.9-2.5B. Entry
              discipline requires assuming at least 20-30% preference overhang from the $584M raised, which affects
              common equity value.
