      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: |
              Guild has raised approximately $584 million in total venture funding since its founding in 2015. The
              company's funding trajectory followed a classic hypergrowth arc: early institutional rounds from
              Bessemer Venture Partners, rapid Series D and E rounds during the 2020–2021 ZIRP and pandemic-era
              EdTech boom, and a final Series F in June 2022 at a $4.4 billion post-money valuation — one of the
              highest valuations ever reached by a Denver-based startup and a high-water mark for the employer-
              sponsored learning market.

              The landmark funding rounds include the Series E ($150M, June 2021, ~$3.75B valuation) led by
              General Atlantic with participation from Bessemer, Salesforce Ventures, and others; and the Series F
              ($175M, June 2022, $4.4B post-money) led by Wellington Management with participation from Oprah
              Winfrey, Bon Secours Mercy Health, Citi Impact Fund, and Bessemer Venture Partners. Inside Higher Ed
              and CNBC reported extensively on each round's valuation milestones.

              No new primary capital has been raised since June 2022 — approximately four years as of the report
              date. The secondary market implied valuation as of 2024 is estimated at $1.5–2B, representing a
              55–65% decline from the $4.4B peak. Sacra estimates Guild's 2023 revenue at ~$261M and 2024 revenue
              at ~$275M, suggesting single-digit percentage growth — well below what would support a return to
              peak valuation multiples. Guild remains private and has disclosed no public information about
              profitability, EBITDA, or cash runway. The absence of new primary funding raises capital adequacy
              questions explored in Chapter 4.
