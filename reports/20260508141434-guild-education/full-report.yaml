      - number: '6.3'
        title: Retention, Durability, and Client Renewal
        blocks:
          - type: paragraph
            body: |
              Guild does not publicly disclose Net Revenue Retention (NRR), Gross Revenue Retention (GRR),
              average contract length, or employer client renewal rates. The absence of these metrics is a
              significant gap for investment diligence, especially given the reported client losses. Based
              on press coverage, analyst commentary, and inference from growth rates, client retention
              signals are mixed. On the positive side, Guild's Brandon Hall-endorsed 2025 Analyst Day
              highlighted multi-year contract structures and employer ROI case studies showing attrition
              reduction among program participants vs. control groups. Sacra and Contrary Research both
              note that Guild's direct-bill model creates switching costs — employers cannot easily
              replicate the curated provider network, billing infrastructure, and coaching workforce
              in-house without material investment.

              On the adverse side, Disney and Macy's departures, Walmart's Workforce Edge experiment,
              and the two rounds of Guild layoffs (172 in May 2023, ~300 in May 2024) point to a
              deteriorating retention picture. WorkLife News reported that the 2024 layoffs were driven
              partly by client-side program reductions and slower-than-expected new client acquisition.
              Gallup's workforce research is instructive: only 31% of US workers are engaged, suggesting
              that employee engagement benefits like education programs are increasingly table stakes in
              competitive labor markets, but also that employers are scrutinizing all benefit spend. HBR
              research on tuition reimbursement suggests that the employer ROI case is strong in theory
              but requires consistent program promotion and managerial support to drive utilization
              above 10-15% of eligible employees — a utilization threshold Guild itself does not disclose.
