      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Guild was co-founded in June 2015 by Rachel Romer (formerly Rachel Romer Carlson) and Brittany Stich.
              Rachel Romer is the granddaughter of former Colorado Governor Roy Romer and came to Guild from an
              education policy background at the Lumina Foundation and related nonprofits. She served as CEO from
              founding and was the primary public face through the company's high-growth period, leading fundraising
              from Bessemer Venture Partners, Oprah Winfrey, and Wellington Management, among others. Under her
              leadership Guild grew from a Denver startup to a $4.4B-valued unicorn by June 2022.

              In August 2023, Rachel Romer suffered a severe stroke that required extended medical leave; she
              ultimately resigned as CEO while remaining on the Board of Directors. Masters of Scale and multiple news
              outlets reported on Bijal Shah's role in stabilizing the company during this period. Shah, who joined
              Guild in 2018 as Chief Experience Officer and had previously held leadership roles at Teach For America
              and other education-adjacent organizations, was formally appointed CEO on April 2, 2024, after serving
              as acting CEO during the transition.

              Shah's leadership has been controversial internally. Glassdoor data captured in October 2024 showed her
              CEO approval rating at approximately 37%, significantly below industry norms. The Higher Education
              Inquirer and Colorado Sun both reported employee complaints about workplace culture, aggressive
              restructuring, discrimination allegations, and poor communication during the back-to-back layoff cycles
              of 2023 and 2024. The Josh Bersin Company and Brandon Hall Group offered more constructive assessments
              of Shah's strategic direction following the October 2024 Guild Talent Advantage analyst day. Guild's
              Board includes representation from major investors including Wellington Management and Bessemer Venture
              Partners, as well as Oprah Winfrey who invested in the Series F round.
