chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Guild PBC (operating brand: Guild, formerly Guild Education) is a Denver, Colorado-based workforce
              education technology company incorporated as a Delaware Public Benefit Corporation. Guild operates a
              three-sided marketplace connecting large employers, a curated network of 70+ higher education and
              training providers, and front-line and mid-career employees who receive educational benefits at no
              out-of-pocket cost. The company was founded in June 2015 and is headquartered at Republic Plaza,
              Denver, CO.

              Guild's business model generates revenue from two sides. Employers pay Guild a platform subscription
              fee scaled to employee headcount, and Guild earns a share of tuition that flows from employers to
              education providers through its billing infrastructure. Education providers pay Guild a referral or
              revenue-share fee when enrolled employees complete courses or credentials. The net result is that
              employees access degree programs, certificates, and skill credentials for free while Guild captures
              employer-side and provider-side economics simultaneously. IRS Section 127 permits employers to provide
              up to $5,250 per year per employee in tax-free educational assistance, making the benefit cost-effective
              from an employer tax standpoint and structurally embedded in US compensation law.

              Guild targets employers with 10,000 or more employees where platform revenue potential exceeds $1M
              annually. Major employer clients include Walmart (Live Better U), Target, Chipotle, Lowe's, Taco Bell,
              Discover Financial, Hilton, PepsiCo, Tyson Foods, Providence Health, PNC Bank, and JPMorganChase. In
              October 2024, Guild rebranded its platform as Guild Talent Advantage, adding AI-powered talent
              insights, career pathways, and a cohort-based learning product (Guild Academy) built on the acquisition
              of Nomadic Learning. The company serves 500+ employer clients and offers 2,000+ learning programs
              across 100+ fields as of 2025.
