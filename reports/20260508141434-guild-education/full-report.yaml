      - number: '7.2'
        title: Regulatory and Legislative Risk
        blocks:
          - type: paragraph
            body: >
              The structural dependency on IRS Section 127 is Guild's most consequential regulatory risk. The provision
              grants employees up to $5,250 per year in tax-free employer-paid education benefits and has provided a
              stable legislative basis for Guild's entire market since 2001. While the cap has not been reduced or
              eliminated, any congressional proposal to restructure or means-test this benefit could materially contract
              demand across Guild's entire employer base. Mercer and AON analysis confirms the provision underpins
              roughly $26B in annual employer education spend, of which only a fraction flows through managed platforms
              like Guild. Beyond Section 127, Guild must navigate DOL ERISA compliance for certain structured benefit
              plan arrangements, FERPA privacy obligations arising from its data flows with partner universities, and an
              evolving patchwork of state data privacy laws including CCPA and state equivalents. State-level education
              program licensing requirements may also apply depending on program type and delivery format, though Guild
              largely relies on its partner universities to maintain applicable state approvals. No material litigation
              or regulatory enforcement actions against Guild have been publicly identified through SEC Form D searches
              or press records as of the research date, though the absence of disclosure does not constitute a clean
              legal bill of health; a formal data room review would be required to confirm absence of material exposure.
              Employment law risk arising from the 2023 and 2024 reduction-in-force events has not produced any known
              class action filings as of the research date based on available public records.
            claimRefs: []
