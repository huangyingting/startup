companyProfile:
  summary: |
    Guild Education (legally Guild PBC, a Delaware Public Benefit Corporation) is a Denver-based
    workforce education and talent development company founded in June 2015 by Rachel Romer
    (formerly Rachel Romer Carlson) and Brittany Stich. Guild operates a three-sided marketplace
    connecting enterprise employers, education and skilling providers, and frontline and hourly
    workers through employer-sponsored tuition benefit management. Employers pay platform fees;
    education institutions pay a revenue-share on enrolled students; and employees access
    degree and certificate programs at no out-of-pocket cost. The platform serves 500+ employer
    clients including Walmart (Live Better U), Chipotle, Lowe's, and Hilton, with 150+ education
    partners including Arizona State University and Southern New Hampshire University. Guild
    launched Navigator in 2024 — an AI-powered workforce intelligence platform integrating
    career pathing, skills gap analysis, and talent pipeline management — and acquired Nomadic
    Learning (professional development) to expand beyond tuition benefit administration. Bijal
    Shah became CEO in April 2024 following Rachel Romer's departure due to health issues. Guild
    executed two sequential workforce reductions (approximately 12% in May 2023; approximately
    25% in May 2024), reducing headcount to approximately 900. The company last raised primary
    equity in June 2022 (Series F, $175M at $4.4B); total capital raised is approximately $584M.
    Revenue is estimated at $275M for FY2024 with approximately 6% growth from $261M in FY2023.
    Secondary market implies a current EV of $1.5-2B, a 55-65% compression from the Series F peak.
