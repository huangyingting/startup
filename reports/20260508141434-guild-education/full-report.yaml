      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: |
              Estimating Guild's addressable market requires triangulating three complementary lenses: top-down
              employer education spend, bottom-up employer count and contract value, and peer-company revenue
              benchmarks.

              Top-down lens: US employers collectively spend an estimated $26–28 billion annually on tuition
              assistance and employer-sponsored education, per Lumina Foundation and SHRM estimates. Of this,
              the employer-pay-upfront, technology-intermediated segment (Guild's model) represents a fraction,
              as most employers still operate traditional reimbursement programs. If 20–30% of the $28B market
              could be captured by platforms like Guild over time, that implies a long-run US TAM of $5.6–8.4B
              for tech-enabled employer-sponsored learning platforms.

              Bottom-up lens: Guild targets large employers with 10,000+ employees. The US has approximately
              900 employers with 10,000+ employees (per BLS data). At an average annual contract value of $1–2M
              for a fully penetrated account, the reachable SAM from this segment is roughly $900M–$1.8B in
              annual platform revenue. At 500 active clients (Guild's reported client count), and assuming
              ~$550K average revenue per employer (derived from Sacra's ~$275M estimate divided by 500 clients),
              current revenue implies Guild is capturing roughly 0.03–0.06% of the total $28B spend market.

              SOM: Guild's current estimated revenue of ~$275M (FY2024) represents its realized SOM. Near-term
              SOM expansion will depend on deepening penetration within existing accounts (seat expansion) and
              adding new enterprise clients. If Guild can grow to 700–800 employer clients at average contract
              values of $600–800K, near-term SOM could reach $420–640M. The global L&D market of $300B+ is
              largely out of scope for current Guild economics but represents long-term optionality via Guild
              Talent Advantage and Guild Academy's enterprise learning expansion.
