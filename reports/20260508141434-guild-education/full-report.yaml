  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Guild's addressable market narrows from a $300B+ global corporate L&D total through the $28B US employer tuition
      assistance market to a $900M–$1.8B SAM for large employers, with Guild's current ~$275M revenue representing its
      realized SOM.
    data:
      nodes:
        - label: Global Corporate L&D ($300B+)
          note: Total global employer training, content, and platform spend; Training Magazine/Conference Board
        - label: Global Online Education ($185B)
          note: All modalities of online learning globally; Statista 2024 estimate; growing to $279B by 2029
        - label: US Employer Tuition Assistance (~$28B)
          note: Annual employer spend on tuition assistance and education benefits in the US; Lumina/SHRM
        - label: Guild SAM (~$900M–$1.8B)
          note: Large US employers (10,000+ employees) × $1–2M average platform revenue potential (estimated)
        - label: Guild SOM (~$275M–$500M)
          note: Current ~$275M revenue (Sacra) + near-term expansion to 700–800 clients; not company-confirmed
