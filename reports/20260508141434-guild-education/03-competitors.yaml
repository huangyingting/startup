  claims:
    - id: CP001
      statement: >-
        Guild's competitive landscape includes four categories: direct employer-sponsored learning platform peers
        (InStride, Workforce Edge), legacy benefit administrators (EdAssist), learning experience platforms expanding
        into tuition (Degreed, Cornerstone), and internal employer build alternatives (Amazon Career Choice, Workforce
        Edge).
      type: observed
      topic: competitive-landscape
      sourceRefs:
        - SP009
        - SP010
        - SP011
      confidence: high
      freshness: current
    - id: CP002
      statement: >-
        Bright Horizons EdAssist serves 72 of the Fortune 100 companies as a tuition benefit administrator, giving it a
        deeply entrenched legacy position in the large-employer market that Guild must displace in new enterprise sales.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP003
        - SP004
      confidence: high
      freshness: current
    - id: CP003
      statement: >-
        The competitive intensity in the employer-sponsored education market is increasing, with EdAssist's established
        base, Workforce Edge's reported Walmart win, and Degreed's LXP expansion all representing material competitive
        threats to Guild.
      type: inferred
      topic: competitive-landscape
      sourceRefs:
        - SP007
        - SP009
      confidence: medium
      freshness: current
    - id: CP004
      statement: >-
        Guild's market position has been challenged by adverse events including reported Walmart client displacement by
        Workforce Edge, Macy's program termination, and Disney benefit reduction, collectively weakening Guild's
        flagship client reference story.
      type: observed
      topic: competitive-risk
      sourceRefs:
        - SP007
        - SP016
      confidence: medium
      freshness: current
    - id: CP005
      statement: >-
        InStride (founded 2019, USC spinout) operates a similar employer-sponsored education platform model to Guild,
        with approximately 80 university partnerships and clients including American Airlines, PwC, and Uber; InStride
        has raised approximately $90M.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP001
        - SP002
      confidence: medium
      freshness: current
    - id: CP006
      statement: >-
        Workforce Edge is a Walmart-internal employer learning platform that reportedly displaced Guild at Walmart's
        Live Better U program; Workforce Edge is not commercially available to other employers and represents an
        insourcing risk model.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP007
        - SP022
      confidence: medium
      freshness: recent
    - id: CP007
      statement: >-
        Degreed raised $153M in a Series E in August 2021 at a $1.4B valuation; the company has since had layoffs and
        faces valuation compression similar to Guild, but retains significant capital and an established LXP client
        base.
      type: observed
      topic: competitor-profile
      sourceRefs:
        - SP005
        - SP015
      confidence: high
      freshness: recent
    - id: CP008
      statement: >-
        Cornerstone OnDemand is a full talent management suite with approximately $900M in revenue; it competes with
        Guild in the corporate learning segment through its Cornerstone Learning module but is not a degree-pathway
        specialist.
      type: observed
      topic: competitor-profile
      sourceRefs:
        - SP006
      confidence: medium
      freshness: current
    - id: CP009
      statement: >-
        Amazon Career Choice is an internal employer tuition benefit that covers education and training for Amazon
        warehouse and operations employees; it is not a commercially available platform but represents the risk of
        mega-employer insourcing.
      type: observed
      topic: competitor-profile
      sourceRefs:
        - SP014
      confidence: medium
      freshness: current
    - id: CP010
      statement: >-
        Guild's key differentiators include the employer-pay-upfront model, a curated provider network of 70+
        institutions with 2,000+ programs, 1:1 career coaching, and the Guild Talent Advantage AI analytics platform
        (launched October 2024).
      type: company-claimed
      topic: competitive-differentiation
      sourceRefs:
        - SP012
        - SP017
      confidence: high
      freshness: current
    - id: CP011
      statement: >-
        Guild lacks a full LXP or skills framework that would allow employers to manage all learning in one platform;
        Degreed and Cornerstone have this breadth while Guild remains specialized in the degree/certificate pathway.
      type: inferred
      topic: competitive-gap
      sourceRefs:
        - SP009
        - SP010
      confidence: medium
      freshness: current
    - id: CP012
      statement: >-
        The Nomadic Learning acquisition added cohort-based corporate learning (Guild Academy) to Guild's platform, with
        clients including Microsoft and Accenture, enabling Guild to compete in the capability academy market against
        Degreed and Cornerstone.
      type: observed
      topic: competitive-differentiation
      sourceRefs:
        - SP012
        - SP013
      confidence: high
      freshness: current
    - id: CP013
      statement: >-
        Guild's Guild Talent Advantage AI analytics platform, launched October 2024, is a nascent differentiator; its
        employer value proposition (talent insights from 1.4M+ learner journeys) has not yet been independently
        validated.
      type: observed
      topic: competitive-differentiation
      sourceRefs:
        - SP009
        - SP013
      confidence: medium
      freshness: current
    - id: CP014
      statement: >-
        The Lightcast partnership (January 2025) adds credentialed skills reporting to Guild's platform, strengthening
        its talent analytics capability relative to competitors that cannot offer employer-level skills tracking tied to
        actual educational outcomes.
      type: observed
      topic: competitive-differentiation
      sourceRefs:
        - SP024
      confidence: medium
      freshness: current
    - id: CP015
      statement: >-
        Guild's structural competitive moats include HRIS/payroll billing integration creating switching costs, the
        curated provider network, the career coaching layer, and the emerging Guild Talent Advantage data moat from
        1.4M+ learner journeys.
      type: inferred
      topic: competitive-moat
      sourceRefs:
        - SP009
        - SP010
      confidence: medium
      freshness: current
    - id: CP016
      statement: >-
        The Walmart Workforce Edge displacement represents Guild's highest-severity competitive risk: Walmart was
        Guild's largest historical client, its flagship employer reference, and loss of the contract would significantly
        impair Guild's employer acquisition narrative.
      type: third-party-reported
      topic: competitive-risk
      sourceRefs:
        - SP007
        - SP008
      confidence: medium
      freshness: recent
    - id: CP017
      statement: >-
        InStride has replicated a comparable provider network to Guild (~80 universities vs. Guild's 70+ institutions),
        suggesting that the provider network moat is time-limited rather than structurally permanent.
      type: observed
      topic: competitive-moat
      sourceRefs:
        - SP001
        - SP002
      confidence: medium
      freshness: current
    - id: CP018
      statement: >-
        Macy's and Disney departures from Guild's platform demonstrate that employer switching costs are insufficient to
        retain budget-constrained employers, weakening the relational moat narrative.
      type: observed
      topic: competitive-risk
      sourceRefs:
        - SP016
        - SP007
      confidence: medium
      freshness: current
    - id: CP019
      statement: >-
        IRS Section 127 creates a structural incentive for employer-sponsored education broadly but is not a
        Guild-specific competitive advantage; it applies equally to EdAssist, InStride, Workforce Edge, and any other
        employer-sponsored platform.
      type: inferred
      topic: competitive-moat
      sourceRefs:
        - SP027
        - SP009
      confidence: high
      freshness: current
    - id: CP020
      statement: >-
        EdAssist's traditional reimbursement model (employee pays upfront, receives reimbursement after completion)
        creates a higher completion barrier for employees relative to Guild's employer-pay-upfront model, which is a
        genuine differentiator for front-line worker segments.
      type: observed
      topic: competitive-differentiation
      sourceRefs:
        - SP003
        - SP009
      confidence: medium
      freshness: current
    - id: CP021
      statement: >-
        Guild's FY2024 estimated revenue of ~$275M (Sacra) compares favorably to estimated InStride revenue (materially
        below $275M) and positions Guild as the clear revenue leader among pure-play employer-sponsored learning
        platform companies.
      type: estimated
      topic: competitive-scale
      sourceRefs:
        - SP010
        - SP017
      confidence: medium
      freshness: recent
    - id: CP022
      statement: >-
        Cornerstone OnDemand's acquisition by Clearlake Capital in 2022 and subsequent restructuring has redirected
        Cornerstone toward profitability; it remains a large-scale competitor with ~$900M revenue but has reduced
        investment in EdTech innovation relative to pre-acquisition.
      type: third-party-reported
      topic: competitor-profile
      sourceRefs:
        - SP006
      confidence: low
      freshness: recent
    - id: CP023
      statement: >-
        Guild's employer client base of 500+ represents a meaningful installed base but is concentrated in a handful of
        large public clients (Walmart, Chipotle, Target, Hilton) that represent the core of Guild's public reference
        story.
      type: inferred
      topic: competitive-risk
      sourceRefs:
        - SP017
        - SP011
      confidence: medium
      freshness: current
    - id: CP024
      statement: >-
        Josh Bersin's October 2024 analysis affirmed that Guild's Guild Talent Advantage positioned it as a serious
        competitor in the broader corporate learning market, but noted execution risk from the simultaneous product
        expansion and organizational restructuring.
      type: third-party-reported
      topic: competitive-positioning
      sourceRefs:
        - SP009
      confidence: medium
      freshness: current
    - id: CP025
      statement: >-
        CNBC's 2025 Changemakers profile of Bijal Shah reflects external validation that Guild is viewed as a
        competitive player in the workforce education market despite internal turbulence, with Shah credited for
        stabilizing the company post-Romer transition.
      type: third-party-reported
      topic: competitive-positioning
      sourceRefs:
        - SP026
      confidence: medium
      freshness: current
    - id: CP026
      statement: >-
        Degreed's Series E ($153M, $1.4B valuation, August 2021) combined with subsequent layoffs suggests that LXP
        market valuations have compressed significantly since the ZIRP era, creating parallel valuation challenges for
        Guild and its LXP competitors.
      type: observed
      topic: competitive-context
      sourceRefs:
        - SP005
        - SP015
      confidence: high
      freshness: recent
    - id: CP027
      statement: >-
        Bright Horizons (BFAM) is a publicly traded company with disclosed financial information for its EdAssist
        segment; its continued public company status gives EdAssist a capital stability advantage relative to Guild's
        private capital constraints.
      type: observed
      topic: competitive-risk
      sourceRefs:
        - SP003
        - SP004
      confidence: medium
      freshness: current
    - id: CP028
      statement: >-
        Guild's Guild Academy (launched via Nomadic Learning acquisition) has signed corporate learning clients
        including Microsoft and Accenture, providing Guild a revenue bridge into the enterprise capability academy
        market that previously belonged to Degreed and Cornerstone.
      type: third-party-reported
      topic: competitive-expansion
      sourceRefs:
        - SP012
        - SP013
      confidence: medium
      freshness: current
    - id: CP029
      statement: >-
        The employer-sponsored education market has seen multiple program terminations by Guild clients (Macy's January
        2025, Disney benefit reduction September 2024), creating negative market signals that weaken Guild's sales
        narrative for new employer acquisition.
      type: observed
      topic: competitive-risk
      sourceRefs:
        - SP016
        - SP007
      confidence: medium
      freshness: current
    - id: CP030
      statement: >-
        Degreed's layoffs in 2022 and ongoing valuation compression reflect a broader LXP market consolidation that may
        eventually reduce the competitive threat from LXP platforms adding tuition rails to their products.
      type: inferred
      topic: competitive-context
      sourceRefs:
        - SP005
        - SP015
      confidence: low
      freshness: recent
    - id: CP031
      statement: >-
        Guild's Brandon Hall analyst day (2025) positioned Guild Talent Advantage as an analytics platform with data
        from 1.4M+ employee learner journeys, a data asset that competitors without an equivalent employer-pay-upfront
        platform cannot easily replicate.
      type: third-party-reported
      topic: competitive-moat
      sourceRefs:
        - SP013
        - SP009
      confidence: medium
      freshness: current
    - id: CP032
      statement: >-
        EdAssist's traditional reimbursement model creates a completion barrier: employees who do not complete their
        degree forfeit the benefit, while Guild's employer-pay-upfront model shifts completion risk from the employee to
