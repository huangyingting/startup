  evidenceGaps:
    - type: conflicting-data
      severity: blocking
      topic: Walmart Live Better U contract status (Workforce Edge displacement)
      missingEvidence: >-
        Confirmation from Guild or Walmart of current Live Better U contract status; scope of Workforce Edge
        displacement
      whyItMatters: >-
        Walmart was Guild's largest historical client and flagship employer reference; displacement would be material to
        competitive narrative and revenue
      diligencePath: >-
        Request direct confirmation from Guild IR/sales leadership; review Walmart annual report employer benefit
        disclosures; conduct reference check with Walmart HR leadership
      relatedQuestionRefs:
        - QP006
        - QP012
        - QP023
        - QP027
    - type: private-evidence-only
      severity: material
      topic: Competitor profile table
      missingEvidence: >-
        InStride revenue, ARR, and employer client count; EdAssist revenue from EdAssist segment specifically; Degreed
        current ARR post-layoffs
      whyItMatters: >-
        Without competitor revenue data, Guild's market share position and competitive intensity cannot be precisely
        assessed
      diligencePath: >-
        Purchase competitor intelligence from PitchBook/Crunchbase; request InStride and Degreed information under NDA
        if available through investment banking channels
      relatedTableRefs:
        - TP001
    - type: missing-source
      severity: material
      topic: Moat durability / competitive risk register
      missingEvidence: >-
        Guild voluntary churn rate; contract termination clause terms and notice periods; customer retention data
        segmented by employer size and industry
      whyItMatters: Churn rate is the most direct measure of moat durability; without it, switching cost claims are unverifiable
      diligencePath: Request Guild churn rate and NPS data under NDA; review Guild's standard MSA for termination provisions
      relatedTableRefs:
        - TP004
      relatedQuestionRefs:
        - QP006
        - QP012
    - type: enumeration-incomplete
      severity: minor
      topic: Competitor profile table
      missingEvidence: Emerging or niche competitors (Valor Ed, LearnUp, EdCast/SAP, Guild competitors in international markets)
      whyItMatters: Additional emerging competitors could gain enterprise traction through lower pricing or AI-native product design
      diligencePath: Conduct comprehensive EdTech competitor scan using Crunchbase, G2, and HR analyst reports for 2024–2025 entrants
      relatedTableRefs:
        - TP001
