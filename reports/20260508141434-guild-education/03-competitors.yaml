      type: inferred
      topic: competitive-differentiation
      sourceRefs:
        - SP003
        - SP009
      confidence: medium
      freshness: current
    - id: CP033
      statement: >-
        Guild's Bijal Shah was named to CNBC's 2025 Changemakers list, reflecting external market recognition of Guild's
