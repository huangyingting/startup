      - Moat Claim
      - Threat
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - Employer-pay-upfront billing integration (HRIS/payroll)
        - EdAssist, Degreed, Workday Learning, SAP adding comparable billing infrastructure
        - Medium
        - Assess depth of Guild's HRIS integrations at major clients; ask for termination rate data
      - - Curated provider network (70+ institutions)
        - InStride has replicated comparable network (~80 universities); barrier is time, not capital
        - Medium
        - Verify exclusivity terms in provider agreements; assess program quality differentiation
      - - Career coaching (1:1 human support layer)
        - Human coaching is expensive and scalable AI alternatives are emerging; cost vs. value unclear
        - Low-Medium
        - Assess per-coaching-session unit economics; compare to AI coaching alternatives
      - - Guild Talent Advantage data moat (1.4M+ learner journeys)
        - Nascent (launched October 2024); not yet independently validated by employers
        - Low (early stage)
        - Verify employer usage rate of Talent Advantage analytics; NPS or retention correlation data
      - - Client concentration at Walmart (Live Better U)
        - Workforce Edge reportedly displaced Guild at Walmart; would eliminate flagship client and reference
        - High
        - Confirm current Walmart contract status directly; assess revenue concentration and contract terms
      - - IRS Section 127 structural positioning
        - Not a Guild-specific advantage; applies to all employer-sponsored education platforms equally
        - Low (not a moat)
        - No action required; monitor for Section 127 legislative changes
      - - Employer switching costs (multi-year contracts, HRIS integration)
        - Macy's and Disney departures suggest switching costs are not prohibitive for determined buyers
        - Medium
        - Request voluntary churn rate data; review contract termination clause terms and notice periods
