  - id: TP003
    title: Pricing / packaging comparison
    columns:
      - Competitor
      - Pricing Model
      - Typical Contract Structure
      - Known Pricing Signal
      - Implication for Guild
    rows:
      - - Guild
        - Platform subscription + provider revenue-share (employer-side + provider-side)
        - Multi-year enterprise contract; $1M+ for large accounts
        - ~$550K estimated average per employer (Sacra-derived); provider revenue-share undisclosed
        - Dual revenue stream provides structural advantage; but IRS cap limits per-seat intensity
      - - InStride
        - Platform subscription + university revenue-share
        - Enterprise contract; similar structure to Guild
        - Not publicly disclosed; estimated below Guild at ~$275M total revenue for smaller footprint
        - InStride may price aggressively to gain share; selective quality focus vs. Guild's breadth
      - - EdAssist
        - Per-employee PEPM (per employee per month) administration fee
        - Typically 1–3 year contracts; PEPM-based
        - Publicly not disclosed; estimated $2–5 PEPM for administration-only
        - Lower unit price than Guild for administration; but Guild's employer-pay-upfront is premium
      - - Degreed
        - SaaS subscription (per seat/per active learner)
        - Annual SaaS contract; LXP platform pricing
        - Estimated $20–50 per user per year for LXP (not tuition); total contract varies widely
        - Degreed competes on L&D platform not tuition payment; pricing is not directly comparable
      - - Cornerstone
        - Enterprise software licensing (SaaS)
        - Multi-year enterprise TMS contracts; $100K–$1M+ range
        - Publicly reported revenue ~$900M across full TMS suite
        - Cornerstone competes as a full talent suite; tuition is a feature not a core revenue driver
    notes: >-
      All pricing data except Guild's Sacra-derived estimate is unconfirmed and should be treated as order-of-magnitude
      approximations; actual negotiated contract values vary substantially by employer size, program scope, and
      competitive dynamics.
