  productSummary: |
    Guild's product suite spans three core layers: (1) Employer platform — tuition benefit
    administration, employee enrollment, compliance management, and employer analytics dashboard;
    (2) Guild Navigator — AI-powered workforce intelligence platform with career pathing, skills
    gap analysis, talent pipeline management, and employer-employee matching (launched 2024);
    (3) Education marketplace — curated catalog of 2,000+ learning programs from 150+ accredited
    institutions and skilling providers, with Nomadic Learning professional development integration.
    The platform serves both frontline/hourly worker populations (core historical use case) and
    professional/management development (Navigator expansion). Guild integrates with leading HRIS
    platforms including Workday, SAP SuccessFactors, and Oracle HCM.
  customerFocus: "B2B enterprise employers with 10,000+ employees; Walmart, Chipotle, Lowe's, Hilton, and 500+ others; frontline and hourly worker populations transitioning to higher-skilled roles; expanding to professional development and mid-level management via Navigator"
  businessModel: "Three-sided marketplace: employer platform subscription fees (SaaS-like ARR); education institution revenue share on enrolled students; employer pays tuition directly to institution (no out-of-pocket for employee). IRS Section 127 tax subsidy ($5,250/year tax-free) is the structural market enabler."
