summary:
  headline: |
    Guild Education built the largest employer-sponsored tuition benefit platform in the United
    States, anchored by IRS Section 127's structural tax subsidy and a multi-sided network of
    500+ employers and 150+ education institutions. The June 2022 Series F at $4.4B represented
    a peak valuation reflecting COVID-era labor shortage tailwinds and edtech enthusiasm. Since
    then, the business has navigated two large-scale restructurings, high-profile client cancellations
    (Disney, Macy's), and an unconfirmed Walmart Workforce Edge threat — while launching Navigator
    as the growth catalyst required to justify any premium to distressed public comps. At an
    implied current EV of $1.5-2B (secondary market), the investment case is a conditional buy
    at or below $2.0B: the structural market is intact, the platform has demonstrated utility at
    scale, but financial opacity, decelerated growth (~6% YoY), and execution uncertainty during
    the CEO transition prevent high-conviction commitment without data room access.
