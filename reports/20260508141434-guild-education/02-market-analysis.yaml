  claims:
    - id: CM001
      statement: >-
        Guild's core market is US employer-sponsored education: employers paying for employee degree and certificate
        programs through a technology-intermediated platform, distinct from traditional employee tuition reimbursement.
      type: observed
      topic: market-definition
      sourceRefs:
        - SM013
        - SM018
        - SM019
      confidence: high
      freshness: current
    - id: CM002
      statement: >-
        The IRS Section 127 exemption allows up to $5,250 per employee per year in employer-provided educational
        assistance to be excluded from taxable income, creating a structural fiscal incentive anchored in federal tax
        law.
      type: observed
      topic: market-structure
      sourceRefs:
        - SM012
        - SM013
      confidence: high
      freshness: current
    - id: CM003
      statement: >-
        Approximately 61% of US companies offer some form of educational financial assistance to employees, per SHRM
        benefits survey data.
      type: third-party-reported
      topic: market-size
      sourceRefs:
        - SM002
      confidence: medium
      freshness: recent
    - id: CM004
      statement: >-
        The global corporate L&D market is estimated at $300B or more annually, representing all employer training,
        content, and platform spend globally, per Training Magazine and Conference Board analysis.
      type: third-party-reported
      topic: market-size
      sourceRefs:
        - SM007
        - SM008
      confidence: medium
      freshness: recent
    - id: CM005
      statement: >-
        Enrollment in AI-focused programs on the Guild platform grew 1,200% year-over-year in 2024, reflecting
        accelerating demand for AI skills transformation among Guild's employer clients.
      type: company-claimed
      topic: market-driver
      sourceRefs:
        - SM013
      confidence: medium
      freshness: current
    - id: CM006
      statement: >-
        The global online education market was estimated at approximately $185 billion in 2024 and is projected to grow
        to approximately $279 billion by 2029, representing a compound annual growth rate of approximately 8.6%.
