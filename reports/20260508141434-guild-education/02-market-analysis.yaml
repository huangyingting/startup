      - TM004
  - id: s4
    title: Buyer Segmentation and Adoption Path
    body: |
      Guild's buyer is not the employee (who benefits for free) but the employer — specifically large
      enterprises with 10,000 or more employees where the platform investment can be justified against
      workforce scale. Within the employer, the purchasing decision typically involves two or more
      functions: Human Resources (HR) or People & Culture, which owns benefits design and workforce
      development strategy; and Finance or Procurement, which approves the contract and validates ROI
      assumptions. In some enterprise accounts, the CEO or CHRO sponsors the program directly as part
      of a public workforce commitment (e.g., Walmart's "Live Better U" brand, Chipotle's "Cultivate
      Education").

      Employer segments can be characterized by industry vertical and strategic motivation. Retail,
      food service, and hospitality employers (Walmart, Chipotle, Taco Bell, Hilton) use Guild to
      differentiate in high-churn hourly worker segments where education benefits reduce voluntary
      turnover. Healthcare employers (Providence Health, OSF Healthcare, UCHealth) use Guild to address
      clinical worker pipelines and meet licensing/credentialing requirements. Financial services
      employers (Discover, PNC Bank, JPMorganChase) use Guild for professional development in roles
      subject to rapid technology disruption. Logistics and energy employers (Tyson Foods, Love's
      Travel Stops) use Guild to support front-line worker advancement.

      The adoption path typically follows: employer RFP or direct outreach → pilot with one business
      unit → full program design with Guild → launch with communication campaign → ongoing coaching
      and analytics → renewal and expansion. Sales cycles for large enterprise clients are estimated
      at 6–12 months; full program activation across a large employer base (100,000+ employees) can
      take 12–18 months. The multi-year, multi-stakeholder nature of the sales cycle creates both a
      competitive moat (high switching cost once embedded) and a constraint (slow new client
      acquisition during economic uncertainty).
