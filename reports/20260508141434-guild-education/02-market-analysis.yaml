  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Segment / buyer map
      missingEvidence: Guild-confirmed revenue breakdown by employer industry vertical; average contract value by segment
      whyItMatters: Revenue concentration risk and segment-specific churn rates cannot be assessed without segment-level data
      diligencePath: Request segment revenue mix from Guild under NDA; analyze employer client churn by industry vertical
      relatedTableRefs:
        - TM003
    - type: private-evidence-only
      severity: material
      topic: Guild SAM and SOM precision
      missingEvidence: Audited average contract value per employer; confirmed employer count; exact revenue by product line
      whyItMatters: Without confirmed contract values, SAM/SOM estimates carry factor-of-two uncertainty
      diligencePath: Request contract economics (ACV ranges) and client count by segment from Guild under NDA
      relatedQuestionRefs:
        - QM006
        - QM007
        - QM021
    - type: enumeration-incomplete
      severity: minor
      topic: TAM/SAM/SOM or sizing lens table
      missingEvidence: >-
        Validated analyst report specifically sizing the employer-intermediated tuition platform market (Guild's exact
        niche)
      whyItMatters: No public analyst has specifically sized the employer-pay-upfront online learning intermediary market
      diligencePath: Commission or identify analyst report specifically scoped to employer-sponsored degree platform intermediaries
      relatedTableRefs:
        - TM002
    - type: stale
      severity: minor
      topic: Market driver evidence (labor market tightness)
      missingEvidence: >-
        2025 labor market employer benefits data; updated SHRM benefits survey post-2024 election; ESG/DE&I employer
        commitment data for 2025
      whyItMatters: >-
        The labor market tightness driver moderated in 2024–2025; ESG/DE&I driver durability is uncertain; updated data
        needed to assess both
      diligencePath: >-
        Review SHRM 2025 benefits survey when available; monitor BLS JOLTS job openings data; track corporate ESG
        disclosure changes in 2025
      relatedQuestionRefs:
        - QM013
        - QM014
        - QM025
    - type: missing-source
      severity: minor
      topic: Enterprise sales cycle duration
      missingEvidence: >-
        Confirmed average Guild enterprise sales cycle length and full account activation timeline from customer
        references or Guild disclosures
      whyItMatters: >-
        Sales cycle duration affects revenue forecasting, cost of sales, and competitive positioning against
        faster-onboarding alternatives
      diligencePath: >-
        Request sales cycle data from Guild under NDA; conduct customer reference calls with HR/benefits buyers at 3+
        Guild clients
      relatedQuestionRefs:
        - QM026
