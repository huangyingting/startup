      - TE003
    figureRefs:
      - FE003
  - id: SE004
    title: Product Roadmap and Global Expansion
    body: >
      Guild's product roadmap reflects a deliberate expansion from a point solution for tuition reimbursement into a
      comprehensive workforce development platform. The October 2024 Nomadic Learning acquisition was the most
      significant strategic move: it accelerated entry into the $28 billion+ corporate L&D market, adding cohort-based
      learning capabilities, an enterprise content library, and a new client base of companies that purchase L&D
      separately from education benefits. Guild Academy, the integrated product resulting from this acquisition, targets
      Fortune 500 L&D budgets previously out of Guild's reach.

      Guild Grow Global represents the international expansion strategy, bringing the platform to Canada, Mexico, India,
      and the United Kingdom with multi-currency support. This addresses multinational employer needs and positions
      Guild to serve global workforces of existing US enterprise clients. The tuition reimbursement product now operates
      in nearly every country globally, enabling multinational companies to deploy a unified education benefit strategy.

      Guild Navigator, in early access with partners including OSF Healthcare, Children's Nebraska, and Good Jobs
      Birmingham, targets the specific problem of credentialed role pipelines — building structured pathways from
      current employee populations to licensed positions such as CNA, MA, and CDL. General availability is planned for
      early 2026. The Walgreens PharmStart program — offering fully paid online pharmacy school prerequisite classes to
      300 workers — exemplifies the Navigator product strategy. The strategic risk is product sprawl: managing five
      distinct product lines with varying maturity levels requires disciplined prioritization and sales specialization
      that a 900-person company may struggle to sustain. The Macy's partnership termination (January 2025) and the
      Walmart displacement by Workforce Edge are meaningful adverse signals that the core Learning Marketplace product
      must demonstrate clear ROI to retain large clients even as new products are being built.
