  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Product Revenue Breakdown
      missingEvidence: >-
        Guild does not disclose revenue by product line; share of newer products (Academy, Talent Advantage, Navigator)
        vs. core Marketplace is unknown.
      whyItMatters: >-
        Investors cannot assess diversification progress or reliance on legacy marketplace revenue without product-line
        data.
      diligencePath: >-
        Request product-line revenue breakdown in management presentation; cross-check with education provider payment
        volumes.
      relatedQuestionRefs:
        - QE021
    - type: private-evidence-only
      severity: material
      topic: Proprietary AI Technology IP
      missingEvidence: >-
        Guild has not published technical documentation for its recommendation engine, Talent Advantage algorithms, or
        Lightcast integration depth.
      whyItMatters: >-
        Without understanding AI model depth, technology differentiation cannot be assessed and is potentially
        replicable by competitors.
      diligencePath: Request technical architecture review; assess algorithm patents and training dataset proprietary status.
      relatedQuestionRefs:
        - QE009
        - QE010
        - QE011
    - type: missing-source
      severity: minor
      topic: Competitive Product Benchmarking
      missingEvidence: >-
        No independent head-to-head product comparison between Guild, InStride, Bright Horizons EdAssist, and Workforce
        Edge is publicly available.
      whyItMatters: >-
        Investors cannot independently assess whether Guild's product differentiation is sustainable vs. lower-cost
        alternatives like Workforce Edge.
      diligencePath: >-
        Commission independent analyst benchmark; request client reference calls with accounts that evaluated Guild vs.
        InStride or Workforce Edge.
      relatedQuestionRefs:
        - QE019
    - type: missing-source
      severity: minor
      topic: Education Provider Contract Terms
      missingEvidence: Revenue-share percentages charged to education providers and exclusivity terms are not publicly disclosed.
      whyItMatters: Provider economics drive gross margin; understanding take rates is essential to unit economics assessment.
      diligencePath: Request sample provider contracts; benchmark against InStride and EdAssist disclosed terms.
      relatedQuestionRefs:
        - QE020
