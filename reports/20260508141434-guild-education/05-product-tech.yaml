  - id: TE004
    title: Trust, Quality, and Compliance Table
    description: |
      Guild's trust, security, privacy, regulatory, and quality control posture as reconstructed from public sources.
    notes: >
      Guild does not publish a trust or security page; data in this table is inferred from regulatory context (IRS Sec.
      127, FERPA, SOC 2 norms for SaaS), employer client requirements, and company communications. No independent
      security audit is publicly available.
    columns:
      - Control / Certification / Requirement
      - Status
      - Scope
      - Evidence Quality
      - Diligence Gap
    rows:
      - - IRS Section 127 compliance (tax-free $5,250/yr tuition benefit)
        - Required by employer clients; Guild programs must qualify
        - All Learning Marketplace programs for US clients
        - High – IRS regulation confirmed; Guild programs structured to qualify
        - Regulatory risk if Congress modifies Sec. 127 limits
      - - Education provider accreditation vetting
        - Guild vets providers on SACSCOC/HLC/NECHE accreditation
        - All degree and certificate programs in Marketplace
        - Medium – described in press; no published vetting framework
        - Vetting rigor and frequency not publicly documented
      - - FERPA compliance (student privacy)
        - Required when handling student education records
        - All learner data managed by Guild on behalf of providers
        - Medium – implied by sector norms; no public statement
        - No public privacy policy covering FERPA data handling published
      - - B-Corp certification (Guild PBC)
        - Certified B Corporation; Public Benefit Corporation structure
        - Corporate governance and mission alignment
        - High – confirmed via B Lab registry
        - B-Corp certification does not verify data security or operational practices
      - - SOC 2 / data security for enterprise HR data
        - Required by Fortune 500 clients; industry standard
        - All employer and employee data on platform
        - Low – no public SOC 2 report disclosed
        - SOC 2 report not available publicly; must be obtained via NDA in diligence
      - - GDPR / international data compliance (Grow Global)
        - Required for EU-adjacent markets; India DPDPA, UK GDPR
        - Guild Grow Global (Canada, Mexico, India, UK)
        - Low – no public disclosure of international compliance posture
        - International data compliance posture not publicly documented
    enumerationScope:
