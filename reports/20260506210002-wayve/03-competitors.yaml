callouts:
  - id: CL301
    type: risk
    severity: high
    title: Mobileye — 800 OEM Relationships vs. Wayve Zero
    body: >
      Mobileye has an entrenched position in ADAS/AV licensing with 800+ OEM platform wins and a $1.9B annual revenue
      base. Wayve must displace or supplement Mobileye at each OEM — a multi-year, relationship-heavy sales cycle that
      Wayve's academic-founder team has not previously executed. This is the single largest commercial execution risk.
    claimRefs:
      - CP009
      - CP010
  - id: CL302
    type: strength
    severity: medium
    title: Embodied AI as Genuine Differentiator
    body: >
      Wayve's WAYVE-1 / GAIA-1 embodied AI approach is scientifically distinct from any competitor: a single neural
      network trained end-to-end on multi-modal driving data. Published papers (GAIA-1, 6.9B parameters; AIM, video
      understanding) demonstrate genuine IP depth. This approach generalizes across vehicle types and geographies —
      potentially solving OEMs' need for a single AV stack across their entire fleet, which no current licensor offers.
    claimRefs:
      - CP013
      - CP014
