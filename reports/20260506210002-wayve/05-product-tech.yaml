callouts:
  - id: CL501
    type: strength
    severity: high
    title: GAIA-1 — First Published Generative World Model for AV at Scale
    body: >
      GAIA-1 (6.9B parameters, September 2023) was the first published generative world model for autonomous driving at
      production scale, predating similar efforts from Waymo and Tesla. 400+ academic citations within 12 months
      validate scientific depth. This model enables synthetic data generation that could allow Wayve to scale training
      without proportionally expanding its physical test fleet — a critical cost and time advantage for generalization.
    claimRefs:
      - C145
      - C146
  - id: CL502
    type: risk
    severity: high
    title: Black-Box Certification Risk — End-to-End Neural Networks and Regulatory Explainability
    body: >
      Wayve's end-to-end neural network approach faces a fundamental regulatory risk: safety certification bodies (UK
      DVSA, EU regulators) may require interpretable, fault-attributable systems for L4 commercial approval. Black-box
      neural networks cannot currently provide the causal fault attribution that regulatory frameworks traditionally
      require — creating a potential certification barrier that could force Wayve to add interpretability layers,
      reducing its technical differentiation.
    claimRefs:
      - C156
      - C152
