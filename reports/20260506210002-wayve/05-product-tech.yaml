  claims:
    - id: C501
      statement: >-
        WAYVE-1 is Wayve's embodied AI foundation model for autonomous driving: an end-to-end neural network that takes
        raw camera and radar inputs and outputs driving commands directly, without intermediate
        perception-prediction-planning decomposition.
      type: observed
      topic: WAYVE-1 architecture
      sourceRefs:
        - S501
        - S502
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ501
        - RQ519
    - id: C502
      statement: >-
        WAYVE-1 is designed to run on NVIDIA Orin SoC hardware, creating a hardware dependency on NVIDIA's automotive
        compute platform — both for on-vehicle inference and for pre-production partnership with OEMs that select NVIDIA
        DRIVE as their compute substrate.
      type: observed
      topic: WAYVE-1 hardware dependency NVIDIA Orin
      sourceRefs:
        - S505
        - S506
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ503
        - RQ514
    - id: C503
      statement: >-
        The AIM (Autonomous Intelligence Module) is Wayve's on-vehicle software integration package that runs WAYVE-1 at
        safety-critical real-time latency and interfaces with vehicle CAN-bus, sensor arrays, and actuation systems —
        the primary OEM integration component.
      type: observed
      topic: AIM on-vehicle module
      sourceRefs:
        - S519
        - S501
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ504
    - id: C504
      statement: >-
        Wayve operates a continuous learning fleet data pipeline that ingests driving footage from its 60–70 London test
        vehicles, labels safety-relevant scenarios, and retrains WAYVE-1 — creating a data flywheel that improves model
        performance over time.
      type: observed
      topic: fleet data pipeline continuous learning
      sourceRefs:
        - S501
        - S507
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ517
    - id: C505
      statement: >-
        GAIA-1 (arXiv:2309.17080, September 2023) is a 6.9B-parameter generative world model trained on Wayve's
        proprietary driving footage that can generate photorealistic future-frame video predictions conditioned on
        current state and text descriptions — enabling synthetic driving scenario generation.
      type: observed
      topic: GAIA-1 technical specification
      sourceRefs:
        - S503
        - S504
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - RQ502
    - id: C506
      statement: >-
        GAIA-1 received 400+ academic citations within 12 months of publication (September 2023 to September 2024) —
        unusually rapid uptake for an industrial research paper and evidence of genuine scientific contribution to the
        AV/generative AI field.
      type: observed
      topic: GAIA-1 citation impact
      sourceRefs:
        - S503
        - S504
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - RQ515
    - id: C507
      statement: >-
        GAIA-1's primary commercial application is synthetic data augmentation for WAYVE-1 training, reducing the test
        fleet miles required per model iteration and enabling generation of rare edge-case scenarios (night driving,
        unusual weather, atypical pedestrian behavior).
