        title: Exhibits
        blocks:
          - type: callout
            title: UK Automated Vehicles Act 2024 — First-Mover Regulatory Tailwind
            body: >
              The UK Automated Vehicles Act 2024 creates the world's first comprehensive national legal framework for
              commercial Level 4 AV deployment. As the only well-funded, UK-headquartered AV technology company with
              active London testing permits and Uber partnership, Wayve is uniquely positioned to be the first company
              to achieve commercial L4 deployment under this new framework.
            calloutType: insight
            claimRefs:
