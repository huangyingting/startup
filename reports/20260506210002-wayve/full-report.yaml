  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Wayve has completed four primary funding rounds through May 2024:

              Seed Round (~2017–2018): Approximately $3M from early backers including Balderton Capital.
              Used to establish the Cambridge research lab and initial test fleet.

              Series A ($20M, January 2019): Led by Balderton Capital. Funded expansion of the London test
              fleet from Cambridge to London streets and initial LIDAR-free validation.

              Series B ($200M, March 2021): Led by SoftBank Vision Fund 2. Marked Wayve's transition from
              academic research to commercial development stage. Established Uber partnership discussions and
              international offices.

              Series C ($1.05B, May 2024): Led by SoftBank Vision Fund 2, co-invested by NVIDIA, Microsoft
              (M12), Uber, Virgin Group, Baillie Gifford, and LG Technology Ventures. The largest AV funding
              round in UK history and the third-largest AV funding round globally since Waymo's raises.

              Total capital raised: approximately $1.275B (including seed).
              Post-Series C valuation: not disclosed by Wayve or investors. Independent estimates range from
              $2.5B (conservative, based on 2x–3x revenue model comps) to $5B (bullish, based on strategic
              premium for embodied AI at Series C terms). Wayve has not acknowledged any specific valuation figure.
            claimRefs:
              - C106
              - C107
              - C108
              - C109
      - number: '4.2'
        title: Revenue and Revenue Model
        blocks:
          - type: paragraph
            body: |
              Wayve has zero publicly disclosed revenue as of the run date. The company is in the pre-commercial
              development stage. Revenue model upon commercialization is expected to be:

              Primary revenue stream: Per-vehicle licensing fee to OEMs for the WAYVE-1 autonomy stack,
              structured as a one-time integration fee plus an ongoing per-vehicle royalty or subscription.
              Comparable: Mobileye charges OEMs approximately $50–$200/vehicle for EyeQ chips plus software.
              Wayve's L4 stack, if commercialized, would likely command $500–$5,000/vehicle.

              Secondary revenue stream: Robotaxi service revenue sharing with fleet operators (e.g., revenue
              share on Uber London ride-hailing revenue if pilot scales). This is speculative and post-commercial.

              Tertiary/validation revenue: Technology development services for OEM partners (non-recurring
              project fees during evaluation phase).

              No commercial agreements with disclosed financial terms have been announced as of May 2026.
              The Uber London robotaxi pilot is operational but revenue terms are not public.
            claimRefs:
              - C110
              - C111
              - C112
              - C113
      - number: '4.3'
        title: Unit Economics and Burn Rate
        blocks:
          - type: paragraph
            body: |
              Wayve's unit economics are pre-revenue, and cost structure analysis must be reconstructed
              from industry benchmarks and headcount data:

              Headcount: ~600 employees as of mid-2024. Estimated average all-in cost per employee of
              $200K–$250K per year (London/Cambridge engineering salaries plus equity, office, benefits).
              Implied annual payroll cost: $120M–$150M.

              Compute infrastructure: Training large foundation models (GAIA-1 at 6.9B parameters, WAYVE-1
              ongoing development) requires substantial GPU compute. Estimated annual cloud/on-premise GPU
              spend: $40M–$80M (comparable to similar-scale AI research companies).

              Test fleet operations: 60–70 vehicles in London with safety drivers during supervised
              operations. Fleet operating cost estimated at $30M–$60M annually including insurance, drivers,
              maintenance, and depreciation.

              Office and G&A: London (King's Cross HQ), Cambridge, Toronto, San Francisco — estimated
              $20M–$30M annually.

              Total estimated annual burn: $210M–$320M.
              With $1.3B raised and approximate prior spending of $100M–$200M through early 2024,
              estimated remaining runway as of May 2024: approximately 3–5 years at current burn.

              Path to unit economics: An OEM licensing deal at $1,000/vehicle with 100K vehicles annually
              would generate $100M in licensing revenue — approximately 33%–50% of current burn. Five OEM
              partners each deploying at this scale would achieve rough breakeven. Timeline: speculative;
              industry precedent suggests 3–5 years from first commercial agreement.
            claimRefs:
              - C114
              - C115
              - C116
              - C117
      - number: '4.4'
        title: Capital Adequacy and Financial Risk Assessment
        blocks:
          - type: paragraph
            body: |
              Capital adequacy assessment:

              Series C of $1.05B represents one of the largest single rounds in UK startup history. Given
              the estimated burn rate of $210M–$320M annually, this round provides approximately 3–5 years
              of runway from May 2024 (i.e., approximately 2027–2029) before further capital is required.

              Next financing trigger: Wayve will likely need a Series D or pre-IPO round by 2027–2028 to
              sustain operations through first OEM commercial agreements. If OEM agreements are signed and
              revenue begins, the next round could be raised at a significantly higher valuation.

              Financial risks:
              1. Burn rate escalation: Scaling a test fleet from 70 to 500+ vehicles will increase
                 operational costs by 5–7x before revenue scales.
              2. Compute cost inflation: Training increasingly large foundation models requires growing GPU
                 budgets; NVIDIA H100/B200 cluster costs are rising, though NVIDIA's investment may provide
                 preferential access.
              3. OEM evaluation capital: OEM pilots often require Wayve to fund the evaluation phase before
                 commercial terms are agreed — front-loading costs.
              4. Regulatory delay risk: If UK AV Act commercial approvals are delayed 2+ years, Wayve must
                 sustain operations longer on existing capital.
              5. Valuation compression risk: If the AI/AV market corrects before Wayve's next round, the
                 next financing could be at a flat or down round.

              Companies House (UK) filings confirm Wayve Technologies Ltd as a UK entity with at least two
              subsidiaries (Wayve US, Wayve Canada). No PCAOB-audited financials are publicly available.
            claimRefs:
