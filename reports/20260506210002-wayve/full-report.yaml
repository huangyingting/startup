companyProfile:
  summary: |
    Wayve (formerly Applied Intuition UK, rebranded 2017) is a Cambridge-founded autonomous
    vehicle technology company headquartered in London's King's Cross. The company's mission
    is to build the world's first generalist embodied AI driving policy — an AV system that
    can drive anywhere without city-specific HD maps — and to commercialize it through OEM
    software licensing. Wayve's two flagship products are GAIA-1, a 6.9 billion-parameter
    generative world model that synthesizes realistic driving scenarios for training, and
    WAYVE-1, an end-to-end neural network driving policy trained on GAIA-1 output plus
    real-world UK street data. The company operates a 60–70 vehicle test fleet in London,
    with evaluation partnerships across Uber Technologies (London robotaxi pilots), Nissan
    Motor Co. (UK AV trials), Stellantis (last-mile delivery), Mercedes-Benz (R&D), and
    ASDA (grocery delivery). Wayve has not disclosed any commercial revenue or signed OEM
    production agreement as of May 2026. The Series C round ($1.05B, May 2024) was led
    by SoftBank Vision Fund 2, with co-investors NVIDIA, Microsoft, Uber, Virgin Group,
    Baillie Gifford, and LG Electronics. The UK Automated Vehicles Act 2024 — the world's
    first national commercial L4 AV framework — was passed in May 2024, creating a
    time-limited regulatory first-mover window for Wayve in its home market.
