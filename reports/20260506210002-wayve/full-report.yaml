  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: |
              Wayve operates across multiple adjacent markets that together define its revenue opportunity:

              **Level 4 AV software licensing (primary):** OEMs, fleet operators, and logistics companies
              pay for an AI-powered autonomy stack that enables Level 4 autonomous vehicle operation.
              Wayve licenses its Embodied AI platform (WAYVE-1 model + vehicle integration hardware) to
              OEMs seeking to add autonomous driving capability to their vehicle platforms without building
              the AI in-house. This is analogous to what Mobileye does for advanced driver assistance
              systems (ADAS) — but at a much higher level of autonomy. Market: all vehicle OEMs and
              fleet operators globally.

              **Robotaxi and autonomous ride-hailing (secondary):** Companies that operate or plan to operate
              robotaxi fleets require a full autonomy stack. Waymo's One service and Cruise are incumbents.
              Wayve's partnership with Uber for London positions it as an operator-enabler in this segment.
              Market: urban ride-hailing in regulated cities globally; Uber, Lyft, Grab, Didi.

              **Autonomous last-mile delivery (tertiary):** E-commerce and grocery delivery operators require
              autonomous delivery vehicles for last-mile operations. Wayve's ASDA and Stellantis partnerships
              address this segment. Market: all e-commerce logistics operators, food/grocery delivery,
              parcel delivery.

              **Adjacency — embodied AI infrastructure:** Wayve's GAIA-1 world model and broader WAYVE-1
              research position it in the emerging "embodied AI" market — AI systems that operate physical
              systems in the world. This includes industrial robots, drones, and other autonomous physical
              systems. Long-term TAM expands beyond vehicles.
            claimRefs:
              - C036
              - C037
              - C038
              - C039
      - number: '2.2'
        title: Market Sizing and Growth Drivers
        blocks:
          - type: paragraph
            body: |
              TAM estimates for autonomous driving technology vary widely by analyst, technology path,
              and timeline assumption. Key estimates:

              - Goldman Sachs (2023): Global AV market could reach $300B by 2030, growing to $1.5T by 2035,
                driven by robotaxi, AV trucking, and OEM licensing combined.
              - McKinsey Global Institute (2024): Autonomous vehicle software and systems TAM estimated at
                $400B+ by 2035; Level 4+ autonomy represents ~40% of this figure.
              - Morgan Stanley (2024): AV technology licensing and fleet operations could be worth $600B+
                by 2030 globally, with AV software platform providers capturing 15–25% of total value.
              - Wayve's internal presentation materials (per press coverage): Company frames its SAM as
                OEM licensing in the near term and operator services (robotaxi/delivery) as the medium-term.

              UK/Europe specific: The UK government's Automated Vehicles Act (2024) creates a legal
              framework for commercial AV deployment in the UK — the first of its kind globally at the
              national legislative level. This is a direct tailwind for Wayve as a UK-based AV company.
              European automotive market has 12+ major OEMs, each a potential Wayve licensee.

              Growth drivers: (1) labor cost inflation in logistics and delivery; (2) EV adoption creating
              new vehicle architectures receptive to software-first AV stacks; (3) urban congestion creating
              policy demand for autonomous transit; (4) NVIDIA and Microsoft AI infrastructure maturation
              reducing training costs; (5) Chinese AV expansion (Baidu Apollo, Li Auto, Xpeng) creating
              competitive urgency for Western OEMs.

              Constraints: (1) regulatory approval timelines (UK 2–4 years for commercial deployment);
              (2) public trust and insurance liability frameworks not yet established; (3) LIDAR cost
              decline reducing the cost advantage of camera-only approaches; (4) Waymo and GM Cruise
              incidents (2023 Cruise recall) creating reputational caution.
            claimRefs:
              - C040
              - C041
              - C042
              - C043
              - C044
      - number: '2.3'
        title: Customer Segmentation and Buyer Map
        blocks:
          - type: paragraph
            body: |
              Wayve's buyers fall into four distinct segments with different procurement processes,
              contract structures, and decision timelines:

              **Segment 1 — Vehicle OEMs (premium and volume):** Purchase or license AV stacks to integrate
              into new vehicle programs. Decision cycle: 3–7 years (vehicle development cycle). Key buyers:
              Nissan, Mercedes-Benz, Stellantis (confirmed partners); BMW, Toyota, Hyundai (potential).
              Procurement: multi-year technical evaluation → proof-of-concept → pilot → commercial license.
              Value driver: avoid cost of building AV AI in-house (estimated $500M–$2B over 5 years per OEM).

              **Segment 2 — Ride-hailing operators:** Want a fully autonomous ride-hailing stack to reduce
              driver costs. Key buyers: Uber (confirmed), Lyft, Didi. Procurement: strategic partnership plus
              equity investment (Uber model). Value driver: driver cost elimination (Uber driver cost ~$0.50/mile;
              AV operation target ~$0.15/mile at scale).

              **Segment 3 — Last-mile logistics operators:** Want autonomous delivery vehicles for grocery
              and parcel delivery. Key buyers: ASDA (confirmed trial), Royal Mail, Amazon, DHL. Procurement:
              pilot program → volume commitment. Value driver: last-mile delivery cost reduction from $3–5/delivery
              to <$1/delivery at scale.

              **Segment 4 — Government and public transit:** Public bus/transit operators seeking autonomous
              transit vehicles. Regulatory pathway longest; lowest near-term priority for Wayve given complexity.

              Buyer concentration risk: Uber and OEM segment together represent >80% of near-term revenue
              opportunity. Wayve is at high risk of customer concentration in early commercialization phase.
            claimRefs:
              - C045
              - C046
              - C047
              - C048
      - number: '2.4'
        title: Market Constraints, Regulatory Environment, and Adoption Barriers
        blocks:
          - type: paragraph
            body: |
              Regulatory: The UK Automated Vehicles Act 2024 is the most significant regulatory development
              for Wayve. It establishes a legal framework for Level 4 automated vehicles on UK public roads,
              requiring an Automated Vehicle Authorisation (AVA) from the Secretary of State. Wayve is
              positioned to be among the first applicants. The EU and US regulatory frameworks are still
              evolving; commercial deployment in continental Europe and North America requires jurisdiction-by-
              jurisdiction approvals. California DMV's autonomous vehicle regulations allow testing but impose
              stringent commercial deployment requirements.

              Technical barriers: Edge cases (adverse weather, construction zones, atypical road layouts)
              remain unsolved at the L4 level by all players. Wayve's end-to-end approach claims generalization
              but has not demonstrated this at millions of miles of verified autonomous operation (Waymo's bar).
              LIDAR-free approaches are lower cost but face accuracy degradation in rain, fog, and glare.

              Insurance and liability: The UK Automated Vehicles Act introduces a "licensed insurer" model
              for AV operators, but commercial insurance underwriting for L4 fleets is nascent and priced
              at significant premium. This creates cost uncertainty for fleet operators.

              Public trust: The 2023 GM Cruise recall (following a pedestrian injury in San Francisco)
              set back public trust in autonomous vehicles globally and accelerated regulatory scrutiny.
              This created a more cautious OEM environment for AV technology purchases. Wayve must
              demonstrate flawless safety records in London trials to maintain credibility.
            claimRefs:
              - C049
              - C050
              - C051
              - C052
