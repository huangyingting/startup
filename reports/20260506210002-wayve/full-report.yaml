  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Target Market
        blocks:
          - type: paragraph
            body: |
              Wayve's B2B customer segments are:

              Segment 1 — Fleet Operators / Ride-Hailing Platforms (Primary near-term): Operators of
              commercial vehicle fleets who want to reduce driver costs. Key pilot customer: Uber Technologies
              (London robotaxi). Potential next customers: Lyft, Bolt, BYD Auto fleet services.

              Segment 2 — OEM Passenger Car Manufacturers (Primary long-term): Traditional automotive OEMs
              seeking Level 4 autonomy stacks for integration into production vehicles. Key evaluation partners:
              Nissan Motor Co. (UK trials), Mercedes-Benz Group (R&D collaboration). Target pipeline: VW Group,
              BMW, Honda, Hyundai (outside Motional), Stellantis passenger cars.

              Segment 3 — Commercial Vehicle OEMs (Medium-term): OEMs producing vans, trucks, and delivery
              vehicles for last-mile logistics. Evaluation partner: Stellantis (LCV delivery).
              Potential: Ford Transit / ProMaster, Renault Kangoo, Mercedes Sprinter platform.

              Segment 4 — Last-Mile Delivery Operators (Speculative): Grocery, e-commerce, and parcel delivery
              operators who own or lease commercial fleets. Trial partner: ASDA (Walmart UK grocery delivery).
              Potential: Amazon Logistics (UK), DHL, Ocado Robotics (UK).

              All segments are pre-commercial; Wayve has no disclosed revenue from any customer.
            claimRefs:
              - C176
              - C177
              - C178
              - C179
      - number: '6.2'
        title: Named Customer Profiles and Proof
        blocks:
          - type: paragraph
            body: |
              Uber Technologies (London robotaxi pilot, Series C strategic investor):
              - Partnership announced November 2023; Uber co-invested in Wayve's Series C
              - Supervised autonomous rides available in London across 30+ boroughs
              - Uber's strategy: complement its human-driver network with AV in dense urban markets
              - Risk: Uber also partners with Waymo (US robotaxi service); Uber could defect to Waymo in UK

              Nissan Motor Co. (UK AV evaluation):
              - Partnership announced September 2023; UK road trials conducted on Nissan Leaf platform
              - Nissan evaluating WAYVE-1 for integration into its next-generation connected vehicle platform
              - Trial scope: limited road miles on UK public roads with safety drivers
              - No commercial agreement or LOI disclosed

              ASDA / Walmart UK (grocery delivery pilot):
              - Autonomous grocery delivery trial completed in Leeds, UK (2022–2023)
              - Wayve-modified delivery vehicle operating on designated routes with safety driver
              - ASDA published positive trial report; no commercial rollout announced

              Stellantis Group (commercial delivery evaluation):
              - Announced April 2023; evaluating Wayve's platform on Stellantis light commercial vehicle (LCV)
              - Stellantis is the world's 4th-largest automaker; LCV includes Fiat Ducato, Peugeot Expert
              - Scope: technology integration evaluation; no commercial terms disclosed

              Mercedes-Benz Group (R&D collaboration):
              - Announced December 2023; R&D-stage collaboration on autonomous driving AI
              - Mercedes is one of the most prestigious OEM brands in EU automotive
              - Scope: early-stage R&D; not an integration evaluation or commercial negotiation
            claimRefs:
              - C180
              - C181
              - C182
              - C183
      - number: '6.3'
        title: Customer Growth and Adoption Trajectory
        blocks:
          - type: paragraph
            body: |
              Wayve's customer timeline shows slow progression from research partnerships to commercial pilots:

              2019–2022: Academic/research phase — no commercial customers; operating as a research organization.
              2022: First commercial pilot announced — ASDA grocery delivery trial (Leeds, UK).
              2023: Major partnership milestone year — Nissan (September 2023), ASDA trial completion, Stellantis
                     evaluation announced, Mercedes R&D announced, Uber partnership (November 2023).
              2024: Series C closes with Uber as strategic co-investor; Uber London robotaxi pilot operational.
              2025–2026 (target): Transition Uber London from supervised to unsupervised commercial rides.
              2026–2028 (target): First commercial OEM licensing agreement (Nissan or Stellantis most likely).

              The pace of customer development is consistent with the AV sector's 5–7 year typical cycle
              from research to commercial deployment. However, Wayve has not announced any customer that
              has progressed from evaluation to commercial commitment — a significant gap given the company's
              $1.3B capital raise.

              Customer concentration risk: All of Wayve's named customer relationships cluster around
              the Uber London pilot and OEM evaluations. If the Uber pilot fails to convert to commercial,
              there is no alternative near-term revenue path disclosed.
            claimRefs:
              - C184
              - C185
              - C186
              - C187
      - number: '6.4'
        title: Retention, Expansion, and Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Retention and churn (pre-commercial):
              Wayve cannot report churn because it has no commercial customers. The pilot-stage relationships
              are maintained through ongoing collaboration, not recurring revenue. The risk is that an OEM
              or operator partner ends the evaluation without proceeding to commercial license.

              Expansion signals:
              - Uber's Series C co-investment (~$30M estimated allocation) creates equity alignment,
                increasing the probability that Uber converts from pilot to commercial partnership.
              - Nissan's public endorsement of the trial (press release, September 2023) signals positive
                evaluation momentum, though no LOI has been disclosed.
              - The Stellantis partnership covers multiple LCV brands (Fiat Ducato, Peugeot Expert,
                Citroën Jumpy, Vauxhall Vivaro) — a large potential fleet volume if commercial terms are reached.

              Concentration risk:
              - If Uber exits the UK AV pilot market (as it has in US markets where it sold its ATC unit
                to Aurora), Wayve's primary commercial proof point evaporates.
              - Nissan is Wayve's best candidate for first OEM commercial license; losing Nissan would set
                back the licensing pipeline by 2–3 years.
              - All named OEM partnerships are in evaluation — no customer has passed to commercial stage.
            claimRefs:
              - C188
              - C189
              - C190
              - C191
      - number: '6.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Zero Commercial Customers — All Relationships Are Evaluation or Pilot Stage
            body: >
              Wayve has no commercial OEM licensing agreements as of May 2026. Every named partner is in evaluation,
              pilot, or R&D stage with no disclosed financial terms. The Uber London robotaxi pilot, while operationally
              active, operates with safety drivers and does not generate licensing revenue. Converting even one
              evaluation to commercial license represents a potentially multi-year process that the Series C runway must
              sustain.
            calloutType: insight
            claimRefs:
              - C184
              - C187
          - type: callout
            title: Uber Series C Co-Investment — Strongest Commercial Signal
            body: >
              Uber's equity co-investment in Wayve's Series C is the strongest commercial proof signal: Uber validated
              Wayve's technology sufficiently to invest capital and accept equity dilution. This creates financial
              alignment that increases the probability of converting the London pilot to a commercial agreement.
              However, Uber's track record of exiting AV partnerships (Advanced Technologies Group sold to Aurora in
              2020) requires monitoring.
            calloutType: insight
            claimRefs:
              - C180
              - C188
