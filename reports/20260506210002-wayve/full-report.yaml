chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Wayve Technologies Ltd is a privately held autonomous driving technology company incorporated in
              England and Wales. Founded in 2017 and headquartered in London (King's Cross), Wayve's mission
              is to develop and commercialize a general-purpose AI system capable of driving any vehicle on any
              road in any country — without requiring manual programming of rules, high-definition maps, or LIDAR
              sensors. The company calls its approach "Embodied AI": training a single large neural network model
              end-to-end on real-world driving data so it learns to perceive, reason, and act like a skilled driver,
              rather than following pre-coded logic.

              Business model: Wayve operates as a B2B technology licensor. It licenses its AV autonomy stack
              (hardware + AI software) to automotive OEMs, fleet operators, and logistics companies. The company
              is not building its own vehicles. Revenue streams include upfront software licensing fees,
              per-vehicle or per-mile royalties, and research/development services agreements with OEM partners.
              In parallel, Wayve operates its own robotaxi pilot in London as a demonstration and data-collection
              vehicle, in partnership with Uber.

              The company's camera-and-radar-first (LIDAR-free) approach positions it as lower-cost than
              Waymo-style systems, with broader OEM compatibility. Unlike Waymo or Cruise, which deploy proprietary
              fleets, Wayve intends to become the autonomous driving "brain" that OEMs and fleet operators adopt
              across their vehicle fleets — an AI platform strategy modeled on what Mobileye or Qualcomm do for
              ADAS, but at full Level 4+ autonomy.
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Amar Shah (CEO and Co-founder): Amar Shah holds a PhD in Machine Learning from the University
              of Cambridge. Before Wayve, he was a postdoctoral researcher in probabilistic machine learning and
              published work on Gaussian processes and Bayesian deep learning. He has no prior startup or CEO
              experience — Wayve is his first venture. His academic background gives him deep credibility with
              the AI research community; investor confidence rests heavily on his ability to manage a rapidly
              scaling hardware-software business.

              Alex Kendall (President, CTO, and Co-founder): Alex Kendall holds a PhD from Cambridge in
              autonomous systems and robotic vision. He is the inventor of the SegNet architecture for scene
              understanding and has published seminal work on geometric deep learning, uncertainty estimation in
              CNNs, and end-to-end autonomous driving. He co-founded Wayve with Amar Shah and serves as its
              primary technical authority. His research profile (20,000+ citations as of 2024) provides
              exceptional credibility. Wayve's embodied AI thesis is built on Kendall's research.

              Board and governance: Wayve is a UK private company. Board composition has not been publicly
              disclosed in full. SoftBank Vision Fund 2 (lead investor), NVIDIA, and Microsoft likely hold board
              or observer seats given the scale of investment. The company has not filed significant governance
              disclosures. Andy Hicks (early co-founder, departed in earlier years) is not referenced in 2024
              communications. Key-person risk is concentrated in Shah and Kendall; their simultaneous departure
              would be an existential event. There are no announced succession plans or dual-class voting
              structures disclosed.
            claimRefs:
              - C006
              - C007
              - C008
              - C009
              - C010
      - number: '1.3'
        title: Funding History and Investor Ecosystem
        blocks:
          - type: paragraph
            body: |
              Wayve has raised approximately $1.3B+ in total funding as of the run date, across the following
              rounds:

              Seed (2017–2018): Approximately $3M from Balderton Capital and early angels. Allowed the founding
              team to begin building the core end-to-end learning system and deploy test vehicles in Cambridge.

              Series A ($20M, January 2019): Led by Balderton Capital with Compound Ventures and others.
              Funded expansion of the London test fleet and initial urban autonomy demonstrations.

              Series B ($200M, March 2021): Led by SoftBank Vision Fund 2. Eclipse Ventures, Salesforce Ventures,
              and D1 Capital Partners also participated. This round funded scaling the test fleet to 10+ cities,
              hiring the first 200 engineers, and developing the WAYVE-1 foundation model.

              Series C ($1.05B, May 2024): Led by SoftBank Vision Fund 2 (follow-on), with NVIDIA, Microsoft,
              Uber, Virgin Group, Baillie Gifford, and LG Technology Ventures participating. This was the largest
              AV/AI funding round in history at the time. No valuation was publicly disclosed; multiple sources
              estimated an implied valuation of $2.5B–$5B. The round confirmed Wayve's unicorn status.

              Strategic significance: NVIDIA's investment (and Wayve's use of NVIDIA Orin/Thor chips) locks in
              a key compute partnership. Microsoft's investment implies Azure cloud training infrastructure
              access. Uber's investment aligns with the London robotaxi pilot. These are strategic relationships,
              not purely financial.
            claimRefs:
              - C011
              - C012
              - C013
              - C014
              - C015
      - number: '1.4'
        title: Scale, Milestones, and Coverage Gaps
        blocks:
          - type: paragraph
            body: |
              Headcount: Wayve employed approximately 600 people as of mid-2024, with offices in London (HQ),
              Cambridge (UK), Toronto (Canada), and San Francisco (USA). The company grew from ~150 in 2021 to
              600+ in 2024 — roughly 4x in 3 years. The majority of employees are in AI engineering, robotics,
              and autonomous driving research.

              Fleet and data: Wayve operates a test fleet of approximately 60–70 vehicles in London urban
              environments (as of 2024), covering 30+ of the most complex London boroughs. It has accumulated
              millions of miles of real-world driving data, which serves as training data for the WAYVE-1
              foundation model. The company also obtained a California AV testing permit in 2023, enabling
              North American data collection.

              Partners: Uber (London robotaxi pilot, ongoing), Nissan (UK autonomous vehicle trials),
              Mercedes-Benz (partnership for European market), Stellantis (collaboration for delivery autonomy),
              ASDA (grocery delivery trials in UK), and several undisclosed OEM technology evaluation agreements.

              Coverage gaps: Wayve has not disclosed its revenue, contract values, or unit economics. Financial
              metrics are not available from public filings. Valuation at the Series C was not officially stated.
              The progress of OEM partnerships from evaluation to binding commercial contracts is not publicly
              disclosed. Regulatory approvals for commercial robotaxi deployment outside London trials are pending.
