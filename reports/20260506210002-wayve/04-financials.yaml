callouts:
  - id: CL401
    type: risk
    severity: critical
    title: Zero Revenue — Wayve Has No Disclosed Commercial Revenue
    body: >
      Wayve has never disclosed any revenue figure. All operations are funded entirely by venture capital. The path from
      pilot-stage demonstrations to commercial OEM licensing revenue is estimated at 2–5 years and requires OEM
      evaluation cycles that Wayve has not publicly announced closing. A capital raise before revenue could occur at a
      significantly lower valuation if AI/AV market sentiment shifts.
    claimRefs:
      - CI005
      - CI016
