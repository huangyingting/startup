callouts:
  - id: CL601
    type: risk
    severity: critical
    title: Zero Commercial Customers — All Relationships Are Evaluation or Pilot Stage
    body: >
      Wayve has no commercial OEM licensing agreements as of May 2026. Every named partner is in evaluation, pilot, or
      R&D stage with no disclosed financial terms. The Uber London robotaxi pilot, while operationally active, operates
      with safety drivers and does not generate licensing revenue. Converting even one evaluation to commercial license
      represents a potentially multi-year process that the Series C runway must sustain.
    claimRefs:
      - CU009
      - CU012
  - id: CL602
    type: strength
    severity: high
    title: Uber Series C Co-Investment — Strongest Commercial Signal
    body: >
      Uber's equity co-investment in Wayve's Series C is the strongest commercial proof signal: Uber validated Wayve's
      technology sufficiently to invest capital and accept equity dilution. This creates financial alignment that
      increases the probability of converting the London pilot to a commercial agreement. However, Uber's track record
      of exiting AV partnerships (Advanced Technologies Group sold to Aurora in 2020) requires monitoring.
    claimRefs:
      - CU005
      - CU013
