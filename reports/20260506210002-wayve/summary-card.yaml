  shortDescription: |
    Wayve is a UK-based autonomous vehicle (AV) company building a generalist embodied
    AI driving policy (WAYVE-1) trained on a generative world model (GAIA-1), with an
    OEM software licensor business model. Founded 2017 by Cambridge AI researchers Amar
    Shah (CEO) and Alex Kendall (CTO). Raised $1.05B Series C (May 2024) led by SoftBank
    with NVIDIA, Microsoft, Uber, Virgin, Baillie Gifford, and LG. Total raised ~$1.275B.
    Partners include Uber (London robotaxi), Nissan (UK AV trials), Stellantis (delivery),
    and ASDA (grocery). Headcount ~600 across London, Cambridge, Toronto, San Francisco.
