      - number: '3.2'
        title: Waymo——主要竞争标杆
        blocks:
          - type: paragraph
            body: |
              Waymo 是 Wayve 在安全可信度和商业规模上的主要竞争标杆。截至 2024 年，Waymo 关键数据如下：
              - 累计 10M+ 完全自动驾驶（无安全员）英里
              - 在 San Francisco、Phoenix 和 Austin 提供商业乘车服务（Waymo One）
              - 2024 年从 Alphabet 和外部投资人融资 $5.5B
              - 基于已披露融资，隐含估值约 $45B
              - 使用 LIDAR + 摄像头的感知—预测—规划模块化栈
              - Jaguar I-PACE 车队（专用车辆，不走 OEM 授权）
              - 不向 OEM 授权技术（垂直整合）

              Waymo 差距：Wayve 的 60–70 辆 London 测试车无法匹配 Waymo 的数据规模、安全记录或监管审批状态。差距以年计，不以月计。不过：
              （1）Waymo 不向 OEM 授权技术（不是直接授权竞争对手）；
              （2）Waymo 路线使用昂贵 LIDAR（早期部署每车 $75K+）；
              （3）Waymo 在美国运营——相对 Wayve，其英国监管位置较弱。

              在 OEM 授权市场，Waymo 策略和 Wayve 策略结构上不竞争：Waymo 想成为车队运营商；Wayve 想成为技术授权方。
              Waymo 的真正威胁是叙事：如果 Waymo 设定了 L4 AV 安全标杆，Wayve 就必须证明其具身 AI 方法能达到同等安全标准。
