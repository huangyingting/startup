      - number: '2.4'
        title: 市场约束、监管环境与采用障碍
        blocks:
          - type: paragraph
            body: |
              监管：UK Automated Vehicles Act 2024 是 Wayve 面临的最重要监管进展。它为英国公共道路上的 Level 4 自动驾驶车辆建立法律框架，
              要求从 Secretary of State 获得 Automated Vehicle Authorisation（AVA）。Wayve 有望成为首批申请者之一。EU 和美国监管框架仍在演进；
              欧洲大陆和北美商业部署需要逐辖区审批。California DMV 的自动驾驶车辆法规允许测试，但对商业部署要求严苛。

              技术障碍：边缘案例（恶劣天气、施工区域、非典型道路布局）在 L4 级别仍是所有玩家尚未解决的问题。Wayve 的端到端方法声称具备泛化能力，
              但还没有用数百万英里经验证的自动驾驶运营来证明这一点（Waymo 已经立下的门槛）。无 LIDAR 路线成本较低，但在雨、雾、眩光场景下面临准确率下降。

              保险与责任：UK Automated Vehicles Act 为 AV 运营商引入「持牌保险人」模式，但 L4 车队商业保险承保刚起步，定价带有显著溢价。
              这给车队运营商带来成本不确定性。

              公众信任：2023 年 GM Cruise 召回（起因是 San Francisco 行人受伤事件）重创全球公众对自动驾驶车辆的信任，并加速监管审查。
              这让 OEM 在购买 AV 技术时更谨慎。Wayve 必须在 London 试验中展示无瑕疵的安全记录，才能守住可信度。
            claimRefs:
