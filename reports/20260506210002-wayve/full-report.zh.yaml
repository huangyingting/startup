      - number: '8.2'
        title: 融资背景与估值进入纪律
        blocks:
          - type: paragraph
            body: >
              Wayve 的 Series C（$1.05B，2024 年 5 月）是使其成为独角兽的融资轮。SoftBank Vision Fund 2 领投；共同投资方包括
              NVIDIA、Microsoft、Uber、Virgin、Baillie Gifford 和 LG。未披露投后估值，但二级市场和基金标记指向 $2.5B–$5B 区间。自 2017 年以来累计融资约
              $1.275B（Seed 至 Series C）。


              Series C 新机构投资者的进入纪律受限：该轮已关闭。任何进入都必须通过老股购买（估计估值约 $3–4B）、结构化票据，或直接参与 Series D（预计 2027–2029，目标融资
              $500M–$1B、估值 $5B–$10B，取决于商业里程碑）。若在签署 OEM 合同前以高于 $5B 隐含估值进入，下轮降估值修正风险很高。


              优先股堆叠风险：Wayve 已融资 $1.275B+，带 1× 清算优先权，意味着若以低于 $1.3B 退出，必须先向优先股持有人返还约 $1.275B，普通股股东才有分配。在 $3B
              退出中，普通股股东（包括创始人和员工）获得约 55% 退出收益。
            claimRefs:
              - CV005
              - CV006
              - CV007
