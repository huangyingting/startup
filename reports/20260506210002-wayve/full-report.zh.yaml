      - number: '7.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 黑箱 AI 认证——生死级技术风险
            body: >
              Wayve 的全部技术差异化都与监管认证要求相冲突。如果英国 DVSA 或欧盟监管方要求商业 L4 批准使用可解释、可归因故障的 AI 系统，Wayve
              只有两个选择：增加模块化可解释性组件（削弱差异化），或游说制定新的认证标准（5+ 年）。相对 Mobileye 而言，这一风险最可能永久改变 Wayve 的竞争定位。
            calloutType: insight
            claimRefs:
              - CR002
              - CR009
          - type: callout
            title: 创始人关键人风险——Shah 和 Kendall 均不可替代
            body: >
              Wayve 的核心 IP、投资者关系和 OEM 可信度直接流经 CEO Amar Shah 和 CTO Alex Kendall。现阶段，任一创始人离开都会实质性降低 Wayve 的商业执行概率。Wayve
              未披露任何接班计划、竞业限制或长期激励结构来缓解这种集中度。
            calloutType: insight
            claimRefs:
              - CR013
