  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              **投资逻辑：** Wayve 是唯一一家已在生产规模上打造通用具身 AI 驾驶策略（WAYVE-1）的 AV 公司，该策略基于生成式世界模型（GAIA-1）训练，目标也明确指向 OEM
              授权，而非自营车队部署。英国 AV Act 2024——全球首个国家级商业 L4 框架——创造了有时间窗口的监管护城河。Wayve 的 $1.05B Series C 来自
              SoftBank、NVIDIA、Microsoft 和 Uber，带来 Mobileye 不具备的战略分发协同。如果 Wayve 能拿下哪怕一个主要 OEM 商业授权（目标是在 2028 年前锁定
              Toyota、Nissan 或 Stellantis），OEM 软件授权方的基本单位经济模型将发生质变：每车每月 $10–50 × 数百万辆车 = $1B+ ARR 潜力。


              **反向逻辑：** Wayve 运营 8 年后商业收入仍为零。它没有披露在英国 DVSA 或 EU AI Act 要求下，黑箱神经网络 AI 的认证路线图。Mobileye 的 800+ 个 OEM 关系代表
              3–7 年销售周期优势。Waymo 的 $45B 隐含估值和 10M+ 英里形成安全数据护城河，Wayve 若不让车队规模阶跃式提升，无法追上。悲观情景——监管延迟、到 2028 年仍无 OEM
              授权、SoftBank 无法共同领投 Series D——可能让 Wayve 变成困境资产，或被迫以 $0.5–1.5B 贱卖收购。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
