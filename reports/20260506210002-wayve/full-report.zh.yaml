            body: >
              UK Automated Vehicles Act 2024 创建了全球第一个覆盖商业 Level 4 AV 部署的综合性国家法律框架。Wayve 是唯一一家资金充足、 总部位于英国、拥有 London
              活跃测试许可和 Uber 合作关系的 AV 技术公司，因此独特地有机会成为第一个在新框架下实现商业 L4 部署的公司。
