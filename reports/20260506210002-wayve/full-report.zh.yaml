      - number: '5.2'
        title: GAIA-1 技术深挖与已发表研究
        blocks:
          - type: paragraph
            body: |
              GAIA-1（arXiv: 2309.17080）是 Wayve 最重要的公开技术成果：

              架构：6.9B 参数 transformer 模型，包含三个模态编码器（视频、文本、动作）和共享潜在空间。文本描述为世界模型设定条件，从而生成特定驾驶场景
              （如「rainy night in London with pedestrian crossing」）。

              训练：用 Wayve London 测试运营中的专有车队视频数据训练。训练数据集规模未披露，但估计为 1M+ 小时驾驶画面。

              输出：在当前状态和动作条件下生成未来帧视频预测——既可生成合成数据，也可为安全验证做前向仿真。

              研究意义：GAIA-1 是第一个公开发表、达到这一规模（6.9B 参数）的 AV 生成式世界模型，早于 Waymo、Tesla 和其他 AV 玩家类似工作。
              发表后 12 个月内被引用 400+ 次——对一篇工业研究论文来说，学界吸收速度异常快。

              商业应用：GAIA-1 衍生模型支撑 Wayve 为 WAYVE-1 训练生成合成数据，降低每次模型迭代所需的测试车队里程。Wayve 声称这让模型可泛化到新地域和真实驾驶数据中罕见的边缘案例。

              局限：GAIA-1 的 6.9B 参数规模需要大量推理算力（不适合车端实时部署）；它是训练阶段的世界模型，不是驾驶策略模型。WAYVE-1 负责实时驾驶策略。
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
