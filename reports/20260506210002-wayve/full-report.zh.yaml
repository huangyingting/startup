      - number: '6.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 零商业客户——所有关系仍处评估或试点阶段
            body: >
              截至 2026 年 5 月，Wayve 没有商业 OEM 授权协议。每个具名伙伴都处在评估、试点或研发阶段，且未披露财务条款。Uber London robotaxi
              试点虽已运营，但仍配备安全驾驶员，不产生授权收入。即便只把一个评估项目转成商业授权，也可能需要多年；Series C 的现金跑道必须撑住这段周期。
            calloutType: insight
            claimRefs:
              - CU009
              - CU012
          - type: callout
            title: Uber Series C 共同投资——最强商业信号
            body: >
              Uber 共同投资 Wayve 的 Series C，是最强的商业验证信号：Uber 对 Wayve 技术的认可足以让其投入资本并接受股权稀释。这种财务绑定提高了 London 试点转为商业协议的概率。但
              Uber 退出 AV 合作的历史（Advanced Technologies Group 于 2020 年出售给 Aurora）仍需跟踪。
            calloutType: insight
