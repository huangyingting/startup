      - number: '7.4'
        title: 执行、团队与伙伴风险
        blocks:
          - type: paragraph
            body: >
              Wayve 的执行风险集中在学术创始人团队和单一伙伴集中度。Amar Shah（CEO）和 Alex Kendall（CTO）都是 Cambridge
              博士学者，正在打造他们的第一家企业软件公司。两人此前都没有管理 600 人工程组织或执行多年 OEM 企业销售周期的经验。Wayve 未披露任何接班计划。


              企业销售能力缺口：Wayve 的学术创始人领导层此前没有对抗 Mobileye 专门客户团队、执行多年多利益相关方 OEM 企业销售的经验。


              Uber 集中度风险：Uber 曾在经济性变化后，将其 ATC AV 部门出售给 Aurora（2020 年 12 月）。如果 Uber 退出英国 AV 市场，Wayve 将失去主要商业验证点。


              SoftBank 资本依赖：SoftBank Vision Fund 2 同时领投 Series B 和 Series C。SoftBank 的投资组合压力（WeWork、Vision Fund 2
              减记）带来风险：SoftBank 可能无法或不愿参与 Wayve 的 Series D。


              人才留存：Wayve 争夺具身 AI 工程师的对手包括 Waymo、DeepMind、OpenAI 和 NVIDIA——这些公司现金薪酬更高或股权更成熟，带来持续流失风险。
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
