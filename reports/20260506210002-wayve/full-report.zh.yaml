      - number: '5.3'
        title: 产品成熟度、认证与集成状态
        blocks:
          - type: paragraph
            body: |
              Wayve 各组件产品成熟度：

              WAYVE-1 驾驶策略：TRL 6（已在相关环境演示——London 街道、30+ 行政区、无安全员试验）。尚未按 UK AV Act 2024 获得商业部署安全认证。
              UK AV Act 要求商业 L4 乘车服务取得 UKDVSA 认证、AV Entity（AVE）许可证和 Operator of Automated Vehicles（OAV）许可证。

              Uber London 合作：Wayve 在 2023–2024 年与 Uber 完成 London 有安全员公共 robotaxi 试验，展示了与商业网约车派单系统的集成。
              这些试验使用安全员，尚未获批商业 L4。

              硬件集成：Wayve 已演示 WAYVE-1 在 NVIDIA Orin 硬件上运行（Waymo、Aurora 和多数 AV OEM 项目也使用同类 SoC）。
              NVIDIA 的 Series C 共同投资意味着 NVIDIA Thor 下一代部署路线图承诺。

              OEM 集成状态：Wayve 已宣布与 Nissan（英国道路试验）、Stellantis（配送车辆自动驾驶）和 Mercedes-Benz（欧洲合作）进行试点评估。
              没有宣布任何披露财务条款的商业集成协议。

              监管路径：UK AV Act 2024 已建立框架，但实施细则到 2025 年仍在征询中。Wayve 在该法案下的认证时间线未公开。
              2023 年获得 California DMV 测试许可，用于美国试验。

              信任与质量：Wayve 在新闻材料中发布安全接管率和场景覆盖统计，但没有披露 SOTIF（Safety of the Intended Functionality）测试结果或 NCAP 等效评分。
