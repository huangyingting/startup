  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              英国 Automated Vehicles Act 2024 同时是 Wayve 最大的监管顺风，也是最大的时间线风险。AV Act 建立了全球首个国家级商业 L4 部署框架，为 Wayve 在 London
              运营无人监管商业乘车提供法律路径。但实施细则到 2025 年仍在征询意见，AVE（AV Entity）和 OAV（Operator of Automated Vehicles）牌照预计 2026
              年开始发放。如果实施推迟到 2027 年以后，Wayve 还要在没有商业收入的情况下多撑 12-24 个月，需要大约 $250M-$640M 追加资本。


              EU AI Act（2024）：EU AI Act 将 L4 自动驾驶系统归类为高风险 AI，要求强制合规评估、技术文档和上市后监控。Wayve 若在欧盟市场部署，必须遵守。合规成本估计为每种车型
              $2M-$10M。


              IP 与专利风险：Mobileye 持有 2,000+ 项 AV 相关专利。Wayve 未披露其专利组合，GAIA-1 / WAYVE-1 又以 arXiv 预印本形式发表，可能限制可专利性。


              监管处罚：London 试点期间任何安全事故，都可能触发 TfL 暂停 Wayve 的 London 运营许可，类似 Cruise 2023 年被 California DMV 暂停许可。
            claimRefs:
              - CR001
              - CR002
              - CR003
