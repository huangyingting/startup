              - Uber 对 Series C 的共同投资（估计约 $30M 分配额）形成股权绑定，提高 Uber 从试点转为商业合作的概率。
              - Nissan 对试验公开背书（新闻稿，2023 年 9 月）显示评估势头正面，但未披露 LOI。
              - Stellantis 合作覆盖多个 LCV 品牌（Fiat Ducato、Peugeot Expert、Citroën Jumpy、Vauxhall Vivaro）——若达成商业条款，潜在车队规模较大。

              集中度风险：
              - 如果 Uber 退出英国 AV 试点市场（类似其在美国市场出售 ATC 部门给 Aurora），Wayve 的主要商业验证点会消失。
              - Nissan 是 Wayve 首个 OEM 商业授权的最佳候选；失去 Nissan 会让授权管线倒退 2–3 年。
              - 所有具名 OEM 合作仍在评估阶段——没有客户进入商业阶段。
