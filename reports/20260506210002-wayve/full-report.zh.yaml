      - number: '1.3'
        title: 融资历史与投资人生态
        blocks:
          - type: paragraph
            body: |
              截至报告生成日，Wayve 累计融资约 $1.3B+，覆盖以下轮次：

              Seed（2017–2018）：约 $3M，来自 Balderton Capital 和早期天使投资人。资金支持创始团队开始搭建核心端到端学习系统，并在 Cambridge 部署测试车辆。

              Series A（$20M，2019 年 1 月）：由 Balderton Capital 领投，Compound Ventures 等参投。资金用于扩大 London 测试车队，并做最初的城市自动驾驶展示。

              Series B（$200M，2021 年 3 月）：由 SoftBank Vision Fund 2 领投。Eclipse Ventures、Salesforce Ventures 和
              D1 Capital Partners 也参与。这一轮支持测试车队扩张到 10+ 城市、招聘首批 200 名工程师，并开发 WAYVE-1 基础模型。

              Series C（$1.05B，2024 年 5 月）：由 SoftBank Vision Fund 2（跟投）领投，NVIDIA、Microsoft、Uber、
              Virgin Group、Baillie Gifford 和 LG Technology Ventures 参投。这是当时史上最大 AV/AI 融资轮。估值未公开披露；
              多个来源估计隐含估值为 $2.5B–$5B。这一轮确认了 Wayve 的独角兽地位。

              战略意义：NVIDIA 的投资（以及 Wayve 使用 NVIDIA Orin/Thor 芯片）锁住了关键算力合作。Microsoft 的投资意味着 Wayve
              可能获得 Azure 云训练基础设施。Uber 的投资与 London robotaxi 试点对齐。这些关系是战略性的，不只是财务投资。
