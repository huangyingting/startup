      - number: '3.4'
        title: Wayve 的竞争定位与护城河评估
        blocks:
          - type: paragraph
            body: |
              Wayve 的主要差异化因素：

              1. 具身 AI 路线：WAYVE-1 和 GAIA-1 代表了真正不同的 L4 自动驾驶技术路线——训练单一端到端模型，而不是模块化栈。
              这有三个理论优势：（a）无需重新编程即可跨车型和地理泛化；（b）通过车队数据飞轮持续改进；（c）长期降低开发成本。
              缺点是可解释性 / 认证风险。

              2. 英国监管位置：Wayve 是全球最有机会率先在 UK AV Act 2024 下获得许可的公司，在英国商业市场创造 12–24 个月先发优势。
              美国竞争对手不具备英国监管位置。

              3. 战略投资人生态：NVIDIA（算力）、Microsoft（云）、SoftBank（资本）和 Uber（分发）共同堆出一条其他 AV 初创公司难以复制的护城河——
              尤其因为 NVIDIA 的投资把芯片路线图支持与 Wayve 的算力需求绑定在一起。

              4. 具身 AI IP：已发表研究（GAIA-1、WAYVE-1 系列）形成不断增长的学术 IP 组合和人才磁铁。Alex Kendall 的 20K+ 引用吸引顶尖研究人员。

              5. 脆弱点：（a）Wayve 商业收入为零；护城河仍是理论上的，没有被证明。（b）Mobileye 拥有 800+ 个 OEM 关系，Wayve 必须从零与之竞争。
              （c）Tesla 的垂直整合和 500M+ FSD 英里，让它成为 OEM 细分中最可信的 Wayve 颠覆者。（d）若 LIDAR 成本降至 <$200/unit，
              纯摄像头成本优势将消失。
