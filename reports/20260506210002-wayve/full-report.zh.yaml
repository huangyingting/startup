      - number: '8.4'
        title: 退出准备度与最终尽调
        blocks:
          - type: paragraph
            body: >
              Wayve 最早也还需 4–7 年才具备 IPO 准备度。AV 技术公司 IPO 的收入门槛（参考 Mobileye 之后的先例）是 $100M–$500M ARR，或来自 Tier 1 OEM、可信的商业管线
              LOI。SPAC 路径可行，但考虑到 Arrival、Lilium 和其他英国 SPAC 失败案例，执行风险较高。并购是最可能的退出方式：汽车 OEM 收购（Toyota、Ford、GM），价格区间
              $8B–$20B；或技术收购（Apple、Microsoft、Alphabet，$20B+），但需通过竞争监管审查。任何新投资者最后要问四个尽调问题：（1）是否与任何 OEM 签署 NDA 或
              LOI？（2）Wayve 对 WAYVE-1 认证的 DVSA 预提交计划是什么？（3）Alex Kendall 的归属安排和锁定期是什么？（4）SoftBank 是否承诺参与 Series D？
            claimRefs:
              - CV013
