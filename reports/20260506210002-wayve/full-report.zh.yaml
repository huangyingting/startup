  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: |
              Wayve 横跨多个相邻市场，这些市场共同定义了它的收入机会：

              **Level 4 AV 软件授权（核心）：** OEM、车队运营商和物流公司为 AI 驱动的自动驾驶栈付费，用以实现 Level 4 自动驾驶车辆运营。
              Wayve 将其具身 AI 平台（WAYVE-1 模型 + 车辆集成硬件）授权给希望为车辆平台增加自动驾驶能力、但不想内部自研 AI 的 OEM。
              这类似 Mobileye 为高级驾驶辅助系统（ADAS）扮演的角色——只是自动驾驶级别高得多。市场：全球所有汽车 OEM 和车队运营商。

              **Robotaxi 与自动驾驶网约车（二级）：** 运营或计划运营 robotaxi 车队的公司需要完整自动驾驶栈。Waymo One 服务和 Cruise 是既有玩家。
              Wayve 与 Uber 在 London 的合作使其成为这一赛道的运营商赋能方。市场：全球受监管城市的城市网约车；Uber、Lyft、Grab、Didi。

              **自动驾驶最后一公里配送（三级）：** 电商和杂货配送运营商需要自动驾驶配送车辆完成最后一公里运营。Wayve 的 ASDA 和 Stellantis 合作切入这一细分市场。
              市场：所有电商物流运营商、食品 / 杂货配送、包裹配送。

              **相邻市场——具身 AI 基础设施：** Wayve 的 GAIA-1 世界模型和更广泛的 WAYVE-1 研究，让它也站在新兴「具身 AI」市场里——即在真实世界操作物理系统的 AI 系统。
              这包括工业机器人、无人机和其他自主物理系统。长期总可用市场（TAM）将扩展到车辆之外。
