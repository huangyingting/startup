  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              截至 2024 年 5 月，Wayve 已完成四轮主要融资：

              种子轮（约 2017–2018）：约 $3M，来自包括 Balderton Capital 在内的早期支持者。
              用于建立 Cambridge 研究实验室和初始测试车队。

              Series A（$20M，2019 年 1 月）：由 Balderton Capital 领投。资金支持测试车队从 Cambridge 扩张到 London 街道，并进行早期无 LIDAR 验证。

              Series B（$200M，2021 年 3 月）：由 SoftBank Vision Fund 2 领投。标志着 Wayve 从学术研究转入商业开发阶段。建立 Uber 合作讨论并设立国际办公室。

              Series C（$1.05B，2024 年 5 月）：由 SoftBank Vision Fund 2 领投，NVIDIA、Microsoft（M12）、Uber、Virgin Group、
              Baillie Gifford 和 LG Technology Ventures 共同投资。英国史上最大 AV 融资轮，也是 Waymo 融资以来全球第三大 AV 融资轮。

              累计融资：约 $1.275B（含种子轮）。
              Series C 后估值：Wayve 或投资人均未披露。独立估计从 $2.5B（保守，基于收入模型可比公司的 2x–3x）到 $5B（乐观，基于 Series C 条款中具身 AI 的战略溢价）。
              Wayve 未承认任何具体估值数字。
