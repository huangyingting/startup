companyProfile:
  summary: |
    Wayve（前身 Applied Intuition UK，2017 年更名）是一家创立于 Cambridge、总部位于 London King's Cross 的自动驾驶技术公司。
    公司要打造全球第一个通用具身 AI 驾驶策略——一个无需城市专属 HD 地图、可在任何地方行驶的 AV 系统——并通过 OEM
    软件授权实现商业化。Wayve 的两款旗舰产品是 GAIA-1 和 WAYVE-1：前者是 6.9B 参数的生成式世界模型，用来合成逼真的驾驶场景供训练使用；
    后者是端到端神经网络驾驶策略，用 GAIA-1 输出和英国真实街道数据训练。公司在 London 运营 60–70 辆测试车，评估合作覆盖
    Uber Technologies（London robotaxi 试点）、Nissan Motor Co.（英国 AV 测试）、Stellantis（最后一公里配送）、
    Mercedes-Benz（研发）和 ASDA（杂货配送）。截至 2026 年 5 月，Wayve 未披露任何商业收入，也没有签署公开的 OEM 量产协议。
    2024 年 5 月的 $1.05B Series C 由 SoftBank Vision Fund 2 领投，NVIDIA、Microsoft、Uber、Virgin Group、
    Baillie Gifford 和 LG Electronics 共同投资。UK Automated Vehicles Act 2024 于 2024 年 5 月通过，
    这是全球第一个国家级商业 L4 AV 框架，为 Wayve 在本土市场打开了有时间限制的监管先发窗口。
