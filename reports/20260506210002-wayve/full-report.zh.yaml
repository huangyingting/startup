      - number: '4.3'
        title: 单位经济与烧钱速度
        blocks:
          - type: paragraph
            body: |
              Wayve 的单位经济仍处于收入前阶段，成本结构只能靠行业基准和员工数倒推：

              员工数：截至 2024 年中约 600 人。估计每名员工年全口径成本为 $200K–$250K（London/Cambridge 工程薪酬加股权、办公室、福利）。
              隐含年薪酬成本：$120M–$150M。

              算力基础设施：训练大型基础模型（6.9B 参数 GAIA-1、持续开发的 WAYVE-1）需要大量 GPU 算力。
              估计年度云端 / 本地 GPU 支出：$40M–$80M（与类似规模 AI 研究公司可比）。

              测试车队运营：London 60–70 辆车，监督运营期间配安全员。计入保险、司机、维护和折旧，车队运营成本估计为每年 $30M–$60M。

              办公室与 G&A：London（King's Cross 总部）、Cambridge、Toronto、San Francisco——估计每年 $20M–$30M。

              估计年度总烧钱：$210M–$320M。
              已融资 $1.3B，叠加截至 2024 年初此前大约 $100M–$200M 支出后，估计截至 2024 年 5 月剩余现金跑道约 3–5 年。

              单位经济路径：如果一家 OEM 授权协议按 $1,000/vehicle 收费、每年部署 100K 辆，将产生 $100M 授权收入——约等于当前烧钱的 33%–50%。
              五家 OEM 合作伙伴各按这一规模部署，可实现粗略盈亏平衡。时间线：仍属推测；行业先例显示，从首个商业协议到这一规模需要 3–5 年。
