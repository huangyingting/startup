      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              Wayve 面临的竞争风险很严峻。Waymo 拥有 10M+ 自动驾驶英里、$45B 隐含估值，并已在三个美国城市提供商业乘车。Wayve 估计自动驾驶英里少于 1M，商业乘车为零，估计估值为
              $2.5-$5B。两者差距体现在多年安全数据和数十亿美元资本。Waymo 2024 年据称评估英国扩张，并处于 Volkswagen 欧洲早期讨论中——直接威胁 Wayve 的 OEM 管线。


              Mobileye 拥有 800+ 个 OEM 客户关系和 $1.9B 年收入。Wayve 必须在每个 OEM 处替代或补充 Mobileye——这意味着要对抗盘踞已久的竞争对手，销售周期长达 3-7 年。


              Tesla FSD 的 500M+ 有人监管英里验证了纯摄像头路线，但 Tesla 的垂直整合意味着它不会向 OEM 授权，因此带来的是参照模糊，而不是直接竞争。


              LIDAR 成本下降：价格在 2023 年跌破 $500/unit，预计 2027 年降至 $100-200/unit——大幅削弱 Wayve 不用 LIDAR 的成本论据。


              OEM 内部项目（CARIAD、Toyota Woven Planet、BMW Autonomous）若成功，这些 OEM 将不再需要外部授权方。
            claimRefs:
              - CR005
              - CR006
              - CR007
              - CR008
      - number: '7.3'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >
              Wayve 的主要技术风险在于端到端神经网络的认证路径。英国 DVSA、欧盟监管方和 NHTSA 都要求商业 L4 部署使用可解释、可归因故障的 AI 系统。Wayve
              的纯端到端神经网络方案目前无法给出因果故障归因——这道障碍可能迫使 Wayve 增加可解释性模块，并可能削弱其竞争差异化。


              数据规模缺口：Wayve 的 60-70 辆车车队积累数据的速度只有 Waymo 700+ 辆车车队的 1/100。GAIA-1 合成数据能部分弥补，但决定 AV 安全表现的边缘案例，仍存在根本训练数据规模缺口。


              NVIDIA 硬件依赖：WAYVE-1 针对 NVIDIA Orin/Thor SoC 优化。如果 OEM 选择其他芯片，Wayve 将面对重新移植成本和认证重新验证。


              运营扩张：测试车辆从 70 辆扩到 500+ 辆，需要车队运营成本增加 5-7x，却没有同比例收入——授权收入出现前，这是资本消耗。


              网络安全：Wayve 的车队数据管线是网络安全攻击面，但 Wayve 尚未公开披露安全项目来应对。
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
