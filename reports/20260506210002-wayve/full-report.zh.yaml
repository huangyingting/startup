      - number: '3.3'
        title: Mobileye 与 Tier-1 汽车供应商——授权竞争对手
        blocks:
          - type: paragraph
            body: |
              Mobileye（Nasdaq: MBLY）是 Wayve OEM 授权策略最直接的竞争威胁：
              - 覆盖 50+ 国家，拥有 800+ 个 OEM 客户关系
              - 2022 年 IPO 融资 $861M；当前市值约 $15–20B（2024）
              - 业务从 ADAS（Level 2）延伸到 Level 4（Mobileye Drive robotaxi）
              - 视觉优先路线（EyeQ 芯片 + 摄像头系统）——类似 Wayve 对摄像头的强调
              - Intel 支持提供规模化算力和企业级可信度
              - 主要 OEM 关系：GM、Volkswagen、BMW、Daimler、Geely

              Mobileye vs. Wayve：Mobileye 有 Wayve 缺少的 OEM 关系；Wayve 有 Mobileye 缺少的具身 AI 研究。Mobileye 的 EyeQ 芯片为 OEM 制造依赖；
              Wayve 的 WAYVE-1 模型不绑定芯片，但使用 NVIDIA。Mobileye 是 AV 授权市场的巨无霸——要取代它，Wayve 既要拿出可验证更优的技术，
              又要从零搭建 OEM 合作关系。

              Tier-1 供应商（Bosch、Continental、ZF）：这些供应商正在规模化把 AI 集成进 ADAS 系统。它们不提供完整 L4 自动驾驶栈，
              但可以与 OEM 合作，提供不需要第三方初创公司的 L4 方案。风险在于 Bosch 或 Continental 可能收购一家 AV 初创公司，以阻断 Wayve 接触 OEM。

              Aurora Innovation：美国上市 AV 初创公司，聚焦卡车（Aurora Driver for Kenworth/PACCAR）。Aurora 累计融资 $4.2B，并于 2024 年在 Texas
              卡车运输实现首次商业发布。它是 Wayve 最接近的结构类比对象——同样是寻求 OEM 合作的初创 AV 技术平台。关键差异：Aurora 选择自动驾驶卡车（高速、更简单），
              Wayve 选择城市 robotaxi（更复杂）；不同市场细分降低了直接竞争。
