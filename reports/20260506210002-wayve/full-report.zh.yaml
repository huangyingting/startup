      - number: '2.2'
        title: 市场规模与增长驱动
        blocks:
          - type: paragraph
            body: |
              自动驾驶技术的 TAM 估计因分析师、技术路径和时间线假设不同而差异很大。关键估计：

              - Goldman Sachs（2023）：全球 AV 市场到 2030 年可能达到 $300B，到 2035 年增长至 $1.5T，
                由 robotaxi、AV 卡车和 OEM 授权共同驱动。
              - McKinsey Global Institute（2024）：自动驾驶车辆软件和系统 TAM 估计到 2035 年为 $400B+；
                Level 4+ 自动驾驶约占这一数字的 40%。
              - Morgan Stanley（2024）：到 2030 年，全球 AV 技术授权和车队运营价值可能达到 $600B+，
                AV 软件平台提供商可捕获总价值的 15–25%。
              - Wayve 内部演示材料（据媒体报道）：公司把近期 SAM 定位为 OEM 授权，中期则定位为运营商服务（robotaxi / 配送）。

              英国 / 欧洲特定因素：英国政府的 Automated Vehicles Act（2024）为英国商业 AV 部署建立了法律框架——这是全球第一个国家立法层面的框架。
              对一家英国本土 AV 公司 Wayve 来说，这是直接顺风。欧洲汽车市场有 12+ 家主要 OEM，每一家都是潜在 Wayve 授权对象。

              增长驱动：（1）物流和配送人工成本通胀；（2）EV 普及带来新的车辆架构，更愿意接入软件优先的 AV 栈；
              （3）城市拥堵催生对自动驾驶交通的政策需求；（4）NVIDIA 和 Microsoft AI 基础设施成熟，降低训练成本；
              （5）中国 AV 扩张（Baidu Apollo、Li Auto、Xpeng）让西方 OEM 产生竞争紧迫感。

              约束：（1）监管审批时间线（英国商业部署需要 2–4 年）；（2）公众信任和保险责任框架尚未建立；
              （3）LIDAR 成本下降，削弱纯摄像头路线的成本优势；（4）Waymo 和 GM Cruise 事件（2023 年 Cruise 召回）让市场更谨慎看待声誉风险。
