  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              自动驾驶车辆技术市场有四个清晰竞争层，每一层都以不同方式威胁 Wayve 的授权策略：


              第一层——全栈 AV 运营商：这些公司拥有完整技术栈并运营自己的商业车队。Waymo（Alphabet 子公司）是主导玩家，拥有 10M+ 自动驾驶英里，

              并在 SF、Phoenix 和 Austin 提供商业 Waymo One 乘车服务。GM Cruise 正在从 2023 年安全事件召回中恢复。这些公司与 Wayve 争夺监管可信度和

              OEM 心智，但不太可能把技术授权给竞争 OEM——因此结构上不是授权竞争对手，却是巨大的声誉标杆。


              第二层——AV 技术授权方：Mobileye（Intel 分拆公司，市值约 $20B，2022 年 IPO）是 ADAS/AV 栈授权的主导者，拥有 800+ 个 OEM 平台胜利。

              Aptiv 的 Motional JV（与 Hyundai 合资）既是 robotaxi 运营商，也是 OEM 技术合作伙伴。Continental、Robert Bosch 和 ZF
              Friedrichshafen

              是 Tier-1 汽车供应商，正在把 AI 集成进自己的 ADAS 产品。这些是 Wayve 在授权市场的直接竞争对手。


              第三层——OEM 自研项目：Tesla（FSD）、Mercedes-Benz（Drive Pilot Level 3）和 Volkswagen（CARIAD）在内部搭建 AV 栈。

              Apple Project Titan 已于 2024 年取消。若主要 OEM 成功自研 AV，Wayve 这类第三方授权方的市场会显著缩小。


              第四层——AV 平台初创公司：Aurora Innovation（美国，累计融资 $4.2B，聚焦卡车）、Motional（Hyundai/Aptiv JV）、

              Pony.ai（中国 / 美国）和 Baidu Apollo（中国）是 Wayve 在不同商业化阶段的直接类比对象。Aurora 通过 SPAC 上市；

              Cruise 是 GM 旗下部门；Waymo 是 Alphabet 旗下部门。
