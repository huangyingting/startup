chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: |
              Wayve Technologies Ltd 是一家在英格兰和威尔士注册的私营自动驾驶技术公司。公司成立于 2017 年，总部位于 London（King's Cross）。
              Wayve 的使命是研发并商业化一套通用 AI 系统，让任何车辆可以在任何国家、任何道路上行驶——不需要人工编写规则、
              高精地图或 LIDAR 传感器。公司把这一路线称为「具身 AI」：用真实驾驶数据端到端训练单一大型神经网络模型，
              让模型像熟练司机一样感知、推理和行动，而不是执行预先写好的逻辑。

              商业模式：Wayve 是 B2B 技术授权方。它把 AV 自动驾驶栈（硬件 + AI 软件）授权给汽车 OEM、车队运营商和物流公司。
              公司不造自己的车。收入流包括前期软件授权费、按车或按英里计费的版税，以及与 OEM 合作伙伴签署的研发服务协议。
              同时，Wayve 与 Uber 合作，在 London 运营自己的 robotaxi 试点，用作展示和数据采集。

              Wayve 采用摄像头和雷达优先（无 LIDAR）路线，定位上比 Waymo 式系统成本更低，OEM 兼容性更广。Waymo 或 Cruise
              部署自有专属车队；Wayve 则希望成为 OEM 和车队运营商跨车队采用的自动驾驶「大脑」。这套 AI 平台打法类似 Mobileye
              或 Qualcomm 在 ADAS 中的角色，但目标是完整 Level 4+ 自动驾驶。
