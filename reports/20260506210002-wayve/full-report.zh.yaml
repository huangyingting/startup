          - type: callout
            title: 具身 AI 是真正差异化
            body: >
              Wayve 的 WAYVE-1 / GAIA-1 具身 AI 路线在科学上不同于任何竞争对手：用多模态驾驶数据端到端训练单一神经网络。已发表论文（GAIA-1，6.9B 参数； AIM，视频理解）展示了真实 IP
              深度。这一路线可跨车型和地域泛化——有潜力解决 OEM 对跨全车队单一 AV 栈的需求，而当前没有授权方能提供这一点。
