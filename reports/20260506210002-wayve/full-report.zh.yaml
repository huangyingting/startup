      - number: '1.4'
        title: 规模、里程碑与覆盖缺口
        blocks:
          - type: paragraph
            body: |
              员工数：截至 2024 年中，Wayve 约有 600 名员工，办公室位于 London（总部）、Cambridge（英国）、Toronto（加拿大）和
              San Francisco（美国）。公司从 2021 年约 150 人增长到 2024 年 600+ 人——3 年约 4 倍。多数员工从事 AI 工程、机器人和自动驾驶研究。

              车队与数据：截至 2024 年，Wayve 在 London 城市环境运营约 60–70 辆测试车，覆盖 London 最复杂的 30+ 个行政区。公司已积累数百万英里真实道路驾驶数据，
              作为 WAYVE-1 基础模型训练数据。公司还在 2023 年获得 California AV 测试许可，可在北美采集数据。

              合作伙伴：Uber（London robotaxi 试点，持续进行）、Nissan（英国自动驾驶车辆测试）、Mercedes-Benz（欧洲市场合作）、
              Stellantis（配送自动驾驶合作）、ASDA（英国杂货配送试验），以及数家未披露的 OEM 技术评估协议。

              覆盖缺口：Wayve 未披露收入、合同金额或单位经济。公开文件无法提供财务指标。Series C 估值未正式公布。OEM 合作从评估推进到有约束力商业合同的进度未公开披露。
              London 试验以外的商业 robotaxi 部署监管审批仍在等待。
