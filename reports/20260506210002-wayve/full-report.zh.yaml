      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: |
              Amar Shah（CEO 兼联合创始人）：Amar Shah 拥有 University of Cambridge 机器学习博士学位。加入 Wayve 前，
              他是概率机器学习方向的博士后研究员，发表过高斯过程和贝叶斯深度学习相关论文。他此前没有创业或 CEO 经验——Wayve 是他的第一次创业。
              他的学术背景让他在 AI 研究社区具备很强可信度；投资人信心很大程度上押在他能否管理一家快速扩张的软硬件公司。

              Alex Kendall（总裁、CTO 兼联合创始人）：Alex Kendall 拥有 Cambridge 自动系统与机器人视觉博士学位。他是场景理解架构
              SegNet 的发明人，也发表过几何深度学习、CNN 不确定性估计和端到端自动驾驶的开创性研究。他与 Amar Shah 共同创办 Wayve，
              是公司的主要技术权威。他的研究履历（截至 2024 年引用 20,000+ 次）提供了极强可信度。Wayve 的具身 AI 论点建立在 Kendall 的研究之上。

              董事会与治理：Wayve 是英国私营公司。董事会构成尚未完整公开。考虑到投资规模，SoftBank Vision Fund 2（领投方）、
              NVIDIA 和 Microsoft 可能拥有董事会或观察员席位。公司没有提交重大治理披露。Andy Hicks（早期联合创始人，早年离开）
              未在 2024 年对外沟通中出现。关键人风险集中在 Shah 和 Kendall；两人若同时离开，将是生死级事件。公司没有披露接班计划或双层投票权结构。
