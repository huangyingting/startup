      - 阈值
      - 对投资逻辑的传导
      - 行动含义
      - 跟踪频率
    rows:
      - - 未达成首个 OEM 商业协议
        - 到 2028 年仍无 LOI 或已签协议
        - 收入路径失效；Series D 存在显著降价融资风险
        - 减仓；2028 年 Q4 重新评估
        - 季度
      - - DVSA 否决黑箱 AV 认证
        - 监管正式否决或延迟 5 年
        - 核心技术差异化消失；必须改架构
        - 退出仓位；技术转向削弱 OEM 经济性
        - 跟踪 2025–2026 年 DVSA 咨询输出
      - - Uber 退出 Wayve 合作
        - Uber 在无商业协议下终止伦敦试点
        - 核心商业验证点丢失；Series D 叙事承压
        - 提高观察频率；评估替代商业路径
        - 按季度跟踪 Uber 表述
      - - SoftBank 无法领投 Series D
        - SoftBank 拒绝参与或要求桥接
        - 资本集中风险兑现；$1.275B 优先股堆叠出现契约风险
        - 要求分析桥接条款；评估共同投资人能力
        - SoftBank 年度财报复盘
      - - Waymo 先于 Wayve 签下英国 OEM 交易
        - Waymo 宣布英国 OEM 量产协议
        - Wayve 的英国监管先发护城河消失；OEM 管线承压
        - 大幅下调投资逻辑成立概率
        - 持续跟踪 Waymo 英国公告
      - - 伦敦安全事故导致 TfL 暂停
        - TfL 撤销 Wayve 伦敦运营许可
        - 核心部署市场关闭；监管可信度受损
        - 退出或大幅减仓
        - 实时
    notes: 退出触发点不同于常规风险监控。任何单一触发点都应立即提交投资委员会复核。
