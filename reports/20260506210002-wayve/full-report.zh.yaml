      - number: '8.3'
        title: 情景分析与回报框架
        blocks:
          - type: paragraph
            body: >
              **乐观情景（25% 概率）：** Wayve 到 2028 年签署首个 OEM 商业协议（Nissan 或 Stellantis）。英国 AV Act 商业部署于 2026-2027 年启动。WAYVE-1 到
              2027 年获得 L4 认证。收入到 2029 年达到 $50M ARR。2027 年 Series D 估值 $8B–$12B。2031–2033 年以 $15B–$25B IPO 或战略收购退出。$3B
              Series C 投资者回报：5–8×。


              **基准情景（50% 概率）：** 首个 OEM 商业协议于 2029–2030 年签署。英国商业部署推迟到 2028 年。收入到 2030 年达到 $10M ARR。2028 年 Series D 估值
              $4B–$6B。2032–2035 年以 $8B–$12B IPO 或收购退出。$3B Series C 投资者回报：2.5–4×。


              **悲观情景（25% 概率）：** 到 2030 年仍无 OEM 商业协议。黑箱认证被拒或无限期推迟。收入接近零。Series D 降估值至 $1.5B–$2.5B，或变成人才收购。$3B Series C
              投资者回报：0.5–1×。若商业部署在 2031 年后仍因缺少过桥资本而延迟，则可能全损。
