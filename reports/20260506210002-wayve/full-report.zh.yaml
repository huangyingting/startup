              Mobileye 在 ADAS/AV 授权市场根基深，有 800+ 个 OEM 平台胜利和 $1.9B 年收入基础。Wayve 必须在每一家 OEM 替代或补充
              Mobileye——这是一个多年、重关系的销售周期，而 Wayve 的学术创始团队此前没有跑通过。这是最大的单一商业执行风险。
