      - number: '4.4'
        title: 资本充足性与财务风险评估
        blocks:
          - type: paragraph
            body: |
              资本充足性评估：

              $1.05B Series C 是英国初创公司史上最大单轮融资之一。按估计年度烧钱 $210M–$320M 计算，这一轮从 2024 年 5 月起提供约 3–5 年现金跑道
              （也就是约到 2027–2029 年），之后需要进一步融资。

              下一次融资触发点：Wayve 可能需要在 2027–2028 年完成 Series D 或 pre-IPO 轮，以支撑业务走到首批 OEM 商业协议。
              如果 OEM 协议签署并开始产生收入，下一轮融资可能以显著更高估值完成。

              财务风险：
              1. 烧钱升级：测试车队从 70 辆扩到 500+ 辆，会在收入规模化前将运营成本提高 5–7x。
              2. 算力成本通胀：训练越来越大的基础模型需要不断增长的 GPU 预算；NVIDIA H100/B200 集群成本在上升，尽管 NVIDIA 的投资可能带来优先访问权。
              3. OEM 评估资本：OEM 试点往往要求 Wayve 在商业条款敲定前先出资支持评估阶段——成本前置。
              4. 监管延迟风险：如果 UK AV Act 商业审批延迟 2+ 年，Wayve 必须用现有资本维持更久运营。
              5. 估值压缩风险：如果 AI/AV 市场在 Wayve 下一轮融资前回调，下一轮可能是平轮或降轮。

              Companies House（英国）文件确认 Wayve Technologies Ltd 是英国实体，至少拥有两个子公司（Wayve US、Wayve Canada）。
              公开渠道没有 PCAOB 审计财务报表。
