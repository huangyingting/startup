      - number: '4.2'
        title: 收入与收入模型
        blocks:
          - type: paragraph
            body: |
              截至报告生成日，Wayve 公开披露收入为零。公司处于商业化前开发阶段。商业化后的收入模型预计如下：

              核心收入流：向 OEM 收取 WAYVE-1 自动驾驶栈的按车授权费，结构为一次性集成费加持续按车版税或订阅。
              可比对象：Mobileye 向 OEM 收取 EyeQ 芯片加软件费用，约 $50–$200/vehicle。
              若 Wayve 的 L4 栈商业化，价格可能达到 $500–$5,000/vehicle。

              次级收入流：与车队运营商分享 robotaxi 服务收入（例如 Uber London 网约车收入分成，如果试点规模化）。这仍属推测，并发生在商业化之后。

              第三层 / 验证收入：为 OEM 合作伙伴提供技术开发服务（评估阶段的一次性项目费）。

              截至 2026 年 5 月，公司未宣布任何披露财务条款的商业协议。
              Uber London robotaxi 试点已经运行，但收入条款未公开。
