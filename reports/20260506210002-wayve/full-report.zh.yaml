      - number: '5.4'
        title: 技术路线图与竞争性技术风险
        blocks:
          - type: paragraph
            body: >
              Wayve 已发表技术路线图分三阶段：


              阶段 1（2024–2026）：WAYVE-1 商业就绪——为 UK AV Act 监管审批认证 WAYVE-1；签署首个 OEM 商业集成协议；部署商业 Uber London robotaxi 试点

              （从安全员监督过渡到无安全员）。


              阶段 2（2026–2028）：多 OEM 授权——把 WAYVE-1 迁移到 2–3 种新增 OEM 车型（商业配送、高速驾驶、更多地域）；证明无需重大模型重新训练即可跨车型泛化。


              阶段 3（2028+）：全球授权规模化——WAYVE-1 成为面向全球 OEM 的行业标准 L4 AV 基础模型；目标覆盖 3+ 大洲的 10+ 个 OEM 合作伙伴。


              关键技术风险：

              1. 黑箱神经网络认证：UK DVSA 和 EU AV 监管可能要求模型可解释，给 Wayve 的端到端路线制造认证障碍。

              2. 泛化主张尚未规模化验证：WAYVE-1 声称可跨车型泛化，但尚未在生产中的商业 OEM 硬件上证明。

              3. 算力成本扩张：为安全认证训练更大基础模型，可能需要超过估计年度 $40M–$80M 预算的算力支出。

              4. 安全员依赖：当前运营需要安全员——取消安全员需要 Wayve 尚未取得的监管批准。

              5. NVIDIA 依赖：WAYVE-1 针对 NVIDIA Orin/Thor 优化；如果 OEM 选择不同芯片（Qualcomm Snapdragon Ride、Mobileye EyeQ），Wayve
              将承担重新移植成本。
