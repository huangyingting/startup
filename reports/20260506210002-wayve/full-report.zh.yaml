      - number: '8.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 观察建议——首个 OEM LOI 是重估事件
            body: >
              Wayve 应继续观察，而不是按 Series C 条款立即投资。关键重估事件，是与 Tier 1 OEM（Toyota、Nissan、Stellantis、VW、Ford 或 BMW）签署意向书或商业协议，将
              WAYVE-1 集成进量产项目。该事件将确认 OEM 软件授权方商业模式，把悲观情景概率从 25% 降至 <10%，并支撑在 Series D 以 $5B–$8B 隐含估值进入。
            calloutType: insight
            claimRefs:
              - CV001
              - CV009
          - type: callout
            title: 估值完全靠叙事——认证结果才是根本价值驱动
            body: >
              Wayve 的 $2.5B–$5B 估计估值完全建立在两点上：（1）WAYVE-1 可以通过商业 L4 部署认证；（2）OEM
              会支付软件授权费，而不是自建。这两个假设都尚未得到公开验证。任何投资者都应把仓位规模锚定在这两个结果到 2030 年兑现的概率上。
            calloutType: insight
            claimRefs:
              - CV003
              - CV016
