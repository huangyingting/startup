      - number: '2.3'
        title: 客户分层与买方地图
        blocks:
          - type: paragraph
            body: |
              Wayve 的买方分为四个清晰细分，采购流程、合同结构和决策周期各不相同：

              **细分 1——汽车 OEM（高端与大众）：** 购买或授权 AV 栈，并集成进新车型项目。决策周期：3–7 年（车辆开发周期）。关键买方：
              Nissan、Mercedes-Benz、Stellantis（已确认合作）；BMW、Toyota、Hyundai（潜在）。采购：多年技术评估 → 概念验证 → 试点 → 商业授权。
              价值驱动：避免内部自研 AV AI 的成本（估计每家 OEM 5 年 $500M–$2B）。

              **细分 2——网约车运营商：** 需要完全自动驾驶的网约车栈以降低司机成本。关键买方：Uber（已确认）、Lyft、Didi。采购：战略合作加股权投资（Uber 模式）。
              价值驱动：消除司机成本（Uber 司机成本约 $0.50/mile；规模化后 AV 运营目标约 $0.15/mile）。

              **细分 3——最后一公里物流运营商：** 需要自动驾驶配送车用于杂货和包裹配送。关键买方：ASDA（已确认试验）、Royal Mail、Amazon、DHL。
              采购：试点项目 → 批量承诺。价值驱动：将最后一公里配送成本从 $3–5/delivery 降至规模化后的 <$1/delivery。

              **细分 4——政府和公共交通：** 公交 / 公共交通运营商寻求自动驾驶公共交通车辆。监管路径最长；考虑到复杂度，这是 Wayve 近期优先级最低的市场。

              买方集中风险：Uber 和 OEM 细分合计代表近期收入机会的 >80%。Wayve 在早期商业化阶段面临高度客户集中风险。
