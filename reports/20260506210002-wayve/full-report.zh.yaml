  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心产品——WAYVE-1 与具身 AI 架构
        blocks:
          - type: paragraph
            body: |
              Wayve 的产品是软件优先 AV 技术栈，由三个核心组件撑起：

              WAYVE-1（具身 AI 基础模型）：一个用 Wayve London 测试车队驾驶数据训练的端到端神经网络。WAYVE-1 接收原始传感器输入（摄像头、雷达），
              直接输出驾驶指令，不拆成中间的感知—预测—规划模块。模型通过迁移学习跨车型和地域泛化——这是关键 OEM 卖点。WAYVE-1 部署在 NVIDIA Orin SoC 硬件上。

              GAIA-1（生成式世界模型）：GAIA-1 于 2023 年 9 月发表，是一个 6.9B 参数的视频生成模型，用驾驶画面训练。它生成逼真的合成驾驶场景，用于训练和评估——
              类似模拟器，但在原始视频数据上运行，而不是几何游戏引擎。GAIA-1 让 Wayve 不必按比例增加实体测试车里程，也能扩充训练数据。

              AIM（Autonomous Intelligence Module）：Wayve 的车端推理模块，以安全关键延迟实时运行 WAYVE-1。AIM 对接车辆 CAN-bus、传感器硬件和执行系统——
              这是 OEM 硬件合作的主要集成点。

              Fleet Data Pipeline：一个持续学习系统，摄入 London 测试车队驾驶数据，标注安全相关场景，并重新训练 WAYVE-1——形成随时间和跨地域提升模型表现的数据飞轮。

              技术路线：无 LIDAR（摄像头 + 雷达）。目标硬件为 NVIDIA Orin/Thor SoC。
              无规则模块——纯神经网络端到端。Python/PyTorch 训练栈。
              基于 Kubernetes 的云训练基础设施（Microsoft Azure 合作）。
