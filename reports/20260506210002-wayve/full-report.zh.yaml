  - id: TV006
    title: 最终尽调问题
    slug: final-diligence-asks-table
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 责任方
      - 尽调路径
    rows:
      - - DVSA 认证预提交计划
        - 尚未公开 WAYVE-1 在 UK AV Act 下的认证策略
        - 决定商业化时间线；关系投资逻辑生死
        - Wayve CEO / 法务
        - 管理层会议索取；跟踪 DVSA 咨询
      - - OEM 管线状态（NDA / LOI）
        - 未披露 OEM 协议或意向书
        - 首个 LOI 是核心重估催化剂；缺位是中性偏负信号
        - Wayve 商务拓展
        - NDA 下索取管线摘要；通过 OEM 投资者关系渠道交叉验证
      - - Alex Kendall 归属安排与锁定期
        - 未公开创始人股权留存条款
        - 关键人离职是重大风险；留存条款可量化风险
        - Wayve CEO
        - 在条款清单中索取；核查 Companies House 董事任职历史
      - - SoftBank Series D 承诺
        - SoftBank 未披露领投 Series D 承诺
        - SoftBank 集中度风险；40%+ 股权结构让其参与至关重要
        - SoftBank / Wayve 投资者关系
        - 向 Wayve 索取投资者更新；联系 SoftBank Vision Fund 2 投资者关系
      - - WAYVE-1 安全表现指标
        - 未披露接管率、每次接管间隔里程或险情频率
        - 安全认证需要成文安全记录；该缺口很关键
        - Wayve 安全 / 工程
        - NDA 下索取内部安全看板；审阅 DVSA 预提交材料
      - - Wayve IP 组合（专利）
        - 未公开专利组合；arXiv 预印本限制可专利性
        - IP 保护缺口是护城河风险；Mobileye 2000+ 项专利带来潜在冲突
        - Wayve 法务 / IP
        - USPTO / EPO 检索；尽调中索取 IP 清单
    notes: 所有六个问题都属关键类别。未回答第 1、2、3 项前，不应作出投资承诺。
    claimRefs:
      - CV001
      - CV013
      - CV015
