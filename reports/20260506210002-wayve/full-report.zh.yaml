        title: 客户分层与目标市场
        blocks:
          - type: paragraph
            body: >
              Wayve 的 B2B 客户分为：


              细分 1——车队运营商 / 网约车平台（近期主线）：商业车队运营商希望降低司机成本。重点试点客户：Uber Technologies（London robotaxi）。潜在下一批客户：Lyft、Bolt、BYD
              Auto 车队服务。


              细分 2——乘用车 OEM 制造商（长期主线）：传统汽车 OEM 正在寻找 Level 4 自动驾驶栈，以集成到量产车型。重点评估伙伴：Nissan Motor Co.（英国试验）、Mercedes-Benz
              Group（研发合作）。目标管线：VW Group、BMW、Honda、Hyundai（Motional 之外）、Stellantis 乘用车。


              细分 3——商用车 OEM（中期）：生产厢式车、卡车和最后一公里配送车辆的 OEM。评估伙伴：Stellantis（LCV 配送）。潜在对象：Ford Transit / ProMaster、Renault
              Kangoo、Mercedes Sprinter 平台。


              细分 4——最后一公里配送运营商（推测）：拥有或租赁商用车队的杂货、电商和包裹配送运营商。试验伙伴：ASDA（Walmart UK 杂货配送）。潜在对象：Amazon
              Logistics（英国）、DHL、Ocado Robotics（英国）。


              所有细分市场都还未商业化；Wayve 未披露来自任何客户的收入。
