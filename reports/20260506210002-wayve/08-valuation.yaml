callouts:
  - id: CL801
    type: recommendation
    severity: high
    title: TRACK Recommendation — First OEM LOI Is the Rerating Event
    body: >
      Wayve should be TRACKED, not immediately invested at Series C terms. The pivotal rerating event is a signed letter
      of intent or commercial agreement with a Tier 1 OEM (Toyota, Nissan, Stellantis, VW, Ford, or BMW) for WAYVE-1
      integration into a production program. This event would confirm the OEM software licensor business model, reduce
      the bear-case probability from 25% to <10%, and justify an entry at $5B–$8B implied valuation in a Series D.
    claimRefs:
      - CV001
      - CV009
  - id: CL802
    type: risk
    severity: critical
    title: Valuation Is Entirely Narrative — Certification Resolution Is the Fundamental Value Driver
    body: >
      Wayve's $2.5B–$5B estimated valuation rests entirely on: (1) the assumption that WAYVE-1 can be certified for
      commercial L4 deployment, and (2) that OEMs will pay software licensing fees rather than build in-house. Neither
      assumption has been publicly validated. Any investor should anchor their position sizing to the probability of
      these two outcomes materializing by 2030.
    claimRefs:
      - CV003
      - CV016
