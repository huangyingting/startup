  claims:
    - id: CV001
      statement: >-
        Wayve's investment thesis rests on three pillars: (1) the global AV market reaches $400B+ by 2035 (McKinsey),
        (2) the OEM software licensor model has transformative unit economics at vehicle-production scale, and (3)
        Wayve's generalist WAYVE-1 stack is the only commercially viable OEM-licensable architecture with L4 capability.
      type: observed
      topic: Wayve investment thesis summary
      sourceRefs:
        - SV010
        - SV017
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QV010
        - QV013
      contradictsClaimRefs: []
    - id: CV002
      statement: >-
        The primary anti-thesis is that Wayve's end-to-end neural network approach cannot receive L4 certification
        without architectural modification — a fundamental conflict with regulatory explainability requirements that
        could invalidate the core investment narrative.
      type: inferred
      topic: primary anti-thesis for Wayve investment
      sourceRefs:
        - SV010
        - SV011
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QV006
      contradictsClaimRefs: []
    - id: CV003
      statement: >-
        Argo AI (Ford/VW AV joint venture) shut down in October 2022 after burning $3.6B over six years without
        achieving commercial deployment — the most directly cautionary AV precedent for Wayve's investment case.
      type: observed
      topic: Argo AI shutdown as Wayve cautionary precedent
      sourceRefs:
        - SV009
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QV006
      contradictsClaimRefs: []
    - id: CV004
      statement: >-
        In November 2023, GM slashed Cruise's internal valuation by ~$6B following TfL (California DMV) permit
        suspension, illustrating that AV valuations can decline by 30-50% within a single quarter following a safety or
        regulatory setback.
      type: observed
      topic: GM Cruise valuation cut as AV valuation volatility precedent
      sourceRefs:
        - SV027
        - SV028
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QV023
      contradictsClaimRefs: []
    - id: CV005
      statement: >-
        Wayve's $1.05B Series C (May 2024) was led by SoftBank Vision Fund 2 with participation from NVIDIA, Microsoft,
        Uber, Virgin, Baillie Gifford, and LG — no disclosed post-money valuation, but external estimates range from
        $2.5B to $5B.
      type: observed
      topic: Series C structure and estimated valuation
      sourceRefs:
        - SV001
        - SV002
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QV001
        - QV017
      contradictsClaimRefs: []
    - id: CV006
      statement: >-
        Wayve's total capital raised from Seed through Series C is approximately $1.275B, all in the form of equity (no
        disclosed debt) — creating a cumulative preference stack of $1.275B+ that must be exceeded before common
        shareholders receive proceeds.
      type: observed
      topic: total capital raised and preference stack
      sourceRefs:
        - SV023
        - SV024
      confidence: medium
      freshness: recent
      answersQuestionRefs:
        - QV002
        - QV018
      contradictsClaimRefs: []
    - id: CV007
      statement: >-
        At a $3B exit valuation, Wayve's $1.275B preference stack returns 1× to preference holders, with ~$1.7B
        available for pro-rata distribution — meaning Series C investors at $3B implied would receive approximately par,
        not a return.
