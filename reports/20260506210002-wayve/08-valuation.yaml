company:
  name: Wayve
chapter:
  number: 8
  title: Valuation
  summary: |
    Wayve's valuation is undisclosed at Series C ($1.05B, May 2024), with external estimates of $2.5B–$5B.
    The company is pre-revenue with an estimated $210–320M annual burn. The base-case valuation is $3B at
    Series C, implying a 3–5× return to a notional $300M entry at that round in a 7–8 year bull scenario.
    The bear case is partial loss or recovery at a distressed $1–2B. The recommendation is TRACK: Wayve
    has category-defining technology (GAIA-1, WAYVE-1), a unique regulatory first-mover position in the
    UK, and strong investor alignment — but zero revenue, no OEM commercial contract, and a certification
    path for black-box AI that is structurally unresolved. The valuation is supportable only if the
    first OEM license materializes by 2028. The risk rating is critical.
sections:
  - id: s1
    title: Investment Thesis and Anti-Thesis
    body: |
      **Thesis:** Wayve is the only AV company that has built a generalist embodied AI driving policy
      (WAYVE-1) trained on a generative world model (GAIA-1) at production scale, and has done so with
      the explicit goal of OEM licensing rather than internal fleet deployment. The UK AV Act 2024 —
      the world's first national commercial L4 framework — creates a time-limited regulatory moat.
      Wayve's $1.05B Series C with SoftBank, NVIDIA, Microsoft, and Uber provides strategic distribution
      alignment that Mobileye does not have. If Wayve secures even one major OEM commercial license
      (targeting Toyota, Nissan, or Stellantis by 2028), the fundamental unit economics of an OEM
      software licensor are transformative: $10–50 per vehicle per month × millions of vehicles = $1B+
      ARR potential.

      **Anti-thesis:** Wayve has zero commercial revenue after 8 years of operation. It has not disclosed
      its certification roadmap for black-box neural network AI under UK DVSA or EU AI Act requirements.
      Mobileye's 800+ OEM relationships represent a 3–7 year sales cycle advantage. Waymo's $45B implied
      valuation and 10M+ miles create a safety data moat that Wayve cannot close without a step-change
      in fleet scale. A bear scenario — regulatory delay, no OEM license by 2028, and SoftBank unable
      to co-lead Series D — could result in Wayve becoming a distressed asset or requiring a fire-sale
      acquisition at $0.5–1.5B.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
  - id: s2
    title: Financing Context and Valuation Entry Discipline
    body: |
      Wayve's Series C ($1.05B, May 2024) is the qualifying unicorn financing. SoftBank Vision Fund 2
      led; co-investors include NVIDIA, Microsoft, Uber, Virgin, Baillie Gifford, and LG. No disclosed
      post-money valuation, but secondary market and fund marks suggest $2.5B–$5B range. Total raised
      since 2017 is approximately $1.275B (Seed through Series C).

      Entry discipline for a new institutional investor at Series C is constrained: the round is closed.
      Any entry would be via secondary purchase (est. ~$3–4B valuation), structured note, or direct
      participation in a Series D (expected 2027–2029, targeting $500M–$1B at $5B–$10B valuation subject
      to commercial milestones). Entry above $5B implied valuation carries a high risk of down-round
      correction in the absence of a signed OEM contract.

      Preference stack risk: Wayve's $1.275B+ raised at 1× liquidation preference means ~$1.275B must be
      returned to preference holders before common shareholders receive any proceeds in a sub-$1.3B exit.
      At a $3B exit, common shareholders (including founders and employees) receive ~55% of proceeds.
    claimRefs:
      - CV005
      - CV006
      - CV007
      - CV008
  - id: s3
    title: Scenario Analysis and Return Framework
    body: |
      **Bull case (25% probability):** Wayve signs first OEM commercial agreement (Nissan or Stellantis)
      by 2028. UK AV Act commercial deployment begins 2026-2027. WAYVE-1 achieves L4 certification by
      2027. Revenue reaches $50M ARR by 2029. Series D at $8B–$12B valuation in 2027.
      IPO or strategic acquisition at $15B–$25B in 2031–2033. Return to $3B Series C investors: 5–8×.

      **Base case (50% probability):** First OEM commercial agreement signed 2029–2030. UK commercial
      deployment delayed to 2028. Revenue reaches $10M ARR by 2030. Series D at $4B–$6B valuation in
      2028. IPO or acquisition at $8B–$12B in 2032–2035. Return to $3B Series C investors: 2.5–4×.

      **Bear case (25% probability):** No OEM commercial agreement by 2030. Black-box certification
      rejected or delayed indefinitely. Revenue near zero. Down-round Series D at $1.5B–$2.5B or
      acqui-hire. Return to $3B Series C investors: 0.5–1×. Full loss possible if commercial deployment
      is delayed past 2031 without bridge capital.
    claimRefs:
      - CV009
      - CV010
      - CV011
      - CV012
  - id: s4
    title: Exit Readiness and Final Diligence
    body: |
      Wayve is 4–7 years from IPO readiness at the earliest. Revenue threshold for AV tech IPO
      (post-Mobileye precedent) is $100M–$500M ARR or a credible commercial pipeline letter of intent
      from a Tier 1 OEM. SPAC path is available but carries execution risk given Arrival, Lilium, and
      other UK SPAC failures. M&A is the most likely exit: automotive OEM acquisition (Toyota, Ford, GM)
      at $8B–$20B range, or technology acquisition (Apple, Microsoft, Alphabet at $20B+) subject to
      competition authority review. The four final diligence questions for any new investor are:
      (1) Is there a signed NDA or LOI with any OEM? (2) What is Wayve's DVSA pre-submission plan
      for WAYVE-1 certification? (3) What is Alex Kendall's vesting schedule and lock-up? (4) Has
      SoftBank committed to Series D participation?
    claimRefs:
      - CV013
      - CV014
      - CV015
