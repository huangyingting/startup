summary:
  headline: >
    Wayve 做出了欧洲最先进、可授权给 OEM 的自动驾驶系统，也拿到 SoftBank、NVIDIA、Microsoft 与 Uber 合计 $1.05B 的背书；但公司运营八年后仍完全没有收入。UK AV Act 2024
    确实打开了监管先发窗口，但 Wayve 的核心技术路线——黑盒端到端神经网络——正面撞上监管认证对可解释性的要求，而 DVSA 尚未正式给出处理路径。在首个 OEM 商业协议或 DVSA
    认证路径公开确认前，维持观察；这些里程碑出现前，不宜以高于 $5B 入场。
