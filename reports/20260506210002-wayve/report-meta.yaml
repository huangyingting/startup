  productSummary: |
    GAIA-1: 6.9B parameter generative world model; generates photorealistic synthetic
    training scenarios including rare and safety-critical edge cases; inputs: video,
    text, action; used as training data generator for WAYVE-1.
    WAYVE-1: End-to-end neural network driving policy; takes raw sensor input (cameras,
    GPS, map data) and outputs steering/throttle commands; trained on GAIA-1 plus
    London real-world fleet data; runs on NVIDIA Orin/Thor SoC; designed for OEM
    integration. No LiDAR required (camera-first architecture, lower hardware cost).
    London Uber pilot: WAYVE-1 operating in safety-driver supervision mode on Uber
    platform in London; not yet commercially unsupervised.
