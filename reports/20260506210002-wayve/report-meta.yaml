summary:
  headline: |
    Wayve has built the most advanced OEM-licensable AV system in Europe and secured
    $1.05B in validation from SoftBank, NVIDIA, Microsoft, and Uber — while remaining
    entirely pre-revenue after eight years of operation. The UK AV Act 2024 creates a
    genuine regulatory first-mover window, but Wayve's core technical approach (black-box
    end-to-end neural networks) directly conflicts with regulatory certification requirements
    that DVSA has not yet formally addressed. TRACK until first OEM commercial agreement
    or DVSA certification pathway is publicly confirmed. Entry above $5B inadvisable
    before those milestones.
