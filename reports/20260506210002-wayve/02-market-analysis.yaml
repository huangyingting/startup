callouts:
  - id: CL201
    type: strength
    severity: high
    title: UK Automated Vehicles Act 2024 — First-Mover Regulatory Tailwind
    body: >
      The UK Automated Vehicles Act 2024 creates the world's first comprehensive national legal framework for commercial
      Level 4 AV deployment. As the only well-funded, UK-headquartered AV technology company with active London testing
      permits and Uber partnership, Wayve is uniquely positioned to be the first company to achieve commercial L4
      deployment under this new framework.
    claimRefs:
      - CM014
      - CM015
  - id: CL202
    type: risk
    severity: high
    title: Waymo Head Start — Commercial Miles Gap
    body: >
      Waymo has accumulated more than 10 million autonomous miles in cities including San Francisco, Phoenix, and Los
      Angeles — with paid rides, commercial insurance, and a 10+ year safety record. Wayve's London test fleet is
      estimated at 60–70 vehicles. The commercial safety record gap between Waymo and Wayve is measured in years, not
      months.
    claimRefs:
      - CM009
      - CM017
