callouts:
  - id: CL701
    type: risk
    severity: critical
    title: Black-Box AI Certification — The Existential Technical Risk
    body: >
      Wayve's entire technical differentiation conflicts with regulatory certification requirements. If UK DVSA or EU
      regulators require interpretable, fault-attributable AI systems for L4 commercial approval, Wayve faces two
      options: add modular interpretability components (reducing differentiation) or lobby for new certification
      standards (5+ years). This risk has the highest potential to permanently alter Wayve's competitive positioning
      relative to Mobileye.
    claimRefs:
      - CR002
      - CR009
  - id: CL702
    type: risk
    severity: high
    title: Founder Key-Person Risk — Shah and Kendall Are Both Indispensable
    body: >
      Wayve's core IP, investor relationships, and OEM credibility flow directly through CEO Amar Shah and CTO Alex
      Kendall. The departure of either founder at this stage would materially reduce Wayve's commercial execution
      probability. Wayve has not disclosed any succession plan, non-compete, or long-term incentive structure that
      mitigates this concentration.
    claimRefs:
      - CR013
      - CR014
