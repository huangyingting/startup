company:
  name: Wayve
chapter:
  number: 7
  title: Risks
  summary: |
    Wayve faces five major risk categories: (1) Regulatory — UK AV Act implementation timeline
    uncertainty and EU AI Act compliance; (2) Competitive — Waymo's 10M+ autonomous miles head start
    and Mobileye's entrenched OEM relationships; (3) Technical — black-box neural network certification
    barrier and training data scale gap; (4) Execution — academic-founder team lack of enterprise sales
    experience and Uber concentration risk; and (5) Financial — zero revenue, $210–320M annual burn,
    and runway dependency on Series D by 2027–2028. The critical kill trigger is failure to secure first
    commercial OEM agreement by 2028 within Series C runway. The overall risk rating is critical: all
    five major risks could materialize concurrently in a bear scenario.
sections:
  - id: s1
    title: Regulatory and Legal Risks
    body: |
      The UK Automated Vehicles Act 2024 is Wayve's primary regulatory tailwind and the primary
      timeline risk simultaneously. The AV Act establishes the first national commercial L4 deployment
      framework globally, creating a legal path for Wayve to operate unsupervised commercial rides in
      London. But implementation regulations are in consultation through 2025, with AVE (AV Entity) and
      OAV (Operator of Automated Vehicles) licensing expected to begin in 2026. If implementation is
      delayed to 2027+, Wayve must sustain operations without commercial revenue for an additional
      12-24 months, requiring approximately $250M-$640M additional capital.

      EU AI Act (2024): The EU AI Act classifies L4 autonomous vehicle systems as high-risk AI,
      requiring mandatory conformity assessments, technical documentation, and post-market monitoring.
      Wayve must comply if deploying in EU markets. Compliance costs estimated at $2M-$10M per vehicle type.

      IP and patent risks: Mobileye holds 2,000+ AV-related patents. Wayve has not disclosed its patent
      portfolio, and GAIA-1 / WAYVE-1 were published as arXiv preprints, potentially limiting patentability.

      Regulatory sanctions: Any safety incident during the London pilot could trigger TfL suspension
      of Wayve's London operating permits, similar to Cruise's 2023 California DMV suspension.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
  - id: s2
    title: Competitive and Market Risks
    body: |
      The competitive risk landscape for Wayve is severe. Waymo has 10M+ autonomous miles, a $45B
      implied valuation, and commercial rides in three US cities. Wayve has fewer than 1M estimated
      autonomous miles, zero commercial rides, and a $2.5-$5B estimated valuation. This gap is measured
      in years of safety data and billions of dollars of capital. Waymo reported UK expansion evaluations
      in 2024 and is in early Volkswagen Europe discussions — directly threatening Wayve's OEM pipeline.

      Mobileye has 800+ OEM customer relationships and $1.9B annual revenue. Wayve must displace or
      supplement Mobileye at each OEM — a 3-7 year sales cycle against an entrenched competitor.

      Tesla FSD's 500M+ supervised miles validates camera-only approaches but Tesla's vertical integration
      means it will not license to OEMs, creating reference ambiguity rather than direct competition.

      LIDAR cost decline: prices fell below $500/unit in 2023, projected $100-200/unit by 2027 —
      reducing Wayve's LIDAR-free cost argument substantially.

      OEM in-house programs (CARIAD, Toyota Woven Planet, BMW Autonomous) could succeed, eliminating
      the need for external licensors at those OEMs.
    claimRefs:
      - CR005
      - CR006
      - CR007
      - CR008
  - id: s3
    title: Technical and Operational Risks
    body: |
      Wayve's primary technical risk is its end-to-end neural network certification path.
      UK DVSA, EU regulators, and NHTSA all require interpretable, fault-attributable AI systems
      for commercial L4 deployment. Wayve's pure end-to-end neural network approach cannot currently
      provide causal fault attribution — a barrier that could force Wayve to add interpretability modules,
      potentially undermining its competitive differentiation.

      Data scale gap: Wayve's 60-70 vehicle fleet accumulates data at 1/100th the rate of Waymo's 700+
      vehicle fleet. GAIA-1 synthetic data partially compensates, but a fundamental training data scale gap
      remains for edge cases that determine AV safety performance.

      NVIDIA hardware dependency: WAYVE-1 is optimized for NVIDIA Orin/Thor SoC. If OEMs choose
      alternative silicon, Wayve faces re-porting costs and certification re-validation.

      Operational scaling: Scaling from 70 to 500+ test vehicles requires 5-7x cost increase in fleet
      operations without proportional revenue — a capital drain before any licensing income.

      Cybersecurity: Wayve's fleet data pipeline is a cybersecurity attack surface that Wayve has not
      publicly addressed with a disclosed security program.
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR012
  - id: s4
    title: Execution, People, and Partner Risks
    body: |
      Wayve's execution risks center on its academic-founder team and single-partner concentration.
      Amar Shah (CEO) and Alex Kendall (CTO) are Cambridge PhD academics building their first enterprise
      software company. Neither has prior experience managing 600-person engineering organizations or
      executing multi-year OEM enterprise sales cycles. Wayve has not disclosed any succession plan.

      Enterprise sales capability gap: Wayve's academic-founder leadership has not previously executed
      multi-year, multi-stakeholder OEM enterprise sales against Mobileye's dedicated account teams.

      Uber concentration risk: Uber previously sold its ATC AV unit to Aurora (December 2020) when
      economics shifted. If Uber exits the UK AV market, Wayve loses its primary commercial proof point.

      SoftBank capital dependency: SoftBank Vision Fund 2 leads both Series B and Series C. SoftBank's
      portfolio stress (WeWork, Vision Fund 2 markdowns) creates a risk that SoftBank may be unable or
      unwilling to participate in Wayve's Series D.

      Talent retention: Wayve competes for embodied AI engineers against Waymo, DeepMind, OpenAI, and
      NVIDIA — all offering higher cash or more established equity, creating ongoing churn risk.
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
