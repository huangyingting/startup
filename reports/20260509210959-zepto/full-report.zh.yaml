  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局：直接即时零售对手与集团型入局者
        blocks:
          - type: paragraph
            body: >
              印度即时零售市场目前是三强寡头，Blinkit、Zepto 和 Swiggy Instamart 按 GOV 计算合计掌握 80–85%
              市场份额。不过竞争版图正在迅速扩张，四家资金深厚的集团型入局者——Flipkart Minutes（Walmart）、Amazon Now、JioMart（Reliance）和 BigBasket BB
              Now（Tata）——都在投入数百个前置仓和数十亿美元资本。


              Blinkit 是明确市场领导者，市占率约 44–50%，前置仓约 ~1,300 个，并目标在 2025 年底达到 2,000 个。Goldman Sachs 2024 年 4 月对 Blinkit 估值 $13
              billion，超过 Zomato 核心外卖业务。Zepto 以 25–29% 市占率和 ~1,000 个前置仓位居第二，Swiggy Instamart 则以 23–25% 市占率、在 124 个城市约
              ~1,021 个前置仓排在其后。竞争正在升温：Blinkit 的 GOV 在 Q1 FY26 同比增长 140% 至 ₹11,821 crore；Swiggy Instamart 的 GOV 翻倍以上；Zepto
              FY25 收入增长 149% 至 ₹11,110 crore。


              前三大之外，Flipkart Minutes 是最激进的新进入者，从 2024 年 8 月上线时的 100 个门店扩至 9 个月内 300+ 个，并目标年底达到 800 个。Amazon Now 计划在
              Delhi-NCR、Mumbai 和 Bengaluru 建设 300+ 个前置仓，投入 $233 million。JioMart 已在 1,000+ 个城市运营 600+ 个前置仓；BigBasket BB
              Now 运营 ~500 个仓，并有 Tata Group 大力支持。因此，竞争版图同时包括 VC 支持的创业公司（Zepto）和集团支持、资本几乎无限的业务部门，给 Zepto 带来生存级竞争压力。
