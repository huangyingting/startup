      - number: '2.2'
        title: 市场规模与增长预测
        blocks:
          - type: paragraph
            body: >
              印度即时零售市场在 FY25 估计达到 $5.0–5.4 billion GMV；据 Citi Research，到 2025 年 3 月，前三大玩家（Blinkit、Zepto、Swiggy
              Instamart）合计年化 GOV 运行率约 $9 billion。多家市场研究机构预计，到 2030 年，该行业将增长至 $9.3–11.1 billion，保守口径隐含 13–16% CAGR。Citi
              更激进的预测认为，前三大 GOV 到 FY28 将达到 $26 billion，在其基准情景下对应 73% CAGR。Bain & Company 预计印度更广义的线上杂货市场（包括预约配送和即时零售）到
              2030 年将达到 $57 billion，可视为总可触达市场的外沿。印度整体杂货零售行业提供 $600–720 billion 的底层 TAM，但即时零售的 SAM 受限于前置仓经济性成立的城市都会区，估计约为
              $50–60 billion 城市杂货支出。Zepto 自身的 SOM 约 $10–15 billion，代表其在当前 29–30%
              份额基础上，从增长市场中可现实捕获的规模。不同来源的市场规模估计差异很大，原因包括定义差异（GMV vs. 净收入、是否纳入非杂货品类）和基准年份不同；投资者必须谨慎三角校验。
