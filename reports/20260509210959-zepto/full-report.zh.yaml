      - number: '4.8'
        title: 反向财务担忧
        blocks:
          - type: paragraph
            body: >
              Zepto 尽调中有几项反向财务信号值得关注。第一，FY25 收入增长 129%，但净亏损扩大
              177%，说明成本结构没有高效随规模摊薄——亏损增速快于收入。第二，批评者认为即时零售在结构上难以盈利：配送成本、冷链要求和小客单价压出很薄的利润率，可能永远无法支撑公司层面盈利。The Hindu
              Business Line 报道，IPO 前夕即时零售战局升温，亏损也急剧扩大。第三，Zepto 靠折扣和促销拉动订单量，使外界质疑需求究竟是自然需求，还是补贴买来的需求。第四，IPO 估值可能下调
              15–20%，说明即便成熟投资者也在重新校准预期。第五，虽然公司烧钱速度在下降，但每月 ₹250–300 Cr 对一家从未盈利的公司来说仍然很重。Business Outreach
              和其他分析师质疑即时零售能否实现可持续盈利，并指出门店层面 EBITDA 为正只是必要条件，不足以证明公司层面可行。IPO 投资者评估 Zepto 长期财务可持续性时，这些担忧都很重要。
            claimRefs:
