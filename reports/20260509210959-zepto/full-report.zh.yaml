          to: risk-check
          label: 有条件 — 12–15 个月
        - from: risk-check
          to: proceed
          label: 是 — 可控
        - from: market-check
          to: pass
          label: 否
        - from: growth-check
          to: pass
          label: 否
        - from: risk-check
          to: pass
