      - number: '2.8'
        title: 市场展望及对 Zepto 的影响
        blocks:
          - type: paragraph
            body: >
              印度即时零售市场正从不惜代价增长，转向由可持续单位经济性和盈利路径决定赢家的阶段。市场预计到 2030 年增长至
              $9.3–11B，足以给前三大玩家留下充足跑道；关键问题是当前三家格局能否维持，还是会进一步整合。对 Zepto 而言，几个因素决定其位置。29–30% 市占率和快速订单增长（已超过 Swiggy
              Instamart）让它成为可信的二号玩家，但与 Blinkit（44% 份额）的差距很大；Blinkit 借助 Zomato 的公开市场资本，绝对差距还在扩大。Zepto 的 IPO 已于 2026 年 5
              月获 SEBI 批准，目标募资 ₹11,000–12,000 crore（$1.2–1.3B）；若成功，将为网络扩张赛提供关键资本入口。公司 $900M 现金储备按当前烧钱速度约可支撑 12–18 个月，因此
              IPO 时间表对资本连续性很重要。向非杂货垂直品类扩张（Zepto Cafe、电子产品、美妆）以及广告收入多元化，提供改善混合利润率的上行选择。但 Zepto 必须证明可信的盈利路径——据称 75% 前置仓单店已
              EBITDA 转正，但整体层面的盈利仍很遥远。监管环境将越来越多地塑造运营成本和竞争动态，零工要求和食品安全合规会叠加结构性成本。总体看，市场机会真实且巨大，但执行风险和资本强度依然很高。
