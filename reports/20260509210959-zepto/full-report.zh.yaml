companyProfile:
  summary: >-
    Zepto 是一家印度即时零售创业公司，2021 年由 Stanford 辍学生 Aadit Palicha（CEO）和 Kaivalya Vohra（CTO）创立，通过分布在印度 70+ 个城市、约 900
    个前置仓的网络，率先跑通 10 分钟杂货配送。公司主体为 Kiranakart Technologies Private Limited，累计融资超过 $2.3 billion；2025 年 10 月，CalPERS 领投 $450
    million 轮后估值达到 $7 billion。Zepto 的品类覆盖杂货、生鲜、个护、电子产品，也延伸到 Zepto Cafe、Zepto Advertising 等相邻服务。公司披露 FY25 收入约 ₹11,110
    crore（~$1.3 billion），同比增长 150%，但净亏损扩大至 ₹3,367 crore。Zepto 2025 年 12 月向 SEBI 递交 DRHP，并于 2026 年 5 月获 IPO 批准，目标在 2026 年
    7 月至 9 月上市。
