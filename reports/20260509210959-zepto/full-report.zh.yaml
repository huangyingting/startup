      - number: '8.2'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: >-
              综合可比分析应把 Zepto 同印度及全球的即时零售、配送平台放在一起看。在印度，Zomato（现 Eternal）旗下即时零售业务 Blinkit 估值最高；按 Goldman Sachs
              分部估值测算，Blinkit 约值 $13 billion，较 2023 年 3 月的 $2 billion 涨约 6 倍。Zomato 总市值约 $20 billion，Blinkit
              已是其中占比最大的部分。Swiggy 2024 年上市，目前市值约 ₹72,662 crore（~$8.7 billion）；其 Instamart 即时零售板块 FY26 四季度 GOV 为 ₹7,881
              crore，同比增长 68.8%。全球同行中，DoorDash 以 FY25 收入 $13.7 billion 对应 $67–75 billion 市值，隐含 4.9–6.7x
              收入倍数。Instacart（Maplebear）市值 $7–9 billion，估计收入 $3.1–3.5 billion，对应 2–3x。Grab Holdings 以 FY25 收入 $3.37
              billion 对应 $13–15 billion 市值（4–4.5x）。Gopuff 是美国最接近的前置仓可比公司，2025 年 11 月按 $8.5 billion 估值融资，低于 $15 billion
              峰值。Zepto 以约 $1.3 billion 收入对应 $5.6–7 billion 估值，隐含 4.3–5.4x，高于 Instacart、低于 DoorDash 和 Blinkit。相较同行 20–50%
              的增速，Zepto 149% 的收入增长可以部分支撑增长溢价；但净亏损规模很大，相对已经实现或接近 EBITDA 盈利的 DoorDash 和 Blinkit，仍要打盈利能力折价。
