      - number: '3.4'
        title: 定价、配送费与消费者经济性
        blocks:
          - type: paragraph
            body: >
              印度即时零售的定价策略正在趋同，平台要在获客和盈利路径压力之间平衡。Zepto 的免配送费门槛最低，为 ₹99；Blinkit 为 ₹199，Swiggy Instamart 为
              ₹299。低于这些门槛时，各平台配送费为 ₹16–30。这套定价让 Zepto 成为小额、冲动型订单最容易触达的选择；这是一种有意提高下单频次、培养习惯的策略。


              在基础配送费之外，三家平台都会在需求高峰期加收处理费、动态加价和雨天费；批评者指出，恶劣条件下总订单成本可能增加 15–25%。2025 年，行业因诱导性定价做法受到监管审查，Zepto 被 CCPA
              罚款，随后取消隐藏收费、处理费和动态加价。这一监管行动短期伤害声誉，但也可能让 Zepto 竞争受益，因为它迫使公司先于竞争对手采用更透明定价。


              平均订单价值差异显著：BigBasket 以 ₹850 领先，反映其传统杂货客户基础；Blinkit、Zepto 和 Swiggy Instamart 则集中在 ₹550–665 区间。纯即时零售的 AOV
              更低，体现 10 分钟配送购买更偏冲动和便利，而不是计划性杂货购物。截至 FY25，主要玩家没有一家实现广泛运营盈利；整个行业仍在用增长换份额，所有参与者的利润率都很薄或为负。
            claimRefs:
              - CP021
              - CP022
              - CP023
              - CP012
