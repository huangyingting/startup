      - number: '6.6'
        title: 客户信任与监管挑战
        blocks:
          - type: paragraph
            body: >-
              Zepto 面临三类不同的客户信任挑战，可能损害长期留存和品牌权益。第一，Central Consumer Protection Authority（CCPA）于 2025 年 12 月因 Zepto
              部署暗黑模式 UI 做法罚款 ₹7 lakh，包括购物篮夹带（结账时未经同意自动选择 Zepto Pass）、滴漏定价（只在最终结账展示强制处理费）和虚假紧迫倒计时。CCPA 要求 Zepto
              重新设计结账流程，移除默认预选项，并在 15 天内提交合规报告。CEO Palicha 承认部分策略「越线」，并承诺消除暗黑模式。第二，2025 年 1
              月，社交媒体病毒式帖子曝光基于设备的动态定价；消费者记录到同一商品（例如 500g 青椒）会因设备不同显示明显不同价格：Android 为 ₹21，iPhone 为 ₹107。这引发消费者愤怒，并招致
              Consumer Protection Authority 的监管审查。第三，2025 年 6 月，Maharashtra 的 Food and Drug Administration
              在检查中发现食品上有霉菌、过期商品与新鲜商品混放、商品放在肮脏湿地板上，于是暂停了 Zepto Dharavi 仓库许可证。一名前员工吹哨人公开指称，Zepto
              经常在新鲜库存不足时发出过期食品。单看每起事件都可控，但叠加起来，会在 Zepto 准备 2026 年 7–9 月 IPO 时形成声誉风险。
            claimRefs:
