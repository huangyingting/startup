      - number: '4.4'
        title: 资本结构与融资
        blocks:
          - type: paragraph
            body: >
              Zepto 自 2021 年以来完成 15+ 轮融资，累计募资超过 $2.3 billion，已是全球资本化程度最高的即时零售初创公司之一。近期关键轮次包括：2024 年 6 月以 $3.6B 估值完成
              $665M Series F 轮，2024 年 8 月以 $5B 估值完成 $340M Series G 轮，2024 年 11 月以 $5.22B 估值完成 $350M Series G 延展轮，以及 2025
              年 10 月由 CalPERS 领投、以 $7B 估值完成 $450M 融资。2025 年 10 月融资后，CEO Aadit Palicha 称公司持有 $900 million 现金储备。按每月约
              ₹250–300 Cr（$30–36M）的烧钱速度计算，在不继续融资的情况下，这笔现金大约能支撑 25–30 个月运营。公司已于 2025 年 12 月 26 日向 SEBI 保密提交预披露招股说明书，并在
              2026 年 5 月 8 日获得 SEBI 批准。计划中的 IPO 目标发行新股募资 ₹11,000–12,000 Cr（$1.2–1.3B），这会让现金跑道增加一倍以上。不过，2026
              年初的报道显示，Zepto 可能把 IPO 估值较 $7B 私募轮下调 15–20%，预期区间降至 $5.6–5.95B，反映投资者正在审视其亏损状况。
