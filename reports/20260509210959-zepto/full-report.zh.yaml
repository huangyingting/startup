      - number: '5.8'
        title: 反向技术与产品担忧
        blocks:
          - type: paragraph
            body: >
              Zepto 尽调中有几项反向技术和产品风险值得关注。第一，AWS 单一供应商依赖构成重大基础设施风险：整套技术栈——EKS、DynamoDB、Aurora、S3——都跑在 AWS 上，随着 Zepto
              扩张，会形成集中度风险和潜在成本暴露。对高订单量电商平台而言，云基础设施成本通常占收入 5–10%，AWS 的定价权可能压缩利润率。第二，CCPA 暗黑模式罚款金额虽小（₹7
              lakh），但暴露出系统性的产品设计问题；这些做法是有意采用的增长战术，不是系统漏洞，因此引发对产品团队伦理决策框架的质疑。第三，自研技术栈理念虽然减少第三方依赖，却带来沉重工程开销和人才风险：Zepto
              必须在仓库管理、物流优化、广告技术和 ML/AI 等领域招聘并留住专业工程师；以公司体量来看，这一覆盖面很宽。第四，Zepto Atom
              数据分析产品在消费者数据向品牌共享的内容、颗粒度和匿名化标准上仍有未解决隐私问题；DPDPA 2023 框架仍在落地，执法姿态也不确定。第五，快速进入食品制作（Zepto
              Cafe）让公司承担超出杂货配送的食品安全责任和监管复杂度，包括 FSSAI 厨房许可、卫生合规，以及预制食品冷链要求。
            claimRefs:
              - CE047
              - CE048
              - CE049
              - CE050
              - CE051
              - CE052
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与人口画像
        blocks:
          - type: paragraph
            body: >-
              Zepto 的客户群可按人口属性、地域和使用行为分成三个主要队列。最大一类是 25–35 岁城市千禧一代，包括大城市里的职场人士和年轻家庭；他们用 app 做日常补货式买菜，而不是每周大批量采购。这些用户看重
              10 分钟配送承诺，也愿意为省时间支付适度便利费。第二类是 18–25 岁 Gen Z
              消费者，包括大学生和住在城市合租房中的早期职场人士；他们更偏冲动消费，购买零食、饮料、个护等品类，也是按下载量看增长最快的队列。第三类是郊区和 Tier 2 城市采用者；随着 Zepto 从最初前 8
              个大城市扩张到 Lucknow、Jaipur、Chandigarh、Indore 等城市，这一群体仍处早期，但战略重要性很高。从收入看，Zepto 核心客户处于中产到中上阶层，主要是习惯用智能手机和 UPI
              付款的消费者。平台还服务一层 B2B 客户：10,000+ 个 FMCG 和 D2C 品牌使用 Zepto Advertising 购买赞助商品位、banner 位和搜索推广，带来约 ₹1,000 Cr
              年化广告收入。品牌广告主包括 Nestlé、Hindustan Unilever、Procter & Gamble、Britannia、ITC、Godrej 等蓝筹 FMCG 公司；它们把 Zepto
              视为关键数字分销和效果营销渠道。CEO Aadit Palicha 曾把 Zepto 描述成聚焦前 40 个城市的「印度超本地 Walmart」；公司预计这些城市到 2029 年将贡献印度城市杂货市场近 50%。
