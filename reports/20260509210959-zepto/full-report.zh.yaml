      - number: '2.6'
        title: 增长约束与逆风
        blocks:
          - type: paragraph
            body: >
              尽管顺风强劲，几个实质性约束压低增长前景。盈利能力仍是行业核心难题：三大玩家整体层面都继续亏损，Zepto FY25 在收入增长 150% 的情况下净亏损 ₹3,367
              crore。高配送成本（最后一公里物流、零工补偿、冷链要求）与低平均订单价值之间的基本张力，使多数地区的单位经济性很薄，甚至为负。监管风险正在多线升温。FSSAI
              加强了对即时零售平台的审查，要求最低剩余保质期、清晰展示到期日，并要求食品与非食品分开配送以避免污染。CCPA 正在积极打击诱导性界面设计和操纵性定价做法；Zepto 本身 2025 年 12 月就因此被罚 ₹7
              lakh。印度新的劳动法规（Social Security Code, 2020，于 2025 年 11 月实施）正式承认零工劳动者，并要求平台按营业额 1–2%
              缴纳社会保障，推高运营成本。前置仓分区也成为监管焦点，市政部门开始质疑住宅区内前置仓是否符合商业分区法规。地理可扩展性有限：即时零售经济性依赖人口密度和下单频次，目前只在前 8–10 个都会区成立。Tier 2
              和 Tier 3 城市密度不足，难以支撑前置仓投资，限制了可服务市场。最后，即时零售对传统 kirana 小店的冲击已引发政治关注，小零售商协会正在游说限制平台的掠夺性定价。
