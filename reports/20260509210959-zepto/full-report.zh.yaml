      - number: '7.7'
        title: 风险缓释与止损标准评估
        blocks:
          - type: paragraph
            body: >-
              Zepto 已针对几项关键风险采取可见的缓释动作，但措施是否足够、能否持续，仍不确定。CCPA 因暗黑模式开出罚单后，Zepto 重做了应用，取消偷偷加购、滴漏定价和默认预选，并在 2025
              年末取消全部平台费（处理费、高峰费、便利费）。不过，零收费本身也是风险：公司每月已烧掉约 ₹500 crore，在这样的市场里又主动放弃一条收入流。食品安全方面，Zepto 称已启动内部复盘，并与 FDA
              部门合作，争取恢复 Dharavi 运营，但公司尚未披露覆盖全部前置仓网络的系统性食品安全审计或整改计划。通过裁员和压缩开支把年度现金消耗降
              75%，说明管理层开始讲财务纪律，但也可能牺牲增长速度和运营质量。投资者的止损标准应包括：（1）到 2027 年下半年仍未实现 EBITDA 盈亏平衡；（2）12 个月内向单一竞争对手丢失超过 5
              个百分点市场份额；（3）新增监管执法导致超过 10% 前置仓暂停运营；（4）创始人离职且没有可信接班方案；（5）IPO 撤回，或实质性延后到 2026
              年四季度之后。持续亏损、竞争强度、监管审视和文化争议叠在一起，形成复合风险；任何单点都可能触发负向连锁反应，同时影响融资、人才留存和市场地位。
