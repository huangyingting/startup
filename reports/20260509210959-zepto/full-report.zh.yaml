      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >
              Zepto 由 Aadit Palicha（CEO）和 Kaivalya Vohra（CTO）共同创立，两人都在 19 岁从 Stanford University 辍学创业。Palicha 出生于 2001
              年，按估值计已跻身印度最年轻亿万富豪之列；他的标签是执行激进、对外发声强。Vohra 负责技术和工程，掌管平台物流算法和配送优化系统。管理层还包括：首席运营官 Vikas
              Sharma，负责前置仓运营和供应链；首席财务官 Ramesh Bafna，负责 IPO 前的财务纪律；首席营销官 Amritansu Nanda，推动品牌战略；首席人力资源官 Sneha
              Arora；以及总法律顾问 Panduranga Acharya。两位创始人对战略决策仍有显著控制权，形成中等程度的关键人物依赖。Palicha
              曾公开谈及公司战略，包括承认定价中的诱导性界面设计是错误，并承诺整改。
