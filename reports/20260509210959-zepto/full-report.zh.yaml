      - number: '6.4'
        title: 留存、复购与满意度指标
        blocks:
          - type: paragraph
            body: >-
              Zepto 的留存和满意度画像呈现两极分化。积极一面，Zepto Pass 会员下单频次是非订阅用户的 3x，生命周期价值约高 40%。试点阶段 Pass 用户月度留存提升 10%，公司目标把大城市 3
              个月队列留存从 40% 提高到 50%。忠诚 Pass 队列的月均订单量也在上升，公司战略目标是在大城市从每月 4.5 单提升到 5.5 单。应用商店评分仍然强劲：Google Play 为 4.7/5（4.4
              million+ 评价），iOS 为 4.8/5。但独立评价平台给出另一幅图景。MouthShut 平均分 2.48/5（满意度 53%），功能、可靠性和客服评分都很混杂。Trustpilot
              评价压倒性负面，反复提到商品质量、缺件、配送延迟和退款困难等问题。约 40% Zepto Pass 用户首月后不续费，说明低频用户初期流失较高。公司设定了 5 个月内降低流失 10% 的明确目标，并希望把
              Pass 用户月均订单提高 5%。满意度的关键驱动因素包括配送速度（平均 8–12 分钟履约）、商品范围（每个前置仓 45,000–50,000 个
              SKU）和实时订单追踪；不满意的关键驱动因素包括隐藏费用、商品质量不稳定、客服响应差，以及用户认为定价做法不公平。
