      - number: '7.8'
        title: 技术与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              Zepto 的技术栈支撑了快速扩张，也带来集中度和网络安全风险，足以打断运营。公司核心基础设施搭在 Amazon Web Services（AWS）上，覆盖订单管理、配送实时追踪、库存系统、机器学习需求预测和冷链
              IoT 监控。单一云厂商依赖意味着，一旦 AWS 区域性宕机，多座城市的订单处理、生鲜温度监控、配送协调和面向消费者的服务都可能同时受影响。DPDPA 要求 Zepto
              为其处理的数百万条客户记录落实合理网络安全措施，数据包括姓名、联系方式、地址、支付信息和订单历史。数据泄露通知义务和最高 ₹250 crore 的潜在罚款，构成实质性财务敞口。Zepto 快速扩到 1,100+
              个前置仓，且冷链系统接入 IoT，网络入侵攻击面随之扩大。公司还必须管理消费者 App、骑手 App、仓库管理系统和广告平台之间的 API 安全。另一个信号是按设备动态定价争议：同一商品在 iPhone 和
              Android 上价格不同，暴露出 Zepto 的定价算法可能被利用，或被视为歧视性定价，从而同时带来技术和声誉风险。公司没有披露网络安全审计结果、渗透测试频率或数据保护官任命状态，外部很难独立判断 Zepto
              的网络韧性。
            claimRefs:
              - CR043
              - CR044
              - CR045
              - CR046
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值路径与融资历史
        blocks:
          - type: paragraph
            body: >-
              Zepto 的估值在两年多一点时间里涨了约 5 倍，既反映公司高速增长，也反映投资者对印度即时零售机会的热情。2023 年 8 月 Series F 后，公司估值为 $1.4 billion；到 2024 年 6
              月，公司完成 $665 million 融资，引入 StepStone Group、Motilal Oswal、Nexus Venture Partners 等知名投资者，估值跳至 $3.6
              billion。2024 年 8 月，估值升至 $5 billion；最近一轮是 2025 年 10 月由 CalPERS、Dragon Fund、Lightspeed Venture Partners 领投的
              $450 million 融资，把私募市场估值定在 $7 billion。累计融资超过 $2.3 billion，截至 2026 年初现金储备约 $900 million。不过，SEBI 2025 年 12
              月审查 Zepto 的保密 DRHP 申报后，投资者开始反推估值，IPO 目标估值被下调 15–20%，降至 $5.6–5.95 billion。公司计划在 2026 年 4 月底前重新提交更新版
              DRHP，并调整财务预测。按调整后的 $5.6–6 billion 估值，Zepto 约为 FY25 收入 ₹11,110 crore（~$1.3 billion）的
              4.3–4.6x；这一水平更接近成熟配送平台倍数，而非高增长印度科技公司的估值。
