      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: >
              Zepto 自成立以来已完成 15+ 轮融资，累计超过 $2.3 billion。公司 2021 年 1 月以 Y Combinator 支持的 pre-seed
              轮起步，之后融资节奏迅速加快。关键轮次包括：2023 年 8 月 Series E 融资 $200M，估值 $1.4B（StepStone Group 和 Goodwater Capital
              领投，确立独角兽地位）；2024 年 6 月 Series F 融资 $665M，估值 $3.6B（Glade Brook Capital、Nexus Venture Partners 和 General
              Catalyst 领投）；2024 年 8 月 Series G 融资 $340M，估值 $5B（General Catalyst、Mars Growth 和 Epiq Capital 领投）；2024 年 11
              月 Series G extension 融资 $350M，估值 $5.22B（Motilal Oswal 领投）；以及 2025 年 10 月最新一轮 $450M 融资，估值 $7B（CalPERS
              领投）。投资人覆盖知名 VC（General Catalyst、Lightspeed、Nexus Venture Partners）、增长股权投资者（StepStone、Glade
              Brook、Avenir）、主权 / 养老金资本（CalPERS）和印度家族办公室（Taparia、Mankind Pharma）。2025 年 10 月融资后，公司披露现金储备 $900
              million，为扩张和 IPO 准备提供了充足跑道。
