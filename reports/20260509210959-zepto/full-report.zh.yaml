      - number: '2.7'
        title: 监管环境
        blocks:
          - type: paragraph
            body: >
              印度即时零售监管格局正沿食品安全、消费者保护、劳动和竞争多个维度快速演化。FSSAI 在 2025 年召集电商平台高层会议，重申所有包装食品交付时必须至少保留 30% 或 45
              天保质期，所有面向消费者的文件必须展示 FSSAI 许可证号，食品处理人员必须接受强制性 FoSTaC 认证。Consumer Protection Act 2019 以及 CCPA
              关于诱导性界面设计的指南，要求价格透明，禁止偷塞购物篮和分步加价，并要求清楚披露所有费用。Digital Personal Data Protection Act 2023
              对收集消费者购买行为和位置数据的平台增加了数据处理义务。劳动方面，Social Security Code 2020 首次正式承认零工和平台劳动者是独立劳动类别，使他们有权获得由平台出资的意外 /
              残疾保障、生育福利和健康保护。但该法典未保障零工最低工资或带薪休假，因此倡议压力仍会持续。Competition Commission of India 已表示有意审查即时零售中的掠夺性定价做法，尤其是其对
              kirana 小店的影响。Legal Metrology (Packaged Commodity) Rules 2011 和 BIS
              标准同样适用，要求平台遵守产品标签和质量标准。合规成本正在上升；随着行业规模和政治能见度提高，进一步监管收紧的概率较高。
            claimRefs:
              - CM046
              - CM047
              - CM048
              - CM049
              - CM050
              - CM051
