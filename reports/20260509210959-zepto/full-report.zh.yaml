      - number: '4.5'
        title: 烧钱速度与现金跑道
        blocks:
          - type: paragraph
            body: >
              Zepto 的月度烧钱额从 2024 年中约 ₹40 Cr 升至 2024 年末的 ₹250–300 Cr，约放大 6x，主要由前置仓快速扩张、招聘和竞争性营销投入拉动。Hindustan Times
              报道，2024 年 11 月月度烧钱额达到 ₹250 Cr，是 2024 年 5 月水平的 6x，主因是新前置仓资本开支上升。不过，公司称到 2025
              年初已将经营现金流消耗减半，说明即便在激进扩张中效率也有所改善。按当前 $900M 现金和每月 $30–36M 烧钱额计算，Zepto 约有 25–30 个月跑道。IPO 募资 $1.2–1.3B 将额外延长
              33–43 个月，提供可观财务缓冲。公司年化商品订单总值（GOV）在 2025 年初接近 $4 billion，CEO 称烧钱 / GOV
              比率已明显改善。但批评者指出，烧钱速度波动很大，和扩张周期绑定；如果公司在单位经济模型较弱的 Tier 2 和 Tier 3 城市继续激进增长，烧钱可能再次加速。
            claimRefs:
              - CI033
              - CI034
              - CI035
              - CI036
