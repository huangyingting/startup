      - number: '3.3'
        title: Zepto 的竞争差异化与护城河评估
        blocks:
          - type: paragraph
            body: >
              Zepto 的竞争护城河建立在四根支柱上：运营速度和前置仓密度、Zepto Cafe 垂直整合、Zepto Pass 订阅计划、广告平台。公司运营 ~1,000 个前置仓，集中在都会区和 Tier 1
              城市，支撑其标志性的 10 分钟配送承诺。但这种密度优势是相对的——Blinkit 前置仓多约 ~30%，Swiggy Instamart 也接近持平。


              Zepto Cafe 是最有辨识度的竞争差异点。它在 750+ 个前置仓位置运营迷你厨房，在 10–15 分钟内配送即食食品和饮料，早期每天达到 100,000–200,000
              单。这种向外卖垂直整合的做法模糊了即时零售与外卖的边界，可能同时从 Swiggy 和 Zomato 核心业务抢份额。其他即时零售玩家尚未以可比规模复制，但 Blinkit 和 Swiggy Instamart
              正在测试类似概念。


              Zepto Pass 截至 2024 年中订阅者超过 4 million，靠降低配送成本和独家权益形成留存护城河。广告平台通过品牌合作和赞助商品变现消费者流量，类似 Amazon
              广告市场模式。广告和订阅收入合在一起，有助于抵消很薄的配送利润，并让收入基础不再只依赖佣金。


              这些护城河的持久性面临几项挑战：Zepto Cafe 初期快速增长后，因供应链和劳动力压力需要在部分市场整合；广告平台可被资源充足的竞争者复制；Zepto Pass 还要和 Swiggy One、Zomato
              Gold 争夺消费者的订阅钱包份额。
