      - number: '4.3'
        title: 单位经济性与贡献利润率
        blocks:
          - type: paragraph
            body: >
              Zepto 单位经济性在 FY24 和 FY25 明显改善，但公司层面盈利仍未实现。平均订单价值（AOV）约 ₹400–500，每单毛利率 10–18%（₹50–80
              毛利）。每单可变成本包括配送费用（₹40–70）、包装（₹8–15）、拣货（₹8–15）和促销折扣（₹15–30），合计每单 ₹60–100。贡献利润率从 FY24 约 15% 提高到 FY25 的
              25–30%，驱动因素包括更高履约率、获客成本下降（同比下降 15%）和前置仓利用率改善。每单烧钱从早期季度的 ₹73–110 降至 Q1 FY26 的 ₹42–46，反映运营成熟。报道称，截至 2024
              年中，约 75% 前置仓已在单店层面 EBITDA 转正。但分析师指出，单店盈利并不等于公司层面盈利，因为它排除了公司管理费用、技术投入、总部成本和扩张资本开支。每个前置仓搭建需要 ₹20–60 lakh
              资本开支，目标回本周期 12–18 个月。单店经济性和公司层面经济性之间的差距，仍是 IPO 投资者最核心的问题。
