      - number: '5.3'
        title: 客户工作流与运营流程
        blocks:
          - type: paragraph
            body: >
              Zepto 的客户旅程被压成七步，目标是在下单后 10 分钟内送达。第一步，用户打开 app，浏览由 ML
              推荐算法编排的个性化首页信息流；算法会纳入购买历史、一天中的时间和本地库存可用性。第二步，用户选品并加购，app 展示实时库存水平并推荐互补商品。第三步，用户结账；系统支持 UPI（印度主流方式）、信用卡 /
              借记卡、钱包和货到付款等多种支付方式，Zepto Pass 会员可即时享受折扣。第四步触发订单路由，平台算法按距离、当前负载和实时库存把订单分配给最优前置仓。第五步是拣货：WMS
              生成最优拣货清单并派发到拣货员手持设备，引导其走最高效路径；每个拣货点通过条码扫描确保准确性。第六步是派单，完成的订单交给算法分配的配送骑手；派单引擎会考虑骑手距离、车型、当前配送任务和预测交通状况。第七步是最后一公里配送，用户可看到实时
              GPS 追踪。从下单到送达，整个流程平均 8–12 分钟，公司报告的历史最快配送为 48 秒。2025 年，用户打开 Zepto app 超过 34.6 billion 次，高频用户一天最多下 16 单。
