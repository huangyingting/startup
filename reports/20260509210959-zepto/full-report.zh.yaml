      - number: '4.2'
        title: 盈利能力与亏损分析
        blocks:
          - type: paragraph
            body: >
              尽管收入快速增长，Zepto 亏损显著扩大。净亏损从 FY22 的 ₹390 Cr 扩至 FY23 的 ₹1,272 Cr，FY24 短暂降至 ₹1,249 Cr（收入翻倍情况下改善 2%），随后在 FY25
              飙升至 ₹3,367 Cr，同比增加 177%。亏损占营业额比例从 FY24 的 29% 升至 FY25 的 35%，说明整体层面扩张支出快于效率改善。FY24 总费用为 ₹5,747 Cr，收入为 ₹4,454
              Cr，意味着 Zepto 每赚 ₹1 就花掉 ₹1.29。FY24 主要费用项包括库存商品采购 ₹3,450 Cr（占总费用 60.5%）、配送成本 ₹580 Cr、仓储 ₹493 Cr、员工福利 ₹426 Cr
              和广告 ₹304 Cr。FY25 亏损扩大主要归因于激进前置仓扩张（从 ~550 个到 ~900+ 个）、新城市获客的高营销支出，以及与 Blinkit、Swiggy Instamart 竞争时的折扣。公司称，从
              2025 年 4 月起 12–15 个月内可实现 EBITDA 盈亏平衡。
            claimRefs:
              - CI009
              - CI010
              - CI011
