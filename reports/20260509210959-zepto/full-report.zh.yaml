      - number: '1.6'
        title: 负面事件与治理
        blocks:
          - type: paragraph
            body: >
              Zepto 已遭遇数起争议，直接关系到治理成熟度。2024–2025 年，公司因在 App 中部署诱导性界面设计（包括分步加价、偷塞购物篮、隐藏处理费、自动加入付费会员等操纵性 UI
              设计）受到广泛批评。Central Consumer Protection Authority（CCPA）2025 年 12 月对 Zepto 罚款 ₹7 lakh，并要求整改。CEO Aadit Palicha
              公开承认这些诱导性设计是错误，并表示公司已取消所有隐藏收费、处理费和动态加价。此外，市场出现基于设备的差别定价指控，有报道称 iPhone 用户为同一商品支付的价格高于 Android 用户。2025 年 6
              月，Maharashtra Food and Drug Administration（FDA）在 Zepto Mumbai Dharavi
              仓发现过期产品和食品霉菌后，暂停该仓许可证。公司还在社交媒体上遭遇有毒工作文化和长工时指控。这些事件暴露出快速扩张组织的治理缺口；随着公司接近 IPO，相关声誉风险具有实质性。
