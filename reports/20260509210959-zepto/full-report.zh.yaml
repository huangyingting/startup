      - number: '3.5'
        title: 竞争出清：Dunzo Daily 关停的教训
        blocks:
          - type: paragraph
            body: >
              Dunzo Daily 2025 年 1 月关停，为印度即时零售市场提供了警示案例。尽管累计融资超过 $450 million——包括 Reliance Retail 以 $200 million 投资获得
              25.8% 股权——Dunzo 未能跑通可持续单位经济性，也无法在速度、规模和运营效率上与 Blinkit、Zepto、Swiggy Instamart 竞争。公司 FY23 年亏损约 ₹1,800
              crore，每单都亏钱；联合创始人 / CEO Kabeer Biswas 离职加入 Flipkart 即时零售部门后，公司最终停止运营。


              Reliance Retail 随后将其在 Dunzo 的全部 ₹1,645 crore 投资减记，这是印度创业史上最大规模减记之一，也凸显即时零售赢家通吃大半的动态。Dunzo
              的失败揭示了几个生存条件：足够密集的大型前置仓网络、成熟物流技术、能支撑多年亏损的深厚资本储备，以及在资本耗尽前实现规模化单位经济性。


              对 Zepto 而言，Dunzo 失败既是竞争利好（少了一个对手），也是警告。Zepto 的 $900 million 现金储备和 $7 billion 估值，提供的跑道远多于
              Dunzo；但集团支持、资本几乎无限的新玩家（Flipkart/Walmart、Amazon、Reliance、Tata）入场，重现了压垮 Dunzo 的同类资源不对称。关键问题是 Zepto 能否在 VC
              跑道耗尽前实现盈利。
            claimRefs:
              - CP016
              - CP017
              - CP031
              - CP035
      - number: '3.6'
        title: 集团入场风险与生存级竞争情景
        blocks:
          - type: paragraph
            body: >
              Zepto 最大竞争风险不在当前三强格局，而在四家合计市值超过 $500 billion 的集团入场。Flipkart（Walmart）、Amazon、Reliance（JioMart）和
              Tata（BigBasket）各自带来 VC 支持创业公司无法匹配的优势：几乎无限资本、既有零售基础设施、成熟供应链、庞大客户基础，以及长期承受亏损的能力。


              新进入者中，Flipkart Minutes 是最直接威胁；它借助 Walmart 全球供应链经验，目标在前 18 个月内达到 800 个前置仓。Amazon 投入 $233
              million，且以每天两个前置仓的节奏扩张，显示其对印度即时零售市场有长期承诺。JioMart 将 3,000+ 个实体店和 600+ 个前置仓结合，形成纯前置仓模式难以复制的全渠道配送选择。BigBasket
              与 Tata 生态在药房、电子产品、食品和杂货上整合，构成多品类护城河。


              Zepto 的负面情景是：集团用深度补贴获客，把价格压到不可持续水平以下，迫使 VC 支持玩家进入不可持续烧钱速度。Dunzo 的关停已经展示了这种模式。Zepto 的防线在于成功完成 IPO（目标 2026
              年募资 $1.2–1.3 billion）、让前置仓网络在单元层面盈利，并在集团复制前利用 Zepto Cafe 和广告变现的先发优势。


              此外，Zepto 尚处 pre-IPO
              状态，也制造了竞争张力：公司必须向公开市场投资者证明盈利能力改善，同时继续投入增长来防守市占率，对抗资本更充足的对手。这种双重任务带来战略风险；上市竞争者（Blinkit/Zomato、Swiggy）和集团子公司并不在同等程度上面对它。
            claimRefs:
