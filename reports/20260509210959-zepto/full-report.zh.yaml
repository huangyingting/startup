      - number: '7.4'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Zepto 身处印度高度竞争的即时零售市场，持有约 29–30% 市场份额，落后于 Blinkit 44–50% 的主导地位。Blinkit 是上市公司 Zomato（现 Eternal）的子公司，母公司拥有
              ₹17,000–18,000 crore 现金储备、2,000+ 个前置仓（接近 Zepto 网络的两倍），并在 FY25 Q4 实现 EBITDA 为正。Swiggy Instamart 持有 23–25%
              份额，可从 Swiggy 庞大的外卖用户基础交叉销售，从而降低获客成本。Amazon Tez 和 Flipkart Minutes
              是新兴威胁，背后有近乎无限的资本、既有物流基础设施和庞大成熟用户群。竞争强度已经引发破坏性价格战：2025 年末，Zepto 取消所有平台费用（处理费、高峰费、便利费），并把免费配送最低订单额降至
              ₹99，直接压迫单位经济模型。行业分析师估计，在激进扩张阶段，Zepto 月度烧钱额约为 ₹500 crore。各平台 SKU 重合度超过 58%，限制了差异化机会并压缩利润率。印度即时零售市场预计到 2030
              年将以约 40% CAGR 增长至 $35 billion，但这一增长也会吸引更多进入者，并加剧对前置仓位置、配送骑手和用户注意力的争夺。传统零售商已敦促监管机构调查即时零售平台的掠夺性定价，这可能约束促销策略。
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
      - number: '7.5'
        title: 财务可持续性与 IPO 风险
        blocks:
          - type: paragraph
            body: >-
              计划 2026 年 IPO 前，Zepto 的财务画像存在显著可持续性担忧。FY25 净亏损从 FY24 的 ₹1,214 crore 几乎增至三倍，达到 ₹3,367 crore；同期收入增长 129% 至
              ₹9,669 crore。公司约 ₹7,000 crore 现金储备大约只有 Zomato（₹17,000–18,000 crore）和
              Swiggy（类似区间）的一半，在资本密集型市场中形成相对融资劣势。据报道，到 2025 年末，Zepto 通过裁员（800–900 个岗位）、削减获客支出、放缓前置仓扩张和小众项目投资（Zepto
              Cafe），将年度现金消耗削减约 75%。公司 IPO 目标募资约 ₹11,000 crore（$1.3 billion），大部分资金用于网络扩张和财务缓冲，而不是现有投资者退出。不过，SEBI 审查使估值从最初
              $7–8 billion 目标下调 15–20%，反映投资者怀疑其盈利路径。前置仓扩张资本强度高（每个点位为 2,000–5,000 sq ft
              租赁空间，需要装修改造投入），再叠加维持零费用定价和补贴配送的竞争压力，形成增长与盈利之间的结构性张力。平均订单价值（₹450–550）仍低于 Blinkit 的 ₹625；单均烧钱虽然已从 ₹110 降至
              ₹42–46，但仍拖累单位经济模型。如果 IPO 市场环境恶化，或投资者对亏损型即时零售公司的兴趣减弱，Zepto 可能面临资金缺口，从而限制扩张和竞争定位。
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
      - number: '7.6'
        title: 人员与文化风险
        blocks:
          - type: paragraph
            body: >-
              Zepto 的人员风险不轻，核心在创始人依赖、职场文化争议和留才压力。CEO Aadit Palicha（23 岁）和 CTO Kaivalya Vohra（21 岁）是印度最年轻的一批创业者；两人从
              Stanford 退学，在 COVID-19 封锁期间做出 Zepto。年轻、速度快，推动了 Zepto
              的高增长，但两人的公司治理经验有限，又在公司战略、文化和投资者关系上影响过重，形成关键人风险；任何一人离开或丧失履职能力，都可能冲击运营。职场文化指控在加剧：2025 年 5 月，一名合同工在 Reddit
              发帖爆红，描述严苛工时（上午 9 点至晚上 8 点，每周 6 到 7 天）、管理者言语辱骂、恐吓、被排除在团队活动之外，以及 HR 支持几乎完全缺位。多篇报道证实，这类经历并非个案。Zepto
              将问题归因于第三方用工机构，而非公司政策，但 CEO Palicha 此前公开轻描淡写谈论工作与生活平衡，进一步引发批评。另有举报帖指称“大规模欺诈”，并把 Zepto 的轨迹与 Byju's 相比；IPO
              前夕，这抬高了声誉风险。与资金充足的对手（Blinkit/Zomato、Swiggy、Amazon、Flipkart）争夺工程、数据科学和运营人才的竞争很激烈，Zepto
              的职场文化争议可能拖累招聘。公司在降本中裁员 800–900 人，可能造成组织知识流失，也打击留下员工的士气。
            claimRefs:
