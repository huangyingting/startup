      - number: '2.4'
        title: 客户细分与购买行为
        blocks:
          - type: paragraph
            body: >
              印度即时零售的采用主要由城市千禧一代（1981–1996 年出生）和 Gen Z（1997–2012 年出生）驱动，这两类人群构成核心购买者。Gen Z 约占印度人口 27%，估计影响 43%
              家庭消费；15–29 岁手机用户中，智能手机拥有率达 97%。PwC India 研究显示，50% 城市居民选择杂货平台时把快速配送视为关键差异点；Tier 2–4 城市中，54%
              消费者优先考虑优惠和折扣。典型即时零售用户是 22–35 岁的都会区或 Tier 1 城市白领，每月下单 4–8 次，平均订单价值
              ₹400–500（$5–6）。使用场景分为三类：补货购物（遗忘或用尽的物品，占订单 45%）、冲动购买（零食、饮料，占 30%）和计划性小篮子杂货（25%）。即时零售创造了增量需求，并非单纯蚕食既有渠道；BCG
              研究显示，Gen Z 消费者正通过便利性驱动渠道扩大总零售支出。Zepto Pass（截至 2024 年中 4M+ 订阅者）和 Blinkit
              忠诚计划等订阅项目已成为重要留存工具，推动深度用户提高下单频次。多数消费者并不忠于单一平台，会根据供给和价格在 Blinkit、Zepto、Instamart
              之间频繁切换，这仍是建立持久客户忠诚度的难题。即时零售的总可触达用户基数估计到 2030 年为 65 million，高于 2025 年约 25–30 million 活跃用户。
