      - number: '8.6'
        title: 投资逻辑破裂触发因素与止损标准
        blocks:
          - type: paragraph
            body: >-
              五个触发因素会实质性改变投资判断。第一，到 FY28 仍未实现 EBITDA 盈亏平衡，将说明 10 分钟配送模型存在结构性不盈利，估值很可能下修到收入的 2–3x。第二，市场份额若从当前估计的 28–30%
              跌破 20%，说明 Blinkit、Swiggy Instamart 或新进入者正在替代 Zepto，增长逻辑会被削弱。第三，现金储备跌破 ₹3,000 crore
              且没有清晰盈利路径，将带来生存性融资风险；如果公开市场转向厌恶亏损科技股，风险更高。第四，IPO 延后到 2026 年四季度之后，将释放监管或市场担忧信号，并可能迫使 Zepto
              以潜在降估值再融资。第五，月度现金消耗超过 ₹400 crore，说明单元经济模型恶化，现金跑道倒计时加快。止损标准——退出或放弃投资的绝对条件——包括 IPO
              尽调中发现任何重大欺诈或财务错报、创始人离职或治理危机、监管行动迫使前置仓网络停运，或市场份额持续跌破 15%。当前各触发因素仍属可管理但偏高风险，其中 EBITDA 时间表和竞争动态最需要紧盯。
