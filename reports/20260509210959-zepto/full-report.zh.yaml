      - number: '3.2'
        title: 竞争对手概况与规模对比
        blocks:
          - type: paragraph
            body: >
              Blinkit（Zomato/Eternal Ltd.）是主导玩家，借助 Zomato 的外卖客户基础、庞大配送车队和公开市场融资能力扩张。Goldman Sachs 预计其 FY24 至 FY27 GOV
              CAGR 为 53%。Blinkit 拥有 ~1,300 个前置仓，每天 1.65–1.75 million 单，在网络密度和订单量上有结构性领先。Zomato 2022 年以 $568 million 收购
              Blinkit；按 $13 billion 估值计算，账面回报约 ~24x。


              Swiggy Instamart 受益于 Swiggy 外卖业务的交叉销售协同和共享配送物流。仅 Q4 FY25，它就新增 316 个前置仓，总数达到 1,021 个。每天 1.05–1.15 million
              单仍落后 Blinkit 和 Zepto，但 Instamart GOV 同比增长 115%，显示动能强劲。Swiggy 上市后可进入资本市场，为持续扩张提供资金。


              BigBasket（Tata Digital）正通过 BB Now 从传统线上杂货激进转向即时零售。其 ~500 个前置仓落后前三大，但 BigBasket 的平均订单价值领先（₹850 vs. 对手
              ₹550–665），说明客户群更高端或更偏批量购买。Tata Group 计划注入 $1 billion，并对外融资 $1.3 billion。BigBasket 已完全关闭 Fresho
              线下门店，转而聚焦即时零售，并与 Tata 1mg（药房）、Croma（电子产品）、Starbucks India 和 Qmin 集成，提供多品类配送。


              Flipkart Minutes 背靠 Walmart 全球物流经验和 $200+ billion 资产负债表，目标年底前达到 800 个前置仓，并通过更广 SKU 选择（包括电子产品和家居）差异化。Amazon
              Now 投资 $233 million，在前三大都会区布局 300+ 个前置仓。JioMart 借助 Reliance 的 3,000+ 个实体店和 600+ 个前置仓，形成全渠道混合模式；不过相较
              Blinkit 和 Zepto 更顺滑的界面，它的 App 质量受到批评。
