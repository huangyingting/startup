      - number: '6.7'
        title: 客户单位经济模型与价值指标
        blocks:
          - type: paragraph
            body: >-
              Zepto 的客户层面经济模型体现了即时零售中高速增长与盈利路径之间的张力。平均订单价值已从 2024 年初的 ₹430–470 上行至 2025 年初目标 ₹540–550，但仍低于 Blinkit 的
              ₹625 AOV。公司单均烧钱从 ₹110 降至 2026 年初的 ₹42–46，反映单位经济模型改善。FY25 收入达到 ₹9,670 crore（同比增长
              129%），主要由订单量增长和广告收入驱动。Zepto Pass 会员每月约支付 ₹99，通过更高下单频次（非订阅用户的 3x）、更大篮子规模（订阅后高
              30%+）和更低获客成本摊销，带来显著更高的贡献毛利。平台估计有 8–10 million 月交易用户，每月产生约 70–75 million 订单。Zepto 报告 2025 年为用户节省 ₹17,000
              crore，因此尽管存在便利溢价，价值主张仍围绕省钱展开。广告收入流（年化 ₹1,000 Cr）是一层高毛利变现，改善单客经济模型。不过，Zepto 在保密 DRHP 中没有披露获客成本、客户生命周期价值或
              NPS 分数，限制了外界对客户层面盈利能力的独立评估。公司目标到 2026 年末实现 EBITDA 盈亏平衡，客户层面经济模型是关键输入变量。
