              - CV017
              - CV018
              - CV019
      - number: '8.4'
        title: 情景分析与回报预测
        blocks:
          - type: paragraph
            body: >-
              三个估值情景框定 Zepto 到 FY28 的投资前景。乐观情景下，FY28 估值达 $10–12 billion；前提是 Zepto 到 FY27 实现 EBITDA 盈亏平衡，通过把前置仓扩至 2,000+
              个维持 50%+ 收入增长，市场份额守在或升至 30% 以上，并以 $6.5+ billion 成功完成 IPO。该情景意味着以 $6 billion 入场可获得 1.5–2x 回报，并假设印度即时零售市场到
              FY28 达 $25–30 billion。基准情景下，FY28 目标估值为 $6.5–8 billion；假设收入增长放缓至 40–50%，贡献利润率到 FY27 转正，但 EBITDA 盈亏平衡推迟到
              FY28。在 Blinkit 和 Swiggy Instamart 持续施压下，市场份额稳定在 25–28%。该情景意味着以 $6 billion 入场获得 1–1.3x 回报。悲观情景下，如果亏损延续到
              FY28 之后，Amazon Tez 和 Flipkart Minutes 起量导致市场份额跌破 20%，IPO 募资低于目标，竞争性价格战继续压缩贡献利润率，估值可能只有 $3–4 billion。该情景意味着
              0.5–0.7x 回报，也就是资本亏损。关键摇摆因素包括盈利改善速度、Blinkit 2,000+ 个前置仓优势带来的竞争强度、印度新 Labour Codes 下的监管进展，以及影响消费者支出的宏观环境。
