      - number: '8.7'
        title: 建议与最终尽调
        blocks:
          - type: paragraph
            body: >-
              基准情景下，我们建议以 $5.5–6.5 billion 入场估值谨慎推进，相当于 FY25 收入的 4.2–5.0x。这个建议是在几组因素之间取平衡：Zepto
              增长轨迹出色、可服务市场大、机构背书强；但持续亏损、竞争激烈、盈利路径不确定也构成重大风险。建议入场估值较上一轮私募估值（$7 billion）折价 7–21%，也与 SEBI 调整后的 $5.6–5.95
              billion IPO 目标估值一致。投资者应把参与投资绑定在几项投前尽调条件上：审阅 FY26 Q1/Q2 中期财务，确认贡献利润率改善；查看前置仓级别的详细单元经济模型，证明存在单仓盈利路径；要求管理层说明
              EBITDA 盈亏平衡时间表和里程碑；获取包括市场份额趋势和获客成本在内的竞争定位数据；基于最终 DRHP 分析 ESOP 池和摊薄。IPO 后应跟踪季度贡献利润率、前置仓数量和同店收入增长、相对 Blinkit
              的市场份额、月度现金消耗路径，以及客户留存指标。该投资适合风险承受能力高、投资周期 3–5 年，并相信印度即时零售长期增长逻辑的组合。
