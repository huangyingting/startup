      - number: '8.5'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              投资逻辑有四根支柱。第一，Zepto 所在的是印度增长最快的消费板块：即时零售预计到 2030 年达 $57 billion，CAGR 约
              40%，由智能手机渗透率提升、城市化，以及中产阶层对便利性的需求增长共同推动。第二，Zepto 执行力突出，FY25 收入增长 149%，并在印度主要城市扩至 1,100+ 个前置仓，建立了仅次于 Blinkit
              的可信第二名位置。第三，公司有 $900 million 现金储备，并获 CalPERS、Lightspeed、StepStone 等机构背书，按当前烧钱速度可支撑 5–6 个季度。第四，IPO
              既提供流动性事件，也带来资本注入，可支持扩至 2,000+ 个前置仓，并加快走向盈利。反向逻辑同样有力。第一，FY25 净亏损增至 ₹3,367 crore，约为上一年的三倍，亏损 / 收入比约
              30%；EBITDA 盈利最快也要 12–15 个月。第二，Blinkit 拥有 44–50% 市场份额、2,000+ 个前置仓，并背靠 Zomato 已盈利的外卖业务，是资金充足且 Zepto
              可能难以撼动的竞争对手。第三，Amazon Tez 和 Flipkart Minutes 带着深厚资金储备入场，可能加剧价格战并进一步压缩利润率。第四，单元经济模型在贡献利润层面仍为负，让“10
              分钟配送能否在印度价格敏感市场大规模盈利”这个根本问题仍未解决。
