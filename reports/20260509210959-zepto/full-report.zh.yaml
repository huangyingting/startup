      - number: '2.5'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              几股结构性和行为性顺风推动印度即时零售扩张。第一，印度城市化正在加速：目前 37.1% 人口（约 520 million 人）生活在城市中心，预计到 2030 年城市人口占比将超过
              40%。第二，数字基础设施已达到临界规模；截至 2025 年初，85.5% 印度家庭至少拥有一部智能手机，互联网用户达 806 million，为 App 化商业提供连接底座。第三，印度人口红利明显——中位年龄
              28 岁，拥有全球最大的 Gen Z
              人群，天然形成数字原生、移动优先购物的消费者基础。第四，城市都会区可支配收入提升、双收入家庭增加，让时间紧张的专业人士更愿意花钱买速度。第五，品类从杂货扩至电子产品、美妆、药房和即食食品，扩大可服务场景，也提高平均订单价值。第六，广告和订阅收入流（Zepto
              的 Zepto Cafe、Zepto Advertising 和 Zepto Pass）让收入模式不再只靠配送利润，单位经济性有所改善。最后，资本充足玩家（Flipkart
              Minutes、Amazon）入场验证了品类，也推动竞争性投资，扩大整体市场认知和采用率。这些驱动因素共同支撑至 2030 年 13–16% CAGR 的基准市场增长路径。
