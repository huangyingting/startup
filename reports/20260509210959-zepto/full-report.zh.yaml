      - number: '6.3'
        title: 具名客户与品牌合作伙伴证据
        blocks:
          - type: paragraph
            body: >-
              Zepto 的客户证据同时覆盖直接消费者和 B2B 品牌合作伙伴。消费者侧，平台在 Google Play 上 100 million+ 安装量和 4.4 million+ app
              评价，提供了大规模采用的量化证据。Zepto Pass 订阅计划于 2024 年 Q1 以最初 ₹99/月价格推出，第一个月订阅用户就突破 1 million，到 2025 年初超过 5
              million，证明用户愿意为这项服务付费。B2B 侧，Zepto 称有 10,000+ 个品牌、覆盖 30+ 个品类使用其广告平台。具名品牌合作伙伴包括 Nestlé（Maggi、Nescafé、KitKat
              通过即时广告和活动推广）、Hindustan Unilever（Dove、Surf Excel、Lifebuoy 获得主推展示位）、Procter & Gamble（Pampers、Ariel、Gillette
              争取顶部商品位）、Britannia、ITC、Godrej、Reckitt、Marico 和 Dabur。2025 年与 The Trade Desk 的合作，让 FMCG 品牌可以用 Zepto
              的第一方购买数据，在 Zepto app 之外的流媒体和数字媒体平台做程序化广告。2025 年上线的 Zepto Atom 则以 SaaS 产品形式，为品牌合作伙伴提供实时超本地销售分析。Fortune
              India 报道，Zepto 在 2025 年为用户节省 ₹17,000 crore，显示出显著消费者价值。不过，品牌合作伙伴收入贡献仍缺少独立验证，因为 Zepto 在保密提交的 DRHP
              中没有披露广告主级别收入拆分。
