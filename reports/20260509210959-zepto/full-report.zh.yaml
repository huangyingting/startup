      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >-
              Zepto 的客户增长轨迹在印度电商史上属于最陡峭的一类。到 2023 年 11 月，月活用户达到 13 million，超过 JioMart，位居 Blinkit 之后第二。到 2024 年 Q4，在 H2
              2024 app 下载量激增 300% 以及先买后付集成等功能推动下，Zepto 的 MAU 首次超过 Blinkit。2024 年，该 app 成为全球 Food & Drink
              类目下载量第二的应用，Google Play 安装量超过 100 million。日订单量从 2023 年末约 300,000–400,000 增至 2024 年中 900,000，随后在 2024 年
              Diwali 期间突破 2 million（CEO Palicha 称比最接近对手高 40%），并在 2026 年 Q1 稳定在每日 2.37 million。年化商品订单总值从 2024 年 4 月的 $1
              billion 增至 2025 年 4 月近 $4 billion，翻了四倍。单前置仓日订单从 FY26 Q2 的 1,460 单提升到 FY26 Q4 的 2,000–2,125
              单，反映需求增长和运营杠杆同时释放。Zepto Cafe 子垂类走出自己的采用曲线：2024 年 12 月上线时日订单 30,000，2025 年 2 月峰值达到 130,000，随后因采购挑战和烧钱控制，到
              2025 年中回落至 65,000–67,000。公司前置仓网络从 2024 年中 600 个扩至 2026 年初 1,100+ 个，覆盖 70+ 城市。2025 年 app 打开次数超过 34.6
              billion，高频用户一天最多下 16 单。
