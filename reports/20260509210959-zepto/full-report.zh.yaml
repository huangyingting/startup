      - number: '7.2'
        title: 劳工与用工监管风险
        blocks:
          - type: paragraph
            body: >-
              印度四部新 Labour Codes 于 2025 年 11 月 21 日生效，首次正式承认零工和平台劳动者，并要求聚合平台承担强制社会保障义务。根据 Code on Social Security,
              2020，Zepto 这类公司必须将年营业额的 1–2%（上限为向劳动者所有支付额的 5%）缴入专门 Social Security
              Fund，用于提供健康福利、生育保障、人寿和伤残保险、意外保障，以及养老金等价权益。所有零工劳动者必须通过 e-Shram 政府门户注册，并绑定 Aadhaar 的 Universal Account
              Numbers；任何通勤途中事故现在都在法律上视为「履职期间」发生，使劳动者有资格获得 ESIC 福利。对 Zepto
              来说，其依赖数万名被归类为独立承包商的配送伙伴，这些规定意味着实质成本上升和运营复杂度增加。Telangana Gig and Platform Workers' Union 于 2025 年 5 月正式指控
              Zepto 存在剥削性做法，列举了单次配送薪酬大幅削减、缺少最低工资保障、工作条件不安全、没有 ESI/PF/保险、高压配送时限危及骑手安全、任意罚款，以及拒绝提供基本设施等问题。Zepto
              否认这些指控，但工人罢工和工会投诉仍在继续。监管轨迹显示，零工权益将越来越正式化，这可能压缩配送密集型业务模型的利润率，并让 Zepto 面临追溯合规主张。
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
      - number: '7.3'
        title: 运营质量与安全风险
        blocks:
          - type: paragraph
            body: >-
              Zepto 前置仓从 2024 年中 600 个快速扩张到 2026 年初 1,100+ 个，在食品安全、冷链管理和配送执行上带来显著运营风险。Dharavi
              仓库事件暴露出系统性脆弱点：一名前员工吹哨人公开指称，Zepto 经常在新鲜库存不足时发出过期食品，说明质量控制失败可能不止于单一设施。每个前置仓有 45,000–50,000 个
              SKU，涵盖乳制品、肉类、生鲜农产品等易腐品类；要在 1,100+ 个点位维持冷链完整性，需要持续温度监测、过期与新鲜库存恰当隔离，并遵守 FSSAI 标准——这一挑战会随网络规模非线性放大。前置仓租约通常为
              12–36 个月，让 Zepto 暴露于高端城市位置（Mumbai、Bangalore、Delhi
              NCR）的租金波动、房东不续租风险，以及租约提前终止时的装修改造沉没成本。城市分区法律对前置仓仍不清晰，居民区可能出现邻里反对和市政限制。配送骑手安全是另一项运营风险：骑手在 10
              分钟配送压力下穿行拥堵城市交通，面临事故风险；任何高关注度事故都可能触发监管反弹和声誉损害。Zepto 的技术基础设施集中在 AWS 上，订单管理、库存追踪、冷链 IoT
              监控和实时配送协调都依赖单一提供商。AWS 区域故障可能同时扰乱多个城市运营。
