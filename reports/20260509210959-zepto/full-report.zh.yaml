  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >
              即时零售（q-commerce）指在 10–30 分钟内按需配送杂货和日用品，运营基础是超本地前置仓网络：这些小型、密集分布的微型仓靠近终端消费者。它不同于传统电商杂货配送（1–2 天履约），也不同于
              BigBasket 或 Amazon Fresh 等预约制杂货平台。可触达市场位于印度庞大杂货零售行业（2025 年估计 $600–720B）与快速增长的线上杂货渠道交汇处。印度整体零售市场约 $1.1
              trillion，其中杂货约占消费者支出的 65%。其中只有 7–12% 属于有组织零售（超市、大卖场、线上），其余 88–93% 流向约 12 million 家无组织
              kirana（街角）小店。即时零售主要瞄准这个市场中城市、便利性驱动的细分人群——他们愿意为速度和即时性付溢价。核心品类包括杂货、生鲜、乳制品、个护、家庭日用品，以及越来越多电子产品、美妆等非食品品类。地域范围目前集中在印度前
              8–10 个大都会区，并刚开始向 Tier 2 城市扩张。因此，即时零售更像一个新的消费渠道，而非对现有零售的直接替代：它捕捉增量场景（遗忘物品、即时冲动需求、补货购物），同时也把部分计划性杂货支出从
              kirana 小店和超市转向 10 分钟配送模式。
