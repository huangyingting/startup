      - number: '6.5'
        title: 扩张策略与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Zepto 客户基础存在显著地域集中风险。前 5 个大城市——Mumbai、Delhi NCR、Bangalore、Hyderabad 和 Pune——估计贡献平台 GMV 的
              70%+，使公司容易受到大城市特定竞争压力、监管行动或需求饱和的影响。CEO Palicha 称，Zepto 的核心机会集中在「前 40 个城市」；公司预计这些城市到 2029
              年将贡献印度城市杂货和家庭必需品市场近 50%。前置仓业务模型需要高人口密度和高订单频次来跑通单位经济模型，因此进入 Tier 2 和 Tier 3
              时会遇到结构性障碍：这些城市订单密度和平均篮子规模都明显更低。Zepto 向 Lucknow、Jaipur、Indore 等 Tier 2
              城市扩张，面临更长配送时间、消费者支付配送溢价意愿更低，以及订单频次低于大城市等物流挑战。客户分层集中也带来风险：平台高度依赖 18–35 岁、追求便利的城市职场人；在 Blinkit（Zomato
              支持）、Swiggy Instamart 和 JioMart 围绕价格和配送速度激烈竞争的市场中，公司暴露于代际消费变化和竞争切换风险。广告收入流虽然增长，但集中于大型 FMCG
              品牌，而这些品牌的营销预算具有周期性和可自由裁量属性。Zepto 缓释集中度风险的策略包括产品多元化（Zepto Cafe、Zepto
              Atom）、品类扩张（电子产品、时尚）和自有品牌（Relish），以提高利润率并降低对第三方品牌广告的依赖。
            claimRefs:
              - CU026
              - CU027
              - CU028
              - CU029
