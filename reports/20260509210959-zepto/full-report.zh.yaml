      - number: '1.5'
        title: 里程碑与关键事件
        blocks:
          - type: paragraph
            body: >
              Zepto 的时间线显示出 2021 年成立后的极强执行速度。公司最初以 KiranaKart 上线，连接消费者和本地 kirana 小店，随后转向垂直整合的前置仓模式，以直接控制库存和配送速度。成立 6
              个月内，Zepto 估值达到 $225M；18 个月内升至 $900M。2023 年 8 月，公司以 $1.4B 估值成为 2023 年印度第一家新晋独角兽。2024 年，Zepto 多轮合计融资超过 $1
              billion，估值增长超过三倍。为筹备本土 IPO，公司 2025 年 1 月将注册地从 Singapore 迁至印度。Zepto 2025 年 12 月 26 日向 SEBI 以保密方式提交 Draft
              Red Herring Prospectus（DRHP），并于 2026 年 5 月 8 日获 SEBI 批准。计划 IPO 目标募资 ₹11,000–12,000 crore（$1.2–1.3B），估值
              $7–8B，预计 2026 年 7 月至 9 月上市。负面事件方面，CCPA 2025 年 12 月因诱导性界面做法对 Zepto 罚款 ₹7 lakh；2025 年 6 月，Maharashtra FDA
              因食品安全违规暂停其 Mumbai 仓库许可证。
