      - number: '5.2'
        title: 技术与运营架构
        blocks:
          - type: paragraph
            body: >
              2022 年至 2024 年，Zepto 的技术架构从单体应用「Zepto Storefront」大幅转向分布式微服务架构。当前技术栈完全跑在 AWS 上，Amazon Elastic Kubernetes
              Service（EKS）为订单管理、库存、支付、配送物流和用户服务等可独立部署的微服务提供容器编排。Amazon DynamoDB 是高吞吐、低延迟订单处理的主要 NoSQL 数据库；工程团队曾在 AWS
              博客发布详细案例，说明 DynamoDB 如何支撑每日数百万订单规模。Amazon Aurora PostgreSQL 处理财务对账、用户账户管理等交易型和关系型负载。团队用 Debezium
              做变更数据捕获（CDC），在服务间传播状态变化，为分析和通知管线提供事件驱动架构。前端采用配置驱动的微前端，让移动端和 Web 端 UI 组件可以独立部署。Control Tower
              这个内部运营看板集中展示前置仓表现、骑手利用率和订单漏斗指标。内部工具遵循「能自建就不买」原则；CTO 在 2025 年 11 月 YourStory 采访中称，掌控整套技术栈是 Zepto
              的「最大护城河」，能消除对第三方 SaaS 平台的依赖，避免其成为单点故障。AI/ML 基础设施支撑需求预测模型（使用梯度提升、LSTM
              网络等技术）、求解车辆路径问题变体的路径优化算法，以及个性化推荐引擎。公司通过集成监控、分布式追踪和集中日志维持实时可观测性。
