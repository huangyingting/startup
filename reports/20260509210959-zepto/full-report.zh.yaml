  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 核心产品模块与资产矩阵
        blocks:
          - type: paragraph
            body: >
              Zepto 的产品组合横跨六个主要模块，共同支撑其 10 分钟配送承诺。面向消费者的移动 app（iOS 和 Android）是主要下单入口，提供实时库存可见性、由协同过滤算法驱动的个性化商品推荐，以及亚秒级
              GPS 更新的实时订单追踪。2024 年，该 app 在全球 Food & Drink 类目下载量排名第二，Google Play 安装量超过 100 million。到 2024 年 Q4，月活用户超过
              Blinkit；按用户参与度衡量，Zepto 成为印度使用最频繁的即时零售 app。仓库管理系统（WMS）是完全自研平台；2021 年末一次关键第三方供应商故障后，工程团队决定掌控整套技术栈。WMS
              管理每个前置仓 45,000–50,000 个 SKU 的实时库存、自动补货触发、保质期追踪和货位级位置映射。作为 WMS 的配套工具，拣货 app 用位置码和 QR
              扫码校验引导仓内员工走最优拣货路径，平均拣配时间低于 2 分钟。Zepto Advertising 是公司的广告技术模块，向 FMCG 和 D2C 品牌提供赞助商品位、banner 位和搜索结果推广；截至
              2025 年初，年化广告收入约 ₹1,000 Cr。Zepto Pass（正在切换为 Zepto Daily）以约 ₹99/月提供订阅式忠诚度计划，为 4 million+
              订阅用户提供免配送费和专属价格。Zepto Cafe 模块于 2024 年末上线，在前置仓内运营迷你厨房，提供 10 分钟餐饮配送，并在 2025 年初推出独立 app。
