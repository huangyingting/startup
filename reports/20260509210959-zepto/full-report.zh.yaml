      - number: '2.3'
        title: 竞争格局与市场份额
        blocks:
          - type: paragraph
            body: >
              印度即时零售市场已快速整合为三家寡头。Blinkit（Zomato 旗下）FY25 市占率约 44%，每天处理 1.65–1.75 million 单，并目标在 2025 年底前达到 2,000
              个前置仓。Zepto 以 29–30% 市占率位居第二，在约 900 个前置仓中每天处理 1.45–1.55 million 单，并已在 2024 年按日订单量超过 Swiggy Instamart。Swiggy
              Instamart 市占率约 23%，每天 1.05–1.15 million 单。剩余 3% 由 BigBasket 的 BB Now、Flipkart Minutes 等小玩家瓜分；Dunzo
              因现金紧张已基本退出。新进入者 Amazon 和 Flipkart 正在投入即时零售能力，但尚未形成有意义规模。竞争核心是激烈的网络扩张赛：三大头部都在积极增加前置仓，以建立地理密度优势。Blinkit 受益于
              Zomato 的公开市场融资能力和现有配送基础设施；Zepto 则依赖激进私募融资（累计 $2.3B+）。Swiggy Instamart 在 Swiggy IPO
              后资本更受约束，需要在外卖和杂货之间重新分配资源。预计竞争会在整合前进一步加剧；所有玩家都尚未实现盈利，获客成本和扩张支出仍主导单位经济。
            claimRefs:
              - CM014
              - CM015
              - CM016
              - CM017
