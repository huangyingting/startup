  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: standard
    summary: 投资建议的决策流展示关键评估关口，以及在 $5.5B–$6.5B 入场估值区间下得出的「谨慎推进」建议。
    data:
      nodes:
        - id: market-check
          label: 到 2030 年市场 TAM >$10B？
        - id: growth-check
          label: 收入 YoY 增长 >100%？
        - id: comp-check
          label: 估值 <5x 收入？
        - id: profit-check
          label: EBITDA 路径 <24 个月？
        - id: risk-check
          label: 无终止触发项？
        - id: proceed
          label: 以 $5.5–6.5B 谨慎推进
        - id: pass
          label: 通过 / 重新评估
      edges:
