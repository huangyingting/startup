  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: standard
    summary: 展示 Zepto 客户从发现 App 到复购的端到端旅程，覆盖五个阶段中的关键触点和摩擦点。
    data:
      items:
        - label: App 发现
          detail: 用户通过应用商店、推荐或社交媒体广告发现 Zepto。Google Play 安装量 100M+。
          phase: 认知
        - label: 首单
          detail: 浏览个性化信息流，从 45K+ SKU 中选购，用 UPI/银行卡结账。首单平均 AOV 为 ₹350–400。
          phase: 获客
        - label: 配送体验
          detail: 承诺 10 分钟配送，并提供实时 GPS 追踪。拣货员 App 指导仓库员工，将打包时间压到 2 分钟以内。
          phase: 激活
        - label: 配送后评分
          detail: 用户评价配送和商品质量。应用商店评分 4.7/5。常见投诉包括缺货和商品质量问题。
          phase: 激活
        - label: 加入 Zepto Pass
          detail: ₹99/月订阅，享受免配送费和专属价格。5M+ 订阅用户。首月流失率 40%。
          phase: 留存
        - label: 复购
          detail: Pass 会员下单频次高 3 倍。重度用户最多每天 16 单。购物篮向多品类扩展。
          phase: 留存
        - label: 品类扩展
          detail: 用户采用 Zepto Cafe（餐食）、电子产品、个护。从杂货向相邻品类交叉销售。
          phase: 扩张
        - label: 推荐和拥护
          detail: 用户分享推荐码。2025 年 34.6B 次 App 打开形成社会认同。品牌忠诚加深，或出现流失。
          phase: 拥护
    approximationNotes: 旅程阶段概括自 Zepto 公开描述的用户流程、App 功能和披露的行为指标。个体旅程差异显著。
