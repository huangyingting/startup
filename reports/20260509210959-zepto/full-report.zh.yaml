      - number: '8.3'
        title: IPO 估值动态与市场环境
        blocks:
          - type: paragraph
            body: >-
              Zepto 的 IPO 是印度即时零售行业、也是印度公开市场给初创公司定价的关键拐点。SEBI 于 2026 年 5 月 8 日批准 IPO，为 2026 年三季度（7–9 月）上市扫清道路。计划募资
              ₹11,000–12,000 crore（~$1.3–1.4 billion），包括用于扩张的新股发行，以及早期投资者少量出售老股。Morgan Stanley、Goldman Sachs、HSBC、Axis
              Capital、JM Financial、IIFL Securities 和 Motilal Oswal 担任 IPO 管理人，显示机构背书较强。从私募市场 $7 billion 到公开市场 $5.6–5.95
              billion 的估值路径，相当于 IPO 前折价 15–20%；驱动因素是 SEBI 对披露标准的审视，以及投资者对持续亏损的担忧。印度公开市场对亏损科技公司的胃口并不一致——Swiggy
              上市后先波动、再企稳；Zomato 自 2021 年上市以来，随着 Blinkit 起量，股价显著上涨。IPO
              窗口本身有利：印度市场接近历史高位，外资机构流入印度科技股也强。不过，全球风险偏好转弱或印度本土市场回调，都可能压低可实现估值。发行价格区间和每手股数仍需等待更新版 DRHP。
            claimRefs:
              - CV015
