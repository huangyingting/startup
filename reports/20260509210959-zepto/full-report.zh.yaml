  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Zepto 总部位于印度 Mumbai，是一家即时零售平台，法律主体为 Kiranakart Technologies Private Limited。公司 2021 年成立，靠前置仓网络在印度率先推出 10
              分钟杂货配送；这些前置仓是小而密的微型仓，专为快速拣货和履约设计。Zepto 的品类覆盖杂货、生鲜、个护、家庭日用品和电子产品，单仓约 45,000–50,000 个 SKU。平台已延伸到 Zepto
              Cafe（即食食品和饮料）以及 Zepto Advertising（面向品牌的广告技术变现层）。Zepto 最初在 Singapore 注册，但为筹备本土 IPO，2025 年 1 月将注册地迁回印度。截至
              2025 年末，公司在印度 70+ 个城市运营约 900 个前置仓，每天处理约 1.7 million 单。商业模式由配送费、商品销售佣金、广告收入和 Zepto Pass 订阅收入构成；Zepto Pass
              是忠诚会员计划，截至 2024 年中订阅者超过 4 million。
