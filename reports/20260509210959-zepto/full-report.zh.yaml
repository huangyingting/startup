  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Zepto 自 2021 年成立以来收入呈现极端高速增长。收入从 FY22 的 ₹141 Cr 增至 FY23 的 ₹2,024 Cr（14.3x 增长），再到 FY24 的 ₹4,454 Cr（同比
              120%），并在 FY25 按报告销售口径进一步升至 ₹9,669 Cr（同比 129%）。部分来源在纳入其他收入流后，将 FY25 收入列为 ₹11,110 Cr，对应同比增长
              150%。这一差异可能反映不同报告标准，或是否纳入非经营收入。公司收入流包括向合作品牌和卖家收取的商品佣金（估计约占收入 45%）、客户配送费和便利费（~20%）、Zepto Advertising——向
              FMCG 品牌提供赞助列表和横幅广告位的广告技术平台（~15%）、利润率更高的自有品牌商品销售（~10%），以及 Zepto Pass 订阅费（~10%）。Zepto FY25 GMV 约 ₹24,500
              Cr，隐含收入 / GMV 抽佣率约 40%；这对即时零售来说偏高，包含库存销售而非纯平台佣金。广告收入流具有战略重要性，因为它是高利润率、轻资产收入，可随订单量扩张而不同比例增加成本。
