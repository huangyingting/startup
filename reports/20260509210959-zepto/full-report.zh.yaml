      - number: '5.4'
        title: 数据分析与广告技术
        blocks:
          - type: paragraph
            body: >
              Zepto 已不只是配送平台，而是演进成数据驱动的广告和分析业务。Zepto Advertising 这个 app 内广告平台，让品牌可以在消费者 app 内购买赞助商品位、搜索结果推广和 banner 广告。到
              2025 年初，该平台年化广告收入约 ₹1,000 Cr，成为印度增长最快的零售媒体网络之一。2025 年 5 月，Zepto 推出 Zepto Atom，这是一款面向消费品牌的订阅式数据分析 SaaS
              产品。Atom 提供分钟级、PIN-code 粒度的销售数据、竞争基准、从曝光到购买的全漏斗客户旅程分析，以及留存 / 复购指标。最突出的功能是 Zepto GPT：品牌经理可以用自然语言提问，例如「上周
              Bengaluru 哪里的蛋白棒销量暴增？」，并立即获得分析回答。印度 ₹1,000 Cr 消费分析行业长期由 Nielsen 和 Kantar 主导，Zepto
              试图用传统调研式分析无法匹配的实时、超本地数据来打穿这一市场。Atom 后续功能包括 AI 生成客户画像，以及面向客户分群的自动化调研工具。广告和数据业务是高毛利收入流——广告通常有 80%+
              毛利率——能实质改善 Zepto 的综合单位经济模型，降低对低利润率杂货佣金的依赖。
            claimRefs:
              - CE023
              - CE024
              - CE025
              - CE026
              - CE027
              - CE028
      - number: '5.5'
        title: 供应链与采购技术
        blocks:
          - type: paragraph
            body: >
              Zepto 的供应链技术不止覆盖最后一公里，也延伸到上游寻源和采购。Bloom 项目旨在搭建农户到城市的生鲜供应链，直接连接农民和农民生产者组织（FPOs），绕开传统 mandi 中间商。Bloom 接入
              Zepto 的需求预测引擎，把预计需求信号传递给农民，减少过度生产带来的浪费，并支持准时采购。农民款项在 24 小时内处理完成，相比传统农业供应链 7–15
              天的常见账期明显改善。自有品牌策略是另一根供应链技术杠杆：Zepto 的内部品牌（包括肉类和海鲜品牌「Relish」）目标占总 GMV 的 15%+；自有品牌毛利率为 40–60%，而第三方商品只有
              10–18%。自有品牌在数字货架上的算法化摆位——占据顶部搜索结果和推荐位——由驱动消费者体验的同一套推荐和搜索排序系统管理。900+ 前置仓的库存管理使用 AI
              驱动的需求预测，纳入历史销售模式、天气数据、本地事件和实时消耗速度，以优化每个点位的库存水平。当库存跌破最低阈值时，自动补货提醒触发采购订单；保质期追踪系统则防止临期商品销售，并尽量降低损耗。
            claimRefs:
              - CE029
              - CE030
              - CE031
              - CE032
              - CE033
              - CE034
      - number: '5.6'
        title: 信任、质量与监管合规
        blocks:
          - type: paragraph
            body: >
              Zepto 的产品质量和合规状态受到明显审视。2025 年 12 月，Central Consumer Protection Authority（CCPA）因 Zepto 在 app 中部署暗黑模式罚款 ₹7
              lakh，具体包括滴漏定价（只有到最终结账才显示强制费用）和购物篮夹带（未经用户明确同意，自动勾选 Zepto Pass 等付费附加项）。处罚源于数百起消费者投诉，并触发一次全面 app 改版。Zepto CEO
              Aadit Palicha 公开承认这些做法，称它们「不会再发生」，公司随后重新设计结账流程，提前展示所有费用，并取消预勾选选项。暗黑模式执法是政府更大范围整治的一部分：包括 Amazon、Blinkit 和
              Swiggy 在内的 11 家公司，都收到 CCPA《Guidelines for Prevention and Regulation of Dark Patterns
              (2023)》下的通知。食品安全方面，FSSAI 因商品保质期问题加大了对即时零售平台的审查，尤其关注存放在前置仓的易腐商品。Zepto 的 WMS 包含保质期追踪和临期商品自动下架。数据隐私合规受印度
              Digital Personal Data Protection Act（DPDPA）2023 管辖；Zepto 围绕位置追踪、购买历史分析和定向广告的数据实践，需要持续合规监测。Zepto Atom
              分析产品向品牌提供细颗粒度消费者行为数据，也引发了围绕数据聚合和匿名化标准的额外隐私考量；这些标准尚未公开披露。
