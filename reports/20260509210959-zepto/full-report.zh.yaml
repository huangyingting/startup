  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Zepto 在消费者保护、食品安全、数据隐私和劳动法领域面临不断升级的监管风险。Central Consumer Protection Authority（CCPA）于 2025 年 12 月因 Zepto
              部署暗黑模式 UI 做法罚款 ₹7 lakh，包括购物篮夹带（结账时自动选择 Zepto Pass）、滴漏定价（只在最终结账展示强制处理费）和虚假紧迫倒计时。CCPA 要求 Zepto
              重新设计结账流程，移除默认预选项，并在 15 天内提交合规报告。随后，政府又向包括 Zepto 在内的 11 家公司发出通知，指向持续的暗黑模式违规，说明执法会延续。另一起事件中，Maharashtra 的
              Food and Drug Administration（FDA）在检查中发现食品霉菌滋生、过期商品与新鲜商品混放、冷藏设备未达到温度要求、商品存放在肮脏湿地板上，于 2025 年 6 月暂停了 Zepto
              Dharavi 仓库许可证。该暂停令依据 Food Safety and Standards Act, 2006 第 32(3) 条作出，在完全合规并获得监管放行前，该设施不得运营。FDA
              宣布计划检查其他即时零售设施，形成行业范围监管风险。印度 Digital Personal Data Protection Act（DPDPA）2023 对数据保护违规最高可罚 ₹250
              crore，并要求明示同意收集、目的限制、泄露通知和用户权利支持；Zepto 处理数百万客户记录，这些要求都扩大了其合规暴露面。此外，SEBI 对 Zepto 保密 DRHP 申报的审查，导致估值从最初 $7–8
              billion 目标下调 15–20% 至 $5.6–5.95 billion，反映 IPO 披露标准带来的监管压力。
