  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 敏感性分析展示：以 FY25 收入为基础，不同收入倍数会推导出 Zepto 的隐含估值；区间从保守的 Instacart 水平，到溢价的 Blinkit 水平。
    data:
      items:
        - label: 2x（Instacart 低位）
          value: 2.6
        - label: 3x（Instacart-Swiggy）
          value: 3.9
        - label: 4.3x（IPO 底线）
          value: 5.6
        - label: 5.4x（上一轮）
          value: 7
        - label: 6.7x（DoorDash）
          value: 8.7
        - label: 8.7x（Blinkit）
          value: 11.3
    unit: $B
    approximationNotes: 估值按各收入倍数乘以 Zepto FY25 约 $1.3B 收入计算。可比倍数截至 Q1 2026。
    claimRefs:
      - CV009
      - CV010
      - CV014
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: 区间图展示 Zepto 在关键时间点的牛市、基准、熊市估值；到 FY28，结果可能从熊市情景 $3B 到牛市情景 $12B，分布很宽。
    data:
      items:
        - label: 当前（Oct 2025）
          low: 7
          base: 7
          high: 7
        - label: IPO（Q3 2026）
          low: 4.5
          base: 5.8
          high: 7
        - label: FY27
          low: 3.5
          base: 6.5
          high: 9
        - label: FY28
          low: 3
          base: 7
          high: 12
    unit: $B
    approximationNotes: 情景估值是基于收入增长假设、可比倍数和盈利轨迹作出的分析师预测。实际结果可能出现重大差异。
    claimRefs:
      - CV020
      - CV022
      - CV024
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 监测 Zepto 投资逻辑的关键绩效指标，覆盖估值、增长、盈利能力和竞争位置。
    data:
      items:
        - label: FY25 收入
          value: ₹11,110 Cr
          detail: YoY 增长 149%；~$1.3B USD
        - label: 当前估值
          value: $7.0B
          detail: Oct 2025 私募轮；CalPERS 领投
        - label: IPO 目标
          value: $5.6–6.0B
          detail: SEBI 审查后折价 15–20%
        - label: 收入倍数
          value: 4.3–5.4x
          detail: 以 FY25 收入为基准；同业 2–8.7x
        - label: 净亏损（FY25）
          value: ₹3,367 Cr
          detail: YoY 增加 177%；约占收入 30%
        - label: 现金储备
          value: $900M
          detail: 按当前烧钱速度，可撑 5–6 个季度
        - label: 市场份额
          value: 28–30%
          detail: '#2，落后于 Blinkit（44–50%）'
        - label: 前置仓（Q1 2026）
          value: 1,100+
          detail: 对比 Blinkit 2,000+；快速扩张
    approximationNotes: 市场份额是基于第三方报告的分析师估计。现金储备和烧钱速度反映管理层披露和分析师测算。
    claimRefs:
      - CV001
      - CV003
      - CV006
      - CV027
