      - number: '4.7'
        title: 财务透明度与公开数据缺口
        blocks:
          - type: paragraph
            body: >
              Zepto 仍是私营公司，财务披露有限，给尽调留下明显缺口。最突出的差异是 FY25 收入口径：部分来源报告 ₹9,669 Cr（基于 MCA 申报中的总销售额），另一些来源引用 ₹11,110
              Cr，后者可能纳入其他经营收入，或采用不同报告口径。在完整 DRHP 公开之前，这一差异无法最终确认。其他重大缺口包括：没有经审计的分业务收入拆分（广告、佣金、配送费、订阅均为估算），未披露公司层面的
              EBITDA 或经营利润，75% 前置仓 EBITDA 为正的说法未经第三方审计，员工总数和人均成本指标也未披露。公司费用拆分只能从 Registrar of Companies 的 FY24
              申报中看到；FY25 逐项费用尚未公开。Zepto 的债务融资和关联方交易同样大体不透明。由于公司选择保密提交 DRHP，详细财务数据只会在 DRHP 发布阶段公开；截至本次运行日期，该阶段尚未发生。
