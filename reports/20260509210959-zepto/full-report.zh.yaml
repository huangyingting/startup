      - number: '4.6'
        title: IPO 估值与财务前景
        blocks:
          - type: paragraph
            body: >
              Zepto 的 IPO 已于 2026 年 5 月 8 日获得 SEBI 批准，这是公司财务轨迹的关键拐点。IPO 计划通过新股发行和老股出售合计募资 ₹11,000–12,000 Cr，预计 2026 年 7
              月至 9 月之间上市。2025 年 10 月私募市场 $7B 估值，以 ₹11,110 Cr 的 FY25 销售额口径计算，约对应 6–7x 收入倍数。不过，多方报道称 Zepto 可能以 15–20%
              的估值折让重新提交 DRHP，把估值降至 $5.6–5.95B，对应更温和的 5–5.5x 收入倍数。作为参照，Swiggy 在公开市场约以 8–10x 收入交易，持有 Blinkit 的 Zomato 约为
              15–20x。公开市场投资者会密切观察 Zepto 能否在 2025 年 4 月之后 12–15 个月内实现公司层面 EBITDA 盈亏平衡。公司需要证明，25–30%
              的贡献毛利率在规模化之后足以吸收总部费用。关键风险包括 Blinkit 和 Swiggy Instamart 的竞争强度，向低密度城市扩张可能压缩利润率，以及即时零售本身高固定成本、低利润率的结构性难题。
