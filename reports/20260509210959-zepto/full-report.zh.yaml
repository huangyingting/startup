      - number: '5.7'
        title: 产品路线图与开发管线
        blocks:
          - type: paragraph
            body: >
              Zepto 的 2025–2026 年产品路线图显示，公司正跨多个垂直品类激进扩张。Zepto Cafe 到 2025 年初已达到 100,000+ 日订单和 $100M 运行率，目标到 2026 年实现
              300,000 日订单和 ₹1,000 Cr 年收入，并每月新开 100+ 个 Cafe 网点。2025 年初推出的独立 Zepto Cafe app 支持独立功能开发，并针对餐饮体验做定向 UX
              优化。Zepto Atom 于 2025 年 5 月上线，仍处早期增长阶段；未来 12 个月路线图包括 AI 生成客户画像、自动化调研工具和按队列拆分的分析模块。Zepto Daily 订阅计划取代 Zepto
              Pass，以 ₹1 入门价启动仅邀请试点，目标扩大采用并把订阅用户数推高至当前 4M+ 以上。品类扩张继续进入电子产品、时尚和个护等非杂货领域，目标把平均订单价值提高到 ₹750
              以上；分析师认为这是单位经济模型可持续所需的门槛。工程组织正在加大前置仓运营自动化投入，包括探索输送带、货架机器人和语音引导拣货，以降低人工成本并提高拣货速度。基础设施扩容的优先事项，是支撑 IPO
              带来品牌认知提升和持续城市扩张后的预期订单增长；进入 Tier 2 和 Tier 3 市场时，技术栈还必须适应更低人口密度和不同需求模式。
