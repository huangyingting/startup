  - id: section-2
    title: Competitor Profiles and Scale Comparison
    body: >
      Blinkit (Zomato/Eternal Ltd.) is the dominant player, leveraging Zomato's food delivery customer base, extensive
      delivery fleet, and public market access for capital. Its GOV CAGR is projected at 53% from FY24 to FY27 by
      Goldman Sachs. With ~1,300 dark stores and daily orders of 1.65–1.75 million, Blinkit has a structural lead in
      network density and order volume. Zomato acquired Blinkit in 2022 for $568 million, generating a ~24x return on
      paper at the $13 billion valuation.


      Swiggy Instamart benefits from Swiggy's food delivery cross-selling synergies and shared delivery logistics. It
      rapidly added 316 dark stores in Q4 FY25 alone, reaching 1,021 total. Daily orders of 1.05–1.15 million trail both
      Blinkit and Zepto, but Instamart's GOV growth of 115% year-over-year demonstrates strong momentum. Swiggy's public
      listing provides access to capital markets for continued expansion.


      BigBasket (Tata Digital) is pivoting aggressively from traditional online grocery to quick commerce via BB Now.
      Its ~500 dark stores trail the top three, but BigBasket leads in average order value (₹850 vs. ₹550–665 for
      rivals), suggesting a more affluent or bulk-purchasing customer base. Tata Group plans to infuse $1 billion and
      raise $1.3 billion externally. BigBasket shut down Fresho offline stores entirely to focus on quick commerce,
      integrating with Tata 1mg (pharmacy), Croma (electronics), Starbucks India, and Qmin for multi-category delivery.


      Flipkart Minutes, backed by Walmart's global logistics expertise and $200+ billion balance sheet, targets 800 dark
      stores by year-end and differentiates through broader SKU selection including electronics and home goods. Amazon
      Now is investing $233 million in 300+ dark stores focused on top-three metros. JioMart leverages Reliance's 3,000+
      physical stores and 600+ dark stores for an omnichannel hybrid model, though its app quality has drawn criticism
      relative to Blinkit and Zepto's smoother interfaces.
