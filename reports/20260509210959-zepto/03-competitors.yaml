sections:
  - id: section-1
    title: 'Competitive Landscape: Direct Quick Commerce Rivals and Conglomerate Entrants'
    body: >
      India's quick commerce market is a three-way oligopoly today, with Blinkit, Zepto, and Swiggy Instamart
      collectively commanding 80–85% of market share by gross order value. The competitive landscape, however, is
      expanding rapidly with four deep-pocketed conglomerate entrants—Flipkart Minutes (Walmart), Amazon Now, JioMart
      (Reliance), and BigBasket BB Now (Tata)—each deploying hundreds of dark stores and billions of dollars in capital.


      Blinkit is the clear market leader with approximately 44–50% market share and ~1,300 dark stores, targeting 2,000
      by end of 2025. Goldman Sachs valued Blinkit at $13 billion in April 2024, more than Zomato's core food delivery
      business. Zepto occupies the second position with 25–29% market share and ~1,000 dark stores, while Swiggy
      Instamart holds 23–25% with ~1,021 stores across 124 cities. The competitive dynamic is intensifying: Blinkit's
      GOV grew 140% year-over-year to ₹11,821 crore in Q1 FY26, while Swiggy Instamart's GOV more than doubled and
      Zepto's revenue surged 149% to ₹11,110 crore in FY25.


      Beyond the top three, Flipkart Minutes is the most aggressive new entrant, scaling from 100 stores at launch
      (August 2024) to 300+ within nine months and targeting 800 by year-end. Amazon Now plans 300+ dark stores in
      Delhi-NCR, Mumbai, and Bengaluru with a $233 million investment. JioMart has operationalized 600+ dark stores
      across 1,000+ cities, and BigBasket BB Now operates ~500 stores with significant Tata Group backing. The
      competitive landscape thus includes both venture-funded startups (Zepto) and conglomerate-backed divisions with
      effectively unlimited capital, creating existential competitive pressure.
    claimRefs:
