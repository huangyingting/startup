  title: Competitive Landscape
  summary: >-
    Zepto competes in India's hyper-competitive quick-commerce market against two dominant rivals—Blinkit (Zomato-owned,
    ~46% market share, targeting 2,000 dark stores) and Swiggy Instamart (~23–25% share, 1,000+ dark stores)—plus
    deep-pocketed new entrants Flipkart Minutes (Walmart-backed, targeting 800 dark stores) and Amazon Now ($233M
    investment, 300+ dark stores planned). BigBasket (Tata-owned) is pivoting from slotted delivery to quick commerce
    via BB Now, while JioMart (Reliance) has operationalized 600+ dark stores. Dunzo Daily shut down in January 2025,
    illustrating the capital-intensive nature of the market. Zepto holds a ~25–29% market share with ~1,000 dark stores
    and differentiates through Zepto Cafe, Zepto Pass, and its advertising platform, but faces existential competitive
    risk from Blinkit's scale dominance and the deep corporate treasuries of Flipkart/Walmart, Amazon, Reliance, and
    Tata.
