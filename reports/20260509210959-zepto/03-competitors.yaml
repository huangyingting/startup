    - type: private-evidence-only
      description: >-
        Exact market share breakdowns vary significantly across sources (Blinkit: 44–50%, Zepto: 21–30%, Instamart:
        23–27%), reflecting different measurement methodologies (GOV, GMV, daily orders, transaction count). No single
        authoritative public source provides definitive share data.
      relatedQuestionRefs:
