company:
  name: Zepto
chapter:
  number: 6
  title: Customers
  summary: >-
    Zepto's customer base has scaled rapidly from a niche urban quick-commerce user group to over 10 million monthly
    transacting users across 70+ Indian cities by early 2026. The platform's core demographic consists of urban
    millennials and Gen Z consumers aged 18–35 in metro and Tier 1 cities, who prioritize convenience and speed. Daily
    order volumes surged from ~900K in mid-2024 to 2.4 million by Q1 2026, with annualized gross order value approaching
    $4 billion. The Zepto Pass subscription program exceeded 5 million subscribers, with Pass members ordering 3x more
    frequently and delivering ~40% higher lifetime value than non-subscribers. App store ratings remain strong at 4.7/5
    on Google Play (4.4M+ reviews) and 4.8/5 on iOS, although third-party review platforms paint a more nuanced
    picture—MouthShut scores average 2.48/5 and Trustpilot reviews are predominantly negative, highlighting product
    quality, hidden fees, and customer support issues. Zepto has faced regulatory action including a ₹7 lakh CCPA fine
    for dark-pattern UI practices (basket sneaking, drip pricing), viral controversies over device-based dynamic pricing
    (iPhone vs Android price differentials), and FDA suspension of its Dharavi warehouse license for food safety
    violations in June 2025. The company serves both B2C consumers and B2B brand advertisers, with 10,000+ FMCG brands
    (including Nestlé, HUL, P&G) using Zepto Advertising for in-app promotions. Customer concentration risk is
    significant: top 5 metro cities (Mumbai, Delhi NCR, Bangalore, Hyderabad, Pune) generate an estimated 70%+ of GMV,
    and Tier 2 expansion faces lower order density and margin challenges.
sections:
  - id: customer-segmentation
    title: Customer Segmentation and Demographics
    body: >-
      Zepto's customer base segments into three primary cohorts defined by demographics, geography, and usage behavior.
      The dominant segment is urban millennials aged 25–35, comprising working professionals and young families in metro
      cities who use the app for daily top-up grocery shopping rather than weekly bulk purchases. These users value the
      10-minute delivery promise and are willing to pay modest convenience fees for time savings. The second segment is
      Gen Z consumers aged 18–25, including college students and early-career professionals in shared urban
      accommodations, who skew toward impulse purchases—snacks, beverages, personal care—and represent the
      fastest-growing cohort by download volume. The third segment is suburban and Tier 2 city adopters, a nascent but
      strategically critical group as Zepto expands beyond its original top-8 metro footprint into cities like Lucknow,
      Jaipur, Chandigarh, and Indore. Income-wise, Zepto's core customers fall in the middle to upper-middle class
      bracket, predominantly smartphone-first consumers comfortable with UPI payments. The platform also serves a B2B
      customer layer: over 10,000 FMCG and D2C brands that use Zepto Advertising for sponsored listings, banner
      placements, and search promotions, generating approximately ₹1,000 Cr in annualized advertising revenue. Brand
      advertisers include blue-chip FMCG companies such as Nestlé, Hindustan Unilever, Procter & Gamble, Britannia, ITC,
      and Godrej, who treat Zepto as a key digital distribution and performance marketing channel. CEO Aadit Palicha has
      described Zepto as a "hyperlocal Walmart of India" focused on the top 40 cities, which are projected to contribute
      nearly 50% of India's urban grocery market by 2029.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
    tableRefs:
      - TU001
  - id: customer-growth-adoption
    title: Customer Growth and Adoption Trajectory
    body: >-
      Zepto's customer growth trajectory has been among the steepest in Indian e-commerce history. Monthly active users
      reached 13 million by November 2023, surpassing JioMart to claim the second position behind Blinkit. By Q4 2024,
      Zepto's MAU surpassed Blinkit for the first time, driven by a 300% surge in app downloads during H2 2024 and
      features like buy-now-pay-later integration. The app became the world's second most downloaded in the Food & Drink
      category globally in 2024, surpassing 100 million Google Play installs. Daily order volumes scaled from
      approximately 300,000–400,000 in late 2023 to 900,000 by mid-2024, then breached 2 million during Diwali 2024 (40%
      higher than the closest rival per CEO Palicha), and stabilized at 2.37 million per day by Q1 2026. Annualized
      gross order value quadrupled from $1 billion in April 2024 to nearly $4 billion by April 2025. Orders per dark
      store improved from 1,460 per day in Q2 FY26 to 2,000–2,125 in Q4 FY26, reflecting both demand growth and
      operational leverage. The Zepto Cafe sub-vertical demonstrated its own adoption curve, launching in December 2024
      at 30,000 daily orders, peaking at 130,000 daily orders by February 2025, before scaling back to 65,000–67,000 by
      mid-2025 due to sourcing challenges and cash burn controls. The company's dark store network expanded from 600 in
      mid-2024 to over 1,100 by early 2026, enabling geographic coverage across 70+ cities. App opens exceeded 34.6
      billion in 2025, with power users placing up to 16 orders per day.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
    tableRefs:
      - TU002
    figureRefs:
      - FU002
  - id: named-customer-proof
    title: Named Customer and Brand Partner Evidence
    body: >-
      Zepto's customer proof extends across both direct consumers and B2B brand partners. On the consumer side, the
      platform's 100 million+ Google Play installs and 4.4 million+ app reviews provide quantitative evidence of mass
      adoption. The Zepto Pass subscription program, launched in Q1 2024 with an initial ₹99/month price point, crossed
      1 million subscribers within its first month and exceeded 5 million by early 2025, offering tangible proof of
      willingness to pay for the service. On the B2B side, Zepto claims 10,000+ brands across 30+ categories using its
      advertising platform. Named brand partners include Nestlé (Maggi, Nescafé, KitKat promoted via instant ads and
      event campaigns), Hindustan Unilever (Dove, Surf Excel, Lifebuoy with hero slot placements), Procter & Gamble
      (Pampers, Ariel, Gillette for top product placements), Britannia, ITC, Godrej, Reckitt, Marico, and Dabur. The
      2025 partnership with The Trade Desk enables FMCG brands to leverage Zepto's first-party purchase data for
      programmatic advertising across streaming and digital media platforms beyond the Zepto app. Zepto Atom, launched
      in 2025, provides real-time hyperlocal sales analytics as a SaaS product for brand partners. Fortune India
      reported that Zepto delivered ₹17,000 crore in user savings during 2025, suggesting significant consumer value
      delivery. However, independent verification of brand partner revenue contributions remains limited, as Zepto has
      not disclosed advertiser-level revenue breakdowns in its confidential DRHP filing.
    claimRefs:
      - CU014
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
    tableRefs:
      - TU003
    figureRefs:
      - FU003
  - id: retention-satisfaction
    title: Retention, Repeat Usage, and Satisfaction Metrics
    body: >-
      Zepto's retention and satisfaction profile presents a bifurcated picture. On the positive side, Zepto Pass members
      order 3x more frequently than non-subscribers and deliver approximately 40% higher lifetime value. Monthly
      retention improved by 10% for Pass users during the pilot phase, and the company targets raising 3-month cohort
      retention in metro cities from 40% to 50%. Average monthly orders per loyal Pass cohort are increasing, with a
      strategic goal to grow from 4.5 to 5.5 per month in metros. App store ratings remain strong at 4.7/5 on Google
      Play (4.4 million+ reviews) and 4.8/5 on iOS. However, independent review platforms tell a different story.
      MouthShut scores average 2.48/5 (53% satisfaction), with features, reliability, and customer support receiving
      mixed ratings. Trustpilot reviews are overwhelmingly negative, citing recurring issues with product quality,
      missing items, delayed deliveries, and difficult refund processes. Approximately 40% of Zepto Pass users do not
      renew after the first month, indicating high initial churn among low-frequency users. The company has set explicit
      churn reduction targets of 10% within 5 months and aims to increase average monthly orders per Pass user by 5%.
      Key satisfaction drivers include delivery speed (8–12 minute average fulfillment), product range (45,000–50,000
      SKUs per dark store), and live order tracking. Key dissatisfaction drivers include hidden fees, inconsistent
      product quality, poor customer support responsiveness, and the perception of unfair pricing practices.
    claimRefs:
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
