  - id: expansion-concentration-risk
    title: Expansion Strategy and Concentration Risk
    body: >-
      Zepto's customer base exhibits significant geographic concentration risk. The top 5 metro cities—Mumbai, Delhi
      NCR, Bangalore, Hyderabad, and Pune—generate an estimated 70%+ of platform GMV, creating vulnerability to
      metro-specific competitive pressures, regulatory actions, or demand saturation. CEO Palicha has stated that
      Zepto's core opportunity concentrates on the "top 40 cities," which the company projects will contribute nearly
      50% of India's urban grocery and household essentials market by 2029. The dark store-based business model requires
      high population density and order frequency to achieve unit economics, creating a structural barrier to Tier 2 and
      Tier 3 expansion where order density and average basket sizes are materially lower. Zepto's Tier 2 expansion into
      cities like Lucknow, Jaipur, and Indore faces logistical challenges including longer delivery times, lower
      consumer willingness to pay delivery premiums, and reduced order frequency compared to metro markets. Customer
      segment concentration also presents risk: heavy reliance on 18–35-year-old convenience-seeking urban professionals
      means the platform is exposed to generational spending shifts or competitive switching in a market where Blinkit
      (Zomato-backed), Swiggy Instamart, and JioMart compete aggressively on pricing and delivery speed. The advertising
      revenue stream, while growing, concentrates on large FMCG brands whose marketing budgets are cyclical and
      discretionary. Zepto's strategy to mitigate concentration risk includes product diversification (Zepto Cafe, Zepto
      Atom), category expansion (electronics, fashion), and private-label brands (Relish) to improve margins and reduce
      dependence on third-party brand advertising.
    claimRefs:
      - CU026
      - CU027
      - CU028
      - CU029
    tableRefs:
      - TU005
  - id: customer-trust-issues
    title: Customer Trust and Regulatory Challenges
    body: >-
      Zepto has faced three distinct categories of customer trust challenges that could impair long-term retention and
      brand equity. First, the Central Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh in December 2025 for
      deploying dark-pattern UI practices including basket sneaking (auto-selecting Zepto Pass at checkout without
      consent), drip pricing (revealing mandatory handling fees only at final checkout), and fake urgency timers. The
      CCPA ordered Zepto to redesign checkout flows, remove default pre-selections, and submit a compliance report
      within 15 days. CEO Palicha acknowledged that some tactics "crossed the line" and committed to eliminating dark
      patterns. Second, viral social media posts in January 2025 exposed device-based dynamic pricing, with customers
      documenting that identical products (e.g., 500g capsicum priced at ₹21 on Android vs ₹107 on iPhone) were shown at
      significantly different prices depending on the user's device. This triggered consumer outrage and regulatory
      scrutiny from the Consumer Protection Authority. Third, Maharashtra's Food and Drug Administration suspended
      Zepto's Dharavi warehouse license in June 2025 after inspections found fungal growth on food products, expired
      items stored alongside fresh goods, and products placed on dirty wet floors. An ex-employee whistleblower publicly
      alleged that Zepto routinely dispatched expired food when fresh stock was unavailable. These incidents, while
      individually manageable, collectively pose reputational risk as Zepto prepares for its IPO, targeted for
      July–September 2026.
    claimRefs:
      - CU030
      - CU031
      - CU032
      - CU033
      - CU034
      - CU035
  - id: customer-economics
    title: Customer Unit Economics and Value Metrics
    body: >-
      Zepto's customer-level economics reflect the tension between rapid growth and path-to-profitability in quick
      commerce. Average order value has trended upward from ₹430–470 in early 2024 to a target of ₹540–550 by early
      2025, though it remains below Blinkit's ₹625 AOV. The company's cash burn per order has declined from ₹110 to
      ₹42–46 by early 2026, reflecting improving unit economics. FY25 revenue reached ₹9,670 crore (up 129% YoY), driven
      primarily by order volume growth and advertising revenue. Zepto Pass members, who pay approximately ₹99/month,
      generate significantly higher contribution margins through higher order frequency (3x non-subscribers), larger
      basket sizes (30%+ higher post-subscription), and reduced customer acquisition cost amortization. The platform's
      estimated 8–10 million monthly transacting users generate approximately 70–75 million orders per month. User
      savings reported by Zepto totaled ₹17,000 crore in 2025, positioning the value proposition around cost savings
      despite the convenience premium. The advertising revenue stream (₹1,000 Cr annualized) represents a high-margin
      monetization layer that improves per-customer economics. However, Zepto has not disclosed customer acquisition
      costs, customer lifetime value, or NPS scores in its confidential DRHP filing, limiting independent assessment of
      customer-level profitability. The company targets EBITDA breakeven by late 2026, with customer-level economics as
      the critical input variable.
    claimRefs:
      - CU036
      - CU037
      - CU038
      - CU039
      - CU040
