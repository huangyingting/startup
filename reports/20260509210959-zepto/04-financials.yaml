callouts:
  - calloutType: strength
    title: "Exceptional Revenue Growth"
    body: "Zepto grew revenue from ₹141 Cr in FY22 to ₹9,669 Cr in FY25—a 68x increase in three years. FY25 alone saw 129–150% YoY growth, outpacing most Indian startups at comparable scale."
    claimRefs: [CI001, CI002, CI003]

  - calloutType: strength
    title: "Improving Unit Economics"
    body: "Contribution margins improved from ~15% in FY24 to 25–30% in FY25, and per-order burn declined from ₹73–110 to ₹42–46. ~75% of dark stores are reportedly EBITDA-positive."
    claimRefs: [CI017, CI020, CI021, CI022]

  - calloutType: risk
    title: "Losses Growing Faster Than Revenue"
    body: "Net losses widened 177% in FY25 versus 129% revenue growth. Losses now represent 35% of turnover, up from 29% in FY24. The gap between store-level and company-level profitability remains the key financial risk."
    claimRefs: [CI009, CI010, CI052, CI053]

  - calloutType: risk
    title: "Potential IPO Valuation Compression"
    body: "Reports suggest a 15–20% valuation cut from $7B to $5.6–5.95B at IPO, signaling investor caution about the loss trajectory and competitive dynamics."
    claimRefs: [CI041, CI042]

  - calloutType: assumption
    title: "Revenue Discrepancy Unresolved"
    body: "FY25 revenue is cited as ₹9,669 Cr (MCA/audited sales) and ₹11,110 Cr (press reports including other income) across different sources. The DRHP will resolve this."
    claimRefs: [CI046, CI047]

