callouts:
  - calloutType: strength
    title: "Large and Underpenetrated Market"
    body: "India's $600–720B grocery retail market is only 7–12% organized, creating a massive digitization opportunity. Quick commerce captures a growing share of urban grocery spending, with the segment projected to more than double to $11B+ by 2030."
    claimRefs: [CM001, CM003, CM007, CM008]

  - calloutType: strength
    title: "Favorable Demographics"
    body: "India's median age of 28, world's largest Gen Z cohort (27% of population), 85.5% smartphone household penetration, and 806M internet users create ideal conditions for rapid q-commerce adoption among digitally native consumers."
    claimRefs: [CM030, CM031, CM032, CM033]

  - calloutType: risk
    title: "Profitability Uncertainty"
    body: "All three major q-commerce players remain loss-making at the aggregate level. Zepto's FY25 net loss widened to ₹3,367 crore despite 150% revenue growth, raising questions about whether the business model can achieve sustainable profitability at scale."
    claimRefs: [CM037, CM053]

  - calloutType: risk
    title: "Regulatory Headwinds Intensifying"
    body: "FSSAI food safety mandates, CCPA dark pattern enforcement, gig worker social security requirements, and emerging dark store zoning issues are collectively raising compliance costs and operational complexity for quick commerce platforms."
    claimRefs: [CM039, CM040, CM041, CM042]

  - calloutType: insight
    title: "Market Share Gap to Leader"
    body: "Zepto's 29–30% share trails Blinkit's 44% by a significant margin. While Zepto has overtaken Swiggy Instamart, closing the gap to Blinkit will require sustained capital deployment—making the planned IPO critical for competitive positioning."
    claimRefs: [CM014, CM015, CM016, CM054]

  - calloutType: assumption
    title: "Market Size Estimates Vary Widely"
    body: "Quick commerce market projections for 2030 range from $4.4B to $40.9B across research firms, reflecting fundamentally different assumptions about category expansion, geographic penetration, and competitive dynamics. Conservative estimates ($9–11B) appear most credible."
    claimRefs: [CM008, CM009, CM010, CM057]

