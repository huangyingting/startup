  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Core Product Modules and Asset Matrix
        blocks:
          - type: paragraph
            body: >
              Zepto's product portfolio spans six primary modules that collectively enable its 10-minute delivery
              promise. The consumer-facing mobile app (iOS and Android) serves as the primary ordering interface,
              featuring real-time inventory visibility, personalized product recommendations powered by collaborative
              filtering algorithms, and live order tracking with sub-second GPS updates. The app reached world's second
              most-downloaded status in the Food & Drink category globally in 2024, with over 100 million installs on
              Google Play. Monthly active users surpassed Blinkit in Q4 2024, establishing Zepto as India's most-used
              quick-commerce app by engagement. The Warehouse Management System (WMS) is a fully proprietary platform
              built in-house after a critical third-party vendor outage in late 2021 convinced the engineering team to
              own the entire stack. The WMS manages real-time inventory across 45,000–50,000 SKUs per dark store,
              automated replenishment triggers, expiry tracking, and bin-level location mapping. The picker app—a
              companion to the WMS—guides warehouse staff through optimized pick paths using location codes and QR-based
              scan verification, achieving sub-2-minute average pick-and-pack times. Zepto Advertising, the company's
              adtech module, offers sponsored listings, banner placements, and search-result promotion to FMCG and D2C
              brands, generating approximately ₹1,000 Cr in annualized advertising revenue as of early 2025. Zepto Pass
              (now transitioning to Zepto Daily) provides a subscription loyalty program at approximately ₹99/month,
              delivering free delivery and exclusive pricing to 4 million+ subscribers. The Zepto Cafe module, launched
              in late 2024, operates mini-kitchens inside dark stores for 10-minute food and beverage delivery, with a
              standalone app launched in early 2025.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
              - CE008
              - CE009
      - number: '5.2'
        title: Technology and Operating Architecture
        blocks:
          - type: paragraph
            body: >
              Zepto's technology architecture underwent a significant transformation from a monolithic application
              ("Zepto Storefront") to a distributed microservices architecture between 2022 and 2024. The current stack
              runs entirely on AWS, with Amazon Elastic Kubernetes Service (EKS) providing container orchestration for
              independently deployable microservices covering order management, inventory, payments, delivery logistics,
              and user services. Amazon DynamoDB serves as the primary NoSQL database for high-throughput, low-latency
              order processing—the engineering team published a detailed case study on the AWS blog describing how
              DynamoDB enables scaling to millions of daily orders. Amazon Aurora PostgreSQL handles transactional and
              relational workloads including financial reconciliation and user account management. Change Data Capture
              using Debezium propagates state changes across services, enabling event-driven architectures for analytics
              and notification pipelines. The front-end uses config-driven micro frontends, allowing independent
              deployment of UI components across mobile and web surfaces. The Control Tower—Zepto's internal operations
              dashboard—provides centralized visibility into dark store performance, rider utilization, and order funnel
              metrics. Internal tooling follows a "build-not-buy" philosophy; the CTO stated in a November 2025
              YourStory interview that owning the entire tech stack is Zepto's "biggest moat," eliminating dependency on
              third-party SaaS platforms that could become single points of failure. The AI/ML infrastructure powers
              demand forecasting models (using techniques such as gradient boosting and LSTM networks), route
              optimization algorithms solving variants of the Vehicle Routing Problem, and personalized recommendation
              engines. Real-time observability is maintained through integrated monitoring, distributed tracing, and
              centralized logging.
            claimRefs:
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
              - CE016
      - number: '5.3'
        title: Customer Workflow and Operating Flow
        blocks:
          - type: paragraph
            body: >
              The Zepto customer journey follows a tightly optimized seven-step workflow designed to deliver orders
              within 10 minutes of placement. Step one begins with the customer opening the app and browsing a
              personalized home feed curated by ML-driven recommendation algorithms that factor in purchase history,
              time of day, and local inventory availability. Step two is product selection and cart building, where the
              app displays real-time stock levels and suggests complementary items. Step three is checkout, which
              supports multiple payment methods including UPI (dominant in India), credit/debit cards, wallets, and cash
              on delivery, with Zepto Pass members receiving instant discounts. Step four triggers order routing, where
              the platform's algorithms assign the order to the optimal dark store based on proximity, current load, and
              real-time inventory. Step five is the picking process: the WMS generates an optimized pick list and
              assigns it to a picker's handheld device, guiding them through the most efficient path. Barcode scanning
              at each pick point ensures accuracy. Step six is dispatch, where the completed order is handed to an
              algorithmically assigned delivery rider—the dispatch engine considers rider proximity, vehicle type,
              current deliveries, and predicted traffic conditions. Step seven is last-mile delivery with real-time GPS
              tracking visible to the customer. The entire workflow from order placement to delivery averages 8–12
              minutes, with the company reporting a fastest-ever delivery of 48 seconds. Users opened the Zepto app over
              34.6 billion times in 2025, with power users placing up to 16 orders per day.
            claimRefs:
              - CE017
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
      - number: '5.4'
        title: Data Analytics and Advertising Technology
        blocks:
          - type: paragraph
            body: >
              Zepto has evolved beyond a delivery platform into a data-driven advertising and analytics business. Zepto
              Advertising, the in-app advertising platform, enables brands to purchase sponsored product placements,
              search-result promotions, and banner advertisements within the consumer app. The platform reached
              approximately ₹1,000 Cr in annualized advertising revenue by early 2025, making it one of the
              fastest-growing retail media networks in India. In May 2025, Zepto launched Zepto Atom, a
              subscription-based data analytics SaaS product for consumer brands. Atom provides minute-level,
              PIN-code-granular sales data, competitive benchmarking, full-funnel customer journey analytics (from
              impression to purchase), and retention/repeat-purchase metrics. Its standout feature is Zepto GPT, a
              natural-language AI query interface that allows brand managers to ask questions like "Where did protein
              bar sales spike last week in Bengaluru?" and receive instant analytical responses. The platform is
              strategically positioned to disrupt India's ₹1,000 Cr consumer analytics industry historically dominated
              by Nielsen and Kantar, by offering real-time hyperlocal data that traditional survey-based analytics
              cannot match. Upcoming Atom features include AI-generated customer personas and automated survey tools for
              customer segments. The advertising and data businesses represent high-margin revenue streams—advertising
              typically operates at 80%+ gross margins—that materially improve Zepto's blended unit economics and reduce
              dependence on thin-margin grocery commissions.
            claimRefs:
              - CE023
              - CE024
              - CE025
              - CE026
              - CE027
              - CE028
      - number: '5.5'
        title: Supply Chain and Sourcing Technology
        blocks:
          - type: paragraph
            body: >
              Zepto's supply chain technology extends beyond last-mile delivery into upstream sourcing and procurement.
              The Bloom initiative, launched to build a farmer-to-urban supply chain for fresh produce, connects
              directly with farmers and Farmer Producer Organizations (FPOs), bypassing traditional mandi
              intermediaries. Bloom integrates with Zepto's demand forecasting engine to communicate projected demand
              signals to farmers, reducing over-production waste and enabling just-in-time procurement. Payments to
              farmers are processed within 24 hours, a significant improvement over the typical 7–15 day payment cycles
              in traditional agricultural supply chains. Private label strategy represents another supply-chain
              technology lever: Zepto's in-house brands (including "Relish" for meat and seafood) target 15%+
              penetration of total GMV, with private labels offering 40–60% gross margins compared to 10–18% on
              third-party products. The algorithmic placement of private labels on digital shelves—where they occupy top
              search results and featured positions—is managed by the same recommendation and search-ranking systems
              that power the consumer experience. Inventory management across 900+ dark stores uses AI-driven demand
              forecasting that incorporates historical sales patterns, weather data, local events, and real-time
              consumption velocity to optimize stock levels at each location. Automated replenishment alerts trigger
              procurement orders when inventory crosses minimum thresholds, while expiry tracking systems prevent sale
              of near-expiry products and minimize shrinkage.
            claimRefs:
              - CE029
              - CE030
              - CE031
              - CE032
              - CE033
              - CE034
      - number: '5.6'
        title: Trust, Quality, and Regulatory Compliance
        blocks:
          - type: paragraph
            body: >
              Zepto's product quality and compliance posture has faced significant scrutiny. In December 2025, the
              Central Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh for deploying dark patterns in its
              app—specifically drip pricing (showing mandatory charges only at final checkout) and basket sneaking
              (auto-selecting paid add-ons like Zepto Pass without explicit user consent). The penalty followed hundreds
              of consumer complaints and triggered a comprehensive app overhaul. Zepto CEO Aadit Palicha publicly
              acknowledged the practices, stating they "won't happen again," and the company redesigned its checkout
              flow to display all charges upfront and eliminate pre-selected options. The dark-patterns enforcement was
              part of a broader government crackdown: 11 companies including Amazon, Blinkit, and Swiggy received
              notices under CCPA's Guidelines for Prevention and Regulation of Dark Patterns (2023). On food safety,
              FSSAI has stepped up scrutiny of quick-commerce platforms over product shelf-life concerns, particularly
              for perishable goods stored in dark stores. Zepto's WMS includes expiry-date tracking and automated
              delisting of near-expiry products. Data privacy compliance is governed by India's Digital Personal Data
              Protection Act (DPDPA) 2023, with Zepto's data practices around location tracking, purchase history
              analytics, and targeted advertising requiring ongoing compliance monitoring. The Zepto Atom analytics
              product, which provides granular consumer behavior data to brands, raises additional privacy
              considerations around data aggregation and anonymization standards that are not yet publicly disclosed.
            claimRefs:
              - CE035
              - CE036
              - CE037
              - CE038
              - CE039
              - CE040
      - number: '5.7'
        title: Product Roadmap and Development Pipeline
        blocks:
          - type: paragraph
            body: >
              Zepto's 2025–2026 product roadmap reflects an aggressive expansion strategy across multiple verticals.
              Zepto Cafe, which hit 100,000+ daily orders and a $100M run rate by early 2025, targets 300,000 daily
              orders and ₹1,000 Cr annual revenue by 2026, with 100+ new cafe outlets opening monthly. The standalone
              Zepto Cafe app, launched in early 2025, enables independent feature development and targeted food/beverage
              UX optimization. Zepto Atom, launched May 2025, is in its initial growth phase with a roadmap including
              AI-generated customer personas, automated survey tools, and cohort-specific analytics modules planned over
              the next 12 months. The Zepto Daily subscription program, replacing Zepto Pass, launched as an invite-only
              pilot at ₹1 entry price to drive broader adoption and increase subscriber base beyond the current 4M+
              users. Category expansion continues into non-grocery segments including electronics, fashion, and personal
              care, aiming to increase average order value above the ₹750 threshold analysts identify as necessary for
              sustainable unit economics. The engineering organization is investing in further automation of dark-store
              operations, including exploration of conveyors, shelf robots, and voice-directed picking to reduce labor
              costs and improve picking speed. Infrastructure scaling priorities focus on supporting the anticipated
              order volume increases from IPO-driven brand awareness and continued city expansion into Tier 2 and Tier 3
              markets, where the tech stack must adapt to lower population density and different demand patterns.
            claimRefs:
              - CE041
              - CE042
              - CE043
              - CE044
              - CE045
              - CE046
      - number: '5.8'
        title: Adverse Technology and Product Concerns
        blocks:
          - type: paragraph
            body: >
              Several adverse technology and product risks warrant attention in Zepto's diligence. First, AWS
              single-vendor dependency represents a material infrastructure risk: the entire stack—EKS, DynamoDB,
              Aurora, S3—runs on AWS, creating concentration risk and potential cost exposure as Zepto scales. Cloud
              infrastructure costs typically represent 5–10% of revenue for high-volume e-commerce platforms, and AWS
              pricing power could compress margins. Second, the CCPA dark-patterns fine, while small in monetary terms
              (₹7 lakh), signals systemic product design issues—the practices were deliberate growth tactics, not bugs,
              raising questions about the product team's ethical decision-making framework. Third, the proprietary tech
              stack philosophy, while reducing third-party dependency, creates significant engineering overhead and
              talent risk: Zepto must recruit and retain specialized engineers across warehouse management, logistics
              optimization, adtech, and ML/AI—a broad surface area for a company of its size. Fourth, Zepto Atom's data
              analytics offering raises unresolved privacy questions about what consumer data is shared with brands, at
              what granularity, and under what anonymization standards—the DPDPA 2023 framework is still being
              operationalized and enforcement posture remains uncertain. Fifth, the rapid expansion into food
              preparation (Zepto Cafe) introduces food safety liability and regulatory complexity beyond grocery
              delivery, including FSSAI kitchen licensing, hygiene compliance, and cold-chain requirements for prepared
              food.
            claimRefs:
              - CE047
              - CE048
              - CE049
              - CE050
              - CE051
              - CE052
