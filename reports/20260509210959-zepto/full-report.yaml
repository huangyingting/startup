  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Zepto's revenue trajectory demonstrates exceptional hypergrowth since its 2021 founding. Revenue grew from
              ₹141 Cr in FY22 to ₹2,024 Cr in FY23 (14.3x growth), then to ₹4,454 Cr in FY24 (120% YoY), and further to
              ₹9,669 Cr in FY25 on a reported sales basis (129% YoY). Some sources cite FY25 revenue as ₹11,110 Cr when
              including other income streams, representing 150% YoY growth. This discrepancy likely reflects different
              reporting standards or the inclusion of non-operating income. The company's revenue streams include
              product commissions charged to partner brands and sellers (estimated ~45% of revenue), customer delivery
              and convenience fees (~20%), Zepto Advertising—an adtech platform offering sponsored listings and banner
              placements to FMCG brands (~15%), private label product sales with higher margins (~10%), and Zepto Pass
              subscription fees (~10%). Zepto's GMV reached approximately ₹24,500 Cr in FY25, implying a roughly 40%
              revenue-to-GMV take rate, which is high for quick commerce and includes inventory sales rather than pure
              marketplace commissions. The advertising revenue stream is strategically important as it represents
              high-margin, asset-light income that can scale with order volume without proportional cost increases.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI007
              - CI008
      - number: '4.2'
        title: Profitability and Loss Analysis
        blocks:
          - type: paragraph
            body: >
              Despite rapid revenue growth, Zepto's losses have widened significantly. Net losses expanded from ₹390 Cr
              in FY22 to ₹1,272 Cr in FY23, briefly declined to ₹1,249 Cr in FY24 (a 2% improvement despite doubling
              revenue), then surged to ₹3,367 Cr in FY25—a 177% year-over-year increase. Losses as a percentage of
              turnover rose from 29% in FY24 to 35% in FY25, indicating that expansion spending is outpacing efficiency
              gains at the aggregate level. Total expenses in FY24 were ₹5,747 Cr against ₹4,454 Cr in revenue, meaning
              Zepto spent ₹1.29 for every ₹1 earned. Key expense categories in FY24 included purchase of stock-in-trade
              at ₹3,450 Cr (60.5% of total expenses), delivery costs at ₹580 Cr, warehousing at ₹493 Cr, employee
              benefits at ₹426 Cr, and advertising at ₹304 Cr. The FY25 loss widening is primarily attributable to
              aggressive dark store expansion (from ~550 to ~900+ stores), heavy marketing spend for customer
              acquisition in new cities, and competitive discounting against Blinkit and Swiggy Instamart. The company
              claims EBITDA break-even is achievable within 12–15 months from April 2025.
            claimRefs:
              - CI009
              - CI010
              - CI011
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
      - number: '4.3'
        title: Unit Economics and Contribution Margins
        blocks:
          - type: paragraph
            body: >
              Zepto's unit economics have shown material improvement across FY24 and FY25, though company-level
              profitability remains elusive. The average order value (AOV) is approximately ₹400–500, with gross margins
              of 10–18% per order (₹50–80 gross profit). Variable costs per order include delivery expenses (₹40–70),
              packaging (₹8–15), order picking (₹8–15), and promotional discounts (₹15–30), totaling ₹60–100 per order.
              Contribution margins improved from approximately 15% in FY24 to 25–30% in FY25, driven by higher order
              fill rates, reduced customer acquisition costs (down 15% YoY), and better dark store utilization. The
              per-order burn rate declined from ₹73–110 in earlier quarters to ₹42–46 in Q1 FY26, reflecting operational
              maturation. Approximately 75% of dark stores were reportedly EBITDA-positive at the store level as of
              mid-2024. However, analysts note that store-level profitability does not translate to company-level
              profitability because it excludes corporate overheads, technology investment, headquarters costs, and
              expansion capital expenditure. Each dark store requires capex of ₹20–60 lakh for setup, with a targeted
              payback period of 12–18 months. The gap between store-level and company-level economics remains the
              central question for IPO investors.
            claimRefs:
              - CI017
              - CI018
              - CI019
              - CI020
              - CI021
              - CI022
              - CI023
              - CI024
      - number: '4.4'
        title: Capital Structure and Funding
        blocks:
          - type: paragraph
            body: >
              Zepto has raised over $2.3 billion across 15+ funding rounds since 2021, making it one of the most heavily
              capitalized quick-commerce startups globally. Key recent rounds include the $665M Series F in June 2024 at
              $3.6B valuation, $340M Series G in August 2024 at $5B, $350M Series G extension in November 2024 at
              $5.22B, and $450M in October 2025 at $7B valuation led by CalPERS. Following the October 2025 round, CEO
              Aadit Palicha stated the company had $900 million in cash reserves. At a monthly cash burn of
              approximately ₹250–300 Cr ($30–36M), this provides roughly 25–30 months of operational runway without
              additional fundraising. The company filed its Draft Red Herring Prospectus confidentially with SEBI on
              December 26, 2025, receiving SEBI approval on May 8, 2026. The planned IPO targets a fresh issue of
              ₹11,000–12,000 Cr ($1.2–1.3B), which would more than double the cash runway. However, reports in early
              2026 suggest Zepto may be cutting its IPO valuation by 15–20% from the $7B private round, bringing the
              expected range to $5.6–5.95B, reflecting investor scrutiny of the loss profile.
            claimRefs:
              - CI025
              - CI026
              - CI027
              - CI028
              - CI029
              - CI030
              - CI031
              - CI032
      - number: '4.5'
        title: Burn Rate and Cash Runway
        blocks:
          - type: paragraph
            body: >
              Zepto's monthly cash burn escalated from approximately ₹40 Cr in mid-2024 to ₹250–300 Cr by late 2024, a
              roughly 6x increase driven by rapid dark store expansion, hiring, and competitive marketing spend. The
              Hindustan Times reported the monthly burn rate hit ₹250 Cr in November 2024, 6x the May 2024 level,
              primarily due to rising capital expenditure on new dark stores. However, the company claims to have halved
              its operating cash flow burn by early 2025, suggesting improved efficiency even during aggressive scaling.
              At the current cash position of $900M and monthly burn of $30–36M, Zepto has approximately 25–30 months of
              runway. The IPO proceeds of $1.2–1.3B would extend this by an additional 33–43 months, providing
              significant financial cushion. The company's annualized gross order value (GOV) neared $4 billion in early
              2025, and the CEO claims the burn-to-GOV ratio has improved substantially. However, critics point out that
              the burn rate is volatile—tied to expansion cycles—and could re-accelerate if the company pursues
              aggressive growth in Tier 2 and Tier 3 cities where unit economics are less favorable.
            claimRefs:
              - CI033
              - CI034
              - CI035
              - CI036
              - CI037
              - CI038
      - number: '4.6'
        title: IPO Valuation and Financial Outlook
        blocks:
          - type: paragraph
            body: >
              Zepto's IPO, approved by SEBI on May 8, 2026, represents a critical inflection point for the company's
              financial trajectory. The IPO targets raising ₹11,000–12,000 Cr through a combination of fresh issue and
              offer-for-sale, with listing expected between July and September 2026. The private market valuation of $7B
              (October 2025) implies a revenue multiple of approximately 6–7x FY25 sales on an ₹11,110 Cr basis.
              However, multiple sources report that Zepto may refile its DRHP with a 15–20% valuation cut to $5.6–5.95B,
              which would imply a more modest 5–5.5x revenue multiple. For context, Swiggy trades at approximately 8–10x
              revenue in public markets, while Zomato (which owns Blinkit) trades at 15–20x. Zepto's path to
              company-level EBITDA break-even within 12–15 months from April 2025 will be closely watched by public
              market investors. The company needs to demonstrate that its 25–30% contribution margins can absorb
              corporate overheads at scale. Key risks include competitive intensity from Blinkit and Swiggy Instamart,
              potential margin compression from expansion into lower-density cities, and the structural challenge that
              quick commerce operates on thin margins with high fixed costs.
            claimRefs:
              - CI039
              - CI040
              - CI041
              - CI042
              - CI043
              - CI044
              - CI045
      - number: '4.7'
        title: Financial Transparency and Public Data Gaps
        blocks:
          - type: paragraph
            body: >
              As a private company, Zepto's financial disclosures are limited, creating significant gaps for diligence
              purposes. The most notable discrepancy is the FY25 revenue figure: some sources report ₹9,669 Cr (based on
              MCA filings showing total sales), while others cite ₹11,110 Cr, which likely includes other operating
              income or uses a different reporting basis. Until the full DRHP becomes public, this discrepancy cannot be
              definitively resolved. Other material gaps include the absence of audited segment-level revenue breakdowns
              (advertising vs. commissions vs. delivery fees vs. subscriptions are all estimated), lack of disclosed
              EBITDA or operating profit figures at the company level, unverified claims about 75% of dark stores being
              EBITDA-positive (no third-party audit), and undisclosed total employee count and per-employee cost
              metrics. The company's expense breakdown is only available for FY24 through Registrar of Companies
              filings; FY25 line-item expenses have not been publicly disclosed. Additionally, Zepto's debt facilities
              and related-party transactions remain largely opaque. The confidential DRHP filing route means that
              detailed financials will only become public at the DRHP release stage, which has not yet occurred as of
              the run date.
            claimRefs:
              - CI046
              - CI047
              - CI048
              - CI049
              - CI050
              - CI051
      - number: '4.8'
        title: Adverse Financial Concerns
        blocks:
          - type: paragraph
            body: >
              Several adverse financial signals merit attention in Zepto's diligence. First, the 177% widening of net
              losses in FY25 despite 129% revenue growth suggests that the company's cost structure is not scaling
              efficiently—losses grew faster than revenue. Second, critics argue that quick commerce is a structurally
              unprofitable business: delivery costs, cold chain requirements, and small basket sizes create thin margins
              that may never support company-level profitability. The Hindu Business Line reported that losses widened
              sharply as the quick commerce battle intensifies ahead of the IPO. Third, Zepto's reliance on discounting
              and promotional offers to drive order volume raises questions about organic demand versus subsidized
              demand. Fourth, the potential IPO valuation cut of 15–20% signals that even sophisticated investors are
              recalibrating expectations. Fifth, the company's cash burn of ₹250–300 Cr per month, while declining,
              remains substantial for a company that has never been profitable. Business Outreach and other analysts
              have questioned whether quick commerce can ever turn sustainably profitable, noting that store-level
              EBITDA positivity is necessary but not sufficient for company-level viability. These concerns are material
              for IPO investors evaluating Zepto's long-term financial sustainability.
            claimRefs:
              - CI052
              - CI053
              - CI054
              - CI055
              - CI056
              - CI057
      - number: '4.9'
        title: Exhibits
        blocks:
          - type: callout
            title: Exceptional Revenue Growth
            body: >-
              Zepto grew revenue from ₹141 Cr in FY22 to ₹9,669 Cr in FY25—a 68x increase in three years. FY25 alone saw
              129–150% YoY growth, outpacing most Indian startups at comparable scale.
            calloutType: strength
            claimRefs:
              - CI001
              - CI002
              - CI003
          - type: callout
            title: Improving Unit Economics
            body: >-
              Contribution margins improved from ~15% in FY24 to 25–30% in FY25, and per-order burn declined from
              ₹73–110 to ₹42–46. ~75% of dark stores are reportedly EBITDA-positive.
            calloutType: strength
            claimRefs:
