  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Trajectory and Funding History
        blocks:
          - type: paragraph
            body: >-
              Zepto's valuation has undergone a remarkable five-fold increase in just over two years, reflecting both
              the company's hyper-growth and investor enthusiasm for India's quick-commerce opportunity. The company was
              valued at $1.4 billion in August 2023 following a Series F round, then jumped to $3.6 billion in June 2024
              during a $665 million raise that attracted marquee investors including StepStone Group, Motilal Oswal, and
              Nexus Venture Partners. By August 2024, the valuation reached $5 billion, and the most recent funding
              round in October 2025—a $450 million raise led by CalPERS, Dragon Fund, and Lightspeed Venture
              Partners—set the private market valuation at $7 billion. Total capital raised exceeds $2.3 billion, with
              approximately $900 million in cash reserves as of early 2026. However, SEBI's scrutiny of Zepto's
              confidential DRHP filing in December 2025 triggered investor pushback, resulting in a 15–20% valuation cut
              to $5.6–5.95 billion for the IPO target. The company plans to refile an updated DRHP by end of April 2026
              with revised financial projections. At the adjusted $5.6–6 billion valuation, Zepto trades at
              approximately 4.3–4.6x FY25 revenue of ₹11,110 crore (~$1.3 billion), which aligns more closely with
              mature delivery platform multiples than with high-growth Indian tech valuations.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV006
      - number: '8.2'
        title: Comparable Company Valuation Analysis
        blocks:
          - type: paragraph
            body: >-
              A comprehensive comparable analysis positions Zepto against both Indian and global quick-commerce and
              delivery platforms. In India, Blinkit—the quick-commerce arm of Zomato (now Eternal)—commands the highest
              valuation at approximately $13 billion according to Goldman Sachs' sum-of-the-parts analysis, representing
              a 6x increase from $2 billion in March 2023. Zomato's total market capitalization stands at approximately
              $20 billion, with Blinkit now accounting for the largest share. Swiggy, which went public in 2024, trades
              at a market cap of approximately ₹72,662 crore (~$8.7 billion), with its Instamart quick-commerce segment
              reporting GOV of ₹7,881 crore in Q4 FY26, growing 68.8% year-on-year. Among global peers, DoorDash trades
              at a market cap of $67–75 billion on FY25 revenue of $13.7 billion, implying a 4.9–6.7x revenue multiple.
              Instacart (Maplebear) has a market cap of $7–9 billion on estimated revenue of $3.1–3.5 billion, yielding
              a 2–3x multiple. Grab Holdings commands $13–15 billion on FY25 revenue of $3.37 billion (4–4.5x). Gopuff,
              the closest US dark-store comparable, raised at $8.5 billion in November 2025, down from its $15 billion
              peak. Zepto's $5.6–7 billion valuation range on ~$1.3 billion revenue implies 4.3–5.4x, placing it above
              Instacart and below DoorDash and Blinkit. The growth-adjusted premium is partially justified by Zepto's
              149% revenue growth versus peers' 20–50% growth rates, but the significant net losses create a
              profitability discount relative to DoorDash and Blinkit, both of which have achieved or are approaching
              EBITDA profitability.
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
      - number: '8.3'
        title: IPO Valuation Dynamics and Market Context
        blocks:
          - type: paragraph
            body: >-
              Zepto's IPO represents a critical inflection point for India's quick-commerce sector and for startup
              valuations in Indian public markets. SEBI approved the IPO on May 8, 2026, clearing the path for a Q3 2026
              (July–September) listing. The planned raise of ₹11,000–12,000 crore (~$1.3–1.4 billion) combines a fresh
              issue for expansion and a limited Offer for Sale by early investors. Morgan Stanley, Goldman Sachs, HSBC,
              Axis Capital, JM Financial, IIFL Securities, and Motilal Oswal serve as IPO managers, reflecting strong
              institutional backing. The valuation trajectory from the private market $7 billion to the public market
              $5.6–5.95 billion represents a pre-IPO discount of 15–20%, driven by SEBI's scrutiny of disclosure
              standards and investor concerns about sustained losses. India's public market has shown mixed appetite for
              loss-making tech companies—Swiggy's post-IPO performance saw initial volatility before stabilizing, while
              Zomato's stock has appreciated significantly since its 2021 listing as Blinkit gained traction. The IPO
              window timing is favorable, with Indian markets at near-record highs and strong FII inflows into Indian
              tech. However, any deterioration in global risk sentiment or domestic market correction could compress the
              achievable valuation. The price band and lot size details are pending the updated DRHP filing.
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
      - number: '8.4'
        title: Scenario Analysis and Return Projections
        blocks:
          - type: paragraph
            body: >-
              Three valuation scenarios frame the investment outlook for Zepto through FY28. The bull case projects a
              $10–12 billion valuation by FY28, predicated on Zepto achieving EBITDA break-even by FY27, sustaining 50%+
              revenue growth through dark store expansion to 2,000+ locations, maintaining or gaining market share above
              30%, and successfully executing the IPO at $6.5+ billion. This scenario implies a 1.5–2x return from a $6
              billion entry point and assumes India's quick-commerce market reaches $25–30 billion by FY28. The base
              case targets $6.5–8 billion by FY28, assuming revenue growth decelerates to 40–50%, contribution margin
              turns positive by FY27, but EBITDA break-even extends to FY28. Market share stabilizes at 25–28% as
              Blinkit and Swiggy Instamart maintain competitive pressure. This scenario implies a 1–1.3x return from a
              $6 billion entry. The bear case suggests $3–4 billion if losses persist beyond FY28, market share declines
              below 20% as Amazon Tez and Flipkart Minutes gain traction, the IPO raises less than targeted, and
              competitive price wars compress contribution margins. This scenario implies a 0.5–0.7x return,
              representing capital destruction. Key swing factors include the pace of profitability improvement,
              competitive intensity from Blinkit's 2,000+ dark store advantage, regulatory developments under India's
              new Labour Codes, and macroeconomic conditions affecting consumer spending.
            claimRefs:
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
      - number: '8.5'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The investment thesis rests on four pillars. First, Zepto operates in India's fastest-growing consumer
              sector—quick commerce is projected to reach $57 billion by 2030 at approximately 40% CAGR, driven by
              rising smartphone penetration, urbanization, and growing middle-class demand for convenience. Second,
              Zepto has demonstrated exceptional execution with 149% revenue growth in FY25 and expansion to 1,100+ dark
              stores across major Indian cities, establishing a credible #2 position behind Blinkit. Third, the company
              has $900 million in cash reserves and institutional backing from CalPERS, Lightspeed, and StepStone,
              providing 5–6 quarters of runway at current burn rates. Fourth, the IPO provides a liquidity event and
              capital infusion that could fund expansion to 2,000+ dark stores and accelerate the path to profitability.
              The anti-thesis presents equally compelling counterarguments. First, net losses tripled to ₹3,367 crore in
              FY25 with loss-to-revenue ratios of approximately 30%, and EBITDA profitability remains at best 12–15
              months away. Second, Blinkit holds 44–50% market share with 2,000+ dark stores and the backing of Zomato's
              profitable food delivery business, creating a well-capitalized competitor that Zepto may struggle to
              displace. Third, Amazon Tez and Flipkart Minutes are entering with deep capital reserves, threatening to
              intensify price wars and compress margins further. Fourth, unit economics remain negative at the
              contribution margin level, raising fundamental questions about whether 10-minute delivery can be
              profitable at scale in India's price-sensitive market.
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
      - number: '8.6'
        title: Thesis-Break Triggers and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Five thesis-break triggers would materially alter the investment case. First, failure to achieve EBITDA
              break-even by FY28 would signal structural unprofitability in the 10-minute delivery model and likely
              trigger a valuation de-rating to 2–3x revenue. Second, market share declining below 20% from the current
              estimated 28–30% would indicate competitive displacement by Blinkit, Swiggy Instamart, or new entrants,
              undermining the growth thesis. Third, cash reserves falling below ₹3,000 crore without a clear path to
              profitability would create existential funding risk, particularly if public market sentiment sours on
              loss-making tech. Fourth, IPO delay beyond Q4 2026 would signal regulatory or market concerns and could
              force Zepto to raise additional private capital at a potential down-round valuation. Fifth, monthly cash
              burn exceeding ₹400 crore would indicate deteriorating unit economics and accelerate the runway countdown.
              Kill criteria—absolute conditions for exiting or declining the investment—include any material fraud or
              financial misstatement discovered during IPO diligence, founder departure or governance crisis, regulatory
              action that forces operational shutdown of dark store networks, or a sustained market share decline below
              15%. The current status of each trigger shows manageable but elevated risk, with the EBITDA timeline and
              competitive dynamics representing the most closely watched metrics.
            claimRefs:
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
      - number: '8.7'
        title: Recommendation and Final Diligence
        blocks:
          - type: paragraph
            body: >-
              Our base-case recommendation is Cautious Proceed at a $5.5–6.5 billion entry valuation, representing
              4.2–5.0x FY25 revenue. This recommendation reflects a balanced assessment of Zepto's exceptional growth
              trajectory, large addressable market, and institutional backing against the significant risks of sustained
              losses, intense competition, and uncertain path to profitability. The recommended entry valuation
              represents a 7–21% discount to the last private round ($7 billion) and aligns with the SEBI-adjusted IPO
              target of $5.6–5.95 billion. Investors should condition participation on several pre-investment diligence
              items: review of FY26 Q1/Q2 interim financials demonstrating contribution margin improvement, detailed
              dark-store-level unit economics showing a path to store-level profitability, management presentation on
              the timeline and milestones for EBITDA break-even, competitive positioning data including market share
              trends and customer acquisition costs, and ESOP pool and dilution analysis from the final DRHP. Post-IPO
              monitoring should track quarterly contribution margins, dark store count and same-store revenue growth,
              market share relative to Blinkit, monthly cash burn trajectory, and customer retention metrics. The
              investment is suitable for portfolios with high risk tolerance, a 3–5 year investment horizon, and
              conviction in India's quick-commerce secular growth story.
            claimRefs:
              - CV037
              - CV038
              - CV039
              - CV040
