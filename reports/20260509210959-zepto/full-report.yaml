  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Demographics
        blocks:
          - type: paragraph
            body: >-
              Zepto's customer base segments into three primary cohorts defined by demographics, geography, and usage
              behavior. The dominant segment is urban millennials aged 25–35, comprising working professionals and young
              families in metro cities who use the app for daily top-up grocery shopping rather than weekly bulk
              purchases. These users value the 10-minute delivery promise and are willing to pay modest convenience fees
              for time savings. The second segment is Gen Z consumers aged 18–25, including college students and
              early-career professionals in shared urban accommodations, who skew toward impulse purchases—snacks,
              beverages, personal care—and represent the fastest-growing cohort by download volume. The third segment is
              suburban and Tier 2 city adopters, a nascent but strategically critical group as Zepto expands beyond its
              original top-8 metro footprint into cities like Lucknow, Jaipur, Chandigarh, and Indore. Income-wise,
              Zepto's core customers fall in the middle to upper-middle class bracket, predominantly smartphone-first
              consumers comfortable with UPI payments. The platform also serves a B2B customer layer: over 10,000 FMCG
              and D2C brands that use Zepto Advertising for sponsored listings, banner placements, and search
              promotions, generating approximately ₹1,000 Cr in annualized advertising revenue. Brand advertisers
              include blue-chip FMCG companies such as Nestlé, Hindustan Unilever, Procter & Gamble, Britannia, ITC, and
              Godrej, who treat Zepto as a key digital distribution and performance marketing channel. CEO Aadit Palicha
              has described Zepto as a "hyperlocal Walmart of India" focused on the top 40 cities, which are projected
              to contribute nearly 50% of India's urban grocery market by 2029.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
      - number: '6.2'
        title: Customer Growth and Adoption Trajectory
        blocks:
          - type: paragraph
            body: >-
              Zepto's customer growth trajectory has been among the steepest in Indian e-commerce history. Monthly
              active users reached 13 million by November 2023, surpassing JioMart to claim the second position behind
              Blinkit. By Q4 2024, Zepto's MAU surpassed Blinkit for the first time, driven by a 300% surge in app
              downloads during H2 2024 and features like buy-now-pay-later integration. The app became the world's
              second most downloaded in the Food & Drink category globally in 2024, surpassing 100 million Google Play
              installs. Daily order volumes scaled from approximately 300,000–400,000 in late 2023 to 900,000 by
              mid-2024, then breached 2 million during Diwali 2024 (40% higher than the closest rival per CEO Palicha),
              and stabilized at 2.37 million per day by Q1 2026. Annualized gross order value quadrupled from $1 billion
              in April 2024 to nearly $4 billion by April 2025. Orders per dark store improved from 1,460 per day in Q2
              FY26 to 2,000–2,125 in Q4 FY26, reflecting both demand growth and operational leverage. The Zepto Cafe
              sub-vertical demonstrated its own adoption curve, launching in December 2024 at 30,000 daily orders,
              peaking at 130,000 daily orders by February 2025, before scaling back to 65,000–67,000 by mid-2025 due to
              sourcing challenges and cash burn controls. The company's dark store network expanded from 600 in mid-2024
              to over 1,100 by early 2026, enabling geographic coverage across 70+ cities. App opens exceeded 34.6
              billion in 2025, with power users placing up to 16 orders per day.
            claimRefs:
              - CU006
              - CU007
              - CU008
              - CU009
              - CU010
              - CU011
              - CU012
              - CU013
      - number: '6.3'
        title: Named Customer and Brand Partner Evidence
        blocks:
          - type: paragraph
            body: >-
              Zepto's customer proof extends across both direct consumers and B2B brand partners. On the consumer side,
              the platform's 100 million+ Google Play installs and 4.4 million+ app reviews provide quantitative
              evidence of mass adoption. The Zepto Pass subscription program, launched in Q1 2024 with an initial
              ₹99/month price point, crossed 1 million subscribers within its first month and exceeded 5 million by
              early 2025, offering tangible proof of willingness to pay for the service. On the B2B side, Zepto claims
              10,000+ brands across 30+ categories using its advertising platform. Named brand partners include Nestlé
              (Maggi, Nescafé, KitKat promoted via instant ads and event campaigns), Hindustan Unilever (Dove, Surf
              Excel, Lifebuoy with hero slot placements), Procter & Gamble (Pampers, Ariel, Gillette for top product
              placements), Britannia, ITC, Godrej, Reckitt, Marico, and Dabur. The 2025 partnership with The Trade Desk
              enables FMCG brands to leverage Zepto's first-party purchase data for programmatic advertising across
              streaming and digital media platforms beyond the Zepto app. Zepto Atom, launched in 2025, provides
              real-time hyperlocal sales analytics as a SaaS product for brand partners. Fortune India reported that
              Zepto delivered ₹17,000 crore in user savings during 2025, suggesting significant consumer value delivery.
              However, independent verification of brand partner revenue contributions remains limited, as Zepto has not
              disclosed advertiser-level revenue breakdowns in its confidential DRHP filing.
            claimRefs:
              - CU014
              - CU015
              - CU016
              - CU017
              - CU018
              - CU019
      - number: '6.4'
        title: Retention, Repeat Usage, and Satisfaction Metrics
        blocks:
          - type: paragraph
            body: >-
              Zepto's retention and satisfaction profile presents a bifurcated picture. On the positive side, Zepto Pass
              members order 3x more frequently than non-subscribers and deliver approximately 40% higher lifetime value.
              Monthly retention improved by 10% for Pass users during the pilot phase, and the company targets raising
              3-month cohort retention in metro cities from 40% to 50%. Average monthly orders per loyal Pass cohort are
              increasing, with a strategic goal to grow from 4.5 to 5.5 per month in metros. App store ratings remain
              strong at 4.7/5 on Google Play (4.4 million+ reviews) and 4.8/5 on iOS. However, independent review
              platforms tell a different story. MouthShut scores average 2.48/5 (53% satisfaction), with features,
              reliability, and customer support receiving mixed ratings. Trustpilot reviews are overwhelmingly negative,
              citing recurring issues with product quality, missing items, delayed deliveries, and difficult refund
              processes. Approximately 40% of Zepto Pass users do not renew after the first month, indicating high
              initial churn among low-frequency users. The company has set explicit churn reduction targets of 10%
              within 5 months and aims to increase average monthly orders per Pass user by 5%. Key satisfaction drivers
              include delivery speed (8–12 minute average fulfillment), product range (45,000–50,000 SKUs per dark
              store), and live order tracking. Key dissatisfaction drivers include hidden fees, inconsistent product
              quality, poor customer support responsiveness, and the perception of unfair pricing practices.
            claimRefs:
              - CU020
              - CU021
              - CU022
              - CU023
              - CU024
              - CU025
      - number: '6.5'
        title: Expansion Strategy and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Zepto's customer base exhibits significant geographic concentration risk. The top 5 metro cities—Mumbai,
              Delhi NCR, Bangalore, Hyderabad, and Pune—generate an estimated 70%+ of platform GMV, creating
              vulnerability to metro-specific competitive pressures, regulatory actions, or demand saturation. CEO
              Palicha has stated that Zepto's core opportunity concentrates on the "top 40 cities," which the company
              projects will contribute nearly 50% of India's urban grocery and household essentials market by 2029. The
              dark store-based business model requires high population density and order frequency to achieve unit
              economics, creating a structural barrier to Tier 2 and Tier 3 expansion where order density and average
              basket sizes are materially lower. Zepto's Tier 2 expansion into cities like Lucknow, Jaipur, and Indore
              faces logistical challenges including longer delivery times, lower consumer willingness to pay delivery
              premiums, and reduced order frequency compared to metro markets. Customer segment concentration also
              presents risk: heavy reliance on 18–35-year-old convenience-seeking urban professionals means the platform
              is exposed to generational spending shifts or competitive switching in a market where Blinkit
              (Zomato-backed), Swiggy Instamart, and JioMart compete aggressively on pricing and delivery speed. The
              advertising revenue stream, while growing, concentrates on large FMCG brands whose marketing budgets are
              cyclical and discretionary. Zepto's strategy to mitigate concentration risk includes product
              diversification (Zepto Cafe, Zepto Atom), category expansion (electronics, fashion), and private-label
              brands (Relish) to improve margins and reduce dependence on third-party brand advertising.
            claimRefs:
              - CU026
              - CU027
              - CU028
              - CU029
      - number: '6.6'
        title: Customer Trust and Regulatory Challenges
        blocks:
          - type: paragraph
            body: >-
              Zepto has faced three distinct categories of customer trust challenges that could impair long-term
              retention and brand equity. First, the Central Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh in
              December 2025 for deploying dark-pattern UI practices including basket sneaking (auto-selecting Zepto Pass
              at checkout without consent), drip pricing (revealing mandatory handling fees only at final checkout), and
              fake urgency timers. The CCPA ordered Zepto to redesign checkout flows, remove default pre-selections, and
              submit a compliance report within 15 days. CEO Palicha acknowledged that some tactics "crossed the line"
              and committed to eliminating dark patterns. Second, viral social media posts in January 2025 exposed
              device-based dynamic pricing, with customers documenting that identical products (e.g., 500g capsicum
              priced at ₹21 on Android vs ₹107 on iPhone) were shown at significantly different prices depending on the
              user's device. This triggered consumer outrage and regulatory scrutiny from the Consumer Protection
              Authority. Third, Maharashtra's Food and Drug Administration suspended Zepto's Dharavi warehouse license
              in June 2025 after inspections found fungal growth on food products, expired items stored alongside fresh
              goods, and products placed on dirty wet floors. An ex-employee whistleblower publicly alleged that Zepto
              routinely dispatched expired food when fresh stock was unavailable. These incidents, while individually
              manageable, collectively pose reputational risk as Zepto prepares for its IPO, targeted for July–September
              2026.
            claimRefs:
              - CU030
              - CU031
              - CU032
              - CU033
              - CU034
              - CU035
      - number: '6.7'
        title: Customer Unit Economics and Value Metrics
        blocks:
          - type: paragraph
            body: >-
              Zepto's customer-level economics reflect the tension between rapid growth and path-to-profitability in
              quick commerce. Average order value has trended upward from ₹430–470 in early 2024 to a target of ₹540–550
              by early 2025, though it remains below Blinkit's ₹625 AOV. The company's cash burn per order has declined
              from ₹110 to ₹42–46 by early 2026, reflecting improving unit economics. FY25 revenue reached ₹9,670 crore
              (up 129% YoY), driven primarily by order volume growth and advertising revenue. Zepto Pass members, who
              pay approximately ₹99/month, generate significantly higher contribution margins through higher order
              frequency (3x non-subscribers), larger basket sizes (30%+ higher post-subscription), and reduced customer
              acquisition cost amortization. The platform's estimated 8–10 million monthly transacting users generate
              approximately 70–75 million orders per month. User savings reported by Zepto totaled ₹17,000 crore in
              2025, positioning the value proposition around cost savings despite the convenience premium. The
              advertising revenue stream (₹1,000 Cr annualized) represents a high-margin monetization layer that
              improves per-customer economics. However, Zepto has not disclosed customer acquisition costs, customer
              lifetime value, or NPS scores in its confidential DRHP filing, limiting independent assessment of
              customer-level profitability. The company targets EBITDA breakeven by late 2026, with customer-level
              economics as the critical input variable.
            claimRefs:
              - CU036
