      - number: '1.6'
        title: Adverse Events and Governance
        blocks:
          - type: paragraph
            body: >
              Zepto has faced several controversies that bear on its governance maturity. In 2024–2025, the company was
              widely criticized for deploying dark patterns in its app—manipulative UI designs including drip pricing,
              basket sneaking, hidden handling fees, and auto-enrollment in paid memberships. The Central Consumer
              Protection Authority (CCPA) fined Zepto ₹7 lakh in December 2025 and ordered corrective measures. CEO
              Aadit Palicha publicly acknowledged the dark patterns as a mistake and stated the company eliminated all
              hidden charges, handling fees, and surge pricing. Additionally, allegations of device-based differential
              pricing surfaced, with reports that iPhone users were charged more than Android users for the same
              products. In June 2025, the Maharashtra Food and Drug Administration (FDA) suspended Zepto's license at
              its Dharavi warehouse in Mumbai after discovering expired products and fungal growth on food items. The
              company also faced social media allegations of toxic work culture and long working hours. These incidents
              highlight governance gaps in a rapidly scaling organization and represent material reputational risk as
              the company approaches its IPO.
            claimRefs:
