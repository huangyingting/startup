  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Zepto faces escalating regulatory risk across consumer protection, food safety, data privacy, and labor
              law domains. The Central Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh in December 2025 for
              deploying dark-pattern UI practices including basket sneaking (auto-selecting Zepto Pass at checkout),
              drip pricing (revealing mandatory handling fees only at final checkout), and fake urgency timers. The CCPA
              ordered Zepto to redesign checkout flows, remove default pre-selections, and submit a compliance report
              within 15 days. The government subsequently issued notices to 11 firms including Zepto for ongoing
              dark-pattern violations, signaling sustained enforcement. Separately, Maharashtra's Food and Drug
              Administration (FDA) suspended Zepto's Dharavi warehouse license in June 2025 after inspections found
              fungal growth on food products, expired items stored alongside fresh goods, cold storage units failing
              temperature requirements, and products stored on dirty wet floors. The suspension was ordered under
              Section 32(3) of the Food Safety and Standards Act, 2006, with the facility barred from operating until
              full compliance and regulatory clearance. The FDA announced plans to inspect other quick-commerce
              facilities, creating sector-wide regulatory risk. India's Digital Personal Data Protection Act (DPDPA)
              2023 imposes penalties up to ₹250 crore for data protection violations, requiring explicit consent
              collection, purpose limitation, breach notification, and user rights facilitation—all areas where Zepto's
              handling of millions of customer records creates compliance surface area. Additionally, SEBI's scrutiny of
              Zepto's confidential DRHP filing led to a 15–20% valuation cut from the initial $7–8 billion target to
              $5.6–5.95 billion, reflecting regulatory pressure on IPO disclosure standards.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
      - number: '7.2'
        title: Labor and Workforce Regulation Risks
        blocks:
          - type: paragraph
            body: >-
              India's four new Labour Codes, which took effect on November 21, 2025, formally recognize gig and platform
              workers for the first time and impose mandatory social security obligations on aggregator platforms. Under
              the Code on Social Security, 2020, companies like Zepto must contribute 1–2% of their annual turnover
              (capped at 5% of all payouts to workers) into a dedicated Social Security Fund providing health benefits,
              maternity coverage, life and disability insurance, accident coverage, and pension equivalents. All gig
              workers must be registered via the e-Shram government portal with Aadhaar-linked Universal Account
              Numbers, and any accident during commute is now legally considered "in the course of employment," making
              workers eligible for ESIC benefits. For Zepto, which relies on tens of thousands of delivery partners
              classified as independent contractors, these regulations represent a material cost increase and
              operational complexity. The Telangana Gig and Platform Workers' Union formally accused Zepto of
              exploitative practices in May 2025, citing drastic per-delivery pay cuts, lack of minimum wage guarantees,
              unsafe working conditions, absence of ESI/PF/insurance, high-pressure delivery deadlines risking rider
              safety, arbitrary penalties, and denial of basic amenities. Zepto denied these claims but worker strikes
              and union complaints continued. The regulatory trajectory suggests increasing formalization of gig worker
              rights, which could compress margins for delivery-intensive business models and expose Zepto to
              retroactive compliance claims.
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
      - number: '7.3'
        title: Operational Quality and Safety Risks
        blocks:
          - type: paragraph
            body: >-
              Zepto's rapid dark store expansion from 600 in mid-2024 to 1,100+ by early 2026 creates significant
              operational risk across food safety, cold chain management, and delivery execution. The Dharavi warehouse
              incident exposed systemic vulnerabilities: an ex-employee whistleblower publicly alleged that Zepto
              routinely dispatched expired food when fresh stock was unavailable, suggesting quality control failures
              may extend beyond a single facility. With 45,000–50,000 SKUs per dark store including perishable
              categories (dairy, meat, fresh produce), maintaining cold chain integrity across 1,100+ locations requires
              consistent temperature monitoring, proper segregation of expired and fresh stock, and adherence to FSSAI
              standards— a challenge that scales non-linearly with network size. Dark store leases, typically 12–36
              months, expose Zepto to rent volatility in premium urban locations (Mumbai, Bangalore, Delhi NCR),
              landlord non-renewal risk, and sunk fit-out costs if leases terminate prematurely. Urban zoning laws
              remain ambiguous for dark stores, with neighborhood opposition and municipal restrictions possible in
              residential areas. Delivery rider safety represents another operational risk: riders navigating congested
              urban traffic under 10-minute delivery pressure face accident risk, and any high-profile incident could
              trigger regulatory backlash and reputational damage. Zepto's technology infrastructure is concentrated on
              AWS, creating single-provider dependency for order management, inventory tracking, cold chain IoT
              monitoring, and real-time delivery coordination. An AWS regional outage could disrupt operations across
              multiple cities simultaneously.
            claimRefs:
              - CR013
              - CR014
              - CR015
              - CR016
              - CR017
              - CR018
      - number: '7.4'
        title: Competitive and Market Risks
        blocks:
          - type: paragraph
            body: >-
              Zepto operates in India's hypercompetitive quick-commerce market where it holds approximately 29–30%
              market share, trailing Blinkit's dominant 44–50% position. Blinkit, as a subsidiary of publicly listed
              Zomato (now Eternal), benefits from a parent company with ₹17,000–18,000 crore in cash reserves, 2,000+
              dark stores (nearly double Zepto's network), and achieved EBITDA positivity in Q4 FY25. Swiggy Instamart
              holds 23–25% share and leverages cross-sell from Swiggy's massive food delivery user base, reducing
              customer acquisition costs. Amazon Tez and Flipkart Minutes represent emerging threats, backed by
              virtually unlimited capital, existing logistics infrastructure, and large established user bases. The
              competitive intensity has triggered a destructive price war: Zepto eliminated all platform fees (handling,
              surge, convenience charges) and dropped minimum order value for free delivery to ₹99 in late 2025,
              directly pressuring unit economics. Industry analysts estimate Zepto's monthly cash burn at approximately
              ₹500 crore during aggressive expansion phases. SKU overlap across platforms exceeds 58%, limiting
              differentiation opportunities and compressing margins. The Indian quick-commerce market is projected to
              grow at ~40% CAGR through 2030, reaching $35 billion, but this growth attracts additional entrants and
              intensifies competition for dark store locations, delivery riders, and customer attention. Traditional
              retailers have urged regulatory investigation of predatory pricing by quick-commerce platforms, which
              could constrain promotional strategies.
            claimRefs:
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
      - number: '7.5'
        title: Financial Sustainability and IPO Risks
        blocks:
          - type: paragraph
            body: >-
              Zepto's financial profile presents significant sustainability concerns ahead of its planned 2026 IPO. Net
              losses nearly tripled to ₹3,367 crore in FY25 from ₹1,214 crore in FY24, even as revenue surged 129% to
              ₹9,669 crore. The company's cash reserves of approximately ₹7,000 crore are roughly half those of Zomato
              (₹17,000–18,000 crore) and Swiggy (similar range), creating a relative funding disadvantage in a
              capital-intensive market. Zepto reportedly cut annual cash burn by approximately 75% by late 2025 through
              layoffs (800–900 roles), reduced customer acquisition spend, and slowed dark store expansion and niche
              project investment (Zepto Cafe). The company's IPO aims to raise approximately ₹11,000 crore ($1.3
              billion), with most proceeds allocated to network expansion and financial cushion rather than existing
              investor exits. However, SEBI scrutiny led to a 15–20% valuation cut from the initial $7–8 billion target,
              reflecting investor skepticism about the path to profitability. The capital intensity of dark store
              expansion (2,000–5,000 sq ft leased spaces requiring fit-out investment per location), combined with
              competitive pressure to maintain zero-fee pricing and subsidized delivery, creates a structural tension
              between growth and profitability. Average order value (₹450–550) remains below Blinkit's ₹625, and cash
              burn per order, while declining from ₹110 to ₹42–46, still represents a drag on unit economics. If IPO
              market conditions deteriorate or investor appetite for loss-making quick-commerce companies wanes, Zepto
              could face a funding gap that constrains expansion and competitive positioning.
            claimRefs:
              - CR026
              - CR027
              - CR028
              - CR029
              - CR030
              - CR031
      - number: '7.6'
        title: People and Culture Risks
        blocks:
          - type: paragraph
            body: >-
              Zepto faces material people risks centered on founder dependency, work culture controversies, and talent
              retention challenges. CEO Aadit Palicha (23) and CTO Kaivalya Vohra (21) are among India's youngest
              startup founders, having dropped out of Stanford to build Zepto during COVID-19 lockdowns. While their
              youth and speed have driven Zepto's rapid growth, their limited corporate experience and outsized personal
              influence on company strategy, culture, and investor relationships create key-person risk that could
              impact operations if either founder departs or becomes incapacitated. Work culture allegations have
              intensified: in May 2025, a viral Reddit post from a contract worker detailed punishing work hours
              (9am–8pm, six to seven days per week), verbal abuse by managers, intimidation, exclusion from team
              activities, and near- complete absence of HR support. Multiple reports confirmed these experiences were
              not isolated. Zepto attributed the issues to third-party employment agencies rather than company policy,
              but CEO Palicha's previous dismissive public comments about work-life balance further fueled criticism.
              Separately, whistleblower posts alleged "massive fraud" and compared Zepto's trajectory to Byju's, raising
              reputational concerns ahead of the IPO. Talent competition with well-funded rivals (Blinkit/Zomato,
              Swiggy, Amazon, Flipkart) for engineering, data science, and operations talent is intense, and Zepto's
              work culture controversies may impair recruitment. The company laid off 800–900 employees in its
              cost-cutting drive, potentially creating institutional knowledge loss and morale impact among remaining
              staff.
            claimRefs:
              - CR032
              - CR033
              - CR034
              - CR035
              - CR036
              - CR037
      - number: '7.7'
        title: Risk Mitigation and Kill Criteria Assessment
        blocks:
          - type: paragraph
            body: >-
              Zepto has taken visible mitigation steps for several key risks, though the adequacy and sustainability of
              these measures remain uncertain. In response to the CCPA dark-pattern fine, Zepto overhauled its app to
              eliminate basket sneaking, drip pricing, and default pre-selections, and eliminated all platform fees
              (handling, surge, convenience charges) in late 2025. However, this zero-fee strategy is itself a risk, as
              it sacrifices a revenue stream in a market where the company is already burning approximately ₹500 crore
              monthly. For food safety, Zepto stated it began an internal review and is working with FDA authorities to
              resume Dharavi operations, but the company has not disclosed a comprehensive food safety audit or
              remediation plan across its full dark store network. The 75% reduction in annual cash burn through layoffs
              and spending cuts demonstrates financial discipline but may compromise growth velocity and operational
              quality. Kill criteria for investors should include: (1) failure to achieve EBITDA breakeven by H2 2027,
              (2) loss of more than 5 percentage points of market share to a single competitor within 12 months, (3)
              additional regulatory enforcement actions resulting in operational suspension of more than 10% of dark
              stores, (4) founder departure without a credible succession plan, and (5) IPO withdrawal or material delay
              beyond Q4 2026. The intersection of sustained losses, competitive intensity, regulatory scrutiny, and
              culture controversies creates a compounding risk profile where any single factor could trigger a negative
              cascade affecting fundraising, talent retention, and market position simultaneously.
            claimRefs:
              - CR038
              - CR039
              - CR040
              - CR041
              - CR042
      - number: '7.8'
        title: Technology and Cybersecurity Risks
        blocks:
          - type: paragraph
            body: >-
              Zepto's technology stack, while enabling its rapid scale, introduces concentration and cybersecurity risks
              that could disrupt operations. The company's core infrastructure is built on Amazon Web Services (AWS),
              including order management, real-time delivery tracking, inventory systems, machine learning demand
              prediction, and cold chain IoT monitoring. This single-provider dependency means an AWS regional outage
              could simultaneously affect order processing, temperature monitoring for perishables, delivery
              coordination, and customer-facing services across multiple cities. The DPDPA requires Zepto to implement
              reasonable cybersecurity measures for the millions of customer records it processes, including names,
              contact details, addresses, payment information, and order histories. Data breach notification obligations
              and potential ₹250 crore penalties create material financial exposure. Zepto's rapid expansion to 1,100+
              dark stores with IoT-connected cold chain systems increases the attack surface for cyber intrusions. The
              company must manage API security across its consumer app, delivery partner app, warehouse management
              systems, and advertising platform. Additionally, the device-based dynamic pricing controversy (identical
              products priced differently on iPhone vs Android) revealed that Zepto's pricing algorithms could be
              exploited or perceived as discriminatory, creating both technical and reputational risk. The lack of
              disclosed cybersecurity audit results, penetration testing frequency, or data protection officer
              appointment status limits independent assessment of Zepto's cyber resilience posture.
            claimRefs:
              - CR043
              - CR044
              - CR045
              - CR046
