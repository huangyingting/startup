          - type: callout
            title: Losses Growing Faster Than Revenue
            body: >-
              Net losses widened 177% in FY25 versus 129% revenue growth. Losses now represent 35% of turnover, up from
              29% in FY24. The gap between store-level and company-level profitability remains the key financial risk.
