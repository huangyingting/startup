  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: standard
    summary: >-
      End-to-end Zepto customer journey from app discovery through repeat purchase, illustrating key touchpoints and
      friction points across five stages.
    data:
      items:
        - label: App Discovery
          detail: User discovers Zepto via app store, referral, or social media ads. 100M+ Google Play installs.
          phase: Awareness
        - label: First Order
          detail: >-
            Browse personalized feed, select items from 45K+ SKUs, checkout with UPI/card. Average first-order AOV
            ₹350–400.
          phase: Acquisition
        - label: Delivery Experience
          detail: >-
            10-minute delivery promise with live GPS tracking. Picker app guides warehouse staff for sub-2-min pack
            times.
          phase: Activation
        - label: Post-Delivery Rating
          detail: >-
            User rates delivery and product quality. App store ratings 4.7/5. Common complaints include missing items
            and product quality.
          phase: Activation
        - label: Zepto Pass Enrollment
          detail: ₹99/month subscription for free delivery and exclusive pricing. 5M+ subscribers. 40% first-month churn.
          phase: Retention
        - label: Repeat Ordering
          detail: >-
            Pass members order 3x more frequently. Power users place up to 16 orders/day. Multi-category basket
            expansion.
          phase: Retention
        - label: Category Expansion
          detail: User adopts Zepto Cafe (food), electronics, personal care. Cross-sell from grocery to adjacent categories.
          phase: Expansion
        - label: Referral & Advocacy
          detail: User shares referral codes. Social proof via 34.6B app opens in 2025. Brand loyalty deepens or churn occurs.
          phase: Advocacy
    approximationNotes: >-
      Journey stages are generalized from Zepto's publicly described user flows, app features, and reported behavioral
      metrics. Individual journeys vary significantly.
    claimRefs:
      - CU006
      - CU014
      - CU020
      - CU022
