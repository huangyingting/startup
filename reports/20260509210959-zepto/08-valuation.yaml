chapter:
  number: 8
  title: Valuation
  summary: >-
    Zepto's valuation trajectory has been marked by rapid escalation from $1.4 billion in August 2023 to $7 billion by
    October 2025, driven by 149% revenue growth to ₹11,110 crore in FY25, aggressive dark store expansion to 1,100+
    locations, and growing investor conviction in India's quick-commerce market. The company received SEBI approval for
    its IPO on May 8, 2026, targeting a raise of ₹11,000–12,000 crore at a valuation of $5.6–7 billion after SEBI
    scrutiny prompted a 15–20% markdown from the initial $7–8 billion target. Comparable analysis against public
    peers—Blinkit (valued at $13 billion by Goldman Sachs), Swiggy ($8.7 billion market cap), DoorDash (4.9–6.7x
    revenue), Instacart (2–3x revenue), Grab (4–4.5x revenue), and Gopuff ($8.5 billion private)—positions Zepto at
    approximately 4.3–5.4x FY25 revenue, a modest premium to mature delivery peers but a discount to high-growth Indian
    comparables. Bull case scenarios project $10–12 billion by FY28 if Zepto achieves EBITDA break-even and sustains
    50%+ revenue growth, while the bear case suggests $3–4 billion if losses persist and market share erodes to Blinkit
    and Amazon Tez. Key thesis-break triggers include failure to reach EBITDA break-even by FY28, market share declining
    below 20%, IPO delay beyond Q4 2026, and cash reserves falling below ₹3,000 crore. Our base-case recommendation is
    Cautious Proceed at a $5.5–6.5 billion entry valuation range, contingent on demonstrated margin improvement in FY26
    interim results and successful IPO execution.
sections:
  - id: valuation-trajectory
    title: Valuation Trajectory and Funding History
    body: >-
      Zepto's valuation has undergone a remarkable five-fold increase in just over two years, reflecting both the
      company's hyper-growth and investor enthusiasm for India's quick-commerce opportunity. The company was valued at
      $1.4 billion in August 2023 following a Series F round, then jumped to $3.6 billion in June 2024 during a $665
      million raise that attracted marquee investors including StepStone Group, Motilal Oswal, and Nexus Venture
      Partners. By August 2024, the valuation reached $5 billion, and the most recent funding round in October 2025—a
      $450 million raise led by CalPERS, Dragon Fund, and Lightspeed Venture Partners—set the private market valuation
      at $7 billion. Total capital raised exceeds $2.3 billion, with approximately $900 million in cash reserves as of
      early 2026. However, SEBI's scrutiny of Zepto's confidential DRHP filing in December 2025 triggered investor
      pushback, resulting in a 15–20% valuation cut to $5.6–5.95 billion for the IPO target. The company plans to refile
      an updated DRHP by end of April 2026 with revised financial projections. At the adjusted $5.6–6 billion valuation,
      Zepto trades at approximately 4.3–4.6x FY25 revenue of ₹11,110 crore (~$1.3 billion), which aligns more closely
      with mature delivery platform multiples than with high-growth Indian tech valuations.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
    tableRefs:
      - TV001
    figureRefs:
      - FV004
  - id: comparable-analysis
    title: Comparable Company Valuation Analysis
    body: >-
      A comprehensive comparable analysis positions Zepto against both Indian and global quick-commerce and delivery
      platforms. In India, Blinkit—the quick-commerce arm of Zomato (now Eternal)—commands the highest valuation at
      approximately $13 billion according to Goldman Sachs' sum-of-the-parts analysis, representing a 6x increase from
      $2 billion in March 2023. Zomato's total market capitalization stands at approximately $20 billion, with Blinkit
      now accounting for the largest share. Swiggy, which went public in 2024, trades at a market cap of approximately
      ₹72,662 crore (~$8.7 billion), with its Instamart quick-commerce segment reporting GOV of ₹7,881 crore in Q4 FY26,
      growing 68.8% year-on-year. Among global peers, DoorDash trades at a market cap of $67–75 billion on FY25 revenue
      of $13.7 billion, implying a 4.9–6.7x revenue multiple. Instacart (Maplebear) has a market cap of $7–9 billion on
      estimated revenue of $3.1–3.5 billion, yielding a 2–3x multiple. Grab Holdings commands $13–15 billion on FY25
      revenue of $3.37 billion (4–4.5x). Gopuff, the closest US dark-store comparable, raised at $8.5 billion in
      November 2025, down from its $15 billion peak. Zepto's $5.6–7 billion valuation range on ~$1.3 billion revenue
      implies 4.3–5.4x, placing it above Instacart and below DoorDash and Blinkit. The growth-adjusted premium is
      partially justified by Zepto's 149% revenue growth versus peers' 20–50% growth rates, but the significant net
      losses create a profitability discount relative to DoorDash and Blinkit, both of which have achieved or are
      approaching EBITDA profitability.
    claimRefs:
      - CV007
