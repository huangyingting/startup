  - id: thesis-antithesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      The investment thesis rests on four pillars. First, Zepto operates in India's fastest-growing consumer
      sector—quick commerce is projected to reach $57 billion by 2030 at approximately 40% CAGR, driven by rising
      smartphone penetration, urbanization, and growing middle-class demand for convenience. Second, Zepto has
      demonstrated exceptional execution with 149% revenue growth in FY25 and expansion to 1,100+ dark stores across
      major Indian cities, establishing a credible #2 position behind Blinkit. Third, the company has $900 million in
      cash reserves and institutional backing from CalPERS, Lightspeed, and StepStone, providing 5–6 quarters of runway
      at current burn rates. Fourth, the IPO provides a liquidity event and capital infusion that could fund expansion
      to 2,000+ dark stores and accelerate the path to profitability. The anti-thesis presents equally compelling
      counterarguments. First, net losses tripled to ₹3,367 crore in FY25 with loss-to-revenue ratios of approximately
      30%, and EBITDA profitability remains at best 12–15 months away. Second, Blinkit holds 44–50% market share with
      2,000+ dark stores and the backing of Zomato's profitable food delivery business, creating a well-capitalized
      competitor that Zepto may struggle to displace. Third, Amazon Tez and Flipkart Minutes are entering with deep
      capital reserves, threatening to intensify price wars and compress margins further. Fourth, unit economics remain
      negative at the contribution margin level, raising fundamental questions about whether 10-minute delivery can be
      profitable at scale in India's price-sensitive market.
    claimRefs:
      - CV025
      - CV026
      - CV027
      - CV028
      - CV029
      - CV030
      - CV031
    tableRefs:
      - TV002
  - id: thesis-breaks-kills
    title: Thesis-Break Triggers and Kill Criteria
    body: >-
      Five thesis-break triggers would materially alter the investment case. First, failure to achieve EBITDA break-even
      by FY28 would signal structural unprofitability in the 10-minute delivery model and likely trigger a valuation
      de-rating to 2–3x revenue. Second, market share declining below 20% from the current estimated 28–30% would
      indicate competitive displacement by Blinkit, Swiggy Instamart, or new entrants, undermining the growth thesis.
      Third, cash reserves falling below ₹3,000 crore without a clear path to profitability would create existential
      funding risk, particularly if public market sentiment sours on loss-making tech. Fourth, IPO delay beyond Q4 2026
      would signal regulatory or market concerns and could force Zepto to raise additional private capital at a
      potential down-round valuation. Fifth, monthly cash burn exceeding ₹400 crore would indicate deteriorating unit
      economics and accelerate the runway countdown. Kill criteria—absolute conditions for exiting or declining the
      investment—include any material fraud or financial misstatement discovered during IPO diligence, founder departure
      or governance crisis, regulatory action that forces operational shutdown of dark store networks, or a sustained
      market share decline below 15%. The current status of each trigger shows manageable but elevated risk, with the
      EBITDA timeline and competitive dynamics representing the most closely watched metrics.
    claimRefs:
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
    tableRefs:
      - TV005
  - id: recommendation
    title: Recommendation and Final Diligence
    body: >-
      Our base-case recommendation is Cautious Proceed at a $5.5–6.5 billion entry valuation, representing 4.2–5.0x FY25
      revenue. This recommendation reflects a balanced assessment of Zepto's exceptional growth trajectory, large
      addressable market, and institutional backing against the significant risks of sustained losses, intense
      competition, and uncertain path to profitability. The recommended entry valuation represents a 7–21% discount to
      the last private round ($7 billion) and aligns with the SEBI-adjusted IPO target of $5.6–5.95 billion. Investors
      should condition participation on several pre-investment diligence items: review of FY26 Q1/Q2 interim financials
      demonstrating contribution margin improvement, detailed dark-store-level unit economics showing a path to
      store-level profitability, management presentation on the timeline and milestones for EBITDA break-even,
      competitive positioning data including market share trends and customer acquisition costs, and ESOP pool and
      dilution analysis from the final DRHP. Post-IPO monitoring should track quarterly contribution margins, dark store
      count and same-store revenue growth, market share relative to Blinkit, monthly cash burn trajectory, and customer
      retention metrics. The investment is suitable for portfolios with high risk tolerance, a 3–5 year investment
      horizon, and conviction in India's quick-commerce secular growth story.
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
    tableRefs:
      - TV006
    figureRefs:
      - FV001
