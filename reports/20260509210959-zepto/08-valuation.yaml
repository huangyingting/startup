  - id: ipo-valuation-dynamics
    title: IPO Valuation Dynamics and Market Context
    body: >-
      Zepto's IPO represents a critical inflection point for India's quick-commerce sector and for startup valuations in
      Indian public markets. SEBI approved the IPO on May 8, 2026, clearing the path for a Q3 2026 (July–September)
      listing. The planned raise of ₹11,000–12,000 crore (~$1.3–1.4 billion) combines a fresh issue for expansion and a
      limited Offer for Sale by early investors. Morgan Stanley, Goldman Sachs, HSBC, Axis Capital, JM Financial, IIFL
      Securities, and Motilal Oswal serve as IPO managers, reflecting strong institutional backing. The valuation
      trajectory from the private market $7 billion to the public market $5.6–5.95 billion represents a pre-IPO discount
      of 15–20%, driven by SEBI's scrutiny of disclosure standards and investor concerns about sustained losses. India's
      public market has shown mixed appetite for loss-making tech companies—Swiggy's post-IPO performance saw initial
      volatility before stabilizing, while Zomato's stock has appreciated significantly since its 2021 listing as
      Blinkit gained traction. The IPO window timing is favorable, with Indian markets at near-record highs and strong
      FII inflows into Indian tech. However, any deterioration in global risk sentiment or domestic market correction
      could compress the achievable valuation. The price band and lot size details are pending the updated DRHP filing.
    claimRefs:
      - CV015
      - CV016
      - CV017
      - CV018
      - CV019
  - id: bull-base-bear-scenarios
    title: Scenario Analysis and Return Projections
    body: >-
      Three valuation scenarios frame the investment outlook for Zepto through FY28. The bull case projects a $10–12
      billion valuation by FY28, predicated on Zepto achieving EBITDA break-even by FY27, sustaining 50%+ revenue growth
      through dark store expansion to 2,000+ locations, maintaining or gaining market share above 30%, and successfully
      executing the IPO at $6.5+ billion. This scenario implies a 1.5–2x return from a $6 billion entry point and
      assumes India's quick-commerce market reaches $25–30 billion by FY28. The base case targets $6.5–8 billion by
      FY28, assuming revenue growth decelerates to 40–50%, contribution margin turns positive by FY27, but EBITDA
      break-even extends to FY28. Market share stabilizes at 25–28% as Blinkit and Swiggy Instamart maintain competitive
      pressure. This scenario implies a 1–1.3x return from a $6 billion entry. The bear case suggests $3–4 billion if
      losses persist beyond FY28, market share declines below 20% as Amazon Tez and Flipkart Minutes gain traction, the
      IPO raises less than targeted, and competitive price wars compress contribution margins. This scenario implies a
      0.5–0.7x return, representing capital destruction. Key swing factors include the pace of profitability
      improvement, competitive intensity from Blinkit's 2,000+ dark store advantage, regulatory developments under
      India's new Labour Codes, and macroeconomic conditions affecting consumer spending.
    claimRefs:
      - CV020
      - CV021
      - CV022
      - CV023
      - CV024
