      - TE005
  - id: adverse-tech-concerns
    title: Adverse Technology and Product Concerns
    body: >
      Several adverse technology and product risks warrant attention in Zepto's diligence. First, AWS single-vendor
      dependency represents a material infrastructure risk: the entire stack—EKS, DynamoDB, Aurora, S3—runs on AWS,
      creating concentration risk and potential cost exposure as Zepto scales. Cloud infrastructure costs typically
      represent 5–10% of revenue for high-volume e-commerce platforms, and AWS pricing power could compress margins.
      Second, the CCPA dark-patterns fine, while small in monetary terms (₹7 lakh), signals systemic product design
      issues—the practices were deliberate growth tactics, not bugs, raising questions about the product team's ethical
      decision-making framework. Third, the proprietary tech stack philosophy, while reducing third-party dependency,
      creates significant engineering overhead and talent risk: Zepto must recruit and retain specialized engineers
      across warehouse management, logistics optimization, adtech, and ML/AI—a broad surface area for a company of its
      size. Fourth, Zepto Atom's data analytics offering raises unresolved privacy questions about what consumer data is
      shared with brands, at what granularity, and under what anonymization standards—the DPDPA 2023 framework is still
      being operationalized and enforcement posture remains uncertain. Fifth, the rapid expansion into food preparation
      (Zepto Cafe) introduces food safety liability and regulatory complexity beyond grocery delivery, including FSSAI
      kitchen licensing, hygiene compliance, and cold-chain requirements for prepared food.
    claimRefs:
      - CE047
      - CE048
      - CE049
      - CE050
      - CE051
      - CE052
