  - id: customer-workflow
    title: Customer Workflow and Operating Flow
    body: >
      The Zepto customer journey follows a tightly optimized seven-step workflow designed to deliver orders within 10
      minutes of placement. Step one begins with the customer opening the app and browsing a personalized home feed
      curated by ML-driven recommendation algorithms that factor in purchase history, time of day, and local inventory
      availability. Step two is product selection and cart building, where the app displays real-time stock levels and
      suggests complementary items. Step three is checkout, which supports multiple payment methods including UPI
      (dominant in India), credit/debit cards, wallets, and cash on delivery, with Zepto Pass members receiving instant
      discounts. Step four triggers order routing, where the platform's algorithms assign the order to the optimal dark
      store based on proximity, current load, and real-time inventory. Step five is the picking process: the WMS
      generates an optimized pick list and assigns it to a picker's handheld device, guiding them through the most
      efficient path. Barcode scanning at each pick point ensures accuracy. Step six is dispatch, where the completed
      order is handed to an algorithmically assigned delivery rider—the dispatch engine considers rider proximity,
      vehicle type, current deliveries, and predicted traffic conditions. Step seven is last-mile delivery with
      real-time GPS tracking visible to the customer. The entire workflow from order placement to delivery averages 8–12
      minutes, with the company reporting a fastest-ever delivery of 48 seconds. Users opened the Zepto app over 34.6
      billion times in 2025, with power users placing up to 16 orders per day.
    claimRefs:
      - CE017
