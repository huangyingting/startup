  - id: technology-architecture
    title: Technology and Operating Architecture
    body: >
      Zepto's technology architecture underwent a significant transformation from a monolithic application ("Zepto
      Storefront") to a distributed microservices architecture between 2022 and 2024. The current stack runs entirely on
      AWS, with Amazon Elastic Kubernetes Service (EKS) providing container orchestration for independently deployable
      microservices covering order management, inventory, payments, delivery logistics, and user services. Amazon
      DynamoDB serves as the primary NoSQL database for high-throughput, low-latency order processing—the engineering
      team published a detailed case study on the AWS blog describing how DynamoDB enables scaling to millions of daily
      orders. Amazon Aurora PostgreSQL handles transactional and relational workloads including financial reconciliation
      and user account management. Change Data Capture using Debezium propagates state changes across services, enabling
      event-driven architectures for analytics and notification pipelines. The front-end uses config-driven micro
      frontends, allowing independent deployment of UI components across mobile and web surfaces. The Control
      Tower—Zepto's internal operations dashboard—provides centralized visibility into dark store performance, rider
      utilization, and order funnel metrics. Internal tooling follows a "build-not-buy" philosophy; the CTO stated in a
      November 2025 YourStory interview that owning the entire tech stack is Zepto's "biggest moat," eliminating
      dependency on third-party SaaS platforms that could become single points of failure. The AI/ML infrastructure
      powers demand forecasting models (using techniques such as gradient boosting and LSTM networks), route
      optimization algorithms solving variants of the Vehicle Routing Problem, and personalized recommendation engines.
      Real-time observability is maintained through integrated monitoring, distributed tracing, and centralized logging.
    claimRefs:
      - CE010
      - CE011
