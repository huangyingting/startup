company:
  name: Zepto
chapter:
  number: 5
  title: Product & Technology
  summary: >
    Zepto's product and technology infrastructure powers India's fastest-growing quick-commerce platform, enabling
    10-minute grocery delivery across 900+ dark stores in 30+ cities. The tech stack has evolved from a monolithic
    application to a cloud-native microservices architecture on AWS, using Amazon EKS for orchestration, DynamoDB for
    high-throughput order processing, and Aurora PostgreSQL for transactional data. Core product modules include the
    consumer app (iOS/Android), a proprietary warehouse management system with picker-app-guided fulfillment, AI-driven
    demand forecasting and route optimization engines, and an adtech platform (Zepto Advertising) generating ~₹1,000 Cr
    annualized revenue. The 2024–2025 roadmap saw rapid product expansion: Zepto Cafe (food delivery hitting 100K+ daily
    orders), Zepto Atom (a real-time brand analytics SaaS product), private label brands like Relish, and the Bloom
    farmer-sourcing initiative. The platform handles millions of daily orders with sub-2-minute average picking times.
    However, the company faces regulatory scrutiny after CCPA fined it ₹7 lakh for dark-pattern UI practices, and its
    proprietary tech stack creates single-vendor lock-in risk with AWS. Technology differentiation remains a core moat
    claim, but the stack's maturity varies across modules—core order-delivery is battle-tested while newer verticals
    like Cafe and Atom are early-stage.
sections:
  - id: core-product-modules
    title: Core Product Modules and Asset Matrix
    body: >
      Zepto's product portfolio spans six primary modules that collectively enable its 10-minute delivery promise. The
      consumer-facing mobile app (iOS and Android) serves as the primary ordering interface, featuring real-time
      inventory visibility, personalized product recommendations powered by collaborative filtering algorithms, and live
      order tracking with sub-second GPS updates. The app reached world's second most-downloaded status in the Food &
      Drink category globally in 2024, with over 100 million installs on Google Play. Monthly active users surpassed
      Blinkit in Q4 2024, establishing Zepto as India's most-used quick-commerce app by engagement. The Warehouse
      Management System (WMS) is a fully proprietary platform built in-house after a critical third-party vendor outage
      in late 2021 convinced the engineering team to own the entire stack. The WMS manages real-time inventory across
      45,000–50,000 SKUs per dark store, automated replenishment triggers, expiry tracking, and bin-level location
      mapping. The picker app—a companion to the WMS—guides warehouse staff through optimized pick paths using location
      codes and QR-based scan verification, achieving sub-2-minute average pick-and-pack times. Zepto Advertising, the
      company's adtech module, offers sponsored listings, banner placements, and search-result promotion to FMCG and D2C
      brands, generating approximately ₹1,000 Cr in annualized advertising revenue as of early 2025. Zepto Pass (now
      transitioning to Zepto Daily) provides a subscription loyalty program at approximately ₹99/month, delivering free
      delivery and exclusive pricing to 4 million+ subscribers. The Zepto Cafe module, launched in late 2024, operates
      mini-kitchens inside dark stores for 10-minute food and beverage delivery, with a standalone app launched in early
      2025.
    claimRefs:
