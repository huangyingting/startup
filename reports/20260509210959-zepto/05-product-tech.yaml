      - TE004
  - id: roadmap-and-development
    title: Product Roadmap and Development Pipeline
    body: >
      Zepto's 2025–2026 product roadmap reflects an aggressive expansion strategy across multiple verticals. Zepto Cafe,
      which hit 100,000+ daily orders and a $100M run rate by early 2025, targets 300,000 daily orders and ₹1,000 Cr
      annual revenue by 2026, with 100+ new cafe outlets opening monthly. The standalone Zepto Cafe app, launched in
      early 2025, enables independent feature development and targeted food/beverage UX optimization. Zepto Atom,
      launched May 2025, is in its initial growth phase with a roadmap including AI-generated customer personas,
      automated survey tools, and cohort-specific analytics modules planned over the next 12 months. The Zepto Daily
      subscription program, replacing Zepto Pass, launched as an invite-only pilot at ₹1 entry price to drive broader
      adoption and increase subscriber base beyond the current 4M+ users. Category expansion continues into non-grocery
      segments including electronics, fashion, and personal care, aiming to increase average order value above the ₹750
      threshold analysts identify as necessary for sustainable unit economics. The engineering organization is investing
      in further automation of dark-store operations, including exploration of conveyors, shelf robots, and
      voice-directed picking to reduce labor costs and improve picking speed. Infrastructure scaling priorities focus on
      supporting the anticipated order volume increases from IPO-driven brand awareness and continued city expansion
      into Tier 2 and Tier 3 markets, where the tech stack must adapt to lower population density and different demand
      patterns.
    claimRefs:
      - CE041
      - CE042
      - CE043
      - CE044
      - CE045
      - CE046
