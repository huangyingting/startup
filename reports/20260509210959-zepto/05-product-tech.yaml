  - id: data-analytics-platform
    title: Data Analytics and Advertising Technology
    body: >
      Zepto has evolved beyond a delivery platform into a data-driven advertising and analytics business. Zepto
      Advertising, the in-app advertising platform, enables brands to purchase sponsored product placements,
      search-result promotions, and banner advertisements within the consumer app. The platform reached approximately
      ₹1,000 Cr in annualized advertising revenue by early 2025, making it one of the fastest-growing retail media
      networks in India. In May 2025, Zepto launched Zepto Atom, a subscription-based data analytics SaaS product for
      consumer brands. Atom provides minute-level, PIN-code-granular sales data, competitive benchmarking, full-funnel
      customer journey analytics (from impression to purchase), and retention/repeat-purchase metrics. Its standout
      feature is Zepto GPT, a natural-language AI query interface that allows brand managers to ask questions like
      "Where did protein bar sales spike last week in Bengaluru?" and receive instant analytical responses. The platform
      is strategically positioned to disrupt India's ₹1,000 Cr consumer analytics industry historically dominated by
      Nielsen and Kantar, by offering real-time hyperlocal data that traditional survey-based analytics cannot match.
      Upcoming Atom features include AI-generated customer personas and automated survey tools for customer segments.
      The advertising and data businesses represent high-margin revenue streams—advertising typically operates at 80%+
      gross margins—that materially improve Zepto's blended unit economics and reduce dependence on thin-margin grocery
      commissions.
    claimRefs:
      - CE023
      - CE024
      - CE025
      - CE026
      - CE027
      - CE028
  - id: supply-chain-innovation
    title: Supply Chain and Sourcing Technology
    body: >
      Zepto's supply chain technology extends beyond last-mile delivery into upstream sourcing and procurement. The
      Bloom initiative, launched to build a farmer-to-urban supply chain for fresh produce, connects directly with
      farmers and Farmer Producer Organizations (FPOs), bypassing traditional mandi intermediaries. Bloom integrates
      with Zepto's demand forecasting engine to communicate projected demand signals to farmers, reducing
      over-production waste and enabling just-in-time procurement. Payments to farmers are processed within 24 hours, a
      significant improvement over the typical 7–15 day payment cycles in traditional agricultural supply chains.
      Private label strategy represents another supply-chain technology lever: Zepto's in-house brands (including
      "Relish" for meat and seafood) target 15%+ penetration of total GMV, with private labels offering 40–60% gross
      margins compared to 10–18% on third-party products. The algorithmic placement of private labels on digital
      shelves—where they occupy top search results and featured positions—is managed by the same recommendation and
      search-ranking systems that power the consumer experience. Inventory management across 900+ dark stores uses
      AI-driven demand forecasting that incorporates historical sales patterns, weather data, local events, and
      real-time consumption velocity to optimize stock levels at each location. Automated replenishment alerts trigger
      procurement orders when inventory crosses minimum thresholds, while expiry tracking systems prevent sale of
      near-expiry products and minimize shrinkage.
    claimRefs:
      - CE029
      - CE030
      - CE031
      - CE032
      - CE033
      - CE034
  - id: trust-quality-compliance
    title: Trust, Quality, and Regulatory Compliance
    body: >
      Zepto's product quality and compliance posture has faced significant scrutiny. In December 2025, the Central
      Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh for deploying dark patterns in its app—specifically drip
      pricing (showing mandatory charges only at final checkout) and basket sneaking (auto-selecting paid add-ons like
      Zepto Pass without explicit user consent). The penalty followed hundreds of consumer complaints and triggered a
      comprehensive app overhaul. Zepto CEO Aadit Palicha publicly acknowledged the practices, stating they "won't
      happen again," and the company redesigned its checkout flow to display all charges upfront and eliminate
      pre-selected options. The dark-patterns enforcement was part of a broader government crackdown: 11 companies
      including Amazon, Blinkit, and Swiggy received notices under CCPA's Guidelines for Prevention and Regulation of
      Dark Patterns (2023). On food safety, FSSAI has stepped up scrutiny of quick-commerce platforms over product
      shelf-life concerns, particularly for perishable goods stored in dark stores. Zepto's WMS includes expiry-date
      tracking and automated delisting of near-expiry products. Data privacy compliance is governed by India's Digital
      Personal Data Protection Act (DPDPA) 2023, with Zepto's data practices around location tracking, purchase history
      analytics, and targeted advertising requiring ongoing compliance monitoring. The Zepto Atom analytics product,
      which provides granular consumer behavior data to brands, raises additional privacy considerations around data
      aggregation and anonymization standards that are not yet publicly disclosed.
    claimRefs:
      - CE035
      - CE036
      - CE037
      - CE038
      - CE039
      - CE040
