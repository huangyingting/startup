callouts:
  - calloutType: strength
    title: "Exceptional Growth Velocity"
    body: "Zepto achieved a 5x valuation increase from $1.4B to $7B in just two years, with FY25 revenue growing 150% YoY to ~$1.3B. The company pioneered 10-minute delivery in India and forced incumbents like Blinkit and Swiggy to follow suit."
    claimRefs: [CO025, CO026, CO035]

  - calloutType: strength
    title: "Institutional Capital Validation"
    body: "The October 2025 round led by CalPERS (a major US pension fund) signals institutional confidence in Zepto's business model and IPO trajectory. The company maintains $900M in cash reserves."
    claimRefs: [CO024, CO032]

  - calloutType: risk
    title: "Governance and Regulatory Issues"
    body: "Dark pattern allegations, CCPA fines, FDA license suspensions, and toxic work culture reports highlight governance gaps in a rapidly scaling organization. These issues are material as Zepto approaches its IPO."
    claimRefs: [CO044, CO045, CO046, CO047, CO048, CO049]

  - calloutType: risk
    title: "Sustained Losses Despite Revenue Growth"
    body: "Net losses widened to ₹3,367 crore in FY25 despite 150% revenue growth, indicating that aggressive expansion is outpacing profitability improvements. Path to aggregate profitability remains uncertain."
    claimRefs: [CO027, CO028]

  - calloutType: insight
    title: "Founder-Led Execution with Key-Person Risk"
    body: "Both founders (ages 24–25) maintain significant operational control. While their execution speed is a strength, high key-person dependency on two very young leaders is a risk factor for institutional investors."
    claimRefs: [CO009, CO010, CO011]

  - calloutType: assumption
    title: "Revenue Discrepancy Unresolved"
    body: "FY25 revenue is reported as ₹11,110 Cr by some sources and ₹9,669 Cr by others. The difference may reflect different reporting standards or time windows. The DRHP, once public, should resolve this."
    claimRefs: [CO025, CO052]

