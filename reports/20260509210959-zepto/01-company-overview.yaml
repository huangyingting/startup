company:
  name: Zepto

chapter:
  number: 1
  title: "Company Overview"
  summary: "Zepto is an Indian quick-commerce startup founded in 2021 by Stanford dropouts Aadit Palicha and Kaivalya Vohra, delivering groceries in 10 minutes via dark stores. The company reached a $7B valuation in October 2025 after raising $450M led by CalPERS, and filed for a SEBI-approved IPO in 2026."

sections:
  - id: identity-and-business-model
    title: "Identity and Business Model"
    body: |
      Zepto is a quick-commerce platform headquartered in Mumbai, India, operating under the legal entity Kiranakart Technologies Private Limited. Founded in 2021, the company pioneered 10-minute grocery delivery in India through a network of dark stores—small, densely located micro-warehouses optimized for rapid order fulfillment. Zepto's product offering spans groceries, fresh produce, personal care, household essentials, and electronics, with approximately 45,000–50,000 SKUs per store. The platform has expanded into adjacent verticals including Zepto Cafe (ready-to-eat food and beverages) and Zepto Advertising (an adtech monetization layer for brands). Zepto initially incorporated in Singapore but shifted its domicile to India in January 2025 ahead of its planned domestic IPO. The company operates in 70+ cities across India with approximately 900 dark stores as of late 2025, processing around 1.7 million orders per day. Its business model combines delivery fees, commissions on product sales, advertising revenue, and subscription income from Zepto Pass, a loyalty membership program with over 4 million subscribers as of mid-2024.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008]

  - id: founders-and-leadership
    title: "Founders and Leadership"
    body: |
      Zepto was co-founded by Aadit Palicha (CEO) and Kaivalya Vohra (CTO), both of whom dropped out of Stanford University at age 19 to build the company. Palicha, born in 2001, became one of India's youngest billionaires by valuation, and is known for his aggressive execution style and public-facing leadership. Vohra leads the technology and engineering function, overseeing the platform's logistics algorithms and delivery optimization systems. The leadership team includes Vikas Sharma as Chief Operating Officer responsible for dark store operations and supply chain, Ramesh Bafna as Chief Financial Officer overseeing financial discipline ahead of the IPO, Amritansu Nanda as Chief Marketing Officer driving brand strategy, Sneha Arora as Chief Human Resources Officer, and Panduranga Acharya as General Counsel. The founders maintain significant control over strategic decisions, creating moderate key-person dependency. Palicha has been publicly vocal about company strategy, including admitting to mistakes around dark patterns in pricing and committing to reforms.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015]

  - id: funding-history
    title: "Funding History and Valuation"
    body: |
      Zepto has raised over $2.3 billion across 15+ funding rounds since its founding. The company started with a Y Combinator-backed pre-seed round in January 2021 and rapidly scaled its fundraising. Key rounds include a $200M Series E in August 2023 at $1.4B valuation (led by StepStone Group and Goodwater Capital, establishing unicorn status), a $665M Series F in June 2024 at $3.6B valuation (led by Glade Brook Capital, Nexus Venture Partners, and General Catalyst), a $340M Series G in August 2024 at $5B valuation (led by General Catalyst, Mars Growth, and Epiq Capital), a $350M Series G extension in November 2024 at $5.22B valuation (led by Motilal Oswal), and the most recent $450M round in October 2025 at $7B valuation (led by CalPERS). The investor base spans prominent venture capital firms (General Catalyst, Lightspeed, Nexus Venture Partners), growth equity investors (StepStone, Glade Brook, Avenir), sovereign/pension capital (CalPERS), and Indian family offices (Taparia, Mankind Pharma). Following the October 2025 round, the company reported $900 million in cash reserves, providing a substantial runway for expansion and IPO preparation.
    claimRefs: [CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023, CO024]

  - id: cover-metrics
    title: "Cover Metrics and Scale"
    body: |
      Zepto's key performance metrics demonstrate rapid scale-up. Revenue in FY25 reached approximately ₹11,110 crore (~$1.3B), representing a 150% year-over-year increase from ₹4,454 crore in FY24. However, net losses widened to ₹3,367 crore in FY25, reflecting aggressive expansion spending on new dark stores and city launches. The company processes approximately 1.7 million orders daily across 70+ Indian cities. Its dark store network expanded from approximately 350 stores in mid-2024 to roughly 900 by late 2025. Zepto employs thousands of workers across operations, technology, and corporate functions, though the exact headcount is not publicly disclosed. GMV has surpassed $1 billion, and the company claims that approximately 75% of its dark stores are EBITDA-positive as of mid-2024, suggesting improving unit economics despite aggregate losses. The valuation trajectory from $1.4B in August 2023 to $7B in October 2025 represents a 5x increase in approximately two years.
    claimRefs: [CO025, CO026, CO027, CO028, CO029, CO030, CO031, CO032]

  - id: milestones-and-timeline
    title: "Milestones and Key Events"
    body: |
      Zepto's timeline reflects exceptional speed of execution since its 2021 founding. The company was initially launched as KiranaKart, connecting consumers to local kirana stores, before pivoting to a vertically integrated dark store model for direct control over inventory and delivery speed. Within six months of founding, Zepto reached a $225M valuation, and within 18 months it was valued at $900M. The August 2023 unicorn milestone at $1.4B made Zepto the first Indian startup unicorn of 2023. In 2024, Zepto raised over $1 billion across multiple rounds, more than tripling its valuation. The company shifted its domicile from Singapore to India in January 2025 to prepare for a domestic IPO. Zepto filed its Draft Red Herring Prospectus (DRHP) confidentially with SEBI on December 26, 2025, and received SEBI approval on May 8, 2026. The planned IPO targets ₹11,000–12,000 crore ($1.2–1.3B) at a $7–8B valuation, with listing expected between July and September 2026. On the adverse side, the company faced regulatory action in December 2025 when the CCPA fined Zepto ₹7 lakh for dark pattern practices, and in June 2025 the Maharashtra FDA suspended its license at a Mumbai warehouse for food safety violations.
    claimRefs: [CO033, CO034, CO035, CO036, CO037, CO038, CO039, CO040, CO041, CO042, CO043]

  - id: adverse-and-governance
    title: "Adverse Events and Governance"
    body: |
      Zepto has faced several controversies that bear on its governance maturity. In 2024–2025, the company was widely criticized for deploying dark patterns in its app—manipulative UI designs including drip pricing, basket sneaking, hidden handling fees, and auto-enrollment in paid memberships. The Central Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh in December 2025 and ordered corrective measures. CEO Aadit Palicha publicly acknowledged the dark patterns as a mistake and stated the company eliminated all hidden charges, handling fees, and surge pricing. Additionally, allegations of device-based differential pricing surfaced, with reports that iPhone users were charged more than Android users for the same products. In June 2025, the Maharashtra Food and Drug Administration (FDA) suspended Zepto's license at its Dharavi warehouse in Mumbai after discovering expired products and fungal growth on food items. The company also faced social media allegations of toxic work culture and long working hours. These incidents highlight governance gaps in a rapidly scaling organization and represent material reputational risk as the company approaches its IPO.
    claimRefs: [CO044, CO045, CO046, CO047, CO048, CO049, CO050, CO051]

