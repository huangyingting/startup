  name: Zepto
chapter:
  number: 7
  title: Risks
  summary: >-
    Zepto faces a multi-layered risk landscape spanning regulatory enforcement, operational execution, competitive
    dynamics, financial sustainability, and people/culture challenges as it prepares for a 2026 IPO. Regulatory risks
    include a ₹7 lakh CCPA fine for dark-pattern UI practices (basket sneaking, drip pricing), Maharashtra FDA
    suspension of its Dharavi warehouse license for food safety violations, FSSAI compliance obligations across 1,100+
    dark stores, DPDPA data protection requirements with potential fines up to ₹250 crore, and India's new Labour Codes
    mandating 1–2% turnover contribution to gig worker social security. Operationally, the company must manage cold
    chain integrity for perishables across a rapidly expanding dark store network, delivery rider safety in congested
    urban environments, and technology infrastructure concentration on AWS. Competitively, Blinkit holds 44–50% market
    share with Zomato's backing and 2,000+ dark stores versus Zepto's ~1,100, while Swiggy Instamart leverages food
    delivery cross-sell and Amazon/Flipkart are entering with deep capital reserves. Financially, net losses tripled to
    ₹3,367 crore in FY25, cash reserves of ₹7,000 crore are roughly half those of Zomato/Swiggy, and IPO valuation was
    cut 15–20% to $5.6–5.95 billion after SEBI scrutiny. People risks include key-person dependency on 23–25-year-old
    founders with limited corporate experience, viral toxic work culture allegations from contract workers, and
    Telangana gig workers' union accusations of exploitative delivery partner practices.
sections:
  - id: regulatory-legal-risks
    title: Regulatory and Legal Risks
    body: >-
      Zepto faces escalating regulatory risk across consumer protection, food safety, data privacy, and labor law
      domains. The Central Consumer Protection Authority (CCPA) fined Zepto ₹7 lakh in December 2025 for deploying
      dark-pattern UI practices including basket sneaking (auto-selecting Zepto Pass at checkout), drip pricing
      (revealing mandatory handling fees only at final checkout), and fake urgency timers. The CCPA ordered Zepto to
      redesign checkout flows, remove default pre-selections, and submit a compliance report within 15 days. The
      government subsequently issued notices to 11 firms including Zepto for ongoing dark-pattern violations, signaling
      sustained enforcement. Separately, Maharashtra's Food and Drug Administration (FDA) suspended Zepto's Dharavi
      warehouse license in June 2025 after inspections found fungal growth on food products, expired items stored
      alongside fresh goods, cold storage units failing temperature requirements, and products stored on dirty wet
      floors. The suspension was ordered under Section 32(3) of the Food Safety and Standards Act, 2006, with the
      facility barred from operating until full compliance and regulatory clearance. The FDA announced plans to inspect
      other quick-commerce facilities, creating sector-wide regulatory risk. India's Digital Personal Data Protection
      Act (DPDPA) 2023 imposes penalties up to ₹250 crore for data protection violations, requiring explicit consent
      collection, purpose limitation, breach notification, and user rights facilitation—all areas where Zepto's handling
      of millions of customer records creates compliance surface area. Additionally, SEBI's scrutiny of Zepto's
      confidential DRHP filing led to a 15–20% valuation cut from the initial $7–8 billion target to $5.6–5.95 billion,
      reflecting regulatory pressure on IPO disclosure standards.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
    tableRefs:
      - TR001
    figureRefs:
      - FR002
  - id: labor-workforce-risks
    title: Labor and Workforce Regulation Risks
    body: >-
      India's four new Labour Codes, which took effect on November 21, 2025, formally recognize gig and platform workers
      for the first time and impose mandatory social security obligations on aggregator platforms. Under the Code on
      Social Security, 2020, companies like Zepto must contribute 1–2% of their annual turnover (capped at 5% of all
      payouts to workers) into a dedicated Social Security Fund providing health benefits, maternity coverage, life and
      disability insurance, accident coverage, and pension equivalents. All gig workers must be registered via the
      e-Shram government portal with Aadhaar-linked Universal Account Numbers, and any accident during commute is now
      legally considered "in the course of employment," making workers eligible for ESIC benefits. For Zepto, which
      relies on tens of thousands of delivery partners classified as independent contractors, these regulations
      represent a material cost increase and operational complexity. The Telangana Gig and Platform Workers' Union
      formally accused Zepto of exploitative practices in May 2025, citing drastic per-delivery pay cuts, lack of
      minimum wage guarantees, unsafe working conditions, absence of ESI/PF/insurance, high-pressure delivery deadlines
      risking rider safety, arbitrary penalties, and denial of basic amenities. Zepto denied these claims but worker
      strikes and union complaints continued. The regulatory trajectory suggests increasing formalization of gig worker
      rights, which could compress margins for delivery-intensive business models and expose Zepto to retroactive
      compliance claims.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
  - id: operational-quality-risks
    title: Operational Quality and Safety Risks
    body: >-
      Zepto's rapid dark store expansion from 600 in mid-2024 to 1,100+ by early 2026 creates significant operational
      risk across food safety, cold chain management, and delivery execution. The Dharavi warehouse incident exposed
      systemic vulnerabilities: an ex-employee whistleblower publicly alleged that Zepto routinely dispatched expired
      food when fresh stock was unavailable, suggesting quality control failures may extend beyond a single facility.
      With 45,000–50,000 SKUs per dark store including perishable categories (dairy, meat, fresh produce), maintaining
      cold chain integrity across 1,100+ locations requires consistent temperature monitoring, proper segregation of
      expired and fresh stock, and adherence to FSSAI standards— a challenge that scales non-linearly with network size.
      Dark store leases, typically 12–36 months, expose Zepto to rent volatility in premium urban locations (Mumbai,
      Bangalore, Delhi NCR), landlord non-renewal risk, and sunk fit-out costs if leases terminate prematurely. Urban
      zoning laws remain ambiguous for dark stores, with neighborhood opposition and municipal restrictions possible in
      residential areas. Delivery rider safety represents another operational risk: riders navigating congested urban
      traffic under 10-minute delivery pressure face accident risk, and any high-profile incident could trigger
      regulatory backlash and reputational damage. Zepto's technology infrastructure is concentrated on AWS, creating
      single-provider dependency for order management, inventory tracking, cold chain IoT monitoring, and real-time
      delivery coordination. An AWS regional outage could disrupt operations across multiple cities simultaneously.
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
