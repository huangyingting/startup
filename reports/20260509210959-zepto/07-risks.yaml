  - id: competitive-market-risks
    title: Competitive and Market Risks
    body: >-
      Zepto operates in India's hypercompetitive quick-commerce market where it holds approximately 29–30% market share,
      trailing Blinkit's dominant 44–50% position. Blinkit, as a subsidiary of publicly listed Zomato (now Eternal),
      benefits from a parent company with ₹17,000–18,000 crore in cash reserves, 2,000+ dark stores (nearly double
      Zepto's network), and achieved EBITDA positivity in Q4 FY25. Swiggy Instamart holds 23–25% share and leverages
      cross-sell from Swiggy's massive food delivery user base, reducing customer acquisition costs. Amazon Tez and
      Flipkart Minutes represent emerging threats, backed by virtually unlimited capital, existing logistics
      infrastructure, and large established user bases. The competitive intensity has triggered a destructive price war:
      Zepto eliminated all platform fees (handling, surge, convenience charges) and dropped minimum order value for free
      delivery to ₹99 in late 2025, directly pressuring unit economics. Industry analysts estimate Zepto's monthly cash
      burn at approximately ₹500 crore during aggressive expansion phases. SKU overlap across platforms exceeds 58%,
      limiting differentiation opportunities and compressing margins. The Indian quick-commerce market is projected to
      grow at ~40% CAGR through 2030, reaching $35 billion, but this growth attracts additional entrants and intensifies
      competition for dark store locations, delivery riders, and customer attention. Traditional retailers have urged
      regulatory investigation of predatory pricing by quick-commerce platforms, which could constrain promotional
      strategies.
    claimRefs:
      - CR019
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
