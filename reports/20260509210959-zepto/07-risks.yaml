  - id: risk-mitigation-assessment
    title: Risk Mitigation and Kill Criteria Assessment
    body: >-
      Zepto has taken visible mitigation steps for several key risks, though the adequacy and sustainability of these
      measures remain uncertain. In response to the CCPA dark-pattern fine, Zepto overhauled its app to eliminate basket
      sneaking, drip pricing, and default pre-selections, and eliminated all platform fees (handling, surge, convenience
      charges) in late 2025. However, this zero-fee strategy is itself a risk, as it sacrifices a revenue stream in a
      market where the company is already burning approximately ₹500 crore monthly. For food safety, Zepto stated it
      began an internal review and is working with FDA authorities to resume Dharavi operations, but the company has not
      disclosed a comprehensive food safety audit or remediation plan across its full dark store network. The 75%
      reduction in annual cash burn through layoffs and spending cuts demonstrates financial discipline but may
      compromise growth velocity and operational quality. Kill criteria for investors should include: (1) failure to
      achieve EBITDA breakeven by H2 2027, (2) loss of more than 5 percentage points of market share to a single
      competitor within 12 months, (3) additional regulatory enforcement actions resulting in operational suspension of
      more than 10% of dark stores, (4) founder departure without a credible succession plan, and (5) IPO withdrawal or
      material delay beyond Q4 2026. The intersection of sustained losses, competitive intensity, regulatory scrutiny,
      and culture controversies creates a compounding risk profile where any single factor could trigger a negative
      cascade affecting fundraising, talent retention, and market position simultaneously.
    claimRefs:
      - CR038
      - CR039
      - CR040
      - CR041
      - CR042
    tableRefs:
      - TR005
  - id: technology-cybersecurity-risks
    title: Technology and Cybersecurity Risks
    body: >-
      Zepto's technology stack, while enabling its rapid scale, introduces concentration and cybersecurity risks that
      could disrupt operations. The company's core infrastructure is built on Amazon Web Services (AWS), including order
      management, real-time delivery tracking, inventory systems, machine learning demand prediction, and cold chain IoT
      monitoring. This single-provider dependency means an AWS regional outage could simultaneously affect order
      processing, temperature monitoring for perishables, delivery coordination, and customer-facing services across
      multiple cities. The DPDPA requires Zepto to implement reasonable cybersecurity measures for the millions of
      customer records it processes, including names, contact details, addresses, payment information, and order
      histories. Data breach notification obligations and potential ₹250 crore penalties create material financial
      exposure. Zepto's rapid expansion to 1,100+ dark stores with IoT-connected cold chain systems increases the attack
      surface for cyber intrusions. The company must manage API security across its consumer app, delivery partner app,
      warehouse management systems, and advertising platform. Additionally, the device-based dynamic pricing controversy
      (identical products priced differently on iPhone vs Android) revealed that Zepto's pricing algorithms could be
      exploited or perceived as discriminatory, creating both technical and reputational risk. The lack of disclosed
      cybersecurity audit results, penetration testing frequency, or data protection officer appointment status limits
      independent assessment of Zepto's cyber resilience posture.
    claimRefs:
      - CR043
      - CR044
      - CR045
      - CR046
