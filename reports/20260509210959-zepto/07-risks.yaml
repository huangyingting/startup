  - id: financial-sustainability-risks
    title: Financial Sustainability and IPO Risks
    body: >-
      Zepto's financial profile presents significant sustainability concerns ahead of its planned 2026 IPO. Net losses
      nearly tripled to ₹3,367 crore in FY25 from ₹1,214 crore in FY24, even as revenue surged 129% to ₹9,669 crore. The
      company's cash reserves of approximately ₹7,000 crore are roughly half those of Zomato (₹17,000–18,000 crore) and
      Swiggy (similar range), creating a relative funding disadvantage in a capital-intensive market. Zepto reportedly
      cut annual cash burn by approximately 75% by late 2025 through layoffs (800–900 roles), reduced customer
      acquisition spend, and slowed dark store expansion and niche project investment (Zepto Cafe). The company's IPO
      aims to raise approximately ₹11,000 crore ($1.3 billion), with most proceeds allocated to network expansion and
      financial cushion rather than existing investor exits. However, SEBI scrutiny led to a 15–20% valuation cut from
      the initial $7–8 billion target, reflecting investor skepticism about the path to profitability. The capital
      intensity of dark store expansion (2,000–5,000 sq ft leased spaces requiring fit-out investment per location),
      combined with competitive pressure to maintain zero-fee pricing and subsidized delivery, creates a structural
      tension between growth and profitability. Average order value (₹450–550) remains below Blinkit's ₹625, and cash
      burn per order, while declining from ₹110 to ₹42–46, still represents a drag on unit economics. If IPO market
      conditions deteriorate or investor appetite for loss-making quick-commerce companies wanes, Zepto could face a
      funding gap that constrains expansion and competitive positioning.
    claimRefs:
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
  - id: people-culture-risks
    title: People and Culture Risks
    body: >-
      Zepto faces material people risks centered on founder dependency, work culture controversies, and talent retention
      challenges. CEO Aadit Palicha (23) and CTO Kaivalya Vohra (21) are among India's youngest startup founders, having
      dropped out of Stanford to build Zepto during COVID-19 lockdowns. While their youth and speed have driven Zepto's
      rapid growth, their limited corporate experience and outsized personal influence on company strategy, culture, and
      investor relationships create key-person risk that could impact operations if either founder departs or becomes
      incapacitated. Work culture allegations have intensified: in May 2025, a viral Reddit post from a contract worker
      detailed punishing work hours (9am–8pm, six to seven days per week), verbal abuse by managers, intimidation,
      exclusion from team activities, and near- complete absence of HR support. Multiple reports confirmed these
      experiences were not isolated. Zepto attributed the issues to third-party employment agencies rather than company
      policy, but CEO Palicha's previous dismissive public comments about work-life balance further fueled criticism.
      Separately, whistleblower posts alleged "massive fraud" and compared Zepto's trajectory to Byju's, raising
      reputational concerns ahead of the IPO. Talent competition with well-funded rivals (Blinkit/Zomato, Swiggy,
      Amazon, Flipkart) for engineering, data science, and operations talent is intense, and Zepto's work culture
      controversies may impair recruitment. The company laid off 800–900 employees in its cost-cutting drive,
      potentially creating institutional knowledge loss and morale impact among remaining staff.
    claimRefs:
      - CR032
      - CR033
      - CR034
