companyProfile:
  summary: "Zepto is an Indian quick-commerce startup founded in 2021 by Stanford dropouts Aadit Palicha (CEO) and Kaivalya Vohra (CTO), pioneering 10-minute grocery delivery through a network of approximately 900 dark stores across 70+ Indian cities. The company operates under Kiranakart Technologies Private Limited and has raised over $2.3 billion, reaching a $7 billion valuation in October 2025 after a $450 million round led by CalPERS. Zepto's product offering spans groceries, fresh produce, personal care, electronics, and adjacent services including Zepto Cafe and Zepto Advertising. The company reported FY25 revenue of approximately ₹11,110 crore (~$1.3 billion), representing 150% year-over-year growth, though net losses widened to ₹3,367 crore. Zepto filed its DRHP with SEBI in December 2025 and received IPO approval in May 2026, targeting a listing between July and September 2026."
