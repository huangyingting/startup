  - id: F204
    artifact: company-snapshot
    type: flow
    title: Investor and Partner Ecosystem

sourceStrategy:
  primarySources:
    - Official Anthropic website and newsroom (anthropic.com)
    - Anthropic API and developer documentation (docs.anthropic.com)
    - Claude.ai product pages
    - Anthropic research publications
  secondarySources:
    - Wikipedia articles on Anthropic, Claude, founders
    - Series C official press release
    - LTBT governance announcement
    - RSP policy documents
  gapAreas:
    - Audited financials (private company, not disclosed)
    - Exact ARR or revenue run-rate figures
    - Employee headcount breakdown by function
    - Detailed unit economics (CAC, LTV, gross margin)
    - Series F and G round term sheets
    - Customer count and churn metrics
