schemaVersion: startup-diligence-report-v2
artifact: report-brief
slug: anthropic
runDate: 2026-05-01
company:
  name: Anthropic

reportScope:
  title: "Anthropic PBC — Full VC Due Diligence Report"
  purpose: |
    Comprehensive first-stage VC diligence covering Anthropic's identity, funding trajectory,
    product portfolio, technology moat, market position, governance, and key risks. The report
    is intended as an IC pre-read for a late-stage growth equity evaluation.
  focusArea: full VC due diligence report
  depthTarget: standard
  runDateRationale: |
    Report date is 2026-05-01. Anthropic's most recent fundraise (Series G, $30B at $380B
    post-money) closed February 2026. Claude Opus 4.7 was released April 16, 2026 and is
    the current flagship model. Context window is fresh and captures the DoD dispute
    resolution (temporary injunction March 26, 2026) and the Anthropic Institute launch
    (March 2026).

researchQuestions:
  - id: RQ01
    question: What is Anthropic's validated corporate identity, legal structure, and governance?
    priority: critical
  - id: RQ02
    question: Who founded Anthropic and what are the founders' backgrounds and ongoing roles?
    priority: critical
  - id: RQ03
    question: What is the complete funding history and current post-money valuation?
    priority: critical
  - id: RQ04
    question: What are Anthropic's products, pricing tiers, and API economics?
    priority: critical
  - id: RQ05
    question: What is Claude's benchmark performance relative to competitors?
    priority: high
  - id: RQ06
    question: What are the key strategic partnerships (Amazon, Google, Microsoft/Nvidia)?
    priority: high
  - id: RQ07
    question: What revenue and unit economics data is publicly available?
    priority: high
  - id: RQ08
    question: What safety, governance, and regulatory risks does Anthropic face?
    priority: high
  - id: RQ09
    question: What legal proceedings are outstanding (copyright, DoD dispute)?
    priority: high
  - id: RQ10
    question: How does Anthropic's Responsible Scaling Policy and LTBT differentiate it from peers?
    priority: medium

desiredChapters:
  - number: 1
    title: "Startup Introduction & Company Snapshot"
    artifact: company-snapshot
    keyOutputs:
      - Founding story and team credentials
      - Funding waterfall and valuation progression
      - Corporate governance (PBC + LTBT)
      - Investment highlights callout box
      - Company timeline figure
  - number: 2
    title: "Market Sizing & Macro Analysis"
    artifact: market-macro
    keyOutputs:
      - AI foundation model TAM/SAM/SOM sizing
      - Macro AI spend tailwinds
      - Enterprise AI adoption curve
  - number: 3
    title: "Competitive Benchmarking"
    artifact: competitive-benchmarking
    keyOutputs:
      - Head-to-head vs OpenAI, Google DeepMind, Meta AI, Mistral
      - SWE-bench and GPQA performance comparison
      - Pricing competitiveness matrix
  - number: 4
    title: "Financial & Unit Economics"
    artifact: financial-unit-economics
    keyOutputs:
      - Revenue run-rate estimates from public signals
      - API pricing and margin structure
      - Burn rate context from capital raises
  - number: 5
    title: "Product & Technology"
    artifact: product-technology
    keyOutputs:
      - Claude model family architecture
      - Constitutional AI and safety differentiation
      - Claude Code and agentic product strategy
      - MCP ecosystem play
  - number: 6
    title: "Customer & Retention"
    artifact: customer-retention
    keyOutputs:
      - Known enterprise customers
      - Developer ecosystem (Cursor, Replit, GitHub Copilot)
      - Bedrock and Vertex AI distribution channel analysis
  - number: 7
    title: "Risk & Regulatory"
    artifact: risk-regulatory
    keyOutputs:
      - DoD supply chain risk designation and litigation
      - Music copyright and Project Panama lawsuits
      - Compute dependency on AWS/Google
      - Chinese state-sponsored misuse incident
  - number: 8
    title: "Investment & Valuation"
    artifact: investment-valuation
    keyOutputs:
      - $380B valuation context vs revenue multiples
      - Comparable company analysis
      - Bull/base/bear scenario framework

expectedTables:
  - id: T201
