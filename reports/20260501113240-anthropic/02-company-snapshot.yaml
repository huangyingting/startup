sections:
  - number: "1.1"
    title: Company Overview and Mission
    body: |
      Anthropic PBC was incorporated in 2021 as a Delaware Public Benefit Corporation,
      distinguishing it from ordinary for-profit AI labs by legally obligating the board
      to consider humanity's long-term benefit alongside shareholder interests [C001].
      Its stated mission is "the responsible development and maintenance of advanced AI
      for the long-term benefit of humanity" — language embedded in its certificate of
      incorporation [C024].

      Eight former OpenAI researchers co-founded the company, motivated in part by
      directional disagreements about the pace and safety posture of AI development [C002].
      The founding team brought unique technical credentials: Dario Amodei had led
      OpenAI's research as VP, and Jared Kaplan had co-developed the neural scaling laws
      that underpinned the modern LLM paradigm [C028].

      The company's core thesis — articulated in its 2023 "Core Views on AI Safety" document —
      holds that AI progress may be as transformative as the industrial revolution, that
      current alignment techniques are insufficient, and that building frontier systems
      is necessary to conduct relevant safety research [C017]. This "safety through
      frontier capability" logic both justifies Anthropic's aggressive commercial
      expansion and distinguishes it from non-commercial safety research organizations.
    claimRefs: [C001, C002, C017, C024, C028]

  - number: "1.2"
    title: Founding Team and Leadership
    body: |
      Dario Amodei (CEO) and Daniela Amodei (President) are the operational anchors of
      the company [C003]. Dario's scientific background (PhD biophysics, Princeton;
      co-author GPT-3) provides technical credibility; Daniela's operational and
      policy background (Stripe, OpenAI safety policy, congressional experience) gives
      the company unusual institutional-relations depth [C028, C029].

      The leadership team has been strengthened by notable recruitment. Jan Leike
      (former OpenAI alignment team lead), John Schulman (OpenAI co-founder), and
      Durk Kingma joined in 2024 [C002 via Wikipedia]. Mike Krieger, co-founder of
      Instagram, served as CPO before transitioning to lead the new Labs division in
      January 2026 [C025]. Amanda Askell — a philosopher — has led the evolution of
      Claude's constitution, now a 23,000-word document guiding model behavior [C022].

      The board includes notable independent directors: Reed Hastings (Netflix co-founder),
      Jay Kreps (Confluent co-founder), and Vas Narasimhan (Novartis CEO), alongside
      Yasmin Razavi from Series C lead investor Spark Capital [C025].
    claimRefs: [C002, C003, C022, C025, C028, C029]

  - number: "1.3"
    title: Corporate Governance — PBC and Long-Term Benefit Trust
    body: |
      Anthropic's governance is its most structurally distinctive feature. Operating
      as a Delaware PBC gives the board legal latitude to balance shareholder interests
      against the "responsible development and maintenance of advanced AI" [C001, C014].

      The Long-Term Benefit Trust (LTBT) is an independent purpose trust holding Class T
      shares. These shares confer authority to elect and remove board members, with the
      number of LTBT-elected directors expanding over time until the Trust controls a
      majority of the board [C024]. Trustees — currently Neil Buddy Shah, Richard
      Fontaine, and Mariano-Florentino Cuéllar — are selected for independence and
      expertise in AI safety, national security, and public policy [C026].

      This structure creates a structural safety valve: even if commercial pressures
      push toward unsafe deployment, the LTBT can intervene at the board level. The
      practical significance of this mechanism has not yet been tested in an existential
      scenario, but the DoD dispute demonstrates Anthropic's willingness to accept
      commercial sacrifice in defense of its usage policy principles [C035].
    claimRefs: [C001, C014, C024, C025, C026, C035]

  - number: "1.4"
    title: Product Portfolio
    body: |
      Anthropic's product portfolio is organized around the Claude model family and
      the platforms that deliver it.

      **Foundation Models.** The current generation consists of three production models:
      Claude Opus 4.7 (April 2026, flagship reasoning and coding), Claude Sonnet 4.6
      (February 2026, balanced speed/intelligence), and Claude Haiku 4.5 (October 2025,
      fast and cost-efficient) [C013]. All models support text and image input with
      multilingual capability. Opus 4.7 and Sonnet 4.6 offer 1 million token context
      windows [C014]. Claude Mythos Preview (April 2026) is an invitation-only model
      for defensive cybersecurity workflows under Project Glasswing [C021 via S021].

      **Consumer Product.** Claude.ai is available on web, iOS, Android, and desktop
      (Mac and Windows). A free tier provides access to Claude Sonnet 4.6 with memory,
      web search, and remote MCP. Pro ($17/month annual) and Max ($100–200/month) tiers
      add higher usage limits and Claude Code access [C016].

      **Agentic Products.** Claude Code (GA May 2025) is a command-line and IDE-integrated
      coding agent supporting VS Code, JetBrains, and GitHub Actions [C017]. Claude Code
      was used by Microsoft, Google, and OpenAI employees; Anthropic revoked OpenAI's
      access in August 2025 citing ToS violations [C039 via S012]. Enterprise adoption
      drove a 5.5x revenue increase by July 2025 [C018]. Claude Cowork (enterprise GA
      February 2026) provides a GUI-based agentic interface for non-technical users with
      connectors for Google Drive, Gmail, DocuSign, and FactSet [C019].

      **Infrastructure Standard.** The Model Context Protocol (MCP), open-sourced November
      2024, provides a universal standard for connecting AI systems to external data sources.
      Early adopters include Block, Apollo, Zed, Replit, Codeium, and Sourcegraph [C020].
      MCP is positioned as an industry ecosystem play, analogous to USB-C for AI integrations.

      **Distribution.** Claude is available via direct Anthropic API, Amazon Bedrock
      (30+ AWS global and regional endpoints), Google Cloud Vertex AI, and Microsoft
      Foundry [C042]. The Bedrock integration runs on AWS-managed infrastructure with
      zero Anthropic operator access, satisfying enterprise data sovereignty requirements [C030].
    claimRefs: [C013, C014, C015, C016, C017, C018, C019, C020, C030, C042]

  - number: "1.5"
    title: Funding History and Capitalization
    body: |
      Anthropic's fundraising history is exceptional even by frontier AI standards.
      From a $580M seed round in April 2022 — which notably included a $500M investment
      from FTX before its November 2022 collapse — the company has executed a rapid
      cadence of ever-larger rounds [C012].

      The two defining strategic investments are Amazon's cumulative ~$8B stake (initial
      $1.25B in September 2023, follow-on $2.75B in March 2024, and additional $4B in
      November 2024) [C008] and Google's ~$3B+ stake (October 2023 initial $500M plus
      commitments, and $1B more in March 2025) [C009]. Both investments are tied to
      distribution and compute agreements: AWS is the primary cloud and Claude is available
      on Bedrock; Claude is available on Google Cloud Vertex AI and the Google partnership
      includes access to up to 1 million TPUs [C031].

      The Series E in March 2025 ($3.5B at $61.5B valuation, led by Lightspeed) marked
      Anthropic's first disclosed post-money valuation [C007]. The Series F followed six
      months later ($13B at $183B, September 2025) co-led by Iconiq, Fidelity, and
      Lightspeed [C006]. A December 2025 term sheet at $350B ($10B, led by Coatue and GIC)
      [C010] preceded the landmark Series G — $30B at $380B post-money in February 2026 [C005].

      The stated total of confirmed capital raises exceeds $57 billion, not including the
      unconfirmed Microsoft/Nvidia investment of up to $15B announced in November 2025 [C032].
      This capital base provides multi-year runway for compute-intensive frontier model
      training and aggressive market expansion.
    claimRefs: [C005, C006, C007, C008, C009, C010, C011, C012, C031, C032]

  - number: "1.6"
    title: Key Partnerships
    body: |
      **Amazon Web Services** is Anthropic's primary cloud provider under the September 2023
      strategic partnership. Cumulative Amazon investment totals approximately $8 billion.
      Claude models are available via Amazon Bedrock across 30+ global regions. Claude Opus
      4.7 and Haiku 4.5 are open to all Bedrock customers; Claude Mythos Preview requires
      invitation [C030, C042].

      **Google Cloud** provides Vertex AI distribution and major compute resources. The
      October 2025 Google Cloud compute partnership grants access to up to 1 million TPUs
      targeting over 1 GW of AI compute by 2026 [C031]. Total Google investment exceeds
      $3 billion [C009].

      **Palantir** (with AWS) enables Claude deployment for U.S. intelligence and defense
      agencies via the Maven Smart System. As of February 2026, Claude was the only AI
      model in use in classified missions [C034].

      **Microsoft and Nvidia** (November 2025) announced plans to invest up to $15B in
      Anthropic and provide access to $30B of Azure computing capacity running on Nvidia
      AI infrastructure [C032]. Confirmation of the executed agreement is pending.

      **Snowflake** signed a $200M multi-year partnership in December 2025 to make Claude
      available through Snowflake's data platform for enterprise AI deployments [C033].
    claimRefs: [C008, C009, C030, C031, C032, C033, C034]

  - number: "1.7"
    title: Risk Overview
    body: |
      **DoD / National Security Dispute.** The most consequential near-term risk is the
      active litigation with the U.S. Department of Defense. Anthropic's refusal to permit
      Claude's use in mass domestic surveillance or fully autonomous weapons led to a DoD
      "supply chain risk" designation in March 2026, barring military contractors from
      using Anthropic products [C035]. A temporary injunction was granted on March 26,
      2026 [C036], with Google, Amazon, Apple, and Microsoft supporting Anthropic's
      lawsuit. The outcome remains unresolved. A negative ruling could affect government
      contract revenue and enterprise adoption in defense-adjacent industries.

      **Copyright Litigation.** Music publishers Concord, Universal, and ABKCO filed suit
      in October 2023 alleging systematic infringement of song lyrics. Exposure is
      potentially large given the $150k per-work statutory maximum [C037]. The "Project
      Panama" book-scanning program was disclosed in January 2026; Judge Alsup ruled
      that scanning legally purchased books constituted fair use, though piracy-related
      training claims remain unresolved [C038].

      **Adversarial Misuse.** In September–November 2025, Chinese state-sponsored hackers
      (GTG-2002) used Claude Code to automate 80–90% of cyberattacks against ~30 global
      organizations. Anthropic banned all related accounts and notified law enforcement [C039].
      The incident illustrates the dual-use risk inherent in powerful coding agents and
      may complicate enterprise security conversations.

      **Compute Dependency.** The company's AI training and inference workloads depend
      primarily on Amazon AWS and Google Cloud infrastructure. Any disruption to these
      relationships or adverse commercial terms could materially affect cost structure.
    claimRefs: [C035, C036, C037, C038, C039]
