company:
  name: Anthropic

chapter:
  number: 1
  title: Startup Introduction & Company Snapshot
  summary: |
    Anthropic PBC is a San Francisco–based AI safety and research company that builds
    and deploys large language model systems under the Claude brand. Founded in 2021 by
    eight former OpenAI researchers — led by CEO Dario Amodei and President Daniela Amodei —
    the company has evolved from a pure-play safety research lab into a full-stack AI
    products company while maintaining its mission of responsible AI development. As of
    May 2026, Anthropic has raised over $57 billion in cumulative capital and carries a
    $380 billion post-money valuation following its February 2026 Series G. Its flagship
    Claude model family powers a direct consumer product (claude.ai), an enterprise API
    platform, and a fast-growing agentic coding suite (Claude Code). Strategic cloud
    partnerships with Amazon (AWS, ~$8B invested), Google (Vertex AI, ~$3B invested),
    and Microsoft/Nvidia (up to $15B, Azure compute deal) provide distribution scale
    and compute access. Unique governance structures — Public Benefit Corporation status
    and a Long-Term Benefit Trust — attempt to anchor the mission against short-term
    commercial pressures.

startupIntroduction:
  summary: |
    Anthropic is an AI safety and research company that builds and deploys the Claude family
    of large language models. Founded in 2021 by eight ex-OpenAI researchers including
    siblings Dario Amodei (CEO) and Daniela Amodei (President), the company is
    headquartered in San Francisco and operates as a Public Benefit Corporation. Claude
    powers a freemium consumer chat product, a paid SaaS suite (Pro/Max/Team/Enterprise),
    a developer API, and agentic tooling including Claude Code and Claude Cowork. API
    pricing spans $1–$25 per million tokens depending on model tier, with the latest
    generation (Opus 4.7 / Sonnet 4.6 / Haiku 4.5) offering context windows up to 1 million
    tokens. Anthropic has raised a cumulative total in excess of $57 billion and most recently
    closed a $30 billion Series G in February 2026 at a $380 billion post-money valuation,
    making it one of the most highly capitalized private technology companies in history.
  foundedDate: "2021-01-01"
  foundedYear: 2021
  founders:
    - name: Dario Amodei
      role: Co-Founder and CEO
      background: |
        PhD biophysics, Princeton University; BS physics, Stanford University.
        Former VP of Research at OpenAI. Co-authored GPT-3 and pioneered AI scaling laws.
        Forbes estimated net worth $7B (February 2026). Named Time 100 most influential
        people in AI (2023) and Time Person of the Year "Architects of AI."
      claimRefs: [C003, C028]
    - name: Daniela Amodei
      role: Co-Founder and President
      background: |
        BA English Literature, UC Santa Cruz. Former VP of Safety and Policy at OpenAI;
        earlier career at Stripe. Led teams through GPT-2 development. Forbes estimated
        net worth $7B (February 2026). Named Time 100 AI 2023.
      claimRefs: [C003, C029]
    - name: Jared Kaplan
      role: Co-Founder and Chief Science Officer
      background: |
        Physicist; co-developed neural scaling laws while at OpenAI. Chief Science Officer
        at Anthropic overseeing research direction.
      claimRefs: [C002]
    - name: Jack Clark
      role: Co-Founder and Head of Policy
      background: |
        Former OpenAI communications and policy leader. Now leads Anthropic's policy work
        and the Anthropic Institute think tank (launched March 2026).
      claimRefs: [C002]
    - name: Chris Olah
      role: Co-Founder
      background: |
        Pioneer of mechanistic interpretability research; leads Anthropic's Interpretability
        team which studies how neural networks encode concepts and features.
      claimRefs: [C002]
    - name: Ben Mann
      role: Co-Founder
      background: Former OpenAI researcher.
      claimRefs: [C002]
    - name: Sam McCandlish
      role: Co-Founder
      background: Former OpenAI researcher.
      claimRefs: [C002]
    - name: Tom Brown
      role: Co-Founder
      background: Lead author of the GPT-3 paper; former OpenAI researcher.
      claimRefs: [C002]
  foundingLocation: San Francisco, California, USA
  headquarters: "500 Howard Street, San Francisco, California, USA"
  website: https://www.anthropic.com
  productSummary: |
    Claude family of large language models (Haiku, Sonnet, Opus tiers) delivered via
    web/mobile consumer app (claude.ai), SaaS subscriptions (Pro/Max/Team/Enterprise),
    REST API, Amazon Bedrock, Google Vertex AI, and Microsoft Foundry. Current flagship:
    Claude Opus 4.7. Agentic products include Claude Code (coding agent, GA May 2025)
    and Claude Cowork (GUI agent for non-technical users, enterprise release February 2026).
    Infrastructure protocol: Model Context Protocol (MCP), open-sourced November 2024.
  customerFocus: |
    Enterprise companies, software developers and coding teams, SMBs, and individual
    knowledge workers. Key enterprise customers include Cursor, GitHub (Copilot), Replit,
    Notion, StubHub, Intercom, Rakuten, Harvey, and Block. U.S. intelligence and defense
    agencies via Palantir's Maven Smart System (subject to ongoing DoD litigation).
  businessModel: |
    Three-layer monetization: (1) Consumer SaaS — free tier plus Pro ($17–20/mo),
    Max ($100–200/mo), and Team ($20–25/seat/mo) subscriptions. (2) Developer API —
    usage-based token pricing ($1–$25/MTok depending on model). (3) Enterprise contracts
    — custom pricing with HIPAA, SCIM, audit logs, and dedicated support. Additional
    platform revenue from managed agents ($0.08/session-hour), web search ($10/1K),
    and batch API. Distribution via direct API and three cloud marketplace channels
    (Bedrock, Vertex AI, Microsoft Foundry).
  stage: Late-stage private / pre-IPO
  fundingStatus: |
    Series G closed February 2026 at $30B raised, $380B post-money valuation. Total
    cumulative capital raised exceeds $57B. Primary investors include Amazon (~$8B),
    Google (~$3B), Iconiq Capital, Fidelity, Lightspeed Venture Partners, Spark Capital,
    Coatue, GIC, and Qatar Investment Authority.
  claimRefs: [C001, C002, C003, C004, C005, C006, C007, C008, C009, C011, C012, C013, C015, C016, C017, C042]

callouts:
  - type: key-insight
    title: Safety-First Mission Fused with Commercial Scale
    body: |
      Anthropic is the only frontier AI lab structured as a Public Benefit Corporation
      with a Long-Term Benefit Trust capable of electing a board majority. This governance
      architecture is a genuine structural differentiator — it enables Anthropic to resist
      commercial capture in ways that Delaware C-corps cannot. Simultaneously, the company
      has built massive commercial scale: $380B valuation, multi-billion-dollar cloud
      partnerships, and market-leading benchmark performance. The thesis that safety and
      commercial viability are complementary rather than competing appears validated.
    claimRefs: [C001, C024, C005]

  - type: opportunity
    title: "Series G Positions Anthropic as the Largest Private AI Company"
    body: |
      The February 2026 Series G at $30B raised and $380B post-money makes Anthropic one
      of the most capitalized private technology companies in history. Combined with the
      Amazon ($8B), Google ($3B), and prospective Microsoft/Nvidia ($15B) strategic
      investments, the company has an unprecedented war chest for compute, research, and
      market expansion. Claude Code's 5.5x revenue growth trajectory and the enterprise
      agentic opportunity via Claude Cowork signal significant upside.
    claimRefs: [C005, C008, C009, C032, C018]

  - type: investment-recommendation
    title: Investment Highlights Summary
    body: |
      1. World-class founding team with proven research credentials and unique safety focus.
      2. $380B valuation reflects strategic partner conviction (Amazon, Google, Microsoft/Nvidia).
      3. Claude 4-series leads SWE-bench coding benchmarks, establishing technical superiority in the highest-value enterprise use case.
      4. Three-layer business model (consumer SaaS + API + enterprise) with growing agentic platform.
      5. MCP ecosystem lock-in as an open industry standard for AI-to-data connectivity.
      6. PBC + LTBT governance provides mission anchor and differentiates Anthropic from OpenAI in enterprise trust sales.
      7. DoD litigation (temporary injunction in Anthropic's favor) and copyright exposure are manageable near-term risks given capital position and legal progress.
    claimRefs: [C002, C005, C040, C017, C020, C024, C035, C036]

  - type: risk-alert
    title: DoD Supply Chain Designation — Active Litigation
    body: |
      The U.S. Department of Defense designated Anthropic a supply chain risk in March
      2026 after the company refused to permit AI use in mass domestic surveillance and
      fully autonomous weapons. A federal judge issued a temporary injunction on
      March 26, 2026, finding "classic First Amendment retaliation." Google, Amazon,
      Apple, and Microsoft have publicly supported Anthropic's lawsuit. Outcome remains
      unresolved and may affect government contract revenue and enterprise reputation.
    claimRefs: [C035, C036]

