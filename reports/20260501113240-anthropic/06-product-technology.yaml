sections:
  - number: "5.1"
    title: Product Platform Overview
    body: |
      Anthropic has evolved from a research-first lab into a layered commercial platform.
      The product architecture follows a logical build-up from foundational safety research
      through model core capability, to cloud distribution infrastructure, to end-user
      product surfaces.

      The core commercial product family is Claude: a three-tier API accessible via direct
      Anthropic endpoint and three cloud marketplaces (Amazon Bedrock, Google Vertex AI,
      Microsoft Foundry) [C042]. The three tiers — Haiku 4.5 (speed/cost), Sonnet 4.6
      (balanced), Opus 4.7 (frontier) — serve distinct workload economics and enterprise
      buyer profiles [C013, C015]. Above the raw API sits a set of platform services
      (prompt caching, batch API, managed agents, web search, computer use, extended
      thinking) that create incremental revenue and capability differentiation [C015].

      The consumer and business surface (claude.ai, Free through Enterprise) provides
      direct subscription revenue and consumer brand presence [C016]. Claude Code and
      Claude Cowork represent the agentic product layer — the fastest evidenced growth
      segment (Claude Code 5.5x revenue growth, July 2025 [C018]) — targeting software
      engineers and non-technical business users respectively [C017, C019].

      The Model Context Protocol (MCP), open-sourced November 2024 [C020], is the
      platform's infrastructure play: an open standard that positions Claude as the
      natural integration hub for enterprise data workflows. See Figure F601 for the
      complete five-layer architecture stack and Figure F603 for the MCP ecosystem.
    claimRefs: [C013, C015, C016, C017, C018, C019, C020, C030, C042]

  - number: "5.2"
    title: Claude Model Family — Architecture and Differentiation
    body: |
      **Three-Tier Philosophy.** The Haiku/Sonnet/Opus three-tier model family addresses
      the full enterprise price/performance spectrum. Haiku 4.5 ($1/$5/MTok; 200k context)
      serves latency-sensitive, high-volume workloads where throughput and cost dominate
      quality considerations [C015]. Sonnet 4.6 ($3/$15/MTok; 1M context) is the primary
      workhorse for general enterprise intelligence tasks [C015]. Opus 4.7 ($5/$25/MTok;
      1M context) serves complex reasoning, frontier coding, and agentic tasks where
      quality is paramount and cost is secondary [C013, C015].

      **Context Window Leadership.** Opus 4.7 and Sonnet 4.6 both support a 1-million-token
      context window [C014] — equivalent to approximately 750,000 words or multiple books.
      This enables use cases that were previously impossible: entire codebase analysis,
      full contract portfolio review, exhaustive scientific literature synthesis. The 1M
      context window is matched by Google Gemini 2.5 Pro but exceeds OpenAI GPT-4o's
      128k context (as of evidence collection date).

      **Generation-Over-Generation Improvement.** Claude Opus 4.7 (April 2026) improved
      on Opus 4.6 in advanced software engineering; Cursor reported 70% task clearance
      on CursorBench compared to 58% for Opus 4.6 — a 12 percentage-point improvement
      [C041]. Claude Opus 4 (May 2025) scored 72.5% on SWE-bench Verified at release
      [C040]. This trajectory, while company-asserted from single sources, is validated
      by a named third-party customer (Cursor) rather than exclusively self-reported.

      **Claude Mythos (Restricted Preview).** A fourth model variant — Claude Mythos —
      was released invitation-only in April 2026 for Project Glasswing, Anthropic's
      defensive cybersecurity initiative [C013]. Pricing and capabilities are undisclosed
      beyond the invitation-only status. This represents a potential government/defense
      monetization channel adjacent to the Palantir/classified pathway.
    claimRefs: [C013, C014, C015, C040, C041]

  - number: "5.3"
    title: Constitutional AI, RSP, and Safety Architecture
    body: |
      **Constitutional AI — The Alignment Manufacturing Process.** Constitutional AI (CAI),
      published December 2022 [C021], is Anthropic's proprietary alignment methodology
      and its most fundamental technology differentiator. Rather than relying on expensive
      human labeling of every harmful output, CAI uses a written constitution of principles
      and trains the model to critique its own outputs against those principles — a
      self-improvement loop that scales more efficiently than pure RLHF. Claude's
      Constitution as of 2026 contains approximately 23,000 words (up from 2,700 in 2023)
      [C022] — reflecting continuous investment and substantive institutional knowledge
      encoded into the alignment process.

      **Responsible Scaling Policy (RSP) — Deployment Risk Governance.** The RSP [C023]
      establishes AI Safety Levels (ASL-2, ASL-3, ASL-4) analogous to biosafety levels in
      laboratory settings. Models are evaluated for Red Line Capabilities (defined as
      capabilities that could enable mass-casualty events or critical infrastructure
      compromise). If Red Line Capabilities are detected without adequate safeguards,
      Anthropic commits to halt deployment. This policy is legally structured and
      investor-disclosed — it creates a genuine constraint on Anthropic's commercial
      freedom that no competitor has replicated at the same specificity.

      **Mechanistic Interpretability — The Long-Game Advantage.** Co-founder Chris Olah
      pioneered mechanistic interpretability research [C002] — the discipline of
      understanding how neural networks encode concepts as identifiable features and
      circuits. Anthropic has published more interpretability research than any other
      organization. This research agenda is speculative in its commercial timeline but
      represents a potential path to verifiable model safety properties that would create
      insurmountable safety credibility over competitors who cannot demonstrate internal
      model understanding.

      **Behavioral Validation — DoD Dispute.** The highest-stakes behavioral test of
      Anthropic's safety commitments occurred in February–March 2026. When the U.S.
      Department of Defense demanded removal of Claude's contractual prohibitions on
      mass domestic surveillance and fully autonomous weapons use [C035], Anthropic
      refused — accepting commercial and reputational risk in the process. The resulting
      DoD supply chain risk designation and Anthropic's successful lawsuit (temporary
      injunction, March 26, 2026 [C036]) constitutes the most credible third-party
      validation of the safety governance architecture in the company's history.
    claimRefs: [C002, C021, C022, C023, C035, C036]

  - number: "5.4"
    title: Agentic Products — Claude Code and Claude Cowork
    body: |
      **Claude Code — Frontier Coding Agent.** Claude Code (GA May 2025, alongside
      Claude 4 [C017]) is Anthropic's highest-evidenced commercial growth product.
      Key specifications: VS Code and JetBrains IDE integrations, GitHub Actions support,
      terminal access, and autonomous file editing. It is backed by Claude Opus 4's
      72.5% SWE-bench Verified performance at launch [C040] and the customer-validated
      70% CursorBench task clearance with Opus 4.7 [C041]. Revenue grew 5.5x from
      launch base by July 2025 [C018] — the only disclosed revenue growth rate in
      the evidence ledger. The Bun JavaScript runtime acquisition (December 2025) was
      made specifically to accelerate Claude Code's JavaScript ecosystem tooling.

      Claude Code's competitive differentiation is multi-dimensional: frontier benchmark
      performance (SWE-bench leadership), deep IDE integration (native VS Code/JetBrains
      plugins), MCP-enabled tool extensibility, and backing by the model architecture
      most tested by professional software engineers. The evidence that OpenAI employees
      themselves were using Claude Code (until Anthropic revoked access for ToS violations
      in August 2025 [C039]) is a compelling secondary validation of technical superiority.

      **Claude Cowork — Enterprise GUI Automation Agent.** Claude Cowork (research preview
      January 2026, enterprise GA February 2026 [C019]) extends agentic AI to non-technical
      business users. Unlike Claude Code (which requires developer context), Cowork uses
      GUI navigation and vision to operate enterprise applications on behalf of knowledge
      workers — connecting to Google Drive, Gmail, DocuSign, and FactSet. This targets
      a much larger total addressable user base than Claude Code: every knowledge worker
      who could benefit from automated task execution, not just software engineers.

      Revenue metrics for Cowork are not yet disclosed in the evidence ledger. The
      February 2026 enterprise GA timing means significant commercial metrics should
      be available within one to two quarters — making this a near-term diligence follow-up
      priority.
    claimRefs: [C017, C018, C019, C039, C040, C041]

  - number: "5.5"
    title: Model Context Protocol — Ecosystem and Platform Strategy
    body: |
      **MCP as an Infrastructure Bet.** The Model Context Protocol (MCP), open-sourced
      in November 2024 [C020], is one of the most strategically significant moves in
      Anthropic's history. Rather than building proprietary connectors to every enterprise
      data source (the approach taken by most AI product companies), Anthropic created and
      open-sourced a universal standard: any data source can publish an MCP server; any
      AI client can consume it using the same protocol.

      **Adoption Evidence.** Within approximately 18 months of open-sourcing, MCP had
      been adopted by Block (Square), Apollo, Replit, Zed, and Sourcegraph [C020], and
      forms part of the Snowflake enterprise partnership ($200M, December 2025) [C033].
      Claude.ai's free tier includes remote MCP access [C016], making MCP adoption a
      user acquisition feature in the consumer funnel as well.

      **Strategic Logic.** MCP creates a platform network effect where: (1) each new
      MCP server (data source integration) increases the value of Claude to enterprise
      users; (2) each enterprise choosing Claude for agentic workflows embeds MCP in
      their infrastructure, creating switching costs; and (3) Anthropic, as the protocol
      inventor and steward, benefits from ecosystem growth without bearing the marginal
      cost of each integration. If MCP achieves the open-standard status that REST APIs
      achieved for web services or OAuth achieved for authentication, the long-term
      competitive value is substantial.

      **Risks.** OpenAI and Google could develop competing integration protocols. Platform
      companies (AWS, Salesforce, Microsoft) could mandate proprietary integration APIs.
      Open standards frequently fork or fragment after initial adoption momentum. Anthropic
      does not have a formal standards body or governance structure for MCP beyond its
      own stewardship. These risks are not currently evidenced as active threats but
      represent the primary vulnerability in the MCP ecosystem strategy.
    claimRefs: [C016, C020, C033]

  - number: "5.6"
    title: Technology Roadmap and Architecture — Evidence Assessment
    body: |
      **Known Roadmap (Evidence-Based).** No formal forward product roadmap has been
      publicly disclosed by Anthropic. The roadmap is inferrable from the pattern of
      announcements in the evidence ledger:

      (1) Model cadence: Anthropic has released major model generations approximately
      every 6–12 months (Claude 1 → 2 → 3 → 3.5 → 3.7 → 4 → 4.x) with point releases
      within each major generation [C013]. A Claude 5 series is expected in late 2026
      or 2027 based on this cadence — but this is inferred from historical release
      frequency, not an announced date.

      (2) Agentic product expansion: The pattern of Claude Code (coding) followed by
      Claude Cowork (GUI automation) suggests further agentic product categories are in
      development for specific knowledge worker domains. Research preview → enterprise
      GA timelines suggest roughly 6–8 months per product [C017, C019].

      (3) MCP ecosystem development: The Anthropic Labs division (launched January 2026
      under Mike Krieger [C025]) is likely to publish further developer tooling and MCP
      extensions. No specific announcements are evidenced.

      (4) Project Glasswing / Mythos: The invitation-only cybersecurity model [C013]
      suggests a specialized model track for government/defense applications operating
      in parallel to the commercial model family. Expansion of this track is possible
      but contested by DoD litigation [C035].

      **Infrastructure Architecture.** Anthropic's training and inference infrastructure
      spans AWS (primary cloud provider, Bedrock channel) [C030], Google Cloud (up to
      1M TPUs targeting 1GW compute by 2026 [C031]), and prospective Azure (announced
      $30B compute commitment [C032]). This multi-cloud infrastructure strategy reduces
      single-provider dependency risk while leveraging the three largest hyperscalers
      as both compute suppliers and distribution channels. Internal architecture details
      (model training pipeline, inference optimization, serving infrastructure) are not
      publicly disclosed.
    claimRefs: [C013, C017, C019, C025, C030, C031, C032, C035]
