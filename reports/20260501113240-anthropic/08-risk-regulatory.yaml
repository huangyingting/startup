chapter:
  number: 7
  title: Risk & Regulatory
  summary: |
    Anthropic's risk profile as of May 2026 is rated significant. Four active risk categories
    dominate: (1) legal proceedings — a U.S. Department of Defense supply chain risk
    designation (temporary injunction issued 2026-03-26 [C035, C036]), an ongoing music
    copyright infringement lawsuit by Concord, Universal, and ABKCO [C037], and a partially
    resolved books-scanning case (Project Panama, fair use ruling for scanning [C038]);
    (2) infrastructure concentration — AWS is Anthropic's primary cloud provider [C030]
    with a $30 billion Azure compute commitment to Microsoft/Nvidia [C032] creating a
    multi-year obligation; (3) state-actor model misuse — China-sponsored threat actor
    GTG-2002 automated 80–90% of cyberattacks against approximately 30 global organisations
    using Claude Code in September 2025 [C039]; and (4) competitive pressure from
    well-capitalized rivals OpenAI and Google DeepMind. Substantive mitigants include the
    strongest governance architecture of any frontier AI lab (PBC + LTBT + RSP [C001, C023,
    C024]), frontier benchmark leadership [C040, C041], and a $57B+ capital war chest
    [C005, C006, C007, C008, C009] that provides ample runway. The DoD dispute itself
    provided a behavioral validation of Anthropic's mission resilience under high-stakes
    commercial pressure [C035, C036].

callouts:
  - type: risk-alert
    title: "DoD Litigation: First Amendment Retaliation — Temporary Injunction in Place"
    body: |
      In March 2026, the U.S. Department of Defense designated Anthropic a "supply chain
      risk" after Anthropic refused to remove contractual prohibitions on the use of Claude
      for mass domestic surveillance and fully autonomous weapons [C035]. On March 26, 2026,
      a federal judge issued a temporary injunction, writing that the designation "appears
      to be classic First Amendment retaliation" [C036]. The injunction provides short-term
      relief, but the underlying policy dispute remains unresolved. If the designation is
      upheld permanently, Anthropic's classified AI revenue via Palantir's Maven Smart
      System on AWS — described as the only AI model used in classified missions as of
      February 2026 [C034] — would be at risk. The dispute also establishes a precedent
      for how government procurement may respond to AI ethical-use contract terms across
      the industry.
    claimRefs: [C034, C035, C036]

  - type: risk-alert
    title: "Music Copyright Lawsuit: Systematic Infringement Allegation — Highest IP Severity"
    body: |
      In October 2023, Concord Music Group, Universal Music Group, ABKCO Music, and other
      major music publishers sued Anthropic for alleged systematic copyright infringement of
      song lyrics used to train Claude models [C037]. U.S. music copyright law provides for
      statutory damages of up to $150,000 per infringed work. If Anthropic incorporated
      thousands of copyrighted lyrics without license, aggregate exposure could reach
      material financial levels. This case is separate from the Project Panama books-scanning
      litigation, where Judge William Alsup ruled that scanning legally purchased books
      constitutes fair use [C038]. The fair use precedent in the books case does not
      necessarily extend to the music lyrics infringement theory and does not resolve
      the Concord/Universal proceedings.
    claimRefs: [C037, C038]

  - type: key-insight
    title: "PBC + LTBT + RSP Form the Strongest AI Governance Architecture in the Industry"
    body: |
      Anthropic's Public Benefit Corporation structure [C001] and the Long-Term Benefit
      Trust (LTBT) — an independent five-member body with authority to elect a majority
      of Anthropic's board over time [C024] — are the most robust governance structures
      of any frontier AI lab. The Responsible Scaling Policy (ASL-2/3/4 safety levels
      with Red Line Capabilities commitments) [C023] provides a systematic, published
      framework for managing existential AI risk. The DoD dispute validated all three
      structures in a live test: Anthropic held the line on its ethical use contract
      terms under significant government commercial pressure, demonstrating that the
      governance architecture functions under stress, not just in policy documents [C035].
    claimRefs: [C001, C023, C024, C035]

  - type: risk-alert
    title: "State-Actor Misuse Incident Confirmed — GTG-2002 Used Claude for Cyberattacks"
    body: |
      In September 2025, a threat actor identified as GTG-2002, sponsored by the Chinese
      government, used Claude Code to automate 80–90% of cyberattacks against approximately
      30 global organisations [C039]. Anthropic banned all related accounts consistent with
      its acceptable use policy. This is the most concrete evidence that frontier AI coding
      capabilities can be weaponized for state-sponsored cyber operations. The incident
      demonstrates a security risk category — state-actor misuse — that is ongoing and
      likely to recur as model capabilities improve. Constitutional AI [C021] and usage
      monitoring are necessary but not sufficient mitigants against determined state actors.
    claimRefs: [C021, C039]

