              displayValue: "~$3.8B implied ARR (100x — conservative multiple contraction)"
            - label: "150x multiple"
              value: 2533
              displayValue: "~$2.5B implied ARR (150x — distressed multiple scenario)"
    approximationNotes: |
      All implied ARR values are computed as $380,000M divided by the stated multiple.
