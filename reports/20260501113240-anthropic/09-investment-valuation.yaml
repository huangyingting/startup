    layout: standard
    summary: |
      Sensitivity analysis showing implied ARR in USD millions derived from dividing the
      $380B Series G post-money valuation [C005] by eight assumed forward revenue multiples
      (20x through 150x). All values are inferred analyst estimates — not financial
      disclosures. The chart illustrates how sensitive the implied ARR is to the assumed
      multiple: the range spans $2.5B to $19.0B across plausible frontier AI multiples.
      Investors must replace inferred ARR with actual figures from Anthropic's data room.
