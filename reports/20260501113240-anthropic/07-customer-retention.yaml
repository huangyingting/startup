sections:
  - number: "6.1"
    title: Customer Base Overview
    body: |
      Anthropic's customer base is broad, spanning individual consumer users, professional
      developers, SMB teams, large enterprises, enterprise cloud marketplace buyers, and
      U.S. government agencies. The portfolio is best understood as a pyramid: a wide base
      of free and low-cost consumer and API developer users, narrowing toward high-value
      enterprise and government accounts with deep integrations and multi-year commitments.

      **Scale Indicators (Evidenced).** No total customer count is publicly disclosed.
      The strongest commercial scale signal is the $380B post-money Series G valuation
      (February 2026) [C005], which implies institutional investor conviction in
      multi-billion-dollar revenue expectations. Claude is available in 30+ AWS Bedrock
      regions [C030] and across three major cloud marketplaces [C042] — a distribution
      surface reaching essentially every enterprise technology buyer globally. Named
      enterprise customers (Table T701) include companies with hundreds of millions to
      billions of end users in their own products (GitHub, Rakuten), multiplying the
      effective user reach of Claude well beyond direct Anthropic customer relationships.

      **Growth Signal.** The only disclosed commercial growth rate is Claude Code's 5.5x
      revenue increase by July 2025 [C018]. This is company-claimed from a single source
      and references an undisclosed absolute base, but the directional signal is the
      strongest available evidence of customer adoption velocity. The enterprise GA of
      Claude Cowork in February 2026 [C019] and the Super Bowl LX consumer marketing
      campaign (same month) represent dual investment signals in both enterprise and
      consumer growth.

      See Table T702 for the customer segment analysis and Figure F701 for the
      customer surface map.
    claimRefs: [C005, C016, C017, C018, C019, C030, C041, C042]

  - number: "6.2"
    title: Customer Segmentation
    body: |
      **Individual / Consumer Segment.** The Free tier (claude.ai) provides broad funnel
      access; paid tiers (Pro $17–$20/month, Max $100–$200/month) convert high-frequency
      users [C016]. The Max 20x tier at $200/month targets power users with intensive
      professional workflows — a segment with lower churn propensity than standard Pro
      subscribers given the usage investment. No subscriber count or churn data is
      evidenced. Consumer competition is intense: ChatGPT (OpenAI), Gemini (Google), and
      Copilot (Microsoft) are direct substitutes at similar price points.

      **Developer / API Segment.** Professional developers and startups access Claude
      through the direct API (Anthropic key) or cloud marketplace (Bedrock/Vertex/Foundry)
      [C042]. Token-based billing creates no minimum commitment, which reduces trial
      friction but also means developers can reduce consumption instantaneously in response
      to cost or quality changes. API developer retention is most likely driven by
      integration depth: a developer who has built a production application on Claude's
      API, with prompt engineering, fine-tuned system prompts, and MCP tool integrations,
      faces meaningful switching effort even when an alternative model is technically
      viable [C020].

      **Enterprise SaaS Segment.** The Team ($20/seat/month annual) and Enterprise
      (custom) tiers serve SMB and large enterprise buyers [C016]. Annual contract terms,
      SSO integration, SCIM provisioning, and HIPAA compliance create administrative
      switching costs beyond pure model quality. Enterprise customers include Cursor,
      Notion, Rakuten, StubHub, Intercom, and Harvey [C041]. Customer-validated
      performance data from Cursor (70% CursorBench task clearance [C041]) and named
      endorsements from Rakuten and Notion [C041] confirm this segment's satisfaction
      with current model quality.

      **Agentic / Claude Code Segment.** The highest-growth evidenced segment. Claude
      Code customers (GA May 2025 [C017]) have the deepest integration profile: IDE
      plugins (VS Code, JetBrains), GitHub Actions workflows, and MCP tool connections
      create multi-layer integration that is harder to swap than a simple API key change.
      This is the segment where Anthropic's benchmark leadership on SWE-bench [C040] and
      CursorBench [C041] most directly translates to defensible retention.

      **Government / Defense Segment.** Claude via the Palantir/AWS Maven Smart System
      was the only AI model used in classified U.S. defense and intelligence missions as
      of February 2026 [C034] — the strongest statement of exclusive market position in
      the ledger. However, this channel is contested by the DoD supply chain risk
      designation (March 2026) [C035], which creates uncertainty about this segment's
      near-term contribution. The temporary injunction (March 26, 2026 [C036]) is a
      positive resolution signal, but the final outcome is uncertain.
    claimRefs: [C015, C016, C017, C018, C019, C020, C030, C034, C035, C036, C040, C041, C042]

  - number: "6.3"
    title: Key Customer Case Studies
    body: |
      **Cursor — Coding IDE Benchmark Anchor.**
      Cursor is Anthropic's highest-evidenced enterprise customer relationship. The
      company designed an internal "CursorBench" benchmark to evaluate AI coding models
      against its real-world task distribution. Claude Opus 4.7 achieved 70% task
      clearance on CursorBench, versus 58% for the prior generation Opus 4.6 — a
      12 percentage-point improvement [C041]. This means Cursor publicly validated that
      Claude is their best-performing model for their product's use case, and that each
      Claude generation improves measurably on their specific workload. This is the most
      credible customer reference in the evidence ledger: it uses a customer-designed
      (not Anthropic-designed) evaluation, names the absolute score, and shows
      generational improvement. Claude is embedded as Cursor's core model.

      **Snowflake — Largest Disclosed Enterprise Deal.**
      The Snowflake $200M multi-year partnership (December 2025) [C033] is the largest
      disclosed enterprise deal in the evidence set. Snowflake integrates Claude into
      its data platform, enabling enterprise Snowflake customers to apply Claude to
      their stored data via MCP or direct integration. This deal is notable both for
      its size and for its structural logic: Snowflake customers are data-intensive
      enterprises with large context workloads — precisely the segment that benefits
      most from Claude's 1-million-token context window [C014]. The multi-year term
      implies mutual commercial commitment and provides a degree of revenue predictability.

      **Palantir / U.S. Defense — Deepest Integration, Highest Risk.**
      The Palantir partnership (November 2024) made Claude the only AI model used in
      classified U.S. government missions via AWS Maven Smart System [C034]. The phrase
      "only AI model in classified missions" suggests exclusive or near-exclusive
      displacement of competing models in a high-security context. However, this
      relationship is currently challenged by the DoD supply chain risk designation
      [C035], which arose from Anthropic's refusal to remove contractual prohibitions
      on mass surveillance and autonomous weapons use. The temporary injunction
      (March 26, 2026 [C036]) is a positive indicator, but the definitive legal outcome
      remains pending.

      **Notion and Rakuten — Enterprise Endorsement Signals.**
      Both Notion and Rakuten are named in the Opus 4.7 launch announcement [C041] as
      customers providing product endorsements. Notion is a long-standing Claude partner
      since the Claude 1 launch in 2023 [C013], making its continued reference in 2026
      a multi-year retention signal. Rakuten's participation in the Opus 4.7 launch
      announcement indicates ongoing active deployment and satisfaction with model
      improvements.
    claimRefs: [C013, C014, C019, C033, C034, C035, C036, C041]

  - number: "6.4"
    title: Retention, Churn, and Satisfaction — Evidence Gaps
    body: |
      **Critical Evidence Gap.** No quantitative retention metrics are available for any
      customer segment. The evidence ledger contains zero NRR, gross churn, logo count,
      or cohort retention data. This is the single most significant analytical gap in this
      chapter. The qualitative retention picture (named customers with deep integrations,
      multi-year deals, customer-endorsed performance improvements) is positive, but
      investors cannot underwrite customer quality without quantitative evidence.

      **Qualitative Retention Signals (Positive).**
      (1) Cursor's CursorBench performance advantage (70% vs alternatives) implies high
      switching resistance — replacing the primary model in a production coding IDE
      requires substantial re-testing and product engineering [C041].
      (2) Notion's multi-year presence (since Claude 1, 2023 through Opus 4.7 endorsement,
      2026) [C013, C041] is a ~3-year retention observable.
      (3) The Snowflake $200M multi-year deal term [C033] represents contractual retention.
      (4) MCP ecosystem integration [C020] deepens retention for any enterprise that has
      invested in MCP server implementations for their internal data sources.
      (5) Amazon Bedrock's zero-operator-access architecture [C030] creates compliance
      and audit infrastructure that is costly to replace for regulated industries.

      **Qualitative Retention Signals (Risk).**
      (1) Consumer subscription churn is likely elevated given the highly competitive
      consumer AI market (ChatGPT Plus, Gemini). No data to quantify this.
      (2) Free-to-paid conversion rate is unknown.
      (3) API developer churn is unknown; token billing creates zero minimum commitment,
      so developers can reduce or eliminate spend instantaneously.
      (4) The DoD dispute [C035] could affect government and regulated-industry enterprise
      customer perceptions of Anthropic's operational reliability as a vendor.
      (5) OpenAI and Google model capability improvements could close the SWE-bench
      performance gap and erode the primary switching cost rationale for enterprise
      coding customers.

      Refer to Table T703 for the structured diligence ask framework covering all
      nine priority retention metrics.
    claimRefs: [C013, C015, C016, C017, C018, C020, C030, C033, C035, C040, C041]

  - number: "6.5"
    title: Developer Ecosystem and MCP Community
    body: |
      **Developer Ecosystem as Retention Infrastructure.** The developer ecosystem
      (Cursor, Replit, Zed, Sourcegraph, GitHub Copilot) represents the most strategically
      important customer layer for Anthropic's long-term retention. When a developer
      platform builds core product functionality on Claude (as Cursor has done with its
      coding agent), the platform's own users become indirect Claude consumers — and the
      platform company faces the switching costs of rebuilding their product if they
      change the underlying model.

      **Claude Code Developer Adoption.** Claude Code's 5.5x revenue growth by July 2025
      [C018] is the strongest traction signal in the ledger. Combined with the Bun runtime
      acquisition (December 2025) and deep VS Code/JetBrains/GitHub Actions integrations
      [C017], Claude Code is positioned as the default agentic coding workflow for
      professional software engineers. The anecdote that OpenAI employees were using
      Claude Code until Anthropic revoked access for ToS violations in August 2025 [C039]
      is the most striking third-party validation of product quality — OpenAI engineers
      chose Claude Code as their preferred coding tool even when building competing products.

      **MCP Ecosystem — Developer Expansion Flywheel.** The Model Context Protocol [C020]
      creates a developer expansion flywheel distinct from direct API retention. As
      developers build MCP servers for their own data sources and publish them in the
      growing MCP ecosystem, each new server increases Claude's value to all other
      developers who integrate that data source. This is a classic platform network effect:
      value increases with the number of integrations, and the cost of switching to a
      competing model increases with the number of MCP-based integrations in production.
      Developer count and MCP server count are not publicly disclosed — these are high-
      value metrics to monitor as proxy indicators of ecosystem health.
    claimRefs: [C017, C018, C019, C020, C033, C039, C041]
