figures:
  - id: F701
    title: Customer Acquisition and Expansion Surface Map
    type: customer-surface-map
    layout: wide
    summary: |
      Six-node customer surface map showing Anthropic's customer acquisition entry
      points, primary segments, and expansion dynamics. Evidence for each node is
      grounded in ledger claims. Retention metrics are absent from the evidence set
      (see T703); the map represents structure, not measured expansion rate.
    data:
      items:
        - label: "Entry Surface — Multi-Channel Acquisition"
          detail: |
            Three parallel entry surfaces: (1) claude.ai direct (web/iOS/Android/desktop —
            consumer and prosumer); (2) Direct API (developer self-serve with API key);
            (3) Cloud Marketplace (AWS Bedrock, Google Vertex AI, Microsoft Foundry — enterprise
            procurement via existing cloud relationships [C042]). Each surface addresses a distinct
            buyer persona and procurement motion.
          tone: positive
        - label: "Segment 1 — Individual / Consumer"
          detail: |
            Free and paid (Pro $17–$20/mo; Max $100–$200/mo) subscribers via claude.ai [C016].
            Zero switching cost at Free tier; moderate stickiness at Max (high usage investment,
            workflow integration). Consumer brand awareness evidenced by Super Bowl LX advertising
            investment (Feb 2026). Customer count and churn not disclosed.
          tone: neutral
        - label: "Segment 2 — Developer / API"
          detail: |
            Individual developers and startup teams accessing Claude via direct API or cloud
            marketplace. Token-based billing ($1–$25/MTok [C015]) with no minimum commitment.
            MCP integration capability deepens developer switching cost over time [C020].
            Key developer platform integrations: Replit, Zed, Sourcegraph [C020]. Monthly active
            developer count not disclosed.
          tone: positive
        - label: "Segment 3 — Enterprise SaaS + Agentic"
          detail: |
            Team ($20/seat/mo) and Enterprise (custom) customers using claude.ai with SSO, SCIM,
            HIPAA, and audit log features [C016]. Key named customers: Cursor (70% CursorBench
            task clearance [C041]), Notion, Rakuten, StubHub, Intercom, Harvey. Claude Code deepens
            enterprise developer retention (5.5x revenue growth, July 2025 [C018]); Claude Cowork
            (enterprise GA Feb 2026 [C019]) targets non-technical enterprise users. NRR undisclosed.
          tone: positive
        - label: "Segment 4 — Strategic Enterprise Partnerships"
          detail: |
            Multi-year contractual relationships at $100M+ deal scale. Primary example: Snowflake
            $200M multi-year partnership (Dec 2025 [C033]). Palantir/AWS partnership for classified
            U.S. defense missions [C034] is a strategic account subject to DoD litigation [C035].
            These accounts represent highest-value customers with deepest integration and longest
            contract terms.
          tone: positive
        - label: "Segment 5 — MCP Ecosystem / Developer Platform"
          detail: |
            MCP adopters who build on the open Anthropic protocol standard [C020]: Block, Apollo,
            Replit, Zed, Sourcegraph. These partners expand Claude's integration surface and create
            indirect retention: enterprises using MCP-connected tools are embedded in Claude's
            ecosystem even if they do not have a direct Anthropic contract. Ecosystem expansion is
            an emerging revenue multiplier beyond direct API billing.
          tone: positive
        - label: "Expansion Loop — Benchmark Performance → Customer Advocacy → New Customer Acquisition"
          detail: |
            Evidence-supported virtuous cycle: Claude Opus 4.7 achieves frontier benchmark
            performance (SWE-bench 72.5% [C040]; CursorBench 70% [C041]) → enterprise customers
            (Cursor, Rakuten, Notion) provide named public endorsements [C041] → endorsements
            serve as enterprise sales proof points → new enterprise customers acquired.
            The loop is visible in the pattern of Opus 4.7 launch announcement citations of
            named customer data. Revenue growth (Claude Code 5.5x [C018]) supports this loop
            is working, but causality cannot be isolated from evidence alone.
          tone: positive
    approximationNotes: |
      Customer count, NRR, and expansion revenue by segment are all undisclosed. Node
      descriptions are grounded in named customer evidence (C041, C033, C020) and product
      architecture (C015, C016, C042). The expansion loop node is a structural inference
      from the pattern of evidence, not a measured causal chain.
    claimRefs: [C015, C016, C017, C018, C019, C020, C033, C034, C035, C041, C042]

