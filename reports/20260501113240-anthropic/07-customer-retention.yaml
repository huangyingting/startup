company:
  name: Anthropic

chapter:
  number: 6
  title: Customer & Retention
  summary: |
    Anthropic's customer base spans five overlapping segments: individual/consumer
    (claude.ai Free–Max), SMB/team SaaS (Team plan), enterprise API (Cursor, GitHub,
    Notion, Rakuten, StubHub, Intercom, Harvey, Block), cloud marketplace (Bedrock /
    Vertex AI / Foundry-routed enterprise buyers), and government/defense (Palantir /
    classified, currently under litigation). Named enterprise customers are confirmed
    in evidence with customer-validated performance data for Cursor (70% CursorBench
    task clearance, Opus 4.7 [C041]) and enterprise adoption of Claude Code (5.5x
    revenue growth by July 2025 [C018]). Retention, churn, NRR, and customer count
    are not publicly disclosed — these are the highest-priority data room asks in this
    chapter. The retention signal is rated moderate: customer names and qualitative
    loyalty signals are strong, but no quantitative retention metrics are evidenced.

callouts:
  - type: key-insight
    title: Enterprise Customers Are Building Mission-Critical Workflows on Claude
    body: |
      The depth of enterprise customer integration is the most important retention
      indicator in the evidence ledger. Cursor has integrated Claude Opus 4.7 as its
      core coding engine with a 70% task clearance rate on its internal CursorBench
      benchmark [C041]; GitHub Copilot uses Claude as a backend model; Rakuten and
      Notion both provided named customer endorsements for Opus 4.7 [C041]. These
      are not casual API trials — they are deeply embedded product integrations where
      ripping out Claude would require rebuilding core product functionality. This
      creates structural switching costs that are the strongest available proxy for
      customer retention, absent disclosed NRR data.
    claimRefs: [C041, C017]

  - type: risk-alert
    title: No Retention Metrics Disclosed — Churn, NRR, and Customer Count are Unknown
    body: |
      Anthropic has not disclosed NRR, gross churn, logo count, or cohort retention
      data for any customer segment. The evidence ledger contains zero quantitative
      retention metrics. Investors cannot underwrite customer quality without these
      figures. Priority diligence asks: (1) NRR by segment (consumer, Team, Enterprise,
      API); (2) logo churn for Enterprise and Team tiers; (3) total paying customer
      count by segment; (4) API developer retention rate (monthly active developers
      vs. churned); (5) cloud marketplace customer data accessible to Anthropic via
      AWS/Google reporting. All retention analysis in this chapter is qualitative.
    claimRefs: [C016, C017, C018, C041]

  - type: opportunity
    title: MCP Ecosystem Dramatically Expands Customer Switching Costs Over Time
    body: |
      Each enterprise customer that builds production workflows on MCP-connected Claude
      infrastructure [C020] incrementally raises their own switching costs. When a company
      has invested in MCP server implementations for their internal data sources (Snowflake
      data, DocuSign workflows, FactSet data [C019, C033]), those integrations are
      transferable in theory but operationally sticky in practice. The Snowflake $200M
      multi-year partnership [C033] is the strongest evidence of this lock-in dynamic:
      a $200M deal with a multi-year term represents commitment well beyond a trial or
      opportunistic API call.
    claimRefs: [C019, C020, C033]

