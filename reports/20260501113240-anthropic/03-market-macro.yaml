chapter:
  number: 2
  title: Market Sizing & Macro Analysis
  summary: |
    Anthropic operates at the intersection of three converging markets: AI foundation model
    APIs, enterprise AI software, and the emerging agentic application layer. Evidence from
    the ledger provides strong qualitative signals — record capital inflows, hyperscaler
    compute commitments exceeding $30B, and a 5.5x Claude Code revenue growth rate — but
    no audited market-size figures are available in the evidence set. This chapter presents
    an evidence-constrained TAM/SAM/SOM analysis with explicit gaps, alongside supported
    growth driver and segment analysis. Macro tailwinds are strong and well-attested by
    Anthropic's own funding trajectory and hyperscaler partnership terms.

callouts:
  - type: key-insight
    title: "Hyperscaler Compute Bets Signal $100B+ Market Conviction"
    body: |
      Amazon's ~$8B strategic investment in Anthropic (with AWS as primary cloud provider)
      [C008], Google's $3B+ stake plus access to up to 1 million TPUs targeting 1GW of AI
      compute [C009, C031], and Microsoft/Nvidia's announced $15B investment paired with a
      $30B Azure compute commitment [C032] collectively represent over $50B in infrastructure
      and capital bets by the three largest cloud providers. This level of hyperscaler
      conviction implies multi-hundred-billion-dollar total addressable market expectations
      for AI model services — though the precise figure is not independently evidenced in
      this ledger.
    claimRefs: [C008, C009, C031, C032]

  - type: opportunity
    title: "Agentic AI Layer Creates New Demand Strata Above Classic API"
    body: |
      Claude Code's 5.5x revenue growth by July 2025 [C018] and the enterprise GA of Claude
      Cowork (February 2026) [C019] demonstrate that agentic AI products are unlocking
      willingness-to-pay above raw token pricing. The Model Context Protocol (MCP), open-
      sourced November 2024 [C020], is positioned as an industry infrastructure standard
      for agentic integrations, analogous to USB-C for AI-to-data connectivity. These
      product signals imply the addressable market expands significantly beyond static API
      query volume to include autonomous task completion and workflow orchestration services.
    claimRefs: [C018, C019, C020]

  - type: risk-alert
    title: "Market Sizing Evidence Gap — No Third-Party Analyst Data in Ledger"
    body: |
      The evidence ledger contains no third-party analyst market size figures (e.g., IDC,
      Gartner, McKinsey AI spending reports). All market size estimates below are derived
      from Anthropic's own funding trajectory, hyperscaler partnership values, and pricing
      data. Investors should treat TAM/SAM/SOM figures as evidence-constrained proxies,
      not independently validated analyst estimates. Sourcing market sizing data from
      Gartner, IDC, or Goldman Sachs AI spending forecasts is a recommended diligence path.
    claimRefs: [C005, C006, C007]

