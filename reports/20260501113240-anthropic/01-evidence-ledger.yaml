evidenceGaps:
  - gap: "Audited financial statements or verified revenue figures. Anthropic is private and has not disclosed ARR, gross margin, or burn rate publicly."
    impact: high
    diligencePath: "Request financials directly from Anthropic in data room; seek investor references from Series G LPs."

  - gap: "Series G ($30B) and Series F ($13B) press releases and term sheets are not directly accessible. Valuation figures are sourced via Wikipedia's citations of news reports."
    impact: medium
    diligencePath: "Obtain executed term sheets and investor rights agreements from Anthropic or lead investors (Iconiq, Fidelity, Lightspeed)."

  - gap: "Customer count, enterprise contract values, NRR/retention metrics, and detailed cohort data are not publicly disclosed."
    impact: high
    diligencePath: "Request from Anthropic investor relations; conduct reference calls with known enterprise customers (Cursor, GitHub, StubHub, Intercom)."

  - gap: "CAC, LTV, and unit economics for the API and SaaS products are unavailable. Gross margin on inference workloads is not disclosed."
    impact: high
    diligencePath: "Model from public pricing, estimated compute costs (AWS/Google pricing), and industry benchmarks."

  - gap: "Exact headcount breakdown by function (research vs engineering vs GTM vs policy) is not publicly available."
    impact: low
    diligencePath: "LinkedIn headcount analysis; data room request."

  - gap: "Status of Nvidia and Microsoft investment ($15B) is unclear — announced November 2025 but no executed deal confirmation found."
    impact: medium
    diligencePath: "Seek direct confirmation from Anthropic or Microsoft/Nvidia investor relations."

  - gap: "Outcome of DoD supply chain risk litigation beyond temporary injunction (March 26, 2026) is unknown."
    impact: high
    diligencePath: "Monitor federal court docket; consult legal counsel on DoD remediation risk."

  - gap: "Music copyright lawsuit (Concord/Universal/ABKCO) outcome and financial exposure are unresolved."
    impact: medium
    diligencePath: "Review court filings; assess maximum liability range from $150k per work threshold."
