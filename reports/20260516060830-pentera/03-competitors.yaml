callouts:
  - id: KP001
    calloutType: strength
    title: "Category-First $100M ARR"
    body: >
      Pentera is self-reported to be the first vendor in Gartner's Adversarial Exposure Validation
      category to cross $100M ARR, achieving this milestone in Q4 2025 with 1,200+ enterprise
      customers. No direct peer has disclosed a comparable ARR figure, suggesting a meaningful
      revenue-scale advantage at this stage of market development.
    claimRefs: [CP001, CP002, CP029]

  - id: KP002
    calloutType: risk
    title: "Peer Review Score Deficit"
    body: >
      On PeerSpot, Pentera's 7.7/10 user rating trails Picus Security (9.0), AttackIQ (9.0),
      XM Cyber (8.3), and Cymulate (8.0). A persistent score deficit could indicate product
      satisfaction gaps or deployment friction relative to peers, and may affect competitive
      win rates in procurement processes that rely on peer review platforms.
    claimRefs: [CP009, CP006, CP004, CP007]

  - id: KP003
    calloutType: risk
    title: "Platform Convergence from CrowdStrike"
    body: >
      CrowdStrike Falcon Exposure Management represents a high-severity convergence threat:
      CrowdStrike can offer basic adversarial exposure validation as an add-on to its existing
      endpoint platform at near-zero incremental cost, leveraging a $3.4B ARR customer base.
      Pentera's moat depends on superior depth and production safety of real-exploit execution —
      a differentiation that must be continuously validated through win-rate data.
    claimRefs: [CP026, CP015]

  - id: KP004
    calloutType: recommendation
    title: "Validate NRR and Win/Loss Data"
    body: >
      The most critical missing data points for competitive moat assessment are Pentera's NRR,
      logo churn rate, and win/loss breakdown by competitor. These metrics will determine whether
      Pentera's switching-cost moat is real or theoretical. Diligence must request these figures
      from the data room before advancing.
    claimRefs: [CP040, CP032]


