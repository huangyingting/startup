figures:
  - id: FP001
    title: "Competitive Positioning Map"
    type: quadrant
    layout: wide
    summary: >-
      Ordinal competitive positioning of Pentera vs. primary competitors on two axes: (1) Automation
      Depth (x-axis: human-led manual → fully autonomous adversarial testing) and (2) Platform
      Breadth (y-axis: single-surface point solution → unified multi-surface platform). Pentera
      occupies the high-automation, broad-platform quadrant; only Horizon3.ai approaches it on
      automation depth. Axis scores are evidence-backed ordinal ratings (1–5) derived from product
      documentation and peer review data; numeric precision should not be inferred.
    data:
      points:
        - label: "Pentera"
          x: 5
          y: 5
          note: "Real-exploit automation; Core + Surface + Cloud from single console"
        - label: "Cymulate"
          x: 3
          y: 4
          note: "Simulation-based CTEM; broad scenario library; expanding multi-surface orchestration"
        - label: "AttackIQ"
          x: 3
          y: 3
          note: "MITRE ATT&CK aligned; Flex/Ready/Enterprise tiers; on-prem and cloud campaigns"
        - label: "Picus Security"
          x: 3
          y: 3
          note: "BAS with remediation prioritization engine; expanding EASM+CAASM platform"
        - label: "Horizon3.ai"
          x: 4
          y: 3
          note: "Autonomous NodeZero; strong internal pentest automation; limited multi-surface breadth"
        - label: "XM Cyber"
          x: 4
          y: 4
          note: "Graph-based automation; continuous hybrid attack path coverage; no live exploit execution"
        - label: "SafeBreach"
          x: 3
          y: 2
          note: "Enterprise BAS simulation; single-surface focus; limited public platform roadmap"
        - label: "Manual Pentest Firms"
