  evidenceGaps:
    - id: EP001
      type: private-evidence-only
      severity: material
      topic: "NRR-churn"
      missingEvidence: "Pentera's NRR, logo churn rate, and gross dollar churn -- the primary empirical validators of switching-cost moat claims."
      whyItMatters: "Without NRR data, all switching-cost moat claims remain theoretical. NRR below 110% would undermine the premium valuation multiple for an enterprise SaaS."
      diligencePath: "Request NRR, gross logo churn, and net expansion rate by cohort from Pentera's data room. Ask for the last 4 quarters to verify trend direction."
      relatedQuestionRefs: [QP014, QP019]
      relatedTableRefs: [TP004]

    - id: EP002
      type: private-evidence-only
      severity: material
      topic: "win-loss-by-competitor"
      missingEvidence: "Win/loss data by competitor -- specifically Pentera vs. Cymulate, vs. CrowdStrike Falcon Exposure, vs. Horizon3.ai, and vs. manual pentest firms."
      whyItMatters: "Win-rate data would directly validate competitive positioning claims. Without it, moat durability relies on product documentation and peer reviews, not commercial reality."
      diligencePath: "Request win/loss analysis from Pentera's sales CRM. Focus on deals where CrowdStrike or incumbent endpoint vendors were in the evaluation."
      relatedQuestionRefs: [QP019, QP009]
      relatedTableRefs: [TP004]

    - id: EP003
      type: missing-source
      severity: minor
      topic: "competitor-financials"
      missingEvidence: "Competitor ARR and funding totals -- Cymulate (~$100M est.), Horizon3.ai (~$70M), AttackIQ (~$90M), SafeBreach (~$80M) -- none disclose ARR."
      whyItMatters: "Without verified competitor revenue data, relative competitive scale assessments rely on inferred funding totals and PeerSpot mindshare only."
      diligencePath: "Cross-reference via PitchBook or CB Insights. Check for Israeli press releases or TASE filings for any of these companies."
      relatedQuestionRefs: [QP004, QP005]
      relatedTableRefs: [TP001]

    - id: EP004
      type: missing-source
      severity: minor
      topic: "safebreach-profile"
      missingEvidence: "SafeBreach funding totals, ARR, customer count, and strategic roadmap -- among the least disclosed of primary AEV/BAS competitors."
