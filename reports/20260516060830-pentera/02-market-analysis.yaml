  claims:
    - id: CM001
      statement: "Adversarial Exposure Validation (AEV) is a market category formally defined by Gartner in 2024, encompassing tools that autonomously simulate attacker techniques to validate security control efficacy, including BAS, CART, and attack path validation."
      type: third-party-reported
      topic: "market-definition"
      sourceRefs: [SM017]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM007]

    - id: CM002
      statement: "Pentera's market is distinct from manual penetration testing services: AEV platforms provide continuous, software-driven attack simulation versus point-in-time human engagements typically costing $15,000–$50,000 per assessment."
      type: observed
      topic: "market-boundary"
      sourceRefs: [SM005, SM003]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM008, QM009]

    - id: CM003
      statement: "The primary status quo substitutes for AEV platforms are: annual manual penetration testing engagements, internal red teams, and point-in-time vulnerability scanners (Qualys, Tenable, Nessus) that identify but do not validate exploitability."
      type: observed
      topic: "market-substitutes"
      sourceRefs: [SM003, SM004, SM005]
      confidence: high
      freshness: current
      answersQuestionRefs: [QM009]

    - id: CM004
      statement: "Gartner's Continuous Threat Exposure Management (CTEM) framework provides a five-stage cycle—scope, discover, prioritize, validate, mobilize—that contextualizes AEV platforms within a broader enterprise security workflow."
      type: third-party-reported
      topic: "market-framework"
      sourceRefs: [SM012, SM014]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QM007, QM019]

    - id: CM005
      statement: "The Breach and Attack Simulation (BAS) market is the closest single analyst-published category to Gartner's AEV definition and is used as the primary sizing proxy for Pentera's SAM in this analysis; AEV as a Gartner category supersedes BAS and includes CART and attack path validation."
      type: observed
      topic: "market-proxy"
      sourceRefs: [SM001, SM002, SM017]
      confidence: medium
      freshness: current
