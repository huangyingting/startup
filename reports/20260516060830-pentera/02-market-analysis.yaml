callouts:
  - calloutType: insight
    title: "AEV Is a Regulatory-Tailwind Market"
    body: >-
      The simultaneous activation of the SEC cybersecurity rule (July 2023), DORA (January 2025), and
      PCI-DSS 4.0 (March 2025) creates a multi-year regulatory compliance floor that cannot be unwound.
      CISOs who previously could defer continuous validation cannot do so under these regimes, compressing
      the evaluation cycle and reducing the 'do nothing' option for large regulated buyers.
    claimRefs: [CM023, CM024, CM025]

  - calloutType: risk
    title: "Analyst Market Sizing Contradiction"
    body: >-
      The two primary analyst firms disagree by approximately 30% on 2025 BAS market size ($0.91B vs.
      $1.05B), with the discrepancy stemming from inconsistent scope definitions. Neither has published a
      Gartner-aligned AEV estimate, meaning Pentera's TAM claims in investor materials may rest on
      proprietary or unpublished data. This is a diligence risk: the market may be smaller or
      slower-growing than the most favorable estimate.
    claimRefs: [CM007, CM008, CM040]

  - calloutType: strength
    title: "Software Displacing Manual Pentesting at Scale"
    body: >-
      50% of CISOs now cite software-based pentesting as their primary method—a reversal of the conventional
      view that automated testing was too risky for production environments. This sentiment shift is a
      structural demand driver for AEV platforms and validates Pentera's bet that automated adversarial
      testing would become standard enterprise practice.
    claimRefs: [CM018]

  - calloutType: assumption
    title: "AEV Market = BAS Market (Approximation)"
    body: >-
      This chapter uses the BAS market as the primary sizing proxy for Pentera's SAM. Gartner's AEV category
      (coined 2024) is broader than BAS and may include tools from adjacent categories. This approximation
      likely understates the SAM by 10–30%, but without a published Gartner AEV market sizing report, BAS
      is the most defensible proxy available.
    claimRefs: [CM005, CM007, CM008]

