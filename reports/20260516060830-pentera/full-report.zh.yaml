    type: cohort
    layout: wide
    summary: 按层级估计企业 SaaS 留存队列基准，将 Pentera 推断的留存轨迹与最佳、平均和低于平均的同业队列对比。数值为分析师估计；Pentera 未披露实际队列数据。
    data:
      columns:
        - 第 12 个月（% 留存）
        - 第 24 个月（% 留存）
        - 第 36 个月（% 留存）
      rows:
        - label: 最佳企业安全 SaaS（NRR >120%；如 CrowdStrike 2020 队列）
          values:
            - value: 95
            - value: 91
            - value: 88
        - label: 高于平均的平台（NRR 约 115%；已安装客户群扩张）
          values:
            - value: 92
            - value: 87
            - value: 83
        - label: Pentera 推断轨迹（NRR 约 110-115%，估计；未披露）
          values:
            - value: 90
            - value: 85
            - value: 81
        - label: 平均企业安全 SaaS（NRR 约 105-110%）
          values:
            - value: 87
            - value: 80
            - value: 75
        - label: 低于平均的平台（NRR 约 98%；扩张有限）
          values:
            - value: 80
            - value: 70
            - value: 62
    claimRefs:
      - CU017
      - CU025
      - CU031
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: 3x3 影响-可能性风险热力图，按影响严重程度（纵轴）和发生可能性（横轴）绘制截至 2026 年 5 月 Pentera 的关键风险事件。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 关键影响
          values:
            - label: 平台供应链攻击；IP 诉讼
            - label: 以色列出口管制执法行动；Pentera Labs 关键团队流失
            - label: 以色列总部受地缘政治扰动；主要客户发生生产测试事故
        - label: 高影响
          values:
            - label: FedRAMP 授权失败；美国 BIS 执法
            - label: NRR 降至 100% 以下；MSSP 渠道集中导致流失
            - label: Microsoft 或 CrowdStrike 以企业级规模进入竞争性 AEV
        - label: 中等影响
          values:
            - label: GDPR 执法行动；专利纠纷
            - label: Cloud API 依赖失效；CFO/销售领导层流失
            - label: 金融服务垂直行业客户预算收缩
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: 有向无环图，展示根因风险事件如何经由运营和财务中介传导，最终造成 ARR 放缓和估值压缩。
    data:
      nodes:
        - id: RT1
          label: 地缘政治升级（以色列）
          note: 根因：以色列总部、研发团队和运营连续性直接受扰
        - id: RT2
          label: 出口管制行动（DDEC/BIS）
          note: 根因：监管执法阻断国际销售或部署
        - id: RT3
          label: 生产测试事故
          note: 根因：PST 失败，意外损坏客户系统
        - id: RT4
          label: 竞争性 AEV 进入（MSFT/CRWD）
          note: 根因：大型平台厂商发布企业级规模的生产安全 AEV
        - id: RT5
          label: 关键人员离职（Labs/CTO）
          note: 根因：核心研发领导层流失，拖慢漏洞利用库更新速度
        - id: RT6
          label: R&D 速度下降
          note: 中介：漏洞利用库更新变慢，削弱平台差异化
        - id: RT7
          label: ARR 放缓
          note: 中介：新客户获取减少或 NRR 恶化，压低 ARR 增速
        - id: RT8
          label: 估值压缩
          note: 结果：增长指标恶化，带来更低 ARR 倍数或 down-round 风险
        - id: RT9
          label: 资本 / IPO 风险
          note: 结果：融资难度上升或 IPO 窗口关闭
      edges:
        - from: RT1
          to: RT6
          label: 扰动以色列 R&D 团队
        - from: RT1
          to: RT7
          label: 拖慢国际扩张
        - from: RT2
          to: RT7
          label: 阻断关键市场收入
        - from: RT3
          to: RT7
          label: 客户信任受损触发流失
        - from: RT4
          to: RT7
          label: 价格压缩与流失
        - from: RT5
          to: RT6
          label: R&D 护城河侵蚀
        - from: RT6
          to: RT7
          label: 差异化丧失 → NRR 下降
        - from: RT7
          to: RT8
          label: ARR × 倍数压缩
        - from: RT7
          to: RT9
          label: 资本需求上升
        - from: RT8
          to: RT9
          label: down-round 风险
    claimRefs:
      - CR001
      - CR004
      - CR005
      - CR006
      - CR015
      - CR030
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: 关键依赖关系图，展示 Pentera 的平台能力和收入如何依赖 Pentera Labs R&D、云 API、MITRE ATT&CK、MSSP 渠道、ITSM 集成与投资人资本。
    data:
      nodes:
        - id: DP1
          label: Pentera Labs R&D
          note: 主要竞争护城河；生成漏洞利用库；100+ CVE 署名；集中在以色列
        - id: DP2
          label: MITRE ATT&CK 框架
          note: 外部公共分类体系；Pentera 整个发现项报告层都映射到 ATT&CK 技术
        - id: DP3
          label: AWS / Azure / GCP 云 API
          note: Pentera Cloud 模块依赖云提供商 API 来做云原生攻击模拟
        - id: DP4
          label: MSSP 渠道合作伙伴
          note: ARR 的 15-25%（估计）；渠道触达中端市场；MSSP 集中风险未量化
        - id: DP5
          label: ServiceNow / Jira ITSM
          note: Pentera Resolve 的自动工单依赖 ITSM 平台 API；工作流集成创造切换成本
        - id: DP6
          label: 投资人资本（Insight/K1/Evolution）
          note: $150M Series C 现金跑道；盈利前扩大 GTM 需要增长资本
        - id: DP7
          label: 验证引擎（Core/Surface/Cloud/Resolve）
          note: 核心平台能力；把漏洞利用库、云 API 和 ITSM 汇入单一工作流
        - id: DP8
          label: 企业客户 ARR
          note: 1,200+ 客户；$100M ARR；收入结果依赖所有上游依赖
      edges:
        - from: DP1
          to: DP7
          label: 漏洞利用库输入验证引擎
        - from: DP2
          to: DP7
          label: ATT&CK 分类体系将发现项映射到矩阵
        - from: DP3
          to: DP7
          label: 云 API 启用 Pentera Cloud 模块
        - from: DP5
          to: DP7
          label: ITSM 连接器启用 Resolve 修复
        - from: DP4
          to: DP8
          label: MSSP 渠道带来客户 ARR
        - from: DP6
          to: DP1
          label: 资本资助 Labs R&D 人员扩张
        - from: DP7
          to: DP8
          label: 平台能力 → 客户结果 → ARR
    claimRefs:
      - CR020
      - CR021
      - CR022
      - CR023
      - CR025
  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: 有向流程图，展示五个证据支柱（市场规模、产品证明、竞争护城河、财务画像、风险画像）与估值纪律如何共同得出有条件的 TRACK 建议。
    data:
      nodes:
        - id: RL1
          label: AEV 市场规模（$4B+ TAM，强制合规需求）
          note: Gartner AEV 品类；SEC/NIS2/DORA 监管需求驱动
        - id: RL2
          label: 客户证明（$100M ARR，1,200+ 企业）
          note: Fortune 500 标识客户；MSSP 渠道；金融服务 / 医疗健康 / 能源垂直行业
        - id: RL3
          label: 竞争护城河（6 年 PST 记录，Pentera Labs）
          note: 100+ CVE 署名；没有竞争平台具备同等生产安全历史
        - id: RL4
          label: 财务画像（Series C，约 10x ARR，NRR 未披露）
          note: 收入规模强；NRR 不透明是主要财务信息缺口
        - id: RL5
          label: 风险画像（以色列总部、出口合规、供应链）
          note: 地缘政治集中；DDEC/BIS 状态未确认；SOC2 未确认
        - id: RL6
          label: 估值纪律（$1B，对应 10x ARR — 合理，但不低估）
          note: 可比私募轮为 8-12x ARR；上市可比公司为 10-22x NTM
        - id: RL7
          label: 阻断性尽调闸门（NRR、SOC2、出口合规）
          note: 升级建议前必须确认三项
        - id: RL8
          label: TRACK（有条件）— 若闸门确认则升级至 BUY
          note: 基准情景回报 2.5-3x；乐观情景 4-6x；悲观情景 1.2-1.5x；概率加权 2.5-3x
      edges:
        - from: RL1
          to: RL8
          label: 支撑正向投资逻辑
        - from: RL2
          to: RL8
          label: 确认产品市场匹配
        - from: RL3
          to: RL8
          label: 支撑溢价倍数
        - from: RL4
          to: RL7
          label: NRR 缺口触发阻断闸门
        - from: RL5
          to: RL7
          label: 合规缺口触发阻断闸门
        - from: RL6
          to: RL8
          label: 当前 ARR 下定价合理；回报取决于增长
        - from: RL7
          to: RL8
          label: 闸门解决 → TRACK 确认或升级
    claimRefs:
      - CV007
      - CV018
      - CV025
      - CV030
      - CV031
      - CV037
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: 柱状图展示三种 ARR 情景下，退出估值对 ARR 倍数假设的敏感性，说明增长率和退出倍数决定的结果区间。
    data:
      items:
        - label: 悲观：$175M ARR，7x
          value: 1225
        - label: 悲观：$175M ARR，8x
          value: 1400
        - label: 基准：$275M ARR，10x
          value: 2750
        - label: 基准：$275M ARR，12x
          value: 3300
        - label: 乐观：$400M ARR，15x
          value: 6000
        - label: 乐观：$400M ARR，18x
          value: 7200
    claimRefs:
      - CV013
      - CV014
      - CV015
      - CV016
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 区间图展示低位 / 基准 / 高位退出估值情景及中点估计，基于 ARR CAGR 和退出倍数假设。进入估值 = $1B（2024 年 12 月 Series C）。
    data:
      items:
        - label: 悲观情景退出（2027-2029）
          low: 1200
          high: 1500
          mid: 1375
        - label: 基准情景退出（2027-2029）
          low: 2500
          high: 3600
          mid: 3000
        - label: 乐观情景退出（2027-2029）
          low: 4000
          high: 8000
          mid: 5000
    claimRefs:
      - CV015
      - CV016
      - CV017
      - CV018
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: wide
    summary: 投委会评分仪表盘，覆盖 8 个维度：市场、产品、客户、财务、团队、风险、估值和证据质量。评分为 1-5（5=最佳）。
    data:
      items:
        - label: 市场机会
          value: 4 / 5
          note: AEV TAM 到 2027 年达 $4B+；强制合规需求；Gartner 品类已验证
        - label: 产品 / 护城河
          value: 4 / 5
          note: 6 年 PST 记录；Pentera Labs CVE 护城河；4 模块平台；CTEM 定位
        - label: 客户证明
          value: 4 / 5
          note: $100M ARR，1,200+ 企业；Fortune 500 标识客户；垂直行业渗透强
        - label: 财务画像
          value: 3 / 5
          note: ARR 规模强；NRR、毛利率、烧钱速度未披露 — 重大信息缺口
        - label: 团队 / 执行
          value: 3 / 5
          note: 创始人 CEO 强；Labs 领导层深度未经验证；新 CFO（任期短）
        - label: 风险画像
          value: 2 / 5
          note: 以色列总部集中；DDEC/BIS 未确认；供应链攻击风险；竞争风险
        - label: 估值纪律
          value: 3 / 5
          note: 10x ARR — 合理，但不低估；回报取决于增长执行，而非重估
        - label: 证据质量
          value: 3 / 5
          note: 市场 / 产品公开证据强；NRR、合规、财务情况需要数据室确认
    claimRefs:
      - CV001
      - CV002
      - CV007
      - CV008
      - CV019
      - CV025
