            title: 验证 NRR 与赢 / 输数据
            body: >
              评估竞争护城河最关键的缺失数据点是 Pentera 的 NRR、logo 流失率，以及按竞争对手拆分的赢 / 输情况。这些指标将决定 Pentera
              的切换成本护城河是真实存在，还是只停留在理论上。继续推进前，尽调必须向数据室索取这些数字。
            calloutType: recommendation
            claimRefs:
              - CP040
              - CP032
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与牵引力
        blocks:
          - type: paragraph
            body: >
              Pentera 采用 100% SaaS 订阅模式，向金融服务、医疗、制造、政府和科技垂直行业组织销售年度企业授权。收入分布在四个产品上：Pentera Core（内部网络验证）、Pentera
              Surface（外部攻击面管理）、Pentera Cloud（云和混合验证）以及 Pentera Resolve（自动化修复编排）。公司不销售按席位、按节点或基于用量的授权；所有合同都是企业级年度订阅，通过直销或
              MSSP 渠道合作伙伴谈判签署。

              Pentera CEO 于 2026 年 1 月披露，公司在 2025 年 Q4 突破 $100M ARR，使 Pentera 成为 Gartner Adversarial Exposure Validation
              品类首家达到这一收入里程碑并获得 Centaur 地位的公司。CEO 指出，从 2019 年市场发布算起，Pentera 达到 $100M ARR 的速度快于 CrowdStrike
              的标杆时间线——这使其成为这一代产品中增长最快的企业网络安全 SaaS 公司之一。以 1,200+ 企业客户计，隐含平均 ACV 约为 $83K；这一数字低于典型企业级 SaaS
              定位所暗示的水平，需要通过数据室中的 ACV 分布数据进一步拆解。
            claimRefs: []
