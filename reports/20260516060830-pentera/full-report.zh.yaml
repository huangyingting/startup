      - number: '6.2'
        title: 客户采用轨迹和部署证据
        blocks:
          - type: paragraph
            body: >
              Pentera 的采用轨迹体现了从 2019 年 GA 发布（当时名为 Pcysys）到 2026 年 1 月 $100M ARR 里程碑的复合增长。Series D（K1 Investment
              Management，2024 年 1 月）提供增长资本，Series C（$150M，2024 年 12 月）则显示增长仍在加速。ARR 从估算的 $60–70M 区间（Series C 前）增至 2026 年
              1 月的 $100M；取决于基准期，隐含 YoY ARR 增长为 40–67%，符合企业安全 SaaS 头部四分位的轨迹。

              1,200+ 企业部署数字由管理层披露，并得到 Insight Partners、Evolution Equity 和 K1 Investment Management
              佐证；这些是活跃的生产级部署，不是试用。Pentera 明确营销无代理、单日部署模型，G2 评价者也确认平均 3 个月获得价值，说明部署摩擦较低。

              第三方验证者——SecurityWeek、DarkReading、VentureBeat、CyberScoop 和 SC Magazine——都独立报道了 $100M ARR
              里程碑，且没有相互矛盾的报道，增强了该指标可信度。Pentera 的 AWS Marketplace 列表确认其拥有云采购渠道，可服务偏好通过市场采购的企业和公共部门买方。

              DXC Technology 在 2026 年 1 月宣布战略合作，以托管服务形式交付自动化安全验证。这是一个高价值具名渠道伙伴，可在不增加直接客户数的情况下扩大有效客户触达。
