      - number: '5.2'
        title: 客户工作流和平台用例
        blocks:
          - type: paragraph
            body: >
              Pentera 在企业里的核心用例，是用连续、自动化的安全验证替代或补强周期性人工渗透测试。传统渗透测试通常由第三方测试人员每年做 2–4 次，范围限定在特定网段，并产出静态的时点报告。Pentera
              用持续在线验证替代这套流程；每次补丁、配置变更或新部署之后，平台都会重新运行验证。

              五个核心工作流阶段是：（1）定义范围——CISO 配置要验证的网段、云环境或外部暴露面；（2）自动化对抗测试——Pentera
              在既定范围内用真实漏洞利用技术执行生产安全的攻击链；（3）攻击路径映射——平台识别成功利用路径，并把每个发现映射到 MITRE ATT&CK 技术；（4）优先级修复——Pentera Resolve 在
              ServiceNow 或 Jira 中自动创建工单、分配责任人并跟踪修复状态；（5）持续闭环——修复后平台重新验证，确认问题关闭。这个闭环模型，是 G2 评价者报告 8 个月 ROI 回本、官网宣称 MTTR
              改善 90% 的主要驱动。

              客户行业覆盖金融服务（监管合规）、医疗（HIPAA 验证）、制造（OT 网络暴露）、政府（FISMA/NIST 合规）和科技（持续 DevSecOps 验证）。Pentera 的「why
              us」页面强调的客户成果包括第三方渗透测试成本下降 60%、网络风险下降 80%；不过这些都是公司汇总口径的宣称指标，没有独立审计背书。
            claimRefs: []
          - type: table
            tableRef: TE002
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
