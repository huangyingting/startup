          - type: callout
            title: 三项不可妥协的数据室请求
            body: >
              财务承销推进前必须解决三项数据室请求：（1）按队列年份（2020-2025）拆分 NRR，以验证切换成本护城河；（2）分别列示计入和不计入 R&D 漏洞利用研究成本至 COGS
              的毛利率；（3）按客户层级和队列年份拆分 ACV 分布，以解释隐含 $83K 的差异。缺少这三项指标，Pentera 的投资案例在战略上可支持，但财务上无法验证。
            calloutType: recommendation
