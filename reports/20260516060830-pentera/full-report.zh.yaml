  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Pentera 所处市场是 Adversarial Exposure Validation（AEV）。Gartner 于 2024
              年正式提出该品类，用来描述能够针对生产环境自主模拟真实攻击技术、验证安全控制有效性的工具。AEV 位于更广义的 Continuous Threat Exposure
              Management（CTEM）框架内；CTEM 也由 Gartner 确立，规定安全团队以五步循环（范围界定、发现、优先级排序、验证、动员）持续管理暴露，而非周期性处理。Pentera 平台覆盖验证和动员阶段。

              AEV 市场包括：自动化 breach and attack simulation（BAS）工具、continuous automated red teaming（CART）、attack path
              validation（APV）以及外部攻击面验证。它不包括：人工渗透测试服务（人类顾问）、SIEM/SOAR
              平台、端点检测与响应（EDR）、漏洞扫描器（Qualys、Nessus），以及主要聚焦资产发现而不主动模拟漏洞利用的广义暴露管理平台。

              与 AEV 最接近的单一分析师品类是 BAS
              市场，本章将其作为主要规模测算代理。更广义的渗透测试市场（包括人工服务）则作为次级规模视角，用来建立总可用市场（TAM）。关键现状替代方案包括：人工渗透测试项目（行业平均每次
              $15–50K，通常每年执行）、内部红队（资源受限，连续覆盖有限），以及只能识别但不验证可利用性的一次性漏洞扫描。

              可能出现支出重叠的相邻市场包括：External Attack Surface Management（EASM）、Cyber Asset Attack Surface
              Management（CAASM）、托管检测与响应（MDR）以及网络保险承保工具。BAS、EASM 和红队自动化正在向统一 AEV 平台收敛，这是塑造 2031 年前竞争格局的核心架构趋势。
            claimRefs:
              - CM001
              - CM002
              - CM003
