      - number: '1.3'
        title: 融资历史与投资人生态
        blocks:
          - type: paragraph
            body: >
              Pentera 已从一批知名风险投资和成长股权投资人处完成五轮公开报道的融资。公司最早的机构资金来自 AWZ Ventures（也称 AWZ Capital），由 Yaron Ashkenazi 领导；该机构在
              2018 年公司还没有客户时领投种子轮。Blackstone——全球最大另类资产管理机构之一——同时成为客户和 Series A 投资方后，Pentera 的发展轨迹显著加速；时任 Blackstone 全球
              CISO 的 Adam Fletcher 是关键内部推动者。这种客户兼投资人的双重关系，为 Pentera 在北美大规模打开企业销售通道。Insight Partners 于 2020 年 COVID
              期间融资热潮中加入，CEO 曾把这一刻形容为「被 Harvard 录取」；据报道 Series B 获得超额认购。K1 Investment Management 和 Evolution Equity
              Partners 支持后续成长轮，重点放在全球 GTM 扩张和 ARR 加速。Farallon Capital Management 和其他投资者参与了 2024 年 12 月 Series
              C。最近一轮披露融资——2024 年 12 月 $150M Series C——把公司估值推至约 $1B，确认了其此前在 2021 年 12
              月已建立的独角兽地位。各轮累计股权融资总额没有公开披露，但按已报道轮次计算超过 $250M。公司未公开披露债务融资或收入融资工具。
