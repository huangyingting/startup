  - id: TV006
    title: 最终尽调要求表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 按队列划分的净收入留存（NRR）（3 年）
        - NRR 从未公开披露；客户评价或分析师报告中也没有代理指标
        - NRR 是区分 3x 与 1.2x 回报的单一指标；观察需确认 >110%，买入需确认 >115%
        - 管理层 / 数据室 — 要求提供按队列划分的季度 NRR、扩张模块附加率
      - - SOC 2 Type II 审计报告
        - 未公开确认 SOC 2 Type II 或 ISO 27001；信任页面声称安全合规，但没有审计文件
        - 在 1,200+ 企业部署规模下，供应链风险关乎生死；缺失审计会挡住专注安全的机构 LP
        - 管理层 / 数据室 — 要求将最新 SOC 2 Type II 报告作为交割条件；不可协商
      - - 以色列 DDEC 出口牌照状态
        - 100+ 已部署地区的国家限制矩阵或 DDEC 牌照范围没有公开披露
        - DDEC 不合规可能追溯性阻断关键国际市场收入，并制造监管责任
        - 法律顾问审查 — 要求提供 DDEC 牌照范围、国家限制矩阵，以及外部律师对 EAR 状态的意见
      - - P&L — 烧钱速度、毛利率、经营杠杆
        - 财务报表、烧钱速度或毛利率均未公开披露；$150M Series C 现金跑道未知
        - 烧钱速度决定 IPO 时间表紧迫性；毛利率决定平台经济性质量；经营杠杆验证可扩展性
        - 管理层 / 数据室 — 要求提供 2025 年 Q1-Q4 财务、按模块划分的毛利率、CAC/LTV，以及通向 IPO 的烧钱桥
      - - MSSP 渠道收入集中度
        - MSSP 渠道 ARR 估计占总额 15-25%；前三大 MSSP 集中度未知
        - 如果前三大 MSSP 占渠道 ARR >70%，单一流失事件可能压缩总 ARR 的 10-15%
        - 管理层 / 数据室 — 要求提供按合作伙伴划分的渠道收入（匿名化）、前三大集中度
      - - Pentera Labs 团队构成与留存
        - Labs 团队员工数、研究员身份、留存包和 IP 转让协议未公开
        - Labs 是主要竞争护城河；关键人物风险是护城河侵蚀路径；必须确认团队深度和留存
        - 管理层 / 数据室 — 要求提供 Labs 组织图、留存安排、IP 转让和 CVE 归因映射
      - - 优先权堆叠与股权结构表
        - Series B/D/C 的清算优先权未知；优先权悬置可能实质压低普通股回报
        - 下行情景下，普通股价值完全取决于优先权结构；没有该结构就无法建模回报
