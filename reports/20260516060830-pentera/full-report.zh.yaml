      - number: '7.2'
        title: 监管、法律和地缘政治风险
        blocks:
          - type: paragraph
            body: >
              Pentera 注册于以色列，平台执行真实世界的进攻性攻击技术，因此受以色列国防部（IMOD）国防出口管制局（DDEC）的出口管制监管。以色列法律（Defense Export Controls Law
              5766-2007 和 Dual-Use Goods Law）要求，具有两用或进攻性特征的网络安全产品出口商，必须针对特定终端用户国家和用例取得许可证。Pentera 没有公开披露是否为全部 100+
              部署国家持有所需 DDEC 许可证，这是应在数据室解决的尽调缺口。

              美国出口管制暴露来自 EAR（Export Administration
              Regulations）对含加密和进攻性网络能力产品的适用性，尤其是向以色列实体出口或由其出口的产品。涉及受限终端用户（例如受禁运司法辖区的政府 / 国防客户）的 Pentera 销售，都与 Commerce
              Department 的 Entity List 和 BIS 出口执法相关。尚未发现美国 BIS 对 Pentera 采取行动的证据。

              GDPR 风险来自 Pentera 云交付的 AEV 扫描，它会为欧盟客户处理企业网络数据（IP 地址、凭据、漏洞数据）。Pentera 的信任页面显示存在数据处理条款，但 Data Processing
              Agreement 结构、子处理方名单和数据驻留架构的公开披露有限。这给受 GDPR 监管的欧盟企业客户留下合规缺口。

              截至 2026 年 5 月，美国、欧盟或以色列任何法院或监管登记中，都没有针对 Pentera 的公开诉讼、专利纠纷或监管执法记录。SEC EDGAR D 表搜索确认，Pentera
              已按融资轮提交投资通知（美国私募发行 Form D），但没有任何 Form S-1 或注册声明显示 IPO 临近。
