        - 未披露继任计划；没有公开 co-CEO 或总裁作为运营层
        - 索取管理层继任计划和 CEO 留任方案结构
      - - CTO / 工程负责人（以色列）
        - 技术路线图领导和架构决策集中在以色列；存在地缘政治敞口
        - 低-中 — 以色列冲突风险增加集中度维度
        - 高 — 平台复杂度要求稳定的技术领导
        - 未披露继任计划；以色列集中度叠加地缘政治风险
        - 索取 CTO 留任方案；确认以色列之外的工程领导分布
      - - Pentera Labs 研究负责人（漏洞利用库与 CVE 研究）
        - 自研漏洞利用库质量取决于资深研究人员连续性；团队深度没有公开文件可查
        - 中 — 专业进攻性安全研究人才全球稀缺
        - 严重 — Pentera Labs 产出就是竞争差异化引擎；离任 = 护城河被侵蚀
        - 未披露继任；无公开期刊发表可验证板凳深度
        - 索取 Labs 团队组织架构、留任方案，以及 IP 所有权 / 转让确认
      - - CFO — Hagit Ynon（2025 年新近任命）
        - 新 CFO 任命释放 IPO 准备信号；任期短带来 IPO 准备执行风险
        - 低 — CFO 任命本身是正面；风险在执行
        - 中 — IPO 准备是一条 2 年执行线；CFO 任期 < 12 个月
        - 外部任命释放专业化信号；风险在于新高管能否融入
        - 评估 IPO 准备时间表和财务报告基础设施成熟度
      - - 美国销售领导层（GTM 执行）
        - 美国市场可能贡献 ARR 的 40-50%；美国销售执行决定近期增速
        - 中 — 成长期转换中，企业销售领导层流失并不少见
        - 高 — 美国销售放缓会是投资逻辑恶化的第一个信号
        - VP Sales 或 CRO 的身份、任期、配额达成历史均无公开信息
        - 要求提供美国销售领导层组织图、任期、配额达成率和管线指标
      - - 客户成功领导层（NRR 执行）
