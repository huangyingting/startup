      - number: '8.3'
        title: 牛 / 基准 / 熊情景分析
        blocks:
          - type: paragraph
            body: >
              基准情景假设 Pentera 到 2028 年维持 25–30% ARR CAGR，IPO 时达到 $250–300M ARR。按 12x NTM ARR
              倍数计算——对毛利率强的品类领导者而言偏保守——基准退出估值为 $3–3.6B。从 $1B 入场估值出发，并考虑潜在 Series D/IPO 带来的 20–25% 稀释，Series C 层级机构投资者可实现约
              2.5–3x 毛回报。这低于创投回报门槛，但对大规模成长基金而言，是一笔优质成长股权投资。

              牛市情景需要三个额外因素：（1）CTEM 平台集成推动 NRR 超过 120%，客户扩展到多个模块；（2）Pentera Resolve 和修复工作流集成形成平台黏性护城河，阻止竞争替代；（3）IPO
              或战略收购时点抓住 15–18x NTM ARR 倍数。在这些条件下，退出估值达到 $4–6B，意味着 Series C 投资者获得 4–6x 回报。牛市情景需要成功取得 FedRAMP 授权，以打开 $2–5B
              美国联邦市场细分。

              熊市情景假设 2026–2027 年竞争使 AEV 商品化，NRR 披露确认低于 110% 留存，ARR 增长放缓至 15–20% CAGR。按 $175M ARR 上 7–8x ARR 倍数计算，退出估值达到
              $1.2–1.4B，最多只有 1.2–1.4x 毛回报；按时间调整后等同于资本损失。熊市情景主要由 Microsoft 或 CrowdStrike 以平台捆绑形式发布企业级生产安全 AEV 触发。

              关键情景概率：基于当前证据，基准情景约 50%；牛市情景约 25%；熊市情景约 25%。概率分布较宽，反映了缺少 NRR、出口合规和竞争响应数据带来的高信息不对称。
