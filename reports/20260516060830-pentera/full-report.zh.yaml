      - number: '5.4'
        title: 部署、集成和平台成熟度
        blocks:
          - type: paragraph
            body: >
              Pentera 以单个虚拟设备部署，可以本地部署，也可以云托管，避开了漏洞管理平台常见的终端代理安装复杂度。从部署到首次验证通常不到一天；G2 评价者报告的完整实施周期平均为 3
              个月，包括范围配置、集成设置和工作流调优。没有代理足迹既是部署优势，也是安全姿态优势：Pentera 不会在每个终端上运行代理软件，从而扩大客户自身攻击面。

              50+ 集成连接器覆盖五类：SIEM 和日志（Splunk、Microsoft Sentinel、IBM
              QRadar）、漏洞管理（Tenable、Qualys、Rapid7）、云安全（Wiz、Lacework、AWS Security Hub）、终端检测（CrowdStrike、SentinelOne、Carbon
              Black），以及工单 / ITSM（ServiceNow、Jira、BMC Helix）。集成密度带来切换成本：移除 Pentera，就要在每个已连接系统里重建修复工作流。Pentera 的技术合作伙伴页面列出
              CrowdStrike、Tenable 和 Wiz 为认证集成伙伴，说明不是单向导出，而是双向数据共享。

              平台成熟度最高的是 Core（2019 年以来 GA，1,200+ 客户）和 Surface（约 2021 年以来 GA）。Cloud 已生产 GA，但云专项验证深度缺少更多独立验证。Resolve
              是最新模块（约 2022–2023 年推出），Core 客户采用率未披露。截至 2026 年 5 月，Pentera 官网尚未公开确认 SOC 2 Type II 和 FedRAMP
              认证状态；这对受监管行业客户是一个尽调缺口。
            claimRefs: []
