      - number: '8.5'
        title: 图表
        blocks:
          - type: callout
            title: NRR 是最重要的单一未知数
            body: >
              本分析中的每个情景都围绕 NRR 转动。当 NRR >115% 时，Pentera 的扩张收入可以覆盖新 logo 获取成本，并支撑 12–15x ARR 倍数，盈利路径也清晰。当 NRR <100%
              时，Pentera 的 ARR 增长就是跑步机——新 logo 只是替代流失的基础客户，没有扩张经济性。以 $1B 估值和 10x ARR 入场，投资者买的是扩张，而不仅是获客。如果 NRR 低于
              110%，投资价格需要重新谈判，或不应建仓。
            calloutType: insight
            claimRefs:
              - CV003
              - CV011
              - CV013
              - CV017
          - type: callout
            title: 平台打包风险：最被低估的竞争情景
            body: >
              熊市情景概率目前估计为 25%，但尾部很肥。如果 Microsoft 或 CrowdStrike 把生产安全 AEV 作为 $0 增量插件加入企业安全套件，Pentera $100K+ ACV
              产品将直接面对定价危机。这不是 3–5 年后的情景——两家厂商都已公开路线图，包含攻击模拟组件。在这些能力达到企业级生产安全之前的 12–18 个月窗口，是 Pentera
              最明确的战略紧迫期。正确回应不是产品同质化，而是平台深度——Pentera Resolve 的 ITSM 集成创造的黏性，是纯 AEV 打包难以复制的。
            calloutType: risk
            claimRefs:
              - CV009
              - CV016
              - CV023
              - CV032
          - type: callout
            title: 以色列独角兽溢价：折扣合理
            body: >
              Pentera 的 $1B 估值，相比 ARR（$100M）和增长画像（30%+ CAGR）相近的美国总部同行有小幅折扣，反映了地缘政治风险溢价，以及私募市场对 NRR
              的信息不对称。基于现有证据，这一折扣是合理的。重要的是，以色列网络安全退出生态（XM Cyber、Checkmarx、SentinelOne IPO）证明，以色列创立的公司可以在退出时获得完整公开市场估值。如果
              NRR 和经营指标披露，并显示品类领导者质量，IPO 后这一折扣应会收窄。今天的入场点捕捉的正是这个折扣收窄机会。
            calloutType: recommendation
            claimRefs:
              - CV019
              - CV021
              - CV025
              - CV026
          - type: callout
            title: 与客户竞争：FedRAMP 缺口是收入天花板
            body: >
              Pentera 缺席 FedRAMP，给参与美国联邦市场设置了结构性天花板。美国联邦 IT 安全市场每年规模为 $15–20B，网络安全验证估计有 3–5% 渗透机会（$450M–$1B）。按 Pentera
              当前企业 ACV $100–300K 计算，即便拿下 50 个联邦机构交易，也会增加 $5–15M ARR。这对 ARR CAGR 很重要，但需要 FedRAMP 授权（6–12 个月流程）。承诺推进
              FedRAMP 授权是牛市情景的强信号；如果到 2026 年仍缺席，就代表错失机会，也让竞争对手（美国总部公司）有机可乘。
            calloutType: insight
            claimRefs:
              - CV028
              - CV029
              - CV030
              - CV040
