          - type: callout
            title: 隐含 $83K ACV 低于企业叙事
            body: >
              以 $100M ARR 和 1,200+ 客户计，隐含平均 ACV 约为 $83K——显著低于 Pentera 定位和 G2 感知所暗示的 $150K-$500K 企业级区间。这一差距很可能反映了早期队列低
              ACV 客户（2022 年前以更低交易规模获得）与较新大型企业交易高 ACV 的混合。通过 ACV 队列数据解释该差异，是最重要的尽调问题之一。
            calloutType: insight
