      - number: '3.3'
        title: 能力与定价比较
        blocks:
          - type: paragraph
            body: >
              Pentera 的核心差异点是生产安全的真实漏洞利用执行：它不是模拟攻击或映射理论路径，而是让 Pentera Core 在生产内部网络中运行真实漏洞利用链。Cymulate 和 SafeBreach
              使用基于模拟的方法，重放已知技术但不做实时漏洞利用。AttackIQ 验证安全控制，不一定利用网络资产。XM Cyber
              只使用基于图的攻击路径建模。真实漏洞利用与模拟之间的差别，是市场中最实质的技术分野。Pentera Cloud 增加云和混合环境对抗测试；Pentera Surface 验证外部攻击面——与 Core
              合在一起，形成三暴露面平台，在主要竞争者中只有 XM Cyber 的广度可匹配。定价方面，没有 AEV/BAS 厂商公开披露按席位或按节点费率。Pentera
              聚焦企业市场，采用年度经常性订阅定价；Horizon3.ai 提供更低门槛的 Flex 包；AttackIQ Flex 允许按需消费，因此可触达一次性验证买方。Cymulate 按用例模块打包场景。
