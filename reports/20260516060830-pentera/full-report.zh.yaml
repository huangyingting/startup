      - 当前人工做法
      - Pentera 方案
      - 可衡量收益
      - 局限
    rows:
      - - 持续网络验证
        - 外部供应商按季度手工渗透测试；每次项目 2-4 周；时间点式
        - Pentera Core：无代理常开测试；每次变更后自动重跑
        - 第三方渗透测试成本降低 60%（公司声称）；持续可见安全态势
        - 范围配置需要安全专业能力；G2 显示完整实施需 3 个月
      - - 外部攻击面验证
        - 周期性外部扫描；用 Nessus/Qualys 发现 CVE；没有对抗路径测试
        - Pentera Surface：发现未知外部资产并验证可利用性
        - 找出扫描工具遗漏的影子 IT 和未知暴露
        - 与现有 EASM 工具集成会增加复杂度；自研路径与市场标准的关系不清楚
      - - 云安全态势验证
        - CSPM 对错误配置告警；没有跨 IAM、计算、存储的对抗链路
        - Pentera Cloud：用真实攻击技术测试跨 AWS/Azure/GCP 的对抗路径
        - 捕捉 CSPM 无法验证的 IAM 提权和横向移动路径
        - 云模块成熟度不如 Core 确定；按云服务拆分的深度未做基准比较
      - - 修复跟踪与排序
        - 人工分拣漏洞报告；电子表格；不会自动创建 ITSM 工单
        - Pentera Resolve：在 ServiceNow/Jira 中自动创建带修复说明的优先级工单
        - 告警减少 90%、修复速度提升 5x、关键风险降低 70%（公司声称）
        - 需要 Resolve 附加许可；Core 客户采用率未披露
      - - CISO 向董事会汇报网络暴露
        - 手工汇总渗透测试报告；定性风险叙事；没有 MITRE ATT&CK 覆盖图
        - Pentera 仪表盘：ATT&CK 覆盖热力图、风险趋势、CTEM 生命周期状态
        - 面向董事会的网络风险指标基于对抗验证，而非理论评分
        - 客户需要在内部建立 ATT&CK 覆盖口径；没有用于同业比较的标准基准
    enumerationScope:
