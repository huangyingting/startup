      - number: '6.3'
        title: 具名客户证明和参考质量评估
        blocks:
          - type: paragraph
            body: >
              Pentera 的 pentera.io/customers/ 页面展示了来自金融服务、能源、医疗和政府部门的 30+ 公司 logo，但没有任何 Fortune 500
              公司在新闻稿或投资者材料中被具名。这是一个明显尽调缺口：在 $100M ARR 和 1,200+ 企业部署规模下，缺少公开具名的企业锚定客户，会限制对客户质量的独立佐证。

              公开可得的最强具名客户证据，是 2026 年 1 月 DXC Technology 战略合作公告，其中将 DXC 列为托管服务交付伙伴。CRN 将 Pentera 渠道负责人 Peter Rodriguez 评为
              2026 CRN Channel Chief，也从侧面确认企业渠道客户开发在推进。

              从业者评价证据在四个平台上都很扎实。G2 有 138 条已验证评价，平均 4.5/5；TrustRadius 显示 50+ 已验证评价；PeerSpot 有 80+ 企业从业者评价；Gartner Peer
              Insights 在至少 12 个月生产使用年限筛选下，16 条评价给出 4.8/5。评价者持续代表生产环境中的企业买方，而非评估用户，佐证生产级部署质量。

              尚无独立第三方案例研究发布经过验证的财务成果。Pentera 官网包含案例研究落地页，但没有公开披露带硬指标的具名成果。公司宣称的 90% 告警减少和 5x 修复速度提升（Resolve
              模块）出现在产品营销中，但缺少独立审计。
