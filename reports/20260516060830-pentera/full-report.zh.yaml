      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              Adversarial Exposure Validation 市场缺乏单一权威的全球规模估计。本节用三个互补分析师视角做三角测算：BAS 市场（最窄，也是 Pentera
              可服务市场（SAM）的最佳代理）、渗透测试市场（更宽，包含人工服务），以及由 Pentera 披露运营指标自下而上推导的可获取市场（SOM）。

              BAS 市场规模：MarketsandMarkets 估计，全球 BAS 市场 2024 年为 USD 0.72 billion，将以 27.0% CAGR 增长至 2029 年 USD 2.40
              billion。Mordor Intelligence 估计，BAS 市场 2025 年为 USD 1.05 billion，将以 22.87% CAGR 增长至 2031 年 USD 3.61
              billion。两项估计的方法不同——MarketsandMarkets 仅纳入「自动化 BAS」工具，Mordor 则包括相邻安全模拟服务——但都指向同一个 23–27% CAGR 增长区间，以及 2025
              年约 USD 0.9–1.1 billion 的市场规模。

              渗透测试市场（TAM 代理）：更广义的渗透测试市场包含人工和自动化服务，2025 年估计为 USD 1.98 billion（MarketsandMarkets）至 USD 2.36 billion（Mordor
              Intelligence），并分别以 14.2% 和 15.29% CAGR 增长，至 2031 年达到 USD 4.39–5.54 billion。这代表自动化 AEV
              平台作为人工测试项目替代品所竞争的完整预算池。

              自下而上 SOM：Pentera 披露 2025 年 Q4 来自 1,200+ 企业客户的 ARR 为 USD 100 million。这意味着每客户年度平均合约价值约 USD 83,000（与 PeerSpot
              报道的中型市场账号平均授权 USD 120,000 一致）。若 Pentera 在 2025 年估计 USD 0.9–1.1 billion 的 BAS/AEV SAM 中拿到 9–11% 份额，则按
              Pentera 当前定价层级，自动化 AEV 平台的 SOM 约为 USD 150–300 million，显示仍有可观上行空间。

              矛盾估计与缺口：两家分析师机构对 2025 年 BAS 的估计相差约 30%，反映出市场边界定义不一致。两份报告都没有给出与 Gartner 2024
              年品类定义对齐的具体「AEV」估计。这些缺口被保留为证据缺口。
