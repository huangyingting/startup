companyProfile:
  summary: >-
    Pentera 是一家以色列私营网络安全公司，也是 Adversarial Exposure Validation（AEV）品类的开创者。其平台无需部署代理，就能在网络基础设施、Active
    Directory、云和应用暴露面上持续自动化模拟攻击；专利 ExploitFlow 引擎会串联真实 CVE 漏洞利用，验证哪些弱点确实能被端到端打穿。Pentera 2015 年创立于 Tel Aviv，现已做到 $100M
    ARR，拥有 1,200+ 企业客户，覆盖金融服务、医疗、能源、政府和关键基础设施，并在 2024 年 12 月 Series C 后达到 $1B 估值。公司已在 AEV 中取得定义品类的位置，获得 Gartner 和
    Forrester 领导者评级以及 G2 同行高分，同时面对 SafeBreach、Cymulate，以及 CrowdStrike 和 Microsoft 平台延伸能力的竞争加剧。
