      - 可监测触发因素
      - 阈值 / 打破投资逻辑事件
      - 行动含义
    rows:
      - - 地缘政治 — 以色列总部受扰
        - 以色列在 Tel Aviv / Petah Tikva 都市区开展地面行动；Pentera 员工撤离
        - 总部生产部署暂停；R&D 速度在 >30 天内下降 >50%
        - 卖出信号；如果 Labs 团队受扰 >1 个季度，平台差异化面临风险
      - - ARR 放缓
        - 下一轮融资（Series D 或 IPO）披露 ARR 同比增速低于 25%
        - ARR 同比增速 < 25%，且 NRR < 105%，确认获客和留存双双失灵
        - 降低敞口；需求侧投资逻辑转弱；竞争替代可能已经发生
      - - 生产测试事故
        - 客户诉讼、公开复盘，或企业媒体报道 Pentera 导致的事故
        - 在生产型企业客户处，任何已确认且可归因于 Pentera 的生产系统损害
        - 暂停；诉讼风险和客户信任风险同时触发；评估严重性和复发概率
      - - 竞争性 AEV 商品化
        - Microsoft Defender、CrowdStrike 或 Palo Alto 宣布生产安全型 AEV 模块全面可用
        - Fortune 500 大规模公开用 Microsoft/CrowdStrike AEV 替换 Pentera
        - 降低敞口；定价权被侵蚀；护城河评估需要更新
      - - 监管执法行动
        - 以色列 DDEC 调查、美国 BIS 执法，或欧盟 GDPR 对 Pentera 采取执法行动
        - 任何执法行动、牌照暂停，或超过 $1M 的罚款
        - 复核；严重性取决于司法辖区和范围；可能阻断关键市场销售
      - - 关键人物离职 — Pentera Labs 负责人
        - 高级研究员或 Labs 领导层离职的公开公告或 LinkedIn 更新
        - CTO、Labs 负责人，或 2 名以上高级漏洞利用研究员在 6 个月窗口内离职
        - 观察；监测漏洞利用库更新速度；如果 CVE 归因下降 >50%，护城河侵蚀得到确认
