        - 低-中 — 资金充足；近期资本风险低
      - - ServiceNow / Jira ITSM 集成（Pentera Resolve）
        - ServiceNow、Atlassian（Jira）
        - Pentera Resolve 模块依赖 ITSM API 自动创建工单并编排修复工作流
        - 中 — 两者都是主导 ITSM 平台；替代 ITSM 系统覆盖较低
        - ServiceNow API 定价变化，或 Atlassian Jira Cloud 弃用 webhook API，可能破坏 Resolve 工作流
        - 中
        - 多 ITSM 连接器架构分散依赖；ServiceNow 与 Atlassian 的市场地位提供稳定性
        - 低 — 鉴于 ServiceNow 和 Atlassian 的市场主导地位，发生概率很低
    notes: 集中度水平是定性估计；实际 MSSP 和云 API 依赖水平需要数据室确认。
