    rows:
      - - 以色列 DDEC 出口许可证（Defense Export Controls Law 5766-2007）
        - 以色列
        - 未公开确认；未披露 DDEC 许可证清单或国家排除清单
        - 中 — Pentera 在 100+ 个国家运营；部分部署很可能需要 DDEC 审查
        - 严重 — 出口管制行动可能阻断关键市场的国际销售
        - 无公开缓释证据；假设内部存在法律合规职能
        - 高 — 无公开披露；尽调闸门
        - 向数据室索取 DDEC 许可证摘要和国家限制
      - - 美国进攻性网络工具出口管理条例（EAR / BIS）
        - 美国
        - 未发现 BIS 执法行动或列入实体清单；Pentera 产品是否适用 EAR 未公开确认
        - 低-中 — Pentera 的进攻性网络测试能力可能触发 EAR 分类审查
        - 高 — 违反 EAR 可能阻断美国客户部署和国际销售
        - 无 BIS 申报或商品分类公开证据；假设法律审查仍在进行
        - 中 — 需监测；当前无行动
        - 向数据室索取 BIS 商品管辖权认定（CJR）或商品分类裁定
      - - 欧盟《通用数据保护条例》（GDPR）— AEV 扫描期间的数据处理
        - 欧盟
        - Pentera 信任页面显示有 DPA 模板；详细分处理方清单和数据驻留架构未公开披露
        - 中 — Pentera 为欧盟企业客户处理 IP、凭证、网络数据
        - 高 — ICO 或 DPA 执法行动，或 GDPR 不合规指控，可能阻断欧盟业务
        - 据称可提供数据处理协议模板；无公开 DPA 或分处理方清单
        - 中 — 数据架构存在尽调缺口；当前无执法
        - 索取完整 DPA、分处理方清单、数据驻留架构和欧盟代表文件
      - - SEC 网络安全事件披露规则（17 CFR 229.106 / 249.308）
        - 美国
        - Pentera 是私营公司；作为报告主体不直接受 SEC 网络披露规则约束；规则影响 Pentera 的上市公司客户
        - 低 — 不直接适用于 Pentera；间接需求驱动因素
        - 中 — SEC 规则提高对 Pentera 验证服务的需求；监管顺风
        - Pentera 未采取任何行动；间接受益于客户合规义务
        - 低 — 对 Pentera 净正面；不是风险敞口
        - 监测客户是否把 AEV 作为 SEC 驱动的合规采购
      - - FedRAMP 授权 — 缺失会阻断美国联邦政府直接采购
        - 美国
        - 截至 2026 年 5 月，marketplace.fedramp.gov 未列为 In Process 或 Authorized
        - 低-中 — Pentera 未申请 FedRAMP；公开证据显示目前未推进
        - 高 — 缺少 FedRAMP 会阻断美国国防部和民事机构直接采购；限制联邦 TAM
        - AWS Marketplace 上架提供部分云采购路径；MSSP 渠道可能间接触达部分联邦客户
        - 高 — 没有 FedRAMP，美国联邦收入存在结构性天花板
        - 确认 FedRAMP 授权是否在产品路线图中；若不推进，估算受影响的联邦收入
      - - 以色列隐私法（Protection of Privacy Law 5741-1981，GDPR 等效）
        - 以色列
        - Pentera 对本国数据适用以色列隐私法；信任页面显示合规意图
        - 低 — Pentera 的主要数据处理对象是客户数据，不是以色列个人数据
        - 低 — 直接敞口有限；未发现执法行动
        - 预期具备标准法律合规；未识别具体风险
        - 低 — 监测即可
        - 在法律尽调中确认以色列隐私法合规状态
