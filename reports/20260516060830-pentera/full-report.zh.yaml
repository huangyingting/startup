      - number: '2.3'
        title: 买方与细分市场图景
        blocks:
          - type: paragraph
            body: >-
              AEV 平台的主要买方是拥有 1,000 名及以上员工、且已有安全运营职能的企业 CISO 或 VP of Security。付款方是 IT 安全预算，该预算每年通过 CFO
              批准流程确定，并越来越受到董事会影响。Pentera 2025 State of Pentesting 报告（调研全球 500 名 CISO）显示，88% 的董事会现在把网络安全视为业务风险，而不是 IT
              问题；这直接提升了 CISO 的预算权，并降低 AEV 采购摩擦。

              买方旅程通常从一次人工渗透测试关系开始，作为概念验证类比；随后进入软件评估，驱动力是希望获得连续覆盖，而非一次性覆盖。2025 年调研发现，50% 的 CISO
              现在把基于软件的渗透测试作为发现可利用缺口的主要方法；这逆转了自动化测试曾被视为对生产环境风险过高的看法。调研记录的采用触发因素包括：泄露后修复（67% 美国企业称过去 24
              个月发生过泄露）、网络保险续保要求（59% 应保险公司要求部署工具）以及董事会 / 审计委员会授权。

              按收入计，最大垂直细分是 Banking, Financial Services, and Insurance（BFSI），占 2025 年 BAS 市场收入 24.55%；其后为医疗、IT & ITeS
              和制造业。大型企业（≥1,000 名员工）占 BAS 市场需求的 70.85%，SMB 占 29.15%，并随着入门级 AEV 产品更易获得而增长更快（至 2031 年 CAGR 为
              26.6%）。按地区看，北美以 41.35% 的全球 BAS 市场收入领先；亚太是增长最快地区。

              企业攻击面扩张是主要采用催化剂：随着企业整合云原生架构、API 生态、IoT 和 SaaS 蔓延，传统一次性渗透测试被设计来保护的边界事实上已经消失。Pentera 数据显示，企业现在平均管理 75
              种安全工具，大型组织每周生成超过 2,000 条告警——因此需要基于优先级的测试，证明哪些漏洞真的可被利用。
