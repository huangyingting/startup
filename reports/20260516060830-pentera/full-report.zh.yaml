      - number: '6.4'
        title: 留存、净收入留存、扩张和集中度风险
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Pentera 没有从任何投资者或公司来源公开披露 NRR、GRR、流失率、队列留存或平均合同期限。这是客户质量评估中最大的盲点。ARR 从约 $60–70M 增至 $100M
              的增长轨迹，与 NRR 超过 110% 的平台相符，意味着现有客户有显著自然扩张；但这只是推断，不是确认指标。

              land-and-expand 模型通过 Pentera 的模块架构运转：企业客户通常先从 Pentera Core（内部网络验证）开始，再扩展到 Surface（外部 ASM）、Cloud（云环境）和
              Resolve（修复编排）。TrustRadius 和 PeerSpot 评价者确认，多模块部署会在首次部署后 12–24 个月内出现，说明追加销售转化正在发生，但公司没有披露总体扩张收入占比。

              客户集中度风险未量化。以 1,200+ 客户和 $100M ARR 计算，$83K 的隐含平均 ACV 会掩盖可能很大的偏斜：如果前 20% 客户贡献 60–70% ARR（企业 SaaS 常见模式），那么前
              240 个账户就代表 $60–70M ARR；任何这些账户流失都会形成集中度风险。金融服务和医疗行业集中度还会因行业经济周期带来相关风险暴露。

              MSSP 渠道带来结构性模糊：MSSP 为其客户运营 Pentera，可能代表未单独披露的汇总席位，使 1,200+ 客户数可能低估终端用户暴露；另一种可能是，它掩盖了商业质量较低的次级关系。
