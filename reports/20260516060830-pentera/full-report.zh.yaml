      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Pentera 的领导团队把深厚网络安全研究能力与成熟的市场拓展和运营执行经验结合起来。Dr. Arik Liberzon 是公司创始人兼 CTO，2015
              年基于一个判断创立公司：自动化渗透测试不仅可行，而且必要。Amitai Ratzon 于 2018 年加入担任 CEO，当时公司仍处于隐身状态；他与 Liberzon 合作，将平台在 2019
              年推向市场。Ratzon 将创始愿景描述为打造一个新品类——Security Validation——而不是参与既有 Breach and Attack Simulation（BAS）市场；Gartner
              后来正式认可 Adversarial Exposure Validation 品类，验证了这一定位差异。Aviv Cohen 担任首席营销官，Ran Tamir
              担任首席产品官，两人都被视为带领最初市场拓展的创始团队核心成员。2026 年 4 月，Pentera 任命 Hagit Ynon
              为首席财务官，这是一次重要高管引入，释放出可能为更广泛资本市场动作做准备的信号。Peter Rodriguez 负责渠道战略，并入选 CRN 2026 Channel Chiefs List。董事会包括
              Evolution Equity Partners、Insight Partners、K1 Investment Management 和 Blackstone
              等主要机构投资方代表。研究期内未发现公开负面治理事件（诉讼、监管谴责或公开董事会冲突）。关键人风险集中在技术创始人 Liberzon 和 GTM 架构师 Ratzon
              身上；不过，公司已有一批具名高管，部分缓解了集中度风险。
