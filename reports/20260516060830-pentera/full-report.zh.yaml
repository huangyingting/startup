  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局地图
        blocks:
          - type: paragraph
            body: >
              Pentera 位于自动化安全验证与 CTEM 的交汇处——Gartner 在 2024 Hype Cycle for Security Operations 中正式将该市场命名为「Adversarial
              Exposure Validation」。竞争格局分为四层。第一层——直接 AEV/BAS 同行：Cymulate、AttackIQ、SafeBreach、Picus Security 和 Horizon3.ai
              瞄准同一批连续安全验证买方。第二层——连续暴露专业厂商：XM Cyber（2022 年被 Schwarz Group 收购）使用基于图的攻击路径模拟，而非实时漏洞利用执行，并在 CTEM
              定位上竞争。第三层——平台收敛威胁：CrowdStrike Falcon Exposure Management 和 Tenable ONE
              正从端点和漏洞管理扩展到连续暴露验证，并利用庞大既有客户基础。第四层——人工替代品：传统渗透测试公司——Mandiant、Rapid7 services、NCC Group、Big-4 cyber
              advisory——仍是部署最广的替代方案，每次一次性项目收费 $15K–$50K+；Pentera 的连续自动化正是为替代或增强这些项目而设计。
