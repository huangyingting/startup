      - number: '1.4'
        title: 收入、规模与客户牵引
        blocks:
          - type: paragraph
            body: >
              Pentera 的财务规模是 Adversarial Exposure Validation 品类最重要的里程碑之一。公司在 2026 年 1 月公告中称年经常性收入（ARR）突破 $100M，CEO
              将这一门槛描述为让 Pentera 成为「Gartner Adversarial Exposure Validation 领域首家 ARR 超过 $100M 并成为 Centaur 的公司」。增长速度突出：CEO
              博客称公司是「最快达到 $3M、$10M、$50M 和 $75M ARR 的网络安全初创公司之一」。截至 2026 年初，客户基础已超过全球 1,200 家企业组织，公司 About 页面称「超过 1,000 名
              CISO」信任该平台。截至 2026 年 1 月，员工数约 450 人（公司称为「Penterians」），分布在 20 个国家。公司在以色列（Petah Tikva 总部）、美国（Austin,
              TX）以及欧洲、亚太、拉美多个地点设有办公室。据报道，中型市场部署的平台价格约为每年 $120,000，企业授权费用更高。客户留存和净留存率（NRR）未公开披露，但从 ARR
              快速推进推断应较强。公司未公开说明同比收入增长率，但从一年内 ARR 由 $75M 增至 $100M+ 推算，增速很可能显著高于 50%。
