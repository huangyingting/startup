  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重程度排序的风险概览和投资影响
        blocks:
          - type: paragraph
            body: >
              Pentera 的风险画像最主要受其以色列运营总部影响——这是一项结构性特征，将研发、领导层和核心技术人才集中在地缘政治敏感地区。Series C（$150M，2024 年 12 月）发生时，以色列正与
              Hamas 和 Hezbollah 处于活跃军事冲突中，评估运营连续性和出口管制合规时，背景风险更高。期间没有公开报告重大生产中断，但结构性暴露仍然存在。

              按严重程度看，前五大风险是：（1）以色列地缘政治对研发和运营的扰动；（2）生产安全测试失败并造成客户事故；（3）大型平台 AEV 集成带来的竞争替代；（4）出口管制行动阻断国际销售；（5）Pentera Labs
              或核心工程领导层关键人物离职。

              缓释因素包括：$150M Series C 资本提供更长跑道；1,200+ 企业部署形成切换成本惯性；专有漏洞利用库并不容易复制；以及六年生产安全测试记录中没有公开已知客户事故。未披露任何监管行动或 IP
              诉讼是积极信号，不过也可能反映公司仍为私营，公开披露义务较低。

              对机构投资者而言，关键尽调门槛是确认：（a）Pentera 在已部署地域持有所需的全部以色列网络出口许可证；（b）NRR 超过 110%（验证客户留存质量）；（c）高管梯队足够深，可以承受任一关键人物离职。
