      - number: '4.2'
        title: 单位经济与定价
        blocks:
          - type: paragraph
            body: >
              Pentera 不公开披露标价。G2 定价页面称 Pentera 自 2019 年 10 月以来未提供定价信息，买方需要直接联系 Pentera 获取报价。这是企业安全厂商销售七位数平台交易的标准做法。G2
              用户评论提供间接定价信号：平均折扣 11%、感知成本为 $$$$$（最高层级）、实施时间 3 个月、投资回报（回本）8 个月。这些指标说明客户 ROI 体验为正，但它们是自报告评论平均值，不是经验证的财务数据。

              Pentera 声称客户可获得 80% 网络风险降低、第三方渗透测试成本降低 60%、平均修复时间（MTTR）加快 90%——这些都是公司官网上的自称结果，没有独立验证。Pentera Resolve
              add-on 产品声称告警减少 90%、修复速度提升 5x、关键风险暴露减少 70%。这些结果主张构成 ACV 和留存逻辑的基础，但公开来源中仍未由第三方审计验证。

              关键私有单位经济指标——毛利率、NRR、CLTV、混合 CAC 和回本周期——均未公开披露，这与 Pentera 作为私营公司的状态一致。缺少这些指标，是财务承销的主要瓶颈。
            claimRefs: []
          - type: table
            tableRef: TI003
            claimRefs: []
