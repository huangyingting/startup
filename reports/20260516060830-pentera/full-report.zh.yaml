        - 数据室披露 NRR >115% — 确认存量客户健康扩张
      - - 财务
        - $150M Series C 提供足够现金跑道；$100M ARR 证明收入规模
        - Series C 于 2024 年 12 月完成；ARR 里程碑在 2026 年 1 月
        - 烧钱速度、经营杠杆或盈利路径均未披露
        - P&L 披露显示毛利率 >75%，且经营杠杆改善
