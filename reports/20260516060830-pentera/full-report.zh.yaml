      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Cymulate（以色列，2016）在地理位置、创始故事和产品理念上是 Pentera 最接近的同行。Cymulate 由前 IDF 情报军官创立，2022 年完成约 $70M Series D 融资，并定位为
              AI 驱动的 CTEM 平台。在 PeerSpot 上，它在 BAS 中排名 #2，心智份额为 14.8%，评分 8.0/10；Pentera 为 7.7/10。AttackIQ（San
              Diego，2013）是最贴合 MITRE ATT&CK 的 BAS 厂商，提供三档产品——Flex（按需）、Ready（共同管理）和 Enterprise；其中 Flex 让 SMB 和一次性买方也能进入，这是
              Pentera 未提供的入口。AttackIQ 在 PeerSpot 的 BAS 心智份额为 9.5%，评分 9.0/10。Picus
              Security（Ankara，2013）强调修复加速，称其优先级引擎可让修复积压减少 86%；PeerSpot 评分 9.0/10，心智份额 11.6%。Horizon3.ai（San
              Francisco，2019）提供 NodeZero，一款自主渗透测试 SaaS，既有单次 Flex 也有订阅包；2023 年完成 $40M Series C，并称拥有 5,200+ 客户——约为 Pentera
              客户数的 4 倍——但 ACV 更低。SafeBreach（以色列，2014）拥有 8.3% BAS 心智份额，瞄准 Fortune 500 企业，在第一层同行中公开披露最少。XM Cyber（以色列，2022
              年被 Schwarz Group 收购）聚焦混合环境中的基于图的攻击路径管理，靠 CTEM 定位竞争，但不执行实时漏洞利用。IBM Randori（2022 年被收购）聚焦外部攻击面管理，是不同于 Pentera
              内部红队自动化的相邻用例。
