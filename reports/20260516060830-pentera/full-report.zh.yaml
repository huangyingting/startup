        - 低（6+ 年记录、1,200+ 部署；无公开事故）
        - 严重 — 一次重大事故就可能引发客户流失和诉讼
        - 高成熟度 — 生产安全架构是核心设计原则；已验证 6 年
        - 中等剩余风险 — 进攻性测试产品内生风险，无法消除
        - 未发布 PST 机制独立安全审计；客户 SLA 和赔偿条款未公开
      - - Pentera 平台供应链攻击（Pentera 成为攻击向量）
        - 低-中 — Pentera 作为 1,200 个企业网络中的可信内部人，是高价值国家级攻击目标
        - 严重 — Pentera 构建流水线若被攻破，将打开 1,200 个企业环境的访问入口
        - 成熟度未知 — 未发布 SOC 2 Type II、ISO 27001 或独立安全审计
        - 高剩余风险 — Pentera 自身平台安全状态是重大未验证假设
        - SOC 2 Type II 和 ISO 27001 未公开确认；需立即在数据室索取
      - - Pentera Labs CVE 过早披露，造成客户暴露窗口
        - 中 — 活跃发布 CVE 研究带来披露时间线义务
        - 高 — 过早或协调不佳的 CVE 披露，可能让客户在补丁可用前暴露
        - 中成熟度 — Pentera Labs 遵循标准负责任披露；无已知过早披露事件
        - 中 — 持续漏洞研究形成持续披露管线风险
        - 确认协调漏洞披露政策和 CVE 时间线方法
      - - 云 API 依赖故障（AWS / Azure / GCP API 变更或弃用）
        - 中 — 云厂商会定期弃用 API 并改变访问模型
        - 中 — 若云 API 变化或限流，Pentera Cloud 模块功能会降级
        - 低-中成熟度 — 多云支持分散依赖，但不能消除依赖
        - 中 — 任一云厂商 API 变化，都可能要求 Pentera Cloud 大规模重构
        - Pentera 与云厂商之间无公开 SLA；API 版本锁定和回退策略未披露
      - - Pentera Labs 漏洞利用研究团队知识集中
        - 中 — 研发人才位于以色列；地缘政治风险增加集中度维度
        - 高 — 关键研究人员流失会降低漏洞利用库更新速度，削弱平台差异化
        - 低成熟度 — 未披露继任计划，也未披露以色列之外的分布式研发团队
        - 高 — Pentera Labs 是主要竞争护城河；人才风险是护城河侵蚀向量
        - 索取 Pentera Labs 团队构成、人数和关键研究人员留任方案
      - - 平台扩展到 4 个模块后的技术债与平台复杂度
        - 中 — 多模块架构叠加 50+ 个集成，会提高代码复杂度
        - 中 — 技术债上升会拖慢功能速度，并引入回归风险
        - 中成熟度 — 模块化架构缓解跨模块依赖问题
        - 低-中 — 工程投入可控；通过功能发布节奏监测
        - 无公开工程博客或架构文档，难以评估技术债负担
    notes: 可能性和严重性评级是基于行业类比和可得公开证据的定性评估；不是精算评估。
