    rows:
      - - 建议
        - 观察（有条件；待确认 NRR、SOC2、出口合规后可上调至买入）
        - $100M ARR、1,200+ 客户、Series C 估值 $1B；缺 NRR 和合规数据
        - NRR >115% + SOC2 Type II 已确认 → 买入；NRR <100% 或监管行动 → 放弃
      - - 信心
        - 中 — NRR 和合规数据缺口显著
        - 市场 / 产品证据强；财务和监管确认弱
        - 完整数据室披露可把任一方向的信心上调至高
      - - 风险评级
        - 中高 — 地缘政治、监管和竞争风险均实质存在
        - 以色列总部集中；DDEC 状态未确认；Microsoft/CRWD 竞争动作
        - 以色列运营多元化 + 出口合规确认 → 下调至中
      - - 估值立场
        - 以 10x ARR（$1B）计价大致合理 — 没有明显低估；回报取决于增长执行
        - 可比私募轮在 8-12x ARR；上市可比公司在 10-22x NTM 收入
        - ARR 加速至 >40% + NRR >120%，可支撑重估至 12-15x 远期 ARR
      - - 目标回报
        - 基准情景毛回报 2.5-3x（$3-3.6B 退出）；乐观情景 4-6x（$4-6B 退出）
        - IPO 时 ARR 以 25-30% CAGR 增至 $250-300M；退出时 12x NTM 倍数
        - 增长放缓至 <20% CAGR → 悲观情景 1.2-1.4x（按时间调整后资本亏损）
      - - 持有期
        - 3-5 年（2027-2029 IPO 窗口）
        - Series C 于 2024 年 12 月完成；IPO 准备信号（2025 年聘任 CFO）
        - CRWD/PANW 战略并购可能把持有期压缩至 18-24 个月，溢价 2x
    notes: 所有评估均基于截至 2026 年 5 月的公开信息。NRR、烧钱速度和出口合规状态尚未确认，是最重要的假设。
