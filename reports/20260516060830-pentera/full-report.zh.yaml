        - MSSP 流失或重新谈判，可能迅速压缩 ARR 的 15-25%
        - 高
        - 未公开披露；在分散 MSSP 基础和深化锚定 MSSP 关系之间取舍
        - 高 — 结构性不透明；必须在数据室中确认
      - - Gartner AEV 类别定义
        - Gartner Research
        - 市场类别验证；AEV 类别驱动企业采购委员会
        - 高 — Pentera 是先行者；Gartner 重新定义类别可能重塑竞争动态
        - 如果 Gartner 将 AEV 并入 CTEM 或 BAS，Pentera 会失去先行者类别优势
        - 中
        - Pentera 积极参与 Gartner 类别定义；Growth Leader 位置是正向信号
        - 低-中 — Gartner 影响力高，但类别扩张比类别消失更可能
      - - MITRE ATT&CK 框架
        - MITRE Corporation（非营利）
        - 攻击技术映射的通用分类法；Pentera 整个报告层都使用 ATT&CK
        - 严重 — 没有替代框架被企业广泛采用；ATT&CK 实际上已是标准
