        - 中-高
        - 多云架构分散依赖；AWS Marketplace 关系带来激励一致
        - 中 — 需持续监测；未披露与云厂商的 SLA
      - - Insight Partners / K1 / Evolution Equity Capital 等投资人
        - 主要投资人
        - 成长资本提供方；通过董事会影响战略决策
        - 中 — 投资人基础分散（3 家主要投资人）；无单一控股投资人
