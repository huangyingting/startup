  - id: TV005
    title: 打破投资逻辑与否决触发因素表
    columns:
      - 触发事件
      - 阈值 / 信号
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - NRR 披露低于 100%
        - 官方 NRR 披露（IPO S-1 或财报）显示 NRR <100%
        - ARR 增长只靠获客；扩张逻辑失效；LTV/CAC 算账不具竞争力
        - 放弃 — 投资逻辑需要 NRR >110%，才能支撑 10x ARR 估值下的扩张经济性
      - - 生产测试事故
        - 公开的 Pentera 导致企业系统损害 — 任何已确认生产事故
        - 客户信任崩塌；诉讼风险；AEV 品类信心受损
        - 卖出或暂停持有 — 严重性决定时点；若没有多年无事故期，就没有恢复路径
      - - 竞争性 AEV 商品化（MSFT/CRWD）
        - Microsoft Defender 或 CrowdStrike 将生产安全型 AEV 作为原生企业模块发布
        - Pentera 的 ASP 压缩 30-50%；客户把 Pentera 降为补充工具，NRR 下滑
        - 降低敞口 — 紧迫性取决于定价和功能对等；公告后监测 2 个季度
      - - 出口管制执法行动
        - 以色列 DDEC 调查、美国 BIS 执法，或欧盟 GDPR 对 Pentera 处以 >$1M 罚款
        - 国际销售被阻断或受限；追溯性合规责任；声誉受损
        - 复核 — 若执法阻断关键市场（美国联邦、欧盟、APAC）则卖出；范围有限则持有
      - - 关键 R&D 团队离职
        - CTO + Labs 负责人离职，或 12 个月窗口内 ≥3 名高级 Pentera Labs 研究员离职
        - 漏洞利用库速度下降；护城河开始侵蚀；竞争差异化衰减
        - 观察 2 个季度 — 如果 CVE 归因同比下降 >50%，护城河侵蚀确认 → 降低敞口
      - - 降价轮（Series D 估值低于 $1B）
        - Series D 或 IPO 定价低于 $1B（低于 Series C）— 任何降价轮信号
        - 估值受损；投资人信心崩塌；可能触发契约条款
        - 立即复核 — 降价轮意味着执行失败或市场恶化；完整重评投资逻辑
    notes: 触发因素是机构投资人的监测阈值，不是交易信号。所有事件在行动前都需要独立验证。
