    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Pentera 总部位于以色列 Petah Tikva，并在美国 Texas 州 Austin 拥有重要业务，是一家处于 Series C 阶段的私营网络安全公司。公司 2015 年由 Dr. Arik
              Liberzon 以 Pcysys 名义创立，随后更名为 Pentera，并定义了 Adversarial Exposure Validation（AEV）品类。其核心商业模式是一套 SaaS
              订阅平台，能针对客户的实时生产环境——内部网络、外部暴露面、云工作负载和身份——部署自动化对抗攻击序列，持续识别可被利用的漏洞。收入来自年度平台授权（中型市场部署通常据称约为每年
              $120,000）、专家顾问服务和对抗测试项目。平台同时对标传统一次性渗透测试公司和静态漏洞扫描器，提供连续、基于代理、可规模化的真实场景模拟。截至 2026 年初，Pentera
              称自己正在设定「暴露验证的全球标准」，服务北美、欧洲、亚太和新兴市场超过 1,200 家企业客户。其市场拓展模式很大程度由渠道驱动，全球伙伴计划之外，还配有企业直销团队和专业服务组织。
