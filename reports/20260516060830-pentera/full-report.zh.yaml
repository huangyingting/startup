      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              四股结构性力量正在把企业安全测试从年度节奏压缩为连续节奏：监管要求升级、泄露成本上升、AI 加速攻击面，以及网络保险承保压力。合在一起，这些驱动因素解释了两家主要分析师机构赋予 BAS/AEV 市场至 2031
              年 22–27% CAGR 的原因。

              监管催化剂：美国 Securities and Exchange Commission 于 2023 年 7 月最终确定网络安全披露规则（Release No.
              33-11216），要求上市公司在四个工作日内披露重大网络安全事件，并每年描述其风险管理流程。欧盟 Digital Operational Resilience Act（DORA）于 2025 年 1
              月生效，要求金融实体开展基于场景的数字韧性测试，包括对抗模拟。PCI-DSS version 4.0 于 2025 年 3 月生效，强制要求对持卡人数据环境进行年度渗透测试。这些监管共同形成合规底线，加速 AEV
              采用并缩短销售周期。

              泄露经济学：IBM Cost of a Data Breach report 2025 记录的全球平均泄露成本为 USD 4.4 million，为年费 USD 83–120K 的 AEV 平台提供了显著 ROI
              论据。截至 2026 年 5 月，CISA Known Exploited Vulnerabilities（KEV）目录包含 1,592 条记录；AEV 平台用该目录为测试库排优先级。Pentera
              调研发现，只有 36% 的泄露导致运营停机，30% 导致数据暴露，28% 导致财务损失；这一分层进一步说明，定向 AEV 验证比广泛漏洞扫描更有价值。

              AI 加速：Pentera CTO 在 2025 年 8 月指出，AI 正在把从发现漏洞到可利用的时间从数周压缩到数小时，消灭了防守方过去依赖的缓冲期。相较一次性测试，这一动态构成连续 AEV
              的结构性顺风。Mordor Intelligence 将 CTEM 框架采用归因于 +1.0% 的 CAGR 影响，另将网络保险压力单列为 +1.2%。

              关键约束：（1）工具疲劳——企业已经部署 75 种工具，对再加一个平台存在内部阻力；AEV 必须替代或接入既有工作流。（2）预算压力——CISO 预算受到审查；AEV 与
              endpoint、云安全和身份工具争夺同一笔钱。（3）SMB 可及性——以 USD 83–120K/yr 价格计，大多数收入低于 USD 500M 的公司仍无法负担 AEV 平台，限制低端市场从 TAM 转化为
              SAM。（4）负面定价感知——PeerSpot 评论者给 Pentera 的性价比仅 3/10，提示价格敏感账号存在续约和扩张风险。
