  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与技术基础
        blocks:
          - type: paragraph
            body: >
              Pentera 搭在四个模块组成的 SaaS 平台架构上，共用同一套验证引擎、漏洞利用情报层和分析 / 报告后端。核心技术创新是 Production-Safe
              Technology（PST）：这套专有机制让平台能在真实生产环境中跑完整对抗模拟，同时不打断业务系统、服务或终端。不同于需要安装终端软件的代理式漏洞扫描器，Pentera
              采用无代理模式，只部署一个虚拟设备（本地或云托管），从网络层编排验证。

              架构分为五层：（1）Attack Intelligence，整合 Pentera Labs 的专有漏洞利用库、AI 驱动的 Mythos 漏洞利用生成，以及 MITRE ATT&CK
              技术映射；（2）Validation Engine，编排 Core（内部）、Surface（外部）和 Cloud（云 / 混合）测试；（3）通过 Pentera Resolve
              做修复编排，自动创建和跟踪工单；（4）Analytics and Reporting，提供 CTEM 生命周期仪表盘和董事会级风险量化；（5）Integration Layer，连接
              SIEM、SOAR、CSPM、ASM、工单等类别里的 50+ 企业安全工具。这种分层模型让客户可以逐步采用 Pentera，并在不重构既有安全工作流的情况下做跨产品扩展。
            claimRefs: []
