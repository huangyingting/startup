      - number: '7.3'
        title: 运营、技术、依赖和竞争风险
        blocks:
          - type: paragraph
            body: >
              Pentera 的核心运营风险，是生产安全测试（PST）失败场景：如果平台执行真实攻击链并意外造成生产系统损害（服务中断、数据损坏、凭据暴露），公司将同时面对法律责任和客户信任崩塌。Pentera 6
              年、1,200+ 企业部署且没有公开已知生产事故的记录，是很强的缓释因素；但这一风险无法消除，它内生于产品品类。

              Pentera 平台自身遭供应链攻陷，是高严重度场景：如果国家级或犯罪行为者渗透 Pentera 的软件构建流水线，可能借助 Pentera 在 1,200+ 企业的部署作为向量，进入内部网络。这与
              SolarWinds 供应链攻击风险类似。Pentera Labs 对自身平台的安全姿态，没有以任何公开形式接受独立审计。

              技术依赖包括：Pentera Cloud 模块所需的 AWS/Azure/GCP 云提供商 API；Pentera Resolve 所需的 ServiceNow 和 Jira ITSM API；用于发现分类的
              MITRE ATT&CK 框架；以及 50+ SIEM/EDR/CSPM 集成连接器。单点故障风险最高的是 MITRE ATT&CK：如果该框架被修改、弃用，或商业许可发生变化，Pentera
              整个报告和基准层都需要重构。

              随着 Microsoft（Defender 安全套件扩张）、CrowdStrike（扩展 Attack Surface Management）和 Palo Alto Networks（Cortex
              XSIAM）分别宣布 AEV 邻近产品计划，竞争风险已明显上升。任何一家平台把生产安全对抗验证加入原生模块，都可能使 AEV 品类商品化，并压缩 Pentera 的定价权。Pentera 的 PST 护城河需要
              6+ 年企业参考数据才能复制；这给了竞争窗口，但不是永久保护。
