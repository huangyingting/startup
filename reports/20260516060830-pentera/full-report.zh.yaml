      - number: '1.5'
        title: 产品组合与平台架构
        blocks:
          - type: paragraph
            body: >
              Pentera 平台由四个主要产品和两条专业服务线组成。Pentera Core 面向内部网络安全验证，在生产内部环境中模拟对抗 TTP，暴露可利用攻击路径，无需部署代理。Pentera Surface
              将验证扩展到外部攻击面，测试面向互联网的资产，并模拟威胁行为者试图突破边界。Pentera Cloud 聚焦云身份和混合环境安全，验证 Azure、AWS 和 GCP 身份配置及提权路径。最新产品 Pentera
              Resolve 提供自动化修复编排，把已验证暴露连接到优先级修复动作，并与 ITSM 和补丁工作流集成。服务侧，Security Validation Advisory（SVA）计划派出 Pentera
              专家指导客户验证战略；Adversarial Testing Services 则提供专家亲自执行的红队演练。平台与 150
              多种安全生态工具集成（SIEM、SOAR、漏洞管理器、PAM、ITSM）。公司列出的关键技术差异点包括：按安全设计执行（所有攻击链在发布前都经过遏制验证）、内部 Pentera Labs
              研究团队生成专有攻击情报、算法加 AI 的攻击推进逻辑，以及无需安装代理即可在实时生产环境中运行。Pentera 入选 Gartner Market Guide for Adversarial Exposure
              Validation 的代表性厂商，并在 Frost Radar 2026 for Automated Security Validation 中获得领导者地位。
