  evidenceGaps:
    - id: EU001
      type: private-evidence-only
      severity: blocking
      topic: "net-revenue-retention"
      missingEvidence: "NRR, GRR, cohort-level retention data, average contract length, and auto-renewal rate are not publicly available from any source."
      whyItMatters: "NRR is the most critical metric for assessing customer quality at scale. Without NRR, it is impossible to distinguish a growing customer base from one with high churn offset by new bookings. ARR growth alone is insufficient."
      diligencePath: "Request historical NRR by cohort (last 3 fiscal years), GRR, average contract duration, and top-10 customer ARR contribution from the data room."
      relatedQuestionRefs: [QU011, QU015]
      relatedTableRefs: [TU005]

    - id: EU002
      type: insufficient-public-disclosure
      severity: important
      topic: "named-customer-references"
      missingEvidence: "No Fortune 500 or named enterprise customers are cited in any public press releases, case studies, or investor announcements as of May 2026."
      whyItMatters: "Named references from marquee enterprise accounts are a standard diligence gate at $100M ARR. Their absence makes it impossible to independently verify customer quality, use case depth, or outcome claims."
      diligencePath: "Request minimum 3 referenceable customer contacts from data room; prioritize Fortune 500 financial services or healthcare contacts from different verticals; request case study outcomes with hard metrics."
      relatedQuestionRefs: [QU004, QU012]
      relatedTableRefs: [TU003]

    - id: EU003
      type: private-evidence-only
      severity: important
      topic: "mssp-channel-breakdown"
      missingEvidence: "MSSP-delivered ARR, MSSP customer count, and MSSP concentration (whether 1-3 MSSPs represent majority of MSSP ARR) are not disclosed."
      whyItMatters: "If MSSP concentration is high, effective customer quality may be lower than the 1,200+ direct customer count implies. MSSP contract terms also affect churn risk differently from direct enterprise contracts."
      diligencePath: "Request MSSP vs. direct ARR split; MSSP customer count; top-3 MSSP contribution to total ARR; and MSSP contract duration and notice period."
      relatedQuestionRefs: [QU021, QU014]
      relatedTableRefs: [TU004]

    - id: EU004
      type: insufficient-public-disclosure
      severity: important
      topic: "customer-concentration"
      missingEvidence: "Top-10 or top-20 customer ARR concentration, customer-level ACV distribution, and revenue skew between enterprise and mid-market accounts are not disclosed."
      whyItMatters: "Without customer concentration data, it is impossible to assess the ARR-at-risk if any major account churns. An 80/20 skew in a $100M ARR base implies $60-70M is concentrated in 240 accounts — material execution risk."
      diligencePath: "Request top-10 customer ARR table with anonymized logos/verticals; request ACV distribution histogram; request multi-year contract summary."
      relatedQuestionRefs: [QU010, QU024]
      relatedTableRefs: [TU002]

    - id: EU005
      type: insufficient-public-disclosure
      severity: moderate
      topic: "customer-cohort-expansion"
      missingEvidence: "Module-level expansion data (% of Core customers who have expanded to Surface, Cloud, or Resolve) is not publicly disclosed. No dollar-based expansion revenue percentage is available."
      whyItMatters: "The land-and-expand model is the primary NRR driver. Without module expansion rates, it is impossible to model the organic ARR contribution from cross-sell vs. new logo bookings."
      diligencePath: "Request module penetration rates by cohort; % of customers on 2+ modules; Resolve upsell conversion rate; and time-to-expand from initial Core deployment."
      relatedQuestionRefs: [QU009, QU015]
      relatedTableRefs: [TU005]

