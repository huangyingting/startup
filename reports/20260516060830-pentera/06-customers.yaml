callouts:
  - id: KU001
    calloutType: strength
    title: "1,200+ Enterprise Deployments at $100M ARR Confirms Production-Scale Traction"
    body: >
      The combination of 1,200+ enterprise deployments and $100M ARR — corroborated
      by five independent media outlets — establishes Pentera as a production-scale
      enterprise security platform, not a growth-stage pilot vendor. An implied ACV
      of ~$83K with a 40-67% YoY growth rate places Pentera in the top quartile of
      enterprise security SaaS by revenue trajectory. The Gartner Peer Insights 4.8/5
      rating (minimum 12-month production tenure) further confirms that customers
      are renewing and not churning at evaluation stage.
    claimRefs: [CU001, CU002, CU003, CU007, CU010, CU035]

  - id: KU002
    calloutType: risk
    title: "No Fortune 500 Named References at $100M ARR is a Diligence Red Flag"
    body: >
      At $100M ARR and 1,200+ enterprise customers, Pentera's public absence of
      any named Fortune 500 customer is unusual and merits direct investigation.
      Enterprise security platforms at this ARR scale typically have 5-10 publicizable
      named references from marquee brands. The absence may reflect customer
      confidentiality requirements in financial services and defense verticals, or
      it may indicate that the customer base skews toward mid-market rather than
      Global 2000. Diligence should request a minimum of 3 referenceable customer
      contacts from the data room, spanning at least two verticals.
    claimRefs: [CU013, CU016, CU024, CU025]

  - id: KU003
    calloutType: insight
    title: "MSSP Channel Creates Revenue Optionality but Obscures Concentration Risk"
    body: >
      Pentera's MSSP program is an effective leverage strategy — it enables market
      reach without proportional headcount investment. However, the structure creates
      a known diligence blind spot: MSSP-delivered end-customers are not individually
      counted, MSSP contract terms are not disclosed, and the contribution to total
      ARR is unquantified. If 2-3 large MSSPs represent 80%+ of MSSP-delivered ARR
      (a common channel concentration pattern), the effective customer concentration
      risk is higher than the 1,200+ customer count implies.
    claimRefs: [CU012, CU020, CU021, CU024, CU030]

  - id: KU004
    calloutType: recommendation
    title: "NRR and Cohort Data Are the Primary Diligence Gates on Customer Quality"
    body: >
      Pentera's absence of publicly disclosed NRR, GRR, cohort retention, or
      average contract length data is the single most important gap in assessing
      customer quality. The ARR growth rate is consistent with NRR >110%, but that
      inference is unconfirmed. Diligence should require: (1) historical NRR by
      cohort for the last 3 fiscal years; (2) GRR to separate expansion from base
