      - number: '1.5'
        title: Product Portfolio and Platform Architecture
        blocks:
          - type: paragraph
            body: >
              Pentera's platform comprises four primary products and two professional service lines. Pentera Core
              addresses internal network security validation, emulating adversarial TTPs against production internal
              environments to expose exploitable attack paths without requiring agents. Pentera Surface extends
              validation to the external attack surface, testing internet-facing assets and simulating threat actors
              attempting to breach the perimeter. Pentera Cloud focuses on cloud identity and hybrid environment
              security, validating Azure, AWS, and GCP identity configurations and privilege escalation paths. Pentera
              Resolve, the newest product, provides automated remediation orchestration, connecting validated exposures
              to prioritized fix actions and integrating with ITSM and patching workflows. On the services side, the
              Security Validation Advisory (SVA) program deploys Pentera experts to guide customer validation strategy,
              while the Adversarial Testing Services offering provides hands-on expert-executed red team exercises. The
              platform integrates with over 150 security ecosystem tools (SIEMs, SOARs, vulnerability managers, PAM,
              ITSM). Key technical differentiators cited include: safe-by-design execution (all attack chains are
              containment-verified before release), in-house Pentera Labs research team generating proprietary attack
              intelligence, algorithmic-plus-AI attack progression logic, and the ability to operate in live production
              without agent installation. Pentera was named a Representative Vendor in the Gartner Market Guide for
              Adversarial Exposure Validation and achieved Leader status on the Frost Radar 2026 for Automated Security
              Validation.
            claimRefs:
