      - number: '5.2'
        title: Customer Workflow and Platform Use Cases
        blocks:
          - type: paragraph
            body: >
              Pentera's primary enterprise use case is replacing or augmenting periodic manual penetration testing with
              continuous, automated security validation. Traditional pentesting is conducted 2–4 times annually by
              third-party testers, is scoped to specific segments, and produces static point-in-time reports. Pentera
              replaces this with always-on validation that re-runs after each patch, configuration change, or new
              deployment.

              The five core workflow stages are: (1) Scope definition — the CISO configures which network segments,
              cloud environments, or external surfaces to validate; (2) Automated adversarial testing — Pentera executes
              production-safe attack chains across defined scope using live exploit techniques; (3) Attack path mapping
              — the platform identifies successful exploitation paths and maps each finding to MITRE ATT&CK techniques;
              (4) Prioritized remediation — Pentera Resolve auto-creates tickets in ServiceNow or Jira, assigns
              ownership, and tracks fix status; and (5) Continuous loop — the platform re-validates post-remediation to
              confirm closure. This closed-loop model is the primary driver of the 8-month ROI payback reported by G2
              reviewers and the 90% MTTR improvement claimed on the homepage.

              Customer verticals span financial services (regulatory compliance), healthcare (HIPAA validation),
              manufacturing (OT network exposure), government (FISMA/NIST compliance), and technology (continuous
              DevSecOps validation). Pentera's "why us" page highlights customer outcomes including a 60% reduction in
              third-party pentesting cost and 80% cyber risk reduction, though these are aggregate company-claimed
              metrics without independent audit backing.
            claimRefs: []
