      - number: '8.3'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              The base case assumes Pentera maintains 25-30% ARR CAGR through 2028, reaching $250-300M ARR at IPO. At a
              12x NTM ARR multiple — conservative for a category leader with strong gross margins — the base case exit
              valuation is $3-3.6B. From a $1B entry valuation with 20-25% dilution from potential Series D/IPO,
              institutional investors at the Series C level would realize approximately 2.5-3x gross return. This is
              below venture-return thresholds but represents a quality growth equity investment for large-scale growth
              funds.

              The bull case requires three additional factors: (1) CTEM platform integration drives NRR above 120% as
              customers expand to multiple modules; (2) Pentera Resolve and remediation workflow integration creates a
              platform stickiness moat that prevents competitive substitution; (3) IPO or strategic acquisition timing
              captures a 15-18x NTM ARR multiple. Under these conditions, exit valuation reaches $4-6B, implying 4-6x
              returns for Series C investors. The bull case requires successful FedRAMP authorization to unlock the
              $2-5B US federal market segment.

              The bear case assumes competitive AEV commoditization by 2026-2027, NRR disclosure confirming below-110%
              retention, and ARR growth deceleration to 15-20% CAGR. At a 7-8x ARR multiple on $175M ARR, exit valuation
              reaches $1.2-1.4B, representing 1.2-1.4x gross returns at best — effective capital loss on a time-adjusted
              basis. The bear case is primarily triggered by Microsoft or CrowdStrike releasing enterprise-grade
              production-safe AEV as a platform bundle.

              Key scenario probabilities: based on current evidence, the base case has approximately 50% probability;
              the bull case approximately 25%; and the bear case approximately 25%. The wide probability spread reflects
              the high information asymmetry from absent NRR, export compliance, and competitive response data.
            claimRefs: []
