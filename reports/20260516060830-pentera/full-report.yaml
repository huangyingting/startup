      - number: '5.4'
        title: Deployment, Integration, and Platform Maturity
        blocks:
          - type: paragraph
            body: >
              Pentera deploys as a single virtual appliance — either on-premise or cloud-hosted — eliminating the
              endpoint-agent installation complexity typical of vulnerability management platforms. Deployment to
              first-validation typically requires less than one day, and G2 reviewers report an average 3-month full
              implementation cycle (including scope configuration, integration setup, and workflow tuning). The lack of
              an agent footprint is both a deployment advantage and a security posture benefit: Pentera does not expand
              the customer's own attack surface with agent software running on every endpoint.

              The 50+ integration connectors span five categories: SIEM and logging (Splunk, Microsoft Sentinel, IBM
              QRadar), vulnerability management (Tenable, Qualys, Rapid7), cloud security (Wiz, Lacework, AWS Security
              Hub), endpoint detection (CrowdStrike, SentinelOne, Carbon Black), and ticketing/ITSM (ServiceNow, Jira,
              BMC Helix). The integration density creates switching costs: removing Pentera requires rebuilding the
              remediation workflow in each connected system. Pentera's technology partner page lists CrowdStrike,
              Tenable, and Wiz as certified integration partners — confirming bidirectional data sharing rather than
              one-way export.

              Platform maturity is highest for Core (GA since 2019, 1,200+ customers) and Surface (GA since
              approximately 2021). Cloud is production GA but cloud-specific validation depth is less independently
              verified. Resolve is the newest module (launched approximately 2022-2023) and adoption rate among Core
              customers is not disclosed. SOC 2 Type II and FedRAMP certification status are not publicly confirmed on
              the Pentera website as of May 2026, which is a diligence gap for regulated-industry customers.
