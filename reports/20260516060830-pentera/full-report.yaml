      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >-
              The Adversarial Exposure Validation market lacks a single authoritative global sizing estimate. This
              section triangulates from three complementary analyst lenses: the BAS market (narrowest, best proxy for
              Pentera's SAM), the penetration testing market (broader, includes manual services), and a bottom-up SOM
              derived from Pentera's disclosed operating metrics.

              BAS market sizing: MarketsandMarkets estimates the global BAS market at USD 0.72 billion in 2024, growing
              to USD 2.40 billion by 2029 at a 27.0% CAGR. Mordor Intelligence estimates the BAS market at USD 1.05
              billion in 2025, growing to USD 3.61 billion by 2031 at a 22.87% CAGR. The two estimates diverge on
              methodology—MarketsandMarkets scopes "automated BAS" tools only while Mordor includes adjacent security
              simulation services—but both indicate the same 23–27% CAGR growth range and a 2025 market size of roughly
              USD 0.9–1.1 billion.

              Penetration testing market (TAM proxy): The broader penetration testing market—encompassing manual and
              automated services—was estimated at USD 1.98 billion (MarketsandMarkets) to USD 2.36 billion (Mordor
              Intelligence) in 2025, growing at CAGRs of 14.2% and 15.29% respectively to reach USD 4.39–5.54 billion by
              2031. This represents the full budget pool that automated AEV platforms compete against as a substitute
              for manual testing engagements.

              Bottom-up SOM: Pentera disclosed USD 100 million ARR in Q4 2025 from 1,200+ enterprise customers. This
              implies an average contract value of approximately USD 83,000 per customer annually (consistent with
              PeerSpot's reported average license of USD 120,000 for mid-market accounts). If Pentera captures 9–11% of
              the estimated USD 0.9–1.1 billion BAS/AEV SAM in 2025, the SOM for automated AEV platforms at Pentera's
              current pricing tier is approximately USD 150–300 million, indicating substantial headroom.

              Contradictory estimates and gaps: The two analyst firms' BAS figures differ by approximately 30% in their
              2025 estimates, reflecting inconsistent market boundary definitions. Neither report provides a specific
              "AEV" estimate aligned with Gartner's 2024 category definition. These gaps are preserved as evidence gaps.
