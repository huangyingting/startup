        blocks:
          - type: paragraph
            body: >
              Pentera operates a 100% SaaS subscription model selling annual enterprise licenses to organizations in
              financial services, healthcare, manufacturing, government, and technology verticals. Revenue is organized
              across four products: Pentera Core (internal network validation), Pentera Surface (external attack surface
