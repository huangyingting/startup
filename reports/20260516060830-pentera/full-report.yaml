            body: >
              Pentera operates at the intersection of automated security validation and CTEM — a market Gartner formally
              designated as "Adversarial Exposure Validation" in its 2024 Hype Cycle for Security Operations. The
              competitive landscape divides into four tiers. Tier 1 — Direct AEV/BAS peers: Cymulate, AttackIQ,
