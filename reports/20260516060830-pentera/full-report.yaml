      - number: '7.2'
        title: Regulatory, Legal, and Geopolitical Risk
        blocks:
          - type: paragraph
            body: >
              As an Israeli-domiciled company whose platform executes real-world offensive attack techniques, Pentera is
              subject to Israeli export control oversight through the Israeli Ministry of Defense (IMOD) Directorate for
              Defense Export Controls (DDEC). Israeli law (Defense Export Controls Law 5766-2007 and the Dual-Use Goods
              Law) requires exporters of cybersecurity products with dual-use or offensive characteristics to obtain
              licenses for specific end-user countries and use cases. Pentera has not publicly disclosed whether it
              holds the required DDEC licenses for all 100+ countries of deployment, representing a diligence gap that
              should be resolved in the data room.

              US export control exposure exists through EAR (Export Administration Regulations) applicability to
              products with encryption and offensive cyber capabilities exported to or from Israeli-based entities. The
              Commerce Department's Entity List and BIS export enforcement are relevant for any Pentera sales involving
              restricted end-users (e.g., government/defense customers in embargoed jurisdictions). No evidence of US
              BIS action against Pentera has been found.

              GDPR risk arises from Pentera's cloud-delivered AEV scanning, which processes enterprise network data (IP
              addresses, credentials, vulnerability data) for EU customers. Pentera's trust page indicates data
              processing terms exist, but public disclosure of the Data Processing Agreement structure, sub-processor
              list, and data residency architecture is limited. This creates a compliance gap for GDPR-regulated
              enterprise customers in the EU.

              No litigation, patent disputes, or regulatory enforcement actions are publicly recorded against Pentera in
              any US, EU, or Israeli court or regulatory registry as of May 2026. The SEC EDGAR D-form search confirms
              Pentera has filed investment notices (Form D for US private placements) consistent with its funding
              rounds, without any Form S-1 or registration statement indicating an imminent IPO.
            claimRefs: []
