              at year-end 2024). At $100M ARR and typical enterprise SaaS burn rates of 30-60% of ARR annually,
              Pentera's implied monthly burn is in the $3-6M range, suggesting 24-42 months of runway from the December
              2024 raise — well past any near-term capital event.

              An SEC regulatory filing (NPORT-P) by Felicitas Private Markets Fund, as of period ending Q3 2025, lists
