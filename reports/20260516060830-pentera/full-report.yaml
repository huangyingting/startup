    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Pentera, headquartered in Petah Tikva, Israel with a major US presence in Austin, Texas, is a private
              cybersecurity company at the Series C stage. Founded in 2015 as Pcysys by Dr. Arik Liberzon, the company
              subsequently rebranded to Pentera and defined the Adversarial Exposure Validation (AEV) category. Its core
              business model is a SaaS subscription platform that deploys automated adversarial attack sequences against
              customers' live production environments—internal networks, external surfaces, cloud workloads, and
              identities—to continuously identify exploitable vulnerabilities. Revenue derives from annual platform
              licenses (commonly reported at approximately $120,000 per year for mid-market deployments), expert
              advisory services, and adversarial testing engagements. The platform positions itself against both
              traditional point-in-time penetration testing firms and static vulnerability scanners, offering
              continuous, agent-based, real-world simulation at scale. As of early 2026, Pentera describes itself as
              setting "the global standard for exposure validation" and serves more than 1,200 enterprise customers
              across North America, Europe, Asia-Pacific, and emerging markets. Its go-to-market model is largely
              channel-driven, with a global partner program augmented by a direct enterprise sales force and
              professional services organization.
