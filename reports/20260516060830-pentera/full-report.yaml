          note: Fortune 500 logos; MSSP channel; financial services / healthcare / energy verticals
        - id: RL3
          label: Competitive Moat (6-year PST track record, Pentera Labs)
          note: 100+ CVE attributions; no competing platform with equivalent production-safe history
