    title: Recommendation Logic
    type: flow
    layout: wide
    summary: >-
      Directed flow showing how five evidence pillars (market scale, product proof, competitive moat, financial profile,
      risk profile) and valuation discipline combine to produce the conditional TRACK recommendation.
    data:
      nodes:
