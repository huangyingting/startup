      - number: '8.4'
        title: Exit Readiness, Final Recommendation, and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Pentera's IPO readiness signals are positive: CFO appointment (Hagit Ynon, 2025), $100M ARR milestone
              (January 2026), and institutional investor base (Insight Partners, K1, Evolution Equity) with established
              public market track records. The most likely exit path is IPO (2027-2029 window, pending public market
              conditions) or strategic acquisition by a large-platform security vendor (CrowdStrike, Palo Alto Networks,
              Microsoft, or IBM Security). At $1B Series C valuation, a strategic acquisition at 2-3x revenue ($200-300M
              ARR) would value Pentera at $2-4B, consistent with comparable security SaaS M&A premiums.

              The Israeli cybersecurity exit ecosystem is well-established: comparable exits include XM Cyber (€400M,
              Schwarz Group 2022), Checkmarx ($1.15B, Hellman & Friedman 2020), and Morphisec ($250M revenue at IPO
              preparation 2023). Pentera's scale ($100M ARR, $1B valuation) positions it above the median Israeli
              cybersecurity exit, in the upper tier of private Israeli security acquisitions.

              The final recommendation is TRACK with three blocking diligence gates: (1) NRR confirmation — if NRR is
              revealed above 115%, confidence upgrades to BUY at current valuation; below 100%, the recommendation
              downgrades to PASS; (2) SOC 2 Type II audit — absence is a blocking risk that prevents institutional
              security-sensitive LPs from investing; (3) Export control compliance confirmation — DDEC license status
              for all 100+ deployed countries must be confirmed to avoid retroactive enforcement risk. Subject to these
              three gate confirmations, Pentera represents a high-quality growth equity investment with a disciplined
              risk-adjusted return profile.
            claimRefs: []
          - type: table
            tableRef: TV005
