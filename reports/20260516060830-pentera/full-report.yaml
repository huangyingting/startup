  - id: FE002
    title: Pentera Customer Validation Workflow
    type: flow
    layout: standard
    summary: >-
      Five-stage closed-loop workflow from scope definition through continuous re-validation, showing how Core, Cloud,
      and Resolve work in sequence.
    data:
      nodes:
        - id: N1
          label: 1. Define Scope
          note: >-
            CISO configures validation targets: internal network segments (Core), external assets (Surface), cloud
            environments (Cloud); sets frequency and depth parameters
        - id: N2
          label: 2. Automated Adversarial Testing
          note: >-
            Pentera executes production-safe real attack chains against live environment; discovers credentials,
            misconfigurations, active exploits; no agent required on endpoints
        - id: N3
          label: 3. Attack Path Analysis
          note: >-
            Platform maps successful exploitation chains; prioritizes findings by criticality and business impact; maps
            each technique to MITRE ATT&CK matrix for coverage visibility
        - id: N4
          label: 4. Remediation Ticketing
          note: >-
            Pentera Resolve auto-creates ITSM tickets (ServiceNow, Jira) with prioritized fix steps; assigns ownership;
            tracks remediation progress across teams
        - id: N5
          label: 5. Re-Validation and Closure
          note: >-
            Platform re-tests after remediation confirmation; closes tickets on validated fix; updates ATT&CK coverage
            heatmap; feeds continuous posture trending
