      - number: '1.3'
        title: Funding History and Investor Ecosystem
        blocks:
          - type: paragraph
            body: >
              Pentera has raised capital from a distinguished set of venture and growth equity investors across five
              reported financing events. The company's earliest institutional backing came from AWZ Ventures (also
              referred to as AWZ Capital), led by Yaron Ashkenazi, which led the 2018 seed round before the company had
              any customers. Pentera's trajectory accelerated materially when Blackstone—one of the world's largest
              alternative asset managers—became both a customer and Series A investor, with Adam Fletcher, then
              Blackstone's Global CISO, serving as a key internal champion. This dual customer-investor relationship
              opened enterprise sales channels at scale in North America. Insight Partners joined in 2020 during the
              COVID-era funding surge, a moment the CEO has described as "being admitted to Harvard"; the Series B was
              reportedly oversubscribed. K1 Investment Management and Evolution Equity Partners supported later growth
              rounds focused on global GTM scaling and ARR acceleration. Farallon Capital Management and additional
              investors participated in the December 2024 Series C. The most recent disclosed round—$150M Series C in
              December 2024—brought the company to approximately $1B valuation, confirming unicorn status previously
              established in December 2021. Total equity raised across all rounds is not publicly disclosed, but based
              on reported rounds exceeds $250M. No debt facilities or revenue-based financing have been publicly
              disclosed.
