  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >-
              Pentera operates in the Adversarial Exposure Validation (AEV) market, a category formally coined by
              Gartner in 2024 to describe tools that autonomously simulate real attack techniques against production
              environments to validate security control efficacy. AEV sits within the broader Continuous Threat Exposure
              Management (CTEM) framework, also established by Gartner, which prescribes a five-step cycle (scoping,
              discovery, prioritization, validation, mobilization) that security teams use to manage exposure
              continuously rather than periodically. Pentera's platform addresses the validation and mobilization
              phases.

              The AEV market includes: automated breach and attack simulation (BAS) tools, continuous automated red
              teaming (CART), attack path validation (APV), and external attack surface validation. It excludes: manual
              penetration testing services (human consultants), SIEM/SOAR platforms, endpoint detection and response
              (EDR), vulnerability scanners (Qualys, Nessus), and broad exposure management platforms that focus
              primarily on asset discovery without active exploitation simulation.

              The closest single analyst category to AEV is the BAS market, which serves as the primary sizing proxy for
              this chapter. The broader penetration testing market (including manual services) is used as a secondary
              sizing lens to establish TAM. Key status quo substitutes include: manual penetration testing engagements
              (industry average $15–50K per engagement, performed annually), internal red teams (resource-constrained,
              limited continuous coverage), and point-in-time vulnerability scans that identify but do not validate
              exploitability.

              Adjacent markets with potential spend overlap include: External Attack Surface Management (EASM), Cyber
              Asset Attack Surface Management (CAASM), managed detection and response (MDR), and cyber insurance
              underwriting tools. The convergence of BAS, EASM, and red team automation into unified AEV platforms is
              the defining architectural trend shaping the competitive landscape through 2031.
