companyProfile:
  summary: >-
    Pentera is a private Israeli cybersecurity company and pioneer of the Adversarial Exposure Validation (AEV)
    category. Its platform runs continuous, automated attack emulation across network infrastructure, Active Directory,
    cloud, and application surfaces without requiring agents, using a patented ExploitFlow engine that chains real-world
    CVE exploits to validate which weaknesses are truly exploitable end-to-end. Founded in 2015 in Tel Aviv, Pentera has
    grown to $100M ARR, 1,200+ enterprise customers across financial services, healthcare, energy, government, and
    critical infrastructure, and a $1B valuation following its December 2024 Series C. The company has achieved
    category-defining position in AEV, earning Leader status from Gartner and Forrester and top G2 peer ratings, while
    facing intensifying competition from SafeBreach, Cymulate, and platform extensions from CrowdStrike and Microsoft.
  foundedDate: '2015-01-01'
