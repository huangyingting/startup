      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: NRR Is the Single Most Important Unknown
            body: >
              Every scenario in this analysis pivots on NRR. At >115% NRR, Pentera's expansion revenue covers new-logo
              acquisition costs and justifies a 12-15x ARR multiple with a clear path to profitability. At <100% NRR,
              Pentera's ARR growth is a treadmill — new logos replacing churned base, with no expansion economics. At a
              $1B valuation and 10x ARR, an investor is paying for expansion, not just acquisition. If NRR is below
              110%, the thesis price needs to be renegotiated or the position should not be taken.
            calloutType: insight
            claimRefs:
              - CV003
              - CV011
              - CV013
              - CV017
          - type: callout
            title: 'Platform Bundling Risk: The Most Underpriced Competitive Scenario'
            body: >
              The bear case probability is currently estimated at 25%, but the tails are fat. If Microsoft or
              CrowdStrike releases production-safe AEV as a $0 incremental add-on to their enterprise security suites,
              Pentera's $100K+ ACV product faces a direct pricing crisis. This is not a 3-5 year scenario — both vendors
              have stated public roadmaps with attack simulation components. The 12-18 month window before these become
              production-safe at enterprise scale is Pentera's clearest strategic urgency. The correct response is not
              product parity but platform depth — Pentera Resolve's ITSM integration creates stickiness that pure AEV
              bundling cannot easily replicate.
            calloutType: risk
            claimRefs:
              - CV009
              - CV016
              - CV023
              - CV032
          - type: callout
            title: 'The Israeli Unicorn Premium: Fair Discount Applied'
            body: >
              Pentera's $1B valuation represents a slight discount to US-headquartered peers with comparable ARR ($100M)
              and growth profile (30%+ CAGR) — a reflection of the geopolitical risk premium and private market
              information asymmetry on NRR. This discount is fair given current evidence. Importantly, the Israeli
              cybersecurity exit ecosystem (XM Cyber, Checkmarx, SentinelOne's IPO) demonstrates that Israeli-founded
              companies can achieve full public-market valuations at exit. The discount should compress post-IPO if NRR
              and operating metrics are disclosed and demonstrate category-leader quality. The entry point today
              captures that compression opportunity.
            calloutType: recommendation
            claimRefs:
              - CV019
              - CV021
              - CV025
              - CV026
          - type: callout
            title: 'Competing with Customers: The FedRAMP Gap Is a Revenue Ceiling'
            body: >
              Pentera's absence from FedRAMP creates a structural ceiling on US federal market participation. The US
              federal IT security market represents $15-20B annually, with cybersecurity validation an estimated 3-5%
              penetration opportunity ($450M-$1B). At Pentera's current enterprise ACV of $100-300K, even 50 federal
              agency deals would add $5-15M ARR. This is material for the ARR CAGR but requires FedRAMP authorization
              (6-12 month process). A FedRAMP authorization commitment is a strong signal for the bull case — absence
              through 2026 represents a missed opportunity that competitors (who are US-headquartered) can exploit.
            calloutType: insight
            claimRefs:
              - CV028
              - CV029
              - CV030
              - CV040
