  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger Event
      - Threshold / Signal
      - Transmission to Thesis
      - Action Implication
    rows:
      - - NRR Disclosure Below 100%
        - Official NRR disclosure (IPO S-1 or earnings) showing NRR <100%
        - ARR growth is acquisition-only; expansion thesis fails; LTV/CAC math uncompetitive
        - PASS — thesis requires NRR >110% to support expansion economics at 10x ARR valuation
      - - Production Testing Incident
        - Public Pentera-caused enterprise system damage — any confirmed production incident
        - Customer trust collapse; litigation risk; AEV category confidence damage
        - SELL or HOLD PAUSE — severity determines timing; no recovery path without multi-year incident-free period
      - - Competitive AEV Commoditization (MSFT/CRWD)
        - Microsoft Defender or CrowdStrike releases production-safe AEV as native enterprise module
        - Pentera's ASP compresses 30-50%; NRR falls as customers reduce Pentera to supplemental
        - REDUCE — urgency depends on pricing and feature parity; monitor for 2 quarters after announcement
      - - Export Control Enforcement Action
        - Israeli DDEC investigation, US BIS enforcement, or EU GDPR fine >$1M against Pentera
        - International sales blocked or restricted; retroactive compliance liability; reputational damage
        - REVIEW — sell if enforcement blocks key markets (US federal, EU, APAC); hold if limited scope
      - - Key R&D Team Departure
        - CTO + Labs Lead departure, or ≥3 senior Pentera Labs researchers in 12-month window
        - Exploit library velocity reduction; moat erosion begins; competitive differentiation decays
        - WATCH 2 quarters — if CVE attribution drops >50% YoY, moat erosion confirmed → REDUCE
      - - Down-Round (Series D below $1B valuation)
        - Series D or IPO priced below $1B (below Series C) — any down-round signal
        - Valuation impairment; investor confidence collapse; possible covenant triggers
        - REVIEW immediately — down-round signals execution failure or market deterioration; full thesis re-evaluation
    notes: >-
      Triggers are monitoring thresholds for institutional investors, not trading signals. All events require
      independent verification before action.
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Net Revenue Retention (NRR) by cohort (3-year)
        - NRR never disclosed publicly; no proxy from customer reviews or analyst reports
        - >-
          NRR is the single metric that differentiates a 3x from a 1.2x return; must confirm >110% for TRACK, >115% for
          BUY
        - Management / data room — request quarterly NRR by cohort, expansion module attach rates
      - - SOC 2 Type II Audit Report
        - >-
          No SOC 2 Type II or ISO 27001 publicly confirmed; trust page claims security compliance without audit
          documentation
        - >-
          Supply-chain risk is existential at 1,200+ enterprise deployments; absence blocks institutional
          security-focused LPs
        - Management / data room — request most recent SOC 2 Type II report as closing condition; non-negotiable
      - - Israeli DDEC Export License Status
        - No public disclosure of country restriction matrix or DDEC license scope for 100+ deployed geographies
        - DDEC non-compliance could retroactively block key international market revenue and create regulatory liability
        - >-
          Legal counsel review — request DDEC license scope, country restriction matrix, and outside counsel opinion on
          EAR status
      - - P&L — Burn Rate, Gross Margin, Operating Leverage
        - No financial statements, burn rate, or gross margin publicly disclosed; $150M Series C runway unknown
        - >-
          Burn rate determines IPO timeline urgency; gross margin determines platform economics quality; operating
          leverage confirms scalability
        - >-
          Management / data room — request Q1-Q4 2025 financials, gross margin by module, CAC/LTV, and burn bridge to
          IPO
      - - MSSP Channel Revenue Concentration
        - MSSP channel ARR is estimated 15-25% of total; top-3 MSSP concentration ratio unknown
        - If top-3 MSSPs represent >70% of channel ARR, a single churn event could compress 10-15% of total ARR
        - Management / data room — request channel revenue by partner (anonymized), top-3 concentration ratio
      - - Pentera Labs Team Composition and Retention
        - Labs team headcount, researcher identities, retention packages, and IP assignment agreements not public
        - >-
          Labs is the primary competitive moat; key-person risk is the moat erosion vector; must confirm depth and
          retention
        - >-
          Management / data room — request Labs org chart, retention schedule, IP assignment, and CVE attribution
          mapping
      - - Preference Stack and Cap Table
        - >-
          Liquidation preferences from Series B/D/C are unknown; preference overhang can materially reduce common equity
          returns
        - >-
          Downside scenario common equity value depends entirely on preference structure; cannot model returns without
          it
        - >-
          Legal / data room — request cap table with fully-diluted share count, liquidation preference stack, and
          anti-dilution provisions
    notes: >-
      This table represents the minimum diligence work product required before any investment decision. Items 1 (NRR)
      and 2 (SOC2) are blocking — without confirmation, TRACK recommendation should not be upgraded.
    claimRefs:
      - CV037
      - CV038
      - CV039
      - CV040
