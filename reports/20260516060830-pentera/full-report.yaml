      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Pentera's leadership team combines deep cybersecurity research expertise with seasoned go-to-market and
              operational execution. Dr. Arik Liberzon is the company's Founder and CTO, having established the firm in
              2015 based on his conviction that automated penetration testing was not only possible but necessary.
              Amitai Ratzon joined as CEO in 2018 when the company was still in stealth, partnering with Liberzon to
              bring the platform to market in 2019. Ratzon has described the founding vision as building a new
              category—Security Validation—rather than participating in the existing Breach and Attack Simulation (BAS)
              market, a positioning distinction that has since been validated by Gartner's formal recognition of the
              Adversarial Exposure Validation category. Aviv Cohen serves as Chief Marketing Officer and Ran Tamir as
              Chief Product Officer, both credited as core members of the founding team that navigated the initial
              go-to-market. In April 2026, Pentera appointed Hagit Ynon as Chief Financial Officer, a significant hire
              signaling potential preparation for broader capital markets activities. Peter Rodriguez leads channel
              strategy and was recognized on the CRN 2026 Channel Chiefs List. The board includes representatives from
              major institutional investors including Evolution Equity Partners, Insight Partners, K1 Investment
              Management, and Blackstone. No public adverse governance incidents (litigation, regulatory censure, or
              public board conflict) have been identified during the research period. Key-person risk is concentrated
              around Liberzon as the technical founder and Ratzon as the GTM architect, though the strong bench of named
              executive leadership mitigates concentration somewhat.
