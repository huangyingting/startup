        title: Capital Structure and Adequacy
        blocks:
          - type: paragraph
            body: >
              Pentera completed a $150M Series C funding round in December 2024, achieving unicorn status at a $1B
              valuation. Investors include Evolution Equity Partners, Insight Partners, and K1 Investment Management.
              This round was the largest single financing in Pentera's history and provides substantial runway for the
              company's go-to-market expansion, product development, and international growth. Prior rounds included
