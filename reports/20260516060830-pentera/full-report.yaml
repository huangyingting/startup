              orchestration). The company does not sell per-seat, per-node, or consumption-based licenses; all contracts
              are enterprise-wide annual subscriptions negotiated through direct sales or MSSP channel partners.

              Pentera's CEO disclosed in January 2026 that the company crossed $100M ARR in Q4 2025, making Pentera the
              first company in Gartner's Adversarial Exposure Validation category to reach this revenue milestone and
              achieve Centaur status. The CEO noted Pentera reached $100M ARR faster from market launch (2019) than
              CrowdStrike's benchmark timeline — establishing it as one of the fastest-growing enterprise cybersecurity
              SaaS companies in this generation of products. With 1,200+ enterprise customers, implied average ACV is
