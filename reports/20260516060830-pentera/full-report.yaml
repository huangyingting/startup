      - number: '3.3'
        title: Capability and Pricing Comparison
        blocks:
          - type: paragraph
            body: >
              Pentera's core differentiator is production-safe real-exploit execution: rather than simulating attacks or
              mapping theoretical paths, Pentera Core runs actual exploit chains against production internal networks.
              Cymulate and SafeBreach use simulation-based approaches, replaying known techniques without live
              exploitation. AttackIQ validates security controls without necessarily exploiting network assets. XM Cyber
              uses graph-based attack-path modeling only. This real-exploit versus simulation divide is the most
              substantive technical differentiation in the market. Pentera Cloud adds cloud and hybrid environment
              adversarial testing; Pentera Surface validates the external attack surface — together with Core, they
              create a three-surface platform matched only by XM Cyber in breadth among primary competitors. On pricing,
              no AEV/BAS vendor publicly discloses per-seat or per-node rates. Pentera is enterprise-focused with annual
