      - - Customers
        - 1,200+ enterprises at $100M ARR with Fortune 500 logos validates repeatability
        - MSSP channel + enterprise direct; financial services, healthcare, energy verticals
        - NRR opacity hides possible churn; customer concentration in financials creates correlated downside
        - NRR >115% disclosed in data room — confirms healthy base expansion
      - - Financials
        - $150M Series C provides adequate runway; $100M ARR demonstrates revenue scale
        - Series C closed December 2024; ARR milestone January 2026
        - No disclosed burn rate, operating leverage, or path to profitability
