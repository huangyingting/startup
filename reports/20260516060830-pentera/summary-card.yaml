  topStrengths:
    - >-
      First-mover and category-defining position in Adversarial Exposure Validation, with Gartner and Forrester Leader
      designations confirming analyst recognition.
    - >-
      $100M ARR milestone with 1,200+ enterprise customers across high-compliance verticals demonstrates genuine
      product-market fit at scale.
    - >-
      Patented ExploitFlow engine and agentless deployment architecture provide technical barriers that are difficult to
      replicate quickly.
    - >-
      $350M total capital raised with $1B valuation leaves balance-sheet runway to sustain R&D investment and geographic
