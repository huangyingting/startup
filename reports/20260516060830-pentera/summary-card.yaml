    - >-
      SafeBreach, Cymulate, and emerging AI-native pen-test platforms are narrowing the technical differentiation gap in
      real-time.
    - >-
      10x ARR multiple leaves no margin for a growth or retention miss; any NRR below 100% implies material valuation
      re-rating at IPO.
    - >-
      Israel-based headquarters and R&D create geopolitical, operational continuity, and sanctions-related risks that
      require active monitoring.
    - >-
      Absence of SEC filing disclosures on investor terms, option pool, and preference stack makes capital structure
      risk unquantifiable pre-commitment.
  unresolvedGaps:
    - >-
