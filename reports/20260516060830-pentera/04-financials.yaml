callouts:
  - id: KI001
    calloutType: strength
    title: "First AEV Centaur at $1B Valuation"
    body: >
      Pentera is the first company in Gartner's Adversarial Exposure Validation category to cross
      $100M ARR (Q4 2025) and achieve unicorn valuation ($1B, December 2024). No direct AEV/BAS
      peer has disclosed comparable ARR, and the $150M Series C from tier-1 growth investors
      (Insight Partners, K1) provides 24-42 months of capital runway. Category-first financial
      scale is the strongest strategic argument for a premium investment multiple.
    claimRefs: [CI001, CI002, CI003]

  - id: KI002
    calloutType: risk
    title: "All Key Unit Economics Are Private"
    body: >
      Gross margin, NRR, CAC, logo churn, and ACV distribution are all undisclosed. Without these
      metrics, Pentera's financial case rests entirely on ARR velocity and management-disclosed
      claims. An NRR below 110% would materially impair the moat thesis; a gross margin below 70%
      would impair the SaaS multiple. Both scenarios are possible given the high R&D investment
      required for continuous exploit library maintenance. These metrics must be obtained from the
      data room before any valuation underwriting.
    claimRefs: [CI013, CI014, CI015]

  - id: KI003
    calloutType: insight
    title: "Implied $83K ACV Underprices Enterprise Narrative"
    body: >
      At $100M ARR and 1,200+ customers, the implied average ACV is ~$83K — materially below the
      $150K-$500K enterprise range implied by Pentera's positioning and G2 perception. This gap
      likely reflects a mix of early-cohort lower-ACV customers (acquired pre-2022 at lower deal
      sizes) and newer large-enterprise deals at higher ACVs. The resolution of this discrepancy
      through ACV cohort data is one of the most important diligence questions.
    claimRefs: [CI004, CI005]

  - id: KI004
    calloutType: recommendation
    title: "Three Non-Negotiable Data Room Requests"
    body: >
      The three data room requests that must be resolved before financial underwriting can proceed
      are: (1) NRR by cohort year (2020-2025) to validate switching-cost moat; (2) gross margin
      percentage with and without R&D exploit-research costs allocated to COGS; and (3) ACV
      distribution by customer tier and cohort year to resolve the implied $83K discrepancy.
      Without these three metrics, Pentera's investment case is strategically supportable but
      financially unverifiable.
    claimRefs: [CI013, CI014, CI016]

