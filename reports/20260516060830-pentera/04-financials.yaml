  researchQuestions:
    - id: QI001
      question: "What is Pentera's confirmed ARR milestone and when was it achieved?"
      type: verification
      targets: ["contentRequirements/3"]
      status: answered
      rationale: >
        Pentera's CEO disclosed $100M ARR in Q4 2025 via a January 2026 blog post. This is the
        first AEV/BAS vendor to publicly disclose a $100M ARR milestone and represents the
        primary financial traction data point.

    - id: QI002
      question: "What was the size and valuation of Pentera's most recent funding round?"
      type: quantification
      targets: ["contentRequirements/4"]
      status: answered
      rationale: >
        $150M Series C closed December 2024, at a $1B valuation. Investors include Evolution
        Equity Partners, Insight Partners, and K1 Investment Management. This is Pentera's unicorn
        funding event.

    - id: QI003
      question: "What is Pentera's revenue model and primary contract structure?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        Pentera uses 100% annual enterprise SaaS subscriptions. No per-seat, consumption-based,
        or transactional revenue model. MSSP sub-licensing is a secondary channel. No services
        revenue disclosed separately.

    - id: QI004
      question: "What is the implied average ACV per customer and does it align with enterprise positioning?"
      type: quantification
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        $100M ARR divided by 1,200+ customers implies ~$83K average ACV. This is materially lower
        than the $150K-$500K range implied by enterprise positioning and $$$$$ G2 cost perception,
        suggesting early-cohort mix drag or sub-enterprise customer inclusion.

    - id: QI005
      question: "What does Pentera's gross margin look like and what is the cost structure?"
      type: quantification
      targets: ["contentRequirements/2"]
      status: unresolved
      rationale: >
        Gross margin is not publicly disclosed. For enterprise security SaaS, typical gross margin
        is 70-80%. Pentera's high R&D investment in exploit research may compress gross margin
        below this benchmark. This is a primary financial diligence gap.

    - id: QI006
      question: "What is Pentera's NRR and logo churn rate?"
      type: quantification
      targets: ["contentRequirements/0"]
      status: unresolved
      rationale: >
        NRR is not publicly disclosed. Industry benchmarks for category-leading enterprise SaaS
        are 110-130% NRR. Pentera's switching cost thesis depends on NRR above 110%; any figure
        below this materially impairs the competitive moat narrative.

    - id: QI007
      question: "What are Pentera's primary revenue streams by product line?"
      type: enumeration
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        Four product streams: Core (internal validation), Surface (EASM), Cloud (cloud/hybrid),
        Resolve (remediation). All four are annual SaaS subscriptions. ARR breakdown by
        product line is private but can be inferred from product age and adoption.

    - id: QI008
      question: "Does Pentera's capital adequacy support the investment thesis through 2027?"
      type: verification
      targets: ["contentRequirements/4"]
      status: answered
      rationale: >
        Yes — with $150M Series C (December 2024) and estimated burn of $3-8M/month, Pentera has
        an estimated 18-42 months of runway. Capital risk in the near-term diligence window is low.

    - id: QI009
      question: "How does Pentera's funding and valuation compare to primary AEV/BAS competitors?"
      type: comparison
      targets: ["contentRequirements/4"]
      status: answered
      rationale: >
        Pentera at $1B valuation ($150M Series C, Dec 2024) is the highest confirmed valuation in
        AEV/BAS. Cymulate (~$70M raised, 2022), Horizon3.ai ($40M, 2023), Picus (~$50M), SafeBreach
        (~$80M est.). Pentera's financial scale significantly leads the peer group.

    - id: QI010
      question: "What is the regulatory driver for Pentera's revenue — is security validation a mandatory spend?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        SEC Final Rule (Dec 2023) mandates 4-day material cybersecurity incident disclosure, forcing
        CISOs to continuously validate and reduce known exposure. NIST SP 800-115 also recommends
        periodic penetration testing. These mandates create non-discretionary demand for Pentera's
        platform.

    - id: QI011
      question: "What is Pentera's current headcount and hiring trajectory?"
      type: quantification
      targets: ["contentRequirements/1"]
      status: answered
      rationale: >
        Pentera careers page confirms active global hiring across 8 geographies (Israel, US,
        Germany, UK, Spain, Singapore, Australia, UAE), with dual HQ in Petah Tikva and Boston.
        LinkedIn public data (~500-700 employees) and Pentera Labs R&D arm confirm a mid-scale
        workforce consistent with a $100M ARR enterprise SaaS company. Exact headcount is
        undisclosed but size is estimable and consistent with the growth narrative.

    - id: QI012
      question: "What are the key financial signals from third-party reviews and customer feedback?"
      type: verification
      targets: ["contentRequirements/1"]
      status: answered
      rationale: >
        G2: 4.5/5 stars from 138 reviews, 8-month ROI payback, 3-month implementation, 11%
        average discount, $$$$$ perceived cost. These signals are directionally positive but
        are self-reported customer estimates; they cannot replace NRR or CAC data.

    - id: QI013
      question: "Is there an independent regulatory filing confirming Pentera's investor base?"
      type: verification
      targets: ["contentRequirements/4"]
      status: answered
      rationale: >
        Yes. The SEC NPORT-P filing by Felicitas Private Markets Fund (as of Feb 2026) lists
        'Awz Pentera II LLC' as a portfolio holding, independently confirming AWZ Ventures'
        continued equity stake in Pentera. This is the only public regulatory filing referencing
        Pentera as a portfolio company.

    - id: QI014
      question: "What is Pentera's integration ecosystem and how does it relate to switching costs?"
      type: mechanism
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        Pentera's integrations page shows 50+ integrations across SIEM, SOAR, ticketing, cloud,
        CSPM, ASM, and identity tools (ServiceNow, Jira, CrowdStrike, Tenable, Wiz, Splunk etc.).
        Deep workflow integration with existing security stack creates switching costs through
        remediation workflow dependency.

    - id: QI015
      question: "Is there a Pentera Resolve product with separate revenue potential?"
      type: verification
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        Yes. Pentera Resolve is a separately listed add-on product for automated remediation
        orchestration. It claims 90% alert reduction, 5x remediation speed, and 70% critical risk
        reduction. As a high-value add-on to Core, it is the primary upsell vehicle and expansion
        revenue driver — though Resolve ARR is not separately disclosed.

    - id: QI016
      question: "What is the CAC and sales-cycle length for Pentera enterprise deals?"
      type: quantification
      targets: ["contentRequirements/1"]
      status: unresolved
      rationale: >
        CAC is not publicly disclosed. Enterprise security deals typically have 6-12 month sales
        cycles with multiple security, IT, and finance stakeholders. CAC payback likely exceeds
        18 months given enterprise deal complexity. Actual figures are a primary data room request.

    - id: QI017
      question: "What is the contribution of MSSP channel to Pentera's total ARR?"
      type: quantification
      targets: ["contentRequirements/0"]
      status: unresolved
      rationale: >
        MSSP percentage of ARR not disclosed. Pentera's partners page mentions hundreds of MSSP
        partners globally. MSSP channel is typically lower-margin but provides scale and geographic
        coverage that direct sales cannot achieve cost-effectively.

    - id: QI018
      question: "Are there any adverse signals in Pentera's financial disclosures or investor base?"
      type: adverse
      targets: ["contentRequirements/5"]
      status: answered
      rationale: >
        Adverse signals: (1) Pentera has not disclosed list pricing since October 2019 (G2 pricing
        page), increasing buyer friction and reducing public market comparability. (2) The implied
        ~$83K average ACV is materially below enterprise positioning, suggesting pricing pressure
        or early-cohort mix issues. (3) There are no public gross margin or NRR disclosures,
        making independent verification of unit economics impossible.

    - id: QI019
      question: "Does IBM X-Force 2026 threat data support or challenge Pentera's revenue growth assumptions?"
      type: verification
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        Supports. IBM X-Force 2026 shows 44% year-over-year increase in exploitation of
        public-facing applications and 49% increase in active ransomware groups. Both trends
        accelerate CISO urgency for continuous exposure validation. Structural demand tailwinds
        support multi-year ARR growth without requiring market-share capture from peers.

    - id: QI020
      question: "What is the valuation multiple implied by the $1B unicorn valuation relative to ARR?"
      type: quantification
      targets: ["contentRequirements/3"]
      status: answered
      rationale: >
        At time of $150M Series C close (Dec 2024), Pentera's ARR was approaching $100M (reaching
        $100M in Q4 2025). Implied ARR multiple at December 2024: approximately 10-12x ARR at
        ~$85-90M ARR. This is a premium multiple justified by category leadership, growth velocity,
        and regulatory demand tailwinds, but requires NRR and gross margin validation.

    - id: QI021
      question: "What is the planned use of funds from the $150M Series C?"
      type: enumeration
      targets: ["contentRequirements/4"]
      status: answered
      rationale: >
        SecurityWeek and press coverage of the December 2024 round confirms the stated purpose:
        advancing autonomous security validation, expanding go-to-market in US federal, EMEA, and
        APAC, and accelerating product development. BusinessWire title reads "to Advance Autonomous
        Security Validation." Three primary use categories are standard for a growth-stage unicorn:
        product R&D, GTM scaling, and IPO/M&A readiness; full allocation detail is data-room only.

    - id: QI022
      question: "Is Pentera's CTEM product positioning a revenue opportunity or a marketing pivot?"
      type: verification
      targets: ["contentRequirements/0"]
      status: answered
      rationale: >
        CTEM positioning is primarily strategic/marketing: Pentera's platform maps to all five
        Gartner CTEM stages (identify, scope, discover, prioritize, mobilize) and this framing
        expands the TAM from BAS/AEV alone. No separate CTEM SKU or pricing tier exists; it is a
        narrative lens on the existing platform capabilities.

    - id: QI023
      question: "How does Pentera's reported outcome metrics (80% risk reduction, 60% pentest savings) compare to verifiable customer data?"
      type: adverse
      targets: ["contentRequirements/5"]
      status: answered
      rationale: >
        These are company-claimed aggregate outcomes published on the homepage without independent
        audit or case study backing accessible in public sources. G2 reviews provide partial
        directional support (4.5/5 rating, 8-month ROI), but do not validate the specific
        percentage claims. Verification requires case study access or customer reference calls.

    - id: QI024
      question: "What is Pentera's revenue growth rate from market launch to $100M ARR?"
      type: freshness
      targets: ["contentRequirements/3"]
      status: answered
      rationale: >
        Pentera went to market in 2019 and crossed $100M ARR in Q4 2025 — approximately 6-7
        years from market entry. The CEO blog specifically notes the timeline was faster than
        CrowdStrike's equivalent milestone. This implies a CAGR of 50%+ across the growth period.

    - id: QI025
      question: "Does Pentera have venture debt or credit facilities that could affect capital adequacy?"
      type: verification
      targets: ["contentRequirements/4"]
      status: unresolved
      rationale: >
        No venture debt or credit facility disclosures found in public sources. Many enterprise
        SaaS companies at $100M ARR supplement equity with venture debt for operational flexibility.
        This must be confirmed in the data room as an obligation that reduces effective runway.

