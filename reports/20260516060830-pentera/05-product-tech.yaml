callouts:
  - id: KE001
    calloutType: strength
    title: "Production-Safe Technology Creates Hard-to-Replicate Moat"
    body: >
      PST is not just a product feature — it's a production-grade engineering capability validated
      by 1,200+ enterprise deployments in live environments over 6+ years. Any competitor seeking
      to replicate production-safe agentless adversarial testing must first acquire the same
      operational trust history, which requires years of enterprise reference accounts. This is a
      qualitative moat that compounds with customer tenure.
    claimRefs: [CE002, CE017]

  - id: KE002
    calloutType: insight
    title: "Closed-Loop Remediation (Resolve) is the Expansion Revenue Engine"
    body: >
      Pentera Resolve converts security findings into managed remediation workflows, turning Pentera
      from a validation tool into an embedded workflow platform. This integration depth — connecting
      to ServiceNow, Jira, CrowdStrike, and SentinelOne — increases switching costs for existing
      Core customers and creates a natural upsell path that does not require new greenfield sales.
      The 90% alert reduction claim, if independently verified, would represent measurable SOC
      efficiency savings.
    claimRefs: [CE005, CE007, CE015]

  - id: KE003
    calloutType: risk
    title: "Mythos AI Maturity is Unverified by Independent Security Research"
    body: >
      Pentera's Mythos AI exploit generation capability is self-described in blog posts and product
      marketing. No independent evaluation, academic paper, or red-team benchmark has verified the
      depth or novelty of Mythos-generated exploits versus the proprietary library alone. If Mythos
      is primarily a repackaging of known CVE variants rather than genuinely novel attack chain
      generation, the AI differentiation narrative is a marketing overlay, not a technical moat.
    claimRefs: [CE016, CE022, CE035]

  - id: KE004
    calloutType: recommendation
    title: "Request SOC 2, FedRAMP Status, and Independent Pentest of Pentera Itself"
    body: >
      Three compliance diligence requests are non-negotiable before enterprise regulated-industry
      deal underwriting: (1) current SOC 2 Type II report for Pentera's own SaaS infrastructure;
      (2) FedRAMP status or roadmap for US federal and DOD market access; (3) a third-party
      penetration test of Pentera's own platform. A company selling security validation must itself
      withstand external adversarial scrutiny — and the fact that this is undisclosed publicly
      should be addressed directly in data room diligence.
    claimRefs: [CE014, CE030]

