companyProfile:
  summary: Pentera is a private Israeli cybersecurity company and pioneer of the Adversarial Exposure Validation (AEV) category. Its platform runs continuous, automated attack emulation across network infrastructure, Active Directory, cloud, and application surfaces without requiring agents, using a patented ExploitFlow engine that chains real-world CVE exploits to validate which weaknesses are truly exploitable end-to-end. Founded in 2015 in Tel Aviv, Pentera has grown to $100M ARR, 1,200+ enterprise customers across financial services, healthcare, energy, government, and critical infrastructure, and a $1B valuation following its December 2024 Series C. The company has achieved category-defining position in AEV, earning Leader status from Gartner and Forrester and top G2 peer ratings, while facing intensifying competition from SafeBreach, Cymulate, and platform extensions from CrowdStrike and Microsoft.
  foundedDate: "2015-01-01"
  founders:
    - name: Amitai Ratzon
      role: Co-founder / CEO
      background: Led Pentera from founding through $100M ARR; previously in Israeli intelligence and enterprise security.
      claimRefs: []
    - name: Arik Liberzon
      role: Co-founder / CTO
      background: Technical founder; built the ExploitFlow engine and autonomous attack-emulation architecture.
      claimRefs: []
    - name: Ran Tamir
      role: Co-founder
      background: Security researcher co-founder; expertise in vulnerability exploitation and adversarial simulation.
      claimRefs: []
  foundingLocation: Tel Aviv, Israel
  headquarters: Tel Aviv, Israel
  productSummary: Pentera sells an agentless automated security validation platform that continuously emulates real cyberattacks—including lateral movement, privilege escalation, credential theft, and ransomware simulation—across on-premises, cloud, and hybrid environments. Its ExploitFlow engine chains real CVEs into kill-chain sequences and produces an evidence-based remediation roadmap prioritised by actual exploitability, not theoretical severity. The platform addresses CTEM use cases and maps findings to MITRE ATT&CK.
  customerFocus: Large enterprises and mid-market organizations in financial services, healthcare, energy, government, defense, and critical infrastructure requiring continuous proof of security posture against real attack techniques.
  businessModel: Annual subscription licensing with per-asset or platform-tier pricing, sold via direct enterprise sales and channel partners. ARR-based SaaS model with land-and-expand potential across enterprise segments and geographies.
  stage: Series C private / unicorn
  fundingStatus: $350M total raised including a $150M Series C in December 2024 at a $1B valuation; investors include Insight Partners, K1 Investment Management, Evolution Equity Partners, and AWZ Ventures.
  disclosureProfile: private-undisclosed
  claimRefs: []

summary:
  headline: Pentera is the clear AEV category leader at $100M ARR and a $1B valuation, but NRR opacity, competitive commoditization risk, and Israel-based operational exposure warrant rigorous private diligence before investing at current multiples.
