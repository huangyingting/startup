    title: Revenue Concentration Risk Table
    columns:
      - Risk Factor
      - Description
      - Impact Level
      - Potential Impact on Revenue Ramp
      - Mitigation Signal
    rows:
      - - Single-hyperscaler concentration
        - >-
          Initial FY2028 revenue likely concentrated in one or two hyperscaler programs; broad diversification not
          expected until FY2029+
        - High
