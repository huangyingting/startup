figures:
  - id: FU001
    title: Customer Engagement Funnel
    type: flow
    layout: standard
    summary: >-
      Six-stage linear process from hyperscaler awareness through production ramp, illustrating the multi-year
      qualification pipeline that explains the 2024 design-win announcement leading to a projected 2028 revenue start.
      Celestial AI was positioned at stages 2–3 at acquisition.
    data:
      nodes:
        - id: n1
          label: Awareness and Technical Outreach
          detail: >-
            OFC conference presentations, white papers, direct outreach to hyperscaler architecture teams. Celestial
            AI's 2023–2024 publication strategy built awareness of the Photonic Fabric value proposition for AI Memory
            Wall solutions.
        - id: n2
          label: NDA Technical Evaluation
          detail: >-
            Hyperscaler signs mutual NDA; receives technical specifications, roadmap, and first samples. CEO Lazovsky
            confirmed multiple hyperscalers in NDA evaluation by early 2025.
        - id: n3
          label: Design-In Commitment
          detail: >-
            Hyperscaler formally incorporates Photonic Fabric into a specific XPU architecture. At least one hyperscaler
            confirmed at this stage via March 2024 OFC announcement.
        - id: n4
          label: Silicon Sampling and Characterization
          detail: >-
            Pre-production silicon delivered for optical, electrical, and thermal validation. Estimated 6–12 months.
            Status at acquisition for lead hyperscaler not publicly confirmed.
        - id: n5
          label: Qualification Testing
          detail: >-
            Full multi-rack AI cluster integration test; reliability and co-packaging yield validation. Typically 12–24
            months. Expected to complete 2026–2027 for lead hyperscaler.
        - id: n6
          label: Production Ramp
          detail: >-
            Volume manufacturing begins; revenue recognized. Marvell projects first revenue H2 FY2028, reaching $500M
            ARR by Q4 FY2028 and $1B ARR by Q4 FY2029.
    approximationNotes: >-
      Stage position for Celestial AI inferred from the March 2024 design-win announcement and Marvell's projected H2
      FY2028 revenue timing; individual hyperscaler stage positions not publicly confirmed.
