  - id: s3
    title: Marvell Customer Channel and Named End Customers
    body: |
      Marvell's established custom AI silicon relationships provide the primary commercial channel
      through which Celestial AI's Photonic Fabric will reach hyperscaler end customers post-
      acquisition. Marvell currently serves three hyperscaler custom silicon programs with confirmed
      or near-confirmed commercial relationships.

      Microsoft is Marvell's largest and most strategically significant custom AI silicon customer.
      Microsoft's Project Maia300—the successor to the Maia200—is being developed with Marvell as
      the primary ASIC design partner, targeting a 2nm process node with HBM4 memory integration.
      Estimated shipments of 300,000 to 400,000 units are expected by end of calendar 2026, ramping
      to 1.2 to 1.5 million units in 2027. The Maia300 program requires exactly the kind of co-
      packaged optical scale-up connectivity that Photonic Fabric provides, making it the clearest
      near-term integration pathway for initial Photonic Fabric revenue contribution.

      Amazon is Marvell's second major custom silicon customer via the Trainium AI training and
      Inferentia AI inference programs. Amazon's special warrant for MRVL shares—granted as part of
      the Marvell-Celestial AI acquisition agreement—confirms Amazon as the most explicitly
      committed future Photonic Fabric customer among all publicly identifiable parties. While
      competitive pressure from Alchip on next-generation Trainium variants introduces some
      uncertainty about Marvell's long-term role in the core XPU, the warrant structure specifically
      ties Amazon equity to Photonic Fabric purchases, ensuring incentive alignment.

      Google was reported in early 2026 to be in late-stage discussions with Marvell to become its
      third major custom AI silicon partner, supplementing its Broadcom and TPU infrastructure with
      Marvell-designed inference-focused chips. This would create a third distribution channel for
      Photonic Fabric. NVIDIA's NVLink Fusion partnership announced March 31, 2026, creates a
      fourth pathway: enabling third-party custom silicon integrating with NVIDIA's NVLink
      interconnect fabric, with NVIDIA investing $2 billion in Marvell to co-develop optical
      networking and silicon photonics capabilities at scale.
