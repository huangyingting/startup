callouts:
  - calloutType: strength
    title: Amazon Warrant Locks In Demand Signal
    body: >-
      The Amazon warrant structure—tying equity vesting to cumulative Photonic Fabric product purchases through December
      2030—is the strongest publicly available evidence of committed hyperscaler demand. It converts a speculative
      customer relationship into a financially aligned commitment, providing Marvell with multi-year demand visibility
      and confirming that Amazon conducted sufficient technical due diligence to accept equity exposure tied to
      adoption.
    claimRefs:
      - C181
      - C182
      - C183
      - C184
  - calloutType: risk
    title: Customer Concentration Risk in FY2028 Revenue Ramp
    body: >-
      Initial FY2028 revenues are likely concentrated in one or two hyperscaler production programs. A delay, program
      cancellation, or hyperscaler capex deceleration at the lead hyperscaler could materially defer the $500M ARR
      milestone and jeopardize earn-out vesting. This is structurally unavoidable in early-stage semiconductor ramp
      scenarios and is the primary near-term risk identified by analysts covering the acquisition.
    claimRefs:
      - C186
      - C185
  - calloutType: insight
    title: Pre-Revenue Traction Is Industry-Standard for Deep-Tech Chiplet Startups
    body: >-
      The absence of production revenue at acquisition is typical for optical chiplet companies given 24–36 month
      hyperscaler qualification timelines. Celestial AI's stage—with a confirmed design-in and multiple NDA
      evaluations—represents strong pre-production commercial progress comparable to companies that have been acquired
      or IPO'd at similar stages in analogous semiconductor sub-sectors.
    claimRefs:
      - C194
      - C188
