  - id: s5
    title: Revenue Ramp and Customer Concentration Risk
    body: |
      Marvell explicitly guided to de minimis revenue contributions from Celestial AI for fiscal
      years 2026 and 2027, consistent with the company's pre-production status at acquisition and
      the multi-year hyperscaler qualification timeline. The first material revenues are expected
      in H2 FY2028, with a projected $500M annualized run rate by Q4 FY2028 and $1B ARR by
      Q4 FY2029. These projections represent Marvell management's forward guidance and carry
      standard forward-looking statement caveats. Analysts expect revenue to begin in H2 calendar
      2027 (aligning to Marvell's H2 FY2028) when the first production deployments commence.

      The earn-out structure embedded in the acquisition agreement provides an important signal
      about the implied customer pipeline: one-third of the up-to-$2.25B earn-out vests if
      cumulative Celestial AI revenue reaches $500M by FY2029 end; full earn-out requires
      cumulative revenue exceeding $2B. These thresholds imply Marvell reviewed specific contracted
      or highly probable customer commitments during due diligence that supported its confidence
      in the ramp trajectory.

      Customer concentration risk is a key structural vulnerability. Early-stage semiconductor
      programs with hyperscaler customers typically generate highly concentrated initial revenues—
      the first production program likely represents near-total revenue for FY2028. A delay,
      capex cycle deceleration, program cancellation, or competitive substitution at the lead
      hyperscaler could materially defer the $500M ARR milestone and threaten earn-out vesting.
      Analysts specifically identified this single-hyperscaler concentration as the primary
      near-term financial risk from the acquisition. The Amazon warrant partially mitigates
      concentration risk by ensuring a second committed demand signal, but does not constitute a
      binding purchase commitment with a fixed quantity or timeline. Diversification across
      Microsoft, Amazon, Google, and NVIDIA ecosystem channels is expected to reduce concentration
      risk in FY2029 and beyond as additional programs reach production.
