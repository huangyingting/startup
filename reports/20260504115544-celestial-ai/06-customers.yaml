company:
  name: Celestial AI
chapter:
  number: 6
  title: Customers
  summary: |
    Celestial AI was pre-revenue at acquisition with no publicly confirmed production customers.
    Its customer traction rested on a March 2024 design-win announcement with an unnamed leading
    hyperscaler, NDA-based technical evaluations across multiple hyperscalers, and the Amazon warrant
    structure embedded in the Marvell acquisition agreement—which functions as a quasi-purchase
    commitment by Amazon tied to Photonic Fabric product purchases through December 2030. Post-
    acquisition, Marvell is the primary internal customer; hyperscaler end-buyers—Microsoft (Project
    Maia300), Amazon (Trainium/Inferentia), and Google (in active discussions)—are reached through
    Marvell's established custom silicon channel. The NVIDIA NVLink Fusion partnership (March 2026)
    adds a fourth channel. Marvell projects de minimis revenue from Celestial AI through FY2027, with
    a $500M ARR target by Q4 FY2028 and $1B ARR by Q4 FY2029. Customer concentration risk is
    structurally elevated: the initial revenue ramp likely depends on a single hyperscaler's
    production schedule, making timing and purchasing-pace decisions by that customer critical to
    Marvell's earn-out milestones.
sections:
  - id: s1
    title: Customer Overview and Market Position
    body: |
      Celestial AI was a pre-revenue company at the time of its February 2, 2026 acquisition by
      Marvell Technology. The company operated in the semiconductor hardware category where revenue
      recognition requires production-volume chip deployment at hyperscaler data centers—a process
      that typically spans 24 to 36 months from initial design-in to first revenue. No publicly
      confirmed production customers existed at acquisition. Marvell explicitly guided to de minimis
      revenue contributions from Celestial AI for fiscal years 2026 and 2027.

      Despite the absence of production revenue, Celestial AI was not without documented customer
      traction. In March 2024, at the Optical Fiber Communication (OFC) conference, the company
      announced that a leading (unnamed) hyperscaler had formally adopted Photonic Fabric for
      next-generation AI processors—described as one of the earliest large-scale commitments to
      replace copper interconnects with optical alternatives in AI system design. CEO Dave Lazovsky
      stated in multiple interviews that additional hyperscalers were engaged in NDA-based technical
      evaluations. The volume implied by the design win—hundreds of thousands of chiplet units per
      quarter at production ramp—signals material pipeline rather than exploratory proof-of-concept.

      The ultimate end buyers of Photonic Fabric are hyperscale cloud and AI infrastructure
      operators: Amazon Web Services, Microsoft Azure, Google Cloud, and Meta. These companies build
      custom AI accelerators (XPUs) for training and inference workloads, and Photonic Fabric
      addresses the bandwidth bottleneck between processing units and memory pools—the AI Memory
      Wall—by providing optical scale-up connectivity delivering 16 Tbps per chiplet per direction.
      Celestial AI's customer engagement model required deep design-in collaboration with both the
      hyperscaler and the ASIC packaging partner, explaining why engagement periods spanned years
      before revenue. Post-acquisition, Marvell Technology is both the primary custodian and the
      principal internal customer of Photonic Fabric technology, integrating it into its Data Center
      Group's custom silicon programs for delivery to hyperscaler end customers.
    claimRefs:
      - CU009
      - CU018
      - CU017
      - CU021
      - CU001
      - CU014
  - id: s2
    title: Strategic Investor Signals as Customer Proxies
    body: |
      In the semiconductor industry, strategic corporate venture investments reliably signal
      supply-chain alignment and potential customer or manufacturing-partner intent. Celestial AI's
      investor roster from the Series C (March 2024) and Series C1 (March 2025 through August 2025)
      rounds contains multiple strategic investors who are simultaneously likely customers,
      manufacturing partners, or critical ecosystem participants.

      AMD Ventures' participation in the Series C signals AMD's interest in optical interconnect
      technology for future XPU architectures. AMD is a major AI accelerator supplier and its XPU
      products could directly integrate Photonic Fabric for pooled-memory scale-up. This alignment
      makes AMD a high-probability design partner and possible indirect customer through
      hyperscaler-commissioned custom chip programs that use AMD silicon.

      TSMC VentureTech Alliance participated in both the Series C and the final Series C1 close in
      August 2025, confirming foundry-level manufacturing alignment. TSMC is the sole credible
      volume manufacturer for Celestial AI's silicon photonics chiplets at advanced nodes, and this
      investment ensures preferential capacity allocation, process co-development, and supply chain
      readiness as Photonic Fabric transitions to volume production. Samsung Catalyst's participation
      in both rounds signals HBM memory integration interest; Samsung's advanced packaging and
      HBM expertise are directly required for Photonic Fabric's memory disaggregation architecture.

      Amazon's role is the most direct and most commercially significant. As part of the Marvell
      acquisition announcement, Marvell issued Amazon a warrant to purchase approximately 1,045,171
      MRVL shares at an exercise price of $87.0029 per share, with vesting tied entirely to
      Amazon's cumulative purchases of Photonic Fabric products through December 2030, exercisable
      until December 2031. This structure legally and financially commits Amazon as a forward
      customer with equity-aligned incentives to drive Photonic Fabric adoption, providing Marvell
      with multi-year demand visibility that analysts have described as effectively locking in Amazon
      as a foundational customer. The ecosystem also includes Broadcom (custom silicon and ASIC
      design services) and Samsung (HBM and advanced packaging), forming the supply chain required
      to serve hyperscaler customers at production scale.
