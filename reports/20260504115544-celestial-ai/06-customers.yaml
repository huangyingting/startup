        - >-
          Amazon warrant provides second committed demand signal; NVLink Fusion and Google talks suggest pipeline
          diversification
      - - Hyperscaler capex cycle deceleration
        - >-
          AI infrastructure capex by hyperscalers is cyclical and exposed to macro and ROI pressures; slowdown would
          reduce XPU volumes and Photonic Fabric attach rates
        - High
        - Marvell's FY2028 revenue ramp depends on hyperscalers sustaining aggressive AI capex through 2026–2028
        - Hyperscaler AI capex grew 72% in 2025; near-term deceleration risk is low but non-zero by 2027–2028
      - - Competitive substitution
        - >-
          Ayar Labs, Lightmatter, Broadcom CPO, and Intel OCI are competing optical chiplet solutions that could win
          design-ins at hyperscalers where Photonic Fabric has not yet secured a position
        - Medium
        - Loss of a second or third hyperscaler design-in to a competitor reduces FY2029 ramp trajectory
        - >-
          Celestial AI's design-in lead with the unnamed hyperscaler and Marvell's channel relationships provide
          first-mover advantage
      - - Marvell integration and execution risk
        - >-
          Celestial AI technology must be successfully integrated into Marvell's custom silicon workflow and volume
          manufacturing operations post-acquisition
        - Medium
        - Integration delays or yield problems in Marvell's production ramp could defer revenue by 2–4 quarters
        - >-
          TSMC investment and existing manufacturing alignment reduce integration risk; Marvell has deep silicon
          photonics capabilities via prior acquisitions
      - - Amazon XPU competitive pressure
        - >-
          Reports of Alchip winning next-generation Trainium design work from Amazon could reduce Marvell's Amazon XPU
          volume, limiting the Photonic Fabric attach opportunity at AWS
        - Medium
        - Reduced Marvell XPU volume at Amazon would lower the natural channel for Photonic Fabric adoption at AWS
        - >-
          Amazon warrant creates independent financial incentive for AWS to adopt Photonic Fabric regardless of XPU chip
          designer
    notes: >-
      Risk levels are qualitative assessments based on analyst commentary and disclosed deal structure as of the May
      2026 report run date.
