  - id: F604
    title: Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      Six-stage customer journey from technology discovery through ecosystem expansion, mapping how a hyperscaler
      progresses from first awareness of Photonic Fabric to multi-rack production deployment and eventual
      diversification across Marvell's custom silicon programs.
    data:
      items:
        - label: Technology Discovery
          detail: >-
            Hyperscaler architecture team encounters Photonic Fabric via OFC conference presentations, industry white
            papers, or direct Celestial AI outreach. Initial interest stems from bandwidth and power constraints on
            copper scale-up interconnects.
        - label: NDA Qualification Engagement
          detail: >-
            Mutual NDA executed; Photonic Fabric benchmarked against copper and competing optical solutions in internal
            hyperscaler labs. CEO Lazovsky confirmed multiple hyperscalers at this stage before Series C1 close in March
            2025.
        - label: XPU Design Integration
          detail: >-
            Photonic Fabric chiplet interfaces defined and committed to a specific XPU architecture. Integration
            requires co-design with ASIC partner (e.g., Broadcom or Marvell custom silicon) and advanced packaging
            supplier (e.g., TSMC CoWoS or Samsung).
        - label: System-Level Validation
          detail: >-
            Photonic Fabric tested in full AI cluster environment; co-packaging yield, thermal envelope, optical link
            reliability, and memory coherence protocols validated across multiple racks. Typically the longest stage at
            12–24 months.
        - label: Production Commitment and Ramp
          detail: >-
            Volume purchase orders placed; production manufacturing commences at TSMC; chiplets shipped to hyperscaler
            for integration into production AI systems. Revenue recognition begins. Marvell targets this stage in H2
            FY2028 for the lead hyperscaler program.
        - label: Ecosystem Expansion
          detail: >-
            Additional hyperscaler programs and NVIDIA NVLink Fusion customers adopt Photonic Fabric; Amazon warrant
            vesting accelerates AWS adoption; multi-hyperscaler diversification reduces concentration risk through
            FY2029 and beyond.
    approximationNotes: null
