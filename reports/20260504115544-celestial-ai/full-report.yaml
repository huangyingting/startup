  foundingLocation: Santa Clara, CA
  headquarters: Santa Clara, CA
  productSummary: |
    Photonic Fabric: an EAM-based silicon photonics optical chiplet for AI data center
    scale-up interconnects. Co-packaged with XPU silicon using TSMC CoWoS advanced
    packaging to provide chip-to-chip and chip-to-memory optical connectivity at
    multi-terabit-per-second bandwidth with ~5 pJ/bit energy efficiency.
  customerFocus: >
    Hyperscalers (AWS, Google, Microsoft, Meta) via Marvell's custom AI silicon business; AI chip companies (NVIDIA via
    NVLink Fusion, AMD via Marvell partnership).
  businessModel: >
    Chiplet licensing and supply: silicon photonics optical chiplet integrated into customer XPU packages via TSMC CoWoS
    co-packaging; revenue recognized per-chiplet in production.
  stage: Acquired (formerly Series C1 / late-stage private)
  fundingStatus: >
    Acquired by Marvell Technology February 2026. Prior to acquisition: $515M total raised over seed, Series A, B, C,
    and C1 rounds.
