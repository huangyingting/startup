      - number: '5.5'
        title: Technology Risks and Mitigation Gaps
        blocks:
          - type: paragraph
            body: |
              Five categories of technology risk are material to the Photonic Fabric investment thesis
              following the Marvell acquisition.

              EAM insertion loss: While EAMs outperform MRMs on thermal stability and bandwidth linearity,
              EAMs can exhibit higher optical insertion loss under specific waveguide geometry and bias
              configurations. Higher insertion loss demands more powerful laser sources, increasing system
              power and cost, and can reduce link budget margin at scale. No independent laboratory has
              published a head-to-head silicon comparison of EAM versus MRM insertion loss under identical
              production-equivalent conditions.

              TSMC CoWoS capacity concentration: Photonic Fabric depends exclusively on TSMC's SiPh and
              CoWoS processes. TSMC's CoWoS capacity is heavily allocated to NVIDIA's HBM stacking and
              Broadcom's custom ASICs. Adding Celestial AI's photonic interposer layers introduces
              scheduling complexity. Any TSMC capacity constraint or yield shortfall could push volume
              production beyond the FY2028 revenue targets, directly threatening the Marvell earn-out
              structure.

              Thermal management at co-packaged XPU scale: Optical engines co-packaged with 500W–900W
              XPUs generate heat that must be dissipated without thermally coupling into adjacent photonic
              structures. While EAMs tolerate 85°C swings, sustained high-power operation creates heat
              flux management challenges at the package level that are not yet resolved at production scale.

              CPO standardization risk: The OIF CPO Implementation Agreement (3.2 Tbps module) and IEEE
              802.3 Ethernet working group standards for embedded optics are still evolving. Lack of
              interoperability standards means each hyperscaler must qualify Photonic Fabric independently,
              extending qualification cycles and increasing per-customer integration costs.

              Technology readiness uncertainty: Despite four TSMC tapeouts, no external production
              qualification or independent third-party silicon characterization has been publicly disclosed.
              All performance claims derive from company presentations and an arXiv preprint — not
              peer-reviewed publications with independent silicon measurements. This gap increases
              customer hesitancy before committing to production deployments.
            claimRefs:
              - C149
              - C157
              - C165
              - C166
              - C150
      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: EAM Thermal Resilience Is Durable Structural Advantage vs. MRM Competition
            body: |
              Celestial AI's EAM-based design tolerates greater than 85°C temperature swings and
              200°C/sec transient ramps without active thermal tuning. This is a structural advantage
              over the dominant MRM-based approach (Ayar Labs TeraPHY) in co-packaged XPU environments
              where GPU die temperatures fluctuate dynamically under varying AI workloads. Elimination
              of per-modulator heater circuits reduces both power overhead and design complexity in
              high-power XPU packages.
            calloutType: strength
            claimRefs:
              - C149
          - type: callout
            title: 200+ Patent Portfolio with 2014-Vintage EAM Coverage From Rockley Acquisition
            body: |
              The $20 million Rockley Photonics IP acquisition in October 2024 added more than 200
              patents with EAM and optoelectronic SiP coverage dating to 2014 — predating most silicon
              photonics startups and Celestial AI's direct competitors. Combined with organic patents
              from 2020, the layered IP portfolio creates a moat that is expensive to design around for
              new entrants targeting EAM-based in-die optical I/O.
            calloutType: strength
            claimRefs:
              - C152
              - C153
              - C154
          - type: callout
            title: Single-Foundry TSMC Dependency Creates Production and Revenue Timeline Concentration Risk
            body: |
              All Photonic Fabric production relies on TSMC's SiPh process and CoWoS advanced packaging.
              TSMC's CoWoS capacity is heavily allocated to NVIDIA and Broadcom with multi-year reservation
              agreements that predate Celestial AI's production requirements. Any capacity constraint,
              yield shortfall, or TSMC prioritization decision could delay Photonic Fabric production
              qualification beyond the H2 FY2028 revenue milestone.
            calloutType: risk
            claimRefs:
              - C157
              - C166
          - type: callout
            title: NVLink Fusion Partnership Doubles TAM and Accelerates Customer Pipeline for Photonic Fabric
            body: |
              Marvell's March 2026 NVLink Fusion partnership with NVIDIA, backed by a $2 billion NVIDIA
              strategic investment in Marvell, opens Photonic Fabric to NVIDIA-ecosystem AI clusters in
              addition to UALink-based custom XPU deployments. This effectively expands the near-term
              addressable market and provides a strong demand signal that should accelerate hyperscaler
              qualification timelines for Photonic Fabric co-packaged with Marvell XPUs.
