  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Technology Execution Risks
        blocks:
          - type: paragraph
            body: |
              Celestial AI's Photonic Fabric is a silicon photonics optical chiplet using electro-absorption
              modulators (EAMs) manufactured on TSMC's advanced process nodes and co-packaged using CoWoS
              advanced packaging. Four interlocking technology risks could impair the revenue ramp.

              Manufacturing yield and capacity. Silicon photonics yield for EAM-based chiplets at high
              volumes has not been publicly disclosed. Celestial AI has reported at least four successful
              tapeouts and a pre-FEC bit error rate below 1e-8 at -10 dBm OMA input, which is consistent
              with manufacturing-ready photonic yields, but production-volume yield curves remain private.
              The more acute near-term constraint is TSMC CoWoS advanced packaging capacity: TSMC's
              CoWoS lines are sold out through 2026, with NVIDIA reserving an estimated 60–70% of
              CoWoS-L capacity for its Blackwell and Rubin GPU programs. Even as TSMC targets expanding
              from approximately 70,000 to 130,000 CoWoS wafers per month by late 2026, independent
              analysts project demand will continue to outpace supply. This creates reservation-timeline
              risk for Marvell: any delay in securing a CoWoS slot will directly delay the Photonic Fabric
              volume ramp and the $500M ARR target. TrendForce reported in April 2026 that CoWoS advanced
              packaging wafer ASP is reportedly approaching 7nm wafer levels, significantly adding to unit
              cost pressure.

              Thermal management. Co-packaged optics place the optical engine in close physical proximity
              to hot XPU die, creating a thermal co-management challenge that is non-trivial at scale.
              EAMs offer a notable advantage here: Celestial AI's CTO Phil Winterbottom demonstrated at
              Hot Chips 2025 that EAMs tolerate temperature excursions of up to 200°C per second and
              operate over swings exceeding 85°C without degrading signal integrity — a direct advantage
              versus ring modulators, which require fine thermal control. However, managing the combined
              thermal envelope of XPU die and the laser pump source in the same advanced package remains
              an active engineering problem.

              Integration software and technology obsolescence. The firmware and software stack for
              managing optical I/O across multi-rack AI clusters is immature industry-wide. Configuration
              management, fault isolation, and dynamic reconfiguration of optical links add complexity
              compared to copper. In addition, alternative photonics platforms — lithium niobate-on-insulator
              (LNOI), indium phosphide (InP), and III-V compound semiconductors — continue to advance, with
              LNOI particularly attracting research interest for its ultra-low insertion loss and high
              bandwidth density. Should any alternative platform achieve CMOS-compatible volume manufacturing
              at competitive cost, EAM silicon photonics could face technology obsolescence risk within a
              5–7 year horizon.
            claimRefs:
              - C235
              - C236
              - C237
              - C237
              - C225
              - C233
              - C215
              - C216
              - C217
              - C218
      - number: '7.2'
        title: Market Timing and Adoption Risks
        blocks:
          - type: paragraph
            body: |
              Marvell's earn-out structure — with $500M ARR targeted by fiscal year 2028 and $2B ARR for
              the maximum payout — is tightly coupled to the pace of hyperscaler CPO adoption. Three
              factors introduce meaningful timing risk.

              CPO adoption timeline. LightCounting's July 2025 analysis of the first virtual CPO conference
              characterized initial large-scale CPO deployments as beginning in 2026, but high-volume
              rollout as more likely in 2027. This is consistent with the typical 24–36 month design-in
              to production cycle for custom silicon at hyperscale, and with Marvell's own guidance for
              de minimis Celestial AI revenue through fiscal year 2027. Any further slippage — hyperscaler
              program delays, integration challenges, or procurement re-prioritization — would push
              first material revenue toward FY2028, compressing the earn-out window.

              Copper infrastructure longevity. Copper-based NVLink, InfiniBand, and Ethernet interconnect
              systems have demonstrated reliability at 400G and are being upgraded to 800G. If hyperscalers
              conclude that copper solutions are adequate for AI systems through the late 2020s — or if
              AI cluster scaling plateaus below the level that requires optical-only interconnects —
              the total addressable opportunity for Photonic Fabric could be materially smaller or arrive
              later than Marvell's internal models assume.

              AI capex concentration risk. Marvell's $500M ARR target implies that two to three hyperscaler
              customers will account for the vast majority of early revenue. Any slowdown in AI infrastructure
              capex by the leading hyperscalers — driven by macroeconomic pressures, capex discipline
              cycles, or shift in AI workload characteristics — would directly reduce Photonic Fabric
              demand. The concentration means that a single hyperscaler's production schedule delay
              is effectively the company's revenue delay.
            claimRefs:
              - C219
              - C234
              - C235
              - C235
              - C220
              - C233
      - number: '7.3'
        title: Competitive and Strategic Risks
        blocks:
          - type: paragraph
            body: |
              The optical chiplet market is nascent but rapidly contested. Marvell/Celestial AI faces
              three credible competitive threats and one structural strategic risk from the NVIDIA
              relationship.

              Ayar Labs. Ayar Labs in March 2025 announced the TeraPHY, described as the industry's
              first UCIe optical interconnect chiplet, achieving 8 Tbps bandwidth using a 16-wavelength
              SuperNova light source. NVIDIA, AMD, and Intel have all invested in Ayar Labs. Critically,
              NVIDIA's investment alignment means Ayar Labs has the potential to become the preferred
              optical chiplet supplier for NVIDIA-ecosystem deployments. Ayar's collab with Global Unichip
              Corp (GUC) — a key TSMC-ecosystem ASIC design services firm — targets hyperscale customers
              and is designed to embed TeraPHY into reference AI designs. Ayar Labs targeted mass
              production by mid-2026 with volumes scaling toward hundreds of millions of chiplets by 2028.
              If Ayar Labs achieves this ramp, Marvell/Celestial AI could face competition at scale
              earlier than the earn-out milestones require.

              Intel OCI and Broadcom CPO. Intel's own optical connectivity (OCI) silicon photonics platform
              serves Intel Gaudi customers, creating a captive competitive alternative. Broadcom's Tomahawk
              6 switch with integrated CPO represents a competitive product at the AI switching layer.
              Neither Intel OCI nor Broadcom CPO currently targets the same scale-up interconnect position
              as Photonic Fabric, but the competitive pressure at adjacent layers constrains Marvell's
              pricing power and ecosystem footprint.

              NVLink Fusion strategic dependency. NVIDIA's $2B investment in Marvell (announced April 2026)
              and the NVLink Fusion partnership simultaneously validates the optical interconnect thesis
              and creates strategic dependency. If NVIDIA shifts its partnership terms, acquires an
              alternative optical chiplet supplier, or advances its in-house photonics program, Marvell's
              NVLink Fusion channel would be at risk. The partnership's commercial terms are not publicly
              disclosed, creating opacity around exclusivity, pricing, and termination provisions.
            claimRefs:
              - C225
              - C221
              - C221
              - C216
              - C222
              - C233
      - number: '7.4'
        title: Post-Acquisition Integration Risks
        blocks:
          - type: paragraph
            body: |
              Marvell completed the Celestial AI acquisition on February 2, 2026 after receiving FTC
              early termination. The integration introduces four distinct risk vectors.

              Earn-out milestone ambiguity. The acquisition included up to $2.25B in earn-out payments,
              but the specific milestone structure — whether $500M ARR alone triggers full payout,
              whether partial ARR triggers proportional payment, and what constitutes qualifying revenue —
              has not been publicly disclosed. This ambiguity creates an information asymmetry between
              Marvell and former Celestial AI shareholders and employees who hold earn-out interests.
              Under California employment law, earn-out and vesting terms must be clearly defined, and
              amendments require employee consent. Disputes over milestone measurement methodology or
              revenue classification could generate litigation, increasing integration costs and management
              distraction.

              Talent retention. The Celestial AI team of 141–152 silicon photonics specialists was
              assembled over several years in a talent market where fewer than 3,000 researchers globally
              have deep EAM-based silicon photonics expertise. Post-acquisition equity conversions typically
              accelerate vesting, reducing the forward retention incentive for key engineers. Marvell's
              compensation structure, engineering culture, and product prioritization may differ
              materially from the startup environment that attracted Celestial AI's founders and senior
              technical staff.

              R&D pace and organizational complexity. Integrating a 141-person team into Marvell's Data
              Center Group means Celestial AI's roadmap must compete for engineering resources, budget
              cycles, and executive attention within a larger organization. Marvell's prior acquisitions —
              Inphi (2021), Innovium (2021), Avera (2019) — each absorbed significant integration effort.
              The Inphi integration is widely cited as successful, but the pace of innovation in optical
              chiplets is faster than in the Inphi-era DSP business, and any slowdown in the Photonic
              Fabric roadmap could cede ground to Ayar Labs.

              Competing priorities. Marvell's portfolio spans custom XPU programs (for Amazon, Microsoft,
              Google), AsteraLabs-style interconnect products, storage controllers, carrier Ethernet,
              and now Photonic Fabric. Resource allocation decisions could deprioritize Celestial AI
              programs if near-term revenue opportunities elsewhere appear more certain.
            claimRefs:
              - C223
              - C224
              - C235
              - C218
              - C225
              - C226
      - number: '7.5'
        title: Financial and Investment Risks
        blocks:
          - type: paragraph
            body: |
              Marvell paid $3.25 billion in upfront consideration — $1B cash plus 27.2 million shares at
              $2.25B value — for a pre-revenue company with no production customers at the time of close.
              The acquisition was priced at an estimated 6.5x–10x Celestial AI's last post-money valuation,
              reflecting a substantial control premium. Financial risks cluster around three themes.

              Return threshold. Breaking even on the $3.25B upfront investment likely requires Photonic
              Fabric to contribute sustained ARR well above $500M with strong gross margins over a 3–5
              year horizon. No pre-revenue optical chiplet company has previously generated this level
              of ARR within the implied timeframe, making the investment dependent on scenarios with no
              direct comparable precedent. If the technology adoption timeline slips by even 12–18 months,
              Marvell would need to carry the goodwill on its balance sheet through an extended period
              of de minimis revenue.

              Earn-out opacity. The earn-out milestone terms are not publicly disclosed. It is unclear
              whether the $500M cumulative ARR threshold triggers the full $2.25B earn-out, whether
              it triggers a proportional tranche, or what the measurement period is. This opacity makes
              it difficult for Marvell's shareholders — or former Celestial AI stakeholders — to model
              expected total acquisition cost. The AWS warrant (1,045,171 MRVL shares vesting on Photonic
              Fabric cumulative purchases through December 2030) adds a further variable cost if Amazon
              becomes a major customer.

              Goodwill impairment risk. If AI capex contracts broadly — due to macroeconomic pressures,
              hyperscaler capex discipline cycles, or a slowdown in frontier model training demand —
              Marvell could be required to recognize a material goodwill impairment on the $3.25B
              purchase price. Given Celestial AI was pre-revenue at acquisition, even modest adverse
              changes in the CPO market outlook could trigger an impairment review under ASC 350.
              Marvell's own 10-K risk factors explicitly cite integration, achieve-expected-benefits,
              and market-timing risks for acquisitions.
            claimRefs:
              - C227
              - C227
              - C228
              - C219
              - C233
              - C229
      - number: '7.6'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: |
              Regulatory and legal risk for Marvell/Celestial AI spans four distinct areas: US export
              controls, foreign investment review, intellectual property title, and Taiwan geopolitical
              concentration.

              US export controls (EAR). The US Bureau of Industry and Security maintains Export
              Administration Regulations (EAR) covering advanced computing integrated circuits under
              ECCNs 3A090.a and 4A090.a. The Biden Administration's January 2025 AI Diffusion Rule —
              which would have imposed worldwide license requirements on exports of advanced computing
              ICs — was rescinded by the Trump Administration in May 2025 before taking effect, but
              BIS indicated it would strengthen targeted chip controls. As of May 2026, preexisting EAR
              controls remain in force for exports to China and Macau, and the regulatory framework
              continues to evolve. Marvell, as the acquirer of Celestial AI, must maintain a robust
              export compliance program to ensure Photonic Fabric chiplets and associated technology are
              not transferred to restricted end-users or nations without appropriate licenses. Legal
              analysis by Blank Rome LLP (January 2026) documents four key BIS updates on advanced
              computing and AI export controls that apply to this technology sector. Failure to comply
              could result in fines, loss of export privileges, or reputational damage.

              CFIUS. The Committee on Foreign Investment in the United States reviews transactions that
              could result in foreign control of or certain non-controlling investments in TID US businesses
              (Technology, Infrastructure, Data). Celestial AI's silicon photonics IP qualifies as a
              critical technology. Any future secondary transaction — such as a partial asset sale,
              licensing arrangement with a foreign entity, or change of control of Marvell itself —
              that involves the Celestial AI IP portfolio would likely require CFIUS filing or notice.
              The US Treasury CFIUS FAQ confirms that mandatory filings apply when a foreign government
              holds substantial interest in the acquiring party and the target is a critical-technology
              business. Outbound investment rules effective January 2, 2025, add an additional layer:
              US persons investing in Chinese entities working in semiconductors or AI are subject to
              notification or prohibition requirements.

              IP title risk (Rockley Photonics). In October 2024, Celestial AI acquired Rockley Photonics'
              silicon photonics patent portfolio — approximately 200 global patents covering EAM technology,
              optoelectronic systems-in-package, and optical switches — for $20 million in a distressed
              sale from Rockley's post-Chapter 11 restructuring. Distressed IP acquisitions from bankruptcy
              carry a risk that pre-existing licenses granted to third parties by the debtor may have
              survived the bankruptcy sale and encumber the acquired patents. Additionally, competing
              patent claims from other silicon photonics players (Intel, Broadcom, II-VI / Coherent,
              Lumentum) could generate interference or invalidity proceedings.

              Taiwan geopolitical concentration. TSMC manufactures both the Photonic Fabric silicon
              photonics die and performs CoWoS advanced packaging. Over 90% of the world's most advanced
              semiconductor capacity is in Taiwan, and any military, political, or natural-disaster
              scenario disrupting TSMC's operations would immediately halt Photonic Fabric production
              with no short-term alternative. TSMC's Arizona fab is not expected to have advanced packaging
              capacity at meaningful scale before 2028. US-China tensions have escalated, and the
              combination of export control retaliation (China's gallium and germanium restrictions),
              military rhetoric, and the absence of a viable alternative foundry for Celestial AI's
              EAM silicon photonics process node make this risk systemic and unmitigatable in the near
              term.
            claimRefs:
              - C218
              - C235
              - C230
              - C226
              - C231
      - number: '7.7'
        title: Personnel and Organizational Risks
        blocks:
          - type: paragraph
            body: |
              Celestial AI's competitive position rests disproportionately on a small, highly specialized
              team. Three personnel risk dimensions are material.

              Key-person concentration. Dave Lazovsky (CEO, co-founder) is the primary external face
              and strategic architect of the Photonic Fabric program. Phil Winterbottom (CTO, co-founder)
              is the principal technical architect; his Hot Chips 2025 presentation detailing in-die
              optical I/O design choices demonstrated technical depth that would take years to replace.
              The departure of either co-founder within the first 12–24 months post-acquisition would
              represent a severe organizational disruption: loss of customer relationships, technology
              vision continuity, and the institutional knowledge embedded in the EAM architecture choices.
              Marvell's standard retention mechanisms (RSU refreshes, performance bonuses) are typically
              less compelling for co-founders who have already achieved a significant liquidity event.

              Team depth and replicability. The Celestial AI team of 141–152 specialists spans EAM
              process engineering, silicon photonics design, advanced packaging co-design, optical I/O
              firmware, and system integration. This represents a substantial fraction of the global
              talent pool in this specialty; recruiting even 10–15 senior replacements in silicon photonics
              would take 18–24 months. If post-acquisition attrition exceeds normal levels — driven by
              earn-out frustration, cultural friction, or competitor recruiting (particularly by Ayar Labs,
              which is aggressively hiring) — the technology execution timeline would slip.

              Historical M&A precedent. Marvell's acquisition of Inphi (completed April 2021, $10B) is
              the closest comparable integration. Marvell retains Inphi's Dr. Ford Tamer on its board,
              and the Inphi DSP products are a significant revenue contributor. However, post-acquisition
              attrition rates from the Inphi integration were not publicly disclosed, leaving a key
              diligence gap for assessing Marvell's ability to retain a smaller, more technically
              concentrated team in a faster-moving technology category.
            claimRefs:
              - C218
              - C232
              - C233
      - number: '7.8'
        title: Exhibits
        blocks:
          - type: callout
            title: Earn-Out Opacity Is a Governance Gap
            body: >-
              The $2.25B earn-out milestone structure has not been publicly disclosed in sufficient detail to determine
              whether the widely cited $500M ARR target by FY2028 actually triggers full payment. This opacity creates
              information asymmetry between Marvell shareholders, former Celestial AI investors, and retained employees
              — all of whom have different economic stakes in milestone achievement. Marvell should provide clearer
              milestone disclosure in its FY2026 10-K.
            calloutType: risk
            claimRefs:
              - C223
              - C219
          - type: callout
            title: TSMC Sole-Foundry Concentration Is Unmitigatable Near-Term
            body: >-
              Celestial AI's EAM silicon photonics process is manufacturable only at TSMC today, and TSMC's CoWoS
              advanced packaging capacity is heavily allocated to NVIDIA. No credible alternative foundry can replicate
              the required combination of advanced node silicon photonics plus CoWoS-class packaging before 2028 at the
              earliest. This makes TSMC a single-point-of-failure for the entire Photonic Fabric program. Taiwan
              geopolitical risk — while low probability — is catastrophic-magnitude if realized.
            calloutType: risk
            claimRefs:
              - C236
              - C216
              - C226
          - type: callout
            title: Prioritize Earn-Out Milestone Clarification and Retention Contracts
            body: >-
              The two most actionable near-term risk mitigations are: (1) Marvell should publicly clarify the earn-out
              milestone structure in its next 10-K or investor day materials to reduce governance opacity; (2) Marvell
              should confirm retention contract terms for Dave Lazovsky and Phil Winterbottom with multi-year
              performance equity tied to technical milestones, not just Marvell MRVL stock price. Without confirmed
              retention, key-person departure risk is effectively open.
            calloutType: recommendation
            claimRefs:
              - C223
              - C218
              - C232
          - type: callout
            title: Ayar Labs Is the Nearest-Term Competitive Monitoring Signal
            body: >-
              Ayar Labs' mid-2026 mass production target and GUC design collab make it the highest- priority competitive
              monitoring signal. If Ayar Labs achieves CoWoS integration and NVIDIA confirms TeraPHY as the NVLink
              Fusion-compatible optical chiplet, Marvell's Celestial AI differentiation thesis weakens materially. The
              NVIDIA NVLink Fusion partnership does not guarantee exclusivity and its commercial terms are not public.
