      - - AI cluster scaling (100k → 1M XPUs)
        - Driver (very strong)
        - 2025–2030
        - Scales TAM proportionally; each additional XPU requires optical bandwidth allocation
        - Confirm hyperscaler cluster size roadmaps and procurement timelines
      - - Copper physical limits at 400G+ speeds
        - Driver (structural)
        - Current
        - Creates non-negotiable technology substitution requirement; copper cannot scale beyond ~1m at 400G
        - Confirm speed at which hyperscalers are specifying optical requirements in new cluster designs
      - - Power efficiency imperative (~30% of cluster power for interconnects)
        - Driver (strong)
        - 2024–2027
        - Optical reduces per-bit energy ~3x vs pluggable; accelerates ROI justification for hyperscalers
        - Obtain measured power efficiency benchmarks vs. NVLink copper from Marvell integration team
      - - Data center capex growth (+59% YoY in Q3 2025)
        - Driver (strong)
        - 2025–2026
        - Large absolute capex pool creates upgrade opportunity even at low optical penetration rates
        - Monitor quarterly hyperscaler earnings for capex guidance changes
      - - TSMC CoWoS capacity constraints
        - Constraint (material)
        - 2025–2027
        - Advanced packaging supply limits production ramp even if demand materializes; timeline risk
        - Confirm Marvell's CoWoS allocation and capacity reservation agreements with TSMC
      - - 24–36 month chip integration cycle
        - Constraint (structural)
        - Always
        - Revenue from current design engagements unlikely before 2027–2028 at earliest
        - Confirm design-in status and qualification timelines with Marvell integration team
      - - CPO penetration at ~0.5% (2026)
        - Constraint (market timing)
        - 2026–2028
        - Very small installed base; early adopters bear integration risk; mainstream 2028+
        - Monitor LightCounting quarterly updates on CPO deployment volumes
      - - NVIDIA NVLink ecosystem lock-in
        - Constraint (competitive)
        - Current and ongoing
        - Hyperscalers on NVLink clusters face high switching cost to adopt open optical alternatives
        - Assess which hyperscalers are evaluating UALink or open interconnect alternatives
      - - US export controls on AI technology (memory bandwidth metric)
        - Constraint (regulatory)
        - Current and ongoing
        - Photonic Fabric's bandwidth improvements may trigger export control scrutiny for non-US customers
        - Review USIT investment conditions and any ITAR/EAR restrictions on Celestial AI IP post-acquisition
    notes: >-
