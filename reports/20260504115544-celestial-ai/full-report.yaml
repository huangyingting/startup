      - number: '5.4'
        title: Technology Roadmap and Marvell Integration
        blocks:
          - type: paragraph
            body: |
              Marvell's $3.25 billion acquisition of Celestial AI, closed on February 2, 2026, was
              explicitly motivated by accelerating Marvell's co-packaged optics roadmap for its custom
              AI silicon (XPU) business. The acquisition positions Photonic Fabric as a standard offering
              co-packaged with Marvell-designed XPUs sold to hyperscaler customers, extending Marvell's
              data center optics revenue beyond its existing pluggable DSP portfolio.

              The revenue contribution roadmap targets initial Celestial AI revenue in H2 FY2028
              (approximately H2 calendar 2027), scaling to a $500 million annualized run rate by
              Q4 FY2028 and $1 billion by Q4 FY2029. These milestones drive the earn-out structure
              tied to Celestial AI shareholders. To meet the H2 FY2028 timeline, Photonic Fabric must
              achieve TSMC CoWoS production-ready status and pass customer qualification by late calendar
              2026 to mid-2027 — a compressed window given the complexity of photonic interposer
              co-packaging in volume production.

              The NVIDIA NVLink Fusion partnership, announced on March 31, 2026, accompanied by a $2
              billion NVIDIA investment in Marvell, opens a second pathway for Photonic Fabric deployment.
              NVLink Fusion allows Marvell's XPUs to interconnect directly with NVIDIA GPUs at up to
              1.8 TB/s, and Photonic Fabric will be critical for enabling rack-scale and multi-rack
              NVLink Fusion topologies. NVIDIA's involvement substantially de-risks the customer pipeline
              for Marvell's custom XPU plus Photonic Fabric combination, and accelerates hyperscaler
              qualification timelines.

              The technical roadmap phases include: (1) first-generation in-die optical I/O chiplet for
              chip-to-chip scale-up, demonstrated at OFC 2025; (2) Photonic Fabric Appliance for memory
              disaggregation at 32 TB and 115 Tbps, demonstrated at Hot Chips 2025; (3) next-generation
              chiplet with higher bandwidth density targeting Marvell custom ASIC integration (2026–2027);
              and (4) volume production qualification at TSMC CoWoS line (estimated 2027). The four
              completed 5nm/4nm tapeouts validate the TSMC process integration, but production-scale yield
              and hyperscaler customer acceptance testing remain ahead of the revenue milestones.
