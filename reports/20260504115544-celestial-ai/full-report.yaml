  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Included Spend
        blocks:
          - type: paragraph
            body: |
              The relevant market for Celestial AI's Photonic Fabric is the AI data center
              scale-up optical interconnect market — specifically the segment addressing
              chip-to-chip, chip-to-memory, and package-to-package optical links within and
              across AI accelerator systems. This differs from the broader optical interconnect
              market in three important ways: (1) it targets the short-reach intra-system
              domain rather than long-haul or metro data center interconnect; (2) it requires
              co-packaged or interposer-based photonic integration directly with accelerator
              chips (XPUs), not pluggable transceiver modules; and (3) it competes directly
              with proprietary copper-based scale-up fabrics such as NVIDIA's NVLink and the
              UALink standard backed by AMD and Broadcom.

              Included spend: silicon photonics interposers, co-packaged optics (CPO), optical
              chiplets, and scale-up optical interconnect modules designed for XPU-to-XPU and
              XPU-to-memory connectivity. Excluded spend: traditional pluggable transceivers
              (800G/1.6T), scale-out Ethernet/InfiniBand switching, data center interconnect
              (DCI) between facilities, copper active/passive electrical cables for intra-rack
              short-reach links, and coherent DCI optical modules.

              Adjacent markets include the broader silicon photonics market ($2.16B in 2024,
              growing to $9.65B by 2030 per MarketsandMarkets), the full data center
              interconnect market ($15.38B in 2025 per MarketsandMarkets and Fortune Business
              Insights), and the AI cluster optics segment as tracked by LightCounting ($5B
              in 2024, doubling to $10B+ by 2026). Status-quo substitutes include NVIDIA's
              NVLink copper-based scale-up fabric and AMD/Broadcom's UALink copper solutions —
              which are the dominant architectures Celestial AI/Marvell is positioned to replace.
            claimRefs:
              - C036
              - C037
              - C038
              - C039
              - C036
      - number: '2.2'
        title: Market Sizing — Multiple Lenses
        blocks:
          - type: paragraph
            body: |
              No single analyst report cleanly isolates the Celestial AI SAM (scale-up optical
              chiplets for AI XPUs). The most useful sizing lenses are:

              **Lens 1 — Broadest TAM (all optical interconnect):** Fortune Business Insights
              values the global optical interconnect market at $15.38B in 2025, growing to
              $43.14B by 2034 at a 12.2% CAGR. This includes all reach classes, technologies,
              and applications and significantly overstates the addressable market for Celestial AI.

              **Lens 2 — Data Center Interconnect (DCI) market:** MarketsandMarkets sizes the DCI
              market at $15.38B in 2025 growing to $25.89B in 2030 at an 11% CAGR. This includes
              both optical and packet-switching DCI solutions; it better captures data center
              optical spend but still over-includes non-AI applications and cross-facility links.

              **Lens 3 — Silicon Photonics (most focused technology lens):** MarketsandMarkets
              sizes the silicon photonics market at $2.16B in 2024 growing to $9.65B by 2030 at a
              29.5% CAGR. Data centers and HPC are the highest-CAGR end-user segment. This lens
              best captures the technology layer Celestial AI operates in.

              **Lens 4 — AI Cluster Optics (most commercially relevant):** LightCounting's January
              2025 Optics for AI Clusters report sizes the AI cluster optics market at $5B in 2024,
              growing to $10B+ by 2026 at roughly 40%+ near-term CAGR. This includes compute-node
              transceivers as well as scale-up network optics, and moderates to double-digit growth
              in 2028–2030 as LPO and CPO ramp.

              **Lens 5 — Co-Packaged Optics (most direct product analog):** Analyst forecasts for
              the CPO market range widely ($95M–$2B in 2025 for CPO-specific), with 30–40% CAGR
              to $575M–$4.67B by 2030. CPO penetration in AI data centers was only ~0.5% in 2026
              per AI2Work/Mordor Intelligence, with forecasted reach of 35% by 2030.

              The most credible SAM estimate for Celestial AI's scale-up optical chiplet product
              is approximately $2–5B by 2028–2029, consistent with Marvell's revenue target of
              $500M ARR by Q4 FY2028 if Celestial AI captures 10–25% of this emerging sub-segment.
              This is an evidence-constrained estimate with high uncertainty given the pre-revenue
              stage of the technology.
            claimRefs:
              - C037
              - C038
              - C039
              - C040
              - C041
              - C042
              - C043
      - number: '2.3'
        title: Buyer and Segment Segmentation
        blocks:
          - type: paragraph
            body: |
              There are three primary buyer archetypes for scale-up optical interconnect technology:

              **Segment 1 — Hyperscalers:** AWS, Google, Microsoft, Meta, Alibaba, Oracle, and other
              large cloud operators are the ultimate end-buyers of AI infrastructure incorporating
              optical interconnects. They collectively spent $315–320B on data center capex in 2025.
              Budget ownership sits with infrastructure engineering organizations (VP/SVP level) under
              the CTO; procurement is typically multi-year. Adoption trigger: scaling AI clusters
              beyond the effective reach of copper (~1m at 400G), and achieving AI cluster sizes of
              tens of thousands to millions of XPUs.

              **Segment 2 — AI Chip Companies / XPU Designers:** NVIDIA, AMD, Intel, custom ASIC
              design houses (including Marvell's own custom XPU customers). These customers purchase
              or license optical interconnect chiplets to integrate directly into their XPU silicon
              packages. Budget ownership is within chip architecture and packaging engineering teams.
              Adoption trigger: exceeding electrical I/O bandwidth density limits (~3 Tbps/mm²
              for copper vs. ~10 Tbps/mm for silicon photonics) and reducing per-bit power to
              enable higher TDP packages.

              **Segment 3 — System Integrators and ODMs:** Companies such as Super Micro, Quanta,
              Foxconn, and others building AI server systems for hyperscaler deployment. They design
              the boards and packages incorporating optical chiplets. This is a derivative demand
              segment dependent on Segment 1 and 2 adoption decisions.

              The buyer journey is long and technically complex. A hyperscaler typically requires
              12–36 months of joint hardware qualification before production deployment. The chiplet
              integration model (co-packaging with XPUs) requires early engagement at the XPU design
              stage, 24–36 months before volume production — meaning sales cycles began for products
              not yet shipping.
            claimRefs:
              - C044
              - C045
              - C046
              - C036
              - C037
      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: |
              **Primary growth drivers:**
              (1) AI cluster scaling: GPU/XPU cluster sizes are expanding from hundreds to millions of
              units; each node requires hundreds of gigabits per second of bandwidth to adjacent nodes.
              Jensen Huang noted at GTC 2025 that each GPU requires six pluggable transceivers consuming
              30W each; scaling to a 1M GPU cluster creates a 180MW transceiver power problem that
              only optical co-packaging can solve. (2) Copper physical limits: at 400G SerDes speeds,
              passive copper collapses to under 1m effective reach; at 1.6T targets, copper is simply
              impractical. (3) Power efficiency: electrical interconnects were consuming ~30% of total
              cluster power at major hyperscalers as of early 2025; CPO reduces per-bit energy ~3x
              vs. pluggable optics (~5 pJ/bit vs. ~15 pJ/bit). (4) Data center capex growth: global
              data center capex grew 59% YoY in Q3 2025, creating enormous infrastructure investment
              that will include optical upgrade cycles. (5) NVLink/UALink transition: NVIDIA's NVLink
              Fusion partnership with Marvell signals the industry is moving to optical scale-up
              fabrics; UALink is similarly architected with optical interfaces in mind.

              **Adoption constraints:**
              (1) Capital intensity and manufacturing complexity: TSMC CoWoS advanced packaging is
              expensive, with limited capacity and long lead times — creating supply-side bottlenecks
              regardless of demand. (2) Integration complexity: chip designs must be redesigned to
              accommodate optical I/O; hyperscalers and chip companies require 2–3 year design cycles.
              (3) Technology maturity: CPO penetration was ~0.5% in 2026; high-volume deployment is
              not expected until 2028–2030 (LightCounting consensus). (4) Switching cost and ecosystem
              risk: hyperscalers operating copper NVLink/NVSwitch systems would need to redesign
              clusters to adopt optical scale-up; the transition is technically risky and capital
              intensive. (5) Competing proprietary solutions: NVIDIA owns NVLink and has strong
              hyperscaler lock-in; transitioning to open optical standards requires coordinated
              ecosystem effort.
            claimRefs:
              - C036
              - C038
              - C039
              - C036
              - C037
              - C038
      - number: '2.5'
        title: Sizing Diligence Gaps and Contradictory Estimates
        blocks:
          - type: paragraph
            body: |
              Market size estimates for Celestial AI's specific segment — scale-up optical chiplets
              (silicon photonics interposers and CPO for XPU packages) — are highly variable and not
              directly comparable. The CPO market alone has estimates ranging from $95M to $2B for
              2025 depending on what is included; the silicon photonics market uses different boundary
              definitions; and AI cluster optics figures from LightCounting include pluggable modules
              that are not Celestial AI's product.

              The most important sizing gap is that no independent analyst has published a dedicated
              forecast for the scale-up optical chiplet sub-segment that Celestial AI occupied.
              Marvell's $500M ARR target for Q4 FY2028 implies a specific company-level revenue
              projection but is a company-claimed forward projection, not an independent market size.
              Reconciling these figures requires a bottom-up build from hyperscaler cluster size
              assumptions (number of XPUs × chiplets per XPU × ASP per chiplet), which is not
              publicly available. Contradictory estimates between Mordor Intelligence (CPO CAGR 37%),
              Precedence Research (30.66%), and general silicon photonics forecasts (29.5%) reflect
              genuine uncertainty about timing and adoption rates.
            claimRefs:
              - C039
              - C040
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Structural Tailwind — Copper Is Hitting Physical Limits
            body: |
              At 400G+ SerDes speeds, copper passive cables collapse to under 1 meter effective
              reach. This is not a cost or preference issue — it is physics. The structural shift
              to optical scale-up fabrics for large AI clusters is non-negotiable for hyperscalers
              scaling beyond a few thousand XPUs. This creates a durable and growing market with
              no copper-based alternative at frontier cluster scales.
            calloutType: strength
            claimRefs:
              - C036
              - C038
          - type: callout
            title: Market Timing — CPO at Only 0.5% Penetration in 2026
            body: |
              Despite strong structural demand, CPO penetration in AI data centers was only
              ~0.5% as of 2026. LightCounting projects high volumes only by 2028–2030. Marvell
              itself projects revenue from Celestial AI beginning only in H2 FY2028 (calendar
              H2 2027), confirming the ~2-year gap between current engagements and recognized
              revenue. Early-stage market timing creates execution and financing risk even if
              the technology and market thesis are correct.
            calloutType: risk
            claimRefs:
              - C043
              - C037
              - C038
          - type: callout
            title: AI Cluster Optics Will Double to $10B+ by 2026 (LightCounting)
            body: |
              LightCounting's detailed bottom-up models of hyperscaler AI cluster deployments
              (AWS, Google, Meta, Microsoft, Alibaba, Oracle) project the AI cluster optics
              market doubling from $5B in 2024 to $10B+ by 2026. This near-term growth is driven
              by pluggable transceivers for scale-out networking rather than CPO, but the
              infrastructure investment signals accelerating adoption cycles for the scale-up
              optical chiplet segment thereafter.
            calloutType: insight
