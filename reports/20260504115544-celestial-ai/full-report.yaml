  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Overview and Market Position
        blocks:
          - type: paragraph
            body: |
              Celestial AI was a pre-revenue company at the time of its February 2, 2026 acquisition by
              Marvell Technology. The company operated in the semiconductor hardware category where revenue
              recognition requires production-volume chip deployment at hyperscaler data centers—a process
              that typically spans 24 to 36 months from initial design-in to first revenue. No publicly
              confirmed production customers existed at acquisition. Marvell explicitly guided to de minimis
              revenue contributions from Celestial AI for fiscal years 2026 and 2027.

              Despite the absence of production revenue, Celestial AI was not without documented customer
              traction. In March 2024, at the Optical Fiber Communication (OFC) conference, the company
              announced that a leading (unnamed) hyperscaler had formally adopted Photonic Fabric for
              next-generation AI processors—described as one of the earliest large-scale commitments to
              replace copper interconnects with optical alternatives in AI system design. CEO Dave Lazovsky
              stated in multiple interviews that additional hyperscalers were engaged in NDA-based technical
              evaluations. The volume implied by the design win—hundreds of thousands of chiplet units per
              quarter at production ramp—signals material pipeline rather than exploratory proof-of-concept.

              The ultimate end buyers of Photonic Fabric are hyperscale cloud and AI infrastructure
              operators: Amazon Web Services, Microsoft Azure, Google Cloud, and Meta. These companies build
              custom AI accelerators (XPUs) for training and inference workloads, and Photonic Fabric
              addresses the bandwidth bottleneck between processing units and memory pools—the AI Memory
              Wall—by providing optical scale-up connectivity delivering 16 Tbps per chiplet per direction.
              Celestial AI's customer engagement model required deep design-in collaboration with both the
              hyperscaler and the ASIC packaging partner, explaining why engagement periods spanned years
              before revenue. Post-acquisition, Marvell Technology is both the primary custodian and the
              principal internal customer of Photonic Fabric technology, integrating it into its Data Center
              Group's custom silicon programs for delivery to hyperscaler end customers.
            claimRefs:
              - C188
              - C197
              - C196
              - C200
              - C180
              - C193
      - number: '6.2'
        title: Strategic Investor Signals as Customer Proxies
        blocks:
          - type: paragraph
            body: |
              In the semiconductor industry, strategic corporate venture investments reliably signal
              supply-chain alignment and potential customer or manufacturing-partner intent. Celestial AI's
              investor roster from the Series C (March 2024) and Series C1 (March 2025 through August 2025)
              rounds contains multiple strategic investors who are simultaneously likely customers,
              manufacturing partners, or critical ecosystem participants.

              AMD Ventures' participation in the Series C signals AMD's interest in optical interconnect
              technology for future XPU architectures. AMD is a major AI accelerator supplier and its XPU
              products could directly integrate Photonic Fabric for pooled-memory scale-up. This alignment
              makes AMD a high-probability design partner and possible indirect customer through
              hyperscaler-commissioned custom chip programs that use AMD silicon.

              TSMC VentureTech Alliance participated in both the Series C and the final Series C1 close in
              August 2025, confirming foundry-level manufacturing alignment. TSMC is the sole credible
              volume manufacturer for Celestial AI's silicon photonics chiplets at advanced nodes, and this
              investment ensures preferential capacity allocation, process co-development, and supply chain
              readiness as Photonic Fabric transitions to volume production. Samsung Catalyst's participation
              in both rounds signals HBM memory integration interest; Samsung's advanced packaging and
              HBM expertise are directly required for Photonic Fabric's memory disaggregation architecture.

              Amazon's role is the most direct and most commercially significant. As part of the Marvell
              acquisition announcement, Marvell issued Amazon a warrant to purchase approximately 1,045,171
              MRVL shares at an exercise price of $87.0029 per share, with vesting tied entirely to
              Amazon's cumulative purchases of Photonic Fabric products through December 2030, exercisable
              until December 2031. This structure legally and financially commits Amazon as a forward
              customer with equity-aligned incentives to drive Photonic Fabric adoption, providing Marvell
              with multi-year demand visibility that analysts have described as effectively locking in Amazon
              as a foundational customer. The ecosystem also includes Broadcom (custom silicon and ASIC
              design services) and Samsung (HBM and advanced packaging), forming the supply chain required
              to serve hyperscaler customers at production scale.
            claimRefs:
              - C181
              - C182
              - C183
              - C184
              - C185
              - C186
              - C187
      - number: '6.3'
        title: Marvell Customer Channel and Named End Customers
        blocks:
          - type: paragraph
            body: |
              Marvell's established custom AI silicon relationships provide the primary commercial channel
              through which Celestial AI's Photonic Fabric will reach hyperscaler end customers post-
              acquisition. Marvell currently serves three hyperscaler custom silicon programs with confirmed
              or near-confirmed commercial relationships.

              Microsoft is Marvell's largest and most strategically significant custom AI silicon customer.
              Microsoft's Project Maia300—the successor to the Maia200—is being developed with Marvell as
              the primary ASIC design partner, targeting a 2nm process node with HBM4 memory integration.
              Estimated shipments of 300,000 to 400,000 units are expected by end of calendar 2026, ramping
              to 1.2 to 1.5 million units in 2027. The Maia300 program requires exactly the kind of co-
              packaged optical scale-up connectivity that Photonic Fabric provides, making it the clearest
              near-term integration pathway for initial Photonic Fabric revenue contribution.

              Amazon is Marvell's second major custom silicon customer via the Trainium AI training and
              Inferentia AI inference programs. Amazon's special warrant for MRVL shares—granted as part of
              the Marvell-Celestial AI acquisition agreement—confirms Amazon as the most explicitly
              committed future Photonic Fabric customer among all publicly identifiable parties. While
              competitive pressure from Alchip on next-generation Trainium variants introduces some
              uncertainty about Marvell's long-term role in the core XPU, the warrant structure specifically
              ties Amazon equity to Photonic Fabric purchases, ensuring incentive alignment.

              Google was reported in early 2026 to be in late-stage discussions with Marvell to become its
              third major custom AI silicon partner, supplementing its Broadcom and TPU infrastructure with
              Marvell-designed inference-focused chips. This would create a third distribution channel for
              Photonic Fabric. NVIDIA's NVLink Fusion partnership announced March 31, 2026, creates a
              fourth pathway: enabling third-party custom silicon integrating with NVIDIA's NVLink
              interconnect fabric, with NVIDIA investing $2 billion in Marvell to co-develop optical
              networking and silicon photonics capabilities at scale.
            claimRefs:
              - C189
              - C190
              - C191
              - C183
              - C192
              - C193
              - C185
      - number: '6.4'
        title: Customer Qualification and Procurement Process
        blocks:
          - type: paragraph
            body: |
              Hardware qualification for new interconnect chiplets in hyperscaler AI systems follows a
              multi-stage, multi-year process. Celestial AI navigated several of these stages prior to
              acquisition, placing it in the design-in and early qualification phases with at least one
              confirmed hyperscaler partner.

              The process begins with an NDA Technical Evaluation stage in which hyperscalers review
              technical specifications and receive first silicon samples for internal lab evaluation.
              CEO Dave Lazovsky confirmed that multiple hyperscalers were engaged in NDA-based technical
              evaluations prior to the Series C1 close in March 2025. The March 2024 announcement
              confirmed that at least one hyperscaler had formally passed the Design-In Commitment stage,
              incorporating Photonic Fabric into a specific next-generation AI processor architecture.

              Silicon Sampling and Characterization follows design-in, during which the hyperscaler receives
              pre-production silicon for electrical, optical, and thermal characterization—typically
              six to twelve months. This is followed by Qualification Testing and System Integration, the
              longest stage at twelve to twenty-four months, involving full integration testing in multi-rack
              AI cluster environments with co-packaging yield validation. Revenue recognition begins only at
              Production Ramp, when volume chiplet manufacturing commences and purchase orders translate
              into recognized revenue.

              The cumulative timeline from design-in to production is typically 24 to 36 months for
              hyperscaler hardware, explaining why Marvell projects Celestial AI revenue beginning only in
              H2 FY2028 despite the March 2024 design-win announcement. The qualification process is
              gatekept by hyperscaler internal programs that operate under mutual NDAs, meaning no publicly
              confirmable production commitment existed at acquisition time. The earn-out structure in the
              Marvell acquisition—contingent on cumulative revenue milestones by FY2029—implies Marvell's
              due diligence confirmed a credible customer pipeline sufficient to support $500M ARR by late
              FY2028.
            claimRefs:
              - C200
              - C180
              - C194
              - C188
              - C188
              - C193
      - number: '6.5'
        title: Revenue Ramp and Customer Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Marvell explicitly guided to de minimis revenue contributions from Celestial AI for fiscal
              years 2026 and 2027, consistent with the company's pre-production status at acquisition and
              the multi-year hyperscaler qualification timeline. The first material revenues are expected
              in H2 FY2028, with a projected $500M annualized run rate by Q4 FY2028 and $1B ARR by
              Q4 FY2029. These projections represent Marvell management's forward guidance and carry
              standard forward-looking statement caveats. Analysts expect revenue to begin in H2 calendar
              2027 (aligning to Marvell's H2 FY2028) when the first production deployments commence.

              The earn-out structure embedded in the acquisition agreement provides an important signal
              about the implied customer pipeline: one-third of the up-to-$2.25B earn-out vests if
              cumulative Celestial AI revenue reaches $500M by FY2029 end; full earn-out requires
              cumulative revenue exceeding $2B. These thresholds imply Marvell reviewed specific contracted
              or highly probable customer commitments during due diligence that supported its confidence
              in the ramp trajectory.

              Customer concentration risk is a key structural vulnerability. Early-stage semiconductor
              programs with hyperscaler customers typically generate highly concentrated initial revenues—
              the first production program likely represents near-total revenue for FY2028. A delay,
              capex cycle deceleration, program cancellation, or competitive substitution at the lead
              hyperscaler could materially defer the $500M ARR milestone and threaten earn-out vesting.
              Analysts specifically identified this single-hyperscaler concentration as the primary
              near-term financial risk from the acquisition. The Amazon warrant partially mitigates
              concentration risk by ensuring a second committed demand signal, but does not constitute a
              binding purchase commitment with a fixed quantity or timeline. Diversification across
              Microsoft, Amazon, Google, and NVIDIA ecosystem channels is expected to reduce concentration
              risk in FY2029 and beyond as additional programs reach production.
