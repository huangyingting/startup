  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Celestial AI raised approximately $515 million across five external financing rounds between
              January 2021 and March 2025. The seed round of $2.87 million in January 2021 provided initial
              capital to advance the Photonic Fabric concept. A $56 million Series A led by Lux Capital
              followed in February 2022, enabling early silicon design work and initial tape-outs. Tiger Global
              Management led a $100 million Series B in June 2023 as the company advanced its first commercial
              prototypes and expanded its engineering team.

              The March 2024 Series C of $175 million, led by U.S. Innovative Technology Fund (USIT), was a
              pivotal strategic milestone: it introduced AMD Ventures, TSMC Ventures (VentureTech Alliance),
              Samsung Catalyst, and multiple hyperscaler-adjacent investors, validating the photonics-for-AI
              thesis at the supply-chain level. The round valued Celestial AI at $1.22 billion post-money,
              making it a unicorn. Thirteen months later, in March 2025, Celestial AI closed a $250 million
              Series C1 led by Fidelity Management and Research, with new participation from BlackRock,
              Maverick Silicon, and personal investment from Lip-Bu Tan (who simultaneously joined the board).
              This round valued the company at $2.5 billion post-money.

              Between the Series C and Series C1, Celestial AI acquired the Rockley Photonics IP portfolio in
              October 2024 for approximately $20 million — a balance-sheet use deploying cash at distressed
              prices to add over 200 patents covering electro-absorption modulators, optoelectronic
              systems-in-package, and optical switch technologies. Rockley had filed for Chapter 11 in early
              2023, making this a strategic opportunistic purchase that reinforced Celestial AI's IP moat
              ahead of its largest financing round and eventual exit.
            claimRefs:
              - C107
              - C108
              - C109
              - C110
              - C111
              - C112
              - C113
      - number: '4.2'
        title: Acquisition Financial Terms
        blocks:
          - type: paragraph
            body: |
              Marvell Technology announced the definitive acquisition agreement on December 2, 2025,
              alongside its fiscal Q3 FY2026 earnings, and closed the transaction on February 2, 2026.
              The deal structure comprises two components. The upfront consideration is approximately
              $1.0 billion in cash plus approximately 27.2 million shares of MRVL common stock valued at
              approximately $2.25 billion based on the 10-day volume-weighted average price prior to
              announcement, yielding approximately $3.25 billion in total upfront value. The contingent
              earn-out consideration is up to approximately 27.2 million additional MRVL shares
              (~$2.25 billion) tied to cumulative revenue milestones by the end of Marvell's fiscal year
              2029. The earn-out is structured in tranches: one-third unlocks if cumulative Celestial AI
              revenue reaches at least $500 million by FY2029 year-end, and the full earn-out vests only
              if cumulative revenue exceeds $2.0 billion.

              The cash portion was funded from Marvell's existing cash on hand, reducing its cash balance by
              $1 billion at closing and lowering expected annual interest income by approximately $38 million.
              The stock consideration required issuance of approximately 27 million new MRVL shares, increasing
              the diluted weighted-average share count by that amount. As part of the broader strategic
              partnership, Marvell simultaneously issued Amazon a warrant to purchase approximately
              1,045,171 MRVL shares at $87.0029 per share, with vesting based on Amazon's cumulative
              purchases of Photonic Fabric products through the end of 2030. The acquisition also adds
              approximately $50 million in annual non-GAAP operating expenses to Marvell's run rate,
              reflecting Celestial AI's engineering and development workforce.
            claimRefs:
              - C114
              - C115
              - C116
              - C117
              - C118
              - C119
              - C120
              - C121
              - C122
      - number: '4.3'
        title: Revenue Model and Marvell Projections
        blocks:
          - type: paragraph
            body: |
              Celestial AI had de minimis recognized revenue at acquisition, consistent with its position as
              an early-stage semiconductor design company completing development-phase tape-outs and
              transitioning to commercialization. Marvell's official closing press release projects that
              revenue contributions will begin in the second half of fiscal year 2028 (Marvell's fiscal year
              ends in late January), with revenue ramping meaningfully in the fourth quarter to a $500 million
              annualized run rate. Revenue is then expected to double to a $1 billion annualized run rate by
              the fourth quarter of fiscal year 2029. These projections are Marvell management's company-
              claimed forward guidance carrying standard forward-looking statement caveats.

              By Q4 FY2026 earnings (released March 2026), Marvell updated its combined near-term outlook:
              Celestial AI and XConn Technologies (another acquisition closed after fiscal year-end) are
              expected to contribute approximately $250 million in aggregate to FY2028 revenue. This figure
              implies the longer-term $500 million ARR trajectory remains intact but is stated as a combined
              contribution, not broken out by entity. Marvell's CEO Matt Murphy cited a total addressable
              market of approximately $10 billion for scale-up connectivity, positioning Celestial AI as the
              primary vehicle for capturing that market. Marvell reported FY2026 actual revenue of $8.195
              billion (+42% year-over-year), with FY2027 guidance of approximately $11 billion and FY2028
              guidance of approximately $15 billion — a trajectory that implicitly requires Celestial AI and
              other photonics programs to contribute material incremental revenue within two fiscal years.

              The revenue model within Marvell follows a custom-silicon and licensing structure consistent
              with Marvell's Data Center Group. Hyperscaler customers — including Amazon, which holds a
              warrant — are expected to be primary revenue sources. No specific pricing, volume commitments,
              or contract structures have been publicly disclosed.
            claimRefs:
              - C109
              - C109
              - C123
              - C124
              - C116
              - C125
              - C116
              - C126
              - C127
              - C128
      - number: '4.4'
        title: Unit Economics and Cash Consumption
        blocks:
          - type: paragraph
            body: |
              Celestial AI never disclosed standalone revenue, gross margin, or operating cost structure
              prior to acquisition. As a private semiconductor startup completing development-stage tape-outs
              and transitioning to commercialization, the company had de minimis revenues but incurred
              material operating expenses including chip design costs, packaging R&D, manufacturing tape-outs,
              and IP maintenance — including the $20 million Rockley Photonics IP purchase. No quarterly or
              annual income statement data is available from any public source.

              Implied cash burn can be estimated from the funding timeline. The $250 million Series C1 closed
              in March 2025, followed by the acquisition announcement nine months later in December 2025. A
              141 to 152 employee semiconductor design house with advanced packaging programs and multiple
              tape-out cycles typically operates at $15 to $25 million per month in cash consumption.
              At that range, the $250 million Series C1 would have provided approximately 10 to 17 months of
              runway, placing the acquisition announcement at or near the end of funded runway. This is a
              secondary inference, not a disclosed figure, and should be treated with low confidence.

              At the $3.25 billion upfront acquisition price and approximately 141 to 152 employees, the
              implied acquisition price per employee is approximately $21 to $23 million — a metric reflecting
              the premium paid for the IP portfolio, engineering talent, and Marvell's projected future revenue
              generation rather than any current financial performance. The venture return for Series C1
              investors who invested at a $2.5 billion pre-money valuation is approximately 1.3 times on the
              upfront consideration alone, rising to potentially 2.2 times if full earn-outs are achieved.
            claimRefs:
              - C128
              - C129
              - C130
              - C131
              - C117
              - C128
      - number: '4.5'
        title: Capital Adequacy and Financing
        blocks:
          - type: paragraph
            body: |
              As an acquired subsidiary, Celestial AI no longer carries independent capital requirements.
              The relevant analysis shifts to Marvell's capacity to fund continued development and ramp to
              revenue. Marvell funded the $1 billion cash consideration from existing cash on hand, which is
              manageable given Marvell's free cash flow of approximately $1.39 billion in FY2025 and
              investment-grade credit rating. The incremental $50 million per year in non-GAAP operating
              expenses is modest relative to Marvell's overall operating expense base.

              The earn-out structure — up to 27.2 million additional MRVL shares — represents a contingent
              liability that does not consume cash. Instead, it creates future dilution risk contingent on
              successful revenue ramp. One-third of the earn-out (approximately 9.1 million shares) unlocks
              at $500 million in cumulative Celestial AI revenue by FY2029 year-end; the full 27.2 million
              shares vest only if cumulative revenue exceeds $2.0 billion — implying sustained and significant
              revenue generation well ahead of Marvell's Q4 FY2028 run-rate target.

              Standalone Celestial AI capital adequacy pre-acquisition was entirely dependent on continued
              external equity financing. The Series C1 of $250 million in March 2025 was the final financing
              event before the acquisition. No bridge financing, debt facilities, or revenue-backed credit has
              been disclosed. The company had no material revenue to generate operating cash flow, making it
              entirely equity-financed through the close of the Marvell transaction.
            claimRefs:
              - C117
              - C118
              - C119
              - C122
              - C132
              - C133
              - C113
      - number: '4.6'
        title: Financial Risks and Verdict
        blocks:
          - type: paragraph
            body: |
              The primary financial risk to the investment thesis is earn-out non-achievement. If Celestial AI
              fails to generate $500 million in cumulative revenue by Marvell's FY2029 year-end, approximately
              one-third of the earn-out will not vest, and if cumulative revenue remains below $2.0 billion,
              the full earn-out is forfeited — capping total transaction value at $3.25 billion. Given that
              meaningful revenue is not expected until H2 FY2028, Marvell has approximately a two-year window
              (H2 FY2028 through FY2029) to accumulate $500 million to $2.0 billion in cumulative revenue
              from a technology that had no commercial deployments at acquisition.

              Additional financial risks include: (1) integration execution — photonics-for-AI is technically
              demanding and requires customer qualification cycles typically exceeding 12 to 18 months;
              (2) revenue recognition timing — semiconductor custom silicon revenue is lumpy and milestone-
              driven, making quarterly run-rate targets sensitive to a handful of design-win deployments;
              (3) competitive displacement — Broadcom's and NVIDIA's internal photonics programs could erode
              the available market before Celestial AI reaches scale; (4) cost overruns — the $50 million
              annual non-GAAP opex figure may expand as manufacturing scale-up requires additional headcount;
              and (5) valuation re-rating risk — Marvell's stock price at announcement was approximately
              $82 to $87 per share, and a sustained decline would reduce the effective value of both the
              upfront stock consideration and earn-out shares.

              Financial verdict: Celestial AI's profile at acquisition was that of a pre-revenue,
              high-burn semiconductor design startup with strong IP and strategic positioning but no independent
              path to profitability. The investment rationale is entirely forward-looking, dependent on
              Marvell's ability to commercialize Photonic Fabric technology for hyperscaler customers within
              a 24 to 36 month window. Gross margin, unit economics, and pricing have not been disclosed
              and represent blocking diligence gaps for assessing earn-out achievability.
            claimRefs:
              - C133
              - C113
              - C113
              - C107
