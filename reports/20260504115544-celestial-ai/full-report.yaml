  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Deal Overview and Implied Transaction Multiples
        blocks:
          - type: paragraph
            body: |
              Marvell Technology completed its acquisition of Celestial AI on February 2, 2026,
              approximately two months after announcing the transaction alongside its fiscal Q3 FY2026
              earnings on December 2, 2025. The deal structure comprises two distinct tranches. The
              upfront consideration totals approximately $3.25 billion: $1 billion in cash plus
              approximately 27.2 million newly issued shares of MRVL common stock valued at
              approximately $2.25 billion based on the 10-day volume-weighted average price preceding
              announcement. The contingent earn-out consideration—up to an additional 27.2 million
              MRVL shares (~$2.25 billion)—is structured in tranches tied to cumulative Celestial AI
              revenue milestones by Marvell's fiscal year 2029 year-end.

              On conventional trailing revenue metrics, the transaction cannot be benchmarked because
              Celestial AI was pre-revenue at acquisition—revenues were de minimis and no commercial
              deployments had been achieved. Marvell's management provided forward revenue guidance:
              a $500 million annualized run rate from Celestial AI by Q4 FY2028 (approximately H2
              calendar 2027, roughly 18 months post-close) and a $1 billion annualized run rate by
              Q4 FY2029. Using these targets as the denominator, the implied EV/forward ARR multiples
              are: (1) $3.25 billion upfront divided by $500 million 2-year-forward ARR = 6.5× NTM ARR;
              (2) $5.5 billion full earn-out value divided by $500 million ARR = 11.0× at the first
              milestone; and (3) $5.5 billion divided by $1.0 billion FY2029 ARR = 5.5×. The last VC
              valuation was $2.5 billion at the March 2025 Series C1, implying a 30% premium on the
              upfront price and a theoretical 120% maximum premium at full earn-out. Total capital
              invested across all five funding rounds was approximately $515 million, placing the
              upfront multiple at approximately 6.3× invested capital.

              Financial advisors provide an arm's-length pricing signal. Celestial AI was advised by
              Morgan Stanley (financial) and Latham & Watkins (legal). Marvell was advised by Citigroup
              (financial) and Wilson Sonsini Goodrich & Rosati (legal). Both advisory pairings are
              consistent with top-quartile competitive M&A processes in the semiconductor sector. MRVL
              shares rose approximately 9–13% on the announcement day, reflecting investor approval of
              the strategic rationale. The market was simultaneously reacting to strong Q3 FY2026
              earnings and raised guidance, so the share move cannot be fully attributed to the
              acquisition announcement alone; however, the absence of any negative market reaction
              to a $3.25 billion outlay for a pre-revenue company is a signal that buy-side consensus
              viewed the price as fair or strategically justified.
            claimRefs:
              - C269
              - C270
              - C271
              - C272
              - C273
              - C274
              - C275
              - C274
      - number: '8.2'
        title: Comparable M&A Transactions
        blocks:
          - type: paragraph
            body: |
              Valuing a pre-revenue semiconductor photonics company requires reference to comparable
              M&A transactions in silicon photonics, optical interconnects, and AI-adjacent chip
              design. The most directly relevant precedents are acquirer-to-acquirer consistent
              and technology-to-technology aligned.

              Marvell's own acquisition of Inphi Corporation (announced October 2020, closed April 2021)
              for approximately $10 billion provides the most powerful within-acquirer benchmark. Inphi
              was a growing, revenue-generating silicon photonics and electrical DSP company with
              approximately $683 million in trailing twelve-month revenue at announcement, implying a
              roughly 14.6× TTM revenue multiple. Inphi served cloud data centers and 5G telecom,
              a very close adjacency to Celestial AI's Photonic Fabric optical scale-up platform.
              The Inphi deal established Marvell's willingness to pay premium multiples for leadership
              in optical connectivity—making the Celestial AI upfront price at 6.5× forward ARR
              appear conservative by comparison if the revenue ramp achieves plan.

              NVIDIA's $6.9 billion acquisition of Mellanox Technologies (closed April 2020) is a
              critical AI networking precedent. Mellanox was generating approximately $1.3 billion in
              annual revenue at the time, implying roughly a 5× TTM revenue multiple. The Mellanox
              deal validated the strategic proposition that connectivity silicon—in that case InfiniBand
              switching—is essential to AI cluster performance. Celestial AI extends this proposition
              to the optical layer, with a higher-conviction forward-looking case.

              Cisco's acquisition of Acacia Communications for $4.5 billion (closed March 2021) is
              directly relevant: Acacia produces high-speed optical interconnect silicon critical to
              data center and AI infrastructure. The deal was initially announced in 2019 at $2.6 billion
              but repriced to $4.5 billion after antitrust delays, reflecting appreciation in photonics
              asset values during the period.

              AMD's $1.9 billion acquisition of Pensando Systems (April 2022) provides a closer
              structural analog: Pensando was a data center networking startup focused on programmable
              DPU silicon with limited revenue at exit, and AMD paid primarily for engineering talent,
              IP portfolio, and future design-win pipeline. This deal most closely mirrors the Celestial
              AI transaction structure—a pre-revenue or early-revenue AI chip startup acquired for IP
              and roadmap rather than current cash flows.

              Across this comparable set, EV/TTM revenue multiples range from approximately 5× to
              14.6× for revenue-generating targets. For pre-revenue acqui-hires or IP-premium deals,
              the multiple framework is not directly applicable—but the deal sizes ($1.1B to $10B)
              provide a credible range into which Celestial AI's $3.25 billion upfront price fits
              comfortably, especially given the strategic importance of Photonic Fabric to Marvell's
              $10 billion scale-up TAM narrative.
            claimRefs:
              - C276
              - C277
              - C265
              - C278
              - C279
              - C280
              - C281
              - C282
              - C283
      - number: '8.3'
        title: Comparable Public Company and Private Round Benchmarks
        blocks:
          - type: paragraph
            body: |
              Public AI silicon companies and recent private funding rounds provide additional valuation
              anchors. The most relevant public comps are companies with material AI chip design, custom
              silicon, and optical interconnect exposure.

              Among AI semiconductor startups, Cerebras Systems filed for a Nasdaq IPO in April 2026,
              targeting a valuation range of $23–35 billion against $510 million of reported 2025
              revenue—implying roughly 45–69× 2025 revenue at the filing range midpoint. Cerebras
              reached this revenue through a large multi-year compute contract with OpenAI and an AWS
              partnership, making it a less directly comparable but instructive ceiling for AI chip
              valuations in the current cycle. SambaNova Systems has remained private at a reported
              valuation above $5 billion with no disclosed revenue. Groq, the AI inference chip company,
              was valued at approximately $2.8 billion in a 2023 Series D round.

              For silicon photonics specifically, Ayar Labs—a co-packaged optical interconnect company
              with technology overlapping Celestial AI's Photonic Fabric—raised approximately
              $870 million in total funding through a Series C as of early 2024, but has not disclosed
              a post-money valuation publicly. The absence of comparable listed silicon photonics
              companies at the commercial stage forces reliance on M&A comps and market-sizing proxies
              rather than public company EV/revenue benchmarks.

              Among public semiconductor companies, Marvell itself provides the most useful acquirer
              reference point. Marvell's AI-driven revenue grew 78% in FY2025 to an estimated
              $1.7–$2.0 billion, and the company reported total FY2026 revenue of approximately
              $8.2 billion (+42% year-over-year). At announcement, Marvell's own enterprise value
              was approximately $55–65 billion, implying a forward revenue multiple of 7–8× against
              FY2026 estimates. Marvell paying 6.5× two-year forward ARR for Celestial AI is thus
              consistent with Marvell's own market multiple—suggesting the board applied disciplined
              pricing logic rather than a strategic overpay.

              The MarketsAndMarkets silicon photonics market report (2025 edition) projects the global
              silicon photonics market at approximately $2.1–3.1 billion in 2025, growing to
              $9.6–11.8 billion by 2030 at a CAGR of approximately 27–30%. At Marvell's stated
              $500 million ARR target, Celestial AI would represent roughly 15–24% share of a 2028
              market estimated at $4–5 billion. That is an ambitious but achievable share for a
              first-mover with hyperscaler design wins and no direct equivalent in co-packaged optics
              at 5 nm process node. The GrandView Research optical interconnect market report projects
              the overall optical interconnect market reaching $34.5 billion by 2030, providing
              a larger TAM backdrop within which the silicon photonics segment sits.
            claimRefs:
              - C284
              - C273
              - C271
              - C285
              - C286
              - C287
              - C288
              - C289
      - number: '8.4'
        title: Discounted Cash Flow and Revenue Ramp Analysis
        blocks:
          - type: paragraph
            body: |
              A full discounted cash flow analysis of Celestial AI as a standalone entity is precluded
              by the absence of any disclosed revenue, gross margin, operating cost structure, or
              customer contract terms. However, a simplified forward-revenue discount approach anchored
              on Marvell's published milestones allows scenario-based valuation analysis.

              Base case: Marvell projects $500 million ARR by Q4 FY2028 (H2 calendar 2027, approximately
              18 months post-acquisition close), scaling to $1 billion ARR by Q4 FY2029. Assuming a
              50–60% gross margin profile consistent with custom silicon licensing and photonic module
              sales—a reasonable assumption for a fabless design company selling into hyperscaler
              supply chains—EBITDA contribution at the $1 billion ARR scale would be approximately
              $100–200 million per year after allocated R&D and SG&A. Discounting this stream at a
              15–20% discount rate to reflect execution risk, technology adoption uncertainty, and
              semiconductor cycle exposure yields a present value range of approximately $2.5–4.0
              billion—broadly consistent with the $3.25 billion upfront price.

              Bull case: Celestial AI achieves $2 billion in cumulative revenue by FY2029, unlocking
              the full $2.25 billion earn-out. This requires approximately $300–400 million per year
              in revenue across FY2028 and FY2029, implying successful parallel hyperscaler
              co-packaged optics deployments. Under this scenario, the effective acquisition price of
              $5.5 billion against a projected run-rate revenue of $1.5–2.0 billion yields an
              EV/forward revenue multiple of approximately 2.8–3.7×—extremely attractive by any AI
              silicon benchmark.

              Bear case: Revenue ramp delays by 12 months or more due to hyperscaler qualification
              holdups or competing optical solutions. Cumulative FY2029 revenue reaches only
              $100–200 million; no earn-out tranches vest. The transaction settles at $3.25 billion
              for an asset generating minimal near-term revenue. In this scenario the effective
              price represents a significant write-down risk relative to Marvell's book value for
              the acquired intangibles.

              The earn-out structure materially improves Marvell's risk-adjusted expected value
              relative to paying $5.5 billion upfront. By deferring 41% of total potential
              consideration as contingent performance-based equity, Marvell's board preserved capital
              while aligning management incentives with commercial execution. Probability-weighting
              these scenarios—assigning perhaps 30% probability to the bull case, 45% to base, and
              25% to bear—yields an expected value of approximately $3.8–4.2 billion for the
              transaction, above the upfront consideration but below the full earn-out value. This
              probability weighting is an analyst estimate and should be treated with low confidence.
            claimRefs:
              - C290
              - C291
              - C281
              - C292
              - C293
              - C294
              - C257
      - number: '8.5'
        title: Earn-Out Structure and Contingent Consideration Analysis
        blocks:
          - type: paragraph
            body: |
              The earn-out mechanism is a materially important and analytically distinctive element
              of the Celestial AI acquisition that distinguishes it from straightforward cash or
              stock acquisitions common in semiconductor M&A.

              The structure is equity-settled: up to approximately 27.2 million additional MRVL shares
              (~$2.25 billion in value at announcement) are contingent on Celestial AI achieving two
              cumulative revenue milestones by the end of Marvell's fiscal year 2029 (approximately
              January 2029). First tranche: approximately one-third of the earn-out (~9.1 million
              MRVL shares, ~$750 million) vests when cumulative Celestial AI revenue from the
              acquisition date through FY2029 year-end reaches at least $500 million. Second tranche:
              the remaining two-thirds (~18.1 million shares, ~$1.5 billion) vest only if cumulative
              revenue exceeds $2.0 billion by the same deadline. Revenue accumulation begins at close
              (February 2026), and with meaningful revenue not expected until H2 FY2028, the effective
              window for reaching $2 billion in cumulative revenue is approximately 18 months—a
              highly aggressive target requiring outstanding commercial execution from multiple
              hyperscaler customers simultaneously.

              The earn-out structure creates several important dynamics. Celestial AI's founding team—
              CEO Dave Lazovsky, COO Preet Virk, and CTO Phil Winterbottom—joined Marvell as
              employees and are directly incentivized by these milestones, aligning them with Marvell's
              commercial execution goals. The equity settlement means no cash burden on Marvell's
              balance sheet but creates potential dilution risk for MRVL shareholders proportional to
              how much of the earn-out vests.

              An important strategic nuance is the Amazon warrant issued simultaneously: Marvell issued
              Amazon approximately 1,045,171 MRVL shares at a strike price of $87.0029 per share,
              exercisable based on Amazon's cumulative purchases of Photonic Fabric products through
              December 2030. This warrant functions as an indirect demand signal: if Amazon exercises
              the warrant in full, it implies Amazon has committed to Photonic Fabric product purchases
              large enough to warrant the vesting threshold, providing a structural corroboration for
              the earn-out achievability from Celestial AI's largest likely customer.

              The 41% contingent component (at announcement pricing) is at the high end for
              semiconductor acquisitions of this size in recent history, reflecting the combination of
              transformational upside potential and substantial pre-revenue uncertainty. This structure
              is consistent with best-practice M&A deal design for pre-commercial technology assets:
              it limits acquirer downside while providing seller upside if technology proves out. From
              a governance perspective, the contingent consideration also reduces the risk of
              reputational damage to Marvell management if the photonics ramp underperforms.
            claimRefs:
              - C258
              - C270
              - C259
              - C260
              - C261
              - C262
      - number: '8.6'
        title: Valuation Verdict and Investment Diligence Stance
        blocks:
          - type: paragraph
            body: |
              Synthesizing deal structure, comparable transactions, market sizing, and risk factors,
              the valuation verdict for the Celestial AI acquisition is: the $3.25 billion upfront
              price is fair for Marvell's strategic purposes, and the full $5.5 billion earn-out
              scenario would represent an attractive outcome. From the perspective of a hypothetical
              external observer benchmarking entry price against risk-adjusted forward value, the
              stance is research-more pending first-revenue validation in Marvell's FY2028 earnings.

              Three pillars support the fair verdict on the upfront price. First, the 6.5× two-year
              forward ARR multiple is conservative relative to comparable photonics and AI silicon
              M&A precedents—the Inphi deal at 14.6× TTM and the Acacia deal at ~12× TTM frame the
              upper end, while Mellanox at 5× TTM on a revenue-generating asset frames the lower end.
              Celestial AI's implied forward multiple sits between these poles without revenue risk
              adjustment. Second, the earn-out structure demonstrably limits Marvell's downside: the
              bear-case terminal settlement is $3.25 billion, not $5.5 billion. Third, NVIDIA's
              $2 billion NVLink Fusion investment (announced March 31, 2026) specifically cited
              silicon photonics and Marvell's optical interconnect capabilities—providing independent
              third-party corroboration that the Photonic Fabric technology is commercially credible
              and will be integrated into the dominant AI infrastructure platform.

              Three factors argue for caution and support a research-more posture for outside
              observers. First, Celestial AI has zero confirmed revenue at acquisition, and Marvell's
              forward guidance carries standard forward-looking-statement caveats without contractual
              revenue commitments from hyperscaler customers. Second, competitive risk from Broadcom's
              internal photonics program, NVIDIA's own silicon photonics R&D, and Intel's optical
              compute interconnect program is material and could erode the addressable market faster
              than the 18-month ramp window allows. Third, Marvell's customer concentration—
              approximately 73% of revenue from data center customers with over 50% estimated from two
              hyperscalers—means any hyperscaler CapEx deceleration would simultaneously compress
              Marvell's core revenue trajectory and Celestial AI's earn-out ramp.

              The thesis-break trigger is identifiable: failure to show any disclosed Celestial AI
              revenue contribution in Marvell's FY2028 earnings (reporting in early calendar 2028)
              would signal a ramp delay of at least 12 months, rendering the $500 million Q4 FY2028
              ARR target unachievable and raising earn-out forfeiture risk. That single data point—
              the first earnings call with a Celestial AI revenue line—is the most important near-term
              validation event for the valuation thesis.
            claimRefs:
              - C263
              - C264
              - C278
              - C265
              - C266
              - C267
              - C268
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Earn-Out Structure Materially Limits Marvell's Downside
            body: |
              Approximately 41% of total potential consideration ($2.25B of $5.5B) is contingent
              on cumulative revenue milestones. In the bear case, the transaction settles at
              $3.25B upfront regardless of earn-out non-achievement. This structure is a
              best-practice design for pre-commercial technology acquisitions: it limits acquirer
              downside while aligning founder and acquiree management with commercial execution.
            calloutType: strength
            claimRefs:
              - C293
              - C257
              - C258
              - C270
          - type: callout
            title: Zero Disclosed Revenue at Acquisition Creates Material Execution Risk
            body: |
              Celestial AI had de minimis revenue at close and no disclosed hyperscaler volume
              purchase commitments. Marvell's $500M ARR target requires 18 months of successful
              commercial ramp beginning from a standing start. Gross margin, pricing structure,
              and customer qualification timelines have not been disclosed, making independent
              earn-out achievability assessment impossible without additional diligence.
            calloutType: risk
            claimRefs:
              - C265
              - C290
              - C264
          - type: callout
            title: 'Valuation Stance: Fair (Upfront); Research-More for Outside Observers'
            body: |
              The $3.25B upfront price is fair relative to photonics M&A precedents and Marvell's
              own acquisition discipline. The full earn-out scenario at $5.5B would be attractive.
              For outside observers, a research-more stance is appropriate until Marvell's FY2028
              earnings demonstrate first Celestial AI revenue. That single data point transforms
              the valuation case from speculative to evidence-supported.
            calloutType: recommendation
            claimRefs:
              - C263
              - C266
              - C268
          - type: callout
            title: NVIDIA's $2B NVLink Fusion Commitment Is the Strongest External Validation Signal
            body: |
              NVIDIA's March 2026 $2 billion investment in the Marvell relationship—explicitly citing
              silicon photonics and NVLink Fusion integration—constitutes the most credible
              independent signal that Celestial AI's Photonic Fabric will be integrated into the
              dominant AI infrastructure platform. This commitment post-dates the acquisition close
              and was not factored into the original deal pricing, meaning it represents incremental
              upside validation for the valuation thesis.
            calloutType: insight
            claimRefs:
              - C289
              - C260
          - type: callout
            title: Base Case Assumes Hyperscaler Qualification Completed in 18 Months from Close
            body: |
              Marvell's $500M ARR target for Q4 FY2028 implies that hyperscaler customer
              qualification cycles for Photonic Fabric complete within approximately 18 months of
              the February 2026 close. Semiconductor optical component qualification typically
              requires 12–24 months. The base case assumption is at the optimistic end of
              historical qualification timelines and should be stress-tested against potential delays.
            calloutType: assumption
            claimRefs:
              - C272
              - C290
              - C291
