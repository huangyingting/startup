  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Overview and Positioning
        blocks:
          - type: paragraph
            body: |
              Celestial AI's Photonic Fabric is a silicon photonics optical interconnect platform designed
              to replace copper-based scale-up fabrics in AI data center infrastructure. In the customer
              workflow, AI system operators deploying clusters of XPUs — GPUs, TPUs, or custom AI
              accelerators — face a fundamental bandwidth and latency constraint: copper interconnects
              such as NVLink and UALink impose limits on aggregate bandwidth, power per bit, and the
              number of XPUs that can be tightly coupled in a single scale-up domain. Photonic Fabric
              addresses this by co-packaging an optical chiplet directly with the XPU, enabling chip-to-chip
              optical links that deliver greater than 10 Tbps bandwidth per module while consuming
              approximately 3.1 pJ per bit end-to-end — compared to 15 pJ/bit or more for pluggable
              optical modules and significantly more for copper at the same scale.

              The primary use cases are scale-up (connecting XPU-to-XPU within a server or across racks)
              and memory disaggregation (connecting XPU-to-remote memory pools via the Photonic Fabric
              Appliance, which supports up to 32 TB of unified HBM3e-backed DDR5 memory accessible at
              under 200 ns latency). These use cases map directly to the hyperscaler requirement to scale
              LLM inference and training workloads beyond the physical constraints of a single server node,
              allowing batch sizes and sequence lengths previously impossible with conventional memory
              architectures.

              The Photonic Fabric Module is delivered as a chiplet for direct co-packaging with XPUs. It
              integrates a TSMC 5nm custom control ASIC, HBM3e and DDR5 memory controllers, a silicon
              photonic interposer, and a multi-fiber array in a 2.5D system-in-package. The Photonic
              Fabric Appliance is a rack-form-factor product (2U) delivering up to 115 Tbps aggregate
              optical bandwidth for memory disaggregation scenarios, using the same underlying chiplet
              technology with a 16-port switching fabric. These two form factors cover both scale-up
              (chiplet, co-packaged) and scale-out (appliance, rack-attached) connectivity needs.

              Following Marvell's acquisition in February 2026, Photonic Fabric positions Marvell as the
              only custom XPU supplier offering fully optical scale-up connectivity as a co-packaged
              component. The NVLink Fusion partnership with NVIDIA, backed by a $2 billion NVIDIA
              investment in Marvell (March 2026), expands the total addressable market to include
              NVIDIA-ecosystem AI clusters, not only UALink-based architectures.
            claimRefs:
              - C145
              - C146
              - C147
              - C148
              - C153
              - C164
              - C160
              - C168
      - number: '5.2'
        title: Core Technology Architecture
        blocks:
          - type: paragraph
            body: |
              The Photonic Fabric's technological foundation rests on three interrelated innovations: use
              of electro-absorption modulators (EAMs) as the primary optical modulation element; placement
              of optical I/O anywhere inside the die rather than only at the chip perimeter; and the
              Optical Multi-Chip Interconnect Bridge (OMIB) that integrates photonics into package bridges
              for multi-chiplet connectivity.

              Electro-Absorption Modulators operate by shifting the absorption edge of a semiconductor
              material — typically Ge/Si quantum wells on TSMC's silicon photonics process — in response
              to an applied voltage, modulating optical intensity without requiring resonant cavities. This
              makes EAMs intrinsically tolerant to temperature variations exceeding 85°C and transient
              thermal ramps of 200°C per second — conditions that defeat microring resonators, which
              require active thermal tuning heaters adding power overhead per ring. The analog-only SerDes
              design consumes approximately 2.4 pJ/bit for the electronics plus 0.7 pJ/bit for the laser,
              yielding approximately 3.1 pJ/bit total, compared to 5–15 pJ/bit for competing digital
              signal processor (DSP)-based approaches, including pluggable optical modules.

              The in-die optical I/O architecture eliminates the traditional beachfront constraint by
              embedding photonic structures via a silicon photonic interposer layer within the TSMC 5nm
              CoWoS package. This allows optical transceivers to be placed anywhere on the die surface,
              freeing the die perimeter for HBM and DDR I/O, increasing aggregate optical bandwidth
              density, and enabling placement of optical engines under 500W–900W GPU dies without causing
              thermal hotspots in adjacent circuitry.

              The OMIB (Optical Multi-Chip Interconnect Bridge) extends optical connectivity across
              multiple chiplets in a package and across packages in a multi-chip module. OMIB-enabled
              links achieve chip-to-memory latencies below 200 ns end-to-end, comparable to local HBM
              access for latency-tolerant operations. Wavelength division multiplexing (WDM) is applied
              to maximize bandwidth density per fiber, with pre-FEC BER below 1e-8 at -10 dBm OMA input.

              Four TSMC 5nm/4nm tapeouts had been completed as of the OFC 2025 and Hot Chips 2025
              presentations, validating the TSMC silicon photonics process integration. Manufacturing
              relies on TSMC's SiPh process combined with CoWoS 2.5D interposer packaging, which TSMC
              was actively maturing toward CPO production capability — targeting 1.6 Tbps optical module
              mass production in H2 2025 for leading-edge AI customers.
            claimRefs:
              - C145
              - C146
              - C148
              - C149
              - C150
              - C151
              - C156
              - C157
              - C164
              - C166
