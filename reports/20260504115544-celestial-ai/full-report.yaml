  - id: F504
    title: Photonic Fabric Critical Dependency Map
    type: dag
    layout: wide
    summary: |
      Directed graph of key production, technology, and go-to-market dependencies for the Celestial
      AI Photonic Fabric under Marvell ownership. Nodes represent critical actors, platforms, and
      decision points; directed edges indicate dependency direction. Single-path dependencies with
      no identified backup are flagged as concentration risks.
    data:
      nodes:
        - id: celestial-ai
          label: Celestial AI / Marvell DCG
          category: company
        - id: tsmc-siph
          label: TSMC — SiPh Process Node
          category: supplier
          note: Sole foundry for EAM modulator fabrication; no disclosed backup
        - id: tsmc-cowos
          label: TSMC — CoWoS Advanced Packaging
          category: supplier
          note: Required for co-packaging Photonic Fabric with XPU die; capacity heavily allocated to NVIDIA/Broadcom
        - id: cw-laser
          label: External CW Laser Source
          category: component
          note: Required optical pump for EAM modulation; supplier not publicly disclosed
        - id: marvell-xpu
          label: Marvell Custom XPU Program
          category: platform
          note: Primary end-product integration; Photonic Fabric revenue dependent on XPU production ramp
        - id: nvidia-nvlink
          label: NVIDIA NVLink Fusion Ecosystem
          category: platform
          note: Secondary integration via March 2026 NVLink Fusion partnership; expands TAM
        - id: hyperscaler-qual
          label: Hyperscaler Customer Qualification
          category: gating-event
          note: Required milestone before H2 FY2028 revenue; no public milestone date disclosed
        - id: oif-standards
          label: OIF CPO Standards Body
          category: regulator
          note: CPO standardization timeline affects multi-customer qualification process
      edges:
        - from: tsmc-siph
          to: celestial-ai
          label: EAM fabrication (sole source)
        - from: tsmc-cowos
          to: celestial-ai
          label: Co-packaging (sole source; capacity constrained)
        - from: cw-laser
          to: celestial-ai
          label: Optical pump supply (undisclosed supplier)
        - from: celestial-ai
          to: marvell-xpu
          label: Photonic Fabric module integration
        - from: celestial-ai
          to: nvidia-nvlink
          label: NVLink Fusion compatible module
        - from: marvell-xpu
          to: hyperscaler-qual
          label: XPU + Photonic Fabric qualification bundle
        - from: nvidia-nvlink
          to: hyperscaler-qual
          label: NVIDIA-ecosystem hyperscaler path
        - from: oif-standards
          to: hyperscaler-qual
          label: Standards compliance affects qualification scope
    approximationNotes: |
      Dependency relationships inferred from public disclosures. CW laser supplier identity is
      not publicly disclosed; the node reflects a confirmed architectural requirement. OIF
      standards timeline is a known industry constraint but specific impact on Celestial AI
      qualification timeline is undisclosed.
