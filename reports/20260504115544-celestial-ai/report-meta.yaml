  foundingLocation: "Santa Clara, CA"
  headquarters: "Santa Clara, CA"
  productSummary: |
    Photonic Fabric: an EAM-based silicon photonics optical chiplet for AI data center
    scale-up interconnects. Co-packaged with XPU silicon using TSMC CoWoS advanced
    packaging to provide chip-to-chip and chip-to-memory optical connectivity at
    multi-terabit-per-second bandwidth with ~5 pJ/bit energy efficiency.
  customerFocus: >
    Hyperscalers (AWS, Google, Microsoft, Meta) via Marvell's custom AI silicon business;
    AI chip companies (NVIDIA via NVLink Fusion, AMD via Marvell partnership).
  businessModel: >
    Chiplet licensing and supply: silicon photonics optical chiplet integrated into
    customer XPU packages via TSMC CoWoS co-packaging; revenue recognized per-chiplet
    in production.
  stage: Acquired (formerly Series C1 / late-stage private)
  fundingStatus: >
    Acquired by Marvell Technology February 2026. Prior to acquisition: $515M total raised
    over seed, Series A, B, C, and C1 rounds.
  claimRefs: [C101, C104, C109, C110, C112, C113]

summary:
  headline: |
    Marvell paid $3.25B upfront for the most technically advanced silicon photonics
    scale-up interconnect asset available at a critical inflection point. The acquisition
    thesis — converting Celestial AI's Photonic Fabric into $500M+ ARR by FY2028 via
    Marvell's hyperscaler relationships — is coherent, but rests on a pre-revenue
    foundation with 18+ months of execution runway before revenue recognition. The
    6.5x 2-year forward ARR multiple is at the conservative end of AI silicon comps,
    making the upfront price defensible if the earn-out milestones are achieved;
    the $2.25B contingent consideration appropriately aligns incentives. Risk rating
    is high given technology, timing, and talent execution variables.
