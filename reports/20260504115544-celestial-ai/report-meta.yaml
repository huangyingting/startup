companyProfile:
  summary: |
    Celestial AI was a Santa Clara–based silicon photonics startup founded in 2020
    that developed the Photonic Fabric — an optical chiplet designed to replace
    copper-based scale-up interconnects (NVLink, UALink) in AI accelerator clusters.
    The company raised $515M across five rounds over five years and was acquired by
    Marvell Technology in February 2026 for $3.25B upfront. At acquisition, the company
    was pre-revenue and in hardware qualification with undisclosed hyperscaler customers.
    Marvell projects $500M ARR from Celestial AI by Q4 FY2028.
  foundedDate: "2020-01-01"
  founders:
    - name: Dave Lazovsky
      role: CEO and Co-Founder
      background: >
        Previously at Applied Micro Circuits (AMCC); deep experience in data center
        networking silicon.
      claimRefs: [C101]
    - name: Preet Virk
