callouts:
  - calloutType: strength
    title: EAM Thermal Resilience Is Durable Structural Advantage vs. MRM Competition
    body: |
      Celestial AI's EAM-based design tolerates greater than 85°C temperature swings and
      200°C/sec transient ramps without active thermal tuning. This is a structural advantage
      over the dominant MRM-based approach (Ayar Labs TeraPHY) in co-packaged XPU environments
      where GPU die temperatures fluctuate dynamically under varying AI workloads. Elimination
      of per-modulator heater circuits reduces both power overhead and design complexity in
      high-power XPU packages.
    claimRefs:
      - CE005
  - calloutType: strength
    title: 200+ Patent Portfolio with 2014-Vintage EAM Coverage From Rockley Acquisition
    body: |
      The $20 million Rockley Photonics IP acquisition in October 2024 added more than 200
      patents with EAM and optoelectronic SiP coverage dating to 2014 — predating most silicon
      photonics startups and Celestial AI's direct competitors. Combined with organic patents
      from 2020, the layered IP portfolio creates a moat that is expensive to design around for
      new entrants targeting EAM-based in-die optical I/O.
    claimRefs:
      - CE008
      - CE009
      - CE010
  - calloutType: risk
    title: Single-Foundry TSMC Dependency Creates Production and Revenue Timeline Concentration Risk
    body: |
      All Photonic Fabric production relies on TSMC's SiPh process and CoWoS advanced packaging.
      TSMC's CoWoS capacity is heavily allocated to NVIDIA and Broadcom with multi-year reservation
      agreements that predate Celestial AI's production requirements. Any capacity constraint,
      yield shortfall, or TSMC prioritization decision could delay Photonic Fabric production
      qualification beyond the H2 FY2028 revenue milestone.
    claimRefs:
      - CE013
      - CE022
  - calloutType: insight
    title: NVLink Fusion Partnership Doubles TAM and Accelerates Customer Pipeline for Photonic Fabric
    body: |
      Marvell's March 2026 NVLink Fusion partnership with NVIDIA, backed by a $2 billion NVIDIA
      strategic investment in Marvell, opens Photonic Fabric to NVIDIA-ecosystem AI clusters in
      addition to UALink-based custom XPU deployments. This effectively expands the near-term
      addressable market and provides a strong demand signal that should accelerate hyperscaler
      qualification timelines for Photonic Fabric co-packaged with Marvell XPUs.
    claimRefs:
      - CE018
      - CE019
