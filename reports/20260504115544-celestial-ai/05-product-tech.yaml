  - id: s505
    title: Technology Risks and Mitigation Gaps
    body: |
      Five categories of technology risk are material to the Photonic Fabric investment thesis
      following the Marvell acquisition.

      EAM insertion loss: While EAMs outperform MRMs on thermal stability and bandwidth linearity,
      EAMs can exhibit higher optical insertion loss under specific waveguide geometry and bias
      configurations. Higher insertion loss demands more powerful laser sources, increasing system
      power and cost, and can reduce link budget margin at scale. No independent laboratory has
      published a head-to-head silicon comparison of EAM versus MRM insertion loss under identical
      production-equivalent conditions.

      TSMC CoWoS capacity concentration: Photonic Fabric depends exclusively on TSMC's SiPh and
      CoWoS processes. TSMC's CoWoS capacity is heavily allocated to NVIDIA's HBM stacking and
      Broadcom's custom ASICs. Adding Celestial AI's photonic interposer layers introduces
      scheduling complexity. Any TSMC capacity constraint or yield shortfall could push volume
      production beyond the FY2028 revenue targets, directly threatening the Marvell earn-out
      structure.

      Thermal management at co-packaged XPU scale: Optical engines co-packaged with 500W–900W
      XPUs generate heat that must be dissipated without thermally coupling into adjacent photonic
      structures. While EAMs tolerate 85°C swings, sustained high-power operation creates heat
      flux management challenges at the package level that are not yet resolved at production scale.

      CPO standardization risk: The OIF CPO Implementation Agreement (3.2 Tbps module) and IEEE
      802.3 Ethernet working group standards for embedded optics are still evolving. Lack of
      interoperability standards means each hyperscaler must qualify Photonic Fabric independently,
      extending qualification cycles and increasing per-customer integration costs.

      Technology readiness uncertainty: Despite four TSMC tapeouts, no external production
      qualification or independent third-party silicon characterization has been publicly disclosed.
      All performance claims derive from company presentations and an arXiv preprint — not
      peer-reviewed publications with independent silicon measurements. This gap increases
      customer hesitancy before committing to production deployments.
