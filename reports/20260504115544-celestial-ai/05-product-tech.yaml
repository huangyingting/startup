chapter:
  number: 5
  title: Product & Technology
  summary: |
    Celestial AI's Photonic Fabric is a silicon photonics optical interconnect platform using
    electro-absorption modulator (EAM) technology to deliver chip-to-chip and chip-to-memory
    optical connectivity co-packaged with AI accelerators (XPUs). The Photonic Fabric Module
    integrates a TSMC 5nm custom ASIC, HBM3e and DDR5 memory controllers, a silicon photonic
    interposer, and a fiber array in a 2.5D system-in-package, delivering greater than 10 Tbps
    optical bandwidth per module at approximately 3.1 pJ/bit end-to-end energy efficiency. EAM
    technology provides thermal resilience exceeding 85°C temperature swings without active
    thermal tuning — a structural advantage over microring resonator (MRM) approaches used by
    Ayar Labs (TeraPHY). The novel in-die optical I/O architecture eliminates the traditional
    beachfront placement constraint, enabling optical ports anywhere on the die surface. Technical
    validation includes OFC 2025 paper W3D.1 (Sahni et al.), a Hot Chips 2025 CTO presentation
    on in-die optical I/O, an arXiv preprint (arXiv:2507.14000), and four completed TSMC 5nm/4nm
    tapeouts. IP foundation combines organic patents from founding (2020) with the distressed
    acquisition of Rockley Photonics' 200+ patent portfolio in October 2024 for approximately
    $20 million, covering EAMs, optoelectronic systems-in-package, and optical switch technology.
    Following Marvell's February 2026 acquisition, the roadmap is anchored to Marvell's custom
    XPU business and the NVLink Fusion partnership with NVIDIA (March 2026). Marvell targets
    $500 million annualized run-rate revenue from Photonic Fabric by Q4 FY2028. Principal
    technology risks include EAM insertion loss in some configurations, TSMC CoWoS capacity
    constraints, thermal management at the co-packaged XPU level, and evolving CPO standardization.
sections:
  - id: s501
    title: Product Overview and Positioning
    body: |
      Celestial AI's Photonic Fabric is a silicon photonics optical interconnect platform designed
      to replace copper-based scale-up fabrics in AI data center infrastructure. In the customer
      workflow, AI system operators deploying clusters of XPUs — GPUs, TPUs, or custom AI
      accelerators — face a fundamental bandwidth and latency constraint: copper interconnects
      such as NVLink and UALink impose limits on aggregate bandwidth, power per bit, and the
      number of XPUs that can be tightly coupled in a single scale-up domain. Photonic Fabric
      addresses this by co-packaging an optical chiplet directly with the XPU, enabling chip-to-chip
      optical links that deliver greater than 10 Tbps bandwidth per module while consuming
      approximately 3.1 pJ per bit end-to-end — compared to 15 pJ/bit or more for pluggable
      optical modules and significantly more for copper at the same scale.

      The primary use cases are scale-up (connecting XPU-to-XPU within a server or across racks)
      and memory disaggregation (connecting XPU-to-remote memory pools via the Photonic Fabric
      Appliance, which supports up to 32 TB of unified HBM3e-backed DDR5 memory accessible at
      under 200 ns latency). These use cases map directly to the hyperscaler requirement to scale
      LLM inference and training workloads beyond the physical constraints of a single server node,
      allowing batch sizes and sequence lengths previously impossible with conventional memory
      architectures.

      The Photonic Fabric Module is delivered as a chiplet for direct co-packaging with XPUs. It
      integrates a TSMC 5nm custom control ASIC, HBM3e and DDR5 memory controllers, a silicon
      photonic interposer, and a multi-fiber array in a 2.5D system-in-package. The Photonic
      Fabric Appliance is a rack-form-factor product (2U) delivering up to 115 Tbps aggregate
      optical bandwidth for memory disaggregation scenarios, using the same underlying chiplet
      technology with a 16-port switching fabric. These two form factors cover both scale-up
      (chiplet, co-packaged) and scale-out (appliance, rack-attached) connectivity needs.

      Following Marvell's acquisition in February 2026, Photonic Fabric positions Marvell as the
      only custom XPU supplier offering fully optical scale-up connectivity as a co-packaged
      component. The NVLink Fusion partnership with NVIDIA, backed by a $2 billion NVIDIA
      investment in Marvell (March 2026), expands the total addressable market to include
      NVIDIA-ecosystem AI clusters, not only UALink-based architectures.
