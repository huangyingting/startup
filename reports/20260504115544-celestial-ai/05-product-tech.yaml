  - id: s503
    title: IP and Technology Stack
    body: |
      Celestial AI's intellectual property portfolio combines organic patents filed from the
      company's founding in 2020 with the October 2024 distressed acquisition of Rockley
      Photonics' patent portfolio. The combined portfolio exceeds 200 patents worldwide, covering
      worldwide issued and pending applications across three technology pillars: optoelectronic
      systems-in-package, electro-absorption modulators, and optical switch technology.

      Phil Winterbottom (CTO) brings deep telecom photonics expertise from Bell Labs' 1127
      Computer Science Research Center and a track record as a serial founder (Entrisphere and
      Gainspeed). His architectural contributions — particularly in-die EAM placement and the
      OMIB bridge concept — are widely cited as central to Photonic Fabric's differentiation from
      ring-resonator-based competitors. David Lazovsky (CEO) and Preet Virk (COO) bring
      semiconductor commercialization backgrounds that complement the CTO's technical depth.

      The Rockley Photonics IP was acquired in October 2024 for approximately $20 million following
      Rockley's Chapter 11 bankruptcy emergence and subsequent restructuring. Rockley patents date
      from as early as 2014, predating most silicon photonics startups, and include foundational
      EAM waveguide structures and optoelectronic packaging claims directly applicable to Celestial
      AI's in-die architecture. This acquisition reinforced the IP moat ahead of the Series C1
      financing round and Marvell acquisition.

      The technology stack's manufacturing layer depends entirely on TSMC's SiPh process combined
      with CoWoS 2.5D advanced packaging, creating a single-foundry dependency that is both a
      strength (TSMC advanced node quality and TSMC Ventures strategic alignment) and a risk
      (CoWoS capacity constraints under heavy NVIDIA and Broadcom demand). The software layer
      provides fabric management, telemetry, reliability/availability/serviceability (RAS), and
      AI-driven analytics for hyperscale fleet integration. The software stack's maturity and
      completeness for production hyperscaler deployment has not been independently verified.
