      data center scale-up interconnect. Cell assessments use ordinal ratings where no common
      unit of measurement exists across all three approaches.
    data:
      columns:
        - EAM — Celestial AI
        - MRM — Ayar Labs TeraPHY
        - Copper — NVLink/UALink
      rows:
        - label: Bandwidth density
          values:
            - '>10 Tbps/module (claimed)'
            - 4 Tbps/chiplet (demonstrated)
            - ~1.8 TB/s XPU-to-XPU (NVLink4)
        - label: Energy efficiency
          values:
            - ~3.1 pJ/bit (analog SerDes)
            - <5 pJ/bit (DSP-based link)
            - ~15–20+ pJ/bit at high bandwidth
        - label: Thermal stability (no active tuning)
          values:
            - '>85°C tolerance; no heaters needed'
            - Requires per-ring thermal heaters (~mW each)
            - Not applicable to copper
        - label: Insertion loss
          values:
            - Moderate (EAM absorption-edge dependent)
            - Low (resonant enhancement reduces loss)
            - Near-zero (copper trace)
        - label: Manufacturing process
          values:
            - TSMC SiPh + CoWoS (single foundry)
            - GlobalFoundries / TSMC SiPh
            - Standard CMOS + PCB trace
        - label: Standards maturity
          values:
            - Evolving (OIF CPO; NVLink Fusion ecosystem)
            - CW-WDM MSA; UCIe roadmap
            - High (NVLink 4/5; UALink 1.0)
        - label: External laser required
          values:
            - Yes (CW laser, co-packaged in module)
            - Yes (SuperNova remote multi-wavelength laser)
            - 'No'
    approximationNotes: |
      Qualitative assessments synthesized from OFC 2025, Hot Chips 2025, Ayar Labs product
      page and OCP listing, and silicon photonics literature. No normalized test-bench comparison
      between EAM and MRM under identical production conditions has been published.
    claimRefs:
