  - id: s502
    title: Core Technology Architecture
    body: |
      The Photonic Fabric's technological foundation rests on three interrelated innovations: use
      of electro-absorption modulators (EAMs) as the primary optical modulation element; placement
      of optical I/O anywhere inside the die rather than only at the chip perimeter; and the
      Optical Multi-Chip Interconnect Bridge (OMIB) that integrates photonics into package bridges
      for multi-chiplet connectivity.

      Electro-Absorption Modulators operate by shifting the absorption edge of a semiconductor
      material — typically Ge/Si quantum wells on TSMC's silicon photonics process — in response
      to an applied voltage, modulating optical intensity without requiring resonant cavities. This
      makes EAMs intrinsically tolerant to temperature variations exceeding 85°C and transient
      thermal ramps of 200°C per second — conditions that defeat microring resonators, which
      require active thermal tuning heaters adding power overhead per ring. The analog-only SerDes
      design consumes approximately 2.4 pJ/bit for the electronics plus 0.7 pJ/bit for the laser,
      yielding approximately 3.1 pJ/bit total, compared to 5–15 pJ/bit for competing digital
      signal processor (DSP)-based approaches, including pluggable optical modules.

      The in-die optical I/O architecture eliminates the traditional beachfront constraint by
      embedding photonic structures via a silicon photonic interposer layer within the TSMC 5nm
      CoWoS package. This allows optical transceivers to be placed anywhere on the die surface,
      freeing the die perimeter for HBM and DDR I/O, increasing aggregate optical bandwidth
      density, and enabling placement of optical engines under 500W–900W GPU dies without causing
      thermal hotspots in adjacent circuitry.

      The OMIB (Optical Multi-Chip Interconnect Bridge) extends optical connectivity across
      multiple chiplets in a package and across packages in a multi-chip module. OMIB-enabled
      links achieve chip-to-memory latencies below 200 ns end-to-end, comparable to local HBM
      access for latency-tolerant operations. Wavelength division multiplexing (WDM) is applied
      to maximize bandwidth density per fiber, with pre-FEC BER below 1e-8 at -10 dBm OMA input.

      Four TSMC 5nm/4nm tapeouts had been completed as of the OFC 2025 and Hot Chips 2025
      presentations, validating the TSMC silicon photonics process integration. Manufacturing
      relies on TSMC's SiPh process combined with CoWoS 2.5D interposer packaging, which TSMC
      was actively maturing toward CPO production capability — targeting 1.6 Tbps optical module
      mass production in H2 2025 for leading-edge AI customers.
