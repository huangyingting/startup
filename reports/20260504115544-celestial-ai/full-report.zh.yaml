      - number: '3.3'
        title: 平台型与在位竞争对手
        blocks:
          - type: paragraph
            body: >
              Intel Silicon Photonics 在商业硅光子领域拥有最长机构历史，自 2012 年起运营收发器业务。Intel 的 Optical Connectivity for AI（OCI）计划代表其光
              I/O chiplet 项目。OFC 2024 上，Intel 展示了首个与 Intel CPU 共封装、完全一体化的双向 OCI 光 I/O chiplet。OCI chiplet 每向支持 64 个 32
              Gbps 通道（双向 4 Tbps），功耗效率低于 3–5 pJ/bit，并支持通过标准光纤达到最高 100 米传输距离。Intel 的优势在垂直整合：内部硅光子研发、封装和晶圆代工能力。Intel
              还通过收购式招聘吸收包括 Glofast 在内的光学团队来加强项目。Intel 的竞争风险主要在 Intel CPU 平台客户上，Intel 可能偏好内部光学 chiplet，从而收窄 Celestial
              AI/Marvell 在 Intel 平台 AI 部署中的可服务市场。


              Broadcom 的 CPO 项目聚焦 scale-out Ethernet 交换，而非 Celestial AI 竞争的 scale-up XPU-to-XPU 互连领域。2024 年 3 月，Broadcom
              发布 Bailly，这是行业首个 51.2 Tbps CPO Ethernet switch，将八个 6.4 Tbps 硅光子光引擎与 Tomahawk5 芯片集成，相比可插拔收发器降低 70% 功耗，并在
              Meta 完成现场验证。路线图延伸到 102.4 Tbps 的 Davisson。Broadcom 还向 NVIDIA 供应 NVLink Switch 芯片，并是 UALink 联盟创始成员。Hot Chips
              2024 上，Broadcom 展示了 AI compute ASIC 与光连接的早期工作，显示可能向 scale-up 相邻领域扩张。若 Broadcom 将 CPO 转向 XPU scale-up
              空间，凭借其超大规模云关系和制造规模，将构成资源最强的竞争威胁。


              NVIDIA 通过 NVLink 控制 scale-up 生态。NVLink v5（Blackwell）每块 GPU 达到 1.8 TB/s；NVSwitch 支持最高 576 GPU pod。Computex
              2025 上，NVIDIA 发布 NVLink Fusion——一种 chiplet 接口，使包括 Marvell 在内的定制 XPU 芯片能够原生连接 NVIDIA 的 NVLink 生态。Marvell 与
              NVIDIA 合作 NVLink Fusion，支持最高 1.8 TB/s 的 chiplet 双向带宽。NVLink Fusion 创造了合作通道，但也确保 NVIDIA 控制其生态内光学采用时点。
