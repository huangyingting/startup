  - id: FU001
    title: 客户参与漏斗
    type: flow
    layout: standard
    summary: 从超大规模云厂商认知到生产爬坡的六阶段线性流程，说明多年验证管线为何让 2024 年设计导入公告指向 预计 2028 年开始收入。收购时，Celestial AI 位于第 2–3 阶段。
    data:
      nodes:
        - id: n1
          label: 认知建立与技术触达
          detail: OFC 会议演示、白皮书、直接触达超大规模云厂商架构团队。Celestial AI 在 2023–2024 年的发表策略， 为 AI 内存墙解决方案中的 Photonic Fabric 价值主张建立认知。
        - id: n2
          label: NDA 技术评估
          detail: 超大规模云厂商签署双向 NDA；获得技术规格、路线图和首批样品。CEO Lazovsky 确认，截至 2025 年初， 多家超大规模云厂商处于 NDA 评估阶段。
        - id: n3
          label: 设计导入承诺
          detail: 超大规模云厂商正式把 Photonic Fabric 纳入某一具体 XPU 架构。至少一家超大规模云厂商已通过 2024 年 3 月 OFC 公告确认处于这一阶段。
        - id: n4
          label: 硅片送样与表征
          detail: 交付量产前硅片，用于光学、电气和热验证。估计 6–12 个月。首家超大规模云厂商在收购时的状态 未公开确认。
        - id: n5
          label: 验证测试
          detail: 完整多机架 AI 集群集成测试；验证可靠性和共封装良率。通常需要 12–24 个月。预计首家超大规模云厂商 在 2026–2027 年完成。
        - id: n6
          label: 生产爬坡
          detail: 开始批量制造；确认收入。Marvell 预计 H2 FY2028 开始首笔收入，到 Q4 FY2028 达到 $500M ARR， 到 Q4 FY2029 达到 $1B ARR。
    approximationNotes: Celestial AI 的阶段位置根据 2024 年 3 月设计导入公告和 Marvell 预计 H2 FY2028 收入时间推断； 单个超大规模云厂商的阶段位置未公开确认。
