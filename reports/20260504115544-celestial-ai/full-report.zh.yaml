      - number: '6.5'
        title: 收入爬坡与客户集中风险
        blocks:
          - type: paragraph
            body: >
              Marvell 明确指引，Celestial AI 在 2026 和 2027 财年只会贡献极少收入，这与公司收购时的预生产状态和超大规模云厂商多年认证时间线一致。第一批实质收入预计出现在 H2 FY2028，到
              Q4 FY2028 达到预计 $500M 年化运行率，到 Q4 FY2029 达到 $1B ARR。这些预测是 Marvell 管理层前瞻指引，带有标准前瞻性陈述限制。分析师预计，首批生产部署开始时，收入会在
              H2 calendar 2027 出现（对应 Marvell H2 FY2028）。


              收购协议中的或有对价结构，为隐含客户管线提供重要信号：若 Celestial AI 到 FY2029 年底累计收入达到 $500M，最高 $2.25B 或有对价中的三分之一归属；全部或有对价要求累计收入超过
              $2B。这些门槛意味着 Marvell 在尽调中审阅了具体合同或高度可能的客户承诺，才会对爬坡轨迹有信心。


              客户集中风险是关键结构性脆弱点。面向超大规模云客户的早期半导体项目，初始收入通常高度集中——第一个生产项目很可能代表 FY2028 几乎全部收入。领先超大规模云厂商一旦延迟、取消项目、放缓 capex
              周期或被竞争方案替代，都可能实质推迟 $500M ARR 里程碑，并威胁或有对价归属。分析师特别指出，这种单一超大规模云客户集中，是收购带来的主要近期财务风险。Amazon
              认股权证通过确保第二个已承诺需求信号，部分缓解集中风险，但并不构成带固定数量或时间线的有约束力采购承诺。随着更多项目进入生产，Microsoft、Amazon、Google 和 NVIDIA
              生态渠道之间的多元化预计会在 FY2029 及以后降低集中风险。
