      - number: '8.2'
        title: 可比 M&A 交易
        blocks:
          - type: paragraph
            body: >
              为一家尚未产生收入的半导体光子公司估值，需要参照硅光子、光互连和 AI 相邻芯片设计领域的可比 M&A 交易。最直接相关的先例在收购方与收购方之间具有一致性，也与技术路径对齐。


              Marvell 自己收购 Inphi Corporation（October 2020 宣布，April 2021 交割），金额约 $10 billion，是最有力的同一收购方基准。Inphi
              是一家正在增长、已有收入的硅光子和电 DSP 公司，公告时过去十二个月收入约 $683 million，对应约 14.6× TTM 收入倍数。Inphi 服务云数据中心和 5G 电信，与 Celestial AI
              的 Photonic Fabric 光学扩展平台高度相邻。Inphi 交易证明 Marvell 愿意为光连接领导地位支付高倍数；如果收入爬坡按计划实现，Celestial AI 6.5× 远期 ARR
              的前置价格相比之下显得保守。


              NVIDIA 以 $6.9 billion 收购 Mellanox Technologies（April 2020 交割）是关键 AI 网络先例。Mellanox 当时年收入约 $1.3 billion，对应约
              5× TTM 收入倍数。Mellanox 交易验证了一个战略命题：连接硅片——在该案例中是 InfiniBand 交换——对 AI 集群性能至关重要。Celestial AI
              将这一命题延伸到光学层，前瞻性确定性更高。


              Cisco 以 $4.5 billion 收购 Acacia Communications（March 2021 交割）也直接相关：Acacia 生产对数据中心和 AI
              基础设施关键的高速光互连硅片。这笔交易最初在 2019 以 $2.6 billion 宣布，但因反垄断延误后重定价至 $4.5 billion，反映出该时期光子资产价值上升。


              AMD 于 April 2022 以 $1.9 billion 收购 Pensando Systems，提供了更接近的结构类比：Pensando 是一家专注可编程 DPU
              硅片的数据中心网络创业公司，退出时收入有限；AMD 主要买的是工程人才、IP 组合和未来设计赢单管线。该交易最贴近 Celestial AI 的交易结构——尚未产生收入或早期收入的 AI 芯片创业公司，因 IP
              和路线图而非当期现金流被收购。


              在这组可比交易中，已有收入目标的 EV / TTM 收入倍数约为 5× 到 14.6×。对于尚未产生收入的人才收购或 IP 溢价交易，倍数框架不能直接套用；但 $1.1B 到 $10B
              的交易规模给出了可信区间，Celestial AI 的 $3.25 billion 前置价格落在其中并不突兀，尤其考虑到 Photonic Fabric 对 Marvell $10 billion 扩展 TAM
              叙事的战略重要性。
