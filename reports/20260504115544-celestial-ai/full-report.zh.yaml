      - number: '7.2'
        title: 市场时机与采用风险
        blocks:
          - type: paragraph
            body: >
              Marvell 的或有对价结构——目标是 2028 财年达到 $500M ARR，并以 $2B ARR 对应最高支付——与超大规模云厂商采用 CPO 的速度高度绑定。三项因素带来实质时机风险。


              CPO 采用时间线。LightCounting 2025 年 7 月对首届虚拟 CPO 会议的分析认为，首批大规模 CPO 部署会在 2026 年开始，但高量级铺开更可能在 2027 年。这与超大规模定制硅从
              design-in 到生产通常需要 24–36 个月相一致，也与 Marvell 自身关于 Celestial AI 到 2027
              财年只会贡献极少收入的指引一致。任何进一步滑坡——超大规模云项目延迟、集成挑战或采购优先级重排——都会把首批实质收入推向 FY2028，并压缩或有对价窗口。


              铜基础设施寿命。基于铜的 NVLink、InfiniBand 和 Ethernet 互连系统已在 400G 证明可靠，并正在升级到 800G。若超大规模云厂商认为，铜方案足以支撑 AI 系统到 2020
              年代后期——或者 AI 集群扩展在低于必须采用纯光互连的水平处趋于平台化——Photonic Fabric 的总可用机会可能显著小于 Marvell 内部模型，或更晚到来。


              AI capex 集中风险。Marvell 的 $500M ARR 目标意味着，两到三家超大规模云客户将贡献早期收入的绝大多数。领先超大规模云厂商若因宏观压力、capex 纪律周期或 AI 工作负载特征变化而放缓
              AI 基础设施 capex，将直接减少 Photonic Fabric 需求。集中度意味着，一家超大规模云厂商的生产排期延误，实质上就是公司的收入延误。
            claimRefs:
              - CR005
              - CR020
              - CR021
              - CR021
              - CR006
              - CR019
      - number: '7.3'
        title: 竞争与战略风险
        blocks:
          - type: paragraph
            body: >
              光学 chiplet 市场仍在早期，但竞争快速升温。Marvell/Celestial AI 面对三类可信竞争威胁，以及来自 NVIDIA 关系的一项结构性战略风险。


              Ayar Labs。Ayar Labs 于 2025 年 3 月发布 TeraPHY，称其为行业首款 UCIe 光互连 chiplet，使用 16 波长 SuperNova 光源实现 8 Tbps
              带宽。NVIDIA、AMD 和 Intel 均已投资 Ayar Labs。关键在于，NVIDIA 的投资协同意味着 Ayar Labs 有潜力成为 NVIDIA 生态部署中的首选光学 chiplet
              供应商。Ayar 与 Global Unichip Corp（GUC）的合作——后者是 TSMC 生态中关键 ASIC 设计服务公司——瞄准超大规模客户，并设计为把 TeraPHY 嵌入 AI 参考设计。Ayar
              Labs 目标在 2026 年中量产，并到 2028 年把出货规模推向数亿颗 chiplet。若 Ayar Labs 跑通这一爬坡，Marvell/Celestial AI
              可能在或有对价里程碑要求前，就面对规模化竞争。


              Intel OCI 和 Broadcom CPO。Intel 自有光互连（OCI）硅光平台服务 Intel Gaudi 客户，形成封闭的竞争性替代。Broadcom 集成 CPO 的 Tomahawk 6
              switch，则是在 AI 交换层的竞争产品。Intel OCI 和 Broadcom CPO 目前都不瞄准 Photonic Fabric 所处的同一 scale-up 互连位置，但相邻层的竞争压力会约束
              Marvell 的定价权和生态版图。


              NVLink Fusion 战略依赖。NVIDIA 对 Marvell 的 $2B 投资（2026 年 4 月宣布）和 NVLink Fusion 合作，同时验证了光互连投资逻辑，也制造了战略依赖。若
              NVIDIA 调整合作条款、收购其他光学 chiplet 供应商，或推进内部光子项目，Marvell 的 NVLink Fusion 渠道就会承压。合作商业条款未公开披露，围绕排他性、定价和终止条款存在不透明性。
            claimRefs:
              - CR011
              - CR007
              - CR007
              - CR002
              - CR008
