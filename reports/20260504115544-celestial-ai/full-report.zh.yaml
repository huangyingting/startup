  - id: TM004
    title: 增长驱动与约束表
    columns:
      - 驱动 / 约束
      - 方向
      - 时间
      - Celestial AI 影响
      - 尽调问题
    rows:
      - - AI 集群扩容（100k → 1M XPU）
        - 驱动（极强）
        - 2025–2030
        - TAM 随之按比例放大；每新增一颗 XPU 都需要分配光带宽
        - 确认超大规模云厂商的集群规模路线图和采购时间表
      - - 400G+ 速率下铜缆触及物理极限
        - 驱动（结构性）
        - 当前
        - 技术替代变成硬需求；400G 下铜缆约 1m 之后无法继续扩展
        - 确认超大规模云厂商在新集群设计中写入光互连要求的速度
      - - 能效压力（互连约占集群功耗 30%）
        - 驱动（强）
        - 2024–2027
        - 相较可插拔方案，光互连每 bit 能耗约降至 1/3；加快超大规模云厂商的 ROI 论证
        - 向 Marvell 集成团队获取相对 NVLink 铜缆的实测能效基准
      - - 数据中心资本开支增长（2025 年 Q3 同比 +59%）
        - 驱动（强）
        - 2025–2026
        - 资本开支基数大，即便光互连渗透率低也能形成升级机会
        - 跟踪超大规模云厂商季度财报中的资本开支指引变化
      - - TSMC CoWoS 产能约束
        - 约束（重大）
        - 2025–2027
        - 即便需求落地，先进封装供给也会限制产能爬坡；存在时间表风险
        - 确认 Marvell 与 TSMC 的 CoWoS 配额和产能预留协议
      - - 24–36 个月芯片集成周期
        - 约束（结构性）
        - 持续
        - 当前设计合作最早也要到 2027–2028 年才可能贡献收入
        - 向 Marvell 集成团队确认 design-in 状态和认证时间表
      - - CPO 渗透率约 0.5%（2026）
        - 约束（市场时点）
        - 2026–2028
        - 装机基数很小；早期采用者承担集成风险；主流化要到 2028 年以后
        - 跟踪 LightCounting 关于 CPO 部署量的季度更新
      - - NVIDIA NVLink 生态锁定
        - 约束（竞争）
        - 当前并持续
        - 使用 NVLink 集群的超大规模云厂商切换到开放光互连替代方案，成本很高
        - 评估哪些超大规模云厂商在测试 UALink 或开放互连替代方案
      - - 美国 AI 技术出口管制（内存带宽指标）
        - 约束（监管）
        - 当前并持续
        - Photonic Fabric 带宽提升可能触发针对非美国客户的出口管制审查
        - 审查 USIT 投资条件，以及收购后 Celestial AI IP 是否受 ITAR/EAR 限制
    notes: TSMC CoWoS 产能约束列为重大，因为先进封装过去一直是新型光子 chiplet 设计的卡点。 监管约束强度取决于尚未公开披露的出口许可证要求。
