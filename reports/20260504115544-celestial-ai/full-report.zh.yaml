      - number: '1.2'
        title: 创始团队与领导层
        blocks:
          - type: paragraph
            body: >
              David（Dave）Lazovsky 担任联合创始人兼 CEO。创立 Celestial AI 之前，Lazovsky 于 2004 年创办 Intermolecular, Inc.，并带领公司从起步走到
              2011 年 IPO；他担任总裁、CEO 和董事会成员直至 2014 年 10 月。之后，他出任 POET Technologies 执行董事长，并担任 ESS, Inc.
              董事，在复杂半导体技术规模化商业化上积累很深。


              Preet Virk 是联合创始人兼 COO。Phil Winterbottom 担任 CTO；他的职业生涯始于 Bell Labs 的 Computer Research
              组，之后又联合创办两家创业公司——Entrisphere（被 Ericsson 收购）和 Gainspeed（被 Nokia 收购）。CTO 的架构工作支撑了 Photonic Fabric 的核心设计，包括
              electro-absorption modulator（EAM）路径和纯模拟 SerDes。


              Kelyn Brannon 于 2024 年 6 月被任命为 CFO，为公司进入商业化阶段补上财务领导力。高管团队还包括 Narayan Kaniyur（工程 SVP）、Steven Metz（销售
              VP）、Ankur Aggarwal（先进封装与供应链 VP）、Subal Sahni（光子工程 VP）和 Victoria Sevilla（人力 VP）。


              董事会由 Lip-Bu Tan 担任主席（Walden International 创始 managing partner；前 Cadence Design Systems CEO；2025 年 1
              月加入），他也以个人身份投资了 Series C1。其他董事包括 Diane Bryant（独立董事；2024 年 4 月任命）、Bethany Mayer（网络安全背景）、Peter
              Tague（投资人代表）、Alonso Galvan（IAG Capital Partners 联合创始人）和 Isaac Sigron（Koch Disruptive Technologies managing
              partner）。CEO 也在董事会任职，形成了关键人物集中风险。
