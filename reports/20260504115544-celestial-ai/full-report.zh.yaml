        - FY2028 初始收入可能集中在一两个超大规模云厂商项目；预计要到 FY2029+ 才会广泛多元化
        - 高
        - 主力超大规模云厂商项目延迟或取消，可能推迟 $500M ARR 里程碑
        - Amazon 认股权证提供第二个已承诺需求信号；NVLink Fusion 与 Google 洽谈显示管线在多元化
      - - 超大规模云厂商资本开支周期放缓
        - 超大规模云厂商 AI 基础设施资本开支有周期性，受宏观和 ROI 压力影响；一旦放缓，XPU 出货量和 Photonic Fabric 搭载率都会下降
        - 高
        - Marvell 的 FY2028 收入爬坡取决于超大规模云厂商在 2026–2028 年持续激进投入 AI 资本开支
        - 2025 年超大规模云厂商 AI 资本开支增长 72%；短期放缓风险低，但到 2027–2028 年并非为零
      - - 竞争替代
        - Ayar Labs、Lightmatter、Broadcom CPO 和 Intel OCI 都在做竞争性光学芯粒方案，可能在 Photonic Fabric 尚未卡位的超大规模云厂商处拿下设计导入
        - 中
        - 若第二或第三家超大规模云厂商设计导入被竞争对手拿走，FY2029 爬坡轨迹会下移
        - Celestial AI 已导入未具名超大规模云厂商，加上 Marvell 渠道关系，提供先发优势
      - - Marvell 整合与执行风险
        - 收购后，Celestial AI 技术必须顺利并入 Marvell 的定制硅工作流和批量制造体系
        - 中
        - Marvell 量产爬坡中若整合延迟或良率出问题，收入可能推迟 2–4 个季度
        - TSMC 投资和既有制造协同降低整合风险；Marvell 通过此前收购积累了深厚硅光能力
      - - Amazon XPU 竞争压力
        - 据报道，Alchip 拿下 Amazon 下一代 Trainium 设计工作，可能压低 Marvell 在 Amazon XPU 的出货量，从而限制 AWS 的 Photonic Fabric 搭载机会
        - 中
        - Marvell 在 Amazon 的 XPU 出货量下降，会削弱 AWS 采用 Photonic Fabric 的自然渠道
        - Amazon 认股权证给 AWS 独立财务激励，无论 XPU 芯片设计方是谁，都有动力采用 Photonic Fabric
    notes: 风险等级为定性评估，依据截至 2026 年 5 月报告运行日的分析师评论和已披露交易结构。
