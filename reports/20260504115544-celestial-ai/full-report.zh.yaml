      - number: '3.5'
        title: 竞争护城河、定位与风险评估
        blocks:
          - type: paragraph
            body: >
              Celestial AI/Marvell 的竞争定位建立在五根支柱上：（1）经过 TSMC 5/4nm 资格认证的电光集成电路（EIC）工艺，并已完成多次 tape-out；（2）EAM 调制器技术，相比
              Ayar Labs 等基于 MRM 的竞争对手，在热容忍度和带宽密度上有优势；（3）3D EIC-on-PIC 堆叠架构独特支持分解式内存访问——这是 Ayar Labs TeraPHY 或 Broadcom
              CPO 没有覆盖的用例；（4）通过收购 Rockley Photonics IP 强化的 200+ 专利组合；（5）Marvell 的超大规模云定制芯片分销关系，以及与 NVIDIA 的 NVLink
              Fusion 合作。


              主要竞争风险包括：（A）Ayar Labs 进入 2026 年时融资更多（$870M 对比 Celestial AI 收购前约 $515M），战略投资人基础更广，同时横跨 NVIDIA、AMD 和 Intel
              Capital——这表明它可能更快达到生产规模。（B）NVIDIA 一边直接投资 Ayar Labs，一边与 Marvell 合作 NVLink Fusion，形成双轨策略；NVIDIA 可能在生态内偏向
              Ayar Labs。（C）Broadcom 市值超过 $350B，拥有所有主要超大规模云关系，可能把 CPO 能力转向 scale-up 相邻领域——这是资源最强的潜在进入者。（D）Intel 垂直整合的 OCI
              项目可能为 Intel 平台 AI 部署提供首选内部 chiplet，从而收窄 Celestial AI 在 Intel 装机基础上的可服务市场。


              UALink 联盟 2025 年 4 月发布规范，指向未来的开放标准 scale-up fabric，可能削弱 NVIDIA 的 NVLink 锁定效应，并创造更公平的竞争场。UALink 硬件要到 2026
              年底才会出货，短期设计导入仍集中在 NVLink 生态；Celestial AI/Marvell 的 NVLink Fusion 合作因此构成战术优势。若能在规模化客户验证中跑通，内存分解架构差异仍是
              Celestial AI/Marvell 最可防守的长期利基。
