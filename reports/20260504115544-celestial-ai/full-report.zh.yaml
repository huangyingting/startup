      - number: '8.4'
        title: 贴现现金流与收入爬坡分析
        blocks:
          - type: paragraph
            body: >
              Celestial AI 没有披露任何收入、毛利率、运营成本结构或客户合同条款，因此无法对其作为独立实体做完整贴现现金流分析。但以 Marvell 公开里程碑为锚的简化远期收入折现方法，可以支持情景化估值分析。


              基准情景：Marvell 预计 Q4 FY2028（H2 calendar 2027，收购交割后约 18 个月）达到 $500 million ARR，并在 Q4 FY2029 扩大到 $1 billion
              ARR。假设毛利率为 50–60%，与面向超大规模云厂商供应链销售的定制硅片授权和光子模块相符——这对一家无晶圆厂设计公司是合理假设——扣除分摊后的 R&D 和 SG&A，$1 billion ARR 规模下的
              EBITDA 贡献约为每年 $100–200 million。按 15–20% 折现率折现该现金流，以反映执行风险、技术采用不确定性和半导体周期暴露，可得到约 $2.5–4.0 billion 的现值区间，与
              $3.25 billion 前置价格大体一致。


              乐观情景：Celestial AI 到 FY2029 实现 $2 billion 累计收入，解锁全部 $2.25 billion 或有对价。这要求 FY2028 和 FY2029 每年约 $300–400
              million 收入，意味着多个超大规模云厂商的共封装光学部署并行成功。在该情景下，$5.5 billion 有效收购价格对应预计 $1.5–2.0 billion 运行率收入，EV / 远期收入倍数约
              2.8–3.7×——按任何 AI 硅片基准看都极具吸引力。


              悲观情景：因超大规模云厂商认证受阻或竞争性光学方案，收入爬坡延后 12 个月或更久。FY2029 累计收入仅 $100–200 million；没有任何或有对价档归属。交易最终以 $3.25 billion
              买下一项近期收入极低的资产。在该情景下，相对于 Marvell 对所收购无形资产的账面价值，有效价格代表显著减记风险。


              相比直接支付 $5.5 billion 前置对价，或有对价结构明显改善了 Marvell 的风险调整后期望价值。Marvell 董事会将总潜在对价的 41%
              递延为基于绩效的或有股权，既保留了资本，也把管理层激励与商业执行对齐。对这些情景加权——例如乐观情景 30%、基准 45%、悲观 25%——可得交易期望价值约 $3.8–4.2
              billion，高于前置对价、低于全额或有对价。该概率加权是分析师估计，应以低置信度看待。
            claimRefs:
              - CV034
              - CV035
              - CV025
              - CV036
              - CV037
              - CV038
