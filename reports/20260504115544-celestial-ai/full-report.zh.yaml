          - type: callout
            title: 收入预测只是 Marvell 管理层指引
            body: >
              $500M ARR（Q4 FY2028）和 $1B ARR（Q4 FY2029）预测来自 Marvell 管理层估计，不是合同收入、分析师共识或独立验证的需求信号。截至报告日，没有第三方验证这些数字。若无法取得
              design-win 合同、采购量承诺和超大规模云厂商 capex 分配数据，尽调无法判断或有对价兑现概率。
            calloutType: assumption
