      - number: '1.3'
        title: 融资历史与股权结构
        blocks:
          - type: paragraph
            body: >
              被 Marvell 收购前，Celestial AI 通过五轮已披露融资累计获得约 $515M 风险投资。最早可查的一轮是 2021 年 1 月约 $2.87M 种子轮。2022 年 2 月，公司完成 $56M
              Series A，由 imec.xpand 领投，Koch Disruptive Technologies、M Ventures、The Engine、Tyche Partners 和 Xora
              Innovation（Temasek 子公司）参投。


              2023 年 6 月，公司完成 $100M Series B，由 IAG Capital Partners、Koch Disruptive Technologies 和 Xora Innovation
              领投，Samsung Catalyst Fund、Smart Global Holdings、Porsche Automobil Holding SE、The Engine、imec.xpand、M
              Ventures 和 Tyche Partners 也参与。Series B 对公司的估值约为 $500M。


              2024 年 3 月，公司完成 $175M Series C，由 U.S. Innovative Technology Fund（USIT）领投，估值约 $1.22B。AMD Ventures
              作为新的战略投资人加入，并与既有投资方共同参与。2024 年 10 月，Celestial AI 收购 Rockley Photonics 专利组合，以加强 Photonic Fabric IP。


              Series C1——$250M（部分报道称 $255M）——于 2025 年 3 月完成，由 Fidelity Management & Research 领投，并引入 BlackRock、Maverick
              Capital（Maverick Silicon）、Tiger Global Management 和 Lip-Bu Tan 等新投资人。TSMC 的 VentureTech Alliance 和 Samsung
              Catalyst Fund 也参与。本轮将 Celestial AI 估值推至 $2.5B，是 Series C 估值的两倍多。


              2025 年 12 月 2 日，Marvell Technology 宣布签署最终协议，以 $3.25B 首付款收购 Celestial AI（$1B 现金加约 27.2M 股 Marvell 股票）；若
              Celestial AI 达成累计收入里程碑，还可获得最高约 $2.25B 的额外股票 earn-out。收购于 2026 年 2 月 2 日完成。
