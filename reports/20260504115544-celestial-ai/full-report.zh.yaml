      - CR004
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: |
      有向无环图展示主要风险因素如何沿运营和财务路径传导，最终影响 Marvell 收购 Celestial AI 的投资逻辑。
      每个节点代表一个风险因素或结果；有向边表示因果传导路径。
      多条路径同时汇向收入延迟和商誉减值，说明这两类结果最需要优先监控。
    data:
      nodes:
        - id: tsmc-capacity
          label: TSMC CoWoS 产能吃紧
          category: risk
        - id: tech-delay
          label: Photonic Fabric 量产爬坡延迟
          category: risk
        - id: cpo-adoption-slow
          label: CPO 采用慢于预期
          category: risk
        - id: ayar-displacement
          label: Ayar Labs 竞争替代
          category: risk
        - id: key-person-loss
          label: 联合创始人 / 关键工程师离职
          category: risk
        - id: export-violation
          label: 违反 BIS 出口管制
          category: risk
        - id: taiwan-contingency
          label: 台湾地缘政治扰动
          category: risk
        - id: revenue-delay
          label: Celestial AI 收入爬坡延迟
          category: intermediate
        - id: hyperscaler-loss
          label: 超大规模云厂商客户流失
          category: intermediate
        - id: earnout-miss
          label: 或有对价里程碑未达成
          category: outcome
        - id: goodwill-impairment
          label: Marvell 商誉减值（$3.25B）
          category: outcome
        - id: regulatory-penalty
          label: 监管处罚 / 出口禁令
          category: outcome
      edges:
        - from: tsmc-capacity
          to: tech-delay
        - from: taiwan-contingency
          to: tech-delay
        - from: key-person-loss
          to: tech-delay
        - from: tech-delay
          to: revenue-delay
        - from: cpo-adoption-slow
          to: revenue-delay
        - from: ayar-displacement
          to: hyperscaler-loss
        - from: hyperscaler-loss
          to: revenue-delay
        - from: revenue-delay
          to: earnout-miss
        - from: revenue-delay
          to: goodwill-impairment
        - from: export-violation
          to: regulatory-penalty
    approximationNotes: 边权重为定性判断。所有因果路径都来自对已发布证据的逻辑推断；该 DAG 结构不隐含任何定量概率。
    claimRefs:
      - CR022
      - CR005
      - CR011
      - CR019
      - CR012
      - CR013
      - CR014
      - CR004
      - CR012
      - CR004
  - id: FR003
    title: 分类别风险严重度分布
    type: bar
    layout: standard
    summary: |
      第 7 章七类风险的综合严重度得分（0–10 有序量表）。
      得分综合公开证据下的发生可能性、影响程度和缓释成熟度。
      人员 / 组织、财务 / 投资风险得分最高，因为关键人物集中，且 $3.25B 前期承诺与尚无收入基线不对称。
      技术落地和竞争风险也偏高，主要来自 TSMC 产能约束和 Ayar Labs 的势头。
    data:
      items:
        - label: 技术落地
          value: 7
        - label: 市场 / 采用节奏
          value: 6
        - label: 竞争 / 战略
          value: 7
        - label: 收购后整合
          value: 6
        - label: 财务 / 投资
          value: 8
        - label: 监管 / 法律
          value: 6
        - label: 人员 / 组织
          value: 8
    approximationNotes: 得分是基于公开证据综合得出的定性有序估计（0–10）。这些数值背后没有精算模型或定量风险权重。
    claimRefs:
      - CR022
      - CR005
      - CR011
      - CR009
      - CR013
      - CR004
      - CR004
  - id: FV001
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: |
      Marvell 收购 Celestial AI 在三种或有对价情景下的低位、中位和高位有效收购价值。
      仅含前期对价的悲观情景固定为 $3.25B。
      基准情景包含一档或有对价。
      乐观情景假设或有对价全额达成，总额为 $5.5B。
      所有数值按公告日价格计算，单位为百万美元。
    data:
      items:
        - label: 悲观情景（无或有对价，仅前期对价）
          low: 3250
          mid: 3250
          high: 3250
          unit: USD M
        - label: 基准情景（部分或有对价，一档）
          low: 3250
          mid: 3850
          high: 4250
          unit: USD M
        - label: 乐观情景（或有对价全额达成）
          low: 4500
          mid: 5000
          high: 5500
          unit: USD M
    approximationNotes: |
      悲观情景固定为 $3.25B（合同约定的前期价格）。
      基准情景低位 = 仅前期对价；中位 = 前期对价 + 按公告日价格计算的第一档或有对价；高位 =
      前期对价 + 第一档或有对价 + 部分第二档或有对价。乐观情景低位 = 前期对价 +
      第一档或有对价；中位 / 高位 = 前期对价 + 按公告日 / 当前价格计算的全额或有对价。
      所有或有对价估值都会随 MRVL 股价波动。
    claimRefs:
      - CV013
      - CV015
      - CV034
      - CV025
      - CV036
      - CV038
      - CV001
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: |
      半导体 M&A 可比交易的 EV / 收入倍数与 Celestial AI 隐含倍数对比。
      已有收入的可比公司使用公告时过去十二个月（TTM）收入。
      Celestial AI 倍数使用 Marvell 管理层的前瞻 ARR 指引，因此属于前瞻倍数（已标注）。
      所有数值均为近似值。
    data:
      items:
        - label: Marvell / Inphi 2021（14.6x TTM，交易）
          value: 14.6
        - label: Cisco / Acacia 2021（~12x TTM，交易）
          value: 12
        - label: Celestial AI 全额或有对价 / FY2029 ARR（5.5x 前瞻）
          value: 5.5
        - label: NVIDIA / Mellanox 2020（~5.3x TTM，交易）
          value: 5.3
        - label: Marvell / Innovium 2021（~5x TTM，交易）
          value: 5
        - label: Celestial AI 前期对价 / 2 年前瞻 ARR（6.5x 前瞻）
          value: 6.5
    approximationNotes: |
      Inphi 和 Acacia 倍数用公告日披露的 TTM 收入除以交易价值。
      Mellanox 和 Innovium 为近似值，依据公告前后披露的年收入估算。
      Celestial AI 倍数使用 Marvell 自身前瞻指引目标估算。
      AMD / Pensando 被排除，因为尚无收入资产不适用收入倍数。
    claimRefs:
      - CV020
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
  - id: FV003
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      截至 2026 年 5 月尽调日，Celestial AI 收购案关键估值和市场指标的简版记分卡。
      数值来自 SEC 文件、Marvell 管理层指引和市场数据报告。
    data:
      items:
        - label: 前期收购价
          value: $3.25B
          unit: null
          note: $1B 现金 + 约 $2.25B MRVL 股票（27.2M 股）
        - label: 最高总对价
          value: $5.5B
          unit: null
          note: 前期对价全额支付；若 FY2029 年底累计收入达 $2.0B，则另加或有对价
        - label: 相对 Series C1 的收购溢价
          value: 30
          unit: '%'
          note: ($3.25B - $2.5B) / $2.5B
        - label: 隐含 EV / 2 年前瞻 ARR（前期对价）
          value: 6.5
          unit: x
          note: $3.25B / $500M FY2028 Q4 ARR 目标
        - label: FY2028 Q4 ARR 目标
          value: 500
          unit: USD M annualized
          note: Marvell 管理层指引；公司自称
        - label: FY2029 Q4 ARR 目标
          value: 1000
          unit: USD M annualized
          note: Marvell 管理层指引；公司自称
        - label: 硅光子市场 CAGR，2025–2030
          value: 28
          unit: '% CAGR'
          note: MarketsAndMarkets / ResearchAndMarkets 一致预期中点
        - label: 前期对价 / VC 累计融资比率
          value: 6.3
          unit: x
          note: $3.25B 前期对价 / 五轮累计融资 $515M
    approximationNotes: |
      市场 CAGR 使用 MarketsAndMarkets 和 ResearchAndMarkets 报告中 27–30% 区间的中点。
      或有对价价值按公告日 MRVL 股价计算。
      前期对价 / 融资比率使用五轮（Seed 至 Series C1）累计融资 $515M。
    claimRefs:
      - CV013
      - CV015
      - CV016
      - CV017
      - CV026
      - CV030
      - CV031
      - CV037
  - id: FV004
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: |
      从关键证据输入，经估值框架，推导到最终建议和尽调立场的逻辑链。
      优势信号（NVIDIA 合作、或有对价结构、前瞻 ARR 倍数）与风险信号（尚无收入、竞争威胁、客户集中）相互权衡，
      得出估值合理 / 继续研究的结论。
    data:
      nodes:
        - id: deal-terms
          label: 交易条款
          detail: $3.25B 前期对价；最高 $5.5B；41% 为或有对价
        - id: ma-comps
          label: M&A 可比交易
          detail: 6.5x 前瞻 ARR，对比光子 M&A 5–15x TTM 区间
        - id: strength-signals
          label: 优势信号
          detail: NVIDIA $2B NVLink Fusion；Amazon 认股权证；Marvell 自身估值纪律
        - id: risk-signals
          label: 风险信号
          detail: 尚无收入；竞争性光子项目；客户集中
        - id: earnout-design
          label: 或有对价设计
          detail: 下行限制在 $3.25B；用里程碑绑定创始人
        - id: market-sizing
          label: 市场背景
          detail: 硅光子 CAGR 27–30%；$500M ARR = 约 15–24% 市占率
        - id: valuation-verdict
          label: 估值结论
          detail: 合理（前期对价）；有吸引力（若或有对价全额达成）
        - id: diligence-stance
          label: 尽调立场
          detail: 继续研究：等待 FY2028 首次收入证据
    approximationNotes: null
    claimRefs:
      - CV026
      - CV027
      - CV030
      - CV033
      - CV007
      - CV008
      - CV022
      - CV012
