      - number: '6.4'
        title: 客户认证与采购流程
        blocks:
          - type: paragraph
            body: >
              超大规模云 AI 系统中的新互连 chiplet 硬件认证，是一个多阶段、跨多年的流程。Celestial AI 在收购前已经走过其中几个阶段，至少与一家确认的超大规模云伙伴进入 design-in
              和早期认证阶段。


              流程从 NDA 技术评估阶段开始，超大规模云厂商审查技术规格，并接收首批硅片样品做内部实验室评估。CEO Dave Lazovsky 确认，在 2025 年 3 月 Series C1
              完成前，多家超大规模云厂商正在 NDA 下进行技术评估。2024 年 3 月公告确认，至少一家超大规模云厂商已正式通过 Design-In Commitment 阶段，把 Photonic Fabric
              纳入某个具体的下一代 AI 处理器架构。


              design-in 之后是硅片采样与表征阶段，超大规模云厂商接收预生产硅片，进行电学、光学和热学表征，通常需要 6 to 12 个月。随后进入认证测试与系统集成阶段，这是最长阶段，需要 12 to 24
              个月，要在多机架 AI 集群环境中做完整集成测试，并验证共封装良率。只有到了生产爬坡阶段，也就是 chiplet 量产开始、采购订单转化为已确认收入时，收入确认才开始。


              超大规模云硬件从 design-in 到生产通常需要 24 to 36 个月，因此即便已有 2024 年 3 月 design-win 公告，Marvell 仍预计 Celestial AI 收入要到 H2
              FY2028 才开始。认证流程由超大规模云厂商内部项目把关，并受双向 NDA 约束，意味着收购时没有可公开确认的生产承诺。Marvell 收购中的或有对价结构——取决于 FY2029 前累计收入里程碑——意味着
              Marvell 尽调已确认足够可信的客户管线，可支撑到 2028 年底实现 $500M ARR。
