      - number: '5.2'
        title: 核心技术架构
        blocks:
          - type: paragraph
            body: >
              Photonic Fabric 的技术基础落在三项彼此关联的创新上：以电吸收调制器（EAM）作为主要光调制元件；把光 I/O 放在 die 内任意位置，而不是只放在芯片边缘；以及通过 Optical
              Multi-Chip Interconnect Bridge（OMIB）把光子能力集成进封装桥，实现多 chiplet 连接。


              电吸收调制器通过改变半导体材料的吸收边来工作——通常是在 TSMC 硅光工艺上的 Ge/Si 量子阱——并响应外加电压调制光强，不需要谐振腔。因此，EAM 对超过 85°C 的温度变化和 200°C per
              second 的瞬态热爬升天然更耐受；这些条件会击穿微环谐振器，因为后者需要主动热调谐加热器，每个 ring 都会增加功耗开销。纯模拟 SerDes 设计中，电子部分约消耗 2.4 pJ/bit，激光约消耗
              0.7 pJ/bit，总计约 3.1 pJ/bit；包括可插拔光模块在内的竞争性数字信号处理器（DSP）方案为 5–15 pJ/bit。


              die 内光 I/O 架构通过在 TSMC 5nm CoWoS 封装中嵌入硅光中介层，消除了传统边缘 I/O 约束。光收发器可以放在 die 表面的任意位置，把 die 边缘留给 HBM 和 DDR
              I/O，提高总光带宽密度，并让光引擎可以放在 500W–900W GPU die 下方，而不会在相邻电路中造成热热点。


              OMIB（Optical Multi-Chip Interconnect Bridge）把光连接扩展到封装内多个 chiplet 之间，以及多芯片模块中多个封装之间。启用 OMIB 的链路实现低于 200 ns
              的端到端芯片到内存延迟，对延迟容忍型操作来说可比本地 HBM 访问。波分复用（WDM）用于最大化每根光纤的带宽密度，在 -10 dBm OMA 输入下 pre-FEC BER 低于 1e-8。


              截至 OFC 2025 和 Hot Chips 2025 演示，Celestial AI 已完成四次 TSMC 5nm/4nm tapeout，验证了 TSMC 硅光工艺集成。制造依赖 TSMC SiPh 工艺与
              CoWoS 2.5D 中介层封装组合；TSMC 当时正把该能力向 CPO 生产成熟化推进，目标是在 H2 2025 面向前沿 AI 客户量产 1.6 Tbps 光模块。
