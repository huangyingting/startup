      - Celestial AI Photonic Fabric
      - Ayar Labs TeraPHY
      - 可插拔光模块（QSFP-DD800）
    rows:
      - - 每个 chiplet / 模块带宽
        - '>10 Tbps/模块；16 Tbps/chiplet（声称）'
        - 每个 chiplet 4.096 Tbps 双向
        - 每个收发器 ~800 Gbps
      - - 能效
        - ~3.1 pJ/bit 端到端（2.4 电子 + 0.7 激光器）
        - 全链路 <5 pJ/bit
        - ~15–20 pJ/bit
      - - 调制器技术
        - TSMC SiPh 上的 EAM（Electro-Absorption Modulator）
        - MRM（Microring Resonator）
        - EML 或硅光 MZM
      - - 是否需要热调谐
        - 否 — EAM 无需加热器即可承受 >85°C 波动
        - 是 — MRM 需要集成热加热器
        - N/A（可插拔模块自成一体）
      - - 集成模式
        - 裸片内共封装（2.5D SiP CoWoS，置于裸片下方）
        - 共封装 chiplet（AIB 接口；UCIe 路线图）
        - PCB 边缘的可插拔笼位
      - - 激光源
        - 模块内集成外置 CW 激光器
        - 外置 SuperNova 多波长远端激光器
        - 收发器内集成 DFB 激光器
      - - 光传输距离
        - 芯片到芯片；机架级解耦
        - 按规格为 mm 至 2 km
        - 视型号为 100 m 至 10 km
      - - 制造工艺
        - TSMC SiPh + CoWoS 5nm 定制 ASIC
        - GlobalFoundries / TSMC 硅光工艺
        - 标准模块组装供应链
      - - 标准符合性
        - OIF CPO（演进中）；NVLink Fusion 生态
        - CW-WDM MSA；UCIe（路线图）
        - 标准：IEEE 400G/800G；OIF CMIS 5.0
      - - 生产状态（截至 2026 年 5 月）
        - 已完成 4 次 TSMC 流片；量产认证推进中
        - 客户演示；有限量产
        - 多家供应商已大批量生产
    notes: |
      Celestial AI 带宽数据来自公司在 OFC 2025（W3D.1）和 Hot Chips 2025 的披露。
      Ayar Labs TeraPHY 数据来自 BusinessWire 2023 年 3 月演示公告和 OCP 列表。
      可插拔光模块能耗数据来自 OIF 和 EDN 的行业估计。截至报告日，尚无独立硅片表征
      在同一条件下横向比较这三种路线。
    enumerationScope:
      coverage: partial
      basis: |
        Coverage includes the two most prominent in-package optical chiplet solutions (Celestial AI
        and Ayar Labs) plus pluggable optics as the incumbent baseline. Intel Silicon Photonics,
        Broadcom integrated optics, and Poet Technologies are excluded due to insufficient public
        comparable specifications. This partial enumeration covers the best-documented segment of
        the CPO competitive landscape as of May 2026.
