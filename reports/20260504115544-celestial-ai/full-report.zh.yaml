  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品概览与定位
        blocks:
          - type: paragraph
            body: >
              Celestial AI 的 Photonic Fabric 是一套硅光光互连平台，目标是在 AI 数据中心基础设施中替代基于铜线的 scale-up 互连结构。客户工作流里，部署 XPU 集群的 AI
              系统运营方——GPU、TPU 或定制 AI 加速器——会碰到一个基础带宽和延迟约束：NVLink、UALink 等铜互连限制总带宽、每比特功耗，以及单个 scale-up 域内可紧密耦合的 XPU
              数量。Photonic Fabric 通过把光学 chiplet 直接与 XPU 共封装来解决这个问题，支持芯片到芯片光链路，单模块带宽超过 10 Tbps，端到端功耗约 3.1 pJ per
              bit；相比之下，可插拔光模块为 15 pJ/bit 或更高，同等规模下铜互连功耗还要显著更高。


              主要用例是 scale-up（在服务器内或跨机架连接 XPU-to-XPU）和内存解耦（通过 Photonic Fabric Appliance 将 XPU 连接到远端内存池；该设备最高支持 32 TB 统一、由
              HBM3e 支撑的 DDR5 内存，访问延迟低于 200 ns）。这些用例直接对应超大规模云厂商的需求：把 LLM 推理和训练工作负载扩展到单台服务器节点的物理约束之外，让批大小和序列长度突破传统内存架构的上限。


              Photonic Fabric Module 以 chiplet 形式交付，直接与 XPU 共封装。它在 2.5D 系统级封装中集成 TSMC 5nm 定制控制 ASIC、HBM3e 与 DDR5
              内存控制器、硅光中介层和多光纤阵列。Photonic Fabric Appliance 是机架形态产品（2U），面向内存解耦场景提供最高 115 Tbps 总光带宽，使用同一底层 chiplet 技术，并配备
              16 端口交换结构。这两种形态分别覆盖 scale-up（chiplet、共封装）和 scale-out（设备、机架连接）连接需求。


              Marvell 于 2026 年 2 月收购后，Photonic Fabric 让 Marvell 成为唯一一家把全光 scale-up 连接作为共封装组件提供的定制 XPU 供应商。与 NVIDIA 的
              NVLink Fusion 合作，以及 NVIDIA 于 2026 年 3 月对 Marvell 投资 $2 billion，把总可用市场扩展到 NVIDIA 生态 AI 集群，而不只限于基于 UALink
              的架构。
