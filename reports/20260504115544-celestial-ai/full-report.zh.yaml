    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与阶段
        blocks:
          - type: paragraph
            body: >
              Celestial AI, Inc. 注册为 Delaware 公司，总部位于 2962 Bunker Hill Lane, Suite 200, Santa Clara, CA 95054。公司还在
              Irvine, CA、Toronto, Ontario 和 Hyderabad, India 设有办公室。截至报告日期，Marvell 于 2026 年 2 月 2 日完成收购后，公司已成为 Marvell
              Technology, Inc. 的全资子公司。


              公司由 David（Dave）Lazovsky 和 Preet Virk 于 2020 年创立，两人都有半导体和光子学背景。融资披露还提到第三位联合创始人 Michelle Tomasko。公司把自己定位为
              Photonic Fabric 的创造者；该平台被描述为一种光学 scale-up 互连平台，可替代 AI 加速器系统和数据中心内部基于铜的电互连。Celestial AI 唯一产品线就是 Photonic
              Fabric 平台，面向超大规模云厂商、AI 芯片公司和数据中心运营商。


              最后一轮独立融资时（2025 年 3 月），Celestial AI 约有 141–152 名员工，并完成四次 TSMC 5/4 nm
              电光集成电路（EIC）tape-out。商业模式结合芯片授权和定制芯片合作，合作对象包括 Tier-1 超大规模云厂商和半导体公司。
