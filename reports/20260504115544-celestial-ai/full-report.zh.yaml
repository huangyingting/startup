      - number: '7.4'
        title: 收购后整合风险
        blocks:
          - type: paragraph
            body: >
              Marvell 在获得 FTC 提前终止审查后，于 2026 年 2 月 2 日完成 Celestial AI 收购。整合引入四类不同风险向量。


              或有对价里程碑模糊。收购包含最高 $2.25B 或有对价，但具体里程碑结构未公开披露：$500M ARR 是否单独触发全部支付、部分 ARR 是否触发按比例支付、哪些收入算合格收入，都不清楚。这种模糊性在
              Marvell 与持有或有对价权益的前 Celestial AI
              股东和员工之间制造信息不对称。按加州劳动法，或有对价和归属条款必须明确定义，修订需要员工同意。围绕里程碑计量方法或收入分类的争议，可能引发诉讼，增加整合成本并分散管理层注意力。


              人才留存。Celestial AI 由 141–152 名硅光专家组成，这支团队用了数年搭建；全球具备深厚 EAM 硅光经验的研究人员少于 3,000
              人。收购后股权转换通常会加速归属，削弱关键工程师的前瞻留任激励。Marvell 的薪酬结构、工程文化和产品优先级，可能与吸引 Celestial AI 创始人和高级技术人员的初创环境存在实质差异。


              研发节奏和组织复杂度。把 141 人团队整合进 Marvell Data Center Group，意味着 Celestial AI 路线图必须在更大组织内部争夺工程资源、预算周期和高管注意力。Marvell
              此前的收购——Inphi（2021）、Innovium（2021）、Avera（2019）——都消耗了大量整合精力。Inphi 整合被广泛视为成功，但光学 chiplet 的创新节奏快于 Inphi 时代的
              DSP 业务；Photonic Fabric 路线图任何放缓，都可能把阵地让给 Ayar Labs。


              优先级竞争。Marvell 产品组合横跨定制 XPU 项目（面向 Amazon、Microsoft、Google）、AsteraLabs 式互连产品、存储控制器、运营商级 Ethernet，如今又加入
              Photonic Fabric。若其他业务的近期收入机会看起来更确定，资源分配决策可能降低 Celestial AI 项目的优先级。
            claimRefs:
              - CR009
              - CR010
              - CR021
              - CR004
              - CR011
              - CR012
      - number: '7.5'
        title: 财务与投资风险
        blocks:
          - type: paragraph
            body: >
              Marvell 为一家交割时尚未产生收入、没有量产客户的公司支付了 $3.25 billion 前置对价——$1B 现金加 27.2 million 股、价值 $2.25B 的股票。收购价格约为
              Celestial AI 上一轮投后估值的 6.5x–10x，反映出相当高的控制权溢价。财务风险集中在三个主题上。


              回报门槛。要收回 $3.25B 前置投资，Photonic Fabric 很可能需要在 3–5 年周期内贡献持续高于 $500M、且毛利率较强的 ARR。此前没有任何尚未产生收入的光学 chiplet
              公司能在隐含时间窗口内做到这种 ARR 水平，因此投资结果依赖于没有直接可比先例的情景。如果技术采用时间线哪怕延后 12–18 个月，Marvell 也必须在一段收入极低的拉长期内继续把商誉留在资产负债表上。


              或有对价不透明。或有对价里程碑条款没有公开披露。目前不清楚 $500M 累计 ARR 门槛会触发全部 $2.25B 或有对价，还是只触发按比例的一档，也不清楚计量期如何界定。这种不透明让 Marvell
              股东——以及前 Celestial AI 利益相关方——难以建模预期总收购成本。如果 Amazon 成为主要客户，AWS 认股权证（1,045,171 股 MRVL，按截至 December 2030 的
              Photonic Fabric 累计采购额归属）还会增加一项可变成本。


              商誉减值风险。如果 AI 资本开支整体收缩——无论来自宏观压力、超大规模云厂商资本开支纪律周期，还是前沿模型训练需求放缓——Marvell 可能需要对 $3.25B 收购价确认重大商誉减值。Celestial
              AI 在收购时尚未产生收入，即使 CPO 市场前景出现温和不利变化，也可能在 ASC 350 下触发减值审查。Marvell 自己的 10-K 风险因素也明确列出收购相关的整合、预期收益实现和市场时点风险。
            claimRefs:
              - CR013
              - CR013
              - CR014
              - CR005
              - CR019
              - CR015
      - number: '7.6'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Marvell / Celestial AI 的监管与法律风险横跨四个领域：美国出口管制、外国投资审查、知识产权权属，以及台湾地缘政治集中度。


              美国出口管制（EAR）。美国工业与安全局依据 Export Administration Regulations（EAR）监管先进计算集成电路，相关 ECCN 包括 3A090.a 和 4A090.a。Biden
              政府在 January 2025 发布的 AI Diffusion Rule 原本会对先进计算 IC 的全球出口设置许可要求，但 Trump 政府在 May 2025、规则生效前撤销了该规则；BIS
              同时表示将强化有针对性的芯片管制。截至 May 2026，既有 EAR 管制仍适用于对中国和澳门的出口，监管框架还在演进。Marvell 作为 Celestial AI 的收购方，必须维持稳健的出口合规体系，确保
              Photonic Fabric chiplet 及相关技术不会在没有适当许可的情况下转移给受限终端用户或国家。Blank Rome LLP 在 January 2026 的法律分析记录了四项适用于该技术领域的
              BIS 先进计算和 AI 出口管制更新。违规可能带来罚款、出口权限丧失或声誉损害。


              CFIUS。美国外国投资委员会会审查可能导致外国控制 TID 美国企业，或对其作出某些非控制性投资的交易（Technology、Infrastructure、Data）。Celestial AI 的硅光子 IP
              属于关键技术。未来任何涉及 Celestial AI IP 组合的二次交易——如部分资产出售、与外国实体的许可安排，或 Marvell 自身控制权变更——都很可能需要向 CFIUS 申报或通知。美国财政部
              CFIUS FAQ 确认，当外国政府在收购方中持有重大权益、且目标为关键技术企业时，强制申报适用。January 2, 2025 生效的对外投资规则又增加了一层限制：美国人投资从事半导体或 AI
              的中国实体时，须遵守通知或禁止要求。


              IP 权属风险（Rockley Photonics）。October 2024，Celestial AI 从 Rockley Chapter 11 重整后的困境出售中，以 $20 million 收购
              Rockley Photonics 的硅光子专利组合——约 200 项全球专利，覆盖 EAM 技术、光电子系统级封装和光开关。破产困境下的 IP
              收购存在一种风险：债务人此前授予第三方的既有许可可能在破产出售后仍然存续，并对所收购专利形成负担。此外，其他硅光子玩家（Intel、Broadcom、II-VI /
              Coherent、Lumentum）的竞争性专利主张，可能引发抵触或无效程序。


              台湾地缘政治集中度。TSMC 既制造 Photonic Fabric 硅光子裸片，也负责 CoWoS 先进封装。全球超过 90% 的最先进半导体产能位于台湾；任何军事、政治或自然灾害情景若打断 TSMC
              运营，Photonic Fabric 生产都会立即停摆，短期内没有替代方案。TSMC 的 Arizona fab 预计在 2028
              前不会具备有意义规模的先进封装产能。美中紧张关系已经升级；出口管制反制（中国对镓和锗的限制）、军事言辞，以及 Celestial AI 的 EAM
              硅光子工艺节点缺乏可行替代晶圆厂，这三者叠加，使该风险在近期具有系统性且难以缓释。
            claimRefs:
              - CR004
              - CR021
              - CR016
              - CR012
              - CR017
