      - number: '5.5'
        title: 技术风险与缓释缺口
        blocks:
          - type: paragraph
            body: >
              Marvell 收购后，有五类技术风险对 Photonic Fabric 投资逻辑构成实质影响。


              EAM 插入损耗：EAM 在热稳定性和带宽线性上优于 MRM，但在特定波导几何和偏置配置下，EAM
              可能出现更高光学插入损耗。插入损耗越高，就需要更强激光源，系统功耗和成本随之上升，规模化时链路预算余量也会下降。尚无独立实验室在相同、等同生产条件下发布 EAM 与 MRM 插入损耗的正面对比硅片数据。


              TSMC CoWoS 产能集中：Photonic Fabric 完全依赖 TSMC SiPh 与 CoWoS 工艺。TSMC CoWoS 产能已大量分配给 NVIDIA 的 HBM 堆叠和 Broadcom
              的定制 ASIC。加入 Celestial AI 的光子中介层会增加排产复杂度。任何 TSMC 产能约束或良率短缺，都可能把量产推迟到 FY2028 收入目标之后，直接威胁 Marvell 或有对价结构。


              共封装 XPU 规模下的热管理：与 500W–900W XPU 共封装的光引擎会产生热量，必须在不把热耦合进相邻光子结构的情况下散出。EAM 能承受 85°C
              波动，但持续高功率运行会在封装层带来热通量管理挑战；这个问题在生产规模上尚未解决。


              CPO 标准化风险：OIF CPO Implementation Agreement（3.2 Tbps 模块）和 IEEE 802.3 Ethernet
              工作组面向嵌入式光学的标准仍在演进。缺乏互操作标准意味着每一家超大规模云厂商都必须单独认证 Photonic Fabric，拉长认证周期，并提高单客户集成成本。


              技术就绪度不确定：尽管已完成四次 TSMC tapeout，但外部生产认证或独立第三方硅片表征都未公开披露。所有性能主张都来自公司演示和一篇 arXiv
              预印本，而不是带独立硅片测量的同行评审论文。该缺口会提高客户在承诺生产部署前的犹豫程度。
