      - number: '5.6'
        title: 图表
        blocks:
          - type: callout
            title: 相比 MRM 竞争方案，EAM 热韧性是持久结构性优势
            body: >
              Celestial AI 基于 EAM 的设计可承受超过 85°C 温度波动和 200°C/sec 瞬态爬升，无需主动热调谐。在共封装 XPU 环境中，GPU die 温度会随 AI 工作负载动态变化，这相对主流
              MRM 方案（Ayar Labs TeraPHY）构成结构性优势。去掉每个调制器的加热器电路，也降低了高功率 XPU 封装中的功耗开销和设计复杂度。
            calloutType: strength
            claimRefs:
              - CE005
          - type: callout
            title: 200+ 专利组合，含 Rockley 收购带来的 2014 年 EAM 覆盖
            body: >
              2024 年 10 月以 $20 million 收购 Rockley Photonics IP，为 Celestial AI 增加了超过 200 项专利，覆盖 EAM 和光电子 SiP，时间可追溯至 2014
              年——早于大多数硅光初创公司和 Celestial AI 的直接竞争对手。叠加 2020 年以来的自研专利，分层 IP 组合形成护城河；面向基于 EAM 的 die 内光 I/O
              的新进入者，要绕开该组合成本很高。
            calloutType: strength
            claimRefs:
              - CE008
              - CE009
              - CE010
          - type: callout
            title: 单一 TSMC 代工依赖带来生产与收入时间线集中风险
            body: >
              所有 Photonic Fabric 生产都依赖 TSMC SiPh 工艺和 CoWoS 先进封装。TSMC CoWoS 产能已通过多年预留协议大量分配给 NVIDIA 和 Broadcom，这些协议早于
              Celestial AI 的生产需求。任何产能约束、良率短缺或 TSMC 优先级调整，都可能把 Photonic Fabric 生产认证推迟到 H2 FY2028 收入里程碑之后。
            calloutType: risk
            claimRefs:
              - CE013
              - CE022
          - type: callout
            title: NVLink Fusion 合作让总可用市场（TAM）翻倍，并加速 Photonic Fabric 客户管线
            body: >
              Marvell 2026 年 3 月与 NVIDIA 的 NVLink Fusion 合作，以及 NVIDIA 对 Marvell 的 $2 billion 战略投资，让 Photonic Fabric 除了基于
              UALink 的定制 XPU 部署外，还能进入 NVIDIA 生态 AI 集群。这实质上扩大了近期可服务市场，也给出强需求信号，应会加速超大规模云厂商对与 Marvell XPU 共封装的 Photonic
              Fabric 的认证时间线。
            calloutType: insight
            claimRefs:
              - CE018
              - CE019
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户概览与市场位置
        blocks:
          - type: paragraph
            body: >
              Celestial AI 在 2026 年 2 月 2 日被 Marvell Technology
              收购时仍处于尚未产生收入阶段。公司属于半导体硬件赛道，收入确认需要在超大规模云数据中心进行量产规模芯片部署；从最初 design-in 到首笔收入，这一过程通常需要 24 to 36
              个月。收购时没有公开确认的生产客户。Marvell 明确指引，Celestial AI 在 2026 和 2027 财年只会贡献极少收入。


              没有生产收入，不等于没有可记录客户进展。2024 年 3 月，在 Optical Fiber Communication（OFC）会议上，公司宣布一家领先但未具名的超大规模云厂商已正式采用 Photonic
              Fabric，用于下一代 AI 处理器；公司将其描述为 AI 系统设计中最早一批用光学方案替代铜互连的大规模承诺之一。CEO Dave Lazovsky 在多次采访中表示，还有其他超大规模云厂商正在 NDA
              下进行技术评估。该 design win 隐含的量——量产爬坡时每季度数十万颗 chiplet——说明管线具备实质规模，而不是探索性概念验证。


              Photonic Fabric 的最终买方是超大规模云和 AI 基础设施运营商：Amazon Web Services、Microsoft Azure、Google Cloud 和
              Meta。这些公司为训练和推理工作负载构建定制 AI 加速器（XPU）；Photonic Fabric 通过提供单 chiplet 单方向 16 Tbps 的光学 scale-up
              连接，解决处理单元与内存池之间的带宽瓶颈，也就是 AI Memory Wall。Celestial AI 的客户推进模式要求与超大规模云厂商和 ASIC 封装伙伴深度 design-in
              协作，因此从接触到收入需要数年。收购后，Marvell Technology 既是 Photonic Fabric 技术的主要托管方，也是主要内部客户，会把它集成进 Data Center Group
              的定制硅项目，再交付给超大规模云终端客户。
            claimRefs:
              - CU009
              - CU018
              - CU017
              - CU021
              - CU001
              - CU014
      - number: '6.2'
        title: 战略投资人信号可作为客户代理
        blocks:
          - type: paragraph
            body: >
              在半导体行业，战略性企业风险投资通常可靠地反映供应链协同，以及潜在客户或制造伙伴意图。Celestial AI 在 Series C（2024 年 3 月）和 Series C1（2025 年 3 月至 2025
              年 8 月）中的投资人名单，包含多家同时可能是客户、制造伙伴或关键生态参与方的战略投资者。


              AMD Ventures 参与 Series C，说明 AMD 对未来 XPU 架构中的光互连技术有兴趣。AMD 是主要 AI 加速器供应商，其 XPU 产品可以直接集成 Photonic
              Fabric，用于池化内存 scale-up。该协同使 AMD 成为高概率设计伙伴，也可能通过采用 AMD 芯片的超大规模云定制芯片项目成为间接客户。


              TSMC VentureTech Alliance 参与了 Series C，并在 2025 年 8 月参与最终 Series C1 收尾，确认晶圆代工层面的制造协同。TSMC 是 Celestial AI
              先进节点硅光 chiplet 唯一可信的量产制造商，这项投资有助于优先产能分配、工艺共同开发和供应链准备，支撑 Photonic Fabric 转向量产。Samsung Catalyst 两轮均参与，释放 HBM
              内存集成兴趣；Samsung 的先进封装和 HBM 专长，正是 Photonic Fabric 内存解耦架构直接需要的能力。


              Amazon 的角色最直接，商业意义也最大。作为 Marvell 收购公告的一部分，Marvell 向 Amazon 发行认股权证，可按每股 $87.0029 行权价购买约 1,045,171 股 MRVL
              股票；归属完全绑定 Amazon 到 2030 年 12 月前对 Photonic Fabric 产品的累计采购，行权期至 2031 年 12 月。该结构在法律和财务上把 Amazon
              定位为未来客户，并用股权激励推动 Photonic Fabric 采用，为 Marvell 提供多年需求可见性；分析师称，这实际上锁定了 Amazon 作为基础客户。生态中还包括 Broadcom（定制硅和
              ASIC 设计服务）与 Samsung（HBM 和先进封装），共同构成服务超大规模云客户量产所需的供应链。
