      - number: '1.5'
        title: 里程碑时间线
        blocks:
          - type: paragraph
            body: >
              Celestial AI 的里程碑从创立延伸到 2026 年被 Marvell 收购。公司从 2020 年种子阶段概念出发，先后完成融资、IP 收购、领导层补强和产品验证，最终在 2026
              年初实现半导体行业重大退出。值得注意的反向事件包括 Rockley Photonics 破产（这创造了 IP 收购机会），以及收购所经历的监管流程——交易在交割前接受了反垄断审查。


              Global Semiconductor Alliance 将 2024 Start-Up to Watch Award 授予 Celestial AI，体现公司在半导体生态中的技术可信度。2025 年 8
              月，CTO Phil Winterbottom 在 Stanford 举办的 IEEE Hot Chips 2025 上演讲——这是 Celestial AI 首次大规模公开披露其基于 EAM
              的光子架构、实测延迟和 OMIB 封装路径。该披露显著提升了公司在超大规模云工程师群体中的能见度，也加速了数月后完成的 Marvell 收购时间线。
