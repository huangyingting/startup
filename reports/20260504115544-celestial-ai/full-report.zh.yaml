        - TSMC Ventures 作为战略投资方对齐利益；早期 CoWoS 产能预留沟通
        - 若 TSMC 优先给 NVIDIA/Broadcom 分配 CoWoS 而非 Marvell 光子中介层，收入时间表会后移
      - - 500W–900W XPU 共封装规模下热管理失效
        - 重大
        - 中
        - EAM 热容忍设计（>85°C）；封装内热隔离层；流片已验证
        - 小规模流片未暴露的问题，可能在量产规模演变成封装级可靠性风险
      - - CPO 标准化延迟（OIF/IEEE 802.3）
        - 轻微
        - 高
        - 与各超大规模云厂商签双边客户验证协议，不依赖标准
        - 单客户验证周期更长、成本更高，拉长收入爬坡时间
      - - SiPh 和 CoWoS 单一晶圆厂（TSMC）依赖
        - 重大
        - 低
        - TSMC Ventures 投资对齐激励；未披露第二晶圆厂
        - 没有备用制造来源，供应中断风险集中；TSMC 任一中断都会停产
      - - 独立硅片验证缺口（无外部测量）
        - 轻微
        - 高
        - 内部流片表征数据；OFC 2025 论文和 arXiv 预印本提供部分证据
        - 缺少经同行评议的外部表征，客户可能存疑；超大规模云厂商验证周期拉长
      - - 收购后整合执行风险
        - 重大
        - 中
        - Marvell 称保留 Celestial AI 工程团队；路线图据称保持不变
        - Phil Winterbottom 和核心硅光工程团队存在关键人风险
    notes: |
      严重性和发生概率是基于公开信息和行业背景的分析师评估。
      Celestial AI 或 Marvell 未发布正式技术风险登记表。
      剩余暴露评估假设缓释措施按所述落地。
