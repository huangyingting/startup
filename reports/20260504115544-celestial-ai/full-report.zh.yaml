      - number: '7.7'
        title: 人员与组织风险
        blocks:
          - type: paragraph
            body: >
              Celestial AI 的竞争位置高度依赖一支规模小、专业度极高的团队。三类人员风险需要重点关注。


              关键人集中。Dave Lazovsky（CEO、联合创始人）是 Photonic Fabric 项目的主要外部代表和战略架构师。Phil Winterbottom（CTO、联合创始人）是首席技术架构师；他在
              Hot Chips 2025 对片内光 I/O 设计取舍的演示，体现出需要多年才能替代的技术深度。若任一联合创始人在收购后最初 12–24 个月内离开，都会造成严重组织冲击：客户关系流失、技术愿景连续性受损，以及
              EAM 架构选择中沉淀的机构知识流失。Marvell 的常规留任机制（RSU 刷新授予、绩效奖金）通常很难打动已经获得重大流动性的联合创始人。


              团队深度与可复制性。Celestial AI 的 141–152 名专家覆盖 EAM 工艺工程、硅光子设计、先进封装协同设计、光 I/O 固件和系统集成。这已经占到该专业全球人才池的相当一部分；即便只招聘
              10–15 名硅光子资深替代人才，也需要 18–24 个月。如果收购后人员流失高于正常水平——原因可能是或有对价挫败感、文化摩擦，或竞争对手挖人（尤其是正在激进招聘的 Ayar
              Labs）——技术执行时间线就会延后。


              历史 M&A 先例。Marvell 收购 Inphi（April 2021 完成，$10B）是最接近的可比整合案例。Marvell 保留了 Inphi 的 Dr. Ford Tamer 进入董事会，Inphi
              DSP 产品也是重要收入贡献者。但 Inphi 整合后的人员流失率没有公开披露，留下了一个关键尽调缺口：Marvell 能否留住一支更小、技术集中度更高、且所处技术类别变化更快的团队。
            claimRefs:
              - CR004
              - CR018
              - CR019
