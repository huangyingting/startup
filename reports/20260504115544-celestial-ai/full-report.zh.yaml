      - number: '5.4'
        title: 技术路线图与 Marvell 整合
        blocks:
          - type: paragraph
            body: >
              Marvell 以 $3.25 billion 收购 Celestial AI，并于 2026 年 2 月 2 日完成交易，明确动因是加速其定制 AI 硅（XPU）业务的共封装光学路线图。收购后，Photonic
              Fabric 被定位为 Marvell 设计、销售给超大规模云客户的 XPU 的标准共封装能力，把 Marvell 数据中心光学收入从既有可插拔 DSP 组合向外延伸。


              收入贡献路线图的目标是 H2 FY2028（约 2027 日历年下半年）开始产生 Celestial AI 收入，到 Q4 FY2028 达到 $500 million 年化运行率，到 Q4 FY2029 达到
              $1 billion。这些里程碑驱动与 Celestial AI 股东绑定的或有对价结构。要满足 H2 FY2028 时间线，Photonic Fabric 必须在 2026 年底至 2027 年中前达到
              TSMC CoWoS 量产就绪状态并通过客户认证；考虑到光子中介层共封装的量产复杂度，这个窗口很紧。


              NVIDIA NVLink Fusion 合作于 2026 年 3 月 31 日宣布，并伴随 NVIDIA 对 Marvell 投资 $2 billion，为 Photonic Fabric
              部署打开第二条路径。NVLink Fusion 允许 Marvell 的 XPU 以最高 1.8 TB/s 与 NVIDIA GPU 直接互连，而 Photonic Fabric 将成为实现机架级和多机架
              NVLink Fusion 拓扑的关键。NVIDIA 参与大幅降低 Marvell 定制 XPU 加 Photonic Fabric 组合的客户管线风险，也会加速超大规模云厂商认证节奏。


              技术路线图阶段包括：（1）第一代 die 内光 I/O chiplet，用于芯片到芯片 scale-up，并已在 OFC 2025 展示；（2）Photonic Fabric Appliance，用于 32 TB
              和 115 Tbps 内存解耦，并已在 Hot Chips 2025 展示；（3）下一代 chiplet，提高带宽密度，面向 Marvell 定制 ASIC 集成（2026–2027）；（4）TSMC CoWoS
              产线量产资格认证（估计 2027）。四次完成的 5nm/4nm tapeout 验证了 TSMC 工艺集成，但生产规模良率和超大规模云客户验收测试仍在收入里程碑之前。
