      - number: '8.5'
        title: 或有对价结构与或有对价分析
        blocks:
          - type: paragraph
            body: >
              或有对价机制是 Celestial AI 收购中非常重要、且在分析上有区分度的设计，使其不同于半导体 M&A 中常见的直接现金或股票收购。


              结构采用股权结算：最高约 27.2 million 股额外 MRVL 股票（按公告时价值约 $2.25 billion），取决于 Celestial AI 在 Marvell 2029 财年结束前（约
              January 2029）达成两个累计收入里程碑。第一档：当收购日起至 FY2029 年末的 Celestial AI 累计收入达到至少 $500 million 时，约三分之一或有对价归属（约 9.1
              million 股 MRVL，约 $750 million）。第二档：只有在同一截止日前累计收入超过 $2.0 billion 时，剩余三分之二（约 18.1 million 股，约 $1.5
              billion）才归属。收入累计从交割日（February 2026）开始；而有意义收入预计要到 H2 FY2028 才出现，因此实现 $2 billion 累计收入的有效窗口约 18
              个月——这是一个极其激进的目标，需要多个超大规模云厂商客户同时完成出色商业执行。


              或有对价结构带来几个重要动态。Celestial AI 创始团队——CEO Dave Lazovsky、COO Preet Virk 和 CTO Phil Winterbottom——以员工身份加入
              Marvell，并受到这些里程碑的直接激励，因此与 Marvell 的商业执行目标对齐。股权结算不增加 Marvell 资产负债表的现金负担，但会按或有对价归属规模，对 MRVL 股东造成潜在稀释风险。


              一个重要的战略细节是同步授予的 Amazon 认股权证：Marvell 向 Amazon 发行约 1,045,171 股 MRVL，行权价为每股 $87.0029，可按 Amazon 截至 December
              2030 对 Photonic Fabric 产品的累计采购额行权。该认股权证相当于间接需求信号：如果 Amazon 全额行权，就意味着 Amazon 已承诺采购足够多的 Photonic Fabric
              产品，以达到认股权证归属门槛，从而为 Celestial AI 最大潜在客户视角下或有对价的可实现性提供结构性印证。


              按公告定价，41% 的或有组成部分处于近年同等规模半导体收购的高位，反映了转型级上行潜力与尚未产生收入的不确定性并存。该结构符合商业化前技术资产 M&A
              交易设计的最佳实践：限制收购方下行，同时在技术兑现时给卖方上行。从治理角度看，如果光子业务爬坡低于预期，或有对价也降低了 Marvell 管理层声誉受损的风险。
            claimRefs:
              - CV002
              - CV014
              - CV003
              - CV004
              - CV005
