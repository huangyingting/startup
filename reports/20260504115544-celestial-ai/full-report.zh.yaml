      - number: '4.3'
        title: 收入模型与 Marvell 预测
        blocks:
          - type: paragraph
            body: >
              Celestial AI 被收购时已确认收入极小，符合其作为早期半导体设计公司的阶段：公司刚完成开发阶段 tape-out，正转入商业化。Marvell 官方交割新闻稿预计，收入贡献将从 FY2028
              财年下半年开始（Marvell 财年在 1 月下旬结束），并在第四季度显著爬坡至 $500M 年化收入运行率。到 FY2029 财年第四季度，年化收入运行率预计再翻倍至 $1B。这些预测是 Marvell
              管理层自称的前瞻指引，并带有标准前瞻性声明限定。


              到 FY2026 Q4 业绩发布时（2026 年 3 月发布），Marvell 更新了合并后的近期展望：Celestial AI 和 XConn Technologies（另一笔财年结束后完成的收购）预计将在
              FY2028 合计贡献约 $250M 收入。该数字意味着更长期 $500M ARR 路径仍保持，但表述为合计贡献，并未按实体拆分。Marvell CEO Matt Murphy 提到，scale-up
              connectivity 的总可用市场约为 $10B，并将 Celestial AI 定位为捕捉该市场的主要载体。Marvell FY2026 实际收入为 $8.195B（同比 +42%），FY2027 指引约
              $11B，FY2028 指引约 $15B——这一路径隐含要求 Celestial AI 和其他光子项目在两个财年内贡献实质新增收入。


              Marvell 内部的收入模型遵循定制芯片和授权结构，与 Marvell Data Center Group 一致。包括持有认股权证的 Amazon
              在内，超大规模云客户预计将成为主要收入来源。具体定价、采购量承诺或合同结构尚未公开披露。
