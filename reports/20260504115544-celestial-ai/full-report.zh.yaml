  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 融资历史与股权结构
        blocks:
          - type: paragraph
            body: >
              Celestial AI 在 2021 年 1 月至 2025 年 3 月之间，通过五轮外部融资累计获得约 $515M。2021 年 1 月的 $2.87M 种子轮提供了推进 Photonic Fabric
              概念的初始资金。2022 年 2 月，Lux Capital 领投 $56M Series A，支持早期芯片设计和初始 tape-out。2023 年 6 月，Tiger Global Management 领投
              $100M Series B，当时公司正推进首批商业原型并扩张工程团队。


              2024 年 3 月由 U.S. Innovative Technology Fund（USIT）领投的 $175M Series C，是一个关键战略里程碑：它引入 AMD Ventures、TSMC
              Ventures（VentureTech Alliance）、Samsung Catalyst 和多家超大规模云相邻投资人，在供应链层面验证了「光子学用于 AI」这一逻辑。本轮投后估值 $1.22B，使
              Celestial AI 成为独角兽。十三个月后，2025 年 3 月，Celestial AI 完成由 Fidelity Management and Research 领投的 $250M Series
              C1，BlackRock、Maverick Silicon 以及 Lip-Bu Tan 个人投资（他同时加入董事会）新参与。本轮投后估值 $2.5B。


              在 Series C 与 Series C1 之间，Celestial AI 于 2024 年 10 月以约 $20M 收购 Rockley Photonics IP
              组合——这是一次利用现金、以困境价格买入资产的资产负债表动作，新增 200 多项专利，覆盖 electro-absorption modulator、封装内光电系统和光开关技术。Rockley 已于 2023
              年初申请 Chapter 11，这让此次收购成为战略性机会主义买入，在公司最大一轮融资和最终退出前加固了 IP 护城河。
