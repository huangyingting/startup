      - number: '2.2'
        title: 市场规模——多重视角
        blocks:
          - type: paragraph
            body: >
              没有单一分析师报告能干净切出 Celestial AI 的 SAM（面向 AI XPU 的 scale-up 光学 chiplet）。最有用的规模视角如下：


              **视角 1——最宽 TAM（全部光互连）：** Fortune Business Insights 将全球光互连市场估值为 2025 年 $15.38B，并以 12.2% CAGR 增至 2034 年
              $43.14B。该口径包含所有距离类别、技术和应用，显著高估了 Celestial AI 的可服务市场。


              **视角 2——数据中心互连（DCI）市场：** MarketsandMarkets 估计 DCI 市场 2025 年 $15.38B，并以 11% CAGR 增至 2030 年
              $25.89B。它同时包含光学和分组交换 DCI 方案，更能捕捉数据中心光学支出，但仍把非 AI 应用和跨设施链路纳入过多。


              **视角 3——硅光子（最聚焦的技术口径）：** MarketsandMarkets 估计硅光子市场 2024 年 $2.16B，并以 29.5% CAGR 增至 2030 年 $9.65B。数据中心和 HPC
              是 CAGR 最高的终端用户细分。该口径最能覆盖 Celestial AI 所处的技术层。


              **视角 4——AI 集群光学（商业相关性最高）：** LightCounting 2025 年 1 月的 Optics for AI Clusters 报告估计，AI 集群光学市场 2024 年为 $5B，到
              2026 年增至 $10B+，近期 CAGR 约 40%+。该口径包含计算节点收发器和 scale-up 网络光学，随着 LPO 和 CPO 放量，2028–2030 年增速放缓至双位数。


              **视角 5——共封装光学（最接近产品类比）：** 分析师对 CPO 市场预测差异很大（2025 年 CPO 专项为 $95M–$2B），到 2030 年以 30–40% CAGR 增至
              $575M–$4.67B。AI2Work/Mordor Intelligence 称，2026 年 CPO 在 AI 数据中心渗透率仅约 0.5%，预计到 2030 年达到 35%。


              对 Celestial AI scale-up 光学 chiplet 产品最可信的 SAM 估计，是到 2028–2029 年约 $2–5B。这与 Marvell 到 FY2028 Q4 实现 $500M ARR
              的目标相符，前提是 Celestial AI 能拿下这一新兴细分 10–25% 份额。由于技术仍处于尚未收入阶段，这是一个受证据限制、且不确定性很高的估计。
