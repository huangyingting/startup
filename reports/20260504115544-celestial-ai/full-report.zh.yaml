      - number: '2.3'
        title: 买方与细分
        blocks:
          - type: paragraph
            body: >
              scale-up 光互连技术有三类主要买方：


              **细分 1——超大规模云厂商：** AWS、Google、Microsoft、Meta、Alibaba、Oracle 以及其他大型云运营商，是内含光互连的 AI 基础设施最终买方。它们 2025
              年合计在数据中心 capex 上花费 $315–320B。预算归属 CTO 之下的基础设施工程组织（VP/SVP 级别）；采购通常跨多年。采用触发点：AI 集群扩展超过铜的有效覆盖距离（400G 约 1m），以及
              AI 集群规模达到数万到数百万个 XPU。


              **细分 2——AI 芯片公司 / XPU 设计方：** NVIDIA、AMD、Intel、定制 ASIC 设计公司（包括 Marvell 自身的定制 XPU 客户）。这些客户购买或授权光互连
              chiplet，并直接集成到自己的 XPU 芯片封装中。预算归属芯片架构和封装工程团队。采用触发点：超过电 I/O 带宽密度上限（铜约 3 Tbps/mm²，硅光子约 10 Tbps/mm），并降低每 bit
              功耗以支持更高 TDP 封装。


              **细分 3——系统集成商和 ODM：** Super Micro、Quanta、Foxconn 等为超大规模云部署构建 AI 服务器系统的公司。它们设计包含光学 chiplet
              的板卡和封装。这是派生需求细分，取决于细分 1 和 2 的采用决策。


              买方旅程很长，技术复杂度高。超大规模云厂商通常需要 12–36 个月联合硬件资格认证，才会进入生产部署。chiplet 集成模式（与 XPU 共封装）要求在 XPU 设计阶段早期介入，即量产前 24–36
              个月——这意味着销售周期在产品尚未出货时就已经开始。
