            body: >
              $5.5 billion 名义收购价值要求 Celestial AI 到 Marvell FY2029 年底前产生超过 $2.0 billion
              累计收入——对于一项收购完成时尚无商业部署的技术，这需要前所未有的爬坡。即便是部分触发条件（$500M 累计收入），也要求公司在收入预计开始贡献后的 24 个月窗口内完成大量执行。
