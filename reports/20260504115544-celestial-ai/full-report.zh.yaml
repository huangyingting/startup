      - number: '5.3'
        title: IP 与技术栈
        blocks:
          - type: paragraph
            body: >
              Celestial AI 的知识产权组合，既包括公司 2020 年创立以来自主提交的专利，也包括 2024 年 10 月困境收购 Rockley Photonics 专利组合取得的资产。合并后的组合在全球超过
              200 项专利，覆盖已授权和待审申请，横跨三大技术支柱：光电子系统级封装、电吸收调制器和光交换技术。


              CTO Phil Winterbottom 拥有深厚的电信光子经验，曾在 Bell Labs 1127 Computer Science Research Center
              工作，并有连续创业经历（Entrisphere 和 Gainspeed）。他的架构贡献——尤其是 die 内 EAM 放置和 OMIB 桥概念——被广泛认为是 Photonic Fabric
              区别于微环谐振器竞争方案的核心。CEO David Lazovsky 和 COO Preet Virk 则带来半导体商业化背景，补足 CTO 的技术深度。


              Rockley Photonics IP 于 2024 年 10 月以约 $20 million 收购，此前 Rockley 走出 Chapter 11 破产保护并随后重组。Rockley 专利最早可追溯到
              2014 年，早于大多数硅光初创公司，并包含可直接用于 Celestial AI die 内架构的基础 EAM 波导结构和光电子封装权利要求。这笔收购在 Series C1 融资和 Marvell 收购前加固了
              IP 护城河。


              技术栈的制造层完全依赖 TSMC SiPh 工艺与 CoWoS 2.5D 先进封装，形成单一晶圆代工厂依赖。这既是优势（TSMC 先进节点质量和 TSMC Ventures 的战略协同），也是风险（NVIDIA
              与 Broadcom 需求旺盛下 CoWoS 产能受限）。软件层提供互连结构管理、遥测、可靠性 / 可用性 / 可维护性（RAS）以及面向超大规模集群集成的 AI
              驱动分析。该软件栈是否成熟、是否完整到足以支撑生产级超大规模云部署，尚未得到独立验证。
