            title: Amazon 认股权证释放锚定客户承诺信号
            body: >
              Marvell 同步向 Amazon 发行约 $90 million MRVL 股票认股权证（基于 2030 年前 Photonic Fabric
              累计采购额），这是公开材料中最强的客户需求承诺信号。该认股权证结构让 Amazon 的激励与 Celestial AI 收入爬坡绑定，也为管理层指引之外的未来需求提供独立佐证。
            calloutType: insight
