      - number: '4.2'
        title: 收购财务条款
        blocks:
          - type: paragraph
            body: >
              Marvell Technology 于 2025 年 12 月 2 日在发布 FY2026 财年 Q3 业绩的同时宣布最终收购协议，并于 2026 年 2 月 2 日完成交易。交易结构包含两部分。首付款约为
              $1.0B 现金，加约 27.2M 股 MRVL 普通股；按公告前 10 日成交量加权平均价计算，股票价值约 $2.25B，总首付款价值约 $3.25B。或有 earn-out 最高为约 27.2M 股额外
              MRVL 股票（约 $2.25B），与 Marvell FY2029 财年结束前累计收入里程碑挂钩。earn-out 分档设计：若 Celestial AI 截至 FY2029 年底累计收入达到至少
              $500M，解锁三分之一；只有累计收入超过 $2.0B，才会全部归属。


              现金部分来自 Marvell 现有账面现金，交割时现金余额减少 $1B，并使预期年度利息收入减少约 $38M。股票对价需要发行约 27M 股新的 MRVL
              股票，使摊薄后加权平均股数增加相同数量。作为更广泛战略合作的一部分，Marvell 同时向 Amazon 发行一份认股权证，可按每股 $87.0029 购买约 1,045,171 股 MRVL 股票，归属取决于
              Amazon 截至 2030 年底累计购买 Photonic Fabric 产品的金额。此次收购还将使 Marvell 年化 non-GAAP 运营费用增加约 $50M，反映 Celestial AI
              工程与开发团队带来的成本。
