      - number: '7.8'
        title: 附录
        blocks:
          - type: callout
            title: 或有对价不透明是治理缺口
            body: >-
              $2.25B 或有对价里程碑结构没有公开披露到足以判断外界广泛引用的 FY2028 前 $500M ARR 目标是否会触发全额支付。这种不透明在 Marvell 股东、前 Celestial AI
              投资人和留任员工之间制造了信息不对称——他们对里程碑达成的经济利益各不相同。Marvell 应在 FY2026 10-K 中更清楚地披露里程碑。
            calloutType: risk
            claimRefs:
              - CR009
              - CR005
          - type: callout
            title: TSMC 单一晶圆厂集中度近期无法缓释
            body: >-
              Celestial AI 的 EAM 硅光子工艺今天只能在 TSMC 制造，TSMC 的 CoWoS 先进封装产能又被大量分配给 NVIDIA。可信替代晶圆厂最早也要到 2028 才可能复制先进节点硅光子加
              CoWoS 级封装的组合。因此，TSMC 成为整个 Photonic Fabric 项目的单点故障。台湾地缘政治风险虽然概率低，一旦发生，破坏量级将是灾难性的。
            calloutType: risk
            claimRefs:
              - CR022
              - CR002
              - CR012
          - type: callout
            title: 优先厘清或有对价里程碑并签订留任合同
            body: >-
              近期最可执行的两项风险缓释措施是：（1）Marvell 应在下一份 10-K 或投资者日材料中公开澄清或有对价里程碑结构，降低治理不透明；（2）Marvell 应确认 Dave Lazovsky 和 Phil
              Winterbottom 的留任合同条款，采用与技术里程碑挂钩的多年期绩效股权，而不是只绑定 Marvell MRVL 股价。若留任安排未确认，关键人离职风险实质上仍然敞口。
            calloutType: recommendation
            claimRefs:
              - CR009
              - CR004
              - CR018
          - type: callout
            title: Ayar Labs 是近期最重要的竞争监控信号
            body: >-
              Ayar Labs 的 mid-2026 量产目标和 GUC 设计合作，使它成为优先级最高的竞争监控信号。如果 Ayar Labs 实现 CoWoS 集成，且 NVIDIA 确认 TeraPHY 是兼容
              NVLink Fusion 的光学 chiplet，Marvell 的 Celestial AI 差异化逻辑将明显削弱。NVIDIA NVLink Fusion 合作关系不保证排他性，商业条款也未公开。
            calloutType: insight
            claimRefs:
              - CR011
              - CR007
              - CR002
              - CR019
  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 交易概览与隐含交易倍数
        blocks:
          - type: paragraph
            body: >
              Marvell Technology 于 February 2, 2026 完成对 Celestial AI 的收购，距离 December 2, 2025 随 FY2026
              第三财季业绩一同宣布交易约两个月。交易结构分为两档。前置对价合计约 $3.25 billion：$1 billion 现金，加上约 27.2 million 股新发行 MRVL 普通股；后者按公告前 10
              天成交量加权平均价计，价值约 $2.25 billion。或有对价最高为额外 27.2 million 股 MRVL 股票（约 $2.25 billion），按 Marvell 2029 财年末前
              Celestial AI 累计收入里程碑分档归属。


              按常规历史收入指标，交易无法对标，因为 Celestial AI 收购时尚未产生收入——收入极低，也没有实现商业部署。Marvell 管理层给出了前瞻收入指引：Celestial AI 到 Q4 FY2028
              达到 $500 million 年化运行率（约 H2 calendar 2027，交割后约 18 个月），到 Q4 FY2029 达到 $1 billion 年化运行率。以这些目标为分母，隐含 EV / 远期
              ARR 倍数为：（1）$3.25 billion 前置对价除以 $500 million 两年后 ARR = 6.5× NTM ARR；（2）$5.5 billion 全额或有对价价值除以 $500
              million ARR = 首个里程碑时 11.0×；（3）$5.5 billion 除以 $1.0 billion FY2029 ARR = 5.5×。上一轮 VC 估值是 March 2025 Series
              C1 的 $2.5 billion，意味着前置价格溢价 30%，全额或有对价下理论最高溢价 120%。五轮融资总投入资本约 $515 million，对应前置价格约为投入资本的 6.3×。


              财务顾问提供了独立定价信号。Celestial AI 的顾问是 Morgan Stanley（财务）和 Latham & Watkins（法律）。Marvell 的顾问是 Citigroup（财务）和
              Wilson Sonsini Goodrich & Rosati（法律）。两组顾问组合都符合半导体领域顶级四分位竞争性 M&A 流程的特征。MRVL 股价在公告日上涨约
              9–13%，反映投资者认可战略逻辑。市场同时也在消化强劲的 Q3 FY2026 业绩和上调后的指引，因此股价变化不能完全归因于收购公告；但市场没有对为一家尚未产生收入的公司支付 $3.25 billion
              产生负面反应，本身就是一个信号：买方共识认为价格合理，或具备战略正当性。
