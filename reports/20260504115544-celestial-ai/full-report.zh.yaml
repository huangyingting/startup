      - number: '8.6'
        title: 估值结论与投资尽调立场
        blocks:
          - type: paragraph
            body: >
              综合交易结构、可比交易、市场规模和风险因素，Celestial AI 收购的估值结论是：$3.25 billion 前置价格对 Marvell 的战略目标而言合理；若全额 $5.5 billion
              或有对价情景实现，也会是有吸引力的结果。若从假设外部观察者角度，用入场价格对比风险调整后远期价值，立场应是在 Marvell FY2028 财报验证首笔收入前继续研究。


              三个支柱支持前置价格合理的判断。第一，6.5× 两年后远期 ARR 倍数相对可比光子和 AI 硅片 M&A 先例偏保守——Inphi 交易的 14.6× TTM 和 Acacia 交易的约 12× TTM
              构成上沿，Mellanox 作为已有收入资产的 5× TTM 构成下沿。Celestial AI 的隐含远期倍数位于两者之间，且尚未对收入风险折价。第二，或有对价结构明确限制了 Marvell
              的下行：悲观情景终局结算是 $3.25 billion，而不是 $5.5 billion。第三，NVIDIA 于 March 31, 2026 宣布的 $2 billion NVLink Fusion
              投资，明确提到硅光子和 Marvell 的光互连能力——这是独立第三方印证，说明 Photonic Fabric 技术具备商业可信度，并将被整合进主导性的 AI 基础设施平台。


              三个因素要求谨慎，也支持外部观察者继续研究。第一，Celestial AI 收购时已确认收入为零，Marvell 的远期指引带有标准前瞻性声明免责声明，没有来自超大规模云厂商客户的合同收入承诺。第二，来自
              Broadcom 内部光子项目、NVIDIA 自身硅光子 R&D、Intel 光计算互连项目的竞争风险很实质，可能在 18 个月爬坡窗口内更快侵蚀可服务市场。第三，Marvell 客户集中度高——约 73%
              收入来自数据中心客户，其中估计超过 50% 来自两家超大规模云厂商——任何超大规模云厂商 CapEx 减速，都会同时压缩 Marvell 核心收入轨迹和 Celestial AI 的或有对价爬坡。


              投资逻辑失效触发点可以识别：如果 Marvell FY2028 财报（early calendar 2028 报告）没有披露任何 Celestial AI 收入贡献，就意味着爬坡至少延后 12 个月，$500
              million Q4 FY2028 ARR 目标将无法实现，且或有对价丧失风险上升。这个单一数据点——首次出现 Celestial AI 收入线的财报电话会——是近期验证估值逻辑最重要的事件。
            claimRefs:
              - CV007
              - CV008
              - CV022
              - CV009
