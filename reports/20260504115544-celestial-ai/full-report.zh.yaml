companyProfile:
  summary: >
    Celestial AI 是一家位于 Santa Clara 的硅光子创业公司，成立于 2020 年。公司开发 Photonic Fabric——一种光学 chiplet，目标是在 AI 加速器集群中替代基于铜的 scale-up
    互连（NVLink、UALink）。

    公司五年内完成五轮融资，累计 $515M，并于 2026 年 2 月被 Marvell Technology 以 $3.25B 首付款收购。被收购时，公司尚未确认收入，硬件仍在与未披露的超大规模云客户做资格认证。

    Marvell 预计，到 FY2028 Q4，Celestial AI 可贡献 $500M ARR。
