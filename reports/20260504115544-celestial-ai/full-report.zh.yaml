      - number: '4.4'
        title: 单位经济与现金消耗
        blocks:
          - type: paragraph
            body: >
              Celestial AI 在被收购前从未披露独立口径收入、毛利率或运营成本结构。作为一家仍在完成开发阶段
              tape-out、转向商业化的私有半导体初创公司，它的收入几乎可以忽略，但运营支出不低，包括芯片设计、封装研发、制造 tape-out、IP 维护，以及以 $20 million 收购 Rockley
              Photonics IP。任何公开来源都没有季度或年度利润表数据。


              只能从融资时间线倒推隐含烧钱速度。$250 million Series C1 于 2025 年 3 月完成，9 个月后的 2025 年 12 月宣布收购。一家拥有 141 to 152
              名员工、推进先进封装项目并经历多轮 tape-out 的半导体设计公司，通常每月消耗 $15 to $25 million 现金。按该区间，$250 million Series C1 大约可支撑 10 to
              17 个月现金跑道，因此收购公告落在资金跑道末端或接近末端。该判断是二级推断，不是披露数据，应按低置信度处理。


              按 $3.25 billion 首期收购价格和约 141 to 152 名员工计算，隐含单名员工收购价格约为 $21 to $23 million。这一指标反映 Marvell 为 IP
              组合、工程人才和未来收入预期支付的溢价，而不是 Celestial AI 当前财务表现。以 $2.5 billion 投前估值进入 Series C1 的投资人，仅按首期对价计算的风险投资回报约为 1.3
              倍；若全部或有对价兑现，潜在回报可升至 2.2 倍。
