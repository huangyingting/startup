  - id: FU004
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: 从技术发现到生态扩张的六阶段客户旅程，映射一家超大规模云厂商如何从第一次了解 Photonic Fabric， 推进到多机架生产部署，最终在 Marvell 定制芯片项目中实现多元化。
    data:
      items:
        - label: 技术发现
          detail: 超大规模云厂商架构团队通过 OFC 会议演示、行业白皮书或 Celestial AI 直接触达接触 Photonic Fabric。 初始兴趣来自铜互连 scale-up 在带宽和功耗上的约束。
        - label: NDA 验证参与
          detail: >-
            双方签署 NDA；Photonic Fabric 在超大规模云厂商内部实验室与铜互连和竞争性光方案做基准对比。 CEO Lazovsky 确认，在 2025 年 3 月 Series C1
            交割前，多家超大规模云厂商已处于这一阶段。
        - label: XPU 设计集成
          detail: >-
            Photonic Fabric chiplet 接口被定义并绑定到具体 XPU 架构。集成需要与 ASIC 合作方 （如 Broadcom 或 Marvell 定制芯片）和先进封装供应商（如 TSMC CoWoS 或
            Samsung） 共同设计。
        - label: 系统级验证
          detail: Photonic Fabric 在完整 AI 集群环境中测试；跨多个机架验证共封装良率、热包络、光链路可靠性和内存一致性协议。 这通常是最长阶段，需要 12–24 个月。
        - label: 生产承诺与爬坡
          detail: 下达批量采购订单；TSMC 开始量产制造；chiplet 发往超大规模云厂商，集成进生产 AI 系统。 收入确认开始。Marvell 目标是在 H2 FY2028 让首家超大规模云厂商项目进入这一阶段。
        - label: 生态扩张
          detail: >-
            更多超大规模云厂商项目和 NVIDIA NVLink Fusion 客户采用 Photonic Fabric；Amazon 认股权证归属会加速 AWS 采用；多家超大规模云厂商分散化将在 FY2029
            及以后降低集中风险。
