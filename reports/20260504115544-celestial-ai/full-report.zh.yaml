  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与纳入支出
        blocks:
          - type: paragraph
            body: >
              Celestial AI 的 Photonic Fabric 对应的是 AI 数据中心 scale-up 光互连市场——更具体地说，是 AI
              加速器系统内部及系统之间，用于芯片到芯片、芯片到内存、封装到封装光链路的细分市场。它与更宽泛的光互连市场有三点关键不同：（1）它瞄准短距系统内互连，而非长距离或城域数据中心互连；（2）它要求光子集成以共封装或中介层方式直接贴近加速器芯片（XPU），而不是可插拔收发器模块；（3）它直接竞争
              NVIDIA 的 NVLink 和 AMD、Broadcom 支持的 UALink 标准等专有铜基 scale-up fabric。


              纳入支出：硅光子中介层、共封装光学（CPO）、光学 chiplet，以及为 XPU-to-XPU 和 XPU-to-memory 连接设计的 scale-up
              光互连模块。排除支出：传统可插拔收发器（800G/1.6T）、scale-out Ethernet/InfiniBand 交换、设施之间的数据中心互连（DCI）、机架内短距链路使用的主动 / 被动铜电缆，以及相干
              DCI 光模块。


              相邻市场包括更宽的硅光子市场（MarketsandMarkets 估计 2024 年 $2.16B，到 2030 年增至 $9.65B）、完整数据中心互连市场（MarketsandMarkets 和
              Fortune Business Insights 估计 2025 年 $15.38B），以及 LightCounting 跟踪的 AI 集群光学细分（2024 年 $5B，到 2026 年翻倍至
              $10B+）。现状替代方案包括 NVIDIA 基于铜的 NVLink scale-up fabric，以及 AMD/Broadcom 的 UALink 铜方案——这些正是 Celestial AI/Marvell
              试图替代的主导架构。
