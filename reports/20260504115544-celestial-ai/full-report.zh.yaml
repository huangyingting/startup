      - number: '6.3'
        title: Marvell 客户渠道与具名终端客户
        blocks:
          - type: paragraph
            body: >
              Marvell 已建立的定制 AI 硅关系，是 Celestial AI 的 Photonic Fabric 在收购后触达超大规模云终端客户的主要商业渠道。Marvell
              目前服务三项超大规模云定制硅项目，关系已确认或接近确认。


              Microsoft 是 Marvell 最大、战略意义最强的定制 AI 硅客户。Microsoft 的 Project Maia300——Maia200 的后继产品——正在由 Marvell 作为主要 ASIC
              设计伙伴开发，目标是 2nm 工艺节点并集成 HBM4 内存。预计到 2026 年底出货 300,000 to 400,000 颗，2027 年爬坡至 1.2 to 1.5 million 颗。Maia300
              项目恰好需要 Photonic Fabric 提供的共封装光学 scale-up 连接，因此它是最清晰的近期集成路径，也最可能贡献最早的 Photonic Fabric 收入。


              Amazon 是 Marvell 的第二大定制硅客户，路径是 Trainium AI 训练和 Inferentia AI 推理项目。Amazon 作为 Marvell-Celestial AI
              收购协议的一部分获得 MRVL 股票专项认股权证，确认 Amazon 是所有公开可识别方中承诺最明确的未来 Photonic Fabric 客户。尽管 Alchip 在下一代 Trainium
              变体上的竞争压力，为 Marvell 在核心 XPU 中的长期角色带来一些不确定性，但认股权证结构明确把 Amazon 股权收益与 Photonic Fabric 采购绑定，确保激励一致。


              据报道，Google 在 2026 年初正与 Marvell 进行后期讨论，计划成为其第三大定制 AI 硅伙伴，在既有 Broadcom 和 TPU 基础设施之外补充 Marvell 设计、面向推理的芯片。这将为
              Photonic Fabric 创造第三条分销渠道。NVIDIA 于 2026 年 3 月 31 日宣布的 NVLink Fusion 合作创造第四条路径：让第三方定制硅接入 NVIDIA 的 NVLink
              互连结构；NVIDIA 投资 $2 billion 于 Marvell，共同规模化开发光网络和硅光能力。
