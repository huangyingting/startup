      - number: '4.5'
        title: 资本充足性与融资
        blocks:
          - type: paragraph
            body: >
              作为被收购后的子公司，Celestial AI 不再承担独立资本需求。分析重点转向 Marvell 是否有能力继续投入研发并把收入爬坡跑起来。Marvell 用现有现金支付 $1 billion 现金对价；考虑到
              Marvell FY2025 自由现金流约 $1.39 billion 且具备投资级信用评级，这笔支出可控。每年新增 $50 million 非 GAAP 运营费用，相对 Marvell 整体运营费用基盘也不大。


              或有对价结构最高包括 27.2 million 股额外 MRVL 股票，形成一项不消耗现金的或有负债。它带来的不是现金压力，而是取决于收入爬坡是否成功的未来摊薄风险。其中三分之一（约 9.1 million
              股）需要 Celestial AI 在 FY2029 年底前累计收入达到 $500 million 才会解锁；全部 27.2 million 股只有在累计收入超过 $2.0 billion
              时才会归属——这意味着收入生成必须持续且显著，时间上还要大幅早于 Marvell Q4 FY2028 运行率目标。


              被收购前，独立 Celestial AI 的资本充足性完全依赖持续外部股权融资。2025 年 3 月的 $250 million Series C1
              是收购前最后一次融资事件。公司未披露过桥融资、债务授信或以收入支持的信贷。公司没有足以产生经营现金流的实质收入，因此直到 Marvell 交易完成前都完全靠股权融资支撑。
