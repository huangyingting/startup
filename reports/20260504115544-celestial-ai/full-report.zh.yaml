      - number: '3.2'
        title: 直接光学 Chiplet 竞争对手
        blocks:
          - type: paragraph
            body: >
              Ayar Labs 是 Celestial AI 最直接的竞争对手。Ayar Labs 成立于 2015 年，是从 UC Berkeley 孵化出来的公司，已打造 TeraPHY 光 I/O
              chiplet。该产品使用微环调制器（MRM）和 UCIe chiplet 互连标准，集成进 AI 加速器封装。TeraPHY 每个 chiplet 最高带宽 8 Tbps；配套 SuperNova
              多波长光源作为外部激光输入，支持 16 个波长。Ayar Labs 的目标能效约 5 pJ/bit，路线图指向低于 1 pJ/bit。公司于 2024 年 12 月完成 $155M Series D——AMD
              Ventures、Intel Capital 和 NVIDIA 与 Advent Global Opportunities 等一起投资——随后在 2026 年初完成 $500M Series E，由
              Neuberger Berman 领投，AMD、NVIDIA、MediaTek 和 Alchip 参投，使累计融资达到 $870M，估值达到 $3.75–3.8B。


              关键架构差异在于：Celestial AI 使用 electro-absorption modulator（EAM）和 3D EIC-on-PIC 堆叠，而 Ayar Labs 使用 MRM，并在既有 CMOS
              工艺流内共封装。EAM 在热容忍度、带宽密度和消光比上有优势；MRM 插入损耗更低，但需要更严格温度管理。Celestial AI 的 3D 堆叠架构独特瞄准大规模分解式内存访问——这一用例 Ayar Labs
              并未明确覆盖——可能让 Celestial AI 拥有差异化利基。


              NVIDIA 同时直接投资 Ayar Labs（Series D 和 Series E）并与 Marvell 合作 NVLink Fusion，构成需要监控的结构性利益冲突。如果 NVIDIA 最终在其平台内偏好
              Ayar Labs 的 TeraPHY 路径，Marvell/Celestial AI 进入 NVIDIA scale-up 生态的通道可能受损。


              Ranovus（Ottawa，2012 年成立）是次一级直接竞争对手。其 Odin direct-drive CPO 3.0 平台支持每个光通道 100 Gbps，并面向 AI/ML ASIC 集成。2024 年
              3 月，Ranovus 宣布与 MediaTek 共同开发 6.4 Tbps 共封装光学方案。Ranovus 于 2023 年从加拿大 Strategic Innovation Fund 获得 $36M，并于
              2025 年 8 月宣布在 Ottawa 扩建 $100M+ 制造能力。Ranovus 活跃于 CPO 领域，但缺少 Ayar Labs 那样深的超大规模云投资人支持和广泛生态关系。
