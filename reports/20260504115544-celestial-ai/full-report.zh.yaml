      - number: '8.3'
        title: 可比上市公司与私募轮次基准
        blocks:
          - type: paragraph
            body: >
              上市 AI 硅片公司和近期私募融资轮次提供了额外估值锚。最相关的上市可比公司，是那些在 AI 芯片设计、定制硅片和光互连方面有实质暴露的公司。


              在 AI 半导体创业公司中，Cerebras Systems 于 April 2026 提交 Nasdaq IPO 文件，目标估值区间为 $23–35 billion，对应披露的 2025 收入 $510
              million——按申报区间中点计算，约为 2025 收入的 45–69×。Cerebras 通过与 OpenAI 的多年大型算力合同以及 AWS 合作达到这一收入水平，因此直接可比性较弱，但可作为当前周期 AI
              芯片估值上限的参考。SambaNova Systems 仍为私有公司，据报道估值超过 $5 billion，未披露收入。AI 推理芯片公司 Groq 在 2023 Series D 轮估值约 $2.8
              billion。


              在硅光子领域，Ayar Labs 是一家共封装光互连公司，技术与 Celestial AI 的 Photonic Fabric 有重叠；截至 early 2024，它通过 Series C 累计融资约 $870
              million，但未公开披露投后估值。商业阶段可比上市硅光子公司的缺失，迫使估值更多依赖 M&A 可比交易和市场规模代理，而不是上市公司 EV / 收入基准。


              在上市半导体公司中，Marvell 自身提供了最有用的收购方参照。Marvell 的 AI 驱动收入在 FY2025 增长 78%，估计达到 $1.7–$2.0 billion；公司 FY2026 总收入约
              $8.2 billion，同比增长 42%。公告时，Marvell 自身企业价值约 $55–65 billion，对 FY2026 估计收入的远期收入倍数约为 7–8×。因此，Marvell 为
              Celestial AI 支付 6.5× 两年后远期 ARR，与 Marvell 自身市场倍数一致——说明董事会采用了有纪律的定价逻辑，而不是战略性高价收购。


              MarketsAndMarkets 硅光子市场报告（2025 版）预计，全球硅光子市场将在 2025 达到约 $2.1–3.1 billion，到 2030 增至 $9.6–11.8 billion，CAGR 约
              27–30%。按 Marvell 宣称的 $500 million ARR 目标，Celestial AI 将在 2028 市场（估计 $4–5 billion）中占约 15–24%
              份额。对于一家拿到超大规模云厂商设计赢单、且在 5 nm 工艺节点共封装光学上没有直接等价对手的先发者而言，这是进取但可以实现的份额。GrandView Research 光互连市场报告预计，整体光互连市场到
              2030 将达到 $34.5 billion，为硅光子细分所在的大 TAM 提供了背景。
