      - number: '3.4'
        title: 相邻光学生态竞争对手
        blocks:
          - type: paragraph
            body: >
              Coherent Corp（NYSE: COHR），前身为 II-VI Incorporated，是全球最大的光收发器供应商。Coherent 报告 FY2025 收入 $5.81B，同比增长 23%，同期 AI
              数据中心业务收入增长 61%。Coherent 主要是收发器和光学组件供应商，不是直接 chiplet 竞争对手；但其扩张中的 CPO 和 LPO（linear-drive pluggable
              optics）产品组合，会在超大规模云和交换 ASIC 厂商评估光集成方案时进入候选名单。Coherent 已加深与 NVIDIA 的合作，用于 NVIDIA 下一代网络平台的 CPO 集成。Coherent
              带来的竞争风险是间接的：如果超大规模云厂商更偏好 Coherent 基于模块的 CPO，而不是 chiplet 路径，Celestial AI/Marvell 可服务的集成层级会收缩。Coherent 的
              $5.81B 收入和上市公司身份，代表了强大的生态规模。


              LightMatter 是一家光子计算和互连创业公司，于 2024 年 10 月完成 $400M Series D（累计 $850M，估值 $4.4B）。LightMatter 的 Passage
              光子中介层用光连接放在同一光子基板上的多颗芯片。2025 年 3 月发布的 Passage M1000 提供超过 114 Tbps 总光带宽。与 GlobalFoundries 和 Amkor
              的制造合作提供供应链支撑。LightMatter 的架构要求所有共置芯片共享同一光子基板，相比 Celestial AI 的离散 chiplet 路径，部署灵活性受限；不过 LightMatter
              更高的估值（$4.4B）和融资记录显示市场信心很强。LightMatter 与 Celestial AI 争夺同一批超大规模云注意力和定制 AI 集群设计导入。


              Rockley Photonics 于 2023 年初申请 Chapter 11 破产保护，并在当年晚些时候完成重组。Celestial AI 于 2024 年 10 月以 $20M 收购 Rockley
              全部硅光子 IP 组合，覆盖封装内光电系统、electro-absorption modulator 和光开关技术，使 Celestial AI 专利总数超过 200 项。Rockley
              的轨迹说明，硅光子商业化资本强度高、执行风险大；这笔收购把潜在 IP 负担转化为 Celestial AI EAM 技术位置上的竞争资产。
