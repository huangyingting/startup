      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              **主要增长驱动：**

              （1）AI 集群扩展：GPU/XPU 集群规模正在从数百个单元扩展到数百万个单元；每个节点都需要向相邻节点提供数百 Gbps 带宽。Jensen Huang 在 GTC 2025 指出，每个 GPU
              需要六个可插拔收发器、每个消耗 30W；扩展到 1M GPU 集群，会形成 180MW 的收发器功耗问题，只有光学共封装能解决。（2）铜的物理极限：在 400G SerDes 速度下，被动铜的有效距离跌至 1m
              以下；到 1.6T 目标时，铜基本不可行。（3）能效：截至 2025 年初，主要超大规模云厂商的电互连约消耗集群总功耗的 30%；CPO 将每 bit 能耗相对可插拔光学降低约 3 倍（约 5 pJ/bit
              对比约 15 pJ/bit）。（4）数据中心 capex 增长：2025 年 Q3 全球数据中心 capex 同比增长 59%，形成巨大基础设施投资，并将包含光学升级周期。（5）NVLink/UALink
              迁移：NVIDIA 与 Marvell 的 NVLink Fusion 合作显示，行业正在转向光学 scale-up fabric；UALink 的架构也同样预留了光接口。


              **采用约束：**

              （1）资本强度和制造复杂度：TSMC CoWoS 先进封装昂贵，产能有限、交期长——无论需求如何，供给侧都会形成瓶颈。（2）集成复杂度：芯片设计必须为光 I/O 重新设计；超大规模云厂商和芯片公司需要 2–3
              年设计周期。（3）技术成熟度：2026 年 CPO 渗透率约 0.5%；高量部署预计要到 2028–2030 年（LightCounting 共识）。（4）切换成本和生态风险：运营铜基
              NVLink/NVSwitch 系统的超大规模云厂商，要采用光学 scale-up 就必须重设计集群；迁移技术风险高、资本强度大。（5）竞争性的专有方案：NVIDIA 掌控
              NVLink，并对超大规模云厂商有强锁定效应；转向开放光学标准需要生态协同。
            claimRefs:
              - CM001
              - CM003
              - CM004
              - CM001
              - CM002
              - CM003
      - number: '2.5'
        title: 规模测算证据缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >
              Celestial AI 所处具体细分——scale-up 光学 chiplet（面向 XPU 封装的硅光子中介层和 CPO）——市场规模估计差异很大，且不可直接比较。仅 CPO 市场一项，2025 年估计就从
              $95M 到 $2B 不等，取决于纳入口径；硅光子市场使用不同边界定义；LightCounting 的 AI 集群光学数字包含可插拔模块，而那并不是 Celestial AI 的产品。


              最重要的规模测算缺口在于，没有独立分析师针对 Celestial AI 所占据的 scale-up 光学 chiplet 子细分发布专门预测。Marvell 对 FY2028 Q4 的 $500M ARR
              目标意味着具体的公司层面收入预测，但它是公司自称的前瞻预测，不是独立市场规模。要对齐这些数字，需要从超大规模云集群规模假设自下而上推导（XPU 数量 × 每个 XPU 的 chiplet 数量 × 每个
              chiplet 的 ASP），而这些信息未公开。Mordor Intelligence（CPO CAGR 37%）、Precedence
              Research（30.66%）与一般硅光子预测（29.5%）之间的矛盾估计，反映了市场对时点和采用速度确实存在不确定性。
            claimRefs:
              - CM004
              - CM005
      - number: '2.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 结构性顺风——铜正在撞上物理极限
            body: >
              在 400G+ SerDes 速度下，被动铜缆有效距离跌至 1 米以下。这不是成本或偏好问题，而是物理问题。大型 AI 集群要扩展到几千个 XPU 以上，转向光学 scale-up fabric
              已不可回避。这会创造一个耐久且持续增长的市场；在前沿集群规模下，铜基方案已无可替代。
            calloutType: strength
            claimRefs:
              - CM001
              - CM003
          - type: callout
            title: 市场时点——2026 年 CPO 渗透率仅 0.5%
