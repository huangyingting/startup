  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              与 Celestial AI 的 Photonic Fabric 平台相关的 AI 数据中心光互连竞争格局可分为四层。第一层是直接光学 chiplet 同行——推动封装内或共封装硅光子 chiplet，用于
              XPU-to-XPU 和 XPU-to-memory scale-up 链路——最重要的是 Ayar Labs，其次是
              Ranovus。第二层是平台型在位者，它们从既有半导体或系统优势出发，已经推出或正积极开发硅光子光学 chiplet：Intel Silicon Photonics、Broadcom（CPO）和
              NVIDIA（NVLink 生态）。第三层是成熟光学组件制造商，主要是 Coherent Corp，它们在相邻 CPO/LPO 产品线上规模化竞争。第四层是 LightMatter，这家光子计算和互连创业公司的
              Passage 光子中介层，虽架构路径不同，但与 Celestial AI 的互连用例重叠。


              整个光学 chiplet 品类必须替代的现状技术，是 NVIDIA 基于铜的 NVLink scale-up fabric。第五代（Blackwell）NVLink 支持每块 GPU 总带宽 1.8
              TB/s，并支持最高 576 GPU 的 pod。UALink 联盟——覆盖 Broadcom、AMD、Intel、Google、Microsoft、Cisco 和 Meta——于 2025 年 4
              月发布开放标准 UALink 1.0 规范，目标是单个 AI pod 最多连接 1,024 个加速器；但硬件预计最早也要到 2026 年底，这使 NVLink 在报告日期仍是唯一已出货的高带宽 scale-up
              fabric。


              竞争对手融资明显提速：Ayar Labs 于 2026 年初完成 $500M Series E（累计 $870M），LightMatter 于 2024 年 10 月完成 $400M（累计 $850M，估值
              $4.4B），Ranovus 于 2025 年 8 月承诺在 Ottawa 投入 $100M+ 扩产。竞争强度很高，制造准备度、生态入口和架构针对性上的差异，将决定设计导入胜负。
