      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: 或有对价结构显著限制 Marvell 下行
            body: >
              总潜在对价中约 41%（$5.5B 中的 $2.25B）取决于累计收入里程碑。悲观情景下，无论或有对价是否达成，交易都以 $3.25B
              前置对价结算。对于商业化前技术收购，这是最佳实践式设计：限制收购方下行，同时让创始人和被收购方管理层与商业执行对齐。
            calloutType: strength
            claimRefs:
              - CV037
              - CV001
              - CV002
              - CV014
          - type: callout
            title: 收购时零披露收入带来重大执行风险
            body: >
              Celestial AI 交割时收入极低，且未披露任何超大规模云厂商大规模采购承诺。Marvell 的 $500M ARR 目标要求从零起步，在 18
              个月内完成成功商业爬坡。毛利率、定价结构和客户认证时间线均未披露；没有额外尽调，就无法独立评估或有对价可实现性。
            calloutType: risk
            claimRefs:
              - CV009
              - CV034
              - CV008
          - type: callout
            title: 估值立场：前置价格合理；外部观察者应继续研究
            body: >
              相对光子 M&A 先例和 Marvell 自身收购纪律，$3.25B 前置价格合理。全额或有对价下 $5.5B 的情景也有吸引力。对外部观察者而言，在 Marvell FY2028 财报证明 Celestial
              AI 首笔收入前，继续研究更合适。这个单一数据点会把估值案例从推测转为有证据支撑。
            calloutType: recommendation
            claimRefs:
              - CV007
              - CV010
              - CV012
          - type: callout
            title: NVIDIA 的 $2B NVLink Fusion 承诺是最强外部验证信号
            body: >
              NVIDIA 在 March 2026 对 Marvell 关系投入 $2 billion，并明确提到硅光子和 NVLink Fusion 集成；这是最可信的独立信号，说明 Celestial AI 的
              Photonic Fabric 将整合进主导性的 AI 基础设施平台。该承诺发生在收购交割之后，未被纳入原始交易定价，因此为估值逻辑带来增量上行验证。
            calloutType: insight
            claimRefs:
              - CV033
              - CV004
          - type: callout
            title: 基准情景假设超大规模云厂商认证在交割后 18 个月内完成
            body: >
              Marvell 对 Q4 FY2028 的 $500M ARR 目标，意味着 Photonic Fabric 的超大规模云厂商客户认证周期要在 February 2026 交割后约 18
              个月内完成。半导体光学组件认证通常需要 12–24 个月。基准情景假设位于历史认证时间线偏乐观的一端，应针对潜在延迟做压力测试。
            calloutType: assumption
            claimRefs:
              - CV016
              - CV034
              - CV035
