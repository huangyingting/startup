      - number: '4.6'
        title: 财务风险与结论
        blocks:
          - type: paragraph
            body: >
              投资逻辑的首要财务风险，是或有对价无法达成。如果 Celestial AI 到 Marvell FY2029 年底前未能产生 $500 million 累计收入，约三分之一或有对价不会归属；如果累计收入仍低于
              $2.0 billion，全部或有对价都会失效，总交易价值上限将停在 $3.25 billion。考虑到实质收入预计要到 H2 FY2028 才开始，Marvell 只有约两年窗口（H2 FY2028 至
              FY2029），要让一项收购时尚无商业部署的技术累计贡献 $500 million to $2.0 billion 收入。


              其他财务风险包括：（1）整合执行——AI 光子技术难度高，客户认证周期通常超过 12 to 18 个月；（2）收入确认节奏——半导体定制硅收入不均匀、由里程碑驱动，季度运行率目标容易受少数 design-win
              部署影响；（3）竞争替代——Broadcom 和 NVIDIA 的内部光子项目可能在 Celestial AI 规模化前侵蚀可得市场；（4）成本超支——随着制造爬坡需要增加人手，每年 $50 million 非
              GAAP opex 可能扩大；（5）估值重估风险——Marvell 公告时股价约为 $82 to $87 每股，若持续下跌，将降低首期股票对价和或有对价股票的实际价值。


              财务结论：Celestial AI 被收购时是一家尚未产生收入、烧钱速度高的半导体设计初创公司，IP 和战略位置强，但没有独立盈利路径。投资理由完全前瞻，取决于 Marvell 能否在 24 to 36
              个月窗口内，把 Photonic Fabric 技术商业化并卖给超大规模云厂商。毛利率、单位经济和定价均未披露，是评估或有对价可达成性的阻断性尽调缺口。
