  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 技术执行风险
        blocks:
          - type: paragraph
            body: >
              Celestial AI 的 Photonic Fabric 是一种硅光光学 chiplet，采用 TSMC 先进工艺节点制造的电吸收调制器（EAM），并通过 CoWoS
              先进封装共封装。四项相互交织的技术风险可能影响收入爬坡。


              制造良率和产能。基于 EAM 的 chiplet 在高产量下的硅光良率尚未公开披露。Celestial AI 已报告至少四次成功 tapeout，并在 -10 dBm OMA 输入下实现低于 1e-8 的
              pre-FEC 误码率，这与制造就绪的光子良率相一致，但量产良率曲线仍未公开。近期更尖锐的约束是 TSMC CoWoS 先进封装产能：TSMC CoWoS 产线到 2026 年已售罄，NVIDIA 为
              Blackwell 和 Rubin GPU 项目预留了估计 60–70% 的 CoWoS-L 产能。即便 TSMC 目标是在 2026 年底前把 CoWoS 月产能从约 70,000 片晶圆扩至 130,000
              片，独立分析师仍预计需求将持续超过供给。这给 Marvell 带来预留时间线风险：任何 CoWoS 档期锁定延迟，都会直接推迟 Photonic Fabric 量产爬坡和 $500M ARR
              目标。TrendForce 于 2026 年 4 月报道称，CoWoS 先进封装晶圆 ASP 据报道正接近 7nm 晶圆水平，显著增加单位成本压力。


              热管理。共封装光学把光引擎放在高温 XPU die 附近，形成一个规模化后并不简单的热协同管理挑战。EAM 在这里有明显优势：Celestial AI CTO Phil Winterbottom 在 Hot
              Chips 2025 展示，EAM 可承受最高 200°C per second 的温度跃迁，并在超过 85°C
              的波动下运行而不损害信号完整性；这直接优于微环调制器，后者需要精细热控制。但在同一先进封装内同时管理 XPU die 和激光泵源的综合热包络，仍是一个正在解决的工程问题。


              集成软件和技术过时。用于管理多机架 AI 集群光 I/O
              的固件和软件栈，在全行业都尚未成熟。与铜互连相比，光链路的配置管理、故障隔离和动态重配置增加了复杂度。此外，替代光子平台——绝缘体上铌酸锂（LNOI）、磷化铟（InP）和 III-V
              族化合物半导体——仍在进步，其中 LNOI 因超低插入损耗和高带宽密度尤其受到研究关注。若任何替代平台以有竞争力的成本实现兼容 CMOS 的量产，基于 EAM 的硅光可能在 5–7 年周期内面临技术过时风险。
