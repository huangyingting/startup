  - id: s3
    title: Revenue Model and Marvell Projections
    body: |
      Celestial AI had de minimis recognized revenue at acquisition, consistent with its position as
      an early-stage semiconductor design company completing development-phase tape-outs and
      transitioning to commercialization. Marvell's official closing press release projects that
      revenue contributions will begin in the second half of fiscal year 2028 (Marvell's fiscal year
      ends in late January), with revenue ramping meaningfully in the fourth quarter to a $500 million
      annualized run rate. Revenue is then expected to double to a $1 billion annualized run rate by
      the fourth quarter of fiscal year 2029. These projections are Marvell management's company-
      claimed forward guidance carrying standard forward-looking statement caveats.

      By Q4 FY2026 earnings (released March 2026), Marvell updated its combined near-term outlook:
      Celestial AI and XConn Technologies (another acquisition closed after fiscal year-end) are
      expected to contribute approximately $250 million in aggregate to FY2028 revenue. This figure
      implies the longer-term $500 million ARR trajectory remains intact but is stated as a combined
      contribution, not broken out by entity. Marvell's CEO Matt Murphy cited a total addressable
      market of approximately $10 billion for scale-up connectivity, positioning Celestial AI as the
      primary vehicle for capturing that market. Marvell reported FY2026 actual revenue of $8.195
      billion (+42% year-over-year), with FY2027 guidance of approximately $11 billion and FY2028
      guidance of approximately $15 billion — a trajectory that implicitly requires Celestial AI and
      other photonics programs to contribute material incremental revenue within two fiscal years.

      The revenue model within Marvell follows a custom-silicon and licensing structure consistent
      with Marvell's Data Center Group. Hyperscaler customers — including Amazon, which holds a
      warrant — are expected to be primary revenue sources. No specific pricing, volume commitments,
      or contract structures have been publicly disclosed.
