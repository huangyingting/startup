  - id: s6
    title: Financial Risks and Verdict
    body: |
      The primary financial risk to the investment thesis is earn-out non-achievement. If Celestial AI
      fails to generate $500 million in cumulative revenue by Marvell's FY2029 year-end, approximately
      one-third of the earn-out will not vest, and if cumulative revenue remains below $2.0 billion,
      the full earn-out is forfeited — capping total transaction value at $3.25 billion. Given that
      meaningful revenue is not expected until H2 FY2028, Marvell has approximately a two-year window
      (H2 FY2028 through FY2029) to accumulate $500 million to $2.0 billion in cumulative revenue
      from a technology that had no commercial deployments at acquisition.

      Additional financial risks include: (1) integration execution — photonics-for-AI is technically
      demanding and requires customer qualification cycles typically exceeding 12 to 18 months;
      (2) revenue recognition timing — semiconductor custom silicon revenue is lumpy and milestone-
      driven, making quarterly run-rate targets sensitive to a handful of design-win deployments;
      (3) competitive displacement — Broadcom's and NVIDIA's internal photonics programs could erode
      the available market before Celestial AI reaches scale; (4) cost overruns — the $50 million
      annual non-GAAP opex figure may expand as manufacturing scale-up requires additional headcount;
      and (5) valuation re-rating risk — Marvell's stock price at announcement was approximately
      $82 to $87 per share, and a sustained decline would reduce the effective value of both the
      upfront stock consideration and earn-out shares.

      Financial verdict: Celestial AI's profile at acquisition was that of a pre-revenue,
      high-burn semiconductor design startup with strong IP and strategic positioning but no independent
      path to profitability. The investment rationale is entirely forward-looking, dependent on
      Marvell's ability to commercialize Photonic Fabric technology for hyperscaler customers within
      a 24 to 36 month window. Gross margin, unit economics, and pricing have not been disclosed
      and represent blocking diligence gaps for assessing earn-out achievability.
