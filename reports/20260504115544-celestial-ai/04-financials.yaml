    layout: standard
    summary: |
      Compact summary of the key financial metrics known at the February 2, 2026 acquisition close:
      deal structure, total capital raised, projected revenue run rates, and implied metrics.
    data:
      items:
        - label: Upfront acquisition price
          value: $3.25B
          unit: null
          note: $1B cash + ~$2.25B in MRVL stock (27.2M shares)
        - label: Maximum total consideration
          value: $5.5B
          unit: null
          note: Includes up to ~$2.25B earn-out in MRVL stock
        - label: Total venture capital raised
          value: 515
          unit: USD M
          note: Seed through Series C1 (five rounds)
        - label: Upfront / total raised ratio
          value: 6.3
          unit: x
          note: ~6.3x on upfront; ~10.7x if full earn-out achieved
        - label: Q4 FY2028 ARR target
          value: 500
          unit: USD M annualized
          note: Marvell management guidance (company-claimed)
        - label: Q4 FY2029 ARR target
          value: 1000
          unit: USD M annualized
          note: Marvell management guidance (company-claimed)
        - label: Headcount at acquisition
          value: 147
          unit: employees
          note: Midpoint of 141–152 disclosed range
        - label: Annual non-GAAP opex addition
          value: 50
          unit: USD M
          note: Incremental to Marvell run rate; per closing press release
    approximationNotes: |
      Upfront/total raised ratio is $3,250M divided by $515M. Headcount uses midpoint of
      141–152 disclosed range. Total consideration multiples use disclosed $2.5B pre-money Series C1
      valuation. Earn-out maximum value of ~$2.25B is based on Marvell's 10-day VWAP at deal
      announcement; actual effective value fluctuates with MRVL stock price.
