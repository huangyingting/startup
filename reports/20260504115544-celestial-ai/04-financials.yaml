  - id: s4
    title: Unit Economics and Cash Consumption
    body: |
      Celestial AI never disclosed standalone revenue, gross margin, or operating cost structure
      prior to acquisition. As a private semiconductor startup completing development-stage tape-outs
      and transitioning to commercialization, the company had de minimis revenues but incurred
      material operating expenses including chip design costs, packaging R&D, manufacturing tape-outs,
      and IP maintenance — including the $20 million Rockley Photonics IP purchase. No quarterly or
      annual income statement data is available from any public source.

      Implied cash burn can be estimated from the funding timeline. The $250 million Series C1 closed
      in March 2025, followed by the acquisition announcement nine months later in December 2025. A
      141 to 152 employee semiconductor design house with advanced packaging programs and multiple
      tape-out cycles typically operates at $15 to $25 million per month in cash consumption.
      At that range, the $250 million Series C1 would have provided approximately 10 to 17 months of
      runway, placing the acquisition announcement at or near the end of funded runway. This is a
      secondary inference, not a disclosed figure, and should be treated with low confidence.

      At the $3.25 billion upfront acquisition price and approximately 141 to 152 employees, the
      implied acquisition price per employee is approximately $21 to $23 million — a metric reflecting
      the premium paid for the IP portfolio, engineering talent, and Marvell's projected future revenue
      generation rather than any current financial performance. The venture return for Series C1
      investors who invested at a $2.5 billion pre-money valuation is approximately 1.3 times on the
      upfront consideration alone, rising to potentially 2.2 times if full earn-outs are achieved.
    claimRefs:
