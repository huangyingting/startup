  - id: FI004
    title: Celestial AI Revenue Model Bridge within Marvell Data Center Group
    type: flow
    layout: wide
    summary: |
      How Celestial AI's Photonic Fabric technology is expected to generate revenue within Marvell's
      Data Center Group, from hyperscaler design wins through annualized run-rate targets and the
      earn-out milestone gates.
    data:
      nodes:
        - id: photonic-fabric
          label: Photonic Fabric Platform
          detail: Optical scale-up interconnect; EAM-based; targeting AI data center racks
        - id: design-wins
          label: Hyperscaler Design Wins
          detail: Amazon and Tier-1 cloud customers; 12–24 month qualification cycles
        - id: marvell-dcg
          label: Marvell Data Center Group
          detail: Integration vehicle; leverages existing MRVL customer relationships
        - id: revenue-ramp
          label: Revenue Ramp (H2 FY2028)
          detail: Initial shipments; custom silicon production volumes
        - id: q4-fy2028
          label: 'Q4 FY2028: $500M ARR Target'
          detail: Marvell management guidance; partial earn-out threshold = $500M cumulative
        - id: q4-fy2029
          label: 'Q4 FY2029: $1B ARR Target'
          detail: 'Full earn-out: $2B cumulative revenue by FY2029 year-end'
        - id: earnout-gate
          label: Earn-Out Gate
          detail: 1/3 vests at $500M cumulative; full vests at $2B cumulative by FY2029
      edges:
        - from: photonic-fabric
          to: design-wins
        - from: design-wins
          to: marvell-dcg
        - from: marvell-dcg
          to: revenue-ramp
        - from: revenue-ramp
          to: q4-fy2028
        - from: q4-fy2028
          to: q4-fy2029
        - from: q4-fy2028
          to: earnout-gate
        - from: q4-fy2029
          to: earnout-gate
    approximationNotes: |
      Node sequence reflects Marvell's disclosed integration path. Qualification timelines of 12 to
      24 months are inferred from semiconductor custom silicon industry norms, not disclosed by
      Marvell. Customer names are illustrative; Marvell has confirmed Amazon via the warrant but
      has not publicly disclosed other specific Celestial AI customer names.
