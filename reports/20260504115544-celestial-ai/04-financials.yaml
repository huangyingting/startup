callouts:
  - calloutType: risk
    title: Earn-Out Contingency Creates Material Headline-Value Uncertainty
    body: |
      The $5.5 billion headline acquisition value requires Celestial AI to generate more than
      $2.0 billion in cumulative revenue by Marvell's FY2029 year-end — a target requiring an
      unprecedented ramp for a technology with no commercial deployments at acquisition close.
      Even the partial trigger ($500M cumulative) demands substantial execution with only a
      24-month window from when revenue contributions are expected to begin.
    claimRefs:
      - C133
      - C113
      - C113
  - calloutType: insight
    title: Amazon Warrant Signals Anchor-Customer Commitment
    body: |
      Marvell's simultaneous issuance of a warrant to Amazon for approximately $90 million of MRVL
      stock (based on cumulative photonic fabric purchases through 2030) provides the strongest
      public signal of committed customer demand. The warrant structure aligns Amazon's incentives
      with Celestial AI's revenue ramp and provides independent corroboration of forward demand
      beyond management guidance alone.
    claimRefs:
      - C120
      - C109
  - calloutType: assumption
    title: Revenue Projections Are Marvell Management Guidance Only
    body: |
      The $500M ARR (Q4 FY2028) and $1B ARR (Q4 FY2029) projections are Marvell management
      estimates, not contracted revenue, analyst consensus, or independently verified demand signals.
      No third-party verification of these figures exists as of the report date. Diligence cannot
      underwrite the earn-out probability without access to design-win contracts, volume commitments,
      and hyperscaler capex allocation data.
    claimRefs:
      - C123
      - C124
      - C117
