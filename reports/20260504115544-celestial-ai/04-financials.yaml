chapter:
  number: 4
  title: Financials
  summary: |
    Celestial AI was acquired by Marvell Technology on February 2, 2026 for $3.25 billion upfront
    ($1 billion cash plus approximately 27.2 million MRVL shares valued at approximately $2.25 billion)
    with up to $2.25 billion in additional earn-out shares tied to cumulative revenue milestones by the
    end of Marvell's fiscal year 2029. Total potential consideration reaches $5.5 billion. The company
    had de minimis revenue at acquisition, having raised approximately $515 million across five rounds
    (Seed through Series C1) at a peak independent valuation of $2.5 billion. Marvell projects
    $500 million in annualized run-rate revenue from Celestial AI by Q4 FY2028 and $1 billion by
    Q4 FY2029. No standalone financial statements are publicly available; revenue, gross margin, and
    burn rate remain private. The financial case rests on Marvell's forward guidance and strategic
    integration into its Data Center Group.
sections:
  - id: s1
    title: Funding History and Capital Structure
    body: |
      Celestial AI raised approximately $515 million across five external financing rounds between
      January 2021 and March 2025. The seed round of $2.87 million in January 2021 provided initial
      capital to advance the Photonic Fabric concept. A $56 million Series A led by Lux Capital
      followed in February 2022, enabling early silicon design work and initial tape-outs. Tiger Global
      Management led a $100 million Series B in June 2023 as the company advanced its first commercial
      prototypes and expanded its engineering team.

      The March 2024 Series C of $175 million, led by U.S. Innovative Technology Fund (USIT), was a
      pivotal strategic milestone: it introduced AMD Ventures, TSMC Ventures (VentureTech Alliance),
      Samsung Catalyst, and multiple hyperscaler-adjacent investors, validating the photonics-for-AI
      thesis at the supply-chain level. The round valued Celestial AI at $1.22 billion post-money,
      making it a unicorn. Thirteen months later, in March 2025, Celestial AI closed a $250 million
      Series C1 led by Fidelity Management and Research, with new participation from BlackRock,
      Maverick Silicon, and personal investment from Lip-Bu Tan (who simultaneously joined the board).
      This round valued the company at $2.5 billion post-money.

      Between the Series C and Series C1, Celestial AI acquired the Rockley Photonics IP portfolio in
      October 2024 for approximately $20 million — a balance-sheet use deploying cash at distressed
      prices to add over 200 patents covering electro-absorption modulators, optoelectronic
      systems-in-package, and optical switch technologies. Rockley had filed for Chapter 11 in early
      2023, making this a strategic opportunistic purchase that reinforced Celestial AI's IP moat
      ahead of its largest financing round and eventual exit.
    claimRefs:
      - CI001
      - CI002
      - CI003
