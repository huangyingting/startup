  - id: s2
    title: Acquisition Financial Terms
    body: |
      Marvell Technology announced the definitive acquisition agreement on December 2, 2025,
      alongside its fiscal Q3 FY2026 earnings, and closed the transaction on February 2, 2026.
      The deal structure comprises two components. The upfront consideration is approximately
      $1.0 billion in cash plus approximately 27.2 million shares of MRVL common stock valued at
      approximately $2.25 billion based on the 10-day volume-weighted average price prior to
      announcement, yielding approximately $3.25 billion in total upfront value. The contingent
      earn-out consideration is up to approximately 27.2 million additional MRVL shares
      (~$2.25 billion) tied to cumulative revenue milestones by the end of Marvell's fiscal year
      2029. The earn-out is structured in tranches: one-third unlocks if cumulative Celestial AI
      revenue reaches at least $500 million by FY2029 year-end, and the full earn-out vests only
      if cumulative revenue exceeds $2.0 billion.

      The cash portion was funded from Marvell's existing cash on hand, reducing its cash balance by
      $1 billion at closing and lowering expected annual interest income by approximately $38 million.
      The stock consideration required issuance of approximately 27 million new MRVL shares, increasing
      the diluted weighted-average share count by that amount. As part of the broader strategic
      partnership, Marvell simultaneously issued Amazon a warrant to purchase approximately
      1,045,171 MRVL shares at $87.0029 per share, with vesting based on Amazon's cumulative
      purchases of Photonic Fabric products through the end of 2030. The acquisition also adds
      approximately $50 million in annual non-GAAP operating expenses to Marvell's run rate,
      reflecting Celestial AI's engineering and development workforce.
