summary:
  headline: >
    Marvell 在关键拐点以 $3.25B 首付款买下了市场上技术最领先的硅光 scale-up 互连资产。收购逻辑说得通：靠 Marvell 的超大规模云厂商关系，把 Celestial AI 的 Photonic Fabric
    在 FY2028 前做成 $500M+ ARR。但这套逻辑仍压在零收入基础上，距离确认收入还有 18+ 个月执行跑道。2 年远期 ARR 的 6.5x 倍数处在 AI 硅片可比交易的保守端；只要 earn-out
    里程碑兑现，首付款就说得过去，$2.25B 或有对价也把激励对齐了。技术、时间和人才执行变量都大，风险评级为高。
