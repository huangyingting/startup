  - id: s3
    title: Funding History and Capital Structure
    body: |
      Celestial AI raised approximately $515 million in venture funding across five disclosed
      rounds before the Marvell acquisition. The earliest documented round was a seed raise of
      approximately $2.87 million in January 2021. In February 2022, the company completed a
      $56 million Series A led by imec.xpand and including Koch Disruptive Technologies,
      M Ventures, The Engine, Tyche Partners, and Xora Innovation (Temasek subsidiary).

      A $100 million Series B closed in June 2023, led by IAG Capital Partners, Koch
      Disruptive Technologies, and Xora Innovation, with Samsung Catalyst Fund, Smart
      Global Holdings, Porsche Automobil Holding SE, The Engine, imec.xpand, M Ventures,
      and Tyche Partners also participating. The Series B valued the company at approximately
      $500 million.

      In March 2024, a $175 million Series C closed, led by U.S. Innovative Technology Fund
      (USIT), at a valuation of approximately $1.22 billion. AMD Ventures joined as a
      strategic new investor alongside existing backers. In October 2024, Celestial AI
      acquired the Rockley Photonics patent portfolio to strengthen its Photonic Fabric IP.

      The Series C1 — $250 million (some reports cite $255 million) closed in March 2025 —
      was led by Fidelity Management & Research and brought in BlackRock, Maverick Capital
      (Maverick Silicon), Tiger Global Management, and Lip-Bu Tan as new investors. TSMC's
      VentureTech Alliance and Samsung Catalyst Fund also participated. This round valued
      Celestial AI at $2.5 billion, more than double the Series C valuation.

      On December 2, 2025, Marvell Technology announced a definitive agreement to acquire
      Celestial AI at $3.25 billion upfront ($1 billion cash plus approximately 27.2 million
      Marvell shares), with earn-outs of up to approximately $2.25 billion in additional
      equity if Celestial AI meets cumulative revenue milestones. The acquisition was
      completed on February 2, 2026.
