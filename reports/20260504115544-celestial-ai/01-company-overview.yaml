callouts:
  - calloutType: strength
    title: Exceptional Investor Quality and Breadth
    body: |
      Celestial AI attracted strategic investment from AMD Ventures, TSMC's VentureTech
      Alliance, Samsung Catalyst Fund, Temasek, Fidelity, BlackRock, and Tiger Global.
      This breadth signals both financial credibility and alignment across the AI chip
      supply chain — foundry (TSMC), memory (Samsung), chip customer (AMD), and large-cap
      financial institutions.
    claimRefs:
      - C019
      - C020
      - C021
      - C022
      - C023
  - calloutType: strength
    title: Marvell Acquisition Validates Technology at Premium
    body: |
      Marvell's $3.25B upfront acquisition price represents a 30% premium to the $2.5B
      last-round valuation and signals strategic confidence in Photonic Fabric's commercial
      potential. The earn-out structure (up to $2.25B additional equity) further aligns
      Celestial AI's team incentives with Marvell's revenue targets of $500M ARR by Q4 FY2028.
    claimRefs:
      - C023
      - C024
      - C031
  - calloutType: risk
    title: Key-Person Concentration in CEO and CTO
    body: |
      Dave Lazovsky (CEO) and Phil Winterbottom (CTO) represent the primary IP
      origination and commercial leadership. Board chairman Lip-Bu Tan joined only
      January 2025. The acquisition by Marvell introduces integration risk regarding
      team retention, particularly for the CTO who is the principal Photonic Fabric
      architect.
    claimRefs:
      - C006
      - C007
      - C008
  - calloutType: risk
    title: Revenue Pre-Acquisition Was De Minimis
    body: |
      Marvell's acquisition announcement projected $500M annualized revenue from
      Celestial AI only by Q4 FY2028, implying minimal recognized revenue at acquisition
      close. The company never publicly disclosed ARR, customer count, or signed contracts,
      indicating a pre-revenue or very early-revenue stage at the time of exit.
    claimRefs:
      - C028
      - C029
  - calloutType: insight
    title: Rockley Photonics IP Acquisition as Strategic Moat Move
    body: |
      Celestial AI's October 2024 acquisition of Rockley Photonics' patent portfolio —
      obtained at distressed prices following Rockley's bankruptcy — is a textbook
      strategic IP consolidation move. This strengthens defensive moat and reduces
      freedom-to-operate litigation risk from the photonics IP field.
    claimRefs:
      - C030
