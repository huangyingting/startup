chapter:
  number: 1
  title: Company Overview
  summary: |
    Celestial AI was a Santa Clara-based semiconductor/photonics startup founded in 2020 by
    Dave Lazovsky and Preet Virk. The company developed Photonic Fabric, an optical
    interconnect platform for AI data centers. After raising $515M across five rounds at a
    peak independent valuation of $2.5B, Marvell Technology announced its acquisition in
    December 2025 and completed it on February 2, 2026 at an upfront value of $3.25B
    (with earn-outs potentially lifting total consideration above $5B). As of report date
    (May 4, 2026) Celestial AI operates as a wholly-owned Marvell subsidiary.
sections:
  - id: s1
    title: Identity, Headquarters, and Stage
    body: |
      Celestial AI, Inc. was incorporated as a Delaware corporation and headquartered at
      2962 Bunker Hill Lane, Suite 200, Santa Clara, CA 95054. Additional offices were
      maintained in Irvine, CA; Toronto, Ontario; and Hyderabad, India. As of the report
      date the company is a wholly-owned subsidiary of Marvell Technology, Inc., following
      the completion of Marvell's acquisition on February 2, 2026.

      The company was founded in 2020 by David (Dave) Lazovsky and Preet Virk, both with
      backgrounds in semiconductors and photonics. A third co-founder, Michelle Tomasko, is
      also cited in funding disclosures. The company positioned itself as the creator of
      Photonic Fabric, described as an optical scale-up interconnect platform that replaces
      copper-based electrical interconnects inside AI accelerator systems and data centers.
      Celestial AI's single product line is this Photonic Fabric platform, targeting
      hyperscalers, AI chip companies, and data-center operators.

      At the time of its last independent funding round (March 2025), Celestial AI had
      approximately 141–152 employees and had completed four TSMC 5/4 nm tape-outs of its
      electro-optical integrated circuits (EICs). Its business model combined chip licensing
      and custom silicon partnerships with Tier-1 hyperscalers and semiconductor companies.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO003
      - CO003
  - id: s2
    title: Founding Team and Leadership
    body: |
      David (Dave) Lazovsky serves as Co-Founder and CEO. Before Celestial AI, Lazovsky
      founded Intermolecular, Inc. in 2004 and led it from inception through its 2011 IPO,
      serving as President, CEO, and board member until October 2014. He subsequently served
      as Executive Chairman of POET Technologies and as board member of ESS, Inc., giving
      him deep experience commercializing complex semiconductor technologies at scale.

      Preet Virk is Co-Founder and COO. Phil Winterbottom serves as CTO; he began his career
      in the Computer Research group at Bell Labs and co-founded two subsequent startups —
      Entrisphere (acquired by Ericsson) and Gainspeed (acquired by Nokia). The CTO's
      architecture work underpins the Photonic Fabric's core design, including the
      electro-absorption modulator (EAM) approach and analog-only SerDes.

      Kelyn Brannon was appointed CFO in June 2024, adding financial leadership in
      anticipation of the company's commercialization phase. The executive team also includes
      Narayan Kaniyur (SVP Engineering), Steven Metz (VP Sales), Ankur Aggarwal (VP
      Advanced Packaging & Supply Chain), Subal Sahni (VP Photonics Engineering), and
      Victoria Sevilla (VP People).

      The Board of Directors is chaired by Lip-Bu Tan (Walden International founding
      managing partner; former Cadence Design Systems CEO; joined January 2025), who also
      invested personally in the Series C1. Other board members include Diane Bryant
      (independent director; appointed April 2024), Bethany Mayer (cybersecurity background),
      Peter Tague (investor representative), Alonso Galvan (IAG Capital Partners co-founder),
      and Isaac Sigron (Koch Disruptive Technologies managing partner). The CEO sits on the
      board, creating a single point of key-person concentration.
