  - id: s4
    title: Cover Metrics and Scale
    body: |
      The headline metrics available from public sources are: $2.5 billion last-round
      independent valuation (March 2025 Series C1); $3.25 billion upfront Marvell
      acquisition price (announced December 2, 2025; closed February 2, 2026); total
      venture capital raised of $515 million; and employee headcount of approximately
      141–152 at time of acquisition.

      Revenue and ARR are private. GetLatka reported $19.5 million revenue for Celestial AI
      prior to acquisition, but this figure is unverified by primary sources and should be
      treated as an estimate. Gross margins, burn rate, and cash runway were not disclosed.
      Customer count is undisclosed; the company described "multiple Tier-1 hyperscaler
      engagements" without naming customers publicly. Named customer deployments, production
      contracts, and NRR are not publicly available.

      Marvell's acquisition announcement included forward-looking revenue targets: $500
      million annualized run-rate by Q4 FY2028 (ending January 2028) and $1 billion
      annualized by Q4 FY2029, suggesting Celestial AI had minimal recognized revenue at
      closing. These targets are company-claimed forecasts.
    claimRefs:
