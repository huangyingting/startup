  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Earn-out milestone terms
      missingEvidence: >-
        The specific revenue thresholds, measurement periods, revenue definitions, and partial-
        payout structures for the $2.25B Celestial AI earn-out have not been publicly disclosed.
      whyItMatters: >-
        Without milestone clarity, it is impossible to independently model the probability
        of earn-out payment, expected total acquisition cost, or residual financial risk
        to Marvell shareholders. Former Celestial AI employees and investors cannot verify
        milestone alignment.
      diligencePath: >-
        Request the merger agreement Schedule of Earn-Out Conditions via SEC EDGAR (if Marvell
        is required to file it as a material contract exhibit); alternatively, seek investor
        day disclosure or M&A advisor confirmation of milestone structure.
      relatedQuestionRefs: [RQ703, RQ729]
      relatedTableRefs: [T701, T702]

    - type: missing-source
      severity: material
      topic: Celestial AI manufacturing capacity and yield data
      missingEvidence: >-
        No third-party yield audit, independent analysis, or public disclosure covers EAM
        silicon photonics chiplet yields at production volumes (>10,000 wafers per month).
        Additionally, the specific CoWoS-L capacity reservation level that Marvell/Celestial AI
        has negotiated with TSMC for FY2026–FY2027 production is not publicly disclosed.
      whyItMatters: >-
        Yield at volume is the primary uncertainty in unit economics modeling. Low or
        unstable yield would materially increase cost per unit and delay the ARR ramp.
        The CoWoS reservation level determines whether Marvell can scale to the volumes
        required to hit the earn-out milestones.
      diligencePath: >-
        Commission an independent wafer-level yield audit at TSMC; alternatively, request
        Marvell management disclosure in the first Celestial AI integration update at an
        investor day or earnings call. Request TSMC capacity reservation confirmation
        through Marvell's supply chain team.
      relatedQuestionRefs: [RQ701, RQ702]
      relatedTableRefs: [T704]

    - type: missing-source
      severity: material
      topic: NVLink Fusion commercial exclusivity terms
      missingEvidence: >-
        The commercial terms of the NVIDIA–Marvell NVLink Fusion partnership — including
        whether Marvell/Celestial AI has exclusive optical chiplet supply rights, pricing
        mechanics, and termination provisions — are not publicly disclosed.
      whyItMatters: >-
        If NVIDIA can switch optical chiplet suppliers (e.g., to Ayar Labs) without penalty,
        the NVLink Fusion partnership is a weaker competitive moat than assumed in the
        Marvell investment thesis.
      diligencePath: >-
        Review the NVLink Fusion partnership agreement filed as a material contract with
        the SEC; request Marvell management clarification at the next investor day.
      relatedQuestionRefs: [RQ712]
      relatedTableRefs: [T703]

    - type: private-evidence-only
      severity: material
      topic: Retention agreements for Dave Lazovsky and Phil Winterbottom
      missingEvidence: >-
        Confirmed multi-year retention equity grants, contractual lock-up periods, and
        performance milestone terms for the two co-founders have not been publicly disclosed.
      whyItMatters: >-
        Without confirmed retention, key-person departure risk is effectively open-ended,
        representing the single most immediate organizational risk to the Photonic Fabric
        program. Co-founders with liquidity from the $3.25B acquisition have reduced
        forward retention incentive from standard RSU grants.
      diligencePath: >-
        Request SEC Form 4 disclosures for both executives to track equity grant and
        vesting schedules; seek Marvell human-capital disclosure in the FY2026 proxy statement.
      relatedQuestionRefs: [RQ714, RQ715]
      relatedTableRefs: [T705]

