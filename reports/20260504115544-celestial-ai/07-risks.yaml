  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Earn-out milestone revenue definitions and measurement methodology not publicly disclosed
      missingEvidence: >-
        The specific revenue classification rules, measurement period details, and qualifying revenue definitions for
        the Celestial AI earn-out milestones have not been publicly filed. The SEC 8-K confirms the $500M and $2.0B
        cumulative revenue thresholds but does not disclose how revenue is calculated or what constitutes qualifying
        Celestial AI revenue.
      whyItMatters: >-
        Without knowing the measurement methodology, neither Marvell shareholders nor former Celestial AI stakeholders
        can assess the probability of full earn-out payment. Milestone ambiguity is a direct driver of California
        employment law litigation risk.
      diligencePath: >-
        Request Marvell's earn-out schedule and revenue recognition policy for Celestial AI; review acquisition
        agreement Exhibit A for milestone definitions; request legal opinion on California Labor Code enforceability.
      relatedQuestionRefs:
        - RQ706
        - RQ720
      relatedTableRefs:
        - T702
    - type: private-evidence-only
      severity: material
      topic: EAM silicon photonics production-volume yield data is not publicly available
      missingEvidence: >-
        Celestial AI and Marvell have disclosed engineering milestones (4 tapeouts, BER <1e-8) but no production-volume
        yield curves, known-good-die rates, or independent third-party yield audits have been published. Unit economics
        at the $500M ARR target depend critically on yield assumptions that cannot be verified from public sources.
      whyItMatters: >-
        Yield at production scale is the single most important determinant of Photonic Fabric unit economics. Without
        this data, the financial returns from the $3.25B acquisition cannot be independently verified.
      diligencePath: >-
        Request internal Marvell yield data post-acquisition; commission independent silicon photonics yield audit
        from a qualified third-party test house (e.g., Teradyne, Onto Innovation).
      relatedQuestionRefs:
        - RQ701
        - RQ707
      relatedTableRefs:
        - T704
    - type: private-evidence-only
      severity: material
      topic: TSMC CoWoS capacity reservation terms for Marvell are not publicly disclosed
      missingEvidence: >-
        TSMC's CoWoS capacity allocations are commercial agreements not publicly filed. The TSMC VentureTech Alliance
        investment in Celestial AI signals a preferential relationship, but no public announcement confirms Marvell's
        specific CoWoS-L reservation quantity, pricing, or delivery timeline for Photonic Fabric production volumes.
      whyItMatters: >-
        CoWoS capacity availability is the critical path for the Photonic Fabric revenue ramp. Without a confirmed
        reservation, the production timeline supporting earn-out milestones cannot be independently assessed.
      diligencePath: >-
        Request Marvell's TSMC supply agreement terms and CoWoS capacity commitment schedule; obtain TSMC formal
        capacity allocation confirmation for Photonic Fabric production ramp.
      relatedQuestionRefs:
        - RQ704
        - RQ707
    - type: private-evidence-only
      severity: material
      topic: Retention contract terms for Lazovsky and Winterbottom not publicly disclosed
      missingEvidence: >-
        Marvell has not publicly disclosed the retention equity terms, performance vesting conditions, or departure
        provisions for Dave Lazovsky and Phil Winterbottom. Without confirmed multi-year retention contracts tied to
        technical milestones, key-person departure risk cannot be assessed as mitigated.
      whyItMatters: >-
        Co-founder departure within 24 months is assessed as the highest-severity personnel risk and would directly
        impair technology execution, customer relationships, and earn-out milestone achievement.
      diligencePath: >-
        Request confirmation from Marvell that multi-year retention agreements with cliff and milestone vesting have
        been executed for both co-founders; verify continuity of role with meaningful authority in the Marvell DCG.
      relatedQuestionRefs:
        - RQ728
        - RQ730
