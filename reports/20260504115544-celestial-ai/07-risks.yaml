callouts:
  - calloutType: risk
    title: Earn-Out Opacity Is a Governance Gap
    body: >-
      The $2.25B earn-out milestone structure has not been publicly disclosed in sufficient detail to determine whether
      the widely cited $500M ARR target by FY2028 actually triggers full payment. This opacity creates information
      asymmetry between Marvell shareholders, former Celestial AI investors, and retained employees — all of whom have
      different economic stakes in milestone achievement. Marvell should provide clearer milestone disclosure in its
      FY2026 10-K.
    claimRefs:
      - C723
      - C732
  - calloutType: risk
    title: TSMC Sole-Foundry Concentration Is Unmitigatable Near-Term
    body: >-
      Celestial AI's EAM silicon photonics process is manufacturable only at TSMC today, and TSMC's CoWoS advanced
      packaging capacity is heavily allocated to NVIDIA. No credible alternative foundry can replicate the required
      combination of advanced node silicon photonics plus CoWoS-class packaging before 2028 at the earliest. This makes
      TSMC a single-point-of-failure for the entire Photonic Fabric program. Taiwan geopolitical risk — while low
      probability — is catastrophic-magnitude if realized.
    claimRefs:
      - C702
      - C708
      - C738
  - calloutType: recommendation
    title: Prioritize Earn-Out Milestone Clarification and Retention Contracts
    body: >-
      The two most actionable near-term risk mitigations are: (1) Marvell should publicly clarify the earn-out milestone
      structure in its next 10-K or investor day materials to reduce governance opacity; (2) Marvell should confirm
      retention contract terms for Dave Lazovsky and Phil Winterbottom with multi-year performance equity tied to
      technical milestones, not just Marvell MRVL stock price. Without confirmed retention, key-person departure risk is
      effectively open.
    claimRefs:
      - C723
      - C740
      - C741
  - calloutType: insight
    title: Ayar Labs Is the Nearest-Term Competitive Monitoring Signal
    body: >-
      Ayar Labs' mid-2026 mass production target and GUC design collab make it the highest- priority competitive
      monitoring signal. If Ayar Labs achieves CoWoS integration and NVIDIA confirms TeraPHY as the NVLink
      Fusion-compatible optical chiplet, Marvell's Celestial AI differentiation thesis weakens materially. The NVIDIA
      NVLink Fusion partnership does not guarantee exclusivity and its commercial terms are not public.
    claimRefs:
      - C717
      - C718
      - C720
      - C722
