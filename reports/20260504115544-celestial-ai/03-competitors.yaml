  - id: s4
    title: Adjacent Optical Ecosystem Competitors
    body: |
      Coherent Corp (NYSE: COHR), formerly II-VI Incorporated, is the world's largest
      optical transceiver supplier. Coherent reported FY2025 revenue of $5.81B, up 23%
      year-over-year, with AI datacenter segment revenue growing 61% in the same period.
      Coherent is primarily a transceiver and optical component supplier, not a direct
      chiplet competitor, but its expanding CPO and LPO (linear-drive pluggable optics)
      portfolio puts it in buyers' decision sets when hyperscalers and switch ASIC vendors
      evaluate optical integration options. Coherent has deepened partnerships with NVIDIA
      for CPO integration in NVIDIA's next-generation networking platforms. The competitive
      risk from Coherent is indirect: if hyperscalers prefer Coherent's module-based CPO
      over a chiplet approach, Celestial AI/Marvell's addressable integration tier shrinks.
      Coherent's $5.81B revenue and public company status represent formidable ecosystem
      scale.

      LightMatter is a photonic computing and interconnect startup that raised $400M in a
      Series D in October 2024 (total $850M, valuation $4.4B). LightMatter's Passage
      photonic interposer uses light to connect multiple chips placed on a single photonic
      substrate. The Passage M1000, announced March 2025, delivers over 114 Tbps total
      optical bandwidth. Manufacturing partnerships with GlobalFoundries and Amkor provide
      supply chain backing. LightMatter's architectural approach requires all co-located
      chips to share the same photonic substrate, limiting deployment flexibility compared
      to Celestial AI's discrete chiplet approach; however, LightMatter's higher valuation
      ($4.4B) and funding track record signal strong market confidence. LightMatter
      competes for the same hyperscaler attention and custom AI cluster design wins.

      Rockley Photonics filed for Chapter 11 bankruptcy in early 2023 and emerged from
      restructuring later that year. Celestial AI acquired Rockley's entire silicon
      photonics IP portfolio for $20M in October 2024, covering optoelectronic systems-
      in-package, electro-absorption modulators, and optical switch technology, bringing
      Celestial AI's total patent count to 200+. Rockley's trajectory illustrates the
      capital intensity and execution risk in silicon photonics commercialization; the
      acquisition converted a potential IP liability into a competitive asset for Celestial
      AI's EAM technology position.
