company:
  name: Celestial AI
chapter:
  number: 3
  title: Competitors
  summary: |
    The AI scale-up optical interconnect competitive landscape is dominated by four layers:
    direct optical chiplet peers (Ayar Labs, Ranovus), platform incumbents with internal
    silicon photonics programs (Intel, Broadcom, NVIDIA), established optical component
    suppliers expanding into CPO (Coherent Corp), and adjacent photonic computing startups
    (LightMatter). Celestial AI — now a Marvell subsidiary — competes most directly with
    Ayar Labs, which has raised $870M total including a $500M Series E in early 2026 and
    counts NVIDIA, AMD, and Intel Capital as investors. NVIDIA's copper NVLink fabric
    remains the dominant status-quo scale-up interconnect; the open UALink standard
    (Broadcom, AMD, Intel, Google, et al.) published its 1.0 specification in April 2025
    but hardware is not expected until late 2026. Celestial AI/Marvell's EAM-based 3D
    integration, 200+ patent portfolio (reinforced by the Rockley Photonics IP acquisition
    in October 2024), and Marvell's NVLink Fusion partnership with NVIDIA provide genuine
    differentiation, but Ayar Labs' larger funding base, broader strategic investor network,
    and apparent manufacturing maturity represent the primary competitive risks.
sections:
  - id: s1
    title: Competitive Landscape Overview
    body: |
      The AI data center optical interconnect competitive landscape contains four distinct
      tiers relevant to Celestial AI's Photonic Fabric platform. The first tier consists
      of direct optical chiplet peers — companies pursuing in-package or co-packaged
      silicon photonics chiplets for XPU-to-XPU and XPU-to-memory scale-up links — most
      importantly Ayar Labs and, to a lesser degree, Ranovus. The second tier comprises
      platform incumbents that have launched or are actively developing silicon photonics
      optical chiplets from a position of existing semiconductor or systems dominance:
      Intel Silicon Photonics, Broadcom (CPO), and NVIDIA (NVLink ecosystem). The third
      tier includes established optical component manufacturers — primarily Coherent Corp
      — that compete in adjacent CPO/LPO product lines at scale. The fourth tier features
      LightMatter, a photonic computing and interconnect startup whose Passage photonic
      interposer overlaps with Celestial AI's interconnect use case despite a different
      architectural approach.

      The status-quo technology that the entire optical chiplet category must displace is
      NVIDIA's copper-based NVLink scale-up fabric, which in its fifth generation
      (Blackwell) supports 1.8 TB/s total bandwidth per GPU and enables pods of up to
      576 GPUs. The UALink consortium — spanning Broadcom, AMD, Intel, Google, Microsoft,
      Cisco, and Meta — published the open-standard UALink 1.0 specification in April 2025
      targeting up to 1,024 accelerators per AI pod, but hardware is expected no earlier
      than late 2026, leaving NVLink as the sole shipping high-bandwidth scale-up fabric
      at the report date.

      Competitor funding has accelerated sharply: Ayar Labs raised $500M in a Series E in
      early 2026 (total $870M), LightMatter raised $400M in October 2024 (total $850M,
      valuation $4.4B), and Ranovus committed $100M+ to Ottawa manufacturing in August
      2025. The competitive intensity is high and differentiators on manufacturing
      readiness, ecosystem access, and architectural specificity will determine design wins.
