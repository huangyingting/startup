callouts:
  - calloutType: strength
    title: Marvell Acquisition Resolves Distribution Moat Gap
    body: |
      Celestial AI's pre-acquisition weakness was go-to-market: a startup competing for
      hyperscaler design wins against Ayar Labs' NVIDIA/AMD investor relationships. The
      Marvell acquisition provides immediate access to Marvell's existing custom silicon
      engagements at all major hyperscalers and the strategic NVLink Fusion partnership
      with NVIDIA — a distribution moat that Ayar Labs cannot replicate via investor
      relationships alone.
    claimRefs:
      - CP015
      - CP016
      - CP027
      - CP028
  - calloutType: risk
    title: Ayar Labs Funding Lead and NVIDIA Dual Investment Create Structural Risk
    body: |
      Ayar Labs entered 2026 with $870M raised (vs Celestial AI's ~$515M pre-acquisition),
      a $3.75B valuation, and NVIDIA as a direct investor across both its Series D and E.
      NVIDIA's simultaneous investment in Ayar Labs while partnering with Marvell on
      NVLink Fusion is a structural conflict of interest. If NVIDIA ultimately certifies
      TeraPHY as the preferred optical chiplet within its NVLink ecosystem, Celestial
      AI/Marvell's optical scale-up revenue path faces a material headwind.
    claimRefs:
      - CP002
      - CP021
      - CP030
      - CP031
