callouts:
  - calloutType: strength
    title: Marvell Acquisition Resolves Distribution Moat Gap
    body: |
      Celestial AI's pre-acquisition weakness was go-to-market: a startup competing for
      hyperscaler design wins against Ayar Labs' NVIDIA/AMD investor relationships. The
      Marvell acquisition provides immediate access to Marvell's existing custom silicon
      engagements at all major hyperscalers and the strategic NVLink Fusion partnership
      with NVIDIA — a distribution moat that Ayar Labs cannot replicate via investor
      relationships alone.
    claimRefs:
