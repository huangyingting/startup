  - id: s2
    title: Direct Optical Chiplet Competitors
    body: |
      Ayar Labs is Celestial AI's most direct competitor. Founded in 2015 as a UC Berkeley
      spin-out, Ayar Labs has built the TeraPHY optical I/O chiplet, which uses micro-ring
      modulators (MRMs) and the UCIe chiplet interconnect standard for integration into AI
      accelerator packages. TeraPHY achieves up to 8 Tbps bandwidth per chiplet; the
      companion SuperNova multi-wavelength light source supports 16 wavelengths as an
      external laser input. Ayar Labs targets approximately 5 pJ/bit energy efficiency with
      a roadmap to under 1 pJ/bit. The company raised $155M in a Series D in December 2024
      — with AMD Ventures, Intel Capital, and NVIDIA as investors alongside Advent Global
      Opportunities — and followed with a $500M Series E in early 2026 led by Neuberger
      Berman with AMD, NVIDIA, MediaTek, and Alchip participating, bringing total raised
      to $870M and valuation to $3.75–3.8B.

      The key architectural contrast: Celestial AI uses electro-absorption modulators (EAMs)
      and 3D EIC-on-PIC stacking, while Ayar Labs uses MRMs and co-packaging within
      existing CMOS process flows. EAMs offer advantages in thermal tolerance, bandwidth
      density, and extinction ratio; MRMs offer lower insertion loss but require tighter
      temperature management. Celestial AI's 3D stacking architecture uniquely targets
      disaggregated memory access at scale — a use case Ayar Labs does not explicitly
      address — potentially giving Celestial AI a differentiated niche.

      NVIDIA's simultaneous direct investment in Ayar Labs (both Series D and Series E)
      while partnering with Marvell on NVLink Fusion represents a structural conflict of
      interest that requires monitoring. If NVIDIA ultimately favors Ayar Labs'
      TeraPHY-based approach within its platforms, Marvell/Celestial AI's access to
      NVIDIA's scale-up ecosystem could be compromised.

      Ranovus (Ottawa, founded 2012) is a secondary direct competitor. Its Odin
      direct-drive CPO 3.0 platform supports 100 Gbps per optical channel and targets
      AI/ML ASIC integration. In March 2024 Ranovus announced a 6.4 Tbps co-packaged
      optics solution jointly developed with MediaTek. Ranovus received $36M from Canada's
      Strategic Innovation Fund in 2023 and announced a $100M+ manufacturing expansion in
      Ottawa in August 2025. While Ranovus is active in the CPO space, it lacks the deep
      hyperscaler investor backing and broad ecosystem relationships of Ayar Labs.
