  - id: s3
    title: Platform and Incumbent Competitors
    body: |
      Intel Silicon Photonics has the longest institutional history in commercial silicon
      photonics, having operated a transceiver business since 2012. Intel's Optical
      Connectivity for AI (OCI) initiative represents its optical I/O chiplet program. At
      OFC 2024, Intel demonstrated the first fully integrated bidirectional OCI optical
      I/O chiplet co-packaged with an Intel CPU. The OCI chiplet supports 64 channels at
      32 Gbps each way (4 Tbps bidirectional), achieves less than 3–5 pJ/bit power
      efficiency, and supports reach up to 100 meters over standard fiber. Intel's
      advantage lies in vertical integration: internal silicon photonics R&D, packaging,
      and foundry capabilities. Intel has acqui-hired optical teams including from Glofast
      to bolster the program. The competitive risk from Intel is primarily on Intel CPU
      platform customers, where Intel may prefer an internal optical chiplet, narrowing
      Celestial AI/Marvell's addressable market among Intel-platform AI deployments.

      Broadcom's CPO program focuses on scale-out Ethernet switching rather than the
      scale-up XPU-to-XPU interconnect domain where Celestial AI competes. In March 2024
      Broadcom launched Bailly, the industry's first 51.2 Tbps CPO Ethernet switch,
      integrating eight 6.4 Tbps silicon photonics optical engines with its Tomahawk5
      chip — achieving a 70% power reduction versus pluggable transceivers — with field
      validation at Meta. The roadmap extends to Davisson at 102.4 Tbps. Broadcom also
      supplies NVLink Switch chips to NVIDIA and is a foundational member of the UALink
      consortium. At Hot Chips 2024, Broadcom presented early work on AI compute ASICs
      with optical attach, signaling potential expansion into scale-up adjacency. If
      Broadcom pivots CPO into the XPU scale-up space, it would represent the highest-
      resource competitive threat given Broadcom's hyperscaler relationships and
      manufacturing scale.

      NVIDIA controls the scale-up ecosystem through NVLink. NVLink v5 (Blackwell)
      achieves 1.8 TB/s per GPU; NVSwitch enables up to 576 GPU pods. At Computex 2025,
      NVIDIA unveiled NVLink Fusion — a chiplet interface enabling custom XPU silicon,
      including from Marvell, to natively connect to NVIDIA's NVLink ecosystem. Marvell
      partnered with NVIDIA on NVLink Fusion supporting up to 1.8 TB/s chiplet
      bidirectional bandwidth. NVLink Fusion creates a cooperative channel but also
      ensures NVIDIA controls optical adoption timing within its ecosystem.
