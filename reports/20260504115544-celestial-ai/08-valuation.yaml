    - type: private-evidence-only
      severity: material
      topic: "Celestial AI gross margin and unit economics"
      missingEvidence: |
        No gross margin, bill-of-materials cost structure, or unit economics have been disclosed
        for Photonic Fabric modules or licensing agreements. The 50–60% GM assumption used in
        the DCF analysis is based on fabless semiconductor sector norms, not company-specific data.
      whyItMatters: |
        Gross margin is the most critical driver of earn-out EBITDA contribution at scale.
        A 40% GM profile versus a 60% GM profile changes the present value of the revenue
        stream by 50%, potentially shifting the deal from fair to expensive.
      diligencePath: "Request Marvell DCG segment margin disclosure post first-revenue quarter; model sensitivity across 35–65% GM range; seek technical cost analysis from photonics packaging experts."
