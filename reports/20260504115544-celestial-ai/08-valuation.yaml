      - - Earn-out accounting treatment
        - Marvell has not published its ASC 805 purchase price allocation for Celestial AI intangibles
        - Earn-out classification (liability vs. equity) affects reported GAAP earnings and diluted EPS
        - Marvell FY2026 10-K (due mid-2026) or subsequent 10-Q disclosures
