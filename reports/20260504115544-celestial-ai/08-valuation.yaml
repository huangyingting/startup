  - id: s4
    title: Discounted Cash Flow and Revenue Ramp Analysis
    body: |
      A full discounted cash flow analysis of Celestial AI as a standalone entity is precluded
      by the absence of any disclosed revenue, gross margin, operating cost structure, or
      customer contract terms. However, a simplified forward-revenue discount approach anchored
      on Marvell's published milestones allows scenario-based valuation analysis.

      Base case: Marvell projects $500 million ARR by Q4 FY2028 (H2 calendar 2027, approximately
      18 months post-acquisition close), scaling to $1 billion ARR by Q4 FY2029. Assuming a
      50–60% gross margin profile consistent with custom silicon licensing and photonic module
      sales—a reasonable assumption for a fabless design company selling into hyperscaler
      supply chains—EBITDA contribution at the $1 billion ARR scale would be approximately
      $100–200 million per year after allocated R&D and SG&A. Discounting this stream at a
      15–20% discount rate to reflect execution risk, technology adoption uncertainty, and
      semiconductor cycle exposure yields a present value range of approximately $2.5–4.0
      billion—broadly consistent with the $3.25 billion upfront price.

      Bull case: Celestial AI achieves $2 billion in cumulative revenue by FY2029, unlocking
      the full $2.25 billion earn-out. This requires approximately $300–400 million per year
      in revenue across FY2028 and FY2029, implying successful parallel hyperscaler
      co-packaged optics deployments. Under this scenario, the effective acquisition price of
      $5.5 billion against a projected run-rate revenue of $1.5–2.0 billion yields an
      EV/forward revenue multiple of approximately 2.8–3.7×—extremely attractive by any AI
      silicon benchmark.

      Bear case: Revenue ramp delays by 12 months or more due to hyperscaler qualification
      holdups or competing optical solutions. Cumulative FY2029 revenue reaches only
      $100–200 million; no earn-out tranches vest. The transaction settles at $3.25 billion
      for an asset generating minimal near-term revenue. In this scenario the effective
      price represents a significant write-down risk relative to Marvell's book value for
      the acquired intangibles.

      The earn-out structure materially improves Marvell's risk-adjusted expected value
      relative to paying $5.5 billion upfront. By deferring 41% of total potential
      consideration as contingent performance-based equity, Marvell's board preserved capital
      while aligning management incentives with commercial execution. Probability-weighting
      these scenarios—assigning perhaps 30% probability to the bull case, 45% to base, and
      25% to bear—yields an expected value of approximately $3.8–4.2 billion for the
      transaction, above the upfront consideration but below the full earn-out value. This
      probability weighting is an analyst estimate and should be treated with low confidence.
