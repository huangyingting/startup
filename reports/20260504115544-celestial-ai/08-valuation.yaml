  - id: s2
    title: Comparable M&A Transactions
    body: |
      Valuing a pre-revenue semiconductor photonics company requires reference to comparable
      M&A transactions in silicon photonics, optical interconnects, and AI-adjacent chip
      design. The most directly relevant precedents are acquirer-to-acquirer consistent
      and technology-to-technology aligned.

      Marvell's own acquisition of Inphi Corporation (announced October 2020, closed April 2021)
      for approximately $10 billion provides the most powerful within-acquirer benchmark. Inphi
      was a growing, revenue-generating silicon photonics and electrical DSP company with
      approximately $683 million in trailing twelve-month revenue at announcement, implying a
      roughly 14.6× TTM revenue multiple. Inphi served cloud data centers and 5G telecom,
      a very close adjacency to Celestial AI's Photonic Fabric optical scale-up platform.
      The Inphi deal established Marvell's willingness to pay premium multiples for leadership
      in optical connectivity—making the Celestial AI upfront price at 6.5× forward ARR
      appear conservative by comparison if the revenue ramp achieves plan.

      NVIDIA's $6.9 billion acquisition of Mellanox Technologies (closed April 2020) is a
      critical AI networking precedent. Mellanox was generating approximately $1.3 billion in
      annual revenue at the time, implying roughly a 5× TTM revenue multiple. The Mellanox
      deal validated the strategic proposition that connectivity silicon—in that case InfiniBand
      switching—is essential to AI cluster performance. Celestial AI extends this proposition
      to the optical layer, with a higher-conviction forward-looking case.

      Cisco's acquisition of Acacia Communications for $4.5 billion (closed March 2021) is
      directly relevant: Acacia produces high-speed optical interconnect silicon critical to
      data center and AI infrastructure. The deal was initially announced in 2019 at $2.6 billion
      but repriced to $4.5 billion after antitrust delays, reflecting appreciation in photonics
      asset values during the period.

      AMD's $1.9 billion acquisition of Pensando Systems (April 2022) provides a closer
      structural analog: Pensando was a data center networking startup focused on programmable
      DPU silicon with limited revenue at exit, and AMD paid primarily for engineering talent,
      IP portfolio, and future design-win pipeline. This deal most closely mirrors the Celestial
      AI transaction structure—a pre-revenue or early-revenue AI chip startup acquired for IP
      and roadmap rather than current cash flows.

      Across this comparable set, EV/TTM revenue multiples range from approximately 5× to
      14.6× for revenue-generating targets. For pre-revenue acqui-hires or IP-premium deals,
      the multiple framework is not directly applicable—but the deal sizes ($1.1B to $10B)
      provide a credible range into which Celestial AI's $3.25 billion upfront price fits
      comfortably, especially given the strategic importance of Photonic Fabric to Marvell's
      $10 billion scale-up TAM narrative.
