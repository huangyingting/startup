callouts:
  - calloutType: strength
    title: Earn-Out Structure Materially Limits Marvell's Downside
    body: |
      Approximately 41% of total potential consideration ($2.25B of $5.5B) is contingent
      on cumulative revenue milestones. In the bear case, the transaction settles at
      $3.25B upfront regardless of earn-out non-achievement. This structure is a
      best-practice design for pre-commercial technology acquisitions: it limits acquirer
      downside while aligning founder and acquiree management with commercial execution.
    claimRefs:
      - C293
      - C257
      - C258
      - C270
  - calloutType: risk
    title: Zero Disclosed Revenue at Acquisition Creates Material Execution Risk
    body: |
      Celestial AI had de minimis revenue at close and no disclosed hyperscaler volume
      purchase commitments. Marvell's $500M ARR target requires 18 months of successful
      commercial ramp beginning from a standing start. Gross margin, pricing structure,
      and customer qualification timelines have not been disclosed, making independent
      earn-out achievability assessment impossible without additional diligence.
    claimRefs:
      - C265
      - C290
      - C264
  - calloutType: recommendation
    title: 'Valuation Stance: Fair (Upfront); Research-More for Outside Observers'
    body: |
      The $3.25B upfront price is fair relative to photonics M&A precedents and Marvell's
      own acquisition discipline. The full earn-out scenario at $5.5B would be attractive.
      For outside observers, a research-more stance is appropriate until Marvell's FY2028
      earnings demonstrate first Celestial AI revenue. That single data point transforms
      the valuation case from speculative to evidence-supported.
    claimRefs:
      - C263
      - C266
      - C268
  - calloutType: insight
    title: NVIDIA's $2B NVLink Fusion Commitment Is the Strongest External Validation Signal
    body: |
      NVIDIA's March 2026 $2 billion investment in the Marvell relationship—explicitly citing
      silicon photonics and NVLink Fusion integration—constitutes the most credible
      independent signal that Celestial AI's Photonic Fabric will be integrated into the
      dominant AI infrastructure platform. This commitment post-dates the acquisition close
      and was not factored into the original deal pricing, meaning it represents incremental
      upside validation for the valuation thesis.
    claimRefs:
      - C289
      - C260
  - calloutType: assumption
    title: Base Case Assumes Hyperscaler Qualification Completed in 18 Months from Close
    body: |
      Marvell's $500M ARR target for Q4 FY2028 implies that hyperscaler customer
      qualification cycles for Photonic Fabric complete within approximately 18 months of
      the February 2026 close. Semiconductor optical component qualification typically
      requires 12–24 months. The base case assumption is at the optimistic end of
      historical qualification timelines and should be stress-tested against potential delays.
    claimRefs:
      - C272
      - C290
      - C291
