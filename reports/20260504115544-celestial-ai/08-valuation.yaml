  - id: s3
    title: Comparable Public Company and Private Round Benchmarks
    body: |
      Public AI silicon companies and recent private funding rounds provide additional valuation
      anchors. The most relevant public comps are companies with material AI chip design, custom
      silicon, and optical interconnect exposure.

      Among AI semiconductor startups, Cerebras Systems filed for a Nasdaq IPO in April 2026,
      targeting a valuation range of $23–35 billion against $510 million of reported 2025
      revenue—implying roughly 45–69× 2025 revenue at the filing range midpoint. Cerebras
      reached this revenue through a large multi-year compute contract with OpenAI and an AWS
      partnership, making it a less directly comparable but instructive ceiling for AI chip
      valuations in the current cycle. SambaNova Systems has remained private at a reported
      valuation above $5 billion with no disclosed revenue. Groq, the AI inference chip company,
      was valued at approximately $2.8 billion in a 2023 Series D round.

      For silicon photonics specifically, Ayar Labs—a co-packaged optical interconnect company
      with technology overlapping Celestial AI's Photonic Fabric—raised approximately
      $870 million in total funding through a Series C as of early 2024, but has not disclosed
      a post-money valuation publicly. The absence of comparable listed silicon photonics
      companies at the commercial stage forces reliance on M&A comps and market-sizing proxies
      rather than public company EV/revenue benchmarks.

      Among public semiconductor companies, Marvell itself provides the most useful acquirer
      reference point. Marvell's AI-driven revenue grew 78% in FY2025 to an estimated
      $1.7–$2.0 billion, and the company reported total FY2026 revenue of approximately
      $8.2 billion (+42% year-over-year). At announcement, Marvell's own enterprise value
      was approximately $55–65 billion, implying a forward revenue multiple of 7–8× against
      FY2026 estimates. Marvell paying 6.5× two-year forward ARR for Celestial AI is thus
      consistent with Marvell's own market multiple—suggesting the board applied disciplined
      pricing logic rather than a strategic overpay.

      The MarketsAndMarkets silicon photonics market report (2025 edition) projects the global
      silicon photonics market at approximately $2.1–3.1 billion in 2025, growing to
      $9.6–11.8 billion by 2030 at a CAGR of approximately 27–30%. At Marvell's stated
      $500 million ARR target, Celestial AI would represent roughly 15–24% share of a 2028
      market estimated at $4–5 billion. That is an ambitious but achievable share for a
      first-mover with hyperscaler design wins and no direct equivalent in co-packaged optics
      at 5 nm process node. The GrandView Research optical interconnect market report projects
      the overall optical interconnect market reaching $34.5 billion by 2030, providing
      a larger TAM backdrop within which the silicon photonics segment sits.
