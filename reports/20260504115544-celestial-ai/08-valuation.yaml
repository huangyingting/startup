  - id: s5
    title: Earn-Out Structure and Contingent Consideration Analysis
    body: |
      The earn-out mechanism is a materially important and analytically distinctive element
      of the Celestial AI acquisition that distinguishes it from straightforward cash or
      stock acquisitions common in semiconductor M&A.

      The structure is equity-settled: up to approximately 27.2 million additional MRVL shares
      (~$2.25 billion in value at announcement) are contingent on Celestial AI achieving two
      cumulative revenue milestones by the end of Marvell's fiscal year 2029 (approximately
      January 2029). First tranche: approximately one-third of the earn-out (~9.1 million
      MRVL shares, ~$750 million) vests when cumulative Celestial AI revenue from the
      acquisition date through FY2029 year-end reaches at least $500 million. Second tranche:
      the remaining two-thirds (~18.1 million shares, ~$1.5 billion) vest only if cumulative
      revenue exceeds $2.0 billion by the same deadline. Revenue accumulation begins at close
      (February 2026), and with meaningful revenue not expected until H2 FY2028, the effective
      window for reaching $2 billion in cumulative revenue is approximately 18 months—a
      highly aggressive target requiring outstanding commercial execution from multiple
      hyperscaler customers simultaneously.

      The earn-out structure creates several important dynamics. Celestial AI's founding team—
      CEO Dave Lazovsky, COO Preet Virk, and CTO Phil Winterbottom—joined Marvell as
      employees and are directly incentivized by these milestones, aligning them with Marvell's
      commercial execution goals. The equity settlement means no cash burden on Marvell's
      balance sheet but creates potential dilution risk for MRVL shareholders proportional to
      how much of the earn-out vests.

      An important strategic nuance is the Amazon warrant issued simultaneously: Marvell issued
      Amazon approximately 1,045,171 MRVL shares at a strike price of $87.0029 per share,
      exercisable based on Amazon's cumulative purchases of Photonic Fabric products through
      December 2030. This warrant functions as an indirect demand signal: if Amazon exercises
      the warrant in full, it implies Amazon has committed to Photonic Fabric product purchases
      large enough to warrant the vesting threshold, providing a structural corroboration for
      the earn-out achievability from Celestial AI's largest likely customer.

      The 41% contingent component (at announcement pricing) is at the high end for
      semiconductor acquisitions of this size in recent history, reflecting the combination of
      transformational upside potential and substantial pre-revenue uncertainty. This structure
      is consistent with best-practice M&A deal design for pre-commercial technology assets:
      it limits acquirer downside while providing seller upside if technology proves out. From
      a governance perspective, the contingent consideration also reduces the risk of
      reputational damage to Marvell management if the photonics ramp underperforms.
