    title: Valuation / Return Range
    type: range
    layout: wide
    summary: |
      Low, mid, and high effective acquisition value for Marvell's Celestial AI purchase
      across three earn-out scenarios. The upfront-only bear case is fixed at $3.25B.
      The base case includes one earn-out tranche. The bull case reflects full earn-out
      achievement at $5.5B. All values are in USD millions at announcement pricing.
