company:
  name: Celestial AI
chapter:
  number: 8
  title: Valuation
  summary: |
    Marvell Technology acquired Celestial AI on February 2, 2026 for $3.25 billion upfront
    ($1 billion cash plus approximately 27.2 million MRVL shares valued at ~$2.25 billion
    at announcement), with up to $2.25 billion in earn-out shares contingent on cumulative
    revenue milestones through Marvell's fiscal year 2029—total potential consideration
    $5.5 billion. Celestial AI was pre-revenue at close, making trailing-revenue multiples
    inapplicable. Against Marvell's stated $500 million ARR target for Q4 FY2028, the
    implied EV/2-year-forward ARR on the upfront price is 6.5×, rising to 11.0× if the full
    earn-out is achieved. These multiples sit at the conservative end of comparable photonics
    and AI silicon M&A precedents (Inphi at 14.6× TTM; Mellanox at ~5× TTM). The 30%
    premium over the $2.5 billion Series C1 private round is modest, and the earn-out
    structure limits Marvell's downside by deferring 41% of peak consideration. NVIDIA's
    $2 billion NVLink Fusion commitment (March 2026) and the Amazon product warrant provide
    independent third-party corroboration of the technology's commercial path. Valuation
    stance is fair on the upfront price; the full earn-out scenario would be attractive.
    Outside observers should adopt a research-more posture pending first-revenue evidence
    from Marvell's FY2028 reporting, given the absence of disclosed contracts, gross margin
    data, and customer qualification milestones.
sections:
  - id: s1
    title: Deal Overview and Implied Transaction Multiples
    body: |
      Marvell Technology completed its acquisition of Celestial AI on February 2, 2026,
      approximately two months after announcing the transaction alongside its fiscal Q3 FY2026
      earnings on December 2, 2025. The deal structure comprises two distinct tranches. The
      upfront consideration totals approximately $3.25 billion: $1 billion in cash plus
      approximately 27.2 million newly issued shares of MRVL common stock valued at
      approximately $2.25 billion based on the 10-day volume-weighted average price preceding
      announcement. The contingent earn-out consideration—up to an additional 27.2 million
      MRVL shares (~$2.25 billion)—is structured in tranches tied to cumulative Celestial AI
      revenue milestones by Marvell's fiscal year 2029 year-end.

      On conventional trailing revenue metrics, the transaction cannot be benchmarked because
      Celestial AI was pre-revenue at acquisition—revenues were de minimis and no commercial
      deployments had been achieved. Marvell's management provided forward revenue guidance:
      a $500 million annualized run rate from Celestial AI by Q4 FY2028 (approximately H2
      calendar 2027, roughly 18 months post-close) and a $1 billion annualized run rate by
      Q4 FY2029. Using these targets as the denominator, the implied EV/forward ARR multiples
      are: (1) $3.25 billion upfront divided by $500 million 2-year-forward ARR = 6.5× NTM ARR;
      (2) $5.5 billion full earn-out value divided by $500 million ARR = 11.0× at the first
      milestone; and (3) $5.5 billion divided by $1.0 billion FY2029 ARR = 5.5×. The last VC
      valuation was $2.5 billion at the March 2025 Series C1, implying a 30% premium on the
      upfront price and a theoretical 120% maximum premium at full earn-out. Total capital
      invested across all five funding rounds was approximately $515 million, placing the
      upfront multiple at approximately 6.3× invested capital.

      Financial advisors provide an arm's-length pricing signal. Celestial AI was advised by
      Morgan Stanley (financial) and Latham & Watkins (legal). Marvell was advised by Citigroup
      (financial) and Wilson Sonsini Goodrich & Rosati (legal). Both advisory pairings are
      consistent with top-quartile competitive M&A processes in the semiconductor sector. MRVL
      shares rose approximately 9–13% on the announcement day, reflecting investor approval of
      the strategic rationale. The market was simultaneously reacting to strong Q3 FY2026
      earnings and raised guidance, so the share move cannot be fully attributed to the
      acquisition announcement alone; however, the absence of any negative market reaction
      to a $3.25 billion outlay for a pre-revenue company is a signal that buy-side consensus
      viewed the price as fair or strategically justified.
