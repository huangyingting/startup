  - FR003
- id: CR-SEC-04
  title: Partner, Financial, and People Risks
  body: 'Key-person dependency is a top-tier risk. George Church (Harvard CSO) provides foundational scientific credibility
    and patent access. Beth Shapiro (Chief Science Officer) leads ancient DNA reconstruction. Ben Lamm (CEO) owns investor
    relationships. No formal succession plan has been disclosed. DARPA ($11M+ confirmed via USASpending) is the primary government
    funder; non-renewal would remove the government validation signal that supports Colossal''s scientific legitimacy. Estimated
    burn rate of $40–60M per year (based on ~170 employees at typical biotech cost structure) means Colossal needs new capital
    rounds before its 2028 mammoth target. ViaGen pet cloning revenue (~$10–15M estimated annually) covers less than 25–35%
    of operating costs. Investor concentration risk: The Colossal Foundation ($100M) and UAE Museum of the Future partnership
    represent sovereign/institutional capital that could be withdrawn. Asian elephant surrogate partner dependency is critical:
    without zoo or wildlife reserve access to healthy elephants, the mammoth program is halted. Australian government authorization
    is needed for the thylacine program; no formal approval exists.'
  claimRefs:
  - CR021
  - CR022
  - CR023
  - CR024
  - CR025
  - CR026
  - CR027
  - CR028
  tableRefs:
  - TR003
  - TR004
