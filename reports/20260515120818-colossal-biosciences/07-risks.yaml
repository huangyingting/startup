callouts:
- id: callout-CR-01
  type: finding
  title: No regulatory precedent exists for commercializing a de-extinct animal anywhere globally
  body: FDA IGA, USDA APHIS, CITES, ESA, and Australian biosecurity frameworks all apply to Colossal's programs but none has
    a published pathway for a de-extinct species. Colossal is pioneering a regulatory category that does not yet exist, creating
    both opportunity (first mover) and risk (no precedent to follow, potential for hostile interpretation).
  claimRefs:
  - CR010
  - CR037
- id: callout-CR-02
  type: risk
  title: Mammoth 2028 target depends on a cascade of low-probability steps each of which can fail independently
  body: Genome editing → cell culture → SCNT → embryo implantation → 22-month elephant gestation → live birth are sequential.
    SCNT success rates in large mammals are typically under 5%; each round of failure adds approximately 24 months. A single
    block at any stage resets the clock.
  claimRefs:
  - CR013
  - CR014
  - CR015
